document_id: 2CH.24,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Joas, roi de Juda. Le temple réparé
  - type: heading
    content: 'V. 1-16: cf. 2 R 12:1-16. Ps 69:10.'
  - type: text
    content: 'Joas '
  - type: note
    content: 2 R 12:1, etc.
  - type: text
    content: 'avait sept ans lorsqu’il devint roi, et il régna quarante ans à Jérusalem. Sa mère s’appelait Tsibja, de Beer-Schéba. '
  '10':
  - type: text
    content: 'Tous les chefs et tout le peuple s’en réjouirent, et l’on apporta et jeta dans le coffre tout ce qu’on avait à payer. '
  '11':
  - type: text
    content: 'Quand c’était le moment où les Lévites, voyant qu’il y avait beaucoup d’argent dans le coffre, devaient le livrer aux inspecteurs royaux, le secrétaire du roi et le commissaire du souverain sacrificateur venaient vider le coffre; ils le prenaient et le remettaient à sa place; ils faisaient ainsi journellement, et ils recueillirent de l’argent en abondance. '
  '12':
  - type: text
    content: 'Le roi et Jehojada le donnaient à ceux qui étaient chargés de faire exécuter l’ouvrage dans la maison de l’Éternel, et qui prenaient à gage des tailleurs de pierres et des charpentiers pour réparer la maison de l’Éternel, et aussi des ouvriers en fer ou en airain pour réparer la maison de l’Éternel. '
  '13':
  - type: text
    content: 'Ceux qui étaient chargés de l’ouvrage travaillèrent, et les réparations s’exécutèrent par leurs soins; ils remirent en état la maison de Dieu et la consolidèrent. '
  '14':
  - type: text
    content: 'Lorsqu’ils eurent achevé, ils apportèrent devant le roi et devant Jehojada le reste de l’argent; et l’on en fit des ustensiles pour la maison de l’Éternel, des ustensiles pour le service et pour les holocaustes, des coupes, et d’autres ustensiles d’or et d’argent. Et, pendant toute la vie de Jehojada, on offrit continuellement des holocaustes dans la maison de l’Éternel. '
  '15':
  - type: text
    content: 'Jehojada mourut, âgé et rassasié de jours; il avait à sa mort cent trente ans. '
  '16':
  - type: text
    content: On l’enterra dans la ville de David avec les rois, parce qu’il avait fait du bien en Israël, et à l’égard de Dieu et à l’égard de sa maison.
  - type: heading
    content: Retour à l’idolâtrie; Zacharie, fils du souverain sacrificateur, lapidé par ordre du roi. — Invasion des Syriens. Joas assassiné
  - type: heading
    content: 'V. 17-27: cf. 2 R 12:17-21. Mt 23:35. (Ga 5:7. Ap 3:11.)'
  '17':
  - type: text
    content: 'Après la mort de Jehojada, les chefs de Juda vinrent se prosterner devant le roi. Alors le roi les écouta. '
  '18':
  - type: text
    content: 'Et ils abandonnèrent la maison de l’Éternel, le Dieu de leurs pères, et ils servirent les Astartés et les idoles. La colère de l’Éternel fut sur Juda et sur Jérusalem, parce qu’ils s’étaient ainsi rendus coupables. '
  '19':
  - type: text
    content: 'L’Éternel envoya parmi eux des prophètes pour les ramener à lui, mais ils n’écoutèrent point les avertissements qu’ils en reçurent. '
  '2':
  - type: text
    content: 'Joas fit ce qui est droit aux yeux de l’Éternel pendant toute la vie du sacrificateur Jehojada. '
  '20':
  - type: text
    content: 'Zacharie, fils du sacrificateur Jehojada, fut revêtu de l’esprit de Dieu; il se présenta devant le peuple et lui dit: Ainsi parle Dieu: Pourquoi transgressez-vous les commandements de l’Éternel? '
  - type: note
    content: 2 Ch 15:2.
  - type: text
    content: 'Vous ne prospérerez point; car vous avez abandonné l’Éternel, et il vous abandonnera. '
  '21':
  - type: text
    content: 'Et ils conspirèrent contre lui, et '
  - type: note
    content: Mt 23:35.
  - type: text
    content: 'le lapidèrent par ordre du roi, dans le parvis de la maison de l’Éternel. '
  '22':
  - type: text
    content: 'Le roi Joas ne se souvint pas de la bienveillance qu’avait eue pour lui Jehojada, père de Zacharie, et il fit périr son fils. Zacharie dit en mourant: Que l’Éternel voie, et qu’il fasse justice! '
  '23':
  - type: text
    content: 'Quand l’année fut révolue, l’armée des Syriens monta contre Joas, et vint en Juda et à Jérusalem. Ils tuèrent parmi le peuple tous les chefs du peuple, et ils envoyèrent au roi de Damas tout leur butin. '
  '24':
  - type: text
    content: 'L’armée des Syriens arriva avec un petit nombre d’hommes; et cependant l’Éternel livra entre leurs mains une armée très considérable, parce qu’ils avaient abandonné l’Éternel, le Dieu de leurs pères. Et les Syriens firent justice de Joas. '
  '25':
  - type: text
    content: 'Lorsqu’ils se furent éloignés de lui, après l’avoir laissé dans de grandes souffrances, ses serviteurs conspirèrent contre lui à cause du sang des fils du sacrificateur Jehojada; ils le tuèrent sur son lit, et il mourut. On l’enterra dans la ville de David, mais on ne l’enterra pas dans les sépulcres des rois. '
  '26':
  - type: note
    content: 2 R 12:21.
  - type: text
    content: 'Voici ceux qui conspirèrent contre lui: Zabad, fils de Schimeath, femme Ammonite, et Jozabad, fils de Schimrith, femme Moabite. '
  '27':
  - type: text
    content: Pour ce qui concerne ses fils, le grand nombre de prophéties dont il fut l’objet, et les réparations faites à la maison de Dieu, cela est écrit dans les mémoires sur le livre des rois. Amatsia, son fils, régna à sa place.
  '3':
  - type: text
    content: 'Jehojada prit pour Joas deux femmes, et Joas engendra des fils et des filles. '
  '4':
  - type: text
    content: 'Après cela, Joas eut la pensée de réparer la maison de l’Éternel. '
  '5':
  - type: text
    content: 'Il assembla les sacrificateurs et les Lévites, et leur dit: Allez par les villes de Juda, et vous recueillerez dans tout Israël de l’argent, chaque année, pour réparer la maison de votre Dieu; et mettez à cette affaire de l’empressement. Mais les Lévites ne se hâtèrent point. '
  '6':
  - type: text
    content: 'Le roi appela Jehojada, le souverain sacrificateur, et lui dit: Pourquoi n’as-tu pas veillé à ce que les Lévites apportassent de Juda et de Jérusalem l’impôt ordonné par '
  - type: note
    content: Ex 30:11, 12, 13.
  - type: text
    content: 'Moïse, serviteur de l’Éternel, et mis sur l’assemblée d’Israël pour la tente du témoignage? '
  '7':
  - type: text
    content: 'Car l’impie Athalie et ses fils ont ravagé la maison de Dieu et fait servir pour les Baals toutes les choses consacrées à la maison de l’Éternel. '
  '8':
  - type: text
    content: 'Alors le roi ordonna qu’on fît un coffre, et qu’on le plaçât à la porte de la maison de l’Éternel, en dehors. '
  '9':
  - type: text
    content: 'Et l’on publia dans Juda et dans Jérusalem qu’on apportât à l’Éternel l’impôt mis par Moïse, serviteur de l’Éternel, sur Israël dans le désert. '
