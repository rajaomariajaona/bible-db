  '1':
  - type: text
    content: INTRODUCTION AU LIVRE DE JONAS
  - type: text
    content: (És 42:19; 55:7-11. Jé 18:7, 8. Éz 18:23. Mt 12:40, 41.)
  - type: text
    content: Ce livre est intitulé «Jonas» (colombe), du nom d’un prophète missionnaire malgré lui. Il raconte les aventures de cet homme de Dieu, parti d’Israël vers Tarsis et de la mer vers Ninive. C’est un récit plein d’humour et signe de l’amour du Dieu du ciel et de la terre, à qui personne ne peut échapper, et devant qui nul ne peut se dérober.
  - type: text
    content: Ce livret renvoie à un personnage bien réel, celui de Jonas, fils d’Amitthaï. En effet il est bien question d’un Jonas, fils d’Amitthaï, en 2 Rois 14:25, un prophète de Gath-Hépher, en Galilée.
  - type: text
    content: Le chapitre 1 identifie la mission, la démission et les contraintes du prophète. Jonas, fils d’Amitthaï, fut envoyé en mission vers la grande et méchante ville de Ninive, capitale de l’Assyrie. D’ailleurs, Israël venait juste d’être victime du pillage des Assyriens. Pourquoi ne pas laisser Ninive sans la bonne nouvelle de Dieu afin qu’elle soit aussi détruite? Réaction humaine mais surpassée par l’amour d’un Dieu universel. Grâce à la tempête, Jonas fut saisi et jeté par-dessus bord par des marins craignant Dieu.
  - type: text
    content: Le chapitre 2 concerne la prière fervente du prophète. Jonas fut aussitôt avalé par un grand poisson, sur l’ordre de Dieu. Au lieu d’essayer de fuir Dieu, le prophète le pria. L’Éternel exauça sa prière et ordonna au poisson de le vomir à terre.
  - type: text
    content: 'Le chapitre 3 traite de la mission accomplie sans conviction. Jonas connaissait la miséricorde de son Dieu, qui est prêt à pardonner. Que faire? Proclamer la destruction de Ninive au lieu d’inviter sa population à la repentance: '
  - type: text
    content: «Encore quarante jours, et Ninive est détruite!»
  - type: text
    content: ' Voilà le message radical qui produisit l’effet inattendu par le prophète. Tous les Ninivites se repentirent, des hommes jusqu’aux animaux, du roi jusqu’au plus petit sujet. '
  - type: text
    content: «Alors Dieu se repentit du mal qu’il avait résolu de leur faire, et il ne le fit pas»
  - type: text
    content: ' (3:10).'
  - type: text
    content: 'Le chapitre 4 retrace le mécontentement de Jonas et les reproches que lui fit l’Éternel. '
  - type: text
    content: «Fais-tu bien de t’irriter à cause du ricin»
  - type: text
    content: ' qui a séché? Jonas répondit par l’affirmative. '
  - type: text
    content: «Et moi n’aurais-je pas pitié de Ninive»
  - type: text
    content: ' qui s’est repentie? dit l’Éternel. La leçon fut assimilée et la mission continua.'
  - type: text
    content: 'C’est l’histoire d’un nationaliste impénitent qui voulait que Dieu châtie l’ennemi de son peuple et qui refusa, de ce fait, de lui annoncer la paix. Pas de bonne nouvelle pour Ninive, d’où la conclusion de Jonas: '
  - type: text
    content: «Je savais que tu es un Dieu compatissant… C’est ce que je voulais prévenir en fuyant à Tarsis»
  - type: text
    content: ' (4:2).'
  - type: text
    content: 'Le livre de Jonas exprime quelques vérités essentielles: notre mission est d’une grande importance. Elle est impérative et non indicative. Le Dieu de la mission ne réserve pas exclusivement son amour et son salut à ceux qui croient déjà en lui, mais aussi aux étrangers repentants de tous les temps. L’Éternel est le maître de l’univers. Il peut utiliser n’importe quel élément du cosmos, la tempête, le poisson ou le ricin, pour atteindre son objectif de salut. Il est le maître de la vie et de la mort.'
