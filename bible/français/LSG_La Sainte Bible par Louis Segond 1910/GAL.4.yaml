document_id: GAL.4,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. Ga 3:23-26. Ro 8:14-17.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Or, aussi longtemps que l’héritier est enfant, je dis qu’il ne diffère en rien d’un esclave, quoiqu’il soit le maître de tout; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 14:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 2:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous observez les jours, les mois, les temps et les années! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Je crains d’avoir inutilement travaillé pour vous. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Soyez comme moi, car moi aussi je suis comme vous. Frères, je vous en supplie. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Vous ne m’avez fait aucun tort. Vous savez que ce fut à cause d’une infirmité de la chair que je vous ai pour la première fois annoncé l’Évangile. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et mis à l’épreuve par ma chair, vous n’avez témoigné ni mépris ni dégoût; vous m’avez, au contraire, reçu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal 2:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme un ange de Dieu, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10:40
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 13:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme Jésus-Christ. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Où donc est l’expression de votre bonheur? Car je vous atteste que, si cela eût été possible, vous vous seriez arraché les yeux pour me les donner. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Suis-je devenu votre ennemi en vous disant la vérité? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 10:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 11:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le zèle qu’ils ont pour vous n’est pas pur, mais ils veulent vous détacher de nous, afin que vous soyez zélés pour eux. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Il est beau d’avoir du zèle pour ce qui est bien et en tout temps, et non pas seulement quand je suis présent parmi vous. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 4:15
      - type: text
        text: '. Phm v. 10. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 1:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mes enfants, pour qui j’éprouve de nouveau les douleurs de l’enfantement, jusqu’à ce que Christ soit formé en vous, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'mais il est sous des tuteurs et des administrateurs jusqu’au temps marqué par le père. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: je voudrais être maintenant auprès de vous, et changer de langage, car je suis dans l’inquiétude à votre sujet.
  - type: usfm
    marker: r
    children:
    - type: text
      text: '4 v. 21 à 5 v. 1: cf. Ge 21:1-12. Hé 12:18-24.'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dites-moi, vous qui voulez être sous la loi, n’entendez-vous point la loi? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Car il est écrit qu’Abraham eut deux fils, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 16:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'un de la femme esclave, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 21:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 11:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et un de la femme libre. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 8:39
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais celui de l’esclave naquit selon la chair, et celui de la femme libre naquit en vertu de la promesse. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ces choses sont allégoriques; car ces femmes sont deux alliances. L’une du mont Sinaï, enfantant pour la servitude, c’est Agar, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'car Agar, c’est le mont Sinaï en Arabie, et elle correspond à la Jérusalem actuelle, qui est dans la servitude avec ses enfants. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 21:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais la Jérusalem d’en haut est libre, c’est notre mère; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'car il est écrit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 54:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Réjouis-toi, stérile, toi qui n’enfantes point!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éclate et pousse des cris, toi qui n’as pas éprouvé les douleurs de l’enfantement!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car les enfants de la délaissée seront plus nombreux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les enfants de celle qui était mariée.
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Pour vous, frères, comme Isaac, vous êtes enfants de la promesse; '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'et de même qu’alors celui qui était né selon la chair '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 21:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'persécutait celui qui était né selon l’Esprit, ainsi en est-il encore maintenant. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nous aussi, de la même manière, lorsque nous étions enfants, nous étions sous l’esclavage des rudiments du monde; '
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Mais que dit l’Écriture? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 21:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Chasse l’esclave et son fils, car le fils de l’esclave n’héritera pas avec le fils de la femme libre. '
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: C’est pourquoi, frères, nous ne sommes pas enfants de l’esclave, mais de la femme libre.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 49:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Da 9:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mais, lorsque les temps ont été accomplis, Dieu a envoyé son Fils, né d’une femme, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'né sous la loi, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'afin qu’il rachetât ceux qui étaient sous la loi, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 3:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'afin que nous reçussions l’adoption. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 8:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et parce que vous êtes fils, Dieu a envoyé dans nos cœurs l’Esprit de son Fils, lequel crie: Abba! Père! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ainsi tu n’es plus esclave, mais fils; et si tu es fils, tu es aussi héritier par la grâce de Dieu.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-20: cf. Ga 3:1-4; 5:1-12. 2 Co 11:2-3.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Autrefois, ne connaissant pas Dieu, vous serviez des dieux '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 8:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui ne le sont pas de leur nature; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'mais à présent que vous avez connu Dieu, ou plutôt que vous avez été connus de Dieu, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 2:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comment retournez-vous à ces faibles et pauvres rudiments, auxquels de nouveau vous voulez vous asservir encore? '
