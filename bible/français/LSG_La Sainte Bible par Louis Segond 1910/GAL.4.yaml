document_id: GAL.4
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. Ga 3:23-26. Ro 8:14-17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Or, aussi longtemps que l’héritier est enfant, je dis qu’il ne diffère en rien d’un esclave, quoiqu’il soit le maître de tout; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mais il est sous des tuteurs et des administrateurs jusqu’au temps marqué par le père. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nous aussi, de la même manière, lorsque nous étions enfants, nous étions sous l’esclavage des rudiments du monde; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 49:10
      metadata:
        usfm: GEN.49.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 9:24
      metadata:
        usfm: DAN.9.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais, lorsque les temps ont été accomplis, Dieu a envoyé son Fils, né d’une femme, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:17
      metadata:
        usfm: MAT.5.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'né sous la loi, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'afin qu’il rachetât ceux qui étaient sous la loi, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:12
      metadata:
        usfm: JHN.1.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:26
      metadata:
        usfm: GAL.3.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'afin que nous reçussions l’adoption. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:15
      metadata:
        usfm: ROM.8.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et parce que vous êtes fils, Dieu a envoyé dans nos cœurs l’Esprit de son Fils, lequel crie: Abba! Père! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ainsi tu n’es plus esclave, mais fils; et si tu es fils, tu es aussi héritier par la grâce de Dieu.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-20: cf. Ga 3:1-4; 5:1-12. 2 Co 11:2-3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Autrefois, ne connaissant pas Dieu, vous serviez des dieux '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 8:4
      metadata:
        usfm: 1CO.8.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui ne le sont pas de leur nature; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'mais à présent que vous avez connu Dieu, ou plutôt que vous avez été connus de Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 2:20
      metadata:
        usfm: COL.2.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comment retournez-vous à ces faibles et pauvres rudiments, auxquels de nouveau vous voulez vous asservir encore? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 14:5
      metadata:
        usfm: ROM.14.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 2:16
      metadata:
        usfm: COL.2.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous observez les jours, les mois, les temps et les années! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je crains d’avoir inutilement travaillé pour vous. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Soyez comme moi, car moi aussi je suis comme vous. Frères, je vous en supplie. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Vous ne m’avez fait aucun tort. Vous savez que ce fut à cause d’une infirmité de la chair que je vous ai pour la première fois annoncé l’Évangile. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et mis à l’épreuve par ma chair, vous n’avez témoigné ni mépris ni dégoût; vous m’avez, au contraire, reçu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal 2:7
      metadata:
        usfm: MAL.2.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme un ange de Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:40
      metadata:
        usfm: MAT.10.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:20
      metadata:
        usfm: JHN.13.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Où donc est l’expression de votre bonheur? Car je vous atteste que, si cela eût été possible, vous vous seriez arraché les yeux pour me les donner. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Suis-je devenu votre ennemi en vous disant la vérité? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 10:2
      metadata:
        usfm: ROM.10.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:12
      metadata:
        usfm: 2CO.11.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le zèle qu’ils ont pour vous n’est pas pur, mais ils veulent vous détacher de nous, afin que vous soyez zélés pour eux. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il est beau d’avoir du zèle pour ce qui est bien et en tout temps, et non pas seulement quand je suis présent parmi vous. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 4:15
      metadata:
        usfm: 1CO.4.15
    - type: text
      text: '. Phm v. 10. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:18
      metadata:
        usfm: JAS.1.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mes enfants, pour qui j’éprouve de nouveau les douleurs de l’enfantement, jusqu’à ce que Christ soit formé en vous, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: je voudrais être maintenant auprès de vous, et changer de langage, car je suis dans l’inquiétude à votre sujet.
- type: usfm
  marker: r
  children:
  - type: text
    text: '4 v. 21 à 5 v. 1: cf. Ge 21:1-12. Hé 12:18-24.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dites-moi, vous qui voulez être sous la loi, n’entendez-vous point la loi? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Car il est écrit qu’Abraham eut deux fils, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 16:2
      metadata:
        usfm: GEN.16.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un de la femme esclave, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 21:2
      metadata:
        usfm: GEN.21.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:8
      metadata:
        usfm: ACT.7.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:11
      metadata:
        usfm: HEB.11.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et un de la femme libre. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 8:39
      metadata:
        usfm: JHN.8.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:7
      metadata:
        usfm: ROM.9.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais celui de l’esclave naquit selon la chair, et celui de la femme libre naquit en vertu de la promesse. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ces choses sont allégoriques; car ces femmes sont deux alliances. L’une du mont Sinaï, enfantant pour la servitude, c’est Agar, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'car Agar, c’est le mont Sinaï en Arabie, et elle correspond à la Jérusalem actuelle, qui est dans la servitude avec ses enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 21:2
      metadata:
        usfm: REV.21.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais la Jérusalem d’en haut est libre, c’est notre mère; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'car il est écrit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 54:1
      metadata:
        usfm: ISA.54.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Réjouis-toi, stérile, toi qui n’enfantes point!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éclate et pousse des cris, toi qui n’as pas éprouvé les douleurs de l’enfantement!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car les enfants de la délaissée seront plus nombreux
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que les enfants de celle qui était mariée.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:7
      metadata:
        usfm: ROM.9.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: ROM.9.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pour vous, frères, comme Isaac, vous êtes enfants de la promesse; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'et de même qu’alors celui qui était né selon la chair '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 21:9
      metadata:
        usfm: GEN.21.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'persécutait celui qui était né selon l’Esprit, ainsi en est-il encore maintenant. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mais que dit l’Écriture? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 21:10
      metadata:
        usfm: GEN.21.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Chasse l’esclave et son fils, car le fils de l’esclave n’héritera pas avec le fils de la femme libre. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: C’est pourquoi, frères, nous ne sommes pas enfants de l’esclave, mais de la femme libre.
