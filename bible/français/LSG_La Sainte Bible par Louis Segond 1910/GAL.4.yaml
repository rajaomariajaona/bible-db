document_id: GAL.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-7: cf. Ga 3:23-26. Ro 8:14-17.'
  - type: text
    content: 'Or, aussi longtemps que l’héritier est enfant, je dis qu’il ne diffère en rien d’un esclave, quoiqu’il soit le maître de tout; '
  '10':
  - type: note
    content: Ro 14:5. Col 2:16.
  - type: text
    content: 'Vous observez les jours, les mois, les temps et les années! '
  '11':
  - type: text
    content: 'Je crains d’avoir inutilement travaillé pour vous. '
  '12':
  - type: text
    content: 'Soyez comme moi, car moi aussi je suis comme vous. Frères, je vous en supplie. '
  '13':
  - type: text
    content: 'Vous ne m’avez fait aucun tort. Vous savez que ce fut à cause d’une infirmité de la chair que je vous ai pour la première fois annoncé l’Évangile. '
  '14':
  - type: text
    content: 'Et mis à l’épreuve par ma chair, vous n’avez témoigné ni mépris ni dégoût; vous m’avez, au contraire, reçu '
  - type: note
    content: Mal 2:7.
  - type: text
    content: 'comme un ange de Dieu, '
  - type: note
    content: Mt 10:40. Jn 13:20.
  - type: text
    content: 'comme Jésus-Christ. '
  '15':
  - type: text
    content: 'Où donc est l’expression de votre bonheur? Car je vous atteste que, si cela eût été possible, vous vous seriez arraché les yeux pour me les donner. '
  '16':
  - type: text
    content: 'Suis-je devenu votre ennemi en vous disant la vérité? '
  '17':
  - type: note
    content: Ro 10:2. 2 Co 11:12.
  - type: text
    content: 'Le zèle qu’ils ont pour vous n’est pas pur, mais ils veulent vous détacher de nous, afin que vous soyez zélés pour eux. '
  '18':
  - type: text
    content: 'Il est beau d’avoir du zèle pour ce qui est bien et en tout temps, et non pas seulement quand je suis présent parmi vous. '
  '19':
  - type: note
    content: 1 Co 4:15. Phm v. 10. Ja 1:18.
  - type: text
    content: 'Mes enfants, pour qui j’éprouve de nouveau les douleurs de l’enfantement, jusqu’à ce que Christ soit formé en vous, '
  '2':
  - type: text
    content: 'mais il est sous des tuteurs et des administrateurs jusqu’au temps marqué par le père. '
  '20':
  - type: text
    content: je voudrais être maintenant auprès de vous, et changer de langage, car je suis dans l’inquiétude à votre sujet.
  - type: heading
    content: '4 v. 21 à 5 v. 1: cf. Ge 21:1-12. Hé 12:18-24.'
  '21':
  - type: text
    content: 'Dites-moi, vous qui voulez être sous la loi, n’entendez-vous point la loi? '
  '22':
  - type: text
    content: 'Car il est écrit qu’Abraham eut deux fils, '
  - type: note
    content: Ge 16:2.
  - type: text
    content: 'un de la femme esclave, '
  - type: note
    content: Ge 21:2. Ac 7:8. Hé 11:11.
  - type: text
    content: 'et un de la femme libre. '
  '23':
  - type: note
    content: Jn 8:39. Ro 9:7.
  - type: text
    content: 'Mais celui de l’esclave naquit selon la chair, et celui de la femme libre naquit en vertu de la promesse. '
  '24':
  - type: text
    content: 'Ces choses sont allégoriques; car ces femmes sont deux alliances. L’une du mont Sinaï, enfantant pour la servitude, c’est Agar, '
  '25':
  - type: text
    content: 'car Agar, c’est le mont Sinaï en Arabie, et elle correspond à la Jérusalem actuelle, qui est dans la servitude avec ses enfants. '
  '26':
  - type: note
    content: Ap 21:2.
  - type: text
    content: 'Mais la Jérusalem d’en haut est libre, c’est notre mère; '
  '27':
  - type: text
    content: 'car il est écrit:'
  - type: note
    content: És 54:1.
  - type: text
    content: Réjouis-toi, stérile, toi qui n’enfantes point!
  - type: text
    content: Éclate et pousse des cris, toi qui n’as pas éprouvé les douleurs de l’enfantement!
  - type: text
    content: Car les enfants de la délaissée seront plus nombreux
  - type: text
    content: Que les enfants de celle qui était mariée.
  '28':
  - type: text
    content: ' '
  - type: note
    content: Ro 9:7, 8.
  - type: text
    content: 'Pour vous, frères, comme Isaac, vous êtes enfants de la promesse; '
  '29':
  - type: text
    content: 'et de même qu’alors celui qui était né selon la chair '
  - type: note
    content: Ge 21:9.
  - type: text
    content: 'persécutait celui qui était né selon l’Esprit, ainsi en est-il encore maintenant. '
  '3':
  - type: text
    content: 'Nous aussi, de la même manière, lorsque nous étions enfants, nous étions sous l’esclavage des rudiments du monde; '
  '30':
  - type: text
    content: 'Mais que dit l’Écriture? '
  - type: note
    content: Ge 21:10.
  - type: text
    content: 'Chasse l’esclave et son fils, car le fils de l’esclave n’héritera pas avec le fils de la femme libre. '
  '31':
  - type: text
    content: C’est pourquoi, frères, nous ne sommes pas enfants de l’esclave, mais de la femme libre.
  '4':
  - type: note
    content: Ge 49:10. Da 9:24.
  - type: text
    content: 'mais, lorsque les temps ont été accomplis, Dieu a envoyé son Fils, né d’une femme, '
  - type: note
    content: Mt 5:17.
  - type: text
    content: 'né sous la loi, '
  '5':
  - type: text
    content: 'afin qu’il rachetât ceux qui étaient sous la loi, '
  - type: note
    content: Jn 1:12. Ga 3:26.
  - type: text
    content: 'afin que nous reçussions l’adoption. '
  '6':
  - type: note
    content: Ro 8:15.
  - type: text
    content: 'Et parce que vous êtes fils, Dieu a envoyé dans nos cœurs l’Esprit de son Fils, lequel crie: Abba! Père! '
  '7':
  - type: text
    content: Ainsi tu n’es plus esclave, mais fils; et si tu es fils, tu es aussi héritier par la grâce de Dieu.
  - type: heading
    content: 'V. 8-20: cf. Ga 3:1-4; 5:1-12. 2 Co 11:2-3.'
  '8':
  - type: text
    content: 'Autrefois, ne connaissant pas Dieu, vous serviez des dieux '
  - type: note
    content: 1 Co 8:4.
  - type: text
    content: 'qui ne le sont pas de leur nature; '
  '9':
  - type: text
    content: 'mais à présent que vous avez connu Dieu, ou plutôt que vous avez été connus de Dieu, '
  - type: note
    content: Col 2:20.
  - type: text
    content: 'comment retournez-vous à ces faibles et pauvres rudiments, auxquels de nouveau vous voulez vous asservir encore? '
