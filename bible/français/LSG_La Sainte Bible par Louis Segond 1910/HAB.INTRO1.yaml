document_id: HAB.INTRO1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION AU LIVRE D’HABACUC
  - type: usfm
    marker: imt3
    children:
    - type: text
      text: (Mi 4:10; 7:7-10. Lu 18:7.)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ce livre est intitulé «Habacuc», du nom du prophète qui livra son message en temps de crise. Ce livre dépeint les conquérants (1:6-11) comme des animaux prédateurs (1:8), le filet (1:14-16) ou un gosier insatiable (2:5s). Les chefs d’accusation contre ces ennemis chaldéens sont clairs: extorsion des biens d’autrui (2:6-8), profit malhonnête (2:9-11), violence politique (2:12-17) et idolâtrie (2:19s).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le prophète souffrit à cause de la déchéance de son peuple, dénonça le mal, invoqua Dieu et se réjouit de l’exaucement divin. La réponse de Dieu est pour tous les temps: être fidèle à Dieu afin de vivre (2:4), et savoir attendre avec confiance l’intervention de Dieu (3).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Au premier appel d’Habacuc, Dieu lui répondit en confirmant qu’il y aurait l’invasion des Chaldéens (1:1-11). Au deuxième appel, la réponse de Dieu concernait le juste et l’oppression (1:12–2:6).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Cinq mises en garde solennelles suivirent ces appels du prophète. Ces avertissements présageaient le malheur imminent et concernaient:'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 1. Quiconque augmente le fardeau de ses dettes.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 2. Quiconque amasse pour sa maison des gains iniques.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 3. Quiconque bâtit une ville avec du sang et fonde une ville avec l’iniquité.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 4. Quiconque enivre son prochain afin de voir sa nudité.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 5. Quiconque dit au bois «Lève-toi», et à une pierre muette «Réveille-toi» (2:6-20).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Habacuc, comblé de joie par les réponses divines, psalmodia au Dieu qui intervient. Il chanta sur le mode des complaintes avec des instruments à corde (3:1-19).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le livre d’Habacuc met à notre disposition des paroles certaines et réconfortantes dans les temps difficiles. La fidélité de l’être humain doit être persévérante même dans des situations de crises multiformes. Habacuc y pose des questions essentielles en temps de crise: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Jusqu’à quand, ô Éternel? J’ai crié, et tu n’écoutes pas!»
    - type: text
      text: ' Jusqu’à quand (1:2, 6) et pourquoi (1:3, 13) sont les deux questions de la complainte biblique.'
