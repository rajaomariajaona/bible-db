document_id: 1PE.4
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. 1 Pi 3:18. Ro 6:6-13. Ép 4:17-24.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ainsi donc, Christ ayant souffert dans la chair, vous aussi '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 12:1
      metadata:
        usfm: HEB.12.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'armez-vous de la même pensée. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 6:7
      metadata:
        usfm: ROM.6.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car celui qui a souffert dans la chair en a fini avec le péché, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 14:7
      metadata:
        usfm: ROM.14.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:15
      metadata:
        usfm: 2CO.5.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 2:20
      metadata:
        usfm: GAL.2.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:24
      metadata:
        usfm: EPH.4.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:10
      metadata:
        usfm: 1TH.5.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:14
      metadata:
        usfm: HEB.9.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'afin de vivre, non plus selon les convoitises des hommes, mais selon la volonté de Dieu, pendant le temps qui lui reste à vivre dans la chair. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:17
      metadata:
        usfm: EPH.4.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est assez, en effet, d’avoir dans le temps passé accompli la volonté des païens, en marchant dans la dissolution, les convoitises, l’ivrognerie, les excès du manger et du boire, et les idolâtries criminelles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aussi trouvent-ils étrange que vous ne vous précipitiez pas avec eux dans le même débordement de débauche, et ils vous calomnient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils rendront compte à celui qui est prêt à juger les vivants et les morts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 5:25
      metadata:
        usfm: JHN.5.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:19
      metadata:
        usfm: 1PE.3.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car l’Évangile a été aussi annoncé aux morts, afin que, après avoir été jugés comme les hommes quant à la chair, ils vivent selon Dieu quant à l’Esprit.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-11: cf. Lu 21:34-36. Ga 6:10. (Ro 12:5-11. 1 Co 10:31.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 2:18
      metadata:
        usfm: 1JN.2.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'La fin de toutes choses est proche. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 21:34
      metadata:
        usfm: LUK.21.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Soyez donc sages et sobres, pour vaquer à la prière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Avant tout, ayez les uns pour les autres une ardente charité, car
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:12
      metadata:
        usfm: PRO.10.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'La charité couvre une multitude de péchés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:13
      metadata:
        usfm: ROM.12.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:2
      metadata:
        usfm: HEB.13.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Exercez l’hospitalité les uns envers les autres, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:14
      metadata:
        usfm: PHP.2.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sans murmures. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 3:28
      metadata:
        usfm: PRO.3.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:6
      metadata:
        usfm: ROM.12.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 8:11
      metadata:
        usfm: 2CO.8.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme de bons dispensateurs des diverses grâces de Dieu, que chacun de vous mette au service des autres le don qu’il a reçu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 23:22
      metadata:
        usfm: JER.23.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Si quelqu’un parle, que ce soit comme annonçant les oracles de Dieu; si quelqu’un remplit un ministère, qu’il le remplisse selon la force que Dieu communique, afin qu’en toutes choses Dieu soit glorifié par Jésus-Christ, à qui appartiennent la gloire et la puissance, aux siècles des siècles. Amen!
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-19: cf. Mt 5:10-12. Ac 5:41; 14:22. 2 Th 1:4-12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Bien-aimés, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 48:10
      metadata:
        usfm: ISA.48.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 3:13
      metadata:
        usfm: 1CO.3.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:7
      metadata:
        usfm: 1PE.1.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ne soyez pas surpris, comme d’une chose étrange qui vous arrive, de la fournaise qui est au milieu de vous pour vous éprouver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Réjouissez-vous, au contraire, de la part que vous avez aux souffrances de Christ, afin que vous soyez aussi dans la joie et dans l’allégresse lorsque sa gloire apparaîtra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:10
      metadata:
        usfm: MAT.5.10
    - type: text
      text: '. 1 Pi 2:30; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:14
      metadata:
        usfm: 1PE.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si vous êtes outragés pour le nom de Christ, vous êtes heureux, parce que l’Esprit de gloire, l’Esprit de Dieu, repose sur vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Que nul de vous, en effet, ne souffre comme meurtrier, ou voleur, ou malfaiteur, ou comme s’ingérant dans les affaires d’autrui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais si quelqu’un souffre comme chrétien, qu’il n’en ait point honte, et que plutôt il glorifie Dieu à cause de ce nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 25:29
      metadata:
        usfm: JER.25.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:31
      metadata:
        usfm: LUK.23.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car c’est le moment où le jugement va commencer par la maison de Dieu. Or, si c’est par nous qu’il commence, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 10:12
      metadata:
        usfm: LUK.10.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'quelle sera la fin de ceux qui n’obéissent pas à l’Évangile de Dieu? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 11:31
      metadata:
        usfm: PRO.11.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et si le juste se sauve avec peine, que deviendront l’impie et le pécheur? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ainsi, que ceux qui souffrent selon la volonté de Dieu remettent leurs âmes au fidèle Créateur, en faisant ce qui est bien.
