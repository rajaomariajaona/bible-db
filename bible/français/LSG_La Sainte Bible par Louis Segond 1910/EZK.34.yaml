document_id: EZK.34
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre les chefs d’Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. Jé 23:1-3. Za 11:15-17. Ac 20:28.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole de l’Éternel me fut adressée, en ces mots: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fils de l’homme, prophétise contre les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 23:1
      metadata:
        usfm: JER.23.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pasteurs d’Israël! Prophétise, et dis-leur, aux pasteurs: Ainsi parle le Seigneur, l’Éternel: Malheur aux pasteurs d’Israël, qui se paissaient eux-mêmes! Les pasteurs ne devaient-ils pas paître le troupeau? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous avez mangé la graisse, vous vous êtes vêtus avec la laine, vous avez tué ce qui était gras, vous n’avez point fait paître les brebis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Vous n’avez pas fortifié celles qui étaient faibles, guéri celle qui était malade, pansé celle qui était blessée; vous n’avez pas ramené celle qui s’égarait, cherché celle qui était perdue; mais vous les avez dominées avec '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:3
      metadata:
        usfm: 1PE.5.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'violence et avec dureté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Elles se sont dispersées, parce qu’elles n’avaient point de pasteur; elles sont devenues la proie de toutes les bêtes des champs, elles se sont dispersées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mon troupeau est errant sur toutes les montagnes et sur toutes les collines élevées, mon troupeau est dispersé sur toute la face du pays; nul n’en prend souci, nul ne le cherche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'C’est pourquoi, pasteurs, écoutez la parole de l’Éternel! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je suis vivant! Dit le Seigneur, l’Éternel, parce que mes brebis sont au pillage et qu’elles sont devenues la proie de toutes les bêtes des champs, faute de pasteur, parce que mes pasteurs ne prenaient aucun souci de mes brebis, qu’ils se paissaient eux-mêmes, et ne faisaient point paître mes brebis, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'à cause de cela, pasteurs, écoutez la parole de l’Éternel! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel: Voici, j’en veux aux pasteurs! Je reprendrai mes brebis d’entre leurs mains, je ne les laisserai plus paître mes brebis, et ils ne se paîtront plus eux-mêmes; je délivrerai mes brebis de leur bouche, et elles ne seront plus pour eux une proie.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Promesses au peuple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-19: cf. Jé 23:3, 4, 7, 8; 30:16-20. Mi 7:12-15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Car ainsi parle le Seigneur, l’Éternel: Voici, j’aurai soin moi-même de mes brebis, et j’en ferai la revue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Comme un pasteur inspecte son troupeau quand il est au milieu de ses brebis éparses, ainsi je ferai la revue de mes brebis, et je les recueillerai de tous les lieux où elles ont été dispersées au jour des nuages et de l’obscurité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je les retirerai d’entre les peuples, je les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 28:25
      metadata:
        usfm: EZK.28.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'rassemblerai des diverses contrées, et je les ramènerai dans leur pays; je les ferai paître sur les montagnes d’Israël, le long des ruisseaux, et dans tous les lieux habités du pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je les ferai paître dans un bon pâturage, et leur demeure sera sur les montagnes élevées d’Israël; là elles reposeront dans un agréable asile, et elles auront de gras pâturages sur les montagnes d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'C’est moi qui ferai paître mes brebis, c’est moi qui les ferai reposer, dit le Seigneur, l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je chercherai celle qui était perdue, je ramènerai celle qui était égarée, je panserai celle qui est blessée, et je fortifierai celle qui est malade. Mais je détruirai celles qui sont grasses et vigoureuses. Je veux les paître avec justice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et vous, mes brebis, ainsi parle le Seigneur, l’Éternel: Voici, je jugerai entre brebis et brebis, entre béliers et boucs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Est-ce trop peu pour vous de paître dans le bon pâturage, pour que vous fouliez de vos pieds le reste de votre pâturage? De boire une eau limpide, pour que vous troubliez le reste avec vos pieds? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Et mes brebis doivent paître ce que vos pieds ont foulé, et boire ce que vos pieds ont troublé!
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-31: cf. Jé 23:4-6. Éz 37:22-28.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'C’est pourquoi ainsi leur parle le Seigneur, l’Éternel: Voici, je jugerai entre la brebis grasse et la brebis maigre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Parce que vous avez heurté avec le côté et avec l’épaule, et frappé de vos cornes toutes les brebis faibles, jusqu’à ce que vous les ayez chassées, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'je porterai secours à mes brebis, afin qu’elles ne soient plus au pillage, et je jugerai entre brebis et brebis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'J’établirai sur elles un seul '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 40:11
      metadata:
        usfm: ISA.40.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 10:11
      metadata:
        usfm: JHN.10.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pasteur, qui les fera paître, mon '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 42:1
      metadata:
        usfm: ISA.42.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 50:10
      metadata:
        usfm: ISA.50.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 52:13
      metadata:
        usfm: ISA.52.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 53:11
      metadata:
        usfm: ISA.53.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'serviteur '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 30:9
      metadata:
        usfm: JER.30.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'David; il les fera paître, il sera leur pasteur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Moi, l’Éternel, je serai leur Dieu, et mon serviteur David sera '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 55:4
      metadata:
        usfm: ISA.55.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'prince au milieu d’elles. Moi, l’Éternel, j’ai parlé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Je traiterai avec elles une alliance de paix, et je ferai disparaître du pays les animaux sauvages; elles habiteront en sécurité dans le désert, et dormiront au milieu des forêts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Je ferai d’elles et des environs de ma colline un sujet de bénédiction; j’enverrai la pluie en son temps, et ce sera une pluie de bénédiction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'L’arbre des champs donnera son fruit, et la terre donnera ses produits. Elles seront en sécurité dans leur pays; et elles sauront que je suis l’Éternel, quand je briserai les liens de leur joug, et que je les délivrerai de la main de ceux qui les asservissaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Elles ne seront plus au pillage parmi les nations, les bêtes de la terre ne les dévoreront plus, elles habiteront en sécurité, et il n’y aura personne pour les troubler. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'J’établirai pour elles une plantation qui aura du renom; elles ne seront plus consumées par la faim dans le pays, et elles ne porteront plus '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Éz 36:6, etc.
    marker-yv: yv-n
  - type: text
    text: 'l’opprobre des nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Et elles sauront que moi, l’Éternel, leur Dieu, je suis avec elles, et qu’elles sont mon peuple, elles, la maison d’Israël, dit le Seigneur, l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Vous, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jn 10:11, etc.
    marker-yv: yv-n
  - type: text
    text: mes brebis, brebis de mon pâturage, vous êtes des hommes; moi, je suis votre Dieu, dit le Seigneur, l’Éternel.
