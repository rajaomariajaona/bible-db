document_id: GEN.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Abram. Son arrivée au pays de Canaan
  - type: heading
    content: 'V. 1-9: cf. Ge 11:31, 32. Ac 7:2-5. Hé 11:8, 9.'
  - type: text
    content: 'L’Éternel dit à Abram: '
  - type: note
    content: Ac 7:3. Hé 11:8.
  - type: text
    content: 'Vat’en de ton pays, de ta patrie, et de la maison de ton père, dans le pays que je te montrerai. '
  '10':
  - type: text
    content: 'Il y eut une famine dans le pays; et Abram descendit en Égypte pour y séjourner, car la famine était grande dans le pays. '
  '11':
  - type: text
    content: 'Comme il était près d’entrer en Égypte, il dit à Saraï, sa femme: Voici, je sais que tu es une femme belle de figure. '
  '12':
  - type: text
    content: 'Quand les Égyptiens te verront, ils diront: C’est sa femme! Et ils me tueront, et te laisseront la vie. '
  '13':
  - type: note
    content: Ge 20:12; 26:7.
  - type: text
    content: 'Dis, je te prie, que tu es ma sœur, afin que je sois bien traité à cause de toi, et que mon âme vive grâce à toi. '
  '14':
  - type: text
    content: 'Lorsque Abram fut arrivé en Égypte, les Égyptiens virent que la femme était fort belle. '
  '15':
  - type: text
    content: 'Les grands de Pharaon la virent aussi et la vantèrent à Pharaon; et la femme fut emmenée dans la maison de Pharaon. '
  '16':
  - type: text
    content: 'Il traita bien Abram à cause d’elle; et Abram reçut des brebis, des bœufs, des ânes, des serviteurs et des servantes, des ânesses, et des chameaux. '
  '17':
  - type: text
    content: 'Mais '
  - type: note
    content: Ps 105:14.
  - type: text
    content: 'l’Éternel frappa de grandes plaies Pharaon et sa maison, au sujet de Saraï, femme d’Abram. '
  '18':
  - type: text
    content: 'Alors Pharaon appela Abram, et dit: Qu’est-ce que tu m’as fait? Pourquoi ne m’as-tu pas déclaré que c’est ta femme? '
  '19':
  - type: text
    content: 'Pourquoi as-tu dit: C’est ma sœur? Aussi l’ai-je prise pour ma femme. Maintenant, voici ta femme, prends-la, et va-t’en! '
  '2':
  - type: text
    content: 'Je ferai de toi une grande nation, et je te bénirai; je rendrai ton nom grand, et tu seras une source de bénédiction. '
  '20':
  - type: text
    content: Et Pharaon donna ordre à ses gens de le renvoyer, lui et sa femme, avec tout ce qui lui appartenait.
  '3':
  - type: text
    content: 'Je bénirai ceux qui te béniront, et je maudirai ceux qui te maudiront; '
  - type: note
    content: Ge 18:18; 22:18; 26:4. Ac 3:25. Ga 3:8.
  - type: text
    content: 'et toutes les familles de la terre seront bénies en toi. '
  '4':
  - type: text
    content: 'Abram partit, comme l’Éternel le lui avait dit, et Lot partit avec lui. Abram était âgé de soixante-quinze ans, lorsqu’il sortit de Charan. '
  '5':
  - type: note
    content: Ac 7:4.
  - type: text
    content: 'Abram prit Saraï, sa femme, et Lot, fils de son frère, avec tous les biens qu’ils possédaient et les serviteurs qu’ils avaient acquis à Charan. Ils partirent pour aller dans le pays de Canaan, et ils arrivèrent au pays de Canaan. '
  '6':
  - type: text
    content: 'Abram parcourut le pays jusqu’au lieu nommé Sichem, jusqu’aux chênes de Moré. '
  - type: note
    content: Ge 10:18, 19; 13:7.
  - type: text
    content: 'Les Cananéens étaient alors dans le pays. '
  '7':
  - type: text
    content: 'L’Éternel apparut à Abram, et dit: '
  - type: note
    content: Ge 13:15; 15:18; 17:8; 24:7; 26:4. De 34:4.
  - type: text
    content: 'Je donnerai ce pays à ta postérité. Et Abram bâtit là un autel à l’Éternel, qui lui était apparu. '
  '8':
  - type: text
    content: 'Il se transporta de là vers la montagne, à l’orient de Béthel, et il dressa ses tentes, ayant Béthel à l’occident et Aï à l’orient. Il bâtit encore là un autel à l’Éternel, et il invoqua le nom de l’Éternel. '
  '9':
  - type: text
    content: Abram continua ses marches, en s’avançant vers le midi.
  - type: heading
    content: Séjour en Égypte
  - type: heading
    content: 'V. 10-20: cf. Ge 20; 26:1-11. Ps 105:13-15.'
