document_id: GEN.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abram. Son arrivée au pays de Canaan
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. Ge 11:31, 32. Ac 7:2-5. Hé 11:8, 9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel dit à Abram: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:3
      metadata:
        usfm: ACT.7.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:8
      metadata:
        usfm: HEB.11.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vat’en de ton pays, de ta patrie, et de la maison de ton père, dans le pays que je te montrerai. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je ferai de toi une grande nation, et je te bénirai; je rendrai ton nom grand, et tu seras une source de bénédiction. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je bénirai ceux qui te béniront, et je maudirai ceux qui te maudiront; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 18:18
      metadata:
        usfm: GEN.18.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:18
      metadata:
        usfm: GEN.22.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:4
      metadata:
        usfm: GEN.26.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 3:25
      metadata:
        usfm: ACT.3.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:8
      metadata:
        usfm: GAL.3.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et toutes les familles de la terre seront bénies en toi. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Abram partit, comme l’Éternel le lui avait dit, et Lot partit avec lui. Abram était âgé de soixante-quinze ans, lorsqu’il sortit de Charan. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:4
      metadata:
        usfm: ACT.7.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Abram prit Saraï, sa femme, et Lot, fils de son frère, avec tous les biens qu’ils possédaient et les serviteurs qu’ils avaient acquis à Charan. Ils partirent pour aller dans le pays de Canaan, et ils arrivèrent au pays de Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Abram parcourut le pays jusqu’au lieu nommé Sichem, jusqu’aux chênes de Moré. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 10:18
      metadata:
        usfm: GEN.10.18
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: GEN.10.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:7
      metadata:
        usfm: GEN.13.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les Cananéens étaient alors dans le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’Éternel apparut à Abram, et dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 13:15
      metadata:
        usfm: GEN.13.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:18
      metadata:
        usfm: GEN.15.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:8
      metadata:
        usfm: GEN.17.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:7
      metadata:
        usfm: GEN.24.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:4
      metadata:
        usfm: GEN.26.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 34:4
      metadata:
        usfm: DEU.34.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je donnerai ce pays à ta postérité. Et Abram bâtit là un autel à l’Éternel, qui lui était apparu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il se transporta de là vers la montagne, à l’orient de Béthel, et il dressa ses tentes, ayant Béthel à l’occident et Aï à l’orient. Il bâtit encore là un autel à l’Éternel, et il invoqua le nom de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Abram continua ses marches, en s’avançant vers le midi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Séjour en Égypte
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-20: cf. Ge 20; 26:1-11. Ps 105:13-15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il y eut une famine dans le pays; et Abram descendit en Égypte pour y séjourner, car la famine était grande dans le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Comme il était près d’entrer en Égypte, il dit à Saraï, sa femme: Voici, je sais que tu es une femme belle de figure. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Quand les Égyptiens te verront, ils diront: C’est sa femme! Et ils me tueront, et te laisseront la vie. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 20:12
      metadata:
        usfm: GEN.20.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:7
      metadata:
        usfm: GEN.26.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dis, je te prie, que tu es ma sœur, afin que je sois bien traité à cause de toi, et que mon âme vive grâce à toi. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsque Abram fut arrivé en Égypte, les Égyptiens virent que la femme était fort belle. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les grands de Pharaon la virent aussi et la vantèrent à Pharaon; et la femme fut emmenée dans la maison de Pharaon. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il traita bien Abram à cause d’elle; et Abram reçut des brebis, des bœufs, des ânes, des serviteurs et des servantes, des ânesses, et des chameaux. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:14
      metadata:
        usfm: PSA.105.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’Éternel frappa de grandes plaies Pharaon et sa maison, au sujet de Saraï, femme d’Abram. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors Pharaon appela Abram, et dit: Qu’est-ce que tu m’as fait? Pourquoi ne m’as-tu pas déclaré que c’est ta femme? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Pourquoi as-tu dit: C’est ma sœur? Aussi l’ai-je prise pour ma femme. Maintenant, voici ta femme, prends-la, et va-t’en! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Et Pharaon donna ordre à ses gens de le renvoyer, lui et sa femme, avec tout ce qui lui appartenait.
