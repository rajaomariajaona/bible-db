document_id: JER.50,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Chute de Babylone et délivrance d’Israël
  - type: heading
    content: '50 v. 1 à 51 v. 58: cf. (És 13; 14; 21:1-10; 47. Da 5.) Ap 18.'
  - type: text
    content: 'La parole que l’Éternel prononça sur Babylone, sur le pays des Chaldéens, par Jérémie, le prophète:'
  '10':
  - type: text
    content: Et la Chaldée sera livrée au pillage;
  - type: text
    content: Tous ceux qui la pilleront seront rassasiés, dit l’Éternel.
  '11':
  - type: text
    content: Oui, soyez dans la joie, dans l’allégresse,
  - type: text
    content: Vous qui avez pillé mon héritage!
  - type: text
    content: Oui, bondissez comme une génisse dans l’herbe,
  - type: text
    content: Hennissez comme des chevaux fougueux!
  '12':
  - type: text
    content: Votre mère est couverte de confusion,
  - type: text
    content: Celle qui vous a enfantés rougit de honte;
  - type: text
    content: Voici, elle est la dernière des nations,
  - type: text
    content: C’est un désert, une terre sèche et aride.
  '13':
  - type: text
    content: A cause de la colère de l’Éternel, elle ne sera plus habitée,
  - type: text
    content: Elle ne sera plus qu’une solitude.
  - type: note
    content: Jé 49:17.
  - type: text
    content: Tous ceux qui passeront près de Babylone
  - type: text
    content: Seront dans l’étonnement et siffleront sur toutes ses plaies.
  '14':
  - type: text
    content: Rangez-vous en bataille autour de Babylone, vous tous, archers!
  - type: text
    content: Tirez contre elle, n’épargnez pas les flèches!
  - type: text
    content: Car elle a péché contre l’Éternel.
  '15':
  - type: text
    content: Poussez de tous côtés contre elle un cri de guerre!
  - type: text
    content: Elle tend les mains;
  - type: text
    content: Ses fondements s’écroulent;
  - type: text
    content: Ses murs sont renversés.
  - type: text
    content: Car c’est la vengeance de l’Éternel.
  - type: text
    content: Vengez-vous sur elle!
  - type: text
    content: Faites-lui comme elle a fait!
  '16':
  - type: text
    content: Exterminez de Babylone celui qui sème,
  - type: text
    content: Et celui qui manie la faucille au temps de la moisson!
  - type: text
    content: Devant le glaive destructeur,
  - type: text
    content: Que chacun se tourne vers son peuple,
  - type: text
    content: Que chacun fuie vers son pays.
  '17':
  - type: text
    content: Israël est une brebis égarée, que les lions ont chassée;
  - type: text
    content: Le roi d’Assyrie l’a dévorée le premier;
  - type: text
    content: Et ce dernier lui a brisé les os,
  - type: text
    content: Nebucadnetsar, roi de Babylone.
  '18':
  - type: text
    content: 'C’est pourquoi ainsi parle l’Éternel des armées, le Dieu d’Israël:'
  - type: text
    content: Voici, je châtierai le roi de Babylone et son pays,
  - type: text
    content: 'Comme j’ai châtié le '
  - type: note
    content: 2 R 19:35, 37. És 37:36, 38.
  - type: text
    content: roi d’Assyrie.
  '19':
  - type: text
    content: Je ramènerai Israël dans sa demeure;
  - type: text
    content: Il aura ses pâturages du Carmel et du Basan,
  - type: text
    content: Et son âme se rassasiera sur la montagne d’Éphraïm et dans Galaad.
  '2':
  - type: text
    content: Annoncez-le parmi les nations, publiez-le, élevez une bannière!
  - type: text
    content: Publiez-le, ne cachez rien!
  - type: text
    content: 'Dites: Babylone est prise! '
  - type: note
    content: És 46:1. Jé 51:44.
  - type: text
    content: Bel est confondu, Merodac est brisé!
  - type: text
    content: Ses idoles sont confondues, ses idoles sont brisées!
  '20':
  - type: text
    content: En ces jours, en ce temps-là, dit l’Éternel,
  - type: text
    content: On cherchera l’iniquité d’Israël, et elle n’existera plus,
  - type: text
    content: Le péché de Juda, et il ne se trouvera plus;
  - type: text
    content: Car je pardonnerai au reste que j’aurai laissé.
  '21':
  - type: text
    content: Monte contre le pays doublement rebelle,
  - type: text
    content: Contre ses habitants, et châtie-les!
  - type: text
    content: Poursuis, massacre, extermine-les! Dit l’Éternel,
  - type: text
    content: Exécute entièrement mes ordres!
  '22':
  - type: text
    content: Des cris de guerre retentissent dans le pays,
  - type: text
    content: Et le désastre est grand.
  '23':
  - type: text
    content: Eh quoi! Il est rompu, brisé, le marteau de toute la terre!
  - type: text
    content: Babylone est détruite au milieu des nations!
  '24':
  - type: text
    content: Je t’ai tendu un piège, et tu as été prise, Babylone,
  - type: text
    content: A l’improviste;
  - type: text
    content: Tu as été atteinte, saisie,
  - type: text
    content: Parce que tu as lutté contre l’Éternel.
  '25':
  - type: text
    content: L’Éternel a ouvert son arsenal,
  - type: text
    content: Et il en a tiré les armes de sa colère;
  - type: text
    content: Car c’est là une œuvre du Seigneur, de l’Éternel des armées,
  - type: text
    content: Dans le pays des Chaldéens.
  '26':
  - type: text
    content: Pénétrez de toutes parts dans Babylone, ouvrez ses greniers,
  - type: text
    content: Faites-y des monceaux comme des tas de gerbes,
  - type: text
    content: Et détruisez-la!
  - type: text
    content: Qu’il ne reste plus rien d’elle!
  '27':
  - type: text
    content: Tuez tous ses taureaux, qu’on les égorge!
  - type: text
    content: Malheur à eux! Car leur jour est arrivé,
  - type: text
    content: Le temps de leur châtiment.
  '28':
  - type: text
    content: Écoutez les cris des fuyards, de ceux qui se sauvent du pays de Babylone
  - type: text
    content: Pour annoncer dans Sion la vengeance de l’Éternel, notre Dieu,
  - type: text
    content: La vengeance de son temple!
  '29':
  - type: text
    content: Appelez contre Babylone les archers, vous tous qui maniez l’arc!
  - type: text
    content: Campez autour d’elle, que personne n’échappe,
  - type: text
    content: Rendez-lui selon ses œuvres,
  - type: text
    content: Faites-lui entièrement comme elle a fait!
  - type: text
    content: Car elle s’est élevée avec fierté contre l’Éternel,
  - type: text
    content: Contre le Saint d’Israël.
  '3':
  - type: text
    content: Car une nation monte contre elle du septentrion,
  - type: text
    content: Elle réduira son pays en désert,
  - type: text
    content: Il n’y aura plus d’habitants;
  - type: text
    content: Hommes et bêtes fuient, s’en vont.
  '30':
  - type: text
    content: ' '
  - type: note
    content: Jé 49:26.
  - type: text
    content: C’est pourquoi ses jeunes gens tomberont dans les rues,
  - type: text
    content: Et tous ses hommes de guerre périront en ce jour,
  - type: text
    content: Dit l’Éternel.
  '31':
  - type: text
    content: Voici, j’en veux à toi, orgueilleuse!
  - type: text
    content: Dit le Seigneur, l’Éternel des armées;
  - type: text
    content: Car ton jour est arrivé,
  - type: text
    content: Le temps de ton châtiment.
  '32':
  - type: text
    content: L’orgueilleuse chancellera et tombera,
  - type: text
    content: Et personne ne la relèvera;
  - type: text
    content: Je mettrai le feu à ses villes,
  - type: text
    content: Et il en dévorera tous les alentours.
  '33':
  - type: text
    content: 'Ainsi parle l’Éternel des armées:'
  - type: text
    content: Les enfants d’Israël et les enfants de Juda sont ensemble opprimés;
  - type: text
    content: Tous ceux qui les ont emmenés captifs les retiennent,
  - type: text
    content: Et refusent de les relâcher.
  '34':
  - type: text
    content: Mais leur vengeur est puissant,
  - type: text
    content: Lui dont l’Éternel des armées est le nom;
  - type: text
    content: Il défendra leur cause,
  - type: text
    content: Afin de donner le repos au pays,
  - type: text
    content: Et de faire trembler les habitants de Babylone.
  '35':
  - type: text
    content: L’épée contre les Chaldéens! Dit l’Éternel,
  - type: text
    content: Contre les habitants de Babylone, ses chefs et ses sages!
  '36':
  - type: text
    content: L’épée contre les prophètes de mensonge! Qu’ils soient comme des insensés!
  - type: text
    content: L’épée contre ses vaillants hommes! Qu’ils soient consternés!
  '37':
  - type: text
    content: L’épée contre ses chevaux et ses chars!
  - type: text
    content: Contre les gens de toute espèce qui sont au milieu d’elle!
  - type: text
    content: Qu’ils deviennent semblables à des femmes!
  - type: text
    content: L’épée contre ses trésors! Qu’ils soient pillés!
  '38':
  - type: text
    content: La sécheresse contre ses eaux! Qu’elles tarissent!
  - type: text
    content: Car c’est un pays d’idoles;
  - type: text
    content: Ils sont fous de leurs idoles.
  '39':
  - type: text
    content: C’est pourquoi les animaux du désert s’y établiront avec les chacals,
  - type: text
    content: Et les autruches y feront leur demeure;
  - type: text
    content: Elle ne sera plus jamais habitée,
  - type: text
    content: Elle ne sera plus jamais peuplée.
  '4':
  - type: text
    content: En ces jours, en ce temps-là, dit l’Éternel,
  - type: text
    content: Les enfants d’Israël et les enfants de Juda reviendront ensemble;
  - type: text
    content: Ils marcheront en pleurant,
  - type: text
    content: Et ils chercheront l’Éternel, leur Dieu.
  '40':
  - type: text
    content: ' '
  - type: note
    content: Ge 19:25. Jé 49:18.
  - type: text
    content: Comme Sodome et Gomorrhe, et les villes voisines, que Dieu détruisit,
  - type: text
    content: Dit l’Éternel,
  - type: text
    content: Elle ne sera plus habitée,
  - type: text
    content: Elle ne sera le séjour d’aucun homme.
  '41':
  - type: text
    content: 'Voici, '
  - type: note
    content: Jé 6:22, etc.
  - type: text
    content: un peuple vient du septentrion,
  - type: text
    content: Une grande nation et des rois puissants
  - type: text
    content: Se lèvent des extrémités de la terre.
  '42':
  - type: text
    content: Ils portent l’arc et le javelot;
  - type: text
    content: Ils sont cruels, sans miséricorde;
  - type: text
    content: Leur voix mugit comme la mer;
  - type: text
    content: Ils sont montés sur des chevaux,
  - type: text
    content: Prêts à combattre comme un seul homme,
  - type: text
    content: Contre toi, fille de Babylone!
  '43':
  - type: text
    content: Le roi de Babylone apprend la nouvelle,
  - type: text
    content: Et ses mains s’affaiblissent,
  - type: note
    content: Jé 49:24.
  - type: text
    content: L’angoisse le saisit,
  - type: text
    content: Comme la douleur d’une femme qui accouche…
  '44':
  - type: text
    content: ' '
  - type: note
    content: Jé 49:19, etc.
  - type: text
    content: Voici, tel qu’un lion, il monte des rives orgueilleuses du Jourdain
  - type: text
    content: Contre la demeure forte;
  - type: text
    content: Soudain je les en chasserai,
  - type: text
    content: Et j’établirai sur elle celui que j’ai choisi.
  - type: note
    content: Job 41:1. Jé 49:19.
  - type: text
    content: Car qui est semblable à moi? Qui me donnera des ordres?
  - type: text
    content: Et quel est le chef qui me résistera?
  '45':
  - type: text
    content: 'C’est pourquoi écoutez la '
  - type: note
    content: Jé 34:20.
  - type: text
    content: résolution que l’Éternel a prise contre Babylone,
  - type: text
    content: Et les desseins qu’il a conçus contre le pays des Chaldéens!
  - type: text
    content: Certainement on les traînera comme de faibles brebis,
  - type: text
    content: Certainement on ravagera leur demeure.
  '46':
  - type: text
    content: 'Au bruit de la prise de Babylone la '
  - type: note
    content: Jé 49:21.
  - type: text
    content: terre tremble,
  - type: text
    content: Et un cri se fait entendre parmi les nations.
  '5':
  - type: text
    content: Ils s’informeront du chemin de Sion,
  - type: text
    content: 'Ils tourneront vers elle leurs regards:'
  - type: text
    content: Venez, attachez-vous à l’Éternel,
  - type: text
    content: Par une alliance éternelle qui ne soit jamais oubliée!
  '6':
  - type: text
    content: Mon peuple était un troupeau de brebis perdues;
  - type: text
    content: Leurs bergers les égaraient, les faisaient errer par les montagnes;
  - type: text
    content: Elles allaient des montagnes sur les collines,
  - type: text
    content: Oubliant leur bercail.
  '7':
  - type: text
    content: Tous ceux qui les trouvaient les dévoraient,
  - type: text
    content: 'Et leurs ennemis disaient: Nous ne sommes point coupables,'
  - type: text
    content: 'Puisqu’ils ont péché contre l’Éternel, la '
  - type: note
    content: Jé 31:23.
  - type: text
    content: demeure de la justice,
  - type: text
    content: Contre l’Éternel, l’espérance de leurs pères.
  '8':
  - type: text
    content: ' '
  - type: note
    content: És 48:20. Jé 51:6. Ap 18:4.
  - type: text
    content: Fuyez de Babylone, sortez du pays des Chaldéens,
  - type: text
    content: Et soyez comme des boucs à la tête du troupeau!
  '9':
  - type: text
    content: Car voici, je vais susciter et faire monter contre Babylone
  - type: text
    content: Une multitude de grandes nations du pays du septentrion;
  - type: text
    content: Elles se rangeront en bataille contre elle, et s’en empareront;
  - type: text
    content: Leurs flèches sont comme un habile guerrier,
  - type: text
    content: Qui ne revient pas à vide.
