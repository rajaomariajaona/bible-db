document_id: JER.50
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Chute de Babylone et délivrance d’Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: '50 v. 1 à 51 v. 58: cf. (És 13; 14; 21:1-10; 47. Da 5.) Ap 18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole que l’Éternel prononça sur Babylone, sur le pays des Chaldéens, par Jérémie, le prophète:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Annoncez-le parmi les nations, publiez-le, élevez une bannière!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Publiez-le, ne cachez rien!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dites: Babylone est prise! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 46:1
      metadata:
        usfm: ISA.46.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 51:44
      metadata:
        usfm: JER.51.44
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Bel est confondu, Merodac est brisé!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses idoles sont confondues, ses idoles sont brisées!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car une nation monte contre elle du septentrion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle réduira son pays en désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y aura plus d’habitants;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hommes et bêtes fuient, s’en vont.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: En ces jours, en ce temps-là, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les enfants d’Israël et les enfants de Juda reviendront ensemble;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils marcheront en pleurant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils chercheront l’Éternel, leur Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils s’informeront du chemin de Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils tourneront vers elle leurs regards:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Venez, attachez-vous à l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par une alliance éternelle qui ne soit jamais oubliée!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mon peuple était un troupeau de brebis perdues;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs bergers les égaraient, les faisaient errer par les montagnes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles allaient des montagnes sur les collines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oubliant leur bercail.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tous ceux qui les trouvaient les dévoraient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et leurs ennemis disaient: Nous ne sommes point coupables,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Puisqu’ils ont péché contre l’Éternel, la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 31:23
      metadata:
        usfm: JER.31.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: demeure de la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre l’Éternel, l’espérance de leurs pères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 48:20
      metadata:
        usfm: ISA.48.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 51:6
      metadata:
        usfm: JER.51.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 18:4
      metadata:
        usfm: REV.18.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Fuyez de Babylone, sortez du pays des Chaldéens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et soyez comme des boucs à la tête du troupeau!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Car voici, je vais susciter et faire monter contre Babylone
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une multitude de grandes nations du pays du septentrion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles se rangeront en bataille contre elle, et s’en empareront;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs flèches sont comme un habile guerrier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui ne revient pas à vide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et la Chaldée sera livrée au pillage;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui la pilleront seront rassasiés, dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Oui, soyez dans la joie, dans l’allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous qui avez pillé mon héritage!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, bondissez comme une génisse dans l’herbe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hennissez comme des chevaux fougueux!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Votre mère est couverte de confusion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celle qui vous a enfantés rougit de honte;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, elle est la dernière des nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est un désert, une terre sèche et aride.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: A cause de la colère de l’Éternel, elle ne sera plus habitée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle ne sera plus qu’une solitude.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 49:17
      metadata:
        usfm: JER.49.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tous ceux qui passeront près de Babylone
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seront dans l’étonnement et siffleront sur toutes ses plaies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Rangez-vous en bataille autour de Babylone, vous tous, archers!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tirez contre elle, n’épargnez pas les flèches!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car elle a péché contre l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Poussez de tous côtés contre elle un cri de guerre!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle tend les mains;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses fondements s’écroulent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses murs sont renversés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car c’est la vengeance de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vengez-vous sur elle!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faites-lui comme elle a fait!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Exterminez de Babylone celui qui sème,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celui qui manie la faucille au temps de la moisson!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Devant le glaive destructeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que chacun se tourne vers son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que chacun fuie vers son pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Israël est une brebis égarée, que les lions ont chassée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le roi d’Assyrie l’a dévorée le premier;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ce dernier lui a brisé les os,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nebucadnetsar, roi de Babylone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'C’est pourquoi ainsi parle l’Éternel des armées, le Dieu d’Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, je châtierai le roi de Babylone et son pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Comme j’ai châtié le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 19:35
      metadata:
        usfm: 2KI.19.35
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '37'
      metadata:
        usfm: 2KI.19.37
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 37:36
      metadata:
        usfm: ISA.37.36
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '38'
      metadata:
        usfm: ISA.37.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: roi d’Assyrie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Je ramènerai Israël dans sa demeure;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il aura ses pâturages du Carmel et du Basan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et son âme se rassasiera sur la montagne d’Éphraïm et dans Galaad.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: En ces jours, en ce temps-là, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: On cherchera l’iniquité d’Israël, et elle n’existera plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le péché de Juda, et il ne se trouvera plus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je pardonnerai au reste que j’aurai laissé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Monte contre le pays doublement rebelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre ses habitants, et châtie-les!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Poursuis, massacre, extermine-les! Dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Exécute entièrement mes ordres!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Des cris de guerre retentissent dans le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le désastre est grand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Eh quoi! Il est rompu, brisé, le marteau de toute la terre!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Babylone est détruite au milieu des nations!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je t’ai tendu un piège, et tu as été prise, Babylone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A l’improviste;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as été atteinte, saisie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que tu as lutté contre l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: L’Éternel a ouvert son arsenal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il en a tiré les armes de sa colère;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car c’est là une œuvre du Seigneur, de l’Éternel des armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans le pays des Chaldéens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Pénétrez de toutes parts dans Babylone, ouvrez ses greniers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faites-y des monceaux comme des tas de gerbes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et détruisez-la!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il ne reste plus rien d’elle!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tuez tous ses taureaux, qu’on les égorge!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malheur à eux! Car leur jour est arrivé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le temps de leur châtiment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Écoutez les cris des fuyards, de ceux qui se sauvent du pays de Babylone
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour annoncer dans Sion la vengeance de l’Éternel, notre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La vengeance de son temple!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Appelez contre Babylone les archers, vous tous qui maniez l’arc!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Campez autour d’elle, que personne n’échappe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rendez-lui selon ses œuvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faites-lui entièrement comme elle a fait!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car elle s’est élevée avec fierté contre l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre le Saint d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 49:26
      metadata:
        usfm: JER.49.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: C’est pourquoi ses jeunes gens tomberont dans les rues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous ses hommes de guerre périront en ce jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Voici, j’en veux à toi, orgueilleuse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Seigneur, l’Éternel des armées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ton jour est arrivé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le temps de ton châtiment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: L’orgueilleuse chancellera et tombera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et personne ne la relèvera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je mettrai le feu à ses villes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il en dévorera tous les alentours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ainsi parle l’Éternel des armées:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les enfants d’Israël et les enfants de Juda sont ensemble opprimés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui les ont emmenés captifs les retiennent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et refusent de les relâcher.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Mais leur vengeur est puissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lui dont l’Éternel des armées est le nom;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il défendra leur cause,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin de donner le repos au pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de faire trembler les habitants de Babylone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: L’épée contre les Chaldéens! Dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre les habitants de Babylone, ses chefs et ses sages!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: L’épée contre les prophètes de mensonge! Qu’ils soient comme des insensés!
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’épée contre ses vaillants hommes! Qu’ils soient consternés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: L’épée contre ses chevaux et ses chars!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre les gens de toute espèce qui sont au milieu d’elle!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils deviennent semblables à des femmes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’épée contre ses trésors! Qu’ils soient pillés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: La sécheresse contre ses eaux! Qu’elles tarissent!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car c’est un pays d’idoles;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont fous de leurs idoles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: C’est pourquoi les animaux du désert s’y établiront avec les chacals,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les autruches y feront leur demeure;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle ne sera plus jamais habitée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle ne sera plus jamais peuplée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
