    text: Ils portent l’arc et le javelot;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont cruels, sans miséricorde;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur voix mugit comme la mer;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont montés sur des chevaux,
- type: usfm
  marker: q1
  children:
