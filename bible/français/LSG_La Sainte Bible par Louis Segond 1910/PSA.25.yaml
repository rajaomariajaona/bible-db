document_id: PSA.25,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 143; 130; 31; 86.
  - type: text
    content: De David.
  - type: text
    content: Éternel! J’élève à toi mon âme.
  '10':
  - type: text
    content: Tous les sentiers de l’Éternel sont miséricorde et fidélité,
  - type: text
    content: Pour ceux qui gardent son alliance et ses commandements.
  '11':
  - type: text
    content: C’est à cause de ton nom, ô Éternel!
  - type: text
    content: Que tu pardonneras mon iniquité, car elle est grande.
  '12':
  - type: text
    content: Quel est l’homme qui craint l’Éternel?
  - type: text
    content: L’Éternel lui montre la voie qu’il doit choisir.
  '13':
  - type: text
    content: Son âme reposera dans le bonheur,
  - type: text
    content: Et sa postérité possédera le pays.
  '14':
  - type: text
    content: L’amitié de l’Éternel est pour ceux qui le craignent,
  - type: text
    content: Et son alliance leur donne instruction.
  '15':
  - type: text
    content: Je tourne constamment les yeux vers l’Éternel,
  - type: text
    content: Car il fera sortir mes pieds du filet.
  '16':
  - type: text
    content: Regarde-moi et aie pitié de moi,
  - type: text
    content: Car je suis abandonné et malheureux.
  '17':
  - type: text
    content: Les angoisses de mon cœur augmentent;
  - type: text
    content: Tire-moi de ma détresse.
  '18':
  - type: text
    content: Vois ma misère et ma peine,
  - type: text
    content: Et pardonne tous mes péchés.
  '19':
  - type: text
    content: Vois combien mes ennemis sont nombreux,
  - type: text
    content: Et de quelle haine violente ils me poursuivent.
  '2':
  - type: text
    content: 'Mon Dieu! '
  - type: note
    content: Ps 22:6; 31:2; 34:6.
  - type: text
    content: 'en toi je me confie: que je ne sois pas couvert de honte!'
  - type: text
    content: Que mes ennemis ne se réjouissent pas à mon sujet!
  '20':
  - type: text
    content: Garde mon âme et sauve-moi!
  - type: text
    content: Que je ne sois pas confus,
  - type: text
    content: Quand je cherche auprès de toi mon refuge!
  '21':
  - type: text
    content: Que l’innocence et la droiture me protègent,
  - type: text
    content: Quand je mets en toi mon espérance!
  '22':
  - type: text
    content: O Dieu! Délivre Israël
  - type: text
    content: De toutes ses détresses!
  '3':
  - type: text
    content: 'Tous ceux qui espèrent en toi '
  - type: note
    content: És 28:16. Ro 10:11.
  - type: text
    content: ne seront point confondus;
  - type: text
    content: Ceux-là seront confondus qui sont infidèles sans cause.
  '4':
  - type: text
    content: 'Éternel! '
  - type: note
    content: Ps 27:11; 86:11; 119.
  - type: text
    content: fais-moi connaître tes voies,
  - type: text
    content: Enseigne-moi tes sentiers.
  '5':
  - type: text
    content: Conduis-moi dans ta vérité, et instruis-moi;
  - type: text
    content: Car tu es le Dieu de mon salut,
  - type: text
    content: Tu es toujours mon espérance.
  '6':
  - type: text
    content: Éternel! Souviens-toi de ta miséricorde et de ta bonté;
  - type: note
    content: Ps 103:17; 106:1; 107:1; 117:2; 136. Jé 33:11.
  - type: text
    content: Car elles sont éternelles.
  '7':
  - type: text
    content: Ne te souviens pas des fautes de ma jeunesse ni de mes transgressions;
  - type: text
    content: Souviens-toi de moi selon ta miséricorde,
  - type: text
    content: A cause de ta bonté, ô Éternel!
  '8':
  - type: text
    content: 'L’Éternel est bon et droit:'
  - type: text
    content: C’est pourquoi il montre aux pécheurs la voie.
  '9':
  - type: text
    content: Il conduit les humbles dans la justice,
  - type: text
    content: Il enseigne aux humbles sa voie.
