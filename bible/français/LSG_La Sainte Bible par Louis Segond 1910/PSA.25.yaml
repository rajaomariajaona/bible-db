document_id: PSA.25,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 143; 130; 31; 86.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel! J’élève à toi mon âme.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tous les sentiers de l’Éternel sont miséricorde et fidélité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour ceux qui gardent son alliance et ses commandements.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: C’est à cause de ton nom, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tu pardonneras mon iniquité, car elle est grande.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Quel est l’homme qui craint l’Éternel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel lui montre la voie qu’il doit choisir.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Son âme reposera dans le bonheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa postérité possédera le pays.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: L’amitié de l’Éternel est pour ceux qui le craignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et son alliance leur donne instruction.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Je tourne constamment les yeux vers l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il fera sortir mes pieds du filet.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Regarde-moi et aie pitié de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je suis abandonné et malheureux.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Les angoisses de mon cœur augmentent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tire-moi de ma détresse.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Vois ma misère et ma peine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pardonne tous mes péchés.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Vois combien mes ennemis sont nombreux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de quelle haine violente ils me poursuivent.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mon Dieu! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 22:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'en toi je me confie: que je ne sois pas couvert de honte!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que mes ennemis ne se réjouissent pas à mon sujet!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Garde mon âme et sauve-moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que je ne sois pas confus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je cherche auprès de toi mon refuge!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Que l’innocence et la droiture me protègent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je mets en toi mon espérance!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: O Dieu! Délivre Israël
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De toutes ses détresses!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tous ceux qui espèrent en toi '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 28:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 10:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ne seront point confondus;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux-là seront confondus qui sont infidèles sans cause.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Éternel! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 27:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 86:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '119'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: fais-moi connaître tes voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enseigne-moi tes sentiers.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Conduis-moi dans ta vérité, et instruis-moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu es le Dieu de mon salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es toujours mon espérance.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Éternel! Souviens-toi de ta miséricorde et de ta bonté;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 103:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 106:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 107:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 117:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '136'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 33:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car elles sont éternelles.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ne te souviens pas des fautes de ma jeunesse ni de mes transgressions;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Souviens-toi de moi selon ta miséricorde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de ta bonté, ô Éternel!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'L’Éternel est bon et droit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi il montre aux pécheurs la voie.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Il conduit les humbles dans la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il enseigne aux humbles sa voie.
