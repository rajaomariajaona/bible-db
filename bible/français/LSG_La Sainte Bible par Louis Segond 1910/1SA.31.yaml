document_id: 1SA.31,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Israélites vaincus par les Philistins. — Saül et trois de ses fils tués dans la bataille
  - type: heading
    content: 'V. 1-7: cf. (1 Ch 10:1-7, 13, 14. 2 S 1.) Am 2:14, 15. (Pr 14:32. 1 Co 15:56.)'
  - type: text
    content: 'Les Philistins livrèrent bataille à Israël, et les hommes d’Israël prirent la fuite devant les Philistins et tombèrent morts sur la montagne de Guilboa. '
  '10':
  - type: text
    content: 'Ils mirent les armes de Saül dans la maison des Astartés, et ils attachèrent son cadavre sur les murs de Beth-Schan. '
  '11':
  - type: text
    content: 'Lorsque les habitants de Jabès en Galaad apprirent comment les Philistins avaient traité Saül, '
  '12':
  - type: text
    content: 'tous les vaillants hommes se levèrent, et, après avoir marché toute la nuit, ils arrachèrent des murs de Beth-Schan le cadavre de Saül et ceux de ses fils. Puis ils revinrent à Jabès, où ils les brûlèrent; '
  '13':
  - type: text
    content: ils prirent leurs os, et les enterrèrent sous le tamaris à Jabès. Et ils jeûnèrent sept jours.
  '2':
  - type: text
    content: 'Les Philistins poursuivirent Saül et ses fils, et tuèrent Jonathan, Abinadab et Malkischua, fils de Saül. '
  '3':
  - type: text
    content: 'L’effort du combat porta sur Saül; les archers l’atteignirent, et le blessèrent grièvement. '
  '4':
  - type: text
    content: 'Saül dit alors à celui qui portait ses armes: Tire ton épée, et m’en transperce, de peur que ces incirconcis ne viennent me percer et me faire subir leurs outrages. Celui qui portait ses armes ne voulut pas, car il était saisi de crainte. Et Saül prit son épée, et se jeta dessus. '
  '5':
  - type: text
    content: 'Celui qui portait les armes de Saül, le voyant mort, se jeta aussi sur son épée, et mourut avec lui. '
  '6':
  - type: text
    content: 'Ainsi périrent en même temps, dans cette journée, Saül et ses trois fils, celui qui portait ses armes, et tous ses gens. '
  '7':
  - type: text
    content: Ceux d’Israël qui étaient de ce côté de la vallée et de ce côté du Jourdain, ayant vu que les hommes d’Israël s’enfuyaient et que Saül et ses fils étaient morts, abandonnèrent leurs villes pour prendre aussi la fuite. Et les Philistins allèrent s’y établir.
  - type: heading
    content: 'V. 8-13: cf. 1 Ch 10:8-12. (1 S 11:1-11. 2 S 2:4-7.) Ro 13:7, 8.'
  '8':
  - type: text
    content: 'Le lendemain, les Philistins vinrent pour dépouiller les morts, et ils trouvèrent Saül et ses trois fils tombés sur la montagne de Guilboa. '
  '9':
  - type: text
    content: 'Ils coupèrent la tête de Saül, et enlevèrent ses armes. Puis ils firent '
  - type: note
    content: 1 Ch 10:9.
  - type: text
    content: 'annoncer ces bonnes nouvelles par tout le pays des Philistins dans les maisons de leurs idoles et parmi le peuple. '
