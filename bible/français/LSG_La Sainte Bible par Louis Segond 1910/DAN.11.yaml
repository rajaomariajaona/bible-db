document_id: DAN.11,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Et moi, la première année de Darius, le Mède, j’étais auprès de lui pour l’aider et le soutenir. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ses fils se mettront en campagne et rassembleront une multitude nombreuse de troupes; l’un d’eux s’avancera, se répandra comme un torrent, débordera, puis reviendra; et ils pousseront les hostilités jusqu’à la forteresse du roi du midi. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Le roi du midi s’irritera, il sortira et attaquera le roi du septentrion; il soulèvera une grande multitude, et les troupes du roi du septentrion seront livrées entre ses mains. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Cette multitude sera fière, et le cœur du roi s’enflera; il fera tomber des milliers, mais il ne triomphera pas. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Car le roi du septentrion reviendra et rassemblera une multitude plus nombreuse que la première; au bout de quelques temps, de quelques années, il se mettra en marche avec une grande armée et de grandes richesses. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'En ce temps-là, plusieurs s’élèveront contre le roi du midi, et des hommes violents parmi ton peuple se révolteront pour accomplir la vision, et ils succomberont. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Le roi du septentrion s’avancera, il élèvera des terrasses, et s’emparera des villes fortes. Les troupes du midi et l’élite du roi ne résisteront pas, elles manqueront de force pour résister. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Celui qui marchera contre lui fera ce qu’il voudra, et personne ne lui résistera; il s’arrêtera dans le plus beau des pays, exterminant ce qui tombera sous sa main. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il se proposera d’arriver avec toutes les forces de son royaume, et de conclure la paix avec le roi du midi; il lui donnera sa fille pour femme, dans l’intention d’amener sa ruine; mais cela n’aura pas lieu, et ne lui réussira pas. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Il tournera ses vues du côté des îles, et il en prendra plusieurs; mais un chef mettra fin à l’opprobre qu’il voulait lui attirer, et le fera retomber sur lui. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Il se dirigera ensuite vers les forteresses de son pays; et il chancellera, il tombera, et on ne le trouvera plus. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Maintenant, je vais te faire connaître la vérité. Voici, il y aura encore trois rois en Perse. Le quatrième amassera plus de richesses que tous les autres; et quand il sera puissant par ses richesses, il soulèvera tout contre le royaume de Javan. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Celui qui le remplacera fera venir un exacteur dans la plus belle partie du royaume, mais en quelques jours il sera brisé, et ce ne sera ni par la colère ni par la guerre.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 21-45: cf. Da 8:9-14, 23-26.'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Un homme méprisé prendra sa place, sans être revêtu de la dignité royale; il paraîtra au milieu de la paix, et s’emparera du royaume par l’intrigue. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Les troupes qui se répandront comme un torrent seront submergées devant lui, et anéanties, de même qu’un chef de l’alliance. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Après qu’on se sera joint à lui, il usera de tromperie; il se mettra en marche, et il aura le dessus avec peu de monde. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Il entrera, au sein de la paix, dans les lieux les plus fertiles de la province; il fera ce que n’avaient pas fait ses pères, ni les pères de ses pères; il distribuera le butin, les dépouilles et les richesses; il formera des projets contre les forteresses, et cela pendant un certain temps. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'A la tête d’une grande armée il emploiera sa force et son ardeur contre le roi du midi. Et le roi du midi s’engagera dans la guerre avec une armée nombreuse et très puissante; mais il ne résistera pas, car on méditera contre lui de mauvais desseins. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ceux qui mangeront des mets de sa table causeront sa perte; ses troupes se répandront comme un torrent, et les morts tomberont en grand nombre. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Les deux rois chercheront en leur cœur à faire le mal, et à la même table ils parleront avec fausseté. Mais cela ne réussira pas, car la fin n’arrivera qu’au temps marqué. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Il retournera dans son pays avec de grandes richesses; il sera dans son cœur hostile à l’alliance sainte, il agira contre elle, puis retournera dans son pays. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'A une époque fixée, il marchera de nouveau contre le midi; mais cette dernière fois les choses ne se passeront pas comme précédemment. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mais il s’élèvera un vaillant roi, qui dominera avec une grande puissance, et fera ce qu’il voudra. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Des navires de Kittim s’avanceront contre lui; découragé, il rebroussera. Puis, furieux contre l’alliance sainte, il ne restera pas inactif; à son retour, il portera ses regards sur ceux qui auront abandonné l’alliance sainte. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Des troupes se présenteront sur son ordre; elles profaneront le sanctuaire, la forteresse, elles feront cesser le sacrifice perpétuel, et dresseront l’abomination du dévastateur. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Il séduira par des flatteries les traîtres de l’alliance. Mais ceux du peuple qui connaîtront leur Dieu agiront avec fermeté, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'et les plus sages parmi eux donneront instruction à la multitude. Il en est qui succomberont pour un temps à l’épée et à la flamme, à la captivité et au pillage. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Dans le temps où ils succomberont, ils seront un peu secourus, et plusieurs se joindront à eux par hypocrisie. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Quelques-uns des hommes sages succomberont, afin qu’ils soient épurés, purifiés et blanchis, jusqu’au temps de la fin, car elle n’arrivera qu’au temps marqué. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Le roi fera ce qu’il voudra; il s’élèvera, il se glorifiera au-dessus de tous les dieux, et il dira des choses '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Da 7:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'incroyables contre le Dieu des dieux; il prospérera jusqu’à ce que la colère soit consommée, car ce qui est arrêté s’accomplira. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Il n’aura égard ni aux dieux de ses pères, ni à la divinité qui fait les délices des femmes; il n’aura égard à aucun dieu, car il se glorifiera au-dessus de tous. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Toutefois il honorera le dieu des forteresses sur son piédestal; à ce dieu, que ne connaissaient pas ses pères, il rendra des hommages avec de l’or et de l’argent, avec des pierres précieuses et des objets de prix. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'C’est avec le dieu étranger qu’il agira contre les lieux fortifiés; et il comblera d’honneurs ceux qui le reconnaîtront, il les fera dominer sur plusieurs, il leur distribuera des terres pour récompense. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Et lorsqu’il se sera élevé, son royaume se brisera et sera divisé vers les quatre vents des cieux; il n’appartiendra pas à ses descendants, et il ne sera pas aussi puissant qu’il était, car il sera déchiré, et il passera à d’autres qu’à eux. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Au temps de la fin, le roi du midi se heurtera contre lui. Et le roi du septentrion fondra sur lui comme une tempête, avec des chars et des cavaliers, et avec de nombreux navires; il s’avancera dans les terres, se répandra comme un torrent et débordera. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Il entrera dans le plus beau des pays, et plusieurs succomberont; mais Édom, Moab, et les principaux des enfants d’Ammon seront délivrés de sa main. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Il étendra sa main sur divers pays, et le pays d’Égypte n’échappera point. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Il se rendra maître des trésors d’or et d’argent, et de toutes les choses précieuses de l’Égypte; les Libyens et les Éthiopiens seront à sa suite. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Des nouvelles de l’orient et du septentrion viendront l’effrayer, et il partira avec une grande fureur pour détruire et exterminer des multitudes. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Il dressera les tentes de son palais entre les mers, vers la glorieuse et sainte montagne Puis il arrivera à la fin, sans que personne lui soit en aide.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Le roi du midi deviendra fort. Mais un de ses chefs sera plus fort que lui, et dominera; sa domination sera puissante. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Au bout de quelques années ils s’allieront, et la fille du roi du midi viendra vers le roi du septentrion pour rétablir la concorde. Mais elle ne conservera pas la force de son bras, et il ne résistera pas, ni lui, ni son bras; elle sera livrée avec ceux qui l’auront amenée, avec son père et avec celui qui aura été son soutien dans ce temps-là. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Un rejeton de ses racines s’élèvera à sa place; il viendra à l’armée, il entrera dans les forteresses du roi du septentrion, il en disposera à son gré, et il se rendra puissant. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Il enlèvera même et transportera en Égypte leurs dieux et leurs images de fonte, et leurs objets précieux d’argent et d’or. Puis il restera quelques années éloigné du roi du septentrion. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Et celui-ci marchera contre le royaume du roi du midi, et reviendra dans son pays. '
