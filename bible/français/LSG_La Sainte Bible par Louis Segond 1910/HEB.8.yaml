document_id: HEB.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus est un souverain sacrificateur supérieur à ceux de l’ancienne alliance (suite). — Son sacerdoce le constitue médiateur d’une alliance nouvelle et définitive. Son sacrifice est unique et parfait
  - type: heading
    content: 'V. 1-6: cf. Hé 7:15-28; 9:6-12, 24; 12:24.'
  - type: text
    content: 'Le point capital de ce qui vient d’être dit, '
  - type: note
    content: Hé 3:1; 4:14; 6:20; 9:11.
  - type: text
    content: 'c’est que nous avons un tel souverain sacrificateur, '
  - type: note
    content: Ép 1:20. Col 3:1. Hé 12:2.
  - type: text
    content: 'qui s’est assis à la droite du trône de la majesté divine dans les cieux, '
  '10':
  - type: text
    content: Mais voici l’alliance que je ferai avec la maison d’Israël,
  - type: text
    content: 'après ces jours-là, dit le Seigneur:'
  - type: note
    content: Jé 31:33.
  - type: text
    content: je mettrai mes lois dans leur esprit,
  - type: text
    content: je les écrirai dans leur cœur;
  - type: note
    content: Za 8:8.
  - type: text
    content: et je serai leur Dieu,
  - type: text
    content: et ils seront mon peuple.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Jn 6:45, 65. 1 Jn 2:27.
  - type: text
    content: Aucun n’enseignera plus son concitoyen,
  - type: text
    content: 'ni aucun son frère, en disant:'
  - type: text
    content: Connais le Seigneur!
  - type: text
    content: Car tous me connaîtront,
  - type: text
    content: depuis le plus petit jusqu’au plus grand d’entre eux;
  '12':
  - type: text
    content: parce que je pardonnerai leurs iniquités,
  - type: text
    content: et que je ne me souviendrai plus de leurs péchés.
  '13':
  - type: text
    content: 'En disant: une alliance nouvelle, il a déclaré la première ancienne; or, ce qui est ancien, ce qui a vieilli, est près de disparaître.'
  '2':
  - type: text
    content: 'comme ministre du sanctuaire et du véritable tabernacle, qui a été dressé par le Seigneur et non par un homme. '
  '3':
  - type: text
    content: 'Tout souverain sacrificateur est établi pour présenter des offrandes et des sacrifices; '
  - type: note
    content: Ép 5:2.
  - type: text
    content: 'd’où il est nécessaire que celui-ci ait aussi quelque chose à présenter. '
  '4':
  - type: text
    content: 'S’il était sur la terre, il ne serait pas même sacrificateur, puisque là sont ceux qui présentent les offrandes selon la loi '
  '5':
  - type: text
    content: (
  - type: note
    content: Col 2:17. Hé 10:1.
  - type: text
    content: 'lesquels célèbrent un culte, image et ombre des choses célestes, selon que Moïse en fut divinement averti '
  - type: note
    content: Ex 25:40. Ac 7:44.
  - type: text
    content: 'lorsqu’il allait construire le tabernacle: Aie soin, lui fut-il dit, de faire tout d’après le modèle qui t’a été montré sur la montagne). '
  '6':
  - type: note
    content: 2 Co 3:6.
  - type: text
    content: Mais maintenant il a obtenu un ministère d’autant supérieur qu’il est le médiateur d’une alliance plus excellente, qui a été établie sur de meilleures promesses.
  - type: heading
    content: 'V. 7-13: cf. Jé 31:31-34. Éz 37:26-28. És 55:3.'
  '7':
  - type: text
    content: 'En effet, si la première alliance avait été sans défaut, il n’aurait pas été question de la remplacer par une seconde. '
  '8':
  - type: text
    content: 'Car c’est avec l’expression d’un blâme que le Seigneur dit à Israël:'
  - type: note
    content: Jé 31:31, 32, 33, 34.
  - type: text
    content: Voici, les jours viennent, dit le Seigneur,
  - type: text
    content: où je ferai avec la maison d’Israël et la maison de Juda
  - type: text
    content: Une alliance nouvelle,
  '9':
  - type: text
    content: non comme l’alliance que je traitai avec leurs pères,
  - type: text
    content: le jour où je les saisis par la main
  - type: text
    content: pour les faire sortir du pays d’Égypte;
  - type: text
    content: car ils n’ont pas persévéré dans mon alliance,
  - type: text
    content: et moi aussi je ne me suis pas soucié d’eux, dit le Seigneur.
