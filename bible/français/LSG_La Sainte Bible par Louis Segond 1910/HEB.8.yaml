document_id: HEB.8,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus est un souverain sacrificateur supérieur à ceux de l’ancienne alliance (suite). — Son sacerdoce le constitue médiateur d’une alliance nouvelle et définitive. Son sacrifice est unique et parfait
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. Hé 7:15-28; 9:6-12, 24; 12:24.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le point capital de ce qui vient d’être dit, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 3:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'c’est que nous avons un tel souverain sacrificateur, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 1:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui s’est assis à la droite du trône de la majesté divine dans les cieux, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais voici l’alliance que je ferai avec la maison d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'après ces jours-là, dit le Seigneur:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 31:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: je mettrai mes lois dans leur esprit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les écrirai dans leur cœur;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 8:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: et je serai leur Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils seront mon peuple.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6:45
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '65'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 2:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Aucun n’enseignera plus son concitoyen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ni aucun son frère, en disant:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Connais le Seigneur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tous me connaîtront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: depuis le plus petit jusqu’au plus grand d’entre eux;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que je pardonnerai leurs iniquités,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que je ne me souviendrai plus de leurs péchés.
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'En disant: une alliance nouvelle, il a déclaré la première ancienne; or, ce qui est ancien, ce qui a vieilli, est près de disparaître.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'comme ministre du sanctuaire et du véritable tabernacle, qui a été dressé par le Seigneur et non par un homme. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout souverain sacrificateur est établi pour présenter des offrandes et des sacrifices; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’où il est nécessaire que celui-ci ait aussi quelque chose à présenter. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il était sur la terre, il ne serait pas même sacrificateur, puisque là sont ceux qui présentent les offrandes selon la loi '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 2:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 10:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'lesquels célèbrent un culte, image et ombre des choses célestes, selon que Moïse en fut divinement averti '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25:40
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7:44
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'lorsqu’il allait construire le tabernacle: Aie soin, lui fut-il dit, de faire tout d’après le modèle qui t’a été montré sur la montagne). '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 3:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais maintenant il a obtenu un ministère d’autant supérieur qu’il est le médiateur d’une alliance plus excellente, qui a été établie sur de meilleures promesses.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-13: cf. Jé 31:31-34. Éz 37:26-28. És 55:3.'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, si la première alliance avait été sans défaut, il n’aurait pas été question de la remplacer par une seconde. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car c’est avec l’expression d’un blâme que le Seigneur dit à Israël:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 31:31
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '32'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '34'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Voici, les jours viennent, dit le Seigneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où je ferai avec la maison d’Israël et la maison de Juda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une alliance nouvelle,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: non comme l’alliance que je traitai avec leurs pères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le jour où je les saisis par la main
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour les faire sortir du pays d’Égypte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils n’ont pas persévéré dans mon alliance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et moi aussi je ne me suis pas soucié d’eux, dit le Seigneur.
