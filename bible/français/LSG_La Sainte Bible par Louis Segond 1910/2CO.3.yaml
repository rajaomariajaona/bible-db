document_id: 2CO.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-6: cf. 1 Co 9:1-3. 2 Co 4:6, 7; 5:18-21.'
  - type: text
    content: ' '
  - type: note
    content: 2 Co 5:12; 10:8.
  - type: text
    content: 'Commençons-nous de nouveau à nous recommander nous-mêmes? Ou avons-nous besoin, comme quelques-uns, de lettres de recommandation auprès de vous, ou de votre part? '
  '10':
  - type: text
    content: 'Et, sous ce rapport, ce qui a été glorieux ne l’a point été, à cause de cette gloire qui lui est supérieure. '
  '11':
  - type: text
    content: 'En effet, si ce qui était passager a été glorieux, ce qui est permanent est bien plus glorieux. '
  '12':
  - type: text
    content: 'Ayant donc cette espérance, nous usons d’une grande liberté, '
  '13':
  - type: text
    content: 'et nous ne faisons pas comme '
  - type: note
    content: Ex 34:35.
  - type: text
    content: 'Moïse, qui mettait un voile sur son visage, pour que les fils d’Israël ne fixassent pas les regards '
  - type: note
    content: Ro 10:4.
  - type: text
    content: 'sur la fin de ce qui était passager. '
  '14':
  - type: note
    content: És 6:10. Éz 12:2. Mt 13:11. Ac 28:26. Ro 11:8.
  - type: text
    content: 'Mais ils sont devenus durs d’entendement. Car jusqu’à ce jour le même voile demeure quand, ils font la lecture de l’Ancien Testament, et il ne se lève pas, parce que c’est en Christ qu’il disparaît. '
  '15':
  - type: text
    content: 'Jusqu’à ce jour, quand on lit Moïse, un voile est jeté sur leurs cœurs; '
  '16':
  - type: note
    content: Mt 13:11. Ro 11:23. 1 Co 2:10.
  - type: text
    content: 'mais lorsque les cœurs se convertissent au Seigneur, le voile est ôté. '
  '17':
  - type: note
    content: Jn 4:24.
  - type: text
    content: 'Or, le Seigneur c’est l’Esprit; et là où est l’Esprit du Seigneur, là est la liberté. '
  '18':
  - type: note
    content: 1 Co 13:12. 2 Co 5:7.
  - type: text
    content: Nous tous qui, le visage découvert, contemplons comme dans un miroir la gloire du Seigneur, nous sommes transformés en la même image, de gloire en gloire, comme par le Seigneur, l’Esprit.
  '2':
  - type: text
    content: 'C’est vous qui êtes notre lettre, écrite dans nos cœurs, connue et lue de tous les hommes. '
  '3':
  - type: text
    content: 'Vous êtes manifestement une lettre de Christ, écrite, par notre ministère, non avec de l’encre, mais avec l’Esprit du Dieu vivant, non '
  - type: note
    content: Ex 24:12; 34:1.
  - type: text
    content: 'sur des tables de pierre, '
  - type: note
    content: Jé 31:33. Éz 11:19; 36:26. Hé 8:10.
  - type: text
    content: 'mais sur des tables de chair, sur les cœurs. '
  '4':
  - type: text
    content: 'Cette assurance-là, nous l’avons par Christ auprès de Dieu. '
  '5':
  - type: text
    content: 'Ce n’est pas à dire que nous soyons par nous-mêmes capables de concevoir quelque chose comme venant de nous-mêmes. '
  - type: note
    content: Ph 2:13.
  - type: text
    content: 'Notre capacité, au contraire, vient de Dieu. '
  '6':
  - type: text
    content: 'Il nous a aussi rendus capables d’être '
  - type: note
    content: 2 Co 5:18.
  - type: text
    content: 'ministres '
  - type: note
    content: Hé 8:6, 8.
  - type: text
    content: d’une nouvelle alliance, non de la lettre, mais de l’esprit; car la lettre tue, mais l’esprit vivifie.
  - type: heading
    content: 'V. 7-18: cf. (Ex 34:28-35. Jn 1:17, 18, 14.) Ga 3:8-29. Hé 7:18-28; 8:6-13; 12:18-29.'
  '7':
  - type: text
    content: 'Or, si le ministère de la mort, '
  - type: note
    content: Ex 24:12; 34:1. De 10:2.
  - type: text
    content: 'gravé avec des lettres sur des pierres, a été glorieux, '
  - type: note
    content: Ex 34:30.
  - type: text
    content: 'au point que les fils d’Israël ne pouvaient fixer les regards sur le visage de Moïse, à cause de la gloire de son visage, bien que cette gloire fût passagère, '
  '8':
  - type: text
    content: 'combien le ministère de l’esprit ne sera-t-il pas plus glorieux! '
  '9':
  - type: text
    content: 'Si le ministère de la condamnation a été glorieux, le ministère de la justice est de beaucoup supérieur en gloire. '
