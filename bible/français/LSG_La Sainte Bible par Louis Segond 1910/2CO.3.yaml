document_id: 2CO.3
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. 1 Co 9:1-3. 2 Co 4:6, 7; 5:18-21.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:12
      metadata:
        usfm: 2CO.5.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:8
      metadata:
        usfm: 2CO.10.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Commençons-nous de nouveau à nous recommander nous-mêmes? Ou avons-nous besoin, comme quelques-uns, de lettres de recommandation auprès de vous, ou de votre part? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'C’est vous qui êtes notre lettre, écrite dans nos cœurs, connue et lue de tous les hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous êtes manifestement une lettre de Christ, écrite, par notre ministère, non avec de l’encre, mais avec l’Esprit du Dieu vivant, non '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 24:12
      metadata:
        usfm: EXO.24.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:1
      metadata:
        usfm: EXO.34.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sur des tables de pierre, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 31:33
      metadata:
        usfm: JER.31.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 11:19
      metadata:
        usfm: EZK.11.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 36:26
      metadata:
        usfm: EZK.36.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 8:10
      metadata:
        usfm: HEB.8.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais sur des tables de chair, sur les cœurs. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Cette assurance-là, nous l’avons par Christ auprès de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ce n’est pas à dire que nous soyons par nous-mêmes capables de concevoir quelque chose comme venant de nous-mêmes. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:13
      metadata:
        usfm: PHP.2.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Notre capacité, au contraire, vient de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il nous a aussi rendus capables d’être '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:18
      metadata:
        usfm: 2CO.5.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ministres '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 8:6
      metadata:
        usfm: HEB.8.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: HEB.8.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: d’une nouvelle alliance, non de la lettre, mais de l’esprit; car la lettre tue, mais l’esprit vivifie.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-18: cf. (Ex 34:28-35. Jn 1:17, 18, 14.) Ga 3:8-29. Hé 7:18-28; 8:6-13; 12:18-29.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Or, si le ministère de la mort, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 24:12
      metadata:
        usfm: EXO.24.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:1
      metadata:
        usfm: EXO.34.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:2
      metadata:
        usfm: DEU.10.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'gravé avec des lettres sur des pierres, a été glorieux, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 34:30
      metadata:
        usfm: EXO.34.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'au point que les fils d’Israël ne pouvaient fixer les regards sur le visage de Moïse, à cause de la gloire de son visage, bien que cette gloire fût passagère, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'combien le ministère de l’esprit ne sera-t-il pas plus glorieux! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Si le ministère de la condamnation a été glorieux, le ministère de la justice est de beaucoup supérieur en gloire. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et, sous ce rapport, ce qui a été glorieux ne l’a point été, à cause de cette gloire qui lui est supérieure. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En effet, si ce qui était passager a été glorieux, ce qui est permanent est bien plus glorieux. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ayant donc cette espérance, nous usons d’une grande liberté, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et nous ne faisons pas comme '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 34:35
      metadata:
        usfm: EXO.34.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Moïse, qui mettait un voile sur son visage, pour que les fils d’Israël ne fixassent pas les regards '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 10:4
      metadata:
        usfm: ROM.10.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sur la fin de ce qui était passager. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 6:10
      metadata:
        usfm: ISA.6.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 12:2
      metadata:
        usfm: EZK.12.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:11
      metadata:
        usfm: MAT.13.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 28:26
      metadata:
        usfm: ACT.28.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:8
      metadata:
        usfm: ROM.11.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais ils sont devenus durs d’entendement. Car jusqu’à ce jour le même voile demeure quand, ils font la lecture de l’Ancien Testament, et il ne se lève pas, parce que c’est en Christ qu’il disparaît. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jusqu’à ce jour, quand on lit Moïse, un voile est jeté sur leurs cœurs; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:11
      metadata:
        usfm: MAT.13.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:23
      metadata:
        usfm: ROM.11.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 2:10
      metadata:
        usfm: 1CO.2.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais lorsque les cœurs se convertissent au Seigneur, le voile est ôté. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 4:24
      metadata:
        usfm: JHN.4.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Or, le Seigneur c’est l’Esprit; et là où est l’Esprit du Seigneur, là est la liberté. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 13:12
      metadata:
        usfm: 1CO.13.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:7
      metadata:
        usfm: 2CO.5.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Nous tous qui, le visage découvert, contemplons comme dans un miroir la gloire du Seigneur, nous sommes transformés en la même image, de gloire en gloire, comme par le Seigneur, l’Esprit.
