document_id: JER.41
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Assassinat de Guedalia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-18: cf. Jé 40:6-16. 2 R 25:22-26. De 32:23; 27:25.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 R 25:35.
    marker-yv: yv-n
  - type: text
    text: 'septième mois, Ismaël, fils de Nethania, fils d’Élischama, de la race royale, vint avec des grands du roi et dix hommes auprès de Guedalia, fils d’Achikam, à Mitspa. Là, ils mangèrent ensemble à Mitspa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors Ismaël, fils de Nethania, se leva avec les dix hommes dont il était accompagné, et ils frappèrent avec l’épée Guedalia, fils d’Achikam, fils de Schaphan; il fit ainsi mourir celui que le roi de Babylone avait établi gouverneur du pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ismaël tua encore tous les juifs qui étaient auprès de Guedalia à Mitspa, et les Chaldéens qui se trouvaient là, les gens de guerre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le second jour après l’assassinat de Guedalia, tandis que personne n’en savait rien, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'il arriva de Sichem, de Silo et de Samarie, quatre-vingts hommes, qui avaient la barbe rasée et les vêtements déchirés, et qui s’étaient fait des incisions; ils portaient des offrandes et de l’encens, pour les présenter à la maison de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ismaël, fils de Nethania, sortit de Mitspa au-devant d’eux; il marchait en pleurant. Lorsqu’il les rencontra, il leur dit: Venez vers Guedalia, fils d’Achikam. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et quand ils furent au milieu de la ville, Ismaël, fils de Nethania, les égorgea et les jeta dans la citerne, avec l’aide des gens qui l’accompagnaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais il se trouva parmi eux dix hommes, qui dirent à Ismaël: Ne nous fais pas mourir, car nous avons des provisions cachées dans les champs, du froment, de l’orge, de l’huile et du miel. Alors il les épargna, et ne les fit pas mourir avec leurs frères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La citerne dans laquelle Ismaël jeta tous les cadavres des hommes qu’il tua près de Guedalia est celle qu’avait construite le roi Asa, lorsqu’il craignait Baescha, roi d’Israël; c’est cette citerne qu’Ismaël, fils de Nethania, remplit de cadavres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ismaël fit prisonniers tous ceux qui restaient à Mitspa, les filles du roi et tous ceux du peuple qui y demeuraient, et que Nebuzaradan, chef des gardes, avait confiés à Guedalia, fils d’Achikam; Ismaël, fils de Nethania, les emmena captifs, et partit pour passer chez les Ammonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jochanan, fils de Karéach, et tous les chefs des troupes qui étaient avec lui, furent informés de tout le mal qu’avait fait Ismaël, fils de Nethania. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils prirent tous les hommes, et se mirent en marche pour attaquer Ismaël, fils de Nethania. Ils le trouvèrent près des grandes eaux de Gabaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand tout le peuple qui était avec Ismaël vit Jochanan, fils de Karéach, et tous les chefs des troupes avec lui, il en eut de la joie; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et tout le peuple qu’Ismaël avait emmené de Mitspa se retourna, et vint se joindre à Jochanan, fils de Karéach. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais Ismaël, fils de Nethania, se sauva avec huit hommes devant Jochanan, et alla chez les Ammonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jochanan, fils de Karéach, et tous les chefs des troupes qui étaient avec lui, prirent tout le reste du peuple, et le délivrèrent des mains d’Ismaël, fils de Nethania, lorsqu’il l’emmenait de Mitspa, après avoir tué Guedalia, fils d’Achikam. Hommes de guerre, femmes, enfants, eunuques, Jochanan les ramena depuis Gabaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils se mirent en marche, et s’arrêtèrent à l’hôtellerie de Kimham près de Bethléhem, pour se retirer ensuite en Égypte, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: loin des Chaldéens dont ils avaient peur, parce qu’Ismaël, fils de Nethania, avait tué Guedalia, fils d’Achikam, que le roi de Babylone avait établi gouverneur du pays.
