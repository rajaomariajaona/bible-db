document_id: LUK.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Mission de soixante-dix disciples. Reproches aux villes impénitentes
  - type: heading
    content: 'V. 1-16: cf. Mt 10; 28:18-20. Mc 16:15, 16. (Mt 11:20-24. Hé 2:1-4.)'
  - type: text
    content: 'Après cela, le Seigneur désigna encore soixante-dix autres disciples, et il les envoya deux à deux devant lui dans toutes les villes et dans tous les lieux où lui-même devait aller. '
  '10':
  - type: note
    content: Mt 10:14. Mc 6:11. Lu 9:5.
  - type: text
    content: 'Mais dans quelque ville que vous entriez, et où l’on ne vous recevra pas, allez dans ses rues, et dites:'
  - type: text
    content: ' '
  '11':
  - type: note
    content: Ac 13:51; 18:6.
  - type: text
    content: Nous secouons contre vous la poussière même de votre ville qui s’est attachée à nos pieds; sachez cependant que le royaume de Dieu s’est approché.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Je vous dis qu’en ce jour Sodome sera traitée moins rigoureusement que cette ville-là.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Malheur à toi, Chorazin! Malheur à toi, Bethsaïda! Car, si les miracles qui ont été faits au milieu de vous avaient été faits dans Tyr et dans Sidon, il y a longtemps qu’elles se seraient repenties, en prenant le sac et la cendre.
  - type: text
    content: ' '
  '14':
  - type: text
    content: C’est pourquoi, au jour du jugement, Tyr et Sidon seront traitées moins rigoureusement que vous.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Et toi, Capernaüm, qui as été élevée jusqu’au ciel, tu seras abaissée jusqu’au séjour des morts.
  - type: text
    content: ' '
  '16':
  - type: note
    content: Mt 10:40. Mc 9:37. Jn 13:20.
  - type: text
    content: Celui qui vous écoute m’écoute, et celui qui vous rejette me rejette;
  - type: text
    content: ' '
  - type: note
    content: 1 Th 4:8.
  - type: text
    content: et celui qui me rejette rejette celui qui m’a envoyé.
  - type: heading
    content: Retour des disciples. Les choses divines révélées aux enfants
  - type: heading
    content: 'V. 17-24: cf. (Mc 6:12, 13, 30; 16:17-20.) Mt 11:25-27.'
  '17':
  - type: text
    content: 'Les soixante-dix revinrent avec joie, disant: Seigneur, les démons mêmes nous sont soumis en ton nom. '
  '18':
  - type: text
    content: 'Jésus leur dit: '
  - type: note
    content: Ap 12:8, 9.
  - type: text
    content: Je voyais Satan tomber du ciel comme un éclair.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Mc 16:18. Ac 28:5.
  - type: text
    content: Voici, je vous ai donné le pouvoir de marcher sur les serpents et les scorpions, et sur toute la puissance de l’ennemi; et rien ne pourra vous nuire.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Il leur dit: '
  - type: note
    content: Mt 9:37. Jn 4:35.
  - type: text
    content: La moisson est grande, mais il y a peu d’ouvriers.
  - type: text
    content: ' '
  - type: note
    content: 2 Th 3:1.
  - type: text
    content: Priez donc le maître de la moisson d’envoyer des ouvriers dans sa moisson.
  '20':
  - type: text
    content: Cependant, ne vous réjouissez pas de ce que les esprits vous sont soumis; mais réjouissez-vous
  - type: text
    content: ' '
  - type: note
    content: Ex 32:32. És 4:3. Da 12:1. Ph 4:3.
  - type: text
    content: de ce que vos noms sont écrits dans les cieux.
  - type: text
    content: ' '
  '21':
  - type: note
    content: Mt 11:25.
  - type: text
    content: 'En ce moment même, Jésus tressaillit de joie par le Saint-Esprit, et il dit: '
  - type: text
    content: Je te loue, Père, Seigneur du ciel et de la terre, de ce que tu as caché ces choses
  - type: text
    content: ' '
  - type: note
    content: Job 5:12. És 29:14. 1 Co 1:19; 2:7, 8. 2 Co 3:14.
  - type: text
    content: aux sages et aux intelligents, et de ce que tu les as révélées aux enfants. Oui, Père, je te loue de ce que tu l’as voulu ainsi.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Ps 8:7. Jn 3:35; 17:2. 1 Co 15:27. Ph 2:10. Hé 2:8.
  - type: text
    content: Toutes choses m’ont été données par mon Père, et personne ne connaît qui est le Fils, si ce n’est le Père, ni qui est le Père, si ce n’est le Fils et
  - type: text
    content: ' '
  - type: note
    content: Jn 1:18; 6:44, 46.
  - type: text
    content: celui à qui le Fils veut le révéler.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Et, se tournant vers les disciples, il leur dit en particulier: '
  - type: note
    content: Mt 13:16.
  - type: text
    content: Heureux les yeux qui voient ce que vous voyez!
  '24':
  - type: text
    content: ' '
  - type: note
    content: 1 Pi 1:10.
  - type: text
    content: Car je vous dis que beaucoup de prophètes et de rois ont désiré voir ce que vous voyez, et ne l’ont pas vu, entendre ce que vous entendez, et ne l’ont pas entendu.
  - type: heading
    content: Parabole du Samaritain
  - type: heading
    content: 'V. 25-37: cf. Mt 22:34-40; 7:12. Ro 13:8-10.'
  '25':
  - type: text
    content: 'Un docteur de la loi se leva, et dit à Jésus, pour l’éprouver: Maître, que dois-je faire pour hériter la vie éternelle? '
  '26':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: Qu’est-il écrit dans la loi? Qu’y lis-tu?
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Il répondit: '
  - type: note
    content: De 6:5; 10:12; 30:6.
  - type: text
    content: 'Tu aimeras le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme, de toute ta force, et de toute ta pensée; '
  - type: note
    content: Lé 19:18. Ro 13:9. Ga 5:14. Ja 2:8.
  - type: text
    content: et ton prochain comme toi-même.
  '28':
  - type: text
    content: ' '
  - type: text
    content: Tu as bien répondu,
  - type: text
    content: ' lui dit Jésus; '
  - type: text
    content: fais cela, et tu vivras.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Mais lui, voulant se justifier, dit à Jésus: Et qui est mon prochain? '
  '3':
  - type: text
    content: ' '
  - type: note
    content: Mt 10:16.
  - type: text
    content: Partez; voici, je vous envoie comme des agneaux au milieu des loups.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Jésus reprit la parole, et dit: '
  - type: text
    content: Un homme descendait de Jérusalem à Jéricho. Il tomba au milieu des brigands, qui le dépouillèrent, le chargèrent de coups, et s’en allèrent, le laissant à demi mort.
  '31':
  - type: text
    content: ' '
  - type: text
    content: Un sacrificateur, qui par hasard descendait par le même chemin, ayant vu cet homme, passa outre.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Un Lévite, qui arriva aussi dans ce lieu, l’ayant vu, passa outre.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Mais un Samaritain, qui voyageait, étant venu là, fut ému de compassion lorsqu’il le vit.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Il s’approcha, et banda ses plaies, en y versant de l’huile et du vin; puis il le mit sur sa propre monture, le conduisit à une hôtellerie, et prit soin de lui.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Le lendemain, il tira deux deniers, les donna à l’hôte, et dit: Aie soin de lui, et ce que tu dépenseras de plus, je te le rendrai à mon retour.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: Lequel de ces trois te semble avoir été le prochain de celui qui était tombé au milieu des brigands?
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'C’est celui qui a exercé la miséricorde envers lui, répondit le docteur de la loi. Et Jésus lui dit: '
  - type: text
    content: Va, et toi, fais de même.
  - type: heading
    content: Marthe et Marie
  - type: heading
    content: 'V. 38-42: cf. (Jn 11:1-5; 12:1-7.) Mt 6:33. Jé 15:16.'
  '38':
  - type: text
    content: 'Comme Jésus était en chemin avec ses disciples, il entra dans un village, et une femme, nommée Marthe, le reçut dans sa maison. '
  '39':
  - type: text
    content: 'Elle avait une sœur, nommée Marie, qui, '
  - type: note
    content: Ac 22:3.
  - type: text
    content: 's’étant assise aux pieds du Seigneur, écoutait sa parole. '
  '4':
  - type: note
    content: Mt 10:9. Mc 6:8. Lu 9:3; 22:35.
  - type: text
    content: Ne portez ni bourse, ni sac, ni souliers, et
  - type: text
    content: ' '
  - type: note
    content: 2 R 4:29.
  - type: text
    content: ne saluez personne en chemin.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Marthe, occupée à divers soins domestiques, survint et dit: Seigneur, cela ne te fait-il rien que ma sœur me laisse seule pour servir? Dis-lui donc de m’aider. '
  '41':
  - type: text
    content: 'Le Seigneur lui répondit: '
  - type: text
    content: Marthe, Marthe, tu t’inquiètes et tu t’agites pour beaucoup de choses.
  '42':
  - type: text
    content: ' '
  - type: text
    content: Une seule chose est nécessaire. Marie a choisi la bonne part,
  - type: text
    content: ' '
  - type: note
    content: Ps 27:4.
  - type: text
    content: qui ne lui sera point ôtée.
  '5':
  - type: note
    content: Mt 10:12. Mc 6:10.
  - type: text
    content: 'Dans quelque maison que vous entriez, dites d’abord: Que la paix soit sur cette maison!'
  - type: text
    content: ' '
  '6':
  - type: text
    content: Et s’il se trouve là un enfant de paix, votre paix reposera sur lui; sinon, elle reviendra à vous.
  - type: text
    content: ' '
  '7':
  - type: note
    content: 1 Co 10:27.
  - type: text
    content: Demeurez dans cette maison-là, mangeant et buvant ce qu’on vous donnera;
  - type: text
    content: ' '
  - type: note
    content: Lé 19:13. De 24:14; 25:4. Mt 10:10. 1 Co 9:4, 14. 1 Ti 5:18.
  - type: text
    content: car l’ouvrier mérite son salaire. N’allez pas de maison en maison.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Dans quelque ville que vous entriez, et où l’on vous recevra, mangez ce qui vous sera présenté,
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'guérissez les malades qui s’y trouveront, et dites-leur: Le royaume de Dieu s’est approché de vous.'
  - type: text
    content: ' '
