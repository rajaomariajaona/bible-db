document_id: 2CH.31,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Dispositions prises par Ézéchias pour régulariser les fonctions et les revenus des sacrificateurs et des Lévites
  - type: heading
    content: 'V. 1-21: cf. (No 18:8, etc. Né 13:10-14; 10:35-39.) 3 Jn 5.'
  - type: text
    content: 'Lorsque tout cela fut terminé, tous ceux d’Israël qui étaient présents partirent pour les villes de Juda, et '
  - type: note
    content: 2 R 18:4.
  - type: text
    content: 'ils brisèrent les statues, abattirent les idoles, et renversèrent entièrement les hauts lieux et les autels dans tout Juda et Benjamin et dans Éphraïm et Manassé. Puis tous les enfants d’Israël retournèrent dans leurs villes, chacun dans sa propriété. '
  '10':
  - type: text
    content: 'Alors le souverain sacrificateur Azaria, de la maison de Tsadok, lui répondit: Depuis qu’on a commencé d’apporter les offrandes dans la maison de l’Éternel, nous avons mangé, nous nous sommes rassasiés, et nous en avons beaucoup laissé, car l’Éternel a béni son peuple; et voici la grande quantité qu’il y a de reste. '
  '11':
  - type: text
    content: 'Ézéchias donna l’ordre de préparer des chambres dans la maison de l’Éternel; et on les prépara. '
  '12':
  - type: text
    content: 'On y apporta fidèlement les offrandes, la dîme, et les choses saintes. Le Lévite Conania en eut l’intendance, et son frère Schimeï était en second. '
  '13':
  - type: text
    content: 'Jehiel, Azazia, Nachath, Asaël, Jerimoth, Jozabad, Éliel, Jismakia, Machath et Benaja étaient employés sous la direction de Conania et de son frère Schimeï, d’après l’ordre du roi Ézéchias, et d’Azaria, chef de la maison de Dieu. '
  '14':
  - type: text
    content: 'Le Lévite Koré, fils de Jimna, portier de l’orient, avait l’intendance des dons volontaires faits à Dieu, pour distribuer ce qui était présenté à l’Éternel par élévation et les choses très saintes. '
  '15':
  - type: note
    content: Jos 21:9, etc.
  - type: text
    content: 'Dans les villes sacerdotales, Éden, Minjamin, Josué, Schemaeja, Amaria et Schecania étaient placés sous sa direction pour faire fidèlement les distributions à leurs frères, grands et petits, selon leurs divisions: '
  '16':
  - type: text
    content: 'aux mâles enregistrés depuis l’âge de trois ans et au-dessus; à tous ceux qui entraient journellement dans la maison de l’Éternel pour faire leur service selon leurs fonctions et selon leurs divisions; '
  '17':
  - type: text
    content: 'aux sacrificateurs enregistrés d’après leurs maisons paternelles, et aux Lévites '
  - type: note
    content: 1 Ch 23:27.
  - type: text
    content: 'de vingt ans et au-dessus, selon leurs fonctions et selon leurs divisions; '
  '18':
  - type: text
    content: 'à ceux de toute l’assemblée enregistrés avec tous leurs petits enfants, leurs femmes, leurs fils et leurs filles, car ils se consacraient fidèlement au service du sanctuaire. '
  '19':
  - type: text
    content: 'Et pour les fils d’Aaron, les sacrificateurs, qui demeuraient à la campagne dans les banlieues de leurs villes, il y avait dans chaque ville des hommes désignés par leurs noms pour distribuer les portions à tous les mâles des sacrificateurs et à tous les Lévites enregistrés. '
  '2':
  - type: text
    content: 'Ézéchias rétablit les classes des sacrificateurs et des Lévites d’après leurs divisions, chacun selon ses fonctions, sacrificateurs et Lévites, pour les holocaustes et les sacrifices d’actions de grâces, pour le service, pour les chants et les louanges, aux portes du camp de l’Éternel. '
  '20':
  - type: text
    content: 'Voilà ce que fit Ézéchias dans tout Juda; il fit ce qui est bien, ce qui est droit, ce qui est vrai, devant l’Éternel, son Dieu. '
  '21':
  - type: text
    content: Il agit de tout son cœur, et il réussit dans tout ce qu’il entreprit, en recherchant son Dieu, pour le service de la maison de Dieu, pour la loi et pour les commandements.
  '3':
  - type: text
    content: 'Le roi donna une portion de ses biens pour les holocaustes, pour les holocaustes du matin et du soir, et pour les holocaustes des sabbats, des nouvelles lunes et des fêtes, '
  - type: note
    content: No 28:29.
  - type: text
    content: 'comme il est écrit dans la loi de l’Éternel. '
  '4':
  - type: text
    content: 'Et il dit au peuple, aux habitants de Jérusalem, de donner la portion des sacrificateurs et des Lévites, afin qu’ils observassent fidèlement la loi de l’Éternel. '
  '5':
  - type: text
    content: 'Lorsque la chose fut répandue, les enfants d’Israël donnèrent en abondance les prémices du blé, du moût, de l’huile, du miel, et de tous les produits des champs; ils apportèrent aussi en abondance la dîme de tout. '
  '6':
  - type: text
    content: 'De même, les enfants d’Israël et de Juda qui demeuraient dans les villes de Juda donnèrent la dîme du gros et du menu bétail, et la dîme des choses saintes qui étaient consacrées à l’Éternel, leur Dieu, et dont on fit plusieurs tas. '
  '7':
  - type: text
    content: 'On commença à former les tas au troisième mois, et l’on acheva au septième mois. '
  '8':
  - type: text
    content: 'Ézéchias et les chefs vinrent voir les tas, et ils bénirent l’Éternel et son peuple d’Israël. '
  '9':
  - type: text
    content: 'Et Ézéchias interrogea les sacrificateurs et les Lévites au sujet de ces tas. '
