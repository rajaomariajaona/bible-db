document_id: 2CH.31
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dispositions prises par Ézéchias pour régulariser les fonctions et les revenus des sacrificateurs et des Lévites
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-21: cf. (No 18:8, etc. Né 13:10-14; 10:35-39.) 3 Jn 5.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque tout cela fut terminé, tous ceux d’Israël qui étaient présents partirent pour les villes de Juda, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 18:4
      metadata:
        usfm: 2KI.18.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ils brisèrent les statues, abattirent les idoles, et renversèrent entièrement les hauts lieux et les autels dans tout Juda et Benjamin et dans Éphraïm et Manassé. Puis tous les enfants d’Israël retournèrent dans leurs villes, chacun dans sa propriété. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ézéchias rétablit les classes des sacrificateurs et des Lévites d’après leurs divisions, chacun selon ses fonctions, sacrificateurs et Lévites, pour les holocaustes et les sacrifices d’actions de grâces, pour le service, pour les chants et les louanges, aux portes du camp de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le roi donna une portion de ses biens pour les holocaustes, pour les holocaustes du matin et du soir, et pour les holocaustes des sabbats, des nouvelles lunes et des fêtes, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 28:29
      metadata:
        usfm: NUM.28.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme il est écrit dans la loi de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et il dit au peuple, aux habitants de Jérusalem, de donner la portion des sacrificateurs et des Lévites, afin qu’ils observassent fidèlement la loi de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Lorsque la chose fut répandue, les enfants d’Israël donnèrent en abondance les prémices du blé, du moût, de l’huile, du miel, et de tous les produits des champs; ils apportèrent aussi en abondance la dîme de tout. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'De même, les enfants d’Israël et de Juda qui demeuraient dans les villes de Juda donnèrent la dîme du gros et du menu bétail, et la dîme des choses saintes qui étaient consacrées à l’Éternel, leur Dieu, et dont on fit plusieurs tas. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'On commença à former les tas au troisième mois, et l’on acheva au septième mois. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ézéchias et les chefs vinrent voir les tas, et ils bénirent l’Éternel et son peuple d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et Ézéchias interrogea les sacrificateurs et les Lévites au sujet de ces tas. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors le souverain sacrificateur Azaria, de la maison de Tsadok, lui répondit: Depuis qu’on a commencé d’apporter les offrandes dans la maison de l’Éternel, nous avons mangé, nous nous sommes rassasiés, et nous en avons beaucoup laissé, car l’Éternel a béni son peuple; et voici la grande quantité qu’il y a de reste. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ézéchias donna l’ordre de préparer des chambres dans la maison de l’Éternel; et on les prépara. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'On y apporta fidèlement les offrandes, la dîme, et les choses saintes. Le Lévite Conania en eut l’intendance, et son frère Schimeï était en second. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jehiel, Azazia, Nachath, Asaël, Jerimoth, Jozabad, Éliel, Jismakia, Machath et Benaja étaient employés sous la direction de Conania et de son frère Schimeï, d’après l’ordre du roi Ézéchias, et d’Azaria, chef de la maison de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le Lévite Koré, fils de Jimna, portier de l’orient, avait l’intendance des dons volontaires faits à Dieu, pour distribuer ce qui était présenté à l’Éternel par élévation et les choses très saintes. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jos 21:9, etc.
    marker-yv: yv-n
  - type: text
    text: 'Dans les villes sacerdotales, Éden, Minjamin, Josué, Schemaeja, Amaria et Schecania étaient placés sous sa direction pour faire fidèlement les distributions à leurs frères, grands et petits, selon leurs divisions: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'aux mâles enregistrés depuis l’âge de trois ans et au-dessus; à tous ceux qui entraient journellement dans la maison de l’Éternel pour faire leur service selon leurs fonctions et selon leurs divisions; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'aux sacrificateurs enregistrés d’après leurs maisons paternelles, et aux Lévites '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 23:27
      metadata:
        usfm: 1CH.23.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de vingt ans et au-dessus, selon leurs fonctions et selon leurs divisions; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'à ceux de toute l’assemblée enregistrés avec tous leurs petits enfants, leurs femmes, leurs fils et leurs filles, car ils se consacraient fidèlement au service du sanctuaire. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et pour les fils d’Aaron, les sacrificateurs, qui demeuraient à la campagne dans les banlieues de leurs villes, il y avait dans chaque ville des hommes désignés par leurs noms pour distribuer les portions à tous les mâles des sacrificateurs et à tous les Lévites enregistrés. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Voilà ce que fit Ézéchias dans tout Juda; il fit ce qui est bien, ce qui est droit, ce qui est vrai, devant l’Éternel, son Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il agit de tout son cœur, et il réussit dans tout ce qu’il entreprit, en recherchant son Dieu, pour le service de la maison de Dieu, pour la loi et pour les commandements.
