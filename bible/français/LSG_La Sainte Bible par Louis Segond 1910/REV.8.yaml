document_id: REV.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ouverture du septième sceau. Sept anges avec sept trompettes. Les six premières trompettes
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. Lu 1:9, 10. Ja 5:16-18. Ap 5:8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quand il ouvrit le septième sceau, il y eut dans le ciel un silence d’environ une demi-heure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et je vis les sept anges qui se tiennent devant Dieu, et sept trompettes leur furent données. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et un autre ange vint, et il se tint sur l’autel, ayant un encensoir d’or; on lui donna beaucoup de parfums, afin qu’il les offrît, avec '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 5:8
      metadata:
        usfm: REV.5.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les prières de tous les saints, sur l’autel d’or qui est devant le trône. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 141:2
      metadata:
        usfm: PSA.141.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'La fumée des parfums monta, avec les prières des saints, de la main de l’ange devant Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Et l’ange prit l’encensoir, le remplit du feu de l’autel, et le jeta sur la terre. Et il y eut des voix, des tonnerres, des éclairs, et un tremblement de terre.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-13: cf. Ap 14:7; 16:1-9. (Ex 9:22-25; 7:19-21; 10:21-23.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et les sept anges qui avaient les sept trompettes se préparèrent à en sonner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le premier sonna de la trompette. Et il y eut de la grêle et du feu mêlés de sang, qui furent jetés sur la terre; et le tiers de la terre fut brûlé, et le tiers des arbres fut brûlé, et toute herbe verte fut brûlée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le second ange sonna de la trompette. Et quelque chose comme une grande montagne embrasée par le feu fut jeté dans la mer; et le tiers de la mer devint du sang, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et le tiers des créatures qui étaient dans la mer et qui avaient vie mourut, et le tiers des navires périt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le troisième ange sonna de la trompette. Et il tomba du ciel une grande étoile ardente comme un flambeau; et elle tomba sur le tiers des fleuves et sur les sources des eaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le nom de cette étoile est Absinthe; et le tiers des eaux fut changé en absinthe, et beaucoup d’hommes moururent par les eaux, parce qu’elles étaient devenues amères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le quatrième ange sonna de la trompette. Et le tiers du soleil fut frappé, et le tiers de la lune, et le tiers des étoiles, afin que le tiers en fût obscurci, et que le jour perdît un tiers de sa clarté, et la nuit de même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je regardai, et j’entendis un aigle qui volait au milieu du ciel, disant d’une voix forte: Malheur, malheur, malheur aux habitants de la terre, à cause des autres sons de la trompette des trois anges qui vont sonner!'
