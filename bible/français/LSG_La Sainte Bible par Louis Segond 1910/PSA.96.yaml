document_id: PSA.96,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 1 Ch 16:23-33. (Ps 97; 98; 67.)
  - type: text
    content: Chantez à l’Éternel un cantique nouveau!
  - type: text
    content: Chantez à l’Éternel, vous tous, habitants de la terre!
  '10':
  - type: text
    content: 'Dites parmi les nations: L’Éternel règne;'
  - type: text
    content: Aussi le monde est ferme, il ne chancelle pas;
  - type: text
    content: L’Éternel juge les peuples avec droiture.
  '11':
  - type: text
    content: Que les cieux se réjouissent, et que la terre soit dans l’allégresse,
  - type: text
    content: Que la mer retentisse avec tout ce qu’elle contient,
  '12':
  - type: text
    content: Que la campagne s’égaie avec tout ce qu’elle renferme,
  - type: text
    content: Que tous les arbres des forêts poussent des cris de joie,
  '13':
  - type: text
    content: Devant l’Éternel! Car il vient,
  - type: text
    content: Car il vient pour juger la terre;
  - type: note
    content: Ps 98:9. Ap 19:11.
  - type: text
    content: Il jugera le monde avec justice,
  - type: text
    content: Et les peuples selon sa fidélité.
  '2':
  - type: text
    content: Chantez à l’Éternel, bénissez son nom,
  - type: text
    content: Annoncez de jour en jour son salut!
  '3':
  - type: text
    content: Racontez parmi les nations sa gloire,
  - type: text
    content: Parmi tous les peuples ses merveilles!
  '4':
  - type: text
    content: Car l’Éternel est grand et très digne de louange,
  - type: text
    content: Il est redoutable par-dessus tous les dieux;
  '5':
  - type: text
    content: Car tous les dieux des peuples sont des idoles,
  - type: text
    content: Et l’Éternel a fait les cieux.
  '6':
  - type: text
    content: La splendeur et la magnificence sont devant sa face,
  - type: text
    content: La gloire et la majesté sont dans son sanctuaire.
  '7':
  - type: text
    content: Familles des peuples, rendez à l’Éternel,
  - type: text
    content: Rendez à l’Éternel gloire et honneur!
  '8':
  - type: text
    content: Rendez à l’Éternel gloire pour son nom!
  - type: text
    content: Apportez des offrandes, et entrez dans ses parvis!
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ps 29:2.
  - type: text
    content: Prosternez-vous devant l’Éternel avec des ornements sacrés.
  - type: text
    content: Tremblez devant lui, vous tous, habitants de la terre!
