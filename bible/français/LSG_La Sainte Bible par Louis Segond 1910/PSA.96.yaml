document_id: PSA.96
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 1 Ch 16:23-33. (Ps 97; 98; 67.)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Chantez à l’Éternel un cantique nouveau!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chantez à l’Éternel, vous tous, habitants de la terre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Chantez à l’Éternel, bénissez son nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Annoncez de jour en jour son salut!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Racontez parmi les nations sa gloire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parmi tous les peuples ses merveilles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car l’Éternel est grand et très digne de louange,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est redoutable par-dessus tous les dieux;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Car tous les dieux des peuples sont des idoles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’Éternel a fait les cieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La splendeur et la magnificence sont devant sa face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La gloire et la majesté sont dans son sanctuaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Familles des peuples, rendez à l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rendez à l’Éternel gloire et honneur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Rendez à l’Éternel gloire pour son nom!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Apportez des offrandes, et entrez dans ses parvis!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 29:2
      metadata:
        usfm: PSA.29.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Prosternez-vous devant l’Éternel avec des ornements sacrés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tremblez devant lui, vous tous, habitants de la terre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dites parmi les nations: L’Éternel règne;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi le monde est ferme, il ne chancelle pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel juge les peuples avec droiture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Que les cieux se réjouissent, et que la terre soit dans l’allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que la mer retentisse avec tout ce qu’elle contient,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Que la campagne s’égaie avec tout ce qu’elle renferme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tous les arbres des forêts poussent des cris de joie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Devant l’Éternel! Car il vient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il vient pour juger la terre;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 98:9
      metadata:
        usfm: PSA.98.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 19:11
      metadata:
        usfm: REV.19.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il jugera le monde avec justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les peuples selon sa fidélité.
