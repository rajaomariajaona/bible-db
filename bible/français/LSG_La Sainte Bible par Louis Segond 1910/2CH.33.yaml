document_id: 2CH.33
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manassé et Amon, rois de Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-20: cf. 2 R 21:1-18. (Ps 107:10-16; 119:67, 71. És 55:7.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Manassé avait douze ans lorsqu’il devint roi, et il régna cinquante-cinq ans à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l’Éternel, selon les abominations des nations que l’Éternel avait chassées devant les enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il rebâtit les hauts lieux '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 18:4
      metadata:
        usfm: 2KI.18.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 31:1
      metadata:
        usfm: 2CH.31.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 32:12
      metadata:
        usfm: 2CH.32.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’Ézéchias, son père, avait renversés; il éleva des autels aux Baals, il fit des idoles d’Astarté, et il se prosterna devant toute l’armée des cieux et la servit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 21:4
      metadata:
        usfm: 2KI.21.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il bâtit des autels dans la maison de l’Éternel, quoique l’Éternel eût dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 12:5
      metadata:
        usfm: DEU.12.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: DEU.12.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:13
      metadata:
        usfm: 2SA.7.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 8:29
      metadata:
        usfm: 1KI.8.29
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:3
      metadata:
        usfm: 1KI.9.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 7:16
      metadata:
        usfm: 2CH.7.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 132:13
      metadata:
        usfm: PSA.132.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: PSA.132.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 32:34
      metadata:
        usfm: JER.32.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est dans Jérusalem que sera mon nom à perpétuité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il bâtit des autels à toute l’armée des cieux dans les deux parvis de la maison de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il fit passer ses fils '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 18:21
      metadata:
        usfm: LEV.18.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 18:10
      metadata:
        usfm: DEU.18.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 16:3
      metadata:
        usfm: 2KI.16.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 28:3
      metadata:
        usfm: 2CH.28.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'par le feu dans la vallée des fils de Hinnom; il observait les nuages et les serpents pour en tirer des pronostics, il s’adonnait à la magie, et il établit des gens qui évoquaient les esprits et qui prédisaient l’avenir. Il fit de plus en plus ce qui est mal aux yeux de l’Éternel, afin de l’irriter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il plaça l’image taillée de l’idole qu’il avait faite dans la maison de Dieu, de laquelle Dieu avait dit à David et à Salomon, son fils: C’est dans cette maison, et c’est dans Jérusalem que j’ai choisie parmi toutes les tribus d’Israël, que je veux à toujours placer mon nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je ne ferai plus sortir Israël du pays que j’ai destiné à vos pères, pourvu seulement qu’ils aient soin de mettre en pratique tout ce que je leur ai commandé, selon toute la loi, les préceptes et les ordonnances prescrits par Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais Manassé fut cause que Juda et les habitants de Jérusalem s’égarèrent et firent le mal plus que les nations que l’Éternel avait détruites devant les enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L’Éternel parla à Manassé et à son peuple, et ils n’y firent point attention. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:36
      metadata:
        usfm: DEU.28.36
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 36:8
      metadata:
        usfm: JOB.36.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’Éternel fit venir contre eux les chefs de l’armée du roi d’Assyrie, qui saisirent Manassé et le mirent dans les fers; ils le lièrent avec des chaînes d’airain, et le menèrent à Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsqu’il fut dans la détresse, il implora l’Éternel, son Dieu, et il s’humilia profondément devant le Dieu de ses pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il lui adressa ses prières; et l’Éternel, se laissant fléchir, exauça ses supplications, et le ramena à Jérusalem dans son royaume. Et Manassé reconnut que l’Éternel est Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Après cela, il bâtit en dehors de la ville de David, à l’occident, vers Guihon dans la vallée, un mur qui se prolongeait jusqu’à la porte des poissons et dont il entoura la colline, et il l’éleva à une grande hauteur; il mit aussi des chefs militaires dans toutes les villes fortes de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il fit disparaître de la maison de l’Éternel les dieux étrangers et l’idole, et il renversa tous les autels qu’il avait bâtis sur la montagne de la maison de l’Éternel et à Jérusalem; et il les jeta hors de la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il rétablit l’autel de l’Éternel et y offrit des sacrifices d’actions de grâces et de reconnaissance, et il ordonna à Juda de servir l’Éternel, le Dieu d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le peuple sacrifiait bien encore sur les hauts lieux, mais seulement à l’Éternel, son Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le reste des actions de Manassé, sa prière à son Dieu, et les paroles des prophètes qui lui parlèrent au nom de l’Éternel, le Dieu d’Israël, cela est écrit dans les actes des rois d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Sa prière et la manière dont Dieu l’exauça, ses péchés et ses infidélités, les places où il bâtit des hauts lieux et dressa des idoles et des images taillées avant de s’être humilié, cela est écrit dans le livre de Hozaï. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Manassé se coucha avec ses pères, et on l’enterra dans sa maison. Et Amon, son fils, régna à sa place.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-25: cf. 2 R 21:19-26. Jé 7:26.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 21:19
      metadata:
        usfm: 2KI.21.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Amon avait vingt-deux ans lorsqu’il devint roi, et il régna deux ans à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l’Éternel, comme avait fait Manassé, son père; il sacrifia à toutes les images taillées qu’avait faites Manassé, son père, et il les servit; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'et il ne s’humilia pas devant l’Éternel, comme s’était humilié Manassé, son père, car lui, Amon, se rendit de plus en plus coupable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ses serviteurs conspirèrent contre lui, et le firent mourir dans sa maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mais le peuple du pays frappa tous ceux qui avaient conspiré contre le roi Amon; et le peuple du pays établit roi Josias, son fils, à sa place.
