document_id: JOS.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les six villes de refuge
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. (No 35:9, etc. De 19:1-13.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Josué, et dit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Parle aux enfants d’Israël, et dis: Établissez-vous, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 21:13
      metadata:
        usfm: EXO.21.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 35:6
      metadata:
        usfm: NUM.35.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 19:1
      metadata:
        usfm: DEU.19.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: DEU.19.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme je vous l’ai ordonné par Moïse, des villes de refuge, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'où pourra s’enfuir le meurtrier qui aura tué quelqu’un involontairement, sans intention; elles vous serviront de refuge contre le vengeur du sang. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 35:22
      metadata:
        usfm: NUM.35.22
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '23'
      metadata:
        usfm: NUM.35.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 19:4
      metadata:
        usfm: DEU.19.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: DEU.19.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le meurtrier s’enfuira vers l’une de ces villes, s’arrêtera à l’entrée de la porte de la ville, et exposera son cas aux anciens de cette ville; ils le recueilleront auprès d’eux dans la ville, et lui donneront une demeure, afin qu’il habite avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Si le vengeur du sang le poursuit, ils ne livreront point le meurtrier entre ses mains; car c’est sans le vouloir qu’il a tué son prochain, et sans avoir été auparavant son ennemi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il restera dans cette ville jusqu’à ce qu’il ait comparu devant l’assemblée pour être jugé, jusqu’à la mort du souverain sacrificateur alors en fonctions. A cette époque, le meurtrier s’en retournera et rentrera dans sa ville et dans sa maison, dans la ville d’où il s’était enfui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils consacrèrent Kédesch, en Galilée, dans la montagne de Nephthali; Sichem, dans la montagne d’Éphraïm; et Kirjath-Arba, qui est Hébron, dans la montagne de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et de l’autre côté du Jourdain, à l’orient de Jéricho, ils choisirent '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:43
      metadata:
        usfm: DEU.4.43
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Betser, dans le désert, dans la plaine, dans la tribu de Ruben; Ramoth, en Galaad, dans la tribu de Gad; et Golan, en Basan, dans la tribu de Manassé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Telles furent les villes désignées pour tous les enfants d’Israël et pour l’étranger en séjour au milieu d’eux, afin que celui qui aurait tué quelqu’un involontairement pût s’y réfugier, et qu’il ne mourût pas de la main du vengeur du sang avant d’avoir comparu devant l’assemblée.
