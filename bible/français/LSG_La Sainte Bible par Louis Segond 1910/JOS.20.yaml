document_id: JOS.20,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les six villes de refuge
  - type: heading
    content: 'V. 1-9: cf. (No 35:9, etc. De 19:1-13.)'
  - type: text
    content: 'L’Éternel parla à Josué, et dit: '
  '2':
  - type: text
    content: 'Parle aux enfants d’Israël, et dis: Établissez-vous, '
  - type: note
    content: Ex 21:13. No 35:6. De 19:1, 2.
  - type: text
    content: 'comme je vous l’ai ordonné par Moïse, des villes de refuge, '
  '3':
  - type: text
    content: 'où pourra s’enfuir le meurtrier qui aura tué quelqu’un involontairement, sans intention; elles vous serviront de refuge contre le vengeur du sang. '
  '4':
  - type: note
    content: No 35:22, 23. De 19:4, 5.
  - type: text
    content: 'Le meurtrier s’enfuira vers l’une de ces villes, s’arrêtera à l’entrée de la porte de la ville, et exposera son cas aux anciens de cette ville; ils le recueilleront auprès d’eux dans la ville, et lui donneront une demeure, afin qu’il habite avec eux. '
  '5':
  - type: text
    content: 'Si le vengeur du sang le poursuit, ils ne livreront point le meurtrier entre ses mains; car c’est sans le vouloir qu’il a tué son prochain, et sans avoir été auparavant son ennemi. '
  '6':
  - type: text
    content: 'Il restera dans cette ville jusqu’à ce qu’il ait comparu devant l’assemblée pour être jugé, jusqu’à la mort du souverain sacrificateur alors en fonctions. A cette époque, le meurtrier s’en retournera et rentrera dans sa ville et dans sa maison, dans la ville d’où il s’était enfui. '
  '7':
  - type: text
    content: 'Ils consacrèrent Kédesch, en Galilée, dans la montagne de Nephthali; Sichem, dans la montagne d’Éphraïm; et Kirjath-Arba, qui est Hébron, dans la montagne de Juda. '
  '8':
  - type: text
    content: 'Et de l’autre côté du Jourdain, à l’orient de Jéricho, ils choisirent '
  - type: note
    content: De 4:43.
  - type: text
    content: 'Betser, dans le désert, dans la plaine, dans la tribu de Ruben; Ramoth, en Galaad, dans la tribu de Gad; et Golan, en Basan, dans la tribu de Manassé. '
  '9':
  - type: text
    content: Telles furent les villes désignées pour tous les enfants d’Israël et pour l’étranger en séjour au milieu d’eux, afin que celui qui aurait tué quelqu’un involontairement pût s’y réfugier, et qu’il ne mourût pas de la main du vengeur du sang avant d’avoir comparu devant l’assemblée.
