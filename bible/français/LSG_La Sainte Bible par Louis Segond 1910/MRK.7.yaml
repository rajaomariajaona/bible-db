document_id: MRK.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les pharisiens et la tradition
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. (Mt 15:1-9.) Lu 11:37-41.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 15:1
      metadata:
        usfm: MAT.15.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les pharisiens et quelques scribes, venus de Jérusalem, s’assemblèrent auprès de Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils virent quelques-uns de ses disciples prendre leurs repas avec des mains impures, c’est-à-dire, non lavées. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Or, les pharisiens et tous les Juifs ne mangent pas sans s’être lavé soigneusement les mains, conformément à la tradition des anciens; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et, quand ils reviennent de la place publique, ils ne mangent qu’après s’être purifiés. Ils ont encore beaucoup d’autres observances traditionnelles, comme le lavage des coupes, des cruches et des vases d’airain. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et les pharisiens et les scribes lui demandèrent: Pourquoi tes disciples ne suivent-ils pas la tradition des anciens, mais prennent-ils leurs repas avec des mains impures? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jésus leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Hypocrites, Ésaïe a bien prophétisé sur vous, ainsi qu’il est écrit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 29:13
      metadata:
        usfm: ISA.29.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 33:31
      metadata:
        usfm: EZK.33.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce peuple m’honore des lèvres,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais son cœur est éloigné de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 15:9
      metadata:
        usfm: MAT.15.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 2:18
      metadata:
        usfm: COL.2.18
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: COL.2.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 1:14
      metadata:
        usfm: TIT.1.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est en vain qu’ils m’honorent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En donnant des préceptes qui sont des commandements d’hommes.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous abandonnez le commandement de Dieu, et vous observez la tradition des hommes.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il leur dit encore: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous anéantissez fort bien le commandement de Dieu, pour garder votre tradition.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Car Moïse a dit:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:12
      metadata:
        usfm: EXO.20.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:16
      metadata:
        usfm: DEU.5.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 6:2
      metadata:
        usfm: EPH.6.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Honore ton père et ta mère; et:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 21:17
      metadata:
        usfm: EXO.21.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 20:9
      metadata:
        usfm: LEV.20.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 27:16
      metadata:
        usfm: DEU.27.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 20:20
      metadata:
        usfm: PRO.20.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui maudira son père ou sa mère sera puni de mort.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais vous, vous dites: Si un homme dit à son père ou à sa mère: Ce dont j’aurais pu t’assister est corban, c’est-à-dire, une offrande à Dieu,'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: vous ne le laissez plus rien faire pour son père ou pour sa mère,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 15:6
      metadata:
        usfm: MAT.15.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 4:3
      metadata:
        usfm: 1TI.4.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 3:2
      metadata:
        usfm: 2TI.3.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: annulant ainsi la parole de Dieu par votre tradition, que vous avez établie. Et vous faites beaucoup d’autres choses semblables.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-23: cf. Mt 15:10-20. (Ga 5:19-21. Jé 4:14. Ps 51:12.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 15:10
      metadata:
        usfm: MAT.15.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ensuite, ayant de nouveau appelé la foule à lui, il lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Écoutez-moi tous, et comprenez.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:15
      metadata:
        usfm: ACT.10.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 14:17
      metadata:
        usfm: ROM.14.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: ROM.14.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 1:15
      metadata:
        usfm: TIT.1.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il n’est hors de l’homme rien qui, entrant en lui, puisse le souiller; mais ce qui sort de l’homme, c’est ce qui le souille.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si quelqu’un a des oreilles pour entendre, qu’il entende.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 15:15
      metadata:
        usfm: MAT.15.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu’il fut entré dans la maison, loin de la foule, ses disciples l’interrogèrent sur cette parabole. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous aussi, êtes-vous donc sans intelligence? Ne comprenez-vous pas que rien de ce qui du dehors entre dans l’homme ne peut le souiller?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car cela n’entre pas dans son cœur, mais dans son ventre, puis s’en va dans les lieux secrets, qui purifient tous les aliments.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il dit encore: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce qui sort de l’homme, c’est ce qui souille l’homme.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 6:5
      metadata:
        usfm: GEN.6.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:21
      metadata:
        usfm: GEN.8.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 6:14
      metadata:
        usfm: PRO.6.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 17:9
      metadata:
        usfm: JER.17.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car c’est du dedans, c’est du cœur des hommes, que sortent les mauvaises pensées, les adultères, les impudicités, les meurtres,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: les vols, les cupidités, les méchancetés, la fraude, le dérèglement, le regard envieux, la calomnie, l’orgueil, la folie.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Toutes ces choses mauvaises sortent du dedans, et souillent l’homme.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus sur le territoire de Tyr et de Sidon. La femme cananéenne
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 24-30: cf. Mt 15:21-28. (Ge 32:24-29.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 15:21
      metadata:
        usfm: MAT.15.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus, étant parti de là, s’en alla dans le territoire de Tyr et de Sidon. Il entra dans une maison, désirant que personne ne le sût; mais il ne put rester caché. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Car une femme, dont la fille était possédée d’un esprit impur, entendit parler de lui, et vint se jeter à ses pieds. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Cette femme était grecque, syro-phénicienne d’origine. Elle le pria de chasser le démon hors de sa fille. Jésus lui dit:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Laisse d’abord les enfants se rassasier; car il n’est pas bien de prendre le pain des enfants, et de le jeter aux petits chiens.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Oui, Seigneur, lui répondit-elle, mais les petits chiens, sous la table, mangent les miettes des enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Alors il lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: à cause de cette parole, va, le démon est sorti de ta fille.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Et, quand elle rentra dans sa maison, elle trouva l’enfant couchée sur le lit, le démon étant sorti.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus de retour vers la mer de Galilée. Guérison d’un sourd-muet
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 31-37: cf. Mt 15:29-31. És 35:4-6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 15:29
      metadata:
        usfm: MAT.15.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus quitta le territoire de Tyr, et revint par Sidon vers la mer de Galilée, en traversant le pays de la Décapole. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:32
      metadata:
        usfm: MAT.9.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 11:14
      metadata:
        usfm: LUK.11.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'On lui amena un sourd, qui avait de la difficulté à parler, et on le pria de lui imposer les mains. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il le prit à part loin de la foule, lui mit les doigts dans les oreilles, et lui toucha la langue avec sa propre salive; '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'puis, levant les yeux au ciel, il soupira, et dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Éphphatha,
  - type: text
    text: ' c’est-à-dire, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ouvre-toi.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Aussitôt ses oreilles s’ouvrirent, sa langue se délia, et il parla très bien. '
  - type: usfm
    marker: v
