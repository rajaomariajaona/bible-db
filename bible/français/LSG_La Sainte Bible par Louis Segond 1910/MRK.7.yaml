document_id: MRK.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les pharisiens et la tradition
  - type: heading
    content: 'V. 1-13: cf. (Mt 15:1-9.) Lu 11:37-41.'
  - type: text
    content: ' '
  - type: note
    content: Mt 15:1.
  - type: text
    content: 'Les pharisiens et quelques scribes, venus de Jérusalem, s’assemblèrent auprès de Jésus. '
  '10':
  - type: text
    content: ' '
  - type: text
    content: 'Car Moïse a dit:'
  - type: text
    content: ' '
  - type: note
    content: Ex 20:12. De 5:16. Ép 6:2.
  - type: text
    content: 'Honore ton père et ta mère; et:'
  - type: text
    content: ' '
  - type: note
    content: Ex 21:17. Lé 20:9. De 27:16. Pr 20:20.
  - type: text
    content: Celui qui maudira son père ou sa mère sera puni de mort.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Mais vous, vous dites: Si un homme dit à son père ou à sa mère: Ce dont j’aurais pu t’assister est corban, c’est-à-dire, une offrande à Dieu,'
  - type: text
    content: ' '
  '12':
  - type: text
    content: vous ne le laissez plus rien faire pour son père ou pour sa mère,
  - type: text
    content: ' '
  '13':
  - type: note
    content: Mt 15:6. 1 Ti 4:3. 2 Ti 3:2.
  - type: text
    content: annulant ainsi la parole de Dieu par votre tradition, que vous avez établie. Et vous faites beaucoup d’autres choses semblables.
  - type: heading
    content: 'V. 14-23: cf. Mt 15:10-20. (Ga 5:19-21. Jé 4:14. Ps 51:12.)'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Mt 15:10.
  - type: text
    content: 'Ensuite, ayant de nouveau appelé la foule à lui, il lui dit: '
  - type: text
    content: Écoutez-moi tous, et comprenez.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ac 10:15. Ro 14:17, 20. Tit 1:15.
  - type: text
    content: Il n’est hors de l’homme rien qui, entrant en lui, puisse le souiller; mais ce qui sort de l’homme, c’est ce qui le souille.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Si quelqu’un a des oreilles pour entendre, qu’il entende.
  - type: text
    content: ' '
  '17':
  - type: note
    content: Mt 15:15.
  - type: text
    content: 'Lorsqu’il fut entré dans la maison, loin de la foule, ses disciples l’interrogèrent sur cette parabole. '
  '18':
  - type: text
    content: 'Il leur dit: '
  - type: text
    content: Vous aussi, êtes-vous donc sans intelligence? Ne comprenez-vous pas que rien de ce qui du dehors entre dans l’homme ne peut le souiller?
  '19':
  - type: text
    content: ' '
  - type: text
    content: Car cela n’entre pas dans son cœur, mais dans son ventre, puis s’en va dans les lieux secrets, qui purifient tous les aliments.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Ils virent quelques-uns de ses disciples prendre leurs repas avec des mains impures, c’est-à-dire, non lavées. '
  '20':
  - type: text
    content: 'Il dit encore: '
  - type: text
    content: Ce qui sort de l’homme, c’est ce qui souille l’homme.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ge 6:5; 8:21. Pr 6:14. Jé 17:9.
  - type: text
    content: Car c’est du dedans, c’est du cœur des hommes, que sortent les mauvaises pensées, les adultères, les impudicités, les meurtres,
  - type: text
    content: ' '
  '22':
  - type: text
    content: les vols, les cupidités, les méchancetés, la fraude, le dérèglement, le regard envieux, la calomnie, l’orgueil, la folie.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Toutes ces choses mauvaises sortent du dedans, et souillent l’homme.
  - type: heading
    content: Jésus sur le territoire de Tyr et de Sidon. La femme cananéenne
  - type: heading
    content: 'V. 24-30: cf. Mt 15:21-28. (Ge 32:24-29.)'
  '24':
  - type: text
    content: ' '
  - type: note
    content: Mt 15:21.
  - type: text
    content: 'Jésus, étant parti de là, s’en alla dans le territoire de Tyr et de Sidon. Il entra dans une maison, désirant que personne ne le sût; mais il ne put rester caché. '
  '25':
  - type: text
    content: 'Car une femme, dont la fille était possédée d’un esprit impur, entendit parler de lui, et vint se jeter à ses pieds. '
  '26':
  - type: text
    content: 'Cette femme était grecque, syro-phénicienne d’origine. Elle le pria de chasser le démon hors de sa fille. Jésus lui dit:'
  '27':
  - type: text
    content: ' '
  - type: text
    content: Laisse d’abord les enfants se rassasier; car il n’est pas bien de prendre le pain des enfants, et de le jeter aux petits chiens.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Oui, Seigneur, lui répondit-elle, mais les petits chiens, sous la table, mangent les miettes des enfants. '
  '29':
  - type: text
    content: 'Alors il lui dit: '
  - type: text
    content: à cause de cette parole, va, le démon est sorti de ta fille.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Or, les pharisiens et tous les Juifs ne mangent pas sans s’être lavé soigneusement les mains, conformément à la tradition des anciens; '
  '30':
  - type: text
    content: Et, quand elle rentra dans sa maison, elle trouva l’enfant couchée sur le lit, le démon étant sorti.
  - type: heading
    content: Jésus de retour vers la mer de Galilée. Guérison d’un sourd-muet
  - type: heading
    content: 'V. 31-37: cf. Mt 15:29-31. És 35:4-6.'
  '31':
  - type: text
    content: ' '
  - type: note
    content: Mt 15:29.
  - type: text
    content: 'Jésus quitta le territoire de Tyr, et revint par Sidon vers la mer de Galilée, en traversant le pays de la Décapole. '
  '32':
  - type: note
    content: Mt 9:32. Lu 11:14.
  - type: text
    content: 'On lui amena un sourd, qui avait de la difficulté à parler, et on le pria de lui imposer les mains. '
  '33':
  - type: text
    content: 'Il le prit à part loin de la foule, lui mit les doigts dans les oreilles, et lui toucha la langue avec sa propre salive; '
  '34':
  - type: text
    content: 'puis, levant les yeux au ciel, il soupira, et dit: '
  - type: text
    content: Éphphatha,
  - type: text
    content: ' c’est-à-dire, '
  - type: text
    content: ouvre-toi.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Aussitôt ses oreilles s’ouvrirent, sa langue se délia, et il parla très bien. '
  '36':
  - type: text
    content: 'Jésus leur recommanda de n’en parler à personne; mais plus il le leur recommanda, plus ils le publièrent. '
  '37':
  - type: text
    content: 'Ils étaient dans le plus grand étonnement, et disaient: '
  - type: note
    content: Ge 1:31.
  - type: text
    content: Il fait tout à merveille; même il fait entendre les sourds, et parler les muets.
  '4':
  - type: text
    content: 'et, quand ils reviennent de la place publique, ils ne mangent qu’après s’être purifiés. Ils ont encore beaucoup d’autres observances traditionnelles, comme le lavage des coupes, des cruches et des vases d’airain. '
  '5':
  - type: text
    content: 'Et les pharisiens et les scribes lui demandèrent: Pourquoi tes disciples ne suivent-ils pas la tradition des anciens, mais prennent-ils leurs repas avec des mains impures? '
  '6':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: 'Hypocrites, Ésaïe a bien prophétisé sur vous, ainsi qu’il est écrit:'
  - type: note
    content: És 29:13. Éz 33:31.
  - type: text
    content: Ce peuple m’honore des lèvres,
  - type: text
    content: Mais son cœur est éloigné de moi.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Mt 15:9. Col 2:18, 20. Tit 1:14.
  - type: text
    content: C’est en vain qu’ils m’honorent,
  - type: text
    content: En donnant des préceptes qui sont des commandements d’hommes.
  '8':
  - type: text
    content: ' '
  - type: text
    content: Vous abandonnez le commandement de Dieu, et vous observez la tradition des hommes.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Il leur dit encore: '
  - type: text
    content: Vous anéantissez fort bien le commandement de Dieu, pour garder votre tradition.
