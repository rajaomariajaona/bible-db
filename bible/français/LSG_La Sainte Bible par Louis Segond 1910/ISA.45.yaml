document_id: ISA.45,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-8: cf. És 44:26-28; 13:1-5; 43:9-14.'
  - type: text
    content: Ainsi parle l’Éternel à son oint, à Cyrus,
  - type: text
    content: Qu’il tient par la main,
  - type: text
    content: Pour terrasser les nations devant lui,
  - type: text
    content: Et pour relâcher la ceinture des rois,
  - type: text
    content: Pour lui ouvrir les portes,
  - type: text
    content: Afin qu’elles ne soient plus fermées;
  '10':
  - type: text
    content: 'Malheur à qui dit à son père: Pourquoi m’as-tu engendré?'
  - type: text
    content: 'Et à sa mère: Pourquoi m’as-tu enfanté?'
  '11':
  - type: text
    content: 'Ainsi parle l’Éternel, le Saint d’Israël, et son créateur:'
  - type: text
    content: Veut-on me questionner sur l’avenir,
  - type: text
    content: Me donner des ordres sur mes enfants et sur l’œuvre de mes mains?
  '12':
  - type: text
    content: C’est moi qui ai fait la terre,
  - type: text
    content: Et qui sur elle ai créé l’homme;
  - type: text
    content: C’est moi, ce sont mes mains qui ont déployé les cieux,
  - type: text
    content: Et c’est moi qui ai disposé toute leur armée.
  '13':
  - type: text
    content: C’est moi qui ai suscité Cyrus dans ma justice,
  - type: text
    content: Et j’aplanirai toutes ses voies;
  - type: note
    content: 2 Ch 36:22. Esd 1:1. És 44:28.
  - type: text
    content: Il rebâtira ma ville, et libérera mes captifs,
  - type: text
    content: Sans rançon ni présents,
  - type: text
    content: Dit l’Éternel des armées.
  '14':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Les gains de l’Égypte et les profits de l’Éthiopie,
  - type: text
    content: Et ceux des Sabéens à la taille élevée,
  - type: text
    content: Passeront chez toi et seront à toi;
  - type: text
    content: Ces peuples marcheront à ta suite,
  - type: text
    content: Ils passeront enchaînés,
  - type: text
    content: 'Ils se prosterneront devant toi, et te diront en suppliant:'
  - type: text
    content: C’est auprès de toi seulement que se trouve Dieu,
  - type: note
    content: v. 5.
  - type: text
    content: Et il n’y a point d’autre Dieu que lui.
  '15':
  - type: text
    content: Mais tu es un Dieu qui te caches,
  - type: text
    content: Dieu d’Israël, sauveur!
  '16':
  - type: text
    content: Ils sont tous honteux et confus,
  - type: text
    content: Ils s’en vont tous avec ignominie,
  - type: note
    content: És 44:11.
  - type: text
    content: Les fabricateurs d’idoles.
  '17':
  - type: text
    content: C’est par l’Éternel qu’Israël obtient le salut,
  - type: text
    content: Un salut éternel;
  - type: text
    content: Vous ne serez ni honteux ni confus,
  - type: text
    content: Jusque dans l’éternité.
  '18':
  - type: text
    content: Car ainsi parle l’Éternel,
  - type: note
    content: És 42:5.
  - type: text
    content: Le créateur des cieux, le seul Dieu,
  - type: text
    content: Qui a formé la terre, qui l’a faite et qui l’a affermie,
  - type: text
    content: Qui l’a créée pour qu’elle ne fût pas déserte,
  - type: text
    content: 'Qui l’a formée pour qu’elle fût habitée:'
  - type: note
    content: v. 5, 14.
  - type: text
    content: Je suis l’Éternel, et il n’y en a point d’autre.
  '19':
  - type: text
    content: ' '
  - type: note
    content: De 30:11.
  - type: text
    content: Je n’ai point parlé en cachette,
  - type: text
    content: Dans un lieu ténébreux de la terre;
  - type: text
    content: 'Je n’ai point dit à la postérité de Jacob:'
  - type: text
    content: Cherchez-moi vainement!
  - type: text
    content: Moi, l’Éternel, je dis ce qui est vrai,
  - type: text
    content: Je proclame ce qui est droit.
  - type: heading
    content: 'V. 20-25: cf. (És 43:9. Ps 98:2, 3.) (Mc 16:15, 16. Jn 3:14-16.) (Ro 14:9-11. Ph 2:9-11.)'
  '2':
  - type: text
    content: Je marcherai devant toi,
  - type: text
    content: J’aplanirai les chemins montueux,
  - type: text
    content: Je romprai les portes d’airain,
  - type: text
    content: Et je briserai les verrous de fer.
  '20':
  - type: text
    content: Assemblez-vous et venez, approchez ensemble,
  - type: text
    content: Réchappés des nations!
  - type: note
    content: És 44:18, 19.
  - type: text
    content: Ils n’ont point d’intelligence, ceux qui portent leur idole de bois,
  - type: text
    content: Et qui invoquent un dieu incapable de sauver.
  '21':
  - type: text
    content: Déclarez-le, et faites-les venir!
  - type: text
    content: Qu’ils prennent conseil les uns des autres!
  - type: text
    content: Qui a prédit ces choses dès le commencement,
  - type: note
    content: És 41:22, 26, 27; 43:9, 10.
  - type: text
    content: Et depuis longtemps les a annoncées?
  - type: note
    content: v. 5, 14, 18.
  - type: text
    content: N’est-ce pas moi, l’Éternel?
  - type: text
    content: Il n’y a point d’autre Dieu que moi,
  - type: text
    content: Je suis le seul Dieu juste et qui sauve.
  '22':
  - type: text
    content: Tournez-vous vers moi, et vous serez sauvés,
  - type: text
    content: Vous tous qui êtes aux extrémités de la terre!
  - type: text
    content: Car je suis Dieu, et il n’y en a point d’autre.
  '23':
  - type: text
    content: Je le jure par moi-même,
  - type: text
    content: 'La vérité sort de ma bouche et ma parole ne sera point révoquée:'
  - type: note
    content: Ro 4:11. Ph 2:10.
  - type: text
    content: Tout genou fléchira devant moi,
  - type: text
    content: Toute langue jurera par moi.
  '24':
  - type: text
    content: En l’Éternel seul, me dira-t-on, résident la justice et la force;
  - type: text
    content: A lui viendront, pour être confondus,
  - type: note
    content: És 41:11.
  - type: text
    content: Tous ceux qui étaient irrités contre lui.
  '25':
  - type: text
    content: Par l’Éternel seront justifiés et glorifiés
  - type: text
    content: Tous les descendants d’Israël.
  '3':
  - type: text
    content: Je te donnerai des trésors cachés,
  - type: text
    content: Des richesses enfouies,
  - type: text
    content: Afin que tu saches
  - type: text
    content: Que je suis l’Éternel qui t’appelle par ton nom,
  - type: text
    content: Le Dieu d’Israël.
  '4':
  - type: text
    content: Pour l’amour de mon serviteur Jacob,
  - type: text
    content: Et d’Israël, mon élu,
  - type: text
    content: Je t’ai appelé par ton nom,
  - type: text
    content: Je t’ai parlé avec bienveillance, avant que tu me connusses.
  '5':
  - type: text
    content: ' '
  - type: note
    content: De 4:35, 39; 32:39. És 44:8.
  - type: text
    content: Je suis l’Éternel, et il n’y en a point d’autre,
  - type: text
    content: Hors moi il n’y a point de Dieu;
  - type: text
    content: Je t’ai ceint, avant que tu me connusses.
  '6':
  - type: text
    content: C’est afin que l’on sache, du soleil levant au soleil couchant,
  - type: text
    content: 'Que hors moi il n’y a point de Dieu:'
  - type: text
    content: Je suis l’Éternel, et il n’y en a point d’autre.
  '7':
  - type: text
    content: Je forme la lumière, et je crée les ténèbres,
  - type: text
    content: 'Je donne la prospérité, et je crée '
  - type: note
    content: La 3:38. Am 3:6.
  - type: text
    content: l’adversité;
  - type: text
    content: Moi, l’Éternel, je fais toutes ces choses.
  '8':
  - type: text
    content: Que les cieux répandent d’en haut
  - type: text
    content: Et que les nuées laissent couler la justice!
  - type: text
    content: Que la terre s’ouvre, que le salut y fructifie,
  - type: text
    content: Et qu’il en sorte à la fois la délivrance!
  - type: text
    content: Moi, l’Éternel, je crée ces choses.
  - type: heading
    content: 'V. 9-19: cf. (Jé 18:1-10. Ro 9:20, 21.) 2 Ch 36:22, 23. És 44:6-11.'
  '9':
  - type: text
    content: Malheur à qui conteste avec son créateur!
  - type: text
    content: Vase parmi des vases de terre!
  - type: note
    content: Jé 18:6. Ro 9:20.
  - type: text
    content: 'L’argile dit-elle à celui qui la façonne: Que fais-tu?'
  - type: text
    content: 'Et ton œuvre: Il n’a point de mains?'
