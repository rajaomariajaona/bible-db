document_id: ISA.45
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. És 44:26-28; 13:1-5; 43:9-14.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ainsi parle l’Éternel à son oint, à Cyrus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il tient par la main,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour terrasser les nations devant lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pour relâcher la ceinture des rois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour lui ouvrir les portes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin qu’elles ne soient plus fermées;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je marcherai devant toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’aplanirai les chemins montueux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je romprai les portes d’airain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je briserai les verrous de fer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je te donnerai des trésors cachés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des richesses enfouies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que tu saches
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je suis l’Éternel qui t’appelle par ton nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Dieu d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Pour l’amour de mon serviteur Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et d’Israël, mon élu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’ai appelé par ton nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’ai parlé avec bienveillance, avant que tu me connusses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:35
      metadata:
        usfm: DEU.4.35
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '39'
      metadata:
        usfm: DEU.4.39
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 32:39
      metadata:
        usfm: DEU.32.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 44:8
      metadata:
        usfm: ISA.44.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je suis l’Éternel, et il n’y en a point d’autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hors moi il n’y a point de Dieu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’ai ceint, avant que tu me connusses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: C’est afin que l’on sache, du soleil levant au soleil couchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Que hors moi il n’y a point de Dieu:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis l’Éternel, et il n’y en a point d’autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je forme la lumière, et je crée les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je donne la prospérité, et je crée '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 3:38
      metadata:
        usfm: LAM.3.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 3:6
      metadata:
        usfm: AMO.3.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: l’adversité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, l’Éternel, je fais toutes ces choses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Que les cieux répandent d’en haut
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que les nuées laissent couler la justice!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que la terre s’ouvre, que le salut y fructifie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’il en sorte à la fois la délivrance!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, l’Éternel, je crée ces choses.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-19: cf. (Jé 18:1-10. Ro 9:20, 21.) 2 Ch 36:22, 23. És 44:6-11.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Malheur à qui conteste avec son créateur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vase parmi des vases de terre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 18:6
      metadata:
        usfm: JER.18.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:20
      metadata:
        usfm: ROM.9.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’argile dit-elle à celui qui la façonne: Que fais-tu?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et ton œuvre: Il n’a point de mains?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Malheur à qui dit à son père: Pourquoi m’as-tu engendré?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et à sa mère: Pourquoi m’as-tu enfanté?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ainsi parle l’Éternel, le Saint d’Israël, et son créateur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Veut-on me questionner sur l’avenir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Me donner des ordres sur mes enfants et sur l’œuvre de mes mains?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C’est moi qui ai fait la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui sur elle ai créé l’homme;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est moi, ce sont mes mains qui ont déployé les cieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et c’est moi qui ai disposé toute leur armée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C’est moi qui ai suscité Cyrus dans ma justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’aplanirai toutes ses voies;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 36:22
      metadata:
        usfm: 2CH.36.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esd 1:1
      metadata:
        usfm: EZR.1.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 44:28
      metadata:
        usfm: ISA.44.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il rebâtira ma ville, et libérera mes captifs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans rançon ni présents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel des armées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les gains de l’Égypte et les profits de l’Éthiopie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ceux des Sabéens à la taille élevée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Passeront chez toi et seront à toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ces peuples marcheront à ta suite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils passeront enchaînés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils se prosterneront devant toi, et te diront en suppliant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est auprès de toi seulement que se trouve Dieu,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: v. 5.
    marker-yv: yv-n
  - type: text
    text: Et il n’y a point d’autre Dieu que lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais tu es un Dieu qui te caches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu d’Israël, sauveur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ils sont tous honteux et confus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils s’en vont tous avec ignominie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 44:11
      metadata:
        usfm: ISA.44.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les fabricateurs d’idoles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: C’est par l’Éternel qu’Israël obtient le salut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un salut éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous ne serez ni honteux ni confus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusque dans l’éternité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Car ainsi parle l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 42:5
      metadata:
        usfm: ISA.42.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le créateur des cieux, le seul Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a formé la terre, qui l’a faite et qui l’a affermie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui l’a créée pour qu’elle ne fût pas déserte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Qui l’a formée pour qu’elle fût habitée:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: v. 5, 14.
    marker-yv: yv-n
  - type: text
    text: Je suis l’Éternel, et il n’y en a point d’autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 30:11
      metadata:
        usfm: DEU.30.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je n’ai point parlé en cachette,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans un lieu ténébreux de la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je n’ai point dit à la postérité de Jacob:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cherchez-moi vainement!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, l’Éternel, je dis ce qui est vrai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je proclame ce qui est droit.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-25: cf. (És 43:9. Ps 98:2, 3.) (Mc 16:15, 16. Jn 3:14-16.) (Ro 14:9-11. Ph 2:9-11.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Assemblez-vous et venez, approchez ensemble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Réchappés des nations!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 44:18
      metadata:
        usfm: ISA.44.18
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: ISA.44.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils n’ont point d’intelligence, ceux qui portent leur idole de bois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui invoquent un dieu incapable de sauver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Déclarez-le, et faites-les venir!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils prennent conseil les uns des autres!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a prédit ces choses dès le commencement,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 41:22
      metadata:
        usfm: ISA.41.22
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: ISA.41.26
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '27'
      metadata:
        usfm: ISA.41.27
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 43:9
      metadata:
        usfm: ISA.43.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: ISA.43.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et depuis longtemps les a annoncées?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: v. 5, 14, 18.
    marker-yv: yv-n
  - type: text
    text: N’est-ce pas moi, l’Éternel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y a point d’autre Dieu que moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis le seul Dieu juste et qui sauve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tournez-vous vers moi, et vous serez sauvés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous tous qui êtes aux extrémités de la terre!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je suis Dieu, et il n’y en a point d’autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Je le jure par moi-même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'La vérité sort de ma bouche et ma parole ne sera point révoquée:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 4:11
      metadata:
        usfm: ROM.4.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:10
      metadata:
        usfm: PHP.2.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tout genou fléchira devant moi,
- type: usfm
  marker: q1
