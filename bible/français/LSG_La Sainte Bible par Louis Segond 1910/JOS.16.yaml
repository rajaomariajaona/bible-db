document_id: JOS.16,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Territoire échu à la tribu d’Éphraïm
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. Jos 17. De 33:13-16.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La part échue par le sort aux fils de Joseph s’étendait depuis le Jourdain près de Jéricho, vers les eaux de Jéricho, à l’orient. La limite suivait le désert qui s’élève de Jéricho à Béthel par la montagne. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils ne chassèrent point les Cananéens qui habitaient à Guézer, et les Cananéens ont habité au milieu d’Éphraïm jusqu’à ce jour, mais ils furent assujettis à un tribut.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle continuait de Béthel à Luz, et passait vers la frontière des Arkiens par Atharoth. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis elle descendait à l’occident vers la frontière des Japhléthiens jusqu’à celle de Beth-Horon la basse et jusqu’à Guézer, pour aboutir à la mer. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est là que reçurent leur héritage les fils de Joseph, Manassé et Éphraïm. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les limites des fils d’Éphraïm, selon leurs familles. La limite de leur héritage était, à l’orient, Atharoth-Addar jusqu’à Beth-Horon la haute. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle continuait du côté de l’occident vers Micmethath au nord, tournait à l’orient vers Thaanath-Silo, et passait dans la direction de l’orient par Janoach. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De Janoach elle descendait à Atharoth et à Naaratha, touchait à Jéricho, et se prolongeait jusqu’au Jourdain. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De Tappuach elle allait vers l’occident au torrent de Kana, pour aboutir à la mer. Tel fut l’héritage de la tribu des fils d’Éphraïm, selon leurs familles. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils d’Éphraïm avaient aussi des villes séparées au milieu de l’héritage des fils de Manassé, toutes avec leurs villages. '
