document_id: 1SA.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saül vainqueur des Ammonites
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. (Jg 11. 1 S 31:11-13.) 1 S 10:7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nachasch, l’Ammonite, vint assiéger Jabès en Galaad. Tous les habitants de Jabès dirent à Nachasch: Traite alliance avec nous, et nous te servirons. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mais Nachasch, l’Ammonite, leur répondit: Je traiterai avec vous à la condition que je vous crève à tous l’œil droit, et que j’imprime ainsi un opprobre sur tout Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les anciens de Jabès lui dirent: Accorde-nous une trêve de sept jours, afin que nous envoyions des messagers dans tout le territoire d’Israël; et s’il n’y a personne qui nous secoure, nous nous rendrons à toi. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les messagers arrivèrent à Guibea de Saül, et dirent ces choses aux oreilles du peuple. Et tout le peuple éleva la voix, et pleura. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et voici, Saül revenait des champs, derrière ses bœufs, et il dit: Qu’a donc le peuple pour pleurer? On lui raconta ce qu’avaient dit ceux de Jabès. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dès que Saül eut entendu ces choses, il fut saisi par l’esprit de Dieu, et sa colère s’enflamma fortement. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il prit une paire de bœufs, et les coupa en morceaux, qu’il envoya par les messagers dans tout le territoire d’Israël, en disant: Quiconque ne marchera pas à la suite de Saül et de Samuel, aura ses bœufs traités de la même manière. La terreur de l’Éternel s’empara du peuple, qui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 20:1
      metadata:
        usfm: JDG.20.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'se mit en marche comme un seul homme. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Saül en fit la revue à Bézek; les enfants d’Israël étaient trois cent mille, et les hommes de Juda trente mille. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils dirent aux messagers qui étaient venus: Vous parlerez ainsi aux habitants de Jabès en Galaad: Demain vous aurez du secours, quand le soleil sera dans sa chaleur. Les messagers portèrent cette nouvelle à ceux de Jabès, qui furent remplis de joie; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et qui dirent aux Ammonites: Demain nous nous rendrons à vous, et vous nous traiterez comme bon vous semblera. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le lendemain, Saül divisa le peuple en trois corps. Ils pénétrèrent dans le camp des Ammonites à la veille du matin, et ils les battirent jusqu’à la chaleur du jour. Ceux qui échappèrent furent dispersés, et il n’en resta pas deux ensemble.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-15: cf. 1 S 10:17-27. 1 Ch 29:21, 22.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le peuple dit à Samuel: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 10:27
      metadata:
        usfm: 1SA.10.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Qui est-ce qui disait: Saül régnera-t-il sur nous? Livrez ces gens, et nous les ferons mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais Saül dit: Personne ne sera mis à mort en ce jour, car aujourd’hui l’Éternel a opéré une délivrance en Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et Samuel dit au peuple: Venez, et allons à Guilgal, pour y confirmer la royauté. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tout le peuple se rendit à Guilgal, et ils établirent Saül pour roi, devant l’Éternel, à Guilgal. Là, ils offrirent des sacrifices d’actions de grâces devant l’Éternel; et là, Saül et tous les hommes d’Israël se livrèrent à de grandes réjouissances.
