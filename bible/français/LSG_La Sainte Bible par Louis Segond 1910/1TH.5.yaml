document_id: 1TH.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-11: cf. (Mt 24:36-51. Lu 12:35-40; 21:34-36.) Ro 13:11-14.'
  - type: text
    content: 'Pour ce qui est des temps et des moments, vous n’avez pas besoin, frères, qu’on vous en écrive. '
  '10':
  - type: text
    content: 'qui est mort pour nous, '
  - type: note
    content: Ro 14:7. 2 Co 5:15. Ga 3:20. 1 Pi 4:2.
  - type: text
    content: 'afin que, soit que nous veillions, soit que nous dormions, nous vivions ensemble avec lui. '
  '11':
  - type: text
    content: C’est pourquoi exhortez-vous réciproquement, et édifiez-vous les uns les autres, comme en réalité vous le faites.
  - type: heading
    content: Préceptes divers
  - type: heading
    content: 'V. 12-15: cf. Hé 13:7, 17. Ga 6:1, 2. Ro 12:17-21.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ro 15:27. 1 Co 9:11; 16:18. Ga 5:6. Ph 2:29. 1 Ti 5:17. Hé 13:7, 17.
  - type: text
    content: 'Nous vous prions, frères, d’avoir de la considération pour ceux qui travaillent parmi vous, qui vous dirigent dans le Seigneur, et qui vous exhortent. '
  '13':
  - type: text
    content: 'Ayez pour eux beaucoup d’affection, à cause de leur œuvre. Soyez en paix entre vous. '
  '14':
  - type: text
    content: 'Nous vous en prions aussi, frères, avertissez ceux qui vivent dans le désordre, consolez ceux qui sont abattus, supportez les faibles, usez de patience envers tous. '
  '15':
  - type: note
    content: Lé 19:18. Pr 20:22; 24:29. Mt 5:39. Ro 12:17. 1 Co 6:7. 1 Pi 3:9.
  - type: text
    content: Prenez garde que personne ne rende à autrui le mal pour le mal; mais poursuivez toujours le bien, soit entre vous, soit envers tous.
  - type: heading
    content: 'V. 16-22: cf. Ro 12:12, 9. Ép 5:18-20.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Mt 5:12. Lu 10:20. Ro 12:12. Ph 4:4.
  - type: text
    content: 'Soyez toujours joyeux. '
  '17':
  - type: note
    content: Lu 18:1. Ro 12:12. Col 4:2.
  - type: text
    content: 'Priez sans cesse. '
  '18':
  - type: note
    content: Ép 5:20.
  - type: text
    content: 'Rendez grâces en toutes choses, car c’est à votre égard la volonté de Dieu en Jésus-Christ. '
  '19':
  - type: note
    content: 1 Co 14:30.
  - type: text
    content: 'N’éteignez pas l’Esprit. '
  '2':
  - type: text
    content: 'Car vous savez bien vous-mêmes '
  - type: note
    content: Mt 24:43. 2 Pi 3:10. Ap 3:3; 16:15.
  - type: text
    content: 'que le jour du Seigneur viendra comme un voleur dans la nuit. '
  '20':
  - type: text
    content: 'Ne méprisez pas les prophéties. '
  '21':
  - type: note
    content: 1 Jn 4:1.
  - type: text
    content: 'Mais examinez toutes choses; retenez ce qui est bon; '
  '22':
  - type: note
    content: Ph 4:8.
  - type: text
    content: abstenez-vous de toute espèce de mal.
  - type: heading
    content: Vœux et salutations
  - type: heading
    content: 'V. 23-28: cf. Hé 13:20, 21. 1 Co 1:8, 9. 2 Co 13:12, 13.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 1 Co 1:8. Ph 4:9. 1 Th 3:13.
  - type: text
    content: 'Que le Dieu de paix vous sanctifie lui-même tout entiers, et que tout votre être, l’esprit, l’âme et le corps, soit conservé irrépréhensible, lors de l’avènement de notre Seigneur Jésus-Christ! '
  '24':
  - type: note
    content: 1 Co 1:9; 10:13. 2 Co 1:18. 2 Th 3:3.
  - type: text
    content: 'Celui qui vous a appelés est fidèle, et c’est lui qui le fera. '
  '25':
  - type: text
    content: 'Frères, priez pour nous. '
  '26':
  - type: note
    content: Ro 16:16. 1 Co 16:20. 2 Co 13:12. 1 Pi 5:14.
  - type: text
    content: 'Saluez tous les frères par un saint baiser. '
  '27':
  - type: text
    content: 'Je vous en conjure par le Seigneur, que cette lettre soit lue à tous les frères. '
  '28':
  - type: text
    content: Que la grâce de notre Seigneur Jésus-Christ soit avec vous!
  '3':
  - type: text
    content: 'Quand les hommes diront: Paix et sûreté! Alors '
  - type: note
    content: 2 Th 1:9.
  - type: text
    content: 'une ruine soudaine les surprendra, comme les douleurs de l’enfantement surprennent la femme enceinte, et ils n’échapperont point. '
  '4':
  - type: note
    content: Ép 5:8.
  - type: text
    content: 'Mais vous, frères, vous n’êtes pas dans les ténèbres, pour que ce jour vous surprenne comme un voleur; '
  '5':
  - type: text
    content: 'vous êtes tous '
  - type: note
    content: Lu 16:8. Ép 5:8.
  - type: text
    content: 'des enfants de la lumière et des enfants '
  - type: note
    content: Ro 13:12.
  - type: text
    content: 'du jour. Nous ne sommes point de la nuit ni des ténèbres. '
  '6':
  - type: note
    content: Ro 13:11, 13. Ép 5:14.
  - type: text
    content: 'Ne dormons donc point comme les autres, '
  - type: note
    content: Lu 21:36.
  - type: text
    content: 'mais veillons et '
  - type: note
    content: 1 Co 15:34.
  - type: text
    content: 'soyons sobres. '
  '7':
  - type: text
    content: 'Car ceux qui dorment dorment la nuit, et ceux qui s’enivrent s’enivrent la nuit. '
  '8':
  - type: text
    content: 'Mais nous qui sommes du jour, soyons sobres, '
  - type: note
    content: És 59:17. Ép 6:14, etc.
  - type: text
    content: 'ayant revêtu la cuirasse de la foi et de la charité, et ayant pour casque l’espérance du salut. '
  '9':
  - type: text
    content: 'Car Dieu ne nous a pas destinés à la colère, mais à l’acquisition du salut par notre Seigneur Jésus-Christ, '
