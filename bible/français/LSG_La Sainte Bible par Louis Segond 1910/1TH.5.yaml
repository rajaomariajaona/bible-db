document_id: 1TH.5
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. (Mt 24:36-51. Lu 12:35-40; 21:34-36.) Ro 13:11-14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Pour ce qui est des temps et des moments, vous n’avez pas besoin, frères, qu’on vous en écrive. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Car vous savez bien vous-mêmes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 24:43
      metadata:
        usfm: MAT.24.43
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 3:10
      metadata:
        usfm: 2PE.3.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 3:3
      metadata:
        usfm: REV.3.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:15
      metadata:
        usfm: REV.16.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que le jour du Seigneur viendra comme un voleur dans la nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Quand les hommes diront: Paix et sûreté! Alors '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 1:9
      metadata:
        usfm: 2TH.1.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une ruine soudaine les surprendra, comme les douleurs de l’enfantement surprennent la femme enceinte, et ils n’échapperont point. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:8
      metadata:
        usfm: EPH.5.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais vous, frères, vous n’êtes pas dans les ténèbres, pour que ce jour vous surprenne comme un voleur; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'vous êtes tous '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 16:8
      metadata:
        usfm: LUK.16.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:8
      metadata:
        usfm: EPH.5.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des enfants de la lumière et des enfants '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 13:12
      metadata:
        usfm: ROM.13.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'du jour. Nous ne sommes point de la nuit ni des ténèbres. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 13:11
      metadata:
        usfm: ROM.13.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: ROM.13.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:14
      metadata:
        usfm: EPH.5.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ne dormons donc point comme les autres, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 21:36
      metadata:
        usfm: LUK.21.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais veillons et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:34
      metadata:
        usfm: 1CO.15.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'soyons sobres. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Car ceux qui dorment dorment la nuit, et ceux qui s’enivrent s’enivrent la nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais nous qui sommes du jour, soyons sobres, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 59:17
      metadata:
        usfm: ISA.59.17
    - type: text
      text: . Ép 6:14, etc.
    marker-yv: yv-n
  - type: text
    text: 'ayant revêtu la cuirasse de la foi et de la charité, et ayant pour casque l’espérance du salut. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Car Dieu ne nous a pas destinés à la colère, mais à l’acquisition du salut par notre Seigneur Jésus-Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'qui est mort pour nous, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 14:7
      metadata:
        usfm: ROM.14.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:15
      metadata:
        usfm: 2CO.5.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:20
      metadata:
        usfm: GAL.3.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:2
      metadata:
        usfm: 1PE.4.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'afin que, soit que nous veillions, soit que nous dormions, nous vivions ensemble avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: C’est pourquoi exhortez-vous réciproquement, et édifiez-vous les uns les autres, comme en réalité vous le faites.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Préceptes divers
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-15: cf. Hé 13:7, 17. Ga 6:1, 2. Ro 12:17-21.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 15:27
      metadata:
        usfm: ROM.15.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 9:11
      metadata:
        usfm: 1CO.9.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:18
      metadata:
        usfm: 1CO.16.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:6
      metadata:
        usfm: GAL.5.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:29
      metadata:
        usfm: PHP.2.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 5:17
      metadata:
        usfm: 1TI.5.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:7
      metadata:
        usfm: HEB.13.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '17'
      metadata:
        usfm: HEB.13.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous vous prions, frères, d’avoir de la considération pour ceux qui travaillent parmi vous, qui vous dirigent dans le Seigneur, et qui vous exhortent. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ayez pour eux beaucoup d’affection, à cause de leur œuvre. Soyez en paix entre vous. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nous vous en prions aussi, frères, avertissez ceux qui vivent dans le désordre, consolez ceux qui sont abattus, supportez les faibles, usez de patience envers tous. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:18
      metadata:
        usfm: LEV.19.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 20:22
      metadata:
        usfm: PRO.20.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:29
      metadata:
        usfm: PRO.24.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:39
      metadata:
        usfm: MAT.5.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:17
      metadata:
        usfm: ROM.12.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 6:7
      metadata:
        usfm: 1CO.6.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:9
      metadata:
        usfm: 1PE.3.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Prenez garde que personne ne rende à autrui le mal pour le mal; mais poursuivez toujours le bien, soit entre vous, soit envers tous.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-22: cf. Ro 12:12, 9. Ép 5:18-20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:12
      metadata:
        usfm: MAT.5.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 10:20
      metadata:
        usfm: LUK.10.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:12
      metadata:
        usfm: ROM.12.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 4:4
      metadata:
        usfm: PHP.4.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Soyez toujours joyeux. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 18:1
      metadata:
        usfm: LUK.18.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:12
      metadata:
        usfm: ROM.12.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 4:2
      metadata:
        usfm: COL.4.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Priez sans cesse. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:20
      metadata:
        usfm: EPH.5.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Rendez grâces en toutes choses, car c’est à votre égard la volonté de Dieu en Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 14:30
      metadata:
        usfm: 1CO.14.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'N’éteignez pas l’Esprit. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ne méprisez pas les prophéties. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 4:1
      metadata:
        usfm: 1JN.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais examinez toutes choses; retenez ce qui est bon; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 4:8
      metadata:
        usfm: PHP.4.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: abstenez-vous de toute espèce de mal.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vœux et salutations
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 23-28: cf. Hé 13:20, 21. 1 Co 1:8, 9. 2 Co 13:12, 13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:8
      metadata:
        usfm: 1CO.1.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 4:9
      metadata:
        usfm: PHP.4.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 3:13
      metadata:
        usfm: 1TH.3.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que le Dieu de paix vous sanctifie lui-même tout entiers, et que tout votre être, l’esprit, l’âme et le corps, soit conservé irrépréhensible, lors de l’avènement de notre Seigneur Jésus-Christ! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:9
      metadata:
        usfm: 1CO.1.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:13
      metadata:
        usfm: 1CO.10.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 1:18
      metadata:
        usfm: 2CO.1.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:3
      metadata:
        usfm: 2TH.3.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Celui qui vous a appelés est fidèle, et c’est lui qui le fera. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Frères, priez pour nous. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 16:16
      metadata:
        usfm: ROM.16.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 16:20
      metadata:
        usfm: 1CO.16.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 13:12
      metadata:
        usfm: 2CO.13.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:14
      metadata:
        usfm: 1PE.5.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Saluez tous les frères par un saint baiser. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Je vous en conjure par le Seigneur, que cette lettre soit lue à tous les frères. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Que la grâce de notre Seigneur Jésus-Christ soit avec vous!
