document_id: NUM.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Murmures, après le rapport des espions. Les quarante années au désert
  - type: heading
    content: 'V. 1-38: cf. (No 13:27-33. De 1:25-40.) Ex 32:9-14. (No 32:7-13; 26:63-65. Jos 14:6-14.) Ps 106:24-26; 99:8. (Hé 3:17-19. Jud 5.)'
  - type: text
    content: 'Toute l’assemblée éleva la voix et poussa des cris, et le peuple pleura pendant la nuit. '
  '10':
  - type: text
    content: 'Toute l’assemblée parlait de les lapider, lorsque la gloire de l’Éternel apparut sur la tente d’assignation, devant tous les enfants d’Israël. '
  '11':
  - type: text
    content: 'Et l’Éternel dit à Moïse: Jusqu’à quand ce peuple me méprisera-t-il? Jusqu’à quand ne croira-t-il pas en moi, malgré tous les prodiges que j’ai faits au milieu de lui? '
  '12':
  - type: text
    content: 'Je le frapperai par la peste, et je le détruirai; mais je ferai de toi une nation plus grande et plus puissante que lui. '
  '13':
  - type: text
    content: 'Moïse dit à l’Éternel: '
  - type: note
    content: Ex 32:12.
  - type: text
    content: 'Les Égyptiens l’apprendront, eux du milieu desquels tu as fait monter ce peuple par ta puissance, '
  '14':
  - type: text
    content: 'et ils le diront aux habitants de ce pays. Ils savaient que toi, l’Éternel, tu es au milieu de ce peuple; que tu apparais visiblement, toi, l’Éternel; que ta nuée se tient sur lui; '
  - type: note
    content: Ex 13:21; 40:38.
  - type: text
    content: 'que tu marches devant lui le jour dans une colonne de nuée, et la nuit dans une colonne de feu. '
  '15':
  - type: text
    content: 'Si tu fais mourir ce peuple comme un seul homme, les nations qui ont entendu parler de toi diront: '
  '16':
  - type: note
    content: De 9:28.
  - type: text
    content: 'L’Éternel n’avait pas le pouvoir de mener ce peuple dans le pays qu’il avait juré de lui donner: c’est pour cela qu’il l’a égorgé dans le désert. '
  '17':
  - type: text
    content: 'Maintenant, que la puissance du Seigneur se montre dans sa grandeur, comme tu l’as déclaré en disant: '
  '18':
  - type: note
    content: Ex 34:6. Ps 86:15; 103:8; 145:8. Jon 4:2.
  - type: text
    content: 'L’Éternel est lent à la colère et riche en bonté, il pardonne l’iniquité et la rébellion; mais il ne tient point le coupable pour innocent, et '
  - type: note
    content: Ex 20:5; 34:7. De 5:9.
  - type: text
    content: 'il punit l’iniquité des pères sur les enfants jusqu’à la troisième et la quatrième génération. '
  '19':
  - type: text
    content: 'Pardonne l’iniquité de ce peuple, selon la grandeur de ta miséricorde, comme tu as pardonné à ce peuple depuis l’Égypte jusqu’ici. '
  '2':
  - type: text
    content: 'Tous les enfants d’Israël murmurèrent contre Moïse et Aaron, et toute l’assemblée leur dit: Que ne sommes-nous morts dans le pays d’Égypte, ou que ne sommes-nous morts dans ce désert! '
  '20':
  - type: text
    content: 'Et l’Éternel dit: Je pardonne, comme tu l’as demandé. '
  '21':
  - type: text
    content: 'Mais, je suis vivant! Et la gloire de l’Éternel remplira toute la terre. '
  '22':
  - type: text
    content: 'Tous ceux qui ont vu ma gloire, et les prodiges que j’ai faits en Égypte et dans le désert, qui m’ont tenté déjà dix fois, et qui n’ont point écouté ma voix, '
  '23':
  - type: text
    content: 'tous ceux-là ne verront point le pays que j’ai juré à leurs pères de leur donner, '
  - type: note
    content: De 1:35, 36.
  - type: text
    content: 'tous ceux qui m’ont méprisé ne le verront point. '
  '24':
  - type: text
    content: 'Et parce que '
  - type: note
    content: Jos 14:8, 9.
  - type: text
    content: 'mon serviteur Caleb a été animé d’un autre esprit, et qu’il a pleinement suivi ma voie, je le ferai entrer dans le pays où il est allé, et ses descendants le posséderont. '
  '25':
  - type: text
    content: 'Les Amalécites et les Cananéens habitent la vallée: demain, tournez-vous, et partez pour le désert, dans la direction de la mer Rouge. '
  '26':
  - type: text
    content: 'L’Éternel parla à Moïse et à Aaron, et dit: '
  '27':
  - type: note
    content: Ps 106:26.
  - type: text
    content: 'Jusqu’à quand laisserai-je cette méchante assemblée murmurer contre moi? J’ai entendu les murmures des enfants d’Israël qui murmuraient contre moi. '
  '28':
  - type: text
    content: 'Dis-leur: '
  - type: note
    content: No 26:65; 32:11.
  - type: text
    content: 'Je suis vivant! Dit l’Éternel, je vous ferai ainsi que vous avez parlé à mes oreilles. '
  '29':
  - type: text
    content: 'Vos '
  - type: note
    content: De 1:35. Hé 3:17.
  - type: text
    content: 'cadavres tomberont dans ce désert. Vous tous, dont on a fait le dénombrement, en vous comptant depuis l’âge de vingt ans et au-dessus, et qui avez murmuré contre moi, '
  '3':
  - type: text
    content: 'Pourquoi l’Éternel nous fait-il aller dans ce pays, où nous tomberons par l’épée, où nos femmes et nos petits enfants deviendront une proie? Ne vaut-il pas mieux pour nous retourner en Égypte? '
  '30':
  - type: text
    content: 'vous n’entrerez point dans le pays que j’avais juré de vous faire habiter, '
  - type: note
    content: Jos 14:6.
  - type: text
    content: 'excepté Caleb, fils de Jephunné, et Josué, fils de Nun. '
  '31':
  - type: text
    content: 'Et vos petits enfants, dont vous avez dit: Ils deviendront une proie! Je les y ferai entrer, et ils connaîtront le pays que vous avez dédaigné. '
  '32':
  - type: text
    content: 'Vos cadavres, à vous, tomberont dans le désert; '
  '33':
  - type: text
    content: 'et vos enfants paîtront quarante années dans le désert, et porteront la peine de vos infidélités, jusqu’à ce que vos cadavres soient tous tombés dans le désert. '
  '34':
  - type: text
    content: 'De même que vous avez mis '
  - type: note
    content: Ps 95:10.
  - type: text
    content: 'quarante jours à explorer le pays, vous porterez la peine de vos iniquités quarante années, une année pour chaque jour; et vous saurez ce que c’est que d’être privé de ma présence. '
  '35':
  - type: text
    content: 'Moi, l’Éternel, j’ai parlé! Et c’est ainsi que je traiterai cette méchante assemblée qui s’est réunie contre moi; ils seront consumés dans ce désert, ils y mourront. '
  '36':
  - type: text
    content: 'Les hommes que Moïse avait envoyés pour explorer le pays, et qui, à leur retour, avaient fait murmurer contre lui toute l’assemblée, en décriant le pays; '
  '37':
  - type: text
    content: 'ces hommes, qui avaient décrié le pays, '
  - type: note
    content: 1 Co 10:10. Jud v. 5.
  - type: text
    content: 'moururent frappés d’une plaie devant l’Éternel. '
  '38':
  - type: text
    content: Josué, fils de Nun, et Caleb, fils de Jephunné, restèrent seuls vivants parmi ces hommes qui étaient allés pour explorer le pays.
  - type: heading
    content: 'V. 39-45: cf. De 1:40-46. Jn 15:5.'
  '39':
  - type: text
    content: 'Moïse rapporta ces choses à tous les enfants d’Israël, et le peuple fut dans une grande désolation. '
  '4':
  - type: text
    content: 'Et ils se dirent l’un à l’autre: Nommons un chef, et retournons en Égypte. '
  '40':
  - type: text
    content: 'Ils se levèrent de bon matin, et montèrent au sommet de la montagne, en disant: Nous voici! Nous monterons au lieu dont a parlé l’Éternel, car nous avons péché. '
  '41':
  - type: text
    content: 'Moïse dit: '
  - type: note
    content: De 1:41.
  - type: text
    content: 'Pourquoi transgressez-vous l’ordre de l’Éternel? Cela ne réussira point. '
  '42':
  - type: text
    content: 'Ne montez pas! Car l’Éternel n’est pas au milieu de vous. Ne vous faites pas battre par vos ennemis. '
  '43':
  - type: text
    content: 'Car les Amalécites et les Cananéens sont là devant vous, et vous tomberiez par l’épée. Parce que vous vous êtes détournés de l’Éternel, l’Éternel ne sera point avec vous. '
  '44':
  - type: text
    content: 'Ils s’obstinèrent à monter au sommet de la montagne; mais l’arche de l’alliance et Moïse ne sortirent point du milieu du camp. '
  '45':
  - type: text
    content: Alors descendirent les Amalécites et les Cananéens qui habitaient cette montagne; ils les battirent, et les taillèrent en pièces jusqu’à Horma.
  '5':
  - type: text
    content: 'Moïse et Aaron tombèrent sur leur visage, en présence de toute l’assemblée réunie des enfants d’Israël. '
  '6':
  - type: text
    content: 'Et, parmi ceux qui avaient exploré le pays, Josué, fils de Nun, et Caleb, fils de Jephunné, déchirèrent leurs vêtements, '
  '7':
  - type: text
    content: 'et parlèrent ainsi à toute l’assemblée des enfants d’Israël: Le pays que nous avons parcouru, pour l’explorer, est un pays très bon, excellent. '
  '8':
  - type: text
    content: 'Si l’Éternel nous est favorable, il nous mènera dans ce pays, et nous le donnera: c’est un pays où coulent le lait et le miel. '
  '9':
  - type: text
    content: 'Seulement, ne soyez point rebelles contre l’Éternel, et '
  - type: note
    content: De 20:3.
  - type: text
    content: 'ne craignez point les gens de ce pays, car ils nous serviront de pâture, ils n’ont plus d’ombrage pour les couvrir, l’Éternel est avec nous, ne les craignez point! '
