segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ac 4:32. Ph 2:1-4.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique des degrés. De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, oh! Qu’il est agréable, qu’il est doux
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour des frères de demeurer ensemble!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: C’est comme l’huile précieuse qui, répandue sur la tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Descend sur la barbe, sur la barbe d’Aaron,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui descend sur le bord de ses vêtements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C’est comme la rosée de l’Hermon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui descend sur les montagnes de Sion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car c’est là que l’Éternel envoie la bénédiction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La vie, pour l’éternité.
