document_id: PSA.133,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ac 4:32. Ph 2:1-4.
  - type: text
    content: Cantique des degrés. De David.
  - type: text
    content: Voici, oh! Qu’il est agréable, qu’il est doux
  - type: text
    content: Pour des frères de demeurer ensemble!
  '2':
  - type: text
    content: C’est comme l’huile précieuse qui, répandue sur la tête,
  - type: text
    content: Descend sur la barbe, sur la barbe d’Aaron,
  - type: text
    content: Qui descend sur le bord de ses vêtements.
  '3':
  - type: text
    content: C’est comme la rosée de l’Hermon,
  - type: text
    content: Qui descend sur les montagnes de Sion;
  - type: text
    content: Car c’est là que l’Éternel envoie la bénédiction,
  - type: text
    content: La vie, pour l’éternité.
