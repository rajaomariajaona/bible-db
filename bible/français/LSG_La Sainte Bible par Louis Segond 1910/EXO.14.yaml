document_id: EXO.14,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Passage de la mer Rouge
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-31: cf. No 33:3-8. (Ex 15:1-21. Jos 24:6, 7. Né 9:9-11. Ps 106:7-11.) Hé 11:29. 1 Co 10:1. Ps 76; 114; 136:13-15. És 8:9, 10.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pharaon approchait. Les enfants d’Israël levèrent les yeux, et voici, les Égyptiens étaient en marche derrière eux. Et les enfants d’Israël eurent une grande frayeur, et crièrent à l’Éternel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils dirent à Moïse: N’y avait-il pas des sépulcres en Égypte, sans qu’il fût besoin de nous mener mourir au désert? Que nous as-tu fait en nous faisant sortir d’Égypte? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 6:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'N’est-ce pas là ce que nous te disions en Égypte: Laisse-nous servir les Égyptiens, car nous aimons mieux servir les Égyptiens que de mourir au désert? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse répondit au peuple: Ne craignez rien, restez en place, et regardez la délivrance que l’Éternel va vous accorder en ce jour; car les Égyptiens que vous voyez aujourd’hui, vous ne les verrez plus jamais. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel combattra pour vous; et vous, gardez le silence. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel dit à Moïse: Pourquoi ces cris? Parle aux enfants d’Israël, et qu’ils marchent. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toi, lève ta verge, étends ta main sur la mer, et fends-la; et les enfants d’Israël entreront au milieu de la mer à sec. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et moi, je vais endurcir le cœur des Égyptiens, pour qu’ils y entrent après eux: et Pharaon et toute son armée, ses chars et ses cavaliers, feront éclater ma gloire. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et les Égyptiens sauront que je suis l’Éternel, quand Pharaon, ses chars et ses cavaliers, auront fait éclater ma gloire. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ange de Dieu, qui allait devant le camp d’Israël, partit et alla derrière eux; et la colonne de nuée qui les précédait, partit et se tint derrière eux. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parle aux enfants d’Israël; qu’ils se détournent, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 33:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qu’ils campent devant Pi-Hahiroth, entre Migdol et la mer, vis-à-vis de Baal-Tsephon; c’est en face de ce lieu que vous camperez, près de la mer. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle se plaça entre le camp des Égyptiens et le camp d’Israël. Cette nuée était ténébreuse d’un côté, et de l’autre elle éclairait la nuit. Et les deux camps n’approchèrent point l’un de l’autre pendant toute la nuit. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse étendit sa main sur la mer. Et l’Éternel refoula la mer par un vent d’orient, qui souffla avec impétuosité toute la nuit; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 66:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il mit la mer à sec, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 4:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 78:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 106:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 114:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et les eaux se fendirent. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 11:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les enfants d’Israël entrèrent au milieu de la mer à sec, et les eaux formaient comme une muraille à leur droite et à leur gauche. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Égyptiens les poursuivirent; et tous les chevaux de Pharaon, ses chars et ses cavaliers, entrèrent après eux au milieu de la mer. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A la veille du matin, l’Éternel, de la colonne de feu et de nuée, regarda le camp des Égyptiens, et mit en désordre le camp des Égyptiens. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il ôta les roues de leurs chars et en rendit la marche difficile. Les Égyptiens dirent alors: Fuyons devant Israël, car l’Éternel combat pour lui contre les Égyptiens. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel dit à Moïse: Étends ta main sur la mer; et les eaux reviendront sur les Égyptiens, sur leurs chars et sur leurs cavaliers. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse étendit sa main sur la mer. Et vers le matin, la mer reprit son impétuosité, et les Égyptiens s’enfuirent à son approche; mais l’Éternel précipita les Égyptiens au milieu de la mer. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 78:53
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 106:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les eaux revinrent, et couvrirent les chars, les cavaliers et toute l’armée de Pharaon, qui étaient entrés dans la mer après les enfants d’Israël; et il n’en échappa pas un seul. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 77:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais les enfants d’Israël marchèrent à sec au milieu de la mer, et les eaux formaient comme une muraille à leur droite et à leur gauche. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pharaon dira des enfants d’Israël: Ils sont égarés dans le pays; le désert les enferme. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce jour, l’Éternel délivra Israël de la main des Égyptiens; et Israël vit sur le rivage de la mer les Égyptiens qui étaient morts. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Israël vit la main puissante que l’Éternel avait dirigée contre les Égyptiens. Et le peuple craignit l’Éternel, et il crut en l’Éternel et en Moïse, son serviteur.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 4:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'J’endurcirai le cœur de Pharaon, et il les poursuivra; mais Pharaon et toute son armée serviront à faire éclater ma gloire, et les Égyptiens sauront que je suis l’Éternel. Et les enfants d’Israël firent ainsi. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On annonça au roi d’Égypte que le peuple avait pris la fuite. Alors le cœur de Pharaon et celui de ses serviteurs furent changés à l’égard du peuple. Ils dirent: Qu’avons-nous fait, en laissant aller Israël, dont nous n’aurons plus les services? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Pharaon attela son char, et il prit son peuple avec lui. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il prit six cents chars d’élite, et tous les chars de l’Égypte; il y avait sur tous des combattants. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel endurcit le cœur de Pharaon, roi d’Égypte, et Pharaon poursuivit les enfants d’Israël. Les enfants d’Israël étaient sortis la main levée. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 24:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les Égyptiens les poursuivirent; et tous les chevaux, les chars de Pharaon, ses cavaliers et son armée, les atteignirent campés près de la mer, vers Pi-Hahiroth, vis-à-vis de Baal-Tsephon. '
