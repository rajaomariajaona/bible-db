document_id: JER.19,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le vase brisé et la ruine de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-13: cf. Jé 7:28-34. Éz 5.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ainsi a parlé l’Éternel: Va, achète d’un potier un vase de terre, et prends avec toi des anciens du peuple et des anciens des sacrificateurs. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tu briseras ensuite le vase, sous les yeux des hommes qui seront allés avec toi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Et tu leur diras:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel des armées:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est ainsi que je briserai ce peuple et cette ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme on brise un vase de potier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans qu’il puisse être rétabli.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et l’on '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 7:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: enterrera les morts à Topheth par défaut de place pour enterrer.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: C’est ainsi que je ferai à ce lieu, dit l’Éternel, et à ses habitants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je rendrai cette ville semblable à Topheth.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Les maisons de Jérusalem et les maisons des rois de Juda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seront impures comme le lieu de Topheth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les maisons sur les toits desquelles on offrait de l’encens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A toute l’armée des cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et on faisait des '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 7:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: libations à d’autres dieux.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Emprisonnement de Jérémie
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: '19 v. 14 à 20 v. 6: cf. Jé 29:24-32.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Jérémie revint de Topheth, où l’Éternel l’avait envoyé prophétiser.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Puis il se tint dans le parvis de la maison de l’Éternel, et il dit à tout le peuple: '
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël: Voici, je vais faire venir sur cette ville et sur toutes les villes qui dépendent d’elle tous les malheurs que je lui ai prédits, parce qu’ils ont raidi leur '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 7:26
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: cou, pour ne point écouter mes paroles.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Rends-toi dans la vallée de Ben-Hinnom, qui est à l’entrée de la porte de la poterie; et là, tu publieras les paroles que je te dirai. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tu diras: Écoutez la parole de l’Éternel, rois de Juda, et vous, habitants de Jérusalem!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je vais faire venir sur ce lieu un malheur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 3:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 21:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: étourdira les oreilles de quiconque en entendra parler.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ils m’ont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 65:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 2:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: abandonné, ils ont profané ce lieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils y ont offert de l’encens à d’autres dieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ne connaissaient ni eux, ni leurs pères, ni les rois de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et ils ont rempli ce lieu de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 7:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: sang innocent;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ils ont bâti des hauts lieux à Baal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pour brûler leurs enfants au feu en holocaustes à Baal:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce que je n’avais ni ordonné ni prescrit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce qui ne m’était point venu à la pensée.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'C’est pourquoi voici, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 7:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les jours viennent, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où ce lieu ne sera plus appelé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Topheth et vallée de Ben-Hinnom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais où on l’appellera vallée du carnage.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: J’anéantirai dans ce lieu le conseil de Juda et de Jérusalem;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les ferai tomber par l’épée devant leurs ennemis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et par la main de ceux qui en veulent à leur vie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je donnerai leurs cadavres en pâture
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 15:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Aux oiseaux du ciel et aux bêtes de la terre.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Je ferai de cette ville un objet de désolation et de moquerie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui passeront près d’elle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seront dans l’étonnement et siffleront sur toutes ses plaies.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 26:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 28:53
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: La 4:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je leur ferai manger la chair de leurs fils et la chair de leurs filles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les uns mangeront la chair des autres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu de l’angoisse et de la détresse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où les réduiront leurs ennemis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux qui en veulent à leur vie.
