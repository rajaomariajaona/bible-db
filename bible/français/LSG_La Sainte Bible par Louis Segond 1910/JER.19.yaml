document_id: JER.19,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le vase brisé et la ruine de Jérusalem
  - type: heading
    content: 'V. 1-13: cf. Jé 7:28-34. Éz 5.'
  - type: text
    content: 'Ainsi a parlé l’Éternel: Va, achète d’un potier un vase de terre, et prends avec toi des anciens du peuple et des anciens des sacrificateurs. '
  '10':
  - type: text
    content: Tu briseras ensuite le vase, sous les yeux des hommes qui seront allés avec toi.
  '11':
  - type: text
    content: 'Et tu leur diras:'
  - type: text
    content: 'Ainsi parle l’Éternel des armées:'
  - type: text
    content: C’est ainsi que je briserai ce peuple et cette ville,
  - type: text
    content: Comme on brise un vase de potier,
  - type: text
    content: Sans qu’il puisse être rétabli.
  - type: text
    content: 'Et l’on '
  - type: note
    content: Jé 7:32.
  - type: text
    content: enterrera les morts à Topheth par défaut de place pour enterrer.
  '12':
  - type: text
    content: C’est ainsi que je ferai à ce lieu, dit l’Éternel, et à ses habitants,
  - type: text
    content: Et je rendrai cette ville semblable à Topheth.
  '13':
  - type: text
    content: Les maisons de Jérusalem et les maisons des rois de Juda
  - type: text
    content: Seront impures comme le lieu de Topheth,
  - type: text
    content: Toutes les maisons sur les toits desquelles on offrait de l’encens
  - type: text
    content: A toute l’armée des cieux,
  - type: text
    content: 'Et on faisait des '
  - type: note
    content: Jé 7:18.
  - type: text
    content: libations à d’autres dieux.
  - type: heading
    content: Emprisonnement de Jérémie
  - type: heading
    content: '19 v. 14 à 20 v. 6: cf. Jé 29:24-32.'
  '14':
  - type: text
    content: Jérémie revint de Topheth, où l’Éternel l’avait envoyé prophétiser.
  - type: text
    content: 'Puis il se tint dans le parvis de la maison de l’Éternel, et il dit à tout le peuple: '
  '15':
  - type: text
    content: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël: Voici, je vais faire venir sur cette ville et sur toutes les villes qui dépendent d’elle tous les malheurs que je lui ai prédits, parce qu’ils ont raidi leur '
  - type: note
    content: Jé 7:26; 17:23.
  - type: text
    content: cou, pour ne point écouter mes paroles.
  '2':
  - type: text
    content: 'Rends-toi dans la vallée de Ben-Hinnom, qui est à l’entrée de la porte de la poterie; et là, tu publieras les paroles que je te dirai. '
  '3':
  - type: text
    content: 'Tu diras: Écoutez la parole de l’Éternel, rois de Juda, et vous, habitants de Jérusalem!'
  - type: text
    content: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël:'
  - type: text
    content: Voici, je vais faire venir sur ce lieu un malheur
  - type: text
    content: 'Qui '
  - type: note
    content: 1 S 3:11. 2 R 21:12.
  - type: text
    content: étourdira les oreilles de quiconque en entendra parler.
  '4':
  - type: text
    content: 'Ils m’ont '
  - type: note
    content: És 65:11. Jé 2:13, 17, 19; 5:7, 19; 15:6; 17:13.
  - type: text
    content: abandonné, ils ont profané ce lieu,
  - type: text
    content: Ils y ont offert de l’encens à d’autres dieux,
  - type: text
    content: Que ne connaissaient ni eux, ni leurs pères, ni les rois de Juda,
  - type: text
    content: 'Et ils ont rempli ce lieu de '
  - type: note
    content: Jé 7:6.
  - type: text
    content: sang innocent;
  '5':
  - type: text
    content: Ils ont bâti des hauts lieux à Baal,
  - type: text
    content: 'Pour brûler leurs enfants au feu en holocaustes à Baal:'
  - type: text
    content: Ce que je n’avais ni ordonné ni prescrit,
  - type: text
    content: Ce qui ne m’était point venu à la pensée.
  '6':
  - type: text
    content: 'C’est pourquoi voici, '
  - type: note
    content: Jé 7:32.
  - type: text
    content: les jours viennent, dit l’Éternel,
  - type: text
    content: Où ce lieu ne sera plus appelé
  - type: text
    content: Topheth et vallée de Ben-Hinnom,
  - type: text
    content: Mais où on l’appellera vallée du carnage.
  '7':
  - type: text
    content: J’anéantirai dans ce lieu le conseil de Juda et de Jérusalem;
  - type: text
    content: Je les ferai tomber par l’épée devant leurs ennemis
  - type: text
    content: Et par la main de ceux qui en veulent à leur vie;
  - type: text
    content: Je donnerai leurs cadavres en pâture
  - type: note
    content: Jé 15:3; 16:4.
  - type: text
    content: Aux oiseaux du ciel et aux bêtes de la terre.
  '8':
  - type: text
    content: Je ferai de cette ville un objet de désolation et de moquerie;
  - type: text
    content: Tous ceux qui passeront près d’elle
  - type: text
    content: Seront dans l’étonnement et siffleront sur toutes ses plaies.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Lé 26:29. De 28:53. La 4:10.
  - type: text
    content: Je leur ferai manger la chair de leurs fils et la chair de leurs filles,
  - type: text
    content: Et les uns mangeront la chair des autres,
  - type: text
    content: Au milieu de l’angoisse et de la détresse
  - type: text
    content: Où les réduiront leurs ennemis
  - type: text
    content: Et ceux qui en veulent à leur vie.
