document_id: NUM.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fonctions des Lévites
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-20: cf. No 3:27-32.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Moïse et à Aaron, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Compte les fils de Kehath parmi les enfants de Lévi, selon leurs familles, selon les maisons de leurs pères, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'depuis l’âge de trente ans et au-dessus jusqu’à l’âge de cinquante ans, tous ceux qui sont propres à exercer quelque fonction dans la tente d’assignation. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici les fonctions des fils de Kehath, dans la tente d’assignation: elles concernent le lieu très saint. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Au départ du camp, Aaron et ses fils viendront démonter le voile, et ils en couvriront l’arche du témoignage; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ils mettront dessus une couverture de peaux de dauphins, et ils étendront par-dessus un drap entièrement d’étoffe bleue; puis ils placeront les barres de l’arche. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils étendront un drap bleu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:30
      metadata:
        usfm: EXO.25.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sur la table des pains de proposition, et ils mettront dessus les plats, les coupes, les tasses et les calices pour les libations; le pain y sera toujours; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ils étendront sur ces choses un drap de cramoisi, et ils l’envelopperont d’une couverture de peaux de dauphins; puis ils placeront les barres de la table. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils prendront un drap bleu, et ils couvriront le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:31
      metadata:
        usfm: EXO.25.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'chandelier, ses lampes, ses mouchettes, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:38
      metadata:
        usfm: EXO.25.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ses vases à cendre et tous ses vases à huile, destinés à son service; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ils le mettront, avec tous ses ustensiles, dans une couverture de peaux de dauphins; puis ils le placeront sur le brancard. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils étendront un drap bleu sur l’autel d’or, et ils l’envelopperont d’une couverture de peaux de dauphins; puis ils placeront les barres de l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils prendront tous les ustensiles dont on se sert pour le service dans le sanctuaire, et ils les mettront dans un drap bleu, et ils les envelopperont d’une couverture de peaux de dauphins; puis ils les placeront sur le brancard. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils ôteront les cendres de l’autel, et ils étendront sur l’autel un drap de pourpre; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ils mettront dessus tous les ustensiles destinés à son service, les brasiers, les fourchettes, les pelles, les bassins, tous les ustensiles de l’autel, et ils étendront par-dessus une couverture de peaux de dauphins; puis ils placeront les barres de l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Après qu’Aaron et ses fils auront achevé de couvrir le sanctuaire et tous les ustensiles du sanctuaire, les fils de Kehath viendront, au départ du camp, pour les porter; mais ils ne toucheront point les choses saintes, de peur qu’ils ne meurent. Telles sont les fonctions de porteurs, imposées aux fils de Kehath dans la tente d’assignation. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Éléazar, fils du sacrificateur Aaron, aura sous sa surveillance l’huile du chandelier, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 30:34
      metadata:
        usfm: EXO.30.34
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '35'
      metadata:
        usfm: EXO.30.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le parfum odoriférant, l’offrande perpétuelle et '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex 30:23, 24, etc.
    marker-yv: yv-n
  - type: text
    text: 'l’huile d’onction; il aura sous sa surveillance tout le tabernacle et tout ce qu’il contient, le sanctuaire et ses ustensiles. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L’Éternel parla à Moïse et à Aaron, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'N’exposez point la race des familles des Kehathites à être retranchée du milieu des Lévites. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Faites ceci pour eux, afin qu’ils vivent et qu’ils ne meurent point, quand ils s’approcheront du lieu très saint: Aaron et ses fils viendront, et ils placeront chacun d’eux à son service et à sa charge. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ils n’entreront point pour voir envelopper les choses saintes, de peur qu’ils ne meurent.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-28: cf. No 3:21-26.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Compte aussi les fils de Guerschon, selon les maisons de leurs pères, selon leurs familles; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'tu feras le dénombrement, depuis l’âge de trente ans et au-dessus jusqu’à l’âge de cinquante ans, de tous ceux qui sont propres à exercer quelque fonction dans la tente d’assignation. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Voici les fonctions des familles des Guerschonites, le service qu’ils devront faire et ce qu’ils devront porter. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils porteront les tapis du tabernacle et la tente d’assignation, sa couverture et la couverture de peaux de dauphins qui se met par-dessus, le rideau qui est à l’entrée de la tente d’assignation; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'les toiles du parvis et le rideau de l’entrée de la porte du parvis, tout autour du tabernacle et de l’autel, leurs cordages et tous les ustensiles qui en dépendent. Et ils feront tout le service qui s’y rapporte. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dans leurs fonctions, les fils des Guerschonites seront sous les ordres d’Aaron et de ses fils, pour tout ce qu’ils porteront et pour tout le service qu’ils devront faire; vous remettrez à leurs soins tout ce qu’ils ont à porter. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Telles sont les fonctions des familles des fils des Guerschonites dans la tente d’assignation, et ce qu’ils ont à garder sous la direction d’Ithamar, fils du sacrificateur Aaron.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 29-49: cf. No 3:33, etc. 1 Co 12:4-11, 28-30.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tu feras le dénombrement des fils de Merari, selon leurs familles, selon les maisons de leurs pères; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'tu feras le dénombrement, depuis l’âge de trente ans et au-dessus jusqu’à l’âge de cinquante ans, de tous ceux qui sont propres à exercer quelque fonction dans la tente d’assignation. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Voici ce qui est remis à leurs soins et ce qu’ils ont à porter, pour toutes leurs fonctions dans la tente d’assignation: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 26:15
      metadata:
        usfm: EXO.26.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les planches du tabernacle, ses barres, ses colonnes, ses bases, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'les colonnes du parvis formant l’enceinte, leurs bases, leurs pieux, leurs cordages, tous les ustensiles qui en dépendent et tout ce qui est destiné à leur service. Vous désignerez par leurs noms les objets qui sont remis à leurs soins et qu’ils ont à porter. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Telles sont les fonctions des familles des fils de Merari, toutes leurs fonctions dans la tente d’assignation, sous la direction d’Ithamar, fils du sacrificateur Aaron. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Moïse, Aaron et les princes de l’assemblée firent le dénombrement des fils des Kehathites, selon leurs familles et selon les maisons de leurs pères, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'de tous ceux qui, depuis l’âge de trente ans et au-dessus jusqu’à l’âge de cinquante ans, étaient propres à exercer quelque fonction dans la tente d’assignation. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ceux dont ils firent le dénombrement, selon leurs familles, furent deux mille sept cent cinquante. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Tels sont ceux des familles des Kehathites dont on fit le dénombrement, tous ceux qui exerçaient des fonctions dans la tente d’assignation; Moïse et Aaron en firent le dénombrement sur l’ordre de l’Éternel par Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Les fils de Guerschon dont on fit le dénombrement, selon leurs familles et selon les maisons de leurs pères, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'depuis l’âge de trente ans et au-dessus jusqu’à l’âge de cinquante ans, tous ceux qui étaient propres à exercer quelque fonction dans la tente d’assignation, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'ceux dont on fit le dénombrement, selon leurs familles, selon les maisons de leurs pères, furent deux mille six cent trente. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Tels sont ceux des familles des fils de Guerschon dont on fit le dénombrement, tous ceux qui exerçaient des fonctions dans la tente d’assignation; Moïse et Aaron en firent le dénombrement sur l’ordre de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ceux des familles des fils de Merari dont on fit le dénombrement, selon leurs familles, selon les maisons de leurs pères, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'depuis l’âge de trente ans et au-dessus jusqu’à l’âge de cinquante ans, tous ceux qui étaient propres à exercer quelque fonction dans la tente d’assignation, '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'ceux dont on fit le dénombrement, selon leurs familles, furent trois mille deux cents. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Tels sont ceux des familles des fils de Merari dont on fit le dénombrement; Moïse et Aaron en firent le dénombrement sur l’ordre de l’Éternel par Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Tous ceux des Lévites dont Moïse, Aaron et les princes d’Israël firent le dénombrement, selon leurs familles et selon les maisons de leurs pères, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'depuis l’âge de trente ans et au-dessus jusqu’à l’âge de cinquante ans, tous ceux qui étaient propres à exercer quelque fonction et à servir de porteurs dans la tente d’assignation, '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'tous ceux dont on fit le dénombrement furent huit mille cinq cent quatre-vingts. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: On en fit le dénombrement sur l’ordre de l’Éternel par Moïse, en indiquant à chacun le service qu’il devait faire et ce qu’il devait porter; on en fit le dénombrement selon l’ordre que l’Éternel avait donné à Moïse.
