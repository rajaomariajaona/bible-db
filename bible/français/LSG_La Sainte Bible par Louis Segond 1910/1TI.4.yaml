document_id: 1TI.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Recommandations à Timothée au sujet des faux docteurs, de sa conduite dans l’exercice du ministère, et de la répréhension fraternelle
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. 1 Jn 4:1-3. (Col 2:16-23. Tit 1:15, 16.) Ro 14:17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 3:1
      metadata:
        usfm: 2TI.3.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 3:3
      metadata:
        usfm: 2PE.3.3
    - type: text
      text: . Jud v. 18.
    marker-yv: yv-n
  - type: text
    text: 'l’Esprit dit expressément que, dans les derniers temps, quelques-uns '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 24:23
      metadata:
        usfm: MAT.24.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 2:3
      metadata:
        usfm: 2TH.2.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'abandonneront la foi, pour s’attacher à des esprits séducteurs et à des doctrines de démons, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'par l’hypocrisie de faux docteurs portant la marque de la flétrissure dans leur propre conscience, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'prescrivant de ne pas se marier, et de s’abstenir d’aliments que Dieu a créés pour qu’ils soient '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 1:29
      metadata:
        usfm: GEN.1.29
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:3
      metadata:
        usfm: GEN.9.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pris avec '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 14:6
      metadata:
        usfm: ROM.14.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:30
      metadata:
        usfm: 1CO.10.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'actions de grâces par ceux qui sont fidèles et qui ont connu la vérité. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 1:31
      metadata:
        usfm: GEN.1.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:15
      metadata:
        usfm: ACT.10.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 14:14
      metadata:
        usfm: ROM.14.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car tout ce que Dieu a créé est bon, et rien ne doit être rejeté, pourvu qu’on le prenne avec actions de grâces, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: parce que tout est sanctifié par la parole de Dieu et par la prière.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-10: cf. 2 Ti 2:14-16. (1 Ti 6:11, 6-8. Mc 10:29, 30.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En exposant ces choses aux frères, tu seras un bon ministre de Jésus-Christ, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 1:5
      metadata:
        usfm: 2TI.1.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:14
      metadata:
        usfm: 2TI.3.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: 2TI.3.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nourri des paroles de la foi et de la bonne doctrine que tu as exactement suivie. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:4
      metadata:
        usfm: 1TI.1.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:20
      metadata:
        usfm: 1TI.6.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 2:16
      metadata:
        usfm: 2TI.2.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 1:14
      metadata:
        usfm: TIT.1.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:9
      metadata:
        usfm: TIT.3.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Repousse les contes profanes et absurdes. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Exerce-toi à la piété; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 2:23
      metadata:
        usfm: COL.2.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car l’exercice corporel est utile à peu de chose, tandis que la piété est utile à tout, ayant la promesse de la vie présente et de celle qui est à venir. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'C’est là une parole certaine et entièrement digne d’être reçue. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nous travaillons, en effet, et nous combattons, parce que nous mettons notre espérance dans le Dieu vivant, qui est le Sauveur de tous les hommes, principalement des croyants.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-16: cf. (Tit 2:7, 15. 2 Ti 1:6, 13; 4:1, 2, 5.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Déclare ces choses, et enseigne-les. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 2:15
      metadata:
        usfm: TIT.2.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que personne ne méprise ta jeunesse; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 2:7
      metadata:
        usfm: TIT.2.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:3
      metadata:
        usfm: 1PE.5.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais sois un modèle pour les fidèles, en parole, en conduite, en charité, en foi, en pureté. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jusqu’à ce que je vienne, applique-toi à la lecture, à l’exhortation, à l’enseignement. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ne néglige pas le don qui est en toi, et qui t’a été donné par prophétie '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 6:6
      metadata:
        usfm: ACT.6.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:17
      metadata:
        usfm: ACT.8.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:3
      metadata:
        usfm: ACT.13.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:6
      metadata:
        usfm: ACT.19.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 5:22
      metadata:
        usfm: 1TI.5.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 1:6
      metadata:
        usfm: 2TI.1.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'avec l’imposition des mains de l’assemblée des anciens. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Occupe-toi de ces choses, donne-toi tout entier à elles, afin que tes progrès soient évidents pour tous. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Veille sur toi-même et sur ton enseignement; persévère dans ces choses, car, en agissant ainsi, tu te sauveras toi-même, et tu sauveras ceux qui t’écoutent.
