document_id: 1TI.4,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Recommandations à Timothée au sujet des faux docteurs, de sa conduite dans l’exercice du ministère, et de la répréhension fraternelle
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-5: cf. 1 Jn 4:1-3. (Col 2:16-23. Tit 1:15, 16.) Ro 14:17.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Mais '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 3:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 3:3
      - type: text
        text: . Jud v. 18.
      marker-yv: yv-n
    - type: text
      text: 'l’Esprit dit expressément que, dans les derniers temps, quelques-uns '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 24:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Th 2:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'abandonneront la foi, pour s’attacher à des esprits séducteurs et à des doctrines de démons, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nous travaillons, en effet, et nous combattons, parce que nous mettons notre espérance dans le Dieu vivant, qui est le Sauveur de tous les hommes, principalement des croyants.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-16: cf. (Tit 2:7, 15. 2 Ti 1:6, 13; 4:1, 2, 5.)'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Déclare ces choses, et enseigne-les. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 2:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Que personne ne méprise ta jeunesse; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 2:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 5:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mais sois un modèle pour les fidèles, en parole, en conduite, en charité, en foi, en pureté. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Jusqu’à ce que je vienne, applique-toi à la lecture, à l’exhortation, à l’enseignement. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ne néglige pas le don qui est en toi, et qui t’a été donné par prophétie '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 6:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 5:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 1:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'avec l’imposition des mains de l’assemblée des anciens. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Occupe-toi de ces choses, donne-toi tout entier à elles, afin que tes progrès soient évidents pour tous. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Veille sur toi-même et sur ton enseignement; persévère dans ces choses, car, en agissant ainsi, tu te sauveras toi-même, et tu sauveras ceux qui t’écoutent.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'par l’hypocrisie de faux docteurs portant la marque de la flétrissure dans leur propre conscience, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'prescrivant de ne pas se marier, et de s’abstenir d’aliments que Dieu a créés pour qu’ils soient '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:29
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pris avec '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 14:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'actions de grâces par ceux qui sont fidèles et qui ont connu la vérité. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 10:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 14:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car tout ce que Dieu a créé est bon, et rien ne doit être rejeté, pourvu qu’on le prenne avec actions de grâces, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: parce que tout est sanctifié par la parole de Dieu et par la prière.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-10: cf. 2 Ti 2:14-16. (1 Ti 6:11, 6-8. Mc 10:29, 30.)'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'En exposant ces choses aux frères, tu seras un bon ministre de Jésus-Christ, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 1:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'nourri des paroles de la foi et de la bonne doctrine que tu as exactement suivie. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 1:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 2:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 1:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Repousse les contes profanes et absurdes. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Exerce-toi à la piété; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 2:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car l’exercice corporel est utile à peu de chose, tandis que la piété est utile à tout, ayant la promesse de la vie présente et de celle qui est à venir. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'C’est là une parole certaine et entièrement digne d’être reçue. '
