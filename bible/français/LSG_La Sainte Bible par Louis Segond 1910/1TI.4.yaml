document_id: 1TI.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Recommandations à Timothée au sujet des faux docteurs, de sa conduite dans l’exercice du ministère, et de la répréhension fraternelle
  - type: heading
    content: 'V. 1-5: cf. 1 Jn 4:1-3. (Col 2:16-23. Tit 1:15, 16.) Ro 14:17.'
  - type: text
    content: 'Mais '
  - type: note
    content: 2 Ti 3:1. 2 Pi 3:3. Jud v. 18.
  - type: text
    content: 'l’Esprit dit expressément que, dans les derniers temps, quelques-uns '
  - type: note
    content: Mt 24:23. 2 Th 2:3.
  - type: text
    content: 'abandonneront la foi, pour s’attacher à des esprits séducteurs et à des doctrines de démons, '
  '10':
  - type: text
    content: Nous travaillons, en effet, et nous combattons, parce que nous mettons notre espérance dans le Dieu vivant, qui est le Sauveur de tous les hommes, principalement des croyants.
  - type: heading
    content: 'V. 11-16: cf. (Tit 2:7, 15. 2 Ti 1:6, 13; 4:1, 2, 5.)'
  '11':
  - type: text
    content: 'Déclare ces choses, et enseigne-les. '
  '12':
  - type: note
    content: Tit 2:15.
  - type: text
    content: 'Que personne ne méprise ta jeunesse; '
  - type: note
    content: Tit 2:7. 1 Pi 5:3.
  - type: text
    content: 'mais sois un modèle pour les fidèles, en parole, en conduite, en charité, en foi, en pureté. '
  '13':
  - type: text
    content: 'Jusqu’à ce que je vienne, applique-toi à la lecture, à l’exhortation, à l’enseignement. '
  '14':
  - type: text
    content: 'Ne néglige pas le don qui est en toi, et qui t’a été donné par prophétie '
  - type: note
    content: Ac 6:6; 8:17; 13:3; 19:6. 1 Ti 5:22. 2 Ti 1:6.
  - type: text
    content: 'avec l’imposition des mains de l’assemblée des anciens. '
  '15':
  - type: text
    content: 'Occupe-toi de ces choses, donne-toi tout entier à elles, afin que tes progrès soient évidents pour tous. '
  '16':
  - type: text
    content: Veille sur toi-même et sur ton enseignement; persévère dans ces choses, car, en agissant ainsi, tu te sauveras toi-même, et tu sauveras ceux qui t’écoutent.
  '2':
  - type: text
    content: 'par l’hypocrisie de faux docteurs portant la marque de la flétrissure dans leur propre conscience, '
  '3':
  - type: text
    content: 'prescrivant de ne pas se marier, et de s’abstenir d’aliments que Dieu a créés pour qu’ils soient '
  - type: note
    content: Ge 1:29; 9:3.
  - type: text
    content: 'pris avec '
  - type: note
    content: Ro 14:6. 1 Co 10:30.
  - type: text
    content: 'actions de grâces par ceux qui sont fidèles et qui ont connu la vérité. '
  '4':
  - type: note
    content: Ge 1:31. Ac 10:15. Ro 14:14.
  - type: text
    content: 'Car tout ce que Dieu a créé est bon, et rien ne doit être rejeté, pourvu qu’on le prenne avec actions de grâces, '
  '5':
  - type: text
    content: parce que tout est sanctifié par la parole de Dieu et par la prière.
  - type: heading
    content: 'V. 6-10: cf. 2 Ti 2:14-16. (1 Ti 6:11, 6-8. Mc 10:29, 30.)'
  '6':
  - type: text
    content: 'En exposant ces choses aux frères, tu seras un bon ministre de Jésus-Christ, '
  - type: note
    content: 2 Ti 1:5; 3:14, 15.
  - type: text
    content: 'nourri des paroles de la foi et de la bonne doctrine que tu as exactement suivie. '
  '7':
  - type: note
    content: 1 Ti 1:4; 6:20. 2 Ti 2:16. Tit 1:14; 3:9.
  - type: text
    content: 'Repousse les contes profanes et absurdes. '
  '8':
  - type: text
    content: 'Exerce-toi à la piété; '
  - type: note
    content: Col 2:23.
  - type: text
    content: 'car l’exercice corporel est utile à peu de chose, tandis que la piété est utile à tout, ayant la promesse de la vie présente et de celle qui est à venir. '
  '9':
  - type: text
    content: 'C’est là une parole certaine et entièrement digne d’être reçue. '
