document_id: ACT.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacques mis à mort par Hérode. Pierre emprisonné et délivré
  - type: heading
    content: 'V. 1-19: cf. (Ac 5:17-24. Da 6:16-23. És 49:24, 25. Hé 1:14.) Ap 2:10. Mt 18:19, 20.'
  - type: text
    content: 'Vers le même temps, le roi Hérode se mit à maltraiter quelques membres de l’Église, '
  '10':
  - type: text
    content: 'Lorsqu’ils eurent passé la première garde, puis la seconde, ils arrivèrent à la porte de fer qui mène à la ville, et qui s’ouvrit '
  - type: note
    content: Ac 16:26.
  - type: text
    content: 'd’elle-même devant eux; ils sortirent, et s’avancèrent dans une rue. Aussitôt l’ange quitta Pierre. '
  '11':
  - type: text
    content: 'Revenu à lui-même, Pierre dit: Je vois maintenant d’une manière certaine '
  - type: note
    content: Da 6:23.
  - type: text
    content: 'que le Seigneur a envoyé son ange, et qu’il m’a délivré de la main d’Hérode et de tout ce que le peuple juif attendait. '
  '12':
  - type: text
    content: 'Après avoir réfléchi, '
  - type: note
    content: Ac 4:23.
  - type: text
    content: 'il se dirigea vers la maison de Marie, mère de Jean, surnommé Marc, où beaucoup de personnes étaient réunies et priaient. '
  '13':
  - type: text
    content: 'Il frappa à la porte du vestibule, et une servante, nommée Rhode, s’approcha pour écouter. '
  '14':
  - type: text
    content: 'Elle reconnut la voix de Pierre; et, dans sa joie, au lieu d’ouvrir, elle courut annoncer que Pierre était devant la porte. '
  '15':
  - type: text
    content: 'Ils lui dirent: Tu es folle. Mais elle affirma que la chose était ainsi. '
  '16':
  - type: text
    content: 'Et ils dirent: C’est son ange. Cependant Pierre continuait à frapper. Ils ouvrirent, et furent étonnés de le voir. '
  '17':
  - type: text
    content: 'Pierre, leur ayant '
  - type: note
    content: Ac 13:16; 19:33; 21:40.
  - type: text
    content: 'de la main fait signe de se taire, leur raconta comment le Seigneur l’avait tiré de la prison, et il dit: Annoncez-le à Jacques et aux frères. Puis il sortit, et s’en alla dans un autre lieu. '
  '18':
  - type: text
    content: 'Quand il fit jour, les soldats furent dans une grande agitation, pour savoir ce que Pierre était devenu. '
  '19':
  - type: text
    content: Hérode, s’étant mis à sa recherche et ne l’ayant pas trouvé, interrogea les gardes, et donna l’ordre de les mener au supplice. Ensuite il descendit de la Judée à Césarée, pour y séjourner.
  - type: heading
    content: Mort d’Hérode
  - type: heading
    content: 'V. 20-25: cf. (Da 5:18-30. Pr 16:18. Ps 37:35, 36.) És 51:7, 8.'
  '2':
  - type: text
    content: 'et il fit mourir par l’épée Jacques, '
  - type: note
    content: Mt 4:21.
  - type: text
    content: 'frère de Jean. '
  '20':
  - type: text
    content: 'Hérode avait des dispositions hostiles à l’égard des Tyriens et des Sidoniens. Mais ils vinrent le trouver d’un commun accord; et, après avoir gagné Blaste, son chambellan, ils sollicitèrent la paix, parce que leur pays tirait sa subsistance de celui du roi. '
  '21':
  - type: text
    content: 'A un jour fixé, Hérode, revêtu de ses habits royaux, et assis sur son trône, les harangua publiquement. '
  '22':
  - type: text
    content: 'Le peuple s’écria: Voix d’un dieu, et non d’un homme! '
  '23':
  - type: text
    content: 'Au même instant, un ange du Seigneur le frappa, parce qu’il n’avait pas donné gloire à Dieu. Et il expira, rongé des vers. '
  '24':
  - type: note
    content: És 55:11. Ac 6:7.
  - type: text
    content: 'Cependant la parole de Dieu se répandait de plus en plus, et le nombre des disciples augmentait. '
  '25':
  - type: text
    content: Barnabas et Saul, après s’être acquittés de leur message, s’en retournèrent de Jérusalem, emmenant avec eux Jean, surnommé Marc.
  '3':
  - type: text
    content: 'Voyant que cela était agréable aux Juifs, il fit encore arrêter Pierre. C’était pendant les jours des pains sans levain. '
  '4':
  - type: note
    content: Jn 21:18.
  - type: text
    content: 'Après l’avoir saisi et jeté en prison, il le mit sous la garde de quatre escouades de quatre soldats chacune, avec l’intention de le faire comparaître devant le peuple après la Pâque. '
  '5':
  - type: text
    content: 'Pierre donc était gardé dans la prison; et l’Église ne cessait d’adresser pour lui des prières à Dieu. '
  '6':
  - type: text
    content: 'La nuit qui précéda le jour où Hérode allait le faire comparaître, Pierre, lié de deux chaînes, dormait entre deux soldats; et des sentinelles devant la porte gardaient la prison. '
  '7':
  - type: note
    content: Ac 5:19; 16:26.
  - type: text
    content: 'Et voici, un ange du Seigneur survint, et une lumière brilla dans la prison. L’ange réveilla Pierre, en le frappant au côté, et en disant: Lève-toi promptement! Les chaînes tombèrent de ses mains. '
  '8':
  - type: text
    content: 'Et l’ange lui dit: Mets ta ceinture et tes sandales. Et il fit ainsi. L’ange lui dit encore: Enveloppe-toi de ton manteau, et suis-moi. '
  '9':
  - type: text
    content: 'Pierre sortit, et le suivit, ne sachant pas que ce qui se faisait par l’ange fût réel, et s’imaginant avoir une vision. '
