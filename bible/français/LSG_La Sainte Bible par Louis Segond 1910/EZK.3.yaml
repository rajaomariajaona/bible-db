document_id: EZK.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Il me dit: Fils de l’homme, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 15:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 2:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 10:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mange ce que tu trouves, mange ce rouleau, et va, parle à la maison d’Israël! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Il me dit: Fils de l’homme, reçois dans ton cœur et écoute de tes oreilles toutes les paroles que je te dirai! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Va vers les captifs, vers les enfants de ton peuple; tu leur parleras, et, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 2:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qu’ils écoutent ou qu’ils n’écoutent pas, tu leur diras: Ainsi parle le Seigneur, l’Éternel. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 8:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et l’esprit m’enleva, et j’entendis derrière moi le bruit d’un grand tumulte: Bénie soit la gloire de l’Éternel, du lieu de sa demeure! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'J’entendis le bruit des ailes des animaux, frappant l’une contre l’autre, le bruit des roues auprès d’eux, et le bruit d’un grand tumulte. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'L’esprit m’enleva et m’emporta. J’allais, irrité et furieux, et la main de l’Éternel agissait sur moi avec puissance. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'J’arrivai à Thel-Abib, vers les exilés qui demeuraient près du fleuve du Kebar, et dans le lieu où ils se trouvaient; là je restai '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 2:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: sept jours, stupéfait au milieu d’eux.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-21: cf. Éz 33:1-20. Ac 20:26-31.'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Au bout de sept jours, la parole de l’Éternel me fut adressée, en ces mots: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 62:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 33:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 3:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Fils de l’homme, je t’établis comme sentinelle sur la maison d’Israël. Tu écouteras la parole qui sortira de ma bouche, et tu les avertiras de ma part. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 33:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand je dirai au méchant: Tu mourras! Si tu ne l’avertis pas, si tu ne parles pas pour détourner le méchant de sa mauvaise voie et pour lui sauver la vie, ce méchant mourra dans son iniquité, et je te redemanderai son sang. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Mais si tu avertis le méchant, et qu’il ne se détourne pas de sa méchanceté et de sa mauvaise voie, il mourra dans son iniquité, et toi, tu sauveras ton âme. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'J’ouvris la bouche, et il me fit manger ce rouleau. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 18:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un juste se détourne de sa justice et fait ce qui est mal, je mettrai un piège devant lui, et il mourra; parce que tu ne l’as pas averti, il mourra dans son péché, on ne parlera plus de la justice qu’il a pratiquée, et je te redemanderai son sang. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Mais si tu avertis le juste de ne pas pécher, et qu’il ne pèche pas, il vivra, parce qu’il s’est laissé avertir, et toi, tu sauveras ton âme.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-27: cf. Éz 24:24-27.'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Là encore la main de l’Éternel fut sur moi, et il me dit: Lève-toi, va dans la vallée, et là je te parlerai. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Je me levai, et j’allai dans la vallée; et voici, la gloire de l’Éternel y apparut, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 1:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'telle que je l’avais vue près du fleuve du Kebar. Alors je tombai sur ma face. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 2:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'L’esprit entra en moi, et me fit tenir sur mes pieds. Et l’Éternel me parla et me dit: Va t’enfermer dans ta maison. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fils de l’homme, voici, on mettra sur toi des cordes, avec lesquelles on te liera, afin que tu n’ailles pas au milieu d’eux. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'J’attacherai ta langue à ton palais, pour que tu sois muet et que tu ne puisses pas les reprendre, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 2:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car c’est une famille de rebelles. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Mais quand je te parlerai, j’ouvrirai ta bouche, pour que tu leur dises: Ainsi parle le Seigneur, l’Éternel. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 2:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que celui qui voudra écouter écoute, et que celui qui ne voudra pas n’écoute pas, car c’est une famille de rebelles.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il me dit: Fils de l’homme, nourris ton ventre et remplis tes entrailles de ce rouleau que je te donne!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je le mangeai, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 19:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 119:103
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 10:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: et il fut dans ma bouche doux comme du miel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Exhortations pour la maison d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 4-15: cf. Éz 2:3-7. Jé 1:17-19.'
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il me dit: Fils de l’homme, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 1:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'va vers la maison d’Israël, et dis-leur mes paroles! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Car ce n’est point vers un peuple ayant un langage obscur, une langue inintelligible, que tu es envoyé; c’est à la maison d’Israël. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ce n’est point vers de nombreux peuples ayant un langage obscur, une langue inintelligible, dont tu ne comprends pas les discours. Si je t’envoyais vers eux, ils t’écouteraient. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mais la maison d’Israël ne voudra pas t’écouter, parce qu’elle ne veut pas m’écouter; car toute la maison d’Israël a le front dur et le cœur endurci. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 1:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 3:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Voici, j’endurcirai ta face, pour que tu l’opposes à leur face; j’endurcirai ton front, pour que tu l’opposes à leur front. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Je rendrai ton front comme un diamant, plus dur que le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 5:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'roc. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 1:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 2:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 3:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ne les crains pas, quoiqu’ils soient une famille de rebelles. '
