document_id: EZK.3,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'Il me dit: Fils de l’homme, '
  - type: note
    content: Jé 15:16. Éz 2:8. Ap 10:9.
  - type: text
    content: 'mange ce que tu trouves, mange ce rouleau, et va, parle à la maison d’Israël! '
  '10':
  - type: text
    content: 'Il me dit: Fils de l’homme, reçois dans ton cœur et écoute de tes oreilles toutes les paroles que je te dirai! '
  '11':
  - type: text
    content: 'Va vers les captifs, vers les enfants de ton peuple; tu leur parleras, et, '
  - type: note
    content: Éz 2:5, 7.
  - type: text
    content: 'qu’ils écoutent ou qu’ils n’écoutent pas, tu leur diras: Ainsi parle le Seigneur, l’Éternel. '
  '12':
  - type: note
    content: Éz 8:3.
  - type: text
    content: 'Et l’esprit m’enleva, et j’entendis derrière moi le bruit d’un grand tumulte: Bénie soit la gloire de l’Éternel, du lieu de sa demeure! '
  '13':
  - type: text
    content: 'J’entendis le bruit des ailes des animaux, frappant l’une contre l’autre, le bruit des roues auprès d’eux, et le bruit d’un grand tumulte. '
  '14':
  - type: text
    content: 'L’esprit m’enleva et m’emporta. J’allais, irrité et furieux, et la main de l’Éternel agissait sur moi avec puissance. '
  '15':
  - type: text
    content: 'J’arrivai à Thel-Abib, vers les exilés qui demeuraient près du fleuve du Kebar, et dans le lieu où ils se trouvaient; là je restai '
  - type: note
    content: Job 2:13.
  - type: text
    content: sept jours, stupéfait au milieu d’eux.
  - type: heading
    content: 'V. 16-21: cf. Éz 33:1-20. Ac 20:26-31.'
  '16':
  - type: text
    content: 'Au bout de sept jours, la parole de l’Éternel me fut adressée, en ces mots: '
  '17':
  - type: note
    content: És 62:6. Éz 33:7. 1 Ti 3:1.
  - type: text
    content: 'Fils de l’homme, je t’établis comme sentinelle sur la maison d’Israël. Tu écouteras la parole qui sortira de ma bouche, et tu les avertiras de ma part. '
  '18':
  - type: note
    content: Éz 33:8.
  - type: text
    content: 'Quand je dirai au méchant: Tu mourras! Si tu ne l’avertis pas, si tu ne parles pas pour détourner le méchant de sa mauvaise voie et pour lui sauver la vie, ce méchant mourra dans son iniquité, et je te redemanderai son sang. '
  '19':
  - type: text
    content: 'Mais si tu avertis le méchant, et qu’il ne se détourne pas de sa méchanceté et de sa mauvaise voie, il mourra dans son iniquité, et toi, tu sauveras ton âme. '
  '2':
  - type: text
    content: 'J’ouvris la bouche, et il me fit manger ce rouleau. '
  '20':
  - type: note
    content: Éz 18:24; 33:12, 13.
  - type: text
    content: 'Si un juste se détourne de sa justice et fait ce qui est mal, je mettrai un piège devant lui, et il mourra; parce que tu ne l’as pas averti, il mourra dans son péché, on ne parlera plus de la justice qu’il a pratiquée, et je te redemanderai son sang. '
  '21':
  - type: text
    content: Mais si tu avertis le juste de ne pas pécher, et qu’il ne pèche pas, il vivra, parce qu’il s’est laissé avertir, et toi, tu sauveras ton âme.
  - type: heading
    content: 'V. 22-27: cf. Éz 24:24-27.'
  '22':
  - type: text
    content: 'Là encore la main de l’Éternel fut sur moi, et il me dit: Lève-toi, va dans la vallée, et là je te parlerai. '
  '23':
  - type: text
    content: 'Je me levai, et j’allai dans la vallée; et voici, la gloire de l’Éternel y apparut, '
  - type: note
    content: Éz 1:3.
  - type: text
    content: 'telle que je l’avais vue près du fleuve du Kebar. Alors je tombai sur ma face. '
  '24':
  - type: note
    content: Éz 2:2.
  - type: text
    content: 'L’esprit entra en moi, et me fit tenir sur mes pieds. Et l’Éternel me parla et me dit: Va t’enfermer dans ta maison. '
  '25':
  - type: text
    content: 'Fils de l’homme, voici, on mettra sur toi des cordes, avec lesquelles on te liera, afin que tu n’ailles pas au milieu d’eux. '
  '26':
  - type: text
    content: 'J’attacherai ta langue à ton palais, pour que tu sois muet et que tu ne puisses pas les reprendre, '
  - type: note
    content: Éz 2:5.
  - type: text
    content: 'car c’est une famille de rebelles. '
  '27':
  - type: text
    content: 'Mais quand je te parlerai, j’ouvrirai ta bouche, pour que tu leur dises: Ainsi parle le Seigneur, l’Éternel. '
  - type: note
    content: Éz 2:5, 7.
  - type: text
    content: Que celui qui voudra écouter écoute, et que celui qui ne voudra pas n’écoute pas, car c’est une famille de rebelles.
  '3':
  - type: text
    content: 'Il me dit: Fils de l’homme, nourris ton ventre et remplis tes entrailles de ce rouleau que je te donne!'
  - type: text
    content: 'Je le mangeai, '
  - type: note
    content: Ps 19:11; 119:103. Ap 10:10.
  - type: text
    content: et il fut dans ma bouche doux comme du miel.
  - type: heading
    content: Exhortations pour la maison d’Israël
  - type: heading
    content: 'V. 4-15: cf. Éz 2:3-7. Jé 1:17-19.'
  '4':
  - type: text
    content: 'Il me dit: Fils de l’homme, '
  - type: note
    content: Jé 1:17.
  - type: text
    content: 'va vers la maison d’Israël, et dis-leur mes paroles! '
  '5':
  - type: text
    content: 'Car ce n’est point vers un peuple ayant un langage obscur, une langue inintelligible, que tu es envoyé; c’est à la maison d’Israël. '
  '6':
  - type: text
    content: 'Ce n’est point vers de nombreux peuples ayant un langage obscur, une langue inintelligible, dont tu ne comprends pas les discours. Si je t’envoyais vers eux, ils t’écouteraient. '
  '7':
  - type: text
    content: 'Mais la maison d’Israël ne voudra pas t’écouter, parce qu’elle ne veut pas m’écouter; car toute la maison d’Israël a le front dur et le cœur endurci. '
  '8':
  - type: note
    content: Jé 1:18. Mi 3:8.
  - type: text
    content: 'Voici, j’endurcirai ta face, pour que tu l’opposes à leur face; j’endurcirai ton front, pour que tu l’opposes à leur front. '
  '9':
  - type: text
    content: 'Je rendrai ton front comme un diamant, plus dur que le '
  - type: note
    content: Jé 5:3.
  - type: text
    content: 'roc. '
  - type: note
    content: Jé 1:8, 17. Éz 2:6. 1 Pi 3:14.
  - type: text
    content: 'Ne les crains pas, quoiqu’ils soient une famille de rebelles. '
