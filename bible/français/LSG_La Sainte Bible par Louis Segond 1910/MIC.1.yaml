document_id: MIC.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Menaces de l’Éternel contre Israël et Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. Ps 50:1-4. (Os 8:1-6; 13:16. 2 R 18:9-12.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: La parole de l’Éternel fut adressée à Michée, de Moréscheth, au temps de Jotham, d’Achaz, d’Ézéchias, rois de Juda, prophétie sur Samarie et Jérusalem.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 1:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne l’annoncez point dans Gath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne pleurez point dans Acco!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 6:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je me roule dans la poussière à Beth-Leaphra.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Passe, habitante de Schaphir, dans la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 47:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: nudité et la honte!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’habitante de Tsaanan n’ose sortir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le deuil de Beth-Haëtsel vous prive de son abri.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’habitante de Maroth tremble pour son salut,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 3:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car le malheur est descendu de la part de l’Éternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à la porte de Jérusalem.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Attelle les coursiers à ton char,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Habitante de Lakisch!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as été pour la fille de Sion une première cause de péché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car en toi se sont trouvés les crimes d’Israël.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi tu renonceras à Moréschet-Gath;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les maisons d’Aczib seront une source trompeuse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour les rois d’Israël.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’amènerai un nouveau maître, habitante de Maréscha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La gloire d’Israël s’en ira jusqu’à Adullam.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rase-toi, coupe ta chevelure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de tes enfants chéris!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rends-toi chauve comme l’aigle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils s’en vont en captivité loin de toi!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Écoutez, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: vous tous, peuples!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois attentive, terre, et ce qui est en toi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le Seigneur, l’Éternel, soit témoin contre vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur qui est dans le palais de sa sainteté!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car voici, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 26:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: l’Éternel sort de sa demeure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 115:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'descend, il marche sur les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: hauteurs de la terre.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 97:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 9:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Sous lui les montagnes se fondent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les vallées s’entr’ouvrent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme la cire devant le feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme l’eau qui coule sur une pente.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tout cela à cause du crime de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause des péchés de la maison d’Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quel est le crime de Jacob? N’est-ce pas Samarie?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quels sont les hauts lieux de Juda? N’est-ce pas Jérusalem?…
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai de Samarie un monceau de pierres dans les champs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un lieu pour planter de la vigne;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je précipiterai ses pierres dans la vallée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je mettrai à nu ses fondements.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes ses images taillées seront brisées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ses salaires impurs seront brûlés au feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et je ravagerai toutes ses idoles:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Recueillies avec le salaire de la prostitution,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles deviendront un salaire de prostitution…
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-16: cf. És 36:1, 2; 10:28, etc.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi je pleurerai, je me lamenterai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je marcherai déchaussé et nu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je pousserai des cris comme le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 30:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: chacal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et des gémissements comme l’autruche.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car sa plaie est douloureuse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle s’étend jusqu’à Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle pénètre jusqu’à la porte de mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à Jérusalem.
