document_id: MIC.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Menaces de l’Éternel contre Israël et Juda
  - type: heading
    content: 'V. 1-7: cf. Ps 50:1-4. (Os 8:1-6; 13:16. 2 R 18:9-12.)'
  - type: text
    content: La parole de l’Éternel fut adressée à Michée, de Moréscheth, au temps de Jotham, d’Achaz, d’Ézéchias, rois de Juda, prophétie sur Samarie et Jérusalem.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 2 S 1:20.
  - type: text
    content: Ne l’annoncez point dans Gath,
  - type: text
    content: Ne pleurez point dans Acco!
  - type: note
    content: Jé 6:26.
  - type: text
    content: Je me roule dans la poussière à Beth-Leaphra.
  '11':
  - type: text
    content: 'Passe, habitante de Schaphir, dans la '
  - type: note
    content: És 47:3.
  - type: text
    content: nudité et la honte!
  - type: text
    content: L’habitante de Tsaanan n’ose sortir,
  - type: text
    content: Le deuil de Beth-Haëtsel vous prive de son abri.
  '12':
  - type: text
    content: L’habitante de Maroth tremble pour son salut,
  - type: note
    content: Am 3:6.
  - type: text
    content: Car le malheur est descendu de la part de l’Éternel
  - type: text
    content: Jusqu’à la porte de Jérusalem.
  '13':
  - type: text
    content: Attelle les coursiers à ton char,
  - type: text
    content: Habitante de Lakisch!
  - type: text
    content: Tu as été pour la fille de Sion une première cause de péché,
  - type: text
    content: Car en toi se sont trouvés les crimes d’Israël.
  '14':
  - type: text
    content: C’est pourquoi tu renonceras à Moréschet-Gath;
  - type: text
    content: Les maisons d’Aczib seront une source trompeuse
  - type: text
    content: Pour les rois d’Israël.
  '15':
  - type: text
    content: Je t’amènerai un nouveau maître, habitante de Maréscha;
  - type: text
    content: La gloire d’Israël s’en ira jusqu’à Adullam.
  '16':
  - type: text
    content: Rase-toi, coupe ta chevelure,
  - type: text
    content: A cause de tes enfants chéris!
  - type: text
    content: Rends-toi chauve comme l’aigle,
  - type: text
    content: Car ils s’en vont en captivité loin de toi!
  '2':
  - type: text
    content: 'Écoutez, '
  - type: note
    content: De 32:1. És 1:2.
  - type: text
    content: vous tous, peuples!
  - type: text
    content: Sois attentive, terre, et ce qui est en toi!
  - type: text
    content: Que le Seigneur, l’Éternel, soit témoin contre vous,
  - type: text
    content: Le Seigneur qui est dans le palais de sa sainteté!
  '3':
  - type: text
    content: 'Car voici, '
  - type: note
    content: És 26:21.
  - type: text
    content: l’Éternel sort de sa demeure,
  - type: text
    content: 'Il '
  - type: note
    content: Ps 115:3.
  - type: text
    content: 'descend, il marche sur les '
  - type: note
    content: De 32:13; 33:29.
  - type: text
    content: hauteurs de la terre.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ps 97:5. Am 9:5.
  - type: text
    content: Sous lui les montagnes se fondent,
  - type: text
    content: Les vallées s’entr’ouvrent,
  - type: text
    content: Comme la cire devant le feu,
  - type: text
    content: Comme l’eau qui coule sur une pente.
  '5':
  - type: text
    content: Et tout cela à cause du crime de Jacob,
  - type: text
    content: A cause des péchés de la maison d’Israël!
  - type: text
    content: Quel est le crime de Jacob? N’est-ce pas Samarie?
  - type: text
    content: Quels sont les hauts lieux de Juda? N’est-ce pas Jérusalem?…
  '6':
  - type: text
    content: Je ferai de Samarie un monceau de pierres dans les champs,
  - type: text
    content: Un lieu pour planter de la vigne;
  - type: text
    content: Je précipiterai ses pierres dans la vallée,
  - type: text
    content: Je mettrai à nu ses fondements.
  '7':
  - type: text
    content: Toutes ses images taillées seront brisées,
  - type: text
    content: Tous ses salaires impurs seront brûlés au feu,
  - type: text
    content: 'Et je ravagerai toutes ses idoles:'
  - type: text
    content: Recueillies avec le salaire de la prostitution,
  - type: text
    content: Elles deviendront un salaire de prostitution…
  - type: heading
    content: 'V. 8-16: cf. És 36:1, 2; 10:28, etc.'
  '8':
  - type: text
    content: C’est pourquoi je pleurerai, je me lamenterai,
  - type: text
    content: Je marcherai déchaussé et nu,
  - type: text
    content: 'Je pousserai des cris comme le '
  - type: note
    content: Job 30:29.
  - type: text
    content: chacal,
  - type: text
    content: Et des gémissements comme l’autruche.
  '9':
  - type: text
    content: Car sa plaie est douloureuse;
  - type: text
    content: Elle s’étend jusqu’à Juda,
  - type: text
    content: Elle pénètre jusqu’à la porte de mon peuple,
  - type: text
    content: Jusqu’à Jérusalem.
