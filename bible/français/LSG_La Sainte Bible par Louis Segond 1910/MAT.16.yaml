document_id: MAT.16,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Un signe du ciel demandé par les pharisiens et les sadducéens. Le levain des pharisiens
  - type: heading
    content: 'V. 1-12: cf. (Mc 8:11-21.) Mt 12:38-42.'
  - type: text
    content: ' '
  - type: note
    content: Mt 12:38. Mc 8:11. Lu 11:29; 12:54. Jn 6:30.
  - type: text
    content: 'Les pharisiens et les sadducéens abordèrent Jésus et, pour l’éprouver, lui demandèrent de leur faire voir un signe venant du ciel. '
  '10':
  - type: note
    content: Mt 15:34.
  - type: text
    content: ni les sept pains des quatre mille hommes et combien de corbeilles vous avez emportées?
  - type: text
    content: ' '
  '11':
  - type: text
    content: Comment ne comprenez-vous pas que ce n’est pas au sujet de pains que je vous ai parlé? Gardez-vous du levain des pharisiens et des sadducéens.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Alors ils comprirent que ce n’était pas du levain du pain qu’il avait dit de se garder, mais de l’enseignement des pharisiens et des sadducéens.
  - type: heading
    content: Jésus sur le territoire de Césarée de Philippe. — Opinions diverses sur le Christ. — Confession de Pierre
  - type: heading
    content: 'V. 13-20: cf. (Mc 8:27-30. Lu 9:18-21.) Jn 6:66-69.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Mc 8:27. Lu 9:18.
  - type: text
    content: 'Jésus, étant arrivé dans le territoire de Césarée de Philippe, demanda à ses disciples: '
  - type: text
    content: Qui dit-on que je suis, moi, le Fils de l’homme?
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Ils répondirent: '
  - type: note
    content: Mt 14:2.
  - type: text
    content: 'Les uns disent que tu es Jean-Baptiste; les autres, Élie; les autres, Jérémie, ou l’un des prophètes. '
  '15':
  - type: text
    content: Et vous,
  - type: text
    content: ' leur dit-il, '
  - type: text
    content: qui dites-vous que je suis?
  - type: text
    content: ' '
  '16':
  - type: note
    content: Jn 6:69.
  - type: text
    content: 'Simon Pierre répondit: Tu es le Christ, le Fils du Dieu vivant. '
  '17':
  - type: text
    content: 'Jésus, reprenant la parole, lui dit: '
  - type: text
    content: Tu es heureux, Simon, fils de Jonas; car ce ne sont pas la chair et le sang qui t’ont révélé cela, mais
  - type: text
    content: ' '
  - type: note
    content: Mt 11:25.
  - type: text
    content: c’est mon Père qui est dans les cieux.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ps 118:22. Jn 1:43.
  - type: text
    content: Et moi, je te dis que tu es Pierre, et que sur
  - type: text
    content: ' '
  - type: note
    content: És 28:16. 1 Co 3:11.
  - type: text
    content: cette pierre je bâtirai mon Église, et que les
  - type: text
    content: ' '
  - type: note
    content: És 33:20.
  - type: text
    content: portes du séjour des morts ne prévaudront point contre elle.
  - type: text
    content: ' '
  '19':
  - type: note
    content: Mt 18:18. Jn 20:22.
  - type: text
    content: 'Je te donnerai les clefs du royaume des cieux: ce que tu lieras sur la terre sera lié dans les cieux, et ce que tu délieras sur la terre sera délié dans les cieux.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Jésus leur répondit: '
  - type: note
    content: Lu 12:54.
  - type: text
    content: 'Le soir, vous dites: Il fera beau, car le ciel est rouge; et le matin:'
  '20':
  - type: text
    content: Alors il recommanda aux disciples de ne dire à personne qu’il était le Christ.
  - type: heading
    content: Jésus annonce ses souffrances et sa mort. — Comment suivre Jésus
  - type: heading
    content: 'V. 21-28: cf. (Mc 8:31 à 9:1. Lu 9:22-27.) Lu 14:25-27.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Mt 17:22; 20:18. Mc 8:31; 9:31; 10:33. Lu 9:22; 18:31; 24:7.
  - type: text
    content: 'Dès lors Jésus commença à faire connaître à ses disciples qu’il fallait qu’il allât à Jérusalem, qu’il souffrît beaucoup de la part des anciens, des principaux sacrificateurs et des scribes, qu’il fût mis à mort, et qu’il ressuscitât le troisième jour. '
  '22':
  - type: text
    content: 'Pierre, l’ayant pris à part, se mit à le reprendre, et dit: A Dieu ne plaise, Seigneur! Cela ne t’arrivera pas. '
  '23':
  - type: text
    content: 'Mais Jésus, se retournant, dit à Pierre: '
  - type: text
    content: Arrière de moi, Satan!
  - type: text
    content: ' '
  - type: note
    content: 2 S 19:22.
  - type: text
    content: tu m’es en scandale; car tes pensées ne sont pas les pensées de Dieu, mais celles des hommes.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Alors Jésus dit à ses disciples: '
  - type: note
    content: Mt 10:38. Mc 8:34. Lu 9:23; 14:27.
  - type: text
    content: Si quelqu’un veut venir après moi, qu’il renonce à lui-même, qu’il se charge de sa croix, et qu’il me suive.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Mt 10:39. Mc 8:35. Lu 9:24; 17:33. Jn 12:25.
  - type: text
    content: Car celui qui voudra sauver sa vie la perdra, mais celui qui la perdra à cause de moi la trouvera.
  - type: text
    content: ' '
  '26':
  - type: note
    content: Lu 9:25.
  - type: text
    content: Et que servirait-il à un homme de gagner tout le monde, s’il perdait son âme? Ou,
  - type: text
    content: ' '
  - type: note
    content: Ps 49:9. Mc 8:37.
  - type: text
    content: que donnerait un homme en échange de son âme?
  - type: text
    content: ' '
  '27':
  - type: note
    content: Mt 24:30; 25:31; 26:64.
  - type: text
    content: Car le Fils de l’homme doit venir dans la
  - type: text
    content: ' '
  - type: note
    content: Mt 25:31.
  - type: text
    content: gloire de son Père, avec ses anges; et
  - type: text
    content: ' '
  - type: note
    content: Job 34:11. Ps 62:13. Ro 2:6.
  - type: text
    content: alors il rendra à chacun selon ses œuvres.
  - type: text
    content: ' '
  '28':
  - type: note
    content: Mc 9:1. Lu 9:27.
  - type: text
    content: Je vous le dis en vérité, quelques-uns de ceux qui sont ici ne mourront point, qu’ils n’aient vu le Fils de l’homme venir dans son règne.
  '3':
  - type: text
    content: ' '
  - type: text
    content: Il y aura de l’orage aujourd’hui, car le ciel est d’un rouge sombre. Vous savez discerner l’aspect du ciel, et vous ne pouvez discerner les signes des temps.
  - type: text
    content: ' '
  '4':
  - type: note
    content: Mt 12:39. Lu 11:29.
  - type: text
    content: Une génération méchante et adultère demande un miracle; il ne lui sera donné d’autre miracle que celui de
  - type: text
    content: ' '
  - type: note
    content: Jon 1:17.
  - type: text
    content: Jonas.
  - type: text
    content: ' Puis il les quitta, et s’en alla. '
  '5':
  - type: text
    content: 'Les disciples, en passant à l’autre bord, avaient oublié de prendre des pains. '
  '6':
  - type: note
    content: Mc 8:15. Lu 12:1.
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: Gardez-vous avec soin du levain des pharisiens et des sadducéens.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Les disciples raisonnaient en eux-mêmes, et disaient: C’est parce que nous n’avons pas pris de pains. '
  '8':
  - type: text
    content: 'Jésus, l’ayant connu, dit: '
  - type: text
    content: Pourquoi raisonnez-vous en vous-mêmes, gens de peu de foi, sur ce que vous n’avez pas pris de pains?
  '9':
  - type: text
    content: ' '
  - type: note
    content: Mt 14:17. Mc 6:38. Lu 9:13. Jn 6:9.
  - type: text
    content: Êtes-vous encore sans intelligence, et ne vous rappelez-vous plus les cinq pains des cinq mille hommes et combien de paniers vous avez emportés,
  - type: text
    content: ' '
