    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Comment ne comprenez-vous pas que ce n’est pas au sujet de pains que je vous ai parlé? Gardez-vous du levain des pharisiens et des sadducéens.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors ils comprirent que ce n’était pas du levain du pain qu’il avait dit de se garder, mais de l’enseignement des pharisiens et des sadducéens.
  - type: usfm
    marker: s1
    children:
    - type: text
