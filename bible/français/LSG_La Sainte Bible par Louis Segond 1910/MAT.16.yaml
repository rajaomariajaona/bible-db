      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Gardez-vous avec soin du levain des pharisiens et des sadducéens.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les disciples raisonnaient en eux-mêmes, et disaient: C’est parce que nous n’avons pas pris de pains. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, l’ayant connu, dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pourquoi raisonnez-vous en vous-mêmes, gens de peu de foi, sur ce que vous n’avez pas pris de pains?
  '9':
