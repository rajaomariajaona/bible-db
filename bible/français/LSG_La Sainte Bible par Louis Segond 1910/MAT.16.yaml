  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, reprenant la parole, lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu es heureux, Simon, fils de Jonas; car ce ne sont pas la chair et le sang qui t’ont révélé cela, mais
    - type: text
