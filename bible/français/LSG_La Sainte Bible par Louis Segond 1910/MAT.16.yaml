      marker-yv: yv-n
    - type: text
      text: 'Dès lors Jésus commença à faire connaître à ses disciples qu’il fallait qu’il allât à Jérusalem, qu’il souffrît beaucoup de la part des anciens, des principaux sacrificateurs et des scribes, qu’il fût mis à mort, et qu’il ressuscitât le troisième jour. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre, l’ayant pris à part, se mit à le reprendre, et dit: A Dieu ne plaise, Seigneur! Cela ne t’arrivera pas. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus, se retournant, dit à Pierre: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Arrière de moi, Satan!
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 19:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
