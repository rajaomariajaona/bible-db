  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il y aura de l’orage aujourd’hui, car le ciel est d’un rouge sombre. Vous savez discerner l’aspect du ciel, et vous ne pouvez discerner les signes des temps.
    - type: text
