document_id: 1CO.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-9: cf. (Ja 4:1. Pr 20:3.) (Mt 5:38-41, 23, 24. Ro 12:17, 18.)'
  - type: text
    content: 'Quelqu’un de vous, lorsqu’il a un différend avec un autre, ose-t-il plaider devant les injustes, et non devant les saints? '
  '10':
  - type: text
    content: 'ni les voleurs, ni les cupides, ni les ivrognes, ni les outrageux, ni les ravisseurs, n’hériteront le royaume de Dieu. '
  '11':
  - type: note
    content: Ép 2:2. Col 3:7. Tit 3:3.
  - type: text
    content: 'Et c’est là ce que vous étiez, quelques-uns de vous. '
  - type: note
    content: Hé 10:22.
  - type: text
    content: Mais vous avez été lavés, mais vous avez été sanctifiés, mais vous avez été justifiés au nom du Seigneur Jésus-Christ, et par l’Esprit de notre Dieu.
  - type: heading
    content: 'V. 12-20: cf. 1 Th 4:1-7. (1 Pi 1:14-19. 2 Co 5:14, 15.)'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 1 Co 10:23.
  - type: text
    content: 'Tout m’est permis, mais tout n’est pas utile; tout m’est permis, mais je ne me laisserai asservir par quoi que ce soit. '
  '13':
  - type: text
    content: 'Les aliments sont pour le ventre, et le ventre pour les aliments; et Dieu détruira l’un comme les autres. Mais le corps n’est pas pour l’impudicité. Il est pour le Seigneur, et le Seigneur pour le corps. '
  '14':
  - type: note
    content: Ro 8:11. 2 Co 4:14.
  - type: text
    content: 'Et Dieu, qui a ressuscité le Seigneur, nous ressuscitera aussi par sa puissance. '
  '15':
  - type: text
    content: 'Ne savez-vous pas que vos corps sont des membres de Christ? Prendrai-je donc les membres de Christ, pour en faire les membres d’une prostituée? '
  '16':
  - type: text
    content: 'Loin de là! Ne savez-vous pas que celui qui s’attache à la prostituée est un seul corps avec elle? '
  - type: note
    content: Ge 2:24. Mt 19:5. Mc 10:8. Ép 5:31.
  - type: text
    content: 'Car, est-il dit, les deux deviendront une seule chair. '
  '17':
  - type: text
    content: 'Mais celui qui s’attache au Seigneur est avec lui un seul esprit. '
  '18':
  - type: text
    content: 'Fuyez l’impudicité. Quelque autre péché qu’un homme commette, ce péché est hors du corps; mais celui qui se livre à l’impudicité pèche contre son propre corps. '
  '19':
  - type: text
    content: 'Ne savez-vous pas '
  - type: note
    content: 1 Co 3:16. 2 Co 6:16. Ép 2:21. Hé 3:6. 1 Pi 2:5.
  - type: text
    content: 'que votre corps est le temple du Saint-Esprit qui est en vous, que vous avez reçu de Dieu, et que vous ne vous appartenez point à vous-mêmes? '
  '2':
  - type: note
    content: Mt 19:28. Lu 22:30.
  - type: text
    content: 'Ne savez-vous pas que les saints jugeront le monde? Et si c’est par vous que le monde est jugé, êtes-vous indignes de rendre les moindres jugements? '
  '20':
  - type: note
    content: 1 R 7:23. Ga 3:13. Hé 9:12. 1 Pi 1:18.
  - type: text
    content: Car vous avez été rachetés à un grand prix. Glorifiez donc Dieu dans votre corps et dans votre esprit, qui appartiennent à Dieu.
  '3':
  - type: text
    content: 'Ne savez-vous pas que nous jugerons les anges? Et nous ne jugerions pas, à plus forte raison, les choses de cette vie? '
  '4':
  - type: text
    content: 'Quand donc vous avez des différends pour les choses de cette vie, ce sont des gens dont l’Église ne fait aucun cas que vous prenez pour juges! '
  '5':
  - type: text
    content: 'Je le dis à votre honte. Ainsi il n’y a parmi vous pas un seul homme sage qui puisse prononcer entre ses frères. '
  '6':
  - type: text
    content: 'Mais un frère plaide contre un frère, et cela devant des infidèles! '
  '7':
  - type: text
    content: 'C’est déjà certes un défaut chez vous que d’avoir des procès les uns avec les autres. '
  - type: note
    content: Pr 20:22. Mt 5:39. Ro 12:17. 1 Th 5:15. 1 Pi 3:9.
  - type: text
    content: 'Pourquoi ne souffrez-vous pas plutôt quelque injustice? Pourquoi ne vous laissez-vous pas plutôt dépouiller? '
  '8':
  - type: text
    content: 'Mais c’est vous qui commettez l’injustice et qui dépouillez, et c’est envers des frères que vous agissez de la sorte! '
  '9':
  - type: text
    content: 'Ne savez-vous pas que les injustes n’hériteront point le royaume de Dieu? Ne vous y trompez pas: '
  - type: note
    content: Ga 5:19. Ép 5:5. Ap 22:15.
  - type: text
    content: ni les impudiques, ni les idolâtres, ni les adultères, ni les efféminés, ni les infâmes,
  - type: heading
    content: 'V. 10-11: cf. Ép 5:3-8. Col 3:5-10. Tit 3:3-7.'
