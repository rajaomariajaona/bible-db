document_id: GAL.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'La loi et la foi: la loi est impuissante pour assurer le salut, elle doit conduire à la foi. La foi affranchit de la loi, elle procure la liberté évangélique'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-14: cf. (Ga 4:9-20. 1 Th 1:5-6.) Ro 4; 3:19, etc.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'O Galates, dépourvus de sens! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:7
      metadata:
        usfm: GAL.5.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui vous a fascinés, vous, aux yeux de qui Jésus-Christ a été peint comme crucifié? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici seulement ce que je veux apprendre de vous: Est-ce par les œuvres de la loi que vous avez reçu l’Esprit, ou par la prédication de la foi? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Êtes-vous tellement dépourvus de sens? Après avoir commencé par l’Esprit, voulez-vous maintenant finir par la chair? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Avez-vous tant souffert en vain? Si toutefois c’est en vain. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Celui qui vous accorde l’Esprit, et qui opère des miracles parmi vous, le fait-il donc par les œuvres de la loi, ou par la prédication de la foi? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 15:6
      metadata:
        usfm: GEN.15.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 4:3
      metadata:
        usfm: ROM.4.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 2:23
      metadata:
        usfm: JAS.2.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme Abraham crut à Dieu, et que cela lui fut imputé à justice, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'reconnaissez donc que ce sont ceux qui ont la foi qui sont fils d’Abraham. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aussi l’Écriture, prévoyant que Dieu justifierait les païens par la foi, a d’avance annoncé cette bonne nouvelle à Abraham: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 12:3
      metadata:
        usfm: GEN.12.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:18
      metadata:
        usfm: GEN.18.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:18
      metadata:
        usfm: GEN.22.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:4
      metadata:
        usfm: GEN.26.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 49:10
      metadata:
        usfm: GEN.49.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 3:25
      metadata:
        usfm: ACT.3.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Toutes les nations seront bénies en toi! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'de sorte que ceux qui croient sont bénis avec Abraham le croyant. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Car tous ceux qui s’attachent aux œuvres de la loi sont sous la malédiction; car il est écrit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 27:26
      metadata:
        usfm: DEU.27.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Maudit est quiconque n’observe pas tout ce qui est écrit dans le livre de la loi, et ne le met pas en pratique. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 3:20
      metadata:
        usfm: ROM.3.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 2:16
      metadata:
        usfm: GAL.2.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et que nul ne soit justifié devant Dieu par la loi, cela est évident, puisqu’il est dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ha 2:4
      metadata:
        usfm: HAB.2.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:17
      metadata:
        usfm: ROM.1.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 10:38
      metadata:
        usfm: HEB.10.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le juste vivra par la foi. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Or, la loi ne procède pas de la foi; mais elle dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 18:5
      metadata:
        usfm: LEV.18.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 20:11
      metadata:
        usfm: EZK.20.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 10:5
      metadata:
        usfm: ROM.10.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Celui qui mettra ces choses en pratique vivra par elles. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:3
      metadata:
        usfm: ROM.8.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:21
      metadata:
        usfm: 2CO.5.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Christ nous a rachetés de la malédiction de la loi, étant devenu malédiction pour nous, car il est écrit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 21:23
      metadata:
        usfm: DEU.21.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Maudit est quiconque est pendu au bois, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: afin que la bénédiction d’Abraham eût pour les païens son accomplissement en Jésus-Christ, et que nous reçussions par la foi l’Esprit qui avait été promis.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-29: cf. (Mi 7:20. Ac 3:25-26.) (Ro 4:13-17; 10:4-13. Ép 3:6.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Frères (je parle à la manière des hommes), '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:17
      metadata:
        usfm: HEB.9.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une disposition en bonne forme, bien que faite par un homme, n’est annulée par personne, et personne n’y ajoute. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:8
      metadata:
        usfm: GAL.3.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Or les promesses ont été faites à Abraham et à sa postérité. Il n’est pas dit: et aux postérités, comme s’il s’agissait de plusieurs, mais en tant qu’il s’agit d’une seule: et à ta postérité, c’est-à-dire, à Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Voici ce que j’entends: une disposition, que Dieu a confirmée antérieurement, ne peut pas être annulée, et ainsi la promesse rendue vaine, par la loi survenue '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 15:13
      metadata:
        usfm: GEN.15.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:40
      metadata:
        usfm: EXO.12.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:6
      metadata:
        usfm: ACT.7.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'quatre cent trente ans plus tard. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 4:14
      metadata:
        usfm: ROM.4.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car si l’héritage venait de la loi, il ne viendrait plus de la promesse; or, c’est par la promesse que Dieu a fait à Abraham ce don de sa grâce. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Pourquoi donc la loi? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 15:22
      metadata:
        usfm: JHN.15.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 4:15
      metadata:
        usfm: ROM.4.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:20
      metadata:
        usfm: ROM.5.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:8
      metadata:
        usfm: ROM.7.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Elle a été donnée ensuite à cause des transgressions, jusqu’à ce que vînt la postérité à qui la promesse avait été faite; elle a été promulguée '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:38
      metadata:
        usfm: ACT.7.38
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '53'
      metadata:
        usfm: ACT.7.53
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'par des anges, au moyen '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:5
      metadata:
        usfm: DEU.5.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:17
      metadata:
        usfm: JHN.1.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:38
      metadata:
        usfm: ACT.7.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'd’un médiateur. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Or, le médiateur n’est pas médiateur d’un seul, tandis que Dieu est un seul. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'La loi est-elle donc contre les promesses de Dieu? Loin de là! S’il eût été donné une loi qui pût procurer la vie, la justice viendrait réellement de la loi. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 3:9
      metadata:
        usfm: ROM.3.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:32
      metadata:
        usfm: ROM.11.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais l’Écriture a tout renfermé sous le péché, afin que ce qui avait été promis fût donné par la foi en Jésus-Christ à ceux qui croient. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Avant que la foi vînt, nous étions enfermés sous la garde de la loi, en vue de la foi qui devait être révélée. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:17
      metadata:
        usfm: MAT.5.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 13:38
      metadata:
        usfm: ACT.13.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 10:4
      metadata:
        usfm: ROM.10.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ainsi la loi a été comme un pédagogue pour nous conduire à Christ, afin que nous fussions justifiés par la foi. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'La foi étant venue, nous ne sommes plus sous ce pédagogue. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 56:5
      metadata:
        usfm: ISA.56.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:12
      metadata:
        usfm: JHN.1.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:15
      metadata:
        usfm: ROM.8.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 4:5
      metadata:
        usfm: GAL.4.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car vous êtes tous fils de Dieu par la foi en Jésus-Christ; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 6:3
      metadata:
        usfm: ROM.6.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vous tous, qui avez été baptisés en Christ, vous avez revêtu Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il n’y a plus ni Juif ni Grec, il n’y a plus ni esclave ni libre, il n’y a plus ni homme ni femme; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 17:21
      metadata:
        usfm: JHN.17.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car tous vous êtes un en Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 21:12
      metadata:
        usfm: GEN.21.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:7
      metadata:
        usfm: ROM.9.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:18
      metadata:
        usfm: HEB.11.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et si vous êtes à Christ, vous êtes donc la postérité d’Abraham, héritiers selon la promesse.
