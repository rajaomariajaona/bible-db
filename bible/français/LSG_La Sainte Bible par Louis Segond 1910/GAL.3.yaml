document_id: GAL.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'La loi et la foi: la loi est impuissante pour assurer le salut, elle doit conduire à la foi. La foi affranchit de la loi, elle procure la liberté évangélique'
  - type: heading
    content: 'V. 1-14: cf. (Ga 4:9-20. 1 Th 1:5-6.) Ro 4; 3:19, etc.'
  - type: text
    content: 'O Galates, dépourvus de sens! '
  - type: note
    content: Ga 5:7.
  - type: text
    content: 'qui vous a fascinés, vous, aux yeux de qui Jésus-Christ a été peint comme crucifié? '
  '10':
  - type: text
    content: 'Car tous ceux qui s’attachent aux œuvres de la loi sont sous la malédiction; car il est écrit: '
  - type: note
    content: De 27:26.
  - type: text
    content: 'Maudit est quiconque n’observe pas tout ce qui est écrit dans le livre de la loi, et ne le met pas en pratique. '
  '11':
  - type: note
    content: Ro 3:20. Ga 2:16.
  - type: text
    content: 'Et que nul ne soit justifié devant Dieu par la loi, cela est évident, puisqu’il est dit: '
  - type: note
    content: Ha 2:4. Ro 1:17. Hé 10:38.
  - type: text
    content: 'Le juste vivra par la foi. '
  '12':
  - type: text
    content: 'Or, la loi ne procède pas de la foi; mais elle dit: '
  - type: note
    content: Lé 18:5. Éz 20:11. Ro 10:5.
  - type: text
    content: 'Celui qui mettra ces choses en pratique vivra par elles. '
  '13':
  - type: note
    content: Ro 8:3. 2 Co 5:21.
  - type: text
    content: 'Christ nous a rachetés de la malédiction de la loi, étant devenu malédiction pour nous, car il est écrit: '
  - type: note
    content: De 21:23.
  - type: text
    content: 'Maudit est quiconque est pendu au bois, '
  '14':
  - type: text
    content: afin que la bénédiction d’Abraham eût pour les païens son accomplissement en Jésus-Christ, et que nous reçussions par la foi l’Esprit qui avait été promis.
  - type: heading
    content: 'V. 15-29: cf. (Mi 7:20. Ac 3:25-26.) (Ro 4:13-17; 10:4-13. Ép 3:6.)'
  '15':
  - type: text
    content: 'Frères (je parle à la manière des hommes), '
  - type: note
    content: Hé 9:17.
  - type: text
    content: 'une disposition en bonne forme, bien que faite par un homme, n’est annulée par personne, et personne n’y ajoute. '
  '16':
  - type: note
    content: Ga 3:8.
  - type: text
    content: 'Or les promesses ont été faites à Abraham et à sa postérité. Il n’est pas dit: et aux postérités, comme s’il s’agissait de plusieurs, mais en tant qu’il s’agit d’une seule: et à ta postérité, c’est-à-dire, à Christ. '
  '17':
  - type: text
    content: 'Voici ce que j’entends: une disposition, que Dieu a confirmée antérieurement, ne peut pas être annulée, et ainsi la promesse rendue vaine, par la loi survenue '
  - type: note
    content: Ge 15:13. Ex 12:40. Ac 7:6.
  - type: text
    content: 'quatre cent trente ans plus tard. '
  '18':
  - type: note
    content: Ro 4:14.
  - type: text
    content: 'Car si l’héritage venait de la loi, il ne viendrait plus de la promesse; or, c’est par la promesse que Dieu a fait à Abraham ce don de sa grâce. '
  '19':
  - type: text
    content: 'Pourquoi donc la loi? '
  - type: note
    content: Jn 15:22. Ro 4:15; 5:20; 7:8.
  - type: text
    content: 'Elle a été donnée ensuite à cause des transgressions, jusqu’à ce que vînt la postérité à qui la promesse avait été faite; elle a été promulguée '
  - type: note
    content: Ac 7:38, 53.
  - type: text
    content: 'par des anges, au moyen '
  - type: note
    content: De 5:5. Jn 1:17. Ac 7:38.
  - type: text
    content: 'd’un médiateur. '
  '2':
  - type: text
    content: 'Voici seulement ce que je veux apprendre de vous: Est-ce par les œuvres de la loi que vous avez reçu l’Esprit, ou par la prédication de la foi? '
  '20':
  - type: text
    content: 'Or, le médiateur n’est pas médiateur d’un seul, tandis que Dieu est un seul. '
  '21':
  - type: text
    content: 'La loi est-elle donc contre les promesses de Dieu? Loin de là! S’il eût été donné une loi qui pût procurer la vie, la justice viendrait réellement de la loi. '
  '22':
  - type: note
    content: Ro 3:9; 11:32.
  - type: text
    content: 'Mais l’Écriture a tout renfermé sous le péché, afin que ce qui avait été promis fût donné par la foi en Jésus-Christ à ceux qui croient. '
  '23':
  - type: text
    content: 'Avant que la foi vînt, nous étions enfermés sous la garde de la loi, en vue de la foi qui devait être révélée. '
  '24':
  - type: note
    content: Mt 5:17. Ac 13:38. Ro 10:4.
  - type: text
    content: 'Ainsi la loi a été comme un pédagogue pour nous conduire à Christ, afin que nous fussions justifiés par la foi. '
  '25':
  - type: text
    content: 'La foi étant venue, nous ne sommes plus sous ce pédagogue. '
  '26':
  - type: note
    content: És 56:5. Jn 1:12. Ro 8:15. Ga 4:5.
  - type: text
    content: 'Car vous êtes tous fils de Dieu par la foi en Jésus-Christ; '
  '27':
  - type: note
    content: Ro 6:3.
  - type: text
    content: 'vous tous, qui avez été baptisés en Christ, vous avez revêtu Christ. '
  '28':
  - type: text
    content: 'Il n’y a plus ni Juif ni Grec, il n’y a plus ni esclave ni libre, il n’y a plus ni homme ni femme; '
  - type: note
    content: Jn 17:21.
  - type: text
    content: 'car tous vous êtes un en Jésus-Christ. '
  '29':
  - type: note
    content: Ge 21:12. Ro 9:7. Hé 11:18.
  - type: text
    content: Et si vous êtes à Christ, vous êtes donc la postérité d’Abraham, héritiers selon la promesse.
  '3':
  - type: text
    content: 'Êtes-vous tellement dépourvus de sens? Après avoir commencé par l’Esprit, voulez-vous maintenant finir par la chair? '
  '4':
  - type: text
    content: 'Avez-vous tant souffert en vain? Si toutefois c’est en vain. '
  '5':
  - type: text
    content: 'Celui qui vous accorde l’Esprit, et qui opère des miracles parmi vous, le fait-il donc par les œuvres de la loi, ou par la prédication de la foi? '
  '6':
  - type: note
    content: Ge 15:6. Ro 4:3. Ja 2:23.
  - type: text
    content: 'Comme Abraham crut à Dieu, et que cela lui fut imputé à justice, '
  '7':
  - type: text
    content: 'reconnaissez donc que ce sont ceux qui ont la foi qui sont fils d’Abraham. '
  '8':
  - type: text
    content: 'Aussi l’Écriture, prévoyant que Dieu justifierait les païens par la foi, a d’avance annoncé cette bonne nouvelle à Abraham: '
  - type: note
    content: Ge 12:3; 18:18; 22:18; 26:4; 49:10. Ac 3:25.
  - type: text
    content: 'Toutes les nations seront bénies en toi! '
  '9':
  - type: text
    content: 'de sorte que ceux qui croient sont bénis avec Abraham le croyant. '
