document_id: 2CH.12,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Invasion de Schischak, roi d’Égypte. Mort de Roboam
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-16: cf. 1 R 14:21-31. (Jé 2:9-13, 19. Né 9:26, 27. Ps 106:40-45.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 14:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque Roboam se fut affermi dans son royaume et qu’il eut acquis de la force, il abandonna la loi de l’Éternel, et tout Israël l’abandonna avec lui. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Le roi Roboam fit à leur place des boucliers d’airain, et il les remit aux soins des chefs des coureurs, qui gardaient l’entrée de la maison du roi. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Toutes les fois que le roi allait à la maison de l’Éternel, les coureurs venaient et les portaient; puis ils les rapportaient dans la chambre des coureurs. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Comme Roboam s’était humilié, l’Éternel détourna de lui sa colère et ne le détruisit pas entièrement. Et il y avait encore de bonnes choses en Juda. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Le roi Roboam s’affermit dans Jérusalem et régna. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 14:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il avait quarante et un ans lorsqu’il devint roi, et il régna dix-sept ans à Jérusalem, la ville que l’Éternel avait '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 6:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'choisie sur toutes les tribus d’Israël pour y mettre son nom. Sa mère s’appelait Naama, l’Ammonite. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Il fit le mal, parce qu’il n’appliqua pas son cœur à chercher l’Éternel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Les actions de Roboam, les premières et les dernières, ne sont-elles pas écrites dans les livres de Schemaeja, le prophète et d’Iddo, le prophète, parmi les registres généalogiques? Il y eut toujours guerre entre Roboam et Jéroboam. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Roboam se coucha avec ses pères, et il fut enterré dans la ville de David. Et Abija, son fils, régna à sa place.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 14:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'La cinquième année du règne de Roboam, Schischak, roi d’Égypte, monta contre Jérusalem, parce qu’ils avaient péché contre l’Éternel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il avait mille deux cents chars et soixante mille cavaliers; et il vint d’Égypte avec lui un peuple innombrable, des Libyens, des Sukkiens et des Éthiopiens. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il prit les villes fortes qui appartenaient à Juda, et arriva jusqu’à Jérusalem. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Alors Schemaeja, le prophète, se rendit auprès de Roboam et des chefs de Juda qui s’étaient retirés dans Jérusalem à l’approche de Schischak, et il leur dit: Ainsi parle l’Éternel: Vous m’avez abandonné; je vous abandonne aussi, et je vous livre entre les mains de Schischak. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Les chefs d’Israël et le roi s’humilièrent et dirent: L’Éternel est juste! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Et quand l’Éternel vit qu’ils s’humiliaient, la parole de l’Éternel fut ainsi adressée à Schemaeja: Ils se sont humiliés, je ne les détruirai pas, je ne tarderai pas à les secourir, et ma colère ne se répandra pas sur Jérusalem par Schischak; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'mais ils lui seront assujettis, et ils sauront ce que c’est que me servir ou servir les royaumes des autres pays. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Schischak, roi d’Égypte, monta contre Jérusalem. Il prit les trésors de la maison de l’Éternel et les trésors de la maison du roi, il prit tout. Il prit les boucliers d’or que Salomon '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 10:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 9:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'avait faits. '
