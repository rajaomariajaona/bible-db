document_id: 2CH.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Invasion de Schischak, roi d’Égypte. Mort de Roboam
  - type: heading
    content: 'V. 1-16: cf. 1 R 14:21-31. (Jé 2:9-13, 19. Né 9:26, 27. Ps 106:40-45.)'
  - type: text
    content: ' '
  - type: note
    content: 1 R 14:22.
  - type: text
    content: 'Lorsque Roboam se fut affermi dans son royaume et qu’il eut acquis de la force, il abandonna la loi de l’Éternel, et tout Israël l’abandonna avec lui. '
  '10':
  - type: text
    content: 'Le roi Roboam fit à leur place des boucliers d’airain, et il les remit aux soins des chefs des coureurs, qui gardaient l’entrée de la maison du roi. '
  '11':
  - type: text
    content: 'Toutes les fois que le roi allait à la maison de l’Éternel, les coureurs venaient et les portaient; puis ils les rapportaient dans la chambre des coureurs. '
  '12':
  - type: text
    content: 'Comme Roboam s’était humilié, l’Éternel détourna de lui sa colère et ne le détruisit pas entièrement. Et il y avait encore de bonnes choses en Juda. '
  '13':
  - type: text
    content: 'Le roi Roboam s’affermit dans Jérusalem et régna. '
  - type: note
    content: 1 R 14:21.
  - type: text
    content: 'Il avait quarante et un ans lorsqu’il devint roi, et il régna dix-sept ans à Jérusalem, la ville que l’Éternel avait '
  - type: note
    content: 2 Ch 6:6.
  - type: text
    content: 'choisie sur toutes les tribus d’Israël pour y mettre son nom. Sa mère s’appelait Naama, l’Ammonite. '
  '14':
  - type: text
    content: 'Il fit le mal, parce qu’il n’appliqua pas son cœur à chercher l’Éternel. '
  '15':
  - type: text
    content: 'Les actions de Roboam, les premières et les dernières, ne sont-elles pas écrites dans les livres de Schemaeja, le prophète et d’Iddo, le prophète, parmi les registres généalogiques? Il y eut toujours guerre entre Roboam et Jéroboam. '
  '16':
  - type: text
    content: Roboam se coucha avec ses pères, et il fut enterré dans la ville de David. Et Abija, son fils, régna à sa place.
  '2':
  - type: note
    content: 1 R 14:25.
  - type: text
    content: 'La cinquième année du règne de Roboam, Schischak, roi d’Égypte, monta contre Jérusalem, parce qu’ils avaient péché contre l’Éternel. '
  '3':
  - type: text
    content: 'Il avait mille deux cents chars et soixante mille cavaliers; et il vint d’Égypte avec lui un peuple innombrable, des Libyens, des Sukkiens et des Éthiopiens. '
  '4':
  - type: text
    content: 'Il prit les villes fortes qui appartenaient à Juda, et arriva jusqu’à Jérusalem. '
  '5':
  - type: text
    content: 'Alors Schemaeja, le prophète, se rendit auprès de Roboam et des chefs de Juda qui s’étaient retirés dans Jérusalem à l’approche de Schischak, et il leur dit: Ainsi parle l’Éternel: Vous m’avez abandonné; je vous abandonne aussi, et je vous livre entre les mains de Schischak. '
  '6':
  - type: text
    content: 'Les chefs d’Israël et le roi s’humilièrent et dirent: L’Éternel est juste! '
  '7':
  - type: text
    content: 'Et quand l’Éternel vit qu’ils s’humiliaient, la parole de l’Éternel fut ainsi adressée à Schemaeja: Ils se sont humiliés, je ne les détruirai pas, je ne tarderai pas à les secourir, et ma colère ne se répandra pas sur Jérusalem par Schischak; '
  '8':
  - type: text
    content: 'mais ils lui seront assujettis, et ils sauront ce que c’est que me servir ou servir les royaumes des autres pays. '
  '9':
  - type: text
    content: 'Schischak, roi d’Égypte, monta contre Jérusalem. Il prit les trésors de la maison de l’Éternel et les trésors de la maison du roi, il prit tout. Il prit les boucliers d’or que Salomon '
  - type: note
    content: 1 R 10:16. 2 Ch 9:15.
  - type: text
    content: 'avait faits. '
