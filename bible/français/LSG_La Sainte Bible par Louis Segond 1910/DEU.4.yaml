document_id: DEU.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Exhortation
  - type: heading
    content: 'V. 1-24: cf. (v. 32-40. De 6:1-15; 5:1-22. Jos 23:6-8, 16.)'
  - type: text
    content: 'Maintenant, Israël, écoute '
  - type: note
    content: Lé 19:37; 20:8; 22:31.
  - type: text
    content: 'les lois et les ordonnances que je vous enseigne. Mettez-les en pratique, afin que vous viviez, et que vous entriez en possession du pays que vous donne l’Éternel, le Dieu de vos pères. '
  '10':
  - type: text
    content: 'Souviens-toi du jour où tu te présentas devant l’Éternel, ton Dieu, à Horeb, lorsque l’Éternel me dit: Assemble auprès de moi le peuple! Je veux leur faire entendre mes paroles, afin qu’ils apprennent à me craindre tout le temps qu’ils vivront sur la terre; et afin qu’ils les enseignent à leurs enfants. '
  '11':
  - type: text
    content: 'Vous vous approchâtes et vous vous tîntes au pied de la montagne. '
  - type: note
    content: Ex 19:18.
  - type: text
    content: 'La montagne était embrasée, et les flammes s’élevaient jusqu’au milieu du ciel. Il y avait des ténèbres, des nuées, de l’obscurité. '
  '12':
  - type: text
    content: 'Et l’Éternel vous parla du milieu du feu; vous entendîtes le son des paroles, mais vous ne vîtes point de figure, vous n’entendîtes qu’une voix. '
  '13':
  - type: text
    content: 'Il publia son alliance, qu’il vous ordonna d’observer, les dix commandements; et il les écrivit sur deux tables de pierre. '
  '14':
  - type: text
    content: 'En ce temps-là, l’Éternel me commanda de vous enseigner des lois et des ordonnances, afin que vous les mettiez en pratique dans le pays dont vous allez prendre possession. '
  '15':
  - type: text
    content: 'Puisque vous n’avez vu aucune figure le jour où l’Éternel vous parla du milieu du feu, à Horeb, veillez attentivement sur vos âmes, '
  '16':
  - type: text
    content: 'de peur que vous ne vous corrompiez et que vous ne vous fassiez une image taillée, une représentation de quelque idole, la figure d’un homme ou d’une femme, '
  '17':
  - type: text
    content: 'la figure d’un animal qui soit sur la terre, la figure d’un oiseau qui vole dans les cieux, '
  '18':
  - type: text
    content: 'la figure d’une bête qui rampe sur le sol, la figure d’un poisson qui vive dans les eaux au-dessous de la terre. '
  '19':
  - type: text
    content: 'Veille sur ton âme, de peur que, levant tes yeux vers le ciel, et voyant le soleil, la lune et les étoiles, toute l’armée des cieux, tu ne sois entraîné à te prosterner en leur présence et à leur rendre un culte: ce sont des choses que l’Éternel, ton Dieu, a données en partage à tous les peuples, sous le ciel tout entier. '
  '2':
  - type: text
    content: 'Vous '
  - type: note
    content: De 12:32. Pr 30:6. Ap 22:18.
  - type: text
    content: 'n’ajouterez rien à ce que je vous prescris, et vous n’en retrancherez rien; mais vous observerez les commandements de l’Éternel, votre Dieu, tels que je vous les prescris. '
  '20':
  - type: text
    content: 'Mais vous, l’Éternel vous a pris, et vous a fait sortir de la fournaise de fer de l’Égypte, afin que vous fussiez un peuple '
  - type: note
    content: Ex 19:5.
  - type: text
    content: 'qui lui appartînt en propre, comme vous l’êtes aujourd’hui. '
  '21':
  - type: text
    content: 'Et l’Éternel '
  - type: note
    content: De 1:37; 3:26; 31:2; 34:4.
  - type: text
    content: 's’irrita contre moi, à cause de vous; et il jura que je ne passerais point le Jourdain, et que je n’entrerais point dans le bon pays que l’Éternel, ton Dieu, te donne en héritage. '
  '22':
  - type: text
    content: 'Je mourrai donc en ce pays-ci, je ne passerai point le Jourdain; mais vous le passerez, et vous posséderez ce bon pays. '
  '23':
  - type: text
    content: 'Veillez sur vous, afin de ne point mettre en oubli l’alliance que l’Éternel, votre Dieu, a traitée avec vous, et de ne point vous faire d’image taillée, de représentation quelconque, que l’Éternel, ton Dieu, t’ait défendue. '
  '24':
  - type: text
    content: 'Car l’Éternel, ton Dieu, est '
  - type: note
    content: De 9:3. Hé 12:29.
  - type: text
    content: 'un feu dévorant, '
  - type: note
    content: Ex 20:5; 34:14. De 5:9; 6:15.
  - type: text
    content: un Dieu jaloux.
  - type: heading
    content: 'V. 25-31: cf. De 29:18-28; 30:1-10, 15-18. Lé 26:39-45. (Lu 15:16-24.)'
  '25':
  - type: text
    content: 'Lorsque tu auras des enfants, et des enfants de tes enfants, et que vous serez depuis longtemps dans le pays, si vous vous corrompez, si vous faites des images taillées, des représentations de quoi que ce soit, si vous faites ce qui est mal aux yeux de l’Éternel, votre Dieu, pour l’irriter, '
  '26':
  - type: text
    content: 'j’en prends aujourd’hui à témoin contre vous le ciel et la terre, vous disparaîtrez par une mort rapide du pays dont vous allez prendre possession au-delà du Jourdain, vous n’y prolongerez pas vos jours, car vous serez entièrement détruits. '
  '27':
  - type: text
    content: 'L’Éternel vous '
  - type: note
    content: De 28:62, 64.
  - type: text
    content: 'dispersera parmi les peuples, et vous ne resterez qu’un petit nombre au milieu des nations où l’Éternel vous emmènera. '
  '28':
  - type: text
    content: 'Et là, vous servirez des dieux, '
  - type: note
    content: Ps 115:4; 135:15.
  - type: text
    content: 'ouvrage de mains d’homme, du bois et de la pierre, qui ne peuvent ni voir, ni entendre, ni manger, ni sentir. '
  '29':
  - type: text
    content: 'C’est de là aussi que tu chercheras l’Éternel, ton Dieu, et que tu le trouveras, si tu le cherches de tout ton cœur et de toute ton âme. '
  '3':
  - type: text
    content: 'Vos yeux ont vu ce que l’Éternel a fait à l’occasion de '
  - type: note
    content: No 25:4. Jos 22:17.
  - type: text
    content: 'Baal-Peor: l’Éternel, ton Dieu, a détruit du milieu de toi tous ceux qui étaient allés après Baal-Peor. '
  '30':
  - type: text
    content: 'Au sein de ta détresse, toutes ces choses t’arriveront. Alors, dans la suite des temps, tu retourneras à l’Éternel, ton Dieu, et tu écouteras sa voix; '
  '31':
  - type: text
    content: 'car l’Éternel, ton Dieu, est un Dieu de miséricorde, qui ne t’abandonnera point et ne te détruira point: il n’oubliera pas l’alliance de tes pères, qu’il leur a jurée.'
  - type: heading
    content: 'V. 32-40: cf. (De 6:20-25; 5:22-29.) (De 7:7-11; 11:1-9, 22-25; 33:29.) Ps 29:1-11.'
  '32':
  - type: text
    content: 'Interroge les temps anciens qui t’ont précédé, depuis le jour où Dieu créa l’homme sur la terre, et d’une extrémité du ciel à l’autre: y eut-il jamais si grand événement, et a-t-on jamais ouï chose semblable? '
  '33':
  - type: text
    content: 'Fut-il jamais un peuple qui entendît la voix de Dieu parlant du milieu du feu, comme tu l’as entendue, et qui soit demeuré vivant? '
  '34':
  - type: text
    content: 'Fut-il jamais un dieu qui essayât de venir prendre à lui une nation du milieu d’une nation, par des épreuves, des signes, des miracles et des combats, à main forte et à bras étendu, et avec des prodiges de terreur, comme l’a fait pour vous l’Éternel, votre Dieu, en Égypte et sous vos yeux? '
  '35':
  - type: text
    content: 'Tu as été rendu témoin de ces choses, afin que tu reconnusses que l’Éternel est Dieu, '
  - type: note
    content: De 32:39. És 45:5, 18, 22. Mc 12:29, 32.
  - type: text
    content: 'qu’il n’y en a point d’autre. '
  '36':
  - type: text
    content: 'Du ciel, il t’a fait entendre sa voix pour t’instruire; et, sur la terre, il t’a fait voir son grand feu, et tu as entendu ses paroles du milieu du feu. '
  '37':
  - type: text
    content: 'Il a aimé tes pères, et il a choisi leur postérité après eux; '
  - type: note
    content: Ex 13:3, 9, 14.
  - type: text
    content: 'il t’a fait lui-même sortir d’Égypte par sa grande puissance; '
  '38':
  - type: text
    content: 'il a chassé devant toi des nations supérieures en nombre et en force, pour te faire entrer dans leur pays, pour t’en donner la possession, comme tu le vois aujourd’hui. '
  '39':
  - type: text
    content: 'Sache donc en ce jour, et retiens dans ton cœur que l’Éternel est Dieu, en haut dans le ciel et en bas sur la terre, et qu’il n’y en a point d’autre. '
  '4':
  - type: text
    content: 'Et vous, qui vous êtes attachés à l’Éternel, votre Dieu, vous êtes aujourd’hui tous vivants. '
  '40':
  - type: text
    content: Et observe ses lois et ses commandements que je te prescris aujourd’hui, afin que tu sois heureux, toi et tes enfants après toi, et que tu prolonges désormais tes jours dans le pays que l’Éternel, ton Dieu, te donne.
  - type: heading
    content: 'V. 41-43: cf. (De 19:1-10. Jos 20.) Ex 21:13.'
  '41':
  - type: text
    content: ' '
  - type: note
    content: No 35:6, 14.
  - type: text
    content: 'Alors Moïse choisit trois villes de l’autre côté du Jourdain, à l’orient, '
  '42':
  - type: text
    content: 'afin qu’elles servissent de refuge au meurtrier qui aurait involontairement tué son prochain, sans avoir été auparavant son ennemi, et afin qu’il pût sauver sa vie en s’enfuyant dans l’une de ces villes. '
  '43':
  - type: text
    content: 'C’étaient: '
  - type: note
    content: Jos 20:8.
  - type: text
    content: Betser, dans le désert, dans la plaine, chez les Rubénites; Ramoth, en Galaad, chez les Gadites, et Golan, en Basan, chez les Manassites.
  - type: heading
    content: Le Décalogue répété
  - type: heading
    content: '4 v. 44 à 5 v. 21: cf. (Ex 19:1, etc.; 20:1-17.) 2 Pi 1:12-15.'
  '44':
  - type: text
    content: 'C’est ici la loi que présenta Moïse aux enfants d’Israël. '
  '45':
  - type: text
    content: 'Voici les préceptes, les lois et les ordonnances que Moïse prescrivit aux enfants d’Israël, après leur sortie d’Égypte. '
  '46':
  - type: text
    content: 'C’était de l’autre côté du Jourdain, dans la vallée, vis-à-vis de Beth-Peor, au pays de Sihon, roi des Amoréens, qui habitait à Hesbon, et qui '
  - type: note
    content: No 21:24. De 1:4.
  - type: text
    content: 'fut battu par Moïse et les enfants d’Israël, après leur sortie d’Égypte. '
  '47':
  - type: text
    content: 'Ils s’emparèrent de son pays et de celui '
  - type: note
    content: No 21:33. De 3:3.
  - type: text
    content: 'd’Og, roi de Basan. Ces deux rois des Amoréens étaient de l’autre côté du Jourdain, à l’orient. '
  '48':
  - type: text
    content: 'Leur territoire s’étendait depuis Aroër sur les bords du torrent de l’Arnon jusqu’à la montagne de Sion qui est l’Hermon, '
  '49':
  - type: text
    content: et il embrassait toute la plaine de l’autre côté du Jourdain, à l’orient, jusqu’à la mer de la plaine, au pied du Pisga.
  '5':
  - type: text
    content: 'Voici, je vous ai enseigné des lois et des ordonnances, comme l’Éternel, mon Dieu, me l’a commandé, afin que vous les mettiez en pratique dans le pays dont vous allez prendre possession. '
  '6':
  - type: text
    content: 'Vous les observerez et vous les mettrez en pratique; car ce sera là votre sagesse et votre intelligence aux yeux des peuples, qui entendront parler de toutes ces lois et qui diront: Cette grande nation est un peuple absolument sage et intelligent! '
  '7':
  - type: note
    content: De 26:19.
  - type: text
    content: 'Quelle est, en effet, la grande nation qui ait des dieux aussi proches que l’Éternel, notre Dieu, l’est de nous toutes les fois que nous l’invoquons? '
  '8':
  - type: text
    content: 'Et quelle est la grande nation qui ait des lois et des ordonnances justes, comme toute cette loi que je vous présente aujourd’hui? '
  '9':
  - type: text
    content: 'Seulement, prends garde à toi et veille attentivement sur ton âme, tous les jours de ta vie, de peur que tu n’oublies les choses que tes yeux ont vues, et qu’elles ne sortent de ton cœur; enseigne-les '
  - type: note
    content: De 6:7; 11:19.
  - type: text
    content: 'à tes enfants et aux enfants de tes enfants. '
