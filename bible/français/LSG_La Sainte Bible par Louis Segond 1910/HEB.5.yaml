document_id: HEB.5
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. (1 Ch 23:13. Hé 8:3.) (Hé 2:17, 18; 4:15; 7:26-28. Ps 110:4.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'En effet, tout souverain sacrificateur pris du milieu des hommes est établi pour les hommes dans le service de Dieu, afin de présenter des offrandes et des sacrifices pour les péchés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il peut être indulgent pour les ignorants et les égarés, puisque la faiblesse est aussi son partage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et c’est à cause de cette faiblesse qu’il doit offrir des sacrifices pour ses propres péchés, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 9:7
      metadata:
        usfm: LEV.9.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:6
      metadata:
        usfm: LEV.16.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 7:26
      metadata:
        usfm: HEB.7.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme pour ceux du peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 26:16
      metadata:
        usfm: 2CH.26.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nul ne s’attribue cette dignité, s’il n’est appelé de Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 28:1
      metadata:
        usfm: EXO.28.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 23:13
      metadata:
        usfm: 1CH.23.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme le fut Aaron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et Christ ne s’est pas non plus attribué la gloire de devenir souverain sacrificateur, mais il la tient de celui qui lui a dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 2:7
      metadata:
        usfm: PSA.2.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 13:33
      metadata:
        usfm: ACT.13.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 1:5
      metadata:
        usfm: HEB.1.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tu es mon Fils,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je t’ai engendré aujourd’hui!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Comme il dit encore ailleurs:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 110:4
      metadata:
        usfm: PSA.110.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 7:17
      metadata:
        usfm: HEB.7.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tu es sacrificateur pour toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: selon l’ordre de Melchisédek.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:39
      metadata:
        usfm: MAT.26.39
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:46
      metadata:
        usfm: MAT.27.46
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '50'
      metadata:
        usfm: MAT.27.50
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 17:1
      metadata:
        usfm: JHN.17.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est lui qui, dans les jours de sa chair, ayant présenté avec de grands cris et avec larmes des prières et des supplications à celui qui pouvait le sauver de la mort, et ayant été exaucé à cause de sa piété, a appris, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:6
      metadata:
        usfm: PHP.2.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'bien qu’il fût Fils, l’obéissance par les choses qu’il a souffertes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et qui, après avoir été élevé à la perfection, est devenu pour tous ceux qui lui obéissent l’auteur d’un salut éternel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dieu l’ayant déclaré souverain sacrificateur selon l’ordre de Melchisédek.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-14: cf. 1 Co 3:1-3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nous avons beaucoup à dire là-dessus, et des choses difficiles à expliquer, parce que vous êtes devenus lents à comprendre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 3:1
      metadata:
        usfm: 1CO.3.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: 1CO.3.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: 1CO.3.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous, en effet, qui depuis longtemps devriez être des maîtres, vous avez encore besoin qu’on vous enseigne les premiers rudiments des oracles de Dieu, vous en êtes venus à avoir besoin de lait et non d’une nourriture solide. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Or, quiconque en est au lait n’a pas l’expérience de la parole de justice; car il est un enfant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mais la nourriture solide est pour les hommes faits, pour ceux dont le jugement est exercé par l’usage à discerner ce qui est bien et ce qui est mal.
