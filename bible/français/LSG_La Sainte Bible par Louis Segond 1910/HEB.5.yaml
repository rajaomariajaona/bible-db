document_id: HEB.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-10: cf. (1 Ch 23:13. Hé 8:3.) (Hé 2:17, 18; 4:15; 7:26-28. Ps 110:4.)'
  - type: text
    content: 'En effet, tout souverain sacrificateur pris du milieu des hommes est établi pour les hommes dans le service de Dieu, afin de présenter des offrandes et des sacrifices pour les péchés. '
  '10':
  - type: text
    content: Dieu l’ayant déclaré souverain sacrificateur selon l’ordre de Melchisédek.
  - type: heading
    content: 'V. 11-14: cf. 1 Co 3:1-3.'
  '11':
  - type: text
    content: 'Nous avons beaucoup à dire là-dessus, et des choses difficiles à expliquer, parce que vous êtes devenus lents à comprendre. '
  '12':
  - type: note
    content: 1 Co 3:1, 2, 3.
  - type: text
    content: 'Vous, en effet, qui depuis longtemps devriez être des maîtres, vous avez encore besoin qu’on vous enseigne les premiers rudiments des oracles de Dieu, vous en êtes venus à avoir besoin de lait et non d’une nourriture solide. '
  '13':
  - type: text
    content: 'Or, quiconque en est au lait n’a pas l’expérience de la parole de justice; car il est un enfant. '
  '14':
  - type: text
    content: Mais la nourriture solide est pour les hommes faits, pour ceux dont le jugement est exercé par l’usage à discerner ce qui est bien et ce qui est mal.
  '2':
  - type: text
    content: 'Il peut être indulgent pour les ignorants et les égarés, puisque la faiblesse est aussi son partage. '
  '3':
  - type: text
    content: 'Et c’est à cause de cette faiblesse qu’il doit offrir des sacrifices pour ses propres péchés, '
  - type: note
    content: Lé 9:7; 16:6. Hé 7:26.
  - type: text
    content: 'comme pour ceux du peuple. '
  '4':
  - type: note
    content: 2 Ch 26:16.
  - type: text
    content: 'Nul ne s’attribue cette dignité, s’il n’est appelé de Dieu, '
  - type: note
    content: Ex 28:1. 1 Ch 23:13.
  - type: text
    content: 'comme le fut Aaron. '
  '5':
  - type: text
    content: 'Et Christ ne s’est pas non plus attribué la gloire de devenir souverain sacrificateur, mais il la tient de celui qui lui a dit:'
  - type: note
    content: Ps 2:7. Ac 13:33. Hé 1:5.
  - type: text
    content: Tu es mon Fils,
  - type: text
    content: je t’ai engendré aujourd’hui!
  '6':
  - type: text
    content: 'Comme il dit encore ailleurs:'
  - type: note
    content: Ps 110:4. Hé 7:17.
  - type: text
    content: Tu es sacrificateur pour toujours,
  - type: text
    content: selon l’ordre de Melchisédek.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Mt 26:39; 27:46, 50. Jn 17:1.
  - type: text
    content: 'C’est lui qui, dans les jours de sa chair, ayant présenté avec de grands cris et avec larmes des prières et des supplications à celui qui pouvait le sauver de la mort, et ayant été exaucé à cause de sa piété, a appris, '
  '8':
  - type: note
    content: Ph 2:6.
  - type: text
    content: 'bien qu’il fût Fils, l’obéissance par les choses qu’il a souffertes, '
  '9':
  - type: text
    content: 'et qui, après avoir été élevé à la perfection, est devenu pour tous ceux qui lui obéissent l’auteur d’un salut éternel, '
