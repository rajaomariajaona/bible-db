document_id: EZK.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-14: cf. Éz 12:21-28. So 1:14-18.'
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: text
    content: Voici le jour! Voici, il vient!
  - type: text
    content: Le tour arrive!
  - type: text
    content: La verge fleurit!
  - type: text
    content: L’orgueil s’épanouit!
  '11':
  - type: text
    content: 'La violence s’élève, pour servir de verge à la méchanceté:'
  - type: text
    content: Plus rien d’eux, de leur foule bruyante, de leur multitude!
  - type: text
    content: On ne se lamente pas sur eux!
  '12':
  - type: text
    content: Le temps vient, le jour approche!
  - type: text
    content: Que l’acheteur ne se réjouisse pas,
  - type: text
    content: Que le vendeur ne s’afflige pas!
  - type: text
    content: Car la colère éclate contre toute leur multitude.
  '13':
  - type: text
    content: Non, le vendeur ne recouvrera pas ce qu’il a vendu,
  - type: text
    content: Fût-il encore parmi les vivants;
  - type: text
    content: Car la prophétie contre toute leur multitude ne sera pas révoquée,
  - type: text
    content: Et à cause de son iniquité nul ne conservera sa vie.
  '14':
  - type: text
    content: On sonne de la trompette, tout est prêt,
  - type: text
    content: Mais personne ne marche au combat;
  - type: text
    content: Car ma fureur éclate contre toute leur multitude.
  - type: heading
    content: 'V. 15-27: cf. Jé 6:22-26. Éz 6.'
  '15':
  - type: text
    content: L’épée au dehors, la peste et la famine au-dedans!
  - type: text
    content: Celui qui est aux champs mourra par l’épée,
  - type: text
    content: Celui qui est dans la ville sera dévoré par la famine et par la peste.
  '16':
  - type: text
    content: Leurs fuyards s’échappent,
  - type: text
    content: Ils sont sur les montagnes, comme les colombes des vallées,
  - type: text
    content: Tous gémissant,
  - type: text
    content: Chacun sur son iniquité.
  '17':
  - type: text
    content: 'Toutes les mains sont '
  - type: note
    content: És 13:7. Jé 6:24.
  - type: text
    content: affaiblies,
  - type: text
    content: Tous les genoux se fondent en eau.
  '18':
  - type: text
    content: 'Ils se '
  - type: note
    content: És 15:2, 3. Jé 48:37.
  - type: text
    content: ceignent de sacs,
  - type: text
    content: Et la terreur les enveloppe;
  - type: text
    content: Tous les visages sont confus,
  - type: text
    content: Toutes les têtes sont rasées.
  '19':
  - type: text
    content: Ils jetteront leur argent dans les rues,
  - type: text
    content: Et leur or sera pour eux un objet d’horreur;
  - type: text
    content: 'Leur '
  - type: note
    content: Pr 11:4. So 1:18.
  - type: text
    content: argent et leur or ne pourront les sauver,
  - type: text
    content: Au jour de la fureur de l’Éternel;
  - type: text
    content: Ils ne pourront ni rassasier leur âme,
  - type: text
    content: Ni remplir leurs entrailles;
  - type: text
    content: Car c’est ce qui les a fait tomber dans leur iniquité.
  '2':
  - type: text
    content: Et toi, fils de l’homme, ainsi parle le Seigneur, l’Éternel,
  - type: text
    content: 'Sur le pays d’Israël: Voici la fin!'
  - type: text
    content: La fin vient sur les quatre extrémités du pays!
  '20':
  - type: text
    content: Ils étaient fiers de leur magnifique parure,
  - type: text
    content: Et ils en ont fabriqué les images de leurs abominations, de leurs idoles.
  - type: text
    content: C’est pourquoi je la rendrai pour eux un objet d’horreur;
  '21':
  - type: text
    content: Je la donnerai en pillage aux mains des étrangers,
  - type: text
    content: Et comme butin aux impies de la terre,
  - type: text
    content: Afin qu’ils la profanent.
  '22':
  - type: text
    content: Je détournerai d’eux ma face,
  - type: text
    content: Et l’on souillera mon sanctuaire;
  - type: text
    content: Des furieux y pénétreront, et le profaneront.
  '23':
  - type: text
    content: Prépare les chaînes!
  - type: text
    content: Car le pays est rempli de meurtres,
  - type: text
    content: La ville est pleine de violence.
  '24':
  - type: text
    content: Je ferai venir les plus méchants des peuples,
  - type: text
    content: Pour qu’ils s’emparent de leurs maisons;
  - type: text
    content: Je mettrai fin à l’orgueil des puissants,
  - type: text
    content: Et leurs sanctuaires seront profanés.
  '25':
  - type: text
    content: La ruine vient!
  - type: text
    content: Ils cherchent le salut, et point de salut!
  '26':
  - type: text
    content: Il arrive malheur sur malheur,
  - type: text
    content: Un bruit succède à un bruit;
  - type: text
    content: Ils demandent des visions aux prophètes;
  - type: text
    content: Les sacrificateurs ne connaissent plus la loi,
  - type: text
    content: Les anciens n’ont plus de conseils.
  '27':
  - type: text
    content: Le roi se désole, le prince s’épouvante,
  - type: text
    content: Les mains du peuple du pays sont tremblantes.
  - type: text
    content: Je les traiterai selon leurs voies,
  - type: text
    content: Je les jugerai comme ils le méritent,
  - type: text
    content: Et ils sauront que je suis l’Éternel.
  '3':
  - type: text
    content: Maintenant la fin vient sur toi;
  - type: text
    content: J’enverrai ma colère contre toi,
  - type: text
    content: Je te jugerai selon tes voies,
  - type: text
    content: Je te chargerai de toutes tes abominations.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Éz 5:11; 8:18.
  - type: text
    content: Mon œil sera pour toi sans pitié,
  - type: text
    content: Et je n’aurai point de miséricorde;
  - type: text
    content: Mais je te chargerai de tes voies,
  - type: text
    content: Et tes abominations seront au milieu de toi;
  - type: text
    content: Et vous saurez que je suis l’Éternel.
  '5':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Un malheur, un malheur unique!
  - type: text
    content: Voici, il vient!
  '6':
  - type: text
    content: La fin vient, la fin vient, elle se réveille contre toi!
  - type: text
    content: Voici, elle vient!
  '7':
  - type: text
    content: Ton tour arrive, habitant du pays!
  - type: text
    content: Le temps vient, le jour approche, jour de trouble,
  - type: text
    content: Et plus de cris de joie dans les montagnes!
  '8':
  - type: text
    content: Maintenant je vais bientôt répandre ma fureur sur toi,
  - type: text
    content: Assouvir sur toi ma colère;
  - type: text
    content: Je te jugerai selon tes voies,
  - type: text
    content: Je te chargerai de toutes tes abominations.
  '9':
  - type: text
    content: Mon œil sera sans pitié,
  - type: text
    content: Et je n’aurai point de miséricorde;
  - type: text
    content: Je te chargerai de tes voies,
  - type: text
    content: Et tes abominations seront au milieu de toi.
  - type: text
    content: Et vous saurez que je suis l’Éternel, celui qui frappe.
