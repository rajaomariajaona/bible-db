document_id: EZK.7
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-14: cf. Éz 12:21-28. So 1:14-18.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole de l’Éternel me fut adressée, en ces mots:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Et toi, fils de l’homme, ainsi parle le Seigneur, l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sur le pays d’Israël: Voici la fin!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: La fin vient sur les quatre extrémités du pays!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Maintenant la fin vient sur toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’enverrai ma colère contre toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te jugerai selon tes voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te chargerai de toutes tes abominations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 5:11
      metadata:
        usfm: EZK.5.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:18
      metadata:
        usfm: EZK.8.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mon œil sera pour toi sans pitié,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je n’aurai point de miséricorde;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais je te chargerai de tes voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes abominations seront au milieu de toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous saurez que je suis l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un malheur, un malheur unique!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, il vient!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La fin vient, la fin vient, elle se réveille contre toi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, elle vient!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ton tour arrive, habitant du pays!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le temps vient, le jour approche, jour de trouble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et plus de cris de joie dans les montagnes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Maintenant je vais bientôt répandre ma fureur sur toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Assouvir sur toi ma colère;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te jugerai selon tes voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te chargerai de toutes tes abominations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mon œil sera sans pitié,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je n’aurai point de miséricorde;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te chargerai de tes voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes abominations seront au milieu de toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous saurez que je suis l’Éternel, celui qui frappe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Voici le jour! Voici, il vient!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le tour arrive!
- type: usfm
  marker: q1
  children:
  - type: text
    text: La verge fleurit!
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’orgueil s’épanouit!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La violence s’élève, pour servir de verge à la méchanceté:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plus rien d’eux, de leur foule bruyante, de leur multitude!
- type: usfm
  marker: q1
  children:
  - type: text
    text: On ne se lamente pas sur eux!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le temps vient, le jour approche!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l’acheteur ne se réjouisse pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que le vendeur ne s’afflige pas!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car la colère éclate contre toute leur multitude.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Non, le vendeur ne recouvrera pas ce qu’il a vendu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fût-il encore parmi les vivants;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car la prophétie contre toute leur multitude ne sera pas révoquée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et à cause de son iniquité nul ne conservera sa vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: On sonne de la trompette, tout est prêt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais personne ne marche au combat;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ma fureur éclate contre toute leur multitude.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-27: cf. Jé 6:22-26. Éz 6.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: L’épée au dehors, la peste et la famine au-dedans!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui est aux champs mourra par l’épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui est dans la ville sera dévoré par la famine et par la peste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Leurs fuyards s’échappent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont sur les montagnes, comme les colombes des vallées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous gémissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacun sur son iniquité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Toutes les mains sont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 13:7
      metadata:
        usfm: ISA.13.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 6:24
      metadata:
        usfm: JER.6.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: affaiblies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les genoux se fondent en eau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils se '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 15:2
      metadata:
        usfm: ISA.15.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: ISA.15.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 48:37
      metadata:
        usfm: JER.48.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: ceignent de sacs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la terreur les enveloppe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les visages sont confus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutes les têtes sont rasées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils jetteront leur argent dans les rues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leur or sera pour eux un objet d’horreur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Leur '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 11:4
      metadata:
        usfm: PRO.11.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: So 1:18
      metadata:
        usfm: ZEP.1.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: argent et leur or ne pourront les sauver,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au jour de la fureur de l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne pourront ni rassasier leur âme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni remplir leurs entrailles;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car c’est ce qui les a fait tomber dans leur iniquité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ils étaient fiers de leur magnifique parure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils en ont fabriqué les images de leurs abominations, de leurs idoles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pourquoi je la rendrai pour eux un objet d’horreur;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je la donnerai en pillage aux mains des étrangers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et comme butin aux impies de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin qu’ils la profanent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Je détournerai d’eux ma face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’on souillera mon sanctuaire;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des furieux y pénétreront, et le profaneront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Prépare les chaînes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car le pays est rempli de meurtres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La ville est pleine de violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je ferai venir les plus méchants des peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour qu’ils s’emparent de leurs maisons;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je mettrai fin à l’orgueil des puissants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leurs sanctuaires seront profanés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: La ruine vient!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils cherchent le salut, et point de salut!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il arrive malheur sur malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un bruit succède à un bruit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils demandent des visions aux prophètes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les sacrificateurs ne connaissent plus la loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les anciens n’ont plus de conseils.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Le roi se désole, le prince s’épouvante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les mains du peuple du pays sont tremblantes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les traiterai selon leurs voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les jugerai comme ils le méritent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils sauront que je suis l’Éternel.
