document_id: 2SA.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David projette de bâtir un temple; opposition de l’Éternel. Promesses à la maison de David
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-16: cf. (1 Ch 17:1-15; 28:2-7. 1 R 8:14-21.) (Ps 2; 72; 89; 110.) (És 9:5, 6. Lu 1:31-33.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 17
      metadata:
        usfm: 1CH.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque le roi habita dans sa maison, et que l’Éternel lui eut donné du repos, après l’avoir délivré de tous les ennemis qui l’entouraient, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'il dit à Nathan le prophète: Vois donc! J’habite dans une maison de cèdre, et l’arche de Dieu habite au milieu d’une tente. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nathan répondit au roi: Va, fais tout ce que tu as dans le cœur, car l’Éternel est avec toi. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'La nuit suivante, la parole de l’Éternel fut adressée à Nathan: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Va dire à mon serviteur David: Ainsi parle l’Éternel: Est-ce toi qui me bâtirais une maison pour que j’en fasse ma demeure? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais je n’ai point habité dans une maison '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 8:16
      metadata:
        usfm: 1CH.8.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'depuis le jour où j’ai fait monter les enfants d’Israël hors d’Égypte jusqu’à ce jour; j’ai voyagé sous une tente et dans un tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Partout où j’ai marché avec tous les enfants d’Israël, ai-je dit un mot à quelqu’une des tribus d’Israël à qui j’avais ordonné de paître mon peuple d’Israël, ai-je dit: Pourquoi ne me bâtissez-vous pas une maison de cèdre? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Maintenant tu diras à mon serviteur David: Ainsi parle l’Éternel des armées: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 16:11
      metadata:
        usfm: 1SA.16.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: 1SA.16.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:70
      metadata:
        usfm: PSA.78.70
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je t’ai pris au pâturage, derrière les brebis, pour que tu fusses chef sur mon peuple, sur Israël; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'j’ai été avec toi '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 8:6
      metadata:
        usfm: 2SA.8.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: 2SA.8.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'partout où tu as marché, j’ai exterminé tous tes ennemis devant toi, et j’ai rendu ton nom grand comme le nom des grands qui sont sur la terre; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'j’ai donné une demeure à mon peuple, à Israël, et je l’ai planté pour qu’il y soit fixé et ne soit plus agité, pour que les méchants ne l’oppriment plus comme auparavant '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'et comme à l’époque où j’avais établi des juges sur mon peuple d’Israël. Je t’ai accordé du repos en te délivrant de tous tes ennemis. Et l’Éternel t’annonce qu’il te créera une maison. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 8:20
      metadata:
        usfm: 1CH.8.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand tes jours seront accomplis et que tu seras couché avec tes pères, j’élèverai ta postérité après toi, celui qui sera sorti de tes entrailles, et j’affermirai son règne. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 5:5
      metadata:
        usfm: 1KI.5.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: 1KI.5.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: 1KI.5.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 22:10
      metadata:
        usfm: 1CH.22.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ce sera lui qui bâtira une maison à mon nom, et j’affermirai pour toujours le trône de son royaume. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 89:27
      metadata:
        usfm: PSA.89.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 1:5
      metadata:
        usfm: HEB.1.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je serai pour lui un père, et il sera pour moi un fils. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps 89:31, etc.
    marker-yv: yv-n
  - type: text
    text: 'S’il fait le mal, je le châtierai avec la verge des hommes et avec les coups des enfants des hommes; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'mais ma grâce ne se retirera point de lui, comme je l’ai retirée de Saül, que j’ai rejeté devant toi. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ta maison et ton règne seront pour toujours assurés, ton trône sera pour toujours affermi.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-29: cf. 1 Ch 17:16-27. Lu 1:46-55.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nathan rapporta à David toutes ces paroles et toute cette vision. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et le roi David alla se présenter devant l’Éternel, et dit: Qui suis-je, Seigneur Éternel, et quelle est ma maison, pour que tu m’aies fait parvenir où je suis? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'C’est encore peu de chose à tes yeux, Seigneur Éternel; tu parles aussi de la maison de ton serviteur pour les temps à venir. Et tu daignes instruire un homme de ces choses, Seigneur Éternel! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Que pourrait te dire de plus David? Tu connais ton serviteur, Seigneur Éternel! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'A cause de ta parole, et selon ton cœur, tu as fait toutes ces grandes choses pour les révéler à ton serviteur. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Que tu es donc grand, Éternel Dieu! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 3:24
      metadata:
        usfm: DEU.3.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:35
      metadata:
        usfm: DEU.4.35
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 32:39
      metadata:
        usfm: DEU.32.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 2:2
      metadata:
        usfm: 1SA.2.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 86:8
      metadata:
        usfm: PSA.86.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 45:5
      metadata:
        usfm: ISA.45.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: ISA.45.18
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: ISA.45.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 12:29
      metadata:
        usfm: MRK.12.29
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '32'
      metadata:
        usfm: MRK.12.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car nul n’est semblable à toi, et il n’y a point d’autre Dieu que toi, d’après tout ce que nous avons entendu de nos oreilles. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:7
      metadata:
        usfm: DEU.4.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 33:29
      metadata:
        usfm: DEU.33.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 147:20
      metadata:
        usfm: PSA.147.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Est-il sur la terre une seule nation qui soit comme ton peuple, comme Israël, que Dieu est venu racheter pour en former son peuple, pour se faire un nom et pour accomplir en sa faveur, en faveur de ton pays, des miracles et des prodiges, en chassant devant ton peuple, que tu as racheté d’Égypte, des nations et leurs dieux? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tu as affermi ton peuple d’Israël, pour qu’il fût ton peuple à toujours; et toi, Éternel, tu es devenu son Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Maintenant, Éternel Dieu, fais subsister jusque dans l’éternité la parole que tu as prononcée sur ton serviteur et sur sa maison, et agis selon ta parole. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Que ton nom soit à jamais glorifié, et que l’on dise: L’Éternel des armées est le Dieu d’Israël! Et que la maison de ton serviteur David soit affermie devant toi! '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Car toi-même, Éternel des armées, Dieu d’Israël, tu t’es révélé à ton serviteur, en disant: Je te fonderai une maison! C’est pourquoi ton serviteur a pris courage pour t’adresser cette prière. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Maintenant, Seigneur Éternel, tu es Dieu, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 17:17
      metadata:
        usfm: JHN.17.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tes paroles sont vérité, et tu as annoncé cette grâce à ton serviteur. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Veuille donc bénir la maison de ton serviteur, afin qu’elle subsiste à toujours devant toi! Car c’est toi, Seigneur Éternel, qui as parlé, et par ta bénédiction la maison de ton serviteur sera bénie éternellement.
