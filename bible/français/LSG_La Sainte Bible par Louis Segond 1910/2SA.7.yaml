document_id: 2SA.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: David projette de bâtir un temple; opposition de l’Éternel. Promesses à la maison de David
  - type: heading
    content: 'V. 1-16: cf. (1 Ch 17:1-15; 28:2-7. 1 R 8:14-21.) (Ps 2; 72; 89; 110.) (És 9:5, 6. Lu 1:31-33.)'
  - type: text
    content: ' '
  - type: note
    content: 1 Ch 17.
  - type: text
    content: 'Lorsque le roi habita dans sa maison, et que l’Éternel lui eut donné du repos, après l’avoir délivré de tous les ennemis qui l’entouraient, '
  '10':
  - type: text
    content: 'j’ai donné une demeure à mon peuple, à Israël, et je l’ai planté pour qu’il y soit fixé et ne soit plus agité, pour que les méchants ne l’oppriment plus comme auparavant '
  '11':
  - type: text
    content: 'et comme à l’époque où j’avais établi des juges sur mon peuple d’Israël. Je t’ai accordé du repos en te délivrant de tous tes ennemis. Et l’Éternel t’annonce qu’il te créera une maison. '
  '12':
  - type: note
    content: 1 Ch 8:20.
  - type: text
    content: 'Quand tes jours seront accomplis et que tu seras couché avec tes pères, j’élèverai ta postérité après toi, celui qui sera sorti de tes entrailles, et j’affermirai son règne. '
  '13':
  - type: note
    content: 1 R 5:5, 6, 12. 1 Ch 22:10.
  - type: text
    content: 'Ce sera lui qui bâtira une maison à mon nom, et j’affermirai pour toujours le trône de son royaume. '
  '14':
  - type: note
    content: Ps 89:27. Hé 1:5.
  - type: text
    content: 'Je serai pour lui un père, et il sera pour moi un fils. '
  - type: note
    content: Ps 89:31, etc.
  - type: text
    content: 'S’il fait le mal, je le châtierai avec la verge des hommes et avec les coups des enfants des hommes; '
  '15':
  - type: text
    content: 'mais ma grâce ne se retirera point de lui, comme je l’ai retirée de Saül, que j’ai rejeté devant toi. '
  '16':
  - type: text
    content: Ta maison et ton règne seront pour toujours assurés, ton trône sera pour toujours affermi.
  - type: heading
    content: 'V. 17-29: cf. 1 Ch 17:16-27. Lu 1:46-55.'
  '17':
  - type: text
    content: 'Nathan rapporta à David toutes ces paroles et toute cette vision. '
  '18':
  - type: text
    content: 'Et le roi David alla se présenter devant l’Éternel, et dit: Qui suis-je, Seigneur Éternel, et quelle est ma maison, pour que tu m’aies fait parvenir où je suis? '
  '19':
  - type: text
    content: 'C’est encore peu de chose à tes yeux, Seigneur Éternel; tu parles aussi de la maison de ton serviteur pour les temps à venir. Et tu daignes instruire un homme de ces choses, Seigneur Éternel! '
  '2':
  - type: text
    content: 'il dit à Nathan le prophète: Vois donc! J’habite dans une maison de cèdre, et l’arche de Dieu habite au milieu d’une tente. '
  '20':
  - type: text
    content: 'Que pourrait te dire de plus David? Tu connais ton serviteur, Seigneur Éternel! '
  '21':
  - type: text
    content: 'A cause de ta parole, et selon ton cœur, tu as fait toutes ces grandes choses pour les révéler à ton serviteur. '
  '22':
  - type: text
    content: 'Que tu es donc grand, Éternel Dieu! '
  - type: note
    content: De 3:24; 4:35; 32:39. 1 S 2:2. Ps 86:8. És 45:5, 18, 22. Mc 12:29, 32.
  - type: text
    content: 'car nul n’est semblable à toi, et il n’y a point d’autre Dieu que toi, d’après tout ce que nous avons entendu de nos oreilles. '
  '23':
  - type: note
    content: De 4:7; 33:29. Ps 147:20.
  - type: text
    content: 'Est-il sur la terre une seule nation qui soit comme ton peuple, comme Israël, que Dieu est venu racheter pour en former son peuple, pour se faire un nom et pour accomplir en sa faveur, en faveur de ton pays, des miracles et des prodiges, en chassant devant ton peuple, que tu as racheté d’Égypte, des nations et leurs dieux? '
  '24':
  - type: text
    content: 'Tu as affermi ton peuple d’Israël, pour qu’il fût ton peuple à toujours; et toi, Éternel, tu es devenu son Dieu. '
  '25':
  - type: text
    content: 'Maintenant, Éternel Dieu, fais subsister jusque dans l’éternité la parole que tu as prononcée sur ton serviteur et sur sa maison, et agis selon ta parole. '
  '26':
  - type: text
    content: 'Que ton nom soit à jamais glorifié, et que l’on dise: L’Éternel des armées est le Dieu d’Israël! Et que la maison de ton serviteur David soit affermie devant toi! '
  '27':
  - type: text
    content: 'Car toi-même, Éternel des armées, Dieu d’Israël, tu t’es révélé à ton serviteur, en disant: Je te fonderai une maison! C’est pourquoi ton serviteur a pris courage pour t’adresser cette prière. '
  '28':
  - type: text
    content: 'Maintenant, Seigneur Éternel, tu es Dieu, et '
  - type: note
    content: Jn 17:17.
  - type: text
    content: 'tes paroles sont vérité, et tu as annoncé cette grâce à ton serviteur. '
  '29':
  - type: text
    content: Veuille donc bénir la maison de ton serviteur, afin qu’elle subsiste à toujours devant toi! Car c’est toi, Seigneur Éternel, qui as parlé, et par ta bénédiction la maison de ton serviteur sera bénie éternellement.
  '3':
  - type: text
    content: 'Nathan répondit au roi: Va, fais tout ce que tu as dans le cœur, car l’Éternel est avec toi. '
  '4':
  - type: text
    content: 'La nuit suivante, la parole de l’Éternel fut adressée à Nathan: '
  '5':
  - type: text
    content: 'Va dire à mon serviteur David: Ainsi parle l’Éternel: Est-ce toi qui me bâtirais une maison pour que j’en fasse ma demeure? '
  '6':
  - type: text
    content: 'Mais je n’ai point habité dans une maison '
  - type: note
    content: 1 Ch 8:16.
  - type: text
    content: 'depuis le jour où j’ai fait monter les enfants d’Israël hors d’Égypte jusqu’à ce jour; j’ai voyagé sous une tente et dans un tabernacle. '
  '7':
  - type: text
    content: 'Partout où j’ai marché avec tous les enfants d’Israël, ai-je dit un mot à quelqu’une des tribus d’Israël à qui j’avais ordonné de paître mon peuple d’Israël, ai-je dit: Pourquoi ne me bâtissez-vous pas une maison de cèdre? '
  '8':
  - type: text
    content: 'Maintenant tu diras à mon serviteur David: Ainsi parle l’Éternel des armées: '
  - type: note
    content: 1 S 16:11, 12. Ps 78:70.
  - type: text
    content: 'Je t’ai pris au pâturage, derrière les brebis, pour que tu fusses chef sur mon peuple, sur Israël; '
  '9':
  - type: text
    content: 'j’ai été avec toi '
  - type: note
    content: 2 S 8:6, 14.
  - type: text
    content: 'partout où tu as marché, j’ai exterminé tous tes ennemis devant toi, et j’ai rendu ton nom grand comme le nom des grands qui sont sur la terre; '
