document_id: 1CO.7,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Réponse aux questions des Corinthiens sur le mariage
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. Ge 2:18-25. Mt 19:3-12.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour ce qui concerne les choses dont vous m’avez écrit, je pense qu’il est bon pour l’homme de ne point toucher de femme. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ceux qui sont mariés, j’ordonne, non pas moi, mais le Seigneur, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal 2:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 10:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:32
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 16:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que la femme ne se sépare point de son mari '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (si elle est séparée, qu’elle demeure sans se marier ou qu’elle se réconcilie avec son mari), et que le mari ne répudie point sa femme.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-16: cf. 1 Pi 3:1, 2. (Ge 17:7. Ro 11:16.)'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aux autres, ce n’est pas le Seigneur, c’est moi qui dis: Si un frère a une femme non-croyante, et qu’elle consente à habiter avec lui, qu’il ne la répudie point; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et si une femme a un mari non-croyant, et qu’il consente à habiter avec elle, qu’elle ne répudie point son mari. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car le mari non-croyant est sanctifié par la femme, et la femme non-croyante est sanctifiée par le frère; autrement, vos enfants seraient impurs, tandis que maintenant ils sont saints. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si le non-croyant se sépare, qu’il se sépare; le frère ou la sœur ne sont pas liés dans ces cas-là. Dieu nous a appelés à vivre en paix. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 3:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car que sais-tu, femme, si tu sauveras ton mari? Ou que sais-tu, mari, si tu sauveras ta femme?
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-24: cf. Ph 4:11, 12. Ro 6:18, 22.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seulement, que chacun marche selon la part que le Seigneur lui a faite, selon l’appel qu’il a reçu de Dieu. C’est ainsi que je l’ordonne dans toutes les Églises. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelqu’un a-t-il été appelé étant circoncis, qu’il demeure circoncis; quelqu’un a-t-il été appelé étant incirconcis, qu’il ne se fasse pas circoncire. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La circoncision n’est rien, et l’incirconcision n’est rien, mais l’observation des commandements de Dieu est tout. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutefois, pour éviter l’impudicité, que chacun ait sa femme, et que chaque femme ait son mari. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 4:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 1:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 2:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Que chacun demeure dans l’état où il était lorsqu’il a été appelé. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As-tu été appelé étant esclave, ne t’en inquiète pas; mais si tu peux devenir libre, profites-en plutôt. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car l’esclave qui a été appelé dans le Seigneur est un affranchi du Seigneur; de même, l’homme libre qui a été appelé est un esclave de Christ. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 6:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 9:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous avez été rachetés à un grand prix; ne devenez pas esclaves des hommes. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que chacun, frères, demeure devant Dieu dans l’état où il était lorsqu’il a été appelé.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 25-40: cf. v. 1-11. (1 Pi 4:7. Lu 10:40-42.) Hé 13:4.'
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour ce qui est des vierges, je n’ai point d’ordre du Seigneur; mais je donne un avis, comme ayant reçu du Seigneur miséricorde pour être fidèle. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici donc ce que j’estime bon, à cause des temps difficiles qui s’approchent: il est bon à un homme d’être ainsi. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Es-tu lié à une femme, ne cherche pas à rompre ce lien; n’es-tu pas lié à une femme, ne cherche pas une femme. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si tu t’es marié, tu n’as point péché; et si la vierge s’est mariée, elle n’a point péché; mais ces personnes auront des tribulations dans la chair, et je voudrais vous les épargner. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que je dis, frères, c’est que le temps est court; que désormais ceux qui ont des femmes soient comme n’en ayant pas, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 3:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Que le mari rende à sa femme ce qu’il lui doit, et que la femme agisse de même envers son mari. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ceux qui pleurent comme ne pleurant pas, ceux qui se réjouissent comme ne se réjouissant pas, ceux qui achètent comme ne possédant pas, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et ceux qui usent du monde comme n’en usant pas, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 40:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 1:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 2:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car la figure de ce monde passe. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, je voudrais que vous fussiez sans inquiétude. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 5:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Celui qui n’est pas marié s’inquiète des choses du Seigneur, des moyens de plaire au Seigneur; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et celui qui est marié s’inquiète des choses du monde, des moyens de plaire à sa femme. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y a de même une différence entre la femme et la vierge: celle qui n’est pas mariée s’inquiète des choses du Seigneur, afin d’être sainte de corps et d’esprit; et celle qui est mariée s’inquiète des choses du monde, des moyens de plaire à son mari. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je dis cela dans votre intérêt; ce n’est pas pour vous prendre au piège, c’est pour vous porter à ce qui est bienséant et propre à vous attacher au Seigneur sans distraction. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si quelqu’un regarde comme déshonorant pour sa fille de dépasser l’âge nubile, et comme nécessaire de la marier, qu’il fasse ce qu’il veut, il ne pèche point; qu’on se marie. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais celui qui a pris une ferme résolution, sans contrainte et avec l’exercice de sa propre volonté, et qui a décidé en son cœur de garder sa fille vierge, celui-là fait bien. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, celui qui marie sa fille fait bien, et celui qui ne la marie pas fait mieux. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 7:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Une femme est liée aussi longtemps que son mari est vivant; mais si le mari meurt, elle est libre de se marier à qui elle veut; seulement, que ce soit dans le Seigneur. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La femme n’a pas autorité sur son propre corps, mais c’est le mari; et pareillement, le mari n’a pas autorité sur son propre corps, mais c’est la femme. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle est plus heureuse, néanmoins, si elle demeure comme elle est, suivant mon avis. Et moi aussi, je crois avoir '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 4:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: l’Esprit de Dieu.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 2:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ne vous privez point l’un de l’autre, si ce n’est d’un commun accord pour un temps, afin de vaquer à la prière; puis retournez ensemble, de peur que Satan ne vous tente par votre incontinence. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je dis cela par condescendance, je n’en fais pas un ordre. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 26:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je voudrais que tous les hommes fussent comme moi; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 19:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 12:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mais chacun tient de Dieu un don particulier, l’un d’une manière, l’autre d’une autre. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ceux qui ne sont pas mariés et aux veuves, je dis qu’il leur est bon de rester comme moi. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 5:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais s’ils manquent de continence, qu’ils se marient; car il vaut mieux se marier que de brûler. '
