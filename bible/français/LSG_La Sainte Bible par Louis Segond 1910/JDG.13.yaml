  children:
  - type: text
    text: Samson, juge en Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. Lu 1:5-16. No 6:1-8. (Jé 1:5. Ga 1:15.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les enfants d’Israël firent encore '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 2:11
      metadata:
        usfm: JDG.2.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:7
      metadata:
        usfm: JDG.3.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:1
      metadata:
        usfm: JDG.4.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:1
      metadata:
        usfm: JDG.6.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:6
      metadata:
        usfm: JDG.10.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ce qui déplaît à l’Éternel; et l’Éternel les livra entre les mains des Philistins, pendant quarante ans. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il y avait un homme de Tsorea, de la famille des Danites, et qui s’appelait Manoach. Sa femme était stérile, et n’enfantait pas. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Un ange de l’Éternel apparut à la femme, et lui dit: Voici, tu es stérile, et tu n’as point d’enfants; tu deviendras enceinte, et tu enfanteras un fils. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Maintenant prends bien garde, ne bois ni '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 6:2
      metadata:
        usfm: NUM.6.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: NUM.6.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vin ni liqueur forte, et ne mange rien d’impur. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Car tu vas devenir enceinte et tu enfanteras un fils. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 6:5
      metadata:
        usfm: NUM.6.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 1:11
      metadata:
        usfm: 1SA.1.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le rasoir ne passera point sur sa tête, parce que cet enfant sera consacré à Dieu dès le ventre de sa mère; et ce sera lui qui commencera à délivrer Israël de la main des Philistins. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'La femme alla dire à son mari; Un homme de Dieu est venu vers moi, et il avait l’aspect d’un ange de Dieu, un aspect redoutable. Je ne lui ai pas demandé d’où il était, et il ne m’a pas fait connaître son nom. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais il m’a dit: Tu vas devenir enceinte, et tu enfanteras un fils; et maintenant ne bois ni vin ni liqueur forte, et ne mange rien d’impur, parce que cet enfant sera consacré à Dieu dès le ventre de sa mère jusqu’au jour de sa mort.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-23: cf. Ja 1:5. Jg 6:17-24. Jé 33:3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Manoach fit cette prière à l’Éternel: Ah! Seigneur, que l’homme de Dieu que tu as envoyé vienne encore vers nous, et qu’il nous enseigne ce que nous devons faire pour l’enfant qui naîtra! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dieu exauça la prière de Manoach, et l’ange de Dieu vint encore vers la femme. Elle était assise dans un champ, et Manoach, son mari, n’était pas avec elle. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Elle courut promptement donner cette nouvelle à son mari, et lui dit: Voici, l’homme qui était venu l’autre jour vers moi m’est apparu. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Manoach se leva, suivit sa femme, alla vers l’homme, et lui dit: Est-ce toi qui as parlé à cette femme? Il répondit: C’est moi. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Manoach dit: Maintenant, si ta parole s’accomplit, que faudra-t-il observer à l’égard de l’enfant, et qu’y aura-t-il à faire? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L’ange de l’Éternel répondit à Manoach: La femme s’abstiendra de tout ce que je lui ai dit. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Elle ne goûtera d’aucun produit de la vigne, elle ne boira ni vin ni liqueur forte, et elle ne mangera rien d’impur; elle observera tout ce que je lui ai prescrit. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Manoach dit à l’ange de l’Éternel: Permets-nous de te retenir, et de t’apprêter un chevreau. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L’ange de l’Éternel répondit à Manoach: Quand tu me retiendrais, je ne mangerais pas de ton mets; mais si tu veux faire un holocauste, tu l’offriras à l’Éternel. Manoach ne savait point que ce fût un ange de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et Manoach dit à l’ange de l’Éternel: Quel est ton nom, afin que nous te rendions gloire, quand ta parole s’accomplira? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'L’ange de l’Éternel lui répondit: Pourquoi demandes-tu mon nom? Il est merveilleux. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Manoach prit le chevreau et l’offrande, et fit un sacrifice à l’Éternel sur le rocher. Il s’opéra un prodige, pendant que Manoach et sa femme regardaient. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Comme la flamme montait de dessus l’autel vers le ciel, l’ange de l’Éternel monta dans la flamme de l’autel. A cette vue, Manoach et sa femme tombèrent la face contre terre. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L’ange de l’Éternel n’apparut plus à Manoach et à sa femme. Alors Manoach comprit que c’était l’ange de l’Éternel, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'et il dit à sa femme: Nous allons '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 33:20
      metadata:
        usfm: EXO.33.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:26
      metadata:
        usfm: DEU.5.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 6:22
      metadata:
        usfm: JDG.6.22
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '23'
      metadata:
        usfm: JDG.6.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mourir, car nous avons vu Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Sa femme lui répondit: Si l’Éternel eût voulu nous faire mourir, il n’aurait pas pris de nos mains l’holocauste et l’offrande, il ne nous aurait pas fait voir tout cela, et il ne nous aurait pas maintenant fait entendre pareilles choses.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sa naissance
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 24-25: cf. Hé 11:32-34.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'La femme enfanta un fils, et lui donna le nom de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:32
      metadata:
        usfm: HEB.11.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Samson. L’enfant grandit, et l’Éternel le bénit. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Et l’Esprit de l’Éternel commença à l’agiter à Machané-Dan, entre Tsorea et Eschthaol.
