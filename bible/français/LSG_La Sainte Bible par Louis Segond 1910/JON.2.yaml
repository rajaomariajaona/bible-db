    children:
    - type: text
      text: 'V. 1-11: cf. Mt 12:38-40. És 38:9, etc. Da 4:37.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel fit venir un grand poisson pour engloutir Jonas, et Jonas fut dans le ventre du poisson '
    - type: usfm
