      marker-yv: yv-n
    - type: text
      text: 'trois jours et trois nuits. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pour moi, je t’offrirai des sacrifices avec un cri d’actions de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
