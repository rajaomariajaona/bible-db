document_id: JON.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jonas dans le ventre d’un poisson. Prière et délivrance
  - type: heading
    content: 'V. 1-11: cf. Mt 12:38-40. És 38:9, etc. Da 4:37.'
  - type: text
    content: 'L’Éternel fit venir un grand poisson pour engloutir Jonas, et Jonas fut dans le ventre du poisson '
  - type: note
    content: Mt 12:40; 16:4. Lu 11:30.
  - type: text
    content: 'trois jours et trois nuits. '
  '10':
  - type: text
    content: 'Pour moi, je t’offrirai des sacrifices avec un cri d’actions de '
  - type: note
    content: Ps 50:14, 23; 116:17. Os 14:3. Hé 13:15.
  - type: text
    content: grâces,
  - type: text
    content: 'J’accomplirai les vœux que j’ai faits:'
  - type: note
    content: Ps 3:9.
  - type: text
    content: Le salut vient de l’Éternel.
  '11':
  - type: text
    content: L’Éternel parla au poisson, et le poisson vomit Jonas sur la terre.
  '2':
  - type: text
    content: 'Jonas, dans le ventre du poisson, pria l’Éternel, son Dieu. '
  '3':
  - type: text
    content: 'Il dit:'
  - type: note
    content: Ps 120:1.
  - type: text
    content: Dans ma détresse, j’ai invoqué l’Éternel,
  - type: text
    content: Et il m’a exaucé;
  - type: text
    content: Du sein du séjour des morts j’ai crié,
  - type: text
    content: Et tu as entendu ma voix.
  '4':
  - type: text
    content: Tu m’as jeté dans l’abîme, dans le cœur de la mer,
  - type: text
    content: Et les courants d’eau m’ont environné;
  - type: text
    content: 'Toutes tes '
  - type: note
    content: Ps 42:8.
  - type: text
    content: vagues et tous tes flots ont passé sur moi.
  '5':
  - type: text
    content: 'Je disais: Je suis chassé loin de ton regard!'
  - type: text
    content: Mais je verrai encore ton saint temple.
  '6':
  - type: text
    content: Les eaux m’ont couvert jusqu’à m’ôter la vie,
  - type: text
    content: L’abîme m’a enveloppé,
  - type: text
    content: Les roseaux ont entouré ma tête.
  '7':
  - type: text
    content: Je suis descendu jusqu’aux racines des montagnes,
  - type: text
    content: Les barres de la terre m’enfermaient pour toujours;
  - type: text
    content: Mais tu m’as fait remonter vivant de la fosse,
  - type: text
    content: Éternel, mon Dieu!
  '8':
  - type: text
    content: Quand mon âme était abattue au-dedans de moi,
  - type: text
    content: Je me suis souvenu de l’Éternel,
  - type: text
    content: Et ma prière est parvenue jusqu’à toi,
  - type: text
    content: Dans ton saint temple.
  '9':
  - type: text
    content: Ceux qui s’attachent à de vaines idoles
  - type: text
    content: Éloignent d’eux la miséricorde.
