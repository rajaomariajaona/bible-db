      marker-yv: yv-n
    - type: text
      text: grâces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’accomplirai les vœux que j’ai faits:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 3:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le salut vient de l’Éternel.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Éternel parla au poisson, et le poisson vomit Jonas sur la terre.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonas, dans le ventre du poisson, pria l’Éternel, son Dieu. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 120:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Dans ma détresse, j’ai invoqué l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il m’a exaucé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du sein du séjour des morts j’ai crié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu as entendu ma voix.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’as jeté dans l’abîme, dans le cœur de la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les courants d’eau m’ont environné;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Toutes tes '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 42:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: vagues et tous tes flots ont passé sur moi.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je disais: Je suis chassé loin de ton regard!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais je verrai encore ton saint temple.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les eaux m’ont couvert jusqu’à m’ôter la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’abîme m’a enveloppé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les roseaux ont entouré ma tête.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis descendu jusqu’aux racines des montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les barres de la terre m’enfermaient pour toujours;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais tu m’as fait remonter vivant de la fosse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, mon Dieu!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand mon âme était abattue au-dedans de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me suis souvenu de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ma prière est parvenue jusqu’à toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans ton saint temple.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui s’attachent à de vaines idoles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éloignent d’eux la miséricorde.
