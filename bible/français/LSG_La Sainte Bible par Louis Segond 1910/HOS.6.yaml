document_id: HOS.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Repentir et rechute
  - type: heading
    content: 'V. 1-3: cf. Os 5:15; 14:1, etc.'
  - type: text
    content: Venez, retournons à l’Éternel!
  - type: text
    content: Car il a déchiré, mais il nous guérira;
  - type: text
    content: Il a frappé, mais il bandera nos plaies.
  '10':
  - type: text
    content: 'Dans la maison d’Israël j’ai vu des choses horribles:'
  - type: text
    content: Là Éphraïm se prostitue, Israël se souille.
  '11':
  - type: text
    content: A toi aussi, Juda, une moisson est préparée,
  - type: text
    content: Quand je ramènerai les captifs de mon peuple.
  '2':
  - type: text
    content: Il nous rendra la vie dans deux jours;
  - type: text
    content: Le troisième jour il nous relèvera,
  - type: text
    content: Et nous vivrons devant lui.
  '3':
  - type: text
    content: Connaissons, cherchons à connaître l’Éternel;
  - type: text
    content: Sa venue est aussi certaine que celle de l’aurore.
  - type: text
    content: Il viendra pour nous comme la pluie,
  - type: text
    content: Comme la pluie du printemps qui arrose la terre.
  - type: heading
    content: 'V. 4-11: cf. Ps 78:34-37.'
  '4':
  - type: text
    content: Que te ferai-je, Éphraïm?
  - type: text
    content: Que te ferai-je, Juda?
  - type: text
    content: Votre piété est comme la nuée du matin,
  - type: text
    content: Comme la rosée qui bientôt se dissipe.
  '5':
  - type: text
    content: C’est pourquoi je les frapperai par les prophètes,
  - type: text
    content: Je les tuerai par les paroles de ma bouche,
  - type: text
    content: Et mes jugements éclateront comme la lumière.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Mt 9:13; 12:7.
  - type: text
    content: Car j’aime la piété et non les sacrifices,
  - type: text
    content: Et la connaissance de Dieu plus que les holocaustes.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Os 8:1.
  - type: text
    content: Ils ont, comme le vulgaire, transgressé l’alliance;
  - type: text
    content: C’est alors qu’ils m’ont été infidèles.
  '8':
  - type: text
    content: Galaad est une ville de malfaiteurs,
  - type: text
    content: Elle porte des traces de sang.
  '9':
  - type: text
    content: La troupe des sacrificateurs est comme une bande en embuscade,
  - type: text
    content: Commettant des assassinats sur le chemin de Sichem;
  - type: text
    content: Car ils se livrent au crime.
