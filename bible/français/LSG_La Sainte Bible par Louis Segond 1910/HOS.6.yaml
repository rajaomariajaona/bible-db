document_id: HOS.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Repentir et rechute
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-3: cf. Os 5:15; 14:1, etc.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Venez, retournons à l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il a déchiré, mais il nous guérira;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a frappé, mais il bandera nos plaies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il nous rendra la vie dans deux jours;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le troisième jour il nous relèvera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nous vivrons devant lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Connaissons, cherchons à connaître l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa venue est aussi certaine que celle de l’aurore.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il viendra pour nous comme la pluie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme la pluie du printemps qui arrose la terre.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 4-11: cf. Ps 78:34-37.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Que te ferai-je, Éphraïm?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que te ferai-je, Juda?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Votre piété est comme la nuée du matin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme la rosée qui bientôt se dissipe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C’est pourquoi je les frapperai par les prophètes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les tuerai par les paroles de ma bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mes jugements éclateront comme la lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:13
      metadata:
        usfm: MAT.9.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:7
      metadata:
        usfm: MAT.12.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car j’aime la piété et non les sacrifices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la connaissance de Dieu plus que les holocaustes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 8:1
      metadata:
        usfm: HOS.8.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils ont, comme le vulgaire, transgressé l’alliance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est alors qu’ils m’ont été infidèles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Galaad est une ville de malfaiteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle porte des traces de sang.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: La troupe des sacrificateurs est comme une bande en embuscade,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Commettant des assassinats sur le chemin de Sichem;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils se livrent au crime.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dans la maison d’Israël j’ai vu des choses horribles:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Là Éphraïm se prostitue, Israël se souille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: A toi aussi, Juda, une moisson est préparée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand je ramènerai les captifs de mon peuple.
