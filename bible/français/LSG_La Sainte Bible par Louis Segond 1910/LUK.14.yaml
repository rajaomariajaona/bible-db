document_id: LUK.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus à table dans la maison d’un pharisien. Guérison d’un hydropique de jour du sabbat
  - type: heading
    content: 'V. 1-6: cf. Lu 6:6-11; 13:10-17.'
  - type: text
    content: 'Jésus étant entré, un jour de sabbat, dans la maison de l’un des chefs des pharisiens, pour prendre un repas, les pharisiens l’observaient. '
  '10':
  - type: note
    content: Pr 25:6, 7.
  - type: text
    content: 'Mais, lorsque tu seras invité, va te mettre à la dernière place, afin que, quand celui qui t’a invité viendra, il te dise: Mon ami, monte plus haut. Alors cela te fera honneur devant tous ceux qui seront à table avec toi.'
  - type: text
    content: ' '
  '11':
  - type: note
    content: Job 22:29. Pr 29:23. Mt 23:12. Lu 1:51; 18:14. Ja 5:6, 10. 1 Pi 5:5.
  - type: text
    content: Car quiconque s’élève sera abaissé, et quiconque s’abaisse sera élevé.
  - type: heading
    content: 'V. 12-14: cf. (De 14:28, 29. Né 8:10, 12.)'
  '12':
  - type: text
    content: 'Il dit aussi à celui qui l’avait invité: '
  - type: note
    content: Né 8:11. Pr 3:28.
  - type: text
    content: Lorsque tu donnes à dîner ou à souper, n’invite pas tes amis, ni tes frères, ni tes parents, ni des voisins riches, de peur qu’ils ne t’invitent à leur tour et qu’on ne te rende la pareille.
  '13':
  - type: text
    content: ' '
  - type: text
    content: Mais, lorsque tu donnes un festin, invite des pauvres, des estropiés, des boiteux, des aveugles.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Et tu seras heureux de ce qu’ils ne peuvent pas te rendre la pareille; car elle te sera rendue à la résurrection des justes.
  - type: heading
    content: Parabole des conviés
  - type: heading
    content: 'V. 15-24: cf. Mt 22:2-14.'
  '15':
  - type: text
    content: 'Un de ceux qui étaient à table, après avoir entendu ces paroles, dit à Jésus: Heureux celui qui prendra son repas dans le royaume de Dieu! '
  '16':
  - type: text
    content: 'Et Jésus lui répondit: '
  - type: note
    content: És 25:6. Mt 22:2. Ap 19:7, 9.
  - type: text
    content: Un homme donna un grand souper, et il invita beaucoup de gens.
  '17':
  - type: text
    content: ' '
  - type: text
    content: 'A l’heure du souper, il envoya son serviteur dire aux conviés: Venez, car tout est déjà prêt.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Mais tous unanimement se mirent à s’excuser. Le premier lui dit: J’ai acheté un champ, et je suis obligé d’aller le voir; excuse-moi, je te prie.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Un autre dit: J’ai acheté cinq paires de bœufs, et je vais les essayer; excuse-moi, je te prie.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Et voici, un homme hydropique était devant lui. '
  '20':
  - type: text
    content: 'Un autre dit: Je viens de me marier, et c’est pourquoi je ne puis aller.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Le serviteur, de retour, rapporta ces choses à son maître. Alors le maître de la maison irrité dit à son serviteur: Va promptement dans les places et dans les rues de la ville, et amène ici les pauvres, les estropiés, les aveugles et les boiteux.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Le serviteur dit: Maître, ce que tu as ordonné a été fait, et il y a encore de la place.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Et le maître dit au serviteur: Va dans les chemins et le long des haies, et ceux que tu trouveras, contrains-les d’entrer, afin que ma maison soit remplie.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: Car, je vous le dis, aucun de ces hommes qui avaient été invités ne goûtera de mon souper.
  - type: heading
    content: Conditions à remplir pour être disciple de Jésus
  - type: heading
    content: 'V. 25-35: cf. Mt 10:37-39; 16:24-26. Mc 9:49-51.'
  '25':
  - type: text
    content: 'De grandes foules faisaient route avec Jésus. Il se retourna, et leur dit:'
  '26':
  - type: text
    content: ' '
  - type: note
    content: De 13:6; 33:9. Mt 10:37.
  - type: text
    content: Si quelqu’un vient à moi, et s’il ne hait pas son père, sa mère, sa femme, ses enfants, ses frères, et ses sœurs, et même sa propre vie, il ne peut être mon disciple.
  - type: text
    content: ' '
  '27':
  - type: note
    content: Mt 10:38; 16:24. Mc 8:34. Lu 9:23.
  - type: text
    content: Et quiconque ne porte pas sa croix, et ne me suit pas, ne peut être mon disciple.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Car, lequel de vous, s’il veut bâtir une tour, ne s’assied d’abord pour calculer la dépense et voir s’il a de quoi la terminer,
  - type: text
    content: ' '
  '29':
  - type: text
    content: de peur qu’après avoir posé les fondements, il ne puisse l’achever, et que tous ceux qui le verront ne se mettent à le railler,
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Jésus prit la parole, et dit aux docteurs de la loi et aux pharisiens: '
  - type: text
    content: Est-il permis, ou non, de faire une guérison le jour du sabbat?
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'en disant: Cet homme a commencé à bâtir, et il n’a pu achever?'
  - type: text
    content: ' '
  '31':
  - type: text
    content: Ou quel roi, s’il va faire la guerre à un autre roi, ne s’assied d’abord pour examiner s’il peut, avec dix mille hommes, marcher à la rencontre de celui qui vient l’attaquer avec vingt mille?
  - type: text
    content: ' '
  '32':
  - type: text
    content: S’il ne le peut, tandis que cet autre roi est encore loin, il lui envoie une ambassade pour demander la paix.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Ainsi donc, quiconque d’entre vous ne renonce pas à tout ce qu’il possède ne peut être mon disciple.
  - type: text
    content: ' '
  '34':
  - type: note
    content: Mt 5:13. Mc 9:50.
  - type: text
    content: Le sel est une bonne chose; mais si le sel perd sa saveur, avec quoi l’assaisonnera-t-on?
  - type: text
    content: ' '
  '35':
  - type: text
    content: Il n’est bon ni pour la terre, ni pour le fumier; on le jette dehors. Que celui qui a des oreilles pour entendre entende.
  '4':
  - type: text
    content: 'Ils gardèrent le silence. Alors Jésus avança la main sur cet homme, le guérit, et le renvoya. '
  '5':
  - type: text
    content: 'Puis il leur dit: '
  - type: note
    content: Ex 23:5. De 22:4. Lu 13:15.
  - type: text
    content: Lequel de vous, si son fils ou son bœuf tombe dans un puits, ne l’en retirera pas aussitôt, le jour du sabbat?
  - type: text
    content: ' '
  '6':
  - type: text
    content: Et ils ne purent rien répondre à cela.
  - type: heading
    content: Instructions sur l’humilité et sur la bienfaisance
  - type: heading
    content: 'V. 7-11: cf. Mt 23:5-12. Ro 12:3, 16. Ph 2:3.'
  '7':
  - type: text
    content: 'Il adressa ensuite une parabole aux conviés, en voyant qu’ils choisissaient les premières places; et il leur dit:'
  '8':
  - type: text
    content: ' '
  - type: text
    content: Lorsque tu seras invité par quelqu’un à des noces, ne te mets pas à la première place, de peur qu’il n’y ait parmi les invités une personne plus considérable que toi,
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'et que celui qui vous a invités l’un et l’autre ne vienne te dire: Cède la place à cette personne-là. Tu aurais alors la honte d’aller occuper la dernière place.'
  - type: text
    content: ' '
