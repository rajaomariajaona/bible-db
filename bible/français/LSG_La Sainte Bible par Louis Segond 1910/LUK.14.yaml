document_id: LUK.14,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus à table dans la maison d’un pharisien. Guérison d’un hydropique de jour du sabbat
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. Lu 6:6-11; 13:10-17.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus étant entré, un jour de sabbat, dans la maison de l’un des chefs des pharisiens, pour prendre un repas, les pharisiens l’observaient. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 25:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Mais, lorsque tu seras invité, va te mettre à la dernière place, afin que, quand celui qui t’a invité viendra, il te dise: Mon ami, monte plus haut. Alors cela te fera honneur devant tous ceux qui seront à table avec toi.'
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 22:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 29:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 23:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 1:51
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 5:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 5:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car quiconque s’élève sera abaissé, et quiconque s’abaisse sera élevé.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-14: cf. (De 14:28, 29. Né 8:10, 12.)'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit aussi à celui qui l’avait invité: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Né 8:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 3:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lorsque tu donnes à dîner ou à souper, n’invite pas tes amis, ni tes frères, ni tes parents, ni des voisins riches, de peur qu’ils ne t’invitent à leur tour et qu’on ne te rende la pareille.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais, lorsque tu donnes un festin, invite des pauvres, des estropiés, des boiteux, des aveugles.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et tu seras heureux de ce qu’ils ne peuvent pas te rendre la pareille; car elle te sera rendue à la résurrection des justes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parabole des conviés
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 15-24: cf. Mt 22:2-14.'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un de ceux qui étaient à table, après avoir entendu ces paroles, dit à Jésus: Heureux celui qui prendra son repas dans le royaume de Dieu! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jésus lui répondit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 25:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 22:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 19:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Un homme donna un grand souper, et il invita beaucoup de gens.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'A l’heure du souper, il envoya son serviteur dire aux conviés: Venez, car tout est déjà prêt.'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Mais tous unanimement se mirent à s’excuser. Le premier lui dit: J’ai acheté un champ, et je suis obligé d’aller le voir; excuse-moi, je te prie.'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Un autre dit: J’ai acheté cinq paires de bœufs, et je vais les essayer; excuse-moi, je te prie.'
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici, un homme hydropique était devant lui. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Un autre dit: Je viens de me marier, et c’est pourquoi je ne puis aller.'
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le serviteur, de retour, rapporta ces choses à son maître. Alors le maître de la maison irrité dit à son serviteur: Va promptement dans les places et dans les rues de la ville, et amène ici les pauvres, les estropiés, les aveugles et les boiteux.'
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le serviteur dit: Maître, ce que tu as ordonné a été fait, et il y a encore de la place.'
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Et le maître dit au serviteur: Va dans les chemins et le long des haies, et ceux que tu trouveras, contrains-les d’entrer, afin que ma maison soit remplie.'
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car, je vous le dis, aucun de ces hommes qui avaient été invités ne goûtera de mon souper.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conditions à remplir pour être disciple de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 25-35: cf. Mt 10:37-39; 16:24-26. Mc 9:49-51.'
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De grandes foules faisaient route avec Jésus. Il se retourna, et leur dit:'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 13:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10:37
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si quelqu’un vient à moi, et s’il ne hait pas son père, sa mère, sa femme, ses enfants, ses frères, et ses sœurs, et même sa propre vie, il ne peut être mon disciple.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10:38
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 8:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et quiconque ne porte pas sa croix, et ne me suit pas, ne peut être mon disciple.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car, lequel de vous, s’il veut bâtir une tour, ne s’assied d’abord pour calculer la dépense et voir s’il a de quoi la terminer,
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: de peur qu’après avoir posé les fondements, il ne puisse l’achever, et que tous ceux qui le verront ne se mettent à le railler,
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus prit la parole, et dit aux docteurs de la loi et aux pharisiens: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Est-il permis, ou non, de faire une guérison le jour du sabbat?
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'en disant: Cet homme a commencé à bâtir, et il n’a pu achever?'
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ou quel roi, s’il va faire la guerre à un autre roi, ne s’assied d’abord pour examiner s’il peut, avec dix mille hommes, marcher à la rencontre de celui qui vient l’attaquer avec vingt mille?
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: S’il ne le peut, tandis que cet autre roi est encore loin, il lui envoie une ambassade pour demander la paix.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ainsi donc, quiconque d’entre vous ne renonce pas à tout ce qu’il possède ne peut être mon disciple.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 9:50
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le sel est une bonne chose; mais si le sel perd sa saveur, avec quoi l’assaisonnera-t-on?
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il n’est bon ni pour la terre, ni pour le fumier; on le jette dehors. Que celui qui a des oreilles pour entendre entende.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils gardèrent le silence. Alors Jésus avança la main sur cet homme, le guérit, et le renvoya. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il leur dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 22:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 13:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lequel de vous, si son fils ou son bœuf tombe dans un puits, ne l’en retirera pas aussitôt, le jour du sabbat?
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et ils ne purent rien répondre à cela.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Instructions sur l’humilité et sur la bienfaisance
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-11: cf. Mt 23:5-12. Ro 12:3, 16. Ph 2:3.'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il adressa ensuite une parabole aux conviés, en voyant qu’ils choisissaient les premières places; et il leur dit:'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lorsque tu seras invité par quelqu’un à des noces, ne te mets pas à la première place, de peur qu’il n’y ait parmi les invités une personne plus considérable que toi,
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'et que celui qui vous a invités l’un et l’autre ne vienne te dire: Cède la place à cette personne-là. Tu aurais alors la honte d’aller occuper la dernière place.'
    - type: text
      text: ' '
