document_id: COL.2
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. (Col 4:12, 13. Ép 3:14-19.) Jn 15:4, 5. 1 Th 4:1, 2. 1 Pi 2:3-5.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je veux, en effet, que vous sachiez combien est grand le combat que je soutiens pour vous, et pour ceux qui sont à Laodicée, et pour tous ceux qui n’ont pas vu mon visage en la chair, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 53:11
      metadata:
        usfm: ISA.53.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 9:23
      metadata:
        usfm: JER.9.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 17:3
      metadata:
        usfm: JHN.17.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 3:8
      metadata:
        usfm: PHP.3.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'afin qu’ils aient le cœur rempli de consolation, qu’ils soient unis dans la charité, et enrichis d’une pleine intelligence pour connaître le mystère de Dieu, savoir Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:24
      metadata:
        usfm: 1CO.1.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: mystère dans lequel sont cachés tous les trésors de la sagesse et de la science.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Avertissements contre les fausses doctrines
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je dis cela '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:6
      metadata:
        usfm: EPH.5.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 2:18
      metadata:
        usfm: COL.2.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'afin que personne ne vous trompe par des discours séduisants. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Car, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 5:3
      metadata:
        usfm: 1CO.5.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'si je suis absent de corps, je suis avec vous en esprit, voyant avec joie '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 14:40
      metadata:
        usfm: 1CO.14.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le bon ordre qui règne parmi vous, et la fermeté de votre foi en Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ainsi donc, comme vous avez reçu le Seigneur Jésus-Christ, marchez en lui, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'étant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 3:17
      metadata:
        usfm: EPH.3.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'enracinés et fondés en lui, et affermis par la foi, d’après les instructions qui vous ont été données, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:5
      metadata:
        usfm: 1CO.1.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: abondez en actions de grâces.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-15: cf. 1 Ti 6:20, 21. (Jn 14:9, 10. 1 Co 1:24, 30.) Ro 6:3-11. Ép 2:1-18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 16:17
      metadata:
        usfm: ROM.16.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:9
      metadata:
        usfm: HEB.13.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Prenez garde que personne ne fasse de vous sa proie par la philosophie et par une vaine tromperie, s’appuyant sur la tradition des hommes, sur les rudiments du monde, et non sur Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:14
      metadata:
        usfm: JHN.1.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:19
      metadata:
        usfm: COL.1.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car en lui habite corporellement toute la plénitude de la divinité. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:16
      metadata:
        usfm: JHN.1.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous avez tout pleinement en lui, qui est le chef de toute domination et de toute autorité. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:16
      metadata:
        usfm: DEU.10.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 4:4
      metadata:
        usfm: JER.4.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 2:29
      metadata:
        usfm: ROM.2.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 3:3
      metadata:
        usfm: PHP.3.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et c’est en lui que vous avez été circoncis d’une circoncision que la main n’a pas faite, mais de la circoncision de Christ, qui consiste dans le dépouillement du corps de la chair: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 6:4
      metadata:
        usfm: ROM.6.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:27
      metadata:
        usfm: GAL.3.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ayant été ensevelis avec lui par le baptême, vous êtes aussi ressuscités en lui et avec lui, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:19
      metadata:
        usfm: EPH.1.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:7
      metadata:
        usfm: EPH.3.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'par la foi en la puissance de Dieu, qui l’a ressuscité des morts. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 2:1
      metadata:
        usfm: EPH.2.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous qui étiez morts par vos offenses et par l’incirconcision de votre chair, il vous a rendus à la vie avec lui, en nous faisant grâce pour toutes nos offenses; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'il a effacé l’acte dont les ordonnances nous condamnaient et qui subsistait contre nous, et il l’a détruit en le clouant à la croix; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 3:15
      metadata:
        usfm: GEN.3.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:29
      metadata:
        usfm: MAT.12.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 11:22
      metadata:
        usfm: LUK.11.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:31
      metadata:
        usfm: JHN.12.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:11
      metadata:
        usfm: JHN.16.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: il a dépouillé les dominations et les autorités, et les a livrées publiquement en spectacle, en triomphant d’elles par la croix.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-23: cf. Ro 14:1-6, 17. Ga 4:9-11. 1 Ti 4:1-8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 11:2
      metadata:
        usfm: LEV.11.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 14:2
      metadata:
        usfm: ROM.14.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 4:10
      metadata:
        usfm: GAL.4.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que personne donc ne vous juge au sujet du manger ou du boire, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lé 23:2, etc.
    marker-yv: yv-n
  - type: text
    text: 'ou au sujet d’une fête, d’une nouvelle lune, ou des sabbats: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'c’était '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 8:5
      metadata:
        usfm: HEB.8.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:1
      metadata:
        usfm: HEB.10.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’ombre des choses à venir, mais le corps est en Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 29:8
      metadata:
        usfm: JER.29.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 24:4
      metadata:
        usfm: MAT.24.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:6
      metadata:
        usfm: EPH.5.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:2
      metadata:
        usfm: 2TH.3.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 4:1
      metadata:
        usfm: 1JN.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Qu’aucun homme, sous une apparence d’humilité et par un culte des anges, ne vous ravisse à son gré le prix de la course, tandis qu’il s’abandonne à ses visions et qu’il est enflé d’un vain orgueil par ses pensées charnelles, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'sans s’attacher au chef, dont tout le corps, assisté et solidement assemblé par des jointures et des liens, tire l’accroissement que Dieu donne. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Si vous êtes morts avec Christ '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 4:9
      metadata:
        usfm: GAL.4.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'aux rudiments du monde, pourquoi, comme si vous viviez dans le monde, vous impose-t-on ces préceptes: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ne prends pas! Ne goûte pas! Ne touche pas! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'préceptes qui tous deviennent pernicieux par l’abus, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 29:13
      metadata:
        usfm: ISA.29.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 15:9
      metadata:
        usfm: MAT.15.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 1:14
      metadata:
        usfm: TIT.1.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui ne sont fondés que sur les ordonnances et les doctrines des hommes? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 4:8
      metadata:
        usfm: 1TI.4.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils ont, à la vérité, une apparence de sagesse, en ce qu’ils indiquent un culte volontaire, de l’humilité, et le mépris du corps, mais ils sont sans aucun mérite et contribuent '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 5:23
      metadata:
        usfm: 1TI.5.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: à la satisfaction de la chair.
