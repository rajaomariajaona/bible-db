document_id: COL.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-7: cf. (Col 4:12, 13. Ép 3:14-19.) Jn 15:4, 5. 1 Th 4:1, 2. 1 Pi 2:3-5.'
  - type: text
    content: 'Je veux, en effet, que vous sachiez combien est grand le combat que je soutiens pour vous, et pour ceux qui sont à Laodicée, et pour tous ceux qui n’ont pas vu mon visage en la chair, '
  '10':
  - type: note
    content: Jn 1:16.
  - type: text
    content: 'Vous avez tout pleinement en lui, qui est le chef de toute domination et de toute autorité. '
  '11':
  - type: note
    content: De 10:16. Jé 4:4. Ro 2:29. Ph 3:3.
  - type: text
    content: 'Et c’est en lui que vous avez été circoncis d’une circoncision que la main n’a pas faite, mais de la circoncision de Christ, qui consiste dans le dépouillement du corps de la chair: '
  '12':
  - type: note
    content: Ro 6:4. Ga 3:27.
  - type: text
    content: 'ayant été ensevelis avec lui par le baptême, vous êtes aussi ressuscités en lui et avec lui, '
  - type: note
    content: Ép 1:19; 3:7.
  - type: text
    content: 'par la foi en la puissance de Dieu, qui l’a ressuscité des morts. '
  '13':
  - type: note
    content: Ép 2:1.
  - type: text
    content: 'Vous qui étiez morts par vos offenses et par l’incirconcision de votre chair, il vous a rendus à la vie avec lui, en nous faisant grâce pour toutes nos offenses; '
  '14':
  - type: text
    content: 'il a effacé l’acte dont les ordonnances nous condamnaient et qui subsistait contre nous, et il l’a détruit en le clouant à la croix; '
  '15':
  - type: note
    content: Ge 3:15. Mt 12:29. Lu 11:22. Jn 12:31; 16:11.
  - type: text
    content: il a dépouillé les dominations et les autorités, et les a livrées publiquement en spectacle, en triomphant d’elles par la croix.
  - type: heading
    content: 'V. 16-23: cf. Ro 14:1-6, 17. Ga 4:9-11. 1 Ti 4:1-8.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Lé 11:2. Ro 14:2. Ga 4:10.
  - type: text
    content: 'Que personne donc ne vous juge au sujet du manger ou du boire, '
  - type: note
    content: Lé 23:2, etc.
  - type: text
    content: 'ou au sujet d’une fête, d’une nouvelle lune, ou des sabbats: '
  '17':
  - type: text
    content: 'c’était '
  - type: note
    content: Hé 8:5; 10:1.
  - type: text
    content: 'l’ombre des choses à venir, mais le corps est en Christ. '
  '18':
  - type: note
    content: Jé 29:8. Mt 24:4. Ép 5:6. 2 Th 3:2. 1 Jn 4:1.
  - type: text
    content: 'Qu’aucun homme, sous une apparence d’humilité et par un culte des anges, ne vous ravisse à son gré le prix de la course, tandis qu’il s’abandonne à ses visions et qu’il est enflé d’un vain orgueil par ses pensées charnelles, '
  '19':
  - type: text
    content: 'sans s’attacher au chef, dont tout le corps, assisté et solidement assemblé par des jointures et des liens, tire l’accroissement que Dieu donne. '
  '2':
  - type: note
    content: És 53:11. Jé 9:23. Jn 17:3. Ph 3:8.
  - type: text
    content: 'afin qu’ils aient le cœur rempli de consolation, qu’ils soient unis dans la charité, et enrichis d’une pleine intelligence pour connaître le mystère de Dieu, savoir Christ, '
  '20':
  - type: text
    content: 'Si vous êtes morts avec Christ '
  - type: note
    content: Ga 4:9.
  - type: text
    content: 'aux rudiments du monde, pourquoi, comme si vous viviez dans le monde, vous impose-t-on ces préceptes: '
  '21':
  - type: text
    content: 'Ne prends pas! Ne goûte pas! Ne touche pas! '
  '22':
  - type: text
    content: 'préceptes qui tous deviennent pernicieux par l’abus, et '
  - type: note
    content: És 29:13. Mt 15:9. Tit 1:14.
  - type: text
    content: 'qui ne sont fondés que sur les ordonnances et les doctrines des hommes? '
  '23':
  - type: note
    content: 1 Ti 4:8.
  - type: text
    content: 'Ils ont, à la vérité, une apparence de sagesse, en ce qu’ils indiquent un culte volontaire, de l’humilité, et le mépris du corps, mais ils sont sans aucun mérite et contribuent '
  - type: note
    content: 1 Ti 5:23.
  - type: text
    content: à la satisfaction de la chair.
  '3':
  - type: note
    content: 1 Co 1:24.
  - type: text
    content: mystère dans lequel sont cachés tous les trésors de la sagesse et de la science.
  - type: heading
    content: Avertissements contre les fausses doctrines
  '4':
  - type: text
    content: 'Je dis cela '
  - type: note
    content: Ép 5:6. Col 2:18.
  - type: text
    content: 'afin que personne ne vous trompe par des discours séduisants. '
  '5':
  - type: text
    content: 'Car, '
  - type: note
    content: 1 Co 5:3.
  - type: text
    content: 'si je suis absent de corps, je suis avec vous en esprit, voyant avec joie '
  - type: note
    content: 1 Co 14:40.
  - type: text
    content: 'le bon ordre qui règne parmi vous, et la fermeté de votre foi en Christ. '
  '6':
  - type: text
    content: 'Ainsi donc, comme vous avez reçu le Seigneur Jésus-Christ, marchez en lui, '
  '7':
  - type: text
    content: 'étant '
  - type: note
    content: Ép 3:17.
  - type: text
    content: 'enracinés et fondés en lui, et affermis par la foi, d’après les instructions qui vous ont été données, et '
  - type: note
    content: 1 Co 1:5.
  - type: text
    content: abondez en actions de grâces.
  - type: heading
    content: 'V. 8-15: cf. 1 Ti 6:20, 21. (Jn 14:9, 10. 1 Co 1:24, 30.) Ro 6:3-11. Ép 2:1-18.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ro 16:17. Hé 13:9.
  - type: text
    content: 'Prenez garde que personne ne fasse de vous sa proie par la philosophie et par une vaine tromperie, s’appuyant sur la tradition des hommes, sur les rudiments du monde, et non sur Christ. '
  '9':
  - type: note
    content: Jn 1:14. Col 1:19.
  - type: text
    content: 'Car en lui habite corporellement toute la plénitude de la divinité. '
