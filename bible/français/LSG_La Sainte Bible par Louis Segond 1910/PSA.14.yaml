document_id: PSA.14
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 53. (Ge 6:5, 11, 12. Ro 3:9-20.)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. De David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 10:4
      metadata:
        usfm: PSA.10.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 53:2
      metadata:
        usfm: PSA.53.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’insensé dit en son cœur: Il n’y a point de Dieu!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se sont corrompus, ils ont commis des actions abominables;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 3:10
      metadata:
        usfm: ROM.3.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il n’en est aucun qui fasse le bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L’Éternel, du haut des cieux, regarde les fils de l’homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour voir s’il y a quelqu’un qui soit intelligent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui cherche Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tous sont égarés, tous sont pervertis;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’en est aucun qui fasse le bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pas même un seul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tous ceux qui commettent l’iniquité ont-ils perdu le sens?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils dévorent mon peuple, ils le prennent pour nourriture;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’invoquent point l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C’est alors qu’ils trembleront d’épouvante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand Dieu paraîtra au milieu de la race juste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Jetez l’opprobre sur l’espérance du malheureux…
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel est son refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Oh! Qui fera partir de Sion la délivrance d’Israël?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand l’Éternel ramènera les captifs de son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jacob sera dans l’allégresse, Israël se réjouira.
