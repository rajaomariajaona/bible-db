document_id: PSA.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 53. (Ge 6:5, 11, 12. Ro 3:9-20.)
  - type: text
    content: Au chef des chantres. De David.
  - type: note
    content: Ps 10:4; 53:2.
  - type: text
    content: 'L’insensé dit en son cœur: Il n’y a point de Dieu!'
  - type: text
    content: Ils se sont corrompus, ils ont commis des actions abominables;
  - type: note
    content: Ro 3:10.
  - type: text
    content: Il n’en est aucun qui fasse le bien.
  '2':
  - type: text
    content: L’Éternel, du haut des cieux, regarde les fils de l’homme,
  - type: text
    content: Pour voir s’il y a quelqu’un qui soit intelligent,
  - type: text
    content: Qui cherche Dieu.
  '3':
  - type: text
    content: Tous sont égarés, tous sont pervertis;
  - type: text
    content: Il n’en est aucun qui fasse le bien,
  - type: text
    content: Pas même un seul.
  '4':
  - type: text
    content: Tous ceux qui commettent l’iniquité ont-ils perdu le sens?
  - type: text
    content: Ils dévorent mon peuple, ils le prennent pour nourriture;
  - type: text
    content: Ils n’invoquent point l’Éternel.
  '5':
  - type: text
    content: C’est alors qu’ils trembleront d’épouvante,
  - type: text
    content: Quand Dieu paraîtra au milieu de la race juste.
  '6':
  - type: text
    content: Jetez l’opprobre sur l’espérance du malheureux…
  - type: text
    content: L’Éternel est son refuge.
  '7':
  - type: text
    content: Oh! Qui fera partir de Sion la délivrance d’Israël?
  - type: text
    content: Quand l’Éternel ramènera les captifs de son peuple,
  - type: text
    content: Jacob sera dans l’allégresse, Israël se réjouira.
