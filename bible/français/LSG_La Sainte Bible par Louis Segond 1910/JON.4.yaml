document_id: JON.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Mécontentement de Jonas, et reproches de l’Éternel
  - type: heading
    content: 'V. 1-11: cf. Jé 20:7-9, 14-18. (Ps 103:8-14; 145:8, 9.) Lu 15:28, etc.'
  - type: text
    content: 'Cela déplut fort à Jonas, et il fut irrité. '
  '10':
  - type: text
    content: 'Et l’Éternel dit: Tu as pitié du ricin qui ne t’a coûté aucune peine et que tu n’as pas fait croître, qui est né dans une nuit et qui a péri dans une nuit. '
  '11':
  - type: text
    content: Et moi, je n’aurais pas pitié de Ninive, la grande ville, dans laquelle se trouvent plus de cent vingt mille hommes qui ne savent pas distinguer leur droite de leur gauche, et des animaux en grand nombre!
  '2':
  - type: text
    content: 'Il implora l’Éternel, et il dit: Ah! Éternel, n’est-ce pas ce que je disais quand j’étais encore dans mon pays? C’est ce que je voulais prévenir en fuyant à Tarsis. Car je savais que tu es un Dieu '
  - type: note
    content: Ex 34:6. Ps 86:5. Joë 2:13.
  - type: text
    content: 'compatissant et miséricordieux, lent à la colère et riche en bonté, et qui te repens du mal. '
  '3':
  - type: text
    content: 'Maintenant, Éternel, prends-moi donc la vie, car la mort m’est préférable à la vie. '
  '4':
  - type: text
    content: 'L’Éternel répondit: Fais-tu bien de t’irriter? '
  '5':
  - type: text
    content: 'Et Jonas sortit de la ville, et s’assit à l’orient de la ville, là il se fit une cabane, et s’y tint à l’ombre, jusqu’à ce qu’il vît ce qui arriverait dans la ville. '
  '6':
  - type: text
    content: 'L’Éternel Dieu fit croître un ricin, qui s’éleva au-dessus de Jonas, pour donner de l’ombre sur sa tête et pour lui ôter son irritation. Jonas éprouva une grande joie à cause de ce ricin. '
  '7':
  - type: text
    content: 'Mais le lendemain, à l’aurore, Dieu fit venir un ver qui piqua le ricin, et le ricin sécha. '
  '8':
  - type: text
    content: 'Au lever du soleil, Dieu fit souffler un vent chaud d’orient, et le soleil frappa la tête de Jonas, au point qu’il tomba en défaillance. Il demanda la mort, et dit: La mort m’est préférable à la vie. '
  '9':
  - type: text
    content: 'Dieu dit à Jonas: Fais-tu bien de t’irriter à cause du ricin? Il répondit: Je fais bien de m’irriter jusqu’à la mort. '
