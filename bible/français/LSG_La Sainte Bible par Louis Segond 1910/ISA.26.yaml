document_id: ISA.26,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cantique des rachetés
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-14: cf. És 60:17, 18; 25:1-5. Mi 7:7-10.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce jour, on chantera ce cantique dans le pays de Juda:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 46:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 125:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 12:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Nous avons une ville forte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il nous donne le salut pour murailles et pour rempart.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si l’on fait grâce au méchant, il n’apprend pas la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se livre au mal dans le pays de la droiture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il n’a point égard à la majesté de Dieu.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Éternel, ta main est puissante:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne l’aperçoivent pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils verront ton zèle pour le peuple, et ils en seront confus;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le feu consumera tes ennemis.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, tu nous donnes la paix;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tout ce que nous faisons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est toi qui l’accomplis pour nous.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, notre Dieu, d’autres maîtres que toi ont dominé sur nous;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais c’est grâce à toi seul que nous invoquons ton nom.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui sont morts ne revivront pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des ombres ne se relèveront pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu les as châtiés, tu les as anéantis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu en as détruit tout souvenir.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 15-19: cf. Jé 29:11-14. Ps 38. Éz 37:1-14.'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Multiplie le peuple, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Multiplie le peuple, manifeste ta gloire;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Recule toutes les limites du pays.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, ils t’ont cherché, quand ils étaient dans la détresse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se sont répandus en prières, quand tu les as châtiés.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 16:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Comme une femme enceinte, sur le point d’accoucher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Se tord et crie au milieu de ses douleurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi avons-nous été, loin de ta face, ô Éternel!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous avons conçu, nous avons éprouvé des douleurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et, quand nous enfantons, ce n’est que du vent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pays n’est pas sauvé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses habitants ne sont pas nés.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes morts revivent!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que mes cadavres se relèvent!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réveillez-vous et tressaillez de joie, habitants de la poussière!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ta rosée est une rosée vivifiante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la terre redonnera le jour aux ombres.
  - type: usfm
    marker: r
    children:
    - type: text
      text: '26 v. 20 à 27 v. 1: cf. És 8:17. Ps 12:6; 94:15, 23. Jé 51:34-37.'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ouvrez les portes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Laissez entrer la nation juste et fidèle.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Va, mon peuple, entre dans ta chambre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ferme la porte derrière toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Cache-toi '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 4:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: pour quelques instants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ce que la colère soit passée.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car voici, l’Éternel sort de sa demeure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour punir les crimes des habitants de la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la terre mettra le sang à nu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle ne couvrira plus les meurtres.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A celui qui est ferme dans ses sentiments
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu assures la paix, la paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’il se confie en toi.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Confiez-vous en l’Éternel à perpétuité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel, l’Éternel est le rocher des siècles.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a renversé ceux qui habitaient les hauteurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a abaissé la ville superbe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il l’a abaissée jusqu’à terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il lui a fait toucher la poussière.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est foulée aux pieds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux pieds des pauvres, sous les pas des misérables.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le chemin du juste est la droiture;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi qui es juste, tu aplanis le sentier du juste.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi nous t’attendons, ô Éternel! Sur la voie de tes jugements;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Notre âme soupire après ton nom et après ton souvenir.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme te désire pendant la nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon esprit te cherche au-dedans de moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car, lorsque tes jugements s’exercent sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les habitants du monde apprennent la justice.
