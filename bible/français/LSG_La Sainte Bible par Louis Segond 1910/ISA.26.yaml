document_id: ISA.26,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Cantique des rachetés
  - type: heading
    content: 'V. 1-14: cf. És 60:17, 18; 25:1-5. Mi 7:7-10.'
  - type: text
    content: 'En ce jour, on chantera ce cantique dans le pays de Juda:'
  - type: note
    content: Ps 46:6; 125:1. Pr 12:10.
  - type: text
    content: Nous avons une ville forte;
  - type: text
    content: Il nous donne le salut pour murailles et pour rempart.
  '10':
  - type: text
    content: Si l’on fait grâce au méchant, il n’apprend pas la justice,
  - type: text
    content: Il se livre au mal dans le pays de la droiture,
  - type: text
    content: Et il n’a point égard à la majesté de Dieu.
  '11':
  - type: text
    content: 'Éternel, ta main est puissante:'
  - type: text
    content: Ils ne l’aperçoivent pas.
  - type: text
    content: Ils verront ton zèle pour le peuple, et ils en seront confus;
  - type: text
    content: Le feu consumera tes ennemis.
  '12':
  - type: text
    content: Éternel, tu nous donnes la paix;
  - type: text
    content: Car tout ce que nous faisons,
  - type: text
    content: C’est toi qui l’accomplis pour nous.
  '13':
  - type: text
    content: Éternel, notre Dieu, d’autres maîtres que toi ont dominé sur nous;
  - type: text
    content: Mais c’est grâce à toi seul que nous invoquons ton nom.
  '14':
  - type: text
    content: Ceux qui sont morts ne revivront pas,
  - type: text
    content: Des ombres ne se relèveront pas;
  - type: text
    content: Car tu les as châtiés, tu les as anéantis,
  - type: text
    content: Et tu en as détruit tout souvenir.
  - type: heading
    content: 'V. 15-19: cf. Jé 29:11-14. Ps 38. Éz 37:1-14.'
  '15':
  - type: text
    content: Multiplie le peuple, ô Éternel!
  - type: text
    content: Multiplie le peuple, manifeste ta gloire;
  - type: text
    content: Recule toutes les limites du pays.
  '16':
  - type: text
    content: Éternel, ils t’ont cherché, quand ils étaient dans la détresse;
  - type: text
    content: Ils se sont répandus en prières, quand tu les as châtiés.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Jn 16:21.
  - type: text
    content: Comme une femme enceinte, sur le point d’accoucher,
  - type: text
    content: Se tord et crie au milieu de ses douleurs,
  - type: text
    content: Ainsi avons-nous été, loin de ta face, ô Éternel!
  '18':
  - type: text
    content: Nous avons conçu, nous avons éprouvé des douleurs,
  - type: text
    content: 'Et, quand nous enfantons, ce n’est que du vent:'
  - type: text
    content: Le pays n’est pas sauvé,
  - type: text
    content: Et ses habitants ne sont pas nés.
  '19':
  - type: text
    content: Que tes morts revivent!
  - type: text
    content: Que mes cadavres se relèvent!
  - type: text
    content: Réveillez-vous et tressaillez de joie, habitants de la poussière!
  - type: text
    content: Car ta rosée est une rosée vivifiante,
  - type: text
    content: Et la terre redonnera le jour aux ombres.
  - type: heading
    content: '26 v. 20 à 27 v. 1: cf. És 8:17. Ps 12:6; 94:15, 23. Jé 51:34-37.'
  '2':
  - type: text
    content: Ouvrez les portes,
  - type: text
    content: Laissez entrer la nation juste et fidèle.
  '20':
  - type: text
    content: Va, mon peuple, entre dans ta chambre,
  - type: text
    content: Et ferme la porte derrière toi;
  - type: text
    content: 'Cache-toi '
  - type: note
    content: 2 Co 4:17.
  - type: text
    content: pour quelques instants,
  - type: text
    content: Jusqu’à ce que la colère soit passée.
  '21':
  - type: text
    content: Car voici, l’Éternel sort de sa demeure,
  - type: text
    content: Pour punir les crimes des habitants de la terre;
  - type: text
    content: Et la terre mettra le sang à nu,
  - type: text
    content: Elle ne couvrira plus les meurtres.
  '3':
  - type: text
    content: A celui qui est ferme dans ses sentiments
  - type: text
    content: Tu assures la paix, la paix,
  - type: text
    content: Parce qu’il se confie en toi.
  '4':
  - type: text
    content: Confiez-vous en l’Éternel à perpétuité,
  - type: text
    content: Car l’Éternel, l’Éternel est le rocher des siècles.
  '5':
  - type: text
    content: Il a renversé ceux qui habitaient les hauteurs,
  - type: text
    content: Il a abaissé la ville superbe;
  - type: text
    content: Il l’a abaissée jusqu’à terre,
  - type: text
    content: Il lui a fait toucher la poussière.
  '6':
  - type: text
    content: Elle est foulée aux pieds,
  - type: text
    content: Aux pieds des pauvres, sous les pas des misérables.
  '7':
  - type: text
    content: Le chemin du juste est la droiture;
  - type: text
    content: Toi qui es juste, tu aplanis le sentier du juste.
  '8':
  - type: text
    content: Aussi nous t’attendons, ô Éternel! Sur la voie de tes jugements;
  - type: text
    content: Notre âme soupire après ton nom et après ton souvenir.
  '9':
  - type: text
    content: Mon âme te désire pendant la nuit,
  - type: text
    content: Et mon esprit te cherche au-dedans de moi;
  - type: text
    content: Car, lorsque tes jugements s’exercent sur la terre,
  - type: text
    content: Les habitants du monde apprennent la justice.
