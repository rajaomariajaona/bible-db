document_id: ISA.28
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie contre Éphraïm
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-4: cf. 2 R 17:1-8.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Malheur à la couronne superbe des ivrognes d’Éphraïm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A la fleur fanée, qui fait l’éclat de sa parure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur la cime de la fertile vallée de ceux qui s’enivrent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Voici venir, de la part du Seigneur, un homme fort et puissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme un orage de grêle, un ouragan destructeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Comme une tempête qui précipite des torrents d’eaux:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il la fait tomber en terre avec violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Elle sera foulée aux pieds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La couronne superbe des ivrognes d’Éphraïm;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Et la fleur fanée, qui fait l’éclat de sa parure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur la cime de la fertile vallée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sera comme une figue hâtive qu’on aperçoit avant la récolte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui, à peine dans la main, est aussitôt avalée.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Menaces et exhortations à Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 5-22: cf. (És 22:1-14; 30:8-17.) 1 Pi 2:6-8. Pr 1:20, etc.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: En ce jour, l’Éternel des armées sera
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une couronne éclatante et une parure magnifique
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour le reste de son peuple,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Un esprit de justice pour celui qui est assis au siège de la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et une force pour ceux qui repoussent l’ennemi jusqu’à ses portes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:11
      metadata:
        usfm: ISA.5.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais eux aussi, ils chancellent dans le vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les boissons fortes leur donnent des vertiges;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sacrificateurs et prophètes chancellent dans les boissons fortes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont absorbés par le vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont des vertiges à cause des boissons fortes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils chancellent en prophétisant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils vacillent en rendant la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Toutes les tables sont pleines de vomissements, d’ordures;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y a plus de place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: A qui veut-on enseigner la sagesse?
- type: usfm
  marker: q1
  children:
  - type: text
    text: A qui veut-on donner des leçons?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce à des enfants qui viennent d’être sevrés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui viennent de quitter la mamelle?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car c’est précepte sur précepte, précepte sur précepte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Règle sur règle, règle sur règle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un peu ici, un peu là.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hé bien! C’est par des hommes aux lèvres balbutiantes
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 14:21
      metadata:
        usfm: 1CO.14.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: au langage barbare
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l’Éternel parlera à ce peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il lui disait: Voici le repos,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Laissez reposer celui qui est fatigué;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici le lieu du repos!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ils n’ont point voulu écouter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Et pour eux la parole de l’Éternel sera
- type: usfm
  marker: q1
  children:
  - type: text
    text: Précepte sur précepte, précepte sur précepte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Règle sur règle, règle sur règle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un peu ici, un peu là,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 2:16
      metadata:
        usfm: 2CO.2.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Afin qu’en marchant ils tombent à la renverse et se brisent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin qu’ils soient enlacés et pris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Écoutez donc la parole de l’Éternel, moqueurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous qui dominez sur ce peuple de Jérusalem!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Vous dites: Nous avons fait une alliance avec la mort,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous avons fait un pacte avec le séjour des morts;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand le fléau débordé passera, il ne nous atteindra pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car nous avons la fausseté pour refuge et le mensonge pour abri.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 118:22
      metadata:
        usfm: PSA.118.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:42
      metadata:
        usfm: MAT.21.42
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:11
      metadata:
        usfm: ACT.4.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:33
      metadata:
        usfm: ROM.9.33
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:11
      metadata:
        usfm: ROM.10.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 2:20
      metadata:
        usfm: EPH.2.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:6
      metadata:
        usfm: 1PE.2.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: 1PE.2.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: 1PE.2.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: j’ai mis pour fondement en Sion une pierre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une pierre éprouvée, une pierre angulaire de prix, solidement posée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui la prendra pour appui n’aura point hâte de fuir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Je ferai de la droiture une règle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de la justice un niveau;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la grêle emportera le refuge de la fausseté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les eaux inonderont l’abri du mensonge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Votre alliance avec la mort sera détruite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Votre pacte avec le séjour des morts ne subsistera pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand le fléau débordé passera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous serez par lui foulés aux pieds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Chaque fois qu’il passera, il vous saisira;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il passera tous les matins, le jour et la nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et son bruit seul donnera l’épouvante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le lit sera trop court pour s’y étendre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la couverture trop étroite pour s’en envelopper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Car l’Éternel se lèvera comme à la montagne de Peratsim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il s’irritera comme dans la vallée de Gabaon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour faire son œuvre, son œuvre étrange,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour exécuter son travail, son travail inouï.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Maintenant, ne vous livrez point à la moquerie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De peur que vos liens ne soient resserrés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car la destruction de tout le pays est résolue;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je l’ai appris du Seigneur, de l’Éternel des armées.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 23-29: cf. Ec 3:1-8. Jé 32:19. Ro 11:33.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Prêtez l’oreille, et écoutez ma voix!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soyez attentifs, et écoutez ma parole!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Celui qui laboure pour semer laboure-t-il toujours?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ouvre-t-il et brise-t-il toujours son terrain?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: N’est-ce pas après en avoir aplani la surface
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il répand de la nielle et sème du cumin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il met le froment par rangées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’orge à une place marquée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’épeautre sur les bords?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Son Dieu lui a enseigné la marche à suivre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il lui a donné ses instructions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: On ne foule pas la nielle avec le traîneau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la roue du chariot ne passe pas sur le cumin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais on bat la nielle avec le bâton,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le cumin avec la verge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: On bat le blé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais on ne le bat pas toujours;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On y pousse la roue du chariot et les chevaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais on ne l’écrase pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Cela aussi vient de l’Éternel des armées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Admirable est son conseil, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 32:19
      metadata:
        usfm: JER.32.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: grande est sa sagesse.
