document_id: ISA.28,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie contre Éphraïm
  - type: heading
    content: 'V. 1-4: cf. 2 R 17:1-8.'
  - type: text
    content: Malheur à la couronne superbe des ivrognes d’Éphraïm,
  - type: text
    content: A la fleur fanée, qui fait l’éclat de sa parure,
  - type: text
    content: Sur la cime de la fertile vallée de ceux qui s’enivrent!
  '10':
  - type: text
    content: Car c’est précepte sur précepte, précepte sur précepte,
  - type: text
    content: Règle sur règle, règle sur règle,
  - type: text
    content: Un peu ici, un peu là.
  '11':
  - type: text
    content: Hé bien! C’est par des hommes aux lèvres balbutiantes
  - type: text
    content: 'Et '
  - type: note
    content: 1 Co 14:21.
  - type: text
    content: au langage barbare
  - type: text
    content: Que l’Éternel parlera à ce peuple.
  '12':
  - type: text
    content: 'Il lui disait: Voici le repos,'
  - type: text
    content: Laissez reposer celui qui est fatigué;
  - type: text
    content: Voici le lieu du repos!
  - type: text
    content: Mais ils n’ont point voulu écouter.
  '13':
  - type: text
    content: Et pour eux la parole de l’Éternel sera
  - type: text
    content: Précepte sur précepte, précepte sur précepte,
  - type: text
    content: Règle sur règle, règle sur règle,
  - type: text
    content: Un peu ici, un peu là,
  - type: note
    content: 2 Co 2:16.
  - type: text
    content: Afin qu’en marchant ils tombent à la renverse et se brisent,
  - type: text
    content: Afin qu’ils soient enlacés et pris.
  '14':
  - type: text
    content: Écoutez donc la parole de l’Éternel, moqueurs,
  - type: text
    content: Vous qui dominez sur ce peuple de Jérusalem!
  '15':
  - type: text
    content: 'Vous dites: Nous avons fait une alliance avec la mort,'
  - type: text
    content: Nous avons fait un pacte avec le séjour des morts;
  - type: text
    content: Quand le fléau débordé passera, il ne nous atteindra pas,
  - type: text
    content: Car nous avons la fausseté pour refuge et le mensonge pour abri.
  '16':
  - type: text
    content: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: 'Voici, '
  - type: note
    content: Ps 118:22. Mt 21:42. Ac 4:11. Ro 9:33; 10:11. Ép 2:20. 1 Pi 2:6, 7, 8.
  - type: text
    content: j’ai mis pour fondement en Sion une pierre,
  - type: text
    content: Une pierre éprouvée, une pierre angulaire de prix, solidement posée;
  - type: text
    content: Celui qui la prendra pour appui n’aura point hâte de fuir.
  '17':
  - type: text
    content: Je ferai de la droiture une règle,
  - type: text
    content: Et de la justice un niveau;
  - type: text
    content: Et la grêle emportera le refuge de la fausseté,
  - type: text
    content: Et les eaux inonderont l’abri du mensonge.
  '18':
  - type: text
    content: Votre alliance avec la mort sera détruite,
  - type: text
    content: Votre pacte avec le séjour des morts ne subsistera pas;
  - type: text
    content: Quand le fléau débordé passera,
  - type: text
    content: Vous serez par lui foulés aux pieds.
  '19':
  - type: text
    content: Chaque fois qu’il passera, il vous saisira;
  - type: text
    content: Car il passera tous les matins, le jour et la nuit,
  - type: text
    content: Et son bruit seul donnera l’épouvante.
  '2':
  - type: text
    content: Voici venir, de la part du Seigneur, un homme fort et puissant,
  - type: text
    content: Comme un orage de grêle, un ouragan destructeur,
  - type: text
    content: 'Comme une tempête qui précipite des torrents d’eaux:'
  - type: text
    content: Il la fait tomber en terre avec violence.
  '20':
  - type: text
    content: Le lit sera trop court pour s’y étendre,
  - type: text
    content: Et la couverture trop étroite pour s’en envelopper.
  '21':
  - type: text
    content: Car l’Éternel se lèvera comme à la montagne de Peratsim,
  - type: text
    content: Il s’irritera comme dans la vallée de Gabaon,
  - type: text
    content: Pour faire son œuvre, son œuvre étrange,
  - type: text
    content: Pour exécuter son travail, son travail inouï.
  '22':
  - type: text
    content: Maintenant, ne vous livrez point à la moquerie,
  - type: text
    content: De peur que vos liens ne soient resserrés;
  - type: text
    content: Car la destruction de tout le pays est résolue;
  - type: text
    content: Je l’ai appris du Seigneur, de l’Éternel des armées.
  - type: heading
    content: 'V. 23-29: cf. Ec 3:1-8. Jé 32:19. Ro 11:33.'
  '23':
  - type: text
    content: Prêtez l’oreille, et écoutez ma voix!
  - type: text
    content: Soyez attentifs, et écoutez ma parole!
  '24':
  - type: text
    content: Celui qui laboure pour semer laboure-t-il toujours?
  - type: text
    content: Ouvre-t-il et brise-t-il toujours son terrain?
  '25':
  - type: text
    content: N’est-ce pas après en avoir aplani la surface
  - type: text
    content: Qu’il répand de la nielle et sème du cumin;
  - type: text
    content: Qu’il met le froment par rangées,
  - type: text
    content: L’orge à une place marquée,
  - type: text
    content: Et l’épeautre sur les bords?
  '26':
  - type: text
    content: Son Dieu lui a enseigné la marche à suivre,
  - type: text
    content: Il lui a donné ses instructions.
  '27':
  - type: text
    content: On ne foule pas la nielle avec le traîneau,
  - type: text
    content: Et la roue du chariot ne passe pas sur le cumin;
  - type: text
    content: Mais on bat la nielle avec le bâton,
  - type: text
    content: Et le cumin avec la verge.
  '28':
  - type: text
    content: On bat le blé,
  - type: text
    content: Mais on ne le bat pas toujours;
  - type: text
    content: On y pousse la roue du chariot et les chevaux,
  - type: text
    content: Mais on ne l’écrase pas.
  '29':
  - type: text
    content: Cela aussi vient de l’Éternel des armées;
  - type: text
    content: 'Admirable est son conseil, et '
  - type: note
    content: Jé 32:19.
  - type: text
    content: grande est sa sagesse.
  '3':
  - type: text
    content: Elle sera foulée aux pieds,
  - type: text
    content: La couronne superbe des ivrognes d’Éphraïm;
  '4':
  - type: text
    content: Et la fleur fanée, qui fait l’éclat de sa parure,
  - type: text
    content: Sur la cime de la fertile vallée,
  - type: text
    content: Sera comme une figue hâtive qu’on aperçoit avant la récolte,
  - type: text
    content: Et qui, à peine dans la main, est aussitôt avalée.
  - type: heading
    content: Menaces et exhortations à Juda
  - type: heading
    content: 'V. 5-22: cf. (És 22:1-14; 30:8-17.) 1 Pi 2:6-8. Pr 1:20, etc.'
  '5':
  - type: text
    content: En ce jour, l’Éternel des armées sera
  - type: text
    content: Une couronne éclatante et une parure magnifique
  - type: text
    content: Pour le reste de son peuple,
  '6':
  - type: text
    content: Un esprit de justice pour celui qui est assis au siège de la justice,
  - type: text
    content: Et une force pour ceux qui repoussent l’ennemi jusqu’à ses portes.
  '7':
  - type: text
    content: ' '
  - type: note
    content: És 5:11.
  - type: text
    content: Mais eux aussi, ils chancellent dans le vin,
  - type: text
    content: Et les boissons fortes leur donnent des vertiges;
  - type: text
    content: Sacrificateurs et prophètes chancellent dans les boissons fortes,
  - type: text
    content: Ils sont absorbés par le vin,
  - type: text
    content: Ils ont des vertiges à cause des boissons fortes;
  - type: text
    content: Ils chancellent en prophétisant,
  - type: text
    content: Ils vacillent en rendant la justice.
  '8':
  - type: text
    content: Toutes les tables sont pleines de vomissements, d’ordures;
  - type: text
    content: Il n’y a plus de place.
  '9':
  - type: text
    content: A qui veut-on enseigner la sagesse?
  - type: text
    content: A qui veut-on donner des leçons?
  - type: text
    content: Est-ce à des enfants qui viennent d’être sevrés,
  - type: text
    content: Qui viennent de quitter la mamelle?
