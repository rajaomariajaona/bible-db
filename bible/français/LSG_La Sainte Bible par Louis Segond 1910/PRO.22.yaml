document_id: PRO.22
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 7:1
      metadata:
        usfm: ECC.7.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La réputation est préférable à de grandes richesses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la grâce vaut mieux que l’argent et que l’or.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 29:13
      metadata:
        usfm: PRO.29.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le riche et le pauvre se rencontrent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est l’Éternel qui les a faits l’un et l’autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 27:12
      metadata:
        usfm: PRO.27.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’homme prudent voit le mal et se cache,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais les simples avancent et sont punis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Le fruit de l’humilité, de la crainte de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est la richesse, la gloire et la vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Des épines, des pièges sont sur la voie de l’homme pervers;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui garde son âme s’en éloigne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Instruis l’enfant selon la voie qu’il doit suivre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et quand il sera vieux, il ne s’en détournera pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le riche domine sur les pauvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celui qui emprunte est l’esclave de celui qui prête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 4:8
      metadata:
        usfm: JOB.4.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 10:13
      metadata:
        usfm: HOS.10.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui sème l’iniquité moissonne l’iniquité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la verge de sa fureur disparaît.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 9:6
      metadata:
        usfm: 2CO.9.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’homme dont le regard est bienveillant sera béni,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’il donne de son pain au pauvre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Chasse le moqueur, et la querelle prendra fin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les disputes et les outrages cesseront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 101:6
      metadata:
        usfm: PSA.101.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui aime la pureté du cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui a la grâce sur les lèvres, a le roi pour ami.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les yeux de l’Éternel gardent la science,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il confond les paroles du perfide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 26:13
      metadata:
        usfm: PRO.26.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le paresseux dit: Il y a un lion dehors!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je serai tué dans les rues!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 2:16
      metadata:
        usfm: PRO.2.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:3
      metadata:
        usfm: PRO.5.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:5
      metadata:
        usfm: PRO.7.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '23'
      metadata:
        usfm: PRO.7.23
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '27'
      metadata:
        usfm: PRO.7.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La bouche des étrangères est une fosse profonde;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui contre qui l’Éternel est irrité y tombera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 13:24
      metadata:
        usfm: PRO.13.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:18
      metadata:
        usfm: PRO.19.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:14
      metadata:
        usfm: PRO.23.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:15
      metadata:
        usfm: PRO.29.15
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '17'
      metadata:
        usfm: PRO.29.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La folie est attachée au cœur de l’enfant;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La verge de la correction l’éloignera de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 14:31
      metadata:
        usfm: PRO.14.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:5
      metadata:
        usfm: PRO.17.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Opprimer le pauvre pour augmenter son bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est donner au riche pour n’arriver qu’à la disette.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Prête l’oreille, et écoute les paroles des sages;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Applique ton cœur à ma science.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Car il est bon que tu les gardes au-dedans de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’elles soient toutes présentes sur tes lèvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Afin que ta confiance repose sur l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je veux t’instruire aujourd’hui, oui, toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: N’ai-je pas déjà pour toi mis par écrit
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des conseils et des réflexions,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Pour t’enseigner des choses sûres, des paroles vraies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que tu répondes par des paroles vraies à celui qui t’envoie?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 7:10
      metadata:
        usfm: ZEC.7.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ne dépouille pas le pauvre, parce qu’il est pauvre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:6
      metadata:
        usfm: EXO.23.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 31:13
      metadata:
        usfm: JOB.31.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 82:3
      metadata:
        usfm: PSA.82.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: PSA.82.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et n’opprime pas le malheureux à la porte;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 22:22
      metadata:
        usfm: EXO.22.22
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '23'
      metadata:
        usfm: EXO.22.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 10:18
      metadata:
        usfm: PSA.10.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car l’Éternel défendra leur cause,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il ôtera la vie à ceux qui les auront dépouillés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ne fréquente pas l’homme colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne va pas avec l’homme violent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: De peur que tu ne t’habitues à ses sentiers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’ils ne deviennent un piège pour ton âme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 6:1
      metadata:
        usfm: PRO.6.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:15
      metadata:
        usfm: PRO.11.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ne sois pas parmi ceux qui prennent des engagements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parmi ceux qui cautionnent pour des dettes;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Si tu n’as pas de quoi payer,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 20:16
      metadata:
        usfm: PRO.20.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pourquoi voudrais-tu qu’on enlève ton lit de dessous toi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 19:14
      metadata:
        usfm: DEU.19.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:17
      metadata:
        usfm: DEU.27.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 23:10
      metadata:
        usfm: PRO.23.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ne déplace pas la borne ancienne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tes pères ont posée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Si tu vois un homme habile dans son ouvrage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il se tient auprès des rois;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne se tient pas auprès des gens obscurs.
