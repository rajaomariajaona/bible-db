document_id: PRO.22,93
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Ec 7:1.
  - type: text
    content: La réputation est préférable à de grandes richesses,
  - type: text
    content: Et la grâce vaut mieux que l’argent et que l’or.
  '10':
  - type: text
    content: Chasse le moqueur, et la querelle prendra fin;
  - type: text
    content: Les disputes et les outrages cesseront.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ps 101:6.
  - type: text
    content: Celui qui aime la pureté du cœur,
  - type: text
    content: Et qui a la grâce sur les lèvres, a le roi pour ami.
  '12':
  - type: text
    content: Les yeux de l’Éternel gardent la science,
  - type: text
    content: Mais il confond les paroles du perfide.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Pr 26:13.
  - type: text
    content: 'Le paresseux dit: Il y a un lion dehors!'
  - type: text
    content: Je serai tué dans les rues!
  '14':
  - type: text
    content: ' '
  - type: note
    content: Pr 2:16; 5:3; 7:5, 23, 27.
  - type: text
    content: La bouche des étrangères est une fosse profonde;
  - type: text
    content: Celui contre qui l’Éternel est irrité y tombera.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Pr 13:24; 19:18; 23:14; 29:15, 17.
  - type: text
    content: La folie est attachée au cœur de l’enfant;
  - type: text
    content: La verge de la correction l’éloignera de lui.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Pr 14:31; 17:5.
  - type: text
    content: Opprimer le pauvre pour augmenter son bien,
  - type: text
    content: C’est donner au riche pour n’arriver qu’à la disette.
  '17':
  - type: text
    content: Prête l’oreille, et écoute les paroles des sages;
  - type: text
    content: Applique ton cœur à ma science.
  '18':
  - type: text
    content: Car il est bon que tu les gardes au-dedans de toi,
  - type: text
    content: Et qu’elles soient toutes présentes sur tes lèvres.
  '19':
  - type: text
    content: Afin que ta confiance repose sur l’Éternel,
  - type: text
    content: Je veux t’instruire aujourd’hui, oui, toi.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Pr 29:13.
  - type: text
    content: Le riche et le pauvre se rencontrent;
  - type: text
    content: C’est l’Éternel qui les a faits l’un et l’autre.
  '20':
  - type: text
    content: N’ai-je pas déjà pour toi mis par écrit
  - type: text
    content: Des conseils et des réflexions,
  '21':
  - type: text
    content: Pour t’enseigner des choses sûres, des paroles vraies,
  - type: text
    content: Afin que tu répondes par des paroles vraies à celui qui t’envoie?
  '22':
  - type: text
    content: ' '
  - type: note
    content: Za 7:10.
  - type: text
    content: Ne dépouille pas le pauvre, parce qu’il est pauvre,
  - type: note
    content: Ex 23:6. Job 31:13. Ps 82:3, 4.
  - type: text
    content: Et n’opprime pas le malheureux à la porte;
  '23':
  - type: text
    content: ' '
  - type: note
    content: Ex 22:22, 23. Ps 10:18.
  - type: text
    content: Car l’Éternel défendra leur cause,
  - type: text
    content: Et il ôtera la vie à ceux qui les auront dépouillés.
  '24':
  - type: text
    content: Ne fréquente pas l’homme colère,
  - type: text
    content: Ne va pas avec l’homme violent,
  '25':
  - type: text
    content: De peur que tu ne t’habitues à ses sentiers,
  - type: text
    content: Et qu’ils ne deviennent un piège pour ton âme.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Pr 6:1; 11:15.
  - type: text
    content: Ne sois pas parmi ceux qui prennent des engagements,
  - type: text
    content: Parmi ceux qui cautionnent pour des dettes;
  '27':
  - type: text
    content: Si tu n’as pas de quoi payer,
  - type: note
    content: Pr 20:16.
  - type: text
    content: Pourquoi voudrais-tu qu’on enlève ton lit de dessous toi?
  '28':
  - type: text
    content: ' '
  - type: note
    content: De 19:14; 27:17. Pr 23:10.
  - type: text
    content: Ne déplace pas la borne ancienne,
  - type: text
    content: Que tes pères ont posée.
  '29':
  - type: text
    content: Si tu vois un homme habile dans son ouvrage,
  - type: text
    content: Il se tient auprès des rois;
  - type: text
    content: Il ne se tient pas auprès des gens obscurs.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Pr 27:12.
  - type: text
    content: L’homme prudent voit le mal et se cache,
  - type: text
    content: Mais les simples avancent et sont punis.
  '4':
  - type: text
    content: Le fruit de l’humilité, de la crainte de l’Éternel,
  - type: text
    content: C’est la richesse, la gloire et la vie.
  '5':
  - type: text
    content: Des épines, des pièges sont sur la voie de l’homme pervers;
  - type: text
    content: Celui qui garde son âme s’en éloigne.
  '6':
  - type: text
    content: Instruis l’enfant selon la voie qu’il doit suivre;
  - type: text
    content: Et quand il sera vieux, il ne s’en détournera pas.
  '7':
  - type: text
    content: Le riche domine sur les pauvres,
  - type: text
    content: Et celui qui emprunte est l’esclave de celui qui prête.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Job 4:8. Os 10:13.
  - type: text
    content: Celui qui sème l’iniquité moissonne l’iniquité,
  - type: text
    content: Et la verge de sa fureur disparaît.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 2 Co 9:6.
  - type: text
    content: L’homme dont le regard est bienveillant sera béni,
  - type: text
    content: Parce qu’il donne de son pain au pauvre.
