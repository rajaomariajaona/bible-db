document_id: PRO.22,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 7:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La réputation est préférable à de grandes richesses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la grâce vaut mieux que l’argent et que l’or.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chasse le moqueur, et la querelle prendra fin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les disputes et les outrages cesseront.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 101:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Celui qui aime la pureté du cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui a la grâce sur les lèvres, a le roi pour ami.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les yeux de l’Éternel gardent la science,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il confond les paroles du perfide.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 26:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le paresseux dit: Il y a un lion dehors!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je serai tué dans les rues!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 2:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '27'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La bouche des étrangères est une fosse profonde;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui contre qui l’Éternel est irrité y tombera.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 13:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:15
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La folie est attachée au cœur de l’enfant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La verge de la correction l’éloignera de lui.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 14:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Opprimer le pauvre pour augmenter son bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est donner au riche pour n’arriver qu’à la disette.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prête l’oreille, et écoute les paroles des sages;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Applique ton cœur à ma science.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il est bon que tu les gardes au-dedans de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’elles soient toutes présentes sur tes lèvres.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que ta confiance repose sur l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux t’instruire aujourd’hui, oui, toi.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 29:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le riche et le pauvre se rencontrent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est l’Éternel qui les a faits l’un et l’autre.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’ai-je pas déjà pour toi mis par écrit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des conseils et des réflexions,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour t’enseigner des choses sûres, des paroles vraies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que tu répondes par des paroles vraies à celui qui t’envoie?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 7:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne dépouille pas le pauvre, parce qu’il est pauvre,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 31:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 82:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et n’opprime pas le malheureux à la porte;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 22:22
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 10:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car l’Éternel défendra leur cause,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il ôtera la vie à ceux qui les auront dépouillés.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne fréquente pas l’homme colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne va pas avec l’homme violent,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De peur que tu ne t’habitues à ses sentiers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’ils ne deviennent un piège pour ton âme.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 6:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne sois pas parmi ceux qui prennent des engagements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parmi ceux qui cautionnent pour des dettes;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu n’as pas de quoi payer,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 20:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Pourquoi voudrais-tu qu’on enlève ton lit de dessous toi?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 19:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 23:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne déplace pas la borne ancienne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes pères ont posée.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu vois un homme habile dans son ouvrage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se tient auprès des rois;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne se tient pas auprès des gens obscurs.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 27:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’homme prudent voit le mal et se cache,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les simples avancent et sont punis.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le fruit de l’humilité, de la crainte de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est la richesse, la gloire et la vie.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des épines, des pièges sont sur la voie de l’homme pervers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui garde son âme s’en éloigne.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instruis l’enfant selon la voie qu’il doit suivre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et quand il sera vieux, il ne s’en détournera pas.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le riche domine sur les pauvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celui qui emprunte est l’esclave de celui qui prête.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 4:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 10:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Celui qui sème l’iniquité moissonne l’iniquité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la verge de sa fureur disparaît.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 9:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’homme dont le regard est bienveillant sera béni,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’il donne de son pain au pauvre.
