document_id: LEV.24,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Règles sur le chandelier et sur les pains de proposition
  - type: heading
    content: 'V. 1-4: cf. Ex 27:20, 21. No 8:1-4. Za 4:2-14.'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: text
    content: 'Le fils d’une femme israélite et d’un homme égyptien, étant venu au milieu des enfants d’Israël, se querella dans le camp avec un homme israélite. '
  '11':
  - type: text
    content: 'Le fils de la femme israélite blasphéma et maudit le nom de Dieu. On l’amena à Moïse. Sa mère s’appelait Schelomith, fille de Dibri, de la tribu de Dan. '
  '12':
  - type: text
    content: 'On le mit en prison, jusqu’à ce que Moïse eût déclaré ce que l’Éternel ordonnerait. '
  '13':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '14':
  - type: text
    content: 'Fais sortir du camp le blasphémateur; tous ceux qui l’ont entendu poseront leurs mains sur sa tête, et toute l’assemblée le lapidera. '
  '15':
  - type: text
    content: 'Tu parleras aux enfants d’Israël, et tu diras: Quiconque maudira son Dieu portera la peine de son péché. '
  '16':
  - type: text
    content: 'Celui qui blasphémera le nom de l’Éternel sera puni de mort: toute l’assemblée le lapidera. Qu’il soit étranger ou indigène, il mourra, pour avoir blasphémé le nom de Dieu. '
  '17':
  - type: text
    content: 'Celui qui frappera un homme mortellement sera puni de mort. '
  '18':
  - type: text
    content: 'Celui qui frappera un animal mortellement le remplacera: vie pour vie. '
  '19':
  - type: text
    content: 'Si quelqu’un blesse son prochain, il lui sera fait comme il a fait: '
  '2':
  - type: text
    content: 'Ordonne aux enfants d’Israël de t’apporter pour le chandelier de l’huile pure d’olives concassées, afin d’entretenir les lampes continuellement. '
  '20':
  - type: text
    content: 'fracture pour fracture, '
  - type: note
    content: Ex 21:24. De 19:21. Mt 5:38.
  - type: text
    content: 'œil pour œil, dent pour dent; il lui sera fait la même blessure qu’il a faite à son prochain. '
  '21':
  - type: text
    content: 'Celui qui tuera un animal le remplacera, mais celui qui tuera un homme sera puni de mort. '
  '22':
  - type: text
    content: 'Vous aurez la même loi, l’étranger comme l’indigène; car je suis l’Éternel, votre Dieu. '
  '23':
  - type: text
    content: Moïse parla aux enfants d’Israël; ils firent sortir du camp le blasphémateur, et ils le lapidèrent. Les enfants d’Israël se conformèrent à l’ordre que l’Éternel avait donné à Moïse.
  '3':
  - type: text
    content: 'C’est en dehors du voile qui est devant le témoignage, dans la tente d’assignation, qu’Aaron la préparera, pour que les lampes brûlent continuellement du soir au matin en présence de l’Éternel. C’est une loi perpétuelle pour vos descendants. '
  '4':
  - type: text
    content: Il arrangera les lampes sur le chandelier d’or pur, pour qu’elles brûlent continuellement devant l’Éternel.
  - type: heading
    content: 'V. 5-9: cf. Ex 25:23-30.'
  '5':
  - type: text
    content: 'Tu prendras de la fleur de farine, et tu en feras douze gâteaux; chaque gâteau sera de deux dixièmes. '
  '6':
  - type: text
    content: 'Tu les placeras en deux piles, six par pile, sur la table d’or pur devant l’Éternel. '
  '7':
  - type: text
    content: 'Tu mettras de l’encens pur sur chaque pile, et il sera sur le pain comme souvenir, comme une offrande consumée par le feu devant l’Éternel. '
  '8':
  - type: text
    content: 'Chaque jour de sabbat, on rangera ces pains devant l’Éternel, continuellement: c’est une alliance perpétuelle qu’observeront les enfants d’Israël. '
  '9':
  - type: note
    content: Ex 29:32. Lé 8:31. 1 S 21:6. Mt 12:4.
  - type: text
    content: Ils appartiendront à Aaron et à ses fils, et ils les mangeront dans un lieu saint; car ce sera pour eux une chose très sainte, une part des offrandes consumées par le feu devant l’Éternel. C’est une loi perpétuelle.
  - type: heading
    content: Peine contre les blasphémateurs et les meurtriers
  - type: heading
    content: 'V. 10-23: cf. 1 R 21:9-13. No 15:32-36. (Ex 21:23-25. Mt 5:38-42.)'
