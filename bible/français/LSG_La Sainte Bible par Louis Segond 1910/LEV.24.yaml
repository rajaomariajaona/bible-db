document_id: LEV.24,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règles sur le chandelier et sur les pains de proposition
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-4: cf. Ex 27:20, 21. No 8:1-4. Za 4:2-14.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Le fils d’une femme israélite et d’un homme égyptien, étant venu au milieu des enfants d’Israël, se querella dans le camp avec un homme israélite. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Le fils de la femme israélite blasphéma et maudit le nom de Dieu. On l’amena à Moïse. Sa mère s’appelait Schelomith, fille de Dibri, de la tribu de Dan. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'On le mit en prison, jusqu’à ce que Moïse eût déclaré ce que l’Éternel ordonnerait. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fais sortir du camp le blasphémateur; tous ceux qui l’ont entendu poseront leurs mains sur sa tête, et toute l’assemblée le lapidera. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tu parleras aux enfants d’Israël, et tu diras: Quiconque maudira son Dieu portera la peine de son péché. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Celui qui blasphémera le nom de l’Éternel sera puni de mort: toute l’assemblée le lapidera. Qu’il soit étranger ou indigène, il mourra, pour avoir blasphémé le nom de Dieu. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Celui qui frappera un homme mortellement sera puni de mort. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Celui qui frappera un animal mortellement le remplacera: vie pour vie. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Si quelqu’un blesse son prochain, il lui sera fait comme il a fait: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ordonne aux enfants d’Israël de t’apporter pour le chandelier de l’huile pure d’olives concassées, afin d’entretenir les lampes continuellement. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'fracture pour fracture, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 21:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 19:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:38
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'œil pour œil, dent pour dent; il lui sera fait la même blessure qu’il a faite à son prochain. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Celui qui tuera un animal le remplacera, mais celui qui tuera un homme sera puni de mort. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Vous aurez la même loi, l’étranger comme l’indigène; car je suis l’Éternel, votre Dieu. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Moïse parla aux enfants d’Israël; ils firent sortir du camp le blasphémateur, et ils le lapidèrent. Les enfants d’Israël se conformèrent à l’ordre que l’Éternel avait donné à Moïse.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'C’est en dehors du voile qui est devant le témoignage, dans la tente d’assignation, qu’Aaron la préparera, pour que les lampes brûlent continuellement du soir au matin en présence de l’Éternel. C’est une loi perpétuelle pour vos descendants. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il arrangera les lampes sur le chandelier d’or pur, pour qu’elles brûlent continuellement devant l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-9: cf. Ex 25:23-30.'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tu prendras de la fleur de farine, et tu en feras douze gâteaux; chaque gâteau sera de deux dixièmes. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tu les placeras en deux piles, six par pile, sur la table d’or pur devant l’Éternel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tu mettras de l’encens pur sur chaque pile, et il sera sur le pain comme souvenir, comme une offrande consumée par le feu devant l’Éternel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Chaque jour de sabbat, on rangera ces pains devant l’Éternel, continuellement: c’est une alliance perpétuelle qu’observeront les enfants d’Israël. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 8:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 21:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 12:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils appartiendront à Aaron et à ses fils, et ils les mangeront dans un lieu saint; car ce sera pour eux une chose très sainte, une part des offrandes consumées par le feu devant l’Éternel. C’est une loi perpétuelle.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peine contre les blasphémateurs et les meurtriers
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-23: cf. 1 R 21:9-13. No 15:32-36. (Ex 21:23-25. Mt 5:38-42.)'
    marker-yv: yv-h
