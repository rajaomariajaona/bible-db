document_id: EZK.4,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie sur la destruction de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-17: cf. 2 R 25:1-3. La 4:4-10.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Et toi, fils de l’homme, prends une brique, place-la devant toi, et tu y traceras une ville, Jérusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'La nourriture que tu mangeras sera du poids de vingt sicles par jour; tu en mangeras de temps à autre. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'L’eau que tu boiras aura la mesure d’un sixième de hin; tu boiras de temps à autre. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tu mangeras des gâteaux d’orge, que tu feras cuire en leur présence avec des excréments humains. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Et l’Éternel dit: C’est ainsi que les enfants d’Israël mangeront leur pain '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 9:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'souillé, parmi les nations vers lesquelles je les chasserai. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Je dis: Ah! Seigneur Éternel, voici, mon âme n’a point été souillée; depuis ma jeunesse jusqu’à présent, je n’ai pas mangé d’une bête morte ou déchirée, et aucune chair impure n’est entrée dans ma bouche. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Il me répondit: Voici, je te donne des excréments de bœuf au lieu d’excréments humains, et tu feras ton pain dessus. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il me dit encore: Fils de l’homme, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 26:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 3:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 5:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'je vais briser le bâton du pain à Jérusalem; ils mangeront du pain au poids et avec angoisse, et ils boiront de l’eau à la mesure et avec épouvante. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ils manqueront de pain et d’eau, ils seront stupéfaits les uns et les autres, et frappés de langueur pour leur iniquité.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Représente-la en état de siège, forme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 25:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'des retranchements, élève contre elle des terrasses, environne-la d’un camp, dresse contre elle des béliers tout autour. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Prends une poêle de fer, et mets-la comme un mur de fer entre toi et la ville; dirige ta face contre elle, et elle sera assiégée, et tu l’assiégeras. Que ce soit là un signe pour la maison d’Israël! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Puis couche-toi sur le côté gauche, mets-y l’iniquité de la maison d’Israël, et tu porteras leur iniquité autant de jours que tu seras couché sur ce côté. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Je te compterai un nombre de jours égal à celui des années de leur iniquité, trois cent quatre-vingt-dix jours; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 14:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'tu porteras ainsi l’iniquité de la maison d’Israël. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Quand tu auras achevé ces jours, couche-toi sur le côté droit, et tu porteras l’iniquité de la maison de Juda pendant quarante jours; je t’impose un jour pour chaque année. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tu tourneras ta face et ton bras nu vers Jérusalem assiégée, et tu prophétiseras contre elle. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Et voici, je mettrai des cordes sur toi, afin que tu ne puisses pas te tourner d’un côté sur l’autre, jusqu’à ce que tu aies accompli les jours de ton siège. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Prends du froment, de l’orge, des fèves, des lentilles, du millet et de l’épeautre, mets-les dans un vase, et fais-en du pain autant de jours que tu seras couché sur le côté; tu en mangeras pendant trois cent quatre-vingt-dix jours. '
