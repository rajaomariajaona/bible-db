document_id: EZK.46,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-15: cf. (Éz 44:1-3; 45:17.) No 28:2, etc.'
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel: La porte du parvis intérieur, du côté de l’orient, restera fermée les six jours ouvriers; mais elle sera ouverte le jour du sabbat, elle sera aussi ouverte le jour de la nouvelle lune. '
  '10':
  - type: text
    content: 'Le prince entrera parmi eux quand ils entreront, et sortira quand ils sortiront. '
  '11':
  - type: text
    content: 'Aux fêtes et aux solennités, l’offrande sera d’un épha pour le taureau, d’un épha pour le bélier, et de ce qu’il voudra pour les agneaux, avec un hin d’huile par épha. '
  '12':
  - type: text
    content: 'Si le prince offre à l’Éternel un holocauste volontaire ou un sacrifice volontaire d’actions de grâces, on lui ouvrira la porte qui est du côté de l’orient, et il offrira son holocauste et son sacrifice d’actions de grâces comme il doit le faire le jour du sabbat; puis il sortira, et l’on fermera la porte après qu’il sera sorti. '
  '13':
  - type: text
    content: 'Tu offriras chaque jour en holocauste à l’Éternel un agneau d’un an, sans défaut; tu l’offriras tous les matins. '
  '14':
  - type: text
    content: 'Tu y joindras pour offrande, tous les matins, un sixième d’épha, et le tiers d’un hin d’huile pour pétrir la farine. C’est l’offrande à l’Éternel, une loi perpétuelle, pour toujours. '
  '15':
  - type: text
    content: On offrira, tous les matins, l’agneau et l’offrande avec l’huile, comme holocauste perpétuel.
  - type: heading
    content: 'V. 16-18: cf. Éz 45:7-9.'
  '16':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel: Si le prince fait à l’un de ses fils un don pris sur son héritage, ce don appartiendra à ses fils, ce sera leur propriété comme héritage. '
  '17':
  - type: text
    content: 'Mais s’il fait à l’un de ses serviteurs un don pris sur son héritage, ce don lui appartiendra jusqu’à l’année de la liberté, puis il retournera au prince; ses fils seuls posséderont ce qu’il leur donnera de son héritage. '
  '18':
  - type: text
    content: Le prince ne prendra rien de l’héritage du peuple, il ne le dépouillera pas de ses possessions; ce qu’il donnera en héritage à ses fils, il le prendra sur ce qu’il possède, afin que nul parmi mon peuple ne soit éloigné de sa possession.
  - type: heading
    content: 'V. 19-24: cf. Éz 40:38-46.'
  '19':
  - type: text
    content: 'Il me conduisit, par l’entrée qui était à côté de la porte, dans les chambres saintes destinées aux sacrificateurs, vers le septentrion. Et voici, il y avait un lieu dans le fond, du côté de l’occident. '
  '2':
  - type: text
    content: 'Le prince entrera par le chemin du vestibule de la porte extérieure, et se tiendra près des poteaux de la porte; les sacrificateurs offriront son holocauste et ses sacrifices d’actions de grâces; il se prosternera sur le seuil de la porte, puis il sortira, et la porte ne sera pas fermée avant le soir. '
  '20':
  - type: text
    content: 'Il me dit: C’est le lieu où les sacrificateurs feront cuire la chair des sacrifices de culpabilité et d’expiation, et où ils feront cuire les offrandes, pour éviter de les porter dans le parvis extérieur et de sanctifier le peuple. '
  '21':
  - type: text
    content: 'Il me conduisit ensuite dans le parvis extérieur, et me fit passer vers les quatre angles du parvis. Et voici, il y avait une cour à chacun des angles du parvis. '
  '22':
  - type: text
    content: 'Aux quatre angles du parvis il y avait des cours voûtées, longues de quarante coudées et larges de trente; toutes les quatre avaient la même mesure, dans les angles. '
  '23':
  - type: text
    content: 'Un mur les entourait toutes les quatre, et des foyers étaient pratiqués au bas du mur tout autour. '
  '24':
  - type: text
    content: 'Il me dit: Ce sont les cuisines, où les serviteurs de la maison feront cuire la chair des sacrifices offerts par le peuple.'
  '3':
  - type: text
    content: 'Le peuple du pays se prosternera devant l’Éternel à l’entrée de cette porte, aux jours de sabbat et aux nouvelles lunes. '
  '4':
  - type: text
    content: 'L’holocauste que le prince offrira à l’Éternel, le jour du sabbat, sera de six agneaux sans défaut et d’un bélier sans défaut; '
  '5':
  - type: text
    content: 'et son offrande, d’un épha pour le bélier, et de ce qu’il voudra pour les agneaux, avec un hin d’huile par épha. '
  '6':
  - type: text
    content: 'Le jour de la nouvelle lune, il offrira un jeune taureau sans défaut, six agneaux et un bélier qui seront sans défaut; '
  '7':
  - type: text
    content: 'et son offrande sera d’un épha pour le taureau, d’un épha pour le bélier, et de ce qu’il voudra pour les agneaux, avec un hin d’huile par épha. '
  '8':
  - type: text
    content: 'Lorsque le prince entrera, il entrera par le chemin du vestibule de la porte, et il sortira par le même chemin. '
  '9':
  - type: text
    content: 'Mais lorsque le peuple du pays se présentera devant l’Éternel, aux solennités, celui qui entrera par la porte septentrionale pour se prosterner sortira par la porte méridionale, et celui qui entrera par la porte méridionale sortira par la porte septentrionale; on ne devra pas s’en retourner par la porte par laquelle on sera entré, mais on sortira par celle qui lui est opposée. '
