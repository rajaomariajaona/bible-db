document_id: 1SA.20,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David informé par Jonathan des dispositions hostiles de Saül. — Les deux amis prennent congé l’un de l’autre
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-43: cf. (1 S 18:1-3; 19:1-7; 23:16-18. 2 S 9.) Pr 17:17.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'David s’enfuit de Najoth, près de Rama. Il alla trouver Jonathan, et dit: Qu’ai-je fait? Quel est mon crime, quel est mon péché aux yeux de ton père, pour qu’il en veuille à ma vie? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'David dit à Jonathan: Qui m’informera dans le cas où ton père te répondrait durement? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Et Jonathan dit à David: Viens, sortons dans les champs. Et ils sortirent tous deux dans les champs. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Jonathan dit à David: Je prends à témoin l’Éternel, le Dieu d’Israël! Je sonderai mon père demain ou après-demain; et, dans le cas où il serait bien disposé pour David, si je n’envoie vers toi personne pour t’en informer, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'que l’Éternel traite Jonathan dans toute sa rigueur! Dans le cas où mon père trouverait bon de te faire du mal, je t’informerai aussi et je te laisserai partir, afin que tu t’en ailles en paix; et que l’Éternel soit avec toi, comme il a été avec mon père! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Si je dois vivre encore, veuille user envers moi de la bonté de l’Éternel; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'et si je meurs, ne retire jamais ta bonté envers ma maison, pas même lorsque l’Éternel retranchera chacun des ennemis de David de dessus la face de la terre. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Car Jonathan a fait alliance avec la maison de David. Que l’Éternel tire vengeance des ennemis de David! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Jonathan protesta encore auprès de David de son affection pour lui, car il l’aimait comme son âme. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Jonathan lui dit: C’est demain la nouvelle lune; on remarquera ton absence, car ta place sera vide. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tu descendras le troisième jour jusqu’au fond du lieu où tu t’étais caché le jour de l’affaire, et tu resteras près de la pierre d’Ézel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Jonathan lui répondit: Loin de là! Tu ne mourras point. Mon père ne fait aucune chose, grande ou petite, sans m’en informer; pourquoi donc mon père me cacherait-il celle-là? Il n’en est rien. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Je tirerai trois flèches du côté de la pierre, comme si je visais un but. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Et voici, j’enverrai un jeune homme, et je lui dirai: Va, trouve les flèches. Si je lui dis: Voici, les flèches sont en deçà de toi, prends-les! Alors viens, car il y a paix pour toi, et tu n’as rien à craindre, l’Éternel est vivant! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mais si je dis au jeune homme: Voici, les flèches sont au-delà de toi! Alors va-t-en, car l’Éternel te renvoie. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: text
        text: v. 42.
      marker-yv: yv-n
    - type: text
      text: 'L’Éternel est à jamais témoin de la parole que nous nous sommes donnée l’un à l’autre. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'David se cacha dans les champs. C’était la nouvelle lune, et le roi prit place au festin pour manger. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Le roi s’assit comme à l’ordinaire sur son siège contre la paroi, Jonathan se leva, et Abner s’assit à côté de Saül; mais la place de David resta vide. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Saül ne dit rien ce jour-là; car, pensa-t-il, c’est par hasard, il n’est pas pur, certainement il n’est pas pur. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Le lendemain, second jour de la nouvelle lune, la place de David était encore vide. Et Saül dit à Jonathan, son fils: Pourquoi le fils d’Isaï n’a-t-il paru au repas ni hier ni aujourd’hui? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Jonathan répondit à Saül: David m’a demandé la permission d’aller à Bethléhem. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Il a dit: Laisse-moi aller, je te prie, car nous avons dans la ville un sacrifice de famille, et mon frère me l’a fait savoir; si donc j’ai trouvé grâce à tes yeux, permets que j’aille en hâte voir mes frères. C’est pour cela qu’il n’est point venu à la table du roi. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'David dit encore, en jurant: Ton père sait bien que j’ai trouvé grâce à tes yeux, et il aura dit: Que Jonathan ne le sache pas; cela lui ferait de la peine. Mais l’Éternel est vivant et ton âme est vivante! Il n’y a qu’un pas entre moi et la mort. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Alors la colère de Saül s’enflamma contre Jonathan, et il lui dit: Fils pervers et rebelle, ne sais je pas que tu as pour ami le fils d’Isaï, à ta honte et à la honte de ta mère? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Car aussi longtemps que le fils d’Isaï sera vivant sur la terre, il n’y aura point de sécurité ni pour toi ni pour ta royauté. Et maintenant, envoie-le chercher, et qu’on me l’amène, car il est digne de mort. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Jonathan répondit à Saül, son père, et lui dit: Pourquoi le ferait-on mourir? Qu’a-t-il fait? '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Et Saül dirigea sa lance contre lui, pour le frapper. Jonathan comprit que c’était chose résolue chez son père que de faire mourir David. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Il se leva de table dans une ardente colère, et ne participa point au repas le second jour de la nouvelle lune; car il était affligé à cause de David, parce que son père l’avait outragé. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Le lendemain matin, Jonathan alla dans les champs au lieu convenu avec David, et il était accompagné d’un petit garçon. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Il lui dit: Cours, trouve les flèches que je vais tirer. Le garçon courut, et Jonathan tira une flèche qui le dépassa. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Lorsqu’il arriva au lieu où était la flèche que Jonathan avait tirée, Jonathan cria derrière lui: La flèche n’est-elle pas plus loin que toi? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Il lui cria encore: Vite, hâte-toi, ne t’arrête pas! Et le garçon de Jonathan ramassa les flèches et revint vers son maître. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Le garçon ne savait rien; Jonathan et David seuls comprenaient la chose. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Jonathan dit à David: Je ferai pour toi ce que tu voudras. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Jonathan remit ses armes à son garçon, et lui dit: Va, porte-les à la ville. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Après le départ du garçon, David se leva du côté du midi, puis se jeta le visage contre terre et se prosterna trois fois. Les deux amis s’embrassèrent et pleurèrent ensemble, David surtout fondit en larmes. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Et Jonathan dit à David: Va en paix, maintenant que nous avons juré l’un et l’autre, au nom de l’Éternel, en disant: Que l’Éternel soit à jamais entre moi et toi, entre ma postérité et ta postérité! '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: David se leva, et s’en alla, et Jonathan rentra dans la ville.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Et David lui répondit: Voici, c’est demain la nouvelle lune, et je devrais m’asseoir avec le roi pour manger; laisse-moi aller, et je me cacherai dans les champs jusqu’au soir du troisième jour. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Si ton père remarque mon absence, tu diras: David m’a prié de lui laisser faire une course à Bethléhem, sa ville, parce qu’il y a pour toute la famille un sacrifice annuel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Et s’il dit: C’est bien! Ton serviteur alors n’a rien à craindre; mais si la colère s’empare de lui, sache que le mal est résolu de sa part. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Montre donc ton affection pour ton serviteur, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 18:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'puisque tu as fait avec ton serviteur une alliance devant l’Éternel. Et, s’il y a quelque crime en moi, ôte-moi la vie toi-même, car pourquoi me mènerais-tu jusqu’à ton père? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Jonathan lui dit: Loin de toi la pensée que je ne t’informerai pas, si j’apprends que le mal est résolu de la part de mon père et menace de t’atteindre! '
