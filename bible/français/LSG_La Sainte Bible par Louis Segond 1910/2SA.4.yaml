document_id: 2SA.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-12: cf. 2 S 1:1-16. (Ex 21:12, 14. No 35:31-34.) Ps 101:8.'
  - type: text
    content: 'Lorsque le fils de Saül apprit qu’Abner était mort à Hébron, ses mains restèrent sans force, et tout Israël fut dans l’épouvante. '
  '10':
  - type: note
    content: 2 S 1:15.
  - type: text
    content: 'celui qui est venu me dire: Voici, Saül est mort, et qui croyait m’annoncer une bonne nouvelle, je l’ai fait saisir et tuer à Tsiklag, pour lui donner le salaire de son message; '
  '11':
  - type: text
    content: 'et quand des méchants ont assassiné un homme juste dans sa maison et sur sa couche, combien plus ne redemanderai-je pas son sang de vos mains et ne vous exterminerai-je pas de la terre? '
  '12':
  - type: text
    content: 'Et David ordonna à ses gens de les tuer; ils leur coupèrent les mains et les pieds, et les pendirent au bord de l’étang d’Hébron. Ils prirent ensuite la tête d’Isch-Boscheth, et l’enterrèrent dans le '
  - type: note
    content: 2 S 3:32.
  - type: text
    content: sépulcre d’Abner à Hébron.
  '2':
  - type: text
    content: 'Le fils de Saül avait deux chefs de bandes, dont l’un s’appelait Baana et l’autre Récab; ils étaient fils de Rimmon de Beéroth, d’entre les fils de Benjamin. Car Beéroth était regardée comme faisant partie de Benjamin, '
  '3':
  - type: text
    content: 'et les Beérothiens s’étaient enfuis à Guitthaïm, où ils ont habité jusqu’à ce jour. '
  '4':
  - type: note
    content: 2 S 9:3, etc.
  - type: text
    content: 'Jonathan, fils de Saül, avait un fils perclus des pieds; et âgé de cinq ans lorsqu’arriva de Jizreel la nouvelle de la mort de Saül et de Jonathan; sa nourrice le prit et s’enfuit, et, comme elle précipitait sa fuite, il tomba et resta boiteux; son nom était Mephiboscheth. '
  '5':
  - type: text
    content: 'Or les fils de Rimmon de Beéroth, Récab et Baana, se rendirent pendant la chaleur du jour à la maison d’Isch-Boscheth, qui était couché pour son repos de midi. '
  '6':
  - type: text
    content: 'Ils pénétrèrent jusqu’au milieu de la maison, comme pour prendre du froment, et ils le frappèrent au ventre; puis Récab et Baana, son frère, se sauvèrent. '
  '7':
  - type: text
    content: 'Ils entrèrent donc dans la maison pendant qu’il reposait sur son lit dans sa chambre à coucher, ils le frappèrent et le firent mourir, et ils lui coupèrent la tête. Ils prirent sa tête, et ils marchèrent toute la nuit au travers de la plaine. '
  '8':
  - type: text
    content: 'Ils apportèrent la tête d’Isch-Boscheth à David dans Hébron, et ils dirent au roi: Voici la tête d’Isch-Boscheth, fils de Saül, ton ennemi, qui en voulait à ta vie; l’Éternel venge aujourd’hui le roi mon seigneur de Saül et de sa race. '
  '9':
  - type: text
    content: 'David répondit à Récab et à Baana, son frère, fils de Rimmon de Beéroth: L’Éternel qui m’a délivré de tout péril est vivant! '
