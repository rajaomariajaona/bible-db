document_id: LEV.27
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les vœux et les dîmes
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. De 23:21-23. 1 S 1:11, 20-28.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Parle aux enfants d’Israël, et tu leur diras: Lorsqu’on fera des vœux, s’il s’agit de personnes, elles seront à l’Éternel d’après ton estimation. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Si tu as à faire l’estimation d’un mâle de vingt à soixante ans, ton estimation sera de cinquante sicles d’argent, selon le sicle du sanctuaire; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'si c’est une femme, ton estimation sera de trente sicles. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'De cinq à vingt ans, ton estimation sera de vingt sicles pour un mâle, et de dix sicles pour une fille. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'D’un mois à cinq ans, ton estimation sera de cinq sicles d’argent pour un mâle, et de trois sicles d’argent pour une fille. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'De soixante ans et au-dessus, ton estimation sera de quinze sicles pour un mâle, et de dix sicles pour une femme. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Si celui qui a fait le vœu est trop pauvre pour payer ton estimation, on le présentera au sacrificateur, qui le taxera, et le sacrificateur fera une estimation en rapport avec les ressources de cet homme. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'S’il s’agit d’animaux qui peuvent être offerts en sacrifice à l’Éternel, tout animal qu’on donnera à l’Éternel sera chose sainte. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On ne le changera point, et l’on n’en mettra point un mauvais à la place d’un bon ni un bon à la place d’un mauvais; si l’on remplace un animal par un autre, ils seront l’un et l’autre chose sainte. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'S’il s’agit d’animaux impurs, qui ne peuvent être offerts en sacrifice à l’Éternel, on présentera l’animal au sacrificateur, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'qui en fera l’estimation selon qu’il sera bon ou mauvais, et l’on s’en rapportera à l’estimation du sacrificateur. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Si on veut le racheter, on ajoutera un cinquième à son estimation.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-25: cf. Ac 4:34 à 5:5.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Si quelqu’un sanctifie sa maison en la consacrant à l’Éternel, le sacrificateur en fera l’estimation selon qu’elle sera bonne ou mauvaise, et l’on s’en tiendra à l’estimation du sacrificateur. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Si celui qui a sanctifié sa maison veut la racheter, il ajoutera un cinquième au prix de son estimation, et elle sera à lui. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Si quelqu’un sanctifie à l’Éternel un champ de sa propriété, ton estimation sera en rapport avec la quantité de semence, cinquante sicles d’argent pour un homer de semence d’orge. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Si c’est dès l’année du jubilé qu’il sanctifie son champ, on s’en tiendra à ton estimation; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'si c’est après le jubilé qu’il sanctifie son champ, le sacrificateur en évaluera le prix à raison du nombre d’années qui restent jusqu’au jubilé, et il sera fait une réduction sur ton estimation. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Si celui qui a sanctifié son champ veut le racheter, il ajoutera un cinquième au prix de ton estimation, et le champ lui restera. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'S’il ne rachète point le champ, et qu’on le vende à un autre homme, il ne pourra plus être racheté. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et quand l’acquéreur en sortira au jubilé, ce champ sera consacré à l’Éternel, comme un champ qui a été dévoué; il deviendra la propriété du sacrificateur. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Si quelqu’un sanctifie à l’Éternel un champ qu’il a acquis et qui ne fait point partie de sa propriété, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'le sacrificateur en évaluera le prix d’après ton estimation jusqu’à l’année du jubilé, et cet homme paiera le jour même le prix fixé, comme étant consacré à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'L’année du jubilé, le champ retournera à celui de qui il avait été acheté et de la propriété dont il faisait partie. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Toutes tes estimations se feront en sicles du sanctuaire: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 30:13
      metadata:
        usfm: EXO.30.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 3:47
      metadata:
        usfm: NUM.3.47
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 45:12
      metadata:
        usfm: EZK.45.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: le sicle est de vingt guéras.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 26-29: cf. Ex 13:2, 11-15. Jos 6:17-24.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:2
      metadata:
        usfm: EXO.13.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:29
      metadata:
        usfm: EXO.22.29
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:19
      metadata:
        usfm: EXO.34.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 3:13
      metadata:
        usfm: NUM.3.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:17
      metadata:
        usfm: NUM.8.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nul ne pourra sanctifier le premier-né de son bétail, lequel appartient déjà à l’Éternel en sa qualité de premier-né; soit bœuf, soit agneau, il appartient à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'S’il s’agit d’un animal impur, on le rachètera au prix de ton estimation, en y ajoutant un cinquième; s’il n’est pas racheté, il sera vendu d’après ton estimation. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 6:18
      metadata:
        usfm: JOS.6.18
    - type: text
      text: ; 7:13, etc.
    marker-yv: yv-n
  - type: text
    text: 'Tout ce qu’un homme dévouera par interdit à l’Éternel, dans ce qui lui appartient, ne pourra ni se vendre, ni se racheter, que ce soit une personne, un animal, ou un champ de sa propriété; tout ce qui sera dévoué par interdit sera entièrement consacré à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Aucune personne dévouée par interdit ne pourra être rachetée, elle sera mise à mort.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 30-34: cf. No 18:21-32.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Toute dîme de la terre, soit des récoltes de la terre, soit du fruit des arbres, appartient à l’Éternel; c’est une chose consacrée à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Si quelqu’un veut racheter quelque chose de sa dîme, il y ajoutera un cinquième. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Toute dîme de gros et de menu bétail, de tout ce qui passe sous la houlette, sera une dîme consacrée à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'On n’examinera point si l’animal est bon ou mauvais, et l’on ne fera point d’échange; si l’on remplace un animal par un autre, ils seront l’un et l’autre chose sainte, et ne pourront être rachetés. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Tels sont les commandements que l’Éternel donna à Moïse pour les enfants d’Israël, sur la montagne de Sinaï.
