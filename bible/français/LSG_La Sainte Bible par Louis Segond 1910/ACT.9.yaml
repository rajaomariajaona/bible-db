document_id: ACT.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Conversion de Saul
  - type: heading
    content: 'V. 1-22: cf. Ac 22:3-16; 26:9-20. Ga 1:11-16. 1 Ti 1:12-16.'
  - type: text
    content: 'Cependant '
  - type: note
    content: Ac 8:3; 22:4; 23:9. 1 Co 15:9. Ga 1:13. 1 Ti 1:13.
  - type: text
    content: 'Saul, respirant encore la menace et le meurtre contre les disciples du Seigneur, se rendit chez le souverain sacrificateur, '
  '10':
  - type: text
    content: 'Or, il y avait à Damas un disciple nommé Ananias. Le Seigneur lui dit dans une vision: '
  - type: text
    content: Ananias!
  - type: text
    content: ' Il répondit: Me voici, Seigneur! '
  '11':
  - type: text
    content: 'Et le Seigneur lui dit: '
  - type: text
    content: Lève-toi, va dans la rue qu’on appelle la droite, et cherche, dans la maison de Judas, un nommé Saul
  - type: text
    content: ' '
  - type: note
    content: Ac 21:39; 22:3.
  - type: text
    content: de Tarse.
  '12':
  - type: text
    content: ' '
  - type: text
    content: Car il prie, et il a vu en vision un homme du nom d’Ananias, qui entrait, et qui lui imposait les mains, afin qu’il recouvrât la vue.
  - type: text
    content: ' Ananias répondit: '
  '13':
  - type: text
    content: 'Seigneur, j’ai appris de plusieurs personnes '
  - type: note
    content: Ac 9:1. 1 Co 15:9. Ga 1:13. 1 Ti 1:13.
  - type: text
    content: 'tout le mal que cet homme a fait à tes saints dans Jérusalem; '
  '14':
  - type: text
    content: 'et il a ici des pouvoirs, de la part des principaux sacrificateurs, pour lier tous ceux qui invoquent ton nom. '
  '15':
  - type: text
    content: 'Mais le Seigneur lui dit: '
  - type: text
    content: Va,
  - type: text
    content: ' '
  - type: note
    content: Ac 13:2; 22:21. Ro 1:1. Ép 3:8. Ga 1:15; 2:8. 1 Ti 2:7. 2 Ti 1:11.
  - type: text
    content: car cet homme est un instrument que j’ai choisi, pour porter mon nom devant les nations, devant les rois, et devant les fils d’Israël;
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ac 21:11. 2 Co 11:23.
  - type: text
    content: et je lui montrerai tout ce qu’il doit souffrir pour mon nom.
  - type: text
    content: ' '
  '17':
  - type: note
    content: Ac 22:12.
  - type: text
    content: 'Ananias sortit; et, lorsqu’il fut arrivé dans la maison, il imposa les mains à Saul, en disant: Saul, mon frère, le Seigneur Jésus, qui t’est apparu sur le chemin par lequel tu venais, m’a envoyé pour que tu recouvres la vue et que tu sois rempli du Saint-Esprit. '
  '18':
  - type: text
    content: 'Au même instant, il tomba de ses yeux comme des écailles, et il recouvra la vue. Il se leva, et fut baptisé; '
  '19':
  - type: text
    content: 'et, après qu’il eut pris de la nourriture, les forces lui revinrent. Saul resta quelques jours avec les disciples qui étaient à Damas. '
  '2':
  - type: text
    content: 'et lui demanda des lettres pour les synagogues de Damas, afin que, s’il trouvait des partisans de la nouvelle doctrine, hommes ou femmes, il les amenât liés à Jérusalem. '
  '20':
  - type: text
    content: 'Et aussitôt il prêcha dans les synagogues que Jésus est le Fils de Dieu. '
  '21':
  - type: text
    content: 'Tous ceux qui l’entendaient étaient dans l’étonnement, et disaient: N’est-ce pas celui qui persécutait à Jérusalem ceux qui invoquent ce nom, et n’est-il pas venu ici pour les emmener liés devant les principaux sacrificateurs? '
  '22':
  - type: text
    content: Cependant Saul se fortifiait de plus en plus, et il confondait les Juifs qui habitaient Damas, démontrant que Jésus est le Christ.
  - type: heading
    content: 'V. 23-30: cf. 2 Co 11:32-33. (Ga 1:18-24. Ac 22:17-21.)'
  '23':
  - type: text
    content: 'Au bout d’un certain temps, les Juifs se concertèrent pour le tuer, '
  '24':
  - type: text
    content: 'et leur complot parvint à la connaissance de Saul. '
  - type: note
    content: 2 Co 11:32.
  - type: text
    content: 'On gardait les portes jour et nuit, afin de lui ôter la vie. '
  '25':
  - type: text
    content: 'Mais, pendant une nuit, les disciples le prirent, '
  - type: note
    content: Jos 2:15. 1 S 19:12.
  - type: text
    content: 'et le descendirent par la muraille, dans une corbeille. '
  '26':
  - type: note
    content: Ac 22:17.
  - type: text
    content: 'Lorsqu’il se rendit à Jérusalem, Saul tâcha de se joindre à eux; mais tous le craignaient, ne croyant pas qu’il fût un disciple. '
  '27':
  - type: note
    content: Ac 11:25.
  - type: text
    content: 'Alors Barnabas, l’ayant pris avec lui, le conduisit vers les apôtres, et leur raconta comment sur le chemin Saul avait vu le Seigneur, qui lui avait parlé, et comment à Damas il avait prêché franchement au nom de Jésus. '
  '28':
  - type: text
    content: 'Il allait et venait avec eux dans Jérusalem, et s’exprimait en toute assurance au nom du Seigneur. '
  '29':
  - type: text
    content: 'Il parlait aussi et disputait avec les Hellénistes; mais ceux-ci cherchaient à lui ôter la vie. '
  '3':
  - type: note
    content: Ac 22:6.
  - type: text
    content: 'Comme il était en chemin, et qu’il approchait de Damas, '
  - type: note
    content: 1 Co 15:8. 2 Co 12:2.
  - type: text
    content: 'tout à coup '
  - type: note
    content: Ac 26:13.
  - type: text
    content: 'une lumière venant du ciel resplendit autour de lui. '
  '30':
  - type: text
    content: Les frères, l’ayant su, l’emmenèrent à Césarée, et le firent partir pour Tarse.
  - type: heading
    content: Pierre à Lydde et à Joppé. Guérison du paralytique Énée, et résurrection de Tabitha
  - type: heading
    content: 'V. 31-35: cf. Mc 2:3-12. Ac 3:1-16.'
  '31':
  - type: text
    content: 'L’Église était en paix dans toute la Judée, la Galilée et la Samarie, s’édifiant et marchant dans la crainte du Seigneur, et elle s’accroissait par l’assistance du Saint-Esprit. '
  '32':
  - type: text
    content: 'Comme Pierre visitait tous les saints, il descendit aussi vers ceux qui demeuraient à Lydde. '
  '33':
  - type: text
    content: 'Il y trouva un homme nommé Énée, couché sur un lit depuis huit ans, et paralytique. '
  '34':
  - type: text
    content: 'Pierre lui dit: Énée, Jésus-Christ te guérit; lève-toi, et arrange ton lit. Et aussitôt il se leva. '
  '35':
  - type: text
    content: Tous les habitants de Lydde et du Saron le virent, et ils se convertirent au Seigneur.
  - type: heading
    content: 'V. 36-43: cf. Lu 7:11-17. 1 R 17:17-24. 2 R 4:18-37. Ac 20:7-12.'
  '36':
  - type: text
    content: 'Il y avait à Joppé, parmi les disciples, une femme nommée Tabitha, ce qui signifie Dorcas: elle faisait beaucoup de bonnes œuvres et d’aumônes. '
  '37':
  - type: text
    content: 'Elle tomba malade en ce temps-là, et mourut. Après l’avoir lavée, on la déposa dans une chambre haute. '
  '38':
  - type: text
    content: 'Comme Lydde est près de Joppé, les disciples, ayant appris que Pierre s’y trouvait, envoyèrent deux hommes vers lui, pour le prier de venir chez eux sans tarder. '
  '39':
  - type: text
    content: 'Pierre se leva, et partit avec ces hommes. Lorsqu’il fut arrivé, on le conduisit dans la chambre haute. Toutes les veuves l’entourèrent en pleurant, et lui montrèrent les tuniques et les vêtements que faisait Dorcas pendant qu’elle était avec elles. '
  '4':
  - type: text
    content: 'Il tomba par terre, et il entendit une voix qui lui disait: '
  - type: text
    content: Saul, Saul, pourquoi me persécutes-tu?
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Pierre fit sortir tout le monde, se mit à genoux, et pria; puis, se tournant vers le corps, il dit: Tabitha, lève-toi! Elle ouvrit les yeux, et ayant vu Pierre, elle s’assit. '
  '41':
  - type: text
    content: 'Il lui donna la main, et la fit lever. Il appela ensuite les saints et les veuves, et la leur présenta vivante. '
  '42':
  - type: text
    content: 'Cela fut connu de tout Joppé, et beaucoup crurent au Seigneur. '
  '43':
  - type: text
    content: Pierre demeura quelque temps à Joppé, chez un corroyeur nommé Simon.
  '5':
  - type: text
    content: 'Il répondit: Qui es-tu, Seigneur? Et le Seigneur dit: '
  - type: text
    content: Je suis Jésus que tu persécutes.
  - type: text
    content: ' '
  - type: note
    content: Ac 5:39.
  - type: text
    content: Il te serait dur de regimber contre les aiguillons.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Tremblant et saisi d’effroi, il dit: Seigneur, '
  - type: note
    content: Lu 3:10. Ac 2:37; 16:30.
  - type: text
    content: 'que veux-tu que je fasse? Et le Seigneur lui dit: '
  - type: text
    content: Lève-toi, entre dans la ville, et on te dira ce que tu dois faire.
  - type: text
    content: ' '
  '7':
  - type: note
    content: Da 10:7.
  - type: text
    content: 'Les hommes qui l’accompagnaient demeurèrent stupéfaits; ils entendaient bien la voix, mais ils ne voyaient personne. '
  '8':
  - type: text
    content: 'Saul se releva de terre, et, quoique ses yeux fussent ouverts, il ne voyait rien; on le prit par la main, et on le conduisit à Damas. '
  '9':
  - type: text
    content: 'Il resta trois jours sans voir, et il ne mangea ni ne but. '
