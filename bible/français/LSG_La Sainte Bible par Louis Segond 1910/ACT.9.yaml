    marker-yv: yv-n
  - type: text
    text: 'Saul, respirant encore la menace et le meurtre contre les disciples du Seigneur, se rendit chez le souverain sacrificateur, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et lui demanda des lettres pour les synagogues de Damas, afin que, s’il trouvait des partisans de la nouvelle doctrine, hommes ou femmes, il les amenât liés à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 22:6
      metadata:
        usfm: ACT.22.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme il était en chemin, et qu’il approchait de Damas, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:8
      metadata:
        usfm: 1CO.15.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 12:2
      metadata:
        usfm: 2CO.12.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tout à coup '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 26:13
      metadata:
        usfm: ACT.26.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une lumière venant du ciel resplendit autour de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il tomba par terre, et il entendit une voix qui lui disait: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Saul, Saul, pourquoi me persécutes-tu?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il répondit: Qui es-tu, Seigneur? Et le Seigneur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je suis Jésus que tu persécutes.
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 5:39
      metadata:
        usfm: ACT.5.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il te serait dur de regimber contre les aiguillons.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tremblant et saisi d’effroi, il dit: Seigneur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:10
      metadata:
        usfm: LUK.3.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 2:37
      metadata:
        usfm: ACT.2.37
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:30
      metadata:
        usfm: ACT.16.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que veux-tu que je fasse? Et le Seigneur lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Lève-toi, entre dans la ville, et on te dira ce que tu dois faire.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 10:7
      metadata:
        usfm: DAN.10.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les hommes qui l’accompagnaient demeurèrent stupéfaits; ils entendaient bien la voix, mais ils ne voyaient personne. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Saul se releva de terre, et, quoique ses yeux fussent ouverts, il ne voyait rien; on le prit par la main, et on le conduisit à Damas. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il resta trois jours sans voir, et il ne mangea ni ne but. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Or, il y avait à Damas un disciple nommé Ananias. Le Seigneur lui dit dans une vision: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ananias!
  - type: text
    text: ' Il répondit: Me voici, Seigneur! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et le Seigneur lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Lève-toi, va dans la rue qu’on appelle la droite, et cherche, dans la maison de Judas, un nommé Saul
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 21:39
      metadata:
        usfm: ACT.21.39
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:3
      metadata:
        usfm: ACT.22.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: de Tarse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car il prie, et il a vu en vision un homme du nom d’Ananias, qui entrait, et qui lui imposait les mains, afin qu’il recouvrât la vue.
  - type: text
    text: ' Ananias répondit: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Seigneur, j’ai appris de plusieurs personnes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 9:1
      metadata:
        usfm: ACT.9.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:9
      metadata:
        usfm: 1CO.15.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:13
      metadata:
        usfm: GAL.1.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:13
      metadata:
        usfm: 1TI.1.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tout le mal que cet homme a fait à tes saints dans Jérusalem; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et il a ici des pouvoirs, de la part des principaux sacrificateurs, pour lier tous ceux qui invoquent ton nom. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais le Seigneur lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Va,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 13:2
      metadata:
        usfm: ACT.13.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:21
      metadata:
        usfm: ACT.22.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:1
      metadata:
        usfm: ROM.1.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 3:8
      metadata:
        usfm: EPH.3.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:15
      metadata:
        usfm: GAL.1.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:8
      metadata:
        usfm: GAL.2.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 2:7
      metadata:
        usfm: 1TI.2.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 1:11
      metadata:
        usfm: 2TI.1.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car cet homme est un instrument que j’ai choisi, pour porter mon nom devant les nations, devant les rois, et devant les fils d’Israël;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 21:11
      metadata:
        usfm: ACT.21.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:23
      metadata:
        usfm: 2CO.11.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et je lui montrerai tout ce qu’il doit souffrir pour mon nom.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 22:12
      metadata:
        usfm: ACT.22.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ananias sortit; et, lorsqu’il fut arrivé dans la maison, il imposa les mains à Saul, en disant: Saul, mon frère, le Seigneur Jésus, qui t’est apparu sur le chemin par lequel tu venais, m’a envoyé pour que tu recouvres la vue et que tu sois rempli du Saint-Esprit. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Au même instant, il tomba de ses yeux comme des écailles, et il recouvra la vue. Il se leva, et fut baptisé; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et, après qu’il eut pris de la nourriture, les forces lui revinrent. Saul resta quelques jours avec les disciples qui étaient à Damas. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Et aussitôt il prêcha dans les synagogues que Jésus est le Fils de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tous ceux qui l’entendaient étaient dans l’étonnement, et disaient: N’est-ce pas celui qui persécutait à Jérusalem ceux qui invoquent ce nom, et n’est-il pas venu ici pour les emmener liés devant les principaux sacrificateurs? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Cependant Saul se fortifiait de plus en plus, et il confondait les Juifs qui habitaient Damas, démontrant que Jésus est le Christ.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 23-30: cf. 2 Co 11:32-33. (Ga 1:18-24. Ac 22:17-21.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Au bout d’un certain temps, les Juifs se concertèrent pour le tuer, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'et leur complot parvint à la connaissance de Saul. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:32
      metadata:
        usfm: 2CO.11.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'On gardait les portes jour et nuit, afin de lui ôter la vie. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mais, pendant une nuit, les disciples le prirent, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 2:15
      metadata:
        usfm: JOS.2.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 19:12
      metadata:
        usfm: 1SA.19.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et le descendirent par la muraille, dans une corbeille. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 22:17
      metadata:
        usfm: ACT.22.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu’il se rendit à Jérusalem, Saul tâcha de se joindre à eux; mais tous le craignaient, ne croyant pas qu’il fût un disciple. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 11:25
      metadata:
        usfm: ACT.11.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors Barnabas, l’ayant pris avec lui, le conduisit vers les apôtres, et leur raconta comment sur le chemin Saul avait vu le Seigneur, qui lui avait parlé, et comment à Damas il avait prêché franchement au nom de Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il allait et venait avec eux dans Jérusalem, et s’exprimait en toute assurance au nom du Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Il parlait aussi et disputait avec les Hellénistes; mais ceux-ci cherchaient à lui ôter la vie. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Les frères, l’ayant su, l’emmenèrent à Césarée, et le firent partir pour Tarse.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pierre à Lydde et à Joppé. Guérison du paralytique Énée, et résurrection de Tabitha
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 31-35: cf. Mc 2:3-12. Ac 3:1-16.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'L’Église était en paix dans toute la Judée, la Galilée et la Samarie, s’édifiant et marchant dans la crainte du Seigneur, et elle s’accroissait par l’assistance du Saint-Esprit. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Comme Pierre visitait tous les saints, il descendit aussi vers ceux qui demeuraient à Lydde. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il y trouva un homme nommé Énée, couché sur un lit depuis huit ans, et paralytique. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Pierre lui dit: Énée, Jésus-Christ te guérit; lève-toi, et arrange ton lit. Et aussitôt il se leva. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Tous les habitants de Lydde et du Saron le virent, et ils se convertirent au Seigneur.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 36-43: cf. Lu 7:11-17. 1 R 17:17-24. 2 R 4:18-37. Ac 20:7-12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il y avait à Joppé, parmi les disciples, une femme nommée Tabitha, ce qui signifie Dorcas: elle faisait beaucoup de bonnes œuvres et d’aumônes. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Elle tomba malade en ce temps-là, et mourut. Après l’avoir lavée, on la déposa dans une chambre haute. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Comme Lydde est près de Joppé, les disciples, ayant appris que Pierre s’y trouvait, envoyèrent deux hommes vers lui, pour le prier de venir chez eux sans tarder. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Pierre se leva, et partit avec ces hommes. Lorsqu’il fut arrivé, on le conduisit dans la chambre haute. Toutes les veuves l’entourèrent en pleurant, et lui montrèrent les tuniques et les vêtements que faisait Dorcas pendant qu’elle était avec elles. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Pierre fit sortir tout le monde, se mit à genoux, et pria; puis, se tournant vers le corps, il dit: Tabitha, lève-toi! Elle ouvrit les yeux, et ayant vu Pierre, elle s’assit. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Il lui donna la main, et la fit lever. Il appela ensuite les saints et les veuves, et la leur présenta vivante. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Cela fut connu de tout Joppé, et beaucoup crurent au Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Pierre demeura quelque temps à Joppé, chez un corroyeur nommé Simon.
