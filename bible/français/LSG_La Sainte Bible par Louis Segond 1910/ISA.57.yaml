document_id: ISA.57,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le juste périt, et nul n’y prend garde;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 12:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 7:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les gens de bien sont enlevés, et nul ne fait attention
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que c’est par suite de la malice que le juste est enlevé.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A force de marcher tu te fatigues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et tu ne dis pas: J’y renonce!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu trouves encore de la vigueur dans ta main:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi n’es-tu pas dans l’abattement.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui redoutais-tu, qui craignais-tu, pour être infidèle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour ne pas te souvenir, te soucier de moi?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce que je ne garde pas le silence, et depuis longtemps?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi tu ne me crains pas.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais publier ta droiture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tes œuvres ne te profiteront pas.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand tu crieras, la foule de tes idoles te délivrera-t-elle?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le vent les emportera toutes, un souffle les enlèvera.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Promesse de consolation aux fidèles
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-21: cf. (És 66:1, 2; 65:8-12.) (Os 14:1-4. Ac 10:36.)'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 34:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais celui qui se confie en moi héritera le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et possédera ma montagne sainte.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On dira: Frayez, frayez, préparez le chemin,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enlevez tout obstacle du chemin de mon peuple!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ainsi parle le Très-Haut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dont la demeure est éternelle et dont le nom est saint:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’habite dans les lieux élevés et dans la sainteté;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais je suis avec l’homme contrit et humilié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin de ranimer les esprits humiliés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin de ranimer les cœurs contrits.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 103:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je ne veux pas contester à toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni garder une éternelle colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand devant moi tombent en défaillance les esprits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les âmes '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: que j’ai faites.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de son avidité coupable, je me suis irrité et je l’ai frappé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me suis caché dans mon indignation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le rebelle a suivi le chemin de son cœur.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai vu ses voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je le guérirai;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je lui servirai de guide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je le consolerai, lui et ceux qui pleurent avec lui.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je mettrai la louange sur les lèvres.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Paix, paix à celui qui est loin et à celui qui est près! Dit l’Éternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les guérirai.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il entrera dans la paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il reposera sur sa couche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui aura suivi le droit chemin.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 3-13: cf. Jé 3:6-10. (És 30:1-7. Jé 2:36, 37.)'
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les méchants sont comme la mer agitée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui ne peut se calmer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dont les eaux soulèvent la vase et le limon.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 48:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il n’y a point de paix pour les méchants, dit mon Dieu.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais vous, approchez ici, fils de l’enchanteresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Race de l’adultère et de la prostituée!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De qui vous moquez-vous?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre qui ouvrez-vous une large bouche
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tirez-vous la langue?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’êtes-vous pas des enfants de péché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une race de mensonge,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’échauffant près des térébinthes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sous tout arbre vert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Égorgeant les enfants dans les vallées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sous des fentes de rochers?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est dans les pierres polies des torrents qu’est ton partage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà, voilà ton lot;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est à elles que tu verses des libations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que tu fais des offrandes:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis-je être insensible à cela?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est sur une montagne haute et élevée que tu dresses ta couche;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est aussi là que tu montes pour offrir des sacrifices.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu mets ton souvenir derrière la porte et les poteaux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car, loin de moi, tu lèves la couverture et tu montes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu élargis ta couche, et tu traites alliance avec eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu aimes leur commerce, tu choisis une place.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu vas auprès du roi avec de l’huile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu multiplies tes aromates,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu envoies au loin tes messagers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu t’abaisses jusqu’au séjour des morts.
