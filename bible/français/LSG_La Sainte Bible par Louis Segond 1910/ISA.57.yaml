document_id: ISA.57,93
type_code: fra
verses:
  '1':
  - type: text
    content: Le juste périt, et nul n’y prend garde;
  - type: note
    content: Ps 12:2. Mi 7:2.
  - type: text
    content: Les gens de bien sont enlevés, et nul ne fait attention
  - type: text
    content: Que c’est par suite de la malice que le juste est enlevé.
  '10':
  - type: text
    content: A force de marcher tu te fatigues,
  - type: text
    content: 'Et tu ne dis pas: J’y renonce!'
  - type: text
    content: 'Tu trouves encore de la vigueur dans ta main:'
  - type: text
    content: Aussi n’es-tu pas dans l’abattement.
  '11':
  - type: text
    content: Et qui redoutais-tu, qui craignais-tu, pour être infidèle,
  - type: text
    content: Pour ne pas te souvenir, te soucier de moi?
  - type: text
    content: Est-ce que je ne garde pas le silence, et depuis longtemps?
  - type: text
    content: C’est pourquoi tu ne me crains pas.
  '12':
  - type: text
    content: Je vais publier ta droiture,
  - type: text
    content: Et tes œuvres ne te profiteront pas.
  '13':
  - type: text
    content: Quand tu crieras, la foule de tes idoles te délivrera-t-elle?
  - type: text
    content: Le vent les emportera toutes, un souffle les enlèvera.
  - type: heading
    content: Promesse de consolation aux fidèles
  - type: heading
    content: 'V. 14-21: cf. (És 66:1, 2; 65:8-12.) (Os 14:1-4. Ac 10:36.)'
  - type: note
    content: Ps 34:9.
  - type: text
    content: Mais celui qui se confie en moi héritera le pays,
  - type: text
    content: Et possédera ma montagne sainte.
  '14':
  - type: text
    content: 'On dira: Frayez, frayez, préparez le chemin,'
  - type: text
    content: Enlevez tout obstacle du chemin de mon peuple!
  '15':
  - type: text
    content: Car ainsi parle le Très-Haut,
  - type: text
    content: 'Dont la demeure est éternelle et dont le nom est saint:'
  - type: text
    content: J’habite dans les lieux élevés et dans la sainteté;
  - type: text
    content: Mais je suis avec l’homme contrit et humilié,
  - type: text
    content: Afin de ranimer les esprits humiliés,
  - type: text
    content: Afin de ranimer les cœurs contrits.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ps 103:9.
  - type: text
    content: Je ne veux pas contester à toujours,
  - type: text
    content: Ni garder une éternelle colère,
  - type: text
    content: Quand devant moi tombent en défaillance les esprits,
  - type: text
    content: 'Les âmes '
  - type: note
    content: Hé 12:9.
  - type: text
    content: que j’ai faites.
  '17':
  - type: text
    content: A cause de son avidité coupable, je me suis irrité et je l’ai frappé,
  - type: text
    content: Je me suis caché dans mon indignation;
  - type: text
    content: Et le rebelle a suivi le chemin de son cœur.
  '18':
  - type: text
    content: J’ai vu ses voies,
  - type: text
    content: Et je le guérirai;
  - type: text
    content: Je lui servirai de guide,
  - type: text
    content: Et je le consolerai, lui et ceux qui pleurent avec lui.
  '19':
  - type: text
    content: Je mettrai la louange sur les lèvres.
  - type: text
    content: Paix, paix à celui qui est loin et à celui qui est près! Dit l’Éternel.
  - type: text
    content: Je les guérirai.
  '2':
  - type: text
    content: Il entrera dans la paix,
  - type: text
    content: Il reposera sur sa couche,
  - type: text
    content: Celui qui aura suivi le droit chemin.
  - type: heading
    content: 'V. 3-13: cf. Jé 3:6-10. (És 30:1-7. Jé 2:36, 37.)'
  '20':
  - type: text
    content: Mais les méchants sont comme la mer agitée,
  - type: text
    content: Qui ne peut se calmer,
  - type: text
    content: Et dont les eaux soulèvent la vase et le limon.
  '21':
  - type: text
    content: ' '
  - type: note
    content: És 48:22.
  - type: text
    content: Il n’y a point de paix pour les méchants, dit mon Dieu.
  '3':
  - type: text
    content: Mais vous, approchez ici, fils de l’enchanteresse,
  - type: text
    content: Race de l’adultère et de la prostituée!
  '4':
  - type: text
    content: De qui vous moquez-vous?
  - type: text
    content: Contre qui ouvrez-vous une large bouche
  - type: text
    content: Et tirez-vous la langue?
  - type: text
    content: N’êtes-vous pas des enfants de péché,
  - type: text
    content: Une race de mensonge,
  '5':
  - type: text
    content: S’échauffant près des térébinthes,
  - type: text
    content: Sous tout arbre vert,
  - type: text
    content: Égorgeant les enfants dans les vallées,
  - type: text
    content: Sous des fentes de rochers?
  '6':
  - type: text
    content: C’est dans les pierres polies des torrents qu’est ton partage,
  - type: text
    content: Voilà, voilà ton lot;
  - type: text
    content: C’est à elles que tu verses des libations,
  - type: text
    content: 'Que tu fais des offrandes:'
  - type: text
    content: Puis-je être insensible à cela?
  '7':
  - type: text
    content: C’est sur une montagne haute et élevée que tu dresses ta couche;
  - type: text
    content: C’est aussi là que tu montes pour offrir des sacrifices.
  '8':
  - type: text
    content: Tu mets ton souvenir derrière la porte et les poteaux;
  - type: text
    content: Car, loin de moi, tu lèves la couverture et tu montes,
  - type: text
    content: Tu élargis ta couche, et tu traites alliance avec eux,
  - type: text
    content: Tu aimes leur commerce, tu choisis une place.
  '9':
  - type: text
    content: Tu vas auprès du roi avec de l’huile,
  - type: text
    content: Tu multiplies tes aromates,
  - type: text
    content: Tu envoies au loin tes messagers,
  - type: text
    content: Tu t’abaisses jusqu’au séjour des morts.
