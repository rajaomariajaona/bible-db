document_id: NUM.16,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Révolte de Koré, Dathan et Abiram
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-40: cf. (No 26:8-11. Ps 106:16-18.) Pr 14:30. Hé 10:31.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 26:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:3
      - type: text
        text: . Jud v. 11.
      marker-yv: yv-n
    - type: text
      text: 'Koré, fils de Jitsehar, fils de Kehath, fils de Lévi, se révolta avec Dathan et Abiram, fils d’Éliab, et On, fils de Péleth, tous trois fils de Ruben. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Il vous a fait approcher de lui, toi, et tous tes frères, les enfants de Lévi, et vous voulez encore le sacerdoce! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'C’est à cause de cela que toi et toute ta troupe, vous vous assemblez contre l’Éternel! Car qui est Aaron, pour que vous murmuriez contre lui? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Moïse envoya appeler Dathan et Abiram, fils d’Éliab. Mais ils dirent: Nous ne monterons pas. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'N’est-ce pas assez que tu nous aies fait sortir d’un pays où coulent le lait et le miel pour nous faire mourir au désert, sans que tu continues à dominer sur nous? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et ce n’est pas dans un pays où coulent le lait et le miel que tu nous as menés, ce ne sont pas des champs et des vignes que tu nous as donnés en possession. Penses-tu crever les yeux de ces gens? Nous ne monterons pas. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Moïse fut très irrité, et il dit à l’Éternel: N’aie point égard à leur offrande. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 12:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je ne leur ai pas même pris un âne, et je n’ai fait de mal à aucun d’eux. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Moïse dit à Koré: Toi et toute ta troupe, trouvez-vous demain devant l’Éternel, toi et eux, avec Aaron. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Prenez chacun votre brasier, mettez-y du parfum, et présentez devant l’Éternel chacun votre brasier: il y aura deux cent cinquante brasiers; toi et Aaron, vous prendrez aussi chacun votre brasier. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ils prirent chacun leur brasier, y mirent du feu et y posèrent du parfum, et ils se tinrent à l’entrée de la tente d’assignation, avec Moïse et Aaron. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Et Koré convoqua toute l’assemblée contre Moïse et Aaron, à l’entrée de la tente d’assignation. Alors la gloire de l’Éternel apparut à toute l’assemblée. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ils se soulevèrent contre Moïse, avec deux cent cinquante hommes des enfants d’Israël, des principaux de l’assemblée, de ceux que l’on convoquait à l’assemblée, et qui étaient des gens de renom. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Et l’Éternel parla à Moïse et à Aaron, et dit: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Séparez-vous du milieu de cette assemblée, et je les consumerai en un seul instant. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ils tombèrent sur leur visage, et dirent: O Dieu, Dieu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 27:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'des esprits de toute chair! Un seul homme a péché, et tu t’irriterais contre toute l’assemblée? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Parle à l’assemblée, et dis: Retirez-vous de toutes parts loin de la demeure de Koré, de Dathan et d’Abiram. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Moïse se leva, et alla vers Dathan et Abiram; et les anciens d’Israël le suivirent. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Il parla à l’assemblée, et dit: Éloignez-vous des tentes de ces méchants hommes, et ne touchez à rien de ce qui leur appartient, de peur que vous ne périssiez en même temps qu’ils seront punis pour tous leurs péchés. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ils se retirèrent de toutes parts loin de la demeure de Koré, de Dathan et d’Abiram. Dathan et Abiram sortirent, et se tinrent à l’entrée de leurs tentes, avec leurs femmes, leurs fils et leurs petits-enfants. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Moïse dit: A ceci vous connaîtrez que l’Éternel m’a envoyé pour faire toutes ces choses, et que je n’agis pas de moi-même. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Si ces gens meurent comme tous les hommes meurent, s’ils subissent le sort commun à tous les hommes, ce n’est pas l’Éternel qui m’a envoyé; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ils s’assemblèrent contre Moïse et Aaron, et leur dirent: C’en est assez! Car toute l’assemblée, tous sont saints, et l’Éternel est au milieu d’eux. Pourquoi vous élevez-vous au-dessus de l’assemblée de l’Éternel? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'mais si l’Éternel fait une chose inouïe, si la terre ouvre sa bouche pour les engloutir avec tout ce qui leur appartient, et qu’ils descendent vivants dans le séjour des morts, vous saurez alors que ces gens ont méprisé l’Éternel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Comme il achevait de prononcer toutes ces paroles, la terre qui était sous eux se fendit. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'La terre ouvrit sa bouche, et les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 26:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 11:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 106:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'engloutit, eux et leurs maisons, avec tous les gens de Koré et tous leurs biens. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ils descendirent vivants dans le séjour des morts, eux et tout ce qui leur appartenait; la terre les recouvrit, et ils disparurent au milieu de l’assemblée. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Tout Israël, qui était autour d’eux, s’enfuit à leur cri; car ils disaient: Fuyons, de peur que la terre ne nous engloutisse! '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Un feu sortit d’auprès de l’Éternel, et consuma les deux cent cinquante hommes qui offraient le parfum. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Dis à Éléazar, fils du sacrificateur Aaron, de retirer de l’incendie les brasiers et d’en répandre au loin le feu, car ils sont sanctifiés. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Avec les brasiers de ces gens qui ont péché au péril de leur vie, que l’on fasse des lames étendues dont on couvrira l’autel. Puisqu’ils ont été présentés devant l’Éternel et qu’ils sont sanctifiés, ils serviront de souvenir aux enfants d’Israël. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Le sacrificateur Éléazar prit les brasiers d’airain qu’avaient présentés les victimes de l’incendie, et il en fit des lames pour couvrir l’autel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Quand Moïse eut entendu cela, il tomba sur son visage. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: C’est un souvenir pour les enfants d’Israël, afin qu’aucun étranger à la race d’Aaron ne s’approche pour offrir du parfum devant l’Éternel et ne soit comme Koré et comme sa troupe, selon ce que l’Éternel avait déclaré par Moïse.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 41-50: cf. 1 Co 10:10-12.'
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Dès le lendemain, toute l’assemblée des enfants d’Israël murmura contre Moïse et Aaron, en disant: Vous avez fait mourir le peuple de l’Éternel. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Comme l’assemblée se formait contre Moïse et Aaron, et comme ils tournaient les regards vers la tente d’assignation, voici, la nuée la couvrit, et la gloire de l’Éternel apparut. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Moïse et Aaron arrivèrent devant la tente d’assignation. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Et l’Éternel parla à Moïse, et dit: '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Retirez-vous du milieu de cette assemblée, et je les consumerai en un instant. Ils tombèrent sur leur visage; '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'et Moïse dit à Aaron: Prends le brasier, mets-y du feu de dessus l’autel, poses-y du parfum, va promptement vers l’assemblée, et fais pour eux l’expiation; car la colère de l’Éternel a éclaté, la plaie a commencé. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Aaron prit le brasier, comme Moïse avait dit, et courut au milieu de l’assemblée; et voici, la plaie avait commencé parmi le peuple. Il offrit le parfum, et il fit l’expiation pour le peuple. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Il se plaça entre les morts et les vivants, et la plaie fut arrêtée. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Il y eut quatorze mille sept cents personnes qui moururent de cette plaie, outre ceux qui étaient morts à cause de Koré. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il parla à Koré et à toute sa troupe, en disant: Demain, l’Éternel fera connaître qui est à lui et qui est saint, et il le fera approcher de lui; il fera approcher de lui celui qu’il choisira. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Aaron retourna auprès de Moïse, à l’entrée de la tente d’assignation. La plaie était arrêtée.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Faites ceci. Prenez des brasiers, Koré et toute sa troupe. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Demain, mettez-y du feu, et posez-y du parfum devant l’Éternel; celui que l’Éternel choisira, c’est celui-là qui sera saint. C’en est assez, enfants de Lévi! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Moïse dit à Koré: Écoutez donc, enfants de Lévi: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Est-ce trop peu pour vous que le Dieu d’Israël vous ait choisis dans l’assemblée d’Israël, en vous faisant approcher de lui, afin que vous soyez employés au service du tabernacle de l’Éternel, et que vous vous présentiez devant l’assemblée pour la servir? '
