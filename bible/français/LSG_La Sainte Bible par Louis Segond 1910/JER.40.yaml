document_id: JER.40,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jérémie en liberté
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. Jé 39:11-14. (Pr 27:8. Ps 137:5, 6.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La parole qui fut adressée à Jérémie de la part de l’Éternel, après que Nebuzaradan, chef des gardes, l’eut renvoyé de Rama. Quand il le fit chercher, Jérémie était lié de chaînes parmi tous les captifs de Jérusalem et de Juda qu’on emmenait à Babylone. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Voici, je reste à Mitspa, pour être présent devant les Chaldéens qui viendront vers nous; et vous, faites la récolte du vin, des fruits d’été et de l’huile, mettez-les dans vos vases, et demeurez dans vos villes que vous occupez. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tous les Juifs qui étaient au pays de Moab, chez les Ammonites, au pays d’Édom, et dans tous les pays, apprirent que le roi de Babylone avait laissé un reste dans Juda, et qu’il leur avait donné pour gouverneur Guedalia, fils d’Achikam, fils de Schaphan. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Et tous les Juifs revinrent de tous les lieux où ils étaient dispersés, ils se rendirent dans le pays de Juda vers Guedalia à Mitspa, et ils firent une abondante récolte de vin et de fruits d’été. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Jochanan, fils de Karéach, et tous les chefs des troupes qui étaient dans les campagnes, vinrent auprès de Guedalia à Mitspa, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'et lui dirent: Sais-tu que Baalis, roi des Ammonites, a chargé Ismaël, fils de Nethania, de t’ôter la vie? Mais Guedalia, fils d’Achikam, ne les crut point. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Et Jochanan, fils de Karéach, dit secrètement à Guedalia à Mitspa: Permets que j’aille tuer Ismaël, fils de Nethania. Personne ne le saura. Pourquoi t’ôterait-il la vie? Pourquoi tous ceux de Juda rassemblés auprès de toi se disperseraient-ils, et le reste de Juda périrait-il? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Guedalia, fils d’Achikam, répondit à Jochanan, fils de Karéach: Ne fais pas cela; car ce que tu dis sur Ismaël est faux.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Le chef des gardes envoya chercher Jérémie, et lui dit: L’Éternel, ton Dieu, a annoncé ces malheurs contre ce lieu; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'l’Éternel a fait venir et a exécuté ce qu’il avait dit, et ces choses vous sont arrivées parce que vous avez péché contre l’Éternel et que vous n’avez pas écouté sa voix. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Maintenant voici, je te délivre aujourd’hui des chaînes que tu as aux mains; si tu veux venir avec moi à Babylone, viens, j’aurai soin de toi; si cela te déplaît de venir avec moi à Babylone, ne viens pas; regarde, tout le pays est devant toi, va où il te semblera bon et convenable d’aller. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Et comme il tardait à répondre: Retourne, ajouta-t-il, vers Guedalia, fils d’Achikam, fils de Schaphan, que le roi de Babylone a établi sur les villes de Juda, et reste avec lui parmi le peuple; ou bien, va partout où il te conviendra d’aller. Le chef des gardes lui donna des vivres et des présents, et le congédia. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Jérémie alla vers Guedalia, fils d’Achikam, à Mitspa, et il resta avec lui parmi le peuple qui était demeuré dans le pays.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guedalia gouverneur du pays de Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-16: cf. Jé 41:1-15. Pr 28:12; 29:10.'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Lorsque tous les chefs des troupes qui étaient dans les campagnes eurent appris, eux et leurs hommes, que le roi de Babylone avait établi gouverneur du pays Guedalia, fils d’Achikam, et qu’il lui avait confié les hommes, les femmes, les enfants, et ceux des pauvres du pays qu’on n’avait pas emmenés captifs à Babylone, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'ils se rendirent auprès de Guedalia à Mitspa, savoir Ismaël, fils de Nethania, Jochanan et Jonathan, fils de Karéach, Seraja, fils de Thanhumeth, les fils d’Éphaï de Nethopha, et Jezania, fils du Maacatite, eux et leurs hommes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Guedalia, fils d’Achikam, fils de Schaphan, leur jura, à eux et à leurs hommes, en disant: Ne craignez pas de servir les Chaldéens; demeurez dans le pays, servez le roi de Babylone, et vous vous en trouverez bien. '
