document_id: PSA.51,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 2 S 12:1-14. (Ps 6; 32; 38.)
  - type: text
    content: Au chef des chantres. Psaume de David.
  '10':
  - type: text
    content: Annonce-moi l’allégresse et la joie,
  - type: text
    content: Et les os que tu as brisés se réjouiront.
  '11':
  - type: text
    content: Détourne ton regard de mes péchés,
  - type: text
    content: Efface toutes mes iniquités.
  '12':
  - type: text
    content: O Dieu! Crée en moi un cœur pur,
  - type: text
    content: Renouvelle en moi un esprit bien disposé.
  '13':
  - type: text
    content: Ne me rejette pas loin de ta face,
  - type: text
    content: Ne me retire pas ton esprit saint.
  '14':
  - type: text
    content: Rends-moi la joie de ton salut,
  - type: text
    content: Et qu’un esprit de bonne volonté me soutienne!
  '15':
  - type: text
    content: J’enseignerai tes voies à ceux qui les transgressent,
  - type: text
    content: Et les pécheurs reviendront à toi.
  '16':
  - type: text
    content: O Dieu, Dieu de mon salut! Délivre-moi du sang versé,
  - type: text
    content: Et ma langue célébrera ta miséricorde.
  '17':
  - type: text
    content: Seigneur! Ouvre mes lèvres,
  - type: text
    content: Et ma bouche publiera ta louange.
  '18':
  - type: text
    content: Si tu eusses voulu des sacrifices, je t’en aurais offert;
  - type: text
    content: Mais tu ne prends point plaisir aux holocaustes.
  '19':
  - type: text
    content: 'Les sacrifices qui sont agréables à Dieu, c’est un esprit brisé:'
  - type: text
    content: O Dieu! Tu ne dédaignes pas un cœur brisé et contrit.
  '2':
  - type: text
    content: 'Lorsque '
  - type: note
    content: 2 S 12:1, etc.
  - type: text
    content: 'Nathan, le prophète, vint à lui, après que David fut allé vers '
  - type: note
    content: 2 S 11:4.
  - type: text
    content: Bath-Schéba.
  '20':
  - type: text
    content: Répands par ta grâce tes bienfaits sur Sion,
  - type: text
    content: Bâtis les murs de Jérusalem!
  '21':
  - type: text
    content: Alors tu agréeras des sacrifices de justice,
  - type: text
    content: Des holocaustes et des victimes tout entières;
  - type: text
    content: Alors on offrira des taureaux sur ton autel.
  '3':
  - type: text
    content: O Dieu! Aie pitié de moi dans ta bonté;
  - type: text
    content: Selon ta grande miséricorde, efface mes transgressions;
  '4':
  - type: text
    content: Lave-moi complètement de mon iniquité,
  - type: text
    content: Et purifie-moi de mon péché.
  '5':
  - type: text
    content: Car je reconnais mes transgressions,
  - type: text
    content: Et mon péché est constamment devant moi.
  '6':
  - type: text
    content: J’ai péché contre toi seul,
  - type: text
    content: Et j’ai fait ce qui est mal à tes yeux,
  - type: note
    content: Ro 3:4.
  - type: text
    content: En sorte que tu seras juste dans ta sentence,
  - type: text
    content: Sans reproche dans ton jugement.
  '7':
  - type: text
    content: Voici, je suis né dans l’iniquité,
  - type: text
    content: Et ma mère m’a conçu dans le péché.
  '8':
  - type: text
    content: 'Mais tu veux que la vérité soit au fond du cœur:'
  - type: text
    content: Fais donc pénétrer la sagesse au-dedans de moi!
  '9':
  - type: text
    content: 'Purifie-moi avec '
  - type: note
    content: Lé 14:4, 6. No 19:6, 18.
  - type: text
    content: l’hysope, et je serai pur;
  - type: text
    content: Lave-moi, et je serai plus blanc que la neige.
