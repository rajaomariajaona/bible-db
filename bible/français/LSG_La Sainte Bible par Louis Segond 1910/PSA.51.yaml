document_id: PSA.51,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2 S 12:1-14. (Ps 6; 32; 38.)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au chef des chantres. Psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Annonce-moi l’allégresse et la joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les os que tu as brisés se réjouiront.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Détourne ton regard de mes péchés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efface toutes mes iniquités.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu! Crée en moi un cœur pur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Renouvelle en moi un esprit bien disposé.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne me rejette pas loin de ta face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne me retire pas ton esprit saint.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rends-moi la joie de ton salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’un esprit de bonne volonté me soutienne!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’enseignerai tes voies à ceux qui les transgressent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les pécheurs reviendront à toi.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, Dieu de mon salut! Délivre-moi du sang versé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ma langue célébrera ta miséricorde.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur! Ouvre mes lèvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ma bouche publiera ta louange.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu eusses voulu des sacrifices, je t’en aurais offert;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais tu ne prends point plaisir aux holocaustes.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les sacrifices qui sont agréables à Dieu, c’est un esprit brisé:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu! Tu ne dédaignes pas un cœur brisé et contrit.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lorsque '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 S 12:1, etc.
      marker-yv: yv-n
    - type: text
      text: 'Nathan, le prophète, vint à lui, après que David fut allé vers '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 11:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Bath-Schéba.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Répands par ta grâce tes bienfaits sur Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bâtis les murs de Jérusalem!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors tu agréeras des sacrifices de justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des holocaustes et des victimes tout entières;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors on offrira des taureaux sur ton autel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu! Aie pitié de moi dans ta bonté;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Selon ta grande miséricorde, efface mes transgressions;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lave-moi complètement de mon iniquité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et purifie-moi de mon péché.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je reconnais mes transgressions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon péché est constamment devant moi.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai péché contre toi seul,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’ai fait ce qui est mal à tes yeux,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: En sorte que tu seras juste dans ta sentence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans reproche dans ton jugement.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je suis né dans l’iniquité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ma mère m’a conçu dans le péché.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais tu veux que la vérité soit au fond du cœur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais donc pénétrer la sagesse au-dedans de moi!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Purifie-moi avec '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 14:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 19:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: l’hysope, et je serai pur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lave-moi, et je serai plus blanc que la neige.
