document_id: JOB.30,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-15: cf. Job 19:13-19; 29.'
  - type: text
    content: Et maintenant!… je suis la risée de plus jeunes que moi,
  - type: text
    content: De ceux dont je dédaignais de mettre les pères
  - type: text
    content: Parmi les chiens de mon troupeau.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Job 19:19.
  - type: text
    content: Ils ont horreur de moi, ils se détournent,
  - type: text
    content: Ils me crachent au visage.
  '11':
  - type: text
    content: Ils n’ont plus de retenue et ils m’humilient,
  - type: text
    content: Ils rejettent tout frein devant moi.
  '12':
  - type: text
    content: Ces misérables se lèvent à ma droite et me poussent les pieds,
  - type: text
    content: Ils se fraient contre moi des sentiers pour ma ruine;
  '13':
  - type: text
    content: Ils détruisent mon propre sentier et travaillent à ma perte,
  - type: text
    content: Eux à qui personne ne viendrait en aide;
  '14':
  - type: text
    content: Ils arrivent comme par une large brèche,
  - type: text
    content: Ils se précipitent sous les craquements.
  '15':
  - type: text
    content: Les terreurs m’assiègent;
  - type: text
    content: Ma gloire est emportée comme par le vent,
  - type: text
    content: Mon bonheur a passé comme un nuage.
  - type: heading
    content: 'V. 16-31: cf. (Job 23:1-12; 29:11-17; 42:1-7.) (Ps 7:4-6; 17:1-5.) (Ps 88; 102:4-12.)'
  '16':
  - type: text
    content: Et maintenant, mon âme s’épanche en mon sein,
  - type: text
    content: Les jours de la souffrance m’ont saisi.
  '17':
  - type: text
    content: La nuit me perce et m’arrache les os,
  - type: text
    content: La douleur qui me ronge ne se donne aucun repos,
  '18':
  - type: text
    content: Par la violence du mal mon vêtement perd sa forme,
  - type: text
    content: Il se colle à mon corps comme ma tunique.
  '19':
  - type: text
    content: Dieu m’a jeté dans la boue,
  - type: text
    content: Et je ressemble à la poussière et à la cendre.
  '2':
  - type: text
    content: Mais à quoi me servirait la force de leurs mains?
  - type: text
    content: Ils sont incapables d’atteindre la vieillesse.
  '20':
  - type: text
    content: Je crie vers toi, et tu ne me réponds pas;
  - type: text
    content: Je me tiens debout, et tu me lances ton regard.
  '21':
  - type: text
    content: Tu deviens cruel contre moi,
  - type: text
    content: Tu me combats avec la force de ta main.
  '22':
  - type: text
    content: Tu me soulèves, tu me fais voler au-dessus du vent,
  - type: text
    content: Et tu m’anéantis au bruit de la tempête.
  '23':
  - type: text
    content: 'Car, je le sais, '
  - type: note
    content: Hé 9:27.
  - type: text
    content: tu me mènes à la mort,
  - type: text
    content: Au rendez-vous de tous les vivants.
  '24':
  - type: text
    content: Mais celui qui va périr n’étend-il pas les mains?
  - type: text
    content: Celui qui est dans le malheur n’implore-t-il pas du secours?
  '25':
  - type: text
    content: ' '
  - type: note
    content: Ps 35:13, 14. Ro 12:15.
  - type: text
    content: N’avais-je pas des larmes pour l’infortuné?
  - type: text
    content: Mon cœur n’avait-il pas pitié de l’indigent?
  '26':
  - type: text
    content: J’attendais le bonheur, et le malheur est arrivé;
  - type: text
    content: J’espérais la lumière, et les ténèbres sont venues.
  '27':
  - type: text
    content: Mes entrailles bouillonnent sans relâche,
  - type: text
    content: Les jours de la calamité m’ont surpris.
  '28':
  - type: text
    content: Je marche noirci, mais non par le soleil;
  - type: text
    content: Je me lève en pleine assemblée, et je crie.
  '29':
  - type: text
    content: ' '
  - type: note
    content: Ps 102:7.
  - type: text
    content: Je suis devenu le frère des chacals,
  - type: text
    content: Le compagnon des autruches.
  '3':
  - type: text
    content: Desséchés par la misère et la faim,
  - type: text
    content: Ils fuient dans les lieux arides,
  - type: text
    content: Depuis longtemps abandonnés et déserts;
  '30':
  - type: text
    content: ' '
  - type: note
    content: Ps 119:83. La 4:8; 5:10.
  - type: text
    content: Ma peau noircit et tombe,
  - type: text
    content: Mes os brûlent et se dessèchent.
  '31':
  - type: text
    content: Ma harpe n’est plus qu’un instrument de deuil,
  - type: text
    content: Et mon chalumeau ne peut rendre que des sons plaintifs.
  '4':
  - type: text
    content: Ils arrachent près des arbrisseaux les herbes sauvages,
  - type: text
    content: Et ils n’ont pour pain que la racine des genêts.
  '5':
  - type: text
    content: On les chasse du milieu des hommes,
  - type: text
    content: On crie après eux comme après des voleurs.
  '6':
  - type: text
    content: Ils habitent dans d’affreuses vallées,
  - type: text
    content: Dans les cavernes de la terre et dans les rochers;
  '7':
  - type: text
    content: Ils hurlent parmi les buissons,
  - type: text
    content: Ils se rassemblent sous les ronces.
  '8':
  - type: text
    content: Êtres vils et méprisés,
  - type: text
    content: On les repousse du pays.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Job 17:6. Ps 69:13. La 3:14, 63.
  - type: text
    content: Et maintenant, je suis l’objet de leurs chansons,
  - type: text
    content: Je suis en butte à leurs propos.
