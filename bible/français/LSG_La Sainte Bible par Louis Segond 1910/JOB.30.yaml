document_id: JOB.30
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-15: cf. Job 19:13-19; 29.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Et maintenant!… je suis la risée de plus jeunes que moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De ceux dont je dédaignais de mettre les pères
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parmi les chiens de mon troupeau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mais à quoi me servirait la force de leurs mains?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont incapables d’atteindre la vieillesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Desséchés par la misère et la faim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils fuient dans les lieux arides,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Depuis longtemps abandonnés et déserts;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils arrachent près des arbrisseaux les herbes sauvages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils n’ont pour pain que la racine des genêts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: On les chasse du milieu des hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: On crie après eux comme après des voleurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils habitent dans d’affreuses vallées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans les cavernes de la terre et dans les rochers;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils hurlent parmi les buissons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se rassemblent sous les ronces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Êtres vils et méprisés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: On les repousse du pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 17:6
      metadata:
        usfm: JOB.17.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 69:13
      metadata:
        usfm: PSA.69.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 3:14
      metadata:
        usfm: LAM.3.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '63'
      metadata:
        usfm: LAM.3.63
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et maintenant, je suis l’objet de leurs chansons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis en butte à leurs propos.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 19:19
      metadata:
        usfm: JOB.19.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils ont horreur de moi, ils se détournent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils me crachent au visage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils n’ont plus de retenue et ils m’humilient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils rejettent tout frein devant moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ces misérables se lèvent à ma droite et me poussent les pieds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se fraient contre moi des sentiers pour ma ruine;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ils détruisent mon propre sentier et travaillent à ma perte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eux à qui personne ne viendrait en aide;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ils arrivent comme par une large brèche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se précipitent sous les craquements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Les terreurs m’assiègent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma gloire est emportée comme par le vent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon bonheur a passé comme un nuage.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-31: cf. (Job 23:1-12; 29:11-17; 42:1-7.) (Ps 7:4-6; 17:1-5.) (Ps 88; 102:4-12.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Et maintenant, mon âme s’épanche en mon sein,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les jours de la souffrance m’ont saisi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: La nuit me perce et m’arrache les os,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La douleur qui me ronge ne se donne aucun repos,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Par la violence du mal mon vêtement perd sa forme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il se colle à mon corps comme ma tunique.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dieu m’a jeté dans la boue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je ressemble à la poussière et à la cendre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Je crie vers toi, et tu ne me réponds pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me tiens debout, et tu me lances ton regard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tu deviens cruel contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu me combats avec la force de ta main.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tu me soulèves, tu me fais voler au-dessus du vent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu m’anéantis au bruit de la tempête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Car, je le sais, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:27
      metadata:
        usfm: HEB.9.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: tu me mènes à la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au rendez-vous de tous les vivants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mais celui qui va périr n’étend-il pas les mains?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui est dans le malheur n’implore-t-il pas du secours?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 35:13
      metadata:
        usfm: PSA.35.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: PSA.35.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:15
      metadata:
        usfm: ROM.12.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: N’avais-je pas des larmes pour l’infortuné?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon cœur n’avait-il pas pitié de l’indigent?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: J’attendais le bonheur, et le malheur est arrivé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’espérais la lumière, et les ténèbres sont venues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mes entrailles bouillonnent sans relâche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les jours de la calamité m’ont surpris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Je marche noirci, mais non par le soleil;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me lève en pleine assemblée, et je crie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 102:7
      metadata:
        usfm: PSA.102.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je suis devenu le frère des chacals,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le compagnon des autruches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 119:83
      metadata:
        usfm: PSA.119.83
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 4:8
      metadata:
        usfm: LAM.4.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:10
      metadata:
        usfm: LAM.5.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ma peau noircit et tombe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes os brûlent et se dessèchent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ma harpe n’est plus qu’un instrument de deuil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mon chalumeau ne peut rendre que des sons plaintifs.
