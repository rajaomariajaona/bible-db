document_id: PSA.116,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 30; 66:8, etc.; 86. És 38.
  - type: text
    content: J’aime l’Éternel, car il entend
  - type: text
    content: Ma voix, mes supplications;
  '10':
  - type: text
    content: ' '
  - type: note
    content: 2 Co 4:13.
  - type: text
    content: 'J’avais confiance, lorsque je disais: Je suis bien malheureux!'
  '11':
  - type: text
    content: 'Je disais dans mon angoisse:'
  - type: note
    content: Ro 3:4.
  - type: text
    content: Tout homme est trompeur.
  '12':
  - type: text
    content: Comment rendrai-je à l’Éternel
  - type: text
    content: Tous ses bienfaits envers moi?
  '13':
  - type: text
    content: J’élèverai la coupe des délivrances,
  - type: text
    content: Et j’invoquerai le nom de l’Éternel;
  '14':
  - type: text
    content: J’accomplirai mes vœux envers l’Éternel,
  - type: text
    content: En présence de tout son peuple.
  '15':
  - type: text
    content: Elle a du prix aux yeux de l’Éternel,
  - type: text
    content: La mort de ceux qui l’aiment.
  '16':
  - type: text
    content: Écoute-moi, ô Éternel! Car je suis ton serviteur,
  - type: text
    content: Ton serviteur, fils de ta servante.
  - type: text
    content: Tu as détaché mes liens.
  '17':
  - type: text
    content: Je t’offrirai un sacrifice d’actions de grâces,
  - type: text
    content: Et j’invoquerai le nom de l’Éternel;
  '18':
  - type: text
    content: J’accomplirai mes vœux envers l’Éternel,
  - type: text
    content: En présence de tout son peuple,
  '19':
  - type: text
    content: Dans les parvis de la maison de l’Éternel,
  - type: text
    content: Au milieu de toi, Jérusalem!
  - type: text
    content: Louez l’Éternel!
  '2':
  - type: text
    content: Car il a penché son oreille vers moi;
  - type: text
    content: Et je l’invoquerai toute ma vie.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 2 S 22:5, 6.
  - type: text
    content: Les liens de la mort m’avaient environné,
  - type: text
    content: Et les angoisses du sépulcre m’avaient saisi;
  - type: text
    content: J’étais en proie à la détresse et à la douleur.
  '4':
  - type: text
    content: 'Mais j’invoquai le nom de l’Éternel:'
  - type: text
    content: O Éternel, sauve mon âme!
  '5':
  - type: text
    content: L’Éternel est miséricordieux et juste,
  - type: text
    content: Notre Dieu est plein de compassion;
  '6':
  - type: text
    content: L’Éternel garde les simples;
  - type: text
    content: J’étais malheureux, et il m’a sauvé.
  '7':
  - type: text
    content: Mon âme, retourne à ton repos,
  - type: note
    content: Ps 13:6.
  - type: text
    content: Car l’Éternel t’a fait du bien.
  '8':
  - type: text
    content: Oui, tu as délivré mon âme de la mort,
  - type: text
    content: Mes yeux des larmes,
  - type: text
    content: Mes pieds de la chute.
  '9':
  - type: text
    content: Je marcherai devant l’Éternel,
  - type: text
    content: Sur la terre des vivants.
