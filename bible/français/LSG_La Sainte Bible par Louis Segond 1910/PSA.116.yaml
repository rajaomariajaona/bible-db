document_id: PSA.116,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 30; 66:8, etc.; 86. És 38.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’aime l’Éternel, car il entend
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma voix, mes supplications;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 4:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'J’avais confiance, lorsque je disais: Je suis bien malheureux!'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je disais dans mon angoisse:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tout homme est trompeur.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment rendrai-je à l’Éternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ses bienfaits envers moi?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’élèverai la coupe des délivrances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’invoquerai le nom de l’Éternel;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’accomplirai mes vœux envers l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En présence de tout son peuple.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle a du prix aux yeux de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La mort de ceux qui l’aiment.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoute-moi, ô Éternel! Car je suis ton serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton serviteur, fils de ta servante.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as détaché mes liens.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’offrirai un sacrifice d’actions de grâces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’invoquerai le nom de l’Éternel;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’accomplirai mes vœux envers l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En présence de tout son peuple,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les parvis de la maison de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu de toi, Jérusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Éternel!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il a penché son oreille vers moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je l’invoquerai toute ma vie.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 22:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les liens de la mort m’avaient environné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les angoisses du sépulcre m’avaient saisi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’étais en proie à la détresse et à la douleur.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais j’invoquai le nom de l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Éternel, sauve mon âme!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est miséricordieux et juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Notre Dieu est plein de compassion;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel garde les simples;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’étais malheureux, et il m’a sauvé.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme, retourne à ton repos,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 13:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car l’Éternel t’a fait du bien.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, tu as délivré mon âme de la mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes yeux des larmes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes pieds de la chute.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je marcherai devant l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur la terre des vivants.
