document_id: ISA.25,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Chant d’actions de grâces
  - type: heading
    content: 'V. 1-5: cf. Ex 15:1-13. Ps 9.'
  - type: text
    content: O Éternel! Tu es mon Dieu;
  - type: text
    content: Je t’exalterai, je célébrerai ton nom,
  - type: text
    content: Car tu as fait des choses merveilleuses;
  - type: text
    content: Tes desseins conçus à l’avance se sont fidèlement accomplis.
  '10':
  - type: text
    content: Car la main de l’Éternel repose sur cette montagne;
  - type: text
    content: Et Moab est foulé sur place,
  - type: text
    content: Comme la paille est foulée dans une mare à fumier.
  '11':
  - type: text
    content: Au milieu de cette mare, il étend ses mains,
  - type: text
    content: Comme le nageur les étend pour nager;
  - type: note
    content: És 16:6.
  - type: text
    content: Mais l’Éternel abat son orgueil,
  - type: text
    content: Et déjoue l’artifice de ses mains.
  '12':
  - type: text
    content: Il renverse, il précipite les fortifications élevées de tes murs,
  - type: text
    content: Il les fait crouler à terre, jusque dans la poussière.
  '2':
  - type: text
    content: 'Car tu as réduit la ville en '
  - type: note
    content: És 21:9; 23:13. Ap 14:8; 18:2.
  - type: text
    content: un monceau de pierres,
  - type: text
    content: La cité forte en un tas de ruines;
  - type: text
    content: La forteresse des barbares est détruite,
  - type: text
    content: 'Jamais elle ne sera rebâtie. '
  '3':
  - type: text
    content: C’est pourquoi les peuples puissants te glorifient,
  - type: text
    content: Les villes des nations puissantes te craignent.
  '4':
  - type: text
    content: Tu as été un refuge pour le faible,
  - type: text
    content: Un refuge pour le malheureux dans la détresse,
  - type: text
    content: Un abri contre la tempête,
  - type: text
    content: Un ombrage contre la chaleur;
  - type: text
    content: Car le souffle des tyrans
  - type: text
    content: Est comme l’ouragan qui frappe une muraille.
  '5':
  - type: text
    content: Comme tu domptes la chaleur dans une terre brûlante,
  - type: text
    content: Tu as dompté le tumulte des barbares;
  - type: text
    content: Comme la chaleur est étouffée par l’ombre d’un nuage,
  - type: text
    content: Ainsi ont été étouffés les chants de triomphe des tyrans.
  - type: heading
    content: 'V. 6-12: cf. És 24:23. (Ps 22:27-30. Mt 22:1-10.) És 2:1-5. Jé 48.'
  '6':
  - type: text
    content: L’Éternel des armées prépare à tous les peuples, sur cette montagne,
  - type: text
    content: Un festin de mets succulents,
  - type: text
    content: Un festin de vins vieux,
  - type: text
    content: De mets succulents, pleins de mœlle,
  - type: text
    content: De vins vieux, clarifiés.
  '7':
  - type: text
    content: Et, sur cette montagne, il anéantit le voile qui voile tous les peuples,
  - type: text
    content: La couverture qui couvre toutes les nations;
  '8':
  - type: text
    content: ' '
  - type: note
    content: 1 Co 15:54.
  - type: text
    content: Il anéantit la mort pour toujours;
  - type: text
    content: Le Seigneur, l’Éternel, essuie les larmes de tous les visages,
  - type: text
    content: Il fait disparaître de toute la terre l’opprobre de son peuple;
  - type: text
    content: Car l’Éternel a parlé.
  '9':
  - type: text
    content: 'En ce jour l’on dira:'
  - type: text
    content: Voici, c’est notre Dieu, en qui nous avons confiance,
  - type: text
    content: Et c’est lui qui nous sauve;
  - type: text
    content: C’est l’Éternel, en qui nous avons confiance;
  - type: text
    content: Soyons dans l’allégresse, et réjouissons-nous de son salut!
