document_id: ISA.25,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Chant d’actions de grâces
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-5: cf. Ex 15:1-13. Ps 9.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: O Éternel! Tu es mon Dieu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’exalterai, je célébrerai ton nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu as fait des choses merveilleuses;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes desseins conçus à l’avance se sont fidèlement accomplis.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Car la main de l’Éternel repose sur cette montagne;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Moab est foulé sur place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme la paille est foulée dans une mare à fumier.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Au milieu de cette mare, il étend ses mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme le nageur les étend pour nager;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 16:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais l’Éternel abat son orgueil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et déjoue l’artifice de ses mains.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Il renverse, il précipite les fortifications élevées de tes murs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les fait crouler à terre, jusque dans la poussière.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Car tu as réduit la ville en '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 21:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 14:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: un monceau de pierres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La cité forte en un tas de ruines;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La forteresse des barbares est détruite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Jamais elle ne sera rebâtie. '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: C’est pourquoi les peuples puissants te glorifient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les villes des nations puissantes te craignent.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tu as été un refuge pour le faible,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un refuge pour le malheureux dans la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un abri contre la tempête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un ombrage contre la chaleur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car le souffle des tyrans
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est comme l’ouragan qui frappe une muraille.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Comme tu domptes la chaleur dans une terre brûlante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as dompté le tumulte des barbares;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme la chaleur est étouffée par l’ombre d’un nuage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi ont été étouffés les chants de triomphe des tyrans.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-12: cf. És 24:23. (Ps 22:27-30. Mt 22:1-10.) És 2:1-5. Jé 48.'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: L’Éternel des armées prépare à tous les peuples, sur cette montagne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un festin de mets succulents,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un festin de vins vieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De mets succulents, pleins de mœlle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De vins vieux, clarifiés.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Et, sur cette montagne, il anéantit le voile qui voile tous les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La couverture qui couvre toutes les nations;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15:54
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il anéantit la mort pour toujours;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur, l’Éternel, essuie les larmes de tous les visages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fait disparaître de toute la terre l’opprobre de son peuple;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel a parlé.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'En ce jour l’on dira:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, c’est notre Dieu, en qui nous avons confiance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et c’est lui qui nous sauve;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est l’Éternel, en qui nous avons confiance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soyons dans l’allégresse, et réjouissons-nous de son salut!
