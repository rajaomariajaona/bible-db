document_id: EXO.19,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le désert et la montagne de Sinaï
  - type: heading
    content: 'V. 1-9: cf. (De 5:2; 7:6-8; 26:17-19.) 1 Pi 2:9.'
  - type: text
    content: 'Le troisième mois après leur sortie du pays d’Égypte, les enfants d’Israël arrivèrent ce jour-là au désert de Sinaï. '
  '10':
  - type: text
    content: 'Et l’Éternel dit à Moïse: Va vers le peuple; sanctifie-les aujourd’hui et demain, qu’ils lavent leurs vêtements. '
  '11':
  - type: text
    content: 'Qu’ils soient prêts pour le troisième jour; car le troisième jour l’Éternel descendra, aux yeux de tout le peuple, sur la montagne de Sinaï. '
  '12':
  - type: text
    content: 'Tu fixeras au peuple des limites tout à l’entour, et tu diras: '
  - type: note
    content: Hé 12:18.
  - type: text
    content: 'Gardez-vous de monter sur la montagne, ou d’en toucher le bord. Quiconque touchera la montagne sera puni de mort. '
  '13':
  - type: text
    content: 'On ne mettra pas la main sur lui, mais on le lapidera, ou on le percera de flèches: animal ou homme, il ne vivra point. Quand la trompette sonnera, ils s’avanceront près de la montagne. '
  '14':
  - type: text
    content: 'Moïse descendit de la montagne vers le peuple; il sanctifia le peuple, et ils lavèrent leurs vêtements. '
  '15':
  - type: text
    content: 'Et il dit au peuple: Soyez prêts dans trois jours; '
  - type: note
    content: 1 S 21:4. 1 Co 7:5.
  - type: text
    content: 'ne vous approchez d’aucune femme. '
  '16':
  - type: text
    content: 'Le troisième jour au matin, '
  - type: note
    content: Hé 12:18.
  - type: text
    content: 'il y eut des tonnerres, des éclairs, et une épaisse nuée sur la montagne; le son de la trompette retentit fortement; et tout le peuple qui était dans le camp fut saisi d’épouvante. '
  '17':
  - type: text
    content: 'Moïse fit sortir le peuple du camp, à la rencontre de Dieu; '
  - type: note
    content: De 4:10, 11.
  - type: text
    content: 'et ils se placèrent au bas de la montagne. '
  '18':
  - type: note
    content: Jg 5:4. Ps 68:9; 114:4. Ha 3:10.
  - type: text
    content: 'La montagne de Sinaï était toute en fumée, parce que l’Éternel y était descendu au milieu du feu; cette fumée s’élevait comme la fumée d’une fournaise, et toute la montagne tremblait avec violence. '
  '19':
  - type: text
    content: 'Le son de la trompette retentissait de plus en plus fortement. Moïse parlait, et Dieu lui répondait à haute voix. '
  '2':
  - type: text
    content: 'Étant partis de Rephidim, ils arrivèrent au désert de Sinaï, et ils campèrent dans le désert; Israël campa là, vis-à-vis de la montagne. '
  '20':
  - type: text
    content: 'Ainsi l’Éternel descendit sur la montagne de Sinaï, sur le sommet de la montagne; l’Éternel appela Moïse sur le sommet de la montagne. Et Moïse monta. '
  '21':
  - type: text
    content: 'L’Éternel dit à Moïse: Descends, fais au peuple la défense expresse de se précipiter vers l’Éternel, pour regarder, de peur qu’un grand nombre d’entre eux ne périssent. '
  '22':
  - type: text
    content: 'Que les sacrificateurs, qui s’approchent de l’Éternel, se sanctifient aussi, de peur que l’Éternel ne les frappe de mort. '
  '23':
  - type: text
    content: 'Moïse dit à l’Éternel: Le peuple ne pourra pas monter sur la montagne de Sinaï, car tu nous en as fait la défense expresse, en disant: Fixe des limites autour de la montagne, et sanctifie-la. '
  '24':
  - type: text
    content: 'L’Éternel lui dit: Va, descends; tu monteras ensuite avec Aaron; mais que les sacrificateurs et le peuple ne se précipitent point pour monter vers l’Éternel, de peur qu’il ne les frappe de mort. '
  '25':
  - type: text
    content: Moïse descendit vers le peuple, et lui dit ces choses.
  '3':
  - type: note
    content: Ac 7:38.
  - type: text
    content: 'Moïse monta vers Dieu: et l’Éternel l’appela du haut de la montagne, en disant: Tu parleras ainsi à la maison de Jacob, et tu diras aux enfants d’Israël: '
  '4':
  - type: note
    content: De 29:2; 32:11.
  - type: text
    content: 'Vous avez vu ce que j’ai fait à l’Égypte, et comment je vous ai portés sur des ailes d’aigle et amenés vers moi. '
  '5':
  - type: text
    content: 'Maintenant, si vous écoutez ma voix, et si vous gardez mon alliance, '
  - type: note
    content: De 7:6; 10:14, 15; 14:2; 26:18. Ps 135:4. És 41:8. Tit 2:14.
  - type: text
    content: 'vous m’appartiendrez entre tous les peuples, car '
  - type: note
    content: Ps 24:1.
  - type: text
    content: 'toute la terre est à moi; '
  '6':
  - type: note
    content: 1 Pi 2:9.
  - type: text
    content: 'vous serez pour moi un royaume de sacrificateurs et une nation sainte. Voilà les paroles que tu diras aux enfants d’Israël. '
  '7':
  - type: text
    content: 'Moïse vint appeler les anciens du peuple, et il mit devant eux toutes ces paroles, comme l’Éternel le lui avait ordonné. '
  '8':
  - type: text
    content: 'Le peuple tout entier répondit: '
  - type: note
    content: Ex 24:3.
  - type: text
    content: 'Nous ferons tout ce que l’Éternel a dit. Moïse rapporta les paroles du peuple à l’Éternel. '
  '9':
  - type: text
    content: 'Et l’Éternel dit à Moïse: Voici, je viendrai vers toi dans une épaisse nuée, afin que le peuple entende quand je te parlerai, et qu’il ait toujours confiance en toi. Moïse rapporta les paroles du peuple à l’Éternel.'
  - type: heading
    content: 'V. 10-25: cf. (De 4:10-12; 33:2, 3.) Hé 12:18-24.'
