document_id: 1CO.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La résurrection
  - type: heading
    content: 'V. 1-11: cf. (Mt 28. Mc 16. Lu 24. Jn 20; 21.) Ac 1:3; 9:1-7.'
  - type: text
    content: 'Je vous rappelle, frères, l’Évangile '
  - type: note
    content: Ga 1:11.
  - type: text
    content: 'que je vous ai annoncé, que vous avez reçu, dans lequel vous avez persévéré, '
  '10':
  - type: text
    content: 'Par la grâce de Dieu je suis ce que je suis, et sa grâce envers moi n’a pas été vaine; '
  - type: note
    content: 2 Co 11:23; 12:11.
  - type: text
    content: 'loin de là, j’ai travaillé plus qu’eux tous, non pas moi toutefois, mais la grâce de Dieu qui est avec moi. '
  '11':
  - type: text
    content: Ainsi donc, que ce soit moi, que ce soient eux, voilà ce que nous prêchons, et c’est ce que vous avez cru.
  - type: heading
    content: 'V. 12-34: cf. 2 Ti 2:8, 16-18. Lu 20:27-38. Ro 5:12, 17. (1 Pi 1:3-5. 1 Th 4:13-18.)'
  '12':
  - type: text
    content: 'Or, si l’on prêche que Christ est ressuscité des morts, comment quelques-uns parmi vous disent-ils qu’il n’y a point de résurrection des morts? '
  '13':
  - type: text
    content: 'S’il n’y a point de résurrection des morts, Christ non plus n’est pas ressuscité. '
  '14':
  - type: text
    content: 'Et si Christ n’est pas ressuscité, notre prédication est donc vaine, et votre foi aussi est vaine. '
  '15':
  - type: text
    content: 'Il se trouve même que nous sommes de faux témoins à l’égard de Dieu, puisque nous avons témoigné contre Dieu qu’il a ressuscité Christ, tandis qu’il ne l’aurait pas ressuscité, si les morts ne ressuscitent point. '
  '16':
  - type: text
    content: 'Car si les morts ne ressuscitent point, Christ non plus n’est pas ressuscité. '
  '17':
  - type: text
    content: 'Et si Christ n’est pas ressuscité, votre foi est vaine, vous êtes encore dans vos péchés, '
  '18':
  - type: text
    content: 'et par conséquent aussi ceux qui sont morts en Christ sont perdus. '
  '19':
  - type: text
    content: 'Si c’est dans cette vie seulement que nous espérons en Christ, nous sommes les plus malheureux de tous les hommes. '
  '2':
  - type: note
    content: Ro 1:16. 1 Co 1:21.
  - type: text
    content: 'et par lequel vous êtes sauvés, si vous le retenez tel que je vous l’ai annoncé; autrement, vous auriez cru en vain. '
  '20':
  - type: text
    content: 'Mais maintenant, '
  - type: note
    content: 1 Pi 1:3.
  - type: text
    content: 'Christ est ressuscité des morts, il est '
  - type: note
    content: Col 1:18. Ap 1:5.
  - type: text
    content: 'les prémices de ceux qui sont morts. '
  '21':
  - type: text
    content: 'Car, puisque '
  - type: note
    content: Ge 2:17; 3:6. Ro 5:12, 18; 6:23.
  - type: text
    content: 'la mort est venue par un homme, c’est aussi par un homme qu’est venue la résurrection des morts. '
  '22':
  - type: text
    content: 'Et comme tous meurent en Adam, de même aussi tous revivront en Christ, '
  '23':
  - type: text
    content: 'mais chacun en son rang. Christ comme prémices, puis ceux qui appartiennent à Christ, lors de son avènement. '
  '24':
  - type: text
    content: 'Ensuite viendra la fin, quand il remettra le royaume à celui qui est Dieu et Père, '
  - type: note
    content: 1 Co 2:6.
  - type: text
    content: 'après avoir détruit toute domination, toute autorité et toute puissance. '
  '25':
  - type: note
    content: Ps 110:1. Ac 2:34. Ép 1:20. Col 3:1. Hé 1:13; 10:12.
  - type: text
    content: 'Car il faut qu’il règne jusqu’à ce qu’il ait mis tous les ennemis sous ses pieds. '
  '26':
  - type: text
    content: 'Le dernier ennemi qui sera détruit, c’est la mort. '
  '27':
  - type: text
    content: 'Dieu, en effet, a tout mis sous ses pieds. '
  - type: note
    content: Ps 8:7. Mt 11:27; 28:18. Ép 1:22. Hé 2:8.
  - type: text
    content: 'Mais lorsqu’il dit que tout lui a été soumis, il est évident que celui qui lui a soumis toutes choses est excepté. '
  '28':
  - type: text
    content: 'Et lorsque toutes choses lui auront été soumises, alors le Fils lui-même sera soumis à celui qui lui a soumis toutes choses, afin que Dieu soit tout en tous. '
  '29':
  - type: text
    content: 'Autrement, que feraient ceux qui se font baptiser pour les morts? Si les morts ne ressuscitent absolument pas, pourquoi se font-ils baptiser pour eux? '
  '3':
  - type: text
    content: 'Je vous ai enseigné avant tout, comme je l’avais aussi reçu, '
  - type: note
    content: És 53:7. Da 9:24, 26. 1 Co 5:7. 1 Pi 2:24.
  - type: text
    content: 'que Christ est mort pour nos péchés, selon les Écritures; '
  '30':
  - type: text
    content: 'Et nous, pourquoi sommes-nous à toute heure en péril? '
  '31':
  - type: text
    content: 'Chaque jour je suis exposé à la mort, je l’atteste, frères, par la gloire dont vous êtes pour moi le sujet, en Jésus-Christ notre Seigneur. '
  '32':
  - type: text
    content: Si c’est dans des vues humaines que j’ai combattu contre les bêtes à Éphèse, quel avantage m’en revient-il? Si les morts ne ressuscitent pas,
  - type: note
    content: És 22:13; 56:12.
  - type: text
    content: Mangeons et buvons, car demain nous mourrons.
  '33':
  - type: text
    content: 'Ne vous y trompez pas: les mauvaises compagnies corrompent les bonnes mœurs. '
  '34':
  - type: text
    content: Revenez à vous-mêmes, comme il est convenable, et ne péchez point; car quelques-uns ne connaissent pas Dieu, je le dis à votre honte.
  - type: heading
    content: 'V. 35-58: cf. (Ph 3:20, 21. 1 Jn 3:2, 3. Da 12:3.) 1 Th 4:13-18.'
  '35':
  - type: text
    content: 'Mais quelqu’un dira: '
  - type: note
    content: Éz 37:3.
  - type: text
    content: 'Comment les morts ressuscitent-ils, et avec quel corps reviennent-ils? '
  '36':
  - type: text
    content: 'Insensé! '
  - type: note
    content: Jn 12:24.
  - type: text
    content: 'ce que tu sèmes ne reprend point vie, s’il ne meurt. '
  '37':
  - type: text
    content: 'Et ce que tu sèmes, ce n’est pas le corps qui naîtra; c’est un simple grain, de blé peut-être, ou de quelque autre semence; '
  '38':
  - type: text
    content: 'puis Dieu lui donne un corps comme il lui plaît, et à chaque semence il donne un corps qui lui est propre. '
  '39':
  - type: text
    content: 'Toute chair n’est pas la même chair; mais autre est la chair des hommes, autre celle des quadrupèdes, autre celle des oiseaux, autre celle des poissons. '
  '4':
  - type: text
    content: 'qu’il a été '
  - type: note
    content: Ps 16:10. És 53:9. Jon 1:17. Mt 12:40.
  - type: text
    content: 'enseveli, et qu’il est '
  - type: note
    content: Ps 16:10. És 53:8. Mt 12:40.
  - type: text
    content: 'ressuscité le troisième jour, selon les Écritures; '
  '40':
  - type: text
    content: 'Il y a aussi des corps célestes et des corps terrestres; mais autre est l’éclat des corps célestes, autre celui des corps terrestres. '
  '41':
  - type: text
    content: 'Autre est l’éclat du soleil, autre l’éclat de la lune, et autre l’éclat des étoiles; même une étoile diffère en éclat d’une autre étoile. '
  '42':
  - type: note
    content: Da 12:3. Mt 13:43.
  - type: text
    content: 'Ainsi en est-il de la résurrection des morts. Le corps est semé corruptible; il ressuscite incorruptible; '
  '43':
  - type: text
    content: 'il est semé méprisable, il ressuscite glorieux; il est semé infirme, il ressuscite plein de force; '
  '44':
  - type: text
    content: 'il est semé corps animal, il ressuscite corps spirituel. S’il y a un corps animal, il y a aussi un corps spirituel. '
  '45':
  - type: text
    content: 'C’est pourquoi il est écrit: '
  - type: note
    content: Ge 2:7.
  - type: text
    content: 'Le premier homme, Adam, devint une âme vivante. Le dernier Adam est devenu un esprit vivifiant. '
  '46':
  - type: text
    content: 'Mais ce qui est spirituel n’est pas le premier, c’est ce qui est animal; ce qui est spirituel vient ensuite. '
  '47':
  - type: text
    content: 'Le premier homme, tiré de la terre, est terrestre; le second homme est du ciel. '
  '48':
  - type: text
    content: 'Tel est le terrestre, tels sont aussi les terrestres; et tel est le céleste, tels sont aussi les célestes. '
  '49':
  - type: text
    content: 'Et '
  - type: note
    content: 2 Co 4:11.
  - type: text
    content: 'de même que nous avons porté l’image du terrestre, nous porterons aussi l’image du céleste. '
  '5':
  - type: text
    content: 'et qu’il est '
  - type: note
    content: Lu 24:34. Ac 10:41.
  - type: text
    content: 'apparu à Céphas, '
  - type: note
    content: Jn 20:19, etc.
  - type: text
    content: 'puis aux douze. '
  '50':
  - type: text
    content: 'Ce que je dis, frères, '
  - type: note
    content: Jn 1:13.
  - type: text
    content: 'c’est que la chair et le sang ne peuvent hériter le royaume de Dieu, et que la corruption n’hérite pas l’incorruptibilité. '
  '51':
  - type: text
    content: 'Voici, je vous dis un mystère: '
  - type: note
    content: 1 Th 4:16.
  - type: text
    content: 'nous ne mourrons pas tous, mais tous nous serons changés, '
  '52':
  - type: text
    content: 'en un instant, en un clin d’œil, à la '
  - type: note
    content: Mt 24:31. 1 Th 4:16.
  - type: text
    content: 'dernière trompette. La trompette sonnera, et les morts ressusciteront incorruptibles, et nous, nous serons changés. '
  '53':
  - type: text
    content: 'Car il faut que ce corps corruptible revête l’incorruptibilité, et que ce corps mortel revête '
  - type: note
    content: 2 Co 5:4.
  - type: text
    content: 'l’immortalité. '
  '54':
  - type: text
    content: 'Lorsque ce corps corruptible aura revêtu l’incorruptibilité, et que ce corps mortel aura revêtu l’immortalité, alors s’accomplira la parole qui est écrite:'
  - type: note
    content: És 25:8. Os 13:14. Hé 2:14.
  - type: text
    content: La mort a été engloutie dans la victoire.
  '55':
  - type: text
    content: O mort, où est ta victoire?
  - type: text
    content: O mort, où est ton aiguillon?
  '56':
  - type: text
    content: 'L’aiguillon de la mort, c’est le péché; et la puissance du péché, c’est la loi. '
  '57':
  - type: note
    content: 1 Jn 5:5.
  - type: text
    content: 'Mais grâces soient rendues à Dieu, qui nous donne la victoire par notre Seigneur Jésus-Christ! '
  '58':
  - type: text
    content: Ainsi, mes frères bien-aimés, soyez fermes, inébranlables, travaillant de mieux en mieux à l’œuvre du Seigneur, sachant que votre travail ne sera pas vain dans le Seigneur.
  '6':
  - type: text
    content: 'Ensuite, il est apparu à plus de cinq cents frères à la fois, dont la plupart sont encore vivants, et dont quelques-uns sont morts. '
  '7':
  - type: text
    content: 'Ensuite, il est apparu à Jacques, puis à tous les apôtres. '
  '8':
  - type: text
    content: 'Après eux tous, il m’est aussi apparu à '
  - type: note
    content: Ac 9:3, 17; 23:11. 1 Co 9:1. 2 Co 12:2.
  - type: text
    content: 'moi, comme à l’avorton; '
  '9':
  - type: text
    content: 'car je suis '
  - type: note
    content: Ép 3:8.
  - type: text
    content: 'le moindre des apôtres, je ne suis pas digne d’être appelé apôtre, '
  - type: note
    content: Ac 8:3; 9:1; 22:4; 26:9. Ga 1:13. 1 Ti 1:13.
  - type: text
    content: 'parce que j’ai persécuté l’Église de Dieu. '
