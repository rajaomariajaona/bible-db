document_id: 1CO.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La résurrection
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. (Mt 28. Mc 16. Lu 24. Jn 20; 21.) Ac 1:3; 9:1-7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je vous rappelle, frères, l’Évangile '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:11
      metadata:
        usfm: GAL.1.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que je vous ai annoncé, que vous avez reçu, dans lequel vous avez persévéré, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:16
      metadata:
        usfm: ROM.1.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:21
      metadata:
        usfm: 1CO.1.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et par lequel vous êtes sauvés, si vous le retenez tel que je vous l’ai annoncé; autrement, vous auriez cru en vain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je vous ai enseigné avant tout, comme je l’avais aussi reçu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 53:7
      metadata:
        usfm: ISA.53.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 9:24
      metadata:
        usfm: DAN.9.24
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: DAN.9.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 5:7
      metadata:
        usfm: 1CO.5.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:24
      metadata:
        usfm: 1PE.2.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que Christ est mort pour nos péchés, selon les Écritures; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'qu’il a été '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 16:10
      metadata:
        usfm: PSA.16.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 53:9
      metadata:
        usfm: ISA.53.9
    - type: text
      text: '. Jon 1:17. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:40
      metadata:
        usfm: MAT.12.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'enseveli, et qu’il est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 16:10
      metadata:
        usfm: PSA.16.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 53:8
      metadata:
        usfm: ISA.53.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:40
      metadata:
        usfm: MAT.12.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ressuscité le troisième jour, selon les Écritures; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et qu’il est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 24:34
      metadata:
        usfm: LUK.24.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:41
      metadata:
        usfm: ACT.10.41
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'apparu à Céphas, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jn 20:19, etc.
    marker-yv: yv-n
  - type: text
    text: 'puis aux douze. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ensuite, il est apparu à plus de cinq cents frères à la fois, dont la plupart sont encore vivants, et dont quelques-uns sont morts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ensuite, il est apparu à Jacques, puis à tous les apôtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Après eux tous, il m’est aussi apparu à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 9:3
      metadata:
        usfm: ACT.9.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '17'
      metadata:
        usfm: ACT.9.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:11
      metadata:
        usfm: ACT.23.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 9:1
      metadata:
        usfm: 1CO.9.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 12:2
      metadata:
        usfm: 2CO.12.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'moi, comme à l’avorton; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'car je suis '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 3:8
      metadata:
        usfm: EPH.3.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le moindre des apôtres, je ne suis pas digne d’être appelé apôtre, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 8:3
      metadata:
        usfm: ACT.8.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:1
      metadata:
        usfm: ACT.9.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:4
      metadata:
        usfm: ACT.22.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:9
      metadata:
        usfm: ACT.26.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:13
      metadata:
        usfm: GAL.1.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:13
      metadata:
        usfm: 1TI.1.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'parce que j’ai persécuté l’Église de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Par la grâce de Dieu je suis ce que je suis, et sa grâce envers moi n’a pas été vaine; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:23
      metadata:
        usfm: 2CO.11.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:11
      metadata:
        usfm: 2CO.12.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'loin de là, j’ai travaillé plus qu’eux tous, non pas moi toutefois, mais la grâce de Dieu qui est avec moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ainsi donc, que ce soit moi, que ce soient eux, voilà ce que nous prêchons, et c’est ce que vous avez cru.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-34: cf. 2 Ti 2:8, 16-18. Lu 20:27-38. Ro 5:12, 17. (1 Pi 1:3-5. 1 Th 4:13-18.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Or, si l’on prêche que Christ est ressuscité des morts, comment quelques-uns parmi vous disent-ils qu’il n’y a point de résurrection des morts? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'S’il n’y a point de résurrection des morts, Christ non plus n’est pas ressuscité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et si Christ n’est pas ressuscité, notre prédication est donc vaine, et votre foi aussi est vaine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il se trouve même que nous sommes de faux témoins à l’égard de Dieu, puisque nous avons témoigné contre Dieu qu’il a ressuscité Christ, tandis qu’il ne l’aurait pas ressuscité, si les morts ne ressuscitent point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Car si les morts ne ressuscitent point, Christ non plus n’est pas ressuscité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et si Christ n’est pas ressuscité, votre foi est vaine, vous êtes encore dans vos péchés, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'et par conséquent aussi ceux qui sont morts en Christ sont perdus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Si c’est dans cette vie seulement que nous espérons en Christ, nous sommes les plus malheureux de tous les hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais maintenant, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:3
      metadata:
        usfm: 1PE.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Christ est ressuscité des morts, il est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:18
      metadata:
        usfm: COL.1.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:5
      metadata:
        usfm: REV.1.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les prémices de ceux qui sont morts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Car, puisque '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 2:17
      metadata:
        usfm: GEN.2.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:6
      metadata:
        usfm: GEN.3.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 5:12
      metadata:
        usfm: ROM.5.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: ROM.5.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:23
      metadata:
        usfm: ROM.6.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la mort est venue par un homme, c’est aussi par un homme qu’est venue la résurrection des morts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Et comme tous meurent en Adam, de même aussi tous revivront en Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'mais chacun en son rang. Christ comme prémices, puis ceux qui appartiennent à Christ, lors de son avènement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ensuite viendra la fin, quand il remettra le royaume à celui qui est Dieu et Père, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 2:6
      metadata:
        usfm: 1CO.2.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'après avoir détruit toute domination, toute autorité et toute puissance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 110:1
      metadata:
        usfm: PSA.110.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 2:34
      metadata:
        usfm: ACT.2.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:20
      metadata:
        usfm: EPH.1.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:1
      metadata:
        usfm: COL.3.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 1:13
      metadata:
        usfm: HEB.1.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:12
      metadata:
        usfm: HEB.10.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car il faut qu’il règne jusqu’à ce qu’il ait mis tous les ennemis sous ses pieds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le dernier ennemi qui sera détruit, c’est la mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dieu, en effet, a tout mis sous ses pieds. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 8:7
      metadata:
        usfm: PSA.8.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 11:27
      metadata:
        usfm: MAT.11.27
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:18
      metadata:
        usfm: MAT.28.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:22
      metadata:
        usfm: EPH.1.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 2:8
      metadata:
        usfm: HEB.2.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais lorsqu’il dit que tout lui a été soumis, il est évident que celui qui lui a soumis toutes choses est excepté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Et lorsque toutes choses lui auront été soumises, alors le Fils lui-même sera soumis à celui qui lui a soumis toutes choses, afin que Dieu soit tout en tous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Autrement, que feraient ceux qui se font baptiser pour les morts? Si les morts ne ressuscitent absolument pas, pourquoi se font-ils baptiser pour eux? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Et nous, pourquoi sommes-nous à toute heure en péril? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Chaque jour je suis exposé à la mort, je l’atteste, frères, par la gloire dont vous êtes pour moi le sujet, en Jésus-Christ notre Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Si c’est dans des vues humaines que j’ai combattu contre les bêtes à Éphèse, quel avantage m’en revient-il? Si les morts ne ressuscitent pas,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 22:13
      metadata:
        usfm: ISA.22.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 56:12
      metadata:
        usfm: ISA.56.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mangeons et buvons, car demain nous mourrons.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ne vous y trompez pas: les mauvaises compagnies corrompent les bonnes mœurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Revenez à vous-mêmes, comme il est convenable, et ne péchez point; car quelques-uns ne connaissent pas Dieu, je le dis à votre honte.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 35-58: cf. (Ph 3:20, 21. 1 Jn 3:2, 3. Da 12:3.) 1 Th 4:13-18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Mais quelqu’un dira: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 37:3
      metadata:
        usfm: EZK.37.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comment les morts ressuscitent-ils, et avec quel corps reviennent-ils? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Insensé! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:24
      metadata:
        usfm: JHN.12.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ce que tu sèmes ne reprend point vie, s’il ne meurt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Et ce que tu sèmes, ce n’est pas le corps qui naîtra; c’est un simple grain, de blé peut-être, ou de quelque autre semence; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'puis Dieu lui donne un corps comme il lui plaît, et à chaque semence il donne un corps qui lui est propre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Toute chair n’est pas la même chair; mais autre est la chair des hommes, autre celle des quadrupèdes, autre celle des oiseaux, autre celle des poissons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Il y a aussi des corps célestes et des corps terrestres; mais autre est l’éclat des corps célestes, autre celui des corps terrestres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Autre est l’éclat du soleil, autre l’éclat de la lune, et autre l’éclat des étoiles; même une étoile diffère en éclat d’une autre étoile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 12:3
      metadata:
        usfm: DAN.12.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:43
      metadata:
        usfm: MAT.13.43
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ainsi en est-il de la résurrection des morts. Le corps est semé corruptible; il ressuscite incorruptible; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'il est semé méprisable, il ressuscite glorieux; il est semé infirme, il ressuscite plein de force; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'il est semé corps animal, il ressuscite corps spirituel. S’il y a un corps animal, il y a aussi un corps spirituel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'C’est pourquoi il est écrit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 2:7
      metadata:
        usfm: GEN.2.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le premier homme, Adam, devint une âme vivante. Le dernier Adam est devenu un esprit vivifiant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Mais ce qui est spirituel n’est pas le premier, c’est ce qui est animal; ce qui est spirituel vient ensuite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Le premier homme, tiré de la terre, est terrestre; le second homme est du ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Tel est le terrestre, tels sont aussi les terrestres; et tel est le céleste, tels sont aussi les célestes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 4:11
      metadata:
        usfm: 2CO.4.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de même que nous avons porté l’image du terrestre, nous porterons aussi l’image du céleste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ce que je dis, frères, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:13
      metadata:
        usfm: JHN.1.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'c’est que la chair et le sang ne peuvent hériter le royaume de Dieu, et que la corruption n’hérite pas l’incorruptibilité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Voici, je vous dis un mystère: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 4:16
      metadata:
        usfm: 1TH.4.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nous ne mourrons pas tous, mais tous nous serons changés, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'en un instant, en un clin d’œil, à la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 24:31
      metadata:
        usfm: MAT.24.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 4:16
      metadata:
        usfm: 1TH.4.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dernière trompette. La trompette sonnera, et les morts ressusciteront incorruptibles, et nous, nous serons changés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Car il faut que ce corps corruptible revête l’incorruptibilité, et que ce corps mortel revête '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:4
      metadata:
        usfm: 2CO.5.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’immortalité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Lorsque ce corps corruptible aura revêtu l’incorruptibilité, et que ce corps mortel aura revêtu l’immortalité, alors s’accomplira la parole qui est écrite:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 25:8
      metadata:
        usfm: ISA.25.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 13:14
      metadata:
        usfm: HOS.13.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 2:14
      metadata:
        usfm: HEB.2.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La mort a été engloutie dans la victoire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: O mort, où est ta victoire?
- type: usfm
  marker: q1
  children:
  - type: text
    text: O mort, où est ton aiguillon?
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'L’aiguillon de la mort, c’est le péché; et la puissance du péché, c’est la loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 5:5
      metadata:
        usfm: 1JN.5.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais grâces soient rendues à Dieu, qui nous donne la victoire par notre Seigneur Jésus-Christ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Ainsi, mes frères bien-aimés, soyez fermes, inébranlables, travaillant de mieux en mieux à l’œuvre du Seigneur, sachant que votre travail ne sera pas vain dans le Seigneur.
