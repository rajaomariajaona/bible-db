document_id: 2TI.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-9: cf. (2 Pi 2:1-22. Jud 3, etc. Tit 1:10-16.)'
  - type: text
    content: ' '
  - type: note
    content: 1 Ti 4:1. 2 Pi 2:3. Jud v. 18.
  - type: text
    content: 'Sache que, dans les derniers jours, il y aura des temps difficiles. '
  '10':
  - type: text
    content: 'Pour toi, tu as suivi de près mon enseignement, ma conduite, mes résolutions, ma foi, ma douceur, ma charité, ma constance, '
  '11':
  - type: note
    content: Ac 13:50.
  - type: text
    content: 'mes persécutions, mes souffrances. A quelles souffrances n’ai-je pas été exposé à Antioche, à '
  - type: note
    content: Ac 14:2.
  - type: text
    content: 'Icone, à '
  - type: note
    content: Ac 14:19.
  - type: text
    content: 'Lystre? Quelles persécutions n’ai-je pas supportées? '
  - type: note
    content: Ps 34:20. 2 Co 1:10.
  - type: text
    content: 'Et le Seigneur m’a délivré de toutes. '
  '12':
  - type: note
    content: Mt 16:24. Lu 24:26. Jn 17:14. Ac 14:22. 1 Th 3:3.
  - type: text
    content: 'Or, tous ceux qui veulent vivre pieusement en Jésus-Christ seront persécutés. '
  '13':
  - type: text
    content: 'Mais les hommes méchants et imposteurs avanceront toujours plus dans le mal, égarant les autres et égarés eux-mêmes. '
  '14':
  - type: text
    content: 'Toi, demeure dans les choses que tu as apprises, et reconnues certaines, sachant de qui tu les as apprises; '
  '15':
  - type: text
    content: 'dès ton enfance, tu connais les saintes lettres, qui peuvent te rendre sage à salut par la foi en Jésus-Christ. '
  '16':
  - type: note
    content: 2 Pi 1:20.
  - type: text
    content: 'Toute Écriture est inspirée de Dieu, et utile pour enseigner, pour convaincre, pour corriger, pour instruire dans la justice, '
  '17':
  - type: text
    content: afin que l’homme de Dieu soit accompli et propre à toute bonne œuvre.
  '2':
  - type: text
    content: 'Car les hommes seront égoïstes, amis de l’argent, fanfarons, hautains, blasphémateurs, rebelles à leurs parents, ingrats, irréligieux, '
  '3':
  - type: text
    content: 'insensibles, déloyaux, calomniateurs, intempérants, cruels, ennemis des gens de bien, '
  '4':
  - type: text
    content: 'traîtres, emportés, enflés d’orgueil, aimant le plaisir plus que Dieu, '
  '5':
  - type: text
    content: 'ayant l’apparence de la piété, mais reniant ce qui en fait la force. '
  - type: note
    content: Mt 18:17. Ro 16:17. 2 Th 3:6. Tit 3:10. 2 Jn v. 10.
  - type: text
    content: 'Éloigne-toi de ces hommes-là. '
  '6':
  - type: note
    content: Mt 23:14. Tit 1:11.
  - type: text
    content: 'Il en est parmi eux qui s’introduisent dans les maisons, et qui captivent des femmes d’un esprit faible et borné, chargées de péchés, agitées par des passions de toute espèce, '
  '7':
  - type: text
    content: 'apprenant toujours et ne pouvant jamais arriver à la connaissance de la vérité. '
  '8':
  - type: note
    content: Ex 7:11.
  - type: text
    content: 'De même que Jannès et Jambrès s’opposèrent à Moïse, de même ces hommes s’opposent à la vérité, étant corrompus d’entendement, réprouvés en ce qui concerne la foi. '
  '9':
  - type: text
    content: Mais ils ne feront pas de plus grands progrès; car leur folie sera manifeste pour tous, comme le fut celle de ces deux hommes.
  - type: heading
    content: 'V. 10-17: cf. 2 Co 6:3-10. (Ac 13:50; 14:1-22.) 2 Ti 1:13. 2 Pi 1:19-21.'
