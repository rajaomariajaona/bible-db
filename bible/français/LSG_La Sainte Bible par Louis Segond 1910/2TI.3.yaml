document_id: 2TI.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. (2 Pi 2:1-22. Jud 3, etc. Tit 1:10-16.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 4:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 2:3
      - type: text
        text: . Jud v. 18.
      marker-yv: yv-n
    - type: text
      text: 'Sache que, dans les derniers jours, il y aura des temps difficiles. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour toi, tu as suivi de près mon enseignement, ma conduite, mes résolutions, ma foi, ma douceur, ma charité, ma constance, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13:50
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mes persécutions, mes souffrances. A quelles souffrances n’ai-je pas été exposé à Antioche, à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 14:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Icone, à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 14:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Lystre? Quelles persécutions n’ai-je pas supportées? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 34:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 1:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et le Seigneur m’a délivré de toutes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 24:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 17:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 14:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 3:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Or, tous ceux qui veulent vivre pieusement en Jésus-Christ seront persécutés. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais les hommes méchants et imposteurs avanceront toujours plus dans le mal, égarant les autres et égarés eux-mêmes. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toi, demeure dans les choses que tu as apprises, et reconnues certaines, sachant de qui tu les as apprises; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dès ton enfance, tu connais les saintes lettres, qui peuvent te rendre sage à salut par la foi en Jésus-Christ. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 1:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Toute Écriture est inspirée de Dieu, et utile pour enseigner, pour convaincre, pour corriger, pour instruire dans la justice, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: afin que l’homme de Dieu soit accompli et propre à toute bonne œuvre.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car les hommes seront égoïstes, amis de l’argent, fanfarons, hautains, blasphémateurs, rebelles à leurs parents, ingrats, irréligieux, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'insensibles, déloyaux, calomniateurs, intempérants, cruels, ennemis des gens de bien, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'traîtres, emportés, enflés d’orgueil, aimant le plaisir plus que Dieu, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ayant l’apparence de la piété, mais reniant ce qui en fait la force. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 18:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 16:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Th 3:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 3:10
      - type: text
        text: . 2 Jn v. 10.
      marker-yv: yv-n
    - type: text
      text: 'Éloigne-toi de ces hommes-là. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 23:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 1:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il en est parmi eux qui s’introduisent dans les maisons, et qui captivent des femmes d’un esprit faible et borné, chargées de péchés, agitées par des passions de toute espèce, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'apprenant toujours et ne pouvant jamais arriver à la connaissance de la vérité. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 7:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'De même que Jannès et Jambrès s’opposèrent à Moïse, de même ces hommes s’opposent à la vérité, étant corrompus d’entendement, réprouvés en ce qui concerne la foi. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais ils ne feront pas de plus grands progrès; car leur folie sera manifeste pour tous, comme le fut celle de ces deux hommes.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-17: cf. 2 Co 6:3-10. (Ac 13:50; 14:1-22.) 2 Ti 1:13. 2 Pi 1:19-21.'
    marker-yv: yv-h
