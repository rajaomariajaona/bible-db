document_id: NUM.33
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Marches et stations des Israélites depuis leur sortie d’Égypte jusqu’à leur arrivée dans les plaines de Moab
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-15: cf. (Ex 12:37 à 19:2.) (Ex 19:4. És 63:11-14.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici les stations des enfants d’Israël qui sortirent du pays d’Égypte, selon leurs corps d’armée, sous la conduite de Moïse et d’Aaron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Moïse écrivit leurs marches de station en station, d’après l’ordre de l’Éternel. Et voici leurs stations, selon leurs marches. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:37
      metadata:
        usfm: EXO.12.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils partirent de Ramsès le premier mois, le quinzième jour du premier mois. Le lendemain de la Pâque, les enfants d’Israël sortirent la main levée, à la vue de tous les Égyptiens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et les Égyptiens enterraient ceux que l’Éternel avait frappés parmi eux, tous les premiers-nés; l’Éternel exerçait aussi des jugements contre leurs dieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les enfants d’Israël partirent de Ramsès, et campèrent à Succoth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:20
      metadata:
        usfm: EXO.13.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils partirent de Succoth, et campèrent à Étham, qui est à l’extrémité du désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 14:2
      metadata:
        usfm: EXO.14.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils partirent d’Étham, se détournèrent vers Pi-Hahiroth, vis-à-vis de Baal-Tsephon, et campèrent devant Migdol. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils partirent de devant Pi-Hahiroth, et passèrent au milieu de la mer dans la direction du désert; ils firent trois journées de marche dans le désert d’Étham, et campèrent à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 15:22
      metadata:
        usfm: EXO.15.22
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '23'
      metadata:
        usfm: EXO.15.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils partirent de Mara, et arrivèrent à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 15:27
      metadata:
        usfm: EXO.15.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Élim; il y avait à Élim douze sources d’eau et soixante-dix palmiers: ce fut là qu’ils campèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils partirent d’Élim, et campèrent près de la mer Rouge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils partirent de la mer Rouge, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 16:1
      metadata:
        usfm: EXO.16.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'campèrent dans le désert de Sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils partirent du désert de Sin, et campèrent à Dophka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils partirent de Dophka, et campèrent à Alusch. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils partirent d’Alusch, et campèrent à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 17:1
      metadata:
        usfm: EXO.17.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Rephidim, où le peuple ne trouva point d’eau à boire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils partirent de Rephidim, et campèrent dans '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 19:1
      metadata:
        usfm: EXO.19.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: le désert de Sinaï.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-36: cf. (No 10:11 à 20:1.) (De 2:7, 14; 8:2.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils partirent du désert du Sinaï, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 11:34
      metadata:
        usfm: NUM.11.34
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '35'
      metadata:
        usfm: NUM.11.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'campèrent à Kibroth-Hattaava. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils partirent de Kibroth-Hattaava, et campèrent à Hatséroth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils partirent de Hatséroth, et campèrent à Rithma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils partirent de Rithma, et campèrent à Rimmon-Pérets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ils partirent de Rimmon-Pérets, et campèrent à Libna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils partirent de Libna, et campèrent à Rissa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils partirent de Rissa, et campèrent à Kehélatha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ils partirent de Kehélatha, et campèrent à la montagne de Schapher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ils partirent de la montagne de Schapher, et campèrent à Harada. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils partirent de Harada, et campèrent à Makhéloth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils partirent de Makhéloth, et campèrent à Tahath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ils partirent de Tahath, et campèrent à Tarach. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils partirent de Tarach, et campèrent à Mithka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ils partirent de Mithka, et campèrent à Haschmona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ils '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:6
      metadata:
        usfm: DEU.10.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'partirent de Haschmona, et campèrent à Moséroth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ils partirent de Moséroth, et campèrent à Bené-Jaakan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ils partirent de Bené-Jaakan, et campèrent à Hor-Guidgad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ils partirent de Hor-Guidgad, et campèrent à Jothbatha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ils partirent de Jothbatha, et campèrent à Abrona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ils partirent d’Abrona, et campèrent à Étsjon-Guéber. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ils partirent d’Étsjon-Guéber, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 20:1
      metadata:
        usfm: NUM.20.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'campèrent dans le désert de Tsin: c’est Kadès.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 37-49: cf. (No 20 à 32. De 2; 3.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ils partirent de Kadès, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 20:22
      metadata:
        usfm: NUM.20.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'campèrent à la montagne de Hor, à l’extrémité du pays d’Édom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 20:25
      metadata:
        usfm: NUM.20.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:50
      metadata:
        usfm: DEU.32.50
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le sacrificateur Aaron monta sur la montagne de Hor, suivant l’ordre de l’Éternel; et il y mourut, la quarantième année après la sortie des enfants d’Israël du pays d’Égypte, le cinquième mois, le premier jour du mois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Aaron était âgé de cent vingt-trois ans lorsqu’il mourut sur la montagne de Hor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 21:1
      metadata:
        usfm: NUM.21.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi d’Arad, Cananéen, qui habitait le midi du pays de Canaan, apprit l’arrivée des enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ils '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 21:4
      metadata:
        usfm: NUM.21.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'partirent de la montagne de Hor, et campèrent à Tsalmona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ils partirent de Tsalmona, et campèrent à Punon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ils partirent de Punon, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 21:10
      metadata:
        usfm: NUM.21.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'campèrent à Oboth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ils partirent d’Oboth, et campèrent à Ijjé-Abarim, sur la frontière de Moab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ils partirent d’Ijjé-Abarim, et campèrent à Dibon-Gad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ils partirent de Dibon-Gad, et campèrent à Almon-Diblathaïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ils partirent d’Almon-Diblathaïm, et campèrent aux montagnes d’Abarim, devant Nebo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ils partirent des montagnes d’Abarim, et campèrent dans les plaines de Moab, près du Jourdain, vis-à-vis de Jéricho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ils campèrent près du Jourdain, depuis Beth-Jeschimoth jusqu’à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 25:1
      metadata:
        usfm: NUM.25.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 2:1
      metadata:
        usfm: JOS.2.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Abel-Sittim, dans les plaines de Moab.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 50-56: cf. Ex 34:11-16. No 26:52-56.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'L’Éternel parla à Moïse dans les plaines de Moab, près du Jourdain, vis-à-vis de Jéricho. Il dit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Parle aux enfants d’Israël, et dis-leur: Lorsque vous aurez passé le Jourdain et que vous serez entrés dans le pays de Canaan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: usfm
    marker: x
    children:
    - type: text
      text: De 7:2, 3, etc.
    marker-yv: yv-n
  - type: text
    text: 'vous chasserez devant vous tous les habitants du pays, vous détruirez toutes leurs idoles de pierre, vous détruirez toutes leurs images de fonte, et vous détruirez tous leurs hauts lieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Vous prendrez possession du pays, et vous vous y établirez; car je vous ai donné le pays, pour qu’il soit votre propriété. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Vous partagerez le pays par le sort, selon vos familles. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: No 26:54, etc.
    marker-yv: yv-n
  - type: text
    text: 'A ceux qui sont en plus grand nombre vous donnerez une portion plus grande, et à ceux qui sont en plus petit nombre vous donnerez une portion plus petite. Chacun possédera ce qui lui sera échu par le sort: vous le recevrez en propriété, selon les tribus de vos pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Mais si vous ne chassez pas devant vous les habitants du pays, ceux d’entre eux que vous laisserez seront '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 23:13
      metadata:
        usfm: JOS.23.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 2:3
      metadata:
        usfm: JDG.2.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme des épines dans vos yeux et des aiguillons dans vos côtés, ils seront vos ennemis dans le pays où vous allez vous établir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Et il arrivera que je vous traiterai comme j’avais résolu de les traiter.
