document_id: EXO.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Murmures des Israélites dans le désert de Sin. Les cailles et la manne. Le sabbat
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-36: cf. No 11:4, etc. (De 8:2, 3, 16. Né 9:15, 20, 21. Ps 78:23-35.) Jn 6:30-35, 48-58. Mt 6:11. Ph 4:19.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Toute l’assemblée des enfants d’Israël partit d’Élim, et ils arrivèrent au désert de Sin, qui est entre Élim et Sinaï, le quinzième jour du second mois après leur sortie du pays d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et toute l’assemblée des enfants d’Israël murmura dans le désert contre Moïse et Aaron. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:10
      metadata:
        usfm: 1CO.10.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les enfants d’Israël leur dirent: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 11:4
      metadata:
        usfm: NUM.11.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que ne sommes-nous morts par la main de l’Éternel dans le pays d’Égypte, quand nous étions assis près des pots de viande, quand nous mangions du pain à satiété? Car vous nous avez menés dans ce désert pour faire mourir de faim toute cette multitude. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’Éternel dit à Moïse: Voici, je ferai pleuvoir pour vous '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:24
      metadata:
        usfm: PSA.78.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 105:40
      metadata:
        usfm: PSA.105.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'du pain, du haut des cieux. Le peuple sortira, et en ramassera, jour par jour, la quantité nécessaire, afin que je le mette à l’épreuve, et que je voie s’il marchera, ou non, selon ma loi. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le sixième jour, lorsqu’ils prépareront ce qu’ils auront apporté, il s’en trouvera le double de ce qu’ils ramasseront jour par jour. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Moïse et Aaron dirent à tous les enfants d’Israël: Ce soir, vous comprendrez que c’est l’Éternel qui vous a fait sortir du pays d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et, au matin, vous verrez la gloire de l’Éternel, parce qu’il a entendu vos murmures contre l’Éternel; car que sommes-nous, pour que vous murmuriez contre nous? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Moïse dit: L’Éternel vous donnera ce soir de la viande à manger, et au matin du pain à satiété, parce que l’Éternel a entendu les murmures que vous avez proférés contre lui; car que sommes-nous? Ce n’est pas contre nous que sont vos murmures, c’est contre l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moïse dit à Aaron: Dis à toute l’assemblée des enfants d’Israël: Approchez-vous devant l’Éternel, car il a entendu vos murmures. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et tandis qu’Aaron parlait à toute l’assemblée des enfants d’Israël, ils se tournèrent du côté du désert, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:21
      metadata:
        usfm: EXO.13.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et voici, la gloire de l’Éternel parut dans la nuée. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’Éternel, s’adressant à Moïse, dit: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'J’ai entendu les murmures des enfants d’Israël. Dis-leur: Entre les deux soirs vous mangerez de la viande, et au matin vous vous '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:49
      metadata:
        usfm: JHN.6.49
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '58'
      metadata:
        usfm: JHN.6.58
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'rassasierez de pain; et vous saurez que je suis l’Éternel, votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le soir, il survint '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 11:31
      metadata:
        usfm: NUM.11.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:40
      metadata:
        usfm: PSA.105.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des cailles qui couvrirent le camp; et, au matin, il y eut une couche de rosée autour du camp. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 11:7
      metadata:
        usfm: NUM.11.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Né 9:15
      metadata:
        usfm: NEH.9.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:24
      metadata:
        usfm: PSA.78.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 105:40
      metadata:
        usfm: PSA.105.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand cette rosée fut dissipée, il y avait à la surface du désert quelque chose de menu comme des grains, quelque chose de menu comme la gelée blanche sur la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les enfants d’Israël regardèrent et ils se dirent l’un à l’autre: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:31
      metadata:
        usfm: JHN.6.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:3
      metadata:
        usfm: 1CO.10.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Qu’est-ce que cela? Car ils ne savaient pas ce que c’était. Moïse leur dit: C’est le pain que L’Éternel vous donne pour nourriture. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Voici ce que l’Éternel a ordonné: Que chacun de vous en ramasse ce qu’il faut pour sa nourriture, un omer par tête, suivant le nombre de vos personnes; chacun en prendra pour ceux qui sont dans sa tente. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les Israélites firent ainsi; et ils en ramassèrent les uns plus, les autres moins. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'On mesurait ensuite avec l’omer; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 8:15
      metadata:
        usfm: 2CO.8.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'celui qui avait ramassé plus n’avait rien de trop, et celui qui avait ramassé moins n’en manquait pas. Chacun ramassait ce qu’il fallait pour sa nourriture. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Moïse leur dit: Que personne n’en laisse jusqu’au matin. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ils n’écoutèrent pas Moïse, et il y eut des gens qui en laissèrent jusqu’au matin; mais il s’y mit des vers, et cela devint infect. Moïse fut irrité contre ces gens. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tous les matins, chacun ramassait ce qu’il fallait pour sa nourriture; et quand venait la chaleur du soleil, cela fondait. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le sixième jour, ils ramassèrent une quantité double de nourriture, deux omers pour chacun. Tous les principaux de l’assemblée vinrent le rapporter à Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et Moïse leur dit: C’est ce que l’Éternel a ordonné. Demain est le jour du repos, le sabbat consacré à l’Éternel; faites cuire ce que vous avez à faire cuire, faites bouillir ce que vous avez à faire bouillir, et mettez en réserve jusqu’au matin tout ce qui restera. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ils le laissèrent jusqu’au matin, comme Moïse l’avait ordonné; et cela ne devint point infect, et il ne s’y mit point de vers. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Moïse dit: Mangez-le aujourd’hui, car c’est le jour du sabbat; aujourd’hui vous n’en trouverez point dans la campagne. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Pendant six jours vous en ramasserez; mais le septième jour, qui est le sabbat, il n’y en aura point. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le septième jour, quelques-uns du peuple sortirent pour en ramasser, et ils n’en trouvèrent point. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors l’Éternel dit à Moïse: Jusques à quand refuserez-vous d’observer mes commandements et mes lois? '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Considérez que l’Éternel vous a donné le sabbat; c’est pourquoi il vous donne au sixième jour de la nourriture pour deux jours. Que chacun reste à sa place, et que personne ne sorte du lieu où il est au septième jour. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Et le peuple se reposa le septième jour. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 11:7
      metadata:
        usfm: NUM.11.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'La maison d’Israël donna à cette nourriture le nom de manne. Elle ressemblait à de la graine de coriandre; elle était blanche, et avait le goût d’un gâteau au miel. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Moïse dit: Voici ce que l’Éternel a ordonné: Qu’un omer rempli de manne soit conservé pour vos descendants, afin qu’ils voient le pain que je vous ai fait manger dans le désert, après vous avoir fait sortir du pays d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Et Moïse dit à Aaron: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:4
      metadata:
        usfm: HEB.9.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Prends un vase, mets-y de la manne plein un omer, et dépose-le devant l’Éternel, afin qu’il soit conservé pour vos descendants. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Suivant l’ordre donné par l’Éternel à Moïse, Aaron le déposa devant le témoignage, afin qu’il fût conservé. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Les enfants d’Israël mangèrent la manne pendant quarante ans, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 5:12
      metadata:
        usfm: JOS.5.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Né 9:15
      metadata:
        usfm: NEH.9.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'jusqu’à leur arrivée dans un pays habité; ils mangèrent la manne jusqu’à leur arrivée aux frontières du pays de Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: L’omer est la dixième partie de l’épha.
