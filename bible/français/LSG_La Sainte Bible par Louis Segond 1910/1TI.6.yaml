document_id: 1TI.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-2: cf. Ép 6:5-8. Tit 2:9, 10. 1 Pi 2:18-20.'
  - type: text
    content: ' '
  - type: note
    content: Ép 6:5. Col 3:22. Tit 2:9. 1 Pi 2:18.
  - type: text
    content: 'Que tous ceux qui sont sous le joug de la servitude regardent leurs maîtres comme dignes de tout honneur, afin que le nom de Dieu et la doctrine ne soient pas blasphémés. '
  '10':
  - type: note
    content: Ex 23:8. De 16:19. Pr 15:16.
  - type: text
    content: Car l’amour de l’argent est une racine de tous les maux; et quelques-uns, en étant possédés, se sont égarés loin de la foi, et se sont jetés eux-mêmes dans bien des tourments.
  - type: heading
    content: 'V. 11-16: cf. (2 Ti 2:22, 3-7; 4:7, 8.) (2 Ti 4:1, 2, 5. Jud 24, 25.)'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 2 Ti 2:22.
  - type: text
    content: 'Pour toi, homme de Dieu, fuis ces choses, et recherche la justice, la piété, la foi, la charité, la patience, la douceur. '
  '12':
  - type: note
    content: 1 Ti 1:18.
  - type: text
    content: 'Combats le bon combat de la foi, saisis la vie éternelle, à laquelle tu as été appelé, et pour laquelle tu as fait une belle confession en présence d’un grand nombre de témoins. '
  '13':
  - type: note
    content: 1 Ti 5:21.
  - type: text
    content: 'Je te recommande, devant Dieu '
  - type: note
    content: De 32:39. 1 S 2:6.
  - type: text
    content: 'qui donne la vie à toutes choses, et devant Jésus-Christ, '
  - type: note
    content: Mt 27:11. Jn 18:27.
  - type: text
    content: 'qui fit une belle confession devant Ponce Pilate, de garder le commandement, '
  '14':
  - type: text
    content: 'et de vivre sans tache, sans reproche, jusqu’à l’apparition de notre Seigneur Jésus-Christ, '
  '15':
  - type: text
    content: 'que manifestera en son temps '
  - type: note
    content: 1 Ti 1:17.
  - type: text
    content: 'le bienheureux et seul souverain, '
  - type: note
    content: Ap 17:14; 19:16.
  - type: text
    content: 'le roi des rois, et le Seigneur des seigneurs, '
  '16':
  - type: text
    content: 'qui seul possède l’immortalité, qui habite une lumière inaccessible, '
  - type: note
    content: Ex 33:20. De 4:12. 1 Jn 4:12.
  - type: text
    content: que nul homme n’a vu ni ne peut voir, à qui appartiennent l’honneur et la puissance éternelle. Amen!
  - type: heading
    content: 'V. 17-19: cf. Lu 12:15-21. (Hé 13:16. Pr 19:17. Mt 25:34-40.)'
  '17':
  - type: text
    content: 'Recommande aux riches du présent siècle de ne pas être orgueilleux, '
  - type: note
    content: Mc 4:18. Lu 8:14.
  - type: text
    content: 'et de ne pas mettre leur espérance dans des richesses incertaines, mais de la mettre en Dieu, qui nous donne avec abondance toutes choses pour que nous en jouissions. '
  '18':
  - type: text
    content: 'Recommande-leur de faire du bien, d’être riches en bonnes œuvres, d’avoir de la libéralité, de la générosité, '
  '19':
  - type: note
    content: Mt 6:20. Lu 12:33; 16:9.
  - type: text
    content: et de s’amasser ainsi pour l’avenir un trésor placé sur un fondement solide, afin de saisir la vie véritable.
  - type: heading
    content: 'V. 20-21: cf. 2 Ti 1:13, 14; 2:15-18.'
  '2':
  - type: text
    content: Et que ceux qui ont des fidèles pour maîtres ne les méprisent pas, sous prétexte qu’ils sont frères; mais qu’ils les servent d’autant mieux que ce sont des fidèles et des bien-aimés qui s’attachent à leur faire du bien. Enseigne ces choses et recommande-les.
  - type: heading
    content: Les faux docteurs et l’amour des richesses. Conseils à Timothée sur la recherche des biens spirituels et la fidélité à l’Évangile
  - type: heading
    content: 'V. 3-10: cf. Ro 16:17, 18. (Hé 13:5. Mc 4:18, 19. Mt 6:19-34.)'
  '20':
  - type: text
    content: 'O Timothée, garde le dépôt, '
  - type: note
    content: 1 Ti 1:4; 4:7. 2 Ti 2:16. Tit 1:14; 3:9.
  - type: text
    content: 'en évitant les discours vains et profanes, '
  '21':
  - type: text
    content: et les disputes de la fausse science dont font profession quelques-uns, qui se sont ainsi détournés de la foi. Que la grâce soit avec vous!
  '3':
  - type: text
    content: 'Si quelqu’un enseigne de fausses doctrines, et ne s’attache pas aux saines paroles de notre Seigneur Jésus-Christ et à la doctrine qui est selon la piété, '
  '4':
  - type: text
    content: 'il est enflé d’orgueil, il ne sait rien, et il a la maladie des questions oiseuses et des disputes de mots, '
  - type: note
    content: 1 Ti 1:4. 2 Ti 2:23. Tit 3:9.
  - type: text
    content: 'd’où naissent l’envie, les querelles, les calomnies, les mauvais soupçons, '
  '5':
  - type: note
    content: 1 Co 11:16.
  - type: text
    content: 'les vaines discussions d’hommes corrompus d’entendement, privés de la vérité, et croyant que la piété est une source de gain. '
  '6':
  - type: note
    content: Pr 15:16. Hé 13:5.
  - type: text
    content: 'C’est, en effet, une grande source de gain que la piété avec le contentement; '
  '7':
  - type: note
    content: Job 1:21; 27:19. Ps 49:18.
  - type: text
    content: 'car nous n’avons rien apporté dans le monde, et il est évident que nous n’en pouvons rien emporter; '
  '8':
  - type: text
    content: 'si donc nous avons la nourriture et le vêtement, '
  - type: note
    content: Ps 55:23. Mt 6:25. 1 Pi 5:7.
  - type: text
    content: 'cela nous suffira. '
  '9':
  - type: note
    content: Pr 11:28. Mt 13:22. Ja 5:1.
  - type: text
    content: 'Mais ceux qui veulent s’enrichir tombent dans la tentation, dans le piège, et dans beaucoup de désirs insensés et pernicieux qui plongent les hommes dans la ruine et la perdition. '
