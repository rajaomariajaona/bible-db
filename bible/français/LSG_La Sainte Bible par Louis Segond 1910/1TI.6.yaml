document_id: 1TI.6,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-2: cf. Ép 6:5-8. Tit 2:9, 10. 1 Pi 2:18-20.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 6:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 2:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Que tous ceux qui sont sous le joug de la servitude regardent leurs maîtres comme dignes de tout honneur, afin que le nom de Dieu et la doctrine ne soient pas blasphémés. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 16:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 15:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car l’amour de l’argent est une racine de tous les maux; et quelques-uns, en étant possédés, se sont égarés loin de la foi, et se sont jetés eux-mêmes dans bien des tourments.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-16: cf. (2 Ti 2:22, 3-7; 4:7, 8.) (2 Ti 4:1, 2, 5. Jud 24, 25.)'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 2:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Pour toi, homme de Dieu, fuis ces choses, et recherche la justice, la piété, la foi, la charité, la patience, la douceur. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 1:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Combats le bon combat de la foi, saisis la vie éternelle, à laquelle tu as été appelé, et pour laquelle tu as fait une belle confession en présence d’un grand nombre de témoins. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 5:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je te recommande, devant Dieu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:39
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 2:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui donne la vie à toutes choses, et devant Jésus-Christ, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 18:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui fit une belle confession devant Ponce Pilate, de garder le commandement, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et de vivre sans tache, sans reproche, jusqu’à l’apparition de notre Seigneur Jésus-Christ, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'que manifestera en son temps '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 1:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le bienheureux et seul souverain, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 17:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le roi des rois, et le Seigneur des seigneurs, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qui seul possède l’immortalité, qui habite une lumière inaccessible, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 33:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 4:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 4:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: que nul homme n’a vu ni ne peut voir, à qui appartiennent l’honneur et la puissance éternelle. Amen!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-19: cf. Lu 12:15-21. (Hé 13:16. Pr 19:17. Mt 25:34-40.)'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Recommande aux riches du présent siècle de ne pas être orgueilleux, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 4:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 8:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et de ne pas mettre leur espérance dans des richesses incertaines, mais de la mettre en Dieu, qui nous donne avec abondance toutes choses pour que nous en jouissions. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Recommande-leur de faire du bien, d’être riches en bonnes œuvres, d’avoir de la libéralité, de la générosité, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 6:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 12:33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: et de s’amasser ainsi pour l’avenir un trésor placé sur un fondement solide, afin de saisir la vie véritable.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 20-21: cf. 2 Ti 1:13, 14; 2:15-18.'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et que ceux qui ont des fidèles pour maîtres ne les méprisent pas, sous prétexte qu’ils sont frères; mais qu’ils les servent d’autant mieux que ce sont des fidèles et des bien-aimés qui s’attachent à leur faire du bien. Enseigne ces choses et recommande-les.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les faux docteurs et l’amour des richesses. Conseils à Timothée sur la recherche des biens spirituels et la fidélité à l’Évangile
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 3-10: cf. Ro 16:17, 18. (Hé 13:5. Mc 4:18, 19. Mt 6:19-34.)'
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O Timothée, garde le dépôt, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 1:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 2:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 1:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'en évitant les discours vains et profanes, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et les disputes de la fausse science dont font profession quelques-uns, qui se sont ainsi détournés de la foi. Que la grâce soit avec vous!
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si quelqu’un enseigne de fausses doctrines, et ne s’attache pas aux saines paroles de notre Seigneur Jésus-Christ et à la doctrine qui est selon la piété, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il est enflé d’orgueil, il ne sait rien, et il a la maladie des questions oiseuses et des disputes de mots, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 1:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 2:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 3:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’où naissent l’envie, les querelles, les calomnies, les mauvais soupçons, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 11:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'les vaines discussions d’hommes corrompus d’entendement, privés de la vérité, et croyant que la piété est une source de gain. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 15:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 13:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'C’est, en effet, une grande source de gain que la piété avec le contentement; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 1:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 49:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car nous n’avons rien apporté dans le monde, et il est évident que nous n’en pouvons rien emporter; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'si donc nous avons la nourriture et le vêtement, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 55:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 6:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 5:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'cela nous suffira. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 11:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 13:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 5:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais ceux qui veulent s’enrichir tombent dans la tentation, dans le piège, et dans beaucoup de désirs insensés et pernicieux qui plongent les hommes dans la ruine et la perdition. '
