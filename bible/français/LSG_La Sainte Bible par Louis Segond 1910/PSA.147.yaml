document_id: PSA.147
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Né 12:27-43. (Ps 33; 65.)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louez l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il est beau de célébrer notre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car il est doux, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 33:1
      metadata:
        usfm: PSA.33.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: il est bienséant de le louer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L’Éternel rebâtit Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il rassemble les exilés d’Israël;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il guérit ceux qui ont le cœur brisé,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 15:26
      metadata:
        usfm: EXO.15.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 5:18
      metadata:
        usfm: JOB.5.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et il panse leurs blessures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 40:26
      metadata:
        usfm: ISA.40.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il compte le nombre des étoiles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il leur donne à toutes des noms.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Notre Seigneur est grand, puissant par sa force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son intelligence n’a point de limite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L’Éternel soutient les malheureux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il abaisse les méchants jusqu’à terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Chantez à l’Éternel avec actions de grâces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Célébrez notre Dieu avec la harpe!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 2:20
      metadata:
        usfm: HOS.2.20
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '21'
      metadata:
        usfm: HOS.2.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il couvre les cieux de nuages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il prépare la pluie pour la terre;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 28:26
      metadata:
        usfm: JOB.28.26
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '27'
      metadata:
        usfm: JOB.28.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 104:14
      metadata:
        usfm: PSA.104.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il fait germer l’herbe sur les montagnes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il donne la nourriture au bétail,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aux petits du corbeau quand ils crient,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ce n’est pas dans la vigueur du cheval qu’il se complaît,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce n’est pas dans les jambes de l’homme qu’il met son plaisir;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’Éternel aime ceux qui le craignent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui espèrent en sa bonté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Jérusalem, célèbre l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sion, loue ton Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Car il affermit les barres de tes portes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il bénit tes fils au milieu de toi;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il rend la paix à ton territoire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il te rassasie du meilleur froment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il envoie ses ordres sur la terre:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 33:9
      metadata:
        usfm: PSA.33.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Sa parole court avec vitesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il donne la neige comme de la laine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il répand la gelée blanche comme de la cendre;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il lance sa glace par morceaux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui peut résister devant son froid?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il envoie sa parole, et il les fond;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fait souffler son vent, et les eaux coulent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il révèle sa parole à Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses lois et ses ordonnances à Israël;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 14:16
      metadata:
        usfm: ACT.14.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il n’a pas agi de même pour toutes les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et elles ne connaissent point ses ordonnances.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez l’Éternel!
