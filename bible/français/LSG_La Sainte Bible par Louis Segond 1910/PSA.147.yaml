document_id: PSA.147,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Né 12:27-43. (Ps 33; 65.)
  - type: text
    content: Louez l’Éternel!
  - type: text
    content: Car il est beau de célébrer notre Dieu,
  - type: text
    content: 'Car il est doux, '
  - type: note
    content: Ps 33:1.
  - type: text
    content: il est bienséant de le louer.
  '10':
  - type: text
    content: Ce n’est pas dans la vigueur du cheval qu’il se complaît,
  - type: text
    content: Ce n’est pas dans les jambes de l’homme qu’il met son plaisir;
  '11':
  - type: text
    content: L’Éternel aime ceux qui le craignent,
  - type: text
    content: Ceux qui espèrent en sa bonté.
  '12':
  - type: text
    content: Jérusalem, célèbre l’Éternel!
  - type: text
    content: Sion, loue ton Dieu!
  '13':
  - type: text
    content: Car il affermit les barres de tes portes,
  - type: text
    content: Il bénit tes fils au milieu de toi;
  '14':
  - type: text
    content: Il rend la paix à ton territoire,
  - type: text
    content: Il te rassasie du meilleur froment.
  '15':
  - type: text
    content: 'Il envoie ses ordres sur la terre:'
  - type: note
    content: Ps 33:9.
  - type: text
    content: Sa parole court avec vitesse.
  '16':
  - type: text
    content: Il donne la neige comme de la laine,
  - type: text
    content: Il répand la gelée blanche comme de la cendre;
  '17':
  - type: text
    content: Il lance sa glace par morceaux;
  - type: text
    content: Qui peut résister devant son froid?
  '18':
  - type: text
    content: Il envoie sa parole, et il les fond;
  - type: text
    content: Il fait souffler son vent, et les eaux coulent.
  '19':
  - type: text
    content: Il révèle sa parole à Jacob,
  - type: text
    content: Ses lois et ses ordonnances à Israël;
  '2':
  - type: text
    content: L’Éternel rebâtit Jérusalem,
  - type: text
    content: Il rassemble les exilés d’Israël;
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ac 14:16.
  - type: text
    content: Il n’a pas agi de même pour toutes les nations,
  - type: text
    content: Et elles ne connaissent point ses ordonnances.
  - type: text
    content: Louez l’Éternel!
  '3':
  - type: text
    content: Il guérit ceux qui ont le cœur brisé,
  - type: note
    content: Ex 15:26. Job 5:18.
  - type: text
    content: Et il panse leurs blessures.
  '4':
  - type: text
    content: ' '
  - type: note
    content: És 40:26.
  - type: text
    content: Il compte le nombre des étoiles,
  - type: text
    content: Il leur donne à toutes des noms.
  '5':
  - type: text
    content: Notre Seigneur est grand, puissant par sa force,
  - type: text
    content: Son intelligence n’a point de limite.
  '6':
  - type: text
    content: L’Éternel soutient les malheureux,
  - type: text
    content: Il abaisse les méchants jusqu’à terre.
  '7':
  - type: text
    content: Chantez à l’Éternel avec actions de grâces,
  - type: text
    content: Célébrez notre Dieu avec la harpe!
  '8':
  - type: text
    content: ' '
  - type: note
    content: Os 2:20, 21.
  - type: text
    content: Il couvre les cieux de nuages,
  - type: text
    content: Il prépare la pluie pour la terre;
  - type: note
    content: Job 28:26, 27. Ps 104:14.
  - type: text
    content: Il fait germer l’herbe sur les montagnes.
  '9':
  - type: text
    content: Il donne la nourriture au bétail,
  - type: text
    content: Aux petits du corbeau quand ils crient,
