document_id: HAB.2
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-4: cf. Hé 10:35-39. Mi 7:7-10.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 21:8
      metadata:
        usfm: ISA.21.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: J’étais à mon poste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je me tenais sur la tour;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je veillais, pour voir ce que l’Éternel me dirait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ce que je répliquerais après ma plainte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L’Éternel m’adressa la parole, et il dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 30:8
      metadata:
        usfm: ISA.30.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Écris la prophétie:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Grave-la sur des tables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin qu’on la lise couramment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car c’est une prophétie dont le temps est déjà fixé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle marche vers son terme, et elle ne mentira pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si elle tarde, attends-la,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car elle s’accomplira, elle s’accomplira certainement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Voici, son âme s’est enflée, elle n’est pas droite en lui;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais le juste vivra par sa foi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Malédictions
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 5-20: cf. Ha 1:12-17. (És 14:3-23; 47. Jé 50; 51.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Pareil à celui qui est ivre et arrogant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’orgueilleux ne demeure pas tranquille;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il élargit sa bouche comme le séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est insatiable comme la mort;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il attire à lui toutes les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il assemble auprès de lui tous les peuples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ne sera-t-il pas pour tous un sujet de sarcasme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De railleries et d’énigmes?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'On dira:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malheur à celui qui accumule ce qui n’est pas à lui!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusques à quand?…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malheur à celui qui augmente le fardeau de ses dettes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tes créanciers ne se lèveront-ils pas soudain?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes oppresseurs ne se réveilleront-ils pas?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu deviendras leur proie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Parce que tu as pillé beaucoup de nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout le reste des peuples te pillera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu as répandu le sang des hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as commis des violences dans le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre la ville et tous ses habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Malheur à celui qui amasse pour sa maison des gains iniques,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin de placer son nid dans un lieu élevé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour se garantir de la main du malheur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: C’est l’opprobre de ta maison que tu as résolu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: En détruisant des peuples nombreux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et c’est contre toi-même que tu as péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Car la pierre crie du milieu de la muraille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le bois qui lie la charpente lui répond.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Malheur à celui qui bâtit une ville avec le sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui fonde une ville avec l’iniquité!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Voici, quand l’Éternel des armées l’a résolu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les peuples travaillent pour le feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les nations se fatiguent en vain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Car la terre sera remplie de la connaissance de la gloire de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme le fond de la mer par les eaux qui le couvrent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Malheur à celui qui fait boire son prochain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A toi qui verses ton outre et qui l’enivres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin de voir sa nudité!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tu seras rassasié de honte plus que de gloire;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bois aussi toi-même, et découvre-toi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: La coupe de la droite de l’Éternel se tournera vers toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’ignominie souillera ta gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Car les violences contre le Liban retomberont sur toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les ravages des bêtes t’effraieront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que tu as répandu le sang des hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et commis des violences dans le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre la ville et tous ses habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A quoi sert une image taillée, pour qu’un ouvrier la taille?
- type: usfm
  marker: q1
  children:
  - type: text
    text: A quoi sert une image en fonte et qui enseigne le mensonge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour que l’ouvrier qui l’a faite place en elle sa confiance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tandis qu’il fabrique des idoles muettes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Malheur à celui qui dit au bois: Lève-toi!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A une pierre muette: Réveille-toi!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Donnera-t-elle instruction?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, elle est garnie d’or et d’argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il n’y a point en elle un esprit qui l’anime.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: L’Éternel est dans son saint temple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que toute la terre fasse silence devant lui!
