document_id: HAB.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-4: cf. Hé 10:35-39. Mi 7:7-10.'
  - type: text
    content: ' '
  - type: note
    content: És 21:8.
  - type: text
    content: J’étais à mon poste,
  - type: text
    content: Et je me tenais sur la tour;
  - type: text
    content: Je veillais, pour voir ce que l’Éternel me dirait,
  - type: text
    content: Et ce que je répliquerais après ma plainte.
  '10':
  - type: text
    content: C’est l’opprobre de ta maison que tu as résolu,
  - type: text
    content: En détruisant des peuples nombreux,
  - type: text
    content: Et c’est contre toi-même que tu as péché.
  '11':
  - type: text
    content: Car la pierre crie du milieu de la muraille,
  - type: text
    content: Et le bois qui lie la charpente lui répond.
  '12':
  - type: text
    content: Malheur à celui qui bâtit une ville avec le sang,
  - type: text
    content: Qui fonde une ville avec l’iniquité!
  '13':
  - type: text
    content: Voici, quand l’Éternel des armées l’a résolu,
  - type: text
    content: Les peuples travaillent pour le feu,
  - type: text
    content: Les nations se fatiguent en vain.
  '14':
  - type: text
    content: Car la terre sera remplie de la connaissance de la gloire de l’Éternel,
  - type: text
    content: Comme le fond de la mer par les eaux qui le couvrent.
  '15':
  - type: text
    content: Malheur à celui qui fait boire son prochain,
  - type: text
    content: A toi qui verses ton outre et qui l’enivres,
  - type: text
    content: Afin de voir sa nudité!
  '16':
  - type: text
    content: Tu seras rassasié de honte plus que de gloire;
  - type: text
    content: Bois aussi toi-même, et découvre-toi!
  - type: text
    content: La coupe de la droite de l’Éternel se tournera vers toi,
  - type: text
    content: Et l’ignominie souillera ta gloire.
  '17':
  - type: text
    content: Car les violences contre le Liban retomberont sur toi,
  - type: text
    content: Et les ravages des bêtes t’effraieront,
  - type: text
    content: Parce que tu as répandu le sang des hommes,
  - type: text
    content: Et commis des violences dans le pays,
  - type: text
    content: Contre la ville et tous ses habitants.
  '18':
  - type: text
    content: A quoi sert une image taillée, pour qu’un ouvrier la taille?
  - type: text
    content: A quoi sert une image en fonte et qui enseigne le mensonge,
  - type: text
    content: Pour que l’ouvrier qui l’a faite place en elle sa confiance,
  - type: text
    content: Tandis qu’il fabrique des idoles muettes?
  '19':
  - type: text
    content: 'Malheur à celui qui dit au bois: Lève-toi!'
  - type: text
    content: 'A une pierre muette: Réveille-toi!'
  - type: text
    content: Donnera-t-elle instruction?
  - type: text
    content: Voici, elle est garnie d’or et d’argent,
  - type: text
    content: Mais il n’y a point en elle un esprit qui l’anime.
  '2':
  - type: text
    content: 'L’Éternel m’adressa la parole, et il dit:'
  - type: note
    content: És 30:8.
  - type: text
    content: 'Écris la prophétie:'
  - type: text
    content: Grave-la sur des tables,
  - type: text
    content: Afin qu’on la lise couramment.
  '20':
  - type: text
    content: L’Éternel est dans son saint temple.
  - type: text
    content: Que toute la terre fasse silence devant lui!
  '3':
  - type: text
    content: Car c’est une prophétie dont le temps est déjà fixé,
  - type: text
    content: Elle marche vers son terme, et elle ne mentira pas;
  - type: text
    content: Si elle tarde, attends-la,
  - type: text
    content: Car elle s’accomplira, elle s’accomplira certainement.
  '4':
  - type: text
    content: Voici, son âme s’est enflée, elle n’est pas droite en lui;
  - type: text
    content: Mais le juste vivra par sa foi.
  - type: heading
    content: Malédictions
  - type: heading
    content: 'V. 5-20: cf. Ha 1:12-17. (És 14:3-23; 47. Jé 50; 51.)'
  '5':
  - type: text
    content: Pareil à celui qui est ivre et arrogant,
  - type: text
    content: L’orgueilleux ne demeure pas tranquille;
  - type: text
    content: Il élargit sa bouche comme le séjour des morts,
  - type: text
    content: Il est insatiable comme la mort;
  - type: text
    content: Il attire à lui toutes les nations,
  - type: text
    content: Il assemble auprès de lui tous les peuples.
  '6':
  - type: text
    content: Ne sera-t-il pas pour tous un sujet de sarcasme,
  - type: text
    content: De railleries et d’énigmes?
  - type: text
    content: 'On dira:'
  - type: text
    content: Malheur à celui qui accumule ce qui n’est pas à lui!
  - type: text
    content: Jusques à quand?…
  - type: text
    content: Malheur à celui qui augmente le fardeau de ses dettes!
  '7':
  - type: text
    content: Tes créanciers ne se lèveront-ils pas soudain?
  - type: text
    content: Tes oppresseurs ne se réveilleront-ils pas?
  - type: text
    content: Et tu deviendras leur proie.
  '8':
  - type: text
    content: Parce que tu as pillé beaucoup de nations,
  - type: text
    content: Tout le reste des peuples te pillera;
  - type: text
    content: Car tu as répandu le sang des hommes,
  - type: text
    content: Tu as commis des violences dans le pays,
  - type: text
    content: Contre la ville et tous ses habitants.
  '9':
  - type: text
    content: Malheur à celui qui amasse pour sa maison des gains iniques,
  - type: text
    content: Afin de placer son nid dans un lieu élevé,
  - type: text
    content: Pour se garantir de la main du malheur!
