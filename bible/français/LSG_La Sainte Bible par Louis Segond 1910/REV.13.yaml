document_id: REV.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La bête qui monte de la mer
  - type: heading
    content: 'V. 1-10: cf. Da 7:3, 7, 8, 19-25. (Ap 17:3, 7-17; 19:19-21.)'
  - type: text
    content: 'Puis je vis monter de la mer '
  - type: note
    content: Da 7:20. Ap 17:3.
  - type: text
    content: 'une bête qui avait dix cornes et sept têtes, et sur ses cornes dix diadèmes, et sur ses têtes des noms de blasphème. '
  '10':
  - type: text
    content: 'Si quelqu’un mène en captivité, il ira en captivité; '
  - type: note
    content: Ge 9:6. Mt 26:52.
  - type: text
    content: 'si quelqu’un tue par l’épée, il faut qu’il soit tué par l’épée. '
  - type: note
    content: Ap 14:12.
  - type: text
    content: C’est ici la persévérance et la foi des saints.
  - type: heading
    content: La bête qui monte de la terre
  - type: heading
    content: 'V. 11-18: cf. Ap 19:20; 14:9-11.'
  '11':
  - type: text
    content: 'Puis je vis monter '
  - type: note
    content: Ap 11:7.
  - type: text
    content: 'de la terre une autre bête, qui avait deux cornes semblables à celles d’un agneau, et qui parlait comme un dragon. '
  '12':
  - type: text
    content: 'Elle exerçait toute l’autorité de la première bête '
  - type: note
    content: Ap 19:20.
  - type: text
    content: 'en sa présence, et elle faisait que la terre et ses habitants adoraient la première bête, dont '
  - type: note
    content: Ap 13:3.
  - type: text
    content: 'la blessure mortelle avait été guérie. '
  '13':
  - type: text
    content: 'Elle opérait '
  - type: note
    content: 2 Th 2:9. Ap 16:14.
  - type: text
    content: 'de grands prodiges, même jusqu’à faire descendre du feu du ciel sur la terre, à la vue des hommes. '
  '14':
  - type: text
    content: 'Et '
  - type: note
    content: De 13:1. Mt 24:24. Ap 16:14; 19:20.
  - type: text
    content: 'elle séduisait les habitants de la terre par les prodiges qu’il lui était donné d’opérer en présence de la bête, disant aux habitants de la terre de faire une image à la bête qui avait la blessure de l’épée et qui vivait. '
  '15':
  - type: text
    content: 'Et il lui fut donné d’animer l’image de la bête, afin que l’image de la bête parlât, et qu’elle fît que tous ceux qui n’adoreraient pas '
  - type: note
    content: Ap 19:20.
  - type: text
    content: 'l’image de la bête fussent tués. '
  '16':
  - type: text
    content: 'Et elle fit que tous, petits et grands, riches et pauvres, libres et esclaves, reçussent '
  - type: note
    content: Ap 19:20.
  - type: text
    content: 'une marque sur leur main droite ou sur leur front, '
  '17':
  - type: text
    content: 'et que personne ne pût acheter ni vendre, sans avoir la marque, '
  - type: note
    content: Ap 14:11.
  - type: text
    content: 'le nom de la bête ou le nombre de son nom. '
  '18':
  - type: text
    content: 'C’est ici '
  - type: note
    content: Ap 17:9.
  - type: text
    content: la sagesse. Que celui qui a de l’intelligence calcule le nombre de la bête. Car c’est un nombre d’homme, et son nombre est six cent soixante-six.
  '2':
  - type: text
    content: 'La bête que je vis était semblable à un léopard; ses pieds étaient comme ceux d’un ours, et sa gueule comme une gueule de lion. Le dragon lui donna sa puissance, et son trône, et une grande autorité. '
  '3':
  - type: text
    content: 'Et je vis l’une de ses têtes comme blessée à mort; mais sa blessure mortelle fut guérie. Et toute la terre était dans l’admiration derrière la bête. '
  '4':
  - type: text
    content: 'Et ils adorèrent le dragon, parce qu’il avait donné l’autorité à la bête; ils adorèrent la bête, en disant: Qui est '
  - type: note
    content: Ap 18:18.
  - type: text
    content: 'semblable à la bête, et qui peut combattre contre elle? '
  '5':
  - type: text
    content: 'Et il lui fut donné une bouche qui proférait des paroles arrogantes et des blasphèmes; et il lui fut donné le pouvoir d’agir pendant '
  - type: note
    content: Ap 11:2.
  - type: text
    content: 'quarante-deux mois. '
  '6':
  - type: text
    content: 'Et elle ouvrit sa bouche pour proférer des blasphèmes contre Dieu, pour blasphémer son nom, et son tabernacle, et ceux qui habitent dans le ciel. '
  '7':
  - type: text
    content: 'Et il '
  - type: note
    content: Da 7:21. Ap 11:7.
  - type: text
    content: 'lui fut donné de faire la guerre aux saints, et de les vaincre. Et il lui fut donné autorité sur toute tribu, tout peuple, toute langue, et toute nation. '
  '8':
  - type: text
    content: 'Et tous les habitants de la terre l’adoreront, ceux '
  - type: note
    content: Ex 32:33. Ph 4:3. Ap 3:5; 20:12; 21:27.
  - type: text
    content: 'dont le nom n’a pas été écrit '
  - type: note
    content: Ap 17:8.
  - type: text
    content: 'dès la fondation du monde dans le livre de vie de l’agneau qui a été immolé. '
  '9':
  - type: text
    content: 'Si quelqu’un a des oreilles, qu’il entende! '
