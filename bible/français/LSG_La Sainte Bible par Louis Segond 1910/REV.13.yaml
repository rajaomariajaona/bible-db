document_id: REV.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La bête qui monte de la mer
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. Da 7:3, 7, 8, 19-25. (Ap 17:3, 7-17; 19:19-21.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis je vis monter de la mer '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 7:20
      metadata:
        usfm: DAN.7.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 17:3
      metadata:
        usfm: REV.17.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une bête qui avait dix cornes et sept têtes, et sur ses cornes dix diadèmes, et sur ses têtes des noms de blasphème. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La bête que je vis était semblable à un léopard; ses pieds étaient comme ceux d’un ours, et sa gueule comme une gueule de lion. Le dragon lui donna sa puissance, et son trône, et une grande autorité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et je vis l’une de ses têtes comme blessée à mort; mais sa blessure mortelle fut guérie. Et toute la terre était dans l’admiration derrière la bête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et ils adorèrent le dragon, parce qu’il avait donné l’autorité à la bête; ils adorèrent la bête, en disant: Qui est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 18:18
      metadata:
        usfm: REV.18.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'semblable à la bête, et qui peut combattre contre elle? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et il lui fut donné une bouche qui proférait des paroles arrogantes et des blasphèmes; et il lui fut donné le pouvoir d’agir pendant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 11:2
      metadata:
        usfm: REV.11.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'quarante-deux mois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et elle ouvrit sa bouche pour proférer des blasphèmes contre Dieu, pour blasphémer son nom, et son tabernacle, et ceux qui habitent dans le ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et il '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 7:21
      metadata:
        usfm: DAN.7.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 11:7
      metadata:
        usfm: REV.11.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'lui fut donné de faire la guerre aux saints, et de les vaincre. Et il lui fut donné autorité sur toute tribu, tout peuple, toute langue, et toute nation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et tous les habitants de la terre l’adoreront, ceux '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 32:33
      metadata:
        usfm: EXO.32.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 4:3
      metadata:
        usfm: PHP.4.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 3:5
      metadata:
        usfm: REV.3.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:12
      metadata:
        usfm: REV.20.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:27
      metadata:
        usfm: REV.21.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dont le nom n’a pas été écrit '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 17:8
      metadata:
        usfm: REV.17.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dès la fondation du monde dans le livre de vie de l’agneau qui a été immolé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Si quelqu’un a des oreilles, qu’il entende! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Si quelqu’un mène en captivité, il ira en captivité; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 9:6
      metadata:
        usfm: GEN.9.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:52
      metadata:
        usfm: MAT.26.52
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'si quelqu’un tue par l’épée, il faut qu’il soit tué par l’épée. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 14:12
      metadata:
        usfm: REV.14.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: C’est ici la persévérance et la foi des saints.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La bête qui monte de la terre
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-18: cf. Ap 19:20; 14:9-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Puis je vis monter '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 11:7
      metadata:
        usfm: REV.11.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de la terre une autre bête, qui avait deux cornes semblables à celles d’un agneau, et qui parlait comme un dragon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Elle exerçait toute l’autorité de la première bête '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 19:20
      metadata:
        usfm: REV.19.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en sa présence, et elle faisait que la terre et ses habitants adoraient la première bête, dont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 13:3
      metadata:
        usfm: REV.13.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la blessure mortelle avait été guérie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Elle opérait '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 2:9
      metadata:
        usfm: 2TH.2.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 16:14
      metadata:
        usfm: REV.16.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de grands prodiges, même jusqu’à faire descendre du feu du ciel sur la terre, à la vue des hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 13:1
      metadata:
        usfm: DEU.13.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 24:24
      metadata:
        usfm: MAT.24.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 16:14
      metadata:
        usfm: REV.16.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:20
      metadata:
        usfm: REV.19.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'elle séduisait les habitants de la terre par les prodiges qu’il lui était donné d’opérer en présence de la bête, disant aux habitants de la terre de faire une image à la bête qui avait la blessure de l’épée et qui vivait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et il lui fut donné d’animer l’image de la bête, afin que l’image de la bête parlât, et qu’elle fît que tous ceux qui n’adoreraient pas '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 19:20
      metadata:
        usfm: REV.19.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’image de la bête fussent tués. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et elle fit que tous, petits et grands, riches et pauvres, libres et esclaves, reçussent '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 19:20
      metadata:
        usfm: REV.19.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une marque sur leur main droite ou sur leur front, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'et que personne ne pût acheter ni vendre, sans avoir la marque, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 14:11
      metadata:
        usfm: REV.14.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le nom de la bête ou le nombre de son nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'C’est ici '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 17:9
      metadata:
        usfm: REV.17.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: la sagesse. Que celui qui a de l’intelligence calcule le nombre de la bête. Car c’est un nombre d’homme, et son nombre est six cent soixante-six.
