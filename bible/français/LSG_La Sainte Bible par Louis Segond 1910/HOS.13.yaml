document_id: HOS.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Endurcissement et ruine d’Israël
  - type: heading
    content: 'V. 1-8: cf. Os 10:1-10. De 32:9-25.'
  - type: text
    content: 'Lorsqu’Éphraïm parlait, c’était une terreur:'
  - type: text
    content: Il s’élevait en Israël.
  - type: text
    content: Mais il s’est rendu coupable par Baal, et il est mort.
  '10':
  - type: text
    content: Où donc est ton roi?
  - type: text
    content: Qu’il te délivre dans toutes tes villes!
  - type: text
    content: 'Où sont tes juges, au sujet desquels tu disais:'
  - type: text
    content: Donne-moi un roi et des princes?
  '11':
  - type: text
    content: 'Je t’ai donné un '
  - type: note
    content: 1 S 8:5; 15:23; 16:1.
  - type: text
    content: roi dans ma colère,
  - type: text
    content: Je te l’ôterai dans ma fureur.
  '12':
  - type: text
    content: L’iniquité d’Éphraïm est gardée,
  - type: text
    content: Son péché est mis en réserve.
  '13':
  - type: text
    content: Les douleurs de celle qui enfante viendront pour lui;
  - type: text
    content: C’est un enfant peu sage,
  - type: text
    content: Qui, au terme voulu, ne sort pas du sein maternel.
  '14':
  - type: text
    content: Je les rachèterai de la puissance du séjour des morts,
  - type: text
    content: Je les délivrerai de la mort.
  - type: note
    content: És 25:8. 1 Co 15:55.
  - type: text
    content: O mort, où est ta peste?
  - type: text
    content: Séjour des morts, où est ta destruction?
  - type: text
    content: Mais le repentir se dérobe à mes regards!
  '15':
  - type: text
    content: Éphraïm a beau être fertile au milieu de ses frères,
  - type: text
    content: Le vent d’orient viendra, le vent de l’Éternel s’élèvera du désert,
  - type: text
    content: Desséchera ses sources, tarira ses fontaines.
  - type: text
    content: On pillera le trésor de tous les objets précieux.
  '16':
  - type: text
    content: Samarie sera punie, parce qu’elle s’est révoltée contre son Dieu.
  - type: text
    content: Ils tomberont par l’épée;
  - type: text
    content: 'Leurs petits enfants seront '
  - type: note
    content: Os 10:14.
  - type: text
    content: écrasés,
  - type: text
    content: Et l’on fendra le ventre de leurs femmes enceintes.
  '2':
  - type: text
    content: Maintenant ils continuent à pécher,
  - type: text
    content: Ils se font avec leur argent des images en fonte,
  - type: text
    content: Des idoles de leur invention;
  - type: text
    content: 'Toutes sont '
  - type: note
    content: Os 8:6.
  - type: text
    content: l’œuvre des artisans.
  - type: text
    content: 'On dit à leur sujet:'
  - type: text
    content: Que ceux qui sacrifient baisent les veaux!
  '3':
  - type: text
    content: C’est pourquoi ils seront comme la nuée du matin,
  - type: text
    content: Comme la rosée qui bientôt se dissipe,
  - type: text
    content: Comme la balle emportée par le vent hors de l’aire,
  - type: text
    content: Comme la fumée qui sort d’une fenêtre.
  '4':
  - type: text
    content: 'Et moi, je suis l’Éternel, ton Dieu, '
  - type: note
    content: És 43:11. Os 12:10.
  - type: text
    content: dès le pays d’Égypte.
  - type: text
    content: 'Tu ne connais d’autre Dieu '
  - type: note
    content: 2 S 22:32. Ps 18:32.
  - type: text
    content: que moi,
  - type: text
    content: Et il n’y a de sauveur que moi.
  '5':
  - type: text
    content: Je t’ai connu dans le désert,
  - type: text
    content: Dans une terre aride.
  '6':
  - type: text
    content: ' '
  - type: note
    content: De 32:15.
  - type: text
    content: Ils se sont rassasiés dans leurs pâturages;
  - type: text
    content: Ils se sont rassasiés, et leur cœur s’est enflé;
  - type: text
    content: 'C’est pourquoi ils m’ont '
  - type: note
    content: Os 8:14.
  - type: text
    content: oublié.
  '7':
  - type: text
    content: Je serai pour eux comme un lion;
  - type: text
    content: Comme une panthère, je les épierai sur la route.
  '8':
  - type: text
    content: Je les attaquerai, comme une ourse à qui l’on a enlevé ses petits,
  - type: text
    content: Et je déchirerai l’enveloppe de leur cœur;
  - type: text
    content: Je les dévorerai, comme une lionne;
  - type: text
    content: Les bêtes des champs les mettront en pièces.
  - type: heading
    content: 'V. 9-16: cf. (Os 7:10-16; 10:13-15. 2 R 17:3-6.) 1 Co 15:54-57.'
  '9':
  - type: text
    content: Ce qui cause ta ruine, Israël,
  - type: text
    content: C’est que tu as été contre moi, contre celui qui pouvait te secourir.
