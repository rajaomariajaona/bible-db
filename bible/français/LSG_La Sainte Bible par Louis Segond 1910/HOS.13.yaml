document_id: HOS.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Endurcissement et ruine d’Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. Os 10:1-10. De 32:9-25.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsqu’Éphraïm parlait, c’était une terreur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il s’élevait en Israël.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il s’est rendu coupable par Baal, et il est mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Maintenant ils continuent à pécher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se font avec leur argent des images en fonte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des idoles de leur invention;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Toutes sont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 8:6
      metadata:
        usfm: HOS.8.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: l’œuvre des artisans.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'On dit à leur sujet:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ceux qui sacrifient baisent les veaux!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C’est pourquoi ils seront comme la nuée du matin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme la rosée qui bientôt se dissipe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme la balle emportée par le vent hors de l’aire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme la fumée qui sort d’une fenêtre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et moi, je suis l’Éternel, ton Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 43:11
      metadata:
        usfm: ISA.43.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 12:10
      metadata:
        usfm: HOS.12.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: dès le pays d’Égypte.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu ne connais d’autre Dieu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 22:32
      metadata:
        usfm: 2SA.22.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 18:32
      metadata:
        usfm: PSA.18.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: que moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il n’y a de sauveur que moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je t’ai connu dans le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans une terre aride.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:15
      metadata:
        usfm: DEU.32.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils se sont rassasiés dans leurs pâturages;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se sont rassasiés, et leur cœur s’est enflé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C’est pourquoi ils m’ont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 8:14
      metadata:
        usfm: HOS.8.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: oublié.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je serai pour eux comme un lion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme une panthère, je les épierai sur la route.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je les attaquerai, comme une ourse à qui l’on a enlevé ses petits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je déchirerai l’enveloppe de leur cœur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les dévorerai, comme une lionne;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les bêtes des champs les mettront en pièces.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-16: cf. (Os 7:10-16; 10:13-15. 2 R 17:3-6.) 1 Co 15:54-57.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ce qui cause ta ruine, Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est que tu as été contre moi, contre celui qui pouvait te secourir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Où donc est ton roi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il te délivre dans toutes tes villes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Où sont tes juges, au sujet desquels tu disais:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Donne-moi un roi et des princes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je t’ai donné un '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 8:5
      metadata:
        usfm: 1SA.8.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:23
      metadata:
        usfm: 1SA.15.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:1
      metadata:
        usfm: 1SA.16.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: roi dans ma colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te l’ôterai dans ma fureur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L’iniquité d’Éphraïm est gardée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son péché est mis en réserve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les douleurs de celle qui enfante viendront pour lui;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est un enfant peu sage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui, au terme voulu, ne sort pas du sein maternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je les rachèterai de la puissance du séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les délivrerai de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 25:8
      metadata:
        usfm: ISA.25.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:55
      metadata:
        usfm: 1CO.15.55
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: O mort, où est ta peste?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Séjour des morts, où est ta destruction?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais le repentir se dérobe à mes regards!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Éphraïm a beau être fertile au milieu de ses frères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le vent d’orient viendra, le vent de l’Éternel s’élèvera du désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Desséchera ses sources, tarira ses fontaines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On pillera le trésor de tous les objets précieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Samarie sera punie, parce qu’elle s’est révoltée contre son Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils tomberont par l’épée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Leurs petits enfants seront '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 10:14
      metadata:
        usfm: HOS.10.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: écrasés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’on fendra le ventre de leurs femmes enceintes.
