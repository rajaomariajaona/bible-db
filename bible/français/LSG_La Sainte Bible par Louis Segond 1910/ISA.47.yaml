document_id: ISA.47,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Babylone abaissée
  - type: heading
    content: 'V. 1-15: cf. (És 13. Jé 50; 51. Da 5.) Ap 18.'
  - type: text
    content: 'Descends, et '
  - type: note
    content: És 26:5.
  - type: text
    content: assieds-toi dans la poussière,
  - type: text
    content: Vierge, fille de Babylone!
  - type: text
    content: Assieds-toi à terre, sans trône,
  - type: text
    content: Fille des Chaldéens!
  - type: text
    content: On ne t’appellera plus délicate et voluptueuse.
  '10':
  - type: text
    content: Tu avais confiance dans ta méchanceté,
  - type: text
    content: 'Tu disais: Personne ne me voit!'
  - type: text
    content: Ta sagesse et ta science t’ont séduite.
  - type: text
    content: 'Et tu disais en ton cœur:'
  - type: text
    content: Moi, et rien que moi!
  '11':
  - type: text
    content: Le malheur viendra sur toi,
  - type: text
    content: Sans que tu en voies l’aurore;
  - type: text
    content: La calamité tombera sur toi,
  - type: text
    content: Sans que tu puisses la conjurer;
  - type: text
    content: Et la ruine fondra sur toi tout à coup,
  - type: text
    content: A l’improviste.
  '12':
  - type: text
    content: Reste donc au milieu de tes enchantements
  - type: text
    content: Et de la multitude de tes sortilèges,
  - type: text
    content: Auxquels tu as consacré ton travail dès ta jeunesse;
  - type: text
    content: Peut-être pourras-tu en tirer profit,
  - type: text
    content: Peut-être deviendras-tu redoutable.
  '13':
  - type: text
    content: 'Tu t’es fatiguée à force de consulter:'
  - type: text
    content: Qu’ils se lèvent donc et qu’ils te sauvent,
  - type: text
    content: Ceux qui connaissent le ciel,
  - type: text
    content: Qui observent les astres,
  - type: text
    content: Qui annoncent, d’après les nouvelles lunes,
  - type: text
    content: Ce qui doit t’arriver!
  '14':
  - type: text
    content: Voici, ils sont comme de la paille, le feu les consume,
  - type: text
    content: 'Ils ne sauveront pas leur vie des flammes:'
  - type: text
    content: Ce ne sera pas du charbon dont on se chauffe,
  - type: text
    content: Ni un feu auprès duquel on s’assied.
  '15':
  - type: text
    content: Tel sera le sort de ceux que tu te fatiguais à consulter.
  - type: text
    content: Et ceux avec qui tu as trafiqué dès ta jeunesse
  - type: text
    content: 'Se disperseront chacun de son côté:'
  - type: text
    content: Il n’y aura personne qui vienne à ton secours.
  '2':
  - type: text
    content: Prends les meules, et mouds de la farine;
  - type: text
    content: Ote ton voile, relève les pans de ta robe,
  - type: text
    content: Découvre tes jambes, traverse les fleuves!
  '3':
  - type: text
    content: ' '
  - type: note
    content: És 3:17. Na 3:5.
  - type: text
    content: Ta nudité sera découverte,
  - type: text
    content: Et ta honte sera vue.
  - type: text
    content: J’exercerai ma vengeance,
  - type: text
    content: Je n’épargnerai personne.
  '4':
  - type: text
    content: Notre rédempteur, c’est celui qui s’appelle l’Éternel des armées,
  - type: text
    content: C’est le Saint d’Israël.
  '5':
  - type: text
    content: Assieds-toi en silence, et va dans les ténèbres,
  - type: text
    content: Fille des Chaldéens!
  - type: text
    content: On ne t’appellera plus la souveraine des royaumes.
  '6':
  - type: text
    content: J’étais irrité contre mon peuple,
  - type: text
    content: J’avais profané mon héritage,
  - type: text
    content: 'Et je les avais livrés entre tes mains:'
  - type: text
    content: Tu n’as pas eu pour eux de la compassion,
  - type: text
    content: Tu as durement appesanti ton joug sur le vieillard.
  '7':
  - type: text
    content: 'Tu disais: A toujours je serai '
  - type: note
    content: Ap 18:7.
  - type: text
    content: souveraine!
  - type: text
    content: Tu n’as point mis dans ton esprit,
  - type: text
    content: Tu n’as point songé que cela prendrait fin.
  '8':
  - type: text
    content: Écoute maintenant ceci, voluptueuse,
  - type: text
    content: Qui t’assieds avec assurance,
  - type: text
    content: 'Et qui dis en ton cœur:'
  - type: text
    content: Moi, et rien que moi!
  - type: text
    content: Je ne serai jamais veuve,
  - type: text
    content: Et je ne serai jamais privée d’enfants!
  '9':
  - type: text
    content: ' '
  - type: note
    content: És 51:19.
  - type: text
    content: Ces deux choses t’arriveront subitement, au même jour,
  - type: text
    content: La privation d’enfants et le veuvage;
  - type: text
    content: Elles fondront en plein sur toi,
  - type: text
    content: Malgré la multitude de tes sortilèges,
  - type: text
    content: Malgré le grand nombre de tes enchantements.
