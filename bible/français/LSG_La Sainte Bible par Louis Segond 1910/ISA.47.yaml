document_id: ISA.47,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Babylone abaissée
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-15: cf. (És 13. Jé 50; 51. Da 5.) Ap 18.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Descends, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 26:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: assieds-toi dans la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vierge, fille de Babylone!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Assieds-toi à terre, sans trône,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fille des Chaldéens!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne t’appellera plus délicate et voluptueuse.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tu avais confiance dans ta méchanceté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu disais: Personne ne me voit!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta sagesse et ta science t’ont séduite.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et tu disais en ton cœur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, et rien que moi!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Le malheur viendra sur toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans que tu en voies l’aurore;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La calamité tombera sur toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans que tu puisses la conjurer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la ruine fondra sur toi tout à coup,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A l’improviste.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Reste donc au milieu de tes enchantements
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de la multitude de tes sortilèges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Auxquels tu as consacré ton travail dès ta jeunesse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peut-être pourras-tu en tirer profit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peut-être deviendras-tu redoutable.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tu t’es fatiguée à force de consulter:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils se lèvent donc et qu’ils te sauvent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui connaissent le ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui observent les astres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui annoncent, d’après les nouvelles lunes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce qui doit t’arriver!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Voici, ils sont comme de la paille, le feu les consume,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils ne sauveront pas leur vie des flammes:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce ne sera pas du charbon dont on se chauffe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni un feu auprès duquel on s’assied.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tel sera le sort de ceux que tu te fatiguais à consulter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux avec qui tu as trafiqué dès ta jeunesse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Se disperseront chacun de son côté:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y aura personne qui vienne à ton secours.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Prends les meules, et mouds de la farine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ote ton voile, relève les pans de ta robe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Découvre tes jambes, traverse les fleuves!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 3:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Na 3:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ta nudité sera découverte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ta honte sera vue.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’exercerai ma vengeance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n’épargnerai personne.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Notre rédempteur, c’est celui qui s’appelle l’Éternel des armées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est le Saint d’Israël.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Assieds-toi en silence, et va dans les ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fille des Chaldéens!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne t’appellera plus la souveraine des royaumes.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: J’étais irrité contre mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’avais profané mon héritage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et je les avais livrés entre tes mains:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu n’as pas eu pour eux de la compassion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as durement appesanti ton joug sur le vieillard.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tu disais: A toujours je serai '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 18:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: souveraine!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu n’as point mis dans ton esprit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu n’as point songé que cela prendrait fin.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Écoute maintenant ceci, voluptueuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui t’assieds avec assurance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et qui dis en ton cœur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, et rien que moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne serai jamais veuve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ne serai jamais privée d’enfants!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 51:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ces deux choses t’arriveront subitement, au même jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La privation d’enfants et le veuvage;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles fondront en plein sur toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malgré la multitude de tes sortilèges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malgré le grand nombre de tes enchantements.
