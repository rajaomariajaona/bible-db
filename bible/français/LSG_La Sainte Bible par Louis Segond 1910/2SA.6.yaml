document_id: 2SA.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’arche transportée par David de Kirjath-Jearim à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. (1 S 6:19-21; 7:1, 2.) 1 Ch 13. Ps 132.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Ch 13:5, etc.
    marker-yv: yv-n
  - type: text
    text: 'David rassembla encore toute l’élite d’Israël, au nombre de trente mille hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et David, avec tout le peuple qui était auprès de lui, se mit en marche depuis Baalé-Juda, pour faire monter de là l’arche de Dieu, devant laquelle est invoqué le nom de l’Éternel des armées qui réside entre les chérubins au-dessus de l’arche. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils mirent sur un '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 S 6:7, 8, etc.
    marker-yv: yv-n
  - type: text
    text: 'char neuf l’arche de Dieu, et l’emportèrent de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 7:1
      metadata:
        usfm: 1SA.7.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la maison d’Abinadab sur la colline; Uzza et Achjo, fils d’Abinadab, conduisaient le char neuf. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils l’emportèrent donc de la maison d’Abinadab sur la colline; Uzza marchait à côté de l’arche de Dieu, et Achjo allait devant l’arche. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'David et toute la maison d’Israël jouaient devant l’Éternel de toutes sortes d’instruments de bois de cyprès, des harpes, des luths, des tambourins, des sistres et des cymbales. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 13:9
      metadata:
        usfm: 1CH.13.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu’ils furent arrivés à l’aire de Nacon, Uzza étendit la main vers l’arche de Dieu et la saisit, parce que les bœufs la faisaient pencher. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'La colère de l’Éternel s’enflamma contre Uzza, et Dieu le frappa sur place à cause de sa faute. Uzza mourut là, près de l’arche de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'David fut irrité de ce que l’Éternel avait frappé Uzza d’un tel châtiment. Et ce lieu a été appelé jusqu’à ce jour Pérets-Uzza. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'David eut peur de l’Éternel en ce jour-là, et il dit: Comment l’arche de l’Éternel entrerait-elle chez moi? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il ne voulut pas retirer l’arche de l’Éternel chez lui dans la cité de David, et il la fit conduire dans la maison d’Obed-Édom de Gath. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’arche de l’Éternel resta trois mois dans la maison d’Obed-Édom de Gath, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 13:14
      metadata:
        usfm: 1CH.13.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: l’Éternel bénit Obed-Édom et toute sa maison.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-23: cf. 1 Ch 15; 16. Ps 24. Ha 3:18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'On vint dire au roi David: L’Éternel a béni la maison d’Obed-Édom et tout ce qui est à lui, à cause de l’arche de Dieu. Et David se mit en route, et il fit monter l’arche de Dieu depuis la maison d’Obed-Édom jusqu’à la cité de David, au milieu des réjouissances. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand ceux qui portaient l’arche de l’Éternel eurent fait six pas, on sacrifia un bœuf et un veau gras. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'David dansait de toute sa force devant l’Éternel, et il était ceint d’un éphod de lin. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'David et toute la maison d’Israël firent monter l’arche de l’Éternel avec des cris de joie et au son des trompettes. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Comme l’arche de l’Éternel entrait dans la cité de David, Mical, fille de Saül, regardait par la fenêtre, et, voyant le roi David sauter et danser devant l’Éternel, elle le méprisa dans son cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Après qu’on eut amené l’arche de l’Éternel, on la mit à sa '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 15:1
      metadata:
        usfm: 1CH.15.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:1
      metadata:
        usfm: 1CH.16.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'place au milieu de la tente que David avait dressée pour elle; et David offrit devant l’Éternel des holocaustes et des sacrifices d’actions de grâces. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Quand David eut achevé d’offrir les holocaustes et les sacrifices d’actions de grâces, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 16:2
      metadata:
        usfm: 1CH.16.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il bénit le peuple au nom de l’Éternel des armées. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Puis il distribua à tout le peuple, à toute la multitude d’Israël, hommes et femmes, à chacun un pain, une portion de viande et un gâteau de raisins. Et tout le peuple s’en alla, chacun dans sa maison. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'David s’en retourna pour bénir sa maison, et Mical, fille de Saül, sortit à sa rencontre. Elle dit: Quel honneur aujourd’hui pour le roi d’Israël de s’être découvert aux yeux des servantes de ses serviteurs, comme se découvrirait un homme de rien! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'David répondit à Mical: C’est devant l’Éternel, qui m’a choisi de préférence à ton père et à toute sa maison pour m’établir chef sur le peuple de l’Éternel, sur Israël, c’est devant l’Éternel que j’ai dansé. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Je veux paraître encore plus vil que cela, et m’abaisser à mes propres yeux; néanmoins je serai en honneur auprès des servantes dont tu parles. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Or Mical, fille de Saül, n’eut point d’enfants jusqu’au jour de sa mort.
