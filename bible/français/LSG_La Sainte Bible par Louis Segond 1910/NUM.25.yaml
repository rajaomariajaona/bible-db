document_id: NUM.25,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Idolâtrie dans les plaines de Moab
  - type: heading
    content: 'V. 1-15: cf. Ap 2:14. (De 4:3, 4. 1 Co 10:8. Ps 106:28-31.)'
  - type: text
    content: ' '
  - type: note
    content: No 31:16; 33:49.
  - type: text
    content: 'Israël demeurait à Sittim; et le peuple commença à se livrer à la débauche avec les filles de Moab. '
  '10':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '11':
  - type: text
    content: 'Phinées, fils d’Éléazar, fils du sacrificateur Aaron, a détourné ma fureur de dessus les enfants d’Israël, parce qu’il a été animé '
  - type: note
    content: 2 Co 11:2.
  - type: text
    content: 'de mon zèle au milieu d’eux; et je n’ai point, dans ma colère, consumé les enfants d’Israël. '
  '12':
  - type: text
    content: 'C’est pourquoi tu diras que je '
  - type: note
    content: Ps 106:31.
  - type: text
    content: 'traite avec lui une alliance de paix. '
  '13':
  - type: text
    content: 'Ce sera pour lui et pour sa postérité après lui l’alliance d’un sacerdoce perpétuel, parce qu’il a été zélé pour son Dieu, et qu’il a fait l’expiation pour les enfants d’Israël. '
  '14':
  - type: text
    content: 'L’homme d’Israël, qui fut tué avec la Madianite, s’appelait Zimri, fils de Salu; il était chef d’une maison paternelle des Siméonites. '
  '15':
  - type: text
    content: La femme qui fut tuée, la Madianite, s’appelait Cozbi, fille de Tsur, chef des peuplades issues d’une maison paternelle en Madian.
  - type: heading
    content: 'V. 16-18: cf. No 31.'
  '16':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '17':
  - type: text
    content: 'Traite les Madianites '
  - type: note
    content: No 31:2.
  - type: text
    content: 'en ennemis, et tuez-les; '
  '18':
  - type: text
    content: 'car ils se sont montrés '
  - type: note
    content: Ap 18:6.
  - type: text
    content: vos ennemis, en vous séduisant par leurs ruses, dans l’affaire de Peor, et dans l’affaire de Cozbi, fille d’un chef de Madian, leur sœur, tuée le jour de la plaie qui eut lieu à l’occasion de Peor.
  '2':
  - type: note
    content: Ps 106:28. Os 9:10.
  - type: text
    content: 'Elles invitèrent le peuple aux sacrifices de leurs dieux; et le peuple mangea, et se prosterna devant leurs dieux. '
  '3':
  - type: text
    content: 'Israël s’attacha à Baal-Peor, et '
  - type: note
    content: Ps 106:29.
  - type: text
    content: 'la colère de l’Éternel s’enflamma contre Israël. '
  '4':
  - type: text
    content: 'L’Éternel dit à Moïse: '
  - type: note
    content: De 4:3. Jos 22:17.
  - type: text
    content: 'Assemble tous les chefs du peuple, et fais pendre les coupables devant l’Éternel en face du soleil, afin que la colère ardente de l’Éternel se détourne d’Israël. '
  '5':
  - type: text
    content: 'Moïse dit aux juges d’Israël: Que chacun de vous tue ceux de ses gens qui se sont attachés à Baal-Peor. '
  '6':
  - type: text
    content: 'Et voici, un homme des enfants d’Israël vint et amena vers ses frères une Madianite, sous les yeux de Moïse et sous les yeux de toute l’assemblée des enfants d’Israël, tandis qu’ils pleuraient à l’entrée de la tente d’assignation. '
  '7':
  - type: text
    content: 'A cette vue, Phinées, fils d’Éléazar, fils du sacrificateur Aaron, '
  - type: note
    content: Ps 106:30.
  - type: text
    content: 'se leva du milieu de l’assemblée, et prit une lance, dans sa main. '
  '8':
  - type: text
    content: 'Il suivit l’homme d’Israël dans sa tente, et il les perça tous les deux, l’homme d’Israël, puis la femme, par le bas-ventre. Et la plaie s’arrêta parmi les enfants d’Israël. '
  '9':
  - type: note
    content: 1 Co 10:8.
  - type: text
    content: 'Il y en eut vingt-quatre mille qui moururent de la plaie. '
