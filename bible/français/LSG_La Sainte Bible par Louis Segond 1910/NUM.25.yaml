document_id: NUM.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Idolâtrie dans les plaines de Moab
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-15: cf. Ap 2:14. (De 4:3, 4. 1 Co 10:8. Ps 106:28-31.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 31:16
      metadata:
        usfm: NUM.31.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 33:49
      metadata:
        usfm: NUM.33.49
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Israël demeurait à Sittim; et le peuple commença à se livrer à la débauche avec les filles de Moab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 106:28
      metadata:
        usfm: PSA.106.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 9:10
      metadata:
        usfm: HOS.9.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Elles invitèrent le peuple aux sacrifices de leurs dieux; et le peuple mangea, et se prosterna devant leurs dieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Israël s’attacha à Baal-Peor, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 106:29
      metadata:
        usfm: PSA.106.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la colère de l’Éternel s’enflamma contre Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’Éternel dit à Moïse: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:3
      metadata:
        usfm: DEU.4.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 22:17
      metadata:
        usfm: JOS.22.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Assemble tous les chefs du peuple, et fais pendre les coupables devant l’Éternel en face du soleil, afin que la colère ardente de l’Éternel se détourne d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Moïse dit aux juges d’Israël: Que chacun de vous tue ceux de ses gens qui se sont attachés à Baal-Peor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et voici, un homme des enfants d’Israël vint et amena vers ses frères une Madianite, sous les yeux de Moïse et sous les yeux de toute l’assemblée des enfants d’Israël, tandis qu’ils pleuraient à l’entrée de la tente d’assignation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'A cette vue, Phinées, fils d’Éléazar, fils du sacrificateur Aaron, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 106:30
      metadata:
        usfm: PSA.106.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'se leva du milieu de l’assemblée, et prit une lance, dans sa main. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il suivit l’homme d’Israël dans sa tente, et il les perça tous les deux, l’homme d’Israël, puis la femme, par le bas-ventre. Et la plaie s’arrêta parmi les enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:8
      metadata:
        usfm: 1CO.10.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il y en eut vingt-quatre mille qui moururent de la plaie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Phinées, fils d’Éléazar, fils du sacrificateur Aaron, a détourné ma fureur de dessus les enfants d’Israël, parce qu’il a été animé '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:2
      metadata:
        usfm: 2CO.11.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de mon zèle au milieu d’eux; et je n’ai point, dans ma colère, consumé les enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C’est pourquoi tu diras que je '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 106:31
      metadata:
        usfm: PSA.106.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'traite avec lui une alliance de paix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ce sera pour lui et pour sa postérité après lui l’alliance d’un sacerdoce perpétuel, parce qu’il a été zélé pour son Dieu, et qu’il a fait l’expiation pour les enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L’homme d’Israël, qui fut tué avec la Madianite, s’appelait Zimri, fils de Salu; il était chef d’une maison paternelle des Siméonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La femme qui fut tuée, la Madianite, s’appelait Cozbi, fille de Tsur, chef des peuplades issues d’une maison paternelle en Madian.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-18: cf. No 31.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Traite les Madianites '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 31:2
      metadata:
        usfm: NUM.31.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en ennemis, et tuez-les; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'car ils se sont montrés '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 18:6
      metadata:
        usfm: REV.18.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: vos ennemis, en vous séduisant par leurs ruses, dans l’affaire de Peor, et dans l’affaire de Cozbi, fille d’un chef de Madian, leur sœur, tuée le jour de la plaie qui eut lieu à l’occasion de Peor.
