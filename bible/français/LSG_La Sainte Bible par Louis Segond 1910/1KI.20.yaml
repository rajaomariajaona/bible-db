document_id: 1KI.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Victoire d’Achab sur Ben-Hadad, roi de Syrie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-21: cf. 1 S 11:1-11. Jg 7. Ps 75:5, 6; 124:1, etc.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ben-Hadad, roi de Syrie, rassembla toute son armée; il avait avec lui trente-deux rois, des chevaux et des chars. Il monta, mit le siège devant Samarie et l’attaqua. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il envoya dans la ville des messagers à Achab, roi d’Israël, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et lui fit dire: Ainsi parle Ben-Hadad: Ton argent et ton or sont à moi, tes femmes et tes plus beaux enfants sont à moi. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le roi d’Israël répondit: Roi, mon seigneur, comme tu le dis, je suis à toi avec tout ce que j’ai. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les messagers retournèrent, et dirent: Ainsi parle Ben-Hadad: Je t’ai fait dire: Tu me livreras ton argent et ton or, tes femmes et tes enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'J’enverrai donc demain, à cette heure, mes serviteurs chez toi; ils fouilleront ta maison et les maisons de tes serviteurs, ils mettront la main sur tout ce que tu as de précieux, et ils l’emporteront. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le roi d’Israël appela tous les anciens du pays, et il dit: Sentez bien et comprenez que cet homme nous veut du mal; car il m’a envoyé demander mes femmes et mes enfants, mon argent et mon or, et je ne lui avais pas refusé! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tous les anciens et tout le peuple dirent à Achab: Ne l’écoute pas et ne consens pas. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et il dit aux messagers de Ben-Hadad: Dites à mon seigneur le roi: Je ferai tout ce que tu as envoyé demander à ton serviteur la première fois; mais pour cette chose, je ne puis pas la faire. Les messagers s’en allèrent, et lui portèrent la réponse. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ben-Hadad envoya dire à Achab: Que les dieux me traitent dans toute leur rigueur, si la poussière de Samarie suffit pour remplir le creux de la main de tout le peuple qui me suit! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et le roi d’Israël répondit: Que celui qui revêt une armure ne se glorifie pas comme celui qui la dépose! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsque Ben-Hadad reçut cette réponse, il était à boire avec les rois sous les tentes, et il dit à ses serviteurs: Faites vos préparatifs! Et ils firent leurs préparatifs contre la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais voici, un prophète s’approcha d’Achab, roi d’Israël, et il dit: Ainsi parle l’Éternel: Vois-tu toute cette grande multitude? Je vais la livrer aujourd’hui entre tes mains, et tu sauras que je suis l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Achab dit: Par qui? Et il répondit: Ainsi parle l’Éternel: Par les serviteurs des chefs des provinces. Achab dit: Qui engagera le combat? Et il répondit: Toi. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors Achab passa en revue les serviteurs des chefs des provinces, et il s’en trouva deux cent trente-deux; et après eux, il passa en revue tout le peuple, tous les enfants d’Israël, et ils étaient sept mille. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils firent une sortie à midi. Ben-Hadad buvait et s’enivrait sous les tentes avec les trente-deux rois, ses auxiliaires. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les serviteurs des chefs des provinces sortirent les premiers. Ben-Hadad s’informa, et on lui fit ce rapport: Des hommes sont sortis de Samarie. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il dit: S’ils sortent pour la paix, saisissez-les vivants; et s’ils sortent pour le combat, saisissez-les vivants. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Lorsque les serviteurs des chefs des provinces et l’armée qui les suivait furent sortis de la ville, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'chacun frappa son homme, et les Syriens prirent la fuite. Israël les poursuivit. Ben-Hadad, roi de Syrie, se sauva sur un cheval, avec des cavaliers. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le roi d’Israël sortit, frappa les chevaux et les chars, et fit éprouver aux Syriens une grande défaite.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-30: cf. 2 R 13:14-19, 25. Ps 46:9-12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Alors le prophète s’approcha du roi d’Israël, et lui dit: Va, fortifie toi, examine et vois ce que tu as à faire; car, au retour de l’année, le roi de Syrie montera contre toi. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les serviteurs du roi de Syrie lui dirent: Leur dieu est un dieu de montagnes; c’est pourquoi ils ont été plus forts que nous. Mais combattons-les dans la plaine, et l’on verra si nous ne serons pas plus forts qu’eux. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fais encore ceci: ôte chacun des rois de son poste, et remplace-les par des chefs; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'et forme-toi une armée pareille à celle que tu as perdue, avec autant de chevaux et autant de chars. Puis nous les combattrons dans la plaine, et l’on verra si nous ne serons pas plus forts qu’eux. Il les écouta, et fit ainsi. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'L’année suivante, Ben-Hadad passa les Syriens en revue, et monta vers Aphek pour combattre Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les enfants d’Israël furent aussi passés en revue; ils reçurent des vivres, et ils marchèrent à la rencontre des Syriens. Ils campèrent vis-à-vis d’eux, semblables à deux petits troupeaux de chèvres, tandis que les Syriens remplissaient le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'L’homme de Dieu s’approcha, et dit au roi d’Israël: Ainsi parle l’Éternel: Parce que les Syriens ont dit: L’Éternel est un dieu des montagnes et non un dieu des vallées, je livrerai toute cette grande multitude entre tes mains, et vous saurez que je suis l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ils campèrent sept jours en face les uns des autres. Le septième jour, le combat s’engagea, et les enfants d’Israël tuèrent aux Syriens cent mille hommes de pied en un jour. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Le reste s’enfuit à la ville d’Aphek, et la muraille tomba sur vingt-sept mille hommes qui restaient. Ben-Hadad s’était réfugié dans la ville, où il allait de chambre en chambre.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 31-43: cf. 1 S 15. Jé 48:10. 1 R 22:30-38. 2 Co 6:14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ses serviteurs lui dirent: Voici, nous avons appris que les rois de la maison d’Israël sont des rois miséricordieux; nous allons mettre des sacs sur nos reins et des cordes à nos têtes, et nous sortirons vers le roi d’Israël: peut-être qu’il te laissera la vie. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ils se mirent des sacs autour des reins et des cordes autour de la tête, et ils allèrent auprès du roi d’Israël. Ils dirent: Ton serviteur Ben-Hadad dit: Laisse-moi la vie! Achab répondit: Est-il encore vivant? Il est mon frère. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ces hommes tirèrent de là un bon augure, et ils se hâtèrent de le prendre au mot et de dire: Ben-Hadad est ton frère! Et il dit: Allez, amenez-le. Ben-Hadad vint vers lui, et Achab le fit monter sur son char. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ben-Hadad lui dit: Je te rendrai les villes que mon père a prises à ton père; et tu établiras pour toi des rues à Damas, comme mon père en avait établi à Samarie. Et moi, reprit Achab, je te laisserai aller, en faisant une alliance. Il fit alliance avec lui, et le laissa aller. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'L’un des fils des prophètes dit à son compagnon, d’après l’ordre de l’Éternel: Frappe-moi, je te prie! Mais cet homme refusa de le frapper. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Alors il lui dit: Parce que tu n’as pas obéi à la voix de l’Éternel, voici, quand tu m’auras quitté, le lion te frappera. Et quand il l’eut quitté, le lion le rencontra et le frappa. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Il trouva un autre homme, et il dit: Frappe-moi, je te prie! Cet homme le frappa et le blessa. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Le prophète alla se placer sur le chemin du roi, et il se déguisa avec un bandeau sur les yeux. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Lorsque le roi passa, il cria vers lui, et dit: Ton serviteur était au milieu du combat; et voici, un homme s’approche et m’amène un homme, en disant: Garde cet homme; s’il vient à manquer, ta vie répondra de sa vie, ou tu paieras un talent d’argent! '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Et pendant que ton serviteur agissait çà et là, l’homme a disparu. Le roi d’Israël lui dit: C’est là ton jugement; tu l’as prononcé toi-même. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Aussitôt le prophète ôta le bandeau de dessus ses yeux, et le roi d’Israël le reconnut pour l’un des prophètes. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Il dit alors au roi: Ainsi parle l’Éternel: Parce que tu as laissé échapper de tes mains l’homme que j’avais dévoué par interdit, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 22:37
      metadata:
        usfm: 1KI.22.37
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '38'
      metadata:
        usfm: 1KI.22.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ta vie répondra de sa vie, et ton peuple de son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Le roi d’Israël s’en alla chez lui, triste et irrité, et il arriva à Samarie.
