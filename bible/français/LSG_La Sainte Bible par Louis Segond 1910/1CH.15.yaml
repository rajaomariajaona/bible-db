document_id: 1CH.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: L’arche transportée à Jérusalem. Organisation du service divin. Cantique
  - type: heading
    content: 'V. 1-29: cf. 2 S 6:12-23. (Ps 24; 47.)'
  - type: text
    content: 'David se bâtit des maisons dans la cité de David; il prépara une place à l’arche de Dieu, et dressa pour elle une tente. '
  '10':
  - type: text
    content: 'des fils d’Uziel, Amminadab le chef et ses frères, cent douze. '
  '11':
  - type: text
    content: 'David appela les sacrificateurs Tsadok et Abiathar, et les Lévites Uriel, Asaja, Joël, Schemaeja, Éliel et Amminadab. '
  '12':
  - type: text
    content: 'Il leur dit: Vous êtes les chefs de famille des Lévites; sanctifiez-vous, vous et vos frères, et faites monter à la place que je lui ai préparée l’arche de l’Éternel, du Dieu d’Israël. '
  '13':
  - type: text
    content: 'Parce que vous n’y étiez pas la première fois, l’Éternel, notre Dieu, nous a frappés; car nous ne l’avons pas cherché selon la loi. '
  '14':
  - type: text
    content: 'Les sacrificateurs et les Lévites se sanctifièrent pour faire monter l’arche de l’Éternel, du Dieu d’Israël. '
  '15':
  - type: text
    content: 'Les fils des Lévites portèrent l’arche de Dieu sur leurs épaules avec des barres, '
  - type: note
    content: Ex 25:14. No 4:15; 7:9.
  - type: text
    content: 'comme Moïse l’avait ordonné d’après la parole de l’Éternel. '
  '16':
  - type: text
    content: 'Et David dit aux chefs des Lévites de disposer leurs frères les chantres avec des instruments de musique, des luths, des harpes et des cymbales, qu’ils devaient faire retentir de sons éclatants en signe de réjouissance. '
  '17':
  - type: text
    content: 'Les Lévites disposèrent '
  - type: note
    content: 1 Ch 6:33, 39, 44.
  - type: text
    content: 'Héman, fils de Joël; parmi ses frères, Asaph, fils de Bérékia; et parmi les fils de Merari, leurs frères, Éthan, fils de Kuschaja; '
  '18':
  - type: text
    content: 'puis avec eux leurs frères du second ordre Zacharie, Ben, Jaaziel, Schemiramoth, Jehiel, Unni, Éliab, Benaja, Maaséja, Matthithia, Éliphelé et Miknéja, et Obed-Édom et Jeïel, les portiers. '
  '19':
  - type: text
    content: 'Les chantres Héman, Asaph et Éthan avaient des cymbales d’airain, pour les faire retentir. '
  '2':
  - type: text
    content: 'Alors David dit: L’arche de Dieu ne doit être portée que par les Lévites, '
  - type: note
    content: No 4:15.
  - type: text
    content: 'car l’Éternel les a choisis pour porter l’arche de Dieu et pour en faire le service à toujours. '
  '20':
  - type: text
    content: 'Zacharie, Aziel, Schemiramoth, Jehiel, Unni, Éliab, Maaséja et Benaja avaient des luths sur alamoth; '
  '21':
  - type: text
    content: 'et Matthithia, Éliphelé, Miknéja, Obed-Édom, Jeïel et Azazia, avaient des harpes à huit cordes, pour conduire le chant. '
  '22':
  - type: text
    content: 'Kenania, chef de musique parmi les Lévites, dirigeait la musique, car il était habile. '
  '23':
  - type: text
    content: 'Bérékia et Elkana étaient portiers de l’arche. '
  '24':
  - type: text
    content: 'Schebania, Josaphat, Nethaneel, Amasaï, Zacharie, Benaja et Éliézer, les sacrificateurs, sonnaient des trompettes devant l’arche de Dieu. Obed-Édom et Jechija étaient portiers de l’arche. '
  '25':
  - type: text
    content: 'David, les anciens d’Israël, et les chefs de milliers se mirent en route pour faire monter l’arche de l’alliance de l’Éternel depuis la maison d’Obed-Édom, au milieu des réjouissances. '
  '26':
  - type: text
    content: 'Ce fut avec l’assistance de Dieu que les Lévites portèrent l’arche de l’alliance de l’Éternel; et l’on sacrifia sept taureaux et sept béliers. '
  '27':
  - type: text
    content: 'David était revêtu d’un manteau de byssus; il en était de même de tous les Lévites qui portaient l’arche, des chantres, et de Kenania, chef de musique parmi les chantres; et David avait sur lui un éphod de lin. '
  '28':
  - type: text
    content: 'Tout Israël fit monter l’arche de l’alliance de l’Éternel avec des cris de joie, au son des clairons, des trompettes et des cymbales, et en faisant retentir les luths et les harpes. '
  '29':
  - type: note
    content: 2 S 6:16.
  - type: text
    content: Comme l’arche de l’alliance de l’Éternel entrait dans la cité de David, Mical, fille de Saül, regardait par la fenêtre, et voyant le roi David sauter et danser, elle le méprisa dans son cœur.
  '3':
  - type: text
    content: 'Et David assembla tout Israël à Jérusalem pour faire monter l’arche de l’Éternel à la place qu’il lui avait préparée. '
  '4':
  - type: text
    content: 'David '
  - type: note
    content: 1 Ch 6:1, 2.
  - type: text
    content: 'assembla les fils d’Aaron et les Lévites: '
  '5':
  - type: text
    content: 'des fils de Kehath, Uriel le chef et ses frères, cent vingt; '
  '6':
  - type: text
    content: 'des fils de Merari, Asaja le chef et ses frères, deux cent vingt; '
  '7':
  - type: text
    content: 'des fils de Guerschom, Joël le chef et ses frères, cent trente; '
  '8':
  - type: text
    content: 'des fils d’Élitsaphan, Schemaeja le chef et ses frères, deux cents; '
  '9':
  - type: text
    content: 'des fils d’Hébron, Éliel le chef et ses frères, quatre-vingts; '
