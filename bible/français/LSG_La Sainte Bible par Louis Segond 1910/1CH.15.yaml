document_id: 1CH.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’arche transportée à Jérusalem. Organisation du service divin. Cantique
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-29: cf. 2 S 6:12-23. (Ps 24; 47.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'David se bâtit des maisons dans la cité de David; il prépara une place à l’arche de Dieu, et dressa pour elle une tente. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors David dit: L’arche de Dieu ne doit être portée que par les Lévites, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 4:15
      metadata:
        usfm: NUM.4.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car l’Éternel les a choisis pour porter l’arche de Dieu et pour en faire le service à toujours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et David assembla tout Israël à Jérusalem pour faire monter l’arche de l’Éternel à la place qu’il lui avait préparée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 6:1
      metadata:
        usfm: 1CH.6.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: 1CH.6.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'assembla les fils d’Aaron et les Lévites: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'des fils de Kehath, Uriel le chef et ses frères, cent vingt; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'des fils de Merari, Asaja le chef et ses frères, deux cent vingt; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'des fils de Guerschom, Joël le chef et ses frères, cent trente; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'des fils d’Élitsaphan, Schemaeja le chef et ses frères, deux cents; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'des fils d’Hébron, Éliel le chef et ses frères, quatre-vingts; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'des fils d’Uziel, Amminadab le chef et ses frères, cent douze. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'David appela les sacrificateurs Tsadok et Abiathar, et les Lévites Uriel, Asaja, Joël, Schemaeja, Éliel et Amminadab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il leur dit: Vous êtes les chefs de famille des Lévites; sanctifiez-vous, vous et vos frères, et faites monter à la place que je lui ai préparée l’arche de l’Éternel, du Dieu d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Parce que vous n’y étiez pas la première fois, l’Éternel, notre Dieu, nous a frappés; car nous ne l’avons pas cherché selon la loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les sacrificateurs et les Lévites se sanctifièrent pour faire monter l’arche de l’Éternel, du Dieu d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les fils des Lévites portèrent l’arche de Dieu sur leurs épaules avec des barres, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:14
      metadata:
        usfm: EXO.25.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 4:15
      metadata:
        usfm: NUM.4.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:9
      metadata:
        usfm: NUM.7.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme Moïse l’avait ordonné d’après la parole de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et David dit aux chefs des Lévites de disposer leurs frères les chantres avec des instruments de musique, des luths, des harpes et des cymbales, qu’ils devaient faire retentir de sons éclatants en signe de réjouissance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les Lévites disposèrent '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 6:33
      metadata:
        usfm: 1CH.6.33
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '39'
      metadata:
        usfm: 1CH.6.39
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '44'
      metadata:
        usfm: 1CH.6.44
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Héman, fils de Joël; parmi ses frères, Asaph, fils de Bérékia; et parmi les fils de Merari, leurs frères, Éthan, fils de Kuschaja; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'puis avec eux leurs frères du second ordre Zacharie, Ben, Jaaziel, Schemiramoth, Jehiel, Unni, Éliab, Benaja, Maaséja, Matthithia, Éliphelé et Miknéja, et Obed-Édom et Jeïel, les portiers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les chantres Héman, Asaph et Éthan avaient des cymbales d’airain, pour les faire retentir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Zacharie, Aziel, Schemiramoth, Jehiel, Unni, Éliab, Maaséja et Benaja avaient des luths sur alamoth; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et Matthithia, Éliphelé, Miknéja, Obed-Édom, Jeïel et Azazia, avaient des harpes à huit cordes, pour conduire le chant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Kenania, chef de musique parmi les Lévites, dirigeait la musique, car il était habile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Bérékia et Elkana étaient portiers de l’arche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Schebania, Josaphat, Nethaneel, Amasaï, Zacharie, Benaja et Éliézer, les sacrificateurs, sonnaient des trompettes devant l’arche de Dieu. Obed-Édom et Jechija étaient portiers de l’arche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'David, les anciens d’Israël, et les chefs de milliers se mirent en route pour faire monter l’arche de l’alliance de l’Éternel depuis la maison d’Obed-Édom, au milieu des réjouissances. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ce fut avec l’assistance de Dieu que les Lévites portèrent l’arche de l’alliance de l’Éternel; et l’on sacrifia sept taureaux et sept béliers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'David était revêtu d’un manteau de byssus; il en était de même de tous les Lévites qui portaient l’arche, des chantres, et de Kenania, chef de musique parmi les chantres; et David avait sur lui un éphod de lin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tout Israël fit monter l’arche de l’alliance de l’Éternel avec des cris de joie, au son des clairons, des trompettes et des cymbales, et en faisant retentir les luths et les harpes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 6:16
      metadata:
        usfm: 2SA.6.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Comme l’arche de l’alliance de l’Éternel entrait dans la cité de David, Mical, fille de Saül, regardait par la fenêtre, et voyant le roi David sauter et danser, elle le méprisa dans son cœur.
