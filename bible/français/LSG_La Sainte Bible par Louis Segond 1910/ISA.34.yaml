document_id: ISA.34,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ruine d’Édom et retour d’Israël
  - type: heading
    content: 'V. 1-17: cf. És 63:1-6. Jé 49:7-22. Éz 25:12-14. Ab 1, etc.'
  - type: text
    content: Approchez, nations, pour entendre!
  - type: text
    content: Peuples, soyez attentifs!
  - type: text
    content: Que la terre écoute, elle et ce qui la remplit,
  - type: text
    content: Le monde et tout ce qu’il produit!
  '10':
  - type: text
    content: Elle ne s’éteindra ni jour ni nuit,
  - type: note
    content: Ap 14:11; 19:3.
  - type: text
    content: La fumée s’en élèvera éternellement;
  - type: text
    content: D’âge en âge elle sera désolée,
  - type: text
    content: A tout jamais personne n’y passera.
  '11':
  - type: text
    content: ' '
  - type: note
    content: És 13:21, 22. So 2:14. Ap 18:2.
  - type: text
    content: Le pélican et le hérisson la posséderont,
  - type: text
    content: La chouette et le corbeau l’habiteront.
  - type: text
    content: On y étendra le cordeau de la désolation,
  - type: text
    content: Et le niveau de la destruction.
  '12':
  - type: text
    content: Il n’y aura plus de grands pour proclamer un roi,
  - type: text
    content: Tous ses princes seront anéantis.
  '13':
  - type: text
    content: Les épines croîtront dans ses palais,
  - type: text
    content: Les ronces et les chardons dans ses forteresses.
  - type: text
    content: Ce sera la demeure des chacals,
  - type: text
    content: Le repaire des autruches;
  '14':
  - type: text
    content: Les animaux du désert y rencontreront les chiens sauvages,
  - type: text
    content: Et les boucs s’y appelleront les uns les autres;
  - type: text
    content: Là le spectre de la nuit aura sa demeure,
  - type: text
    content: Et trouvera son lieu de repos;
  '15':
  - type: text
    content: Là le serpent fera son nid, déposera ses œufs,
  - type: text
    content: Les couvera, et recueillera ses petits à son ombre;
  - type: text
    content: Là se rassembleront tous les vautours.
  '16':
  - type: text
    content: Consultez le livre de l’Éternel, et lisez!
  - type: text
    content: Aucun d’eux ne fera défaut,
  - type: text
    content: Ni l’un ni l’autre ne manqueront;
  - type: text
    content: Car sa bouche l’a ordonné.
  - type: text
    content: C’est son esprit qui les rassemblera.
  '17':
  - type: text
    content: Il a jeté pour eux le sort,
  - type: text
    content: Et sa main leur a partagé cette terre au cordeau,
  - type: text
    content: Ils la posséderont toujours,
  - type: text
    content: Ils l’habiteront d’âge en âge.
  '2':
  - type: text
    content: Car la colère de l’Éternel va fondre sur toutes les nations,
  - type: text
    content: 'Et sa fureur sur toute leur armée:'
  - type: text
    content: Il les voue à l’extermination,
  - type: text
    content: Il les livre au carnage.
  '3':
  - type: text
    content: Leurs morts sont jetés,
  - type: text
    content: Leurs cadavres exhalent la puanteur,
  - type: text
    content: Et les montagnes se fondent dans leur sang.
  '4':
  - type: text
    content: 'Toute l’armée des cieux se '
  - type: note
    content: Ap 6:13, 14.
  - type: text
    content: dissout;
  - type: text
    content: Les cieux sont roulés comme un livre,
  - type: text
    content: Et toute leur armée tombe,
  - type: text
    content: Comme tombe la feuille de la vigne,
  - type: text
    content: Comme tombe celle du figuier.
  '5':
  - type: text
    content: Mon épée s’est enivrée dans les cieux;
  - type: text
    content: Voici, elle va descendre sur Édom,
  - type: text
    content: Sur le peuple que j’ai voué à l’extermination, pour le châtier.
  '6':
  - type: text
    content: L’épée de l’Éternel est pleine de sang, couverte de graisse,
  - type: text
    content: Du sang des agneaux et des boucs,
  - type: text
    content: De la graisse des reins des béliers;
  - type: text
    content: 'Car il y a des victimes de '
  - type: note
    content: És 63:1, 2.
  - type: text
    content: l’Éternel à Botsra,
  - type: text
    content: Et un grand carnage dans le pays d’Édom,
  '7':
  - type: text
    content: Les buffles tombent avec eux,
  - type: text
    content: Et les bœufs avec les taureaux;
  - type: text
    content: La terre s’abreuve de sang,
  - type: text
    content: Et le sol est imprégné de graisse.
  '8':
  - type: text
    content: Car c’est un jour de vengeance pour l’Éternel,
  - type: text
    content: Une année de représailles pour la cause de Sion.
  '9':
  - type: text
    content: Les torrents d’Édom seront changés en poix,
  - type: text
    content: Et sa poussière en soufre;
  - type: text
    content: Et sa terre sera comme de la poix qui brûle.
