document_id: ISA.34,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ruine d’Édom et retour d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-17: cf. És 63:1-6. Jé 49:7-22. Éz 25:12-14. Ab 1, etc.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Approchez, nations, pour entendre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peuples, soyez attentifs!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la terre écoute, elle et ce qui la remplit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le monde et tout ce qu’il produit!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Elle ne s’éteindra ni jour ni nuit,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 14:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La fumée s’en élèvera éternellement;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D’âge en âge elle sera désolée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A tout jamais personne n’y passera.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 13:21
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: So 2:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 18:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le pélican et le hérisson la posséderont,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La chouette et le corbeau l’habiteront.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On y étendra le cordeau de la désolation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le niveau de la destruction.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Il n’y aura plus de grands pour proclamer un roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ses princes seront anéantis.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Les épines croîtront dans ses palais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les ronces et les chardons dans ses forteresses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sera la demeure des chacals,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le repaire des autruches;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Les animaux du désert y rencontreront les chiens sauvages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les boucs s’y appelleront les uns les autres;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là le spectre de la nuit aura sa demeure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et trouvera son lieu de repos;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Là le serpent fera son nid, déposera ses œufs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les couvera, et recueillera ses petits à son ombre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là se rassembleront tous les vautours.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Consultez le livre de l’Éternel, et lisez!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aucun d’eux ne fera défaut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni l’un ni l’autre ne manqueront;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car sa bouche l’a ordonné.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est son esprit qui les rassemblera.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Il a jeté pour eux le sort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa main leur a partagé cette terre au cordeau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils la posséderont toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils l’habiteront d’âge en âge.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Car la colère de l’Éternel va fondre sur toutes les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et sa fureur sur toute leur armée:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les voue à l’extermination,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les livre au carnage.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Leurs morts sont jetés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs cadavres exhalent la puanteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les montagnes se fondent dans leur sang.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Toute l’armée des cieux se '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 6:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: dissout;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les cieux sont roulés comme un livre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toute leur armée tombe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme tombe la feuille de la vigne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme tombe celle du figuier.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mon épée s’est enivrée dans les cieux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, elle va descendre sur Édom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur le peuple que j’ai voué à l’extermination, pour le châtier.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: L’épée de l’Éternel est pleine de sang, couverte de graisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du sang des agneaux et des boucs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la graisse des reins des béliers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car il y a des victimes de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 63:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: l’Éternel à Botsra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un grand carnage dans le pays d’Édom,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Les buffles tombent avec eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les bœufs avec les taureaux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre s’abreuve de sang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le sol est imprégné de graisse.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Car c’est un jour de vengeance pour l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une année de représailles pour la cause de Sion.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Les torrents d’Édom seront changés en poix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa poussière en soufre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa terre sera comme de la poix qui brûle.
