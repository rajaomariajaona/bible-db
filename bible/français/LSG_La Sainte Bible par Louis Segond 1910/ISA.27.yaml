document_id: ISA.27,93
type_code: fra
verses:
  '1':
  - type: text
    content: En ce jour, l’Éternel frappera de sa dure, grande et forte épée
  - type: text
    content: Le léviathan, serpent fuyard,
  - type: text
    content: Le léviathan, serpent tortueux;
  - type: text
    content: Et il tuera le monstre qui est dans la mer.
  - type: heading
    content: La restauration d’Israël
  - type: heading
    content: 'V. 2-5: cf. Ps 80:9, etc. Jn 15:1.'
  '10':
  - type: text
    content: Car la ville forte est solitaire,
  - type: text
    content: C’est une demeure délaissée et abandonnée comme le désert;
  - type: text
    content: Là pâture le veau, il s’y couche, et broute les branches.
  '11':
  - type: text
    content: Quand les rameaux sèchent, on les brise;
  - type: text
    content: Des femmes viennent, pour les brûler.
  - type: text
    content: 'C’était un peuple sans intelligence:'
  - type: text
    content: Aussi celui qui l’a fait n’a point eu pitié de lui,
  - type: text
    content: Celui qui l’a formé ne lui a point fait grâce.
  - type: heading
    content: 'V. 12-13: cf. Os 11:10, 11.'
  '12':
  - type: text
    content: En ce temps-là,
  - type: text
    content: L’Éternel secouera des fruits,
  - type: text
    content: Depuis le cours du fleuve jusqu’au torrent d’Égypte;
  - type: note
    content: És 17:5.
  - type: text
    content: Et vous serez ramassés un à un, enfants d’Israël!
  '13':
  - type: text
    content: En ce jour, on sonnera de la grande trompette,
  - type: text
    content: Et alors reviendront ceux qui étaient exilés au pays d’Assyrie
  - type: text
    content: Ou fugitifs au pays d’Égypte;
  - type: text
    content: Et ils se prosterneront devant l’Éternel,
  - type: text
    content: Sur la montagne sainte, à Jérusalem.
  '2':
  - type: text
    content: En ce jour-là,
  - type: text
    content: Chantez un cantique sur la vigne.
  '3':
  - type: text
    content: Moi l’Éternel, j’en suis le gardien,
  - type: text
    content: Je l’arrose à chaque instant;
  - type: text
    content: De peur qu’on ne l’attaque,
  - type: text
    content: Nuit et jour je la garde.
  '4':
  - type: text
    content: Il n’y a point en moi de colère;
  - type: text
    content: Mais si je trouve à combattre des ronces et des épines,
  - type: text
    content: Je marcherai contre elles, je les consumerai toutes ensemble,
  '5':
  - type: text
    content: A moins qu’on ne me prenne pour refuge,
  - type: text
    content: Qu’on ne fasse la paix avec moi,
  - type: text
    content: Qu’on ne fasse la paix avec moi.
  - type: heading
    content: 'V. 6-11: cf. Jé 30:11. Mi 5:9-13.'
  '6':
  - type: text
    content: Dans les temps à venir, Jacob prendra racine,
  - type: note
    content: Ps 72:16.
  - type: text
    content: Israël poussera des fleurs et des rejetons,
  - type: text
    content: Et il remplira le monde de ses fruits.
  '7':
  - type: text
    content: L’Éternel l’a-t-il frappé comme il a frappé ceux qui le frappaient?
  - type: text
    content: L’a-t-il tué comme il a tué ceux qui le tuaient?
  '8':
  - type: text
    content: ' '
  - type: note
    content: Jé 30:11; 46:28.
  - type: text
    content: C’est avec mesure que tu l’as châtié par l’exil,
  - type: text
    content: En l’emportant par le souffle impétueux du vent d’orient.
  '9':
  - type: text
    content: Ainsi le crime de Jacob a été expié,
  - type: text
    content: 'Et voici le fruit du pardon de son péché:'
  - type: text
    content: L’Éternel a rendu toutes les pierres des autels
  - type: text
    content: Pareilles à des pierres de chaux réduites en poussière;
  - type: text
    content: Les idoles d’Astarté et les statues du soleil ne se relèveront plus.
