document_id: ISA.27,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: En ce jour, l’Éternel frappera de sa dure, grande et forte épée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le léviathan, serpent fuyard,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le léviathan, serpent tortueux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il tuera le monstre qui est dans la mer.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La restauration d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 2-5: cf. Ps 80:9, etc. Jn 15:1.'
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Car la ville forte est solitaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est une demeure délaissée et abandonnée comme le désert;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là pâture le veau, il s’y couche, et broute les branches.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Quand les rameaux sèchent, on les brise;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des femmes viennent, pour les brûler.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’était un peuple sans intelligence:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi celui qui l’a fait n’a point eu pitié de lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui l’a formé ne lui a point fait grâce.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-13: cf. Os 11:10, 11.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: En ce temps-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel secouera des fruits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depuis le cours du fleuve jusqu’au torrent d’Égypte;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 17:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et vous serez ramassés un à un, enfants d’Israël!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: En ce jour, on sonnera de la grande trompette,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et alors reviendront ceux qui étaient exilés au pays d’Assyrie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou fugitifs au pays d’Égypte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils se prosterneront devant l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur la montagne sainte, à Jérusalem.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: En ce jour-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez un cantique sur la vigne.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Moi l’Éternel, j’en suis le gardien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je l’arrose à chaque instant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De peur qu’on ne l’attaque,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nuit et jour je la garde.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il n’y a point en moi de colère;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais si je trouve à combattre des ronces et des épines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je marcherai contre elles, je les consumerai toutes ensemble,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: A moins qu’on ne me prenne pour refuge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’on ne fasse la paix avec moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’on ne fasse la paix avec moi.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-11: cf. Jé 30:11. Mi 5:9-13.'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Dans les temps à venir, Jacob prendra racine,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 72:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Israël poussera des fleurs et des rejetons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il remplira le monde de ses fruits.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: L’Éternel l’a-t-il frappé comme il a frappé ceux qui le frappaient?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’a-t-il tué comme il a tué ceux qui le tuaient?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 30:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 46:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: C’est avec mesure que tu l’as châtié par l’exil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En l’emportant par le souffle impétueux du vent d’orient.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ainsi le crime de Jacob a été expié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et voici le fruit du pardon de son péché:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel a rendu toutes les pierres des autels
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pareilles à des pierres de chaux réduites en poussière;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les idoles d’Astarté et les statues du soleil ne se relèveront plus.
