document_id: GAL.INTRO1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION À L’ÉPÎTRE AUX GALATES
  - type: usfm
    marker: imt3
    children:
    - type: text
      text: (Ac 15:1,10. Ro 7:1-4, 6; 8:3-4.)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Les Galates auxquels l’apôtre Paul adresse cette épître, probablement d’Éphèse vers 54, sont les habitants des deux provinces d’Asie Mineure appelées Galatie du Nord. Paul avait évangélisé cette région au cours de son deuxième voyage missionnaire et y avait probablement fondé des Églises (voir Act 16:6). Au cours de son troisième voyage missionnaire, il leur rendit encore visite (Act 18:23).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L’Épître aux Galates occupe une place de choix parmi les épîtres de Paul. Elle est la plus ancienne des 4 grandes épîtres, les 3 autres étant: les deux épîtres aux Corinthiens, puis celle aux Romains. L’Épître aux Galates paraît représenter l’élaboration du message évangélique de l’apôtre Paul développé dans l’Épître aux Romains (voir l’introduction à cette épître). En voici les grandes articulations:'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '1. Adresse et salutations '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:1-5
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '2. Inconstance des Galates: entraînés par de faux docteurs, ils s’éloignent du pur Évangile '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:6–2:21
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '3. La loi et la foi '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 3:1–5:12
  - type: usfm
    marker: io2
    children:
    - type: text
      text: La loi est impuissante pour assurer le salut. Elle doit conduire à la foi en Jésus-Christ.
  - type: usfm
    marker: io2
    children:
    - type: text
      text: La foi, quant à elle, affranchit de la loi et procure la liberté évangélique.
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '4. Exhortations à vivre, non selon la chair, mais selon l’Esprit: distinction œuvres de la chair – fruit de l’Esprit '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 5:13-26
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '5. Exhortations finales: support mutuel, libéralité '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 6:1-17
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '6. Doxologie finale '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 6:18
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Le grand thème de l’Épître aux Galates sur lequel Paul reviendra d’ailleurs dans son épître aux Romains porte sur les rapports entre LA LOI et LA GRÂCE. Ce thème n’est pas un fait du hasard puisque les épîtres traitent précisément de questions qui se posent dans les communautés.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La circonstance chez les Galates est la suivante: l’apôtre Paul, au cours de son voyage missionnaire chez les Galates, a annoncé l’Évangile de la grâce de Dieu en Jésus-Christ qui s’obtient par la foi seule. Mais après son passage, certains autres missionnaires, non identifiables, sont venus à leur tour annoncer un contre-message selon lequel l’Évangile ne résulte pas de la grâce mais du mérite dû à l’observation et au respect de la loi et des traditions juives comme la circoncision.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le but de la lettre est donc de rappeler les chrétiens de Galatie à la fidélité à l’Évangile vrai: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Je m’étonne que vous vous détourniez si promptement de celui qui vous a appelés par la grâce de Christ, pour passer à un autre Évangile. Non pas qu’il y ait un autre Évangile, mais il y a des gens qui vous troublent, et qui veulent renverser l’Évangile de Christ»
    - type: text
      text: ' (1:6-7).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Le vrai Évangile que l’apôtre rappelle consiste en ce qu’il n’y a pas d’autre Évangile que celui de la grâce de Dieu manifestée en Jésus-Christ. C’est seulement par cette grâce attestée par le Saint-Esprit que l’homme, quel qu’il soit, est conduit à l’accomplissement de la loi de Dieu.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Paul a écrit l’Épître aux Galates en situation de contestation et de polémique. C’est dans cette perspective qu’il faut comprendre le message de cette épître. La polémique porte sur d’importants problèmes de communauté, en particulier l’opposition entre le rôle de la loi et celui de la foi dans l’économie du salut en Jésus-Christ. Paul insiste sur la thèse suivante: la foi en Christ libère des œuvres de la loi. La loi est un pédagogue qui dénonce le péché, mais elle ne le supprime pas. Toutefois la liberté que le chrétien obtient par la foi ne doit pas produire un dérèglement moral car, comme Paul, le chrétien doit toujours se dire: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «J’ai été crucifié avec Christ; et si je vis, ce n’est plus moi qui vis, c’est Christ qui vit en moi»
    - type: text
      text: ' (Gal 2:20).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: La crise galate résulte de ceux qu’il convient d’appeler les fauteurs de troubles favorables aux traditions et lois du judaïsme. Ne sachant pas très bien dans quel camp il fallait se ranger, les chrétiens se référaient à eux.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Qui étaient-ils? La lettre ne les nomme pas. Elle en parle toutefois comme s’il s’agissait de prédicateurs occasionnels et de passage. Quant à la nature de leur message, les données de l’épître laissent supposer qu’il était opposé au discours libérateur de la Bonne Nouvelle que Paul avait annoncée. À cet effet, l’évocation de l’incident d’Antioche qui opposa les apôtres Pierre et Paul est très significative (2:11-14): '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Si toi qui es Juif, tu vis à la manière des païens… porquoi forces-tu les païens à judaïser?»
