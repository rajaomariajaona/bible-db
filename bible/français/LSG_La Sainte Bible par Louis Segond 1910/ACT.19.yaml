document_id: ACT.19,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Paul à Éphèse: disciples de Jean-Baptiste; enseignement et succès; exorcistes juifs; émeute provoquée par l’orfèvre Démétrius'
  - type: heading
    content: 'V. 1-7: cf. Mt 3:1-12. Ac 8:14-17.'
  - type: text
    content: 'Pendant '
  - type: note
    content: 1 Co 1:12.
  - type: text
    content: 'qu’Apollos était à Corinthe, Paul, après avoir parcouru les hautes provinces de l’Asie, arriva à Éphèse. Ayant rencontré quelques disciples, il leur dit: '
  '10':
  - type: text
    content: 'Cela dura deux ans, de sorte que tous ceux qui habitaient l’Asie, Juifs et Grecs, entendirent la parole du Seigneur. '
  '11':
  - type: note
    content: Mc 16:20. Ac 14:3.
  - type: text
    content: 'Et Dieu faisait des miracles extraordinaires par les mains de Paul, '
  '12':
  - type: text
    content: au point qu’on appliquait sur les malades des linges ou des mouchoirs qui avaient touché son corps, et les maladies les quittaient, et les esprits malins sortaient.
  - type: heading
    content: 'V. 13-20: cf. (Ac 8:9-13, 18-23. 2 Ti 3:8, 9.) 1 Co 4:20. Ph 3:7-9.'
  '13':
  - type: text
    content: 'Quelques exorcistes juifs ambulants essayèrent d’invoquer sur ceux qui avaient des esprits malins le nom du Seigneur Jésus, en disant: Je vous conjure par Jésus que Paul prêche! '
  '14':
  - type: text
    content: 'Ceux qui faisaient cela étaient sept fils de Scéva, Juif, l’un des principaux sacrificateurs. '
  '15':
  - type: text
    content: 'L’esprit malin leur répondit: Je connais Jésus, et je sais qui est Paul; mais vous, qui êtes-vous? '
  '16':
  - type: text
    content: 'Et l’homme dans lequel était l’esprit malin s’élança sur eux, se rendit maître de tous deux, et les maltraita de telle sorte qu’ils s’enfuirent de cette maison nus et blessés. '
  '17':
  - type: text
    content: 'Cela fut connu de tous les Juifs et de tous les Grecs qui demeuraient à Éphèse, et la crainte s’empara d’eux tous, et le nom du Seigneur Jésus était glorifié. '
  '18':
  - type: note
    content: Mt 3:6.
  - type: text
    content: 'Plusieurs de ceux qui avaient cru venaient confesser et déclarer ce qu’ils avaient fait. '
  '19':
  - type: text
    content: 'Et un certain nombre de ceux qui avaient exercé les arts magiques, ayant apporté leurs livres, les brûlèrent devant tout le monde: on en estima la valeur à cinquante mille pièces d’argent. '
  '2':
  - type: text
    content: 'Avez-vous reçu le Saint-Esprit, quand vous avez cru? Ils lui répondirent: Nous n’avons pas même entendu dire qu’il y ait un Saint-Esprit. '
  '20':
  - type: note
    content: És 55:11.
  - type: text
    content: C’est ainsi que la parole du Seigneur croissait en puissance et en force.
  - type: heading
    content: 'V. 21-40: cf. 1 Co 16:5-9; 15:32. 2 Co 1:8-10. Ec 9:17.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ro 15:25. Ga 2:1.
  - type: text
    content: 'Après que ces choses se furent passées, Paul forma le projet d’aller à Jérusalem, en traversant la Macédoine et l’Achaïe. Quand j’aurai été là, se disait-il, il faut aussi que je voie Rome. '
  '22':
  - type: text
    content: 'Il envoya en Macédoine deux de ses aides, Timothée et Éraste, et il resta lui-même quelque temps encore en Asie. '
  '23':
  - type: note
    content: 2 Co 1:8.
  - type: text
    content: 'Il survint, à cette époque, un grand trouble au sujet de la voie du Seigneur. '
  '24':
  - type: text
    content: 'Un nommé Démétrius, orfèvre, fabriquait en argent des temples de Diane, et procurait à ses ouvriers '
  - type: note
    content: Ac 16:16.
  - type: text
    content: 'un gain considérable. '
  '25':
  - type: text
    content: 'Il les rassembla, avec ceux du même métier, et dit: O hommes, vous savez que notre bien-être dépend de cette industrie; '
  '26':
  - type: text
    content: 'et vous voyez et entendez que, non seulement à Éphèse, mais dans presque toute l’Asie, ce Paul a persuadé et détourné une foule de gens, en disant que les dieux '
  - type: note
    content: Ps 115:4. Jé 10:3.
  - type: text
    content: 'faits de main d’homme ne sont pas des dieux. '
  '27':
  - type: text
    content: 'Le danger qui en résulte, ce n’est pas seulement que notre industrie ne tombe en discrédit; c’est encore que le temple de la grande déesse Diane ne soit tenu pour rien, et même que la majesté de celle qui est révérée dans toute l’Asie et dans le monde entier ne soit réduite à néant. '
  '28':
  - type: text
    content: 'Ces paroles les ayant remplis de colère, ils se mirent à crier: Grande est la Diane des Éphésiens! '
  '29':
  - type: text
    content: 'Toute la ville fut dans la confusion. Ils se précipitèrent tous ensemble au théâtre, entraînant avec eux '
  - type: note
    content: Ac 20:4; 27:2. Col 4:10.
  - type: text
    content: 'Gaïus et Aristarque, Macédoniens, compagnons de voyage de Paul. '
  '3':
  - type: text
    content: 'Il dit: De quel baptême avez-vous donc été baptisés? Et ils répondirent: Du baptême de Jean. '
  '30':
  - type: text
    content: 'Paul voulait se présenter devant le peuple, mais les disciples l’en empêchèrent; '
  '31':
  - type: text
    content: 'quelques-uns même des Asiarques, qui étaient ses amis, envoyèrent vers lui, pour l’engager à ne pas se rendre au théâtre. '
  '32':
  - type: text
    content: 'Les uns criaient d’une manière, les autres d’une autre, car le désordre régnait dans l’assemblée, et la plupart ne savaient pas pourquoi ils s’étaient réunis. '
  '33':
  - type: text
    content: 'Alors on fit sortir de la foule Alexandre, que les Juifs poussaient en avant; et Alexandre, faisant signe de la main, voulait parler au peuple. '
  '34':
  - type: text
    content: 'Mais quand ils reconnurent qu’il était Juif, tous d’une seule voix crièrent pendant près de deux heures: Grande est la Diane des Éphésiens! '
  '35':
  - type: text
    content: 'Cependant le secrétaire, ayant apaisé la foule, dit: Hommes Éphésiens, quel est celui qui ignore que la ville d’Éphèse est la gardienne du temple de la grande Diane et de son simulacre tombé du ciel? '
  '36':
  - type: text
    content: 'Cela étant incontestable, vous devez vous calmer, et ne rien faire avec précipitation. '
  '37':
  - type: text
    content: 'Car vous avez amené ces hommes, qui ne sont coupables ni de sacrilège, ni de blasphème envers notre déesse. '
  '38':
  - type: text
    content: 'Si donc Démétrius et ses ouvriers ont à se plaindre de quelqu’un, il y a des jours d’audience et des proconsuls; qu’ils s’appellent en justice les uns les autres. '
  '39':
  - type: text
    content: 'Et si vous avez en vue d’autres objets, ils se régleront dans une assemblée légale. '
  '4':
  - type: text
    content: 'Alors Paul dit: Jean a baptisé du '
  - type: note
    content: Mt 3:11. Mc 1:4. Lu 3:16. Jn 1:26. Ac 1:5; 11:16.
  - type: text
    content: 'baptême de repentance, disant au peuple de croire en celui qui venait après lui, c’est-à-dire, en Jésus. '
  '40':
  - type: text
    content: Nous risquons, en effet, d’être accusés de sédition pour ce qui s’est passé aujourd’hui, puisqu’il n’existe aucun motif qui nous permette de justifier cet attroupement. Après ces paroles, il congédia l’assemblée.
  '5':
  - type: text
    content: 'Sur ces paroles, ils furent baptisés au nom du Seigneur Jésus. '
  '6':
  - type: note
    content: Ac 8:17; 11:15.
  - type: text
    content: 'Lorsque Paul leur eut imposé les mains, le Saint-Esprit vint sur eux, et ils parlaient en langues et prophétisaient. '
  '7':
  - type: text
    content: Ils étaient en tout environ douze hommes.
  - type: heading
    content: 'V. 8-12: cf. 1 Co 16:8, 9. Ac 20:17-21. Hé 2:4.'
  '8':
  - type: text
    content: 'Ensuite Paul entra dans la synagogue, où il parla librement. Pendant trois mois, il discourut sur les choses qui concernent le royaume de Dieu, s’efforçant de persuader ceux qui l’écoutaient. '
  '9':
  - type: note
    content: 2 Ti 1:15.
  - type: text
    content: 'Mais, comme quelques-uns restaient endurcis et incrédules, décriant devant la multitude la voie du Seigneur, il se retira d’eux, sépara les disciples, et enseigna chaque jour dans l’école d’un nommé Tyrannus. '
