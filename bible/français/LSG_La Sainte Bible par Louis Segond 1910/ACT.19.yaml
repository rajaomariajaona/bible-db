document_id: ACT.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Paul à Éphèse: disciples de Jean-Baptiste; enseignement et succès; exorcistes juifs; émeute provoquée par l’orfèvre Démétrius'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. Mt 3:1-12. Ac 8:14-17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Pendant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:12
      metadata:
        usfm: 1CO.1.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’Apollos était à Corinthe, Paul, après avoir parcouru les hautes provinces de l’Asie, arriva à Éphèse. Ayant rencontré quelques disciples, il leur dit: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Avez-vous reçu le Saint-Esprit, quand vous avez cru? Ils lui répondirent: Nous n’avons pas même entendu dire qu’il y ait un Saint-Esprit. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il dit: De quel baptême avez-vous donc été baptisés? Et ils répondirent: Du baptême de Jean. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors Paul dit: Jean a baptisé du '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:11
      metadata:
        usfm: MAT.3.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:4
      metadata:
        usfm: MRK.1.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:16
      metadata:
        usfm: LUK.3.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:26
      metadata:
        usfm: JHN.1.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:5
      metadata:
        usfm: ACT.1.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:16
      metadata:
        usfm: ACT.11.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'baptême de repentance, disant au peuple de croire en celui qui venait après lui, c’est-à-dire, en Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Sur ces paroles, ils furent baptisés au nom du Seigneur Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 8:17
      metadata:
        usfm: ACT.8.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:15
      metadata:
        usfm: ACT.11.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque Paul leur eut imposé les mains, le Saint-Esprit vint sur eux, et ils parlaient en langues et prophétisaient. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils étaient en tout environ douze hommes.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-12: cf. 1 Co 16:8, 9. Ac 20:17-21. Hé 2:4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ensuite Paul entra dans la synagogue, où il parla librement. Pendant trois mois, il discourut sur les choses qui concernent le royaume de Dieu, s’efforçant de persuader ceux qui l’écoutaient. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 1:15
      metadata:
        usfm: 2TI.1.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais, comme quelques-uns restaient endurcis et incrédules, décriant devant la multitude la voie du Seigneur, il se retira d’eux, sépara les disciples, et enseigna chaque jour dans l’école d’un nommé Tyrannus. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Cela dura deux ans, de sorte que tous ceux qui habitaient l’Asie, Juifs et Grecs, entendirent la parole du Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 16:20
      metadata:
        usfm: MRK.16.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 14:3
      metadata:
        usfm: ACT.14.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et Dieu faisait des miracles extraordinaires par les mains de Paul, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: au point qu’on appliquait sur les malades des linges ou des mouchoirs qui avaient touché son corps, et les maladies les quittaient, et les esprits malins sortaient.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-20: cf. (Ac 8:9-13, 18-23. 2 Ti 3:8, 9.) 1 Co 4:20. Ph 3:7-9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quelques exorcistes juifs ambulants essayèrent d’invoquer sur ceux qui avaient des esprits malins le nom du Seigneur Jésus, en disant: Je vous conjure par Jésus que Paul prêche! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ceux qui faisaient cela étaient sept fils de Scéva, Juif, l’un des principaux sacrificateurs. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L’esprit malin leur répondit: Je connais Jésus, et je sais qui est Paul; mais vous, qui êtes-vous? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et l’homme dans lequel était l’esprit malin s’élança sur eux, se rendit maître de tous deux, et les maltraita de telle sorte qu’ils s’enfuirent de cette maison nus et blessés. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Cela fut connu de tous les Juifs et de tous les Grecs qui demeuraient à Éphèse, et la crainte s’empara d’eux tous, et le nom du Seigneur Jésus était glorifié. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:6
      metadata:
        usfm: MAT.3.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Plusieurs de ceux qui avaient cru venaient confesser et déclarer ce qu’ils avaient fait. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et un certain nombre de ceux qui avaient exercé les arts magiques, ayant apporté leurs livres, les brûlèrent devant tout le monde: on en estima la valeur à cinquante mille pièces d’argent. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 55:11
      metadata:
        usfm: ISA.55.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: C’est ainsi que la parole du Seigneur croissait en puissance et en force.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-40: cf. 1 Co 16:5-9; 15:32. 2 Co 1:8-10. Ec 9:17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 15:25
      metadata:
        usfm: ROM.15.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 2:1
      metadata:
        usfm: GAL.2.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Après que ces choses se furent passées, Paul forma le projet d’aller à Jérusalem, en traversant la Macédoine et l’Achaïe. Quand j’aurai été là, se disait-il, il faut aussi que je voie Rome. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il envoya en Macédoine deux de ses aides, Timothée et Éraste, et il resta lui-même quelque temps encore en Asie. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 1:8
      metadata:
        usfm: 2CO.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il survint, à cette époque, un grand trouble au sujet de la voie du Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Un nommé Démétrius, orfèvre, fabriquait en argent des temples de Diane, et procurait à ses ouvriers '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 16:16
      metadata:
        usfm: ACT.16.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un gain considérable. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il les rassembla, avec ceux du même métier, et dit: O hommes, vous savez que notre bien-être dépend de cette industrie; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'et vous voyez et entendez que, non seulement à Éphèse, mais dans presque toute l’Asie, ce Paul a persuadé et détourné une foule de gens, en disant que les dieux '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 115:4
      metadata:
        usfm: PSA.115.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 10:3
      metadata:
        usfm: JER.10.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'faits de main d’homme ne sont pas des dieux. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le danger qui en résulte, ce n’est pas seulement que notre industrie ne tombe en discrédit; c’est encore que le temple de la grande déesse Diane ne soit tenu pour rien, et même que la majesté de celle qui est révérée dans toute l’Asie et dans le monde entier ne soit réduite à néant. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ces paroles les ayant remplis de colère, ils se mirent à crier: Grande est la Diane des Éphésiens! '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Toute la ville fut dans la confusion. Ils se précipitèrent tous ensemble au théâtre, entraînant avec eux '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 20:4
      metadata:
        usfm: ACT.20.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:2
      metadata:
        usfm: ACT.27.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 4:10
      metadata:
        usfm: COL.4.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Gaïus et Aristarque, Macédoniens, compagnons de voyage de Paul. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Paul voulait se présenter devant le peuple, mais les disciples l’en empêchèrent; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'quelques-uns même des Asiarques, qui étaient ses amis, envoyèrent vers lui, pour l’engager à ne pas se rendre au théâtre. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Les uns criaient d’une manière, les autres d’une autre, car le désordre régnait dans l’assemblée, et la plupart ne savaient pas pourquoi ils s’étaient réunis. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Alors on fit sortir de la foule Alexandre, que les Juifs poussaient en avant; et Alexandre, faisant signe de la main, voulait parler au peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Mais quand ils reconnurent qu’il était Juif, tous d’une seule voix crièrent pendant près de deux heures: Grande est la Diane des Éphésiens! '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Cependant le secrétaire, ayant apaisé la foule, dit: Hommes Éphésiens, quel est celui qui ignore que la ville d’Éphèse est la gardienne du temple de la grande Diane et de son simulacre tombé du ciel? '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Cela étant incontestable, vous devez vous calmer, et ne rien faire avec précipitation. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Car vous avez amené ces hommes, qui ne sont coupables ni de sacrilège, ni de blasphème envers notre déesse. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Si donc Démétrius et ses ouvriers ont à se plaindre de quelqu’un, il y a des jours d’audience et des proconsuls; qu’ils s’appellent en justice les uns les autres. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Et si vous avez en vue d’autres objets, ils se régleront dans une assemblée légale. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Nous risquons, en effet, d’être accusés de sédition pour ce qui s’est passé aujourd’hui, puisqu’il n’existe aucun motif qui nous permette de justifier cet attroupement. Après ces paroles, il congédia l’assemblée.
