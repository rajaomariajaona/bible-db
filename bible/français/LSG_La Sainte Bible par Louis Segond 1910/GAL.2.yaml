document_id: GAL.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. Ac 15:1-29.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quatorze ans après, je montai de nouveau '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 15:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à Jérusalem avec Barnabas, ayant aussi pris Tite avec moi; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils nous recommandèrent seulement de nous souvenir des pauvres, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 11:30
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 15:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 16:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 8:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ce que j’ai bien eu soin de faire.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-21: cf. (Ac 11:1-17; 15:7-11.) (Ga 3:10-14, 21-28; 5:1-6.)'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais lorsque Céphas vint à Antioche, je lui résistai en face, parce qu’il était répréhensible. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, avant l’arrivée de quelques personnes envoyées par Jacques, il mangeait avec les païens; et, quand elles furent venues, il s’esquiva et se tint à l’écart, par crainte des circoncis. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avec lui les autres Juifs usèrent aussi de dissimulation, en sorte que Barnabas même fut entraîné par leur hypocrisie. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voyant qu’ils ne marchaient pas droit selon la vérité de l’Évangile, je dis à Céphas, en présence de tous: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 10:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si toi qui es Juif, tu vis à la manière des païens et non à la manière des Juifs, pourquoi forces-tu les païens à judaïser? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous, nous sommes Juifs de naissance, et non pécheurs d’entre les païens. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Néanmoins, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13:38
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:28
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 7:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'sachant que ce n’est pas par les œuvres de la loi que l’homme est justifié, mais par la foi en Jésus-Christ, nous aussi nous avons cru en Jésus-Christ, afin d’être justifiés par la foi en Christ et non par les œuvres de la loi, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 3:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'parce que nulle chair ne sera justifiée par les œuvres de la loi. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, tandis que nous cherchons à être justifiés par Christ, si nous étions aussi nous-mêmes trouvés pécheurs, Christ serait-il un ministre du péché? Loin de là! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car, si je rebâtis les choses que j’ai détruites, je me constitue moi-même un transgresseur, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 7:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car c’est par la loi que je suis mort à la loi, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 14:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 5:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 5:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 9:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 4:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'afin de vivre pour Dieu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et ce fut '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 19:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’après une révélation que j’y montai. Je leur exposai l’Évangile que je prêche parmi les païens, je l’exposai en particulier à ceux qui sont les plus considérés, afin de ne pas courir ou avoir couru en vain. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai été crucifié avec Christ; et si je vis, ce n’est plus moi qui vis, c’est Christ qui vit en moi; si je vis maintenant dans la chair, je vis dans la foi au Fils de Dieu, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 1:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 2:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui m’a aimé et qui s’est livré lui-même pour moi. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne rejette pas la grâce de Dieu; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 7:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: car si la justice s’obtient par la loi, Christ est donc mort en vain.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 16:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 9:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais Tite, qui était avec moi, et qui était Grec, ne fut pas même contraint de se faire circoncire. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 15:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et cela, à cause des faux frères qui s’étaient furtivement introduits et glissés parmi nous, pour épier la liberté que nous avons en Jésus-Christ, avec l’intention de nous asservir. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous ne leur cédâmes pas un instant et nous résistâmes à leurs exigences, afin que la vérité de l’Évangile fût maintenue parmi vous. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui sont les plus considérés-quels qu’ils aient été jadis, cela ne m’importe pas: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 10:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 19:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 34:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 10:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 2:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 6:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Dieu ne fait point acception de personnes, ceux qui sont les plus considérés ne m’imposèrent rien. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au contraire, voyant que l’Évangile m’avait été confié pour les incirconcis, comme à Pierre pour les circoncis, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car celui qui a fait de Pierre l’apôtre des circoncis '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 9:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 1:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 3:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'a aussi fait de moi l’apôtre des païens, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et ayant reconnu la grâce qui m’avait été accordée, Jacques, Céphas et Jean, qui sont regardés comme des colonnes, me donnèrent, à moi et à Barnabas, la main d’association, afin que nous allassions, nous vers les païens, et eux vers les circoncis. '
