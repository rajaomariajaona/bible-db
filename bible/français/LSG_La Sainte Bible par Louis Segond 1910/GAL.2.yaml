document_id: GAL.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-10: cf. Ac 15:1-29.'
  - type: text
    content: 'Quatorze ans après, je montai de nouveau '
  - type: note
    content: Ac 15:2.
  - type: text
    content: 'à Jérusalem avec Barnabas, ayant aussi pris Tite avec moi; '
  '10':
  - type: text
    content: 'Ils nous recommandèrent seulement de nous souvenir des pauvres, '
  - type: note
    content: Ac 11:30; 24:17. Ro 15:25. 1 Co 16:1. 2 Co 8:1; 9:1.
  - type: text
    content: ce que j’ai bien eu soin de faire.
  - type: heading
    content: 'V. 11-21: cf. (Ac 11:1-17; 15:7-11.) (Ga 3:10-14, 21-28; 5:1-6.)'
  '11':
  - type: text
    content: 'Mais lorsque Céphas vint à Antioche, je lui résistai en face, parce qu’il était répréhensible. '
  '12':
  - type: text
    content: 'En effet, avant l’arrivée de quelques personnes envoyées par Jacques, il mangeait avec les païens; et, quand elles furent venues, il s’esquiva et se tint à l’écart, par crainte des circoncis. '
  '13':
  - type: text
    content: 'Avec lui les autres Juifs usèrent aussi de dissimulation, en sorte que Barnabas même fut entraîné par leur hypocrisie. '
  '14':
  - type: text
    content: 'Voyant qu’ils ne marchaient pas droit selon la vérité de l’Évangile, je dis à Céphas, en présence de tous: '
  - type: note
    content: Ac 10:28.
  - type: text
    content: 'Si toi qui es Juif, tu vis à la manière des païens et non à la manière des Juifs, pourquoi forces-tu les païens à judaïser? '
  '15':
  - type: text
    content: 'Nous, nous sommes Juifs de naissance, et non pécheurs d’entre les païens. '
  '16':
  - type: text
    content: 'Néanmoins, '
  - type: note
    content: Ac 13:38. Ro 3:28; 8:3. Hé 7:18.
  - type: text
    content: 'sachant que ce n’est pas par les œuvres de la loi que l’homme est justifié, mais par la foi en Jésus-Christ, nous aussi nous avons cru en Jésus-Christ, afin d’être justifiés par la foi en Christ et non par les œuvres de la loi, '
  - type: note
    content: Ro 3:20. Ga 3:11.
  - type: text
    content: 'parce que nulle chair ne sera justifiée par les œuvres de la loi. '
  '17':
  - type: text
    content: 'Mais, tandis que nous cherchons à être justifiés par Christ, si nous étions aussi nous-mêmes trouvés pécheurs, Christ serait-il un ministre du péché? Loin de là! '
  '18':
  - type: text
    content: 'Car, si je rebâtis les choses que j’ai détruites, je me constitue moi-même un transgresseur, '
  '19':
  - type: note
    content: Ro 7:4.
  - type: text
    content: 'car c’est par la loi que je suis mort à la loi, '
  - type: note
    content: Ro 14:7. 2 Co 5:15. 1 Th 5:10. Hé 9:14. 1 Pi 4:2.
  - type: text
    content: 'afin de vivre pour Dieu. '
  '2':
  - type: text
    content: 'et ce fut '
  - type: note
    content: Ac 19:21.
  - type: text
    content: 'd’après une révélation que j’y montai. Je leur exposai l’Évangile que je prêche parmi les païens, je l’exposai en particulier à ceux qui sont les plus considérés, afin de ne pas courir ou avoir couru en vain. '
  '20':
  - type: text
    content: 'J’ai été crucifié avec Christ; et si je vis, ce n’est plus moi qui vis, c’est Christ qui vit en moi; si je vis maintenant dans la chair, je vis dans la foi au Fils de Dieu, '
  - type: note
    content: Ga 1:4. Ép 5:2. Tit 2:14.
  - type: text
    content: 'qui m’a aimé et qui s’est livré lui-même pour moi. '
  '21':
  - type: text
    content: 'Je ne rejette pas la grâce de Dieu; '
  - type: note
    content: Hé 7:11.
  - type: text
    content: car si la justice s’obtient par la loi, Christ est donc mort en vain.
  '3':
  - type: note
    content: Ac 16:3. 1 Co 9:21.
  - type: text
    content: 'Mais Tite, qui était avec moi, et qui était Grec, ne fut pas même contraint de se faire circoncire. '
  '4':
  - type: note
    content: Ac 15:24.
  - type: text
    content: 'Et cela, à cause des faux frères qui s’étaient furtivement introduits et glissés parmi nous, pour épier la liberté que nous avons en Jésus-Christ, avec l’intention de nous asservir. '
  '5':
  - type: text
    content: 'Nous ne leur cédâmes pas un instant et nous résistâmes à leurs exigences, afin que la vérité de l’Évangile fût maintenue parmi vous. '
  '6':
  - type: text
    content: 'Ceux qui sont les plus considérés-quels qu’ils aient été jadis, cela ne m’importe pas: '
  - type: note
    content: De 10:17. 2 Ch 19:7. Job 34:19. Ac 10:34. Ro 2:11. Ép 6:9. Col 3:25. 1 Pi 1:17.
  - type: text
    content: 'Dieu ne fait point acception de personnes, ceux qui sont les plus considérés ne m’imposèrent rien. '
  '7':
  - type: text
    content: 'Au contraire, voyant que l’Évangile m’avait été confié pour les incirconcis, comme à Pierre pour les circoncis, '
  '8':
  - type: text
    content: 'car celui qui a fait de Pierre l’apôtre des circoncis '
  - type: note
    content: Ac 9:15; 13:2; 22:21. Ga 1:16. Ép 3:8.
  - type: text
    content: 'a aussi fait de moi l’apôtre des païens, '
  '9':
  - type: text
    content: 'et ayant reconnu la grâce qui m’avait été accordée, Jacques, Céphas et Jean, qui sont regardés comme des colonnes, me donnèrent, à moi et à Barnabas, la main d’association, afin que nous allassions, nous vers les païens, et eux vers les circoncis. '
