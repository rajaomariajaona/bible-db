document_id: EXO.29,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La consécration des sacrificateurs
  - type: heading
    content: 'V. 1-37: cf. Lé 8. Hé 5:1-10; 7:26-28.'
  - type: text
    content: ' '
  - type: note
    content: Lé 8:2; 9:2.
  - type: text
    content: 'Voici ce que tu feras pour les sanctifier, afin qu’ils soient à mon service dans le sacerdoce. Prends un jeune taureau et deux béliers sans défaut. '
  '10':
  - type: note
    content: Lé 1:3.
  - type: text
    content: 'Tu amèneras le taureau devant la tente d’assignation, et Aaron et ses fils poseront leurs mains sur la tête du taureau. '
  '11':
  - type: text
    content: 'Tu égorgeras le taureau devant l’Éternel, à l’entrée de la tente d’assignation. '
  '12':
  - type: text
    content: 'Tu prendras du sang du taureau, tu en mettras avec ton doigt sur les cornes de l’autel, et tu répandras tout le sang au pied de l’autel. '
  '13':
  - type: text
    content: 'Tu prendras toute la graisse qui couvre les entrailles, le grand lobe du foie, les deux rognons et la graisse qui les entoure, et tu brûleras cela sur l’autel. '
  '14':
  - type: note
    content: Lé 4:12. Hé 13:11.
  - type: text
    content: 'Mais tu brûleras au feu hors du camp la chair du taureau, sa peau et ses excréments: c’est un sacrifice pour le péché. '
  '15':
  - type: text
    content: 'Tu prendras l’un des béliers, et Aaron et ses fils poseront leurs mains sur la tête du bélier. '
  '16':
  - type: text
    content: 'Tu égorgeras le bélier; tu en prendras le '
  - type: note
    content: Hé 9:12, 19.
  - type: text
    content: 'sang, et tu le répandras sur l’autel tout autour. '
  '17':
  - type: text
    content: 'Tu couperas le bélier par morceaux, et tu laveras les entrailles et les jambes, que tu mettras sur les morceaux et sur sa tête. '
  '18':
  - type: text
    content: 'Tu brûleras tout le bélier sur l’autel; c’est un holocauste à l’Éternel, c’est un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
  '19':
  - type: text
    content: 'Tu prendras l’autre bélier, et Aaron et ses fils poseront leurs mains sur la tête du bélier. '
  '2':
  - type: text
    content: 'Fais, avec de la fleur de farine de froment, des pains sans levain, des gâteaux sans levain pétris à l’huile, et des galettes sans levain arrosées d’huile. '
  '20':
  - type: text
    content: 'Tu égorgeras le bélier; tu prendras de son sang, tu en mettras sur le lobe de l’oreille droite d’Aaron et sur le lobe de l’oreille droite de ses fils, sur le pouce de leur main droite et sur le gros orteil de leur pied droit, et tu répandras le sang sur l’autel tout autour. '
  '21':
  - type: text
    content: 'Tu prendras du sang qui sera sur l’autel et de l’huile d’onction, et tu en feras l’aspersion sur Aaron et sur ses vêtements, sur ses fils et sur leurs vêtements. Ainsi seront consacrés Aaron et ses vêtements, ses fils et leurs vêtements. '
  '22':
  - type: text
    content: 'Tu prendras la graisse du bélier, la queue, la graisse qui couvre les entrailles, le grand lobe du foie, les deux rognons et la graisse qui les entoure, et l’épaule droite, car c’est un bélier de consécration; '
  '23':
  - type: text
    content: 'tu prendras aussi dans la corbeille de pains sans levain, placée devant l’Éternel, un gâteau de pain, un gâteau à l’huile et une galette. '
  '24':
  - type: text
    content: 'Tu mettras toutes ces choses sur les mains d’Aaron et sur les mains de ses fils, et tu les agiteras de côté et d’autre devant l’Éternel. '
  '25':
  - type: text
    content: 'Tu les ôteras ensuite de leurs mains, et tu les brûleras sur l’autel, par-dessus l’holocauste; c’est un sacrifice consumé par le feu devant l’Éternel, d’une agréable odeur à l’Éternel. '
  '26':
  - type: text
    content: 'Tu prendras la poitrine du bélier qui aura servi à la consécration d’Aaron, et tu l’agiteras de côté et d’autre devant l’Éternel: ce sera ta portion. '
  '27':
  - type: text
    content: 'Tu sanctifieras la poitrine et l’épaule du bélier qui aura servi à la consécration d’Aaron et de ses fils, la poitrine en l’agitant de côté et d’autre, l’épaule en la présentant par élévation. '
  '28':
  - type: note
    content: Lé 8:31, 34; 10:14.
  - type: text
    content: 'Elles appartiendront à Aaron et à ses fils, par une loi perpétuelle qu’observeront les enfants d’Israël, car c’est une offrande par élévation; et, dans les sacrifices d’actions de grâces des enfants d’Israël, l’offrande par élévation sera pour l’Éternel. '
  '29':
  - type: text
    content: 'Les vêtements sacrés d’Aaron seront après lui pour ses fils, qui les mettront lorsqu’on les oindra et qu’on les consacrera. '
  '3':
  - type: text
    content: 'Tu les mettras dans une corbeille, en offrant le jeune taureau et les deux béliers. '
  '30':
  - type: text
    content: 'Ils seront portés pendant sept jours par celui de ses fils qui lui succédera dans le sacerdoce, et qui entrera dans la tente d’assignation, pour faire le service dans le sanctuaire. '
  '31':
  - type: text
    content: 'Tu prendras le bélier de consécration, et tu en feras cuire la chair dans un lieu saint. '
  '32':
  - type: note
    content: Lé 8:31; 24:9.
  - type: text
    content: 'Aaron et ses fils mangeront, à l’entrée de la tente d’assignation, la chair du bélier et le pain qui sera dans la corbeille. '
  '33':
  - type: text
    content: 'Ils mangeront ainsi ce qui aura servi d’expiation afin qu’ils fussent consacrés et sanctifiés; '
  - type: note
    content: Lé 10:14. Mt 12:4.
  - type: text
    content: 'nul étranger n’en mangera, car ce sont des choses saintes. '
  '34':
  - type: text
    content: 'S’il reste de la chair de consécration et du pain jusqu’au matin, tu brûleras dans le feu ce qui restera; on ne le mangera point, car c’est une chose sainte. '
  '35':
  - type: text
    content: 'Tu suivras à l’égard d’Aaron et de ses fils tous les ordres que je t’ai donnés. Tu emploieras sept jours à les consacrer. '
  '36':
  - type: text
    content: 'Tu offriras chaque jour un taureau en sacrifice pour le péché, pour l’expiation; tu purifieras l’autel par cette expiation, et tu l’oindras pour le sanctifier. '
  '37':
  - type: text
    content: Pendant sept jours, tu feras des expiations sur l’autel, et tu le sanctifieras; et l’autel sera très saint, et tout ce qui touchera l’autel sera sanctifié.
  - type: heading
    content: Le sacrifice perpétuel
  - type: heading
    content: 'V. 38-46: cf. No 28:3-8. Éz 46:13-15. (Ro 12:1.)'
  '38':
  - type: text
    content: ' '
  - type: note
    content: No 28:3.
  - type: text
    content: 'Voici ce que tu offriras sur l’autel: deux agneaux d’un an, chaque jour, à perpétuité. '
  '39':
  - type: text
    content: 'Tu offriras l’un des agneaux le matin, et l’autre agneau entre les deux soirs. '
  '4':
  - type: text
    content: 'Tu feras avancer Aaron et ses fils vers l’entrée de la tente d’assignation, et tu les laveras avec de l’eau. '
  '40':
  - type: text
    content: 'Tu offriras, avec le premier agneau, un dixième d’épha de fleur de farine pétrie dans un quart de hin d’huile d’olives concassées, et une libation d’un quart de hin de vin. '
  '41':
  - type: text
    content: 'Tu offriras le second agneau entre les deux soirs, avec une offrande et une libation semblables à celles du matin; c’est un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
  '42':
  - type: text
    content: 'Voilà l’holocauste perpétuel qui sera offert par vos descendants, à l’entrée de la tente d’assignation, devant l’Éternel: c’est là que je me rencontrerai avec vous, et que je te parlerai. '
  '43':
  - type: text
    content: 'Je me rencontrerai là avec les enfants d’Israël, et ce lieu sera sanctifié par ma gloire. '
  '44':
  - type: text
    content: 'Je sanctifierai la tente d’assignation et l’autel; je sanctifierai Aaron et ses fils, pour qu’ils soient à mon service dans le sacerdoce. '
  '45':
  - type: note
    content: Ex 25:8. Lé 26:12. Ps 78:60. Za 2:10. 2 Co 6:16. Ap 21:3.
  - type: text
    content: 'J’habiterai au milieu des enfants d’Israël, et je serai leur Dieu. '
  '46':
  - type: text
    content: Ils connaîtront que je suis l’Éternel, leur Dieu, qui les ai fait sortir du pays d’Égypte, pour habiter au milieu d’eux. Je suis l’Éternel, leur Dieu.
  '5':
  - type: text
    content: 'Tu prendras les vêtements; tu revêtiras Aaron de la tunique, de la robe de l’éphod, de l’éphod et du pectoral, et tu mettras sur lui la ceinture de l’éphod. '
  '6':
  - type: text
    content: 'Tu poseras la tiare sur sa tête, et tu placeras le diadème de sainteté sur la tiare. '
  '7':
  - type: note
    content: Ex 30:25.
  - type: text
    content: 'Tu prendras l’huile d’onction, tu en répandras sur sa tête, et tu l’oindras. '
  '8':
  - type: text
    content: 'Tu feras approcher ses fils, et tu les revêtiras des tuniques. '
  '9':
  - type: text
    content: 'Tu mettras une ceinture à Aaron et à ses fils, et tu attacheras des bonnets aux fils d’Aaron. Le sacerdoce leur appartiendra par une loi perpétuelle. Tu consacreras donc Aaron et ses fils. '
