document_id: EXO.29
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La consécration des sacrificateurs
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-37: cf. Lé 8. Hé 5:1-10; 7:26-28.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 8:2
      metadata:
        usfm: LEV.8.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:2
      metadata:
        usfm: LEV.9.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Voici ce que tu feras pour les sanctifier, afin qu’ils soient à mon service dans le sacerdoce. Prends un jeune taureau et deux béliers sans défaut. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fais, avec de la fleur de farine de froment, des pains sans levain, des gâteaux sans levain pétris à l’huile, et des galettes sans levain arrosées d’huile. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu les mettras dans une corbeille, en offrant le jeune taureau et les deux béliers. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu feras avancer Aaron et ses fils vers l’entrée de la tente d’assignation, et tu les laveras avec de l’eau. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu prendras les vêtements; tu revêtiras Aaron de la tunique, de la robe de l’éphod, de l’éphod et du pectoral, et tu mettras sur lui la ceinture de l’éphod. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu poseras la tiare sur sa tête, et tu placeras le diadème de sainteté sur la tiare. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 30:25
      metadata:
        usfm: EXO.30.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu prendras l’huile d’onction, tu en répandras sur sa tête, et tu l’oindras. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tu feras approcher ses fils, et tu les revêtiras des tuniques. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tu mettras une ceinture à Aaron et à ses fils, et tu attacheras des bonnets aux fils d’Aaron. Le sacerdoce leur appartiendra par une loi perpétuelle. Tu consacreras donc Aaron et ses fils. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 1:3
      metadata:
        usfm: LEV.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu amèneras le taureau devant la tente d’assignation, et Aaron et ses fils poseront leurs mains sur la tête du taureau. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu égorgeras le taureau devant l’Éternel, à l’entrée de la tente d’assignation. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tu prendras du sang du taureau, tu en mettras avec ton doigt sur les cornes de l’autel, et tu répandras tout le sang au pied de l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu prendras toute la graisse qui couvre les entrailles, le grand lobe du foie, les deux rognons et la graisse qui les entoure, et tu brûleras cela sur l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 4:12
      metadata:
        usfm: LEV.4.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:11
      metadata:
        usfm: HEB.13.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais tu brûleras au feu hors du camp la chair du taureau, sa peau et ses excréments: c’est un sacrifice pour le péché. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu prendras l’un des béliers, et Aaron et ses fils poseront leurs mains sur la tête du bélier. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tu égorgeras le bélier; tu en prendras le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:12
      metadata:
        usfm: HEB.9.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: HEB.9.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sang, et tu le répandras sur l’autel tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tu couperas le bélier par morceaux, et tu laveras les entrailles et les jambes, que tu mettras sur les morceaux et sur sa tête. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tu brûleras tout le bélier sur l’autel; c’est un holocauste à l’Éternel, c’est un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu prendras l’autre bélier, et Aaron et ses fils poseront leurs mains sur la tête du bélier. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tu égorgeras le bélier; tu prendras de son sang, tu en mettras sur le lobe de l’oreille droite d’Aaron et sur le lobe de l’oreille droite de ses fils, sur le pouce de leur main droite et sur le gros orteil de leur pied droit, et tu répandras le sang sur l’autel tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tu prendras du sang qui sera sur l’autel et de l’huile d’onction, et tu en feras l’aspersion sur Aaron et sur ses vêtements, sur ses fils et sur leurs vêtements. Ainsi seront consacrés Aaron et ses vêtements, ses fils et leurs vêtements. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu prendras la graisse du bélier, la queue, la graisse qui couvre les entrailles, le grand lobe du foie, les deux rognons et la graisse qui les entoure, et l’épaule droite, car c’est un bélier de consécration; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'tu prendras aussi dans la corbeille de pains sans levain, placée devant l’Éternel, un gâteau de pain, un gâteau à l’huile et une galette. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tu mettras toutes ces choses sur les mains d’Aaron et sur les mains de ses fils, et tu les agiteras de côté et d’autre devant l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tu les ôteras ensuite de leurs mains, et tu les brûleras sur l’autel, par-dessus l’holocauste; c’est un sacrifice consumé par le feu devant l’Éternel, d’une agréable odeur à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tu prendras la poitrine du bélier qui aura servi à la consécration d’Aaron, et tu l’agiteras de côté et d’autre devant l’Éternel: ce sera ta portion. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tu sanctifieras la poitrine et l’épaule du bélier qui aura servi à la consécration d’Aaron et de ses fils, la poitrine en l’agitant de côté et d’autre, l’épaule en la présentant par élévation. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 8:31
      metadata:
        usfm: LEV.8.31
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '34'
      metadata:
        usfm: LEV.8.34
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:14
      metadata:
        usfm: LEV.10.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Elles appartiendront à Aaron et à ses fils, par une loi perpétuelle qu’observeront les enfants d’Israël, car c’est une offrande par élévation; et, dans les sacrifices d’actions de grâces des enfants d’Israël, l’offrande par élévation sera pour l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Les vêtements sacrés d’Aaron seront après lui pour ses fils, qui les mettront lorsqu’on les oindra et qu’on les consacrera. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ils seront portés pendant sept jours par celui de ses fils qui lui succédera dans le sacerdoce, et qui entrera dans la tente d’assignation, pour faire le service dans le sanctuaire. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tu prendras le bélier de consécration, et tu en feras cuire la chair dans un lieu saint. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 8:31
      metadata:
        usfm: LEV.8.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:9
      metadata:
        usfm: LEV.24.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Aaron et ses fils mangeront, à l’entrée de la tente d’assignation, la chair du bélier et le pain qui sera dans la corbeille. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ils mangeront ainsi ce qui aura servi d’expiation afin qu’ils fussent consacrés et sanctifiés; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 10:14
      metadata:
        usfm: LEV.10.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:4
      metadata:
        usfm: MAT.12.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nul étranger n’en mangera, car ce sont des choses saintes. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'S’il reste de la chair de consécration et du pain jusqu’au matin, tu brûleras dans le feu ce qui restera; on ne le mangera point, car c’est une chose sainte. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tu suivras à l’égard d’Aaron et de ses fils tous les ordres que je t’ai donnés. Tu emploieras sept jours à les consacrer. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Tu offriras chaque jour un taureau en sacrifice pour le péché, pour l’expiation; tu purifieras l’autel par cette expiation, et tu l’oindras pour le sanctifier. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Pendant sept jours, tu feras des expiations sur l’autel, et tu le sanctifieras; et l’autel sera très saint, et tout ce qui touchera l’autel sera sanctifié.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le sacrifice perpétuel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 38-46: cf. No 28:3-8. Éz 46:13-15. (Ro 12:1.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 28:3
      metadata:
        usfm: NUM.28.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Voici ce que tu offriras sur l’autel: deux agneaux d’un an, chaque jour, à perpétuité. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Tu offriras l’un des agneaux le matin, et l’autre agneau entre les deux soirs. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Tu offriras, avec le premier agneau, un dixième d’épha de fleur de farine pétrie dans un quart de hin d’huile d’olives concassées, et une libation d’un quart de hin de vin. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Tu offriras le second agneau entre les deux soirs, avec une offrande et une libation semblables à celles du matin; c’est un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Voilà l’holocauste perpétuel qui sera offert par vos descendants, à l’entrée de la tente d’assignation, devant l’Éternel: c’est là que je me rencontrerai avec vous, et que je te parlerai. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Je me rencontrerai là avec les enfants d’Israël, et ce lieu sera sanctifié par ma gloire. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Je sanctifierai la tente d’assignation et l’autel; je sanctifierai Aaron et ses fils, pour qu’ils soient à mon service dans le sacerdoce. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:8
      metadata:
        usfm: EXO.25.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 26:12
      metadata:
        usfm: LEV.26.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:60
      metadata:
        usfm: PSA.78.60
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 2:10
      metadata:
        usfm: ZEC.2.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 6:16
      metadata:
        usfm: 2CO.6.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 21:3
      metadata:
        usfm: REV.21.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'J’habiterai au milieu des enfants d’Israël, et je serai leur Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ils connaîtront que je suis l’Éternel, leur Dieu, qui les ai fait sortir du pays d’Égypte, pour habiter au milieu d’eux. Je suis l’Éternel, leur Dieu.
