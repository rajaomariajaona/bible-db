document_id: OBA.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie sur la ruine d’Édom
  - type: heading
    content: 'V. 1-16: cf. (Jé 49:7-22. Éz 25:12-14; 35. És 34.) Lu 14:11.'
  - type: text
    content: Prophétie d’Abdias.
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel, sur Édom:'
  - type: note
    content: Jé 49:14.
  - type: text
    content: Nous avons appris une nouvelle de la part de l’Éternel,
  - type: text
    content: 'Et un messager a été envoyé parmi les nations:'
  - type: text
    content: Levez-vous, marchons contre Édom pour lui faire la guerre!
  '10':
  - type: text
    content: 'A cause de ta '
  - type: note
    content: Ge 27:41. Éz 35:5. Am 1:11.
  - type: text
    content: violence contre ton frère Jacob,
  - type: text
    content: Tu seras couvert de honte,
  - type: text
    content: Et tu seras exterminé pour toujours.
  '11':
  - type: text
    content: Le jour où tu te tenais en face de lui,
  - type: text
    content: Le jour où des étrangers emmenaient captive son armée,
  - type: text
    content: Où des étrangers entraient dans ses portes,
  - type: text
    content: Et jetaient le sort sur Jérusalem,
  - type: text
    content: 'Toi aussi tu étais '
  - type: note
    content: Ps 137:7.
  - type: text
    content: comme l’un d’eux.
  '12':
  - type: text
    content: Ne repais pas ta vue du jour de ton frère, du jour de son malheur,
  - type: text
    content: Ne te réjouis pas sur les enfants de Juda au jour de leur ruine,
  - type: text
    content: Et n’ouvre pas une grande bouche au jour de la détresse!
  '13':
  - type: text
    content: N’entre pas dans les portes de mon peuple au jour de sa ruine,
  - type: text
    content: Ne repais pas ta vue de son malheur au jour de sa ruine,
  - type: text
    content: Et ne porte pas la main sur ses richesses au jour de sa ruine!
  '14':
  - type: text
    content: Ne te tiens pas au carrefour pour exterminer ses fuyards,
  - type: text
    content: Et ne livre pas ses réchappés au jour de la détresse!
  '15':
  - type: text
    content: Car le jour de l’Éternel est proche, pour toutes les nations;
  - type: note
    content: Éz 35:15.
  - type: text
    content: Il te sera fait comme tu as fait,
  - type: text
    content: Tes œuvres retomberont sur ta tête.
  '16':
  - type: text
    content: Car, comme vous avez bu sur ma montagne sainte,
  - type: text
    content: Ainsi toutes les nations boiront sans cesse;
  - type: text
    content: Elles boiront, elles avaleront,
  - type: text
    content: Et elles seront comme si elles n’avaient jamais été.
  - type: heading
    content: 'V. 17-21: cf. (Joë 3:17, 19. És 11:11-14.) (Éz 37:21-28. Mi 4:6, 7.)'
  '17':
  - type: text
    content: Mais le salut sera sur la montagne de Sion, elle sera sainte,
  - type: text
    content: Et la maison de Jacob reprendra ses possessions.
  '18':
  - type: text
    content: La maison de Jacob sera un feu, et la maison de Joseph une flamme;
  - type: text
    content: Mais la maison d’Ésaü sera du chaume,
  - type: text
    content: Qu’elles allumeront et consumeront;
  - type: text
    content: Et il ne restera rien de la maison d’Ésaü,
  - type: text
    content: Car l’Éternel a parlé.
  '19':
  - type: text
    content: Ceux du midi posséderont la montagne d’Ésaü,
  - type: text
    content: Et ceux de la plaine le pays des Philistins;
  - type: text
    content: Ils posséderont le territoire d’Éphraïm et celui de Samarie;
  - type: text
    content: Et Benjamin possédera Galaad.
  '2':
  - type: text
    content: Voici, je te rendrai petit parmi les nations,
  - type: text
    content: Tu seras l’objet du plus grand mépris.
  '20':
  - type: text
    content: Les captifs de cette armée des enfants d’Israël
  - type: text
    content: Posséderont le pays occupé par les Cananéens jusqu’à Sarepta,
  - type: text
    content: Et les captifs de Jérusalem qui sont à Sepharad
  - type: text
    content: Posséderont les villes du midi.
  '21':
  - type: text
    content: Des libérateurs monteront sur la montagne de Sion,
  - type: text
    content: Pour juger la montagne d’Ésaü;
  - type: text
    content: Et à l’Éternel appartiendra le règne.
  '3':
  - type: text
    content: L’orgueil de ton cœur t’a égaré,
  - type: text
    content: Toi qui habites le creux des rochers,
  - type: text
    content: Qui t’assieds sur les hauteurs,
  - type: text
    content: 'Et qui dis en toi-même:'
  - type: text
    content: Qui me précipitera jusqu’à terre?
  '4':
  - type: text
    content: ' '
  - type: note
    content: Jé 49:16.
  - type: text
    content: Quand tu placerais ton nid aussi haut que celui de l’aigle,
  - type: text
    content: Quand tu le placerais parmi les étoiles,
  - type: text
    content: Je t’en précipiterai, dit l’Éternel.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Jé 49:9.
  - type: text
    content: Si des voleurs, des pillards, viennent de nuit chez toi,
  - type: text
    content: Comme te voilà dévasté!
  - type: text
    content: Mais enlèvent-ils plus qu’ils ne peuvent?
  - type: text
    content: Si des vendangeurs viennent chez toi,
  - type: text
    content: Ne laissent-ils rien à grappiller?…
  '6':
  - type: text
    content: Ah! Comme Ésaü est fouillé!
  - type: text
    content: Comme ses trésors sont découverts!
  '7':
  - type: text
    content: Tous tes alliés t’ont chassé jusqu’à la frontière,
  - type: text
    content: Tes amis t’ont joué, t’ont dominé,
  - type: text
    content: Ceux qui mangeaient ton pain t’ont dressé des pièges,
  - type: text
    content: Et tu n’as pas su t’en apercevoir!
  '8':
  - type: text
    content: ' '
  - type: note
    content: És 29:14. Jé 49:7.
  - type: text
    content: N’est-ce pas en ce jour, dit l’Éternel,
  - type: text
    content: Que je ferai disparaître d’Édom les sages,
  - type: text
    content: Et de la montagne d’Ésaü l’intelligence?
  '9':
  - type: text
    content: 'Tes '
  - type: note
    content: Am 2:14, 16.
  - type: text
    content: guerriers, ô Théman, seront dans l’épouvante,
  - type: text
    content: Car tous ceux de la montagne d’Ésaü périront dans le carnage.
