document_id: OBA.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie sur la ruine d’Édom
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-16: cf. (Jé 49:7-22. Éz 25:12-14; 35. És 34.) Lu 14:11.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Prophétie d’Abdias.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel, sur Édom:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 49:14
      metadata:
        usfm: JER.49.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Nous avons appris une nouvelle de la part de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et un messager a été envoyé parmi les nations:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Levez-vous, marchons contre Édom pour lui faire la guerre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Voici, je te rendrai petit parmi les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu seras l’objet du plus grand mépris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L’orgueil de ton cœur t’a égaré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi qui habites le creux des rochers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui t’assieds sur les hauteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et qui dis en toi-même:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui me précipitera jusqu’à terre?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 49:16
      metadata:
        usfm: JER.49.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Quand tu placerais ton nid aussi haut que celui de l’aigle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand tu le placerais parmi les étoiles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’en précipiterai, dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 49:9
      metadata:
        usfm: JER.49.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Si des voleurs, des pillards, viennent de nuit chez toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme te voilà dévasté!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais enlèvent-ils plus qu’ils ne peuvent?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si des vendangeurs viennent chez toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne laissent-ils rien à grappiller?…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ah! Comme Ésaü est fouillé!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme ses trésors sont découverts!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tous tes alliés t’ont chassé jusqu’à la frontière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes amis t’ont joué, t’ont dominé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui mangeaient ton pain t’ont dressé des pièges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu n’as pas su t’en apercevoir!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 29:14
      metadata:
        usfm: ISA.29.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 49:7
      metadata:
        usfm: JER.49.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: N’est-ce pas en ce jour, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je ferai disparaître d’Édom les sages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de la montagne d’Ésaü l’intelligence?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 2:14
      metadata:
        usfm: AMO.2.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: AMO.2.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: guerriers, ô Théman, seront dans l’épouvante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tous ceux de la montagne d’Ésaü périront dans le carnage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'A cause de ta '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 27:41
      metadata:
        usfm: GEN.27.41
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 35:5
      metadata:
        usfm: EZK.35.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 1:11
      metadata:
        usfm: AMO.1.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: violence contre ton frère Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu seras couvert de honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu seras exterminé pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le jour où tu te tenais en face de lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le jour où des étrangers emmenaient captive son armée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où des étrangers entraient dans ses portes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et jetaient le sort sur Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Toi aussi tu étais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 137:7
      metadata:
        usfm: PSA.137.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: comme l’un d’eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ne repais pas ta vue du jour de ton frère, du jour de son malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne te réjouis pas sur les enfants de Juda au jour de leur ruine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et n’ouvre pas une grande bouche au jour de la détresse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: N’entre pas dans les portes de mon peuple au jour de sa ruine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne repais pas ta vue de son malheur au jour de sa ruine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne porte pas la main sur ses richesses au jour de sa ruine!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ne te tiens pas au carrefour pour exterminer ses fuyards,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne livre pas ses réchappés au jour de la détresse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Car le jour de l’Éternel est proche, pour toutes les nations;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 35:15
      metadata:
        usfm: EZK.35.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il te sera fait comme tu as fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes œuvres retomberont sur ta tête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Car, comme vous avez bu sur ma montagne sainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi toutes les nations boiront sans cesse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles boiront, elles avaleront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et elles seront comme si elles n’avaient jamais été.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-21: cf. (Joë 3:17, 19. És 11:11-14.) (Éz 37:21-28. Mi 4:6, 7.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mais le salut sera sur la montagne de Sion, elle sera sainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la maison de Jacob reprendra ses possessions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: La maison de Jacob sera un feu, et la maison de Joseph une flamme;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais la maison d’Ésaü sera du chaume,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’elles allumeront et consumeront;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il ne restera rien de la maison d’Ésaü,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Éternel a parlé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ceux du midi posséderont la montagne d’Ésaü,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ceux de la plaine le pays des Philistins;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils posséderont le territoire d’Éphraïm et celui de Samarie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et Benjamin possédera Galaad.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Les captifs de cette armée des enfants d’Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: Posséderont le pays occupé par les Cananéens jusqu’à Sarepta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les captifs de Jérusalem qui sont à Sepharad
- type: usfm
  marker: q1
  children:
  - type: text
    text: Posséderont les villes du midi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Des libérateurs monteront sur la montagne de Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour juger la montagne d’Ésaü;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et à l’Éternel appartiendra le règne.
