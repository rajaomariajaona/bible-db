document_id: ISA.52,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérusalem sera restaurée
  - type: heading
    content: 'V. 1-6: cf. És 51:17, etc.; 25:9.'
  - type: text
    content: Réveille-toi! Réveille-toi! Revêts ta parure, Sion!
  - type: text
    content: Revêts tes habits de fête, Jérusalem, ville sainte!
  - type: text
    content: Car il n’entrera plus chez toi ni incirconcis ni impur.
  '10':
  - type: text
    content: L’Éternel découvre le bras de sa sainteté,
  - type: text
    content: Aux yeux de toutes les nations;
  - type: note
    content: Ps 98:2. Lu 3:6.
  - type: text
    content: Et toutes les extrémités de la terre verront
  - type: text
    content: Le salut de notre Dieu.
  '11':
  - type: text
    content: Partez, partez, sortez de là!
  - type: note
    content: 2 Co 6:17. Ap 18:4.
  - type: text
    content: Ne touchez rien d’impur!
  - type: text
    content: Sortez du milieu d’elle!
  - type: text
    content: Purifiez-vous, vous qui portez les vases de l’Éternel!
  '12':
  - type: text
    content: Ne sortez pas avec précipitation,
  - type: text
    content: Ne partez pas en fuyant;
  - type: text
    content: Car l’Éternel ira devant vous,
  - type: text
    content: Et le Dieu d’Israël fermera votre marche.
  - type: heading
    content: La personne et l’œuvre du serviteur de l’Éternel
  - type: heading
    content: '52 v. 13 à 53 v. 12: cf. (Lu 24:25-27. Ph 2:5-11.) (Ps 22. Mt 26 à 28. Ac 8:32-35; 13:27-39.) (1 Pi 2:21-25. Hé 9:11, etc.; 10:1-4.) Jn 1:29.'
  '13':
  - type: text
    content: Voici, mon serviteur prospérera;
  - type: text
    content: Il montera, il s’élèvera, il s’élèvera bien haut.
  '14':
  - type: text
    content: De même qu’il a été pour plusieurs un sujet d’effroi,
  - type: text
    content: 'Tant son visage était '
  - type: note
    content: És 35:3.
  - type: text
    content: défiguré,
  - type: text
    content: Tant son aspect différait de celui des fils de l’homme,
  '15':
  - type: text
    content: De même il sera pour beaucoup de peuples un sujet de joie;
  - type: text
    content: Devant lui des rois fermeront la bouche;
  - type: text
    content: 'Car ils verront ce qui '
  - type: note
    content: Ro 15:21.
  - type: text
    content: ne leur avait point été raconté,
  - type: text
    content: Ils apprendront ce qu’ils n’avaient point entendu.
  '2':
  - type: text
    content: Secoue ta poussière, lève-toi,
  - type: text
    content: Mets-toi sur ton séant, Jérusalem!
  - type: text
    content: Détache les liens de ton cou,
  - type: text
    content: Captive, fille de Sion!
  '3':
  - type: text
    content: 'Car ainsi parle l’Éternel:'
  - type: text
    content: C’est gratuitement que vous avez été vendus,
  - type: text
    content: Et ce n’est pas à prix d’argent que vous serez rachetés.
  '4':
  - type: text
    content: 'Car ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: 'Jadis '
  - type: note
    content: Ge 46:6.
  - type: text
    content: mon peuple descendit en Égypte, pour y séjourner;
  - type: text
    content: Puis l’Assyrien l’opprima sans cause.
  '5':
  - type: text
    content: Et maintenant, qu’ai-je à faire, dit l’Éternel,
  - type: text
    content: Quand mon peuple a été gratuitement enlevé?
  - type: text
    content: Ses tyrans poussent des cris, dit l’Éternel,
  - type: text
    content: 'Et toute la durée du jour mon nom est '
  - type: note
    content: Éz 36:20, 23. Ro 2:24.
  - type: text
    content: outragé.
  '6':
  - type: text
    content: C’est pourquoi mon peuple connaîtra mon nom;
  - type: text
    content: C’est pourquoi il saura, en ce jour,
  - type: text
    content: 'Que c’est moi qui parle: me voici!'
  - type: heading
    content: 'V. 7-12: cf. Ro 10:15. (Jé 31:7-14. Ps 98:1-3.)'
  '7':
  - type: text
    content: ' '
  - type: note
    content: Na 1:15. Ro 10:15.
  - type: text
    content: Qu’ils sont beaux sur les montagnes,
  - type: text
    content: Les pieds de celui qui apporte de bonnes nouvelles,
  - type: text
    content: Qui publie la paix!
  - type: text
    content: De celui qui apporte de bonnes nouvelles,
  - type: text
    content: Qui publie le salut!
  - type: text
    content: 'De celui qui dit à Sion:'
  - type: text
    content: Ton Dieu règne!
  '8':
  - type: text
    content: La voix de tes sentinelles retentit;
  - type: text
    content: Elles élèvent la voix,
  - type: text
    content: Elles poussent ensemble des cris d’allégresse;
  - type: text
    content: Car de leurs propres yeux elles voient
  - type: text
    content: Que l’Éternel ramène Sion.
  '9':
  - type: text
    content: Éclatez ensemble en cris de joie,
  - type: text
    content: Ruines de Jérusalem!
  - type: text
    content: Car l’Éternel console son peuple,
  - type: text
    content: Il rachète Jérusalem.
