document_id: ISA.52,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jérusalem sera restaurée
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. És 51:17, etc.; 25:9.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réveille-toi! Réveille-toi! Revêts ta parure, Sion!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Revêts tes habits de fête, Jérusalem, ville sainte!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il n’entrera plus chez toi ni incirconcis ni impur.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel découvre le bras de sa sainteté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux yeux de toutes les nations;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 98:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et toutes les extrémités de la terre verront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le salut de notre Dieu.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Partez, partez, sortez de là!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 6:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 18:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne touchez rien d’impur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sortez du milieu d’elle!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Purifiez-vous, vous qui portez les vases de l’Éternel!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne sortez pas avec précipitation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne partez pas en fuyant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel ira devant vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le Dieu d’Israël fermera votre marche.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La personne et l’œuvre du serviteur de l’Éternel
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: '52 v. 13 à 53 v. 12: cf. (Lu 24:25-27. Ph 2:5-11.) (Ps 22. Mt 26 à 28. Ac 8:32-35; 13:27-39.) (1 Pi 2:21-25. Hé 9:11, etc.; 10:1-4.) Jn 1:29.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, mon serviteur prospérera;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il montera, il s’élèvera, il s’élèvera bien haut.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De même qu’il a été pour plusieurs un sujet d’effroi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tant son visage était '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 35:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: défiguré,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tant son aspect différait de celui des fils de l’homme,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De même il sera pour beaucoup de peuples un sujet de joie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant lui des rois fermeront la bouche;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car ils verront ce qui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 15:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ne leur avait point été raconté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils apprendront ce qu’ils n’avaient point entendu.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Secoue ta poussière, lève-toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mets-toi sur ton séant, Jérusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Détache les liens de ton cou,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Captive, fille de Sion!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est gratuitement que vous avez été vendus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ce n’est pas à prix d’argent que vous serez rachetés.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Jadis '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 46:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: mon peuple descendit en Égypte, pour y séjourner;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis l’Assyrien l’opprima sans cause.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et maintenant, qu’ai-je à faire, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand mon peuple a été gratuitement enlevé?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses tyrans poussent des cris, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et toute la durée du jour mon nom est '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 36:20
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 2:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: outragé.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi mon peuple connaîtra mon nom;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi il saura, en ce jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que c’est moi qui parle: me voici!'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-12: cf. Ro 10:15. (Jé 31:7-14. Ps 98:1-3.)'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na 1:15. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 10:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qu’ils sont beaux sur les montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les pieds de celui qui apporte de bonnes nouvelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui publie la paix!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De celui qui apporte de bonnes nouvelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui publie le salut!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'De celui qui dit à Sion:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton Dieu règne!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La voix de tes sentinelles retentit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles élèvent la voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles poussent ensemble des cris d’allégresse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car de leurs propres yeux elles voient
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l’Éternel ramène Sion.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éclatez ensemble en cris de joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ruines de Jérusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel console son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il rachète Jérusalem.
