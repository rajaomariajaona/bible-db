document_id: EZK.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La captivité de Sédécias, et la dispersion du peuple
  - type: heading
    content: 'V. 1-16: cf. Jé 52:3-11, 15.'
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '10':
  - type: text
    content: 'Dis-leur: Ainsi parle le Seigneur, l’Éternel: Cet oracle concerne le prince qui est à Jérusalem, et toute la maison d’Israël qui s’y trouve.'
  '11':
  - type: text
    content: 'Dis: Je suis pour vous un signe.'
  - type: text
    content: 'Ce que j’ai fait, c’est ce qui leur sera fait:'
  - type: text
    content: Ils iront en exil, en captivité.
  '12':
  - type: text
    content: Le prince qui est au milieu d’eux
  - type: text
    content: 'Mettra son bagage sur l’épaule pendant l’obscurité et '
  - type: note
    content: 2 R 25:4.
  - type: text
    content: partira;
  - type: text
    content: On percera la muraille pour le faire sortir;
  - type: text
    content: Il se couvrira le visage,
  - type: text
    content: Pour que ses yeux ne regardent pas la terre.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Éz 17:20.
  - type: text
    content: J’étendrai mon rets sur lui,
  - type: text
    content: Et il sera pris dans mon filet;
  - type: text
    content: Je l’emmènerai à Babylone, dans le pays des Chaldéens;
  - type: text
    content: Mais il ne le verra pas, et il y mourra.
  '14':
  - type: text
    content: Tous ceux qui l’entourent et lui sont en aide,
  - type: text
    content: 'Et toutes ses troupes, je les '
  - type: note
    content: Éz 5:10, 12.
  - type: text
    content: disperserai à tous les vents,
  - type: text
    content: Et je tirerai l’épée derrière eux.
  '15':
  - type: text
    content: Et ils sauront que je suis l’Éternel,
  - type: text
    content: Quand je les répandrai parmi les nations,
  - type: text
    content: Quand je les disperserai en divers pays.
  '16':
  - type: text
    content: Mais je laisserai d’eux quelques hommes
  - type: text
    content: Qui échapperont à l’épée, à la famine et à la peste,
  - type: text
    content: Afin qu’ils racontent toutes leurs abominations
  - type: text
    content: Parmi les nations où ils iront.
  - type: text
    content: Et ils sauront que je suis l’Éternel.
  - type: heading
    content: 'V. 17-20: cf. Éz 4:9, etc.'
  '17':
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '18':
  - type: text
    content: Fils de l’homme, tu mangeras ton pain avec tremblement,
  - type: text
    content: Tu boiras ton eau avec inquiétude et angoisse.
  '19':
  - type: text
    content: 'Dis au peuple du pays:'
  - type: text
    content: Ainsi parle le Seigneur, l’Éternel,
  - type: text
    content: Sur les habitants de Jérusalem dans la terre d’Israël!
  - type: text
    content: Ils mangeront leur pain avec angoisse,
  - type: text
    content: 'Et ils boiront leur eau avec '
  - type: note
    content: Éz 4:16.
  - type: text
    content: épouvante;
  - type: text
    content: Car leur pays sera dépouillé de tout ce qu’il contient,
  - type: text
    content: A cause de la violence de tous ceux qui l’habitent.
  '2':
  - type: text
    content: 'Fils de l’homme, tu habites au milieu d’une famille de '
  - type: note
    content: Éz 2:3-8; 3:26, 27.
  - type: text
    content: 'rebelles, qui ont des yeux pour voir et qui ne '
  - type: note
    content: És 6:9. Jé 5:21.
  - type: text
    content: 'voient point, des '
  - type: note
    content: Jé 5:21.
  - type: text
    content: 'oreilles pour entendre et qui n’entendent point; car c’est une famille de rebelles. '
  '20':
  - type: text
    content: Les villes peuplées seront détruites,
  - type: text
    content: Et le pays sera ravagé.
  - type: text
    content: Et vous saurez que je suis l’Éternel.
  - type: heading
    content: 'V. 21-28: cf. Éz 7:1-13. 2 Pi 3:3, 4.'
  '21':
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '22':
  - type: text
    content: Fils de l’homme, que signifient ces discours moqueurs
  - type: text
    content: 'Que vous tenez dans le pays d’Israël:'
  - type: text
    content: Les jours se prolongent,
  - type: text
    content: Et toutes les visions restent sans effet?
  '23':
  - type: text
    content: 'C’est pourquoi dis-leur:'
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Je ferai cesser ces discours moqueurs;
  - type: text
    content: On ne les tiendra plus en Israël.
  - type: text
    content: 'Dis-leur, au contraire:'
  - type: text
    content: Les jours approchent,
  - type: text
    content: Et toutes les visions s’accompliront.
  '24':
  - type: text
    content: Car il n’y aura plus de visions vaines,
  - type: text
    content: Ni d’oracles trompeurs,
  - type: text
    content: Au milieu de la maison d’Israël.
  '25':
  - type: text
    content: Car moi, l’Éternel, je parlerai;
  - type: text
    content: Ce que je dirai s’accomplira,
  - type: text
    content: Et ne sera plus différé;
  - type: text
    content: Oui, de vos jours, famille de rebelles,
  - type: text
    content: Je prononcerai une parole et je l’accomplirai,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  '26':
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '27':
  - type: text
    content: 'Fils de l’homme, voici, la maison d’Israël dit:'
  - type: text
    content: Les visions qu’il a ne sont pas près de s’accomplir;
  - type: text
    content: Il prophétise pour des temps éloignés.
  '28':
  - type: text
    content: 'C’est pourquoi dis-leur:'
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Il n’y aura plus de délai dans l’accomplissement de mes paroles;
  - type: text
    content: La parole que je prononcerai s’accomplira,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  '3':
  - type: text
    content: 'Et toi, fils de l’homme, prépare tes effets de voyage, et pars de jour, sous leurs yeux! Pars, en leur présence, du lieu où tu es pour un autre lieu: peut-être verront-ils qu’ils sont une famille de rebelles. '
  '4':
  - type: text
    content: 'Sors tes effets comme des effets de voyage, de jour sous leurs yeux; et toi, pars le soir, en leur présence, comme partent des exilés. '
  '5':
  - type: text
    content: 'Sous leurs yeux, tu perceras la muraille, et tu sortiras tes effets par là. '
  '6':
  - type: text
    content: 'Sous leurs yeux, tu les mettras sur ton épaule, tu les sortiras pendant l’obscurité, tu te couvriras le visage, et tu ne regarderas pas la terre; car je veux que tu sois un signe pour la maison d’Israël. '
  '7':
  - type: text
    content: 'Je fis ce qui m’avait été ordonné: je sortis de jour mes effets comme des effets de voyage, le soir je perçai la muraille avec la main, et je les sortis pendant l’obscurité et les mis sur mon épaule, en leur présence. '
  '8':
  - type: text
    content: 'Le matin, la parole de l’Éternel me fut adressée, en ces mots: '
  '9':
  - type: text
    content: 'Fils de l’homme, la maison d’Israël, cette famille de rebelles ne t’a-t-elle pas dit: Que fais-tu? '
