document_id: EZK.12,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La captivité de Sédécias, et la dispersion du peuple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-16: cf. Jé 52:3-11, 15.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dis-leur: Ainsi parle le Seigneur, l’Éternel: Cet oracle concerne le prince qui est à Jérusalem, et toute la maison d’Israël qui s’y trouve.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dis: Je suis pour vous un signe.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ce que j’ai fait, c’est ce qui leur sera fait:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils iront en exil, en captivité.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Le prince qui est au milieu d’eux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mettra son bagage sur l’épaule pendant l’obscurité et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 25:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: partira;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On percera la muraille pour le faire sortir;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se couvrira le visage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que ses yeux ne regardent pas la terre.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 17:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: J’étendrai mon rets sur lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il sera pris dans mon filet;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je l’emmènerai à Babylone, dans le pays des Chaldéens;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il ne le verra pas, et il y mourra.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tous ceux qui l’entourent et lui sont en aide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et toutes ses troupes, je les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 5:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: disperserai à tous les vents,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je tirerai l’épée derrière eux.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Et ils sauront que je suis l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je les répandrai parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je les disperserai en divers pays.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Mais je laisserai d’eux quelques hommes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui échapperont à l’épée, à la famine et à la peste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin qu’ils racontent toutes leurs abominations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parmi les nations où ils iront.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils sauront que je suis l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-20: cf. Éz 4:9, etc.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fils de l’homme, tu mangeras ton pain avec tremblement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu boiras ton eau avec inquiétude et angoisse.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dis au peuple du pays:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi parle le Seigneur, l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur les habitants de Jérusalem dans la terre d’Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils mangeront leur pain avec angoisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et ils boiront leur eau avec '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 4:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: épouvante;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car leur pays sera dépouillé de tout ce qu’il contient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de la violence de tous ceux qui l’habitent.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fils de l’homme, tu habites au milieu d’une famille de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 2:3-8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:26
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '27'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'rebelles, qui ont des yeux pour voir et qui ne '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 6:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 5:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'voient point, des '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 5:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'oreilles pour entendre et qui n’entendent point; car c’est une famille de rebelles. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Les villes peuplées seront détruites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le pays sera ravagé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous saurez que je suis l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 21-28: cf. Éz 7:1-13. 2 Pi 3:3, 4.'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fils de l’homme, que signifient ces discours moqueurs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que vous tenez dans le pays d’Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les jours se prolongent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toutes les visions restent sans effet?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'C’est pourquoi dis-leur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai cesser ces discours moqueurs;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne les tiendra plus en Israël.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dis-leur, au contraire:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les jours approchent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toutes les visions s’accompliront.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Car il n’y aura plus de visions vaines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni d’oracles trompeurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu de la maison d’Israël.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Car moi, l’Éternel, je parlerai;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce que je dirai s’accomplira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne sera plus différé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, de vos jours, famille de rebelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je prononcerai une parole et je l’accomplirai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le Seigneur, l’Éternel.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fils de l’homme, voici, la maison d’Israël dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les visions qu’il a ne sont pas près de s’accomplir;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il prophétise pour des temps éloignés.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'C’est pourquoi dis-leur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y aura plus de délai dans l’accomplissement de mes paroles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La parole que je prononcerai s’accomplira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le Seigneur, l’Éternel.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Et toi, fils de l’homme, prépare tes effets de voyage, et pars de jour, sous leurs yeux! Pars, en leur présence, du lieu où tu es pour un autre lieu: peut-être verront-ils qu’ils sont une famille de rebelles. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Sors tes effets comme des effets de voyage, de jour sous leurs yeux; et toi, pars le soir, en leur présence, comme partent des exilés. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Sous leurs yeux, tu perceras la muraille, et tu sortiras tes effets par là. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Sous leurs yeux, tu les mettras sur ton épaule, tu les sortiras pendant l’obscurité, tu te couvriras le visage, et tu ne regarderas pas la terre; car je veux que tu sois un signe pour la maison d’Israël. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Je fis ce qui m’avait été ordonné: je sortis de jour mes effets comme des effets de voyage, le soir je perçai la muraille avec la main, et je les sortis pendant l’obscurité et les mis sur mon épaule, en leur présence. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Le matin, la parole de l’Éternel me fut adressée, en ces mots: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fils de l’homme, la maison d’Israël, cette famille de rebelles ne t’a-t-elle pas dit: Que fais-tu? '
