document_id: 2SA.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dernières paroles de David
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. 2 S 7:12-16. Ps 72. És 11:1-5. Jé 33:14, etc. Lu 1:30-33.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici les dernières paroles de David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parole de David, fils d’Isaï,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parole de l’homme haut placé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De l’oint du Dieu de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du chantre agréable d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L’esprit de l’Éternel parle par moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa parole est sur ma langue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le Dieu d’Israël a parlé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Le rocher d’Israël m’a dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui règne parmi les hommes avec justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui règne dans la crainte de Dieu,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Est pareil à la lumière du matin, quand le soleil brille
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que la matinée est sans nuages;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses rayons après la pluie font sortir de terre la verdure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: N’en est-il pas ainsi de ma maison devant Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisqu’il a fait avec moi une alliance éternelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: En tous points bien réglée et offrant pleine sécurité?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne fera-t-il pas germer tout mon salut et tous mes désirs?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mais les méchants sont tous comme des épines que l’on rejette,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que l’on ne prend pas avec la main;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Celui qui les touche s’arme d’un fer ou du bois d’une lance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et on les brûle au feu sur place.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vaillants hommes de David
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-39: cf. 1 Ch 11:10-47; 27:1-15. (Ph 4:3. Ap 3:5.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Ch 11:11, etc.
    marker-yv: yv-n
  - type: text
    text: 'Voici les noms des vaillants hommes qui étaient au service de David. Joscheb-Basschébeth, le Tachkemonite, l’un des principaux officiers. Il brandit sa lance sur huit cents hommes, qu’il fit périr en une seule fois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Après lui, Éléazar, fils de Dodo, fils d’Achochi. Il était l’un des trois guerriers qui affrontèrent avec David les Philistins rassemblés pour combattre, tandis que les hommes d’Israël se retiraient sur les hauteurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il se leva, et frappa les Philistins jusqu’à ce que sa main fût lasse et qu’elle restât attachée à son épée. L’Éternel opéra une grande délivrance ce jour-là. Le peuple revint après Éléazar, seulement pour prendre les dépouilles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Après lui, Schamma, fils d’Agué, d’Harar. Les Philistins s’étaient rassemblés à Léchi. Il y avait là une pièce de terre remplie de lentilles; et le peuple fuyait devant les Philistins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Schamma se plaça au milieu du champ, le protégea, et battit les Philistins. Et l’Éternel opéra une grande délivrance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Trois des trente chefs descendirent au temps de la moisson et vinrent auprès de David, dans la caverne d’Adullam, lorsqu’une troupe de Philistins était campée dans la vallée des Rephaïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'David était alors dans la forteresse, et il y avait un poste de Philistins à Bethléhem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'David eut un désir, et il dit: Qui me fera boire de l’eau de la citerne qui est à la porte de Bethléhem? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors les trois vaillants hommes passèrent au travers du camp des Philistins, et puisèrent de l’eau de la citerne qui est à la porte de Bethléhem. Ils l’apportèrent et la présentèrent à David; mais il ne voulut pas la boire, et il la répandit devant l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il dit: Loin de moi, ô Éternel, la pensée de faire cela! Boirais-je le sang de ces hommes qui sont allés au péril de leur vie? Et il ne voulut pas la boire. Voilà ce que firent ces trois vaillants hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Abischaï, frère de Joab, fils de Tseruja, était le chef des trois. Il brandit sa lance sur trois cents hommes, et les tua; et il eut du renom parmi les trois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il était le plus considéré des trois, et il fut leur chef; mais il n’égala pas les trois premiers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Benaja, fils de Jehojada, fils d’un homme de Kabtseel, rempli de valeur et célèbre par ses exploits. Il frappa les deux lions de Moab. Il descendit au milieu d’une citerne, où il frappa un lion, un jour de neige. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il frappa un Égyptien d’un aspect formidable et ayant une lance à la main; il descendit contre lui avec un bâton, arracha la lance de la main de l’Égyptien, et s’en servit pour le tuer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Voilà ce que fit Benaja, fils de Jehojada; et il eut du renom parmi les trois vaillants hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Il était le plus considéré des trente; mais il n’égala pas les trois premiers. David l’admit dans son conseil secret.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Asaël, frère de Joab, du nombre des trente.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elchanan, fils de Dodo, de Bethléhem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Schamma, de Harod.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Élika, de Harod.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Hélets, de Péleth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ira, fils d’Ikkesch, de Tekoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Abiézer, d’Anathoth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mebunnaï, de Huscha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tsalmon, d’Achoach.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maharaï, de Nethopha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Héleb, fils de Baana, de Nethopha.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ittaï, fils de Ribaï, de Guibea des fils de Benjamin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Benaja, de Pirathon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiddaï, de Nachalé-Gaasch.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Abi-Albon, d’Araba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Azmaveth, de Barchum.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Éliachba, de Schaalbon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bené-Jaschen. Jonathan.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Schamma, d’Harar.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Achiam, fils de Scharar, d’Arar.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Éliphéleth, fils d’Achasbaï, fils d’un Maacathien.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éliam, fils d’Achitophel, de Guilo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Hetsraï, de Carmel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Paaraï, d’Arab.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Jigueal, fils de Nathan, de Tsoba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bani, de Gad.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Tsélek, l’Ammonite.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Naharaï, de Beéroth, qui portait les armes de Joab, fils de Tseruja.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ira, de Jéther.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gareb, de Jéther.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Urie, le Héthien.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En tout, trente-sept.
