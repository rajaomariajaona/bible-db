document_id: 2SA.23,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Dernières paroles de David
  - type: heading
    content: 'V. 1-7: cf. 2 S 7:12-16. Ps 72. És 11:1-5. Jé 33:14, etc. Lu 1:30-33.'
  - type: text
    content: Voici les dernières paroles de David.
  - type: text
    content: Parole de David, fils d’Isaï,
  - type: text
    content: Parole de l’homme haut placé,
  - type: text
    content: De l’oint du Dieu de Jacob,
  - type: text
    content: Du chantre agréable d’Israël.
  '10':
  - type: text
    content: 'Il se leva, et frappa les Philistins jusqu’à ce que sa main fût lasse et qu’elle restât attachée à son épée. L’Éternel opéra une grande délivrance ce jour-là. Le peuple revint après Éléazar, seulement pour prendre les dépouilles. '
  '11':
  - type: text
    content: 'Après lui, Schamma, fils d’Agué, d’Harar. Les Philistins s’étaient rassemblés à Léchi. Il y avait là une pièce de terre remplie de lentilles; et le peuple fuyait devant les Philistins. '
  '12':
  - type: text
    content: 'Schamma se plaça au milieu du champ, le protégea, et battit les Philistins. Et l’Éternel opéra une grande délivrance. '
  '13':
  - type: text
    content: 'Trois des trente chefs descendirent au temps de la moisson et vinrent auprès de David, dans la caverne d’Adullam, lorsqu’une troupe de Philistins était campée dans la vallée des Rephaïm. '
  '14':
  - type: text
    content: 'David était alors dans la forteresse, et il y avait un poste de Philistins à Bethléhem. '
  '15':
  - type: text
    content: 'David eut un désir, et il dit: Qui me fera boire de l’eau de la citerne qui est à la porte de Bethléhem? '
  '16':
  - type: text
    content: 'Alors les trois vaillants hommes passèrent au travers du camp des Philistins, et puisèrent de l’eau de la citerne qui est à la porte de Bethléhem. Ils l’apportèrent et la présentèrent à David; mais il ne voulut pas la boire, et il la répandit devant l’Éternel. '
  '17':
  - type: text
    content: 'Il dit: Loin de moi, ô Éternel, la pensée de faire cela! Boirais-je le sang de ces hommes qui sont allés au péril de leur vie? Et il ne voulut pas la boire. Voilà ce que firent ces trois vaillants hommes. '
  '18':
  - type: text
    content: 'Abischaï, frère de Joab, fils de Tseruja, était le chef des trois. Il brandit sa lance sur trois cents hommes, et les tua; et il eut du renom parmi les trois. '
  '19':
  - type: text
    content: 'Il était le plus considéré des trois, et il fut leur chef; mais il n’égala pas les trois premiers. '
  '2':
  - type: text
    content: L’esprit de l’Éternel parle par moi,
  - type: text
    content: Et sa parole est sur ma langue.
  '20':
  - type: text
    content: 'Benaja, fils de Jehojada, fils d’un homme de Kabtseel, rempli de valeur et célèbre par ses exploits. Il frappa les deux lions de Moab. Il descendit au milieu d’une citerne, où il frappa un lion, un jour de neige. '
  '21':
  - type: text
    content: 'Il frappa un Égyptien d’un aspect formidable et ayant une lance à la main; il descendit contre lui avec un bâton, arracha la lance de la main de l’Égyptien, et s’en servit pour le tuer. '
  '22':
  - type: text
    content: 'Voilà ce que fit Benaja, fils de Jehojada; et il eut du renom parmi les trois vaillants hommes. '
  '23':
  - type: text
    content: Il était le plus considéré des trente; mais il n’égala pas les trois premiers. David l’admit dans son conseil secret.
  '24':
  - type: text
    content: Asaël, frère de Joab, du nombre des trente.
  - type: text
    content: Elchanan, fils de Dodo, de Bethléhem.
  '25':
  - type: text
    content: Schamma, de Harod.
  - type: text
    content: Élika, de Harod.
  '26':
  - type: text
    content: Hélets, de Péleth.
  - type: text
    content: Ira, fils d’Ikkesch, de Tekoa.
  '27':
  - type: text
    content: Abiézer, d’Anathoth.
  - type: text
    content: Mebunnaï, de Huscha.
  '28':
  - type: text
    content: Tsalmon, d’Achoach.
  - type: text
    content: Maharaï, de Nethopha.
  '29':
  - type: text
    content: Héleb, fils de Baana, de Nethopha.
  - type: text
    content: Ittaï, fils de Ribaï, de Guibea des fils de Benjamin.
  '3':
  - type: text
    content: Le Dieu d’Israël a parlé,
  - type: text
    content: 'Le rocher d’Israël m’a dit:'
  - type: text
    content: Celui qui règne parmi les hommes avec justice,
  - type: text
    content: Celui qui règne dans la crainte de Dieu,
  '30':
  - type: text
    content: Benaja, de Pirathon.
  - type: text
    content: Hiddaï, de Nachalé-Gaasch.
  '31':
  - type: text
    content: Abi-Albon, d’Araba.
  - type: text
    content: Azmaveth, de Barchum.
  '32':
  - type: text
    content: Éliachba, de Schaalbon.
  - type: text
    content: Bené-Jaschen. Jonathan.
  '33':
  - type: text
    content: Schamma, d’Harar.
  - type: text
    content: Achiam, fils de Scharar, d’Arar.
  '34':
  - type: text
    content: Éliphéleth, fils d’Achasbaï, fils d’un Maacathien.
  - type: text
    content: Éliam, fils d’Achitophel, de Guilo.
  '35':
  - type: text
    content: Hetsraï, de Carmel.
  - type: text
    content: Paaraï, d’Arab.
  '36':
  - type: text
    content: Jigueal, fils de Nathan, de Tsoba.
  - type: text
    content: Bani, de Gad.
  '37':
  - type: text
    content: Tsélek, l’Ammonite.
  - type: text
    content: Naharaï, de Beéroth, qui portait les armes de Joab, fils de Tseruja.
  '38':
  - type: text
    content: Ira, de Jéther.
  - type: text
    content: Gareb, de Jéther.
  '39':
  - type: text
    content: Urie, le Héthien.
  - type: text
    content: En tout, trente-sept.
  '4':
  - type: text
    content: Est pareil à la lumière du matin, quand le soleil brille
  - type: text
    content: Et que la matinée est sans nuages;
  - type: text
    content: Ses rayons après la pluie font sortir de terre la verdure.
  '5':
  - type: text
    content: N’en est-il pas ainsi de ma maison devant Dieu,
  - type: text
    content: Puisqu’il a fait avec moi une alliance éternelle,
  - type: text
    content: En tous points bien réglée et offrant pleine sécurité?
  - type: text
    content: Ne fera-t-il pas germer tout mon salut et tous mes désirs?
  '6':
  - type: text
    content: Mais les méchants sont tous comme des épines que l’on rejette,
  - type: text
    content: Et que l’on ne prend pas avec la main;
  '7':
  - type: text
    content: Celui qui les touche s’arme d’un fer ou du bois d’une lance,
  - type: text
    content: Et on les brûle au feu sur place.
  - type: heading
    content: Vaillants hommes de David
  - type: heading
    content: 'V. 8-39: cf. 1 Ch 11:10-47; 27:1-15. (Ph 4:3. Ap 3:5.)'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 1 Ch 11:11, etc.
  - type: text
    content: 'Voici les noms des vaillants hommes qui étaient au service de David. Joscheb-Basschébeth, le Tachkemonite, l’un des principaux officiers. Il brandit sa lance sur huit cents hommes, qu’il fit périr en une seule fois. '
  '9':
  - type: text
    content: 'Après lui, Éléazar, fils de Dodo, fils d’Achochi. Il était l’un des trois guerriers qui affrontèrent avec David les Philistins rassemblés pour combattre, tandis que les hommes d’Israël se retiraient sur les hauteurs. '
