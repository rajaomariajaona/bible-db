  children:
  - type: text
    text: INTRODUCTION AU LIVRE DE NAHUM
- type: usfm
  marker: imt3
  children:
  - type: text
    text: (No 10:35. Ps 68.) (És 10:5; etc.; 33:1-5; 29:5-8. So 2:13.)
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ce livre est intitulé «Nahum» (le consolé, celui qui est apaisé, satisfait ou vengé), du nom du prophète originaire d’Elkosch, qui prononça par anticipation la chute de Ninive, capitale de l’Empire assyrien. Les Israélites étaient alors assujettis aux Assyriens. Le livre comporte trois parties.
- type: usfm
  marker: ip
  children:
  - type: text
    text: La première partie introduit l’oracle sur Ninive (1:1-8). Dieu est puissant, il domine sur toute la création, il juge le monde et doit se venger de ses adversaires.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La deuxième partie évoque la manifestation vindicative de Dieu (1:9–2:3): Ninive allait être détruite. Les ennemis d’Israël allaient être '
  - type: usfm
    marker: it
    children:
    - type: text
      text: «ivres de leur vin, consumés comme la paille sèche, moissonnés»
  - type: text
    text: . Bref les Ninivites allaient être éliminés et les habitants de Juda allaient être libérés.
- type: usfm
  marker: ip
  children:
  - type: text
    text: La troisième partie (2:4 à 3:19) décrit et célèbre dans les détails la ruine de Ninive. Selon le contexte politique de Nahum, tout était comme déjà exécuté. Cette ville orgueilleuse, sanguinaire, débauchée et idolâtre était tombée sous le pouvoir du Dieu de l’univers.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Nahum présente la destruction de Ninive comme la conséquence d’un jugement de Dieu. Ville orgueilleuse, criminelle et débauchée, Ninive est le symbole permanent d’un pouvoir humain construit sur des bases appelées à disparaître. Il évoque la chute de Ninive comme un véritable reportage: les lions, emblèmes de la puissance de la cité, de sa domination cruelle et de sa rapacité politique, sont passés au fil de l’épée (2:12-14); les uniformes cramoisis et les boucliers rouges des troupes d’élite se heurtent, l’éclat des armes, le fracas des roues des chars et l’agilité, comme l’éclair, de leurs mouvements, forcent l’imagination (2:4; 3:1). La statue d’Ishtar, déesse de la guerre, est brisée: les faux dieux sont donc anéantis. La bonne nouvelle de Nahum est celle du rétablissement de la justice et de la paix, à la suite de la défaite de l’ennemi héréditaire d’Israël.'
