document_id: PSA.124,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Né 4:7, etc. Est 1 à 8. Ps 129; 21:2; 118:8-14.
  - type: text
    content: Cantique des degrés. De David.
  - type: text
    content: Sans l’Éternel qui nous protégea,
  - type: text
    content: Qu’Israël le dise!
  '2':
  - type: text
    content: Sans l’Éternel qui nous protégea,
  - type: text
    content: Quand les hommes s’élevèrent contre nous,
  '3':
  - type: text
    content: Ils nous auraient engloutis tout vivants,
  - type: text
    content: Quand leur colère s’enflamma contre nous;
  '4':
  - type: text
    content: Alors les eaux nous auraient submergés,
  - type: text
    content: Les torrents auraient passé sur notre âme;
  '5':
  - type: text
    content: Alors auraient passé sur notre âme
  - type: text
    content: Les flots impétueux.
  '6':
  - type: text
    content: Béni soit l’Éternel,
  - type: text
    content: Qui ne nous a pas livrés en proie à leurs dents!
  '7':
  - type: text
    content: ' '
  - type: note
    content: Pr 6:5.
  - type: text
    content: Notre âme s’est échappée comme l’oiseau du filet des oiseleurs;
  - type: text
    content: Le filet s’est rompu, et nous nous sommes échappés.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ps 121:2.
  - type: text
    content: Notre secours est dans le nom de l’Éternel,
  - type: text
    content: Qui a fait les cieux et la terre.
