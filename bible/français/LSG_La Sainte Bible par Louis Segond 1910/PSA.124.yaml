document_id: PSA.124
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Né 4:7, etc. Est 1 à 8. Ps 129; 21:2; 118:8-14.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique des degrés. De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans l’Éternel qui nous protégea,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’Israël le dise!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sans l’Éternel qui nous protégea,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand les hommes s’élevèrent contre nous,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ils nous auraient engloutis tout vivants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand leur colère s’enflamma contre nous;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Alors les eaux nous auraient submergés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les torrents auraient passé sur notre âme;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Alors auraient passé sur notre âme
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les flots impétueux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Béni soit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui ne nous a pas livrés en proie à leurs dents!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 6:5
      metadata:
        usfm: PRO.6.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Notre âme s’est échappée comme l’oiseau du filet des oiseleurs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le filet s’est rompu, et nous nous sommes échappés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 121:2
      metadata:
        usfm: PSA.121.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Notre secours est dans le nom de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a fait les cieux et la terre.
