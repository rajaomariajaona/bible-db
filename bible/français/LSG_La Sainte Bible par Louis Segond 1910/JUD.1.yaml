document_id: JUD.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: heading
    content: 'V. 1-2: cf. 1 Pi 1:1, 2.'
  - type: text
    content: 'Jude, serviteur de Jésus-Christ, et frère de Jacques, à ceux qui ont été appelés, qui sont aimés en Dieu le Père, et gardés pour Jésus-Christ: '
  '10':
  - type: note
    content: 2 Pi 2:12.
  - type: text
    content: 'Eux, au contraire, ils parlent d’une manière injurieuse de ce qu’ils ignorent, et ils se corrompent dans ce qu’ils savent naturellement comme les brutes. '
  '11':
  - type: text
    content: 'Malheur à eux! Car ils ont suivi la voie de '
  - type: note
    content: Ge 4:8. 1 Jn 3:12.
  - type: text
    content: 'Caïn, ils se sont jetés '
  - type: note
    content: No 22:7, 21. 2 Pi 2:15.
  - type: text
    content: 'pour un salaire dans l’égarement de Balaam, '
  - type: note
    content: No 16:1.
  - type: text
    content: 'ils se sont perdus par la révolte de Coré. '
  '12':
  - type: text
    content: 'Ce sont '
  - type: note
    content: 2 Pi 2:13.
  - type: text
    content: 'des écueils dans vos agapes, faisant impudemment bonne chère, se repaissant eux-mêmes. Ce sont '
  - type: note
    content: 2 Pi 2:17.
  - type: text
    content: 'des nuées sans eau, poussées par les vents; des arbres d’automne sans fruits, deux fois morts, déracinés; '
  '13':
  - type: note
    content: És 57:20.
  - type: text
    content: 'des vagues furieuses de la mer, rejetant l’écume de leurs impuretés; des astres errants, auxquels l’obscurité des ténèbres est réservée pour l’éternité. '
  '14':
  - type: text
    content: 'C’est aussi pour eux '
  - type: note
    content: Ge 5:18.
  - type: text
    content: 'qu’Énoch, le septième depuis Adam, a prophétisé en ces termes: '
  - type: note
    content: Da 7:10. Ac 1:11. 1 Th 1:10. 2 Th 1:10. Ap 1:7.
  - type: text
    content: 'Voici, le Seigneur est venu avec ses saintes myriades, '
  '15':
  - type: text
    content: 'pour exercer un jugement contre tous, et pour faire rendre compte à tous les impies parmi eux de tous les actes d’impiété qu’ils ont commis et '
  - type: note
    content: Mt 12:36.
  - type: text
    content: 'de toutes les paroles injurieuses qu’ont proférées contre lui des pécheurs impies. '
  '16':
  - type: text
    content: 'Ce sont des gens qui murmurent, qui se plaignent de leur sort, qui marchent selon leurs convoitises, '
  - type: note
    content: 2 Pi 2:18.
  - type: text
    content: 'qui ont à la bouche des paroles hautaines, qui admirent les personnes par motif d’intérêt. '
  '17':
  - type: text
    content: 'Mais vous, bien-aimés, souvenez-vous des choses annoncées d’avance par les apôtres de notre Seigneur Jésus-Christ. '
  '18':
  - type: text
    content: 'Ils vous disaient '
  - type: note
    content: Ac 20:29. 1 Ti 4:1. 2 Ti 3:1; 4:3. 2 Pi 2:1; 3:3.
  - type: text
    content: 'qu’au dernier temps il y aurait des moqueurs, marchant selon leurs convoitises impies; '
  '19':
  - type: text
    content: ce sont ceux qui provoquent des divisions, hommes sensuels, n’ayant pas l’esprit.
  - type: heading
    content: Exhortation, et doxologie finale
  - type: heading
    content: 'V. 20-25: cf. (2 Pi 3:17, 18. Col 2:6, 7. 2 Th 3:3, 5.) Ja 5:19, 20.'
  '2':
  - type: text
    content: que la miséricorde, la paix et la charité vous soient multipliées!
  - type: heading
    content: Contre les impies
  - type: heading
    content: 'V. 3-16: cf. 2 Pi 2; 3:1-4.'
  '20':
  - type: text
    content: 'Pour vous, bien-aimés, vous édifiant vous-mêmes sur votre très sainte foi, et priant par le Saint-Esprit, '
  '21':
  - type: text
    content: 'maintenez-vous dans l’amour de Dieu, en attendant la miséricorde de notre Seigneur Jésus-Christ pour la vie éternelle. '
  '22':
  - type: text
    content: 'Reprenez les uns, ceux qui contestent; '
  '23':
  - type: text
    content: 'sauvez-en d’autres en les arrachant du feu; et pour d’autres encore, ayez une pitié mêlée de crainte, haïssant jusqu’à la tunique souillée par la chair. '
  '24':
  - type: text
    content: 'Or, à celui qui peut vous préserver de toute chute et vous faire paraître devant sa gloire irrépréhensibles et dans l’allégresse, '
  '25':
  - type: note
    content: Ro 16:27. 1 Ti 1:17.
  - type: text
    content: à Dieu seul, notre Sauveur, par Jésus-Christ notre Seigneur, soient gloire, majesté, force et puissance, dès avant tous les temps, et maintenant, et dans tous les siècles! Amen!
  '3':
  - type: text
    content: 'Bien-aimés, comme je désirais vivement vous écrire au sujet de notre salut commun, je me suis senti obligé de le faire afin de vous exhorter à combattre pour la foi qui a été transmise aux saints une fois pour toutes. '
  '4':
  - type: note
    content: 2 Pi 2:1.
  - type: text
    content: 'Car il s’est glissé parmi vous certains hommes, '
  - type: note
    content: 1 Pi 2:8. 2 Pi 2:3.
  - type: text
    content: 'dont la condamnation est écrite depuis longtemps, des impies, qui changent la grâce de notre Dieu en dissolution, et qui renient notre seul maître et Seigneur Jésus-Christ. '
  '5':
  - type: text
    content: 'Je veux vous rappeler, à vous qui savez fort bien toutes ces choses, que le Seigneur, après avoir sauvé le peuple et l’avoir tiré du pays d’Égypte, '
  - type: note
    content: No 14:29; 26:64, 65. Ps 106:26. 1 Co 10:5. Hé 3:17.
  - type: text
    content: 'fit ensuite périr les incrédules; '
  '6':
  - type: note
    content: 2 Pi 2:4.
  - type: text
    content: 'qu’il a réservé pour le jugement du grand jour, enchaînés éternellement par les ténèbres, '
  - type: note
    content: 2 Pi 2:4.
  - type: text
    content: 'les anges qui n’ont pas gardé leur dignité, mais qui ont abandonné leur propre demeure; '
  '7':
  - type: note
    content: Ge 19:24. De 29:23. És 13:19. Jé 50:40. Éz 16:49. Os 11:8. Am 4:11. Lu 17:29. 2 Pi 2:6.
  - type: text
    content: 'que Sodome et Gomorrhe et les villes voisines, qui se livrèrent comme eux à l’impudicité et à des vices contre nature, sont données en exemple, subissant la peine d’un feu éternel. '
  '8':
  - type: text
    content: 'Malgré cela, ces hommes aussi, entraînés par leurs rêveries, souillent pareillement leur chair, méprisent l’autorité et injurient les gloires. '
  '9':
  - type: text
    content: 'Or, l’archange '
  - type: note
    content: Da 10:13; 12:1. Ap 12:7.
  - type: text
    content: 'Michel, lorsqu’il contestait avec le diable et lui disputait le corps de Moïse, '
  - type: note
    content: 2 Pi 2:11.
  - type: text
    content: 'n’osa pas porter contre lui un jugement injurieux, mais il dit: '
  - type: note
    content: Za 3:2.
  - type: text
    content: 'Que le Seigneur te réprime! '
