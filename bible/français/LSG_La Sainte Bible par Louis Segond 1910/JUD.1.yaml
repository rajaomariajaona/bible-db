document_id: JUD.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Adresse et salutation
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-2: cf. 1 Pi 1:1, 2.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jude, serviteur de Jésus-Christ, et frère de Jacques, à ceux qui ont été appelés, qui sont aimés en Dieu le Père, et gardés pour Jésus-Christ: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: que la miséricorde, la paix et la charité vous soient multipliées!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre les impies
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 3-16: cf. 2 Pi 2; 3:1-4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Bien-aimés, comme je désirais vivement vous écrire au sujet de notre salut commun, je me suis senti obligé de le faire afin de vous exhorter à combattre pour la foi qui a été transmise aux saints une fois pour toutes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:1
      metadata:
        usfm: 2PE.2.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car il s’est glissé parmi vous certains hommes, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:8
      metadata:
        usfm: 1PE.2.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:3
      metadata:
        usfm: 2PE.2.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dont la condamnation est écrite depuis longtemps, des impies, qui changent la grâce de notre Dieu en dissolution, et qui renient notre seul maître et Seigneur Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je veux vous rappeler, à vous qui savez fort bien toutes ces choses, que le Seigneur, après avoir sauvé le peuple et l’avoir tiré du pays d’Égypte, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 14:29
      metadata:
        usfm: NUM.14.29
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:64
      metadata:
        usfm: NUM.26.64
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '65'
      metadata:
        usfm: NUM.26.65
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 106:26
      metadata:
        usfm: PSA.106.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:5
      metadata:
        usfm: 1CO.10.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 3:17
      metadata:
        usfm: HEB.3.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'fit ensuite périr les incrédules; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:4
      metadata:
        usfm: 2PE.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’il a réservé pour le jugement du grand jour, enchaînés éternellement par les ténèbres, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:4
      metadata:
        usfm: 2PE.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les anges qui n’ont pas gardé leur dignité, mais qui ont abandonné leur propre demeure; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 19:24
      metadata:
        usfm: GEN.19.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 29:23
      metadata:
        usfm: DEU.29.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 13:19
      metadata:
        usfm: ISA.13.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 50:40
      metadata:
        usfm: JER.50.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 16:49
      metadata:
        usfm: EZK.16.49
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 11:8
      metadata:
        usfm: HOS.11.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 4:11
      metadata:
        usfm: AMO.4.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 17:29
      metadata:
        usfm: LUK.17.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:6
      metadata:
        usfm: 2PE.2.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que Sodome et Gomorrhe et les villes voisines, qui se livrèrent comme eux à l’impudicité et à des vices contre nature, sont données en exemple, subissant la peine d’un feu éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Malgré cela, ces hommes aussi, entraînés par leurs rêveries, souillent pareillement leur chair, méprisent l’autorité et injurient les gloires. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Or, l’archange '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 10:13
      metadata:
        usfm: DAN.10.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:1
      metadata:
        usfm: DAN.12.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 12:7
      metadata:
        usfm: REV.12.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Michel, lorsqu’il contestait avec le diable et lui disputait le corps de Moïse, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:11
      metadata:
        usfm: 2PE.2.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'n’osa pas porter contre lui un jugement injurieux, mais il dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 3:2
      metadata:
        usfm: ZEC.3.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que le Seigneur te réprime! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:12
      metadata:
        usfm: 2PE.2.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Eux, au contraire, ils parlent d’une manière injurieuse de ce qu’ils ignorent, et ils se corrompent dans ce qu’ils savent naturellement comme les brutes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Malheur à eux! Car ils ont suivi la voie de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 4:8
      metadata:
        usfm: GEN.4.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:12
      metadata:
        usfm: 1JN.3.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Caïn, ils se sont jetés '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 22:7
      metadata:
        usfm: NUM.22.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '21'
      metadata:
        usfm: NUM.22.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:15
      metadata:
        usfm: 2PE.2.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour un salaire dans l’égarement de Balaam, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 16:1
      metadata:
        usfm: NUM.16.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ils se sont perdus par la révolte de Coré. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ce sont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:13
      metadata:
        usfm: 2PE.2.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des écueils dans vos agapes, faisant impudemment bonne chère, se repaissant eux-mêmes. Ce sont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:17
      metadata:
        usfm: 2PE.2.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des nuées sans eau, poussées par les vents; des arbres d’automne sans fruits, deux fois morts, déracinés; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 57:20
      metadata:
        usfm: ISA.57.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des vagues furieuses de la mer, rejetant l’écume de leurs impuretés; des astres errants, auxquels l’obscurité des ténèbres est réservée pour l’éternité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'C’est aussi pour eux '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 5:18
      metadata:
        usfm: GEN.5.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’Énoch, le septième depuis Adam, a prophétisé en ces termes: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 7:10
      metadata:
        usfm: DAN.7.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:11
      metadata:
        usfm: ACT.1.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 1:10
      metadata:
        usfm: 1TH.1.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 1:10
      metadata:
        usfm: 2TH.1.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:7
      metadata:
        usfm: REV.1.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Voici, le Seigneur est venu avec ses saintes myriades, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'pour exercer un jugement contre tous, et pour faire rendre compte à tous les impies parmi eux de tous les actes d’impiété qu’ils ont commis et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:36
      metadata:
        usfm: MAT.12.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de toutes les paroles injurieuses qu’ont proférées contre lui des pécheurs impies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ce sont des gens qui murmurent, qui se plaignent de leur sort, qui marchent selon leurs convoitises, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:18
      metadata:
        usfm: 2PE.2.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui ont à la bouche des paroles hautaines, qui admirent les personnes par motif d’intérêt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais vous, bien-aimés, souvenez-vous des choses annoncées d’avance par les apôtres de notre Seigneur Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils vous disaient '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 20:29
      metadata:
        usfm: ACT.20.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 4:1
      metadata:
        usfm: 1TI.4.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 3:1
      metadata:
        usfm: 2TI.3.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:3
      metadata:
        usfm: 2TI.4.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:1
      metadata:
        usfm: 2PE.2.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:3
      metadata:
        usfm: 2PE.3.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’au dernier temps il y aurait des moqueurs, marchant selon leurs convoitises impies; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ce sont ceux qui provoquent des divisions, hommes sensuels, n’ayant pas l’esprit.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Exhortation, et doxologie finale
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-25: cf. (2 Pi 3:17, 18. Col 2:6, 7. 2 Th 3:3, 5.) Ja 5:19, 20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Pour vous, bien-aimés, vous édifiant vous-mêmes sur votre très sainte foi, et priant par le Saint-Esprit, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'maintenez-vous dans l’amour de Dieu, en attendant la miséricorde de notre Seigneur Jésus-Christ pour la vie éternelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Reprenez les uns, ceux qui contestent; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'sauvez-en d’autres en les arrachant du feu; et pour d’autres encore, ayez une pitié mêlée de crainte, haïssant jusqu’à la tunique souillée par la chair. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Or, à celui qui peut vous préserver de toute chute et vous faire paraître devant sa gloire irrépréhensibles et dans l’allégresse, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 16:27
      metadata:
        usfm: ROM.16.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:17
      metadata:
        usfm: 1TI.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: à Dieu seul, notre Sauveur, par Jésus-Christ notre Seigneur, soient gloire, majesté, force et puissance, dès avant tous les temps, et maintenant, et dans tous les siècles! Amen!
