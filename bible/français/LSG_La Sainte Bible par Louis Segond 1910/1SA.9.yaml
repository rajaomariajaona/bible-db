document_id: 1SA.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saül auprès de Samuel à Rama
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-27: cf. (1 S 10:1-16; 15:17.) Ge 36:24. Pr 16:9. 1 S 2:7, 8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il y avait un homme de Benjamin, nommé Kis, fils d’Abiel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 14:51
      metadata:
        usfm: 1SA.14.51
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'fils de Tseror, fils de Becorath, fils d’Aphiach, fils d’un Benjamite. C’était un homme fort et vaillant. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il avait un fils du nom de Saül, jeune et beau, plus beau qu’aucun des enfants d’Israël, et les dépassant tous de la tête. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les ânesses de Kis, père de Saül, s’égarèrent; et Kis dit à Saül, son fils: Prends avec toi l’un des serviteurs, lève-toi, va, et cherche les ânesses. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il passa par la montagne d’Éphraïm et traversa le pays de Schalischa, sans les trouver; ils passèrent par le pays de Schaalim, et elles n’y étaient pas; ils parcoururent le pays de Benjamin, et ils ne les trouvèrent pas. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils étaient arrivés dans le pays de Tsuph, lorsque Saül dit à son serviteur qui l’accompagnait: Viens, retournons, de peur que mon père, oubliant les ânesses, ne soit en peine de nous. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le serviteur lui dit: Voici, il y a dans cette ville un homme de Dieu, et c’est un homme considéré; tout ce qu’il dit ne manque pas d’arriver. Allons y donc; peut-être nous fera-t-il connaître le chemin que nous devons prendre. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Saül dit à son serviteur: Mais si nous y allons, que porterons-nous à l’homme de Dieu? Car il n’y a plus de provisions dans nos sacs, et nous n’avons aucun présent à offrir à l’homme de Dieu. Qu’est-ce que nous avons? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le serviteur reprit la parole, et dit à Saül: Voici, j’ai sur moi le quart d’un sicle d’argent; je le donnerai à l’homme de Dieu, et il nous indiquera notre chemin. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Autrefois en Israël, quand on allait consulter Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 25:22
      metadata:
        usfm: GEN.25.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'on disait: Venez, et allons au voyant! Car celui qu’on appelle aujourd’hui le prophète s’appelait autrefois le voyant. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Saül dit à son serviteur: Tu as raison: viens, allons! Et ils se rendirent à la ville où était l’homme de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Comme ils montaient à la ville, ils rencontrèrent des jeunes filles sorties pour puiser de l’eau, et ils leur dirent: Le voyant est-il ici? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Elles leur répondirent en disant: Oui, il est devant toi; mais va promptement, car aujourd’hui il est venu à la ville parce qu’il y a un sacrifice pour le peuple sur le haut lieu. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand vous serez entrés dans la ville, vous le trouverez avant qu’il monte au haut lieu pour manger; car le peuple ne mangera point qu’il ne soit arrivé, parce qu’il doit bénir le sacrifice; après quoi, les conviés mangeront. Montez donc, car maintenant vous le trouverez. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et ils montèrent à la ville. Ils étaient arrivés au milieu de la ville, quand ils furent rencontrés par Samuel qui sortait pour monter au haut lieu. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 15:1
      metadata:
        usfm: 1SA.15.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Or, un jour avant l’arrivée de Saül, l’Éternel avait averti Samuel, en disant: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Demain, à cette heure, je t’enverrai un homme du pays de Benjamin, et tu l’oindras pour chef de mon peuple d’Israël. Il sauvera mon peuple de la main des Philistins; car j’ai regardé mon peuple, parce que son cri est venu jusqu’à moi. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Lorsque Samuel eut aperçu Saül, l’Éternel lui dit: Voici l’homme dont je t’ai parlé; c’est lui qui régnera sur mon peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Saül s’approcha de Samuel au milieu de la porte, et dit: Indique-moi, je te prie, où est la maison du voyant. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Samuel répondit à Saül: C’est moi qui suis le voyant. Monte devant moi au haut lieu, et vous mangerez aujourd’hui avec moi. Je te laisserai partir demain, et je te dirai tout ce qui se passe dans ton cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ne t’inquiète pas des ânesses que tu as perdues il y a trois jours, car elles sont retrouvées. Et pour qui est réservé tout ce qu’il y a de précieux en Israël? N’est-ce pas pour toi et pour toute la maison de ton père? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Saül répondit: Ne suis-je pas Benjamite, de l’une des plus petites tribus d’Israël? Et ma famille n’est-elle pas la moindre de toutes les familles de la tribu de Benjamin? Pourquoi donc me parles-tu de la sorte? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Samuel prit Saül et son serviteur, les fit entrer dans la salle, et leur donna une place à la tête des conviés, qui étaient environ trente hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Samuel dit au cuisinier: Sers la portion que je t’ai donnée, en te disant: Mets-la à part. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le cuisinier donna l’épaule et ce qui l’entoure, et il la servit à Saül. Et Samuel dit: Voici ce qui a été réservé; mets-le devant toi, et mange, car on l’a gardé pour toi lorsque j’ai convié le peuple. Ainsi Saül mangea avec Samuel ce jour-là. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils descendirent du haut lieu à la ville, et Samuel s’entretint avec Saül sur le toit. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Puis ils se levèrent de bon matin; et, dès l’aurore, Samuel appela Saül sur le toit, et dit: Viens, et je te laisserai partir. Saül se leva, et ils sortirent tous deux, lui et Samuel. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Quand ils furent descendus à l’extrémité de la ville, Samuel dit à Saül: Dis à ton serviteur de passer devant nous. Et le serviteur passa devant. Arrête-toi maintenant, reprit Samuel, et je te ferai entendre la parole de Dieu.'
