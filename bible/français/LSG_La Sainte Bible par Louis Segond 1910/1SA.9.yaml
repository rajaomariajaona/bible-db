document_id: 1SA.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Saül auprès de Samuel à Rama
  - type: heading
    content: 'V. 1-27: cf. (1 S 10:1-16; 15:17.) Ge 36:24. Pr 16:9. 1 S 2:7, 8.'
  - type: text
    content: 'Il y avait un homme de Benjamin, nommé Kis, fils d’Abiel, '
  - type: note
    content: 1 S 14:51.
  - type: text
    content: 'fils de Tseror, fils de Becorath, fils d’Aphiach, fils d’un Benjamite. C’était un homme fort et vaillant. '
  '10':
  - type: text
    content: 'Saül dit à son serviteur: Tu as raison: viens, allons! Et ils se rendirent à la ville où était l’homme de Dieu. '
  '11':
  - type: text
    content: 'Comme ils montaient à la ville, ils rencontrèrent des jeunes filles sorties pour puiser de l’eau, et ils leur dirent: Le voyant est-il ici? '
  '12':
  - type: text
    content: 'Elles leur répondirent en disant: Oui, il est devant toi; mais va promptement, car aujourd’hui il est venu à la ville parce qu’il y a un sacrifice pour le peuple sur le haut lieu. '
  '13':
  - type: text
    content: 'Quand vous serez entrés dans la ville, vous le trouverez avant qu’il monte au haut lieu pour manger; car le peuple ne mangera point qu’il ne soit arrivé, parce qu’il doit bénir le sacrifice; après quoi, les conviés mangeront. Montez donc, car maintenant vous le trouverez. '
  '14':
  - type: text
    content: 'Et ils montèrent à la ville. Ils étaient arrivés au milieu de la ville, quand ils furent rencontrés par Samuel qui sortait pour monter au haut lieu. '
  '15':
  - type: note
    content: 1 S 15:1.
  - type: text
    content: 'Or, un jour avant l’arrivée de Saül, l’Éternel avait averti Samuel, en disant: '
  '16':
  - type: text
    content: 'Demain, à cette heure, je t’enverrai un homme du pays de Benjamin, et tu l’oindras pour chef de mon peuple d’Israël. Il sauvera mon peuple de la main des Philistins; car j’ai regardé mon peuple, parce que son cri est venu jusqu’à moi. '
  '17':
  - type: text
    content: 'Lorsque Samuel eut aperçu Saül, l’Éternel lui dit: Voici l’homme dont je t’ai parlé; c’est lui qui régnera sur mon peuple. '
  '18':
  - type: text
    content: 'Saül s’approcha de Samuel au milieu de la porte, et dit: Indique-moi, je te prie, où est la maison du voyant. '
  '19':
  - type: text
    content: 'Samuel répondit à Saül: C’est moi qui suis le voyant. Monte devant moi au haut lieu, et vous mangerez aujourd’hui avec moi. Je te laisserai partir demain, et je te dirai tout ce qui se passe dans ton cœur. '
  '2':
  - type: text
    content: 'Il avait un fils du nom de Saül, jeune et beau, plus beau qu’aucun des enfants d’Israël, et les dépassant tous de la tête. '
  '20':
  - type: text
    content: 'Ne t’inquiète pas des ânesses que tu as perdues il y a trois jours, car elles sont retrouvées. Et pour qui est réservé tout ce qu’il y a de précieux en Israël? N’est-ce pas pour toi et pour toute la maison de ton père? '
  '21':
  - type: text
    content: 'Saül répondit: Ne suis-je pas Benjamite, de l’une des plus petites tribus d’Israël? Et ma famille n’est-elle pas la moindre de toutes les familles de la tribu de Benjamin? Pourquoi donc me parles-tu de la sorte? '
  '22':
  - type: text
    content: 'Samuel prit Saül et son serviteur, les fit entrer dans la salle, et leur donna une place à la tête des conviés, qui étaient environ trente hommes. '
  '23':
  - type: text
    content: 'Samuel dit au cuisinier: Sers la portion que je t’ai donnée, en te disant: Mets-la à part. '
  '24':
  - type: text
    content: 'Le cuisinier donna l’épaule et ce qui l’entoure, et il la servit à Saül. Et Samuel dit: Voici ce qui a été réservé; mets-le devant toi, et mange, car on l’a gardé pour toi lorsque j’ai convié le peuple. Ainsi Saül mangea avec Samuel ce jour-là. '
  '25':
  - type: text
    content: 'Ils descendirent du haut lieu à la ville, et Samuel s’entretint avec Saül sur le toit. '
  '26':
  - type: text
    content: 'Puis ils se levèrent de bon matin; et, dès l’aurore, Samuel appela Saül sur le toit, et dit: Viens, et je te laisserai partir. Saül se leva, et ils sortirent tous deux, lui et Samuel. '
  '27':
  - type: text
    content: 'Quand ils furent descendus à l’extrémité de la ville, Samuel dit à Saül: Dis à ton serviteur de passer devant nous. Et le serviteur passa devant. Arrête-toi maintenant, reprit Samuel, et je te ferai entendre la parole de Dieu.'
  '3':
  - type: text
    content: 'Les ânesses de Kis, père de Saül, s’égarèrent; et Kis dit à Saül, son fils: Prends avec toi l’un des serviteurs, lève-toi, va, et cherche les ânesses. '
  '4':
  - type: text
    content: 'Il passa par la montagne d’Éphraïm et traversa le pays de Schalischa, sans les trouver; ils passèrent par le pays de Schaalim, et elles n’y étaient pas; ils parcoururent le pays de Benjamin, et ils ne les trouvèrent pas. '
  '5':
  - type: text
    content: 'Ils étaient arrivés dans le pays de Tsuph, lorsque Saül dit à son serviteur qui l’accompagnait: Viens, retournons, de peur que mon père, oubliant les ânesses, ne soit en peine de nous. '
  '6':
  - type: text
    content: 'Le serviteur lui dit: Voici, il y a dans cette ville un homme de Dieu, et c’est un homme considéré; tout ce qu’il dit ne manque pas d’arriver. Allons y donc; peut-être nous fera-t-il connaître le chemin que nous devons prendre. '
  '7':
  - type: text
    content: 'Saül dit à son serviteur: Mais si nous y allons, que porterons-nous à l’homme de Dieu? Car il n’y a plus de provisions dans nos sacs, et nous n’avons aucun présent à offrir à l’homme de Dieu. Qu’est-ce que nous avons? '
  '8':
  - type: text
    content: 'Le serviteur reprit la parole, et dit à Saül: Voici, j’ai sur moi le quart d’un sicle d’argent; je le donnerai à l’homme de Dieu, et il nous indiquera notre chemin. '
  '9':
  - type: text
    content: 'Autrefois en Israël, quand on allait consulter Dieu, '
  - type: note
    content: Ge 25:22.
  - type: text
    content: 'on disait: Venez, et allons au voyant! Car celui qu’on appelle aujourd’hui le prophète s’appelait autrefois le voyant. '
