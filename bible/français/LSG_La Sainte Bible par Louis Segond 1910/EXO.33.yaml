document_id: EXO.33
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. Ex 32:34. Joë 2:12-14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel dit à Moïse: Va, pars d’ici, toi et le peuple que tu as fait sortir du pays d’Égypte; monte vers le pays que j’ai juré de donner à Abraham, à Isaac et à Jacob, en disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 12:7
      metadata:
        usfm: GEN.12.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:4
      metadata:
        usfm: GEN.26.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:13
      metadata:
        usfm: GEN.28.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je le donnerai à ta postérité. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'J’enverrai devant toi un ange, et je chasserai les Cananéens, les Amoréens, les Héthiens, les Phéréziens, les Héviens et les Jébusiens. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Monte vers ce pays où coulent le lait et le miel. Mais je ne monterai point au milieu de toi, de peur que je ne te consume en chemin, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 32:9
      metadata:
        usfm: EXO.32.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 9:13
      metadata:
        usfm: DEU.9.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car tu es un peuple au cou roide. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Lorsque le peuple eut entendu ces sinistres paroles, il fut dans la désolation, et personne ne mit ses ornements. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et l’Éternel dit à Moïse: Dis aux enfants d’Israël: Vous êtes un peuple au cou roide; si je montais un seul instant au milieu de toi, je te consumerais. Ote maintenant tes ornements de dessus toi, et je verrai ce que je te ferai. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les enfants d’Israël se dépouillèrent de leurs ornements, en s’éloignant du mont Horeb.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-11: cf. 2 Co 6:14-18. (No 12:6-8. Jn 15:14, 15.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moïse prit la tente et la dressa hors du camp, à quelque distance; il l’appela tente d’assignation; et tous ceux qui consultaient l’Éternel allaient vers la tente d’assignation, qui était hors du camp. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Lorsque Moïse se rendait à la tente, tout le peuple se levait; chacun se tenait à l’entrée de sa tente, et suivait des yeux Moïse, jusqu’à ce qu’il fût entré dans la tente. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et lorsque Moïse était entré dans la tente, la colonne de nuée descendait et s’arrêtait à l’entrée de la tente, et l’Éternel parlait avec Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tout le peuple voyait la colonne de nuée qui s’arrêtait à l’entrée de la tente, tout le peuple se levait et se prosternait à l’entrée de sa tente. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’Éternel parlait avec Moïse face à face, comme un homme parle à son ami. Puis Moïse retournait au camp; mais son jeune serviteur, Josué, fils de Nun, ne sortait pas du milieu de la tente.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-23: cf. (Ja 5:16. 1 Jn 5:14, 15.) Ex 34:5-9, 29. Ap 22:3, 4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Moïse dit à l’Éternel: Voici, tu me dis: Fais monter ce peuple! Et tu ne me fais pas connaître qui tu enverras avec moi. Cependant, tu as dit: Je te connais par ton nom, et tu as trouvé grâce à mes yeux. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Maintenant, si j’ai trouvé grâce à tes yeux, fais-moi connaître tes voies; alors je te connaîtrai, et je trouverai encore grâce à tes yeux. Considère que cette nation est ton peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L’Éternel répondit: Je marcherai moi-même avec toi, et je te donnerai du repos. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moïse lui dit: Si tu ne marches pas toi-même avec nous, ne nous fais point partir d’ici. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Comment sera-t-il donc certain que j’ai trouvé grâce à tes yeux, moi et ton peuple? Ne sera-ce pas quand tu marcheras avec nous, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:7
      metadata:
        usfm: DEU.4.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'quand nous serons distingués, moi et ton peuple, de tous les peuples qui sont sur la face de la terre? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L’Éternel dit à Moïse: Je ferai ce que tu me demandes, car tu as trouvé grâce à mes yeux, et je te connais par ton nom. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Moïse dit: Fais-moi voir ta gloire! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L’Éternel répondit: Je ferai passer devant toi toute ma bonté, et je proclamerai devant toi le nom de l’Éternel; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:15
      metadata:
        usfm: ROM.9.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je fais grâce à qui je fais grâce, et miséricorde à qui je fais miséricorde. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'L’Éternel dit: Tu ne pourras pas voir ma face, car l’homme ne peut me voir et vivre. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L’Éternel dit: Voici un lieu près de moi; tu te tiendras sur le rocher. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Quand ma gloire passera, je te mettrai dans un creux du rocher, et je te couvrirai de ma main jusqu’à ce que j’aie passé. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Et lorsque je retournerai ma main, tu me verras par derrière, mais ma face ne pourra pas être vue.
