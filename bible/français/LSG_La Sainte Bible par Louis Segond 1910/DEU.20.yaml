document_id: DEU.20,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les exemptions du service militaire
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. No 10:8, 9. (2 Ch 32:6-8. Ps 20:8.) Jg 7:3. Ps 119:113. 2 Ti 2:3, 4.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque tu iras à la guerre contre tes ennemis, et que tu verras des chevaux et des chars, et un peuple plus nombreux que toi, tu ne les craindras point; car l’Éternel, ton Dieu, qui t’a fait monter du pays d’Égypte, est avec toi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand tu t’approcheras d’une ville pour l’attaquer, tu lui offriras la paix. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si elle accepte la paix et t’ouvre ses portes, tout le peuple qui s’y trouvera te sera tributaire et asservi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si elle n’accepte pas la paix avec toi et qu’elle veuille te faire la guerre, alors tu l’assiégeras. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et après que l’Éternel, ton Dieu, l’aura livrée entre tes mains, tu en feras passer tous les mâles au fil de l’épée. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais tu prendras pour toi les femmes, les enfants, le bétail, tout ce qui sera dans la ville, tout son butin, et tu mangeras les dépouilles de tes ennemis que l’Éternel, ton Dieu, t’aura livrés. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est ainsi que tu agiras à l’égard de toutes les villes qui sont très éloignées de toi, et qui ne font point partie des villes de ces nations-ci. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais dans les villes de ces peuples dont l’Éternel, ton Dieu, te donne le pays pour héritage, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 33:52
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 7:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'tu ne laisseras la vie à rien de ce qui respire. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car tu dévoueras ces peuples par interdit, les Héthiens, les Amoréens, les Cananéens, les Phéréziens, les Héviens, et les Jébusiens, comme l’Éternel, ton Dieu, te l’a ordonné, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afin qu’ils ne vous apprennent pas à imiter toutes les abominations qu’ils font pour leurs dieux, et que vous ne péchiez point contre l’Éternel, votre Dieu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si tu fais un long siège pour t’emparer d’une ville avec laquelle tu es en guerre, tu ne détruiras point les arbres en y portant la hache, tu t’en nourriras et tu ne les abattras point; car l’arbre des champs est-il un homme pour être assiégé par toi? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A l’approche du combat, le sacrificateur s’avancera et parlera au peuple. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais tu pourras détruire et abattre les arbres que tu sauras ne pas être des arbres servant à la nourriture, et en construire des retranchements contre la ville qui te fait la guerre, jusqu’à ce qu’elle succombe.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur dira: Écoute, Israël! Vous allez aujourd’hui livrer bataille à vos ennemis. Que votre cœur ne se trouble point; soyez sans crainte, ne vous effrayez pas, ne vous épouvantez pas devant eux. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car l’Éternel, votre Dieu, marche avec vous, pour combattre vos ennemis, pour vous sauver. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les officiers parleront ensuite au peuple et diront: Qui est-ce qui a bâti une maison neuve, et ne s’y est point encore établi? Qu’il s’en aille et retourne chez lui, de peur qu’il ne meure dans la bataille et qu’un autre ne s’y établisse. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qui est-ce qui a planté une vigne, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:23
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'n’en a point encore joui? Qu’il s’en aille et retourne chez lui, de peur qu’il ne meure dans la bataille et qu’un autre n’en jouisse. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qui est-ce qui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 24:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'a fiancé une femme, et ne l’a point encore prise? Qu’il s’en aille et retourne chez lui, de peur qu’il ne meure dans la bataille et qu’un autre ne la prenne. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les officiers continueront à parler au peuple, et diront: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 7:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Qui est-ce qui a peur et manque de courage? Qu’il s’en aille et retourne chez lui, afin que ses frères ne se découragent pas comme lui. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand les officiers auront achevé de parler au peuple, ils placeront les chefs des troupes à la tête du peuple.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le siège des villes
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-20: cf. No 31. (De 7:1-4, 16. Jos 10; 11.)'
    marker-yv: yv-h
