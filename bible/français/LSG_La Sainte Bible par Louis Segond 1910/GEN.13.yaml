document_id: GEN.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abram de retour en Canaan. Séparation d’avec son neveu Lot
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. Ps 112:1-3. (Mt 5:9. Ja 3:17, 18.) Lu 12:15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Abram remonta d’Égypte vers le midi, lui, sa femme, et tout ce qui lui appartenait, et Lot avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Abram était très riche en troupeaux, en argent et en or. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il dirigea ses marches du midi jusqu’à Béthel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 12:8
      metadata:
        usfm: GEN.12.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'jusqu’au lieu où était sa tente au commencement, entre Béthel et Aï, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'au lieu où était l’autel qu’il avait fait précédemment. Et là, Abram invoqua le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 4:26
      metadata:
        usfm: GEN.4.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:8
      metadata:
        usfm: GEN.12.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nom de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Lot, qui voyageait avec Abram, avait aussi des brebis, des bœufs et des tentes. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 36:7
      metadata:
        usfm: GEN.36.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et la contrée était insuffisante pour qu’ils demeurassent ensemble, car leurs biens étaient si considérables qu’ils ne pouvaient demeurer ensemble. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il y eut querelle entre les bergers des troupeaux d’Abram et les bergers des troupeaux de Lot. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 12:6
      metadata:
        usfm: GEN.12.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les Cananéens et les Phérésiens habitaient alors dans le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Abram dit à Lot: Qu’il n’y ait point, je te prie, de dispute entre moi et toi, ni entre mes bergers et tes bergers; car nous sommes frères. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 20:15
      metadata:
        usfm: GEN.20.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:10
      metadata:
        usfm: GEN.34.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout le pays n’est-il pas devant toi? Sépare-toi donc de moi: si tu vas à gauche, j’irai à droite; si tu vas à droite, j’irai à gauche. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lot leva les yeux, et vit toute la plaine du Jourdain, qui était entièrement arrosée. Avant que l’Éternel eût détruit Sodome et Gomorrhe, c’était, jusqu’à Tsoar, comme un jardin de l’Éternel, comme le pays d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lot choisit pour lui toute la plaine du Jourdain, et il s’avança vers l’orient. C’est ainsi qu’ils se séparèrent l’un de l’autre. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Abram habita dans le pays de Canaan; et Lot habita dans les villes de la plaine, et dressa ses tentes jusqu’à Sodome. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 18:20
      metadata:
        usfm: GEN.18.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 16:49
      metadata:
        usfm: EZK.16.49
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les gens de Sodome étaient méchants, et de grands pécheurs contre l’Éternel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Promesses de l’Éternel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-18: cf. Ge 15:18-21; 17:1-8. Mt 5:3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L’Éternel dit à Abram, après que Lot se fut séparé de lui: Lève les yeux, et, du lieu où tu es, regarde vers le nord et le midi, vers l’orient et l’occident; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 12:7
      metadata:
        usfm: GEN.12.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:7
      metadata:
        usfm: GEN.15.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: GEN.15.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:8
      metadata:
        usfm: GEN.17.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:4
      metadata:
        usfm: GEN.26.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 34:4
      metadata:
        usfm: DEU.34.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:5
      metadata:
        usfm: ACT.7.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car tout le pays que tu vois, je le donnerai à toi et à ta postérité pour toujours. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 15:5
      metadata:
        usfm: GEN.15.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:4
      metadata:
        usfm: GEN.17.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:22
      metadata:
        usfm: DEU.10.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 33:22
      metadata:
        usfm: JER.33.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 4:17
      metadata:
        usfm: ROM.4.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: ROM.4.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:12
      metadata:
        usfm: HEB.11.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je rendrai ta postérité comme la poussière de la terre, en sorte que, si quelqu’un peut compter la poussière de la terre, ta postérité aussi sera comptée. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Lève-toi, parcours le pays dans sa longueur et dans sa largeur; car je te le donnerai. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Abram leva ses tentes, et vint habiter '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 14:13
      metadata:
        usfm: GEN.14.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: parmi les chênes de Mamré, qui sont près d’Hébron. Et il bâtit là un autel à l’Éternel.
