document_id: GEN.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Abram de retour en Canaan. Séparation d’avec son neveu Lot
  - type: heading
    content: 'V. 1-13: cf. Ps 112:1-3. (Mt 5:9. Ja 3:17, 18.) Lu 12:15.'
  - type: text
    content: 'Abram remonta d’Égypte vers le midi, lui, sa femme, et tout ce qui lui appartenait, et Lot avec lui. '
  '10':
  - type: text
    content: 'Lot leva les yeux, et vit toute la plaine du Jourdain, qui était entièrement arrosée. Avant que l’Éternel eût détruit Sodome et Gomorrhe, c’était, jusqu’à Tsoar, comme un jardin de l’Éternel, comme le pays d’Égypte. '
  '11':
  - type: text
    content: 'Lot choisit pour lui toute la plaine du Jourdain, et il s’avança vers l’orient. C’est ainsi qu’ils se séparèrent l’un de l’autre. '
  '12':
  - type: text
    content: 'Abram habita dans le pays de Canaan; et Lot habita dans les villes de la plaine, et dressa ses tentes jusqu’à Sodome. '
  '13':
  - type: note
    content: Ge 18:20. Éz 16:49.
  - type: text
    content: Les gens de Sodome étaient méchants, et de grands pécheurs contre l’Éternel.
  - type: heading
    content: Promesses de l’Éternel
  - type: heading
    content: 'V. 14-18: cf. Ge 15:18-21; 17:1-8. Mt 5:3.'
  '14':
  - type: text
    content: 'L’Éternel dit à Abram, après que Lot se fut séparé de lui: Lève les yeux, et, du lieu où tu es, regarde vers le nord et le midi, vers l’orient et l’occident; '
  '15':
  - type: note
    content: Ge 12:7; 15:7, 18; 17:8; 26:4. De 34:4. Ac 7:5.
  - type: text
    content: 'car tout le pays que tu vois, je le donnerai à toi et à ta postérité pour toujours. '
  '16':
  - type: note
    content: Ge 15:5; 17:4. De 10:22. Jé 33:22. Ro 4:17, 18. Hé 11:12.
  - type: text
    content: 'Je rendrai ta postérité comme la poussière de la terre, en sorte que, si quelqu’un peut compter la poussière de la terre, ta postérité aussi sera comptée. '
  '17':
  - type: text
    content: 'Lève-toi, parcours le pays dans sa longueur et dans sa largeur; car je te le donnerai. '
  '18':
  - type: text
    content: 'Abram leva ses tentes, et vint habiter '
  - type: note
    content: Ge 14:13.
  - type: text
    content: parmi les chênes de Mamré, qui sont près d’Hébron. Et il bâtit là un autel à l’Éternel.
  '2':
  - type: text
    content: 'Abram était très riche en troupeaux, en argent et en or. '
  '3':
  - type: text
    content: 'Il dirigea ses marches du midi jusqu’à Béthel, '
  - type: note
    content: Ge 12:8.
  - type: text
    content: 'jusqu’au lieu où était sa tente au commencement, entre Béthel et Aï, '
  '4':
  - type: text
    content: 'au lieu où était l’autel qu’il avait fait précédemment. Et là, Abram invoqua le '
  - type: note
    content: Ge 4:26; 12:8.
  - type: text
    content: 'nom de l’Éternel. '
  '5':
  - type: text
    content: 'Lot, qui voyageait avec Abram, avait aussi des brebis, des bœufs et des tentes. '
  '6':
  - type: note
    content: Ge 36:7.
  - type: text
    content: 'Et la contrée était insuffisante pour qu’ils demeurassent ensemble, car leurs biens étaient si considérables qu’ils ne pouvaient demeurer ensemble. '
  '7':
  - type: text
    content: 'Il y eut querelle entre les bergers des troupeaux d’Abram et les bergers des troupeaux de Lot. '
  - type: note
    content: Ge 12:6.
  - type: text
    content: 'Les Cananéens et les Phérésiens habitaient alors dans le pays. '
  '8':
  - type: text
    content: 'Abram dit à Lot: Qu’il n’y ait point, je te prie, de dispute entre moi et toi, ni entre mes bergers et tes bergers; car nous sommes frères. '
  '9':
  - type: note
    content: Ge 20:15; 34:10.
  - type: text
    content: 'Tout le pays n’est-il pas devant toi? Sépare-toi donc de moi: si tu vas à gauche, j’irai à droite; si tu vas à droite, j’irai à gauche. '
