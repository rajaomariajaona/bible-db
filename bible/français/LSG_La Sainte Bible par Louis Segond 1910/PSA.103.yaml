        usfm: JER.32.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’Éternel est miséricordieux et compatissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lent à la colère et riche en bonté;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 57:16
      metadata:
        usfm: ISA.57.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 3:5
      metadata:
        usfm: ISA.3.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il ne conteste pas sans cesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne garde pas sa colère à toujours;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il ne nous traite pas selon nos péchés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne nous punit pas selon nos iniquités.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais autant les cieux sont élevés au-dessus de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Autant sa bonté est grande pour ceux qui le craignent;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Autant l’orient est éloigné de l’occident,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Autant il éloigne de nous nos transgressions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Comme un père a compassion de ses enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel a compassion de ceux qui le craignent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Car il sait de quoi nous sommes formés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il se souvient que nous sommes poussière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 90:5
      metadata:
        usfm: PSA.90.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’homme! Ses jours sont comme l’herbe,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 14:1
      metadata:
        usfm: JOB.14.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: JOB.14.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 90:5
      metadata:
        usfm: PSA.90.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: PSA.90.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:10
      metadata:
        usfm: JAS.1.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: JAS.1.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:24
      metadata:
        usfm: 1PE.1.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il fleurit comme la fleur des champs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Lorsqu’un vent passe sur elle, elle n’est plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le lieu qu’elle occupait ne la reconnaît plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mais la bonté de l’Éternel dure à jamais pour ceux qui le craignent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa miséricorde pour les enfants de leurs enfants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Pour '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:9
      metadata:
        usfm: DEU.7.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: ceux qui gardent son alliance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et se souviennent de ses commandements afin de les accomplir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: L’Éternel a établi son trône dans les cieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et son règne domine sur toutes choses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Bénissez l’Éternel, vous ses anges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui êtes puissants en force, et qui exécutez ses ordres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: En obéissant à la voix de sa parole!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Bénissez l’Éternel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 32:2
      metadata:
        usfm: GEN.32.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 22:19
      metadata:
        usfm: 1KI.22.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 3:10
      metadata:
        usfm: EPH.3.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:16
      metadata:
        usfm: COL.1.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: vous toutes ses armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui êtes ses serviteurs, et qui faites sa volonté!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Bénissez l’Éternel, vous toutes ses œuvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans tous les lieux de sa domination!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon âme, bénis l’Éternel!
