document_id: PSA.103,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Ps 30; 116; 145.) (1 Th 5:18. Col 3:15.)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme, bénis l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tout ce qui est en moi bénisse son saint nom!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Il ne nous traite pas selon nos péchés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne nous punit pas selon nos iniquités.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mais autant les cieux sont élevés au-dessus de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Autant sa bonté est grande pour ceux qui le craignent;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Autant l’orient est éloigné de l’occident,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Autant il éloigne de nous nos transgressions.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Comme un père a compassion de ses enfants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel a compassion de ceux qui le craignent.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Car il sait de quoi nous sommes formés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se souvient que nous sommes poussière.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 90:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’homme! Ses jours sont comme l’herbe,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 14:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 90:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 1:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il fleurit comme la fleur des champs.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Lorsqu’un vent passe sur elle, elle n’est plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le lieu qu’elle occupait ne la reconnaît plus.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mais la bonté de l’Éternel dure à jamais pour ceux qui le craignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa miséricorde pour les enfants de leurs enfants,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Pour '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 7:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ceux qui gardent son alliance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et se souviennent de ses commandements afin de les accomplir.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: L’Éternel a établi son trône dans les cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et son règne domine sur toutes choses.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mon âme, bénis l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et n’oublie aucun de ses bienfaits!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Bénissez l’Éternel, vous ses anges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui êtes puissants en force, et qui exécutez ses ordres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En obéissant à la voix de sa parole!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Bénissez l’Éternel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 32:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 22:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 3:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: vous toutes ses armées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui êtes ses serviteurs, et qui faites sa volonté!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Bénissez l’Éternel, vous toutes ses œuvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans tous les lieux de sa domination!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme, bénis l’Éternel!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: C’est lui qui pardonne toutes tes iniquités,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui guérit toutes tes maladies;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: C’est lui qui délivre ta vie de la fosse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui te couronne de bonté et de miséricorde;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: C’est lui qui rassasie de biens ta vieillesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui te fait rajeunir comme l’aigle.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: L’Éternel fait justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fait droit à tous les opprimés.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Il a manifesté ses voies à Moïse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses œuvres aux enfants d’Israël.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 34:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 14:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 5:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Né 9:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 86:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 145:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 32:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’Éternel est miséricordieux et compatissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lent à la colère et riche en bonté;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 57:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 3:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il ne conteste pas sans cesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne garde pas sa colère à toujours;
