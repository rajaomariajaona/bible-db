  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon âme, bénis l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tout ce qui est en moi bénisse son saint nom!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mon âme, bénis l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et n’oublie aucun de ses bienfaits!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C’est lui qui pardonne toutes tes iniquités,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui guérit toutes tes maladies;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C’est lui qui délivre ta vie de la fosse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui te couronne de bonté et de miséricorde;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C’est lui qui rassasie de biens ta vieillesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui te fait rajeunir comme l’aigle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L’Éternel fait justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fait droit à tous les opprimés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il a manifesté ses voies à Moïse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses œuvres aux enfants d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
