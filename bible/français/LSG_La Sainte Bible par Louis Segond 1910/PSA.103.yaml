document_id: PSA.103,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Ps 30; 116; 145.) (1 Th 5:18. Col 3:15.)
  - type: text
    content: De David.
  - type: text
    content: Mon âme, bénis l’Éternel!
  - type: text
    content: Que tout ce qui est en moi bénisse son saint nom!
  '10':
  - type: text
    content: Il ne nous traite pas selon nos péchés,
  - type: text
    content: Il ne nous punit pas selon nos iniquités.
  '11':
  - type: text
    content: Mais autant les cieux sont élevés au-dessus de la terre,
  - type: text
    content: Autant sa bonté est grande pour ceux qui le craignent;
  '12':
  - type: text
    content: Autant l’orient est éloigné de l’occident,
  - type: text
    content: Autant il éloigne de nous nos transgressions.
  '13':
  - type: text
    content: Comme un père a compassion de ses enfants,
  - type: text
    content: L’Éternel a compassion de ceux qui le craignent.
  '14':
  - type: text
    content: Car il sait de quoi nous sommes formés,
  - type: text
    content: Il se souvient que nous sommes poussière.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ps 90:5.
  - type: text
    content: L’homme! Ses jours sont comme l’herbe,
  - type: note
    content: Job 14:1, 2. Ps 90:5, 6. Ja 1:10, 11. 1 Pi 1:24.
  - type: text
    content: Il fleurit comme la fleur des champs.
  '16':
  - type: text
    content: Lorsqu’un vent passe sur elle, elle n’est plus,
  - type: text
    content: Et le lieu qu’elle occupait ne la reconnaît plus.
  '17':
  - type: text
    content: Mais la bonté de l’Éternel dure à jamais pour ceux qui le craignent,
  - type: text
    content: Et sa miséricorde pour les enfants de leurs enfants,
  '18':
  - type: text
    content: 'Pour '
  - type: note
    content: De 7:9.
  - type: text
    content: ceux qui gardent son alliance,
  - type: text
    content: Et se souviennent de ses commandements afin de les accomplir.
  '19':
  - type: text
    content: L’Éternel a établi son trône dans les cieux,
  - type: text
    content: Et son règne domine sur toutes choses.
  '2':
  - type: text
    content: Mon âme, bénis l’Éternel,
  - type: text
    content: Et n’oublie aucun de ses bienfaits!
  '20':
  - type: text
    content: Bénissez l’Éternel, vous ses anges,
  - type: text
    content: Qui êtes puissants en force, et qui exécutez ses ordres,
  - type: text
    content: En obéissant à la voix de sa parole!
  '21':
  - type: text
    content: 'Bénissez l’Éternel, '
  - type: note
    content: Ge 32:2. 1 R 22:19. Ép 3:10. Col 1:16.
  - type: text
    content: vous toutes ses armées,
  - type: text
    content: Qui êtes ses serviteurs, et qui faites sa volonté!
  '22':
  - type: text
    content: Bénissez l’Éternel, vous toutes ses œuvres,
  - type: text
    content: Dans tous les lieux de sa domination!
  - type: text
    content: Mon âme, bénis l’Éternel!
  '3':
  - type: text
    content: C’est lui qui pardonne toutes tes iniquités,
  - type: text
    content: Qui guérit toutes tes maladies;
  '4':
  - type: text
    content: C’est lui qui délivre ta vie de la fosse,
  - type: text
    content: Qui te couronne de bonté et de miséricorde;
  '5':
  - type: text
    content: C’est lui qui rassasie de biens ta vieillesse,
  - type: text
    content: Qui te fait rajeunir comme l’aigle.
  '6':
  - type: text
    content: L’Éternel fait justice,
  - type: text
    content: Il fait droit à tous les opprimés.
  '7':
  - type: text
    content: Il a manifesté ses voies à Moïse,
  - type: text
    content: Ses œuvres aux enfants d’Israël.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ex 34:6. No 14:18. De 5:10. Né 9:17. Ps 86:15; 145:8. Jé 32:18.
  - type: text
    content: L’Éternel est miséricordieux et compatissant,
  - type: text
    content: Lent à la colère et riche en bonté;
  '9':
  - type: text
    content: ' '
  - type: note
    content: És 57:16. És 3:5.
  - type: text
    content: Il ne conteste pas sans cesse,
  - type: text
    content: Il ne garde pas sa colère à toujours;
