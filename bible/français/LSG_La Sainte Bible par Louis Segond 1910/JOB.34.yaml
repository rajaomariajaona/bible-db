document_id: JOB.34
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. (Job 27:2; 16:12-17.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Élihu reprit et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sages, écoutez mes discours!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous qui êtes intelligents, prêtez-moi l’oreille!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 12:11
      metadata:
        usfm: JOB.12.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car l’oreille discerne les paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme le palais savoure les aliments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Choisissons ce qui est juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voyons entre nous ce qui est bon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Job dit: Je suis innocent,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 27:2
      metadata:
        usfm: JOB.27.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et Dieu me refuse justice;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: J’ai raison, et je passe pour menteur;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 6:4
      metadata:
        usfm: JOB.6.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ma plaie est douloureuse, et je suis sans péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Y a-t-il un homme semblable à Job,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Buvant la raillerie comme l’eau,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Marchant en société de ceux qui font le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cheminant de pair avec les impies?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Car il a dit: Il est inutile à l’homme'
- type: usfm
  marker: q1
  children:
  - type: text
    text: De mettre son plaisir en Dieu.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-32: cf. (De 32:4. Ge 18:25. Ps 89:15; 145:17. Jé 32:19.) (Ps 39:12; 94:10, 12; 118:18.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Écoutez-moi donc, hommes de sens!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
