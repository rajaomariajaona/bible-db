      metadata:
        usfm: ROM.9.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Loin de Dieu l’injustice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Loin du Tout-Puissant l’iniquité!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
