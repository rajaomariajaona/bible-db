      - type: text
        text: Ap 22:12
      metadata:
        usfm: REV.22.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il rend à l’homme selon ses œuvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il rétribue chacun selon ses voies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Non certes, Dieu ne commet pas l’iniquité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Tout-Puissant ne viole pas la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Qui l’a chargé de gouverner la terre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a confié l’univers à ses soins?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 104:29
      metadata:
        usfm: PSA.104.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 12:7
      metadata:
        usfm: ECC.12.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: S’il ne pensait qu’à lui-même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’il retirait à lui son esprit et son souffle,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Toute chair périrait soudain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et l’homme '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 3:19
      metadata:
        usfm: GEN.3.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 12:7
      metadata:
        usfm: ECC.12.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: rentrerait dans la poussière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Si tu as de l’intelligence, écoute ceci,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prête l’oreille au son de mes paroles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 18:25
      metadata:
        usfm: GEN.18.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 8:3
      metadata:
        usfm: JOB.8.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:22
      metadata:
        usfm: JOB.21.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 3:5
      metadata:
        usfm: ROM.3.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Un ennemi de la justice régnerait-il?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et condamneras-tu le juste, le puissant,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Qui proclame la méchanceté des rois
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’iniquité des princes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Qui n’a point égard à l’apparence des grands
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et ne '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:17
      metadata:
        usfm: DEU.10.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 19:7
      metadata:
        usfm: 2CH.19.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 37:24
      metadata:
        usfm: JOB.37.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:34
      metadata:
        usfm: ACT.10.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 2:11
      metadata:
        usfm: ROM.2.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 2:6
      metadata:
        usfm: GAL.2.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 6:9
      metadata:
        usfm: EPH.6.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:25
      metadata:
        usfm: COL.3.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:17
      metadata:
        usfm: 1PE.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: distingue pas le riche du pauvre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que tous sont l’ouvrage de ses mains?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: En un instant, ils perdent la vie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au milieu de la nuit, un peuple chancelle et périt;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le puissant disparaît, sans la main d’aucun homme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 16:9
      metadata:
        usfm: 2CH.16.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 31:4
      metadata:
        usfm: JOB.31.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 34:16
      metadata:
        usfm: PSA.34.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 5:21
      metadata:
        usfm: PRO.5.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:3
      metadata:
        usfm: PRO.15.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 16:17
      metadata:
        usfm: JER.16.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 32:19
      metadata:
        usfm: JER.32.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car Dieu voit la conduite de tous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a les regards sur les pas de chacun.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 139:12
      metadata:
        usfm: PSA.139.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 9:2
      metadata:
        usfm: AMO.9.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: AMO.9.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 4:13
      metadata:
        usfm: HEB.4.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il n’y a ni ténèbres ni ombre de la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où puissent se cacher ceux qui commettent l’iniquité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dieu n’a pas besoin d’observer longtemps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour qu’un homme entre en jugement avec lui;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Il brise les grands sans information,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il met d’autres à leur place;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Car il connaît leurs œuvres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les renverse de nuit, et ils sont écrasés;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il les frappe comme des impies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A la face de tous les regards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: En se détournant de lui,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 28:5
      metadata:
        usfm: PSA.28.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:12
      metadata:
        usfm: ISA.5.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: En abandonnant toutes ses voies,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ils ont fait monter à Dieu le cri du pauvre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils l’ont rendu attentif aux cris des malheureux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: S’il donne le repos, qui répandra le trouble?
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’il cache sa face, qui pourra le voir?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il traite à l’égal soit une nation, soit un homme,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Afin que l’impie ne domine plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’il ne soit plus un piège pour le peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Car a-t-il jamais dit à Dieu:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai été châtié, je ne pécherai plus;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Montre-moi ce que je ne vois pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si j’ai commis des injustices, je n’en commettrai plus?
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 33-37: cf. Ja 4:7, 10. Ps 73:15.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Est-ce d’après toi que Dieu rendra la justice?
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est toi qui rejettes, qui choisis, mais non pas moi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce que tu sais, dis-le donc!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Les hommes de sens seront de mon avis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le sage qui m’écoute pensera comme moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Job parle sans intelligence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses discours manquent de raison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Qu’il continue donc à être éprouvé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisqu’il répond comme font les méchants!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il ajoute à ses fautes de nouveaux péchés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il bat des mains au milieu de nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il multiplie ses paroles contre Dieu.
