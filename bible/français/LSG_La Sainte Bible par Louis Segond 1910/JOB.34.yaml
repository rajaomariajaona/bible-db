document_id: JOB.34,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-9: cf. (Job 27:2; 16:12-17.)'
  - type: text
    content: 'Élihu reprit et dit:'
  '10':
  - type: text
    content: Écoutez-moi donc, hommes de sens!
  - type: note
    content: De 32:4. 2 Ch 19:7. Job 8:3; 36:23. Ps 92:16. Ro 9:14.
  - type: text
    content: Loin de Dieu l’injustice,
  - type: text
    content: Loin du Tout-Puissant l’iniquité!
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ps 62:13. Pr 24:12. Jé 17:10; 32:19. Éz 7:27; 33:20. Mt 16:27. Ro 2:6. 1 Co 3:8. 2 Co 5:10. Ép 6:8. Col 3:25. 1 Pi 1:17. Ap 22:12.
  - type: text
    content: Il rend à l’homme selon ses œuvres,
  - type: text
    content: Il rétribue chacun selon ses voies.
  '12':
  - type: text
    content: Non certes, Dieu ne commet pas l’iniquité;
  - type: text
    content: Le Tout-Puissant ne viole pas la justice.
  '13':
  - type: text
    content: Qui l’a chargé de gouverner la terre?
  - type: text
    content: Qui a confié l’univers à ses soins?
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ps 104:29. Ec 12:7.
  - type: text
    content: S’il ne pensait qu’à lui-même,
  - type: text
    content: S’il retirait à lui son esprit et son souffle,
  '15':
  - type: text
    content: Toute chair périrait soudain,
  - type: text
    content: 'Et l’homme '
  - type: note
    content: Ge 3:19. Ec 12:7.
  - type: text
    content: rentrerait dans la poussière.
  '16':
  - type: text
    content: Si tu as de l’intelligence, écoute ceci,
  - type: text
    content: Prête l’oreille au son de mes paroles!
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ge 18:25. Job 8:3; 21:22. Ro 3:5.
  - type: text
    content: Un ennemi de la justice régnerait-il?
  - type: text
    content: Et condamneras-tu le juste, le puissant,
  '18':
  - type: text
    content: Qui proclame la méchanceté des rois
  - type: text
    content: Et l’iniquité des princes,
  '19':
  - type: text
    content: Qui n’a point égard à l’apparence des grands
  - type: text
    content: 'Et ne '
  - type: note
    content: De 10:17. 2 Ch 19:7. Job 37:24. Ac 10:34. Ro 2:11. Ga 2:6. Ép 6:9. Col 3:25. 1 Pi 1:17.
  - type: text
    content: distingue pas le riche du pauvre,
  - type: text
    content: Parce que tous sont l’ouvrage de ses mains?
  '2':
  - type: text
    content: Sages, écoutez mes discours!
  - type: text
    content: Vous qui êtes intelligents, prêtez-moi l’oreille!
  '20':
  - type: text
    content: En un instant, ils perdent la vie;
  - type: text
    content: Au milieu de la nuit, un peuple chancelle et périt;
  - type: text
    content: Le puissant disparaît, sans la main d’aucun homme.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 2 Ch 16:9. Job 31:4. Ps 34:16. Pr 5:21; 15:3. Jé 16:17; 32:19.
  - type: text
    content: Car Dieu voit la conduite de tous,
  - type: text
    content: Il a les regards sur les pas de chacun.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Ps 139:12. Am 9:2, 3. Hé 4:13.
  - type: text
    content: Il n’y a ni ténèbres ni ombre de la mort,
  - type: text
    content: Où puissent se cacher ceux qui commettent l’iniquité.
  '23':
  - type: text
    content: Dieu n’a pas besoin d’observer longtemps,
  - type: text
    content: Pour qu’un homme entre en jugement avec lui;
  '24':
  - type: text
    content: Il brise les grands sans information,
  - type: text
    content: Et il met d’autres à leur place;
  '25':
  - type: text
    content: Car il connaît leurs œuvres.
  - type: text
    content: Il les renverse de nuit, et ils sont écrasés;
  '26':
  - type: text
    content: Il les frappe comme des impies,
  - type: text
    content: A la face de tous les regards.
  '27':
  - type: text
    content: En se détournant de lui,
  - type: note
    content: Ps 28:5. És 5:12.
  - type: text
    content: En abandonnant toutes ses voies,
  '28':
  - type: text
    content: Ils ont fait monter à Dieu le cri du pauvre,
  - type: text
    content: Ils l’ont rendu attentif aux cris des malheureux.
  '29':
  - type: text
    content: S’il donne le repos, qui répandra le trouble?
  - type: text
    content: S’il cache sa face, qui pourra le voir?
  - type: text
    content: Il traite à l’égal soit une nation, soit un homme,
  '3':
  - type: text
    content: ' '
  - type: note
    content: Job 12:11.
  - type: text
    content: Car l’oreille discerne les paroles,
  - type: text
    content: Comme le palais savoure les aliments.
  '30':
  - type: text
    content: Afin que l’impie ne domine plus,
  - type: text
    content: Et qu’il ne soit plus un piège pour le peuple.
  '31':
  - type: text
    content: 'Car a-t-il jamais dit à Dieu:'
  - type: text
    content: J’ai été châtié, je ne pécherai plus;
  '32':
  - type: text
    content: Montre-moi ce que je ne vois pas;
  - type: text
    content: Si j’ai commis des injustices, je n’en commettrai plus?
  - type: heading
    content: 'V. 33-37: cf. Ja 4:7, 10. Ps 73:15.'
  '33':
  - type: text
    content: Est-ce d’après toi que Dieu rendra la justice?
  - type: text
    content: C’est toi qui rejettes, qui choisis, mais non pas moi;
  - type: text
    content: Ce que tu sais, dis-le donc!
  '34':
  - type: text
    content: Les hommes de sens seront de mon avis,
  - type: text
    content: Le sage qui m’écoute pensera comme moi.
  '35':
  - type: text
    content: Job parle sans intelligence,
  - type: text
    content: Et ses discours manquent de raison.
  '36':
  - type: text
    content: Qu’il continue donc à être éprouvé,
  - type: text
    content: Puisqu’il répond comme font les méchants!
  - type: text
    content: Car il ajoute à ses fautes de nouveaux péchés;
  - type: text
    content: Il bat des mains au milieu de nous,
  - type: text
    content: Il multiplie ses paroles contre Dieu.
  '4':
  - type: text
    content: Choisissons ce qui est juste,
  - type: text
    content: Voyons entre nous ce qui est bon.
  '5':
  - type: text
    content: 'Job dit: Je suis innocent,'
  - type: note
    content: Job 27:2.
  - type: text
    content: Et Dieu me refuse justice;
  '6':
  - type: text
    content: J’ai raison, et je passe pour menteur;
  - type: note
    content: Job 6:4.
  - type: text
    content: Ma plaie est douloureuse, et je suis sans péché.
  '7':
  - type: text
    content: Y a-t-il un homme semblable à Job,
  - type: text
    content: Buvant la raillerie comme l’eau,
  '8':
  - type: text
    content: Marchant en société de ceux qui font le mal,
  - type: text
    content: Cheminant de pair avec les impies?
  '9':
  - type: text
    content: 'Car il a dit: Il est inutile à l’homme'
  - type: text
    content: De mettre son plaisir en Dieu.
  - type: heading
    content: 'V. 10-32: cf. (De 32:4. Ge 18:25. Ps 89:15; 145:17. Jé 32:19.) (Ps 39:12; 94:10, 12; 118:18.)'
