      marker-yv: yv-n
    - type: text
      text: Il rend à l’homme selon ses œuvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il rétribue chacun selon ses voies.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Non certes, Dieu ne commet pas l’iniquité;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Tout-Puissant ne viole pas la justice.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui l’a chargé de gouverner la terre?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a confié l’univers à ses soins?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 104:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 12:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: S’il ne pensait qu’à lui-même,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’il retirait à lui son esprit et son souffle,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toute chair périrait soudain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et l’homme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 3:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 12:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: rentrerait dans la poussière.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu as de l’intelligence, écoute ceci,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prête l’oreille au son de mes paroles!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 18:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 8:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Un ennemi de la justice régnerait-il?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et condamneras-tu le juste, le puissant,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui proclame la méchanceté des rois
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’iniquité des princes,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui n’a point égard à l’apparence des grands
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et ne '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 10:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 19:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 37:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 10:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 2:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 2:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 6:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: distingue pas le riche du pauvre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que tous sont l’ouvrage de ses mains?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sages, écoutez mes discours!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous qui êtes intelligents, prêtez-moi l’oreille!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En un instant, ils perdent la vie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu de la nuit, un peuple chancelle et périt;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le puissant disparaît, sans la main d’aucun homme.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 16:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 31:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 34:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 5:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 16:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car Dieu voit la conduite de tous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a les regards sur les pas de chacun.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 139:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 9:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 4:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il n’y a ni ténèbres ni ombre de la mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où puissent se cacher ceux qui commettent l’iniquité.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu n’a pas besoin d’observer longtemps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour qu’un homme entre en jugement avec lui;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il brise les grands sans information,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il met d’autres à leur place;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il connaît leurs œuvres.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les renverse de nuit, et ils sont écrasés;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les frappe comme des impies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la face de tous les regards.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En se détournant de lui,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 28:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 5:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: En abandonnant toutes ses voies,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont fait monter à Dieu le cri du pauvre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils l’ont rendu attentif aux cris des malheureux.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’il donne le repos, qui répandra le trouble?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’il cache sa face, qui pourra le voir?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il traite à l’égal soit une nation, soit un homme,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 12:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car l’oreille discerne les paroles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme le palais savoure les aliments.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que l’impie ne domine plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il ne soit plus un piège pour le peuple.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car a-t-il jamais dit à Dieu:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai été châtié, je ne pécherai plus;
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Montre-moi ce que je ne vois pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si j’ai commis des injustices, je n’en commettrai plus?
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 33-37: cf. Ja 4:7, 10. Ps 73:15.'
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce d’après toi que Dieu rendra la justice?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est toi qui rejettes, qui choisis, mais non pas moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce que tu sais, dis-le donc!
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les hommes de sens seront de mon avis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sage qui m’écoute pensera comme moi.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Job parle sans intelligence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses discours manquent de raison.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il continue donc à être éprouvé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puisqu’il répond comme font les méchants!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il ajoute à ses fautes de nouveaux péchés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il bat des mains au milieu de nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il multiplie ses paroles contre Dieu.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Choisissons ce qui est juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voyons entre nous ce qui est bon.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Job dit: Je suis innocent,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 27:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et Dieu me refuse justice;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai raison, et je passe pour menteur;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 6:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ma plaie est douloureuse, et je suis sans péché.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Y a-t-il un homme semblable à Job,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Buvant la raillerie comme l’eau,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marchant en société de ceux qui font le mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cheminant de pair avec les impies?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car il a dit: Il est inutile à l’homme'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De mettre son plaisir en Dieu.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-32: cf. (De 32:4. Ge 18:25. Ps 89:15; 145:17. Jé 32:19.) (Ps 39:12; 94:10, 12; 118:18.)'
    marker-yv: yv-h
