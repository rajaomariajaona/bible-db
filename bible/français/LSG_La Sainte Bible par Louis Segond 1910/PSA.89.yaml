document_id: PSA.89,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (2 S 7:12-16; 23:5.) (Ps 44; 77.)
  - type: text
    content: Cantique d’Éthan, l’Ezrachite.
  '10':
  - type: text
    content: Tu domptes l’orgueil de la mer;
  - type: text
    content: Quand ses flots se soulèvent, tu les apaises.
  '11':
  - type: text
    content: Tu écrasas l’Égypte comme un cadavre,
  - type: text
    content: Tu dispersas tes ennemis par la puissance de ton bras.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ps 24:1, 2.
  - type: text
    content: C’est à toi qu’appartiennent les cieux et la terre,
  - type: text
    content: C’est toi qui as fondé le monde et ce qu’il renferme.
  '13':
  - type: text
    content: Tu as créé le nord et le midi;
  - type: text
    content: Le Thabor et l’Hermon se réjouissent à ton nom.
  '14':
  - type: text
    content: Ton bras est puissant,
  - type: text
    content: Ta main forte, ta droite élevée.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ps 97:2.
  - type: text
    content: La justice et l’équité sont la base de ton trône.
  - type: note
    content: Ps 85:14.
  - type: text
    content: La bonté et la fidélité sont devant ta face.
  '16':
  - type: text
    content: Heureux le peuple qui connaît le son de la trompette;
  - type: text
    content: Il marche à la clarté de ta face, ô Éternel!
  '17':
  - type: text
    content: Il se réjouit sans cesse de ton nom,
  - type: text
    content: Et il se glorifie de ta justice.
  '18':
  - type: text
    content: Car tu es la gloire de sa puissance;
  - type: text
    content: C’est ta faveur qui relève notre force.
  '19':
  - type: text
    content: Car l’Éternel est notre bouclier,
  - type: text
    content: Le Saint d’Israël est notre roi.
  '2':
  - type: text
    content: Je chanterai toujours les bontés de l’Éternel;
  - type: text
    content: Ma bouche fera connaître à jamais ta fidélité.
  '20':
  - type: text
    content: Alors tu parlas dans une vision à ton bien-aimé,
  - type: text
    content: 'Et tu dis: J’ai prêté mon secours à un héros,'
  - type: text
    content: J’ai élevé du milieu du peuple un jeune homme;
  '21':
  - type: text
    content: 'J’ai trouvé David, '
  - type: note
    content: 1 S 16:1, 13.
  - type: text
    content: mon serviteur,
  - type: text
    content: Je l’ai oint de mon huile sainte.
  '22':
  - type: text
    content: Ma main le soutiendra,
  - type: text
    content: Et mon bras le fortifiera.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 2 S 7:10.
  - type: text
    content: L’ennemi ne le surprendra pas,
  - type: text
    content: Et le méchant ne l’opprimera point;
  '24':
  - type: text
    content: J’écraserai devant lui ses adversaires,
  - type: text
    content: Et je frapperai ceux qui le haïssent.
  '25':
  - type: text
    content: Ma fidélité et ma bonté seront avec lui,
  - type: text
    content: Et sa force s’élèvera par mon nom.
  '26':
  - type: text
    content: Je mettrai sa main sur la mer,
  - type: text
    content: Et sa droite sur les fleuves.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 2 S 7:14. Hé 1:4, 5.
  - type: text
    content: 'Lui, il m’invoquera: Tu es mon père,'
  - type: text
    content: Mon Dieu et le rocher de mon salut!
  '28':
  - type: text
    content: Et moi, je ferai de lui le premier-né,
  - type: text
    content: Le plus élevé des rois de la terre.
  '29':
  - type: text
    content: Je lui conserverai toujours ma bonté,
  - type: text
    content: Et mon alliance lui sera fidèle;
  '3':
  - type: text
    content: 'Car je dis: La bonté a des fondements éternels;'
  - type: text
    content: Tu établis ta fidélité dans les cieux.
  '30':
  - type: text
    content: Je rendrai sa postérité éternelle,
  - type: text
    content: Et son trône comme les jours des cieux.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 2 S 7:14.
  - type: text
    content: Si ses fils abandonnent ma loi
  - type: text
    content: Et ne marchent pas selon ses ordonnances,
  '32':
  - type: text
    content: S’ils violent mes préceptes
  - type: text
    content: Et n’observent pas mes commandements,
  '33':
  - type: text
    content: Je punirai de la verge leurs transgressions,
  - type: text
    content: Et par des coups leurs iniquités;
  '34':
  - type: text
    content: Mais je ne lui retirerai point ma bonté
  - type: text
    content: Et je ne trahirai pas ma fidélité,
  '35':
  - type: text
    content: Je ne violerai point mon alliance
  - type: text
    content: Et je ne changerai pas ce qui est sorti de mes lèvres.
  '36':
  - type: text
    content: ' '
  - type: note
    content: Hé 6:13, 17, 18.
  - type: text
    content: 'J’ai juré une fois par ma sainteté:'
  - type: text
    content: Mentirai-je à David?
  '37':
  - type: text
    content: Sa postérité subsistera toujours;
  - type: text
    content: Son trône sera devant moi comme le soleil,
  '38':
  - type: text
    content: Comme la lune il aura une éternelle durée.
  - type: text
    content: 'Le témoin qui est dans le ciel est fidèle. '
  - type: text
    content: — Pause.
  '39':
  - type: text
    content: Et pourtant, tu as rejeté, tu as repoussé!
  - type: text
    content: Tu t’es irrité contre ton oint!
  '4':
  - type: text
    content: J’ai fait alliance avec mon élu;
  - type: text
    content: 'Voici ce que j’ai juré à David, mon serviteur:'
  '40':
  - type: text
    content: Tu as dédaigné l’alliance avec ton serviteur;
  - type: text
    content: Tu as abattu, profané sa couronne.
  '41':
  - type: text
    content: Tu as détruit toutes ses murailles,
  - type: text
    content: Tu as mis en ruines ses forteresses.
  '42':
  - type: text
    content: ' '
  - type: note
    content: Ps 80:13.
  - type: text
    content: Tous les passants le dépouillent;
  - type: text
    content: Il est un objet d’opprobre pour ses voisins.
  '43':
  - type: text
    content: Tu as élevé la droite de ses adversaires,
  - type: text
    content: Tu as réjoui tous ses ennemis;
  '44':
  - type: text
    content: Tu as fait reculer le tranchant de son glaive,
  - type: text
    content: Et tu ne l’as pas soutenu dans le combat.
  '45':
  - type: text
    content: Tu as mis un terme à sa splendeur,
  - type: text
    content: Et tu as jeté son trône à terre;
  '46':
  - type: text
    content: Tu as abrégé les jours de sa jeunesse,
  - type: text
    content: 'Tu l’as couvert de honte. '
  - type: text
    content: — Pause.
  '47':
  - type: text
    content: Jusques à quand, Éternel! Te cacheras-tu sans cesse,
  - type: text
    content: Et ta fureur s’embrasera-t-elle comme le feu?
  '48':
  - type: text
    content: Rappelle-toi ce qu’est la durée de ma vie,
  - type: text
    content: Et pour quel néant tu as créé tous les fils de l’homme.
  '49':
  - type: text
    content: Y a-t-il un homme qui puisse vivre et ne pas voir la mort,
  - type: note
    content: Ps 49:10, 16.
  - type: text
    content: 'Qui puisse sauver son âme du séjour des morts? '
  - type: text
    content: — Pause.
  '5':
  - type: text
    content: J’affermirai ta postérité pour toujours,
  - type: text
    content: 'Et j’établirai ton trône à perpétuité. '
  - type: text
    content: — Pause.
  '50':
  - type: text
    content: Où sont, Seigneur! Tes bontés premières,
  - type: note
    content: 2 S 7:15.
  - type: text
    content: Que tu juras à David dans ta fidélité?
  '51':
  - type: text
    content: Souviens-toi, Seigneur! De l’opprobre de tes serviteurs,
  - type: text
    content: Souviens-toi que je porte en mon sein tous les peuples nombreux;
  '52':
  - type: text
    content: Souviens-toi des outrages de tes ennemis, ô Éternel!
  - type: text
    content: De leurs outrages contre les pas de ton oint.
  '53':
  - type: text
    content: Béni soit à jamais l’Éternel! Amen! Amen!
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps 19:2.
  - type: text
    content: Les cieux célèbrent tes merveilles, ô Éternel!
  - type: text
    content: Et ta fidélité dans l’assemblée des saints.
  '7':
  - type: text
    content: Car qui, dans le ciel, peut se comparer à l’Éternel?
  - type: text
    content: Qui est semblable à toi parmi les fils de Dieu?
  '8':
  - type: text
    content: Dieu est terrible dans la grande assemblée des saints,
  - type: text
    content: Il est redoutable pour tous ceux qui l’entourent.
  '9':
  - type: text
    content: Éternel, Dieu des armées! Qui est comme toi puissant, ô Éternel?
  - type: text
    content: Ta fidélité t’environne.
