document_id: PSA.89,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 S 7:12-16; 23:5.) (Ps 44; 77.)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cantique d’Éthan, l’Ezrachite.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu domptes l’orgueil de la mer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand ses flots se soulèvent, tu les apaises.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu écrasas l’Égypte comme un cadavre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu dispersas tes ennemis par la puissance de ton bras.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 24:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: C’est à toi qu’appartiennent les cieux et la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est toi qui as fondé le monde et ce qu’il renferme.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as créé le nord et le midi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Thabor et l’Hermon se réjouissent à ton nom.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton bras est puissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta main forte, ta droite élevée.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 97:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La justice et l’équité sont la base de ton trône.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 85:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La bonté et la fidélité sont devant ta face.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux le peuple qui connaît le son de la trompette;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il marche à la clarté de ta face, ô Éternel!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se réjouit sans cesse de ton nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il se glorifie de ta justice.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu es la gloire de sa puissance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est ta faveur qui relève notre force.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel est notre bouclier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Saint d’Israël est notre roi.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je chanterai toujours les bontés de l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma bouche fera connaître à jamais ta fidélité.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors tu parlas dans une vision à ton bien-aimé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et tu dis: J’ai prêté mon secours à un héros,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai élevé du milieu du peuple un jeune homme;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’ai trouvé David, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 16:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: mon serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je l’ai oint de mon huile sainte.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma main le soutiendra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon bras le fortifiera.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 7:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’ennemi ne le surprendra pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le méchant ne l’opprimera point;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’écraserai devant lui ses adversaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je frapperai ceux qui le haïssent.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma fidélité et ma bonté seront avec lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa force s’élèvera par mon nom.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je mettrai sa main sur la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa droite sur les fleuves.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 7:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 1:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Lui, il m’invoquera: Tu es mon père,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu et le rocher de mon salut!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et moi, je ferai de lui le premier-né,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le plus élevé des rois de la terre.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je lui conserverai toujours ma bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon alliance lui sera fidèle;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car je dis: La bonté a des fondements éternels;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu établis ta fidélité dans les cieux.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je rendrai sa postérité éternelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et son trône comme les jours des cieux.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 7:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Si ses fils abandonnent ma loi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne marchent pas selon ses ordonnances,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’ils violent mes préceptes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et n’observent pas mes commandements,
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je punirai de la verge leurs transgressions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et par des coups leurs iniquités;
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais je ne lui retirerai point ma bonté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ne trahirai pas ma fidélité,
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne violerai point mon alliance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ne changerai pas ce qui est sorti de mes lèvres.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 6:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'J’ai juré une fois par ma sainteté:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mentirai-je à David?
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa postérité subsistera toujours;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son trône sera devant moi comme le soleil,
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme la lune il aura une éternelle durée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le témoin qui est dans le ciel est fidèle. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pourtant, tu as rejeté, tu as repoussé!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu t’es irrité contre ton oint!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai fait alliance avec mon élu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que j’ai juré à David, mon serviteur:'
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as dédaigné l’alliance avec ton serviteur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as abattu, profané sa couronne.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as détruit toutes ses murailles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as mis en ruines ses forteresses.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 80:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tous les passants le dépouillent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est un objet d’opprobre pour ses voisins.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as élevé la droite de ses adversaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as réjoui tous ses ennemis;
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as fait reculer le tranchant de son glaive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu ne l’as pas soutenu dans le combat.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as mis un terme à sa splendeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu as jeté son trône à terre;
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as abrégé les jours de sa jeunesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu l’as couvert de honte. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusques à quand, Éternel! Te cacheras-tu sans cesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ta fureur s’embrasera-t-elle comme le feu?
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rappelle-toi ce qu’est la durée de ma vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pour quel néant tu as créé tous les fils de l’homme.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Y a-t-il un homme qui puisse vivre et ne pas voir la mort,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 49:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Qui puisse sauver son âme du séjour des morts? '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’affermirai ta postérité pour toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et j’établirai ton trône à perpétuité. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '50':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où sont, Seigneur! Tes bontés premières,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 7:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que tu juras à David dans ta fidélité?
  '51':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Souviens-toi, Seigneur! De l’opprobre de tes serviteurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Souviens-toi que je porte en mon sein tous les peuples nombreux;
  '52':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Souviens-toi des outrages de tes ennemis, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De leurs outrages contre les pas de ton oint.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni soit à jamais l’Éternel! Amen! Amen!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 19:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les cieux célèbrent tes merveilles, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ta fidélité dans l’assemblée des saints.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car qui, dans le ciel, peut se comparer à l’Éternel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est semblable à toi parmi les fils de Dieu?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu est terrible dans la grande assemblée des saints,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est redoutable pour tous ceux qui l’entourent.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, Dieu des armées! Qui est comme toi puissant, ô Éternel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta fidélité t’environne.
