document_id: ISA.16,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Envoyez les agneaux au souverain du pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Envoyez-les de Séla, par le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la montagne de la fille de Sion.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: La joie et l’allégresse ont disparu des campagnes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les vignes, plus de chants, plus de réjouissances!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le vendangeur ne foule plus le vin dans les cuves;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai fait cesser les cris de joie.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Aussi mes entrailles frémissent sur Moab, comme une harpe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon cœur sur Kir-Harès.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: On voit Moab, qui se fatigue sur les hauts lieux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il entre dans son sanctuaire pour prier, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:37
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '38'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '39'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: il ne peut rien obtenir.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Telle est la parole que l’Éternel a prononcée dès longtemps sur Moab.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et maintenant l’Éternel parle, et dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans trois ans, comme les années d’un mercenaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La gloire de Moab sera l’objet du mépris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec toute cette grande multitude;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ce qui restera sera peu de chose, presque rien.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tel un oiseau fugitif, telle une nichée effarouchée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Telles seront les filles de Moab, au passage de l’Arnon.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Donne conseil, fais justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Couvre-nous en plein midi de ton ombre comme de la nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cache ceux que l’on poursuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne trahis pas le fugitif!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Laisse séjourner chez toi les exilés de Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois pour eux un refuge contre le dévastateur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’oppression cessera, la dévastation finira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui foule le pays disparaîtra.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Et le trône s’affermira par la clémence;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et l’on y verra siéger fidèlement, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 9:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Da 7:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '27'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 4:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 1:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: dans la maison de David,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un juge ami du droit et zélé pour la justice.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 48:29
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '30'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Nous entendons l’orgueil du superbe Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa fierté et sa hauteur, son arrogance et ses vains discours.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'C’est pourquoi Moab '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 48:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: gémit sur Moab, tout gémit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous soupirez sur les ruines de Kir-Haréseth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Profondément abattus.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Car les campagnes de Hesbon languissent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les maîtres des nations ont brisé les ceps de la vigne de Sibma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qui s’étendaient jusqu’à Jaezer, qui erraient dans le désert:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 48:32
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les rameaux se prolongeaient, et allaient au-delà de la mer.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Aussi je pleure sur la vigne de Sibma, comme sur Jaezer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous arrose de mes larmes, Hesbon, Élealé!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car sur votre récolte et sur votre moisson
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est venu fondre un cri de guerre.
