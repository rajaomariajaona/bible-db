document_id: ISA.16,93
type_code: fra
verses:
  '1':
  - type: text
    content: Envoyez les agneaux au souverain du pays,
  - type: text
    content: Envoyez-les de Séla, par le désert,
  - type: text
    content: A la montagne de la fille de Sion.
  '10':
  - type: text
    content: La joie et l’allégresse ont disparu des campagnes;
  - type: text
    content: Dans les vignes, plus de chants, plus de réjouissances!
  - type: text
    content: Le vendangeur ne foule plus le vin dans les cuves;
  - type: text
    content: J’ai fait cesser les cris de joie.
  '11':
  - type: text
    content: Aussi mes entrailles frémissent sur Moab, comme une harpe,
  - type: text
    content: Et mon cœur sur Kir-Harès.
  '12':
  - type: text
    content: On voit Moab, qui se fatigue sur les hauts lieux;
  - type: text
    content: 'Il entre dans son sanctuaire pour prier, et '
  - type: note
    content: De 32:37, 38, 39.
  - type: text
    content: il ne peut rien obtenir.
  '13':
  - type: text
    content: Telle est la parole que l’Éternel a prononcée dès longtemps sur Moab.
  '14':
  - type: text
    content: 'Et maintenant l’Éternel parle, et dit:'
  - type: text
    content: Dans trois ans, comme les années d’un mercenaire,
  - type: text
    content: La gloire de Moab sera l’objet du mépris,
  - type: text
    content: Avec toute cette grande multitude;
  - type: text
    content: Et ce qui restera sera peu de chose, presque rien.
  '2':
  - type: text
    content: Tel un oiseau fugitif, telle une nichée effarouchée,
  - type: text
    content: Telles seront les filles de Moab, au passage de l’Arnon.
  '3':
  - type: text
    content: Donne conseil, fais justice,
  - type: text
    content: Couvre-nous en plein midi de ton ombre comme de la nuit,
  - type: text
    content: Cache ceux que l’on poursuit,
  - type: text
    content: Ne trahis pas le fugitif!
  '4':
  - type: text
    content: Laisse séjourner chez toi les exilés de Moab,
  - type: text
    content: Sois pour eux un refuge contre le dévastateur!
  - type: text
    content: Car l’oppression cessera, la dévastation finira,
  - type: text
    content: Celui qui foule le pays disparaîtra.
  '5':
  - type: text
    content: Et le trône s’affermira par la clémence;
  - type: text
    content: 'Et l’on y verra siéger fidèlement, '
  - type: note
    content: És 9:6. Da 7:14, 27. Mi 4:7. Lu 1:33.
  - type: text
    content: dans la maison de David,
  - type: text
    content: Un juge ami du droit et zélé pour la justice.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Jé 48:29, 30.
  - type: text
    content: Nous entendons l’orgueil du superbe Moab,
  - type: text
    content: Sa fierté et sa hauteur, son arrogance et ses vains discours.
  '7':
  - type: text
    content: 'C’est pourquoi Moab '
  - type: note
    content: Jé 48:20.
  - type: text
    content: gémit sur Moab, tout gémit;
  - type: text
    content: Vous soupirez sur les ruines de Kir-Haréseth,
  - type: text
    content: Profondément abattus.
  '8':
  - type: text
    content: Car les campagnes de Hesbon languissent;
  - type: text
    content: Les maîtres des nations ont brisé les ceps de la vigne de Sibma,
  - type: text
    content: 'Qui s’étendaient jusqu’à Jaezer, qui erraient dans le désert:'
  - type: note
    content: Jé 48:32, 33.
  - type: text
    content: Les rameaux se prolongeaient, et allaient au-delà de la mer.
  '9':
  - type: text
    content: Aussi je pleure sur la vigne de Sibma, comme sur Jaezer;
  - type: text
    content: Je vous arrose de mes larmes, Hesbon, Élealé!
  - type: text
    content: Car sur votre récolte et sur votre moisson
  - type: text
    content: Est venu fondre un cri de guerre.
