document_id: GEN.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Agar
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. Ge 30:1-9. Job 4:8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Saraï, femme d’Abram, ne lui avait point donné d’enfants. Elle avait une servante égyptienne, nommée Agar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et Saraï dit à Abram: Voici, l’Éternel m’a rendue stérile; viens, je te prie, vers ma servante; peut-être aurai-je par elle des enfants. Abram écouta la voix de Saraï. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors Saraï, femme d’Abram, prit Agar, l’Égyptienne, sa servante, et la donna pour femme à Abram, son mari, après qu’Abram eut habité dix années dans le pays de Canaan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il alla vers Agar, et elle devint enceinte. Quand elle se vit enceinte, elle regarda sa maîtresse avec mépris. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et Saraï dit à Abram: L’outrage qui m’est fait retombe sur toi. J’ai mis ma servante dans ton sein; et, quand elle a vu qu’elle était enceinte, elle m’a regardée avec mépris. Que l’Éternel soit juge entre moi et toi! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Abram répondit à Saraï: Voici, ta servante est en ton pouvoir, agis à son égard comme tu le trouveras bon. Alors Saraï la maltraita; et Agar s’enfuit loin d’elle.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naissance d’Ismaël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-16: cf. Ge 21:9-21. Ps 10:14. Mi 7:7-9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’ange de l’Éternel la trouva près d’une source d’eau dans le désert, près de la source qui est sur le chemin de Schur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il dit: Agar, servante de Saraï, d’où viens-tu, et où vas-tu? Elle répondit: Je fuis loin de Saraï, ma maîtresse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L’ange de l’Éternel lui dit: Retourne vers ta maîtresse, et humilie-toi sous sa main. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L’ange de l’Éternel lui dit: Je multiplierai ta postérité, et elle sera si nombreuse qu’on ne pourra la compter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’ange de l’Éternel lui dit: Voici, tu es enceinte, et tu enfanteras un fils, à qui tu donneras le nom d’Ismaël; car l’Éternel t’a entendue dans ton affliction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il sera comme un âne sauvage; sa main sera contre tous, et la main de tous sera contre lui; et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 25:18
      metadata:
        usfm: GEN.25.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il habitera en face de tous ses frères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Elle appela Atta-El-roï le nom de l’Éternel qui lui avait parlé; car elle dit: Ai-je rien vu ici, après qu’il m’a vue? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'C’est pourquoi l’on a appelé ce '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 24:62
      metadata:
        usfm: GEN.24.62
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:11
      metadata:
        usfm: GEN.25.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'puits le puits de Lachaï-roï; il est entre Kadès et Bared. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 4:22
      metadata:
        usfm: GAL.4.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Agar enfanta un fils à Abram; et Abram donna le nom d’Ismaël au fils qu’Agar lui enfanta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Abram était âgé de quatre-vingt-six ans lorsqu’Agar enfanta Ismaël à Abram.
