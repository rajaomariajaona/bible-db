document_id: GEN.16,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Agar
  - type: heading
    content: 'V. 1-6: cf. Ge 30:1-9. Job 4:8.'
  - type: text
    content: 'Saraï, femme d’Abram, ne lui avait point donné d’enfants. Elle avait une servante égyptienne, nommée Agar. '
  '10':
  - type: text
    content: 'L’ange de l’Éternel lui dit: Je multiplierai ta postérité, et elle sera si nombreuse qu’on ne pourra la compter. '
  '11':
  - type: text
    content: 'L’ange de l’Éternel lui dit: Voici, tu es enceinte, et tu enfanteras un fils, à qui tu donneras le nom d’Ismaël; car l’Éternel t’a entendue dans ton affliction. '
  '12':
  - type: text
    content: 'Il sera comme un âne sauvage; sa main sera contre tous, et la main de tous sera contre lui; et '
  - type: note
    content: Ge 25:18.
  - type: text
    content: 'il habitera en face de tous ses frères. '
  '13':
  - type: text
    content: 'Elle appela Atta-El-roï le nom de l’Éternel qui lui avait parlé; car elle dit: Ai-je rien vu ici, après qu’il m’a vue? '
  '14':
  - type: text
    content: 'C’est pourquoi l’on a appelé ce '
  - type: note
    content: Ge 24:62; 25:11.
  - type: text
    content: 'puits le puits de Lachaï-roï; il est entre Kadès et Bared. '
  '15':
  - type: note
    content: Ga 4:22.
  - type: text
    content: 'Agar enfanta un fils à Abram; et Abram donna le nom d’Ismaël au fils qu’Agar lui enfanta. '
  '16':
  - type: text
    content: Abram était âgé de quatre-vingt-six ans lorsqu’Agar enfanta Ismaël à Abram.
  '2':
  - type: text
    content: 'Et Saraï dit à Abram: Voici, l’Éternel m’a rendue stérile; viens, je te prie, vers ma servante; peut-être aurai-je par elle des enfants. Abram écouta la voix de Saraï. '
  '3':
  - type: text
    content: 'Alors Saraï, femme d’Abram, prit Agar, l’Égyptienne, sa servante, et la donna pour femme à Abram, son mari, après qu’Abram eut habité dix années dans le pays de Canaan. '
  '4':
  - type: text
    content: 'Il alla vers Agar, et elle devint enceinte. Quand elle se vit enceinte, elle regarda sa maîtresse avec mépris. '
  '5':
  - type: text
    content: 'Et Saraï dit à Abram: L’outrage qui m’est fait retombe sur toi. J’ai mis ma servante dans ton sein; et, quand elle a vu qu’elle était enceinte, elle m’a regardée avec mépris. Que l’Éternel soit juge entre moi et toi! '
  '6':
  - type: text
    content: 'Abram répondit à Saraï: Voici, ta servante est en ton pouvoir, agis à son égard comme tu le trouveras bon. Alors Saraï la maltraita; et Agar s’enfuit loin d’elle.'
  - type: heading
    content: Naissance d’Ismaël
  - type: heading
    content: 'V. 7-16: cf. Ge 21:9-21. Ps 10:14. Mi 7:7-9.'
  '7':
  - type: text
    content: 'L’ange de l’Éternel la trouva près d’une source d’eau dans le désert, près de la source qui est sur le chemin de Schur. '
  '8':
  - type: text
    content: 'Il dit: Agar, servante de Saraï, d’où viens-tu, et où vas-tu? Elle répondit: Je fuis loin de Saraï, ma maîtresse. '
  '9':
  - type: text
    content: 'L’ange de l’Éternel lui dit: Retourne vers ta maîtresse, et humilie-toi sous sa main. '
