document_id: COL.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-4: cf. Col 2:20. Ép 2:4-6. (2 Co 4:18. Ga 2:20. Ph 3:18-21. 1 Jn 3:1-3.)'
  - type: text
    content: 'Si donc vous êtes ressuscités avec Christ, cherchez les choses d’en haut, '
  - type: note
    content: Ép 1:20.
  - type: text
    content: 'où Christ est assis à la droite de Dieu. '
  '10':
  - type: note
    content: Ro 6:4.
  - type: text
    content: 'et ayant revêtu l’homme nouveau, qui se renouvelle, dans la connaissance, '
  - type: note
    content: Ge 1:26; 5:1; 9:6. 1 Co 11:7.
  - type: text
    content: 'selon l’image de celui qui l’a créé. '
  '11':
  - type: text
    content: 'Il n’y a ici '
  - type: note
    content: Ga 3:28; 5:6; 6:15.
  - type: text
    content: 'ni Grec ni Juif, ni circoncis ni incirconcis, ni barbare ni Scythe, '
  - type: note
    content: 1 Co 7:21, 22; 12:13.
  - type: text
    content: 'ni esclave ni libre; mais Christ est tout et en tous. '
  '12':
  - type: note
    content: Ép 4:32; 6:11.
  - type: text
    content: 'Ainsi donc, '
  - type: note
    content: 1 Th 1:4.
  - type: text
    content: 'comme des élus de Dieu, saints et bien-aimés, revêtez-vous d’entrailles de miséricorde, de bonté, d’humilité, de douceur, de patience. '
  '13':
  - type: text
    content: 'Supportez-vous les uns les autres, et, si l’un a sujet de se plaindre de l’autre, '
  - type: note
    content: Mt 6:14. Mc 11:25. Ép 4:32.
  - type: text
    content: 'pardonnez-vous réciproquement. De même que Christ vous a pardonné, pardonnez-vous aussi. '
  '14':
  - type: note
    content: Jn 13:34; 15:12. Ép 5:2. 1 Th 4:9. 1 Jn 3:23; 4:21.
  - type: text
    content: 'Mais par-dessus toutes ces choses revêtez-vous de la charité, '
  - type: note
    content: Ép 4:3. Col 2:2.
  - type: text
    content: 'qui est le lien de la perfection. '
  '15':
  - type: text
    content: 'Et que la paix de Christ, à laquelle vous avez été appelés pour former un seul corps, règne dans vos cœurs. Et soyez reconnaissants. '
  '16':
  - type: text
    content: 'Que la parole de Christ habite parmi vous abondamment; '
  - type: note
    content: Ép 5:19.
  - type: text
    content: 'instruisez-vous et exhortez-vous les uns les autres en toute sagesse, par des psaumes, par des hymnes, par des cantiques spirituels, chantant à Dieu dans vos cœurs sous l’inspiration de la grâce. '
  '17':
  - type: text
    content: 'Et quoi que vous fassiez, en parole ou en œuvre, faites tout au nom du Seigneur Jésus, '
  - type: note
    content: Ép 5:20. 1 Th 5:18.
  - type: text
    content: en rendant par lui des actions de grâces à Dieu le Père.
  - type: heading
    content: Devoirs domestiques
  - type: heading
    content: '3 v. 18 à 4 v. 1: cf. Ép 5:22-33; 6:1-9. 1 Pi 3:1-7; 2:18, etc. Tit 2:9, 10. 1 Ti 6:1, 2.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ge 3:16. 1 Co 14:34. Ép 5:22. Tit 2:5. 1 Pi 3:1.
  - type: text
    content: 'Femmes, soyez soumises à vos maris, comme il convient dans le Seigneur. '
  '19':
  - type: note
    content: Ép 5:25.
  - type: text
    content: 'Maris, aimez vos femmes, et ne vous aigrissez pas contre elles. '
  '2':
  - type: text
    content: 'Affectionnez-vous aux choses d’en haut, et non à celles qui sont sur la terre. '
  '20':
  - type: note
    content: Ép 6:1.
  - type: text
    content: 'Enfants, obéissez en toutes choses à vos parents, car cela est agréable dans le Seigneur. '
  '21':
  - type: text
    content: 'Pères, n’irritez pas vos enfants, de peur qu’ils ne se découragent. '
  '22':
  - type: note
    content: Ép 6:5. 1 Ti 6:1. Tit 2:9. 1 Pi 2:18.
  - type: text
    content: 'Serviteurs, obéissez en toutes choses à vos maîtres selon la chair, non pas seulement sous leurs yeux, comme pour plaire aux hommes, mais avec simplicité de cœur, dans la crainte du Seigneur. '
  '23':
  - type: text
    content: 'Tout ce que vous faites, faites-le de bon cœur, comme pour le Seigneur et non pour des hommes, '
  '24':
  - type: text
    content: 'sachant que vous recevrez du Seigneur l’héritage pour récompense. Servez Christ, le Seigneur. '
  '25':
  - type: text
    content: Car celui qui agit injustement recevra selon son injustice, et il n’y a point d’acception de personnes.
  '3':
  - type: note
    content: Ro 6:2.
  - type: text
    content: 'Car vous êtes morts, et votre vie '
  - type: note
    content: Ro 8:24. 2 Co 5:7.
  - type: text
    content: 'est cachée avec Christ en Dieu. '
  '4':
  - type: note
    content: Ph 3:21. 1 Jn 3:2.
  - type: text
    content: Quand Christ, votre vie, paraîtra, alors vous paraîtrez aussi avec lui dans la gloire.
  - type: heading
    content: Exhortation à la sainteté, à la charité, à la piété
  - type: heading
    content: 'V. 5-17: cf. Ép 5:3-8; 4:17-31. 2 Co 5:17. (Ép 4:1, 2, 32; 5:1, 2.) (Ép 4:3, 4; 5:19, 20.)'
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ép 4:22; 5:5.
  - type: text
    content: 'Faites donc mourir '
  - type: note
    content: Ro 7:5, 23.
  - type: text
    content: 'les membres qui sont sur la terre, l’impudicité, l’impureté, '
  - type: note
    content: 1 Th 4:5.
  - type: text
    content: 'les passions, les mauvais désirs, et la cupidité, '
  - type: note
    content: Ép 5:5.
  - type: text
    content: 'qui est une idolâtrie. '
  '6':
  - type: note
    content: 1 Co 6:10. Ga 5:19. Ép 5:5. Ap 22:15.
  - type: text
    content: 'C’est à cause de ces choses que la colère de Dieu vient sur les fils de la rébellion, '
  '7':
  - type: note
    content: 1 Co 6:11. Ép 2:1. Tit 3:3.
  - type: text
    content: 'parmi lesquels vous marchiez autrefois, lorsque vous viviez dans ces péchés. '
  '8':
  - type: note
    content: Ép 4:22. Hé 12:1. Ja 1:21. 1 Pi 2:1.
  - type: text
    content: 'Mais maintenant, renoncez à toutes ces choses, à la colère, à l’animosité, à la méchanceté, à la calomnie, aux paroles déshonnêtes qui pourraient sortir de votre bouche. '
  '9':
  - type: note
    content: Ép 4:25.
  - type: text
    content: 'Ne mentez pas les uns aux autres, vous étant dépouillés du vieil homme et de ses œuvres, '
