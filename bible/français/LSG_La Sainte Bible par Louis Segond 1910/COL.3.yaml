document_id: COL.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-4: cf. Col 2:20. Ép 2:4-6. (2 Co 4:18. Ga 2:20. Ph 3:18-21. 1 Jn 3:1-3.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si donc vous êtes ressuscités avec Christ, cherchez les choses d’en haut, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 1:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'où Christ est assis à la droite de Dieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 6:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et ayant revêtu l’homme nouveau, qui se renouvelle, dans la connaissance, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:26
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 11:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'selon l’image de celui qui l’a créé. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il n’y a ici '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 3:28
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ni Grec ni Juif, ni circoncis ni incirconcis, ni barbare ni Scythe, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 7:21
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ni esclave ni libre; mais Christ est tout et en tous. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 4:32
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ainsi donc, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 1:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme des élus de Dieu, saints et bien-aimés, revêtez-vous d’entrailles de miséricorde, de bonté, d’humilité, de douceur, de patience. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Supportez-vous les uns les autres, et, si l’un a sujet de se plaindre de l’autre, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 6:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 11:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 4:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pardonnez-vous réciproquement. De même que Christ vous a pardonné, pardonnez-vous aussi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 13:34
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 4:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 3:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais par-dessus toutes ces choses revêtez-vous de la charité, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 4:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 2:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui est le lien de la perfection. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et que la paix de Christ, à laquelle vous avez été appelés pour former un seul corps, règne dans vos cœurs. Et soyez reconnaissants. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que la parole de Christ habite parmi vous abondamment; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'instruisez-vous et exhortez-vous les uns les autres en toute sagesse, par des psaumes, par des hymnes, par des cantiques spirituels, chantant à Dieu dans vos cœurs sous l’inspiration de la grâce. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et quoi que vous fassiez, en parole ou en œuvre, faites tout au nom du Seigneur Jésus, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 5:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: en rendant par lui des actions de grâces à Dieu le Père.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Devoirs domestiques
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: '3 v. 18 à 4 v. 1: cf. Ép 5:22-33; 6:1-9. 1 Pi 3:1-7; 2:18, etc. Tit 2:9, 10. 1 Ti 6:1, 2.'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 3:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 14:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 2:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 3:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Femmes, soyez soumises à vos maris, comme il convient dans le Seigneur. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Maris, aimez vos femmes, et ne vous aigrissez pas contre elles. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Affectionnez-vous aux choses d’en haut, et non à celles qui sont sur la terre. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 6:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Enfants, obéissez en toutes choses à vos parents, car cela est agréable dans le Seigneur. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pères, n’irritez pas vos enfants, de peur qu’ils ne se découragent. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 6:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 6:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 2:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Serviteurs, obéissez en toutes choses à vos maîtres selon la chair, non pas seulement sous leurs yeux, comme pour plaire aux hommes, mais avec simplicité de cœur, dans la crainte du Seigneur. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout ce que vous faites, faites-le de bon cœur, comme pour le Seigneur et non pour des hommes, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sachant que vous recevrez du Seigneur l’héritage pour récompense. Servez Christ, le Seigneur. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car celui qui agit injustement recevra selon son injustice, et il n’y a point d’acception de personnes.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 6:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car vous êtes morts, et votre vie '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 8:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 5:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'est cachée avec Christ en Dieu. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 3:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 3:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Quand Christ, votre vie, paraîtra, alors vous paraîtrez aussi avec lui dans la gloire.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Exhortation à la sainteté, à la charité, à la piété
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-17: cf. Ép 5:3-8; 4:17-31. 2 Co 5:17. (Ép 4:1, 2, 32; 5:1, 2.) (Ép 4:3, 4; 5:19, 20.)'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 4:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Faites donc mourir '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 7:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'les membres qui sont sur la terre, l’impudicité, l’impureté, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 4:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'les passions, les mauvais désirs, et la cupidité, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui est une idolâtrie. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 6:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 5:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 22:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'C’est à cause de ces choses que la colère de Dieu vient sur les fils de la rébellion, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 6:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 2:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 3:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'parmi lesquels vous marchiez autrefois, lorsque vous viviez dans ces péchés. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 4:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 1:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais maintenant, renoncez à toutes ces choses, à la colère, à l’animosité, à la méchanceté, à la calomnie, aux paroles déshonnêtes qui pourraient sortir de votre bouche. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 4:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ne mentez pas les uns aux autres, vous étant dépouillés du vieil homme et de ses œuvres, '
