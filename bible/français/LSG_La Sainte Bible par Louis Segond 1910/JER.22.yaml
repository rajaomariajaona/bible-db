document_id: JER.22,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre la maison royale de Juda
  - type: heading
    content: 'V. 1-9: cf. Jé 21:11-14. Da 4:27. 2 Ch 7:17-22.'
  - type: text
    content: 'Ainsi parle l’Éternel: Descends dans la maison du roi de Juda, et là prononce cette parole. '
  '10':
  - type: text
    content: Ne pleurez point celui qui est mort,
  - type: text
    content: Et ne vous lamentez pas sur lui;
  - type: text
    content: Pleurez, pleurez celui qui s’en va,
  - type: text
    content: Car il ne reviendra plus,
  - type: text
    content: Il ne reverra plus le pays de sa naissance.
  '11':
  - type: text
    content: Car ainsi parle l’Éternel sur Schallum, fils de Josias, roi de Juda,
  - type: text
    content: Qui régnait à la place de Josias, son père,
  - type: text
    content: 'Et qui est sorti de ce lieu:'
  - type: text
    content: Il n’y reviendra plus;
  '12':
  - type: text
    content: Mais il mourra dans le lieu où on l’emmène captif,
  - type: text
    content: Et il ne verra plus ce pays.
  - type: heading
    content: 'V. 13-19: cf. (2 Ch 36:4-8. 2 R 23:34, etc.; 24:1-7.) Jé 36:27-32.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Lé 19:13. De 24:14, 15. Ha 2:9.
  - type: text
    content: Malheur à celui qui bâtit sa maison par l’injustice,
  - type: text
    content: Et ses chambres par l’iniquité;
  - type: text
    content: Qui fait travailler son prochain sans le payer,
  - type: text
    content: Sans lui donner son salaire;
  '14':
  - type: text
    content: 'Qui dit: Je me bâtirai une maison vaste,'
  - type: text
    content: Et des chambres spacieuses;
  - type: text
    content: Et qui s’y fait percer des fenêtres,
  - type: text
    content: La lambrisse de cèdre,
  - type: text
    content: Et la peint en couleur rouge!
  '15':
  - type: text
    content: Est-ce que tu règnes, parce que tu as de la passion pour le cèdre?
  - type: text
    content: Ton père ne mangeait-il pas, ne buvait-il pas?
  - type: text
    content: Mais il pratiquait la justice et l’équité,
  - type: text
    content: Et il fut heureux;
  '16':
  - type: text
    content: Il jugeait la cause du pauvre et de l’indigent,
  - type: text
    content: Et il fut heureux.
  - type: text
    content: N’est-ce pas là me connaître? Dit l’Éternel.
  '17':
  - type: text
    content: Mais tu n’as des yeux et un cœur
  - type: text
    content: Que pour te livrer à la cupidité,
  - type: text
    content: Pour répandre le sang innocent,
  - type: text
    content: Et pour exercer l’oppression et la violence.
  '18':
  - type: text
    content: 'C’est pourquoi ainsi parle l’Éternel sur Jojakim, fils de Josias, roi de Juda:'
  - type: note
    content: Jé 16:4, 5, 6.
  - type: text
    content: 'On ne le pleurera pas, en disant:'
  - type: text
    content: Hélas, mon frère! Hélas, ma sœur!
  - type: text
    content: 'On ne le pleurera pas, en disant:'
  - type: text
    content: Hélas, seigneur! Hélas, sa majesté!
  '19':
  - type: text
    content: Il aura la sépulture d’un âne,
  - type: text
    content: 'Il sera '
  - type: note
    content: Jé 15:3.
  - type: text
    content: 'traîné et '
  - type: note
    content: Jé 36:30.
  - type: text
    content: jeté hors des portes de Jérusalem.
  - type: heading
    content: 'V. 20-30: cf. (2 R 24:8-16; 25:27-30.)'
  '2':
  - type: text
    content: 'Tu diras: Écoute la parole de l’Éternel, roi de Juda, qui es assis sur le trône de David, toi, tes serviteurs, et ton peuple, qui entrez par ces portes! '
  '20':
  - type: text
    content: Monte sur le Liban, et crie!
  - type: text
    content: Élève ta voix sur le Basan!
  - type: text
    content: Crie du haut d’Abarim!
  - type: text
    content: Car tous ceux qui t’aimaient sont brisés.
  '21':
  - type: text
    content: Je t’ai parlé dans le temps de ta prospérité;
  - type: text
    content: 'Tu disais: '
  - type: note
    content: Jé 5:23; 7:23-28; 11:7, 8; 13:10, 11; 16:12; 17:23; 18:12; 19:15.
  - type: text
    content: Je n’écouterai pas.
  - type: text
    content: C’est ainsi que tu as agi dès ta jeunesse;
  - type: text
    content: Tu n’as pas écouté ma voix.
  '22':
  - type: text
    content: Tous tes pasteurs seront la pâture du vent,
  - type: text
    content: Et ceux qui t’aiment iront en captivité;
  - type: text
    content: C’est alors que tu seras dans la honte, dans la confusion,
  - type: text
    content: A cause de toute ta méchanceté.
  '23':
  - type: text
    content: Toi qui habites sur le Liban,
  - type: text
    content: Qui as ton nid dans les cèdres,
  - type: text
    content: Combien tu gémiras quand les douleurs t’atteindront,
  - type: text
    content: Douleurs semblables à celles d’une femme en travail!
  '24':
  - type: text
    content: Je suis vivant! Dit l’Éternel,
  - type: text
    content: Quand Jeconia, fils de Jojakim, roi de Juda, serait
  - type: text
    content: Un anneau à ma main droite,
  - type: text
    content: Je t’arracherais de là.
  '25':
  - type: text
    content: Je te livrerai entre les mains de ceux qui en veulent à ta vie,
  - type: text
    content: Entre les mains de ceux devant qui tu trembles,
  - type: text
    content: Entre les mains de Nebucadnetsar, roi de Babylone,
  - type: text
    content: Entre les mains des Chaldéens.
  '26':
  - type: text
    content: Je te jetterai, toi et ta mère qui t’a enfanté,
  - type: text
    content: Dans un autre pays où vous n’êtes pas nés,
  - type: text
    content: Et là vous mourrez;
  '27':
  - type: text
    content: Mais dans le pays où ils auront le désir de retourner,
  - type: text
    content: Ils ne retourneront pas.
  '28':
  - type: text
    content: Est-il donc un vase méprisé, brisé, ce Jeconia?
  - type: text
    content: Est-il un objet auquel on n’attache aucun prix?
  - type: text
    content: Pourquoi sont-ils jetés, lui et sa postérité,
  - type: text
    content: Lancés dans un pays qu’ils ne connaissent pas?
  '29':
  - type: text
    content: Terre, terre, terre,
  - type: text
    content: Écoute la parole de l’Éternel!
  '3':
  - type: text
    content: 'Ainsi parle l’Éternel: '
  - type: note
    content: Jé 21:12.
  - type: text
    content: 'Pratiquez la justice et l’équité; délivrez l’opprimé des mains de l’oppresseur; ne maltraitez pas '
  - type: note
    content: Jé 7:6.
  - type: text
    content: 'l’étranger, l’orphelin et la veuve; n’usez pas de violence, et ne répandez point de sang innocent dans ce lieu. '
  '30':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Inscrivez cet homme comme privé d’enfants,
  - type: text
    content: Comme un homme dont les jours ne seront pas prospères;
  - type: text
    content: Car nul de ses descendants ne réussira
  - type: text
    content: A s’asseoir sur le trône de David
  - type: text
    content: Et à régner sur Juda.
  '4':
  - type: text
    content: 'Car si vous agissez selon cette parole, '
  - type: note
    content: Jé 17:25.
  - type: text
    content: 'les rois assis sur le trône de David entreront par les portes de cette maison, montés sur des chars et sur des chevaux, eux, leurs serviteurs et leur peuple. '
  '5':
  - type: text
    content: Mais si vous n’écoutez pas ces paroles, je le jure par moi-même, dit l’Éternel, cette maison deviendra une ruine.
  '6':
  - type: text
    content: 'Car ainsi parle l’Éternel sur la maison du roi de Juda:'
  - type: text
    content: Tu es pour moi comme Galaad, comme le sommet du Liban;
  - type: text
    content: Mais certes, je ferai de toi un désert,
  - type: text
    content: Une ville sans habitants.
  '7':
  - type: text
    content: 'Je prépare contre toi des '
  - type: note
    content: Jé 15:6.
  - type: text
    content: destructeurs,
  - type: text
    content: Chacun avec ses armes;
  - type: text
    content: Ils abattront tes plus beaux cèdres,
  - type: text
    content: Et les jetteront au feu.
  '8':
  - type: text
    content: Des nations nombreuses passeront près de cette ville,
  - type: text
    content: 'Et elles se diront l’une à l’autre:'
  - type: note
    content: De 29:24. 1 R 9:8.
  - type: text
    content: Pourquoi l’Éternel a-t-il ainsi traité cette grande ville?
  '9':
  - type: text
    content: 'Et l’on répondra: Parce qu’ils ont abandonné'
  - type: text
    content: L’alliance de l’Éternel, leur Dieu,
  - type: text
    content: Parce qu’ils se sont prosternés devant d’autres dieux et les ont servis.
  - type: heading
    content: 'V. 10-12: cf. 2 R 23:30-34. 2 Ch 36:1-4.'
