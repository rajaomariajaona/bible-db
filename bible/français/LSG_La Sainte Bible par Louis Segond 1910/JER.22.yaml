document_id: JER.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre la maison royale de Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. Jé 21:11-14. Da 4:27. 2 Ch 7:17-22.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ainsi parle l’Éternel: Descends dans la maison du roi de Juda, et là prononce cette parole. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tu diras: Écoute la parole de l’Éternel, roi de Juda, qui es assis sur le trône de David, toi, tes serviteurs, et ton peuple, qui entrez par ces portes! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ainsi parle l’Éternel: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 21:12
      metadata:
        usfm: JER.21.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pratiquez la justice et l’équité; délivrez l’opprimé des mains de l’oppresseur; ne maltraitez pas '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:6
      metadata:
        usfm: JER.7.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’étranger, l’orphelin et la veuve; n’usez pas de violence, et ne répandez point de sang innocent dans ce lieu. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Car si vous agissez selon cette parole, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 17:25
      metadata:
        usfm: JER.17.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les rois assis sur le trône de David entreront par les portes de cette maison, montés sur des chars et sur des chevaux, eux, leurs serviteurs et leur peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mais si vous n’écoutez pas ces paroles, je le jure par moi-même, dit l’Éternel, cette maison deviendra une ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Car ainsi parle l’Éternel sur la maison du roi de Juda:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es pour moi comme Galaad, comme le sommet du Liban;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais certes, je ferai de toi un désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une ville sans habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je prépare contre toi des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 15:6
      metadata:
        usfm: JER.15.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: destructeurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacun avec ses armes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils abattront tes plus beaux cèdres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les jetteront au feu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Des nations nombreuses passeront près de cette ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et elles se diront l’une à l’autre:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 29:24
      metadata:
        usfm: DEU.29.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 9:8
      metadata:
        usfm: 1KI.9.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pourquoi l’Éternel a-t-il ainsi traité cette grande ville?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et l’on répondra: Parce qu’ils ont abandonné'
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’alliance de l’Éternel, leur Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’ils se sont prosternés devant d’autres dieux et les ont servis.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-12: cf. 2 R 23:30-34. 2 Ch 36:1-4.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ne pleurez point celui qui est mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne vous lamentez pas sur lui;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pleurez, pleurez celui qui s’en va,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il ne reviendra plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne reverra plus le pays de sa naissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Car ainsi parle l’Éternel sur Schallum, fils de Josias, roi de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui régnait à la place de Josias, son père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et qui est sorti de ce lieu:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y reviendra plus;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mais il mourra dans le lieu où on l’emmène captif,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il ne verra plus ce pays.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-19: cf. (2 Ch 36:4-8. 2 R 23:34, etc.; 24:1-7.) Jé 36:27-32.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:13
      metadata:
        usfm: LEV.19.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 24:14
      metadata:
        usfm: DEU.24.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: DEU.24.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ha 2:9
      metadata:
        usfm: HAB.2.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Malheur à celui qui bâtit sa maison par l’injustice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses chambres par l’iniquité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui fait travailler son prochain sans le payer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans lui donner son salaire;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Qui dit: Je me bâtirai une maison vaste,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et des chambres spacieuses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui s’y fait percer des fenêtres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La lambrisse de cèdre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la peint en couleur rouge!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Est-ce que tu règnes, parce que tu as de la passion pour le cèdre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton père ne mangeait-il pas, ne buvait-il pas?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il pratiquait la justice et l’équité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il fut heureux;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il jugeait la cause du pauvre et de l’indigent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il fut heureux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’est-ce pas là me connaître? Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mais tu n’as des yeux et un cœur
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que pour te livrer à la cupidité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour répandre le sang innocent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pour exercer l’oppression et la violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'C’est pourquoi ainsi parle l’Éternel sur Jojakim, fils de Josias, roi de Juda:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 16:4
      metadata:
        usfm: JER.16.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: JER.16.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: JER.16.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'On ne le pleurera pas, en disant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hélas, mon frère! Hélas, ma sœur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'On ne le pleurera pas, en disant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hélas, seigneur! Hélas, sa majesté!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il aura la sépulture d’un âne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il sera '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 15:3
      metadata:
        usfm: JER.15.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'traîné et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 36:30
      metadata:
        usfm: JER.36.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: jeté hors des portes de Jérusalem.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-30: cf. (2 R 24:8-16; 25:27-30.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Monte sur le Liban, et crie!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Élève ta voix sur le Basan!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Crie du haut d’Abarim!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tous ceux qui t’aimaient sont brisés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je t’ai parlé dans le temps de ta prospérité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu disais: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 5:23
      metadata:
        usfm: JER.5.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:23-28
      metadata:
        usfm: JER.7.23+JER.7.24+JER.7.25+JER.7.26+JER.7.27+JER.7.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:7
      metadata:
        usfm: JER.11.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: JER.11.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:10
      metadata:
        usfm: JER.13.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: JER.13.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:12
      metadata:
        usfm: JER.16.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:23
      metadata:
        usfm: JER.17.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:12
      metadata:
        usfm: JER.18.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:15
      metadata:
        usfm: JER.19.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je n’écouterai pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est ainsi que tu as agi dès ta jeunesse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu n’as pas écouté ma voix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tous tes pasteurs seront la pâture du vent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ceux qui t’aiment iront en captivité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est alors que tu seras dans la honte, dans la confusion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de toute ta méchanceté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Toi qui habites sur le Liban,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui as ton nid dans les cèdres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Combien tu gémiras quand les douleurs t’atteindront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Douleurs semblables à celles d’une femme en travail!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je suis vivant! Dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand Jeconia, fils de Jojakim, roi de Juda, serait
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un anneau à ma main droite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’arracherais de là.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Je te livrerai entre les mains de ceux qui en veulent à ta vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Entre les mains de ceux devant qui tu trembles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Entre les mains de Nebucadnetsar, roi de Babylone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Entre les mains des Chaldéens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Je te jetterai, toi et ta mère qui t’a enfanté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans un autre pays où vous n’êtes pas nés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et là vous mourrez;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mais dans le pays où ils auront le désir de retourner,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne retourneront pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Est-il donc un vase méprisé, brisé, ce Jeconia?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-il un objet auquel on n’attache aucun prix?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi sont-ils jetés, lui et sa postérité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lancés dans un pays qu’ils ne connaissent pas?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Terre, terre, terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Écoute la parole de l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inscrivez cet homme comme privé d’enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme un homme dont les jours ne seront pas prospères;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car nul de ses descendants ne réussira
- type: usfm
  marker: q1
  children:
  - type: text
    text: A s’asseoir sur le trône de David
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et à régner sur Juda.
