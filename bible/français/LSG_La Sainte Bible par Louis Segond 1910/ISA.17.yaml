document_id: ISA.17,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie contre Damas et Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. (Am 1:3-5. Jé 49:23-27.) És 7:1-9; 8:1-4. (2 R 16:9; 17:1-6.) 2 Ch 30:1-11, 18.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Oracle sur Damas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, Damas ne sera plus une ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle ne sera qu’un monceau de ruines.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Car tu as oublié le Dieu de ton salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne t’es pas souvenu du rocher de ton refuge.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi tu as fait des plantations d’agrément,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as planté des ceps étrangers;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Lorsque tu les plantas, tu les entouras d’une haie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et bientôt tu les fis venir en fleurs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais la récolte a fui, au moment de la jouissance:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la douleur est sans remède.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-14: cf. (És 30:27-33; 37:33-38.) Ps 93:3, 4.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Oh! Quelle rumeur de peuples nombreux!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils mugissent comme mugit la mer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quel tumulte de nations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles grondent comme grondent les eaux puissantes.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Les nations grondent comme grondent les grandes eaux…
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les menace, et elles fuient au loin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Chassées '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 21:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 1:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 35:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 83:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 13:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: comme la balle des montagnes au souffle du vent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme la poussière par un tourbillon.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Quand vient le soir, voici, c’est une ruine soudaine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant le matin, ils ne sont plus!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà le partage de ceux qui nous dépouillent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sort de ceux qui nous pillent.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Les villes d’Aroër sont abandonnées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles sont livrées aux troupeaux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils s’y couchent, et personne ne les effraie.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: C’en est fait de la forteresse d’Éphraïm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et du royaume de Damas, et du reste de la Syrie:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il en sera comme de la gloire des enfants d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel des armées.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: En ce jour, la gloire de Jacob sera affaiblie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la graisse de sa chair s’évanouira.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Il en sera comme quand le moissonneur récolte les blés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que son bras coupe les épis;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme quand on ramasse les épis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans la vallée de Rephaïm.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Il en restera un grappillage, comme quand on secoue l’olivier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deux, trois olives, au haut de la cime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quatre, cinq, dans ses branches à fruits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel, le Dieu d’Israël.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: En ce jour, l’homme regardera vers son créateur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses yeux se tourneront vers le Saint d’Israël;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Il ne regardera plus vers les autels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ouvrage de ses mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il ne contemplera plus ce que ses doigts ont fabriqué,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les idoles d’Astarté et les statues du soleil.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: En ce jour, ses villes fortes seront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme des débris dans la forêt et sur la cime des montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Abandonnés devant les enfants d’Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ce sera un désert.
