document_id: ISA.17,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie contre Damas et Israël
  - type: heading
    content: 'V. 1-11: cf. (Am 1:3-5. Jé 49:23-27.) És 7:1-9; 8:1-4. (2 R 16:9; 17:1-6.) 2 Ch 30:1-11, 18.'
  - type: text
    content: Oracle sur Damas.
  - type: text
    content: Voici, Damas ne sera plus une ville,
  - type: text
    content: Elle ne sera qu’un monceau de ruines.
  '10':
  - type: text
    content: Car tu as oublié le Dieu de ton salut,
  - type: text
    content: Tu ne t’es pas souvenu du rocher de ton refuge.
  - type: text
    content: Aussi tu as fait des plantations d’agrément,
  - type: text
    content: Tu as planté des ceps étrangers;
  '11':
  - type: text
    content: Lorsque tu les plantas, tu les entouras d’une haie,
  - type: text
    content: Et bientôt tu les fis venir en fleurs.
  - type: text
    content: 'Mais la récolte a fui, au moment de la jouissance:'
  - type: text
    content: Et la douleur est sans remède.
  - type: heading
    content: 'V. 12-14: cf. (És 30:27-33; 37:33-38.) Ps 93:3, 4.'
  '12':
  - type: text
    content: Oh! Quelle rumeur de peuples nombreux!
  - type: text
    content: Ils mugissent comme mugit la mer.
  - type: text
    content: Quel tumulte de nations!
  - type: text
    content: Elles grondent comme grondent les eaux puissantes.
  '13':
  - type: text
    content: Les nations grondent comme grondent les grandes eaux…
  - type: text
    content: Il les menace, et elles fuient au loin,
  - type: text
    content: 'Chassées '
  - type: note
    content: Job 21:18. Ps 1:4; 35:5; 83:14. Os 13:3.
  - type: text
    content: comme la balle des montagnes au souffle du vent,
  - type: text
    content: Comme la poussière par un tourbillon.
  '14':
  - type: text
    content: Quand vient le soir, voici, c’est une ruine soudaine;
  - type: text
    content: Avant le matin, ils ne sont plus!
  - type: text
    content: Voilà le partage de ceux qui nous dépouillent,
  - type: text
    content: Le sort de ceux qui nous pillent.
  '2':
  - type: text
    content: Les villes d’Aroër sont abandonnées,
  - type: text
    content: Elles sont livrées aux troupeaux;
  - type: text
    content: Ils s’y couchent, et personne ne les effraie.
  '3':
  - type: text
    content: C’en est fait de la forteresse d’Éphraïm,
  - type: text
    content: 'Et du royaume de Damas, et du reste de la Syrie:'
  - type: text
    content: Il en sera comme de la gloire des enfants d’Israël,
  - type: text
    content: Dit l’Éternel des armées.
  '4':
  - type: text
    content: En ce jour, la gloire de Jacob sera affaiblie,
  - type: text
    content: Et la graisse de sa chair s’évanouira.
  '5':
  - type: text
    content: Il en sera comme quand le moissonneur récolte les blés,
  - type: text
    content: Et que son bras coupe les épis;
  - type: text
    content: Comme quand on ramasse les épis,
  - type: text
    content: Dans la vallée de Rephaïm.
  '6':
  - type: text
    content: Il en restera un grappillage, comme quand on secoue l’olivier,
  - type: text
    content: Deux, trois olives, au haut de la cime,
  - type: text
    content: Quatre, cinq, dans ses branches à fruits,
  - type: text
    content: Dit l’Éternel, le Dieu d’Israël.
  '7':
  - type: text
    content: En ce jour, l’homme regardera vers son créateur,
  - type: text
    content: Et ses yeux se tourneront vers le Saint d’Israël;
  '8':
  - type: text
    content: Il ne regardera plus vers les autels,
  - type: text
    content: Ouvrage de ses mains,
  - type: text
    content: Et il ne contemplera plus ce que ses doigts ont fabriqué,
  - type: text
    content: Les idoles d’Astarté et les statues du soleil.
  '9':
  - type: text
    content: En ce jour, ses villes fortes seront
  - type: text
    content: Comme des débris dans la forêt et sur la cime des montagnes,
  - type: text
    content: 'Abandonnés devant les enfants d’Israël:'
  - type: text
    content: Et ce sera un désert.
