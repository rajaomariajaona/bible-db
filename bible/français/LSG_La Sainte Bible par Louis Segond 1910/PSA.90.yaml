document_id: PSA.90
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: LIVRE QUATRIÈME
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: (Ap 7:12; 15:3, 4.)
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: No 14:22-38. Ec 1:4. Ja 4:14.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Prière de Moïse, homme de Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seigneur! Tu as été pour nous un refuge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De génération en génération.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Avant que les montagnes fussent nées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que tu eusses créé la terre et le monde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: D’éternité en éternité tu es Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu fais rentrer les hommes dans la poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et tu dis: Fils de l’homme, retournez!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car mille ans sont, à tes yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme le jour d’hier, quand il n’est plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et comme une veille de la nuit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu les emportes, semblables à un songe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Qui, le matin, passe comme l’herbe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Elle fleurit le matin, et elle passe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: On la coupe le soir, et elle sèche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nous sommes consumés par ta colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ta fureur nous épouvante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tu mets devant toi nos iniquités,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et à la lumière de ta face nos fautes cachées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tous nos jours disparaissent par ton courroux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous voyons nos années s’évanouir comme un son.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les jours de nos années s’élèvent à soixante-dix ans,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et, pour les plus robustes, à quatre-vingts ans;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’orgueil qu’ils en tirent n’est que peine et misère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il passe vite, et nous nous envolons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Qui prend garde à la force de ta colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et à ton courroux, selon la crainte qui t’est due?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Enseigne-nous à bien compter nos jours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que nous appliquions notre cœur à la sagesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Reviens, Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusques à quand?…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aie pitié de tes serviteurs!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Rassasie-nous chaque matin de ta bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nous serons toute notre vie dans la joie et l’allégresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Réjouis-nous autant de jours que tu nous as humiliés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Autant d’années que nous avons vu le malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Que ton œuvre se manifeste à tes serviteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ta gloire sur leurs enfants!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Que la grâce de l’Éternel, notre Dieu, soit sur nous!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Affermis l’ouvrage de nos mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, affermis l’ouvrage de nos mains!
