document_id: PSA.90,93
type_code: fra
verses:
  '1':
  - type: heading
    content: LIVRE QUATRIÈME
  - type: heading
    content: (Ap 7:12; 15:3, 4.)
  - type: heading
    content: No 14:22-38. Ec 1:4. Ja 4:14.
  - type: text
    content: Prière de Moïse, homme de Dieu.
  - type: text
    content: Seigneur! Tu as été pour nous un refuge,
  - type: text
    content: De génération en génération.
  '10':
  - type: text
    content: Les jours de nos années s’élèvent à soixante-dix ans,
  - type: text
    content: Et, pour les plus robustes, à quatre-vingts ans;
  - type: text
    content: Et l’orgueil qu’ils en tirent n’est que peine et misère,
  - type: text
    content: Car il passe vite, et nous nous envolons.
  '11':
  - type: text
    content: Qui prend garde à la force de ta colère,
  - type: text
    content: Et à ton courroux, selon la crainte qui t’est due?
  '12':
  - type: text
    content: Enseigne-nous à bien compter nos jours,
  - type: text
    content: Afin que nous appliquions notre cœur à la sagesse.
  '13':
  - type: text
    content: Reviens, Éternel!
  - type: text
    content: Jusques à quand?…
  - type: text
    content: Aie pitié de tes serviteurs!
  '14':
  - type: text
    content: Rassasie-nous chaque matin de ta bonté,
  - type: text
    content: Et nous serons toute notre vie dans la joie et l’allégresse.
  '15':
  - type: text
    content: Réjouis-nous autant de jours que tu nous as humiliés,
  - type: text
    content: Autant d’années que nous avons vu le malheur.
  '16':
  - type: text
    content: Que ton œuvre se manifeste à tes serviteurs,
  - type: text
    content: Et ta gloire sur leurs enfants!
  '17':
  - type: text
    content: Que la grâce de l’Éternel, notre Dieu, soit sur nous!
  - type: text
    content: Affermis l’ouvrage de nos mains,
  - type: text
    content: Oui, affermis l’ouvrage de nos mains!
  '2':
  - type: text
    content: Avant que les montagnes fussent nées,
  - type: text
    content: Et que tu eusses créé la terre et le monde,
  - type: text
    content: D’éternité en éternité tu es Dieu.
  '3':
  - type: text
    content: Tu fais rentrer les hommes dans la poussière,
  - type: text
    content: 'Et tu dis: Fils de l’homme, retournez!'
  '4':
  - type: text
    content: Car mille ans sont, à tes yeux,
  - type: text
    content: Comme le jour d’hier, quand il n’est plus,
  - type: text
    content: Et comme une veille de la nuit.
  '5':
  - type: text
    content: Tu les emportes, semblables à un songe,
  - type: text
    content: 'Qui, le matin, passe comme l’herbe:'
  '6':
  - type: text
    content: Elle fleurit le matin, et elle passe,
  - type: text
    content: On la coupe le soir, et elle sèche.
  '7':
  - type: text
    content: Nous sommes consumés par ta colère,
  - type: text
    content: Et ta fureur nous épouvante.
  '8':
  - type: text
    content: Tu mets devant toi nos iniquités,
  - type: text
    content: Et à la lumière de ta face nos fautes cachées.
  '9':
  - type: text
    content: Tous nos jours disparaissent par ton courroux;
  - type: text
    content: Nous voyons nos années s’évanouir comme un son.
