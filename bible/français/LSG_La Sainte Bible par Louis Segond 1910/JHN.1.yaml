document_id: JHN.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La Parole faite chair
  - type: heading
    content: 'V. 1-18: cf. (1 Jn 1:1-3; 5:20. Jn 8:12; 14:9.) (Pr 8:22-31. Col 1:15-17.) (Mi 5:1. Ro 9:5. Hé 1.) Jn 20:31.'
  - type: text
    content: ' '
  - type: note
    content: Pr 8:22. 1 Jn 1:1.
  - type: text
    content: 'Au commencement était la Parole, et la Parole était '
  - type: note
    content: 1 Jn 1:2.
  - type: text
    content: 'avec Dieu, et la Parole était Dieu. '
  '10':
  - type: text
    content: 'Elle était dans le monde, '
  - type: note
    content: Hé 1:2; 11:3.
  - type: text
    content: 'et le monde a été fait par elle, et le monde ne l’a point connue. '
  '11':
  - type: text
    content: 'Elle est venue chez les siens, et les siens ne l’ont point reçue. '
  '12':
  - type: note
    content: És 56:5. Ro 8:15. Ga 3:26. 2 Pi 1:4. 1 Jn 3:1.
  - type: text
    content: 'Mais à tous ceux qui l’ont reçue, à ceux qui croient en son nom, elle a donné le pouvoir de devenir enfants de Dieu, lesquels sont nés, '
  '13':
  - type: text
    content: 'non du sang, ni de la volonté de la chair, ni de la volonté de l’homme, mais de Dieu. '
  '14':
  - type: note
    content: És 7:14. Mt 1:16. Lu 1:31; 2:7.
  - type: text
    content: 'Et la parole a été faite chair, et elle a habité parmi nous, '
  - type: note
    content: Mt 17:2. 2 Pi 1:17.
  - type: text
    content: 'pleine de grâce et de vérité; '
  - type: note
    content: Col 1:19; 2:9.
  - type: text
    content: 'et nous avons contemplé sa gloire, une gloire comme la gloire du Fils unique venu du Père. '
  '15':
  - type: note
    content: Mt 3:11. Mc 1:7. Lu 3:16. Jn 1:26, 30.
  - type: text
    content: 'Jean lui a rendu témoignage, et s’est écrié: C’est celui dont j’ai dit: Celui qui vient après moi m’a précédé, car il était avant moi. '
  '16':
  - type: note
    content: Col 2:10.
  - type: text
    content: 'Et nous avons tous reçu de sa plénitude, et grâce pour grâce; '
  '17':
  - type: note
    content: Ex 20:1, etc.
  - type: text
    content: 'car la loi a été donnée par Moïse, la grâce et la vérité sont venues par Jésus-Christ. '
  '18':
  - type: note
    content: Ex 33:20. De 4:12. Jn 6:46. 1 Ti 6:16. 1 Jn 4:12.
  - type: text
    content: 'Personne n’a jamais vu Dieu; le Fils unique, '
  - type: note
    content: Mt 11:27.
  - type: text
    content: qui est dans le sein du Père, est celui qui l’a fait connaître.
  - type: heading
    content: Témoignage de Jean-Baptiste
  - type: heading
    content: 'V. 19-28: cf. Lu 3:15-18. Jn 5:33-36. Mal 3:1. 2 Co 4:5.'
  '19':
  - type: text
    content: 'Voici '
  - type: note
    content: Jn 5:33.
  - type: text
    content: 'le témoignage de Jean, lorsque les Juifs envoyèrent de Jérusalem des sacrificateurs et des Lévites, pour lui demander: Toi, qui es-tu? '
  '2':
  - type: note
    content: Jn 17:5.
  - type: text
    content: 'Elle était au commencement avec Dieu. '
  '20':
  - type: note
    content: Jn 3:28. Ac 13:25.
  - type: text
    content: 'Il déclara, et ne le nia point, il déclara qu’il n’était pas le Christ. '
  '21':
  - type: text
    content: 'Et ils lui demandèrent: Quoi donc? Es-tu Élie? Et il dit: Je ne le suis point. '
  - type: note
    content: De 18:18.
  - type: text
    content: 'Es-tu le prophète? Et il répondit: Non. '
  '22':
  - type: text
    content: 'Ils lui dirent alors: Qui es-tu? Afin que nous donnions une réponse à ceux qui nous ont envoyés. Que dis-tu de toi-même? '
  '23':
  - type: text
    content: 'Moi, dit-il, '
  - type: note
    content: És 40:3. Mt 3:3. Mc 1:3. Lu 3:4.
  - type: text
    content: 'je suis la voix de celui qui crie dans le désert:'
  - type: text
    content: Aplanissez le chemin du Seigneur,
  - type: text
    content: comme a dit Ésaïe, le prophète.
  '24':
  - type: text
    content: 'Ceux qui avaient été envoyés étaient des pharisiens. '
  '25':
  - type: text
    content: 'Ils lui firent encore cette question: Pourquoi donc baptises-tu, si tu n’es pas le Christ, ni Élie, ni '
  - type: note
    content: De 18:18.
  - type: text
    content: 'le prophète? '
  '26':
  - type: text
    content: 'Jean leur répondit: '
  - type: note
    content: Mt 3:11. Mc 1:7. Lu 3:16. Ac 1:5; 11:16; 19:4.
  - type: text
    content: 'Moi, je baptise d’eau, mais au milieu de vous il y a quelqu’un que vous ne connaissez pas, qui vient après moi; '
  '27':
  - type: text
    content: 'je ne suis pas digne de délier la courroie de ses souliers. '
  '28':
  - type: text
    content: Ces choses se passèrent à Béthanie, au-delà du Jourdain, où Jean baptisait.
  - type: heading
    content: 'V. 29-34: cf. Mt 3:13-17. Jn 3:28-36.'
  '29':
  - type: text
    content: 'Le lendemain, il vit Jésus venant à lui, et il dit: '
  - type: note
    content: És 53:5, 7. Jn 1:36.
  - type: text
    content: 'Voici l’Agneau de Dieu, qui ôte le péché du monde. '
  '3':
  - type: note
    content: Ge 1:3. Ps 33:6. Ép 3:9. Col 1:16. Hé 1:2.
  - type: text
    content: 'Toutes choses ont été faites par elle, et rien de ce qui a été fait n’a été fait sans elle. '
  '30':
  - type: text
    content: 'C’est celui dont j’ai dit: Après moi vient un homme qui m’a précédé, car il était avant moi. '
  '31':
  - type: text
    content: 'Je ne le connaissais pas, mais c’est afin qu’il fût manifesté à Israël que je suis venu baptiser d’eau. '
  '32':
  - type: note
    content: Mt 3:16. Mc 1:10. Lu 3:22.
  - type: text
    content: 'Jean rendit ce témoignage: J’ai vu l’Esprit descendre du ciel comme une colombe et s’arrêter sur lui. '
  '33':
  - type: text
    content: 'Je ne le connaissais pas, mais celui qui m’a envoyé baptiser d’eau, celui-là m’a dit: Celui sur qui tu verras l’Esprit descendre et s’arrêter, '
  - type: note
    content: Mt 3:11.
  - type: text
    content: 'c’est celui qui baptise du Saint-Esprit. '
  '34':
  - type: text
    content: Et j’ai vu, et j’ai rendu témoignage qu’il est le Fils de Dieu.
  - type: heading
    content: Les premiers disciples
  - type: heading
    content: 'V. 35-51: cf. Jn 6:37. (Mt 4:18-22; 9:9.) Ps 112:4.'
  '35':
  - type: text
    content: 'Le lendemain, Jean était encore là, avec deux de ses disciples; '
  '36':
  - type: text
    content: 'et, ayant regardé Jésus qui passait, il dit: '
  - type: note
    content: Ex 12:3. És 53:7. Jn 1:29. Ac 8:32.
  - type: text
    content: 'Voilà l’Agneau de Dieu. '
  '37':
  - type: text
    content: 'Les deux disciples l’entendirent prononcer ces paroles, et ils suivirent Jésus. '
  '38':
  - type: text
    content: 'Jésus se retourna, et voyant qu’ils le suivaient, il leur dit: '
  - type: text
    content: Que cherchez-vous?
  - type: text
    content: ' Ils lui répondirent: Rabbi (ce qui signifie Maître), où demeures-tu?'
  '39':
  - type: text
    content: ' '
  - type: text
    content: Venez,
  - type: text
    content: ' leur dit-il, '
  - type: text
    content: et voyez.
  - type: text
    content: ' Ils allèrent, et ils virent où il demeurait; et ils restèrent auprès de lui ce jour-là. C’était environ la dixième heure. '
  '4':
  - type: note
    content: Jn 5:26. 1 Jn 5:11.
  - type: text
    content: 'En elle était la vie, et '
  - type: note
    content: Jn 8:12; 9:5; 12:46.
  - type: text
    content: 'la vie était la lumière des hommes. '
  '40':
  - type: text
    content: 'André, frère de Simon Pierre, était l’un des deux qui avaient entendu les paroles de Jean, et qui avaient suivi Jésus. '
  '41':
  - type: text
    content: 'Ce fut lui qui rencontra le premier son frère Simon, et il lui dit: Nous avons trouvé le Messie (ce qui signifie Christ). '
  '42':
  - type: text
    content: 'Et il le conduisit vers Jésus. Jésus, l’ayant regardé, dit: '
  - type: text
    content: Tu es Simon, fils de Jonas; tu seras
  - type: text
    content: ' '
  - type: note
    content: Mt 16:18.
  - type: text
    content: appelé Céphas
  - type: text
    content: ' (ce qui signifie Pierre). '
  '43':
  - type: text
    content: 'Le lendemain, Jésus voulut se rendre en Galilée, et il rencontra Philippe. Il lui dit: '
  - type: text
    content: Suis-moi.
  - type: text
    content: ' '
  '44':
  - type: note
    content: Jn 12:21.
  - type: text
    content: 'Philippe était de Bethsaïda, de la ville d’André et de Pierre. '
  '45':
  - type: text
    content: 'Philippe rencontra '
  - type: note
    content: Jn 21:2.
  - type: text
    content: 'Nathanaël, et lui dit: Nous avons trouvé celui '
  - type: note
    content: Ge 3:15; 22:18; 26:4; 49:10. De 18:18. 2 S 7:12. És 4:2; 7:14; 9:5; 40:10, 11; 53:1, etc. Jé 23:5; 33:14. Éz 34:23. Da 9:24. Za 6:12; 9:9.
  - type: text
    content: 'de qui Moïse a écrit dans la loi et dont les prophètes ont parlé, Jésus de Nazareth, fils de Joseph. '
  '46':
  - type: text
    content: 'Nathanaël lui dit: Peut-il venir de Nazareth quelque chose de bon? Philippe lui répondit: Viens, et vois. '
  '47':
  - type: text
    content: 'Jésus, voyant venir à lui Nathanaël, dit de lui: '
  - type: text
    content: Voici vraiment un Israélite, dans lequel il n’y a point de fraude.
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'D’où me connais-tu? Lui dit Nathanaël. Jésus lui répondit: '
  - type: text
    content: Avant que Philippe t’appelât, quand tu étais sous le figuier, je t’ai vu.
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'Nathanaël répondit et lui dit: Rabbi, tu es le Fils de Dieu, tu es le roi d’Israël. '
  '5':
  - type: note
    content: Jn 3:19.
  - type: text
    content: 'La lumière luit dans les ténèbres, et les ténèbres ne l’ont point reçue. '
  '50':
  - type: text
    content: 'Jésus lui répondit: '
  - type: text
    content: Parce que je t’ai dit que je t’ai vu sous le figuier, tu crois; tu verras de plus grandes choses que celles-ci.
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'Et il lui dit: '
  - type: text
    content: En vérité, en vérité,
  - type: text
    content: ' '
  - type: note
    content: Ge 28:12.
  - type: text
    content: vous verrez désormais le ciel ouvert et les anges de Dieu monter et descendre sur le Fils de l’homme.
  '6':
  - type: note
    content: Mal 3:1. Mt 3:1. Mc 1:2, 4. Lu 3:3; 7:27. Jn 1:33.
  - type: text
    content: 'Il y eut un homme envoyé de Dieu: son nom était Jean. '
  '7':
  - type: text
    content: 'Il vint pour servir de témoin, pour rendre témoignage à la lumière, afin que tous crussent par lui. '
  '8':
  - type: text
    content: 'Il n’était pas la lumière, mais il parut pour rendre témoignage à la lumière. '
  '9':
  - type: note
    content: Jn 8:12; 9:5; 12:46.
  - type: text
    content: 'Cette lumière était la véritable lumière, qui, en venant dans le monde, éclaire tout homme. '
