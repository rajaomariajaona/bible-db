document_id: JHN.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La Parole faite chair
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-18: cf. (1 Jn 1:1-3; 5:20. Jn 8:12; 14:9.) (Pr 8:22-31. Col 1:15-17.) (Mi 5:1. Ro 9:5. Hé 1.) Jn 20:31.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 8:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 1:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Au commencement était la Parole, et la Parole était '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 1:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'avec Dieu, et la Parole était Dieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Elle était dans le monde, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 1:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et le monde a été fait par elle, et le monde ne l’a point connue. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Elle est venue chez les siens, et les siens ne l’ont point reçue. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 56:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 8:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 3:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 1:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 3:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais à tous ceux qui l’ont reçue, à ceux qui croient en son nom, elle a donné le pouvoir de devenir enfants de Dieu, lesquels sont nés, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'non du sang, ni de la volonté de la chair, ni de la volonté de l’homme, mais de Dieu. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 7:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 1:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 1:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et la parole a été faite chair, et elle a habité parmi nous, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 17:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 1:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pleine de grâce et de vérité; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et nous avons contemplé sa gloire, une gloire comme la gloire du Fils unique venu du Père. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 3:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:26
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '30'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jean lui a rendu témoignage, et s’est écrié: C’est celui dont j’ai dit: Celui qui vient après moi m’a précédé, car il était avant moi. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 2:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et nous avons tous reçu de sa plénitude, et grâce pour grâce; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex 20:1, etc.
      marker-yv: yv-n
    - type: text
      text: 'car la loi a été donnée par Moïse, la grâce et la vérité sont venues par Jésus-Christ. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 33:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 4:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6:46
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 6:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 4:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Personne n’a jamais vu Dieu; le Fils unique, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 11:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: qui est dans le sein du Père, est celui qui l’a fait connaître.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Témoignage de Jean-Baptiste
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 19-28: cf. Lu 3:15-18. Jn 5:33-36. Mal 3:1. 2 Co 4:5.'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Voici '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 5:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le témoignage de Jean, lorsque les Juifs envoyèrent de Jérusalem des sacrificateurs et des Lévites, pour lui demander: Toi, qui es-tu? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 17:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Elle était au commencement avec Dieu. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 3:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il déclara, et ne le nia point, il déclara qu’il n’était pas le Christ. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Et ils lui demandèrent: Quoi donc? Es-tu Élie? Et il dit: Je ne le suis point. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 18:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Es-tu le prophète? Et il répondit: Non. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ils lui dirent alors: Qui es-tu? Afin que nous donnions une réponse à ceux qui nous ont envoyés. Que dis-tu de toi-même? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Moi, dit-il, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 40:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 3:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'je suis la voix de celui qui crie dans le désert:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aplanissez le chemin du Seigneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme a dit Ésaïe, le prophète.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ceux qui avaient été envoyés étaient des pharisiens. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ils lui firent encore cette question: Pourquoi donc baptises-tu, si tu n’es pas le Christ, ni Élie, ni '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 18:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le prophète? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Jean leur répondit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 3:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Moi, je baptise d’eau, mais au milieu de vous il y a quelqu’un que vous ne connaissez pas, qui vient après moi; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'je ne suis pas digne de délier la courroie de ses souliers. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ces choses se passèrent à Béthanie, au-delà du Jourdain, où Jean baptisait.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 29-34: cf. Mt 3:13-17. Jn 3:28-36.'
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Le lendemain, il vit Jésus venant à lui, et il dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 53:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:36
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Voici l’Agneau de Dieu, qui ôte le péché du monde. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 33:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 3:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 1:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Toutes choses ont été faites par elle, et rien de ce qui a été fait n’a été fait sans elle. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'C’est celui dont j’ai dit: Après moi vient un homme qui m’a précédé, car il était avant moi. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Je ne le connaissais pas, mais c’est afin qu’il fût manifesté à Israël que je suis venu baptiser d’eau. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 3:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jean rendit ce témoignage: J’ai vu l’Esprit descendre du ciel comme une colombe et s’arrêter sur lui. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Je ne le connaissais pas, mais celui qui m’a envoyé baptiser d’eau, celui-là m’a dit: Celui sur qui tu verras l’Esprit descendre et s’arrêter, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 3:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'c’est celui qui baptise du Saint-Esprit. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Et j’ai vu, et j’ai rendu témoignage qu’il est le Fils de Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les premiers disciples
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 35-51: cf. Jn 6:37. (Mt 4:18-22; 9:9.) Ps 112:4.'
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Le lendemain, Jean était encore là, avec deux de ses disciples; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'et, ayant regardé Jésus qui passait, il dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 12:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 53:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 8:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Voilà l’Agneau de Dieu. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Les deux disciples l’entendirent prononcer ces paroles, et ils suivirent Jésus. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Jésus se retourna, et voyant qu’ils le suivaient, il leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Que cherchez-vous?
    - type: text
      text: ' Ils lui répondirent: Rabbi (ce qui signifie Maître), où demeures-tu?'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
