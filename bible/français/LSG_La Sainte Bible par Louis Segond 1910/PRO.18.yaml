document_id: PRO.18,93
type_code: fra
verses:
  '1':
  - type: text
    content: Celui qui se tient à l’écart cherche ce qui lui plaît,
  - type: text
    content: Il s’irrite contre tout ce qui est sage.
  '10':
  - type: text
    content: 'Le nom de l’Éternel est '
  - type: note
    content: 2 S 22:51. Ps 18:3; 61:4. Pr 29:25.
  - type: text
    content: une tour forte;
  - type: text
    content: Le juste s’y réfugie, et se trouve en sûreté.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Pr 10:15.
  - type: text
    content: La fortune est pour le riche une ville forte;
  - type: text
    content: Dans son imagination, c’est une haute muraille.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Pr 11:2; 16:18.
  - type: text
    content: Avant la ruine, le cœur de l’homme s’élève;
  - type: note
    content: Pr 15:33.
  - type: text
    content: Mais l’humilité précède la gloire.
  '13':
  - type: text
    content: Celui qui répond avant d’avoir écouté
  - type: text
    content: Fait un acte de folie et s’attire la confusion.
  '14':
  - type: text
    content: L’esprit de l’homme le soutient dans la maladie;
  - type: text
    content: Mais l’esprit abattu, qui le relèvera?
  '15':
  - type: text
    content: Un cœur intelligent acquiert la science,
  - type: text
    content: Et l’oreille des sages cherche la science.
  '16':
  - type: text
    content: Les présents d’un homme lui élargissent la voie,
  - type: text
    content: Et lui donnent accès auprès des grands.
  '17':
  - type: text
    content: Le premier qui parle dans sa cause paraît juste;
  - type: note
    content: Pr 25:8.
  - type: text
    content: Vient sa partie adverse, et on l’examine.
  '18':
  - type: text
    content: Le sort fait cesser les contestations,
  - type: text
    content: Et décide entre les puissants.
  '19':
  - type: text
    content: Des frères sont plus intraitables qu’une ville forte,
  - type: text
    content: Et leurs querelles sont comme les verrous d’un palais.
  '2':
  - type: text
    content: Ce n’est pas à l’intelligence que l’insensé prend plaisir,
  - type: text
    content: C’est à la manifestation de ses pensées.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Pr 12:14; 13:2.
  - type: text
    content: C’est du fruit de sa bouche que l’homme rassasie son corps,
  - type: text
    content: C’est du produit de ses lèvres qu’il se rassasie.
  '21':
  - type: text
    content: 'La mort et la vie sont au pouvoir de '
  - type: note
    content: Pr 21:23. Ja 3:2.
  - type: text
    content: la langue;
  - type: text
    content: Quiconque l’aime en mangera les fruits.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Pr 19:14.
  - type: text
    content: Celui qui trouve une femme trouve le bonheur;
  - type: text
    content: C’est une grâce qu’il obtient de l’Éternel.
  '23':
  - type: text
    content: Le pauvre parle en suppliant,
  - type: text
    content: Et le riche répond avec dureté.
  '24':
  - type: text
    content: Celui qui a beaucoup d’amis les a pour son malheur,
  - type: note
    content: Pr 17:17.
  - type: text
    content: Mais il est tel ami plus attaché qu’un frère.
  '3':
  - type: text
    content: Quand vient le méchant, vient aussi le mépris;
  - type: text
    content: Et avec la honte, vient l’opprobre.
  '4':
  - type: text
    content: Les paroles de la bouche d’un homme sont des eaux profondes;
  - type: text
    content: La source de la sagesse est un torrent qui jaillit.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Lé 19:15. De 1:17; 16:19. Pr 24:23.
  - type: text
    content: Il n’est pas bon d’avoir égard à la personne du méchant,
  - type: text
    content: Pour faire tort au juste dans le jugement.
  '6':
  - type: text
    content: Les lèvres de l’insensé se mêlent aux querelles,
  - type: text
    content: Et sa bouche provoque les coups.
  '7':
  - type: text
    content: 'La bouche de l’insensé '
  - type: note
    content: Pr 10:14; 13:3.
  - type: text
    content: cause sa ruine,
  - type: text
    content: 'Et ses lèvres sont '
  - type: note
    content: Pr 12:13.
  - type: text
    content: un piège pour son âme.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Pr 26:22.
  - type: text
    content: Les paroles du rapporteur sont comme des friandises,
  - type: text
    content: Elles descendent jusqu’au fond des entrailles.
  '9':
  - type: text
    content: Celui qui se relâche dans son travail
  - type: text
    content: Est frère de celui qui détruit.
