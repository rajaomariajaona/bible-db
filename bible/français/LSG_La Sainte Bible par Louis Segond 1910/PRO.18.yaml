document_id: PRO.18
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Celui qui se tient à l’écart cherche ce qui lui plaît,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il s’irrite contre tout ce qui est sage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ce n’est pas à l’intelligence que l’insensé prend plaisir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est à la manifestation de ses pensées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Quand vient le méchant, vient aussi le mépris;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et avec la honte, vient l’opprobre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les paroles de la bouche d’un homme sont des eaux profondes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La source de la sagesse est un torrent qui jaillit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:15
      metadata:
        usfm: LEV.19.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 1:17
      metadata:
        usfm: DEU.1.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:19
      metadata:
        usfm: DEU.16.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 24:23
      metadata:
        usfm: PRO.24.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il n’est pas bon d’avoir égard à la personne du méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour faire tort au juste dans le jugement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les lèvres de l’insensé se mêlent aux querelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa bouche provoque les coups.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'La bouche de l’insensé '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:14
      metadata:
        usfm: PRO.10.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:3
      metadata:
        usfm: PRO.13.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: cause sa ruine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et ses lèvres sont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 12:13
      metadata:
        usfm: PRO.12.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: un piège pour son âme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 26:22
      metadata:
        usfm: PRO.26.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les paroles du rapporteur sont comme des friandises,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles descendent jusqu’au fond des entrailles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Celui qui se relâche dans son travail
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est frère de celui qui détruit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le nom de l’Éternel est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 22:51
      metadata:
        usfm: 2SA.22.51
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 18:3
      metadata:
        usfm: PSA.18.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 61:4
      metadata:
        usfm: PSA.61.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 29:25
      metadata:
        usfm: PRO.29.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: une tour forte;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le juste s’y réfugie, et se trouve en sûreté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:15
      metadata:
        usfm: PRO.10.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La fortune est pour le riche une ville forte;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans son imagination, c’est une haute muraille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 11:2
      metadata:
        usfm: PRO.11.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:18
      metadata:
        usfm: PRO.16.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Avant la ruine, le cœur de l’homme s’élève;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 15:33
      metadata:
        usfm: PRO.15.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais l’humilité précède la gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Celui qui répond avant d’avoir écouté
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fait un acte de folie et s’attire la confusion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L’esprit de l’homme le soutient dans la maladie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais l’esprit abattu, qui le relèvera?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Un cœur intelligent acquiert la science,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’oreille des sages cherche la science.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Les présents d’un homme lui élargissent la voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et lui donnent accès auprès des grands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Le premier qui parle dans sa cause paraît juste;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 25:8
      metadata:
        usfm: PRO.25.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Vient sa partie adverse, et on l’examine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Le sort fait cesser les contestations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et décide entre les puissants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Des frères sont plus intraitables qu’une ville forte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leurs querelles sont comme les verrous d’un palais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 12:14
      metadata:
        usfm: PRO.12.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:2
      metadata:
        usfm: PRO.13.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: C’est du fruit de sa bouche que l’homme rassasie son corps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est du produit de ses lèvres qu’il se rassasie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'La mort et la vie sont au pouvoir de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 21:23
      metadata:
        usfm: PRO.21.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 3:2
      metadata:
        usfm: JAS.3.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: la langue;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quiconque l’aime en mangera les fruits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 19:14
      metadata:
        usfm: PRO.19.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui trouve une femme trouve le bonheur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est une grâce qu’il obtient de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Le pauvre parle en suppliant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le riche répond avec dureté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Celui qui a beaucoup d’amis les a pour son malheur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 17:17
      metadata:
        usfm: PRO.17.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais il est tel ami plus attaché qu’un frère.
