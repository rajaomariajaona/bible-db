document_id: EZK.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Mission du prophète. La vision du rouleau
  - type: heading
    content: '2 v. 1 à 3 v. 3: cf. (Jé 1:4-9, 17. Mt 10:27-33.) Ap 10:8-10.'
  - type: text
    content: 'Il me dit: Fils de l’homme, tiens-toi sur tes pieds, et je te parlerai. '
  '10':
  - type: text
    content: Il le déploya devant moi, et il était écrit en dedans et en dehors; des lamentations, des plaintes et des gémissements y étaient écrits.
  '2':
  - type: text
    content: 'Dès qu’il m’eut adressé ces mots, '
  - type: note
    content: Éz 3:24. Da 10:10.
  - type: text
    content: 'l’esprit entra en moi et me fit tenir sur mes pieds; et j’entendis celui qui me parlait. '
  '3':
  - type: text
    content: 'Il me dit: Fils de l’homme, je t’envoie vers les enfants d’Israël, vers ces peuples rebelles, qui se sont révoltés contre moi; '
  - type: note
    content: Jé 3:25.
  - type: text
    content: 'eux et leurs pères ont péché contre moi, jusqu’au jour même où nous sommes. '
  '4':
  - type: text
    content: 'Ce sont des enfants à la face impudente et au cœur endurci; je t’envoie vers eux, et tu leur diras: Ainsi parle le Seigneur, l’Éternel. '
  '5':
  - type: text
    content: 'Qu’ils écoutent, ou qu’ils n’écoutent pas, car c’est une famille de rebelles, '
  - type: note
    content: Éz 33:33.
  - type: text
    content: 'ils sauront qu’un prophète est au milieu d’eux. '
  '6':
  - type: text
    content: 'Et toi, fils de l’homme, '
  - type: note
    content: Jé 1:8, 17. Lu 12:4.
  - type: text
    content: 'ne les crains pas et ne crains pas leurs discours, quoique tu aies auprès de toi des ronces et des épines, et que tu habites avec des scorpions; '
  - type: note
    content: Éz 3:9. 1 Pi 3:14.
  - type: text
    content: 'ne crains pas leurs discours et ne t’effraie pas de leurs visages, quoiqu’ils soient une famille de rebelles. '
  '7':
  - type: text
    content: 'Tu leur diras mes paroles, qu’ils écoutent ou qu’ils n’écoutent pas, car ce sont des rebelles. '
  '8':
  - type: text
    content: 'Et toi, fils de l’homme, écoute ce que je vais te dire! Ne sois pas rebelle, comme cette famille de rebelles! '
  - type: note
    content: Ap 10:9.
  - type: text
    content: 'Ouvre ta bouche, et mange ce que je te donnerai! '
  '9':
  - type: text
    content: 'Je regardai, et voici, une main était étendue vers moi, et elle tenait un livre en rouleau. '
