document_id: LAM.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière du peuple opprimé
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-22: cf. Ps 79. És 8:17.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Souviens-toi, Éternel, de ce qui nous est arrivé!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Regarde, vois notre opprobre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Notre héritage a passé à des étrangers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nos maisons à des inconnus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nous sommes orphelins, sans père;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nos mères sont comme des veuves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nous buvons notre eau à prix d’argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous payons notre bois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nous sommes poursuivis, le joug sur le cou;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous sommes épuisés, nous n’avons point de repos.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nous avons tendu la main vers l’Égypte, vers l’Assyrie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour nous rassasier de pain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nos pères ont péché, ils ne sont plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et c’est nous qui portons la peine de leurs iniquités.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Des esclaves dominent sur nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et personne ne nous délivre de leurs mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nous cherchons notre pain au péril de notre vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Devant l’épée du désert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Notre peau est brûlante comme un four,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par l’ardeur de la faim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils ont déshonoré les femmes dans Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les vierges dans les villes de Juda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Des chefs ont été pendus par leurs mains;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La personne des vieillards n’a pas été respectée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les jeunes hommes ont porté la meule,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les enfants chancelaient sous des fardeaux de bois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les vieillards ne vont plus à la porte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les jeunes hommes ont cessé leurs chants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La joie a disparu de nos cœurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le deuil a remplacé nos danses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: La couronne de notre tête est tombée!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malheur à nous, parce que nous avons péché!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Si notre cœur est souffrant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si nos yeux sont obscurcis,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: C’est que la montagne de Sion est ravagée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est que les renards s’y promènent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Toi, l’Éternel, tu règnes à jamais;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton trône subsiste de génération en génération.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Pourquoi nous oublierais-tu pour toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous abandonnerais-tu pour de longues années?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fais-nous revenir vers toi, ô Éternel, et nous reviendrons!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Donne-nous encore des jours comme ceux d’autrefois!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nous aurais-tu entièrement rejetés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et t’irriterais-tu contre nous jusqu’à l’excès?
