document_id: LAM.5,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière du peuple opprimé
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-22: cf. Ps 79. És 8:17.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Souviens-toi, Éternel, de ce qui nous est arrivé!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Regarde, vois notre opprobre!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Notre peau est brûlante comme un four,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par l’ardeur de la faim.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ils ont déshonoré les femmes dans Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les vierges dans les villes de Juda.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Des chefs ont été pendus par leurs mains;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La personne des vieillards n’a pas été respectée.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Les jeunes hommes ont porté la meule,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les enfants chancelaient sous des fardeaux de bois.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Les vieillards ne vont plus à la porte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les jeunes hommes ont cessé leurs chants.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: La joie a disparu de nos cœurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le deuil a remplacé nos danses.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: La couronne de notre tête est tombée!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à nous, parce que nous avons péché!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Si notre cœur est souffrant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si nos yeux sont obscurcis,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: C’est que la montagne de Sion est ravagée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est que les renards s’y promènent.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Toi, l’Éternel, tu règnes à jamais;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton trône subsiste de génération en génération.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Notre héritage a passé à des étrangers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nos maisons à des inconnus.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Pourquoi nous oublierais-tu pour toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous abandonnerais-tu pour de longues années?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fais-nous revenir vers toi, ô Éternel, et nous reviendrons!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donne-nous encore des jours comme ceux d’autrefois!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Nous aurais-tu entièrement rejetés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et t’irriterais-tu contre nous jusqu’à l’excès?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Nous sommes orphelins, sans père;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nos mères sont comme des veuves.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nous buvons notre eau à prix d’argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous payons notre bois.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nous sommes poursuivis, le joug sur le cou;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous sommes épuisés, nous n’avons point de repos.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Nous avons tendu la main vers l’Égypte, vers l’Assyrie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour nous rassasier de pain.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Nos pères ont péché, ils ne sont plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et c’est nous qui portons la peine de leurs iniquités.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Des esclaves dominent sur nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et personne ne nous délivre de leurs mains.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nous cherchons notre pain au péril de notre vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant l’épée du désert.
