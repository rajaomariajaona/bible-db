document_id: LAM.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière du peuple opprimé
  - type: heading
    content: 'V. 1-22: cf. Ps 79. És 8:17.'
  - type: text
    content: Souviens-toi, Éternel, de ce qui nous est arrivé!
  - type: text
    content: Regarde, vois notre opprobre!
  '10':
  - type: text
    content: Notre peau est brûlante comme un four,
  - type: text
    content: Par l’ardeur de la faim.
  '11':
  - type: text
    content: Ils ont déshonoré les femmes dans Sion,
  - type: text
    content: Les vierges dans les villes de Juda.
  '12':
  - type: text
    content: Des chefs ont été pendus par leurs mains;
  - type: text
    content: La personne des vieillards n’a pas été respectée.
  '13':
  - type: text
    content: Les jeunes hommes ont porté la meule,
  - type: text
    content: Les enfants chancelaient sous des fardeaux de bois.
  '14':
  - type: text
    content: Les vieillards ne vont plus à la porte,
  - type: text
    content: Les jeunes hommes ont cessé leurs chants.
  '15':
  - type: text
    content: La joie a disparu de nos cœurs,
  - type: text
    content: Le deuil a remplacé nos danses.
  '16':
  - type: text
    content: La couronne de notre tête est tombée!
  - type: text
    content: Malheur à nous, parce que nous avons péché!
  '17':
  - type: text
    content: Si notre cœur est souffrant,
  - type: text
    content: Si nos yeux sont obscurcis,
  '18':
  - type: text
    content: C’est que la montagne de Sion est ravagée,
  - type: text
    content: C’est que les renards s’y promènent.
  '19':
  - type: text
    content: Toi, l’Éternel, tu règnes à jamais;
  - type: text
    content: Ton trône subsiste de génération en génération.
  '2':
  - type: text
    content: Notre héritage a passé à des étrangers,
  - type: text
    content: Nos maisons à des inconnus.
  '20':
  - type: text
    content: Pourquoi nous oublierais-tu pour toujours,
  - type: text
    content: Nous abandonnerais-tu pour de longues années?
  '21':
  - type: text
    content: Fais-nous revenir vers toi, ô Éternel, et nous reviendrons!
  - type: text
    content: Donne-nous encore des jours comme ceux d’autrefois!
  '22':
  - type: text
    content: Nous aurais-tu entièrement rejetés,
  - type: text
    content: Et t’irriterais-tu contre nous jusqu’à l’excès?
  '3':
  - type: text
    content: Nous sommes orphelins, sans père;
  - type: text
    content: Nos mères sont comme des veuves.
  '4':
  - type: text
    content: Nous buvons notre eau à prix d’argent,
  - type: text
    content: Nous payons notre bois.
  '5':
  - type: text
    content: Nous sommes poursuivis, le joug sur le cou;
  - type: text
    content: Nous sommes épuisés, nous n’avons point de repos.
  '6':
  - type: text
    content: Nous avons tendu la main vers l’Égypte, vers l’Assyrie,
  - type: text
    content: Pour nous rassasier de pain.
  '7':
  - type: text
    content: Nos pères ont péché, ils ne sont plus,
  - type: text
    content: Et c’est nous qui portons la peine de leurs iniquités.
  '8':
  - type: text
    content: Des esclaves dominent sur nous,
  - type: text
    content: Et personne ne nous délivre de leurs mains.
  '9':
  - type: text
    content: Nous cherchons notre pain au péril de notre vie,
  - type: text
    content: Devant l’épée du désert.
