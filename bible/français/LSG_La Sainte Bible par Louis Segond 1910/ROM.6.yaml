document_id: ROM.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La grâce, loin d’autoriser le péché, délivre de l’empire du péché
  - type: heading
    content: 'V. 1-14: cf. Col 2:11-13; 3:1-10. Ga 2:19, 20. 1 Pi 4:1, 2.'
  - type: text
    content: 'Que dirons-nous donc? Demeurerions-nous dans le péché, afin que la grâce abonde? '
  '10':
  - type: note
    content: 1 Pi 2:24.
  - type: text
    content: 'Car il est mort, et c’est pour le péché qu’il est mort une fois pour toutes; il est revenu à la vie, et c’est pour Dieu qu’il vit. '
  '11':
  - type: text
    content: 'Ainsi vous-mêmes, regardez-vous comme morts au péché, et comme vivants pour Dieu en Jésus-Christ. '
  '12':
  - type: text
    content: 'Que le péché ne règne donc point dans votre corps mortel, et n’obéissez pas à ses convoitises. '
  '13':
  - type: text
    content: 'Ne livrez pas vos membres au péché, comme des instruments d’iniquité; '
  - type: note
    content: Lu 1:74. Ro 12:1. Ga 2:20. Hé 9:14. 1 Pi 4:2.
  - type: text
    content: 'mais donnez-vous vous-mêmes à Dieu, comme étant vivants de morts que vous étiez, et offrez à Dieu vos membres, comme des instruments de justice. '
  '14':
  - type: text
    content: Car le péché n’aura point de pouvoir sur vous, puisque vous êtes, non sous la loi, mais sous la grâce.
  - type: heading
    content: 'V. 15-23: cf. (Jn 8:31-36. Ro 7:4-6.) Tit 2:11-14.'
  '15':
  - type: text
    content: 'Quoi donc! Pécherions-nous, parce que nous sommes, non sous la loi, mais sous la grâce? Loin de là! '
  '16':
  - type: text
    content: 'Ne savez-vous pas '
  - type: note
    content: Jn 8:34. 2 Pi 2:19.
  - type: text
    content: 'qu’en vous livrant à quelqu’un comme esclaves pour lui obéir, vous êtes esclaves de celui à qui vous obéissez, soit du péché qui conduit à la mort, soit de l’obéissance qui conduit à la justice? '
  '17':
  - type: text
    content: 'Mais grâces soient rendues à Dieu de ce que, après avoir été esclaves du péché, vous avez obéi de cœur à la règle de doctrine dans laquelle vous avez été instruits. '
  '18':
  - type: note
    content: Jn 8:32. Ga 5:1. 1 Pi 2:16.
  - type: text
    content: 'Ayant été affranchis du péché, vous êtes devenus esclaves de la justice. '
  '19':
  - type: text
    content: 'Je parle à la manière des hommes, à cause de la faiblesse de votre chair. De même donc que vous avez livré vos membres comme esclaves à l’impureté et à l’iniquité, pour arriver à l’iniquité, ainsi maintenant livrez vos membres comme esclaves à la justice, pour arriver à la sainteté. '
  '2':
  - type: text
    content: 'Loin de là! Nous qui sommes morts au péché, comment vivrions-nous encore dans le péché? '
  '20':
  - type: note
    content: Jn 8:34.
  - type: text
    content: 'Car, lorsque vous étiez esclaves du péché, vous étiez libres à l’égard de la justice. '
  '21':
  - type: text
    content: 'Quels fruits portiez-vous alors? Des fruits dont vous rougissez aujourd’hui. Car la fin de ces choses, c’est la mort. '
  '22':
  - type: text
    content: 'Mais maintenant, étant affranchis du péché et devenus esclaves de Dieu, vous avez pour fruit la sainteté et pour fin la vie éternelle. '
  '23':
  - type: note
    content: Ge 2:17. Ro 5:12. 1 Co 15:21. Ja 1:15.
  - type: text
    content: 'Car le salaire du péché, c’est la mort; '
  - type: note
    content: 1 Pi 1:3.
  - type: text
    content: mais le don gratuit de Dieu, c’est la vie éternelle en Jésus-Christ notre Seigneur.
  '3':
  - type: text
    content: 'Ignorez-vous '
  - type: note
    content: Ga 3:27.
  - type: text
    content: 'que nous tous qui avons été baptisés en Jésus-Christ, c’est en sa mort que nous avons été baptisés? '
  '4':
  - type: note
    content: Col 2:12.
  - type: text
    content: 'Nous avons donc été ensevelis avec lui par le baptême en sa mort, afin que, comme Christ est '
  - type: note
    content: Ro 8:11. Ph 3:10, 11.
  - type: text
    content: 'ressuscité des morts par la gloire du Père, de même nous aussi nous marchions '
  - type: note
    content: Ép 4:23. Col 3:10. Hé 12:1. 1 Pi 2:2.
  - type: text
    content: 'en nouveauté de vie. '
  '5':
  - type: note
    content: Ro 8:11. Col 3:1.
  - type: text
    content: 'En effet, si nous sommes devenus une même plante avec lui par la conformité à sa mort, nous le serons aussi par la conformité à sa résurrection, '
  '6':
  - type: text
    content: 'sachant que notre vieil homme a été '
  - type: note
    content: Ga 2:20; 5:24. Ph 3:10. 1 Pi 4:1, 2.
  - type: text
    content: 'crucifié avec lui, afin que le corps du péché fût détruit, pour que nous ne soyons plus esclaves du péché; '
  '7':
  - type: note
    content: 1 Pi 4:1.
  - type: text
    content: 'car celui qui est mort est libre du péché. '
  '8':
  - type: note
    content: 2 Ti 2:11.
  - type: text
    content: 'Or, si nous sommes morts avec Christ, nous croyons que nous vivrons aussi avec lui, '
  '9':
  - type: note
    content: Ap 1:18.
  - type: text
    content: 'sachant que Christ ressuscité des morts ne meurt plus; la mort n’a plus de pouvoir sur lui. '
