document_id: REV.22,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-5: cf. Éz 47:1-12. Ge 2:8-10; 3:22-24.'
  - type: text
    content: 'Et il me montra '
  - type: note
    content: Éz 47:1. Za 14:8.
  - type: text
    content: 'un fleuve d’eau de la vie, limpide comme du cristal, qui sortait du trône de Dieu et de l’agneau. '
  '10':
  - type: text
    content: 'Et il me dit: '
  - type: note
    content: Da 8:26; 12:4.
  - type: text
    content: 'Ne scelle point les paroles de la prophétie de ce livre. Car '
  - type: note
    content: Ap 1:3.
  - type: text
    content: 'le temps est proche. '
  '11':
  - type: text
    content: Que celui qui est injuste soit encore injuste, que celui qui est souillé se souille encore; et que le juste pratique encore la justice, et que celui qui est saint se sanctifie encore.
  '12':
  - type: text
    content: ' '
  - type: text
    content: Voici, je viens bientôt, et ma rétribution est avec moi,
  - type: text
    content: ' '
  - type: note
    content: Ps 62:13. Jé 17:10; 32:19. Mt 16:27. Ro 2:6; 14:12. 1 Co 3:8. 2 Co 5:10. Ga 6:5. Ap 2:23.
  - type: text
    content: pour rendre à chacun selon ce qu’est son œuvre.
  - type: text
    content: ' '
  '13':
  - type: note
    content: Ap 1:8; 21:6.
  - type: text
    content: Je suis l’alpha et l’oméga,
  - type: text
    content: ' '
  - type: note
    content: És 41:4; 44:6; 48:12. Ap 1:8; 21:6.
  - type: text
    content: le premier et le dernier, le commencement et la fin.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Heureux ceux qui lavent leurs robes, afin d’avoir droit à l’arbre de vie, et d’entrer par les portes dans la ville! '
  '15':
  - type: note
    content: 1 Co 6:10. Ép 5:5. Col 3:5, 6.
  - type: text
    content: Dehors les chiens, les enchanteurs, les impudiques, les meurtriers, les idolâtres, et quiconque aime et pratique le mensonge!
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ap 1:1.
  - type: text
    content: Moi, Jésus, j’ai envoyé mon ange pour vous attester ces choses dans les Églises.
  - type: text
    content: ' '
  - type: note
    content: És 11:10. Ro 15:12. Ap 5:5.
  - type: text
    content: Je suis le rejeton et la postérité de David,
  - type: text
    content: ' '
  - type: note
    content: 2 Pi 1:19.
  - type: text
    content: l’étoile brillante du matin.
  - type: heading
    content: 'V. 17-21: cf. (És 55:1-3. Jn 7:37-39.) (Pr 30:5, 6. De 4:2.) Tit 2:11-14.'
  '17':
  - type: text
    content: 'Et l’Esprit et l’épouse disent: Viens. Et que celui qui entend dise: Viens. '
  - type: note
    content: És 55:1. Jn 7:37.
  - type: text
    content: 'Et que celui qui a soif vienne; que celui qui veut, prenne de l’eau de la vie, gratuitement. '
  '18':
  - type: text
    content: 'Je le déclare à quiconque entend les paroles de la prophétie de ce livre: Si quelqu’un y ajoute quelque chose, Dieu le frappera des fléaux décrits dans ce livre; '
  '19':
  - type: text
    content: 'et '
  - type: note
    content: De 4:2; 12:32. Pr 30:6.
  - type: text
    content: 'si quelqu’un retranche quelque chose des paroles du livre de cette prophétie, Dieu retranchera sa part de '
  - type: note
    content: Ap 13:8; 17:8.
  - type: text
    content: 'l’arbre de la vie et de la ville sainte, décrits dans ce livre. '
  '2':
  - type: text
    content: 'Au milieu de la place de la ville et sur les deux bords du fleuve, il y avait un '
  - type: note
    content: Ap 2:7.
  - type: text
    content: 'arbre de vie, produisant douze fois des fruits, rendant son fruit chaque mois, et dont les feuilles servaient à la guérison des nations. '
  '20':
  - type: text
    content: 'Celui qui atteste ces choses dit: '
  - type: text
    content: Oui, je viens bientôt.
  - type: text
    content: ' Amen! Viens, Seigneur Jésus! '
  '21':
  - type: text
    content: Que la grâce du Seigneur Jésus soit avec tous!
  '3':
  - type: text
    content: 'Il n’y aura plus d’anathème. Le trône de Dieu et de l’agneau sera dans la ville; ses serviteurs le serviront et verront sa face, '
  '4':
  - type: text
    content: 'et '
  - type: note
    content: Ap 3:12.
  - type: text
    content: 'son nom sera sur leurs fronts. '
  '5':
  - type: note
    content: És 60:19. Za 14:7. Ap 21:23.
  - type: text
    content: Il n’y aura plus de nuit; et ils n’auront besoin ni de lampe ni de lumière, parce que le Seigneur Dieu les éclairera. Et ils régneront aux siècles des siècles.
  - type: heading
    content: Conclusion du livre
  - type: heading
    content: 'V. 6-16: cf. Ap 1:1-3, 7, 8. (Mt 16:27. Ga 6:7, 8.)'
  '6':
  - type: text
    content: 'Et il me dit: '
  - type: note
    content: Ap 19:9; 21:5.
  - type: text
    content: 'Ces paroles sont certaines et véritables; et le Seigneur, le Dieu des esprits des prophètes, a envoyé son ange '
  - type: note
    content: Ap 1:1.
  - type: text
    content: pour montrer à ses serviteurs les choses qui doivent arriver bientôt.
  '7':
  - type: text
    content: ' '
  - type: text
    content: Et voici, je viens bientôt.
  - type: text
    content: ' '
  - type: note
    content: Ap 1:3.
  - type: text
    content: 'Heureux celui qui garde les paroles de la prophétie de ce livre! '
  '8':
  - type: text
    content: 'C’est moi Jean, qui ai entendu et vu ces choses. Et quand j’eus entendu et vu, je tombai aux pieds de l’ange qui me les montrait, pour l’adorer. '
  '9':
  - type: text
    content: 'Mais il me dit: '
  - type: note
    content: Ac 10:26; 14:14. Ap 19:10.
  - type: text
    content: 'Garde-toi de le faire! Je suis ton compagnon de service, et celui de tes frères les prophètes, et de ceux qui gardent les paroles de ce livre. Adore Dieu. '
