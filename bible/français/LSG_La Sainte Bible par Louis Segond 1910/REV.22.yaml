- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. Éz 47:1-12. Ge 2:8-10; 3:22-24.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Et il me montra '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 47:1
      metadata:
        usfm: EZK.47.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 14:8
      metadata:
        usfm: ZEC.14.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un fleuve d’eau de la vie, limpide comme du cristal, qui sortait du trône de Dieu et de l’agneau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Au milieu de la place de la ville et sur les deux bords du fleuve, il y avait un '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 2:7
      metadata:
        usfm: REV.2.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'arbre de vie, produisant douze fois des fruits, rendant son fruit chaque mois, et dont les feuilles servaient à la guérison des nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il n’y aura plus d’anathème. Le trône de Dieu et de l’agneau sera dans la ville; ses serviteurs le serviront et verront sa face, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 3:12
      metadata:
        usfm: REV.3.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'son nom sera sur leurs fronts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 60:19
      metadata:
        usfm: ISA.60.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 14:7
      metadata:
        usfm: ZEC.14.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 21:23
      metadata:
        usfm: REV.21.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il n’y aura plus de nuit; et ils n’auront besoin ni de lampe ni de lumière, parce que le Seigneur Dieu les éclairera. Et ils régneront aux siècles des siècles.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conclusion du livre
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-16: cf. Ap 1:1-3, 7, 8. (Mt 16:27. Ga 6:7, 8.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et il me dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 19:9
      metadata:
        usfm: REV.19.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:5
      metadata:
        usfm: REV.21.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ces paroles sont certaines et véritables; et le Seigneur, le Dieu des esprits des prophètes, a envoyé son ange '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:1
      metadata:
        usfm: REV.1.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: pour montrer à ses serviteurs les choses qui doivent arriver bientôt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et voici, je viens bientôt.
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:3
      metadata:
        usfm: REV.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Heureux celui qui garde les paroles de la prophétie de ce livre! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'C’est moi Jean, qui ai entendu et vu ces choses. Et quand j’eus entendu et vu, je tombai aux pieds de l’ange qui me les montrait, pour l’adorer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais il me dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:26
      metadata:
        usfm: ACT.10.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:14
      metadata:
        usfm: ACT.14.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 19:10
      metadata:
        usfm: REV.19.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Garde-toi de le faire! Je suis ton compagnon de service, et celui de tes frères les prophètes, et de ceux qui gardent les paroles de ce livre. Adore Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et il me dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 8:26
      metadata:
        usfm: DAN.8.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:4
      metadata:
        usfm: DAN.12.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ne scelle point les paroles de la prophétie de ce livre. Car '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:3
      metadata:
        usfm: REV.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le temps est proche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Que celui qui est injuste soit encore injuste, que celui qui est souillé se souille encore; et que le juste pratique encore la justice, et que celui qui est saint se sanctifie encore.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Voici, je viens bientôt, et ma rétribution est avec moi,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 62:13
      metadata:
        usfm: PSA.62.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 17:10
      metadata:
        usfm: JER.17.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 32:19
      metadata:
        usfm: JER.32.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
