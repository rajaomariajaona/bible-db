      metadata:
        usfm: MAT.16.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 2:6
      metadata:
        usfm: ROM.2.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:12
      metadata:
        usfm: ROM.14.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 3:8
      metadata:
        usfm: 1CO.3.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:10
      metadata:
        usfm: 2CO.5.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 6:5
      metadata:
        usfm: GAL.6.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 2:23
      metadata:
        usfm: REV.2.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: pour rendre à chacun selon ce qu’est son œuvre.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:8
      metadata:
        usfm: REV.1.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:6
      metadata:
        usfm: REV.21.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je suis l’alpha et l’oméga,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 41:4
      metadata:
        usfm: ISA.41.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 44:6
      metadata:
        usfm: ISA.44.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 48:12
      metadata:
        usfm: ISA.48.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:8
      metadata:
        usfm: REV.1.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:6
      metadata:
        usfm: REV.21.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: le premier et le dernier, le commencement et la fin.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Heureux ceux qui lavent leurs robes, afin d’avoir droit à l’arbre de vie, et d’entrer par les portes dans la ville! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 6:10
      metadata:
        usfm: 1CO.6.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:5
      metadata:
        usfm: EPH.5.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:5
      metadata:
        usfm: COL.3.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: COL.3.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Dehors les chiens, les enchanteurs, les impudiques, les meurtriers, les idolâtres, et quiconque aime et pratique le mensonge!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:1
      metadata:
        usfm: REV.1.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Moi, Jésus, j’ai envoyé mon ange pour vous attester ces choses dans les Églises.
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 11:10
      metadata:
        usfm: ISA.11.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 15:12
      metadata:
        usfm: ROM.15.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 5:5
      metadata:
        usfm: REV.5.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je suis le rejeton et la postérité de David,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 1:19
      metadata:
        usfm: 2PE.1.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: l’étoile brillante du matin.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-21: cf. (És 55:1-3. Jn 7:37-39.) (Pr 30:5, 6. De 4:2.) Tit 2:11-14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et l’Esprit et l’épouse disent: Viens. Et que celui qui entend dise: Viens. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 55:1
      metadata:
        usfm: ISA.55.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:37
      metadata:
        usfm: JHN.7.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et que celui qui a soif vienne; que celui qui veut, prenne de l’eau de la vie, gratuitement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je le déclare à quiconque entend les paroles de la prophétie de ce livre: Si quelqu’un y ajoute quelque chose, Dieu le frappera des fléaux décrits dans ce livre; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:2
      metadata:
        usfm: DEU.4.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:32
      metadata:
        usfm: DEU.12.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 30:6
      metadata:
        usfm: PRO.30.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'si quelqu’un retranche quelque chose des paroles du livre de cette prophétie, Dieu retranchera sa part de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 13:8
      metadata:
        usfm: REV.13.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:8
      metadata:
        usfm: REV.17.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’arbre de la vie et de la ville sainte, décrits dans ce livre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Celui qui atteste ces choses dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Oui, je viens bientôt.
  - type: text
    text: ' Amen! Viens, Seigneur Jésus! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Que la grâce du Seigneur Jésus soit avec tous!
