document_id: HOS.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel à la repentance
  - type: heading
    content: 'V. 1-3: cf. Jé 3:12-15, 21-23; 31:18-21.'
  - type: text
    content: 'Israël, '
  - type: note
    content: Os 12:7.
  - type: text
    content: reviens à l’Éternel, ton Dieu,
  - type: text
    content: Car tu es tombé par ton iniquité.
  '2':
  - type: text
    content: Apportez avec vous des paroles,
  - type: text
    content: Et revenez à l’Éternel.
  - type: text
    content: 'Dites-lui: Pardonne toutes les iniquités,'
  - type: text
    content: Et reçois-nous favorablement!
  - type: text
    content: 'Nous t’offrirons, au lieu de taureaux, l’hommage de nos '
  - type: note
    content: Hé 13:15.
  - type: text
    content: lèvres.
  '3':
  - type: text
    content: L’Assyrien ne nous sauvera pas, nous ne monterons pas sur des chevaux,
  - type: text
    content: 'Et nous ne dirons plus à l’ouvrage de nos mains: Notre Dieu!'
  - type: text
    content: Car c’est auprès de toi que l’orphelin trouve compassion.
  - type: heading
    content: 'V. 4-9: cf. De 30:1-10. Éz 36:24, etc. Ro 11:25, etc.'
  '4':
  - type: text
    content: Je réparerai leur infidélité,
  - type: text
    content: J’aurai pour eux un amour sincère;
  - type: text
    content: Car ma colère s’est détournée d’eux.
  '5':
  - type: text
    content: Je serai comme la rosée pour Israël,
  - type: text
    content: Il fleurira comme le lis,
  - type: text
    content: Et il poussera des racines comme le Liban.
  '6':
  - type: text
    content: Ses rameaux s’étendront;
  - type: text
    content: Il aura la magnificence de l’olivier,
  - type: text
    content: Et les parfums du Liban.
  '7':
  - type: text
    content: Ils reviendront s’asseoir à son ombre,
  - type: text
    content: Ils redonneront la vie au froment,
  - type: text
    content: Et ils fleuriront comme la vigne;
  - type: text
    content: Ils auront la renommée du vin du Liban.
  '8':
  - type: text
    content: Éphraïm, qu’ai-je à faire encore avec les idoles?
  - type: text
    content: Je l’exaucerai, je le regarderai,
  - type: text
    content: Je serai pour lui comme un cyprès verdoyant.
  - type: text
    content: C’est de moi que tu recevras ton fruit.
  '9':
  - type: text
    content: Que celui qui est sage prenne garde à ces choses!
  - type: text
    content: Que celui qui est intelligent les comprenne!
  - type: text
    content: Car les voies de l’Éternel sont droites;
  - type: text
    content: Les justes y marcheront,
  - type: text
    content: Mais les rebelles y tomberont.
