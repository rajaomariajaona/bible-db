document_id: HOS.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à la repentance
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-3: cf. Jé 3:12-15, 21-23; 31:18-21.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Israël, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 12:7
      metadata:
        usfm: HOS.12.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: reviens à l’Éternel, ton Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu es tombé par ton iniquité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Apportez avec vous des paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et revenez à l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dites-lui: Pardonne toutes les iniquités,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et reçois-nous favorablement!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nous t’offrirons, au lieu de taureaux, l’hommage de nos '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:15
      metadata:
        usfm: HEB.13.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: lèvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L’Assyrien ne nous sauvera pas, nous ne monterons pas sur des chevaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et nous ne dirons plus à l’ouvrage de nos mains: Notre Dieu!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car c’est auprès de toi que l’orphelin trouve compassion.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 4-9: cf. De 30:1-10. Éz 36:24, etc. Ro 11:25, etc.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je réparerai leur infidélité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’aurai pour eux un amour sincère;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ma colère s’est détournée d’eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je serai comme la rosée pour Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fleurira comme le lis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il poussera des racines comme le Liban.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ses rameaux s’étendront;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il aura la magnificence de l’olivier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les parfums du Liban.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils reviendront s’asseoir à son ombre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils redonneront la vie au froment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils fleuriront comme la vigne;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils auront la renommée du vin du Liban.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Éphraïm, qu’ai-je à faire encore avec les idoles?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je l’exaucerai, je le regarderai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je serai pour lui comme un cyprès verdoyant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est de moi que tu recevras ton fruit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Que celui qui est sage prenne garde à ces choses!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que celui qui est intelligent les comprenne!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car les voies de l’Éternel sont droites;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les justes y marcheront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais les rebelles y tomberont.
