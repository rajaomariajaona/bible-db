document_id: JOB.35,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-16: cf. (Job 22:2-4, 12; 34:12-19.) (Mi 7:7-10. És 8:17.)'
  - type: text
    content: 'Élihu reprit et dit:'
  '10':
  - type: text
    content: 'Mais nul ne dit: Où est Dieu, mon créateur,'
  - type: text
    content: Qui inspire des chants d’allégresse pendant la nuit,
  '11':
  - type: text
    content: Qui nous instruit plus que les bêtes de la terre,
  - type: text
    content: Et nous donne l’intelligence plus qu’aux oiseaux du ciel?
  '12':
  - type: text
    content: 'On a beau crier alors, '
  - type: note
    content: Job 27:9. Pr 1:28; 15:29. És 1:15. Jé 11:11. Jn 9:31.
  - type: text
    content: Dieu ne répond pas,
  - type: text
    content: A cause de l’orgueil des méchants.
  '13':
  - type: text
    content: C’est en vain que l’on crie, Dieu n’écoute pas,
  - type: text
    content: Le Tout-Puissant n’y a point égard.
  '14':
  - type: text
    content: Bien que tu dises que tu ne le vois pas,
  - type: text
    content: 'Ta cause est devant lui: attends-le!'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Job 11:6.
  - type: text
    content: Mais, parce que sa colère ne sévit point encore,
  - type: text
    content: Ce n’est pas à dire qu’il ait peu souci du crime.
  '16':
  - type: text
    content: Ainsi Job ouvre vainement la bouche,
  - type: text
    content: Il multiplie les paroles sans intelligence.
  '2':
  - type: text
    content: Imagines-tu avoir raison,
  - type: text
    content: Penses-tu te justifier devant Dieu,
  '3':
  - type: text
    content: ' '
  - type: note
    content: Job 34:9.
  - type: text
    content: 'Quand tu dis: Que me sert-il,'
  - type: text
    content: Que me revient-il de ne pas pécher?
  '4':
  - type: text
    content: C’est à toi que je vais répondre,
  - type: text
    content: Et à tes amis en même temps.
  '5':
  - type: text
    content: Considère les cieux, et regarde!
  - type: text
    content: Vois les nuées, comme elles sont au-dessus de toi!
  '6':
  - type: text
    content: Si tu pèches, quel tort lui causes-tu?
  - type: text
    content: Et quand tes péchés se multiplient, que lui fais-tu?
  '7':
  - type: text
    content: ' '
  - type: note
    content: Job 22:2. Ps 16:2. Ro 11:35.
  - type: text
    content: Si tu es juste, que lui donnes-tu?
  - type: text
    content: Que reçoit-il de ta main?
  '8':
  - type: text
    content: Ta méchanceté ne peut nuire qu’à ton semblable,
  - type: text
    content: Ta justice n’est utile qu’au fils de l’homme.
  '9':
  - type: text
    content: On crie contre la multitude des oppresseurs,
  - type: text
    content: On se plaint de la violence d’un grand nombre;
