document_id: JOB.35
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-16: cf. (Job 22:2-4, 12; 34:12-19.) (Mi 7:7-10. És 8:17.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Élihu reprit et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Imagines-tu avoir raison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Penses-tu te justifier devant Dieu,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 34:9
      metadata:
        usfm: JOB.34.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand tu dis: Que me sert-il,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que me revient-il de ne pas pécher?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C’est à toi que je vais répondre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et à tes amis en même temps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Considère les cieux, et regarde!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vois les nuées, comme elles sont au-dessus de toi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Si tu pèches, quel tort lui causes-tu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et quand tes péchés se multiplient, que lui fais-tu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 22:2
      metadata:
        usfm: JOB.22.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 16:2
      metadata:
        usfm: PSA.16.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:35
      metadata:
        usfm: ROM.11.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Si tu es juste, que lui donnes-tu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que reçoit-il de ta main?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ta méchanceté ne peut nuire qu’à ton semblable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta justice n’est utile qu’au fils de l’homme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: On crie contre la multitude des oppresseurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: On se plaint de la violence d’un grand nombre;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais nul ne dit: Où est Dieu, mon créateur,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui inspire des chants d’allégresse pendant la nuit,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Qui nous instruit plus que les bêtes de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nous donne l’intelligence plus qu’aux oiseaux du ciel?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'On a beau crier alors, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 27:9
      metadata:
        usfm: JOB.27.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 1:28
      metadata:
        usfm: PRO.1.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:29
      metadata:
        usfm: PRO.15.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:15
      metadata:
        usfm: ISA.1.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 11:11
      metadata:
        usfm: JER.11.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 9:31
      metadata:
        usfm: JHN.9.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Dieu ne répond pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de l’orgueil des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C’est en vain que l’on crie, Dieu n’écoute pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Tout-Puissant n’y a point égard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Bien que tu dises que tu ne le vois pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ta cause est devant lui: attends-le!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 11:6
      metadata:
        usfm: JOB.11.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais, parce que sa colère ne sévit point encore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce n’est pas à dire qu’il ait peu souci du crime.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ainsi Job ouvre vainement la bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il multiplie les paroles sans intelligence.
