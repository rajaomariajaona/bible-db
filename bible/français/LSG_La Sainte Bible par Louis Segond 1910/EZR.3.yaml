document_id: EZR.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’autel des holocaustes rétabli
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. De 12:11-14. (Lé 23:33-36, 39-43. Né 8:13-18.) Ps 107.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le septième mois arriva, et les enfants d’Israël étaient dans leurs villes. Alors le peuple s’assembla comme un seul homme à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Josué, fils de Jotsadak, avec ses frères les sacrificateurs, et Zorobabel, fils de Schealthiel, avec ses frères, se levèrent et bâtirent l’autel du Dieu d’Israël, pour y offrir des holocaustes, selon '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 12:5
      metadata:
        usfm: DEU.12.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: DEU.12.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ce qui est écrit dans la loi de Moïse, homme de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils rétablirent l’autel sur ses fondements, quoiqu’ils eussent à craindre les peuples du pays, et ils y offrirent des holocaustes à l’Éternel, les holocaustes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 28:3
      metadata:
        usfm: NUM.28.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'du matin et du soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils célébrèrent la fête des tabernacles, comme il est écrit, et ils offrirent jour par jour des holocaustes, selon le nombre '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 23:24
      metadata:
        usfm: LEV.23.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 29:12
      metadata:
        usfm: NUM.29.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ordonné pour chaque jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Après cela, ils offrirent l’holocauste perpétuel, les holocaustes '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'No 28:11, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Né 10:33
      metadata:
        usfm: NEH.10.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des nouvelles lunes et de toutes les solennités consacrées à l’Éternel, et ceux de quiconque faisait des offrandes volontaires à l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dès le premier jour du septième mois, ils commencèrent à offrir à l’Éternel des holocaustes. Cependant les fondements du temple de l’Éternel n’étaient pas encore posés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: On donna de l’argent aux tailleurs de pierres et aux charpentiers, et des vivres, des boissons et de l’huile aux Sidoniens et aux Tyriens, pour qu’ils amenassent par mer jusqu’à Japho des bois de cèdre du Liban, suivant l’autorisation qu’on avait eue de Cyrus, roi de Perse.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les fondements du temple posés
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-13: cf. (1 R 6:1-3.) Ps 118.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'La seconde année depuis leur arrivée à la maison de Dieu à Jérusalem, au second mois, Zorobabel, fils de Schealthiel, Josué, fils de Jotsadak, avec le reste de leurs frères les sacrificateurs et les Lévites, et tous ceux qui étaient revenus de la captivité à Jérusalem, se mirent à l’œuvre et chargèrent les Lévites de vingt ans et au-dessus de surveiller les travaux de la maison de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et Josué, avec ses fils et ses frères, Kadmiel, avec ses fils, fils de Juda, les fils de Hénadad, avec leurs fils et leurs frères les Lévites, se préparèrent tous ensemble à surveiller ceux qui travaillaient à la maison de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lorsque les ouvriers posèrent les fondements du temple de l’Éternel, on fit assister les sacrificateurs en costume, avec les trompettes, et les Lévites, fils d’Asaph, avec les cymbales, afin qu’ils célébrassent l’Éternel, d’après les ordonnances de David, roi d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils chantaient, célébrant et louant l’Éternel par ces paroles: Car il est bon, car sa miséricorde pour Israël dure à toujours! Et tout le peuple poussait de grands cris de joie en célébrant l’Éternel, parce qu’on posait les fondements de la maison de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais plusieurs des sacrificateurs et des Lévites, et des chefs de famille âgés, qui avaient vu la première maison, pleuraient à grand bruit pendant qu’on posait sous leurs yeux les fondements de cette maison. Beaucoup d’autres faisaient éclater leur joie par des cris, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: en sorte qu’on ne pouvait distinguer le bruit des cris de joie d’avec le bruit des pleurs parmi le peuple, car le peuple poussait de grands cris dont le son s’entendait au loin.
