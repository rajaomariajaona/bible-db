document_id: NUM.32,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le pays de Galaad accordé aux tribus de Gad et de Ruben
  - type: heading
    content: 'V. 1-32: cf. Ge 13:10-12. (Jos 1:12-18; 22:1, etc.) (Ro 12:10; 14:19. Ph 2:4.)'
  - type: text
    content: 'Les fils de Ruben et les fils de Gad avaient une quantité considérable de troupeaux, et ils virent que le pays de Jaezer et le pays de Galaad étaient un lieu propre pour des troupeaux. '
  '10':
  - type: text
    content: 'La colère de l’Éternel s’enflamma ce jour-là, et il jura en disant: '
  '11':
  - type: note
    content: No 14:28. De 1:34.
  - type: text
    content: 'Ces hommes qui sont montés d’Égypte, depuis l’âge de vingt ans et au-dessus, ne verront point le pays que j’ai juré de donner à Abraham, à Isaac et à Jacob, car ils n’ont pas suivi pleinement ma voie, '
  '12':
  - type: text
    content: 'excepté Caleb, fils de Jephunné, le Kenizien, et Josué, fils de Nun, qui ont pleinement suivi la voie de l’Éternel. '
  '13':
  - type: text
    content: 'La colère de l’Éternel s’enflamma contre Israël, et il les fit errer dans le désert pendant quarante années, jusqu’à l’anéantissement de toute la génération qui avait fait le mal aux yeux de l’Éternel. '
  '14':
  - type: text
    content: 'Et voici, vous prenez la place de vos pères comme des rejetons d’hommes pécheurs, pour rendre la colère de l’Éternel encore plus ardente contre Israël. '
  '15':
  - type: text
    content: 'Car, si vous vous détournez de lui, il continuera de laisser Israël au désert, et vous causerez la perte de tout ce peuple. '
  '16':
  - type: text
    content: 'Ils s’approchèrent de Moïse, et ils dirent: Nous construirons ici des parcs pour nos troupeaux et des villes pour nos petits enfants; '
  '17':
  - type: text
    content: 'puis nous nous équiperons en hâte pour marcher devant les enfants d’Israël, jusqu’à ce que nous les ayons introduits dans le lieu qui leur est destiné; et nos petits enfants demeureront dans les villes fortes, à cause des habitants du pays. '
  '18':
  - type: text
    content: 'Nous ne retournerons point dans nos maisons avant que les enfants d’Israël aient pris possession chacun de son héritage; '
  '19':
  - type: text
    content: 'et nous ne posséderons rien avec eux de l’autre côté du Jourdain, ni plus loin, puisque nous aurons notre héritage de ce côté-ci du Jourdain, à l’orient. '
  '2':
  - type: text
    content: 'Alors les fils de Gad et les fils de Ruben vinrent auprès de Moïse, du sacrificateur Éléazar et des princes de l’assemblée, et ils leur dirent: '
  '20':
  - type: text
    content: 'Moïse leur dit: Si vous faites cela, si vous vous armez pour combattre devant l’Éternel, '
  '21':
  - type: text
    content: 'si tous ceux de vous qui s’armeront passent le Jourdain devant l’Éternel jusqu’à ce qu’il ait chassé ses ennemis loin de sa face, '
  '22':
  - type: text
    content: 'et si vous revenez seulement après que le pays aura été soumis devant l’Éternel, vous serez alors sans reproche vis-à-vis de l’Éternel et vis-à-vis d’Israël, et cette contrée-ci sera votre propriété devant l’Éternel. '
  '23':
  - type: text
    content: 'Mais si vous ne faites pas ainsi, vous péchez contre l’Éternel; sachez que votre péché vous atteindra. '
  '24':
  - type: text
    content: 'Construisez des villes pour vos petits enfants et des parcs pour vos troupeaux, et faites ce que votre bouche a déclaré. '
  '25':
  - type: text
    content: 'Les fils de Gad et les fils de Ruben dirent à Moïse: Tes serviteurs feront ce que mon seigneur ordonne. '
  '26':
  - type: text
    content: 'Nos petits enfants, nos femmes, nos troupeaux et tout notre bétail, resteront dans les villes de Galaad; '
  '27':
  - type: text
    content: 'et tes serviteurs, tous armés pour la guerre, iront combattre devant l’Éternel, comme dit mon seigneur. '
  '28':
  - type: note
    content: Jos 1:13; 4:12.
  - type: text
    content: 'Moïse donna des ordres à leur sujet au sacrificateur Éléazar, à Josué, fils de Nun, et aux chefs de famille dans les tribus des enfants d’Israël. '
  '29':
  - type: text
    content: 'Il leur dit: Si les fils de Gad et les fils de Ruben passent avec vous le Jourdain, tous armés pour combattre devant l’Éternel, et que le pays soit soumis devant vous, vous leur donnerez en propriété la contrée de Galaad. '
  '3':
  - type: text
    content: 'Atharoth, Dibon, Jaezer, Nimra, Hesbon, Élealé, Sebam, Nebo et Beon, '
  '30':
  - type: text
    content: 'Mais s’ils ne marchent point en armes avec vous, qu’ils s’établissent au milieu de vous dans le pays de Canaan. '
  '31':
  - type: text
    content: 'Les fils de Gad et les fils de Ruben répondirent: Nous ferons ce que l’Éternel a dit à tes serviteurs. '
  '32':
  - type: text
    content: Nous passerons en armes devant l’Éternel au pays de Canaan; mais que nous possédions notre héritage de ce côté-ci du Jourdain.
  - type: heading
    content: 'V. 33-42: cf. (De 3:8-17. Jos 13:8-32.)'
  '33':
  - type: text
    content: ' '
  - type: note
    content: De 3:12. Jos 13:8; 22:4.
  - type: text
    content: 'Moïse donna aux fils de Gad et aux fils de Ruben, et à la moitié de la tribu de Manassé, fils de Joseph, le royaume de Sihon, roi des Amoréens, et le royaume d’Og, roi de Basan, le pays avec ses villes, avec les territoires des villes du pays tout alentour. '
  '34':
  - type: text
    content: 'Les fils de Gad bâtirent Dibon, Atharoth, Aroër, '
  '35':
  - type: text
    content: 'Athroth-Schophan, Jaezer, Jogbeha, '
  '36':
  - type: text
    content: 'Beth-Nimra et Beth-Haran, villes fortes, et ils firent des parcs pour les troupeaux. '
  '37':
  - type: text
    content: 'Les fils de Ruben bâtirent Hesbon, Élealé et Kirjathaïm, '
  '38':
  - type: text
    content: 'Nebo et Baal-Meon, dont les noms furent changés, et Sibma, et ils donnèrent des noms aux villes qu’ils bâtirent. '
  '39':
  - type: note
    content: Ge 50:23.
  - type: text
    content: 'Les fils de Makir, fils de Manassé, marchèrent contre Galaad, et s’en emparèrent; ils chassèrent les Amoréens qui y étaient. '
  '4':
  - type: text
    content: 'ce pays que l’Éternel a frappé devant l’assemblée d’Israël, est un lieu propre pour des troupeaux, et tes serviteurs ont des troupeaux. '
  '40':
  - type: text
    content: 'Moïse donna Galaad à Makir, fils de Manassé, qui s’y établit. '
  '41':
  - type: text
    content: 'Jaïr, fils de Manassé, se mit en marche, prit les bourgs, et les appela bourgs de Jaïr. '
  '42':
  - type: text
    content: Nobach se mit en marche, prit Kenath avec les villes de son ressort, et l’appela Nobach, d’après son nom.
  '5':
  - type: text
    content: 'Ils ajoutèrent: Si nous avons trouvé grâce à tes yeux, que la possession de ce pays soit accordée à tes serviteurs, et ne nous fais point passer le Jourdain. '
  '6':
  - type: text
    content: 'Moïse répondit aux fils de Gad et aux fils de Ruben: Vos frères iront-ils à la guerre, et vous, resterez-vous ici? '
  '7':
  - type: text
    content: 'Pourquoi voulez-vous décourager les enfants d’Israël de passer dans le pays que l’Éternel leur donne? '
  '8':
  - type: text
    content: 'Ainsi firent vos pères, quand je les envoyai de '
  - type: note
    content: No 13:3. De 1:22.
  - type: text
    content: 'Kadès-Barnéa pour examiner le pays. '
  '9':
  - type: text
    content: 'Ils montèrent jusqu’à la vallée d’Eschcol, et, après avoir examiné le pays, ils découragèrent les enfants d’Israël d’aller dans le pays que l’Éternel leur donnait. '
