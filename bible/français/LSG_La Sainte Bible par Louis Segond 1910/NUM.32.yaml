document_id: NUM.32,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le pays de Galaad accordé aux tribus de Gad et de Ruben
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-32: cf. Ge 13:10-12. (Jos 1:12-18; 22:1, etc.) (Ro 12:10; 14:19. Ph 2:4.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils de Ruben et les fils de Gad avaient une quantité considérable de troupeaux, et ils virent que le pays de Jaezer et le pays de Galaad étaient un lieu propre pour des troupeaux. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La colère de l’Éternel s’enflamma ce jour-là, et il jura en disant: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 14:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 1:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ces hommes qui sont montés d’Égypte, depuis l’âge de vingt ans et au-dessus, ne verront point le pays que j’ai juré de donner à Abraham, à Isaac et à Jacob, car ils n’ont pas suivi pleinement ma voie, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'excepté Caleb, fils de Jephunné, le Kenizien, et Josué, fils de Nun, qui ont pleinement suivi la voie de l’Éternel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La colère de l’Éternel s’enflamma contre Israël, et il les fit errer dans le désert pendant quarante années, jusqu’à l’anéantissement de toute la génération qui avait fait le mal aux yeux de l’Éternel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici, vous prenez la place de vos pères comme des rejetons d’hommes pécheurs, pour rendre la colère de l’Éternel encore plus ardente contre Israël. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car, si vous vous détournez de lui, il continuera de laisser Israël au désert, et vous causerez la perte de tout ce peuple. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils s’approchèrent de Moïse, et ils dirent: Nous construirons ici des parcs pour nos troupeaux et des villes pour nos petits enfants; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'puis nous nous équiperons en hâte pour marcher devant les enfants d’Israël, jusqu’à ce que nous les ayons introduits dans le lieu qui leur est destiné; et nos petits enfants demeureront dans les villes fortes, à cause des habitants du pays. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous ne retournerons point dans nos maisons avant que les enfants d’Israël aient pris possession chacun de son héritage; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et nous ne posséderons rien avec eux de l’autre côté du Jourdain, ni plus loin, puisque nous aurons notre héritage de ce côté-ci du Jourdain, à l’orient. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les fils de Gad et les fils de Ruben vinrent auprès de Moïse, du sacrificateur Éléazar et des princes de l’assemblée, et ils leur dirent: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse leur dit: Si vous faites cela, si vous vous armez pour combattre devant l’Éternel, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'si tous ceux de vous qui s’armeront passent le Jourdain devant l’Éternel jusqu’à ce qu’il ait chassé ses ennemis loin de sa face, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et si vous revenez seulement après que le pays aura été soumis devant l’Éternel, vous serez alors sans reproche vis-à-vis de l’Éternel et vis-à-vis d’Israël, et cette contrée-ci sera votre propriété devant l’Éternel. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si vous ne faites pas ainsi, vous péchez contre l’Éternel; sachez que votre péché vous atteindra. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Construisez des villes pour vos petits enfants et des parcs pour vos troupeaux, et faites ce que votre bouche a déclaré. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils de Gad et les fils de Ruben dirent à Moïse: Tes serviteurs feront ce que mon seigneur ordonne. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nos petits enfants, nos femmes, nos troupeaux et tout notre bétail, resteront dans les villes de Galaad; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et tes serviteurs, tous armés pour la guerre, iront combattre devant l’Éternel, comme dit mon seigneur. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 1:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Moïse donna des ordres à leur sujet au sacrificateur Éléazar, à Josué, fils de Nun, et aux chefs de famille dans les tribus des enfants d’Israël. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur dit: Si les fils de Gad et les fils de Ruben passent avec vous le Jourdain, tous armés pour combattre devant l’Éternel, et que le pays soit soumis devant vous, vous leur donnerez en propriété la contrée de Galaad. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Atharoth, Dibon, Jaezer, Nimra, Hesbon, Élealé, Sebam, Nebo et Beon, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais s’ils ne marchent point en armes avec vous, qu’ils s’établissent au milieu de vous dans le pays de Canaan. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils de Gad et les fils de Ruben répondirent: Nous ferons ce que l’Éternel a dit à tes serviteurs. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous passerons en armes devant l’Éternel au pays de Canaan; mais que nous possédions notre héritage de ce côté-ci du Jourdain.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 33-42: cf. (De 3:8-17. Jos 13:8-32.)'
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 3:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 13:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Moïse donna aux fils de Gad et aux fils de Ruben, et à la moitié de la tribu de Manassé, fils de Joseph, le royaume de Sihon, roi des Amoréens, et le royaume d’Og, roi de Basan, le pays avec ses villes, avec les territoires des villes du pays tout alentour. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils de Gad bâtirent Dibon, Atharoth, Aroër, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Athroth-Schophan, Jaezer, Jogbeha, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beth-Nimra et Beth-Haran, villes fortes, et ils firent des parcs pour les troupeaux. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils de Ruben bâtirent Hesbon, Élealé et Kirjathaïm, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nebo et Baal-Meon, dont les noms furent changés, et Sibma, et ils donnèrent des noms aux villes qu’ils bâtirent. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 50:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les fils de Makir, fils de Manassé, marchèrent contre Galaad, et s’en emparèrent; ils chassèrent les Amoréens qui y étaient. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ce pays que l’Éternel a frappé devant l’assemblée d’Israël, est un lieu propre pour des troupeaux, et tes serviteurs ont des troupeaux. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse donna Galaad à Makir, fils de Manassé, qui s’y établit. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jaïr, fils de Manassé, se mit en marche, prit les bourgs, et les appela bourgs de Jaïr. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nobach se mit en marche, prit Kenath avec les villes de son ressort, et l’appela Nobach, d’après son nom.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ajoutèrent: Si nous avons trouvé grâce à tes yeux, que la possession de ce pays soit accordée à tes serviteurs, et ne nous fais point passer le Jourdain. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse répondit aux fils de Gad et aux fils de Ruben: Vos frères iront-ils à la guerre, et vous, resterez-vous ici? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pourquoi voulez-vous décourager les enfants d’Israël de passer dans le pays que l’Éternel leur donne? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi firent vos pères, quand je les envoyai de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 13:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 1:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Kadès-Barnéa pour examiner le pays. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils montèrent jusqu’à la vallée d’Eschcol, et, après avoir examiné le pays, ils découragèrent les enfants d’Israël d’aller dans le pays que l’Éternel leur donnait. '
