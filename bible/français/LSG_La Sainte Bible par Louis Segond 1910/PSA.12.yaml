document_id: PSA.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 14; 120. Ph 2:15.
  - type: text
    content: Au chef des chantres. Sur la harpe à huit cordes. Psaume de David.
  '2':
  - type: text
    content: 'Sauve, Éternel! Car '
  - type: note
    content: És 57:1.
  - type: text
    content: les hommes pieux s’en vont,
  - type: text
    content: Les fidèles disparaissent parmi les fils de l’homme.
  '3':
  - type: text
    content: On se dit des faussetés les uns aux autres,
  - type: text
    content: On a sur les lèvres des choses flatteuses,
  - type: text
    content: On parle avec un cœur double.
  '4':
  - type: text
    content: Que l’Éternel extermine toutes les lèvres flatteuses,
  - type: text
    content: La langue qui discourt avec arrogance,
  '5':
  - type: text
    content: 'Ceux qui disent: Nous sommes puissants par notre langue,'
  - type: text
    content: Nous avons nos lèvres avec nous;
  - type: text
    content: Qui serait notre maître?
  '6':
  - type: text
    content: Parce que les malheureux sont opprimés et que les pauvres gémissent,
  - type: text
    content: Maintenant, dit l’Éternel, je me lève,
  - type: text
    content: J’apporte le salut à ceux contre qui l’on souffle.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 2 S 22:31. Ps 18:31; 119:140. Pr 30:5.
  - type: text
    content: Les paroles de l’Éternel sont des paroles pures,
  - type: text
    content: Un argent éprouvé sur terre au creuset,
  - type: text
    content: Et sept fois épuré.
  '8':
  - type: text
    content: Toi, Éternel! Tu les garderas,
  - type: text
    content: Tu les préserveras de cette race à jamais.
  '9':
  - type: text
    content: Les méchants se promènent de toutes parts,
  - type: text
    content: Quand la bassesse règne parmi les fils de l’homme.
