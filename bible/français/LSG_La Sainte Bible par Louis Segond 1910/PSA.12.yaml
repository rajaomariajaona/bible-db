document_id: PSA.12,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 14; 120. Ph 2:15.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef des chantres. Sur la harpe à huit cordes. Psaume de David.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Sauve, Éternel! Car '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 57:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les hommes pieux s’en vont,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les fidèles disparaissent parmi les fils de l’homme.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: On se dit des faussetés les uns aux autres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On a sur les lèvres des choses flatteuses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On parle avec un cœur double.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Que l’Éternel extermine toutes les lèvres flatteuses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La langue qui discourt avec arrogance,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ceux qui disent: Nous sommes puissants par notre langue,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous avons nos lèvres avec nous;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui serait notre maître?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Parce que les malheureux sont opprimés et que les pauvres gémissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant, dit l’Éternel, je me lève,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’apporte le salut à ceux contre qui l’on souffle.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 22:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 18:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 119:140
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 30:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les paroles de l’Éternel sont des paroles pures,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un argent éprouvé sur terre au creuset,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sept fois épuré.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Toi, Éternel! Tu les garderas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu les préserveras de cette race à jamais.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Les méchants se promènent de toutes parts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand la bassesse règne parmi les fils de l’homme.
