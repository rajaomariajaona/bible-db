document_id: LAM.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La ruine de Jérusalem
  - type: heading
    content: 'V. 1-22: cf. (1 R 9:6-9. 2 R 21:12-15. Jé 19.) La 1; 4. Ap 6:17.'
  - type: text
    content: Eh quoi! Le Seigneur, dans sa colère, a couvert de nuages la fille de Sion!
  - type: text
    content: Il a précipité du ciel sur la terre la magnificence d’Israël!
  - type: text
    content: Il ne s’est pas souvenu de son marchepied,
  - type: text
    content: Au jour de sa colère!
  '10':
  - type: text
    content: Les anciens de la fille de Sion sont assis à terre, ils sont muets;
  - type: text
    content: Ils ont couvert leur tête de poussière,
  - type: text
    content: Ils se sont revêtus de sacs;
  - type: text
    content: Les vierges de Jérusalem laissent retomber leur tête vers la terre.
  '11':
  - type: text
    content: Mes yeux se consument dans les larmes, mes entrailles bouillonnent,
  - type: text
    content: Ma bile se répand sur la terre,
  - type: text
    content: A cause du désastre de la fille de mon peuple,
  - type: text
    content: Des enfants et des nourrissons en défaillance dans les rues de la ville.
  '12':
  - type: text
    content: 'Ils disaient à leurs mères:'
  - type: text
    content: Où y a-t-il du blé et du vin?
  - type: text
    content: Et ils tombaient comme des blessés dans les rues de la ville,
  - type: text
    content: Ils rendaient l’âme sur le sein de leurs mères.
  '13':
  - type: text
    content: Que dois-je te dire? À quoi te comparer, fille de Jérusalem?
  - type: text
    content: Qui trouver de semblable à toi, et quelle consolation te donner,
  - type: text
    content: Vierge, fille de Sion?
  - type: text
    content: 'Car ta plaie est grande comme la mer:'
  - type: text
    content: Qui pourra te guérir?
  '14':
  - type: text
    content: Tes prophètes ont eu pour toi des visions vaines et fausses;
  - type: text
    content: Ils n’ont pas mis à nu ton iniquité,
  - type: text
    content: Afin de détourner de toi la captivité;
  - type: text
    content: Ils t’ont donné des oracles mensongers et trompeurs.
  '15':
  - type: text
    content: Tous les passants battent des mains sur toi,
  - type: text
    content: 'Ils sifflent, ils secouent la tête contre la fille de Jérusalem:'
  - type: text
    content: Est-ce là cette ville qu’on appelait une beauté parfaite,
  - type: text
    content: La joie de toute la terre?
  '16':
  - type: text
    content: Tous tes ennemis ouvrent la bouche contre toi,
  - type: text
    content: Ils sifflent, ils grincent des dents,
  - type: text
    content: 'Ils disent: Nous l’avons engloutie!'
  - type: text
    content: C’est bien le jour que nous attendions, nous l’avons atteint, nous le voyons!
  '17':
  - type: text
    content: L’Éternel a exécuté ce qu’il avait résolu,
  - type: text
    content: Il a accompli la parole qu’il avait dès longtemps arrêtée,
  - type: text
    content: Il a détruit sans pitié;
  - type: text
    content: Il a fait de toi la joie de l’ennemi,
  - type: text
    content: Il a relevé la force de tes oppresseurs.
  '18':
  - type: text
    content: Leur cœur crie vers le Seigneur…
  - type: note
    content: Jé 14:17. La 1:16.
  - type: text
    content: Mur de la fille de Sion, répands jour et nuit des torrents de larmes!
  - type: text
    content: Ne te donne aucun relâche,
  - type: text
    content: Et que ton œil n’ait point de repos!
  '19':
  - type: text
    content: Lève-toi, pousse des gémissements à l’entrée des veilles de la nuit!
  - type: text
    content: Répands ton cœur comme de l’eau, en présence du Seigneur!
  - type: text
    content: Lève tes mains vers lui pour la vie de tes enfants
  - type: text
    content: Qui meurent de faim aux coins de toutes les rues!
  '2':
  - type: text
    content: Le Seigneur a détruit sans pitié toutes les demeures de Jacob;
  - type: text
    content: Il a, dans sa fureur, renversé les forteresses de la fille de Juda,
  - type: text
    content: Il les a fait rouler à terre;
  - type: text
    content: Il a profané le royaume et ses chefs.
  '20':
  - type: text
    content: Vois, Éternel, regarde qui tu as ainsi traité!
  - type: note
    content: La 4:10.
  - type: text
    content: Fallait-il que des femmes dévorassent le fruit de leurs entrailles,
  - type: text
    content: Les petits enfants objets de leur tendresse?
  - type: text
    content: Que sacrificateurs et prophètes fussent massacrés dans le sanctuaire du Seigneur?
  '21':
  - type: text
    content: Les enfants et les vieillards sont couchés par terre dans les rues;
  - type: text
    content: Mes vierges et mes jeunes hommes sont tombés par l’épée;
  - type: text
    content: Tu as tué, au jour de ta colère,
  - type: text
    content: Tu as égorgé sans pitié.
  '22':
  - type: text
    content: Tu as appelé de toutes parts sur moi l’épouvante, comme à un jour de fête.
  - type: text
    content: Au jour de la colère de l’Éternel, il n’y a eu ni réchappé ni survivant.
  - type: text
    content: Ceux que j’avais soignés et élevés,
  - type: text
    content: Mon ennemi les a consumés.
  '3':
  - type: text
    content: Il a, dans son ardente colère, abattu toute la force d’Israël;
  - type: text
    content: Il a retiré sa droite en présence de l’ennemi;
  - type: text
    content: Il a allumé dans Jacob des flammes de feu,
  - type: text
    content: Qui dévorent de tous côtés.
  '4':
  - type: text
    content: Il a tendu son arc comme un ennemi;
  - type: text
    content: Sa droite s’est dressée comme celle d’un assaillant;
  - type: text
    content: Il a fait périr tout ce qui plaisait aux regards;
  - type: text
    content: Il a répandu sa fureur comme un feu sur la tente de la fille de Sion.
  '5':
  - type: text
    content: Le Seigneur a été comme un ennemi;
  - type: text
    content: Il a dévoré Israël, il a dévoré tous ses palais,
  - type: text
    content: Il a détruit ses forteresses;
  - type: text
    content: Il a rempli la fille de Juda de plaintes et de gémissements.
  '6':
  - type: text
    content: Il a dévasté sa tente comme un jardin,
  - type: text
    content: Il a détruit le lieu de son assemblée;
  - type: text
    content: L’Éternel a fait oublier en Sion les fêtes et le sabbat,
  - type: text
    content: Et, dans sa violente colère, il a rejeté le roi et le sacrificateur.
  '7':
  - type: text
    content: Le Seigneur a dédaigné son autel, repoussé son sanctuaire;
  - type: text
    content: Il a livré entre les mains de l’ennemi les murs des palais de Sion;
  - type: text
    content: Les cris ont retenti dans la maison de l’Éternel,
  - type: text
    content: Comme en un jour de fête.
  '8':
  - type: text
    content: L’Éternel avait résolu de détruire les murs de la fille de Sion;
  - type: text
    content: Il a tendu le cordeau, il n’a pas retiré sa main sans les avoir anéantis;
  - type: text
    content: Il a plongé dans le deuil rempart et murailles,
  - type: text
    content: Qui n’offrent plus ensemble qu’une triste ruine.
  '9':
  - type: text
    content: Ses portes sont enfoncées dans la terre;
  - type: text
    content: Il en a détruit, rompu les barres.
  - type: text
    content: Son roi et ses chefs sont parmi les nations; il n’y a plus de loi.
  - type: text
    content: Même les prophètes ne reçoivent aucune vision de l’Éternel.
