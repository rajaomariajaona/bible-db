document_id: LAM.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La ruine de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-22: cf. (1 R 9:6-9. 2 R 21:12-15. Jé 19.) La 1; 4. Ap 6:17.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Eh quoi! Le Seigneur, dans sa colère, a couvert de nuages la fille de Sion!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a précipité du ciel sur la terre la magnificence d’Israël!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne s’est pas souvenu de son marchepied,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au jour de sa colère!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le Seigneur a détruit sans pitié toutes les demeures de Jacob;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a, dans sa fureur, renversé les forteresses de la fille de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les a fait rouler à terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a profané le royaume et ses chefs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il a, dans son ardente colère, abattu toute la force d’Israël;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a retiré sa droite en présence de l’ennemi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a allumé dans Jacob des flammes de feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui dévorent de tous côtés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il a tendu son arc comme un ennemi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa droite s’est dressée comme celle d’un assaillant;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a fait périr tout ce qui plaisait aux regards;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a répandu sa fureur comme un feu sur la tente de la fille de Sion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Le Seigneur a été comme un ennemi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a dévoré Israël, il a dévoré tous ses palais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a détruit ses forteresses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a rempli la fille de Juda de plaintes et de gémissements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il a dévasté sa tente comme un jardin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a détruit le lieu de son assemblée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel a fait oublier en Sion les fêtes et le sabbat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et, dans sa violente colère, il a rejeté le roi et le sacrificateur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le Seigneur a dédaigné son autel, repoussé son sanctuaire;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a livré entre les mains de l’ennemi les murs des palais de Sion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les cris ont retenti dans la maison de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme en un jour de fête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’Éternel avait résolu de détruire les murs de la fille de Sion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a tendu le cordeau, il n’a pas retiré sa main sans les avoir anéantis;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a plongé dans le deuil rempart et murailles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui n’offrent plus ensemble qu’une triste ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ses portes sont enfoncées dans la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il en a détruit, rompu les barres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son roi et ses chefs sont parmi les nations; il n’y a plus de loi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même les prophètes ne reçoivent aucune vision de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les anciens de la fille de Sion sont assis à terre, ils sont muets;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont couvert leur tête de poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se sont revêtus de sacs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les vierges de Jérusalem laissent retomber leur tête vers la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mes yeux se consument dans les larmes, mes entrailles bouillonnent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma bile se répand sur la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause du désastre de la fille de mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des enfants et des nourrissons en défaillance dans les rues de la ville.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils disaient à leurs mères:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où y a-t-il du blé et du vin?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils tombaient comme des blessés dans les rues de la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils rendaient l’âme sur le sein de leurs mères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Que dois-je te dire? À quoi te comparer, fille de Jérusalem?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui trouver de semblable à toi, et quelle consolation te donner,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vierge, fille de Sion?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car ta plaie est grande comme la mer:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui pourra te guérir?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tes prophètes ont eu pour toi des visions vaines et fausses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’ont pas mis à nu ton iniquité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin de détourner de toi la captivité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils t’ont donné des oracles mensongers et trompeurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tous les passants battent des mains sur toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils sifflent, ils secouent la tête contre la fille de Jérusalem:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce là cette ville qu’on appelait une beauté parfaite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La joie de toute la terre?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tous tes ennemis ouvrent la bouche contre toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sifflent, ils grincent des dents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils disent: Nous l’avons engloutie!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est bien le jour que nous attendions, nous l’avons atteint, nous le voyons!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L’Éternel a exécuté ce qu’il avait résolu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a accompli la parole qu’il avait dès longtemps arrêtée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a détruit sans pitié;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a fait de toi la joie de l’ennemi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a relevé la force de tes oppresseurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Leur cœur crie vers le Seigneur…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 14:17
      metadata:
        usfm: JER.14.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 1:16
      metadata:
        usfm: LAM.1.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mur de la fille de Sion, répands jour et nuit des torrents de larmes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne te donne aucun relâche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que ton œil n’ait point de repos!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Lève-toi, pousse des gémissements à l’entrée des veilles de la nuit!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Répands ton cœur comme de l’eau, en présence du Seigneur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lève tes mains vers lui pour la vie de tes enfants
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui meurent de faim aux coins de toutes les rues!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Vois, Éternel, regarde qui tu as ainsi traité!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 4:10
      metadata:
        usfm: LAM.4.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Fallait-il que des femmes dévorassent le fruit de leurs entrailles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les petits enfants objets de leur tendresse?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que sacrificateurs et prophètes fussent massacrés dans le sanctuaire du Seigneur?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Les enfants et les vieillards sont couchés par terre dans les rues;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes vierges et mes jeunes hommes sont tombés par l’épée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as tué, au jour de ta colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as égorgé sans pitié.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tu as appelé de toutes parts sur moi l’épouvante, comme à un jour de fête.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au jour de la colère de l’Éternel, il n’y a eu ni réchappé ni survivant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux que j’avais soignés et élevés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon ennemi les a consumés.
