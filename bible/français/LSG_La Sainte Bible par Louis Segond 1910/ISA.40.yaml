document_id: ISA.40
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La délivrance promise au peuple d’Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. Esd 1. Lu 3:1-6. És 52:7-12; 62:10, 11. (Éz 34:12-16. Jn 10:11-30.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Consolez, consolez mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit votre Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Parlez au cœur de Jérusalem, et criez-lui
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que sa servitude est finie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que son iniquité est expiée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’elle a reçu de la main de l’Éternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au double de tous ses péchés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:3
      metadata:
        usfm: MAT.3.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:3
      metadata:
        usfm: MRK.1.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:4
      metadata:
        usfm: LUK.3.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:23
      metadata:
        usfm: JHN.1.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Une voix crie:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Préparez au désert le chemin de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aplanissez dans les lieux arides
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une route pour notre Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Que toute vallée soit exhaussée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que toute montagne et toute colline soient abaissées!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que les coteaux se changent en plaines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les défilés étroits en vallons!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:14
      metadata:
        usfm: JHN.1.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Alors la gloire de l’Éternel sera révélée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et au même instant toute chair la verra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car la bouche de l’Éternel a parlé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Une voix dit: Crie!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et il répond: Que crierai-je?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 14:2
      metadata:
        usfm: JOB.14.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 90:5
      metadata:
        usfm: PSA.90.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: PSA.90.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 102:12
      metadata:
        usfm: PSA.102.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 103:15
      metadata:
        usfm: PSA.103.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:10
      metadata:
        usfm: JAS.1.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:24
      metadata:
        usfm: 1PE.1.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Toute chair est comme l’herbe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tout son éclat comme la fleur des champs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L’herbe sèche, la fleur tombe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand le vent de l’Éternel souffle dessus.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Certainement le peuple est comme l’herbe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’herbe sèche, la fleur tombe;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:25
      metadata:
        usfm: 1PE.1.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais la parole de notre Dieu subsiste éternellement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Monte sur une haute montagne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sion, pour publier la bonne nouvelle;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Élève avec force ta voix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jérusalem, pour publier la bonne nouvelle;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Élève ta voix, ne crains point,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dis aux villes de Juda: Voici votre Dieu!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Voici, le Seigneur, l’Éternel vient avec puissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de son bras il commande;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 62:11
      metadata:
        usfm: ISA.62.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: le salaire est avec lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les rétributions le précèdent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Comme un berger, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 34:23
      metadata:
        usfm: EZK.34.23
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '24'
      metadata:
        usfm: EZK.34.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 7:14
      metadata:
        usfm: MIC.7.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 10:11
      metadata:
        usfm: JHN.10.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: il paîtra son troupeau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il prendra les agneaux dans ses bras,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les portera dans son sein;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 49:10
      metadata:
        usfm: ISA.49.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: conduira les brebis qui allaitent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La puissance de Dieu et le néant des créatures
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-26: cf. Ro 11:33-36. (Ps 8:2-5. Job 38; 26:7-14; 12:7, etc.) Jé 10:6-16.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Qui a mesuré les eaux dans le creux de sa main,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pris les dimensions des cieux avec la paume,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ramassé la poussière de la terre dans un tiers de mesure?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a pesé les montagnes au crochet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les collines à la balance?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:34
      metadata:
        usfm: ROM.11.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 2:16
      metadata:
        usfm: 1CO.2.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qui a sondé l’esprit de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui l’a éclairé de ses conseils?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Avec qui a-t-il délibéré pour en recevoir de l’instruction?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui lui a appris le sentier de la justice?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui lui a enseigné la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et fait connaître le chemin de l’intelligence?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Voici, les nations sont comme une goutte d’un seau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles sont comme de la poussière sur une balance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, les îles sont comme une fine poussière qui s’envole.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le Liban ne suffit pas pour le feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses animaux ne suffisent pas pour l’holocauste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Toutes les nations sont devant lui comme un rien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Elles ne sont pour lui que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 4:35
      metadata:
        usfm: DAN.4.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: néant et vanité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 46:5
      metadata:
        usfm: ISA.46.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 17:29
      metadata:
        usfm: ACT.17.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: A qui voulez-vous comparer Dieu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et quelle image ferez-vous son égale?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: C’est un ouvrier qui fond l’idole,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et c’est un orfèvre qui la couvre d’or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et y soude des chaînettes d’argent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Celui que la pauvreté oblige à donner peu
- type: usfm
  marker: q1
  children:
  - type: text
    text: Choisit un bois qui résiste à la vermoulure;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il se procure un ouvrier capable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour faire une idole qui ne branle pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ne le savez-vous pas? Ne l’avez-vous pas appris?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne vous l’a-t-on pas fait connaître dès le commencement?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’avez-vous jamais réfléchi à la fondation de la terre?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C’est lui qui est assis au-dessus du cercle de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ceux qui l’habitent sont comme des sauterelles;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 9:8
      metadata:
        usfm: JOB.9.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 104:2
      metadata:
        usfm: PSA.104.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 44:24
      metadata:
        usfm: ISA.44.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: étend les cieux comme une étoffe légère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les déploie comme une tente, pour en faire sa demeure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'C’est lui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 12:21
      metadata:
        usfm: JOB.12.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 107:40
      metadata:
        usfm: PSA.107.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: qui réduit les princes au néant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui fait des juges de la terre une vanité;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ils ne sont pas même plantés, pas même semés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Leur tronc n’a pas même de racine en terre:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il souffle sur eux, et ils se dessèchent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et un tourbillon les emporte comme le chaume.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: A qui me comparerez-vous, pour que je lui ressemble?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Saint.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Levez vos yeux en haut, et regardez!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a créé ces choses?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui fait marcher en ordre leur armée?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les appelle toutes par leur nom;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par son grand pouvoir et par sa force puissante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’en est pas une qui fasse défaut.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 27-31: cf. És 41:10-14. Ps 84:6, 13.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Pourquoi dis-tu, Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pourquoi dis-tu, Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma destinée est cachée devant l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon droit passe inaperçu devant mon Dieu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ne le sais-tu pas? Ne l’as-tu pas appris?
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est le Dieu d’éternité, l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a créé les extrémités de la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne se fatigue point, il ne se lasse point;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 147:5
      metadata:
        usfm: PSA.147.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: On ne peut sonder son intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Il donne de la force à celui qui est fatigué,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il augmente la vigueur de celui qui tombe en défaillance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Les adolescents se fatiguent et se lassent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les jeunes hommes chancellent;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Mais ceux qui se confient en l’Éternel renouvellent leur force.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils prennent le vol comme les aigles;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils courent, et ne se lassent point,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils marchent, et ne se fatiguent point.
