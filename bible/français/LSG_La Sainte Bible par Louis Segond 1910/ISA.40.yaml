document_id: ISA.40,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La délivrance promise au peuple d’Israël
  - type: heading
    content: 'V. 1-11: cf. Esd 1. Lu 3:1-6. És 52:7-12; 62:10, 11. (Éz 34:12-16. Jn 10:11-30.)'
  - type: text
    content: Consolez, consolez mon peuple,
  - type: text
    content: Dit votre Dieu.
  '10':
  - type: text
    content: Voici, le Seigneur, l’Éternel vient avec puissance,
  - type: text
    content: Et de son bras il commande;
  - type: text
    content: 'Voici, '
  - type: note
    content: És 62:11.
  - type: text
    content: le salaire est avec lui,
  - type: text
    content: Et les rétributions le précèdent.
  '11':
  - type: text
    content: 'Comme un berger, '
  - type: note
    content: Éz 34:23, 24. Mi 7:14. Jn 10:11.
  - type: text
    content: il paîtra son troupeau,
  - type: text
    content: Il prendra les agneaux dans ses bras,
  - type: text
    content: Et les portera dans son sein;
  - type: text
    content: 'Il '
  - type: note
    content: És 49:10.
  - type: text
    content: conduira les brebis qui allaitent.
  - type: heading
    content: La puissance de Dieu et le néant des créatures
  - type: heading
    content: 'V. 12-26: cf. Ro 11:33-36. (Ps 8:2-5. Job 38; 26:7-14; 12:7, etc.) Jé 10:6-16.'
  '12':
  - type: text
    content: Qui a mesuré les eaux dans le creux de sa main,
  - type: text
    content: Pris les dimensions des cieux avec la paume,
  - type: text
    content: Et ramassé la poussière de la terre dans un tiers de mesure?
  - type: text
    content: Qui a pesé les montagnes au crochet,
  - type: text
    content: Et les collines à la balance?
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ro 11:34. 1 Co 2:16.
  - type: text
    content: Qui a sondé l’esprit de l’Éternel,
  - type: text
    content: Et qui l’a éclairé de ses conseils?
  '14':
  - type: text
    content: Avec qui a-t-il délibéré pour en recevoir de l’instruction?
  - type: text
    content: Qui lui a appris le sentier de la justice?
  - type: text
    content: Qui lui a enseigné la sagesse,
  - type: text
    content: Et fait connaître le chemin de l’intelligence?
  '15':
  - type: text
    content: Voici, les nations sont comme une goutte d’un seau,
  - type: text
    content: Elles sont comme de la poussière sur une balance;
  - type: text
    content: Voici, les îles sont comme une fine poussière qui s’envole.
  '16':
  - type: text
    content: Le Liban ne suffit pas pour le feu,
  - type: text
    content: Et ses animaux ne suffisent pas pour l’holocauste.
  '17':
  - type: text
    content: Toutes les nations sont devant lui comme un rien,
  - type: text
    content: 'Elles ne sont pour lui que '
  - type: note
    content: Da 4:35.
  - type: text
    content: néant et vanité.
  '18':
  - type: text
    content: ' '
  - type: note
    content: És 46:5. Ac 17:29.
  - type: text
    content: A qui voulez-vous comparer Dieu?
  - type: text
    content: Et quelle image ferez-vous son égale?
  '19':
  - type: text
    content: C’est un ouvrier qui fond l’idole,
  - type: text
    content: Et c’est un orfèvre qui la couvre d’or,
  - type: text
    content: Et y soude des chaînettes d’argent.
  '2':
  - type: text
    content: Parlez au cœur de Jérusalem, et criez-lui
  - type: text
    content: Que sa servitude est finie,
  - type: text
    content: Que son iniquité est expiée,
  - type: text
    content: Qu’elle a reçu de la main de l’Éternel
  - type: text
    content: Au double de tous ses péchés.
  '20':
  - type: text
    content: Celui que la pauvreté oblige à donner peu
  - type: text
    content: Choisit un bois qui résiste à la vermoulure;
  - type: text
    content: Il se procure un ouvrier capable,
  - type: text
    content: Pour faire une idole qui ne branle pas.
  '21':
  - type: text
    content: Ne le savez-vous pas? Ne l’avez-vous pas appris?
  - type: text
    content: Ne vous l’a-t-on pas fait connaître dès le commencement?
  - type: text
    content: N’avez-vous jamais réfléchi à la fondation de la terre?
  '22':
  - type: text
    content: C’est lui qui est assis au-dessus du cercle de la terre,
  - type: text
    content: Et ceux qui l’habitent sont comme des sauterelles;
  - type: text
    content: 'Il '
  - type: note
    content: Job 9:8. Ps 104:2. És 44:24.
  - type: text
    content: étend les cieux comme une étoffe légère,
  - type: text
    content: Il les déploie comme une tente, pour en faire sa demeure.
  '23':
  - type: text
    content: 'C’est lui '
  - type: note
    content: Job 12:21. Ps 107:40.
  - type: text
    content: qui réduit les princes au néant,
  - type: text
    content: Et qui fait des juges de la terre une vanité;
  '24':
  - type: text
    content: Ils ne sont pas même plantés, pas même semés,
  - type: text
    content: 'Leur tronc n’a pas même de racine en terre:'
  - type: text
    content: Il souffle sur eux, et ils se dessèchent,
  - type: text
    content: Et un tourbillon les emporte comme le chaume.
  '25':
  - type: text
    content: A qui me comparerez-vous, pour que je lui ressemble?
  - type: text
    content: Dit le Saint.
  '26':
  - type: text
    content: Levez vos yeux en haut, et regardez!
  - type: text
    content: Qui a créé ces choses?
  - type: text
    content: Qui fait marcher en ordre leur armée?
  - type: text
    content: Il les appelle toutes par leur nom;
  - type: text
    content: Par son grand pouvoir et par sa force puissante,
  - type: text
    content: Il n’en est pas une qui fasse défaut.
  - type: heading
    content: 'V. 27-31: cf. És 41:10-14. Ps 84:6, 13.'
  '27':
  - type: text
    content: Pourquoi dis-tu, Jacob,
  - type: text
    content: 'Pourquoi dis-tu, Israël:'
  - type: text
    content: Ma destinée est cachée devant l’Éternel,
  - type: text
    content: Mon droit passe inaperçu devant mon Dieu?
  '28':
  - type: text
    content: Ne le sais-tu pas? Ne l’as-tu pas appris?
  - type: text
    content: C’est le Dieu d’éternité, l’Éternel,
  - type: text
    content: Qui a créé les extrémités de la terre;
  - type: text
    content: Il ne se fatigue point, il ne se lasse point;
  - type: note
    content: Ps 147:5.
  - type: text
    content: On ne peut sonder son intelligence.
  '29':
  - type: text
    content: Il donne de la force à celui qui est fatigué,
  - type: text
    content: Et il augmente la vigueur de celui qui tombe en défaillance.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Mt 3:3. Mc 1:3. Lu 3:4. Jn 1:23.
  - type: text
    content: 'Une voix crie:'
  - type: text
    content: Préparez au désert le chemin de l’Éternel,
  - type: text
    content: Aplanissez dans les lieux arides
  - type: text
    content: Une route pour notre Dieu.
  '30':
  - type: text
    content: Les adolescents se fatiguent et se lassent,
  - type: text
    content: Et les jeunes hommes chancellent;
  '31':
  - type: text
    content: Mais ceux qui se confient en l’Éternel renouvellent leur force.
  - type: text
    content: Ils prennent le vol comme les aigles;
  - type: text
    content: Ils courent, et ne se lassent point,
  - type: text
    content: Ils marchent, et ne se fatiguent point.
  '4':
  - type: text
    content: Que toute vallée soit exhaussée,
  - type: text
    content: Que toute montagne et toute colline soient abaissées!
  - type: text
    content: Que les coteaux se changent en plaines,
  - type: text
    content: Et les défilés étroits en vallons!
  '5':
  - type: text
    content: ' '
  - type: note
    content: Jn 1:14.
  - type: text
    content: Alors la gloire de l’Éternel sera révélée,
  - type: text
    content: Et au même instant toute chair la verra;
  - type: text
    content: Car la bouche de l’Éternel a parlé.
  '6':
  - type: text
    content: 'Une voix dit: Crie!'
  - type: text
    content: 'Et il répond: Que crierai-je?'
  - type: note
    content: Job 14:2. Ps 90:5, 6; 102:12; 103:15. Ja 1:10. 1 Pi 1:24.
  - type: text
    content: Toute chair est comme l’herbe,
  - type: text
    content: Et tout son éclat comme la fleur des champs.
  '7':
  - type: text
    content: L’herbe sèche, la fleur tombe,
  - type: text
    content: Quand le vent de l’Éternel souffle dessus.
  - type: text
    content: 'Certainement le peuple est comme l’herbe:'
  '8':
  - type: text
    content: L’herbe sèche, la fleur tombe;
  - type: note
    content: 1 Pi 1:25.
  - type: text
    content: Mais la parole de notre Dieu subsiste éternellement.
  '9':
  - type: text
    content: Monte sur une haute montagne,
  - type: text
    content: Sion, pour publier la bonne nouvelle;
  - type: text
    content: Élève avec force ta voix,
  - type: text
    content: Jérusalem, pour publier la bonne nouvelle;
  - type: text
    content: Élève ta voix, ne crains point,
  - type: text
    content: 'Dis aux villes de Juda: Voici votre Dieu!'
