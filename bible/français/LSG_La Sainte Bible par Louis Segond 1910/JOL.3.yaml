document_id: JOL.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le jugement des nations
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-17: cf. 2 Ch 20:1-30. (Za 12:1-9, 14. Ap 14:14-20.)'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Car voici, en ces jours, en ce temps-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je ramènerai les captifs de Juda et de Jérusalem,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: De vos hoyaux forgez des épées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de vos serpes des lances!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que le faible dise: Je suis fort!'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hâtez-vous et venez, vous toutes, nations d’alentour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et rassemblez-vous!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là, ô Éternel, fais descendre tes héros!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Que les nations se réveillent, et qu’elles montent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vers la vallée de Josaphat!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car là je siégerai pour juger toutes les nations d’alentour.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 14:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Saisissez la faucille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la moisson est mûre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Venez, foulez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car le pressoir est plein,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les cuves regorgent!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car grande est leur méchanceté,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: C’est une multitude, une multitude,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans la vallée du jugement;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car le jour de l’Éternel est proche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans la vallée du jugement.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 2:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le soleil et la lune s’obscurcissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les étoiles retirent leur éclat.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: De Sion l’Éternel rugit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De Jérusalem il fait entendre sa voix;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les cieux et la terre sont ébranlés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’Éternel est un refuge pour son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un abri pour les enfants d’Israël.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Et vous saurez que je suis l’Éternel, votre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Résidant à Sion, ma sainte montagne.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem sera sainte,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 21:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et les étrangers n’y passeront plus.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 18-21: cf. Éz 47:1-12; 48:35. Am 9:13-15.'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'En ce temps-là, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 9:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: le moût ruissellera des montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le lait coulera des collines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il y aura de l’eau dans tous les torrents de Juda;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une source sortira aussi de la maison de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et arrosera la vallée de Sittim.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: L’Égypte sera dévastée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Édom sera réduit en désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause des violences contre les enfants de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dont ils ont répandu le sang innocent dans leur pays.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Je rassemblerai toutes les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je les ferai descendre dans la vallée de Josaphat;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là, j’entrerai en jugement avec elles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au sujet de mon peuple, d’Israël, mon héritage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’elles ont dispersé parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et au sujet de mon pays qu’elles se sont partagé.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mais Juda sera toujours habité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Jérusalem, de génération en génération.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Je vengerai leur sang que je n’ai point encore vengé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et L’Éternel résidera dans Sion.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ils ont tiré mon peuple au sort;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont donné le jeune garçon pour une prostituée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont vendu la jeune fille pour du vin, et ils ont bu.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Que me voulez-vous, Tyr et Sidon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous tous, districts des Philistins?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voulez-vous tirer vengeance de moi?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si vous voulez vous venger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai bien vite retomber votre vengeance sur vos têtes.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Vous avez pris mon argent et mon or;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ce que j’avais de plus précieux et de plus beau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous l’avez emporté dans vos temples.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Vous avez vendu les enfants de Juda et de Jérusalem aux enfants de Javan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin de les éloigner de leur territoire.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Voici, je les ferai revenir du lieu où vous les avez vendus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ferai retomber votre vengeance sur vos têtes.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Je vendrai vos fils et vos filles aux enfants de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils les vendront aux Sabéens, nation lointaine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel a parlé.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Publiez ces choses parmi les nations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Préparez la guerre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réveillez les héros!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils s’approchent, qu’ils montent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les hommes de guerre!
