document_id: JOL.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jugement des nations
  - type: heading
    content: 'V. 1-17: cf. 2 Ch 20:1-30. (Za 12:1-9, 14. Ap 14:14-20.)'
  - type: text
    content: Car voici, en ces jours, en ce temps-là,
  - type: text
    content: Quand je ramènerai les captifs de Juda et de Jérusalem,
  '10':
  - type: text
    content: De vos hoyaux forgez des épées,
  - type: text
    content: Et de vos serpes des lances!
  - type: text
    content: 'Que le faible dise: Je suis fort!'
  '11':
  - type: text
    content: Hâtez-vous et venez, vous toutes, nations d’alentour,
  - type: text
    content: Et rassemblez-vous!
  - type: text
    content: Là, ô Éternel, fais descendre tes héros!
  '12':
  - type: text
    content: Que les nations se réveillent, et qu’elles montent
  - type: text
    content: Vers la vallée de Josaphat!
  - type: text
    content: Car là je siégerai pour juger toutes les nations d’alentour.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ap 14:15.
  - type: text
    content: Saisissez la faucille,
  - type: text
    content: Car la moisson est mûre!
  - type: text
    content: Venez, foulez,
  - type: text
    content: Car le pressoir est plein,
  - type: text
    content: Les cuves regorgent!
  - type: text
    content: Car grande est leur méchanceté,
  '14':
  - type: text
    content: C’est une multitude, une multitude,
  - type: text
    content: Dans la vallée du jugement;
  - type: text
    content: Car le jour de l’Éternel est proche,
  - type: text
    content: Dans la vallée du jugement.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Joë 2:10, 31.
  - type: text
    content: Le soleil et la lune s’obscurcissent,
  - type: text
    content: Et les étoiles retirent leur éclat.
  '16':
  - type: text
    content: De Sion l’Éternel rugit,
  - type: text
    content: De Jérusalem il fait entendre sa voix;
  - type: text
    content: Les cieux et la terre sont ébranlés.
  - type: text
    content: Mais l’Éternel est un refuge pour son peuple,
  - type: text
    content: Un abri pour les enfants d’Israël.
  '17':
  - type: text
    content: Et vous saurez que je suis l’Éternel, votre Dieu,
  - type: text
    content: Résidant à Sion, ma sainte montagne.
  - type: text
    content: Jérusalem sera sainte,
  - type: note
    content: Ap 21:27.
  - type: text
    content: Et les étrangers n’y passeront plus.
  - type: heading
    content: 'V. 18-21: cf. Éz 47:1-12; 48:35. Am 9:13-15.'
  '18':
  - type: text
    content: 'En ce temps-là, '
  - type: note
    content: Am 9:13.
  - type: text
    content: le moût ruissellera des montagnes,
  - type: text
    content: Le lait coulera des collines,
  - type: text
    content: Et il y aura de l’eau dans tous les torrents de Juda;
  - type: text
    content: Une source sortira aussi de la maison de l’Éternel,
  - type: text
    content: Et arrosera la vallée de Sittim.
  '19':
  - type: text
    content: L’Égypte sera dévastée,
  - type: text
    content: Édom sera réduit en désert,
  - type: text
    content: A cause des violences contre les enfants de Juda,
  - type: text
    content: Dont ils ont répandu le sang innocent dans leur pays.
  '2':
  - type: text
    content: Je rassemblerai toutes les nations,
  - type: text
    content: Et je les ferai descendre dans la vallée de Josaphat;
  - type: text
    content: Là, j’entrerai en jugement avec elles,
  - type: text
    content: Au sujet de mon peuple, d’Israël, mon héritage,
  - type: text
    content: Qu’elles ont dispersé parmi les nations,
  - type: text
    content: Et au sujet de mon pays qu’elles se sont partagé.
  '20':
  - type: text
    content: Mais Juda sera toujours habité,
  - type: text
    content: Et Jérusalem, de génération en génération.
  '21':
  - type: text
    content: Je vengerai leur sang que je n’ai point encore vengé,
  - type: text
    content: Et L’Éternel résidera dans Sion.
  '3':
  - type: text
    content: Ils ont tiré mon peuple au sort;
  - type: text
    content: Ils ont donné le jeune garçon pour une prostituée,
  - type: text
    content: Ils ont vendu la jeune fille pour du vin, et ils ont bu.
  '4':
  - type: text
    content: Que me voulez-vous, Tyr et Sidon,
  - type: text
    content: Et vous tous, districts des Philistins?
  - type: text
    content: Voulez-vous tirer vengeance de moi?
  - type: text
    content: Si vous voulez vous venger,
  - type: text
    content: Je ferai bien vite retomber votre vengeance sur vos têtes.
  '5':
  - type: text
    content: Vous avez pris mon argent et mon or;
  - type: text
    content: Et ce que j’avais de plus précieux et de plus beau,
  - type: text
    content: Vous l’avez emporté dans vos temples.
  '6':
  - type: text
    content: Vous avez vendu les enfants de Juda et de Jérusalem aux enfants de Javan,
  - type: text
    content: Afin de les éloigner de leur territoire.
  '7':
  - type: text
    content: Voici, je les ferai revenir du lieu où vous les avez vendus,
  - type: text
    content: Et je ferai retomber votre vengeance sur vos têtes.
  '8':
  - type: text
    content: Je vendrai vos fils et vos filles aux enfants de Juda,
  - type: text
    content: Et ils les vendront aux Sabéens, nation lointaine;
  - type: text
    content: Car l’Éternel a parlé.
  '9':
  - type: text
    content: Publiez ces choses parmi les nations!
  - type: text
    content: Préparez la guerre!
  - type: text
    content: Réveillez les héros!
  - type: text
    content: Qu’ils s’approchent, qu’ils montent,
  - type: text
    content: Tous les hommes de guerre!
