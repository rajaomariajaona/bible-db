document_id: PSA.145,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 146; 147; 111. De 32:3.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louange. De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’exalterai, ô mon Dieu, mon roi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je bénirai ton nom à toujours et à perpétuité.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes tes œuvres te loueront, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tes fidèles te béniront.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils diront la gloire de ton règne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils proclameront ta puissance,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour faire connaître aux fils de l’homme ta puissance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la splendeur glorieuse de ton règne.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton règne est un règne de tous les siècles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ta domination subsiste dans tous les âges.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel soutient tous ceux qui tombent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il redresse tous ceux qui sont courbés.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 104:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les yeux de tous espèrent en toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu leur donnes la nourriture en son temps.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ouvres ta main,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu rassasies à souhait tout ce qui a vie.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est juste dans toutes ses voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et miséricordieux dans toutes ses œuvres.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est près de tous ceux qui l’invoquent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De tous ceux qui l’invoquent avec sincérité;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il accomplit les désirs de ceux qui le craignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il entend leur cri et il les sauve.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chaque jour je te bénirai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je célébrerai ton nom à toujours et à perpétuité.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel garde tous ceux qui l’aiment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il détruit tous les méchants.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ma bouche publie la louange de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que toute chair bénisse son saint nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A toujours et à perpétuité!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 18:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 105:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’Éternel est grand et très digne de louange,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 5:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et sa grandeur est insondable.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 4:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que chaque génération célèbre tes œuvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et publie tes hauts faits!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je dirai la splendeur glorieuse de ta majesté;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je chanterai tes merveilles.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On parlera de ta puissance redoutable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je raconterai ta grandeur.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 119:171
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qu’on proclame le souvenir de ton immense bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’on célèbre ta justice!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 34:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 14:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 86:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 103:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’Éternel est miséricordieux et compatissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lent à la colère et plein de bonté.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est bon envers tous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses compassions s’étendent sur toutes ses œuvres.
