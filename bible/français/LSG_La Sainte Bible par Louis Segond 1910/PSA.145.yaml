document_id: PSA.145
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 146; 147; 111. De 32:3.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louange. De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’exalterai, ô mon Dieu, mon roi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je bénirai ton nom à toujours et à perpétuité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Chaque jour je te bénirai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je célébrerai ton nom à toujours et à perpétuité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 18:4
      metadata:
        usfm: PSA.18.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 105:2
      metadata:
        usfm: PSA.105.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’Éternel est grand et très digne de louange,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 5:9
      metadata:
        usfm: JOB.5.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et sa grandeur est insondable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:9
      metadata:
        usfm: DEU.4.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:7
      metadata:
        usfm: DEU.6.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Que chaque génération célèbre tes œuvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et publie tes hauts faits!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je dirai la splendeur glorieuse de ta majesté;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je chanterai tes merveilles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: On parlera de ta puissance redoutable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je raconterai ta grandeur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 119:171
      metadata:
        usfm: PSA.119.171
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qu’on proclame le souvenir de ton immense bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’on célèbre ta justice!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 34:6
      metadata:
        usfm: EXO.34.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: EXO.34.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 14:18
      metadata:
        usfm: NUM.14.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 86:15
      metadata:
        usfm: PSA.86.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 103:8
      metadata:
        usfm: PSA.103.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’Éternel est miséricordieux et compatissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lent à la colère et plein de bonté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’Éternel est bon envers tous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses compassions s’étendent sur toutes ses œuvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Toutes tes œuvres te loueront, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes fidèles te béniront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils diront la gloire de ton règne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils proclameront ta puissance,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Pour faire connaître aux fils de l’homme ta puissance
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la splendeur glorieuse de ton règne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ton règne est un règne de tous les siècles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ta domination subsiste dans tous les âges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L’Éternel soutient tous ceux qui tombent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il redresse tous ceux qui sont courbés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 104:27
      metadata:
        usfm: PSA.104.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les yeux de tous espèrent en toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu leur donnes la nourriture en son temps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tu ouvres ta main,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu rassasies à souhait tout ce qui a vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L’Éternel est juste dans toutes ses voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et miséricordieux dans toutes ses œuvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: L’Éternel est près de tous ceux qui l’invoquent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De tous ceux qui l’invoquent avec sincérité;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il accomplit les désirs de ceux qui le craignent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il entend leur cri et il les sauve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: L’Éternel garde tous ceux qui l’aiment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il détruit tous les méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Que ma bouche publie la louange de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que toute chair bénisse son saint nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A toujours et à perpétuité!
