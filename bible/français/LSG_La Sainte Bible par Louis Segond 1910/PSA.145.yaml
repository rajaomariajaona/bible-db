document_id: PSA.145,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 146; 147; 111. De 32:3.
  - type: text
    content: Louange. De David.
  - type: text
    content: Je t’exalterai, ô mon Dieu, mon roi!
  - type: text
    content: Et je bénirai ton nom à toujours et à perpétuité.
  '10':
  - type: text
    content: Toutes tes œuvres te loueront, ô Éternel!
  - type: text
    content: Et tes fidèles te béniront.
  '11':
  - type: text
    content: Ils diront la gloire de ton règne,
  - type: text
    content: Et ils proclameront ta puissance,
  '12':
  - type: text
    content: Pour faire connaître aux fils de l’homme ta puissance
  - type: text
    content: Et la splendeur glorieuse de ton règne.
  '13':
  - type: text
    content: Ton règne est un règne de tous les siècles,
  - type: text
    content: Et ta domination subsiste dans tous les âges.
  '14':
  - type: text
    content: L’Éternel soutient tous ceux qui tombent,
  - type: text
    content: Et il redresse tous ceux qui sont courbés.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ps 104:27.
  - type: text
    content: Les yeux de tous espèrent en toi,
  - type: text
    content: Et tu leur donnes la nourriture en son temps.
  '16':
  - type: text
    content: Tu ouvres ta main,
  - type: text
    content: Et tu rassasies à souhait tout ce qui a vie.
  '17':
  - type: text
    content: L’Éternel est juste dans toutes ses voies,
  - type: text
    content: Et miséricordieux dans toutes ses œuvres.
  '18':
  - type: text
    content: L’Éternel est près de tous ceux qui l’invoquent,
  - type: text
    content: De tous ceux qui l’invoquent avec sincérité;
  '19':
  - type: text
    content: Il accomplit les désirs de ceux qui le craignent,
  - type: text
    content: Il entend leur cri et il les sauve.
  '2':
  - type: text
    content: Chaque jour je te bénirai,
  - type: text
    content: Et je célébrerai ton nom à toujours et à perpétuité.
  '20':
  - type: text
    content: L’Éternel garde tous ceux qui l’aiment,
  - type: text
    content: Et il détruit tous les méchants.
  '21':
  - type: text
    content: Que ma bouche publie la louange de l’Éternel,
  - type: text
    content: Et que toute chair bénisse son saint nom,
  - type: text
    content: A toujours et à perpétuité!
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps 18:4; 105:2.
  - type: text
    content: L’Éternel est grand et très digne de louange,
  - type: note
    content: Job 5:9.
  - type: text
    content: Et sa grandeur est insondable.
  '4':
  - type: text
    content: ' '
  - type: note
    content: De 4:9; 6:7.
  - type: text
    content: Que chaque génération célèbre tes œuvres,
  - type: text
    content: Et publie tes hauts faits!
  '5':
  - type: text
    content: Je dirai la splendeur glorieuse de ta majesté;
  - type: text
    content: Je chanterai tes merveilles.
  '6':
  - type: text
    content: On parlera de ta puissance redoutable,
  - type: text
    content: Et je raconterai ta grandeur.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps 119:171.
  - type: text
    content: Qu’on proclame le souvenir de ton immense bonté,
  - type: text
    content: Et qu’on célèbre ta justice!
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ex 34:6, 7. No 14:18. Ps 86:15; 103:8.
  - type: text
    content: L’Éternel est miséricordieux et compatissant,
  - type: text
    content: Lent à la colère et plein de bonté.
  '9':
  - type: text
    content: L’Éternel est bon envers tous,
  - type: text
    content: Et ses compassions s’étendent sur toutes ses œuvres.
