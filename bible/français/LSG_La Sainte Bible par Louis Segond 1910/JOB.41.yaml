document_id: JOB.41
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nul n’est assez hardi pour l’exciter;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui donc me résisterait en face?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:35
      metadata:
        usfm: ROM.11.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: De qui suis-je le débiteur? Je le paierai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 19:5
      metadata:
        usfm: EXO.19.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:14
      metadata:
        usfm: DEU.10.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 24:1
      metadata:
        usfm: PSA.24.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 50:12
      metadata:
        usfm: PSA.50.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:26
      metadata:
        usfm: 1CO.10.26
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '28'
      metadata:
        usfm: 1CO.10.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Sous le ciel tout m’appartient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je veux encore parler de ses membres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de sa force, et de la beauté de sa structure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Qui soulèvera son vêtement?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui pénétrera entre ses mâchoires?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Qui ouvrira les portes de sa gueule?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Autour de ses dents habite la terreur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ses magnifiques et puissants boucliers
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sont unis ensemble comme par un sceau;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils se serrent l’un contre l’autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’air ne passerait pas entre eux;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ce sont des frères qui s’embrassent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Se saisissent, demeurent inséparables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ses éternuements font briller la lumière;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses yeux sont comme les paupières de l’aurore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Des flammes jaillissent de sa bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des étincelles de feu s’en échappent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Une fumée sort de ses narines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme d’un vase qui bout, d’une chaudière ardente.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Son souffle allume les charbons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa gueule lance la flamme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: La force a son cou pour demeure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’effroi bondit au-devant de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ses parties charnues tiennent ensemble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fondues sur lui, inébranlables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Son cœur est dur comme la pierre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dur comme la meule inférieure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Quand il se lève, les plus vaillants ont peur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’épouvante les fait fuir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: C’est en vain qu’on l’attaque avec l’épée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La lance, le javelot, la cuirasse, ne servent à rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il regarde le fer comme de la paille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’airain comme du bois pourri.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: La flèche ne le met pas en fuite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les pierres de la fronde sont pour lui du chaume.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il ne voit dans la massue qu’un brin de paille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il rit au sifflement des dards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Sous son ventre sont des pointes aiguës:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: On dirait une herse qu’il étend sur le limon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il fait bouillir le fond de la mer comme une chaudière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il l’agite comme un vase rempli de parfums.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Il laisse après lui un sentier lumineux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’abîme prend la chevelure d’un vieillard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Sur la terre nul n’est son maître;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a été créé pour ne rien craindre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il regarde avec dédain tout ce qui est élevé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est le roi des plus fiers animaux.
