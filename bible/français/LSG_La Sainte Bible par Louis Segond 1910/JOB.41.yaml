document_id: JOB.41,93
type_code: fra
verses:
  '1':
  - type: text
    content: Nul n’est assez hardi pour l’exciter;
  - type: text
    content: Qui donc me résisterait en face?
  '10':
  - type: text
    content: Des flammes jaillissent de sa bouche,
  - type: text
    content: Des étincelles de feu s’en échappent.
  '11':
  - type: text
    content: Une fumée sort de ses narines,
  - type: text
    content: Comme d’un vase qui bout, d’une chaudière ardente.
  '12':
  - type: text
    content: Son souffle allume les charbons,
  - type: text
    content: Sa gueule lance la flamme.
  '13':
  - type: text
    content: La force a son cou pour demeure,
  - type: text
    content: Et l’effroi bondit au-devant de lui.
  '14':
  - type: text
    content: Ses parties charnues tiennent ensemble,
  - type: text
    content: Fondues sur lui, inébranlables.
  '15':
  - type: text
    content: Son cœur est dur comme la pierre,
  - type: text
    content: Dur comme la meule inférieure.
  '16':
  - type: text
    content: Quand il se lève, les plus vaillants ont peur,
  - type: text
    content: Et l’épouvante les fait fuir.
  '17':
  - type: text
    content: C’est en vain qu’on l’attaque avec l’épée;
  - type: text
    content: La lance, le javelot, la cuirasse, ne servent à rien.
  '18':
  - type: text
    content: Il regarde le fer comme de la paille,
  - type: text
    content: L’airain comme du bois pourri.
  '19':
  - type: text
    content: La flèche ne le met pas en fuite,
  - type: text
    content: Les pierres de la fronde sont pour lui du chaume.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ro 11:35.
  - type: text
    content: De qui suis-je le débiteur? Je le paierai.
  - type: note
    content: Ex 19:5. De 10:14. Ps 24:1; 50:12. 1 Co 10:26, 28.
  - type: text
    content: Sous le ciel tout m’appartient.
  '20':
  - type: text
    content: Il ne voit dans la massue qu’un brin de paille,
  - type: text
    content: Il rit au sifflement des dards.
  '21':
  - type: text
    content: 'Sous son ventre sont des pointes aiguës:'
  - type: text
    content: On dirait une herse qu’il étend sur le limon.
  '22':
  - type: text
    content: Il fait bouillir le fond de la mer comme une chaudière,
  - type: text
    content: Il l’agite comme un vase rempli de parfums.
  '23':
  - type: text
    content: Il laisse après lui un sentier lumineux;
  - type: text
    content: L’abîme prend la chevelure d’un vieillard.
  '24':
  - type: text
    content: Sur la terre nul n’est son maître;
  - type: text
    content: Il a été créé pour ne rien craindre.
  '25':
  - type: text
    content: Il regarde avec dédain tout ce qui est élevé,
  - type: text
    content: Il est le roi des plus fiers animaux.
  '3':
  - type: text
    content: Je veux encore parler de ses membres,
  - type: text
    content: Et de sa force, et de la beauté de sa structure.
  '4':
  - type: text
    content: Qui soulèvera son vêtement?
  - type: text
    content: Qui pénétrera entre ses mâchoires?
  '5':
  - type: text
    content: Qui ouvrira les portes de sa gueule?
  - type: text
    content: Autour de ses dents habite la terreur.
  '6':
  - type: text
    content: Ses magnifiques et puissants boucliers
  - type: text
    content: Sont unis ensemble comme par un sceau;
  '7':
  - type: text
    content: Ils se serrent l’un contre l’autre,
  - type: text
    content: Et l’air ne passerait pas entre eux;
  '8':
  - type: text
    content: Ce sont des frères qui s’embrassent,
  - type: text
    content: Se saisissent, demeurent inséparables.
  '9':
  - type: text
    content: Ses éternuements font briller la lumière;
  - type: text
    content: Ses yeux sont comme les paupières de l’aurore.
