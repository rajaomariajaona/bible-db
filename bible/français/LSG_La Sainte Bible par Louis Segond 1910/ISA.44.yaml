document_id: ISA.44,93
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Éternel seul est Dieu
  - type: heading
    content: 'V. 1-5: cf. (Éz 36:24-30. Joë 2:28, 29. Ac 2:16-18.) Za 2:10, 11.'
  - type: text
    content: 'Écoute maintenant, ô Jacob, '
  - type: note
    content: És 41:8; 43:5. Jé 30:10; 46:27.
  - type: text
    content: mon serviteur!
  - type: text
    content: O Israël, que j’ai choisi!
  '10':
  - type: text
    content: Qui est-ce qui fabrique un dieu, ou fond une idole,
  - type: text
    content: Pour n’en retirer aucune utilité?
  '11':
  - type: text
    content: 'Voici, tous ceux qui y travaillent seront '
  - type: note
    content: Ps 97:7. És 1:29; 42:17; 45:16.
  - type: text
    content: confondus,
  - type: text
    content: Et les ouvriers ne sont que des hommes;
  - type: text
    content: Qu’ils se réunissent tous, qu’ils se présentent,
  - type: text
    content: Et tous ensemble ils seront tremblants et couverts de honte.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Jé 10:3.
  - type: text
    content: Le forgeron fait une hache,
  - type: text
    content: Il travaille avec le charbon,
  - type: text
    content: Et il la façonne à coups de marteau;
  - type: text
    content: Il la forge d’un bras vigoureux;
  - type: text
    content: Mais a-t-il faim, le voilà sans force;
  - type: text
    content: Ne boit-il pas d’eau, le voilà épuisé.
  '13':
  - type: text
    content: Le charpentier étend le cordeau,
  - type: text
    content: Fait un tracé au crayon,
  - type: text
    content: Façonne le bois avec un couteau,
  - type: text
    content: Et marque ses dimensions avec le compas;
  - type: text
    content: Et il produit une figure d’homme,
  - type: text
    content: Une belle forme humaine,
  - type: text
    content: Pour qu’elle habite dans une maison.
  '14':
  - type: text
    content: Il se coupe des cèdres,
  - type: text
    content: Il prend des rouvres et des chênes,
  - type: text
    content: Et fait un choix parmi les arbres de la forêt;
  - type: text
    content: Il plante des pins,
  - type: text
    content: Et la pluie les fait croître.
  '15':
  - type: text
    content: Ces arbres servent à l’homme pour brûler,
  - type: text
    content: Il en prend et il se chauffe.
  - type: text
    content: Il y met aussi le feu pour cuire du pain;
  - type: text
    content: Et il en fait également un dieu, qu’il adore,
  - type: text
    content: Il en fait une idole, devant laquelle il se prosterne.
  '16':
  - type: text
    content: Il brûle au feu la moitié de son bois,
  - type: text
    content: Avec cette moitié il cuit de la viande,
  - type: text
    content: Il apprête un rôti, et se rassasie;
  - type: text
    content: 'Il se chauffe aussi, et dit: Ha! Ha!'
  - type: text
    content: Je me chauffe, je vois la flamme!
  '17':
  - type: text
    content: Et avec le reste il fait un dieu, son idole,
  - type: text
    content: Il se prosterne devant elle, il l’adore, il l’invoque,
  - type: text
    content: 'Et s’écrie: Sauve-moi!'
  - type: text
    content: Car tu es mon dieu!
  '18':
  - type: text
    content: Ils n’ont ni intelligence, ni entendement,
  - type: text
    content: Car on leur a fermé les yeux pour qu’ils ne voient point,
  - type: text
    content: Et le cœur pour qu’ils ne comprennent point.
  '19':
  - type: text
    content: Il ne rentre pas en lui-même,
  - type: text
    content: 'Et il n’a ni l’intelligence, ni le bon sens de dire:'
  - type: text
    content: J’en ai brûlé une moitié au feu,
  - type: text
    content: J’ai cuit du pain sur les charbons,
  - type: text
    content: J’ai rôti de la viande et je l’ai mangée;
  - type: text
    content: Et avec le reste je ferais une abomination!
  - type: text
    content: Je me prosternerais devant un morceau de bois!
  '2':
  - type: text
    content: Ainsi parle l’Éternel, qui t’a fait,
  - type: text
    content: Et qui t’a formé dès ta naissance,
  - type: text
    content: 'Celui qui est ton soutien:'
  - type: text
    content: Ne crains rien, mon serviteur Jacob,
  - type: text
    content: Mon Israël, que j’ai choisi.
  '20':
  - type: text
    content: Il se repaît de cendres,
  - type: text
    content: Son cœur abusé l’égare,
  - type: text
    content: 'Et il ne sauvera point son âme, et ne dira point:'
  - type: text
    content: N’est-ce pas du mensonge que j’ai dans ma main?
  - type: heading
    content: Mission de Cyrus
  - type: heading
    content: 'V. 21-28: cf. (Os 14:1-4. Mi 7:18-20.) (És 48:12-16, 20. Esd 1.)'
  '21':
  - type: text
    content: Souviens-toi de ces choses, ô Jacob!
  - type: text
    content: O Israël! Car tu es mon serviteur;
  - type: text
    content: Je t’ai formé, tu es mon serviteur;
  - type: text
    content: Israël, je ne t’oublierai pas.
  '22':
  - type: text
    content: J’efface tes transgressions comme un nuage,
  - type: text
    content: Et tes péchés comme une nuée;
  - type: text
    content: Reviens à moi,
  - type: text
    content: Car je t’ai racheté.
  '23':
  - type: text
    content: Cieux, réjouissez-vous! Car l’Éternel a agi;
  - type: text
    content: Profondeurs de la terre, retentissez d’allégresse!
  - type: text
    content: Montagnes, éclatez en cris de joie!
  - type: text
    content: Vous aussi, forêts, avec tous vos arbres!
  - type: text
    content: Car l’Éternel a racheté Jacob,
  - type: text
    content: Il a manifesté sa gloire en Israël.
  '24':
  - type: text
    content: Ainsi parle l’Éternel, ton rédempteur,
  - type: text
    content: 'Celui qui t’a formé dès ta naissance:'
  - type: text
    content: Moi, l’Éternel, j’ai fait toutes choses,
  - type: note
    content: Job 9:8. Ps 104:2.
  - type: text
    content: Seul j’ai déployé les cieux,
  - type: note
    content: És 40:22; 42:5; 45:12.
  - type: text
    content: Seul j’ai étendu la terre.
  '25':
  - type: text
    content: J’anéantis les signes des prophètes de mensonge,
  - type: text
    content: Et je proclame insensés les devins;
  - type: text
    content: Je fais reculer les sages,
  - type: text
    content: Et je tourne leur science en folie.
  '26':
  - type: text
    content: Je confirme la parole de mon serviteur,
  - type: text
    content: Et j’accomplis ce que prédisent mes envoyés;
  - type: text
    content: 'Je dis de Jérusalem: Elle sera habitée,'
  - type: text
    content: 'Et des villes de Juda: Elles seront rebâties;'
  - type: text
    content: Et je relèverai leurs ruines.
  '27':
  - type: text
    content: 'Je dis à l’abîme: Dessèche-toi,'
  - type: text
    content: Je tarirai tes fleuves.
  '28':
  - type: text
    content: 'Je dis de Cyrus: Il est mon berger,'
  - type: text
    content: Et il accomplira toute ma volonté;
  - type: text
    content: 'Il dira de Jérusalem: Qu’elle soit rebâtie!'
  - type: text
    content: 'Et du temple: Qu’il soit fondé!'
  '3':
  - type: text
    content: 'Car je '
  - type: note
    content: És 35:7. Joë 2:28. Jn 7:38. Ac 2:18.
  - type: text
    content: répandrai des eaux sur le sol altéré,
  - type: text
    content: Et des ruisseaux sur la terre desséchée;
  - type: text
    content: Je répandrai mon esprit sur ta race,
  - type: text
    content: Et ma bénédiction sur tes rejetons.
  '4':
  - type: text
    content: Ils pousseront comme au milieu de l’herbe,
  - type: text
    content: Comme les saules près des courants d’eau.
  '5':
  - type: text
    content: 'Celui-ci dira: Je suis à l’Éternel;'
  - type: text
    content: Celui-là se réclamera du nom de Jacob;
  - type: text
    content: 'Cet autre écrira de sa main: à l’Éternel!'
  - type: text
    content: Et prononcera avec amour le nom d’Israël.
  - type: heading
    content: 'V. 6-20: cf. És 43:8-13. (Ps 135:15-18. És 46:1-8. Jé 10:1-16; 2:26-28.)'
  '6':
  - type: text
    content: Ainsi parle l’Éternel, roi d’Israël et son rédempteur,
  - type: text
    content: 'L’Éternel des armées:'
  - type: note
    content: És 41:4; 48:12. Ap 1:8, 17; 22:13.
  - type: text
    content: Je suis le premier et je suis le dernier,
  - type: text
    content: Et hors moi il n’y a point de Dieu.
  '7':
  - type: text
    content: Qui a, comme moi, fait des prédictions
  - type: text
    content: (Qu’il le déclare et me le prouve!)
  - type: text
    content: Depuis que j’ai fondé le peuple ancien?
  - type: text
    content: Qu’ils annoncent l’avenir et ce qui doit arriver!
  '8':
  - type: text
    content: N’ayez pas peur, et ne tremblez pas;
  - type: text
    content: Ne te l’ai-je pas dès longtemps annoncé et déclaré?
  - type: text
    content: 'Vous êtes mes témoins:'
  - type: note
    content: De 4:35, 39; 32:39. 1 S 2:2. És 45:21.
  - type: text
    content: Y a-t-il un autre Dieu que moi?
  - type: text
    content: Il n’y a pas d’autre rocher, je n’en connais point.
  - type: heading
    content: Les fabricateurs d’idoles
  '9':
  - type: text
    content: Ceux qui fabriquent des idoles ne sont tous que vanité,
  - type: text
    content: Et leurs plus belles œuvres ne servent à rien;
  - type: text
    content: 'Elles le témoignent elles-mêmes:'
  - type: text
    content: Elles n’ont ni la vue, ni l’intelligence,
  - type: text
    content: Afin qu’ils soient dans la confusion.
