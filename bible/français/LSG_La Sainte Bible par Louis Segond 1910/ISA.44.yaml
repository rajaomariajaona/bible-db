      - type: text
        text: Ps 104:2
      metadata:
        usfm: PSA.104.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Seul j’ai déployé les cieux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 40:22
      metadata:
        usfm: ISA.40.22
