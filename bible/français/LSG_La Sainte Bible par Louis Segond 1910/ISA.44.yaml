document_id: ISA.44
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’Éternel seul est Dieu
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. (Éz 36:24-30. Joë 2:28, 29. Ac 2:16-18.) Za 2:10, 11.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Écoute maintenant, ô Jacob, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 41:8
      metadata:
        usfm: ISA.41.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 43:5
      metadata:
        usfm: ISA.43.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 30:10
      metadata:
        usfm: JER.30.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 46:27
      metadata:
        usfm: JER.46.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: mon serviteur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Israël, que j’ai choisi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ainsi parle l’Éternel, qui t’a fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui t’a formé dès ta naissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Celui qui est ton soutien:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne crains rien, mon serviteur Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon Israël, que j’ai choisi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Car je '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 35:7
      metadata:
        usfm: ISA.35.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 2:28
      metadata:
        usfm: JOL.2.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:38
      metadata:
        usfm: JHN.7.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 2:18
      metadata:
        usfm: ACT.2.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: répandrai des eaux sur le sol altéré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et des ruisseaux sur la terre desséchée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je répandrai mon esprit sur ta race,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ma bénédiction sur tes rejetons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils pousseront comme au milieu de l’herbe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme les saules près des courants d’eau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Celui-ci dira: Je suis à l’Éternel;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui-là se réclamera du nom de Jacob;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Cet autre écrira de sa main: à l’Éternel!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et prononcera avec amour le nom d’Israël.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-20: cf. És 43:8-13. (Ps 135:15-18. És 46:1-8. Jé 10:1-16; 2:26-28.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ainsi parle l’Éternel, roi d’Israël et son rédempteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'L’Éternel des armées:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 41:4
      metadata:
        usfm: ISA.41.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 48:12
      metadata:
        usfm: ISA.48.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:8
      metadata:
        usfm: REV.1.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '17'
      metadata:
        usfm: REV.1.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:13
      metadata:
        usfm: REV.22.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je suis le premier et je suis le dernier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et hors moi il n’y a point de Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Qui a, comme moi, fait des prédictions
- type: usfm
  marker: q1
  children:
  - type: text
    text: (Qu’il le déclare et me le prouve!)
- type: usfm
  marker: q1
  children:
  - type: text
    text: Depuis que j’ai fondé le peuple ancien?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils annoncent l’avenir et ce qui doit arriver!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: N’ayez pas peur, et ne tremblez pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne te l’ai-je pas dès longtemps annoncé et déclaré?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Vous êtes mes témoins:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:35
      metadata:
        usfm: DEU.4.35
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '39'
      metadata:
        usfm: DEU.4.39
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 32:39
      metadata:
        usfm: DEU.32.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 2:2
      metadata:
        usfm: 1SA.2.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 45:21
      metadata:
        usfm: ISA.45.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Y a-t-il un autre Dieu que moi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y a pas d’autre rocher, je n’en connais point.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les fabricateurs d’idoles
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ceux qui fabriquent des idoles ne sont tous que vanité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leurs plus belles œuvres ne servent à rien;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Elles le témoignent elles-mêmes:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles n’ont ni la vue, ni l’intelligence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin qu’ils soient dans la confusion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Qui est-ce qui fabrique un dieu, ou fond une idole,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour n’en retirer aucune utilité?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voici, tous ceux qui y travaillent seront '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 97:7
      metadata:
        usfm: PSA.97.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:29
      metadata:
        usfm: ISA.1.29
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 42:17
      metadata:
        usfm: ISA.42.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 45:16
      metadata:
        usfm: ISA.45.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: confondus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les ouvriers ne sont que des hommes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils se réunissent tous, qu’ils se présentent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous ensemble ils seront tremblants et couverts de honte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 10:3
      metadata:
        usfm: JER.10.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le forgeron fait une hache,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il travaille avec le charbon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il la façonne à coups de marteau;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il la forge d’un bras vigoureux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais a-t-il faim, le voilà sans force;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne boit-il pas d’eau, le voilà épuisé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Le charpentier étend le cordeau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fait un tracé au crayon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Façonne le bois avec un couteau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et marque ses dimensions avec le compas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il produit une figure d’homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une belle forme humaine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour qu’elle habite dans une maison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il se coupe des cèdres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il prend des rouvres et des chênes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et fait un choix parmi les arbres de la forêt;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il plante des pins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la pluie les fait croître.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ces arbres servent à l’homme pour brûler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il en prend et il se chauffe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il y met aussi le feu pour cuire du pain;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il en fait également un dieu, qu’il adore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il en fait une idole, devant laquelle il se prosterne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il brûle au feu la moitié de son bois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec cette moitié il cuit de la viande,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il apprête un rôti, et se rassasie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il se chauffe aussi, et dit: Ha! Ha!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me chauffe, je vois la flamme!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Et avec le reste il fait un dieu, son idole,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il se prosterne devant elle, il l’adore, il l’invoque,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et s’écrie: Sauve-moi!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu es mon dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ils n’ont ni intelligence, ni entendement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car on leur a fermé les yeux pour qu’ils ne voient point,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le cœur pour qu’ils ne comprennent point.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il ne rentre pas en lui-même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et il n’a ni l’intelligence, ni le bon sens de dire:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’en ai brûlé une moitié au feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai cuit du pain sur les charbons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai rôti de la viande et je l’ai mangée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et avec le reste je ferais une abomination!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me prosternerais devant un morceau de bois!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il se repaît de cendres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son cœur abusé l’égare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et il ne sauvera point son âme, et ne dira point:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’est-ce pas du mensonge que j’ai dans ma main?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mission de Cyrus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-28: cf. (Os 14:1-4. Mi 7:18-20.) (És 48:12-16, 20. Esd 1.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Souviens-toi de ces choses, ô Jacob!
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Israël! Car tu es mon serviteur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’ai formé, tu es mon serviteur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël, je ne t’oublierai pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: J’efface tes transgressions comme un nuage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes péchés comme une nuée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reviens à moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je t’ai racheté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Cieux, réjouissez-vous! Car l’Éternel a agi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Profondeurs de la terre, retentissez d’allégresse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Montagnes, éclatez en cris de joie!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous aussi, forêts, avec tous vos arbres!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Éternel a racheté Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a manifesté sa gloire en Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ainsi parle l’Éternel, ton rédempteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Celui qui t’a formé dès ta naissance:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, l’Éternel, j’ai fait toutes choses,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
