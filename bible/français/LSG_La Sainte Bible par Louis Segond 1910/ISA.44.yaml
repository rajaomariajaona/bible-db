        text: 45:12
      metadata:
        usfm: ISA.45.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Seul j’ai étendu la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: J’anéantis les signes des prophètes de mensonge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je proclame insensés les devins;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je fais reculer les sages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je tourne leur science en folie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Je confirme la parole de mon serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’accomplis ce que prédisent mes envoyés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je dis de Jérusalem: Elle sera habitée,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et des villes de Juda: Elles seront rebâties;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je relèverai leurs ruines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Je dis à l’abîme: Dessèche-toi,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je tarirai tes fleuves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Je dis de Cyrus: Il est mon berger,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il accomplira toute ma volonté;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il dira de Jérusalem: Qu’elle soit rebâtie!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et du temple: Qu’il soit fondé!'
