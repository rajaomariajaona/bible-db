document_id: 2KI.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les rois d’Israël et de Juda tués par Jéhu
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-29: cf. (1 R 19:16-17; 21:17-22, 29.) 2 Ch 22:5-9. Ps 94:1-7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Élisée, le prophète, appela l’un des fils des prophètes, et lui dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 19:16
      metadata:
        usfm: 1KI.19.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ceins tes reins, prends avec toi cette fiole d’huile, et va à Ramoth en Galaad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Quand tu y seras arrivé, vois Jéhu, fils de Josaphat, fils de Nimschi. Tu iras le faire lever du milieu de ses frères, et tu le conduiras dans une chambre retirée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu prendras la fiole d’huile, que tu répandras sur sa tête, et tu diras: Ainsi parle l’Éternel: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 22:7
      metadata:
        usfm: 2CH.22.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je t’oins roi d’Israël! Puis tu ouvriras la porte, et tu t’enfuiras sans t’arrêter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le jeune homme, serviteur du prophète, partit pour Ramoth en Galaad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quand il arriva, voici, les chefs de l’armée étaient assis. Il dit: Chef, j’ai un mot à te dire. Et Jéhu dit: Auquel de nous tous? Il répondit: A toi, chef. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jéhu se leva et entra dans la maison, et le jeune homme répandit l’huile sur sa tête, en lui disant: Ainsi parle l’Éternel, le Dieu d’Israël: Je t’oins roi d’Israël, du peuple de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tu frapperas la maison d’Achab, ton maître, et je vengerai sur Jézabel le sang de mes serviteurs les prophètes et le sang de tous les serviteurs de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 21:21
      metadata:
        usfm: 1KI.21.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Toute la maison d’Achab périra; j’exterminerai quiconque appartient à Achab, celui qui est esclave et celui qui est libre en Israël, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et je rendrai '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 14:10
      metadata:
        usfm: 1KI.14.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:29
      metadata:
        usfm: 1KI.15.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la maison d’Achab semblable à la maison de Jéroboam, fils de Nebath, et à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 16:3
      metadata:
        usfm: 1KI.16.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: 1KI.16.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la maison de Baescha, fils d’Achija. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 21:23
      metadata:
        usfm: 1KI.21.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les chiens mangeront Jézabel dans le champ de Jizreel, et il n’y aura personne pour l’enterrer. Puis le jeune homme ouvrit la porte, et s’enfuit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lorsque Jéhu sortit pour rejoindre les serviteurs de son maître, on lui dit: Tout va-t-il bien? Pourquoi ce fou est-il venu vers toi? Jéhu leur répondit: Vous connaissez bien l’homme et ce qu’il peut dire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais ils répliquèrent: Mensonge! Réponds-nous donc! Et il dit: Il m’a parlé de telle et telle manière, disant: Ainsi parle l’Éternel: Je t’oins roi d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aussitôt ils prirent chacun leurs vêtements, qu’ils mirent sous Jéhu au haut des degrés; ils sonnèrent de la trompette, et dirent: Jéhu est roi! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ainsi Jéhu, fils de Josaphat, fils de Nimschi, forma une conspiration contre Joram. Or Joram et tout Israël défendaient Ramoth en Galaad contre Hazaël, roi de Syrie; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'mais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 8:29
      metadata:
        usfm: 2KI.8.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le roi Joram s’en était retourné pour se faire guérir à Jizreel des blessures que les Syriens lui avaient faites, lorsqu’il se battait contre Hazaël, roi de Syrie. Jéhu dit: Si c’est votre volonté, personne ne s’échappera de la ville pour aller porter la nouvelle à Jizreel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et Jéhu monta sur son char et partit pour Jizreel, car Joram y était alité, et Achazia, roi de Juda, était descendu pour le visiter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'La sentinelle placée sur la tour de Jizreel vit venir la troupe de Jéhu, et dit: Je vois une troupe. Joram dit: Prends un cavalier, et envoie-le au-devant d’eux pour demander si c’est la paix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le cavalier alla au-devant de Jéhu, et dit: Ainsi parle le roi: Est-ce la paix? Et Jéhu répondit: Que t’importe la paix? Passe derrière moi. La sentinelle en donna avis, et dit: Le messager est allé jusqu’à eux, et il ne revient pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Joram envoya un second cavalier, qui arriva vers eux et dit: Ainsi parle le roi: Est-ce la paix? Et Jéhu répondit: Que t’importe la paix? Passe derrière moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'La sentinelle en donna avis, et dit: Il est allé jusqu’à eux, et il ne revient pas. Et le train est comme celui de Jéhu, fils de Nimschi, car il conduit d’une manière insensée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors Joram dit: Attelle! Et on attela son char. Joram, roi d’Israël, et Achazia, roi de Juda, sortirent chacun dans son char pour aller au-devant de Jéhu, et ils le rencontrèrent dans le champ de Naboth de Jizreel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dès que Joram vit Jéhu, il dit: Est-ce la paix, Jéhu? Jéhu répondit: Quoi, la paix! Tant que durent les prostitutions de Jézabel, ta mère, et la multitude de ses sortilèges! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Joram tourna bride et s’enfuit, et il dit à Achazia: Trahison, Achazia! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais Jéhu saisit son arc, et il frappa Joram entre les épaules: la flèche sortit par le cœur, et Joram s’affaissa dans son char. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jéhu dit à son officier Bidkar: Prends-le, et jette-le dans le champ de Naboth de Jizreel; car souviens-t’en, lorsque moi et toi, nous étions ensemble à cheval derrière Achab, son père, l’Éternel prononça contre lui cette sentence: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 21:19
      metadata:
        usfm: 1KI.21.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'J’ai vu hier le sang de Naboth et le sang de ses fils, dit l’Éternel, et je te rendrai la pareille dans ce champ même, dit l’Éternel! Prends-le donc, et jette-le dans le champ, selon la parole de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Achazia, roi de Juda, ayant vu cela, s’enfuit par le chemin de la maison du jardin. Jéhu le poursuivit, et dit: Lui aussi, frappez-le sur le char! Et on le frappa à la montée de Gur, près de Jibleam. Il se réfugia à Meguiddo, et il y mourut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ses serviteurs le transportèrent sur un char à Jérusalem, et ils l’enterrèrent dans son sépulcre avec ses pères, dans la ville de David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Achazia était devenu roi de Juda la onzième année de Joram, fils d’Achab.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jézabel précipitée d’une fenêtre à Jizreel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 30-37: cf. 1 R 18:4, 19; 21:5-15, 23, 25. Ec 8:8. És 2:12, etc.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jéhu entra dans Jizreel. Jézabel, l’ayant appris, mit du fard à ses yeux, se para la tête, et regarda par la fenêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Comme Jéhu franchissait la porte, elle dit: Est-ce la paix, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 16:18
      metadata:
        usfm: 1KI.16.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nouveau Zimri, assassin de son maître? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il leva le visage vers la fenêtre, et dit: Qui est pour moi? Qui? Et deux ou trois eunuques le regardèrent en s’approchant de la fenêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il dit: Jetez-la en bas! Ils la jetèrent, et il rejaillit de son sang sur la muraille et sur les chevaux. Jéhu la foula aux pieds; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'puis il entra, mangea et but, et il dit: Allez voir cette maudite, et enterrez-la, car '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 16:31
      metadata:
        usfm: 1KI.16.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'elle est fille de roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ils allèrent pour l’enterrer; mais ils ne trouvèrent d’elle que le crâne, les pieds et les paumes des mains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ils retournèrent l’annoncer à Jéhu, qui dit: C’est ce qu’avait déclaré l’Éternel par son serviteur Élie, le Thischbite, en disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 21:23
      metadata:
        usfm: 1KI.21.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les chiens mangeront la chair de Jézabel dans le champ de Jizreel; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'et le cadavre de Jézabel sera comme du fumier sur la face des champs, dans le champ de Jizreel, de sorte qu’on ne pourra dire: C’est Jézabel.'
