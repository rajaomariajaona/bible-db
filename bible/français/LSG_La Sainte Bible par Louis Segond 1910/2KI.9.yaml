document_id: 2KI.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les rois d’Israël et de Juda tués par Jéhu
  - type: heading
    content: 'V. 1-29: cf. (1 R 19:16-17; 21:17-22, 29.) 2 Ch 22:5-9. Ps 94:1-7.'
  - type: text
    content: 'Élisée, le prophète, appela l’un des fils des prophètes, et lui dit: '
  - type: note
    content: 1 R 19:16.
  - type: text
    content: 'Ceins tes reins, prends avec toi cette fiole d’huile, et va à Ramoth en Galaad. '
  '10':
  - type: note
    content: 1 R 21:23.
  - type: text
    content: 'Les chiens mangeront Jézabel dans le champ de Jizreel, et il n’y aura personne pour l’enterrer. Puis le jeune homme ouvrit la porte, et s’enfuit. '
  '11':
  - type: text
    content: 'Lorsque Jéhu sortit pour rejoindre les serviteurs de son maître, on lui dit: Tout va-t-il bien? Pourquoi ce fou est-il venu vers toi? Jéhu leur répondit: Vous connaissez bien l’homme et ce qu’il peut dire. '
  '12':
  - type: text
    content: 'Mais ils répliquèrent: Mensonge! Réponds-nous donc! Et il dit: Il m’a parlé de telle et telle manière, disant: Ainsi parle l’Éternel: Je t’oins roi d’Israël. '
  '13':
  - type: text
    content: 'Aussitôt ils prirent chacun leurs vêtements, qu’ils mirent sous Jéhu au haut des degrés; ils sonnèrent de la trompette, et dirent: Jéhu est roi! '
  '14':
  - type: text
    content: 'Ainsi Jéhu, fils de Josaphat, fils de Nimschi, forma une conspiration contre Joram. Or Joram et tout Israël défendaient Ramoth en Galaad contre Hazaël, roi de Syrie; '
  '15':
  - type: text
    content: 'mais '
  - type: note
    content: 2 R 8:29.
  - type: text
    content: 'le roi Joram s’en était retourné pour se faire guérir à Jizreel des blessures que les Syriens lui avaient faites, lorsqu’il se battait contre Hazaël, roi de Syrie. Jéhu dit: Si c’est votre volonté, personne ne s’échappera de la ville pour aller porter la nouvelle à Jizreel. '
  '16':
  - type: text
    content: 'Et Jéhu monta sur son char et partit pour Jizreel, car Joram y était alité, et Achazia, roi de Juda, était descendu pour le visiter. '
  '17':
  - type: text
    content: 'La sentinelle placée sur la tour de Jizreel vit venir la troupe de Jéhu, et dit: Je vois une troupe. Joram dit: Prends un cavalier, et envoie-le au-devant d’eux pour demander si c’est la paix. '
  '18':
  - type: text
    content: 'Le cavalier alla au-devant de Jéhu, et dit: Ainsi parle le roi: Est-ce la paix? Et Jéhu répondit: Que t’importe la paix? Passe derrière moi. La sentinelle en donna avis, et dit: Le messager est allé jusqu’à eux, et il ne revient pas. '
  '19':
  - type: text
    content: 'Joram envoya un second cavalier, qui arriva vers eux et dit: Ainsi parle le roi: Est-ce la paix? Et Jéhu répondit: Que t’importe la paix? Passe derrière moi. '
  '2':
  - type: text
    content: 'Quand tu y seras arrivé, vois Jéhu, fils de Josaphat, fils de Nimschi. Tu iras le faire lever du milieu de ses frères, et tu le conduiras dans une chambre retirée. '
  '20':
  - type: text
    content: 'La sentinelle en donna avis, et dit: Il est allé jusqu’à eux, et il ne revient pas. Et le train est comme celui de Jéhu, fils de Nimschi, car il conduit d’une manière insensée. '
  '21':
  - type: text
    content: 'Alors Joram dit: Attelle! Et on attela son char. Joram, roi d’Israël, et Achazia, roi de Juda, sortirent chacun dans son char pour aller au-devant de Jéhu, et ils le rencontrèrent dans le champ de Naboth de Jizreel. '
  '22':
  - type: text
    content: 'Dès que Joram vit Jéhu, il dit: Est-ce la paix, Jéhu? Jéhu répondit: Quoi, la paix! Tant que durent les prostitutions de Jézabel, ta mère, et la multitude de ses sortilèges! '
  '23':
  - type: text
    content: 'Joram tourna bride et s’enfuit, et il dit à Achazia: Trahison, Achazia! '
  '24':
  - type: text
    content: 'Mais Jéhu saisit son arc, et il frappa Joram entre les épaules: la flèche sortit par le cœur, et Joram s’affaissa dans son char. '
  '25':
  - type: text
    content: 'Jéhu dit à son officier Bidkar: Prends-le, et jette-le dans le champ de Naboth de Jizreel; car souviens-t’en, lorsque moi et toi, nous étions ensemble à cheval derrière Achab, son père, l’Éternel prononça contre lui cette sentence: '
  '26':
  - type: note
    content: 1 R 21:19.
  - type: text
    content: 'J’ai vu hier le sang de Naboth et le sang de ses fils, dit l’Éternel, et je te rendrai la pareille dans ce champ même, dit l’Éternel! Prends-le donc, et jette-le dans le champ, selon la parole de l’Éternel. '
  '27':
  - type: text
    content: 'Achazia, roi de Juda, ayant vu cela, s’enfuit par le chemin de la maison du jardin. Jéhu le poursuivit, et dit: Lui aussi, frappez-le sur le char! Et on le frappa à la montée de Gur, près de Jibleam. Il se réfugia à Meguiddo, et il y mourut. '
  '28':
  - type: text
    content: 'Ses serviteurs le transportèrent sur un char à Jérusalem, et ils l’enterrèrent dans son sépulcre avec ses pères, dans la ville de David. '
  '29':
  - type: text
    content: Achazia était devenu roi de Juda la onzième année de Joram, fils d’Achab.
  - type: heading
    content: Jézabel précipitée d’une fenêtre à Jizreel
  - type: heading
    content: 'V. 30-37: cf. 1 R 18:4, 19; 21:5-15, 23, 25. Ec 8:8. És 2:12, etc.'
  '3':
  - type: text
    content: 'Tu prendras la fiole d’huile, que tu répandras sur sa tête, et tu diras: Ainsi parle l’Éternel: '
  - type: note
    content: 2 Ch 22:7.
  - type: text
    content: 'Je t’oins roi d’Israël! Puis tu ouvriras la porte, et tu t’enfuiras sans t’arrêter. '
  '30':
  - type: text
    content: 'Jéhu entra dans Jizreel. Jézabel, l’ayant appris, mit du fard à ses yeux, se para la tête, et regarda par la fenêtre. '
  '31':
  - type: text
    content: 'Comme Jéhu franchissait la porte, elle dit: Est-ce la paix, '
  - type: note
    content: 1 R 16:18.
  - type: text
    content: 'nouveau Zimri, assassin de son maître? '
  '32':
  - type: text
    content: 'Il leva le visage vers la fenêtre, et dit: Qui est pour moi? Qui? Et deux ou trois eunuques le regardèrent en s’approchant de la fenêtre. '
  '33':
  - type: text
    content: 'Il dit: Jetez-la en bas! Ils la jetèrent, et il rejaillit de son sang sur la muraille et sur les chevaux. Jéhu la foula aux pieds; '
  '34':
  - type: text
    content: 'puis il entra, mangea et but, et il dit: Allez voir cette maudite, et enterrez-la, car '
  - type: note
    content: 1 R 16:31.
  - type: text
    content: 'elle est fille de roi. '
  '35':
  - type: text
    content: 'Ils allèrent pour l’enterrer; mais ils ne trouvèrent d’elle que le crâne, les pieds et les paumes des mains. '
  '36':
  - type: text
    content: 'Ils retournèrent l’annoncer à Jéhu, qui dit: C’est ce qu’avait déclaré l’Éternel par son serviteur Élie, le Thischbite, en disant: '
  - type: note
    content: 1 R 21:23.
  - type: text
    content: 'Les chiens mangeront la chair de Jézabel dans le champ de Jizreel; '
  '37':
  - type: text
    content: 'et le cadavre de Jézabel sera comme du fumier sur la face des champs, dans le champ de Jizreel, de sorte qu’on ne pourra dire: C’est Jézabel.'
  '4':
  - type: text
    content: 'Le jeune homme, serviteur du prophète, partit pour Ramoth en Galaad. '
  '5':
  - type: text
    content: 'Quand il arriva, voici, les chefs de l’armée étaient assis. Il dit: Chef, j’ai un mot à te dire. Et Jéhu dit: Auquel de nous tous? Il répondit: A toi, chef. '
  '6':
  - type: text
    content: 'Jéhu se leva et entra dans la maison, et le jeune homme répandit l’huile sur sa tête, en lui disant: Ainsi parle l’Éternel, le Dieu d’Israël: Je t’oins roi d’Israël, du peuple de l’Éternel. '
  '7':
  - type: text
    content: 'Tu frapperas la maison d’Achab, ton maître, et je vengerai sur Jézabel le sang de mes serviteurs les prophètes et le sang de tous les serviteurs de l’Éternel. '
  '8':
  - type: note
    content: 1 R 21:21.
  - type: text
    content: 'Toute la maison d’Achab périra; j’exterminerai quiconque appartient à Achab, celui qui est esclave et celui qui est libre en Israël, '
  '9':
  - type: text
    content: 'et je rendrai '
  - type: note
    content: 1 R 14:10; 15:29.
  - type: text
    content: 'la maison d’Achab semblable à la maison de Jéroboam, fils de Nebath, et à '
  - type: note
    content: 1 R 16:3, 11.
  - type: text
    content: 'la maison de Baescha, fils d’Achija. '
