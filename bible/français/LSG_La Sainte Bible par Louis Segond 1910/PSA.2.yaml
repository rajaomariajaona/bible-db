document_id: PSA.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Ac 4:25-28; 13:27-41. Mt 21:37-45. Ph 2:9-11.) Ps 18:51; 21:9, etc.; 110. Jn 3:36.
  - type: text
    content: 'Pourquoi '
  - type: note
    content: Ac 4:25.
  - type: text
    content: ce tumulte parmi les nations,
  - type: text
    content: Ces vaines pensées parmi les peuples?
  '10':
  - type: text
    content: Et maintenant, rois, conduisez-vous avec sagesse!
  - type: text
    content: Juges de la terre, recevez instruction!
  '11':
  - type: text
    content: Servez l’Éternel avec crainte,
  - type: text
    content: Et réjouissez-vous avec tremblement.
  '12':
  - type: text
    content: Baisez le fils, de peur qu’il ne s’irrite,
  - type: text
    content: Et que vous ne périssiez dans votre voie,
  - type: text
    content: Car sa colère est prompte à s’enflammer.
  - type: note
    content: Ps 34:9. Pr 16:20. És 30:18. Jé 17:7. Ro 9:33; 10:11. 1 Pi 2:6.
  - type: text
    content: Heureux tous ceux qui se confient en lui!
  '2':
  - type: text
    content: Pourquoi les rois de la terre se soulèvent-ils
  - type: text
    content: Et les princes se liguent-ils avec eux
  - type: text
    content: Contre l’Éternel et contre son oint?
  '3':
  - type: text
    content: Brisons leurs liens,
  - type: text
    content: Délivrons-nous de leurs chaînes!
  '4':
  - type: text
    content: Celui qui siège dans les cieux rit,
  - type: text
    content: Le Seigneur se moque d’eux.
  '5':
  - type: text
    content: Puis il leur parle dans sa colère,
  - type: text
    content: 'Il les épouvante dans sa fureur:'
  '6':
  - type: text
    content: C’est moi qui ai oint mon roi
  - type: text
    content: Sur Sion, ma montagne sainte!
  '7':
  - type: text
    content: Je publierai le décret;
  - type: text
    content: 'L’Éternel m’a dit: '
  - type: note
    content: Ac 13:33. Hé 1:5; 5:5.
  - type: text
    content: Tu es mon fils!
  - type: text
    content: Je t’ai engendré aujourd’hui.
  '8':
  - type: text
    content: 'Demande-moi '
  - type: note
    content: Ps 22:28; 72:8.
  - type: text
    content: et je te donnerai les nations pour héritage,
  - type: text
    content: Les extrémités de la terre pour possession;
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ap 2:27; 19:15.
  - type: text
    content: Tu les briseras avec une verge de fer,
  - type: text
    content: Tu les briseras comme le vase d’un potier.
