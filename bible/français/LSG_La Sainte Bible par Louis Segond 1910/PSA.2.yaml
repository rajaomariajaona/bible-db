document_id: PSA.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Ac 4:25-28; 13:27-41. Mt 21:37-45. Ph 2:9-11.) Ps 18:51; 21:9, etc.; 110. Jn 3:36.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Pourquoi '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 4:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ce tumulte parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ces vaines pensées parmi les peuples?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Et maintenant, rois, conduisez-vous avec sagesse!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Juges de la terre, recevez instruction!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Servez l’Éternel avec crainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et réjouissez-vous avec tremblement.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Baisez le fils, de peur qu’il ne s’irrite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que vous ne périssiez dans votre voie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car sa colère est prompte à s’enflammer.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 34:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 16:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 30:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 17:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Heureux tous ceux qui se confient en lui!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Pourquoi les rois de la terre se soulèvent-ils
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les princes se liguent-ils avec eux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre l’Éternel et contre son oint?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Brisons leurs liens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivrons-nous de leurs chaînes!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Celui qui siège dans les cieux rit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur se moque d’eux.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Puis il leur parle dans sa colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il les épouvante dans sa fureur:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: C’est moi qui ai oint mon roi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur Sion, ma montagne sainte!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Je publierai le décret;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L’Éternel m’a dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 1:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tu es mon fils!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’ai engendré aujourd’hui.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Demande-moi '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 22:28
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 72:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: et je te donnerai les nations pour héritage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les extrémités de la terre pour possession;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 2:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tu les briseras avec une verge de fer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu les briseras comme le vase d’un potier.
