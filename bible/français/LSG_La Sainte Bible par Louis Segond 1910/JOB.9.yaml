document_id: JOB.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse de Job à Bildad
  - type: heading
    content: 'V. 1-20: cf. (Ps 130:3. Ro 3:19, 20.) (Ps 147:5. Da 4:34, 35, 37.) Job 33:8-13.'
  - type: text
    content: 'Job prit la parole et dit:'
  '10':
  - type: text
    content: ' '
  - type: note
    content: Job 5:9. Ps 72:18; 77:15; 86:10. Ro 11:33.
  - type: text
    content: Il fait des choses grandes et insondables,
  - type: text
    content: Des merveilles sans nombre.
  '11':
  - type: text
    content: Voici, il passe près de moi, et je ne le vois pas,
  - type: text
    content: Il s’en va, et je ne l’aperçois pas.
  '12':
  - type: text
    content: S’il enlève, qui s’y opposera?
  - type: text
    content: 'Qui lui dira: Que fais-tu?'
  '13':
  - type: text
    content: Dieu ne retire point sa colère;
  - type: text
    content: Sous lui s’inclinent les appuis de l’orgueil.
  '14':
  - type: text
    content: Et moi, comment lui répondre?
  - type: text
    content: Quelles paroles choisir?
  '15':
  - type: text
    content: Quand je serais juste, je ne répondrais pas;
  - type: text
    content: Je ne puis qu’implorer mon juge.
  '16':
  - type: text
    content: Et quand il m’exaucerait, si je l’invoque,
  - type: text
    content: Je ne croirais pas qu’il eût écouté ma voix,
  '17':
  - type: text
    content: Lui qui m’assaille comme par une tempête,
  - type: text
    content: Qui multiplie sans raison mes blessures,
  '18':
  - type: text
    content: Qui ne me laisse pas respirer,
  - type: text
    content: Qui me rassasie d’amertume.
  '19':
  - type: text
    content: Recourir à la force?
  - type: text
    content: Il est tout-puissant.
  - type: text
    content: A la justice? Qui me fera comparaître?
  '2':
  - type: text
    content: Je sais bien qu’il en est ainsi;
  - type: text
    content: 'Comment '
  - type: note
    content: Ps 143:2.
  - type: text
    content: l’homme serait-il juste devant Dieu?
  '20':
  - type: text
    content: Suis-je juste, ma bouche me condamnera;
  - type: text
    content: Suis-je innocent, il me déclarera coupable.
  - type: heading
    content: 'V. 21-35: cf. (Ec 9:1-3; 8:14.) Ps 73:13-15. Job 10.'
  '21':
  - type: text
    content: Innocent! Je le suis; mais je ne tiens pas à la vie,
  - type: text
    content: Je méprise mon existence.
  '22':
  - type: text
    content: Qu’importe après tout? Car, j’ose le dire,
  - type: note
    content: Ec 9:2, 3. Mal 3:14.
  - type: text
    content: Il détruit l’innocent comme le coupable.
  '23':
  - type: text
    content: Si du moins le fléau donnait soudain la mort!…
  - type: text
    content: Mais il se rit des épreuves de l’innocent.
  '24':
  - type: text
    content: La terre est livrée aux mains de l’impie;
  - type: text
    content: Il voile la face des juges.
  - type: text
    content: Si ce n’est pas lui, qui est-ce donc?
  '25':
  - type: text
    content: ' '
  - type: note
    content: Job 7:6, 7.
  - type: text
    content: Mes jours sont plus rapides qu’un courrier;
  - type: text
    content: Ils fuient sans avoir vu le bonheur;
  '26':
  - type: text
    content: Ils passent comme les navires de jonc,
  - type: text
    content: Comme l’aigle qui fond sur sa proie.
  '27':
  - type: text
    content: 'Si je dis: Je veux oublier mes souffrances,'
  - type: text
    content: Laisser ma tristesse, reprendre courage,
  '28':
  - type: text
    content: Je suis effrayé de toutes mes douleurs.
  - type: text
    content: Je sais que tu ne me tiendras pas pour innocent.
  '29':
  - type: text
    content: Je serai jugé coupable;
  - type: text
    content: Pourquoi me fatiguer en vain?
  '3':
  - type: text
    content: S’il voulait contester avec lui,
  - type: text
    content: Sur mille choses il ne pourrait répondre à une seule.
  '30':
  - type: text
    content: ' '
  - type: note
    content: Jé 2:22.
  - type: text
    content: Quand je me laverais dans la neige,
  - type: text
    content: Quand je purifierais mes mains avec du savon,
  '31':
  - type: text
    content: Tu me plongerais dans la fange,
  - type: text
    content: Et mes vêtements m’auraient en horreur.
  '32':
  - type: text
    content: ' '
  - type: note
    content: Ec 6:10. Jé 49:19.
  - type: text
    content: Il n’est pas un homme comme moi, pour que je lui réponde,
  - type: text
    content: Pour que nous allions ensemble en justice.
  '33':
  - type: text
    content: Il n’y a pas entre nous d’arbitre,
  - type: text
    content: Qui pose sa main sur nous deux.
  '34':
  - type: text
    content: ' '
  - type: note
    content: Job 13:20; 33:7.
  - type: text
    content: Qu’il retire sa verge de dessus moi,
  - type: text
    content: Que ses terreurs ne me troublent plus;
  '35':
  - type: text
    content: Alors je parlerai et je ne le craindrai pas.
  - type: text
    content: Autrement, je ne suis point à moi-même.
  '4':
  - type: text
    content: 'A lui la sagesse et la toute-puissance:'
  - type: text
    content: Qui lui résisterait impunément?
  '5':
  - type: text
    content: Il transporte soudain les montagnes,
  - type: text
    content: Il les renverse dans sa colère.
  '6':
  - type: text
    content: Il secoue la terre sur sa base,
  - type: text
    content: Et ses colonnes sont ébranlées.
  '7':
  - type: text
    content: Il commande au soleil, et le soleil ne paraît pas;
  - type: text
    content: Il met un sceau sur les étoiles.
  '8':
  - type: text
    content: 'Seul, il étend '
  - type: note
    content: Ge 1:6.
  - type: text
    content: les cieux,
  - type: text
    content: Il marche sur les hauteurs de la mer.
  '9':
  - type: text
    content: Il a créé la Grande Ourse, l’Orion et les Pléiades,
  - type: text
    content: Et les étoiles des régions australes.
