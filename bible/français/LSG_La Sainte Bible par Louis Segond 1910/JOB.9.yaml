document_id: JOB.9,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Réponse de Job à Bildad
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-20: cf. (Ps 130:3. Ro 3:19, 20.) (Ps 147:5. Da 4:34, 35, 37.) Job 33:8-13.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Job prit la parole et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 5:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 72:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 77:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 86:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 11:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il fait des choses grandes et insondables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des merveilles sans nombre.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, il passe près de moi, et je ne le vois pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’en va, et je ne l’aperçois pas.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’il enlève, qui s’y opposera?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qui lui dira: Que fais-tu?'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu ne retire point sa colère;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sous lui s’inclinent les appuis de l’orgueil.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et moi, comment lui répondre?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quelles paroles choisir?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je serais juste, je ne répondrais pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne puis qu’implorer mon juge.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et quand il m’exaucerait, si je l’invoque,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne croirais pas qu’il eût écouté ma voix,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui qui m’assaille comme par une tempête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui multiplie sans raison mes blessures,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui ne me laisse pas respirer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui me rassasie d’amertume.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Recourir à la force?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est tout-puissant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la justice? Qui me fera comparaître?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je sais bien qu’il en est ainsi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Comment '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 143:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: l’homme serait-il juste devant Dieu?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Suis-je juste, ma bouche me condamnera;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Suis-je innocent, il me déclarera coupable.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 21-35: cf. (Ec 9:1-3; 8:14.) Ps 73:13-15. Job 10.'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Innocent! Je le suis; mais je ne tiens pas à la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je méprise mon existence.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’importe après tout? Car, j’ose le dire,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 9:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal 3:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il détruit l’innocent comme le coupable.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si du moins le fléau donnait soudain la mort!…
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il se rit des épreuves de l’innocent.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre est livrée aux mains de l’impie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il voile la face des juges.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si ce n’est pas lui, qui est-ce donc?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 7:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mes jours sont plus rapides qu’un courrier;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils fuient sans avoir vu le bonheur;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils passent comme les navires de jonc,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme l’aigle qui fond sur sa proie.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Si je dis: Je veux oublier mes souffrances,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Laisser ma tristesse, reprendre courage,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis effrayé de toutes mes douleurs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je sais que tu ne me tiendras pas pour innocent.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je serai jugé coupable;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi me fatiguer en vain?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’il voulait contester avec lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur mille choses il ne pourrait répondre à une seule.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 2:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Quand je me laverais dans la neige,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je purifierais mes mains avec du savon,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu me plongerais dans la fange,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mes vêtements m’auraient en horreur.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 6:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 49:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il n’est pas un homme comme moi, pour que je lui réponde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que nous allions ensemble en justice.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y a pas entre nous d’arbitre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui pose sa main sur nous deux.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 13:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qu’il retire sa verge de dessus moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ses terreurs ne me troublent plus;
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors je parlerai et je ne le craindrai pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Autrement, je ne suis point à moi-même.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A lui la sagesse et la toute-puissance:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui lui résisterait impunément?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il transporte soudain les montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les renverse dans sa colère.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il secoue la terre sur sa base,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses colonnes sont ébranlées.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il commande au soleil, et le soleil ne paraît pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il met un sceau sur les étoiles.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Seul, il étend '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il marche sur les hauteurs de la mer.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a créé la Grande Ourse, l’Orion et les Pléiades,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les étoiles des régions australes.
