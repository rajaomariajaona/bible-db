document_id: JOB.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Réponse de Job à Bildad
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-20: cf. (Ps 130:3. Ro 3:19, 20.) (Ps 147:5. Da 4:34, 35, 37.) Job 33:8-13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je sais bien qu’il en est ainsi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Comment '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 143:2
      metadata:
        usfm: PSA.143.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: l’homme serait-il juste devant Dieu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: S’il voulait contester avec lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur mille choses il ne pourrait répondre à une seule.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'A lui la sagesse et la toute-puissance:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui lui résisterait impunément?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il transporte soudain les montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les renverse dans sa colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il secoue la terre sur sa base,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses colonnes sont ébranlées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il commande au soleil, et le soleil ne paraît pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il met un sceau sur les étoiles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Seul, il étend '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 1:6
      metadata:
        usfm: GEN.1.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: les cieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il marche sur les hauteurs de la mer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il a créé la Grande Ourse, l’Orion et les Pléiades,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les étoiles des régions australes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 5:9
      metadata:
        usfm: JOB.5.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 72:18
      metadata:
        usfm: PSA.72.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 77:15
      metadata:
        usfm: PSA.77.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 86:10
      metadata:
        usfm: PSA.86.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:33
      metadata:
        usfm: ROM.11.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il fait des choses grandes et insondables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des merveilles sans nombre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Voici, il passe près de moi, et je ne le vois pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il s’en va, et je ne l’aperçois pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: S’il enlève, qui s’y opposera?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Qui lui dira: Que fais-tu?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dieu ne retire point sa colère;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sous lui s’inclinent les appuis de l’orgueil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Et moi, comment lui répondre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quelles paroles choisir?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Quand je serais juste, je ne répondrais pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne puis qu’implorer mon juge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Et quand il m’exaucerait, si je l’invoque,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne croirais pas qu’il eût écouté ma voix,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Lui qui m’assaille comme par une tempête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui multiplie sans raison mes blessures,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Qui ne me laisse pas respirer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui me rassasie d’amertume.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Recourir à la force?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est tout-puissant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A la justice? Qui me fera comparaître?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Suis-je juste, ma bouche me condamnera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Suis-je innocent, il me déclarera coupable.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-35: cf. (Ec 9:1-3; 8:14.) Ps 73:13-15. Job 10.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Innocent! Je le suis; mais je ne tiens pas à la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je méprise mon existence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Qu’importe après tout? Car, j’ose le dire,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 9:2
      metadata:
        usfm: ECC.9.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: ECC.9.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal 3:14
      metadata:
        usfm: MAL.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il détruit l’innocent comme le coupable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Si du moins le fléau donnait soudain la mort!…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il se rit des épreuves de l’innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: La terre est livrée aux mains de l’impie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il voile la face des juges.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si ce n’est pas lui, qui est-ce donc?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 7:6
      metadata:
        usfm: JOB.7.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: JOB.7.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mes jours sont plus rapides qu’un courrier;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils fuient sans avoir vu le bonheur;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ils passent comme les navires de jonc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme l’aigle qui fond sur sa proie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Si je dis: Je veux oublier mes souffrances,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Laisser ma tristesse, reprendre courage,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Je suis effrayé de toutes mes douleurs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je sais que tu ne me tiendras pas pour innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Je serai jugé coupable;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi me fatiguer en vain?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:22
      metadata:
        usfm: JER.2.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Quand je me laverais dans la neige,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand je purifierais mes mains avec du savon,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Tu me plongerais dans la fange,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mes vêtements m’auraient en horreur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 6:10
      metadata:
        usfm: ECC.6.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 49:19
      metadata:
        usfm: JER.49.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il n’est pas un homme comme moi, pour que je lui réponde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour que nous allions ensemble en justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il n’y a pas entre nous d’arbitre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui pose sa main sur nous deux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 13:20
      metadata:
        usfm: JOB.13.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 33:7
      metadata:
        usfm: JOB.33.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qu’il retire sa verge de dessus moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ses terreurs ne me troublent plus;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Alors je parlerai et je ne le craindrai pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Autrement, je ne suis point à moi-même.
