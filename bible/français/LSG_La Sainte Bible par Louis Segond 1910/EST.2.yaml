document_id: EST.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Esther choisie pour reine
  - type: heading
    content: 'V. 1-18: cf. Est 1:10-22. (1 S 2:7, 8. Pr 15:33; 22:4.) Ép 6:1-3.'
  - type: text
    content: 'Après ces choses, lorsque la colère du roi Assuérus se fut calmée, il pensa à Vasthi, à ce qu’elle avait fait, et à la décision qui avait été prise à son sujet. '
  '10':
  - type: text
    content: 'Esther ne fit connaître ni son peuple ni sa naissance, car Mardochée lui avait défendu d’en parler. '
  '11':
  - type: text
    content: 'Et chaque jour Mardochée allait et venait devant la cour de la maison des femmes, pour savoir comment se portait Esther et comment on la traitait. '
  '12':
  - type: text
    content: 'Chaque jeune fille allait à son tour vers le roi Assuérus, après avoir employé douze mois à s’acquitter de ce qui était prescrit aux femmes; pendant ce temps, elles prenaient soin de leur toilette, six mois avec de l’huile de myrrhe, et six mois avec des aromates et des parfums en usage parmi les femmes. '
  '13':
  - type: text
    content: 'C’est ainsi que chaque jeune fille allait vers le roi; et, quand elle passait de la maison des femmes dans la maison du roi, on lui laissait prendre avec elle tout ce qu’elle voulait. '
  '14':
  - type: text
    content: 'Elle y allait le soir; et le lendemain matin elle passait dans la seconde maison des femmes, sous la surveillance de Schaaschgaz, eunuque du roi et gardien des concubines. Elle ne retournait plus vers le roi, à moins que le roi n’en eût le désir et qu’elle ne fût appelée par son nom. '
  '15':
  - type: text
    content: 'Lorsque son tour d’aller vers le roi fut arrivé, Esther, fille d’Abichaïl, oncle de Mardochée qui l’avait adoptée pour fille, ne demanda que ce qui fut désigné par Hégaï, eunuque du roi et gardien des femmes. Esther trouvait grâce aux yeux de tous ceux qui la voyaient. '
  '16':
  - type: text
    content: 'Esther fut conduite auprès du roi Assuérus, dans sa maison royale, le dixième mois, qui est le mois de Tébeth, la septième année de son règne. '
  '17':
  - type: text
    content: 'Le roi aima Esther plus que toutes les autres femmes, et elle obtint grâce et faveur devant lui plus que toutes les autres jeunes filles. Il mit la couronne royale sur sa tête, et la fit reine à la place de Vasthi. '
  '18':
  - type: text
    content: Le roi donna un grand festin à tous ses princes et à ses serviteurs, un festin en l’honneur d’Esther; il accorda du repos aux provinces, et fit des présents avec une libéralité royale.
  - type: heading
    content: Conspiration contre le roi, découverte par Mardochée
  - type: heading
    content: 'V. 19-23: cf. Est 6:1, etc.'
  '19':
  - type: text
    content: 'La seconde fois qu’on assembla les jeunes filles, Mardochée était assis à la porte du roi. '
  '2':
  - type: text
    content: 'Alors ceux qui servaient le roi dirent: Qu’on cherche pour le roi des jeunes filles, vierges et belles de figure; '
  '20':
  - type: text
    content: 'Esther n’avait fait connaître ni sa naissance ni son peuple, car Mardochée le lui avait défendu, et elle suivait les ordres de Mardochée aussi fidèlement qu’à l’époque où elle était sous sa tutelle. '
  '21':
  - type: text
    content: 'Dans ce même temps, comme Mardochée était assis à la porte du roi, Bigthan et Théresch, deux eunuques du roi, gardes du seuil, cédèrent à un mouvement d’irritation et voulurent porter la main sur le roi Assuérus. '
  '22':
  - type: text
    content: 'Mardochée eut connaissance de la chose et en informa la reine Esther, qui la redit au roi de la part de Mardochée. '
  '23':
  - type: text
    content: Le fait ayant été vérifié et trouvé exact, les deux eunuques furent pendus à un bois. Et cela fut écrit dans le livre des Chroniques en présence du roi.
  '3':
  - type: text
    content: 'que le roi établisse dans toutes les provinces de son royaume des commissaires chargés de rassembler toutes les jeunes filles, vierges et belles de figure, à Suse, la capitale, dans la maison des femmes, sous la surveillance d’Hégué, eunuque du roi et gardien des femmes, qui leur donnera les choses nécessaires pour leur toilette; '
  '4':
  - type: text
    content: 'et que la jeune fille qui plaira au roi devienne reine à la place de Vasthi. Cet avis eut l’approbation du roi, et il fit ainsi. '
  '5':
  - type: text
    content: 'Il y avait dans Suse, la capitale, un Juif nommé Mardochée, fils de Jaïr, fils de Schimeï, fils de Kis, homme de Benjamin, '
  '6':
  - type: text
    content: 'qui avait été emmené de Jérusalem '
  - type: note
    content: 2 R 24:14.
  - type: text
    content: 'parmi les captifs déportés avec Jeconia, roi de Juda, par Nebucadnetsar, roi de Babylone. '
  '7':
  - type: text
    content: 'Il élevait Hadassa, qui est Esther, fille de son oncle; car elle n’avait ni père ni mère. La jeune fille était belle de taille et belle de figure. A la mort de son père et de sa mère, Mardochée l’avait adoptée pour fille. '
  '8':
  - type: text
    content: 'Lorsqu’on eut publié l’ordre du roi et son édit, et qu’un grand nombre de jeunes filles furent rassemblées à Suse, la capitale, sous la surveillance d’Hégaï, Esther fut aussi prise et conduite dans la maison du roi, sous la surveillance d’Hégaï, gardien des femmes. '
  '9':
  - type: text
    content: 'La jeune fille lui plut, et trouva grâce devant lui; il s’empressa de lui fournir les choses nécessaires pour sa toilette et pour sa subsistance, lui donna sept jeunes filles choisies dans la maison du roi, et la plaça avec ses jeunes filles dans le meilleur appartement de la maison des femmes. '
