document_id: 2SA.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Siège de Rabba, capitale des Ammonites. — Conduite criminelle de David à l’égard de Bath-Schéba et d’Urie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-27: cf. (Mt 5:27, 28. Ja 1:13-15. Pr 6:27-35.) 2 S 12. Mc 13:37.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Ch 20:1, etc.
    marker-yv: yv-n
  - type: text
    text: 'L’année suivante, au temps où les rois se mettaient en campagne, David envoya Joab, avec ses serviteurs et tout Israël, pour détruire les fils d’Ammon et pour assiéger Rabba. Mais David resta à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Un soir, David se leva de sa couche; et, comme il se promenait sur le toit de la maison royale, il aperçut de là une femme qui se baignait, et qui était très belle de figure. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David fit demander qui était cette femme, et on lui dit: N’est-ce pas Bath-Schéba, fille d’Éliam, femme d’Urie, le Héthien? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et David envoya des gens pour la chercher. Elle vint vers lui, et il coucha avec elle. Après s’être '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Lé 15:19, etc.; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:19
      metadata:
        usfm: LEV.18.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'purifiée de sa souillure, elle retourna dans sa maison. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Cette femme devint enceinte, et elle fit dire à David: Je suis enceinte. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors David expédia cet ordre à Joab: Envoie-moi Urie, le Héthien. Et Joab envoya Urie à David. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Urie se rendit auprès de David, qui l’interrogea sur l’état de Joab, sur l’état du peuple, et sur l’état de la guerre. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Puis David dit à Urie: Descends dans ta maison, et lave tes pieds. Urie sortit de la maison royale, et il fut suivi d’un présent du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais Urie se coucha à la porte de la maison royale, avec tous les serviteurs de son maître, et il ne descendit point dans sa maison. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On en informa David, et on lui dit: Urie n’est pas descendu dans sa maison. Et David dit à Urie: N’arrives-tu pas de voyage? Pourquoi n’es-tu pas descendu dans ta maison? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Urie répondit à David: L’arche et Israël et Juda habitent sous des tentes, mon seigneur Joab et les serviteurs de mon seigneur campent en rase campagne, et moi j’entrerais dans ma maison pour manger et boire et pour coucher avec ma femme! Aussi vrai que tu es vivant et que ton âme est vivante, je ne ferai point cela. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'David dit à Urie: Reste ici encore aujourd’hui, et demain je te renverrai. Et Urie resta à Jérusalem ce jour-là et le lendemain. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'David l’invita à manger et à boire en sa présence, et il l’enivra; et le soir, Urie sortit pour se mettre sur sa couche, avec les serviteurs de son maître, mais il ne descendit point dans sa maison. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le lendemain matin, David écrivit une lettre à Joab, et l’envoya par la main d’Urie. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il écrivit dans cette lettre: Placez Urie au plus fort du combat, et retirez-vous de lui, afin qu’il soit frappé et qu’il meure. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Joab, en assiégeant la ville, plaça Urie à l’endroit qu’il savait défendu par de vaillants soldats. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les hommes de la ville firent une sortie et se battirent contre Joab; plusieurs tombèrent parmi le peuple, parmi les serviteurs de David, et Urie, le Héthien, fut aussi tué. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Joab envoya un messager pour faire rapport à David de tout ce qui s’était passé dans le combat. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il donna cet ordre au messager: Quand tu auras achevé de raconter au roi tous les détails du combat, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'peut-être se mettra-t-il en fureur et te dira-t-il: Pourquoi vous êtes vous approchés de la ville pour combattre? Ne savez-vous pas qu’on lance des traits du haut de la muraille? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 9:52
      metadata:
        usfm: JDG.9.52
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '53'
      metadata:
        usfm: JDG.9.53
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Qui a tué Abimélec, fils de Jerubbéscheth? N’est-ce pas une femme qui lança sur lui du haut de la muraille un morceau de meule de moulin, et n’en est-il pas mort à Thébets? Pourquoi vous êtes-vous approchés de la muraille? Alors tu diras: Ton serviteur Urie, le Héthien, est mort aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le messager partit: et, à son arrivée, il fit rapport à David de tout ce que Joab lui avait ordonné. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Le messager dit à David: Ces gens ont eu sur nous l’avantage; ils avaient fait une sortie contre nous dans les champs, et nous les avons repoussés jusqu’à l’entrée de la porte; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'les archers ont tiré du haut de la muraille sur tes serviteurs, et plusieurs des serviteurs du roi ont été tués, et ton serviteur Urie, le Héthien, est mort aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'David dit au messager: Voici ce que tu diras à Joab: Ne sois point peiné de cette affaire, car l’épée dévore tantôt l’un, tantôt l’autre; attaque vigoureusement la ville, et renverse-la. Et toi, encourage-le! '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'La femme d’Urie apprit que son mari était mort, et elle pleura son mari. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Quand le deuil fut passé, David l’envoya chercher et la recueillit dans sa maison. Elle devint sa femme, et lui enfanta un fils. Ce que David avait fait déplut à l’Éternel.
