document_id: 1CH.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David projette de bâtir un temple; opposition de l’Éternel. Promesses à la maison de David
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-14: cf. 2 S 7:1-16. (1 Ch 22:6-13; 28:2-7. 1 R 8:14-21.) Ps 89; 72. És 9:5, 6. Lu 1:31-33.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque David fut établi dans sa maison, il dit à Nathan le prophète: Voici, j’habite dans une maison de cèdre, et l’arche de l’alliance de l’Éternel est sous une tente. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nathan répondit à David: Fais tout ce que tu as dans le cœur, car Dieu est avec toi. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'La nuit suivante, la parole de Dieu fut adressée à Nathan: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Va dire à mon serviteur David: Ainsi parle l’Éternel: Ce ne sera pas toi qui me bâtiras une maison pour que j’en fasse ma demeure. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Car je n’ai point habité dans une maison depuis le jour où j’ai fait monter Israël jusqu’à ce jour; mais j’ai été de tente en tente et de demeure en demeure. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Partout où j’ai marché avec tout Israël, ai-je dit un mot à quelqu’un des juges d’Israël à qui j’avais ordonné de paître mon peuple, ai-je dit: Pourquoi ne me bâtissez-vous pas une maison de cèdre? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Maintenant tu diras à mon serviteur David: Ainsi parle l’Éternel des armées: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 16:11
      metadata:
        usfm: 1SA.16.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:70
      metadata:
        usfm: PSA.78.70
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je t’ai pris au pâturage, derrière les brebis, pour que tu fusses chef de mon peuple d’Israël; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'j’ai été avec toi partout où tu as marché, j’ai exterminé tous tes ennemis devant toi, et j’ai rendu ton nom semblable au nom des grands qui sont sur la terre; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'j’ai donné une demeure à mon peuple d’Israël, et je l’ai planté pour qu’il y soit fixé et ne soit plus agité, pour que les méchants ne le détruisent plus comme auparavant '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et comme à l’époque où j’avais établi des juges sur mon peuple d’Israël. J’ai humilié tous tes ennemis. Et je t’annonce que l’Éternel te bâtira une maison. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quand tes jours seront accomplis et que tu iras auprès de tes pères, j’élèverai ta postérité après toi, l’un de tes fils, et j’affermirai son règne. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 5:5
      metadata:
        usfm: 1KI.5.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:12
      metadata:
        usfm: 1KI.6.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ce sera lui qui me bâtira une maison, et j’affermirai pour toujours son trône. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 89:27
      metadata:
        usfm: PSA.89.27
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '29'
      metadata:
        usfm: PSA.89.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 1:5
      metadata:
        usfm: HEB.1.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: HEB.1.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je serai pour lui un père, et il sera pour moi un fils; et je ne lui retirerai point ma grâce, comme je l’ai retirée à celui qui t’a précédé. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:33
      metadata:
        usfm: LUK.1.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je l’établirai pour toujours dans ma maison et dans mon royaume, et son trône sera pour toujours affermi.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-27: cf. (2 S 7:18-29; 23:3-5.) (Ps 2; 110.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nathan rapporta à David toutes ces paroles et toute cette vision. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et le roi David alla se présenter devant l’Éternel, et dit: Qui suis-je, Éternel Dieu, et quelle est ma maison, pour que tu m’aies fait parvenir où je suis? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'C’est peu de chose à tes yeux, ô Dieu! Tu parles de la maison de ton serviteur pour les temps à venir. Et tu daignes porter les regards sur moi à la manière des hommes, toi qui es élevé, Éternel Dieu! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Que pourrait te dire encore David sur la gloire accordée à ton serviteur? Tu connais ton serviteur. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'O Éternel! C’est à cause de ton serviteur, et selon ton cœur, que tu as fait toutes ces grandes choses, pour les lui révéler. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 3:24
      metadata:
        usfm: DEU.3.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:35
      metadata:
        usfm: DEU.4.35
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:4
      metadata:
        usfm: DEU.6.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 8:23
      metadata:
        usfm: 1KI.8.23
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '60'
      metadata:
        usfm: 1KI.8.60
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 86:8
      metadata:
        usfm: PSA.86.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 37:16
      metadata:
        usfm: ISA.37.16
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: ISA.37.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 3:29
      metadata:
        usfm: DAN.3.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 13:4
      metadata:
        usfm: HOS.13.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'O Éternel! Nul n’est semblable à toi et il n’y a point d’autre Dieu que toi, d’après tout ce que nous avons entendu de nos oreilles. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:7
      metadata:
        usfm: DEU.4.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 33:29
      metadata:
        usfm: DEU.33.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 147:20
      metadata:
        usfm: PSA.147.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Est-il sur la terre une seule nation qui soit comme ton peuple d’Israël, que Dieu est venu racheter pour en former son peuple, pour te faire un nom et pour accomplir des miracles et des prodiges, en chassant des nations devant ton peuple que tu as racheté d’Égypte? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu as établi ton peuple d’Israël, pour qu’il fût ton peuple à toujours; et toi, Éternel, tu es devenu son Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Maintenant, ô Éternel! Que la parole que tu as prononcée sur ton serviteur et sur sa maison subsiste éternellement, et agis selon ta parole! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Qu’elle subsiste, afin que ton nom soit à jamais glorifié et que l’on dise: L’Éternel des armées, le Dieu d’Israël, est un Dieu pour Israël! Et que la maison de David, ton serviteur, soit affermie devant toi! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Car toi-même, ô mon Dieu, tu as révélé à ton serviteur que tu lui bâtirais une maison. C’est pourquoi ton serviteur a osé prier devant toi. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Maintenant, ô Éternel! Tu es Dieu, et tu as annoncé cette grâce à ton serviteur. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Veuille donc bénir la maison de ton serviteur, afin qu’elle subsiste à toujours devant toi! Car ce que tu bénis, ô Éternel! Est béni pour l’éternité.
