document_id: HEB.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'La foi: sa nature, ses effets, et les promesses qui s’y rattachent. Exemples tirés de l’Ancien Testament'
  - type: heading
    content: 'V. 1-3: cf. (Jn 8:56. 1 Pi 1:8.) Ps 33:6, 9.'
  - type: text
    content: 'Or la foi est une ferme assurance des choses qu’on espère, une démonstration de celles qu’on ne voit pas. '
  '10':
  - type: text
    content: 'Car il attendait la cité qui a de solides fondements, celle dont Dieu est l’architecte et le constructeur. '
  '11':
  - type: text
    content: 'C’est par la foi que '
  - type: note
    content: Ge 17:19; 21:2.
  - type: text
    content: 'Sara elle-même, '
  - type: note
    content: Lu 1:36.
  - type: text
    content: 'malgré son âge avancé, fut rendue capable d’avoir une postérité, parce qu’elle crut à la fidélité de celui qui avait fait la promesse. '
  '12':
  - type: text
    content: 'C’est pourquoi d’un seul homme, déjà usé de corps, naquit une postérité nombreuse '
  - type: note
    content: Ge 15:5; 22:17. Ro 4:18.
  - type: text
    content: 'comme les étoiles du ciel, comme le sable qui est sur le bord de la mer et qu’on ne peut compter. '
  '13':
  - type: note
    content: Jn 8:53.
  - type: text
    content: 'C’est dans la foi qu’ils sont tous morts, sans avoir obtenu les choses promises; mais ils les ont vues et saluées de loin, reconnaissant '
  - type: note
    content: Ge 23:4; 47:9.
  - type: text
    content: 'qu’ils étaient étrangers et voyageurs sur la terre. '
  '14':
  - type: text
    content: 'Ceux qui parlent ainsi montrent qu’ils cherchent une patrie. '
  '15':
  - type: text
    content: 'S’ils avaient eu en vue celle d’où ils étaient sortis, ils auraient eu le temps d’y retourner. '
  '16':
  - type: text
    content: 'Mais maintenant ils en désirent une meilleure, c’est-à-dire une céleste. C’est pourquoi Dieu n’a pas honte '
  - type: note
    content: Ex 3:6. Mt 22:32. Ac 7:32.
  - type: text
    content: 'd’être appelé leur Dieu, car il leur a préparé une cité. '
  '17':
  - type: note
    content: Ge 22:10.
  - type: text
    content: 'C’est par la foi qu’Abraham offrit Isaac, lorsqu’il fut mis à l’épreuve, et qu’il offrit son fils unique, lui qui avait reçu les promesses, '
  '18':
  - type: text
    content: 'et à qui il avait été dit: '
  - type: note
    content: Ge 21:12. Ro 9:7. Ga 3:29.
  - type: text
    content: 'En Isaac sera nommée pour toi une postérité. '
  '19':
  - type: text
    content: Il pensait que Dieu est puissant, même pour ressusciter les morts; aussi le recouvra-t-il par une sorte de résurrection.
  - type: heading
    content: 'V. 20-22: cf. Ge 27:27-40; 48:5-20; 50:24, 25.'
  '2':
  - type: text
    content: 'Pour l’avoir possédée, les anciens ont obtenu un témoignage favorable. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ge 27:28, 39.
  - type: text
    content: 'C’est par la foi qu’Isaac bénit Jacob et Ésaü, en vue des choses à venir. '
  '21':
  - type: note
    content: Ge 48:15.
  - type: text
    content: 'C’est par la foi que Jacob mourant bénit chacun des fils de Joseph, '
  - type: note
    content: Ge 47:31.
  - type: text
    content: 'et qu’il adora, appuyé sur l’extrémité de son bâton. '
  '22':
  - type: note
    content: Ge 50:24.
  - type: text
    content: C’est par la foi que Joseph mourant fit mention de la sortie des fils d’Israël, et qu’il donna des ordres au sujet de ses os.
  - type: heading
    content: 'V. 23-29: cf. Ac 7:20-36. Ex 2 à 14.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: Ex 2:2. Ac 7:20.
  - type: text
    content: 'C’est par la foi que Moïse, à sa naissance, fut caché pendant trois mois par ses parents, parce qu’ils virent que l’enfant était beau, et qu’ils ne craignirent pas l’ordre du roi. '
  '24':
  - type: text
    content: 'C’est par la foi que Moïse, devenu grand, refusa d’être appelé fils de la fille de Pharaon, '
  '25':
  - type: note
    content: Ps 84:11.
  - type: text
    content: 'aimant mieux être maltraité avec le peuple de Dieu que d’avoir pour un temps la jouissance du péché, '
  '26':
  - type: text
    content: 'regardant l’opprobre de Christ comme une richesse plus grande que les trésors de l’Égypte, car il avait les yeux fixés sur la rémunération. '
  '27':
  - type: text
    content: 'C’est par la foi qu’il quitta l’Égypte, sans être effrayé de la colère du roi; car il se montra ferme, comme voyant celui qui est invisible. '
  '28':
  - type: note
    content: Ex 12:21.
  - type: text
    content: 'C’est par la foi qu’il fit la Pâque et l’aspersion du sang, afin que l’exterminateur ne touchât pas aux premiers-nés des Israélites. '
  '29':
  - type: note
    content: Ex 14:22.
  - type: text
    content: C’est par la foi qu’ils traversèrent la mer Rouge comme un lieu sec, tandis que les Égyptiens qui en firent la tentative furent engloutis.
  - type: heading
    content: 'V. 30-40: cf. Jos 2; 6. Jg 4; 6; 11; 14. 1 S 7:9-11; 17. (Ja 5:10. Hé 6:12.)'
  '3':
  - type: text
    content: 'C’est par la foi que nous reconnaissons '
  - type: note
    content: Ge 1:1. Ps 33:6. Jn 1:10. Ép 3:9. Col 1:16.
  - type: text
    content: 'que le monde a été formé par la parole de Dieu, '
  - type: note
    content: Ro 4:17. Col 1:16.
  - type: text
    content: en sorte que ce qu’on voit n’a pas été fait de choses visibles.
  - type: heading
    content: 'V. 4-7: cf. Ge 4:1-10; 5:21-24; 6:8-22; 7; 8.'
  '30':
  - type: text
    content: ' '
  - type: note
    content: Jos 6:20.
  - type: text
    content: 'C’est par la foi que les murailles de Jéricho tombèrent, après qu’on en eut fait le tour pendant sept jours. '
  '31':
  - type: note
    content: Jos 6:23. Ja 2:25.
  - type: text
    content: 'C’est par la foi que Rahab la prostituée ne périt pas avec les rebelles, '
  - type: note
    content: Jos 2:1.
  - type: text
    content: 'parce qu’elle avait reçu les espions avec bienveillance. '
  '32':
  - type: text
    content: 'Et que dirai-je encore? Car le temps me manquerait pour parler de '
  - type: note
    content: Jg 6:11.
  - type: text
    content: 'Gédéon, de '
  - type: note
    content: Jg 4:6.
  - type: text
    content: 'Barak, de '
  - type: note
    content: Jg 13:24.
  - type: text
    content: 'Samson, de '
  - type: note
    content: Jg 11:1; 12:7.
  - type: text
    content: 'Jephthé, de '
  - type: note
    content: 1 S 17:45.
  - type: text
    content: 'David, de '
  - type: note
    content: 1 S 12:20.
  - type: text
    content: 'Samuel, et des prophètes, '
  '33':
  - type: text
    content: 'qui, par la foi, vainquirent des royaumes, exercèrent la justice, obtinrent des promesses, fermèrent '
  - type: note
    content: Jg 14:6. 1 S 17:34. Da 6:23.
  - type: text
    content: 'la gueule des lions, '
  '34':
  - type: note
    content: Da 3:25.
  - type: text
    content: 'éteignirent la puissance du feu, '
  - type: note
    content: 1 S 20:1. 1 R 19:3. 2 R 6:16.
  - type: text
    content: 'échappèrent au tranchant de l’épée, '
  - type: note
    content: Job 42:10. Ps 6:9. És 38:21.
  - type: text
    content: 'guérirent de leurs maladies, furent vaillants à la guerre, mirent en fuite des armées étrangères. '
  '35':
  - type: note
    content: 1 R 17:23. 2 R 4:36.
  - type: text
    content: 'Des femmes recouvrèrent leurs morts par la résurrection; '
  - type: note
    content: Ac 22:25.
  - type: text
    content: 'd’autres furent livrés aux tourments, et n’acceptèrent point de délivrance, afin d’obtenir une meilleure résurrection; '
  '36':
  - type: text
    content: 'd’autres subirent les moqueries et le fouet, '
  - type: note
    content: Jé 20:2.
  - type: text
    content: 'les chaînes et la prison; '
  '37':
  - type: note
    content: 1 R 21:13.
  - type: text
    content: 'ils furent lapidés, sciés, torturés, ils moururent tués par l’épée, ils allèrent çà et là '
  - type: note
    content: 2 R 1:8. Mt 3:4.
  - type: text
    content: 'vêtus de peaux de brebis et de peaux de chèvres, dénués de tout, persécutés, maltraités, '
  '38':
  - type: text
    content: 'eux dont le monde n’était pas digne, errants dans les déserts et les montagnes, dans les cavernes et les antres de la terre. '
  '39':
  - type: text
    content: 'Tous ceux-là, à la foi desquels il a été rendu témoignage, n’ont pas obtenu ce qui leur était promis, '
  '4':
  - type: text
    content: 'C’est par la foi '
  - type: note
    content: Ge 4:4.
  - type: text
    content: 'qu’Abel offrit à Dieu un sacrifice plus excellent que celui de Caïn; c’est par elle qu’il '
  - type: note
    content: Mt 23:25.
  - type: text
    content: 'fut déclaré juste, Dieu approuvant ses offrandes; et c’est par elle qu’il parle encore, quoique mort. '
  '40':
  - type: text
    content: Dieu ayant en vue quelque chose de meilleur pour nous, afin qu’ils ne parvinssent pas sans nous à la perfection.
  '5':
  - type: text
    content: 'C’est par la foi '
  - type: note
    content: Ge 5:24.
  - type: text
    content: 'qu’Énoch fut enlevé pour qu’il ne vît point la mort, et qu’il ne parut plus parce que Dieu l’avait enlevé; car, avant son enlèvement, il avait reçu le témoignage qu’il était agréable à Dieu. '
  '6':
  - type: text
    content: 'Or sans la foi il est impossible de lui être agréable; car il faut que celui qui s’approche de Dieu croie que Dieu existe, et qu’il est le rémunérateur de ceux qui le cherchent. '
  '7':
  - type: text
    content: 'C’est par la foi que '
  - type: note
    content: Ge 6:13.
  - type: text
    content: Noé, divinement averti des choses qu’on ne voyait pas encore, et saisi d’une crainte respectueuse, construisit une arche pour sauver sa famille; c’est par elle qu’il condamna le monde, et devint héritier de la justice qui s’obtient par la foi.
  - type: heading
    content: 'V. 8-19: cf. Ge 12 à 22. Ac 7:2-7. Ro 4:17-25.'
  '8':
  - type: text
    content: 'C’est par la foi '
  - type: note
    content: Ge 12:4.
  - type: text
    content: 'qu’Abraham, lors de sa vocation, obéit et partit pour un lieu qu’il devait recevoir en héritage, et qu’il partit sans savoir où il allait. '
  '9':
  - type: text
    content: 'C’est par la foi qu’il vint s’établir dans la terre promise comme dans une terre étrangère, habitant sous des tentes, ainsi qu’Isaac et Jacob, les cohéritiers de la même promesse. '
