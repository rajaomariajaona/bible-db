document_id: HEB.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'La foi: sa nature, ses effets, et les promesses qui s’y rattachent. Exemples tirés de l’Ancien Testament'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-3: cf. (Jn 8:56. 1 Pi 1:8.) Ps 33:6, 9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Or la foi est une ferme assurance des choses qu’on espère, une démonstration de celles qu’on ne voit pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Pour l’avoir possédée, les anciens ont obtenu un témoignage favorable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'C’est par la foi que nous reconnaissons '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 1:1
      metadata:
        usfm: GEN.1.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 33:6
      metadata:
        usfm: PSA.33.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:10
      metadata:
        usfm: JHN.1.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 3:9
      metadata:
        usfm: EPH.3.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:16
      metadata:
        usfm: COL.1.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que le monde a été formé par la parole de Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 4:17
      metadata:
        usfm: ROM.4.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:16
      metadata:
        usfm: COL.1.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: en sorte que ce qu’on voit n’a pas été fait de choses visibles.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 4-7: cf. Ge 4:1-10; 5:21-24; 6:8-22; 7; 8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'C’est par la foi '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 4:4
      metadata:
        usfm: GEN.4.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’Abel offrit à Dieu un sacrifice plus excellent que celui de Caïn; c’est par elle qu’il '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 23:25
      metadata:
        usfm: MAT.23.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'fut déclaré juste, Dieu approuvant ses offrandes; et c’est par elle qu’il parle encore, quoique mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'C’est par la foi '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 5:24
      metadata:
        usfm: GEN.5.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’Énoch fut enlevé pour qu’il ne vît point la mort, et qu’il ne parut plus parce que Dieu l’avait enlevé; car, avant son enlèvement, il avait reçu le témoignage qu’il était agréable à Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Or sans la foi il est impossible de lui être agréable; car il faut que celui qui s’approche de Dieu croie que Dieu existe, et qu’il est le rémunérateur de ceux qui le cherchent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'C’est par la foi que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 6:13
      metadata:
        usfm: GEN.6.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Noé, divinement averti des choses qu’on ne voyait pas encore, et saisi d’une crainte respectueuse, construisit une arche pour sauver sa famille; c’est par elle qu’il condamna le monde, et devint héritier de la justice qui s’obtient par la foi.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-19: cf. Ge 12 à 22. Ac 7:2-7. Ro 4:17-25.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'C’est par la foi '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 12:4
      metadata:
        usfm: GEN.12.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’Abraham, lors de sa vocation, obéit et partit pour un lieu qu’il devait recevoir en héritage, et qu’il partit sans savoir où il allait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'C’est par la foi qu’il vint s’établir dans la terre promise comme dans une terre étrangère, habitant sous des tentes, ainsi qu’Isaac et Jacob, les cohéritiers de la même promesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Car il attendait la cité qui a de solides fondements, celle dont Dieu est l’architecte et le constructeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C’est par la foi que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 17:19
      metadata:
        usfm: GEN.17.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:2
      metadata:
        usfm: GEN.21.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Sara elle-même, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:36
      metadata:
        usfm: LUK.1.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'malgré son âge avancé, fut rendue capable d’avoir une postérité, parce qu’elle crut à la fidélité de celui qui avait fait la promesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C’est pourquoi d’un seul homme, déjà usé de corps, naquit une postérité nombreuse '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 15:5
      metadata:
        usfm: GEN.15.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:17
      metadata:
        usfm: GEN.22.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 4:18
      metadata:
        usfm: ROM.4.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme les étoiles du ciel, comme le sable qui est sur le bord de la mer et qu’on ne peut compter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 8:53
      metadata:
        usfm: JHN.8.53
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est dans la foi qu’ils sont tous morts, sans avoir obtenu les choses promises; mais ils les ont vues et saluées de loin, reconnaissant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 23:4
      metadata:
        usfm: GEN.23.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 47:9
      metadata:
        usfm: GEN.47.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’ils étaient étrangers et voyageurs sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ceux qui parlent ainsi montrent qu’ils cherchent une patrie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'S’ils avaient eu en vue celle d’où ils étaient sortis, ils auraient eu le temps d’y retourner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais maintenant ils en désirent une meilleure, c’est-à-dire une céleste. C’est pourquoi Dieu n’a pas honte '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 3:6
      metadata:
        usfm: EXO.3.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:32
      metadata:
        usfm: MAT.22.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:32
      metadata:
        usfm: ACT.7.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'd’être appelé leur Dieu, car il leur a préparé une cité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 22:10
      metadata:
        usfm: GEN.22.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est par la foi qu’Abraham offrit Isaac, lorsqu’il fut mis à l’épreuve, et qu’il offrit son fils unique, lui qui avait reçu les promesses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'et à qui il avait été dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 21:12
      metadata:
        usfm: GEN.21.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:7
      metadata:
        usfm: ROM.9.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:29
      metadata:
        usfm: GAL.3.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'En Isaac sera nommée pour toi une postérité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il pensait que Dieu est puissant, même pour ressusciter les morts; aussi le recouvra-t-il par une sorte de résurrection.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-22: cf. Ge 27:27-40; 48:5-20; 50:24, 25.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 27:28
      metadata:
        usfm: GEN.27.28
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '39'
      metadata:
        usfm: GEN.27.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est par la foi qu’Isaac bénit Jacob et Ésaü, en vue des choses à venir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 48:15
      metadata:
        usfm: GEN.48.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est par la foi que Jacob mourant bénit chacun des fils de Joseph, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 47:31
      metadata:
        usfm: GEN.47.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et qu’il adora, appuyé sur l’extrémité de son bâton. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 50:24
      metadata:
        usfm: GEN.50.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: C’est par la foi que Joseph mourant fit mention de la sortie des fils d’Israël, et qu’il donna des ordres au sujet de ses os.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 23-29: cf. Ac 7:20-36. Ex 2 à 14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 2:2
      metadata:
        usfm: EXO.2.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:20
      metadata:
        usfm: ACT.7.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est par la foi que Moïse, à sa naissance, fut caché pendant trois mois par ses parents, parce qu’ils virent que l’enfant était beau, et qu’ils ne craignirent pas l’ordre du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'C’est par la foi que Moïse, devenu grand, refusa d’être appelé fils de la fille de Pharaon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 84:11
      metadata:
        usfm: PSA.84.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'aimant mieux être maltraité avec le peuple de Dieu que d’avoir pour un temps la jouissance du péché, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'regardant l’opprobre de Christ comme une richesse plus grande que les trésors de l’Égypte, car il avait les yeux fixés sur la rémunération. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'C’est par la foi qu’il quitta l’Égypte, sans être effrayé de la colère du roi; car il se montra ferme, comme voyant celui qui est invisible. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:21
      metadata:
        usfm: EXO.12.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est par la foi qu’il fit la Pâque et l’aspersion du sang, afin que l’exterminateur ne touchât pas aux premiers-nés des Israélites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 14:22
      metadata:
        usfm: EXO.14.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: C’est par la foi qu’ils traversèrent la mer Rouge comme un lieu sec, tandis que les Égyptiens qui en firent la tentative furent engloutis.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 30-40: cf. Jos 2; 6. Jg 4; 6; 11; 14. 1 S 7:9-11; 17. (Ja 5:10. Hé 6:12.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 6:20
      metadata:
        usfm: JOS.6.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est par la foi que les murailles de Jéricho tombèrent, après qu’on en eut fait le tour pendant sept jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 6:23
      metadata:
        usfm: JOS.6.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 2:25
      metadata:
        usfm: JAS.2.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est par la foi que Rahab la prostituée ne périt pas avec les rebelles, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 2:1
      metadata:
        usfm: JOS.2.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'parce qu’elle avait reçu les espions avec bienveillance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Et que dirai-je encore? Car le temps me manquerait pour parler de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 6:11
      metadata:
        usfm: JDG.6.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Gédéon, de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 4:6
      metadata:
        usfm: JDG.4.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Barak, de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 13:24
      metadata:
        usfm: JDG.13.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Samson, de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 11:1
      metadata:
        usfm: JDG.11.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:7
      metadata:
        usfm: JDG.12.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jephthé, de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 17:45
      metadata:
        usfm: 1SA.17.45
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'David, de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 12:20
      metadata:
