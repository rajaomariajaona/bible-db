verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 4:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne te vante pas du lendemain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu ne sais pas ce qu’un jour peut enfanter.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 17:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: N’abandonne pas ton ami et l’ami de ton père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et n’entre pas dans la maison de ton frère au jour de ta détresse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut un voisin proche qu’un frère éloigné.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon fils, sois sage, et réjouis mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je pourrai répondre à celui qui m’outrage.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 22:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’homme prudent voit le mal et se cache;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les simples avancent et sont punis.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 6:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Prends son vêtement, car il a cautionné autrui;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Exige de lui des gages, à cause des étrangers.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si l’on bénit son prochain à haute voix et de grand matin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cela est envisagé comme une malédiction.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 19:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Une gouttière continue dans un jour de pluie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et une femme querelleuse sont choses semblables.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui la retient retient le vent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa main saisit de l’huile.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme le fer aiguise le fer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi un homme excite la colère d’un homme.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui soigne un figuier en mangera le fruit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celui qui garde son maître sera honoré.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme dans l’eau le visage répond au visage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi le cœur de l’homme répond au cœur de l’homme.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’un autre te loue, et non ta bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un étranger, et non tes lèvres.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le séjour des morts et l’abîme sont insatiables;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 1:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: De même les yeux de l’homme sont insatiables.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le creuset est pour l’argent, et le fourneau pour l’or;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais un homme est jugé d’après sa renommée.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand tu pilerais l’insensé dans un mortier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu des grains avec le pilon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa folie ne se séparerait pas de lui.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Connais bien chacune de tes brebis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donne tes soins à tes troupeaux;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la richesse ne dure pas toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni une couronne éternellement.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le foin s’enlève, la verdure paraît,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les herbes des montagnes sont recueillies.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les agneaux sont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 6:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: pour te vêtir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les boucs pour payer le champ;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le lait des chèvres suffit à ta nourriture, à celle de ta maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et à l’entretien de tes servantes.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La pierre est pesante et le sable est lourd,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’humeur de l’insensé pèse plus que l’un et l’autre.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La fureur est cruelle et la colère impétueuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais qui résistera devant la jalousie?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut une réprimande ouverte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’une amitié cachée.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les blessures d’un ami prouvent sa fidélité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les baisers d’un ennemi sont trompeurs.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui est rassasié foule aux pieds le rayon de miel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui a faim trouve doux tout ce qui est amer.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme l’oiseau qui erre loin de son nid,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi est l’homme qui erre loin de son lieu.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’huile et les parfums réjouissent le cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les conseils affectueux d’un ami sont doux.
