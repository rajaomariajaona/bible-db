document_id: PRO.27
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 4:13
      metadata:
        usfm: JAS.4.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: JAS.4.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ne te vante pas du lendemain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu ne sais pas ce qu’un jour peut enfanter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Qu’un autre te loue, et non ta bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un étranger, et non tes lèvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: La pierre est pesante et le sable est lourd,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais l’humeur de l’insensé pèse plus que l’un et l’autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: La fureur est cruelle et la colère impétueuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais qui résistera devant la jalousie?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mieux vaut une réprimande ouverte
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’une amitié cachée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les blessures d’un ami prouvent sa fidélité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais les baisers d’un ennemi sont trompeurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Celui qui est rassasié foule aux pieds le rayon de miel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui a faim trouve doux tout ce qui est amer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Comme l’oiseau qui erre loin de son nid,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi est l’homme qui erre loin de son lieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’huile et les parfums réjouissent le cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les conseils affectueux d’un ami sont doux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 17:17
      metadata:
        usfm: PRO.17.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:24
      metadata:
        usfm: PRO.18.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: N’abandonne pas ton ami et l’ami de ton père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et n’entre pas dans la maison de ton frère au jour de ta détresse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mieux vaut un voisin proche qu’un frère éloigné.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mon fils, sois sage, et réjouis mon cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je pourrai répondre à celui qui m’outrage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 22:3
      metadata:
        usfm: PRO.22.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’homme prudent voit le mal et se cache;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les simples avancent et sont punis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 6:1
      metadata:
        usfm: PRO.6.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: PRO.6.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:15
      metadata:
        usfm: PRO.11.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:18
      metadata:
        usfm: PRO.17.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:16
      metadata:
        usfm: PRO.20.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Prends son vêtement, car il a cautionné autrui;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Exige de lui des gages, à cause des étrangers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Si l’on bénit son prochain à haute voix et de grand matin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cela est envisagé comme une malédiction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 19:13
      metadata:
        usfm: PRO.19.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Une gouttière continue dans un jour de pluie
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et une femme querelleuse sont choses semblables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Celui qui la retient retient le vent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa main saisit de l’huile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Comme le fer aiguise le fer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi un homme excite la colère d’un homme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Celui qui soigne un figuier en mangera le fruit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celui qui garde son maître sera honoré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Comme dans l’eau le visage répond au visage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi le cœur de l’homme répond au cœur de l’homme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le séjour des morts et l’abîme sont insatiables;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 1:8
      metadata:
        usfm: ECC.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: De même les yeux de l’homme sont insatiables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le creuset est pour l’argent, et le fourneau pour l’or;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais un homme est jugé d’après sa renommée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Quand tu pilerais l’insensé dans un mortier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au milieu des grains avec le pilon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa folie ne se séparerait pas de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Connais bien chacune de tes brebis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Donne tes soins à tes troupeaux;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Car la richesse ne dure pas toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni une couronne éternellement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Le foin s’enlève, la verdure paraît,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les herbes des montagnes sont recueillies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Les agneaux sont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 6:8
      metadata:
        usfm: 1TI.6.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: pour te vêtir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les boucs pour payer le champ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Le lait des chèvres suffit à ta nourriture, à celle de ta maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et à l’entretien de tes servantes.
