document_id: PRO.27,93
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Ja 4:13, 14.
  - type: text
    content: Ne te vante pas du lendemain,
  - type: text
    content: Car tu ne sais pas ce qu’un jour peut enfanter.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Pr 17:17; 18:24.
  - type: text
    content: N’abandonne pas ton ami et l’ami de ton père,
  - type: text
    content: Et n’entre pas dans la maison de ton frère au jour de ta détresse;
  - type: text
    content: Mieux vaut un voisin proche qu’un frère éloigné.
  '11':
  - type: text
    content: Mon fils, sois sage, et réjouis mon cœur,
  - type: text
    content: Et je pourrai répondre à celui qui m’outrage.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Pr 22:3.
  - type: text
    content: L’homme prudent voit le mal et se cache;
  - type: text
    content: Les simples avancent et sont punis.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Pr 6:1, 2; 11:15; 17:18; 20:16.
  - type: text
    content: Prends son vêtement, car il a cautionné autrui;
  - type: text
    content: Exige de lui des gages, à cause des étrangers.
  '14':
  - type: text
    content: Si l’on bénit son prochain à haute voix et de grand matin,
  - type: text
    content: Cela est envisagé comme une malédiction.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Pr 19:13.
  - type: text
    content: Une gouttière continue dans un jour de pluie
  - type: text
    content: Et une femme querelleuse sont choses semblables.
  '16':
  - type: text
    content: Celui qui la retient retient le vent,
  - type: text
    content: Et sa main saisit de l’huile.
  '17':
  - type: text
    content: Comme le fer aiguise le fer,
  - type: text
    content: Ainsi un homme excite la colère d’un homme.
  '18':
  - type: text
    content: Celui qui soigne un figuier en mangera le fruit,
  - type: text
    content: Et celui qui garde son maître sera honoré.
  '19':
  - type: text
    content: Comme dans l’eau le visage répond au visage,
  - type: text
    content: Ainsi le cœur de l’homme répond au cœur de l’homme.
  '2':
  - type: text
    content: Qu’un autre te loue, et non ta bouche,
  - type: text
    content: Un étranger, et non tes lèvres.
  '20':
  - type: text
    content: Le séjour des morts et l’abîme sont insatiables;
  - type: note
    content: Ec 1:8.
  - type: text
    content: De même les yeux de l’homme sont insatiables.
  '21':
  - type: text
    content: Le creuset est pour l’argent, et le fourneau pour l’or;
  - type: text
    content: Mais un homme est jugé d’après sa renommée.
  '22':
  - type: text
    content: Quand tu pilerais l’insensé dans un mortier,
  - type: text
    content: Au milieu des grains avec le pilon,
  - type: text
    content: Sa folie ne se séparerait pas de lui.
  '23':
  - type: text
    content: Connais bien chacune de tes brebis,
  - type: text
    content: Donne tes soins à tes troupeaux;
  '24':
  - type: text
    content: Car la richesse ne dure pas toujours,
  - type: text
    content: Ni une couronne éternellement.
  '25':
  - type: text
    content: Le foin s’enlève, la verdure paraît,
  - type: text
    content: Et les herbes des montagnes sont recueillies.
  '26':
  - type: text
    content: 'Les agneaux sont '
  - type: note
    content: 1 Ti 6:8.
  - type: text
    content: pour te vêtir,
  - type: text
    content: Et les boucs pour payer le champ;
  '27':
  - type: text
    content: Le lait des chèvres suffit à ta nourriture, à celle de ta maison,
  - type: text
    content: Et à l’entretien de tes servantes.
  '3':
  - type: text
    content: La pierre est pesante et le sable est lourd,
  - type: text
    content: Mais l’humeur de l’insensé pèse plus que l’un et l’autre.
  '4':
  - type: text
    content: La fureur est cruelle et la colère impétueuse,
  - type: text
    content: Mais qui résistera devant la jalousie?
  '5':
  - type: text
    content: Mieux vaut une réprimande ouverte
  - type: text
    content: Qu’une amitié cachée.
  '6':
  - type: text
    content: Les blessures d’un ami prouvent sa fidélité,
  - type: text
    content: Mais les baisers d’un ennemi sont trompeurs.
  '7':
  - type: text
    content: Celui qui est rassasié foule aux pieds le rayon de miel,
  - type: text
    content: Mais celui qui a faim trouve doux tout ce qui est amer.
  '8':
  - type: text
    content: Comme l’oiseau qui erre loin de son nid,
  - type: text
    content: Ainsi est l’homme qui erre loin de son lieu.
  '9':
  - type: text
    content: L’huile et les parfums réjouissent le cœur,
  - type: text
    content: Et les conseils affectueux d’un ami sont doux.
