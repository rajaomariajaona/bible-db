document_id: 1SA.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saül rejeté. David oint par Samuel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. (2 S 7:8, 9. Ps 78:70-72; 89:20, 21. Ac 13:22.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel dit à Samuel: Quand cesseras-tu de pleurer sur Saül? Je l’ai rejeté, afin qu’il ne règne plus sur Israël. Remplis ta corne d’huile, et va; je t’enverrai chez Isaï, Bethléhémite, car j’ai vu parmi ses fils celui que je désire pour roi. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Samuel dit: Comment irai-je? Saül l’apprendra, et il me tuera. Et l’Éternel dit: Tu emmèneras avec toi une génisse, et tu diras: Je viens pour offrir un sacrifice à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu inviteras Isaï au sacrifice; je te ferai connaître ce que tu dois faire, et tu oindras pour moi celui que je te dirai. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Samuel fit ce que l’Éternel avait dit, et il alla à Bethléhem. Les anciens de la ville accoururent effrayés au-devant de lui et dirent: Ton arrivée annonce-t-elle quelque chose d’heureux? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il répondit: Oui; je viens pour offrir un sacrifice à l’Éternel. Sanctifiez-vous, et venez avec moi au sacrifice. Il fit aussi sanctifier Isaï et ses fils, et il les invita au sacrifice. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lorsqu’ils entrèrent, il se dit, en voyant Éliab: Certainement, l’oint de l’Éternel est ici devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et l’Éternel dit à Samuel: Ne prends point garde à son apparence et à la hauteur de sa taille, car je l’ai rejeté. L’Éternel ne considère pas ce que l’homme considère; l’homme regarde à ce qui frappe les yeux, mais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 28:9
      metadata:
        usfm: 1CH.28.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 7:10
      metadata:
        usfm: PSA.7.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 11:20
      metadata:
        usfm: JER.11.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:10
      metadata:
        usfm: JER.17.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:12
      metadata:
        usfm: JER.20.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’Éternel regarde au cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Isaï appela Abinadab, et le fit passer devant Samuel; et Samuel dit: L’Éternel n’a pas non plus choisi celui-ci. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Isaï fit passer Schamma; et Samuel dit: L’Éternel n’a pas non plus choisi celui-ci. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Isaï fit passer ses sept fils devant Samuel; et Samuel dit à Isaï: L’Éternel n’a choisi aucun d’eux. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Puis Samuel dit à Isaï: Sont-ce là tous tes fils? Et il répondit: Il reste encore le plus jeune, mais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:8
      metadata:
        usfm: 2SA.7.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:70
      metadata:
        usfm: PSA.78.70
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il fait paître les brebis. Alors Samuel dit à Isaï: Envoie-le chercher, car nous ne nous placerons pas avant qu’il ne soit venu ici. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Isaï l’envoya chercher. Or il était blond, avec de beaux yeux et une belle figure. L’Éternel dit à Samuel: Lève-toi, oins-le, car c’est lui! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 89:21
      metadata:
        usfm: PSA.89.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Samuel prit la corne d’huile, et l’oignit au milieu de ses frères. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:46
      metadata:
        usfm: ACT.7.46
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:22
      metadata:
        usfm: ACT.13.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’esprit de l’Éternel saisit David, à partir de ce jour et dans la suite. Samuel se leva, et s’en alla à Rama.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saül et le mauvais esprit. David au service de Saül
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-23: cf. 1 S 18:10-15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L’esprit de l’Éternel se retira de Saül, qui fut agité par un mauvais esprit venant de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les serviteurs de Saül lui dirent: Voici, un mauvais esprit de Dieu t’agite. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Que notre seigneur parle! Tes serviteurs sont devant toi. Ils chercheront un homme qui sache jouer de la harpe; et, quand le mauvais esprit de Dieu sera sur toi, il jouera de sa main, et tu seras soulagé. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Saül répondit à ses serviteurs: Trouvez-moi donc un homme qui joue bien, et amenez-le-moi. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'L’un des serviteurs prit la parole, et dit: Voici, j’ai vu un fils d’Isaï, Bethléhémite, qui sait jouer; c’est aussi un homme fort et vaillant, un guerrier, parlant bien et d’une belle figure, et l’Éternel est avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Saül envoya des messagers à Isaï, pour lui dire: Envoie-moi David, ton fils, qui est avec les brebis. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Isaï prit un âne, qu’il chargea de pain, d’une outre de vin et d’un chevreau, et il envoya ces choses à Saül par David, son fils. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'David arriva auprès de Saül, et se présenta devant lui; il plut beaucoup à Saül, et il fut désigné pour porter ses armes. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Saül fit dire à Isaï: Je te prie de laisser David à mon service, car il a trouvé grâce à mes yeux. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Et lorsque l’esprit de Dieu était sur Saül, David prenait la harpe et jouait de sa main; Saül respirait alors plus à l’aise et se trouvait soulagé, et le mauvais esprit se retirait de lui.
