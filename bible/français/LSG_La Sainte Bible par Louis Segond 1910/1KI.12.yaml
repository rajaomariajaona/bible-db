document_id: 1KI.12,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: LES ROIS DE JUDA ET LES ROIS D’ISRAËL,
    marker-yv: yv-h
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: DEPUIS LA DIVISION DU ROYAUME JUSQU’À JOSAPHAT, ROI DE JUDA, ET ACHAB, ROI D’ISRAËL
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: Ch. 12 à 22. (2 Ch 10 à 20.) (Os 4:15-17; 6:10, 11.)
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Division du royaume: Roboam roi de Juda, Jéroboam roi d’Israël'
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-24: cf. 2 Ch 10; 11:1-12. Pr 3:7. Os 13:11.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Roboam '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 10:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'se rendit à Sichem, car tout Israël était venu à Sichem pour le faire roi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Et voici ce que lui dirent les jeunes gens qui avaient grandi avec lui: Tu parleras ainsi à ce peuple qui t’a tenu ce langage: Ton père a rendu notre joug pesant, et toi, allège-le-nous! Tu leur parleras ainsi: Mon petit doigt est plus gros que les reins de mon père. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Maintenant, mon père vous a chargés d’un joug pesant, et moi je vous le rendrai plus pesant; mon père vous a châtiés avec des fouets, et moi je vous châtierai avec des scorpions. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Jéroboam et tout le peuple vinrent à Roboam le troisième jour, suivant ce qu’avait dit le roi: Revenez vers moi dans trois jours. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Le roi répondit durement au peuple. Il laissa le conseil que lui avaient donné les vieillards, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'et il leur parla ainsi d’après le conseil des jeunes gens: Mon père a rendu votre joug pesant, et moi je vous le rendrai plus pesant; mon père vous a châtiés avec des fouets, et moi je vous châtierai avec des scorpions. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ainsi le roi n’écouta point le peuple; car cela fut dirigé par l’Éternel, en vue de l’accomplissement de la parole que l’Éternel avait '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 11:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'dite par Achija de Silo à Jéroboam, fils de Nebath. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Lorsque tout Israël vit que le roi ne l’écoutait pas, le peuple répondit au roi: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 20:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quelle part avons-nous avec David? Nous n’avons point d’héritage avec le fils d’Isaï! A tes tentes, Israël! Maintenant, pourvois à ta maison, David! Et Israël s’en alla dans ses tentes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Les enfants d’Israël qui habitaient les villes de Juda furent les seuls sur qui régna Roboam. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Alors le roi Roboam envoya '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 4:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Adoram, qui était préposé aux impôts. Mais Adoram fut lapidé par tout Israël, et il mourut. Et le roi Roboam se hâta de monter sur un char, pour s’enfuir à Jérusalem. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 17:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'C’est ainsi qu’Israël s’est détaché de la maison de David jusqu’à ce jour. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Lorsque Jéroboam, fils de Nebath, eut des nouvelles, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 11:40
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il était encore en Égypte, où il s’était enfui loin du roi Salomon, et c’était en Égypte qu’il demeurait. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tout Israël ayant appris que Jéroboam était de retour, ils l’envoyèrent appeler dans l’assemblée, et ils le firent roi sur tout Israël. La tribu de Juda fut la seule qui suivit la maison de David. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 11:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Roboam, arrivé à Jérusalem, rassembla toute la maison de Juda et la tribu de Benjamin, cent quatre-vingt mille hommes d’élite propres à la guerre, pour qu’ils combattissent contre la maison d’Israël afin de la ramener sous la domination de Roboam, fils de Salomon. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 11:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais la parole de Dieu fut ainsi adressée à Schemaeja, homme de Dieu: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Parle à Roboam, fils de Salomon, roi de Juda, et à toute la maison de Juda et de Benjamin, et au reste du peuple. Et dis-leur: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ainsi parle l’Éternel: Ne montez point, et ne faites pas la guerre à vos frères, les enfants d’Israël! Que chacun de vous retourne dans sa maison, car c’est de par moi que cette chose est arrivée. Ils obéirent à la parole de l’Éternel, et ils s’en retournèrent, selon la parole de l’Éternel.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le royaume d’Israël sous Jéroboam. Culte des veaux d’or
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 25-33: cf. Ex 32:1-8. (2 R 17:21, 22. 2 Ch 11:13-17.)'
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Jéroboam bâtit Sichem sur la montagne d’Éphraïm, et il y demeura; puis il en sortit, et bâtit '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 32:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Penuel. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Jéroboam dit en son cœur: Le royaume pourrait bien maintenant retourner à la maison de David. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Si ce peuple monte à Jérusalem pour faire des sacrifices dans la maison de l’Éternel, le cœur de ce peuple retournera à son seigneur, à Roboam, roi de Juda, et ils me tueront et retourneront à Roboam, roi de Juda. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Après s’être consulté, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 17:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le roi fit deux veaux d’or, et il dit au peuple: Assez longtemps vous êtes montés à Jérusalem; Israël! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'voici ton Dieu, qui t’a fait sortir du pays d’Égypte. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Il plaça l’un de ces veaux à Béthel, et il mit l’autre à Dan. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'On l’envoya appeler. Alors Jéroboam et toute l’assemblée d’Israël vinrent à Roboam et lui parlèrent ainsi: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ce fut là une occasion de péché. Le peuple alla devant l’un des veaux jusqu’à Dan. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Jéroboam fit une maison de hauts lieux, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 3:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 13:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 17:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 11:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il créa des sacrificateurs pris parmi tout le peuple et n’appartenant point aux fils de Lévi. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Il établit une fête au huitième mois, le quinzième jour du mois, comme la fête qui se célébrait en Juda, et il offrit des sacrifices sur l’autel. Voici ce qu’il fit à Béthel afin que l’on sacrifiât aux veaux qu’il avait faits. Il plaça à Béthel les prêtres des hauts lieux qu’il avait élevés. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Et il monta sur l’autel qu’il avait fait à Béthel, le quinzième jour du huitième mois, mois qu’il avait choisi de son gré. Il fit une fête pour les enfants d’Israël, et il monta sur l’autel pour brûler des parfums.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 10:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ton père a rendu notre joug dur; toi maintenant, allège cette rude servitude et le joug pesant que nous a imposé ton père. Et nous te servirons. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il leur dit: Allez, et revenez vers moi dans trois jours. Et le peuple s’en alla. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Le roi Roboam consulta les vieillards qui avaient été auprès de Salomon, son père, pendant sa vie, et il dit: Que conseillez-vous de répondre à ce peuple? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Et voici ce qu’ils lui dirent: Si aujourd’hui tu rends service à ce peuple, si tu leur cèdes, et si tu leur réponds par des paroles bienveillantes, ils seront pour toujours tes serviteurs. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mais Roboam laissa le conseil que lui donnaient les vieillards, et il consulta les jeunes gens qui avaient grandi avec lui et qui l’entouraient. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il leur dit: Que conseillez-vous de répondre à ce peuple qui me tient ce langage: Allège le joug que nous a imposé ton père? '
