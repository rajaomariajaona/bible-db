document_id: MIC.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-5: cf. És 3:14, 15; 5:8, etc. Am 4:1-3; 5:11-13.'
  - type: text
    content: Malheur à ceux qui méditent l’iniquité et qui forgent le mal
  - type: text
    content: Sur leur couche!
  - type: text
    content: Au point du jour ils l’exécutent,
  - type: text
    content: Quand ils ont le pouvoir en main.
  '10':
  - type: text
    content: Levez-vous, marchez! Car ce n’est point ici un lieu de repos;
  - type: text
    content: A cause de la souillure, il y aura des douleurs, des douleurs violentes.
  '11':
  - type: text
    content: 'Si un homme court après le vent et débite des mensonges:'
  - type: text
    content: Je vais te prophétiser sur le vin, sur les boissons fortes!
  - type: text
    content: Ce sera pour ce peuple un prophète.
  - type: heading
    content: 'V. 12-13: cf. Jé 23:3, 7, 8. Za 10:8-12.'
  '12':
  - type: text
    content: Je te rassemblerai tout entier, ô Jacob!
  - type: text
    content: Je rassemblerai les restes d’Israël,
  - type: text
    content: Je les réunirai comme les brebis d’une bergerie,
  - type: text
    content: Comme le troupeau dans son pâturage;
  - type: text
    content: Il y aura un grand bruit d’hommes.
  '13':
  - type: text
    content: Celui qui fera la brèche montera devant eux;
  - type: text
    content: Ils feront la brèche, franchiront la porte et en sortiront;
  - type: text
    content: Leur roi marchera devant eux,
  - type: text
    content: Et l’Éternel sera à leur tête.
  '2':
  - type: text
    content: ' '
  - type: note
    content: És 5:8.
  - type: text
    content: Ils convoitent des champs, et ils s’en emparent,
  - type: text
    content: Des maisons, et ils les enlèvent;
  - type: text
    content: Ils portent leur violence sur l’homme et sur sa maison,
  - type: text
    content: Sur l’homme et sur son héritage.
  '3':
  - type: text
    content: 'C’est pourquoi ainsi parle l’Éternel:'
  - type: text
    content: Voici, je médite contre cette race un malheur;
  - type: text
    content: Vous n’en préserverez pas vos cous,
  - type: text
    content: Et vous ne marcherez pas la tête levée,
  - type: text
    content: 'Car ces temps seront '
  - type: note
    content: Am 5:13.
  - type: text
    content: mauvais.
  '4':
  - type: text
    content: En ce jour-là, on fera de vous un sujet de sarcasme,
  - type: text
    content: On poussera des cris lamentables,
  - type: text
    content: 'On dira: Nous sommes entièrement dévastés!'
  - type: text
    content: Il donne à d’autres la part de mon peuple!
  - type: text
    content: Eh quoi! Il me l’enlève!
  - type: text
    content: Il distribue nos champs à l’ennemi!…
  '5':
  - type: text
    content: C’est pourquoi tu n’auras personne
  - type: text
    content: 'Qui '
  - type: note
    content: De 32:8, 9.
  - type: text
    content: étende le cordeau sur un lot,
  - type: text
    content: Dans l’assemblée de l’Éternel.
  - type: heading
    content: 'V. 6-11: cf. És 30:9-14. (Lé 18:24-28. És 36:17-19.)'
  '6':
  - type: text
    content: 'Ne prophétisez pas! '
  - type: note
    content: És 30:10. Am 7:16.
  - type: text
    content: disent-ils.
  - type: text
    content: Qu’on ne prophétise pas de telles choses!
  - type: text
    content: Les invectives n’ont point de fin!
  '7':
  - type: text
    content: Oses-tu parler ainsi, maison de Jacob?
  - type: text
    content: L’Éternel est-il prompt à s’irriter?
  - type: text
    content: Est-ce là sa manière d’agir?
  - type: text
    content: Mes paroles ne sont-elles pas favorables
  - type: text
    content: A celui qui marche avec droiture?
  '8':
  - type: text
    content: Depuis longtemps on traite mon peuple en ennemi;
  - type: text
    content: Vous enlevez le manteau de dessus les vêtements
  - type: text
    content: De ceux qui passent avec sécurité
  - type: text
    content: En revenant de la guerre.
  '9':
  - type: text
    content: Vous chassez de leurs maisons chéries les femmes de mon peuple,
  - type: text
    content: Vous ôtez pour toujours ma parure à leurs enfants.
