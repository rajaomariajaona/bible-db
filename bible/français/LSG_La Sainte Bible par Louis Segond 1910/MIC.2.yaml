document_id: MIC.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-5: cf. És 3:14, 15; 5:8, etc. Am 4:1-3; 5:11-13.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Malheur à ceux qui méditent l’iniquité et qui forgent le mal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur leur couche!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au point du jour ils l’exécutent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand ils ont le pouvoir en main.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Levez-vous, marchez! Car ce n’est point ici un lieu de repos;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de la souillure, il y aura des douleurs, des douleurs violentes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Si un homme court après le vent et débite des mensonges:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais te prophétiser sur le vin, sur les boissons fortes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sera pour ce peuple un prophète.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-13: cf. Jé 23:3, 7, 8. Za 10:8-12.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je te rassemblerai tout entier, ô Jacob!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je rassemblerai les restes d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les réunirai comme les brebis d’une bergerie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme le troupeau dans son pâturage;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y aura un grand bruit d’hommes.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Celui qui fera la brèche montera devant eux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils feront la brèche, franchiront la porte et en sortiront;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur roi marchera devant eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’Éternel sera à leur tête.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 5:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils convoitent des champs, et ils s’en emparent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des maisons, et ils les enlèvent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils portent leur violence sur l’homme et sur sa maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur l’homme et sur son héritage.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'C’est pourquoi ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je médite contre cette race un malheur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous n’en préserverez pas vos cous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous ne marcherez pas la tête levée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car ces temps seront '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 5:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: mauvais.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: En ce jour-là, on fera de vous un sujet de sarcasme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On poussera des cris lamentables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On dira: Nous sommes entièrement dévastés!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il donne à d’autres la part de mon peuple!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eh quoi! Il me l’enlève!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il distribue nos champs à l’ennemi!…
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: C’est pourquoi tu n’auras personne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: étende le cordeau sur un lot,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans l’assemblée de l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-11: cf. És 30:9-14. (Lé 18:24-28. És 36:17-19.)'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ne prophétisez pas! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 30:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 7:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: disent-ils.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’on ne prophétise pas de telles choses!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les invectives n’ont point de fin!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Oses-tu parler ainsi, maison de Jacob?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est-il prompt à s’irriter?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce là sa manière d’agir?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes paroles ne sont-elles pas favorables
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A celui qui marche avec droiture?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Depuis longtemps on traite mon peuple en ennemi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous enlevez le manteau de dessus les vêtements
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De ceux qui passent avec sécurité
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En revenant de la guerre.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Vous chassez de leurs maisons chéries les femmes de mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous ôtez pour toujours ma parure à leurs enfants.
