document_id: 2KI.16,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Achaz, roi de Juda
  - type: heading
    content: 'V. 1-20: cf. 2 Ch 28. (És 7 à 10:4.) Ec 3:16-17.'
  - type: text
    content: 'La '
  - type: note
    content: 2 Ch 28:1.
  - type: text
    content: 'dix-septième année de Pékach, fils de Remalia, Achaz, fils de Jotham, roi de Juda, régna. '
  '10':
  - type: text
    content: 'Le roi Achaz se rendit à Damas au-devant de Tiglath-Piléser, roi d’Assyrie. Et ayant vu l’autel qui était à Damas, le roi Achaz envoya au sacrificateur Urie le modèle et la forme exacte de cet autel. '
  '11':
  - type: text
    content: 'Le sacrificateur Urie construisit un autel entièrement d’après le modèle envoyé de Damas par le roi Achaz, et le sacrificateur Urie le fit avant que le roi Achaz fût de retour de Damas. '
  '12':
  - type: text
    content: 'A son arrivée de Damas, le roi vit l’autel, s’en approcha et y monta: '
  '13':
  - type: text
    content: 'il fit brûler son holocauste et son offrande, versa ses libations, et répandit sur l’autel le sang de ses sacrifices d’actions de grâces. '
  '14':
  - type: text
    content: 'Il éloigna de la face de la maison l’autel d’airain qui était devant l’Éternel, afin qu’il ne fût pas entre le nouvel autel et la maison de l’Éternel; et il le plaça à côté du nouvel autel, vers le nord. '
  '15':
  - type: text
    content: 'Et le roi Achaz donna cet ordre au sacrificateur Urie: Fais brûler sur le grand autel l’holocauste du matin et l’offrande du soir, l’holocauste du roi et son offrande, les holocaustes de tout le peuple du pays et leurs offrandes, verses-y leurs libations, et répands-y tout le sang des holocaustes et tout le sang des sacrifices; pour ce qui concerne l’autel d’airain, je m’en occuperai. '
  '16':
  - type: text
    content: 'Le sacrificateur Urie se conforma à tout ce que le roi Achaz avait ordonné. '
  '17':
  - type: text
    content: 'Et le roi Achaz brisa '
  - type: note
    content: 1 R 7:23, etc.
  - type: text
    content: 'les panneaux des bases, et en ôta les bassins qui étaient dessus. Il descendit la mer de dessus les bœufs d’airain qui étaient sous elle, et il la posa sur un pavé de pierres. '
  '18':
  - type: text
    content: 'Il changea dans la maison de l’Éternel, à cause du roi d’Assyrie, le portique du sabbat qu’on y avait bâti et l’entrée extérieure du roi. '
  '19':
  - type: text
    content: 'Le reste des actions d’Achaz, et tout ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  '2':
  - type: text
    content: 'Achaz avait vingt ans lorsqu’il devint roi, et il régna seize ans à Jérusalem. Il ne fit point ce qui est droit aux yeux de l’Éternel, son Dieu, comme avait fait David, son père. '
  '20':
  - type: text
    content: Achaz se coucha avec ses pères, et il fut enterré avec ses pères dans la ville de David. Et Ézéchias, son fils, régna à sa place.
  '3':
  - type: text
    content: 'Il marcha dans la voie des rois d’Israël; '
  - type: note
    content: Lé 18:21; 20:2, 3. 2 R 17:31.
  - type: text
    content: 'et même il fit passer son fils par le feu, suivant les abominations des nations que l’Éternel avait chassées devant les enfants d’Israël. '
  '4':
  - type: text
    content: 'Il offrait des sacrifices et des parfums sur les hauts lieux, sur les collines et sous tout arbre vert. '
  '5':
  - type: note
    content: És 7:1.
  - type: text
    content: 'Alors Retsin, roi de Syrie, et Pékach, fils de Remalia, roi d’Israël, montèrent contre Jérusalem pour l’attaquer. Ils assiégèrent Achaz; mais ils ne purent pas le vaincre. '
  '6':
  - type: text
    content: 'Dans ce même temps, Retsin, roi de Syrie, fit rentrer Élath au pouvoir des Syriens; il expulsa d’Élath les Juifs, et les Syriens vinrent à Élath, où ils ont habité jusqu’à ce jour. '
  '7':
  - type: text
    content: 'Achaz envoya des messagers à Tiglath-Piléser, roi d’Assyrie, pour lui dire: Je suis ton serviteur et ton fils; monte, et délivre-moi de la main du roi de Syrie et de la main du roi d’Israël, qui s’élèvent contre moi. '
  '8':
  - type: text
    content: 'Et '
  - type: note
    content: 2 Ch 28:21.
  - type: text
    content: 'Achaz prit l’argent et l’or qui se trouvaient dans la maison de l’Éternel et dans les trésors de la maison du roi, et il l’envoya en présent au roi d’Assyrie. '
  '9':
  - type: text
    content: 'Le roi d’Assyrie l’écouta; il monta contre Damas, la prit, emmena les habitants en captivité à Kir, et fit mourir Retsin. '
