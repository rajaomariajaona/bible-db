document_id: ZEC.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rétablissement de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. Jé 30:18-22.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole de l’Éternel des armées se révéla, en ces mots: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ainsi parle l’Éternel des armées: Je suis ému pour Sion d’une grande jalousie, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 1:14
      metadata:
        usfm: ZEC.1.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je suis saisi pour elle d’une grande fureur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ainsi parle l’Éternel: Je retourne à Sion, et je veux habiter au milieu de Jérusalem. Jérusalem sera appelée ville fidèle, et la montagne de l’Éternel des armées montagne sainte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ainsi parle l’Éternel des armées: Des vieillards et des femmes âgées s’assiéront encore dans les rues de Jérusalem, chacun le bâton à la main, à cause du grand nombre de leurs jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les rues de la ville seront remplies de jeunes garçons et de jeunes filles, jouant dans les rues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ainsi parle l’Éternel des armées: Si la chose paraît étonnante aux yeux du reste de ce peuple en ces jours-là, sera-t-elle de même étonnante à mes yeux? Dit l’Éternel des armées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ainsi parle l’Éternel des armées: Voici, je délivre mon peuple du pays de l’orient et du pays du soleil couchant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je les ramènerai, et ils habiteront au milieu de Jérusalem; ils seront mon peuple, et je serai leur Dieu avec vérité et droiture.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-17: cf. Ag 2:15-17. (De 30:8-10. Jé 32:37-42.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ainsi parle l’Éternel des armées: Fortifiez vos mains, vous qui entendez aujourd’hui ces paroles de la bouche des prophètes qui parurent au temps où fut fondée la maison de l’Éternel des armées, où le temple allait être bâti. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Car avant ce temps, le travail de l’homme ne recevait pas sa récompense, et le salaire des bêtes était nul; il n’y avait point de paix pour ceux qui entraient et sortaient, à cause de l’ennemi, et je lâchais tous les hommes les uns contre les autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Maintenant je ne suis pas pour le reste de ce peuple comme j’étais dans le temps passé, dit l’Éternel des armées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Car les semailles prospéreront, la vigne rendra son fruit, la terre donnera ses produits, et les cieux enverront leur rosée; je ferai jouir de toutes ces choses le reste de ce peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'De même que vous avez été en malédiction parmi les nations, maison de Juda et maison d’Israël, de même je vous sauverai, et vous serez en bénédiction. Ne craignez pas, et que vos mains se fortifient! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Car ainsi parle l’Éternel des armées: Comme j’ai eu la pensée de vous faire du mal lorsque vos pères m’irritaient, dit l’Éternel des armées, et que je ne m’en suis point repenti, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ainsi je reviens en arrière et j’ai résolu en ces jours de faire du bien à Jérusalem et à la maison de Juda. Ne craignez pas! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Voici ce que vous devez faire: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:25
      metadata:
        usfm: EPH.4.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dites la vérité chacun à son prochain; jugez dans vos portes selon la vérité et en vue de la paix; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 7:10
      metadata:
        usfm: ZEC.7.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que nul en son cœur ne pense le mal contre son prochain, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 5:3
      metadata:
        usfm: ZEC.5.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: ZEC.5.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: n’aimez pas le faux serment, car ce sont là toutes choses que je hais, dit l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-23: cf. Za 2:10, 11. És 2:1-3. Ép 3:6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'La parole de l’Éternel des armées me fut adressée, en ces mots: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ainsi parle l’Éternel des armées: Le jeûne du quatrième mois, le jeûne du cinquième, le jeûne du septième et le jeûne du dixième se changeront pour la maison de Juda en jours d’allégresse et de joie, en fêtes de réjouissance. Mais aimez la vérité et la paix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ainsi parle l’Éternel des armées: Il viendra encore des peuples et des habitants d’un grand nombre de villes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les habitants d’une ville iront à l’autre, en disant: Allons implorer l’Éternel et chercher l’Éternel des armées! Nous irons aussi! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Et beaucoup de peuples et de nombreuses nations viendront chercher l’Éternel des armées à Jérusalem et implorer l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ainsi parle l’Éternel des armées: En ces jours-là, dix hommes de toutes les langues des nations saisiront un Juif par le pan de son vêtement et diront: Nous irons avec vous, car nous avons appris que Dieu est avec vous.'
