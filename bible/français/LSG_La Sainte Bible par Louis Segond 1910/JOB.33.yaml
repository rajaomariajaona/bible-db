document_id: JOB.33,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-13: cf. (Job 32:2; 34:1-11.) Pr 12:26.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant donc, Job, écoute mes discours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prête l’oreille à toutes mes paroles!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Dieu trouve contre moi des motifs de haine,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 13:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il me traite comme son ennemi;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 13:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il met mes pieds dans les ceps,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 14:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il surveille tous mes mouvements.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te répondrai qu’en cela tu n’as pas raison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car Dieu est plus grand que l’homme.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Veux-tu donc disputer avec lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’il ne rend aucun compte de ses actes?
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-18: cf. Ge 20. Ps 32:8, 9.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu parle cependant, tantôt d’une manière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tantôt d’une autre, et l’on n’y prend point garde.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il parle par des songes, par des visions nocturnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand les hommes sont livrés à un profond sommeil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand ils sont endormis sur leur couche.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors il leur donne des avertissements
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et met le sceau à ses instructions,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin de détourner l’homme du mal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de le préserver de l’orgueil,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin de garantir son âme de la fosse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa vie des coups du glaive.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 19-33: cf. Ps 107:17-22; 6; 116. És 38:9, etc.'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par la douleur aussi l’homme est repris sur sa couche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand une lutte continue vient agiter ses os.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, j’ouvre la bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma langue se remue dans mon palais.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 107:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Alors il prend en dégoût le pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même les aliments les plus exquis;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa chair se consume et disparaît,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses os qu’on ne voyait pas sont mis à nu;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son âme s’approche de la fosse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa vie des messagers de la mort.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais s’il se trouve pour lui un ange intercesseur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un d’entre les mille
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui annoncent à l’homme la voie qu’il doit suivre,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dieu a compassion de lui et dit à l’ange:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-le, afin qu’il ne descende pas dans la fosse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai trouvé une rançon!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa chair a plus de fraîcheur qu’au premier âge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il revient aux jours de sa jeunesse.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il adresse à Dieu sa prière; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 50:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 58:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: et Dieu lui est propice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui laisse voir sa face avec joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et lui rend son innocence.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il chante devant les hommes et dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai péché, j’ai violé la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je n’ai pas été puni comme je le méritais;
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu a délivré mon âme pour qu’elle n’entrât pas dans la fosse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ma vie s’épanouit à la lumière!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà tout ce que Dieu fait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deux fois, trois fois, avec l’homme,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est avec droiture de cœur que je vais parler,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est la vérité pure qu’exprimeront mes lèvres:'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 56:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Pour ramener son âme de la fosse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour l’éclairer de la lumière des vivants.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois attentif, Job, écoute-moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tais-toi, et je parlerai!
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu as quelque chose à dire, réponds-moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parle, car je voudrais te donner raison.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu n’as rien à dire, écoute-moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tais-toi, et je t’enseignerai la sagesse.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’esprit de Dieu m’a créé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le souffle du Tout-Puissant m’anime.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu le peux, réponds-moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Défends ta cause, tiens-toi prêt!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 9:35
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Devant Dieu je suis ton semblable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai été comme toi formé de la boue;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi mes terreurs ne te troubleront pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon poids ne saurait t’accabler.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 10:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais tu as dit à mes oreilles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et j’ai entendu le son de tes paroles:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis pur, je suis sans péché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis net, il n’y a point en moi d’iniquité.
