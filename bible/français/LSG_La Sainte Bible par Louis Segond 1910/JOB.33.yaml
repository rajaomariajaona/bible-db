document_id: JOB.33,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-13: cf. (Job 32:2; 34:1-11.) Pr 12:26.'
  - type: text
    content: Maintenant donc, Job, écoute mes discours,
  - type: text
    content: Prête l’oreille à toutes mes paroles!
  '10':
  - type: text
    content: Et Dieu trouve contre moi des motifs de haine,
  - type: note
    content: Job 13:24; 16:9; 19:11.
  - type: text
    content: Il me traite comme son ennemi;
  '11':
  - type: text
    content: ' '
  - type: note
    content: Job 13:27.
  - type: text
    content: Il met mes pieds dans les ceps,
  - type: note
    content: Job 14:16.
  - type: text
    content: Il surveille tous mes mouvements.
  '12':
  - type: text
    content: Je te répondrai qu’en cela tu n’as pas raison,
  - type: text
    content: Car Dieu est plus grand que l’homme.
  '13':
  - type: text
    content: Veux-tu donc disputer avec lui,
  - type: text
    content: Parce qu’il ne rend aucun compte de ses actes?
  - type: heading
    content: 'V. 14-18: cf. Ge 20. Ps 32:8, 9.'
  '14':
  - type: text
    content: Dieu parle cependant, tantôt d’une manière,
  - type: text
    content: Tantôt d’une autre, et l’on n’y prend point garde.
  '15':
  - type: text
    content: Il parle par des songes, par des visions nocturnes,
  - type: text
    content: Quand les hommes sont livrés à un profond sommeil,
  - type: text
    content: Quand ils sont endormis sur leur couche.
  '16':
  - type: text
    content: Alors il leur donne des avertissements
  - type: text
    content: Et met le sceau à ses instructions,
  '17':
  - type: text
    content: Afin de détourner l’homme du mal
  - type: text
    content: Et de le préserver de l’orgueil,
  '18':
  - type: text
    content: Afin de garantir son âme de la fosse
  - type: text
    content: Et sa vie des coups du glaive.
  - type: heading
    content: 'V. 19-33: cf. Ps 107:17-22; 6; 116. És 38:9, etc.'
  '19':
  - type: text
    content: Par la douleur aussi l’homme est repris sur sa couche,
  - type: text
    content: Quand une lutte continue vient agiter ses os.
  '2':
  - type: text
    content: Voici, j’ouvre la bouche,
  - type: text
    content: Ma langue se remue dans mon palais.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ps 107:18.
  - type: text
    content: Alors il prend en dégoût le pain,
  - type: text
    content: Même les aliments les plus exquis;
  '21':
  - type: text
    content: Sa chair se consume et disparaît,
  - type: text
    content: Ses os qu’on ne voyait pas sont mis à nu;
  '22':
  - type: text
    content: Son âme s’approche de la fosse,
  - type: text
    content: Et sa vie des messagers de la mort.
  '23':
  - type: text
    content: Mais s’il se trouve pour lui un ange intercesseur,
  - type: text
    content: Un d’entre les mille
  - type: text
    content: Qui annoncent à l’homme la voie qu’il doit suivre,
  '24':
  - type: text
    content: 'Dieu a compassion de lui et dit à l’ange:'
  - type: text
    content: Délivre-le, afin qu’il ne descende pas dans la fosse;
  - type: text
    content: J’ai trouvé une rançon!
  '25':
  - type: text
    content: Et sa chair a plus de fraîcheur qu’au premier âge,
  - type: text
    content: Il revient aux jours de sa jeunesse.
  '26':
  - type: text
    content: 'Il adresse à Dieu sa prière; '
  - type: note
    content: Ps 50:15. És 58:9.
  - type: text
    content: et Dieu lui est propice,
  - type: text
    content: Lui laisse voir sa face avec joie,
  - type: text
    content: Et lui rend son innocence.
  '27':
  - type: text
    content: 'Il chante devant les hommes et dit:'
  - type: text
    content: J’ai péché, j’ai violé la justice,
  - type: text
    content: Et je n’ai pas été puni comme je le méritais;
  '28':
  - type: text
    content: Dieu a délivré mon âme pour qu’elle n’entrât pas dans la fosse,
  - type: text
    content: Et ma vie s’épanouit à la lumière!
  '29':
  - type: text
    content: Voilà tout ce que Dieu fait,
  - type: text
    content: Deux fois, trois fois, avec l’homme,
  '3':
  - type: text
    content: C’est avec droiture de cœur que je vais parler,
  - type: text
    content: 'C’est la vérité pure qu’exprimeront mes lèvres:'
  '30':
  - type: text
    content: ' '
  - type: note
    content: Ps 56:14.
  - type: text
    content: Pour ramener son âme de la fosse,
  - type: text
    content: Pour l’éclairer de la lumière des vivants.
  '31':
  - type: text
    content: Sois attentif, Job, écoute-moi!
  - type: text
    content: Tais-toi, et je parlerai!
  '32':
  - type: text
    content: Si tu as quelque chose à dire, réponds-moi!
  - type: text
    content: Parle, car je voudrais te donner raison.
  '33':
  - type: text
    content: Si tu n’as rien à dire, écoute-moi!
  - type: text
    content: Tais-toi, et je t’enseignerai la sagesse.
  '4':
  - type: text
    content: L’esprit de Dieu m’a créé,
  - type: text
    content: Et le souffle du Tout-Puissant m’anime.
  '5':
  - type: text
    content: Si tu le peux, réponds-moi,
  - type: text
    content: Défends ta cause, tiens-toi prêt!
  '6':
  - type: text
    content: ' '
  - type: note
    content: Job 9:35; 23:10.
  - type: text
    content: Devant Dieu je suis ton semblable,
  - type: text
    content: J’ai été comme toi formé de la boue;
  '7':
  - type: text
    content: Ainsi mes terreurs ne te troubleront pas,
  - type: text
    content: Et mon poids ne saurait t’accabler.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Job 10:7; 16:17; 23:10, 11; 27:5.
  - type: text
    content: Mais tu as dit à mes oreilles,
  - type: text
    content: 'Et j’ai entendu le son de tes paroles:'
  '9':
  - type: text
    content: Je suis pur, je suis sans péché,
  - type: text
    content: Je suis net, il n’y a point en moi d’iniquité.
