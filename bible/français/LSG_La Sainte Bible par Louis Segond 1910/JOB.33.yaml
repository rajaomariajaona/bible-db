document_id: JOB.33
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. (Job 32:2; 34:1-11.) Pr 12:26.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Maintenant donc, Job, écoute mes discours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prête l’oreille à toutes mes paroles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Voici, j’ouvre la bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma langue se remue dans mon palais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C’est avec droiture de cœur que je vais parler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C’est la vérité pure qu’exprimeront mes lèvres:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: L’esprit de Dieu m’a créé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le souffle du Tout-Puissant m’anime.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Si tu le peux, réponds-moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Défends ta cause, tiens-toi prêt!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 9:35
      metadata:
        usfm: JOB.9.35
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:10
      metadata:
        usfm: JOB.23.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Devant Dieu je suis ton semblable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai été comme toi formé de la boue;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ainsi mes terreurs ne te troubleront pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mon poids ne saurait t’accabler.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 10:7
      metadata:
        usfm: JOB.10.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:17
      metadata:
        usfm: JOB.16.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:10
      metadata:
        usfm: JOB.23.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: JOB.23.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:5
      metadata:
        usfm: JOB.27.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais tu as dit à mes oreilles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et j’ai entendu le son de tes paroles:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je suis pur, je suis sans péché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis net, il n’y a point en moi d’iniquité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et Dieu trouve contre moi des motifs de haine,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 13:24
      metadata:
        usfm: JOB.13.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:9
      metadata:
        usfm: JOB.16.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:11
      metadata:
        usfm: JOB.19.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il me traite comme son ennemi;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 13:27
      metadata:
        usfm: JOB.13.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il met mes pieds dans les ceps,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 14:16
      metadata:
        usfm: JOB.14.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il surveille tous mes mouvements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je te répondrai qu’en cela tu n’as pas raison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car Dieu est plus grand que l’homme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Veux-tu donc disputer avec lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’il ne rend aucun compte de ses actes?
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-18: cf. Ge 20. Ps 32:8, 9.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dieu parle cependant, tantôt d’une manière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tantôt d’une autre, et l’on n’y prend point garde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il parle par des songes, par des visions nocturnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand les hommes sont livrés à un profond sommeil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand ils sont endormis sur leur couche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Alors il leur donne des avertissements
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et met le sceau à ses instructions,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Afin de détourner l’homme du mal
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de le préserver de l’orgueil,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Afin de garantir son âme de la fosse
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa vie des coups du glaive.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 19-33: cf. Ps 107:17-22; 6; 116. És 38:9, etc.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Par la douleur aussi l’homme est repris sur sa couche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand une lutte continue vient agiter ses os.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 107:18
      metadata:
        usfm: PSA.107.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Alors il prend en dégoût le pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même les aliments les plus exquis;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Sa chair se consume et disparaît,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses os qu’on ne voyait pas sont mis à nu;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Son âme s’approche de la fosse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa vie des messagers de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mais s’il se trouve pour lui un ange intercesseur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un d’entre les mille
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui annoncent à l’homme la voie qu’il doit suivre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dieu a compassion de lui et dit à l’ange:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Délivre-le, afin qu’il ne descende pas dans la fosse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai trouvé une rançon!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Et sa chair a plus de fraîcheur qu’au premier âge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il revient aux jours de sa jeunesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il adresse à Dieu sa prière; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 50:15
      metadata:
        usfm: PSA.50.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 58:9
      metadata:
        usfm: ISA.58.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: et Dieu lui est propice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lui laisse voir sa face avec joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et lui rend son innocence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il chante devant les hommes et dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai péché, j’ai violé la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je n’ai pas été puni comme je le méritais;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dieu a délivré mon âme pour qu’elle n’entrât pas dans la fosse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ma vie s’épanouit à la lumière!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Voilà tout ce que Dieu fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Deux fois, trois fois, avec l’homme,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 56:14
      metadata:
        usfm: PSA.56.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pour ramener son âme de la fosse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour l’éclairer de la lumière des vivants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Sois attentif, Job, écoute-moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tais-toi, et je parlerai!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Si tu as quelque chose à dire, réponds-moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parle, car je voudrais te donner raison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Si tu n’as rien à dire, écoute-moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tais-toi, et je t’enseignerai la sagesse.
