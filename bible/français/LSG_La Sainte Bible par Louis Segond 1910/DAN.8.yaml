document_id: DAN.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Vision de Daniel: le bélier et le bouc'
  - type: heading
    content: 'V. 1-27: cf. Da 11:1-4, 21, etc.'
  - type: text
    content: 'La troisième année du règne du roi Belschatsar, moi, Daniel, j’eus une vision, outre celle que j’avais eue précédemment. '
  '10':
  - type: text
    content: 'Elle s’éleva jusqu’à l’armée des cieux, elle fit tomber à terre une partie de cette armée et des étoiles, et elle les foula. '
  '11':
  - type: text
    content: 'Elle s’éleva jusqu’au chef de l’armée, lui enleva le sacrifice perpétuel, et renversa le lieu de son sanctuaire. '
  '12':
  - type: text
    content: 'L’armée fut livrée avec le sacrifice perpétuel, à cause du péché; la corne jeta la vérité par terre, et réussit dans ses entreprises. '
  '13':
  - type: text
    content: 'J’entendis parler un saint; et un autre saint dit à celui qui parlait: Pendant combien de temps s’accomplira la vision sur le sacrifice perpétuel et sur le péché dévastateur? Jusques à quand le sanctuaire et l’armée seront-ils foulés? '
  '14':
  - type: text
    content: 'Et il me dit: Deux mille trois cents soirs et matins; puis le sanctuaire sera purifié. '
  '15':
  - type: text
    content: 'Tandis que moi, Daniel, j’avais cette vision et que je cherchais à la comprendre, voici, quelqu’un qui avait l’apparence d’un homme se tenait devant moi. '
  '16':
  - type: text
    content: 'Et j’entendis la voix d’un homme au milieu de l’Ulaï; il cria et dit: '
  - type: note
    content: Da 9:21. Lu 1:26.
  - type: text
    content: 'Gabriel, explique-lui la vision. '
  '17':
  - type: text
    content: 'Il vint alors près du lieu où j’étais; et à son approche, je fus effrayé, et je tombai sur ma face. Il me dit: Sois attentif, fils de l’homme, car la vision concerne un temps qui sera la fin. '
  '18':
  - type: text
    content: 'Comme il me parlait, je restai frappé d’étourdissement, la face contre terre. Il me toucha, et me fit tenir debout à la place où je me trouvais. '
  '19':
  - type: text
    content: 'Puis il me dit: Je vais t’apprendre, ce qui arrivera au terme de la colère, car il y a un temps marqué pour la fin. '
  '2':
  - type: text
    content: 'Lorsque j’eus cette vision, il me sembla que j’étais à Suse, la capitale, dans la province d’Élam; et pendant ma vision, je me trouvais près du fleuve d’Ulaï. '
  '20':
  - type: text
    content: 'Le bélier que tu as vu, et qui avait des cornes, ce sont les rois des Mèdes et des Perses. '
  '21':
  - type: text
    content: 'Le bouc, c’est le roi de Javan, La grande corne entre ses yeux, c’est le premier roi. '
  '22':
  - type: text
    content: 'Les quatre cornes qui se sont élevées pour remplacer cette corne brisée, ce sont quatre royaumes qui s’élèveront de cette nation, mais qui n’auront pas autant de force. '
  '23':
  - type: text
    content: 'A la fin de leur domination, lorsque les pécheurs seront consumés, il s’élèvera un roi impudent et artificieux. '
  '24':
  - type: text
    content: 'Sa puissance s’accroîtra, mais non par sa propre force; il fera d’incroyables ravages, il réussira dans ses entreprises, il détruira les puissants et le peuple des saints. '
  '25':
  - type: text
    content: 'A cause de sa prospérité et du succès de ses ruses, il aura de l’arrogance dans le cœur, il fera périr beaucoup d’hommes qui vivaient paisiblement, et il s’élèvera contre le chef des chefs; mais il sera brisé, sans l’effort d’aucune main. '
  '26':
  - type: text
    content: 'Et la vision des soirs et des matins, dont il s’agit, est véritable. Pour toi, tiens secrète cette vision, car elle se rapporte à des temps éloignés. '
  '27':
  - type: text
    content: Moi, Daniel, je fus plusieurs jours languissant et malade; puis je me levai, et je m’occupai des affaires du roi. J’étais étonné de la vision, et personne n’en eut connaissance.
  '3':
  - type: text
    content: 'Je levai les yeux, je regardai, et voici, un bélier se tenait devant le fleuve, et il avait des cornes; ces cornes étaient hautes, mais l’une était plus haute que l’autre, et elle s’éleva la dernière. '
  '4':
  - type: text
    content: 'Je vis le bélier qui frappait de ses cornes à l’occident, au septentrion et au midi; aucun animal ne pouvait lui résister, et il n’y avait personne pour délivrer ses victimes; il faisait ce qu’il voulait, et il devint puissant. '
  '5':
  - type: text
    content: 'Comme je regardais attentivement, voici, un bouc venait de l’occident, et parcourait toute la terre à sa surface, sans la toucher; ce bouc avait une grande corne entre les yeux. '
  '6':
  - type: text
    content: 'Il arriva jusqu’au bélier qui avait des cornes, et que j’avais vu se tenant devant le fleuve, et il courut sur lui dans toute sa fureur. '
  '7':
  - type: text
    content: 'Je le vis qui s’approchait du bélier et s’irritait contre lui; il frappa le bélier et lui brisa les deux cornes, sans que le bélier eût la force de lui résister; il le jeta par terre et le foula, et il n’y eut personne pour délivrer le bélier. '
  '8':
  - type: text
    content: 'Le bouc devint très puissant; mais lorsqu’il fut puissant, sa grande corne se brisa. Quatre grandes cornes s’élevèrent pour la remplacer, aux quatre vents des cieux. '
  '9':
  - type: text
    content: 'De l’une d’elles sortit une petite corne, qui s’agrandit beaucoup vers le midi, vers l’orient, et vers le plus beau des pays. '
