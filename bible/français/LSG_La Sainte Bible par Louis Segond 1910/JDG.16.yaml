document_id: JDG.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samson trahi par Delila, et prisonnier des Philistins
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-21: cf. Pr 5:3, etc.; 7:4, etc. Ec 7:26.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Samson partit pour Gaza; il y vit une femme prostituée, et il entra chez elle. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On dit aux gens de Gaza: Samson est arrivé ici. Et ils l’environnèrent, et se tinrent en embuscade toute la nuit à la porte de la ville. Ils restèrent tranquilles toute la nuit, disant: Au point du jour, nous le tuerons. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Samson demeura couché jusqu’à minuit. Vers minuit, il se leva; et il saisit les battants de la porte de la ville et les deux poteaux, les arracha avec la barre, les mit sur ses épaules, et les porta sur le sommet de la montagne qui est en face d’Hébron. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Après cela, il aima une femme dans la vallée de Sorek. Elle se nommait Delila. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les princes des Philistins montèrent vers elle, et lui dirent: Flatte-le, pour savoir d’où lui vient sa grande force et comment nous pourrions nous rendre maîtres de lui; nous le lierons pour le dompter, et nous te donnerons chacun mille et cent sicles d’argent. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Delila dit à Samson: Dis-moi, je te prie, d’où vient ta grande force, et avec quoi il faudrait te lier pour te dompter. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Samson lui dit: Si on me liait avec sept cordes fraîches, qui ne fussent pas encore sèches, je deviendrais faible et je serais comme un autre homme. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les princes des Philistins apportèrent à Delila sept cordes fraîches, qui n’étaient pas encore sèches. Et elle le lia avec ces cordes. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Or des gens se tenaient en embuscade chez elle, dans une chambre. Elle lui dit: Les Philistins sont sur toi, Samson! Et il rompit les cordes, comme se rompt un cordon d’étoupe quand il sent le feu. Et l’on ne connut point d’où venait sa force. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Delila dit à Samson: Voici, tu t’es joué de moi, tu m’as dit des mensonges. Maintenant, je te prie, indique-moi avec quoi il faut te lier. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il lui dit: Si on me liait avec des cordes neuves, dont on ne se fût jamais servi, je deviendrais faible et je serais comme un autre homme. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Delila prit des cordes neuves, avec lesquelles elle le lia. Puis elle lui dit: Les Philistins sont sur toi, Samson! Or des gens se tenaient en embuscade dans une chambre. Et il rompit comme un fil les cordes qu’il avait aux bras. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Delila dit à Samson: Jusqu’à présent tu t’es joué de moi, tu m’as dit des mensonges. Déclare-moi avec quoi il faut te lier. Il lui dit: Tu n’as qu’à tisser les sept tresses de ma tête avec la chaîne du tissu. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et elle les fixa par la cheville. Puis elle lui dit: Les Philistins sont sur toi, Samson! Et il se réveilla de son sommeil, et il arracha la cheville du tissu et le tissu. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Elle lui dit: Comment peux-tu dire: Je t’aime! Puisque ton cœur n’est pas avec moi? Voilà trois fois que tu t’es joué de moi, et tu ne m’as pas déclaré d’où vient ta grande force. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Comme elle était chaque jour à le tourmenter et à l’importuner par ses instances, son âme s’impatienta à la mort, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'il lui ouvrit tout son cœur, et lui dit: Le rasoir n’a point passé sur ma tête, parce que je suis consacré à Dieu dès le ventre de ma mère. Si j’étais rasé, ma force m’abandonnerait, je deviendrais faible, et je serais comme tout autre homme. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Delila, voyant qu’il lui avait ouvert tout son cœur, envoya appeler les princes des Philistins, et leur fit dire: Montez cette fois, car il m’a ouvert tout son cœur. Et les princes des Philistins montèrent vers elle, et apportèrent l’argent dans leurs mains. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Elle l’endormit sur ses genoux. Et ayant appelé un homme, elle rasa les sept tresses de la tête de Samson, et commença ainsi à le dompter. Il perdit sa force. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Elle dit alors: Les Philistins sont sur toi, Samson! Et il se réveilla de son sommeil, et dit: Je m’en tirerai comme les autres fois, et je me dégagerai. Il ne savait pas que l’Éternel s’était retiré de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Les Philistins le saisirent, et lui crevèrent les yeux; ils le firent descendre à Gaza, et le lièrent avec des chaînes d’airain. Il tournait la meule dans la prison.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-31: cf. Mi 7:8-10. 1 Th 5:2, 3. Pr 24:17, 18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Cependant les cheveux de sa tête recommençaient à croître, depuis qu’il avait été rasé. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Or les princes des Philistins s’assemblèrent pour offrir un grand sacrifice à Dagon, leur dieu, et pour se réjouir. Ils disaient: Notre dieu a livré entre nos mains Samson, notre ennemi. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Et quand le peuple le vit, ils célébrèrent leur dieu, en disant: Notre dieu a livré entre nos mains notre ennemi, celui qui ravageait notre pays, et qui multipliait nos morts. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dans la joie de leur cœur, ils dirent: Qu’on appelle Samson, et qu’il nous divertisse! Ils firent sortir Samson de la prison, et il joua devant eux. Ils le placèrent entre les colonnes. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Et Samson dit au jeune homme qui le tenait par la main: Laisse-moi, afin que je puisse toucher les colonnes sur lesquelles repose la maison et m’appuyer contre elles.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Comment il se venge et meurt.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'La maison était remplie d’hommes et de femmes; tous les princes des Philistins étaient là, et il y avait sur le toit environ trois mille personnes, hommes et femmes, qui regardaient Samson jouer. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors Samson '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Hé 11:32, etc.
    marker-yv: yv-n
  - type: text
    text: 'invoqua l’Éternel, et dit: Seigneur Éternel! Souviens-toi de moi, je te prie; ô Dieu! Donne-moi de la force seulement cette fois, et que d’un seul coup je tire vengeance des Philistins pour mes deux yeux! '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Et Samson embrassa les deux colonnes du milieu sur lesquelles reposait la maison, et il s’appuya contre elles; l’une était à sa droite, et l’autre à sa gauche. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Samson dit: Que je meure avec les Philistins! Il se pencha fortement, et la maison tomba sur les princes et sur tout le peuple qui y était. Ceux qu’il fit périr à sa mort furent plus nombreux que ceux qu’il avait tués pendant sa vie. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ses frères et toute la maison de son père descendirent, et l’emportèrent. Lorsqu’ils furent remontés, ils l’enterrèrent entre Tsorea et Eschthaol dans le sépulcre de Manoach, son père. Il avait été juge en Israël pendant vingt ans.
