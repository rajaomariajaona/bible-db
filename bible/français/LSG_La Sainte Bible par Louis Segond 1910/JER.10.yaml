document_id: JER.10,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les idoles et l’Éternel
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-16: cf. (És 40:18-26; 44:6-21. Ps 115:3-8.) Jé 51:15-19.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoutez la parole que l’Éternel vous adresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maison d’Israël!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’Éternel est Dieu en vérité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est un Dieu vivant et un roi éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre tremble devant sa colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les nations ne supportent pas sa fureur.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Vous leur parlerez ainsi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les dieux qui n’ont point fait les cieux et la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Disparaîtront de la terre et de dessous les cieux.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 51:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il a créé la terre par sa puissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a fondé le monde par sa sagesse,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 9:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 104:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 40:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 44:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 51:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il a étendu les cieux par son intelligence.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A sa voix, les eaux mugissent dans les cieux;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 135:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il fait monter les nuages des extrémités de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il produit les éclairs et la pluie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il tire le vent de ses trésors.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 51:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tout homme devient stupide par sa science,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout orfèvre est honteux de son image taillée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ses idoles ne sont que mensonge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y a point en elles de souffle,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles sont une chose de néant, une œuvre de tromperie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles périront, quand viendra le châtiment.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 51:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Celui qui est la part de Jacob n’est pas comme elles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est lui qui a tout formé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et Israël est la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 74:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: tribu de son héritage.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel des armées est son nom.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’approche du châtiment
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-25: cf. Jé 4:15-20; 30:11, 16-17. Ps 79.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Emporte du pays ce qui t’appartient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi qui es assise dans la détresse!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, cette fois je vais lancer au loin les habitants du pays;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 6:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je vais les serrer de près, afin qu’on les atteigne.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à moi! Je suis brisée!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma plaie est douloureuse!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais je dis: C’est une calamité qui m’arrive,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je la supporterai!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’imitez pas la voie des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne craignez pas les signes du ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que les nations les craignent.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma tente est détruite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous mes cordages sont rompus;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes fils m’ont quittée, ils ne sont plus;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n’ai personne qui dresse de nouveau ma tente,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui relève mes pavillons.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les bergers ont été stupides,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n’ont pas cherché l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pour cela qu’ils n’ont point prospéré,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que tous leurs troupeaux se dispersent.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, une rumeur se fait entendre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est un grand tumulte qui vient du '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 1:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: septentrion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour réduire les villes de Juda en un désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'En un repaire de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 9:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: chacals.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je le sais, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 16:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La voie de l’homme n’est pas en son pouvoir;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n’est pas à l’homme, quand il marche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A diriger ses pas.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 6:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 38:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Châtie-moi, ô Éternel! Mais '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 30:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 46:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: avec équité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et non dans ta colère, de peur que tu ne m’anéantisses.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 79:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Répands ta fureur sur les nations qui ne te connaissent pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sur les peuples qui n’invoquent pas ton nom!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 8:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car ils dévorent Jacob, ils le dévorent, ils le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 9:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: consument,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ravagent sa demeure.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car les coutumes des peuples ne sont que vanité.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: És 44:14, etc.
      marker-yv: yv-n
    - type: text
      text: On coupe le bois dans la forêt;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La main de l’ouvrier le travaille avec la hache;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On l’embellit avec de l’argent et de l’or,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 41:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: On le fixe avec des clous et des marteaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour qu’il ne branle pas.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ces dieux sont comme une colonne massive, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 115:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: et ils ne parlent point;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 46:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: On les porte, parce qu’ils ne peuvent marcher.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ne les craignez pas, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 41:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: car ils ne sauraient faire aucun mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils sont incapables de faire du bien.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 86:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Nul n’est semblable à toi, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es grand, et ton nom est grand par ta puissance.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 15:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui ne te craindrait, roi des nations?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est à toi que la crainte est due;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car, parmi tous les sages des nations et dans tous leurs royaumes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nul n’est semblable à toi.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tous ensemble, ils sont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 41:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ha 2:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 10:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: stupides et insensés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur science n’est que vanité, c’est du bois!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On apporte de Tarsis des lames d’argent, et d’Uphaz de l’or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’ouvrier et la main de l’orfèvre les mettent en œuvre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les vêtements de ces dieux sont d’étoffes teintes en bleu et en pourpre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous sont l’ouvrage d’habiles artisans.
