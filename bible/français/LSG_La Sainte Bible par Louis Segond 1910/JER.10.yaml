document_id: JER.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les idoles et l’Éternel
  - type: heading
    content: 'V. 1-16: cf. (És 40:18-26; 44:6-21. Ps 115:3-8.) Jé 51:15-19.'
  - type: text
    content: Écoutez la parole que l’Éternel vous adresse,
  - type: text
    content: Maison d’Israël!
  '10':
  - type: text
    content: Mais l’Éternel est Dieu en vérité,
  - type: text
    content: Il est un Dieu vivant et un roi éternel;
  - type: text
    content: La terre tremble devant sa colère,
  - type: text
    content: Et les nations ne supportent pas sa fureur.
  '11':
  - type: text
    content: 'Vous leur parlerez ainsi:'
  - type: text
    content: Les dieux qui n’ont point fait les cieux et la terre
  - type: text
    content: Disparaîtront de la terre et de dessous les cieux.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ge 1:1. Jé 51:15.
  - type: text
    content: Il a créé la terre par sa puissance,
  - type: text
    content: Il a fondé le monde par sa sagesse,
  - type: note
    content: Job 9:8. Ps 104:2. És 40:22; 44:24; 51:13.
  - type: text
    content: Il a étendu les cieux par son intelligence.
  '13':
  - type: text
    content: A sa voix, les eaux mugissent dans les cieux;
  - type: note
    content: Ps 135:7.
  - type: text
    content: Il fait monter les nuages des extrémités de la terre,
  - type: text
    content: Il produit les éclairs et la pluie,
  - type: text
    content: Il tire le vent de ses trésors.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Jé 51:17, 18.
  - type: text
    content: Tout homme devient stupide par sa science,
  - type: text
    content: Tout orfèvre est honteux de son image taillée;
  - type: text
    content: Car ses idoles ne sont que mensonge,
  - type: text
    content: Il n’y a point en elles de souffle,
  '15':
  - type: text
    content: Elles sont une chose de néant, une œuvre de tromperie;
  - type: text
    content: Elles périront, quand viendra le châtiment.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Jé 51:19.
  - type: text
    content: Celui qui est la part de Jacob n’est pas comme elles;
  - type: text
    content: Car c’est lui qui a tout formé,
  - type: text
    content: 'Et Israël est la '
  - type: note
    content: Ps 74:2.
  - type: text
    content: tribu de son héritage.
  - type: text
    content: L’Éternel des armées est son nom.
  - type: heading
    content: L’approche du châtiment
  - type: heading
    content: 'V. 17-25: cf. Jé 4:15-20; 30:11, 16-17. Ps 79.'
  '17':
  - type: text
    content: Emporte du pays ce qui t’appartient,
  - type: text
    content: Toi qui es assise dans la détresse!
  '18':
  - type: text
    content: 'Car ainsi parle l’Éternel:'
  - type: text
    content: Voici, cette fois je vais lancer au loin les habitants du pays;
  - type: note
    content: Jé 6:24.
  - type: text
    content: Je vais les serrer de près, afin qu’on les atteigne.
  '19':
  - type: text
    content: Malheur à moi! Je suis brisée!
  - type: text
    content: Ma plaie est douloureuse!
  - type: text
    content: 'Mais je dis: C’est une calamité qui m’arrive,'
  - type: text
    content: Je la supporterai!
  '2':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: N’imitez pas la voie des nations,
  - type: text
    content: Et ne craignez pas les signes du ciel,
  - type: text
    content: Parce que les nations les craignent.
  '20':
  - type: text
    content: Ma tente est détruite,
  - type: text
    content: Tous mes cordages sont rompus;
  - type: text
    content: Mes fils m’ont quittée, ils ne sont plus;
  - type: text
    content: Je n’ai personne qui dresse de nouveau ma tente,
  - type: text
    content: Qui relève mes pavillons.
  '21':
  - type: text
    content: Les bergers ont été stupides,
  - type: text
    content: Ils n’ont pas cherché l’Éternel;
  - type: text
    content: C’est pour cela qu’ils n’ont point prospéré,
  - type: text
    content: Et que tous leurs troupeaux se dispersent.
  '22':
  - type: text
    content: Voici, une rumeur se fait entendre;
  - type: text
    content: 'C’est un grand tumulte qui vient du '
  - type: note
    content: Jé 1:14; 4:6.
  - type: text
    content: septentrion,
  - type: text
    content: Pour réduire les villes de Juda en un désert,
  - type: text
    content: 'En un repaire de '
  - type: note
    content: Jé 9:11.
  - type: text
    content: chacals.
  '23':
  - type: text
    content: Je le sais, ô Éternel!
  - type: note
    content: Pr 16:1; 20:24.
  - type: text
    content: La voie de l’homme n’est pas en son pouvoir;
  - type: text
    content: Ce n’est pas à l’homme, quand il marche,
  - type: text
    content: A diriger ses pas.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Ps 6:2; 38:2.
  - type: text
    content: 'Châtie-moi, ô Éternel! Mais '
  - type: note
    content: Jé 30:11; 46:28.
  - type: text
    content: avec équité,
  - type: text
    content: Et non dans ta colère, de peur que tu ne m’anéantisses.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Ps 79:6.
  - type: text
    content: Répands ta fureur sur les nations qui ne te connaissent pas,
  - type: text
    content: Et sur les peuples qui n’invoquent pas ton nom!
  - type: note
    content: Jé 8:16.
  - type: text
    content: 'Car ils dévorent Jacob, ils le dévorent, ils le '
  - type: note
    content: Jé 9:16.
  - type: text
    content: consument,
  - type: text
    content: Ils ravagent sa demeure.
  '3':
  - type: text
    content: Car les coutumes des peuples ne sont que vanité.
  - type: note
    content: És 44:14, etc.
  - type: text
    content: On coupe le bois dans la forêt;
  - type: text
    content: La main de l’ouvrier le travaille avec la hache;
  '4':
  - type: text
    content: On l’embellit avec de l’argent et de l’or,
  - type: note
    content: És 41:7.
  - type: text
    content: On le fixe avec des clous et des marteaux,
  - type: text
    content: Pour qu’il ne branle pas.
  '5':
  - type: text
    content: 'Ces dieux sont comme une colonne massive, '
  - type: note
    content: Ps 115:5.
  - type: text
    content: et ils ne parlent point;
  - type: note
    content: És 46:1, 7.
  - type: text
    content: On les porte, parce qu’ils ne peuvent marcher.
  - type: text
    content: 'Ne les craignez pas, '
  - type: note
    content: És 41:23.
  - type: text
    content: car ils ne sauraient faire aucun mal,
  - type: text
    content: Et ils sont incapables de faire du bien.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps 86:8, 10.
  - type: text
    content: Nul n’est semblable à toi, ô Éternel!
  - type: text
    content: Tu es grand, et ton nom est grand par ta puissance.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ap 15:4.
  - type: text
    content: Qui ne te craindrait, roi des nations?
  - type: text
    content: C’est à toi que la crainte est due;
  - type: text
    content: Car, parmi tous les sages des nations et dans tous leurs royaumes,
  - type: text
    content: Nul n’est semblable à toi.
  '8':
  - type: text
    content: 'Tous ensemble, ils sont '
  - type: note
    content: És 41:29. Ha 2:18. Za 10:2.
  - type: text
    content: stupides et insensés;
  - type: text
    content: Leur science n’est que vanité, c’est du bois!
  '9':
  - type: text
    content: On apporte de Tarsis des lames d’argent, et d’Uphaz de l’or,
  - type: text
    content: L’ouvrier et la main de l’orfèvre les mettent en œuvre;
  - type: text
    content: Les vêtements de ces dieux sont d’étoffes teintes en bleu et en pourpre,
  - type: text
    content: Tous sont l’ouvrage d’habiles artisans.
