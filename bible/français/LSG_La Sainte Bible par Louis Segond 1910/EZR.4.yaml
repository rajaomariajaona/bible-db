document_id: EZR.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La construction du temple interrompue
  - type: heading
    content: 'V. 1-24: cf. 2 R 17:24-41. (Ps 120; 123; 129.) Ps 69:27.'
  - type: text
    content: 'Les ennemis de Juda et de Benjamin apprirent que les fils de la captivité bâtissaient un temple à l’Éternel, le Dieu d’Israël. '
  '10':
  - type: text
    content: et les autres peuples que le grand et illustre Osnappar a transportés et établis dans la ville de Samarie et autres lieux de ce côté du fleuve, etc.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'C’est ici la copie de la lettre qu’ils envoyèrent au roi Artaxerxès: '
  - type: text
    content: Tes serviteurs, les gens de ce côté du fleuve, etc.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Que le roi sache que les Juifs partis de chez toi et arrivés parmi nous à Jérusalem rebâtissent la ville rebelle et méchante, en relèvent les murs et en restaurent les fondements.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Que le roi sache donc que, si cette ville est rebâtie et si ses murs sont relevés, ils ne paieront ni tribut, ni impôt, ni droit de passage, et que le trésor royal en souffrira.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Or, comme nous mangeons le sel du palais et qu’il ne nous paraît pas convenable de voir mépriser le roi, nous envoyons au roi ces informations.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Qu’on fasse des recherches dans le livre des mémoires de tes pères; et tu trouveras et verras dans le livre des mémoires que cette ville est une ville rebelle, funeste aux rois et aux provinces, et qu’on s’y est livré à la révolte dès les temps anciens. C’est pourquoi cette ville a été détruite.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Nous faisons savoir au roi que, si cette ville est rebâtie et si ses murs sont relevés, par cela même tu n’auras plus de possession de ce côté du fleuve.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Réponse envoyée par le roi à Rehum, gouverneur, à Schimschaï, secrétaire, et au reste de leurs collègues, demeurant à Samarie et autres lieux de l’autre côté du fleuve:'
  - type: text
    content: Salut, etc.
  - type: text
    content: ' '
  '18':
  - type: text
    content: La lettre que vous nous avez envoyée a été lue exactement devant moi.
  - type: text
    content: ' '
  '19':
  - type: text
    content: J’ai donné ordre de faire des recherches; et l’on a trouvé que dès les temps anciens cette ville s’est soulevée contre les rois, et qu’on s’y est livré à la sédition et à la révolte.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Ils vinrent auprès de Zorobabel et des chefs de familles, et leur dirent: Nous bâtirons avec vous; car, comme vous, nous invoquons votre Dieu, et nous lui offrons des sacrifices depuis le temps '
  - type: note
    content: 2 R 17:29, etc.
  - type: text
    content: 'd’Ésar-Haddon, roi d’Assyrie, qui nous a fait monter ici. '
  '20':
  - type: text
    content: Il y eut à Jérusalem des rois puissants, maîtres de tout le pays de l’autre côté du fleuve, et auxquels on payait tribut, impôt, et droit de passage.
  - type: text
    content: ' '
  '21':
  - type: text
    content: En conséquence, ordonnez de faire cesser les travaux de ces gens, afin que cette ville ne se rebâtisse point avant une autorisation de ma part.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Gardez-vous de mettre en cela de la négligence, de peur que le mal n’augmente au préjudice des rois.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Aussitôt que la copie de la lettre du roi Artaxerxès eut été lue devant Rehum, Schimschaï, le secrétaire, et leurs collègues, ils allèrent en hâte à Jérusalem vers les Juifs, et firent cesser leurs travaux par violence et par force. '
  '24':
  - type: text
    content: Alors s’arrêta l’ouvrage de la maison de Dieu à Jérusalem, et il fut interrompu jusqu’à la seconde année du règne de Darius, roi de Perse.
  '3':
  - type: text
    content: 'Mais Zorobabel, Josué, et les autres chefs des familles d’Israël, leur répondirent: Ce n’est pas à vous et à nous de bâtir la maison de notre Dieu; nous la bâtirons nous seuls à l’Éternel, le Dieu d’Israël, '
  - type: note
    content: Esd 1:1, 2, 3.
  - type: text
    content: 'comme nous l’a ordonné le roi Cyrus, roi de Perse. '
  '4':
  - type: text
    content: 'Alors les gens du pays découragèrent le peuple de Juda; ils l’intimidèrent pour l’empêcher de bâtir, '
  '5':
  - type: text
    content: 'et ils gagnèrent à prix d’argent des conseillers pour faire échouer son entreprise. Il en fut ainsi pendant toute la vie de Cyrus, roi de Perse, et jusqu’au règne de Darius, roi de Perse. '
  '6':
  - type: text
    content: 'Sous le règne d’Assuérus, au commencement de son règne, ils écrivirent une accusation contre les habitants de Juda et de Jérusalem. '
  '7':
  - type: text
    content: 'Et du temps d’Artaxerxès, Bischlam, Mithredath, Thabeel, et le reste de leurs collègues, écrivirent à Artaxerxès, roi de Perse. La lettre fut transcrite en caractères araméens et traduite en araméen. '
  '8':
  - type: text
    content: 'Rehum, gouverneur, et Schimschaï, secrétaire écrivirent au roi Artaxerxès la lettre suivante concernant Jérusalem: '
  '9':
  - type: text
    content: Rehum, gouverneur, Schimschaï, secrétaire, et le reste de leurs collègues, ceux de Din, d’Arpharsathac, de Tharpel, d’Apharas, d’Érec, de Babylone, de Suse, de Déha, d’Élam,
  - type: text
    content: ' '
