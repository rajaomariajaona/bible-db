document_id: EZR.4,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La construction du temple interrompue
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-24: cf. 2 R 17:24-41. (Ps 120; 123; 129.) Ps 69:27.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les ennemis de Juda et de Benjamin apprirent que les fils de la captivité bâtissaient un temple à l’Éternel, le Dieu d’Israël. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: et les autres peuples que le grand et illustre Osnappar a transportés et établis dans la ville de Samarie et autres lieux de ce côté du fleuve, etc.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est ici la copie de la lettre qu’ils envoyèrent au roi Artaxerxès: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tes serviteurs, les gens de ce côté du fleuve, etc.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Que le roi sache que les Juifs partis de chez toi et arrivés parmi nous à Jérusalem rebâtissent la ville rebelle et méchante, en relèvent les murs et en restaurent les fondements.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Que le roi sache donc que, si cette ville est rebâtie et si ses murs sont relevés, ils ne paieront ni tribut, ni impôt, ni droit de passage, et que le trésor royal en souffrira.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Or, comme nous mangeons le sel du palais et qu’il ne nous paraît pas convenable de voir mépriser le roi, nous envoyons au roi ces informations.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Qu’on fasse des recherches dans le livre des mémoires de tes pères; et tu trouveras et verras dans le livre des mémoires que cette ville est une ville rebelle, funeste aux rois et aux provinces, et qu’on s’y est livré à la révolte dès les temps anciens. C’est pourquoi cette ville a été détruite.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nous faisons savoir au roi que, si cette ville est rebâtie et si ses murs sont relevés, par cela même tu n’auras plus de possession de ce côté du fleuve.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Réponse envoyée par le roi à Rehum, gouverneur, à Schimschaï, secrétaire, et au reste de leurs collègues, demeurant à Samarie et autres lieux de l’autre côté du fleuve:'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salut, etc.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: La lettre que vous nous avez envoyée a été lue exactement devant moi.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: J’ai donné ordre de faire des recherches; et l’on a trouvé que dès les temps anciens cette ville s’est soulevée contre les rois, et qu’on s’y est livré à la sédition et à la révolte.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils vinrent auprès de Zorobabel et des chefs de familles, et leur dirent: Nous bâtirons avec vous; car, comme vous, nous invoquons votre Dieu, et nous lui offrons des sacrifices depuis le temps '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 R 17:29, etc.
      marker-yv: yv-n
    - type: text
      text: 'd’Ésar-Haddon, roi d’Assyrie, qui nous a fait monter ici. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Il y eut à Jérusalem des rois puissants, maîtres de tout le pays de l’autre côté du fleuve, et auxquels on payait tribut, impôt, et droit de passage.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: En conséquence, ordonnez de faire cesser les travaux de ces gens, afin que cette ville ne se rebâtisse point avant une autorisation de ma part.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gardez-vous de mettre en cela de la négligence, de peur que le mal n’augmente au préjudice des rois.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussitôt que la copie de la lettre du roi Artaxerxès eut été lue devant Rehum, Schimschaï, le secrétaire, et leurs collègues, ils allèrent en hâte à Jérusalem vers les Juifs, et firent cesser leurs travaux par violence et par force. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors s’arrêta l’ouvrage de la maison de Dieu à Jérusalem, et il fut interrompu jusqu’à la seconde année du règne de Darius, roi de Perse.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Zorobabel, Josué, et les autres chefs des familles d’Israël, leur répondirent: Ce n’est pas à vous et à nous de bâtir la maison de notre Dieu; nous la bâtirons nous seuls à l’Éternel, le Dieu d’Israël, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esd 1:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme nous l’a ordonné le roi Cyrus, roi de Perse. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les gens du pays découragèrent le peuple de Juda; ils l’intimidèrent pour l’empêcher de bâtir, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et ils gagnèrent à prix d’argent des conseillers pour faire échouer son entreprise. Il en fut ainsi pendant toute la vie de Cyrus, roi de Perse, et jusqu’au règne de Darius, roi de Perse. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sous le règne d’Assuérus, au commencement de son règne, ils écrivirent une accusation contre les habitants de Juda et de Jérusalem. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et du temps d’Artaxerxès, Bischlam, Mithredath, Thabeel, et le reste de leurs collègues, écrivirent à Artaxerxès, roi de Perse. La lettre fut transcrite en caractères araméens et traduite en araméen. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehum, gouverneur, et Schimschaï, secrétaire écrivirent au roi Artaxerxès la lettre suivante concernant Jérusalem: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Rehum, gouverneur, Schimschaï, secrétaire, et le reste de leurs collègues, ceux de Din, d’Arpharsathac, de Tharpel, d’Apharas, d’Érec, de Babylone, de Suse, de Déha, d’Élam,
    - type: text
      text: ' '
