document_id: JOB.40,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-9: cf. (Job 42:1-6; 9:1-15.) (Ps 9:21; 8:5.)'
  - type: text
    content: 'L’Éternel répondit à Job du milieu de la tempête et dit:'
  '10':
  - type: text
    content: Voici l’hippopotame, à qui j’ai donné la vie comme à toi!
  - type: text
    content: Il mange de l’herbe comme le bœuf.
  '11':
  - type: text
    content: Le voici! Sa force est dans ses reins,
  - type: text
    content: Et sa vigueur dans les muscles de son ventre;
  '12':
  - type: text
    content: Il plie sa queue aussi ferme qu’un cèdre;
  - type: text
    content: Les nerfs de ses cuisses sont entrelacés;
  '13':
  - type: text
    content: Ses os sont des tubes d’airain,
  - type: text
    content: Ses membres sont comme des barres de fer.
  '14':
  - type: text
    content: Il est la première des œuvres de Dieu;
  - type: text
    content: Celui qui l’a fait l’a pourvu d’un glaive.
  '15':
  - type: text
    content: Il trouve sa pâture dans les montagnes,
  - type: text
    content: Où se jouent toutes les bêtes des champs.
  '16':
  - type: text
    content: Il se couche sous les lotus,
  - type: text
    content: Au milieu des roseaux et des marécages;
  '17':
  - type: text
    content: Les lotus le couvrent de leur ombre,
  - type: text
    content: Les saules du torrent l’environnent.
  '18':
  - type: text
    content: 'Que le fleuve vienne à déborder, il ne s’enfuit pas:'
  - type: text
    content: Que le Jourdain se précipite dans sa gueule, il reste calme.
  '19':
  - type: text
    content: Est-ce à force ouverte qu’on pourra le saisir?
  - type: text
    content: Est-ce au moyen de filets qu’on lui percera le nez?
  - type: heading
    content: '40 v. 20 à 41 v. 25: cf. Ps 104:24-32. Ro 11:33-36.'
  '2':
  - type: text
    content: Ceins tes reins comme un vaillant homme;
  - type: text
    content: Je t’interrogerai, et tu m’instruiras.
  '20':
  - type: text
    content: Prendras-tu le crocodile à l’hameçon?
  - type: text
    content: Saisiras-tu sa langue avec une corde?
  '21':
  - type: text
    content: Mettras-tu un jonc dans ses narines?
  - type: text
    content: Lui perceras-tu la mâchoire avec un crochet?
  '22':
  - type: text
    content: Te pressera-t-il de supplication?
  - type: text
    content: Te parlera-t-il d’une voix douce?
  '23':
  - type: text
    content: Fera-t-il une alliance avec toi,
  - type: text
    content: Pour devenir à toujours ton esclave?
  '24':
  - type: text
    content: Joueras-tu avec lui comme avec un oiseau?
  - type: text
    content: L’attacheras-tu pour amuser tes jeunes filles?
  '25':
  - type: text
    content: Les pêcheurs en trafiquent-ils?
  - type: text
    content: Le partagent-ils entre les marchands?
  '26':
  - type: text
    content: Couvriras-tu sa peau de dards,
  - type: text
    content: Et sa tête de harpons?
  '27':
  - type: text
    content: Dresse ta main contre lui,
  - type: text
    content: Et tu ne t’aviseras plus de l’attaquer.
  '28':
  - type: text
    content: Voici, on est trompé dans son attente;
  - type: text
    content: A son seul aspect n’est-on pas terrassé?
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps 51:6. Ro 3:4.
  - type: text
    content: Anéantiras-tu jusqu’à ma justice?
  - type: text
    content: Me condamneras-tu pour te donner droit?
  '4':
  - type: text
    content: As-tu un bras comme celui de Dieu,
  - type: text
    content: Une voix tonnante comme la sienne?
  '5':
  - type: text
    content: Orne-toi de magnificence et de grandeur,
  - type: text
    content: Revêts-toi de splendeur et de gloire!
  '6':
  - type: text
    content: Répands les flots de ta colère,
  - type: text
    content: Et d’un regard abaisse les hautains!
  '7':
  - type: text
    content: D’un regard humilie les hautains,
  - type: text
    content: Écrase sur place les méchants,
  '8':
  - type: text
    content: Cache-les tous ensemble dans la poussière,
  - type: text
    content: Enferme leur front dans les ténèbres!
  '9':
  - type: text
    content: Alors je rends hommage
  - type: text
    content: A la puissance de ta droite.
  - type: heading
    content: 'V. 10-19: cf. (Job 39:8-28.)'
