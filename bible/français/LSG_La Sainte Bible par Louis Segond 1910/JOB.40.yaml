document_id: JOB.40,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. (Job 42:1-6; 9:1-15.) (Ps 9:21; 8:5.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Éternel répondit à Job du milieu de la tempête et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Voici l’hippopotame, à qui j’ai donné la vie comme à toi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il mange de l’herbe comme le bœuf.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Le voici! Sa force est dans ses reins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa vigueur dans les muscles de son ventre;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Il plie sa queue aussi ferme qu’un cèdre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les nerfs de ses cuisses sont entrelacés;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ses os sont des tubes d’airain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses membres sont comme des barres de fer.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Il est la première des œuvres de Dieu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui l’a fait l’a pourvu d’un glaive.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Il trouve sa pâture dans les montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où se jouent toutes les bêtes des champs.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Il se couche sous les lotus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu des roseaux et des marécages;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Les lotus le couvrent de leur ombre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les saules du torrent l’environnent.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Que le fleuve vienne à déborder, il ne s’enfuit pas:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le Jourdain se précipite dans sa gueule, il reste calme.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Est-ce à force ouverte qu’on pourra le saisir?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce au moyen de filets qu’on lui percera le nez?
  - type: usfm
    marker: r
    children:
    - type: text
      text: '40 v. 20 à 41 v. 25: cf. Ps 104:24-32. Ro 11:33-36.'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ceins tes reins comme un vaillant homme;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’interrogerai, et tu m’instruiras.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Prendras-tu le crocodile à l’hameçon?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saisiras-tu sa langue avec une corde?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Mettras-tu un jonc dans ses narines?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui perceras-tu la mâchoire avec un crochet?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Te pressera-t-il de supplication?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Te parlera-t-il d’une voix douce?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fera-t-il une alliance avec toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour devenir à toujours ton esclave?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Joueras-tu avec lui comme avec un oiseau?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’attacheras-tu pour amuser tes jeunes filles?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Les pêcheurs en trafiquent-ils?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le partagent-ils entre les marchands?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Couvriras-tu sa peau de dards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa tête de harpons?
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Dresse ta main contre lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu ne t’aviseras plus de l’attaquer.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Voici, on est trompé dans son attente;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A son seul aspect n’est-on pas terrassé?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 51:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Anéantiras-tu jusqu’à ma justice?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Me condamneras-tu pour te donner droit?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: As-tu un bras comme celui de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une voix tonnante comme la sienne?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Orne-toi de magnificence et de grandeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Revêts-toi de splendeur et de gloire!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Répands les flots de ta colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et d’un regard abaisse les hautains!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: D’un regard humilie les hautains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écrase sur place les méchants,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Cache-les tous ensemble dans la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enferme leur front dans les ténèbres!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Alors je rends hommage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la puissance de ta droite.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-19: cf. (Job 39:8-28.)'
    marker-yv: yv-h
