document_id: JER.43,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérémie entraîné en Égypte
  - type: heading
    content: 'V. 1-7: cf. Jé 42. Lé 26:36, 37. No 14:4. De 28:68. 1 R 22:23-29.'
  - type: text
    content: 'Lorsque Jérémie eut achevé de dire à tout le peuple toutes les paroles de l’Éternel, leur Dieu, toutes ces paroles que l’Éternel, leur Dieu, l’avait chargé de leur dire, '
  '10':
  - type: text
    content: 'Et tu diras aux Juifs: Ainsi parle l’Éternel des armées, le Dieu d’Israël: Voici, j’enverrai chercher Nebucadnetsar, roi de Babylone, '
  - type: note
    content: Jé 25:9; 27:6.
  - type: text
    content: 'mon serviteur, et je placerai son trône sur ces pierres que j’ai cachées, et il étendra son tapis sur elles. '
  '11':
  - type: text
    content: 'Il viendra, et il frappera le pays d’Égypte; '
  - type: note
    content: Jé 15:2. Za 11:9.
  - type: text
    content: 'à la mort ceux qui sont pour la mort, à la captivité ceux qui sont pour la captivité, à l’épée ceux qui sont pour l’épée! '
  '12':
  - type: text
    content: 'Je mettrai le feu aux maisons des dieux de l’Égypte; Nebucadnetsar les brûlera, il emmènera captives les idoles, il s’enveloppera du pays d’Égypte comme le berger s’enveloppe de son vêtement, et il sortira de là en paix. '
  '13':
  - type: text
    content: Il brisera les statues de Beth-Schémesch au pays d’Égypte, et il brûlera par le feu les maisons des dieux de l’Égypte.
  '2':
  - type: text
    content: 'Azaria, fils d’Hosée, Jochanan, fils de Karéach, et tous ces hommes orgueilleux, dirent à Jérémie: Tu dis un mensonge: l’Éternel, notre Dieu, ne t’a point chargé de nous dire: N’allez pas en Égypte pour y demeurer. '
  '3':
  - type: text
    content: 'Mais c’est Baruc, fils de Nérija, qui t’excite contre nous, afin de nous livrer entre les mains des Chaldéens, pour qu’ils nous fassent mourir ou nous emmènent captifs à Babylone. '
  '4':
  - type: text
    content: 'Jochanan, fils de Karéach, tous les chefs des troupes, et tout le peuple, n’obéirent point à la voix de l’Éternel, qui leur ordonnait de rester dans le pays de Juda. '
  '5':
  - type: text
    content: 'Et Jochanan, fils de Karéach, et tous les chefs des troupes, prirent tous les restes de Juda, qui, après avoir été dispersés parmi toutes les nations, étaient revenus pour habiter le pays de Juda, '
  '6':
  - type: text
    content: 'les hommes, les femmes, les enfants, les filles du roi, et toutes les personnes que Nebuzaradan, chef des gardes, avait laissées avec Guedalia, fils d’Achikam, fils de Schaphan, et aussi Jérémie, le prophète, et Baruc, fils de Nérija. '
  '7':
  - type: text
    content: Ils allèrent au pays d’Égypte, car ils n’obéirent pas à la voix de l’Éternel, et ils arrivèrent à Tachpanès.
  - type: heading
    content: Prophétie sur la conquête de l’Égypte par Nebucadnetsar
  - type: heading
    content: 'V. 8-13: cf. Jé 46. Éz 29 à 32.'
  '8':
  - type: text
    content: 'La parole de l’Éternel fut adressée à Jérémie, à Tachpanès, en ces mots: '
  '9':
  - type: text
    content: 'Prends dans ta main de grandes pierres, et cache-les, en présence des Juifs, dans l’argile du four à briques qui est à l’entrée de la maison de Pharaon à Tachpanès. '
