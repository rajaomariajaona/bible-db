document_id: JOB.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job dans l’adversité
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. Éz 14:14, 20. (Ge 6:8, 9. Ps 128:1-4.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il y avait dans le pays d’Uts un homme qui s’appelait Job. Et cet homme était '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 2:3
      metadata:
        usfm: JOB.2.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'intègre et droit; il craignait Dieu, et se détournait du mal. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il lui naquit sept fils et trois filles. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il possédait sept mille brebis, trois mille chameaux, cinq cents paires de bœufs, cinq cents ânesses, et un très grand nombre de serviteurs. Et cet homme était le plus considérable de tous les fils de l’Orient. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ses fils allaient les uns chez les autres et donnaient tour à tour un festin, et ils invitaient leurs trois sœurs à manger et à boire avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et quand les jours de festin étaient passés, Job appelait et sanctifiait ses fils, puis il se levait de bon matin et offrait pour chacun d’eux un holocauste; car Job disait: Peut-être mes fils ont-ils péché et ont-ils offensé Dieu dans leur cœur. C’est ainsi que Job avait coutume d’agir.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-12: cf. 1 R 22:19-22. Lu 22:31, 32.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Or, les fils de Dieu vinrent un jour se présenter devant l’Éternel, et Satan vint aussi au milieu d’eux. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’Éternel dit à Satan: D’où viens-tu? Et Satan répondit à l’Éternel: De parcourir '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:8
      metadata:
        usfm: 1PE.5.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la terre et de m’y promener. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L’Éternel dit à Satan: As-tu remarqué mon serviteur Job? Il n’y a personne comme lui sur la terre; c’est un homme intègre et droit, craignant Dieu, et se détournant du mal. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et Satan répondit à l’Éternel: Est-ce d’une manière désintéressée que Job craint Dieu? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ne l’as-tu pas protégé, lui, sa maison, et tout ce qui est à lui? Tu as béni l’œuvre de ses mains, et ses troupeaux couvrent le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais étends ta main, touche à tout ce qui lui appartient, et je suis sûr qu’il te maudit en face. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’Éternel dit à Satan: Voici, tout ce qui lui appartient, je te le livre; seulement, ne porte pas la main sur lui. Et Satan se retira de devant la face de l’Éternel.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-22: cf. Ec 8:14. Ps 42:8. Ja 5:11; 1:2 à 4:12. 1 Pi 1:6, 7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Un jour que les fils et les filles de Job mangeaient et buvaient du vin dans la maison de leur frère aîné, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'il arriva auprès de Job un messager qui dit: Les bœufs labouraient et les ânesses paissaient à côté d’eux; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'des Sabéens se sont jetés dessus, les ont enlevés, et ont passé les serviteurs au fil de l’épée. Et je me suis échappé moi seul, pour t’en apporter la nouvelle. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il parlait encore, lorsqu’un autre vint et dit: Le feu de Dieu est tombé du ciel, a embrasé les brebis et les serviteurs, et les a consumés. Et je me suis échappé moi seul, pour t’en apporter la nouvelle. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il parlait encore, lorsqu’un autre vint et dit: Des Chaldéens, formés en trois bandes, se sont jetés sur les chameaux, les ont enlevés, et ont passé les serviteurs au fil de l’épée. Et je me suis échappé moi seul, pour t’en apporter la nouvelle. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il parlait encore, lorsqu’un autre vint et dit: Tes fils et tes filles mangeaient et buvaient du vin dans la maison de leur frère aîné; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et voici, un grand vent est venu de l’autre côté du désert, et a frappé contre les quatre coins de la maison; elle s’est écroulée sur les jeunes gens, et ils sont morts. Et je me suis échappé moi seul, pour t’en apporter la nouvelle. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Alors Job se leva, déchira son manteau, et se rasa la tête; puis, se jetant par terre, il se prosterna, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 5:14
      metadata:
        usfm: ECC.5.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 6:7
      metadata:
        usfm: 1TI.6.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je suis sorti nu du sein de ma mère, et nu je retournerai dans le sein de la terre. L’Éternel a donné, et l’Éternel a ôté; que le nom de l’Éternel soit béni! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: En tout cela, Job ne pécha point et n’attribua rien d’injuste à Dieu.
