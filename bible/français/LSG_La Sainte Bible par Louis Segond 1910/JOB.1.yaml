document_id: JOB.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Job dans l’adversité
  - type: heading
    content: 'V. 1-5: cf. Éz 14:14, 20. (Ge 6:8, 9. Ps 128:1-4.)'
  - type: text
    content: 'Il y avait dans le pays d’Uts un homme qui s’appelait Job. Et cet homme était '
  - type: note
    content: Job 2:3.
  - type: text
    content: 'intègre et droit; il craignait Dieu, et se détournait du mal. '
  '10':
  - type: text
    content: 'Ne l’as-tu pas protégé, lui, sa maison, et tout ce qui est à lui? Tu as béni l’œuvre de ses mains, et ses troupeaux couvrent le pays. '
  '11':
  - type: text
    content: 'Mais étends ta main, touche à tout ce qui lui appartient, et je suis sûr qu’il te maudit en face. '
  '12':
  - type: text
    content: 'L’Éternel dit à Satan: Voici, tout ce qui lui appartient, je te le livre; seulement, ne porte pas la main sur lui. Et Satan se retira de devant la face de l’Éternel.'
  - type: heading
    content: 'V. 13-22: cf. Ec 8:14. Ps 42:8. Ja 5:11; 1:2 à 4:12. 1 Pi 1:6, 7.'
  '13':
  - type: text
    content: 'Un jour que les fils et les filles de Job mangeaient et buvaient du vin dans la maison de leur frère aîné, '
  '14':
  - type: text
    content: 'il arriva auprès de Job un messager qui dit: Les bœufs labouraient et les ânesses paissaient à côté d’eux; '
  '15':
  - type: text
    content: 'des Sabéens se sont jetés dessus, les ont enlevés, et ont passé les serviteurs au fil de l’épée. Et je me suis échappé moi seul, pour t’en apporter la nouvelle. '
  '16':
  - type: text
    content: 'Il parlait encore, lorsqu’un autre vint et dit: Le feu de Dieu est tombé du ciel, a embrasé les brebis et les serviteurs, et les a consumés. Et je me suis échappé moi seul, pour t’en apporter la nouvelle. '
  '17':
  - type: text
    content: 'Il parlait encore, lorsqu’un autre vint et dit: Des Chaldéens, formés en trois bandes, se sont jetés sur les chameaux, les ont enlevés, et ont passé les serviteurs au fil de l’épée. Et je me suis échappé moi seul, pour t’en apporter la nouvelle. '
  '18':
  - type: text
    content: 'Il parlait encore, lorsqu’un autre vint et dit: Tes fils et tes filles mangeaient et buvaient du vin dans la maison de leur frère aîné; '
  '19':
  - type: text
    content: 'et voici, un grand vent est venu de l’autre côté du désert, et a frappé contre les quatre coins de la maison; elle s’est écroulée sur les jeunes gens, et ils sont morts. Et je me suis échappé moi seul, pour t’en apporter la nouvelle. '
  '2':
  - type: text
    content: 'Il lui naquit sept fils et trois filles. '
  '20':
  - type: text
    content: 'Alors Job se leva, déchira son manteau, et se rasa la tête; puis, se jetant par terre, il se prosterna, '
  '21':
  - type: text
    content: 'et dit: '
  - type: note
    content: Ec 5:14. 1 Ti 6:7.
  - type: text
    content: 'Je suis sorti nu du sein de ma mère, et nu je retournerai dans le sein de la terre. L’Éternel a donné, et l’Éternel a ôté; que le nom de l’Éternel soit béni! '
  '22':
  - type: text
    content: En tout cela, Job ne pécha point et n’attribua rien d’injuste à Dieu.
  '3':
  - type: text
    content: 'Il possédait sept mille brebis, trois mille chameaux, cinq cents paires de bœufs, cinq cents ânesses, et un très grand nombre de serviteurs. Et cet homme était le plus considérable de tous les fils de l’Orient. '
  '4':
  - type: text
    content: 'Ses fils allaient les uns chez les autres et donnaient tour à tour un festin, et ils invitaient leurs trois sœurs à manger et à boire avec eux. '
  '5':
  - type: text
    content: 'Et quand les jours de festin étaient passés, Job appelait et sanctifiait ses fils, puis il se levait de bon matin et offrait pour chacun d’eux un holocauste; car Job disait: Peut-être mes fils ont-ils péché et ont-ils offensé Dieu dans leur cœur. C’est ainsi que Job avait coutume d’agir.'
  - type: heading
    content: 'V. 6-12: cf. 1 R 22:19-22. Lu 22:31, 32.'
  '6':
  - type: text
    content: 'Or, les fils de Dieu vinrent un jour se présenter devant l’Éternel, et Satan vint aussi au milieu d’eux. '
  '7':
  - type: text
    content: 'L’Éternel dit à Satan: D’où viens-tu? Et Satan répondit à l’Éternel: De parcourir '
  - type: note
    content: 1 Pi 5:8.
  - type: text
    content: 'la terre et de m’y promener. '
  '8':
  - type: text
    content: 'L’Éternel dit à Satan: As-tu remarqué mon serviteur Job? Il n’y a personne comme lui sur la terre; c’est un homme intègre et droit, craignant Dieu, et se détournant du mal. '
  '9':
  - type: text
    content: 'Et Satan répondit à l’Éternel: Est-ce d’une manière désintéressée que Job craint Dieu? '
