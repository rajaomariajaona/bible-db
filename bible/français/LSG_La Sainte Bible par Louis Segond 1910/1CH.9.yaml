document_id: 1CH.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Habitants de Jérusalem après le retour de la captivité
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. Né 11:1-9. Ps 122; 137:5, 6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tout Israël est enregistré dans les généalogies et inscrit dans le livre des rois d’Israël. Et Juda fut emmené captif à Babylone, à cause de ses infidélités. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les premiers habitants qui demeuraient dans leurs possessions, dans leurs villes, étaient les Israélites, les sacrificateurs, les Lévites, et les Néthiniens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'A Jérusalem habitaient des fils de Juda, des fils de Benjamin, et des fils d’Éphraïm et de Manassé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Des fils de Pérets, fils de Juda: Uthaï, fils d’Ammihud, fils d’Omri, fils d’Imri, fils de Bani. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Des Schilonites: Asaja, le premier-né, et ses fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Des fils de Zérach: Jeuel, et ses frères, six cent quatre-vingt-dix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Des fils de Benjamin: Sallu, fils de Meschullam, fils d’Hodavia, fils d’Assenua; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jibneja, fils de Jerocham; Éla, fils d’Uzzi, fils de Micri; Meschullam, fils de Schephathia, fils de Reuel, fils de Jibnija; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: et leurs frères, selon leurs générations, neuf cent cinquante-six. Tous ces hommes étaient chefs de famille dans les maisons de leurs pères.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-13: cf. Né 11:10-14. 1 Ch 6:3-15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Des sacrificateurs: Jedaeja; Jehojarib; Jakin; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Azaria, fils de Hilkija, fils de Meschullam, fils de Tsadok, fils de Merajoth, fils d’Achithub, prince de la maison de Dieu; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Adaja, fils de Jerocham, fils de Paschhur, fils de Malkija; Maesaï, fils d’Adiel, fils de Jachzéra, fils de Meschullam, fils de Meschillémith, fils d’Immer; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: et leurs frères, chefs des maisons de leurs pères, mille sept cent soixante, hommes vaillants, occupés au service de la maison de Dieu.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-34: cf. Né 11:15-23. 1 Ch 25; 26. Ps 134.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Des Lévites: Schemaeja, fils de Haschub, fils d’Azrikam, fils de Haschabia, des fils de Merari; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Bakbakkar; Héresch; Galal; Matthania, fils de Michée, fils de Zicri, fils d’Asaph; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Abdias, fils de Schemaeja, fils de Galal, fils de Jeduthun; Bérékia, fils d’Asa, fils d’Elkana, qui habitait dans les villages des Nethophathiens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et les portiers: Schallum, Akkub, Thalmon, Achiman, et leurs frères; Schallum était le chef, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'et jusqu’à présent il est à la porte du roi, à l’orient. Ce sont là les portiers pour le camp des fils de Lévi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Schallum, fils de Koré, fils d’Ébiasaph, fils de Koré, et ses frères de la maison de son père, les Koréites, remplissaient les fonctions de gardiens des seuils de la tente; leurs pères avaient gardé l’entrée du camp de l’Éternel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'et Phinées, fils d’Éléazar, avait été autrefois leur chef, et l’Éternel était avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Zacharie, fils de Meschélémia, était portier à l’entrée de la tente d’assignation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils étaient en tout deux cent douze, choisis pour portiers des seuils, et enregistrés dans les généalogies d’après leurs villages; David et Samuel le voyant les avaient établis dans leurs fonctions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Eux et leurs enfants gardaient les portes de la maison de l’Éternel, de la maison de la tente. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il y avait des portiers aux quatre vents, à l’orient, à l’occident, au nord et au midi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Leurs frères, qui demeuraient dans leurs villages, devaient de temps à autre venir auprès d’eux pendant sept jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Car ces quatre chefs des portiers, ces Lévites, étaient toujours en fonctions, et ils avaient encore la surveillance des chambres et des trésors de la maison de Dieu; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ils passaient la nuit autour de la maison de Dieu, dont ils avaient la garde, et qu’ils devaient ouvrir chaque matin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Quelques-uns des Lévites prenaient soin des ustensiles du service, qu’ils rentraient en les comptant et sortaient en les comptant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'D’autres veillaient sur les ustensiles, sur tous les ustensiles du sanctuaire, et sur la fleur de farine, le vin, l’huile, l’encens et les aromates. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'C’étaient des fils de sacrificateurs qui composaient les parfums aromatiques. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Matthithia, l’un des Lévites, premier-né de Schallum le Koréite, s’occupait des gâteaux cuits sur la plaque. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Et quelques-uns de leurs frères, parmi les Kehathites, étaient chargés de préparer pour chaque sabbat les pains de proposition. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ce sont là les chantres, chefs de famille des Lévites, demeurant dans les chambres, exempts des autres fonctions parce qu’ils étaient à l’œuvre jour et nuit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ce sont là les chefs de famille des Lévites, chefs selon leurs générations. Ils habitaient à Jérusalem.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 35-44: cf. 1 Ch 8:29-38.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le père de Gabaon, Jeïel, habitait à Gabaon, et le nom de sa femme était Maaca. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Abdon, son fils premier-né, puis Tsur, Kis, Baal, Ner, Nadab, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Guedor, Achjo, Zacharie et Mikloth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Mikloth engendra Schimeam. Ils habitaient aussi à Jérusalem près de leurs frères, avec leurs frères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ner engendra Kis; Kis engendra Saül; Saül engendra Jonathan, Malki-Schua, Abinadab et Eschbaal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fils de Jonathan: Merib-Baal. Merib-Baal engendra Michée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Fils de Michée: Pithon, Mélec, et Thachréa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Achaz engendra Jaera; Jaera engendra Alémeth, Azmaveth et Zimri; Zimri engendra Motsa; Motsa engendra Binea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Rephaja, son fils; Éleasa, son fils; Atsel, son fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Atsel eut six fils, dont voici les noms: Azrikam, Bocru, Ismaël, Schearia, Abdias et Hanan. Ce sont là les fils d’Atsel.'
