document_id: 1CH.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Habitants de Jérusalem après le retour de la captivité
  - type: heading
    content: 'V. 1-9: cf. Né 11:1-9. Ps 122; 137:5, 6.'
  - type: text
    content: 'Tout Israël est enregistré dans les généalogies et inscrit dans le livre des rois d’Israël. Et Juda fut emmené captif à Babylone, à cause de ses infidélités. '
  '10':
  - type: text
    content: 'Des sacrificateurs: Jedaeja; Jehojarib; Jakin; '
  '11':
  - type: text
    content: 'Azaria, fils de Hilkija, fils de Meschullam, fils de Tsadok, fils de Merajoth, fils d’Achithub, prince de la maison de Dieu; '
  '12':
  - type: text
    content: 'Adaja, fils de Jerocham, fils de Paschhur, fils de Malkija; Maesaï, fils d’Adiel, fils de Jachzéra, fils de Meschullam, fils de Meschillémith, fils d’Immer; '
  '13':
  - type: text
    content: et leurs frères, chefs des maisons de leurs pères, mille sept cent soixante, hommes vaillants, occupés au service de la maison de Dieu.
  - type: heading
    content: 'V. 14-34: cf. Né 11:15-23. 1 Ch 25; 26. Ps 134.'
  '14':
  - type: text
    content: 'Des Lévites: Schemaeja, fils de Haschub, fils d’Azrikam, fils de Haschabia, des fils de Merari; '
  '15':
  - type: text
    content: 'Bakbakkar; Héresch; Galal; Matthania, fils de Michée, fils de Zicri, fils d’Asaph; '
  '16':
  - type: text
    content: 'Abdias, fils de Schemaeja, fils de Galal, fils de Jeduthun; Bérékia, fils d’Asa, fils d’Elkana, qui habitait dans les villages des Nethophathiens. '
  '17':
  - type: text
    content: 'Et les portiers: Schallum, Akkub, Thalmon, Achiman, et leurs frères; Schallum était le chef, '
  '18':
  - type: text
    content: 'et jusqu’à présent il est à la porte du roi, à l’orient. Ce sont là les portiers pour le camp des fils de Lévi. '
  '19':
  - type: text
    content: 'Schallum, fils de Koré, fils d’Ébiasaph, fils de Koré, et ses frères de la maison de son père, les Koréites, remplissaient les fonctions de gardiens des seuils de la tente; leurs pères avaient gardé l’entrée du camp de l’Éternel, '
  '2':
  - type: text
    content: 'Les premiers habitants qui demeuraient dans leurs possessions, dans leurs villes, étaient les Israélites, les sacrificateurs, les Lévites, et les Néthiniens. '
  '20':
  - type: text
    content: 'et Phinées, fils d’Éléazar, avait été autrefois leur chef, et l’Éternel était avec lui. '
  '21':
  - type: text
    content: 'Zacharie, fils de Meschélémia, était portier à l’entrée de la tente d’assignation. '
  '22':
  - type: text
    content: 'Ils étaient en tout deux cent douze, choisis pour portiers des seuils, et enregistrés dans les généalogies d’après leurs villages; David et Samuel le voyant les avaient établis dans leurs fonctions. '
  '23':
  - type: text
    content: 'Eux et leurs enfants gardaient les portes de la maison de l’Éternel, de la maison de la tente. '
  '24':
  - type: text
    content: 'Il y avait des portiers aux quatre vents, à l’orient, à l’occident, au nord et au midi. '
  '25':
  - type: text
    content: 'Leurs frères, qui demeuraient dans leurs villages, devaient de temps à autre venir auprès d’eux pendant sept jours. '
  '26':
  - type: text
    content: 'Car ces quatre chefs des portiers, ces Lévites, étaient toujours en fonctions, et ils avaient encore la surveillance des chambres et des trésors de la maison de Dieu; '
  '27':
  - type: text
    content: 'ils passaient la nuit autour de la maison de Dieu, dont ils avaient la garde, et qu’ils devaient ouvrir chaque matin. '
  '28':
  - type: text
    content: 'Quelques-uns des Lévites prenaient soin des ustensiles du service, qu’ils rentraient en les comptant et sortaient en les comptant. '
  '29':
  - type: text
    content: 'D’autres veillaient sur les ustensiles, sur tous les ustensiles du sanctuaire, et sur la fleur de farine, le vin, l’huile, l’encens et les aromates. '
  '3':
  - type: text
    content: 'A Jérusalem habitaient des fils de Juda, des fils de Benjamin, et des fils d’Éphraïm et de Manassé. '
  '30':
  - type: text
    content: 'C’étaient des fils de sacrificateurs qui composaient les parfums aromatiques. '
  '31':
  - type: text
    content: 'Matthithia, l’un des Lévites, premier-né de Schallum le Koréite, s’occupait des gâteaux cuits sur la plaque. '
  '32':
  - type: text
    content: 'Et quelques-uns de leurs frères, parmi les Kehathites, étaient chargés de préparer pour chaque sabbat les pains de proposition. '
  '33':
  - type: text
    content: 'Ce sont là les chantres, chefs de famille des Lévites, demeurant dans les chambres, exempts des autres fonctions parce qu’ils étaient à l’œuvre jour et nuit. '
  '34':
  - type: text
    content: Ce sont là les chefs de famille des Lévites, chefs selon leurs générations. Ils habitaient à Jérusalem.
  - type: heading
    content: 'V. 35-44: cf. 1 Ch 8:29-38.'
  '35':
  - type: text
    content: 'Le père de Gabaon, Jeïel, habitait à Gabaon, et le nom de sa femme était Maaca. '
  '36':
  - type: text
    content: 'Abdon, son fils premier-né, puis Tsur, Kis, Baal, Ner, Nadab, '
  '37':
  - type: text
    content: 'Guedor, Achjo, Zacharie et Mikloth. '
  '38':
  - type: text
    content: 'Mikloth engendra Schimeam. Ils habitaient aussi à Jérusalem près de leurs frères, avec leurs frères. '
  '39':
  - type: text
    content: 'Ner engendra Kis; Kis engendra Saül; Saül engendra Jonathan, Malki-Schua, Abinadab et Eschbaal. '
  '4':
  - type: text
    content: 'Des fils de Pérets, fils de Juda: Uthaï, fils d’Ammihud, fils d’Omri, fils d’Imri, fils de Bani. '
  '40':
  - type: text
    content: 'Fils de Jonathan: Merib-Baal. Merib-Baal engendra Michée. '
  '41':
  - type: text
    content: 'Fils de Michée: Pithon, Mélec, et Thachréa. '
  '42':
  - type: text
    content: 'Achaz engendra Jaera; Jaera engendra Alémeth, Azmaveth et Zimri; Zimri engendra Motsa; Motsa engendra Binea. '
  '43':
  - type: text
    content: 'Rephaja, son fils; Éleasa, son fils; Atsel, son fils. '
  '44':
  - type: text
    content: 'Atsel eut six fils, dont voici les noms: Azrikam, Bocru, Ismaël, Schearia, Abdias et Hanan. Ce sont là les fils d’Atsel.'
  '5':
  - type: text
    content: 'Des Schilonites: Asaja, le premier-né, et ses fils. '
  '6':
  - type: text
    content: 'Des fils de Zérach: Jeuel, et ses frères, six cent quatre-vingt-dix. '
  '7':
  - type: text
    content: 'Des fils de Benjamin: Sallu, fils de Meschullam, fils d’Hodavia, fils d’Assenua; '
  '8':
  - type: text
    content: 'Jibneja, fils de Jerocham; Éla, fils d’Uzzi, fils de Micri; Meschullam, fils de Schephathia, fils de Reuel, fils de Jibnija; '
  '9':
  - type: text
    content: et leurs frères, selon leurs générations, neuf cent cinquante-six. Tous ces hommes étaient chefs de famille dans les maisons de leurs pères.
  - type: heading
    content: 'V. 10-13: cf. Né 11:10-14. 1 Ch 6:3-15.'
