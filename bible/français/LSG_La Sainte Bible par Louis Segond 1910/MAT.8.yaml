document_id: MAT.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison d’un lépreux
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-4: cf. (Mc 1:40-45. Lu 5:12-16.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque Jésus fut descendu de la montagne, une grande foule le suivit. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:40
      metadata:
        usfm: MRK.1.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:12
      metadata:
        usfm: LUK.5.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et voici, un lépreux s’étant approché se prosterna devant lui, et dit: Seigneur, si tu le veux, tu peux me rendre pur. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus étendit la main, le toucha, et dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je le veux, sois pur.
  - type: text
    text: ' Aussitôt il fut purifié de sa lèpre. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Puis Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Garde-toi d’en parler à personne;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:14
      metadata:
        usfm: LUK.5.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais va te montrer au sacrificateur, et présente l’offrande que
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 13:2
      metadata:
        usfm: LEV.13.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:2
      metadata:
        usfm: LEV.14.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Moïse a prescrite, afin que cela leur serve de témoignage.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison du serviteur d’un centenier
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 5-13: cf. Lu 7:1-10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 7:1
      metadata:
        usfm: LUK.7.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme Jésus entrait dans Capernaüm, un centenier l’aborda, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'le priant et disant: Seigneur, mon serviteur est couché à la maison, atteint de paralysie et souffrant beaucoup. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: J’irai, et je le guérirai.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le centenier répondit: Seigneur, je ne suis pas digne que tu entres sous mon toit; mais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 107:20
      metadata:
        usfm: PSA.107.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dis seulement un mot, et mon serviteur sera guéri. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Car, moi qui suis soumis à des supérieurs, j’ai des soldats sous mes ordres; et je dis à l’un: Va! Et il va; à l’autre: Viens! Et il vient; et à mon serviteur: Fais cela! Et il le fait. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Après l’avoir entendu, Jésus fut dans l’étonnement, et il dit à ceux qui le suivaient: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous le dis en vérité, même en Israël je n’ai pas trouvé une aussi grande foi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 13:29
      metadata:
        usfm: LUK.13.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Or, je vous déclare que plusieurs viendront de l’orient et de l’occident, et seront à table avec Abraham, Isaac et Jacob, dans le royaume des cieux.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:43
      metadata:
        usfm: MAT.21.43
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais les fils du royaume seront jetés dans les ténèbres du dehors,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:42
      metadata:
        usfm: MAT.13.42
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:13
      metadata:
        usfm: MAT.22.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:51
      metadata:
        usfm: MAT.24.51
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 13:28
      metadata:
        usfm: LUK.13.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: où il y aura des pleurs et des grincements de dents.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Puis Jésus dit au centenier: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Va, qu’il te soit fait selon ta foi.
  - type: text
    text: ' Et à l’heure même le serviteur fut guéri.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison de la belle-mère de Pierre et de plusieurs malades
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-17: cf. (Mc 1:29-34. Lu 4:38-41.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:29
      metadata:
        usfm: MRK.1.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:38
      metadata:
        usfm: LUK.4.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus se rendit ensuite à la maison de Pierre, dont il vit la belle-mère couchée et ayant la fièvre. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il toucha sa main, et la fièvre la quitta; puis elle se leva, et le servit. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le soir, on amena auprès de Jésus plusieurs démoniaques. Il chassa les esprits par sa parole, et il guérit tous les malades, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'afin que s’accomplît ce qui avait été annoncé par Ésaïe, le prophète: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 53:4
      metadata:
        usfm: ISA.53.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:24
      metadata:
        usfm: 1PE.2.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il a pris nos infirmités, et il s’est chargé de nos maladies.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Comment suivre Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-22: cf. Lu 9:57-62.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jésus, voyant une grande foule autour de lui, donna l’ordre de passer à l’autre bord. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:57
      metadata:
        usfm: LUK.9.57
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Un scribe s’approcha, et lui dit: Maître, je te suivrai partout où tu iras. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jésus lui répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Les renards ont des tanières, et les oiseaux du ciel ont des nids; mais le Fils de l’homme n’a pas où reposer sa tête.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Un autre, d’entre les disciples, lui dit: Seigneur, permets-moi d’aller d’abord ensevelir mon père. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais Jésus lui répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Suis-moi, et
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 5:6
      metadata:
        usfm: 1TI.5.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: laisse les morts ensevelir leurs morts.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tempête apaisée
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 23-27: cf. (Mc 4:35-41. Lu 8:22-25.) Ps 107:23-31.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:35
      metadata:
        usfm: MRK.4.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:22
      metadata:
        usfm: LUK.8.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il monta dans la barque, et ses disciples le suivirent. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Et voici, il s’éleva sur la mer une si grande tempête que la barque était couverte par les flots. Et lui, il dormait. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Les disciples s’étant approchés le réveillèrent, et dirent: Seigneur, sauve-nous, nous périssons! '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi avez-vous peur, gens de peu de foi?
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 26:12
      metadata:
        usfm: JOB.26.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 107:29
      metadata:
        usfm: PSA.107.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 51:10
      metadata:
        usfm: ISA.51.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors il se leva, menaça les vents et la mer, et il y eut un grand calme. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ces hommes furent saisis d’étonnement: Quel est celui-ci, disaient-ils, à qui obéissent même les vents et la mer?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus sur le territoire des Gadaréniens; deux démoniaques guéris
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 28-34: cf. (Mc 5:1-20. Lu 8:26-39.) 1 Jn 3:8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 5:1
      metadata:
        usfm: MRK.5.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:26
      metadata:
        usfm: LUK.8.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu’il fut à l’autre bord, dans le pays des Gadaréniens, deux démoniaques, sortant des sépulcres, vinrent au-devant de lui. Ils étaient si furieux que personne n’osait passer par là. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Et voici, ils s’écrièrent: Qu’y a-t-il entre nous et toi, Fils de Dieu? Es-tu venu ici pour nous tourmenter avant le temps? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il y avait loin d’eux un grand troupeau de pourceaux qui paissaient. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Les démons priaient Jésus, disant: Si tu nous chasses, envoie-nous dans ce troupeau de pourceaux. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Allez!
  - type: text
    text: ' Ils sortirent, et entrèrent dans les pourceaux. Et voici, tout le troupeau se précipita des pentes escarpées dans la mer, et ils périrent dans les eaux. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ceux qui les faisaient paître s’enfuirent, et allèrent dans la ville raconter tout ce qui s’était passé et ce qui était arrivé aux démoniaques. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Alors toute la ville sortit à la rencontre de Jésus; et, dès qu’ils le virent, ils le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 16:39
      metadata:
        usfm: ACT.16.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: supplièrent de quitter leur territoire.
