document_id: MAT.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Guérison d’un lépreux
  - type: heading
    content: 'V. 1-4: cf. (Mc 1:40-45. Lu 5:12-16.)'
  - type: text
    content: 'Lorsque Jésus fut descendu de la montagne, une grande foule le suivit. '
  '10':
  - type: text
    content: 'Après l’avoir entendu, Jésus fut dans l’étonnement, et il dit à ceux qui le suivaient: '
  - type: text
    content: Je vous le dis en vérité, même en Israël je n’ai pas trouvé une aussi grande foi.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Lu 13:29.
  - type: text
    content: Or, je vous déclare que plusieurs viendront de l’orient et de l’occident, et seront à table avec Abraham, Isaac et Jacob, dans le royaume des cieux.
  - type: text
    content: ' '
  '12':
  - type: note
    content: Mt 21:43.
  - type: text
    content: Mais les fils du royaume seront jetés dans les ténèbres du dehors,
  - type: text
    content: ' '
  - type: note
    content: Mt 13:42; 22:13; 24:51. Lu 13:28.
  - type: text
    content: où il y aura des pleurs et des grincements de dents.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Puis Jésus dit au centenier: '
  - type: text
    content: Va, qu’il te soit fait selon ta foi.
  - type: text
    content: ' Et à l’heure même le serviteur fut guéri.'
  - type: heading
    content: Guérison de la belle-mère de Pierre et de plusieurs malades
  - type: heading
    content: 'V. 14-17: cf. (Mc 1:29-34. Lu 4:38-41.)'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Mc 1:29. Lu 4:38.
  - type: text
    content: 'Jésus se rendit ensuite à la maison de Pierre, dont il vit la belle-mère couchée et ayant la fièvre. '
  '15':
  - type: text
    content: 'Il toucha sa main, et la fièvre la quitta; puis elle se leva, et le servit. '
  '16':
  - type: text
    content: 'Le soir, on amena auprès de Jésus plusieurs démoniaques. Il chassa les esprits par sa parole, et il guérit tous les malades, '
  '17':
  - type: text
    content: 'afin que s’accomplît ce qui avait été annoncé par Ésaïe, le prophète: '
  - type: note
    content: És 53:4. 1 Pi 2:24.
  - type: text
    content: Il a pris nos infirmités, et il s’est chargé de nos maladies.
  - type: heading
    content: Comment suivre Jésus
  - type: heading
    content: 'V. 18-22: cf. Lu 9:57-62.'
  '18':
  - type: text
    content: 'Jésus, voyant une grande foule autour de lui, donna l’ordre de passer à l’autre bord. '
  '19':
  - type: note
    content: Lu 9:57.
  - type: text
    content: 'Un scribe s’approcha, et lui dit: Maître, je te suivrai partout où tu iras. '
  '2':
  - type: note
    content: Mc 1:40. Lu 5:12.
  - type: text
    content: 'Et voici, un lépreux s’étant approché se prosterna devant lui, et dit: Seigneur, si tu le veux, tu peux me rendre pur. '
  '20':
  - type: text
    content: 'Jésus lui répondit: '
  - type: text
    content: Les renards ont des tanières, et les oiseaux du ciel ont des nids; mais le Fils de l’homme n’a pas où reposer sa tête.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Un autre, d’entre les disciples, lui dit: Seigneur, permets-moi d’aller d’abord ensevelir mon père. '
  '22':
  - type: text
    content: 'Mais Jésus lui répondit: '
  - type: text
    content: Suis-moi, et
  - type: text
    content: ' '
  - type: note
    content: 1 Ti 5:6.
  - type: text
    content: laisse les morts ensevelir leurs morts.
  - type: heading
    content: Tempête apaisée
  - type: heading
    content: 'V. 23-27: cf. (Mc 4:35-41. Lu 8:22-25.) Ps 107:23-31.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: Mc 4:35. Lu 8:22.
  - type: text
    content: 'Il monta dans la barque, et ses disciples le suivirent. '
  '24':
  - type: text
    content: 'Et voici, il s’éleva sur la mer une si grande tempête que la barque était couverte par les flots. Et lui, il dormait. '
  '25':
  - type: text
    content: 'Les disciples s’étant approchés le réveillèrent, et dirent: Seigneur, sauve-nous, nous périssons! '
  '26':
  - type: text
    content: 'Il leur dit: '
  - type: text
    content: Pourquoi avez-vous peur, gens de peu de foi?
  - type: text
    content: ' '
  - type: note
    content: Job 26:12. Ps 107:29. És 51:10.
  - type: text
    content: 'Alors il se leva, menaça les vents et la mer, et il y eut un grand calme. '
  '27':
  - type: text
    content: 'Ces hommes furent saisis d’étonnement: Quel est celui-ci, disaient-ils, à qui obéissent même les vents et la mer?'
  - type: heading
    content: Jésus sur le territoire des Gadaréniens; deux démoniaques guéris
  - type: heading
    content: 'V. 28-34: cf. (Mc 5:1-20. Lu 8:26-39.) 1 Jn 3:8.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: Mc 5:1. Lu 8:26.
  - type: text
    content: 'Lorsqu’il fut à l’autre bord, dans le pays des Gadaréniens, deux démoniaques, sortant des sépulcres, vinrent au-devant de lui. Ils étaient si furieux que personne n’osait passer par là. '
  '29':
  - type: text
    content: 'Et voici, ils s’écrièrent: Qu’y a-t-il entre nous et toi, Fils de Dieu? Es-tu venu ici pour nous tourmenter avant le temps? '
  '3':
  - type: text
    content: 'Jésus étendit la main, le toucha, et dit: '
  - type: text
    content: Je le veux, sois pur.
  - type: text
    content: ' Aussitôt il fut purifié de sa lèpre. '
  '30':
  - type: text
    content: 'Il y avait loin d’eux un grand troupeau de pourceaux qui paissaient. '
  '31':
  - type: text
    content: 'Les démons priaient Jésus, disant: Si tu nous chasses, envoie-nous dans ce troupeau de pourceaux. '
  '32':
  - type: text
    content: 'Il leur dit: '
  - type: text
    content: Allez!
  - type: text
    content: ' Ils sortirent, et entrèrent dans les pourceaux. Et voici, tout le troupeau se précipita des pentes escarpées dans la mer, et ils périrent dans les eaux. '
  '33':
  - type: text
    content: 'Ceux qui les faisaient paître s’enfuirent, et allèrent dans la ville raconter tout ce qui s’était passé et ce qui était arrivé aux démoniaques. '
  '34':
  - type: text
    content: 'Alors toute la ville sortit à la rencontre de Jésus; et, dès qu’ils le virent, ils le '
  - type: note
    content: Ac 16:39.
  - type: text
    content: supplièrent de quitter leur territoire.
  '4':
  - type: text
    content: 'Puis Jésus lui dit: '
  - type: text
    content: Garde-toi d’en parler à personne;
  - type: text
    content: ' '
  - type: note
    content: Lu 5:14.
  - type: text
    content: mais va te montrer au sacrificateur, et présente l’offrande que
  - type: text
    content: ' '
  - type: note
    content: Lé 13:2; 14:2.
  - type: text
    content: Moïse a prescrite, afin que cela leur serve de témoignage.
  - type: heading
    content: Guérison du serviteur d’un centenier
  - type: heading
    content: 'V. 5-13: cf. Lu 7:1-10.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: Lu 7:1.
  - type: text
    content: 'Comme Jésus entrait dans Capernaüm, un centenier l’aborda, '
  '6':
  - type: text
    content: 'le priant et disant: Seigneur, mon serviteur est couché à la maison, atteint de paralysie et souffrant beaucoup. '
  '7':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: J’irai, et je le guérirai.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Le centenier répondit: Seigneur, je ne suis pas digne que tu entres sous mon toit; mais '
  - type: note
    content: Ps 107:20.
  - type: text
    content: 'dis seulement un mot, et mon serviteur sera guéri. '
  '9':
  - type: text
    content: 'Car, moi qui suis soumis à des supérieurs, j’ai des soldats sous mes ordres; et je dis à l’un: Va! Et il va; à l’autre: Viens! Et il vient; et à mon serviteur: Fais cela! Et il le fait. '
