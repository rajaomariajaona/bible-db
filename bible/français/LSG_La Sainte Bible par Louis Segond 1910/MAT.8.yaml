document_id: MAT.8,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guérison d’un lépreux
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-4: cf. (Mc 1:40-45. Lu 5:12-16.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Jésus fut descendu de la montagne, une grande foule le suivit. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après l’avoir entendu, Jésus fut dans l’étonnement, et il dit à ceux qui le suivaient: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous le dis en vérité, même en Israël je n’ai pas trouvé une aussi grande foi.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 13:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Or, je vous déclare que plusieurs viendront de l’orient et de l’occident, et seront à table avec Abraham, Isaac et Jacob, dans le royaume des cieux.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 21:43
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais les fils du royaume seront jetés dans les ténèbres du dehors,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 13:42
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:51
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 13:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: où il y aura des pleurs et des grincements de dents.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis Jésus dit au centenier: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Va, qu’il te soit fait selon ta foi.
    - type: text
      text: ' Et à l’heure même le serviteur fut guéri.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guérison de la belle-mère de Pierre et de plusieurs malades
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-17: cf. (Mc 1:29-34. Lu 4:38-41.)'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 4:38
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus se rendit ensuite à la maison de Pierre, dont il vit la belle-mère couchée et ayant la fièvre. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il toucha sa main, et la fièvre la quitta; puis elle se leva, et le servit. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le soir, on amena auprès de Jésus plusieurs démoniaques. Il chassa les esprits par sa parole, et il guérit tous les malades, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afin que s’accomplît ce qui avait été annoncé par Ésaïe, le prophète: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 53:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il a pris nos infirmités, et il s’est chargé de nos maladies.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Comment suivre Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 18-22: cf. Lu 9:57-62.'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, voyant une grande foule autour de lui, donna l’ordre de passer à l’autre bord. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:57
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Un scribe s’approcha, et lui dit: Maître, je te suivrai partout où tu iras. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:40
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 5:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et voici, un lépreux s’étant approché se prosterna devant lui, et dit: Seigneur, si tu le veux, tu peux me rendre pur. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Les renards ont des tanières, et les oiseaux du ciel ont des nids; mais le Fils de l’homme n’a pas où reposer sa tête.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un autre, d’entre les disciples, lui dit: Seigneur, permets-moi d’aller d’abord ensevelir mon père. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus lui répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Suis-moi, et
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 5:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: laisse les morts ensevelir leurs morts.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tempête apaisée
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 23-27: cf. (Mc 4:35-41. Lu 8:22-25.) Ps 107:23-31.'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 4:35
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 8:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il monta dans la barque, et ses disciples le suivirent. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici, il s’éleva sur la mer une si grande tempête que la barque était couverte par les flots. Et lui, il dormait. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les disciples s’étant approchés le réveillèrent, et dirent: Seigneur, sauve-nous, nous périssons! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pourquoi avez-vous peur, gens de peu de foi?
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 26:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 107:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 51:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors il se leva, menaça les vents et la mer, et il y eut un grand calme. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces hommes furent saisis d’étonnement: Quel est celui-ci, disaient-ils, à qui obéissent même les vents et la mer?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus sur le territoire des Gadaréniens; deux démoniaques guéris
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 28-34: cf. (Mc 5:1-20. Lu 8:26-39.) 1 Jn 3:8.'
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 5:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 8:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsqu’il fut à l’autre bord, dans le pays des Gadaréniens, deux démoniaques, sortant des sépulcres, vinrent au-devant de lui. Ils étaient si furieux que personne n’osait passer par là. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici, ils s’écrièrent: Qu’y a-t-il entre nous et toi, Fils de Dieu? Es-tu venu ici pour nous tourmenter avant le temps? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus étendit la main, le toucha, et dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je le veux, sois pur.
    - type: text
      text: ' Aussitôt il fut purifié de sa lèpre. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait loin d’eux un grand troupeau de pourceaux qui paissaient. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les démons priaient Jésus, disant: Si tu nous chasses, envoie-nous dans ce troupeau de pourceaux. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Allez!
    - type: text
      text: ' Ils sortirent, et entrèrent dans les pourceaux. Et voici, tout le troupeau se précipita des pentes escarpées dans la mer, et ils périrent dans les eaux. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui les faisaient paître s’enfuirent, et allèrent dans la ville raconter tout ce qui s’était passé et ce qui était arrivé aux démoniaques. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors toute la ville sortit à la rencontre de Jésus; et, dès qu’ils le virent, ils le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 16:39
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: supplièrent de quitter leur territoire.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis Jésus lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Garde-toi d’en parler à personne;
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 5:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: mais va te montrer au sacrificateur, et présente l’offrande que
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 13:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Moïse a prescrite, afin que cela leur serve de témoignage.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guérison du serviteur d’un centenier
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-13: cf. Lu 7:1-10.'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 7:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Comme Jésus entrait dans Capernaüm, un centenier l’aborda, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le priant et disant: Seigneur, mon serviteur est couché à la maison, atteint de paralysie et souffrant beaucoup. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: J’irai, et je le guérirai.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le centenier répondit: Seigneur, je ne suis pas digne que tu entres sous mon toit; mais '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 107:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'dis seulement un mot, et mon serviteur sera guéri. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car, moi qui suis soumis à des supérieurs, j’ai des soldats sous mes ordres; et je dis à l’un: Va! Et il va; à l’autre: Viens! Et il vient; et à mon serviteur: Fais cela! Et il le fait. '
