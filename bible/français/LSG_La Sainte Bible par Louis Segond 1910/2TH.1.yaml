document_id: 2TH.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: heading
    content: 'V. 1-2: cf. 1 Th 1:1.'
  - type: text
    content: 'Paul, et Silvain, et Timothée, à l’Église des Thessaloniciens, qui est en Dieu notre Père et en Jésus-Christ le Seigneur: '
  '10':
  - type: note
    content: Ac 1:11. 1 Th 1:10. Ap 1:7.
  - type: text
    content: lorsqu’il viendra pour être, en ce jour-là, glorifié dans ses saints et admiré dans tous ceux qui auront cru, car notre témoignage auprès de vous a été cru.
  - type: heading
    content: 'V. 11-12: cf. Col 1:9-12. Hé 13:20, 21.'
  '11':
  - type: text
    content: 'C’est pourquoi aussi nous prions continuellement pour vous, afin que notre Dieu vous juge dignes de la vocation, et qu’il accomplisse par sa puissance tous les desseins bienveillants de sa bonté, et l’œuvre de votre foi, '
  '12':
  - type: text
    content: pour que le nom de notre Seigneur Jésus soit glorifié en vous, et que vous soyez glorifiés en lui, selon la grâce de notre Dieu et du Seigneur Jésus-Christ.
  '2':
  - type: note
    content: 1 Co 1:3. 1 Th 1:1. 1 Pi 1:2.
  - type: text
    content: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
  - type: heading
    content: Progrès des Thessaloniciens dans la foi et dans la charité, malgré les persécutions
  - type: heading
    content: 'V. 3-10: cf. (1 Th 1:2-7. Ph 1:3-6, 27-30.) (Mt 5:10-12. Ro 8:17, 18. 1 Pi 4:12, 13.) (Mt 13:40-43; 25:31-46.)'
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ép 1:15. Ph 1:3. Col 1:3. 1 Th 1:2.
  - type: text
    content: 'Nous devons à votre sujet, frères, rendre continuellement grâces à Dieu, comme cela est juste, parce que votre foi fait de grands progrès, et que la charité de chacun de vous tous à l’égard des autres augmente de plus en plus. '
  '4':
  - type: text
    content: 'Aussi nous glorifions-nous '
  - type: note
    content: 1 Th 2:19.
  - type: text
    content: 'de vous dans les Églises de Dieu, à cause de votre persévérance et de votre foi au milieu de toutes vos persécutions et des tribulations que vous avez à supporter. '
  '5':
  - type: note
    content: Jud v. 6.
  - type: text
    content: 'C’est une preuve du juste jugement de Dieu, pour que vous soyez jugés dignes du royaume de Dieu, '
  - type: note
    content: 1 Th 2:14.
  - type: text
    content: 'pour lequel vous souffrez. '
  '6':
  - type: note
    content: Za 2:8.
  - type: text
    content: 'Car il est de la justice de Dieu de rendre l’affliction à ceux qui vous affligent, '
  '7':
  - type: text
    content: 'et de vous donner, à vous qui êtes affligés, du repos avec nous, '
  - type: note
    content: 1 Th 4:16.
  - type: text
    content: 'lorsque le Seigneur Jésus apparaîtra du ciel avec les anges de sa puissance, '
  '8':
  - type: note
    content: 2 Pi 3:7.
  - type: text
    content: 'au milieu d’une flamme de feu, pour punir '
  - type: note
    content: Ro 2:8.
  - type: text
    content: 'ceux qui ne connaissent pas Dieu et ceux qui n’obéissent pas à l’Évangile de notre Seigneur Jésus. '
  '9':
  - type: note
    content: És 2:19.
  - type: text
    content: 'Ils auront pour châtiment une ruine éternelle, loin de la face du Seigneur et de la gloire de sa force, '
