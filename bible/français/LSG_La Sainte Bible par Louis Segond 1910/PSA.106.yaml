        text: 136:1
      metadata:
        usfm: PSA.136.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Louez l’Éternel, car il est bon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car sa miséricorde dure à toujours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Qui dira les hauts faits de l’Éternel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui publiera toute sa louange?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Heureux ceux qui observent la loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui pratiquent la justice en tout temps!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Éternel, souviens-toi de moi dans ta bienveillance pour ton peuple!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Souviens-toi de moi en lui accordant ton secours,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Afin que je voie le bonheur de tes élus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je me réjouisse de la joie de ton peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que je me glorifie avec ton héritage!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 26:40
      metadata:
        usfm: LEV.26.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 3:25
      metadata:
        usfm: JER.3.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 9:5
      metadata:
        usfm: DAN.9.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Nous avons péché comme nos pères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous avons commis l’iniquité, nous avons fait le mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nos pères en Égypte ne furent pas attentifs à tes miracles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne se rappelèrent pas la multitude de tes grâces,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 14:11
      metadata:
        usfm: EXO.14.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: EXO.14.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils furent rebelles près de la mer, près de la mer Rouge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais il les sauva à cause de son nom,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 9:16
      metadata:
        usfm: EXO.9.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pour manifester sa puissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il menaça la mer Rouge, et elle se dessécha;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 14:21
      metadata:
        usfm: EXO.14.21
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: EXO.14.22
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '29'
      metadata:
        usfm: EXO.14.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et il les fit marcher à travers les abîmes comme dans un désert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il les sauva de la main de celui qui les haïssait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les délivra de la main de l’ennemi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 14:27
      metadata:
        usfm: EXO.14.27
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:5
      metadata:
        usfm: EXO.15.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les eaux couvrirent leurs adversaires:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’en resta pas un seul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 14:31
      metadata:
        usfm: EXO.14.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:1
      metadata:
        usfm: EXO.15.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et ils crurent à ses paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils chantèrent ses louanges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mais ils oublièrent bientôt ses œuvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’attendirent pas l’exécution de ses desseins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 16:3
      metadata:
        usfm: EXO.16.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 11:4
      metadata:
        usfm: NUM.11.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: NUM.11.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '33'
      metadata:
        usfm: NUM.11.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:18
      metadata:
        usfm: PSA.78.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:6
      metadata:
        usfm: 1CO.10.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils furent saisis de convoitise dans le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils tentèrent Dieu dans la solitude.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il leur accorda ce qu’ils demandaient;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 11:20
      metadata:
        usfm: NUM.11.20
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '33'
      metadata:
        usfm: NUM.11.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:30
      metadata:
        usfm: PSA.78.30
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '31'
      metadata:
        usfm: PSA.78.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 10:16
      metadata:
        usfm: ISA.10.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Puis il envoya le dépérissement dans leur corps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: No 16:2, etc.
    marker-yv: yv-n
  - type: text
    text: Ils se montrèrent, dans le camp, jaloux contre Moïse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre Aaron, le saint de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 16:31
      metadata:
        usfm: NUM.16.31
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '32'
      metadata:
        usfm: NUM.16.32
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '33'
      metadata:
        usfm: NUM.16.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 11:6
      metadata:
        usfm: DEU.11.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La terre s’ouvrit et engloutit Dathan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et elle se referma sur la troupe d’Abiram;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 16:35
      metadata:
        usfm: NUM.16.35
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '46'
      metadata:
        usfm: NUM.16.46
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le feu embrasa leur troupe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La flamme consuma les méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 32:4
      metadata:
        usfm: EXO.32.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils firent un veau en Horeb,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se prosternèrent devant une image de fonte,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ils échangèrent leur gloire
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre la figure d’un bœuf qui mange l’herbe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils oublièrent Dieu, leur sauveur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui avait fait de grandes choses en Égypte,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Des miracles dans le pays de Cham,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des prodiges sur la mer Rouge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 32:11
      metadata:
        usfm: EXO.32.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '32'
      metadata:
        usfm: EXO.32.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 9:13
      metadata:
        usfm: DEU.9.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: DEU.9.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:10
      metadata:
        usfm: DEU.10.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et il parla de les exterminer;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais Moïse, son élu, se tint à la brèche devant lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour détourner sa fureur et l’empêcher de les détruire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 14:1
      metadata:
        usfm: NUM.14.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: NUM.14.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils méprisèrent le pays des délices;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne crurent pas à la parole de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ils murmurèrent dans leurs tentes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’obéirent point à sa voix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 14:28
      metadata:
        usfm: NUM.14.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et il leva la main pour jurer
- type: usfm
  marker: q1
  children:
  - type: text
    text: De les faire tomber dans le désert,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: De faire tomber leur postérité parmi les nations,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 44:12
      metadata:
        usfm: PSA.44.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 20:23
      metadata:
        usfm: EZK.20.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et de les disperser au milieu des pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils s’attachèrent à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 25:3
      metadata:
        usfm: NUM.25.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 31:16
      metadata:
        usfm: NUM.31.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
