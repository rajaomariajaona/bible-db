document_id: PSA.106,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Ps 105; 78.) Né 9:26-35. Ro 11:23, 25-29.
  - type: text
    content: Louez l’Éternel!
  - type: note
    content: Ps 107:1; 118:1; 136:1.
  - type: text
    content: Louez l’Éternel, car il est bon,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '10':
  - type: text
    content: Il les sauva de la main de celui qui les haïssait,
  - type: text
    content: Il les délivra de la main de l’ennemi.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ex 14:27; 15:5.
  - type: text
    content: 'Les eaux couvrirent leurs adversaires:'
  - type: text
    content: Il n’en resta pas un seul.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ex 14:31; 15:1.
  - type: text
    content: Et ils crurent à ses paroles,
  - type: text
    content: Ils chantèrent ses louanges.
  '13':
  - type: text
    content: Mais ils oublièrent bientôt ses œuvres,
  - type: text
    content: Ils n’attendirent pas l’exécution de ses desseins.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ex 16:3. No 11:4, 6, 33. Ps 78:18. 1 Co 10:6.
  - type: text
    content: Ils furent saisis de convoitise dans le désert,
  - type: text
    content: Et ils tentèrent Dieu dans la solitude.
  '15':
  - type: text
    content: Il leur accorda ce qu’ils demandaient;
  - type: note
    content: No 11:20, 33. Ps 78:30, 31. És 10:16.
  - type: text
    content: Puis il envoya le dépérissement dans leur corps.
  '16':
  - type: text
    content: ' '
  - type: note
    content: No 16:2, etc.
  - type: text
    content: Ils se montrèrent, dans le camp, jaloux contre Moïse,
  - type: text
    content: Contre Aaron, le saint de l’Éternel.
  '17':
  - type: text
    content: ' '
  - type: note
    content: No 16:31, 32, 33. De 11:6.
  - type: text
    content: La terre s’ouvrit et engloutit Dathan,
  - type: text
    content: Et elle se referma sur la troupe d’Abiram;
  '18':
  - type: text
    content: ' '
  - type: note
    content: No 16:35, 46.
  - type: text
    content: Le feu embrasa leur troupe,
  - type: text
    content: La flamme consuma les méchants.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Ex 32:4.
  - type: text
    content: Ils firent un veau en Horeb,
  - type: text
    content: Ils se prosternèrent devant une image de fonte,
  '2':
  - type: text
    content: Qui dira les hauts faits de l’Éternel?
  - type: text
    content: Qui publiera toute sa louange?
  '20':
  - type: text
    content: Ils échangèrent leur gloire
  - type: text
    content: Contre la figure d’un bœuf qui mange l’herbe.
  '21':
  - type: text
    content: Ils oublièrent Dieu, leur sauveur,
  - type: text
    content: Qui avait fait de grandes choses en Égypte,
  '22':
  - type: text
    content: Des miracles dans le pays de Cham,
  - type: text
    content: Des prodiges sur la mer Rouge.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Ex 32:11, 32. De 9:13, 14; 10:10.
  - type: text
    content: Et il parla de les exterminer;
  - type: text
    content: Mais Moïse, son élu, se tint à la brèche devant lui,
  - type: text
    content: Pour détourner sa fureur et l’empêcher de les détruire.
  '24':
  - type: text
    content: ' '
  - type: note
    content: No 14:1, 2.
  - type: text
    content: Ils méprisèrent le pays des délices;
  - type: text
    content: Ils ne crurent pas à la parole de l’Éternel,
  '25':
  - type: text
    content: Ils murmurèrent dans leurs tentes,
  - type: text
    content: Ils n’obéirent point à sa voix.
  '26':
  - type: text
    content: ' '
  - type: note
    content: No 14:28.
  - type: text
    content: Et il leva la main pour jurer
  - type: text
    content: De les faire tomber dans le désert,
  '27':
  - type: text
    content: De faire tomber leur postérité parmi les nations,
  - type: note
    content: Ps 44:12. Éz 20:23.
  - type: text
    content: Et de les disperser au milieu des pays.
  '28':
  - type: text
    content: 'Ils s’attachèrent à '
  - type: note
    content: No 25:3; 31:16. Ap 2:14.
  - type: text
    content: Baal-Peor,
  - type: text
    content: Et mangèrent des victimes sacrifiées aux morts.
  '29':
  - type: text
    content: Ils irritèrent l’Éternel par leurs actions,
  - type: text
    content: Et une plaie fit irruption parmi eux.
  '3':
  - type: text
    content: Heureux ceux qui observent la loi,
  - type: text
    content: Qui pratiquent la justice en tout temps!
  '30':
  - type: text
    content: Phinées se leva pour intervenir,
  - type: text
    content: Et la plaie s’arrêta;
  '31':
  - type: text
    content: Cela lui fut imputé à justice,
  - type: text
    content: De génération en génération pour toujours.
  '32':
  - type: text
    content: ' '
  - type: note
    content: No 20:12. Ps 95:8.
  - type: text
    content: Ils irritèrent l’Éternel près des eaux de Meriba;
  - type: text
    content: Et Moïse fut puni à cause d’eux,
  '33':
  - type: text
    content: Car ils aigrirent son esprit,
  - type: text
    content: Et il s’exprima légèrement des lèvres.
  '34':
  - type: text
    content: Ils ne détruisirent point les peuples
  - type: text
    content: Que l’Éternel leur avait ordonné de détruire.
  '35':
  - type: text
    content: ' '
  - type: note
    content: Jg 2:2; 3:5, 6.
  - type: text
    content: Ils se mêlèrent avec les nations,
  - type: text
    content: Et ils apprirent leurs œuvres.
  '36':
  - type: text
    content: Ils servirent leurs idoles,
  - type: text
    content: Qui furent pour eux un piège;
  '37':
  - type: text
    content: ' '
  - type: note
    content: Lé 18:21. De 12:31. 2 R 16:3; 17:17; 21:6. 2 Ch 28:3; 33:6.
  - type: text
    content: Ils sacrifièrent leurs fils
  - type: text
    content: Et leurs filles aux idoles,
  '38':
  - type: text
    content: Ils répandirent le sang innocent,
  - type: text
    content: Le sang de leurs fils et de leurs filles,
  - type: text
    content: Qu’ils sacrifièrent aux idoles de Canaan,
  - type: note
    content: No 35:33.
  - type: text
    content: Et le pays fut profané par des meurtres.
  '39':
  - type: text
    content: Ils se souillèrent par leurs œuvres,
  - type: text
    content: Ils se prostituèrent par leurs actions.
  '4':
  - type: text
    content: Éternel, souviens-toi de moi dans ta bienveillance pour ton peuple!
  - type: text
    content: Souviens-toi de moi en lui accordant ton secours,
  '40':
  - type: text
    content: La colère de l’Éternel s’enflamma contre son peuple,
  - type: text
    content: Et il prit en horreur son héritage.
  '41':
  - type: text
    content: Il les livra entre les mains des nations;
  - type: text
    content: Ceux qui les haïssaient dominèrent sur eux;
  '42':
  - type: text
    content: Leurs ennemis les opprimèrent,
  - type: text
    content: Et ils furent humiliés sous leur puissance.
  '43':
  - type: text
    content: Plusieurs fois il les délivra;
  - type: text
    content: Mais ils se montrèrent rebelles dans leurs desseins,
  - type: text
    content: Et ils devinrent malheureux par leur iniquité.
  '44':
  - type: text
    content: Il vit leur détresse,
  - type: text
    content: Lorsqu’il entendit leurs supplications.
  '45':
  - type: text
    content: Il se souvint en leur faveur de son alliance;
  - type: text
    content: Il eut pitié selon sa grande bonté,
  '46':
  - type: text
    content: Et il excita pour eux la compassion
  - type: text
    content: De tous ceux qui les retenaient captifs.
  '47':
  - type: text
    content: Sauve-nous, Éternel, notre Dieu!
  - type: text
    content: 'Et rassemble-nous '
  - type: note
    content: 1 Ch 16:35.
  - type: text
    content: du milieu des nations,
  - type: text
    content: Afin que nous célébrions ton saint nom,
  - type: text
    content: Et que nous mettions notre gloire à te louer!
  '48':
  - type: text
    content: Béni soit l’Éternel, le Dieu d’Israël, d’éternité en éternité!
  - type: note
    content: 1 Ch 16:36.
  - type: text
    content: 'Et que tout le peuple dise:'
  - type: text
    content: Amen!
  - type: text
    content: Louez l’Éternel!
  '5':
  - type: text
    content: Afin que je voie le bonheur de tes élus,
  - type: text
    content: Que je me réjouisse de la joie de ton peuple,
  - type: text
    content: Et que je me glorifie avec ton héritage!
  '6':
  - type: text
    content: ' '
  - type: note
    content: Lé 26:40. Jé 3:25. Da 9:5.
  - type: text
    content: Nous avons péché comme nos pères,
  - type: text
    content: Nous avons commis l’iniquité, nous avons fait le mal.
  '7':
  - type: text
    content: Nos pères en Égypte ne furent pas attentifs à tes miracles,
  - type: text
    content: Ils ne se rappelèrent pas la multitude de tes grâces,
  - type: note
    content: Ex 14:11, 12.
  - type: text
    content: Ils furent rebelles près de la mer, près de la mer Rouge.
  '8':
  - type: text
    content: Mais il les sauva à cause de son nom,
  - type: note
    content: Ex 9:16.
  - type: text
    content: Pour manifester sa puissance.
  '9':
  - type: text
    content: Il menaça la mer Rouge, et elle se dessécha;
  - type: note
    content: Ex 14:21, 22, 29.
  - type: text
    content: Et il les fit marcher à travers les abîmes comme dans un désert.
