      - type: text
        text: Ap 2:14
      metadata:
        usfm: REV.2.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Baal-Peor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mangèrent des victimes sacrifiées aux morts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ils irritèrent l’Éternel par leurs actions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et une plaie fit irruption parmi eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Phinées se leva pour intervenir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la plaie s’arrêta;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Cela lui fut imputé à justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De génération en génération pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 20:12
      metadata:
        usfm: NUM.20.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 95:8
      metadata:
        usfm: PSA.95.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils irritèrent l’Éternel près des eaux de Meriba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et Moïse fut puni à cause d’eux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Car ils aigrirent son esprit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il s’exprima légèrement des lèvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ils ne détruisirent point les peuples
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l’Éternel leur avait ordonné de détruire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 2:2
      metadata:
        usfm: JDG.2.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:5
      metadata:
        usfm: JDG.3.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: JDG.3.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils se mêlèrent avec les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils apprirent leurs œuvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ils servirent leurs idoles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui furent pour eux un piège;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 18:21
      metadata:
        usfm: LEV.18.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 12:31
      metadata:
        usfm: DEU.12.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 16:3
      metadata:
        usfm: 2KI.16.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:17
      metadata:
        usfm: 2KI.17.17
    - type: text
      text: '; '
    - type: usfm
