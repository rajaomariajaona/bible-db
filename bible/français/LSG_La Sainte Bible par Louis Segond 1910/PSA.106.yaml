verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Ps 105; 78.) Né 9:26-35. Ro 11:23, 25-29.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 107:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 118:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 136:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Louez l’Éternel, car il est bon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car sa miséricorde dure à toujours!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les sauva de la main de celui qui les haïssait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les délivra de la main de l’ennemi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 14:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les eaux couvrirent leurs adversaires:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’en resta pas un seul.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 14:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et ils crurent à ses paroles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils chantèrent ses louanges.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ils oublièrent bientôt ses œuvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n’attendirent pas l’exécution de ses desseins.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 16:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 11:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 78:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils furent saisis de convoitise dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils tentèrent Dieu dans la solitude.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il leur accorda ce qu’ils demandaient;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 11:20
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 78:30
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 10:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Puis il envoya le dépérissement dans leur corps.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: No 16:2, etc.
      marker-yv: yv-n
    - type: text
      text: Ils se montrèrent, dans le camp, jaloux contre Moïse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre Aaron, le saint de l’Éternel.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 16:31
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '32'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 11:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La terre s’ouvrit et engloutit Dathan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et elle se referma sur la troupe d’Abiram;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 16:35
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '46'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le feu embrasa leur troupe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La flamme consuma les méchants.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils firent un veau en Horeb,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se prosternèrent devant une image de fonte,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui dira les hauts faits de l’Éternel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui publiera toute sa louange?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils échangèrent leur gloire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre la figure d’un bœuf qui mange l’herbe.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils oublièrent Dieu, leur sauveur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui avait fait de grandes choses en Égypte,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des miracles dans le pays de Cham,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des prodiges sur la mer Rouge.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '32'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 9:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et il parla de les exterminer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais Moïse, son élu, se tint à la brèche devant lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour détourner sa fureur et l’empêcher de les détruire.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 14:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils méprisèrent le pays des délices;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne crurent pas à la parole de l’Éternel,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils murmurèrent dans leurs tentes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n’obéirent point à sa voix.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 14:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et il leva la main pour jurer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De les faire tomber dans le désert,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De faire tomber leur postérité parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 44:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 20:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et de les disperser au milieu des pays.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils s’attachèrent à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 25:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 2:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Baal-Peor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mangèrent des victimes sacrifiées aux morts.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils irritèrent l’Éternel par leurs actions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et une plaie fit irruption parmi eux.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux ceux qui observent la loi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui pratiquent la justice en tout temps!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Phinées se leva pour intervenir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la plaie s’arrêta;
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cela lui fut imputé à justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De génération en génération pour toujours.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 20:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 95:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils irritèrent l’Éternel près des eaux de Meriba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Moïse fut puni à cause d’eux,
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils aigrirent son esprit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il s’exprima légèrement des lèvres.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne détruisirent point les peuples
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l’Éternel leur avait ordonné de détruire.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 2:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils se mêlèrent avec les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils apprirent leurs œuvres.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils servirent leurs idoles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui furent pour eux un piège;
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 12:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 16:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 28:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils sacrifièrent leurs fils
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leurs filles aux idoles,
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils répandirent le sang innocent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sang de leurs fils et de leurs filles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils sacrifièrent aux idoles de Canaan,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 35:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et le pays fut profané par des meurtres.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se souillèrent par leurs œuvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se prostituèrent par leurs actions.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, souviens-toi de moi dans ta bienveillance pour ton peuple!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Souviens-toi de moi en lui accordant ton secours,
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La colère de l’Éternel s’enflamma contre son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il prit en horreur son héritage.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les livra entre les mains des nations;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui les haïssaient dominèrent sur eux;
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs ennemis les opprimèrent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils furent humiliés sous leur puissance.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plusieurs fois il les délivra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ils se montrèrent rebelles dans leurs desseins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils devinrent malheureux par leur iniquité.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il vit leur détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsqu’il entendit leurs supplications.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se souvint en leur faveur de son alliance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il eut pitié selon sa grande bonté,
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il excita pour eux la compassion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De tous ceux qui les retenaient captifs.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sauve-nous, Éternel, notre Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et rassemble-nous '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 16:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: du milieu des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que nous célébrions ton saint nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que nous mettions notre gloire à te louer!
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni soit l’Éternel, le Dieu d’Israël, d’éternité en éternité!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 16:36
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et que tout le peuple dise:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amen!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Éternel!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que je voie le bonheur de tes élus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que je me réjouisse de la joie de ton peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que je me glorifie avec ton héritage!
  '6':
