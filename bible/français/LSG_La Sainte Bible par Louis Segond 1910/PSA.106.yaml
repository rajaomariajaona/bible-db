        text: 33:6
      metadata:
        usfm: 2CH.33.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils sacrifièrent leurs fils
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leurs filles aux idoles,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ils répandirent le sang innocent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le sang de leurs fils et de leurs filles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils sacrifièrent aux idoles de Canaan,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 35:33
      metadata:
        usfm: NUM.35.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et le pays fut profané par des meurtres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ils se souillèrent par leurs œuvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se prostituèrent par leurs actions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: La colère de l’Éternel s’enflamma contre son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il prit en horreur son héritage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Il les livra entre les mains des nations;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui les haïssaient dominèrent sur eux;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Leurs ennemis les opprimèrent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils furent humiliés sous leur puissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Plusieurs fois il les délivra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ils se montrèrent rebelles dans leurs desseins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils devinrent malheureux par leur iniquité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Il vit leur détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lorsqu’il entendit leurs supplications.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Il se souvint en leur faveur de son alliance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il eut pitié selon sa grande bonté,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Et il excita pour eux la compassion
- type: usfm
  marker: q1
  children:
  - type: text
    text: De tous ceux qui les retenaient captifs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Sauve-nous, Éternel, notre Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et rassemble-nous '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 16:35
      metadata:
        usfm: 1CH.16.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: du milieu des nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que nous célébrions ton saint nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que nous mettions notre gloire à te louer!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Béni soit l’Éternel, le Dieu d’Israël, d’éternité en éternité!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 16:36
      metadata:
        usfm: 1CH.16.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et que tout le peuple dise:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amen!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez l’Éternel!
