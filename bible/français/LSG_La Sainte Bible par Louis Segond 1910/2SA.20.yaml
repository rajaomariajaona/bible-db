document_id: 2SA.20,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Révolte de Schéba, Benjamite. — Rentrée de David dans Jérusalem. — Amasa, ancien chef de l’armée d’Absalom, tué par Joab
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-13: cf. (2 S 19:41-43. Pr 17:14.) (2 S 19:13; 3:23-30.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Il se trouvait là un méchant homme, nommé Schéba, fils de Bicri, Benjamite. Il sonna de la trompette, et dit: Point de part pour nous avec David, point d’héritage pour nous avec le fils d’Isaï! Chacun à sa tente, Israël! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Amasa ne prit point garde à l’épée qui était dans la main de Joab; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 2:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et Joab l’en frappa au ventre et répandit ses entrailles à terre, sans lui porter un second coup. Et Amasa mourut. Joab et son frère Abischaï marchèrent à la poursuite de Schéba, fils de Bicri. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Un homme d’entre les gens de Joab resta près d’Amasa, et il disait: Qui veut de Joab et qui est pour David? Qu’il suive Joab! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Amasa se roulait dans le sang au milieu de la route; et cet homme, ayant vu que tout le peuple s’arrêtait, poussa Amasa hors de la route dans un champ, et jeta sur lui un vêtement, lorsqu’il vit que tous ceux qui arrivaient près de lui s’arrêtaient. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Quand il fut ôté de la route, chacun suivit Joab, afin de poursuivre Schéba, fils de Bicri.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mort de Schéba
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-22: cf. Ec 9:13-18. Ps 140.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Joab traversa toutes les tribus d’Israël dans la direction d’Abel-Beth-Maaca, et tous les hommes d’élite se rassemblèrent et le suivirent. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ils vinrent assiéger Schéba dans Abel-Beth-Maaca, et ils élevèrent contre la ville une terrasse qui atteignait le rempart. Tout le peuple qui était avec Joab sapait la muraille pour la faire tomber. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Alors une femme habile se mit à crier de la ville: Écoutez, écoutez! Dites, je vous prie, à Joab: Approche jusqu’ici, je veux te parler! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il s’approcha d’elle, et la femme dit: Es-tu Joab? Il répondit: Je le suis. Et elle lui dit: Écoute les paroles de ta servante. Il répondit: J’écoute. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Et elle dit: Autrefois on avait coutume de dire: Que l’on consulte Abel! Et tout se terminait ainsi. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Je suis une des villes paisibles et fidèles en Israël; et tu cherches à faire périr une ville qui est une mère en Israël! Pourquoi détruirais-tu l’héritage de l’Éternel? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Et tous les hommes d’Israël s’éloignèrent de David, et suivirent Schéba, fils de Bicri. Mais les hommes de Juda restèrent fidèles à leur roi, et l’accompagnèrent depuis le Jourdain jusqu’à Jérusalem. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Joab répondit: Loin, loin de moi la pensée de détruire et de ruiner! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'La chose n’est pas ainsi. Mais un homme de la montagne d’Éphraïm, nommé Schéba, fils de Bicri, a levé la main contre le roi David; livrez-le, lui seul, et je m’éloignerai de la ville. La femme dit à Joab: Voici, sa tête te sera jetée par la muraille. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Et la femme alla vers tout le peuple avec sa sagesse; et ils coupèrent la tête à Schéba, fils de Bicri, et la jetèrent à Joab. Joab sonna de la trompette; on se dispersa loin de la ville, et chacun s’en alla dans sa tente. Et Joab retourna à Jérusalem, vers le roi.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 23-26: cf. 2 S 8:15-18. 1 R 4:1-6. 1 Co 12:28, etc.'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 S 8:16, etc.
      marker-yv: yv-n
    - type: text
      text: 'Joab commandait toute l’armée d’Israël; Benaja, fils de Jehojada, était à la tête des Kéréthiens et des Péléthiens; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Adoram était préposé aux impôts; Josaphat, fils d’Achilud, était archiviste; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Scheja était secrétaire; Tsadok et Abiathar étaient sacrificateurs; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: et Ira de Jaïr était ministre d’état de David.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'David rentra dans sa maison à Jérusalem. Le roi prit les dix concubines qu’il avait laissées pour garder la maison, et il les mit dans un lieu où elles étaient séquestrées; il pourvut à leur entretien, mais il n’alla point vers elles. Et elles furent enfermées jusqu’au jour de leur mort, vivant dans un état de veuvage. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Le roi dit à Amasa: Convoque-moi d’ici à trois jours les hommes de Juda; et toi, sois ici présent. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Amasa partit pour convoquer Juda; mais il tarda au-delà du temps que le roi lui avait fixé. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'David dit alors à Abischaï: Schéba, fils de Bicri, va maintenant nous faire plus de mal qu’Absalom. Prends toi-même les serviteurs de ton maître et poursuis-le, de peur qu’il ne trouve des villes fortes et ne se dérobe à nos yeux. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Et Abischaï partit, suivi des gens de Joab, des Kéréthiens et des Péléthiens, et de tous les vaillants hommes; ils sortirent de Jérusalem, afin de poursuivre Schéba, fils de Bicri. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Lorsqu’ils furent près de la grande pierre qui est à Gabaon, Amasa arriva devant eux. Joab était ceint d’une épée par-dessus les habits dont il était revêtu; elle était attachée à ses reins dans le fourreau, d’où elle glissa, comme Joab s’avançait. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Joab dit à Amasa: Te portes-tu bien, mon frère? Et de la main droite il saisit la barbe d’Amasa pour le baiser. '
