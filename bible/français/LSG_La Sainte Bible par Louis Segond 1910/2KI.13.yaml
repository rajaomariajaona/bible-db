document_id: 2KI.13,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joachaz et Joas, rois d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. 2 R 8:11-13. (v. 22-25. 1 S 12:9-11.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La vingt-troisième année de Joas, fils d’Achazia, roi de Juda, Joachaz, fils de Jéhu, régna sur Israël à Samarie. Il régna dix-sept ans. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La trente-septième année de Joas, roi de Juda, Joas, fils de Joachaz, régna sur Israël à Samarie. Il régna seize ans. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit ce qui est mal aux yeux de l’Éternel; il ne se détourna d’aucun des péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël, et il s’y livra comme lui. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le reste des actions de Joas, tout ce qu’il a fait, ses exploits, et la guerre qu’il eut avec Amatsia, roi de Juda, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joas se coucha avec ses pères. Et Jéroboam s’assit sur son trône. Joas fut enterré à Samarie avec les rois d’Israël.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mort d’Élisée
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-25: cf. 2 Ch 20:20. Mt 27:50-53.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Élisée était atteint de la maladie dont il mourut; et Joas, roi d’Israël, descendit vers lui, pleura sur son visage, et dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 2:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mon père! Mon père! Char d’Israël et sa cavalerie! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Élisée lui dit: Prends un arc et des flèches. Et il prit un arc et des flèches. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis Élisée dit au roi d’Israël: Bande l’arc avec ta main. Et quand il l’eut bandé de sa main, Élisée mit ses mains sur les mains du roi, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et il dit: Ouvre la fenêtre à l’orient. Et il l’ouvrit. Élisée dit: Tire. Et il tira. Élisée dit: C’est une flèche de délivrance de la part de l’Éternel, une flèche de délivrance contre les Syriens; tu battras les Syriens '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 20:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à Aphek jusqu’à leur extermination. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Élisée dit encore: Prends les flèches. Et il les prit. Élisée dit au roi d’Israël: Frappe contre terre. Et il frappa trois fois, et s’arrêta. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’homme de Dieu s’irrita contre lui, et dit: Il fallait frapper cinq ou six fois; alors tu aurais battu les Syriens jusqu’à leur extermination; maintenant tu les battras trois fois. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit ce qui est mal aux yeux de l’Éternel; il commit les mêmes péchés que Jéroboam, fils de Nebath, qui avait fait pécher Israël, et il ne s’en détourna point. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Élisée mourut, et on l’enterra. L’année suivante, des troupes de Moabites pénétrèrent dans le pays. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et comme on enterrait un homme, voici, on aperçut une de ces troupes, et l’on jeta l’homme dans le sépulcre d’Élisée. L’homme alla toucher les os d’Élisée, et il reprit vie et se leva sur ses pieds. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hazaël, roi de Syrie, avait opprimé Israël pendant toute la vie de Joachaz. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais l’Éternel leur fit miséricorde et eut compassion d’eux, il tourna sa face vers eux à cause de son alliance avec Abraham, Isaac et Jacob, il ne voulut pas les détruire, et jusqu’à présent il ne les a pas rejetés de sa face. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hazaël, roi de Syrie, mourut, et Ben-Hadad, son fils, régna à sa place. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joas, fils de Joachaz, reprit des mains de Ben-Hadad, fils de Hazaël, les villes enlevées par Hazaël à Joachaz, son père, pendant la guerre. Joas le battit trois fois, et il recouvra les villes d’Israël.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La colère de l’Éternel s’enflamma contre Israël, et il les livra entre les mains de Hazaël, roi de Syrie, et entre les mains de Ben-Hadad, fils de Hazaël, tout le temps que ces rois vécurent. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joachaz implora l’Éternel. L’Éternel l’exauça, car il vit l’oppression sous laquelle le roi de Syrie tenait Israël, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et l’Éternel donna un libérateur à Israël. Les enfants d’Israël échappèrent aux mains des Syriens, et ils habitèrent dans leurs tentes comme auparavant. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ils ne se détournèrent point des péchés de la maison de Jéroboam, qui avait fait pécher Israël; ils s’y livrèrent aussi, et même l’idole d’Astarté était debout à Samarie. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De tout le peuple de Joachaz l’Éternel ne lui avait laissé que cinquante cavaliers, dix chars, et dix mille hommes de pied; car le roi de Syrie les avait fait périr et les avait rendus semblables à la poussière qu’on foule aux pieds. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le reste des actions de Joachaz, tout ce qu’il a fait, et ses exploits, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joachaz se coucha avec ses pères, et on l’enterra à Samarie. Et Joas, son fils, régna à sa place.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-13: cf. 2 R 14:8-16.'
    marker-yv: yv-h
