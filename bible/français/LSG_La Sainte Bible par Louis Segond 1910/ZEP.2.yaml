document_id: ZEP.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Menaces contre les peuples étrangers
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-3: cf. Am 5:4, 14, 15. Éz 9:4-6. Joë 2:12-14. Mt 3:2.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Rentrez en vous-mêmes, examinez-vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nation sans pudeur,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Cela leur arrivera pour leur orgueil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils ont insulté et traité avec arrogance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le peuple de l’Éternel des armées.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: L’Éternel sera terrible contre eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il anéantira tous les dieux de la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et chacun se prosternera devant lui dans son pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans toutes les îles des nations.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-15: cf. Éz 30:5, 9. (Na 1 à 3.)'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Vous aussi, Éthiopiens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous serez frappés par mon épée.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Il étendra sa main sur le septentrion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il détruira l’Assyrie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il fera de Ninive une solitude,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une terre aride comme le désert.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Des troupeaux se coucheront au milieu d’elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des animaux de toute espèce;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pélican et le hérisson
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Habiteront parmi les chapiteaux de ses colonnes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des cris retentiront aux fenêtres;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La dévastation sera sur le seuil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car les lambris de cèdre seront arrachés.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Voilà donc cette ville joyeuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui s’assied avec assurance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et qui dit en son cœur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, et rien que moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eh quoi! Elle est en ruines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est un repaire pour les bêtes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui passeront près d’elle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Siffleront et agiteront la main.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Avant que le décret s’exécute
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que ce jour passe comme la balle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant que la colère ardente de l’Éternel fonde sur vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant que le jour de la colère de l’Éternel fonde sur vous!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Cherchez l’Éternel, vous tous, humbles du pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui pratiquez ses ordonnances!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Recherchez la justice, recherchez l’humilité!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peut-être serez-vous épargnés au jour de la colère de l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 4-7: cf. Jé 47. Éz 25:15-17. Am 1:6-8.'
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Car Gaza sera délaissée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Askalon sera réduite en désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asdod sera chassée en plein midi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ékron sera déracinée.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Malheur aux habitants des côtes de la mer, à la nation des Kéréthiens!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel a parlé contre toi, Canaan, pays des Philistins!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te détruirai, tu n’auras plus d’habitants.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Les côtes de la mer seront des pâturages, des demeures pour les bergers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et des parcs pour les troupeaux.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ces côtes seront pour les restes de la maison de Juda;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est là qu’ils paîtront;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils reposeront le soir dans les maisons d’Askalon;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel, leur Dieu, ne les oubliera pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il ramènera leurs captifs.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-11: cf. Jé 48; 49:1-6. Éz 25:1-11.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: J’ai entendu les injures de Moab
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les outrages des enfants d’Ammon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand ils insultaient mon peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et s’élevaient avec arrogance contre ses frontières.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: C’est pourquoi, je suis vivant! Dit l’Éternel des armées, le Dieu d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab sera comme Sodome, et les enfants d’Ammon comme Gomorrhe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un lieu couvert de ronces, une mine de sel, un désert pour toujours;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le reste de mon peuple les pillera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le reste de ma nation les possédera.
