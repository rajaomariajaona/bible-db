document_id: ZEP.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Menaces contre les peuples étrangers
  - type: heading
    content: 'V. 1-3: cf. Am 5:4, 14, 15. Éz 9:4-6. Joë 2:12-14. Mt 3:2.'
  - type: text
    content: Rentrez en vous-mêmes, examinez-vous,
  - type: text
    content: Nation sans pudeur,
  '10':
  - type: text
    content: Cela leur arrivera pour leur orgueil,
  - type: text
    content: Parce qu’ils ont insulté et traité avec arrogance
  - type: text
    content: Le peuple de l’Éternel des armées.
  '11':
  - type: text
    content: L’Éternel sera terrible contre eux,
  - type: text
    content: Car il anéantira tous les dieux de la terre;
  - type: text
    content: Et chacun se prosternera devant lui dans son pays,
  - type: text
    content: Dans toutes les îles des nations.
  - type: heading
    content: 'V. 12-15: cf. Éz 30:5, 9. (Na 1 à 3.)'
  '12':
  - type: text
    content: Vous aussi, Éthiopiens,
  - type: text
    content: Vous serez frappés par mon épée.
  '13':
  - type: text
    content: Il étendra sa main sur le septentrion,
  - type: text
    content: Il détruira l’Assyrie,
  - type: text
    content: Et il fera de Ninive une solitude,
  - type: text
    content: Une terre aride comme le désert.
  '14':
  - type: text
    content: Des troupeaux se coucheront au milieu d’elle,
  - type: text
    content: Des animaux de toute espèce;
  - type: text
    content: Le pélican et le hérisson
  - type: text
    content: Habiteront parmi les chapiteaux de ses colonnes;
  - type: text
    content: Des cris retentiront aux fenêtres;
  - type: text
    content: La dévastation sera sur le seuil,
  - type: text
    content: Car les lambris de cèdre seront arrachés.
  '15':
  - type: text
    content: Voilà donc cette ville joyeuse,
  - type: text
    content: Qui s’assied avec assurance,
  - type: text
    content: 'Et qui dit en son cœur:'
  - type: text
    content: Moi, et rien que moi!
  - type: text
    content: Eh quoi! Elle est en ruines,
  - type: text
    content: C’est un repaire pour les bêtes!
  - type: text
    content: Tous ceux qui passeront près d’elle
  - type: text
    content: Siffleront et agiteront la main.
  '2':
  - type: text
    content: Avant que le décret s’exécute
  - type: text
    content: Et que ce jour passe comme la balle,
  - type: text
    content: Avant que la colère ardente de l’Éternel fonde sur vous,
  - type: text
    content: Avant que le jour de la colère de l’Éternel fonde sur vous!
  '3':
  - type: text
    content: Cherchez l’Éternel, vous tous, humbles du pays,
  - type: text
    content: Qui pratiquez ses ordonnances!
  - type: text
    content: Recherchez la justice, recherchez l’humilité!
  - type: text
    content: Peut-être serez-vous épargnés au jour de la colère de l’Éternel.
  - type: heading
    content: 'V. 4-7: cf. Jé 47. Éz 25:15-17. Am 1:6-8.'
  '4':
  - type: text
    content: Car Gaza sera délaissée,
  - type: text
    content: Askalon sera réduite en désert,
  - type: text
    content: Asdod sera chassée en plein midi,
  - type: text
    content: Ékron sera déracinée.
  '5':
  - type: text
    content: Malheur aux habitants des côtes de la mer, à la nation des Kéréthiens!
  - type: text
    content: L’Éternel a parlé contre toi, Canaan, pays des Philistins!
  - type: text
    content: Je te détruirai, tu n’auras plus d’habitants.
  '6':
  - type: text
    content: Les côtes de la mer seront des pâturages, des demeures pour les bergers,
  - type: text
    content: Et des parcs pour les troupeaux.
  '7':
  - type: text
    content: Ces côtes seront pour les restes de la maison de Juda;
  - type: text
    content: C’est là qu’ils paîtront;
  - type: text
    content: Ils reposeront le soir dans les maisons d’Askalon;
  - type: text
    content: Car l’Éternel, leur Dieu, ne les oubliera pas,
  - type: text
    content: Et il ramènera leurs captifs.
  - type: heading
    content: 'V. 8-11: cf. Jé 48; 49:1-6. Éz 25:1-11.'
  '8':
  - type: text
    content: J’ai entendu les injures de Moab
  - type: text
    content: Et les outrages des enfants d’Ammon,
  - type: text
    content: Quand ils insultaient mon peuple
  - type: text
    content: Et s’élevaient avec arrogance contre ses frontières.
  '9':
  - type: text
    content: C’est pourquoi, je suis vivant! Dit l’Éternel des armées, le Dieu d’Israël,
  - type: text
    content: Moab sera comme Sodome, et les enfants d’Ammon comme Gomorrhe,
  - type: text
    content: Un lieu couvert de ronces, une mine de sel, un désert pour toujours;
  - type: text
    content: Le reste de mon peuple les pillera,
  - type: text
    content: Le reste de ma nation les possédera.
