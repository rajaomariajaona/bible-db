document_id: JER.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. Ga 1:15, 16. Éz 2:3, etc.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paroles de Jérémie, fils de Hilkija, l’un des sacrificateurs d’Anathoth, dans le pays de Benjamin. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Regarde, je t’établis aujourd’hui sur les nations et sur les royaumes, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 18:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 10:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: pour que tu arraches et que tu abattes, pour que tu ruines et que tu détruises, pour que tu bâtisses et que tu plantes.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-19: cf. Jé 6:1-6, 22-27; 20:1, etc.; 38:1, etc.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots: Que vois-tu, Jérémie? Je répondis: Je vois une branche d’amandier. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’Éternel me dit: Tu as bien vu; car je veille sur ma parole, pour l’exécuter. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l’Éternel me fut adressée une seconde fois, en ces mots: Que vois-tu? Je répondis: Je vois une chaudière bouillante, du côté du septentrion. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’Éternel me dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 4:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'C’est du septentrion que la calamité se répandra sur tous les habitants du pays. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car voici, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 5:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'je vais appeler tous les peuples des royaumes du septentrion, dit l’Éternel; ils viendront, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 52:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'placeront chacun leur siège à l’entrée des portes de Jérusalem, contre ses murailles tout alentour, et contre toutes les villes de Juda. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je prononcerai mes jugements contre eux, à cause de toute leur méchanceté, parce qu’ils m’ont abandonné et ont offert de l’encens à d’autres dieux, et parce qu’ils se sont prosternés devant l’ouvrage de leurs mains. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et toi, ceins tes reins, lève-toi, et dis-leur tout ce que je t’ordonnerai. Ne tremble pas en leur présence, de peur que je ne te fasse trembler devant eux. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici, je t’établis en ce jour sur tout le pays '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 6:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme une ville forte, une colonne de fer et un mur d’airain, contre les rois de Juda, contre ses chefs, contre ses sacrificateurs, et contre le peuple du pays. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils te feront la guerre, mais ils ne te vaincront pas; car je suis avec toi pour te délivrer, dit l’Éternel.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l’Éternel lui fut adressée au temps de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 21:26
      - type: text
        text: ; 22:1, etc. 2 Ch 34:1, etc.
      marker-yv: yv-n
    - type: text
      text: 'Josias, fils d’Amon, roi de Juda, la treizième année de son règne, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et au temps de '
    - type: usfm
      marker: x
      children:
      - type: text
        text: '2 R 5:23, 34. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 36:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jojakim, fils de Josias, roi de Juda, jusqu’à la fin de la onzième année de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 24:17
      - type: text
        text: . 2 Ch 36:10, etc. Jé 52:1, etc.
      marker-yv: yv-n
    - type: text
      text: 'Sédécias, fils de Josias, roi de Juda, jusqu’à l’époque où Jérusalem fut emmenée en captivité, au '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 25:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: cinquième mois.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vocation du prophète
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avant que je t’eusse formé dans le ventre de ta mère, je te connaissais, et avant que tu fusses sorti de son sein, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 1:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'je t’avais consacré, je t’avais établi prophète des nations. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je répondis: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ah! Seigneur Éternel! Voici, je ne sais point parler, car je suis un enfant. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’Éternel me dit: Ne dis pas: Je suis un enfant. Car tu iras vers tous ceux auprès de qui je t’enverrai, et tu diras tout ce que je t’ordonnerai. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 3:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ne les crains point, car '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 31:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 1:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'je suis avec toi pour te délivrer, dit l’Éternel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis l’Éternel étendit sa main, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 6:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'toucha ma bouche; et l’Éternel me dit: Voici, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 5:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'je mets mes paroles dans ta bouche. '
