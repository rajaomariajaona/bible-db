document_id: JER.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-10: cf. Ga 1:15, 16. Éz 2:3, etc.'
  - type: text
    content: 'Paroles de Jérémie, fils de Hilkija, l’un des sacrificateurs d’Anathoth, dans le pays de Benjamin. '
  '10':
  - type: text
    content: 'Regarde, je t’établis aujourd’hui sur les nations et sur les royaumes, '
  - type: note
    content: Jé 18:7. 2 Co 10:4, 5.
  - type: text
    content: pour que tu arraches et que tu abattes, pour que tu ruines et que tu détruises, pour que tu bâtisses et que tu plantes.
  - type: heading
    content: 'V. 11-19: cf. Jé 6:1-6, 22-27; 20:1, etc.; 38:1, etc.'
  '11':
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots: Que vois-tu, Jérémie? Je répondis: Je vois une branche d’amandier. '
  '12':
  - type: text
    content: 'Et l’Éternel me dit: Tu as bien vu; car je veille sur ma parole, pour l’exécuter. '
  '13':
  - type: text
    content: 'La parole de l’Éternel me fut adressée une seconde fois, en ces mots: Que vois-tu? Je répondis: Je vois une chaudière bouillante, du côté du septentrion. '
  '14':
  - type: text
    content: 'Et l’Éternel me dit: '
  - type: note
    content: Jé 4:6.
  - type: text
    content: 'C’est du septentrion que la calamité se répandra sur tous les habitants du pays. '
  '15':
  - type: text
    content: 'Car voici, '
  - type: note
    content: Jé 5:15; 6:22; 10:22.
  - type: text
    content: 'je vais appeler tous les peuples des royaumes du septentrion, dit l’Éternel; ils viendront, et '
  - type: note
    content: Jé 52:4, 5.
  - type: text
    content: 'placeront chacun leur siège à l’entrée des portes de Jérusalem, contre ses murailles tout alentour, et contre toutes les villes de Juda. '
  '16':
  - type: text
    content: 'Je prononcerai mes jugements contre eux, à cause de toute leur méchanceté, parce qu’ils m’ont abandonné et ont offert de l’encens à d’autres dieux, et parce qu’ils se sont prosternés devant l’ouvrage de leurs mains. '
  '17':
  - type: text
    content: 'Et toi, ceins tes reins, lève-toi, et dis-leur tout ce que je t’ordonnerai. Ne tremble pas en leur présence, de peur que je ne te fasse trembler devant eux. '
  '18':
  - type: text
    content: 'Voici, je t’établis en ce jour sur tout le pays '
  - type: note
    content: Jé 6:27; 15:20.
  - type: text
    content: 'comme une ville forte, une colonne de fer et un mur d’airain, contre les rois de Juda, contre ses chefs, contre ses sacrificateurs, et contre le peuple du pays. '
  '19':
  - type: text
    content: Ils te feront la guerre, mais ils ne te vaincront pas; car je suis avec toi pour te délivrer, dit l’Éternel.
  '2':
  - type: text
    content: 'La parole de l’Éternel lui fut adressée au temps de '
  - type: note
    content: 2 R 21:26; 22:1, etc. 2 Ch 34:1, etc.
  - type: text
    content: 'Josias, fils d’Amon, roi de Juda, la treizième année de son règne, '
  '3':
  - type: text
    content: 'et au temps de '
  - type: note
    content: 2 R 5:23, 34. 2 Ch 36:4.
  - type: text
    content: 'Jojakim, fils de Josias, roi de Juda, jusqu’à la fin de la onzième année de '
  - type: note
    content: 2 R 24:17. 2 Ch 36:10, etc. Jé 52:1, etc.
  - type: text
    content: 'Sédécias, fils de Josias, roi de Juda, jusqu’à l’époque où Jérusalem fut emmenée en captivité, au '
  - type: note
    content: 2 R 25:8.
  - type: text
    content: cinquième mois.
  - type: heading
    content: Vocation du prophète
  '4':
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '5':
  - type: text
    content: 'Avant que je t’eusse formé dans le ventre de ta mère, je te connaissais, et avant que tu fusses sorti de son sein, '
  - type: note
    content: Ga 1:15.
  - type: text
    content: 'je t’avais consacré, je t’avais établi prophète des nations. '
  '6':
  - type: text
    content: 'Je répondis: '
  - type: note
    content: Ex 3:4; 6:11, 29.
  - type: text
    content: 'Ah! Seigneur Éternel! Voici, je ne sais point parler, car je suis un enfant. '
  '7':
  - type: text
    content: 'Et l’Éternel me dit: Ne dis pas: Je suis un enfant. Car tu iras vers tous ceux auprès de qui je t’enverrai, et tu diras tout ce que je t’ordonnerai. '
  '8':
  - type: note
    content: Éz 3:9.
  - type: text
    content: 'Ne les crains point, car '
  - type: note
    content: De 31:6, 8. Jos 1:5.
  - type: text
    content: 'je suis avec toi pour te délivrer, dit l’Éternel. '
  '9':
  - type: text
    content: 'Puis l’Éternel étendit sa main, et '
  - type: note
    content: És 6:6, 7.
  - type: text
    content: 'toucha ma bouche; et l’Éternel me dit: Voici, '
  - type: note
    content: Jé 5:14.
  - type: text
    content: 'je mets mes paroles dans ta bouche. '
