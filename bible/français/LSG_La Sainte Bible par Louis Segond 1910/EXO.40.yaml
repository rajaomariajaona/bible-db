document_id: EXO.40
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-33: cf. Ex 39:32-43. No 7. Lé 8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le premier jour du premier mois, tu dresseras le tabernacle, la tente d’assignation. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu y placeras l’arche du témoignage, et tu couvriras l’arche avec le voile. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 26:35
      metadata:
        usfm: EXO.26.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu apporteras la table, et tu la disposeras en ordre. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 27:20
      metadata:
        usfm: EXO.27.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu apporteras le chandelier, et tu en arrangeras les lampes. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu placeras l’autel d’or pour le parfum devant l’arche du témoignage, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 26:36
      metadata:
        usfm: EXO.26.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et tu mettras le rideau à l’entrée du tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu placeras l’autel des holocaustes devant l’entrée du tabernacle, de la tente d’assignation. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tu placeras la cuve entre la tente d’assignation et l’autel, et tu y mettras de l’eau. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 27:16
      metadata:
        usfm: EXO.27.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu placeras le parvis à l’entour, et tu mettras le rideau à la porte du parvis. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tu prendras l’huile d’onction, tu en oindras le tabernacle et tout ce qu’il renferme, et tu le sanctifieras, avec tous ses ustensiles; et il sera saint. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 29:37
      metadata:
        usfm: EXO.29.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu oindras l’autel des holocaustes et tous ses ustensiles, et tu sanctifieras l’autel; et l’autel sera très saint. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu oindras la cuve avec sa base, et tu la sanctifieras. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tu feras avancer Aaron et ses fils vers l’entrée de la tente d’assignation, et tu les laveras avec de l’eau. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu revêtiras Aaron des vêtements sacrés, tu l’oindras, et tu le sanctifieras, pour qu’il soit à mon service dans le sacerdoce. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tu feras approcher ses fils, tu les revêtiras des tuniques, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et tu les oindras comme tu auras oint leur père, pour qu’ils soient à mon service dans le sacerdoce. Cette onction leur assurera à perpétuité le sacerdoce parmi leurs descendants. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Moïse fit tout ce que l’Éternel lui avait ordonné; il fit ainsi. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le premier jour du premier mois '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 7:1
      metadata:
        usfm: NUM.7.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de la seconde année, le tabernacle fut dressé. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Moïse dressa le tabernacle; il en posa les bases, plaça les planches et les barres, et éleva les colonnes. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il étendit la tente sur le tabernacle, et il mit la couverture de la tente par-dessus, comme l’Éternel l’avait ordonné à Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il prit le témoignage, et le plaça dans l’arche; il mit les barres à l’arche, et il posa le propitiatoire au-dessus de l’arche. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il apporta l’arche dans le tabernacle; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 35:12
      metadata:
        usfm: EXO.35.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il mit le voile de séparation, et il en couvrit l’arche du témoignage, comme l’Éternel l’avait ordonné à Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il plaça la table dans la tente d’assignation, au côté septentrional du tabernacle, en dehors du voile; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:30
      metadata:
        usfm: EXO.25.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il y déposa en ordre les pains, devant l’Éternel, comme l’Éternel l’avait ordonné à Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il plaça le chandelier dans la tente d’assignation, en face de la table, au côté méridional du tabernacle; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'et il en arrangea les lampes, devant l’Éternel, comme l’Éternel l’avait ordonné à Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il plaça l’autel d’or dans la tente d’assignation, devant le voile; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'et il y fit brûler le parfum odoriférant, comme l’Éternel l’avait ordonné à Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il plaça le rideau à l’entrée du tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Il plaça l’autel des holocaustes à l’entrée du tabernacle, de la tente d’assignation; et il y offrit l’holocauste et l’offrande, comme l’Éternel l’avait ordonné à Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il plaça la cuve entre la tente d’assignation et l’autel, et il y mit de l’eau pour les ablutions; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Moïse, Aaron et ses fils, s’y lavèrent les mains et les pieds; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'lorsqu’ils entrèrent dans la tente d’assignation et qu’ils s’approchèrent de l’autel, ils se lavèrent, comme l’Éternel l’avait ordonné à Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il dressa le parvis autour du tabernacle et de l’autel, et il mit le rideau à la porte du parvis. Ce fut ainsi que Moïse acheva l’ouvrage.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La gloire de l’Éternel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 34-38: cf. 1 R 8:10-12. No 9:15-23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 9:15
      metadata:
        usfm: NUM.9.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 8:10
      metadata:
        usfm: 1KI.8.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors la nuée couvrit la tente d’assignation, et la gloire de l’Éternel remplit le tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Moïse ne pouvait pas entrer dans la tente d’assignation, parce que la nuée restait dessus, et que la gloire de l’Éternel remplissait le tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Aussi longtemps que durèrent leurs marches, les enfants d’Israël partaient, quand la nuée s’élevait de dessus le tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Et quand la nuée ne s’élevait pas, ils ne partaient pas, jusqu’à ce qu’elle s’élevât. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:21
      metadata:
        usfm: EXO.13.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 14:14
      metadata:
        usfm: NUM.14.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 1:33
      metadata:
        usfm: DEU.1.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Né 9:19
      metadata:
        usfm: NEH.9.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:14
      metadata:
        usfm: PSA.78.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 105:39
      metadata:
        usfm: PSA.105.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:1
      metadata:
        usfm: 1CO.10.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La nuée de l’Éternel était de jour sur le tabernacle; et de nuit, il y avait un feu, aux yeux de toute la maison d’Israël, pendant toutes leurs marches.
