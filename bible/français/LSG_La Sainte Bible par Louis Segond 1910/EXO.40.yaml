document_id: EXO.40,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-33: cf. Ex 39:32-43. No 7. Lé 8.'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: note
    content: Ex 29:37.
  - type: text
    content: 'Tu oindras l’autel des holocaustes et tous ses ustensiles, et tu sanctifieras l’autel; et l’autel sera très saint. '
  '11':
  - type: text
    content: 'Tu oindras la cuve avec sa base, et tu la sanctifieras. '
  '12':
  - type: text
    content: 'Tu feras avancer Aaron et ses fils vers l’entrée de la tente d’assignation, et tu les laveras avec de l’eau. '
  '13':
  - type: text
    content: 'Tu revêtiras Aaron des vêtements sacrés, tu l’oindras, et tu le sanctifieras, pour qu’il soit à mon service dans le sacerdoce. '
  '14':
  - type: text
    content: 'Tu feras approcher ses fils, tu les revêtiras des tuniques, '
  '15':
  - type: text
    content: 'et tu les oindras comme tu auras oint leur père, pour qu’ils soient à mon service dans le sacerdoce. Cette onction leur assurera à perpétuité le sacerdoce parmi leurs descendants. '
  '16':
  - type: text
    content: 'Moïse fit tout ce que l’Éternel lui avait ordonné; il fit ainsi. '
  '17':
  - type: text
    content: 'Le premier jour du premier mois '
  - type: note
    content: No 7:1.
  - type: text
    content: 'de la seconde année, le tabernacle fut dressé. '
  '18':
  - type: text
    content: 'Moïse dressa le tabernacle; il en posa les bases, plaça les planches et les barres, et éleva les colonnes. '
  '19':
  - type: text
    content: 'Il étendit la tente sur le tabernacle, et il mit la couverture de la tente par-dessus, comme l’Éternel l’avait ordonné à Moïse. '
  '2':
  - type: text
    content: 'Le premier jour du premier mois, tu dresseras le tabernacle, la tente d’assignation. '
  '20':
  - type: text
    content: 'Il prit le témoignage, et le plaça dans l’arche; il mit les barres à l’arche, et il posa le propitiatoire au-dessus de l’arche. '
  '21':
  - type: text
    content: 'Il apporta l’arche dans le tabernacle; '
  - type: note
    content: Ex 35:12.
  - type: text
    content: 'il mit le voile de séparation, et il en couvrit l’arche du témoignage, comme l’Éternel l’avait ordonné à Moïse. '
  '22':
  - type: text
    content: 'Il plaça la table dans la tente d’assignation, au côté septentrional du tabernacle, en dehors du voile; '
  '23':
  - type: text
    content: 'et '
  - type: note
    content: Ex 25:30.
  - type: text
    content: 'il y déposa en ordre les pains, devant l’Éternel, comme l’Éternel l’avait ordonné à Moïse. '
  '24':
  - type: text
    content: 'Il plaça le chandelier dans la tente d’assignation, en face de la table, au côté méridional du tabernacle; '
  '25':
  - type: text
    content: 'et il en arrangea les lampes, devant l’Éternel, comme l’Éternel l’avait ordonné à Moïse. '
  '26':
  - type: text
    content: 'Il plaça l’autel d’or dans la tente d’assignation, devant le voile; '
  '27':
  - type: text
    content: 'et il y fit brûler le parfum odoriférant, comme l’Éternel l’avait ordonné à Moïse. '
  '28':
  - type: text
    content: 'Il plaça le rideau à l’entrée du tabernacle. '
  '29':
  - type: text
    content: 'Il plaça l’autel des holocaustes à l’entrée du tabernacle, de la tente d’assignation; et il y offrit l’holocauste et l’offrande, comme l’Éternel l’avait ordonné à Moïse. '
  '3':
  - type: text
    content: 'Tu y placeras l’arche du témoignage, et tu couvriras l’arche avec le voile. '
  '30':
  - type: text
    content: 'Il plaça la cuve entre la tente d’assignation et l’autel, et il y mit de l’eau pour les ablutions; '
  '31':
  - type: text
    content: 'Moïse, Aaron et ses fils, s’y lavèrent les mains et les pieds; '
  '32':
  - type: text
    content: 'lorsqu’ils entrèrent dans la tente d’assignation et qu’ils s’approchèrent de l’autel, ils se lavèrent, comme l’Éternel l’avait ordonné à Moïse. '
  '33':
  - type: text
    content: Il dressa le parvis autour du tabernacle et de l’autel, et il mit le rideau à la porte du parvis. Ce fut ainsi que Moïse acheva l’ouvrage.
  - type: heading
    content: La gloire de l’Éternel
  - type: heading
    content: 'V. 34-38: cf. 1 R 8:10-12. No 9:15-23.'
  '34':
  - type: text
    content: ' '
  - type: note
    content: No 9:15. 1 R 8:10.
  - type: text
    content: 'Alors la nuée couvrit la tente d’assignation, et la gloire de l’Éternel remplit le tabernacle. '
  '35':
  - type: text
    content: 'Moïse ne pouvait pas entrer dans la tente d’assignation, parce que la nuée restait dessus, et que la gloire de l’Éternel remplissait le tabernacle. '
  '36':
  - type: text
    content: 'Aussi longtemps que durèrent leurs marches, les enfants d’Israël partaient, quand la nuée s’élevait de dessus le tabernacle. '
  '37':
  - type: text
    content: 'Et quand la nuée ne s’élevait pas, ils ne partaient pas, jusqu’à ce qu’elle s’élevât. '
  '38':
  - type: note
    content: Ex 13:21. No 14:14. De 1:33. Né 9:19. Ps 78:14; 105:39. 1 Co 10:1.
  - type: text
    content: La nuée de l’Éternel était de jour sur le tabernacle; et de nuit, il y avait un feu, aux yeux de toute la maison d’Israël, pendant toutes leurs marches.
  '4':
  - type: note
    content: Ex 26:35.
  - type: text
    content: 'Tu apporteras la table, et tu la disposeras en ordre. '
  - type: note
    content: Ex 27:20.
  - type: text
    content: 'Tu apporteras le chandelier, et tu en arrangeras les lampes. '
  '5':
  - type: text
    content: 'Tu placeras l’autel d’or pour le parfum devant l’arche du témoignage, '
  - type: note
    content: Ex 26:36.
  - type: text
    content: 'et tu mettras le rideau à l’entrée du tabernacle. '
  '6':
  - type: text
    content: 'Tu placeras l’autel des holocaustes devant l’entrée du tabernacle, de la tente d’assignation. '
  '7':
  - type: text
    content: 'Tu placeras la cuve entre la tente d’assignation et l’autel, et tu y mettras de l’eau. '
  '8':
  - type: note
    content: Ex 27:16.
  - type: text
    content: 'Tu placeras le parvis à l’entour, et tu mettras le rideau à la porte du parvis. '
  '9':
  - type: text
    content: 'Tu prendras l’huile d’onction, tu en oindras le tabernacle et tout ce qu’il renferme, et tu le sanctifieras, avec tous ses ustensiles; et il sera saint. '
