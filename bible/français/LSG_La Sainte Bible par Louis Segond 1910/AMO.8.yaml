document_id: AMO.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vision de la corbeille de fruits
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-3: cf. Am 7:7-9. Jé 1:11, 12. Ap 14:18, etc.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le Seigneur, l’Éternel, m’envoya cette vision.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, c’était une corbeille de fruits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il dit: Que vois-tu, Amos?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je répondis: Une corbeille de fruits.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et l’Éternel me dit: La fin est venue pour mon peuple d’Israël;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne lui pardonnerai plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: En ce jour-là, les chants du palais seront des gémissements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Seigneur, l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On jettera partout en silence une multitude de cadavres.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 4-10: cf. Mi 6:9-16. Pr 22:22, 23.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Écoutez ceci, vous qui dévorez l’indigent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui ruinez les malheureux du pays!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Vous dites: Quand la nouvelle lune sera-t-elle passée,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que nous vendions du blé?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand finira le sabbat, afin que nous ouvrions les greniers?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous diminuerons l’épha, nous augmenterons le prix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nous falsifierons les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 12:8
      metadata:
        usfm: HOS.12.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: balances pour tromper;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Puis nous achèterons les misérables pour '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 2:6
      metadata:
        usfm: AMO.2.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: de l’argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le pauvre pour une paire de souliers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nous vendrons la criblure du froment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’Éternel l’a juré par la gloire de Jacob:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je n’oublierai jamais aucune de leurs œuvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le pays, à cause d’elles, ne sera-t-il pas ébranlé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous ses habitants ne seront-ils pas dans le deuil?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le pays montera tout entier comme le fleuve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il se soulèvera et s’affaissera comme le fleuve d’Égypte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: En ce jour-là, dit le Seigneur, l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ferai coucher le soleil à midi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’obscurcirai la terre en plein jour;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je changerai vos fêtes en deuil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous vos chants en lamentations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je couvrirai de sacs tous les reins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je rendrai chauves toutes les têtes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je mettrai le pays dans le deuil comme pour un fils unique,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa fin sera comme un jour d’amertume.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-14: cf. Ps 74:9. Pr 1:24-32. Os 3:4.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Voici, les jours viennent, dit le Seigneur, l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où j’enverrai la famine dans le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Non pas la disette du pain et la soif de l’eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais la faim et la soif d’entendre les paroles de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils seront alors errants d’une mer à l’autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du septentrion à l’orient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils iront çà et là pour chercher la parole de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils ne la trouveront pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: En ce jour, les belles jeunes filles et les jeunes hommes mourront de soif.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ils jurent par le péché de Samarie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et ils disent: Vive ton Dieu, Dan!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Vive la voie de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 5:5
      metadata:
        usfm: AMO.5.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Beer-Schéba!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ils tomberont, et ne se relèveront plus.
