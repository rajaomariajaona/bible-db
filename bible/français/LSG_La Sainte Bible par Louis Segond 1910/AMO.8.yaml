document_id: AMO.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Vision de la corbeille de fruits
  - type: heading
    content: 'V. 1-3: cf. Am 7:7-9. Jé 1:11, 12. Ap 14:18, etc.'
  - type: text
    content: Le Seigneur, l’Éternel, m’envoya cette vision.
  - type: text
    content: Voici, c’était une corbeille de fruits.
  '10':
  - type: text
    content: Je changerai vos fêtes en deuil,
  - type: text
    content: Et tous vos chants en lamentations,
  - type: text
    content: Je couvrirai de sacs tous les reins,
  - type: text
    content: Et je rendrai chauves toutes les têtes;
  - type: text
    content: Je mettrai le pays dans le deuil comme pour un fils unique,
  - type: text
    content: Et sa fin sera comme un jour d’amertume.
  - type: heading
    content: 'V. 11-14: cf. Ps 74:9. Pr 1:24-32. Os 3:4.'
  '11':
  - type: text
    content: Voici, les jours viennent, dit le Seigneur, l’Éternel,
  - type: text
    content: Où j’enverrai la famine dans le pays,
  - type: text
    content: Non pas la disette du pain et la soif de l’eau,
  - type: text
    content: Mais la faim et la soif d’entendre les paroles de l’Éternel.
  '12':
  - type: text
    content: Ils seront alors errants d’une mer à l’autre,
  - type: text
    content: Du septentrion à l’orient,
  - type: text
    content: Ils iront çà et là pour chercher la parole de l’Éternel,
  - type: text
    content: Et ils ne la trouveront pas.
  '13':
  - type: text
    content: En ce jour, les belles jeunes filles et les jeunes hommes mourront de soif.
  '14':
  - type: text
    content: Ils jurent par le péché de Samarie,
  - type: text
    content: 'Et ils disent: Vive ton Dieu, Dan!'
  - type: text
    content: 'Vive la voie de '
  - type: note
    content: Am 5:5.
  - type: text
    content: Beer-Schéba!
  - type: text
    content: Mais ils tomberont, et ne se relèveront plus.
  '2':
  - type: text
    content: 'Il dit: Que vois-tu, Amos?'
  - type: text
    content: 'Je répondis: Une corbeille de fruits.'
  - type: text
    content: 'Et l’Éternel me dit: La fin est venue pour mon peuple d’Israël;'
  - type: text
    content: Je ne lui pardonnerai plus.
  '3':
  - type: text
    content: En ce jour-là, les chants du palais seront des gémissements,
  - type: text
    content: Dit le Seigneur, l’Éternel;
  - type: text
    content: On jettera partout en silence une multitude de cadavres.
  - type: heading
    content: 'V. 4-10: cf. Mi 6:9-16. Pr 22:22, 23.'
  '4':
  - type: text
    content: Écoutez ceci, vous qui dévorez l’indigent,
  - type: text
    content: Et qui ruinez les malheureux du pays!
  '5':
  - type: text
    content: 'Vous dites: Quand la nouvelle lune sera-t-elle passée,'
  - type: text
    content: Afin que nous vendions du blé?
  - type: text
    content: Quand finira le sabbat, afin que nous ouvrions les greniers?
  - type: text
    content: Nous diminuerons l’épha, nous augmenterons le prix,
  - type: text
    content: 'Nous falsifierons les '
  - type: note
    content: Os 12:8.
  - type: text
    content: balances pour tromper;
  '6':
  - type: text
    content: 'Puis nous achèterons les misérables pour '
  - type: note
    content: Am 2:6.
  - type: text
    content: de l’argent,
  - type: text
    content: Et le pauvre pour une paire de souliers,
  - type: text
    content: Et nous vendrons la criblure du froment.
  '7':
  - type: text
    content: 'L’Éternel l’a juré par la gloire de Jacob:'
  - type: text
    content: Je n’oublierai jamais aucune de leurs œuvres.
  '8':
  - type: text
    content: Le pays, à cause d’elles, ne sera-t-il pas ébranlé,
  - type: text
    content: Et tous ses habitants ne seront-ils pas dans le deuil?
  - type: text
    content: Le pays montera tout entier comme le fleuve,
  - type: text
    content: Il se soulèvera et s’affaissera comme le fleuve d’Égypte.
  '9':
  - type: text
    content: En ce jour-là, dit le Seigneur, l’Éternel,
  - type: text
    content: Je ferai coucher le soleil à midi,
  - type: text
    content: Et j’obscurcirai la terre en plein jour;
