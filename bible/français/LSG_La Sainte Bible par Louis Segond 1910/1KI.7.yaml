document_id: 1KI.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Construction du palais de Salomon
  - type: heading
    content: 'V. 1-12: cf. 2 Ch 8:1, 11; 9:17-20. Ec 2:4.'
  - type: text
    content: 'Salomon bâtit encore '
  - type: note
    content: 1 R 9:10.
  - type: text
    content: 'sa maison, ce qui dura treize ans jusqu’à ce qu’il l’eût entièrement achevée. '
  '10':
  - type: text
    content: 'Les fondements étaient en pierres magnifiques et de grande dimension, en pierres de dix coudées et en pierres de huit coudées. '
  '11':
  - type: text
    content: 'Au-dessus il y avait encore de magnifiques pierres, taillées d’après des mesures, et du bois de cèdre. '
  '12':
  - type: text
    content: La grande cour avait dans tout son circuit trois rangées de pierres de taille et une rangée de poutres de cèdre, comme le parvis intérieur de la maison de l’Éternel, et comme le portique de la maison.
  - type: heading
    content: Les deux colonnes d’airain, la mer d’airain, les bassins, et les divers ustensiles pour le temple
  - type: heading
    content: 'V. 13-22: cf. 2 Ch 2:12-14; 3:15-17.'
  '13':
  - type: text
    content: 'Le roi Salomon fit venir de Tyr '
  - type: note
    content: 2 Ch 2:13.
  - type: text
    content: 'Hiram, '
  '14':
  - type: text
    content: 'fils d’une veuve de la tribu de Nephthali, et d’un père Tyrien, qui travaillait sur l’airain. Hiram était '
  - type: note
    content: Ex 31:3.
  - type: text
    content: 'rempli de sagesse, d’intelligence, et de savoir pour faire toutes sortes d’ouvrages d’airain. Il arriva auprès du roi Salomon, et il exécuta tous ses ouvrages. '
  '15':
  - type: text
    content: 'Il fit les '
  - type: note
    content: 2 R 25:16, 17. Jé 52:21.
  - type: text
    content: 'deux colonnes d’airain. La première avait dix-huit coudées de hauteur, et un fil de douze coudées mesurait la circonférence de la seconde. '
  '16':
  - type: text
    content: 'Il fondit deux chapiteaux d’airain, pour mettre sur les sommets des colonnes; le premier avait cinq coudées de hauteur, et le second avait cinq coudées de hauteur. '
  '17':
  - type: text
    content: 'Il fit des treillis en forme de réseaux, des festons façonnés en chaînettes, pour les chapiteaux qui étaient sur le sommet des colonnes, sept pour le premier chapiteau, et sept pour le second chapiteau. '
  '18':
  - type: text
    content: 'Il fit deux rangs de grenades autour de l’un des treillis, pour couvrir le chapiteau qui était sur le sommet d’une des colonnes; il fit de même pour le second chapiteau. '
  '19':
  - type: text
    content: 'Les chapiteaux qui étaient sur le sommet des colonnes, dans le portique, figuraient des lis et avaient quatre coudées. '
  '2':
  - type: text
    content: 'Il construisit d’abord la maison de la forêt du Liban, longue de cent coudées, large de cinquante coudées, et haute de trente coudées. Elle reposait sur quatre rangées de colonnes de cèdre, et il y avait des poutres de cèdre sur les colonnes. '
  '20':
  - type: text
    content: 'Les chapiteaux placés sur les deux colonnes étaient entourés de deux cents grenades, en haut, près du renflement qui était au-delà du treillis; il y avait aussi deux cents grenades rangées autour du second chapiteau. '
  '21':
  - type: text
    content: 'Il dressa les colonnes dans le portique du temple; il dressa la colonne de droite, et la nomma Jakin; puis il dressa la colonne de gauche, et la nomma Boaz. '
  '22':
  - type: text
    content: Il y avait sur le sommet des colonnes un travail figurant des lis. Ainsi fut achevé l’ouvrage des colonnes.
  - type: heading
    content: 'V. 23-40: cf. 2 Ch 4:1-6. Ex 30:17-21.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 2 Ch 4:2. Jé 52:20.
  - type: text
    content: 'Il fit la mer de fonte. Elle avait dix coudées d’un bord à l’autre, une forme entièrement ronde, cinq coudées de hauteur, et une circonférence que mesurait un cordon de trente coudées. '
  '24':
  - type: text
    content: 'Des coloquintes l’entouraient '
  - type: note
    content: 2 Ch 4:3.
  - type: text
    content: 'au-dessous de son bord, dix par coudée, faisant tout le tour de la mer; les coloquintes, disposées sur deux rangs, étaient fondues avec elle en une seule pièce. '
  '25':
  - type: text
    content: 'Elle était posée sur douze bœufs, dont trois tournés vers le nord, trois tournés vers l’occident, trois tournés vers le midi, et trois tournés vers l’orient; la mer était sur eux, et toute la partie postérieure de leur corps était en dedans. '
  '26':
  - type: text
    content: 'Son épaisseur était d’un palme; et son bord, semblable au bord d’une coupe, était façonné en fleur de lis. Elle contenait deux mille baths. '
  '27':
  - type: text
    content: 'Il fit les dix bases d’airain. Chacune avait quatre coudées de longueur, quatre coudées de largeur, et trois coudées de hauteur. '
  '28':
  - type: text
    content: 'Voici en quoi consistaient ces bases. Elles étaient formées de panneaux, liés aux coins par des montants. '
  '29':
  - type: text
    content: 'Sur les panneaux qui étaient entre les montants il y avait des lions, des bœufs et des chérubins; et sur les montants, au-dessus comme au-dessous des lions et des bœufs, il y avait des ornements qui pendaient en festons. '
  '3':
  - type: text
    content: 'On couvrit de cèdre les chambres qui portaient sur les colonnes et qui étaient au nombre de quarante-cinq, quinze par étage. '
  '30':
  - type: text
    content: 'Chaque base avait quatre roues d’airain avec des essieux d’airain; et aux quatre angles étaient des consoles de fonte, au-dessous du bassin, et au-delà des festons. '
  '31':
  - type: text
    content: 'Le couronnement de la base offrait à son intérieur une ouverture avec un prolongement d’une coudée vers le haut; cette ouverture était ronde, comme pour les ouvrages de ce genre, et elle avait une coudée et demie de largeur; il s’y trouvait aussi des sculptures. Les panneaux étaient carrés, et non arrondis. '
  '32':
  - type: text
    content: 'Les quatre roues étaient sous les panneaux, et les essieux des roues fixés à la base; chacune avait une coudée et demie de hauteur. '
  '33':
  - type: text
    content: 'Les roues étaient faites comme celles d’un char. Leurs essieux, leurs jantes, leurs rais et leurs moyeux, tout était de fonte. '
  '34':
  - type: text
    content: 'Il y avait aux quatre angles de chaque base quatre consoles d’une même pièce que la base. '
  '35':
  - type: text
    content: 'La partie supérieure de la base se terminait par un cercle d’une demi-coudée de hauteur, et elle avait ses appuis et ses panneaux de la même pièce. '
  '36':
  - type: text
    content: 'Il grava sur les plaques des appuis, et sur les panneaux, des chérubins, des lions et des palmes, selon les espaces libres, et des guirlandes tout autour. '
  '37':
  - type: text
    content: 'C’est ainsi qu’il fit les dix bases: la fonte, la mesure et la forme étaient les mêmes pour toutes. '
  '38':
  - type: note
    content: 1 Ch 4:6.
  - type: text
    content: 'Il fit dix bassins d’airain. Chaque bassin contenait quarante baths, chaque bassin avait quatre coudées, chaque bassin était sur l’une des dix bases. '
  '39':
  - type: text
    content: 'Il plaça cinq bases sur le côté droit de la maison, et cinq bases sur le côté gauche de la maison; et il plaça la mer du côté droit de la maison, au sud-est. '
  '4':
  - type: text
    content: 'Il y avait trois étages, à chacun desquels se trouvaient des fenêtres les unes vis-à-vis des autres. '
  '40':
  - type: text
    content: Hiram fit les cendriers, les pelles et les coupes. Ainsi Hiram acheva tout l’ouvrage que le roi Salomon lui fit faire pour la maison de l’Éternel;
  - type: heading
    content: 'V. 41-51: cf. (2 Ch 4:7-22; 5:1. Ex 37:10, etc.)'
  '41':
  - type: text
    content: 'deux colonnes, avec les deux chapiteaux et leurs bourrelets sur le sommet des colonnes; les deux treillis, pour couvrir les deux bourrelets des chapiteaux sur le sommet des colonnes; '
  '42':
  - type: text
    content: 'les quatre cents grenades pour les deux treillis, deux rangées de grenades par treillis, pour couvrir les deux bourrelets des chapiteaux sur le sommet des colonnes; '
  '43':
  - type: text
    content: 'les dix bases, et les dix bassins sur les bases; '
  '44':
  - type: text
    content: 'la mer, et les douze bœufs sous la mer; '
  '45':
  - type: text
    content: 'les cendriers, les pelles et les coupes. Tous ces ustensiles que le roi Salomon fit faire à Hiram pour la maison de l’Éternel étaient d’airain poli. '
  '46':
  - type: text
    content: 'Le roi les fit fondre dans la plaine du Jourdain dans un sol argileux, entre Succoth et Tsarthan. '
  '47':
  - type: text
    content: 'Salomon laissa tous ces ustensiles sans vérifier le poids de l’airain, parce qu’ils étaient en très grande quantité. '
  '48':
  - type: text
    content: 'Salomon fit encore tous les autres ustensiles pour la maison de l’Éternel: '
  - type: note
    content: Ex 30:1.
  - type: text
    content: 'l’autel d’or; '
  - type: note
    content: Ex 25:23.
  - type: text
    content: 'la table d’or, sur laquelle on mettait les pains de proposition; '
  '49':
  - type: text
    content: 'les chandeliers d’or pur, cinq à droite et cinq à gauche, devant le sanctuaire, avec les fleurs, les lampes et les mouchettes d’or; '
  '5':
  - type: text
    content: 'Toutes les portes et tous les poteaux étaient formés de poutres en carré; et, à chacun des trois étages, les ouvertures étaient les unes vis-à-vis des autres. '
  '50':
  - type: text
    content: 'les bassins, les couteaux, les coupes, les tasses et les brasiers d’or pur; et les gonds d’or pour la porte de l’intérieur de la maison à l’entrée du lieu très saint, et pour la porte de la maison à l’entrée du temple. '
  '51':
  - type: text
    content: 'Ainsi fut achevé tout l’ouvrage que le roi Salomon fit pour la maison de l’Éternel. '
  - type: note
    content: 2 S 8:7, 11.
  - type: text
    content: 'Puis il apporta l’argent, l’or et les ustensiles, que David, son père, avait '
  - type: note
    content: 2 Ch 5:1.
  - type: text
    content: consacrés, et il les mit dans les trésors de la maison de l’Éternel.
  '6':
  - type: text
    content: 'Il fit le portique des colonnes, long de cinquante coudées et large de trente coudées, et un autre portique en avant avec des colonnes et des degrés sur leur front. '
  '7':
  - type: text
    content: 'Il fit le portique du trône, où il rendait la justice, le portique du jugement; et il le couvrit de cèdre, depuis le sol jusqu’au plafond. '
  '8':
  - type: text
    content: 'Sa maison d’habitation fut construite de la même manière, dans une autre cour, derrière le portique. Et il fit une maison du même genre que ce portique pour la fille de Pharaon, '
  - type: note
    content: 1 R 3:1.
  - type: text
    content: 'qu’il avait prise pour femme. '
  '9':
  - type: text
    content: 'Pour toutes ces constructions on employa de magnifiques pierres, taillées d’après des mesures, sciées avec la scie, intérieurement et extérieurement, et cela depuis les fondements jusqu’aux corniches, et en dehors jusqu’à la grande cour. '
