document_id: PSA.132,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 2 Ch 6:3-17, 41, 42. És 32:8. Mt 6:33.
  - type: text
    content: Cantique des degrés.
  - type: text
    content: Éternel, souviens-toi de David,
  - type: text
    content: De toutes ses peines!
  '10':
  - type: text
    content: A cause de David, ton serviteur,
  - type: text
    content: Ne repousse pas ton oint!
  '11':
  - type: text
    content: L’Éternel a juré la vérité à David,
  - type: text
    content: Il n’en reviendra pas;
  - type: note
    content: 2 S 7:12. 1 R 8:25. 2 Ch 6:16. Lu 1:69.
  - type: text
    content: Je mettrai sur ton trône un fruit de tes entrailles.
  '12':
  - type: text
    content: Si tes fils observent mon alliance
  - type: text
    content: Et mes préceptes que je leur enseigne,
  - type: text
    content: Leurs fils aussi pour toujours
  - type: text
    content: Seront assis sur ton trône.
  '13':
  - type: text
    content: Oui, l’Éternel a choisi Sion,
  - type: text
    content: 'Il l’a désirée pour sa demeure:'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ps 68:17; v. 8.
  - type: text
    content: C’est mon lieu de repos à toujours;
  - type: text
    content: J’y habiterai, car je l’ai désirée.
  '15':
  - type: text
    content: Je bénirai sa nourriture,
  - type: text
    content: Je rassasierai de pain ses indigents;
  '16':
  - type: text
    content: ' '
  - type: note
    content: 2 Ch 6:41.
  - type: text
    content: Je revêtirai de salut ses sacrificateurs,
  - type: text
    content: Et ses fidèles pousseront des cris de joie.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Lu 1:69.
  - type: text
    content: Là j’élèverai la puissance de David,
  - type: text
    content: Je préparerai une lampe à mon oint,
  '18':
  - type: text
    content: Je revêtirai de honte ses ennemis,
  - type: text
    content: Et sur lui brillera sa couronne.
  '2':
  - type: text
    content: Il jura à l’Éternel,
  - type: text
    content: 'Il fit ce vœu au puissant de Jacob:'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 1 Ch 15:1.
  - type: text
    content: Je n’entrerai pas dans la tente où j’habite,
  - type: text
    content: Je ne monterai pas sur le lit où je repose,
  '4':
  - type: text
    content: Je ne donnerai ni sommeil à mes yeux,
  - type: text
    content: Ni assoupissement à mes paupières,
  '5':
  - type: text
    content: Jusqu’à ce que j’aie trouvé un lieu pour l’Éternel,
  - type: text
    content: Une demeure pour le puissant de Jacob.
  '6':
  - type: text
    content: Voici, nous en entendîmes parler à Éphrata,
  - type: text
    content: Nous la trouvâmes dans les champs de Jaar…
  '7':
  - type: text
    content: Allons à sa demeure,
  - type: text
    content: Prosternons-nous devant son marchepied!…
  '8':
  - type: text
    content: Lève-toi, Éternel, viens à ton lieu de repos,
  - type: text
    content: Toi et l’arche de ta majesté!
  '9':
  - type: text
    content: Que tes sacrificateurs soient revêtus de justice,
  - type: text
    content: Et que tes fidèles poussent des cris de joie!
