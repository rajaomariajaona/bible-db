document_id: PSA.132
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 2 Ch 6:3-17, 41, 42. És 32:8. Mt 6:33.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique des degrés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éternel, souviens-toi de David,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De toutes ses peines!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il jura à l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il fit ce vœu au puissant de Jacob:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 15:1
      metadata:
        usfm: 1CH.15.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je n’entrerai pas dans la tente où j’habite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne monterai pas sur le lit où je repose,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je ne donnerai ni sommeil à mes yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni assoupissement à mes paupières,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jusqu’à ce que j’aie trouvé un lieu pour l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une demeure pour le puissant de Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Voici, nous en entendîmes parler à Éphrata,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous la trouvâmes dans les champs de Jaar…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Allons à sa demeure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prosternons-nous devant son marchepied!…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lève-toi, Éternel, viens à ton lieu de repos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi et l’arche de ta majesté!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Que tes sacrificateurs soient revêtus de justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que tes fidèles poussent des cris de joie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: A cause de David, ton serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne repousse pas ton oint!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’Éternel a juré la vérité à David,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’en reviendra pas;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:12
      metadata:
        usfm: 2SA.7.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 8:25
      metadata:
        usfm: 1KI.8.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 6:16
      metadata:
        usfm: 2CH.6.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:69
      metadata:
        usfm: LUK.1.69
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je mettrai sur ton trône un fruit de tes entrailles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Si tes fils observent mon alliance
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mes préceptes que je leur enseigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs fils aussi pour toujours
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seront assis sur ton trône.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Oui, l’Éternel a choisi Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il l’a désirée pour sa demeure:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 68:17
      metadata:
        usfm: PSA.68.17
    - type: text
      text: ; v. 8.
    marker-yv: yv-n
  - type: text
    text: C’est mon lieu de repos à toujours;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’y habiterai, car je l’ai désirée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je bénirai sa nourriture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je rassasierai de pain ses indigents;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 6:41
      metadata:
        usfm: 2CH.6.41
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je revêtirai de salut ses sacrificateurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses fidèles pousseront des cris de joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:69
      metadata:
        usfm: LUK.1.69
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Là j’élèverai la puissance de David,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je préparerai une lampe à mon oint,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Je revêtirai de honte ses ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sur lui brillera sa couronne.
