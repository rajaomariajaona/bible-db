        usfm: JDG.21.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il n’y avait point de roi en Israël, un Lévite, qui séjournait à l’extrémité de la montagne d’Éphraïm, prit pour sa concubine une femme de Bethléhem de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sa concubine lui fit infidélité, et elle le quitta pour aller dans la maison de son père à Bethléhem de Juda, où elle resta l’espace de quatre mois. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Son mari se leva et alla vers elle, pour parler à son cœur et la ramener. Il avait avec lui son serviteur et deux ânes. Elle le fit entrer dans la maison de son père; et quand le père de la jeune femme le vit, il le reçut avec joie. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Son beau-père, le père de la jeune femme, le retint trois jours chez lui. Ils mangèrent et burent, et ils y passèrent la nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le quatrième jour, ils se levèrent de bon matin, et le Lévite se disposait à partir. Mais le père de la jeune femme dit à son gendre: Prends un morceau de pain pour fortifier ton cœur; vous partirez ensuite. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et ils s’assirent, et ils mangèrent et burent eux deux ensemble. Puis le père de la jeune femme dit au mari: Décide-toi donc à passer la nuit, et que ton cœur se réjouisse. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le mari se levait pour s’en aller; mais, sur les instances de son beau-père, il passa encore la nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le cinquième jour, il se leva de bon matin pour partir. Alors le père de la jeune femme dit: Fortifie ton cœur, je te prie; et restez jusqu’au déclin du jour. Et ils mangèrent eux deux. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le mari se levait pour s’en aller, avec sa concubine et son serviteur; mais son beau-père, le père de la jeune femme, lui dit: Voici, le jour baisse, il se fait tard, passez donc la nuit; voici, le jour est sur son déclin, passe ici la nuit, et que ton cœur se réjouisse; demain vous vous lèverez de bon matin pour vous mettre en route, et tu t’en iras à ta tente. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le mari ne voulut point passer la nuit, il se leva et partit. Il arriva jusque devant Jebus, qui est Jérusalem, avec les deux ânes bâtés et avec sa concubine. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lorsqu’ils furent près de Jebus, le jour avait beaucoup baissé. Le serviteur dit alors à son maître: Allons, dirigeons-nous vers cette ville des Jébusiens, et nous y passerons la nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Son maître lui répondit: Nous n’entrerons pas dans une ville d’étrangers, où il n’y a point d’enfants d’Israël, nous irons jusqu’à Guibea. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il dit encore à son serviteur: Allons, approchons-nous de l’un de ces lieux, Guibea ou Rama, et nous y passerons la nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils continuèrent à marcher, et le soleil se coucha quand ils furent près de Guibea, qui appartient à Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils se dirigèrent de ce côté pour aller passer la nuit à Guibea. Le Lévite entra, et il s’arrêta sur la place de la ville. Il n’y eut personne qui les reçût dans sa maison pour qu’ils y passassent la nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et voici, un vieillard revenait le soir de travailler aux champs; cet homme était de la montagne d’Éphraïm, il séjournait à Guibea, et les gens du lieu étaient Benjamites. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il leva les yeux, et vit le voyageur sur la place de la ville. Et le vieillard lui dit: Où vas-tu, et d’où viens-tu? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il lui répondit: Nous allons de Bethléhem de Juda jusqu’à l’extrémité de la montagne d’Éphraïm, d’où je suis. J’étais allé à Bethléhem de Juda, et je me rends à la maison de l’Éternel. Mais il n’y a personne qui me reçoive dans sa demeure. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nous avons cependant de la paille et du fourrage pour nos ânes; nous avons aussi du pain et du vin pour moi, pour ta servante, et pour le garçon qui est avec tes serviteurs. Il ne nous manque rien. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le vieillard dit: Que la paix soit avec toi! Je me charge de tous tes besoins, tu ne passeras pas la nuit sur la place. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il les fit entrer dans sa maison, et il donna du fourrage aux ânes. Les voyageurs se lavèrent les pieds; puis ils mangèrent et burent. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Pendant qu’ils étaient à se réjouir, voici, les hommes de la ville, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ge 19:4, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 9:9
      metadata:
        usfm: HOS.9.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:9
      metadata:
        usfm: HOS.10.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'gens pervers, entourèrent la maison, frappèrent à la porte, et dirent au vieillard, maître de la maison: Fais sortir l’homme qui est entré chez toi, pour que nous le connaissions. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Le maître de la maison, se présentant à eux, leur dit: Non, mes frères, ne faites pas le mal, je vous prie; puisque cet homme est entré dans ma maison, ne commettez pas cette infamie. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Voici, j’ai une fille vierge, et cet homme a une concubine; je vous les amènerai dehors; vous les déshonorerez, et vous leur ferez ce qu’il vous plaira. Mais ne commettez pas sur cet homme une action aussi infâme. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ces gens ne voulurent point l’écouter. Alors l’homme prit sa concubine, et la leur amena dehors. Ils la connurent, et ils abusèrent d’elle toute la nuit jusqu’au matin; puis ils la renvoyèrent au lever de l’aurore. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Vers le matin, cette femme alla tomber à l’entrée de la maison de l’homme chez qui était son mari, et elle resta là jusqu’au jour. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Et le matin, son mari se leva, ouvrit la porte de la maison, et sortit pour continuer son chemin. Mais voici, la femme, sa concubine, était étendue à l’entrée de la maison, les mains sur le seuil. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il lui dit: Lève-toi, et allons-nous-en. Elle ne répondit pas. Alors le mari la mit sur un âne, et partit pour aller dans sa demeure. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Arrivé chez lui, il prit un couteau, saisit sa concubine, et la coupa membre par membre en douze morceaux, qu’il envoya dans tout le territoire d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tous ceux qui virent cela dirent: Jamais rien de pareil n’est arrivé et ne s’est vu depuis que les enfants d’Israël sont montés du pays d’Égypte jusqu’à ce jour; prenez la chose à cœur, consultez-vous, et parlez!'
