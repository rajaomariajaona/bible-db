document_id: LEV.9,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Premiers sacrifices offerts par Aaron et ses fils
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-21: cf. Lé 8:14-21; 4:3-21. (Hé 5:1-4; 7:26-28.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le huitième jour, Moïse appela Aaron et ses fils, et les anciens d’Israël. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il brûla sur l’autel la graisse, les rognons, et le grand lobe du foie de la victime expiatoire, comme l’Éternel l’avait ordonné à Moïse. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il brûla au feu hors du camp la chair et la peau. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il égorgea l’holocauste. Les fils d’Aaron lui présentèrent le sang, et il le répandit sur l’autel tout autour. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui présentèrent l’holocauste coupé par morceaux, avec la tête, et il les brûla sur l’autel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lava les entrailles et les jambes, et il les brûla sur l’autel, par dessus l’holocauste. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ensuite, il offrit le sacrifice '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 4:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'du peuple. Il prit le bouc pour le sacrifice expiatoire du peuple, il l’égorgea, et l’offrit en expiation, comme la première victime. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il offrit l’holocauste, et le sacrifia, d’après les règles établies. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il présenta '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 2:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'l’offrande, en prit une poignée, et la brûla sur l’autel, outre '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex 29:38, etc.
      marker-yv: yv-n
    - type: text
      text: 'l’holocauste du matin. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il égorgea le bœuf et le bélier, en sacrifice d’actions de grâces pour le peuple. Les fils d’Aaron lui présentèrent le sang, et il le répandit sur l’autel tout autour. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui présentèrent la graisse du bœuf et du bélier, la queue, la graisse qui couvre les entrailles, les rognons, et le grand lobe du foie; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit à Aaron: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Prends un jeune veau pour le sacrifice d’expiation, et un bélier pour l’holocauste, l’un et l’autre sans défaut, et sacrifie-les devant l’Éternel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ils mirent les graisses sur les poitrines, et il brûla les graisses sur l’autel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aaron agita de côté et d’autre devant l’Éternel les poitrines et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 7:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: l’épaule droite, comme Moïse l’avait ordonné.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-24: cf. (No 6:22-27. 2 Ch 7:1-3.) (Lu 24:50-52.)'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aaron leva ses mains vers le peuple, et il le bénit. Puis il descendit, après avoir offert le sacrifice d’expiation, l’holocauste et le sacrifice d’actions de grâces. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse et Aaron entrèrent dans la tente d’assignation. Lorsqu’ils en sortirent, ils bénirent le peuple. Et la gloire de l’Éternel apparut à tout le peuple. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 18:38
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 7:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le feu sortit de devant l’Éternel, et consuma sur l’autel l’holocauste et les graisses. Tout le peuple le vit; et ils poussèrent des cris de joie, et se jetèrent sur leur face.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu parleras aux enfants d’Israël, et tu diras: Prenez un bouc, pour le sacrifice d’expiation, un veau et un agneau, âgés d’un an et sans défaut, pour l’holocauste; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'un bœuf et un bélier, pour le sacrifice d’actions de grâces, afin de les sacrifier devant l’Éternel; et une offrande pétrie à l’huile. Car aujourd’hui l’Éternel vous apparaîtra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils amenèrent devant la tente d’assignation ce que Moïse avait ordonné; et toute l’assemblée s’approcha, et se tint devant l’Éternel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse dit: Vous ferez ce que l’Éternel a ordonné; et la gloire de l’Éternel vous apparaîtra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse dit à Aaron: Approche-toi de l’autel; offre ton '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 16:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 7:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'sacrifice d’expiation et ton holocauste, et fais l’expiation pour toi et pour le peuple; offre aussi le sacrifice du peuple, et fais l’expiation pour lui, comme l’Éternel l’a ordonné. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aaron s’approcha de l’autel, et il égorgea le veau pour son sacrifice d’expiation. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils d’Aaron lui présentèrent le sang; il trempa son doigt dans le sang, en mit sur les cornes de l’autel, et répandit le sang au pied de l’autel. '
