document_id: EST.10,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Éloge de Mardochée
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-3: cf. (Ge 41:39-44; 45:4-11.) Da 6:1-4. Ps 122:8, 9.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi Assuérus imposa un tribut au pays et aux îles de la mer. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les faits concernant sa puissance et ses exploits, et les détails sur la grandeur à laquelle le roi éleva Mardochée, ne sont-ils pas écrits dans le livre des Chroniques des rois des Mèdes et des Perses? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car le Juif Mardochée était le premier après le roi Assuérus; considéré parmi les Juifs et aimé de la multitude de ses frères, il rechercha le bien de son peuple et parla pour le bonheur de toute sa race.
