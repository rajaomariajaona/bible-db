document_id: JOS.9,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ruse des Gabaonites
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-2: cf. Jos 11:16-20. És 8:9, 10.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A la nouvelle de ces choses, tous les rois qui étaient en deçà du Jourdain, dans la montagne et dans la vallée, et sur toute la côte de la grande mer, jusque près du Liban, les Héthiens, les Amoréens, les Cananéens, les Phéréziens, les Héviens et les Jébusiens, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 21:24
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 1:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'de la manière dont il a traité les deux rois des Amoréens au-delà du Jourdain, Sihon, roi de Hesbon, et Og, roi de Basan, qui était à Aschtaroth. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et nos anciens et tous les habitants de notre pays nous ont dit: Prenez avec vous des provisions pour le voyage, allez au-devant d’eux, et vous leur direz: Nous sommes vos serviteurs, et maintenant faites alliance avec nous. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici notre pain: il était encore chaud quand nous en avons fait provision dans nos maisons, le jour où nous sommes partis pour venir vers vous, et maintenant il est sec et en miettes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces outres à vin, que nous avons remplies toutes neuves, les voilà déchirées; nos vêtements et nos souliers se sont usés par l’excessive longueur de la marche. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes d’Israël prirent de leurs provisions, et ils ne consultèrent point l’Éternel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué fit la paix avec eux, et conclut une alliance par laquelle il devait leur laisser la vie, et les chefs de l’assemblée le leur jurèrent. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Trois jours après la conclusion de cette alliance, les enfants d’Israël apprirent qu’ils étaient leurs voisins, et qu’ils habitaient au milieu d’eux. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car les enfants d’Israël partirent, et arrivèrent à leurs villes le troisième jour; leurs villes étaient Gabaon, Kephira, Beéroth et Kirjath-Jearim. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ne les frappèrent point, parce que les chefs de l’assemblée leur avaient juré par l’Éternel, le Dieu d’Israël, de leur laisser la vie. Mais toute l’assemblée murmura contre les chefs. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et tous les chefs dirent à toute l’assemblée: Nous leur avons juré par l’Éternel, le Dieu d’Israël, et maintenant nous ne pouvons les toucher. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: s’unirent ensemble d’un commun accord pour combattre contre Josué et contre Israël.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 3-27: cf. Ge 27. (No 27:18, 21. Pr 3:5, 7. Jé 10:23.) (No 30:3. 2 S 21:1-14.)'
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici comment nous les traiterons: nous leur laisserons la vie, afin de ne pas attirer sur nous la colère de l’Éternel, à cause du serment que nous leur avons fait. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils vivront, leur dirent les chefs. Mais ils furent employés à couper le bois et à puiser l’eau pour toute l’assemblée, comme les chefs le leur avaient dit. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué les fit appeler, et leur parla ainsi: Pourquoi nous avez-vous trompés, en disant: Nous sommes très éloignés de vous, tandis que vous habitez au milieu de nous? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant vous êtes maudits, et vous ne cesserez point d’être dans la servitude, de couper le bois et de puiser l’eau pour la maison de mon Dieu. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils répondirent à Josué, et dirent: On avait rapporté à tes serviteurs les ordres de l’Éternel, ton Dieu, à Moïse, son serviteur, pour vous livrer tout le pays et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 7:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pour en détruire devant vous tous les habitants, et votre présence nous a inspiré une grande crainte pour notre vie: voilà pourquoi nous avons agi de la sorte. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et maintenant nous voici entre tes mains; traite-nous comme tu trouveras bon et juste de nous traiter. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué agit à leur égard comme il avait été décidé; il les délivra de la main des enfants d’Israël, qui ne les firent pas mourir; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais il les destina dès ce jour à couper le bois et à puiser l’eau pour l’assemblée, et pour l’autel de l’Éternel dans le lieu que l’Éternel choisirait: ce qu’ils font encore aujourd’hui.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les habitants de Gabaon, de leur côté, lorsqu’ils apprirent de quelle manière Josué avait traité Jéricho et Aï, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'eurent recours à la ruse, et se mirent en route avec des provisions de voyage. Ils prirent de vieux sacs pour leurs ânes, et de vieilles outres à vin déchirées et recousues, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ils portaient à leurs pieds de vieux souliers raccommodés, et sur eux de vieux vêtements; et tout le pain qu’ils avaient pour nourriture était sec et en miettes. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils allèrent auprès de Josué au camp de Guilgal, et ils lui dirent, ainsi qu’à tous ceux d’Israël: Nous venons d’un pays éloigné, et maintenant faites alliance avec nous. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes d’Israël répondirent à ces Héviens: Peut-être que vous habitez au milieu de nous, et comment ferions-nous alliance avec vous? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils dirent à Josué: Nous sommes tes serviteurs. Et Josué leur dit: Qui êtes-vous, et d’où venez-vous? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui répondirent: Tes serviteurs viennent d’un pays très éloigné, sur le renom de l’Éternel, ton Dieu; car nous avons entendu parler de lui, de tout ce qu’il a fait en Égypte, '
