document_id: JOS.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ruse des Gabaonites
  - type: heading
    content: 'V. 1-2: cf. Jos 11:16-20. És 8:9, 10.'
  - type: text
    content: 'A la nouvelle de ces choses, tous les rois qui étaient en deçà du Jourdain, dans la montagne et dans la vallée, et sur toute la côte de la grande mer, jusque près du Liban, les Héthiens, les Amoréens, les Cananéens, les Phéréziens, les Héviens et les Jébusiens, '
  '10':
  - type: text
    content: 'et '
  - type: note
    content: No 21:24, 33. De 1:4.
  - type: text
    content: 'de la manière dont il a traité les deux rois des Amoréens au-delà du Jourdain, Sihon, roi de Hesbon, et Og, roi de Basan, qui était à Aschtaroth. '
  '11':
  - type: text
    content: 'Et nos anciens et tous les habitants de notre pays nous ont dit: Prenez avec vous des provisions pour le voyage, allez au-devant d’eux, et vous leur direz: Nous sommes vos serviteurs, et maintenant faites alliance avec nous. '
  '12':
  - type: text
    content: 'Voici notre pain: il était encore chaud quand nous en avons fait provision dans nos maisons, le jour où nous sommes partis pour venir vers vous, et maintenant il est sec et en miettes. '
  '13':
  - type: text
    content: 'Ces outres à vin, que nous avons remplies toutes neuves, les voilà déchirées; nos vêtements et nos souliers se sont usés par l’excessive longueur de la marche. '
  '14':
  - type: text
    content: 'Les hommes d’Israël prirent de leurs provisions, et ils ne consultèrent point l’Éternel. '
  '15':
  - type: text
    content: 'Josué fit la paix avec eux, et conclut une alliance par laquelle il devait leur laisser la vie, et les chefs de l’assemblée le leur jurèrent. '
  '16':
  - type: text
    content: 'Trois jours après la conclusion de cette alliance, les enfants d’Israël apprirent qu’ils étaient leurs voisins, et qu’ils habitaient au milieu d’eux. '
  '17':
  - type: text
    content: 'Car les enfants d’Israël partirent, et arrivèrent à leurs villes le troisième jour; leurs villes étaient Gabaon, Kephira, Beéroth et Kirjath-Jearim. '
  '18':
  - type: text
    content: 'Ils ne les frappèrent point, parce que les chefs de l’assemblée leur avaient juré par l’Éternel, le Dieu d’Israël, de leur laisser la vie. Mais toute l’assemblée murmura contre les chefs. '
  '19':
  - type: text
    content: 'Et tous les chefs dirent à toute l’assemblée: Nous leur avons juré par l’Éternel, le Dieu d’Israël, et maintenant nous ne pouvons les toucher. '
  '2':
  - type: text
    content: s’unirent ensemble d’un commun accord pour combattre contre Josué et contre Israël.
  - type: heading
    content: 'V. 3-27: cf. Ge 27. (No 27:18, 21. Pr 3:5, 7. Jé 10:23.) (No 30:3. 2 S 21:1-14.)'
  '20':
  - type: text
    content: 'Voici comment nous les traiterons: nous leur laisserons la vie, afin de ne pas attirer sur nous la colère de l’Éternel, à cause du serment que nous leur avons fait. '
  '21':
  - type: text
    content: 'Ils vivront, leur dirent les chefs. Mais ils furent employés à couper le bois et à puiser l’eau pour toute l’assemblée, comme les chefs le leur avaient dit. '
  '22':
  - type: text
    content: 'Josué les fit appeler, et leur parla ainsi: Pourquoi nous avez-vous trompés, en disant: Nous sommes très éloignés de vous, tandis que vous habitez au milieu de nous? '
  '23':
  - type: text
    content: 'Maintenant vous êtes maudits, et vous ne cesserez point d’être dans la servitude, de couper le bois et de puiser l’eau pour la maison de mon Dieu. '
  '24':
  - type: text
    content: 'Ils répondirent à Josué, et dirent: On avait rapporté à tes serviteurs les ordres de l’Éternel, ton Dieu, à Moïse, son serviteur, pour vous livrer tout le pays et '
  - type: note
    content: De 7:1, 2.
  - type: text
    content: 'pour en détruire devant vous tous les habitants, et votre présence nous a inspiré une grande crainte pour notre vie: voilà pourquoi nous avons agi de la sorte. '
  '25':
  - type: text
    content: 'Et maintenant nous voici entre tes mains; traite-nous comme tu trouveras bon et juste de nous traiter. '
  '26':
  - type: text
    content: 'Josué agit à leur égard comme il avait été décidé; il les délivra de la main des enfants d’Israël, qui ne les firent pas mourir; '
  '27':
  - type: text
    content: 'mais il les destina dès ce jour à couper le bois et à puiser l’eau pour l’assemblée, et pour l’autel de l’Éternel dans le lieu que l’Éternel choisirait: ce qu’ils font encore aujourd’hui.'
  '3':
  - type: text
    content: 'Les habitants de Gabaon, de leur côté, lorsqu’ils apprirent de quelle manière Josué avait traité Jéricho et Aï, '
  '4':
  - type: text
    content: 'eurent recours à la ruse, et se mirent en route avec des provisions de voyage. Ils prirent de vieux sacs pour leurs ânes, et de vieilles outres à vin déchirées et recousues, '
  '5':
  - type: text
    content: 'ils portaient à leurs pieds de vieux souliers raccommodés, et sur eux de vieux vêtements; et tout le pain qu’ils avaient pour nourriture était sec et en miettes. '
  '6':
  - type: text
    content: 'Ils allèrent auprès de Josué au camp de Guilgal, et ils lui dirent, ainsi qu’à tous ceux d’Israël: Nous venons d’un pays éloigné, et maintenant faites alliance avec nous. '
  '7':
  - type: text
    content: 'Les hommes d’Israël répondirent à ces Héviens: Peut-être que vous habitez au milieu de nous, et comment ferions-nous alliance avec vous? '
  '8':
  - type: text
    content: 'Ils dirent à Josué: Nous sommes tes serviteurs. Et Josué leur dit: Qui êtes-vous, et d’où venez-vous? '
  '9':
  - type: text
    content: 'Ils lui répondirent: Tes serviteurs viennent d’un pays très éloigné, sur le renom de l’Éternel, ton Dieu; car nous avons entendu parler de lui, de tout ce qu’il a fait en Égypte, '
