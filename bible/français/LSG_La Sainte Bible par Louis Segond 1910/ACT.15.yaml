document_id: ACT.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Discussion dans l’Église d’Antioche relativement à l’observation des lois cérémonielles de Moïse par les païens qui embrassent le christianisme. — Conférence de Jérusalem
  - type: heading
    content: 'V. 1-12: cf. Ga 2:1-9. Ac 14:27.'
  - type: text
    content: 'Quelques hommes, venus de la Judée, enseignaient les frères, en disant: '
  - type: note
    content: Ga 5:3.
  - type: text
    content: 'Si vous n’êtes circoncis '
  - type: note
    content: Ge 17:10. Lé 12:3.
  - type: text
    content: 'selon le rite de Moïse, vous ne pouvez être sauvés. '
  '10':
  - type: text
    content: 'Maintenant donc, pourquoi tentez-vous Dieu, '
  - type: note
    content: Mt 23:4.
  - type: text
    content: 'en mettant sur le cou des disciples un joug que ni nos pères ni nous n’avons pu porter? '
  '11':
  - type: note
    content: Ép 2:8. Tit 3:4.
  - type: text
    content: 'Mais c’est par la grâce du Seigneur Jésus que nous croyons être sauvés, de la même manière qu’eux. '
  '12':
  - type: text
    content: Toute l’assemblée garda le silence, et l’on écouta Barnabas et Paul, qui racontèrent tous les miracles et les prodiges que Dieu avait faits par eux au milieu des païens.
  - type: heading
    content: 'V. 13-29: cf. Ro 15:8-12. (Col 2:11-17. Ga 5:1-6.) És 8:20. Ac 21:25.'
  '13':
  - type: text
    content: 'Lorsqu’ils eurent cessé de parler, Jacques prit la parole, et dit: Hommes frères, écoutez-moi! '
  '14':
  - type: text
    content: 'Simon a raconté comment Dieu a d’abord jeté les regards sur les nations pour choisir du milieu d’elles un peuple qui portât son nom. '
  '15':
  - type: text
    content: 'Et avec cela s’accordent les paroles des prophètes, selon qu’il est écrit:'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Am 9:11, 12.
  - type: text
    content: Après cela, je reviendrai, et je relèverai de sa chute la tente de David,
  - type: text
    content: J’en réparerai les ruines, et je la redresserai,
  '17':
  - type: text
    content: Afin que le reste des hommes cherche le Seigneur,
  - type: text
    content: Ainsi que toutes les nations sur lesquelles mon nom est invoqué,
  - type: text
    content: Dit le Seigneur, qui fait ces choses,
  '18':
  - type: text
    content: Et à qui elles sont connues de toute éternité.
  '19':
  - type: text
    content: 'C’est pourquoi je suis d’avis qu’on ne crée pas des difficultés à ceux des païens qui se convertissent à Dieu, '
  '2':
  - type: text
    content: 'Paul et Barnabas eurent avec eux un débat et une vive discussion; et les frères décidèrent que '
  - type: note
    content: Ga 2:1.
  - type: text
    content: 'Paul et Barnabas, et quelques-uns des leurs, monteraient à Jérusalem vers les apôtres et les anciens, pour traiter cette question. '
  '20':
  - type: text
    content: 'mais qu’on leur écrive de s’abstenir '
  - type: note
    content: Ex 20:3. 1 Co 8:1; 10:20.
  - type: text
    content: 'des souillures des idoles, '
  - type: note
    content: 1 Th 4:3.
  - type: text
    content: 'de l’impudicité, des animaux étouffés et '
  - type: note
    content: Ge 9:4.
  - type: text
    content: 'du sang. '
  '21':
  - type: text
    content: 'Car, depuis bien des générations, Moïse a dans chaque ville des gens qui le prêchent, puisqu’on le lit tous les jours de sabbat dans les synagogues. '
  '22':
  - type: text
    content: 'Alors il parut bon aux apôtres et aux anciens, et à toute l’Église, de choisir parmi eux et d’envoyer à Antioche, avec Paul et Barnabas, Jude appelé Barsabas et Silas, hommes considérés entre les frères. '
  '23':
  - type: text
    content: 'Ils les chargèrent d’une lettre ainsi conçue: Les apôtres, les anciens, et les frères, aux frères d’entre les païens, qui sont à Antioche, en Syrie, et en Cilicie, salut! '
  '24':
  - type: text
    content: 'Ayant appris '
  - type: note
    content: Ga 2:4.
  - type: text
    content: 'que quelques hommes partis de chez nous, et auxquels nous n’avions donné aucun ordre, vous ont troublés par leurs discours et ont ébranlé vos âmes, '
  '25':
  - type: text
    content: 'nous avons jugé à propos, après nous être réunis tous ensemble, de choisir des délégués et de vous les envoyer avec nos bien-aimés Barnabas et Paul, '
  '26':
  - type: text
    content: 'ces hommes '
  - type: note
    content: Ac 13:50; 14:9.
  - type: text
    content: 'qui ont exposé leur vie pour le nom de notre Seigneur Jésus-Christ. '
  '27':
  - type: text
    content: 'Nous avons donc envoyé Jude et Silas, qui vous annonceront de leur bouche les mêmes choses. '
  '28':
  - type: text
    content: 'Car il a paru bon au Saint-Esprit et à nous de ne vous imposer d’autre charge que ce qui est nécessaire, '
  '29':
  - type: text
    content: 'savoir, '
  - type: note
    content: Ex 20:3. 1 Co 8:1.
  - type: text
    content: 'de vous abstenir des viandes sacrifiées aux idoles, '
  - type: note
    content: Ge 9:4. Lé 17:14.
  - type: text
    content: 'du sang, des animaux étouffés, et '
  - type: note
    content: 1 Th 4:3.
  - type: text
    content: de l’impudicité, choses contre lesquelles vous vous trouverez bien de vous tenir en garde. Adieu.
  - type: heading
    content: 'V. 30-35: cf. Ép 2:17-19. Ga 2:11-21. 1 Pi 4:10, 11.'
  '3':
  - type: text
    content: 'Après avoir été accompagnés par l’Église, ils poursuivirent leur route à travers la Phénicie et la Samarie, racontant la conversion des païens, et ils causèrent une grande joie à tous les frères. '
  '30':
  - type: text
    content: 'Eux donc, ayant pris congé de l’Église, allèrent à Antioche, où ils remirent la lettre à la multitude assemblée. '
  '31':
  - type: text
    content: 'Après l’avoir lue, les frères furent réjouis de l’encouragement qu’elle leur apportait. '
  '32':
  - type: text
    content: 'Jude et Silas, qui étaient eux-mêmes prophètes, les exhortèrent et les fortifièrent par plusieurs discours. '
  '33':
  - type: text
    content: 'Au bout de quelque temps, les frères les laissèrent en paix retourner vers ceux qui les avaient envoyés. '
  '34':
  - type: text
    content: 'Toutefois Silas trouva bon de rester. '
  '35':
  - type: text
    content: Paul et Barnabas demeurèrent à Antioche, enseignant et annonçant, avec plusieurs autres, la bonne nouvelle de la parole du Seigneur.
  - type: heading
    content: Nouveau voyage missionnaire de Paul, accompagné de Silas. Visite aux Églises d’Asie
  - type: heading
    content: 'V. 36-41: cf. 2 Co 11:28. Ro 15:29. Ja 3:18. Hé 13:18.'
  '36':
  - type: text
    content: 'Quelques jours s’écoulèrent, après lesquels Paul dit à Barnabas: Retournons visiter les frères dans toutes les villes où nous avons annoncé la parole du Seigneur, pour voir en quel état ils sont. '
  '37':
  - type: text
    content: 'Barnabas voulait emmener aussi Jean, surnommé '
  - type: note
    content: Ac 12:12, 25. Col 4:10. 2 Ti 4:11. Phm v. 24.
  - type: text
    content: 'Marc; '
  '38':
  - type: text
    content: 'mais Paul jugea plus convenable de ne pas prendre avec eux celui qui les avait quittés depuis la Pamphylie, et qui ne les avait point accompagnés dans leur œuvre. '
  '39':
  - type: text
    content: 'Ce dissentiment fut assez vif pour être cause qu’ils se séparèrent l’un de l’autre. Et Barnabas, prenant Marc avec lui, s’embarqua pour l’île de Chypre. '
  '4':
  - type: text
    content: 'Arrivés à Jérusalem, ils furent reçus par l’Église, les apôtres et les anciens, et ils racontèrent tout ce que Dieu avait fait avec eux. '
  '40':
  - type: text
    content: 'Paul fit choix de Silas, et partit, recommandé par les frères à la grâce du Seigneur. '
  '41':
  - type: text
    content: Il parcourut la Syrie et la Cilicie, fortifiant les Églises.
  '5':
  - type: text
    content: 'Alors quelques-uns du parti des pharisiens, qui avaient cru, se levèrent, en disant qu’il fallait circoncire les païens et exiger l’observation de la loi de Moïse. '
  '6':
  - type: text
    content: 'Les apôtres et les anciens se réunirent pour examiner cette affaire. '
  '7':
  - type: text
    content: 'Une grande discussion s’étant engagée, Pierre se leva, et leur dit: '
  - type: note
    content: Ac 10:20; 11:12.
  - type: text
    content: 'Hommes frères, vous savez que dès longtemps Dieu a fait un choix parmi vous, afin que, par ma bouche, les païens entendissent la parole de l’Évangile et qu’ils crussent. '
  '8':
  - type: text
    content: 'Et Dieu, '
  - type: note
    content: 1 Ch 28:9; 29:17. Ps 7:10. Jé 11:20; 17:10; 20:12.
  - type: text
    content: 'qui connaît les cœurs, leur a rendu témoignage, en leur donnant le Saint-Esprit comme à nous; '
  '9':
  - type: note
    content: Ac 10:43, 44, etc.
  - type: text
    content: 'il n’a fait aucune différence entre nous et eux, ayant purifié leurs cœurs par la foi. '
