document_id: ACT.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Discussion dans l’Église d’Antioche relativement à l’observation des lois cérémonielles de Moïse par les païens qui embrassent le christianisme. — Conférence de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-12: cf. Ga 2:1-9. Ac 14:27.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quelques hommes, venus de la Judée, enseignaient les frères, en disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:3
      metadata:
        usfm: GAL.5.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si vous n’êtes circoncis '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 17:10
      metadata:
        usfm: GEN.17.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 12:3
      metadata:
        usfm: LEV.12.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'selon le rite de Moïse, vous ne pouvez être sauvés. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Paul et Barnabas eurent avec eux un débat et une vive discussion; et les frères décidèrent que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 2:1
      metadata:
        usfm: GAL.2.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Paul et Barnabas, et quelques-uns des leurs, monteraient à Jérusalem vers les apôtres et les anciens, pour traiter cette question. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Après avoir été accompagnés par l’Église, ils poursuivirent leur route à travers la Phénicie et la Samarie, racontant la conversion des païens, et ils causèrent une grande joie à tous les frères. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Arrivés à Jérusalem, ils furent reçus par l’Église, les apôtres et les anciens, et ils racontèrent tout ce que Dieu avait fait avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors quelques-uns du parti des pharisiens, qui avaient cru, se levèrent, en disant qu’il fallait circoncire les païens et exiger l’observation de la loi de Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les apôtres et les anciens se réunirent pour examiner cette affaire. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Une grande discussion s’étant engagée, Pierre se leva, et leur dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:20
      metadata:
        usfm: ACT.10.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:12
      metadata:
        usfm: ACT.11.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Hommes frères, vous savez que dès longtemps Dieu a fait un choix parmi vous, afin que, par ma bouche, les païens entendissent la parole de l’Évangile et qu’ils crussent. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 28:9
      metadata:
        usfm: 1CH.28.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:17
      metadata:
        usfm: 1CH.29.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 7:10
      metadata:
        usfm: PSA.7.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 11:20
      metadata:
        usfm: JER.11.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:10
      metadata:
        usfm: JER.17.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:12
      metadata:
        usfm: JER.20.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui connaît les cœurs, leur a rendu témoignage, en leur donnant le Saint-Esprit comme à nous; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ac 10:43, 44, etc.
    marker-yv: yv-n
  - type: text
    text: 'il n’a fait aucune différence entre nous et eux, ayant purifié leurs cœurs par la foi. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Maintenant donc, pourquoi tentez-vous Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 23:4
      metadata:
        usfm: MAT.23.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en mettant sur le cou des disciples un joug que ni nos pères ni nous n’avons pu porter? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 2:8
      metadata:
        usfm: EPH.2.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 3:4
      metadata:
        usfm: TIT.3.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais c’est par la grâce du Seigneur Jésus que nous croyons être sauvés, de la même manière qu’eux. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Toute l’assemblée garda le silence, et l’on écouta Barnabas et Paul, qui racontèrent tous les miracles et les prodiges que Dieu avait faits par eux au milieu des païens.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-29: cf. Ro 15:8-12. (Col 2:11-17. Ga 5:1-6.) És 8:20. Ac 21:25.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Lorsqu’ils eurent cessé de parler, Jacques prit la parole, et dit: Hommes frères, écoutez-moi! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Simon a raconté comment Dieu a d’abord jeté les regards sur les nations pour choisir du milieu d’elles un peuple qui portât son nom. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et avec cela s’accordent les paroles des prophètes, selon qu’il est écrit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 9:11
      metadata:
        usfm: AMO.9.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: AMO.9.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Après cela, je reviendrai, et je relèverai de sa chute la tente de David,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’en réparerai les ruines, et je la redresserai,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Afin que le reste des hommes cherche le Seigneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi que toutes les nations sur lesquelles mon nom est invoqué,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Seigneur, qui fait ces choses,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Et à qui elles sont connues de toute éternité.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'C’est pourquoi je suis d’avis qu’on ne crée pas des difficultés à ceux des païens qui se convertissent à Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'mais qu’on leur écrive de s’abstenir '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:3
      metadata:
        usfm: EXO.20.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 8:1
      metadata:
        usfm: 1CO.8.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:20
      metadata:
        usfm: 1CO.10.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des souillures des idoles, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 4:3
      metadata:
        usfm: 1TH.4.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de l’impudicité, des animaux étouffés et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 9:4
      metadata:
        usfm: GEN.9.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'du sang. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Car, depuis bien des générations, Moïse a dans chaque ville des gens qui le prêchent, puisqu’on le lit tous les jours de sabbat dans les synagogues. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Alors il parut bon aux apôtres et aux anciens, et à toute l’Église, de choisir parmi eux et d’envoyer à Antioche, avec Paul et Barnabas, Jude appelé Barsabas et Silas, hommes considérés entre les frères. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ils les chargèrent d’une lettre ainsi conçue: Les apôtres, les anciens, et les frères, aux frères d’entre les païens, qui sont à Antioche, en Syrie, et en Cilicie, salut! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ayant appris '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 2:4
      metadata:
        usfm: GAL.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que quelques hommes partis de chez nous, et auxquels nous n’avions donné aucun ordre, vous ont troublés par leurs discours et ont ébranlé vos âmes, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'nous avons jugé à propos, après nous être réunis tous ensemble, de choisir des délégués et de vous les envoyer avec nos bien-aimés Barnabas et Paul, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ces hommes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 13:50
      metadata:
        usfm: ACT.13.50
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:9
      metadata:
        usfm: ACT.14.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui ont exposé leur vie pour le nom de notre Seigneur Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nous avons donc envoyé Jude et Silas, qui vous annonceront de leur bouche les mêmes choses. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Car il a paru bon au Saint-Esprit et à nous de ne vous imposer d’autre charge que ce qui est nécessaire, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'savoir, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:3
      metadata:
        usfm: EXO.20.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 8:1
      metadata:
        usfm: 1CO.8.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de vous abstenir des viandes sacrifiées aux idoles, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 9:4
      metadata:
        usfm: GEN.9.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 17:14
      metadata:
        usfm: LEV.17.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'du sang, des animaux étouffés, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 4:3
      metadata:
        usfm: 1TH.4.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: de l’impudicité, choses contre lesquelles vous vous trouverez bien de vous tenir en garde. Adieu.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 30-35: cf. Ép 2:17-19. Ga 2:11-21. 1 Pi 4:10, 11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Eux donc, ayant pris congé de l’Église, allèrent à Antioche, où ils remirent la lettre à la multitude assemblée. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Après l’avoir lue, les frères furent réjouis de l’encouragement qu’elle leur apportait. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jude et Silas, qui étaient eux-mêmes prophètes, les exhortèrent et les fortifièrent par plusieurs discours. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Au bout de quelque temps, les frères les laissèrent en paix retourner vers ceux qui les avaient envoyés. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Toutefois Silas trouva bon de rester. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Paul et Barnabas demeurèrent à Antioche, enseignant et annonçant, avec plusieurs autres, la bonne nouvelle de la parole du Seigneur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nouveau voyage missionnaire de Paul, accompagné de Silas. Visite aux Églises d’Asie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 36-41: cf. 2 Co 11:28. Ro 15:29. Ja 3:18. Hé 13:18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Quelques jours s’écoulèrent, après lesquels Paul dit à Barnabas: Retournons visiter les frères dans toutes les villes où nous avons annoncé la parole du Seigneur, pour voir en quel état ils sont. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Barnabas voulait emmener aussi Jean, surnommé '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 12:12
      metadata:
        usfm: ACT.12.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: ACT.12.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 4:10
      metadata:
        usfm: COL.4.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 4:11
      metadata:
        usfm: 2TI.4.11
    - type: text
      text: . Phm v. 24.
    marker-yv: yv-n
  - type: text
    text: 'Marc; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'mais Paul jugea plus convenable de ne pas prendre avec eux celui qui les avait quittés depuis la Pamphylie, et qui ne les avait point accompagnés dans leur œuvre. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ce dissentiment fut assez vif pour être cause qu’ils se séparèrent l’un de l’autre. Et Barnabas, prenant Marc avec lui, s’embarqua pour l’île de Chypre. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Paul fit choix de Silas, et partit, recommandé par les frères à la grâce du Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Il parcourut la Syrie et la Cilicie, fortifiant les Églises.
