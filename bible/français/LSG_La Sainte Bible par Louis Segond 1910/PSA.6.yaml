document_id: PSA.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 38; 143; 69:30.
  - type: text
    content: Au chef des chantres. Avec instruments à cordes. Sur la harpe à huit cordes. Psaume de David.
  '10':
  - type: text
    content: L’Éternel exauce mes supplications,
  - type: text
    content: L’Éternel accueille ma prière.
  '11':
  - type: text
    content: Tous mes ennemis sont confondus, saisis d’épouvante;
  - type: text
    content: Ils reculent, soudain couverts de honte.
  '2':
  - type: text
    content: 'Éternel! '
  - type: note
    content: Ps 38:2.
  - type: text
    content: ne me punis pas dans ta colère,
  - type: text
    content: Et ne me châtie pas dans ta fureur.
  '3':
  - type: text
    content: Aie pitié de moi, Éternel! Car je suis sans force;
  - type: text
    content: Guéris-moi, Éternel! Car mes os sont tremblants.
  '4':
  - type: text
    content: Mon âme est toute troublée;
  - type: text
    content: Et toi, Éternel! Jusques à quand?…
  '5':
  - type: text
    content: Reviens, Éternel! Délivre mon âme;
  - type: text
    content: Sauve-moi, à cause de ta miséricorde.
  '6':
  - type: text
    content: Car celui qui meurt n’a plus ton souvenir;
  - type: text
    content: Qui te louera dans le séjour des morts?
  '7':
  - type: text
    content: Je m’épuise à force de gémir;
  - type: text
    content: Chaque nuit ma couche est baignée de mes larmes,
  - type: text
    content: Mon lit est arrosé de mes pleurs.
  '8':
  - type: text
    content: J’ai le visage usé par le chagrin;
  - type: text
    content: Tous ceux qui me persécutent le font vieillir.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Mt 7:23; 25:41. Lu 13:27.
  - type: text
    content: Éloignez-vous de moi, vous tous qui faites le mal!
  - type: text
    content: Car l’Éternel entend la voix de mes larmes;
