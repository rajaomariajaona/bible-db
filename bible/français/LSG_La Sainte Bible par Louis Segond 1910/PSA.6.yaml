document_id: PSA.6,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 38; 143; 69:30.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef des chantres. Avec instruments à cordes. Sur la harpe à huit cordes. Psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: L’Éternel exauce mes supplications,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel accueille ma prière.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tous mes ennemis sont confondus, saisis d’épouvante;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils reculent, soudain couverts de honte.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Éternel! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 38:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ne me punis pas dans ta colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne me châtie pas dans ta fureur.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Aie pitié de moi, Éternel! Car je suis sans force;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Guéris-moi, Éternel! Car mes os sont tremblants.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mon âme est toute troublée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toi, Éternel! Jusques à quand?…
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Reviens, Éternel! Délivre mon âme;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sauve-moi, à cause de ta miséricorde.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Car celui qui meurt n’a plus ton souvenir;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui te louera dans le séjour des morts?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Je m’épuise à force de gémir;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chaque nuit ma couche est baignée de mes larmes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon lit est arrosé de mes pleurs.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: J’ai le visage usé par le chagrin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui me persécutent le font vieillir.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 7:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:41
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 13:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Éloignez-vous de moi, vous tous qui faites le mal!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel entend la voix de mes larmes;
