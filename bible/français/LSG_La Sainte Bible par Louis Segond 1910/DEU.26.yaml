document_id: DEU.26,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les prémices
  - type: heading
    content: 'V. 1-11: cf. (Ex 23:19. Pr 3:9, 10.) (De 5:15; 7:18, 19; 8:2, 10.) (Ps 103:1, 2. 1 Ti 4:4, 5.)'
  - type: text
    content: 'Lorsque tu seras entré dans le pays que l’Éternel, ton Dieu, te donne pour héritage, lorsque tu le posséderas et y seras établi, '
  '10':
  - type: text
    content: 'Maintenant voici, j’apporte les prémices des fruits du sol que tu m’as donné, ô Éternel! Tu les déposeras devant l’Éternel, ton Dieu, et tu te prosterneras devant l’Éternel, ton Dieu. '
  '11':
  - type: text
    content: Puis tu te réjouiras, avec le Lévite et avec l’étranger qui sera au milieu de toi, pour tous les biens que l’Éternel, ton Dieu, t’a donnés, à toi et à ta maison.
  - type: heading
    content: Les dîmes de la troisième année
  - type: heading
    content: 'V. 12-15: cf. De 14:22-29; 11:12-14.'
  '12':
  - type: text
    content: 'Lorsque tu auras achevé de lever '
  - type: note
    content: Lé 27:30. No 18:24.
  - type: text
    content: 'toute la dîme de tes produits, la troisième année, l’année de la dîme, tu la donneras au Lévite, à l’étranger, à l’orphelin et à la veuve; et ils mangeront et se rassasieront, dans tes portes. '
  '13':
  - type: text
    content: 'Tu diras devant l’Éternel, ton Dieu: J’ai ôté de ma maison ce qui est consacré, et je l’ai donné au Lévite, à l’étranger, à l’orphelin et à la veuve, '
  - type: note
    content: De 14:27.
  - type: text
    content: 'selon tous les ordres que tu m’as prescrits; je n’ai transgressé ni oublié aucun de tes commandements. '
  '14':
  - type: text
    content: 'Je n’ai rien mangé de ces choses pendant mon deuil, je n’en ai rien fait disparaître pour un usage impur, et je n’en ai rien donné à l’occasion d’un mort; j’ai obéi à la voix de l’Éternel, mon Dieu, j’ai agi selon tous les ordres que tu m’as prescrits. '
  '15':
  - type: text
    content: Regarde de ta demeure sainte, des cieux, et bénis ton peuple d’Israël et le pays que tu nous as donné, comme tu l’avais juré à nos pères, ce pays où coulent le lait et le miel.
  - type: heading
    content: 'V. 16-19: cf. Ex 19:4-8. 1 Pi 2:9.'
  '16':
  - type: text
    content: 'Aujourd’hui, l’Éternel, ton Dieu, te commande de mettre en pratique ces lois et ces ordonnances; tu les observeras et tu les mettras en pratique de tout ton cœur et de toute ton âme. '
  '17':
  - type: text
    content: 'Aujourd’hui, '
  - type: note
    content: Ge 17:7.
  - type: text
    content: 'tu as fait promettre à l’Éternel qu’il sera ton Dieu, afin que tu marches dans ses voies, que tu observes ses lois, ses commandements et ses ordonnances, et que tu obéisses à sa voix. '
  '18':
  - type: text
    content: 'Et aujourd’hui, l’Éternel t’a fait promettre que tu seras '
  - type: note
    content: Ex 19:5. De 7:6; 14:2.
  - type: text
    content: 'un peuple qui lui appartiendra, comme il te l’a dit, et que tu observeras tous ses commandements, '
  '19':
  - type: note
    content: De 4:7.
  - type: text
    content: afin qu’il te donne sur toutes les nations qu’il a créées la supériorité en gloire, en renom et en magnificence, et afin que tu sois un peuple saint pour l’Éternel, ton Dieu, comme il te l’a dit.
  '2':
  - type: text
    content: 'tu prendras '
  - type: note
    content: Ex 23:19; 34:26. Lé 2:14; 23:10. No 15:17.
  - type: text
    content: 'des prémices de tous les fruits que tu retireras du sol dans le pays que l’Éternel, ton Dieu, te donne, tu les mettras dans une corbeille, et tu iras au lieu que choisira l’Éternel, ton Dieu, pour y faire résider son nom. '
  '3':
  - type: text
    content: 'Tu te présenteras au sacrificateur alors en fonction, et tu lui diras: Je déclare aujourd’hui à l’Éternel, ton Dieu, que je suis entré dans le pays que l’Éternel a juré à nos pères de nous donner. '
  '4':
  - type: text
    content: 'Le sacrificateur recevra la corbeille de ta main, et la déposera devant l’autel de l’Éternel, ton Dieu. '
  '5':
  - type: text
    content: 'Tu prendras encore la parole, et tu diras devant l’Éternel, ton Dieu: Mon père était un Araméen nomade; il '
  - type: note
    content: Ge 46:1.
  - type: text
    content: 'descendit en Égypte avec peu de gens, et il y fixa son séjour; là, il devint une nation grande, puissante et nombreuse. '
  '6':
  - type: text
    content: 'Les Égyptiens nous maltraitèrent et nous opprimèrent, et ils nous soumirent à une dure servitude. '
  '7':
  - type: text
    content: 'Nous criâmes à l’Éternel, le Dieu de nos pères. L’Éternel '
  - type: note
    content: Ex 2:23.
  - type: text
    content: 'entendit notre voix, et il vit notre oppression, nos peines et nos misères. '
  '8':
  - type: text
    content: 'Et l’Éternel nous fit sortir d’Égypte, à main forte et à bras étendu, avec des prodiges de terreur, avec des signes et des miracles. '
  '9':
  - type: text
    content: 'Il nous a conduits dans ce lieu, et il nous a donné ce pays, pays où coulent le lait et le miel. '
