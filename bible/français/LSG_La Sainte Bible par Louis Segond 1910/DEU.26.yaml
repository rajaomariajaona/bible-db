document_id: DEU.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les prémices
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. (Ex 23:19. Pr 3:9, 10.) (De 5:15; 7:18, 19; 8:2, 10.) (Ps 103:1, 2. 1 Ti 4:4, 5.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque tu seras entré dans le pays que l’Éternel, ton Dieu, te donne pour héritage, lorsque tu le posséderas et y seras établi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'tu prendras '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:19
      metadata:
        usfm: EXO.23.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:26
      metadata:
        usfm: EXO.34.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 2:14
      metadata:
        usfm: LEV.2.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:10
      metadata:
        usfm: LEV.23.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 15:17
      metadata:
        usfm: NUM.15.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des prémices de tous les fruits que tu retireras du sol dans le pays que l’Éternel, ton Dieu, te donne, tu les mettras dans une corbeille, et tu iras au lieu que choisira l’Éternel, ton Dieu, pour y faire résider son nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu te présenteras au sacrificateur alors en fonction, et tu lui diras: Je déclare aujourd’hui à l’Éternel, ton Dieu, que je suis entré dans le pays que l’Éternel a juré à nos pères de nous donner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le sacrificateur recevra la corbeille de ta main, et la déposera devant l’autel de l’Éternel, ton Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu prendras encore la parole, et tu diras devant l’Éternel, ton Dieu: Mon père était un Araméen nomade; il '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 46:1
      metadata:
        usfm: GEN.46.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'descendit en Égypte avec peu de gens, et il y fixa son séjour; là, il devint une nation grande, puissante et nombreuse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les Égyptiens nous maltraitèrent et nous opprimèrent, et ils nous soumirent à une dure servitude. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nous criâmes à l’Éternel, le Dieu de nos pères. L’Éternel '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 2:23
      metadata:
        usfm: EXO.2.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'entendit notre voix, et il vit notre oppression, nos peines et nos misères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et l’Éternel nous fit sortir d’Égypte, à main forte et à bras étendu, avec des prodiges de terreur, avec des signes et des miracles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il nous a conduits dans ce lieu, et il nous a donné ce pays, pays où coulent le lait et le miel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Maintenant voici, j’apporte les prémices des fruits du sol que tu m’as donné, ô Éternel! Tu les déposeras devant l’Éternel, ton Dieu, et tu te prosterneras devant l’Éternel, ton Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Puis tu te réjouiras, avec le Lévite et avec l’étranger qui sera au milieu de toi, pour tous les biens que l’Éternel, ton Dieu, t’a donnés, à toi et à ta maison.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les dîmes de la troisième année
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-15: cf. De 14:22-29; 11:12-14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsque tu auras achevé de lever '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 27:30
      metadata:
        usfm: LEV.27.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 18:24
      metadata:
        usfm: NUM.18.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'toute la dîme de tes produits, la troisième année, l’année de la dîme, tu la donneras au Lévite, à l’étranger, à l’orphelin et à la veuve; et ils mangeront et se rassasieront, dans tes portes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu diras devant l’Éternel, ton Dieu: J’ai ôté de ma maison ce qui est consacré, et je l’ai donné au Lévite, à l’étranger, à l’orphelin et à la veuve, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 14:27
      metadata:
        usfm: DEU.14.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'selon tous les ordres que tu m’as prescrits; je n’ai transgressé ni oublié aucun de tes commandements. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je n’ai rien mangé de ces choses pendant mon deuil, je n’en ai rien fait disparaître pour un usage impur, et je n’en ai rien donné à l’occasion d’un mort; j’ai obéi à la voix de l’Éternel, mon Dieu, j’ai agi selon tous les ordres que tu m’as prescrits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Regarde de ta demeure sainte, des cieux, et bénis ton peuple d’Israël et le pays que tu nous as donné, comme tu l’avais juré à nos pères, ce pays où coulent le lait et le miel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-19: cf. Ex 19:4-8. 1 Pi 2:9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aujourd’hui, l’Éternel, ton Dieu, te commande de mettre en pratique ces lois et ces ordonnances; tu les observeras et tu les mettras en pratique de tout ton cœur et de toute ton âme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Aujourd’hui, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 17:7
      metadata:
        usfm: GEN.17.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tu as fait promettre à l’Éternel qu’il sera ton Dieu, afin que tu marches dans ses voies, que tu observes ses lois, ses commandements et ses ordonnances, et que tu obéisses à sa voix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et aujourd’hui, l’Éternel t’a fait promettre que tu seras '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 19:5
      metadata:
        usfm: EXO.19.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:6
      metadata:
        usfm: DEU.7.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:2
      metadata:
        usfm: DEU.14.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un peuple qui lui appartiendra, comme il te l’a dit, et que tu observeras tous ses commandements, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:7
      metadata:
        usfm: DEU.4.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: afin qu’il te donne sur toutes les nations qu’il a créées la supériorité en gloire, en renom et en magnificence, et afin que tu sois un peuple saint pour l’Éternel, ton Dieu, comme il te l’a dit.
