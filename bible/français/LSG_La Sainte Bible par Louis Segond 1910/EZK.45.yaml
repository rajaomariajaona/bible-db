document_id: EZK.45
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Partage du pays
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. Éz 48:8-22.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque vous partagerez le pays en héritage par le sort, vous prélèverez comme une sainte offrande pour l’Éternel une portion du pays, longue de vingt-cinq mille cannes et large de dix mille; elle sera sainte dans toute son étendue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'De cette portion vous prendrez pour le sanctuaire cinq cents cannes sur cinq cents en carré, et cinquante coudées pour un espace libre tout autour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Sur cette étendue de vingt-cinq mille cannes en longueur et dix mille en largeur, tu mesureras un emplacement pour le sanctuaire, pour le lieu très saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'C’est la portion sainte du pays; elle appartiendra aux sacrificateurs qui font le service du sanctuaire, qui s’approchent de l’Éternel pour le servir; c’est là que seront leurs maisons, et ce sera un sanctuaire pour le sanctuaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Vingt-cinq mille cannes en longueur et dix mille en largeur formeront la propriété des Lévites, serviteurs de la maison, avec vingt chambres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Comme propriété de la ville vous destinerez cinq mille cannes en largeur et vingt-cinq mille en longueur, parallèlement à la portion sainte prélevée; ce sera pour toute la maison d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Pour le prince vous réserverez un espace aux deux côtés de la portion sainte et de la propriété de la ville, le long de la portion sainte et le long de la propriété de la ville, du côté de l’occident vers l’occident et du côté de l’orient vers l’orient, sur une longueur parallèle à l’une des parts, depuis la limite de l’occident jusqu’à la limite de l’orient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ce sera sa terre, sa propriété en Israël; et mes princes n’opprimeront plus mon peuple, mais ils laisseront le pays à la maison d’Israël, selon ses tribus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les poids justes. Les offrandes
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-17: cf. Jé 22:1-5. Lé 19:35-37.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel: Assez, princes d’Israël! Cessez la violence et les rapines, pratiquez la droiture et la justice, délivrez mon peuple de vos exactions, dit le Seigneur, l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ayez des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:35
      metadata:
        usfm: LEV.19.35
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '36'
      metadata:
        usfm: LEV.19.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'balances justes, un épha juste, et un bath juste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’épha et le bath auront la même mesure: le bath contiendra la dixième partie d’un homer, et l’épha la dixième partie d’un homer; leur mesure sera réglée d’après le homer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 30:13
      metadata:
        usfm: EXO.30.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 27:25
      metadata:
        usfm: LEV.27.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 3:47
      metadata:
        usfm: NUM.3.47
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sicle sera de vingt guéras. La mine aura chez vous vingt sicles, vingt-cinq sicles, quinze sicles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici l’offrande que vous prélèverez; la sixième partie d’un épha sur un homer de froment, et la sixième partie d’un épha sur un homer d’orge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ce que vous devrez pour l’huile, pour un bath d’huile, sera la dixième partie d’un bath sur un cor, qui est égal à un homer de dix baths, car dix baths font un homer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Une brebis sur un troupeau de deux cents dans les gras pâturages d’Israël sera donnée pour l’offrande, l’holocauste et le sacrifice d’actions de grâces, afin de servir de victime expiatoire, dit le Seigneur, l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tout le peuple du pays devra prélever cette offrande pour le prince d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Le prince sera chargé des holocaustes, des offrandes et des libations, aux fêtes, aux nouvelles lunes, aux sabbats, à toutes les solennités de la maison d’Israël; il offrira le sacrifice expiatoire, l’offrande, l’holocauste, et le sacrifice d’actions de grâces, en expiation pour la maison d’Israël.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-25: cf. (Ex 12:1-30. De 16:1-8. No 28:16-25.) Lé 23:33, etc.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel: Le premier jour du premier mois, tu prendras un jeune taureau sans défaut, et tu feras l’expiation du sanctuaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le sacrificateur prendra du sang de la victime expiatoire, et il en mettra sur les poteaux de la maison, sur les quatre angles de l’encadrement de l’autel, et sur les poteaux de la porte du parvis intérieur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tu feras de même le septième jour du mois, pour ceux qui pèchent involontairement ou par imprudence; vous purifierez ainsi la maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:3
      metadata:
        usfm: EXO.12.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:15
      metadata:
        usfm: EXO.23.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 23:5
      metadata:
        usfm: LEV.23.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 9:3
      metadata:
        usfm: NUM.9.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:16
      metadata:
        usfm: NUM.28.16
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '17'
      metadata:
        usfm: NUM.28.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 16:1
      metadata:
        usfm: DEU.16.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le quatorzième jour du premier mois, vous aurez la Pâque. La fête durera sept jours; on mangera des pains sans levain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le prince offrira ce jour-là, pour lui et pour tout le peuple du pays, un taureau en sacrifice d’expiation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Pendant les sept jours de la fête, il offrira en holocauste à l’Éternel sept taureaux et sept béliers sans défaut, chacun des sept jours, et un bouc en sacrifice d’expiation, chaque jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il y joindra l’offrande d’un épha pour chaque taureau et d’un épha pour chaque bélier, avec un hin d’huile par épha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 23:33
      metadata:
        usfm: LEV.23.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 22:12
      metadata:
        usfm: NUM.22.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 16:13
      metadata:
        usfm: DEU.16.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le quinzième jour du septième mois, à la fête, il offrira pendant sept jours les mêmes sacrifices d’expiation, les mêmes holocaustes, et la même offrande avec l’huile.
