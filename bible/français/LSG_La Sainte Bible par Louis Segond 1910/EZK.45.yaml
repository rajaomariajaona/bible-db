document_id: EZK.45,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Partage du pays
  - type: heading
    content: 'V. 1-8: cf. Éz 48:8-22.'
  - type: text
    content: 'Lorsque vous partagerez le pays en héritage par le sort, vous prélèverez comme une sainte offrande pour l’Éternel une portion du pays, longue de vingt-cinq mille cannes et large de dix mille; elle sera sainte dans toute son étendue. '
  '10':
  - type: text
    content: 'Ayez des '
  - type: note
    content: Lé 19:35, 36.
  - type: text
    content: 'balances justes, un épha juste, et un bath juste. '
  '11':
  - type: text
    content: 'L’épha et le bath auront la même mesure: le bath contiendra la dixième partie d’un homer, et l’épha la dixième partie d’un homer; leur mesure sera réglée d’après le homer. '
  '12':
  - type: text
    content: 'Le '
  - type: note
    content: Ex 30:13. Lé 27:25. No 3:47.
  - type: text
    content: 'sicle sera de vingt guéras. La mine aura chez vous vingt sicles, vingt-cinq sicles, quinze sicles. '
  '13':
  - type: text
    content: 'Voici l’offrande que vous prélèverez; la sixième partie d’un épha sur un homer de froment, et la sixième partie d’un épha sur un homer d’orge. '
  '14':
  - type: text
    content: 'Ce que vous devrez pour l’huile, pour un bath d’huile, sera la dixième partie d’un bath sur un cor, qui est égal à un homer de dix baths, car dix baths font un homer. '
  '15':
  - type: text
    content: 'Une brebis sur un troupeau de deux cents dans les gras pâturages d’Israël sera donnée pour l’offrande, l’holocauste et le sacrifice d’actions de grâces, afin de servir de victime expiatoire, dit le Seigneur, l’Éternel. '
  '16':
  - type: text
    content: 'Tout le peuple du pays devra prélever cette offrande pour le prince d’Israël. '
  '17':
  - type: text
    content: Le prince sera chargé des holocaustes, des offrandes et des libations, aux fêtes, aux nouvelles lunes, aux sabbats, à toutes les solennités de la maison d’Israël; il offrira le sacrifice expiatoire, l’offrande, l’holocauste, et le sacrifice d’actions de grâces, en expiation pour la maison d’Israël.
  - type: heading
    content: 'V. 18-25: cf. (Ex 12:1-30. De 16:1-8. No 28:16-25.) Lé 23:33, etc.'
  '18':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel: Le premier jour du premier mois, tu prendras un jeune taureau sans défaut, et tu feras l’expiation du sanctuaire. '
  '19':
  - type: text
    content: 'Le sacrificateur prendra du sang de la victime expiatoire, et il en mettra sur les poteaux de la maison, sur les quatre angles de l’encadrement de l’autel, et sur les poteaux de la porte du parvis intérieur. '
  '2':
  - type: text
    content: 'De cette portion vous prendrez pour le sanctuaire cinq cents cannes sur cinq cents en carré, et cinquante coudées pour un espace libre tout autour. '
  '20':
  - type: text
    content: 'Tu feras de même le septième jour du mois, pour ceux qui pèchent involontairement ou par imprudence; vous purifierez ainsi la maison. '
  '21':
  - type: note
    content: Ex 12:3; 23:15. Lé 23:5. No 9:3; 28:16, 17. De 16:1.
  - type: text
    content: 'Le quatorzième jour du premier mois, vous aurez la Pâque. La fête durera sept jours; on mangera des pains sans levain. '
  '22':
  - type: text
    content: 'Le prince offrira ce jour-là, pour lui et pour tout le peuple du pays, un taureau en sacrifice d’expiation. '
  '23':
  - type: text
    content: 'Pendant les sept jours de la fête, il offrira en holocauste à l’Éternel sept taureaux et sept béliers sans défaut, chacun des sept jours, et un bouc en sacrifice d’expiation, chaque jour. '
  '24':
  - type: text
    content: 'Il y joindra l’offrande d’un épha pour chaque taureau et d’un épha pour chaque bélier, avec un hin d’huile par épha. '
  '25':
  - type: note
    content: Lé 23:33. No 22:12. De 16:13.
  - type: text
    content: Le quinzième jour du septième mois, à la fête, il offrira pendant sept jours les mêmes sacrifices d’expiation, les mêmes holocaustes, et la même offrande avec l’huile.
  '3':
  - type: text
    content: 'Sur cette étendue de vingt-cinq mille cannes en longueur et dix mille en largeur, tu mesureras un emplacement pour le sanctuaire, pour le lieu très saint. '
  '4':
  - type: text
    content: 'C’est la portion sainte du pays; elle appartiendra aux sacrificateurs qui font le service du sanctuaire, qui s’approchent de l’Éternel pour le servir; c’est là que seront leurs maisons, et ce sera un sanctuaire pour le sanctuaire. '
  '5':
  - type: text
    content: 'Vingt-cinq mille cannes en longueur et dix mille en largeur formeront la propriété des Lévites, serviteurs de la maison, avec vingt chambres. '
  '6':
  - type: text
    content: 'Comme propriété de la ville vous destinerez cinq mille cannes en largeur et vingt-cinq mille en longueur, parallèlement à la portion sainte prélevée; ce sera pour toute la maison d’Israël. '
  '7':
  - type: text
    content: 'Pour le prince vous réserverez un espace aux deux côtés de la portion sainte et de la propriété de la ville, le long de la portion sainte et le long de la propriété de la ville, du côté de l’occident vers l’occident et du côté de l’orient vers l’orient, sur une longueur parallèle à l’une des parts, depuis la limite de l’occident jusqu’à la limite de l’orient. '
  '8':
  - type: text
    content: Ce sera sa terre, sa propriété en Israël; et mes princes n’opprimeront plus mon peuple, mais ils laisseront le pays à la maison d’Israël, selon ses tribus.
  - type: heading
    content: Les poids justes. Les offrandes
  - type: heading
    content: 'V. 9-17: cf. Jé 22:1-5. Lé 19:35-37.'
  '9':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel: Assez, princes d’Israël! Cessez la violence et les rapines, pratiquez la droiture et la justice, délivrez mon peuple de vos exactions, dit le Seigneur, l’Éternel. '
