document_id: MAT.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Enfance de Jésus-Christ. Les mages à Bethléhem. Hérode
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-12: cf. Lu 2:22-38. (No 24:17. Ps 72:10, 11.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jésus étant '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 2:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'né à Bethléhem en Judée, au temps du roi Hérode, voici des mages d’Orient arrivèrent à Jérusalem, '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Quand ils aperçurent l’étoile, ils furent saisis d’une très grande joie. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ils entrèrent dans la maison, virent le petit enfant avec Marie, sa mère, se prosternèrent et l’adorèrent; ils ouvrirent ensuite leurs trésors, et lui offrirent en présent de l’or, de l’encens et de la myrrhe. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Puis, divinement avertis en songe de ne pas retourner vers Hérode, ils regagnèrent leur pays par un autre chemin.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fuite de Joseph en Égypte. Massacre des enfants de Bethléhem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-18: cf. Ex 1:15, etc. Ps 2:2-4, 10-12; 76:11.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Lorsqu’ils furent partis, voici, un ange du Seigneur apparut en songe à Joseph, et dit: Lève-toi, prends le petit enfant et sa mère, fuis en Égypte, et restes-y jusqu’à ce que je te parle; car Hérode cherchera le petit enfant pour le faire périr. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Joseph se leva, prit de nuit le petit enfant et sa mère, et se retira en Égypte. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Il y resta jusqu’à la mort d’Hérode, afin que s’accomplît ce que le Seigneur avait annoncé par le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 11:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'prophète: J’ai appelé mon fils hors d’Égypte. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Alors Hérode, voyant qu’il avait été joué par les mages, se mit dans une grande colère, et il envoya tuer tous les enfants de deux ans et au-dessous qui étaient à Bethléhem et dans tout son territoire, selon la date dont il s’était soigneusement enquis auprès des mages. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Alors s’accomplit ce qui avait été annoncé par Jérémie, le prophète:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 31:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: On a entendu des cris à Rama,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Des pleurs et de grandes lamentations:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rachel pleure ses enfants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et n’a pas voulu être consolée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils ne sont plus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mort d’Hérode. Retour de Joseph, et son établissement à Nazareth
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 19-23: cf. Lu 2:39, etc.'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Quand Hérode fut mort, voici, un ange du Seigneur apparut en songe à Joseph, en Égypte, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'et dirent: Où est le roi des Juifs qui vient de naître? Car nous avons vu son étoile en Orient, et nous sommes venus pour l’adorer. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'et dit: Lève-toi, prends le petit enfant et sa mère, et va dans le pays d’Israël, car ceux qui en voulaient à la vie du petit enfant sont morts. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Joseph se leva, prit le petit enfant et sa mère, et alla dans le pays d’Israël. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mais, ayant appris qu’Archélaüs régnait sur la Judée à la place d’Hérode, son père, il craignit de s’y rendre; et, divinement averti en songe, il se retira dans le territoire de la Galilée, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'et vint demeurer dans une ville appelée Nazareth, afin que s’accomplît ce qui avait été annoncé par les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 11:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 60:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 6:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'prophètes: Il sera appelé Nazaréen.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Le roi Hérode, ayant appris cela, fut troublé, et tout Jérusalem avec lui. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il assembla tous les principaux sacrificateurs et les scribes du peuple, et il s’informa auprès d’eux où devait naître le Christ. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ils lui dirent: A Bethléhem en Judée; car voici ce qui a été écrit par le prophète:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 5:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 7:42
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et toi, Bethléhem, terre de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu n’es certes pas la moindre entre les principales villes de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car de toi sortira un chef
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui paîtra Israël, mon peuple.
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Alors Hérode fit appeler en secret les mages, et s’enquit soigneusement auprès d’eux depuis combien de temps l’étoile brillait. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Puis il les envoya à Bethléhem, en disant: Allez, et prenez des informations exactes sur le petit enfant; quand vous l’aurez trouvé, faites-le-moi savoir, afin que j’aille aussi moi-même l’adorer. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Après avoir entendu le roi, ils partirent. Et voici, l’étoile qu’ils avaient vue en Orient marchait devant eux jusqu’à ce qu’étant arrivée au-dessus du lieu où était le petit enfant, elle s’arrêta. '
