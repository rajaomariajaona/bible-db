document_id: EXO.25,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ordres pour la construction du tabernacle
  - type: heading
    content: 'V. 1-9: cf. Ex 35:4-35.'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: text
    content: 'Ils feront une arche '
  - type: note
    content: Ex 37:1. Hé 9:1.
  - type: text
    content: 'de bois d’acacia, sa longueur sera de deux coudées et demie, sa largeur d’une coudée et demie, et sa hauteur d’une coudée et demie. '
  '11':
  - type: text
    content: 'Tu la couvriras d’or pur, tu la couvriras en dedans et en dehors, et tu y feras une bordure d’or tout autour. '
  '12':
  - type: text
    content: 'Tu fondras pour elle quatre anneaux d’or, et tu les mettras à ses quatre coins, deux anneaux d’un côté et deux anneaux de l’autre côté. '
  '13':
  - type: text
    content: 'Tu feras des barres de bois d’acacia, et tu les couvriras d’or. '
  '14':
  - type: text
    content: 'Tu passeras les barres dans les anneaux sur les côtés de l’arche, pour qu’elles servent à porter l’arche; '
  '15':
  - type: note
    content: 1 R 8:8.
  - type: text
    content: 'les barres resteront dans les anneaux de l’arche, et n’en seront point retirées. '
  '16':
  - type: note
    content: Hé 9:4.
  - type: text
    content: 'Tu mettras dans l’arche le témoignage, que je te donnerai. '
  '17':
  - type: note
    content: Ex 37:6.
  - type: text
    content: 'Tu feras un propitiatoire d’or pur; sa longueur sera de deux coudées et demie, et sa largeur d’une coudée et demie. '
  '18':
  - type: note
    content: Hé 9:5.
  - type: text
    content: 'Tu feras deux chérubins d’or, tu les feras d’or battu, aux deux extrémités du propitiatoire; '
  '19':
  - type: text
    content: 'fais un chérubin à l’une des extrémités et un chérubin à l’autre extrémité; vous ferez les chérubins sortant du propitiatoire à ses deux extrémités. '
  '2':
  - type: text
    content: 'Parle aux enfants d’Israël. Qu’ils m’apportent une offrande; '
  - type: note
    content: Ex 35:5. 1 Ch 29:3, 5, 9, 14. Esd 2:68; 3:5. Né 11:2.
  - type: text
    content: 'vous la recevrez pour moi de tout homme qui la fera de bon cœur. '
  '20':
  - type: text
    content: 'Les chérubins étendront les ailes par-dessus, '
  - type: note
    content: Hé 9:5.
  - type: text
    content: 'couvrant de leurs ailes le propitiatoire, et se faisant face l’un à l’autre; les chérubins auront la face tournée vers le propitiatoire. '
  '21':
  - type: note
    content: Hé 9:4, 5.
  - type: text
    content: 'Tu mettras le propitiatoire sur l’arche, et tu mettras dans l’arche le témoignage, que je te donnerai. '
  '22':
  - type: note
    content: No 7:89.
  - type: text
    content: C’est là que je me rencontrerai avec toi; du haut du propitiatoire, entre les deux chérubins placés sur l’arche du témoignage, je te donnerai tous mes ordres pour les enfants d’Israël.
  - type: heading
    content: 'V. 23-30: cf. (Ex 37:10-16. Lé 24:5-9.)'
  '23':
  - type: text
    content: 'Tu feras une table de bois d’acacia; sa longueur sera de deux coudées, sa largeur d’une coudée, et sa hauteur d’une coudée et demie. '
  '24':
  - type: text
    content: 'Tu la couvriras d’or pur, et tu y feras une bordure d’or tout autour. '
  '25':
  - type: text
    content: 'Tu y feras à l’entour un rebord de quatre doigts, sur lequel tu mettras une bordure d’or tout autour. '
  '26':
  - type: text
    content: 'Tu feras pour la table quatre anneaux d’or, et tu mettras les anneaux aux quatre coins, qui seront à ses quatre pieds. '
  '27':
  - type: text
    content: 'Les anneaux seront près du rebord, et recevront les barres pour porter la table. '
  '28':
  - type: text
    content: 'Tu feras les barres de bois d’acacia, et tu les couvriras d’or; et elles serviront à porter la table. '
  '29':
  - type: text
    content: 'Tu feras ses plats, ses coupes, ses calices et ses tasses, pour servir aux libations; tu les feras d’or pur. '
  '3':
  - type: text
    content: 'Voici ce que vous recevrez d’eux en offrande: de l’or, de l’argent et de l’airain; '
  '30':
  - type: text
    content: Tu mettras sur la table les pains de proposition continuellement devant ma face.
  - type: heading
    content: 'V. 31-40: cf. Ex 37:17-24. (Za 4:2, 3, 11-14. Ap 1:12, 20; 4:5.)'
  '31':
  - type: text
    content: ' '
  - type: note
    content: Ex 37:17.
  - type: text
    content: 'Tu feras un chandelier d’or pur; ce chandelier sera fait d’or battu; son pied, sa tige, ses calices, ses pommes et ses fleurs seront d’une même pièce. '
  '32':
  - type: text
    content: 'Six branches sortiront de ses côtés, trois branches du chandelier de l’un des côtés, et trois branches du chandelier de l’autre côté. '
  '33':
  - type: text
    content: 'Il y aura sur une branche trois calices en forme d’amande, avec pommes et fleurs, et sur une autre branche trois calices en forme d’amande, avec pommes et fleurs; il en sera de même pour les six branches sortant du chandelier. '
  '34':
  - type: text
    content: 'A la tige du chandelier, il y aura quatre calices en forme d’amande, avec leurs pommes et leurs fleurs. '
  '35':
  - type: text
    content: 'Il y aura une pomme sous deux des branches sortant de la tige du chandelier, une pomme sous deux autres branches, et une pomme sous deux autres branches; il en sera de même pour les six branches sortant du chandelier. '
  '36':
  - type: text
    content: 'Les pommes et les branches du chandelier seront d’une même pièce: il sera tout entier d’or battu, d’or pur. '
  '37':
  - type: text
    content: 'Tu feras ses sept lampes, qui seront placées dessus, de manière à éclairer en face. '
  '38':
  - type: text
    content: 'Ses mouchettes et ses vases à cendre seront d’or pur. '
  '39':
  - type: text
    content: 'On emploiera un talent d’or pur pour faire le chandelier avec tous ses ustensiles. '
  '4':
  - type: text
    content: 'des étoffes teintes en bleu, en pourpre, en cramoisi, du fin lin et du poil de chèvre; '
  '40':
  - type: note
    content: Ac 7:44. Hé 8:5.
  - type: text
    content: Regarde, et fais d’après le modèle qui t’est montré sur la montagne.
  '5':
  - type: text
    content: 'des peaux de béliers teintes en rouge et des peaux de dauphins; du bois d’acacia; '
  '6':
  - type: text
    content: 'de l’huile pour le chandelier, des aromates pour l’huile d’onction et pour le parfum odoriférant; '
  '7':
  - type: note
    content: Ex 28:4.
  - type: text
    content: 'des pierres d’onyx et d’autres pierres pour la garniture de l’éphod et du pectoral. '
  '8':
  - type: text
    content: 'Ils me feront un sanctuaire, et j’habiterai au milieu d’eux. '
  '9':
  - type: text
    content: Vous ferez le tabernacle et tous ses ustensiles d’après le modèle que je vais te montrer.
  - type: heading
    content: Description de l’arche, de la table et du chandelier
  - type: heading
    content: 'V. 10-22: cf. (Ex 37:1-9. De 10:1-5.) Col 2:17.'
