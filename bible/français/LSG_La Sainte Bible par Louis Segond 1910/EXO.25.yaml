document_id: EXO.25,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ordres pour la construction du tabernacle
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. Ex 35:4-35.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ils feront une arche '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 37:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 9:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'de bois d’acacia, sa longueur sera de deux coudées et demie, sa largeur d’une coudée et demie, et sa hauteur d’une coudée et demie. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tu la couvriras d’or pur, tu la couvriras en dedans et en dehors, et tu y feras une bordure d’or tout autour. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tu fondras pour elle quatre anneaux d’or, et tu les mettras à ses quatre coins, deux anneaux d’un côté et deux anneaux de l’autre côté. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tu feras des barres de bois d’acacia, et tu les couvriras d’or. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Tu passeras les barres dans les anneaux sur les côtés de l’arche, pour qu’elles servent à porter l’arche; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 8:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'les barres resteront dans les anneaux de l’arche, et n’en seront point retirées. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 9:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu mettras dans l’arche le témoignage, que je te donnerai. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 37:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu feras un propitiatoire d’or pur; sa longueur sera de deux coudées et demie, et sa largeur d’une coudée et demie. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 9:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu feras deux chérubins d’or, tu les feras d’or battu, aux deux extrémités du propitiatoire; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'fais un chérubin à l’une des extrémités et un chérubin à l’autre extrémité; vous ferez les chérubins sortant du propitiatoire à ses deux extrémités. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Parle aux enfants d’Israël. Qu’ils m’apportent une offrande; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 35:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 29:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esd 2:68
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Né 11:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'vous la recevrez pour moi de tout homme qui la fera de bon cœur. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Les chérubins étendront les ailes par-dessus, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 9:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'couvrant de leurs ailes le propitiatoire, et se faisant face l’un à l’autre; les chérubins auront la face tournée vers le propitiatoire. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 9:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu mettras le propitiatoire sur l’arche, et tu mettras dans l’arche le témoignage, que je te donnerai. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 7:89
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: C’est là que je me rencontrerai avec toi; du haut du propitiatoire, entre les deux chérubins placés sur l’arche du témoignage, je te donnerai tous mes ordres pour les enfants d’Israël.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 23-30: cf. (Ex 37:10-16. Lé 24:5-9.)'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Tu feras une table de bois d’acacia; sa longueur sera de deux coudées, sa largeur d’une coudée, et sa hauteur d’une coudée et demie. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Tu la couvriras d’or pur, et tu y feras une bordure d’or tout autour. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Tu y feras à l’entour un rebord de quatre doigts, sur lequel tu mettras une bordure d’or tout autour. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Tu feras pour la table quatre anneaux d’or, et tu mettras les anneaux aux quatre coins, qui seront à ses quatre pieds. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Les anneaux seront près du rebord, et recevront les barres pour porter la table. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Tu feras les barres de bois d’acacia, et tu les couvriras d’or; et elles serviront à porter la table. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Tu feras ses plats, ses coupes, ses calices et ses tasses, pour servir aux libations; tu les feras d’or pur. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Voici ce que vous recevrez d’eux en offrande: de l’or, de l’argent et de l’airain; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Tu mettras sur la table les pains de proposition continuellement devant ma face.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 31-40: cf. Ex 37:17-24. (Za 4:2, 3, 11-14. Ap 1:12, 20; 4:5.)'
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 37:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu feras un chandelier d’or pur; ce chandelier sera fait d’or battu; son pied, sa tige, ses calices, ses pommes et ses fleurs seront d’une même pièce. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Six branches sortiront de ses côtés, trois branches du chandelier de l’un des côtés, et trois branches du chandelier de l’autre côté. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Il y aura sur une branche trois calices en forme d’amande, avec pommes et fleurs, et sur une autre branche trois calices en forme d’amande, avec pommes et fleurs; il en sera de même pour les six branches sortant du chandelier. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'A la tige du chandelier, il y aura quatre calices en forme d’amande, avec leurs pommes et leurs fleurs. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Il y aura une pomme sous deux des branches sortant de la tige du chandelier, une pomme sous deux autres branches, et une pomme sous deux autres branches; il en sera de même pour les six branches sortant du chandelier. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Les pommes et les branches du chandelier seront d’une même pièce: il sera tout entier d’or battu, d’or pur. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Tu feras ses sept lampes, qui seront placées dessus, de manière à éclairer en face. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ses mouchettes et ses vases à cendre seront d’or pur. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'On emploiera un talent d’or pur pour faire le chandelier avec tous ses ustensiles. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'des étoffes teintes en bleu, en pourpre, en cramoisi, du fin lin et du poil de chèvre; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7:44
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 8:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Regarde, et fais d’après le modèle qui t’est montré sur la montagne.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'des peaux de béliers teintes en rouge et des peaux de dauphins; du bois d’acacia; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'de l’huile pour le chandelier, des aromates pour l’huile d’onction et pour le parfum odoriférant; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'des pierres d’onyx et d’autres pierres pour la garniture de l’éphod et du pectoral. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ils me feront un sanctuaire, et j’habiterai au milieu d’eux. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Vous ferez le tabernacle et tous ses ustensiles d’après le modèle que je vais te montrer.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Description de l’arche, de la table et du chandelier
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-22: cf. (Ex 37:1-9. De 10:1-5.) Col 2:17.'
    marker-yv: yv-h
