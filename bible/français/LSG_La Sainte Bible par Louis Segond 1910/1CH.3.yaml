document_id: 1CH.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les descendants de David
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. (2 S 3:2-5; 5:13-16.) Ps 127:3-5.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici les fils de David, qui '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 S 3:2, etc.
    marker-yv: yv-n
  - type: text
    text: 'lui naquirent à Hébron. Le premier-né, Amnon, d’Achinoam de Jizreel; le second, Daniel, d’Abigaïl de Carmel; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'le troisième, Absalom, fils de Maaca, fille de Talmaï, roi de Gueschur; le quatrième, Adonija, fils de Haggith; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'le cinquième, Schephatia, d’Abithal; le sixième, Jithream, d’Égla, sa femme. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ces six lui naquirent à Hébron. Il régna là sept ans et six mois, et il régna trente-trois ans à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 S 5:14, etc.
    marker-yv: yv-n
  - type: text
    text: 'Voici ceux qui lui naquirent à Jérusalem. Schimea, Schobab, Nathan et Salomon, quatre de Bath-Schua, fille d’Ammiel; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jibhar, Élischama, Éliphéleth, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Noga, Népheg, Japhia, Élischama, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Éliada et Éliphéleth, neuf. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ce sont là tous les fils de David, outre les fils des concubines. Et Tamar était leur sœur.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-24: cf. Mt 1:7-12. Ps 89:36-38.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fils de Salomon: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 11:43
      metadata:
        usfm: 1KI.11.43
    - type: text
      text: '; '
    - type: usfm
      marker: ref
