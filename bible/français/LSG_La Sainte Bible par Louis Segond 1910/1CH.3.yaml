document_id: 1CH.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les descendants de David
  - type: heading
    content: 'V. 1-9: cf. (2 S 3:2-5; 5:13-16.) Ps 127:3-5.'
  - type: text
    content: 'Voici les fils de David, qui '
  - type: note
    content: 2 S 3:2, etc.
  - type: text
    content: 'lui naquirent à Hébron. Le premier-né, Amnon, d’Achinoam de Jizreel; le second, Daniel, d’Abigaïl de Carmel; '
  '10':
  - type: text
    content: 'Fils de Salomon: '
  - type: note
    content: 1 R 11:43; 14:31; 15:8, 24.
  - type: text
    content: 'Roboam. Abija, son fils; Asa, son fils; Josaphat, son fils; '
  '11':
  - type: note
    content: 2 R 8:16, 25; 11:2.
  - type: text
    content: 'Joram, son fils; Achazia, son fils; Joas, son fils; '
  '12':
  - type: note
    content: 2 R 12:21; 14:21; 15:7.
  - type: text
    content: 'Amatsia, son fils; Azaria, son fils; Jotham, son fils; '
  '13':
  - type: note
    content: 2 R 15:38; 16:20; 20:21.
  - type: text
    content: 'Achaz, son fils; Ézéchias, son fils; Manassé, son fils; '
  '14':
  - type: note
    content: 2 R 21:18, 26.
  - type: text
    content: 'Amon, son fils; Josias, son fils. '
  '15':
  - type: note
    content: 2 R 23:30, 34.
  - type: text
    content: 'Fils de Josias: le premier-né, Jochanan; le second, Jojakim; le troisième, Sédécias; le quatrième, Schallum. '
  '16':
  - type: text
    content: 'Fils de Jojakim: '
  - type: note
    content: 2 R 24:6, 17.
  - type: text
    content: 'Jéconias, son fils; Sédécias, son fils. '
  '17':
  - type: note
    content: Mt 1:11, 12.
  - type: text
    content: 'Fils de Jéconias: Assir, dont le fils fut Schealthiel, '
  '18':
  - type: text
    content: 'Malkiram, Pedaja, Schénatsar, Jekamia, Hoschama et Nedabia. '
  '19':
  - type: text
    content: 'Fils de Pedaja: Zorobabel et Schimeï. Fils de Zorobabel: Meschullam et Hanania; Schelomith, leur sœur; '
  '2':
  - type: text
    content: 'le troisième, Absalom, fils de Maaca, fille de Talmaï, roi de Gueschur; le quatrième, Adonija, fils de Haggith; '
  '20':
  - type: text
    content: 'et Haschuba, Ohel, Bérékia, Hasadia, Juschab-Hésed, cinq. '
  '21':
  - type: text
    content: 'Fils de Hanania: Pelathia et Ésaïe; les fils de Rephaja, les fils d’Arnan, les fils d’Abdias, les fils de Schecania. '
  '22':
  - type: text
    content: 'Fils de Schecania: Schemaeja. Fils de Schemaeja: Hattusch, Jigueal, Bariach, Nearia et Schaphath, six. '
  '23':
  - type: text
    content: 'Fils de Nearia: Éljoénaï, Ézéchias et Azrikam, trois. '
  '24':
  - type: text
    content: 'Fils d’Éljoénaï: Hodavia, Éliaschib, Pelaja, Akkub, Jochanan, Delaja et Anani, sept.'
  '3':
  - type: text
    content: 'le cinquième, Schephatia, d’Abithal; le sixième, Jithream, d’Égla, sa femme. '
  '4':
  - type: text
    content: 'Ces six lui naquirent à Hébron. Il régna là sept ans et six mois, et il régna trente-trois ans à Jérusalem. '
  '5':
  - type: note
    content: 2 S 5:14, etc.
  - type: text
    content: 'Voici ceux qui lui naquirent à Jérusalem. Schimea, Schobab, Nathan et Salomon, quatre de Bath-Schua, fille d’Ammiel; '
  '6':
  - type: text
    content: 'Jibhar, Élischama, Éliphéleth, '
  '7':
  - type: text
    content: 'Noga, Népheg, Japhia, Élischama, '
  '8':
  - type: text
    content: 'Éliada et Éliphéleth, neuf. '
  '9':
  - type: text
    content: Ce sont là tous les fils de David, outre les fils des concubines. Et Tamar était leur sœur.
  - type: heading
    content: 'V. 10-24: cf. Mt 1:7-12. Ps 89:36-38.'
