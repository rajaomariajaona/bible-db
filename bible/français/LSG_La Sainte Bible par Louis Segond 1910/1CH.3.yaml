document_id: 1CH.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les descendants de David
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. (2 S 3:2-5; 5:13-16.) Ps 127:3-5.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les fils de David, qui '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 S 3:2, etc.
      marker-yv: yv-n
    - type: text
      text: 'lui naquirent à Hébron. Le premier-né, Amnon, d’Achinoam de Jizreel; le second, Daniel, d’Abigaïl de Carmel; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Salomon: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 11:43
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Roboam. Abija, son fils; Asa, son fils; Josaphat, son fils; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 8:16
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Joram, son fils; Achazia, son fils; Joas, son fils; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 12:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Amatsia, son fils; Azaria, son fils; Jotham, son fils; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 15:38
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Achaz, son fils; Ézéchias, son fils; Manassé, son fils; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 21:18
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '26'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Amon, son fils; Josias, son fils. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 23:30
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '34'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Fils de Josias: le premier-né, Jochanan; le second, Jojakim; le troisième, Sédécias; le quatrième, Schallum. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Jojakim: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 24:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jéconias, son fils; Sédécias, son fils. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 1:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Fils de Jéconias: Assir, dont le fils fut Schealthiel, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Malkiram, Pedaja, Schénatsar, Jekamia, Hoschama et Nedabia. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Pedaja: Zorobabel et Schimeï. Fils de Zorobabel: Meschullam et Hanania; Schelomith, leur sœur; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le troisième, Absalom, fils de Maaca, fille de Talmaï, roi de Gueschur; le quatrième, Adonija, fils de Haggith; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et Haschuba, Ohel, Bérékia, Hasadia, Juschab-Hésed, cinq. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Hanania: Pelathia et Ésaïe; les fils de Rephaja, les fils d’Arnan, les fils d’Abdias, les fils de Schecania. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Schecania: Schemaeja. Fils de Schemaeja: Hattusch, Jigueal, Bariach, Nearia et Schaphath, six. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Nearia: Éljoénaï, Ézéchias et Azrikam, trois. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d’Éljoénaï: Hodavia, Éliaschib, Pelaja, Akkub, Jochanan, Delaja et Anani, sept.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le cinquième, Schephatia, d’Abithal; le sixième, Jithream, d’Égla, sa femme. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces six lui naquirent à Hébron. Il régna là sept ans et six mois, et il régna trente-trois ans à Jérusalem. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 S 5:14, etc.
      marker-yv: yv-n
    - type: text
      text: 'Voici ceux qui lui naquirent à Jérusalem. Schimea, Schobab, Nathan et Salomon, quatre de Bath-Schua, fille d’Ammiel; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jibhar, Élischama, Éliphéleth, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noga, Népheg, Japhia, Élischama, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Éliada et Éliphéleth, neuf. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce sont là tous les fils de David, outre les fils des concubines. Et Tamar était leur sœur.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-24: cf. Mt 1:7-12. Ps 89:36-38.'
    marker-yv: yv-h
