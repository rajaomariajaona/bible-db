document_id: JOS.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Territoire échu à la tribu de Juda
  - type: heading
    content: 'V. 1-12: cf. (No 34:2-6. Jos 18:15-20.) Ge 49:11, 12.'
  - type: text
    content: 'La part échue par le sort à la tribu des fils de Juda, selon leurs familles, s’étendait vers la frontière d’Édom, jusqu’au désert de Tsin, au midi, à l’extrémité méridionale. '
  '10':
  - type: text
    content: 'De Baala elle tournait à l’occident vers la montagne de Séir, traversait le côté septentrional de la montagne de Jearim, à Kesalon, descendait à Beth-Schémesch, et passait par Thimna. '
  '11':
  - type: text
    content: 'Elle continuait sur le côté septentrional d’Ékron, s’étendait vers Schicron, passait par la montagne de Baala, et se prolongeait jusqu’à Jabneel, pour aboutir à la mer. '
  '12':
  - type: note
    content: No 34:6.
  - type: text
    content: La limite occidentale était la grande mer. Telles furent de tous les côtés les limites des fils de Juda, selon leurs familles.
  - type: heading
    content: 'V. 13-20: cf. (Jos 14:6-15. Jg 1:10-15.)'
  '13':
  - type: text
    content: 'On donna à Caleb, fils de Jephunné, une part au milieu des fils de Juda, comme l’Éternel l’avait ordonné à Josué; on lui donna Kirjath-Arba, qui est Hébron: Arba était '
  - type: note
    content: Jos 14:15. Jg 1:20.
  - type: text
    content: 'le père d’Anak. '
  '14':
  - type: note
    content: Jg 1:10.
  - type: text
    content: 'Caleb en chassa les trois fils d’Anak: Schéschaï, Ahiman et Talmaï, enfants d’Anak. '
  '15':
  - type: text
    content: 'De là il monta contre les habitants de Debir: Debir s’appelait autrefois Kirjath-Sépher. '
  '16':
  - type: text
    content: 'Caleb dit: Je donnerai ma fille Acsa pour femme à celui qui battra Kirjath-Sépher et qui la prendra. '
  '17':
  - type: text
    content: 'Othniel, fils de Kenaz, frère de Caleb, s’en empara; et Caleb lui donna pour femme sa fille Acsa. '
  '18':
  - type: text
    content: 'Lorsqu’elle fut entrée chez Othniel, elle le sollicita de demander à son père un champ. Elle descendit de dessus son âne, et Caleb lui dit: Qu’as-tu? '
  '19':
  - type: text
    content: 'Elle répondit: Fais-moi un présent, car tu m’as donné une terre du midi; donne-moi aussi des sources d’eau. Et il lui donna les sources supérieures et les sources inférieures. '
  '2':
  - type: text
    content: 'Ainsi, leur limite '
  - type: note
    content: No 34:4.
  - type: text
    content: 'méridionale partait de l’extrémité de la mer Salée, de la langue qui fait face au sud. '
  '20':
  - type: text
    content: Tel fut l’héritage des fils de Juda, selon leurs familles.
  - type: heading
    content: 'V. 21-63: cf. Ge 49:8-12. (Jos 19:1-9. Né 11:25-30.)'
  '21':
  - type: text
    content: 'Les villes situées dans la contrée du midi, à l’extrémité de la tribu des fils de Juda, vers la frontière d’Édom, étaient: Kabtseel, Éder, Jagur, '
  '22':
  - type: text
    content: 'Kina, Dimona, Adada, '
  '23':
  - type: text
    content: 'Kédesch, Hatsor, Ithnan, '
  '24':
  - type: text
    content: 'Ziph, Thélem, Bealoth, '
  '25':
  - type: text
    content: 'Hatsor-Hadattha, Kerijoth-Hetsron, qui est Hatsor, '
  '26':
  - type: text
    content: 'Amam, Schema, Molada, '
  '27':
  - type: text
    content: 'Hatsar-Gadda, Heschmon, Beth-Paleth, '
  '28':
  - type: text
    content: 'Hatsar-Schual, Beer-Schéba, Bizjothja, '
  '29':
  - type: text
    content: 'Baala, Ijjim, Atsem, '
  '3':
  - type: text
    content: 'Elle se prolongeait au midi de la montée d’Akrabbim, passait par Tsin, et montait au midi de Kadès-Barnéa; elle passait de là par Hetsron, montait vers Addar, et tournait à Karkaa; '
  '30':
  - type: text
    content: 'Eltholad, Kesil, Horma, '
  '31':
  - type: text
    content: 'Tsiklag, Madmanna, Sansanna, '
  '32':
  - type: text
    content: 'Lebaoth, Schilhim, Aïn, et Rimmon. Total des villes: vingt-neuf, et leurs villages. '
  '33':
  - type: text
    content: 'Dans la plaine: Eschthaol, Tsorea, Aschna, '
  '34':
  - type: text
    content: 'Zanoach, En-Gannim, Tappuach, Énam, '
  '35':
  - type: text
    content: 'Jarmuth, Adullam, Soco, Azéka, '
  '36':
  - type: text
    content: 'Schaaraïm, Adithaïm, Guedéra, et Guedérothaïm; quatorze villes, et leurs villages. '
  '37':
  - type: text
    content: 'Tsenan, Hadascha, Migdal-Gad, '
  '38':
  - type: text
    content: 'Dilean, Mitspé, Joktheel, '
  '39':
  - type: text
    content: 'Lakis, Botskath, Églon, '
  '4':
  - type: text
    content: 'elle passait ensuite par Atsmon, et continuait jusqu’au torrent d’Égypte, pour aboutir à la mer. Ce sera votre limite au midi. '
  '40':
  - type: text
    content: 'Cabbon, Lachmas, Kithlisch, '
  '41':
  - type: text
    content: 'Guedéroth, Beth-Dagon, Naama, et Makkéda; seize villes, et leurs villages. '
  '42':
  - type: text
    content: 'Libna, Éther, Aschan, '
  '43':
  - type: text
    content: 'Jiphtach, Aschna, Netsib, '
  '44':
  - type: text
    content: 'Keïla, Aczib, et Maréscha; neuf villes, et leurs villages. '
  '45':
  - type: text
    content: 'Ékron, les villes de son ressort et ses villages; '
  '46':
  - type: text
    content: 'depuis Ékron et à l’occident, toutes les villes près d’Asdod, et leurs villages, '
  '47':
  - type: text
    content: 'Asdod, les villes de son ressort, et ses villages; Gaza, les villes de son ressort, et ses villages, jusqu’au torrent d’Égypte, et à la grande mer, qui sert de limite. '
  '48':
  - type: text
    content: 'Dans la montagne: Schamir, Jatthir, Soco, '
  '49':
  - type: text
    content: 'Danna, Kirjath-Sanna, qui est Debir, '
  '5':
  - type: text
    content: 'La limite orientale était la mer Salée jusqu’à l’embouchure du Jourdain. La limite septentrionale partait de la langue de mer qui est à l’embouchure du Jourdain. '
  '50':
  - type: text
    content: 'Anab, Eschthemo, Anim, '
  '51':
  - type: text
    content: 'Gosen, Holon, et Guilo, onze villes, et leurs villages. '
  '52':
  - type: text
    content: 'Arab, Duma, Eschean, '
  '53':
  - type: text
    content: 'Janum, Beth-Tappuach, Aphéka, '
  '54':
  - type: text
    content: 'Humta, Kirjath-Arba, qui est Hébron, et Tsior; neuf villes, et leurs villages. '
  '55':
  - type: text
    content: 'Maon, Carmel, Ziph, Juta, '
  '56':
  - type: text
    content: 'Jizreel, Jokdeam, Zanoach, '
  '57':
  - type: text
    content: 'Kaïn, Guibea, et Thimna; dix villes, et leurs villages. '
  '58':
  - type: text
    content: 'Halhul, Beth-Tsur, Guedor, '
  '59':
  - type: text
    content: 'Maarath, Beth-Anoth, et Elthekon; six villes, et leurs villages. '
  '6':
  - type: text
    content: 'Elle montait vers Beth-Hogla, passait au nord de Beth-Araba, et s’élevait jusqu’à la pierre de Bohan, fils de Ruben; '
  '60':
  - type: text
    content: 'Kirjath-Baal, qui est Kirjath-Jearim, et Rabba; deux villes, et leurs villages. '
  '61':
  - type: text
    content: 'Dans le désert: Beth-Araba, Middin, Secaca, '
  '62':
  - type: text
    content: 'Nibschan, Ir-Hammélach, et En-Guédi; six villes, et leurs villages. '
  '63':
  - type: text
    content: Les fils de Juda ne purent pas chasser les Jébusiens qui habitaient à Jérusalem, et les Jébusiens ont habité avec les fils de Juda à Jérusalem jusqu’à ce jour.
  '7':
  - type: text
    content: 'elle montait à Debir, à quelque distance de la vallée d’Acor, et se dirigeait vers le nord du côté de Guilgal, qui est vis-à-vis de la montée d’Adummim au sud du torrent. Elle passait près des eaux d’En-Schémesch, et se prolongeait jusqu’à En-Roguel. '
  '8':
  - type: text
    content: 'Elle montait de là par la vallée de Ben-Hinnom au côté méridional de Jebus, qui est Jérusalem, puis s’élevait jusqu’au sommet de la montagne, qui est devant la vallée de Hinnom à l’occident, et à l’extrémité de la vallée des Rephaïm au nord. '
  '9':
  - type: text
    content: 'Du sommet de la montagne elle s’étendait jusqu’à la source des eaux de Nephthoach, continuait vers les villes de la montagne d’Éphron, et se prolongeait par Baala, qui est Kirjath-Jearim. '
