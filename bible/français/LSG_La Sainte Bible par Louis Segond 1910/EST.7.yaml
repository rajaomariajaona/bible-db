document_id: EST.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Haman dénoncé par Esther et mis à mort
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. Est 5:7-14. (Job 20:4-8. Ps 7:15-17; 37:12-15; 32-36.) Pr 20:8, 26.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le roi et Haman allèrent au festin chez la reine Esther. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ce second jour, le roi dit encore à Esther, pendant qu’on buvait le vin: Quelle est ta demande, reine Esther? Elle te sera accordée. Que désires-tu? Quand ce serait la moitié du royaume, tu l’obtiendras. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'La reine Esther répondit: Si j’ai trouvé grâce à tes yeux, ô roi, et si le roi le trouve bon, accorde-moi la vie, voilà ma demande, et sauve mon peuple, voilà mon désir! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Car nous sommes vendus, moi et mon peuple, pour être détruits, égorgés, anéantis. Encore si nous étions vendus pour devenir esclaves et servantes, je me tairais, mais l’ennemi ne saurait compenser le dommage fait au roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le roi Assuérus prit la parole et dit à la reine Esther: Qui est-il et où est-il celui qui se propose d’agir ainsi? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Esther répondit: L’oppresseur, l’ennemi, c’est Haman, ce méchant-là! Haman fut saisi de terreur en présence du roi et de la reine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et le roi, dans sa colère, se leva et quitta le festin, pour aller dans le jardin du palais. Haman resta pour demander grâce de la vie à la reine Esther, car il voyait bien que sa perte était arrêtée dans l’esprit du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Lorsque le roi revint du jardin du palais dans la salle du festin, il vit Haman qui s’était précipité vers le lit sur lequel était Esther, et il dit: Serait-ce encore pour faire violence à la reine, chez moi, dans le palais? Dès que cette parole fut sortie de la bouche du roi, on voila le visage d’Haman. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et Harbona, l’un des eunuques, dit en présence du roi: Voici, le bois préparé par Haman pour Mardochée, qui a parlé pour le bien du roi, est dressé dans la maison d’Haman, à une hauteur de cinquante coudées. Le roi dit: Qu’on y pende Haman! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et l’on pendit Haman au bois qu’il avait préparé pour Mardochée. Et la colère du roi s’apaisa.
