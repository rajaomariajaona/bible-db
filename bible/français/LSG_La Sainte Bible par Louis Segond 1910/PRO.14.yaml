document_id: PRO.14,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: La femme sage bâtit sa maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la femme insensée la renverse de ses propres mains.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Le cœur connaît ses propres chagrins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un étranger ne saurait partager sa joie.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: La maison des méchants sera détruite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la tente des hommes droits fleurira.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 16:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Telle voie paraît droite à un homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais son issue, c’est la voie de la mort.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Au milieu même du rire le cœur peut être affligé,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 5:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et la joie peut finir par la détresse.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Celui dont le cœur s’égare se rassasie de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 1:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ses voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’homme de bien se rassasie de ce qui est en lui.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: L’homme simple croit tout ce qu’on dit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’homme prudent est attentif à ses pas.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Le sage a de la retenue et se détourne du mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’insensé est arrogant et plein de sécurité.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Celui qui est prompt à la colère fait des sottises,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’homme plein de malice s’attire la haine.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Les simples ont en partage la folie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les hommes prudents se font de la science une couronne.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Les mauvais s’inclinent devant les bons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les méchants aux portes du juste.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 12:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Celui qui marche dans la droiture craint l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui prend des voies tortueuses le méprise.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 19:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le pauvre est odieux même à son ami,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les amis du riche sont nombreux.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Celui qui méprise son prochain commet un péché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais heureux celui qui a pitié des misérables!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ceux qui méditent le mal ne s’égarent-ils pas?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 6:38
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais ceux qui méditent le bien agissent avec bonté et fidélité.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Tout travail procure l’abondance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les paroles en l’air ne mènent qu’à la disette.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: La richesse est une couronne pour les sages;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La folie des insensés est toujours de la folie.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Le témoin véridique délivre des âmes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le trompeur dit des mensonges.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Celui qui craint l’Éternel possède un appui ferme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses enfants ont un refuge auprès de lui.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 10:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La crainte de l’Éternel est une source de vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour détourner des pièges de la mort.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Quand le peuple est nombreux, c’est la gloire d’un roi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand le peuple manque, c’est la ruine du prince.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Celui qui est lent à la colère a une grande intelligence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui est prompt à s’emporter proclame sa folie.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Dans la bouche de l’insensé est une verge pour son orgueil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les lèvres des sages les gardent.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Un cœur calme est la vie du corps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’envie est la carie des os.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 17:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Opprimer le pauvre, c’est outrager celui qui l’a fait;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 14:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais avoir pitié de l’indigent, c’est l’honorer.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Le méchant est renversé par sa méchanceté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le juste trouve un refuge même en sa mort.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 10:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Dans un cœur intelligent repose la sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais au milieu des insensés elle se montre à découvert.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: La justice élève une nation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le péché est la honte des peuples.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: La faveur du roi est pour le serviteur prudent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa colère pour celui qui fait honte.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: S’il n’y a pas de bœufs, la crèche est vide;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est à la vigueur des bœufs qu’on doit l’abondance des revenus.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Un '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 12:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: témoin fidèle ne ment pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais un faux témoin dit des mensonges.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Le moqueur cherche la sagesse et ne la trouve pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais pour l’homme intelligent la science est chose facile.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Éloigne-toi de l’insensé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n’est pas sur ses lèvres que tu aperçois la science.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: La sagesse de l’homme prudent, c’est l’intelligence de sa voie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La folie des insensés, c’est la tromperie.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Les insensés se font un jeu du péché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais parmi les hommes droits se trouve la bienveillance.
