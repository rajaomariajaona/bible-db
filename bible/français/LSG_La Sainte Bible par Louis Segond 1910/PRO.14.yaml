document_id: PRO.14,93
type_code: fra
verses:
  '1':
  - type: text
    content: La femme sage bâtit sa maison,
  - type: text
    content: Et la femme insensée la renverse de ses propres mains.
  '10':
  - type: text
    content: Le cœur connaît ses propres chagrins,
  - type: text
    content: Et un étranger ne saurait partager sa joie.
  '11':
  - type: text
    content: La maison des méchants sera détruite,
  - type: text
    content: Mais la tente des hommes droits fleurira.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Pr 16:25.
  - type: text
    content: Telle voie paraît droite à un homme,
  - type: text
    content: Mais son issue, c’est la voie de la mort.
  '13':
  - type: text
    content: Au milieu même du rire le cœur peut être affligé,
  - type: note
    content: Pr 5:4.
  - type: text
    content: Et la joie peut finir par la détresse.
  '14':
  - type: text
    content: 'Celui dont le cœur s’égare se rassasie de '
  - type: note
    content: Pr 1:31.
  - type: text
    content: ses voies,
  - type: text
    content: Et l’homme de bien se rassasie de ce qui est en lui.
  '15':
  - type: text
    content: L’homme simple croit tout ce qu’on dit,
  - type: text
    content: Mais l’homme prudent est attentif à ses pas.
  '16':
  - type: text
    content: Le sage a de la retenue et se détourne du mal,
  - type: text
    content: Mais l’insensé est arrogant et plein de sécurité.
  '17':
  - type: text
    content: Celui qui est prompt à la colère fait des sottises,
  - type: text
    content: Et l’homme plein de malice s’attire la haine.
  '18':
  - type: text
    content: Les simples ont en partage la folie,
  - type: text
    content: Et les hommes prudents se font de la science une couronne.
  '19':
  - type: text
    content: Les mauvais s’inclinent devant les bons,
  - type: text
    content: Et les méchants aux portes du juste.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Job 12:4.
  - type: text
    content: Celui qui marche dans la droiture craint l’Éternel,
  - type: text
    content: Mais celui qui prend des voies tortueuses le méprise.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Pr 19:4, 7.
  - type: text
    content: Le pauvre est odieux même à son ami,
  - type: text
    content: Mais les amis du riche sont nombreux.
  '21':
  - type: text
    content: Celui qui méprise son prochain commet un péché,
  - type: text
    content: Mais heureux celui qui a pitié des misérables!
  '22':
  - type: text
    content: Ceux qui méditent le mal ne s’égarent-ils pas?
  - type: note
    content: Lu 6:38.
  - type: text
    content: Mais ceux qui méditent le bien agissent avec bonté et fidélité.
  '23':
  - type: text
    content: Tout travail procure l’abondance,
  - type: text
    content: Mais les paroles en l’air ne mènent qu’à la disette.
  '24':
  - type: text
    content: La richesse est une couronne pour les sages;
  - type: text
    content: La folie des insensés est toujours de la folie.
  '25':
  - type: text
    content: Le témoin véridique délivre des âmes,
  - type: text
    content: Mais le trompeur dit des mensonges.
  '26':
  - type: text
    content: Celui qui craint l’Éternel possède un appui ferme,
  - type: text
    content: Et ses enfants ont un refuge auprès de lui.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Pr 10:11; 13:14.
  - type: text
    content: La crainte de l’Éternel est une source de vie,
  - type: text
    content: Pour détourner des pièges de la mort.
  '28':
  - type: text
    content: Quand le peuple est nombreux, c’est la gloire d’un roi;
  - type: text
    content: Quand le peuple manque, c’est la ruine du prince.
  '29':
  - type: text
    content: Celui qui est lent à la colère a une grande intelligence,
  - type: text
    content: Mais celui qui est prompt à s’emporter proclame sa folie.
  '3':
  - type: text
    content: Dans la bouche de l’insensé est une verge pour son orgueil,
  - type: text
    content: Mais les lèvres des sages les gardent.
  '30':
  - type: text
    content: Un cœur calme est la vie du corps,
  - type: text
    content: Mais l’envie est la carie des os.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Pr 17:5.
  - type: text
    content: Opprimer le pauvre, c’est outrager celui qui l’a fait;
  - type: note
    content: Pr 14:21.
  - type: text
    content: Mais avoir pitié de l’indigent, c’est l’honorer.
  '32':
  - type: text
    content: Le méchant est renversé par sa méchanceté,
  - type: text
    content: Mais le juste trouve un refuge même en sa mort.
  '33':
  - type: text
    content: ' '
  - type: note
    content: Pr 10:14; 12:23; 13:16.
  - type: text
    content: Dans un cœur intelligent repose la sagesse,
  - type: text
    content: Mais au milieu des insensés elle se montre à découvert.
  '34':
  - type: text
    content: La justice élève une nation,
  - type: text
    content: Mais le péché est la honte des peuples.
  '35':
  - type: text
    content: La faveur du roi est pour le serviteur prudent,
  - type: text
    content: Et sa colère pour celui qui fait honte.
  '4':
  - type: text
    content: S’il n’y a pas de bœufs, la crèche est vide;
  - type: text
    content: C’est à la vigueur des bœufs qu’on doit l’abondance des revenus.
  '5':
  - type: text
    content: 'Un '
  - type: note
    content: Ex 23:1. Pr 12:17.
  - type: text
    content: témoin fidèle ne ment pas,
  - type: text
    content: Mais un faux témoin dit des mensonges.
  '6':
  - type: text
    content: Le moqueur cherche la sagesse et ne la trouve pas,
  - type: text
    content: Mais pour l’homme intelligent la science est chose facile.
  '7':
  - type: text
    content: Éloigne-toi de l’insensé;
  - type: text
    content: Ce n’est pas sur ses lèvres que tu aperçois la science.
  '8':
  - type: text
    content: La sagesse de l’homme prudent, c’est l’intelligence de sa voie;
  - type: text
    content: La folie des insensés, c’est la tromperie.
  '9':
  - type: text
    content: Les insensés se font un jeu du péché,
  - type: text
    content: Mais parmi les hommes droits se trouve la bienveillance.
