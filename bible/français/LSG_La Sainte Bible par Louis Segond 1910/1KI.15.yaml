document_id: 1KI.15,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abijam et Asa, rois de Juda. — Nadab, Baescha, Éla, Zimri, Omri, rois d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. 2 Ch 13. Ps 103:17.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 13:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'La dix-huitième année du règne de Jéroboam, fils de Nebath, Abijam régna sur Juda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Il régna quarante et un ans à Jérusalem. Sa mère s’appelait Maaca, fille d’Abisalom. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Asa fit ce qui est droit aux yeux de l’Éternel, comme David, son père. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Il ôta du pays '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 22:47
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'les prostitués, et il fit disparaître toutes les idoles que ses pères avaient faites. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 15:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et même il enleva la dignité de reine à Maaca, sa mère, parce qu’elle avait fait une idole pour Astarté. Asa abattit son idole, et la brûla au torrent de Cédron. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais les hauts lieux ne disparurent point, quoique le cœur d’Asa fût en entier à l’Éternel pendant toute sa vie. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Il mit dans la maison de l’Éternel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 5:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les choses consacrées par son père et par lui-même, de l’argent, de l’or et des vases.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-24: cf. 2 Ch 16. Jé 17:5.'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il y eut guerre entre Asa et Baescha, roi d’Israël, pendant toute leur vie. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 16:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Baescha, roi d’Israël, monta contre Juda; et il bâtit Rama, pour empêcher ceux d’Asa, roi de Juda, de sortir et d’entrer. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Asa prit tout l’argent et tout l’or qui étaient restés dans les trésors de la maison de l’Éternel et les trésors de la maison du roi, et il les mit entre les mains de ses serviteurs qu’il envoya vers '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 20:1
      - type: text
        text: . 2 Ch 16:2, etc.
      marker-yv: yv-n
    - type: text
      text: 'Ben-Hadad, fils de Thabrimmon, fils de Hezjon, roi de Syrie, qui habitait à Damas. Le roi Asa lui fit dire: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Qu’il y ait une alliance entre moi et toi, comme il y en eut une entre mon père et ton père. Voici, je t’envoie un présent en argent et en or. Va, romps ton alliance avec Baescha, roi d’Israël, afin qu’il s’éloigne de moi. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 13:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il régna trois ans à Jérusalem. Sa mère s’appelait Maaca, fille d’Abisalom. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ben-Hadad écouta le roi Asa; il envoya les chefs de son armée contre les villes d’Israël, et il battit Ijjon, Dan, Abel-Beth-Maaca, tout Kinneroth, et tout le pays de Nephthali. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Lorsque Baescha l’apprit, il cessa de bâtir Rama, et il resta à Thirtsa. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Le roi Asa convoqua tout Juda, sans exempter personne, et ils emportèrent les pierres et le bois que Baescha employait à la construction de Rama; et le roi Asa s’en servit pour bâtir Guéba de Benjamin et Mitspa. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Le reste de toutes les actions d’Asa, tous ses exploits et tout ce qu’il a fait, et les villes qu’il a bâties, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? Toutefois, à l’époque de sa vieillesse, il eut les pieds malades. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 16:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Asa se coucha avec ses pères, et il fut enterré avec ses pères dans la ville de David, son père. Et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 17:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Josaphat, son fils, régna à sa place.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 25-32: cf. 1 R 14:7-16. No 23:19. Ec 8:11-13.'
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Nadab, fils de Jéroboam, régna sur Israël, la seconde année d’Asa, roi de Juda. Il régna deux ans sur Israël. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Il fit ce qui est mal aux yeux de l’Éternel; et il marcha dans la voie de son père, se livrant aux péchés que son père avait fait commettre à Israël. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Baescha, fils d’Achija, de la maison d’Issacar, conspira contre lui, et Baescha le tua à Guibbethon, qui appartenait aux Philistins, pendant que Nadab et tout Israël assiégeaient Guibbethon. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Baescha le fit périr la troisième année d’Asa, roi de Juda, et il régna à sa place. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Lorsqu’il fut roi, il frappa toute la maison de Jéroboam, il n’en laissa échapper personne et il détruisit tout ce qui respirait, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 14:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'selon la parole que l’Éternel avait dite par son serviteur Achija de Silo, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il se livra à tous les péchés que son père avait commis avant lui; et son cœur ne fut point tout entier à l’Éternel, son Dieu, comme l’avait été le cœur de David, son père. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'à cause des péchés que Jéroboam avait commis et qu’il avait fait commettre à Israël, irritant ainsi l’Éternel, le Dieu d’Israël. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Le reste des actions de Nadab, et tout ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Il y eut guerre entre Asa et Baescha, roi d’Israël, pendant toute leur vie.
  - type: usfm
    marker: r
    children:
    - type: text
      text: '15 v. 33 à 16 v. 7: cf. 1 R 14:7-11, 14; 21:20-24. (2 R 17:13, 14. Jé 11:7, 8.)'
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'La troisième année d’Asa, roi de Juda, Baescha, fils d’Achija, régna sur tout Israël à Thirtsa. Il régna vingt-quatre ans. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Il fit ce qui est mal aux yeux de l’Éternel, et il marcha dans la voie de Jéroboam, se livrant aux péchés que Jéroboam avait fait commettre à Israël.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mais à cause de David, l’Éternel, son Dieu, lui donna '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 11:36
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'une lampe à Jérusalem, en établissant son fils après lui et en laissant subsister Jérusalem. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Car David avait fait ce qui est droit aux yeux de l’Éternel, et il ne s’était détourné d’aucun de ses commandements pendant toute sa vie, excepté '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 11:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'dans l’affaire d’Urie, le Héthien. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il y eut guerre entre Roboam et Jéroboam, tant que vécut Roboam. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Le reste des actions d’Abijam, et tout ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? Il y eut guerre entre Abijam et Jéroboam. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Abijam se coucha avec ses pères, et on l’enterra dans la ville de David. Et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 14:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Asa, son fils, régna à sa place.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-15: cf. 2 Ch 14; 15. Ps 119:5, 9-11.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'La vingtième année de Jéroboam, roi d’Israël, Asa régna sur Juda. '
