document_id: 1KI.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Abijam et Asa, rois de Juda. — Nadab, Baescha, Éla, Zimri, Omri, rois d’Israël
  - type: heading
    content: 'V. 1-8: cf. 2 Ch 13. Ps 103:17.'
  - type: text
    content: ' '
  - type: note
    content: 2 Ch 13:1.
  - type: text
    content: 'La dix-huitième année du règne de Jéroboam, fils de Nebath, Abijam régna sur Juda. '
  '10':
  - type: text
    content: 'Il régna quarante et un ans à Jérusalem. Sa mère s’appelait Maaca, fille d’Abisalom. '
  '11':
  - type: text
    content: 'Asa fit ce qui est droit aux yeux de l’Éternel, comme David, son père. '
  '12':
  - type: text
    content: 'Il ôta du pays '
  - type: note
    content: 1 R 22:47.
  - type: text
    content: 'les prostitués, et il fit disparaître toutes les idoles que ses pères avaient faites. '
  '13':
  - type: note
    content: 2 Ch 15:16.
  - type: text
    content: 'Et même il enleva la dignité de reine à Maaca, sa mère, parce qu’elle avait fait une idole pour Astarté. Asa abattit son idole, et la brûla au torrent de Cédron. '
  '14':
  - type: text
    content: 'Mais les hauts lieux ne disparurent point, quoique le cœur d’Asa fût en entier à l’Éternel pendant toute sa vie. '
  '15':
  - type: text
    content: 'Il mit dans la maison de l’Éternel '
  - type: note
    content: Lé 5:15.
  - type: text
    content: les choses consacrées par son père et par lui-même, de l’argent, de l’or et des vases.
  - type: heading
    content: 'V. 16-24: cf. 2 Ch 16. Jé 17:5.'
  '16':
  - type: text
    content: 'Il y eut guerre entre Asa et Baescha, roi d’Israël, pendant toute leur vie. '
  '17':
  - type: note
    content: 2 Ch 16:1.
  - type: text
    content: 'Baescha, roi d’Israël, monta contre Juda; et il bâtit Rama, pour empêcher ceux d’Asa, roi de Juda, de sortir et d’entrer. '
  '18':
  - type: text
    content: 'Asa prit tout l’argent et tout l’or qui étaient restés dans les trésors de la maison de l’Éternel et les trésors de la maison du roi, et il les mit entre les mains de ses serviteurs qu’il envoya vers '
  - type: note
    content: 1 R 20:1. 2 Ch 16:2, etc.
  - type: text
    content: 'Ben-Hadad, fils de Thabrimmon, fils de Hezjon, roi de Syrie, qui habitait à Damas. Le roi Asa lui fit dire: '
  '19':
  - type: text
    content: 'Qu’il y ait une alliance entre moi et toi, comme il y en eut une entre mon père et ton père. Voici, je t’envoie un présent en argent et en or. Va, romps ton alliance avec Baescha, roi d’Israël, afin qu’il s’éloigne de moi. '
  '2':
  - type: note
    content: 2 Ch 13:2.
  - type: text
    content: 'Il régna trois ans à Jérusalem. Sa mère s’appelait Maaca, fille d’Abisalom. '
  '20':
  - type: text
    content: 'Ben-Hadad écouta le roi Asa; il envoya les chefs de son armée contre les villes d’Israël, et il battit Ijjon, Dan, Abel-Beth-Maaca, tout Kinneroth, et tout le pays de Nephthali. '
  '21':
  - type: text
    content: 'Lorsque Baescha l’apprit, il cessa de bâtir Rama, et il resta à Thirtsa. '
  '22':
  - type: text
    content: 'Le roi Asa convoqua tout Juda, sans exempter personne, et ils emportèrent les pierres et le bois que Baescha employait à la construction de Rama; et le roi Asa s’en servit pour bâtir Guéba de Benjamin et Mitspa. '
  '23':
  - type: text
    content: 'Le reste de toutes les actions d’Asa, tous ses exploits et tout ce qu’il a fait, et les villes qu’il a bâties, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? Toutefois, à l’époque de sa vieillesse, il eut les pieds malades. '
  '24':
  - type: note
    content: 2 Ch 16:13.
  - type: text
    content: 'Asa se coucha avec ses pères, et il fut enterré avec ses pères dans la ville de David, son père. Et '
  - type: note
    content: 2 Ch 17:1.
  - type: text
    content: Josaphat, son fils, régna à sa place.
  - type: heading
    content: 'V. 25-32: cf. 1 R 14:7-16. No 23:19. Ec 8:11-13.'
  '25':
  - type: text
    content: 'Nadab, fils de Jéroboam, régna sur Israël, la seconde année d’Asa, roi de Juda. Il régna deux ans sur Israël. '
  '26':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l’Éternel; et il marcha dans la voie de son père, se livrant aux péchés que son père avait fait commettre à Israël. '
  '27':
  - type: text
    content: 'Baescha, fils d’Achija, de la maison d’Issacar, conspira contre lui, et Baescha le tua à Guibbethon, qui appartenait aux Philistins, pendant que Nadab et tout Israël assiégeaient Guibbethon. '
  '28':
  - type: text
    content: 'Baescha le fit périr la troisième année d’Asa, roi de Juda, et il régna à sa place. '
  '29':
  - type: text
    content: 'Lorsqu’il fut roi, il frappa toute la maison de Jéroboam, il n’en laissa échapper personne et il détruisit tout ce qui respirait, '
  - type: note
    content: 1 R 14:10, 14.
  - type: text
    content: 'selon la parole que l’Éternel avait dite par son serviteur Achija de Silo, '
  '3':
  - type: text
    content: 'Il se livra à tous les péchés que son père avait commis avant lui; et son cœur ne fut point tout entier à l’Éternel, son Dieu, comme l’avait été le cœur de David, son père. '
  '30':
  - type: text
    content: 'à cause des péchés que Jéroboam avait commis et qu’il avait fait commettre à Israël, irritant ainsi l’Éternel, le Dieu d’Israël. '
  '31':
  - type: text
    content: 'Le reste des actions de Nadab, et tout ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël? '
  '32':
  - type: text
    content: Il y eut guerre entre Asa et Baescha, roi d’Israël, pendant toute leur vie.
  - type: heading
    content: '15 v. 33 à 16 v. 7: cf. 1 R 14:7-11, 14; 21:20-24. (2 R 17:13, 14. Jé 11:7, 8.)'
  '33':
  - type: text
    content: 'La troisième année d’Asa, roi de Juda, Baescha, fils d’Achija, régna sur tout Israël à Thirtsa. Il régna vingt-quatre ans. '
  '34':
  - type: text
    content: Il fit ce qui est mal aux yeux de l’Éternel, et il marcha dans la voie de Jéroboam, se livrant aux péchés que Jéroboam avait fait commettre à Israël.
  '4':
  - type: text
    content: 'Mais à cause de David, l’Éternel, son Dieu, lui donna '
  - type: note
    content: 1 R 11:36.
  - type: text
    content: 'une lampe à Jérusalem, en établissant son fils après lui et en laissant subsister Jérusalem. '
  '5':
  - type: text
    content: 'Car David avait fait ce qui est droit aux yeux de l’Éternel, et il ne s’était détourné d’aucun de ses commandements pendant toute sa vie, excepté '
  - type: note
    content: 2 S 11:4, 15; 12:9.
  - type: text
    content: 'dans l’affaire d’Urie, le Héthien. '
  '6':
  - type: text
    content: 'Il y eut guerre entre Roboam et Jéroboam, tant que vécut Roboam. '
  '7':
  - type: text
    content: 'Le reste des actions d’Abijam, et tout ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? Il y eut guerre entre Abijam et Jéroboam. '
  '8':
  - type: text
    content: 'Abijam se coucha avec ses pères, et on l’enterra dans la ville de David. Et '
  - type: note
    content: 2 Ch 14:1.
  - type: text
    content: Asa, son fils, régna à sa place.
  - type: heading
    content: 'V. 9-15: cf. 2 Ch 14; 15. Ps 119:5, 9-11.'
  '9':
  - type: text
    content: 'La vingtième année de Jéroboam, roi d’Israël, Asa régna sur Juda. '
