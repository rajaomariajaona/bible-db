document_id: MAT.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Sermon sur la montagne (fin). Préceptes divers: — les jugements téméraires, — la paille et la poutre, — les choses saintes données aux chiens, — la persévérance dans la prière, — la porte étroite, — les faux prophètes, — la maison bâtie sur le roc'
  - type: heading
    content: 'V. 1-6: cf. Lu 6:37, 38, 41, 42.'
  - type: text
    content: ' '
  - type: note
    content: Lu 6:37. Ro 2:1. 1 Co 4:3, 5.
  - type: text
    content: Ne jugez point, afin que vous ne soyez point jugés.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Ou, s’il demande un poisson, lui donnera-t-il un serpent?
  - type: text
    content: ' '
  '11':
  - type: text
    content: Si donc,
  - type: text
    content: ' '
  - type: note
    content: Ge 6:5; 8:21.
  - type: text
    content: méchants comme vous l’êtes, vous savez donner de bonnes choses à vos enfants, à combien plus forte raison votre Père qui est dans les cieux donnera-t-il de bonnes choses à ceux qui les lui demandent.
  - type: text
    content: ' '
  '12':
  - type: note
    content: Lu 6:31.
  - type: text
    content: Tout ce que vous voulez que les hommes fassent pour vous, faites-le de même pour eux, car c’est la loi et les prophètes.
  - type: heading
    content: 'V. 13-14: cf. Lu 13:23-25.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Lu 13:24.
  - type: text
    content: Entrez par la porte étroite. Car large est la porte, spacieux est le chemin qui mènent à la perdition, et il y en a beaucoup qui entrent par là.
  - type: text
    content: ' '
  '14':
  - type: note
    content: Ac 14:22.
  - type: text
    content: Mais étroite est la porte, resserré le chemin qui mènent à la vie, et il y en a peu qui les trouvent.
  - type: heading
    content: 'V. 15-20: cf. Lu 6:43-45. (2 Ti 3:5-9. 2 Pi 2:1-3.)'
  '15':
  - type: text
    content: ' '
  - type: note
    content: De 13:3. Jé 23:16. Mt 24:4. Ro 16:17. Ép 5:6. Col 2:8. 1 Jn 4:1.
  - type: text
    content: Gardez-vous des faux prophètes. Ils viennent à vous en vêtements de brebis, mais au-dedans ce sont des loups ravisseurs.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Vous les reconnaîtrez à leurs fruits. Cueille-t-on des raisins sur des épines, ou des figues sur des chardons?
  - type: text
    content: ' '
  '17':
  - type: note
    content: Mt 3:10; 12:33. Mc 11:13. Lu 8:8.
  - type: text
    content: Tout bon arbre porte de bons fruits, mais le mauvais arbre porte de mauvais fruits.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Un bon arbre ne peut porter de mauvais fruits, ni un mauvais arbre porter de bons fruits.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Tout arbre qui ne porte pas de bons fruits est coupé et jeté au feu.
  - type: text
    content: ' '
  '2':
  - type: note
    content: Mc 4:24. Lu 6:38.
  - type: text
    content: Car on vous jugera du jugement dont vous jugez, et l’on vous mesurera avec la mesure dont vous mesurez.
  - type: text
    content: ' '
  '20':
  - type: text
    content: C’est donc à leurs fruits que vous les reconnaîtrez.
  - type: heading
    content: 'V. 21-29: cf. (Lu 13:25-28; 6:46-49.) Ps 1. Éz 13:10-15.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Mt 25:11. Lu 6:46; 13:25. Ac 19:13. Ro 2:13. Ja 1:22.
  - type: text
    content: 'Ceux qui me disent: Seigneur, Seigneur! N’entreront pas tous dans le royaume des cieux, mais celui-là seul qui fait la volonté de mon Père qui est dans les cieux.'
  - type: text
    content: ' '
  '22':
  - type: note
    content: Jé 14:14; 27:15. Lu 13:26.
  - type: text
    content: 'Plusieurs me diront en ce jour-là: Seigneur, Seigneur, n’avons-nous pas prophétisé par ton nom? N’avons-nous pas chassé des démons par ton nom? Et n’avons-nous pas fait beaucoup de miracles par ton nom?'
  - type: text
    content: ' '
  '23':
  - type: note
    content: Ps 6:9. Mt 25:12. Lu 13:25, 27.
  - type: text
    content: 'Alors je leur dirai ouvertement: Je ne vous ai jamais connus,'
  - type: text
    content: ' '
  - type: note
    content: Mt 25:41. Lu 13:25, 26.
  - type: text
    content: retirez-vous de moi, vous qui commettez l’iniquité.
  - type: text
    content: ' '
  '24':
  - type: note
    content: Jé 17:8. Lu 6:47. Ro 2:13. Ja 1:25.
  - type: text
    content: C’est pourquoi, quiconque entend ces paroles que je dis et les met en pratique, sera semblable à un homme prudent qui a bâti sa maison sur le roc.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'La pluie est tombée, les torrents sont venus, les vents ont soufflé et se sont jetés contre cette maison: elle n’est point tombée, parce qu’elle était fondée sur le roc.'
  - type: text
    content: ' '
  '26':
  - type: note
    content: Éz 13:11. Ro 2:13. Ja 1:23.
  - type: text
    content: Mais quiconque entend ces paroles que je dis, et ne les met pas en pratique, sera semblable à un homme insensé qui a bâti sa maison sur le sable.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'La pluie est tombée, les torrents sont venus, les vents ont soufflé et ont battu cette maison: elle est tombée, et sa ruine a été grande.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Après que Jésus eut achevé ces discours, la foule fut frappée de sa doctrine; '
  '29':
  - type: note
    content: Mc 1:22; 6:2. Lu 4:32.
  - type: text
    content: car il enseignait comme ayant autorité, et non pas comme leurs scribes.
  '3':
  - type: note
    content: Lu 6:41, 42.
  - type: text
    content: Pourquoi vois-tu la paille qui est dans l’œil de ton frère, et n’aperçois-tu pas la poutre qui est dans ton œil?
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Ou comment peux-tu dire à ton frère: Laisse-moi ôter une paille de ton œil, toi qui as une poutre dans le tien?'
  - type: text
    content: ' '
  '5':
  - type: note
    content: Pr 18:17.
  - type: text
    content: Hypocrite, ôte premièrement la poutre de ton œil, et alors tu verras comment ôter la paille de l’œil de ton frère.
  - type: text
    content: ' '
  '6':
  - type: note
    content: Pr 9:8; 23:9.
  - type: text
    content: Ne donnez pas les choses saintes aux chiens, et ne jetez pas vos perles devant les pourceaux, de peur qu’ils ne les foulent aux pieds, ne se retournent et ne vous déchirent.
  - type: heading
    content: 'V. 7-12: cf. Lu 11:5-13; 18:1-7.'
  '7':
  - type: text
    content: ' '
  - type: text
    content: Demandez,
  - type: text
    content: ' '
  - type: note
    content: Mt 21:22. Mc 11:24. Lu 11:9. Jn 14:13, 16, 24. Ja 1:5, 6. 1 Jn 3:22; 5:14.
  - type: text
    content: et l’on vous donnera; cherchez, et vous trouverez; frappez, et l’on vous ouvrira.
  - type: text
    content: ' '
  '8':
  - type: note
    content: Pr 8:17. Jé 29:12.
  - type: text
    content: Car quiconque demande reçoit, celui qui cherche trouve, et l’on ouvre à celui qui frappe.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Lequel de vous donnera une pierre à son fils, s’il lui demande du pain?
  - type: text
    content: ' '
