document_id: LUK.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Introduction
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-4: cf. Mc 1:1. Ac 1:1-3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Plusieurs ayant entrepris de composer un récit des événements qui se sont accomplis parmi nous, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'suivant ce que nous ont transmis ceux qui ont été des témoins oculaires dès le commencement et sont devenus des ministres de la parole, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'il m’a aussi semblé bon, après avoir fait des recherches exactes sur toutes ces choses depuis leur origine, de te les exposer par écrit d’une manière suivie, excellent Théophile, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: afin que tu reconnaisses la certitude des enseignements que tu as reçus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prédiction de la naissance de Jean-Baptiste, et de celle de Jésus-Christ
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 5-25: cf. Jg 13:2, etc. 1 S 1.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Du temps d’Hérode, roi de Judée, il y avait un sacrificateur, nommé Zacharie, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 24:10
      metadata:
        usfm: 1CH.24.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de la classe d’Abia; sa femme était d’entre les filles d’Aaron, et s’appelait Élisabeth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tous deux étaient justes devant Dieu, observant d’une manière irréprochable tous les commandements et toutes les ordonnances du Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils n’avaient point d’enfants, parce qu’Élisabeth était stérile; et ils étaient l’un et l’autre avancés en âge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Or, pendant qu’il s’acquittait de ses fonctions devant Dieu, selon le tour de sa classe, il fut appelé par le sort, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'd’après la règle du sacerdoce, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:6
      metadata:
        usfm: HEB.9.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à entrer dans le temple du Seigneur pour offrir le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 30:7
      metadata:
        usfm: EXO.30.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 16:17
      metadata:
        usfm: LEV.16.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'parfum. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Toute la multitude du peuple était dehors en prière, à l’heure du parfum. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors un ange du Seigneur apparut à Zacharie, et se tint debout à droite de l’autel des parfums. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Zacharie fut troublé en le voyant, et la frayeur s’empara de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais l’ange lui dit: Ne crains point, Zacharie; car ta prière a été exaucée. Ta femme Élisabeth t’enfantera un fils, et '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lu 11:60.
    marker-yv: yv-n
  - type: text
    text: 'tu lui donneras le nom de Jean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il sera pour toi un sujet de joie et d’allégresse, et plusieurs '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:58
      metadata:
        usfm: LUK.1.58
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'se réjouiront de sa naissance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Car il sera grand devant le Seigneur. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 13:4
      metadata:
        usfm: JDG.13.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il ne boira ni vin, ni liqueur enivrante, et il sera rempli de l’Esprit-Saint dès le sein de sa mère; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal 4:6
      metadata:
        usfm: MAL.4.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 11:14
      metadata:
        usfm: MAT.11.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il ramènera plusieurs des fils d’Israël au Seigneur, leur Dieu; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:2
      metadata:
        usfm: MAT.3.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:12
      metadata:
        usfm: MRK.9.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il marchera devant Dieu avec l’esprit et la puissance d’Élie, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal 4:6
      metadata:
        usfm: MAL.4.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour ramener les cœurs des pères vers les enfants, et les rebelles à la sagesse des justes, afin de préparer au Seigneur un peuple bien disposé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Zacharie dit à l’ange: A quoi reconnaîtrai-je cela? Car '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 17:17
      metadata:
        usfm: GEN.17.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je suis vieux, et ma femme est avancée en âge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L’ange lui répondit: Je suis Gabriel, je me tiens devant Dieu; j’ai été envoyé pour te parler, et pour t’annoncer cette bonne nouvelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Et voici, tu seras muet, et tu ne pourras parler jusqu’au jour où ces choses arriveront, parce que tu n’as pas cru à mes paroles, qui s’accompliront en leur temps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Cependant, le peuple attendait Zacharie, s’étonnant de ce qu’il restait si longtemps dans le temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Quand il sortit, il ne put leur parler, et ils comprirent qu’il avait eu une vision dans le temple; il leur faisait des signes, et il resta muet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Lorsque ses jours de service furent écoulés, il s’en alla chez lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Quelque temps après, Élisabeth, sa femme, devint enceinte. Elle se cacha pendant cinq mois, disant: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'C’est la grâce que le Seigneur m’a faite, quand il a jeté les yeux sur moi pour ôter mon '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 30:23
      metadata:
        usfm: GEN.30.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 4:1
      metadata:
        usfm: ISA.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: opprobre parmi les hommes.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 26-38: cf. És 7:14. Mt 1:18-23. Ps 110.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Au sixième mois, l’ange Gabriel fut envoyé par Dieu dans une ville de Galilée, appelée Nazareth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 1:18
      metadata:
        usfm: MAT.1.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'auprès d’une vierge fiancée à un homme de la maison de David, nommé Joseph. Le nom de la vierge était Marie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'L’ange entra chez elle, et dit: Je te salue, toi à qui une grâce a été faite; le Seigneur est avec toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Troublée par cette parole, Marie se demandait ce que pouvait signifier une telle salutation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'L’ange lui dit: Ne crains point, Marie; car tu as trouvé grâce devant Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 7:14
      metadata:
        usfm: ISA.7.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et voici, tu deviendras enceinte, et tu enfanteras un fils, et tu lui donneras le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 1:21
      metadata:
        usfm: MAT.1.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nom de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 54:5
      metadata:
        usfm: ISA.54.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il sera grand et sera appelé Fils du Très-Haut, et le Seigneur Dieu lui donnera le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:12
      metadata:
        usfm: 2SA.7.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 132:11
      metadata:
        usfm: PSA.132.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 9:6
      metadata:
        usfm: ISA.9.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'trône de David, son père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 22:10
      metadata:
        usfm: 1CH.22.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 45:7
      metadata:
        usfm: PSA.45.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 89:37
      metadata:
        usfm: PSA.89.37
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 23:5
      metadata:
        usfm: JER.23.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 7:14
      metadata:
        usfm: DAN.7.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '27'
      metadata:
        usfm: DAN.7.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 4:7
      metadata:
        usfm: MIC.4.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 1:8
      metadata:
        usfm: HEB.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il régnera sur la maison de Jacob éternellement, et son règne n’aura point de fin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Marie dit à l’ange: Comment cela se fera-t-il, puisque je ne connais point d’homme? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'L’ange lui répondit: Le Saint-Esprit viendra sur toi, et la puissance du Très-Haut te couvrira de son ombre. C’est pourquoi le saint enfant qui naîtra de toi sera appelé Fils de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Voici, Élisabeth, ta parente, a conçu, elle aussi, un fils en sa vieillesse, et celle qui était appelée stérile est dans son sixième mois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 42:2
      metadata:
        usfm: JOB.42.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 32:17
      metadata:
        usfm: JER.32.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 8:6
      metadata:
        usfm: ZEC.8.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 19:26
      metadata:
        usfm: MAT.19.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 18:27
      metadata:
        usfm: LUK.18.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car rien n’est impossible à Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Marie dit: Je suis la servante du Seigneur; qu’il me soit fait selon ta parole! Et l’ange la quitta.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Visite de Marie à Élisabeth. Cantique de Marie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 39-56: cf. 1 S 2:1-10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dans ce même temps, Marie se leva, et s’en alla en hâte vers les montagnes, dans une ville de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Elle entra dans la maison de Zacharie, et salua Élisabeth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Dès qu’Élisabeth entendit la salutation de Marie, son enfant tressaillit dans son sein, et elle fut remplie du Saint-Esprit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Elle s’écria d’une voix forte: Tu es bénie entre les femmes, et le fruit de ton sein est béni. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Comment m’est-il accordé que la mère de mon Seigneur vienne auprès de moi? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Car voici, aussitôt que la voix de ta salutation a frappé mon oreille, l’enfant a tressailli d’allégresse dans mon sein. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 11:28
      metadata:
        usfm: LUK.11.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Heureuse celle qui a cru, parce que les choses qui lui ont été dites de la part du Seigneur auront leur accomplissement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Et Marie dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon âme exalte le Seigneur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Et mon esprit se réjouit en Dieu, mon Sauveur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Parce qu’il a jeté les yeux sur la bassesse de sa servante.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car voici, désormais toutes les générations me diront bienheureuse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Parce que le Tout-Puissant a fait pour moi de grandes choses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son nom est saint,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:6
      metadata:
        usfm: EXO.20.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: et sa miséricorde s’étend d’âge en âge
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur ceux qui le craignent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
