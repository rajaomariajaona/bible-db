document_id: LUK.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Introduction
  - type: heading
    content: 'V. 1-4: cf. Mc 1:1. Ac 1:1-3.'
  - type: text
    content: 'Plusieurs ayant entrepris de composer un récit des événements qui se sont accomplis parmi nous, '
  '10':
  - type: text
    content: 'Toute la multitude du peuple était dehors en prière, à l’heure du parfum. '
  '11':
  - type: text
    content: 'Alors un ange du Seigneur apparut à Zacharie, et se tint debout à droite de l’autel des parfums. '
  '12':
  - type: text
    content: 'Zacharie fut troublé en le voyant, et la frayeur s’empara de lui. '
  '13':
  - type: text
    content: 'Mais l’ange lui dit: Ne crains point, Zacharie; car ta prière a été exaucée. Ta femme Élisabeth t’enfantera un fils, et '
  - type: note
    content: Lu 11:60.
  - type: text
    content: 'tu lui donneras le nom de Jean. '
  '14':
  - type: text
    content: 'Il sera pour toi un sujet de joie et d’allégresse, et plusieurs '
  - type: note
    content: Lu 1:58.
  - type: text
    content: 'se réjouiront de sa naissance. '
  '15':
  - type: text
    content: 'Car il sera grand devant le Seigneur. '
  - type: note
    content: Jg 13:4.
  - type: text
    content: 'Il ne boira ni vin, ni liqueur enivrante, et il sera rempli de l’Esprit-Saint dès le sein de sa mère; '
  '16':
  - type: note
    content: Mal 4:6. Mt 11:14.
  - type: text
    content: 'il ramènera plusieurs des fils d’Israël au Seigneur, leur Dieu; '
  '17':
  - type: note
    content: Mt 3:2. Mc 9:12.
  - type: text
    content: 'il marchera devant Dieu avec l’esprit et la puissance d’Élie, '
  - type: note
    content: Mal 4:6.
  - type: text
    content: 'pour ramener les cœurs des pères vers les enfants, et les rebelles à la sagesse des justes, afin de préparer au Seigneur un peuple bien disposé. '
  '18':
  - type: text
    content: 'Zacharie dit à l’ange: A quoi reconnaîtrai-je cela? Car '
  - type: note
    content: Ge 17:17.
  - type: text
    content: 'je suis vieux, et ma femme est avancée en âge. '
  '19':
  - type: text
    content: 'L’ange lui répondit: Je suis Gabriel, je me tiens devant Dieu; j’ai été envoyé pour te parler, et pour t’annoncer cette bonne nouvelle. '
  '2':
  - type: text
    content: 'suivant ce que nous ont transmis ceux qui ont été des témoins oculaires dès le commencement et sont devenus des ministres de la parole, '
  '20':
  - type: text
    content: 'Et voici, tu seras muet, et tu ne pourras parler jusqu’au jour où ces choses arriveront, parce que tu n’as pas cru à mes paroles, qui s’accompliront en leur temps. '
  '21':
  - type: text
    content: 'Cependant, le peuple attendait Zacharie, s’étonnant de ce qu’il restait si longtemps dans le temple. '
  '22':
  - type: text
    content: 'Quand il sortit, il ne put leur parler, et ils comprirent qu’il avait eu une vision dans le temple; il leur faisait des signes, et il resta muet. '
  '23':
  - type: text
    content: 'Lorsque ses jours de service furent écoulés, il s’en alla chez lui. '
  '24':
  - type: text
    content: 'Quelque temps après, Élisabeth, sa femme, devint enceinte. Elle se cacha pendant cinq mois, disant: '
  '25':
  - type: text
    content: 'C’est la grâce que le Seigneur m’a faite, quand il a jeté les yeux sur moi pour ôter mon '
  - type: note
    content: Ge 30:23. És 4:1.
  - type: text
    content: opprobre parmi les hommes.
  - type: heading
    content: 'V. 26-38: cf. És 7:14. Mt 1:18-23. Ps 110.'
  '26':
  - type: text
    content: 'Au sixième mois, l’ange Gabriel fut envoyé par Dieu dans une ville de Galilée, appelée Nazareth, '
  '27':
  - type: note
    content: Mt 1:18.
  - type: text
    content: 'auprès d’une vierge fiancée à un homme de la maison de David, nommé Joseph. Le nom de la vierge était Marie. '
  '28':
  - type: text
    content: 'L’ange entra chez elle, et dit: Je te salue, toi à qui une grâce a été faite; le Seigneur est avec toi. '
  '29':
  - type: text
    content: 'Troublée par cette parole, Marie se demandait ce que pouvait signifier une telle salutation. '
  '3':
  - type: text
    content: 'il m’a aussi semblé bon, après avoir fait des recherches exactes sur toutes ces choses depuis leur origine, de te les exposer par écrit d’une manière suivie, excellent Théophile, '
  '30':
  - type: text
    content: 'L’ange lui dit: Ne crains point, Marie; car tu as trouvé grâce devant Dieu. '
  '31':
  - type: note
    content: És 7:14.
  - type: text
    content: 'Et voici, tu deviendras enceinte, et tu enfanteras un fils, et tu lui donneras le '
  - type: note
    content: Mt 1:21.
  - type: text
    content: 'nom de Jésus. '
  '32':
  - type: note
    content: És 54:5.
  - type: text
    content: 'Il sera grand et sera appelé Fils du Très-Haut, et le Seigneur Dieu lui donnera le '
  - type: note
    content: 2 S 7:12. Ps 132:11. És 9:6.
  - type: text
    content: 'trône de David, son père. '
  '33':
  - type: note
    content: 1 Ch 22:10. Ps 45:7; 89:37. Jé 23:5. Da 7:14, 27. Mi 4:7. Hé 1:8.
  - type: text
    content: 'Il régnera sur la maison de Jacob éternellement, et son règne n’aura point de fin. '
  '34':
  - type: text
    content: 'Marie dit à l’ange: Comment cela se fera-t-il, puisque je ne connais point d’homme? '
  '35':
  - type: text
    content: 'L’ange lui répondit: Le Saint-Esprit viendra sur toi, et la puissance du Très-Haut te couvrira de son ombre. C’est pourquoi le saint enfant qui naîtra de toi sera appelé Fils de Dieu. '
  '36':
  - type: text
    content: 'Voici, Élisabeth, ta parente, a conçu, elle aussi, un fils en sa vieillesse, et celle qui était appelée stérile est dans son sixième mois. '
  '37':
  - type: note
    content: Job 42:2. Jé 32:17. Za 8:6. Mt 19:26. Lu 18:27.
  - type: text
    content: 'Car rien n’est impossible à Dieu. '
  '38':
  - type: text
    content: 'Marie dit: Je suis la servante du Seigneur; qu’il me soit fait selon ta parole! Et l’ange la quitta.'
  - type: heading
    content: Visite de Marie à Élisabeth. Cantique de Marie
  - type: heading
    content: 'V. 39-56: cf. 1 S 2:1-10.'
  '39':
  - type: text
    content: 'Dans ce même temps, Marie se leva, et s’en alla en hâte vers les montagnes, dans une ville de Juda. '
  '4':
  - type: text
    content: afin que tu reconnaisses la certitude des enseignements que tu as reçus.
  - type: heading
    content: Prédiction de la naissance de Jean-Baptiste, et de celle de Jésus-Christ
  - type: heading
    content: 'V. 5-25: cf. Jg 13:2, etc. 1 S 1.'
  '40':
  - type: text
    content: 'Elle entra dans la maison de Zacharie, et salua Élisabeth. '
  '41':
  - type: text
    content: 'Dès qu’Élisabeth entendit la salutation de Marie, son enfant tressaillit dans son sein, et elle fut remplie du Saint-Esprit. '
  '42':
  - type: text
    content: 'Elle s’écria d’une voix forte: Tu es bénie entre les femmes, et le fruit de ton sein est béni. '
  '43':
  - type: text
    content: 'Comment m’est-il accordé que la mère de mon Seigneur vienne auprès de moi? '
  '44':
  - type: text
    content: 'Car voici, aussitôt que la voix de ta salutation a frappé mon oreille, l’enfant a tressailli d’allégresse dans mon sein. '
  '45':
  - type: note
    content: Lu 11:28.
  - type: text
    content: 'Heureuse celle qui a cru, parce que les choses qui lui ont été dites de la part du Seigneur auront leur accomplissement. '
  '46':
  - type: text
    content: 'Et Marie dit:'
  - type: text
    content: Mon âme exalte le Seigneur,
  '47':
  - type: text
    content: Et mon esprit se réjouit en Dieu, mon Sauveur,
  '48':
  - type: text
    content: Parce qu’il a jeté les yeux sur la bassesse de sa servante.
  - type: text
    content: Car voici, désormais toutes les générations me diront bienheureuse,
  '49':
  - type: text
    content: Parce que le Tout-Puissant a fait pour moi de grandes choses.
  - type: text
    content: Son nom est saint,
  '5':
  - type: text
    content: 'Du temps d’Hérode, roi de Judée, il y avait un sacrificateur, nommé Zacharie, '
  - type: note
    content: 1 Ch 24:10.
  - type: text
    content: 'de la classe d’Abia; sa femme était d’entre les filles d’Aaron, et s’appelait Élisabeth. '
  '50':
  - type: text
    content: ' '
  - type: note
    content: Ex 20:6.
  - type: text
    content: et sa miséricorde s’étend d’âge en âge
  - type: text
    content: sur ceux qui le craignent.
  '51':
  - type: text
    content: ' '
  - type: note
    content: És 51:9; 52:10.
  - type: text
    content: Il a déployé la force de son bras;
  - type: note
    content: Ps 33:10. 1 Pi 5:5.
  - type: text
    content: Il a dispersé ceux qui avaient dans le cœur des pensées orgueilleuses.
  '52':
  - type: text
    content: Il a renversé les puissants de leurs trônes,
  - type: text
    content: 'et il a élevé les '
  - type: note
    content: 1 S 2:8. Ps 113:6.
  - type: text
    content: humbles.
  '53':
  - type: text
    content: ' '
  - type: note
    content: Ps 34:11.
  - type: text
    content: Il a rassasié de biens les affamés,
  - type: text
    content: et il a renvoyé les riches à vide.
  '54':
  - type: text
    content: ' '
  - type: note
    content: És 30:18; 41:9; 54:5. Jé 31:3, 20.
  - type: text
    content: Il a secouru Israël, son serviteur,
  - type: text
    content: et il s’est souvenu de sa miséricorde,
  '55':
  - type: text
    content: comme il l’avait dit à nos pères,
  - type: note
    content: Ge 17:19; 22:18. Ps 132:11.
  - type: text
    content: Envers Abraham et sa postérité pour toujours.
  '56':
  - type: text
    content: Marie demeura avec Élisabeth environ trois mois. Puis elle retourna chez elle.
  - type: heading
    content: Naissance de Jean-Baptiste
  - type: heading
    content: 'V. 57-66: cf. Ge 21:1-8. Ru 4:13-17.'
  '57':
  - type: text
    content: 'Le temps où Élisabeth devait accoucher arriva, et elle enfanta un fils. '
  '58':
  - type: text
    content: 'Ses voisins et ses parents apprirent que le Seigneur avait fait éclater envers elle sa miséricorde, et '
  - type: note
    content: Lu 1:14.
  - type: text
    content: 'ils se réjouirent avec elle. '
  '59':
  - type: text
    content: 'Le '
  - type: note
    content: Ge 17:12. Lé 12:3.
  - type: text
    content: 'huitième jour, ils vinrent pour circoncire l’enfant, et ils l’appelaient Zacharie, du nom de son père. '
  '6':
  - type: text
    content: 'Tous deux étaient justes devant Dieu, observant d’une manière irréprochable tous les commandements et toutes les ordonnances du Seigneur. '
  '60':
  - type: text
    content: 'Mais sa mère prit la parole, et dit: Non, '
  - type: note
    content: Lu 1:13.
  - type: text
    content: 'il sera appelé Jean. '
  '61':
  - type: text
    content: 'Ils lui dirent: Il n’y a dans ta parenté personne qui soit appelé de ce nom. '
  '62':
  - type: text
    content: 'Et ils firent des signes à son père pour savoir comment il voulait qu’on l’appelle. '
  '63':
  - type: text
    content: 'Zacharie demanda des tablettes, et il écrivit: Jean est son nom. Et tous furent dans l’étonnement. '
  '64':
  - type: text
    content: 'Au même instant, sa bouche s’ouvrit, sa langue se délia, et il parlait, bénissant Dieu. '
  '65':
  - type: text
    content: 'La crainte s’empara de tous les habitants d’alentour, et, dans toutes les montagnes de la Judée, on s’entretenait de toutes ces choses. '
  '66':
  - type: text
    content: 'Tous ceux qui les apprirent les gardèrent dans leur cœur, en disant: Que sera donc cet enfant? Et la main du Seigneur était avec lui.'
  - type: heading
    content: Cantique de Zacharie
  - type: heading
    content: 'V. 67-80: cf. Lu 2:25-32. (Lu 1:13-17; 3:2-18.)'
  '67':
  - type: text
    content: 'Zacharie, son père, fut rempli du Saint-Esprit, et il prophétisa, en ces mots:'
  '68':
  - type: text
    content: Béni soit le Seigneur, le Dieu d’Israël,
  - type: text
    content: De ce qu’il a visité et racheté son peuple,
  '69':
  - type: text
    content: ' '
  - type: note
    content: Ps 132:17.
  - type: text
    content: Et nous a suscité un puissant
  - type: text
    content: Sauveur Dans la maison de David, son serviteur,
  '7':
  - type: text
    content: 'Ils n’avaient point d’enfants, parce qu’Élisabeth était stérile; et ils étaient l’un et l’autre avancés en âge. '
  '70':
  - type: text
    content: ' '
  - type: note
    content: Ps 72:12. És 40:10. Jé 23:6; 30:10. Da 9:27.
  - type: text
    content: Comme il l’avait annoncé par la bouche de ses saints prophètes des temps anciens,
  '71':
  - type: text
    content: Un Sauveur qui nous délivre de nos ennemis et de la main de tous ceux qui nous haïssent!
  '72':
  - type: text
    content: C’est ainsi qu’il manifeste sa miséricorde envers nos pères,
  - type: text
    content: Et se souvient de sa sainte alliance,
  '73':
  - type: text
    content: ' '
  - type: note
    content: Ge 22:16. Ps 105:9. Jé 31:33. Hé 6:13, 17.
  - type: text
    content: Selon le serment par lequel il avait juré à Abraham, notre père,
  '74':
  - type: text
    content: ' '
  - type: note
    content: Hé 9:14.
  - type: text
    content: De nous permettre, après que nous serions délivrés de la main de nos ennemis,
  - type: text
    content: De le servir sans crainte,
  '75':
  - type: text
    content: ' '
  - type: note
    content: 1 Pi 1:15.
  - type: text
    content: En marchant devant lui dans la sainteté et dans la justice tous les jours de notre vie.
  '76':
  - type: text
    content: ' '
  - type: note
    content: Mal 4:5. Lu 1:17.
  - type: text
    content: Et toi, petit enfant, tu seras appelé prophète du Très-Haut;
  - type: text
    content: Car tu marcheras devant la face du Seigneur, pour préparer ses voies,
  '77':
  - type: text
    content: ' '
  - type: note
    content: Lu 3:3.
  - type: text
    content: Afin de donner à son peuple la connaissance du salut Par le pardon de ses péchés,
  '78':
  - type: text
    content: Grâce aux entrailles de la miséricorde de notre Dieu,
  - type: text
    content: 'En vertu de laquelle '
  - type: note
    content: Mal 4:2.
  - type: text
    content: le soleil levant nous a visités d’en haut,
  '79':
  - type: text
    content: ' '
  - type: note
    content: És 9:1; 42:7; 43:8; 49:9; 60:1.
  - type: text
    content: Pour éclairer ceux qui sont assis dans les ténèbres et dans l’ombre de la mort,
  - type: text
    content: Pour diriger nos pas dans le chemin de la paix.
  '8':
  - type: text
    content: 'Or, pendant qu’il s’acquittait de ses fonctions devant Dieu, selon le tour de sa classe, il fut appelé par le sort, '
  '80':
  - type: text
    content: ' '
  - type: note
    content: Lu 2:40.
  - type: text
    content: Or, l’enfant croissait, et se fortifiait en esprit. Et il demeura dans les déserts, jusqu’au jour où il se présenta devant Israël.
  '9':
  - type: text
    content: 'd’après la règle du sacerdoce, '
  - type: note
    content: Hé 9:6.
  - type: text
    content: 'à entrer dans le temple du Seigneur pour offrir le '
  - type: note
    content: Ex 30:7. Lé 16:17.
  - type: text
    content: 'parfum. '
