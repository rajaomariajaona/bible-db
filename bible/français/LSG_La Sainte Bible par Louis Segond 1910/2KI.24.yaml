document_id: 2KI.24
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 36:6
      metadata:
        usfm: 2CH.36.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'De son temps, Nebucadnetsar, roi de Babylone, se mit en campagne. Jojakim lui fut assujetti pendant trois ans; mais il se révolta de nouveau contre lui. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors l’Éternel envoya contre Jojakim des troupes de Chaldéens, des troupes de Syriens, des troupes de Moabites et des troupes d’Ammonites; il les envoya contre Juda pour le détruire, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 20:17
      metadata:
        usfm: 2KI.20.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:27
      metadata:
        usfm: 2KI.23.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'selon la parole que l’Éternel avait prononcée par ses serviteurs les prophètes. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Cela arriva uniquement sur l’ordre de l’Éternel, qui voulait ôter Juda de devant sa face, à cause de tous les péchés commis par Manassé, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et à cause du sang innocent qu’avait répandu Manassé et dont il avait rempli Jérusalem. Aussi l’Éternel ne voulut-il point pardonner. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le reste des actions de Jojakim, et tout ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jojakim se coucha avec ses pères. Et Jojakin, son fils, régna à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le roi d’Égypte ne sortit plus de son pays, car le roi de Babylone avait pris tout ce qui était au roi d’Égypte depuis le torrent d’Égypte jusqu’au fleuve de l’Euphrate.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-17: cf. (2 Ch 36:9-10. Jé 22:24-30.) (Est 2:5-6. Éz 1:2.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jojakin avait dix-huit ans lorsqu’il devint roi, et il régna trois mois à Jérusalem. Sa mère s’appelait Nehuschtha, fille d’Elnathan, de Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l’Éternel, entièrement comme avait fait son père. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 1:1
      metadata:
        usfm: DAN.1.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'En ce temps-là, les serviteurs de Nebucadnetsar, roi de Babylone, montèrent contre Jérusalem, et la ville fut assiégée. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nebucadnetsar, roi de Babylone, arriva devant la ville pendant que ses serviteurs l’assiégeaient. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors Jojakin, roi de Juda, se rendit auprès du roi de Babylone, avec sa mère, ses serviteurs, ses chefs et ses eunuques. Et le roi de Babylone le fit prisonnier, la huitième année de son règne. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 20:17
      metadata:
        usfm: 2KI.20.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 39:6
      metadata:
        usfm: ISA.39.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il tira de là tous les trésors de la maison de l’Éternel et les trésors de la maison du roi; et il brisa tous les ustensiles d’or que Salomon, roi d’Israël, avait faits dans le temple de l’Éternel, comme l’Éternel l’avait prononcé. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il emmena en captivité tout Jérusalem, tous les chefs et tous les hommes vaillants, au nombre de dix mille exilés, avec tous les charpentiers et les serruriers: il ne resta que le peuple pauvre du pays. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 36:10
      metadata:
        usfm: 2CH.36.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Est 2:6
      metadata:
        usfm: EST.2.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il transporta Jojakin à Babylone; et il emmena captifs de Jérusalem à Babylone la mère du roi, les femmes du roi et ses eunuques, et les grands du pays, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 52:28
      metadata:
        usfm: JER.52.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tous les guerriers au nombre de sept mille, et les charpentiers et les serruriers au nombre de mille, tous hommes vaillants et propres à la guerre. Le roi de Babylone les emmena captifs à Babylone. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 37:1
      metadata:
        usfm: JER.37.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 52:1
      metadata:
        usfm: JER.52.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: le roi de Babylone établit roi, à la place de Jojakin, Matthania, son oncle, dont il changea le nom en celui de Sédécias.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sédécias, dernier roi de Juda. Siège et destruction de Jérusalem par Nebucadnetsar, roi de Babylone
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: '24 v. 18 à 25 v. 7: cf. 2 Ch 36:11-16. Jé 52:1-11; 39:1-7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Sédécias avait vingt et un ans lorsqu’il devint roi, et il régna onze ans à Jérusalem. Sa mère s’appelait Hamuthal, fille de Jérémie, de Libna. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l’Éternel, entièrement comme avait fait Jojakim. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Et cela arriva à cause de la colère de l’Éternel contre Jérusalem et contre Juda, qu’il voulait rejeter de devant sa face. Et Sédécias se révolta contre le roi de Babylone.
