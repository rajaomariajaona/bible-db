document_id: 2KI.24,93
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 2 Ch 36:6.
  - type: text
    content: 'De son temps, Nebucadnetsar, roi de Babylone, se mit en campagne. Jojakim lui fut assujetti pendant trois ans; mais il se révolta de nouveau contre lui. '
  '10':
  - type: note
    content: Da 1:1.
  - type: text
    content: 'En ce temps-là, les serviteurs de Nebucadnetsar, roi de Babylone, montèrent contre Jérusalem, et la ville fut assiégée. '
  '11':
  - type: text
    content: 'Nebucadnetsar, roi de Babylone, arriva devant la ville pendant que ses serviteurs l’assiégeaient. '
  '12':
  - type: text
    content: 'Alors Jojakin, roi de Juda, se rendit auprès du roi de Babylone, avec sa mère, ses serviteurs, ses chefs et ses eunuques. Et le roi de Babylone le fit prisonnier, la huitième année de son règne. '
  '13':
  - type: note
    content: 2 R 20:17. És 39:6.
  - type: text
    content: 'Il tira de là tous les trésors de la maison de l’Éternel et les trésors de la maison du roi; et il brisa tous les ustensiles d’or que Salomon, roi d’Israël, avait faits dans le temple de l’Éternel, comme l’Éternel l’avait prononcé. '
  '14':
  - type: text
    content: 'Il emmena en captivité tout Jérusalem, tous les chefs et tous les hommes vaillants, au nombre de dix mille exilés, avec tous les charpentiers et les serruriers: il ne resta que le peuple pauvre du pays. '
  '15':
  - type: note
    content: 2 Ch 36:10. Est 2:6.
  - type: text
    content: 'Il transporta Jojakin à Babylone; et il emmena captifs de Jérusalem à Babylone la mère du roi, les femmes du roi et ses eunuques, et les grands du pays, '
  '16':
  - type: note
    content: Jé 52:28.
  - type: text
    content: 'tous les guerriers au nombre de sept mille, et les charpentiers et les serruriers au nombre de mille, tous hommes vaillants et propres à la guerre. Le roi de Babylone les emmena captifs à Babylone. '
  '17':
  - type: text
    content: 'Et '
  - type: note
    content: Jé 37:1; 52:1.
  - type: text
    content: le roi de Babylone établit roi, à la place de Jojakin, Matthania, son oncle, dont il changea le nom en celui de Sédécias.
  - type: heading
    content: Sédécias, dernier roi de Juda. Siège et destruction de Jérusalem par Nebucadnetsar, roi de Babylone
  - type: heading
    content: '24 v. 18 à 25 v. 7: cf. 2 Ch 36:11-16. Jé 52:1-11; 39:1-7.'
  '18':
  - type: text
    content: 'Sédécias avait vingt et un ans lorsqu’il devint roi, et il régna onze ans à Jérusalem. Sa mère s’appelait Hamuthal, fille de Jérémie, de Libna. '
  '19':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l’Éternel, entièrement comme avait fait Jojakim. '
  '2':
  - type: text
    content: 'Alors l’Éternel envoya contre Jojakim des troupes de Chaldéens, des troupes de Syriens, des troupes de Moabites et des troupes d’Ammonites; il les envoya contre Juda pour le détruire, '
  - type: note
    content: 2 R 20:17; 23:27.
  - type: text
    content: 'selon la parole que l’Éternel avait prononcée par ses serviteurs les prophètes. '
  '20':
  - type: text
    content: Et cela arriva à cause de la colère de l’Éternel contre Jérusalem et contre Juda, qu’il voulait rejeter de devant sa face. Et Sédécias se révolta contre le roi de Babylone.
  '3':
  - type: text
    content: 'Cela arriva uniquement sur l’ordre de l’Éternel, qui voulait ôter Juda de devant sa face, à cause de tous les péchés commis par Manassé, '
  '4':
  - type: text
    content: 'et à cause du sang innocent qu’avait répandu Manassé et dont il avait rempli Jérusalem. Aussi l’Éternel ne voulut-il point pardonner. '
  '5':
  - type: text
    content: 'Le reste des actions de Jojakim, et tout ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  '6':
  - type: text
    content: 'Jojakim se coucha avec ses pères. Et Jojakin, son fils, régna à sa place. '
  '7':
  - type: text
    content: Le roi d’Égypte ne sortit plus de son pays, car le roi de Babylone avait pris tout ce qui était au roi d’Égypte depuis le torrent d’Égypte jusqu’au fleuve de l’Euphrate.
  - type: heading
    content: 'V. 8-17: cf. (2 Ch 36:9-10. Jé 22:24-30.) (Est 2:5-6. Éz 1:2.)'
  '8':
  - type: text
    content: 'Jojakin avait dix-huit ans lorsqu’il devint roi, et il régna trois mois à Jérusalem. Sa mère s’appelait Nehuschtha, fille d’Elnathan, de Jérusalem. '
  '9':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l’Éternel, entièrement comme avait fait son père. '
