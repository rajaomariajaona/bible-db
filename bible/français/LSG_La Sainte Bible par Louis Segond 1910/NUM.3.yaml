document_id: NUM.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Dénombrement des Lévites
  - type: heading
    content: 'V. 1-4: cf. 1 Ch 24:1-19. Hé 5:4.'
  - type: text
    content: 'Voici la postérité d’Aaron et de Moïse, au temps où l’Éternel parla à Moïse, sur la montagne de Sinaï. '
  '10':
  - type: text
    content: 'Tu établiras Aaron et ses fils pour qu’ils observent les fonctions de leur sacerdoce; et l’étranger qui approchera sera puni de mort. '
  '11':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '12':
  - type: text
    content: 'Voici, j’ai pris les Lévites du milieu des enfants d’Israël, à la place de tous les '
  - type: note
    content: Ex 13:2.
  - type: text
    content: 'premiers-nés, des premiers-nés des enfants d’Israël; et les Lévites m’appartiendront. '
  '13':
  - type: text
    content: 'Car tout premier-né m’appartient; le jour où j’ai frappé tous les premiers-nés dans le pays d’Égypte, '
  - type: note
    content: Ex 13:2; 22:29; 34:19. Lé 27:26. No 8:16. Lu 2:23.
  - type: text
    content: 'je me suis consacré tous les premiers-nés en Israël, tant des hommes que des animaux: ils m’appartiendront. Je suis l’Éternel.'
  - type: heading
    content: 'V. 14-39: cf. (1 Ch 6:16-48. No 4.) Ép 4:11-16.'
  '14':
  - type: text
    content: 'L’Éternel parla à Moïse, dans le désert de Sinaï, et dit: '
  '15':
  - type: text
    content: 'Fais le dénombrement des enfants de Lévi, selon les maisons de leurs pères, selon leurs familles; tu feras le dénombrement de tous les mâles, depuis l’âge d’un mois et au-dessus. '
  '16':
  - type: text
    content: 'Moïse en fit le dénombrement sur l’ordre de l’Éternel, en se conformant à l’ordre qui lui fut donné. '
  '17':
  - type: note
    content: Ex 6:15, 16, 17. No 26:57. 1 Ch 6:1; 23:6.
  - type: text
    content: 'Ce sont ici les fils de Lévi, d’après leurs noms: Guerschon, Kehath et Merari. '
  '18':
  - type: text
    content: 'Voici les noms des fils de Guerschon, selon leurs familles: Libni et Schimeï. '
  '19':
  - type: text
    content: 'Voici les fils de Kehath, selon leurs familles: Amram, Jitsehar, Hébron et Uziel; '
  '2':
  - type: text
    content: 'Voici les noms des fils d’Aaron: '
  - type: note
    content: Ex 6:22.
  - type: text
    content: 'Nadab, le premier-né, Abihu, Éléazar et Ithamar. '
  '20':
  - type: text
    content: 'et les fils de Merari, selon leurs familles: Machli et Muschi. Ce sont là les familles de Lévi, selon les maisons de leurs pères. '
  '21':
  - type: text
    content: 'De Guerschon descendent la famille de Libni et la famille de Schimeï, formant les familles des Guerschonites. '
  '22':
  - type: text
    content: 'Ceux dont on fit le dénombrement, en comptant tous les mâles depuis l’âge d’un mois et au-dessus, furent sept mille cinq cents. '
  '23':
  - type: text
    content: 'Les familles des Guerschonites campaient derrière le tabernacle à l’occident. '
  '24':
  - type: text
    content: 'Le chef de la maison paternelle des Guerschonites était Éliasaph, fils de Laël. '
  '25':
  - type: text
    content: 'Pour ce qui concerne la tente d’assignation, on remit aux soins des fils de Guerschon le tabernacle et la tente, la couverture, le rideau qui est à l’entrée de la tente d’assignation; '
  '26':
  - type: text
    content: 'les toiles du parvis et le rideau de l’entrée du parvis, tout autour du tabernacle et de l’autel, et tous les cordages pour le service du tabernacle. '
  '27':
  - type: text
    content: 'De Kehath descendent la famille des Amramites, la famille des Jitseharites, la famille des Hébronites et la famille des Uziélites, formant les familles des Kehathites. '
  '28':
  - type: text
    content: 'En comptant tous les mâles depuis l’âge d’un mois et au-dessus, il y en eut huit mille six cents, qui furent chargés des soins du sanctuaire. '
  '29':
  - type: text
    content: 'Les familles des fils de Kehath campaient au côté méridional du tabernacle. '
  '3':
  - type: text
    content: 'Ce sont là les noms des fils d’Aaron, qui reçurent l’onction comme sacrificateurs, et qui furent consacrés pour l’exercice du sacerdoce. '
  '30':
  - type: text
    content: 'Le chef de la maison paternelle des familles des Kehathites était Élitsaphan, fils d’Uziel. '
  '31':
  - type: text
    content: 'On remit à leurs soins l’arche, la table, le chandelier, les autels, les ustensiles du sanctuaire, avec lesquels on fait le service, le voile et tout ce qui en dépend. '
  '32':
  - type: text
    content: 'Le chef des chefs des Lévites était Éléazar, fils du sacrificateur Aaron; il avait la surveillance de ceux qui étaient chargés des soins du sanctuaire. '
  '33':
  - type: text
    content: 'De Merari descendent la famille de Machli et la famille de Muschi, formant les familles des Merarites. '
  '34':
  - type: text
    content: 'Ceux dont on fit le dénombrement, en comptant tous les mâles depuis l’âge d’un mois et au-dessus, furent six mille deux cents. '
  '35':
  - type: text
    content: 'Le chef de la maison paternelle des familles de Merari était Tsuriel, fils d’Abihaïl. Ils campaient du côté septentrional du tabernacle. '
  '36':
  - type: text
    content: 'On remit à la garde et aux soins des fils de Merari les planches du tabernacle, ses barres, ses colonnes et leurs bases, tous ses ustensiles et tout ce qui en dépend; '
  '37':
  - type: text
    content: 'les colonnes du parvis tout autour, leurs bases, leurs pieux et leurs cordages. '
  '38':
  - type: text
    content: 'Moïse, Aaron et ses fils campaient devant le tabernacle, à l’orient, devant la tente d’assignation, au levant; ils avaient la garde et le soin du sanctuaire, remis à la garde des enfants d’Israël; et '
  - type: note
    content: v. 10. No 16:40.
  - type: text
    content: 'l’étranger qui s’approchera sera puni de mort. '
  '39':
  - type: text
    content: Tous les Lévites dont Moïse et Aaron firent le dénombrement sur l’ordre de l’Éternel, selon leurs familles, tous les mâles depuis l’âge d’un mois et au-dessus, furent vingt-deux mille.
  - type: heading
    content: Rachat des premiers-nés
  - type: heading
    content: 'V. 40-51: cf. No 8:5-22.'
  '4':
  - type: note
    content: Lé 10:1, 2, etc. No 26:61. 1 Ch 24:2.
  - type: text
    content: Nadab et Abihu moururent devant l’Éternel, lorsqu’ils apportèrent devant l’Éternel du feu étranger, dans le désert de Sinaï; ils n’avaient point de fils. Éléazar et Ithamar exercèrent le sacerdoce, en présence d’Aaron, leur père.
  - type: heading
    content: 'V. 5-13: cf. No 8:6-26; 18:2-6.'
  '40':
  - type: text
    content: 'L’Éternel dit à Moïse: Fais le dénombrement de tous les premiers-nés mâles parmi les enfants d’Israël, depuis l’âge d’un mois et au-dessus, et compte-les d’après leurs noms. '
  '41':
  - type: text
    content: 'Tu prendras les Lévites pour moi, l’Éternel, à la place de tous les premiers-nés des enfants d’Israël, et le bétail des Lévites à la place de tous les premiers-nés du bétail des enfants d’Israël. '
  '42':
  - type: text
    content: 'Moïse fit le dénombrement de tous les premiers-nés parmi les enfants d’Israël, selon l’ordre que l’Éternel lui avait donné. '
  '43':
  - type: text
    content: 'Tous les premiers-nés mâles, dont on fit le dénombrement, en comptant les noms, depuis l’âge d’un mois et au-dessus, furent vingt-deux mille deux cent soixante-treize. '
  '44':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '45':
  - type: text
    content: 'Prends les Lévites à la place de tous les premiers-nés des enfants d’Israël, et le bétail des Lévites à la place de leur bétail; et les Lévites m’appartiendront. Je suis l’Éternel. '
  '46':
  - type: text
    content: 'Pour le rachat des deux cent soixante-treize qui dépassent le nombre des Lévites, parmi les premiers-nés des enfants d’Israël, '
  '47':
  - type: text
    content: 'tu prendras cinq sicles par tête; tu les prendras selon le sicle du sanctuaire, '
  - type: note
    content: Ex 30:13. Lé 27:25. No 18:16. Éz 45:12.
  - type: text
    content: 'qui est de vingt guéras. '
  '48':
  - type: text
    content: 'Tu donneras l’argent à Aaron et à ses fils, pour le rachat de ceux qui dépassent le nombre des Lévites. '
  '49':
  - type: text
    content: 'Moïse prit l’argent pour le rachat de ceux qui dépassaient le nombre des rachetés par les Lévites; '
  '5':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '50':
  - type: text
    content: 'il prit l’argent des premiers-nés des enfants d’Israël: mille trois cent soixante-cinq sicles, selon le sicle du sanctuaire. '
  '51':
  - type: text
    content: Et Moïse donna l’argent du rachat à Aaron et à ses fils, sur l’ordre de l’Éternel, en se conformant à l’ordre que l’Éternel avait donné à Moïse.
  '6':
  - type: note
    content: No 16:9; 18:2.
  - type: text
    content: 'Fais approcher la tribu de Lévi, et tu la placeras devant le sacrificateur Aaron, pour qu’elle soit à son service. '
  '7':
  - type: text
    content: 'Ils auront le soin de ce qui est remis à sa garde et à la garde de toute l’assemblée, devant la tente d’assignation: ils feront le service du tabernacle. '
  '8':
  - type: text
    content: 'Ils auront le soin de tous les ustensiles de la tente d’assignation, et de ce qui est remis à la garde des enfants d’Israël: ils feront le service du tabernacle. '
  '9':
  - type: text
    content: 'Tu donneras les Lévites à Aaron et à ses fils; ils lui seront entièrement donnés, de la part des enfants d’Israël. '
