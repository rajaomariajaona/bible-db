verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 11:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 1:76
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: j’enverrai mon messager;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il préparera le chemin devant moi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et soudain entrera dans son temple le Seigneur que vous cherchez;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le messager de l’alliance que vous désirez, voici, il vient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel des armées.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Apportez à la maison du trésor toutes les dîmes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin qu’il y ait de la nourriture dans ma maison;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mettez-moi de la sorte à l’épreuve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel des armées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous verrez si je n’ouvre pas pour vous les écluses des cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je ne répands pas sur vous la bénédiction en abondance.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour vous je menacerai celui qui dévore,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il ne vous détruira pas les fruits de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la vigne ne sera pas stérile dans vos campagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel des armées.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les nations vous diront heureux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car vous serez un pays de délices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel des armées.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-18: cf. Job 34:7-9. Mal 2:17; 4:1-3. És 3:10, 11.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 21:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Vos paroles sont rudes contre moi, dit l’Éternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et vous dites: Qu’avons-nous dit contre toi?'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Vous avez dit: C’est en vain que l’on sert Dieu;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’avons-nous gagné à observer ses préceptes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et à marcher avec tristesse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de l’Éternel des armées?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant nous estimons heureux les hautains;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, les méchants prospèrent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, ils tentent Dieu, et ils échappent!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors ceux qui craignent l’Éternel se parlèrent l’un à l’autre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel fut attentif, et il écouta;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un livre de souvenir fut écrit devant lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour ceux qui craignent l’Éternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui honorent son nom.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils seront à moi, dit l’Éternel des armées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils m’appartiendront, au jour que je prépare;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’aurai compassion d’eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un homme a compassion de son fils qui le sert.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous verrez de nouveau la différence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Entre le juste et le méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Entre celui qui sert Dieu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celui qui ne le sert pas.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui pourra soutenir le jour de sa venue?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui restera debout quand il paraîtra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il sera comme le feu du fondeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme la potasse des foulons.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’assiéra, fondra et purifiera l’argent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il purifiera les fils de Lévi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les épurera comme on épure l’or et l’argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils présenteront à l’Éternel des offrandes avec justice.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors l’offrande de Juda et de Jérusalem sera agréable à l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme aux anciens jours, comme aux années d’autrefois.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je m’approcherai de vous pour le jugement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je me hâterai de témoigner contre les enchanteurs et les adultères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Contre ceux '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: qui jurent faussement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre ceux qui retiennent le salaire du mercenaire,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 22:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 24:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 2:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui oppriment la veuve et l’orphelin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui font tort à l’étranger, et ne me craignent pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel des armées.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car je suis l’Éternel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 33:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 19:21
      - type: text
        text: '. És 15:26, 27; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 46:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: je ne change pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous, enfants de Jacob, vous n’avez pas été consumés.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-12: cf. (Mal 1:12-14. Né 13:10-12.) (2 Ch 31:10. Pr 3:9, 10.)'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depuis le temps de vos pères, vous vous êtes écartés de mes ordonnances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous ne les avez point observées.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 1:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Revenez à moi, et je reviendrai à vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel des armées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et vous dites: En quoi devons-nous revenir?'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un homme trompe-t-il Dieu? Car vous me trompez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et vous dites: En quoi t’avons-nous trompé?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les dîmes et les offrandes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous êtes frappés par la malédiction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous me trompez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La nation tout entière!
