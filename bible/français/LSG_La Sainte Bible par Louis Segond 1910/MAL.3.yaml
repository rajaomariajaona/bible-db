document_id: MAL.3,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'Voici, '
  - type: note
    content: Mt 11:10. Mc 1:2. Lu 1:76; 7:27.
  - type: text
    content: j’enverrai mon messager;
  - type: text
    content: Il préparera le chemin devant moi.
  - type: text
    content: Et soudain entrera dans son temple le Seigneur que vous cherchez;
  - type: text
    content: Et le messager de l’alliance que vous désirez, voici, il vient,
  - type: text
    content: Dit l’Éternel des armées.
  '10':
  - type: text
    content: Apportez à la maison du trésor toutes les dîmes,
  - type: text
    content: Afin qu’il y ait de la nourriture dans ma maison;
  - type: text
    content: Mettez-moi de la sorte à l’épreuve,
  - type: text
    content: Dit l’Éternel des armées.
  - type: text
    content: Et vous verrez si je n’ouvre pas pour vous les écluses des cieux,
  - type: text
    content: Si je ne répands pas sur vous la bénédiction en abondance.
  '11':
  - type: text
    content: Pour vous je menacerai celui qui dévore,
  - type: text
    content: Et il ne vous détruira pas les fruits de la terre,
  - type: text
    content: Et la vigne ne sera pas stérile dans vos campagnes,
  - type: text
    content: Dit l’Éternel des armées.
  '12':
  - type: text
    content: Toutes les nations vous diront heureux,
  - type: text
    content: Car vous serez un pays de délices,
  - type: text
    content: Dit l’Éternel des armées.
  - type: heading
    content: 'V. 13-18: cf. Job 34:7-9. Mal 2:17; 4:1-3. És 3:10, 11.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Job 21:14, 15.
  - type: text
    content: Vos paroles sont rudes contre moi, dit l’Éternel.
  - type: text
    content: 'Et vous dites: Qu’avons-nous dit contre toi?'
  '14':
  - type: text
    content: 'Vous avez dit: C’est en vain que l’on sert Dieu;'
  - type: text
    content: Qu’avons-nous gagné à observer ses préceptes,
  - type: text
    content: Et à marcher avec tristesse
  - type: text
    content: A cause de l’Éternel des armées?
  '15':
  - type: text
    content: Maintenant nous estimons heureux les hautains;
  - type: text
    content: Oui, les méchants prospèrent;
  - type: text
    content: Oui, ils tentent Dieu, et ils échappent!
  '16':
  - type: text
    content: Alors ceux qui craignent l’Éternel se parlèrent l’un à l’autre;
  - type: text
    content: L’Éternel fut attentif, et il écouta;
  - type: text
    content: Et un livre de souvenir fut écrit devant lui
  - type: text
    content: Pour ceux qui craignent l’Éternel
  - type: text
    content: Et qui honorent son nom.
  '17':
  - type: text
    content: Ils seront à moi, dit l’Éternel des armées,
  - type: text
    content: Ils m’appartiendront, au jour que je prépare;
  - type: text
    content: J’aurai compassion d’eux,
  - type: text
    content: Comme un homme a compassion de son fils qui le sert.
  '18':
  - type: text
    content: Et vous verrez de nouveau la différence
  - type: text
    content: Entre le juste et le méchant,
  - type: text
    content: Entre celui qui sert Dieu
  - type: text
    content: Et celui qui ne le sert pas.
  '2':
  - type: text
    content: Qui pourra soutenir le jour de sa venue?
  - type: text
    content: Qui restera debout quand il paraîtra?
  - type: text
    content: Car il sera comme le feu du fondeur,
  - type: text
    content: Comme la potasse des foulons.
  '3':
  - type: text
    content: Il s’assiéra, fondra et purifiera l’argent;
  - type: text
    content: Il purifiera les fils de Lévi,
  - type: text
    content: Il les épurera comme on épure l’or et l’argent,
  - type: text
    content: Et ils présenteront à l’Éternel des offrandes avec justice.
  '4':
  - type: text
    content: Alors l’offrande de Juda et de Jérusalem sera agréable à l’Éternel,
  - type: text
    content: Comme aux anciens jours, comme aux années d’autrefois.
  '5':
  - type: text
    content: Je m’approcherai de vous pour le jugement,
  - type: text
    content: Et je me hâterai de témoigner contre les enchanteurs et les adultères,
  - type: text
    content: 'Contre ceux '
  - type: note
    content: Ex 20:7.
  - type: text
    content: qui jurent faussement,
  - type: text
    content: Contre ceux qui retiennent le salaire du mercenaire,
  - type: note
    content: Ex 22:22. De 24:17. Am 2:7.
  - type: text
    content: Qui oppriment la veuve et l’orphelin,
  - type: text
    content: Qui font tort à l’étranger, et ne me craignent pas,
  - type: text
    content: Dit l’Éternel des armées.
  '6':
  - type: text
    content: 'Car je suis l’Éternel, '
  - type: note
    content: Ps 33:11. Pr 19:21. És 15:26, 27; 25:9; 46:10.
  - type: text
    content: je ne change pas;
  - type: text
    content: Et vous, enfants de Jacob, vous n’avez pas été consumés.
  - type: heading
    content: 'V. 7-12: cf. (Mal 1:12-14. Né 13:10-12.) (2 Ch 31:10. Pr 3:9, 10.)'
  '7':
  - type: text
    content: Depuis le temps de vos pères, vous vous êtes écartés de mes ordonnances,
  - type: text
    content: Vous ne les avez point observées.
  - type: note
    content: Za 1:3.
  - type: text
    content: Revenez à moi, et je reviendrai à vous,
  - type: text
    content: Dit l’Éternel des armées.
  - type: text
    content: 'Et vous dites: En quoi devons-nous revenir?'
  '8':
  - type: text
    content: Un homme trompe-t-il Dieu? Car vous me trompez,
  - type: text
    content: 'Et vous dites: En quoi t’avons-nous trompé?'
  - type: text
    content: Dans les dîmes et les offrandes.
  '9':
  - type: text
    content: Vous êtes frappés par la malédiction,
  - type: text
    content: Et vous me trompez,
  - type: text
    content: La nation tout entière!
