document_id: REV.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le trône de la majesté divine, les vingt-quatre vieillards, et les quatre êtres vivants
  - type: heading
    content: 'V. 1-11: cf. És 6:1-3. Éz 1.'
  - type: text
    content: 'Après cela, je regardai, et voici, une porte était ouverte dans le ciel. La première voix que j’avais entendue, comme le son d’une trompette, et qui me parlait, dit: '
  - type: text
    content: Monte ici, et je te ferai voir ce qui doit arriver dans la suite.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'les vingt-quatre vieillards se prosternent devant celui qui est assis sur le trône, et ils adorent celui qui vit aux siècles des siècles, et ils jettent leurs couronnes devant le trône, en disant: '
  '11':
  - type: note
    content: Ap 5:12.
  - type: text
    content: Tu es digne, notre Seigneur et notre Dieu, de recevoir la gloire et l’honneur et la puissance; car tu as créé toutes choses, et c’est par ta volonté qu’elles existent et qu’elles ont été créées.
  '2':
  - type: text
    content: 'Aussitôt je fus ravi en esprit. Et voici, il y avait un trône dans le ciel, et sur ce trône quelqu’un était assis. '
  '3':
  - type: text
    content: 'Celui qui était assis avait l’aspect d’une pierre de jaspe et de sardoine; et le trône était environné d’un arc-en-ciel semblable à de l’émeraude. '
  '4':
  - type: text
    content: 'Autour du trône je vis vingt-quatre trônes, et sur ces trônes vingt-quatre vieillards assis, revêtus de vêtements blancs, et sur leurs têtes des couronnes d’or. '
  '5':
  - type: text
    content: 'Du trône sortent des éclairs, des voix et des tonnerres. Devant le trône brûlent sept lampes ardentes, qui sont les sept esprits de Dieu. '
  '6':
  - type: text
    content: 'Il y a encore devant le trône '
  - type: note
    content: Ap 15:2.
  - type: text
    content: 'comme une mer de verre, semblable à du cristal. Au milieu du trône et autour du trône, il y a quatre êtres vivants remplis d’yeux devant et derrière. '
  '7':
  - type: text
    content: 'Le premier être vivant est semblable à un lion, le second être vivant est semblable à un veau, le troisième être vivant a la face d’un homme, et le quatrième être vivant est semblable à un aigle qui vole. '
  '8':
  - type: text
    content: 'Les quatre êtres vivants ont chacun six ailes, et ils sont remplis d’yeux tout autour et au-dedans. Ils ne cessent de dire jour et nuit: '
  - type: note
    content: És 6:3.
  - type: text
    content: 'Saint, saint, saint est le Seigneur Dieu, le Tout-Puissant, '
  - type: note
    content: Ap 1:4, 8; 11:17; 16:5.
  - type: text
    content: 'qui était, qui est, et qui vient! '
  '9':
  - type: text
    content: 'Quand les êtres vivants rendent gloire et honneur et actions de grâces à celui qui est assis sur le trône, à celui qui vit aux siècles des siècles, '
