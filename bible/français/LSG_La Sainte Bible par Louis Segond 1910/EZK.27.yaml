document_id: EZK.27,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-25: cf. Éz 28:1-19. És 23:1-9.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ceux de Perse, de Lud et de Puth, servaient dans ton armée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’étaient des hommes de guerre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils suspendaient chez toi le bouclier et le casque,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils te donnaient de la splendeur.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Les enfants d’Arvad et tes guerriers garnissaient tes murs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de vaillants hommes occupaient tes tours;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils suspendaient leurs boucliers à tous tes murs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils rendaient ta beauté parfaite.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ceux de Tarsis trafiquaient avec toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de tous les biens que tu avais en abondance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D’argent, de fer, d’étain et de plomb,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils pourvoyaient tes marchés.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Javan, Tubal et Méschec trafiquaient avec toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils donnaient des esclaves et des ustensiles d’airain
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En échange de tes marchandises.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ceux de la maison de Togarma
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourvoyaient tes marchés de chevaux, de cavaliers et de mulets.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Les enfants de Dedan trafiquaient avec toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le commerce de beaucoup d’îles passait par tes mains;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On te payait avec des cornes d’ivoire et de l’ébène.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: La Syrie trafiquait avec toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause du grand nombre de tes produits;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D’escarboucles, de pourpre, de broderies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De byssus, de corail et de rubis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle pourvoyait tes marchés.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Juda et le pays d’Israël trafiquaient avec toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils donnaient le froment de Minnith,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La pâtisserie, le miel, l’huile et le baume,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En échange de tes marchandises.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Damas trafiquait avec toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause du grand nombre de tes produits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de tous les biens que tu avais en abondance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle te fournissait du vin de Helbon et de la laine blanche.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Vedan et Javan, depuis Uzal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourvoyaient tes marchés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le fer travaillé, la casse et le roseau aromatique,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Étaient échangés avec toi.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Et toi, fils de l’homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prononce sur Tyr une complainte!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Dedan trafiquait avec toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En couvertures pour s’asseoir à cheval.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: L’Arabie et tous les princes de Kédar trafiquaient avec toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et faisaient le commerce en agneaux, en béliers et en boucs.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Les marchands de Séba et de Raema trafiquaient avec toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De tous les meilleurs aromates,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De toute espèce de pierres précieuses et d’or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils pourvoyaient tes marchés.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Charan, Canné et Éden,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les marchands de Séba, d’Assyrie, de Kilmad,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Trafiquaient avec toi;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ils trafiquaient avec toi en belles marchandises,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En manteaux teints en bleu, en broderies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En riches étoffes contenues dans des coffres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Attachés avec des cordes, faits en bois de cèdre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et amenés sur tes marchés.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Les navires de Tarsis naviguaient pour ton commerce;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu étais au comble de la richesse et de la gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au cœur des mers.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 26-36: cf. Éz 26. Ap 18:9-19.'
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Tes rameurs t’ont fait voguer sur les grandes eaux:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Un '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 17:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: vent d’orient t’a brisée au cœur des mers.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ap 18:9, etc.
      marker-yv: yv-n
    - type: text
      text: Tes richesses, tes marchés et tes marchandises,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes mariniers et tes pilotes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui réparent tes fissures
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux qui s’occupent de ton commerce,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous tes hommes de guerre qui sont chez toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toute la multitude qui est au milieu de toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tomberont dans le cœur des mers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au jour de ta chute.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Aux cris de tes pilotes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les plages d’alentour '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 26:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: trembleront;
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Et tous ceux qui manient la rame descendront de leurs navires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les mariniers, tous les pilotes de la mer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se tiendront sur la terre;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tu diras à Tyr: O toi qui es assise au bord de la mer,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui trafiques avec les peuples d’un grand nombre d’îles!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tyr, tu disais: Je suis '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 28:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: parfaite en beauté!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ils feront entendre leurs voix sur toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pousseront des cris amers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils jetteront de la poussière sur leurs têtes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et se rouleront dans la cendre;
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ils se raseront '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 48:37
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: la tête à cause de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se revêtiront de sacs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils pleureront sur toi dans l’amertume de leur âme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec une vive affliction.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Dans leur douleur, ils diront une complainte sur toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils se lamenteront sur toi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui était comme Tyr,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme cette ville détruite au milieu de la mer?
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Quand tes produits sortaient des mers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu rassasiais un grand nombre de peuples;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par l’abondance de tes biens et de tes marchandises,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu enrichissais les rois de la terre.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Et quand tu as été brisée par les mers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand tu as disparu dans les profondeurs des eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes marchandises et toute ta multitude
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sont tombées avec toi.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Tous les habitants des îles sont dans la stupeur à cause de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs rois sont saisis d’épouvante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur visage est bouleversé.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Les marchands parmi les peuples sifflent sur toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu es '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 26:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: réduite au néant, tu ne seras plus à jamais!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ton territoire est au cœur des mers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui t’ont bâtie t’ont rendue parfaite en beauté.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Avec des cyprès de Senir ils ont fait tous tes lambris;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont pris des cèdres du Liban pour t’élever un mât;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ils ont fabriqué tes rames avec des '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 2:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: chênes de Basan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tes bancs avec de l’ivoire travaillé dans du buis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et apporté des îles de Kittim.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Le fin lin d’Égypte avec des broderies
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Te servait de voiles et de pavillon;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des étoffes teintes en bleu et en pourpre des îles d’Élischa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Formaient tes tentures.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Les habitants de Sidon et d’Arvad étaient tes rameurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les plus experts du milieu de toi, ô Tyr, étaient tes pilotes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Les anciens de Guebal et ses ouvriers habiles étaient chez toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour réparer tes fissures;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les navires de la mer et leurs mariniers étaient chez toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour faire l’échange de tes marchandises.
