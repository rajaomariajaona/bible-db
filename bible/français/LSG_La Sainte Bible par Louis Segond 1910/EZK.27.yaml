document_id: EZK.27,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-25: cf. Éz 28:1-19. És 23:1-9.'
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: text
    content: Ceux de Perse, de Lud et de Puth, servaient dans ton armée,
  - type: text
    content: C’étaient des hommes de guerre;
  - type: text
    content: Ils suspendaient chez toi le bouclier et le casque,
  - type: text
    content: Ils te donnaient de la splendeur.
  '11':
  - type: text
    content: Les enfants d’Arvad et tes guerriers garnissaient tes murs,
  - type: text
    content: Et de vaillants hommes occupaient tes tours;
  - type: text
    content: Ils suspendaient leurs boucliers à tous tes murs,
  - type: text
    content: Ils rendaient ta beauté parfaite.
  '12':
  - type: text
    content: Ceux de Tarsis trafiquaient avec toi,
  - type: text
    content: A cause de tous les biens que tu avais en abondance;
  - type: text
    content: D’argent, de fer, d’étain et de plomb,
  - type: text
    content: Ils pourvoyaient tes marchés.
  '13':
  - type: text
    content: Javan, Tubal et Méschec trafiquaient avec toi;
  - type: text
    content: Ils donnaient des esclaves et des ustensiles d’airain
  - type: text
    content: En échange de tes marchandises.
  '14':
  - type: text
    content: Ceux de la maison de Togarma
  - type: text
    content: Pourvoyaient tes marchés de chevaux, de cavaliers et de mulets.
  '15':
  - type: text
    content: Les enfants de Dedan trafiquaient avec toi;
  - type: text
    content: Le commerce de beaucoup d’îles passait par tes mains;
  - type: text
    content: On te payait avec des cornes d’ivoire et de l’ébène.
  '16':
  - type: text
    content: La Syrie trafiquait avec toi,
  - type: text
    content: A cause du grand nombre de tes produits;
  - type: text
    content: D’escarboucles, de pourpre, de broderies,
  - type: text
    content: De byssus, de corail et de rubis,
  - type: text
    content: Elle pourvoyait tes marchés.
  '17':
  - type: text
    content: Juda et le pays d’Israël trafiquaient avec toi;
  - type: text
    content: Ils donnaient le froment de Minnith,
  - type: text
    content: La pâtisserie, le miel, l’huile et le baume,
  - type: text
    content: En échange de tes marchandises.
  '18':
  - type: text
    content: Damas trafiquait avec toi,
  - type: text
    content: A cause du grand nombre de tes produits,
  - type: text
    content: A cause de tous les biens que tu avais en abondance;
  - type: text
    content: Elle te fournissait du vin de Helbon et de la laine blanche.
  '19':
  - type: text
    content: Vedan et Javan, depuis Uzal,
  - type: text
    content: Pourvoyaient tes marchés;
  - type: text
    content: Le fer travaillé, la casse et le roseau aromatique,
  - type: text
    content: Étaient échangés avec toi.
  '2':
  - type: text
    content: Et toi, fils de l’homme,
  - type: text
    content: Prononce sur Tyr une complainte!
  '20':
  - type: text
    content: Dedan trafiquait avec toi
  - type: text
    content: En couvertures pour s’asseoir à cheval.
  '21':
  - type: text
    content: L’Arabie et tous les princes de Kédar trafiquaient avec toi,
  - type: text
    content: Et faisaient le commerce en agneaux, en béliers et en boucs.
  '22':
  - type: text
    content: Les marchands de Séba et de Raema trafiquaient avec toi;
  - type: text
    content: De tous les meilleurs aromates,
  - type: text
    content: De toute espèce de pierres précieuses et d’or,
  - type: text
    content: Ils pourvoyaient tes marchés.
  '23':
  - type: text
    content: Charan, Canné et Éden,
  - type: text
    content: Les marchands de Séba, d’Assyrie, de Kilmad,
  - type: text
    content: Trafiquaient avec toi;
  '24':
  - type: text
    content: Ils trafiquaient avec toi en belles marchandises,
  - type: text
    content: En manteaux teints en bleu, en broderies,
  - type: text
    content: En riches étoffes contenues dans des coffres
  - type: text
    content: Attachés avec des cordes, faits en bois de cèdre,
  - type: text
    content: Et amenés sur tes marchés.
  '25':
  - type: text
    content: Les navires de Tarsis naviguaient pour ton commerce;
  - type: text
    content: Tu étais au comble de la richesse et de la gloire,
  - type: text
    content: Au cœur des mers.
  - type: heading
    content: 'V. 26-36: cf. Éz 26. Ap 18:9-19.'
  '26':
  - type: text
    content: 'Tes rameurs t’ont fait voguer sur les grandes eaux:'
  - type: text
    content: 'Un '
  - type: note
    content: Éz 17:10.
  - type: text
    content: vent d’orient t’a brisée au cœur des mers.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Ap 18:9, etc.
  - type: text
    content: Tes richesses, tes marchés et tes marchandises,
  - type: text
    content: Tes mariniers et tes pilotes,
  - type: text
    content: Ceux qui réparent tes fissures
  - type: text
    content: Et ceux qui s’occupent de ton commerce,
  - type: text
    content: Tous tes hommes de guerre qui sont chez toi
  - type: text
    content: Et toute la multitude qui est au milieu de toi
  - type: text
    content: Tomberont dans le cœur des mers,
  - type: text
    content: Au jour de ta chute.
  '28':
  - type: text
    content: Aux cris de tes pilotes,
  - type: text
    content: 'Les plages d’alentour '
  - type: note
    content: Éz 26:10, 15.
  - type: text
    content: trembleront;
  '29':
  - type: text
    content: Et tous ceux qui manient la rame descendront de leurs navires,
  - type: text
    content: Les mariniers, tous les pilotes de la mer.
  - type: text
    content: Ils se tiendront sur la terre;
  '3':
  - type: text
    content: 'Tu diras à Tyr: O toi qui es assise au bord de la mer,'
  - type: text
    content: Et qui trafiques avec les peuples d’un grand nombre d’îles!
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: 'Tyr, tu disais: Je suis '
  - type: note
    content: Éz 28:12.
  - type: text
    content: parfaite en beauté!
  '30':
  - type: text
    content: Ils feront entendre leurs voix sur toi,
  - type: text
    content: Et pousseront des cris amers;
  - type: text
    content: Ils jetteront de la poussière sur leurs têtes
  - type: text
    content: Et se rouleront dans la cendre;
  '31':
  - type: text
    content: 'Ils se raseront '
  - type: note
    content: Jé 48:37.
  - type: text
    content: la tête à cause de toi,
  - type: text
    content: Ils se revêtiront de sacs,
  - type: text
    content: Et ils pleureront sur toi dans l’amertume de leur âme,
  - type: text
    content: Avec une vive affliction.
  '32':
  - type: text
    content: Dans leur douleur, ils diront une complainte sur toi,
  - type: text
    content: 'Ils se lamenteront sur toi:'
  - type: text
    content: Qui était comme Tyr,
  - type: text
    content: Comme cette ville détruite au milieu de la mer?
  '33':
  - type: text
    content: Quand tes produits sortaient des mers,
  - type: text
    content: Tu rassasiais un grand nombre de peuples;
  - type: text
    content: Par l’abondance de tes biens et de tes marchandises,
  - type: text
    content: Tu enrichissais les rois de la terre.
  '34':
  - type: text
    content: Et quand tu as été brisée par les mers,
  - type: text
    content: Quand tu as disparu dans les profondeurs des eaux,
  - type: text
    content: Tes marchandises et toute ta multitude
  - type: text
    content: Sont tombées avec toi.
  '35':
  - type: text
    content: Tous les habitants des îles sont dans la stupeur à cause de toi,
  - type: text
    content: Leurs rois sont saisis d’épouvante,
  - type: text
    content: Leur visage est bouleversé.
  '36':
  - type: text
    content: Les marchands parmi les peuples sifflent sur toi;
  - type: text
    content: 'Tu es '
  - type: note
    content: Éz 26:21.
  - type: text
    content: réduite au néant, tu ne seras plus à jamais!
  '4':
  - type: text
    content: Ton territoire est au cœur des mers;
  - type: text
    content: Ceux qui t’ont bâtie t’ont rendue parfaite en beauté.
  '5':
  - type: text
    content: Avec des cyprès de Senir ils ont fait tous tes lambris;
  - type: text
    content: Ils ont pris des cèdres du Liban pour t’élever un mât;
  '6':
  - type: text
    content: 'Ils ont fabriqué tes rames avec des '
  - type: note
    content: És 2:13.
  - type: text
    content: chênes de Basan,
  - type: text
    content: Et tes bancs avec de l’ivoire travaillé dans du buis,
  - type: text
    content: Et apporté des îles de Kittim.
  '7':
  - type: text
    content: Le fin lin d’Égypte avec des broderies
  - type: text
    content: Te servait de voiles et de pavillon;
  - type: text
    content: Des étoffes teintes en bleu et en pourpre des îles d’Élischa
  - type: text
    content: Formaient tes tentures.
  '8':
  - type: text
    content: Les habitants de Sidon et d’Arvad étaient tes rameurs,
  - type: text
    content: Et les plus experts du milieu de toi, ô Tyr, étaient tes pilotes.
  '9':
  - type: text
    content: Les anciens de Guebal et ses ouvriers habiles étaient chez toi,
  - type: text
    content: Pour réparer tes fissures;
  - type: text
    content: Tous les navires de la mer et leurs mariniers étaient chez toi,
  - type: text
    content: Pour faire l’échange de tes marchandises.
