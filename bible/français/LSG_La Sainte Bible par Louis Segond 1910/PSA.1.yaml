document_id: PSA.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: LIVRE PREMIER
  - type: heading
    content: (2 S 23:1, 2.)
  - type: heading
    content: (Ps 112; 128. Jé 17:7, 8. 1 Ti 4:8, 9.) (Pr 14:32. Mt 7:21-27; 13:40-43.) És 42:21; 3:10, 11. Ja 1:25.
  - type: text
    content: Heureux l’homme qui ne marche pas selon le conseil des méchants,
  - type: text
    content: Qui ne s’arrête pas sur la voie des pécheurs,
  - type: text
    content: 'Et '
  - type: note
    content: Ps 26:4. Pr 1:10, 15; 4:14, 15. 1 Co 15:33. Ép 5:11.
  - type: text
    content: qui ne s’assied pas en compagnie des moqueurs,
  '2':
  - type: text
    content: ' '
  - type: note
    content: De 6:6, etc.; 17:19. Jos 1:8. Ps 119:1, etc.
  - type: text
    content: Mais qui trouve son plaisir dans la loi de l’Éternel,
  - type: text
    content: Et qui la médite jour et nuit!
  '3':
  - type: text
    content: 'Il est comme un '
  - type: note
    content: Jé 17:8.
  - type: text
    content: arbre planté près d’un courant d’eau,
  - type: text
    content: Qui donne son fruit en sa saison,
  - type: text
    content: 'Et dont le feuillage ne se flétrit point:'
  - type: text
    content: Tout ce qu’il fait lui réussit.
  '4':
  - type: text
    content: 'Il n’en est pas ainsi des méchants:'
  - type: text
    content: 'Ils sont comme '
  - type: note
    content: Job 21:18. Ps 35:5. És 17:13; 29:5. Os 13:3.
  - type: text
    content: la paille que le vent dissipe.
  '5':
  - type: text
    content: C’est pourquoi les méchants ne résistent pas au jour du jugement,
  - type: text
    content: Ni les pécheurs dans l’assemblée des justes;
  '6':
  - type: text
    content: Car l’Éternel connaît la voie des justes,
  - type: text
    content: Et la voie des pécheurs mène à la ruine.
