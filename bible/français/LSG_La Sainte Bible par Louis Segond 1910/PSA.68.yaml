document_id: PSA.68,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2 S 10:15-19. Jg 5. (Ps 24; 47.) Ép 4:7-13.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef des chantres. De David. Psaume. Cantique.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tu fis tomber une pluie bienfaisante, ô Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu fortifias ton héritage épuisé.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ton peuple établit sa demeure dans le pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que par ta bonté, ô Dieu! Tu avais préparé pour les malheureux.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Le Seigneur dit une parole,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et les messagères de bonnes nouvelles sont une grande armée:'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Les rois des armées fuient, fuient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celle qui reste à la maison partage le butin.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tandis que vous reposez au milieu des étables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les ailes de la colombe sont couvertes d’argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et son plumage est d’un jaune d’or.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Lorsque le Tout-Puissant dispersa les rois dans le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre devint blanche comme la neige du Tsalmon.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Montagnes de Dieu, montagnes de Basan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Montagnes aux cimes nombreuses, montagnes de Basan,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Pourquoi, montagnes aux cimes nombreuses, avez-vous de l’envie
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 87:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 132:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Contre la montagne que Dieu a voulue pour résidence?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel n’en fera pas moins sa demeure à perpétuité.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Les chars de l’Éternel se comptent par vingt mille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par milliers et par milliers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur est au milieu d’eux, le Sinaï est dans le sanctuaire.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 4:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tu es monté dans les hauteurs, tu as emmené des captifs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as pris en don des hommes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les rebelles habiteront aussi près de l’Éternel Dieu.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 10:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Dieu se lève, ses ennemis se dispersent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses adversaires fuient devant sa face.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Béni soit le Seigneur chaque jour!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Quand on nous accable, Dieu nous délivre. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Dieu est pour nous le Dieu des délivrances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’Éternel, le Seigneur, peut nous garantir de la mort.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Oui, Dieu brisera la tête de ses ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sommet de la tête de ceux qui vivent dans le péché.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Le Seigneur dit: Je les ramènerai de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 21:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Basan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je les ramènerai '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 14:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: du fond de la mer,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Afin que tu plonges ton pied dans le sang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que la langue de tes chiens ait sa part des ennemis.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ils voient ta marche, ô Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La marche de mon Dieu, de mon roi, dans le sanctuaire.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: En tête vont les chanteurs, puis ceux qui jouent des instruments,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu de jeunes filles battant du tambourin.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Bénissez Dieu dans les assemblées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bénissez le Seigneur, descendants d’Israël!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Là sont Benjamin, le plus jeune, qui domine sur eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les chefs de Juda et leur troupe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les chefs de Zabulon, les chefs de Nephthali.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ton Dieu ordonne que tu sois puissant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Affermis, ô Dieu, ce que tu as fait pour nous!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Comme la fumée se dissipe, tu les dissipes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme la cire se fond au feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les méchants disparaissent devant Dieu.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: De ton temple tu règnes sur Jérusalem;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les rois t’apporteront '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 10:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 32:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 72:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 76:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: des présents.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Épouvante l’animal des roseaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La troupe des taureaux avec les veaux des peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui se prosternent avec des pièces d’argent!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Disperse les peuples qui prennent plaisir à combattre!
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Des grands viennent de l’Égypte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éthiopie accourt, les mains tendues vers Dieu.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Royaumes de la terre, chantez à Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Célébrez le Seigneur! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Chantez à celui qui s’avance dans les cieux, les cieux éternels!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, il fait entendre sa voix, sa voix puissante.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Rendez gloire à Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa majesté est sur Israël, et sa force dans les cieux.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: De ton sanctuaire, ô Dieu! Tu es redoutable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Dieu d’Israël donne à son peuple la force et la puissance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni soit Dieu!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mais les justes se réjouissent, ils triomphent devant Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont des transports d’allégresse.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Chantez à Dieu, célébrez son nom!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Frayez le chemin à celui qui s’avance à travers les plaines!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L’Éternel est son nom: réjouissez-vous devant lui!'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Le père des orphelins, le défenseur des veuves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est Dieu dans sa demeure sainte.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Dieu donne une famille à ceux qui étaient abandonnés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il délivre les captifs et les rend heureux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les rebelles seuls habitent des lieux arides.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: O Dieu! Quand tu sortis à la tête de ton peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Quand tu marchais dans le désert, '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: La terre trembla, les cieux se fondirent devant Dieu,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le Sinaï s’ébranla devant Dieu, le Dieu d’Israël.
