document_id: PSA.68,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 2 S 10:15-19. Jg 5. (Ps 24; 47.) Ép 4:7-13.
  - type: text
    content: Au chef des chantres. De David. Psaume. Cantique.
  '10':
  - type: text
    content: Tu fis tomber une pluie bienfaisante, ô Dieu!
  - type: text
    content: Tu fortifias ton héritage épuisé.
  '11':
  - type: text
    content: Ton peuple établit sa demeure dans le pays
  - type: text
    content: Que par ta bonté, ô Dieu! Tu avais préparé pour les malheureux.
  '12':
  - type: text
    content: Le Seigneur dit une parole,
  - type: text
    content: 'Et les messagères de bonnes nouvelles sont une grande armée:'
  '13':
  - type: text
    content: Les rois des armées fuient, fuient,
  - type: text
    content: Et celle qui reste à la maison partage le butin.
  '14':
  - type: text
    content: Tandis que vous reposez au milieu des étables,
  - type: text
    content: Les ailes de la colombe sont couvertes d’argent,
  - type: text
    content: Et son plumage est d’un jaune d’or.
  '15':
  - type: text
    content: Lorsque le Tout-Puissant dispersa les rois dans le pays,
  - type: text
    content: La terre devint blanche comme la neige du Tsalmon.
  '16':
  - type: text
    content: Montagnes de Dieu, montagnes de Basan,
  - type: text
    content: Montagnes aux cimes nombreuses, montagnes de Basan,
  '17':
  - type: text
    content: Pourquoi, montagnes aux cimes nombreuses, avez-vous de l’envie
  - type: note
    content: Ps 87:1, 2; 132:13.
  - type: text
    content: Contre la montagne que Dieu a voulue pour résidence?
  - type: text
    content: L’Éternel n’en fera pas moins sa demeure à perpétuité.
  '18':
  - type: text
    content: Les chars de l’Éternel se comptent par vingt mille,
  - type: text
    content: Par milliers et par milliers;
  - type: text
    content: Le Seigneur est au milieu d’eux, le Sinaï est dans le sanctuaire.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Ép 4:8.
  - type: text
    content: Tu es monté dans les hauteurs, tu as emmené des captifs,
  - type: text
    content: Tu as pris en don des hommes;
  - type: text
    content: Les rebelles habiteront aussi près de l’Éternel Dieu.
  '2':
  - type: text
    content: ' '
  - type: note
    content: No 10:35.
  - type: text
    content: Dieu se lève, ses ennemis se dispersent,
  - type: text
    content: Et ses adversaires fuient devant sa face.
  '20':
  - type: text
    content: Béni soit le Seigneur chaque jour!
  - type: text
    content: 'Quand on nous accable, Dieu nous délivre. '
  - type: text
    content: — Pause.
  '21':
  - type: text
    content: Dieu est pour nous le Dieu des délivrances,
  - type: text
    content: Et l’Éternel, le Seigneur, peut nous garantir de la mort.
  '22':
  - type: text
    content: Oui, Dieu brisera la tête de ses ennemis,
  - type: text
    content: Le sommet de la tête de ceux qui vivent dans le péché.
  '23':
  - type: text
    content: 'Le Seigneur dit: Je les ramènerai de '
  - type: note
    content: No 21:33.
  - type: text
    content: Basan,
  - type: text
    content: 'Je les ramènerai '
  - type: note
    content: Ex 14:29.
  - type: text
    content: du fond de la mer,
  '24':
  - type: text
    content: Afin que tu plonges ton pied dans le sang,
  - type: text
    content: Et que la langue de tes chiens ait sa part des ennemis.
  '25':
  - type: text
    content: Ils voient ta marche, ô Dieu!
  - type: text
    content: La marche de mon Dieu, de mon roi, dans le sanctuaire.
  '26':
  - type: text
    content: En tête vont les chanteurs, puis ceux qui jouent des instruments,
  - type: text
    content: Au milieu de jeunes filles battant du tambourin.
  '27':
  - type: text
    content: Bénissez Dieu dans les assemblées,
  - type: text
    content: Bénissez le Seigneur, descendants d’Israël!
  '28':
  - type: text
    content: Là sont Benjamin, le plus jeune, qui domine sur eux,
  - type: text
    content: Les chefs de Juda et leur troupe,
  - type: text
    content: Les chefs de Zabulon, les chefs de Nephthali.
  '29':
  - type: text
    content: Ton Dieu ordonne que tu sois puissant;
  - type: text
    content: Affermis, ô Dieu, ce que tu as fait pour nous!
  '3':
  - type: text
    content: Comme la fumée se dissipe, tu les dissipes;
  - type: text
    content: Comme la cire se fond au feu,
  - type: text
    content: Les méchants disparaissent devant Dieu.
  '30':
  - type: text
    content: De ton temple tu règnes sur Jérusalem;
  - type: text
    content: 'Les rois t’apporteront '
  - type: note
    content: 1 R 10:10, 24, 25. 2 Ch 32:23. Ps 72:10; 76:12.
  - type: text
    content: des présents.
  '31':
  - type: text
    content: Épouvante l’animal des roseaux,
  - type: text
    content: La troupe des taureaux avec les veaux des peuples,
  - type: text
    content: Qui se prosternent avec des pièces d’argent!
  - type: text
    content: Disperse les peuples qui prennent plaisir à combattre!
  '32':
  - type: text
    content: Des grands viennent de l’Égypte;
  - type: text
    content: L’Éthiopie accourt, les mains tendues vers Dieu.
  '33':
  - type: text
    content: Royaumes de la terre, chantez à Dieu,
  - type: text
    content: 'Célébrez le Seigneur! '
  - type: text
    content: — Pause.
  '34':
  - type: text
    content: Chantez à celui qui s’avance dans les cieux, les cieux éternels!
  - type: text
    content: Voici, il fait entendre sa voix, sa voix puissante.
  '35':
  - type: text
    content: Rendez gloire à Dieu!
  - type: text
    content: Sa majesté est sur Israël, et sa force dans les cieux.
  '36':
  - type: text
    content: De ton sanctuaire, ô Dieu! Tu es redoutable.
  - type: text
    content: Le Dieu d’Israël donne à son peuple la force et la puissance.
  - type: text
    content: Béni soit Dieu!
  '4':
  - type: text
    content: Mais les justes se réjouissent, ils triomphent devant Dieu,
  - type: text
    content: Ils ont des transports d’allégresse.
  '5':
  - type: text
    content: Chantez à Dieu, célébrez son nom!
  - type: text
    content: Frayez le chemin à celui qui s’avance à travers les plaines!
  - type: text
    content: 'L’Éternel est son nom: réjouissez-vous devant lui!'
  '6':
  - type: text
    content: Le père des orphelins, le défenseur des veuves,
  - type: text
    content: C’est Dieu dans sa demeure sainte.
  '7':
  - type: text
    content: Dieu donne une famille à ceux qui étaient abandonnés,
  - type: text
    content: Il délivre les captifs et les rend heureux;
  - type: text
    content: Les rebelles seuls habitent des lieux arides.
  '8':
  - type: text
    content: O Dieu! Quand tu sortis à la tête de ton peuple,
  - type: text
    content: 'Quand tu marchais dans le désert, '
  - type: text
    content: — Pause.
  '9':
  - type: text
    content: La terre trembla, les cieux se fondirent devant Dieu,
  - type: note
    content: Ex 19.
  - type: text
    content: Le Sinaï s’ébranla devant Dieu, le Dieu d’Israël.
