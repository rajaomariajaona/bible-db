document_id: JDG.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-3: cf. Jg 12:1-6. Pr 15:1.'
  - type: text
    content: 'Les hommes '
  - type: note
    content: Jg 12:1.
  - type: text
    content: 'd’Éphraïm dirent à Gédéon: Que signifie cette manière d’agir envers nous? Pourquoi ne pas nous avoir appelés, quand tu es allé combattre Madian? Et ils eurent avec lui une violente querelle. '
  '10':
  - type: text
    content: 'Zébach et Tsalmunna étaient à Karkor et leur armée avec eux, environ quinze mille hommes, tous ceux qui étaient restés de l’armée entière des fils de l’Orient; cent vingt mille hommes tirant l’épée avaient été tués. '
  '11':
  - type: text
    content: 'Gédéon monta par le chemin de ceux qui habitent sous les tentes, à l’orient de Nobach et de Jogbeha, et il battit l’armée qui se croyait en sûreté. '
  '12':
  - type: text
    content: 'Zébach et Tsalmunna prirent la fuite; Gédéon les poursuivit, il '
  - type: note
    content: Ps 83:12.
  - type: text
    content: 's’empara des deux rois de Madian, Zébach et Tsalmunna, et il mit en déroute toute l’armée. '
  '13':
  - type: text
    content: 'Gédéon, fils de Joas, revint de la bataille par la montée de Hérès. '
  '14':
  - type: text
    content: 'Il saisit d’entre les gens de Succoth un jeune homme qu’il interrogea, et qui lui mit par écrit les noms des chefs et des anciens de Succoth, soixante-dix-sept hommes. '
  '15':
  - type: text
    content: 'Puis il vint auprès des gens de Succoth, et dit: Voici Zébach et Tsalmunna, au sujet desquels vous m’avez insulté, en disant: La main de Zébach et de Tsalmunna est-elle déjà en ton pouvoir, pour que nous donnions du pain à tes hommes fatigués? '
  '16':
  - type: text
    content: 'Et il prit les anciens de la ville, et châtia les gens de Succoth avec des épines du désert et avec des chardons. '
  '17':
  - type: text
    content: 'Il renversa aussi la tour de Penuel, et tua les gens de la ville. '
  '18':
  - type: text
    content: 'Il dit à Zébach et à Tsalmunna: Comment étaient les hommes que vous avez tués au Thabor? Ils répondirent: Ils étaient comme toi, chacun avait l’air d’un fils de roi. '
  '19':
  - type: text
    content: 'Il dit: C’étaient mes frères, fils de ma mère. L’Éternel est vivant! Si vous les eussiez laissés vivre, je ne vous tuerais pas. '
  '2':
  - type: text
    content: 'Gédéon leur répondit: Qu’ai-je fait en comparaison de vous? Le grappillage d’Éphraïm ne vaut-il pas mieux que la vendange d’Abiézer? '
  '20':
  - type: text
    content: 'Et il dit à Jéther, son premier-né: Lève-toi, tue-les! Mais le jeune homme ne tira point son épée, parce qu’il avait peur, car il était encore un enfant. '
  '21':
  - type: text
    content: 'Zébach et Tsalmunna dirent: Lève-toi toi-même, et tue-nous! Car tel est l’homme, telle est sa force. '
  - type: note
    content: Ps 83:12.
  - type: text
    content: Et Gédéon se leva, et tua Zébach et Tsalmunna. Il prit ensuite les croissants qui étaient aux cous de leurs chameaux.
  - type: heading
    content: Mort de Gédéon
  - type: heading
    content: 'V. 22-32: cf. 1 S 8. (Jg 6:24. De 12:8-14. 1 R 15:14.) Éz 7:20.'
  '22':
  - type: text
    content: 'Les hommes d’Israël dirent à Gédéon: Domine sur nous, et toi, et ton fils, et le fils de ton fils, car tu nous as délivrés de la main de Madian. '
  '23':
  - type: text
    content: 'Gédéon leur dit: Je ne dominerai point sur vous, et mes fils ne domineront point sur vous; c’est l’Éternel qui dominera sur vous. '
  '24':
  - type: text
    content: 'Gédéon leur dit: J’ai une demande à vous faire: donnez-moi chacun les anneaux que vous avez eus pour butin. Les ennemis avaient des anneaux d’or, car ils étaient Ismaélites. '
  '25':
  - type: text
    content: 'Ils dirent: Nous les donnerons volontiers. Et ils étendirent un manteau, sur lequel chacun jeta les anneaux de son butin. '
  '26':
  - type: text
    content: 'Le poids des anneaux d’or que demanda Gédéon fut de mille sept cents sicles d’or, sans les croissants, les pendants d’oreilles, et les vêtements de pourpre que portaient les rois de Madian, et sans les colliers qui étaient aux cous de leurs chameaux. '
  '27':
  - type: text
    content: 'Gédéon en fit un éphod, et il le plaça dans sa ville, à Ophra, où il devint l’objet des prostitutions de tout Israël; et il fut un piège pour Gédéon et pour sa maison. '
  '28':
  - type: text
    content: 'Madian fut humilié devant les enfants d’Israël, et il ne leva plus la tête. Et le pays fut en repos pendant quarante ans, durant la vie de Gédéon. '
  '29':
  - type: text
    content: 'Jerubbaal, fils de Joas, s’en retourna, et demeura dans sa maison. '
  '3':
  - type: text
    content: C’est entre vos mains que Dieu a livré les chefs de Madian, Oreb et Zeeb. Qu’ai-je donc pu faire en comparaison de vous? Lorsqu’il eut ainsi parlé, leur colère contre lui s’apaisa.
  - type: heading
    content: Poursuite des fuyards au-delà du Jourdain
  - type: heading
    content: 'V. 4-21: cf. 1 S 25. (És 9:3. Ps 83:12, 13.) Jg 5:23.'
  '30':
  - type: text
    content: 'Gédéon eut soixante-dix fils, issus de lui, car il eut plusieurs femmes. '
  '31':
  - type: text
    content: 'Sa concubine, qui était à Sichem, lui enfanta aussi un fils, à qui on donna le nom d’Abimélec. '
  '32':
  - type: text
    content: Gédéon, fils de Joas, mourut après une heureuse vieillesse; et il fut enterré dans le sépulcre de Joas, son père, à Ophra, qui appartenait à la famille d’Abiézer.
  - type: heading
    content: Les fils de Gédéon tués par leur frère Abimélec. Abimélec proclamé roi à Sichem
  - type: heading
    content: '8 v. 33 à 9 v. 6: cf. (Jg 2:19. 2 Ch 24:17, 18.) Jg 8:22, 23. 2 R 11:1-3. Pr 18:19.'
  '33':
  - type: text
    content: 'Lorsque Gédéon fut mort, les enfants d’Israël recommencèrent à se prostituer aux Baals, et ils prirent Baal-Berith pour leur dieu. '
  '34':
  - type: text
    content: 'Les enfants d’Israël ne se souvinrent point de l’Éternel, leur Dieu, qui les avait délivrés de la main de tous les ennemis qui les entouraient. '
  '35':
  - type: text
    content: Et ils n’eurent point d’attachement pour la maison de Jerubbaal, de Gédéon, après tout le bien qu’il avait fait à Israël.
  '4':
  - type: text
    content: 'Gédéon arriva au Jourdain, et il le passa, lui et les trois cents hommes qui étaient avec lui, fatigués, mais poursuivant toujours. '
  '5':
  - type: text
    content: 'Il dit aux gens de Succoth: Donnez, je vous prie, quelques pains au peuple qui m’accompagne, car ils sont fatigués, et je suis à la poursuite de Zébach et de Tsalmunna, rois de Madian. '
  '6':
  - type: text
    content: 'Les chefs de Succoth répondirent: La main de Zébach et de Tsalmunna est-elle déjà en ton pouvoir, pour que nous donnions du pain à ton armée? '
  '7':
  - type: text
    content: 'Et Gédéon dit: Eh bien! Lorsque l’Éternel aura livré entre mes mains Zébach et Tsalmunna, je broierai votre chair avec des épines du désert et avec des chardons. '
  '8':
  - type: text
    content: 'De là il monta à Penuel, et il fit aux gens de Penuel la même demande. Ils lui répondirent comme avaient répondu ceux de Succoth. '
  '9':
  - type: text
    content: 'Et il dit aussi aux gens de Penuel: Quand je reviendrai en paix, je renverserai cette tour. '
