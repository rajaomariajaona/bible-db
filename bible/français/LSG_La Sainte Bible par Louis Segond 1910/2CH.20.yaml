document_id: 2CH.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Victoire de Josaphat sur les Moabites et les Ammonites
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-30: cf. 1 R 8:37-40. 2 Ch 14:8, etc. Ps 46 à 48; 37:5; 56:4, 5; 146:5.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, les fils de Moab et les fils d’Ammon, et avec eux des Maonites, marchèrent contre Josaphat pour lui faire la guerre. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On vint en informer Josaphat, en disant: Une multitude nombreuse s’avance contre toi depuis l’autre côté de la mer, depuis la Syrie, et ils sont à Hatsatson-Thamar, qui est En-Guédi. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dans sa frayeur, Josaphat se disposa à chercher l’Éternel, et il publia un jeûne pour tout Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Juda s’assembla pour invoquer l’Éternel, et l’on vint de toutes les villes de Juda pour chercher l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Josaphat se présenta au milieu de l’assemblée de Juda et de Jérusalem, dans la maison de l’Éternel, devant le nouveau parvis. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et il dit: Éternel, Dieu de nos pères, n’es-tu pas Dieu dans les cieux, et n’est-ce pas toi qui domines sur tous les royaumes des nations? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 29:12
      metadata:
        usfm: 1CH.29.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 6:13
      metadata:
        usfm: MAT.6.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'N’est-ce pas toi qui as en main la force et la puissance, et à qui nul ne peut résister? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'N’est-ce pas toi, ô notre Dieu, qui as chassé les habitants de ce pays devant ton peuple d’Israël, et qui l’as donné pour toujours à la postérité d’Abraham qui t’aimait? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils l’ont habité, et ils t’y ont bâti un sanctuaire pour ton nom, en disant: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: '1 R 8:33, 34, 35, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 6:28
      metadata:
        usfm: 2CH.6.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:13
      metadata:
        usfm: 2CH.7.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'S’il nous survient quelque calamité, l’épée, le jugement, la peste ou la famine, nous nous présenterons devant cette maison et devant toi, car ton nom est dans cette maison, nous crierons à toi du sein de notre détresse, et tu exauceras et tu sauveras! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Maintenant voici, les fils d’Ammon et de Moab et ceux de la montagne de Séir, chez lesquels tu n’as pas permis à Israël d’entrer quand il venait du pays d’Égypte, car il s’est détourné d’eux et ne les a pas détruits, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'les voici qui nous récompensent en venant nous chasser de ton héritage, dont tu nous as mis en possession. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'O notre Dieu, n’exerceras-tu pas tes jugements sur eux? Car nous sommes sans force devant cette multitude nombreuse qui s’avance contre nous, et nous ne savons que faire, mais nos yeux sont sur toi. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tout Juda se tenait debout devant l’Éternel, avec leurs petits enfants, leurs femmes et leurs fils. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors l’esprit de l’Éternel saisit au milieu de l’assemblée Jachaziel, fils de Zacharie, fils de Benaja, fils de Jeïel, fils de Matthania, Lévite, d’entre les fils d’Asaph. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et Jachaziel dit: Soyez attentifs, tout Juda et habitants de Jérusalem, et toi, roi Josaphat! Ainsi vous parle l’Éternel: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 14:13
      metadata:
        usfm: EXO.14.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ne craignez point et ne vous effrayez point devant cette multitude nombreuse, car ce ne sera pas vous qui combattrez, ce sera Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Demain, descendez contre eux; ils vont monter par la colline de Tsits, et vous les trouverez à l’extrémité de la vallée, en face du désert de Jeruel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Vous n’aurez point à combattre en cette affaire: présentez-vous, tenez-vous là, et vous verrez la délivrance que l’Éternel vous accordera. Juda et Jérusalem, ne craignez point et ne vous effrayez point, demain, sortez à leur rencontre, et l’Éternel sera avec vous! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Josaphat s’inclina le visage contre terre, et tout Juda et les habitants de Jérusalem tombèrent devant l’Éternel pour se prosterner en sa présence. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les Lévites d’entre les fils des Kehathites et d’entre les fils des Koréites se levèrent pour célébrer d’une voix forte et haute l’Éternel, le Dieu d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le lendemain, ils se mirent en marche de grand matin pour le désert de Tekoa. A leur départ, Josaphat se présenta et dit: Écoutez-moi, Juda et habitants de Jérusalem! Confiez-vous en l’Éternel, votre Dieu, et vous serez affermis; confiez-vous en ses prophètes, et vous réussirez. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Puis, d’accord avec le peuple, il nomma des chantres qui, revêtus d’ornements sacrés, et marchant devant l’armée, célébraient l’Éternel et disaient: Louez l’Éternel, car sa miséricorde dure à toujours! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Au moment où l’on commençait les chants et les louanges, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 7:22
      metadata:
        usfm: JDG.7.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 14:20
      metadata:
        usfm: 1SA.14.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’Éternel plaça une embuscade contre les fils d’Ammon et de Moab et ceux de la montagne de Séir, qui étaient venus contre Juda. Et ils furent battus. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les fils d’Ammon et de Moab se jetèrent sur les habitants de la montagne de Séir pour les dévouer par interdit et les exterminer; et quand ils en eurent fini avec les habitants de Séir, ils s’aidèrent les uns les autres à se détruire. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lorsque Juda fut arrivé sur la hauteur d’où l’on aperçoit le désert, ils regardèrent du côté de la multitude, et voici, c’étaient des cadavres étendus à terre, et personne n’avait échappé. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Josaphat et son peuple allèrent prendre leurs dépouilles; ils trouvèrent parmi les cadavres d’abondantes richesses et des objets précieux, et ils en enlevèrent tant qu’ils ne purent tout emporter. Ils mirent trois jours au pillage du butin, car il était considérable. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le quatrième jour, ils s’assemblèrent dans la vallée de Beraca, où ils bénirent l’Éternel; c’est pourquoi ils appelèrent ce lieu vallée de Beraca, nom qui lui est resté jusqu’à ce jour. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tous les hommes de Juda et de Jérusalem, ayant à leur tête Josaphat, partirent joyeux pour retourner à Jérusalem, car l’Éternel les avait remplis de joie en les délivrant de leurs ennemis. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils entrèrent à Jérusalem et dans la maison de l’Éternel, au son des luths, des harpes et des trompettes. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'La terreur de l’Éternel s’empara de tous les royaumes des autres pays, lorsqu’ils apprirent que l’Éternel avait combattu contre les ennemis d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Et le royaume de Josaphat fut tranquille, et son Dieu lui donna du repos de tous côtés.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fin de son règne
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: '20 v. 31 à 21 v. 1: cf. 1 R 22:41-54. Ép 5:7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Josaphat régna sur Juda. Il avait '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 22:42
      metadata:
        usfm: 1KI.22.42
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'trente-cinq ans lorsqu’il devint roi, et il régna vingt-cinq ans à Jérusalem. Sa mère s’appelait Azuba, fille de Schilchi. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il marcha dans la voie de son père Asa, et ne s’en détourna point, faisant ce qui est droit aux yeux de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Seulement, les hauts lieux ne disparurent point, et le peuple n’avait point encore le cœur fermement attaché au Dieu de ses pères. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Le reste des actions de Josaphat, les premières et les dernières, cela est écrit dans les mémoires de Jéhu, fils de Hanani, lesquels sont insérés dans le livre des rois d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Après cela, Josaphat, roi de Juda, s’associa avec le roi d’Israël, Achazia, dont la conduite était impie. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il s’associa avec lui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 22:49
      metadata:
        usfm: 1KI.22.49
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour construire des navires destinés à aller à Tarsis, et ils firent les navires à Étsjon-Guéber. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Alors Éliézer, fils de Dodava, de Maréscha, prophétisa contre Josaphat, et dit: Parce que tu t’es associé avec Achazia, l’Éternel détruit ton œuvre. Et les navires furent brisés, et ne purent aller à Tarsis.'
