document_id: 2CH.20,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Victoire de Josaphat sur les Moabites et les Ammonites
  - type: heading
    content: 'V. 1-30: cf. 1 R 8:37-40. 2 Ch 14:8, etc. Ps 46 à 48; 37:5; 56:4, 5; 146:5.'
  - type: text
    content: 'Après cela, les fils de Moab et les fils d’Ammon, et avec eux des Maonites, marchèrent contre Josaphat pour lui faire la guerre. '
  '10':
  - type: text
    content: 'Maintenant voici, les fils d’Ammon et de Moab et ceux de la montagne de Séir, chez lesquels tu n’as pas permis à Israël d’entrer quand il venait du pays d’Égypte, car il s’est détourné d’eux et ne les a pas détruits, '
  '11':
  - type: text
    content: 'les voici qui nous récompensent en venant nous chasser de ton héritage, dont tu nous as mis en possession. '
  '12':
  - type: text
    content: 'O notre Dieu, n’exerceras-tu pas tes jugements sur eux? Car nous sommes sans force devant cette multitude nombreuse qui s’avance contre nous, et nous ne savons que faire, mais nos yeux sont sur toi. '
  '13':
  - type: text
    content: 'Tout Juda se tenait debout devant l’Éternel, avec leurs petits enfants, leurs femmes et leurs fils. '
  '14':
  - type: text
    content: 'Alors l’esprit de l’Éternel saisit au milieu de l’assemblée Jachaziel, fils de Zacharie, fils de Benaja, fils de Jeïel, fils de Matthania, Lévite, d’entre les fils d’Asaph. '
  '15':
  - type: text
    content: 'Et Jachaziel dit: Soyez attentifs, tout Juda et habitants de Jérusalem, et toi, roi Josaphat! Ainsi vous parle l’Éternel: '
  - type: note
    content: Ex 14:13.
  - type: text
    content: 'Ne craignez point et ne vous effrayez point devant cette multitude nombreuse, car ce ne sera pas vous qui combattrez, ce sera Dieu. '
  '16':
  - type: text
    content: 'Demain, descendez contre eux; ils vont monter par la colline de Tsits, et vous les trouverez à l’extrémité de la vallée, en face du désert de Jeruel. '
  '17':
  - type: text
    content: 'Vous n’aurez point à combattre en cette affaire: présentez-vous, tenez-vous là, et vous verrez la délivrance que l’Éternel vous accordera. Juda et Jérusalem, ne craignez point et ne vous effrayez point, demain, sortez à leur rencontre, et l’Éternel sera avec vous! '
  '18':
  - type: text
    content: 'Josaphat s’inclina le visage contre terre, et tout Juda et les habitants de Jérusalem tombèrent devant l’Éternel pour se prosterner en sa présence. '
  '19':
  - type: text
    content: 'Les Lévites d’entre les fils des Kehathites et d’entre les fils des Koréites se levèrent pour célébrer d’une voix forte et haute l’Éternel, le Dieu d’Israël. '
  '2':
  - type: text
    content: 'On vint en informer Josaphat, en disant: Une multitude nombreuse s’avance contre toi depuis l’autre côté de la mer, depuis la Syrie, et ils sont à Hatsatson-Thamar, qui est En-Guédi. '
  '20':
  - type: text
    content: 'Le lendemain, ils se mirent en marche de grand matin pour le désert de Tekoa. A leur départ, Josaphat se présenta et dit: Écoutez-moi, Juda et habitants de Jérusalem! Confiez-vous en l’Éternel, votre Dieu, et vous serez affermis; confiez-vous en ses prophètes, et vous réussirez. '
  '21':
  - type: text
    content: 'Puis, d’accord avec le peuple, il nomma des chantres qui, revêtus d’ornements sacrés, et marchant devant l’armée, célébraient l’Éternel et disaient: Louez l’Éternel, car sa miséricorde dure à toujours! '
  '22':
  - type: text
    content: 'Au moment où l’on commençait les chants et les louanges, '
  - type: note
    content: Jg 7:22. 1 S 14:20.
  - type: text
    content: 'l’Éternel plaça une embuscade contre les fils d’Ammon et de Moab et ceux de la montagne de Séir, qui étaient venus contre Juda. Et ils furent battus. '
  '23':
  - type: text
    content: 'Les fils d’Ammon et de Moab se jetèrent sur les habitants de la montagne de Séir pour les dévouer par interdit et les exterminer; et quand ils en eurent fini avec les habitants de Séir, ils s’aidèrent les uns les autres à se détruire. '
  '24':
  - type: text
    content: 'Lorsque Juda fut arrivé sur la hauteur d’où l’on aperçoit le désert, ils regardèrent du côté de la multitude, et voici, c’étaient des cadavres étendus à terre, et personne n’avait échappé. '
  '25':
  - type: text
    content: 'Josaphat et son peuple allèrent prendre leurs dépouilles; ils trouvèrent parmi les cadavres d’abondantes richesses et des objets précieux, et ils en enlevèrent tant qu’ils ne purent tout emporter. Ils mirent trois jours au pillage du butin, car il était considérable. '
  '26':
  - type: text
    content: 'Le quatrième jour, ils s’assemblèrent dans la vallée de Beraca, où ils bénirent l’Éternel; c’est pourquoi ils appelèrent ce lieu vallée de Beraca, nom qui lui est resté jusqu’à ce jour. '
  '27':
  - type: text
    content: 'Tous les hommes de Juda et de Jérusalem, ayant à leur tête Josaphat, partirent joyeux pour retourner à Jérusalem, car l’Éternel les avait remplis de joie en les délivrant de leurs ennemis. '
  '28':
  - type: text
    content: 'Ils entrèrent à Jérusalem et dans la maison de l’Éternel, au son des luths, des harpes et des trompettes. '
  '29':
  - type: text
    content: 'La terreur de l’Éternel s’empara de tous les royaumes des autres pays, lorsqu’ils apprirent que l’Éternel avait combattu contre les ennemis d’Israël. '
  '3':
  - type: text
    content: 'Dans sa frayeur, Josaphat se disposa à chercher l’Éternel, et il publia un jeûne pour tout Juda. '
  '30':
  - type: text
    content: Et le royaume de Josaphat fut tranquille, et son Dieu lui donna du repos de tous côtés.
  - type: heading
    content: Fin de son règne
  - type: heading
    content: '20 v. 31 à 21 v. 1: cf. 1 R 22:41-54. Ép 5:7.'
  '31':
  - type: text
    content: 'Josaphat régna sur Juda. Il avait '
  - type: note
    content: 1 R 22:42.
  - type: text
    content: 'trente-cinq ans lorsqu’il devint roi, et il régna vingt-cinq ans à Jérusalem. Sa mère s’appelait Azuba, fille de Schilchi. '
  '32':
  - type: text
    content: 'Il marcha dans la voie de son père Asa, et ne s’en détourna point, faisant ce qui est droit aux yeux de l’Éternel. '
  '33':
  - type: text
    content: 'Seulement, les hauts lieux ne disparurent point, et le peuple n’avait point encore le cœur fermement attaché au Dieu de ses pères. '
  '34':
  - type: text
    content: 'Le reste des actions de Josaphat, les premières et les dernières, cela est écrit dans les mémoires de Jéhu, fils de Hanani, lesquels sont insérés dans le livre des rois d’Israël. '
  '35':
  - type: text
    content: 'Après cela, Josaphat, roi de Juda, s’associa avec le roi d’Israël, Achazia, dont la conduite était impie. '
  '36':
  - type: text
    content: 'Il s’associa avec lui '
  - type: note
    content: 1 R 22:49.
  - type: text
    content: 'pour construire des navires destinés à aller à Tarsis, et ils firent les navires à Étsjon-Guéber. '
  '37':
  - type: text
    content: 'Alors Éliézer, fils de Dodava, de Maréscha, prophétisa contre Josaphat, et dit: Parce que tu t’es associé avec Achazia, l’Éternel détruit ton œuvre. Et les navires furent brisés, et ne purent aller à Tarsis.'
  '4':
  - type: text
    content: 'Juda s’assembla pour invoquer l’Éternel, et l’on vint de toutes les villes de Juda pour chercher l’Éternel. '
  '5':
  - type: text
    content: 'Josaphat se présenta au milieu de l’assemblée de Juda et de Jérusalem, dans la maison de l’Éternel, devant le nouveau parvis. '
  '6':
  - type: text
    content: 'Et il dit: Éternel, Dieu de nos pères, n’es-tu pas Dieu dans les cieux, et n’est-ce pas toi qui domines sur tous les royaumes des nations? '
  - type: note
    content: 1 Ch 29:12. Mt 6:13.
  - type: text
    content: 'N’est-ce pas toi qui as en main la force et la puissance, et à qui nul ne peut résister? '
  '7':
  - type: text
    content: 'N’est-ce pas toi, ô notre Dieu, qui as chassé les habitants de ce pays devant ton peuple d’Israël, et qui l’as donné pour toujours à la postérité d’Abraham qui t’aimait? '
  '8':
  - type: text
    content: 'Ils l’ont habité, et ils t’y ont bâti un sanctuaire pour ton nom, en disant: '
  '9':
  - type: note
    content: 1 R 8:33, 34, 35, etc. 2 Ch 6:28; 7:13.
  - type: text
    content: 'S’il nous survient quelque calamité, l’épée, le jugement, la peste ou la famine, nous nous présenterons devant cette maison et devant toi, car ton nom est dans cette maison, nous crierons à toi du sein de notre détresse, et tu exauceras et tu sauveras! '
