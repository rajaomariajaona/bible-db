document_id: NUM.30
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Moïse dit aux enfants d’Israël tout ce que l’Éternel lui avait ordonné.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loi sur les vœux
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 2-3: cf. (De 23:21-23. Ec 5:3-6.) Ps 76:12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Moïse parla aux chefs des tribus des enfants d’Israël, et dit: Voici ce que l’Éternel ordonne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 23:21
      metadata:
        usfm: DEU.23.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Lorsqu’un homme fera un vœu à l’Éternel, ou un serment pour se lier par un engagement, il ne violera point sa parole, il agira selon tout ce qui est sorti de sa bouche.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 4-17: cf. (Ép 5:22-24. 1 Ti 2:11-14.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Lorsqu’une femme, dans sa jeunesse et à la maison de son père, fera un vœu à l’Éternel et se liera par un engagement, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et que son père aura connaissance du vœu qu’elle a fait et de l’engagement par lequel elle s’est liée, si son père garde le silence envers elle, tout vœu qu’elle aura fait sera valable, et tout engagement par lequel elle se sera liée sera valable; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'mais si son père la désapprouve le jour où il en a connaissance, tous ses vœux et tous les engagements par lesquels elle se sera liée n’auront aucune valeur; et l’Éternel lui pardonnera, parce qu’elle a été désapprouvée de son père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Lorsqu’elle sera mariée, après avoir fait des vœux, ou s’être liée par une parole échappée de ses lèvres, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et que son mari en aura connaissance, s’il garde le silence envers elle le jour où il en a connaissance, ses vœux seront valables, et les engagements par lesquels elle se sera liée seront valables; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'mais si son mari la désapprouve le jour où il en a connaissance, il annulera le vœu qu’elle a fait et la parole échappée de ses lèvres, par laquelle elle s’est liée; et l’Éternel lui pardonnera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le vœu d’une femme veuve ou répudiée, l’engagement quelconque par lequel elle se sera liée, sera valable pour elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lorsqu’une femme, dans la maison de son mari, fera des vœux ou se liera par un serment, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'et que son mari en aura connaissance, s’il garde le silence envers elle et ne la désapprouve pas, tous ses vœux seront valables, et tous les engagements par lesquels elle se sera liée seront valables; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'mais si son mari les annule le jour où il en a connaissance, tout vœu et tout engagement sortis de ses lèvres n’auront aucune valeur, son mari les a annulés; et l’Éternel lui pardonnera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Son mari peut ratifier et son mari peut annuler tout vœu, tout serment par lequel elle s’engage à mortifier sa personne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'S’il garde de jour en jour le silence envers elle, il ratifie ainsi tous les vœux ou tous les engagements par lesquels elle s’est liée; il les ratifie, parce qu’il a gardé le silence envers elle le jour où il en a eu connaissance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais s’il les annule après le jour où il en a eu connaissance, il sera coupable du péché de sa femme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Telles sont les lois que l’Éternel prescrivit à Moïse, entre un mari et sa femme, entre un père et sa fille, lorsqu’elle est dans sa jeunesse et à la maison de son père.
