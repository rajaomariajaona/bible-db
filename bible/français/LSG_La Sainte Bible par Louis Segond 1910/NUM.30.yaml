document_id: NUM.30,93
type_code: fra
verses:
  '1':
  - type: text
    content: Moïse dit aux enfants d’Israël tout ce que l’Éternel lui avait ordonné.
  - type: heading
    content: Loi sur les vœux
  - type: heading
    content: 'V. 2-3: cf. (De 23:21-23. Ec 5:3-6.) Ps 76:12.'
  '10':
  - type: text
    content: 'Le vœu d’une femme veuve ou répudiée, l’engagement quelconque par lequel elle se sera liée, sera valable pour elle. '
  '11':
  - type: text
    content: 'Lorsqu’une femme, dans la maison de son mari, fera des vœux ou se liera par un serment, '
  '12':
  - type: text
    content: 'et que son mari en aura connaissance, s’il garde le silence envers elle et ne la désapprouve pas, tous ses vœux seront valables, et tous les engagements par lesquels elle se sera liée seront valables; '
  '13':
  - type: text
    content: 'mais si son mari les annule le jour où il en a connaissance, tout vœu et tout engagement sortis de ses lèvres n’auront aucune valeur, son mari les a annulés; et l’Éternel lui pardonnera. '
  '14':
  - type: text
    content: 'Son mari peut ratifier et son mari peut annuler tout vœu, tout serment par lequel elle s’engage à mortifier sa personne. '
  '15':
  - type: text
    content: 'S’il garde de jour en jour le silence envers elle, il ratifie ainsi tous les vœux ou tous les engagements par lesquels elle s’est liée; il les ratifie, parce qu’il a gardé le silence envers elle le jour où il en a eu connaissance. '
  '16':
  - type: text
    content: 'Mais s’il les annule après le jour où il en a eu connaissance, il sera coupable du péché de sa femme. '
  '17':
  - type: text
    content: Telles sont les lois que l’Éternel prescrivit à Moïse, entre un mari et sa femme, entre un père et sa fille, lorsqu’elle est dans sa jeunesse et à la maison de son père.
  '2':
  - type: text
    content: 'Moïse parla aux chefs des tribus des enfants d’Israël, et dit: Voici ce que l’Éternel ordonne. '
  '3':
  - type: note
    content: De 23:21.
  - type: text
    content: Lorsqu’un homme fera un vœu à l’Éternel, ou un serment pour se lier par un engagement, il ne violera point sa parole, il agira selon tout ce qui est sorti de sa bouche.
  - type: heading
    content: 'V. 4-17: cf. (Ép 5:22-24. 1 Ti 2:11-14.)'
  '4':
  - type: text
    content: 'Lorsqu’une femme, dans sa jeunesse et à la maison de son père, fera un vœu à l’Éternel et se liera par un engagement, '
  '5':
  - type: text
    content: 'et que son père aura connaissance du vœu qu’elle a fait et de l’engagement par lequel elle s’est liée, si son père garde le silence envers elle, tout vœu qu’elle aura fait sera valable, et tout engagement par lequel elle se sera liée sera valable; '
  '6':
  - type: text
    content: 'mais si son père la désapprouve le jour où il en a connaissance, tous ses vœux et tous les engagements par lesquels elle se sera liée n’auront aucune valeur; et l’Éternel lui pardonnera, parce qu’elle a été désapprouvée de son père. '
  '7':
  - type: text
    content: 'Lorsqu’elle sera mariée, après avoir fait des vœux, ou s’être liée par une parole échappée de ses lèvres, '
  '8':
  - type: text
    content: 'et que son mari en aura connaissance, s’il garde le silence envers elle le jour où il en a connaissance, ses vœux seront valables, et les engagements par lesquels elle se sera liée seront valables; '
  '9':
  - type: text
    content: 'mais si son mari la désapprouve le jour où il en a connaissance, il annulera le vœu qu’elle a fait et la parole échappée de ses lèvres, par laquelle elle s’est liée; et l’Éternel lui pardonnera. '
