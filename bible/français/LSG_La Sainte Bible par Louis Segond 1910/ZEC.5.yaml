document_id: ZEC.5,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le rouleau volant et l’épha
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-4: cf. Éz 2:9, 10. Mal 3:5.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je levai de nouveau les yeux et je regardai, et voici, il y avait un rouleau qui volait. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je dis à l’ange qui parlait avec moi: Où emportent-elles l’épha? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il me répondit: Elles vont lui bâtir une maison dans le pays de Schinear; et quand elle sera prête, il sera déposé là dans son lieu.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il me dit: Que vois-tu? Je répondis: Je vois un rouleau qui vole; il a vingt coudées de longueur, et dix coudées de largeur. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il me dit: C’est la malédiction qui se répand sur tout le pays; car selon elle tout voleur sera chassé d’ici, et selon elle tout parjure sera chassé d’ici. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je la répands, dit l’Éternel des armées, afin qu’elle entre dans la maison du voleur et de celui qui jure faussement en mon nom, afin qu’elle y établisse sa demeure, et qu’elle la consume avec le bois et les pierres.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-11: cf. Am 2:6; 5:11, 12; 8:4-6. 1 Ti 6:9, 10.'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ange qui parlait avec moi s’avança, et il me dit: Lève les yeux, et regarde ce qui sort là. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je répondis: Qu’est-ce? Et il dit: C’est l’épha qui sort. Il ajouta: C’est leur iniquité dans tout le pays. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici, une masse de plomb s’éleva, et il y avait une femme assise au milieu de l’épha. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit: C’est l’iniquité. Et il la repoussa dans l’épha, et il jeta sur l’ouverture la masse de plomb. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je levai les yeux et je regardai, et voici, deux femmes parurent. Le vent soufflait dans leurs ailes; elles avaient des ailes comme celles de la cigogne. Elles enlevèrent l’épha entre la terre et le ciel. '
