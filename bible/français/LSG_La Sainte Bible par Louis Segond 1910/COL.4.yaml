document_id: COL.4,93
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Ép 6:9.
  - type: text
    content: Maîtres, accordez à vos serviteurs ce qui est juste et équitable, sachant que vous aussi vous avez un maître dans le ciel.
  - type: heading
    content: Exhortation à la prière et à la sagesse
  - type: heading
    content: 'V. 2-6: cf. Ép 8:18-20; 5:14-17; 4:27.'
  '10':
  - type: note
    content: Ac 27:2.
  - type: text
    content: 'Aristarque, mon compagnon de captivité, vous salue, ainsi que '
  - type: note
    content: Ac 15:37. 2 Ti 4:11.
  - type: text
    content: 'Marc, le cousin de Barnabas, au sujet duquel vous avez reçu des ordres (s’il va chez vous, accueillez-le); '
  '11':
  - type: text
    content: 'Jésus, appelé Justus, vous salue aussi. Ils sont du nombre des circoncis, et les seuls qui aient travaillé avec moi pour le royaume de Dieu, et qui aient été pour moi une consolation. '
  '12':
  - type: note
    content: Col 1:7. Phm v. 23.
  - type: text
    content: 'Épaphras, qui est des vôtres, vous salue: serviteur de Jésus-Christ, il ne cesse de combattre pour vous dans ses prières, afin que, parfaits et pleinement persuadés, vous persistiez dans une entière soumission à la volonté de Dieu. '
  '13':
  - type: text
    content: 'Car je lui rends le témoignage qu’il a une grande sollicitude pour vous, pour ceux de Laodicée, et pour ceux d’Hiérapolis. '
  '14':
  - type: note
    content: 2 Ti 4:11.
  - type: text
    content: 'Luc, le médecin bien-aimé, vous salue, ainsi que '
  - type: note
    content: 2 Ti 4:10.
  - type: text
    content: 'Démas. '
  '15':
  - type: text
    content: 'Saluez les frères qui sont à Laodicée, et Nymphas, et l’Église qui est dans sa maison. '
  '16':
  - type: text
    content: 'Lorsque cette lettre aura été lue chez vous, faites en sorte qu’elle soit aussi lue dans l’Église des Laodicéens, et que vous lisiez à votre tour celle qui vous arrivera de Laodicée. '
  '17':
  - type: text
    content: 'Et dites à Archippe: Prends garde au ministère que tu as reçu dans le Seigneur, afin de le bien remplir. '
  '18':
  - type: note
    content: 2 Th 3:17.
  - type: text
    content: 'Je vous salue, moi Paul, de ma propre main. '
  - type: note
    content: Hé 13:3.
  - type: text
    content: Souvenez-vous de mes liens. Que la grâce soit avec vous!
  '2':
  - type: text
    content: ' '
  - type: note
    content: Lu 18:1. Ro 12:12. Ép 6:18. 1 Th 5:17.
  - type: text
    content: 'Persévérez dans la prière, veillez-y avec actions de grâces. '
  '3':
  - type: text
    content: 'Priez en même temps pour nous, afin que Dieu nous ouvre une porte pour la parole, '
  - type: note
    content: Ép 6:19. 2 Th 3:1.
  - type: text
    content: 'en sorte que je puisse annoncer le mystère de Christ, pour lequel je suis dans les chaînes, '
  '4':
  - type: text
    content: 'et le faire connaître comme je dois en parler. '
  '5':
  - type: note
    content: Ép 5:15.
  - type: text
    content: 'Conduisez-vous avec sagesse envers ceux du dehors, '
  - type: note
    content: Ép 5:16.
  - type: text
    content: 'et rachetez le temps. '
  '6':
  - type: note
    content: Mc 9:50.
  - type: text
    content: Que votre parole soit toujours accompagnée de grâce, assaisonnée de sel, afin que vous sachiez comment il faut répondre à chacun.
  - type: heading
    content: Envoi de Tychique et d’Onésime. Salutations
  - type: heading
    content: 'V. 7-18: cf. Ép 6:21, 22. (Col 1:7, 8. Ph 2:10-25.)'
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ac 20:4. Ép 6:21. 2 Ti 4:12.
  - type: text
    content: 'Tychique, le bien-aimé frère et le fidèle ministre, mon compagnon de service dans le Seigneur, vous communiquera tout ce qui me concerne. '
  '8':
  - type: text
    content: 'Je l’envoie exprès vers vous, pour que vous connaissiez notre situation, et pour qu’il console vos cœurs. '
  '9':
  - type: text
    content: 'Je l’envoie avec '
  - type: note
    content: Phm v. 10.
  - type: text
    content: 'Onésime, le fidèle et bien-aimé frère, qui est des vôtres. Ils vous informeront de tout ce qui se passe ici. '
