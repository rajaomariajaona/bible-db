document_id: COL.4,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 6:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Maîtres, accordez à vos serviteurs ce qui est juste et équitable, sachant que vous aussi vous avez un maître dans le ciel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Exhortation à la prière et à la sagesse
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 2-6: cf. Ép 8:18-20; 5:14-17; 4:27.'
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 27:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Aristarque, mon compagnon de captivité, vous salue, ainsi que '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 15:37
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 4:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Marc, le cousin de Barnabas, au sujet duquel vous avez reçu des ordres (s’il va chez vous, accueillez-le); '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, appelé Justus, vous salue aussi. Ils sont du nombre des circoncis, et les seuls qui aient travaillé avec moi pour le royaume de Dieu, et qui aient été pour moi une consolation. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:7
      - type: text
        text: . Phm v. 23.
      marker-yv: yv-n
    - type: text
      text: 'Épaphras, qui est des vôtres, vous salue: serviteur de Jésus-Christ, il ne cesse de combattre pour vous dans ses prières, afin que, parfaits et pleinement persuadés, vous persistiez dans une entière soumission à la volonté de Dieu. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car je lui rends le témoignage qu’il a une grande sollicitude pour vous, pour ceux de Laodicée, et pour ceux d’Hiérapolis. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 4:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Luc, le médecin bien-aimé, vous salue, ainsi que '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 4:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Démas. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saluez les frères qui sont à Laodicée, et Nymphas, et l’Église qui est dans sa maison. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque cette lettre aura été lue chez vous, faites en sorte qu’elle soit aussi lue dans l’Église des Laodicéens, et que vous lisiez à votre tour celle qui vous arrivera de Laodicée. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et dites à Archippe: Prends garde au ministère que tu as reçu dans le Seigneur, afin de le bien remplir. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Th 3:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je vous salue, moi Paul, de ma propre main. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 13:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Souvenez-vous de mes liens. Que la grâce soit avec vous!
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 18:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 12:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 6:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 5:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Persévérez dans la prière, veillez-y avec actions de grâces. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Priez en même temps pour nous, afin que Dieu nous ouvre une porte pour la parole, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 6:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Th 3:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'en sorte que je puisse annoncer le mystère de Christ, pour lequel je suis dans les chaînes, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et le faire connaître comme je dois en parler. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Conduisez-vous avec sagesse envers ceux du dehors, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et rachetez le temps. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 9:50
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que votre parole soit toujours accompagnée de grâce, assaisonnée de sel, afin que vous sachiez comment il faut répondre à chacun.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Envoi de Tychique et d’Onésime. Salutations
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-18: cf. Ép 6:21, 22. (Col 1:7, 8. Ph 2:10-25.)'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 20:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 6:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 4:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tychique, le bien-aimé frère et le fidèle ministre, mon compagnon de service dans le Seigneur, vous communiquera tout ce qui me concerne. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je l’envoie exprès vers vous, pour que vous connaissiez notre situation, et pour qu’il console vos cœurs. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je l’envoie avec '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phm v. 10.
      marker-yv: yv-n
    - type: text
      text: 'Onésime, le fidèle et bien-aimé frère, qui est des vôtres. Ils vous informeront de tout ce qui se passe ici. '
