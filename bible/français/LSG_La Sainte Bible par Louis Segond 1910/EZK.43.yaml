document_id: EZK.43
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vision de la gloire de l’Éternel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. Éz 10:1-19. (1 R 8:6, 10-13. Éz 37:26-28. Ap 21:3.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il me conduisit à la porte, à la porte qui était du côté de l’orient. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et voici, la gloire du Dieu d’Israël s’avançait de l’orient. Sa voix était pareille au '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 1:24
      metadata:
        usfm: EZK.1.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'bruit des grandes eaux, et la terre resplendissait de sa gloire. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Cette vision était semblable à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 1:4
      metadata:
        usfm: EZK.1.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:4
      metadata:
        usfm: EZK.8.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'celle que j’avais eue lorsque j’étais venu pour détruire la ville; et ces visions étaient semblables à celle que j’avais eue près du fleuve du Kebar. Et je tombai sur ma face. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'La gloire de l’Éternel entra dans la maison par la porte qui était du côté de l’orient. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors, l’esprit m’enleva et me transporta dans le parvis intérieur. Et voici, la gloire de l’Éternel remplissait la maison. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'J’entendis quelqu’un qui me parlait depuis la maison, et un homme se tenait près de moi. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il me dit: Fils de l’homme, c’est ici le lieu de mon trône, le lieu où je poserai la plante de mes pieds; j’y habiterai éternellement au milieu des enfants d’Israël. La maison d’Israël et ses rois ne souilleront plus mon saint nom par leurs prostitutions et par les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 16:18
      metadata:
        usfm: JER.16.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'cadavres de leurs rois sur leurs hauts lieux. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils mettaient leur seuil près de mon seuil, leurs poteaux près de mes poteaux, et il n’y avait qu’un mur entre moi et eux; ils ont ainsi souillé mon saint nom par les abominations qu’ils ont commises; c’est pourquoi je les ai consumés dans ma colère. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Maintenant ils éloigneront de moi leurs prostitutions et les cadavres de leurs rois, et j’habiterai éternellement au milieu d’eux.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-12: cf. Éz 44:5-9. 2 Ti 2:25, 26.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Toi, fils de l’homme, montre ce temple à la maison d’Israël; qu’ils en mesurent le plan, et qu’ils rougissent de leurs iniquités. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'S’ils rougissent de toute leur conduite, fais-leur connaître la forme de cette maison, sa disposition, ses issues et ses entrées, tous ses dessins et toutes ses ordonnances, tous ses dessins et toutes ses lois; mets-en la description sous leurs yeux, afin qu’ils gardent tous ses dessins et toutes ses ordonnances, et qu’ils s’y conforment dans l’exécution. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Telle est la loi de la maison. Sur le sommet de la montagne, tout l’espace qu’elle doit occuper est très saint. Voilà donc la loi de la maison.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-17: cf. Ex 27:1-8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici les mesures de l’autel, d’après les coudées dont chacune était d’un palme plus longue que la coudée ordinaire. La base avait une coudée de hauteur, et une coudée de largeur; et le rebord qui terminait son contour avait un empan de largeur; c’était le support de l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Depuis la base sur le sol jusqu’à l’encadrement inférieur il y avait deux coudées, et une coudée de largeur; et depuis le petit jusqu’au grand encadrement il y avait quatre coudées, et une coudée de largeur. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L’autel avait quatre coudées; et quatre cornes s’élevaient de l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L’autel avait douze coudées de longueur, douze coudées de largeur, et formait un carré par ses quatre côtés. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L’encadrement avait quatorze coudées de longueur sur quatorze coudées de largeur à ses quatre côtés, le rebord qui terminait son contour avait une demi-coudée; la base avait une coudée tout autour, et les degrés étaient tournés vers l’orient.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-27: cf. Ex 29:35-37. Lé 8:33-35.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il me dit: Fils de l’homme, ainsi parle le Seigneur, l’Éternel: Voici les lois au sujet de l’autel, pour le jour où on le construira, afin d’y offrir les holocaustes et d’y répandre le sang. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu donneras aux sacrificateurs, aux Lévites, qui sont de la postérité de Tsadok et qui s’approchent de moi pour me servir, dit le Seigneur, l’Éternel, un jeune taureau pour le sacrifice d’expiation. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tu prendras de son sang, et tu en mettras sur les quatre cornes de l’autel, sur les quatre angles de l’encadrement, et sur le rebord qui l’entoure; tu purifieras ainsi l’autel et tu en feras l’expiation. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tu prendras le taureau expiatoire, et on le brûlera dans un lieu réservé de la maison, en dehors du sanctuaire. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le second jour, tu offriras en expiation un bouc sans défaut; on purifiera ainsi l’autel, comme on l’aura purifié avec le taureau. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Quand tu auras achevé la purification, tu offriras un jeune taureau sans défaut, et un bélier du troupeau sans défaut. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tu les offriras devant l’Éternel; les sacrificateurs jetteront du sel sur eux, et les offriront en holocauste à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Pendant sept jours, tu sacrifieras chaque jour un bouc comme victime expiatoire; on sacrifiera aussi un jeune taureau et un bélier du troupeau, l’un et l’autre sans défaut. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Pendant sept jours, on fera l’expiation et la purification de l’autel, on le consacrera. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Lorsque ces jours seront accomplis, dès le huitième jour et à l’avenir les sacrificateurs offriront sur l’autel vos holocaustes et vos sacrifices d’actions de grâces. Et je vous serai favorable, dit le Seigneur, l’Éternel.
