document_id: EZK.43,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Vision de la gloire de l’Éternel
  - type: heading
    content: 'V. 1-9: cf. Éz 10:1-19. (1 R 8:6, 10-13. Éz 37:26-28. Ap 21:3.)'
  - type: text
    content: 'Il me conduisit à la porte, à la porte qui était du côté de l’orient. '
  '10':
  - type: text
    content: 'Toi, fils de l’homme, montre ce temple à la maison d’Israël; qu’ils en mesurent le plan, et qu’ils rougissent de leurs iniquités. '
  '11':
  - type: text
    content: 'S’ils rougissent de toute leur conduite, fais-leur connaître la forme de cette maison, sa disposition, ses issues et ses entrées, tous ses dessins et toutes ses ordonnances, tous ses dessins et toutes ses lois; mets-en la description sous leurs yeux, afin qu’ils gardent tous ses dessins et toutes ses ordonnances, et qu’ils s’y conforment dans l’exécution. '
  '12':
  - type: text
    content: Telle est la loi de la maison. Sur le sommet de la montagne, tout l’espace qu’elle doit occuper est très saint. Voilà donc la loi de la maison.
  - type: heading
    content: 'V. 13-17: cf. Ex 27:1-8.'
  '13':
  - type: text
    content: 'Voici les mesures de l’autel, d’après les coudées dont chacune était d’un palme plus longue que la coudée ordinaire. La base avait une coudée de hauteur, et une coudée de largeur; et le rebord qui terminait son contour avait un empan de largeur; c’était le support de l’autel. '
  '14':
  - type: text
    content: 'Depuis la base sur le sol jusqu’à l’encadrement inférieur il y avait deux coudées, et une coudée de largeur; et depuis le petit jusqu’au grand encadrement il y avait quatre coudées, et une coudée de largeur. '
  '15':
  - type: text
    content: 'L’autel avait quatre coudées; et quatre cornes s’élevaient de l’autel. '
  '16':
  - type: text
    content: 'L’autel avait douze coudées de longueur, douze coudées de largeur, et formait un carré par ses quatre côtés. '
  '17':
  - type: text
    content: L’encadrement avait quatorze coudées de longueur sur quatorze coudées de largeur à ses quatre côtés, le rebord qui terminait son contour avait une demi-coudée; la base avait une coudée tout autour, et les degrés étaient tournés vers l’orient.
  - type: heading
    content: 'V. 18-27: cf. Ex 29:35-37. Lé 8:33-35.'
  '18':
  - type: text
    content: 'Il me dit: Fils de l’homme, ainsi parle le Seigneur, l’Éternel: Voici les lois au sujet de l’autel, pour le jour où on le construira, afin d’y offrir les holocaustes et d’y répandre le sang. '
  '19':
  - type: text
    content: 'Tu donneras aux sacrificateurs, aux Lévites, qui sont de la postérité de Tsadok et qui s’approchent de moi pour me servir, dit le Seigneur, l’Éternel, un jeune taureau pour le sacrifice d’expiation. '
  '2':
  - type: text
    content: 'Et voici, la gloire du Dieu d’Israël s’avançait de l’orient. Sa voix était pareille au '
  - type: note
    content: Éz 1:24.
  - type: text
    content: 'bruit des grandes eaux, et la terre resplendissait de sa gloire. '
  '20':
  - type: text
    content: 'Tu prendras de son sang, et tu en mettras sur les quatre cornes de l’autel, sur les quatre angles de l’encadrement, et sur le rebord qui l’entoure; tu purifieras ainsi l’autel et tu en feras l’expiation. '
  '21':
  - type: text
    content: 'Tu prendras le taureau expiatoire, et on le brûlera dans un lieu réservé de la maison, en dehors du sanctuaire. '
  '22':
  - type: text
    content: 'Le second jour, tu offriras en expiation un bouc sans défaut; on purifiera ainsi l’autel, comme on l’aura purifié avec le taureau. '
  '23':
  - type: text
    content: 'Quand tu auras achevé la purification, tu offriras un jeune taureau sans défaut, et un bélier du troupeau sans défaut. '
  '24':
  - type: text
    content: 'Tu les offriras devant l’Éternel; les sacrificateurs jetteront du sel sur eux, et les offriront en holocauste à l’Éternel. '
  '25':
  - type: text
    content: 'Pendant sept jours, tu sacrifieras chaque jour un bouc comme victime expiatoire; on sacrifiera aussi un jeune taureau et un bélier du troupeau, l’un et l’autre sans défaut. '
  '26':
  - type: text
    content: 'Pendant sept jours, on fera l’expiation et la purification de l’autel, on le consacrera. '
  '27':
  - type: text
    content: Lorsque ces jours seront accomplis, dès le huitième jour et à l’avenir les sacrificateurs offriront sur l’autel vos holocaustes et vos sacrifices d’actions de grâces. Et je vous serai favorable, dit le Seigneur, l’Éternel.
  '3':
  - type: text
    content: 'Cette vision était semblable à '
  - type: note
    content: Éz 1:4; 8:4.
  - type: text
    content: 'celle que j’avais eue lorsque j’étais venu pour détruire la ville; et ces visions étaient semblables à celle que j’avais eue près du fleuve du Kebar. Et je tombai sur ma face. '
  '4':
  - type: text
    content: 'La gloire de l’Éternel entra dans la maison par la porte qui était du côté de l’orient. '
  '5':
  - type: text
    content: 'Alors, l’esprit m’enleva et me transporta dans le parvis intérieur. Et voici, la gloire de l’Éternel remplissait la maison. '
  '6':
  - type: text
    content: 'J’entendis quelqu’un qui me parlait depuis la maison, et un homme se tenait près de moi. '
  '7':
  - type: text
    content: 'Il me dit: Fils de l’homme, c’est ici le lieu de mon trône, le lieu où je poserai la plante de mes pieds; j’y habiterai éternellement au milieu des enfants d’Israël. La maison d’Israël et ses rois ne souilleront plus mon saint nom par leurs prostitutions et par les '
  - type: note
    content: Jé 16:18.
  - type: text
    content: 'cadavres de leurs rois sur leurs hauts lieux. '
  '8':
  - type: text
    content: 'Ils mettaient leur seuil près de mon seuil, leurs poteaux près de mes poteaux, et il n’y avait qu’un mur entre moi et eux; ils ont ainsi souillé mon saint nom par les abominations qu’ils ont commises; c’est pourquoi je les ai consumés dans ma colère. '
  '9':
  - type: text
    content: Maintenant ils éloigneront de moi leurs prostitutions et les cadavres de leurs rois, et j’habiterai éternellement au milieu d’eux.
  - type: heading
    content: 'V. 10-12: cf. Éz 44:5-9. 2 Ti 2:25, 26.'
