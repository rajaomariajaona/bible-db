document_id: PSA.86,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 31; 142; 143.
  - type: text
    content: Prière de David.
  - type: text
    content: Éternel, prête l’oreille, exauce-moi!
  - type: text
    content: Car je suis malheureux et indigent.
  '10':
  - type: text
    content: Car tu es grand, et tu opères des prodiges;
  - type: text
    content: Toi seul, tu es Dieu.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ps 25:4; 27:11; 119:33.
  - type: text
    content: Enseigne-moi tes voies, ô Éternel!
  - type: text
    content: Je marcherai dans ta fidélité.
  - type: text
    content: Dispose mon cœur à la crainte de ton nom.
  '12':
  - type: text
    content: Je te louerai de tout mon cœur,
  - type: text
    content: Seigneur, mon Dieu!
  - type: text
    content: Et je glorifierai ton nom à perpétuité.
  '13':
  - type: text
    content: Car ta bonté est grande envers moi,
  - type: text
    content: Et tu délivres mon âme du séjour profond des morts.
  '14':
  - type: text
    content: 'O Dieu! '
  - type: note
    content: Ps 54:5.
  - type: text
    content: des orgueilleux se sont levés contre moi,
  - type: text
    content: Une troupe d’hommes violents en veulent à ma vie;
  - type: text
    content: Ils ne portent pas leurs pensées sur toi.
  '15':
  - type: text
    content: 'Mais toi, Seigneur, '
  - type: note
    content: Ex 34:6. No 14:18. Né 9:17. Ps 103:8; 145:8. Joë 2:3.
  - type: text
    content: tu es un Dieu miséricordieux et compatissant,
  - type: text
    content: Lent à la colère, riche en bonté et en fidélité;
  '16':
  - type: text
    content: Tourne vers moi les regards et aie pitié de moi,
  - type: text
    content: Donne la force à ton serviteur,
  - type: text
    content: Et sauve le fils de ta servante!
  '17':
  - type: text
    content: Opère un signe en ma faveur!
  - type: text
    content: Que mes ennemis le voient et soient confus!
  - type: text
    content: Car tu me secours et tu me consoles, ô Éternel!
  '2':
  - type: text
    content: Garde mon âme, car je suis pieux!
  - type: text
    content: Mon Dieu, sauve ton serviteur qui se confie en toi!
  '3':
  - type: text
    content: Aie pitié de moi, Seigneur!
  - type: text
    content: Car je crie à toi tout le jour.
  '4':
  - type: text
    content: Réjouis l’âme de ton serviteur,
  - type: text
    content: Car à toi, Seigneur, j’élève mon âme.
  '5':
  - type: text
    content: Car tu es bon, Seigneur, tu pardonnes,
  - type: text
    content: Tu es plein d’amour pour tous ceux qui t’invoquent.
  '6':
  - type: text
    content: Éternel, prête l’oreille à ma prière,
  - type: text
    content: Sois attentif à la voix de mes supplications!
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps 50:15.
  - type: text
    content: Je t’invoque au jour de ma détresse,
  - type: text
    content: Car tu m’exauces.
  '8':
  - type: text
    content: Nul n’est comme toi parmi les dieux, Seigneur,
  - type: note
    content: De 3:24. Ps 136:4.
  - type: text
    content: Et rien ne ressemble à tes œuvres.
  '9':
  - type: text
    content: Toutes les nations que tu as faites viendront
  - type: text
    content: Se prosterner devant ta face, Seigneur,
  - type: text
    content: Et rendre gloire à ton nom.
