document_id: PSA.86,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 31; 142; 143.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prière de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, prête l’oreille, exauce-moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je suis malheureux et indigent.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu es grand, et tu opères des prodiges;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi seul, tu es Dieu.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 25:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 119:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Enseigne-moi tes voies, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je marcherai dans ta fidélité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dispose mon cœur à la crainte de ton nom.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te louerai de tout mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur, mon Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je glorifierai ton nom à perpétuité.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ta bonté est grande envers moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu délivres mon âme du séjour profond des morts.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O Dieu! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 54:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: des orgueilleux se sont levés contre moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une troupe d’hommes violents en veulent à ma vie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne portent pas leurs pensées sur toi.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais toi, Seigneur, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 34:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 14:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Né 9:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 103:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 145:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 2:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: tu es un Dieu miséricordieux et compatissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lent à la colère, riche en bonté et en fidélité;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tourne vers moi les regards et aie pitié de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donne la force à ton serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sauve le fils de ta servante!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Opère un signe en ma faveur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que mes ennemis le voient et soient confus!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu me secours et tu me consoles, ô Éternel!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Garde mon âme, car je suis pieux!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu, sauve ton serviteur qui se confie en toi!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aie pitié de moi, Seigneur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je crie à toi tout le jour.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réjouis l’âme de ton serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car à toi, Seigneur, j’élève mon âme.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu es bon, Seigneur, tu pardonnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es plein d’amour pour tous ceux qui t’invoquent.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, prête l’oreille à ma prière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois attentif à la voix de mes supplications!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 50:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je t’invoque au jour de ma détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu m’exauces.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nul n’est comme toi parmi les dieux, Seigneur,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 3:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 136:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et rien ne ressemble à tes œuvres.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les nations que tu as faites viendront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Se prosterner devant ta face, Seigneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et rendre gloire à ton nom.
