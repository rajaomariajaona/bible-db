document_id: ISA.39,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambassade babylonienne auprès d’Ézéchias
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. 2 R 20:12-19. 2 Ch 32:25, 26, 31.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'En ce même temps, Merodac-Baladan, fils de Baladan, roi de Babylone, envoya une lettre et un présent à Ézéchias, parce qu’il avait appris sa maladie et son rétablissement. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ézéchias en eut de la joie, et il montra aux envoyés le lieu où étaient ses choses de prix, l’argent et l’or, les aromates et l’huile précieuse, tout son arsenal, et tout ce qui se trouvait dans ses trésors: il n’y eut rien qu’Ézéchias ne leur fît voir dans sa maison et dans tous ses domaines. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ésaïe, le prophète, vint ensuite auprès du roi Ézéchias, et lui dit: Qu’ont dit ces gens-là, et d’où sont-ils venus vers toi? Ézéchias répondit: Ils sont venus vers moi d’un pays éloigné, de Babylone. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ésaïe dit encore: Qu’ont-ils vu dans ta maison? Ézéchias répondit: Ils ont vu tout ce qui est dans ma maison: il n’y a rien dans mes trésors que je ne leur aie fait voir. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Alors Ésaïe dit à Ézéchias: Écoute la parole de l’Éternel des armées! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Voici, les temps viendront où l’on emportera à Babylone tout ce qui est dans ta maison et ce que tes pères ont amassé jusqu’à ce jour; il n’en restera rien, dit l’Éternel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Et l’on prendra de tes fils, qui seront sortis de toi, que tu auras engendrés, pour en faire des eunuques dans le palais du roi de Babylone. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ézéchias répondit à Ésaïe: La parole de l’Éternel, que tu as prononcée, est bonne; car, ajouta-t-il, il y aura paix et sécurité pendant ma vie.'
