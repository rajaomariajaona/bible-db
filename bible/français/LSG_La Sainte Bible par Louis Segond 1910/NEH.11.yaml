document_id: NEH.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Répartition des nouveaux habitants entre Jérusalem et le reste du territoire
  - type: heading
    content: 'V. 1-36: cf. 1 Ch 9. És 4:3, 4. So 3:12. Ps 87:1-3.'
  - type: text
    content: 'Les chefs du peuple s’établirent à Jérusalem. Le reste du peuple tira au sort, pour qu’un sur dix vînt habiter Jérusalem, la ville sainte, et que les autres demeurassent dans les villes. '
  '10':
  - type: text
    content: 'Des sacrificateurs: Jedaeja, fils de Jojarib, Jakin, '
  '11':
  - type: text
    content: 'Seraja, fils de Hilkija, fils de Meschullam, fils de Tsadok, fils de Merajoth, fils d’Achithub, prince de la maison de Dieu, '
  '12':
  - type: text
    content: 'et leurs frères occupés au service de la maison, huit cent vingt-deux; Adaja, fils de Jerocham, fils de Pelalia, fils d’Amtsi, fils de Zacharie, fils de Paschhur, fils de Malkija, '
  '13':
  - type: text
    content: 'et ses frères, chefs des maisons paternelles, deux cent quarante-deux; et Amaschsaï, fils d’Azareel, fils d’Achzaï, fils de Meschillémoth, fils d’Immer, '
  '14':
  - type: text
    content: 'et leurs frères, vaillants hommes, cent vingt-huit. Zabdiel, fils de Guedolim, était leur chef. '
  '15':
  - type: text
    content: 'Des Lévites: Schemaeja, fils de Haschub, fils d’Azrikam, fils de Haschabia, fils de Bunni, '
  '16':
  - type: text
    content: 'Schabbethaï et Jozabad, chargés des affaires extérieures de la maison de Dieu, et faisant partie des chefs des Lévites; '
  '17':
  - type: text
    content: 'Matthania, fils de Michée, fils de Zabdi, fils d’Asaph, le chef qui entonnait la louange à la prière, et Bakbukia, le second parmi ses frères, et Abda, fils de Schammua, fils de Galal, fils de Jeduthun. '
  '18':
  - type: text
    content: 'Total des Lévites dans la ville sainte: deux cent quatre-vingt-quatre. '
  '19':
  - type: text
    content: 'Et les portiers: Akkub, Thalmon, et leurs frères, gardiens des portes, cent soixante-douze. '
  '2':
  - type: text
    content: 'Le peuple bénit tous ceux qui consentirent volontairement à résider à Jérusalem. '
  '20':
  - type: text
    content: 'Le reste d’Israël, les sacrificateurs, les Lévites, s’établirent dans toutes les villes de Juda, chacun dans sa propriété. '
  '21':
  - type: text
    content: 'Les Néthiniens s’établirent sur la colline, et ils avaient pour chefs Tsicha et Guischpa. '
  '22':
  - type: text
    content: 'Le chef des Lévites à Jérusalem était Uzzi, fils de Bani, fils de Haschabia, fils de Matthania, fils de Michée, d’entre les fils d’Asaph, les chantres chargés des offices de la maison de Dieu; '
  '23':
  - type: text
    content: 'car il y avait un ordre du roi concernant les chantres, et un salaire fixe leur était accordé pour chaque jour. '
  '24':
  - type: text
    content: 'Pethachja, fils de Meschézabeel, des fils de Zérach, fils de Juda, était commissaire du roi pour toutes les affaires du peuple. '
  '25':
  - type: text
    content: 'Dans les villages et leurs territoires, des fils de Juda s’établirent à Kirjath-Arba et dans les lieux de son ressort, à Dibon et dans les lieux de son ressort, à Jekabtseel et dans les villages de son ressort, '
  '26':
  - type: text
    content: 'à Jéschua, à Molada, à Beth-Paleth, '
  '27':
  - type: text
    content: 'à Hatsar-Schual, à Beer-Schéba, et dans les lieux de son ressort, '
  '28':
  - type: text
    content: 'à Tsiklag, à Mecona et dans les lieux de son ressort, '
  '29':
  - type: text
    content: 'à En-Rimmon, à Tsorea, à Jarmuth, '
  '3':
  - type: text
    content: 'Voici les chefs de la province qui s’établirent à Jérusalem. Dans les villes de Juda, chacun s’établit dans sa propriété, dans sa ville, Israël, les sacrificateurs et les Lévites, les Néthiniens, et les fils des serviteurs de Salomon. '
  '30':
  - type: text
    content: 'à Zanoach, à Adullam, et dans les villages de leur ressort, à Lakis et dans son territoire, à Azéka et dans les lieux de son ressort. Ils s’établirent depuis Beer-Schéba jusqu’à la vallée de Hinnom. '
  '31':
  - type: text
    content: 'Les fils de Benjamin s’établirent, depuis Guéba, à Micmasch, à Ajja, à Béthel et dans les lieux de son ressort, '
  '32':
  - type: text
    content: 'à Anathoth, à Nob, à Hanania, '
  '33':
  - type: text
    content: 'à Hatsor, à Rama, à Guitthaïm, '
  '34':
  - type: text
    content: 'à Hadid, à Tseboïm, à Neballath, '
  '35':
  - type: text
    content: 'à Lod et à Ono, la vallée des ouvriers. '
  '36':
  - type: text
    content: Il y eut des Lévites qui se joignirent à Benjamin, quoique appartenant aux divisions de Juda.
  '4':
  - type: text
    content: 'A Jérusalem s’établirent des fils de Juda et des fils de Benjamin. Des fils de Juda: Athaja, fils d’Ozias, fils de Zacharie, fils d’Amaria, fils de Schephathia, fils de Mahalaleel, des fils de Pérets, '
  '5':
  - type: text
    content: 'et Maaséja, fils de Baruc, fils de Col-Hozé, fils de Hazaja, fils d’Adaja, fils de Jojarib, fils de Zacharie, fils de Schiloni. '
  '6':
  - type: text
    content: 'Total des fils de Pérets qui s’établirent à Jérusalem: quatre cent soixante-huit hommes vaillants. '
  '7':
  - type: text
    content: 'Voici les fils de Benjamin: Sallu, fils de Meschullam, fils de Joëd, fils de Pedaja, fils de Kolaja, fils de Maaséja, fils d’Ithiel, fils d’Ésaïe, '
  '8':
  - type: text
    content: 'et, après lui, Gabbaï et Sallaï, neuf cent vingt-huit. '
  '9':
  - type: text
    content: 'Joël, fils de Zicri, était leur chef; et Juda, fils de Senua, était le second chef de la ville. '
