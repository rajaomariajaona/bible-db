document_id: DAN.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Daniel à Babylone
  - type: heading
    content: 'V. 1-7: cf. 2 Ch 36:5-7. És 39:5-7.'
  - type: text
    content: 'La troisième année du règne de Jojakim, roi de Juda, Nebucadnetsar, roi de Babylone, '
  - type: note
    content: 2 R 24:2, 3. 2 Ch 36:6.
  - type: text
    content: 'marcha contre Jérusalem, et l’assiégea. '
  '10':
  - type: text
    content: 'Le chef des eunuques dit à Daniel: Je crains mon seigneur le roi, qui a fixé ce que vous devez manger et boire; car pourquoi verrait-il votre visage plus abattu que celui des jeunes gens de votre âge? Vous exposeriez ma tête auprès du roi. '
  '11':
  - type: text
    content: 'Alors Daniel dit à l’intendant à qui le chef des eunuques avait remis la surveillance de Daniel, de Hanania, de Mischaël et d’Azaria: '
  '12':
  - type: text
    content: 'Éprouve tes serviteurs pendant dix jours, et qu’on nous donne des légumes à manger et de l’eau à boire; '
  '13':
  - type: text
    content: 'tu regarderas ensuite notre visage et celui des jeunes gens qui mangent les mets du roi, et tu agiras avec tes serviteurs d’après ce que tu auras vu. '
  '14':
  - type: text
    content: 'Il leur accorda ce qu’ils demandaient, et les éprouva pendant dix jours. '
  '15':
  - type: text
    content: 'Au bout de dix jours, ils avaient meilleur visage et plus d’embonpoint que tous les jeunes gens qui mangeaient les mets du roi. '
  '16':
  - type: text
    content: 'L’intendant emportait les mets et le vin qui leur étaient destinés, et il leur donnait des légumes. '
  '17':
  - type: text
    content: 'Dieu accorda à ces quatre jeunes gens de la science, de l’intelligence dans toutes les lettres, et de la sagesse; et Daniel expliquait toutes les visions et tous les songes. '
  '18':
  - type: text
    content: 'Au terme fixé par le roi pour qu’on les lui amenât, le chef des eunuques les présenta à Nebucadnetsar. '
  '19':
  - type: text
    content: 'Le roi s’entretint avec eux; et, parmi tous ces jeunes gens, il ne s’en trouva aucun comme Daniel, Hanania, Mischaël et Azaria. Ils furent donc admis au service du roi. '
  '2':
  - type: text
    content: 'Le Seigneur livra entre ses mains Jojakim, roi de Juda, et une partie des ustensiles de la maison de Dieu. Nebucadnetsar emporta les ustensiles au pays de Schinear, dans la maison de son dieu, il les mit dans la maison du trésor de son dieu. '
  '20':
  - type: text
    content: 'Sur tous les objets qui réclamaient de la sagesse et de l’intelligence, et sur lesquels le roi les interrogeait, il les trouvait dix fois supérieurs à tous les magiciens et astrologues qui étaient dans tout son royaume. '
  '21':
  - type: text
    content: Ainsi fut Daniel jusqu’à la première année du roi Cyrus.
  '3':
  - type: text
    content: 'Le roi donna l’ordre à Aschpenaz, chef de ses eunuques, d’amener quelques-uns des enfants d’Israël de race royale ou de famille noble, '
  '4':
  - type: text
    content: 'de jeunes garçons sans défaut corporel, beaux de figure, doués de sagesse, d’intelligence et d’instruction, capables de servir dans le palais du roi, et à qui l’on enseignerait les lettres et la langue des Chaldéens. '
  '5':
  - type: text
    content: 'Le roi leur assigna pour chaque jour une portion des mets de sa table et du vin dont il buvait, voulant les élever pendant trois années, au bout desquelles ils seraient au service du roi. '
  '6':
  - type: text
    content: 'Il y avait parmi eux, d’entre les enfants de Juda, Daniel, Hanania, Mischaël et Azaria. '
  '7':
  - type: text
    content: Le chef des eunuques leur donna des noms, à Daniel celui de Beltschatsar, à Hanania celui de Schadrac, à Mischaël celui de Méschac, et à Azaria celui d’Abed-Nego.
  - type: heading
    content: 'V. 8-21: cf. 1 Co 10:18-31. (Ge 39:1-23.) Da 5:11, 12. Ps 125:1.'
  '8':
  - type: text
    content: 'Daniel résolut de ne pas se souiller par les mets du roi et par le vin dont le roi buvait, et il pria le chef des eunuques de ne pas l’obliger à se souiller. '
  '9':
  - type: text
    content: 'Dieu fit trouver à Daniel faveur et grâce devant le chef des eunuques. '
