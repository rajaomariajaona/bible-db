document_id: DAN.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Daniel à Babylone
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. 2 Ch 36:5-7. És 39:5-7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La troisième année du règne de Jojakim, roi de Juda, Nebucadnetsar, roi de Babylone, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 24:2
      metadata:
        usfm: 2KI.24.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: 2KI.24.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 36:6
      metadata:
        usfm: 2CH.36.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'marcha contre Jérusalem, et l’assiégea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le Seigneur livra entre ses mains Jojakim, roi de Juda, et une partie des ustensiles de la maison de Dieu. Nebucadnetsar emporta les ustensiles au pays de Schinear, dans la maison de son dieu, il les mit dans la maison du trésor de son dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le roi donna l’ordre à Aschpenaz, chef de ses eunuques, d’amener quelques-uns des enfants d’Israël de race royale ou de famille noble, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'de jeunes garçons sans défaut corporel, beaux de figure, doués de sagesse, d’intelligence et d’instruction, capables de servir dans le palais du roi, et à qui l’on enseignerait les lettres et la langue des Chaldéens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le roi leur assigna pour chaque jour une portion des mets de sa table et du vin dont il buvait, voulant les élever pendant trois années, au bout desquelles ils seraient au service du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il y avait parmi eux, d’entre les enfants de Juda, Daniel, Hanania, Mischaël et Azaria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le chef des eunuques leur donna des noms, à Daniel celui de Beltschatsar, à Hanania celui de Schadrac, à Mischaël celui de Méschac, et à Azaria celui d’Abed-Nego.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-21: cf. 1 Co 10:18-31. (Ge 39:1-23.) Da 5:11, 12. Ps 125:1.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Daniel résolut de ne pas se souiller par les mets du roi et par le vin dont le roi buvait, et il pria le chef des eunuques de ne pas l’obliger à se souiller. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dieu fit trouver à Daniel faveur et grâce devant le chef des eunuques. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le chef des eunuques dit à Daniel: Je crains mon seigneur le roi, qui a fixé ce que vous devez manger et boire; car pourquoi verrait-il votre visage plus abattu que celui des jeunes gens de votre âge? Vous exposeriez ma tête auprès du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors Daniel dit à l’intendant à qui le chef des eunuques avait remis la surveillance de Daniel, de Hanania, de Mischaël et d’Azaria: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Éprouve tes serviteurs pendant dix jours, et qu’on nous donne des légumes à manger et de l’eau à boire; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'tu regarderas ensuite notre visage et celui des jeunes gens qui mangent les mets du roi, et tu agiras avec tes serviteurs d’après ce que tu auras vu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il leur accorda ce qu’ils demandaient, et les éprouva pendant dix jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Au bout de dix jours, ils avaient meilleur visage et plus d’embonpoint que tous les jeunes gens qui mangeaient les mets du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L’intendant emportait les mets et le vin qui leur étaient destinés, et il leur donnait des légumes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dieu accorda à ces quatre jeunes gens de la science, de l’intelligence dans toutes les lettres, et de la sagesse; et Daniel expliquait toutes les visions et tous les songes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Au terme fixé par le roi pour qu’on les lui amenât, le chef des eunuques les présenta à Nebucadnetsar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le roi s’entretint avec eux; et, parmi tous ces jeunes gens, il ne s’en trouva aucun comme Daniel, Hanania, Mischaël et Azaria. Ils furent donc admis au service du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Sur tous les objets qui réclamaient de la sagesse et de l’intelligence, et sur lesquels le roi les interrogeait, il les trouvait dix fois supérieurs à tous les magiciens et astrologues qui étaient dans tout son royaume. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ainsi fut Daniel jusqu’à la première année du roi Cyrus.
