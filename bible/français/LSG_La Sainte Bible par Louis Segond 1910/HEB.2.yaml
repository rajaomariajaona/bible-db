document_id: HEB.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-4: cf. Hé 1:1-3; 4:1; 12:25.'
  - type: text
    content: 'C’est pourquoi nous devons d’autant plus nous attacher aux choses que nous avons entendues, de peur que nous ne soyons emportés loin d’elles. '
  '10':
  - type: text
    content: 'Il convenait, en effet, que celui pour qui et par qui sont toutes choses, et qui voulait conduire à la gloire beaucoup de fils, élevât à la perfection par les souffrances le Prince de leur salut. '
  '11':
  - type: text
    content: 'Car celui qui sanctifie et ceux qui sont sanctifiés '
  - type: note
    content: Ac 17:26.
  - type: text
    content: 'sont tous issus d’un seul. C’est pourquoi il n’a pas honte de les appeler frères, '
  '12':
  - type: text
    content: 'lorsqu’il dit:'
  - type: note
    content: Ps 22:23.
  - type: text
    content: J’annoncerai ton nom à mes frères,
  - type: text
    content: Je te célébrerai au milieu de l’assemblée.
  '13':
  - type: text
    content: 'Et encore:'
  - type: note
    content: Ps 8:13.
  - type: text
    content: Je me confierai en toi.
  - type: text
    content: 'Et encore:'
  - type: note
    content: És 8:18.
  - type: text
    content: 'Me voici, moi et les enfants que Dieu m’a donnés. '
  '14':
  - type: text
    content: 'Ainsi donc, puisque les enfants participent au sang et à la chair, '
  - type: note
    content: Jn 1:14. Ph 2:7.
  - type: text
    content: 'il y a également participé lui-même, '
  - type: note
    content: És 25:8. Os 13:14. 1 Co 15:54. 2 Ti 1:10.
  - type: text
    content: 'afin que, par la mort, il anéantît celui qui a la puissance de la mort, c’est-à-dire le diable, '
  '15':
  - type: text
    content: 'et qu’il délivrât tous ceux qui, par crainte de la mort, étaient toute leur vie '
  - type: note
    content: Ro 8:15.
  - type: text
    content: 'retenus dans la servitude. '
  '16':
  - type: text
    content: 'Car assurément ce n’est pas à des anges qu’il vient en aide, mais c’est à la postérité d’Abraham. '
  '17':
  - type: note
    content: Ph 2:7. Hé 4:15.
  - type: text
    content: 'En conséquence, il a dû être rendu semblable en toutes choses à ses frères, afin qu’il fût un souverain sacrificateur miséricordieux et fidèle dans le service de Dieu, pour faire l’expiation des péchés du peuple; '
  '18':
  - type: note
    content: Hé 4:15, 16.
  - type: text
    content: car, ayant été tenté lui-même dans ce qu’il a souffert, il peut secourir ceux qui sont tentés.
  '2':
  - type: text
    content: 'Car, si '
  - type: note
    content: Ac 7:53. Ga 3:19.
  - type: text
    content: 'la parole annoncée par des anges a eu son effet, et si '
  - type: note
    content: Ge 19:17, 26. De 27:26.
  - type: text
    content: 'toute transgression et toute désobéissance a reçu une juste rétribution, '
  '3':
  - type: note
    content: Hé 12:25.
  - type: text
    content: 'comment échapperons-nous en négligeant '
  - type: note
    content: Mt 4:17. Mc 1:14.
  - type: text
    content: 'un si grand salut, qui, annoncé d’abord par le Seigneur, nous a été confirmé par ceux qui l’ont entendu, '
  '4':
  - type: note
    content: Mc 16:20. Ac 14:3; 19:11.
  - type: text
    content: Dieu appuyant leur témoignage par des signes, des prodiges, et divers miracles, et par les dons du Saint-Esprit distribués selon sa volonté.
  - type: heading
    content: 'V. 5-18: cf. (Ps 8:5-7. Ph 2:6-11.) (Ga 4:4, 5. Jn 20:17.) Hé 5:7-10; 4:15, 16.'
  '5':
  - type: text
    content: 'En effet, ce n’est pas à des anges que Dieu a soumis le monde à venir dont nous parlons. '
  '6':
  - type: text
    content: 'Or quelqu’un a rendu quelque part ce témoignage:'
  - type: note
    content: Ps 8:5.
  - type: text
    content: Qu’est-ce que l’homme, pour que tu te souviennes de lui,
  - type: text
    content: ou le fils de l’homme, pour que tu prennes soin de lui?
  '7':
  - type: text
    content: Tu l’as abaissé pour un peu de temps au-dessous des anges,
  - type: text
    content: tu l’as couronné de gloire et d’honneur,
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ps 8:7. Mt 28:18. 1 Co 15:27. Ép 1:22.
  - type: text
    content: Tu as mis toutes choses sous ses pieds.
  - type: text
    content: 'En effet, en lui soumettant toutes choses, Dieu n’a rien laissé qui ne lui fût soumis. Cependant, nous ne voyons pas encore maintenant que toutes choses lui soient soumises. '
  '9':
  - type: text
    content: 'Mais celui '
  - type: note
    content: Ac 2:33.
  - type: text
    content: 'qui a été abaissé pour un peu de temps au-dessous des anges, Jésus, nous le voyons '
  - type: note
    content: Ph 2:7, 8.
  - type: text
    content: 'couronné de gloire et d’honneur à cause de la mort qu’il a soufferte, afin que, par la grâce de Dieu, il souffrît la mort pour tous. '
