document_id: HEB.2
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-4: cf. Hé 1:1-3; 4:1; 12:25.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'C’est pourquoi nous devons d’autant plus nous attacher aux choses que nous avons entendues, de peur que nous ne soyons emportés loin d’elles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Car, si '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:53
      metadata:
        usfm: ACT.7.53
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:19
      metadata:
        usfm: GAL.3.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la parole annoncée par des anges a eu son effet, et si '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 19:17
      metadata:
        usfm: GEN.19.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: GEN.19.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 27:26
      metadata:
        usfm: DEU.27.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'toute transgression et toute désobéissance a reçu une juste rétribution, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 12:25
      metadata:
        usfm: HEB.12.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comment échapperons-nous en négligeant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 4:17
      metadata:
        usfm: MAT.4.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:14
      metadata:
        usfm: MRK.1.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un si grand salut, qui, annoncé d’abord par le Seigneur, nous a été confirmé par ceux qui l’ont entendu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 16:20
      metadata:
        usfm: MRK.16.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 14:3
      metadata:
        usfm: ACT.14.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:11
      metadata:
        usfm: ACT.19.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Dieu appuyant leur témoignage par des signes, des prodiges, et divers miracles, et par les dons du Saint-Esprit distribués selon sa volonté.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 5-18: cf. (Ps 8:5-7. Ph 2:6-11.) (Ga 4:4, 5. Jn 20:17.) Hé 5:7-10; 4:15, 16.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En effet, ce n’est pas à des anges que Dieu a soumis le monde à venir dont nous parlons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Or quelqu’un a rendu quelque part ce témoignage:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 8:5
      metadata:
        usfm: PSA.8.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qu’est-ce que l’homme, pour que tu te souviennes de lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou le fils de l’homme, pour que tu prennes soin de lui?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu l’as abaissé pour un peu de temps au-dessous des anges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu l’as couronné de gloire et d’honneur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 8:7
      metadata:
        usfm: PSA.8.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 28:18
      metadata:
        usfm: MAT.28.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:27
      metadata:
        usfm: 1CO.15.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:22
      metadata:
        usfm: EPH.1.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tu as mis toutes choses sous ses pieds.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'En effet, en lui soumettant toutes choses, Dieu n’a rien laissé qui ne lui fût soumis. Cependant, nous ne voyons pas encore maintenant que toutes choses lui soient soumises. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais celui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 2:33
      metadata:
        usfm: ACT.2.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui a été abaissé pour un peu de temps au-dessous des anges, Jésus, nous le voyons '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:7
      metadata:
        usfm: PHP.2.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: PHP.2.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'couronné de gloire et d’honneur à cause de la mort qu’il a soufferte, afin que, par la grâce de Dieu, il souffrît la mort pour tous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il convenait, en effet, que celui pour qui et par qui sont toutes choses, et qui voulait conduire à la gloire beaucoup de fils, élevât à la perfection par les souffrances le Prince de leur salut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Car celui qui sanctifie et ceux qui sont sanctifiés '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 17:26
      metadata:
        usfm: ACT.17.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sont tous issus d’un seul. C’est pourquoi il n’a pas honte de les appeler frères, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'lorsqu’il dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 22:23
      metadata:
        usfm: PSA.22.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: J’annoncerai ton nom à mes frères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te célébrerai au milieu de l’assemblée.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et encore:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps 8:13.
    marker-yv: yv-n
  - type: text
    text: Je me confierai en toi.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Et encore:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 8:18
      metadata:
        usfm: ISA.8.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Me voici, moi et les enfants que Dieu m’a donnés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ainsi donc, puisque les enfants participent au sang et à la chair, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:14
      metadata:
        usfm: JHN.1.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:7
      metadata:
        usfm: PHP.2.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il y a également participé lui-même, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 25:8
      metadata:
        usfm: ISA.25.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 13:14
      metadata:
        usfm: HOS.13.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:54
      metadata:
        usfm: 1CO.15.54
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 1:10
      metadata:
        usfm: 2TI.1.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'afin que, par la mort, il anéantît celui qui a la puissance de la mort, c’est-à-dire le diable, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et qu’il délivrât tous ceux qui, par crainte de la mort, étaient toute leur vie '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:15
      metadata:
        usfm: ROM.8.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'retenus dans la servitude. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Car assurément ce n’est pas à des anges qu’il vient en aide, mais c’est à la postérité d’Abraham. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:7
      metadata:
        usfm: PHP.2.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 4:15
      metadata:
        usfm: HEB.4.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'En conséquence, il a dû être rendu semblable en toutes choses à ses frères, afin qu’il fût un souverain sacrificateur miséricordieux et fidèle dans le service de Dieu, pour faire l’expiation des péchés du peuple; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 4:15
      metadata:
        usfm: HEB.4.15
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: HEB.4.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: car, ayant été tenté lui-même dans ce qu’il a souffert, il peut secourir ceux qui sont tentés.
