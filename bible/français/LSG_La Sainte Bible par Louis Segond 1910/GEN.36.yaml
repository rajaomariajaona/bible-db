document_id: GEN.36,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Postérité d’Ésaü
  - type: heading
    content: 'V. 1-8: cf. (Ge 26:34, 35; 28:8, 9.) De 2:4, 5.'
  - type: text
    content: 'Voici '
  - type: note
    content: 1 Ch 1:35.
  - type: text
    content: 'la postérité d’Ésaü, qui est Édom. '
  '10':
  - type: text
    content: 'Voici les noms des fils d’Ésaü: Éliphaz, fils d’Ada, femme d’Ésaü; Réuel, fils de Basmath, femme d’Ésaü. '
  '11':
  - type: text
    content: 'Les fils d’Éliphaz furent: Théman, Omar, Tsepho, Gaetham et Kenaz. '
  '12':
  - type: text
    content: 'Et Thimna était la concubine d’Éliphaz, fils d’Ésaü: elle enfanta à Éliphaz Amalek. Ce sont là les fils d’Ada, femme d’Ésaü. '
  '13':
  - type: text
    content: 'Voici les fils de Réuel: Nahath, Zérach, Schamma et Mizza. Ce sont là les fils de Basmath, femme d’Ésaü. '
  '14':
  - type: text
    content: 'Voici les fils d’Oholibama, fille d’Ana, fille de Tsibeon, femme d’Ésaü: elle enfanta à Ésaü Jéusch, Jaelam et Koré. '
  '15':
  - type: text
    content: 'Voici les chefs de tribus issues des fils d’Ésaü. Voici les fils d’Éliphaz, premier-né d’Ésaü: le chef Théman, le chef Omar, le chef Tsepho, le chef Kenaz, '
  '16':
  - type: text
    content: 'le chef Koré, le chef Gaetham, le chef Amalek. Ce sont là les chefs issus d’Éliphaz, dans le pays d’Édom. Ce sont les fils d’Ada. '
  '17':
  - type: text
    content: 'Voici les fils de Réuel, fils d’Ésaü: le chef Nahath, le chef Zérach, le chef Schamma, le chef Mizza. Ce sont là les chefs issus de Réuel, dans le pays d’Édom. Ce sont là les fils de Basmath, femme d’Ésaü. '
  '18':
  - type: text
    content: 'Voici les fils d’Oholibama, femme d’Ésaü: le chef Jéusch, le chef Jaelam, le chef Koré. Ce sont là les chefs issus d’Oholibama, fille d’Ana, femme d’Ésaü. '
  '19':
  - type: text
    content: Ce sont là les fils d’Ésaü, et ce sont là leurs chefs de tribus. Ésaü, c’est Édom.
  - type: heading
    content: 'V. 20-30: cf. 1 Ch 1:38-42. De 2:12, 22.'
  '2':
  - type: text
    content: 'Ésaü prit ses femmes parmi les filles de Canaan: Ada, fille d’Élon, le Héthien; Oholibama, fille d’Ana, fille de Tsibeon, le Hévien; '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 1 Ch 1:38.
  - type: text
    content: 'Voici les fils de Séir, le Horien, anciens habitants du pays: Lothan, Schobal, Tsibeon, Ana, '
  '21':
  - type: text
    content: 'Dischon, Étser, et Dischan. Ce sont là les chefs des Horiens, fils de Séir, dans le pays d’Édom. '
  '22':
  - type: text
    content: 'Les fils de Lothan furent: Hori et Hémam. La sœur de Lothan fut Thimna. '
  '23':
  - type: text
    content: 'Voici les fils de Schobal: Alvan, Manahath, Ébal, Schepho et Onam. '
  '24':
  - type: text
    content: 'Voici les fils de Tsibeon: Ajja et Ana. C’est cet Ana qui trouva les sources chaudes dans le désert, quand il faisait paître les ânes de Tsibeon, son père. '
  '25':
  - type: text
    content: 'Voici les enfants d’Ana: Dischon, et Oholibama, fille d’Ana. '
  '26':
  - type: text
    content: 'Voici les fils de Dischon: Hemdan, Eschban, Jithran et Karen. '
  '27':
  - type: text
    content: 'Voici les fils d’Étser: Bilhan, Zaavan et Akan. '
  '28':
  - type: text
    content: 'Voici les fils de Dischan: Uts et Aran. '
  '29':
  - type: text
    content: 'Voici les chefs des Horiens: le chef Lothan, le chef Schobal, le chef Tsibeon, le chef Ana, '
  '3':
  - type: text
    content: 'et Basmath, fille d’Ismaël, sœur de Nebajoth. '
  '30':
  - type: text
    content: le chef Dischon, le chef Étser, le chef Dischan. Ce sont là les chefs des Horiens, les chefs qu’ils eurent dans le pays de Séir.
  - type: heading
    content: 'V. 31-43: cf. 1 Ch 1:43-54.'
  '31':
  - type: text
    content: ' '
  - type: note
    content: 1 Ch 1:43.
  - type: text
    content: 'Voici les rois qui ont régné dans le pays d’Édom, avant qu’un roi régnât sur les enfants d’Israël. '
  '32':
  - type: text
    content: 'Béla, fils de Béor, régna sur Édom; et le nom de sa ville était Dinhaba. '
  '33':
  - type: text
    content: 'Béla mourut; et Jobab, fils de Zérach, de Botsra, régna à sa place. '
  '34':
  - type: text
    content: 'Jobab mourut; et Huscham, du pays des Thémanites, régna à sa place. '
  '35':
  - type: text
    content: 'Huscham mourut; et Hadad, fils de Bedad, régna à sa place. C’est lui qui frappa Madian dans les champs de Moab. Le nom de sa ville était Avith. '
  '36':
  - type: text
    content: 'Hadad mourut; et Samla, de Masréka, régna à sa place. '
  '37':
  - type: text
    content: 'Samla mourut; et Saül, de Rehoboth sur le fleuve, régna à sa place. '
  '38':
  - type: text
    content: 'Saül mourut; et Baal-Hanan, fils d’Acbor, régna à sa place. '
  '39':
  - type: text
    content: 'Baal-Hanan, fils d’Acbor, mourut; et Hadar régna à sa place. Le nom de sa ville était Pau; et le nom de sa femme Mehéthabeel, fille de Mathred, fille de Mézahab. '
  '4':
  - type: text
    content: 'Ada enfanta à Ésaü Éliphaz; Basmath enfanta Réuel; '
  '40':
  - type: note
    content: 1 Ch 1:51.
  - type: text
    content: 'Voici les noms des chefs issus d’Ésaü, selon leurs tribus, selon leurs territoires, et d’après leurs noms: le chef Thimna, le chef Alva, le chef Jetheth, '
  '41':
  - type: text
    content: 'le chef Oholibama, le chef Éla, le chef Pinon, '
  '42':
  - type: text
    content: 'le chef Kenaz, le chef Théman, le chef Mibtsar, '
  '43':
  - type: text
    content: le chef Magdiel, le chef Iram. Ce sont là les chefs d’Édom, selon leurs habitations dans le pays qu’ils possédaient. C’est là Ésaü, père d’Édom.
  '5':
  - type: text
    content: 'et Oholibama enfanta Jéusch, Jaelam et Koré. Ce sont là les fils d’Ésaü, qui lui naquirent dans le pays de Canaan. '
  '6':
  - type: text
    content: 'Ésaü prit ses femmes, ses fils et ses filles, toutes les personnes de sa maison, ses troupeaux, tout son bétail, et tout le bien qu’il avait acquis au pays de Canaan, et il s’en alla dans un autre pays, loin de Jacob, son frère. '
  '7':
  - type: text
    content: 'Car leurs richesses étaient trop considérables pour qu’ils demeurassent ensemble, et '
  - type: note
    content: Ge 13:6.
  - type: text
    content: 'la contrée où ils séjournaient ne pouvait plus leur suffire à cause de leurs troupeaux. '
  '8':
  - type: note
    content: Jos 24:4.
  - type: text
    content: Ésaü s’établit dans la montagne de Séir. Ésaü, c’est Édom.
  - type: heading
    content: 'V. 9-19: cf. 1 Ch 1:35-37.'
  '9':
  - type: text
    content: 'Voici la postérité d’Ésaü, père d’Édom, dans la montagne de Séir. '
