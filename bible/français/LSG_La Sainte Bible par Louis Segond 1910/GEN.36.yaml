document_id: GEN.36,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Postérité d’Ésaü
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. (Ge 26:34, 35; 28:8, 9.) De 2:4, 5.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 1:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'la postérité d’Ésaü, qui est Édom. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Voici les noms des fils d’Ésaü: Éliphaz, fils d’Ada, femme d’Ésaü; Réuel, fils de Basmath, femme d’Ésaü. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Les fils d’Éliphaz furent: Théman, Omar, Tsepho, Gaetham et Kenaz. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Et Thimna était la concubine d’Éliphaz, fils d’Ésaü: elle enfanta à Éliphaz Amalek. Ce sont là les fils d’Ada, femme d’Ésaü. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Voici les fils de Réuel: Nahath, Zérach, Schamma et Mizza. Ce sont là les fils de Basmath, femme d’Ésaü. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Voici les fils d’Oholibama, fille d’Ana, fille de Tsibeon, femme d’Ésaü: elle enfanta à Ésaü Jéusch, Jaelam et Koré. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Voici les chefs de tribus issues des fils d’Ésaü. Voici les fils d’Éliphaz, premier-né d’Ésaü: le chef Théman, le chef Omar, le chef Tsepho, le chef Kenaz, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'le chef Koré, le chef Gaetham, le chef Amalek. Ce sont là les chefs issus d’Éliphaz, dans le pays d’Édom. Ce sont les fils d’Ada. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Voici les fils de Réuel, fils d’Ésaü: le chef Nahath, le chef Zérach, le chef Schamma, le chef Mizza. Ce sont là les chefs issus de Réuel, dans le pays d’Édom. Ce sont là les fils de Basmath, femme d’Ésaü. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Voici les fils d’Oholibama, femme d’Ésaü: le chef Jéusch, le chef Jaelam, le chef Koré. Ce sont là les chefs issus d’Oholibama, fille d’Ana, femme d’Ésaü. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ce sont là les fils d’Ésaü, et ce sont là leurs chefs de tribus. Ésaü, c’est Édom.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 20-30: cf. 1 Ch 1:38-42. De 2:12, 22.'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ésaü prit ses femmes parmi les filles de Canaan: Ada, fille d’Élon, le Héthien; Oholibama, fille d’Ana, fille de Tsibeon, le Hévien; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 1:38
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Voici les fils de Séir, le Horien, anciens habitants du pays: Lothan, Schobal, Tsibeon, Ana, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dischon, Étser, et Dischan. Ce sont là les chefs des Horiens, fils de Séir, dans le pays d’Édom. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Les fils de Lothan furent: Hori et Hémam. La sœur de Lothan fut Thimna. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Voici les fils de Schobal: Alvan, Manahath, Ébal, Schepho et Onam. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Voici les fils de Tsibeon: Ajja et Ana. C’est cet Ana qui trouva les sources chaudes dans le désert, quand il faisait paître les ânes de Tsibeon, son père. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Voici les enfants d’Ana: Dischon, et Oholibama, fille d’Ana. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Voici les fils de Dischon: Hemdan, Eschban, Jithran et Karen. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Voici les fils d’Étser: Bilhan, Zaavan et Akan. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Voici les fils de Dischan: Uts et Aran. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Voici les chefs des Horiens: le chef Lothan, le chef Schobal, le chef Tsibeon, le chef Ana, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'et Basmath, fille d’Ismaël, sœur de Nebajoth. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: le chef Dischon, le chef Étser, le chef Dischan. Ce sont là les chefs des Horiens, les chefs qu’ils eurent dans le pays de Séir.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 31-43: cf. 1 Ch 1:43-54.'
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 1:43
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Voici les rois qui ont régné dans le pays d’Édom, avant qu’un roi régnât sur les enfants d’Israël. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Béla, fils de Béor, régna sur Édom; et le nom de sa ville était Dinhaba. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Béla mourut; et Jobab, fils de Zérach, de Botsra, régna à sa place. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Jobab mourut; et Huscham, du pays des Thémanites, régna à sa place. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Huscham mourut; et Hadad, fils de Bedad, régna à sa place. C’est lui qui frappa Madian dans les champs de Moab. Le nom de sa ville était Avith. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Hadad mourut; et Samla, de Masréka, régna à sa place. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Samla mourut; et Saül, de Rehoboth sur le fleuve, régna à sa place. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Saül mourut; et Baal-Hanan, fils d’Acbor, régna à sa place. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Baal-Hanan, fils d’Acbor, mourut; et Hadar régna à sa place. Le nom de sa ville était Pau; et le nom de sa femme Mehéthabeel, fille de Mathred, fille de Mézahab. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ada enfanta à Ésaü Éliphaz; Basmath enfanta Réuel; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 1:51
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Voici les noms des chefs issus d’Ésaü, selon leurs tribus, selon leurs territoires, et d’après leurs noms: le chef Thimna, le chef Alva, le chef Jetheth, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'le chef Oholibama, le chef Éla, le chef Pinon, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'le chef Kenaz, le chef Théman, le chef Mibtsar, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: le chef Magdiel, le chef Iram. Ce sont là les chefs d’Édom, selon leurs habitations dans le pays qu’ils possédaient. C’est là Ésaü, père d’Édom.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'et Oholibama enfanta Jéusch, Jaelam et Koré. Ce sont là les fils d’Ésaü, qui lui naquirent dans le pays de Canaan. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ésaü prit ses femmes, ses fils et ses filles, toutes les personnes de sa maison, ses troupeaux, tout son bétail, et tout le bien qu’il avait acquis au pays de Canaan, et il s’en alla dans un autre pays, loin de Jacob, son frère. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Car leurs richesses étaient trop considérables pour qu’ils demeurassent ensemble, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 13:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'la contrée où ils séjournaient ne pouvait plus leur suffire à cause de leurs troupeaux. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 24:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ésaü s’établit dans la montagne de Séir. Ésaü, c’est Édom.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-19: cf. 1 Ch 1:35-37.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Voici la postérité d’Ésaü, père d’Édom, dans la montagne de Séir. '
