document_id: GEN.41,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-36: cf. Ge 40. Da 2 et 4. La 3:26.'
  - type: text
    content: 'Au bout de deux ans, Pharaon eut un songe. Voici, il se tenait près du fleuve. '
  '10':
  - type: text
    content: 'Pharaon s’était irrité contre ses serviteurs; et il m’avait fait mettre en prison dans la maison du chef des gardes, moi et le chef des panetiers. '
  '11':
  - type: text
    content: 'Nous eûmes l’un et l’autre un '
  - type: note
    content: Ge 40:5.
  - type: text
    content: 'songe dans une même nuit; et chacun de nous reçut une explication en rapport avec le songe qu’il avait eu. '
  '12':
  - type: text
    content: 'Il y avait là avec nous un jeune Hébreu, esclave du chef des gardes. Nous lui racontâmes nos songes, et il nous les expliqua. '
  '13':
  - type: text
    content: 'Les choses sont arrivées selon l’explication qu’il nous avait donnée. Pharaon me rétablit dans ma charge, et il fit pendre le chef des panetiers. '
  '14':
  - type: text
    content: 'Pharaon '
  - type: note
    content: Ps 105:20. Da 2:25.
  - type: text
    content: 'fit appeler Joseph. On le fit sortir en hâte de prison. Il se rasa, changea de vêtements, et se rendit vers Pharaon. '
  '15':
  - type: text
    content: 'Pharaon dit à Joseph: J’ai eu un songe. Personne ne peut l’expliquer; et j’ai appris que tu expliques un songe, après l’avoir entendu. '
  '16':
  - type: text
    content: 'Joseph répondit à Pharaon, en disant: Ce n’est pas moi! C’est Dieu qui donnera une réponse favorable à Pharaon. '
  '17':
  - type: text
    content: 'Pharaon dit alors à Joseph: Dans mon songe, voici, je me tenais sur le bord du fleuve. '
  '18':
  - type: text
    content: 'Et voici, sept vaches grasses de chair et belles d’apparence montèrent hors du fleuve, et se mirent à paître dans la prairie. '
  '19':
  - type: text
    content: 'Sept autres vaches montèrent derrière elles, maigres, fort laides d’apparence, et décharnées: je n’en ai point vu d’aussi laides dans tout le pays d’Égypte. '
  '2':
  - type: text
    content: 'Et voici, sept vaches belles à voir et grasses de chair montèrent hors du fleuve, et se mirent à paître dans la prairie. '
  '20':
  - type: text
    content: 'Les vaches décharnées et laides mangèrent les sept premières vaches qui étaient grasses. '
  '21':
  - type: text
    content: 'Elles les engloutirent dans leur ventre, sans qu’on s’aperçût qu’elles y fussent entrées; et leur apparence était laide comme auparavant. Et je m’éveillai. '
  '22':
  - type: text
    content: 'Je vis encore en songe sept épis pleins et beaux, qui montèrent sur une même tige. '
  '23':
  - type: text
    content: 'Et sept épis vides, maigres, brûlés par le vent d’orient, poussèrent après eux. '
  '24':
  - type: text
    content: 'Les épis maigres engloutirent les sept beaux épis. Je l’ai dit aux magiciens, mais personne ne m’a donné l’explication. '
  '25':
  - type: text
    content: 'Joseph dit à Pharaon: Ce qu’a songé Pharaon est une seule chose; Dieu a fait connaître à Pharaon ce qu’il va faire. '
  '26':
  - type: text
    content: 'Les sept vaches belles sont sept années: et les sept épis beaux sont sept années: c’est un seul songe. '
  '27':
  - type: text
    content: 'Les sept vaches décharnées et laides, qui montaient derrière les premières, sont sept années; et les sept épis vides, brûlés par le vent d’orient, seront sept années de famine. '
  '28':
  - type: text
    content: 'Ainsi, comme je viens de le dire à Pharaon, Dieu a fait connaître à Pharaon ce qu’il va faire. '
  '29':
  - type: text
    content: 'Voici, il y aura sept années de grande abondance dans tout le pays d’Égypte. '
  '3':
  - type: text
    content: 'Sept autres vaches laides à voir et maigres de chair montèrent derrière elles hors du fleuve, et se tinrent à leurs côtés sur le bord du fleuve. '
  '30':
  - type: text
    content: 'Sept années de famine viendront après elles; et l’on oubliera toute cette abondance au pays d’Égypte, et la famine consumera le pays. '
  '31':
  - type: text
    content: 'Cette famine qui suivra sera si forte qu’on ne s’apercevra plus de l’abondance dans le pays. '
  '32':
  - type: text
    content: 'Si Pharaon a vu le songe se répéter une seconde fois, c’est que la chose est arrêtée de la part de Dieu, et que Dieu se hâtera de l’exécuter. '
  '33':
  - type: text
    content: 'Maintenant, que Pharaon choisisse un homme intelligent et sage, et qu’il le mette à la tête du pays d’Égypte. '
  '34':
  - type: text
    content: 'Que Pharaon établisse des commissaires sur le pays, pour lever un cinquième des récoltes de l’Égypte pendant les sept années d’abondance. '
  '35':
  - type: text
    content: 'Qu’ils rassemblent tous les produits de ces bonnes années qui vont venir; qu’ils fassent, sous l’autorité de Pharaon, des amas de blé, des approvisionnements dans les villes, et qu’ils en aient la garde. '
  '36':
  - type: text
    content: Ces provisions seront en réserve pour le pays, pour les sept années de famine qui arriveront dans le pays d’Égypte, afin que le pays ne soit pas consumé par la famine.
  - type: heading
    content: 'V. 37-49: cf. (Ps 105:17-22; 113:7, 8. Ac 7:9, 10. Ge 45:4-8.) Ph 2:9-11.'
  '37':
  - type: text
    content: ' '
  - type: note
    content: Ac 7:10.
  - type: text
    content: 'Ces paroles plurent à Pharaon et à tous ses serviteurs. '
  '38':
  - type: note
    content: Ps 105:22.
  - type: text
    content: 'Et Pharaon dit à ses serviteurs: Trouverions-nous un homme comme celui-ci, ayant en lui l’esprit de Dieu? '
  '39':
  - type: text
    content: 'Et Pharaon dit à Joseph: Puisque Dieu t’a fait connaître toutes ces choses, il n’y a personne qui soit aussi intelligent et aussi sage que toi. '
  '4':
  - type: text
    content: 'Les vaches laides à voir et maigres de chair mangèrent les sept vaches belles à voir et grasses de chair. Et Pharaon s’éveilla. '
  '40':
  - type: text
    content: 'Je t’établis '
  - type: note
    content: Ps 105:22.
  - type: text
    content: 'sur ma maison, et tout mon peuple obéira à tes ordres. Le trône seul m’élèvera au-dessus de toi. '
  '41':
  - type: text
    content: 'Pharaon dit à Joseph: Vois, je te donne le commandement de tout le pays d’Égypte. '
  '42':
  - type: text
    content: 'Pharaon ôta son anneau de la main, et le mit à la main de Joseph; il le revêtit d’habits de fin lin, et lui mit un collier d’or au cou. '
  '43':
  - type: text
    content: 'Il le fit monter sur le char qui suivait le sien; et l’on criait devant lui: A genoux! C’est ainsi que Pharaon lui donna le commandement de tout le pays d’Égypte. '
  '44':
  - type: text
    content: 'Il dit encore à Joseph: Je suis Pharaon! Et sans toi personne ne lèvera la main ni le pied dans tout le pays d’Égypte. '
  '45':
  - type: text
    content: 'Pharaon appela Joseph du nom de Tsaphnath-Paenéach; et il lui donna pour femme Asnath, fille de Poti-Phéra, prêtre d’On. Et Joseph partit pour visiter le pays d’Égypte. '
  '46':
  - type: text
    content: 'Joseph était âgé de trente ans lorsqu’il se présenta devant Pharaon, roi d’Égypte; et il quitta Pharaon, et parcourut tout le pays d’Égypte. '
  '47':
  - type: text
    content: 'Pendant les sept années de fertilité, la terre rapporta abondamment. '
  '48':
  - type: text
    content: 'Joseph rassembla tous les produits de ces sept années dans le pays d’Égypte; il fit des approvisionnements dans les villes, mettant dans l’intérieur de chaque ville les productions des champs d’alentour. '
  '49':
  - type: text
    content: Joseph amassa du blé, comme le sable de la mer, en quantité si considérable que l’on cessa de compter, parce qu’il n’y avait plus de nombre.
  - type: heading
    content: 'V. 50-57: cf. Ge 48; 47:13-26.'
  '5':
  - type: text
    content: 'Il se rendormit, et il eut un second songe. Voici, sept épis gras et beaux montèrent sur une même tige. '
  '50':
  - type: text
    content: 'Avant les années de famine, '
  - type: note
    content: Ge 46:20; 48:5.
  - type: text
    content: 'il naquit à Joseph deux fils, que lui enfanta Asnath, fille de Poti-Phéra, prêtre d’On. '
  '51':
  - type: text
    content: 'Joseph donna au premier-né le nom de Manassé, car, dit-il, Dieu m’a fait oublier toutes mes peines et toute la maison de mon père. '
  '52':
  - type: text
    content: 'Et il donna au second le nom d’Éphraïm, car, dit-il, Dieu m’a rendu fécond dans le pays de mon affliction. '
  '53':
  - type: text
    content: 'Les sept années d’abondance qu’il y eut au pays d’Égypte s’écoulèrent. '
  '54':
  - type: note
    content: Ge 45:6. Ps 105:16.
  - type: text
    content: 'Et les sept années de famine commencèrent à venir, ainsi que Joseph l’avait annoncé. Il y eut famine dans tous les pays; mais dans tout le pays d’Égypte il y avait du pain. '
  '55':
  - type: text
    content: 'Quand tout le pays d’Égypte fut aussi affamé, le peuple cria à Pharaon pour avoir du pain. Pharaon dit à tous les Égyptiens: Allez vers Joseph, et faites ce qu’il vous dira. '
  '56':
  - type: text
    content: 'La famine régnait dans tout le pays. Joseph ouvrit tous les lieux d’approvisionnements, et vendit du blé aux Égyptiens. La famine augmentait dans le pays d’Égypte. '
  '57':
  - type: text
    content: Et de tous les pays on arrivait en Égypte, pour acheter du blé auprès de Joseph; car la famine était forte dans tous les pays.
  '6':
  - type: text
    content: 'Et sept épis maigres et brûlés par le vent d’orient poussèrent après eux. '
  '7':
  - type: text
    content: 'Les épis maigres engloutirent les sept épis gras et pleins. Et Pharaon s’éveilla. Voilà le songe. '
  '8':
  - type: text
    content: 'Le matin, Pharaon eut l’esprit agité, et il '
  - type: note
    content: Da 2:2.
  - type: text
    content: 'fit appeler tous les magiciens et tous les sages de l’Égypte. Il leur raconta ses songes. Mais personne ne put les expliquer à Pharaon. '
  '9':
  - type: text
    content: 'Alors le chef des échansons prit la parole, et dit à Pharaon: Je vais rappeler aujourd’hui le souvenir de ma faute. '
