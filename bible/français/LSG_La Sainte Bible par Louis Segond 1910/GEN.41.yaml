document_id: GEN.41
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-36: cf. Ge 40. Da 2 et 4. La 3:26.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au bout de deux ans, Pharaon eut un songe. Voici, il se tenait près du fleuve. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et voici, sept vaches belles à voir et grasses de chair montèrent hors du fleuve, et se mirent à paître dans la prairie. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Sept autres vaches laides à voir et maigres de chair montèrent derrière elles hors du fleuve, et se tinrent à leurs côtés sur le bord du fleuve. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les vaches laides à voir et maigres de chair mangèrent les sept vaches belles à voir et grasses de chair. Et Pharaon s’éveilla. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il se rendormit, et il eut un second songe. Voici, sept épis gras et beaux montèrent sur une même tige. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et sept épis maigres et brûlés par le vent d’orient poussèrent après eux. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les épis maigres engloutirent les sept épis gras et pleins. Et Pharaon s’éveilla. Voilà le songe. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le matin, Pharaon eut l’esprit agité, et il '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 2:2
      metadata:
        usfm: DAN.2.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'fit appeler tous les magiciens et tous les sages de l’Égypte. Il leur raconta ses songes. Mais personne ne put les expliquer à Pharaon. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors le chef des échansons prit la parole, et dit à Pharaon: Je vais rappeler aujourd’hui le souvenir de ma faute. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Pharaon s’était irrité contre ses serviteurs; et il m’avait fait mettre en prison dans la maison du chef des gardes, moi et le chef des panetiers. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nous eûmes l’un et l’autre un '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 40:5
      metadata:
        usfm: GEN.40.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'songe dans une même nuit; et chacun de nous reçut une explication en rapport avec le songe qu’il avait eu. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il y avait là avec nous un jeune Hébreu, esclave du chef des gardes. Nous lui racontâmes nos songes, et il nous les expliqua. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les choses sont arrivées selon l’explication qu’il nous avait donnée. Pharaon me rétablit dans ma charge, et il fit pendre le chef des panetiers. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Pharaon '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:20
      metadata:
        usfm: PSA.105.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 2:25
      metadata:
        usfm: DAN.2.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'fit appeler Joseph. On le fit sortir en hâte de prison. Il se rasa, changea de vêtements, et se rendit vers Pharaon. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Pharaon dit à Joseph: J’ai eu un songe. Personne ne peut l’expliquer; et j’ai appris que tu expliques un songe, après l’avoir entendu. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Joseph répondit à Pharaon, en disant: Ce n’est pas moi! C’est Dieu qui donnera une réponse favorable à Pharaon. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Pharaon dit alors à Joseph: Dans mon songe, voici, je me tenais sur le bord du fleuve. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et voici, sept vaches grasses de chair et belles d’apparence montèrent hors du fleuve, et se mirent à paître dans la prairie. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Sept autres vaches montèrent derrière elles, maigres, fort laides d’apparence, et décharnées: je n’en ai point vu d’aussi laides dans tout le pays d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les vaches décharnées et laides mangèrent les sept premières vaches qui étaient grasses. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Elles les engloutirent dans leur ventre, sans qu’on s’aperçût qu’elles y fussent entrées; et leur apparence était laide comme auparavant. Et je m’éveillai. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Je vis encore en songe sept épis pleins et beaux, qui montèrent sur une même tige. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et sept épis vides, maigres, brûlés par le vent d’orient, poussèrent après eux. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les épis maigres engloutirent les sept beaux épis. Je l’ai dit aux magiciens, mais personne ne m’a donné l’explication. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Joseph dit à Pharaon: Ce qu’a songé Pharaon est une seule chose; Dieu a fait connaître à Pharaon ce qu’il va faire. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Les sept vaches belles sont sept années: et les sept épis beaux sont sept années: c’est un seul songe. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les sept vaches décharnées et laides, qui montaient derrière les premières, sont sept années; et les sept épis vides, brûlés par le vent d’orient, seront sept années de famine. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ainsi, comme je viens de le dire à Pharaon, Dieu a fait connaître à Pharaon ce qu’il va faire. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Voici, il y aura sept années de grande abondance dans tout le pays d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Sept années de famine viendront après elles; et l’on oubliera toute cette abondance au pays d’Égypte, et la famine consumera le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Cette famine qui suivra sera si forte qu’on ne s’apercevra plus de l’abondance dans le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Si Pharaon a vu le songe se répéter une seconde fois, c’est que la chose est arrêtée de la part de Dieu, et que Dieu se hâtera de l’exécuter. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Maintenant, que Pharaon choisisse un homme intelligent et sage, et qu’il le mette à la tête du pays d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Que Pharaon établisse des commissaires sur le pays, pour lever un cinquième des récoltes de l’Égypte pendant les sept années d’abondance. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Qu’ils rassemblent tous les produits de ces bonnes années qui vont venir; qu’ils fassent, sous l’autorité de Pharaon, des amas de blé, des approvisionnements dans les villes, et qu’ils en aient la garde. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ces provisions seront en réserve pour le pays, pour les sept années de famine qui arriveront dans le pays d’Égypte, afin que le pays ne soit pas consumé par la famine.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 37-49: cf. (Ps 105:17-22; 113:7, 8. Ac 7:9, 10. Ge 45:4-8.) Ph 2:9-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:10
      metadata:
        usfm: ACT.7.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ces paroles plurent à Pharaon et à tous ses serviteurs. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:22
      metadata:
        usfm: PSA.105.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et Pharaon dit à ses serviteurs: Trouverions-nous un homme comme celui-ci, ayant en lui l’esprit de Dieu? '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Et Pharaon dit à Joseph: Puisque Dieu t’a fait connaître toutes ces choses, il n’y a personne qui soit aussi intelligent et aussi sage que toi. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Je t’établis '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:22
      metadata:
        usfm: PSA.105.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sur ma maison, et tout mon peuple obéira à tes ordres. Le trône seul m’élèvera au-dessus de toi. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Pharaon dit à Joseph: Vois, je te donne le commandement de tout le pays d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Pharaon ôta son anneau de la main, et le mit à la main de Joseph; il le revêtit d’habits de fin lin, et lui mit un collier d’or au cou. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Il le fit monter sur le char qui suivait le sien; et l’on criait devant lui: A genoux! C’est ainsi que Pharaon lui donna le commandement de tout le pays d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Il dit encore à Joseph: Je suis Pharaon! Et sans toi personne ne lèvera la main ni le pied dans tout le pays d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Pharaon appela Joseph du nom de Tsaphnath-Paenéach; et il lui donna pour femme Asnath, fille de Poti-Phéra, prêtre d’On. Et Joseph partit pour visiter le pays d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Joseph était âgé de trente ans lorsqu’il se présenta devant Pharaon, roi d’Égypte; et il quitta Pharaon, et parcourut tout le pays d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Pendant les sept années de fertilité, la terre rapporta abondamment. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Joseph rassembla tous les produits de ces sept années dans le pays d’Égypte; il fit des approvisionnements dans les villes, mettant dans l’intérieur de chaque ville les productions des champs d’alentour. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Joseph amassa du blé, comme le sable de la mer, en quantité si considérable que l’on cessa de compter, parce qu’il n’y avait plus de nombre.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 50-57: cf. Ge 48; 47:13-26.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Avant les années de famine, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 46:20
      metadata:
        usfm: GEN.46.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 48:5
      metadata:
        usfm: GEN.48.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il naquit à Joseph deux fils, que lui enfanta Asnath, fille de Poti-Phéra, prêtre d’On. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Joseph donna au premier-né le nom de Manassé, car, dit-il, Dieu m’a fait oublier toutes mes peines et toute la maison de mon père. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Et il donna au second le nom d’Éphraïm, car, dit-il, Dieu m’a rendu fécond dans le pays de mon affliction. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Les sept années d’abondance qu’il y eut au pays d’Égypte s’écoulèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 45:6
      metadata:
        usfm: GEN.45.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:16
      metadata:
        usfm: PSA.105.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et les sept années de famine commencèrent à venir, ainsi que Joseph l’avait annoncé. Il y eut famine dans tous les pays; mais dans tout le pays d’Égypte il y avait du pain. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Quand tout le pays d’Égypte fut aussi affamé, le peuple cria à Pharaon pour avoir du pain. Pharaon dit à tous les Égyptiens: Allez vers Joseph, et faites ce qu’il vous dira. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'La famine régnait dans tout le pays. Joseph ouvrit tous les lieux d’approvisionnements, et vendit du blé aux Égyptiens. La famine augmentait dans le pays d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Et de tous les pays on arrivait en Égypte, pour acheter du blé auprès de Joseph; car la famine était forte dans tous les pays.
