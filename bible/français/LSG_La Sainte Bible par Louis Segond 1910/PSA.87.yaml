document_id: PSA.87
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 48. (És 2:2, 3; 60. Jé 3:17.)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Des fils de Koré. Psaume. Cantique.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle est fondée sur les montagnes saintes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L’Éternel aime les portes de Sion
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plus que toutes les demeures de Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Des choses glorieuses ont été dites sur toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ville de Dieu! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je proclame l’Égypte et Babylone parmi ceux qui me connaissent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici, le pays des Philistins, Tyr, avec l’Éthiopie:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est dans Sion qu’ils sont nés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et de Sion il est dit: Tous y sont nés,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et c’est le Très-Haut qui l’affermit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L’Éternel compte en inscrivant les peuples:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C’est là qu’ils sont nés. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et ceux qui chantent et ceux qui dansent s’écrient:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutes mes sources sont en toi.
