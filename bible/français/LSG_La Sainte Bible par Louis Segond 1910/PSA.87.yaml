document_id: PSA.87,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 48. (És 2:2, 3; 60. Jé 3:17.)
  - type: text
    content: Des fils de Koré. Psaume. Cantique.
  - type: text
    content: Elle est fondée sur les montagnes saintes.
  '2':
  - type: text
    content: L’Éternel aime les portes de Sion
  - type: text
    content: Plus que toutes les demeures de Jacob.
  '3':
  - type: text
    content: Des choses glorieuses ont été dites sur toi,
  - type: text
    content: 'Ville de Dieu! '
  - type: text
    content: — Pause.
  '4':
  - type: text
    content: Je proclame l’Égypte et Babylone parmi ceux qui me connaissent;
  - type: text
    content: 'Voici, le pays des Philistins, Tyr, avec l’Éthiopie:'
  - type: text
    content: C’est dans Sion qu’ils sont nés.
  '5':
  - type: text
    content: 'Et de Sion il est dit: Tous y sont nés,'
  - type: text
    content: Et c’est le Très-Haut qui l’affermit.
  '6':
  - type: text
    content: 'L’Éternel compte en inscrivant les peuples:'
  - type: text
    content: 'C’est là qu’ils sont nés. '
  - type: text
    content: — Pause.
  '7':
  - type: text
    content: 'Et ceux qui chantent et ceux qui dansent s’écrient:'
  - type: text
    content: Toutes mes sources sont en toi.
