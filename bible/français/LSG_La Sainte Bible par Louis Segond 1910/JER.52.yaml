document_id: JER.52,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Siège et prise de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-30: cf. 2 R 24:18-20; 25:1-21. Jé 39:1-10. 2 Ch 36:11-21.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Sédécias avait '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 24:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'vingt et un ans lorsqu’il devint roi, et il régna onze ans à Jérusalem. Sa mère s’appelait Hamuthal, fille de Jérémie, de Libna. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Le roi de Babylone fit égorger les fils de Sédécias en sa présence; il fit aussi égorger tous les chefs de Juda à Ribla. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Puis il fit crever les yeux à Sédécias, et le fit lier avec des chaînes d’airain; le roi de Babylone l’emmena à Babylone, et il le tint en prison jusqu’au jour de sa mort. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Le dixième jour du cinquième mois, c’était la dix-neuvième année du règne de Nebucadnetsar, roi de Babylone, Nebuzaradan, chef des gardes, au service du roi de Babylone, vint à Jérusalem. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Il brûla la maison de l’Éternel, la maison du roi, et toutes les maisons de Jérusalem; il livra au feu toutes les maisons de quelque importance. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Toute l’armée des Chaldéens, qui était avec le chef des gardes, démolit toutes les murailles formant l’enceinte de Jérusalem. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nebuzaradan, chef des gardes, emmena captifs une partie des plus pauvres du peuple, ceux du peuple qui étaient demeurés dans la ville, ceux qui s’étaient rendus au roi de Babylone, et le reste de la multitude. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Cependant Nebuzaradan, chef des gardes, laissa comme vignerons et comme laboureurs quelques-uns des plus pauvres du pays. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Les Chaldéens brisèrent les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 27:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'colonnes d’airain qui étaient dans la maison de l’Éternel, les bases, la mer d’airain qui était dans la maison de l’Éternel, et ils en emportèrent tout l’airain à Babylone. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ils prirent les cendriers, les pelles, les couteaux, les coupes, les tasses, et tous les ustensiles d’airain avec lesquels on faisait le service. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Le chef des gardes prit encore les bassins, les brasiers, les coupes, les cendriers, les chandeliers, les tasses et les calices, ce qui était d’or et ce qui était d’argent. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il fit ce qui est mal aux yeux de l’Éternel, entièrement comme avait fait Jojakim. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Les deux colonnes, la mer, et les douze bœufs d’airain qui servaient de base, et que le roi Salomon avait faits pour la maison de l’Éternel, tous ces ustensiles d’airain avaient un poids inconnu. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'La hauteur de l’une des '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 7:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 25:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 3:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'colonnes était de dix-huit coudées, et un cordon de douze coudées l’entourait; elle était creuse, et son épaisseur avait quatre doigts; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'il y avait au-dessus un chapiteau d’airain, et la hauteur d’un chapiteau était de cinq coudées; autour du chapiteau il y avait un treillis et des grenades, le tout d’airain; il en était de même pour la seconde colonne avec des grenades. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Il y avait quatre-vingt-seize grenades de chaque côté, et toutes les grenades autour du treillis étaient au nombre de cent. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Le chef des gardes prit Seraja, le souverain sacrificateur, Sophonie, le second sacrificateur, et les trois gardiens du seuil. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Et dans la ville il prit un eunuque qui avait sous son commandement les gens de guerre, sept hommes qui faisaient partie des conseillers du roi et qui furent trouvés dans la ville, le secrétaire du chef de l’armée qui était chargé d’enrôler le peuple du pays, et soixante hommes du peuple du pays qui se trouvèrent dans la ville. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Nebuzaradan, chef des gardes, les prit, et les conduisit vers le roi de Babylone à Ribla. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Le roi de Babylone les frappa et les fit mourir à Ribla, dans le pays de Hamath. Ainsi Juda fut emmené captif loin de son pays. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Voici le peuple que Nebucadnetsar emmena en captivité: la septième année, trois mille vingt-trois Juifs; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'la dix-huitième année de Nebucadnetsar, il emmena de Jérusalem huit cent trente-deux personnes; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Et cela arriva à cause de la colère de l’Éternel contre Jérusalem et contre Juda, qu’il voulait rejeter de devant sa face. Et Sédécias se révolta contre le roi de Babylone. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: la vingt-troisième année de Nebucadnetsar, Nebuzaradan, chef des gardes, emmena sept cent quarante-cinq Juifs; en tout quatre mille six cents personnes.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 31-34: cf. 2 R 25:27-30.'
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 R 25:27, etc.
      marker-yv: yv-n
    - type: text
      text: 'La trente-septième année de la captivité de Jojakin, roi de Juda, le vingt-cinquième jour du douzième mois, Évil-Merodac, roi de Babylone, dans la première année de son règne, releva la tête de Jojakin, roi de Juda, et le fit sortir de prison. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Il lui parla avec bonté, et il mit son trône au-dessus du trône des rois qui étaient avec lui à Babylone. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Il lui fit changer ses vêtements de prison, et Jojakin mangea toujours à sa table tout le temps de sa vie. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Le roi de Babylone pourvut constamment à son entretien journalier jusqu’au jour de sa mort, tout le temps de sa vie.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'La '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 25:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 39:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'neuvième année du règne de Sédécias, le dixième jour du dixième mois, Nebucadnetsar, roi de Babylone, vint avec toute son armée contre Jérusalem; ils campèrent devant elle, et élevèrent des retranchements tout autour. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'La ville fut assiégée jusqu’à la onzième année du roi Sédécias. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Le neuvième jour du quatrième mois, la famine était forte dans la ville, et il n’y avait pas de pain pour le peuple du pays. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Alors la brèche fut faite à la ville; et tous les gens de guerre s’enfuirent, et sortirent de la ville pendant la nuit par le chemin de la porte entre les deux murs près du jardin du roi, tandis que les Chaldéens environnaient la ville. Les fuyards prirent le chemin de la plaine. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mais l’armée des Chaldéens poursuivit le roi, et ils atteignirent Sédécias dans les plaines de Jéricho; et toute son armée se dispersa loin de lui. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ils saisirent le roi, et le firent monter vers le roi de Babylone à Ribla, dans le pays de Hamath; et il prononça contre lui une sentence. '
