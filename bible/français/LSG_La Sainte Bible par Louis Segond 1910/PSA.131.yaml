document_id: PSA.131,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Mt 11:29. Ro 12:3, 16. 1 Pi 5:5, 6. Ph 2:1-11.
  - type: text
    content: Cantique des degrés. De David.
  - type: text
    content: 'Éternel! '
  - type: note
    content: 2 Ch 32:25. Pr 16:5.
  - type: text
    content: 'je n’ai ni un cœur qui s’enfle, '
  - type: note
    content: Ps 101:5. Pr 6:17.
  - type: text
    content: ni des regards hautains;
  - type: text
    content: Je ne m’occupe pas de choses trop grandes et trop relevées pour moi.
  '2':
  - type: text
    content: Loin de là, j’ai l’âme calme et tranquille,
  - type: text
    content: Comme un enfant sevré qui est auprès de sa mère;
  - type: text
    content: J’ai l’âme comme un enfant sevré.
  '3':
  - type: text
    content: Israël, mets ton espoir en l’Éternel,
  - type: text
    content: Dès maintenant et à jamais!
