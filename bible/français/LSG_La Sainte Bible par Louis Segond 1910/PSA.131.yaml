      text: ni des regards hautains;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne m’occupe pas de choses trop grandes et trop relevées pour moi.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loin de là, j’ai l’âme calme et tranquille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un enfant sevré qui est auprès de sa mère;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai l’âme comme un enfant sevré.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël, mets ton espoir en l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès maintenant et à jamais!
