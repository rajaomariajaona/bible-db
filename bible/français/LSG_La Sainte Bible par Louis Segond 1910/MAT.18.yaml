document_id: MAT.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le plus grand dans le royaume des cieux. — Les scandales
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. (Mc 9:33-37. Lu 9:46-48.) Lu 22:24-27.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:34
      metadata:
        usfm: MRK.9.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:46
      metadata:
        usfm: LUK.9.46
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:24
      metadata:
        usfm: LUK.22.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'En ce moment, les disciples s’approchèrent de Jésus, et dirent: Qui donc est le plus grand dans le royaume des cieux? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jésus, ayant appelé un petit enfant, le plaça au milieu d’eux, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous le dis en vérité,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 19:14
      metadata:
        usfm: MAT.19.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 14:20
      metadata:
        usfm: 1CO.14.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:2
      metadata:
        usfm: 1PE.2.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: si vous ne vous convertissez et si vous ne devenez comme les petits enfants, vous n’entrerez pas dans le royaume des cieux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:6
      metadata:
        usfm: 1PE.5.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est pourquoi, quiconque se rendra humble comme ce petit enfant sera le plus grand dans le royaume des cieux.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:37
      metadata:
        usfm: MRK.9.37
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:48
      metadata:
        usfm: LUK.9.48
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:20
      metadata:
        usfm: JHN.13.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et quiconque reçoit en mon nom un petit enfant comme celui-ci, me reçoit moi-même.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:42
      metadata:
        usfm: MRK.9.42
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 17:2
      metadata:
        usfm: LUK.17.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais, si quelqu’un scandalisait un de ces petits qui croient en moi, il vaudrait mieux pour lui qu’on suspendît à son cou une meule de moulin, et qu’on le jetât au fond de la mer.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Malheur au monde à cause des scandales!
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 11:19
      metadata:
        usfm: 1CO.11.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car il est nécessaire qu’il arrive des scandales;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:24
      metadata:
        usfm: MAT.26.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 2:23
      metadata:
        usfm: ACT.2.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:27
      metadata:
        usfm: ACT.4.27
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '28'
      metadata:
        usfm: ACT.4.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais malheur à l’homme par qui le scandale arrive!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 13:6
      metadata:
        usfm: DEU.13.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:29
      metadata:
        usfm: MAT.5.29
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '30'
      metadata:
        usfm: MAT.5.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:43
      metadata:
        usfm: MRK.9.43
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si ta main ou ton pied est pour toi une occasion de chute, coupe-les et jette-les loin de toi; mieux vaut pour toi entrer dans la vie boiteux ou manchot, que d’avoir deux pieds ou deux mains et d’être jeté dans le feu éternel.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et si ton œil est pour toi une occasion de chute, arrache-le et jette-le loin de toi; mieux vaut pour toi entrer dans la vie, n’ayant qu’un œil, que d’avoir deux yeux et d’être jeté dans le feu de la géhenne.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La brebis égarée
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-14: cf. Lu 15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Gardez-vous de mépriser un seul de ces petits; car je vous dis
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 34:8
      metadata:
        usfm: PSA.34.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: que leurs anges dans les cieux voient continuellement la face de mon Père qui est dans les cieux.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 19:10
      metadata:
        usfm: LUK.19.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car le Fils de l’homme est venu sauver ce qui était perdu.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 15:3
      metadata:
        usfm: LUK.15.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que vous en semble? Si un homme a cent brebis, et que l’une d’elles s’égare, ne laisse-t-il pas les quatre-vingt-dix-neuf autres sur les montagnes, pour aller chercher celle qui s’est égarée?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et, s’il la trouve, je vous le dis en vérité, elle lui cause plus de joie que les quatre-vingt-dix-neuf qui ne se sont pas égarées.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: De même, ce n’est pas la volonté de votre Père qui est dans les cieux qu’il se perde un seul de ces petits.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le pardon des offenses
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-20: cf. Ga 6:1. 1 Co 5. 2 Th 3:6, 14, 15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:17
      metadata:
        usfm: LEV.19.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 17:10
      metadata:
        usfm: PRO.17.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 17:3
      metadata:
        usfm: LUK.17.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 5:19
      metadata:
        usfm: JAS.5.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si ton frère a péché, va et reprends-le entre toi et lui seul. S’il t’écoute, tu as gagné ton frère.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais, s’il ne t’écoute pas, prends avec toi une ou deux personnes,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 35:30
      metadata:
        usfm: NUM.35.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 17:6
      metadata:
        usfm: DEU.17.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:15
      metadata:
        usfm: DEU.19.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 8:17
      metadata:
        usfm: JHN.8.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 13:1
      metadata:
        usfm: 2CO.13.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 10:28
      metadata:
        usfm: HEB.10.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: afin que toute l’affaire se règle sur la déclaration de deux ou de trois témoins.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: S’il refuse de les écouter,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:14
      metadata:
        usfm: 2TH.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: dis-le à l’Église; et s’il refuse aussi d’écouter l’Église,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 5:9
      metadata:
        usfm: 1CO.5.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:14
      metadata:
        usfm: 2TH.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: qu’il soit pour toi comme un païen et un publicain.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 16:19
      metadata:
        usfm: MAT.16.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 20:23
      metadata:
        usfm: JHN.20.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous le dis en vérité, tout ce que vous lierez sur la terre sera lié dans le ciel, et tout ce que vous délierez sur la terre sera délié dans le ciel.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous dis encore que, si deux d’entre vous s’accordent sur la terre pour demander une chose quelconque, elle leur sera accordée par mon Père qui est dans les cieux.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 24:15
      metadata:
        usfm: LUK.24.15
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '36'
      metadata:
        usfm: LUK.24.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car là où deux ou trois sont assemblés en mon nom, je suis au milieu d’eux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parabole du serviteur impitoyable
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-35: cf. Mt 6:12, 14, 15. Ép 4:32; 5:1, 2. Ja 2:13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors Pierre s’approcha de lui, et dit: Seigneur, combien de fois pardonnerai-je à mon frère, lorsqu’il péchera contre moi? Sera-ce jusqu’à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 17:4
      metadata:
        usfm: LUK.17.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sept fois? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je ne te dis pas jusqu’à sept fois, mais jusqu’à
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 6:14
      metadata:
        usfm: MAT.6.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 11:24
      metadata:
        usfm: MRK.11.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:13
      metadata:
        usfm: COL.3.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: septante fois sept fois.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est pourquoi, le royaume des cieux est semblable à un roi qui voulut faire rendre compte à ses serviteurs.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quand il se mit à compter, on lui en amena un qui devait dix mille talents.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:25
      metadata:
        usfm: MAT.5.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Comme il n’avait pas de quoi payer, son maître ordonna qu’il fût vendu, lui, sa femme, ses enfants, et tout ce qu’il avait, et que la dette fût acquittée.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le serviteur, se jetant à terre, se prosterna devant lui, et dit: Seigneur, aie patience envers moi, et je te paierai tout.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ému de compassion, le maître de ce serviteur le laissa aller, et lui remit la dette.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Après qu’il fut sorti, ce serviteur rencontra un de ses compagnons qui lui devait cent deniers. Il le saisit et l’étranglait, en disant: Paie ce que tu me dois.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Son compagnon, se jetant à terre, le suppliait, disant: Aie patience envers moi, et je te paierai.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais l’autre ne voulut pas, et il alla le jeter en prison, jusqu’à ce qu’il eût payé ce qu’il devait.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ses compagnons, ayant vu ce qui était arrivé, furent profondément attristés, et ils allèrent raconter à leur maître tout ce qui s’était passé.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors le maître fit appeler ce serviteur, et lui dit: Méchant serviteur, je t’avais remis en entier ta dette, parce que tu m’en avais supplié;'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ne devais-tu pas aussi avoir pitié de ton compagnon, comme j’ai eu pitié de toi?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et son maître, irrité, le livra aux bourreaux, jusqu’à ce qu’il eût payé tout ce qu’il devait.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
