document_id: MAT.18,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le plus grand dans le royaume des cieux. — Les scandales
  - type: heading
    content: 'V. 1-9: cf. (Mc 9:33-37. Lu 9:46-48.) Lu 22:24-27.'
  - type: text
    content: ' '
  - type: note
    content: Mc 9:34. Lu 9:46; 22:24.
  - type: text
    content: 'En ce moment, les disciples s’approchèrent de Jésus, et dirent: Qui donc est le plus grand dans le royaume des cieux? '
  '10':
  - type: text
    content: ' '
  - type: text
    content: Gardez-vous de mépriser un seul de ces petits; car je vous dis
  - type: text
    content: ' '
  - type: note
    content: Ps 34:8.
  - type: text
    content: que leurs anges dans les cieux voient continuellement la face de mon Père qui est dans les cieux.
  - type: text
    content: ' '
  '11':
  - type: note
    content: Lu 19:10.
  - type: text
    content: Car le Fils de l’homme est venu sauver ce qui était perdu.
  - type: text
    content: ' '
  '12':
  - type: note
    content: Lu 15:3.
  - type: text
    content: Que vous en semble? Si un homme a cent brebis, et que l’une d’elles s’égare, ne laisse-t-il pas les quatre-vingt-dix-neuf autres sur les montagnes, pour aller chercher celle qui s’est égarée?
  - type: text
    content: ' '
  '13':
  - type: text
    content: Et, s’il la trouve, je vous le dis en vérité, elle lui cause plus de joie que les quatre-vingt-dix-neuf qui ne se sont pas égarées.
  - type: text
    content: ' '
  '14':
  - type: text
    content: De même, ce n’est pas la volonté de votre Père qui est dans les cieux qu’il se perde un seul de ces petits.
  - type: heading
    content: Le pardon des offenses
  - type: heading
    content: 'V. 15-20: cf. Ga 6:1. 1 Co 5. 2 Th 3:6, 14, 15.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Lé 19:17. Pr 17:10. Lu 17:3. Ja 5:19.
  - type: text
    content: Si ton frère a péché, va et reprends-le entre toi et lui seul. S’il t’écoute, tu as gagné ton frère.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Mais, s’il ne t’écoute pas, prends avec toi une ou deux personnes,
  - type: text
    content: ' '
  - type: note
    content: No 35:30. De 17:6; 19:15. Jn 8:17. 2 Co 13:1. Hé 10:28.
  - type: text
    content: afin que toute l’affaire se règle sur la déclaration de deux ou de trois témoins.
  - type: text
    content: ' '
  '17':
  - type: text
    content: S’il refuse de les écouter,
  - type: text
    content: ' '
  - type: note
    content: 2 Th 3:14.
  - type: text
    content: dis-le à l’Église; et s’il refuse aussi d’écouter l’Église,
  - type: text
    content: ' '
  - type: note
    content: 1 Co 5:9. 2 Th 3:14.
  - type: text
    content: qu’il soit pour toi comme un païen et un publicain.
  - type: text
    content: ' '
  '18':
  - type: note
    content: Mt 16:19. Jn 20:23.
  - type: text
    content: Je vous le dis en vérité, tout ce que vous lierez sur la terre sera lié dans le ciel, et tout ce que vous délierez sur la terre sera délié dans le ciel.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Je vous dis encore que, si deux d’entre vous s’accordent sur la terre pour demander une chose quelconque, elle leur sera accordée par mon Père qui est dans les cieux.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Jésus, ayant appelé un petit enfant, le plaça au milieu d’eux, '
  '20':
  - type: note
    content: Lu 24:15, 36.
  - type: text
    content: Car là où deux ou trois sont assemblés en mon nom, je suis au milieu d’eux.
  - type: heading
    content: Parabole du serviteur impitoyable
  - type: heading
    content: 'V. 21-35: cf. Mt 6:12, 14, 15. Ép 4:32; 5:1, 2. Ja 2:13.'
  '21':
  - type: text
    content: 'Alors Pierre s’approcha de lui, et dit: Seigneur, combien de fois pardonnerai-je à mon frère, lorsqu’il péchera contre moi? Sera-ce jusqu’à '
  - type: note
    content: Lu 17:4.
  - type: text
    content: 'sept fois? '
  '22':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: Je ne te dis pas jusqu’à sept fois, mais jusqu’à
  - type: text
    content: ' '
  - type: note
    content: Mt 6:14. Mc 11:24. Col 3:13.
  - type: text
    content: septante fois sept fois.
  '23':
  - type: text
    content: ' '
  - type: text
    content: C’est pourquoi, le royaume des cieux est semblable à un roi qui voulut faire rendre compte à ses serviteurs.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Quand il se mit à compter, on lui en amena un qui devait dix mille talents.
  - type: text
    content: ' '
  '25':
  - type: note
    content: Mt 5:25.
  - type: text
    content: Comme il n’avait pas de quoi payer, son maître ordonna qu’il fût vendu, lui, sa femme, ses enfants, et tout ce qu’il avait, et que la dette fût acquittée.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Le serviteur, se jetant à terre, se prosterna devant lui, et dit: Seigneur, aie patience envers moi, et je te paierai tout.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: Ému de compassion, le maître de ce serviteur le laissa aller, et lui remit la dette.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Après qu’il fut sorti, ce serviteur rencontra un de ses compagnons qui lui devait cent deniers. Il le saisit et l’étranglait, en disant: Paie ce que tu me dois.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Son compagnon, se jetant à terre, le suppliait, disant: Aie patience envers moi, et je te paierai.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'et dit: '
  - type: text
    content: Je vous le dis en vérité,
  - type: text
    content: ' '
  - type: note
    content: Mt 19:14. 1 Co 14:20. 1 Pi 2:2.
  - type: text
    content: si vous ne vous convertissez et si vous ne devenez comme les petits enfants, vous n’entrerez pas dans le royaume des cieux.
  '30':
  - type: text
    content: Mais l’autre ne voulut pas, et il alla le jeter en prison, jusqu’à ce qu’il eût payé ce qu’il devait.
  - type: text
    content: ' '
  '31':
  - type: text
    content: Ses compagnons, ayant vu ce qui était arrivé, furent profondément attristés, et ils allèrent raconter à leur maître tout ce qui s’était passé.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Alors le maître fit appeler ce serviteur, et lui dit: Méchant serviteur, je t’avais remis en entier ta dette, parce que tu m’en avais supplié;'
  - type: text
    content: ' '
  '33':
  - type: text
    content: ne devais-tu pas aussi avoir pitié de ton compagnon, comme j’ai eu pitié de toi?
  - type: text
    content: ' '
  '34':
  - type: text
    content: Et son maître, irrité, le livra aux bourreaux, jusqu’à ce qu’il eût payé tout ce qu’il devait.
  - type: text
    content: ' '
  '35':
  - type: note
    content: Mt 6:14. Mc 11:26. Ja 2:13.
  - type: text
    content: C’est ainsi que mon Père céleste vous traitera, si chacun de vous ne pardonne à son frère de tout son cœur.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 1 Pi 5:6.
  - type: text
    content: C’est pourquoi, quiconque se rendra humble comme ce petit enfant sera le plus grand dans le royaume des cieux.
  - type: text
    content: ' '
  '5':
  - type: note
    content: Mc 9:37. Lu 9:48. Jn 13:20.
  - type: text
    content: Et quiconque reçoit en mon nom un petit enfant comme celui-ci, me reçoit moi-même.
  - type: text
    content: ' '
  '6':
  - type: note
    content: Mc 9:42. Lu 17:2.
  - type: text
    content: Mais, si quelqu’un scandalisait un de ces petits qui croient en moi, il vaudrait mieux pour lui qu’on suspendît à son cou une meule de moulin, et qu’on le jetât au fond de la mer.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Malheur au monde à cause des scandales!
  - type: text
    content: ' '
  - type: note
    content: 1 Co 11:19.
  - type: text
    content: Car il est nécessaire qu’il arrive des scandales;
  - type: text
    content: ' '
  - type: note
    content: Mt 26:24. Ac 2:23; 4:27, 28.
  - type: text
    content: mais malheur à l’homme par qui le scandale arrive!
  - type: text
    content: ' '
  '8':
  - type: note
    content: De 13:6. Mt 5:29, 30. Mc 9:43.
  - type: text
    content: Si ta main ou ton pied est pour toi une occasion de chute, coupe-les et jette-les loin de toi; mieux vaut pour toi entrer dans la vie boiteux ou manchot, que d’avoir deux pieds ou deux mains et d’être jeté dans le feu éternel.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Et si ton œil est pour toi une occasion de chute, arrache-le et jette-le loin de toi; mieux vaut pour toi entrer dans la vie, n’ayant qu’un œil, que d’avoir deux yeux et d’être jeté dans le feu de la géhenne.
  - type: heading
    content: La brebis égarée
  - type: heading
    content: 'V. 10-14: cf. Lu 15.'
