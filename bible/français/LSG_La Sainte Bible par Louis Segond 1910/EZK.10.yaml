document_id: EZK.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les charbons ardents. Nouvelle vision du chariot
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. Am 2:4, 5. 2 R 25:8-10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je regardai, et voici, sur le ciel qui était au-dessus de la tête des chérubins, il y avait comme une pierre de saphir; on voyait au-dessus d’eux quelque chose de semblable à une forme de trône. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et l’Éternel dit à l’homme vêtu de lin: Va entre les roues sous les chérubins, remplis tes mains de charbons ardents que tu prendras entre les chérubins, et répands-les sur la ville! Et il y alla devant mes yeux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les chérubins étaient à la droite de la maison, quand l’homme alla, et la nuée remplit le parvis intérieur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'La gloire de l’Éternel s’éleva de dessus les chérubins, et se dirigea vers le seuil de la maison; la maison fut remplie de la nuée, et le parvis fut rempli de la splendeur de la gloire de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le bruit des ailes des chérubins se fit entendre jusqu’au parvis extérieur, pareil à la voix du Dieu tout-puissant lorsqu’il parle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ainsi l’Éternel donna cet ordre à l’homme vêtu de lin: Prends du feu entre les roues, entre les chérubins! Et cet homme alla se placer près des roues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors un chérubin étendit la main entre les chérubins vers le feu qui était entre les chérubins; il en prit, et le mit dans les mains de l’homme vêtu de lin. Et cet homme le prit, et sortit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: On voyait aux chérubins une forme de main d’homme sous leurs ailes.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-22: cf. (Éz 1; 11:22, 23.) Mt 23:38.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je regardai, et voici, il y avait quatre roues près des chérubins, une roue près de chaque chérubin; et ces roues '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 1:16
      metadata:
        usfm: EZK.1.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'avaient l’aspect d’une pierre de chrysolithe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'A leur aspect, toutes les quatre avaient la même forme; chaque roue paraissait être au milieu d’une autre roue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En cheminant, elles allaient de leurs quatre côtés, et elles ne se tournaient point dans leur marche; mais elles allaient dans la direction de la tête, sans se tourner dans leur marche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tout le corps des chérubins, leur dos, leurs mains, et leurs ailes, étaient remplis d’yeux, aussi bien que les roues tout autour, les quatre roues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'J’entendis qu’on appelait les roues tourbillon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Chacun avait quatre faces; la face du premier était une face de chérubin, la face du second une face d’homme, celle du troisième une face de lion, et celle du quatrième une face d’aigle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et les chérubins s’élevèrent. C’étaient les animaux que j’avais vus près du fleuve du Kebar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 1:19
      metadata:
        usfm: EZK.1.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand les chérubins marchaient, les roues cheminaient à côté d’eux; et quand les chérubins déployaient leurs ailes pour s’élever de terre, les roues aussi ne se détournaient point d’eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Quand ils s’arrêtaient, elles s’arrêtaient, et quand ils s’élevaient, elles s’élevaient avec eux, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 1:20
      metadata:
        usfm: EZK.1.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car l’esprit des animaux était en elles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'La gloire de l’Éternel se retira du seuil de la maison, et se plaça sur les chérubins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les chérubins déployèrent leurs ailes, et s’élevèrent de terre sous mes yeux quand ils partirent, accompagnés des roues. Ils s’arrêtèrent à l’entrée de la porte de la maison de l’Éternel vers l’orient; et la gloire du Dieu d’Israël était sur eux, en haut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'C’étaient les animaux que j’avais vus sous le Dieu d’Israël '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 1:3
      metadata:
        usfm: EZK.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'près du fleuve du Kebar, et je reconnus que c’étaient des chérubins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 1:6
      metadata:
        usfm: EZK.1.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: EZK.1.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:8
      metadata:
        usfm: EZK.10.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: EZK.10.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Chacun avait quatre faces, chacun avait quatre ailes, et une forme de main d’homme était sous leurs ailes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Leurs faces étaient semblables à celles que j’avais vues près du fleuve du Kebar; c’était le même aspect, c’était eux-mêmes. Chacun marchait droit devant soi.
