document_id: EZK.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les charbons ardents. Nouvelle vision du chariot
  - type: heading
    content: 'V. 1-8: cf. Am 2:4, 5. 2 R 25:8-10.'
  - type: text
    content: 'Je regardai, et voici, sur le ciel qui était au-dessus de la tête des chérubins, il y avait comme une pierre de saphir; on voyait au-dessus d’eux quelque chose de semblable à une forme de trône. '
  '10':
  - type: text
    content: 'A leur aspect, toutes les quatre avaient la même forme; chaque roue paraissait être au milieu d’une autre roue. '
  '11':
  - type: text
    content: 'En cheminant, elles allaient de leurs quatre côtés, et elles ne se tournaient point dans leur marche; mais elles allaient dans la direction de la tête, sans se tourner dans leur marche. '
  '12':
  - type: text
    content: 'Tout le corps des chérubins, leur dos, leurs mains, et leurs ailes, étaient remplis d’yeux, aussi bien que les roues tout autour, les quatre roues. '
  '13':
  - type: text
    content: 'J’entendis qu’on appelait les roues tourbillon. '
  '14':
  - type: text
    content: 'Chacun avait quatre faces; la face du premier était une face de chérubin, la face du second une face d’homme, celle du troisième une face de lion, et celle du quatrième une face d’aigle. '
  '15':
  - type: text
    content: 'Et les chérubins s’élevèrent. C’étaient les animaux que j’avais vus près du fleuve du Kebar. '
  '16':
  - type: note
    content: Éz 1:19.
  - type: text
    content: 'Quand les chérubins marchaient, les roues cheminaient à côté d’eux; et quand les chérubins déployaient leurs ailes pour s’élever de terre, les roues aussi ne se détournaient point d’eux. '
  '17':
  - type: text
    content: 'Quand ils s’arrêtaient, elles s’arrêtaient, et quand ils s’élevaient, elles s’élevaient avec eux, '
  - type: note
    content: Éz 1:20.
  - type: text
    content: 'car l’esprit des animaux était en elles. '
  '18':
  - type: text
    content: 'La gloire de l’Éternel se retira du seuil de la maison, et se plaça sur les chérubins. '
  '19':
  - type: text
    content: 'Les chérubins déployèrent leurs ailes, et s’élevèrent de terre sous mes yeux quand ils partirent, accompagnés des roues. Ils s’arrêtèrent à l’entrée de la porte de la maison de l’Éternel vers l’orient; et la gloire du Dieu d’Israël était sur eux, en haut. '
  '2':
  - type: text
    content: 'Et l’Éternel dit à l’homme vêtu de lin: Va entre les roues sous les chérubins, remplis tes mains de charbons ardents que tu prendras entre les chérubins, et répands-les sur la ville! Et il y alla devant mes yeux. '
  '20':
  - type: text
    content: 'C’étaient les animaux que j’avais vus sous le Dieu d’Israël '
  - type: note
    content: Éz 1:3.
  - type: text
    content: 'près du fleuve du Kebar, et je reconnus que c’étaient des chérubins. '
  '21':
  - type: note
    content: Éz 1:6, 8; 10:8, 14.
  - type: text
    content: 'Chacun avait quatre faces, chacun avait quatre ailes, et une forme de main d’homme était sous leurs ailes. '
  '22':
  - type: text
    content: Leurs faces étaient semblables à celles que j’avais vues près du fleuve du Kebar; c’était le même aspect, c’était eux-mêmes. Chacun marchait droit devant soi.
  '3':
  - type: text
    content: 'Les chérubins étaient à la droite de la maison, quand l’homme alla, et la nuée remplit le parvis intérieur. '
  '4':
  - type: text
    content: 'La gloire de l’Éternel s’éleva de dessus les chérubins, et se dirigea vers le seuil de la maison; la maison fut remplie de la nuée, et le parvis fut rempli de la splendeur de la gloire de l’Éternel. '
  '5':
  - type: text
    content: 'Le bruit des ailes des chérubins se fit entendre jusqu’au parvis extérieur, pareil à la voix du Dieu tout-puissant lorsqu’il parle. '
  '6':
  - type: text
    content: 'Ainsi l’Éternel donna cet ordre à l’homme vêtu de lin: Prends du feu entre les roues, entre les chérubins! Et cet homme alla se placer près des roues. '
  '7':
  - type: text
    content: 'Alors un chérubin étendit la main entre les chérubins vers le feu qui était entre les chérubins; il en prit, et le mit dans les mains de l’homme vêtu de lin. Et cet homme le prit, et sortit. '
  '8':
  - type: text
    content: On voyait aux chérubins une forme de main d’homme sous leurs ailes.
  - type: heading
    content: 'V. 9-22: cf. (Éz 1; 11:22, 23.) Mt 23:38.'
  '9':
  - type: text
    content: 'Je regardai, et voici, il y avait quatre roues près des chérubins, une roue près de chaque chérubin; et ces roues '
  - type: note
    content: Éz 1:16.
  - type: text
    content: 'avaient l’aspect d’une pierre de chrysolithe. '
