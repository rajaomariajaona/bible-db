document_id: JOB.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-17: cf. Job 23. (És 50:10. La 3:31-33.)'
  - type: text
    content: Mon âme est dégoûtée de la vie!
  - type: text
    content: Je donnerai cours à ma plainte,
  - type: text
    content: Je parlerai dans l’amertume de mon âme.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ps 139:15, 16.
  - type: text
    content: Ne m’as-tu pas coulé comme du lait?
  - type: text
    content: Ne m’as-tu pas caillé comme du fromage?
  '11':
  - type: text
    content: Tu m’as revêtu de peau et de chair,
  - type: text
    content: Tu m’as tissé d’os et de nerfs;
  '12':
  - type: text
    content: Tu m’as accordé ta grâce avec la vie,
  - type: text
    content: Tu m’as conservé par tes soins et sous ta garde.
  '13':
  - type: text
    content: Voici néanmoins ce que tu cachais dans ton cœur,
  - type: text
    content: Voici, je le sais, ce que tu as résolu en toi-même.
  '14':
  - type: text
    content: Si je pèche, tu m’observes,
  - type: text
    content: Tu ne pardonnes pas mon iniquité.
  '15':
  - type: text
    content: Suis-je coupable, malheur à moi!
  - type: text
    content: Suis-je innocent, je n’ose lever la tête,
  - type: text
    content: Rassasié de honte et absorbé dans ma misère.
  '16':
  - type: text
    content: Et si j’ose la lever, tu me poursuis comme un lion,
  - type: note
    content: És 38:13. La 3:10.
  - type: text
    content: Tu me frappes encore par des prodiges.
  '17':
  - type: text
    content: Tu m’opposes de nouveaux témoins,
  - type: text
    content: Tu multiplies tes fureurs contre moi,
  - type: text
    content: Tu m’assailles d’une succession de calamités.
  - type: heading
    content: 'V. 18-22: cf. Job 3:11-26; 7:7-21.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: Job 3:11.
  - type: text
    content: Pourquoi m’as-tu fait sortir du sein de ma mère?
  - type: text
    content: Je serais mort, et aucun œil ne m’aurait vu;
  '19':
  - type: text
    content: Je serais comme si je n’eusse pas existé,
  - type: text
    content: Et j’aurais passé du ventre de ma mère au sépulcre.
  '2':
  - type: text
    content: 'Je dis à Dieu: Ne me condamne pas!'
  - type: text
    content: Fais-moi savoir pourquoi tu me prends à partie!
  '20':
  - type: text
    content: Mes jours ne sont-ils pas en petit nombre? Qu’il me laisse,
  - type: text
    content: Qu’il se retire de moi, et que je respire un peu,
  '21':
  - type: text
    content: Avant que je m’en aille, pour ne plus revenir,
  - type: text
    content: Dans le pays des ténèbres et de l’ombre de la mort,
  '22':
  - type: text
    content: Pays d’une obscurité profonde,
  - type: text
    content: Où règnent l’ombre de la mort et la confusion,
  - type: text
    content: Et où la lumière est semblable aux ténèbres.
  '3':
  - type: text
    content: Te paraît-il bien de maltraiter,
  - type: text
    content: De repousser l’ouvrage de tes mains,
  - type: text
    content: Et de faire briller ta faveur sur le conseil des méchants?
  '4':
  - type: text
    content: As-tu des yeux de chair,
  - type: text
    content: Vois-tu comme voit un homme?
  '5':
  - type: text
    content: Tes jours sont-ils comme les jours de l’homme,
  - type: text
    content: Et tes années comme ses années,
  '6':
  - type: text
    content: Pour que tu recherches mon iniquité,
  - type: text
    content: Pour que tu t’enquières de mon péché,
  '7':
  - type: text
    content: Sachant bien que je ne suis pas coupable,
  - type: text
    content: Et que nul ne peut me délivrer de ta main?
  '8':
  - type: text
    content: Tes mains m’ont formé, elles m’ont créé,
  - type: text
    content: Elles m’ont fait tout entier… Et tu me détruirais!
  '9':
  - type: text
    content: 'Souviens-toi que tu m’as façonné comme '
  - type: note
    content: Ge 2:7; 3:19.
  - type: text
    content: de l’argile;
  - type: text
    content: Voudrais-tu de nouveau me réduire en poussière?
