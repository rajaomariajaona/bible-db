document_id: JOB.10,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-17: cf. Job 23. (És 50:10. La 3:31-33.)'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme est dégoûtée de la vie!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je donnerai cours à ma plainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je parlerai dans l’amertume de mon âme.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 139:15
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne m’as-tu pas coulé comme du lait?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne m’as-tu pas caillé comme du fromage?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’as revêtu de peau et de chair,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’as tissé d’os et de nerfs;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’as accordé ta grâce avec la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’as conservé par tes soins et sous ta garde.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici néanmoins ce que tu cachais dans ton cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je le sais, ce que tu as résolu en toi-même.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je pèche, tu m’observes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne pardonnes pas mon iniquité.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Suis-je coupable, malheur à moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Suis-je innocent, je n’ose lever la tête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rassasié de honte et absorbé dans ma misère.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et si j’ose la lever, tu me poursuis comme un lion,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 38:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: La 3:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tu me frappes encore par des prodiges.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’opposes de nouveaux témoins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu multiplies tes fureurs contre moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’assailles d’une succession de calamités.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 18-22: cf. Job 3:11-26; 7:7-21.'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 3:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Pourquoi m’as-tu fait sortir du sein de ma mère?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je serais mort, et aucun œil ne m’aurait vu;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je serais comme si je n’eusse pas existé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’aurais passé du ventre de ma mère au sépulcre.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je dis à Dieu: Ne me condamne pas!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais-moi savoir pourquoi tu me prends à partie!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes jours ne sont-ils pas en petit nombre? Qu’il me laisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il se retire de moi, et que je respire un peu,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant que je m’en aille, pour ne plus revenir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans le pays des ténèbres et de l’ombre de la mort,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pays d’une obscurité profonde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où règnent l’ombre de la mort et la confusion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et où la lumière est semblable aux ténèbres.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Te paraît-il bien de maltraiter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De repousser l’ouvrage de tes mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de faire briller ta faveur sur le conseil des méchants?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As-tu des yeux de chair,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vois-tu comme voit un homme?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes jours sont-ils comme les jours de l’homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tes années comme ses années,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que tu recherches mon iniquité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que tu t’enquières de mon péché,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sachant bien que je ne suis pas coupable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que nul ne peut me délivrer de ta main?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes mains m’ont formé, elles m’ont créé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles m’ont fait tout entier… Et tu me détruirais!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Souviens-toi que tu m’as façonné comme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 2:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: de l’argile;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voudrais-tu de nouveau me réduire en poussière?
