document_id: LEV.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les sacrifices d’expiation
  - type: heading
    content: 'V. 1-12: cf. (Hé 5:1-3; 7:26-28.) Lé 16:3, 11-14.'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: text
    content: 'Le sacrificateur enlèvera ces parties comme on les enlève du taureau dans le sacrifice d’actions de grâces, '
  - type: note
    content: Lé 3:5.
  - type: text
    content: 'et il les brûlera sur l’autel des holocaustes. '
  '11':
  - type: text
    content: 'Mais la '
  - type: note
    content: Ex 29:14. No 19:5.
  - type: text
    content: 'peau du taureau, toute sa chair, avec sa tête, ses jambes, ses entrailles et ses excréments, '
  '12':
  - type: text
    content: 'le taureau entier, '
  - type: note
    content: Lé 16:27. No 19:3. Hé 13:11.
  - type: text
    content: 'il l’emportera hors du camp, dans un lieu pur, où l’on jette les cendres, et il le brûlera au feu sur du bois: c’est sur le tas de cendres qu’il sera brûlé.'
  - type: heading
    content: 'V. 13-21: cf. No 15:22-26. 2 Ch 29:20-24.'
  '13':
  - type: text
    content: 'Si c’est '
  - type: note
    content: Lé 9:15. No 15:24, etc.
  - type: text
    content: 'toute l’assemblée d’Israël qui a péché involontairement et sans s’en apercevoir, en faisant contre l’un des commandements de l’Éternel des choses qui ne doivent point se faire et en se rendant ainsi coupable, '
  '14':
  - type: text
    content: 'et que le péché qu’on a commis vienne à être découvert, l’assemblée offrira un jeune taureau en sacrifice d’expiation, et on l’amènera devant la tente d’assignation. '
  '15':
  - type: text
    content: 'Les anciens d’Israël poseront leurs mains sur la tête du taureau devant l’Éternel, et on égorgera le taureau devant l’Éternel. '
  '16':
  - type: text
    content: 'Le sacrificateur ayant reçu l’onction apportera du sang du taureau dans la tente d’assignation; '
  '17':
  - type: text
    content: 'il trempera son doigt dans le sang, et il en fera sept fois l’aspersion devant l’Éternel, en face du voile. '
  '18':
  - type: text
    content: 'Il mettra du sang sur les cornes de l’autel qui est devant l’Éternel dans la tente d’assignation; et il répandra tout le sang au pied de l’autel des holocaustes, qui est à l’entrée de la tente d’assignation. '
  '19':
  - type: text
    content: 'Il enlèvera toute la graisse du taureau, et il la brûlera sur l’autel. '
  '2':
  - type: text
    content: 'Parle aux enfants d’Israël, et dis: Lorsque quelqu’un péchera involontairement contre l’un des commandements de l’Éternel, en faisant des choses qui ne doivent point se faire; '
  '20':
  - type: text
    content: 'Il fera de ce taureau comme du taureau expiatoire; il fera de même. C’est ainsi que le sacrificateur fera pour eux l’expiation, et il leur sera pardonné. '
  '21':
  - type: text
    content: Il emportera le taureau hors du camp, et il le brûlera comme le premier taureau. C’est un sacrifice d’expiation pour l’assemblée.
  - type: heading
    content: 'V. 22-35: cf. No 15:27-31. Lé 5:1-13.'
  '22':
  - type: text
    content: 'Si c’est un chef qui a péché, en faisant involontairement contre l’un des commandements de l’Éternel, son Dieu, des choses qui ne doivent point se faire et en se rendant ainsi coupable, '
  '23':
  - type: text
    content: 'et qu’il vienne à découvrir le péché qu’il a commis, il offrira en sacrifice un bouc mâle sans défaut. '
  '24':
  - type: text
    content: 'Il posera sa main sur la tête du bouc, qu’il égorgera dans le lieu où l’on égorge les holocaustes devant l’Éternel. C’est un sacrifice d’expiation. '
  '25':
  - type: text
    content: 'Le sacrificateur prendra avec son doigt du sang de la victime expiatoire, il en mettra sur les cornes de l’autel des holocaustes, et il répandra le sang au pied de l’autel des holocaustes. '
  '26':
  - type: text
    content: 'Il brûlera toute la graisse sur l’autel, comme la graisse du sacrifice d’actions de grâces. C’est ainsi que le sacrificateur fera pour ce chef l’expiation de son péché, et il lui sera pardonné. '
  '27':
  - type: note
    content: No 15:27.
  - type: text
    content: 'Si c’est quelqu’un du peuple qui a péché involontairement, en faisant contre l’un des commandements de l’Éternel des choses qui ne doivent point se faire et en se rendant ainsi coupable, '
  '28':
  - type: text
    content: 'et qu’il vienne à découvrir le péché qu’il a commis, il offrira en sacrifice une chèvre, une femelle sans défaut, pour le péché qu’il a commis. '
  '29':
  - type: text
    content: 'Il posera sa main sur la tête de la victime expiatoire, qu’il égorgera dans le lieu où l’on égorge les holocaustes. '
  '3':
  - type: text
    content: 'Si c’est le sacrificateur ayant reçu l’onction qui a péché et a rendu par là le peuple coupable, il offrira à l’Éternel, pour le péché qu’il a commis, un jeune taureau sans défaut, en sacrifice d’expiation. '
  '30':
  - type: text
    content: 'Le sacrificateur prendra avec son doigt du sang de la victime, il en mettra sur les cornes de l’autel des holocaustes, et il répandra tout le sang au pied de l’autel. '
  '31':
  - type: note
    content: Lé 3:3, 4, 14.
  - type: text
    content: 'Le sacrificateur ôtera toute la graisse, comme on ôte la graisse du sacrifice d’actions de grâces, et '
  - type: note
    content: Ex 29:18.
  - type: text
    content: 'il la brûlera sur l’autel, et elle sera d’une agréable odeur à l’Éternel. C’est ainsi que le sacrificateur fera pour cet homme l’expiation, et il lui sera pardonné. '
  '32':
  - type: text
    content: 'S’il offre un agneau en sacrifice d’expiation, il offrira une femelle sans défaut. '
  '33':
  - type: text
    content: 'Il posera sa main sur la tête de la victime, qu’il égorgera en sacrifice d’expiation dans le lieu où l’on égorge les holocaustes. '
  '34':
  - type: text
    content: 'Le sacrificateur prendra avec son doigt du sang de la victime, il en mettra sur les cornes de l’autel des holocaustes, et il répandra tout le sang au pied de l’autel. '
  '35':
  - type: text
    content: Le sacrificateur ôtera toute la graisse, comme on ôte la graisse de l’agneau dans le sacrifice d’actions de grâces, et il la brûlera sur l’autel, comme un sacrifice consumé par le feu devant l’Éternel. C’est ainsi que le sacrificateur fera pour cet homme l’expiation du péché qu’il a commis, et il lui sera pardonné.
  '4':
  - type: text
    content: 'Il amènera le taureau à l’entrée de la tente d’assignation, devant l’Éternel; et il posera sa main sur la tête du taureau, qu’il égorgera devant l’Éternel. '
  '5':
  - type: text
    content: 'Le sacrificateur ayant reçu l’onction prendra '
  - type: note
    content: Lé 16:14. No 19:4.
  - type: text
    content: 'du sang du taureau, et l’apportera dans la tente d’assignation; '
  '6':
  - type: text
    content: 'il trempera son doigt dans le sang, et il en fera sept fois l’aspersion devant l’Éternel, en face du voile du sanctuaire. '
  '7':
  - type: text
    content: 'Le sacrificateur mettra du sang '
  - type: note
    content: Lé 9:9.
  - type: text
    content: 'sur les cornes de l’autel des parfums odoriférants, qui est devant l’Éternel dans la tente d’assignation; et il répandra tout le sang du taureau au pied de l’autel des holocaustes, qui est à l’entrée de la tente d’assignation. '
  '8':
  - type: text
    content: 'Il enlèvera toute la graisse du taureau expiatoire, '
  - type: note
    content: Lé 3:3, 4.
  - type: text
    content: 'la graisse qui couvre les entrailles et toute celle qui y est attachée, '
  '9':
  - type: text
    content: 'les deux rognons, et la graisse qui les entoure, qui couvre les flancs, et le grand lobe du foie, qu’il détachera près des rognons. '
