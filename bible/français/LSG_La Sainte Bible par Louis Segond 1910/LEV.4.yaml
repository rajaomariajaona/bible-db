document_id: LEV.4,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les sacrifices d’expiation
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-12: cf. (Hé 5:1-3; 7:26-28.) Lé 16:3, 11-14.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur enlèvera ces parties comme on les enlève du taureau dans le sacrifice d’actions de grâces, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 3:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et il les brûlera sur l’autel des holocaustes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 19:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'peau du taureau, toute sa chair, avec sa tête, ses jambes, ses entrailles et ses excréments, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le taureau entier, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 16:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 19:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 13:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il l’emportera hors du camp, dans un lieu pur, où l’on jette les cendres, et il le brûlera au feu sur du bois: c’est sur le tas de cendres qu’il sera brûlé.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-21: cf. No 15:22-26. 2 Ch 29:20-24.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si c’est '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 9:15
      - type: text
        text: . No 15:24, etc.
      marker-yv: yv-n
    - type: text
      text: 'toute l’assemblée d’Israël qui a péché involontairement et sans s’en apercevoir, en faisant contre l’un des commandements de l’Éternel des choses qui ne doivent point se faire et en se rendant ainsi coupable, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et que le péché qu’on a commis vienne à être découvert, l’assemblée offrira un jeune taureau en sacrifice d’expiation, et on l’amènera devant la tente d’assignation. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les anciens d’Israël poseront leurs mains sur la tête du taureau devant l’Éternel, et on égorgera le taureau devant l’Éternel. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur ayant reçu l’onction apportera du sang du taureau dans la tente d’assignation; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il trempera son doigt dans le sang, et il en fera sept fois l’aspersion devant l’Éternel, en face du voile. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il mettra du sang sur les cornes de l’autel qui est devant l’Éternel dans la tente d’assignation; et il répandra tout le sang au pied de l’autel des holocaustes, qui est à l’entrée de la tente d’assignation. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il enlèvera toute la graisse du taureau, et il la brûlera sur l’autel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parle aux enfants d’Israël, et dis: Lorsque quelqu’un péchera involontairement contre l’un des commandements de l’Éternel, en faisant des choses qui ne doivent point se faire; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fera de ce taureau comme du taureau expiatoire; il fera de même. C’est ainsi que le sacrificateur fera pour eux l’expiation, et il leur sera pardonné. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il emportera le taureau hors du camp, et il le brûlera comme le premier taureau. C’est un sacrifice d’expiation pour l’assemblée.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-35: cf. No 15:27-31. Lé 5:1-13.'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si c’est un chef qui a péché, en faisant involontairement contre l’un des commandements de l’Éternel, son Dieu, des choses qui ne doivent point se faire et en se rendant ainsi coupable, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et qu’il vienne à découvrir le péché qu’il a commis, il offrira en sacrifice un bouc mâle sans défaut. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il posera sa main sur la tête du bouc, qu’il égorgera dans le lieu où l’on égorge les holocaustes devant l’Éternel. C’est un sacrifice d’expiation. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur prendra avec son doigt du sang de la victime expiatoire, il en mettra sur les cornes de l’autel des holocaustes, et il répandra le sang au pied de l’autel des holocaustes. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il brûlera toute la graisse sur l’autel, comme la graisse du sacrifice d’actions de grâces. C’est ainsi que le sacrificateur fera pour ce chef l’expiation de son péché, et il lui sera pardonné. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 15:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si c’est quelqu’un du peuple qui a péché involontairement, en faisant contre l’un des commandements de l’Éternel des choses qui ne doivent point se faire et en se rendant ainsi coupable, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et qu’il vienne à découvrir le péché qu’il a commis, il offrira en sacrifice une chèvre, une femelle sans défaut, pour le péché qu’il a commis. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il posera sa main sur la tête de la victime expiatoire, qu’il égorgera dans le lieu où l’on égorge les holocaustes. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si c’est le sacrificateur ayant reçu l’onction qui a péché et a rendu par là le peuple coupable, il offrira à l’Éternel, pour le péché qu’il a commis, un jeune taureau sans défaut, en sacrifice d’expiation. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur prendra avec son doigt du sang de la victime, il en mettra sur les cornes de l’autel des holocaustes, et il répandra tout le sang au pied de l’autel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 3:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le sacrificateur ôtera toute la graisse, comme on ôte la graisse du sacrifice d’actions de grâces, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il la brûlera sur l’autel, et elle sera d’une agréable odeur à l’Éternel. C’est ainsi que le sacrificateur fera pour cet homme l’expiation, et il lui sera pardonné. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il offre un agneau en sacrifice d’expiation, il offrira une femelle sans défaut. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il posera sa main sur la tête de la victime, qu’il égorgera en sacrifice d’expiation dans le lieu où l’on égorge les holocaustes. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur prendra avec son doigt du sang de la victime, il en mettra sur les cornes de l’autel des holocaustes, et il répandra tout le sang au pied de l’autel. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le sacrificateur ôtera toute la graisse, comme on ôte la graisse de l’agneau dans le sacrifice d’actions de grâces, et il la brûlera sur l’autel, comme un sacrifice consumé par le feu devant l’Éternel. C’est ainsi que le sacrificateur fera pour cet homme l’expiation du péché qu’il a commis, et il lui sera pardonné.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il amènera le taureau à l’entrée de la tente d’assignation, devant l’Éternel; et il posera sa main sur la tête du taureau, qu’il égorgera devant l’Éternel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur ayant reçu l’onction prendra '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 16:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 19:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'du sang du taureau, et l’apportera dans la tente d’assignation; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il trempera son doigt dans le sang, et il en fera sept fois l’aspersion devant l’Éternel, en face du voile du sanctuaire. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur mettra du sang '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 9:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'sur les cornes de l’autel des parfums odoriférants, qui est devant l’Éternel dans la tente d’assignation; et il répandra tout le sang du taureau au pied de l’autel des holocaustes, qui est à l’entrée de la tente d’assignation. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il enlèvera toute la graisse du taureau expiatoire, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 3:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'la graisse qui couvre les entrailles et toute celle qui y est attachée, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les deux rognons, et la graisse qui les entoure, qui couvre les flancs, et le grand lobe du foie, qu’il détachera près des rognons. '
