document_id: REV.INTRO1,93
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION À L’APOCALYPSE
  - type: text
    content: (No 24:14-17. És 26:8, 9. So 1:14-18.)
  - type: text
    content: Dernier livre du Nouveau Testament et de toute la Bible, l’Apocalypse, est aussi unique en son genre. Son auteur se nomme Jean (1:1, 4, 9; 22:8) sans autre précision exacte sur sa personne. Malgré ce silence, on l’identifie à partir des données textuelles et littéraires avec l’auteur du quatrième évangile qui serait aussi celui des trois épîtres porteuses du même nom (voir les introductions à l’évangile et aux épîtres de Jean).
  - type: text
    content: 'Une allusion est faite aux destinataires en ces termes: '
  - type: text
    content: '«… aux sept Églises qui sont en Asie» '
  - type: text
    content: '(1:4) ou '
  - type: text
    content: «Ce que tu vois, écris-le dans un livre, et envoie-le aux sept Églises, à Éphèse, à Smyrne, à Pergame, à Thyatire, à Sardes, à Philadelphie et à Laodicée»
  - type: text
    content: ' (1:11). Le nombre sept peut toutefois apparaître comme un symbole de plénitude. Par conséquent, l’auteur, à travers ces communautés, adresse en fait son enseignement et son message à toutes les communautés chrétiennes à travers le monde. Les grands développements de ce livre important sont:'
  - type: text
    content: '1. Le titre et le sujet du livre '
  - type: text
    content: 1:1-3
  - type: text
    content: '2. Les lettres aux sept Églises '
  - type: text
    content: 1:4–3:22
  - type: text
    content: '3. Le trône de la majesté divine '
  - type: text
    content: 4:1-11
  - type: text
    content: '4. Le livre scellé de sept sceaux: ouverture sceau par sceau '
  - type: text
    content: 5:1–8:5
  - type: text
    content: '5. Les sept anges avec les sept trompettes à sonner '
  - type: text
    content: 8:6–14:20
  - type: text
    content: '6. Les sept anges et les sept coupes à verser '
  - type: text
    content: 15:1–16:21
  - type: text
    content: '7. La chute de Babylone, victoire sur la bête et sur le faux prophète '
  - type: text
    content: 17:1–19:21
  - type: text
    content: '8. Satan lié pour mille ans, puis délié et vaincu pour toujours '
  - type: text
    content: 20:1-10
  - type: text
    content: '9. Le jugement dernier: nouveaux cieux, nouvelle terre, nouvelle Jérusalem '
  - type: text
    content: 20:11–22:5
  - type: text
    content: '10. Conclusion du livre '
  - type: text
    content: 22:6-21
  - type: text
    content: 'Le titre «Apocalypse» indique le contenu du livre. Il s’agit de la «révélation de Jésus-Christ…» (1:1). Le mot «révélation» est la traduction en français du mot grec «apocalupsis». Il s’agit d’un genre littéraire particulier, bien connu dans l’Église primitive, où le mot servait de terme technique indiquant les manifestations glorieuses du Christ à la fin des temps (Rom 2:5; 1 Cor 1:7; 2 Thess 1:7; 1 Pi 1:7, 13). À partir de son étymologie en grec, il signifie: découvrir ce qui est couvert, dévoiler ce qui est voilé. Ainsi, quand on parle de l’Apocalypse, il s’agit du dévoilement, de la révélation des choses qui étaient jusque-là cachées. Du point de vue biblique, et en rapport avec la divinité, il s’agit dans le livre de l’Apocalypse du dévoilement tout particulier de l’avenir de ce que sera la fin des temps.'
  - type: text
    content: 'Le livre traite du jugement dernier: '
  - type: text
    content: «Craignez Dieu, et donnez-lui gloire, car l’heure de son jugement est venue»
  - type: text
    content: ' (14:7; 15:4; 16:5; 17:1; 18:10). Ce jugement est perçu à travers l’annonce de la mort du Christ présentée comme la victoire sur Satan, l’accusateur par excellence des élus de Dieu. Satan est définitivement battu par Jésus-Christ que Dieu a couronné roi du monde. Trois titres sont donnés à Jésus: il est le témoin fidèle, le premier-né d’entre les morts et le prince des rois de la terre (1:5). C’est à travers cette triple fonction que Jésus réalise la rédemption universelle qui permet à tous ceux qui croient de vivre pour Dieu et d’entrer dans son règne éternel en se retrouvant au-delà du jugement dernier.'
  - type: text
    content: 'L’Apocalypse de Jean n’est cependant pas le seul représentant de ce style, ni dans le Nouveau Testament, ni dans l’ensemble de la Bible. Le genre littéraire apocalyptique fleurit dans le judaïsme entre 150 av. J.-C. et 100 apr. J.-C. Ceux qui en ont fait usage avaient le souci et la prétention d’apporter, par révélation, la connaissance des choses cachées du passé, du présent et de l’avenir, connaissance qui débouche sur l’annonce de la fin. Voici quelques séquences apocalyptiques relevées dans les autres livres du Nouveau Testament: Matt 24:1–25:46; Marc 13; 1 Cor 15:35-57; 1 Thess 4:13–5:11; 2 Thess 1:4-10; 2:1-12. En quoi ce livre est-il donc particulier? Contrairement à ces exemples, il est entièrement consacré à ce dévoilement.'
