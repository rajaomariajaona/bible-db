document_id: LUK.22,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Histoire de la passion. Complot contre Jésus. Trahison de Judas
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. (Mt 26:1-16. Mc 14:1-11.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 12:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'La fête des pains sans levain, appelée la Pâque, approchait. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Voici, quand vous serez entrés dans la ville, vous rencontrerez un homme portant une cruche d’eau; suivez-le dans la maison où il entrera,
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'et vous direz au maître de la maison: Le maître te dit: Où est le lieu où je mangerai la Pâque avec mes disciples?'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Et il vous montrera une grande chambre haute, meublée: c’est là que vous préparerez la Pâque.'
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils partirent, et trouvèrent les choses comme il le leur avait dit; et ils préparèrent la Pâque. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'L’heure étant venue, il se mit à table, et les apôtres avec lui. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: J’ai désiré vivement manger cette Pâque avec vous, avant de souffrir;
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: car, je vous le dis, je ne la mangerai plus, jusqu’à ce qu’elle soit accomplie dans le royaume de Dieu.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et, ayant pris une coupe et rendu grâces, il dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Prenez cette coupe, et distribuez-la entre vous;
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: car, je vous le dis, je ne boirai plus désormais du fruit de la vigne, jusqu’à ce que le royaume de Dieu soit venu.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 19-20: cf. (Mt 26:26-29. Mc 14:22-25. 1 Co 11:23-29.)'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 11:23
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ensuite il prit du pain; et, après avoir rendu grâces, il le rompit, et le leur donna, en disant: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ceci est mon corps, qui est donné pour vous; faites ceci en mémoire de moi.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 2:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 11:47
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 4:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les principaux sacrificateurs et les scribes cherchaient les moyens de faire mourir Jésus; car ils craignaient le peuple. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il prit de même la coupe, après le souper, et la leur donna, en disant: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Cette coupe est la nouvelle alliance en mon sang, qui est répandu pour vous.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 21-23: cf. (Mt 26:21-25. Mc 14:18-21. Jn 13:18-30.)'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 13:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Cependant voici, la main de celui qui me livre est avec moi à cette table.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le Fils de l’homme s’en va
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 41:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 13:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: selon ce qui est déterminé. Mais malheur à l’homme par qui il est livré!
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et ils commencèrent à se demander les uns aux autres qui était celui d’entre eux qui ferait cela.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Qui est le plus grand?
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 24-30: cf. Jn 13:2-17. (Mt 18:1-4. Mc 10:35-45.)'
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il s’éleva aussi parmi les apôtres une contestation: lequel d’entre eux devait être estimé le plus grand? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 20:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 10:42
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Les rois des nations les maîtrisent, et ceux qui les dominent sont appelés bienfaiteurs.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 5:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Qu’il n’en soit pas de même pour vous.
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:48
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais que le plus grand parmi vous soit comme le plus petit, et celui qui gouverne comme celui qui sert.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car quel est le plus grand, celui qui est à table, ou celui qui sert? N’est-ce pas celui qui est à table?
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 20:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 13:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 2:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et moi, cependant, je suis au milieu de vous comme celui qui sert.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous, vous êtes ceux qui avez persévéré avec moi dans mes épreuves;
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 12:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: c’est pourquoi je dispose du royaume en votre faveur, comme mon Père en a disposé en ma faveur,
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 13:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Or, Satan entra dans Judas, surnommé Iscariot, qui était du nombre des douze. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: afin que vous mangiez et buviez à ma table dans mon royaume, et que vous
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 19:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 3:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: soyez assis sur des trônes, pour juger les douze tribus d’Israël.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 31-38: cf. (Jn 13:31-38. Mt 26:30-35. Mc 14:29-31.)'
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Seigneur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Simon, Simon,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 5:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Satan vous a réclamés, pour vous cribler comme le froment.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais j’ai prié pour toi, afin que ta foi ne défaille point; et toi, quand tu seras converti, affermis tes frères.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seigneur, lui dit Pierre, je suis prêt à aller avec toi et en prison et à la mort. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jésus dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 13:38
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pierre, je te le dis, le coq ne chantera pas aujourd’hui que tu n’aies nié trois fois de me connaître.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur dit encore: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 6:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Quand je vous ai envoyés sans bourse, sans sac, et sans souliers, avez-vous manqué de quelque chose?
    - type: text
      text: ' Ils répondirent: De rien. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Maintenant, au contraire, que celui qui a une bourse la prenne et que celui qui a un sac le prenne également, que celui qui n’a point d’épée vende son vêtement et achète une épée.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Car, je vous le dis, il faut que cette parole qui est écrite s’accomplisse en moi:'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 53:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 15:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il a été mis au nombre des malfaiteurs. Et ce qui me concerne est sur le point d’arriver.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils dirent: Seigneur, voici deux épées. Et il leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Cela suffit.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gethsémané
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 39-46: cf. (Mt 26:36-46. Mc 14:32-42. Jn 18:1, 2.)'
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:36
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 8:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Après être sorti, il alla, selon sa coutume, à la montagne des oliviers. Ses disciples le suivirent. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Judas alla s’entendre avec les principaux sacrificateurs et les chefs des gardes, sur la manière de le leur livrer. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’il fut arrivé dans ce lieu, il leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Priez, afin que vous ne tombiez pas en tentation.
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:39
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Puis il s’éloigna d’eux à la distance d’environ un jet de pierre, et, s’étant mis à genoux, il pria, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'disant: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Père, si tu voulais éloigner de moi cette coupe! Toutefois, que ma volonté ne se fasse pas,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6:38
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: mais la tienne.
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors un ange lui apparut du ciel, pour le fortifier. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 12:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 5:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Étant en agonie, il priait plus instamment, et sa sueur devint comme des grumeaux de sang, qui tombaient à terre. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir prié, il se leva, et vint vers les disciples, qu’il trouva endormis de tristesse, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et il leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pourquoi dormez-vous? Levez-vous et priez, afin que vous ne tombiez pas en tentation.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Arrestation de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 47-53: cf. (Mt 26:47-56. Mc 14:43-50. Jn 18:3-12.)'
    marker-yv: yv-h
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:47
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:43
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 18:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Comme il parlait encore, voici, une foule arriva; et celui qui s’appelait Judas, l’un des douze, marchait devant elle. Il s’approcha de Jésus, pour le baiser. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jésus lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Judas, c’est par un baiser que tu livres le Fils de l’homme!
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui étaient avec Jésus, voyant ce qui allait arriver, dirent: Seigneur, frapperons-nous de l’épée? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils furent dans la joie, et ils convinrent de lui donner de l’argent. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:51
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:47
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et l’un d’eux frappa le serviteur du souverain sacrificateur, et lui emporta l’oreille droite. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus, prenant la parole, dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Laissez, arrêtez!
    - type: text
      text: ' Et, ayant touché l’oreille de cet homme, il le guérit. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:55
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:48
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus dit ensuite aux principaux sacrificateurs, aux chefs des gardes du temple, et aux anciens, qui étaient venus contre lui: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous êtes venus, comme après un brigand, avec des épées et des bâtons.
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: J’étais tous les jours avec vous dans le temple, et vous n’avez pas mis la main sur moi. Mais c’est ici votre heure, et la puissance des ténèbres.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Reniement de Pierre
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 54-62: cf. (Mt 26:57, 58, 69-75. Mc 14:53, 54, 66-72. Jn 18:13-18, 25-27.)'
    marker-yv: yv-h
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:57
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:53
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 18:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Après avoir saisi Jésus, ils l’emmenèrent, et le conduisirent dans la maison du souverain sacrificateur. Pierre suivait de loin. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:69
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:54
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '66'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 18:16
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils allumèrent du feu au milieu de la cour, et ils s’assirent. Pierre s’assit parmi eux. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une servante, qui le vit assis devant le feu, fixa sur lui les regards, et dit: Cet homme était aussi avec lui. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il le nia disant: Femme, je ne le connais pas. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peu après, un autre, l’ayant vu, dit: Tu es aussi de ces gens-là. Et Pierre dit: Homme, je n’en suis pas. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Environ une heure plus tard, un autre insistait, disant: Certainement cet homme était aussi avec lui, car il est Galiléen. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après s’être engagé, il cherchait une occasion favorable pour leur livrer Jésus à l’insu de la foule.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Célébration de la Pâque et institution de la sainte cène
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-18: cf. (Mt 26:17-20. Mc 14:12-17.) Ex 12.'
    marker-yv: yv-h
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre répondit: Homme, je ne sais ce que tu dis. Au même instant, comme il parlait encore, le coq chanta. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Seigneur, s’étant retourné, regarda Pierre. Et Pierre se souvint de la parole que le Seigneur lui avait dite: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:34
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '75'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:72
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 13:38
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Avant que le coq chante aujourd’hui, tu me renieras trois fois.
    - type: text
      text: ' '
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et étant sorti, il pleura amèrement.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus devant le sanhédrin présidé par Caïphe. Condamnation
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 63-71: cf. Jn 18:19-24. (Mt 26:67, 68; 27:1. Mc 14:65; 15:1.)'
    marker-yv: yv-h
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:67
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:65
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les hommes qui tenaient Jésus se moquaient de lui, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 16:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 50:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 19:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le frappaient. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui voilèrent le visage, et ils l’interrogeaient, en disant: Devine qui t’a frappé. '
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ils proféraient contre lui beaucoup d’autres injures. '
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 2:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 15:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 18:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand le jour fut venu, le collège des anciens du peuple, les principaux sacrificateurs et les scribes, s’assemblèrent, et firent amener Jésus dans leur sanhédrin. '
  '67':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils dirent: Si tu es le Christ, dis-le nous. Jésus leur répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si je vous le dis, vous ne le croirez pas;
  '68':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et, si je vous interroge, vous ne répondrez pas.
    - type: text
      text: ' '
  '69':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Da 7:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:30
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:64
      - type: text
        text: '. Mc 15:62. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 1:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 1:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Désormais le Fils de l’homme sera assis à la droite de la puissance de Dieu.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le jour des pains sans levain, où l’on devait immoler la Pâque, arriva, '
  '70':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous dirent: Tu es donc le Fils de Dieu? Et il leur répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous le dites, je le suis.
    - type: text
      text: ' '
  '71':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors ils dirent: Qu’avons-nous encore besoin de témoignage? Nous l’avons entendu nous-mêmes de sa bouche.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et Jésus envoya Pierre et Jean, en disant: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Allez nous préparer la Pâque, afin que nous la mangions.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui dirent: Où veux-tu que nous la préparions? '
