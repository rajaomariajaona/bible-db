document_id: LUK.22,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Histoire de la passion. Complot contre Jésus. Trahison de Judas
  - type: heading
    content: 'V. 1-6: cf. (Mt 26:1-16. Mc 14:1-11.)'
  - type: text
    content: ' '
  - type: note
    content: Ex 12:15. Mt 26:2. Mc 14:1.
  - type: text
    content: 'La fête des pains sans levain, appelée la Pâque, approchait. '
  '10':
  - type: text
    content: 'Il leur répondit: '
  - type: text
    content: Voici, quand vous serez entrés dans la ville, vous rencontrerez un homme portant une cruche d’eau; suivez-le dans la maison où il entrera,
  '11':
  - type: text
    content: ' '
  - type: text
    content: 'et vous direz au maître de la maison: Le maître te dit: Où est le lieu où je mangerai la Pâque avec mes disciples?'
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Et il vous montrera une grande chambre haute, meublée: c’est là que vous préparerez la Pâque.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Ils partirent, et trouvèrent les choses comme il le leur avait dit; et ils préparèrent la Pâque. '
  '14':
  - type: note
    content: Mt 26:20. Mc 14:17.
  - type: text
    content: 'L’heure étant venue, il se mit à table, et les apôtres avec lui. '
  '15':
  - type: text
    content: 'Il leur dit: '
  - type: text
    content: J’ai désiré vivement manger cette Pâque avec vous, avant de souffrir;
  '16':
  - type: text
    content: ' '
  - type: text
    content: car, je vous le dis, je ne la mangerai plus, jusqu’à ce qu’elle soit accomplie dans le royaume de Dieu.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Et, ayant pris une coupe et rendu grâces, il dit: '
  - type: text
    content: Prenez cette coupe, et distribuez-la entre vous;
  '18':
  - type: text
    content: ' '
  - type: text
    content: car, je vous le dis, je ne boirai plus désormais du fruit de la vigne, jusqu’à ce que le royaume de Dieu soit venu.
  - type: heading
    content: 'V. 19-20: cf. (Mt 26:26-29. Mc 14:22-25. 1 Co 11:23-29.)'
  '19':
  - type: text
    content: ' '
  - type: note
    content: Mt 26:26. Mc 14:22. 1 Co 11:23, 24.
  - type: text
    content: 'Ensuite il prit du pain; et, après avoir rendu grâces, il le rompit, et le leur donna, en disant: '
  - type: text
    content: Ceci est mon corps, qui est donné pour vous; faites ceci en mémoire de moi.
  - type: text
    content: ' '
  '2':
  - type: note
    content: Ps 2:2. Jn 11:47. Ac 4:27.
  - type: text
    content: 'Les principaux sacrificateurs et les scribes cherchaient les moyens de faire mourir Jésus; car ils craignaient le peuple. '
  '20':
  - type: text
    content: 'Il prit de même la coupe, après le souper, et la leur donna, en disant: '
  - type: text
    content: Cette coupe est la nouvelle alliance en mon sang, qui est répandu pour vous.
  - type: heading
    content: 'V. 21-23: cf. (Mt 26:21-25. Mc 14:18-21. Jn 13:18-30.)'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Mt 26:23. Mc 14:18. Jn 13:21.
  - type: text
    content: Cependant voici, la main de celui qui me livre est avec moi à cette table.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Le Fils de l’homme s’en va
  - type: text
    content: ' '
  - type: note
    content: Ps 41:10. Jn 13:18. Ac 1:16.
  - type: text
    content: selon ce qui est déterminé. Mais malheur à l’homme par qui il est livré!
  - type: text
    content: ' '
  '23':
  - type: text
    content: Et ils commencèrent à se demander les uns aux autres qui était celui d’entre eux qui ferait cela.
  - type: heading
    content: Qui est le plus grand?
  - type: heading
    content: 'V. 24-30: cf. Jn 13:2-17. (Mt 18:1-4. Mc 10:35-45.)'
  '24':
  - type: text
    content: 'Il s’éleva aussi parmi les apôtres une contestation: lequel d’entre eux devait être estimé le plus grand? '
  '25':
  - type: text
    content: 'Jésus leur dit: '
  - type: note
    content: Mt 20:25. Mc 10:42.
  - type: text
    content: Les rois des nations les maîtrisent, et ceux qui les dominent sont appelés bienfaiteurs.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 1 Pi 5:3.
  - type: text
    content: Qu’il n’en soit pas de même pour vous.
  - type: text
    content: ' '
  - type: note
    content: Lu 9:48.
  - type: text
    content: Mais que le plus grand parmi vous soit comme le plus petit, et celui qui gouverne comme celui qui sert.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Car quel est le plus grand, celui qui est à table, ou celui qui sert? N’est-ce pas celui qui est à table?
  - type: text
    content: ' '
  - type: note
    content: Mt 20:28. Jn 13:14. Ph 2:7.
  - type: text
    content: Et moi, cependant, je suis au milieu de vous comme celui qui sert.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Vous, vous êtes ceux qui avez persévéré avec moi dans mes épreuves;
  - type: text
    content: ' '
  '29':
  - type: note
    content: Lu 12:32.
  - type: text
    content: c’est pourquoi je dispose du royaume en votre faveur, comme mon Père en a disposé en ma faveur,
  - type: text
    content: ' '
  '3':
  - type: note
    content: Mt 26:14. Mc 14:10. Jn 13:27.
  - type: text
    content: 'Or, Satan entra dans Judas, surnommé Iscariot, qui était du nombre des douze. '
  '30':
  - type: text
    content: afin que vous mangiez et buviez à ma table dans mon royaume, et que vous
  - type: text
    content: ' '
  - type: note
    content: Mt 19:28. Ap 3:21.
  - type: text
    content: soyez assis sur des trônes, pour juger les douze tribus d’Israël.
  - type: heading
    content: 'V. 31-38: cf. (Jn 13:31-38. Mt 26:30-35. Mc 14:29-31.)'
  '31':
  - type: text
    content: 'Le Seigneur dit: '
  - type: text
    content: Simon, Simon,
  - type: text
    content: ' '
  - type: note
    content: 1 Pi 5:8.
  - type: text
    content: Satan vous a réclamés, pour vous cribler comme le froment.
  '32':
  - type: text
    content: ' '
  - type: text
    content: Mais j’ai prié pour toi, afin que ta foi ne défaille point; et toi, quand tu seras converti, affermis tes frères.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Seigneur, lui dit Pierre, je suis prêt à aller avec toi et en prison et à la mort. '
  '34':
  - type: text
    content: 'Et Jésus dit: '
  - type: note
    content: Mt 26:34. Mc 14:30. Jn 13:38.
  - type: text
    content: Pierre, je te le dis, le coq ne chantera pas aujourd’hui que tu n’aies nié trois fois de me connaître.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Il leur dit encore: '
  - type: note
    content: Mt 10:9. Mc 6:8. Lu 9:3.
  - type: text
    content: Quand je vous ai envoyés sans bourse, sans sac, et sans souliers, avez-vous manqué de quelque chose?
  - type: text
    content: ' Ils répondirent: De rien. '
  '36':
  - type: text
    content: 'Et il leur dit: '
  - type: text
    content: Maintenant, au contraire, que celui qui a une bourse la prenne et que celui qui a un sac le prenne également, que celui qui n’a point d’épée vende son vêtement et achète une épée.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Car, je vous le dis, il faut que cette parole qui est écrite s’accomplisse en moi:'
  - type: text
    content: ' '
  - type: note
    content: És 53:12. Mc 15:28.
  - type: text
    content: Il a été mis au nombre des malfaiteurs. Et ce qui me concerne est sur le point d’arriver.
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'Ils dirent: Seigneur, voici deux épées. Et il leur dit: '
  - type: text
    content: Cela suffit.
  - type: heading
    content: Gethsémané
  - type: heading
    content: 'V. 39-46: cf. (Mt 26:36-46. Mc 14:32-42. Jn 18:1, 2.)'
  '39':
  - type: text
    content: ' '
  - type: note
    content: Mt 26:36. Mc 14:32. Jn 8:1; 18:1.
  - type: text
    content: 'Après être sorti, il alla, selon sa coutume, à la montagne des oliviers. Ses disciples le suivirent. '
  '4':
  - type: text
    content: 'Et Judas alla s’entendre avec les principaux sacrificateurs et les chefs des gardes, sur la manière de le leur livrer. '
  '40':
  - type: text
    content: 'Lorsqu’il fut arrivé dans ce lieu, il leur dit: '
  - type: text
    content: Priez, afin que vous ne tombiez pas en tentation.
  - type: text
    content: ' '
  '41':
  - type: note
    content: Mt 26:39. Mc 14:35.
  - type: text
    content: 'Puis il s’éloigna d’eux à la distance d’environ un jet de pierre, et, s’étant mis à genoux, il pria, '
  '42':
  - type: text
    content: 'disant: '
  - type: text
    content: Père, si tu voulais éloigner de moi cette coupe! Toutefois, que ma volonté ne se fasse pas,
  - type: text
    content: ' '
  - type: note
    content: Jn 6:38.
  - type: text
    content: mais la tienne.
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'Alors un ange lui apparut du ciel, pour le fortifier. '
  '44':
  - type: note
    content: Jn 12:27. Hé 5:7.
  - type: text
    content: 'Étant en agonie, il priait plus instamment, et sa sueur devint comme des grumeaux de sang, qui tombaient à terre. '
  '45':
  - type: text
    content: 'Après avoir prié, il se leva, et vint vers les disciples, qu’il trouva endormis de tristesse, '
  '46':
  - type: text
    content: 'et il leur dit: '
  - type: text
    content: Pourquoi dormez-vous? Levez-vous et priez, afin que vous ne tombiez pas en tentation.
  - type: heading
    content: Arrestation de Jésus
  - type: heading
    content: 'V. 47-53: cf. (Mt 26:47-56. Mc 14:43-50. Jn 18:3-12.)'
  '47':
  - type: text
    content: ' '
  - type: note
    content: Mt 26:47. Mc 14:43. Jn 18:3.
  - type: text
    content: 'Comme il parlait encore, voici, une foule arriva; et celui qui s’appelait Judas, l’un des douze, marchait devant elle. Il s’approcha de Jésus, pour le baiser. '
  '48':
  - type: text
    content: 'Et Jésus lui dit: '
  - type: text
    content: Judas, c’est par un baiser que tu livres le Fils de l’homme!
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'Ceux qui étaient avec Jésus, voyant ce qui allait arriver, dirent: Seigneur, frapperons-nous de l’épée? '
  '5':
  - type: text
    content: 'Ils furent dans la joie, et ils convinrent de lui donner de l’argent. '
  '50':
  - type: note
    content: Mt 26:51. Mc 14:47.
  - type: text
    content: 'Et l’un d’eux frappa le serviteur du souverain sacrificateur, et lui emporta l’oreille droite. '
  '51':
  - type: text
    content: 'Mais Jésus, prenant la parole, dit: '
  - type: text
    content: Laissez, arrêtez!
  - type: text
    content: ' Et, ayant touché l’oreille de cet homme, il le guérit. '
  '52':
  - type: note
    content: Mt 26:55. Mc 14:48.
  - type: text
    content: 'Jésus dit ensuite aux principaux sacrificateurs, aux chefs des gardes du temple, et aux anciens, qui étaient venus contre lui: '
  - type: text
    content: Vous êtes venus, comme après un brigand, avec des épées et des bâtons.
  '53':
  - type: text
    content: ' '
  - type: text
    content: J’étais tous les jours avec vous dans le temple, et vous n’avez pas mis la main sur moi. Mais c’est ici votre heure, et la puissance des ténèbres.
  - type: heading
    content: Reniement de Pierre
  - type: heading
    content: 'V. 54-62: cf. (Mt 26:57, 58, 69-75. Mc 14:53, 54, 66-72. Jn 18:13-18, 25-27.)'
  '54':
  - type: text
    content: ' '
  - type: note
    content: Mt 26:57. Mc 14:53. Jn 18:12, 24.
  - type: text
    content: 'Après avoir saisi Jésus, ils l’emmenèrent, et le conduisirent dans la maison du souverain sacrificateur. Pierre suivait de loin. '
  '55':
  - type: note
    content: Mt 26:69. Mc 14:54, 66. Jn 18:16, 25.
  - type: text
    content: 'Ils allumèrent du feu au milieu de la cour, et ils s’assirent. Pierre s’assit parmi eux. '
  '56':
  - type: text
    content: 'Une servante, qui le vit assis devant le feu, fixa sur lui les regards, et dit: Cet homme était aussi avec lui. '
  '57':
  - type: text
    content: 'Mais il le nia disant: Femme, je ne le connais pas. '
  '58':
  - type: text
    content: 'Peu après, un autre, l’ayant vu, dit: Tu es aussi de ces gens-là. Et Pierre dit: Homme, je n’en suis pas. '
  '59':
  - type: text
    content: 'Environ une heure plus tard, un autre insistait, disant: Certainement cet homme était aussi avec lui, car il est Galiléen. '
  '6':
  - type: text
    content: Après s’être engagé, il cherchait une occasion favorable pour leur livrer Jésus à l’insu de la foule.
  - type: heading
    content: Célébration de la Pâque et institution de la sainte cène
  - type: heading
    content: 'V. 7-18: cf. (Mt 26:17-20. Mc 14:12-17.) Ex 12.'
  '60':
  - type: text
    content: 'Pierre répondit: Homme, je ne sais ce que tu dis. Au même instant, comme il parlait encore, le coq chanta. '
  '61':
  - type: text
    content: 'Le Seigneur, s’étant retourné, regarda Pierre. Et Pierre se souvint de la parole que le Seigneur lui avait dite: '
  - type: note
    content: Mt 26:34, 75. Mc 14:72. Jn 13:38; 18:27.
  - type: text
    content: Avant que le coq chante aujourd’hui, tu me renieras trois fois.
  - type: text
    content: ' '
  '62':
  - type: text
    content: Et étant sorti, il pleura amèrement.
  - type: heading
    content: Jésus devant le sanhédrin présidé par Caïphe. Condamnation
  - type: heading
    content: 'V. 63-71: cf. Jn 18:19-24. (Mt 26:67, 68; 27:1. Mc 14:65; 15:1.)'
  '63':
  - type: text
    content: ' '
  - type: note
    content: Mt 26:67. Mc 14:65.
  - type: text
    content: 'Les hommes qui tenaient Jésus se moquaient de lui, et '
  - type: note
    content: Job 16:10. És 50:6. Jn 19:3.
  - type: text
    content: 'le frappaient. '
  '64':
  - type: text
    content: 'Ils lui voilèrent le visage, et ils l’interrogeaient, en disant: Devine qui t’a frappé. '
  '65':
  - type: text
    content: 'Et ils proféraient contre lui beaucoup d’autres injures. '
  '66':
  - type: note
    content: Ps 2:2. Mt 27:1. Mc 15:1. Jn 18:28.
  - type: text
    content: 'Quand le jour fut venu, le collège des anciens du peuple, les principaux sacrificateurs et les scribes, s’assemblèrent, et firent amener Jésus dans leur sanhédrin. '
  '67':
  - type: text
    content: 'Ils dirent: Si tu es le Christ, dis-le nous. Jésus leur répondit: '
  - type: text
    content: Si je vous le dis, vous ne le croirez pas;
  '68':
  - type: text
    content: ' '
  - type: text
    content: et, si je vous interroge, vous ne répondrez pas.
  - type: text
    content: ' '
  '69':
  - type: note
    content: Da 7:9. Mt 16:27; 24:30; 25:31; 26:64. Mc 15:62. Ac 1:11. 1 Th 1:10. Ap 1:7.
  - type: text
    content: Désormais le Fils de l’homme sera assis à la droite de la puissance de Dieu.
  - type: text
    content: ' '
  '7':
  - type: text
    content: ' '
  - type: note
    content: Mt 26:17. Mc 14:12, 13.
  - type: text
    content: 'Le jour des pains sans levain, où l’on devait immoler la Pâque, arriva, '
  '70':
  - type: text
    content: 'Tous dirent: Tu es donc le Fils de Dieu? Et il leur répondit: '
  - type: text
    content: Vous le dites, je le suis.
  - type: text
    content: ' '
  '71':
  - type: text
    content: 'Alors ils dirent: Qu’avons-nous encore besoin de témoignage? Nous l’avons entendu nous-mêmes de sa bouche.'
  '8':
  - type: text
    content: 'et Jésus envoya Pierre et Jean, en disant: '
  - type: text
    content: Allez nous préparer la Pâque, afin que nous la mangions.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Ils lui dirent: Où veux-tu que nous la préparions? '
