document_id: REV.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ouverture des six premiers sceaux
  - type: heading
    content: 'V. 1-8: cf. (Za 1:8-10; 6:1-7.) 2 Co 2:14-16. (Mt 24:6-8. Éz 14:21.)'
  - type: text
    content: 'Je regardai, quand l’agneau ouvrit un des sept sceaux, et j’entendis l’un des quatre êtres vivants qui disait comme d’une voix de tonnerre: Viens. '
  '10':
  - type: text
    content: 'Ils crièrent d’une voix forte, en disant: Jusques à quand, Maître saint et véritable, tardes-tu à juger, et à tirer vengeance de notre sang sur les habitants de la terre? '
  '11':
  - type: text
    content: Une robe blanche fut donnée à chacun d’eux; et il leur fut dit de se tenir en repos quelque temps encore, jusqu’à ce que fût complet le nombre de leurs compagnons de service et de leurs frères qui devaient être mis à mort comme eux.
  - type: heading
    content: 'V. 12-17: cf. És 13:6-11. Lu 23:29, 30. Joë 3:16.'
  '12':
  - type: text
    content: 'Je regardai, quand il ouvrit le sixième sceau; et il y eut un grand tremblement de terre, '
  - type: note
    content: Ac 2:20.
  - type: text
    content: 'le soleil devint noir comme un sac de crin, la lune entière devint comme du sang, '
  '13':
  - type: text
    content: 'et les étoiles du ciel tombèrent sur la terre, comme lorsqu’un figuier secoué par un vent violent jette ses figues vertes. '
  '14':
  - type: text
    content: 'Le ciel se retira comme un livre qu’on roule; et toutes les montagnes et les îles furent remuées de leurs places. '
  '15':
  - type: text
    content: 'Les rois de la terre, les grands, les chefs militaires, les riches, les puissants, tous les esclaves et les hommes libres, se cachèrent dans les cavernes et dans les rochers des montagnes. '
  '16':
  - type: text
    content: 'Et ils disaient aux montagnes et aux rochers: '
  - type: note
    content: És 2:19. Os 10:8. Lu 23:30. Ap 9:6.
  - type: text
    content: 'Tombez sur nous, et cachez-nous devant la face de celui qui est assis sur le trône, et devant la colère de l’agneau; '
  '17':
  - type: text
    content: car le grand jour de sa colère est venu, et qui peut subsister?
  '2':
  - type: text
    content: 'Je regardai, et voici, parut '
  - type: note
    content: Ap 19:11.
  - type: text
    content: 'un cheval blanc. Celui qui le montait avait un arc; une couronne lui fut donnée, et il partit en vainqueur et pour vaincre. '
  '3':
  - type: text
    content: 'Quand il ouvrit le second sceau, j’entendis le second être vivant qui disait: Viens. '
  '4':
  - type: text
    content: 'Et il sortit un autre cheval, roux. Celui qui le montait reçut le pouvoir d’enlever la paix de la terre, afin que les hommes s’égorgeassent les uns les autres; et une grande épée lui fut donnée. '
  '5':
  - type: text
    content: 'Quand il ouvrit le troisième sceau, j’entendis le troisième être vivant qui disait: Viens. Je regardai, et voici, parut un cheval noir. Celui qui le montait tenait une balance dans sa main. '
  '6':
  - type: text
    content: 'Et j’entendis au milieu des quatre êtres vivants une voix qui disait: Une mesure de blé pour un denier, et trois mesures d’orge pour un denier; '
  - type: note
    content: Ap 9:4.
  - type: text
    content: 'mais ne fais point de mal à l’huile et au vin. '
  '7':
  - type: text
    content: 'Quand il ouvrit le quatrième sceau, j’entendis la voix du quatrième être vivant qui disait: Viens. '
  '8':
  - type: text
    content: Je regardai, et voici, parut un cheval d’une couleur pâle. Celui qui le montait se nommait la mort, et le séjour des morts l’accompagnait. Le pouvoir leur fut donné sur le quart de la terre, pour faire périr les hommes par l’épée, par la famine, par la mortalité, et par les bêtes sauvages de la terre.
  - type: heading
    content: 'V. 9-11: cf. (Ge 4:10. Lu 18:7, 8.) (Ap 7:13, 14.)'
  '9':
  - type: text
    content: 'Quand il ouvrit le cinquième sceau, je vis sous l’autel '
  - type: note
    content: Ap 20:4.
  - type: text
    content: 'les âmes de ceux qui avaient été immolés à cause de la parole de Dieu et à cause du '
  - type: note
    content: Ap 19:10.
  - type: text
    content: 'témoignage qu’ils avaient rendu. '
