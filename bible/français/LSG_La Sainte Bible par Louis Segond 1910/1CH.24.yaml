document_id: 1CH.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les sacrificateurs distribués en vingt-quatre classes. Les chefs des classes des Lévites
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-19: cf. 1 Ch 6:1-8, 49-53. 2 Ch 8:14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 10
      metadata:
        usfm: LEV.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Voici les classes des fils d’Aaron. Fils d’Aaron: Nadab, Abihu, Éléazar et Ithamar. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 10:2
      metadata:
        usfm: LEV.10.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 3:4
      metadata:
        usfm: NUM.3.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:61
      metadata:
        usfm: NUM.26.61
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nadab et Abihu moururent avant leur père, sans avoir de fils; et Éléazar et Ithamar remplirent les fonctions du sacerdoce. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David divisa les fils d’Aaron en les classant pour le service qu’ils avaient à faire; Tsadok appartenait aux descendants d’Éléazar, et Achimélec aux descendants d’Ithamar. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il se trouva parmi les fils d’Éléazar plus de chefs que parmi les fils d’Ithamar, et on en fit la division; les fils d’Éléazar avaient seize chefs de maisons paternelles, et les fils d’Ithamar huit chefs de maisons paternelles. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'On les classa par le sort, les uns avec les autres, car les chefs du sanctuaire et les chefs de Dieu étaient des fils d’Éléazar et des fils d’Ithamar. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Schemaeja, fils de Nethaneel, le secrétaire, de la tribu de Lévi, les inscrivit devant le roi et les princes, devant Tsadok, le sacrificateur, et Achimélec, fils d’Abiathar, et devant les chefs des maisons paternelles des sacrificateurs et des Lévites. On tira au sort une maison paternelle pour Éléazar, et on en tira une autre pour Ithamar. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le premier sort échut à Jehojarib; le second, à Jedaeja; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'le troisième, à Harim; le quatrième, à Seorim; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'le cinquième, à Malkija; le sixième, à Mijamin; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'le septième, à Hakkots; le huitième, à Abija; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'le neuvième, à Josué; le dixième, à Schecania; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'le onzième, à Éliaschib; le douzième, à Jakim; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'le treizième, à Huppa; le quatorzième, à Jeschébeab; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'le quinzième, à Bilga; le seizième, à Immer; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'le dix-septième, à Hézir; le dix-huitième, à Happitsets; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'le dix-neuvième, à Pethachja; le vingtième, à Ézéchiel; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'le vingt et unième, à Jakin; le vingt-deuxième, à Gamul; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'le vingt-troisième, à Delaja; le vingt-quatrième, à Maazia. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: C’est ainsi qu’ils furent classés pour leur service, afin qu’ils entrassent dans la maison de l’Éternel en se conformant à la règle établie par Aaron, leur père, d’après les ordres que lui avait donnés l’Éternel, le Dieu d’Israël.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-31: cf. (1 Ch 23:12-24; 26:23, etc.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Voici les chefs du reste des Lévites. Des fils d’Amram: Schubaël; des fils de Schubaël: Jechdia; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'de Rechabia, des fils de Rechabia: le chef Jischija. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Des Jitseharites: Schelomoth; des fils de Schelomoth: Jachath. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fils d’Hébron: Jerija, Amaria le second, Jachaziel le troisième, Jekameam le quatrième. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fils d’Uziel: Michée; des fils de Michée: Schamir; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'frère de Michée: Jischija; des fils de Jischija: Zacharie. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fils de Merari: Machli et Muschi, et les fils de Jaazija, son fils. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fils de Merari, de Jaazija, son fils: Schoham, Zaccur et Ibri. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'De Machli: Éléazar, qui n’eut point de fils; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'de Kis, les fils de Kis: Jerachmeel. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fils de Muschi: Machli, Éder et Jerimoth. Ce sont là les fils de Lévi, selon leurs maisons paternelles. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Eux aussi, comme leurs frères, les fils d’Aaron, ils tirèrent au sort devant le roi David, Tsadok et Achimélec, et les chefs des maisons paternelles des sacrificateurs et des Lévites. Il en fut ainsi pour chaque chef de maison comme pour le moindre de ses frères.
