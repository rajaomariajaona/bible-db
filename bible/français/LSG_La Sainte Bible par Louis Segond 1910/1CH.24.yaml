document_id: 1CH.24,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les sacrificateurs distribués en vingt-quatre classes. Les chefs des classes des Lévites
  - type: heading
    content: 'V. 1-19: cf. 1 Ch 6:1-8, 49-53. 2 Ch 8:14.'
  - type: text
    content: ' '
  - type: note
    content: Lé 10.
  - type: text
    content: 'Voici les classes des fils d’Aaron. Fils d’Aaron: Nadab, Abihu, Éléazar et Ithamar. '
  '10':
  - type: text
    content: 'le septième, à Hakkots; le huitième, à Abija; '
  '11':
  - type: text
    content: 'le neuvième, à Josué; le dixième, à Schecania; '
  '12':
  - type: text
    content: 'le onzième, à Éliaschib; le douzième, à Jakim; '
  '13':
  - type: text
    content: 'le treizième, à Huppa; le quatorzième, à Jeschébeab; '
  '14':
  - type: text
    content: 'le quinzième, à Bilga; le seizième, à Immer; '
  '15':
  - type: text
    content: 'le dix-septième, à Hézir; le dix-huitième, à Happitsets; '
  '16':
  - type: text
    content: 'le dix-neuvième, à Pethachja; le vingtième, à Ézéchiel; '
  '17':
  - type: text
    content: 'le vingt et unième, à Jakin; le vingt-deuxième, à Gamul; '
  '18':
  - type: text
    content: 'le vingt-troisième, à Delaja; le vingt-quatrième, à Maazia. '
  '19':
  - type: text
    content: C’est ainsi qu’ils furent classés pour leur service, afin qu’ils entrassent dans la maison de l’Éternel en se conformant à la règle établie par Aaron, leur père, d’après les ordres que lui avait donnés l’Éternel, le Dieu d’Israël.
  - type: heading
    content: 'V. 20-31: cf. (1 Ch 23:12-24; 26:23, etc.)'
  '2':
  - type: note
    content: Lé 10:2. No 3:4; 26:61.
  - type: text
    content: 'Nadab et Abihu moururent avant leur père, sans avoir de fils; et Éléazar et Ithamar remplirent les fonctions du sacerdoce. '
  '20':
  - type: text
    content: 'Voici les chefs du reste des Lévites. Des fils d’Amram: Schubaël; des fils de Schubaël: Jechdia; '
  '21':
  - type: text
    content: 'de Rechabia, des fils de Rechabia: le chef Jischija. '
  '22':
  - type: text
    content: 'Des Jitseharites: Schelomoth; des fils de Schelomoth: Jachath. '
  '23':
  - type: text
    content: 'Fils d’Hébron: Jerija, Amaria le second, Jachaziel le troisième, Jekameam le quatrième. '
  '24':
  - type: text
    content: 'Fils d’Uziel: Michée; des fils de Michée: Schamir; '
  '25':
  - type: text
    content: 'frère de Michée: Jischija; des fils de Jischija: Zacharie. '
  '26':
  - type: text
    content: 'Fils de Merari: Machli et Muschi, et les fils de Jaazija, son fils. '
  '27':
  - type: text
    content: 'Fils de Merari, de Jaazija, son fils: Schoham, Zaccur et Ibri. '
  '28':
  - type: text
    content: 'De Machli: Éléazar, qui n’eut point de fils; '
  '29':
  - type: text
    content: 'de Kis, les fils de Kis: Jerachmeel. '
  '3':
  - type: text
    content: 'David divisa les fils d’Aaron en les classant pour le service qu’ils avaient à faire; Tsadok appartenait aux descendants d’Éléazar, et Achimélec aux descendants d’Ithamar. '
  '30':
  - type: text
    content: 'Fils de Muschi: Machli, Éder et Jerimoth. Ce sont là les fils de Lévi, selon leurs maisons paternelles. '
  '31':
  - type: text
    content: Eux aussi, comme leurs frères, les fils d’Aaron, ils tirèrent au sort devant le roi David, Tsadok et Achimélec, et les chefs des maisons paternelles des sacrificateurs et des Lévites. Il en fut ainsi pour chaque chef de maison comme pour le moindre de ses frères.
  '4':
  - type: text
    content: 'Il se trouva parmi les fils d’Éléazar plus de chefs que parmi les fils d’Ithamar, et on en fit la division; les fils d’Éléazar avaient seize chefs de maisons paternelles, et les fils d’Ithamar huit chefs de maisons paternelles. '
  '5':
  - type: text
    content: 'On les classa par le sort, les uns avec les autres, car les chefs du sanctuaire et les chefs de Dieu étaient des fils d’Éléazar et des fils d’Ithamar. '
  '6':
  - type: text
    content: 'Schemaeja, fils de Nethaneel, le secrétaire, de la tribu de Lévi, les inscrivit devant le roi et les princes, devant Tsadok, le sacrificateur, et Achimélec, fils d’Abiathar, et devant les chefs des maisons paternelles des sacrificateurs et des Lévites. On tira au sort une maison paternelle pour Éléazar, et on en tira une autre pour Ithamar. '
  '7':
  - type: text
    content: 'Le premier sort échut à Jehojarib; le second, à Jedaeja; '
  '8':
  - type: text
    content: 'le troisième, à Harim; le quatrième, à Seorim; '
  '9':
  - type: text
    content: 'le cinquième, à Malkija; le sixième, à Mijamin; '
