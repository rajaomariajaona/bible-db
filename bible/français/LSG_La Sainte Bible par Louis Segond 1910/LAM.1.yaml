document_id: LAM.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les malheurs de Jérusalem
  - type: heading
    content: 'V. 1-22: cf. La 2; 4. Ps 79.'
  - type: text
    content: Eh quoi! Elle est assise solitaire, cette ville si peuplée!
  - type: text
    content: Elle est semblable à une veuve!
  - type: text
    content: Grande entre les nations, souveraine parmi les états,
  - type: text
    content: Elle est réduite à la servitude!
  '10':
  - type: text
    content: L’oppresseur a étendu la main
  - type: text
    content: Sur tout ce qu’elle avait de précieux;
  - type: text
    content: Elle a vu pénétrer dans son sanctuaire les nations
  - type: text
    content: Auxquelles tu avais défendu d’entrer dans ton assemblée.
  '11':
  - type: text
    content: 'Tout son peuple soupire, il cherche du '
  - type: note
    content: Jé 52:6.
  - type: text
    content: pain;
  - type: text
    content: Ils ont donné leurs choses précieuses pour de la nourriture,
  - type: text
    content: Afin de ranimer leur vie.
  - type: text
    content: Vois, Éternel, regarde comme je suis avilie!
  '12':
  - type: text
    content: Je m’adresse à vous, à vous tous qui passez ici!
  - type: text
    content: Regardez et voyez s’il est une douleur pareille à ma douleur,
  - type: text
    content: A celle dont j’ai été frappée!
  - type: text
    content: L’Éternel m’a affligée au jour de son ardente colère.
  '13':
  - type: text
    content: D’en haut il a lancé dans mes os un feu qui les dévore;
  - type: text
    content: Il a tendu un filet sous mes pieds,
  - type: text
    content: Il m’a fait tomber en arrière;
  - type: text
    content: Il m’a jetée dans la désolation, dans une langueur de tous les jours.
  '14':
  - type: text
    content: Sa main a lié le joug de mes iniquités;
  - type: text
    content: Elles se sont entrelacées, appliquées sur mon cou;
  - type: text
    content: Il a brisé ma force;
  - type: text
    content: Le Seigneur m’a livrée à des mains auxquelles je ne puis résister.
  '15':
  - type: text
    content: Le Seigneur a terrassé tous mes guerriers au milieu de moi;
  - type: text
    content: Il a rassemblé contre moi une armée,
  - type: text
    content: Pour détruire mes jeunes hommes;
  - type: text
    content: Le Seigneur a foulé au pressoir la vierge, fille de Juda.
  '16':
  - type: text
    content: 'C’est pour cela que je pleure, que mes '
  - type: note
    content: Jé 13:17.
  - type: text
    content: yeux fondent en larmes;
  - type: text
    content: Car il s’est éloigné de moi, celui qui me consolerait,
  - type: text
    content: Qui ranimerait ma vie.
  - type: text
    content: Mes fils sont dans la désolation, parce que l’ennemi a triomphé.
  '17':
  - type: text
    content: Sion a étendu les mains,
  - type: text
    content: Et personne ne l’a consolée;
  - type: text
    content: L’Éternel a envoyé contre Jacob les ennemis d’alentour;
  - type: text
    content: Jérusalem a été un objet d’horreur au milieu d’eux.
  '18':
  - type: text
    content: L’Éternel est juste,
  - type: text
    content: Car j’ai été rebelle à ses ordres.
  - type: text
    content: Écoutez, vous tous, peuples, et voyez ma douleur!
  - type: text
    content: Mes vierges et mes jeunes hommes sont allés en captivité.
  '19':
  - type: text
    content: 'J’ai appelé mes amis, et ils m’ont '
  - type: note
    content: Jé 30:14.
  - type: text
    content: trompée.
  - type: text
    content: 'Mes sacrificateurs et mes anciens ont expiré dans la ville:'
  - type: text
    content: Ils cherchaient de la nourriture,
  - type: text
    content: Afin de ranimer leur vie.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ps 6:7.
  - type: text
    content: Elle pleure durant la nuit, et ses joues sont couvertes de larmes;
  - type: text
    content: De tous ceux qui l’aimaient nul ne la console;
  - type: text
    content: Tous ses amis lui sont devenus infidèles,
  - type: text
    content: Ils sont devenus ses ennemis.
  '20':
  - type: text
    content: 'Éternel, regarde ma détresse! '
  - type: note
    content: És 16:11. Jé 48:36.
  - type: text
    content: Mes entrailles bouillonnent,
  - type: text
    content: Mon cœur est bouleversé au-dedans de moi,
  - type: text
    content: Car j’ai été rebelle.
  - type: text
    content: Au-dehors l’épée a fait ses ravages, au-dedans la mort.
  '21':
  - type: text
    content: On a entendu mes soupirs, et personne ne m’a consolée;
  - type: text
    content: Tous mes ennemis ont appris mon malheur,
  - type: text
    content: Ils se sont réjouis de ce que tu l’as causé;
  - type: text
    content: Tu amèneras, tu publieras le jour où ils seront comme moi.
  '22':
  - type: text
    content: Que toute leur méchanceté vienne devant toi,
  - type: text
    content: Et traite-les comme tu m’as traitée,
  - type: text
    content: A cause de toutes mes transgressions!
  - type: text
    content: Car mes soupirs sont nombreux, et mon cœur est souffrant.
  '3':
  - type: text
    content: Juda est en exil, victime de l’oppression et d’une grande servitude;
  - type: text
    content: Il habite au milieu des nations,
  - type: text
    content: Et il n’y trouve point de repos;
  - type: text
    content: Tous ses persécuteurs l’ont surpris dans l’angoisse.
  '4':
  - type: text
    content: Les chemins de Sion sont dans le deuil, car on ne va plus aux fêtes;
  - type: text
    content: Toutes ses portes sont désertes,
  - type: text
    content: Ses sacrificateurs gémissent,
  - type: text
    content: Ses vierges sont affligées, et elle est remplie d’amertume.
  '5':
  - type: text
    content: Ses oppresseurs triomphent, ses ennemis sont en paix;
  - type: text
    content: Car l’Éternel l’a humiliée,
  - type: text
    content: A cause de la multitude de ses péchés;
  - type: text
    content: Ses enfants ont marché captifs devant l’oppresseur.
  '6':
  - type: text
    content: La fille de Sion a perdu toute sa gloire;
  - type: text
    content: Ses chefs sont comme des cerfs
  - type: text
    content: Qui ne trouvent point de pâture,
  - type: text
    content: Et qui fuient sans force devant celui qui les chasse.
  '7':
  - type: text
    content: Aux jours de sa détresse et de sa misère, Jérusalem s’est souvenue
  - type: text
    content: De tous les biens dès longtemps son partage,
  - type: text
    content: Quand son peuple est tombé sans secours sous la main de l’oppresseur;
  - type: text
    content: Ses ennemis l’ont vue, et ils ont ri de sa chute.
  '8':
  - type: text
    content: Jérusalem a multiplié ses péchés,
  - type: text
    content: C’est pourquoi elle est un objet d’aversion;
  - type: text
    content: 'Tous ceux qui l’honoraient la méprisent, en voyant sa '
  - type: note
    content: És 47:3.
  - type: text
    content: nudité;
  - type: text
    content: Elle-même soupire, et détourne la face.
  '9':
  - type: text
    content: 'La souillure était dans les pans de sa robe, et elle ne songeait pas à sa '
  - type: note
    content: De 32:29.
  - type: text
    content: fin;
  - type: text
    content: Elle est tombée d’une manière étonnante, et nul ne la console.
  - type: text
    content: Vois ma misère, ô Éternel!
  - type: text
    content: Quelle arrogance chez l’ennemi!
