document_id: LAM.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les malheurs de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-22: cf. La 2; 4. Ps 79.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Eh quoi! Elle est assise solitaire, cette ville si peuplée!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle est semblable à une veuve!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Grande entre les nations, souveraine parmi les états,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle est réduite à la servitude!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 6:7
      metadata:
        usfm: PSA.6.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Elle pleure durant la nuit, et ses joues sont couvertes de larmes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: De tous ceux qui l’aimaient nul ne la console;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ses amis lui sont devenus infidèles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont devenus ses ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Juda est en exil, victime de l’oppression et d’une grande servitude;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il habite au milieu des nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il n’y trouve point de repos;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ses persécuteurs l’ont surpris dans l’angoisse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les chemins de Sion sont dans le deuil, car on ne va plus aux fêtes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutes ses portes sont désertes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses sacrificateurs gémissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses vierges sont affligées, et elle est remplie d’amertume.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ses oppresseurs triomphent, ses ennemis sont en paix;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Éternel l’a humiliée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de la multitude de ses péchés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses enfants ont marché captifs devant l’oppresseur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La fille de Sion a perdu toute sa gloire;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses chefs sont comme des cerfs
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui ne trouvent point de pâture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui fuient sans force devant celui qui les chasse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aux jours de sa détresse et de sa misère, Jérusalem s’est souvenue
- type: usfm
  marker: q1
  children:
  - type: text
    text: De tous les biens dès longtemps son partage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand son peuple est tombé sans secours sous la main de l’oppresseur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses ennemis l’ont vue, et ils ont ri de sa chute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Jérusalem a multiplié ses péchés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pourquoi elle est un objet d’aversion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tous ceux qui l’honoraient la méprisent, en voyant sa '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 47:3
      metadata:
        usfm: ISA.47.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: nudité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle-même soupire, et détourne la face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La souillure était dans les pans de sa robe, et elle ne songeait pas à sa '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:29
      metadata:
        usfm: DEU.32.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: fin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle est tombée d’une manière étonnante, et nul ne la console.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vois ma misère, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quelle arrogance chez l’ennemi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L’oppresseur a étendu la main
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur tout ce qu’elle avait de précieux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle a vu pénétrer dans son sanctuaire les nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: Auxquelles tu avais défendu d’entrer dans ton assemblée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tout son peuple soupire, il cherche du '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 52:6
      metadata:
        usfm: JER.52.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: pain;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont donné leurs choses précieuses pour de la nourriture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin de ranimer leur vie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vois, Éternel, regarde comme je suis avilie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je m’adresse à vous, à vous tous qui passez ici!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Regardez et voyez s’il est une douleur pareille à ma douleur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A celle dont j’ai été frappée!
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel m’a affligée au jour de son ardente colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: D’en haut il a lancé dans mes os un feu qui les dévore;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a tendu un filet sous mes pieds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il m’a fait tomber en arrière;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il m’a jetée dans la désolation, dans une langueur de tous les jours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Sa main a lié le joug de mes iniquités;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles se sont entrelacées, appliquées sur mon cou;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a brisé ma force;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Seigneur m’a livrée à des mains auxquelles je ne puis résister.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le Seigneur a terrassé tous mes guerriers au milieu de moi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a rassemblé contre moi une armée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour détruire mes jeunes hommes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Seigneur a foulé au pressoir la vierge, fille de Juda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'C’est pour cela que je pleure, que mes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 13:17
      metadata:
        usfm: JER.13.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: yeux fondent en larmes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il s’est éloigné de moi, celui qui me consolerait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui ranimerait ma vie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes fils sont dans la désolation, parce que l’ennemi a triomphé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Sion a étendu les mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et personne ne l’a consolée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel a envoyé contre Jacob les ennemis d’alentour;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jérusalem a été un objet d’horreur au milieu d’eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: L’Éternel est juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car j’ai été rebelle à ses ordres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Écoutez, vous tous, peuples, et voyez ma douleur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes vierges et mes jeunes hommes sont allés en captivité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'J’ai appelé mes amis, et ils m’ont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 30:14
      metadata:
        usfm: JER.30.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: trompée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mes sacrificateurs et mes anciens ont expiré dans la ville:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils cherchaient de la nourriture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin de ranimer leur vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Éternel, regarde ma détresse! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 16:11
      metadata:
        usfm: ISA.16.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 48:36
      metadata:
        usfm: JER.48.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mes entrailles bouillonnent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon cœur est bouleversé au-dedans de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car j’ai été rebelle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au-dehors l’épée a fait ses ravages, au-dedans la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: On a entendu mes soupirs, et personne ne m’a consolée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous mes ennemis ont appris mon malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se sont réjouis de ce que tu l’as causé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu amèneras, tu publieras le jour où ils seront comme moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Que toute leur méchanceté vienne devant toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et traite-les comme tu m’as traitée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de toutes mes transgressions!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car mes soupirs sont nombreux, et mon cœur est souffrant.
