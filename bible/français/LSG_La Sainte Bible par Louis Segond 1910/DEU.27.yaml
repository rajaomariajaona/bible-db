document_id: DEU.27,93
type_code: fra
verses:
  '1':
  - type: heading
    content: BÉNÉDICTIONS ET MALÉDICTIONS
  - type: heading
    content: Ch. 27 à 30.
  - type: heading
    content: Ordre de dresser un monument de pierres après le passage du Jourdain, et d’y graver les paroles de la loi
  - type: heading
    content: 'V. 1-10: cf. Jos 8:30-32. (Jé 31:33.)'
  - type: text
    content: 'Moïse et les anciens d’Israël donnèrent cet ordre au peuple: Observez tous les commandements que je vous prescris aujourd’hui. '
  '10':
  - type: text
    content: Tu obéiras à la voix de l’Éternel, ton Dieu, et tu mettras en pratique ses commandements et ses lois que je te prescris aujourd’hui.
  - type: heading
    content: Bénédictions à prononcer sur le mont Garizim, et malédictions à prononcer sur le mont Ébal
  - type: heading
    content: 'V. 11-26: cf. (De 11:26-30. Jos 8:33-35.) Ga 3:10, 13. (Ja 1:27.)'
  '11':
  - type: text
    content: 'Le même jour, Moïse donna cet ordre au peuple: '
  '12':
  - type: text
    content: 'Lorsque vous aurez passé le Jourdain, Siméon, Lévi, Juda, Issacar, Joseph et Benjamin, se tiendront sur le mont Garizim, pour bénir le peuple; '
  '13':
  - type: text
    content: 'et Ruben, Gad, Aser, Zabulon, Dan et Nephthali, se tiendront sur le mont Ébal, pour prononcer la malédiction. '
  '14':
  - type: text
    content: 'Et les Lévites prendront la parole, et diront d’une voix haute à tout Israël: '
  '15':
  - type: text
    content: 'Maudit soit l’homme qui fait une image taillée ou une image en fonte, abomination de l’Éternel, œuvre des mains d’un artisan, et qui la place dans un lieu secret! Et tout le peuple répondra, et dira: Amen! '
  '16':
  - type: text
    content: 'Maudit soit celui qui méprise son père et sa mère! Et tout le peuple dira: Amen! '
  '17':
  - type: text
    content: 'Maudit soit celui qui déplace les bornes de son prochain! Et tout le peuple dira: Amen! '
  '18':
  - type: text
    content: 'Maudit soit celui qui fait égarer un aveugle dans le chemin! Et tout le peuple dira: Amen! '
  '19':
  - type: text
    content: 'Maudit soit celui qui porte atteinte au droit de l’étranger, de l’orphelin et de la veuve! Et tout le peuple dira: Amen! '
  '2':
  - type: note
    content: Jos 4:1.
  - type: text
    content: 'Lorsque vous aurez passé le Jourdain, pour entrer dans le pays que l’Éternel, ton Dieu, te donne, tu dresseras de grandes pierres, et tu les enduiras de chaux. '
  '20':
  - type: text
    content: 'Maudit soit celui qui couche avec la femme de son père, car il soulève la couverture de son père! Et tout le peuple dira: Amen! '
  '21':
  - type: text
    content: 'Maudit soit celui qui couche avec une bête quelconque! Et tout le peuple dira: Amen! '
  '22':
  - type: text
    content: 'Maudit soit celui qui couche avec sa sœur, fille de son père ou fille de sa mère! Et tout le peuple dira: Amen! '
  '23':
  - type: text
    content: 'Maudit soit celui qui couche avec sa belle-mère! Et tout le peuple dira: Amen! '
  '24':
  - type: text
    content: 'Maudit soit celui qui frappe son prochain en secret! Et tout le peuple dira: Amen! '
  '25':
  - type: text
    content: 'Maudit soit celui qui reçoit un présent pour répandre le sang de l’innocent! Et tout le peuple dira: Amen! '
  '26':
  - type: note
    content: Ga 3:10.
  - type: text
    content: 'Maudit soit celui qui n’accomplit point les paroles de cette loi, et qui ne les met point en pratique! Et tout le peuple dira: Amen!'
  '3':
  - type: text
    content: 'Tu écriras sur ces pierres toutes les paroles de cette loi, lorsque tu auras passé le Jourdain, pour entrer dans le pays que l’Éternel, ton Dieu, te donne, pays où coulent le lait et le miel, comme te l’a dit l’Éternel, le Dieu de tes pères. '
  '4':
  - type: text
    content: 'Lorsque vous aurez passé le Jourdain, vous dresserez sur le mont Ébal ces pierres que je vous ordonne aujourd’hui de dresser, et tu les enduiras de chaux. '
  '5':
  - type: note
    content: Ex 20:25. Jos 8:31.
  - type: text
    content: 'Là, tu bâtiras un autel à l’Éternel, ton Dieu, un autel de pierres, sur lesquelles tu ne porteras point le fer; '
  '6':
  - type: text
    content: 'tu bâtiras en pierres brutes l’autel de l’Éternel, ton Dieu. Tu offriras sur cet autel des holocaustes à l’Éternel, ton Dieu; '
  '7':
  - type: text
    content: 'tu offriras des sacrifices d’actions de grâces, et tu mangeras là et te réjouiras devant l’Éternel, ton Dieu. '
  '8':
  - type: text
    content: 'Tu écriras sur ces pierres toutes les paroles de cette loi, en les gravant bien nettement. '
  '9':
  - type: text
    content: 'Moïse et les sacrificateurs, les Lévites, parlèrent à tout Israël, et dirent: Israël, sois attentif et écoute! Aujourd’hui, tu es devenu le peuple de l’Éternel, ton Dieu. '
