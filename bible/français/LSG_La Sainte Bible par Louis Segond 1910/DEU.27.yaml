document_id: DEU.27
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: BÉNÉDICTIONS ET MALÉDICTIONS
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: Ch. 27 à 30.
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ordre de dresser un monument de pierres après le passage du Jourdain, et d’y graver les paroles de la loi
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. Jos 8:30-32. (Jé 31:33.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moïse et les anciens d’Israël donnèrent cet ordre au peuple: Observez tous les commandements que je vous prescris aujourd’hui. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 4:1
      metadata:
        usfm: JOS.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque vous aurez passé le Jourdain, pour entrer dans le pays que l’Éternel, ton Dieu, te donne, tu dresseras de grandes pierres, et tu les enduiras de chaux. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu écriras sur ces pierres toutes les paroles de cette loi, lorsque tu auras passé le Jourdain, pour entrer dans le pays que l’Éternel, ton Dieu, te donne, pays où coulent le lait et le miel, comme te l’a dit l’Éternel, le Dieu de tes pères. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Lorsque vous aurez passé le Jourdain, vous dresserez sur le mont Ébal ces pierres que je vous ordonne aujourd’hui de dresser, et tu les enduiras de chaux. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:25
      metadata:
        usfm: EXO.20.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 8:31
      metadata:
        usfm: JOS.8.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Là, tu bâtiras un autel à l’Éternel, ton Dieu, un autel de pierres, sur lesquelles tu ne porteras point le fer; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'tu bâtiras en pierres brutes l’autel de l’Éternel, ton Dieu. Tu offriras sur cet autel des holocaustes à l’Éternel, ton Dieu; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'tu offriras des sacrifices d’actions de grâces, et tu mangeras là et te réjouiras devant l’Éternel, ton Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tu écriras sur ces pierres toutes les paroles de cette loi, en les gravant bien nettement. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moïse et les sacrificateurs, les Lévites, parlèrent à tout Israël, et dirent: Israël, sois attentif et écoute! Aujourd’hui, tu es devenu le peuple de l’Éternel, ton Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu obéiras à la voix de l’Éternel, ton Dieu, et tu mettras en pratique ses commandements et ses lois que je te prescris aujourd’hui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bénédictions à prononcer sur le mont Garizim, et malédictions à prononcer sur le mont Ébal
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-26: cf. (De 11:26-30. Jos 8:33-35.) Ga 3:10, 13. (Ja 1:27.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le même jour, Moïse donna cet ordre au peuple: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsque vous aurez passé le Jourdain, Siméon, Lévi, Juda, Issacar, Joseph et Benjamin, se tiendront sur le mont Garizim, pour bénir le peuple; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et Ruben, Gad, Aser, Zabulon, Dan et Nephthali, se tiendront sur le mont Ébal, pour prononcer la malédiction. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et les Lévites prendront la parole, et diront d’une voix haute à tout Israël: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Maudit soit l’homme qui fait une image taillée ou une image en fonte, abomination de l’Éternel, œuvre des mains d’un artisan, et qui la place dans un lieu secret! Et tout le peuple répondra, et dira: Amen! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Maudit soit celui qui méprise son père et sa mère! Et tout le peuple dira: Amen! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Maudit soit celui qui déplace les bornes de son prochain! Et tout le peuple dira: Amen! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Maudit soit celui qui fait égarer un aveugle dans le chemin! Et tout le peuple dira: Amen! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Maudit soit celui qui porte atteinte au droit de l’étranger, de l’orphelin et de la veuve! Et tout le peuple dira: Amen! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Maudit soit celui qui couche avec la femme de son père, car il soulève la couverture de son père! Et tout le peuple dira: Amen! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Maudit soit celui qui couche avec une bête quelconque! Et tout le peuple dira: Amen! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Maudit soit celui qui couche avec sa sœur, fille de son père ou fille de sa mère! Et tout le peuple dira: Amen! '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Maudit soit celui qui couche avec sa belle-mère! Et tout le peuple dira: Amen! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Maudit soit celui qui frappe son prochain en secret! Et tout le peuple dira: Amen! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Maudit soit celui qui reçoit un présent pour répandre le sang de l’innocent! Et tout le peuple dira: Amen! '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:10
      metadata:
        usfm: GAL.3.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Maudit soit celui qui n’accomplit point les paroles de cette loi, et qui ne les met point en pratique! Et tout le peuple dira: Amen!'
