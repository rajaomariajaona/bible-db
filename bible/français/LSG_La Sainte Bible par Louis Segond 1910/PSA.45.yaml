document_id: PSA.45,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Hé 1:8, 9. Ps 2:6, etc.; 110.) (Mt 22:2. Ap 19:7-9. Ép 5:23-27.) Ca 1 à 8.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef des chantres. Sur les lis. Des fils de Koré. Cantique. Chant d’amour.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Des filles de rois sont parmi tes bien-aimées;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La reine est à ta droite, parée d’or d’Ophir.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Écoute, ma fille, vois, et prête l’oreille;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oublie ton peuple et la maison de ton père.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Le roi porte ses désirs sur ta beauté;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puisqu’il est ton seigneur, rends-lui tes hommages.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Et, avec des présents, la fille de Tyr,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les plus riches du peuple '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 72:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: rechercheront ta faveur.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Toute resplendissante est la fille du roi dans l’intérieur du palais;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle porte un vêtement tissu d’or.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Elle est présentée au roi, vêtue de ses habits brodés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et suivie des jeunes filles, ses compagnes, qui sont amenées auprès de toi;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: On les introduit au milieu des réjouissances et de l’allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles entrent dans le palais du roi.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tes enfants prendront la place de tes pères;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu les établiras princes dans tout le pays.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Je rappellerai ton nom dans tous les âges:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi les peuples te loueront éternellement et à jamais.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Des paroles pleines de charme bouillonnent dans mon cœur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je dis: Mon œuvre est pour le roi!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ma langue soit comme la plume d’un habile écrivain!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tu es le plus beau des fils de l’homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La grâce est répandue sur tes lèvres:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi Dieu t’a béni pour toujours.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Vaillant guerrier, ceins ton épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta parure et ta gloire,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Oui, ta gloire!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois vainqueur, monte sur ton char,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Défends la vérité, la douceur et la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que ta droite se signale par de merveilleux exploits!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tes flèches sont aiguës;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des peuples tomberont sous toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles perceront le cœur des ennemis du roi.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 1:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ton trône, ô Dieu, est à toujours;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sceptre de ton règne est un sceptre d’équité.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tu aimes la justice, et tu hais la méchanceté:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi, ô Dieu, ton Dieu t’a oint
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D’une huile de joie, par privilège sur tes collègues.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: La myrrhe, l’aloès et la casse parfument tous tes vêtements;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les palais d’ivoire les instruments à cordes te réjouissent.
