document_id: PSA.45,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Hé 1:8, 9. Ps 2:6, etc.; 110.) (Mt 22:2. Ap 19:7-9. Ép 5:23-27.) Ca 1 à 8.
  - type: text
    content: Au chef des chantres. Sur les lis. Des fils de Koré. Cantique. Chant d’amour.
  '10':
  - type: text
    content: Des filles de rois sont parmi tes bien-aimées;
  - type: text
    content: La reine est à ta droite, parée d’or d’Ophir.
  '11':
  - type: text
    content: Écoute, ma fille, vois, et prête l’oreille;
  - type: text
    content: Oublie ton peuple et la maison de ton père.
  '12':
  - type: text
    content: Le roi porte ses désirs sur ta beauté;
  - type: text
    content: Puisqu’il est ton seigneur, rends-lui tes hommages.
  '13':
  - type: text
    content: Et, avec des présents, la fille de Tyr,
  - type: text
    content: 'Les plus riches du peuple '
  - type: note
    content: Ps 72:10.
  - type: text
    content: rechercheront ta faveur.
  '14':
  - type: text
    content: Toute resplendissante est la fille du roi dans l’intérieur du palais;
  - type: text
    content: Elle porte un vêtement tissu d’or.
  '15':
  - type: text
    content: Elle est présentée au roi, vêtue de ses habits brodés,
  - type: text
    content: Et suivie des jeunes filles, ses compagnes, qui sont amenées auprès de toi;
  '16':
  - type: text
    content: On les introduit au milieu des réjouissances et de l’allégresse,
  - type: text
    content: Elles entrent dans le palais du roi.
  '17':
  - type: text
    content: Tes enfants prendront la place de tes pères;
  - type: text
    content: Tu les établiras princes dans tout le pays.
  '18':
  - type: text
    content: 'Je rappellerai ton nom dans tous les âges:'
  - type: text
    content: Aussi les peuples te loueront éternellement et à jamais.
  '2':
  - type: text
    content: Des paroles pleines de charme bouillonnent dans mon cœur.
  - type: text
    content: 'Je dis: Mon œuvre est pour le roi!'
  - type: text
    content: Que ma langue soit comme la plume d’un habile écrivain!
  '3':
  - type: text
    content: Tu es le plus beau des fils de l’homme,
  - type: text
    content: 'La grâce est répandue sur tes lèvres:'
  - type: text
    content: C’est pourquoi Dieu t’a béni pour toujours.
  '4':
  - type: text
    content: Vaillant guerrier, ceins ton épée,
  - type: text
    content: Ta parure et ta gloire,
  '5':
  - type: text
    content: Oui, ta gloire!
  - type: text
    content: Sois vainqueur, monte sur ton char,
  - type: text
    content: Défends la vérité, la douceur et la justice,
  - type: text
    content: Et que ta droite se signale par de merveilleux exploits!
  '6':
  - type: text
    content: Tes flèches sont aiguës;
  - type: text
    content: Des peuples tomberont sous toi;
  - type: text
    content: Elles perceront le cœur des ennemis du roi.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Hé 1:8.
  - type: text
    content: Ton trône, ô Dieu, est à toujours;
  - type: text
    content: Le sceptre de ton règne est un sceptre d’équité.
  '8':
  - type: text
    content: 'Tu aimes la justice, et tu hais la méchanceté:'
  - type: text
    content: C’est pourquoi, ô Dieu, ton Dieu t’a oint
  - type: text
    content: D’une huile de joie, par privilège sur tes collègues.
  '9':
  - type: text
    content: La myrrhe, l’aloès et la casse parfument tous tes vêtements;
  - type: text
    content: Dans les palais d’ivoire les instruments à cordes te réjouissent.
