document_id: ISA.65
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les rétributions de l’Éternel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. Ro 10:18-21. És 66:3, 4.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: J’ai exaucé ceux qui ne demandaient rien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me suis laissé trouver par ceux qui ne me cherchaient pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'J’ai dit: Me voici, me voici!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A une nation qui ne s’appelait pas de mon nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: J’ai tendu mes mains tous les jours vers un peuple rebelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui marche dans une voie mauvaise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au gré de ses pensées;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Vers un peuple qui ne cesse de m’irriter en face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sacrifiant dans les jardins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et brûlant de l’encens sur les briques:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Qui fait des sépulcres sa demeure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et passe la nuit dans les cavernes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mangeant de la chair de porc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ayant dans ses vases des mets impurs;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Qui dit: Retire-toi,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne m’approche pas, car je suis saint!…
- type: usfm
  marker: q1
  children:
  - type: text
    text: De pareilles choses, c’est une fumée dans mes narines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est un feu qui brûle toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Voici ce que j’ai résolu par devers moi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Loin de me taire, je leur ferai porter la peine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, je leur ferai porter la peine
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: De vos crimes, dit l’Éternel, et des crimes de vos pères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui ont brûlé de l’encens sur les montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui m’ont outragé sur les collines;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je leur mesurerai le salaire de leurs actions passées.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-16: cf. És 3:10, 11. Jé 24:3-10. (Mal 4:1-3. És 62:2.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand il se trouve du jus dans une grappe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'On dit: Ne la détruis pas,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il y a là une bénédiction!
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’agirai de même, pour l’amour de mes serviteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin de ne pas tout détruire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je ferai sortir de Jacob une postérité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de Juda un héritier de mes montagnes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes élus posséderont le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mes serviteurs y habiteront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le Saron servira de pâturage au menu bétail,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la vallée d’Acor servira de gîte au gros bétail,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour mon peuple qui m’aura cherché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais vous, qui abandonnez l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui oubliez ma montagne sainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui dressez une table pour Gad,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et remplissez une coupe pour Meni,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je vous destine au glaive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous fléchirez tous le genou pour être égorgés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car j’ai appelé, et vous n’avez point répondu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai parlé, et vous n’avez point écouté;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais vous avez fait ce qui est mal à mes yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous avez choisi ce qui me déplaît.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, mes serviteurs mangeront, et vous aurez faim;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, mes serviteurs boiront, et vous aurez soif;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, mes serviteurs se réjouiront, et vous serez confondus;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Voici, mes serviteurs chanteront dans la joie de leur cœur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais vous, vous crierez dans la douleur de votre âme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous vous lamenterez dans l’abattement de votre esprit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Vous laisserez votre nom en imprécation à mes élus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Seigneur, l’Éternel, vous fera mourir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il donnera à ses serviteurs un autre nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Celui qui voudra être béni dans le pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voudra l’être par le Dieu de vérité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celui qui jurera dans le pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jurera par le Dieu de vérité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car les anciennes souffrances seront oubliées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles seront cachées à mes yeux.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-25: cf. És 51:16. (2 Pi 3:10-14. Ap 21:1-5.) (Am 9:13-15. Za 8:3-5. És 11:6-9.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Car je vais créer de nouveaux cieux
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et une nouvelle terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On ne se rappellera plus les choses passées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles ne reviendront plus à l’esprit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Réjouissez-vous plutôt et soyez à toujours dans l’allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de ce que je vais créer;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je vais créer Jérusalem pour l’allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et son peuple pour la joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Je ferai de Jérusalem mon allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de mon peuple ma joie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On n’y entendra plus
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le bruit des pleurs et le bruit des cris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il n’y aura plus ni enfants ni vieillards
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui n’accomplissent leurs jours;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car celui qui mourra à cent ans sera jeune,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le pécheur âgé de cent ans sera maudit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils bâtiront des maisons et les habiteront;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils planteront des vignes et en mangeront le fruit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ils ne bâtiront pas des maisons pour qu’un autre les habite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne planteront pas des vignes pour qu’un autre en mange le fruit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car les jours de mon peuple seront comme les jours des arbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mes élus jouiront de l’œuvre de leurs mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ils ne travailleront pas en vain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils n’auront pas des enfants pour les voir périr;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils formeront une race bénie de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leurs enfants seront avec eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Avant qu’ils m’invoquent, je répondrai;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avant qu’ils aient cessé de parler, j’exaucerai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Le loup et l’agneau paîtront ensemble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le lion, comme le bœuf, mangera de la paille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le serpent aura la poussière pour nourriture.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne se fera ni tort ni dommage
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur toute ma montagne sainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel.
