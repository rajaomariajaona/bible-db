document_id: ISA.65,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les rétributions de l’Éternel
  - type: heading
    content: 'V. 1-7: cf. Ro 10:18-21. És 66:3, 4.'
  - type: text
    content: J’ai exaucé ceux qui ne demandaient rien,
  - type: text
    content: Je me suis laissé trouver par ceux qui ne me cherchaient pas;
  - type: text
    content: 'J’ai dit: Me voici, me voici!'
  - type: text
    content: A une nation qui ne s’appelait pas de mon nom.
  '10':
  - type: text
    content: Le Saron servira de pâturage au menu bétail,
  - type: text
    content: Et la vallée d’Acor servira de gîte au gros bétail,
  - type: text
    content: Pour mon peuple qui m’aura cherché.
  '11':
  - type: text
    content: Mais vous, qui abandonnez l’Éternel,
  - type: text
    content: Qui oubliez ma montagne sainte,
  - type: text
    content: Qui dressez une table pour Gad,
  - type: text
    content: Et remplissez une coupe pour Meni,
  '12':
  - type: text
    content: Je vous destine au glaive,
  - type: text
    content: Et vous fléchirez tous le genou pour être égorgés;
  - type: text
    content: Car j’ai appelé, et vous n’avez point répondu,
  - type: text
    content: J’ai parlé, et vous n’avez point écouté;
  - type: text
    content: Mais vous avez fait ce qui est mal à mes yeux,
  - type: text
    content: Et vous avez choisi ce qui me déplaît.
  '13':
  - type: text
    content: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Voici, mes serviteurs mangeront, et vous aurez faim;
  - type: text
    content: Voici, mes serviteurs boiront, et vous aurez soif;
  - type: text
    content: Voici, mes serviteurs se réjouiront, et vous serez confondus;
  '14':
  - type: text
    content: Voici, mes serviteurs chanteront dans la joie de leur cœur;
  - type: text
    content: Mais vous, vous crierez dans la douleur de votre âme,
  - type: text
    content: Et vous vous lamenterez dans l’abattement de votre esprit.
  '15':
  - type: text
    content: Vous laisserez votre nom en imprécation à mes élus;
  - type: text
    content: Le Seigneur, l’Éternel, vous fera mourir,
  - type: text
    content: Et il donnera à ses serviteurs un autre nom.
  '16':
  - type: text
    content: Celui qui voudra être béni dans le pays
  - type: text
    content: Voudra l’être par le Dieu de vérité,
  - type: text
    content: Et celui qui jurera dans le pays
  - type: text
    content: Jurera par le Dieu de vérité;
  - type: text
    content: Car les anciennes souffrances seront oubliées,
  - type: text
    content: Elles seront cachées à mes yeux.
  - type: heading
    content: 'V. 17-25: cf. És 51:16. (2 Pi 3:10-14. Ap 21:1-5.) (Am 9:13-15. Za 8:3-5. És 11:6-9.)'
  '17':
  - type: text
    content: Car je vais créer de nouveaux cieux
  - type: text
    content: Et une nouvelle terre;
  - type: text
    content: On ne se rappellera plus les choses passées,
  - type: text
    content: Elles ne reviendront plus à l’esprit.
  '18':
  - type: text
    content: Réjouissez-vous plutôt et soyez à toujours dans l’allégresse,
  - type: text
    content: A cause de ce que je vais créer;
  - type: text
    content: Car je vais créer Jérusalem pour l’allégresse,
  - type: text
    content: Et son peuple pour la joie.
  '19':
  - type: text
    content: Je ferai de Jérusalem mon allégresse,
  - type: text
    content: Et de mon peuple ma joie;
  - type: text
    content: On n’y entendra plus
  - type: text
    content: Le bruit des pleurs et le bruit des cris.
  '2':
  - type: text
    content: J’ai tendu mes mains tous les jours vers un peuple rebelle,
  - type: text
    content: Qui marche dans une voie mauvaise,
  - type: text
    content: Au gré de ses pensées;
  '20':
  - type: text
    content: Il n’y aura plus ni enfants ni vieillards
  - type: text
    content: Qui n’accomplissent leurs jours;
  - type: text
    content: Car celui qui mourra à cent ans sera jeune,
  - type: text
    content: Et le pécheur âgé de cent ans sera maudit.
  '21':
  - type: text
    content: Ils bâtiront des maisons et les habiteront;
  - type: text
    content: Ils planteront des vignes et en mangeront le fruit.
  '22':
  - type: text
    content: Ils ne bâtiront pas des maisons pour qu’un autre les habite,
  - type: text
    content: Ils ne planteront pas des vignes pour qu’un autre en mange le fruit;
  - type: text
    content: Car les jours de mon peuple seront comme les jours des arbres,
  - type: text
    content: Et mes élus jouiront de l’œuvre de leurs mains.
  '23':
  - type: text
    content: Ils ne travailleront pas en vain,
  - type: text
    content: Et ils n’auront pas des enfants pour les voir périr;
  - type: text
    content: Car ils formeront une race bénie de l’Éternel,
  - type: text
    content: Et leurs enfants seront avec eux.
  '24':
  - type: text
    content: Avant qu’ils m’invoquent, je répondrai;
  - type: text
    content: Avant qu’ils aient cessé de parler, j’exaucerai.
  '25':
  - type: text
    content: Le loup et l’agneau paîtront ensemble,
  - type: text
    content: Le lion, comme le bœuf, mangera de la paille,
  - type: text
    content: Et le serpent aura la poussière pour nourriture.
  - type: text
    content: Il ne se fera ni tort ni dommage
  - type: text
    content: Sur toute ma montagne sainte,
  - type: text
    content: Dit l’Éternel.
  '3':
  - type: text
    content: Vers un peuple qui ne cesse de m’irriter en face,
  - type: text
    content: Sacrifiant dans les jardins,
  - type: text
    content: 'Et brûlant de l’encens sur les briques:'
  '4':
  - type: text
    content: Qui fait des sépulcres sa demeure,
  - type: text
    content: Et passe la nuit dans les cavernes,
  - type: text
    content: Mangeant de la chair de porc,
  - type: text
    content: Et ayant dans ses vases des mets impurs;
  '5':
  - type: text
    content: 'Qui dit: Retire-toi,'
  - type: text
    content: Ne m’approche pas, car je suis saint!…
  - type: text
    content: De pareilles choses, c’est une fumée dans mes narines,
  - type: text
    content: C’est un feu qui brûle toujours.
  '6':
  - type: text
    content: 'Voici ce que j’ai résolu par devers moi:'
  - type: text
    content: Loin de me taire, je leur ferai porter la peine,
  - type: text
    content: Oui, je leur ferai porter la peine
  '7':
  - type: text
    content: De vos crimes, dit l’Éternel, et des crimes de vos pères,
  - type: text
    content: Qui ont brûlé de l’encens sur les montagnes,
  - type: text
    content: Et qui m’ont outragé sur les collines;
  - type: text
    content: Je leur mesurerai le salaire de leurs actions passées.
  - type: heading
    content: 'V. 8-16: cf. És 3:10, 11. Jé 24:3-10. (Mal 4:1-3. És 62:2.)'
  '8':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Quand il se trouve du jus dans une grappe,
  - type: text
    content: 'On dit: Ne la détruis pas,'
  - type: text
    content: Car il y a là une bénédiction!
  - type: text
    content: J’agirai de même, pour l’amour de mes serviteurs,
  - type: text
    content: Afin de ne pas tout détruire.
  '9':
  - type: text
    content: Je ferai sortir de Jacob une postérité,
  - type: text
    content: Et de Juda un héritier de mes montagnes;
  - type: text
    content: Mes élus posséderont le pays,
  - type: text
    content: Et mes serviteurs y habiteront.
