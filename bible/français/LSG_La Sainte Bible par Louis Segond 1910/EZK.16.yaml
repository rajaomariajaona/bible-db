document_id: EZK.16,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jérusalem sous l’emblème d’une femme prostituée
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-34: cf. (De 32:8-21. Jé 2:1-13. Éz 23:1-21.) Ap 17.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je te donnai des vêtements brodés, et une chaussure de peaux teintes en bleu; je te ceignis de fin lin, et je te couvris de soie. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je te parai d’ornements: je mis des bracelets à tes mains, un collier à ton cou, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'je mis un anneau à ton nez, des pendants à tes oreilles, et une couronne magnifique sur ta tête. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi tu fus parée d’or et d’argent, et tu fus vêtue de fin lin, de soie et d’étoffes brodées. La fleur de farine, le miel et l’huile, furent ta nourriture. Tu étais d’une beauté accomplie, digne de la royauté. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ta renommée se répandit parmi les nations, à cause de ta beauté; car elle était parfaite, grâce à l’éclat dont je t’avais ornée, dit le Seigneur, l’Éternel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais tu t’es confiée dans ta beauté, et tu t’es prostituée, à la faveur de ton nom; tu as prodigué tes prostitutions à tous les passants, tu t’es livrée à eux. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as pris de tes vêtements, tu t’es fait des hauts lieux que tu as garnis d’étoffes de toutes couleurs, et tu t’y es prostituée: rien de semblable n’était arrivé et n’arrivera jamais. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as pris ta magnifique parure d’or et d’argent, que je t’avais donnée, et tu en as fait des simulacres d’hommes, auxquels tu t’es prostituée. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as pris tes vêtements brodés, tu les en as couverts, et tu as offert à ces simulacres mon huile et mon encens. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le pain que je t’avais donné, la fleur de farine, l’huile et le miel, dont je te nourrissais, tu leur as offert ces choses comme des parfums d’une odeur agréable. Voilà ce qui est arrivé, dit le Seigneur, l’Éternel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de l’homme, fais connaître à Jérusalem ses abominations! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as pris tes fils et tes filles, que tu m’avais enfantés, et tu les leur as sacrifiés pour qu’ils leur servent d’aliment: n’était-ce pas assez de tes prostitutions? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 57:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'égorgé mes fils, et tu les as donnés, en les faisant passer par le feu en leur honneur. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au milieu de toutes tes abominations et de tes prostitutions, tu ne t’es pas souvenue du temps de ta jeunesse, lorsque tu étais nue, entièrement nue, et baignée dans ton sang. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après toutes tes méchantes actions, malheur, malheur à toi! Dit le Seigneur, l’Éternel, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tu t’es bâti des maisons de prostitution, tu t’es fait des hauts lieux dans toutes les places; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'à l’entrée de chaque chemin tu as construit tes hauts lieux, tu as déshonoré ta beauté, tu t’es livrée à tous les passants, tu as multiplié tes prostitutions. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu t’es prostituée aux Égyptiens, tes voisins au corps vigoureux, et tu as multiplié tes prostitutions pour m’irriter. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici, j’ai étendu ma main contre toi, j’ai diminué la part que je t’avais assignée, je t’ai livrée à la volonté de tes ennemies, les filles '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 28:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'des Philistins, qui ont rougi de ta conduite criminelle. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu t’es prostituée aux Assyriens, parce que tu n’étais pas rassasiée; tu t’es prostituée à eux, et tu n’as pas encore été rassasiée. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as multiplié tes prostitutions avec le pays de Canaan et jusqu’en Chaldée, et avec cela tu n’as pas encore été rassasiée. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu diras: Ainsi parle le Seigneur, l’Éternel, à Jérusalem: Par ton origine et ta naissance tu es du pays de Canaan; ton père était un Amoréen, et ta mère une Héthienne. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelle faiblesse de cœur tu as eue, dit le Seigneur, l’Éternel, en faisant toutes ces choses, qui sont l’œuvre d’une maîtresse prostituée! '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque tu bâtissais tes maisons de prostitution à l’entrée de chaque chemin, lorsque tu faisais tes hauts lieux dans toutes les places, tu n’as pas même été comme la prostituée qui réclame un salaire; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tu as été la femme adultère, qui reçoit des étrangers au lieu de son mari. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A toutes les prostituées on paie un salaire; mais toi, tu as fait des dons à tous tes amants, tu les as gagnés par des présents, afin de les attirer à toi de toutes parts dans tes prostitutions. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu as été le contraire des autres prostituées, parce qu’on ne te recherchait pas; et en donnant un salaire au lieu d’en recevoir un, tu as été le contraire des autres.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 35-43: cf. (Éz 23:22-49. Os 2:4-15.) Da 9:7-14.'
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi, prostituée, écoute la parole de l’Éternel! '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi parle le Seigneur, l’Éternel: Parce que tes trésors ont été dissipés, et que ta nudité a été découverte dans tes prostitutions avec tes amants et avec toutes tes abominables idoles, et à cause du sang de tes enfants que tu leur as donnés, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'voici, je rassemblerai tous tes amants avec lesquels tu te plaisais, tous ceux que tu as aimés et tous ceux que tu as haïs, je les rassemblerai de toutes parts contre toi, je leur découvrirai ta nudité, et ils verront toute ta nudité. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je te jugerai comme on juge les femmes adultères et celles qui répandent le sang, et je ferai de toi une victime sanglante de la fureur et de la jalousie. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je te livrerai entre leurs mains; ils abattront tes maisons de prostitution et détruiront tes hauts lieux; ils te dépouilleront de tes vêtements, prendront ta magnifique parure, et te laisseront nue, entièrement nue. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ta naissance, au jour où tu naquis, ton nombril n’a pas été coupé, tu n’as pas été lavée dans l’eau pour être purifiée, tu n’as pas été frottée avec du sel, tu n’as pas été enveloppée dans des langes. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils amèneront la foule contre toi, ils te lapideront et te perceront à coups d’épée; '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ils brûleront tes maisons par le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 25:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 52:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'feu, et ils feront justice de toi, aux yeux d’une multitude de femmes. Je ferai cesser ainsi ton impudicité et tu ne donneras plus de salaire. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’assouvirai ma colère contre toi, et tu ne seras plus l’objet de ma jalousie; je m’apaiserai, je ne serai plus irrité. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parce que tu ne t’es pas souvenue du temps de ta jeunesse, parce que tu m’as provoqué par toutes ces choses, voici, je ferai retomber ta conduite sur ta '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 9:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: tête, dit le Seigneur, l’Éternel, et tu ne commettras plus le crime avec toutes tes abominations.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 44-58: cf. Jé 3:6-11. Mt 11:20-24.'
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici, tous ceux qui disent des proverbes, t’appliqueront ce proverbe: Telle mère, telle fille! '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu es la fille de ta mère, qui a repoussé son mari et ses enfants; tu es la sœur de tes sœurs, qui ont repoussé leurs maris et leurs enfants. Votre mère était une Héthienne, et votre père un Amoréen. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ta grande sœur, qui demeure à ta gauche, c’est Samarie avec ses filles; et ta petite sœur, qui demeure à ta droite, c’est Sodome avec ses filles. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu n’as pas seulement marché dans leurs voies, commis les mêmes abominations, c’était trop peu; tu as été plus corrompue qu’elles dans toutes tes voies. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je suis vivant! Dit le Seigneur, l’Éternel, Sodome, ta sœur, et ses filles n’ont pas fait ce que vous avez fait, toi et tes filles. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici quel a été le crime de Sodome, ta sœur. Elle avait de l’orgueil, elle vivait dans l’abondance et dans une insouciante sécurité, elle et ses filles, et elle ne soutenait pas la main du malheureux et de l’indigent. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nul n’a porté sur toi un regard de pitié pour te faire une seule de ces choses, par compassion pour toi; mais tu as été jetée dans les champs, le jour de ta naissance, parce qu’on avait horreur de toi. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elles sont devenues hautaines, et elles ont commis des abominations devant moi. Je les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 19:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ai fait disparaître, quand j’ai vu cela. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samarie n’a pas commis la moitié de tes péchés; tes abominations ont été plus nombreuses que les siennes, et tu as justifié tes sœurs par toutes les abominations que tu as faites. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toi qui condamnais tes sœurs, supporte ton opprobre, à cause de tes péchés par lesquels tu t’es rendue plus abominable qu’elles, et qui les font paraître plus justes que toi; sois confuse, et supporte ton opprobre, puisque tu as justifié tes sœurs. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ramènerai leurs captifs, les captifs de Sodome et de ses filles, les captifs de Samarie et de ses filles, et tes captifs au milieu des leurs, '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afin que tu subisses ton opprobre, et que tu rougisses de tout ce que tu as fait, en étant pour elles un sujet de consolation. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tes sœurs, Sodome et ses filles, reviendront à leur premier état, Samarie et ses filles reviendront à leur premier état; et toi et tes filles, vous reviendrez à votre premier état. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne discourais-tu pas sur ta sœur Sodome, dans le temps de ton orgueil, '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avant que ta méchanceté soit mise à nu, lorsque tu as reçu les outrages des filles de la Syrie et de tous ses alentours, des filles des Philistins, qui te méprisaient de tous côtés! '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu portes tes crimes et tes abominations, dit l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 59-63: cf. Éz 36:22-32. Jé 32:36-41.'
    marker-yv: yv-h
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car ainsi parle le Seigneur, l’Éternel: J’agirai envers toi comme tu as agi, toi qui as '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 2:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'méprisé le serment en rompant '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 16:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'l’alliance. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je passai près de toi, je t’aperçus baignée dans ton sang, et je te dis: Vis dans ton sang! Je te dis: Vis dans ton sang! '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais je me souviendrai de mon alliance avec toi au temps de ta jeunesse, et j’établirai avec toi une alliance éternelle. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu te souviendras de ta conduite, et tu en auras honte, quand tu recevras tes sœurs, les grandes et les petites; je te les donnerai pour '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 4:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'filles, mais non en vertu de ton alliance. '
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’établirai mon alliance avec toi, et tu sauras que je suis l’Éternel, '
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Afin que tu te souviennes du passé et que tu rougisses, afin que tu n’ouvres plus la bouche et que tu sois confuse, quand je te pardonnerai tout ce que tu as fait, dit le Seigneur, l’Éternel.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je t’ai multipliée par dix milliers, comme les herbes des champs. Et tu pris de l’accroissement, tu grandis, tu devins d’une beauté parfaite; tes seins se formèrent, ta chevelure se développa. Mais tu étais nue, entièrement nue. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je passai près de toi, je te regardai, et voici, ton temps était là, le temps des amours. J’étendis sur toi le pan de ma robe, je couvris ta nudité, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 22:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'je te jurai fidélité, je fis alliance avec toi, dit le Seigneur, l’Éternel, et tu fus à moi. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je te lavai dans l’eau, je fis disparaître le sang qui était sur toi, et je t’oignis avec de l’huile. '
