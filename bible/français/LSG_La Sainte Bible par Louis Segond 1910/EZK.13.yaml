document_id: EZK.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre les faux prophètes
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-16: cf. Jé 14:13-16; 23:9-32; 29:20, etc. Mi 3:5, 6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole de l’Éternel me fut adressée, en ces mots:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fils de l’homme, prophétise contre les prophètes d’Israël qui prophétisent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et dis à ceux qui prophétisent selon leur propre cœur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Écoutez la parole de l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malheur aux prophètes insensés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui suivent leur propre esprit et qui ne voient rien!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tels des renards au milieu des ruines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tels sont tes prophètes, ô Israël!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Vous n’êtes pas montés devant les brèches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous n’avez pas entouré d’un mur la maison d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour demeurer fermes dans le combat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au jour de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Leurs visions sont vaines, et leurs oracles menteurs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils disent: L’Éternel a dit!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’Éternel ne les a point envoyés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils font espérer que leur parole s’accomplira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les visions que vous avez ne sont-elles pas vaines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les oracles que vous prononcez ne sont-ils pas menteurs?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Vous dites: L’Éternel a dit!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je n’ai point parlé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que vous dites des choses vaines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que vos visions sont des mensonges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, j’en veux à vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Seigneur, l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ma main sera contre les prophètes
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dont les visions sont vaines et les oracles menteurs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne feront point partie de l’assemblée de mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne seront pas inscrits dans le livre de la maison d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils n’entreront pas dans le pays d’Israël.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous saurez que je suis le Seigneur, l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ces choses arriveront parce qu’ils égarent mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'En disant: Paix! Quand il n’y a point de paix.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mon peuple bâtit une muraille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et eux, ils la couvrent de plâtre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dis à ceux qui la couvrent de plâtre qu’elle s’écroulera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une pluie violente surviendra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous, pierres de grêle, vous tomberez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la tempête éclatera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Et voici, la muraille s’écroule!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ne vous dira-t-on pas:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où est le plâtre dont vous l’avez couverte?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ferai, dans ma fureur, éclater la tempête;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il surviendra, dans ma colère, une pluie violente;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et des pierres de grêle tomberont avec fureur pour détruire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: J’abattrai la muraille que vous avez couverte de plâtre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je lui ferai toucher la terre, et ses fondements seront mis à nu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle s’écroulera, et vous périrez au milieu de ses ruines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous saurez que je suis l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: J’assouvirai ainsi ma fureur contre la muraille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et contre ceux qui l’ont couverte de plâtre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et je vous dirai: Plus de muraille!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et c’en est fait de ceux qui la replâtraient,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Des prophètes d’Israël qui prophétisent sur Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui ont sur elle des visions de paix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand il n’y a point de paix!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Seigneur, l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-23: cf. Ap 2:20-23.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Et toi, fils de l’homme, porte tes regards sur les filles de ton peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui prophétisent selon leur propre cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et prophétise contre elles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tu diras: Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malheur à celles qui fabriquent des coussinets pour toutes les aisselles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui font des voiles pour la tête des gens de toute taille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin de surprendre les âmes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pensez-vous surprendre les âmes de mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et conserver vos propres âmes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Vous me déshonorez auprès de mon peuple
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 3:5
      metadata:
        usfm: MIC.3.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pour des poignées d’orge et des morceaux de pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: En tuant des âmes qui ne doivent pas mourir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et en faisant vivre des âmes qui ne doivent pas vivre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Trompant ainsi mon peuple, qui écoute le mensonge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, j’en veux à vos coussinets
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par lesquels vous surprenez les âmes afin qu’elles s’envolent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je les arracherai de vos bras;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je délivrerai les âmes
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que vous cherchez à surprendre afin qu’elles s’envolent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: J’arracherai aussi vos voiles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je délivrerai de vos mains mon peuple;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne serviront plus de piège entre vos mains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous saurez que je suis l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Parce que vous affligez le cœur du juste par des mensonges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand moi-même je ne l’ai point attristé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et parce que vous fortifiez les mains du méchant
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour l’empêcher de quitter sa mauvaise voie et pour le faire vivre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Vous n’aurez plus de vaines visions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous ne prononcerez plus d’oracles;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je délivrerai de vos mains mon peuple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous saurez que je suis l’Éternel.
