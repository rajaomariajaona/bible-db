document_id: EZK.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre les faux prophètes
  - type: heading
    content: 'V. 1-16: cf. Jé 14:13-16; 23:9-32; 29:20, etc. Mi 3:5, 6.'
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: text
    content: Ces choses arriveront parce qu’ils égarent mon peuple,
  - type: text
    content: 'En disant: Paix! Quand il n’y a point de paix.'
  - type: text
    content: Et mon peuple bâtit une muraille,
  - type: text
    content: Et eux, ils la couvrent de plâtre.
  '11':
  - type: text
    content: Dis à ceux qui la couvrent de plâtre qu’elle s’écroulera;
  - type: text
    content: Une pluie violente surviendra;
  - type: text
    content: Et vous, pierres de grêle, vous tomberez,
  - type: text
    content: Et la tempête éclatera.
  '12':
  - type: text
    content: Et voici, la muraille s’écroule!
  - type: text
    content: 'Ne vous dira-t-on pas:'
  - type: text
    content: Où est le plâtre dont vous l’avez couverte?
  '13':
  - type: text
    content: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Je ferai, dans ma fureur, éclater la tempête;
  - type: text
    content: Il surviendra, dans ma colère, une pluie violente;
  - type: text
    content: Et des pierres de grêle tomberont avec fureur pour détruire.
  '14':
  - type: text
    content: J’abattrai la muraille que vous avez couverte de plâtre,
  - type: text
    content: Je lui ferai toucher la terre, et ses fondements seront mis à nu;
  - type: text
    content: Elle s’écroulera, et vous périrez au milieu de ses ruines.
  - type: text
    content: Et vous saurez que je suis l’Éternel.
  '15':
  - type: text
    content: J’assouvirai ainsi ma fureur contre la muraille,
  - type: text
    content: Et contre ceux qui l’ont couverte de plâtre;
  - type: text
    content: 'Et je vous dirai: Plus de muraille!'
  - type: text
    content: Et c’en est fait de ceux qui la replâtraient,
  '16':
  - type: text
    content: Des prophètes d’Israël qui prophétisent sur Jérusalem,
  - type: text
    content: Et qui ont sur elle des visions de paix,
  - type: text
    content: Quand il n’y a point de paix!
  - type: text
    content: Dit le Seigneur, l’Éternel.
  - type: heading
    content: 'V. 17-23: cf. Ap 2:20-23.'
  '17':
  - type: text
    content: Et toi, fils de l’homme, porte tes regards sur les filles de ton peuple
  - type: text
    content: Qui prophétisent selon leur propre cœur,
  - type: text
    content: Et prophétise contre elles!
  '18':
  - type: text
    content: 'Tu diras: Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Malheur à celles qui fabriquent des coussinets pour toutes les aisselles,
  - type: text
    content: Et qui font des voiles pour la tête des gens de toute taille,
  - type: text
    content: Afin de surprendre les âmes!
  - type: text
    content: Pensez-vous surprendre les âmes de mon peuple,
  - type: text
    content: Et conserver vos propres âmes?
  '19':
  - type: text
    content: Vous me déshonorez auprès de mon peuple
  - type: note
    content: Mi 3:5.
  - type: text
    content: Pour des poignées d’orge et des morceaux de pain,
  - type: text
    content: En tuant des âmes qui ne doivent pas mourir,
  - type: text
    content: Et en faisant vivre des âmes qui ne doivent pas vivre,
  - type: text
    content: Trompant ainsi mon peuple, qui écoute le mensonge.
  '2':
  - type: text
    content: Fils de l’homme, prophétise contre les prophètes d’Israël qui prophétisent,
  - type: text
    content: 'Et dis à ceux qui prophétisent selon leur propre cœur:'
  - type: text
    content: Écoutez la parole de l’Éternel!
  '20':
  - type: text
    content: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Voici, j’en veux à vos coussinets
  - type: text
    content: Par lesquels vous surprenez les âmes afin qu’elles s’envolent,
  - type: text
    content: Et je les arracherai de vos bras;
  - type: text
    content: Et je délivrerai les âmes
  - type: text
    content: Que vous cherchez à surprendre afin qu’elles s’envolent.
  '21':
  - type: text
    content: J’arracherai aussi vos voiles,
  - type: text
    content: Et je délivrerai de vos mains mon peuple;
  - type: text
    content: Ils ne serviront plus de piège entre vos mains.
  - type: text
    content: Et vous saurez que je suis l’Éternel.
  '22':
  - type: text
    content: Parce que vous affligez le cœur du juste par des mensonges,
  - type: text
    content: Quand moi-même je ne l’ai point attristé,
  - type: text
    content: Et parce que vous fortifiez les mains du méchant
  - type: text
    content: Pour l’empêcher de quitter sa mauvaise voie et pour le faire vivre,
  '23':
  - type: text
    content: Vous n’aurez plus de vaines visions,
  - type: text
    content: Et vous ne prononcerez plus d’oracles;
  - type: text
    content: Je délivrerai de vos mains mon peuple.
  - type: text
    content: Et vous saurez que je suis l’Éternel.
  '3':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Malheur aux prophètes insensés,
  - type: text
    content: Qui suivent leur propre esprit et qui ne voient rien!
  '4':
  - type: text
    content: Tels des renards au milieu des ruines,
  - type: text
    content: Tels sont tes prophètes, ô Israël!
  '5':
  - type: text
    content: Vous n’êtes pas montés devant les brèches,
  - type: text
    content: Vous n’avez pas entouré d’un mur la maison d’Israël,
  - type: text
    content: Pour demeurer fermes dans le combat,
  - type: text
    content: Au jour de l’Éternel.
  '6':
  - type: text
    content: Leurs visions sont vaines, et leurs oracles menteurs;
  - type: text
    content: 'Ils disent: L’Éternel a dit!'
  - type: text
    content: Et l’Éternel ne les a point envoyés;
  - type: text
    content: Et ils font espérer que leur parole s’accomplira.
  '7':
  - type: text
    content: Les visions que vous avez ne sont-elles pas vaines,
  - type: text
    content: Et les oracles que vous prononcez ne sont-ils pas menteurs?
  - type: text
    content: 'Vous dites: L’Éternel a dit!'
  - type: text
    content: Et je n’ai point parlé.
  '8':
  - type: text
    content: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Parce que vous dites des choses vaines,
  - type: text
    content: Et que vos visions sont des mensonges,
  - type: text
    content: Voici, j’en veux à vous,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  '9':
  - type: text
    content: Ma main sera contre les prophètes
  - type: text
    content: Dont les visions sont vaines et les oracles menteurs;
  - type: text
    content: Ils ne feront point partie de l’assemblée de mon peuple,
  - type: text
    content: Ils ne seront pas inscrits dans le livre de la maison d’Israël,
  - type: text
    content: Et ils n’entreront pas dans le pays d’Israël.
  - type: text
    content: Et vous saurez que je suis le Seigneur, l’Éternel.
