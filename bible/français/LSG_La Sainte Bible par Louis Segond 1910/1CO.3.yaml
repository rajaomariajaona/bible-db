document_id: 1CO.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Divisions dans l’Église de Corinthe
  - type: heading
    content: 'V. 1-9: cf. Hé 5:11-14. 1 Co 1:11-15; 4:1-6.'
  - type: text
    content: 'Pour moi, frères, ce n’est pas comme à des hommes spirituels que j’ai pu vous parler, mais comme à des hommes charnels, comme à des enfants en Christ. '
  '10':
  - type: text
    content: 'Selon la grâce de Dieu qui m’a été donnée, j’ai posé le fondement comme un sage architecte, et un autre bâtit dessus. Mais que chacun prenne garde à la manière dont il bâtit dessus. '
  '11':
  - type: text
    content: 'Car personne ne peut poser un autre fondement '
  - type: note
    content: És 28:16. Mt 16:18.
  - type: text
    content: 'que celui qui a été posé, savoir Jésus-Christ. '
  '12':
  - type: text
    content: 'Or, si quelqu’un bâtit sur ce fondement avec de l’or, de l’argent, des pierres précieuses, du bois, du foin, du chaume, l’œuvre de chacun sera manifestée; '
  '13':
  - type: note
    content: És 8:20; 48:10. Jé 23:29. 1 Pi 1:7; 4:12.
  - type: text
    content: 'car le jour la fera connaître, parce qu’elle se révèlera dans le feu, et le feu éprouvera ce qu’est l’œuvre de chacun. '
  '14':
  - type: text
    content: 'Si l’œuvre bâtie par quelqu’un sur le fondement subsiste, il recevra une récompense. '
  '15':
  - type: text
    content: Si l’œuvre de quelqu’un est consumée, il perdra sa récompense; pour lui, il sera sauvé, mais comme au travers du feu.
  - type: heading
    content: 'V. 16-23: cf. (1 Co 6:15-20. Mt 18:6, 7.) (1 Co 1:19, etc. Ro 8:17, 32.)'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 1 Co 6:19. 2 Co 6:16. Hé 3:6. 1 Pi 2:5.
  - type: text
    content: 'Ne savez-vous pas que vous êtes le temple de Dieu, et que l’Esprit de Dieu habite en vous? '
  '17':
  - type: text
    content: 'Si quelqu’un détruit le temple de Dieu, Dieu le détruira; car le temple de Dieu est saint, et c’est ce que vous êtes. '
  '18':
  - type: note
    content: Pr 3:7. És 5:21.
  - type: text
    content: 'Que nul ne s’abuse lui-même: si quelqu’un parmi vous pense être sage selon ce siècle, qu’il devienne fou, afin de devenir sage. '
  '19':
  - type: text
    content: 'Car la sagesse de ce monde est une folie devant Dieu. Aussi est-il écrit:'
  - type: note
    content: Job 5:13.
  - type: text
    content: Il prend les sages dans leur ruse.
  '2':
  - type: note
    content: Hé 5:12. 1 Pi 2:2.
  - type: text
    content: 'Je vous ai donné du lait, non de la nourriture solide, car vous ne pouviez pas la supporter; et vous ne le pouvez pas même à présent, parce que vous êtes encore charnels. '
  '20':
  - type: text
    content: 'Et encore:'
  - type: note
    content: Ps 94:11.
  - type: text
    content: Le Seigneur connaît les pensées des sages,
  - type: text
    content: 'Il sait qu’elles sont vaines. '
  '21':
  - type: text
    content: 'Que personne donc ne mette sa gloire dans des hommes; car tout est à vous, '
  '22':
  - type: text
    content: 'soit Paul, soit Apollos, soit Céphas, soit le monde, soit la vie, soit la mort, soit les choses présentes, soit les choses à venir. '
  '23':
  - type: text
    content: Tout est à vous; et vous êtes à Christ, et Christ est à Dieu.
  '3':
  - type: note
    content: 1 Co 1:11. Ga 5:19. Ja 3:16.
  - type: text
    content: 'En effet, puisqu’il y a parmi vous de la jalousie et des disputes, n’êtes-vous pas charnels, et ne marchez-vous pas selon l’homme? '
  '4':
  - type: text
    content: 'Quand l’un dit: '
  - type: note
    content: 1 Co 1:12.
  - type: text
    content: 'Moi, je suis de Paul! Et un autre: Moi, d’Apollos! N’êtes-vous pas des hommes? '
  '5':
  - type: text
    content: 'Qu’est-ce donc '
  - type: note
    content: Ac 18:24. 1 Co 1:12; 16:12.
  - type: text
    content: 'qu’Apollos, et qu’est-ce que Paul? Des serviteurs, par le moyen desquels vous avez cru, selon que le Seigneur l’a donné à chacun. '
  '6':
  - type: text
    content: 'J’ai planté, '
  - type: note
    content: Ac 18:26; 19:1.
  - type: text
    content: 'Apollos a arrosé, mais Dieu a fait croître, '
  '7':
  - type: text
    content: 'en sorte que ce n’est pas celui qui plante qui est quelque chose, ni celui qui arrose, mais Dieu qui fait croître. '
  '8':
  - type: text
    content: 'Celui qui plante et celui qui arrose sont égaux, '
  - type: note
    content: Ps 62:13. Jé 17:10; 32:19. Mt 16:27. Ro 2:6; 14:12. 2 Co 5:10. Ga 6:5. Ap 2:23; 22:12.
  - type: text
    content: 'et chacun recevra sa propre récompense selon son propre travail. '
  '9':
  - type: text
    content: 'Car nous sommes '
  - type: note
    content: 2 Co 6:1.
  - type: text
    content: 'ouvriers avec Dieu. Vous êtes le champ de Dieu, '
  - type: note
    content: Ép 2:20. Col 2:7. 1 Pi 2:5.
  - type: text
    content: l’édifice de Dieu.
  - type: heading
    content: 'V. 10-15: cf. (Ép 2:20-22. 1 Pi 2:4-6.) (2 Ti 2:15. 1 Ti 4:16.)'
