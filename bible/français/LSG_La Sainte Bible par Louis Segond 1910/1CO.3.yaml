document_id: 1CO.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Divisions dans l’Église de Corinthe
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. Hé 5:11-14. 1 Co 1:11-15; 4:1-6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Pour moi, frères, ce n’est pas comme à des hommes spirituels que j’ai pu vous parler, mais comme à des hommes charnels, comme à des enfants en Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 5:12
      metadata:
        usfm: HEB.5.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:2
      metadata:
        usfm: 1PE.2.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je vous ai donné du lait, non de la nourriture solide, car vous ne pouviez pas la supporter; et vous ne le pouvez pas même à présent, parce que vous êtes encore charnels. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:11
      metadata:
        usfm: 1CO.1.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:19
      metadata:
        usfm: GAL.5.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 3:16
      metadata:
        usfm: JAS.3.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'En effet, puisqu’il y a parmi vous de la jalousie et des disputes, n’êtes-vous pas charnels, et ne marchez-vous pas selon l’homme? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Quand l’un dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:12
      metadata:
        usfm: 1CO.1.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Moi, je suis de Paul! Et un autre: Moi, d’Apollos! N’êtes-vous pas des hommes? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Qu’est-ce donc '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 18:24
      metadata:
        usfm: ACT.18.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:12
      metadata:
        usfm: 1CO.1.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:12
      metadata:
        usfm: 1CO.16.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’Apollos, et qu’est-ce que Paul? Des serviteurs, par le moyen desquels vous avez cru, selon que le Seigneur l’a donné à chacun. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'J’ai planté, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 18:26
      metadata:
        usfm: ACT.18.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:1
      metadata:
        usfm: ACT.19.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Apollos a arrosé, mais Dieu a fait croître, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'en sorte que ce n’est pas celui qui plante qui est quelque chose, ni celui qui arrose, mais Dieu qui fait croître. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Celui qui plante et celui qui arrose sont égaux, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 62:13
      metadata:
        usfm: PSA.62.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 17:10
      metadata:
        usfm: JER.17.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 32:19
      metadata:
        usfm: JER.32.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 16:27
      metadata:
        usfm: MAT.16.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 2:6
      metadata:
        usfm: ROM.2.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:12
      metadata:
        usfm: ROM.14.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:10
      metadata:
        usfm: 2CO.5.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 6:5
      metadata:
        usfm: GAL.6.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 2:23
      metadata:
        usfm: REV.2.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:12
      metadata:
        usfm: REV.22.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et chacun recevra sa propre récompense selon son propre travail. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Car nous sommes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 6:1
      metadata:
        usfm: 2CO.6.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ouvriers avec Dieu. Vous êtes le champ de Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 2:20
      metadata:
        usfm: EPH.2.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 2:7
      metadata:
        usfm: COL.2.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:5
      metadata:
        usfm: 1PE.2.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: l’édifice de Dieu.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-15: cf. (Ép 2:20-22. 1 Pi 2:4-6.) (2 Ti 2:15. 1 Ti 4:16.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Selon la grâce de Dieu qui m’a été donnée, j’ai posé le fondement comme un sage architecte, et un autre bâtit dessus. Mais que chacun prenne garde à la manière dont il bâtit dessus. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Car personne ne peut poser un autre fondement '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 28:16
      metadata:
        usfm: ISA.28.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 16:18
      metadata:
        usfm: MAT.16.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que celui qui a été posé, savoir Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Or, si quelqu’un bâtit sur ce fondement avec de l’or, de l’argent, des pierres précieuses, du bois, du foin, du chaume, l’œuvre de chacun sera manifestée; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 8:20
      metadata:
        usfm: ISA.8.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 48:10
      metadata:
        usfm: ISA.48.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 23:29
      metadata:
        usfm: JER.23.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:7
      metadata:
        usfm: 1PE.1.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:12
      metadata:
        usfm: 1PE.4.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car le jour la fera connaître, parce qu’elle se révèlera dans le feu, et le feu éprouvera ce qu’est l’œuvre de chacun. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Si l’œuvre bâtie par quelqu’un sur le fondement subsiste, il recevra une récompense. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Si l’œuvre de quelqu’un est consumée, il perdra sa récompense; pour lui, il sera sauvé, mais comme au travers du feu.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-23: cf. (1 Co 6:15-20. Mt 18:6, 7.) (1 Co 1:19, etc. Ro 8:17, 32.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 6:19
      metadata:
        usfm: 1CO.6.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 6:16
      metadata:
        usfm: 2CO.6.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 3:6
      metadata:
        usfm: HEB.3.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:5
      metadata:
        usfm: 1PE.2.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ne savez-vous pas que vous êtes le temple de Dieu, et que l’Esprit de Dieu habite en vous? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Si quelqu’un détruit le temple de Dieu, Dieu le détruira; car le temple de Dieu est saint, et c’est ce que vous êtes. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 3:7
      metadata:
        usfm: PRO.3.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:21
      metadata:
        usfm: ISA.5.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que nul ne s’abuse lui-même: si quelqu’un parmi vous pense être sage selon ce siècle, qu’il devienne fou, afin de devenir sage. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Car la sagesse de ce monde est une folie devant Dieu. Aussi est-il écrit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 5:13
      metadata:
        usfm: JOB.5.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il prend les sages dans leur ruse.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Et encore:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 94:11
      metadata:
        usfm: PSA.94.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le Seigneur connaît les pensées des sages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il sait qu’elles sont vaines. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Que personne donc ne mette sa gloire dans des hommes; car tout est à vous, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'soit Paul, soit Apollos, soit Céphas, soit le monde, soit la vie, soit la mort, soit les choses présentes, soit les choses à venir. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tout est à vous; et vous êtes à Christ, et Christ est à Dieu.
