document_id: ISA.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. De 32:1-29. 2 Ch 28.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Prophétie d’Ésaïe, fils d’Amots, sur Juda et Jérusalem, au temps d’Ozias, de Jotham, d’Achaz, d’Ézéchias, rois de Juda.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’Éternel juge son peuple
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoutez la parole de l’Éternel, chefs de Sodome!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prête l’oreille à la loi de notre Dieu, peuple de Gomorrhe!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ai-je affaire de la multitude de vos sacrifices? Dit l’Éternel.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 50:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 15:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 66:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 6:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 5:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je suis rassasié des holocaustes de béliers et de la graisse des veaux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne prends point plaisir au sang des taureaux, des brebis et des boucs.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand vous venez vous présenter devant moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui vous demande de souiller mes parvis?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Cessez d’apporter de vaines offrandes:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai en horreur l’encens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les nouvelles lunes, les sabbats et les assemblées;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne puis voir le crime s’associer aux solennités.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme hait vos nouvelles lunes et vos fêtes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles me sont à charge;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis las de les supporter.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 1:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Quand vous étendez vos mains, je détourne de vous mes yeux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Quand vous multipliez les prières, je n’écoute pas:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vos mains sont pleines de sang.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-20: cf. És 55:7. Jé 7:1-7. Éz 18:27-32.'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lavez-vous, purifiez-vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Otez de devant mes yeux la méchanceté de vos actions;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 34:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 37:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 5:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 12:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Cessez de faire le mal.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Apprenez à faire le bien, recherchez la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Protégez l’opprimé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faites droit à l’orphelin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Défendez la veuve.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Venez et plaidons! Dit l’Éternel.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 51:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Si vos péchés sont comme le cramoisi, ils deviendront blancs comme la neige;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’ils sont rouges comme la pourpre, ils deviendront comme la laine.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si vous avez de la bonne volonté et si vous êtes dociles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous mangerez les meilleures productions du pays;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Cieux, écoutez! Terre, prête l’oreille!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel parle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai nourri et élevé des enfants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ils se sont révoltés contre moi.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais si vous résistez et si vous êtes rebelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous serez dévorés par le glaive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la bouche de l’Éternel a parlé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Corruption et relèvement de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 21-31: cf. Éz 22:1-22. És 10:20-23.'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quoi donc! La cité fidèle est devenue une prostituée!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle était remplie d’équité, la justice y habitait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et maintenant il y a des assassins!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 22:18
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ton argent s’est changé en scories,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 4:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ton vin a été coupé d’eau.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes chefs sont rebelles et complices des voleurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous aiment les présents et courent après les récompenses;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 5:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 7:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils ne font pas droit à l’orphelin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la cause de la veuve ne vient pas jusqu’à eux.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi voici ce que dit le Seigneur, l’Éternel des armées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le Fort d’Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ah! Je tirerai satisfaction de mes adversaires,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 28:63
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et je me vengerai de mes ennemis.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je porterai ma main sur toi,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 6:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal 3:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je fondrai tes scories, comme avec de la potasse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’enlèverai toutes tes parcelles de plomb.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je rétablirai tes juges tels qu’ils étaient autrefois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tes conseillers tels qu’ils étaient au commencement.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Après cela, on t’appellera ville de la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cité fidèle.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sion sera sauvée par la droiture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux qui s’y convertiront seront sauvés par la justice.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 31:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 1:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 73:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 92:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 104:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais la ruine atteindra tous les rebelles et les pécheurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux qui abandonnent l’Éternel périront.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On aura honte à cause des térébinthes auxquels vous prenez plaisir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous rougirez à cause des jardins dont vous faites vos délices;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le bœuf connaît son possesseur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et l’âne la crèche de son maître:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël ne connaît rien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon peuple n’a point d’intelligence.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car vous serez comme un térébinthe au feuillage flétri,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un jardin qui n’a pas d’eau.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme fort sera comme de l’étoupe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et son œuvre comme une étincelle;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils brûleront l’un et l’autre ensemble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il n’y aura personne pour éteindre.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Malheur à la nation '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 78:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 57:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: pécheresse, au peuple chargé d’iniquités,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la race des méchants, aux enfants corrompus!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont abandonné l’Éternel, ils ont méprisé le Saint d’Israël.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se sont retirés en arrière…
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quels châtiments nouveaux vous infliger,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 28:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 2:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Quand vous multipliez vos révoltes?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La tête entière est malade,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tout le cœur est souffrant.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'De la plante du pied jusqu’à la tête, rien n’est en bon état:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce ne sont que blessures, contusions et plaies vives,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui n’ont été ni pansées, ni bandées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni adoucies par l’huile.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 28:51
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '52'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 5:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Votre pays est dévasté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vos villes sont consumées par le feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des étrangers dévorent vos campagnes sous vos yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ravagent et détruisent, comme des barbares.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la fille de Sion est restée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme une cabane dans une vigne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme une hutte dans un champ de concombres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme une ville épargnée.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 17:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Si l’Éternel des armées
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne nous eût conservé un faible reste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nous serions comme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 19:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Sodome,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous ressemblerions à Gomorrhe.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-15: cf. Ps 50:7, etc. Am 5:21, etc. Ro 14:17.'
    marker-yv: yv-h
