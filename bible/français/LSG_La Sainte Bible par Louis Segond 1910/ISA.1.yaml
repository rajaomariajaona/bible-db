document_id: ISA.1
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. De 32:1-29. 2 Ch 28.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Prophétie d’Ésaïe, fils d’Amots, sur Juda et Jérusalem, au temps d’Ozias, de Jotham, d’Achaz, d’Ézéchias, rois de Juda.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’Éternel juge son peuple
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:1
      metadata:
        usfm: DEU.32.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Cieux, écoutez! Terre, prête l’oreille!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Éternel parle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai nourri et élevé des enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ils se sont révoltés contre moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le bœuf connaît son possesseur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et l’âne la crèche de son maître:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël ne connaît rien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon peuple n’a point d’intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Malheur à la nation '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:8
      metadata:
        usfm: PSA.78.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 57:3
      metadata:
        usfm: ISA.57.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: pécheresse, au peuple chargé d’iniquités,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A la race des méchants, aux enfants corrompus!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont abandonné l’Éternel, ils ont méprisé le Saint d’Israël.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se sont retirés en arrière…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Quels châtiments nouveaux vous infliger,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 28:22
      metadata:
        usfm: 2CH.28.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:30
      metadata:
        usfm: JER.2.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Quand vous multipliez vos révoltes?
- type: usfm
  marker: q1
  children:
  - type: text
    text: La tête entière est malade,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tout le cœur est souffrant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'De la plante du pied jusqu’à la tête, rien n’est en bon état:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce ne sont que blessures, contusions et plaies vives,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui n’ont été ni pansées, ni bandées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni adoucies par l’huile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:51
      metadata:
        usfm: DEU.28.51
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '52'
      metadata:
        usfm: DEU.28.52
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:5
      metadata:
        usfm: ISA.5.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Votre pays est dévasté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vos villes sont consumées par le feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des étrangers dévorent vos campagnes sous vos yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ravagent et détruisent, comme des barbares.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Et la fille de Sion est restée
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme une cabane dans une vigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme une hutte dans un champ de concombres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme une ville épargnée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 17:6
      metadata:
        usfm: ISA.17.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:6
      metadata:
        usfm: ISA.24.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 30:17
      metadata:
        usfm: ISA.30.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:29
      metadata:
        usfm: ROM.9.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Si l’Éternel des armées
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne nous eût conservé un faible reste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nous serions comme '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 19:24
      metadata:
        usfm: GEN.19.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Sodome,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous ressemblerions à Gomorrhe.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-15: cf. Ps 50:7, etc. Am 5:21, etc. Ro 14:17.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Écoutez la parole de l’Éternel, chefs de Sodome!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prête l’oreille à la loi de notre Dieu, peuple de Gomorrhe!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Qu’ai-je affaire de la multitude de vos sacrifices? Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 50:8
      metadata:
        usfm: PSA.50.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: PSA.50.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 15:8
      metadata:
        usfm: PRO.15.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:27
      metadata:
        usfm: PRO.21.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 66:3
      metadata:
        usfm: ISA.66.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 6:20
      metadata:
        usfm: JER.6.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 5:22
      metadata:
        usfm: AMO.5.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je suis rassasié des holocaustes de béliers et de la graisse des veaux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne prends point plaisir au sang des taureaux, des brebis et des boucs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Quand vous venez vous présenter devant moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui vous demande de souiller mes parvis?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Cessez d’apporter de vaines offrandes:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai en horreur l’encens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les nouvelles lunes, les sabbats et les assemblées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne puis voir le crime s’associer aux solennités.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mon âme hait vos nouvelles lunes et vos fêtes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles me sont à charge;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis las de les supporter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 1:28
      metadata:
        usfm: PRO.1.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Quand vous étendez vos mains, je détourne de vous mes yeux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Quand vous multipliez les prières, je n’écoute pas:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vos mains sont pleines de sang.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-20: cf. És 55:7. Jé 7:1-7. Éz 18:27-32.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Lavez-vous, purifiez-vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Otez de devant mes yeux la méchanceté de vos actions;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 34:15
      metadata:
        usfm: PSA.34.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 37:27
      metadata:
        usfm: PSA.37.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 5:15
      metadata:
        usfm: AMO.5.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:9
      metadata:
        usfm: ROM.12.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Cessez de faire le mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Apprenez à faire le bien, recherchez la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Protégez l’opprimé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faites droit à l’orphelin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Défendez la veuve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Venez et plaidons! Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 51:9
      metadata:
        usfm: PSA.51.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Si vos péchés sont comme le cramoisi, ils deviendront blancs comme la neige;
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’ils sont rouges comme la pourpre, ils deviendront comme la laine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Si vous avez de la bonne volonté et si vous êtes dociles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous mangerez les meilleures productions du pays;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mais si vous résistez et si vous êtes rebelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous serez dévorés par le glaive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car la bouche de l’Éternel a parlé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Corruption et relèvement de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-31: cf. Éz 22:1-22. És 10:20-23.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Quoi donc! La cité fidèle est devenue une prostituée!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle était remplie d’équité, la justice y habitait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et maintenant il y a des assassins!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 22:18
      metadata:
        usfm: EZK.22.18
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: EZK.22.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ton argent s’est changé en scories,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 4:18
      metadata:
        usfm: HOS.4.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ton vin a été coupé d’eau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tes chefs sont rebelles et complices des voleurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous aiment les présents et courent après les récompenses;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 5:28
      metadata:
        usfm: JER.5.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 7:10
      metadata:
        usfm: ZEC.7.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils ne font pas droit à l’orphelin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la cause de la veuve ne vient pas jusqu’à eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: C’est pourquoi voici ce que dit le Seigneur, l’Éternel des armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Le Fort d’Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ah! Je tirerai satisfaction de mes adversaires,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:63
      metadata:
        usfm: DEU.28.63
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et je me vengerai de mes ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Je porterai ma main sur toi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 6:29
      metadata:
        usfm: JER.6.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal 3:1
      metadata:
        usfm: MAL.3.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je fondrai tes scories, comme avec de la potasse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’enlèverai toutes tes parcelles de plomb.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Je rétablirai tes juges tels qu’ils étaient autrefois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes conseillers tels qu’ils étaient au commencement.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Après cela, on t’appellera ville de la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cité fidèle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Sion sera sauvée par la droiture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ceux qui s’y convertiront seront sauvés par la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
