document_id: ISA.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-9: cf. De 32:1-29. 2 Ch 28.'
  - type: text
    content: Prophétie d’Ésaïe, fils d’Amots, sur Juda et Jérusalem, au temps d’Ozias, de Jotham, d’Achaz, d’Ézéchias, rois de Juda.
  - type: heading
    content: L’Éternel juge son peuple
  '10':
  - type: text
    content: Écoutez la parole de l’Éternel, chefs de Sodome!
  - type: text
    content: Prête l’oreille à la loi de notre Dieu, peuple de Gomorrhe!
  '11':
  - type: text
    content: Qu’ai-je affaire de la multitude de vos sacrifices? Dit l’Éternel.
  - type: note
    content: Ps 50:8, 9. Pr 15:8; 21:27. És 66:3. Jé 6:20. Am 5:22.
  - type: text
    content: Je suis rassasié des holocaustes de béliers et de la graisse des veaux;
  - type: text
    content: Je ne prends point plaisir au sang des taureaux, des brebis et des boucs.
  '12':
  - type: text
    content: Quand vous venez vous présenter devant moi,
  - type: text
    content: Qui vous demande de souiller mes parvis?
  '13':
  - type: text
    content: 'Cessez d’apporter de vaines offrandes:'
  - type: text
    content: J’ai en horreur l’encens,
  - type: text
    content: Les nouvelles lunes, les sabbats et les assemblées;
  - type: text
    content: Je ne puis voir le crime s’associer aux solennités.
  '14':
  - type: text
    content: Mon âme hait vos nouvelles lunes et vos fêtes;
  - type: text
    content: Elles me sont à charge;
  - type: text
    content: Je suis las de les supporter.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Pr 1:28.
  - type: text
    content: Quand vous étendez vos mains, je détourne de vous mes yeux;
  - type: text
    content: 'Quand vous multipliez les prières, je n’écoute pas:'
  - type: text
    content: Vos mains sont pleines de sang.
  - type: heading
    content: 'V. 16-20: cf. És 55:7. Jé 7:1-7. Éz 18:27-32.'
  '16':
  - type: text
    content: Lavez-vous, purifiez-vous,
  - type: text
    content: Otez de devant mes yeux la méchanceté de vos actions;
  - type: note
    content: Ps 34:15; 37:27. Am 5:15. Ro 12:9.
  - type: text
    content: Cessez de faire le mal.
  '17':
  - type: text
    content: Apprenez à faire le bien, recherchez la justice,
  - type: text
    content: Protégez l’opprimé;
  - type: text
    content: Faites droit à l’orphelin,
  - type: text
    content: Défendez la veuve.
  '18':
  - type: text
    content: Venez et plaidons! Dit l’Éternel.
  - type: note
    content: Ps 51:9.
  - type: text
    content: Si vos péchés sont comme le cramoisi, ils deviendront blancs comme la neige;
  - type: text
    content: S’ils sont rouges comme la pourpre, ils deviendront comme la laine.
  '19':
  - type: text
    content: Si vous avez de la bonne volonté et si vous êtes dociles,
  - type: text
    content: Vous mangerez les meilleures productions du pays;
  '2':
  - type: text
    content: ' '
  - type: note
    content: De 32:1.
  - type: text
    content: Cieux, écoutez! Terre, prête l’oreille!
  - type: text
    content: Car l’Éternel parle.
  - type: text
    content: J’ai nourri et élevé des enfants,
  - type: text
    content: Mais ils se sont révoltés contre moi.
  '20':
  - type: text
    content: Mais si vous résistez et si vous êtes rebelles,
  - type: text
    content: Vous serez dévorés par le glaive,
  - type: text
    content: Car la bouche de l’Éternel a parlé.
  - type: heading
    content: Corruption et relèvement de Jérusalem
  - type: heading
    content: 'V. 21-31: cf. Éz 22:1-22. És 10:20-23.'
  '21':
  - type: text
    content: Quoi donc! La cité fidèle est devenue une prostituée!
  - type: text
    content: Elle était remplie d’équité, la justice y habitait,
  - type: text
    content: Et maintenant il y a des assassins!
  '22':
  - type: text
    content: ' '
  - type: note
    content: Éz 22:18, 19.
  - type: text
    content: Ton argent s’est changé en scories,
  - type: note
    content: Os 4:18.
  - type: text
    content: Ton vin a été coupé d’eau.
  '23':
  - type: text
    content: Tes chefs sont rebelles et complices des voleurs,
  - type: text
    content: Tous aiment les présents et courent après les récompenses;
  - type: note
    content: Jé 5:28. Za 7:10.
  - type: text
    content: Ils ne font pas droit à l’orphelin,
  - type: text
    content: Et la cause de la veuve ne vient pas jusqu’à eux.
  '24':
  - type: text
    content: C’est pourquoi voici ce que dit le Seigneur, l’Éternel des armées,
  - type: text
    content: 'Le Fort d’Israël:'
  - type: text
    content: Ah! Je tirerai satisfaction de mes adversaires,
  - type: note
    content: De 28:63.
  - type: text
    content: Et je me vengerai de mes ennemis.
  '25':
  - type: text
    content: Je porterai ma main sur toi,
  - type: note
    content: Jé 6:29. Mal 3:1.
  - type: text
    content: Je fondrai tes scories, comme avec de la potasse,
  - type: text
    content: Et j’enlèverai toutes tes parcelles de plomb.
  '26':
  - type: text
    content: Je rétablirai tes juges tels qu’ils étaient autrefois,
  - type: text
    content: Et tes conseillers tels qu’ils étaient au commencement.
  - type: text
    content: Après cela, on t’appellera ville de la justice,
  - type: text
    content: Cité fidèle.
  '27':
  - type: text
    content: Sion sera sauvée par la droiture,
  - type: text
    content: Et ceux qui s’y convertiront seront sauvés par la justice.
  '28':
  - type: text
    content: ' '
  - type: note
    content: Job 31:3. Ps 1:6; 5:6; 73:27; 92:10; 104:35.
  - type: text
    content: Mais la ruine atteindra tous les rebelles et les pécheurs,
  - type: text
    content: Et ceux qui abandonnent l’Éternel périront.
  '29':
  - type: text
    content: On aura honte à cause des térébinthes auxquels vous prenez plaisir,
  - type: text
    content: Et vous rougirez à cause des jardins dont vous faites vos délices;
  '3':
  - type: text
    content: Le bœuf connaît son possesseur,
  - type: text
    content: 'Et l’âne la crèche de son maître:'
  - type: text
    content: Israël ne connaît rien,
  - type: text
    content: Mon peuple n’a point d’intelligence.
  '30':
  - type: text
    content: Car vous serez comme un térébinthe au feuillage flétri,
  - type: text
    content: Comme un jardin qui n’a pas d’eau.
  '31':
  - type: text
    content: L’homme fort sera comme de l’étoupe,
  - type: text
    content: Et son œuvre comme une étincelle;
  - type: text
    content: Ils brûleront l’un et l’autre ensemble,
  - type: text
    content: Et il n’y aura personne pour éteindre.
  '4':
  - type: text
    content: 'Malheur à la nation '
  - type: note
    content: Ps 78:8. És 57:3.
  - type: text
    content: pécheresse, au peuple chargé d’iniquités,
  - type: text
    content: A la race des méchants, aux enfants corrompus!
  - type: text
    content: Ils ont abandonné l’Éternel, ils ont méprisé le Saint d’Israël.
  - type: text
    content: Ils se sont retirés en arrière…
  '5':
  - type: text
    content: Quels châtiments nouveaux vous infliger,
  - type: note
    content: 2 Ch 28:22. Jé 2:30.
  - type: text
    content: Quand vous multipliez vos révoltes?
  - type: text
    content: La tête entière est malade,
  - type: text
    content: Et tout le cœur est souffrant.
  '6':
  - type: text
    content: 'De la plante du pied jusqu’à la tête, rien n’est en bon état:'
  - type: text
    content: Ce ne sont que blessures, contusions et plaies vives,
  - type: text
    content: Qui n’ont été ni pansées, ni bandées,
  - type: text
    content: Ni adoucies par l’huile.
  '7':
  - type: text
    content: ' '
  - type: note
    content: De 28:51, 52. És 5:5.
  - type: text
    content: Votre pays est dévasté,
  - type: text
    content: Vos villes sont consumées par le feu,
  - type: text
    content: Des étrangers dévorent vos campagnes sous vos yeux,
  - type: text
    content: Ils ravagent et détruisent, comme des barbares.
  '8':
  - type: text
    content: Et la fille de Sion est restée
  - type: text
    content: Comme une cabane dans une vigne,
  - type: text
    content: Comme une hutte dans un champ de concombres,
  - type: text
    content: Comme une ville épargnée.
  '9':
  - type: text
    content: ' '
  - type: note
    content: És 17:6; 24:6; 30:17. Ro 9:29.
  - type: text
    content: Si l’Éternel des armées
  - type: text
    content: Ne nous eût conservé un faible reste,
  - type: text
    content: 'Nous serions comme '
  - type: note
    content: Ge 19:24.
  - type: text
    content: Sodome,
  - type: text
    content: Nous ressemblerions à Gomorrhe.
  - type: heading
    content: 'V. 10-15: cf. Ps 50:7, etc. Am 5:21, etc. Ro 14:17.'
