document_id: GEN.32,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Envoi d’un message à Ésaü
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. (Ps 91:11. 2 R 6:15-17.) (Pr 15:1. Ge 33:1-3.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jacob poursuivit son chemin; et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 48:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'des anges de Dieu le rencontrèrent. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Je suis trop petit pour toutes les grâces et pour toute la fidélité dont tu as usé envers ton serviteur; car j’ai passé ce Jourdain avec mon bâton, et maintenant je forme deux camps. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Délivre-moi, je te prie, de la main de mon frère, de la main d’Ésaü! Car je crains qu’il ne vienne, et qu’il ne me frappe, avec la mère et les enfants. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Et toi, tu as dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 18:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je te ferai du bien, et je rendrai ta postérité comme le sable de la mer, si abondant qu’on ne saurait le compter.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-23: cf. Ge 33:8-11. 1 S 25:13-28.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'C’est dans ce lieu-là que Jacob passa la nuit. Il prit de ce qu’il avait sous la main, pour faire un présent à Ésaü, son frère: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'deux cents chèvres et vingt boucs, deux cents brebis et vingt béliers, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'trente femelles de chameaux avec leurs petits qu’elles allaitaient, quarante vaches et dix taureaux, vingt ânesses et dix ânes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il les remit à ses serviteurs, troupeau par troupeau séparément, et il dit à ses serviteurs: Passez devant moi, et mettez un intervalle entre chaque troupeau. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il donna cet ordre au premier: Quand Ésaü, mon frère, te rencontrera, et te demandera: A qui es-tu? Où vas-tu? Et à qui appartient ce troupeau devant toi? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'tu répondras: A ton serviteur Jacob; c’est un présent envoyé à mon seigneur Ésaü; et voici, il vient lui-même derrière nous. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Il donna le même ordre au second, au troisième, et à tous ceux qui suivaient les troupeaux: C’est ainsi que vous parlerez à mon seigneur Ésaü, quand vous le rencontrerez. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'En les voyant, Jacob dit: C’est le camp de Dieu! Et il donna à ce lieu le nom de Mahanaïm. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Vous direz: Voici, ton serviteur Jacob vient aussi derrière nous. Car il se disait: Je l’apaiserai par ce présent qui va devant moi; ensuite je le verrai en face, et peut-être m’accueillera-t-il favorablement. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Le présent passa devant lui; et il resta cette nuit-là dans le camp. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Il se leva la même nuit, prit ses deux femmes, ses deux servantes, et ses onze enfants, et passa le gué de Jabbok. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Il les prit, leur fit passer le torrent, et le fit passer à tout ce qui lui appartenait.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lutte de Jacob
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 24-32: cf. Os 12:4, 5. 2 Co 12:7-10.'
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Jacob demeura seul. Alors un homme lutta avec lui jusqu’au lever de l’aurore. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Voyant qu’il ne pouvait le vaincre, cet homme le frappa à l’emboîture de la hanche; et l’emboîture de la hanche de Jacob se démit pendant qu’il luttait avec lui. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 12:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il dit: Laisse-moi aller, car l’aurore se lève. Et Jacob répondit: Je ne te laisserai point aller, que tu ne m’aies béni. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Il lui dit: Quel est ton nom? Et il répondit: Jacob. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Il dit encore: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 35:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ton nom ne sera plus Jacob, mais tu seras appelé Israël; car tu as lutté avec Dieu et avec des hommes, et tu as été vainqueur. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Jacob l’interrogea, en disant: Fais-moi je te prie, connaître ton nom. Il répondit: Pourquoi demandes-tu mon nom? Et il le bénit là. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jacob envoya devant lui des messagers à Ésaü, son frère, au pays de Séir, dans le territoire d’Édom. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Jacob appela ce lieu du nom de Peniel: car, dit-il, j’ai vu Dieu face à face, et mon âme a été sauvée. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Le soleil se levait, lorsqu’il passa Peniel. Jacob boitait de la hanche. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: C’est pourquoi jusqu’à ce jour, les enfants d’Israël ne mangent point le tendon qui est à l’emboîture de la hanche; car Dieu frappa Jacob à l’emboîture de la hanche, au tendon.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il leur donna cet ordre: Voici ce que vous direz à mon seigneur Ésaü: Ainsi parle ton serviteur Jacob: J’ai séjourné chez Laban, et j’y suis resté jusqu’à présent; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'j’ai des bœufs, des ânes, des brebis, des serviteurs et des servantes, et j’envoie l’annoncer à mon seigneur, pour trouver grâce à tes yeux. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Les messagers revinrent auprès de Jacob, en disant: Nous sommes allés vers ton frère Ésaü; et il marche à ta rencontre, avec quatre cents hommes. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Jacob fut très effrayé, et saisi d’angoisse. Il partagea en deux camps les gens qui étaient avec lui, les brebis, les bœufs et les chameaux; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'et il dit: Si Ésaü vient contre l’un des camps et le bat, le camp qui restera pourra se sauver.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-12: cf. Ps 50:15. (Ge 31:3; 28:10-15.)'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Jacob dit: Dieu de mon père Abraham, Dieu de mon père Isaac, Éternel, qui m’as dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 31:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Retourne dans ton pays et dans ton lieu de naissance, et je te ferai du bien! '
