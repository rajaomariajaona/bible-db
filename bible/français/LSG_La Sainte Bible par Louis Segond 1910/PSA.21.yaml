document_id: PSA.21,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Ps 20. 2 S 12:17-31.) 2 S 7:8, etc. Ps 22:23, etc.
  - type: text
    content: Au chef des chantres. Psaume de David.
  '10':
  - type: text
    content: Tu les rendras tels qu’une fournaise ardente,
  - type: text
    content: Le jour où tu te montreras;
  - type: text
    content: L’Éternel les anéantira dans sa colère,
  - type: text
    content: Et le feu les dévorera.
  '11':
  - type: text
    content: Tu feras disparaître leur postérité de la terre,
  - type: text
    content: Et leur race du milieu des fils de l’homme.
  '12':
  - type: text
    content: Ils ont projeté du mal contre toi,
  - type: text
    content: Ils ont conçu de mauvais desseins, mais ils seront impuissants.
  '13':
  - type: text
    content: Car tu leur feras tourner le dos,
  - type: text
    content: Et avec ton arc tu tireras sur eux.
  '14':
  - type: text
    content: Lève-toi, Éternel, avec ta force!
  - type: text
    content: Nous voulons chanter, célébrer ta puissance.
  '2':
  - type: text
    content: Éternel! Le roi se réjouit de ta protection puissante.
  - type: text
    content: Oh! Comme ton secours le remplit d’allégresse!
  '3':
  - type: text
    content: Tu lui as donné ce que désirait son cœur,
  - type: text
    content: 'Et tu n’as pas refusé ce que demandaient ses lèvres. '
  - type: text
    content: — Pause.
  '4':
  - type: text
    content: Car tu l’as prévenu par les bénédictions de ta grâce,
  - type: text
    content: Tu as mis sur sa tête une couronne d’or pur.
  '5':
  - type: text
    content: Il te demandait la vie, tu la lui as donnée,
  - type: text
    content: Une vie longue pour toujours et à perpétuité.
  '6':
  - type: text
    content: Sa gloire est grande à cause de ton secours;
  - type: text
    content: Tu places sur lui l’éclat et la magnificence.
  '7':
  - type: text
    content: Tu le rends à jamais un objet de bénédictions,
  - type: text
    content: Tu le combles de joie devant ta face.
  '8':
  - type: text
    content: Le roi se confie en l’Éternel;
  - type: text
    content: Et, par la bonté du Très-Haut, il ne chancelle pas.
  '9':
  - type: text
    content: Ta main trouvera tous tes ennemis,
  - type: text
    content: Ta droite trouvera ceux qui te haïssent.
