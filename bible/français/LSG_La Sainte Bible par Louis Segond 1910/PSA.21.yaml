document_id: PSA.21
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: (Ps 20. 2 S 12:17-31.) 2 S 7:8, etc. Ps 22:23, etc.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Éternel! Le roi se réjouit de ta protection puissante.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh! Comme ton secours le remplit d’allégresse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu lui as donné ce que désirait son cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et tu n’as pas refusé ce que demandaient ses lèvres. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car tu l’as prévenu par les bénédictions de ta grâce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as mis sur sa tête une couronne d’or pur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il te demandait la vie, tu la lui as donnée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une vie longue pour toujours et à perpétuité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sa gloire est grande à cause de ton secours;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu places sur lui l’éclat et la magnificence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu le rends à jamais un objet de bénédictions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu le combles de joie devant ta face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le roi se confie en l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et, par la bonté du Très-Haut, il ne chancelle pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ta main trouvera tous tes ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta droite trouvera ceux qui te haïssent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu les rendras tels qu’une fournaise ardente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le jour où tu te montreras;
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel les anéantira dans sa colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le feu les dévorera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tu feras disparaître leur postérité de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leur race du milieu des fils de l’homme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils ont projeté du mal contre toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont conçu de mauvais desseins, mais ils seront impuissants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Car tu leur feras tourner le dos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et avec ton arc tu tireras sur eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Lève-toi, Éternel, avec ta force!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous voulons chanter, célébrer ta puissance.
