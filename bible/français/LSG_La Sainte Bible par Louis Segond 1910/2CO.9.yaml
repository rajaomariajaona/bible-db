document_id: 2CO.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-15: cf. 2 Co 8. (Pr 19:17. Hé 13:16. 1 Ti 6:17-19. Ph 4:15-19. 1 Jn 3:16-18.)'
  - type: text
    content: ' '
  - type: note
    content: Ac 11:29. Ro 15:26. 1 Co 16:2. 2 Co 8:4.
  - type: text
    content: 'Il est superflu que je vous écrive touchant l’assistance destinée aux saints. '
  '10':
  - type: text
    content: Celui qui
  - type: text
    content: Fournit de la semence au semeur,
  - type: text
    content: Et du pain pour sa nourriture,
  - type: text
    content: 'vous fournira et vous multipliera la semence, et il augmentera les fruits de votre justice. '
  '11':
  - type: text
    content: 'Vous serez de la sorte enrichis à tous égards pour toute espèce de libéralités qui, par notre moyen, feront offrir à Dieu des actions de grâces. '
  '12':
  - type: text
    content: 'Car le secours de cette assistance non seulement pourvoit aux besoins des saints, mais il est encore une source abondante de nombreuses actions de grâces envers Dieu. '
  '13':
  - type: text
    content: 'En considération de ce secours dont ils font l’expérience, ils glorifient Dieu de votre obéissance dans la profession de l’Évangile de Christ, et de la libéralité de vos dons envers eux et envers tous; '
  '14':
  - type: text
    content: 'ils prient pour vous, parce qu’ils vous aiment à cause de la grâce éminente que Dieu vous a faite. '
  '15':
  - type: text
    content: Grâces soient rendues à Dieu pour son don ineffable!
  '2':
  - type: text
    content: 'Je connais, en effet, votre bonne volonté, dont je me glorifie pour vous auprès des Macédoniens, en déclarant que l’Achaïe est prête depuis l’année dernière; et ce zèle de votre part a stimulé le plus grand nombre. '
  '3':
  - type: text
    content: 'J’envoie les frères, afin que l’éloge que nous avons fait de vous ne soit pas réduit à néant sur ce point-là, et que vous soyez prêts, comme je l’ai dit. '
  '4':
  - type: text
    content: 'Je ne voudrais pas, si les Macédoniens m’accompagnent et ne vous trouvent pas prêts, que cette assurance tournât à notre confusion, pour ne pas dire à la vôtre. '
  '5':
  - type: text
    content: 'J’ai donc jugé nécessaire d’inviter les frères à se rendre auparavant chez vous, et à s’occuper de votre libéralité déjà promise, afin qu’elle soit prête, de manière à être une libéralité, et non un acte d’avarice. '
  '6':
  - type: text
    content: 'Sachez-le, '
  - type: note
    content: Pr 11:24. Ga 6:7.
  - type: text
    content: 'celui qui sème peu moissonnera peu, et celui qui sème abondamment moissonnera abondamment. '
  '7':
  - type: text
    content: 'Que chacun donne comme il l’a résolu en son cœur, '
  - type: note
    content: De 15:7. Ro 12:8.
  - type: text
    content: 'sans tristesse ni contrainte; '
  - type: note
    content: Ex 25:2; 35:5.
  - type: text
    content: 'car Dieu aime celui qui donne avec joie. '
  '8':
  - type: text
    content: 'Et Dieu peut vous combler de toutes sortes de grâces, afin que, possédant toujours en toutes choses de quoi satisfaire à tous vos besoins, vous ayez encore en abondance pour toute bonne œuvre, '
  '9':
  - type: text
    content: 'selon qu’il est écrit:'
  - type: note
    content: Ps 112:9.
  - type: text
    content: Il a fait des largesses, il a donné aux indigents;
  - type: text
    content: 'Sa justice subsiste à jamais. '
