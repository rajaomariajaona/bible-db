document_id: 2CO.9
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-15: cf. 2 Co 8. (Pr 19:17. Hé 13:16. 1 Ti 6:17-19. Ph 4:15-19. 1 Jn 3:16-18.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 11:29
      metadata:
        usfm: ACT.11.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 15:26
      metadata:
        usfm: ROM.15.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 16:2
      metadata:
        usfm: 1CO.16.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 8:4
      metadata:
        usfm: 2CO.8.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il est superflu que je vous écrive touchant l’assistance destinée aux saints. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je connais, en effet, votre bonne volonté, dont je me glorifie pour vous auprès des Macédoniens, en déclarant que l’Achaïe est prête depuis l’année dernière; et ce zèle de votre part a stimulé le plus grand nombre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'J’envoie les frères, afin que l’éloge que nous avons fait de vous ne soit pas réduit à néant sur ce point-là, et que vous soyez prêts, comme je l’ai dit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je ne voudrais pas, si les Macédoniens m’accompagnent et ne vous trouvent pas prêts, que cette assurance tournât à notre confusion, pour ne pas dire à la vôtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'J’ai donc jugé nécessaire d’inviter les frères à se rendre auparavant chez vous, et à s’occuper de votre libéralité déjà promise, afin qu’elle soit prête, de manière à être une libéralité, et non un acte d’avarice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Sachez-le, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 11:24
      metadata:
        usfm: PRO.11.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 6:7
      metadata:
        usfm: GAL.6.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'celui qui sème peu moissonnera peu, et celui qui sème abondamment moissonnera abondamment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Que chacun donne comme il l’a résolu en son cœur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 15:7
      metadata:
        usfm: DEU.15.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:8
      metadata:
        usfm: ROM.12.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sans tristesse ni contrainte; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:2
      metadata:
        usfm: EXO.25.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 35:5
      metadata:
        usfm: EXO.35.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car Dieu aime celui qui donne avec joie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et Dieu peut vous combler de toutes sortes de grâces, afin que, possédant toujours en toutes choses de quoi satisfaire à tous vos besoins, vous ayez encore en abondance pour toute bonne œuvre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'selon qu’il est écrit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 112:9
      metadata:
        usfm: PSA.112.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il a fait des largesses, il a donné aux indigents;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sa justice subsiste à jamais. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Celui qui
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fournit de la semence au semeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et du pain pour sa nourriture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'vous fournira et vous multipliera la semence, et il augmentera les fruits de votre justice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Vous serez de la sorte enrichis à tous égards pour toute espèce de libéralités qui, par notre moyen, feront offrir à Dieu des actions de grâces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Car le secours de cette assistance non seulement pourvoit aux besoins des saints, mais il est encore une source abondante de nombreuses actions de grâces envers Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'En considération de ce secours dont ils font l’expérience, ils glorifient Dieu de votre obéissance dans la profession de l’Évangile de Christ, et de la libéralité de vos dons envers eux et envers tous; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ils prient pour vous, parce qu’ils vous aiment à cause de la grâce éminente que Dieu vous a faite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Grâces soient rendues à Dieu pour son don ineffable!
