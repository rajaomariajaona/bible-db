document_id: ROM.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le chrétien, affranchi de la loi, sert Dieu dans un esprit nouveau
  - type: heading
    content: 'V. 1-6: cf. Ép 5:25-31. (Ga 2:19, 20. Ro 6:14, etc.)'
  - type: text
    content: 'Ignorez-vous, frères, car je parle à des gens qui connaissent la loi, que la loi exerce son pouvoir sur l’homme aussi longtemps qu’il vit? '
  '10':
  - type: text
    content: 'Ainsi, le commandement qui conduit à la vie se trouva pour moi conduire à la mort. '
  '11':
  - type: text
    content: 'Car le péché saisissant l’occasion, me séduisit par le commandement, et par lui me fit mourir. '
  '12':
  - type: note
    content: 1 Ti 1:8.
  - type: text
    content: 'La loi donc est sainte, et le commandement est saint, juste et bon. '
  '13':
  - type: text
    content: Ce qui est bon a-t-il donc été pour moi une cause de mort? Loin de là! Mais c’est le péché, afin qu’il se manifestât comme péché en me donnant la mort par ce qui est bon, et que, par le commandement, il devînt condamnable au plus haut point.
  - type: heading
    content: 'V. 14-25: cf. Ga 5:16-25. Ro 8:1-4.'
  '14':
  - type: text
    content: 'Nous savons, en effet, que la loi est spirituelle; mais moi, je suis charnel, '
  - type: note
    content: És 52:3.
  - type: text
    content: 'vendu au péché. '
  '15':
  - type: text
    content: 'Car je ne sais pas ce que je fais: '
  - type: note
    content: Ga 5:17.
  - type: text
    content: 'je ne fais point ce que je veux, et je fais ce que je hais. '
  '16':
  - type: text
    content: 'Or, si je fais ce que je ne veux pas, je reconnais par là que la loi est bonne. '
  '17':
  - type: text
    content: 'Et maintenant ce n’est plus moi qui le fais, mais c’est le péché qui habite en moi. '
  '18':
  - type: note
    content: Ge 6:5; 8:21.
  - type: text
    content: 'Ce qui est bon, je le sais, n’habite pas en moi, c’est-à-dire dans ma chair: j’ai la volonté, mais non le pouvoir de faire le bien. '
  '19':
  - type: text
    content: 'Car je ne fais pas le bien que je veux, et je fais le mal que je ne veux pas. '
  '2':
  - type: note
    content: 1 Co 7:39.
  - type: text
    content: 'Ainsi, une femme mariée est '
  - type: note
    content: 1 Co 7:2, 10.
  - type: text
    content: 'liée par la loi à son mari tant qu’il est vivant; mais si le mari meurt, elle est dégagée de la loi qui la liait à son mari. '
  '20':
  - type: text
    content: 'Et si je fais ce que je ne veux pas, ce n’est plus moi qui le fais, c’est le péché qui habite en moi. '
  '21':
  - type: text
    content: 'Je trouve donc en moi cette loi: quand je veux faire le bien, le mal est attaché à moi. '
  '22':
  - type: note
    content: Ép 3:16.
  - type: text
    content: 'Car je prends plaisir à la loi de Dieu, selon l’homme intérieur; '
  '23':
  - type: note
    content: Ga 5:17.
  - type: text
    content: 'mais je vois dans mes membres une autre loi, qui lutte contre la loi de mon entendement, et qui me rend captif de la loi du péché, qui est dans mes membres. '
  '24':
  - type: text
    content: 'Misérable que je suis! Qui me délivrera du corps de cette mort?… '
  '25':
  - type: text
    content: Grâces soient rendues à Dieu par Jésus-Christ notre Seigneur!… Ainsi donc, moi-même, je suis par l’entendement esclave de la loi de Dieu, et je suis par la chair esclave de la loi du péché.
  '3':
  - type: note
    content: Mt 5:32.
  - type: text
    content: 'Si donc, du vivant de son mari, elle devient la femme d’un autre homme, elle sera appelée adultère; mais si le mari meurt, elle est affranchie de la loi, de sorte qu’elle n’est point adultère en devenant la femme d’un autre. '
  '4':
  - type: text
    content: 'De même, mes frères, '
  - type: note
    content: Ga 2:19. 1 Pi 4:1.
  - type: text
    content: 'vous aussi vous avez été, par le corps de Christ, mis à mort en ce qui concerne la loi, pour que vous apparteniez à un autre, à celui qui est ressuscité des morts, afin que nous portions des fruits pour Dieu. '
  '5':
  - type: text
    content: 'Car, lorsque nous étions dans la chair, les passions des péchés provoquées par la loi agissaient dans nos membres, de sorte que nous portions des fruits pour la mort. '
  '6':
  - type: text
    content: 'Mais maintenant, nous avons été dégagés de la loi, étant morts à cette loi sous laquelle nous étions retenus, de sorte que nous servons '
  - type: note
    content: Ro 2:29. 2 Co 3:6.
  - type: text
    content: dans un esprit nouveau, et non selon la lettre qui a vieilli.
  - type: heading
    content: La loi, quoique sainte, a provoqué les transgressions, en faisant connaître le péché. Lutte de la chair contre l’esprit
  - type: heading
    content: 'V. 7-13: cf. Ro 5:20; 3:19, 20; 4:15. Ga 3:21, 22.'
  '7':
  - type: text
    content: 'Que dirons-nous donc? La loi est-elle péché? Loin de là! '
  - type: note
    content: Ro 3:20. Hé 7:18.
  - type: text
    content: 'Mais je n’ai connu le péché que par la loi. Car je n’aurais pas connu la convoitise, si la loi n’eût dit: '
  - type: note
    content: Ex 20:17. De 5:21.
  - type: text
    content: 'Tu ne convoiteras point. '
  '8':
  - type: note
    content: Jn 15:22. Ro 4:15; 5:20. Ga 3:19.
  - type: text
    content: 'Et le péché, saisissant l’occasion, produisit en moi par le commandement toutes sortes de convoitises; car sans loi le péché est mort. '
  '9':
  - type: text
    content: 'Pour moi, étant autrefois sans loi, je vivais; mais quand le commandement vint, le péché reprit vie, et moi je mourus. '
