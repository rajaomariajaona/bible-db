document_id: ROM.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le chrétien, affranchi de la loi, sert Dieu dans un esprit nouveau
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. Ép 5:25-31. (Ga 2:19, 20. Ro 6:14, etc.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ignorez-vous, frères, car je parle à des gens qui connaissent la loi, que la loi exerce son pouvoir sur l’homme aussi longtemps qu’il vit? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 7:39
      metadata:
        usfm: 1CO.7.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ainsi, une femme mariée est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 7:2
      metadata:
        usfm: 1CO.7.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: 1CO.7.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'liée par la loi à son mari tant qu’il est vivant; mais si le mari meurt, elle est dégagée de la loi qui la liait à son mari. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:32
      metadata:
        usfm: MAT.5.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si donc, du vivant de son mari, elle devient la femme d’un autre homme, elle sera appelée adultère; mais si le mari meurt, elle est affranchie de la loi, de sorte qu’elle n’est point adultère en devenant la femme d’un autre. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'De même, mes frères, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 2:19
      metadata:
        usfm: GAL.2.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:1
      metadata:
        usfm: 1PE.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vous aussi vous avez été, par le corps de Christ, mis à mort en ce qui concerne la loi, pour que vous apparteniez à un autre, à celui qui est ressuscité des morts, afin que nous portions des fruits pour Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Car, lorsque nous étions dans la chair, les passions des péchés provoquées par la loi agissaient dans nos membres, de sorte que nous portions des fruits pour la mort. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais maintenant, nous avons été dégagés de la loi, étant morts à cette loi sous laquelle nous étions retenus, de sorte que nous servons '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 2:29
      metadata:
        usfm: ROM.2.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 3:6
      metadata:
        usfm: 2CO.3.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: dans un esprit nouveau, et non selon la lettre qui a vieilli.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La loi, quoique sainte, a provoqué les transgressions, en faisant connaître le péché. Lutte de la chair contre l’esprit
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-13: cf. Ro 5:20; 3:19, 20; 4:15. Ga 3:21, 22.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Que dirons-nous donc? La loi est-elle péché? Loin de là! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 3:20
      metadata:
        usfm: ROM.3.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 7:18
      metadata:
        usfm: HEB.7.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais je n’ai connu le péché que par la loi. Car je n’aurais pas connu la convoitise, si la loi n’eût dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:17
      metadata:
        usfm: EXO.20.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:21
      metadata:
        usfm: DEU.5.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne convoiteras point. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 15:22
      metadata:
        usfm: JHN.15.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 4:15
      metadata:
        usfm: ROM.4.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:20
      metadata:
        usfm: ROM.5.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:19
      metadata:
        usfm: GAL.3.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et le péché, saisissant l’occasion, produisit en moi par le commandement toutes sortes de convoitises; car sans loi le péché est mort. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Pour moi, étant autrefois sans loi, je vivais; mais quand le commandement vint, le péché reprit vie, et moi je mourus. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ainsi, le commandement qui conduit à la vie se trouva pour moi conduire à la mort. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Car le péché saisissant l’occasion, me séduisit par le commandement, et par lui me fit mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:8
      metadata:
        usfm: 1TI.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'La loi donc est sainte, et le commandement est saint, juste et bon. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ce qui est bon a-t-il donc été pour moi une cause de mort? Loin de là! Mais c’est le péché, afin qu’il se manifestât comme péché en me donnant la mort par ce qui est bon, et que, par le commandement, il devînt condamnable au plus haut point.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-25: cf. Ga 5:16-25. Ro 8:1-4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nous savons, en effet, que la loi est spirituelle; mais moi, je suis charnel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 52:3
      metadata:
        usfm: ISA.52.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vendu au péché. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Car je ne sais pas ce que je fais: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:17
      metadata:
        usfm: GAL.5.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je ne fais point ce que je veux, et je fais ce que je hais. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Or, si je fais ce que je ne veux pas, je reconnais par là que la loi est bonne. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et maintenant ce n’est plus moi qui le fais, mais c’est le péché qui habite en moi. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 6:5
      metadata:
        usfm: GEN.6.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:21
      metadata:
        usfm: GEN.8.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ce qui est bon, je le sais, n’habite pas en moi, c’est-à-dire dans ma chair: j’ai la volonté, mais non le pouvoir de faire le bien. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Car je ne fais pas le bien que je veux, et je fais le mal que je ne veux pas. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Et si je fais ce que je ne veux pas, ce n’est plus moi qui le fais, c’est le péché qui habite en moi. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Je trouve donc en moi cette loi: quand je veux faire le bien, le mal est attaché à moi. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 3:16
      metadata:
        usfm: EPH.3.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car je prends plaisir à la loi de Dieu, selon l’homme intérieur; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:17
      metadata:
        usfm: GAL.5.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais je vois dans mes membres une autre loi, qui lutte contre la loi de mon entendement, et qui me rend captif de la loi du péché, qui est dans mes membres. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Misérable que je suis! Qui me délivrera du corps de cette mort?… '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Grâces soient rendues à Dieu par Jésus-Christ notre Seigneur!… Ainsi donc, moi-même, je suis par l’entendement esclave de la loi de Dieu, et je suis par la chair esclave de la loi du péché.
