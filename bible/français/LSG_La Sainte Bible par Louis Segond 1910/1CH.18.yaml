document_id: 1CH.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Victoires de David sur les Philistins, les Moabites, les Syriens, les Édomites. Hauts fonctionnaires de David
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. 2 S 8:1-14. 1 S 18:14. (Ps 60; 108.) 2 Co 2:14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, David battit les Philistins et les humilia, et il enleva de la main des Philistins Gath et les villes de son ressort. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il battit les Moabites, et les Moabites furent assujettis à David et lui payèrent un tribut. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David battit Hadarézer, roi de Tsoba, vers Hamath, lorsqu’il alla établir sa domination sur le fleuve de l’Euphrate. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David lui prit mille chars, sept mille cavaliers, et vingt mille hommes de pied; il coupa les jarrets à tous les chevaux de trait, et ne conserva que cent attelages. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les Syriens de Damas vinrent au secours d’Hadarézer, roi de Tsoba, et David battit vingt-deux mille Syriens. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'David mit des garnisons dans la Syrie de Damas. Et les Syriens furent assujettis à David, et lui payèrent un tribut. L’Éternel protégeait David partout où il allait. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et David prit les boucliers d’or qu’avaient les serviteurs d’Hadarézer, et les apporta à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'David prit encore une grande quantité d’airain à Thibchath et à Cun, villes d’Hadarézer. Salomon en fit la mer d’airain, les colonnes et les ustensiles d’airain. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Thohu, roi de Hamath, apprit que David avait battu toute l’armée d’Hadarézer, roi de Tsoba, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et il envoya Hadoram, son fils, vers le roi David, pour le saluer, et pour le féliciter d’avoir attaqué Hadarézer et de l’avoir battu. Car Thohu était en guerre avec Hadarézer. Il envoya aussi toutes sortes de vases d’or, d’argent et d’airain. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le roi David les consacra à l’Éternel, avec l’argent et l’or qu’il avait pris sur toutes les nations, sur Édom, sur Moab, sur les fils d’Ammon, sur les Philistins et sur Amalek. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Abischaï, fils de Tseruja, battit dans la vallée du sel dix-huit mille Édomites. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il mit des garnisons dans Édom, et tout Édom fut assujetti à David. L’Éternel protégeait David partout où il allait.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-17: cf. 2 S 8:15-18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'David régna sur tout Israël, et il faisait droit et justice à tout son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Joab, fils de Tseruja, commandait l’armée; Josaphat, fils d’Achilud, était archiviste; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsadok, fils d’Achithub, et Abimélec, fils d’Abiathar, étaient sacrificateurs; Schavscha était secrétaire; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Benaja, fils de Jehojada, était chef des Kéréthiens et des Péléthiens; et les fils de David étaient les premiers auprès du roi.
