document_id: ISA.55,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le salut est offert gratuitement à tous
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-5: cf. (Mt 22:1-14. Lu 14:15-24.) (Ac 13:32-34. Ro 15:8-12.)'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 7:37
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '38'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Vous tous qui avez soif, venez aux eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même celui qui n’a pas d’argent!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Venez, achetez et mangez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Venez, achetez du vin et du lait, sans argent, sans rien payer!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme la pluie et la neige descendent des cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et n’y retournent pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans avoir arrosé, fécondé la terre, et fait germer les plantes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans avoir donné de la semence au semeur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et du pain à celui qui mange,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi en est-il de ma parole, qui sort de ma bouche:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle ne retourne point à moi sans effet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans avoir exécuté ma volonté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et accompli mes desseins.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, vous sortirez avec joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous serez conduits en paix;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les montagnes et les collines éclateront d’allégresse devant vous,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 16:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et tous les arbres de la campagne battront des mains.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au lieu de l’épine s’élèvera le cyprès,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au lieu de la ronce croîtra le myrte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ce sera pour l’Éternel une gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un monument perpétuel, impérissable.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi pesez-vous de l’argent pour ce qui ne nourrit pas?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi travaillez-vous pour ce qui ne rassasie pas?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoutez-moi donc, et vous mangerez ce qui est bon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et votre âme se délectera de mets succulents.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prêtez l’oreille, et venez à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Écoutez, et votre âme vivra:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je traiterai avec vous une alliance éternelle,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Pour rendre durables mes faveurs envers David.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je l’ai établi comme témoin auprès des peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme chef et dominateur des peuples.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, tu appelleras des nations que tu ne connais pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les nations qui ne te connaissent pas accourront vers toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de l’Éternel, ton Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du Saint d’Israël, qui te glorifie.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-13: cf. (Éz 18:27-32. Lu 24:46, 47.) (Ro 11:32, 33. Mi 7:20.) Jé 31:7-14.'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cherchez l’Éternel pendant qu’il se trouve;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Invoquez-le, tandis qu’il est près.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le méchant abandonne sa voie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’homme d’iniquité ses pensées;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il retourne à l’Éternel, qui aura pitié de lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A notre Dieu, qui ne se lasse pas de pardonner.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car mes pensées ne sont pas vos pensées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vos voies ne sont pas mes voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Autant les cieux sont élevés au-dessus de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Autant mes voies sont élevées au-dessus de vos voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mes pensées au-dessus de vos pensées.
