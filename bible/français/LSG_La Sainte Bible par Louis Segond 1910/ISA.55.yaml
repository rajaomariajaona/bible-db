document_id: ISA.55,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le salut est offert gratuitement à tous
  - type: heading
    content: 'V. 1-5: cf. (Mt 22:1-14. Lu 14:15-24.) (Ac 13:32-34. Ro 15:8-12.)'
  - type: text
    content: ' '
  - type: note
    content: Jn 7:37, 38.
  - type: text
    content: Vous tous qui avez soif, venez aux eaux,
  - type: text
    content: Même celui qui n’a pas d’argent!
  - type: text
    content: Venez, achetez et mangez,
  - type: text
    content: Venez, achetez du vin et du lait, sans argent, sans rien payer!
  '10':
  - type: text
    content: Comme la pluie et la neige descendent des cieux,
  - type: text
    content: Et n’y retournent pas
  - type: text
    content: Sans avoir arrosé, fécondé la terre, et fait germer les plantes,
  - type: text
    content: Sans avoir donné de la semence au semeur
  - type: text
    content: Et du pain à celui qui mange,
  '11':
  - type: text
    content: 'Ainsi en est-il de ma parole, qui sort de ma bouche:'
  - type: text
    content: Elle ne retourne point à moi sans effet,
  - type: text
    content: Sans avoir exécuté ma volonté
  - type: text
    content: Et accompli mes desseins.
  '12':
  - type: text
    content: Oui, vous sortirez avec joie,
  - type: text
    content: Et vous serez conduits en paix;
  - type: text
    content: Les montagnes et les collines éclateront d’allégresse devant vous,
  - type: note
    content: 1 Ch 16:33.
  - type: text
    content: Et tous les arbres de la campagne battront des mains.
  '13':
  - type: text
    content: Au lieu de l’épine s’élèvera le cyprès,
  - type: text
    content: Au lieu de la ronce croîtra le myrte;
  - type: text
    content: Et ce sera pour l’Éternel une gloire,
  - type: text
    content: Un monument perpétuel, impérissable.
  '2':
  - type: text
    content: Pourquoi pesez-vous de l’argent pour ce qui ne nourrit pas?
  - type: text
    content: Pourquoi travaillez-vous pour ce qui ne rassasie pas?
  - type: text
    content: Écoutez-moi donc, et vous mangerez ce qui est bon,
  - type: text
    content: Et votre âme se délectera de mets succulents.
  '3':
  - type: text
    content: Prêtez l’oreille, et venez à moi,
  - type: text
    content: 'Écoutez, et votre âme vivra:'
  - type: text
    content: Je traiterai avec vous une alliance éternelle,
  - type: note
    content: Ac 13:34.
  - type: text
    content: Pour rendre durables mes faveurs envers David.
  '4':
  - type: text
    content: Voici, je l’ai établi comme témoin auprès des peuples,
  - type: text
    content: Comme chef et dominateur des peuples.
  '5':
  - type: text
    content: Voici, tu appelleras des nations que tu ne connais pas,
  - type: text
    content: Et les nations qui ne te connaissent pas accourront vers toi,
  - type: text
    content: A cause de l’Éternel, ton Dieu,
  - type: text
    content: Du Saint d’Israël, qui te glorifie.
  - type: heading
    content: 'V. 6-13: cf. (Éz 18:27-32. Lu 24:46, 47.) (Ro 11:32, 33. Mi 7:20.) Jé 31:7-14.'
  '6':
  - type: text
    content: Cherchez l’Éternel pendant qu’il se trouve;
  - type: text
    content: Invoquez-le, tandis qu’il est près.
  '7':
  - type: text
    content: Que le méchant abandonne sa voie,
  - type: text
    content: Et l’homme d’iniquité ses pensées;
  - type: text
    content: Qu’il retourne à l’Éternel, qui aura pitié de lui,
  - type: text
    content: A notre Dieu, qui ne se lasse pas de pardonner.
  '8':
  - type: text
    content: Car mes pensées ne sont pas vos pensées,
  - type: text
    content: Et vos voies ne sont pas mes voies,
  - type: text
    content: Dit l’Éternel.
  '9':
  - type: text
    content: Autant les cieux sont élevés au-dessus de la terre,
  - type: text
    content: Autant mes voies sont élevées au-dessus de vos voies,
  - type: text
    content: Et mes pensées au-dessus de vos pensées.
