document_id: JER.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie sur la destruction de Jérusalem et du temple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. Jé 7:1-15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au commencement du règne de Jojakim, fils de Josias, roi de Juda, cette parole fut prononcée de la part de l’Éternel, en ces mots: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ainsi parle l’Éternel: Tiens-toi dans le parvis de la maison de l’Éternel, et dis à ceux qui de toutes les villes de Juda viennent se prosterner dans la maison de l’Éternel toutes les paroles que je t’ordonne de leur dire; n’en retranche pas un mot. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Peut-être écouteront-ils, et reviendront-ils chacun de leur mauvaise voie; alors je me '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 18:8
      metadata:
        usfm: JER.18.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'repentirai du mal que j’avais pensé leur faire à cause de la méchanceté de leurs actions. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu leur diras: Ainsi parle l’Éternel: Si vous ne m’écoutez pas quand je vous ordonne de suivre ma loi que j’ai mise devant vous, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'd’écouter les paroles de mes serviteurs, les prophètes, que je vous envoie, que je vous ai envoyés '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:13
      metadata:
        usfm: JER.7.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: JER.7.25
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:7
      metadata:
        usfm: JER.11.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:3
      metadata:
        usfm: JER.25.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dès le matin, et que vous n’avez pas écoutés, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'alors je traiterai cette maison comme '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 4:12
      metadata:
        usfm: 1SA.4.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:60
      metadata:
        usfm: PSA.78.60
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:12
      metadata:
        usfm: JER.7.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: JER.7.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Silo, et je ferai de cette ville un objet de malédiction pour toutes les nations de la terre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jérémie en danger de mort
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-15: cf. Jé 1:19; 5:12, 13; 38:1-6. Am 7:8-13. 2 Ti 4:2-5. Mt 10:16.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les sacrificateurs, les prophètes, et tout le peuple, entendirent Jérémie prononcer ces paroles dans la maison de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et comme Jérémie achevait de dire tout ce que l’Éternel lui avait ordonné de dire à tout le peuple, les sacrificateurs, les prophètes, et tout le peuple, se saisirent de lui, en disant: Tu mourras! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Pourquoi prophétises-tu au nom de l’Éternel, en disant: Cette maison sera comme Silo, et cette ville sera dévastée, privée d’habitants? Tout le peuple s’attroupa autour de Jérémie dans la maison de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lorsque les chefs de Juda eurent appris ces choses, ils montèrent de la maison du roi à la maison de l’Éternel, et s’assirent à l’entrée de la porte neuve de la maison de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors les sacrificateurs et les prophètes parlèrent ainsi aux chefs et à tout le peuple: Cet homme mérite la mort; car il a prophétisé contre cette ville, comme vous l’avez entendu de vos oreilles. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jérémie dit à tous les chefs et à tout le peuple: L’Éternel m’a envoyé pour prophétiser contre cette maison et contre cette ville, toutes les choses que vous avez entendues. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Maintenant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:3
      metadata:
        usfm: JER.7.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'réformez vos voies et vos œuvres, écoutez la voix de l’Éternel, votre Dieu, et l’Éternel se repentira du mal qu’il a prononcé contre vous. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Pour moi, me voici entre vos mains; traitez-moi comme il vous semblera bon et juste. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Seulement sachez que, si vous me faites mourir, vous vous chargez du sang innocent, vous, cette ville et ses habitants; car l’Éternel m’a véritablement envoyé vers vous pour prononcer à vos oreilles toutes ces paroles.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-24: cf. (Jé 36:10-26; 38:7-13.) Ac 5:34, etc. Ps 37:32, 33.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les chefs et tout le peuple dirent aux sacrificateurs et aux prophètes: Cet homme ne mérite point la mort; car c’est au nom de l’Éternel, notre Dieu, qu’il nous a parlé. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et quelques-uns des anciens du pays se levèrent, et dirent à toute l’assemblée du peuple: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 1:1
      metadata:
        usfm: MIC.1.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Michée, de Moréscheth, prophétisait du temps d’Ézéchias, roi de Juda, et il disait à tout le peuple de Juda: Ainsi parle l’Éternel des armées:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 3:12
      metadata:
        usfm: MIC.3.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Sion sera labourée comme un champ,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jérusalem deviendra un monceau de pierres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et la montagne de la maison une haute forêt. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ézéchias, roi de Juda, et tout Juda l’ont-ils fait mourir? Ézéchias ne craignit-il pas l’Éternel? N’implora-t-il pas l’Éternel? Alors l’Éternel se repentit du mal qu’il avait prononcé contre eux. Et nous, nous chargerions notre âme d’un si grand crime! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il y eut aussi un homme qui prophétisait au nom de l’Éternel, Urie, fils de Schemaeja, de Kirjath-Jearim. Il prophétisa contre cette ville et contre ce pays entièrement les mêmes choses que Jérémie. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le roi Jojakim, tous ses vaillants hommes, et tous ses chefs, entendirent ses paroles, et le roi chercha à le faire mourir. Urie, qui en fut informé, eut peur, prit la fuite, et alla en Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le roi Jojakim envoya des gens en Égypte, Elnathan, fils d’Acbor, et des gens avec lui en Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ils firent sortir d’Égypte Urie et l’amenèrent au roi Jojakim, qui le fit mourir par l’épée et jeta son cadavre sur les sépulcres des enfants du peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Cependant la main d’Achikam, fils de Schaphan, fut avec Jérémie, et empêcha qu’il ne fût livré au peuple pour être mis à mort.
