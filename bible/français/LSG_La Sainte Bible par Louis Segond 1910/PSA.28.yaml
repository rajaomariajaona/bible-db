document_id: PSA.28,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 5; 35; 59; 64.
  - type: text
    content: De David.
  - type: text
    content: Éternel! C’est à toi que je crie.
  - type: text
    content: Mon rocher! Ne reste pas sourd à ma voix,
  - type: note
    content: Ps 143:7.
  - type: text
    content: De peur que, si tu t’éloignes sans me répondre,
  - type: text
    content: 'Je ne sois semblable à '
  - type: note
    content: Ps 30:4.
  - type: text
    content: ceux qui descendent dans la fosse.
  '2':
  - type: text
    content: Écoute la voix de mes supplications, quand je crie à toi,
  - type: text
    content: Quand j’élève mes mains vers ton sanctuaire.
  '3':
  - type: text
    content: Ne m’emporte pas avec les méchants et les hommes iniques,
  - type: note
    content: Ps 12:3. Jé 9:8.
  - type: text
    content: Qui parlent de paix à leur prochain et qui ont la malice dans le cœur.
  '4':
  - type: text
    content: Rends-leur selon leurs œuvres et selon la malice de leurs actions,
  - type: text
    content: Rends-leur selon l’ouvrage de leurs mains;
  - type: text
    content: Donne-leur le salaire qu’ils méritent.
  '5':
  - type: text
    content: Car ils ne sont pas attentifs aux œuvres de l’Éternel,
  - type: text
    content: A l’ouvrage de ses mains.
  - type: text
    content: Qu’il les renverse et ne les relève point!
  '6':
  - type: text
    content: Béni soit l’Éternel!
  - type: text
    content: Car il exauce la voix de mes supplications.
  '7':
  - type: text
    content: L’Éternel est ma force et mon bouclier;
  - type: text
    content: En lui mon cœur se confie, et je suis secouru;
  - type: text
    content: J’ai de l’allégresse dans le cœur,
  - type: text
    content: Et je le loue par mes chants.
  '8':
  - type: text
    content: L’Éternel est la force de son peuple,
  - type: text
    content: Il est le rocher des délivrances de son oint.
  '9':
  - type: text
    content: Sauve ton peuple et bénis ton héritage!
  - type: text
    content: Sois leur berger et leur soutien pour toujours!
