document_id: PSA.28,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 5; 35; 59; 64.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel! C’est à toi que je crie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon rocher! Ne reste pas sourd à ma voix,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 143:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: De peur que, si tu t’éloignes sans me répondre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je ne sois semblable à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 30:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ceux qui descendent dans la fosse.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoute la voix de mes supplications, quand je crie à toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand j’élève mes mains vers ton sanctuaire.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne m’emporte pas avec les méchants et les hommes iniques,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 12:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 9:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui parlent de paix à leur prochain et qui ont la malice dans le cœur.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rends-leur selon leurs œuvres et selon la malice de leurs actions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rends-leur selon l’ouvrage de leurs mains;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donne-leur le salaire qu’ils méritent.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils ne sont pas attentifs aux œuvres de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A l’ouvrage de ses mains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il les renverse et ne les relève point!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni soit l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il exauce la voix de mes supplications.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est ma force et mon bouclier;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En lui mon cœur se confie, et je suis secouru;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai de l’allégresse dans le cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je le loue par mes chants.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est la force de son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est le rocher des délivrances de son oint.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sauve ton peuple et bénis ton héritage!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois leur berger et leur soutien pour toujours!
