document_id: ROM.10,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-13: cf. Ro 9:1-5, 31-33; 3:19-29. Ga 3:8-14, 21-29.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Frères, le vœu de mon cœur et ma prière à Dieu pour eux, c’est qu’ils soient sauvés. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car c’est en croyant du cœur qu’on parvient à la justice, et c’est en confessant de la bouche qu’on parvient au salut, selon ce que dit l’Écriture: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 28:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quiconque croit en lui ne sera point confus. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 15:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il n’y a aucune différence, en effet, entre le Juif et le Grec, puisqu’ils ont tous un même Seigneur, qui est riche pour tous ceux qui l’invoquent. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 2:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car quiconque invoquera le nom du Seigneur sera sauvé.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-21: cf. Mc 16:15, 16, 20. Ac 13:45-49. És 49:4-6.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comment donc invoqueront-ils celui en qui ils n’ont pas cru? Et comment croiront-ils en celui dont ils n’ont pas entendu parler? Et comment en entendront-ils parler, s’il n’y a personne qui prêche? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et comment y aura-t-il des prédicateurs, s’ils ne sont pas envoyés? Selon qu’il est écrit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 52:7
      - type: text
        text: . Na 1:15.
      marker-yv: yv-n
    - type: text
      text: Qu’ils sont beaux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les pieds de ceux qui annoncent la paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'De ceux qui annoncent de bonnes nouvelles! '
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais tous n’ont pas obéi à la bonne nouvelle. Aussi Ésaïe dit-il:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 53:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 12:38
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui a cru à notre prédication?
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ainsi la foi vient de ce qu’on entend, et ce qu’on entend vient de la parole de Christ. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Mais je dis: N’ont-ils pas entendu? Au contraire!'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 19:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Leur voix est allée par toute la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leurs paroles jusqu’aux extrémités du monde.
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Mais je dis: Israël ne l’a-t-il pas su? Moïse le premier dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'J’exciterai votre jalousie par ce qui n’est point une nation, je provoquerai votre colère par une nation sans intelligence. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je leur rends le témoignage qu’ils ont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 22:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 4:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'du zèle pour Dieu, mais sans intelligence: '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Et Ésaïe pousse la hardiesse jusqu’à dire:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 65:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: J’ai été trouvé par ceux qui ne me cherchaient pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me suis manifesté à ceux qui ne me demandaient pas.
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Mais au sujet d’Israël, il dit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 65:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: J’ai tendu mes mains tout le jour vers un peuple rebelle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et contredisant.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ne connaissant pas la justice de Dieu, et cherchant à établir leur propre justice, ils ne se sont pas soumis à la justice de Dieu; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13:38
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 3:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 3:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car Christ est la fin de la loi, pour la justification de tous ceux qui croient. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, Moïse définit ainsi la justice qui vient de la loi: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 20:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 3:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'L’homme qui mettra ces choses en pratique vivra par elles. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais voici comment parle la justice qui vient de la foi: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 30:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ne dis pas en ton cœur: Qui montera au ciel? C’est en faire descendre Christ; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ou: Qui descendra dans l’abîme? C’est faire remonter Christ d’entre les morts. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que dit-elle donc? La parole est près de toi, dans ta bouche et dans ton cœur. Or, c’est la parole de la foi, que nous prêchons. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si tu confesses de ta bouche le Seigneur Jésus, et si tu crois dans ton cœur que Dieu l’a ressuscité des morts, tu seras sauvé. '
