document_id: ROM.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-13: cf. Ro 9:1-5, 31-33; 3:19-29. Ga 3:8-14, 21-29.'
  - type: text
    content: 'Frères, le vœu de mon cœur et ma prière à Dieu pour eux, c’est qu’ils soient sauvés. '
  '10':
  - type: text
    content: 'Car c’est en croyant du cœur qu’on parvient à la justice, et c’est en confessant de la bouche qu’on parvient au salut, selon ce que dit l’Écriture: '
  '11':
  - type: note
    content: És 28:16. Ro 9:33.
  - type: text
    content: 'Quiconque croit en lui ne sera point confus. '
  '12':
  - type: note
    content: Ac 15:9. Ro 3:22.
  - type: text
    content: 'Il n’y a aucune différence, en effet, entre le Juif et le Grec, puisqu’ils ont tous un même Seigneur, qui est riche pour tous ceux qui l’invoquent. '
  '13':
  - type: note
    content: Joë 2:32. Ac 2:21.
  - type: text
    content: Car quiconque invoquera le nom du Seigneur sera sauvé.
  - type: heading
    content: 'V. 14-21: cf. Mc 16:15, 16, 20. Ac 13:45-49. És 49:4-6.'
  '14':
  - type: text
    content: 'Comment donc invoqueront-ils celui en qui ils n’ont pas cru? Et comment croiront-ils en celui dont ils n’ont pas entendu parler? Et comment en entendront-ils parler, s’il n’y a personne qui prêche? '
  '15':
  - type: text
    content: 'Et comment y aura-t-il des prédicateurs, s’ils ne sont pas envoyés? Selon qu’il est écrit:'
  - type: note
    content: És 52:7. Na 1:15.
  - type: text
    content: Qu’ils sont beaux
  - type: text
    content: Les pieds de ceux qui annoncent la paix,
  - type: text
    content: 'De ceux qui annoncent de bonnes nouvelles! '
  '16':
  - type: text
    content: 'Mais tous n’ont pas obéi à la bonne nouvelle. Aussi Ésaïe dit-il:'
  - type: text
    content: Seigneur,
  - type: note
    content: És 53:1. Jn 12:38.
  - type: text
    content: Qui a cru à notre prédication?
  '17':
  - type: text
    content: 'Ainsi la foi vient de ce qu’on entend, et ce qu’on entend vient de la parole de Christ. '
  '18':
  - type: text
    content: 'Mais je dis: N’ont-ils pas entendu? Au contraire!'
  - type: note
    content: Ps 19:5.
  - type: text
    content: Leur voix est allée par toute la terre,
  - type: text
    content: Et leurs paroles jusqu’aux extrémités du monde.
  '19':
  - type: text
    content: 'Mais je dis: Israël ne l’a-t-il pas su? Moïse le premier dit: '
  - type: note
    content: De 32:21.
  - type: text
    content: 'J’exciterai votre jalousie par ce qui n’est point une nation, je provoquerai votre colère par une nation sans intelligence. '
  '2':
  - type: text
    content: 'Je leur rends le témoignage qu’ils ont '
  - type: note
    content: Ac 22:3. Ro 9:31. Ga 4:17.
  - type: text
    content: 'du zèle pour Dieu, mais sans intelligence: '
  '20':
  - type: text
    content: 'Et Ésaïe pousse la hardiesse jusqu’à dire:'
  - type: note
    content: És 65:1.
  - type: text
    content: J’ai été trouvé par ceux qui ne me cherchaient pas,
  - type: text
    content: Je me suis manifesté à ceux qui ne me demandaient pas.
  '21':
  - type: text
    content: 'Mais au sujet d’Israël, il dit:'
  - type: note
    content: És 65:2.
  - type: text
    content: J’ai tendu mes mains tout le jour vers un peuple rebelle
  - type: text
    content: Et contredisant.
  '3':
  - type: text
    content: 'ne connaissant pas la justice de Dieu, et cherchant à établir leur propre justice, ils ne se sont pas soumis à la justice de Dieu; '
  '4':
  - type: note
    content: Mt 5:17. Ac 13:38. 2 Co 3:13. Ga 3:24.
  - type: text
    content: 'car Christ est la fin de la loi, pour la justification de tous ceux qui croient. '
  '5':
  - type: text
    content: 'En effet, Moïse définit ainsi la justice qui vient de la loi: '
  - type: note
    content: Lé 18:5. Éz 20:11. Ga 3:12.
  - type: text
    content: 'L’homme qui mettra ces choses en pratique vivra par elles. '
  '6':
  - type: text
    content: 'Mais voici comment parle la justice qui vient de la foi: '
  - type: note
    content: De 30:12.
  - type: text
    content: 'Ne dis pas en ton cœur: Qui montera au ciel? C’est en faire descendre Christ; '
  '7':
  - type: text
    content: 'ou: Qui descendra dans l’abîme? C’est faire remonter Christ d’entre les morts. '
  '8':
  - type: text
    content: 'Que dit-elle donc? La parole est près de toi, dans ta bouche et dans ton cœur. Or, c’est la parole de la foi, que nous prêchons. '
  '9':
  - type: text
    content: 'Si tu confesses de ta bouche le Seigneur Jésus, et si tu crois dans ton cœur que Dieu l’a ressuscité des morts, tu seras sauvé. '
