document_id: 1CH.13,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’arche déposée par David dans la maison d’Obed-Édom
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-14: cf. 1 S 7:1, 2. 2 S 6:1-11. Ps 132.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'David tint conseil avec les chefs de milliers et de centaines, avec tous les princes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'La colère de l’Éternel s’enflamma contre Uzza, et l’Éternel le frappa parce qu’il avait étendu la main sur l’arche. Uzza mourut là, devant Dieu. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'David fut irrité de ce que l’Éternel avait frappé Uzza d’un tel châtiment. Et ce lieu a été appelé jusqu’à ce jour Pérets-Uzza. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'David eut peur de Dieu en ce jour-là, et il dit: Comment ferais-je entrer chez moi l’arche de Dieu? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 6:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'David ne retira pas l’arche chez lui dans la cité de David, et il la fit conduire dans la maison d’Obed-Édom de Gath. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: L’arche de Dieu resta trois mois dans la maison d’Obed-Édom, dans sa maison. Et l’Éternel bénit la maison d’Obed-Édom et tout ce qui lui appartenait.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Et David dit à toute l’assemblée d’Israël: Si vous le trouvez bon, et si cela vient de l’Éternel, notre Dieu, envoyons de tous côtés vers nos frères qui restent dans toutes les contrées d’Israël, et aussi vers les sacrificateurs et les Lévites dans les villes où sont leurs banlieues, afin qu’ils se réunissent à nous, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'et ramenons auprès de nous l’arche de notre Dieu, car nous ne nous en sommes pas occupés du temps de Saül. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Toute l’assemblée décida de faire ainsi, car la chose parut convenable à tout le peuple. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 6:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'David assembla tout Israël, depuis le Schichor d’Égypte jusqu’à l’entrée de Hamath, pour faire venir de Kirjath-Jearim l’arche de Dieu. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Et David, avec tout Israël, monta à Baala, à Kirjath-Jearim, qui est à Juda, pour faire monter de là l’arche de Dieu, devant laquelle est invoqué le nom de l’Éternel qui réside entre les chérubins. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ils mirent sur un char neuf l’arche de Dieu, qu’ils emportèrent de la maison d’Abinadab: Uzza et Achjo conduisaient le char. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'David et tout Israël dansaient devant Dieu de toute leur force, en chantant, et en jouant des harpes, des luths, des tambourins, des cymbales et des trompettes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Lorsqu’ils furent arrivés à l’aire de Kidon, Uzza étendit la main pour saisir l’arche, parce que les bœufs la faisaient pencher. '
