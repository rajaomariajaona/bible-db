      marker-yv: yv-n
    - type: text
      text: ni sang.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il posera sa main sur la tête de la victime, qu’il égorgera à l’entrée de la tente d’assignation; et les sacrificateurs, fils d’Aaron, répandront le sang sur l’autel tout autour. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De ce sacrifice d’actions de grâces, il offrira en sacrifice consumé par le feu devant l’Éternel: '
    - type: usfm
