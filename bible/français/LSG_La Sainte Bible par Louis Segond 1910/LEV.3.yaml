document_id: LEV.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les sacrifices d’actions de grâces
  - type: heading
    content: 'V. 1-17: cf. (Lé 9:18-21; 7:11-36.) Hé 13:15. 1 Co 10:16-18.'
  - type: text
    content: 'Lorsque quelqu’un offrira à l’Éternel un sacrifice d’actions de grâces: S’il offre du gros bétail, mâle ou femelle, il l’offrira sans défaut, devant l’Éternel. '
  '10':
  - type: text
    content: 'les deux rognons, et la graisse qui les entoure, qui couvre les flancs, et le grand lobe du foie, qu’il détachera près des rognons. '
  '11':
  - type: text
    content: 'Le sacrificateur brûlera cela sur l’autel. C’est '
  - type: note
    content: Lé 21:6, 8, 17, 21, 22; 22:25. Éz 44:7. Mal 1:12.
  - type: text
    content: 'l’aliment d’un sacrifice consumé par le feu devant l’Éternel. '
  '12':
  - type: text
    content: 'Si son offrande est une chèvre, il la présentera devant l’Éternel. '
  '13':
  - type: text
    content: 'Il posera sa main sur la tête de sa victime, qu’il égorgera devant la tente d’assignation; et les fils d’Aaron en répandront le sang sur l’autel tout autour. '
  '14':
  - type: text
    content: 'De la victime, il offrira en sacrifice consumé par le feu devant l’Éternel: la graisse qui couvre les entrailles et toute celle qui y est attachée, '
  '15':
  - type: text
    content: 'les deux rognons, et la graisse qui les entoure, qui couvre les flancs, et le grand lobe du foie, qu’il détachera près des rognons. '
  '16':
  - type: text
    content: 'Le sacrificateur brûlera cela sur l’autel. Toute la graisse est l’aliment d’un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
  '17':
  - type: text
    content: 'C’est ici une loi perpétuelle pour vos descendants, dans tous les lieux où vous habiterez: vous ne mangerez ni graisse '
  - type: note
    content: Ge 9:4. Lé 7:26; 17:10, 14.
  - type: text
    content: ni sang.
  '2':
  - type: text
    content: 'Il posera sa main sur la tête de la victime, qu’il égorgera à l’entrée de la tente d’assignation; et les sacrificateurs, fils d’Aaron, répandront le sang sur l’autel tout autour. '
  '3':
  - type: text
    content: 'De ce sacrifice d’actions de grâces, il offrira en sacrifice consumé par le feu devant l’Éternel: '
  - type: note
    content: Ex 29:13, 22.
  - type: text
    content: 'la graisse qui couvre les entrailles et toute celle qui y est attachée; '
  '4':
  - type: text
    content: 'les deux rognons, et la graisse qui les entoure, qui couvre les flancs, et le grand lobe du foie, qu’il détachera près des rognons. '
  '5':
  - type: text
    content: 'Les fils d’Aaron brûleront cela '
  - type: note
    content: Ex 29:25. Lé 6:12.
  - type: text
    content: 'sur l’autel, par-dessus l’holocauste qui sera sur le bois mis au feu. C’est un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
  '6':
  - type: text
    content: 'S’il offre du menu bétail, mâle ou femelle, en sacrifice d’actions de grâces à l’Éternel, il l’offrira sans défaut. '
  '7':
  - type: text
    content: 'S’il offre en sacrifice un agneau, il le présentera devant l’Éternel. '
  '8':
  - type: text
    content: 'Il posera sa main sur la tête de la victime, qu’il égorgera devant la tente d’assignation; et les fils d’Aaron en répandront le sang sur l’autel tout autour. '
  '9':
  - type: text
    content: 'De ce sacrifice d’actions de grâces, il offrira en sacrifice consumé par le feu devant l’Éternel: la graisse, la queue entière, qu’il séparera près de l’échine, la graisse qui couvre les entrailles et toute celle qui y est attachée, '
