    children:
    - type: text
      text: Les sacrifices d’actions de grâces
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-17: cf. (Lé 9:18-21; 7:11-36.) Hé 13:15. 1 Co 10:16-18.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque quelqu’un offrira à l’Éternel un sacrifice d’actions de grâces: S’il offre du gros bétail, mâle ou femelle, il l’offrira sans défaut, devant l’Éternel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les deux rognons, et la graisse qui les entoure, qui couvre les flancs, et le grand lobe du foie, qu’il détachera près des rognons. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur brûlera cela sur l’autel. C’est '
