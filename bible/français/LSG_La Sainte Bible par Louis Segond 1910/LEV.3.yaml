      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'sur l’autel, par-dessus l’holocauste qui sera sur le bois mis au feu. C’est un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il offre du menu bétail, mâle ou femelle, en sacrifice d’actions de grâces à l’Éternel, il l’offrira sans défaut. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il offre en sacrifice un agneau, il le présentera devant l’Éternel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il posera sa main sur la tête de la victime, qu’il égorgera devant la tente d’assignation; et les fils d’Aaron en répandront le sang sur l’autel tout autour. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De ce sacrifice d’actions de grâces, il offrira en sacrifice consumé par le feu devant l’Éternel: la graisse, la queue entière, qu’il séparera près de l’échine, la graisse qui couvre les entrailles et toute celle qui y est attachée, '
