  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si son offrande est une chèvre, il la présentera devant l’Éternel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il posera sa main sur la tête de sa victime, qu’il égorgera devant la tente d’assignation; et les fils d’Aaron en répandront le sang sur l’autel tout autour. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De la victime, il offrira en sacrifice consumé par le feu devant l’Éternel: la graisse qui couvre les entrailles et toute celle qui y est attachée, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les deux rognons, et la graisse qui les entoure, qui couvre les flancs, et le grand lobe du foie, qu’il détachera près des rognons. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur brûlera cela sur l’autel. Toute la graisse est l’aliment d’un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est ici une loi perpétuelle pour vos descendants, dans tous les lieux où vous habiterez: vous ne mangerez ni graisse '
    - type: usfm
