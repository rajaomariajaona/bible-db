document_id: ROM.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Recommandations, salutations et vœux
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-16: cf. 3 Jn 5-8. (Ac 18:2, 3, 18, 26. 1 Co 16:19, 20.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je vous recommande Phœbé, notre sœur, qui est diaconesse de l’Église de Cenchrées, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'afin que vous la receviez en notre Seigneur d’une manière digne des saints, et que vous l’assistiez dans les choses où elle aurait besoin de vous, car elle a donné aide à plusieurs et à moi-même. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 18:2
      metadata:
        usfm: ACT.18.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: ACT.18.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Saluez Prisca et Aquilas, mes compagnons d’œuvre en Jésus-Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'qui ont exposé leur tête pour sauver ma vie; ce n’est pas moi seul qui leur rends grâces, ce sont encore toutes les Églises des païens. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Saluez aussi l’Église qui est dans leur maison. Saluez Épaïnète, mon bien-aimé, qui a été pour Christ les prémices de l’Asie. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Saluez Marie, qui a pris beaucoup de peine pour vous. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Saluez Andronicus et Junias, mes parents et mes compagnons de captivité, qui jouissent d’une grande considération parmi les apôtres, et qui même ont été en Christ avant moi. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Saluez Amplias, mon bien-aimé dans le Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Saluez Urbain, notre compagnon d’œuvre en Christ, et Stachys, mon bien-aimé. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Saluez Apellès, qui est éprouvé en Christ. Saluez ceux de la maison d’Aristobule. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Saluez Hérodion, mon parent. Saluez ceux de la maison de Narcisse qui sont dans le Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Saluez Tryphène et Tryphose, qui travaillent pour le Seigneur. Saluez Perside, la bien-aimée, qui a beaucoup travaillé pour le Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Saluez Rufus, l’élu du Seigneur, et sa mère, qui est aussi la mienne. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Saluez Asyncrite, Phlégon, Hermès, Patrobas, Hermas, et les frères qui sont avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Saluez Philologue et Julie, Nérée et sa sœur, et Olympe, et tous les saints qui sont avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 16:20
      metadata:
        usfm: 1CO.16.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 13:12
      metadata:
        usfm: 2CO.13.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:26
      metadata:
        usfm: 1TH.5.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:14
      metadata:
        usfm: 1PE.5.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Saluez-vous les uns les autres par un saint baiser. Toutes les Églises de Christ vous saluent.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-20: cf. 1 Ti 6:3-5. Tit 3:9-11. 2 Pi 2:1-3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 2:8
      metadata:
        usfm: COL.2.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 3:10
      metadata:
        usfm: TIT.3.10
    - type: text
      text: . 2 Jn v. 10.
    marker-yv: yv-n
  - type: text
    text: 'Je vous exhorte, frères, à prendre garde à ceux qui causent des divisions et des scandales, au préjudice de l’enseignement que vous avez reçu. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 18:17
      metadata:
        usfm: MAT.18.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:6
      metadata:
        usfm: 2TH.3.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 3:5
      metadata:
        usfm: 2TI.3.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Éloignez-vous d’eux. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Car de tels hommes ne servent point Christ notre Seigneur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 3:19
      metadata:
        usfm: PHP.3.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais leur propre ventre; et, par des paroles douces et flatteuses, ils séduisent '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 13:18
      metadata:
        usfm: EZK.13.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les cœurs des simples. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Pour vous, votre obéissance est connue de tous; je me réjouis donc à votre sujet, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:16
      metadata:
        usfm: MAT.10.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 14:20
      metadata:
        usfm: 1CO.14.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et je désire que vous soyez sages en ce qui concerne le bien et purs en ce qui concerne le mal. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le Dieu de paix écrasera bientôt Satan sous vos pieds. Que la grâce de notre Seigneur Jésus-Christ soit avec vous!
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-27: cf. Ép 3:5-11, 20, 21. Jud v. 24, 25.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 16:1
      metadata:
        usfm: ACT.16.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:19
      metadata:
        usfm: PHP.2.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:1
      metadata:
        usfm: COL.1.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 3:2
      metadata:
        usfm: 1TH.3.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:2
      metadata:
        usfm: 1TI.1.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Timothée, mon compagnon d’œuvre, vous salue, ainsi que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 13:1
      metadata:
        usfm: ACT.13.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lucius, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 17:5
      metadata:
        usfm: ACT.17.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jason et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 20:4
      metadata:
        usfm: ACT.20.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Sosipater, mes parents. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Je vous salue dans le Seigneur, moi Tertius, qui ai écrit cette lettre. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Gaïus, mon hôte et celui de toute l’Église, vous salue. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 19:22
      metadata:
        usfm: ACT.19.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 4:20
      metadata:
        usfm: 2TI.4.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Éraste, le trésorier de la ville, vous salue, ainsi que le frère Quartus. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Que la grâce de notre Seigneur Jésus-Christ soit avec vous tous! Amen! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 3:20
      metadata:
        usfm: EPH.3.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'A celui qui peut vous affermir selon mon Évangile et la prédication de Jésus-Christ, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:9
      metadata:
        usfm: EPH.1.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:9
      metadata:
        usfm: EPH.3.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:26
      metadata:
        usfm: COL.1.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 1:10
      metadata:
        usfm: 2TI.1.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 1:2
      metadata:
        usfm: TIT.1.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:20
      metadata:
        usfm: 1PE.1.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'conformément à la révélation du mystère caché pendant des siècles, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'mais manifesté maintenant par les écrits des prophètes, d’après l’ordre du Dieu éternel, et porté à la connaissance de toutes les nations, afin qu’elles obéissent à la foi, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: à Dieu, seul sage, soit la gloire aux siècles des siècles, par Jésus-Christ! Amen!
