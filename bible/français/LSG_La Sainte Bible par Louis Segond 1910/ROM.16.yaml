document_id: ROM.16,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Recommandations, salutations et vœux
  - type: heading
    content: 'V. 1-16: cf. 3 Jn 5-8. (Ac 18:2, 3, 18, 26. 1 Co 16:19, 20.)'
  - type: text
    content: 'Je vous recommande Phœbé, notre sœur, qui est diaconesse de l’Église de Cenchrées, '
  '10':
  - type: text
    content: 'Saluez Apellès, qui est éprouvé en Christ. Saluez ceux de la maison d’Aristobule. '
  '11':
  - type: text
    content: 'Saluez Hérodion, mon parent. Saluez ceux de la maison de Narcisse qui sont dans le Seigneur. '
  '12':
  - type: text
    content: 'Saluez Tryphène et Tryphose, qui travaillent pour le Seigneur. Saluez Perside, la bien-aimée, qui a beaucoup travaillé pour le Seigneur. '
  '13':
  - type: text
    content: 'Saluez Rufus, l’élu du Seigneur, et sa mère, qui est aussi la mienne. '
  '14':
  - type: text
    content: 'Saluez Asyncrite, Phlégon, Hermès, Patrobas, Hermas, et les frères qui sont avec eux. '
  '15':
  - type: text
    content: 'Saluez Philologue et Julie, Nérée et sa sœur, et Olympe, et tous les saints qui sont avec eux. '
  '16':
  - type: note
    content: 1 Co 16:20. 2 Co 13:12. 1 Th 5:26. 1 Pi 5:14.
  - type: text
    content: Saluez-vous les uns les autres par un saint baiser. Toutes les Églises de Christ vous saluent.
  - type: heading
    content: 'V. 17-20: cf. 1 Ti 6:3-5. Tit 3:9-11. 2 Pi 2:1-3.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: Col 2:8. Tit 3:10. 2 Jn v. 10.
  - type: text
    content: 'Je vous exhorte, frères, à prendre garde à ceux qui causent des divisions et des scandales, au préjudice de l’enseignement que vous avez reçu. '
  - type: note
    content: Mt 18:17. 2 Th 3:6. 2 Ti 3:5.
  - type: text
    content: 'Éloignez-vous d’eux. '
  '18':
  - type: text
    content: 'Car de tels hommes ne servent point Christ notre Seigneur, '
  - type: note
    content: Ph 3:19.
  - type: text
    content: 'mais leur propre ventre; et, par des paroles douces et flatteuses, ils séduisent '
  - type: note
    content: Éz 13:18.
  - type: text
    content: 'les cœurs des simples. '
  '19':
  - type: text
    content: 'Pour vous, votre obéissance est connue de tous; je me réjouis donc à votre sujet, '
  - type: note
    content: Mt 10:16. 1 Co 14:20.
  - type: text
    content: 'et je désire que vous soyez sages en ce qui concerne le bien et purs en ce qui concerne le mal. '
  '2':
  - type: text
    content: 'afin que vous la receviez en notre Seigneur d’une manière digne des saints, et que vous l’assistiez dans les choses où elle aurait besoin de vous, car elle a donné aide à plusieurs et à moi-même. '
  '20':
  - type: text
    content: Le Dieu de paix écrasera bientôt Satan sous vos pieds. Que la grâce de notre Seigneur Jésus-Christ soit avec vous!
  - type: heading
    content: 'V. 21-27: cf. Ép 3:5-11, 20, 21. Jud v. 24, 25.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ac 16:1. Ph 2:19. Col 1:1. 1 Th 3:2. 1 Ti 1:2.
  - type: text
    content: 'Timothée, mon compagnon d’œuvre, vous salue, ainsi que '
  - type: note
    content: Ac 13:1.
  - type: text
    content: 'Lucius, '
  - type: note
    content: Ac 17:5.
  - type: text
    content: 'Jason et '
  - type: note
    content: Ac 20:4.
  - type: text
    content: 'Sosipater, mes parents. '
  '22':
  - type: text
    content: 'Je vous salue dans le Seigneur, moi Tertius, qui ai écrit cette lettre. '
  '23':
  - type: text
    content: 'Gaïus, mon hôte et celui de toute l’Église, vous salue. '
  - type: note
    content: Ac 19:22. 2 Ti 4:20.
  - type: text
    content: 'Éraste, le trésorier de la ville, vous salue, ainsi que le frère Quartus. '
  '24':
  - type: text
    content: 'Que la grâce de notre Seigneur Jésus-Christ soit avec vous tous! Amen! '
  '25':
  - type: note
    content: Ép 3:20.
  - type: text
    content: 'A celui qui peut vous affermir selon mon Évangile et la prédication de Jésus-Christ, '
  - type: note
    content: Ép 1:9; 3:9. Col 1:26. 2 Ti 1:10. Tit 1:2. 1 Pi 1:20.
  - type: text
    content: 'conformément à la révélation du mystère caché pendant des siècles, '
  '26':
  - type: text
    content: 'mais manifesté maintenant par les écrits des prophètes, d’après l’ordre du Dieu éternel, et porté à la connaissance de toutes les nations, afin qu’elles obéissent à la foi, '
  '27':
  - type: text
    content: à Dieu, seul sage, soit la gloire aux siècles des siècles, par Jésus-Christ! Amen!
  '3':
  - type: note
    content: Ac 18:2, 26.
  - type: text
    content: 'Saluez Prisca et Aquilas, mes compagnons d’œuvre en Jésus-Christ, '
  '4':
  - type: text
    content: 'qui ont exposé leur tête pour sauver ma vie; ce n’est pas moi seul qui leur rends grâces, ce sont encore toutes les Églises des païens. '
  '5':
  - type: text
    content: 'Saluez aussi l’Église qui est dans leur maison. Saluez Épaïnète, mon bien-aimé, qui a été pour Christ les prémices de l’Asie. '
  '6':
  - type: text
    content: 'Saluez Marie, qui a pris beaucoup de peine pour vous. '
  '7':
  - type: text
    content: 'Saluez Andronicus et Junias, mes parents et mes compagnons de captivité, qui jouissent d’une grande considération parmi les apôtres, et qui même ont été en Christ avant moi. '
  '8':
  - type: text
    content: 'Saluez Amplias, mon bien-aimé dans le Seigneur. '
  '9':
  - type: text
    content: 'Saluez Urbain, notre compagnon d’œuvre en Christ, et Stachys, mon bien-aimé. '
