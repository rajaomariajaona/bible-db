document_id: PSA.75
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 19:19-37. Ps 76.) 1 S 2:1-10.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. “Ne détruis pas.” Psaume d’Asaph. Cantique.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nous te louons, ô Dieu! Nous te louons;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton nom est dans nos bouches;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous publions tes merveilles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Au temps que j’aurai fixé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je jugerai avec droiture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'La terre tremble avec tous ceux qui l’habitent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Moi, j’affermis ses colonnes. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je dis à ceux qui se glorifient: Ne vous glorifiez pas!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et aux méchants: N’élevez pas la tête!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: N’élevez pas si haut votre tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne parlez pas avec tant d’arrogance!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Car ce n’est ni de l’orient, ni de l’occident,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni du désert, que vient l’élévation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais Dieu est celui qui juge:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il abaisse l’un, et il élève l’autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il y a dans la main de l’Éternel une coupe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où fermente un vin plein de mélange,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et il en verse:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les méchants de la terre sucent, boivent jusqu’à la lie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je publierai ces choses à jamais;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je chanterai en l’honneur du Dieu de Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Et j’abattrai toutes les forces des méchants;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les forces du juste seront élevées.
