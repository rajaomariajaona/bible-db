document_id: PSA.75,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (2 R 19:19-37. Ps 76.) 1 S 2:1-10.
  - type: text
    content: Au chef des chantres. “Ne détruis pas.” Psaume d’Asaph. Cantique.
  '10':
  - type: text
    content: Je publierai ces choses à jamais;
  - type: text
    content: Je chanterai en l’honneur du Dieu de Jacob.
  '11':
  - type: text
    content: Et j’abattrai toutes les forces des méchants;
  - type: text
    content: Les forces du juste seront élevées.
  '2':
  - type: text
    content: Nous te louons, ô Dieu! Nous te louons;
  - type: text
    content: Ton nom est dans nos bouches;
  - type: text
    content: Nous publions tes merveilles.
  '3':
  - type: text
    content: Au temps que j’aurai fixé,
  - type: text
    content: Je jugerai avec droiture.
  '4':
  - type: text
    content: 'La terre tremble avec tous ceux qui l’habitent:'
  - type: text
    content: 'Moi, j’affermis ses colonnes. '
  - type: text
    content: — Pause.
  '5':
  - type: text
    content: 'Je dis à ceux qui se glorifient: Ne vous glorifiez pas!'
  - type: text
    content: 'Et aux méchants: N’élevez pas la tête!'
  '6':
  - type: text
    content: N’élevez pas si haut votre tête,
  - type: text
    content: Ne parlez pas avec tant d’arrogance!
  '7':
  - type: text
    content: Car ce n’est ni de l’orient, ni de l’occident,
  - type: text
    content: Ni du désert, que vient l’élévation.
  '8':
  - type: text
    content: 'Mais Dieu est celui qui juge:'
  - type: text
    content: Il abaisse l’un, et il élève l’autre.
  '9':
  - type: text
    content: Il y a dans la main de l’Éternel une coupe,
  - type: text
    content: Où fermente un vin plein de mélange,
  - type: text
    content: 'Et il en verse:'
  - type: text
    content: Tous les méchants de la terre sucent, boivent jusqu’à la lie.
