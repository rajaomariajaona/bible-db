document_id: JER.7,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Censures et menaces
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-15: cf. (Jé 26:1-6. Mi 3:9-12.) Mt 3:7-10.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La parole qui fut adressée à Jérémie de la part de l’Éternel, en ces mots:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Puis vous venez vous présenter devant moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans cette maison sur laquelle mon nom est invoqué,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et vous dites: Nous sommes délivrés!…'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et c’est afin de commettre toutes ces abominations!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Est-elle à vos yeux '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 21:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 11:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 19:46
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: une caverne de voleurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cette maison sur laquelle mon nom est invoqué?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je le vois moi-même, dit l’Éternel.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Allez donc au lieu qui m’était consacré à Silo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où j’avais fait autrefois résider mon nom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et voyez '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 4:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 78:60
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: comment je l’ai traité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de la méchanceté de mon peuple d’Israël.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Et maintenant, puisque vous avez commis toutes ces actions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Puisque je vous ai parlé '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Ch 36:15, v. 25, etc.
      marker-yv: yv-n
    - type: text
      text: dès le matin et que vous n’avez pas écouté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Puisque je vous ai '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 1:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 65:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 66:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: appelés et que vous n’avez pas répondu,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Je traiterai la maison sur laquelle mon nom est invoqué,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur laquelle vous faites reposer votre confiance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le lieu que j’ai donné à vous et à vos pères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la même manière que j’ai traité Silo;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Et je vous rejetterai loin de ma face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme j’ai rejeté tous vos frères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toute la postérité d’Éphraïm.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-20: cf. (Jé 14:10-12; 44:15, etc.)'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Et toi, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32:10
      - type: text
        text: '. Jé 11:34; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: n’intercède pas en faveur de ce peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’élève pour eux ni supplications ni prières,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne fais pas des instances auprès de moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je ne t’écouterai pas.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ne vois-tu pas ce qu’ils font dans les villes de Juda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dans les rues de Jérusalem?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 44:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les enfants ramassent du bois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les pères allument le feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les femmes pétrissent la pâte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pour préparer des gâteaux à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 65:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 8:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 44:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: la reine du ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pour faire des libations à d’autres dieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin de m’irriter.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Est-ce moi qu’ils irritent? Dit l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’est-ce pas eux-mêmes,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 65:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: A leur propre confusion?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Place-toi à la porte de la maison de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et là publie cette parole,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et dis: Écoutez la parole de l’Éternel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous tous, hommes de Juda, qui entrez par ces portes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour vous prosterner devant l’Éternel!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, ma colère et ma fureur se répandent sur ce lieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur les hommes et sur les bêtes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur les arbres des champs et sur les fruits de la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle brûlera, et ne s’éteindra point.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 21-28: cf. (1 S 15:22. Jé 11:1-14.)'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 6:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 5:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ajoutez vos holocaustes à vos sacrifices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mangez-en la chair!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Car je n’ai point parlé avec vos pères et je ne leur ai donné aucun ordre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jour où je les ai fait sortir du pays d’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au sujet des holocaustes et des sacrifices.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Mais voici l’ordre que je leur ai donné:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 6:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Écoutez ma voix,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 19:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 26:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et je serai votre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous serez mon peuple;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marchez dans toutes les voies que je vous prescris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que vous soyez heureux.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Et ils n’ont point écouté, ils n’ont point prêté l’oreille;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils ont suivi les conseils, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 3:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les penchants de leur mauvais cœur,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 2:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils ont été en arrière et non en avant.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Depuis le jour où vos pères sont sortis du pays d’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ce jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous ai envoyé tous mes serviteurs, les prophètes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les ai envoyés chaque jour, dès le matin.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Mais ils ne m’ont point écouté, ils n’ont point prêté l’oreille;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Né 9:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 17:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils ont raidi leur cou,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont fait le mal plus que leurs pères.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Si tu leur dis toutes ces choses, ils ne t’écouteront pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu cries vers eux, ils ne te répondront pas.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Alors dis-leur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est ici la nation qui n’écoute pas la voix de l’Éternel, son Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et qui ne veut pas recevoir '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 5:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: instruction;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 5:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La vérité a disparu, elle s’est retirée de leur bouche.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 29-34: cf. Jé 19.'
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 1:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 15:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 16:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Coupe ta chevelure, et jette-la au loin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Monte sur les hauteurs, et prononce une complainte!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel rejette
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et repousse la génération qui a provoqué sa fureur.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'v. 5. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 18:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Réformez vos voies et vos œuvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je vous laisserai demeurer dans ce lieu.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Car les enfants de Juda ont fait ce qui est mal à mes yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont placé leurs abominations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans la maison sur laquelle mon nom est invoqué,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin de la souiller.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ils ont bâti '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 23:10
      - type: text
