document_id: JER.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Censures et menaces
  - type: heading
    content: 'V. 1-15: cf. (Jé 26:1-6. Mi 3:9-12.) Mt 3:7-10.'
  - type: text
    content: 'La parole qui fut adressée à Jérémie de la part de l’Éternel, en ces mots:'
  '10':
  - type: text
    content: Puis vous venez vous présenter devant moi,
  - type: text
    content: Dans cette maison sur laquelle mon nom est invoqué,
  - type: text
    content: 'Et vous dites: Nous sommes délivrés!…'
  - type: text
    content: Et c’est afin de commettre toutes ces abominations!
  '11':
  - type: text
    content: 'Est-elle à vos yeux '
  - type: note
    content: Mt 21:13. Mc 11:17. Lu 19:46.
  - type: text
    content: une caverne de voleurs,
  - type: text
    content: Cette maison sur laquelle mon nom est invoqué?
  - type: text
    content: Je le vois moi-même, dit l’Éternel.
  '12':
  - type: text
    content: Allez donc au lieu qui m’était consacré à Silo,
  - type: text
    content: Où j’avais fait autrefois résider mon nom.
  - type: text
    content: 'Et voyez '
  - type: note
    content: 1 S 4:11. Ps 78:60.
  - type: text
    content: comment je l’ai traité,
  - type: text
    content: A cause de la méchanceté de mon peuple d’Israël.
  '13':
  - type: text
    content: Et maintenant, puisque vous avez commis toutes ces actions,
  - type: text
    content: Dit l’Éternel,
  - type: text
    content: 'Puisque je vous ai parlé '
  - type: note
    content: 2 Ch 36:15, v. 25, etc.
  - type: text
    content: dès le matin et que vous n’avez pas écouté,
  - type: text
    content: 'Puisque je vous ai '
  - type: note
    content: Pr 1:24. És 65:12; 66:4.
  - type: text
    content: appelés et que vous n’avez pas répondu,
  '14':
  - type: text
    content: Je traiterai la maison sur laquelle mon nom est invoqué,
  - type: text
    content: Sur laquelle vous faites reposer votre confiance,
  - type: text
    content: Et le lieu que j’ai donné à vous et à vos pères,
  - type: text
    content: De la même manière que j’ai traité Silo;
  '15':
  - type: text
    content: Et je vous rejetterai loin de ma face,
  - type: text
    content: Comme j’ai rejeté tous vos frères,
  - type: text
    content: Toute la postérité d’Éphraïm.
  - type: heading
    content: 'V. 16-20: cf. (Jé 14:10-12; 44:15, etc.)'
  '16':
  - type: text
    content: 'Et toi, '
  - type: note
    content: Ex 32:10. Jé 11:34; 14:11.
  - type: text
    content: n’intercède pas en faveur de ce peuple,
  - type: text
    content: N’élève pour eux ni supplications ni prières,
  - type: text
    content: Ne fais pas des instances auprès de moi;
  - type: text
    content: Car je ne t’écouterai pas.
  '17':
  - type: text
    content: Ne vois-tu pas ce qu’ils font dans les villes de Juda
  - type: text
    content: Et dans les rues de Jérusalem?
  '18':
  - type: text
    content: ' '
  - type: note
    content: Jé 44:19.
  - type: text
    content: Les enfants ramassent du bois,
  - type: text
    content: Les pères allument le feu,
  - type: text
    content: Et les femmes pétrissent la pâte,
  - type: text
    content: 'Pour préparer des gâteaux à '
  - type: note
    content: És 65:11. Jé 8:2; 19:13; 44:19.
  - type: text
    content: la reine du ciel,
  - type: text
    content: Et pour faire des libations à d’autres dieux,
  - type: text
    content: Afin de m’irriter.
  '19':
  - type: text
    content: Est-ce moi qu’ils irritent? Dit l’Éternel;
  - type: text
    content: N’est-ce pas eux-mêmes,
  - type: note
    content: És 65:13.
  - type: text
    content: A leur propre confusion?
  '2':
  - type: text
    content: Place-toi à la porte de la maison de l’Éternel,
  - type: text
    content: Et là publie cette parole,
  - type: text
    content: 'Et dis: Écoutez la parole de l’Éternel,'
  - type: text
    content: Vous tous, hommes de Juda, qui entrez par ces portes,
  - type: text
    content: Pour vous prosterner devant l’Éternel!
  '20':
  - type: text
    content: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Voici, ma colère et ma fureur se répandent sur ce lieu,
  - type: text
    content: Sur les hommes et sur les bêtes,
  - type: text
    content: Sur les arbres des champs et sur les fruits de la terre;
  - type: text
    content: Elle brûlera, et ne s’éteindra point.
  - type: heading
    content: 'V. 21-28: cf. (1 S 15:22. Jé 11:1-14.)'
  '21':
  - type: text
    content: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël:'
  - type: note
    content: És 1:11. Jé 6:20. Am 5:21.
  - type: text
    content: Ajoutez vos holocaustes à vos sacrifices,
  - type: text
    content: Et mangez-en la chair!
  '22':
  - type: text
    content: Car je n’ai point parlé avec vos pères et je ne leur ai donné aucun ordre,
  - type: text
    content: Le jour où je les ai fait sortir du pays d’Égypte,
  - type: text
    content: Au sujet des holocaustes et des sacrifices.
  '23':
  - type: text
    content: 'Mais voici l’ordre que je leur ai donné:'
  - type: note
    content: De 6:3.
  - type: text
    content: Écoutez ma voix,
  - type: note
    content: Ex 19:5. Lé 26:12.
  - type: text
    content: Et je serai votre Dieu,
  - type: text
    content: Et vous serez mon peuple;
  - type: text
    content: Marchez dans toutes les voies que je vous prescris,
  - type: text
    content: Afin que vous soyez heureux.
  '24':
  - type: text
    content: Et ils n’ont point écouté, ils n’ont point prêté l’oreille;
  - type: text
    content: 'Ils ont suivi les conseils, '
  - type: note
    content: Jé 3:17; 16:12.
  - type: text
    content: les penchants de leur mauvais cœur,
  - type: note
    content: Jé 2:27; 32:33.
  - type: text
    content: Ils ont été en arrière et non en avant.
  '25':
  - type: text
    content: Depuis le jour où vos pères sont sortis du pays d’Égypte,
  - type: text
    content: Jusqu’à ce jour,
  - type: text
    content: Je vous ai envoyé tous mes serviteurs, les prophètes,
  - type: text
    content: Je les ai envoyés chaque jour, dès le matin.
  '26':
  - type: text
    content: Mais ils ne m’ont point écouté, ils n’ont point prêté l’oreille;
  - type: note
    content: Né 9:17, 29. Jé 17:23; 19:15.
  - type: text
    content: Ils ont raidi leur cou,
  - type: text
    content: Ils ont fait le mal plus que leurs pères.
  '27':
  - type: text
    content: Si tu leur dis toutes ces choses, ils ne t’écouteront pas;
  - type: text
    content: Si tu cries vers eux, ils ne te répondront pas.
  '28':
  - type: text
    content: 'Alors dis-leur:'
  - type: text
    content: C’est ici la nation qui n’écoute pas la voix de l’Éternel, son Dieu,
  - type: text
    content: 'Et qui ne veut pas recevoir '
  - type: note
    content: Jé 5:3.
  - type: text
    content: instruction;
  - type: note
    content: Jé 5:1.
  - type: text
    content: La vérité a disparu, elle s’est retirée de leur bouche.
  - type: heading
    content: 'V. 29-34: cf. Jé 19.'
  '29':
  - type: text
    content: ' '
  - type: note
    content: Job 1:20. És 15:2. Jé 16:6.
  - type: text
    content: Coupe ta chevelure, et jette-la au loin;
  - type: text
    content: Monte sur les hauteurs, et prononce une complainte!
  - type: text
    content: Car l’Éternel rejette
  - type: text
    content: Et repousse la génération qui a provoqué sa fureur.
  '3':
  - type: text
    content: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël:'
  - type: note
    content: v. 5. Jé 18:11; 26:13.
  - type: text
    content: Réformez vos voies et vos œuvres,
  - type: text
    content: Et je vous laisserai demeurer dans ce lieu.
  '30':
  - type: text
    content: Car les enfants de Juda ont fait ce qui est mal à mes yeux,
  - type: text
    content: Dit l’Éternel;
  - type: text
    content: Ils ont placé leurs abominations
  - type: text
    content: Dans la maison sur laquelle mon nom est invoqué,
  - type: text
    content: Afin de la souiller.
  '31':
  - type: text
    content: 'Ils ont bâti '
  - type: note
    content: 2 R 23:10. Jé 2:23; 19:5-6.
  - type: text
    content: des hauts lieux à Topheth dans la vallée de Ben-Hinnom,
  - type: text
    content: 'Pour brûler au feu leurs fils et leurs filles:'
  - type: text
    content: Ce que je n’avais point ordonné,
  - type: text
    content: Ce qui ne m’était point venu à la pensée.
  '32':
  - type: text
    content: C’est pourquoi voici, les jours viennent, dit l’Éternel,
  - type: text
    content: Où l’on ne dira plus Topheth et la vallée de Ben-Hinnom,
  - type: text
    content: Mais où l’on dira la vallée du carnage;
  - type: text
    content: Et l’on enterrera les morts à Topheth par défaut de place.
  '33':
  - type: text
    content: ' '
  - type: note
    content: De 28:26. Jé 34:20.
  - type: text
    content: Les cadavres de ce peuple seront la pâture
  - type: text
    content: Des oiseaux du ciel et des bêtes de la terre;
  - type: text
    content: Et il n’y aura personne pour les troubler.
  '34':
  - type: text
    content: ' '
  - type: note
    content: És 24:7. Jé 16:9; 25:10. Éz 26:13. Os 2:10.
  - type: text
    content: Je ferai cesser dans les villes de Juda et dans les rues de Jérusalem
  - type: text
    content: Les cris de réjouissance et les cris d’allégresse,
  - type: text
    content: Les chants du fiancé et les chants de la fiancée;
  - type: text
    content: 'Car le pays sera '
  - type: note
    content: Jé 6:8.
  - type: text
    content: un désert.
  '4':
  - type: text
    content: 'Ne vous livrez pas à des espérances trompeuses, en disant:'
  - type: text
    content: C’est ici le temple de l’Éternel, le temple de l’Éternel,
  - type: text
    content: Le temple de l’Éternel!
  '5':
  - type: text
    content: Si vous réformez vos voies et vos œuvres,
  - type: text
    content: 'Si vous pratiquez '
  - type: note
    content: Jé 5:28.
  - type: text
    content: la justice envers les uns et les autres,
  '6':
  - type: text
    content: 'Si vous n’opprimez pas l’étranger, l’orphelin et la '
  - type: note
    content: És 10:1, 2.
  - type: text
    content: veuve,
  - type: text
    content: 'Si vous ne répandez pas en ce lieu le '
  - type: note
    content: És 59:7.
  - type: text
    content: sang innocent,
  - type: text
    content: Et si vous n’allez pas après d’autres dieux, pour votre malheur,
  '7':
  - type: text
    content: Alors je vous laisserai demeurer dans ce lieu,
  - type: text
    content: Dans le pays que j’ai donné à vos pères,
  - type: text
    content: D’éternité en éternité.
  '8':
  - type: text
    content: Mais voici, vous vous livrez à des espérances trompeuses,
  - type: text
    content: Qui ne servent à rien.
  '9':
  - type: text
    content: Quoi! Dérober, tuer, commettre des adultères,
  - type: text
    content: Jurer faussement, offrir de l’encens à Baal,
  - type: text
    content: Aller après d’autres dieux que vous ne connaissez pas!…
