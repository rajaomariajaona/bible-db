document_id: HAB.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dialogue du prophète avec l’Éternel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-4: cf. Jé 12:1. Ps 94.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Oracle révélé à Habacuc, le prophète.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Jusqu’à quand, ô Éternel?… J’ai crié,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu n’écoutes pas!
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai crié vers toi à la violence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu ne secours pas!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Pourquoi me fais-tu voir l’iniquité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et contemples-tu l’injustice?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi l’oppression et la violence sont-elles devant moi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il y a des querelles, et la discorde s’élève.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aussi la loi n’a point de vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La justice n’a point de force;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car le méchant triomphe du juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’on rend des jugements iniques.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 5-11: cf. És 28:21,22. (Jé 5:15-17; 6:1-7, 22-24.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jetez les yeux parmi les nations, regardez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et soyez saisis d’étonnement, d’épouvante!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 13:41
      metadata:
        usfm: ACT.13.41
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car je vais faire en vos jours une œuvre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que vous ne croiriez pas si on la racontait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Voici, je vais susciter les Chaldéens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peuple furibond et impétueux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui traverse de vastes étendues de pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour s’emparer de demeures qui ne sont pas à lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il est terrible et formidable;
- type: usfm
  marker: q1
  children:
  - type: text
    text: De lui seul viennent son droit et sa grandeur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ses chevaux sont plus rapides que les léopards,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plus agiles que les loups du soir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses cavaliers s’avancent avec orgueil;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses cavaliers arrivent de loin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils volent comme l’aigle qui fond sur sa proie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tout ce peuple vient pour se livrer au pillage;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses regards avides se portent en avant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il assemble des prisonniers comme du sable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il se moque des rois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les princes font l’objet de ses railleries;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il se rit de toutes les forteresses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il amoncelle de la terre, et il les prend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Alors son ardeur redouble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il poursuit sa marche, et il se rend coupable.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa force à lui, voilà son dieu!
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-17: cf. Jé 25:8-14; 50:23, etc.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: N’es-tu pas de toute éternité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éternel, mon Dieu, mon Saint?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous ne mourrons pas!
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Éternel, tu as établi ce peuple pour exercer tes jugements;
- type: usfm
  marker: q1
  children:
  - type: text
    text: O mon rocher, tu l’as suscité pour infliger tes châtiments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tes yeux sont trop purs pour voir le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu ne peux pas regarder l’iniquité.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi regarderais-tu les perfides, et te tairais-tu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand le méchant dévore celui qui est plus juste que lui?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Traiterais-tu l’homme comme les poissons de la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme le reptile qui n’a point de maître?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il les fait tous monter avec l’hameçon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les attire dans son filet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il les assemble dans ses rets:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi est-il dans la joie et dans l’allégresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: C’est pourquoi il sacrifie à son filet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il offre de l’encens à ses rets;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car par eux sa portion est grasse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa nourriture succulente.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Videra-t-il pour cela son filet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et toujours égorgera-t-il sans pitié les nations?
