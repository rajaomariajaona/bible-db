document_id: HAB.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Dialogue du prophète avec l’Éternel
  - type: heading
    content: 'V. 1-4: cf. Jé 12:1. Ps 94.'
  - type: text
    content: Oracle révélé à Habacuc, le prophète.
  '10':
  - type: text
    content: Il se moque des rois,
  - type: text
    content: Et les princes font l’objet de ses railleries;
  - type: text
    content: Il se rit de toutes les forteresses,
  - type: text
    content: Il amoncelle de la terre, et il les prend.
  '11':
  - type: text
    content: Alors son ardeur redouble,
  - type: text
    content: Il poursuit sa marche, et il se rend coupable.
  - type: text
    content: Sa force à lui, voilà son dieu!
  - type: heading
    content: 'V. 12-17: cf. Jé 25:8-14; 50:23, etc.'
  '12':
  - type: text
    content: N’es-tu pas de toute éternité,
  - type: text
    content: Éternel, mon Dieu, mon Saint?
  - type: text
    content: Nous ne mourrons pas!
  - type: text
    content: O Éternel, tu as établi ce peuple pour exercer tes jugements;
  - type: text
    content: O mon rocher, tu l’as suscité pour infliger tes châtiments.
  '13':
  - type: text
    content: Tes yeux sont trop purs pour voir le mal,
  - type: text
    content: Et tu ne peux pas regarder l’iniquité.
  - type: text
    content: Pourquoi regarderais-tu les perfides, et te tairais-tu,
  - type: text
    content: Quand le méchant dévore celui qui est plus juste que lui?
  '14':
  - type: text
    content: Traiterais-tu l’homme comme les poissons de la mer,
  - type: text
    content: Comme le reptile qui n’a point de maître?
  '15':
  - type: text
    content: Il les fait tous monter avec l’hameçon,
  - type: text
    content: Il les attire dans son filet,
  - type: text
    content: 'Il les assemble dans ses rets:'
  - type: text
    content: Aussi est-il dans la joie et dans l’allégresse.
  '16':
  - type: text
    content: C’est pourquoi il sacrifie à son filet,
  - type: text
    content: Il offre de l’encens à ses rets;
  - type: text
    content: Car par eux sa portion est grasse,
  - type: text
    content: Et sa nourriture succulente.
  '17':
  - type: text
    content: Videra-t-il pour cela son filet,
  - type: text
    content: Et toujours égorgera-t-il sans pitié les nations?
  '2':
  - type: text
    content: Jusqu’à quand, ô Éternel?… J’ai crié,
  - type: text
    content: Et tu n’écoutes pas!
  - type: text
    content: J’ai crié vers toi à la violence,
  - type: text
    content: Et tu ne secours pas!
  '3':
  - type: text
    content: Pourquoi me fais-tu voir l’iniquité,
  - type: text
    content: Et contemples-tu l’injustice?
  - type: text
    content: Pourquoi l’oppression et la violence sont-elles devant moi?
  - type: text
    content: Il y a des querelles, et la discorde s’élève.
  '4':
  - type: text
    content: Aussi la loi n’a point de vie,
  - type: text
    content: La justice n’a point de force;
  - type: text
    content: Car le méchant triomphe du juste,
  - type: text
    content: Et l’on rend des jugements iniques.
  - type: heading
    content: 'V. 5-11: cf. És 28:21,22. (Jé 5:15-17; 6:1-7, 22-24.)'
  '5':
  - type: text
    content: Jetez les yeux parmi les nations, regardez,
  - type: text
    content: Et soyez saisis d’étonnement, d’épouvante!
  - type: note
    content: Ac 13:41.
  - type: text
    content: Car je vais faire en vos jours une œuvre,
  - type: text
    content: Que vous ne croiriez pas si on la racontait.
  '6':
  - type: text
    content: Voici, je vais susciter les Chaldéens,
  - type: text
    content: Peuple furibond et impétueux,
  - type: text
    content: Qui traverse de vastes étendues de pays,
  - type: text
    content: Pour s’emparer de demeures qui ne sont pas à lui.
  '7':
  - type: text
    content: Il est terrible et formidable;
  - type: text
    content: De lui seul viennent son droit et sa grandeur.
  '8':
  - type: text
    content: Ses chevaux sont plus rapides que les léopards,
  - type: text
    content: Plus agiles que les loups du soir,
  - type: text
    content: Et ses cavaliers s’avancent avec orgueil;
  - type: text
    content: Ses cavaliers arrivent de loin,
  - type: text
    content: Ils volent comme l’aigle qui fond sur sa proie.
  '9':
  - type: text
    content: Tout ce peuple vient pour se livrer au pillage;
  - type: text
    content: Ses regards avides se portent en avant,
  - type: text
    content: Et il assemble des prisonniers comme du sable.
