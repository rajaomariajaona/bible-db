document_id: ROM.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Souveraineté de Dieu dans la dispensation de ses grâces. Le salut annoncé aux païens par suite de l’endurcissement d’Israël. Conversion finale et salut des Juifs
  - type: heading
    content: 'V. 1-5: cf. Ro 10:1; 11:28, 29; 3:1, 2; 1:1-4.'
  - type: text
    content: 'Je '
  - type: note
    content: Ro 1:9. 2 Co 1:23; 11:31. Ga 1:20. Ph 1:8. 1 Th 2:5; 5:27.
  - type: text
    content: 'dis la vérité en Christ, je ne mens point, ma conscience m’en rend témoignage par le Saint-Esprit: '
  '10':
  - type: text
    content: 'Et, de plus, '
  - type: note
    content: Ge 25:21.
  - type: text
    content: 'il en fut ainsi de Rébecca, qui conçut du seul Isaac notre père; '
  '11':
  - type: text
    content: 'car, quoique les enfants ne fussent pas encore nés et qu’ils n’eussent fait ni bien ni mal, afin que le dessein d’élection de Dieu subsistât, sans dépendre des œuvres, et par la seule volonté de celui qui appelle, '
  '12':
  - type: text
    content: 'il fut dit à Rébecca: '
  - type: note
    content: Ge 25:23.
  - type: text
    content: 'L’aîné sera assujetti au plus jeune; selon qu’il est écrit: '
  '13':
  - type: note
    content: Mal 1:2.
  - type: text
    content: J’ai aimé Jacob
  - type: text
    content: Et j’ai haï Ésaü.
  - type: heading
    content: 'V. 14-29: cf. (Ex 9:15, 16. És 6:9-13.) (És 45:9. Jé 18:1-6.) (Ps 62:12, 13; 145:17.) Ro 11:22, 30-36.'
  '14':
  - type: text
    content: 'Que dirons-nous donc? '
  - type: note
    content: De 32:4. 2 Ch 19:7. Job 34:10.
  - type: text
    content: 'Y a-t-il en Dieu de l’injustice? Loin de là! '
  '15':
  - type: text
    content: 'Car il dit à Moïse: '
  - type: note
    content: Ex 33:19.
  - type: text
    content: 'Je ferai miséricorde à qui je fais miséricorde, et j’aurai compassion de qui j’ai compassion. '
  '16':
  - type: text
    content: 'Ainsi donc, cela ne dépend ni de celui qui veut, ni de celui qui court, mais de Dieu qui fait miséricorde. '
  '17':
  - type: text
    content: 'Car l’Écriture dit à Pharaon: '
  - type: note
    content: Ex 9:16.
  - type: text
    content: 'Je t’ai suscité à dessein pour montrer en toi ma puissance, et afin que mon nom soit publié par toute la terre. '
  '18':
  - type: text
    content: 'Ainsi, il fait miséricorde à qui il veut, et il endurcit qui il veut. '
  '19':
  - type: text
    content: 'Tu me diras: Pourquoi blâme-t-il encore? Car qui est-ce qui résiste à sa volonté? '
  '2':
  - type: text
    content: 'J’éprouve une grande tristesse, et j’ai dans le cœur un chagrin continuel. '
  '20':
  - type: text
    content: 'O homme, toi plutôt, qui es-tu pour contester avec Dieu? '
  - type: note
    content: És 45:9. Jé 18:6.
  - type: text
    content: 'Le vase d’argile dira-t-il à celui qui l’a formé: Pourquoi m’as-tu fait ainsi? '
  '21':
  - type: text
    content: 'Le potier n’est-il pas maître de l’argile, pour faire avec la même masse '
  - type: note
    content: 2 Ti 2:20.
  - type: text
    content: 'un vase d’honneur et un vase d’un usage vil? '
  '22':
  - type: text
    content: 'Et que dire, si Dieu, voulant montrer sa colère et faire connaître sa puissance, a supporté avec une grande patience des vases de colère formés pour la perdition, '
  '23':
  - type: text
    content: 'et s’il a voulu faire connaître la richesse de sa gloire envers des vases de miséricorde qu’il a d’avance préparés pour la gloire? '
  '24':
  - type: text
    content: 'Ainsi nous a-t-il appelés, non seulement d’entre les Juifs, mais encore d’entre les païens, '
  '25':
  - type: text
    content: 'selon qu’il le dit dans Osée: '
  - type: note
    content: Os 2:22.
  - type: text
    content: 'J’appellerai mon peuple celui qui n’était pas mon peuple, et bien-aimée celle qui n’était pas la bien-aimée; '
  '26':
  - type: text
    content: 'et là où on leur disait: '
  - type: note
    content: Os 1:10. 1 Pi 2:10.
  - type: text
    content: 'Vous n’êtes pas mon peuple! Ils seront appelés fils du Dieu vivant. '
  '27':
  - type: text
    content: 'Ésaïe, de son côté, s’écrie au sujet d’Israël:'
  - type: note
    content: És 10:22.
  - type: text
    content: Quand le nombre des fils d’Israël serait comme le sable de la mer,
  - type: text
    content: Un reste seulement sera sauvé.
  '28':
  - type: text
    content: Car le Seigneur exécutera pleinement et promptement sur la terre ce qu’il a résolu.
  '29':
  - type: text
    content: 'Et, comme Ésaïe l’avait dit auparavant:'
  - type: note
    content: És 1:9.
  - type: text
    content: Si le Seigneur des armées
  - type: text
    content: Ne nous eût laissé une postérité,
  - type: text
    content: 'nous serions devenus '
  - type: note
    content: Ge 19:24. És 13:19. Jé 50:40. Éz 16:46.
  - type: text
    content: comme Sodome,
  - type: text
    content: nous aurions été semblables à Gomorrhe.
  - type: heading
    content: 'V. 30-33: cf. Ro 10:3, 16-21. 1 Pi 2:6-10.'
  '3':
  - type: note
    content: Ex 32:32. Ro 10:1.
  - type: text
    content: 'Car je voudrais moi-même être anathème et séparé de Christ pour mes frères, mes parents selon la chair, '
  '30':
  - type: text
    content: 'Que dirons-nous donc? Les païens, qui ne cherchaient pas la justice, ont obtenu la justice, la justice qui vient de la foi, '
  '31':
  - type: text
    content: 'tandis qu’Israël, '
  - type: note
    content: Ro 10:2; 11:7.
  - type: text
    content: 'qui cherchait une loi de justice, n’est pas parvenu à cette loi. '
  '32':
  - type: text
    content: 'Pourquoi? Parce qu’Israël l’a cherchée, non par la foi, mais comme provenant des œuvres. Ils se sont heurtés contre la pierre d’achoppement, '
  '33':
  - type: text
    content: 'selon qu’il est écrit:'
  - type: note
    content: Ps 118:22. És 8:14; 28:16. Mt 21:42. 1 Pi 2:6.
  - type: text
    content: Voici, je mets en Sion une pierre d’achoppement
  - type: text
    content: Et un rocher de scandale,
  - type: note
    content: Ps 2:12. Pr 16:20. És 28:16. Jé 17:7.
  - type: text
    content: Et celui qui croit en lui ne sera point confus.
  '4':
  - type: text
    content: 'qui sont Israélites, '
  - type: note
    content: De 7:6. Ro 2:17; 3:2.
  - type: text
    content: 'à qui appartiennent l’adoption, et la gloire, '
  - type: note
    content: Ép 2:12.
  - type: text
    content: 'et les alliances, et la loi, et le culte, '
  '5':
  - type: text
    content: 'et les promesses, et les patriarches, et de qui est issu, selon la chair, le Christ, '
  - type: note
    content: Jé 23:6. Jn 1:1. Ac 20:28. Ro 1:4. Hé 1:8, 9, 10.
  - type: text
    content: qui est au-dessus de toutes choses, Dieu béni éternellement. Amen!
  - type: heading
    content: 'V. 6-13: cf. (Ge 21:1-12. Ga 4:22-31.) (Ge 25:21-26. Hé 11:8, 9.)'
  '6':
  - type: text
    content: 'Ce n’est point à dire '
  - type: note
    content: No 23:19. Ro 3:3. 2 Ti 2:13.
  - type: text
    content: 'que la parole de Dieu soit restée sans effet. '
  - type: note
    content: Jn 8:39. Ro 2:28.
  - type: text
    content: 'Car tous ceux qui descendent d’Israël ne sont pas Israël, '
  '7':
  - type: text
    content: 'et, '
  - type: note
    content: Ga 4:23.
  - type: text
    content: 'pour être la postérité d’Abraham, ils ne sont pas tous ses enfants; '
  - type: note
    content: Ge 21:12. Ga 3:29. Hé 11:18.
  - type: text
    content: 'mais il est dit: En Isaac sera nommée pour toi une postérité, '
  '8':
  - type: text
    content: 'c’est-à-dire que ce ne sont pas les enfants de la chair qui sont enfants de Dieu, '
  - type: note
    content: Ga 4:28.
  - type: text
    content: 'mais que ce sont les enfants de la promesse qui sont regardés comme la postérité. '
  '9':
  - type: text
    content: 'Voici, en effet, la parole de la promesse: '
  - type: note
    content: Ge 18:10.
  - type: text
    content: 'Je reviendrai à cette même époque, et Sara aura un fils. '
