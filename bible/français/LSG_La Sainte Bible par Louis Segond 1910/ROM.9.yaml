document_id: ROM.9,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Souveraineté de Dieu dans la dispensation de ses grâces. Le salut annoncé aux païens par suite de l’endurcissement d’Israël. Conversion finale et salut des Juifs
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-5: cf. Ro 10:1; 11:28, 29; 3:1, 2; 1:1-4.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Je '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 1:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 1:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 1:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 1:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 2:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'dis la vérité en Christ, je ne mens point, ma conscience m’en rend témoignage par le Saint-Esprit: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Et, de plus, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 25:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il en fut ainsi de Rébecca, qui conçut du seul Isaac notre père; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'car, quoique les enfants ne fussent pas encore nés et qu’ils n’eussent fait ni bien ni mal, afin que le dessein d’élection de Dieu subsistât, sans dépendre des œuvres, et par la seule volonté de celui qui appelle, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'il fut dit à Rébecca: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 25:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'L’aîné sera assujetti au plus jeune; selon qu’il est écrit: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal 1:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: J’ai aimé Jacob
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’ai haï Ésaü.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-29: cf. (Ex 9:15, 16. És 6:9-13.) (És 45:9. Jé 18:1-6.) (Ps 62:12, 13; 145:17.) Ro 11:22, 30-36.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Que dirons-nous donc? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 19:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 34:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Y a-t-il en Dieu de l’injustice? Loin de là! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Car il dit à Moïse: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 33:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je ferai miséricorde à qui je fais miséricorde, et j’aurai compassion de qui j’ai compassion. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ainsi donc, cela ne dépend ni de celui qui veut, ni de celui qui court, mais de Dieu qui fait miséricorde. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Car l’Écriture dit à Pharaon: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 9:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je t’ai suscité à dessein pour montrer en toi ma puissance, et afin que mon nom soit publié par toute la terre. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ainsi, il fait miséricorde à qui il veut, et il endurcit qui il veut. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tu me diras: Pourquoi blâme-t-il encore? Car qui est-ce qui résiste à sa volonté? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'J’éprouve une grande tristesse, et j’ai dans le cœur un chagrin continuel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'O homme, toi plutôt, qui es-tu pour contester avec Dieu? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 45:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 18:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le vase d’argile dira-t-il à celui qui l’a formé: Pourquoi m’as-tu fait ainsi? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Le potier n’est-il pas maître de l’argile, pour faire avec la même masse '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 2:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'un vase d’honneur et un vase d’un usage vil? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Et que dire, si Dieu, voulant montrer sa colère et faire connaître sa puissance, a supporté avec une grande patience des vases de colère formés pour la perdition, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'et s’il a voulu faire connaître la richesse de sa gloire envers des vases de miséricorde qu’il a d’avance préparés pour la gloire? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ainsi nous a-t-il appelés, non seulement d’entre les Juifs, mais encore d’entre les païens, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'selon qu’il le dit dans Osée: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 2:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'J’appellerai mon peuple celui qui n’était pas mon peuple, et bien-aimée celle qui n’était pas la bien-aimée; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'et là où on leur disait: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Os 1:10. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous n’êtes pas mon peuple! Ils seront appelés fils du Dieu vivant. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ésaïe, de son côté, s’écrie au sujet d’Israël:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 10:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Quand le nombre des fils d’Israël serait comme le sable de la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un reste seulement sera sauvé.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Car le Seigneur exécutera pleinement et promptement sur la terre ce qu’il a résolu.
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Et, comme Ésaïe l’avait dit auparavant:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Si le Seigneur des armées
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne nous eût laissé une postérité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'nous serions devenus '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 19:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 13:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 50:40
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 16:46
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: comme Sodome,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous aurions été semblables à Gomorrhe.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 30-33: cf. Ro 10:3, 16-21. 1 Pi 2:6-10.'
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 10:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car je voudrais moi-même être anathème et séparé de Christ pour mes frères, mes parents selon la chair, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Que dirons-nous donc? Les païens, qui ne cherchaient pas la justice, ont obtenu la justice, la justice qui vient de la foi, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'tandis qu’Israël, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 10:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui cherchait une loi de justice, n’est pas parvenu à cette loi. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Pourquoi? Parce qu’Israël l’a cherchée, non par la foi, mais comme provenant des œuvres. Ils se sont heurtés contre la pierre d’achoppement, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'selon qu’il est écrit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 118:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 8:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 21:42
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Voici, je mets en Sion une pierre d’achoppement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un rocher de scandale,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 2:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 16:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 28:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 17:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et celui qui croit en lui ne sera point confus.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'qui sont Israélites, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 7:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 2:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à qui appartiennent l’adoption, et la gloire, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 2:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et les alliances, et la loi, et le culte, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'et les promesses, et les patriarches, et de qui est issu, selon la chair, le Christ, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 23:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 20:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 1:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 1:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: qui est au-dessus de toutes choses, Dieu béni éternellement. Amen!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-13: cf. (Ge 21:1-12. Ga 4:22-31.) (Ge 25:21-26. Hé 11:8, 9.)'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ce n’est point à dire '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 23:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 2:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que la parole de Dieu soit restée sans effet. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 8:39
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 2:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car tous ceux qui descendent d’Israël ne sont pas Israël, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'et, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 4:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pour être la postérité d’Abraham, ils ne sont pas tous ses enfants; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 21:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 3:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
