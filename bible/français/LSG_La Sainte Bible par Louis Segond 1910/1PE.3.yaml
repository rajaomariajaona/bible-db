document_id: 1PE.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-7: cf. Col 3:18, 19. 1 Ti 2:9-15. Ép 5:22-23.'
  - type: text
    content: ' '
  - type: note
    content: Ge 3:16. 1 Co 14:34. Ép 5:22. Col 3:18. Tit 2:5.
  - type: text
    content: 'Femmes, soyez de même soumises à vos maris, afin que, si quelques-uns n’obéissent point à la parole, ils soient gagnés sans parole par la conduite de leurs femmes, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ps 34:13, etc. Ja 1:26.
  - type: text
    content: Si quelqu’un, en effet, veut aimer la vie
  - type: text
    content: Et voir des jours heureux,
  - type: text
    content: Qu’il préserve sa langue du mal
  - type: text
    content: Et ses lèvres des paroles trompeuses,
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ps 37:27. És 1:16. 3 Jn v. 11.
  - type: text
    content: Qu’il s’éloigne du mal et fasse le bien,
  - type: text
    content: Qu’il recherche la paix et la poursuive;
  '12':
  - type: text
    content: Car les yeux du Seigneur sont sur les justes
  - type: text
    content: Et ses oreilles sont attentives à leur prière,
  - type: text
    content: Mais la face du Seigneur est contre ceux qui font le mal.
  '13':
  - type: text
    content: 'Et qui vous maltraitera, si vous êtes zélés pour le bien? '
  '14':
  - type: note
    content: Mt 5:10. 1 Pi 2:20; 4:14.
  - type: text
    content: 'D’ailleurs, quand vous souffririez pour la justice, vous seriez heureux. '
  - type: note
    content: És 8:12. Jé 1:8.
  - type: text
    content: 'N’ayez d’eux aucune crainte, et ne soyez pas troublés; '
  '15':
  - type: note
    content: Job 1:21.
  - type: text
    content: 'Mais sanctifiez dans vos cœurs Christ le Seigneur, '
  - type: note
    content: Ps 119:46. Ac 4:8.
  - type: text
    content: 'étant toujours prêts à vous défendre, avec douceur et respect, devant quiconque vous demande raison de l’espérance qui est en vous, '
  '16':
  - type: text
    content: 'et ayant une bonne conscience, '
  - type: note
    content: Tit 2:8. 1 Pi 2:12, 15.
  - type: text
    content: 'afin que, là même où ils vous calomnient comme si vous étiez des malfaiteurs, ceux qui décrient votre bonne conduite en Christ soient couverts de confusion. '
  '17':
  - type: text
    content: Car il vaut mieux souffrir, si telle est la volonté de Dieu, en faisant le bien qu’en faisant le mal.
  - type: heading
    content: 'Exemple de Jésus-Christ, qui a souffert pour nous: conduite à tenir; consolations à espérer'
  - type: heading
    content: 'V. 18-22: cf. 1 Pi 2:21-24. (Hé 11:7. Ro 6:3, 4; 10:9, 10.)'
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ro 5:6. Hé 9:15, 28.
  - type: text
    content: 'Christ aussi a souffert une fois pour les péchés, lui juste pour des injustes, afin de nous amener à Dieu, ayant été mis à mort quant à la chair, mais ayant été rendu vivant quant à l’Esprit, '
  '19':
  - type: text
    content: 'dans lequel aussi il est allé prêcher aux esprits '
  - type: note
    content: 1 Pi 4:6.
  - type: text
    content: 'en prison, '
  '2':
  - type: text
    content: 'en voyant votre manière de vivre chaste et réservée. '
  '20':
  - type: note
    content: Ge 6:5.
  - type: text
    content: 'qui autrefois avaient été incrédules, '
  - type: note
    content: Ge 6:3, 14. Mt 24:37. Lu 17:26. Ro 2:4.
  - type: text
    content: 'lorsque la patience de Dieu se prolongeait, aux jours de Noé, pendant la construction de l’arche, dans laquelle un petit nombre de personnes, c’est-à-dire, '
  - type: note
    content: Ge 8:18. 2 Pi 2:5.
  - type: text
    content: 'huit, furent sauvées à travers l’eau. '
  '21':
  - type: note
    content: Ép 5:26.
  - type: text
    content: 'Cette eau était une figure du baptême, qui n’est pas la purification des souillures du corps, mais l’engagement d’une bonne conscience envers Dieu, et qui maintenant vous sauve, vous aussi, par la résurrection de Jésus-Christ, '
  '22':
  - type: note
    content: Ép 1:20.
  - type: text
    content: qui est à la droite de Dieu, depuis qu’il est allé au ciel, et que les anges, les autorités et les puissances, lui ont été soumis.
  '3':
  - type: note
    content: 1 Ti 2:9. Tit 2:3.
  - type: text
    content: 'Ayez, non cette parure extérieure qui consiste dans les cheveux tressés, les ornements d’or, ou les habits qu’on revêt, '
  '4':
  - type: text
    content: 'mais la parure intérieure et cachée dans le cœur, la pureté incorruptible d’un esprit doux et paisible, qui est d’un grand prix devant Dieu. '
  '5':
  - type: text
    content: 'Ainsi se paraient autrefois les saintes femmes qui espéraient en Dieu, soumises à leurs maris, '
  '6':
  - type: note
    content: Ge 18:12.
  - type: text
    content: 'comme Sara, qui obéissait à Abraham et l’appelait son seigneur. C’est d’elle que vous êtes devenues les filles, en faisant ce qui est bien, sans vous laisser troubler par aucune crainte. '
  '7':
  - type: text
    content: 'Maris, '
  - type: note
    content: Ép 5:25, etc. Col 3:19.
  - type: text
    content: montrez à votre tour de la sagesse dans vos rapports avec vos femmes, comme avec un sexe plus faible; honorez-les, comme devant aussi hériter avec vous de la grâce de la vie. Qu’il en soit ainsi, afin que rien ne vienne faire obstacle à vos prières.
  - type: heading
    content: 'V. 8-17: cf. (Ro 12:14-21. Ps 34:13-18.) (Mt 10:24-31. 1 Pi 2:12, 19, 20.)'
  '8':
  - type: text
    content: 'Enfin, '
  - type: note
    content: Ro 12:16; 15:5. 1 Co 1:10. Ph 2:2; 3:16.
  - type: text
    content: 'soyez tous animés des mêmes pensées et des mêmes sentiments, pleins d’amour fraternel, de compassion, d’humilité. '
  '9':
  - type: note
    content: Lé 19:18. Pr 20:22; 24:29. Mt 5:39. Ro 12:17. 1 Co 6:7. 1 Th 5:15.
  - type: text
    content: 'Ne rendez point mal pour mal, ou injure pour injure; bénissez, au contraire, car c’est à cela que vous avez été appelés, '
  - type: note
    content: Mt 25:34. 1 Ti 4:3.
  - type: text
    content: afin d’hériter la bénédiction.
