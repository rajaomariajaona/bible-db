    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Femmes, soyez de même soumises à vos maris, afin que, si quelques-uns n’obéissent point à la parole, ils soient gagnés sans parole par la conduite de leurs femmes, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'en voyant votre manière de vivre chaste et réservée. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 2:9
      metadata:
        usfm: 1TI.2.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 2:3
      metadata:
        usfm: TIT.2.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ayez, non cette parure extérieure qui consiste dans les cheveux tressés, les ornements d’or, ou les habits qu’on revêt, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'mais la parure intérieure et cachée dans le cœur, la pureté incorruptible d’un esprit doux et paisible, qui est d’un grand prix devant Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ainsi se paraient autrefois les saintes femmes qui espéraient en Dieu, soumises à leurs maris, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 18:12
      metadata:
        usfm: GEN.18.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme Sara, qui obéissait à Abraham et l’appelait son seigneur. C’est d’elle que vous êtes devenues les filles, en faisant ce qui est bien, sans vous laisser troubler par aucune crainte. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Maris, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ép 5:25, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:19
      metadata:
        usfm: COL.3.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: montrez à votre tour de la sagesse dans vos rapports avec vos femmes, comme avec un sexe plus faible; honorez-les, comme devant aussi hériter avec vous de la grâce de la vie. Qu’il en soit ainsi, afin que rien ne vienne faire obstacle à vos prières.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-17: cf. (Ro 12:14-21. Ps 34:13-18.) (Mt 10:24-31. 1 Pi 2:12, 19, 20.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Enfin, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:16
      metadata:
        usfm: ROM.12.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:5
      metadata:
        usfm: ROM.15.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
