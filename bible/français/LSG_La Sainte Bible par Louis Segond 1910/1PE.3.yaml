      - type: text
        text: 3:16
      metadata:
        usfm: PHP.3.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'soyez tous animés des mêmes pensées et des mêmes sentiments, pleins d’amour fraternel, de compassion, d’humilité. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:18
      metadata:
        usfm: LEV.19.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 20:22
      metadata:
        usfm: PRO.20.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:29
      metadata:
        usfm: PRO.24.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:39
      metadata:
        usfm: MAT.5.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:17
      metadata:
        usfm: ROM.12.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 6:7
      metadata:
        usfm: 1CO.6.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:15
      metadata:
        usfm: 1TH.5.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ne rendez point mal pour mal, ou injure pour injure; bénissez, au contraire, car c’est à cela que vous avez été appelés, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 25:34
      metadata:
        usfm: MAT.25.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 4:3
      metadata:
        usfm: 1TI.4.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: afin d’hériter la bénédiction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ps 34:13, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:26
      metadata:
        usfm: JAS.1.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Si quelqu’un, en effet, veut aimer la vie
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et voir des jours heureux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il préserve sa langue du mal
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses lèvres des paroles trompeuses,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 37:27
      metadata:
        usfm: PSA.37.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:16
      metadata:
        usfm: ISA.1.16
    - type: text
      text: . 3 Jn v. 11.
    marker-yv: yv-n
  - type: text
    text: Qu’il s’éloigne du mal et fasse le bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il recherche la paix et la poursuive;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Car les yeux du Seigneur sont sur les justes
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses oreilles sont attentives à leur prière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais la face du Seigneur est contre ceux qui font le mal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et qui vous maltraitera, si vous êtes zélés pour le bien? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:10
      metadata:
        usfm: MAT.5.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:20
      metadata:
        usfm: 1PE.2.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:14
      metadata:
        usfm: 1PE.4.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'D’ailleurs, quand vous souffririez pour la justice, vous seriez heureux. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 8:12
      metadata:
        usfm: ISA.8.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 1:8
      metadata:
        usfm: JER.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'N’ayez d’eux aucune crainte, et ne soyez pas troublés; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 1:21
      metadata:
        usfm: JOB.1.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais sanctifiez dans vos cœurs Christ le Seigneur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 119:46
      metadata:
        usfm: PSA.119.46
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:8
      metadata:
        usfm: ACT.4.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'étant toujours prêts à vous défendre, avec douceur et respect, devant quiconque vous demande raison de l’espérance qui est en vous, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et ayant une bonne conscience, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 2:8
      metadata:
        usfm: TIT.2.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:12
      metadata:
        usfm: 1PE.2.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: 1PE.2.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'afin que, là même où ils vous calomnient comme si vous étiez des malfaiteurs, ceux qui décrient votre bonne conduite en Christ soient couverts de confusion. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Car il vaut mieux souffrir, si telle est la volonté de Dieu, en faisant le bien qu’en faisant le mal.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Exemple de Jésus-Christ, qui a souffert pour nous: conduite à tenir; consolations à espérer'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-22: cf. 1 Pi 2:21-24. (Hé 11:7. Ro 6:3, 4; 10:9, 10.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 5:6
      metadata:
        usfm: ROM.5.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:15
      metadata:
        usfm: HEB.9.15
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '28'
      metadata:
        usfm: HEB.9.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Christ aussi a souffert une fois pour les péchés, lui juste pour des injustes, afin de nous amener à Dieu, ayant été mis à mort quant à la chair, mais ayant été rendu vivant quant à l’Esprit, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'dans lequel aussi il est allé prêcher aux esprits '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:6
      metadata:
        usfm: 1PE.4.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en prison, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 6:5
      metadata:
        usfm: GEN.6.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui autrefois avaient été incrédules, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 6:3
      metadata:
        usfm: GEN.6.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: GEN.6.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 24:37
      metadata:
        usfm: MAT.24.37
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 17:26
      metadata:
        usfm: LUK.17.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 2:4
      metadata:
        usfm: ROM.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'lorsque la patience de Dieu se prolongeait, aux jours de Noé, pendant la construction de l’arche, dans laquelle un petit nombre de personnes, c’est-à-dire, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 8:18
      metadata:
        usfm: GEN.8.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:5
      metadata:
        usfm: 2PE.2.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'huit, furent sauvées à travers l’eau. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:26
      metadata:
        usfm: EPH.5.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Cette eau était une figure du baptême, qui n’est pas la purification des souillures du corps, mais l’engagement d’une bonne conscience envers Dieu, et qui maintenant vous sauve, vous aussi, par la résurrection de Jésus-Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:20
      metadata:
        usfm: EPH.1.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: qui est à la droite de Dieu, depuis qu’il est allé au ciel, et que les anges, les autorités et les puissances, lui ont été soumis.
