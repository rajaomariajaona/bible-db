document_id: MAT.27,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Condamnation
  - type: heading
    content: 'V. 1-2: cf. Mc 15:1. Lu 22:66-71; 23:1. Jn 18:28.'
  - type: text
    content: ' '
  - type: note
    content: Ps 2:2. Mc 15:1. Lu 22:66; 23:2. Jn 18:28.
  - type: text
    content: 'Dès que le matin fut venu, tous les principaux sacrificateurs et les anciens du peuple tinrent conseil contre Jésus, pour le faire mourir. '
  '10':
  - type: text
    content: et ils les ont données pour le champ du potier, comme le Seigneur me l’avait ordonné.
  - type: heading
    content: Jésus devant Pilate, gouverneur romain
  - type: heading
    content: 'V. 11-14: cf. Mc 15:2-5. Lu 23:1-4. Jn 18:28-38.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: Mc 15:2. Lu 23:3. Jn 18:33.
  - type: text
    content: 'Jésus comparut devant le gouverneur. Le gouverneur l’interrogea, en ces termes: Es-tu le roi des Juifs? Jésus lui répondit: '
  - type: text
    content: Tu le dis.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Mais il ne répondit rien aux accusations des principaux sacrificateurs et des anciens. '
  '13':
  - type: note
    content: Mt 26:62.
  - type: text
    content: 'Alors Pilate lui dit: N’entends-tu pas de combien de choses ils t’accusent? '
  '14':
  - type: note
    content: És 53:7. Ac 8:32.
  - type: text
    content: Et Jésus ne lui donna de réponse sur aucune parole, ce qui étonna beaucoup le gouverneur.
  - type: heading
    content: Sentence de mort confirmée
  - type: heading
    content: 'V. 15-25: cf. Mc 15:6-15. Lu 23:13-25. Jn 18:39, 40.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Mc 15:6. Lu 23:17. Jn 18:39.
  - type: text
    content: 'A chaque fête, le gouverneur avait coutume de relâcher un prisonnier, celui que demandait la foule. '
  '16':
  - type: note
    content: Mc 15:7. Lu 23:19. Jn 18:40.
  - type: text
    content: 'Ils avaient alors un prisonnier fameux, nommé Barabbas. '
  '17':
  - type: text
    content: 'Comme ils étaient assemblés, Pilate leur dit: Lequel voulez-vous que je vous relâche, Barabbas, ou Jésus, qu’on appelle Christ? '
  '18':
  - type: text
    content: 'Car il savait que c’était par envie qu’ils avaient livré Jésus. '
  '19':
  - type: text
    content: 'Pendant qu’il était assis sur le tribunal, sa femme lui fit dire: Qu’il n’y ait rien entre toi et ce juste; car aujourd’hui j’ai beaucoup souffert en songe à cause de lui. '
  '2':
  - type: text
    content: 'Après l’avoir lié, ils l’emmenèrent, et le livrèrent à '
  - type: note
    content: Ac 3:13.
  - type: text
    content: Ponce Pilate, le gouverneur.
  - type: heading
    content: Suicide de Judas
  - type: heading
    content: 'V. 3-10: cf. Ac 1:16-20. Za 11:12, 13.'
  '20':
  - type: note
    content: Mc 15:11. Lu 23:18. Jn 18:40. Ac 3:14.
  - type: text
    content: 'Les principaux sacrificateurs et les anciens persuadèrent à la foule de demander Barabbas, et de faire périr Jésus. '
  '21':
  - type: text
    content: 'Le gouverneur prenant la parole, leur dit: Lequel des deux voulez-vous que je vous relâche? Ils répondirent: Barabbas. '
  '22':
  - type: text
    content: 'Pilate leur dit: Que ferai-je donc de Jésus, qu’on appelle Christ? Tous répondirent: Qu’il soit crucifié! '
  '23':
  - type: text
    content: 'Le gouverneur dit: Mais quel mal a-t-il fait? Et ils crièrent encore plus fort: Qu’il soit crucifié! '
  '24':
  - type: text
    content: 'Pilate, voyant qu’il ne gagnait rien, mais que le tumulte augmentait, prit de l’eau, se lava les mains en présence de la foule, et dit: Je suis innocent du sang de ce juste. Cela vous regarde. '
  '25':
  - type: text
    content: 'Et tout le peuple répondit: '
  - type: note
    content: Ac 5:28.
  - type: text
    content: Que son sang retombe sur nous et sur nos enfants!
  - type: heading
    content: Outrages des soldats
  - type: heading
    content: 'V. 26-31: cf. (Mc 15:15-20. Lu 23:25. Jn 19:1-3, 16.)'
  '26':
  - type: text
    content: 'Alors Pilate leur relâcha Barabbas; et, après avoir fait battre de verges Jésus, il le livra pour être crucifié. '
  '27':
  - type: note
    content: Mc 15:16. Jn 19:2.
  - type: text
    content: 'Les soldats du gouverneur conduisirent Jésus dans le prétoire, et ils assemblèrent autour de lui toute la cohorte. '
  '28':
  - type: text
    content: 'Ils lui ôtèrent ses vêtements, et le couvrirent d’un manteau écarlate. '
  '29':
  - type: text
    content: 'Ils tressèrent une couronne d’épines, qu’ils posèrent sur sa tête, et ils lui mirent un roseau dans la main droite; puis, s’agenouillant devant lui, ils le raillaient, en disant: Salut, roi des Juifs! '
  '3':
  - type: text
    content: 'Alors Judas, qui l’avait livré, voyant qu’il était condamné, se repentit, et rapporta les trente pièces d’argent aux principaux sacrificateurs et aux anciens, '
  '30':
  - type: text
    content: 'Et ils crachaient contre lui, prenaient le roseau, et frappaient sur sa tête. '
  '31':
  - type: text
    content: Après s’être ainsi moqués de lui, ils lui ôtèrent le manteau, lui remirent ses vêtements, et l’emmenèrent pour le crucifier.
  - type: heading
    content: Jésus crucifié
  - type: heading
    content: 'V. 32-38: cf. (Mc 15:21-28. Lu 23:26-34, 38. Jn 19:16-24.)'
  '32':
  - type: text
    content: ' '
  - type: note
    content: Mc 15:21. Lu 23:26.
  - type: text
    content: 'Lorsqu’ils sortirent, ils rencontrèrent un homme de Cyrène, appelé Simon, et ils le forcèrent à porter la croix de Jésus. '
  '33':
  - type: note
    content: Ps 69:22. Mc 15:22. Lu 23:33. Jn 19:17.
  - type: text
    content: 'Arrivés au lieu nommé Golgotha, ce qui signifie lieu du crâne, '
  '34':
  - type: note
    content: Ps 69:22.
  - type: text
    content: 'ils lui donnèrent à boire du vin mêlé de fiel; mais, quand il l’eut goûté, il ne voulut pas boire. '
  '35':
  - type: note
    content: Mc 15:24. Jn 19:23.
  - type: text
    content: 'Après l’avoir crucifié, ils se partagèrent ses vêtements, en tirant au sort, afin que s’accomplît ce qui avait été annoncé par le prophète:'
  - type: note
    content: Ps 22:19.
  - type: text
    content: Ils se sont partagé mes vêtements, et ils ont tiré au sort ma tunique.
  '36':
  - type: text
    content: 'Puis ils s’assirent, et le gardèrent. '
  '37':
  - type: note
    content: Mc 15:26. Lu 23:38. Jn 19:19.
  - type: text
    content: 'Pour indiquer le sujet de sa condamnation, on écrivit au-dessus de sa tête: Celui-ci est Jésus, le roi des Juifs. '
  '38':
  - type: note
    content: És 53:12.
  - type: text
    content: Avec lui furent crucifiés deux brigands, l’un à sa droite, et l’autre à sa gauche.
  - type: heading
    content: 'V. 39-44: cf. (Mc 15:29-32. Lu 23:35-43. Jn 19:25-27.)'
  '39':
  - type: text
    content: ' '
  - type: note
    content: Ps 22:8; 69:21. Mc 15:29. Lu 23:35.
  - type: text
    content: 'Les passants l’injuriaient, et secouaient la tête, '
  '4':
  - type: text
    content: 'en disant: J’ai péché, en livrant le sang innocent. Ils répondirent: Que nous importe? Cela te regarde. '
  '40':
  - type: text
    content: 'en disant: '
  - type: note
    content: Mt 26:61. Jn 2:19.
  - type: text
    content: 'Toi qui détruis le temple, et qui le rebâtis en trois jours, sauve-toi toi-même! Si tu es le Fils de Dieu, descends de la croix! '
  '41':
  - type: text
    content: 'Les principaux sacrificateurs, avec les scribes et les anciens, se moquaient aussi de lui, et disaient: '
  '42':
  - type: text
    content: 'Il a sauvé les autres, et il ne peut se sauver lui-même! S’il est roi d’Israël, qu’il descende de la croix, et nous croirons en lui. '
  '43':
  - type: note
    content: Ps 22:9.
  - type: text
    content: 'Il s’est confié en Dieu; que Dieu le délivre maintenant, s’il l’aime. Car il a dit: Je suis Fils de Dieu. '
  '44':
  - type: text
    content: Les brigands, crucifiés avec lui, l’insultaient de la même manière.
  - type: heading
    content: 'V. 45-50: cf. (Mc 15:33-37. Lu 23:44-46. Jn 19:28-30.) (Ps 22. És 53:5-8, 10.) Ro 5:6-8. 1 Pi 2:21-24. 1 Jn 4:9-11.'
  '45':
  - type: text
    content: ' '
  - type: note
    content: Mc 15:33. Lu 23:44.
  - type: text
    content: 'Depuis la sixième heure jusqu’à la neuvième, il y eut des ténèbres sur toute la terre. '
  '46':
  - type: text
    content: 'Et vers la neuvième heure, '
  - type: note
    content: Ps 22:2. Hé 5:7.
  - type: text
    content: 'Jésus s’écria d’une voix forte: '
  - type: text
    content: Éli, Éli, lama sabachthani?
  - type: text
    content: ' c’est-à-dire: Mon Dieu, mon Dieu, pourquoi m’as-tu abandonné? '
  '47':
  - type: text
    content: 'Quelques-uns de ceux qui étaient là, l’ayant entendu, dirent: Il appelle Élie. '
  '48':
  - type: note
    content: Ps 69:22. Jn 19:29.
  - type: text
    content: 'Et aussitôt l’un d’eux courut prendre une éponge, qu’il remplit de vinaigre, et, l’ayant fixée à un roseau, il lui donna à boire. '
  '49':
  - type: text
    content: 'Mais les autres disaient: Laisse, voyons si Élie viendra le sauver. '
  '5':
  - type: text
    content: 'Judas jeta les pièces d’argent dans le temple, '
  - type: note
    content: 2 S 17:23. Ac 1:18.
  - type: text
    content: 'se retira, et alla se pendre. '
  '50':
  - type: note
    content: Lu 23:46.
  - type: text
    content: Jésus poussa de nouveau un grand cri, et rendit l’esprit.
  - type: heading
    content: 'V. 51-56: cf. (Mc 15:38-41. Lu 23:45, 47-49.)'
  '51':
  - type: text
    content: ' '
  - type: note
    content: 2 Ch 3:14. Mc 15:38. Lu 23:45.
  - type: text
    content: 'Et voici, le voile du temple se déchira en deux, depuis le haut jusqu’en bas, la terre trembla, les rochers se fendirent, '
  '52':
  - type: text
    content: 'les sépulcres s’ouvrirent, et plusieurs corps des saints qui étaient morts ressuscitèrent. '
  '53':
  - type: text
    content: 'Étant sortis des sépulcres, après la résurrection de Jésus, ils entrèrent dans la ville sainte, et apparurent à un grand nombre de personnes. '
  '54':
  - type: note
    content: Mc 15:39. Lu 23:47.
  - type: text
    content: 'Le centenier et ceux qui étaient avec lui pour garder Jésus, ayant vu le tremblement de terre et ce qui venait d’arriver, furent saisis d’une grande frayeur, et dirent: Assurément, cet homme était Fils de Dieu. '
  '55':
  - type: note
    content: Mc 15:40. Lu 23:49.
  - type: text
    content: 'Il y avait là plusieurs femmes '
  - type: note
    content: Ps 38:12.
  - type: text
    content: 'qui regardaient de loin; qui avaient accompagné Jésus depuis la Galilée, '
  - type: note
    content: Lu 8:2.
  - type: text
    content: 'pour le servir. '
  '56':
  - type: text
    content: Parmi elles étaient Marie de Magdala, Marie, mère de Jacques et de Joseph, et la mère des fils de Zébédée.
  - type: heading
    content: Le corps de Jésus mis dans un sépulcre
  - type: heading
    content: 'V. 57-61: cf. (Mc 15:42-47. Lu 23:50-56. Jn 19:38-42.)'
  '57':
  - type: text
    content: ' '
  - type: note
    content: Mc 15:42. Lu 23:50. Jn 19:38.
  - type: text
    content: 'Le soir étant venu, arriva un homme riche d’Arimathée, nommé Joseph, lequel était aussi disciple de Jésus. '
  '58':
  - type: text
    content: 'Il se rendit vers Pilate, et demanda le corps de Jésus. Et Pilate ordonna de le remettre. '
  '59':
  - type: text
    content: 'Joseph prit le corps, l’enveloppa d’un linceul blanc, '
  '6':
  - type: text
    content: 'Les principaux sacrificateurs les ramassèrent, et dirent: Il n’est pas permis de les mettre dans le trésor sacré, puisque c’est le prix du sang. '
  '60':
  - type: note
    content: Mc 15:46. Lu 23:53.
  - type: text
    content: 'et le déposa dans un sépulcre neuf, qu’il s’était fait tailler dans le roc. Puis il roula une grande pierre à l’entrée du sépulcre, et il s’en alla. '
  '61':
  - type: text
    content: Marie de Magdala et l’autre Marie étaient là, assises vis-à-vis du sépulcre.
  - type: heading
    content: La garde auprès du sépulcre
  - type: heading
    content: 'V. 62-66: cf. Mt 28:1-4, 11-15.'
  '62':
  - type: text
    content: 'Le lendemain, qui était le jour après la préparation, les principaux sacrificateurs et les pharisiens allèrent ensemble auprès de Pilate, '
  '63':
  - type: text
    content: 'et dirent: Seigneur, nous nous souvenons que cet imposteur a dit, quand il vivait encore: '
  - type: note
    content: Mt 16:21; 17:23; 20:19. Mc 8:31; 10:34. Lu 9:22; 18:33; 24:6.
  - type: text
    content: 'Après trois jours je ressusciterai. '
  '64':
  - type: text
    content: 'Ordonne donc que le sépulcre soit gardé jusqu’au troisième jour, afin que ses disciples ne viennent pas dérober le corps, et dire au peuple: Il est ressuscité des morts. Cette dernière imposture serait pire que la première. '
  '65':
  - type: text
    content: 'Pilate leur dit: Vous avez une garde; allez, gardez-le comme vous l’entendrez. '
  '66':
  - type: text
    content: Ils s’en allèrent, et s’assurèrent du sépulcre au moyen de la garde, après avoir scellé la pierre.
  '7':
  - type: text
    content: 'Et, après en avoir délibéré, ils achetèrent avec cet argent le '
  - type: note
    content: Ac 1:19.
  - type: text
    content: 'champ du potier, pour la sépulture des étrangers. '
  '8':
  - type: text
    content: 'C’est pourquoi ce champ a été appelé champ du sang, jusqu’à ce jour. '
  '9':
  - type: text
    content: 'Alors s’accomplit ce qui avait été annoncé '
  - type: note
    content: Za 11:12.
  - type: text
    content: 'par Jérémie, le prophète: Ils ont pris les trente pièces d’argent, la valeur de celui qui a été estimé, qu’on a estimé de la part des enfants d’Israël; '
