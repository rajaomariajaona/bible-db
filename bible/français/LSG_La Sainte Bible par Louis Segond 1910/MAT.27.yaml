      - type: text
        text: Lu 23:35
      metadata:
        usfm: LUK.23.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les passants l’injuriaient, et secouaient la tête, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'en disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:61
      metadata:
        usfm: MAT.26.61
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 2:19
      metadata:
        usfm: JHN.2.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Toi qui détruis le temple, et qui le rebâtis en trois jours, sauve-toi toi-même! Si tu es le Fils de Dieu, descends de la croix! '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Les principaux sacrificateurs, avec les scribes et les anciens, se moquaient aussi de lui, et disaient: '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Il a sauvé les autres, et il ne peut se sauver lui-même! S’il est roi d’Israël, qu’il descende de la croix, et nous croirons en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 22:9
      metadata:
        usfm: PSA.22.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il s’est confié en Dieu; que Dieu le délivre maintenant, s’il l’aime. Car il a dit: Je suis Fils de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Les brigands, crucifiés avec lui, l’insultaient de la même manière.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 45-50: cf. (Mc 15:33-37. Lu 23:44-46. Jn 19:28-30.) (Ps 22. És 53:5-8, 10.) Ro 5:6-8. 1 Pi 2:21-24. 1 Jn 4:9-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:33
      metadata:
        usfm: MRK.15.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:44
      metadata:
        usfm: LUK.23.44
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Depuis la sixième heure jusqu’à la neuvième, il y eut des ténèbres sur toute la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Et vers la neuvième heure, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 22:2
      metadata:
        usfm: PSA.22.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 5:7
      metadata:
        usfm: HEB.5.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus s’écria d’une voix forte: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Éli, Éli, lama sabachthani?
  - type: text
    text: ' c’est-à-dire: Mon Dieu, mon Dieu, pourquoi m’as-tu abandonné? '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Quelques-uns de ceux qui étaient là, l’ayant entendu, dirent: Il appelle Élie. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 69:22
      metadata:
        usfm: PSA.69.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 19:29
      metadata:
        usfm: JHN.19.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et aussitôt l’un d’eux courut prendre une éponge, qu’il remplit de vinaigre, et, l’ayant fixée à un roseau, il lui donna à boire. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Mais les autres disaient: Laisse, voyons si Élie viendra le sauver. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:46
      metadata:
        usfm: LUK.23.46
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Jésus poussa de nouveau un grand cri, et rendit l’esprit.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 51-56: cf. (Mc 15:38-41. Lu 23:45, 47-49.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 3:14
      metadata:
        usfm: 2CH.3.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:38
      metadata:
        usfm: MRK.15.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:45
      metadata:
        usfm: LUK.23.45
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et voici, le voile du temple se déchira en deux, depuis le haut jusqu’en bas, la terre trembla, les rochers se fendirent, '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'les sépulcres s’ouvrirent, et plusieurs corps des saints qui étaient morts ressuscitèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Étant sortis des sépulcres, après la résurrection de Jésus, ils entrèrent dans la ville sainte, et apparurent à un grand nombre de personnes. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:39
      metadata:
        usfm: MRK.15.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:47
      metadata:
        usfm: LUK.23.47
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le centenier et ceux qui étaient avec lui pour garder Jésus, ayant vu le tremblement de terre et ce qui venait d’arriver, furent saisis d’une grande frayeur, et dirent: Assurément, cet homme était Fils de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:40
      metadata:
        usfm: MRK.15.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:49
      metadata:
        usfm: LUK.23.49
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il y avait là plusieurs femmes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 38:12
      metadata:
        usfm: PSA.38.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui regardaient de loin; qui avaient accompagné Jésus depuis la Galilée, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:2
      metadata:
        usfm: LUK.8.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour le servir. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Parmi elles étaient Marie de Magdala, Marie, mère de Jacques et de Joseph, et la mère des fils de Zébédée.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le corps de Jésus mis dans un sépulcre
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 57-61: cf. (Mc 15:42-47. Lu 23:50-56. Jn 19:38-42.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:42
      metadata:
        usfm: MRK.15.42
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:50
      metadata:
        usfm: LUK.23.50
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 19:38
      metadata:
        usfm: JHN.19.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le soir étant venu, arriva un homme riche d’Arimathée, nommé Joseph, lequel était aussi disciple de Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Il se rendit vers Pilate, et demanda le corps de Jésus. Et Pilate ordonna de le remettre. '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Joseph prit le corps, l’enveloppa d’un linceul blanc, '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:46
      metadata:
        usfm: MRK.15.46
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:53
      metadata:
        usfm: LUK.23.53
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et le déposa dans un sépulcre neuf, qu’il s’était fait tailler dans le roc. Puis il roula une grande pierre à l’entrée du sépulcre, et il s’en alla. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Marie de Magdala et l’autre Marie étaient là, assises vis-à-vis du sépulcre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La garde auprès du sépulcre
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 62-66: cf. Mt 28:1-4, 11-15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Le lendemain, qui était le jour après la préparation, les principaux sacrificateurs et les pharisiens allèrent ensemble auprès de Pilate, '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'et dirent: Seigneur, nous nous souvenons que cet imposteur a dit, quand il vivait encore: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 16:21
      metadata:
        usfm: MAT.16.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:23
      metadata:
        usfm: MAT.17.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:19
      metadata:
        usfm: MAT.20.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 8:31
      metadata:
        usfm: MRK.8.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:34
      metadata:
        usfm: MRK.10.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:22
      metadata:
        usfm: LUK.9.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:33
      metadata:
        usfm: LUK.18.33
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:6
      metadata:
        usfm: LUK.24.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Après trois jours je ressusciterai. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Ordonne donc que le sépulcre soit gardé jusqu’au troisième jour, afin que ses disciples ne viennent pas dérober le corps, et dire au peuple: Il est ressuscité des morts. Cette dernière imposture serait pire que la première. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Pilate leur dit: Vous avez une garde; allez, gardez-le comme vous l’entendrez. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Ils s’en allèrent, et s’assurèrent du sépulcre au moyen de la garde, après avoir scellé la pierre.
