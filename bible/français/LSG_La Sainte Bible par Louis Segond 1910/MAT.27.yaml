  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 2:2
      metadata:
        usfm: PSA.2.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:1
      metadata:
        usfm: MRK.15.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:66
      metadata:
        usfm: LUK.22.66
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:2
      metadata:
        usfm: LUK.23.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 18:28
      metadata:
        usfm: JHN.18.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dès que le matin fut venu, tous les principaux sacrificateurs et les anciens du peuple tinrent conseil contre Jésus, pour le faire mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Après l’avoir lié, ils l’emmenèrent, et le livrèrent à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 3:13
      metadata:
        usfm: ACT.3.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ponce Pilate, le gouverneur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Suicide de Judas
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 3-10: cf. Ac 1:16-20. Za 11:12, 13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors Judas, qui l’avait livré, voyant qu’il était condamné, se repentit, et rapporta les trente pièces d’argent aux principaux sacrificateurs et aux anciens, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'en disant: J’ai péché, en livrant le sang innocent. Ils répondirent: Que nous importe? Cela te regarde. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Judas jeta les pièces d’argent dans le temple, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 17:23
      metadata:
        usfm: 2SA.17.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:18
      metadata:
        usfm: ACT.1.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'se retira, et alla se pendre. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les principaux sacrificateurs les ramassèrent, et dirent: Il n’est pas permis de les mettre dans le trésor sacré, puisque c’est le prix du sang. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et, après en avoir délibéré, ils achetèrent avec cet argent le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:19
      metadata:
        usfm: ACT.1.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'champ du potier, pour la sépulture des étrangers. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'C’est pourquoi ce champ a été appelé champ du sang, jusqu’à ce jour. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors s’accomplit ce qui avait été annoncé '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 11:12
      metadata:
        usfm: ZEC.11.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'par Jérémie, le prophète: Ils ont pris les trente pièces d’argent, la valeur de celui qui a été estimé, qu’on a estimé de la part des enfants d’Israël; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: et ils les ont données pour le champ du potier, comme le Seigneur me l’avait ordonné.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus devant Pilate, gouverneur romain
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-14: cf. Mc 15:2-5. Lu 23:1-4. Jn 18:28-38.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:2
      metadata:
        usfm: MRK.15.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:3
      metadata:
        usfm: LUK.23.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 18:33
      metadata:
        usfm: JHN.18.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus comparut devant le gouverneur. Le gouverneur l’interrogea, en ces termes: Es-tu le roi des Juifs? Jésus lui répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tu le dis.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais il ne répondit rien aux accusations des principaux sacrificateurs et des anciens. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:62
      metadata:
        usfm: MAT.26.62
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors Pilate lui dit: N’entends-tu pas de combien de choses ils t’accusent? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 53:7
      metadata:
        usfm: ISA.53.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 8:32
      metadata:
        usfm: ACT.8.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et Jésus ne lui donna de réponse sur aucune parole, ce qui étonna beaucoup le gouverneur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sentence de mort confirmée
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-25: cf. Mc 15:6-15. Lu 23:13-25. Jn 18:39, 40.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:6
      metadata:
        usfm: MRK.15.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:17
      metadata:
        usfm: LUK.23.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 18:39
      metadata:
        usfm: JHN.18.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'A chaque fête, le gouverneur avait coutume de relâcher un prisonnier, celui que demandait la foule. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:7
      metadata:
        usfm: MRK.15.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:19
      metadata:
        usfm: LUK.23.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 18:40
      metadata:
        usfm: JHN.18.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils avaient alors un prisonnier fameux, nommé Barabbas. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Comme ils étaient assemblés, Pilate leur dit: Lequel voulez-vous que je vous relâche, Barabbas, ou Jésus, qu’on appelle Christ? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Car il savait que c’était par envie qu’ils avaient livré Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Pendant qu’il était assis sur le tribunal, sa femme lui fit dire: Qu’il n’y ait rien entre toi et ce juste; car aujourd’hui j’ai beaucoup souffert en songe à cause de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:11
      metadata:
        usfm: MRK.15.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:18
      metadata:
        usfm: LUK.23.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 18:40
      metadata:
        usfm: JHN.18.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 3:14
      metadata:
        usfm: ACT.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les principaux sacrificateurs et les anciens persuadèrent à la foule de demander Barabbas, et de faire périr Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le gouverneur prenant la parole, leur dit: Lequel des deux voulez-vous que je vous relâche? Ils répondirent: Barabbas. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Pilate leur dit: Que ferai-je donc de Jésus, qu’on appelle Christ? Tous répondirent: Qu’il soit crucifié! '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Le gouverneur dit: Mais quel mal a-t-il fait? Et ils crièrent encore plus fort: Qu’il soit crucifié! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Pilate, voyant qu’il ne gagnait rien, mais que le tumulte augmentait, prit de l’eau, se lava les mains en présence de la foule, et dit: Je suis innocent du sang de ce juste. Cela vous regarde. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Et tout le peuple répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 5:28
      metadata:
        usfm: ACT.5.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Que son sang retombe sur nous et sur nos enfants!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Outrages des soldats
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 26-31: cf. (Mc 15:15-20. Lu 23:25. Jn 19:1-3, 16.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors Pilate leur relâcha Barabbas; et, après avoir fait battre de verges Jésus, il le livra pour être crucifié. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:16
      metadata:
        usfm: MRK.15.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 19:2
      metadata:
        usfm: JHN.19.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les soldats du gouverneur conduisirent Jésus dans le prétoire, et ils assemblèrent autour de lui toute la cohorte. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils lui ôtèrent ses vêtements, et le couvrirent d’un manteau écarlate. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ils tressèrent une couronne d’épines, qu’ils posèrent sur sa tête, et ils lui mirent un roseau dans la main droite; puis, s’agenouillant devant lui, ils le raillaient, en disant: Salut, roi des Juifs! '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Et ils crachaient contre lui, prenaient le roseau, et frappaient sur sa tête. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Après s’être ainsi moqués de lui, ils lui ôtèrent le manteau, lui remirent ses vêtements, et l’emmenèrent pour le crucifier.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus crucifié
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 32-38: cf. (Mc 15:21-28. Lu 23:26-34, 38. Jn 19:16-24.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:21
      metadata:
        usfm: MRK.15.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:26
      metadata:
        usfm: LUK.23.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu’ils sortirent, ils rencontrèrent un homme de Cyrène, appelé Simon, et ils le forcèrent à porter la croix de Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 69:22
      metadata:
        usfm: PSA.69.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:22
      metadata:
        usfm: MRK.15.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:33
      metadata:
        usfm: LUK.23.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 19:17
      metadata:
        usfm: JHN.19.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Arrivés au lieu nommé Golgotha, ce qui signifie lieu du crâne, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 69:22
      metadata:
        usfm: PSA.69.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ils lui donnèrent à boire du vin mêlé de fiel; mais, quand il l’eut goûté, il ne voulut pas boire. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:24
      metadata:
        usfm: MRK.15.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 19:23
      metadata:
        usfm: JHN.19.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Après l’avoir crucifié, ils se partagèrent ses vêtements, en tirant au sort, afin que s’accomplît ce qui avait été annoncé par le prophète:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 22:19
      metadata:
        usfm: PSA.22.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils se sont partagé mes vêtements, et ils ont tiré au sort ma tunique.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Puis ils s’assirent, et le gardèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:26
      metadata:
        usfm: MRK.15.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:38
      metadata:
        usfm: LUK.23.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 19:19
      metadata:
        usfm: JHN.19.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pour indiquer le sujet de sa condamnation, on écrivit au-dessus de sa tête: Celui-ci est Jésus, le roi des Juifs. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 53:12
      metadata:
        usfm: ISA.53.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Avec lui furent crucifiés deux brigands, l’un à sa droite, et l’autre à sa gauche.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 39-44: cf. (Mc 15:29-32. Lu 23:35-43. Jn 19:25-27.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
