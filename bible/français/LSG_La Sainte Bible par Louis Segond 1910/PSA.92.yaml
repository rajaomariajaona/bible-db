document_id: PSA.92,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 33; 37; 1.
  - type: text
    content: Psaume. Cantique pour le jour du sabbat.
  '10':
  - type: text
    content: Car voici, tes ennemis, ô Éternel!
  - type: text
    content: Car voici, tes ennemis périssent;
  - type: text
    content: Tous ceux qui font le mal sont dispersés.
  '11':
  - type: text
    content: Et tu me donnes la force du buffle;
  - type: text
    content: Je suis arrosé avec une huile fraîche.
  '12':
  - type: text
    content: Mon œil se plaît à contempler mes ennemis,
  - type: text
    content: Et mon oreille à entendre mes méchants adversaires.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Os 14:6.
  - type: text
    content: Les justes croissent comme le palmier,
  - type: text
    content: 'Ils s’élèvent '
  - type: note
    content: Jg 9:15.
  - type: text
    content: comme le cèdre du Liban.
  '14':
  - type: text
    content: Plantés dans la maison de l’Éternel,
  - type: text
    content: Ils prospèrent dans les parvis de notre Dieu;
  '15':
  - type: text
    content: Ils portent encore des fruits dans la vieillesse,
  - type: text
    content: Ils sont pleins de sève et verdoyants,
  '16':
  - type: text
    content: Pour faire connaître que l’Éternel est juste.
  - type: text
    content: Il est mon rocher, et il n’y a point en lui d’iniquité.
  '2':
  - type: text
    content: Il est beau de louer l’Éternel,
  - type: text
    content: Et de célébrer ton nom, ô Très-Haut!
  '3':
  - type: text
    content: D’annoncer le matin ta bonté,
  - type: text
    content: Et ta fidélité pendant les nuits,
  '4':
  - type: text
    content: Sur l’instrument à dix cordes et sur le luth,
  - type: text
    content: Aux sons de la harpe.
  '5':
  - type: text
    content: Tu me réjouis par tes œuvres, ô Éternel!
  - type: text
    content: Et je chante avec allégresse l’ouvrage de tes mains.
  '6':
  - type: text
    content: Que tes œuvres sont grandes, ô Éternel!
  - type: text
    content: Que tes pensées sont profondes!
  '7':
  - type: text
    content: L’homme stupide n’y connaît rien,
  - type: text
    content: Et l’insensé n’y prend point garde.
  '8':
  - type: text
    content: Si les méchants croissent comme l’herbe,
  - type: text
    content: Si tous ceux qui font le mal fleurissent,
  - type: text
    content: C’est pour être anéantis à jamais.
  '9':
  - type: text
    content: Mais toi, tu es le Très-Haut,
  - type: text
    content: A perpétuité, ô Éternel!
