document_id: PSA.92,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 33; 37; 1.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Psaume. Cantique pour le jour du sabbat.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car voici, tes ennemis, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car voici, tes ennemis périssent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui font le mal sont dispersés.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu me donnes la force du buffle;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis arrosé avec une huile fraîche.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon œil se plaît à contempler mes ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon oreille à entendre mes méchants adversaires.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 14:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les justes croissent comme le palmier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils s’élèvent '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 9:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: comme le cèdre du Liban.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plantés dans la maison de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils prospèrent dans les parvis de notre Dieu;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils portent encore des fruits dans la vieillesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont pleins de sève et verdoyants,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour faire connaître que l’Éternel est juste.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est mon rocher, et il n’y a point en lui d’iniquité.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est beau de louer l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de célébrer ton nom, ô Très-Haut!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D’annoncer le matin ta bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ta fidélité pendant les nuits,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur l’instrument à dix cordes et sur le luth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux sons de la harpe.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu me réjouis par tes œuvres, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je chante avec allégresse l’ouvrage de tes mains.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes œuvres sont grandes, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes pensées sont profondes!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme stupide n’y connaît rien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’insensé n’y prend point garde.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si les méchants croissent comme l’herbe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tous ceux qui font le mal fleurissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pour être anéantis à jamais.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais toi, tu es le Très-Haut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A perpétuité, ô Éternel!
