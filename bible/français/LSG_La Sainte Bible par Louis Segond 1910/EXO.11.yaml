document_id: EXO.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-10: cf. (Ex 12:29-39. 1 S 6:6.) És 19:1, 16. (Job 9:4. Pr 28:14.) (És 34:8; 41:11.)'
  - type: text
    content: 'L’Éternel dit à Moïse: Je ferai venir encore une plaie sur Pharaon et sur l’Égypte. Après cela, il vous laissera partir d’ici. Lorsqu’il vous laissera tout à fait aller, il vous chassera même d’ici. '
  '10':
  - type: text
    content: 'Moïse et Aaron firent tous ces miracles devant Pharaon, '
  - type: note
    content: Ex 9:16. Ro 9:17.
  - type: text
    content: l’Éternel endurcit le cœur de Pharaon, et Pharaon ne laissa point aller les enfants d’Israël hors de son pays.
  '2':
  - type: text
    content: 'Parle au peuple, '
  - type: note
    content: Ex 3:22; 12:35.
  - type: text
    content: 'pour que chacun demande à son voisin et chacune à sa voisine des vases d’argent et des vases d’or. '
  '3':
  - type: text
    content: 'L’Éternel '
  - type: note
    content: Ex 12:36.
  - type: text
    content: 'fit trouver grâce au peuple aux yeux des Égyptiens; Moïse lui-même était très considéré dans le pays d’Égypte, aux yeux des serviteurs de Pharaon et aux yeux du peuple. '
  '4':
  - type: text
    content: 'Moïse dit: Ainsi parle l’Éternel: Vers le milieu de la nuit, '
  - type: note
    content: Ex 12:29.
  - type: text
    content: 'je passerai au travers de l’Égypte; '
  '5':
  - type: text
    content: 'et '
  - type: note
    content: Ex 12:12.
  - type: text
    content: 'tous les premiers-nés mourront dans le pays d’Égypte, depuis le premier-né de Pharaon assis sur son trône, jusqu’au premier-né de la servante qui est derrière la meule, et jusqu’à tous les premiers-nés des animaux. '
  '6':
  - type: text
    content: 'Il y aura dans tout le pays d’Égypte de grands cris, tels qu’il n’y en a point eu et qu’il n’y en aura plus de semblables. '
  '7':
  - type: text
    content: 'Mais parmi tous les enfants d’Israël, depuis les hommes jusqu’aux animaux, pas même un chien ne remuera sa langue, afin que vous sachiez quelle différence l’Éternel fait entre l’Égypte et Israël. '
  '8':
  - type: note
    content: Ex 12:30.
  - type: text
    content: 'Alors tous tes serviteurs que voici descendront vers moi et se prosterneront devant moi, en disant: Sors, toi et tout le peuple qui s’attache à tes pas! Après cela, je sortirai. Moïse sortit de chez Pharaon, dans une ardente colère. '
  '9':
  - type: text
    content: 'L’Éternel dit à Moïse: Pharaon ne vous écoutera point, afin que mes miracles se multiplient dans le pays d’Égypte. '
