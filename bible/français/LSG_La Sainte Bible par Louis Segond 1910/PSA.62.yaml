document_id: PSA.62,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Pr 18:10. La 3:24-26. Ps 91; 146.) 2 S 15:13, etc. Jé 17:5-8.
  - type: text
    content: Au chef des chantres. D’après Jeduthun. Psaume de David.
  '10':
  - type: text
    content: Oui, vanité, les fils de l’homme!
  - type: text
    content: Mensonge, les fils de l’homme!
  - type: text
    content: Dans une balance ils monteraient
  - type: text
    content: Tous ensemble, plus légers qu’un souffle.
  '11':
  - type: text
    content: Ne vous confiez pas dans la violence,
  - type: text
    content: Et ne mettez pas un vain espoir dans la rapine;
  - type: text
    content: Quand les richesses s’accroissent,
  - type: text
    content: N’y attachez pas votre cœur.
  '12':
  - type: text
    content: Dieu a parlé une fois;
  - type: text
    content: 'Deux fois j’ai entendu ceci:'
  - type: text
    content: C’est que la force est à Dieu.
  '13':
  - type: text
    content: A toi aussi, Seigneur! La bonté;
  - type: note
    content: Job 34:11. Pr 24:12. Jé 32:19. Éz 7:27; 33:20. Mt 16:27. Ro 2:6. 2 Co 5:10. Ép 6:8. Col 3:25. 1 Pi 1:17. Ap 22:12.
  - type: text
    content: Car tu rends à chacun selon ses œuvres.
  '2':
  - type: text
    content: Oui, c’est en Dieu que mon âme se confie;
  - type: text
    content: De lui vient mon salut.
  '3':
  - type: text
    content: Oui, c’est lui qui est mon rocher et mon salut;
  - type: text
    content: 'Ma haute retraite: je ne chancellerai guère.'
  '4':
  - type: text
    content: Jusqu’à quand vous jetterez-vous sur un homme,
  - type: text
    content: Chercherez-vous tous à l’abattre,
  - type: text
    content: Comme une muraille qui penche,
  - type: text
    content: Comme une clôture qu’on renverse?
  '5':
  - type: text
    content: Ils conspirent pour le précipiter de son poste élevé;
  - type: text
    content: Ils prennent plaisir au mensonge;
  - type: text
    content: Ils bénissent de leur bouche,
  - type: text
    content: 'Et ils maudissent dans leur cœur. '
  - type: text
    content: — Pause.
  '6':
  - type: text
    content: Oui, mon âme, confie-toi en Dieu!
  - type: text
    content: Car de lui vient mon espérance.
  '7':
  - type: text
    content: Oui, c’est lui qui est mon rocher et mon salut;
  - type: text
    content: 'Ma haute retraite: je ne chancellerai pas.'
  '8':
  - type: text
    content: Sur Dieu reposent mon salut et ma gloire;
  - type: text
    content: Le rocher de ma force, mon refuge, est en Dieu.
  '9':
  - type: text
    content: En tout temps, peuples, confiez-vous en lui,
  - type: text
    content: Répandez vos cœurs en sa présence!
  - type: text
    content: 'Dieu est notre refuge, '
  - type: text
    content: — Pause.
