document_id: PSA.62
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: (Pr 18:10. La 3:24-26. Ps 91; 146.) 2 S 15:13, etc. Jé 17:5-8.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. D’après Jeduthun. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Oui, c’est en Dieu que mon âme se confie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: De lui vient mon salut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Oui, c’est lui qui est mon rocher et mon salut;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ma haute retraite: je ne chancellerai guère.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Jusqu’à quand vous jetterez-vous sur un homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chercherez-vous tous à l’abattre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme une muraille qui penche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme une clôture qu’on renverse?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils conspirent pour le précipiter de son poste élevé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils prennent plaisir au mensonge;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils bénissent de leur bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et ils maudissent dans leur cœur. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oui, mon âme, confie-toi en Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car de lui vient mon espérance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Oui, c’est lui qui est mon rocher et mon salut;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ma haute retraite: je ne chancellerai pas.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Sur Dieu reposent mon salut et ma gloire;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le rocher de ma force, mon refuge, est en Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: En tout temps, peuples, confiez-vous en lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Répandez vos cœurs en sa présence!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dieu est notre refuge, '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Oui, vanité, les fils de l’homme!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mensonge, les fils de l’homme!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans une balance ils monteraient
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ensemble, plus légers qu’un souffle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ne vous confiez pas dans la violence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne mettez pas un vain espoir dans la rapine;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand les richesses s’accroissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’y attachez pas votre cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dieu a parlé une fois;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Deux fois j’ai entendu ceci:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est que la force est à Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: A toi aussi, Seigneur! La bonté;
- type: usfm
  marker: q1
  children:
