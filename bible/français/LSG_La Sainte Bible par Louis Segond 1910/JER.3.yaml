document_id: JER.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-5: cf. Jé 2:20, 29, etc. Os 7:13-16.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Il dit: Lorsqu’un homme répudie sa femme,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’elle le quitte et devient la femme d’un autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cet homme retourne-t-il encore vers elle?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pays même ne serait-il pas souillé?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toi, tu t’es prostituée à de nombreux amants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu reviendrais à moi! Dit l’Éternel.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Malgré tout cela, la perfide Juda, sa sœur, n’est pas revenue à moi de tout son cœur; c’est avec fausseté qu’elle l’a fait, dit l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-25: cf. Éz 18:30-32. (De 30:1-6. Jé 23:3-8. Mi 4:1-7.) (Jé 4:1, 2. Os 14.)'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'L’Éternel me dit: L’infidèle Israël paraît innocente'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En comparaison de la perfide Juda.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Va, crie ces paroles vers le septentrion, et dis:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reviens, infidèle Israël! Dit l’Éternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne jetterai pas sur vous un regard sévère;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car je suis '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 86:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 103:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 145:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: miséricordieux, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne garde pas ma colère à toujours.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Reconnais seulement ton iniquité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reconnais que tu as été infidèle à l’Éternel, ton Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tu as dirigé çà et là tes pas vers les dieux étrangers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sous tout arbre vert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que tu n’as pas écouté ma voix, dit l’Éternel.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Revenez, enfants rebelles, dit l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je suis votre maître.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous prendrai, un d’une ville, deux d’une famille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je vous ramènerai dans Sion.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Je vous donnerai '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 23:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 34:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 4:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: des bergers selon mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils vous paîtront avec intelligence et avec sagesse.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Lorsque vous aurez multiplié et fructifié dans le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ces jours-là, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne parlera plus de l’arche de l’alliance de l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle ne viendra plus à la pensée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne se la rappellera plus, on ne s’apercevra plus de son absence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’on n’en fera point une autre.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: En ce temps-là, on appellera Jérusalem le trône de l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les nations s’assembleront à Jérusalem, au nom de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et elles ne suivront plus les penchants de leur mauvais cœur.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: En ces jours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La maison de Juda marchera avec la maison d’Israël;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles viendront ensemble du pays du septentrion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au pays dont j’ai donné la possession à vos pères.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Je disais: Comment te mettrai-je parmi mes enfants,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et te donnerai-je un pays de délices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un héritage, le plus bel ornement des nations?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je disais: Tu m’appelleras: Mon père!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu ne te détourneras pas de moi.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Lève tes yeux vers les hauteurs, et regarde!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où ne t’es-tu pas prostituée!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu te tenais sur les chemins, comme l’Arabe dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu as souillé le pays par tes prostitutions et par ta méchanceté.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mais, comme une femme est infidèle à son amant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi vous m’avez été infidèles, maison d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Une voix se fait entendre sur les lieux élevés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sont les pleurs, les supplications des enfants d’Israël;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils ont perverti leur voie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils ont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 2:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: oublié l’Éternel, leur Dieu.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Revenez, enfants rebelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je pardonnerai vos infidélités.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous voici, nous allons à toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu es l’Éternel, notre Dieu.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 121:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Oui, le bruit qui vient des collines et des montagnes n’est que mensonge;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, c’est en l’Éternel, notre Dieu, qu’est le salut d’Israël.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Les idoles ont dévoré le produit du travail de nos pères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès notre jeunesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs brebis et leurs bœufs, leurs fils et leurs filles.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Nous avons notre honte pour couche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et notre ignominie pour couverture;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car nous avons péché contre l’Éternel, notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous et nos pères, dès notre jeunesse jusqu’à ce jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et nous n’avons pas écouté la voix de l’Éternel, notre Dieu.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Aussi les pluies ont-elles été retenues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la pluie du printemps a-t-elle manqué;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais tu as eu le front d’une femme prostituée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu n’as pas voulu avoir honte.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Maintenant, n’est-ce pas? Tu cries vers moi: Mon père!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as été l’ami de ma jeunesse!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Gardera-t-il à toujours sa colère?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La conservera-t-il à jamais?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et voici, tu as dit, tu as fait des choses criminelles, tu les as consommées.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Exhortations à la repentance
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-10: cf. 2 R 17:6-23.'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'L’Éternel me dit, au temps du roi Josias: As-tu vu ce qu’a fait l’infidèle Israël? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 2:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Elle est allée sur toute montagne élevée et sous tout arbre vert, et là elle s’est prostituée. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Je disais: Après avoir fait toutes ces choses, elle reviendra à moi. Mais elle n’est pas revenue. Et sa sœur, la perfide Juda, en a été témoin. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Quoique j’eusse répudié l’infidèle Israël à cause de tous ses adultères, et que je lui eusse donné sa lettre de divorce, j’ai vu que la perfide Juda, sa sœur, n’a point eu de crainte, et qu’elle est allée se prostituer pareillement. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Par sa criante impudicité Israël a souillé le pays, elle a commis un adultère avec la pierre et le bois. '
