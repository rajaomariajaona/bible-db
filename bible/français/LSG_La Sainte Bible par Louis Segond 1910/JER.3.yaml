document_id: JER.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-5: cf. Jé 2:20, 29, etc. Os 7:13-16.'
  - type: text
    content: 'Il dit: Lorsqu’un homme répudie sa femme,'
  - type: text
    content: Qu’elle le quitte et devient la femme d’un autre,
  - type: text
    content: Cet homme retourne-t-il encore vers elle?
  - type: text
    content: Le pays même ne serait-il pas souillé?
  - type: text
    content: Et toi, tu t’es prostituée à de nombreux amants,
  - type: text
    content: Et tu reviendrais à moi! Dit l’Éternel.
  '10':
  - type: text
    content: Malgré tout cela, la perfide Juda, sa sœur, n’est pas revenue à moi de tout son cœur; c’est avec fausseté qu’elle l’a fait, dit l’Éternel.
  - type: heading
    content: 'V. 11-25: cf. Éz 18:30-32. (De 30:1-6. Jé 23:3-8. Mi 4:1-7.) (Jé 4:1, 2. Os 14.)'
  '11':
  - type: text
    content: 'L’Éternel me dit: L’infidèle Israël paraît innocente'
  - type: text
    content: En comparaison de la perfide Juda.
  '12':
  - type: text
    content: 'Va, crie ces paroles vers le septentrion, et dis:'
  - type: text
    content: Reviens, infidèle Israël! Dit l’Éternel.
  - type: text
    content: Je ne jetterai pas sur vous un regard sévère;
  - type: text
    content: 'Car je suis '
  - type: note
    content: Ps 86:15; 103:8, 9; 145:17.
  - type: text
    content: miséricordieux, dit l’Éternel,
  - type: text
    content: Je ne garde pas ma colère à toujours.
  '13':
  - type: text
    content: Reconnais seulement ton iniquité,
  - type: text
    content: Reconnais que tu as été infidèle à l’Éternel, ton Dieu,
  - type: text
    content: Que tu as dirigé çà et là tes pas vers les dieux étrangers,
  - type: text
    content: Sous tout arbre vert,
  - type: text
    content: Et que tu n’as pas écouté ma voix, dit l’Éternel.
  '14':
  - type: text
    content: Revenez, enfants rebelles, dit l’Éternel;
  - type: text
    content: Car je suis votre maître.
  - type: text
    content: Je vous prendrai, un d’une ville, deux d’une famille,
  - type: text
    content: Et je vous ramènerai dans Sion.
  '15':
  - type: text
    content: 'Je vous donnerai '
  - type: note
    content: Jé 23:4. Éz 34:23. Ép 4:11.
  - type: text
    content: des bergers selon mon cœur,
  - type: text
    content: Et ils vous paîtront avec intelligence et avec sagesse.
  '16':
  - type: text
    content: Lorsque vous aurez multiplié et fructifié dans le pays,
  - type: text
    content: En ces jours-là, dit l’Éternel,
  - type: text
    content: On ne parlera plus de l’arche de l’alliance de l’Éternel;
  - type: text
    content: Elle ne viendra plus à la pensée;
  - type: text
    content: On ne se la rappellera plus, on ne s’apercevra plus de son absence,
  - type: text
    content: Et l’on n’en fera point une autre.
  '17':
  - type: text
    content: En ce temps-là, on appellera Jérusalem le trône de l’Éternel;
  - type: text
    content: Toutes les nations s’assembleront à Jérusalem, au nom de l’Éternel,
  - type: text
    content: Et elles ne suivront plus les penchants de leur mauvais cœur.
  '18':
  - type: text
    content: En ces jours,
  - type: text
    content: La maison de Juda marchera avec la maison d’Israël;
  - type: text
    content: Elles viendront ensemble du pays du septentrion
  - type: text
    content: Au pays dont j’ai donné la possession à vos pères.
  '19':
  - type: text
    content: 'Je disais: Comment te mettrai-je parmi mes enfants,'
  - type: text
    content: Et te donnerai-je un pays de délices,
  - type: text
    content: Un héritage, le plus bel ornement des nations?
  - type: text
    content: 'Je disais: Tu m’appelleras: Mon père!'
  - type: text
    content: Et tu ne te détourneras pas de moi.
  '2':
  - type: text
    content: Lève tes yeux vers les hauteurs, et regarde!
  - type: text
    content: Où ne t’es-tu pas prostituée!
  - type: text
    content: Tu te tenais sur les chemins, comme l’Arabe dans le désert,
  - type: text
    content: Et tu as souillé le pays par tes prostitutions et par ta méchanceté.
  '20':
  - type: text
    content: Mais, comme une femme est infidèle à son amant,
  - type: text
    content: Ainsi vous m’avez été infidèles, maison d’Israël,
  - type: text
    content: Dit l’Éternel.
  '21':
  - type: text
    content: Une voix se fait entendre sur les lieux élevés;
  - type: text
    content: Ce sont les pleurs, les supplications des enfants d’Israël;
  - type: text
    content: Car ils ont perverti leur voie,
  - type: text
    content: 'Ils ont '
  - type: note
    content: Jé 2:32.
  - type: text
    content: oublié l’Éternel, leur Dieu.
  '22':
  - type: text
    content: Revenez, enfants rebelles,
  - type: text
    content: Je pardonnerai vos infidélités.
  - type: text
    content: Nous voici, nous allons à toi,
  - type: text
    content: Car tu es l’Éternel, notre Dieu.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Ps 121:1.
  - type: text
    content: Oui, le bruit qui vient des collines et des montagnes n’est que mensonge;
  - type: text
    content: Oui, c’est en l’Éternel, notre Dieu, qu’est le salut d’Israël.
  '24':
  - type: text
    content: Les idoles ont dévoré le produit du travail de nos pères,
  - type: text
    content: Dès notre jeunesse,
  - type: text
    content: Leurs brebis et leurs bœufs, leurs fils et leurs filles.
  '25':
  - type: text
    content: Nous avons notre honte pour couche,
  - type: text
    content: Et notre ignominie pour couverture;
  - type: text
    content: Car nous avons péché contre l’Éternel, notre Dieu,
  - type: text
    content: Nous et nos pères, dès notre jeunesse jusqu’à ce jour,
  - type: text
    content: Et nous n’avons pas écouté la voix de l’Éternel, notre Dieu.
  '3':
  - type: text
    content: Aussi les pluies ont-elles été retenues,
  - type: text
    content: Et la pluie du printemps a-t-elle manqué;
  - type: text
    content: Mais tu as eu le front d’une femme prostituée,
  - type: text
    content: Tu n’as pas voulu avoir honte.
  '4':
  - type: text
    content: 'Maintenant, n’est-ce pas? Tu cries vers moi: Mon père!'
  - type: text
    content: Tu as été l’ami de ma jeunesse!
  '5':
  - type: text
    content: Gardera-t-il à toujours sa colère?
  - type: text
    content: La conservera-t-il à jamais?
  - type: text
    content: Et voici, tu as dit, tu as fait des choses criminelles, tu les as consommées.
  - type: heading
    content: Exhortations à la repentance
  - type: heading
    content: 'V. 6-10: cf. 2 R 17:6-23.'
  '6':
  - type: text
    content: 'L’Éternel me dit, au temps du roi Josias: As-tu vu ce qu’a fait l’infidèle Israël? '
  - type: note
    content: Jé 2:20.
  - type: text
    content: 'Elle est allée sur toute montagne élevée et sous tout arbre vert, et là elle s’est prostituée. '
  '7':
  - type: text
    content: 'Je disais: Après avoir fait toutes ces choses, elle reviendra à moi. Mais elle n’est pas revenue. Et sa sœur, la perfide Juda, en a été témoin. '
  '8':
  - type: text
    content: 'Quoique j’eusse répudié l’infidèle Israël à cause de tous ses adultères, et que je lui eusse donné sa lettre de divorce, j’ai vu que la perfide Juda, sa sœur, n’a point eu de crainte, et qu’elle est allée se prostituer pareillement. '
  '9':
  - type: text
    content: 'Par sa criante impudicité Israël a souillé le pays, elle a commis un adultère avec la pierre et le bois. '
