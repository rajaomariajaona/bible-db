document_id: JHN.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison d’un aveugle-né
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-12: cf. Jn 8:12. Mal 4:2. Ps 112:4. Mc 8:22-25.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus vit, en passant, un homme aveugle de naissance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ses disciples lui firent cette question: Rabbi, qui a péché, cet homme ou ses parents, pour qu’il soit né aveugle? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce n’est pas que lui ou ses parents aient péché;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 11:4
      metadata:
        usfm: JHN.11.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais c’est afin que les œuvres de Dieu soient manifestées en lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 5:19
      metadata:
        usfm: JHN.5.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il faut que je fasse, tandis qu’il est jour, les œuvres de celui qui m’a envoyé; la nuit vient, où personne ne peut travailler.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pendant que je suis dans le monde, je suis la
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 42:6
      metadata:
        usfm: ISA.42.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 2:32
      metadata:
        usfm: LUK.2.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:9
      metadata:
        usfm: JHN.1.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:12
      metadata:
        usfm: JHN.8.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:35
      metadata:
        usfm: JHN.12.35
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '46'
      metadata:
        usfm: JHN.12.46
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 13:47
      metadata:
        usfm: ACT.13.47
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: lumière du monde.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Après avoir dit cela, il '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 8:23
      metadata:
        usfm: MRK.8.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'cracha à terre, et fit de la boue avec sa salive. Puis il appliqua cette boue sur les yeux de l’aveugle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Va, et lave-toi au réservoir de Siloé
  - type: text
    text: ' (nom qui signifie envoyé). Il y alla, se lava, et s’en retourna voyant clair. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ses voisins et ceux qui auparavant l’avaient connu comme un mendiant disaient: N’est-ce pas là celui qui se tenait assis et qui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 3:2
      metadata:
        usfm: ACT.3.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mendiait? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les uns disaient: C’est lui. D’autres disaient: Non, mais il lui ressemble. Et lui-même disait: C’est moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils lui dirent donc: Comment tes yeux ont-ils été ouverts? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il répondit: L’homme qu’on appelle Jésus a fait de la boue, a oint mes yeux, et m’a dit: Va au réservoir de Siloé, et lave-toi. J’y suis allé, je me suis lavé, et j’ai recouvré la vue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils lui dirent: Où est cet homme? Il répondit: Je ne sais.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-34: cf. (Jn 10:37, 38. És 6:9, 10.) Pr 29:25. Lu 6:22, 23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils menèrent vers les pharisiens celui qui avait été aveugle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:1
      metadata:
        usfm: MAT.12.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 2:23
      metadata:
        usfm: MRK.2.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 6:1
      metadata:
        usfm: LUK.6.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 5:9
      metadata:
        usfm: JHN.5.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Or, c’était un jour de sabbat que Jésus avait fait de la boue, et lui avait ouvert les yeux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'De nouveau, les pharisiens aussi lui demandèrent comment il avait recouvré la vue. Et il leur dit: Il a appliqué de la boue sur mes yeux, je me suis lavé, et je vois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Sur quoi quelques-uns des pharisiens dirent: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:2
      metadata:
        usfm: JHN.3.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:33
      metadata:
        usfm: JHN.9.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Cet homme ne vient pas de Dieu, car il n’observe pas le sabbat. D’autres dirent: Comment un homme pécheur peut-il faire de tels miracles? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:12
      metadata:
        usfm: JHN.7.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:19
      metadata:
        usfm: JHN.10.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et il y eut division parmi eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils dirent encore à l’aveugle: Toi, que dis-tu de lui, sur ce qu’il t’a ouvert les yeux? Il répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 7:16
      metadata:
        usfm: LUK.7.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:19
      metadata:
        usfm: LUK.24.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 4:19
      metadata:
        usfm: JHN.4.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:14
      metadata:
        usfm: JHN.6.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est un prophète. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les Juifs ne crurent point qu’il eût été aveugle et qu’il eût recouvré la vue jusqu’à ce qu’ils eussent fait venir ses parents. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et ils les interrogèrent, disant: Est-ce là votre fils, que vous dites être né aveugle? Comment donc voit-il maintenant? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ses parents répondirent: Nous savons que c’est notre fils, et qu’il est né aveugle; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'mais comment il voit maintenant, ou qui lui a ouvert les yeux, c’est ce que nous ne savons. Interrogez-le lui-même, il a de l’âge, il parlera de ce qui le concerne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ses parents dirent cela '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:13
      metadata:
        usfm: JHN.7.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:42
      metadata:
        usfm: JHN.12.42
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'parce qu’ils craignaient les Juifs; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:42
      metadata:
        usfm: JHN.12.42
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car les Juifs étaient déjà convenus que, si quelqu’un reconnaissait Jésus pour le Christ, il serait exclu de la synagogue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'C’est pourquoi ses parents dirent: Il a de l’âge, interrogez-le lui-même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les pharisiens appelèrent une seconde fois l’homme qui avait été aveugle, et ils lui dirent: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 7:19
      metadata:
        usfm: JOS.7.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Donne gloire à Dieu; nous savons que cet homme est un pécheur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il répondit: S’il est un pécheur, je ne sais; je sais une chose, c’est que j’étais aveugle et que maintenant je vois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils lui dirent: Que t’a-t-il fait? Comment t’a-t-il ouvert les yeux? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il leur répondit: Je vous l’ai déjà dit, et vous n’avez pas écouté; pourquoi voulez-vous l’entendre encore? Voulez-vous aussi devenir ses disciples? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils l’injurièrent et dirent: C’est toi qui es son disciple; nous, nous sommes disciples de Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nous savons que Dieu a parlé à Moïse; mais celui-ci, nous ne savons d’où il est. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Cet homme leur répondit: Il est étonnant que vous ne sachiez d’où il est; et cependant il m’a ouvert les yeux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 15:29
      metadata:
        usfm: PRO.15.29
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:9
      metadata:
        usfm: PRO.28.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:15
      metadata:
        usfm: ISA.1.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 3:4
      metadata:
        usfm: MIC.3.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous savons que Dieu n’exauce point les pécheurs; mais, si quelqu’un l’honore et fait sa volonté, c’est celui là qu’il exauce. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jamais on n’a entendu dire que quelqu’un ait ouvert les yeux d’un aveugle-né. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Si cet homme ne venait pas de Dieu, il ne pourrait rien faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ils lui répondirent: Tu es né tout entier dans le péché, et tu nous enseignes! Et ils le chassèrent.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 35-41: cf. Lu 10:21. Jn 10:2-5. 1 Pi 2:6-8. És 42:16. 2 Co 4:3-6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jésus apprit qu’ils l’avaient chassé; et, l’ayant rencontré, il lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Crois-tu au Fils de Dieu?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il répondit: Et qui est-il, Seigneur, afin que je croie en lui?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tu l’as vu,
  - type: text
    text: ' lui dit Jésus, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 4:26
      metadata:
        usfm: JHN.4.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et celui qui te parle, c’est lui.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Et il dit: Je crois, Seigneur. Et il se prosterna devant lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Puis Jésus dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:17
      metadata:
        usfm: JHN.3.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:47
      metadata:
        usfm: JHN.12.47
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je suis venu dans ce monde pour un jugement,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:13
      metadata:
        usfm: MAT.13.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: pour que ceux qui ne voient point voient, et que ceux qui voient deviennent aveugles.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Quelques pharisiens qui étaient avec lui, ayant entendu ces paroles, lui dirent: Nous aussi, sommes-nous aveugles? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Jésus leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Si vous étiez aveugles, vous n’auriez pas de péché. Mais maintenant vous dites: Nous voyons. C’est pour cela que votre péché subsiste.'
