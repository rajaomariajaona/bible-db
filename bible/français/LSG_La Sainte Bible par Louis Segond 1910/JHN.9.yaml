document_id: JHN.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Guérison d’un aveugle-né
  - type: heading
    content: 'V. 1-12: cf. Jn 8:12. Mal 4:2. Ps 112:4. Mc 8:22-25.'
  - type: text
    content: 'Jésus vit, en passant, un homme aveugle de naissance. '
  '10':
  - type: text
    content: 'Ils lui dirent donc: Comment tes yeux ont-ils été ouverts? '
  '11':
  - type: text
    content: 'Il répondit: L’homme qu’on appelle Jésus a fait de la boue, a oint mes yeux, et m’a dit: Va au réservoir de Siloé, et lave-toi. J’y suis allé, je me suis lavé, et j’ai recouvré la vue. '
  '12':
  - type: text
    content: 'Ils lui dirent: Où est cet homme? Il répondit: Je ne sais.'
  - type: heading
    content: 'V. 13-34: cf. (Jn 10:37, 38. És 6:9, 10.) Pr 29:25. Lu 6:22, 23.'
  '13':
  - type: text
    content: 'Ils menèrent vers les pharisiens celui qui avait été aveugle. '
  '14':
  - type: note
    content: Mt 12:1. Mc 2:23. Lu 6:1. Jn 5:9.
  - type: text
    content: 'Or, c’était un jour de sabbat que Jésus avait fait de la boue, et lui avait ouvert les yeux. '
  '15':
  - type: text
    content: 'De nouveau, les pharisiens aussi lui demandèrent comment il avait recouvré la vue. Et il leur dit: Il a appliqué de la boue sur mes yeux, je me suis lavé, et je vois. '
  '16':
  - type: text
    content: 'Sur quoi quelques-uns des pharisiens dirent: '
  - type: note
    content: Jn 3:2; 9:33.
  - type: text
    content: 'Cet homme ne vient pas de Dieu, car il n’observe pas le sabbat. D’autres dirent: Comment un homme pécheur peut-il faire de tels miracles? '
  - type: note
    content: Jn 7:12; 10:19.
  - type: text
    content: 'Et il y eut division parmi eux. '
  '17':
  - type: text
    content: 'Ils dirent encore à l’aveugle: Toi, que dis-tu de lui, sur ce qu’il t’a ouvert les yeux? Il répondit: '
  - type: note
    content: Lu 7:16; 24:19. Jn 4:19; 6:14.
  - type: text
    content: 'C’est un prophète. '
  '18':
  - type: text
    content: 'Les Juifs ne crurent point qu’il eût été aveugle et qu’il eût recouvré la vue jusqu’à ce qu’ils eussent fait venir ses parents. '
  '19':
  - type: text
    content: 'Et ils les interrogèrent, disant: Est-ce là votre fils, que vous dites être né aveugle? Comment donc voit-il maintenant? '
  '2':
  - type: text
    content: 'Ses disciples lui firent cette question: Rabbi, qui a péché, cet homme ou ses parents, pour qu’il soit né aveugle? '
  '20':
  - type: text
    content: 'Ses parents répondirent: Nous savons que c’est notre fils, et qu’il est né aveugle; '
  '21':
  - type: text
    content: 'mais comment il voit maintenant, ou qui lui a ouvert les yeux, c’est ce que nous ne savons. Interrogez-le lui-même, il a de l’âge, il parlera de ce qui le concerne. '
  '22':
  - type: text
    content: 'Ses parents dirent cela '
  - type: note
    content: Jn 7:13; 12:42.
  - type: text
    content: 'parce qu’ils craignaient les Juifs; '
  - type: note
    content: Jn 12:42.
  - type: text
    content: 'car les Juifs étaient déjà convenus que, si quelqu’un reconnaissait Jésus pour le Christ, il serait exclu de la synagogue. '
  '23':
  - type: text
    content: 'C’est pourquoi ses parents dirent: Il a de l’âge, interrogez-le lui-même. '
  '24':
  - type: text
    content: 'Les pharisiens appelèrent une seconde fois l’homme qui avait été aveugle, et ils lui dirent: '
  - type: note
    content: Jos 7:19.
  - type: text
    content: 'Donne gloire à Dieu; nous savons que cet homme est un pécheur. '
  '25':
  - type: text
    content: 'Il répondit: S’il est un pécheur, je ne sais; je sais une chose, c’est que j’étais aveugle et que maintenant je vois. '
  '26':
  - type: text
    content: 'Ils lui dirent: Que t’a-t-il fait? Comment t’a-t-il ouvert les yeux? '
  '27':
  - type: text
    content: 'Il leur répondit: Je vous l’ai déjà dit, et vous n’avez pas écouté; pourquoi voulez-vous l’entendre encore? Voulez-vous aussi devenir ses disciples? '
  '28':
  - type: text
    content: 'Ils l’injurièrent et dirent: C’est toi qui es son disciple; nous, nous sommes disciples de Moïse. '
  '29':
  - type: text
    content: 'Nous savons que Dieu a parlé à Moïse; mais celui-ci, nous ne savons d’où il est. '
  '3':
  - type: text
    content: 'Jésus répondit: '
  - type: text
    content: Ce n’est pas que lui ou ses parents aient péché;
  - type: text
    content: ' '
  - type: note
    content: Jn 11:4.
  - type: text
    content: mais c’est afin que les œuvres de Dieu soient manifestées en lui.
  '30':
  - type: text
    content: 'Cet homme leur répondit: Il est étonnant que vous ne sachiez d’où il est; et cependant il m’a ouvert les yeux. '
  '31':
  - type: note
    content: Pr 15:29; 28:9. És 1:15. Mi 3:4.
  - type: text
    content: 'Nous savons que Dieu n’exauce point les pécheurs; mais, si quelqu’un l’honore et fait sa volonté, c’est celui là qu’il exauce. '
  '32':
  - type: text
    content: 'Jamais on n’a entendu dire que quelqu’un ait ouvert les yeux d’un aveugle-né. '
  '33':
  - type: text
    content: 'Si cet homme ne venait pas de Dieu, il ne pourrait rien faire. '
  '34':
  - type: text
    content: 'Ils lui répondirent: Tu es né tout entier dans le péché, et tu nous enseignes! Et ils le chassèrent.'
  - type: heading
    content: 'V. 35-41: cf. Lu 10:21. Jn 10:2-5. 1 Pi 2:6-8. És 42:16. 2 Co 4:3-6.'
  '35':
  - type: text
    content: 'Jésus apprit qu’ils l’avaient chassé; et, l’ayant rencontré, il lui dit: '
  - type: text
    content: Crois-tu au Fils de Dieu?
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Il répondit: Et qui est-il, Seigneur, afin que je croie en lui?'
  '37':
  - type: text
    content: ' '
  - type: text
    content: Tu l’as vu,
  - type: text
    content: ' lui dit Jésus, '
  - type: note
    content: Jn 4:26.
  - type: text
    content: et celui qui te parle, c’est lui.
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'Et il dit: Je crois, Seigneur. Et il se prosterna devant lui. '
  '39':
  - type: text
    content: 'Puis Jésus dit: '
  - type: note
    content: Jn 3:17; 12:47.
  - type: text
    content: Je suis venu dans ce monde pour un jugement,
  - type: text
    content: ' '
  - type: note
    content: Mt 13:13.
  - type: text
    content: pour que ceux qui ne voient point voient, et que ceux qui voient deviennent aveugles.
  - type: text
    content: ' '
  '4':
  - type: text
    content: ' '
  - type: note
    content: Jn 5:19.
  - type: text
    content: Il faut que je fasse, tandis qu’il est jour, les œuvres de celui qui m’a envoyé; la nuit vient, où personne ne peut travailler.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Quelques pharisiens qui étaient avec lui, ayant entendu ces paroles, lui dirent: Nous aussi, sommes-nous aveugles? '
  '41':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: 'Si vous étiez aveugles, vous n’auriez pas de péché. Mais maintenant vous dites: Nous voyons. C’est pour cela que votre péché subsiste.'
  '5':
  - type: text
    content: Pendant que je suis dans le monde, je suis la
  - type: text
    content: ' '
  - type: note
    content: És 42:6. Lu 2:32. Jn 1:9; 8:12; 12:35, 46. Ac 13:47.
  - type: text
    content: lumière du monde.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Après avoir dit cela, il '
  - type: note
    content: Mc 8:23.
  - type: text
    content: 'cracha à terre, et fit de la boue avec sa salive. Puis il appliqua cette boue sur les yeux de l’aveugle, '
  '7':
  - type: text
    content: 'et lui dit: '
  - type: text
    content: Va, et lave-toi au réservoir de Siloé
  - type: text
    content: ' (nom qui signifie envoyé). Il y alla, se lava, et s’en retourna voyant clair. '
  '8':
  - type: text
    content: 'Ses voisins et ceux qui auparavant l’avaient connu comme un mendiant disaient: N’est-ce pas là celui qui se tenait assis et qui '
  - type: note
    content: Ac 3:2.
  - type: text
    content: 'mendiait? '
  '9':
  - type: text
    content: 'Les uns disaient: C’est lui. D’autres disaient: Non, mais il lui ressemble. Et lui-même disait: C’est moi. '
