document_id: LEV.6,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règles sur les holocaustes, les offrandes et les diverses espèces de sacrifices
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. Lé 1. No 28:3, etc.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On ne le cuira pas avec du levain. C’est la part que je leur ai donnée de mes offrandes consumées par le feu. C’est une chose très sainte, comme le sacrifice d’expiation et comme le sacrifice de culpabilité. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout mâle d’entre les enfants d’Aaron en mangera. C’est une loi perpétuelle pour vos descendants, au sujet des offrandes consumées par le feu devant l’Éternel: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:37
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: quiconque y touchera sera sanctifié.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-16: cf. Lé 8:2, 26-28.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici l’offrande qu’Aaron et ses fils feront à l’Éternel, le jour où ils recevront l’onction: un dixième d’épha de fleur de farine, comme offrande perpétuelle, moitié le matin et moitié le soir. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle sera préparée à la poêle avec de l’huile, et tu l’apporteras frite; tu la présenteras aussi cuite et en morceaux comme une offrande d’une agréable odeur à l’Éternel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur qui, parmi les fils d’Aaron, sera oint pour lui succéder, fera aussi cette offrande. C’est une loi perpétuelle devant l’Éternel: elle sera brûlée en entier. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toute offrande d’un sacrificateur sera brûlée en entier; elle ne sera point mangée.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-23: cf. Lé 4. Hé 13:10, 13.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parle à Aaron et à ses fils, et dis: Voici la loi du sacrifice d’expiation. C’est dans le lieu où l’on égorge l’holocauste que sera égorgée devant l’Éternel la victime pour le sacrifice d’expiation: c’est une chose très sainte. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 4:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le sacrificateur qui offrira la victime expiatoire la mangera; elle sera mangée dans un lieu saint, dans le parvis de la tente d’assignation. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Donne cet ordre à Aaron et à ses fils, et dis: Voici la loi de l’holocauste. L’holocauste restera sur le foyer de l’autel toute la nuit jusqu’au matin, et le feu brûlera sur l’autel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quiconque en touchera la chair sera sanctifié. S’il en rejaillit du sang sur un vêtement, la place sur laquelle il aura rejailli sera lavée dans un lieu saint. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le vase de terre dans lequel elle aura cuit sera brisé; si c’est dans un vase d’airain qu’elle a cuit, il sera nettoyé et lavé dans l’eau. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout mâle parmi les sacrificateurs en mangera: c’est une chose très sainte. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais on ne mangera aucune victime expiatoire '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 4:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 13:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'dont on apportera du sang dans la tente d’assignation, pour faire l’expiation dans le sanctuaire: elle sera brûlée au feu.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur revêtira sa tunique de lin, et mettra des caleçons sur sa chair, il enlèvera la cendre faite par le feu qui aura consumé l’holocauste sur l’autel, et il la déposera près de l’autel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il quittera ses vêtements et en mettra d’autres, pour porter la cendre hors du camp, dans un lieu pur. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le feu brûlera sur l’autel, il ne s’éteindra point; chaque matin, le sacrificateur y allumera du bois, arrangera l’holocauste, et brûlera la graisse des sacrifices d’actions de grâces. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le feu brûlera continuellement sur l’autel, il ne s’éteindra point.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-11: cf. Lé 2.'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici la loi '
    - type: usfm
      marker: x
      children:
      - type: text
        text: No 15:4, etc.
      marker-yv: yv-n
    - type: text
      text: 'de l’offrande. Les fils d’Aaron la présenteront devant l’Éternel, devant l’autel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur prélèvera une poignée de la fleur de farine et de l’huile, avec tout l’encens ajouté à l’offrande, et il brûlera cela sur l’autel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 2:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme souvenir d’une agréable odeur à l’Éternel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aaron et ses fils mangeront ce qui restera de l’offrande; ils le mangeront sans levain, dans un lieu saint, dans le parvis de la tente d’assignation. '
