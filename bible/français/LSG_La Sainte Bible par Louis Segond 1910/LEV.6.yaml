document_id: LEV.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Règles sur les holocaustes, les offrandes et les diverses espèces de sacrifices
  - type: heading
    content: 'V. 1-6: cf. Lé 1. No 28:3, etc.'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: text
    content: 'On ne le cuira pas avec du levain. C’est la part que je leur ai donnée de mes offrandes consumées par le feu. C’est une chose très sainte, comme le sacrifice d’expiation et comme le sacrifice de culpabilité. '
  '11':
  - type: text
    content: 'Tout mâle d’entre les enfants d’Aaron en mangera. C’est une loi perpétuelle pour vos descendants, au sujet des offrandes consumées par le feu devant l’Éternel: '
  - type: note
    content: Ex 29:37.
  - type: text
    content: quiconque y touchera sera sanctifié.
  - type: heading
    content: 'V. 12-16: cf. Lé 8:2, 26-28.'
  '12':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '13':
  - type: text
    content: 'Voici l’offrande qu’Aaron et ses fils feront à l’Éternel, le jour où ils recevront l’onction: un dixième d’épha de fleur de farine, comme offrande perpétuelle, moitié le matin et moitié le soir. '
  '14':
  - type: text
    content: 'Elle sera préparée à la poêle avec de l’huile, et tu l’apporteras frite; tu la présenteras aussi cuite et en morceaux comme une offrande d’une agréable odeur à l’Éternel. '
  '15':
  - type: text
    content: 'Le sacrificateur qui, parmi les fils d’Aaron, sera oint pour lui succéder, fera aussi cette offrande. C’est une loi perpétuelle devant l’Éternel: elle sera brûlée en entier. '
  '16':
  - type: text
    content: Toute offrande d’un sacrificateur sera brûlée en entier; elle ne sera point mangée.
  - type: heading
    content: 'V. 17-23: cf. Lé 4. Hé 13:10, 13.'
  '17':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '18':
  - type: text
    content: 'Parle à Aaron et à ses fils, et dis: Voici la loi du sacrifice d’expiation. C’est dans le lieu où l’on égorge l’holocauste que sera égorgée devant l’Éternel la victime pour le sacrifice d’expiation: c’est une chose très sainte. '
  '19':
  - type: note
    content: Os 4:8.
  - type: text
    content: 'Le sacrificateur qui offrira la victime expiatoire la mangera; elle sera mangée dans un lieu saint, dans le parvis de la tente d’assignation. '
  '2':
  - type: text
    content: 'Donne cet ordre à Aaron et à ses fils, et dis: Voici la loi de l’holocauste. L’holocauste restera sur le foyer de l’autel toute la nuit jusqu’au matin, et le feu brûlera sur l’autel. '
  '20':
  - type: text
    content: 'Quiconque en touchera la chair sera sanctifié. S’il en rejaillit du sang sur un vêtement, la place sur laquelle il aura rejailli sera lavée dans un lieu saint. '
  '21':
  - type: text
    content: 'Le vase de terre dans lequel elle aura cuit sera brisé; si c’est dans un vase d’airain qu’elle a cuit, il sera nettoyé et lavé dans l’eau. '
  '22':
  - type: text
    content: 'Tout mâle parmi les sacrificateurs en mangera: c’est une chose très sainte. '
  '23':
  - type: text
    content: 'Mais on ne mangera aucune victime expiatoire '
  - type: note
    content: Lé 4:5. Hé 13:11.
  - type: text
    content: 'dont on apportera du sang dans la tente d’assignation, pour faire l’expiation dans le sanctuaire: elle sera brûlée au feu.'
  '3':
  - type: text
    content: 'Le sacrificateur revêtira sa tunique de lin, et mettra des caleçons sur sa chair, il enlèvera la cendre faite par le feu qui aura consumé l’holocauste sur l’autel, et il la déposera près de l’autel. '
  '4':
  - type: text
    content: 'Puis il quittera ses vêtements et en mettra d’autres, pour porter la cendre hors du camp, dans un lieu pur. '
  '5':
  - type: text
    content: 'Le feu brûlera sur l’autel, il ne s’éteindra point; chaque matin, le sacrificateur y allumera du bois, arrangera l’holocauste, et brûlera la graisse des sacrifices d’actions de grâces. '
  '6':
  - type: text
    content: Le feu brûlera continuellement sur l’autel, il ne s’éteindra point.
  - type: heading
    content: 'V. 7-11: cf. Lé 2.'
  '7':
  - type: text
    content: 'Voici la loi '
  - type: note
    content: No 15:4, etc.
  - type: text
    content: 'de l’offrande. Les fils d’Aaron la présenteront devant l’Éternel, devant l’autel. '
  '8':
  - type: text
    content: 'Le sacrificateur prélèvera une poignée de la fleur de farine et de l’huile, avec tout l’encens ajouté à l’offrande, et il brûlera cela sur l’autel '
  - type: note
    content: Lé 2:9.
  - type: text
    content: 'comme souvenir d’une agréable odeur à l’Éternel. '
  '9':
  - type: text
    content: 'Aaron et ses fils mangeront ce qui restera de l’offrande; ils le mangeront sans levain, dans un lieu saint, dans le parvis de la tente d’assignation. '
