document_id: NEH.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Plaintes du peuple contre la cupidité des grands; intervention et désintéressement de Néhémie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. (Lé 25:35, etc. De 15:7-11.) Ec 4:1. 2 Th 3:7-9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il s’éleva de la part des gens du peuple et de leurs femmes de grandes plaintes contre leurs frères les Juifs. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les uns disaient: Nous, nos fils et nos filles, nous sommes nombreux; qu’on nous donne du blé, afin que nous mangions et que nous vivions. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'D’autres disaient: Nous engageons nos champs, nos vignes, et nos maisons, pour avoir du blé pendant la famine. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'D’autres disaient: Nous avons emprunté de l’argent sur nos champs et nos vignes pour le tribut du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et pourtant notre chair est comme la chair de nos frères, nos enfants sont comme leurs enfants; et voici, nous soumettons à la servitude nos fils et nos filles, et plusieurs de nos filles y sont déjà réduites; nous sommes sans force, et nos champs et nos vignes sont à d’autres. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je fus très irrité lorsque j’entendis leurs plaintes et ces paroles-là. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je résolus de faire des réprimandes aux grands et aux magistrats, et je leur dis: Quoi! Vous prêtez à intérêt à vos frères! Et je rassemblai autour d’eux une grande foule, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et je leur dis: Nous avons racheté selon notre pouvoir nos frères les Juifs vendus aux nations; et vous vendriez vous-mêmes vos frères, et c’est à nous qu’ils seraient vendus! Ils se turent, ne trouvant rien à répondre. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Puis je dis: Ce que vous faites n’est pas bien. Ne devriez-vous pas marcher dans la crainte de notre Dieu, pour n’être pas insultés par les nations nos ennemies? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Moi aussi, et mes frères et mes serviteurs, nous leur avons prêté de l’argent et du blé. Abandonnons ce qu’ils nous doivent! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Rendez-leur donc aujourd’hui leurs champs, leurs vignes, leurs oliviers et leurs maisons, et le centième de l’argent, du blé, du moût et de l’huile que vous avez exigé d’eux comme intérêt. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils répondirent: Nous les rendrons, et nous ne leur demanderons rien, nous ferons ce que tu dis. Alors j’appelai les sacrificateurs, devant lesquels je les fis jurer de tenir parole. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et je secouai mon manteau, en disant: Que Dieu secoue de la même manière hors de sa maison et de ses biens tout homme qui n’aura point tenu parole, et qu’ainsi cet homme soit secoué et laissé à vide! Toute l’assemblée dit: Amen! On célébra l’Éternel. Et le peuple tint parole.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-19: cf. Ac 20:33-35.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dès le jour où le roi m’établit leur gouverneur dans le pays de Juda, depuis la vingtième année jusqu’à la trente-deuxième année du roi Artaxerxès, pendant douze ans, ni moi ni mes frères n’avons vécu des revenus du gouverneur. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Avant moi, les premiers gouverneurs accablaient le peuple, et recevaient de lui du pain et du vin, outre quarante sicles d’argent; leurs serviteurs mêmes opprimaient le peuple. Je n’ai point agi de la sorte, par crainte de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Bien plus, j’ai travaillé à la réparation de cette muraille, et nous n’avons acheté aucun champ, et mes serviteurs tous ensemble étaient à l’ouvrage. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'J’avais à ma table cent cinquante hommes, Juifs et magistrats, outre ceux qui venaient à nous des nations d’alentour. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'On m’apprêtait chaque jour un bœuf, six moutons choisis, et des oiseaux; et tous les dix jours on préparait en abondance tout le vin nécessaire. Malgré cela, je n’ai point réclamé les revenus du gouverneur, parce que les travaux étaient à la charge de ce peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Né 13:22
      metadata:
        usfm: NEH.13.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Souviens-toi favorablement de moi, ô mon Dieu, à cause de tout ce que j’ai fait pour ce peuple!
