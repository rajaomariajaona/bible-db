document_id: NEH.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Plaintes du peuple contre la cupidité des grands; intervention et désintéressement de Néhémie
  - type: heading
    content: 'V. 1-13: cf. (Lé 25:35, etc. De 15:7-11.) Ec 4:1. 2 Th 3:7-9.'
  - type: text
    content: 'Il s’éleva de la part des gens du peuple et de leurs femmes de grandes plaintes contre leurs frères les Juifs. '
  '10':
  - type: text
    content: 'Moi aussi, et mes frères et mes serviteurs, nous leur avons prêté de l’argent et du blé. Abandonnons ce qu’ils nous doivent! '
  '11':
  - type: text
    content: 'Rendez-leur donc aujourd’hui leurs champs, leurs vignes, leurs oliviers et leurs maisons, et le centième de l’argent, du blé, du moût et de l’huile que vous avez exigé d’eux comme intérêt. '
  '12':
  - type: text
    content: 'Ils répondirent: Nous les rendrons, et nous ne leur demanderons rien, nous ferons ce que tu dis. Alors j’appelai les sacrificateurs, devant lesquels je les fis jurer de tenir parole. '
  '13':
  - type: text
    content: 'Et je secouai mon manteau, en disant: Que Dieu secoue de la même manière hors de sa maison et de ses biens tout homme qui n’aura point tenu parole, et qu’ainsi cet homme soit secoué et laissé à vide! Toute l’assemblée dit: Amen! On célébra l’Éternel. Et le peuple tint parole.'
  - type: heading
    content: 'V. 14-19: cf. Ac 20:33-35.'
  '14':
  - type: text
    content: 'Dès le jour où le roi m’établit leur gouverneur dans le pays de Juda, depuis la vingtième année jusqu’à la trente-deuxième année du roi Artaxerxès, pendant douze ans, ni moi ni mes frères n’avons vécu des revenus du gouverneur. '
  '15':
  - type: text
    content: 'Avant moi, les premiers gouverneurs accablaient le peuple, et recevaient de lui du pain et du vin, outre quarante sicles d’argent; leurs serviteurs mêmes opprimaient le peuple. Je n’ai point agi de la sorte, par crainte de Dieu. '
  '16':
  - type: text
    content: 'Bien plus, j’ai travaillé à la réparation de cette muraille, et nous n’avons acheté aucun champ, et mes serviteurs tous ensemble étaient à l’ouvrage. '
  '17':
  - type: text
    content: 'J’avais à ma table cent cinquante hommes, Juifs et magistrats, outre ceux qui venaient à nous des nations d’alentour. '
  '18':
  - type: text
    content: 'On m’apprêtait chaque jour un bœuf, six moutons choisis, et des oiseaux; et tous les dix jours on préparait en abondance tout le vin nécessaire. Malgré cela, je n’ai point réclamé les revenus du gouverneur, parce que les travaux étaient à la charge de ce peuple. '
  '19':
  - type: note
    content: Né 13:22.
  - type: text
    content: Souviens-toi favorablement de moi, ô mon Dieu, à cause de tout ce que j’ai fait pour ce peuple!
  '2':
  - type: text
    content: 'Les uns disaient: Nous, nos fils et nos filles, nous sommes nombreux; qu’on nous donne du blé, afin que nous mangions et que nous vivions. '
  '3':
  - type: text
    content: 'D’autres disaient: Nous engageons nos champs, nos vignes, et nos maisons, pour avoir du blé pendant la famine. '
  '4':
  - type: text
    content: 'D’autres disaient: Nous avons emprunté de l’argent sur nos champs et nos vignes pour le tribut du roi. '
  '5':
  - type: text
    content: 'Et pourtant notre chair est comme la chair de nos frères, nos enfants sont comme leurs enfants; et voici, nous soumettons à la servitude nos fils et nos filles, et plusieurs de nos filles y sont déjà réduites; nous sommes sans force, et nos champs et nos vignes sont à d’autres. '
  '6':
  - type: text
    content: 'Je fus très irrité lorsque j’entendis leurs plaintes et ces paroles-là. '
  '7':
  - type: text
    content: 'Je résolus de faire des réprimandes aux grands et aux magistrats, et je leur dis: Quoi! Vous prêtez à intérêt à vos frères! Et je rassemblai autour d’eux une grande foule, '
  '8':
  - type: text
    content: 'et je leur dis: Nous avons racheté selon notre pouvoir nos frères les Juifs vendus aux nations; et vous vendriez vous-mêmes vos frères, et c’est à nous qu’ils seraient vendus! Ils se turent, ne trouvant rien à répondre. '
  '9':
  - type: text
    content: 'Puis je dis: Ce que vous faites n’est pas bien. Ne devriez-vous pas marcher dans la crainte de notre Dieu, pour n’être pas insultés par les nations nos ennemies? '
