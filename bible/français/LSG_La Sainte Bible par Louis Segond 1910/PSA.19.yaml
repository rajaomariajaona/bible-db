document_id: PSA.19,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Ro 1:19, 20. Ps 148.) (Ps 18:29-31; 119. 2 Ti 3:15-17.)
  - type: text
    content: Au chef des chantres. Psaume de David.
  '10':
  - type: text
    content: La crainte de l’Éternel est pure, elle subsiste à toujours;
  - type: text
    content: Les jugements de l’Éternel sont vrais, ils sont tous justes.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ps 119:72, 127. Pr 8:11.
  - type: text
    content: Ils sont plus précieux que l’or, que beaucoup d’or fin;
  - type: note
    content: Ps 119:103.
  - type: text
    content: Ils sont plus doux que le miel, que celui qui coule des rayons.
  '12':
  - type: text
    content: Ton serviteur aussi en reçoit instruction;
  - type: text
    content: Pour qui les observe la récompense est grande.
  '13':
  - type: text
    content: Qui connaît ses égarements?
  - type: text
    content: Pardonne-moi ceux que j’ignore.
  '14':
  - type: text
    content: Préserve aussi ton serviteur des orgueilleux;
  - type: text
    content: Qu’ils ne dominent point sur moi!
  - type: text
    content: Alors je serai intègre, innocent de grands péchés.
  '15':
  - type: text
    content: Reçois favorablement les paroles de ma bouche
  - type: text
    content: Et les sentiments de mon cœur,
  - type: text
    content: O Éternel, mon rocher et mon libérateur!
  '2':
  - type: text
    content: Les cieux racontent la gloire de Dieu,
  - type: text
    content: Et l’étendue manifeste l’œuvre de ses mains.
  '3':
  - type: text
    content: Le jour en instruit un autre jour,
  - type: text
    content: La nuit en donne connaissance à une autre nuit.
  '4':
  - type: text
    content: Ce n’est pas un langage, ce ne sont pas des paroles
  - type: text
    content: 'Dont le son ne soit point entendu:'
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ro 10:18.
  - type: text
    content: Leur retentissement parcourt toute la terre,
  - type: text
    content: Leurs accents vont aux extrémités du monde,
  - type: text
    content: Où il a dressé une tente pour le soleil.
  '6':
  - type: text
    content: Et le soleil, semblable à un époux qui sort de sa chambre,
  - type: text
    content: 'S’élance dans la carrière '
  - type: note
    content: Ec 1:5.
  - type: text
    content: avec la joie d’un héros;
  '7':
  - type: text
    content: Il se lève à une extrémité des cieux,
  - type: text
    content: 'Et achève sa course à l’autre extrémité:'
  - type: text
    content: Rien ne se dérobe à sa chaleur.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 2 S 22:31. Ps 18:31.
  - type: text
    content: La loi de l’Éternel est parfaite, elle restaure l’âme;
  - type: text
    content: Le témoignage de l’Éternel est véritable, il rend sage l’ignorant.
  '9':
  - type: text
    content: Les ordonnances de l’Éternel sont droites, elles réjouissent le cœur;
  - type: text
    content: Les commandements de l’Éternel sont purs, ils éclairent les yeux.
