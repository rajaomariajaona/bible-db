document_id: PSA.19
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: (Ro 1:19, 20. Ps 148.) (Ps 18:29-31; 119. 2 Ti 3:15-17.)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Les cieux racontent la gloire de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’étendue manifeste l’œuvre de ses mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le jour en instruit un autre jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La nuit en donne connaissance à une autre nuit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ce n’est pas un langage, ce ne sont pas des paroles
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dont le son ne soit point entendu:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 10:18
      metadata:
        usfm: ROM.10.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Leur retentissement parcourt toute la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs accents vont aux extrémités du monde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où il a dressé une tente pour le soleil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Et le soleil, semblable à un époux qui sort de sa chambre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'S’élance dans la carrière '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 1:5
      metadata:
        usfm: ECC.1.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: avec la joie d’un héros;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il se lève à une extrémité des cieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et achève sa course à l’autre extrémité:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rien ne se dérobe à sa chaleur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 22:31
      metadata:
        usfm: 2SA.22.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 18:31
      metadata:
        usfm: PSA.18.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La loi de l’Éternel est parfaite, elle restaure l’âme;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le témoignage de l’Éternel est véritable, il rend sage l’ignorant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les ordonnances de l’Éternel sont droites, elles réjouissent le cœur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les commandements de l’Éternel sont purs, ils éclairent les yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: La crainte de l’Éternel est pure, elle subsiste à toujours;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les jugements de l’Éternel sont vrais, ils sont tous justes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 119:72
      metadata:
        usfm: PSA.119.72
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '127'
      metadata:
        usfm: PSA.119.127
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 8:11
      metadata:
        usfm: PRO.8.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils sont plus précieux que l’or, que beaucoup d’or fin;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 119:103
      metadata:
        usfm: PSA.119.103
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils sont plus doux que le miel, que celui qui coule des rayons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ton serviteur aussi en reçoit instruction;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour qui les observe la récompense est grande.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Qui connaît ses égarements?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pardonne-moi ceux que j’ignore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Préserve aussi ton serviteur des orgueilleux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils ne dominent point sur moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors je serai intègre, innocent de grands péchés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Reçois favorablement les paroles de ma bouche
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les sentiments de mon cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Éternel, mon rocher et mon libérateur!
