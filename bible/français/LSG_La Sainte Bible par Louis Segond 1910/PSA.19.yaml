document_id: PSA.19,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Ro 1:19, 20. Ps 148.) (Ps 18:29-31; 119. 2 Ti 3:15-17.)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au chef des chantres. Psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La crainte de l’Éternel est pure, elle subsiste à toujours;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les jugements de l’Éternel sont vrais, ils sont tous justes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 119:72
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '127'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 8:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils sont plus précieux que l’or, que beaucoup d’or fin;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 119:103
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils sont plus doux que le miel, que celui qui coule des rayons.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton serviteur aussi en reçoit instruction;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour qui les observe la récompense est grande.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui connaît ses égarements?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pardonne-moi ceux que j’ignore.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Préserve aussi ton serviteur des orgueilleux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils ne dominent point sur moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors je serai intègre, innocent de grands péchés.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reçois favorablement les paroles de ma bouche
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les sentiments de mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Éternel, mon rocher et mon libérateur!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les cieux racontent la gloire de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’étendue manifeste l’œuvre de ses mains.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jour en instruit un autre jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La nuit en donne connaissance à une autre nuit.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n’est pas un langage, ce ne sont pas des paroles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dont le son ne soit point entendu:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 10:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Leur retentissement parcourt toute la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs accents vont aux extrémités du monde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où il a dressé une tente pour le soleil.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le soleil, semblable à un époux qui sort de sa chambre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'S’élance dans la carrière '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 1:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: avec la joie d’un héros;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se lève à une extrémité des cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et achève sa course à l’autre extrémité:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rien ne se dérobe à sa chaleur.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 22:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 18:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La loi de l’Éternel est parfaite, elle restaure l’âme;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le témoignage de l’Éternel est véritable, il rend sage l’ignorant.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les ordonnances de l’Éternel sont droites, elles réjouissent le cœur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les commandements de l’Éternel sont purs, ils éclairent les yeux.
