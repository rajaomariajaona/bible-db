document_id: HEB.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le Fils, par lequel Dieu s’est révélé, est supérieur aux anges. Son abaissement volontaire a eu pour but le salut des hommes
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-4: cf. (Jn 1:1-3, 14. Col 1:15-17.) Hé 10:12-14. Ph 2:6-11.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir autrefois, à plusieurs reprises et de plusieurs manières, parlé à nos pères par les prophètes, '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Et encore:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 102:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Toi, Seigneur, tu as au commencement fondé la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les cieux sont l’ouvrage de tes mains;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 51:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 3:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils périront, mais tu subsistes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils vieilliront tous comme un vêtement,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu les rouleras comme un manteau et ils seront changés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais toi, tu restes le même,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tes années ne finiront point.
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Et auquel des anges a-t-il jamais dit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 110:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 1:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 10:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Assieds-toi à ma droite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ce que je fasse de tes ennemis ton marchepied?
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ne sont-ils pas tous des esprits au service de Dieu, envoyés pour exercer un ministère en faveur de ceux qui doivent hériter du salut?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu, dans ces derniers temps, nous a parlé par le Fils, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 21:38
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qu’il a établi héritier de toutes choses, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 33:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 3:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'par lequel il a aussi créé le monde, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 4:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 2:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui, étant le reflet de sa gloire et l’empreinte de sa personne, et soutenant toutes choses par sa parole puissante, a fait la purification des péchés et s’est assis à la droite de la majesté divine dans les lieux très hauts, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'devenu d’autant supérieur aux anges qu’il a hérité d’un nom '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 2:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: plus excellent que le leur.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-14: cf. És 9:5. Ps 2:6-12; 45:7, 8; 110:1; 102:25-28; 103:20, 21.'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car auquel des anges Dieu a-t-il jamais dit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 2:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 5:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tu es mon Fils,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’ai engendré aujourd’hui?
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Et encore:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 7:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 22:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je serai pour lui un père, et il sera pour moi un fils?
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Et lorsqu’il introduit de nouveau dans le monde le premier-né, il dit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 97:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que tous les anges de Dieu l’adorent!
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'De plus, il dit des anges:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 104:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Celui qui fait de ses anges des vents,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de ses serviteurs une flamme de feu.
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Mais il a dit au Fils:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 45:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ton trône, ô Dieu, est éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sceptre de ton règne est un sceptre d’équité;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as aimé la justice, et tu as haï l’iniquité;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est pourquoi, ô Dieu, ton Dieu t’a oint
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d’une huile de joie au-dessus de tes égaux.
