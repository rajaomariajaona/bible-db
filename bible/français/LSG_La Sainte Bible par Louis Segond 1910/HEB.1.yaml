document_id: HEB.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Fils, par lequel Dieu s’est révélé, est supérieur aux anges. Son abaissement volontaire a eu pour but le salut des hommes
  - type: heading
    content: 'V. 1-4: cf. (Jn 1:1-3, 14. Col 1:15-17.) Hé 10:12-14. Ph 2:6-11.'
  - type: text
    content: 'Après avoir autrefois, à plusieurs reprises et de plusieurs manières, parlé à nos pères par les prophètes, '
  '10':
  - type: text
    content: 'Et encore:'
  - type: note
    content: Ps 102:26.
  - type: text
    content: Toi, Seigneur, tu as au commencement fondé la terre,
  - type: text
    content: Et les cieux sont l’ouvrage de tes mains;
  '11':
  - type: text
    content: ' '
  - type: note
    content: És 51:6. 2 Pi 3:7, 10.
  - type: text
    content: Ils périront, mais tu subsistes;
  - type: text
    content: Ils vieilliront tous comme un vêtement,
  '12':
  - type: text
    content: Tu les rouleras comme un manteau et ils seront changés;
  - type: text
    content: Mais toi, tu restes le même,
  - type: text
    content: Et tes années ne finiront point.
  '13':
  - type: text
    content: 'Et auquel des anges a-t-il jamais dit:'
  - type: note
    content: Ps 110:1. Ac 2:34. 1 Co 15:25. Ép 1:20. Hé 10:12.
  - type: text
    content: Assieds-toi à ma droite,
  - type: text
    content: Jusqu’à ce que je fasse de tes ennemis ton marchepied?
  '14':
  - type: text
    content: Ne sont-ils pas tous des esprits au service de Dieu, envoyés pour exercer un ministère en faveur de ceux qui doivent hériter du salut?
  '2':
  - type: text
    content: 'Dieu, dans ces derniers temps, nous a parlé par le Fils, '
  - type: note
    content: Mt 21:38.
  - type: text
    content: 'qu’il a établi héritier de toutes choses, '
  - type: note
    content: Ge 1:3. Ps 33:6. Jn 1:3. Ép 3:9. Col 1:16.
  - type: text
    content: 'par lequel il a aussi créé le monde, '
  '3':
  - type: text
    content: 'et '
  - type: note
    content: 2 Co 4:4. Ph 2:6. Col 1:15.
  - type: text
    content: 'qui, étant le reflet de sa gloire et l’empreinte de sa personne, et soutenant toutes choses par sa parole puissante, a fait la purification des péchés et s’est assis à la droite de la majesté divine dans les lieux très hauts, '
  '4':
  - type: text
    content: 'devenu d’autant supérieur aux anges qu’il a hérité d’un nom '
  - type: note
    content: Ph 2:9.
  - type: text
    content: plus excellent que le leur.
  - type: heading
    content: 'V. 5-14: cf. És 9:5. Ps 2:6-12; 45:7, 8; 110:1; 102:25-28; 103:20, 21.'
  '5':
  - type: text
    content: 'Car auquel des anges Dieu a-t-il jamais dit:'
  - type: note
    content: Ps 2:7. Ac 13:33. Hé 5:5.
  - type: text
    content: Tu es mon Fils,
  - type: text
    content: Je t’ai engendré aujourd’hui?
  - type: text
    content: 'Et encore:'
  - type: note
    content: 2 S 7:14. 1 Ch 22:10.
  - type: text
    content: Je serai pour lui un père, et il sera pour moi un fils?
  '6':
  - type: text
    content: 'Et lorsqu’il introduit de nouveau dans le monde le premier-né, il dit:'
  - type: note
    content: Ps 97:7.
  - type: text
    content: Que tous les anges de Dieu l’adorent!
  '7':
  - type: text
    content: 'De plus, il dit des anges:'
  - type: note
    content: Ps 104:4.
  - type: text
    content: Celui qui fait de ses anges des vents,
  - type: text
    content: Et de ses serviteurs une flamme de feu.
  '8':
  - type: text
    content: 'Mais il a dit au Fils:'
  - type: note
    content: Ps 45:7.
  - type: text
    content: Ton trône, ô Dieu, est éternel;
  - type: text
    content: Le sceptre de ton règne est un sceptre d’équité;
  '9':
  - type: text
    content: Tu as aimé la justice, et tu as haï l’iniquité;
  - type: text
    content: c’est pourquoi, ô Dieu, ton Dieu t’a oint
  - type: text
    content: d’une huile de joie au-dessus de tes égaux.
