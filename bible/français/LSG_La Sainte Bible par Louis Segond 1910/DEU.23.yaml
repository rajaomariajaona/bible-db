document_id: DEU.23,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les personnes qui devaient être exclues de l’assemblée
  - type: heading
    content: 'V. 1-8: cf. Lé 21:17-23. Né 13:1-9. (Ap 7:4; 14:3.)'
  - type: text
    content: 'Celui dont les testicules ont été écrasés ou l’urètre coupé n’entrera point dans l’assemblée de l’Éternel. '
  '10':
  - type: text
    content: 'S’il y a chez toi un homme qui ne soit pas pur, par suite d’un accident nocturne, il sortira du camp, et n’entrera point dans le camp; '
  '11':
  - type: text
    content: 'sur le soir il se lavera dans l’eau, et après le coucher du soleil il pourra rentrer au camp. '
  '12':
  - type: text
    content: 'Tu auras un lieu hors du camp, et c’est là dehors que tu iras. '
  '13':
  - type: text
    content: 'Tu auras parmi ton bagage un instrument, dont tu te serviras pour faire un creux et recouvrir tes excréments, quand tu voudras aller dehors. '
  '14':
  - type: text
    content: Car l’Éternel, ton Dieu, marche au milieu de ton camp pour te protéger et pour livrer tes ennemis devant toi; ton camp devra donc être saint, afin que l’Éternel ne voie chez toi rien d’impur, et qu’il ne se détourne point de toi.
  - type: heading
    content: Les esclaves fugitifs. Les dons provenant de l’impureté
  - type: heading
    content: 'V. 15-18: cf. (Lé 19:29; 18:24-30.)'
  '15':
  - type: text
    content: 'Tu ne livreras point à son maître un esclave qui se réfugiera chez toi, après l’avoir quitté. '
  '16':
  - type: text
    content: 'Il demeurera chez toi, au milieu de toi, dans le lieu qu’il choisira, dans l’une de tes villes, où bon lui semblera: tu ne l’opprimeras point. '
  '17':
  - type: text
    content: 'Il n’y aura aucune prostituée parmi les filles d’Israël, et il n’y aura aucun prostitué parmi les fils d’Israël. '
  '18':
  - type: text
    content: Tu n’apporteras point dans la maison de l’Éternel, ton Dieu, le salaire d’une prostituée ni le prix d’un chien, pour l’accomplissement d’un vœu quelconque; car l’un et l’autre sont en abomination à l’Éternel, ton Dieu.
  - type: heading
    content: Les prêts à intérêt
  - type: heading
    content: 'V. 19-20: cf. Lé 25:35-38. (Jn 13:34-35.)'
  '19':
  - type: text
    content: 'Tu n’exigeras de ton frère aucun '
  - type: note
    content: Ex 22:25. Lé 25:36. Né 5:2, etc. Lu 6:34, 35.
  - type: text
    content: 'intérêt ni pour argent, ni pour vivres, ni pour rien de ce qui se prête à intérêt. '
  '2':
  - type: text
    content: 'Celui qui est issu d’une union illicite n’entrera point dans l’assemblée de l’Éternel; même sa dixième génération n’entrera point dans l’assemblée de l’Éternel. '
  '20':
  - type: text
    content: Tu pourras tirer un intérêt de l’étranger, mais tu n’en tireras point de ton frère, afin que l’Éternel, ton Dieu, te bénisse dans tout ce que tu entreprendras au pays dont tu vas entrer en possession.
  - type: heading
    content: Les vœux. Les raisins et les épis
  - type: heading
    content: 'V. 21-25: cf. (Ec 5:3-5. No 30:2-17.)'
  '21':
  - type: text
    content: 'Si tu fais '
  - type: note
    content: No 30:2.
  - type: text
    content: 'un vœu à l’Éternel, ton Dieu, tu ne tarderas point à l’accomplir: car l’Éternel, ton Dieu, t’en demanderait compte, et tu te chargerais d’un péché. '
  '22':
  - type: text
    content: 'Si tu t’abstiens de faire un vœu, tu ne commettras pas un péché. '
  '23':
  - type: text
    content: 'Mais tu observeras et tu accompliras ce qui sortira de tes lèvres, par conséquent les vœux que tu feras volontairement à l’Éternel, ton Dieu, et que ta bouche aura prononcés. '
  '24':
  - type: text
    content: 'Si tu entres dans la vigne de ton prochain, tu pourras à ton gré manger des raisins et t’en rassasier; mais tu n’en mettras point dans ton vase. '
  '25':
  - type: text
    content: 'Si tu entres dans '
  - type: note
    content: Mt 12:1.
  - type: text
    content: les blés de ton prochain, tu pourras cueillir des épis avec la main, mais tu n’agiteras point la faucille sur les blés de ton prochain.
  '3':
  - type: note
    content: Né 13:1.
  - type: text
    content: 'L’Ammonite et le Moabite n’entreront point dans l’assemblée de l’Éternel, même à la dixième génération et à perpétuité, '
  '4':
  - type: text
    content: 'parce qu’ils ne sont pas venus au-devant de vous avec du pain et de l’eau, sur le chemin, lors de votre sortie d’Égypte, et parce qu’ils ont fait venir contre toi à prix d’argent '
  - type: note
    content: No 22:3, 4, 5, etc.
  - type: text
    content: 'Balaam, fils de Beor, de Pethor en Mésopotamie, pour qu’il te maudisse. '
  '5':
  - type: text
    content: 'Mais l’Éternel, ton Dieu, n’a point voulu écouter Balaam; et l’Éternel, ton Dieu, a changé pour toi la malédiction en bénédiction, parce que tu es aimé de l’Éternel, ton Dieu. '
  '6':
  - type: text
    content: 'Tu n’auras souci ni de leur prospérité ni de leur bien-être, tant que tu vivras, à perpétuité. '
  '7':
  - type: text
    content: 'Tu n’auras point en abomination l’Édomite, car il est ton frère; tu n’auras point en abomination l’Égyptien, car tu as été étranger dans son pays: '
  '8':
  - type: text
    content: les fils qui leur naîtront à la troisième génération entreront dans l’assemblée de l’Éternel.
  - type: heading
    content: La pureté dans les camps
  - type: heading
    content: 'V. 9-14: cf. (No 5:1-4. Lé 11:44, 45.)'
  '9':
  - type: text
    content: 'Lorsque tu camperas contre tes ennemis, garde-toi de toute chose mauvaise. '
