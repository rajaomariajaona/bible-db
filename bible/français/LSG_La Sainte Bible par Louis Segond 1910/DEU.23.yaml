document_id: DEU.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les personnes qui devaient être exclues de l’assemblée
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. Lé 21:17-23. Né 13:1-9. (Ap 7:4; 14:3.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Celui dont les testicules ont été écrasés ou l’urètre coupé n’entrera point dans l’assemblée de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Celui qui est issu d’une union illicite n’entrera point dans l’assemblée de l’Éternel; même sa dixième génération n’entrera point dans l’assemblée de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Né 13:1
      metadata:
        usfm: NEH.13.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’Ammonite et le Moabite n’entreront point dans l’assemblée de l’Éternel, même à la dixième génération et à perpétuité, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'parce qu’ils ne sont pas venus au-devant de vous avec du pain et de l’eau, sur le chemin, lors de votre sortie d’Égypte, et parce qu’ils ont fait venir contre toi à prix d’argent '
  - type: usfm
    marker: x
    children:
    - type: text
      text: No 22:3, 4, 5, etc.
    marker-yv: yv-n
  - type: text
    text: 'Balaam, fils de Beor, de Pethor en Mésopotamie, pour qu’il te maudisse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais l’Éternel, ton Dieu, n’a point voulu écouter Balaam; et l’Éternel, ton Dieu, a changé pour toi la malédiction en bénédiction, parce que tu es aimé de l’Éternel, ton Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu n’auras souci ni de leur prospérité ni de leur bien-être, tant que tu vivras, à perpétuité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tu n’auras point en abomination l’Édomite, car il est ton frère; tu n’auras point en abomination l’Égyptien, car tu as été étranger dans son pays: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: les fils qui leur naîtront à la troisième génération entreront dans l’assemblée de l’Éternel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La pureté dans les camps
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-14: cf. (No 5:1-4. Lé 11:44, 45.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lorsque tu camperas contre tes ennemis, garde-toi de toute chose mauvaise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'S’il y a chez toi un homme qui ne soit pas pur, par suite d’un accident nocturne, il sortira du camp, et n’entrera point dans le camp; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'sur le soir il se lavera dans l’eau, et après le coucher du soleil il pourra rentrer au camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tu auras un lieu hors du camp, et c’est là dehors que tu iras. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu auras parmi ton bagage un instrument, dont tu te serviras pour faire un creux et recouvrir tes excréments, quand tu voudras aller dehors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Car l’Éternel, ton Dieu, marche au milieu de ton camp pour te protéger et pour livrer tes ennemis devant toi; ton camp devra donc être saint, afin que l’Éternel ne voie chez toi rien d’impur, et qu’il ne se détourne point de toi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les esclaves fugitifs. Les dons provenant de l’impureté
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-18: cf. (Lé 19:29; 18:24-30.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu ne livreras point à son maître un esclave qui se réfugiera chez toi, après l’avoir quitté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il demeurera chez toi, au milieu de toi, dans le lieu qu’il choisira, dans l’une de tes villes, où bon lui semblera: tu ne l’opprimeras point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il n’y aura aucune prostituée parmi les filles d’Israël, et il n’y aura aucun prostitué parmi les fils d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tu n’apporteras point dans la maison de l’Éternel, ton Dieu, le salaire d’une prostituée ni le prix d’un chien, pour l’accomplissement d’un vœu quelconque; car l’un et l’autre sont en abomination à l’Éternel, ton Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les prêts à intérêt
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 19-20: cf. Lé 25:35-38. (Jn 13:34-35.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu n’exigeras de ton frère aucun '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 22:25
      metadata:
        usfm: EXO.22.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 25:36
      metadata:
        usfm: LEV.25.36
    - type: text
      text: '. Né 5:2, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 6:34
      metadata:
        usfm: LUK.6.34
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '35'
      metadata:
        usfm: LUK.6.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'intérêt ni pour argent, ni pour vivres, ni pour rien de ce qui se prête à intérêt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu pourras tirer un intérêt de l’étranger, mais tu n’en tireras point de ton frère, afin que l’Éternel, ton Dieu, te bénisse dans tout ce que tu entreprendras au pays dont tu vas entrer en possession.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les vœux. Les raisins et les épis
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-25: cf. (Ec 5:3-5. No 30:2-17.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Si tu fais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 30:2
      metadata:
        usfm: NUM.30.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un vœu à l’Éternel, ton Dieu, tu ne tarderas point à l’accomplir: car l’Éternel, ton Dieu, t’en demanderait compte, et tu te chargerais d’un péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Si tu t’abstiens de faire un vœu, tu ne commettras pas un péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais tu observeras et tu accompliras ce qui sortira de tes lèvres, par conséquent les vœux que tu feras volontairement à l’Éternel, ton Dieu, et que ta bouche aura prononcés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Si tu entres dans la vigne de ton prochain, tu pourras à ton gré manger des raisins et t’en rassasier; mais tu n’en mettras point dans ton vase. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Si tu entres dans '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:1
      metadata:
        usfm: MAT.12.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: les blés de ton prochain, tu pourras cueillir des épis avec la main, mais tu n’agiteras point la faucille sur les blés de ton prochain.
