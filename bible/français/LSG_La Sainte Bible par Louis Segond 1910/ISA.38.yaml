document_id: ISA.38,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Maladie et guérison d’Ézéchias
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. 2 R 20:1-11. 2 Ch 32:24. 1 S 2:6. Job 5:18.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce temps-là, Ézéchias fut malade à la mort. Le prophète Ésaïe, fils d’Amots, vint auprès de lui, et lui dit: Ainsi parle l’Éternel: Donne tes ordres à ta maison, car tu vas mourir, et tu ne vivras plus. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je disais: Quand mes jours sont en repos, je dois m’en aller'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux portes du séjour des morts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis privé du reste de mes années!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je disais: Je ne verrai plus l’Éternel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel, sur la terre des vivants;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne verrai plus aucun homme
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parmi les habitants du monde!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma demeure est enlevée et transportée loin de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme une tente de berger;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je sens le fil de ma vie coupé comme par un tisserand
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui me retrancherait de sa trame.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du jour à la nuit tu m’auras achevé!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me suis contenu jusqu’au matin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un lion, il brisait tous mes os,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du jour à la nuit tu m’auras achevé!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je poussais des cris comme une hirondelle en voltigeant,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 59:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je gémissais comme la colombe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mes yeux s’élevaient languissants vers le ciel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Éternel! Je suis dans l’angoisse, secours-moi!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que dirai-je? Il m’a répondu, et il m’a exaucé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je marcherai humblement jusqu’au terme de mes années,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Après avoir été ainsi affligé.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur, c’est par tes bontés qu’on jouit de la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est par elles que je respire encore;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu me rétablis, tu me rends à la vie.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, mes souffrances mêmes sont devenues mon salut;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as pris plaisir à retirer mon âme de la fosse du néant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu as jeté derrière toi tous mes péchés.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n’est pas le séjour des morts qui te loue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n’est pas la mort qui te célèbre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui sont descendus dans la fosse n’espèrent plus en ta fidélité.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le vivant, le vivant, c’est celui-là qui te loue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme moi aujourd’hui;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le père fait connaître à ses enfants ta fidélité.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ézéchias tourna son visage contre le mur, et fit cette prière à l’Éternel: '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel m’a sauvé!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous ferons résonner les cordes de nos instruments,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les jours de notre vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans la maison de l’Éternel.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ésaïe avait dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 20:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Qu’on apporte une masse de figues, et qu’on les étende sur l’ulcère; et Ézéchias vivra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Ézéchias avait dit: A quel signe connaîtrai-je que je monterai à la maison de l’Éternel?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O Éternel! Souviens-toi que j’ai marché devant ta face avec fidélité et intégrité de cœur, et que j’ai fait ce qui est bien à tes yeux! Et Ézéchias répandit d’abondantes larmes. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis la parole de l’Éternel fut adressée à Ésaïe, en ces mots: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Va, et dis à Ézéchias: Ainsi parle l’Éternel, le Dieu de David, ton père: J’ai entendu ta prière, j’ai vu tes larmes. Voici, j’ajouterai à tes jours quinze années. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je te délivrerai, toi et cette ville, de la main du roi d’Assyrie; je protégerai cette ville. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici, de la part de l’Éternel, le signe auquel tu connaîtras que l’Éternel accomplira la parole qu’il a prononcée. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je ferai reculer de dix degrés en arrière avec le soleil l’ombre des degrés qui est descendue sur les degrés d’Achaz. Et le soleil recula de dix degrés sur les degrés où il était descendu.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-22: cf. Jon 2:2-10. Ps 30:2, etc.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cantique d’Ézéchias, roi de Juda, sur sa maladie et sur son rétablissement.
