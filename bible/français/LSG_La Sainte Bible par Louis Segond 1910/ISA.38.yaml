document_id: ISA.38,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Maladie et guérison d’Ézéchias
  - type: heading
    content: 'V. 1-8: cf. 2 R 20:1-11. 2 Ch 32:24. 1 S 2:6. Job 5:18.'
  - type: text
    content: 'En ce temps-là, Ézéchias fut malade à la mort. Le prophète Ésaïe, fils d’Amots, vint auprès de lui, et lui dit: Ainsi parle l’Éternel: Donne tes ordres à ta maison, car tu vas mourir, et tu ne vivras plus. '
  '10':
  - type: text
    content: 'Je disais: Quand mes jours sont en repos, je dois m’en aller'
  - type: text
    content: Aux portes du séjour des morts.
  - type: text
    content: Je suis privé du reste de mes années!
  '11':
  - type: text
    content: 'Je disais: Je ne verrai plus l’Éternel,'
  - type: text
    content: L’Éternel, sur la terre des vivants;
  - type: text
    content: Je ne verrai plus aucun homme
  - type: text
    content: Parmi les habitants du monde!
  '12':
  - type: text
    content: Ma demeure est enlevée et transportée loin de moi,
  - type: text
    content: Comme une tente de berger;
  - type: text
    content: Je sens le fil de ma vie coupé comme par un tisserand
  - type: text
    content: Qui me retrancherait de sa trame.
  - type: text
    content: Du jour à la nuit tu m’auras achevé!
  '13':
  - type: text
    content: Je me suis contenu jusqu’au matin;
  - type: text
    content: Comme un lion, il brisait tous mes os,
  - type: text
    content: Du jour à la nuit tu m’auras achevé!
  '14':
  - type: text
    content: Je poussais des cris comme une hirondelle en voltigeant,
  - type: note
    content: És 59:11.
  - type: text
    content: Je gémissais comme la colombe;
  - type: text
    content: 'Mes yeux s’élevaient languissants vers le ciel:'
  - type: text
    content: O Éternel! Je suis dans l’angoisse, secours-moi!
  '15':
  - type: text
    content: Que dirai-je? Il m’a répondu, et il m’a exaucé.
  - type: text
    content: Je marcherai humblement jusqu’au terme de mes années,
  - type: text
    content: Après avoir été ainsi affligé.
  '16':
  - type: text
    content: Seigneur, c’est par tes bontés qu’on jouit de la vie,
  - type: text
    content: C’est par elles que je respire encore;
  - type: text
    content: Tu me rétablis, tu me rends à la vie.
  '17':
  - type: text
    content: Voici, mes souffrances mêmes sont devenues mon salut;
  - type: text
    content: Tu as pris plaisir à retirer mon âme de la fosse du néant,
  - type: text
    content: Car tu as jeté derrière toi tous mes péchés.
  '18':
  - type: text
    content: Ce n’est pas le séjour des morts qui te loue,
  - type: text
    content: Ce n’est pas la mort qui te célèbre;
  - type: text
    content: Ceux qui sont descendus dans la fosse n’espèrent plus en ta fidélité.
  '19':
  - type: text
    content: Le vivant, le vivant, c’est celui-là qui te loue,
  - type: text
    content: Comme moi aujourd’hui;
  - type: text
    content: Le père fait connaître à ses enfants ta fidélité.
  '2':
  - type: text
    content: 'Ézéchias tourna son visage contre le mur, et fit cette prière à l’Éternel: '
  '20':
  - type: text
    content: L’Éternel m’a sauvé!
  - type: text
    content: Nous ferons résonner les cordes de nos instruments,
  - type: text
    content: Tous les jours de notre vie,
  - type: text
    content: Dans la maison de l’Éternel.
  '21':
  - type: text
    content: 'Ésaïe avait dit: '
  - type: note
    content: 2 R 20:7.
  - type: text
    content: 'Qu’on apporte une masse de figues, et qu’on les étende sur l’ulcère; et Ézéchias vivra. '
  '22':
  - type: text
    content: 'Et Ézéchias avait dit: A quel signe connaîtrai-je que je monterai à la maison de l’Éternel?'
  '3':
  - type: text
    content: 'O Éternel! Souviens-toi que j’ai marché devant ta face avec fidélité et intégrité de cœur, et que j’ai fait ce qui est bien à tes yeux! Et Ézéchias répandit d’abondantes larmes. '
  '4':
  - type: text
    content: 'Puis la parole de l’Éternel fut adressée à Ésaïe, en ces mots: '
  '5':
  - type: text
    content: 'Va, et dis à Ézéchias: Ainsi parle l’Éternel, le Dieu de David, ton père: J’ai entendu ta prière, j’ai vu tes larmes. Voici, j’ajouterai à tes jours quinze années. '
  '6':
  - type: text
    content: 'Je te délivrerai, toi et cette ville, de la main du roi d’Assyrie; je protégerai cette ville. '
  '7':
  - type: text
    content: 'Et voici, de la part de l’Éternel, le signe auquel tu connaîtras que l’Éternel accomplira la parole qu’il a prononcée. '
  '8':
  - type: text
    content: Je ferai reculer de dix degrés en arrière avec le soleil l’ombre des degrés qui est descendue sur les degrés d’Achaz. Et le soleil recula de dix degrés sur les degrés où il était descendu.
  - type: heading
    content: 'V. 9-22: cf. Jon 2:2-10. Ps 30:2, etc.'
  '9':
  - type: text
    content: Cantique d’Ézéchias, roi de Juda, sur sa maladie et sur son rétablissement.
