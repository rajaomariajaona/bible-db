type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION AU LIVRE DE JOSUÉ
  - type: text
    content: Ps 111:6. (1 Ti 6:12. Hé 4:1-11.)
  - type: text
    content: Ce livre de la Bible a pour titre le nom d’une personne. Il s’agit du successeur de Moïse. Ce dernier changea son nom Osée ou Hoshéa (il sauve, il donne la victoire ou il libère) en Josué ou Yehoshoua (le Seigneur est le sauveur ou celui qui donne la victoire, le libérateur). Tout un programme! Le livre raconte en détail la conquête du pays de Canaan et l’installation des tribus israélites au prix de guerres et de violences multiples.
  - type: text
    content: Les chapitres 1 à 12 relatent la traversée du Jourdain et la conquête de Canaan. Josué est, en quelque sorte, un général d’armée de l’Éternel, placé à la tête du peuple (1). Après le rapport des deux espions (2), les Israélites traversent miraculeusement le fleuve Jourdain (3–4). Les signes de l’alliance, à savoir la circoncision et la Pâque, sont remémorés dans les plaines de Jéricho (5). Après une défaite inaugurale (6–7), la conquête commence avec toutes les armes de l’époque, y compris la ruse, telle que celle des Gabaonites (9). Ce qu’il faudra faire de tous les pays vaincus est ensuite précisé (8–12).
  - type: text
    content: Les chapitres 13 à 22 fournissent des détails sur le partage de Canaan. Ce partage tient compte de chacune des douze tribus d’Israël (13–19), des dix villes de refuge (20) et des quarante-huit villes des Lévites (21:1-45).
  - type: text
    content: 'Les chapitres 22 à 24 relatent les derniers événements et les ultimes avertissements de Josué. Un autel-témoin des Rubénites symbolise l’unité des tribus de part et d’autre du fleuve (22). Il y a aussi une sorte de testament de Josué (23) appuyé par son engagement personnel: «'
  - type: text
    content: Moi et ma maison, nous servirons l’Éternel.»
  - type: text
    content: ' Le livre se termine par l’alliance, le pacte ou la dernière assemblée à Sichem (24), des souvenirs nationaux, des promesses du peuple de servir exclusivement l’Éternel, et surtout des exhortations finales de Josué, fils de Nun, serviteur de l’Éternel. Seule l’infidélité du peuple peut le déposséder de temps à autre de ce don divin.'
  - type: text
    content: Josué rappelle la fidélité de l’Éternel à ses promesses conditionnelles. Son peuple doit y répondre par un engagement solennel et une obéissance sans faille de peur de retomber dans de nouvelles infidélités.
