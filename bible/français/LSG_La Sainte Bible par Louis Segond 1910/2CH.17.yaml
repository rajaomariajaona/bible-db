document_id: 2CH.17,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Josaphat, roi de Juda. Piété et prospérité
  - type: heading
    content: 'V. 1-9: cf. 1 R 22:41-47. 2 Ch 14:1-7. Ps 92:13, etc. Jn 1:48.'
  - type: text
    content: ' '
  - type: note
    content: 1 R 15:24.
  - type: text
    content: 'Josaphat, son fils, régna à sa place. '
  '10':
  - type: text
    content: 'La terreur de l’Éternel s’empara de tous les royaumes des pays qui environnaient Juda, et ils ne firent point la guerre à Josaphat. '
  '11':
  - type: text
    content: 'Des Philistins apportèrent à Josaphat des présents et un tribut en argent; et les Arabes lui amenèrent aussi du bétail, sept mille sept cents béliers et sept mille sept cents boucs. '
  '12':
  - type: text
    content: 'Josaphat s’élevait au plus haut degré de grandeur. Il bâtit en Juda des châteaux et des villes pour servir de magasins. '
  '13':
  - type: text
    content: 'Il fit exécuter beaucoup de travaux dans les villes de Juda, et il avait à Jérusalem de vaillants hommes pour soldats. '
  '14':
  - type: text
    content: 'Voici leur dénombrement, selon les maisons de leurs pères. De Juda, chefs de milliers: Adna, le chef, avec trois cent mille vaillants hommes; '
  '15':
  - type: text
    content: 'et à ses côtés, Jochanan, le chef, avec deux cent quatre-vingt mille hommes; '
  '16':
  - type: text
    content: 'et à ses côtés, Amasia, fils de Zicri, qui s’était volontairement consacré à l’Éternel, avec deux cent mille vaillants hommes. '
  '17':
  - type: text
    content: 'De Benjamin: Éliada, vaillant homme, avec deux cent mille hommes armés de l’arc et du bouclier, '
  '18':
  - type: text
    content: 'et à ses côtés, Zozabad, avec cent quatre-vingt mille hommes armés pour la guerre. '
  '19':
  - type: text
    content: Tels sont ceux qui étaient au service du roi, outre ceux que le roi avait placés dans toutes les villes fortes de Juda.
  '2':
  - type: text
    content: 'Il se fortifia contre Israël: il mit des troupes dans toutes les villes fortes de Juda, et des garnisons dans le pays de Juda et '
  - type: note
    content: 2 Ch 15:8.
  - type: text
    content: 'dans les villes d’Éphraïm dont Asa, son père, s’était emparé. '
  '3':
  - type: text
    content: 'L’Éternel fut avec Josaphat, parce qu’il marcha dans les premières voies de David, son père, et qu’il ne rechercha point les Baals; '
  '4':
  - type: text
    content: 'car il eut recours au Dieu de son père, et il suivit ses commandements, sans imiter ce que faisait Israël. '
  '5':
  - type: text
    content: 'L’Éternel affermit la royauté entre les mains de Josaphat, à qui tout Juda apportait des présents, et qui eut en abondance des richesses et de la gloire. '
  '6':
  - type: text
    content: 'Son cœur grandit dans les voies de l’Éternel, et il fit encore disparaître de Juda les hauts lieux et les idoles. '
  '7':
  - type: text
    content: 'La troisième année de son règne, il chargea ses chefs Ben-Haïl, Abdias, Zacharie, Nethaneel et Michée, d’aller enseigner dans les villes de Juda. '
  '8':
  - type: text
    content: 'Il envoya avec eux les Lévites Schemaeja, Nethania, Zebadia, Asaël, Schemiramoth, Jonathan, Adonija, Tobija et Tob-Adonija, Lévites, et les sacrificateurs Élischama et Joram. '
  '9':
  - type: text
    content: 'Ils enseignèrent dans Juda, ayant avec eux le livre de la loi de l’Éternel. Ils parcoururent toutes les villes de Juda, et ils enseignèrent parmi le peuple. '
