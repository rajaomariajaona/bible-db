document_id: PSA.105,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 1 Ch 16:8-22. (Ac 7:2-38. Né 9:7-25.) Ps 78; 103:2. De 8:2.
  - type: text
    content: Louez l’Éternel, invoquez son nom!
  - type: text
    content: Faites connaître parmi les peuples ses hauts faits!
  '10':
  - type: text
    content: ' '
  - type: note
    content: 1 Ch 16:17.
  - type: text
    content: Il l’a érigée pour Jacob en loi,
  - type: note
    content: Ge 28:13; 35:11.
  - type: text
    content: Pour Israël en alliance éternelle,
  '11':
  - type: text
    content: 'Disant: '
  - type: note
    content: Ge 13:15; 15:18.
  - type: text
    content: Je te donnerai le pays de Canaan
  - type: text
    content: Comme héritage qui vous est échu.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 1 Ch 16:19.
  - type: text
    content: Ils étaient alors peu nombreux,
  - type: text
    content: Très peu nombreux, et étrangers dans le pays,
  '13':
  - type: text
    content: Et ils allaient d’une nation à l’autre
  - type: text
    content: Et d’un royaume vers un autre peuple;
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ge 35:5.
  - type: text
    content: Mais il ne permit à personne de les opprimer,
  - type: text
    content: 'Et il châtia des rois à cause d’eux:'
  '15':
  - type: text
    content: Ne touchez pas à mes oints,
  - type: text
    content: Et ne faites pas de mal à mes prophètes!
  '16':
  - type: text
    content: Il appela sur le pays la famine,
  - type: text
    content: Il coupa tout moyen de subsistance.
  '17':
  - type: text
    content: 'Il envoya devant eux un homme:'
  - type: note
    content: Ge 37:28, 36; 45:5.
  - type: text
    content: Joseph fut vendu comme esclave.
  '18':
  - type: text
    content: On serra ses pieds dans des liens,
  - type: text
    content: On le mit aux fers,
  '19':
  - type: text
    content: Jusqu’au temps où arriva ce qu’il avait annoncé,
  - type: text
    content: Et où la parole de l’Éternel l’éprouva.
  '2':
  - type: text
    content: Chantez, chantez en son honneur!
  - type: text
    content: Parlez de toutes ses merveilles!
  '20':
  - type: text
    content: Le roi fit ôter ses liens,
  - type: text
    content: Le dominateur des peuples le délivra.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ge 41:40.
  - type: text
    content: Il l’établit seigneur sur sa maison,
  - type: text
    content: Et gouverneur de tous ses biens,
  '22':
  - type: text
    content: Afin qu’il pût à son gré enchaîner ses princes,
  - type: text
    content: Et qu’il enseignât la sagesse à ses anciens.
  '23':
  - type: text
    content: Alors Israël vint en Égypte,
  - type: text
    content: Et Jacob séjourna dans le pays de Cham.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Ex 1:7, 9.
  - type: text
    content: Il rendit son peuple très fécond,
  - type: text
    content: Et plus puissant que ses adversaires.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Ex 1:9, 10, 12.
  - type: text
    content: Il changea leur cœur, au point qu’ils haïrent son peuple
  - type: text
    content: Et qu’ils traitèrent ses serviteurs avec perfidie.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Ex 3:10; 4:12.
  - type: text
    content: Il envoya Moïse, son serviteur,
  - type: text
    content: Et Aaron, qu’il avait choisi.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Ex 7:9.
  - type: text
    content: Ils accomplirent par son pouvoir des prodiges au milieu d’eux,
  - type: text
    content: Ils firent des miracles dans le pays de Cham.
  '28':
  - type: text
    content: Il envoya des ténèbres et amena l’obscurité,
  - type: text
    content: Et ils ne furent pas rebelles à sa parole.
  '29':
  - type: text
    content: Il changea leurs eaux en sang,
  - type: text
    content: Et fit périr leurs poissons.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps 34:3.
  - type: text
    content: Glorifiez-vous de son saint nom!
  - type: text
    content: Que le cœur de ceux qui cherchent l’Éternel se réjouisse!
  '30':
  - type: text
    content: Le pays fourmilla de grenouilles,
  - type: text
    content: Jusque dans les chambres de leurs rois.
  '31':
  - type: text
    content: Il dit, et parurent les mouches venimeuses,
  - type: text
    content: Les poux sur tout leur territoire.
  '32':
  - type: text
    content: Il leur donna pour pluie de la grêle,
  - type: text
    content: Des flammes de feu dans leur pays.
  '33':
  - type: text
    content: Il frappa leurs vignes et leurs figuiers,
  - type: text
    content: Et brisa les arbres de leur contrée.
  '34':
  - type: text
    content: Il dit, et parurent les sauterelles,
  - type: text
    content: Des sauterelles sans nombre,
  '35':
  - type: text
    content: Qui dévorèrent toute l’herbe du pays,
  - type: text
    content: Qui dévorèrent les fruits de leurs champs.
  '36':
  - type: text
    content: Il frappa tous les premiers-nés dans leur pays,
  - type: text
    content: Toutes les prémices de leur force.
  '37':
  - type: text
    content: Il fit sortir son peuple avec de l’argent et de l’or,
  - type: text
    content: Et nul ne chancela parmi ses tribus.
  '38':
  - type: text
    content: ' '
  - type: note
    content: Ex 12:33.
  - type: text
    content: Les Égyptiens se réjouirent de leur départ,
  - type: text
    content: Car la terreur qu’ils avaient d’eux les saisissait.
  '39':
  - type: text
    content: Il étendit la nuée pour les couvrir,
  - type: text
    content: Et le feu pour éclairer la nuit.
  '4':
  - type: text
    content: Ayez recours à l’Éternel et à son appui,
  - type: text
    content: Cherchez continuellement sa face!
  '40':
  - type: text
    content: A leur demande, il fit venir des cailles,
  - type: text
    content: Et il les rassasia du pain du ciel.
  '41':
  - type: text
    content: Il ouvrit le rocher, et des eaux coulèrent;
  - type: text
    content: Elles se répandirent comme un fleuve dans les lieux arides.
  '42':
  - type: text
    content: Car il se souvint de sa parole sainte,
  - type: text
    content: 'Et '
  - type: note
    content: Ge 15:14.
  - type: text
    content: d’Abraham, son serviteur.
  '43':
  - type: text
    content: ' '
  - type: note
    content: Ex 14:8. No 33:3.
  - type: text
    content: Il fit sortir son peuple dans l’allégresse,
  - type: text
    content: Ses élus au milieu des cris de joie.
  '44':
  - type: text
    content: Il leur donna les terres des nations,
  - type: text
    content: Et ils possédèrent le fruit du travail des peuples,
  '45':
  - type: text
    content: ' '
  - type: note
    content: Ex 19:4, 5, 6. De 4:1, 40; 6:21, 22, 23, 24, 25.
  - type: text
    content: Afin qu’ils gardassent ses ordonnances,
  - type: text
    content: Et qu’ils observassent ses lois.
  - type: text
    content: Louez l’Éternel!
  '5':
  - type: text
    content: Souvenez-vous des prodiges qu’il a faits,
  - type: text
    content: De ses miracles et des jugements de sa bouche,
  '6':
  - type: text
    content: Postérité d’Abraham, son serviteur,
  - type: text
    content: Enfants de Jacob, ses élus!
  '7':
  - type: text
    content: L’Éternel est notre Dieu;
  - type: text
    content: Ses jugements s’exercent sur toute la terre.
  '8':
  - type: text
    content: Il se rappelle à toujours son alliance,
  - type: text
    content: Ses promesses pour mille générations,
  '9':
  - type: text
    content: L’alliance qu’il a traitée avec Abraham,
  - type: text
    content: Et le serment qu’il a fait à Isaac;
