document_id: PSA.105
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 1 Ch 16:8-22. (Ac 7:2-38. Né 9:7-25.) Ps 78; 103:2. De 8:2.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louez l’Éternel, invoquez son nom!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faites connaître parmi les peuples ses hauts faits!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Chantez, chantez en son honneur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parlez de toutes ses merveilles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 34:3
      metadata:
        usfm: PSA.34.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Glorifiez-vous de son saint nom!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que le cœur de ceux qui cherchent l’Éternel se réjouisse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ayez recours à l’Éternel et à son appui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cherchez continuellement sa face!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Souvenez-vous des prodiges qu’il a faits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De ses miracles et des jugements de sa bouche,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Postérité d’Abraham, son serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enfants de Jacob, ses élus!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L’Éternel est notre Dieu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses jugements s’exercent sur toute la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il se rappelle à toujours son alliance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses promesses pour mille générations,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’alliance qu’il a traitée avec Abraham,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le serment qu’il a fait à Isaac;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 16:17
      metadata:
        usfm: 1CH.16.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il l’a érigée pour Jacob en loi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 28:13
      metadata:
        usfm: GEN.28.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 35:11
      metadata:
        usfm: GEN.35.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pour Israël en alliance éternelle,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 13:15
      metadata:
        usfm: GEN.13.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:18
      metadata:
        usfm: GEN.15.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je te donnerai le pays de Canaan
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme héritage qui vous est échu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 16:19
      metadata:
        usfm: 1CH.16.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils étaient alors peu nombreux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Très peu nombreux, et étrangers dans le pays,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Et ils allaient d’une nation à l’autre
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et d’un royaume vers un autre peuple;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 35:5
      metadata:
        usfm: GEN.35.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais il ne permit à personne de les opprimer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et il châtia des rois à cause d’eux:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ne touchez pas à mes oints,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne faites pas de mal à mes prophètes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il appela sur le pays la famine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il coupa tout moyen de subsistance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il envoya devant eux un homme:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 37:28
      metadata:
        usfm: GEN.37.28
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '36'
      metadata:
        usfm: GEN.37.36
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 45:5
      metadata:
        usfm: GEN.45.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Joseph fut vendu comme esclave.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: On serra ses pieds dans des liens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: On le mit aux fers,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Jusqu’au temps où arriva ce qu’il avait annoncé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et où la parole de l’Éternel l’éprouva.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le roi fit ôter ses liens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le dominateur des peuples le délivra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 41:40
      metadata:
        usfm: GEN.41.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il l’établit seigneur sur sa maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et gouverneur de tous ses biens,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Afin qu’il pût à son gré enchaîner ses princes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’il enseignât la sagesse à ses anciens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Alors Israël vint en Égypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et Jacob séjourna dans le pays de Cham.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 1:7
      metadata:
        usfm: EXO.1.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: EXO.1.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il rendit son peuple très fécond,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et plus puissant que ses adversaires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 1:9
      metadata:
        usfm: EXO.1.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: EXO.1.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: EXO.1.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il changea leur cœur, au point qu’ils haïrent son peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’ils traitèrent ses serviteurs avec perfidie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 3:10
      metadata:
        usfm: EXO.3.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:12
      metadata:
        usfm: EXO.4.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il envoya Moïse, son serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et Aaron, qu’il avait choisi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 7:9
      metadata:
        usfm: EXO.7.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils accomplirent par son pouvoir des prodiges au milieu d’eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils firent des miracles dans le pays de Cham.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Il envoya des ténèbres et amena l’obscurité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils ne furent pas rebelles à sa parole.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Il changea leurs eaux en sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et fit périr leurs poissons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Le pays fourmilla de grenouilles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusque dans les chambres de leurs rois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Il dit, et parurent les mouches venimeuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les poux sur tout leur territoire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Il leur donna pour pluie de la grêle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des flammes de feu dans leur pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il frappa leurs vignes et leurs figuiers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et brisa les arbres de leur contrée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Il dit, et parurent les sauterelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des sauterelles sans nombre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Qui dévorèrent toute l’herbe du pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui dévorèrent les fruits de leurs champs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Il frappa tous les premiers-nés dans leur pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutes les prémices de leur force.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Il fit sortir son peuple avec de l’argent et de l’or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nul ne chancela parmi ses tribus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:33
      metadata:
        usfm: EXO.12.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les Égyptiens se réjouirent de leur départ,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car la terreur qu’ils avaient d’eux les saisissait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Il étendit la nuée pour les couvrir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le feu pour éclairer la nuit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: A leur demande, il fit venir des cailles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il les rassasia du pain du ciel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Il ouvrit le rocher, et des eaux coulèrent;
- type: usfm
  marker: q1
  children:
  - type: text
