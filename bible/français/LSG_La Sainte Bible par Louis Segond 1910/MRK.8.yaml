document_id: MRK.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Seconde multiplication des pains
  - type: heading
    content: 'V. 1-9: cf. Mt 15:32-39. (Mc 6:35-44. 2 R 4:42-44.) Ps 146:7.'
  - type: text
    content: ' '
  - type: note
    content: Mt 15:32.
  - type: text
    content: 'En ces jours-là, une foule nombreuse s’étant de nouveau réunie et n’ayant pas de quoi manger, Jésus appela les disciples, et leur dit:'
  '10':
  - type: text
    content: ' '
  - type: note
    content: Mt 15:39.
  - type: text
    content: 'Aussitôt il monta dans la barque avec ses disciples, et se rendit dans la contrée de Dalmanutha. '
  '11':
  - type: text
    content: 'Les pharisiens survinrent, se mirent à discuter avec Jésus, et, pour l’éprouver, '
  - type: note
    content: Mt 12:38; 16:1. Lu 11:29. Jn 6:30.
  - type: text
    content: 'lui demandèrent un signe venant du ciel. '
  '12':
  - type: text
    content: 'Jésus, soupirant profondément en son esprit, dit: '
  - type: text
    content: Pourquoi cette génération demande-t-elle un signe?
  - type: text
    content: ' '
  - type: note
    content: Mt 16:4.
  - type: text
    content: Je vous le dis en vérité, il ne sera point donné de signe à cette génération.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Puis il les quitta, et remonta dans la barque, pour passer sur l’autre bord. '
  '14':
  - type: text
    content: 'Les disciples avaient oublié de prendre des pains; ils n’en avaient qu’un seul avec eux dans la barque. '
  '15':
  - type: text
    content: 'Jésus leur fit cette recommandation: '
  - type: note
    content: Mt 16:6. Lu 12:1.
  - type: text
    content: Gardez-vous avec soin du levain des pharisiens et du levain d’Hérode.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Les disciples raisonnaient entre eux, et disaient: C’est parce que nous n’avons pas de pains. '
  '17':
  - type: text
    content: 'Jésus, l’ayant connu, leur dit: '
  - type: text
    content: Pourquoi raisonnez-vous sur ce que vous n’avez pas de pains? Êtes-vous encore sans intelligence, et ne comprenez-vous pas?
  '18':
  - type: text
    content: ' '
  - type: note
    content: Mc 6:52.
  - type: text
    content: Avez-vous le cœur endurci? Ayant des yeux, ne voyez-vous pas? Ayant des oreilles, n’entendez-vous pas? Et n’avez-vous point de mémoire?
  - type: text
    content: ' '
  '19':
  - type: note
    content: Mt 14:17, 20. Mc 6:38. Lu 9:13. Jn 6:9.
  - type: text
    content: Quand j’ai rompu les cinq pains pour les cinq mille hommes, combien de paniers pleins de morceaux avez-vous emportés?
  - type: text
    content: ' Douze, lui répondirent-ils.'
  '2':
  - type: text
    content: ' '
  - type: text
    content: Je suis ému de compassion pour cette foule; car voilà trois jours qu’ils sont près de moi, et ils n’ont rien à manger.
  - type: text
    content: ' '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Mt 15:36, 37.
  - type: text
    content: Et quand j’ai rompu les sept pains pour les quatre mille hommes, combien de corbeilles pleines de morceaux avez-vous emportées?
  - type: text
    content: ' Sept, répondirent-ils. '
  '21':
  - type: text
    content: 'Et il leur dit: '
  - type: text
    content: Ne comprenez-vous pas encore?
  - type: heading
    content: Guérison d’un aveugle à Bethsaïda
  - type: heading
    content: 'V. 22-26: cf. Mc 10:46-53. Jn 9:1-11.'
  '22':
  - type: text
    content: 'Ils se rendirent à Bethsaïda; et on amena vers Jésus un aveugle, qu’on le pria de toucher. '
  '23':
  - type: text
    content: 'Il prit l’aveugle par la main, et le conduisit hors du village; '
  - type: note
    content: Mc 7:33.
  - type: text
    content: 'puis il lui mit de la salive sur les yeux, '
  - type: note
    content: Mc 7:32.
  - type: text
    content: 'lui imposa les mains, et lui demanda s’il voyait quelque chose. '
  '24':
  - type: text
    content: 'Il regarda, et dit: J’aperçois les hommes, mais j’en vois comme des arbres, et qui marchent. '
  '25':
  - type: text
    content: 'Jésus lui mit de nouveau les mains sur les yeux; et, quand l’aveugle regarda fixement, il fut guéri, et vit tout distinctement. '
  '26':
  - type: text
    content: 'Alors Jésus le renvoya dans sa maison, en disant: '
  - type: text
    content: N’entre pas au village.
  - type: heading
    content: Jésus sur le territoire de Césarée de Philippe. Opinions diverses sur le Christ. Confession de Pierre
  - type: heading
    content: 'V. 27-30: cf. (Mt 16:13-20. Lu 9:18-21.)'
  '27':
  - type: text
    content: ' '
  - type: note
    content: Mt 16:13. Lu 9:18.
  - type: text
    content: 'Jésus s’en alla, avec ses disciples, dans les villages de Césarée de Philippe, et il leur posa en chemin cette question: '
  - type: text
    content: Qui dit-on que je suis?
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Ils répondirent: '
  - type: note
    content: Mt 14:2.
  - type: text
    content: Jean-Baptiste; les autres, Élie, les autres, l’un des prophètes.
  '29':
  - type: text
    content: ' '
  - type: text
    content: Et vous,
  - type: text
    content: ' leur demanda-t-il, '
  - type: text
    content: qui dites-vous que je suis?
  - type: text
    content: ' Pierre lui répondit: '
  - type: note
    content: Mt 16:16. Jn 6:69.
  - type: text
    content: 'Tu es le Christ. '
  '3':
  - type: text
    content: Si je les renvoie chez eux à jeun, les forces leur manqueront en chemin; car quelques-uns d’entre eux sont venus de loin.
  - type: text
    content: ' '
  '30':
  - type: text
    content: Jésus leur recommanda sévèrement de ne dire cela de lui à personne.
  - type: heading
    content: Jésus annonce ses souffrances et sa mort. Comment suivre Jésus
  - type: heading
    content: '8 v. 31 à 9 v. 1: cf. (Mt 16:21-28. Lu 9:22-27.)'
  '31':
  - type: text
    content: ' '
  - type: note
    content: Mt 16:21; 17:22; 20:18. Mc 9:31; 10:33. Lu 9:22; 18:31; 24:7.
  - type: text
    content: 'Alors il commença à leur apprendre qu’il fallait que le Fils de l’homme souffrît beaucoup, qu’il fût rejeté par les anciens, par les principaux sacrificateurs et par les scribes, qu’il fût mis à mort, et qu’il ressuscitât trois jours après. '
  '32':
  - type: text
    content: 'Il leur disait ces choses ouvertement. Et Pierre, l’ayant pris à part, se mit à le reprendre. '
  '33':
  - type: text
    content: 'Mais Jésus, se retournant et regardant ses disciples, réprimanda Pierre, et dit: '
  - type: note
    content: 2 S 19:22.
  - type: text
    content: Arrière de moi, Satan! Car tu ne conçois pas les choses de Dieu, tu n’as que des pensées humaines.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Puis, ayant appelé la foule avec ses disciples, il leur dit: '
  - type: note
    content: Mt 10:38; 16:24. Lu 9:23; 14:27.
  - type: text
    content: Si quelqu’un veut venir après moi, qu’il renonce à lui-même, qu’il se charge de sa croix, et qu’il me suive.
  '35':
  - type: text
    content: ' '
  - type: note
    content: Mt 10:39; 16:25. Lu 9:24; 17:33. Jn 12:25.
  - type: text
    content: Car celui qui voudra sauver sa vie la perdra, mais celui qui perdra sa vie à cause de moi et de la bonne nouvelle la sauvera.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Et que sert-il à un homme de gagner tout le monde, s’il perd son âme?
  - type: text
    content: ' '
  '37':
  - type: text
    content: Que donnerait un homme
  - type: text
    content: ' '
  - type: note
    content: Ps 49:9.
  - type: text
    content: en échange de son âme?
  - type: text
    content: ' '
  '38':
  - type: note
    content: Mt 10:32. Lu 9:26; 12:8. 2 Ti 2:12. 1 Jn 2:23.
  - type: text
    content: Car quiconque aura honte de moi et de mes paroles au milieu de cette génération adultère et pécheresse, le Fils de l’homme aura aussi honte de lui, quand il viendra dans la gloire de son Père, avec les saints anges.
  '4':
  - type: text
    content: 'Ses disciples lui répondirent: Comment pourrait-on les rassasier de pains, ici, dans un lieu désert? '
  '5':
  - type: text
    content: 'Jésus leur demanda: '
  - type: text
    content: Combien avez-vous de pains?
  - type: text
    content: ' Sept, répondirent-ils. '
  '6':
  - type: text
    content: 'Alors il fit asseoir la foule par terre, prit les sept pains, et, après avoir rendu grâces, il les rompit, et les donna à ses disciples pour les distribuer; et ils les distribuèrent à la foule. '
  '7':
  - type: text
    content: 'Ils avaient encore quelques petits poissons, et Jésus, ayant rendu grâces, les fit aussi distribuer. '
  '8':
  - type: text
    content: 'Ils mangèrent et furent rassasiés, et l’on emporta sept corbeilles pleines des morceaux qui restaient. '
  '9':
  - type: text
    content: Ils étaient environ quatre mille. Ensuite Jésus les renvoya.
  - type: heading
    content: Un signe du ciel demandé par les pharisiens. Le levain des pharisiens
  - type: heading
    content: 'V. 10-21: cf. Mt 15:39; 16:1-12.'
