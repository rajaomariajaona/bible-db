document_id: MRK.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Seconde multiplication des pains
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. Mt 15:32-39. (Mc 6:35-44. 2 R 4:42-44.) Ps 146:7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 15:32
      metadata:
        usfm: MAT.15.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'En ces jours-là, une foule nombreuse s’étant de nouveau réunie et n’ayant pas de quoi manger, Jésus appela les disciples, et leur dit:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je suis ému de compassion pour cette foule; car voilà trois jours qu’ils sont près de moi, et ils n’ont rien à manger.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si je les renvoie chez eux à jeun, les forces leur manqueront en chemin; car quelques-uns d’entre eux sont venus de loin.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ses disciples lui répondirent: Comment pourrait-on les rassasier de pains, ici, dans un lieu désert? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jésus leur demanda: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Combien avez-vous de pains?
  - type: text
    text: ' Sept, répondirent-ils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors il fit asseoir la foule par terre, prit les sept pains, et, après avoir rendu grâces, il les rompit, et les donna à ses disciples pour les distribuer; et ils les distribuèrent à la foule. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils avaient encore quelques petits poissons, et Jésus, ayant rendu grâces, les fit aussi distribuer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils mangèrent et furent rassasiés, et l’on emporta sept corbeilles pleines des morceaux qui restaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ils étaient environ quatre mille. Ensuite Jésus les renvoya.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un signe du ciel demandé par les pharisiens. Le levain des pharisiens
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-21: cf. Mt 15:39; 16:1-12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 15:39
      metadata:
        usfm: MAT.15.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Aussitôt il monta dans la barque avec ses disciples, et se rendit dans la contrée de Dalmanutha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les pharisiens survinrent, se mirent à discuter avec Jésus, et, pour l’éprouver, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:38
      metadata:
        usfm: MAT.12.38
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:1
      metadata:
        usfm: MAT.16.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 11:29
      metadata:
        usfm: LUK.11.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:30
      metadata:
        usfm: JHN.6.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'lui demandèrent un signe venant du ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jésus, soupirant profondément en son esprit, dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi cette génération demande-t-elle un signe?
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 16:4
      metadata:
        usfm: MAT.16.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous le dis en vérité, il ne sera point donné de signe à cette génération.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Puis il les quitta, et remonta dans la barque, pour passer sur l’autre bord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les disciples avaient oublié de prendre des pains; ils n’en avaient qu’un seul avec eux dans la barque. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jésus leur fit cette recommandation: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 16:6
      metadata:
        usfm: MAT.16.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 12:1
      metadata:
        usfm: LUK.12.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Gardez-vous avec soin du levain des pharisiens et du levain d’Hérode.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les disciples raisonnaient entre eux, et disaient: C’est parce que nous n’avons pas de pains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jésus, l’ayant connu, leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi raisonnez-vous sur ce que vous n’avez pas de pains? Êtes-vous encore sans intelligence, et ne comprenez-vous pas?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:52
      metadata:
        usfm: MRK.6.52
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Avez-vous le cœur endurci? Ayant des yeux, ne voyez-vous pas? Ayant des oreilles, n’entendez-vous pas? Et n’avez-vous point de mémoire?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 14:17
      metadata:
        usfm: MAT.14.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: MAT.14.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:38
      metadata:
        usfm: MRK.6.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:13
      metadata:
        usfm: LUK.9.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:9
      metadata:
        usfm: JHN.6.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quand j’ai rompu les cinq pains pour les cinq mille hommes, combien de paniers pleins de morceaux avez-vous emportés?
  - type: text
    text: ' Douze, lui répondirent-ils.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 15:36
      metadata:
        usfm: MAT.15.36
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '37'
      metadata:
        usfm: MAT.15.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et quand j’ai rompu les sept pains pour les quatre mille hommes, combien de corbeilles pleines de morceaux avez-vous emportées?
  - type: text
    text: ' Sept, répondirent-ils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne comprenez-vous pas encore?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison d’un aveugle à Bethsaïda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-26: cf. Mc 10:46-53. Jn 9:1-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils se rendirent à Bethsaïda; et on amena vers Jésus un aveugle, qu’on le pria de toucher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il prit l’aveugle par la main, et le conduisit hors du village; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 7:33
      metadata:
        usfm: MRK.7.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'puis il lui mit de la salive sur les yeux, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 7:32
      metadata:
        usfm: MRK.7.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'lui imposa les mains, et lui demanda s’il voyait quelque chose. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il regarda, et dit: J’aperçois les hommes, mais j’en vois comme des arbres, et qui marchent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jésus lui mit de nouveau les mains sur les yeux; et, quand l’aveugle regarda fixement, il fut guéri, et vit tout distinctement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors Jésus le renvoya dans sa maison, en disant: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: N’entre pas au village.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus sur le territoire de Césarée de Philippe. Opinions diverses sur le Christ. Confession de Pierre
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 27-30: cf. (Mt 16:13-20. Lu 9:18-21.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 16:13
      metadata:
        usfm: MAT.16.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:18
      metadata:
        usfm: LUK.9.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus s’en alla, avec ses disciples, dans les villages de Césarée de Philippe, et il leur posa en chemin cette question: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Qui dit-on que je suis?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils répondirent: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 14:2
      metadata:
        usfm: MAT.14.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Jean-Baptiste; les autres, Élie, les autres, l’un des prophètes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et vous,
  - type: text
    text: ' leur demanda-t-il, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: qui dites-vous que je suis?
  - type: text
    text: ' Pierre lui répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 16:16
      metadata:
        usfm: MAT.16.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:69
      metadata:
        usfm: JHN.6.69
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu es le Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Jésus leur recommanda sévèrement de ne dire cela de lui à personne.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus annonce ses souffrances et sa mort. Comment suivre Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: '8 v. 31 à 9 v. 1: cf. (Mt 16:21-28. Lu 9:22-27.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 16:21
      metadata:
        usfm: MAT.16.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:22
      metadata:
        usfm: MAT.17.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:18
      metadata:
        usfm: MAT.20.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:31
      metadata:
        usfm: MRK.9.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:33
      metadata:
        usfm: MRK.10.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:22
      metadata:
        usfm: LUK.9.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:31
      metadata:
        usfm: LUK.18.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:7
      metadata:
        usfm: LUK.24.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors il commença à leur apprendre qu’il fallait que le Fils de l’homme souffrît beaucoup, qu’il fût rejeté par les anciens, par les principaux sacrificateurs et par les scribes, qu’il fût mis à mort, et qu’il ressuscitât trois jours après. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il leur disait ces choses ouvertement. Et Pierre, l’ayant pris à part, se mit à le reprendre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Mais Jésus, se retournant et regardant ses disciples, réprimanda Pierre, et dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 19:22
      metadata:
        usfm: 2SA.19.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Arrière de moi, Satan! Car tu ne conçois pas les choses de Dieu, tu n’as que des pensées humaines.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Puis, ayant appelé la foule avec ses disciples, il leur dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:38
      metadata:
        usfm: MAT.10.38
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:24
      metadata:
        usfm: MAT.16.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:23
      metadata:
        usfm: LUK.9.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:27
      metadata:
        usfm: LUK.14.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si quelqu’un veut venir après moi, qu’il renonce à lui-même, qu’il se charge de sa croix, et qu’il me suive.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:39
      metadata:
        usfm: MAT.10.39
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:25
      metadata:
        usfm: MAT.16.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:24
      metadata:
        usfm: LUK.9.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:33
      metadata:
        usfm: LUK.17.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:25
      metadata:
        usfm: JHN.12.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car celui qui voudra sauver sa vie la perdra, mais celui qui perdra sa vie à cause de moi et de la bonne nouvelle la sauvera.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
