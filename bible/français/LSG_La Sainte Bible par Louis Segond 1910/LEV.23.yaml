document_id: LEV.23,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les fêtes
  - type: heading
    content: 'V. 1-3: cf. (Ex 20:8-11; 31:13-17.)'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: text
    content: 'Parle aux enfants d’Israël et tu leur diras: Quand vous serez entrés dans le pays que je vous donne, et que vous y ferez la moisson, vous apporterez au sacrificateur une gerbe, prémices de votre moisson. '
  '11':
  - type: text
    content: 'Il agitera de côté et d’autre la gerbe devant l’Éternel, afin qu’elle soit agréée: le sacrificateur l’agitera de côté et d’autre, le lendemain du sabbat. '
  '12':
  - type: text
    content: 'Le jour où vous agiterez la gerbe, vous offrirez en holocauste à l’Éternel un agneau d’un an sans défaut; '
  '13':
  - type: text
    content: 'vous y joindrez une offrande de deux dixièmes de fleur de farine pétrie à l’huile, comme offrande consumée par le feu, d’une agréable odeur à l’Éternel; et vous ferez une libation d’un quart de hin de vin. '
  '14':
  - type: text
    content: Vous ne mangerez ni pain, ni épis rôtis ou broyés, jusqu’au jour même où vous apporterez l’offrande à votre Dieu. C’est une loi perpétuelle pour vos descendants, dans tous les lieux où vous habiterez.
  - type: heading
    content: 'V. 15-22: cf. (De 16:9-12. No 28:26-31.) Ac 1:2, etc.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: De 16:9.
  - type: text
    content: 'Depuis le lendemain du sabbat, du jour où vous apporterez la gerbe pour être agitée de côté et d’autre, vous compterez sept semaines entières. '
  '16':
  - type: text
    content: 'Vous compterez cinquante jours jusqu’au lendemain du septième sabbat; et vous ferez à l’Éternel une offrande nouvelle. '
  '17':
  - type: text
    content: 'Vous apporterez de vos demeures deux pains, pour qu’ils soient agités de côté et d’autre; ils seront faits avec deux dixièmes de fleur de farine, et cuits avec du levain: ce sont les prémices à l’Éternel. '
  '18':
  - type: text
    content: 'Outre ces pains, vous offrirez en holocauste à l’Éternel sept agneaux d’un an sans défaut, un jeune taureau et deux béliers; vous y joindrez l’offrande et la libation ordinaires, comme offrande consumée par le feu, d’une agréable odeur à l’Éternel. '
  '19':
  - type: text
    content: 'Vous offrirez un bouc en sacrifice d’expiation, et deux agneaux d’un an en sacrifice d’actions de grâces. '
  '2':
  - type: text
    content: 'Parle aux enfants d’Israël, et tu leur diras: Les fêtes de l’Éternel, que vous publierez, seront de saintes convocations. Voici quelles sont mes fêtes. '
  '20':
  - type: text
    content: 'Le sacrificateur agitera ces victimes de côté et d’autre devant l’Éternel, avec le pain des prémices et avec les deux agneaux: elles seront consacrées à l’Éternel, et appartiendront au sacrificateur. '
  '21':
  - type: text
    content: 'Ce jour même, vous publierez la fête, et vous aurez une sainte convocation: vous ne ferez aucune œuvre servile. C’est une loi perpétuelle pour vos descendants, dans tous les lieux où vous habiterez. '
  '22':
  - type: note
    content: Lé 19:9. De 24:19.
  - type: text
    content: Quand vous ferez la moisson dans votre pays, tu laisseras un coin de ton champ sans le moissonner, et tu ne ramasseras pas ce qui reste à glaner. Tu abandonneras cela au pauvre et à l’étranger. Je suis l’Éternel, votre Dieu.
  - type: heading
    content: 'V. 23-25: cf. No 29:1-6.'
  '23':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '24':
  - type: text
    content: 'Parle aux enfants d’Israël, et dis: '
  - type: note
    content: No 29:1.
  - type: text
    content: 'Le septième mois, le premier jour du mois, vous aurez un jour de repos, publié au son des trompettes, et une sainte convocation. '
  '25':
  - type: text
    content: Vous ne ferez aucune œuvre servile, et vous offrirez à l’Éternel des sacrifices consumés par le feu.
  - type: heading
    content: 'V. 26-32: cf. Lé 16. No 29:7-11. (Za 12:10 à 13:1.)'
  '26':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '27':
  - type: note
    content: Lé 16:29, 31. No 29:7.
  - type: text
    content: 'Le dixième jour de ce septième mois, ce sera le jour des expiations: vous aurez une sainte convocation, vous humilierez vos âmes, et vous offrirez à l’Éternel des sacrifices consumés par le feu. '
  '28':
  - type: text
    content: 'Vous ne ferez aucun ouvrage ce jour-là, car c’est le jour des expiations, où doit être faite pour vous l’expiation devant l’Éternel, votre Dieu. '
  '29':
  - type: text
    content: 'Toute personne qui ne s’humiliera pas ce jour-là sera retranchée de son peuple. '
  '3':
  - type: note
    content: Ex 20:9; 23:12. De 5:13. Lu 13:14.
  - type: text
    content: 'On travaillera six jours; mais le septième jour est le sabbat, le jour du repos: il y aura une sainte convocation. Vous ne ferez aucun ouvrage: c’est le sabbat de l’Éternel, dans toutes vos demeures.'
  - type: heading
    content: 'V. 4-14: cf. (Ex 12:2-28. De 16:1-8. No 28:16-25.) Mt 26:17-30.'
  '30':
  - type: text
    content: 'Toute personne qui fera ce jour-là un ouvrage quelconque, je la détruirai du milieu de son peuple. '
  '31':
  - type: text
    content: 'Vous ne ferez aucun ouvrage. C’est une loi perpétuelle pour vos descendants dans tous les lieux où vous habiterez. '
  '32':
  - type: text
    content: Ce sera pour vous un sabbat, un jour de repos, et vous humilierez vos âmes; dès le soir du neuvième jour jusqu’au soir suivant, vous célébrerez votre sabbat.
  - type: heading
    content: 'V. 33-44: cf. (De 16:13-17. No 29:12-39.) Né 8:14-18.'
  '33':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '34':
  - type: text
    content: 'Parle aux enfants d’Israël, et dis: '
  - type: note
    content: Ex 23:16. No 29:12. De 16:15.
  - type: text
    content: 'Le quinzième jour de ce septième mois, ce sera la fête des tabernacles en l’honneur de l’Éternel, pendant sept jours. '
  '35':
  - type: text
    content: 'Le premier jour, il y aura une sainte convocation: vous ne ferez aucune œuvre servile. '
  '36':
  - type: text
    content: 'Pendant sept jours, vous offrirez à l’Éternel des sacrifices consumés par le feu. '
  - type: note
    content: Jn 7:37.
  - type: text
    content: 'Le huitième jour, vous aurez une sainte convocation, et vous offrirez à l’Éternel des sacrifices consumés par le feu; ce sera une assemblée solennelle: vous ne ferez aucune œuvre servile. '
  '37':
  - type: text
    content: 'Telles sont les fêtes de l’Éternel, les saintes convocations, que vous publierez, afin que l’on offre à l’Éternel des sacrifices consumés par le feu, des holocaustes, des offrandes, des victimes et des libations, chaque chose au jour fixé. '
  '38':
  - type: text
    content: 'Vous observerez en outre les sabbats de l’Éternel, et vous continuerez à faire vos dons à l’Éternel, tous vos sacrifices pour l’accomplissement d’un vœu et toutes vos offrandes volontaires. '
  '39':
  - type: text
    content: 'Le quinzième jour du septième mois, quand vous récolterez les produits du pays, vous célébrerez donc une fête à l’Éternel, pendant sept jours: le premier jour sera un jour de repos, et le huitième sera un jour de repos. '
  '4':
  - type: text
    content: 'Voici les fêtes de l’Éternel, les saintes convocations, que vous publierez à leurs temps fixés. '
  '40':
  - type: text
    content: 'Vous prendrez, le premier jour, du fruit des beaux arbres, des branches de palmiers, des rameaux d’arbres touffus et des saules de rivière; et vous vous réjouirez devant l’Éternel, votre Dieu, pendant sept jours. '
  '41':
  - type: text
    content: 'Vous célébrerez chaque année cette fête à l’Éternel, pendant sept jours. C’est une loi perpétuelle pour vos descendants. Vous la célébrerez le septième mois. '
  '42':
  - type: text
    content: 'Vous demeurerez pendant sept jours sous des tentes; tous les indigènes en Israël demeureront sous des tentes, '
  '43':
  - type: text
    content: 'afin que vos descendants sachent que j’ai fait habiter sous des tentes les enfants d’Israël, après les avoir fait sortir du pays d’Égypte. Je suis l’Éternel, votre Dieu. '
  '44':
  - type: text
    content: C’est ainsi que Moïse dit aux enfants d’Israël quelles sont les fêtes de l’Éternel.
  '5':
  - type: note
    content: Ex 12:18; 23:15. No 28:16. De 16:1.
  - type: text
    content: 'Le premier mois, le quatorzième jour du mois, entre les deux soirs, ce sera la Pâque de l’Éternel. '
  '6':
  - type: text
    content: 'Et le quinzième jour de ce mois, ce sera la fête des pains sans levain en l’honneur de l’Éternel; vous mangerez pendant sept jours des pains sans levain. '
  '7':
  - type: text
    content: 'Le premier jour, vous aurez une sainte convocation: vous ne ferez aucune œuvre servile. '
  '8':
  - type: text
    content: 'Vous offrirez à l’Éternel, pendant sept jours, des sacrifices consumés par le feu. Le septième jour, il y aura une sainte convocation: vous ne ferez aucune œuvre servile. '
  '9':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
