document_id: LEV.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les fêtes
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-3: cf. (Ex 20:8-11; 31:13-17.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Parle aux enfants d’Israël, et tu leur diras: Les fêtes de l’Éternel, que vous publierez, seront de saintes convocations. Voici quelles sont mes fêtes. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:9
      metadata:
        usfm: EXO.20.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:12
      metadata:
        usfm: EXO.23.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:13
      metadata:
        usfm: DEU.5.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 13:14
      metadata:
        usfm: LUK.13.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'On travaillera six jours; mais le septième jour est le sabbat, le jour du repos: il y aura une sainte convocation. Vous ne ferez aucun ouvrage: c’est le sabbat de l’Éternel, dans toutes vos demeures.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 4-14: cf. (Ex 12:2-28. De 16:1-8. No 28:16-25.) Mt 26:17-30.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici les fêtes de l’Éternel, les saintes convocations, que vous publierez à leurs temps fixés. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:18
      metadata:
        usfm: EXO.12.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:15
      metadata:
        usfm: EXO.23.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 28:16
      metadata:
        usfm: NUM.28.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 16:1
      metadata:
        usfm: DEU.16.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le premier mois, le quatorzième jour du mois, entre les deux soirs, ce sera la Pâque de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et le quinzième jour de ce mois, ce sera la fête des pains sans levain en l’honneur de l’Éternel; vous mangerez pendant sept jours des pains sans levain. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le premier jour, vous aurez une sainte convocation: vous ne ferez aucune œuvre servile. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Vous offrirez à l’Éternel, pendant sept jours, des sacrifices consumés par le feu. Le septième jour, il y aura une sainte convocation: vous ne ferez aucune œuvre servile. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Parle aux enfants d’Israël et tu leur diras: Quand vous serez entrés dans le pays que je vous donne, et que vous y ferez la moisson, vous apporterez au sacrificateur une gerbe, prémices de votre moisson. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il agitera de côté et d’autre la gerbe devant l’Éternel, afin qu’elle soit agréée: le sacrificateur l’agitera de côté et d’autre, le lendemain du sabbat. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le jour où vous agiterez la gerbe, vous offrirez en holocauste à l’Éternel un agneau d’un an sans défaut; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'vous y joindrez une offrande de deux dixièmes de fleur de farine pétrie à l’huile, comme offrande consumée par le feu, d’une agréable odeur à l’Éternel; et vous ferez une libation d’un quart de hin de vin. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Vous ne mangerez ni pain, ni épis rôtis ou broyés, jusqu’au jour même où vous apporterez l’offrande à votre Dieu. C’est une loi perpétuelle pour vos descendants, dans tous les lieux où vous habiterez.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-22: cf. (De 16:9-12. No 28:26-31.) Ac 1:2, etc.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 16:9
      metadata:
        usfm: DEU.16.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Depuis le lendemain du sabbat, du jour où vous apporterez la gerbe pour être agitée de côté et d’autre, vous compterez sept semaines entières. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Vous compterez cinquante jours jusqu’au lendemain du septième sabbat; et vous ferez à l’Éternel une offrande nouvelle. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Vous apporterez de vos demeures deux pains, pour qu’ils soient agités de côté et d’autre; ils seront faits avec deux dixièmes de fleur de farine, et cuits avec du levain: ce sont les prémices à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Outre ces pains, vous offrirez en holocauste à l’Éternel sept agneaux d’un an sans défaut, un jeune taureau et deux béliers; vous y joindrez l’offrande et la libation ordinaires, comme offrande consumée par le feu, d’une agréable odeur à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vous offrirez un bouc en sacrifice d’expiation, et deux agneaux d’un an en sacrifice d’actions de grâces. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le sacrificateur agitera ces victimes de côté et d’autre devant l’Éternel, avec le pain des prémices et avec les deux agneaux: elles seront consacrées à l’Éternel, et appartiendront au sacrificateur. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ce jour même, vous publierez la fête, et vous aurez une sainte convocation: vous ne ferez aucune œuvre servile. C’est une loi perpétuelle pour vos descendants, dans tous les lieux où vous habiterez. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:9
      metadata:
        usfm: LEV.19.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 24:19
      metadata:
        usfm: DEU.24.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Quand vous ferez la moisson dans votre pays, tu laisseras un coin de ton champ sans le moissonner, et tu ne ramasseras pas ce qui reste à glaner. Tu abandonneras cela au pauvre et à l’étranger. Je suis l’Éternel, votre Dieu.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 23-25: cf. No 29:1-6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Parle aux enfants d’Israël, et dis: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 29:1
      metadata:
        usfm: NUM.29.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le septième mois, le premier jour du mois, vous aurez un jour de repos, publié au son des trompettes, et une sainte convocation. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Vous ne ferez aucune œuvre servile, et vous offrirez à l’Éternel des sacrifices consumés par le feu.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 26-32: cf. Lé 16. No 29:7-11. (Za 12:10 à 13:1.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 16:29
      metadata:
        usfm: LEV.16.29
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '31'
      metadata:
        usfm: LEV.16.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 29:7
      metadata:
        usfm: NUM.29.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le dixième jour de ce septième mois, ce sera le jour des expiations: vous aurez une sainte convocation, vous humilierez vos âmes, et vous offrirez à l’Éternel des sacrifices consumés par le feu. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Vous ne ferez aucun ouvrage ce jour-là, car c’est le jour des expiations, où doit être faite pour vous l’expiation devant l’Éternel, votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Toute personne qui ne s’humiliera pas ce jour-là sera retranchée de son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Toute personne qui fera ce jour-là un ouvrage quelconque, je la détruirai du milieu de son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Vous ne ferez aucun ouvrage. C’est une loi perpétuelle pour vos descendants dans tous les lieux où vous habiterez. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ce sera pour vous un sabbat, un jour de repos, et vous humilierez vos âmes; dès le soir du neuvième jour jusqu’au soir suivant, vous célébrerez votre sabbat.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 33-44: cf. (De 16:13-17. No 29:12-39.) Né 8:14-18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Parle aux enfants d’Israël, et dis: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:16
      metadata:
        usfm: EXO.23.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 29:12
      metadata:
        usfm: NUM.29.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 16:15
      metadata:
        usfm: DEU.16.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le quinzième jour de ce septième mois, ce sera la fête des tabernacles en l’honneur de l’Éternel, pendant sept jours. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le premier jour, il y aura une sainte convocation: vous ne ferez aucune œuvre servile. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Pendant sept jours, vous offrirez à l’Éternel des sacrifices consumés par le feu. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:37
      metadata:
        usfm: JHN.7.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le huitième jour, vous aurez une sainte convocation, et vous offrirez à l’Éternel des sacrifices consumés par le feu; ce sera une assemblée solennelle: vous ne ferez aucune œuvre servile. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Telles sont les fêtes de l’Éternel, les saintes convocations, que vous publierez, afin que l’on offre à l’Éternel des sacrifices consumés par le feu, des holocaustes, des offrandes, des victimes et des libations, chaque chose au jour fixé. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Vous observerez en outre les sabbats de l’Éternel, et vous continuerez à faire vos dons à l’Éternel, tous vos sacrifices pour l’accomplissement d’un vœu et toutes vos offrandes volontaires. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Le quinzième jour du septième mois, quand vous récolterez les produits du pays, vous célébrerez donc une fête à l’Éternel, pendant sept jours: le premier jour sera un jour de repos, et le huitième sera un jour de repos. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Vous prendrez, le premier jour, du fruit des beaux arbres, des branches de palmiers, des rameaux d’arbres touffus et des saules de rivière; et vous vous réjouirez devant l’Éternel, votre Dieu, pendant sept jours. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Vous célébrerez chaque année cette fête à l’Éternel, pendant sept jours. C’est une loi perpétuelle pour vos descendants. Vous la célébrerez le septième mois. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Vous demeurerez pendant sept jours sous des tentes; tous les indigènes en Israël demeureront sous des tentes, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'afin que vos descendants sachent que j’ai fait habiter sous des tentes les enfants d’Israël, après les avoir fait sortir du pays d’Égypte. Je suis l’Éternel, votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: C’est ainsi que Moïse dit aux enfants d’Israël quelles sont les fêtes de l’Éternel.
