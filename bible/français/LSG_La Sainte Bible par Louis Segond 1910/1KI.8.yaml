document_id: 1KI.8,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dédicace du temple. — Prière de Salomon. — Seconde apparition de Dieu à Salomon
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. 2 Ch 5. Ps 68:25. Ap 11:19.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le roi Salomon '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 5:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'assembla près de lui à Jérusalem les anciens d’Israël et tous les chefs des tribus, les chefs de famille des enfants d’Israël, pour transporter '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 5:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'de la cité de David, qui est Sion, l’arche de l’alliance de l’Éternel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au moment où les sacrificateurs sortirent du lieu saint, la nuée remplit la maison de l’Éternel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 40:34
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '35'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 7:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les sacrificateurs ne purent pas y rester pour faire le service, à cause de la nuée; car la gloire de l’Éternel remplissait la maison de l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-21: cf. 2 Ch 6:1-11. Ps 115:1.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Salomon dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 16:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 4:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 6:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'L’Éternel veut habiter dans l’obscurité! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai bâti une maison qui sera ta demeure, un lieu où tu résideras éternellement! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi tourna son visage, et bénit toute l’assemblée d’Israël; et toute l’assemblée d’Israël était debout. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il dit: Béni soit l’Éternel, le Dieu d’Israël, qui a parlé de sa bouche à David, mon père, et qui accomplit par sa puissance ce qu’il avait déclaré en disant: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 7:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 6:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Depuis le jour où j’ai fait sortir d’Égypte mon peuple d’Israël, je n’ai point choisi de ville parmi toutes les tribus d’Israël pour qu’il y fût bâti une maison où résidât mon nom, mais j’ai choisi David pour qu’il régnât sur mon peuple d’Israël! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David, mon père, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 7:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 17:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 6:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'avait l’intention de bâtir une maison au nom de l’Éternel, le Dieu d’Israël. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’Éternel dit à David, mon père: Puisque tu as eu l’intention de bâtir une maison à mon nom, tu as bien fait d’avoir eu cette intention. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seulement, ce ne sera pas toi qui bâtiras la maison; mais ce sera ton fils, sorti de tes entrailles, qui bâtira la maison à mon nom. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les hommes d’Israël se réunirent auprès du roi Salomon, au mois d’Éthanim, qui est le septième mois, pendant la fête. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel a accompli la parole qu’il avait prononcée. Je me suis élevé à la place de David, mon père, et je me suis assis sur le trône d’Israël, comme l’avait annoncé l’Éternel, et j’ai bâti la maison au nom de l’Éternel, le Dieu d’Israël. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’y ai disposé un lieu pour l’arche où est l’alliance de l’Éternel, l’alliance qu’il a faite avec nos pères quand il les fit sortir du pays d’Égypte.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-61: cf. 2 Ch 6:12-42. Ac 7:47-50. (Né 1:5-9. Lé 26:40-45.) (És 56:6, 7. Jé 3:17.)'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 6:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Salomon se plaça devant l’autel de l’Éternel, en face de toute l’assemblée d’Israël. Il étendit ses mains vers le ciel, et il dit: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O Éternel, Dieu d’Israël! Il n’y a point de Dieu semblable à toi, ni en haut dans les cieux, ni en bas sur la terre: tu gardes l’alliance et la miséricorde envers tes serviteurs qui marchent en ta présence de tout leur cœur! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi tu as tenu parole à ton serviteur David, mon père; et ce que tu as déclaré de ta bouche, tu l’accomplis en ce jour par ta puissance. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, Éternel, Dieu d’Israël, observe la promesse que tu as faite à David, mon père, en disant: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 7:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 2:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 132:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu ne manqueras jamais devant moi d’un successeur assis sur le trône d’Israël, pourvu que tes fils prennent garde à leur voie et qu’ils marchent en ma présence comme tu as marché en ma présence. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oh! Qu’elle s’accomplisse, Dieu d’Israël, la promesse que tu as faite à ton serviteur David, mon père! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 2:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 66:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 23:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7:49
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais quoi! Dieu habiterait-il véritablement sur la terre? Voici, les cieux et les cieux des cieux ne peuvent te contenir: combien moins cette maison que je t’ai bâtie! '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutefois, Éternel, mon Dieu, sois attentif à la prière de ton serviteur et à sa supplication; écoute le cri et la prière que t’adresse aujourd’hui ton serviteur. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que tes yeux soient nuit et jour ouverts sur cette maison, sur le lieu dont tu as '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 12:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'dit: Là sera mon nom! Écoute la prière que ton serviteur fait en ce lieu. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque tous les anciens d’Israël furent arrivés, les sacrificateurs portèrent l’arche. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Daigne exaucer la supplication de ton serviteur et de ton peuple d’Israël, lorsqu’ils prieront en ce lieu! Exauce du lieu de ta demeure, des cieux, exauce et pardonne! '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si quelqu’un pèche contre son prochain et qu’on lui impose un serment pour le faire jurer, et s’il vient jurer devant ton autel, dans cette maison, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'écoute-le des cieux, agis, et juge tes serviteurs; condamne le coupable, et fais retomber sa conduite sur sa tête; rends justice à l’innocent, et traite-le selon son innocence! '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand ton peuple d’Israël sera battu par l’ennemi, pour avoir péché contre toi; s’ils reviennent à toi et rendent gloire à ton nom, s’ils t’adressent des prières et des supplications dans cette maison, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'exauce-les des cieux, pardonne le péché de ton peuple d’Israël, et ramène-les dans le pays que tu as donné à leurs pères! '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand le ciel sera fermé et qu’il n’y aura point de pluie, à cause de leurs péchés contre toi, s’ils prient dans ce lieu et rendent gloire à ton nom, et s’ils se détournent de leurs péchés, parce que tu les auras châtiés, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'exauce-les des cieux, pardonne le péché de tes serviteurs et de ton peuple d’Israël, à qui tu enseigneras la bonne voie dans laquelle ils doivent marcher, et fais venir la pluie sur la terre que tu as donnée en héritage à ton peuple! '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand la famine, la peste, la rouille, la nielle, les sauterelles d’une espèce ou d’une autre, seront dans le pays, quand l’ennemi assiégera ton peuple dans son pays, dans ses portes, quand il y aura des fléaux ou des maladies quelconques; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'si un homme, si tout ton peuple d’Israël fait entendre des prières et des supplications, et que chacun reconnaisse la plaie de son cœur et étende les mains vers cette maison, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'exauce-le des cieux, du lieu de ta demeure, et pardonne; agis, et rends à chacun selon ses voies, toi qui connais le cœur de chacun, car seul tu connais le cœur de tous les enfants des hommes, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils transportèrent l’arche de l’Éternel, la tente d’assignation, et tous les ustensiles sacrés qui étaient dans la tente: ce furent les sacrificateurs et les Lévites qui les transportèrent. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et ils te craindront tout le temps qu’ils vivront dans le pays que tu as donné à nos pères! '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand l’étranger, qui n’est pas de ton peuple d’Israël, viendra d’un pays lointain, à cause de ton nom, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car on saura que ton nom est grand, ta main forte, et ton bras étendu, quand il viendra prier dans cette maison, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'exauce-le des cieux, du lieu de ta demeure, et accorde à cet étranger tout ce qu’il te demandera, afin que tous les peuples de la terre connaissent ton nom pour te craindre, comme ton peuple d’Israël, et sachent que ton nom est invoqué sur cette maison que j’ai bâtie! '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand ton peuple sortira pour combattre son ennemi, en suivant la voie que tu lui auras prescrite; s’ils adressent à l’Éternel des prières, les regards tournés vers la ville que tu as choisie et vers la maison que j’ai bâtie à ton nom, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'exauce des cieux leurs prières et leurs supplications, et fais-leur droit! '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand ils pécheront contre toi, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 6:36
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 20:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 7:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 1:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car il n’y a point d’homme qui ne pèche, quand tu seras irrité contre eux et que tu les livreras à l’ennemi, qui les emmènera captifs dans un pays ennemi, lointain ou rapproché; '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 's’ils rentrent en eux-mêmes dans le pays où ils seront captifs, s’ils reviennent à toi et t’adressent des supplications dans le pays de ceux qui les ont emmenés, et qu’ils disent: Nous avons péché, nous avons commis des iniquités, nous avons fait le mal! '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 's’ils reviennent à toi de tout leur cœur et de toute leur âme, dans le pays de leurs ennemis qui les ont emmenés captifs, s’ils t’adressent des prières, les regards tournés vers leur pays que tu as donné à leurs pères, vers la ville que tu as choisie et vers la maison que j’ai bâtie à ton nom, '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'exauce des cieux, du lieu de ta demeure, leurs prières et leurs supplications, et fais-leur droit; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi Salomon et toute l’assemblée d’Israël convoquée auprès de lui se tinrent devant l’arche. Ils sacrifièrent des brebis et des bœufs, qui ne purent être ni comptés, ni nombrés, à cause de leur multitude. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pardonne à ton peuple ses péchés et toutes ses transgressions contre toi; excite la compassion de ceux qui les retiennent captifs, afin qu’ils aient pitié d’eux, '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car ils sont ton peuple et ton héritage, et tu les as fait sortir d’Égypte, du milieu d’une fournaise de fer! '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que tes yeux soient ouverts sur la supplication de ton serviteur et sur la supplication de ton peuple d’Israël, pour les exaucer en tout ce qu’ils te demanderont! '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car tu les as séparés de tous les autres peuples de la terre pour en faire ton héritage, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 19:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 4:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:26
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme tu l’as déclaré par Moïse, ton serviteur, quand tu fis sortir d’Égypte nos pères, Seigneur Éternel! '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Salomon eut achevé d’adresser à l’Éternel toute cette prière et cette supplication, il se leva de devant l’autel de l’Éternel, où il était agenouillé, les mains étendues vers le ciel. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Debout, il bénit à haute voix toute l’assemblée d’Israël, en disant: '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Béni soit l’Éternel, qui a donné du repos à son peuple d’Israël, selon toutes ses promesses! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 21:45
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'De toutes les bonnes paroles qu’il avait prononcées par Moïse, son serviteur, aucune n’est restée sans effet. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que l’Éternel, notre Dieu, soit avec nous, comme il a été avec nos pères; qu’il ne nous abandonne point et ne nous délaisse point, '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais qu’il incline nos cœurs vers lui, afin que nous marchions dans toutes ses voies, et que nous observions ses commandements, ses lois et ses ordonnances, qu’il a prescrits à nos pères! '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que ces paroles, objet de mes supplications devant l’Éternel, soient jour et nuit présentes à l’Éternel, notre Dieu, et qu’il fasse en tout temps droit à son serviteur et à son peuple d’Israël, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les sacrificateurs portèrent l’arche de l’alliance de l’Éternel à sa place, dans le sanctuaire de la maison, dans le lieu très saint, sous les ailes des chérubins. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afin que tous les peuples de la terre reconnaissent '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 4:35
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '39'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que l’Éternel est Dieu, qu’il n’y en a point d’autre! '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que votre cœur soit tout à l’Éternel, notre Dieu, comme il l’est aujourd’hui, pour suivre ses lois et pour observer ses commandements.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 62-66: cf. 2 Ch 7:1-10. Ps 33:12. Né 8:10.'
    marker-yv: yv-h
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi et tout Israël avec lui offrirent des sacrifices devant l’Éternel. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Ch 7:5, etc.
      marker-yv: yv-n
    - type: text
      text: 'Salomon immola vingt-deux mille bœufs et cent vingt mille brebis pour le sacrifice d’actions de grâces qu’il offrit à l’Éternel. Ainsi le roi et tous les enfants d’Israël firent la dédicace de la maison de l’Éternel. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce jour, le roi consacra le milieu du parvis, qui est devant la maison de l’Éternel; car il offrit là les holocaustes, les offrandes, et les graisses des sacrifices d’actions de grâces, parce que l’autel d’airain qui est devant l’Éternel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 7:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'était trop petit pour contenir les holocaustes, les offrandes, et les graisses des sacrifices d’actions de grâces. '
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon célébra la fête en ce temps-là, et tout Israël avec lui. Une grande multitude, venue depuis les environs de Hamath jusqu’au torrent d’Égypte, s’assembla devant l’Éternel, notre Dieu, pendant sept jours, et sept autres jours, soit quatorze jours. '
  '66':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le huitième jour, il renvoya le peuple. Et ils bénirent le roi, et s’en allèrent dans leurs tentes, joyeux et le cœur content pour tout le bien que l’Éternel avait fait à David, son serviteur, et à Israël, son peuple.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car les chérubins avaient les ailes étendues sur la place de l’arche, et ils couvraient l’arche et ses barres par-dessus. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On avait donné aux barres une longueur telle que leurs extrémités se voyaient du lieu saint devant le sanctuaire, mais ne se voyaient point du dehors. Elles ont été là jusqu’à ce jour. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il n’y avait dans l’arche que les deux tables de pierre, que Moïse y déposa en Horeb, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 34:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'lorsque l’Éternel fit alliance avec les enfants d’Israël, à leur sortie du pays d’Égypte. '
