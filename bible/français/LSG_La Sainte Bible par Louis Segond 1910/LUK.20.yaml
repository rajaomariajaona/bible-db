document_id: LUK.20,93
type_code: fra
verses:
  '1':
  - type: heading
    content: L’autorité de Jésus
  - type: heading
    content: 'V. 1-8: cf. (Mt 21:23-27. Mc 11:27-33.) Lu 2:34, 35.'
  - type: text
    content: ' '
  - type: note
    content: Mt 21:23. Mc 11:27. Ac 4:7; 7:27.
  - type: text
    content: 'Un de ces jours-là, comme Jésus enseignait le peuple dans le temple et qu’il annonçait la bonne nouvelle, les principaux sacrificateurs et les scribes, avec les anciens, survinrent, '
  '10':
  - type: text
    content: ' '
  - type: text
    content: Au temps de la récolte, il envoya un serviteur vers les vignerons, pour qu’ils lui donnent une part du produit de la vigne. Les vignerons le battirent, et le renvoyèrent à vide.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Il envoya encore un autre serviteur; ils le battirent, l’outragèrent, et le renvoyèrent à vide.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Il en envoya encore un troisième; ils le blessèrent, et le chassèrent.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Le maître de la vigne dit: Que ferai-je? J’enverrai mon fils bien-aimé; peut-être auront-ils pour lui du respect.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Mais, quand les vignerons le virent, ils raisonnèrent entre eux, et dirent:'
  - type: text
    content: ' '
  - type: note
    content: Ps 2:8. Hé 1:2.
  - type: text
    content: Voici l’héritier;
  - type: text
    content: ' '
  - type: note
    content: Ge 37:18. Ps 2:1. Mt 26:3; 27:1. Jn 11:53.
  - type: text
    content: tuons-le, afin que l’héritage soit à nous.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Et ils le jetèrent hors de la vigne, et le tuèrent. Maintenant, que leur fera le maître de la vigne?
  - type: text
    content: ' '
  '16':
  - type: text
    content: Il viendra, fera périr ces vignerons, et il donnera la vigne à d’autres.
  - type: text
    content: ' Lorsqu’ils eurent entendu cela, ils dirent: A Dieu ne plaise! '
  '17':
  - type: text
    content: 'Mais, jetant les regards sur eux, Jésus dit: '
  - type: text
    content: Que signifie donc ce qui est
  - type: text
    content: ' '
  - type: note
    content: Ps 118:22. És 8:14; 28:16. Mt 21:42. Mc 12:10. Ac 4:11. Ro 9:33. 1 Pi 2:4, 7.
  - type: text
    content: 'écrit:'
  - type: text
    content: La pierre qu’ont rejetée ceux qui bâtissaient
  - type: text
    content: Est devenue la principale de l’angle?
  '18':
  - type: text
    content: ' '
  - type: note
    content: És 8:15. Za 12:3.
  - type: text
    content: Quiconque tombera sur cette pierre s’y brisera, et
  - type: text
    content: ' '
  - type: note
    content: Da 2:34.
  - type: text
    content: celui sur qui elle tombera sera écrasé.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Les principaux sacrificateurs et les scribes cherchèrent à mettre la main sur lui à l’heure même, mais ils craignirent le peuple. Ils avaient compris que c’était pour eux que Jésus avait dit cette parabole.
  - type: heading
    content: Questions captieuses proposées à Jésus sur le tribut à César. La résurrection
  - type: heading
    content: 'V. 20-26: cf. (Mt 22:15-22. Mc 12:13-17.)'
  '2':
  - type: text
    content: 'et lui dirent: Dis-nous, par quelle autorité fais-tu ces choses, ou qui est celui qui t’a donné cette autorité? '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Mt 22:16. Mc 12:13.
  - type: text
    content: 'Ils se mirent à observer Jésus; et ils envoyèrent des gens qui feignaient d’être justes, pour lui tendre des pièges et saisir de lui quelque parole, afin de le livrer au magistrat et à l’autorité du gouverneur. '
  '21':
  - type: text
    content: 'Ces gens lui posèrent cette question: Maître, nous savons que tu parles et enseignes droitement, et que tu ne regardes pas à l’apparence, mais que tu enseignes la voie de Dieu selon la vérité. '
  '22':
  - type: text
    content: 'Nous est-il permis, ou non, de payer le tribut à César? '
  '23':
  - type: text
    content: 'Jésus, apercevant leur ruse, leur répondit: '
  - type: text
    content: Montrez-moi un denier.
  '24':
  - type: text
    content: ' '
  - type: text
    content: De qui porte-t-il l’effigie et l’inscription?
  - type: text
    content: ' De César, répondirent-ils. '
  '25':
  - type: text
    content: 'Alors il leur dit: '
  - type: note
    content: Mt 17:25; 22:21. Ro 13:7.
  - type: text
    content: Rendez donc à César ce qui est à César, et à Dieu ce qui est à Dieu.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Ils ne purent rien reprendre dans ses paroles devant le peuple; mais, étonnés de sa réponse, ils gardèrent le silence.
  - type: heading
    content: 'V. 27-40: cf. (Mt 22:23-33. Mc 12:18-27.) 1 Co 15.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: Mt 22:23. Mc 12:18. Ac 23:8.
  - type: text
    content: 'Quelques-uns des sadducéens, qui disent qu’il n’y a point de résurrection, s’approchèrent, et posèrent à Jésus cette question: '
  '28':
  - type: text
    content: 'Maître, voici ce que '
  - type: note
    content: De 25:5.
  - type: text
    content: 'Moïse nous a prescrit: Si le frère de quelqu’un meurt, ayant une femme sans avoir d’enfants, son frère épousera la femme, et suscitera une postérité à son frère. '
  '29':
  - type: text
    content: 'Or, il y avait sept frères. Le premier se maria, et mourut sans enfants. '
  '3':
  - type: text
    content: 'Il leur répondit: '
  - type: text
    content: Je vous adresserai aussi une question.
  '30':
  - type: text
    content: 'Le second et le troisième épousèrent la veuve; '
  '31':
  - type: text
    content: 'il en fut de même des sept, qui moururent sans laisser d’enfants. '
  '32':
  - type: text
    content: 'Enfin, la femme mourut aussi. '
  '33':
  - type: text
    content: 'A la résurrection, duquel d’entre eux sera-t-elle donc la femme? Car les sept l’ont eue pour femme. '
  '34':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: Les enfants de ce siècle prennent des femmes et des maris;
  '35':
  - type: text
    content: ' '
  - type: text
    content: mais ceux qui seront trouvés dignes d’avoir part au siècle à venir et à la résurrection des morts ne prendront ni femmes ni maris.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Car ils ne pourront plus mourir, parce qu’ils seront
  - type: text
    content: ' '
  - type: note
    content: 1 Jn 3:2.
  - type: text
    content: semblables aux anges, et qu’ils seront fils de Dieu, étant fils de la résurrection.
  - type: text
    content: ' '
  '37':
  - type: text
    content: Que les morts ressuscitent, c’est ce que Moïse a fait connaître quand, à propos du buisson, il appelle
  - type: text
    content: ' '
  - type: note
    content: Ex 3:6. Ac 7:32. Hé 11:16.
  - type: text
    content: le Seigneur le Dieu d’Abraham, le Dieu d’Isaac, et le Dieu de Jacob.
  - type: text
    content: ' '
  '38':
  - type: text
    content: Or, Dieu n’est pas Dieu des morts, mais des vivants; car pour lui tous sont vivants.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Quelques-uns des scribes, prenant la parole, dirent: Maître, tu as bien parlé. '
  '4':
  - type: text
    content: ' '
  - type: text
    content: Dites-moi, le baptême de Jean venait-il du ciel, ou des hommes?
  - type: text
    content: ' '
  '40':
  - type: text
    content: Et ils n’osaient plus lui faire aucune question.
  - type: heading
    content: De qui le Christ est-il fils?
  - type: heading
    content: 'V. 41-44: cf. (Mt 22:41-46. Mc 12:35-37.) És 9:5, 6. Jé 23:5, 6.'
  '41':
  - type: text
    content: ' '
  - type: note
    content: Mt 22:42. Mc 12:35.
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: Comment dit-on que le Christ est fils de David?
  '42':
  - type: text
    content: ' '
  - type: text
    content: 'David lui-même dit dans le livre des Psaumes:'
  - type: note
    content: Ps 110:1. Ac 2:34. 1 Co 15:25. Hé 1:13; 10:13.
  - type: text
    content: 'Le Seigneur a dit à mon Seigneur:'
  - type: text
    content: Assieds-toi à ma droite,
  '43':
  - type: text
    content: ' '
  - type: text
    content: Jusqu’à ce que je fasse de tes ennemis ton marchepied.
  '44':
  - type: text
    content: ' '
  - type: text
    content: David donc l’appelle Seigneur; comment est-il son fils?
  - type: heading
    content: Les scribes censurés par Jésus
  - type: heading
    content: 'V. 45-47: cf. (Mt 23:1-33. Mc 12:38-40.)'
  '45':
  - type: text
    content: 'Tandis que tout le peuple l’écoutait, il dit à ses disciples:'
  '46':
  - type: text
    content: ' '
  - type: note
    content: Mt 23:5, 6. Mc 12:38, 39. Lu 11:43.
  - type: text
    content: Gardez-vous des scribes, qui aiment à se promener en robes longues, et à être salués dans les places publiques; qui recherchent les premiers sièges dans les synagogues, et les premières places dans les festins;
  - type: text
    content: ' '
  '47':
  - type: note
    content: Mt 23:14. Mc 12:40. 2 Ti 3:6. Tit 1:11.
  - type: text
    content: qui dévorent les maisons des veuves, et qui font pour l’apparence de longues prières. Ils seront jugés plus sévèrement.
  '5':
  - type: text
    content: 'Mais ils raisonnèrent ainsi entre eux: Si nous répondons: Du ciel, il dira: Pourquoi n’avez-vous pas cru en lui? '
  '6':
  - type: text
    content: 'Et si nous répondons: Des hommes, tout le peuple nous lapidera, car il est persuadé que Jean était un prophète. '
  '7':
  - type: text
    content: 'Alors ils répondirent qu’ils ne savaient d’où il venait. '
  '8':
  - type: text
    content: 'Et Jésus leur dit: '
  - type: text
    content: Moi non plus, je ne vous dirai pas par quelle autorité je fais ces choses.
  - type: heading
    content: Parabole des vignerons. La pierre de l’angle
  - type: heading
    content: 'V. 9-19: cf. (Mt 21:33-46. Mc 12:1-12.)'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ps 80:9. És 5:1. Jé 2:21; 12:10. Mt 21:33. Mc 12:1.
  - type: text
    content: 'Il se mit ensuite à dire au peuple cette parabole: '
  - type: text
    content: Un homme planta une vigne, l’afferma à des vignerons, et quitta pour longtemps le pays.
