  - type: text
    text: 'Il se mit ensuite à dire au peuple cette parabole: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Un homme planta une vigne, l’afferma à des vignerons, et quitta pour longtemps le pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Au temps de la récolte, il envoya un serviteur vers les vignerons, pour qu’ils lui donnent une part du produit de la vigne. Les vignerons le battirent, et le renvoyèrent à vide.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il envoya encore un autre serviteur; ils le battirent, l’outragèrent, et le renvoyèrent à vide.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il en envoya encore un troisième; ils le blessèrent, et le chassèrent.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le maître de la vigne dit: Que ferai-je? J’enverrai mon fils bien-aimé; peut-être auront-ils pour lui du respect.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais, quand les vignerons le virent, ils raisonnèrent entre eux, et dirent:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 2:8
      metadata:
        usfm: PSA.2.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 1:2
      metadata:
        usfm: HEB.1.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Voici l’héritier;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 37:18
      metadata:
        usfm: GEN.37.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 2:1
      metadata:
        usfm: PSA.2.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:3
      metadata:
        usfm: MAT.26.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:1
      metadata:
        usfm: MAT.27.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 11:53
      metadata:
        usfm: JHN.11.53
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: tuons-le, afin que l’héritage soit à nous.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et ils le jetèrent hors de la vigne, et le tuèrent. Maintenant, que leur fera le maître de la vigne?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il viendra, fera périr ces vignerons, et il donnera la vigne à d’autres.
  - type: text
    text: ' Lorsqu’ils eurent entendu cela, ils dirent: A Dieu ne plaise! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais, jetant les regards sur eux, Jésus dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que signifie donc ce qui est
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 118:22
      metadata:
        usfm: PSA.118.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 8:14
      metadata:
        usfm: ISA.8.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:16
      metadata:
        usfm: ISA.28.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:42
      metadata:
        usfm: MAT.21.42
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 12:10
      metadata:
        usfm: MRK.12.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:11
      metadata:
        usfm: ACT.4.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:33
      metadata:
        usfm: ROM.9.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:4
      metadata:
        usfm: 1PE.2.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: 1PE.2.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'écrit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: La pierre qu’ont rejetée ceux qui bâtissaient
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Est devenue la principale de l’angle?
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 8:15
      metadata:
        usfm: ISA.8.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 12:3
      metadata:
        usfm: ZEC.12.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quiconque tombera sur cette pierre s’y brisera, et
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 2:34
      metadata:
        usfm: DAN.2.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: celui sur qui elle tombera sera écrasé.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Les principaux sacrificateurs et les scribes cherchèrent à mettre la main sur lui à l’heure même, mais ils craignirent le peuple. Ils avaient compris que c’était pour eux que Jésus avait dit cette parabole.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Questions captieuses proposées à Jésus sur le tribut à César. La résurrection
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-26: cf. (Mt 22:15-22. Mc 12:13-17.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:16
      metadata:
        usfm: MAT.22.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 12:13
      metadata:
        usfm: MRK.12.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils se mirent à observer Jésus; et ils envoyèrent des gens qui feignaient d’être justes, pour lui tendre des pièges et saisir de lui quelque parole, afin de le livrer au magistrat et à l’autorité du gouverneur. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ces gens lui posèrent cette question: Maître, nous savons que tu parles et enseignes droitement, et que tu ne regardes pas à l’apparence, mais que tu enseignes la voie de Dieu selon la vérité. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nous est-il permis, ou non, de payer le tribut à César? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus, apercevant leur ruse, leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Montrez-moi un denier.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: De qui porte-t-il l’effigie et l’inscription?
  - type: text
    text: ' De César, répondirent-ils. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Alors il leur dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 17:25
      metadata:
        usfm: MAT.17.25
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:21
      metadata:
        usfm: MAT.22.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 13:7
      metadata:
        usfm: ROM.13.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Rendez donc à César ce qui est à César, et à Dieu ce qui est à Dieu.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ils ne purent rien reprendre dans ses paroles devant le peuple; mais, étonnés de sa réponse, ils gardèrent le silence.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 27-40: cf. (Mt 22:23-33. Mc 12:18-27.) 1 Co 15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:23
      metadata:
        usfm: MAT.22.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 12:18
      metadata:
        usfm: MRK.12.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 23:8
      metadata:
        usfm: ACT.23.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quelques-uns des sadducéens, qui disent qu’il n’y a point de résurrection, s’approchèrent, et posèrent à Jésus cette question: '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Maître, voici ce que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 25:5
      metadata:
        usfm: DEU.25.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Moïse nous a prescrit: Si le frère de quelqu’un meurt, ayant une femme sans avoir d’enfants, son frère épousera la femme, et suscitera une postérité à son frère. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Or, il y avait sept frères. Le premier se maria, et mourut sans enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Le second et le troisième épousèrent la veuve; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'il en fut de même des sept, qui moururent sans laisser d’enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Enfin, la femme mourut aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'A la résurrection, duquel d’entre eux sera-t-elle donc la femme? Car les sept l’ont eue pour femme. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
