    marker-yv: yv-n
  - type: text
    text: 'Un de ces jours-là, comme Jésus enseignait le peuple dans le temple et qu’il annonçait la bonne nouvelle, les principaux sacrificateurs et les scribes, avec les anciens, survinrent, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et lui dirent: Dis-nous, par quelle autorité fais-tu ces choses, ou qui est celui qui t’a donné cette autorité? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous adresserai aussi une question.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Dites-moi, le baptême de Jean venait-il du ciel, ou des hommes?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais ils raisonnèrent ainsi entre eux: Si nous répondons: Du ciel, il dira: Pourquoi n’avez-vous pas cru en lui? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et si nous répondons: Des hommes, tout le peuple nous lapidera, car il est persuadé que Jean était un prophète. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors ils répondirent qu’ils ne savaient d’où il venait. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Moi non plus, je ne vous dirai pas par quelle autorité je fais ces choses.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parabole des vignerons. La pierre de l’angle
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-19: cf. (Mt 21:33-46. Mc 12:1-12.)'
  marker-yv: yv-h
