document_id: PSA.94,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 10; 5; 7:7-18. Job 19:29. Na 1:2.
  - type: text
    content: Dieu des vengeances, Éternel!
  - type: text
    content: 'Dieu des vengeances, '
  - type: note
    content: De 33:2. Ps 50:2; 80:2.
  - type: text
    content: parais!
  '10':
  - type: text
    content: Celui qui châtie les nations ne punirait-il point,
  - type: text
    content: Lui qui donne à l’homme l’intelligence?
  '11':
  - type: text
    content: ' '
  - type: note
    content: 1 Co 3:20.
  - type: text
    content: L’Éternel connaît les pensées de l’homme,
  - type: text
    content: Il sait qu’elles sont vaines.
  '12':
  - type: text
    content: Heureux l’homme que tu châties, ô Éternel!
  - type: text
    content: Et que tu instruis par ta loi,
  '13':
  - type: text
    content: Pour le calmer aux jours du malheur,
  - type: text
    content: Jusqu’à ce que la fosse soit creusée pour le méchant!
  '14':
  - type: text
    content: 'Car '
  - type: note
    content: 1 S 12:22. Ro 11:1, 2.
  - type: text
    content: l’Éternel ne délaisse pas son peuple,
  - type: text
    content: Il n’abandonne pas son héritage;
  '15':
  - type: text
    content: Car le jugement sera conforme à la justice,
  - type: text
    content: Et tous ceux dont le cœur est droit l’approuveront.
  '16':
  - type: text
    content: Qui se lèvera pour moi contre les méchants?
  - type: text
    content: Qui me soutiendra contre ceux qui font le mal?
  '17':
  - type: text
    content: Si l’Éternel n’était pas mon secours,
  - type: text
    content: Mon âme serait bien vite dans la demeure du silence.
  '18':
  - type: text
    content: 'Quand je dis: Mon pied chancelle!'
  - type: text
    content: Ta bonté, ô Éternel! Me sert d’appui.
  '19':
  - type: text
    content: Quand les pensées s’agitent en foule au-dedans de moi,
  - type: text
    content: Tes consolations réjouissent mon âme.
  '2':
  - type: text
    content: Lève-toi, juge de la terre!
  - type: text
    content: Rends aux superbes selon leurs œuvres!
  '20':
  - type: text
    content: Les méchants te feraient-ils siéger sur leur trône,
  - type: text
    content: Eux qui forment des desseins iniques en dépit de la loi?
  '21':
  - type: text
    content: Ils se rassemblent contre la vie du juste,
  - type: text
    content: Et ils condamnent le sang innocent.
  '22':
  - type: text
    content: Mais l’Éternel est ma retraite,
  - type: text
    content: Mon Dieu est le rocher de mon refuge.
  '23':
  - type: text
    content: Il fera retomber sur eux leur iniquité,
  - type: text
    content: Il les anéantira par leur méchanceté;
  - type: text
    content: L’Éternel, notre Dieu, les anéantira.
  '3':
  - type: text
    content: Jusques à quand les méchants, ô Éternel!
  - type: text
    content: Jusques à quand les méchants triompheront-ils?
  '4':
  - type: text
    content: Ils discourent, ils parlent avec arrogance;
  - type: text
    content: Tous ceux qui font le mal se glorifient.
  '5':
  - type: text
    content: Éternel! Ils écrasent ton peuple,
  - type: text
    content: Ils oppriment ton héritage;
  '6':
  - type: text
    content: Ils égorgent la veuve et l’étranger,
  - type: text
    content: Ils assassinent les orphelins.
  '7':
  - type: text
    content: 'Et ils disent: '
  - type: note
    content: Ps 10:11, 13; 59:8.
  - type: text
    content: L’Éternel ne regarde pas,
  - type: text
    content: Le Dieu de Jacob ne fait pas attention!
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ps 92:7.
  - type: text
    content: Prenez-y garde, hommes stupides!
  - type: text
    content: Insensés, quand serez-vous sages?
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ex 4:11.
  - type: text
    content: Celui qui a planté l’oreille n’entendrait-il pas?
  - type: text
    content: Celui qui a formé l’œil ne verrait-il pas?
