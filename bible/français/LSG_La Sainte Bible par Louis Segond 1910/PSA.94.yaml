document_id: PSA.94,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 10; 5; 7:7-18. Job 19:29. Na 1:2.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Dieu des vengeances, Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dieu des vengeances, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 33:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 50:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 80:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: parais!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Celui qui châtie les nations ne punirait-il point,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui qui donne à l’homme l’intelligence?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 3:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’Éternel connaît les pensées de l’homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il sait qu’elles sont vaines.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Heureux l’homme que tu châties, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que tu instruis par ta loi,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Pour le calmer aux jours du malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ce que la fosse soit creusée pour le méchant!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Car '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 12:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 11:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: l’Éternel ne délaisse pas son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’abandonne pas son héritage;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Car le jugement sera conforme à la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tous ceux dont le cœur est droit l’approuveront.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Qui se lèvera pour moi contre les méchants?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui me soutiendra contre ceux qui font le mal?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Si l’Éternel n’était pas mon secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme serait bien vite dans la demeure du silence.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Quand je dis: Mon pied chancelle!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta bonté, ô Éternel! Me sert d’appui.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Quand les pensées s’agitent en foule au-dedans de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes consolations réjouissent mon âme.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Lève-toi, juge de la terre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rends aux superbes selon leurs œuvres!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Les méchants te feraient-ils siéger sur leur trône,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eux qui forment des desseins iniques en dépit de la loi?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ils se rassemblent contre la vie du juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils condamnent le sang innocent.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Mais l’Éternel est ma retraite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu est le rocher de mon refuge.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Il fera retomber sur eux leur iniquité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les anéantira par leur méchanceté;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel, notre Dieu, les anéantira.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Jusques à quand les méchants, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusques à quand les méchants triompheront-ils?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ils discourent, ils parlent avec arrogance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui font le mal se glorifient.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Éternel! Ils écrasent ton peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils oppriment ton héritage;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ils égorgent la veuve et l’étranger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils assassinent les orphelins.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Et ils disent: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 10:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 59:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’Éternel ne regarde pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Dieu de Jacob ne fait pas attention!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 92:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Prenez-y garde, hommes stupides!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Insensés, quand serez-vous sages?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 4:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Celui qui a planté l’oreille n’entendrait-il pas?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui a formé l’œil ne verrait-il pas?
