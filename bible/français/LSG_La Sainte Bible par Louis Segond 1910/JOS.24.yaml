document_id: JOS.24,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Dernière assemblée à Sichem. Souvenirs nationaux. Promesses du peuple
  - type: heading
    content: 'V. 1-13: cf. (Né 9:7-15. Ps 105.) De 4:32-40; 32:7-14.'
  - type: text
    content: 'Josué assembla toutes les tribus d’Israël à Sichem, et il convoqua les anciens d’Israël, ses chefs, ses juges et ses officiers. Et ils se présentèrent devant Dieu. '
  '10':
  - type: text
    content: 'Mais je ne voulus point écouter Balaam; il vous bénit, et je vous délivrai de la main de Balak. '
  '11':
  - type: note
    content: Jos 3:14; 6:1.
  - type: text
    content: 'Vous passâtes le Jourdain, et vous arrivâtes à Jéricho. Les habitants de Jéricho combattirent contre vous, les Amoréens, les Phéréziens, les Cananéens, les Héthiens, les Guirgasiens, les Héviens et les Jébusiens. '
  - type: note
    content: Jos 6:20; 10:8; 11:8.
  - type: text
    content: 'Je les livrai entre vos mains, '
  '12':
  - type: text
    content: 'et '
  - type: note
    content: Ex 23:28. De 7:20.
  - type: text
    content: 'j’envoyai devant vous les frelons, qui les chassèrent loin de votre face, comme '
  - type: note
    content: Ps 44:4.
  - type: text
    content: 'les deux rois des Amoréens: ce ne fut ni par ton épée, ni par ton arc. '
  '13':
  - type: note
    content: De 6:10, 11, 12.
  - type: text
    content: Je vous donnai un pays que vous n’aviez point cultivé, des villes que vous n’aviez point bâties et que vous habitez, des vignes et des oliviers que vous n’aviez point plantés et qui vous servent de nourriture.
  - type: heading
    content: 'V. 14-28: cf. (De 29. 2 Ch 15:8-15; 34:29-33.)'
  '14':
  - type: text
    content: 'Maintenant, craignez l’Éternel, et servez-le avec intégrité et fidélité. Faites disparaître les dieux qu’ont servis vos pères de l’autre côté du fleuve et en Égypte, et servez l’Éternel. '
  '15':
  - type: text
    content: 'Et si vous ne trouvez pas bon de servir l’Éternel, choisissez aujourd’hui qui vous voulez servir, ou les dieux que servaient vos pères au-delà du fleuve, ou les dieux des Amoréens dans le pays desquels vous habitez. Moi et ma maison, nous servirons l’Éternel. '
  '16':
  - type: text
    content: 'Le peuple répondit, et dit: Loin de nous la pensée d’abandonner l’Éternel, et de servir d’autres dieux! '
  '17':
  - type: text
    content: 'Car l’Éternel est notre Dieu; c’est lui qui nous a fait sortir du pays d’Égypte, de la maison de servitude, nous et nos pères; c’est lui qui a opéré sous nos yeux ces grands prodiges, et qui nous a gardés pendant toute la route que nous avons suivie et parmi tous les peuples au milieu desquels nous avons passé. '
  '18':
  - type: text
    content: 'Il a chassé devant nous tous les peuples, et les Amoréens qui habitaient ce pays. Nous aussi, nous servirons l’Éternel, car il est notre Dieu. '
  '19':
  - type: text
    content: 'Josué dit au peuple: Vous n’aurez pas la force de servir l’Éternel, car c’est un Dieu saint, c’est un Dieu jaloux; il ne pardonnera point vos transgressions et vos péchés. '
  '2':
  - type: text
    content: 'Josué dit à tout le peuple: Ainsi parle l’Éternel, le Dieu d’Israël: Vos pères, '
  - type: note
    content: De 26:5.
  - type: text
    content: 'Térach, père d’Abraham et père de Nachor, habitaient anciennement '
  - type: note
    content: Ge 11:26, 31.
  - type: text
    content: 'de l’autre côté du fleuve, et ils servaient d’autres dieux. '
  '20':
  - type: text
    content: 'Lorsque vous abandonnerez l’Éternel et que vous servirez des dieux étrangers, '
  - type: note
    content: Jos 23:15.
  - type: text
    content: 'il reviendra vous faire du mal, et il vous consumera après vous avoir fait du bien. '
  '21':
  - type: text
    content: 'Le peuple dit à Josué: Non! Car nous servirons l’Éternel. '
  '22':
  - type: text
    content: 'Josué dit au peuple: Vous êtes témoins contre vous-mêmes que c’est vous qui avez choisi l’Éternel pour le servir. Ils répondirent: Nous en sommes témoins. '
  '23':
  - type: text
    content: 'Otez donc les dieux étrangers qui sont au milieu de vous, et tournez votre cœur vers l’Éternel, le Dieu d’Israël. '
  '24':
  - type: text
    content: 'Et le peuple dit à Josué: Nous servirons l’Éternel, notre Dieu, et nous obéirons à sa voix. '
  '25':
  - type: note
    content: Ex 15:25.
  - type: text
    content: 'Josué fit en ce jour une alliance avec le peuple, et lui donna des lois et des ordonnances, à Sichem. '
  '26':
  - type: text
    content: 'Josué écrivit ces choses dans le livre de la loi de Dieu. Il prit une grande pierre, qu’il dressa là sous le chêne qui était dans le lieu consacré à l’Éternel. '
  '27':
  - type: text
    content: 'Et Josué dit à tout le peuple: Voici, cette pierre servira de témoin contre nous, car elle a entendu toutes les paroles que l’Éternel nous a dites; elle servira de témoin contre vous, afin que vous ne soyez pas infidèles à votre Dieu.'
  - type: heading
    content: Mort de Josué
  - type: heading
    content: 'V. 29-33: cf. Jg 2:6-9. (Ge 50:24-26. Ex 13:19. Hé 11:22.)'
  '28':
  - type: text
    content: 'Puis Josué renvoya le peuple, chacun dans son héritage. '
  '29':
  - type: text
    content: 'Après ces choses, Josué, fils de Nun, serviteur de l’Éternel, mourut, âgé de cent dix ans. '
  '3':
  - type: note
    content: Ge 12:1.
  - type: text
    content: 'Je pris votre père Abraham de l’autre côté du fleuve, et je lui fis parcourir tout le pays de Canaan; '
  - type: note
    content: Ge 21:2.
  - type: text
    content: 'je multipliai sa postérité, et je lui donnai Isaac. '
  '30':
  - type: text
    content: 'On l’ensevelit dans le territoire qu’il avait eu en partage, '
  - type: note
    content: Jos 19:50. Jg 2:9.
  - type: text
    content: 'à Thimnath-Sérach, dans la montagne d’Éphraïm, au nord de la montagne de Gaasch. '
  '31':
  - type: text
    content: 'Israël servit l’Éternel pendant toute la vie de Josué, et pendant toute la vie des anciens qui survécurent à Josué et qui connaissaient tout ce que l’Éternel avait fait en faveur d’Israël. '
  '32':
  - type: text
    content: 'Les os de Joseph, '
  - type: note
    content: Ge 50:25. Ex 13:19.
  - type: text
    content: 'que les enfants d’Israël avaient rapportés d’Égypte, furent enterrés à Sichem, dans la portion du champ que Jacob avait achetée des fils de Hamor, père de Sichem, pour cent kesita, et qui appartint à l’héritage des fils de Joseph. '
  '33':
  - type: text
    content: Éléazar, fils d’Aaron, mourut, et on l’enterra à Guibeath-Phinées, qui avait été donnée à son fils Phinées, dans la montagne d’Éphraïm.
  '4':
  - type: note
    content: Ge 2:24.
  - type: text
    content: 'Je donnai à Isaac Jacob et Ésaü, et '
  - type: note
    content: Ge 36:8.
  - type: text
    content: 'je donnai en propriété à Ésaü la montagne de Séir, '
  - type: note
    content: Ge 46:1.
  - type: text
    content: 'mais Jacob et ses fils descendirent en Égypte. '
  '5':
  - type: note
    content: Ex 3:10, etc.; 12:37.
  - type: text
    content: 'J’envoyai Moïse et Aaron, et je frappai l’Égypte par les prodiges que j’opérai au milieu d’elle; puis je vous en fis sortir. '
  '6':
  - type: text
    content: 'Je fis sortir vos pères de l’Égypte, et vous arrivâtes à la mer. '
  - type: note
    content: Ex 14:1, etc.
  - type: text
    content: 'Les Égyptiens poursuivirent vos pères jusqu’à la mer Rouge, avec des chars et des cavaliers. '
  '7':
  - type: text
    content: 'Vos pères crièrent à l’Éternel. Et l’Éternel mit des ténèbres entre vous et les Égyptiens, il ramena sur eux la mer, et elle les couvrit. Vos yeux ont vu ce que j’ai fait aux Égyptiens. Et vous restâtes longtemps dans le désert. '
  '8':
  - type: note
    content: No 21:21, 33.
  - type: text
    content: 'Je vous conduisis dans le pays des Amoréens, qui habitaient de l’autre côté du Jourdain, et ils combattirent contre vous. Je les livrai entre vos mains; vous prîtes possession de leur pays, et je les détruisis devant vous. '
  '9':
  - type: note
    content: No 22:5. De 23:4. Jg 11:25.
  - type: text
    content: 'Balak, fils de Tsippor, roi de Moab, se leva et combattit Israël. Il fit appeler Balaam, fils de Beor, pour qu’il vous maudît. '
