document_id: JOS.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dernière assemblée à Sichem. Souvenirs nationaux. Promesses du peuple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. (Né 9:7-15. Ps 105.) De 4:32-40; 32:7-14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Josué assembla toutes les tribus d’Israël à Sichem, et il convoqua les anciens d’Israël, ses chefs, ses juges et ses officiers. Et ils se présentèrent devant Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Josué dit à tout le peuple: Ainsi parle l’Éternel, le Dieu d’Israël: Vos pères, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 26:5
      metadata:
        usfm: DEU.26.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Térach, père d’Abraham et père de Nachor, habitaient anciennement '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 11:26
      metadata:
        usfm: GEN.11.26
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '31'
      metadata:
        usfm: GEN.11.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de l’autre côté du fleuve, et ils servaient d’autres dieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 12:1
      metadata:
        usfm: GEN.12.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je pris votre père Abraham de l’autre côté du fleuve, et je lui fis parcourir tout le pays de Canaan; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 21:2
      metadata:
        usfm: GEN.21.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je multipliai sa postérité, et je lui donnai Isaac. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 2:24
      metadata:
        usfm: GEN.2.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je donnai à Isaac Jacob et Ésaü, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 36:8
      metadata:
        usfm: GEN.36.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je donnai en propriété à Ésaü la montagne de Séir, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 46:1
      metadata:
        usfm: GEN.46.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais Jacob et ses fils descendirent en Égypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ex 3:10, etc.; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:37
      metadata:
        usfm: EXO.12.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'J’envoyai Moïse et Aaron, et je frappai l’Égypte par les prodiges que j’opérai au milieu d’elle; puis je vous en fis sortir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je fis sortir vos pères de l’Égypte, et vous arrivâtes à la mer. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex 14:1, etc.
    marker-yv: yv-n
  - type: text
    text: 'Les Égyptiens poursuivirent vos pères jusqu’à la mer Rouge, avec des chars et des cavaliers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vos pères crièrent à l’Éternel. Et l’Éternel mit des ténèbres entre vous et les Égyptiens, il ramena sur eux la mer, et elle les couvrit. Vos yeux ont vu ce que j’ai fait aux Égyptiens. Et vous restâtes longtemps dans le désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 21:21
      metadata:
        usfm: NUM.21.21
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '33'
      metadata:
        usfm: NUM.21.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je vous conduisis dans le pays des Amoréens, qui habitaient de l’autre côté du Jourdain, et ils combattirent contre vous. Je les livrai entre vos mains; vous prîtes possession de leur pays, et je les détruisis devant vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 22:5
      metadata:
        usfm: NUM.22.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 23:4
      metadata:
        usfm: DEU.23.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 11:25
      metadata:
        usfm: JDG.11.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Balak, fils de Tsippor, roi de Moab, se leva et combattit Israël. Il fit appeler Balaam, fils de Beor, pour qu’il vous maudît. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais je ne voulus point écouter Balaam; il vous bénit, et je vous délivrai de la main de Balak. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 3:14
      metadata:
        usfm: JOS.3.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:1
      metadata:
        usfm: JOS.6.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous passâtes le Jourdain, et vous arrivâtes à Jéricho. Les habitants de Jéricho combattirent contre vous, les Amoréens, les Phéréziens, les Cananéens, les Héthiens, les Guirgasiens, les Héviens et les Jébusiens. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 6:20
      metadata:
        usfm: JOS.6.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:8
      metadata:
        usfm: JOS.10.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:8
      metadata:
        usfm: JOS.11.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je les livrai entre vos mains, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:28
      metadata:
        usfm: EXO.23.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:20
      metadata:
        usfm: DEU.7.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'j’envoyai devant vous les frelons, qui les chassèrent loin de votre face, comme '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 44:4
      metadata:
        usfm: PSA.44.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les deux rois des Amoréens: ce ne fut ni par ton épée, ni par ton arc. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 6:10
      metadata:
        usfm: DEU.6.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: DEU.6.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: DEU.6.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je vous donnai un pays que vous n’aviez point cultivé, des villes que vous n’aviez point bâties et que vous habitez, des vignes et des oliviers que vous n’aviez point plantés et qui vous servent de nourriture.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-28: cf. (De 29. 2 Ch 15:8-15; 34:29-33.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Maintenant, craignez l’Éternel, et servez-le avec intégrité et fidélité. Faites disparaître les dieux qu’ont servis vos pères de l’autre côté du fleuve et en Égypte, et servez l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et si vous ne trouvez pas bon de servir l’Éternel, choisissez aujourd’hui qui vous voulez servir, ou les dieux que servaient vos pères au-delà du fleuve, ou les dieux des Amoréens dans le pays desquels vous habitez. Moi et ma maison, nous servirons l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le peuple répondit, et dit: Loin de nous la pensée d’abandonner l’Éternel, et de servir d’autres dieux! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Car l’Éternel est notre Dieu; c’est lui qui nous a fait sortir du pays d’Égypte, de la maison de servitude, nous et nos pères; c’est lui qui a opéré sous nos yeux ces grands prodiges, et qui nous a gardés pendant toute la route que nous avons suivie et parmi tous les peuples au milieu desquels nous avons passé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il a chassé devant nous tous les peuples, et les Amoréens qui habitaient ce pays. Nous aussi, nous servirons l’Éternel, car il est notre Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Josué dit au peuple: Vous n’aurez pas la force de servir l’Éternel, car c’est un Dieu saint, c’est un Dieu jaloux; il ne pardonnera point vos transgressions et vos péchés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Lorsque vous abandonnerez l’Éternel et que vous servirez des dieux étrangers, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 23:15
      metadata:
        usfm: JOS.23.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il reviendra vous faire du mal, et il vous consumera après vous avoir fait du bien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le peuple dit à Josué: Non! Car nous servirons l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Josué dit au peuple: Vous êtes témoins contre vous-mêmes que c’est vous qui avez choisi l’Éternel pour le servir. Ils répondirent: Nous en sommes témoins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Otez donc les dieux étrangers qui sont au milieu de vous, et tournez votre cœur vers l’Éternel, le Dieu d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Et le peuple dit à Josué: Nous servirons l’Éternel, notre Dieu, et nous obéirons à sa voix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 15:25
      metadata:
        usfm: EXO.15.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Josué fit en ce jour une alliance avec le peuple, et lui donna des lois et des ordonnances, à Sichem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Josué écrivit ces choses dans le livre de la loi de Dieu. Il prit une grande pierre, qu’il dressa là sous le chêne qui était dans le lieu consacré à l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Et Josué dit à tout le peuple: Voici, cette pierre servira de témoin contre nous, car elle a entendu toutes les paroles que l’Éternel nous a dites; elle servira de témoin contre vous, afin que vous ne soyez pas infidèles à votre Dieu.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mort de Josué
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 29-33: cf. Jg 2:6-9. (Ge 50:24-26. Ex 13:19. Hé 11:22.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Puis Josué renvoya le peuple, chacun dans son héritage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Après ces choses, Josué, fils de Nun, serviteur de l’Éternel, mourut, âgé de cent dix ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'On l’ensevelit dans le territoire qu’il avait eu en partage, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 19:50
      metadata:
        usfm: JOS.19.50
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 2:9
      metadata:
        usfm: JDG.2.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à Thimnath-Sérach, dans la montagne d’Éphraïm, au nord de la montagne de Gaasch. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Israël servit l’Éternel pendant toute la vie de Josué, et pendant toute la vie des anciens qui survécurent à Josué et qui connaissaient tout ce que l’Éternel avait fait en faveur d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Les os de Joseph, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 50:25
      metadata:
        usfm: GEN.50.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:19
      metadata:
        usfm: EXO.13.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que les enfants d’Israël avaient rapportés d’Égypte, furent enterrés à Sichem, dans la portion du champ que Jacob avait achetée des fils de Hamor, père de Sichem, pour cent kesita, et qui appartint à l’héritage des fils de Joseph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Éléazar, fils d’Aaron, mourut, et on l’enterra à Guibeath-Phinées, qui avait été donnée à son fils Phinées, dans la montagne d’Éphraïm.
