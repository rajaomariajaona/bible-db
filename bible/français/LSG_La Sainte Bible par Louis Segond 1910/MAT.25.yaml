document_id: MAT.25,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Parabole des dix vierges
  - type: heading
    content: 'V. 1-13: cf. Mt 24:42, 44. Lu 12:35-40. 1 Th 5:1-11. (Ap 3:1-5; 19:6-9.)'
  - type: text
    content: ' '
  - type: text
    content: Alors le royaume des cieux sera semblable à dix vierges qui, ayant pris leurs lampes, allèrent à la rencontre de l’époux.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Pendant qu’elles allaient en acheter, l’époux arriva; celles qui étaient prêtes entrèrent avec lui dans la salle des noces, et la porte fut fermée.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Plus tard, les autres vierges vinrent, et dirent: Seigneur, Seigneur, ouvre-nous.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Mais il répondit: Je vous le dis en vérité, je ne vous'
  - type: text
    content: ' '
  - type: note
    content: Mt 7:23. Lu 13:25.
  - type: text
    content: connais pas.
  - type: text
    content: ' '
  '13':
  - type: note
    content: Mt 24:42. Mc 13:33, 35.
  - type: text
    content: Veillez donc, puisque vous ne savez ni le jour, ni l’heure.
  - type: heading
    content: Parabole des talents
  - type: heading
    content: 'V. 14-30: cf. Lu 19:12-27. Ro 14:7, 8.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Lu 19:12.
  - type: text
    content: Il en sera comme d’un homme qui, partant pour un voyage, appela ses serviteurs, et leur remit ses biens.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Il donna cinq talents à l’un, deux à l’autre, et un au troisième, à chacun selon sa capacité, et il partit.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Aussitôt celui qui avait reçu les cinq talents s’en alla, les fit valoir, et il gagna cinq autres talents.
  - type: text
    content: ' '
  '17':
  - type: text
    content: De même, celui qui avait reçu les deux talents en gagna deux autres.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Celui qui n’en avait reçu qu’un alla faire un creux dans la terre, et cacha l’argent de son maître.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Longtemps après, le maître de ces serviteurs revint, et leur fit rendre compte.
  - type: text
    content: ' '
  '2':
  - type: text
    content: Cinq d’entre elles étaient folles, et cinq sages.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Celui qui avait reçu les cinq talents s’approcha, en apportant cinq autres talents, et il dit: Seigneur, tu m’as remis cinq talents; voici, j’en ai gagné cinq autres.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Son maître lui dit: C’est bien, bon et fidèle serviteur; tu as été fidèle en'
  - type: text
    content: ' '
  - type: note
    content: Mt 24:45. Lu 12:42.
  - type: text
    content: peu de chose, je te confierai beaucoup; entre dans la joie de ton maître.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Celui qui avait reçu les deux talents s’approcha aussi, et il dit: Seigneur, tu m’as remis deux talents; voici, j’en ai gagné deux autres.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Son maître lui dit: C’est bien, bon et fidèle serviteur; tu as été fidèle en peu de chose, je te confierai beaucoup; entre dans la joie de ton maître.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Celui qui n’avait reçu qu’un talent s’approcha ensuite, et il dit: Seigneur, je savais que tu es un homme dur, qui moissonnes où tu n’as pas semé, et qui amasses où tu n’as pas vanné;'
  - type: text
    content: ' '
  '25':
  - type: text
    content: j’ai eu peur, et je suis allé cacher ton talent dans la terre; voici, prends ce qui est à toi.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Son maître lui répondit: Serviteur méchant et paresseux, tu savais que je moissonne où je n’ai pas semé, et que j’amasse où je n’ai pas vanné;'
  - type: text
    content: ' '
  '27':
  - type: text
    content: il te fallait donc remettre mon argent aux banquiers, et, à mon retour, j’aurais retiré ce qui est à moi avec un intérêt.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Otez-lui donc le talent, et donnez-le à celui qui a les dix talents.
  - type: text
    content: ' '
  '29':
  - type: note
    content: Mt 13:12. Mc 4:25. Lu 8:18; 19:26.
  - type: text
    content: Car on donnera à celui qui a, et il sera dans l’abondance, mais à celui qui n’a pas on ôtera même ce qu’il a.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Les folles, en prenant leurs lampes, ne prirent point d’huile avec elles;
  - type: text
    content: ' '
  '30':
  - type: text
    content: Et le serviteur inutile, jetez-le dans les ténèbres du dehors,
  - type: text
    content: ' '
  - type: note
    content: Mt 8:12; 13:42; 22:13; 24:51. Lu 13:28.
  - type: text
    content: où il y aura des pleurs et des grincements de dents.
  - type: heading
    content: Jugement des nations par le Fils de l’homme
  - type: heading
    content: 'V. 31-46: cf. Jn 5:22, 23, 26-29. Ap 20:11-15. 2 Th 1:6-10. Ga 6:7-10.'
  '31':
  - type: text
    content: ' '
  - type: note
    content: Mt 16:27; 26:64. Mc 14:62. Lu 21:17. Ac 1:11. 1 Th 4:16. 2 Th 1:10. Ap 1:7.
  - type: text
    content: Lorsque le Fils de l’homme viendra dans sa gloire, avec tous les anges, il s’assiéra sur le
  - type: text
    content: ' '
  - type: note
    content: Mt 19:28.
  - type: text
    content: trône de sa gloire.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Toutes les nations seront assemblées devant lui.
  - type: text
    content: ' '
  - type: note
    content: Éz 34:17, 20. Mt 13:49.
  - type: text
    content: Il séparera les uns d’avec les autres, comme le berger sépare les brebis d’avec les boucs;
  - type: text
    content: ' '
  '33':
  - type: text
    content: et il mettra les brebis à sa droite, et les boucs à sa gauche.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Alors le roi dira à ceux qui seront à sa droite: Venez, vous qui êtes bénis de mon Père; prenez possession du royaume'
  - type: text
    content: ' '
  - type: note
    content: Mt 20:23. Mc 10:40.
  - type: text
    content: qui vous a été préparé dès la fondation du monde.
  - type: text
    content: ' '
  '35':
  - type: note
    content: És 58:7. Éz 18:7.
  - type: text
    content: Car j’ai eu faim, et vous m’avez donné à manger; j’ai eu soif, et vous m’avez donné à boire;
  - type: text
    content: ' '
  - type: note
    content: Hé 13:2.
  - type: text
    content: j’étais étranger, et vous m’avez recueilli;
  - type: text
    content: ' '
  '36':
  - type: text
    content: j’étais
  - type: text
    content: ' '
  - type: note
    content: És 58:7. Ja 2:15, 16.
  - type: text
    content: nu, et vous m’avez vêtu; j’étais malade, et vous m’avez visité; j’étais
  - type: text
    content: ' '
  - type: note
    content: 2 Ti 1:16.
  - type: text
    content: en prison, et vous êtes venus vers moi.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Les justes lui répondront: Seigneur, quand t’avons-nous vu avoir faim, et t’avons-nous donné à manger; ou avoir soif, et t’avons-nous donné à boire?'
  - type: text
    content: ' '
  '38':
  - type: text
    content: Quand t’avons-nous vu étranger, et t’avons-nous recueilli; ou nu, et t’avons-nous vêtu?
  - type: text
    content: ' '
  '39':
  - type: text
    content: Quand t’avons-nous vu malade, ou en prison, et sommes-nous allés vers toi?
  - type: text
    content: ' '
  '4':
  - type: text
    content: mais les sages prirent, avec leurs lampes, de l’huile dans des vases.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Et le roi leur répondra: Je vous le dis en vérité,'
  - type: text
    content: ' '
  - type: note
    content: Pr 19:17. Mt 10:42. Mc 9:41. Jn 13:20. 2 Co 9:6.
  - type: text
    content: toutes les fois que vous avez fait ces choses à l’un de ces plus petits de mes frères, c’est à moi que vous les avez faites.
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'Ensuite il dira à ceux qui seront à sa gauche:'
  - type: text
    content: ' '
  - type: note
    content: Ps 6:9. Mt 7:23. Lu 13:25, 27. És 30:33. Ap 19:20.
  - type: text
    content: Retirez-vous de moi, maudits; allez dans le feu éternel qui a été préparé pour le diable et pour ses anges.
  - type: text
    content: ' '
  '42':
  - type: text
    content: Car j’ai eu faim, et vous ne m’avez pas donné à manger; j’ai eu soif, et vous ne m’avez pas donné à boire;
  - type: text
    content: ' '
  '43':
  - type: text
    content: j’étais étranger, et vous ne m’avez pas recueilli; j’étais nu, et vous ne m’avez pas vêtu; j’étais malade et en prison, et vous ne m’avez pas visité.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Ils répondront aussi: Seigneur, quand t’avons-nous vu ayant faim, ou ayant soif, ou étranger, ou nu, ou malade, ou en prison, et ne t’avons-nous pas assisté?'
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Et il leur répondra: Je vous le dis en vérité,'
  - type: text
    content: ' '
  - type: note
    content: Pr 14:31; 17:5. Za 2:8.
  - type: text
    content: toutes les fois que vous n’avez pas fait ces choses à l’un de ces plus petits, c’est à moi que vous ne les avez pas faites.
  - type: text
    content: ' '
  '46':
  - type: note
    content: Da 12:2. Jn 5:29.
  - type: text
    content: Et ceux-ci iront au châtiment éternel, mais les justes à la vie éternelle.
  '5':
  - type: text
    content: Comme l’époux tardait, toutes s’assoupirent et s’endormirent.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Au milieu de la nuit, on cria: Voici l’époux, allez à sa rencontre!'
  - type: text
    content: ' '
  '7':
  - type: text
    content: Alors toutes ces vierges se réveillèrent, et préparèrent leurs lampes.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Les folles dirent aux sages: Donnez-nous de votre huile, car nos lampes s’éteignent.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Les sages répondirent: Non; il n’y en aurait pas assez pour nous et pour vous; allez plutôt chez ceux qui en vendent, et achetez-en pour vous.'
  - type: text
    content: ' '
