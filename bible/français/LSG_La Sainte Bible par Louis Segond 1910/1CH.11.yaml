document_id: 1CH.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: David roi
  - type: heading
    content: 'V. 1-9: cf. 2 S 5:1-10. Ps 89:21-25.'
  - type: text
    content: 'Tout Israël '
  - type: note
    content: 2 S 5:1.
  - type: text
    content: 's’assembla auprès de David à Hébron, en disant: Voici, nous sommes tes os et ta chair. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 2 S 23:8.
  - type: text
    content: 'Voici les chefs des vaillants hommes qui étaient au service de David, et qui l’aidèrent avec tout Israël à assurer sa domination, afin de l’établir roi, '
  - type: note
    content: 2 S 16:1, 12.
  - type: text
    content: 'selon la parole de l’Éternel au sujet d’Israël. '
  '11':
  - type: text
    content: 'Voici, d’après leur nombre, les vaillants hommes qui étaient au service de David. Jaschobeam, fils de Hacmoni, l’un des principaux officiers. Il brandit sa lance sur trois cents hommes, qu’il fit périr en une seule fois. '
  '12':
  - type: text
    content: 'Après lui, Éléazar, fils de Dodo, l’Achochite, l’un des trois guerriers. '
  '13':
  - type: text
    content: 'Il était avec David à Pas-Dammim, '
  - type: note
    content: 2 S 5:17; 23:11.
  - type: text
    content: 'où les Philistins s’étaient rassemblés pour combattre. Il y avait là une pièce de terre remplie d’orge; et le peuple fuyait devant les Philistins. '
  '14':
  - type: text
    content: 'Ils se placèrent au milieu du champ, le protégèrent, et battirent les Philistins. Et l’Éternel opéra une grande délivrance. '
  '15':
  - type: note
    content: 2 S 23:13.
  - type: text
    content: 'Trois des trente chefs descendirent auprès de David sur le rocher dans la caverne d’Adullam, lorsque le camp des Philistins était dressé dans la vallée des Rephaïm. '
  '16':
  - type: text
    content: 'David était alors dans la forteresse, et il y avait un poste de Philistins à Bethléhem. '
  '17':
  - type: text
    content: 'David eut un désir, et il dit: Qui me fera boire de l’eau de la citerne qui est à la porte de Bethléhem? '
  '18':
  - type: text
    content: 'Alors les trois hommes passèrent au travers du camp des Philistins, et puisèrent de l’eau de la citerne qui est à la porte de Bethléhem. Ils l’apportèrent et la présentèrent à David; mais David ne voulut pas la boire, et il la répandit devant l’Éternel. '
  '19':
  - type: text
    content: 'Il dit: Que mon Dieu me garde de faire cela! Boirais-je le sang de ces hommes qui sont allés au péril de leur vie? Car c’est au péril de leur vie qu’ils l’ont apportée. Et il ne voulut pas la boire. Voilà ce que firent ces trois vaillants hommes. '
  '2':
  - type: text
    content: 'Autrefois déjà, même lorsque Saül était roi, '
  - type: note
    content: 1 S 19:8.
  - type: text
    content: 'c’était toi qui conduisais et qui ramenais Israël. L’Éternel, ton Dieu, t’a dit: Tu paîtras mon peuple d’Israël, et tu seras le chef de mon peuple d’Israël. '
  '20':
  - type: text
    content: 'Abischaï, frère de Joab, était le chef des trois. Il brandit sa lance sur trois cents hommes, et les tua; et il eut du renom parmi les trois. '
  '21':
  - type: text
    content: 'Il était le plus considéré des trois de la seconde série, et il fut leur chef; mais il n’égala pas les trois premiers. '
  '22':
  - type: text
    content: 'Benaja, fils de Jehojada, fils d’un homme de Kabtseel, rempli de valeur et célèbre par ses exploits. Il frappa les deux lions de Moab. Il descendit au milieu d’une citerne, où il frappa un lion, un jour de neige. '
  '23':
  - type: text
    content: 'Il frappa un Égyptien d’une stature de cinq coudées et ayant à la main une lance comme une ensouple de tisserand; il descendit contre lui avec un bâton, arracha la lance de la main de l’Égyptien, et s’en servit pour le tuer. '
  '24':
  - type: text
    content: 'Voilà ce que fit Benaja, fils de Jehojada; et il eut du renom parmi les trois vaillants hommes. '
  '25':
  - type: text
    content: 'Il était le plus considéré des trente; mais il n’égala pas les trois premiers. David l’admit dans son conseil secret. '
  '26':
  - type: note
    content: 1 S 23:24.
  - type: text
    content: 'Hommes vaillants de l’armée: Asaël, frère de Joab. Elchanan, fils de Dodo, de Bethléhem.'
  '27':
  - type: text
    content: Schammoth, d’Haror.
  - type: text
    content: Hélets, de Palon.
  '28':
  - type: text
    content: Ira, fils d’Ikkesch, de Tekoa.
  - type: text
    content: Abiézer, d’Anathoth.
  '29':
  - type: text
    content: Sibbecaï, le Huschatite.
  - type: text
    content: Ilaï, d’Achoach.
  '3':
  - type: text
    content: 'Ainsi tous les anciens d’Israël vinrent auprès du roi à Hébron, et David fit alliance avec eux à Hébron, devant l’Éternel. Ils oignirent David pour roi sur Israël, '
  - type: note
    content: 1 S 16.
  - type: text
    content: 'selon la parole de l’Éternel, prononcée par Samuel. '
  '30':
  - type: text
    content: Maharaï, de Nethopha.
  - type: text
    content: Héled, fils de Baana, de Nethopha.
  '31':
  - type: text
    content: Ithaï, fils de Ribaï, de Guibea des fils de Benjamin.
  - type: text
    content: Benaja, de Pirathon.
  '32':
  - type: text
    content: Huraï, de Nachalé-Gaasch.
  - type: text
    content: Abiel, d’Araba.
  '33':
  - type: text
    content: Azmaveth, de Bacharum.
  - type: text
    content: Éliachba, de Schaalbon.
  '34':
  - type: text
    content: Bené-Haschem, de Guizon.
  - type: text
    content: Jonathan, fils de Schagué, d’Harar.
  '35':
  - type: text
    content: Achiam, fils de Sacar, d’Harar.
  - type: text
    content: Éliphal, fils d’Ur.
  '36':
  - type: text
    content: Hépher, de Mekéra.
  - type: text
    content: Achija, de Palon.
  '37':
  - type: text
    content: Hetsro, de Carmel.
  - type: text
    content: Naaraï, fils d’Ezbaï.
  '38':
  - type: text
    content: Joël, frère de Nathan.
  - type: text
    content: Mibchar, fils d’Hagri.
  '39':
  - type: text
    content: Tsélek, l’Ammonite.
  - type: text
    content: Nachraï, de Béroth, qui portait les armes de Joab, fils de Tseruja.
  '4':
  - type: text
    content: 'David marcha avec tout Israël sur Jérusalem, qui est Jebus. '
  - type: note
    content: 2 S 5:6.
  - type: text
    content: 'Là étaient les Jébusiens, habitants du pays. '
  '40':
  - type: text
    content: Ira, de Jéther.
  - type: text
    content: Gareb, de Jéther.
  '41':
  - type: text
    content: Urie, le Héthien.
  - type: text
    content: Zabad, fils d’Achlaï.
  '42':
  - type: text
    content: Adina, fils de Schiza, le Rubénite, chef des Rubénites, et trente avec lui.
  '43':
  - type: text
    content: Hanan, fils de Maaca.
  - type: text
    content: Josaphat, de Mithni.
  '44':
  - type: text
    content: Ozias, d’Aschtharoth.
  - type: text
    content: Schama et Jehiel, fils de Hotham, d’Aroër.
  '45':
  - type: text
    content: Jediaël, fils de Schimri.
  - type: text
    content: Jocha, son frère, le Thitsite.
  '46':
  - type: text
    content: Éliel, de Machavim, Jeribaï et Joschavia, fils d’Elnaam.
  - type: text
    content: Jithma, le Moabite.
  '47':
  - type: text
    content: Éliel, Obed et Jaasiel-Metsobaja.
  '5':
  - type: text
    content: 'Les habitants de Jebus dirent à David: Tu n’entreras point ici. Mais David s’empara de la forteresse de Sion: c’est la cité de David. '
  '6':
  - type: text
    content: 'David avait dit: Quiconque battra le premier les Jébusiens sera chef et prince. Joab, fils de Tseruja, monta le premier, et il devint chef. '
  '7':
  - type: text
    content: 'David s’établit dans la forteresse; c’est pourquoi on l’appela cité de David. '
  '8':
  - type: text
    content: 'Il fit tout autour de la ville des constructions, depuis Millo et aux environs; et Joab répara le reste de la ville. '
  '9':
  - type: text
    content: David devenait de plus en plus grand, et l’Éternel des armées était avec lui.
  - type: heading
    content: Vaillants hommes de David
  - type: heading
    content: 'V. 10-47: cf. 2 S 23:8-39. 1 Ch 27:1-15. 1 Co 16:16. Ap 3:5.'
