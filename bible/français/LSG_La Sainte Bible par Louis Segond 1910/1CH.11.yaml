document_id: 1CH.11,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David roi
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. 2 S 5:1-10. Ps 89:21-25.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout Israël '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 5:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 's’assembla auprès de David à Hébron, en disant: Voici, nous sommes tes os et ta chair. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 23:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Voici les chefs des vaillants hommes qui étaient au service de David, et qui l’aidèrent avec tout Israël à assurer sa domination, afin de l’établir roi, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 16:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'selon la parole de l’Éternel au sujet d’Israël. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici, d’après leur nombre, les vaillants hommes qui étaient au service de David. Jaschobeam, fils de Hacmoni, l’un des principaux officiers. Il brandit sa lance sur trois cents hommes, qu’il fit périr en une seule fois. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après lui, Éléazar, fils de Dodo, l’Achochite, l’un des trois guerriers. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il était avec David à Pas-Dammim, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 5:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'où les Philistins s’étaient rassemblés pour combattre. Il y avait là une pièce de terre remplie d’orge; et le peuple fuyait devant les Philistins. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils se placèrent au milieu du champ, le protégèrent, et battirent les Philistins. Et l’Éternel opéra une grande délivrance. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 23:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Trois des trente chefs descendirent auprès de David sur le rocher dans la caverne d’Adullam, lorsque le camp des Philistins était dressé dans la vallée des Rephaïm. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David était alors dans la forteresse, et il y avait un poste de Philistins à Bethléhem. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David eut un désir, et il dit: Qui me fera boire de l’eau de la citerne qui est à la porte de Bethléhem? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les trois hommes passèrent au travers du camp des Philistins, et puisèrent de l’eau de la citerne qui est à la porte de Bethléhem. Ils l’apportèrent et la présentèrent à David; mais David ne voulut pas la boire, et il la répandit devant l’Éternel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit: Que mon Dieu me garde de faire cela! Boirais-je le sang de ces hommes qui sont allés au péril de leur vie? Car c’est au péril de leur vie qu’ils l’ont apportée. Et il ne voulut pas la boire. Voilà ce que firent ces trois vaillants hommes. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Autrefois déjà, même lorsque Saül était roi, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 19:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'c’était toi qui conduisais et qui ramenais Israël. L’Éternel, ton Dieu, t’a dit: Tu paîtras mon peuple d’Israël, et tu seras le chef de mon peuple d’Israël. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abischaï, frère de Joab, était le chef des trois. Il brandit sa lance sur trois cents hommes, et les tua; et il eut du renom parmi les trois. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il était le plus considéré des trois de la seconde série, et il fut leur chef; mais il n’égala pas les trois premiers. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Benaja, fils de Jehojada, fils d’un homme de Kabtseel, rempli de valeur et célèbre par ses exploits. Il frappa les deux lions de Moab. Il descendit au milieu d’une citerne, où il frappa un lion, un jour de neige. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il frappa un Égyptien d’une stature de cinq coudées et ayant à la main une lance comme une ensouple de tisserand; il descendit contre lui avec un bâton, arracha la lance de la main de l’Égyptien, et s’en servit pour le tuer. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voilà ce que fit Benaja, fils de Jehojada; et il eut du renom parmi les trois vaillants hommes. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il était le plus considéré des trente; mais il n’égala pas les trois premiers. David l’admit dans son conseil secret. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 23:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Hommes vaillants de l’armée: Asaël, frère de Joab. Elchanan, fils de Dodo, de Bethléhem.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Schammoth, d’Haror.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hélets, de Palon.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ira, fils d’Ikkesch, de Tekoa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Abiézer, d’Anathoth.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sibbecaï, le Huschatite.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilaï, d’Achoach.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi tous les anciens d’Israël vinrent auprès du roi à Hébron, et David fit alliance avec eux à Hébron, devant l’Éternel. Ils oignirent David pour roi sur Israël, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'selon la parole de l’Éternel, prononcée par Samuel. '
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maharaï, de Nethopha.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Héled, fils de Baana, de Nethopha.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ithaï, fils de Ribaï, de Guibea des fils de Benjamin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Benaja, de Pirathon.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Huraï, de Nachalé-Gaasch.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Abiel, d’Araba.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Azmaveth, de Bacharum.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éliachba, de Schaalbon.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bené-Haschem, de Guizon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jonathan, fils de Schagué, d’Harar.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Achiam, fils de Sacar, d’Harar.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éliphal, fils d’Ur.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hépher, de Mekéra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Achija, de Palon.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hetsro, de Carmel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Naaraï, fils d’Ezbaï.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Joël, frère de Nathan.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mibchar, fils d’Hagri.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsélek, l’Ammonite.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nachraï, de Béroth, qui portait les armes de Joab, fils de Tseruja.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David marcha avec tout Israël sur Jérusalem, qui est Jebus. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 5:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Là étaient les Jébusiens, habitants du pays. '
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ira, de Jéther.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gareb, de Jéther.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Urie, le Héthien.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zabad, fils d’Achlaï.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Adina, fils de Schiza, le Rubénite, chef des Rubénites, et trente avec lui.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanan, fils de Maaca.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Josaphat, de Mithni.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ozias, d’Aschtharoth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Schama et Jehiel, fils de Hotham, d’Aroër.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jediaël, fils de Schimri.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jocha, son frère, le Thitsite.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éliel, de Machavim, Jeribaï et Joschavia, fils d’Elnaam.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jithma, le Moabite.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éliel, Obed et Jaasiel-Metsobaja.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les habitants de Jebus dirent à David: Tu n’entreras point ici. Mais David s’empara de la forteresse de Sion: c’est la cité de David. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David avait dit: Quiconque battra le premier les Jébusiens sera chef et prince. Joab, fils de Tseruja, monta le premier, et il devint chef. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David s’établit dans la forteresse; c’est pourquoi on l’appela cité de David. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit tout autour de la ville des constructions, depuis Millo et aux environs; et Joab répara le reste de la ville. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David devenait de plus en plus grand, et l’Éternel des armées était avec lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vaillants hommes de David
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-47: cf. 2 S 23:8-39. 1 Ch 27:1-15. 1 Co 16:16. Ap 3:5.'
    marker-yv: yv-h
