document_id: JHN.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus en Galilée. Multiplication des pains
  - type: heading
    content: 'V. 1-15: cf. (Mt 14:13-21. Mc 6:30-44. Lu 9:10-17.) Mt 15:29-39. 2 R 4:42-44.'
  - type: text
    content: 'Après cela, Jésus s’en alla de l’autre côté de la mer de Galilée, de Tibériade. '
  '10':
  - type: text
    content: 'Jésus dit: '
  - type: text
    content: Faites-les asseoir.
  - type: text
    content: ' Il y avait dans ce lieu beaucoup d’herbe. Ils s’assirent donc, au nombre d’environ cinq mille hommes. '
  '11':
  - type: text
    content: 'Jésus prit les pains, '
  - type: note
    content: 1 S 9:13.
  - type: text
    content: 'rendit grâces, et les distribua à ceux qui étaient assis; il leur donna de même des poissons, autant qu’ils en voulurent. '
  '12':
  - type: text
    content: 'Lorsqu’ils furent rassasiés, il dit à ses disciples: '
  - type: text
    content: Ramassez les morceaux qui restent, afin que rien ne se perde.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Ils les ramassèrent donc, et ils remplirent douze paniers avec les morceaux qui restèrent des cinq pains d’orge, après que tous eurent mangé. '
  '14':
  - type: text
    content: 'Ces gens, ayant vu le miracle que Jésus avait fait, disaient: '
  - type: note
    content: Lu 7:16; 24:19. Jn 4:19.
  - type: text
    content: 'Celui-ci est vraiment le prophète qui doit venir dans le monde. '
  '15':
  - type: text
    content: Et Jésus, sachant qu’ils allaient venir l’enlever pour le faire roi, se retira de nouveau sur la montagne, lui seul.
  - type: heading
    content: Jésus marche sur les eaux
  - type: heading
    content: 'V. 16-21: cf. (Mt 14:22-34. Mc 6:45-53.)'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Mt 14:23. Mc 6:47.
  - type: text
    content: 'Quand le soir fut venu, ses disciples descendirent au bord de la mer. '
  '17':
  - type: text
    content: 'Étant montés dans une barque, ils traversaient la mer pour se rendre à Capernaüm. Il faisait déjà nuit, et Jésus ne les avait pas encore rejoints. '
  '18':
  - type: text
    content: 'Il soufflait un grand vent, et la mer était agitée. '
  '19':
  - type: text
    content: 'Après avoir ramé environ vingt-cinq ou trente stades, ils virent Jésus marchant sur la mer et s’approchant de la barque. Et ils eurent peur. '
  '2':
  - type: text
    content: 'Une grande foule le suivait, parce qu’elle voyait les miracles qu’il opérait sur les malades. '
  '20':
  - type: text
    content: 'Mais Jésus leur dit: '
  - type: text
    content: C’est moi; n’ayez pas peur!
  - type: text
    content: ' '
  '21':
  - type: text
    content: Ils voulaient donc le prendre dans la barque, et aussitôt la barque aborda au lieu où ils allaient.
  - type: heading
    content: Le pain de vie. Abandon de quelques disciples
  - type: heading
    content: 'V. 22-59: cf. (Ex 16:12-35. Ps 78:23-25. 1 Co 10:3, 4.) (És 55:1-3. Jn 3:14-16. 1 Jn 5:10-13.) 1 Co 11:23-26.'
  '22':
  - type: text
    content: 'La foule qui était restée de l’autre côté de la mer avait remarqué qu’il ne se trouvait là qu’une seule barque, et que Jésus n’était pas monté dans cette barque avec ses disciples, mais qu’ils étaient partis seuls. '
  '23':
  - type: text
    content: 'Le lendemain, comme d’autres barques étaient arrivées de Tibériade près du lieu où ils avaient mangé le pain après que le Seigneur eut rendu grâces, '
  '24':
  - type: text
    content: 'les gens de la foule, ayant vu que ni Jésus ni ses disciples n’étaient là, montèrent eux-mêmes dans ces barques et allèrent à Capernaüm à la recherche de Jésus. '
  '25':
  - type: text
    content: 'Et l’ayant trouvé au-delà de la mer, ils lui dirent: Rabbi, quand es-tu venu ici? '
  '26':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: En vérité, en vérité, je vous le dis, vous me cherchez, non parce que vous avez vu des miracles, mais parce que vous avez mangé des pains et que vous avez été rassasiés.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Jn 3:16; 4:14; 6:40, 54.
  - type: text
    content: Travaillez, non pour la nourriture qui périt, mais pour celle qui subsiste pour la vie éternelle, et que le Fils de l’homme vous donnera;
  - type: text
    content: ' '
  - type: note
    content: Mt 3:17; 17:5. Mc 1:11; 9:7. Lu 3:22; 9:35. Jn 1:33; 5:37; 8:18. 2 Pi 1:17.
  - type: text
    content: car c’est lui que le Père, que Dieu a marqué de son sceau.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Ils lui dirent: Que devons-nous faire, pour faire les œuvres de Dieu? '
  '29':
  - type: text
    content: 'Jésus leur répondit: '
  - type: note
    content: 1 Jn 3:23.
  - type: text
    content: L’œuvre de Dieu, c’est que vous croyiez en celui qu’il a envoyé.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Jésus monta sur la montagne, et là il s’assit avec ses disciples. '
  '30':
  - type: text
    content: 'Quel '
  - type: note
    content: Mt 12:38; 16:1. Mc 8:11. Lu 11:29. 1 Co 1:22.
  - type: text
    content: 'miracle fais-tu donc, lui dirent-ils, afin que nous le voyions, et que nous croyions en toi? Que fais-tu? '
  '31':
  - type: note
    content: Ex 16:4, 14. No 11:7.
  - type: text
    content: 'Nos pères ont mangé la manne dans le désert, selon ce qui est écrit:'
  - type: note
    content: Ps 78:24. 1 Co 10:3.
  - type: text
    content: Il leur donna le pain du ciel à manger.
  '32':
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: En vérité, en vérité, je vous le dis, Moïse ne vous a pas donné le pain du ciel, mais mon Père vous donne le vrai pain du ciel;
  '33':
  - type: text
    content: ' '
  - type: text
    content: car le pain de Dieu, c’est celui qui descend du ciel et qui donne la vie au monde.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Ils lui dirent: Seigneur, donne-nous toujours ce pain. '
  '35':
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: Je suis le pain de vie.
  - type: text
    content: ' '
  - type: note
    content: És 55:1. Jn 4:14; 7:37.
  - type: text
    content: Celui qui vient à moi n’aura jamais faim, et celui qui croit en moi n’aura jamais soif.
  '36':
  - type: text
    content: ' '
  - type: text
    content: Mais, je vous l’ai dit, vous m’avez vu, et vous ne croyez point.
  - type: text
    content: ' '
  '37':
  - type: text
    content: Tous ceux que le Père me donne viendront à moi, et je ne mettrai pas dehors celui qui vient à moi;
  - type: text
    content: ' '
  '38':
  - type: text
    content: car je suis descendu du ciel pour faire,
  - type: text
    content: ' '
  - type: note
    content: Mt 26:39. Mc 14:36. Lu 22:42. Jn 5:30.
  - type: text
    content: non ma volonté, mais la volonté de celui qui m’a envoyé.
  - type: text
    content: ' '
  '39':
  - type: text
    content: Or, la volonté de celui qui m’a envoyé, c’est que je ne perde rien
  - type: text
    content: ' '
  - type: note
    content: Jn 10:28; 17:12; 18:9.
  - type: text
    content: de tout ce qu’il m’a donné, mais que je le ressuscite au dernier jour.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Or, la Pâque était proche, '
  - type: note
    content: Ex 12:18. Lé 23:5, 7. No 28:16. De 16:1.
  - type: text
    content: 'la fête des Juifs. '
  '40':
  - type: text
    content: La volonté de mon Père,
  - type: text
    content: ' '
  - type: note
    content: Jn 3:16; 4:14; 6:27, 54.
  - type: text
    content: c’est que quiconque voit le Fils et croit en lui ait la vie éternelle; et je le ressusciterai au dernier jour.
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'Les Juifs murmuraient à son sujet, parce qu’il avait dit: Je suis le pain qui est descendu du ciel. '
  '42':
  - type: text
    content: 'Et ils disaient: '
  - type: note
    content: Mt 13:55. Mc 6:3.
  - type: text
    content: 'N’est-ce pas là Jésus, le fils de Joseph, celui dont nous connaissons le père et la mère? Comment donc dit-il: Je suis descendu du ciel? '
  '43':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: Ne murmurez pas entre vous.
  '44':
  - type: text
    content: ' '
  - type: note
    content: Ca 1:4. Jn 6:65.
  - type: text
    content: Nul ne peut venir à moi, si le Père qui m’a envoyé ne l’attire; et je le ressusciterai au dernier jour.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Il est écrit dans les prophètes:'
  - type: text
    content: ' '
  - type: note
    content: És 45:13. Jé 31:33. Hé 8:10; 10:16.
  - type: text
    content: Ils seront tous enseignés de Dieu. Ainsi quiconque a entendu le Père et a reçu son enseignement vient à moi.
  - type: text
    content: ' '
  '46':
  - type: note
    content: Mt 11:27. Lu 10:22. Jn 1:18; 7:29; 8:19.
  - type: text
    content: C’est que nul n’a vu le Père, sinon celui qui vient de Dieu; celui-là a vu le Père.
  - type: text
    content: ' '
  '47':
  - type: text
    content: En vérité, en vérité, je vous le dis,
  - type: text
    content: ' '
  - type: note
    content: Jn 3:16, 36.
  - type: text
    content: celui qui croit en moi a la vie éternelle.
  - type: text
    content: ' '
  '48':
  - type: text
    content: Je suis le pain de vie.
  - type: text
    content: ' '
  '49':
  - type: note
    content: Ex 16:4. No 11:7. Ps 78:24.
  - type: text
    content: Vos pères ont mangé la manne dans le désert, et ils sont morts.
  - type: text
    content: ' '
  '5':
  - type: note
    content: Mt 14:14. Mc 6:34. Lu 9:13.
  - type: text
    content: 'Ayant levé les yeux, et voyant qu’une grande foule venait à lui, Jésus dit à Philippe: '
  - type: text
    content: Où achèterons-nous des pains, pour que ces gens aient à manger?
  - type: text
    content: ' '
  '50':
  - type: text
    content: C’est ici le pain qui descend du ciel, afin que celui qui en mange ne meure point.
  - type: text
    content: ' '
  '51':
  - type: text
    content: Je suis le pain vivant qui est descendu du ciel.
  - type: text
    content: ' '
  - type: note
    content: Jn 11:26.
  - type: text
    content: Si quelqu’un mange de ce pain, il vivra éternellement;
  - type: text
    content: ' '
  - type: note
    content: Hé 10:5, 10.
  - type: text
    content: et le pain que je donnerai, c’est ma chair, que je donnerai pour la vie du monde.
  - type: text
    content: ' '
  '52':
  - type: text
    content: 'Là-dessus, les Juifs disputaient entre eux, disant: '
  - type: note
    content: Jn 3:9.
  - type: text
    content: 'Comment peut-il nous donner sa chair à manger? '
  '53':
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: En vérité, en vérité, je vous le dis, si vous ne mangez la chair du Fils de l’homme, et si vous ne buvez son sang, vous n’avez point la vie en vous-mêmes.
  '54':
  - type: text
    content: ' '
  - type: note
    content: Jn 3:16; 4:14; 6:27, 40.
  - type: text
    content: Celui qui mange ma chair et qui boit mon sang a la vie éternelle; et je le ressusciterai au dernier jour.
  - type: text
    content: ' '
  '55':
  - type: text
    content: Car ma chair est vraiment une nourriture, et mon sang est vraiment un breuvage.
  - type: text
    content: ' '
  '56':
  - type: text
    content: Celui qui mange ma chair et qui boit mon sang demeure en moi, et je demeure en lui.
  - type: text
    content: ' '
  '57':
  - type: text
    content: Comme le Père qui est vivant m’a envoyé, et que je vis par le Père, ainsi celui qui me mange vivra par moi.
  - type: text
    content: ' '
  '58':
  - type: text
    content: C’est ici le
  - type: text
    content: ' '
  - type: note
    content: Jn 3:13.
  - type: text
    content: 'pain qui est descendu du ciel. Il n’en est pas comme de vos pères qui ont mangé la manne et qui sont morts: celui qui mange ce pain vivra éternellement.'
  - type: text
    content: ' '
  '59':
  - type: text
    content: Jésus dit ces choses dans la synagogue, enseignant à Capernaüm.
  - type: heading
    content: Confession de Pierre
  - type: heading
    content: 'V. 60-71: cf. Hé 3:12; 4:12, 13; 10:38, 39. 1 Pi 2:6-9.'
  '6':
  - type: text
    content: 'Il disait cela pour l’éprouver, car il savait ce qu’il allait faire. '
  '60':
  - type: text
    content: 'Plusieurs de ses disciples, après l’avoir entendu, dirent: Cette parole est dure; qui peut l’écouter? '
  '61':
  - type: text
    content: 'Jésus, sachant en lui-même que ses disciples murmuraient à ce sujet, leur dit: '
  - type: text
    content: Cela vous scandalise-t-il?
  '62':
  - type: text
    content: ' '
  - type: text
    content: Et
  - type: text
    content: ' '
  - type: note
    content: Mc 16:19. Lu 24:50. Jn 3:13. Ac 1:9. Ép 4:8.
  - type: text
    content: si vous voyez le Fils de l’homme monter où il était auparavant?…
  - type: text
    content: ' '
  '63':
  - type: note
    content: 2 Co 3:6.
  - type: text
    content: C’est l’esprit qui vivifie; la chair ne sert de rien. Les paroles que je vous ai dites sont esprit et vie.
  - type: text
    content: ' '
  '64':
  - type: text
    content: Mais il en est parmi vous quelques-uns qui ne croient point.
  - type: text
    content: ' '
  - type: note
    content: Jn 2:25.
  - type: text
    content: 'Car Jésus savait dès le commencement qui étaient ceux qui ne croyaient point, '
  - type: note
    content: Jn 13:11.
  - type: text
    content: 'et qui était celui qui le livrerait. '
  '65':
  - type: text
    content: 'Et il ajouta: '
  - type: note
    content: Jn 6:44.
  - type: text
    content: C’est pourquoi je vous ai dit que nul ne peut venir à moi, si cela ne lui a été donné par le Père.
  - type: text
    content: ' '
  '66':
  - type: text
    content: 'Dès ce moment, plusieurs de ses disciples se retirèrent, et ils n’allaient plus avec lui. '
  '67':
  - type: text
    content: 'Jésus donc dit aux douze: '
  - type: text
    content: Et vous, ne voulez-vous pas aussi vous en aller?
  - type: text
    content: ' '
  '68':
  - type: text
    content: 'Simon Pierre lui répondit: Seigneur, à qui irions-nous? Tu as les paroles de la '
  - type: note
    content: Ac 5:20.
  - type: text
    content: 'vie éternelle. '
  '69':
  - type: text
    content: 'Et nous avons cru et nous avons connu '
  - type: note
    content: Mt 16:16. Mc 8:29. Lu 9:20. Jn 11:27.
  - type: text
    content: 'que tu es le Christ, le Saint de Dieu. '
  '7':
  - type: text
    content: 'Philippe lui répondit: Les pains qu’on aurait pour deux cents deniers ne suffiraient pas pour que chacun en reçût un peu. '
  '70':
  - type: text
    content: 'Jésus leur répondit: '
  - type: note
    content: Lu 6:13.
  - type: text
    content: N’est-ce pas moi qui vous ai choisis, vous les douze? Et l’un de vous est un démon!
  - type: text
    content: ' '
  '71':
  - type: text
    content: Il parlait de Judas Iscariot, fils de Simon; car c’était lui qui devait le livrer, lui, l’un des douze.
  '8':
  - type: text
    content: 'Un de ses disciples, André, frère de Simon Pierre, lui dit: '
  '9':
  - type: text
    content: 'Il y a ici un jeune garçon qui a cinq pains d’orge et deux poissons; '
  - type: note
    content: 2 R 4:43.
  - type: text
    content: 'mais qu’est-ce que cela pour tant de gens? '
