        text: Lé 23:5
      metadata:
        usfm: LEV.23.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: LEV.23.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 28:16
      metadata:
        usfm: NUM.28.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 16:1
      metadata:
        usfm: DEU.16.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la fête des Juifs. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 14:14
      metadata:
        usfm: MAT.14.14
    - type: text
