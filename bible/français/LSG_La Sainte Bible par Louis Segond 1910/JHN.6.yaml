document_id: JHN.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus en Galilée. Multiplication des pains
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-15: cf. (Mt 14:13-21. Mc 6:30-44. Lu 9:10-17.) Mt 15:29-39. 2 R 4:42-44.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, Jésus s’en alla de l’autre côté de la mer de Galilée, de Tibériade. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Une grande foule le suivait, parce qu’elle voyait les miracles qu’il opérait sur les malades. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus monta sur la montagne, et là il s’assit avec ses disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Or, la Pâque était proche, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:18
      metadata:
        usfm: EXO.12.18
    - type: text
      text: '. '
