document_id: JHN.6,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus en Galilée. Multiplication des pains
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-15: cf. (Mt 14:13-21. Mc 6:30-44. Lu 9:10-17.) Mt 15:29-39. 2 R 4:42-44.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, Jésus s’en alla de l’autre côté de la mer de Galilée, de Tibériade. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Faites-les asseoir.
    - type: text
      text: ' Il y avait dans ce lieu beaucoup d’herbe. Ils s’assirent donc, au nombre d’environ cinq mille hommes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus prit les pains, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 9:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'rendit grâces, et les distribua à ceux qui étaient assis; il leur donna de même des poissons, autant qu’ils en voulurent. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’ils furent rassasiés, il dit à ses disciples: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ramassez les morceaux qui restent, afin que rien ne se perde.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils les ramassèrent donc, et ils remplirent douze paniers avec les morceaux qui restèrent des cinq pains d’orge, après que tous eurent mangé. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces gens, ayant vu le miracle que Jésus avait fait, disaient: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 7:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 4:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Celui-ci est vraiment le prophète qui doit venir dans le monde. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et Jésus, sachant qu’ils allaient venir l’enlever pour le faire roi, se retira de nouveau sur la montagne, lui seul.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus marche sur les eaux
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-21: cf. (Mt 14:22-34. Mc 6:45-53.)'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 14:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 6:47
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand le soir fut venu, ses disciples descendirent au bord de la mer. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Étant montés dans une barque, ils traversaient la mer pour se rendre à Capernaüm. Il faisait déjà nuit, et Jésus ne les avait pas encore rejoints. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il soufflait un grand vent, et la mer était agitée. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir ramé environ vingt-cinq ou trente stades, ils virent Jésus marchant sur la mer et s’approchant de la barque. Et ils eurent peur. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une grande foule le suivait, parce qu’elle voyait les miracles qu’il opérait sur les malades. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: C’est moi; n’ayez pas peur!
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils voulaient donc le prendre dans la barque, et aussitôt la barque aborda au lieu où ils allaient.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le pain de vie. Abandon de quelques disciples
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-59: cf. (Ex 16:12-35. Ps 78:23-25. 1 Co 10:3, 4.) (És 55:1-3. Jn 3:14-16. 1 Jn 5:10-13.) 1 Co 11:23-26.'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La foule qui était restée de l’autre côté de la mer avait remarqué qu’il ne se trouvait là qu’une seule barque, et que Jésus n’était pas monté dans cette barque avec ses disciples, mais qu’ils étaient partis seuls. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le lendemain, comme d’autres barques étaient arrivées de Tibériade près du lieu où ils avaient mangé le pain après que le Seigneur eut rendu grâces, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les gens de la foule, ayant vu que ni Jésus ni ses disciples n’étaient là, montèrent eux-mêmes dans ces barques et allèrent à Capernaüm à la recherche de Jésus. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’ayant trouvé au-delà de la mer, ils lui dirent: Rabbi, quand es-tu venu ici? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: En vérité, en vérité, je vous le dis, vous me cherchez, non parce que vous avez vu des miracles, mais parce que vous avez mangé des pains et que vous avez été rassasiés.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 3:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:40
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '54'
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Travaillez, non pour la nourriture qui périt, mais pour celle qui subsiste pour la vie éternelle, et que le Fils de l’homme vous donnera;
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 3:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:35
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:37
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 1:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: car c’est lui que le Père, que Dieu a marqué de son sceau.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui dirent: Que devons-nous faire, pour faire les œuvres de Dieu? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 3:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: L’œuvre de Dieu, c’est que vous croyiez en celui qu’il a envoyé.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus monta sur la montagne, et là il s’assit avec ses disciples. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 12:38
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 8:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 11:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 1:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'miracle fais-tu donc, lui dirent-ils, afin que nous le voyions, et que nous croyions en toi? Que fais-tu? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 16:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 11:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Nos pères ont mangé la manne dans le désert, selon ce qui est écrit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 78:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il leur donna le pain du ciel à manger.
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jésus leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: En vérité, en vérité, je vous le dis, Moïse ne vous a pas donné le pain du ciel, mais mon Père vous donne le vrai pain du ciel;
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: car le pain de Dieu, c’est celui qui descend du ciel et qui donne la vie au monde.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui dirent: Seigneur, donne-nous toujours ce pain. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je suis le pain de vie.
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 55:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 4:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:37
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Celui qui vient à moi n’aura jamais faim, et celui qui croit en moi n’aura jamais soif.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais, je vous l’ai dit, vous m’avez vu, et vous ne croyez point.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tous ceux que le Père me donne viendront à moi, et je ne mettrai pas dehors celui qui vient à moi;
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: car je suis descendu du ciel pour faire,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:39
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:36
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:42
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 5:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: non ma volonté, mais la volonté de celui qui m’a envoyé.
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Or, la volonté de celui qui m’a envoyé, c’est que je ne perde rien
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 10:28
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: de tout ce qu’il m’a donné, mais que je le ressuscite au dernier jour.
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, la Pâque était proche, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 12:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 23:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 28:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 16:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'la fête des Juifs. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: La volonté de mon Père,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 3:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:27
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '54'
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: c’est que quiconque voit le Fils et croit en lui ait la vie éternelle; et je le ressusciterai au dernier jour.
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Juifs murmuraient à son sujet, parce qu’il avait dit: Je suis le pain qui est descendu du ciel. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ils disaient: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 13:55
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 6:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'N’est-ce pas là Jésus, le fils de Joseph, celui dont nous connaissons le père et la mère? Comment donc dit-il: Je suis descendu du ciel? '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ne murmurez pas entre vous.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ca 1:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6:65
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Nul ne peut venir à moi, si le Père qui m’a envoyé ne l’attire; et je le ressusciterai au dernier jour.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il est écrit dans les prophètes:'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 45:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 31:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 8:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ils seront tous enseignés de Dieu. Ainsi quiconque a entendu le Père et a reçu son enseignement vient à moi.
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 11:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 10:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:29
      - type: text
        text: '; '
