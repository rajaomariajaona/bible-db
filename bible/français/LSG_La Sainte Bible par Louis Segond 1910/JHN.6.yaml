      children:
      - type: text
        text: Lu 9:13
      metadata:
        usfm: LUK.9.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ayant levé les yeux, et voyant qu’une grande foule venait à lui, Jésus dit à Philippe: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Où achèterons-nous des pains, pour que ces gens aient à manger?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il disait cela pour l’éprouver, car il savait ce qu’il allait faire. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Philippe lui répondit: Les pains qu’on aurait pour deux cents deniers ne suffiraient pas pour que chacun en reçût un peu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Un de ses disciples, André, frère de Simon Pierre, lui dit: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il y a ici un jeune garçon qui a cinq pains d’orge et deux poissons; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 4:43
      metadata:
        usfm: 2KI.4.43
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais qu’est-ce que cela pour tant de gens? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Faites-les asseoir.
  - type: text
    text: ' Il y avait dans ce lieu beaucoup d’herbe. Ils s’assirent donc, au nombre d’environ cinq mille hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jésus prit les pains, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 9:13
      metadata:
        usfm: 1SA.9.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'rendit grâces, et les distribua à ceux qui étaient assis; il leur donna de même des poissons, autant qu’ils en voulurent. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsqu’ils furent rassasiés, il dit à ses disciples: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ramassez les morceaux qui restent, afin que rien ne se perde.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils les ramassèrent donc, et ils remplirent douze paniers avec les morceaux qui restèrent des cinq pains d’orge, après que tous eurent mangé. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ces gens, ayant vu le miracle que Jésus avait fait, disaient: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 7:16
      metadata:
        usfm: LUK.7.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:19
      metadata:
        usfm: LUK.24.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 4:19
      metadata:
        usfm: JHN.4.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Celui-ci est vraiment le prophète qui doit venir dans le monde. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Et Jésus, sachant qu’ils allaient venir l’enlever pour le faire roi, se retira de nouveau sur la montagne, lui seul.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus marche sur les eaux
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-21: cf. (Mt 14:22-34. Mc 6:45-53.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 14:23
      metadata:
        usfm: MAT.14.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:47
      metadata:
        usfm: MRK.6.47
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand le soir fut venu, ses disciples descendirent au bord de la mer. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Étant montés dans une barque, ils traversaient la mer pour se rendre à Capernaüm. Il faisait déjà nuit, et Jésus ne les avait pas encore rejoints. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il soufflait un grand vent, et la mer était agitée. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Après avoir ramé environ vingt-cinq ou trente stades, ils virent Jésus marchant sur la mer et s’approchant de la barque. Et ils eurent peur. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est moi; n’ayez pas peur!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils voulaient donc le prendre dans la barque, et aussitôt la barque aborda au lieu où ils allaient.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le pain de vie. Abandon de quelques disciples
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-59: cf. (Ex 16:12-35. Ps 78:23-25. 1 Co 10:3, 4.) (És 55:1-3. Jn 3:14-16. 1 Jn 5:10-13.) 1 Co 11:23-26.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'La foule qui était restée de l’autre côté de la mer avait remarqué qu’il ne se trouvait là qu’une seule barque, et que Jésus n’était pas monté dans cette barque avec ses disciples, mais qu’ils étaient partis seuls. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Le lendemain, comme d’autres barques étaient arrivées de Tibériade près du lieu où ils avaient mangé le pain après que le Seigneur eut rendu grâces, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'les gens de la foule, ayant vu que ni Jésus ni ses disciples n’étaient là, montèrent eux-mêmes dans ces barques et allèrent à Capernaüm à la recherche de Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Et l’ayant trouvé au-delà de la mer, ils lui dirent: Rabbi, quand es-tu venu ici? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jésus leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En vérité, en vérité, je vous le dis, vous me cherchez, non parce que vous avez vu des miracles, mais parce que vous avez mangé des pains et que vous avez été rassasiés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:16
      metadata:
        usfm: JHN.3.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:14
      metadata:
        usfm: JHN.4.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:40
      metadata:
        usfm: JHN.6.40
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '54'
      metadata:
        usfm: JHN.6.54
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Travaillez, non pour la nourriture qui périt, mais pour celle qui subsiste pour la vie éternelle, et que le Fils de l’homme vous donnera;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:17
      metadata:
        usfm: MAT.3.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:5
      metadata:
        usfm: MAT.17.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:11
      metadata:
        usfm: MRK.1.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:7
      metadata:
        usfm: MRK.9.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:22
      metadata:
        usfm: LUK.3.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:35
      metadata:
        usfm: LUK.9.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:33
      metadata:
        usfm: JHN.1.33
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:37
      metadata:
        usfm: JHN.5.37
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:18
      metadata:
        usfm: JHN.8.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 1:17
      metadata:
        usfm: 2PE.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car c’est lui que le Père, que Dieu a marqué de son sceau.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils lui dirent: Que devons-nous faire, pour faire les œuvres de Dieu? '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jésus leur répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:23
      metadata:
        usfm: 1JN.3.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: L’œuvre de Dieu, c’est que vous croyiez en celui qu’il a envoyé.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Quel '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:38
      metadata:
        usfm: MAT.12.38
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:1
      metadata:
        usfm: MAT.16.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 8:11
      metadata:
        usfm: MRK.8.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 11:29
      metadata:
        usfm: LUK.11.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:22
      metadata:
        usfm: 1CO.1.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'miracle fais-tu donc, lui dirent-ils, afin que nous le voyions, et que nous croyions en toi? Que fais-tu? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 16:4
      metadata:
        usfm: EXO.16.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: EXO.16.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 11:7
      metadata:
        usfm: NUM.11.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nos pères ont mangé la manne dans le désert, selon ce qui est écrit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:24
      metadata:
        usfm: PSA.78.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:3
      metadata:
        usfm: 1CO.10.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il leur donna le pain du ciel à manger.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En vérité, en vérité, je vous le dis, Moïse ne vous a pas donné le pain du ciel, mais mon Père vous donne le vrai pain du ciel;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car le pain de Dieu, c’est celui qui descend du ciel et qui donne la vie au monde.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ils lui dirent: Seigneur, donne-nous toujours ce pain. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je suis le pain de vie.
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
