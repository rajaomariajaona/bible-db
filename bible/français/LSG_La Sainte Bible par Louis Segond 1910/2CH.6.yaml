document_id: 2CH.6
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. 1 R 8:12-21. 1 Ch 17:1-14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors Salomon dit: L’Éternel veut habiter dans l’obscurité! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et moi, j’ai bâti une maison qui sera ta demeure, un lieu où tu résideras éternellement! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 8:14
      metadata:
        usfm: 1KI.8.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: 1KI.8.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi tourna son visage, et bénit toute l’assemblée d’Israël; et toute l’assemblée d’Israël était debout. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et il dit: Béni soit l’Éternel, le Dieu d’Israël, qui a parlé de sa bouche à David, mon père, et qui accomplit par sa puissance ce qu’il avait déclaré en disant: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Depuis le jour où j’ai fait sortir mon peuple du pays d’Égypte, je n’ai point choisi de ville parmi toutes les tribus d’Israël pour qu’il y fût bâti une maison où résidât mon nom, et je n’ai point choisi d’homme pour qu’il fût chef de mon peuple d’Israël; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'mais j’ai choisi Jérusalem pour que mon nom y résidât, et j’ai choisi David pour qu’il régnât sur mon peuple d’Israël! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:2
      metadata:
        usfm: 2SA.7.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 8:17
      metadata:
        usfm: 1KI.8.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 17:1
      metadata:
        usfm: 1CH.17.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:2
      metadata:
        usfm: 1CH.28.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'David, mon père, avait l’intention de bâtir une maison au nom de l’Éternel, le Dieu d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et l’Éternel dit à David, mon père: Puisque tu as eu l’intention de bâtir une maison à mon nom, tu as bien fait d’avoir eu cette intention. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Seulement, ce ne sera pas toi qui bâtiras la maison; mais ce sera ton fils, sorti de tes entrailles, qui bâtira la maison à mon nom. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L’Éternel a accompli la parole qu’il avait prononcée. Je me suis élevé à la place de David, mon père, et je me suis assis sur le trône d’Israël, comme l’avait annoncé l’Éternel, et j’ai bâti la maison au nom de l’Éternel, le Dieu d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: J’y ai placé l’arche où est l’alliance de l’Éternel, l’alliance qu’il a faite avec les enfants d’Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière de Salomon
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-42: cf. 1 R 8:22-53. 2 Ch 20:5-12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Salomon se plaça devant l’autel de l’Éternel, en face de toute l’assemblée d’Israël, et il étendit ses mains. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Car Salomon avait fait une tribune d’airain, et l’avait mise au milieu du parvis; elle était longue de cinq coudées, large de cinq coudées, et haute de trois coudées; il s’y plaça, se mit à genoux en face de toute l’assemblée d’Israël, et étendit ses mains vers le ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et il dit: O Éternel, Dieu d’Israël! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 15:11
      metadata:
        usfm: EXO.15.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:39
      metadata:
        usfm: DEU.4.39
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:9
      metadata:
        usfm: DEU.7.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il n’y a point de Dieu semblable à toi, dans les cieux et sur la terre: tu gardes l’alliance et la miséricorde envers tes serviteurs qui marchent en ta présence '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 2:4
      metadata:
        usfm: 1KI.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de tout leur cœur! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ainsi tu as tenu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 22:9
      metadata:
        usfm: 1CH.22.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'parole à ton serviteur David, mon père; et ce que tu as déclaré de ta bouche, tu l’accomplis en ce jour par ta puissance. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Maintenant, Éternel, Dieu d’Israël, observe la promesse que tu as faite à David, mon père, en disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:12
      metadata:
        usfm: 2SA.7.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 132:12
      metadata:
        usfm: PSA.132.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne manqueras jamais devant moi d’un successeur assis sur le trône d’Israël, pourvu que tes fils prennent garde à leur voie et qu’ils marchent dans ma loi comme tu as marché en ma présence. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Qu’elle s’accomplisse donc, Éternel, Dieu d’Israël, la promesse que tu as faite à ton serviteur David! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais quoi! Dieu habiterait-il véritablement avec l’homme sur la terre? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 8:27
      metadata:
        usfm: 1KI.8.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 2:6
      metadata:
        usfm: 2CH.2.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 66:1
      metadata:
        usfm: ISA.66.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:49
      metadata:
        usfm: ACT.7.49
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Voici, les cieux et les cieux des cieux ne peuvent te contenir: combien moins cette maison que j’ai bâtie! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Toutefois, Éternel mon Dieu, sois attentif à la prière de ton serviteur et à sa supplication; écoute le cri et la prière que t’adresse ton serviteur. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Que tes yeux soient jour et nuit ouverts sur cette maison, sur le lieu dont tu as dit que là serait ton nom! Écoute la prière que ton serviteur fait en ce lieu. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Daigne exaucer les supplications de ton serviteur et de ton peuple d’Israël, lorsqu’ils prieront en ce lieu! Exauce du lieu de ta demeure, des cieux, exauce et pardonne! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 R 8:31, etc.
    marker-yv: yv-n
  - type: text
    text: 'Si quelqu’un pèche contre son prochain et qu’on lui impose un serment pour le faire jurer, et s’il vient jurer devant ton autel, dans cette maison, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'écoute-le des cieux, agis, et juge tes serviteurs; condamne le coupable, et fais retomber sa conduite sur sa tête, rends justice à l’innocent, et traite-le selon son innocence! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 R 8:33, etc.
    marker-yv: yv-n
  - type: text
    text: 'Quand ton peuple d’Israël sera battu par l’ennemi, pour avoir péché contre toi; s’ils reviennent à toi et rendent gloire à ton nom, s’ils t’adressent des prières et des supplications dans cette maison, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'exauce-les des cieux, pardonne le péché de ton peuple d’Israël, et ramène-les dans le pays que tu as donné à eux et à leurs pères! '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 R 8:35, etc.
    marker-yv: yv-n
  - type: text
    text: 'Quand le ciel sera fermé et qu’il n’y aura point de pluie, à cause de leurs péchés contre toi; s’ils prient dans ce lieu et rendent gloire à ton nom, et s’ils se détournent de leurs péchés, parce que tu les auras châtiés; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'exauce-les des cieux, pardonne le péché de tes serviteurs et de ton peuple d’Israël, à qui tu enseigneras la bonne voie dans laquelle ils doivent marcher, et fais venir la pluie sur la terre que tu as donnée pour héritage à ton peuple! '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 20:9
      metadata:
        usfm: 2CH.20.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand la famine, la peste, la rouille et la nielle, les sauterelles d’une espèce ou d’une autre, seront dans le pays, quand l’ennemi assiégera ton peuple dans son pays, dans ses portes, quand il y aura des fléaux ou des maladies quelconques; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 R 8:38, etc.
    marker-yv: yv-n
  - type: text
    text: 'si un homme, si tout ton peuple d’Israël fait entendre des prières et des supplications, et que chacun reconnaisse sa plaie et sa douleur et étende les mains vers cette maison, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'exauce-le des cieux, du lieu de ta demeure, et pardonne; rends à chacun selon ses voies, toi qui connais le cœur de chacun, car seul tu connais le cœur des enfants des hommes, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'et ils te craindront pour marcher dans tes voies tout le temps qu’ils vivront dans le pays que tu as donné à nos pères! '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 R 8:41, etc.
    marker-yv: yv-n
  - type: text
    text: 'Quand l’étranger, qui n’est pas de ton peuple d’Israël, viendra d’un pays lointain, à cause de ton grand nom, de ta main forte et de ton bras étendu, quand il viendra prier dans cette maison, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'exauce-le des cieux, du lieu de ta demeure, et accorde à cet étranger tout ce qu’il te demandera, afin que tous les peuples de la terre connaissent ton nom pour te craindre, comme ton peuple d’Israël, et sachent que ton nom est invoqué sur cette maison que j’ai bâtie! '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 R 8:44, etc.
    marker-yv: yv-n
  - type: text
    text: 'Quand ton peuple sortira pour combattre ses ennemis, en suivant la voie que tu lui auras prescrite; s’ils t’adressent des prières, les regards tournés vers cette ville que tu as choisie et vers la maison que j’ai bâtie en ton nom, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'exauce des cieux leurs prières et leurs supplications, et fais-leur droit! '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Quand ils pécheront contre toi, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 8:46
      metadata:
        usfm: 1KI.8.46
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 20:9
      metadata:
        usfm: PRO.20.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 7:20
      metadata:
        usfm: ECC.7.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 3:2
      metadata:
        usfm: JAS.3.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 1:8
      metadata:
        usfm: 1JN.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car il n’y a point d’homme qui ne pèche, quand tu seras irrité contre eux et que tu les livreras à l’ennemi, qui les emmènera captifs dans un pays lointain ou rapproché; '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 's’ils rentrent en eux-mêmes dans le pays où ils seront captifs, s’ils reviennent à toi et t’adressent des supplications dans le pays de leur captivité, et qu’ils disent: Nous avons péché, nous avons commis des iniquités, nous avons fait le mal! '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 's’ils reviennent à toi de tout leur cœur et de toute leur âme, dans le pays de leur captivité où ils ont été emmenés captifs, s’ils t’adressent des prières, les regards tournés vers leur pays que tu as donné à leurs pères, vers la ville que tu as choisie et vers la maison que j’ai bâtie à ton nom, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'exauce des cieux, du lieu de ta demeure, leurs prières et leurs supplications, et fais-leur droit; pardonne à ton peuple ses péchés contre toi! '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Maintenant, ô mon Dieu, que tes yeux soient ouverts, et que tes oreilles soient attentives à la prière faite en ce lieu! '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Maintenant, Éternel Dieu, lève-toi, viens à ton lieu de repos, toi et l’arche de ta majesté! Que tes sacrificateurs, Éternel Dieu, soient revêtus de salut, et que tes bien-aimés jouissent du bonheur! '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Éternel Dieu, ne repousse pas ton oint, souviens-toi des grâces accordées à David, ton serviteur!
