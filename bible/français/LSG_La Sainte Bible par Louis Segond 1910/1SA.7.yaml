document_id: 1SA.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: L’arche à Kirjath-Jearim
  - type: heading
    content: 'V. 1-6: cf. Joë 2:12-18. Jg 10:15, 16. Ca 2:12, 13. Éz 37:1-14.'
  - type: text
    content: 'Les gens de Kirjath-Jearim vinrent, et firent monter l’arche de l’Éternel; '
  - type: note
    content: 2 S 6:4.
  - type: text
    content: 'ils la conduisirent dans la maison d’Abinadab, sur la colline, et ils consacrèrent son fils Éléazar pour garder l’arche de l’Éternel. '
  '10':
  - type: text
    content: 'Pendant que Samuel offrait l’holocauste, les Philistins s’approchèrent pour attaquer Israël. L’Éternel fit retentir en ce jour son tonnerre sur les Philistins, et '
  - type: note
    content: Jos 10:10.
  - type: text
    content: 'les mit en déroute. Ils furent battus devant Israël. '
  '11':
  - type: text
    content: 'Les hommes d’Israël sortirent de Mitspa, poursuivirent les Philistins, et les battirent jusqu’au-dessous de Beth-Car. '
  '12':
  - type: text
    content: 'Samuel prit une pierre, qu’il plaça entre Mitspa et Schen, et il l’appela du nom '
  - type: note
    content: 1 S 4:1.
  - type: text
    content: 'd’Ében-Ézer, en disant: Jusqu’ici l’Éternel nous a secourus. '
  '13':
  - type: text
    content: 'Ainsi les Philistins furent humiliés, et ils ne vinrent plus sur le territoire d’Israël. La main de l’Éternel fut contre les Philistins pendant toute la vie de Samuel. '
  '14':
  - type: text
    content: Les villes que les Philistins avaient prises sur Israël retournèrent à Israël, depuis Ékron jusqu’à Gath, avec leur territoire; Israël les arracha de la main des Philistins. Et il y eut paix entre Israël et les Amoréens.
  - type: heading
    content: 'V. 15-17: cf. 1 S 12:1-5.'
  '15':
  - type: text
    content: 'Samuel fut juge en Israël pendant toute sa vie. '
  '16':
  - type: text
    content: 'Il allait chaque année faire le tour de Béthel, de Guilgal et de Mitspa, et il jugeait Israël dans tous ces lieux. '
  '17':
  - type: text
    content: 'Puis il revenait à Rama, '
  - type: note
    content: 1 S 8:4.
  - type: text
    content: où était sa maison; et là il jugeait Israël, et il y bâtit un autel à l’Éternel.
  '2':
  - type: text
    content: 'Il s’était passé bien du temps depuis le jour où l’arche avait été déposée à Kirjath-Jearim. Vingt années s’étaient écoulées. Alors toute la maison d’Israël poussa des gémissements vers l’Éternel. '
  '3':
  - type: text
    content: 'Samuel dit à toute la maison d’Israël: Si c’est de tout votre cœur que vous revenez à l’Éternel, ôtez du milieu de vous les dieux étrangers et les Astartés, '
  - type: note
    content: De 6:13; 10:20. Mt 4:10. Lu 4:8.
  - type: text
    content: 'dirigez votre cœur vers l’Éternel, et servez-le lui seul; et il vous délivrera de la main des Philistins. '
  '4':
  - type: text
    content: 'Et les enfants d’Israël ôtèrent du milieu d’eux les Baals et les Astartés, et ils servirent l’Éternel seul. '
  '5':
  - type: text
    content: 'Samuel dit: Assemblez tout Israël à Mitspa, et je prierai l’Éternel pour vous. '
  '6':
  - type: text
    content: 'Et ils s’assemblèrent à Mitspa. Ils puisèrent de l’eau et la répandirent devant l’Éternel, et ils jeûnèrent ce jour-là, en disant: Nous avons péché contre l’Éternel! Samuel jugea les enfants d’Israël à Mitspa.'
  - type: heading
    content: Israël repentant, et les Philistins vaincus
  - type: heading
    content: 'V. 7-14: cf. (Ps 99:6. Jg 2:16, 18.) Ps 118:10-16. Hé 11:32-34.'
  '7':
  - type: text
    content: 'Les Philistins apprirent que les enfants d’Israël s’étaient assemblés à Mitspa, et les princes des Philistins montèrent contre Israël. A cette nouvelle, les enfants d’Israël eurent peur des Philistins, '
  '8':
  - type: text
    content: 'et ils dirent à Samuel: Ne cesse point de crier pour nous à l’Éternel, notre Dieu, afin qu’il nous sauve de la main des Philistins. '
  '9':
  - type: text
    content: 'Samuel prit un agneau de lait, et l’offrit tout entier en holocauste à l’Éternel. Il cria à l’Éternel pour Israël, et l’Éternel l’exauça. '
