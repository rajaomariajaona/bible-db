document_id: HAG.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Exhortation à rebâtir le temple de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. (Esd 4; 5:1.) (Ag 2:15-19. Za 1:1-6.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La seconde année du roi Darius, le premier jour du sixième mois, la parole de l’Éternel fut adressée par Aggée, le prophète, à Zorobabel, fils de Schealthiel, gouverneur de Juda, et à Josué, fils de Jotsadak, le souverain sacrificateur, en ces mots: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est pourquoi les cieux vous ont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 28:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: refusé la rosée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la terre a refusé ses produits.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai appelé la sécheresse sur le pays, sur les montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur le blé, sur le moût, sur l’huile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur ce que la terre peut rapporter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur les hommes et sur les bêtes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sur tout le travail des mains.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-15: cf. Esd 5:1, 2.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zorobabel, fils de Schealthiel, Josué, fils de Jotsadak, le souverain sacrificateur, et tout le reste du peuple, entendirent la voix de l’Éternel, leur Dieu, et les paroles d’Aggée, le prophète, selon la mission que lui avait donnée l’Éternel, leur Dieu. Et le peuple fut saisi de crainte devant l’Éternel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aggée, envoyé de l’Éternel, dit au peuple, d’après l’ordre de l’Éternel: Je suis avec vous, dit l’Éternel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel réveilla l’esprit de Zorobabel, fils de Schealthiel, gouverneur de Juda, et l’esprit de Josué, fils de Jotsadak, le souverain sacrificateur, et l’esprit de tout le reste du peuple. Ils vinrent, et ils se mirent à l’œuvre dans la maison de l’Éternel des armées, leur Dieu, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: le vingt-quatrième jour du sixième mois, la seconde année du roi Darius.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi parle l’Éternel des armées: Ce peuple dit: Le temps n’est pas venu, le temps de rebâtir la maison de l’Éternel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi la parole de l’Éternel leur fut adressée par Aggée, le prophète, en ces mots:'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce le temps pour vous d’habiter vos demeures lambrissées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand cette maison est détruite?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle maintenant l’Éternel des armées:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Considérez attentivement vos voies!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 28:38
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 6:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Vous semez beaucoup, et vous recueillez peu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous mangez, et vous n’êtes pas rassasiés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous buvez, et vous n’êtes pas désaltérés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous êtes vêtus, et vous n’avez pas chaud;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le salaire de celui qui est à gages tombe dans un sac percé.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel des armées:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Considérez attentivement vos voies!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Montez sur la montagne, apportez du bois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et bâtissez la maison:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’en aurai de la joie, et je serai glorifié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous comptiez sur beaucoup, et voici, vous avez eu peu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous l’avez rentré chez vous, mais j’ai soufflé dessus.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi? Dit l’Éternel des armées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de ma maison, qui est détruite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tandis que vous vous empressez chacun pour sa maison.
