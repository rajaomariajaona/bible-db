document_id: HAG.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Exhortation à rebâtir le temple de Jérusalem
  - type: heading
    content: 'V. 1-11: cf. (Esd 4; 5:1.) (Ag 2:15-19. Za 1:1-6.)'
  - type: text
    content: 'La seconde année du roi Darius, le premier jour du sixième mois, la parole de l’Éternel fut adressée par Aggée, le prophète, à Zorobabel, fils de Schealthiel, gouverneur de Juda, et à Josué, fils de Jotsadak, le souverain sacrificateur, en ces mots: '
  '10':
  - type: text
    content: 'C’est pourquoi les cieux vous ont '
  - type: note
    content: De 28:23.
  - type: text
    content: refusé la rosée,
  - type: text
    content: Et la terre a refusé ses produits.
  '11':
  - type: text
    content: J’ai appelé la sécheresse sur le pays, sur les montagnes,
  - type: text
    content: Sur le blé, sur le moût, sur l’huile,
  - type: text
    content: Sur ce que la terre peut rapporter,
  - type: text
    content: Sur les hommes et sur les bêtes,
  - type: text
    content: Et sur tout le travail des mains.
  - type: heading
    content: 'V. 12-15: cf. Esd 5:1, 2.'
  '12':
  - type: text
    content: 'Zorobabel, fils de Schealthiel, Josué, fils de Jotsadak, le souverain sacrificateur, et tout le reste du peuple, entendirent la voix de l’Éternel, leur Dieu, et les paroles d’Aggée, le prophète, selon la mission que lui avait donnée l’Éternel, leur Dieu. Et le peuple fut saisi de crainte devant l’Éternel. '
  '13':
  - type: text
    content: 'Aggée, envoyé de l’Éternel, dit au peuple, d’après l’ordre de l’Éternel: Je suis avec vous, dit l’Éternel. '
  '14':
  - type: text
    content: 'L’Éternel réveilla l’esprit de Zorobabel, fils de Schealthiel, gouverneur de Juda, et l’esprit de Josué, fils de Jotsadak, le souverain sacrificateur, et l’esprit de tout le reste du peuple. Ils vinrent, et ils se mirent à l’œuvre dans la maison de l’Éternel des armées, leur Dieu, '
  '15':
  - type: text
    content: le vingt-quatrième jour du sixième mois, la seconde année du roi Darius.
  '2':
  - type: text
    content: 'Ainsi parle l’Éternel des armées: Ce peuple dit: Le temps n’est pas venu, le temps de rebâtir la maison de l’Éternel. '
  '3':
  - type: text
    content: 'C’est pourquoi la parole de l’Éternel leur fut adressée par Aggée, le prophète, en ces mots:'
  '4':
  - type: text
    content: Est-ce le temps pour vous d’habiter vos demeures lambrissées,
  - type: text
    content: Quand cette maison est détruite?
  '5':
  - type: text
    content: 'Ainsi parle maintenant l’Éternel des armées:'
  - type: text
    content: Considérez attentivement vos voies!
  '6':
  - type: text
    content: ' '
  - type: note
    content: De 28:38. Mi 6:14, 15.
  - type: text
    content: Vous semez beaucoup, et vous recueillez peu,
  - type: text
    content: Vous mangez, et vous n’êtes pas rassasiés,
  - type: text
    content: Vous buvez, et vous n’êtes pas désaltérés,
  - type: text
    content: Vous êtes vêtus, et vous n’avez pas chaud;
  - type: text
    content: Le salaire de celui qui est à gages tombe dans un sac percé.
  '7':
  - type: text
    content: 'Ainsi parle l’Éternel des armées:'
  - type: text
    content: Considérez attentivement vos voies!
  '8':
  - type: text
    content: Montez sur la montagne, apportez du bois,
  - type: text
    content: 'Et bâtissez la maison:'
  - type: text
    content: J’en aurai de la joie, et je serai glorifié,
  - type: text
    content: Dit l’Éternel.
  '9':
  - type: text
    content: Vous comptiez sur beaucoup, et voici, vous avez eu peu;
  - type: text
    content: Vous l’avez rentré chez vous, mais j’ai soufflé dessus.
  - type: text
    content: Pourquoi? Dit l’Éternel des armées.
  - type: text
    content: A cause de ma maison, qui est détruite,
  - type: text
    content: Tandis que vous vous empressez chacun pour sa maison.
