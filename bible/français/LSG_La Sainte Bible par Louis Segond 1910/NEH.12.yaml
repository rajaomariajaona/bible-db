document_id: NEH.12,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dénombrement des sacrificateurs et des Lévites
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-26: cf. (Esd 2:1, 2, 36-42. 1 Ch 9:2, 10, etc.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les sacrificateurs et les Lévites qui revinrent avec Zorobabel, fils de Schealthiel, et avec Josué: Seraja, Jérémie, Esdras, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué engendra Jojakim, Jojakim engendra Éliaschib, Éliaschib engendra Jojada, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jojada engendra Jonathan, et Jonathan engendra Jaddua. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici, au temps de Jojakim, quels étaient les sacrificateurs, chefs de famille: pour Seraja, Meraja; pour Jérémie, Hanania; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour Esdras, Meschullam; pour Amaria, Jochanan; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour Meluki, Jonathan; pour Schebania, Joseph; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour Harim, Adna; pour Merajoth, Helkaï; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour Iddo, Zacharie; pour Guinnethon, Meschullam; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour Abija, Zicri; pour Minjamin et Moadia, Pilthaï; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour Bilga, Schammua; pour Schemaeja, Jonathan; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour Jojarib, Matthnaï; pour Jedaeja, Uzzi; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amaria, Malluc, Hattusch, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour Sallaï, Kallaï; pour Amok, Éber; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour Hilkija, Haschabia; pour Jedaeja, Nethaneel. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au temps d’Éliaschib, de Jojada, de Jochanan et de Jaddua, les Lévites, chefs de familles, et les sacrificateurs, furent inscrits, sous le règne de Darius, le Perse. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils de Lévi, chefs de familles, furent inscrits dans le livre des '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Ch 9:10, etc.
      marker-yv: yv-n
    - type: text
      text: 'Chroniques jusqu’au temps de Jochanan, fils d’Éliaschib. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les chefs des Lévites, Haschabia, Schérébia, et Josué, fils de Kadmiel, et leurs frères avec eux, les uns vis-à-vis des autres, étaient chargés de célébrer et de louer l’Éternel, selon l’ordre de David, homme de Dieu. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Matthania, Bakbukia, Abdias, Meschullam, Thalmon et Akkub, portiers, faisaient la garde aux seuils des portes. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils vivaient au temps de Jojakim, fils de Josué, fils de Jotsadak, et au temps de Néhémie, le gouverneur, et d’Esdras, le sacrificateur et le scribe.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dédicace des murailles de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 27-43: cf. (Né 6:1-16. Esd 6:16-18.) Ca 2:12.'
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lors de la dédicace des murailles de Jérusalem, on appela les Lévites de tous les lieux qu’ils habitaient et on les fit venir à Jérusalem, afin de célébrer la dédicace et la fête par des louanges et par des chants, au son des cymbales, des luths et des harpes. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils des chantres se rassemblèrent des environs de Jérusalem, des villages des Nethophatiens, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Beth-Guilgal, et du territoire de Guéba et d’Azmaveth; car les chantres s’étaient bâti des villages aux alentours de Jérusalem. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Schecania, Rehum, Merémoth, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les sacrificateurs et les Lévites se purifièrent, et ils purifièrent le peuple, les portes et la muraille. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je fis monter sur la muraille les chefs de Juda, et je formai deux grands chœurs. Le premier se mit en marche du côté droit sur la muraille, vers la porte du fumier. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Derrière ce chœur marchaient Hosée et la moitié des chefs de Juda, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Azaria, Esdras, Meschullam, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Juda, Benjamin, Schemaeja et Jérémie, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'des fils de sacrificateurs avec des trompettes, Zacharie, fils de Jonathan, fils de Schemaeja, fils de Matthania, fils de Michée, fils de Zaccur, fils d’Asaph, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et ses frères, Schemaeja, Azareel, Milalaï, Guilalaï, Maaï, Nethaneel, Juda et Hanani, avec les instruments de musique de David, homme de Dieu. Esdras, le scribe, était à leur tête. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A la porte de la source, ils montèrent vis-à-vis d’eux les degrés de la cité de David par la montée de la muraille, au-dessus de la maison de David, jusqu’à la porte des eaux, vers l’orient. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le second chœur se mit en marche à l’opposite. J’étais derrière lui avec l’autre moitié du peuple, sur la muraille. Passant au-dessus de la tour des fours, on alla jusqu’à la muraille large; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'puis au-dessus de la porte d’Éphraïm, de la vieille porte, de la porte des poissons, de la tour de Hananeel et de la tour de Méa, jusqu’à la porte des brebis. Et l’on s’arrêta à la porte de la prison. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Iddo, Guinnethoï, Abija, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les deux chœurs s’arrêtèrent dans la maison de Dieu; et nous fîmes de même, moi et les magistrats qui étaient avec moi, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et les sacrificateurs Éliakim, Maaséja, Minjamin, Michée, Éljoénaï, Zacharie, Hanania, avec des trompettes, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et Maaséja, Schemaeja, Éléazar, Uzzi, Jochanan, Malkija, Élam et Ézer. Les chantres se firent entendre, dirigés par Jizrachja. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On offrit ce jour-là de nombreux sacrifices, et on se livra aux réjouissances, car Dieu avait donné au peuple un grand sujet de joie. Les femmes et les enfants se réjouirent aussi, et les cris de joie de Jérusalem furent entendus au loin.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rétablissement des revenus des sacrificateurs et des Lévites
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 44-47: cf. Né 10:35-39.'
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce jour, on établit des hommes ayant la surveillance des chambres qui servaient de magasins pour les offrandes, les prémices et les dîmes, et on les chargea d’y recueillir du territoire des villes les portions assignées par la loi aux sacrificateurs et aux Lévites. Car Juda se réjouissait de ce que les sacrificateurs et les Lévites étaient à leur poste, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'observant tout ce qui concernait le service de Dieu et des purifications. Les chantres et les portiers remplissaient aussi leurs fonctions, selon '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'l’ordre de David et de Salomon, son fils; '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car autrefois, du temps de David et d’Asaph, il y avait des chefs de chantres et des chants de louanges et d’actions de grâces en l’honneur de Dieu. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout Israël, au temps de Zorobabel et de Néhémie, donna les portions des chantres et des portiers, jour par jour; on donna aux Lévites les choses consacrées, et les Lévites donnèrent aux fils d’Aaron les choses consacrées.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mijamin, Maadia, Bilga, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Schemaeja, Jojarib, Jedaeja, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sallu, Amok, Hilkija, Jedaeja. Ce furent là les chefs des sacrificateurs et de leurs frères, au temps de Josué. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lévites: Josué, Binnuï, Kadmiel, Schérébia, Juda, Matthania, qui dirigeait avec ses frères le chant des louanges; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bakbukia et Unni, qui remplissaient leurs fonctions auprès de leurs frères. '
