document_id: NEH.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Dénombrement des sacrificateurs et des Lévites
  - type: heading
    content: 'V. 1-26: cf. (Esd 2:1, 2, 36-42. 1 Ch 9:2, 10, etc.)'
  - type: text
    content: 'Voici les sacrificateurs et les Lévites qui revinrent avec Zorobabel, fils de Schealthiel, et avec Josué: Seraja, Jérémie, Esdras, '
  '10':
  - type: text
    content: 'Josué engendra Jojakim, Jojakim engendra Éliaschib, Éliaschib engendra Jojada, '
  '11':
  - type: text
    content: 'Jojada engendra Jonathan, et Jonathan engendra Jaddua. '
  '12':
  - type: text
    content: 'Voici, au temps de Jojakim, quels étaient les sacrificateurs, chefs de famille: pour Seraja, Meraja; pour Jérémie, Hanania; '
  '13':
  - type: text
    content: 'pour Esdras, Meschullam; pour Amaria, Jochanan; '
  '14':
  - type: text
    content: 'pour Meluki, Jonathan; pour Schebania, Joseph; '
  '15':
  - type: text
    content: 'pour Harim, Adna; pour Merajoth, Helkaï; '
  '16':
  - type: text
    content: 'pour Iddo, Zacharie; pour Guinnethon, Meschullam; '
  '17':
  - type: text
    content: 'pour Abija, Zicri; pour Minjamin et Moadia, Pilthaï; '
  '18':
  - type: text
    content: 'pour Bilga, Schammua; pour Schemaeja, Jonathan; '
  '19':
  - type: text
    content: 'pour Jojarib, Matthnaï; pour Jedaeja, Uzzi; '
  '2':
  - type: text
    content: 'Amaria, Malluc, Hattusch, '
  '20':
  - type: text
    content: 'pour Sallaï, Kallaï; pour Amok, Éber; '
  '21':
  - type: text
    content: 'pour Hilkija, Haschabia; pour Jedaeja, Nethaneel. '
  '22':
  - type: text
    content: 'Au temps d’Éliaschib, de Jojada, de Jochanan et de Jaddua, les Lévites, chefs de familles, et les sacrificateurs, furent inscrits, sous le règne de Darius, le Perse. '
  '23':
  - type: text
    content: 'Les fils de Lévi, chefs de familles, furent inscrits dans le livre des '
  - type: note
    content: 1 Ch 9:10, etc.
  - type: text
    content: 'Chroniques jusqu’au temps de Jochanan, fils d’Éliaschib. '
  '24':
  - type: text
    content: 'Les chefs des Lévites, Haschabia, Schérébia, et Josué, fils de Kadmiel, et leurs frères avec eux, les uns vis-à-vis des autres, étaient chargés de célébrer et de louer l’Éternel, selon l’ordre de David, homme de Dieu. '
  '25':
  - type: text
    content: 'Matthania, Bakbukia, Abdias, Meschullam, Thalmon et Akkub, portiers, faisaient la garde aux seuils des portes. '
  '26':
  - type: text
    content: Ils vivaient au temps de Jojakim, fils de Josué, fils de Jotsadak, et au temps de Néhémie, le gouverneur, et d’Esdras, le sacrificateur et le scribe.
  - type: heading
    content: Dédicace des murailles de Jérusalem
  - type: heading
    content: 'V. 27-43: cf. (Né 6:1-16. Esd 6:16-18.) Ca 2:12.'
  '27':
  - type: text
    content: 'Lors de la dédicace des murailles de Jérusalem, on appela les Lévites de tous les lieux qu’ils habitaient et on les fit venir à Jérusalem, afin de célébrer la dédicace et la fête par des louanges et par des chants, au son des cymbales, des luths et des harpes. '
  '28':
  - type: text
    content: 'Les fils des chantres se rassemblèrent des environs de Jérusalem, des villages des Nethophatiens, '
  '29':
  - type: text
    content: 'de Beth-Guilgal, et du territoire de Guéba et d’Azmaveth; car les chantres s’étaient bâti des villages aux alentours de Jérusalem. '
  '3':
  - type: text
    content: 'Schecania, Rehum, Merémoth, '
  '30':
  - type: text
    content: 'Les sacrificateurs et les Lévites se purifièrent, et ils purifièrent le peuple, les portes et la muraille. '
  '31':
  - type: text
    content: 'Je fis monter sur la muraille les chefs de Juda, et je formai deux grands chœurs. Le premier se mit en marche du côté droit sur la muraille, vers la porte du fumier. '
  '32':
  - type: text
    content: 'Derrière ce chœur marchaient Hosée et la moitié des chefs de Juda, '
  '33':
  - type: text
    content: 'Azaria, Esdras, Meschullam, '
  '34':
  - type: text
    content: 'Juda, Benjamin, Schemaeja et Jérémie, '
  '35':
  - type: text
    content: 'des fils de sacrificateurs avec des trompettes, Zacharie, fils de Jonathan, fils de Schemaeja, fils de Matthania, fils de Michée, fils de Zaccur, fils d’Asaph, '
  '36':
  - type: text
    content: 'et ses frères, Schemaeja, Azareel, Milalaï, Guilalaï, Maaï, Nethaneel, Juda et Hanani, avec les instruments de musique de David, homme de Dieu. Esdras, le scribe, était à leur tête. '
  '37':
  - type: text
    content: 'A la porte de la source, ils montèrent vis-à-vis d’eux les degrés de la cité de David par la montée de la muraille, au-dessus de la maison de David, jusqu’à la porte des eaux, vers l’orient. '
  '38':
  - type: text
    content: 'Le second chœur se mit en marche à l’opposite. J’étais derrière lui avec l’autre moitié du peuple, sur la muraille. Passant au-dessus de la tour des fours, on alla jusqu’à la muraille large; '
  '39':
  - type: text
    content: 'puis au-dessus de la porte d’Éphraïm, de la vieille porte, de la porte des poissons, de la tour de Hananeel et de la tour de Méa, jusqu’à la porte des brebis. Et l’on s’arrêta à la porte de la prison. '
  '4':
  - type: text
    content: 'Iddo, Guinnethoï, Abija, '
  '40':
  - type: text
    content: 'Les deux chœurs s’arrêtèrent dans la maison de Dieu; et nous fîmes de même, moi et les magistrats qui étaient avec moi, '
  '41':
  - type: text
    content: 'et les sacrificateurs Éliakim, Maaséja, Minjamin, Michée, Éljoénaï, Zacharie, Hanania, avec des trompettes, '
  '42':
  - type: text
    content: 'et Maaséja, Schemaeja, Éléazar, Uzzi, Jochanan, Malkija, Élam et Ézer. Les chantres se firent entendre, dirigés par Jizrachja. '
  '43':
  - type: text
    content: On offrit ce jour-là de nombreux sacrifices, et on se livra aux réjouissances, car Dieu avait donné au peuple un grand sujet de joie. Les femmes et les enfants se réjouirent aussi, et les cris de joie de Jérusalem furent entendus au loin.
  - type: heading
    content: Rétablissement des revenus des sacrificateurs et des Lévites
  - type: heading
    content: 'V. 44-47: cf. Né 10:35-39.'
  '44':
  - type: text
    content: 'En ce jour, on établit des hommes ayant la surveillance des chambres qui servaient de magasins pour les offrandes, les prémices et les dîmes, et on les chargea d’y recueillir du territoire des villes les portions assignées par la loi aux sacrificateurs et aux Lévites. Car Juda se réjouissait de ce que les sacrificateurs et les Lévites étaient à leur poste, '
  '45':
  - type: text
    content: 'observant tout ce qui concernait le service de Dieu et des purifications. Les chantres et les portiers remplissaient aussi leurs fonctions, selon '
  - type: note
    content: 1 Ch 25.
  - type: text
    content: 'l’ordre de David et de Salomon, son fils; '
  '46':
  - type: text
    content: 'car autrefois, du temps de David et d’Asaph, il y avait des chefs de chantres et des chants de louanges et d’actions de grâces en l’honneur de Dieu. '
  '47':
  - type: text
    content: Tout Israël, au temps de Zorobabel et de Néhémie, donna les portions des chantres et des portiers, jour par jour; on donna aux Lévites les choses consacrées, et les Lévites donnèrent aux fils d’Aaron les choses consacrées.
  '5':
  - type: text
    content: 'Mijamin, Maadia, Bilga, '
  '6':
  - type: text
    content: 'Schemaeja, Jojarib, Jedaeja, '
  '7':
  - type: text
    content: 'Sallu, Amok, Hilkija, Jedaeja. Ce furent là les chefs des sacrificateurs et de leurs frères, au temps de Josué. '
  '8':
  - type: text
    content: 'Lévites: Josué, Binnuï, Kadmiel, Schérébia, Juda, Matthania, qui dirigeait avec ses frères le chant des louanges; '
  '9':
  - type: text
    content: 'Bakbukia et Unni, qui remplissaient leurs fonctions auprès de leurs frères. '
