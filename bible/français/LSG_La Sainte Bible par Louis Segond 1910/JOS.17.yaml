document_id: JOS.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Territoire échu à la demi-tribu de Manassé
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. (No 27:1-11; 36.) (Ga 3:26-29.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Une part échut aussi par le sort à la tribu de Manassé, car il était le premier-né de Joseph. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 46:20
      metadata:
        usfm: GEN.46.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Makir, premier-né de Manassé et père de Galaad, avait eu Galaad et Basan, parce qu’il était un homme de guerre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On donna par le sort une part aux autres fils de Manassé, selon leurs familles, aux fils d’Abiézer, aux fils de Hélek, aux fils d’Asriel, aux fils de Sichem, aux fils de Hépher, aux fils de Schemida: ce sont là les enfants mâles de Manassé, fils de Joseph, selon leurs familles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 26:33
      metadata:
        usfm: NUM.26.33
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:1
      metadata:
        usfm: NUM.27.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tselophchad, fils de Hépher, fils de Galaad, fils de Makir, fils de Manassé, n’eut point de fils, mais il eut des filles '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 27:1
      metadata:
        usfm: NUM.27.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dont voici les noms: Machla, Noa, Hogla, Milca et Thirtsa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Elles se présentèrent devant le sacrificateur Éléazar, devant Josué, fils de Nun, et devant les princes, en disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 27:7
      metadata:
        usfm: NUM.27.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 36:2
      metadata:
        usfm: NUM.36.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’Éternel a commandé à Moïse de nous donner un héritage parmi nos frères. Et on leur donna, selon l’ordre de l’Éternel, un héritage parmi les frères de leur père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il échut dix portions à Manassé, outre le pays de Galaad et de Basan, qui est de l’autre côté du Jourdain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Car les filles de Manassé eurent un héritage parmi ses fils, et le pays de Galaad fut pour les autres fils de Manassé.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-18: cf. Jos 16:6, 8-10. Jg 1:27, etc. (Ro 8:31, 37.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'La limite de Manassé s’étendait d’Aser à Micmethath, qui est près de Sichem, et allait à Jamin vers les habitants d’En-Tappuach. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le pays de Tappuach était aux fils de Manassé, mais Tappuach sur la frontière de Manassé était aux fils d’Éphraïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La limite descendait au torrent de Kana, au midi du torrent. Ces villes étaient à Éphraïm, au milieu des villes de Manassé. La limite de Manassé au nord du torrent aboutissait à la mer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le territoire du midi était à Éphraïm, celui du nord à Manassé, et la mer leur servait de limite; ils touchaient à Aser vers le nord, et à Issacar vers l’orient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Manassé possédait dans Issacar et dans Aser: Beth-Schean et les villes de son ressort, Jibleam et les villes de son ressort, les habitants de Dor et les villes de son ressort, les habitants d’En-Dor et les villes de son ressort, les habitants de Thaanac et les villes de son ressort, et les habitants de Meguiddo et les villes de son ressort, trois contrées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 1:27
      metadata:
        usfm: JDG.1.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les fils de Manassé ne purent pas prendre possession de ces villes, et les Cananéens voulurent rester dans ce pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Lorsque les enfants d’Israël furent assez forts, ils assujettirent les Cananéens à un tribut, mais ils ne les chassèrent point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les fils de Joseph parlèrent à Josué, et dirent: Pourquoi nous as-tu donné en héritage un seul lot, une seule part, tandis que nous formons un peuple nombreux et que l’Éternel nous a bénis jusqu’à présent? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Josué leur dit: Si vous êtes un peuple nombreux, montez à la forêt, et vous l’abattrez pour vous y faire de la place dans le pays des Phéréziens et des Rephaïm, puisque la montagne d’Éphraïm est trop étroite pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les fils de Joseph dirent: La montagne ne nous suffira pas, et il y a des chars de fer chez tous les Cananéens qui habitent la vallée, chez ceux qui sont à Beth-Schean et dans les villes de son ressort, et chez ceux qui sont dans la vallée de Jizreel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Josué dit à la maison de Joseph, à Éphraïm et à Manassé: Vous êtes un peuple nombreux, et votre force est grande, vous n’aurez pas un simple lot. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mais vous aurez la montagne, car c’est une forêt que vous abattrez et dont les issues seront à vous, et vous chasserez les Cananéens, malgré leurs chars de fer et malgré leur force.
