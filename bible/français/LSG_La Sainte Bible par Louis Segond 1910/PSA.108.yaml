document_id: PSA.108,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Ps 57:8, etc.; 60:7, etc.)
  - type: text
    content: Cantique. Psaume de David.
  '10':
  - type: text
    content: Moab est le bassin où je me lave;
  - type: text
    content: Je jette mon soulier sur Édom;
  - type: text
    content: Je pousse des cris de joie sur le pays des Philistins!
  '11':
  - type: text
    content: Qui me mènera dans la ville forte?
  - type: text
    content: Qui me conduit à Édom?
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ps 60:3.
  - type: text
    content: N’est-ce pas toi, ô Dieu, qui nous as repoussés,
  - type: text
    content: Et qui ne sortais plus, ô Dieu, avec nos armées?
  '13':
  - type: text
    content: Donne-nous du secours contre la détresse!
  - type: text
    content: Le secours de l’homme n’est que vanité.
  '14':
  - type: text
    content: Avec Dieu, nous ferons des exploits;
  - type: text
    content: Il écrasera nos ennemis.
  '2':
  - type: text
    content: Mon cœur est affermi, ô Dieu!
  - type: text
    content: 'Je chanterai, je ferai retentir mes instruments: c’est ma gloire!'
  '3':
  - type: text
    content: Réveillez-vous, mon luth et ma harpe!
  - type: text
    content: Je réveillerai l’aurore.
  '4':
  - type: text
    content: Je te louerai parmi les peuples, Éternel!
  - type: text
    content: Je te chanterai parmi les nations.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ps 36:6; 57:11.
  - type: text
    content: Car ta bonté s’élève au-dessus des cieux,
  - type: text
    content: Et ta fidélité jusqu’aux nues.
  '6':
  - type: text
    content: Élève-toi sur les cieux, ô Dieu!
  - type: text
    content: Et que ta gloire soit sur toute la terre!
  '7':
  - type: text
    content: Afin que tes bien-aimés soient délivrés,
  - type: text
    content: Sauve par ta droite, et exauce-nous!
  '8':
  - type: text
    content: 'Dieu a dit dans sa sainteté: Je triompherai,'
  - type: text
    content: Je partagerai Sichem, je mesurerai la vallée de Succoth;
  '9':
  - type: text
    content: A moi Galaad, à moi Manassé;
  - type: text
    content: Éphraïm est le rempart de ma tête,
  - type: text
    content: Et Juda, mon sceptre;
