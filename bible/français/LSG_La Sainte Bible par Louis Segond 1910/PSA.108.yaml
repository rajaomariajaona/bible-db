document_id: PSA.108
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: (Ps 57:8, etc.; 60:7, etc.)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mon cœur est affermi, ô Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je chanterai, je ferai retentir mes instruments: c’est ma gloire!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Réveillez-vous, mon luth et ma harpe!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je réveillerai l’aurore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je te louerai parmi les peuples, Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te chanterai parmi les nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 36:6
      metadata:
        usfm: PSA.36.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 57:11
      metadata:
        usfm: PSA.57.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car ta bonté s’élève au-dessus des cieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ta fidélité jusqu’aux nues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Élève-toi sur les cieux, ô Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que ta gloire soit sur toute la terre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Afin que tes bien-aimés soient délivrés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sauve par ta droite, et exauce-nous!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dieu a dit dans sa sainteté: Je triompherai,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je partagerai Sichem, je mesurerai la vallée de Succoth;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: A moi Galaad, à moi Manassé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éphraïm est le rempart de ma tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et Juda, mon sceptre;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Moab est le bassin où je me lave;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je jette mon soulier sur Édom;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je pousse des cris de joie sur le pays des Philistins!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Qui me mènera dans la ville forte?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui me conduit à Édom?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 60:3
      metadata:
        usfm: PSA.60.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: N’est-ce pas toi, ô Dieu, qui nous as repoussés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui ne sortais plus, ô Dieu, avec nos armées?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Donne-nous du secours contre la détresse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le secours de l’homme n’est que vanité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Avec Dieu, nous ferons des exploits;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il écrasera nos ennemis.
