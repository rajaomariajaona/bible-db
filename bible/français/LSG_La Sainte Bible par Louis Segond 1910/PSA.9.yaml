document_id: PSA.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 7; 18:47-51; 35. Job 19:28, 29.
  - type: text
    content: Au chef des chantres. Sur “Meurs pour le fils”. Psaume de David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ps 37:39; 46:2; 91:2.
  - type: text
    content: L’Éternel est un refuge pour l’opprimé,
  - type: text
    content: Un refuge au temps de la détresse.
  '11':
  - type: text
    content: Ceux qui connaissent ton nom se confient en toi.
  - type: text
    content: Car tu n’abandonnes pas ceux qui te cherchent, ô Éternel!
  '12':
  - type: text
    content: Chantez à l’Éternel, qui réside en Sion,
  - type: text
    content: Publiez parmi les peuples ses hauts faits!
  '13':
  - type: text
    content: Car il venge le sang et se souvient des malheureux,
  - type: text
    content: Il n’oublie pas leurs cris.
  '14':
  - type: text
    content: Aie pitié de moi, Éternel!
  - type: text
    content: Vois la misère où me réduisent mes ennemis,
  - type: text
    content: Enlève-moi des portes de la mort,
  '15':
  - type: text
    content: Afin que je publie toutes tes louanges,
  - type: text
    content: Dans les portes de la fille de Sion,
  - type: text
    content: Et que je me réjouisse de ton salut.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ps 7:16.
  - type: text
    content: Les nations tombent dans la fosse qu’elles ont faite,
  - type: text
    content: Leur pied se prend au filet qu’elles ont caché.
  '17':
  - type: text
    content: L’Éternel se montre, il fait justice,
  - type: text
    content: Il enlace le méchant dans l’œuvre de ses mains.
  - type: text
    content: 'Jeu d’instruments. '
  - type: text
    content: — Pause.
  '18':
  - type: text
    content: Les méchants se tournent vers le séjour des morts,
  - type: text
    content: Toutes les nations qui oublient Dieu.
  '19':
  - type: text
    content: Car le malheureux n’est point oublié à jamais,
  - type: text
    content: L’espérance des misérables ne périt pas à toujours.
  '2':
  - type: text
    content: Je louerai l’Éternel de tout mon cœur,
  - type: text
    content: Je raconterai toutes tes merveilles.
  '20':
  - type: text
    content: Lève-toi, ô Éternel! Que l’homme ne triomphe pas!
  - type: text
    content: Que les nations soient jugées devant ta face!
  '21':
  - type: text
    content: Frappe-les d’épouvante, ô Éternel!
  - type: text
    content: 'Que les peuples sachent qu’ils sont des hommes! '
  - type: text
    content: — Pause.
  '3':
  - type: text
    content: Je ferai de toi le sujet de ma joie et de mon allégresse,
  - type: text
    content: Je chanterai ton nom, Dieu Très-Haut!
  '4':
  - type: text
    content: Mes ennemis reculent,
  - type: text
    content: Ils chancellent, ils périssent devant ta face.
  '5':
  - type: text
    content: Car tu soutiens mon droit et ma cause,
  - type: text
    content: Tu sièges sur ton trône en juste juge.
  '6':
  - type: text
    content: Tu châties les nations, tu détruis le méchant,
  - type: text
    content: Tu effaces leur nom pour toujours et à perpétuité.
  '7':
  - type: text
    content: Plus d’ennemis! Des ruines éternelles!
  - type: text
    content: Des villes que tu as renversées!
  - type: text
    content: Leur souvenir est anéanti.
  '8':
  - type: text
    content: L’Éternel règne à jamais,
  - type: text
    content: Il a dressé son trône pour le jugement;
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ps 96:13; 98:9.
  - type: text
    content: Il juge le monde avec justice,
  - type: text
    content: Il juge les peuples avec droiture.
