document_id: PSA.9,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 7; 18:47-51; 35. Job 19:28, 29.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef des chantres. Sur “Meurs pour le fils”. Psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 37:39
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 46:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 91:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’Éternel est un refuge pour l’opprimé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un refuge au temps de la détresse.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ceux qui connaissent ton nom se confient en toi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu n’abandonnes pas ceux qui te cherchent, ô Éternel!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Chantez à l’Éternel, qui réside en Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Publiez parmi les peuples ses hauts faits!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Car il venge le sang et se souvient des malheureux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’oublie pas leurs cris.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Aie pitié de moi, Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vois la misère où me réduisent mes ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enlève-moi des portes de la mort,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Afin que je publie toutes tes louanges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les portes de la fille de Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que je me réjouisse de ton salut.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 7:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les nations tombent dans la fosse qu’elles ont faite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur pied se prend au filet qu’elles ont caché.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: L’Éternel se montre, il fait justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il enlace le méchant dans l’œuvre de ses mains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Jeu d’instruments. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Les méchants se tournent vers le séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les nations qui oublient Dieu.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Car le malheureux n’est point oublié à jamais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’espérance des misérables ne périt pas à toujours.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Je louerai l’Éternel de tout mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je raconterai toutes tes merveilles.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Lève-toi, ô Éternel! Que l’homme ne triomphe pas!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les nations soient jugées devant ta face!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Frappe-les d’épouvante, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que les peuples sachent qu’ils sont des hommes! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Je ferai de toi le sujet de ma joie et de mon allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je chanterai ton nom, Dieu Très-Haut!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mes ennemis reculent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils chancellent, ils périssent devant ta face.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Car tu soutiens mon droit et ma cause,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu sièges sur ton trône en juste juge.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tu châties les nations, tu détruis le méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu effaces leur nom pour toujours et à perpétuité.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Plus d’ennemis! Des ruines éternelles!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des villes que tu as renversées!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur souvenir est anéanti.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: L’Éternel règne à jamais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a dressé son trône pour le jugement;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 96:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 98:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il juge le monde avec justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il juge les peuples avec droiture.
