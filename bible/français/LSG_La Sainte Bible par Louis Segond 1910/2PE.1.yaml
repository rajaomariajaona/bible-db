document_id: 2PE.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: heading
    content: 'V. 1-2: cf. 1 Pi 1:1, 2. Jud v. 1, 2.'
  - type: text
    content: 'Simon Pierre, serviteur et apôtre de Jésus-Christ, à ceux qui ont reçu en partage une foi du même prix que la nôtre, par la justice de notre Dieu et du Sauveur Jésus-Christ: '
  '10':
  - type: text
    content: 'C’est pourquoi, frères, appliquez-vous d’autant plus à affermir votre vocation et votre élection; car, en faisant cela, vous ne broncherez jamais. '
  '11':
  - type: text
    content: C’est ainsi, en effet, que l’entrée dans le royaume éternel de notre Seigneur et Sauveur Jésus-Christ vous sera pleinement accordée.
  - type: heading
    content: 'V. 12-21: cf. (1 Jn 1:1-4. Mt 17:1-6.) (1 Pi 1:10-12. 2 Ti 3:16.)'
  '12':
  - type: text
    content: 'Voilà pourquoi je prendrai soin de vous rappeler ces choses, bien que vous les sachiez et que vous soyez affermis dans la vérité présente. '
  '13':
  - type: text
    content: 'Et je regarde comme un devoir, aussi longtemps que je suis dans cette tente, '
  - type: note
    content: 2 Pi 3:1.
  - type: text
    content: 'de vous tenir en éveil par des avertissements, '
  '14':
  - type: note
    content: 2 Ti 4:6.
  - type: text
    content: 'car je sais que je la quitterai subitement, '
  - type: note
    content: 2 Pi 1:18, 19.
  - type: text
    content: 'ainsi que notre Seigneur Jésus-Christ me l’a fait connaître. '
  '15':
  - type: text
    content: 'Mais j’aurai soin qu’après mon départ vous puissiez toujours vous souvenir de ces choses. '
  '16':
  - type: note
    content: 1 Co 1:17; 2:1, 4; 4:20.
  - type: text
    content: 'Ce n’est pas, en effet, en suivant des fables habilement conçues, que nous vous avons fait connaître la puissance et l’avènement de notre Seigneur Jésus-Christ, '
  - type: note
    content: Mt 17:1. Jn 1:14. 1 Jn 1:1.
  - type: text
    content: 'mais c’est comme ayant vu sa majesté de nos propres yeux. '
  '17':
  - type: text
    content: 'Car il a reçu de Dieu le Père honneur et gloire, quand la gloire magnifique lui fit entendre une voix qui disait: '
  - type: note
    content: Mt 3:17; 17:5. Mc 1:11; 9:7. Lu 3:22; 9:35. Col 1:13.
  - type: text
    content: 'Celui-ci est mon Fils bien-aimé, en qui j’ai mis toute mon affection. '
  '18':
  - type: text
    content: 'Et nous avons entendu cette voix venant du ciel, lorsque nous étions avec lui sur la sainte montagne. '
  '19':
  - type: text
    content: 'Et nous tenons pour d’autant plus certaine la parole prophétique, à laquelle vous faites bien de prêter attention, '
  - type: note
    content: 2 Co 4:6.
  - type: text
    content: 'comme à une lampe qui brille dans un lieu obscur, jusqu’à ce que le jour vienne à paraître et '
  - type: note
    content: Ap 22:16.
  - type: text
    content: 'que l’étoile du matin se lève dans vos cœurs; '
  '2':
  - type: note
    content: Ro 1:7. 1 Pi 1:2.
  - type: text
    content: 'que la grâce et la paix vous soient '
  - type: note
    content: 1 Pi 1:2. Jud v. 2.
  - type: text
    content: 'multipliées '
  - type: note
    content: Jn 17:3.
  - type: text
    content: par la connaissance de Dieu et de Jésus notre Seigneur!
  - type: heading
    content: La pratique des vertus chrétiennes
  - type: heading
    content: 'V. 3-11: cf. Jn 17:2, 3. (Tit 2:11-14. Ph 1:9-11; 3:8-14. Hé 6:11, 12.)'
  '20':
  - type: text
    content: 'sachant tout d’abord vous-mêmes qu’aucune prophétie de l’Écriture ne peut être un objet d’interprétation particulière, '
  '21':
  - type: text
    content: 'car ce n’est pas par une volonté d’homme qu’une prophétie a jamais été apportée, mais '
  - type: note
    content: 2 Ti 3:16.
  - type: text
    content: c’est poussés par le Saint-Esprit que des hommes ont parlé de la part de Dieu.
  '3':
  - type: text
    content: 'Comme sa divine puissance nous a donné tout ce qui contribue à la vie et à la piété, au moyen de la connaissance de celui qui nous a appelés par sa propre gloire et par sa vertu, '
  '4':
  - type: text
    content: 'lesquelles nous assurent de sa part les plus grandes et les plus précieuses promesses, '
  - type: note
    content: És 56:5. Jn 1:12. Ro 8:15. Ga 3:26.
  - type: text
    content: 'afin que par elles vous deveniez participants de la nature divine, en fuyant la corruption qui existe dans le monde par la convoitise, '
  '5':
  - type: text
    content: 'à cause de cela même, faites tous vos efforts pour joindre à votre foi la vertu, à la vertu la science, '
  '6':
  - type: text
    content: 'à la science la tempérance, à la tempérance la patience, à la patience la piété, '
  '7':
  - type: text
    content: 'à la piété l’amour fraternel, à l’amour fraternel la charité. '
  '8':
  - type: text
    content: 'Car si ces choses sont en vous, et y sont avec abondance, elles ne vous laisseront point oisifs ni '
  - type: note
    content: Tit 3:14.
  - type: text
    content: 'stériles pour la connaissance de notre Seigneur Jésus-Christ. '
  '9':
  - type: text
    content: 'Mais celui en qui ces choses ne sont point est aveugle, '
  - type: note
    content: És 59:10. So 1:17.
  - type: text
    content: 'il ne voit pas de loin, et il a mis en oubli la purification de ses anciens péchés. '
