document_id: ACT.24,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul à Césarée. Accusation et défense devant le gouverneur Félix. Entretien de Paul avec Félix et sa femme Drusille
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. Ac 6:11-13; 21:27-36. Mt 5:11, 12.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cinq jours après, arriva '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 23:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le souverain sacrificateur Ananias, avec des anciens et un orateur nommé Tertulle. Ils portèrent plainte au gouverneur contre Paul. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après que le gouverneur lui eut fait signe de parler, Paul répondit: Sachant que, depuis plusieurs années, tu es juge de cette nation, c’est avec confiance que je prends la parole pour défendre ma cause. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il n’y a pas plus de douze jours, tu peux t’en assurer, que je suis monté à Jérusalem pour adorer. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 25:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On ne m’a trouvé ni dans le temple, ni dans les synagogues, ni dans la ville, disputant avec quelqu’un, ou provoquant un rassemblement séditieux de la foule. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ils ne sauraient prouver ce dont ils m’accusent maintenant. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je t’avoue bien que je sers le Dieu de mes pères selon la voie qu’ils appellent une secte, croyant tout ce qui est écrit dans la loi et dans les prophètes, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et ayant en Dieu cette espérance, comme ils l’ont eux-mêmes, qu’il y aura une résurrection des justes et des injustes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'C’est pourquoi je m’efforce d’avoir constamment une conscience sans reproche devant Dieu et devant les hommes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après une absence de plusieurs années, je suis venu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 11:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 15:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pour faire des aumônes à ma nation, et pour présenter des offrandes. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 21:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'C’est alors que quelques Juifs d’Asie m’ont trouvé purifié dans le temple, sans attroupement ni tumulte. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’était à eux de paraître en ta présence et de se porter accusateurs, s’ils avaient quelque chose contre moi. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul fut appelé, et Tertulle se mit à l’accuser, en ces termes: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ou bien, que ceux-ci déclarent de quel crime ils m’ont trouvé coupable, lorsque j’ai comparu devant le sanhédrin, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'à moins que ce ne soit uniquement de ce cri que j’ai fait entendre au milieu d’eux: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 23:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'C’est à cause de la résurrection des morts que je suis aujourd’hui mis en jugement devant vous. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Félix, qui savait assez exactement ce qui concernait cette doctrine, les ajourna, en disant: Quand le tribun Lysias sera venu, j’examinerai votre affaire. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il donna l’ordre au centenier de garder Paul, en lui laissant une certaine liberté, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 27:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: et en n’empêchant aucun des siens de lui rendre des services.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 24-26: cf. Ac 17:30-32. És 55:6, 7. Ps 95:8.'
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelques jours après, Félix vint avec Drusille, sa femme, qui était Juive, et il fit appeler Paul. Il l’entendit sur la foi en Christ. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, comme Paul discourait sur la justice, sur la tempérance, et sur le jugement à venir, Félix, effrayé, dit: Pour le moment retire-toi; quand j’en trouverai l’occasion, je te rappellerai. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il espérait en même temps que Paul lui donnerait de l’argent; aussi l’envoyait-il chercher assez fréquemment, pour s’entretenir avec lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul détenu deux ans à Césarée. Comparution devant le gouverneur Festus, successeur de Félix. Appel à l’empereur romain
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: '24 v. 27 à 25 v. 12: cf. Ac 23:12-15, 30; 25:14-21. Ps 82:2, 5; 27:12.'
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Deux ans s’écoulèrent ainsi, et Félix eut pour successeur Porcius Festus. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 25:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Dans le désir de plaire aux Juifs, Félix laissa Paul en prison.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Très excellent Félix, tu nous fais jouir d’une paix profonde, et cette nation a obtenu de salutaires réformes par tes soins prévoyants; c’est ce que nous reconnaissons en tout et partout avec une entière gratitude. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, pour ne pas te retenir davantage, je te prie d’écouter, dans ta bonté, ce que nous avons à dire en peu de mots. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avons trouvé cet homme, qui est une peste, qui excite des divisions parmi tous les Juifs du monde, qui est chef de la secte des Nazaréens, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 21:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui même a tenté de profaner le temple. Et nous l’avons arrêté. Nous avons voulu le juger selon notre loi; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais le tribun Lysias étant survenu, l’a arraché de nos mains avec une grande violence, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'en ordonnant à ses accusateurs de venir devant toi. Tu pourras toi-même, en l’interrogeant, apprendre de lui tout ce dont nous l’accusons. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les Juifs se joignirent à l’accusation, soutenant que les choses étaient ainsi.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-23: cf. Lu 21:12-15. 1 Pi 3:15, 16.'
    marker-yv: yv-h
