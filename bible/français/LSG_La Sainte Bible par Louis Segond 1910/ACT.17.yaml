document_id: ACT.17,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul à Thessalonique et à Bérée
  - type: heading
    content: 'V. 1-9: cf. 1 Th 1; 2:1-16. Ph 4:16. Jn 15:19-21, 25; 16:2, 3.'
  - type: text
    content: 'Paul et Silas passèrent par Amphipolis et Apollonie, et ils arrivèrent à Thessalonique, où les Juifs avaient une synagogue. '
  '10':
  - type: text
    content: 'Aussitôt les frères firent partir '
  - type: note
    content: Ac 9:25.
  - type: text
    content: 'de nuit Paul et Silas pour Bérée. Lorsqu’ils furent arrivés, ils entrèrent dans la synagogue des Juifs. '
  '11':
  - type: text
    content: 'Ces Juifs avaient des sentiments plus nobles que ceux de Thessalonique; ils reçurent la parole avec beaucoup d’empressement, '
  - type: note
    content: És 34:16. Lu 16:29. Jn 5:39.
  - type: text
    content: 'et ils examinaient chaque jour les Écritures, pour voir si ce qu’on leur disait était exact. '
  '12':
  - type: text
    content: 'Plusieurs d’entre eux crurent, ainsi que beaucoup de femmes grecques de distinction, et beaucoup d’hommes. '
  '13':
  - type: text
    content: 'Mais, quand les Juifs de Thessalonique surent que Paul annonçait aussi à Bérée la parole de Dieu, '
  - type: note
    content: 1 Th 2:14.
  - type: text
    content: 'ils vinrent y agiter la foule. '
  '14':
  - type: text
    content: Alors les frères firent aussitôt partir Paul du côté de la mer; Silas et Timothée restèrent à Bérée.
  - type: heading
    content: 'Paul à Athènes: discours à l’Aréopage'
  - type: heading
    content: 'V. 15-34: cf. Ps 69:10. (Ac 14:14-17; 26:17-20. 1 Co 1:18-25.)'
  '15':
  - type: text
    content: 'Ceux qui accompagnaient Paul le conduisirent jusqu’à Athènes. Puis ils s’en retournèrent, '
  - type: note
    content: Ac 18:5.
  - type: text
    content: 'chargés de transmettre à Silas et à Timothée l’ordre de le rejoindre au plus tôt. '
  '16':
  - type: text
    content: 'Comme Paul les attendait à Athènes, il sentait au-dedans de lui son esprit s’irriter, à la vue de cette ville pleine d’idoles. '
  '17':
  - type: text
    content: 'Il s’entretenait donc dans la synagogue avec les Juifs et les hommes craignant Dieu, et sur la place publique chaque jour avec ceux qu’il rencontrait. '
  '18':
  - type: text
    content: 'Quelques philosophes épicuriens et stoïciens se mirent à parler avec lui. Et les uns disaient: Que veut dire ce discoureur? D’autres, l’entendant annoncer Jésus et la résurrection, disaient: Il semble qu’il annonce des divinités étrangères. '
  '19':
  - type: text
    content: 'Alors ils le prirent, et le menèrent à l’Aréopage, en disant: Pourrions-nous savoir quelle est cette nouvelle doctrine que tu enseignes? '
  '2':
  - type: text
    content: 'Paul y entra, selon sa coutume. Pendant trois sabbats, il discuta avec eux, d’après les Écritures, '
  '20':
  - type: text
    content: 'Car tu nous fais entendre des choses étranges. Nous voudrions donc savoir ce que cela peut être. '
  '21':
  - type: text
    content: 'Or, tous les Athéniens et les étrangers demeurant à Athènes ne passaient leur temps qu’à dire ou à écouter des nouvelles. '
  '22':
  - type: text
    content: 'Paul, debout au milieu de l’Aréopage, dit: Hommes Athéniens, je vous trouve à tous égards extrêmement religieux. '
  '23':
  - type: text
    content: 'Car, en parcourant votre ville et en considérant les objets de votre dévotion, j’ai même découvert un autel avec cette inscription: A un dieu inconnu! Ce que vous révérez sans le connaître, c’est ce que je vous annonce. '
  '24':
  - type: note
    content: Ge 1:1. 2 Ch 6:30. Ps 33:6; 124:8; 146:6. És 66:1. Ac 14:15. Ap 14:7.
  - type: text
    content: 'Le Dieu qui a fait le monde et tout ce qui s’y trouve, étant le Seigneur du ciel et de la terre, '
  - type: note
    content: Ac 7:48.
  - type: text
    content: 'n’habite point dans des temples faits de main d’homme; '
  '25':
  - type: text
    content: 'il n’est point servi par des mains humaines, comme s’il avait besoin de quoi que ce soit, '
  - type: note
    content: Ge 2:7.
  - type: text
    content: 'lui qui donne à tous la vie, la respiration, et toutes choses. '
  '26':
  - type: text
    content: 'Il a fait que tous les hommes, sortis d’un seul sang, habitassent sur toute la surface de la terre, '
  - type: note
    content: De 32:8.
  - type: text
    content: 'ayant déterminé la durée des temps et les bornes de leur demeure; '
  '27':
  - type: text
    content: 'il a voulu qu’ils cherchassent le Seigneur, et qu’ils s’efforçassent de le trouver en tâtonnant, bien qu’il ne soit pas loin de chacun de nous, '
  '28':
  - type: text
    content: 'car en lui nous avons la vie, le mouvement, et l’être. C’est ce qu’ont dit aussi quelques-uns de vos poètes: De lui nous sommes la race… '
  '29':
  - type: note
    content: És 40:18.
  - type: text
    content: 'Ainsi donc, étant la race de Dieu, nous ne devons pas croire que la divinité soit semblable à de l’or, à de l’argent, ou à de la pierre, sculptés par l’art et l’industrie de l’homme. '
  '3':
  - type: text
    content: 'expliquant et établissant '
  - type: note
    content: Ps 22:7. Mt 16:21. Lu 24:46.
  - type: text
    content: 'que le Christ devait souffrir et ressusciter des morts. Et Jésus que je vous annonce, disait-il, c’est lui qui est le Christ. '
  '30':
  - type: text
    content: 'Dieu, sans tenir compte des temps d’ignorance, '
  - type: note
    content: Lu 24:47.
  - type: text
    content: 'annonce maintenant à tous les hommes, en tous lieux, qu’ils aient à se repentir, '
  '31':
  - type: text
    content: 'parce qu’il a fixé un jour où il jugera le monde selon la justice, par l’homme '
  - type: note
    content: Ac 10:42.
  - type: text
    content: 'qu’il a désigné, ce dont il a donné à tous une preuve certaine en le ressuscitant des morts… '
  '32':
  - type: text
    content: 'Lorsqu’ils entendirent parler de résurrection des morts, les uns se moquèrent, et les autres dirent: Nous t’entendrons là-dessus une autre fois. '
  '33':
  - type: text
    content: 'Ainsi Paul se retira du milieu d’eux. '
  '34':
  - type: text
    content: Quelques-uns néanmoins s’attachèrent à lui et crurent, Denys l’aréopagite, une femme nommée Damaris, et d’autres avec eux.
  '4':
  - type: note
    content: Ac 28:24.
  - type: text
    content: 'Quelques-uns d’entre eux furent persuadés, et se joignirent à Paul et à Silas, ainsi qu’une grande multitude de Grecs craignant Dieu, et beaucoup de femmes de qualité. '
  '5':
  - type: text
    content: 'Mais les Juifs, jaloux prirent avec eux quelques méchants hommes de la populace, provoquèrent des attroupements, et répandirent l’agitation dans la ville. Ils se portèrent à la maison de Jason, et ils cherchèrent Paul et Silas, pour les amener vers le peuple. '
  '6':
  - type: text
    content: 'Ne les ayant pas trouvés, ils traînèrent Jason et quelques frères devant les magistrats de la ville, en criant: '
  - type: note
    content: Ac 16:20.
  - type: text
    content: 'Ces gens, qui ont bouleversé le monde, sont aussi venus ici, et Jason les a reçus. '
  '7':
  - type: text
    content: 'Ils agissent tous contre les édits de César, '
  - type: note
    content: Lu 23:2. Jn 19:12.
  - type: text
    content: 'disant qu’il y a un autre roi, Jésus. '
  '8':
  - type: text
    content: 'Par ces paroles ils émurent la foule et les magistrats, '
  '9':
  - type: text
    content: qui ne laissèrent aller Jason et les autres qu’après avoir obtenu d’eux une caution.
  - type: heading
    content: 'V. 10-14: cf. És 8:20. 1 Th 5:21.'
