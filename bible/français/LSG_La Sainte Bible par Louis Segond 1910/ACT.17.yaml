document_id: ACT.17,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul à Thessalonique et à Bérée
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. 1 Th 1; 2:1-16. Ph 4:16. Jn 15:19-21, 25; 16:2, 3.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul et Silas passèrent par Amphipolis et Apollonie, et ils arrivèrent à Thessalonique, où les Juifs avaient une synagogue. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussitôt les frères firent partir '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 9:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'de nuit Paul et Silas pour Bérée. Lorsqu’ils furent arrivés, ils entrèrent dans la synagogue des Juifs. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces Juifs avaient des sentiments plus nobles que ceux de Thessalonique; ils reçurent la parole avec beaucoup d’empressement, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 34:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 16:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 5:39
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et ils examinaient chaque jour les Écritures, pour voir si ce qu’on leur disait était exact. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Plusieurs d’entre eux crurent, ainsi que beaucoup de femmes grecques de distinction, et beaucoup d’hommes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, quand les Juifs de Thessalonique surent que Paul annonçait aussi à Bérée la parole de Dieu, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 2:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ils vinrent y agiter la foule. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors les frères firent aussitôt partir Paul du côté de la mer; Silas et Timothée restèrent à Bérée.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Paul à Athènes: discours à l’Aréopage'
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 15-34: cf. Ps 69:10. (Ac 14:14-17; 26:17-20. 1 Co 1:18-25.)'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui accompagnaient Paul le conduisirent jusqu’à Athènes. Puis ils s’en retournèrent, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 18:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'chargés de transmettre à Silas et à Timothée l’ordre de le rejoindre au plus tôt. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme Paul les attendait à Athènes, il sentait au-dedans de lui son esprit s’irriter, à la vue de cette ville pleine d’idoles. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il s’entretenait donc dans la synagogue avec les Juifs et les hommes craignant Dieu, et sur la place publique chaque jour avec ceux qu’il rencontrait. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelques philosophes épicuriens et stoïciens se mirent à parler avec lui. Et les uns disaient: Que veut dire ce discoureur? D’autres, l’entendant annoncer Jésus et la résurrection, disaient: Il semble qu’il annonce des divinités étrangères. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors ils le prirent, et le menèrent à l’Aréopage, en disant: Pourrions-nous savoir quelle est cette nouvelle doctrine que tu enseignes? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul y entra, selon sa coutume. Pendant trois sabbats, il discuta avec eux, d’après les Écritures, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car tu nous fais entendre des choses étranges. Nous voudrions donc savoir ce que cela peut être. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, tous les Athéniens et les étrangers demeurant à Athènes ne passaient leur temps qu’à dire ou à écouter des nouvelles. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul, debout au milieu de l’Aréopage, dit: Hommes Athéniens, je vous trouve à tous égards extrêmement religieux. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car, en parcourant votre ville et en considérant les objets de votre dévotion, j’ai même découvert un autel avec cette inscription: A un dieu inconnu! Ce que vous révérez sans le connaître, c’est ce que je vous annonce. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 6:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 33:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 124:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 146:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 66:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 14:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 14:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le Dieu qui a fait le monde et tout ce qui s’y trouve, étant le Seigneur du ciel et de la terre, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7:48
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'n’habite point dans des temples faits de main d’homme; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il n’est point servi par des mains humaines, comme s’il avait besoin de quoi que ce soit, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 2:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'lui qui donne à tous la vie, la respiration, et toutes choses. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a fait que tous les hommes, sortis d’un seul sang, habitassent sur toute la surface de la terre, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ayant déterminé la durée des temps et les bornes de leur demeure; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il a voulu qu’ils cherchassent le Seigneur, et qu’ils s’efforçassent de le trouver en tâtonnant, bien qu’il ne soit pas loin de chacun de nous, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car en lui nous avons la vie, le mouvement, et l’être. C’est ce qu’ont dit aussi quelques-uns de vos poètes: De lui nous sommes la race… '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 40:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ainsi donc, étant la race de Dieu, nous ne devons pas croire que la divinité soit semblable à de l’or, à de l’argent, ou à de la pierre, sculptés par l’art et l’industrie de l’homme. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'expliquant et établissant '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 22:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 24:46
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que le Christ devait souffrir et ressusciter des morts. Et Jésus que je vous annonce, disait-il, c’est lui qui est le Christ. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu, sans tenir compte des temps d’ignorance, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 24:47
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'annonce maintenant à tous les hommes, en tous lieux, qu’ils aient à se repentir, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'parce qu’il a fixé un jour où il jugera le monde selon la justice, par l’homme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 10:42
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qu’il a désigné, ce dont il a donné à tous une preuve certaine en le ressuscitant des morts… '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’ils entendirent parler de résurrection des morts, les uns se moquèrent, et les autres dirent: Nous t’entendrons là-dessus une autre fois. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi Paul se retira du milieu d’eux. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quelques-uns néanmoins s’attachèrent à lui et crurent, Denys l’aréopagite, une femme nommée Damaris, et d’autres avec eux.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 28:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quelques-uns d’entre eux furent persuadés, et se joignirent à Paul et à Silas, ainsi qu’une grande multitude de Grecs craignant Dieu, et beaucoup de femmes de qualité. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais les Juifs, jaloux prirent avec eux quelques méchants hommes de la populace, provoquèrent des attroupements, et répandirent l’agitation dans la ville. Ils se portèrent à la maison de Jason, et ils cherchèrent Paul et Silas, pour les amener vers le peuple. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne les ayant pas trouvés, ils traînèrent Jason et quelques frères devant les magistrats de la ville, en criant: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 16:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ces gens, qui ont bouleversé le monde, sont aussi venus ici, et Jason les a reçus. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils agissent tous contre les édits de César, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 19:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'disant qu’il y a un autre roi, Jésus. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par ces paroles ils émurent la foule et les magistrats, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: qui ne laissèrent aller Jason et les autres qu’après avoir obtenu d’eux une caution.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-14: cf. És 8:20. 1 Th 5:21.'
    marker-yv: yv-h
