document_id: LUK.7,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guérison du serviteur d’un centenier
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. Mt 8:5-13. (Mt 15:21-28.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir achevé tous ces discours devant le peuple qui l’écoutait, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 8:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus entra dans Capernaüm. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: De retour à la maison, les gens envoyés par le centenier trouvèrent guéri le serviteur qui avait été malade.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Résurrection du fils de la veuve de Naïn
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-17: cf. (Lu 8:49-56. Jn 11.) 1 R 17:17-24.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jour suivant, Jésus alla dans une ville appelée Naïn; ses disciples et une grande foule faisaient route avec lui. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’il fut près de la porte de la ville, voici, on portait en terre un mort, fils unique de sa mère, qui était veuve; et il y avait avec elle beaucoup de gens de la ville. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Seigneur, l’ayant vue, fut ému de compassion pour elle, et lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ne pleure pas!
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il s’approcha, et toucha le cercueil. Ceux qui le portaient s’arrêtèrent. Il dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Jeune homme, je te le dis,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 9:40
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: lève-toi!
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et le mort s’assit, et se mit à parler. Jésus le rendit à sa mère. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous furent saisis de crainte, et ils glorifiaient Dieu, disant: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 24:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 4:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Un grand prophète a paru parmi nous, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 1:68
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Dieu a visité son peuple. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cette parole sur Jésus se répandit dans toute la Judée et dans tout le pays d’alentour.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Message de Jean-Baptiste auprès de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 18-23: cf. Mt 11:2-6. (És 35:4-6; 61:1. Lu 4:16-21.)'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 11:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jean fut informé de toutes ces choses par ses disciples. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il en appela deux, et les envoya vers Jésus, pour lui dire: Es-tu celui qui doit venir, ou devons-nous en attendre un autre? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un centenier avait un serviteur auquel il était très attaché, et qui se trouvait malade, sur le point de mourir. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arrivés auprès de Jésus, ils dirent: Jean-Baptiste nous a envoyés vers toi, pour dire: Es-tu celui qui doit venir, ou devons-nous en attendre un autre? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A l’heure même, Jésus guérit plusieurs personnes de maladies, d’infirmités, et d’esprits malins, et il rendit la vue à plusieurs aveugles. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il leur répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Allez rapporter à Jean ce que vous avez vu et entendu:'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 29:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 35:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 61:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: les aveugles voient, les boiteux marchent, les lépreux sont purifiés, les sourds entendent, les morts ressuscitent, la bonne nouvelle est annoncée aux pauvres.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Heureux celui pour qui je ne serai pas une occasion de chute!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Témoignage sur Jean-Baptiste
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 24-35: cf. Mt 11:7-19.'
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 11:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque les envoyés de Jean furent partis, Jésus se mit à dire à la foule, au sujet de Jean: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Qu’êtes-vous allés voir au désert? Un roseau agité par le vent?
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais, qu’êtes-vous allés voir? Un homme vêtu d’habits précieux? Voici, ceux qui portent des habits magnifiques, et qui vivent dans les délices, sont dans les maisons des rois.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Qu’êtes-vous donc allés voir? Un prophète? Oui, vous dis-je, et plus qu’un prophète.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'C’est celui dont il est écrit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal 3:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Voici, j’envoie mon messager devant ta face,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pour préparer ton chemin devant toi.
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous le dis, parmi ceux qui sont nés de femmes, il n’y en a point de plus grand que Jean. Cependant, le plus petit dans le royaume de Dieu est plus grand que lui.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Et tout le peuple qui l’a entendu et même les publicains ont justifié Dieu, en se faisant baptiser du baptême de Jean; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ayant entendu parler de Jésus, il lui envoya quelques anciens des Juifs, pour le prier de venir guérir son serviteur. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: mais les pharisiens et les docteurs de la loi, en ne se faisant pas baptiser par lui, ont rendu nul à leur égard le dessein de Dieu.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 11:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A qui donc comparerai-je les hommes de cette génération, et à qui ressemblent-ils?
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ils ressemblent aux enfants assis dans la place publique, et qui, se parlant les uns aux autres, disent: Nous vous avons joué de la flûte, et vous n’avez pas dansé; nous vous avons chanté des complaintes, et vous n’avez pas pleuré.'
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 3:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Car Jean-Baptiste est venu, ne mangeant pas de pain et ne buvant pas de vin, et vous dites: Il a un démon.'
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le Fils de l’homme est venu, mangeant et buvant, et vous dites: C’est un mangeur et un buveur, un ami des publicains et des gens de mauvaise vie.'
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais la sagesse a été justifiée par tous ses enfants.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La pécheresse pardonnée
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 36-50: cf. (Mt 26:1-13. Jn 12:1-8.) (Mt 11:28. Jn 6:37.)'
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 11:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Un pharisien pria Jésus de manger avec lui. Jésus entra dans la maison du pharisien, et se mit à table. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici, une femme pécheresse qui se trouvait dans la ville, ayant su qu’il était à table dans la maison du pharisien, apporta un vase d’albâtre plein de parfum, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et se tint derrière, aux pieds de Jésus. Elle pleurait; et bientôt elle lui mouilla les pieds de ses larmes, puis les essuya avec ses cheveux, les baisa, et les oignit de parfum. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le pharisien qui l’avait invité, voyant cela, dit en lui-même: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 15:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si cet homme était prophète, il connaîtrait qui et de quelle espèce est la femme qui le touche, il connaîtrait que c’est une pécheresse. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils arrivèrent auprès de Jésus, et lui adressèrent d’instantes supplications, disant: Il mérite que tu lui accordes cela; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus prit la parole, et lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Simon, j’ai quelque chose à te dire.
    - type: text
      text: ' Maître, parle, répondit-il.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Un créancier avait deux débiteurs: l’un devait cinq cents deniers, et l’autre cinquante.'
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Comme ils n’avaient pas de quoi payer, il leur remit à tous deux leur dette. Lequel l’aimera le plus?
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon répondit: Celui, je pense, auquel il a le plus remis. Jésus lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu as bien jugé.
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis, se tournant vers la femme, il dit à Simon: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vois-tu cette femme? Je suis entré dans ta maison, et tu ne m’as point donné d’eau pour laver mes pieds; mais elle, elle les a mouillés de ses larmes, et les a essuyés avec ses cheveux.
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu ne m’as point donné de baiser; mais elle, depuis que je suis entré, elle n’a point cessé de me baiser les pieds.
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu n’as point versé d’huile sur ma tête; mais elle, elle a versé du parfum sur mes pieds.
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'C’est pourquoi, je te le dis, ses nombreux péchés ont été pardonnés: car elle a beaucoup aimé. Mais celui à qui on pardonne peu aime peu.'
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il dit à la femme: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 9:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tes péchés sont pardonnés.
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui étaient à table avec lui se mirent à dire en eux-mêmes: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 9:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Qui est celui-ci, qui pardonne même les péchés? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car il aime notre nation, et c’est lui qui a bâti notre synagogue. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus dit à la femme: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ta foi t’a sauvée, va en paix.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, étant allé avec eux, n’était guère éloigné de la maison, quand le centenier envoya des amis pour lui dire: Seigneur, ne prends pas tant de peine; car je ne suis pas digne que tu entres sous mon toit. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est aussi pour cela que je ne me suis pas cru digne d’aller en personne vers toi. Mais dis un mot, et mon serviteur sera guéri. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car, moi qui suis soumis à des supérieurs, j’ai des soldats sous mes ordres; et je dis à l’un: Va! Et il va; à l’autre: Viens! Et il vient; et à mon serviteur: Fais cela! Et il le fait. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Jésus entendit ces paroles, il admira le centenier, et, se tournant vers la foule qui le suivait, il dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous le dis, même en Israël je n’ai pas trouvé une aussi grande foi.
    - type: text
      text: ' '
