document_id: ACT.26,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Discours de Paul devant Agrippa
  - type: heading
    content: 'V. 1-29: cf. Mt 10:18-20. (Ac 9:1-30; 22:1-21.)'
  - type: text
    content: 'Agrippa dit à Paul: Il t’est permis de parler pour ta défense. Et Paul, ayant étendu la main, se justifia en ces termes: '
  '10':
  - type: text
    content: 'C’est ce que j’ai fait à Jérusalem. J’ai jeté en prison plusieurs des saints, ayant reçu ce pouvoir des principaux sacrificateurs, et, quand on les mettait à mort, je joignais mon suffrage à celui des autres. '
  '11':
  - type: text
    content: 'je les ai souvent châtiés dans toutes les synagogues, et je les forçais à blasphémer. Dans mes excès de fureur contre eux, je les persécutais même jusque dans les villes étrangères. '
  '12':
  - type: text
    content: 'C’est dans ce but que je me rendis à Damas, avec l’autorisation et la permission des principaux sacrificateurs. '
  '13':
  - type: text
    content: 'Vers le milieu du jour, ô roi, je vis en chemin resplendir autour de moi et de mes compagnons '
  - type: note
    content: Ac 9:3.
  - type: text
    content: 'une lumière venant du ciel, et dont l’éclat surpassait celui du soleil. '
  '14':
  - type: text
    content: 'Nous tombâmes tous par terre, et j’entendis une voix qui me disait en langue hébraïque: '
  - type: text
    content: Saul, Saul, pourquoi me persécutes-tu? Il te serait dur de regimber contre les aiguillons.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Je répondis: Qui es-tu, Seigneur? Et le Seigneur dit: '
  - type: text
    content: Je suis Jésus que tu persécutes.
  '16':
  - type: text
    content: ' '
  - type: text
    content: Mais lève-toi, et tiens-toi sur tes pieds; car je te suis apparu pour t’établir ministre et témoin des choses que tu as vues et de celles pour lesquelles je t’apparaîtrai.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Je t’ai choisi du milieu de ce peuple et du milieu des païens, vers qui je t’envoie,
  - type: text
    content: ' '
  '18':
  - type: note
    content: És 60:1.
  - type: text
    content: afin que tu leur ouvres les yeux, pour qu’ils passent des ténèbres à la lumière et de la puissance de Satan à Dieu, pour qu’ils reçoivent, par la foi en moi, le pardon des péchés et l’héritage avec les sanctifiés.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'En conséquence, roi Agrippa, je n’ai point résisté à la vision céleste: '
  '2':
  - type: text
    content: 'Je m’estime heureux, roi Agrippa, d’avoir aujourd’hui à me justifier devant toi de toutes les choses dont je suis accusé par les Juifs, '
  '20':
  - type: note
    content: Ac 9:19, 28; 22:17, 21.
  - type: text
    content: 'à ceux de Damas d’abord, puis à Jérusalem, dans toute la Judée, et chez les païens, j’ai prêché la repentance et la conversion à Dieu, avec la pratique d’œuvres dignes de la repentance. '
  '21':
  - type: text
    content: 'Voilà pourquoi les Juifs se sont saisis de moi '
  - type: note
    content: Ac 21:30.
  - type: text
    content: 'dans le temple, et ont tâché de me faire périr. '
  '22':
  - type: text
    content: 'Mais, grâce au secours de Dieu, j’ai subsisté jusqu’à ce jour, rendant témoignage devant les petits et les grands, sans m’écarter en rien de ce que les prophètes et Moïse ont déclaré devoir arriver, '
  '23':
  - type: text
    content: 'savoir que le Christ souffrirait, et que, ressuscité le premier d’entre les morts, il annoncerait la lumière au peuple et aux nations. '
  '24':
  - type: text
    content: 'Comme il parlait ainsi pour sa justification, Festus dit à haute voix: Tu es fou, Paul! Ton grand savoir te fait déraisonner. '
  '25':
  - type: text
    content: 'Je ne suis point fou, très excellent Festus, répliqua Paul; ce sont, au contraire, des paroles de vérité et de bon sens que je prononce. '
  '26':
  - type: text
    content: 'Le roi est instruit de ces choses, et je lui en parle librement; car je suis persuadé qu’il n’en ignore aucune, '
  - type: note
    content: Jn 18:20.
  - type: text
    content: 'puisque ce n’est pas en cachette qu’elles se sont passées. '
  '27':
  - type: text
    content: 'Crois-tu aux prophètes, roi Agrippa?… Je sais que tu y crois. '
  '28':
  - type: text
    content: 'Et Agrippa dit à Paul: Tu vas bientôt me persuader de devenir chrétien! '
  '29':
  - type: text
    content: 'Paul répondit: '
  - type: note
    content: 1 Co 7:7.
  - type: text
    content: Que ce soit bientôt ou que ce soit tard, plaise à Dieu que non seulement toi, mais encore tous ceux qui m’écoutent aujourd’hui, vous deveniez tels que je suis, à l’exception de ces liens!
  - type: heading
    content: Son innocence reconnue par Agrippa
  - type: heading
    content: 'V. 30-32: cf. Ac 25:9-12, 25. 1 Pi 2:12.'
  '3':
  - type: text
    content: 'car tu connais parfaitement leurs coutumes et leurs discussions. Je te prie donc de m’écouter avec patience. '
  '30':
  - type: text
    content: 'Le roi, le gouverneur, Bérénice, et tous ceux qui étaient assis avec eux se levèrent, '
  '31':
  - type: text
    content: 'et, en se retirant, ils se disaient les uns aux autres: '
  - type: note
    content: Ac 23:9; 25:25.
  - type: text
    content: 'Cet homme n’a rien fait qui mérite la mort ou la prison. '
  '32':
  - type: text
    content: 'Et Agrippa dit à Festus: Cet homme pouvait être relâché, s’il n’en eût pas appelé à César.'
  '4':
  - type: text
    content: 'Ma vie, dès les premiers temps de ma jeunesse, est connue de tous les Juifs, puisqu’elle s’est passée à Jérusalem, au milieu de ma nation. '
  '5':
  - type: text
    content: 'Ils savent depuis longtemps, s’ils veulent le déclarer, que j’ai vécu pharisien, selon la secte la plus rigide de notre religion. '
  '6':
  - type: text
    content: 'Et maintenant, je suis mis en jugement parce que '
  - type: note
    content: Ge 3:15; 22:18; 26:4; 49:10. De 18:15. 2 S 7:12. Ps 132:11. És 4:2; 7:14; 9:5; 40:10. Jé 23:5; 33:14. Éz 34:23; 37:24. Da 9:24. Mi 7:20.
  - type: text
    content: 'j’espère l’accomplissement de la promesse que Dieu a faite à nos pères, '
  '7':
  - type: text
    content: 'et à laquelle aspirent nos douze tribus, qui servent Dieu continuellement nuit et jour. C’est pour cette espérance, ô roi, que je suis accusé par des Juifs! '
  '8':
  - type: text
    content: 'Quoi! Vous semble-t-il incroyable que Dieu ressuscite les morts? '
  '9':
  - type: note
    content: Ac 8:3; 9:1; 22:4. 1 Co 15:9. Ga 1:13. 1 Ti 1:13.
  - type: text
    content: 'Pour moi, j’avais cru devoir agir vigoureusement contre le nom de Jésus de Nazareth. '
