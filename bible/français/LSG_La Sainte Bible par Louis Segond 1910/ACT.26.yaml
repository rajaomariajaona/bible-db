document_id: ACT.26,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Discours de Paul devant Agrippa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-29: cf. Mt 10:18-20. (Ac 9:1-30; 22:1-21.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Agrippa dit à Paul: Il t’est permis de parler pour ta défense. Et Paul, ayant étendu la main, se justifia en ces termes: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'C’est ce que j’ai fait à Jérusalem. J’ai jeté en prison plusieurs des saints, ayant reçu ce pouvoir des principaux sacrificateurs, et, quand on les mettait à mort, je joignais mon suffrage à celui des autres. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'je les ai souvent châtiés dans toutes les synagogues, et je les forçais à blasphémer. Dans mes excès de fureur contre eux, je les persécutais même jusque dans les villes étrangères. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'C’est dans ce but que je me rendis à Damas, avec l’autorisation et la permission des principaux sacrificateurs. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Vers le milieu du jour, ô roi, je vis en chemin resplendir autour de moi et de mes compagnons '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 9:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'une lumière venant du ciel, et dont l’éclat surpassait celui du soleil. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nous tombâmes tous par terre, et j’entendis une voix qui me disait en langue hébraïque: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Saul, Saul, pourquoi me persécutes-tu? Il te serait dur de regimber contre les aiguillons.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Je répondis: Qui es-tu, Seigneur? Et le Seigneur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je suis Jésus que tu persécutes.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais lève-toi, et tiens-toi sur tes pieds; car je te suis apparu pour t’établir ministre et témoin des choses que tu as vues et de celles pour lesquelles je t’apparaîtrai.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je t’ai choisi du milieu de ce peuple et du milieu des païens, vers qui je t’envoie,
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 60:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: afin que tu leur ouvres les yeux, pour qu’ils passent des ténèbres à la lumière et de la puissance de Satan à Dieu, pour qu’ils reçoivent, par la foi en moi, le pardon des péchés et l’héritage avec les sanctifiés.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'En conséquence, roi Agrippa, je n’ai point résisté à la vision céleste: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Je m’estime heureux, roi Agrippa, d’avoir aujourd’hui à me justifier devant toi de toutes les choses dont je suis accusé par les Juifs, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 9:19
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '28'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à ceux de Damas d’abord, puis à Jérusalem, dans toute la Judée, et chez les païens, j’ai prêché la repentance et la conversion à Dieu, avec la pratique d’œuvres dignes de la repentance. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Voilà pourquoi les Juifs se sont saisis de moi '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 21:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'dans le temple, et ont tâché de me faire périr. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mais, grâce au secours de Dieu, j’ai subsisté jusqu’à ce jour, rendant témoignage devant les petits et les grands, sans m’écarter en rien de ce que les prophètes et Moïse ont déclaré devoir arriver, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'savoir que le Christ souffrirait, et que, ressuscité le premier d’entre les morts, il annoncerait la lumière au peuple et aux nations. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Comme il parlait ainsi pour sa justification, Festus dit à haute voix: Tu es fou, Paul! Ton grand savoir te fait déraisonner. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Je ne suis point fou, très excellent Festus, répliqua Paul; ce sont, au contraire, des paroles de vérité et de bon sens que je prononce. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Le roi est instruit de ces choses, et je lui en parle librement; car je suis persuadé qu’il n’en ignore aucune, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 18:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'puisque ce n’est pas en cachette qu’elles se sont passées. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Crois-tu aux prophètes, roi Agrippa?… Je sais que tu y crois. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Et Agrippa dit à Paul: Tu vas bientôt me persuader de devenir chrétien! '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Paul répondit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 7:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que ce soit bientôt ou que ce soit tard, plaise à Dieu que non seulement toi, mais encore tous ceux qui m’écoutent aujourd’hui, vous deveniez tels que je suis, à l’exception de ces liens!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Son innocence reconnue par Agrippa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 30-32: cf. Ac 25:9-12, 25. 1 Pi 2:12.'
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'car tu connais parfaitement leurs coutumes et leurs discussions. Je te prie donc de m’écouter avec patience. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Le roi, le gouverneur, Bérénice, et tous ceux qui étaient assis avec eux se levèrent, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'et, en se retirant, ils se disaient les uns aux autres: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 23:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Cet homme n’a rien fait qui mérite la mort ou la prison. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Et Agrippa dit à Festus: Cet homme pouvait être relâché, s’il n’en eût pas appelé à César.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ma vie, dès les premiers temps de ma jeunesse, est connue de tous les Juifs, puisqu’elle s’est passée à Jérusalem, au milieu de ma nation. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ils savent depuis longtemps, s’ils veulent le déclarer, que j’ai vécu pharisien, selon la secte la plus rigide de notre religion. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Et maintenant, je suis mis en jugement parce que '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 3:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 49:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 18:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 7:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 132:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 4:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 40:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 23:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 34:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 37:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Da 9:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 7:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'j’espère l’accomplissement de la promesse que Dieu a faite à nos pères, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'et à laquelle aspirent nos douze tribus, qui servent Dieu continuellement nuit et jour. C’est pour cette espérance, ô roi, que je suis accusé par des Juifs! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Quoi! Vous semble-t-il incroyable que Dieu ressuscite les morts? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 8:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 1:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 1:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Pour moi, j’avais cru devoir agir vigoureusement contre le nom de Jésus de Nazareth. '
