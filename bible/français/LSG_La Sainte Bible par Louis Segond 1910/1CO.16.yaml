document_id: 1CO.16,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Collecte pour les chrétiens de Jérusalem. Projets de voyage. Informations, exhortations, salutations
  - type: heading
    content: 'V. 1-12: cf. (2 Co 8 et 9. Ro 15:25-27.) Ac 19:21, 22; 20:1-3.'
  - type: text
    content: 'Pour ce qui concerne la collecte en faveur des saints, agissez, vous aussi, comme je l’ai ordonné aux Églises de la Galatie. '
  '10':
  - type: text
    content: 'Si Timothée arrive, faites en sorte qu’il soit sans crainte parmi vous, car il travaille comme moi à l’œuvre du Seigneur. '
  '11':
  - type: text
    content: 'Que personne donc ne le méprise. Accompagnez-le en paix, afin qu’il vienne vers moi, car je l’attends avec les frères. '
  '12':
  - type: text
    content: Pour ce qui est du frère Apollos, je l’ai beaucoup exhorté à se rendre chez vous avec les frères, mais ce n’était décidément pas sa volonté de le faire maintenant; il partira quand il en aura l’occasion.
  - type: heading
    content: 'V. 13-18: cf. 1 Th 5:5-13.'
  '13':
  - type: text
    content: 'Veillez, demeurez fermes dans la foi, soyez des hommes, fortifiez-vous. '
  '14':
  - type: text
    content: 'Que tout ce que vous faites se fasse avec charité! '
  '15':
  - type: text
    content: 'Encore une recommandation que je vous adresse, frères. Vous savez que la famille de Stéphanas est les prémices de l’Achaïe, et qu’elle s’est dévouée au service des saints. '
  '16':
  - type: text
    content: 'Ayez vous aussi de la déférence pour de tels hommes, et pour tous ceux qui travaillent à la même œuvre. '
  '17':
  - type: text
    content: 'Je me réjouis de la présence de Stéphanas, de Fortunatus et d’Achaïcus; ils ont suppléé à votre absence, '
  '18':
  - type: text
    content: car ils ont tranquillisé mon esprit et le vôtre. Sachez donc apprécier de tels hommes.
  - type: heading
    content: 'V. 19-24: cf. Ph 4:21-23. Ép 6:23, 24.'
  '19':
  - type: text
    content: 'Les Églises d’Asie vous saluent. Aquilas et Priscille, avec l’Église qui est dans leur maison, vous saluent beaucoup dans le Seigneur. '
  '2':
  - type: note
    content: Ac 11:29. 2 Co 8:4; 9:1.
  - type: text
    content: 'Que chacun de vous, le premier jour de la semaine, mette à part chez lui ce qu’il pourra, selon sa prospérité, afin qu’on n’attende pas mon arrivée pour recueillir les dons. '
  '20':
  - type: text
    content: 'Tous les frères vous saluent. '
  - type: note
    content: Ro 16:16. 2 Co 13:12. 1 Th 5:26. 1 Pi 5:14.
  - type: text
    content: 'Saluez-vous les uns les autres par un saint baiser. '
  '21':
  - type: text
    content: 'Je vous salue, moi Paul, de ma propre main. '
  '22':
  - type: text
    content: 'Si quelqu’un n’aime pas le Seigneur, qu’il soit anathème! Maranatha. '
  '23':
  - type: text
    content: 'Que la grâce du Seigneur Jésus soit avec vous! '
  '24':
  - type: text
    content: Mon amour est avec vous tous en Jésus-Christ.
  '3':
  - type: text
    content: 'Et quand je serai venu, j’enverrai avec des lettres, pour porter vos libéralités à Jérusalem, les personnes que vous aurez approuvées. '
  '4':
  - type: text
    content: 'Si la chose mérite que j’y aille moi-même, elles feront le voyage avec moi. '
  '5':
  - type: note
    content: 2 Co 1:15.
  - type: text
    content: 'J’irai chez vous quand j’aurai traversé la Macédoine, car je traverserai la Macédoine. '
  '6':
  - type: text
    content: 'Peut-être séjournerai-je auprès de vous, ou même y passerai-je l’hiver, afin que vous m’accompagniez là où je me rendrai. '
  '7':
  - type: text
    content: 'Je ne veux pas cette fois vous voir en passant, mais j’espère demeurer quelque temps auprès de vous, si le Seigneur le permet. '
  '8':
  - type: text
    content: 'Je resterai néanmoins à Éphèse jusqu’à la Pentecôte; '
  '9':
  - type: text
    content: 'car une porte grande et d’un accès efficace m’est ouverte, et les adversaires sont nombreux. '
