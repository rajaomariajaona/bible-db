document_id: 1CO.16,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Collecte pour les chrétiens de Jérusalem. Projets de voyage. Informations, exhortations, salutations
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-12: cf. (2 Co 8 et 9. Ro 15:25-27.) Ac 19:21, 22; 20:1-3.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Pour ce qui concerne la collecte en faveur des saints, agissez, vous aussi, comme je l’ai ordonné aux Églises de la Galatie. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Si Timothée arrive, faites en sorte qu’il soit sans crainte parmi vous, car il travaille comme moi à l’œuvre du Seigneur. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Que personne donc ne le méprise. Accompagnez-le en paix, afin qu’il vienne vers moi, car je l’attends avec les frères. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Pour ce qui est du frère Apollos, je l’ai beaucoup exhorté à se rendre chez vous avec les frères, mais ce n’était décidément pas sa volonté de le faire maintenant; il partira quand il en aura l’occasion.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-18: cf. 1 Th 5:5-13.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Veillez, demeurez fermes dans la foi, soyez des hommes, fortifiez-vous. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Que tout ce que vous faites se fasse avec charité! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Encore une recommandation que je vous adresse, frères. Vous savez que la famille de Stéphanas est les prémices de l’Achaïe, et qu’elle s’est dévouée au service des saints. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ayez vous aussi de la déférence pour de tels hommes, et pour tous ceux qui travaillent à la même œuvre. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Je me réjouis de la présence de Stéphanas, de Fortunatus et d’Achaïcus; ils ont suppléé à votre absence, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: car ils ont tranquillisé mon esprit et le vôtre. Sachez donc apprécier de tels hommes.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 19-24: cf. Ph 4:21-23. Ép 6:23, 24.'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Les Églises d’Asie vous saluent. Aquilas et Priscille, avec l’Église qui est dans leur maison, vous saluent beaucoup dans le Seigneur. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 11:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 8:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Que chacun de vous, le premier jour de la semaine, mette à part chez lui ce qu’il pourra, selon sa prospérité, afin qu’on n’attende pas mon arrivée pour recueillir les dons. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tous les frères vous saluent. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 16:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 13:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 5:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 5:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Saluez-vous les uns les autres par un saint baiser. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Je vous salue, moi Paul, de ma propre main. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Si quelqu’un n’aime pas le Seigneur, qu’il soit anathème! Maranatha. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Que la grâce du Seigneur Jésus soit avec vous! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Mon amour est avec vous tous en Jésus-Christ.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Et quand je serai venu, j’enverrai avec des lettres, pour porter vos libéralités à Jérusalem, les personnes que vous aurez approuvées. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Si la chose mérite que j’y aille moi-même, elles feront le voyage avec moi. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 1:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'J’irai chez vous quand j’aurai traversé la Macédoine, car je traverserai la Macédoine. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Peut-être séjournerai-je auprès de vous, ou même y passerai-je l’hiver, afin que vous m’accompagniez là où je me rendrai. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Je ne veux pas cette fois vous voir en passant, mais j’espère demeurer quelque temps auprès de vous, si le Seigneur le permet. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Je resterai néanmoins à Éphèse jusqu’à la Pentecôte; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'car une porte grande et d’un accès efficace m’est ouverte, et les adversaires sont nombreux. '
