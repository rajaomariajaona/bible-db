document_id: DEU.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les animaux et les objets égarés
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-4: cf. (Ex 23:4, 5. Mt 7:12.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Si tu vois s’égarer '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:4
      metadata:
        usfm: EXO.23.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le bœuf ou la brebis de ton frère, tu ne t’en détourneras point, tu les ramèneras à ton frère. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Si ton frère n’habite pas près de toi, et que tu ne le connaisses pas, tu recueilleras l’animal dans ta maison et il restera chez toi jusqu’à ce que ton frère le réclame; et alors tu le lui rendras. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu feras de même pour son âne, tu feras de même pour son vêtement, tu feras de même pour tout objet qu’il aurait perdu et que tu trouverais; tu ne devras point t’en détourner. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Si tu vois l’âne de ton frère ou son bœuf tombé dans le chemin, tu ne t’en détourneras point, tu l’aideras à le relever.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les travestissements. Les nids d’oiseaux. Les maisons neuves. Le mélange dans les semences et dans les tissus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 5-12: cf. (Lé 22:27, 28; 19:19. No 15:38-40.) 1 Co 14:33, 40.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Une femme ne portera point un habillement d’homme, et un homme ne mettra point des vêtements de femme; car quiconque fait ces choses est en abomination à l’Éternel, ton Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Si tu rencontres dans ton chemin un nid d’oiseau, sur un arbre ou sur la terre, avec des petits ou des œufs, et la mère couchée sur les petits ou sur les œufs, tu ne prendras pas la mère et les petits, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'tu laisseras aller la mère et tu ne prendras que les petits, afin que tu sois heureux et que tu prolonges tes jours. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Si tu bâtis une maison neuve, tu feras une balustrade autour de ton toit, afin de ne pas mettre du sang sur ta maison, dans le cas où il en tomberait quelqu’un. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tu ne '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:19
      metadata:
        usfm: LEV.19.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sèmeras point dans ta vigne diverses semences, de peur que tu ne jouisses ni du produit de ce que tu auras semé ni du produit de la vigne. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tu ne laboureras point avec un bœuf et un âne attelés ensemble. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu ne porteras point un vêtement tissé de diverses espèces de fils, de laine et de lin réunis ensemble. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 15:38
      metadata:
        usfm: NUM.15.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 23:5
      metadata:
        usfm: MAT.23.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tu mettras des franges aux quatre coins du vêtement dont tu te couvriras.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-21: cf. No 5:11-31.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Si un homme, qui a pris une femme et est allé vers elle, éprouve ensuite de l’aversion pour sa personne, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 's’il lui impute des choses criminelles et porte atteinte à sa réputation, en disant: J’ai pris cette femme, je me suis approché d’elle, et je ne l’ai pas trouvée vierge, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'alors le père et la mère de la jeune femme prendront les signes de sa virginité et les produiront devant les anciens de la ville, à la porte. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le père de la jeune femme dira aux anciens: J’ai donné ma fille pour femme à cet homme, et il l’a prise en aversion; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'il lui impute des choses criminelles, en disant: Je n’ai pas trouvé ta fille vierge. Or voici les signes de virginité de ma fille. Et ils déploieront son vêtement devant les anciens de la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les anciens de la ville saisiront alors cet homme et le châtieront; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et, parce qu’il a porté atteinte à la réputation d’une vierge d’Israël, ils le condamneront à une amende de cent sicles d’argent, qu’ils donneront au père de la jeune femme. Elle restera sa femme, et il ne pourra pas la renvoyer, tant qu’il vivra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais si le fait est vrai, si la jeune femme ne s’est point trouvée vierge, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: on fera sortir la jeune femme à l’entrée de la maison de son père; elle sera lapidée par les gens de la ville, et elle mourra, parce qu’elle a commis une infamie en Israël, en se prostituant dans la maison de son père. Tu ôteras ainsi le mal du milieu de toi.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-30: cf. Lé 20:10, 11. Hé 13:4. 1 Th 4:3-7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 20:10
      metadata:
        usfm: LEV.20.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si l’on trouve un homme couché avec une femme mariée, ils mourront tous deux, l’homme qui a couché avec la femme, et la femme aussi. Tu ôteras ainsi le mal du milieu d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Si une jeune fille vierge est fiancée, et qu’un homme la rencontre dans la ville et couche avec elle, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'vous les amènerez tous deux à la porte de la ville, vous les lapiderez, et ils mourront, la jeune fille pour n’avoir pas crié dans la ville, et l’homme pour avoir déshonoré la femme de son prochain. Tu ôteras ainsi le mal du milieu de toi. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mais si c’est dans les champs que cet homme rencontre la jeune femme fiancée, lui fait violence et couche avec elle, l’homme qui aura couché avec elle sera seul puni de mort. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tu ne feras rien à la jeune fille; elle n’est pas coupable d’un crime digne de mort, car il en est de ce cas comme de celui où un homme se jette sur son prochain et lui ôte la vie. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'La jeune fille fiancée, que cet homme a rencontrée dans les champs, a pu crier sans qu’il y ait eu personne pour la secourir. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Si un homme rencontre une jeune fille vierge non fiancée, lui fait violence et couche avec elle, et qu’on vienne à les surprendre, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'l’homme qui aura couché avec elle donnera au père de la jeune fille '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 22:16
      metadata:
        usfm: EXO.22.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'cinquante sicles d’argent; et, parce qu’il l’a déshonorée, il la prendra pour femme, et il ne pourra pas la renvoyer, tant qu’il vivra. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Nul ne prendra la femme de son père, et ne soulèvera la couverture de son père.
