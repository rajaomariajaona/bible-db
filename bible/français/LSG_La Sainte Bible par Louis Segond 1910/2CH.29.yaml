document_id: 2CH.29
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ézéchias, roi de Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-19: cf. 2 R 18:1-6. 2 Ch 34:1-10. És 52:1. Jn 1:48; 2:17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ézéchias '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 18:1
      metadata:
        usfm: 2KI.18.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'devint roi à l’âge de vingt-cinq ans, et il régna vingt-neuf ans à Jérusalem. Sa mère s’appelait Abija, fille de Zacharie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il fit ce qui est droit aux yeux de l’Éternel, entièrement comme avait fait David, son père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'La première année de son règne, au premier mois, il ouvrit '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 28:24
      metadata:
        usfm: 2CH.28.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les portes de la maison de l’Éternel, et il les répara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il fit venir les sacrificateurs et les Lévites, qu’il assembla dans la place orientale, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et il leur dit: Écoutez-moi, Lévites! Maintenant sanctifiez-vous, sanctifiez la maison de l’Éternel, le Dieu de vos pères, et mettez ce qui est impur hors du sanctuaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Car nos pères ont péché, ils ont fait ce qui est mal aux yeux de l’Éternel, notre Dieu, ils l’ont abandonné, ils ont détourné leurs regards du tabernacle de l’Éternel et lui ont tourné le dos. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils ont même fermé les portes du portique et éteint les lampes, et ils n’ont offert au Dieu d’Israël ni parfums ni holocaustes dans le sanctuaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aussi la colère de l’Éternel a été sur Juda et sur Jérusalem, et il les a livrés au trouble, à la désolation et à la moquerie, comme vous le voyez de vos yeux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et voici, à cause de cela nos pères '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Ch 28:6, etc.
    marker-yv: yv-n
  - type: text
    text: 'sont tombés par l’épée, et nos fils, nos filles et nos femmes sont en captivité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'J’ai donc l’intention de faire alliance avec l’Éternel, le Dieu d’Israël, pour que son ardente colère se détourne de nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Maintenant, mes fils, cessez d’être négligents; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 28:1
      metadata:
        usfm: EXO.28.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 3:6
      metadata:
        usfm: NUM.3.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:14
      metadata:
        usfm: NUM.8.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:2
      metadata:
        usfm: NUM.18.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car vous avez été choisis par l’Éternel pour vous tenir à son service devant lui, pour être ses serviteurs, et pour lui offrir des parfums. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et les Lévites se levèrent: Machath, fils d’Amasaï, Joël, fils d’Azaria, des fils des Kehathites; et des fils des Merarites, Kis, fils d’Abdi, Azaria, fils de Jehalléleel; et des Guerschonites, Joach, fils de Zimma, Éden, fils de Joach; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et des fils d’Élitsaphan, Schimri et Jeïel; et des fils d’Asaph, Zacharie et Matthania; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et des fils d’Héman, Jehiel et Schimeï; et des fils de Jeduthun, Schemaeja et Uzziel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils réunirent leurs frères, et, après s’être sanctifiés, ils vinrent pour purifier la maison de l’Éternel, selon l’ordre du roi et d’après les paroles de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les sacrificateurs entrèrent dans l’intérieur de la maison de l’Éternel pour la purifier; ils sortirent toutes les impuretés qu’ils trouvèrent dans le temple de l’Éternel et les mirent dans le parvis de la maison de l’Éternel, où les Lévites les reçurent pour les emporter dehors au torrent de Cédron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils commencèrent ces purifications le premier jour du premier mois; le huitième jour du mois, ils entrèrent dans le portique de l’Éternel, et ils mirent huit jours à purifier la maison de l’Éternel; le seizième jour du premier mois, ils avaient achevé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils se rendirent ensuite chez le roi Ézéchias, et dirent: Nous avons purifié toute la maison de l’Éternel, l’autel des holocaustes et tous ses ustensiles, et la table des pains de proposition et tous ses ustensiles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nous avons remis en état et purifié tous les ustensiles que le roi Achaz avait profanés pendant son règne, lors de ses transgressions: ils sont devant l’autel de l’Éternel.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le temple purifié et le culte rétabli
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-36: cf. Lé 9. Esd 6:16-18. Mal 3:4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le roi Ézéchias se leva de bon matin, assembla les chefs de la ville, et monta à la maison de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils offrirent sept taureaux, sept béliers, sept agneaux et sept boucs, en '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 4:14
      metadata:
        usfm: LEV.4.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sacrifice d’expiation pour le royaume, pour le sanctuaire, et pour Juda. Le roi ordonna aux sacrificateurs, fils d’Aaron, de les offrir sur l’autel de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les sacrificateurs égorgèrent les bœufs, et reçurent le sang, qu’ils '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 8:14
      metadata:
        usfm: LEV.8.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: LEV.8.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:21
      metadata:
        usfm: HEB.9.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'répandirent sur l’autel; ils égorgèrent les béliers, et répandirent le sang sur l’autel; ils égorgèrent les agneaux, et répandirent le sang sur l’autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'On amena ensuite les boucs expiatoires devant le roi et devant l’assemblée, qui posèrent leurs '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 4:15
      metadata:
        usfm: LEV.4.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mains sur eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les sacrificateurs les égorgèrent, et répandirent leur sang au pied de l’autel en expiation pour les péchés de tout Israël; car c’était pour tout Israël que le roi avait ordonné l’holocauste et le sacrifice d’expiation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 16:4
      metadata:
        usfm: 1CH.16.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:6
      metadata:
        usfm: 1CH.25.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il fit placer les Lévites dans la maison de l’Éternel avec des cymbales, des luths et des harpes, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 6:31
      metadata:
        usfm: 1CH.6.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:5
      metadata:
        usfm: 1CH.23.5
    - type: text
      text: '; 25:1, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 8:14
      metadata:
        usfm: 2CH.8.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'selon l’ordre de David, de Gad le voyant du roi, et de Nathan, le prophète; car c’était un ordre de l’Éternel, transmis par ses prophètes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Les Lévites prirent place avec les instruments de David, et les sacrificateurs avec les trompettes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ézéchias ordonna d’offrir l’holocauste sur l’autel; et au moment où commença l’holocauste, commença aussi le chant de l’Éternel, au son des trompettes et avec accompagnement des instruments de David, roi d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Toute l’assemblée se prosterna, on chanta le cantique, et l’on sonna des trompettes, le tout jusqu’à ce que l’holocauste fût achevé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Et quand on eut achevé d’offrir l’holocauste, le roi et tous ceux qui étaient avec lui fléchirent le genou et se prosternèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Puis le roi Ézéchias et les chefs dirent aux Lévites de célébrer l’Éternel avec les paroles de David et du prophète Asaph; et ils le célébrèrent avec des transports de joie, et ils s’inclinèrent et se prosternèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ézéchias prit alors la parole, et dit: Maintenant que vous vous êtes consacrés à l’Éternel, approchez-vous, amenez des victimes et offrez en sacrifices d’actions de grâces à la maison de l’Éternel. Et l’assemblée amena des victimes et offrit des sacrifices d’actions de grâces, et tous ceux dont le cœur était bien disposé offrirent des holocaustes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Le nombre des holocaustes offerts par l’assemblée fut de soixante-dix bœufs, cent béliers, et deux cents agneaux; toutes ces victimes furent immolées en holocauste à l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Et l’on consacra encore six cents bœufs et trois mille brebis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Mais les sacrificateurs étaient en petit nombre, et ils ne purent dépouiller tous les holocaustes; leurs frères, les Lévites, les aidèrent jusqu’à ce que l’ouvrage fût fini, et jusqu’à ce que les autres sacrificateurs se fussent sanctifiés, car les Lévites avaient eu plus à cœur de se sanctifier que les sacrificateurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Il y avait d’ailleurs beaucoup d’holocaustes, avec les graisses des sacrifices d’actions de grâces, et avec les libations des holocaustes. Ainsi fut rétabli le service de la maison de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ézéchias et tout le peuple se réjouirent de ce que Dieu avait bien disposé le peuple, car la chose se fit subitement.
