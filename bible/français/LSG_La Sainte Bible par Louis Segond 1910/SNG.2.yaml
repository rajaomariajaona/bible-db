document_id: SNG.2,93
type_code: fra
verses:
  '1':
  - type: text
    content: Je suis un narcisse de Saron,
  - type: text
    content: Un lis des vallées.
  '10':
  - type: text
    content: 'Mon bien-aimé parle et me dit:'
  - type: text
    content: Lève-toi, mon amie, ma belle, et viens!
  '11':
  - type: text
    content: Car voici, l’hiver est passé;
  - type: text
    content: La pluie a cessé, elle s’en est allée.
  '12':
  - type: text
    content: Les fleurs paraissent sur la terre,
  - type: text
    content: Le temps de chanter est arrivé,
  - type: text
    content: Et la voix de la tourterelle se fait entendre dans nos campagnes.
  '13':
  - type: text
    content: Le figuier embaume ses fruits,
  - type: text
    content: Et les vignes en fleur exhalent leur parfum.
  - type: text
    content: Lève-toi, mon amie, ma belle, et viens!
  '14':
  - type: text
    content: Ma colombe, qui te tiens dans les fentes du rocher,
  - type: text
    content: Qui te caches dans les parois escarpées,
  - type: text
    content: Fais-moi voir ta figure,
  - type: text
    content: Fais-moi entendre ta voix;
  - type: note
    content: Ca 5:13, 16.
  - type: text
    content: Car ta voix est douce, et ta figure est agréable.
  '15':
  - type: text
    content: 'Prenez-nous '
  - type: note
    content: Éz 13:4. Lu 13:52.
  - type: text
    content: les renards,
  - type: text
    content: Les petits renards qui ravagent les vignes;
  - type: text
    content: Car nos vignes sont en fleur.
  '16':
  - type: text
    content: Mon bien-aimé est à moi, et je suis à lui;
  - type: text
    content: Il fait paître son troupeau parmi les lis.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ca 4:9.
  - type: text
    content: Avant que le jour se rafraîchisse,
  - type: text
    content: Et que les ombres fuient,
  - type: text
    content: Reviens!… sois semblable, mon bien-aimé,
  - type: text
    content: A la gazelle ou au faon des biches,
  - type: text
    content: Sur les montagnes qui nous séparent.
  '2':
  - type: text
    content: Comme un lis au milieu des épines,
  - type: text
    content: Telle est mon amie parmi les jeunes filles.
  '3':
  - type: text
    content: Comme un pommier au milieu des arbres de la forêt,
  - type: text
    content: Tel est mon bien-aimé parmi les jeunes hommes.
  - type: text
    content: J’ai désiré m’asseoir à son ombre,
  - type: text
    content: Et son fruit est doux à mon palais.
  '4':
  - type: text
    content: Il m’a fait entrer dans la maison du vin;
  - type: text
    content: Et la bannière qu’il déploie sur moi, c’est l’amour.
  '5':
  - type: text
    content: Soutenez-moi avec des gâteaux de raisins,
  - type: text
    content: Fortifiez-moi avec des pommes;
  - type: text
    content: Car je suis malade d’amour.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ca 8:3.
  - type: text
    content: Que sa main gauche soit sous ma tête,
  - type: text
    content: Et que sa droite m’embrasse!
  '7':
  - type: text
    content: Je vous en conjure, filles de Jérusalem,
  - type: text
    content: Par les gazelles et les biches des champs,
  - type: text
    content: Ne réveillez pas, ne réveillez pas l’amour,
  - type: text
    content: Avant qu’elle le veuille.
  - type: heading
    content: 'V. 8-17: cf. Ca 5:2, etc. Jn 10:4, 5, 27, 28.'
  '8':
  - type: text
    content: C’est la voix de mon bien-aimé!
  - type: text
    content: Le voici, il vient,
  - type: text
    content: Sautant sur les montagnes,
  - type: text
    content: Bondissant sur les collines.
  '9':
  - type: text
    content: Mon bien-aimé est semblable à la gazelle
  - type: text
    content: Ou au faon des biches.
  - type: text
    content: Le voici, il est derrière notre mur,
  - type: text
    content: Il regarde par la fenêtre,
  - type: text
    content: Il regarde par le treillis.
