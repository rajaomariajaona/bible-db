document_id: SNG.2
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Je suis un narcisse de Saron,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un lis des vallées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Comme un lis au milieu des épines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Telle est mon amie parmi les jeunes filles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Comme un pommier au milieu des arbres de la forêt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tel est mon bien-aimé parmi les jeunes hommes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai désiré m’asseoir à son ombre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et son fruit est doux à mon palais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il m’a fait entrer dans la maison du vin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la bannière qu’il déploie sur moi, c’est l’amour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Soutenez-moi avec des gâteaux de raisins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fortifiez-moi avec des pommes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je suis malade d’amour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ca 8:3
      metadata:
        usfm: SNG.8.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Que sa main gauche soit sous ma tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que sa droite m’embrasse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je vous en conjure, filles de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par les gazelles et les biches des champs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne réveillez pas, ne réveillez pas l’amour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avant qu’elle le veuille.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-17: cf. Ca 5:2, etc. Jn 10:4, 5, 27, 28.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: C’est la voix de mon bien-aimé!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le voici, il vient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sautant sur les montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bondissant sur les collines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mon bien-aimé est semblable à la gazelle
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou au faon des biches.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le voici, il est derrière notre mur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il regarde par la fenêtre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il regarde par le treillis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mon bien-aimé parle et me dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lève-toi, mon amie, ma belle, et viens!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Car voici, l’hiver est passé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La pluie a cessé, elle s’en est allée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les fleurs paraissent sur la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le temps de chanter est arrivé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la voix de la tourterelle se fait entendre dans nos campagnes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Le figuier embaume ses fruits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les vignes en fleur exhalent leur parfum.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lève-toi, mon amie, ma belle, et viens!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ma colombe, qui te tiens dans les fentes du rocher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui te caches dans les parois escarpées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais-moi voir ta figure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais-moi entendre ta voix;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ca 5:13
      metadata:
        usfm: SNG.5.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: SNG.5.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car ta voix est douce, et ta figure est agréable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Prenez-nous '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 13:4
      metadata:
        usfm: EZK.13.4
    - type: text
      text: . Lu 13:52.
    marker-yv: yv-n
  - type: text
    text: les renards,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les petits renards qui ravagent les vignes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car nos vignes sont en fleur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mon bien-aimé est à moi, et je suis à lui;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fait paître son troupeau parmi les lis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ca 4:9
      metadata:
        usfm: SNG.4.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Avant que le jour se rafraîchisse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que les ombres fuient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reviens!… sois semblable, mon bien-aimé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A la gazelle ou au faon des biches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur les montagnes qui nous séparent.
