document_id: JAS.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: text
    content: 'Jacques, serviteur de Dieu et du Seigneur Jésus-Christ, aux douze tribus '
  - type: note
    content: Ac 8:1. 1 Pi 1:1.
  - type: text
    content: qui sont dans la dispersion, salut!
  - type: heading
    content: Les épreuves et les tentations
  - type: heading
    content: 'V. 2-8: cf. (Ro 5:3-5. Ja 5:7-11.) (Mt 7:7-11. Mc 11:24. Hé 11:6.)'
  '10':
  - type: text
    content: 'Que le riche, au contraire, se glorifie de son humiliation; car il passera comme la fleur de l’herbe. '
  '11':
  - type: note
    content: És 40:6. 1 Co 7:31. Ja 4:14. 1 Pi 1:24. 1 Jn 2:17.
  - type: text
    content: 'Le soleil s’est levé avec sa chaleur ardente, il a desséché l’herbe, sa fleur est tombée, et la beauté de son aspect a disparu: ainsi le riche se flétrira dans ses entreprises. '
  '12':
  - type: note
    content: Job 5:17.
  - type: text
    content: 'Heureux l’homme qui supporte patiemment la tentation; car, après avoir été éprouvé, il recevra '
  - type: note
    content: 2 Ti 4:8. 1 Pi 5:4. Ap 2:10.
  - type: text
    content: 'la couronne de vie, que le Seigneur a '
  - type: note
    content: Mt 10:22; 19:28, 29.
  - type: text
    content: promise à ceux qui l’aiment.
  - type: heading
    content: 'V. 13-15: cf. Ge 3:6, etc.; 4:7.'
  '13':
  - type: text
    content: 'Que personne, lorsqu’il est tenté, ne dise: C’est Dieu qui me tente. Car Dieu ne peut être tenté par le mal, et il ne tente lui-même personne. '
  '14':
  - type: text
    content: 'Mais chacun est tenté quand il est attiré et amorcé par sa propre convoitise. '
  '15':
  - type: text
    content: Puis la convoitise, lorsqu’elle a conçu, enfante le péché; et le péché, étant consommé, produit la mort.
  - type: heading
    content: Mettre en pratique la parole de Dieu
  - type: heading
    content: 'V. 16-27: cf. Jn 3:27. 1 Pi 1:23-25; 2:1, 2. (Mt 7:21-27. Ga 6:7-10.)'
  '16':
  - type: text
    content: 'Ne vous y trompez pas, mes frères bien-aimés: '
  '17':
  - type: note
    content: Pr 2:6. 1 Co 4:7.
  - type: text
    content: 'toute grâce excellente et tout don parfait descendent d’en haut, du Père des lumières, '
  - type: note
    content: És 14:27; 46:10. Mal 3:6. Ro 11:29.
  - type: text
    content: 'chez lequel il n’y a ni changement ni ombre de variation. '
  '18':
  - type: note
    content: 1 Co 4:15. Ga 4:19. 1 Pi 1:23.
  - type: text
    content: 'Il nous a engendrés selon sa volonté, par la parole de vérité, afin que nous soyons en quelque sorte les prémices de ses créatures. '
  '19':
  - type: text
    content: 'Sachez-le, mes frères bien-aimés. '
  - type: note
    content: Pr 17:27. Ec 5:1.
  - type: text
    content: 'Ainsi, que tout homme soit prompt à écouter, lent à parler, lent à se mettre en colère; '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Mt 5:11. Ro 5:3. 1 Pi 1:6.
  - type: text
    content: 'Mes frères, regardez comme un sujet de joie complète les diverses épreuves auxquelles vous pouvez être exposés, '
  '20':
  - type: text
    content: 'car la colère de l’homme n’accomplit pas la justice de Dieu. '
  '21':
  - type: note
    content: Ro 13:12. Col 3:8.
  - type: text
    content: 'C’est pourquoi, rejetant toute souillure et tout excès de malice, recevez avec douceur la parole qui a été plantée en vous, et qui peut sauver vos âmes. '
  '22':
  - type: note
    content: Mt 7:21. Lu 11:28. Ro 2:13. 1 Jn 3:7.
  - type: text
    content: 'Mettez en pratique la parole, et ne vous bornez pas à l’écouter, en vous trompant vous-mêmes par de faux raisonnements. '
  '23':
  - type: note
    content: Lu 6:47.
  - type: text
    content: 'Car, si quelqu’un écoute la parole et ne la met pas en pratique, il est semblable à un homme qui regarde dans un miroir son visage naturel, '
  '24':
  - type: text
    content: 'et qui, après s’être regardé, s’en va, et oublie aussitôt quel il était. '
  '25':
  - type: note
    content: Mt 5:19.
  - type: text
    content: 'Mais celui qui aura plongé les regards dans la loi parfaite, la loi de la liberté, et qui aura persévéré, n’étant pas un auditeur oublieux, mais se mettant à l’œuvre, celui-là sera heureux dans son activité. '
  '26':
  - type: note
    content: Ps 34:14. Ja 3:6. 1 Pi 3:10.
  - type: text
    content: 'Si quelqu’un croit être religieux, sans tenir sa langue en bride, mais en trompant son cœur, la religion de cet homme est vaine. '
  '27':
  - type: text
    content: La religion pure et sans tache, devant Dieu notre Père, consiste à visiter les orphelins et les veuves dans leurs afflictions, et à se préserver des souillures du monde.
  '3':
  - type: note
    content: Ro 5:3. 1 Pi 1:7.
  - type: text
    content: 'sachant que l’épreuve de votre foi produit la patience. '
  '4':
  - type: text
    content: 'Mais il faut que la patience accomplisse parfaitement son œuvre, afin que vous soyez parfaits et accomplis, sans faillir en rien. '
  '5':
  - type: note
    content: Pr 2:3.
  - type: text
    content: 'Si quelqu’un d’entre vous manque de sagesse, qu’il la demande à Dieu, qui donne à tous simplement et sans reproche, '
  - type: note
    content: Jé 29:12. Mt 7:7; 21:22. Mc 11:24. Jn 16:24. 1 Jn 3:22; 5:14.
  - type: text
    content: 'et elle lui sera donnée. '
  '6':
  - type: text
    content: 'Mais qu’il la demande avec foi, sans douter; car celui qui doute est semblable au flot de la mer, agité par le vent et poussé de côté et d’autre. '
  '7':
  - type: text
    content: 'Qu’un tel homme ne s’imagine pas qu’il recevra quelque chose du Seigneur: '
  '8':
  - type: text
    content: c’est un homme irrésolu, inconstant dans toutes ses voies.
  - type: heading
    content: 'V. 9-12: cf. Jé 9:23, 24. Éz 7:19. Ap 2:10.'
  '9':
  - type: text
    content: 'Que le frère de condition humble se glorifie de son élévation. '
