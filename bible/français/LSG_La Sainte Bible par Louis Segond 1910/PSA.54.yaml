document_id: PSA.54
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 1 S 23:14-28; 26:1.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. Avec instruments à cordes. Cantique de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: '1 S 23:19, etc.; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:1
      metadata:
        usfm: 1SA.26.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque les Ziphiens vinrent dire à Saül: David n’est-il pas caché parmi nous?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: O Dieu! Sauve-moi par ton nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et rends-moi justice par ta puissance!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: O Dieu! Écoute ma prière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prête l’oreille aux paroles de ma bouche!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Car des étrangers se sont levés contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des hommes violents en veulent à ma vie;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 86:14
      metadata:
        usfm: PSA.86.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils ne portent pas leurs pensées sur Dieu. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Voici, Dieu est mon secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Seigneur est le soutien de mon âme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le mal retombera sur mes adversaires;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Anéantis-les, dans ta fidélité!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je t’offrirai de bon cœur des sacrifices;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je louerai ton nom, ô Éternel! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 52:11
      metadata:
        usfm: PSA.52.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: car il est favorable,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Car il me délivre de toute détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mes yeux se réjouissent à la vue de mes ennemis.
