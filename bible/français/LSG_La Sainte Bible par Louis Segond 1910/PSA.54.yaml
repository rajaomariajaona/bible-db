document_id: PSA.54,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 1 S 23:14-28; 26:1.
  - type: text
    content: Au chef des chantres. Avec instruments à cordes. Cantique de David.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 1 S 23:19, etc.; 26:1.
  - type: text
    content: 'Lorsque les Ziphiens vinrent dire à Saül: David n’est-il pas caché parmi nous?'
  '3':
  - type: text
    content: O Dieu! Sauve-moi par ton nom,
  - type: text
    content: Et rends-moi justice par ta puissance!
  '4':
  - type: text
    content: O Dieu! Écoute ma prière,
  - type: text
    content: Prête l’oreille aux paroles de ma bouche!
  '5':
  - type: text
    content: Car des étrangers se sont levés contre moi,
  - type: text
    content: Des hommes violents en veulent à ma vie;
  - type: note
    content: Ps 86:14.
  - type: text
    content: 'Ils ne portent pas leurs pensées sur Dieu. '
  - type: text
    content: — Pause.
  '6':
  - type: text
    content: Voici, Dieu est mon secours,
  - type: text
    content: Le Seigneur est le soutien de mon âme.
  '7':
  - type: text
    content: Le mal retombera sur mes adversaires;
  - type: text
    content: Anéantis-les, dans ta fidélité!
  '8':
  - type: text
    content: Je t’offrirai de bon cœur des sacrifices;
  - type: text
    content: 'Je louerai ton nom, ô Éternel! '
  - type: note
    content: Ps 52:11.
  - type: text
    content: car il est favorable,
  '9':
  - type: text
    content: Car il me délivre de toute détresse,
  - type: text
    content: Et mes yeux se réjouissent à la vue de mes ennemis.
