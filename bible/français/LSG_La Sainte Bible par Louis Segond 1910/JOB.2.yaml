document_id: JOB.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-10: cf. Job 1:6, etc. (La 3:37, 38. 1 Pi 5:6.) Ap 2:10.'
  - type: text
    content: 'Or, les fils de Dieu vinrent un jour se présenter devant l’Éternel, et Satan vint aussi au milieu d’eux se présenter devant l’Éternel. '
  '10':
  - type: text
    content: 'Mais Job lui répondit: Tu parles comme une femme insensée. Quoi! Nous recevons de Dieu le bien, et nous ne recevrions pas aussi le mal!'
  - type: text
    content: En tout cela Job ne pécha point par ses lèvres.
  - type: heading
    content: Visite de trois amis
  - type: heading
    content: 'V. 11-13: cf. Ro 12:15. 1 Th 5:14. Job 6:14.'
  '11':
  - type: text
    content: 'Trois amis de Job, Éliphaz de Théman, Bildad de Schuach, et Tsophar de Naama, apprirent tous les malheurs qui lui étaient arrivés. Ils se concertèrent et partirent de chez eux pour aller le plaindre et le consoler! '
  '12':
  - type: text
    content: 'Ayant de loin porté les regards sur lui, ils ne le reconnurent pas, et ils élevèrent la voix et pleurèrent. Ils déchirèrent leurs manteaux, et ils jetèrent de la poussière en l’air au-dessus de leur tête. '
  '13':
  - type: text
    content: Et ils se tinrent assis à terre auprès de lui sept jours et sept nuits, sans lui dire une parole, car ils voyaient combien sa douleur était grande.
  '2':
  - type: text
    content: 'L’Éternel dit à Satan: D’où viens-tu? Et Satan répondit à l’Éternel: De parcourir la terre et de m’y promener. '
  '3':
  - type: text
    content: 'L’Éternel dit à Satan: As-tu remarqué mon serviteur Job? Il n’y a personne comme lui sur la terre; c’est un homme intègre et droit, craignant Dieu, et se détournant du mal. Il demeure ferme dans son intégrité, et tu m’excites à le perdre sans motif. '
  '4':
  - type: text
    content: 'Et Satan répondit à l’Éternel: Peau pour peau! Tout ce que possède un homme, il le donne pour sa vie. '
  '5':
  - type: text
    content: 'Mais étends ta main, touche à ses os et à sa chair, et je suis sûr qu’il te maudit en face. '
  '6':
  - type: text
    content: 'L’Éternel dit à Satan: Voici, je te le livre: seulement, épargne sa vie. '
  '7':
  - type: text
    content: 'Et Satan se retira de devant la face de l’Éternel. Puis il frappa Job d’un ulcère malin, depuis la plante du pied jusqu’au sommet de la tête. '
  '8':
  - type: text
    content: 'Et Job prit un tesson pour se gratter et s’assit sur la cendre. '
  '9':
  - type: text
    content: 'Sa femme lui dit: Tu demeures ferme dans ton intégrité! Maudis Dieu, et meurs! '
