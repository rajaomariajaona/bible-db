document_id: HEB.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-18: cf. Ps 40:7-9. Hé 9:7-15, 23-28.'
  - type: text
    content: 'En effet, '
  - type: note
    content: Col 2:17. Hé 8:5.
  - type: text
    content: 'la loi, qui possède une ombre des biens à venir, et non l’exacte représentation des choses, ne peut jamais, par les mêmes sacrifices qu’on offre perpétuellement chaque année, amener les assistants à la perfection. '
  '10':
  - type: text
    content: 'C’est en vertu de cette volonté que nous sommes sanctifiés, '
  - type: note
    content: Hé 9:12.
  - type: text
    content: 'par l’offrande du corps de Jésus-Christ, une fois pour toutes. '
  '11':
  - type: text
    content: 'Et tandis que tout sacrificateur fait chaque jour le service et offre souvent les mêmes sacrifices, qui ne peuvent jamais ôter les péchés, '
  '12':
  - type: text
    content: 'lui, après avoir offert un seul sacrifice pour les péchés, '
  - type: note
    content: Ps 110:1. Ac 2:34. 1 Co 15:25. Ép 1:20. Col 3:1. Hé 1:13.
  - type: text
    content: 's’est assis pour toujours à la droite de Dieu, '
  '13':
  - type: text
    content: 'attendant désormais que ses ennemis soient devenus son marchepied. '
  '14':
  - type: text
    content: 'Car, par une seule offrande, il a amené à la perfection pour toujours ceux qui sont sanctifiés. '
  '15':
  - type: text
    content: 'C’est ce que le Saint-Esprit nous atteste aussi; car, après avoir dit:'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Jé 31:31, 32, 33, 34. Ro 11:27. Hé 8:8.
  - type: text
    content: Voici l’alliance que je ferai avec eux,
  - type: text
    content: 'après ces jours-là, dit le Seigneur:'
  - type: text
    content: Je mettrai mes lois dans leurs cœurs,
  - type: text
    content: et je les écrirai dans leur esprit,
  - type: text
    content: 'il ajoute:'
  '17':
  - type: text
    content: Et je ne me souviendrai plus de leurs péchés ni de leurs iniquités.
  '18':
  - type: text
    content: Or, là où il y a pardon des péchés, il n’y a plus d’offrande pour le péché.
  - type: heading
    content: Exhortation à la confiance et à la fermeté dans la foi
  - type: heading
    content: 'V. 19-31: cf. (Jn 14:6. Ép 2:13, 18. Hé 4:14-16.) (Hé 3:12-14; 6:4-8; 12:25-29.)'
  '19':
  - type: text
    content: 'Ainsi donc, frères, puisque nous avons, au moyen du sang de Jésus, '
  - type: note
    content: Jn 10:9; 14:6. Ro 5:2. Ép 2:13; 3:12.
  - type: text
    content: 'une libre entrée dans le sanctuaire '
  '2':
  - type: text
    content: 'Autrement, n’aurait-on pas cessé de les offrir, parce que ceux qui rendent ce culte, étant une fois purifiés, n’auraient plus eu aucune conscience de leurs péchés? '
  '20':
  - type: text
    content: 'par la route nouvelle et vivante qu’il a inaugurée pour nous au travers du voile, c’est-à-dire, de sa chair, '
  '21':
  - type: text
    content: 'et puisque nous avons un souverain sacrificateur établi sur la maison de Dieu, '
  '22':
  - type: text
    content: 'approchons-nous avec un cœur sincère, dans la plénitude de la foi, les cœurs purifiés d’une mauvaise conscience, et le corps lavé '
  - type: note
    content: Éz 36:25.
  - type: text
    content: 'd’une eau pure. '
  '23':
  - type: text
    content: 'Retenons fermement la profession de notre espérance, car celui qui a fait la promesse est fidèle. '
  '24':
  - type: text
    content: 'Veillons les uns sur les autres, pour nous exciter à la charité et aux bonnes œuvres. '
  '25':
  - type: text
    content: 'N’abandonnons pas notre assemblée, comme c’est la coutume de quelques-uns; mais exhortons-nous réciproquement, et cela d’autant plus que vous voyez s’approcher le jour. '
  '26':
  - type: note
    content: No 15:30. Mt 12:31. Hé 6:4. 2 Pi 2:20. Jn 5:16.
  - type: text
    content: 'Car, si nous péchons volontairement après avoir reçu la connaissance de la vérité, il ne reste plus de sacrifice pour les péchés, '
  '27':
  - type: text
    content: 'mais une attente terrible du jugement et l’ardeur d’un feu qui dévorera les rebelles. '
  '28':
  - type: text
    content: 'Celui qui a violé la loi de Moïse meurt sans miséricorde, sur la déposition '
  - type: note
    content: No 35:30. De 17:6; 19:15. Mt 18:16. Jn 8:17. 2 Co 13:1.
  - type: text
    content: 'de deux ou de trois témoins; '
  '29':
  - type: text
    content: 'de quel pire châtiment pensez-vous que sera jugé digne celui qui aura foulé aux pieds le Fils de Dieu, qui aura tenu pour profane le sang de l’alliance, par lequel il a été sanctifié, et qui aura outragé l’Esprit de la grâce? '
  '3':
  - type: text
    content: 'Mais le souvenir des péchés est renouvelé chaque année par ces sacrifices; '
  '30':
  - type: text
    content: 'Car nous connaissons celui qui a dit:'
  - type: note
    content: De 32:35. Ro 12:19.
  - type: text
    content: A moi la vengeance, à moi la rétribution!
  - type: text
    content: 'et encore:'
  - type: note
    content: De 32:36.
  - type: text
    content: Le Seigneur jugera son peuple.
  '31':
  - type: text
    content: C’est une chose terrible que de tomber entre les mains du Dieu vivant.
  - type: heading
    content: 'V. 32-39: cf. Hé 6:9-20. Ga 3:4. Mc 13:13.'
  '32':
  - type: text
    content: 'Souvenez-vous de ces premiers jours, où, après avoir été éclairés, vous avez soutenu un grand combat au milieu des souffrances, '
  '33':
  - type: text
    content: 'd’une part, exposés comme en spectacle aux opprobres et aux tribulations, et de l’autre, vous associant à ceux dont la position était la même. '
  '34':
  - type: text
    content: 'En effet, vous avez eu de la compassion '
  - type: note
    content: Ac 21:33.
  - type: text
    content: 'pour les prisonniers, et vous avez accepté avec joie l’enlèvement de vos biens, sachant que '
  - type: note
    content: Mt 5:12.
  - type: text
    content: 'vous avez des biens meilleurs et qui durent toujours. '
  '35':
  - type: text
    content: 'N’abandonnez donc pas votre assurance, à laquelle est attachée une grande rémunération. '
  '36':
  - type: note
    content: Lu 21:19.
  - type: text
    content: 'Car vous avez besoin de persévérance, afin qu’après avoir accompli la volonté de Dieu, vous obteniez ce qui vous est promis. '
  '37':
  - type: note
    content: Ha 2:3. Ag 2:7. 1 Pi 1:6; 5:10.
  - type: text
    content: 'Encore un peu, un peu de temps: celui qui doit venir viendra, et il ne tardera pas. '
  '38':
  - type: note
    content: Ha 2:4. Ro 1:17. Ga 3:11.
  - type: text
    content: 'Et mon juste vivra par la foi; mais, s’il se retire, mon âme ne prend pas plaisir en lui. '
  '39':
  - type: text
    content: Nous, nous ne sommes pas de ceux qui se retirent pour se perdre, mais de ceux qui ont la foi pour sauver leur âme.
  '4':
  - type: note
    content: Lé 16:14. No 19:4. Hé 9:13.
  - type: text
    content: 'car il est impossible que le sang des taureaux et des boucs ôte les péchés. '
  '5':
  - type: text
    content: 'C’est pourquoi Christ, entrant dans le monde, dit:'
  - type: note
    content: Ps 40:7. És 1:11. Jé 6:20. Am 5:21.
  - type: text
    content: Tu n’as voulu ni sacrifice ni offrande,
  - type: text
    content: mais tu m’as formé un corps;
  '6':
  - type: text
    content: tu n’as agréé ni holocaustes ni sacrifices pour le péché.
  '7':
  - type: text
    content: 'Alors j’ai dit:'
  - type: text
    content: voici, je viens
  - type: text
    content: (Dans le rouleau du livre il est question de moi)
  - type: text
    content: pour faire, ô Dieu, ta volonté.
  '8':
  - type: text
    content: 'Après avoir dit d’abord:'
  - type: text
    content: Tu n’as voulu et tu n’as agréé ni sacrifices ni offrandes,
  - type: text
    content: ni holocaustes ni sacrifices pour le péché
  - type: text
    content: '(ce qu’on offre selon la loi), '
  '9':
  - type: text
    content: 'il dit ensuite:'
  - type: text
    content: Voici, je viens
  - type: text
    content: pour faire ta volonté.
  - type: text
    content: 'Il abolit ainsi la première chose pour établir la seconde. '
