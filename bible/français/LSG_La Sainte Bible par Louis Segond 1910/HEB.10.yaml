document_id: HEB.10
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-18: cf. Ps 40:7-9. Hé 9:7-15, 23-28.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'En effet, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 2:17
      metadata:
        usfm: COL.2.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 8:5
      metadata:
        usfm: HEB.8.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la loi, qui possède une ombre des biens à venir, et non l’exacte représentation des choses, ne peut jamais, par les mêmes sacrifices qu’on offre perpétuellement chaque année, amener les assistants à la perfection. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Autrement, n’aurait-on pas cessé de les offrir, parce que ceux qui rendent ce culte, étant une fois purifiés, n’auraient plus eu aucune conscience de leurs péchés? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais le souvenir des péchés est renouvelé chaque année par ces sacrifices; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 16:14
      metadata:
        usfm: LEV.16.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 19:4
      metadata:
        usfm: NUM.19.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:13
      metadata:
        usfm: HEB.9.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car il est impossible que le sang des taureaux et des boucs ôte les péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'C’est pourquoi Christ, entrant dans le monde, dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 40:7
      metadata:
        usfm: PSA.40.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:11
      metadata:
        usfm: ISA.1.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 6:20
      metadata:
        usfm: JER.6.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 5:21
      metadata:
        usfm: AMO.5.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tu n’as voulu ni sacrifice ni offrande,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais tu m’as formé un corps;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: tu n’as agréé ni holocaustes ni sacrifices pour le péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors j’ai dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: voici, je viens
- type: usfm
  marker: q1
  children:
  - type: text
    text: (Dans le rouleau du livre il est question de moi)
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour faire, ô Dieu, ta volonté.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Après avoir dit d’abord:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu n’as voulu et tu n’as agréé ni sacrifices ni offrandes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni holocaustes ni sacrifices pour le péché
- type: usfm
  marker: m
  children:
  - type: text
    text: '(ce qu’on offre selon la loi), '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'il dit ensuite:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, je viens
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour faire ta volonté.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Il abolit ainsi la première chose pour établir la seconde. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C’est en vertu de cette volonté que nous sommes sanctifiés, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:12
      metadata:
        usfm: HEB.9.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'par l’offrande du corps de Jésus-Christ, une fois pour toutes. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et tandis que tout sacrificateur fait chaque jour le service et offre souvent les mêmes sacrifices, qui ne peuvent jamais ôter les péchés, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'lui, après avoir offert un seul sacrifice pour les péchés, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 110:1
      metadata:
        usfm: PSA.110.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 2:34
      metadata:
        usfm: ACT.2.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:25
      metadata:
        usfm: 1CO.15.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:20
      metadata:
        usfm: EPH.1.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:1
      metadata:
        usfm: COL.3.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 1:13
      metadata:
        usfm: HEB.1.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 's’est assis pour toujours à la droite de Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'attendant désormais que ses ennemis soient devenus son marchepied. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Car, par une seule offrande, il a amené à la perfection pour toujours ceux qui sont sanctifiés. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'C’est ce que le Saint-Esprit nous atteste aussi; car, après avoir dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 31:31
      metadata:
        usfm: JER.31.31
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '32'
      metadata:
        usfm: JER.31.32
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '33'
      metadata:
        usfm: JER.31.33
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '34'
      metadata:
        usfm: JER.31.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:27
      metadata:
        usfm: ROM.11.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 8:8
      metadata:
        usfm: HEB.8.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Voici l’alliance que je ferai avec eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'après ces jours-là, dit le Seigneur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je mettrai mes lois dans leurs cœurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je les écrirai dans leur esprit,
- type: usfm
  marker: m
  children:
  - type: text
    text: 'il ajoute:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Et je ne me souviendrai plus de leurs péchés ni de leurs iniquités.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Or, là où il y a pardon des péchés, il n’y a plus d’offrande pour le péché.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Exhortation à la confiance et à la fermeté dans la foi
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 19-31: cf. (Jn 14:6. Ép 2:13, 18. Hé 4:14-16.) (Hé 3:12-14; 6:4-8; 12:25-29.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ainsi donc, frères, puisque nous avons, au moyen du sang de Jésus, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 10:9
      metadata:
        usfm: JHN.10.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:6
      metadata:
        usfm: JHN.14.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 5:2
      metadata:
        usfm: ROM.5.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 2:13
      metadata:
        usfm: EPH.2.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:12
      metadata:
        usfm: EPH.3.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une libre entrée dans le sanctuaire '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'par la route nouvelle et vivante qu’il a inaugurée pour nous au travers du voile, c’est-à-dire, de sa chair, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et puisque nous avons un souverain sacrificateur établi sur la maison de Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'approchons-nous avec un cœur sincère, dans la plénitude de la foi, les cœurs purifiés d’une mauvaise conscience, et le corps lavé '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 36:25
      metadata:
        usfm: EZK.36.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'd’une eau pure. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Retenons fermement la profession de notre espérance, car celui qui a fait la promesse est fidèle. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Veillons les uns sur les autres, pour nous exciter à la charité et aux bonnes œuvres. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'N’abandonnons pas notre assemblée, comme c’est la coutume de quelques-uns; mais exhortons-nous réciproquement, et cela d’autant plus que vous voyez s’approcher le jour. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 15:30
      metadata:
        usfm: NUM.15.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:31
      metadata:
        usfm: MAT.12.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 6:4
      metadata:
        usfm: HEB.6.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:20
      metadata:
        usfm: 2PE.2.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 5:16
      metadata:
        usfm: JHN.5.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car, si nous péchons volontairement après avoir reçu la connaissance de la vérité, il ne reste plus de sacrifice pour les péchés, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'mais une attente terrible du jugement et l’ardeur d’un feu qui dévorera les rebelles. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Celui qui a violé la loi de Moïse meurt sans miséricorde, sur la déposition '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 35:30
      metadata:
        usfm: NUM.35.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 17:6
      metadata:
        usfm: DEU.17.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:15
      metadata:
        usfm: DEU.19.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 18:16
      metadata:
        usfm: MAT.18.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 8:17
      metadata:
        usfm: JHN.8.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 13:1
      metadata:
        usfm: 2CO.13.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de deux ou de trois témoins; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'de quel pire châtiment pensez-vous que sera jugé digne celui qui aura foulé aux pieds le Fils de Dieu, qui aura tenu pour profane le sang de l’alliance, par lequel il a été sanctifié, et qui aura outragé l’Esprit de la grâce? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Car nous connaissons celui qui a dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:35
      metadata:
        usfm: DEU.32.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:19
      metadata:
        usfm: ROM.12.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: A moi la vengeance, à moi la rétribution!
- type: usfm
  marker: m
  children:
  - type: text
    text: 'et encore:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:36
      metadata:
        usfm: DEU.32.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le Seigneur jugera son peuple.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: C’est une chose terrible que de tomber entre les mains du Dieu vivant.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 32-39: cf. Hé 6:9-20. Ga 3:4. Mc 13:13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Souvenez-vous de ces premiers jours, où, après avoir été éclairés, vous avez soutenu un grand combat au milieu des souffrances, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'd’une part, exposés comme en spectacle aux opprobres et aux tribulations, et de l’autre, vous associant à ceux dont la position était la même. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'En effet, vous avez eu de la compassion '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 21:33
      metadata:
