document_id: MRK.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Entrée de Jésus à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. (Mt 21:1-11, 14-17. Lu 19:29-44. Jn 12:12-19.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:1
      metadata:
        usfm: MAT.21.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 19:29
      metadata:
        usfm: LUK.19.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu’ils approchèrent de Jérusalem, et qu’ils furent près de Bethphagé et de Béthanie, vers la montagne des oliviers, Jésus envoya deux de ses disciples, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'en leur disant: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Allez au village qui est devant vous; dès que vous y serez entrés, vous trouverez un ânon attaché, sur lequel aucun homme ne s’est encore assis; détachez-le, et amenez-le.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Si quelqu’un vous dit: Pourquoi faites-vous cela? Répondez: Le Seigneur en a besoin. Et à l’instant il le laissera venir ici.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'les disciples, étant allés, trouvèrent l’ânon attaché dehors près d’une porte, au contour du chemin, et ils le détachèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quelques-uns de ceux qui étaient là leur dirent: Que faites-vous? Pourquoi détachez-vous cet ânon? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils répondirent comme Jésus l’avait dit. Et on les laissa aller. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils amenèrent à Jésus '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:14
      metadata:
        usfm: JHN.12.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’ânon, sur lequel ils jetèrent '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 9:13
      metadata:
        usfm: 2KI.9.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'leurs vêtements, et Jésus s’assit dessus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Beaucoup de gens étendirent leurs vêtements sur le chemin, et d’autres des branches qu’ils coupèrent dans les champs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ceux qui précédaient et ceux qui suivaient Jésus criaient: Hosanna! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 118:26
      metadata:
        usfm: PSA.118.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Béni soit celui qui vient au nom du Seigneur! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Béni soit le règne qui vient, le règne de David, notre père! Hosanna dans les lieux très hauts! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:12
      metadata:
        usfm: MAT.21.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: MAT.21.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 19:45
      metadata:
        usfm: LUK.19.45
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 2:14
      metadata:
        usfm: JHN.2.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Jésus entra à Jérusalem, dans le temple. Quand il eut tout considéré, comme il était déjà tard, il s’en alla à Béthanie avec les douze.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le figuier maudit. Les vendeurs chassés du temple. Irritation des sacrificateurs
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-19: cf. (Mt 21:18, 19, 12, 13. Lu 19:45-48.) Jn 2:13-17. Lu 13:6-9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:18
      metadata:
        usfm: MAT.21.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le lendemain, après qu’ils furent sortis de Béthanie, Jésus eut faim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Apercevant de loin un figuier qui avait des feuilles, il alla voir s’il y trouverait quelque chose; et, s’en étant approché, il ne trouva que des feuilles, car ce n’était pas la saison des figues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Prenant alors la parole, il lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que jamais personne ne mange de ton fruit!
  - type: text
    text: ' Et ses disciples l’entendirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils arrivèrent à Jérusalem, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:12
      metadata:
        usfm: MAT.21.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 19:45
      metadata:
        usfm: LUK.19.45
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 2:14
      metadata:
        usfm: JHN.2.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et Jésus entra dans le temple. Il se mit à chasser ceux qui vendaient et qui achetaient dans le temple; il renversa les tables des changeurs, et les sièges des vendeurs de pigeons; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et il ne laissait personne transporter aucun objet à travers le temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:13
      metadata:
        usfm: MAT.21.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 19:46
      metadata:
        usfm: LUK.19.46
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et il enseignait et disait: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'N’est-il pas écrit:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 8:29
      metadata:
        usfm: 1KI.8.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 56:7
      metadata:
        usfm: ISA.56.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ma maison sera appelée une maison de prière pour toutes les nations?
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:11
      metadata:
        usfm: JER.7.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais vous, vous en avez fait une caverne de voleurs.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les principaux sacrificateurs et les scribes, l’ayant entendu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:19
      metadata:
        usfm: JHN.7.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'cherchèrent les moyens de le faire périr; car ils le craignaient, parce que toute la foule était frappée de sa doctrine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Quand le soir fut venu, Jésus sortit de la ville.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La puissance de la foi
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-26: cf. Mt 21:20-22. (Ja 5:16-18. Mt 18:19-22.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le matin, en passant, les disciples virent le figuier séché jusqu’aux racines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Pierre, se rappelant ce qui s’était passé, dit à Jésus: Rabbi, regarde, le figuier que tu as maudit a séché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jésus prit la parole, et leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ayez foi en Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 17:20
      metadata:
        usfm: MAT.17.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:21
      metadata:
        usfm: MAT.21.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 17:6
      metadata:
        usfm: LUK.17.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je vous le dis en vérité, si quelqu’un dit à cette montagne: Ote-toi de là et jette-toi dans la mer, et s’il ne doute point en son cœur, mais croit que ce qu’il dit arrive, il le verra s’accomplir.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'C’est pourquoi je vous dis:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 29:12
      metadata:
        usfm: JER.29.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 7:7
      metadata:
        usfm: MAT.7.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 11:9
      metadata:
        usfm: LUK.11.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 14:13
      metadata:
        usfm: JHN.14.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:7
      metadata:
        usfm: JHN.15.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:24
      metadata:
        usfm: JHN.16.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:5
      metadata:
        usfm: JAS.1.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: JAS.1.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:22
      metadata:
        usfm: 1JN.3.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:14
      metadata:
        usfm: 1JN.5.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tout ce que vous demanderez en priant, croyez que vous l’avez reçu, et vous le verrez s’accomplir.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et, lorsque vous êtes debout faisant votre prière, si vous avez quelque chose contre quelqu’un,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 6:14
      metadata:
        usfm: MAT.6.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:13
      metadata:
        usfm: COL.3.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: pardonnez, afin que votre Père qui est dans les cieux vous pardonne aussi vos offenses.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 18:35
      metadata:
        usfm: MAT.18.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais si vous ne pardonnez pas, votre Père qui est dans les cieux ne vous pardonnera pas non plus vos offenses.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’autorité de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 27-33: cf. (Mt 21:23-27. Lu 20:1-8.) Jn 2:18-21.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:23
      metadata:
        usfm: MAT.21.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 20:1
      metadata:
        usfm: LUK.20.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils se rendirent de nouveau à Jérusalem, et, pendant que Jésus se promenait dans le temple, les principaux sacrificateurs, les scribes et les anciens, vinrent à lui, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'et lui dirent: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 2:14
      metadata:
        usfm: EXO.2.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:7
      metadata:
        usfm: ACT.4.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:27
      metadata:
        usfm: ACT.7.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Par quelle autorité fais-tu ces choses, et qui t’a donné l’autorité de les faire? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jésus leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous adresserai aussi une question; répondez-moi, et je vous dirai par quelle autorité je fais ces choses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le baptême de Jean venait-il du ciel, ou des hommes? Répondez-moi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mais ils raisonnèrent ainsi entre eux: Si nous répondons: Du ciel, il dira: Pourquoi donc n’avez-vous pas cru en lui? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Et si nous répondons: Des hommes… Ils craignaient le peuple, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 14:5
      metadata:
        usfm: MAT.14.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:20
      metadata:
        usfm: MRK.6.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car tous tenaient réellement Jean pour un prophète. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Alors ils répondirent à Jésus: Nous ne savons. Et Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Moi non plus, je ne vous dirai pas par quelle autorité je fais ces choses.
