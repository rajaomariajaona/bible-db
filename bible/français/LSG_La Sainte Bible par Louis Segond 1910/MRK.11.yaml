document_id: MRK.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Entrée de Jésus à Jérusalem
  - type: heading
    content: 'V. 1-11: cf. (Mt 21:1-11, 14-17. Lu 19:29-44. Jn 12:12-19.)'
  - type: text
    content: ' '
  - type: note
    content: Mt 21:1. Lu 19:29.
  - type: text
    content: 'Lorsqu’ils approchèrent de Jérusalem, et qu’ils furent près de Bethphagé et de Béthanie, vers la montagne des oliviers, Jésus envoya deux de ses disciples, '
  '10':
  - type: text
    content: 'Béni soit le règne qui vient, le règne de David, notre père! Hosanna dans les lieux très hauts! '
  '11':
  - type: note
    content: Mt 21:12, 14. Lu 19:45. Jn 2:14.
  - type: text
    content: Jésus entra à Jérusalem, dans le temple. Quand il eut tout considéré, comme il était déjà tard, il s’en alla à Béthanie avec les douze.
  - type: heading
    content: Le figuier maudit. Les vendeurs chassés du temple. Irritation des sacrificateurs
  - type: heading
    content: 'V. 12-19: cf. (Mt 21:18, 19, 12, 13. Lu 19:45-48.) Jn 2:13-17. Lu 13:6-9.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: Mt 21:18.
  - type: text
    content: 'Le lendemain, après qu’ils furent sortis de Béthanie, Jésus eut faim. '
  '13':
  - type: text
    content: 'Apercevant de loin un figuier qui avait des feuilles, il alla voir s’il y trouverait quelque chose; et, s’en étant approché, il ne trouva que des feuilles, car ce n’était pas la saison des figues. '
  '14':
  - type: text
    content: 'Prenant alors la parole, il lui dit: '
  - type: text
    content: Que jamais personne ne mange de ton fruit!
  - type: text
    content: ' Et ses disciples l’entendirent. '
  '15':
  - type: text
    content: 'Ils arrivèrent à Jérusalem, '
  - type: note
    content: Mt 21:12. Lu 19:45. Jn 2:14.
  - type: text
    content: 'et Jésus entra dans le temple. Il se mit à chasser ceux qui vendaient et qui achetaient dans le temple; il renversa les tables des changeurs, et les sièges des vendeurs de pigeons; '
  '16':
  - type: text
    content: 'et il ne laissait personne transporter aucun objet à travers le temple. '
  '17':
  - type: note
    content: Mt 21:13. Lu 19:46.
  - type: text
    content: 'Et il enseignait et disait: '
  - type: text
    content: 'N’est-il pas écrit:'
  - type: text
    content: ' '
  - type: note
    content: 1 R 8:29. És 56:7.
  - type: text
    content: Ma maison sera appelée une maison de prière pour toutes les nations?
  - type: text
    content: ' '
  - type: note
    content: Jé 7:11.
  - type: text
    content: Mais vous, vous en avez fait une caverne de voleurs.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Les principaux sacrificateurs et les scribes, l’ayant entendu, '
  - type: note
    content: Jn 7:19.
  - type: text
    content: 'cherchèrent les moyens de le faire périr; car ils le craignaient, parce que toute la foule était frappée de sa doctrine. '
  '19':
  - type: text
    content: Quand le soir fut venu, Jésus sortit de la ville.
  - type: heading
    content: La puissance de la foi
  - type: heading
    content: 'V. 20-26: cf. Mt 21:20-22. (Ja 5:16-18. Mt 18:19-22.)'
  '2':
  - type: text
    content: 'en leur disant: '
  - type: text
    content: Allez au village qui est devant vous; dès que vous y serez entrés, vous trouverez un ânon attaché, sur lequel aucun homme ne s’est encore assis; détachez-le, et amenez-le.
  '20':
  - type: text
    content: 'Le matin, en passant, les disciples virent le figuier séché jusqu’aux racines. '
  '21':
  - type: text
    content: 'Pierre, se rappelant ce qui s’était passé, dit à Jésus: Rabbi, regarde, le figuier que tu as maudit a séché. '
  '22':
  - type: text
    content: 'Jésus prit la parole, et leur dit: '
  - type: text
    content: Ayez foi en Dieu.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Mt 17:20; 21:21. Lu 17:6.
  - type: text
    content: 'Je vous le dis en vérité, si quelqu’un dit à cette montagne: Ote-toi de là et jette-toi dans la mer, et s’il ne doute point en son cœur, mais croit que ce qu’il dit arrive, il le verra s’accomplir.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'C’est pourquoi je vous dis:'
  - type: text
    content: ' '
  - type: note
    content: Jé 29:12. Mt 7:7. Lu 11:9. Jn 14:13; 15:7; 16:24. Ja 1:5, 6. 1 Jn 3:22; 5:14.
  - type: text
    content: Tout ce que vous demanderez en priant, croyez que vous l’avez reçu, et vous le verrez s’accomplir.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Et, lorsque vous êtes debout faisant votre prière, si vous avez quelque chose contre quelqu’un,
  - type: text
    content: ' '
  - type: note
    content: Mt 6:14. Col 3:13.
  - type: text
    content: pardonnez, afin que votre Père qui est dans les cieux vous pardonne aussi vos offenses.
  - type: text
    content: ' '
  '26':
  - type: note
    content: Mt 18:35.
  - type: text
    content: Mais si vous ne pardonnez pas, votre Père qui est dans les cieux ne vous pardonnera pas non plus vos offenses.
  - type: heading
    content: L’autorité de Jésus
  - type: heading
    content: 'V. 27-33: cf. (Mt 21:23-27. Lu 20:1-8.) Jn 2:18-21.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: Mt 21:23. Lu 20:1.
  - type: text
    content: 'Ils se rendirent de nouveau à Jérusalem, et, pendant que Jésus se promenait dans le temple, les principaux sacrificateurs, les scribes et les anciens, vinrent à lui, '
  '28':
  - type: text
    content: 'et lui dirent: '
  - type: note
    content: Ex 2:14. Ac 4:7; 7:27.
  - type: text
    content: 'Par quelle autorité fais-tu ces choses, et qui t’a donné l’autorité de les faire? '
  '29':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: Je vous adresserai aussi une question; répondez-moi, et je vous dirai par quelle autorité je fais ces choses.
  '3':
  - type: text
    content: ' '
  - type: text
    content: 'Si quelqu’un vous dit: Pourquoi faites-vous cela? Répondez: Le Seigneur en a besoin. Et à l’instant il le laissera venir ici.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: ' '
  - type: text
    content: Le baptême de Jean venait-il du ciel, ou des hommes? Répondez-moi.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Mais ils raisonnèrent ainsi entre eux: Si nous répondons: Du ciel, il dira: Pourquoi donc n’avez-vous pas cru en lui? '
  '32':
  - type: text
    content: 'Et si nous répondons: Des hommes… Ils craignaient le peuple, '
  - type: note
    content: Mt 14:5. Mc 6:20.
  - type: text
    content: 'car tous tenaient réellement Jean pour un prophète. '
  '33':
  - type: text
    content: 'Alors ils répondirent à Jésus: Nous ne savons. Et Jésus leur dit: '
  - type: text
    content: Moi non plus, je ne vous dirai pas par quelle autorité je fais ces choses.
  '4':
  - type: text
    content: 'les disciples, étant allés, trouvèrent l’ânon attaché dehors près d’une porte, au contour du chemin, et ils le détachèrent. '
  '5':
  - type: text
    content: 'Quelques-uns de ceux qui étaient là leur dirent: Que faites-vous? Pourquoi détachez-vous cet ânon? '
  '6':
  - type: text
    content: 'Ils répondirent comme Jésus l’avait dit. Et on les laissa aller. '
  '7':
  - type: text
    content: 'Ils amenèrent à Jésus '
  - type: note
    content: Jn 12:14.
  - type: text
    content: 'l’ânon, sur lequel ils jetèrent '
  - type: note
    content: 2 R 9:13.
  - type: text
    content: 'leurs vêtements, et Jésus s’assit dessus. '
  '8':
  - type: text
    content: 'Beaucoup de gens étendirent leurs vêtements sur le chemin, et d’autres des branches qu’ils coupèrent dans les champs. '
  '9':
  - type: text
    content: 'Ceux qui précédaient et ceux qui suivaient Jésus criaient: Hosanna! '
  - type: note
    content: Ps 118:26.
  - type: text
    content: 'Béni soit celui qui vient au nom du Seigneur! '
