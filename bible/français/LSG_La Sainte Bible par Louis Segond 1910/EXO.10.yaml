document_id: EXO.10,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-20: cf. (Ps 78:46; 105:34, 35.) (Joë 1:2-12; 2:1-11.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Éternel dit à Moïse: Va vers Pharaon, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 4:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car j’ai endurci son cœur et le cœur de ses serviteurs, pour faire éclater mes signes au milieu d’eux. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Pharaon leur dit: Que l’Éternel soit avec vous, tout comme je vais vous laisser aller, vous et vos enfants! Prenez garde, car le malheur est devant vous! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Non, non: allez, vous les hommes, et servez l’Éternel, car c’est là ce que vous avez demandé. Et on les chassa de la présence de Pharaon. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'L’Éternel dit à Moïse: Étends ta main sur le pays d’Égypte, et que les sauterelles montent sur le pays d’Égypte; qu’elles dévorent toute l’herbe de la terre, tout ce que la grêle a laissé. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Moïse étendit sa verge sur le pays d’Égypte; et l’Éternel fit souffler un vent d’orient sur le pays toute cette journée et toute la nuit. Quand ce fut le matin, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 78:46
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 105:34
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '35'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le vent d’orient avait apporté les sauterelles. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Les sauterelles montèrent sur le pays d’Égypte, et se posèrent dans toute l’étendue de l’Égypte; elles étaient en si grande quantité qu’il n’y avait jamais eu et qu’il n’y aura jamais rien de semblable. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Elles couvrirent la surface de toute la terre, et la terre fut dans l’obscurité; elles dévorèrent toute l’herbe de la terre et tout le fruit des arbres, tout ce que la grêle avait laissé; et il ne resta aucune verdure aux arbres ni à l’herbe des champs, dans tout le pays d’Égypte. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Aussitôt Pharaon appela Moïse et Aaron, et dit: J’ai péché contre l’Éternel, votre Dieu, et contre vous. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Mais pardonne mon péché pour cette fois seulement; et priez l’Éternel, votre Dieu, afin qu’il éloigne de moi encore cette plaie mortelle. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Moïse sortit de chez Pharaon, et il pria l’Éternel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'L’Éternel fit souffler un vent d’occident très fort, qui emporta les sauterelles, et les précipita dans la mer Rouge; il ne resta pas une seule sauterelle dans toute l’étendue de l’Égypte. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'C’est aussi pour que tu racontes à ton fils et au fils de ton fils comment j’ai traité les Égyptiens, et quels signes j’ai fait éclater au milieu d’eux. Et vous saurez que je suis l’Éternel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: L’Éternel endurcit le cœur de Pharaon, et Pharaon ne laissa point aller les enfants d’Israël.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 21-29: cf. (Ps 105:28; 78:49.) Ap 16:10, 11. Job 18:18.'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'L’Éternel dit à Moïse: Étends ta main vers le ciel, et qu’il y ait des ténèbres sur le pays d’Égypte, et que l’on puisse les toucher. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Moïse étendit sa main vers le ciel; et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 105:27
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '28'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il y eut d’épaisses ténèbres dans tout le pays d’Égypte, pendant trois jours. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'On ne se voyait pas les uns les autres, et personne ne se leva de sa place pendant trois jours. Mais il y avait de la lumière dans les lieux où habitaient tous les enfants d’Israël. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Pharaon appela Moïse, et dit: Allez, servez l’Éternel. Il n’y aura que vos brebis et vos bœufs qui resteront, et vos enfants pourront aller avec vous. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Moïse répondit: Tu mettras toi-même entre nos mains de quoi faire les sacrifices et les holocaustes que nous offrirons à l’Éternel, notre Dieu. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Nos troupeaux iront avec nous, et il ne restera pas un ongle; car c’est là ce que nous prendrons pour servir l’Éternel, notre Dieu; et jusqu’à ce que nous soyons arrivés, nous ne savons pas ce que nous choisirons pour offrir à l’Éternel. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'L’Éternel endurcit le cœur de Pharaon, et Pharaon ne voulut point les laisser aller. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Pharaon dit à Moïse: Sors de chez moi! Garde-toi de paraître encore en ma présence, car le jour où tu paraîtras en ma présence, tu mourras. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Tu l’as dit! Répliqua Moïse, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 11:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: je ne paraîtrai plus en ta présence.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Moïse et Aaron allèrent vers Pharaon, et lui dirent: Ainsi parle l’Éternel, le Dieu des Hébreux: Jusqu’à quand refuseras-tu de t’humilier devant moi? Laisse aller mon peuple, afin qu’il me serve. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Si tu refuses de laisser aller mon peuple, voici, je ferai venir demain des sauterelles dans toute l’étendue de ton pays. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Elles couvriront la surface de la terre, et l’on ne pourra plus voir la terre; elles dévoreront le reste de ce qui est échappé, ce que vous a laissé la grêle, elles dévoreront tous les arbres qui croissent dans vos champs; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'elles rempliront tes maisons, les maisons de tous tes serviteurs et les maisons de tous les Égyptiens. Tes pères et les pères de tes pères n’auront rien vu de pareil depuis qu’ils existent sur la terre jusqu’à ce jour. Moïse se retira, et sortit de chez Pharaon. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les serviteurs de Pharaon lui dirent: Jusqu’à quand cet homme sera-t-il pour nous un piège? Laisse aller ces gens, et qu’ils servent l’Éternel, leur Dieu. Ne vois-tu pas encore que l’Égypte périt? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'On fit revenir vers Pharaon Moïse et Aaron: Allez, leur dit-il, servez l’Éternel, votre Dieu. Qui sont ceux qui iront? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Moïse répondit: Nous irons avec nos enfants et nos vieillards, avec nos fils et nos filles, avec nos brebis et nos bœufs; car c’est pour nous une fête en l’honneur de l’Éternel. '
