document_id: ISA.4
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Et sept femmes saisiront en ce jour un seul homme, et diront:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous mangerons notre pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nous nous vêtirons de nos habits;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais-nous seulement porter ton nom!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enlève notre opprobre!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Délivrance future de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 2-6: cf. Jé 23:5, 6. (So 3:12-15. És 33:20-24.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: En ce temps-là, le germe de l’Éternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aura de la magnificence et de la gloire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le fruit du pays aura de l’éclat et de la beauté
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour les réchappés d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Et les restes de Sion, les restes de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seront appelés saints,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quiconque à Jérusalem sera inscrit parmi les vivants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Après que le Seigneur aura lavé les ordures des filles de Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et purifié Jérusalem du sang qui est au milieu d’elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par le souffle de la justice et par le souffle de la destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L’Éternel établira, sur toute l’étendue de la montagne de Sion
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sur ses lieux d’assemblées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une nuée fumante pendant le jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et un feu de flammes éclatantes pendant la nuit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tout ce qui est glorieux sera mis à couvert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il y aura un abri pour donner de l’ombre contre la chaleur du jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour servir de refuge et d’asile contre l’orage et la pluie.
