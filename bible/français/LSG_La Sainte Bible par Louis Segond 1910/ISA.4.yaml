document_id: ISA.4,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'Et sept femmes saisiront en ce jour un seul homme, et diront:'
  - type: text
    content: Nous mangerons notre pain,
  - type: text
    content: Et nous nous vêtirons de nos habits;
  - type: text
    content: Fais-nous seulement porter ton nom!
  - type: text
    content: Enlève notre opprobre!
  - type: heading
    content: Délivrance future de Jérusalem
  - type: heading
    content: 'V. 2-6: cf. Jé 23:5, 6. (So 3:12-15. És 33:20-24.)'
  '2':
  - type: text
    content: En ce temps-là, le germe de l’Éternel
  - type: text
    content: Aura de la magnificence et de la gloire,
  - type: text
    content: Et le fruit du pays aura de l’éclat et de la beauté
  - type: text
    content: Pour les réchappés d’Israël.
  '3':
  - type: text
    content: Et les restes de Sion, les restes de Jérusalem,
  - type: text
    content: Seront appelés saints,
  - type: text
    content: Quiconque à Jérusalem sera inscrit parmi les vivants,
  '4':
  - type: text
    content: Après que le Seigneur aura lavé les ordures des filles de Sion,
  - type: text
    content: Et purifié Jérusalem du sang qui est au milieu d’elle,
  - type: text
    content: Par le souffle de la justice et par le souffle de la destruction.
  '5':
  - type: text
    content: L’Éternel établira, sur toute l’étendue de la montagne de Sion
  - type: text
    content: Et sur ses lieux d’assemblées,
  - type: text
    content: Une nuée fumante pendant le jour,
  - type: text
    content: Et un feu de flammes éclatantes pendant la nuit;
  - type: text
    content: Car tout ce qui est glorieux sera mis à couvert.
  '6':
  - type: text
    content: Il y aura un abri pour donner de l’ombre contre la chaleur du jour,
  - type: text
    content: Pour servir de refuge et d’asile contre l’orage et la pluie.
