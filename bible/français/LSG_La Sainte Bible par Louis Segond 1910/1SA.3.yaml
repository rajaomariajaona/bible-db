document_id: 1SA.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-21: cf. Jé 1:4-9. (1 S 2:27-36; 4:1, etc.) Mt 11:25.'
  - type: text
    content: 'Le jeune Samuel était au service de l’Éternel devant Éli. La parole de l’Éternel était rare en ce temps-là, les visions n’étaient pas fréquentes. '
  '10':
  - type: text
    content: 'L’Éternel vint et se présenta, et il appela comme les autres fois: Samuel, Samuel! Et Samuel répondit: Parle, car ton serviteur écoute. '
  '11':
  - type: text
    content: 'Alors l’Éternel dit à Samuel: Voici, je vais faire en Israël une chose qui '
  - type: note
    content: 2 R 21:12. Jé 19:3.
  - type: text
    content: 'étourdira les oreilles de quiconque l’entendra. '
  '12':
  - type: text
    content: 'En ce jour j’accomplirai sur Éli tout ce que '
  - type: note
    content: 1 S 2:31.
  - type: text
    content: 'j’ai prononcé contre sa maison; je commencerai et j’achèverai. '
  '13':
  - type: text
    content: 'Je lui ai déclaré que je veux punir sa maison à perpétuité, à cause du crime dont il a connaissance, et par lequel ses fils se sont rendus méprisables, sans qu’il les ait réprimés. '
  '14':
  - type: text
    content: 'C’est pourquoi je jure à la maison d’Éli que jamais le crime de la maison d’Éli ne sera expié, ni par des sacrifices ni par des offrandes. '
  '15':
  - type: text
    content: 'Samuel resta couché jusqu’au matin, puis il ouvrit les portes de la maison de l’Éternel. Samuel craignait de raconter la vision à Éli. '
  '16':
  - type: text
    content: 'Mais Éli appela Samuel, et dit: Samuel, mon fils! Il répondit: Me voici! '
  '17':
  - type: text
    content: 'Et Éli dit: Quelle est la parole que t’a adressée l’Éternel? Ne me cache rien. Que Dieu te traite dans toute sa rigueur, si tu me caches quelque chose de tout ce qu’il t’a dit! '
  '18':
  - type: text
    content: 'Samuel lui raconta tout, sans lui rien cacher. Et Éli dit: C’est l’Éternel, qu’il fasse ce qui lui semblera bon! '
  '19':
  - type: text
    content: 'Samuel grandissait. L’Éternel était avec lui, et il ne laissa tomber à terre aucune de ses paroles. '
  '2':
  - type: text
    content: 'En ce même temps, Éli, '
  - type: note
    content: 1 S 4:15.
  - type: text
    content: 'qui commençait à avoir les yeux troubles et ne pouvait plus voir, était couché à sa place, '
  '20':
  - type: text
    content: 'Tout Israël, depuis Dan jusqu’à Beer-Schéba, reconnut que Samuel était établi prophète de l’Éternel. '
  '21':
  - type: text
    content: L’Éternel continuait à apparaître dans Silo; car l’Éternel se révélait à Samuel, dans Silo, par la parole de l’Éternel.
  '3':
  - type: text
    content: 'la lampe de Dieu n’était pas encore éteinte, et Samuel était couché dans le temple de l’Éternel, où était l’arche de Dieu. '
  '4':
  - type: text
    content: 'Alors l’Éternel appela Samuel. Il répondit: Me voici! '
  '5':
  - type: text
    content: 'Et il courut vers Éli, et dit: Me voici, car tu m’as appelé. Éli répondit: Je n’ai point appelé; retourne te coucher. Et il alla se coucher. '
  '6':
  - type: text
    content: 'L’Éternel appela de nouveau Samuel. Et Samuel se leva, alla vers Éli, et dit: Me voici, car tu m’as appelé. Éli répondit: Je n’ai point appelé, mon fils, retourne te coucher. '
  '7':
  - type: text
    content: 'Samuel ne connaissait pas encore l’Éternel, et la parole de l’Éternel ne lui avait pas encore été révélée. '
  '8':
  - type: text
    content: 'L’Éternel appela de nouveau Samuel, pour la troisième fois. Et Samuel se leva, alla vers Éli, et dit: Me voici, car tu m’as appelé. Éli comprit que c’était l’Éternel qui appelait l’enfant, '
  '9':
  - type: text
    content: 'et il dit à Samuel: Va, couche-toi; et si l’on t’appelle, tu diras: Parle, Éternel, car ton serviteur écoute. Et Samuel alla se coucher à sa place. '
