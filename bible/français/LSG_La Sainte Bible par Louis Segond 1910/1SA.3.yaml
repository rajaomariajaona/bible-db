document_id: 1SA.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-21: cf. Jé 1:4-9. (1 S 2:27-36; 4:1, etc.) Mt 11:25.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jeune Samuel était au service de l’Éternel devant Éli. La parole de l’Éternel était rare en ce temps-là, les visions n’étaient pas fréquentes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel vint et se présenta, et il appela comme les autres fois: Samuel, Samuel! Et Samuel répondit: Parle, car ton serviteur écoute. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’Éternel dit à Samuel: Voici, je vais faire en Israël une chose qui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 21:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 19:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'étourdira les oreilles de quiconque l’entendra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce jour j’accomplirai sur Éli tout ce que '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 2:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'j’ai prononcé contre sa maison; je commencerai et j’achèverai. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je lui ai déclaré que je veux punir sa maison à perpétuité, à cause du crime dont il a connaissance, et par lequel ses fils se sont rendus méprisables, sans qu’il les ait réprimés. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi je jure à la maison d’Éli que jamais le crime de la maison d’Éli ne sera expié, ni par des sacrifices ni par des offrandes. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel resta couché jusqu’au matin, puis il ouvrit les portes de la maison de l’Éternel. Samuel craignait de raconter la vision à Éli. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Éli appela Samuel, et dit: Samuel, mon fils! Il répondit: Me voici! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Éli dit: Quelle est la parole que t’a adressée l’Éternel? Ne me cache rien. Que Dieu te traite dans toute sa rigueur, si tu me caches quelque chose de tout ce qu’il t’a dit! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel lui raconta tout, sans lui rien cacher. Et Éli dit: C’est l’Éternel, qu’il fasse ce qui lui semblera bon! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel grandissait. L’Éternel était avec lui, et il ne laissa tomber à terre aucune de ses paroles. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce même temps, Éli, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 4:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui commençait à avoir les yeux troubles et ne pouvait plus voir, était couché à sa place, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout Israël, depuis Dan jusqu’à Beer-Schéba, reconnut que Samuel était établi prophète de l’Éternel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Éternel continuait à apparaître dans Silo; car l’Éternel se révélait à Samuel, dans Silo, par la parole de l’Éternel.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'la lampe de Dieu n’était pas encore éteinte, et Samuel était couché dans le temple de l’Éternel, où était l’arche de Dieu. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’Éternel appela Samuel. Il répondit: Me voici! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il courut vers Éli, et dit: Me voici, car tu m’as appelé. Éli répondit: Je n’ai point appelé; retourne te coucher. Et il alla se coucher. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel appela de nouveau Samuel. Et Samuel se leva, alla vers Éli, et dit: Me voici, car tu m’as appelé. Éli répondit: Je n’ai point appelé, mon fils, retourne te coucher. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel ne connaissait pas encore l’Éternel, et la parole de l’Éternel ne lui avait pas encore été révélée. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel appela de nouveau Samuel, pour la troisième fois. Et Samuel se leva, alla vers Éli, et dit: Me voici, car tu m’as appelé. Éli comprit que c’était l’Éternel qui appelait l’enfant, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et il dit à Samuel: Va, couche-toi; et si l’on t’appelle, tu diras: Parle, Éternel, car ton serviteur écoute. Et Samuel alla se coucher à sa place. '
