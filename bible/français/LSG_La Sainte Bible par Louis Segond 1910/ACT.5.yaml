document_id: ACT.5,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ananias et Saphira
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. Ac 4:34-37. (Lé 10:1-5. 2 R 5:20-27. De 23:21-23. Jos 7:19, etc.) Lu 12:1-5, 15. 1 Co 5:13.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais un homme nommé Ananias, avec Saphira sa femme, vendit une propriété, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au même instant, elle tomba aux pieds de l’apôtre, et expira. Les jeunes gens, étant entrés, la trouvèrent morte; ils l’emportèrent, et l’ensevelirent auprès de son mari. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Une grande crainte s’empara de toute l’assemblée et de tous ceux qui apprirent ces choses.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Succès croissants des apôtres
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-16: cf. Ac 19:11-20. Mi 5:6, 7.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2:43
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Beaucoup de miracles et de prodiges se faisaient au milieu du peuple par les mains des apôtres. Ils se tenaient tous ensemble au portique de Salomon, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et aucun des autres n’osait se joindre à eux; mais le peuple les louait hautement. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le nombre de ceux qui croyaient au Seigneur, hommes et femmes, s’augmentait de plus en plus; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'en sorte qu’on apportait les malades dans les rues et qu’on les plaçait sur des lits et des couchettes, afin que, lorsque Pierre passerait, son ombre au moins couvrît quelqu’un d’eux. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La multitude accourait aussi des villes voisines à Jérusalem, amenant des malades et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 8:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: des gens tourmentés par des esprits impurs; et tous étaient guéris.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les apôtres jetés en prison et miraculeusement délivrés; — arrêtés de nouveau et conduits devant le sanhédrin; — battus de verges et relâchés d’après l’avis de Gamaliel
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-32: cf. Ac 12:3-11; 4:5-12, 18-20. És 65:13.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant le souverain sacrificateur et tous ceux qui étaient avec lui, savoir le parti des sadducéens, se levèrent, remplis de jalousie, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mirent les mains sur les apôtres, et les jetèrent dans la prison publique. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 12:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais un ange du Seigneur, ayant ouvert pendant la nuit les portes de la prison, les fit sortir, et leur dit: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et retint une partie du prix, sa femme le sachant; puis il apporta le reste, et le déposa aux pieds des apôtres. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Allez, tenez-vous dans le temple, et annoncez au peuple toutes les paroles de cette vie. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ayant entendu cela, ils entrèrent dès le matin dans le temple, et se mirent à enseigner. Le souverain sacrificateur et ceux qui étaient avec lui étant survenus, ils convoquèrent le sanhédrin et tous les anciens des fils d’Israël, et ils envoyèrent chercher les apôtres à la prison. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les huissiers, à leur arrivée, ne les trouvèrent point dans la prison. Ils s’en retournèrent, et firent leur rapport, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'en disant: Nous avons trouvé la prison soigneusement fermée, et les gardes qui étaient devant les portes; mais, après avoir ouvert, nous n’avons trouvé personne dedans. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’ils eurent entendu ces paroles, le commandant du temple et les principaux sacrificateurs ne savaient que penser des apôtres et des suites de cette affaire. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelqu’un vint leur dire: Voici, les hommes que vous avez mis en prison sont dans le temple, et ils enseignent le peuple. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le commandant partit avec les huissiers, et les conduisit sans violence, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 21:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 4:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car ils avaient peur d’être lapidés par le peuple. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après qu’ils les eurent amenés en présence du sanhédrin, le souverain sacrificateur les interrogea en ces termes: '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 4:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ne vous avons-nous pas défendu expressément d’enseigner en ce nom-là? Et voici, vous avez rempli Jérusalem de votre enseignement, et vous voulez faire retomber sur nous le sang de cet homme! '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre et les apôtres répondirent: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 4:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il faut obéir à Dieu plutôt qu’aux hommes. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre lui dit: Ananias, pourquoi Satan a-t-il rempli ton cœur, au point que tu mentes au Saint-Esprit, et que tu aies retenu une partie du prix du champ? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 3:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le Dieu de nos pères a ressuscité Jésus, que vous avez tué, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 21:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 10:39
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'en le pendant au bois. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu l’a '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2:33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 2:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'élevé par sa droite comme Prince et Sauveur, pour donner à Israël la repentance et le pardon des péchés. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous sommes '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 15:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'témoins de ces choses, de même que le Saint-Esprit, que Dieu a '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: donné à ceux qui lui obéissent.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 33-42: cf. (Ps 37:12, 32, 33. Pr 16:14.) (Mt 5:10-12. 1 Pi 4:13-16.) Ap 3:8.'
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Furieux de ces paroles, ils voulaient les faire mourir. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais un pharisien, nommé Gamaliel, docteur de la loi, estimé de tout le peuple, se leva dans le sanhédrin, et ordonna de faire sortir un instant les apôtres. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il leur dit: Hommes Israélites, prenez garde à ce que vous allez faire à l’égard de ces gens. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 21:38
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car, il n’y a pas longtemps que parut Theudas, qui se donnait pour quelque chose, et auquel se rallièrent environ quatre cents hommes: il fut tué, et tous ceux qui l’avaient suivi furent mis en déroute et réduits à rien. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après lui, parut Judas le Galiléen, à l’époque du recensement, et il attira du monde à son parti: il périt aussi, et tous ceux qui l’avaient suivi furent dispersés. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et maintenant, je vous le dis ne vous occupez plus de ces hommes, et laissez-les aller. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 21:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 8:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 15:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si cette entreprise ou cette œuvre vient des hommes, elle se détruira; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais si elle vient de Dieu, vous ne pourrez la détruire. Ne courez pas le risque d’avoir combattu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 9:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'contre Dieu. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il n’eût pas été vendu, ne te restait-il pas? Et, après qu’il a été vendu, le prix n’était-il pas à ta disposition? Comment as-tu pu mettre en ton cœur un pareil dessein? Ce n’est pas à des hommes que tu as menti, mais à Dieu. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils se rangèrent à son avis. Et ayant appelé les apôtres, ils les firent battre de verges, ils leur défendirent de parler au nom de Jésus, et ils les relâchèrent. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les apôtres se retirèrent de devant le sanhédrin, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'joyeux d’avoir été jugés dignes de subir des outrages pour le nom de Jésus. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et chaque jour, dans le temple et dans les maisons, ils ne cessaient d’enseigner, et d’annoncer la bonne nouvelle de Jésus-Christ.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ananias, entendant ces paroles, tomba, et expira. Une grande crainte saisit tous les auditeurs. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les jeunes gens, s’étant levés, l’enveloppèrent, l’emportèrent, et l’ensevelirent. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Environ trois heures plus tard, sa femme entra, sans savoir ce qui était arrivé. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre lui adressa la parole: Dis-moi, est-ce à un tel prix que vous avez vendu le champ? Oui, répondit-elle, c’est à ce prix-là. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Pierre lui dit: Comment vous êtes-vous accordés pour tenter l’Esprit du Seigneur? Voici, ceux qui ont enseveli ton mari sont à la porte, et ils t’emporteront. '
