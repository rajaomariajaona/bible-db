document_id: ACT.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ananias et Saphira
  - type: heading
    content: 'V. 1-11: cf. Ac 4:34-37. (Lé 10:1-5. 2 R 5:20-27. De 23:21-23. Jos 7:19, etc.) Lu 12:1-5, 15. 1 Co 5:13.'
  - type: text
    content: 'Mais un homme nommé Ananias, avec Saphira sa femme, vendit une propriété, '
  '10':
  - type: text
    content: 'Au même instant, elle tomba aux pieds de l’apôtre, et expira. Les jeunes gens, étant entrés, la trouvèrent morte; ils l’emportèrent, et l’ensevelirent auprès de son mari. '
  '11':
  - type: text
    content: Une grande crainte s’empara de toute l’assemblée et de tous ceux qui apprirent ces choses.
  - type: heading
    content: Succès croissants des apôtres
  - type: heading
    content: 'V. 12-16: cf. Ac 19:11-20. Mi 5:6, 7.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: Mc 16:17. Ac 2:43.
  - type: text
    content: 'Beaucoup de miracles et de prodiges se faisaient au milieu du peuple par les mains des apôtres. Ils se tenaient tous ensemble au portique de Salomon, '
  '13':
  - type: text
    content: 'et aucun des autres n’osait se joindre à eux; mais le peuple les louait hautement. '
  '14':
  - type: text
    content: 'Le nombre de ceux qui croyaient au Seigneur, hommes et femmes, s’augmentait de plus en plus; '
  '15':
  - type: text
    content: 'en sorte qu’on apportait les malades dans les rues et qu’on les plaçait sur des lits et des couchettes, afin que, lorsque Pierre passerait, son ombre au moins couvrît quelqu’un d’eux. '
  '16':
  - type: text
    content: 'La multitude accourait aussi des villes voisines à Jérusalem, amenant des malades et '
  - type: note
    content: Mc 16:17. Ac 8:7; 16:18; 19:2.
  - type: text
    content: des gens tourmentés par des esprits impurs; et tous étaient guéris.
  - type: heading
    content: Les apôtres jetés en prison et miraculeusement délivrés; — arrêtés de nouveau et conduits devant le sanhédrin; — battus de verges et relâchés d’après l’avis de Gamaliel
  - type: heading
    content: 'V. 17-32: cf. Ac 12:3-11; 4:5-12, 18-20. És 65:13.'
  '17':
  - type: text
    content: 'Cependant le souverain sacrificateur et tous ceux qui étaient avec lui, savoir le parti des sadducéens, se levèrent, remplis de jalousie, '
  '18':
  - type: text
    content: 'mirent les mains sur les apôtres, et les jetèrent dans la prison publique. '
  '19':
  - type: note
    content: Ac 12:7; 16:26.
  - type: text
    content: 'Mais un ange du Seigneur, ayant ouvert pendant la nuit les portes de la prison, les fit sortir, et leur dit: '
  '2':
  - type: text
    content: 'et retint une partie du prix, sa femme le sachant; puis il apporta le reste, et le déposa aux pieds des apôtres. '
  '20':
  - type: text
    content: 'Allez, tenez-vous dans le temple, et annoncez au peuple toutes les paroles de cette vie. '
  '21':
  - type: text
    content: 'Ayant entendu cela, ils entrèrent dès le matin dans le temple, et se mirent à enseigner. Le souverain sacrificateur et ceux qui étaient avec lui étant survenus, ils convoquèrent le sanhédrin et tous les anciens des fils d’Israël, et ils envoyèrent chercher les apôtres à la prison. '
  '22':
  - type: text
    content: 'Les huissiers, à leur arrivée, ne les trouvèrent point dans la prison. Ils s’en retournèrent, et firent leur rapport, '
  '23':
  - type: text
    content: 'en disant: Nous avons trouvé la prison soigneusement fermée, et les gardes qui étaient devant les portes; mais, après avoir ouvert, nous n’avons trouvé personne dedans. '
  '24':
  - type: text
    content: 'Lorsqu’ils eurent entendu ces paroles, le commandant du temple et les principaux sacrificateurs ne savaient que penser des apôtres et des suites de cette affaire. '
  '25':
  - type: text
    content: 'Quelqu’un vint leur dire: Voici, les hommes que vous avez mis en prison sont dans le temple, et ils enseignent le peuple. '
  '26':
  - type: text
    content: 'Alors le commandant partit avec les huissiers, et les conduisit sans violence, '
  - type: note
    content: Mt 21:26. Ac 4:21.
  - type: text
    content: 'car ils avaient peur d’être lapidés par le peuple. '
  '27':
  - type: text
    content: 'Après qu’ils les eurent amenés en présence du sanhédrin, le souverain sacrificateur les interrogea en ces termes: '
  '28':
  - type: note
    content: Ac 4:18.
  - type: text
    content: 'Ne vous avons-nous pas défendu expressément d’enseigner en ce nom-là? Et voici, vous avez rempli Jérusalem de votre enseignement, et vous voulez faire retomber sur nous le sang de cet homme! '
  '29':
  - type: text
    content: 'Pierre et les apôtres répondirent: '
  - type: note
    content: Ac 4:19.
  - type: text
    content: 'Il faut obéir à Dieu plutôt qu’aux hommes. '
  '3':
  - type: text
    content: 'Pierre lui dit: Ananias, pourquoi Satan a-t-il rempli ton cœur, au point que tu mentes au Saint-Esprit, et que tu aies retenu une partie du prix du champ? '
  '30':
  - type: note
    content: Ac 3:15.
  - type: text
    content: 'Le Dieu de nos pères a ressuscité Jésus, que vous avez tué, '
  - type: note
    content: De 21:23. Ac 10:39; 13:29. 1 Pi 2:24.
  - type: text
    content: 'en le pendant au bois. '
  '31':
  - type: text
    content: 'Dieu l’a '
  - type: note
    content: Ac 2:33; 3:15. Ph 2:9.
  - type: text
    content: 'élevé par sa droite comme Prince et Sauveur, pour donner à Israël la repentance et le pardon des péchés. '
  '32':
  - type: text
    content: 'Nous sommes '
  - type: note
    content: Jn 15:27.
  - type: text
    content: 'témoins de ces choses, de même que le Saint-Esprit, que Dieu a '
  - type: note
    content: Ac 2:4.
  - type: text
    content: donné à ceux qui lui obéissent.
  - type: heading
    content: 'V. 33-42: cf. (Ps 37:12, 32, 33. Pr 16:14.) (Mt 5:10-12. 1 Pi 4:13-16.) Ap 3:8.'
  '33':
  - type: text
    content: 'Furieux de ces paroles, ils voulaient les faire mourir. '
  '34':
  - type: text
    content: 'Mais un pharisien, nommé Gamaliel, docteur de la loi, estimé de tout le peuple, se leva dans le sanhédrin, et ordonna de faire sortir un instant les apôtres. '
  '35':
  - type: text
    content: 'Puis il leur dit: Hommes Israélites, prenez garde à ce que vous allez faire à l’égard de ces gens. '
  '36':
  - type: note
    content: Ac 21:38.
  - type: text
    content: 'Car, il n’y a pas longtemps que parut Theudas, qui se donnait pour quelque chose, et auquel se rallièrent environ quatre cents hommes: il fut tué, et tous ceux qui l’avaient suivi furent mis en déroute et réduits à rien. '
  '37':
  - type: text
    content: 'Après lui, parut Judas le Galiléen, à l’époque du recensement, et il attira du monde à son parti: il périt aussi, et tous ceux qui l’avaient suivi furent dispersés. '
  '38':
  - type: text
    content: 'Et maintenant, je vous le dis ne vous occupez plus de ces hommes, et laissez-les aller. '
  - type: note
    content: Pr 21:30. És 8:10. Mt 15:13.
  - type: text
    content: 'Si cette entreprise ou cette œuvre vient des hommes, elle se détruira; '
  '39':
  - type: text
    content: 'mais si elle vient de Dieu, vous ne pourrez la détruire. Ne courez pas le risque d’avoir combattu '
  - type: note
    content: Ac 9:5; 23:9.
  - type: text
    content: 'contre Dieu. '
  '4':
  - type: text
    content: 'S’il n’eût pas été vendu, ne te restait-il pas? Et, après qu’il a été vendu, le prix n’était-il pas à ta disposition? Comment as-tu pu mettre en ton cœur un pareil dessein? Ce n’est pas à des hommes que tu as menti, mais à Dieu. '
  '40':
  - type: text
    content: 'Ils se rangèrent à son avis. Et ayant appelé les apôtres, ils les firent battre de verges, ils leur défendirent de parler au nom de Jésus, et ils les relâchèrent. '
  '41':
  - type: text
    content: 'Les apôtres se retirèrent de devant le sanhédrin, '
  - type: note
    content: Mt 5:12.
  - type: text
    content: 'joyeux d’avoir été jugés dignes de subir des outrages pour le nom de Jésus. '
  '42':
  - type: text
    content: Et chaque jour, dans le temple et dans les maisons, ils ne cessaient d’enseigner, et d’annoncer la bonne nouvelle de Jésus-Christ.
  '5':
  - type: text
    content: 'Ananias, entendant ces paroles, tomba, et expira. Une grande crainte saisit tous les auditeurs. '
  '6':
  - type: text
    content: 'Les jeunes gens, s’étant levés, l’enveloppèrent, l’emportèrent, et l’ensevelirent. '
  '7':
  - type: text
    content: 'Environ trois heures plus tard, sa femme entra, sans savoir ce qui était arrivé. '
  '8':
  - type: text
    content: 'Pierre lui adressa la parole: Dis-moi, est-ce à un tel prix que vous avez vendu le champ? Oui, répondit-elle, c’est à ce prix-là. '
  '9':
  - type: text
    content: 'Alors Pierre lui dit: Comment vous êtes-vous accordés pour tenter l’Esprit du Seigneur? Voici, ceux qui ont enseveli ton mari sont à la porte, et ils t’emporteront. '
