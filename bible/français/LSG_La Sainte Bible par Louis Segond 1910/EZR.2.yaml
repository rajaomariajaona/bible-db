document_id: EZR.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Dénombrement des Israélites qui revinrent au pays de Juda
  - type: heading
    content: 'V. 1-70: cf. (Né 7:6-73.) Ps 126.'
  - type: text
    content: 'Voici ceux de la province qui revinrent de l’exil, ceux que Nebucadnetsar, roi de Babylone, avait emmenés captifs à Babylone, et qui retournèrent à Jérusalem et en Juda, chacun dans sa ville. '
  '10':
  - type: text
    content: 'les fils de Bani, six cent quarante-deux; '
  '11':
  - type: text
    content: 'les fils de Bébaï, six cent vingt-trois; '
  '12':
  - type: text
    content: 'les fils d’Azgad, mille deux cent vingt-deux; '
  '13':
  - type: text
    content: 'les fils d’Adonikam, six cent soixante-six; '
  '14':
  - type: text
    content: 'les fils de Bigvaï, deux mille cinquante-six; '
  '15':
  - type: text
    content: 'les fils d’Adin, quatre cent cinquante-quatre; '
  '16':
  - type: text
    content: 'les fils d’Ather, de la famille d’Ézéchias, quatre-vingt-dix-huit; '
  '17':
  - type: text
    content: 'les fils de Betsaï, trois cent vingt-trois; '
  '18':
  - type: text
    content: 'les fils de Jora, cent douze; '
  '19':
  - type: text
    content: 'les fils de Haschum, deux cent vingt-trois; '
  '2':
  - type: text
    content: 'Ils partirent avec Zorobabel, Josué, Néhémie, Seraja, Reélaja, Mardochée, Bilschan, Mispar, Bigvaï, Rehum, Baana. Nombre des hommes du peuple d’Israël: '
  '20':
  - type: text
    content: 'les fils de Guibbar, quatre-vingt-quinze; '
  '21':
  - type: text
    content: 'les fils de Bethléhem, cent vingt-trois; '
  '22':
  - type: text
    content: 'les gens de Nethopha, cinquante-six; '
  '23':
  - type: text
    content: 'les gens d’Anathoth, cent vingt-huit; '
  '24':
  - type: text
    content: 'les fils d’Azmaveth, quarante-deux; '
  '25':
  - type: text
    content: 'les fils de Kirjath-Arim, de Kephira et de Beéroth, sept cent quarante-trois; '
  '26':
  - type: text
    content: 'les fils de Rama et de Guéba, six cent vingt et un; '
  '27':
  - type: text
    content: 'les gens de Micmas, cent vingt-deux; '
  '28':
  - type: text
    content: 'les gens de Béthel et d’Aï, deux cent vingt-trois; '
  '29':
  - type: text
    content: 'les fils de Nebo, cinquante-deux; '
  '3':
  - type: text
    content: 'les fils de Pareosch, deux mille cent soixante-douze; '
  '30':
  - type: text
    content: 'les fils de Magbisch, cent cinquante-six; '
  '31':
  - type: text
    content: 'les fils de l’autre Élam, mille deux cent cinquante-quatre; '
  '32':
  - type: text
    content: 'les fils de Harim, trois cent vingt; '
  '33':
  - type: text
    content: 'les fils de Lod, de Hadid et d’Ono, sept cent vingt-cinq; '
  '34':
  - type: text
    content: 'les fils de Jéricho, trois cent quarante-cinq; '
  '35':
  - type: text
    content: 'les fils de Senaa, trois mille six cent trente. '
  '36':
  - type: text
    content: 'Sacrificateurs: les fils de Jedaeja, de la maison de Josué, neuf cent soixante-treize; '
  '37':
  - type: text
    content: 'les fils d’Immer, mille cinquante-deux; '
  '38':
  - type: text
    content: 'les fils de Paschhur, mille deux cent quarante-sept; '
  '39':
  - type: text
    content: 'les fils de Harim, mille dix-sept. '
  '4':
  - type: text
    content: 'les fils de Schephathia, trois cent soixante-douze; '
  '40':
  - type: text
    content: 'Lévites: les fils de Josué et de Kadmiel, des fils d’Hodavia, soixante quatorze. '
  '41':
  - type: text
    content: 'Chantres: les fils d’Asaph, cent vingt-huit. '
  '42':
  - type: text
    content: 'Fils des portiers: les fils de Schallum, les fils d’Ather, les fils de Thalmon, les fils d’Akkub, les fils de Hathitha, les fils de Schobaï, en tout cent trente-neuf. '
  '43':
  - type: text
    content: 'Néthiniens: les fils de Tsicha, les fils de Hasupha, les fils de Thabbaoth, '
  '44':
  - type: text
    content: 'les fils de Kéros, les fils de Siaha, les fils de Padon, '
  '45':
  - type: text
    content: 'les fils de Lebana, les fils de Hagaba, les fils d’Akkub, '
  '46':
  - type: text
    content: 'les fils de Hagab, les fils de Schamlaï, les fils de Hanan, '
  '47':
  - type: text
    content: 'les fils de Guiddel, les fils de Gachar, les fils de Reaja, '
  '48':
  - type: text
    content: 'les fils de Retsin, les fils de Nekoda, les fils de Gazzam, '
  '49':
  - type: text
    content: 'les fils d’Uzza, les fils de Paséach, les fils de Bésaï, '
  '5':
  - type: text
    content: 'les fils d’Arach, sept cent soixante-quinze; '
  '50':
  - type: text
    content: 'les fils d’Asna, les fils de Mehunim, les fils de Nephusim, '
  '51':
  - type: text
    content: 'les fils de Bakbuk, les fils de Hakupha, les fils de Harhur, '
  '52':
  - type: text
    content: 'les fils de Batsluth, les fils de Mehida, les fils de Harscha, '
  '53':
  - type: text
    content: 'les fils de Barkos, les fils de Sisera, les fils de Thamach, '
  '54':
  - type: text
    content: 'les fils de Netsiach, les fils de Hathipha. '
  '55':
  - type: text
    content: 'Fils des serviteurs de Salomon: les fils de Sothaï, les fils de Sophéreth, les fils de Peruda, '
  '56':
  - type: text
    content: 'les fils de Jaala, les fils de Darkon, les fils de Guiddel, '
  '57':
  - type: text
    content: 'les fils de Schephathia, les fils de Hatthil, les fils de Pokéreth-Hatsebaïm, les fils d’Ami. '
  '58':
  - type: text
    content: 'Total des Néthiniens et des fils des serviteurs de Salomon: trois cent quatre-vingt-douze. '
  '59':
  - type: text
    content: 'Voici ceux qui partirent de Thel-Mélach, de Thel-Harscha, de Kerub-Addan, et qui ne purent pas faire connaître leur maison paternelle et leur race, pour prouver qu’ils étaient d’Israël. '
  '6':
  - type: text
    content: 'les fils de Pachath-Moab, des fils de Josué et de Joab, deux mille huit cent douze; '
  '60':
  - type: text
    content: 'Les fils de Delaja, les fils de Tobija, les fils de Nekoda, six cent cinquante-deux. '
  '61':
  - type: text
    content: 'Et parmi les fils des sacrificateurs: les fils de Habaja, les fils d’Hakkots, les fils de Barzillaï, qui avait pris pour femme une des filles de Barzillaï, le Galaadite, et fut appelé de leur nom. '
  '62':
  - type: text
    content: 'Ils cherchèrent leurs titres généalogiques, mais ils ne les trouvèrent point. On les exclut du sacerdoce, '
  '63':
  - type: text
    content: 'et le gouverneur leur dit de ne pas manger des choses très saintes jusqu’à ce qu’un sacrificateur ait consulté l’urim et le thummim. '
  '64':
  - type: text
    content: 'L’assemblée tout entière était de quarante-deux mille trois cent soixante personnes, '
  '65':
  - type: text
    content: 'sans compter leurs serviteurs et leurs servantes, au nombre de sept mille trois cent trente-sept. Parmi eux se trouvaient deux cents chantres et chanteuses. '
  '66':
  - type: text
    content: 'Ils avaient sept cent trente-six chevaux, deux cent quarante-cinq mulets, '
  '67':
  - type: text
    content: 'quatre cent trente-cinq chameaux, et six mille sept cent vingt ânes. '
  '68':
  - type: text
    content: 'Plusieurs des chefs de famille, à leur arrivée vers la maison de l’Éternel à Jérusalem, firent des offrandes volontaires pour la maison de Dieu, afin qu’on la rétablît sur le lieu où elle avait été. '
  '69':
  - type: text
    content: 'Ils donnèrent au trésor de l’œuvre, selon leurs moyens, soixante et un mille dariques d’or, cinq mille mines d’argent, et cent tuniques sacerdotales. '
  '7':
  - type: text
    content: 'les fils d’Élam, mille deux cent cinquante-quatre; '
  '70':
  - type: text
    content: Les sacrificateurs et les Lévites, les gens du peuple, les chantres, les portiers et les Néthiniens s’établirent dans leurs villes. Tout Israël habita dans ses villes.
  '8':
  - type: text
    content: 'les fils de Zatthu, neuf cent quarante-cinq; '
  '9':
  - type: text
    content: 'les fils de Zaccaï, sept cent soixante; '
