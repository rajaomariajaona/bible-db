    text: rassemblerai de tous les pays où je les ai chassés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans ma colère, dans ma fureur, et dans ma grande irritation;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les ramènerai dans ce lieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je les y ferai habiter en sûreté.
- type: usfm
