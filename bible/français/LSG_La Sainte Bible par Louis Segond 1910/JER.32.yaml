document_id: JER.32,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La ruine prochaine de Jérusalem et le retour des captifs
  - type: heading
    content: 'V. 1-5: cf. Jé 34:1-6.'
  - type: text
    content: 'La parole qui fut adressée à Jérémie de la part de l’Éternel, la dixième année de Sédécias, roi de Juda. C’était la dix-huitième année de Nebucadnetsar. '
  '10':
  - type: text
    content: 'J’écrivis un contrat, que je cachetai, je pris des témoins, et je pesai l’argent dans une balance. '
  '11':
  - type: text
    content: 'Je pris ensuite le contrat d’acquisition, celui qui était cacheté, conformément à la loi et aux usages, et celui qui était ouvert; '
  '12':
  - type: text
    content: 'et je remis le contrat d’acquisition à Baruc, fils de Nérija, fils de Machséja, en présence de Hanameel, fils de mon oncle, en présence des témoins qui avaient signé le contrat d’acquisition, et en présence de tous les juifs qui se trouvaient dans la cour de la prison. '
  '13':
  - type: text
    content: 'Et je donnai devant eux cet ordre à Baruc: '
  '14':
  - type: text
    content: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël: Prends ces écrits, ce contrat d’acquisition, celui qui est cacheté et celui qui est ouvert, et mets-les dans un vase de terre, afin qu’ils se conservent longtemps. '
  '15':
  - type: text
    content: 'Car ainsi parle l’Éternel des armées, le Dieu d’Israël: On achètera encore des maisons, des champs et des vignes, dans ce pays.'
  - type: heading
    content: 'V. 16-25: cf. Né 9:6-30. (Ps 92:6. És 55:8, 9.)'
  '16':
  - type: text
    content: 'Après que j’eus remis le contrat d’acquisition à Baruc, fils de Nérija, j’adressai cette prière à l’Éternel:'
  '17':
  - type: text
    content: Ah! Seigneur Éternel,
  - type: text
    content: Voici, tu as fait les cieux et la terre
  - type: text
    content: 'Par ta grande puissance et par ton bras étendu:'
  - type: text
    content: Rien n’est étonnant de ta part.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ex 34:7.
  - type: text
    content: Tu fais miséricorde jusqu’à la millième génération,
  - type: text
    content: Et tu punis l’iniquité des pères dans le sein de leurs enfants après eux.
  - type: text
    content: Tu es le Dieu grand, le puissant,
  - type: text
    content: Dont le nom est l’Éternel des armées.
  '19':
  - type: text
    content: 'Tu es grand en '
  - type: note
    content: És 28:29.
  - type: text
    content: conseil et puissant en action;
  - type: text
    content: 'Tu as les '
  - type: note
    content: Job 34:21. Pr 5:21. Jé 16:17.
  - type: text
    content: yeux ouverts sur toutes les voies des enfants des hommes,
  - type: text
    content: 'Pour '
  - type: note
    content: Jé 17:10.
  - type: text
    content: rendre à chacun selon ses voies,
  - type: text
    content: Selon le fruit de ses œuvres.
  '2':
  - type: text
    content: 'L’armée du roi de Babylone assiégeait alors Jérusalem; et Jérémie, le prophète, était enfermé dans la cour de la prison qui était dans la maison du roi de Juda. '
  '20':
  - type: text
    content: Tu as fait des miracles et des prodiges dans le pays d’Égypte jusqu’à ce jour,
  - type: text
    content: Et en Israël et parmi les hommes,
  - type: text
    content: Et tu t’es fait un nom comme il l’est aujourd’hui.
  '21':
  - type: text
    content: 'Tu as fait sortir '
  - type: note
    content: Ex 6:6. 2 S 7:23. 1 Ch 17:21.
  - type: text
    content: du pays d’Égypte ton peuple d’Israël,
  - type: text
    content: Avec des miracles et des prodiges, à main forte et à bras étendu,
  - type: text
    content: Et avec une grande terreur.
  '22':
  - type: text
    content: Tu leur as donné ce pays,
  - type: text
    content: Que tu avais juré à leurs pères de leur donner,
  - type: text
    content: Pays où coulent le lait et le miel.
  '23':
  - type: text
    content: Ils sont venus, et ils en ont pris possession.
  - type: text
    content: Mais ils n’ont point obéi à ta voix,
  - type: text
    content: Ils n’ont point observé ta loi,
  - type: text
    content: Ils n’ont pas fait tout ce que tu leur avais ordonné de faire.
  - type: text
    content: Et c’est alors que tu as fait fondre sur eux tous ces malheurs!
  '24':
  - type: text
    content: Voici, les terrasses s’élèvent contre la ville et la menacent;
  - type: text
    content: La ville sera livrée entre les mains des Chaldéens qui l’attaquent,
  - type: text
    content: Vaincue par l’épée, par la famine et par la peste.
  - type: text
    content: Ce que tu as dit est arrivé, et tu le vois.
  '25':
  - type: text
    content: 'Néanmoins, Seigneur Éternel, tu m’as dit:'
  - type: text
    content: Achète un champ pour de l’argent, prends des témoins…
  - type: text
    content: Et la ville est livrée entre les mains des Chaldéens!
  - type: heading
    content: 'V. 26-35: cf. 2 Ch 36:14-19.'
  '26':
  - type: text
    content: 'La parole de l’Éternel fut adressée à Jérémie, en ces mots:'
  '27':
  - type: text
    content: 'Voici, je suis l’Éternel, le '
  - type: note
    content: No 16:22.
  - type: text
    content: Dieu de toute chair.
  - type: text
    content: Y a-t-il rien qui soit étonnant de ma part?
  '28':
  - type: text
    content: 'C’est pourquoi ainsi parle l’Éternel:'
  - type: text
    content: Voici, je livre cette ville entre les mains des Chaldéens,
  - type: text
    content: Et entre les mains de Nebucadnetsar, roi de Babylone,
  - type: text
    content: Et il la prendra.
  '29':
  - type: text
    content: Les Chaldéens qui attaquent cette ville vont entrer,
  - type: text
    content: 'Ils y mettront le feu, et ils la '
  - type: note
    content: Jé 21:20.
  - type: text
    content: brûleront,
  - type: text
    content: Avec les maisons sur les toits desquelles on a offert de l’encens à Baal
  - type: text
    content: Et fait des libations à d’autres dieux,
  - type: text
    content: Afin de m’irriter.
  '3':
  - type: text
    content: 'Sédécias, roi de Juda, l’avait fait enfermer, et lui avait dit: Pourquoi prophétises-tu, en disant: Ainsi parle l’Éternel: Voici, je livre cette ville entre les mains du roi de Babylone, et il la prendra; '
  '30':
  - type: text
    content: Car les enfants d’Israël et les enfants de Juda
  - type: text
    content: N’ont fait, dès leur jeunesse, que ce qui est mal à mes yeux;
  - type: text
    content: Les enfants d’Israël n’ont fait que m’irriter
  - type: text
    content: Par l’œuvre de leurs mains, dit l’Éternel.
  '31':
  - type: text
    content: Car cette ville excite ma colère et ma fureur,
  - type: text
    content: Depuis le jour où on l’a bâtie jusqu’à ce jour;
  - type: text
    content: Aussi je veux l’ôter de devant ma face,
  '32':
  - type: text
    content: A cause de tout le mal que les enfants d’Israël et les enfants de Juda
  - type: text
    content: Ont fait pour m’irriter,
  - type: text
    content: Eux, leurs rois, leurs chefs, leurs sacrificateurs et leurs prophètes,
  - type: text
    content: Les hommes de Juda et les habitants de Jérusalem.
  '33':
  - type: text
    content: 'Ils m’ont tourné le '
  - type: note
    content: Jé 2:27; 7:24.
  - type: text
    content: dos, ils ne m’ont pas regardé;
  - type: text
    content: 'On les a enseignés, on les a enseignés '
  - type: note
    content: Jé 7:13, 25; 25:3; 26:5; 29:19.
  - type: text
    content: dès le matin;
  - type: text
    content: Mais ils n’ont pas écouté pour recevoir instruction.
  '34':
  - type: text
    content: Ils ont placé leurs abominations
  - type: text
    content: Dans la maison sur laquelle mon nom est invoqué,
  - type: text
    content: Afin de la souiller.
  '35':
  - type: text
    content: 'Ils ont bâti des '
  - type: note
    content: Jé 19:5.
  - type: text
    content: hauts lieux à Baal dans la vallée de Ben-Hinnom,
  - type: text
    content: 'Pour faire passer à Moloc leurs fils et leurs filles:'
  - type: text
    content: Ce que je ne leur avais point ordonné;
  - type: text
    content: Et il ne m’était point venu à la pensée
  - type: text
    content: Qu’ils commettraient de telles horreurs
  - type: text
    content: Pour faire pécher Juda.
  - type: heading
    content: 'V. 36-44: cf. (De 30:1-10. Éz 11:16-20; 36:24-38. Jé 31:31, etc.)'
  '36':
  - type: text
    content: Et maintenant, ainsi parle l’Éternel, le Dieu d’Israël,
  - type: text
    content: 'Sur cette ville dont vous dites:'
  - type: text
    content: Elle sera livrée entre les mains du roi de Babylone,
  - type: text
    content: 'Vaincue par l’épée, par la famine et par la peste:'
  '37':
  - type: text
    content: 'Voici, je les '
  - type: note
    content: Jé 23:3; 29:14; 31:10.
  - type: text
    content: rassemblerai de tous les pays où je les ai chassés,
  - type: text
    content: Dans ma colère, dans ma fureur, et dans ma grande irritation;
  - type: text
    content: Je les ramènerai dans ce lieu,
  - type: text
    content: Et je les y ferai habiter en sûreté.
  '38':
  - type: text
    content: ' '
  - type: note
    content: Jé 24:7; 30:22; 31:1, 33.
  - type: text
    content: Ils seront mon peuple,
  - type: text
    content: Et je serai leur Dieu.
  '39':
  - type: text
    content: Je leur donnerai un même cœur et une même voie,
  - type: text
    content: Afin qu’ils me craignent toujours,
  - type: text
    content: Pour leur bonheur et celui de leurs enfants après eux.
  '4':
  - type: text
    content: 'Sédécias, roi de Juda, n’échappera pas aux Chaldéens, mais '
  - type: note
    content: Jé 34:3.
  - type: text
    content: 'il sera livré entre les mains du roi de Babylone, il lui parlera bouche à bouche, et ses yeux verront ses yeux; '
  '40':
  - type: text
    content: Je traiterai avec eux une alliance éternelle,
  - type: text
    content: Je ne me détournerai plus d’eux,
  - type: text
    content: Je leur ferai du bien,
  - type: text
    content: Et je mettrai ma crainte dans leur cœur,
  - type: text
    content: Afin qu’ils ne s’éloignent pas de moi.
  '41':
  - type: text
    content: Je prendrai plaisir à leur faire du bien,
  - type: text
    content: 'Et je les '
  - type: note
    content: Jé 24:6. Am 9:15.
  - type: text
    content: planterai véritablement dans ce pays,
  - type: text
    content: De tout mon cœur et de toute mon âme.
  '42':
  - type: text
    content: 'Car ainsi parle l’Éternel:'
  - type: text
    content: De même que j’ai fait venir sur ce peuple tous ces grands malheurs,
  - type: text
    content: De même je ferai venir sur eux tout le bien que je leur promets.
  '43':
  - type: text
    content: On achètera des champs dans ce pays
  - type: text
    content: 'Dont vous dites: C’est un désert, sans hommes ni bêtes,'
  - type: text
    content: Il est livré entre les mains des Chaldéens.
  '44':
  - type: text
    content: On achètera des champs pour de l’argent,
  - type: text
    content: On écrira des contrats, on les cachètera, on prendra des témoins,
  - type: text
    content: Dans le pays de Benjamin et aux environs de Jérusalem,
  - type: text
    content: Dans les villes de Juda, dans les villes de la montagne,
  - type: text
    content: Dans les villes de la plaine et dans les villes du midi;
  - type: text
    content: Car je ramènerai leurs captifs, dit l’Éternel.
  '5':
  - type: text
    content: le roi de Babylone emmènera Sédécias à Babylone, où il restera jusqu’à ce que je me souvienne de lui, dit l’Éternel; si vous vous battez contre les Chaldéens, vous n’aurez point de succès.
  - type: heading
    content: 'V. 6-15: cf. v. 42-44. (Lé 25:24-34. Ru 4:1-4.) 2 Co 5:7.'
  '6':
  - type: text
    content: 'Jérémie dit: La parole de l’Éternel m’a été adressée, en ces mots: '
  '7':
  - type: text
    content: 'Voici, Hanameel, fils de ton oncle Schallum, va venir auprès de toi pour te dire: Achète mon champ qui est à Anathoth, car tu as le droit de rachat pour l’acquérir. '
  '8':
  - type: text
    content: 'Et Hanameel, fils de mon oncle, vint auprès de moi, selon la parole de l’Éternel, dans la cour de la prison, et il me dit: Achète mon champ, qui est à Anathoth, dans le pays de Benjamin, car tu as le droit d’héritage et de rachat, achète-le! Je reconnus que c’était la parole de l’Éternel. '
  '9':
  - type: text
    content: 'J’achetai de Hanameel, fils de mon oncle, le champ qui est à Anathoth, et je lui pesai l’argent, dix-sept sicles d’argent. '
