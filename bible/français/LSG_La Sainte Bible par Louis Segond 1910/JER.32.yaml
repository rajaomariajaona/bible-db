document_id: JER.32
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La ruine prochaine de Jérusalem et le retour des captifs
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. Jé 34:1-6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole qui fut adressée à Jérémie de la part de l’Éternel, la dixième année de Sédécias, roi de Juda. C’était la dix-huitième année de Nebucadnetsar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L’armée du roi de Babylone assiégeait alors Jérusalem; et Jérémie, le prophète, était enfermé dans la cour de la prison qui était dans la maison du roi de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Sédécias, roi de Juda, l’avait fait enfermer, et lui avait dit: Pourquoi prophétises-tu, en disant: Ainsi parle l’Éternel: Voici, je livre cette ville entre les mains du roi de Babylone, et il la prendra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Sédécias, roi de Juda, n’échappera pas aux Chaldéens, mais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 34:3
      metadata:
        usfm: JER.34.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il sera livré entre les mains du roi de Babylone, il lui parlera bouche à bouche, et ses yeux verront ses yeux; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: le roi de Babylone emmènera Sédécias à Babylone, où il restera jusqu’à ce que je me souvienne de lui, dit l’Éternel; si vous vous battez contre les Chaldéens, vous n’aurez point de succès.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-15: cf. v. 42-44. (Lé 25:24-34. Ru 4:1-4.) 2 Co 5:7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jérémie dit: La parole de l’Éternel m’a été adressée, en ces mots: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voici, Hanameel, fils de ton oncle Schallum, va venir auprès de toi pour te dire: Achète mon champ qui est à Anathoth, car tu as le droit de rachat pour l’acquérir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et Hanameel, fils de mon oncle, vint auprès de moi, selon la parole de l’Éternel, dans la cour de la prison, et il me dit: Achète mon champ, qui est à Anathoth, dans le pays de Benjamin, car tu as le droit d’héritage et de rachat, achète-le! Je reconnus que c’était la parole de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'J’achetai de Hanameel, fils de mon oncle, le champ qui est à Anathoth, et je lui pesai l’argent, dix-sept sicles d’argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'J’écrivis un contrat, que je cachetai, je pris des témoins, et je pesai l’argent dans une balance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je pris ensuite le contrat d’acquisition, celui qui était cacheté, conformément à la loi et aux usages, et celui qui était ouvert; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'et je remis le contrat d’acquisition à Baruc, fils de Nérija, fils de Machséja, en présence de Hanameel, fils de mon oncle, en présence des témoins qui avaient signé le contrat d’acquisition, et en présence de tous les juifs qui se trouvaient dans la cour de la prison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et je donnai devant eux cet ordre à Baruc: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël: Prends ces écrits, ce contrat d’acquisition, celui qui est cacheté et celui qui est ouvert, et mets-les dans un vase de terre, afin qu’ils se conservent longtemps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Car ainsi parle l’Éternel des armées, le Dieu d’Israël: On achètera encore des maisons, des champs et des vignes, dans ce pays.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-25: cf. Né 9:6-30. (Ps 92:6. És 55:8, 9.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Après que j’eus remis le contrat d’acquisition à Baruc, fils de Nérija, j’adressai cette prière à l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ah! Seigneur Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, tu as fait les cieux et la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Par ta grande puissance et par ton bras étendu:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rien n’est étonnant de ta part.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 34:7
      metadata:
        usfm: EXO.34.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tu fais miséricorde jusqu’à la millième génération,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu punis l’iniquité des pères dans le sein de leurs enfants après eux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es le Dieu grand, le puissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dont le nom est l’Éternel des armées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu es grand en '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 28:29
      metadata:
        usfm: ISA.28.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: conseil et puissant en action;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu as les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 34:21
      metadata:
        usfm: JOB.34.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 5:21
      metadata:
        usfm: PRO.5.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 16:17
      metadata:
        usfm: JER.16.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: yeux ouverts sur toutes les voies des enfants des hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pour '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 17:10
      metadata:
        usfm: JER.17.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: rendre à chacun selon ses voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Selon le fruit de ses œuvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu as fait des miracles et des prodiges dans le pays d’Égypte jusqu’à ce jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et en Israël et parmi les hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu t’es fait un nom comme il l’est aujourd’hui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tu as fait sortir '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 6:6
      metadata:
        usfm: EXO.6.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:23
      metadata:
        usfm: 2SA.7.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 17:21
      metadata:
        usfm: 1CH.17.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: du pays d’Égypte ton peuple d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec des miracles et des prodiges, à main forte et à bras étendu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et avec une grande terreur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tu leur as donné ce pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tu avais juré à leurs pères de leur donner,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pays où coulent le lait et le miel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ils sont venus, et ils en ont pris possession.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ils n’ont point obéi à ta voix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’ont point observé ta loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’ont pas fait tout ce que tu leur avais ordonné de faire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et c’est alors que tu as fait fondre sur eux tous ces malheurs!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Voici, les terrasses s’élèvent contre la ville et la menacent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La ville sera livrée entre les mains des Chaldéens qui l’attaquent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vaincue par l’épée, par la famine et par la peste.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce que tu as dit est arrivé, et tu le vois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Néanmoins, Seigneur Éternel, tu m’as dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Achète un champ pour de l’argent, prends des témoins…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la ville est livrée entre les mains des Chaldéens!
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 26-35: cf. 2 Ch 36:14-19.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'La parole de l’Éternel fut adressée à Jérémie, en ces mots:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Voici, je suis l’Éternel, le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 16:22
      metadata:
        usfm: NUM.16.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Dieu de toute chair.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Y a-t-il rien qui soit étonnant de ma part?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'C’est pourquoi ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, je livre cette ville entre les mains des Chaldéens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et entre les mains de Nebucadnetsar, roi de Babylone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il la prendra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Les Chaldéens qui attaquent cette ville vont entrer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils y mettront le feu, et ils la '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jé 21:20.
    marker-yv: yv-n
  - type: text
    text: brûleront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec les maisons sur les toits desquelles on a offert de l’encens à Baal
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et fait des libations à d’autres dieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin de m’irriter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Car les enfants d’Israël et les enfants de Juda
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’ont fait, dès leur jeunesse, que ce qui est mal à mes yeux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les enfants d’Israël n’ont fait que m’irriter
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par l’œuvre de leurs mains, dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Car cette ville excite ma colère et ma fureur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Depuis le jour où on l’a bâtie jusqu’à ce jour;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi je veux l’ôter de devant ma face,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: A cause de tout le mal que les enfants d’Israël et les enfants de Juda
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ont fait pour m’irriter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eux, leurs rois, leurs chefs, leurs sacrificateurs et leurs prophètes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les hommes de Juda et les habitants de Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ils m’ont tourné le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:27
      metadata:
        usfm: JER.2.27
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:24
      metadata:
        usfm: JER.7.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: dos, ils ne m’ont pas regardé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'On les a enseignés, on les a enseignés '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:13
      metadata:
        usfm: JER.7.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: JER.7.25
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:3
      metadata:
        usfm: JER.25.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:5
      metadata:
        usfm: JER.26.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:19
      metadata:
        usfm: JER.29.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: dès le matin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ils n’ont pas écouté pour recevoir instruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ils ont placé leurs abominations
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans la maison sur laquelle mon nom est invoqué,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin de la souiller.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ils ont bâti des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 19:5
      metadata:
        usfm: JER.19.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: hauts lieux à Baal dans la vallée de Ben-Hinnom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pour faire passer à Moloc leurs fils et leurs filles:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce que je ne leur avais point ordonné;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il ne m’était point venu à la pensée
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils commettraient de telles horreurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour faire pécher Juda.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 36-44: cf. (De 30:1-10. Éz 11:16-20; 36:24-38. Jé 31:31, etc.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Et maintenant, ainsi parle l’Éternel, le Dieu d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sur cette ville dont vous dites:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle sera livrée entre les mains du roi de Babylone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Vaincue par l’épée, par la famine et par la peste:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Voici, je les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 23:3
      metadata:
