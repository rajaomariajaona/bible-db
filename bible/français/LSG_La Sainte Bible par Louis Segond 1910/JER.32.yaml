  - type: text
    text: planterai véritablement dans ce pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De tout mon cœur et de toute mon âme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Car ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: De même que j’ai fait venir sur ce peuple tous ces grands malheurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De même je ferai venir sur eux tout le bien que je leur promets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: On achètera des champs dans ce pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dont vous dites: C’est un désert, sans hommes ni bêtes,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est livré entre les mains des Chaldéens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: On achètera des champs pour de l’argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: On écrira des contrats, on les cachètera, on prendra des témoins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans le pays de Benjamin et aux environs de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans les villes de Juda, dans les villes de la montagne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans les villes de la plaine et dans les villes du midi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je ramènerai leurs captifs, dit l’Éternel.
