  - type: text
    text: Ils seront mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je serai leur Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Je leur donnerai un même cœur et une même voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin qu’ils me craignent toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour leur bonheur et celui de leurs enfants après eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Je traiterai avec eux une alliance éternelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne me détournerai plus d’eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je leur ferai du bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je mettrai ma crainte dans leur cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin qu’ils ne s’éloignent pas de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Je prendrai plaisir à leur faire du bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et je les '
