document_id: GEN.50,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ses funérailles dans le pays de Canaan
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-14: cf. Ge 47:28-31; 49:29-33.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph se jeta sur le visage de son père, pleura sur lui, et le baisa. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arrivés à l’aire d’Athad, qui est audelà du Jourdain, ils firent entendre de grandes et profondes lamentations; et Joseph fit en l’honneur de son père un deuil de sept jours. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les habitants du pays, les Cananéens, furent témoins de ce deuil dans l’aire d’Athad, et ils dirent: Voilà un grand deuil parmi les Égyptiens! C’est pourquoi l’on a donné le nom d’Abel-Mitsraïm à cette aire qui est au-delà du Jourdain. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est ainsi que les fils de Jacob exécutèrent les ordres de leur père. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7:15
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils le transportèrent au pays de Canaan, et l’enterrèrent dans la caverne du champ de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 23:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Macpéla, qu’Abraham avait achetée d’Éphron, le Héthien, comme propriété sépulcrale, et qui est vis-à-vis de Mamré. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joseph, après avoir enterré son père, retourna en Égypte, avec ses frères et tous ceux qui étaient montés avec lui pour enterrer son père.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 15-21: cf. Ge 45:1-11. Col 3:12-14.'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand les frères de Joseph virent que leur père était mort, ils dirent: Si Joseph nous prenait en haine, et nous rendait tout le mal que nous lui avons fait! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ils firent dire à Joseph: Ton père a donné cet ordre avant de mourir: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous parlerez ainsi à Joseph: Oh! Pardonne le crime de tes frères et leur péché, car ils t’ont fait du mal! Pardonne maintenant le péché des serviteurs du Dieu de ton père! Joseph pleura, en entendant ces paroles. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ses frères vinrent eux-mêmes se prosterner devant lui, et ils dirent: Nous sommes tes serviteurs. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph leur dit: Soyez sans crainte; car suis-je '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 45:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à la place de Dieu? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il ordonna aux médecins à son service d’embaumer son père, et les médecins embaumèrent Israël. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous aviez médité de me faire du mal: Dieu l’a changé en bien, pour accomplir ce qui arrive aujourd’hui, pour sauver la vie à un peuple nombreux. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Soyez donc sans crainte; je vous entretiendrai, vous et vos enfants. Et il les consola, en parlant à leur cœur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mort de Joseph
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-26: cf. Hé 11:22. Jos 24:32.'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph demeura en Égypte, lui et la maison de son père. Il vécut cent dix ans. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph vit les fils d’Éphraïm jusqu’à la troisième génération; et les fils de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 32:39
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Makir, fils de Manassé, naquirent sur ses genoux. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph dit à ses frères: Je '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 11:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'vais mourir! Mais Dieu vous visitera, et il vous fera remonter de ce pays-ci dans le pays qu’il a juré de donner à Abraham, à Isaac et à Jacob. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph fit jurer les fils d’Israël, en disant: Dieu vous visitera; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 13:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 24:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et vous ferez remonter mes os loin d’ici. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joseph mourut, âgé de cent dix ans. On l’embauma, et on le mit dans un cercueil en Égypte.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quarante jours s’écoulèrent ainsi, et furent employés à l’embaumer. Et les Égyptiens le pleurèrent soixante-dix jours. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand les jours du deuil furent passés, Joseph s’adressa aux gens de la maison de Pharaon, et leur dit: Si j’ai trouvé grâce à vos yeux, rapportez, je vous prie, à Pharaon ce que je vous dis. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mon père m’a '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 47:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'fait jurer, en disant: Voici, je vais mourir! Tu m’enterreras dans le sépulcre que je me suis acheté au pays de Canaan. Je voudrais donc y monter, pour enterrer mon père; et je reviendrai. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pharaon répondit: Monte, et enterre ton père, comme il te l’a fait jurer. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph monta, pour enterrer son père. Avec lui montèrent tous les serviteurs de Pharaon, anciens de sa maison, tous les anciens du pays d’Égypte, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'toute la maison de Joseph, ses frères, et la maison de son père: on ne laissa dans le pays de Gosen que les enfants, les brebis et les bœufs. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait encore avec Joseph des chars et des cavaliers, en sorte que le cortège était très nombreux. '
