document_id: GEN.50,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ses funérailles dans le pays de Canaan
  - type: heading
    content: 'V. 1-14: cf. Ge 47:28-31; 49:29-33.'
  - type: text
    content: 'Joseph se jeta sur le visage de son père, pleura sur lui, et le baisa. '
  '10':
  - type: text
    content: 'Arrivés à l’aire d’Athad, qui est audelà du Jourdain, ils firent entendre de grandes et profondes lamentations; et Joseph fit en l’honneur de son père un deuil de sept jours. '
  '11':
  - type: text
    content: 'Les habitants du pays, les Cananéens, furent témoins de ce deuil dans l’aire d’Athad, et ils dirent: Voilà un grand deuil parmi les Égyptiens! C’est pourquoi l’on a donné le nom d’Abel-Mitsraïm à cette aire qui est au-delà du Jourdain. '
  '12':
  - type: text
    content: 'C’est ainsi que les fils de Jacob exécutèrent les ordres de leur père. '
  '13':
  - type: note
    content: Ac 7:15, 16.
  - type: text
    content: 'Ils le transportèrent au pays de Canaan, et l’enterrèrent dans la caverne du champ de '
  - type: note
    content: Ge 23:16.
  - type: text
    content: 'Macpéla, qu’Abraham avait achetée d’Éphron, le Héthien, comme propriété sépulcrale, et qui est vis-à-vis de Mamré. '
  '14':
  - type: text
    content: Joseph, après avoir enterré son père, retourna en Égypte, avec ses frères et tous ceux qui étaient montés avec lui pour enterrer son père.
  - type: heading
    content: 'V. 15-21: cf. Ge 45:1-11. Col 3:12-14.'
  '15':
  - type: text
    content: 'Quand les frères de Joseph virent que leur père était mort, ils dirent: Si Joseph nous prenait en haine, et nous rendait tout le mal que nous lui avons fait! '
  '16':
  - type: text
    content: 'Et ils firent dire à Joseph: Ton père a donné cet ordre avant de mourir: '
  '17':
  - type: text
    content: 'Vous parlerez ainsi à Joseph: Oh! Pardonne le crime de tes frères et leur péché, car ils t’ont fait du mal! Pardonne maintenant le péché des serviteurs du Dieu de ton père! Joseph pleura, en entendant ces paroles. '
  '18':
  - type: text
    content: 'Ses frères vinrent eux-mêmes se prosterner devant lui, et ils dirent: Nous sommes tes serviteurs. '
  '19':
  - type: text
    content: 'Joseph leur dit: Soyez sans crainte; car suis-je '
  - type: note
    content: Ge 45:5.
  - type: text
    content: 'à la place de Dieu? '
  '2':
  - type: text
    content: 'Il ordonna aux médecins à son service d’embaumer son père, et les médecins embaumèrent Israël. '
  '20':
  - type: text
    content: 'Vous aviez médité de me faire du mal: Dieu l’a changé en bien, pour accomplir ce qui arrive aujourd’hui, pour sauver la vie à un peuple nombreux. '
  '21':
  - type: text
    content: Soyez donc sans crainte; je vous entretiendrai, vous et vos enfants. Et il les consola, en parlant à leur cœur.
  - type: heading
    content: Mort de Joseph
  - type: heading
    content: 'V. 22-26: cf. Hé 11:22. Jos 24:32.'
  '22':
  - type: text
    content: 'Joseph demeura en Égypte, lui et la maison de son père. Il vécut cent dix ans. '
  '23':
  - type: text
    content: 'Joseph vit les fils d’Éphraïm jusqu’à la troisième génération; et les fils de '
  - type: note
    content: No 32:39.
  - type: text
    content: 'Makir, fils de Manassé, naquirent sur ses genoux. '
  '24':
  - type: text
    content: 'Joseph dit à ses frères: Je '
  - type: note
    content: Hé 11:22.
  - type: text
    content: 'vais mourir! Mais Dieu vous visitera, et il vous fera remonter de ce pays-ci dans le pays qu’il a juré de donner à Abraham, à Isaac et à Jacob. '
  '25':
  - type: text
    content: 'Joseph fit jurer les fils d’Israël, en disant: Dieu vous visitera; '
  - type: note
    content: Ex 13:19. Jos 24:32.
  - type: text
    content: 'et vous ferez remonter mes os loin d’ici. '
  '26':
  - type: text
    content: Joseph mourut, âgé de cent dix ans. On l’embauma, et on le mit dans un cercueil en Égypte.
  '3':
  - type: text
    content: 'Quarante jours s’écoulèrent ainsi, et furent employés à l’embaumer. Et les Égyptiens le pleurèrent soixante-dix jours. '
  '4':
  - type: text
    content: 'Quand les jours du deuil furent passés, Joseph s’adressa aux gens de la maison de Pharaon, et leur dit: Si j’ai trouvé grâce à vos yeux, rapportez, je vous prie, à Pharaon ce que je vous dis. '
  '5':
  - type: text
    content: 'Mon père m’a '
  - type: note
    content: Ge 47:29.
  - type: text
    content: 'fait jurer, en disant: Voici, je vais mourir! Tu m’enterreras dans le sépulcre que je me suis acheté au pays de Canaan. Je voudrais donc y monter, pour enterrer mon père; et je reviendrai. '
  '6':
  - type: text
    content: 'Pharaon répondit: Monte, et enterre ton père, comme il te l’a fait jurer. '
  '7':
  - type: text
    content: 'Joseph monta, pour enterrer son père. Avec lui montèrent tous les serviteurs de Pharaon, anciens de sa maison, tous les anciens du pays d’Égypte, '
  '8':
  - type: text
    content: 'toute la maison de Joseph, ses frères, et la maison de son père: on ne laissa dans le pays de Gosen que les enfants, les brebis et les bœufs. '
  '9':
  - type: text
    content: 'Il y avait encore avec Joseph des chars et des cavaliers, en sorte que le cortège était très nombreux. '
