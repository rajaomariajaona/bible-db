document_id: TIT.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. 1 Pi 2:13-16. (Ép 2:1-10. Tit 2:11-15.) Ro 16:17, 18.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Ro 13:1, etc. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Rappelle-leur d’être soumis aux magistrats et aux autorités, d’obéir, d’être prêts à toute bonne œuvre, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 18:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 16:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Th 3:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 3:5
      - type: text
        text: . 2 Jn v. 10.
      marker-yv: yv-n
    - type: text
      text: 'Éloigne de toi, après un premier et un second avertissement, celui qui provoque des divisions, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sachant qu’un homme de cette espèce est perverti, et qu’il pèche, en se condamnant lui-même.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Recommandations particulières. Salutations
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-15: cf. Jn 15:8. 1 Co 16:20-24.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque je t’enverrai Artémas ou '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 20:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 6:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 4:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tychique, hâte-toi de venir me rejoindre à Nicopolis; car c’est là que j’ai résolu de passer l’hiver. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aie soin de pourvoir au voyage de Zénas, le docteur de la loi, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 18:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 1:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’Apollos, en sorte que rien ne leur manque. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il faut que les nôtres aussi apprennent à pratiquer de bonnes œuvres pour subvenir aux besoins pressants, afin qu’ils ne soient pas sans produire des fruits. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tous ceux qui sont avec moi te saluent. Salue ceux qui nous aiment dans la foi. Que la grâce soit avec vous tous!
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de ne médire de personne, d’être pacifiques, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 4:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'modérés, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 2:24
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pleins de douceur envers tous les hommes. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 6:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 2:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 4:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car nous aussi, nous étions autrefois insensés, désobéissants, égarés, asservis à toute espèce de convoitises et de voluptés, vivant dans la méchanceté et dans l’envie, dignes d’être haïs, et nous haïssant les uns les autres. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, lorsque la bonté de Dieu notre Sauveur et son amour pour les hommes ont été manifestés, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 1:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 1:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il nous a sauvés, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:20
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '28'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 2:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 2:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'non à cause des œuvres de justice que nous aurions faites, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 15:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 2:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mais selon sa miséricorde, par le baptême de la régénération et le renouvellement du Saint-Esprit, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 36:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qu’il a répandu sur nous avec abondance par Jésus-Christ notre Sauveur, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afin que, justifiés par sa grâce, nous devenions, en espérance, héritiers de la vie éternelle. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cette parole est certaine, et je veux que tu affirmes ces choses, afin que ceux qui ont cru en Dieu s’appliquent à pratiquer de bonnes œuvres. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 1:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 1:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Voilà ce qui est bon et utile aux hommes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais évite les discussions folles, les généalogies, les querelles, les disputes relatives à la loi; car elles sont inutiles et vaines. '
