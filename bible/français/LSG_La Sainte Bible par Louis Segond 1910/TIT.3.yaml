document_id: TIT.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-11: cf. 1 Pi 2:13-16. (Ép 2:1-10. Tit 2:11-15.) Ro 16:17, 18.'
  - type: text
    content: ' '
  - type: note
    content: Ro 13:1, etc. 1 Pi 2:13.
  - type: text
    content: 'Rappelle-leur d’être soumis aux magistrats et aux autorités, d’obéir, d’être prêts à toute bonne œuvre, '
  '10':
  - type: note
    content: Mt 18:17. Ro 16:17. 2 Th 3:6. 2 Ti 3:5. 2 Jn v. 10.
  - type: text
    content: 'Éloigne de toi, après un premier et un second avertissement, celui qui provoque des divisions, '
  '11':
  - type: text
    content: sachant qu’un homme de cette espèce est perverti, et qu’il pèche, en se condamnant lui-même.
  - type: heading
    content: Recommandations particulières. Salutations
  - type: heading
    content: 'V. 12-15: cf. Jn 15:8. 1 Co 16:20-24.'
  '12':
  - type: text
    content: 'Lorsque je t’enverrai Artémas ou '
  - type: note
    content: Ac 20:4. Ép 6:21. 2 Ti 4:12.
  - type: text
    content: 'Tychique, hâte-toi de venir me rejoindre à Nicopolis; car c’est là que j’ai résolu de passer l’hiver. '
  '13':
  - type: text
    content: 'Aie soin de pourvoir au voyage de Zénas, le docteur de la loi, et '
  - type: note
    content: Ac 18:24. 1 Co 1:12.
  - type: text
    content: 'd’Apollos, en sorte que rien ne leur manque. '
  '14':
  - type: text
    content: 'Il faut que les nôtres aussi apprennent à pratiquer de bonnes œuvres pour subvenir aux besoins pressants, afin qu’ils ne soient pas sans produire des fruits. '
  '15':
  - type: text
    content: Tous ceux qui sont avec moi te saluent. Salue ceux qui nous aiment dans la foi. Que la grâce soit avec vous tous!
  '2':
  - type: text
    content: 'de ne médire de personne, d’être pacifiques, '
  - type: note
    content: Ph 4:5.
  - type: text
    content: 'modérés, '
  - type: note
    content: 2 Ti 2:24, 25.
  - type: text
    content: 'pleins de douceur envers tous les hommes. '
  '3':
  - type: note
    content: 1 Co 6:11. Ép 2:1. Col 3:7. 1 Pi 4:3.
  - type: text
    content: 'Car nous aussi, nous étions autrefois insensés, désobéissants, égarés, asservis à toute espèce de convoitises et de voluptés, vivant dans la méchanceté et dans l’envie, dignes d’être haïs, et nous haïssant les uns les autres. '
  '4':
  - type: text
    content: 'Mais, lorsque la bonté de Dieu notre Sauveur et son amour pour les hommes ont été manifestés, '
  '5':
  - type: note
    content: Ép 1:4. 2 Ti 1:9.
  - type: text
    content: 'il nous a sauvés, '
  - type: note
    content: Ro 3:20, 28; 4:2, 6; 9:11; 11:6. Ga 2:16. Ép 2:9.
  - type: text
    content: 'non à cause des œuvres de justice que nous aurions faites, '
  - type: note
    content: Ac 15:11. Ép 2:4.
  - type: text
    content: 'mais selon sa miséricorde, par le baptême de la régénération et le renouvellement du Saint-Esprit, '
  '6':
  - type: note
    content: Éz 36:25.
  - type: text
    content: 'qu’il a répandu sur nous avec abondance par Jésus-Christ notre Sauveur, '
  '7':
  - type: text
    content: 'afin que, justifiés par sa grâce, nous devenions, en espérance, héritiers de la vie éternelle. '
  '8':
  - type: text
    content: 'Cette parole est certaine, et je veux que tu affirmes ces choses, afin que ceux qui ont cru en Dieu s’appliquent à pratiquer de bonnes œuvres. '
  - type: note
    content: 1 Ti 1:4; 4:7; 6:20. Tit 1:14.
  - type: text
    content: 'Voilà ce qui est bon et utile aux hommes. '
  '9':
  - type: text
    content: 'Mais évite les discussions folles, les généalogies, les querelles, les disputes relatives à la loi; car elles sont inutiles et vaines. '
