document_id: TIT.3
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. 1 Pi 2:13-16. (Ép 2:1-10. Tit 2:11-15.) Ro 16:17, 18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ro 13:1, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:13
      metadata:
        usfm: 1PE.2.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Rappelle-leur d’être soumis aux magistrats et aux autorités, d’obéir, d’être prêts à toute bonne œuvre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'de ne médire de personne, d’être pacifiques, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 4:5
      metadata:
        usfm: PHP.4.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'modérés, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 2:24
      metadata:
        usfm: 2TI.2.24
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: 2TI.2.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pleins de douceur envers tous les hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 6:11
      metadata:
        usfm: 1CO.6.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 2:1
      metadata:
        usfm: EPH.2.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:7
      metadata:
        usfm: COL.3.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:3
      metadata:
        usfm: 1PE.4.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car nous aussi, nous étions autrefois insensés, désobéissants, égarés, asservis à toute espèce de convoitises et de voluptés, vivant dans la méchanceté et dans l’envie, dignes d’être haïs, et nous haïssant les uns les autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais, lorsque la bonté de Dieu notre Sauveur et son amour pour les hommes ont été manifestés, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:4
      metadata:
        usfm: EPH.1.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 1:9
      metadata:
        usfm: 2TI.1.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il nous a sauvés, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 3:20
      metadata:
        usfm: ROM.3.20
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '28'
      metadata:
        usfm: ROM.3.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:2
      metadata:
        usfm: ROM.4.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: ROM.4.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:11
      metadata:
        usfm: ROM.9.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:6
      metadata:
        usfm: ROM.11.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 2:16
      metadata:
        usfm: GAL.2.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 2:9
      metadata:
        usfm: EPH.2.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'non à cause des œuvres de justice que nous aurions faites, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 15:11
      metadata:
        usfm: ACT.15.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 2:4
      metadata:
        usfm: EPH.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais selon sa miséricorde, par le baptême de la régénération et le renouvellement du Saint-Esprit, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 36:25
      metadata:
        usfm: EZK.36.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’il a répandu sur nous avec abondance par Jésus-Christ notre Sauveur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'afin que, justifiés par sa grâce, nous devenions, en espérance, héritiers de la vie éternelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cette parole est certaine, et je veux que tu affirmes ces choses, afin que ceux qui ont cru en Dieu s’appliquent à pratiquer de bonnes œuvres. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:4
      metadata:
        usfm: 1TI.1.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:7
      metadata:
        usfm: 1TI.4.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:20
      metadata:
        usfm: 1TI.6.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 1:14
      metadata:
        usfm: TIT.1.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Voilà ce qui est bon et utile aux hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais évite les discussions folles, les généalogies, les querelles, les disputes relatives à la loi; car elles sont inutiles et vaines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 18:17
      metadata:
        usfm: MAT.18.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 16:17
      metadata:
        usfm: ROM.16.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:6
      metadata:
        usfm: 2TH.3.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 3:5
      metadata:
        usfm: 2TI.3.5
    - type: text
      text: . 2 Jn v. 10.
    marker-yv: yv-n
  - type: text
    text: 'Éloigne de toi, après un premier et un second avertissement, celui qui provoque des divisions, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: sachant qu’un homme de cette espèce est perverti, et qu’il pèche, en se condamnant lui-même.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Recommandations particulières. Salutations
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-15: cf. Jn 15:8. 1 Co 16:20-24.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsque je t’enverrai Artémas ou '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 20:4
      metadata:
        usfm: ACT.20.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 6:21
      metadata:
        usfm: EPH.6.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 4:12
      metadata:
        usfm: 2TI.4.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tychique, hâte-toi de venir me rejoindre à Nicopolis; car c’est là que j’ai résolu de passer l’hiver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aie soin de pourvoir au voyage de Zénas, le docteur de la loi, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 18:24
      metadata:
        usfm: ACT.18.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:12
      metadata:
        usfm: 1CO.1.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'd’Apollos, en sorte que rien ne leur manque. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il faut que les nôtres aussi apprennent à pratiquer de bonnes œuvres pour subvenir aux besoins pressants, afin qu’ils ne soient pas sans produire des fruits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tous ceux qui sont avec moi te saluent. Salue ceux qui nous aiment dans la foi. Que la grâce soit avec vous tous!
