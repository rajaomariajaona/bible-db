document_id: HOS.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ingratitude d’Israël et compassion de Dieu
  - type: heading
    content: 'V. 1-7: cf. Jé 2:1-9. De 32:9-25.'
  - type: text
    content: Quand Israël était jeune, je l’aimais,
  - type: note
    content: Mt 2:15.
  - type: text
    content: Et j’appelai mon fils hors d’Égypte.
  '10':
  - type: text
    content: Ils suivront l’Éternel, qui rugira comme un lion,
  - type: text
    content: Car il rugira, et les enfants accourront de la mer.
  '11':
  - type: text
    content: Ils accourront de l’Égypte, comme un oiseau,
  - type: text
    content: Et du pays d’Assyrie, comme une colombe.
  - type: text
    content: Et je les ferai habiter dans leurs maisons, dit l’Éternel.
  '2':
  - type: text
    content: Mais ils se sont éloignés de ceux qui les appelaient;
  - type: text
    content: Ils ont sacrifié aux Baals,
  - type: text
    content: Et offert de l’encens aux idoles.
  '3':
  - type: text
    content: C’est moi qui guidai les pas d’Éphraïm,
  - type: text
    content: Le soutenant par ses bras;
  - type: text
    content: Et ils n’ont pas vu que je les guérissais.
  '4':
  - type: text
    content: Je les tirai avec des liens d’humanité, avec des cordages d’amour,
  - type: text
    content: Je fus pour eux comme celui qui aurait relâché le joug près de leur bouche,
  - type: text
    content: Et je leur présentai de la nourriture.
  '5':
  - type: text
    content: Ils ne retourneront pas au pays d’Égypte;
  - type: text
    content: Mais l’Assyrien sera leur roi,
  - type: text
    content: Parce qu’ils ont refusé de revenir à moi.
  '6':
  - type: text
    content: L’épée fondra sur leurs villes,
  - type: text
    content: Anéantira, dévorera leurs soutiens,
  - type: text
    content: A cause des desseins qu’ils ont eus.
  '7':
  - type: text
    content: Mon peuple est enclin à s’éloigner de moi;
  - type: text
    content: On les rappelle vers le Très-Haut,
  - type: text
    content: Mais aucun d’eux ne l’exalte.
  - type: heading
    content: 'V. 8-11: cf. Jé 31:18-21. És 27:12, 13.'
  '8':
  - type: text
    content: Que ferai-je de toi, Éphraïm?
  - type: text
    content: Dois-je te livrer, Israël?
  - type: text
    content: 'Te traiterai-je comme '
  - type: note
    content: Ge 19:24.
  - type: text
    content: Adma?
  - type: text
    content: Te rendrai-je semblable à Tseboïm?
  - type: text
    content: Mon cœur s’agite au-dedans de moi,
  - type: text
    content: Toutes mes compassions sont émues.
  '9':
  - type: text
    content: Je n’agirai pas selon mon ardente colère,
  - type: text
    content: Je renonce à détruire Éphraïm;
  - type: text
    content: Car je suis Dieu, et non pas un homme,
  - type: text
    content: Je suis le Saint au milieu de toi;
  - type: text
    content: Je ne viendrai pas avec colère.
