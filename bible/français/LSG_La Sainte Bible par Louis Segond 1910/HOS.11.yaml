document_id: HOS.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ingratitude d’Israël et compassion de Dieu
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. Jé 2:1-9. De 32:9-25.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Quand Israël était jeune, je l’aimais,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 2:15
      metadata:
        usfm: MAT.2.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et j’appelai mon fils hors d’Égypte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mais ils se sont éloignés de ceux qui les appelaient;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont sacrifié aux Baals,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et offert de l’encens aux idoles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C’est moi qui guidai les pas d’Éphraïm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le soutenant par ses bras;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils n’ont pas vu que je les guérissais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je les tirai avec des liens d’humanité, avec des cordages d’amour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je fus pour eux comme celui qui aurait relâché le joug près de leur bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je leur présentai de la nourriture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils ne retourneront pas au pays d’Égypte;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais l’Assyrien sera leur roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’ils ont refusé de revenir à moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L’épée fondra sur leurs villes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Anéantira, dévorera leurs soutiens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause des desseins qu’ils ont eus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mon peuple est enclin à s’éloigner de moi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On les rappelle vers le Très-Haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais aucun d’eux ne l’exalte.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-11: cf. Jé 31:18-21. És 27:12, 13.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Que ferai-je de toi, Éphraïm?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dois-je te livrer, Israël?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Te traiterai-je comme '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 19:24
      metadata:
        usfm: GEN.19.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Adma?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Te rendrai-je semblable à Tseboïm?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon cœur s’agite au-dedans de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutes mes compassions sont émues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je n’agirai pas selon mon ardente colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je renonce à détruire Éphraïm;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je suis Dieu, et non pas un homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis le Saint au milieu de toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne viendrai pas avec colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils suivront l’Éternel, qui rugira comme un lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il rugira, et les enfants accourront de la mer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils accourront de l’Égypte, comme un oiseau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et du pays d’Assyrie, comme une colombe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je les ferai habiter dans leurs maisons, dit l’Éternel.
