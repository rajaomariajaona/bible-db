document_id: EZK.28
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. És 23:8, 9; 14:11-15; 2:12, etc.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole de l’Éternel me fut adressée, en ces mots:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fils de l’homme, dis au prince de Tyr:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ton cœur s’est élevé, et tu as dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis assis sur le siège de Dieu, au sein des mers!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Toi, tu es '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 31:3
      metadata:
        usfm: ISA.31.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: homme et non Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu prends ta volonté pour la volonté de Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Voici, tu es plus sage que Daniel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rien de secret n’est caché pour toi;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Par ta sagesse et par ton intelligence
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu t’es acquis des richesses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as amassé de l’or et de l’argent
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans tes trésors;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Par ta grande sagesse et par ton commerce
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as accru tes richesses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et par tes richesses ton cœur s’est élevé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que tu prends ta volonté pour la volonté de Dieu,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Voici, je ferai venir contre toi des étrangers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 6:23
      metadata:
        usfm: JER.6.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: plus violents d’entre les peuples;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils tireront l’épée contre ton éclatante sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils souilleront ta beauté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils te précipiteront dans la fosse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu mourras comme ceux qui tombent percés de coups,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au milieu des mers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En face de ton meurtrier, diras-tu: Je suis Dieu?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu seras homme et non Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sous la main de celui qui te tuera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu mourras de la mort des incirconcis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par la main des étrangers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car moi, j’ai parlé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Seigneur, l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-19: cf. Éz 27.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La parole de l’Éternel me fut adressée, en ces mots:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fils de l’homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prononce une complainte sur le roi de Tyr!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu lui diras: Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu mettais le sceau à la perfection,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu étais plein de sagesse, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 27:3
      metadata:
        usfm: EZK.27.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: parfait en beauté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tu étais en Éden, le jardin de Dieu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu étais couvert de toute espèce de pierres précieuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De sardoine, de topaze, de diamant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De chrysolithe, d’onyx, de jaspe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De saphir, d’escarboucle, d’émeraude, et d’or;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes tambourins et tes flûtes étaient à ton service,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Préparés pour le jour où tu fus créé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tu étais un chérubin protecteur, aux ailes déployées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’avais placé et tu étais sur la sainte montagne de Dieu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu marchais au milieu des pierres étincelantes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tu as été intègre dans tes voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Depuis le jour où tu fus créé
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à celui où l’iniquité a été trouvée chez toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Par la grandeur de ton commerce
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as été rempli de violence, et tu as péché;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te précipite de la montagne de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je te fais disparaître, chérubin protecteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du milieu des pierres étincelantes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ton cœur s’est élevé à cause de ta beauté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as corrompu ta sagesse par ton éclat;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te jette par terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te livre en spectacle aux rois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Par la multitude de tes iniquités,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par l’injustice de ton commerce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as profané tes sanctuaires;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je fais sortir du milieu de toi un feu qui te dévore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te réduis en cendre sur la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aux yeux de tous ceux qui te regardent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tous ceux qui te connaissent parmi les peuples
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sont dans la stupeur à cause de toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es réduit au néant, tu ne seras plus à jamais!
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-26: cf. (Jé 25:17, 22, 27; 27:2-8.) Éz 37:21-28.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'La parole de l’Éternel me fut adressée, en ces mots:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fils de l’homme, tourne ta face vers Sidon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et prophétise contre elle!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu diras: Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, j’en veux à toi, Sidon!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je serai glorifié au milieu de toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils sauront que je suis l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand j’exercerai mes jugements contre elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand je manifesterai ma sainteté au milieu d’elle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: J’enverrai la peste dans son sein,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ferai couler le sang dans ses rues;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les morts tomberont au milieu d’elle
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par l’épée qui de toutes parts viendra la frapper.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils sauront que je suis l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Alors elle ne sera plus pour la maison d’Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une épine qui blesse, une ronce déchirante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parmi tous ceux qui l’entourent et qui la méprisent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils sauront que je suis le Seigneur, l’Éternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel: Lorsque je rassemblerai la maison d’Israël du milieu des peuples où elle est dispersée, je manifesterai en elle ma sainteté aux yeux des nations, et ils habiteront leur pays que j’ai donné à mon serviteur Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils y habiteront en sécurité, et ils bâtiront des maisons et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 31:5
      metadata:
        usfm: JER.31.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: planteront des vignes; ils y habiteront en sécurité, quand j’exercerai mes jugements contre tous ceux qui les entourent et qui les méprisent. Et ils sauront que je suis l’Éternel, leur Dieu.
