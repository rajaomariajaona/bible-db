document_id: EZK.28,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-10: cf. És 23:8, 9; 14:11-15; 2:12, etc.'
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: text
    content: Tu mourras de la mort des incirconcis,
  - type: text
    content: Par la main des étrangers.
  - type: text
    content: Car moi, j’ai parlé,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  - type: heading
    content: 'V. 11-19: cf. Éz 27.'
  '11':
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '12':
  - type: text
    content: Fils de l’homme,
  - type: text
    content: Prononce une complainte sur le roi de Tyr!
  - type: text
    content: 'Tu lui diras: Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Tu mettais le sceau à la perfection,
  - type: text
    content: 'Tu étais plein de sagesse, '
  - type: note
    content: Éz 27:3.
  - type: text
    content: parfait en beauté.
  '13':
  - type: text
    content: Tu étais en Éden, le jardin de Dieu;
  - type: text
    content: Tu étais couvert de toute espèce de pierres précieuses,
  - type: text
    content: De sardoine, de topaze, de diamant,
  - type: text
    content: De chrysolithe, d’onyx, de jaspe,
  - type: text
    content: De saphir, d’escarboucle, d’émeraude, et d’or;
  - type: text
    content: Tes tambourins et tes flûtes étaient à ton service,
  - type: text
    content: Préparés pour le jour où tu fus créé.
  '14':
  - type: text
    content: Tu étais un chérubin protecteur, aux ailes déployées;
  - type: text
    content: Je t’avais placé et tu étais sur la sainte montagne de Dieu;
  - type: text
    content: Tu marchais au milieu des pierres étincelantes.
  '15':
  - type: text
    content: Tu as été intègre dans tes voies,
  - type: text
    content: Depuis le jour où tu fus créé
  - type: text
    content: Jusqu’à celui où l’iniquité a été trouvée chez toi.
  '16':
  - type: text
    content: Par la grandeur de ton commerce
  - type: text
    content: Tu as été rempli de violence, et tu as péché;
  - type: text
    content: Je te précipite de la montagne de Dieu,
  - type: text
    content: Et je te fais disparaître, chérubin protecteur,
  - type: text
    content: Du milieu des pierres étincelantes.
  '17':
  - type: text
    content: Ton cœur s’est élevé à cause de ta beauté,
  - type: text
    content: Tu as corrompu ta sagesse par ton éclat;
  - type: text
    content: Je te jette par terre,
  - type: text
    content: Je te livre en spectacle aux rois.
  '18':
  - type: text
    content: Par la multitude de tes iniquités,
  - type: text
    content: Par l’injustice de ton commerce,
  - type: text
    content: Tu as profané tes sanctuaires;
  - type: text
    content: Je fais sortir du milieu de toi un feu qui te dévore,
  - type: text
    content: Je te réduis en cendre sur la terre,
  - type: text
    content: Aux yeux de tous ceux qui te regardent.
  '19':
  - type: text
    content: Tous ceux qui te connaissent parmi les peuples
  - type: text
    content: Sont dans la stupeur à cause de toi;
  - type: text
    content: Tu es réduit au néant, tu ne seras plus à jamais!
  - type: heading
    content: 'V. 20-26: cf. (Jé 25:17, 22, 27; 27:2-8.) Éz 37:21-28.'
  '2':
  - type: text
    content: 'Fils de l’homme, dis au prince de Tyr:'
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: 'Ton cœur s’est élevé, et tu as dit:'
  - type: text
    content: Je suis Dieu,
  - type: text
    content: Je suis assis sur le siège de Dieu, au sein des mers!
  - type: text
    content: 'Toi, tu es '
  - type: note
    content: És 31:3.
  - type: text
    content: homme et non Dieu,
  - type: text
    content: Et tu prends ta volonté pour la volonté de Dieu.
  '20':
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '21':
  - type: text
    content: Fils de l’homme, tourne ta face vers Sidon,
  - type: text
    content: Et prophétise contre elle!
  '22':
  - type: text
    content: 'Tu diras: Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Voici, j’en veux à toi, Sidon!
  - type: text
    content: Je serai glorifié au milieu de toi;
  - type: text
    content: Et ils sauront que je suis l’Éternel,
  - type: text
    content: Quand j’exercerai mes jugements contre elle,
  - type: text
    content: Quand je manifesterai ma sainteté au milieu d’elle.
  '23':
  - type: text
    content: J’enverrai la peste dans son sein,
  - type: text
    content: Je ferai couler le sang dans ses rues;
  - type: text
    content: Les morts tomberont au milieu d’elle
  - type: text
    content: Par l’épée qui de toutes parts viendra la frapper.
  - type: text
    content: Et ils sauront que je suis l’Éternel.
  '24':
  - type: text
    content: Alors elle ne sera plus pour la maison d’Israël
  - type: text
    content: Une épine qui blesse, une ronce déchirante,
  - type: text
    content: Parmi tous ceux qui l’entourent et qui la méprisent.
  - type: text
    content: Et ils sauront que je suis le Seigneur, l’Éternel.
  '25':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel: Lorsque je rassemblerai la maison d’Israël du milieu des peuples où elle est dispersée, je manifesterai en elle ma sainteté aux yeux des nations, et ils habiteront leur pays que j’ai donné à mon serviteur Jacob. '
  '26':
  - type: text
    content: 'Ils y habiteront en sécurité, et ils bâtiront des maisons et '
  - type: note
    content: Jé 31:5.
  - type: text
    content: planteront des vignes; ils y habiteront en sécurité, quand j’exercerai mes jugements contre tous ceux qui les entourent et qui les méprisent. Et ils sauront que je suis l’Éternel, leur Dieu.
  '3':
  - type: text
    content: Voici, tu es plus sage que Daniel,
  - type: text
    content: Rien de secret n’est caché pour toi;
  '4':
  - type: text
    content: Par ta sagesse et par ton intelligence
  - type: text
    content: Tu t’es acquis des richesses,
  - type: text
    content: Tu as amassé de l’or et de l’argent
  - type: text
    content: Dans tes trésors;
  '5':
  - type: text
    content: Par ta grande sagesse et par ton commerce
  - type: text
    content: Tu as accru tes richesses,
  - type: text
    content: Et par tes richesses ton cœur s’est élevé.
  '6':
  - type: text
    content: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Parce que tu prends ta volonté pour la volonté de Dieu,
  '7':
  - type: text
    content: Voici, je ferai venir contre toi des étrangers,
  - type: text
    content: 'Les '
  - type: note
    content: Jé 6:23.
  - type: text
    content: plus violents d’entre les peuples;
  - type: text
    content: Ils tireront l’épée contre ton éclatante sagesse,
  - type: text
    content: Et ils souilleront ta beauté.
  '8':
  - type: text
    content: Ils te précipiteront dans la fosse,
  - type: text
    content: Et tu mourras comme ceux qui tombent percés de coups,
  - type: text
    content: Au milieu des mers.
  '9':
  - type: text
    content: 'En face de ton meurtrier, diras-tu: Je suis Dieu?'
  - type: text
    content: Tu seras homme et non Dieu
  - type: text
    content: Sous la main de celui qui te tuera.
