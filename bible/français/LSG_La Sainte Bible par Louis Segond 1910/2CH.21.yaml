document_id: 2CH.21,93
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 1 R 22:51. 2 R 8:16.
  - type: text
    content: Josaphat se coucha avec ses pères, et il fut enterré avec ses pères dans la ville de David. Et Joram, son fils, régna à sa place.
  - type: heading
    content: Joram, roi de Juda. Invasion des Philistins et des Arabes
  - type: heading
    content: 'V. 2-20: cf. 2 R 8:16-24. (2 Ch 28:1-8, 17-19. Ac 12:23.)'
  '10':
  - type: note
    content: 2 R 8:22.
  - type: text
    content: 'La rébellion d’Édom contre l’autorité de Juda a duré jusqu’à ce jour. Libna se révolta dans le même temps contre son autorité, parce qu’il avait abandonné l’Éternel, le Dieu de ses pères. '
  '11':
  - type: text
    content: 'Joram fit même des hauts lieux dans les montagnes de Juda; il poussa les habitants de Jérusalem à la prostitution, et il séduisit Juda. '
  '12':
  - type: text
    content: 'Il lui vint un écrit du prophète Élie, disant: Ainsi parle l’Éternel, le Dieu de David, ton père: Parce que tu n’as pas marché dans les voies de Josaphat, ton père, et dans les voies d’Asa, roi de Juda, '
  '13':
  - type: text
    content: 'mais que tu as marché dans la voie des rois d’Israël; parce que tu as entraîné à la prostitution Juda et les habitants de Jérusalem, comme l’a fait la maison d’Achab à l’égard d’Israël; et parce que tu as fait mourir tes frères, meilleurs que toi, la maison même de ton père; '
  '14':
  - type: text
    content: 'voici, l’Éternel frappera ton peuple d’une grande plaie, tes fils, tes femmes, et tout ce qui t’appartient; '
  '15':
  - type: text
    content: 'et toi, il te frappera d’une maladie violente, d’une maladie d’entrailles, qui augmentera de jour en jour jusqu’à ce que tes entrailles sortent par la force du mal. '
  '16':
  - type: text
    content: 'Et l’Éternel excita contre Joram l’esprit des Philistins et des Arabes qui sont dans le voisinage des Éthiopiens. '
  '17':
  - type: text
    content: 'Ils montèrent contre Juda, y firent une invasion, pillèrent toutes les richesses qui se trouvaient dans la maison du roi, et emmenèrent ses fils et ses femmes, de sorte qu’il ne lui resta d’autre fils que Joachaz, le plus jeune de ses fils. '
  '18':
  - type: text
    content: 'Après tout cela, l’Éternel le frappa d’une maladie d’entrailles qui était sans remède; '
  '19':
  - type: text
    content: 'elle augmenta de jour en jour, et sur la fin de la seconde année les entrailles de Joram sortirent par la force de son mal. Il mourut dans de violentes souffrances; et son peuple ne brûla point de parfums en son honneur, comme il l’avait fait pour ses pères. '
  '2':
  - type: text
    content: 'Joram avait des frères, fils de Josaphat: Azaria, Jehiel, Zacharie, Azaria, Micaël et Schephathia, tous fils de Josaphat, roi d’Israël. '
  '20':
  - type: text
    content: Il avait trente-deux ans lorsqu’il devint roi, et il régna huit ans à Jérusalem. Il s’en alla sans être regretté, et on l’enterra dans la ville de David, mais non dans les sépulcres des rois.
  '3':
  - type: text
    content: 'Leur père leur avait donné des présents considérables en argent, en or, et en objets précieux, avec des villes fortes en Juda; mais il laissa le royaume à Joram, parce qu’il était le premier-né. '
  '4':
  - type: text
    content: 'Lorsque Joram eut pris possession du royaume de son père et qu’il se fut fortifié, il fit mourir par l’épée tous ses frères et quelques-uns aussi des chefs d’Israël. '
  '5':
  - type: note
    content: 2 R 8:17.
  - type: text
    content: 'Joram avait trente-deux ans lorsqu’il devint roi, et il régna huit ans à Jérusalem. '
  '6':
  - type: text
    content: 'Il marcha dans la voie des rois d’Israël, comme avait fait la maison d’Achab, car il avait pour femme une fille d’Achab, et il fit ce qui est mal aux yeux de l’Éternel. '
  '7':
  - type: text
    content: 'Mais l’Éternel ne voulut point détruire la maison de David, à cause de l’alliance '
  - type: note
    content: 2 S 7:12. 1 R 11:36. Ps 132:11, 17.
  - type: text
    content: 'qu’il avait traitée avec David et de la '
  - type: note
    content: 1 R 11:36.
  - type: text
    content: 'promesse qu’il avait faite de lui donner toujours une lampe, à lui et à ses fils. '
  '8':
  - type: note
    content: 2 R 8:20.
  - type: text
    content: 'De son temps, Édom se révolta contre l’autorité de Juda, et se donna un roi. '
  '9':
  - type: text
    content: 'Joram partit avec ses chefs et tous ses chars; s’étant levé de nuit, '
  - type: note
    content: 2 R 8:21.
  - type: text
    content: 'il battit les Édomites qui l’entouraient et les chefs des chars. '
