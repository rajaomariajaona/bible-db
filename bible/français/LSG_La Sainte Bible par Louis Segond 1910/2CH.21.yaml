    marker-yv: yv-n
  - type: text
    text: Josaphat se coucha avec ses pères, et il fut enterré avec ses pères dans la ville de David. Et Joram, son fils, régna à sa place.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joram, roi de Juda. Invasion des Philistins et des Arabes
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 2-20: cf. 2 R 8:16-24. (2 Ch 28:1-8, 17-19. Ac 12:23.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Joram avait des frères, fils de Josaphat: Azaria, Jehiel, Zacharie, Azaria, Micaël et Schephathia, tous fils de Josaphat, roi d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Leur père leur avait donné des présents considérables en argent, en or, et en objets précieux, avec des villes fortes en Juda; mais il laissa le royaume à Joram, parce qu’il était le premier-né. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Lorsque Joram eut pris possession du royaume de son père et qu’il se fut fortifié, il fit mourir par l’épée tous ses frères et quelques-uns aussi des chefs d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 8:17
      metadata:
        usfm: 2KI.8.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Joram avait trente-deux ans lorsqu’il devint roi, et il régna huit ans à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il marcha dans la voie des rois d’Israël, comme avait fait la maison d’Achab, car il avait pour femme une fille d’Achab, et il fit ce qui est mal aux yeux de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais l’Éternel ne voulut point détruire la maison de David, à cause de l’alliance '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:12
      metadata:
        usfm: 2SA.7.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 11:36
      metadata:
        usfm: 1KI.11.36
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 132:11
      metadata:
        usfm: PSA.132.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '17'
      metadata:
        usfm: PSA.132.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’il avait traitée avec David et de la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 11:36
      metadata:
        usfm: 1KI.11.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'promesse qu’il avait faite de lui donner toujours une lampe, à lui et à ses fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 8:20
      metadata:
        usfm: 2KI.8.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'De son temps, Édom se révolta contre l’autorité de Juda, et se donna un roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Joram partit avec ses chefs et tous ses chars; s’étant levé de nuit, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 8:21
      metadata:
        usfm: 2KI.8.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il battit les Édomites qui l’entouraient et les chefs des chars. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 8:22
      metadata:
        usfm: 2KI.8.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'La rébellion d’Édom contre l’autorité de Juda a duré jusqu’à ce jour. Libna se révolta dans le même temps contre son autorité, parce qu’il avait abandonné l’Éternel, le Dieu de ses pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Joram fit même des hauts lieux dans les montagnes de Juda; il poussa les habitants de Jérusalem à la prostitution, et il séduisit Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il lui vint un écrit du prophète Élie, disant: Ainsi parle l’Éternel, le Dieu de David, ton père: Parce que tu n’as pas marché dans les voies de Josaphat, ton père, et dans les voies d’Asa, roi de Juda, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'mais que tu as marché dans la voie des rois d’Israël; parce que tu as entraîné à la prostitution Juda et les habitants de Jérusalem, comme l’a fait la maison d’Achab à l’égard d’Israël; et parce que tu as fait mourir tes frères, meilleurs que toi, la maison même de ton père; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'voici, l’Éternel frappera ton peuple d’une grande plaie, tes fils, tes femmes, et tout ce qui t’appartient; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et toi, il te frappera d’une maladie violente, d’une maladie d’entrailles, qui augmentera de jour en jour jusqu’à ce que tes entrailles sortent par la force du mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et l’Éternel excita contre Joram l’esprit des Philistins et des Arabes qui sont dans le voisinage des Éthiopiens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils montèrent contre Juda, y firent une invasion, pillèrent toutes les richesses qui se trouvaient dans la maison du roi, et emmenèrent ses fils et ses femmes, de sorte qu’il ne lui resta d’autre fils que Joachaz, le plus jeune de ses fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Après tout cela, l’Éternel le frappa d’une maladie d’entrailles qui était sans remède; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'elle augmenta de jour en jour, et sur la fin de la seconde année les entrailles de Joram sortirent par la force de son mal. Il mourut dans de violentes souffrances; et son peuple ne brûla point de parfums en son honneur, comme il l’avait fait pour ses pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il avait trente-deux ans lorsqu’il devint roi, et il régna huit ans à Jérusalem. Il s’en alla sans être regretté, et on l’enterra dans la ville de David, mais non dans les sépulcres des rois.
