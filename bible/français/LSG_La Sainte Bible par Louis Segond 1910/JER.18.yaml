document_id: JER.18,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le vase du potier et l’impénitence du peuple
  - type: heading
    content: 'V. 1-10: cf. Ro 9:14-23. Éz 18:21, etc.'
  - type: text
    content: 'La parole qui fut adressée à Jérémie de la part de l’Éternel, en ces mots:'
  '10':
  - type: text
    content: Mais si cette nation fait ce qui est mal à mes yeux,
  - type: text
    content: Et n’écoute pas ma voix,
  - type: text
    content: Je me repens du bien que j’avais eu l’intention de lui faire.
  - type: heading
    content: 'V. 11-17: cf. Jé 25:1-11.'
  '11':
  - type: text
    content: 'Parle maintenant aux hommes de Juda et aux habitants de Jérusalem, et dis:'
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Voici, je prépare contre vous un malheur,
  - type: text
    content: Je médite un projet contre vous.
  - type: note
    content: 2 R 17:13. Jé 7:3; 25:5; 26:13; 35:15.
  - type: text
    content: Revenez chacun de votre mauvaise voie,
  - type: text
    content: Réformez vos voies et vos œuvres!
  '12':
  - type: text
    content: 'Mais ils disent: '
  - type: note
    content: Jé 2:25.
  - type: text
    content: C’est en vain!
  - type: text
    content: Car nous suivrons nos pensées,
  - type: text
    content: Nous agirons chacun selon les penchants de notre mauvais cœur.
  '13':
  - type: text
    content: 'C’est pourquoi ainsi parle l’Éternel:'
  - type: note
    content: Jé 2:10.
  - type: text
    content: Interrogez les nations!
  - type: text
    content: Qui a jamais entendu pareilles choses?
  - type: text
    content: La vierge d’Israël a commis d’horribles excès.
  '14':
  - type: text
    content: La neige du Liban abandonne-t-elle le rocher des champs?
  - type: text
    content: Ou voit-on tarir les eaux qui viennent de loin, fraîches et courantes?
  '15':
  - type: text
    content: 'Cependant mon peuple m’a '
  - type: note
    content: Jé 2:32; 3:21; 13:25.
  - type: text
    content: oublié, il offre de l’encens à des idoles;
  - type: text
    content: 'Il a été conduit à chanceler dans ses voies, à quitter les '
  - type: note
    content: Jé 6:16.
  - type: text
    content: anciens sentiers,
  - type: text
    content: Pour suivre des sentiers, des chemins non frayés.
  '16':
  - type: text
    content: 'Ils ont fait de leur pays, '
  - type: note
    content: Jé 12:11; 19:8; 49:13; 50:13.
  - type: text
    content: un objet de désolation, d’éternelle moquerie;
  - type: text
    content: Tous ceux qui y passent sont stupéfaits et secouent la tête.
  '17':
  - type: text
    content: 'Pareil au '
  - type: note
    content: És 27:8; 29:6. Jé 4:11, 12, 13.
  - type: text
    content: 'vent d’orient, je les '
  - type: note
    content: Jé 13:24.
  - type: text
    content: disperserai devant l’ennemi;
  - type: text
    content: Je leur tournerai le dos, je ne les regarderai pas au jour de leur détresse.
  - type: heading
    content: Complot contre Jérémie
  - type: heading
    content: 'V. 18-23: cf. Ps 35. Né 4:4, 5.'
  '18':
  - type: text
    content: 'Et ils ont dit:'
  - type: text
    content: Venez, complotons contre Jérémie!
  - type: text
    content: 'Car '
  - type: note
    content: Mal 2:7.
  - type: text
    content: la loi ne périra pas faute de sacrificateurs,
  - type: text
    content: Ni le conseil faute de sages, ni la parole faute de prophètes.
  - type: text
    content: 'Venez, tuons-le avec la '
  - type: note
    content: Jé 9:8.
  - type: text
    content: langue;
  - type: text
    content: Ne prenons pas garde à tous ses discours!
  '19':
  - type: text
    content: Écoute-moi, Éternel!
  - type: text
    content: Et entends la voix de mes adversaires!
  '2':
  - type: text
    content: Lève-toi, et descends dans la maison du potier;
  - type: text
    content: Là, je te ferai entendre mes paroles.
  '20':
  - type: text
    content: Le mal sera-t-il rendu pour le bien?
  - type: text
    content: Car ils ont creusé une fosse pour m’ôter la vie.
  - type: text
    content: Souviens-t’en, je me suis tenu devant toi,
  - type: text
    content: Afin de parler en leur faveur,
  - type: text
    content: Et de détourner d’eux ta colère.
  '21':
  - type: text
    content: 'C’est pourquoi livre leurs enfants à la '
  - type: note
    content: Ps 109:10.
  - type: text
    content: famine,
  - type: text
    content: Précipite-les par le glaive;
  - type: text
    content: Que leurs femmes soient privées d’enfants et deviennent veuves,
  - type: text
    content: Et que leurs maris soient enlevés par la peste;
  - type: text
    content: Que leurs jeunes gens soient frappés par l’épée dans le combat!
  '22':
  - type: text
    content: Qu’on entende des cris sortir de leurs maisons,
  - type: text
    content: Quand soudain tu feras fondre sur eux des bandes armées!
  - type: text
    content: Car ils ont creusé une fosse pour me prendre,
  - type: text
    content: Ils ont tendu des filets sous mes pieds.
  '23':
  - type: text
    content: Et toi, Éternel, tu connais tous leurs complots pour me faire mourir;
  - type: text
    content: Ne pardonne pas leur iniquité,
  - type: text
    content: N’efface pas leur péché de devant toi!
  - type: text
    content: Qu’ils soient renversés en ta présence!
  - type: text
    content: Agis contre eux au temps de ta colère!
  '3':
  - type: text
    content: Je descendis dans la maison du potier,
  - type: text
    content: Et voici, il travaillait sur un tour.
  '4':
  - type: text
    content: Le vase qu’il faisait ne réussit pas,
  - type: text
    content: Comme il arrive à l’argile dans la main du potier;
  - type: text
    content: Il en refit un autre vase,
  - type: text
    content: Tel qu’il trouva bon de le faire.
  '5':
  - type: text
    content: 'Et la parole de l’Éternel me fut adressée, en ces mots:'
  '6':
  - type: text
    content: ' '
  - type: note
    content: És 45:9. Ro 9:20.
  - type: text
    content: Ne puis-je pas agir envers vous comme ce potier, maison d’Israël?
  - type: text
    content: Dit l’Éternel.
  - type: text
    content: 'Voici, '
  - type: note
    content: És 64:8.
  - type: text
    content: comme l’argile est dans la main du potier,
  - type: text
    content: Ainsi vous êtes dans ma main, maison d’Israël!
  '7':
  - type: text
    content: Soudain je parle, sur une nation, sur un royaume,
  - type: note
    content: Jé 1:10.
  - type: text
    content: D’arracher, d’abattre et de détruire;
  '8':
  - type: text
    content: Mais si cette nation, sur laquelle j’ai parlé, revient de sa méchanceté,
  - type: text
    content: Je me repens du mal que j’avais pensé lui faire.
  '9':
  - type: text
    content: Et soudain je parle, sur une nation, sur un royaume,
  - type: text
    content: De bâtir et de planter;
