document_id: JER.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le vase du potier et l’impénitence du peuple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. Ro 9:14-23. Éz 18:21, etc.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole qui fut adressée à Jérémie de la part de l’Éternel, en ces mots:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Lève-toi, et descends dans la maison du potier;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Là, je te ferai entendre mes paroles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je descendis dans la maison du potier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et voici, il travaillait sur un tour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Le vase qu’il faisait ne réussit pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme il arrive à l’argile dans la main du potier;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il en refit un autre vase,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tel qu’il trouva bon de le faire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et la parole de l’Éternel me fut adressée, en ces mots:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 45:9
      metadata:
        usfm: ISA.45.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:20
      metadata:
        usfm: ROM.9.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ne puis-je pas agir envers vous comme ce potier, maison d’Israël?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 64:8
      metadata:
        usfm: ISA.64.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: comme l’argile est dans la main du potier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi vous êtes dans ma main, maison d’Israël!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Soudain je parle, sur une nation, sur un royaume,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 1:10
      metadata:
        usfm: JER.1.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: D’arracher, d’abattre et de détruire;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais si cette nation, sur laquelle j’ai parlé, revient de sa méchanceté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me repens du mal que j’avais pensé lui faire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Et soudain je parle, sur une nation, sur un royaume,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De bâtir et de planter;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mais si cette nation fait ce qui est mal à mes yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et n’écoute pas ma voix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me repens du bien que j’avais eu l’intention de lui faire.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-17: cf. Jé 25:1-11.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Parle maintenant aux hommes de Juda et aux habitants de Jérusalem, et dis:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, je prépare contre vous un malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je médite un projet contre vous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 17:13
      metadata:
        usfm: 2KI.17.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:3
      metadata:
        usfm: JER.7.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:5
      metadata:
        usfm: JER.25.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:13
      metadata:
        usfm: JER.26.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 35:15
      metadata:
        usfm: JER.35.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Revenez chacun de votre mauvaise voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Réformez vos voies et vos œuvres!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais ils disent: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:25
      metadata:
        usfm: JER.2.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: C’est en vain!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car nous suivrons nos pensées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous agirons chacun selon les penchants de notre mauvais cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'C’est pourquoi ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:10
      metadata:
        usfm: JER.2.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Interrogez les nations!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a jamais entendu pareilles choses?
- type: usfm
  marker: q1
  children:
  - type: text
    text: La vierge d’Israël a commis d’horribles excès.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: La neige du Liban abandonne-t-elle le rocher des champs?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou voit-on tarir les eaux qui viennent de loin, fraîches et courantes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Cependant mon peuple m’a '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:32
      metadata:
        usfm: JER.2.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:21
      metadata:
        usfm: JER.3.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:25
      metadata:
        usfm: JER.13.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: oublié, il offre de l’encens à des idoles;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il a été conduit à chanceler dans ses voies, à quitter les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 6:16
      metadata:
        usfm: JER.6.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: anciens sentiers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour suivre des sentiers, des chemins non frayés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils ont fait de leur pays, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 12:11
      metadata:
        usfm: JER.12.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:8
      metadata:
        usfm: JER.19.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 49:13
      metadata:
        usfm: JER.49.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 50:13
      metadata:
        usfm: JER.50.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: un objet de désolation, d’éternelle moquerie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui y passent sont stupéfaits et secouent la tête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Pareil au '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 27:8
      metadata:
        usfm: ISA.27.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:6
      metadata:
        usfm: ISA.29.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 4:11
      metadata:
        usfm: JER.4.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: JER.4.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: JER.4.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vent d’orient, je les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 13:24
      metadata:
        usfm: JER.13.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: disperserai devant l’ennemi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je leur tournerai le dos, je ne les regarderai pas au jour de leur détresse.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Complot contre Jérémie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-23: cf. Ps 35. Né 4:4, 5.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et ils ont dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Venez, complotons contre Jérémie!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal 2:7
      metadata:
        usfm: MAL.2.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: la loi ne périra pas faute de sacrificateurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni le conseil faute de sages, ni la parole faute de prophètes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Venez, tuons-le avec la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 9:8
      metadata:
        usfm: JER.9.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: langue;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne prenons pas garde à tous ses discours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Écoute-moi, Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et entends la voix de mes adversaires!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le mal sera-t-il rendu pour le bien?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils ont creusé une fosse pour m’ôter la vie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Souviens-t’en, je me suis tenu devant toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin de parler en leur faveur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de détourner d’eux ta colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'C’est pourquoi livre leurs enfants à la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 109:10
      metadata:
        usfm: PSA.109.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: famine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Précipite-les par le glaive;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que leurs femmes soient privées d’enfants et deviennent veuves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que leurs maris soient enlevés par la peste;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que leurs jeunes gens soient frappés par l’épée dans le combat!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Qu’on entende des cris sortir de leurs maisons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand soudain tu feras fondre sur eux des bandes armées!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils ont creusé une fosse pour me prendre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont tendu des filets sous mes pieds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Et toi, Éternel, tu connais tous leurs complots pour me faire mourir;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne pardonne pas leur iniquité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’efface pas leur péché de devant toi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils soient renversés en ta présence!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Agis contre eux au temps de ta colère!
