document_id: 2SA.15,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Révolte d’Absalom
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-12: cf. 1 R 1:5-26.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, Absalom se procura un char et des chevaux, et cinquante hommes qui couraient devant lui. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Absalom envoya des espions dans toutes les tribus d’Israël, pour dire: Quand vous entendrez le son de la trompette, vous direz: Absalom règne à Hébron. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Deux cents hommes de Jérusalem, qui avaient été invités, accompagnèrent Absalom; et ils le firent en toute simplicité, sans rien savoir. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pendant qu’Absalom offrait les sacrifices, il envoya chercher à la ville de Guilo Achitophel, le Guilonite, conseiller de David. La conjuration devint puissante, et le peuple était de plus en plus nombreux auprès d’Absalom.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fuite de David. Entrée d’Absalom dans Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-37: cf. Ps 3. (2 S 16:15-23; 17:1-23.)'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelqu’un vint informer David, et lui dit: Le cœur des hommes d’Israël s’est tourné vers Absalom. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et David dit à tous ses serviteurs qui étaient avec lui à Jérusalem: Levez-vous, fuyons, car il n’y aura point de salut pour nous devant Absalom. Hâtez-vous de partir; sinon, il ne tarderait pas à nous atteindre, et il nous précipiterait dans le malheur et frapperait la ville du tranchant de l’épée. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les serviteurs du roi lui dirent: Tes serviteurs feront tout ce que voudra mon seigneur le roi. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi sortit, et toute sa maison le suivait, et il laissa dix concubines pour garder la maison. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi sortit, et tout le peuple le suivait, et ils s’arrêtèrent à la dernière maison. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous ses serviteurs, tous les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 8:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 1:38
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 18:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Kéréthiens et tous les Péléthiens, passèrent à ses côtés; et tous les Gathiens, au nombre de six cents hommes, venus de Gath à sa suite, passèrent devant le roi. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi dit à Ittaï de Gath: Pourquoi viendrais-tu aussi avec nous? Retourne, et reste avec le roi, car tu es étranger, et même tu as été emmené de ton pays. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il se levait de bon matin, et se tenait au bord du chemin de la porte. Et chaque fois qu’un homme ayant une contestation se rendait vers le roi pour obtenir un jugement, Absalom l’appelait, et disait: De quelle ville es-tu? Lorsqu’il avait répondu: Je suis d’une telle tribu d’Israël, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu es arrivé d’hier, et aujourd’hui je te ferais errer avec nous çà et là, quand je ne sais moi-même où je vais! Retourne, et emmène tes frères avec toi. Que l’Éternel use envers toi de bonté et de fidélité! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ittaï répondit au roi, et dit: L’Éternel est vivant et mon seigneur le roi est vivant! Au lieu où sera mon seigneur le roi, soit pour mourir, soit pour vivre, là aussi sera ton serviteur. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David dit alors à Ittaï: Va, passe! Et Ittaï de Gath passa, avec tous ses gens et tous les enfants qui étaient avec lui. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toute la contrée était en larmes et l’on poussait de grands cris, au passage de tout le peuple. Le roi passa le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 18:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'torrent de Cédron, et tout le peuple passa vis-à-vis du chemin qui mène au désert. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsadok était aussi là, et avec lui tous les Lévites portant l’arche de l’alliance de Dieu; et ils posèrent l’arche de Dieu, et Abiathar montait, pendant que tout le peuple achevait de sortir de la ville. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi dit à Tsadok: Reporte l’arche de Dieu dans la ville. Si je trouve grâce aux yeux de l’Éternel, il me ramènera, et il me fera voir l’arche et sa demeure. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais s’il dit: Je ne prends point plaisir en toi! Me voici, qu’il me fasse ce qui lui semblera bon. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi dit encore au sacrificateur Tsadok: Comprends-tu? Retourne en paix dans la ville, avec Achimaats, ton fils, et avec Jonathan, fils d’Abiathar, vos deux fils. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voyez, j’attendrai dans les plaines du désert, jusqu’à ce qu’il m’arrive des nouvelles de votre part. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi Tsadok et Abiathar reportèrent l’arche de Dieu à Jérusalem, et ils y restèrent. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Absalom lui disait: Vois, ta cause est bonne et juste; mais personne de chez le roi ne t’écoutera. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David monta la colline des oliviers. Il montait en pleurant et la tête couverte, et il marchait nu-pieds; et tous ceux qui étaient avec lui se couvrirent aussi la tête, et ils montaient en pleurant. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On vint dire à David: Achitophel est avec Absalom parmi les conjurés. Et David dit: O Éternel, réduis à néant les conseils d’Achitophel! '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque David fut arrivé au sommet, où il se prosterna devant Dieu, voici, Huschaï, l’Arkien, vint au-devant de lui, la tunique déchirée et la tête couverte de terre. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David lui dit: Si tu viens avec moi, tu me seras à charge. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et, au contraire, tu anéantiras en ma faveur les conseils d’Achitophel, si tu retournes à la ville, et que tu dises à Absalom: O roi, je serai ton serviteur; je fus autrefois le serviteur de ton père, mais je suis maintenant ton serviteur. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les sacrificateurs Tsadok et Abiathar ne seront-ils pas là avec toi? Tout ce que tu apprendras de la maison du roi, tu le diras aux sacrificateurs Tsadok et Abiathar. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et comme ils ont là auprès d’eux leurs deux fils, Achimaats, fils de Tsadok, et Jonathan, fils d’Abiathar, c’est par eux que vous me ferez savoir tout ce que vous aurez appris. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Huschaï, ami de David, retourna donc à la ville. Et Absalom entra dans Jérusalem.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Absalom disait: Qui m’établira juge dans le pays? Tout homme qui aurait une contestation et un procès viendrait à moi, et je lui ferais justice. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et quand quelqu’un s’approchait pour se prosterner devant lui, il lui tendait la main, le saisissait et l’embrassait. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Absalom agissait ainsi à l’égard de tous ceux d’Israël, qui se rendaient vers le roi pour demander justice. Et Absalom gagnait le cœur des gens d’Israël. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au bout de quarante ans, Absalom dit au roi: Permets que j’aille à Hébron, pour accomplir le vœu que j’ai fait à l’Éternel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car ton serviteur a fait un vœu, pendant que je demeurais à Gueschur en Syrie; j’ai dit: Si l’Éternel me ramène à Jérusalem, je servirai l’Éternel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi lui dit: Va en paix. Et Absalom se leva et partit pour Hébron. '
