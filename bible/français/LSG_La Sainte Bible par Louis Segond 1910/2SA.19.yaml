document_id: 2SA.19,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David retourne à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. 2 S 18:5, 31-33. Jé 31:15. Ec 3:4.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On vint dire à Joab: Voici, le roi pleure et se lamente à cause d’Absalom. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or Absalom, que nous avions oint pour qu’il régnât sur nous, est mort dans la bataille: pourquoi ne parlez-vous pas de faire revenir le roi? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De son côté, le roi David envoya dire aux sacrificateurs Tsadok et Abiathar: Parlez aux anciens de Juda, et dites-leur: Pourquoi seriez-vous les derniers à ramener le roi dans sa maison? Car ce qui se disait dans tout Israël était parvenu jusqu’au roi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous êtes mes frères, vous êtes mes os et ma chair; pourquoi seriez-vous les derniers à ramener le roi? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous direz aussi à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 17:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Amasa: N’es-tu pas mon os et ma chair? Que Dieu me traite dans toute sa rigueur, si tu ne deviens pas devant moi pour toujours chef de l’armée à la place de Joab! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David fléchit le cœur de tous ceux de Juda, comme s’ils n’eussent été qu’un seul homme; et ils envoyèrent dire au roi: Reviens, toi, et tous tes serviteurs. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le roi revint et arriva jusqu’au Jourdain; et Juda se rendit à Guilgal, afin d’aller à la rencontre du roi et de lui faire passer le Jourdain.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-23: cf. (2 S 16:5-13. 1 R 2:8, 9, 36-46.) És 55:7.'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 16:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 2:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Schimeï, fils de Guéra, Benjamite, qui était de Bachurim, se hâta de descendre avec ceux de Juda à la rencontre du roi David. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il avait avec lui mille hommes de Benjamin, et Tsiba, serviteur de la maison de Saül, et les quinze fils et les vingt serviteurs de Tsiba. Ils passèrent le Jourdain à la vue du roi. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le bateau, mis à la disposition du roi, faisait la traversée pour transporter sa maison; et au moment où le roi allait passer le Jourdain, Schimeï, fils de Guéra, se prosterna devant lui. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il dit au roi: Que mon seigneur ne tienne pas compte de mon iniquité, qu’il oublie que ton serviteur l’a offensé le jour où le roi mon seigneur sortait de Jérusalem, et que le roi n’y ait point égard! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et la victoire, ce jour-là, fut changée en deuil pour tout le peuple, car en ce jour le peuple entendait dire: Le roi est affligé à cause de son fils. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car ton serviteur reconnaît qu’il a péché. Et voici, je viens aujourd’hui le premier de toute la maison de Joseph à la rencontre du roi mon seigneur. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Abischaï, fils de Tseruja, prit la parole et dit: Schimeï ne doit-il pas mourir pour avoir maudit l’oint de l’Éternel? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais David dit: Qu’ai-je affaire avec vous, fils de Tseruja, et pourquoi vous montrez-vous aujourd’hui mes adversaires? Aujourd’hui ferait-on mourir un homme en Israël? Ne sais-je donc pas que je règne aujourd’hui sur Israël? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et le roi dit à Schimeï: Tu ne mourras point! Et le roi le lui jura.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 24-30: cf. 2 S 16:1-4. Ps 37:6.'
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mephiboscheth, fils de Saül, descendit aussi à la rencontre du roi. Il n’avait point soigné ses pieds, ni fait sa barbe, ni lavé ses vêtements, depuis le jour où le roi s’en était allé jusqu’à celui où il revenait en paix. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’il se rendit au-devant du roi à Jérusalem, le roi lui dit: Pourquoi n’es-tu pas venu avec moi, Mephiboscheth? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il répondit: O roi mon seigneur, mon serviteur m’a trompé, car ton serviteur, qui est boiteux, avait dit: Je ferai seller mon âne, je le monterai, et j’irai avec le roi. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 16:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et il a calomnié ton serviteur auprès de mon seigneur le roi. Mais mon seigneur le roi est comme un ange de Dieu. Fais ce qui te semblera bon. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car tous ceux de la maison de mon père n’ont été que des gens dignes de mort devant le roi mon seigneur; et cependant tu as mis ton serviteur au nombre de ceux qui mangent à ta table. Quel droit puis-je encore avoir, et qu’ai-je à demander au roi? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi lui dit: A quoi bon toutes tes paroles? Je l’ai déclaré: Toi et Tsiba, vous partagerez les terres. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce même jour, le peuple rentra dans la ville à la dérobée, comme l’auraient fait des gens honteux d’avoir pris la fuite dans le combat. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Mephiboscheth dit au roi: Qu’il prenne même le tout, puisque le roi mon seigneur rentre en paix dans sa maison.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 31-43: cf. (2 S 17:27-29. 1 R 2:7.) 2 S 20:1, etc. Mt 10:41, 42; 25:34-40.'
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Barzillaï, le Galaadite, descendit de Roguelim, et passa le Jourdain avec le roi, pour l’accompagner jusqu’au-delà du Jourdain. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Barzillaï était très vieux, âgé de quatre-vingts ans. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: '2 S 17:27, etc. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 2:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il avait entretenu le roi pendant son séjour à Mahanaïm, car c’était un homme fort riche. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi dit à Barzillaï: Viens avec moi, je te nourrirai chez moi à Jérusalem. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Barzillaï répondit au roi: Combien d’années vivrai-je encore, pour que je monte avec le roi à Jérusalem? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je suis aujourd’hui âgé de quatre-vingts ans. Puis-je connaître ce qui est bon et ce qui est mauvais? Ton serviteur peut-il savourer ce qu’il mange et ce qu’il boit? Puis-je encore entendre la voix des chanteurs et des chanteuses? Et pourquoi ton serviteur serait-il encore à charge à mon seigneur le roi? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ton serviteur ira un peu au-delà du Jourdain avec le roi. Pourquoi, d’ailleurs, le roi m’accorderait-il ce bienfait? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que ton serviteur s’en retourne, et que je meure dans ma ville, près du sépulcre de mon père et de ma mère! Mais voici ton serviteur Kimham, qui passera avec le roi mon seigneur; fais pour lui ce que tu trouveras bon. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi dit: Que Kimham passe avec moi, et je ferai pour lui ce qui te plaira; tout ce que tu désireras de moi, je te l’accorderai. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand tout le peuple eut passé le Jourdain et que le roi l’eut aussi passé, le roi baisa Barzillaï et le bénit. Et Barzillaï retourna dans sa demeure. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi s’était couvert le visage, et il criait à haute voix: Mon fils Absalom! Absalom, mon fils, mon fils! '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi se dirigea vers Guilgal, et Kimham l’accompagna. Tout le peuple de Juda et la moitié du peuple d’Israël avaient fait passer le Jourdain au roi. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais voici, tous les hommes d’Israël abordèrent le roi, et lui dirent: Pourquoi nos frères, les hommes de Juda, t’ont-ils enlevé, et ont-ils fait passer le Jourdain au roi, à sa maison, et à tous les gens de David? '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les hommes de Juda répondirent aux hommes d’Israël: C’est que le roi nous tient de plus près; et qu’y a-t-il là pour vous irriter? Avons-nous vécu aux dépens du roi? Nous a-t-il fait des présents? '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et les hommes d’Israël répondirent aux hommes de Juda: Le roi nous appartient dix fois autant, et David même plus qu’à vous. Pourquoi nous avez-vous méprisés? N’avons-nous pas été les premiers à proposer de faire revenir notre roi? Et les hommes de Juda parlèrent avec plus de violence que les hommes d’Israël.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joab entra dans la chambre où était le roi, et dit: Tu couvres aujourd’hui de confusion la face de tous tes serviteurs, qui ont aujourd’hui sauvé ta vie, celle de tes fils et de tes filles, celle de tes femmes et de tes concubines. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu aimes ceux qui te haïssent et tu hais ceux qui t’aiment, car tu montres aujourd’hui qu’il n’y a pour toi ni chefs ni serviteurs; et je vois maintenant que, si Absalom vivait et que nous fussions tous morts en ce jour, cela serait agréable à tes yeux. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lève-toi donc, sors, et parle au cœur de tes serviteurs! Car je jure par l’Éternel que, si tu ne sors pas, il ne restera pas un homme avec toi cette nuit; et ce sera pour toi pire que tous les malheurs qui te sont arrivés depuis ta jeunesse jusqu’à présent. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le roi se leva, et il s’assit à la porte. On fit dire à tout le peuple: Voici, le roi est assis à la porte. Et tout le peuple vint devant le roi. Cependant Israël s’était enfui, chacun dans sa tente.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-15: cf. (2 S 15:13; 20:1, 2.) Ps 30:6.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et dans toutes les tribus d’Israël, tout le peuple était en contestation, disant: Le roi nous a délivrés de la main de nos ennemis, c’est lui qui nous a sauvés de la main des Philistins; et maintenant il a dû fuir du pays devant Absalom. '
