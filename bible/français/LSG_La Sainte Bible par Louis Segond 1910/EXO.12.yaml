document_id: EXO.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Institution de la Pâque
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-28: cf. (Ex 13:3-10. Lé 23:4-8. De 16:1-8. No 28:16, etc.) (Lu 22:7-20. 1 Co 5:7, 8.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel dit à Moïse et à Aaron dans le pays d’Égypte: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ce mois-ci sera pour vous le premier des mois; il sera pour vous le premier des mois de l’année. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Parlez à toute l’assemblée d’Israël, et dites: Le dixième jour de ce mois, on prendra un agneau pour chaque famille, un agneau pour chaque maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Si la maison est trop peu nombreuse pour un agneau, on le prendra avec son plus proche voisin, selon le nombre des personnes; vous compterez pour cet agneau d’après ce que chacun peut manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 1:3
      metadata:
        usfm: LEV.1.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:21
      metadata:
        usfm: LEV.22.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal 1:8
      metadata:
        usfm: MAL.1.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:9
      metadata:
        usfm: 1PE.1.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ce sera un agneau sans défaut, mâle, âgé d’un an; vous pourrez prendre un agneau ou un chevreau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vous le garderez jusqu’au quatorzième jour de ce mois; et toute l’assemblée d’Israël l’immolera entre les deux soirs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'On prendra de son sang, et on en mettra sur les deux poteaux et sur le linteau de la porte des maisons où on le mangera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 9:11
      metadata:
        usfm: NUM.9.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 5:8
      metadata:
        usfm: 1CH.5.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Cette même nuit, on en mangera la chair, rôtie au feu; on la mangera avec des pains sans levain et des herbes amères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Vous ne le mangerez point à demi cuit et bouilli dans l’eau; mais il sera rôti au feu, avec la tête, les jambes et l’intérieur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Vous n’en laisserez rien jusqu’au matin; et, s’il en reste quelque chose le matin, vous le brûlerez au feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quand vous le mangerez, vous aurez vos reins ceints, vos souliers aux pieds, et votre bâton à la main; et vous le mangerez à la hâte. C’est la Pâque de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Cette nuit-là, je passerai dans le pays d’Égypte, et je frapperai tous les premiers-nés du pays d’Égypte, depuis les hommes jusqu’aux animaux, et j’exercerai des jugements contre tous les dieux de l’Égypte. Je suis l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le sang vous servira de signe sur les maisons où vous serez; je verrai le sang, et je passerai par-dessus vous, et il n’y aura point de plaie qui vous détruise, quand je frapperai le pays d’Égypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 5:1
      metadata:
        usfm: EXO.5.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous conserverez le souvenir de ce jour, et vous le célébrerez par une fête en l’honneur de l’Éternel; vous le célébrerez comme une loi perpétuelle pour vos descendants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Pendant sept jours, vous mangerez des pains sans levain. Dès le premier jour, il n’y aura plus de levain dans vos maisons; car toute personne qui mangera du pain levé, du premier jour au septième jour, sera retranchée d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le premier jour, vous aurez une sainte convocation; et le septième jour, vous aurez une sainte convocation. On ne fera aucun travail ces jours-là; vous pourrez seulement préparer la nourriture de chaque personne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Vous observerez la fête des pains sans levain, car c’est en ce jour même que j’aurai fait sortir vos armées du pays d’Égypte; vous observerez ce jour comme une loi perpétuelle pour vos descendants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 23:5
      metadata:
        usfm: LEV.23.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 28:16
      metadata:
        usfm: NUM.28.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le premier mois, le quatorzième jour du mois, au soir, vous mangerez des pains sans levain jusqu’au soir du vingt et unième jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Pendant sept jours, il ne se trouvera point de levain dans vos maisons; car toute personne qui mangera du pain levé sera retranchée de l’assemblée d’Israël, que ce soit un étranger ou un indigène. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Vous ne mangerez point de pain levé; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 16:3
      metadata:
        usfm: DEU.16.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dans toutes vos demeures, vous mangerez des pains sans levain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Moïse appela tous les anciens d’Israël, et leur dit: Allez prendre du bétail pour vos familles, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:28
      metadata:
        usfm: HEB.11.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et immolez la Pâque. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Vous prendrez ensuite un bouquet d’hysope, vous le tremperez dans le sang qui sera dans le bassin, et vous toucherez le linteau et les deux poteaux de la porte avec le sang qui sera dans le bassin. Nul de vous ne sortira de sa maison jusqu’au matin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Quand l’Éternel passera pour frapper l’Égypte, et verra le sang sur le linteau et sur les deux poteaux, l’Éternel passera par-dessus la porte, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:28
      metadata:
        usfm: HEB.11.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et il ne permettra pas au destructeur d’entrer dans vos maisons pour frapper. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Vous observerez cela comme une loi pour vous et pour vos enfants à perpétuité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Quand vous serez entrés dans le pays que l’Éternel vous donnera, selon sa promesse, vous observerez cet usage sacré. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 4:6
      metadata:
        usfm: JOS.4.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et lorsque vos enfants vous diront: Que signifie pour vous cet usage? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'vous répondrez: C’est le sacrifice de Pâque en l’honneur de l’Éternel, qui a passé par-dessus les maisons des enfants d’Israël en Égypte, lorsqu’il frappa l’Égypte et qu’il sauva nos maisons. Le peuple s’inclina et se prosterna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:28
      metadata:
        usfm: HEB.11.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et les enfants d’Israël s’en allèrent, et firent ce que l’Éternel avait ordonné à Moïse et à Aaron; ils firent ainsi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mort des premiers-nés
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 29-36: cf. (Ex 11:1-8. Ps 105:36-38; 136:10.) És 63:4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:51
      metadata:
        usfm: PSA.78.51
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 105:36
      metadata:
        usfm: PSA.105.36
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 135:8
      metadata:
        usfm: PSA.135.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 136:10
      metadata:
        usfm: PSA.136.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Au milieu de la nuit, l’Éternel frappa tous les premiers-nés dans le pays d’Égypte, depuis le premier-né de Pharaon assis sur son trône, jusqu’au premier-né du captif dans sa prison, et jusqu’à tous les premiers-nés des animaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:38
      metadata:
        usfm: PSA.105.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pharaon se leva de nuit, lui et tous ses serviteurs, et tous les Égyptiens; et il y eut de grands cris en Égypte, car il n’y avait point de maison où il n’y eût un mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dans la nuit même, Pharaon appela Moïse et Aaron, et leur dit: Levez-vous, sortez du milieu de mon peuple, vous et les enfants d’Israël. Allez, servez l’Éternel, comme vous l’avez dit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Prenez vos brebis et vos bœufs, comme vous l’avez dit; allez, et bénissez-moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les Égyptiens pressaient le peuple, et avaient hâte de le renvoyer du pays, car ils disaient: Nous périrons tous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Le peuple emporta sa pâte avant qu’elle fût levée. Ils enveloppèrent les pétrins dans leurs vêtements, et les mirent sur leurs épaules. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 3:22
      metadata:
        usfm: EXO.3.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:2
      metadata:
        usfm: EXO.11.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:37
      metadata:
        usfm: PSA.105.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les enfants d’Israël firent ce que Moïse avait dit, et ils demandèrent aux Égyptiens des vases d’argent, des vases d’or et des vêtements. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: L’Éternel fit trouver grâce au peuple aux yeux des Égyptiens, qui se rendirent à leur demande. Et ils dépouillèrent les Égyptiens.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Départ d’Égypte
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 37-42: cf. No 33:3-5. (Ge 15:13, 14. Ac 7:6, 7.) Ps 136:11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Les enfants d’Israël partirent de Ramsès pour Succoth au nombre d’environ six cent mille hommes de pied, sans les enfants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Une multitude de gens de toute espèce montèrent avec eux; ils avaient aussi des troupeaux considérables de brebis et de bœufs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ils firent des gâteaux cuits sans levain avec la pâte qu’ils avaient emportée d’Égypte, et qui n’était pas levée; car ils avaient été chassés d’Égypte, sans pouvoir tarder, et sans prendre des provisions avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 15:13
      metadata:
        usfm: GEN.15.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:6
      metadata:
        usfm: ACT.7.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:17
      metadata:
        usfm: GAL.3.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le séjour des enfants d’Israël en Égypte fut de quatre cent trente ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Et au bout de quatre cent trente ans, le jour même, toutes les armées de l’Éternel sortirent du pays d’Égypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Cette nuit sera célébrée en l’honneur de l’Éternel, parce qu’il les fit sortir du pays d’Égypte; cette nuit sera célébrée en l’honneur de l’Éternel par tous les enfants d’Israël et par leurs descendants.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 43-51: cf. (No 9:1-14; 15:14-16.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'L’Éternel dit à Moïse et à Aaron: Voici une ordonnance au sujet de la Pâque: Aucun étranger n’en mangera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Tu circonciras tout esclave acquis à prix d’argent; alors il en mangera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'L’habitant et le mercenaire n’en mangeront point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'On ne la mangera que dans la maison; vous n’emporterez point de chair hors de la maison, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 9:12
      metadata:
        usfm: NUM.9.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 19:36
      metadata:
        usfm: JHN.19.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et vous ne briserez aucun os. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Toute l’assemblée d’Israël fera la Pâque. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Si un étranger en séjour chez toi veut faire la Pâque de l’Éternel, tout mâle de sa maison devra être circoncis; alors il s’approchera pour la faire, et il sera comme l’indigène; mais aucun incirconcis n’en mangera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'La même loi existera pour l’indigène comme pour l’étranger en séjour au milieu de vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Tous les enfants d’Israël firent ce que l’Éternel avait ordonné à Moïse et à Aaron; ils firent ainsi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Et ce même jour l’Éternel fit sortir du pays d’Égypte les enfants d’Israël, selon leurs armées.
