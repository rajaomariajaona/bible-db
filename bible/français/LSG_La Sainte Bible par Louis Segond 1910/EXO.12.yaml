document_id: EXO.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Institution de la Pâque
  - type: heading
    content: 'V. 1-28: cf. (Ex 13:3-10. Lé 23:4-8. De 16:1-8. No 28:16, etc.) (Lu 22:7-20. 1 Co 5:7, 8.)'
  - type: text
    content: 'L’Éternel dit à Moïse et à Aaron dans le pays d’Égypte: '
  '10':
  - type: text
    content: 'Vous n’en laisserez rien jusqu’au matin; et, s’il en reste quelque chose le matin, vous le brûlerez au feu. '
  '11':
  - type: text
    content: 'Quand vous le mangerez, vous aurez vos reins ceints, vos souliers aux pieds, et votre bâton à la main; et vous le mangerez à la hâte. C’est la Pâque de l’Éternel. '
  '12':
  - type: text
    content: 'Cette nuit-là, je passerai dans le pays d’Égypte, et je frapperai tous les premiers-nés du pays d’Égypte, depuis les hommes jusqu’aux animaux, et j’exercerai des jugements contre tous les dieux de l’Égypte. Je suis l’Éternel. '
  '13':
  - type: text
    content: 'Le sang vous servira de signe sur les maisons où vous serez; je verrai le sang, et je passerai par-dessus vous, et il n’y aura point de plaie qui vous détruise, quand je frapperai le pays d’Égypte. '
  '14':
  - type: note
    content: Ex 5:1.
  - type: text
    content: 'Vous conserverez le souvenir de ce jour, et vous le célébrerez par une fête en l’honneur de l’Éternel; vous le célébrerez comme une loi perpétuelle pour vos descendants. '
  '15':
  - type: text
    content: 'Pendant sept jours, vous mangerez des pains sans levain. Dès le premier jour, il n’y aura plus de levain dans vos maisons; car toute personne qui mangera du pain levé, du premier jour au septième jour, sera retranchée d’Israël. '
  '16':
  - type: text
    content: 'Le premier jour, vous aurez une sainte convocation; et le septième jour, vous aurez une sainte convocation. On ne fera aucun travail ces jours-là; vous pourrez seulement préparer la nourriture de chaque personne. '
  '17':
  - type: text
    content: 'Vous observerez la fête des pains sans levain, car c’est en ce jour même que j’aurai fait sortir vos armées du pays d’Égypte; vous observerez ce jour comme une loi perpétuelle pour vos descendants. '
  '18':
  - type: note
    content: Lé 23:5. No 28:16.
  - type: text
    content: 'Le premier mois, le quatorzième jour du mois, au soir, vous mangerez des pains sans levain jusqu’au soir du vingt et unième jour. '
  '19':
  - type: text
    content: 'Pendant sept jours, il ne se trouvera point de levain dans vos maisons; car toute personne qui mangera du pain levé sera retranchée de l’assemblée d’Israël, que ce soit un étranger ou un indigène. '
  '2':
  - type: text
    content: 'Ce mois-ci sera pour vous le premier des mois; il sera pour vous le premier des mois de l’année. '
  '20':
  - type: text
    content: 'Vous ne mangerez point de pain levé; '
  - type: note
    content: De 16:3.
  - type: text
    content: 'dans toutes vos demeures, vous mangerez des pains sans levain. '
  '21':
  - type: text
    content: 'Moïse appela tous les anciens d’Israël, et leur dit: Allez prendre du bétail pour vos familles, '
  - type: note
    content: Hé 11:28.
  - type: text
    content: 'et immolez la Pâque. '
  '22':
  - type: text
    content: 'Vous prendrez ensuite un bouquet d’hysope, vous le tremperez dans le sang qui sera dans le bassin, et vous toucherez le linteau et les deux poteaux de la porte avec le sang qui sera dans le bassin. Nul de vous ne sortira de sa maison jusqu’au matin. '
  '23':
  - type: text
    content: 'Quand l’Éternel passera pour frapper l’Égypte, et verra le sang sur le linteau et sur les deux poteaux, l’Éternel passera par-dessus la porte, '
  - type: note
    content: Hé 11:28.
  - type: text
    content: 'et il ne permettra pas au destructeur d’entrer dans vos maisons pour frapper. '
  '24':
  - type: text
    content: 'Vous observerez cela comme une loi pour vous et pour vos enfants à perpétuité. '
  '25':
  - type: text
    content: 'Quand vous serez entrés dans le pays que l’Éternel vous donnera, selon sa promesse, vous observerez cet usage sacré. '
  '26':
  - type: note
    content: Jos 4:6.
  - type: text
    content: 'Et lorsque vos enfants vous diront: Que signifie pour vous cet usage? '
  '27':
  - type: text
    content: 'vous répondrez: C’est le sacrifice de Pâque en l’honneur de l’Éternel, qui a passé par-dessus les maisons des enfants d’Israël en Égypte, lorsqu’il frappa l’Égypte et qu’il sauva nos maisons. Le peuple s’inclina et se prosterna. '
  '28':
  - type: note
    content: Hé 11:28.
  - type: text
    content: Et les enfants d’Israël s’en allèrent, et firent ce que l’Éternel avait ordonné à Moïse et à Aaron; ils firent ainsi.
  - type: heading
    content: Mort des premiers-nés
  - type: heading
    content: 'V. 29-36: cf. (Ex 11:1-8. Ps 105:36-38; 136:10.) És 63:4.'
  '29':
  - type: text
    content: ' '
  - type: note
    content: Ps 78:51; 105:36; 135:8; 136:10.
  - type: text
    content: 'Au milieu de la nuit, l’Éternel frappa tous les premiers-nés dans le pays d’Égypte, depuis le premier-né de Pharaon assis sur son trône, jusqu’au premier-né du captif dans sa prison, et jusqu’à tous les premiers-nés des animaux. '
  '3':
  - type: text
    content: 'Parlez à toute l’assemblée d’Israël, et dites: Le dixième jour de ce mois, on prendra un agneau pour chaque famille, un agneau pour chaque maison. '
  '30':
  - type: note
    content: Ps 105:38.
  - type: text
    content: 'Pharaon se leva de nuit, lui et tous ses serviteurs, et tous les Égyptiens; et il y eut de grands cris en Égypte, car il n’y avait point de maison où il n’y eût un mort. '
  '31':
  - type: text
    content: 'Dans la nuit même, Pharaon appela Moïse et Aaron, et leur dit: Levez-vous, sortez du milieu de mon peuple, vous et les enfants d’Israël. Allez, servez l’Éternel, comme vous l’avez dit. '
  '32':
  - type: text
    content: 'Prenez vos brebis et vos bœufs, comme vous l’avez dit; allez, et bénissez-moi. '
  '33':
  - type: text
    content: 'Les Égyptiens pressaient le peuple, et avaient hâte de le renvoyer du pays, car ils disaient: Nous périrons tous. '
  '34':
  - type: text
    content: 'Le peuple emporta sa pâte avant qu’elle fût levée. Ils enveloppèrent les pétrins dans leurs vêtements, et les mirent sur leurs épaules. '
  '35':
  - type: note
    content: Ex 3:22; 11:2. Ps 105:37.
  - type: text
    content: 'Les enfants d’Israël firent ce que Moïse avait dit, et ils demandèrent aux Égyptiens des vases d’argent, des vases d’or et des vêtements. '
  '36':
  - type: text
    content: L’Éternel fit trouver grâce au peuple aux yeux des Égyptiens, qui se rendirent à leur demande. Et ils dépouillèrent les Égyptiens.
  - type: heading
    content: Départ d’Égypte
  - type: heading
    content: 'V. 37-42: cf. No 33:3-5. (Ge 15:13, 14. Ac 7:6, 7.) Ps 136:11.'
  '37':
  - type: text
    content: 'Les enfants d’Israël partirent de Ramsès pour Succoth au nombre d’environ six cent mille hommes de pied, sans les enfants. '
  '38':
  - type: text
    content: 'Une multitude de gens de toute espèce montèrent avec eux; ils avaient aussi des troupeaux considérables de brebis et de bœufs. '
  '39':
  - type: text
    content: 'Ils firent des gâteaux cuits sans levain avec la pâte qu’ils avaient emportée d’Égypte, et qui n’était pas levée; car ils avaient été chassés d’Égypte, sans pouvoir tarder, et sans prendre des provisions avec eux. '
  '4':
  - type: text
    content: 'Si la maison est trop peu nombreuse pour un agneau, on le prendra avec son plus proche voisin, selon le nombre des personnes; vous compterez pour cet agneau d’après ce que chacun peut manger. '
  '40':
  - type: note
    content: Ge 15:13. Ac 7:6. Ga 3:17.
  - type: text
    content: 'Le séjour des enfants d’Israël en Égypte fut de quatre cent trente ans. '
  '41':
  - type: text
    content: 'Et au bout de quatre cent trente ans, le jour même, toutes les armées de l’Éternel sortirent du pays d’Égypte. '
  '42':
  - type: text
    content: Cette nuit sera célébrée en l’honneur de l’Éternel, parce qu’il les fit sortir du pays d’Égypte; cette nuit sera célébrée en l’honneur de l’Éternel par tous les enfants d’Israël et par leurs descendants.
  - type: heading
    content: 'V. 43-51: cf. (No 9:1-14; 15:14-16.)'
  '43':
  - type: text
    content: 'L’Éternel dit à Moïse et à Aaron: Voici une ordonnance au sujet de la Pâque: Aucun étranger n’en mangera. '
  '44':
  - type: text
    content: 'Tu circonciras tout esclave acquis à prix d’argent; alors il en mangera. '
  '45':
  - type: text
    content: 'L’habitant et le mercenaire n’en mangeront point. '
  '46':
  - type: text
    content: 'On ne la mangera que dans la maison; vous n’emporterez point de chair hors de la maison, '
  - type: note
    content: No 9:12. Jn 19:36.
  - type: text
    content: 'et vous ne briserez aucun os. '
  '47':
  - type: text
    content: 'Toute l’assemblée d’Israël fera la Pâque. '
  '48':
  - type: text
    content: 'Si un étranger en séjour chez toi veut faire la Pâque de l’Éternel, tout mâle de sa maison devra être circoncis; alors il s’approchera pour la faire, et il sera comme l’indigène; mais aucun incirconcis n’en mangera. '
  '49':
  - type: text
    content: 'La même loi existera pour l’indigène comme pour l’étranger en séjour au milieu de vous. '
  '5':
  - type: note
    content: Lé 1:3; 22:21. Mal 1:8. 1 Pi 1:9.
  - type: text
    content: 'Ce sera un agneau sans défaut, mâle, âgé d’un an; vous pourrez prendre un agneau ou un chevreau. '
  '50':
  - type: text
    content: 'Tous les enfants d’Israël firent ce que l’Éternel avait ordonné à Moïse et à Aaron; ils firent ainsi. '
  '51':
  - type: text
    content: Et ce même jour l’Éternel fit sortir du pays d’Égypte les enfants d’Israël, selon leurs armées.
  '6':
  - type: text
    content: 'Vous le garderez jusqu’au quatorzième jour de ce mois; et toute l’assemblée d’Israël l’immolera entre les deux soirs. '
  '7':
  - type: text
    content: 'On prendra de son sang, et on en mettra sur les deux poteaux et sur le linteau de la porte des maisons où on le mangera. '
  '8':
  - type: note
    content: No 9:11. 1 Ch 5:8.
  - type: text
    content: 'Cette même nuit, on en mangera la chair, rôtie au feu; on la mangera avec des pains sans levain et des herbes amères. '
  '9':
  - type: text
    content: 'Vous ne le mangerez point à demi cuit et bouilli dans l’eau; mais il sera rôti au feu, avec la tête, les jambes et l’intérieur. '
