      - type: text
        text: Lu 1:17
      metadata:
        usfm: LUK.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Élie, le prophète,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avant que le jour de l’Éternel arrive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce jour grand et redoutable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il ramènera le cœur des pères à leurs enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le cœur des enfants à leurs pères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De peur que je ne vienne frapper le pays d’interdit.
