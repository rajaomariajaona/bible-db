document_id: MAL.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-3: cf. Mt 24. (2 Th 1:6-10. 2 Pi 3:7, 10-14.)'
  - type: text
    content: Car voici, le jour vient,
  - type: text
    content: Ardent comme une fournaise.
  - type: text
    content: 'Tous les hautains et tous les méchants seront comme du '
  - type: note
    content: Ab v. 18.
  - type: text
    content: chaume;
  - type: text
    content: Le jour qui vient les embrasera,
  - type: text
    content: Dit l’Éternel des armées,
  - type: text
    content: Il ne leur laissera ni racine ni rameau.
  '2':
  - type: text
    content: Mais pour vous qui craignez mon nom, se lèvera
  - type: text
    content: Le soleil de la justice,
  - type: text
    content: Et la guérison sera sous ses ailes;
  - type: text
    content: Vous sortirez, et vous sauterez comme les veaux d’une étable,
  '3':
  - type: text
    content: Et vous foulerez les méchants,
  - type: text
    content: Car ils seront comme de la cendre
  - type: text
    content: Sous la plante de vos pieds,
  - type: text
    content: Au jour que je prépare,
  - type: text
    content: Dit l’Éternel des armées.
  - type: heading
    content: 'V. 4-6: cf. Lu 1:13-17. Mt 17:10-13.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: De 6:3.
  - type: text
    content: Souvenez-vous de la loi de Moïse, mon serviteur,
  - type: text
    content: Auquel j’ai prescrit en Horeb, pour tout Israël,
  - type: text
    content: Des préceptes et des ordonnances.
  '5':
  - type: text
    content: 'Voici, je vous enverrai '
  - type: note
    content: Mt 11:14; 17:11, 12, 13. Mc 9:11, 12, 13. Lu 1:17.
  - type: text
    content: Élie, le prophète,
  - type: text
    content: Avant que le jour de l’Éternel arrive,
  - type: text
    content: Ce jour grand et redoutable.
  '6':
  - type: text
    content: Il ramènera le cœur des pères à leurs enfants,
  - type: text
    content: Et le cœur des enfants à leurs pères,
  - type: text
    content: De peur que je ne vienne frapper le pays d’interdit.
