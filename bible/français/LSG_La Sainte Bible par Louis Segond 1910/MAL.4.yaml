- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-3: cf. Mt 24. (2 Th 1:6-10. 2 Pi 3:7, 10-14.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Car voici, le jour vient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ardent comme une fournaise.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tous les hautains et tous les méchants seront comme du '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ab v. 18.
    marker-yv: yv-n
  - type: text
    text: chaume;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le jour qui vient les embrasera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel des armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne leur laissera ni racine ni rameau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mais pour vous qui craignez mon nom, se lèvera
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le soleil de la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la guérison sera sous ses ailes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous sortirez, et vous sauterez comme les veaux d’une étable,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Et vous foulerez les méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils seront comme de la cendre
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sous la plante de vos pieds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au jour que je prépare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel des armées.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 4-6: cf. Lu 1:13-17. Mt 17:10-13.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 6:3
      metadata:
        usfm: DEU.6.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Souvenez-vous de la loi de Moïse, mon serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Auquel j’ai prescrit en Horeb, pour tout Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des préceptes et des ordonnances.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voici, je vous enverrai '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 11:14
      metadata:
        usfm: MAT.11.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:11
      metadata:
        usfm: MAT.17.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: MAT.17.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: MAT.17.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:11
      metadata:
        usfm: MRK.9.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: MRK.9.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: MRK.9.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
