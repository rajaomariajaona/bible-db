document_id: EZR.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Renvoi des femmes étrangères
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-44: cf. Esd 9. Né 13:23-30. 2 Co 7:10, 11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Pendant qu’Esdras, pleurant et prosterné devant la maison de Dieu, faisait cette prière et cette confession, il s’était rassemblé auprès de lui une foule très nombreuse de gens d’Israël, hommes, femmes et enfants, et le peuple répandait d’abondantes larmes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors Schecania, fils de Jehiel, d’entre les fils d’Élam, prit la parole et dit à Esdras: Nous avons péché contre notre Dieu, en nous alliant à des femmes étrangères qui appartiennent aux peuples du pays. Mais Israël ne reste pas pour cela sans espérance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Faisons maintenant une alliance avec notre Dieu pour le renvoi de toutes ces femmes et de leurs enfants, selon l’avis de mon seigneur et de ceux qui tremblent devant les commandements de notre Dieu. Et que l’on agisse d’après la loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Lève-toi, car cette affaire te regarde. Nous serons avec toi. Prends courage et agis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Esdras se leva, et il fit jurer aux chefs des sacrificateurs, des Lévites, et de tout Israël, de faire ce qui venait d’être dit. Et ils le jurèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Puis Esdras se retira de devant la maison de Dieu, et il alla dans la chambre de Jochanan, fils d’Éliaschib; quand il y fut entré, il ne mangea point de pain et il ne but point d’eau, parce qu’il était dans la désolation à cause du péché des fils de la captivité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'On publia dans Juda et à Jérusalem que tous les fils de la captivité eussent à se réunir à Jérusalem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et que, d’après l’avis des chefs et des anciens, quiconque ne s’y serait pas rendu dans trois jours aurait tous ses biens confisqués et serait lui-même exclu de l’assemblée des fils de la captivité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tous les hommes de Juda et de Benjamin se rassemblèrent à Jérusalem dans les trois jours. C’était le vingtième jour du neuvième mois. Tout le peuple se tenait sur la place de la maison de Dieu, tremblant à cause de la circonstance et par suite de la pluie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Esdras, le sacrificateur, se leva et leur dit: Vous avez péché en vous alliant à des femmes étrangères, et vous avez rendu Israël encore plus coupable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Confessez maintenant votre faute à l’Éternel, le Dieu de vos pères, et faites sa volonté! Séparez-vous des peuples du pays et des femmes étrangères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Toute l’assemblée répondit d’une voix haute: A nous de faire comme tu l’as dit! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais le peuple est nombreux, le temps est à la pluie, et il n’est pas possible de rester dehors; d’ailleurs, ce n’est pas l’œuvre d’un jour ou deux, car il y en a beaucoup parmi nous qui ont péché dans cette affaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Que nos chefs restent donc pour toute l’assemblée; et tous ceux qui dans nos villes se sont alliés à des femmes étrangères viendront à des époques fixes, avec les anciens et les juges de chaque ville, jusqu’à ce que l’ardente colère de notre Dieu se soit détournée de nous au sujet de cette affaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jonathan, fils d’Asaël, et Jachzia, fils de Thikva, appuyés par Meschullam et par le Lévite Schabthaï, furent les seuls à combattre cet avis, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'auquel se conformèrent les fils de la captivité. On choisit Esdras, le sacrificateur, et des chefs de famille selon leurs maisons paternelles, tous désignés par leurs noms; et ils siégèrent le premier jour du dixième mois pour s’occuper de la chose. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le premier jour du premier mois, ils en finirent avec tous les hommes qui s’étaient alliés à des femmes étrangères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Parmi les fils de sacrificateurs, il s’en trouva qui s’étaient alliés à des femmes étrangères: des fils de Josué, fils de Jotsadak, et de ses frères, Maaséja, Éliézer, Jarib et Guedalia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'qui s’engagèrent, en donnant la main, à renvoyer leurs femmes et à offrir un bélier en sacrifice de culpabilité; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'des fils d’Immer, Hanani et Zebadia; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'des fils de Harim, Maaséja, Élie, Schemaeja, Jehiel et Ozias; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'des fils de Paschhur, Éljoénaï, Maaséja, Ismaël, Nethaneel, Jozabad et Éleasa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Parmi les Lévites: Jozabad, Schimeï, Kélaja ou Kelitha, Pethachja, Juda et Éliézer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Parmi les chantres: Éliaschib. Parmi les portiers: Schallum, Thélem et Uri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Parmi ceux d’Israël: des fils de Pareosch, Ramia, Jizzija, Malkija, Mijamin, Éléazar, Malkija et Benaja; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'des fils d’Élam, Matthania, Zacharie, Jehiel, Abdi, Jerémoth et Élie; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'des fils de Zatthu, Éljoénaï, Éliaschib, Matthania, Jerémoth, Zabad et Aziza; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'des fils de Bébaï, Jochanan, Hanania, Zabbaï et Athlaï; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'des fils de Bani, Meschullam, Malluc, Adaja, Jaschub, Scheal et Ramoth; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'des fils de Pachath-Moab, Adna, Kelal, Benaja, Maaséja, Matthania, Betsaleel, Binnuï et Manassé; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'des fils de Harim, Éliézer, Jischija, Malkija, Schemaeja, Siméon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Benjamin, Malluc et Schemaria; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'des fils de Haschum, Matthnaï, Matthattha, Zabad, Éliphéleth, Jerémaï, Manassé et Schimeï; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'des fils de Bani, Maadaï, Amram, Uel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Benaja, Bédia, Keluhu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Vania, Merémoth, Éliaschib, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Matthania, Matthnaï, Jaasaï, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Bani, Binnuï, Schimeï, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Schélémia, Nathan, Adaja, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Macnadbaï, Schaschaï, Scharaï, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Azareel, Schélémia, Schemaria, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Schallum, Amaria et Joseph; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'des fils de Nebo, Jeïel, Matthithia, Zabad, Zebina, Jaddaï, Joël et Benaja. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Tous ceux-là avaient pris des femmes étrangères, et plusieurs en avaient eu des enfants.
