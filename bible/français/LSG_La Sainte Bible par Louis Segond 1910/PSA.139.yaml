document_id: PSA.139,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Ps 11:4, 5. 1 Ch 28:9. Hé 4:13. Jé 23:23, 24. Ro 11:33.) Job 10:8-12.
  - type: text
    content: Au chef des chantres. De David. Psaume.
  - type: text
    content: Éternel! Tu me sondes et tu me connais,
  '10':
  - type: text
    content: Là aussi ta main me conduira,
  - type: text
    content: Et ta droite me saisira.
  '11':
  - type: text
    content: 'Si je dis: Au moins les ténèbres me couvriront,'
  - type: text
    content: La nuit devient lumière autour de moi;
  '12':
  - type: text
    content: Même les ténèbres ne sont pas obscures pour toi,
  - type: text
    content: La nuit brille comme le jour,
  - type: text
    content: Et les ténèbres comme la lumière.
  '13':
  - type: text
    content: C’est toi qui as formé mes reins,
  - type: text
    content: Qui m’as tissé dans le sein de ma mère.
  '14':
  - type: text
    content: Je te loue de ce que je suis une créature si merveilleuse.
  - type: text
    content: Tes œuvres sont admirables,
  - type: text
    content: Et mon âme le reconnaît bien.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Job 10:8, 10.
  - type: text
    content: Mon corps n’était point caché devant toi,
  - type: note
    content: Ec 11:5.
  - type: text
    content: Lorsque j’ai été fait dans un lieu secret,
  - type: text
    content: Tissé dans les profondeurs de la terre.
  '16':
  - type: text
    content: Quand je n’étais qu’une masse informe, tes yeux me voyaient;
  - type: text
    content: Et sur ton livre étaient tous inscrits
  - type: text
    content: Les jours qui m’étaient destinés,
  - type: text
    content: Avant qu’aucun d’eux existât.
  '17':
  - type: text
    content: Que tes pensées, ô Dieu, me semblent impénétrables!
  - type: text
    content: Que le nombre en est grand!
  '18':
  - type: text
    content: Si je les compte, elles sont plus nombreuses que les grains de sable.
  - type: text
    content: Je m’éveille, et je suis encore avec toi.
  '19':
  - type: text
    content: O Dieu, puisses-tu faire mourir le méchant!
  - type: text
    content: Hommes de sang, éloignez-vous de moi!
  '2':
  - type: text
    content: Tu sais quand je m’assieds et quand je me lève,
  - type: text
    content: Tu pénètres de loin ma pensée;
  '20':
  - type: text
    content: Ils parlent de toi d’une manière criminelle,
  - type: text
    content: Ils prennent ton nom pour mentir, eux, tes ennemis!
  '21':
  - type: text
    content: Éternel, n’aurais-je pas de la haine pour ceux qui te haïssent,
  - type: text
    content: Du dégoût pour ceux qui s’élèvent contre toi?
  '22':
  - type: text
    content: Je les hais d’une parfaite haine;
  - type: text
    content: Ils sont pour moi des ennemis.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Job 31:6. Ps 26:2.
  - type: text
    content: Sonde-moi, ô Dieu, et connais mon cœur!
  - type: text
    content: Éprouve-moi, et connais mes pensées!
  '24':
  - type: text
    content: Regarde si je suis sur une mauvaise voie,
  - type: text
    content: Et conduis-moi sur la voie de l’éternité!
  '3':
  - type: text
    content: Tu sais quand je marche et quand je me couche,
  - type: text
    content: Et tu pénètres toutes mes voies.
  '4':
  - type: text
    content: Car la parole n’est pas sur ma langue,
  - type: text
    content: Que déjà, ô Éternel! Tu la connais entièrement.
  '5':
  - type: text
    content: Tu m’entoures par derrière et par devant,
  - type: text
    content: Et tu mets ta main sur moi.
  '6':
  - type: text
    content: Une science aussi merveilleuse est au-dessus de ma portée,
  - type: text
    content: Elle est trop élevée pour que je puisse la saisir.
  '7':
  - type: text
    content: Où irais-je loin de ton esprit,
  - type: text
    content: Et où fuirais-je loin de ta face?
  '8':
  - type: text
    content: ' '
  - type: note
    content: Job 26:6. Am 9:2, 3, 4. Hé 4:13.
  - type: text
    content: Si je monte aux cieux, tu y es;
  - type: text
    content: Si je me couche au séjour des morts, t’y voilà.
  '9':
  - type: text
    content: Si je prends les ailes de l’aurore,
  - type: text
    content: Et que j’aille habiter à l’extrémité de la mer,
