document_id: PSA.139
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: (Ps 11:4, 5. 1 Ch 28:9. Hé 4:13. Jé 23:23, 24. Ro 11:33.) Job 10:8-12.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. De David. Psaume.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éternel! Tu me sondes et tu me connais,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tu sais quand je m’assieds et quand je me lève,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu pénètres de loin ma pensée;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu sais quand je marche et quand je me couche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu pénètres toutes mes voies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car la parole n’est pas sur ma langue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que déjà, ô Éternel! Tu la connais entièrement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu m’entoures par derrière et par devant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu mets ta main sur moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Une science aussi merveilleuse est au-dessus de ma portée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle est trop élevée pour que je puisse la saisir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Où irais-je loin de ton esprit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et où fuirais-je loin de ta face?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 26:6
      metadata:
        usfm: JOB.26.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 9:2
      metadata:
        usfm: AMO.9.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: AMO.9.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: AMO.9.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 4:13
      metadata:
        usfm: HEB.4.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Si je monte aux cieux, tu y es;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si je me couche au séjour des morts, t’y voilà.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Si je prends les ailes de l’aurore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que j’aille habiter à l’extrémité de la mer,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Là aussi ta main me conduira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ta droite me saisira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Si je dis: Au moins les ténèbres me couvriront,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: La nuit devient lumière autour de moi;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Même les ténèbres ne sont pas obscures pour toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La nuit brille comme le jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les ténèbres comme la lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C’est toi qui as formé mes reins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui m’as tissé dans le sein de ma mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je te loue de ce que je suis une créature si merveilleuse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes œuvres sont admirables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mon âme le reconnaît bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 10:8
      metadata:
        usfm: JOB.10.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: JOB.10.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mon corps n’était point caché devant toi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 11:5
      metadata:
        usfm: ECC.11.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Lorsque j’ai été fait dans un lieu secret,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tissé dans les profondeurs de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Quand je n’étais qu’une masse informe, tes yeux me voyaient;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sur ton livre étaient tous inscrits
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les jours qui m’étaient destinés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avant qu’aucun d’eux existât.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Que tes pensées, ô Dieu, me semblent impénétrables!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que le nombre en est grand!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Si je les compte, elles sont plus nombreuses que les grains de sable.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je m’éveille, et je suis encore avec toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: O Dieu, puisses-tu faire mourir le méchant!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hommes de sang, éloignez-vous de moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ils parlent de toi d’une manière criminelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils prennent ton nom pour mentir, eux, tes ennemis!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Éternel, n’aurais-je pas de la haine pour ceux qui te haïssent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du dégoût pour ceux qui s’élèvent contre toi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Je les hais d’une parfaite haine;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont pour moi des ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 31:6
      metadata:
        usfm: JOB.31.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 26:2
      metadata:
        usfm: PSA.26.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Sonde-moi, ô Dieu, et connais mon cœur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éprouve-moi, et connais mes pensées!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Regarde si je suis sur une mauvaise voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et conduis-moi sur la voie de l’éternité!
