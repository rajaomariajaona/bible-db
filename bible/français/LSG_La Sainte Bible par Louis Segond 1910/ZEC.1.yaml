document_id: ZEC.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Exhortation à la repentance
  - type: heading
    content: 'V. 1-6: cf. (2 Ch 30:6-9. Éz 18:30-32.) (Jé 25:3-11; 44:2-6.)'
  - type: text
    content: 'Le huitième mois, la seconde année de Darius, la parole de l’Éternel fut adressée à Zacharie, fils de Bérékia, fils d’Iddo, le prophète, en ces mots: '
  '10':
  - type: text
    content: 'L’homme qui se tenait parmi les myrtes prit la parole et dit: Ce sont ceux que l’Éternel a envoyés pour parcourir la terre. '
  '11':
  - type: text
    content: 'Et ils s’adressèrent à l’ange de l’Éternel, qui se tenait parmi les myrtes, et ils dirent: Nous avons parcouru la terre, et voici, toute la terre est en repos et tranquille. '
  '12':
  - type: text
    content: 'Alors l’ange de l’Éternel prit la parole et dit: Éternel des armées, jusques à quand n’auras-tu pas compassion de Jérusalem et des villes de Juda, contre lesquelles tu es irrité depuis soixante-dix ans? '
  '13':
  - type: text
    content: 'L’Éternel répondit par de bonnes paroles, par des paroles de consolation, à l’ange qui parlait avec moi. '
  '14':
  - type: text
    content: 'Et l’ange qui parlait avec moi me dit: Crie, et dis: Ainsi parle l’Éternel des armées: Je suis ému d’une grande jalousie pour Jérusalem et pour Sion, '
  '15':
  - type: text
    content: 'et je suis saisi d’une grande irritation contre les nations orgueilleuses; car je n’étais que peu irrité, mais elles ont contribué au mal. '
  '16':
  - type: text
    content: 'C’est pourquoi ainsi parle l’Éternel: Je reviens à Jérusalem avec compassion; ma maison y sera rebâtie, et le cordeau sera étendu sur Jérusalem. '
  '17':
  - type: text
    content: 'Crie de nouveau, et dis: Ainsi parle l’Éternel des armées: Mes villes auront encore des biens en abondance; l’Éternel consolera encore Sion, il choisira encore Jérusalem.'
  - type: heading
    content: Les quatre cornes
  - type: heading
    content: 'V. 18-21: cf. Ps 75:5-11.'
  '18':
  - type: text
    content: 'Je levai les yeux et je regardai, et voici, il y avait quatre cornes. '
  '19':
  - type: text
    content: 'Je dis à l’ange qui parlait avec moi: Qu’est-ce que ces cornes? Et il me dit: Ce sont les cornes qui ont dispersé Juda, Israël et Jérusalem. '
  '2':
  - type: text
    content: 'L’Éternel a été très irrité contre vos pères. '
  '20':
  - type: text
    content: 'L’Éternel me fit voir quatre forgerons. '
  '21':
  - type: text
    content: 'Je dis: Que viennent-ils faire? Et il dit: Ce sont les cornes qui ont dispersé Juda, tellement que nul ne lève la tête; et ces forgerons sont venus pour les effrayer, et pour abattre les cornes des nations qui ont levé la corne contre le pays de Juda, afin d’en disperser les habitants.'
  '3':
  - type: text
    content: 'Dis-leur donc: Ainsi parle l’Éternel des armées: Revenez à moi, dit l’Éternel des armées, et je reviendrai à vous, dit l’Éternel des armées. '
  '4':
  - type: text
    content: 'Ne soyez pas comme vos pères, auxquels s’adressaient les '
  - type: note
    content: És 31:6. Jé 3:12; 18:11. Éz 18:30. Os 14:2.
  - type: text
    content: 'premiers prophètes, en disant: Ainsi parle l’Éternel des armées: Détournez-vous de vos mauvaises voies, de vos mauvaises actions! Mais ils n’écoutèrent pas, ils ne firent pas attention à moi, dit l’Éternel. '
  '5':
  - type: text
    content: 'Vos pères, où sont-ils? Et les prophètes pouvaient-ils vivre éternellement? '
  '6':
  - type: text
    content: 'Cependant mes paroles et les ordres que j’avais donnés à mes serviteurs, les prophètes, n’ont-ils pas atteint vos pères? Ils se sont retournés, et ils ont dit: '
  - type: note
    content: La 1:18.
  - type: text
    content: L’Éternel des armées nous a traités comme il avait résolu de le faire selon nos voies et nos actions.
  - type: heading
    content: Vision des chevaux
  - type: heading
    content: 'V. 7-17: cf. (Za 6:1-8. Ap 6:1-8.) (Jé 29:10-14; 30:16-22.) És 51:3.'
  '7':
  - type: text
    content: 'Le vingt-quatrième jour du onzième mois, qui est le mois de Schebat, la seconde année de Darius, la parole de l’Éternel fut adressée à Zacharie, fils de Bérékia, fils d’Iddo, le prophète, en ces mots: '
  '8':
  - type: text
    content: 'Je regardai pendant la nuit, et voici, un homme était monté sur un cheval roux, et se tenait parmi des myrtes dans un lieu ombragé; il y avait derrière lui des chevaux roux, fauves, et blancs. '
  '9':
  - type: text
    content: 'Je dis: Qui sont ces chevaux, mon seigneur? Et l’ange qui parlait avec moi me dit: Je te ferai voir qui sont ces chevaux. '
