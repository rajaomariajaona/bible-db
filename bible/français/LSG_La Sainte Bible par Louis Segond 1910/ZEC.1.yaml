document_id: ZEC.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Exhortation à la repentance
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. (2 Ch 30:6-9. Éz 18:30-32.) (Jé 25:3-11; 44:2-6.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le huitième mois, la seconde année de Darius, la parole de l’Éternel fut adressée à Zacharie, fils de Bérékia, fils d’Iddo, le prophète, en ces mots: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L’Éternel a été très irrité contre vos pères. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dis-leur donc: Ainsi parle l’Éternel des armées: Revenez à moi, dit l’Éternel des armées, et je reviendrai à vous, dit l’Éternel des armées. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ne soyez pas comme vos pères, auxquels s’adressaient les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 31:6
      metadata:
        usfm: ISA.31.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 3:12
      metadata:
        usfm: JER.3.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:11
      metadata:
        usfm: JER.18.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 18:30
      metadata:
        usfm: EZK.18.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 14:2
      metadata:
        usfm: HOS.14.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'premiers prophètes, en disant: Ainsi parle l’Éternel des armées: Détournez-vous de vos mauvaises voies, de vos mauvaises actions! Mais ils n’écoutèrent pas, ils ne firent pas attention à moi, dit l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Vos pères, où sont-ils? Et les prophètes pouvaient-ils vivre éternellement? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Cependant mes paroles et les ordres que j’avais donnés à mes serviteurs, les prophètes, n’ont-ils pas atteint vos pères? Ils se sont retournés, et ils ont dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 1:18
      metadata:
        usfm: LAM.1.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’Éternel des armées nous a traités comme il avait résolu de le faire selon nos voies et nos actions.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vision des chevaux
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-17: cf. (Za 6:1-8. Ap 6:1-8.) (Jé 29:10-14; 30:16-22.) És 51:3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le vingt-quatrième jour du onzième mois, qui est le mois de Schebat, la seconde année de Darius, la parole de l’Éternel fut adressée à Zacharie, fils de Bérékia, fils d’Iddo, le prophète, en ces mots: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je regardai pendant la nuit, et voici, un homme était monté sur un cheval roux, et se tenait parmi des myrtes dans un lieu ombragé; il y avait derrière lui des chevaux roux, fauves, et blancs. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je dis: Qui sont ces chevaux, mon seigneur? Et l’ange qui parlait avec moi me dit: Je te ferai voir qui sont ces chevaux. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L’homme qui se tenait parmi les myrtes prit la parole et dit: Ce sont ceux que l’Éternel a envoyés pour parcourir la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et ils s’adressèrent à l’ange de l’Éternel, qui se tenait parmi les myrtes, et ils dirent: Nous avons parcouru la terre, et voici, toute la terre est en repos et tranquille. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors l’ange de l’Éternel prit la parole et dit: Éternel des armées, jusques à quand n’auras-tu pas compassion de Jérusalem et des villes de Juda, contre lesquelles tu es irrité depuis soixante-dix ans? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L’Éternel répondit par de bonnes paroles, par des paroles de consolation, à l’ange qui parlait avec moi. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et l’ange qui parlait avec moi me dit: Crie, et dis: Ainsi parle l’Éternel des armées: Je suis ému d’une grande jalousie pour Jérusalem et pour Sion, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et je suis saisi d’une grande irritation contre les nations orgueilleuses; car je n’étais que peu irrité, mais elles ont contribué au mal. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'C’est pourquoi ainsi parle l’Éternel: Je reviens à Jérusalem avec compassion; ma maison y sera rebâtie, et le cordeau sera étendu sur Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Crie de nouveau, et dis: Ainsi parle l’Éternel des armées: Mes villes auront encore des biens en abondance; l’Éternel consolera encore Sion, il choisira encore Jérusalem.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les quatre cornes
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-21: cf. Ps 75:5-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je levai les yeux et je regardai, et voici, il y avait quatre cornes. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Je dis à l’ange qui parlait avec moi: Qu’est-ce que ces cornes? Et il me dit: Ce sont les cornes qui ont dispersé Juda, Israël et Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'L’Éternel me fit voir quatre forgerons. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Je dis: Que viennent-ils faire? Et il dit: Ce sont les cornes qui ont dispersé Juda, tellement que nul ne lève la tête; et ces forgerons sont venus pour les effrayer, et pour abattre les cornes des nations qui ont levé la corne contre le pays de Juda, afin d’en disperser les habitants.'
