document_id: 1SA.29,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David renvoyé de l’armée des Philistins; retour à Tsiklag
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. (1 S 28:1, 2. 1 Ch 12:19.) 2 Ti 2:13.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Les Philistins rassemblèrent toutes leurs troupes à Aphek, et Israël campa près de la source de Jizreel. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ainsi lève-toi de bon matin, toi et les serviteurs de ton maître qui sont venus avec toi; levez-vous de bon matin, et partez dès que vous verrez la lumière. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: David et ses gens se levèrent de bonne heure, pour partir dès le matin, et retourner dans le pays des Philistins. Et les Philistins montèrent à Jizreel.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Les princes des Philistins s’avancèrent avec leurs centaines et leurs milliers, et David et ses gens marchaient à l’arrière-garde avec Akisch. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Les princes des Philistins dirent: Que font ici ces Hébreux? Et Akisch répondit aux princes des Philistins: N’est-ce pas David, serviteur de Saül, roi d’Israël? Il y a longtemps qu’il est avec moi, et je n’ai pas trouvé la moindre chose à lui reprocher depuis son arrivée jusqu’à ce jour. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mais les princes des Philistins s’irritèrent contre Akisch, et lui dirent: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 12:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Renvoie cet homme, et qu’il retourne dans le lieu où tu l’as établi; qu’il ne descende pas avec nous sur le champ de bataille, afin qu’il ne soit pas pour nous un ennemi pendant le combat. Et comment cet homme rentrerait-il en grâce auprès de son maître, si ce n’est au moyen des têtes de nos gens? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'N’est-ce pas ce David pour qui l’on '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 18:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'chantait en dansant:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saül a frappé ses mille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et David ses dix mille?
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Akisch appela David, et lui dit: L’Éternel est vivant! Tu es un homme droit, et j’aime à te voir aller et venir avec moi dans le camp, car je n’ai rien trouvé de mauvais en toi depuis ton arrivée auprès de moi jusqu’à ce jour; mais tu ne plais pas aux princes. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Retourne donc et va-t’en en paix, pour ne rien faire de désagréable aux yeux des princes des Philistins. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'David dit à Akisch: Mais qu’ai-je fait, et qu’as-tu trouvé en ton serviteur depuis que je suis auprès de toi jusqu’à ce jour, pour que je n’aille pas combattre les ennemis de mon seigneur le roi? '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Akisch répondit à David: Je le sais, car tu es agréable à mes yeux comme un ange de Dieu; mais les princes des Philistins disent: Il ne montera point avec nous pour combattre. '
