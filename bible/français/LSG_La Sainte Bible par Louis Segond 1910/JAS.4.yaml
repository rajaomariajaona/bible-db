document_id: JAS.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Résister à l’entraînement des passions
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-12: cf. Ja 3:14-16. (Ps 66:18. 1 Ti 2:8.) 1 Jn 2:15-17. (1 Pi 5:5-9. Lu 18:13, 14.) Lé 19:16.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'D’où viennent les luttes, et d’où viennent les querelles parmi vous? N’est-ce pas de vos passions '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 7:23
      metadata:
        usfm: ROM.7.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:11
      metadata:
        usfm: 1PE.2.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui combattent dans vos membres? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Vous convoitez, et vous ne possédez pas; vous êtes meurtriers et envieux, et vous ne pouvez pas obtenir; vous avez des querelles et des luttes, et vous ne possédez pas, parce que vous ne demandez pas. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous demandez, et vous ne recevez pas, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 20:22
      metadata:
        usfm: MAT.20.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:26
      metadata:
        usfm: ROM.8.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'parce que vous demandez mal, dans le but de satisfaire vos passions. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Adultères que vous êtes! Ne savez-vous pas que l’amour du monde est inimitié contre Dieu? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 15:19
      metadata:
        usfm: JHN.15.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:10
      metadata:
        usfm: GAL.1.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 2:15
      metadata:
        usfm: 1JN.2.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Celui donc qui veut être ami du monde se rend ennemi de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Croyez-vous que l’Écriture parle en vain? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 11:29
      metadata:
        usfm: NUM.11.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est avec jalousie que Dieu chérit l’esprit qu’il a fait habiter en nous. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il accorde, au contraire, une grâce plus excellente; c’est pourquoi l’Écriture dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 3:34
      metadata:
        usfm: PRO.3.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:5
      metadata:
        usfm: 1PE.5.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dieu résiste aux orgueilleux, Mais il fait grâce aux humbles. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Soumettez-vous donc à Dieu; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:27
      metadata:
        usfm: EPH.4.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:9
      metadata:
        usfm: 1PE.5.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'résistez au diable, et il fuira loin de vous. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Approchez-vous de Dieu, et il s’approchera de vous. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:15
      metadata:
        usfm: ISA.1.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nettoyez vos mains, pécheurs; purifiez vos cœurs, hommes irrésolus. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:4
      metadata:
        usfm: MAT.5.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Sentez votre misère; soyez dans le deuil et dans les larmes; que votre rire se change en deuil, et votre joie en tristesse. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 22:29
      metadata:
        usfm: JOB.22.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 29:23
      metadata:
        usfm: PRO.29.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 23:12
      metadata:
        usfm: MAT.23.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 14:11
      metadata:
        usfm: LUK.14.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:14
      metadata:
        usfm: LUK.18.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:6
      metadata:
        usfm: 1PE.5.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Humiliez-vous devant le Seigneur, et il vous élèvera. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ne parlez point mal les uns des autres, frères. Celui qui parle mal d’un frère, ou qui juge son frère, parle mal de la loi et juge la loi. Or, si tu juges la loi, tu n’es pas observateur de la loi, mais tu en es juge. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Un seul est législateur et juge, c’est celui qui peut sauver et perdre; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 4:14
      metadata:
        usfm: ROM.4.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: mais toi, qui es-tu, qui juges le prochain?
- type: usfm
  marker: s1
  children:
  - type: text
    text: À ceux qui forment des projets
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-17: cf. Lu 12:16-20. Pr 27:1.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'A vous maintenant, qui dites: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 12:18
      metadata:
        usfm: LUK.12.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Aujourd’hui ou demain nous irons dans telle ville, nous y passerons une année, nous trafiquerons, et nous gagnerons! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vous qui ne savez pas ce qui arrivera demain! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 40:6
      metadata:
        usfm: ISA.40.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 7:31
      metadata:
        usfm: 1CO.7.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:10
      metadata:
        usfm: JAS.1.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:24
      metadata:
        usfm: 1PE.1.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 2:17
      metadata:
        usfm: 1JN.2.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car, qu’est-ce que votre vie? Vous êtes une vapeur qui paraît pour un peu de temps, et qui ensuite disparaît. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Vous devriez dire, au contraire: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 18:21
      metadata:
        usfm: ACT.18.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 4:19
      metadata:
        usfm: 1CO.4.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 6:3
      metadata:
        usfm: HEB.6.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si Dieu le veut, nous vivrons, et nous ferons ceci ou cela. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais maintenant vous vous glorifiez dans vos pensées orgueilleuses. C’est chose mauvaise que de se glorifier de la sorte. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 12:47
      metadata:
        usfm: LUK.12.47
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui donc qui sait faire ce qui est bien, et qui ne le fait pas, commet un péché.
