document_id: JAS.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Résister à l’entraînement des passions
  - type: heading
    content: 'V. 1-12: cf. Ja 3:14-16. (Ps 66:18. 1 Ti 2:8.) 1 Jn 2:15-17. (1 Pi 5:5-9. Lu 18:13, 14.) Lé 19:16.'
  - type: text
    content: 'D’où viennent les luttes, et d’où viennent les querelles parmi vous? N’est-ce pas de vos passions '
  - type: note
    content: Ro 7:23. 1 Pi 2:11.
  - type: text
    content: 'qui combattent dans vos membres? '
  '10':
  - type: note
    content: Job 22:29. Pr 29:23. Mt 23:12. Lu 14:11; 18:14. 1 Pi 5:6.
  - type: text
    content: 'Humiliez-vous devant le Seigneur, et il vous élèvera. '
  '11':
  - type: text
    content: 'Ne parlez point mal les uns des autres, frères. Celui qui parle mal d’un frère, ou qui juge son frère, parle mal de la loi et juge la loi. Or, si tu juges la loi, tu n’es pas observateur de la loi, mais tu en es juge. '
  '12':
  - type: text
    content: 'Un seul est législateur et juge, c’est celui qui peut sauver et perdre; '
  - type: note
    content: Ro 4:14.
  - type: text
    content: mais toi, qui es-tu, qui juges le prochain?
  - type: heading
    content: À ceux qui forment des projets
  - type: heading
    content: 'V. 13-17: cf. Lu 12:16-20. Pr 27:1.'
  '13':
  - type: text
    content: 'A vous maintenant, qui dites: '
  - type: note
    content: Lu 12:18.
  - type: text
    content: 'Aujourd’hui ou demain nous irons dans telle ville, nous y passerons une année, nous trafiquerons, et nous gagnerons! '
  '14':
  - type: text
    content: 'Vous qui ne savez pas ce qui arrivera demain! '
  - type: note
    content: És 40:6. 1 Co 7:31. Ja 1:10. 1 Pi 1:24. 1 Jn 2:17.
  - type: text
    content: 'car, qu’est-ce que votre vie? Vous êtes une vapeur qui paraît pour un peu de temps, et qui ensuite disparaît. '
  '15':
  - type: text
    content: 'Vous devriez dire, au contraire: '
  - type: note
    content: Ac 18:21. 1 Co 4:19. Hé 6:3.
  - type: text
    content: 'Si Dieu le veut, nous vivrons, et nous ferons ceci ou cela. '
  '16':
  - type: text
    content: 'Mais maintenant vous vous glorifiez dans vos pensées orgueilleuses. C’est chose mauvaise que de se glorifier de la sorte. '
  '17':
  - type: note
    content: Lu 12:47.
  - type: text
    content: Celui donc qui sait faire ce qui est bien, et qui ne le fait pas, commet un péché.
  '2':
  - type: text
    content: 'Vous convoitez, et vous ne possédez pas; vous êtes meurtriers et envieux, et vous ne pouvez pas obtenir; vous avez des querelles et des luttes, et vous ne possédez pas, parce que vous ne demandez pas. '
  '3':
  - type: text
    content: 'Vous demandez, et vous ne recevez pas, '
  - type: note
    content: Mt 20:22. Ro 8:26.
  - type: text
    content: 'parce que vous demandez mal, dans le but de satisfaire vos passions. '
  '4':
  - type: text
    content: 'Adultères que vous êtes! Ne savez-vous pas que l’amour du monde est inimitié contre Dieu? '
  - type: note
    content: Jn 15:19. Ga 1:10. 1 Jn 2:15.
  - type: text
    content: 'Celui donc qui veut être ami du monde se rend ennemi de Dieu. '
  '5':
  - type: text
    content: 'Croyez-vous que l’Écriture parle en vain? '
  - type: note
    content: No 11:29.
  - type: text
    content: 'C’est avec jalousie que Dieu chérit l’esprit qu’il a fait habiter en nous. '
  '6':
  - type: text
    content: 'Il accorde, au contraire, une grâce plus excellente; c’est pourquoi l’Écriture dit: '
  - type: note
    content: Pr 3:34. 1 Pi 5:5.
  - type: text
    content: 'Dieu résiste aux orgueilleux, Mais il fait grâce aux humbles. '
  '7':
  - type: text
    content: 'Soumettez-vous donc à Dieu; '
  - type: note
    content: Ép 4:27. 1 Pi 5:9.
  - type: text
    content: 'résistez au diable, et il fuira loin de vous. '
  '8':
  - type: text
    content: 'Approchez-vous de Dieu, et il s’approchera de vous. '
  - type: note
    content: És 1:15.
  - type: text
    content: 'Nettoyez vos mains, pécheurs; purifiez vos cœurs, hommes irrésolus. '
  '9':
  - type: note
    content: Mt 5:4.
  - type: text
    content: 'Sentez votre misère; soyez dans le deuil et dans les larmes; que votre rire se change en deuil, et votre joie en tristesse. '
