document_id: GEN.43,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-14: cf. Ge 42:29-38; 44:24-34.'
  - type: text
    content: 'La famine s’appesantissait sur le pays. '
  '10':
  - type: text
    content: 'Car si nous n’eussions pas tardé, nous serions maintenant deux fois de retour. '
  '11':
  - type: text
    content: 'Israël, leur père, leur dit: Puisqu’il le faut, faites ceci. Prenez dans vos sacs des meilleures productions du pays, pour en porter un présent à cet homme, un peu de baume et un peu de miel, des aromates, de la myrrhe, des pistaches et des amandes. '
  '12':
  - type: text
    content: 'Prenez avec vous de l’argent au double, et remportez l’argent qu’on avait mis à l’entrée de vos sacs: peut-être était-ce une erreur. '
  '13':
  - type: text
    content: 'Prenez votre frère, et levez-vous; retournez vers cet homme. '
  '14':
  - type: text
    content: Que le Dieu tout-puissant vous fasse trouver grâce devant cet homme, et qu’il laisse revenir avec vous votre autre frère et Benjamin! Et moi, si je dois être privé de mes enfants, que j’en sois privé!
  - type: heading
    content: 'V. 15-34: cf. Ro 12:19-21. 1 Th 5:15.'
  '15':
  - type: text
    content: 'Ils prirent le présent; ils prirent avec eux de l’argent au double, ainsi que Benjamin; ils se levèrent, descendirent en Égypte, et se présentèrent devant Joseph. '
  '16':
  - type: text
    content: 'Dès que Joseph vit avec eux Benjamin, il dit à son intendant: Fais entrer ces gens dans la maison, tue et apprête; car ces gens mangeront avec moi à midi. '
  '17':
  - type: text
    content: 'Cet homme fit ce que Joseph avait ordonné, et il conduisit ces gens dans la maison de Joseph. '
  '18':
  - type: text
    content: 'Ils eurent peur lorsqu’ils furent conduits à la maison de Joseph, et ils dirent: C’est à cause de l’argent remis l’autre fois dans nos sacs qu’on nous emmène; c’est pour se jeter sur nous, se précipiter sur nous; c’est pour nous prendre comme esclaves, et s’emparer de nos ânes. '
  '19':
  - type: text
    content: 'Ils s’approchèrent de l’intendant de la maison de Joseph, et lui adressèrent la parole, à l’entrée de la maison. '
  '2':
  - type: text
    content: 'Quand ils eurent fini de manger le blé qu’ils avaient apporté d’Égypte, Jacob dit à ses fils: Retournez, achetez-nous un peu de vivres. '
  '20':
  - type: text
    content: 'Ils dirent: Pardon! Mon seigneur, '
  - type: note
    content: Ge 42:3.
  - type: text
    content: 'nous sommes déjà descendus une fois pour acheter des vivres. '
  '21':
  - type: text
    content: 'Puis, '
  - type: note
    content: Ge 42:27, 35.
  - type: text
    content: 'quand nous arrivâmes, au lieu où nous devions passer la nuit, nous avons ouvert nos sacs; et voici, l’argent de chacun était à l’entrée de son sac, notre argent selon son poids: nous le rapportons avec nous. '
  '22':
  - type: text
    content: 'Nous avons aussi apporté d’autre argent, pour acheter des vivres. Nous ne savons pas qui avait mis notre argent dans nos sacs. '
  '23':
  - type: text
    content: 'L’intendant répondit: Que la paix soit avec vous! Ne craignez rien. C’est votre Dieu, le Dieu de votre père, qui vous a donné un trésor dans vos sacs. Votre argent m’est parvenu. Et il leur amena Siméon. '
  '24':
  - type: text
    content: 'Cet homme les fit entrer dans la maison de Joseph; '
  - type: note
    content: Ge 18:4.
  - type: text
    content: 'il leur donna de l’eau et ils se lavèrent les pieds; il donna aussi du fourrage à leurs ânes. '
  '25':
  - type: text
    content: 'Ils préparèrent leur présent, en attendant que Joseph vienne à midi; car on les avait informés qu’ils mangeraient chez lui. '
  '26':
  - type: text
    content: 'Quand Joseph fut arrivé à la maison, ils lui offrirent le présent qu’ils avaient apporté, et '
  - type: note
    content: Ge 37:10; 42:6.
  - type: text
    content: 'ils se prosternèrent en terre devant lui. '
  '27':
  - type: text
    content: 'Il leur demanda comment ils se portaient; et il dit: Votre vieux père, dont vous avez parlé, est-il en bonne santé? Vit-il encore? '
  '28':
  - type: text
    content: 'Ils répondirent: Ton serviteur, notre père, est en bonne santé; il vit encore. Et ils s’inclinèrent et se prosternèrent. '
  '29':
  - type: text
    content: 'Joseph leva les yeux; et, jetant un regard sur Benjamin, son frère, fils de sa mère, il dit: Est-ce là votre jeune frère, '
  - type: note
    content: Ge 42:13.
  - type: text
    content: 'dont vous m’avez parlé? Et il ajouta: Dieu te fasse miséricorde, mon fils! '
  '3':
  - type: text
    content: 'Juda lui répondit: Cet homme nous a fait cette déclaration formelle: Vous ne verrez pas ma face, à moins que votre frère ne soit avec vous. '
  '30':
  - type: text
    content: 'Ses entrailles étaient émues pour son frère, et il avait besoin de pleurer; il entra précipitamment dans une chambre, '
  - type: note
    content: Ge 45:2.
  - type: text
    content: 'et il y pleura. '
  '31':
  - type: text
    content: 'Après s’être lavé le visage, il en sortit; et, faisant des efforts pour se contenir, il dit: Servez à manger. '
  '32':
  - type: text
    content: 'On servit Joseph à part, et ses frères à part; les Égyptiens qui mangeaient avec lui furent aussi servis à part, car les Égyptiens ne pouvaient pas manger avec les Hébreux, parce que c’est à leurs yeux une abomination. '
  '33':
  - type: text
    content: 'Les frères de Joseph s’assirent en sa présence, le premier-né selon son droit d’aînesse, et le plus jeune selon son âge; et ils se regardaient les uns les autres avec étonnement. '
  '34':
  - type: text
    content: Joseph leur fit porter des mets qui étaient devant lui, et Benjamin en eut cinq fois plus que les autres. Ils burent, et s’égayèrent avec lui.
  '4':
  - type: text
    content: 'Si donc tu veux envoyer notre frère avec nous, nous descendrons, et nous t’achèterons des vivres. '
  '5':
  - type: text
    content: 'Mais '
  - type: note
    content: Ge 42:20.
  - type: text
    content: 'si tu ne veux pas l’envoyer, nous ne descendrons point, car cet homme nous a dit: '
  - type: note
    content: Ge 44:23.
  - type: text
    content: 'Vous ne verrez pas ma face, à moins que votre frère ne soit avec vous. '
  '6':
  - type: text
    content: 'Israël dit alors: Pourquoi avez-vous mal agi à mon égard, en disant à cet homme que vous aviez encore un frère? '
  '7':
  - type: text
    content: 'Ils répondirent: Cet homme nous a interrogés sur nous et sur notre famille, en disant: Votre père vit-il encore? Avez-vous un frère? Et nous avons répondu à ces questions. Pouvions-nous savoir qu’il dirait: Faites descendre votre frère? '
  '8':
  - type: text
    content: 'Juda dit à Israël, son père: Laisse venir l’enfant avec moi, afin que nous nous levions et que nous partions; et nous vivrons et ne mourrons pas, nous, toi, et nos enfants. '
  '9':
  - type: text
    content: 'Je réponds de lui; '
  - type: note
    content: Ge 44:32.
  - type: text
    content: 'tu le redemanderas de ma main. Si je ne le ramène pas auprès de toi et si je ne le remets pas devant ta face, je serai pour toujours coupable envers toi. '
