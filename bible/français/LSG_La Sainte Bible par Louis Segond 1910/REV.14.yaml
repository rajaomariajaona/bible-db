document_id: REV.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’agneau et ses rachetés sur la montagne de Sion
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. Hé 12:22-24. Ap 7:3, etc.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je regardai, et voici, l’agneau se tenait sur la montagne de Sion, et avec lui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 7:4
      metadata:
        usfm: REV.7.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'cent quarante-quatre mille personnes, qui avaient son nom et le nom de son Père écrits sur leurs fronts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et j’entendis du ciel une voix, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:15
      metadata:
        usfm: REV.1.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme un bruit de grosses eaux, comme le bruit d’un grand tonnerre; et la voix que j’entendis était comme celle '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 5:8
      metadata:
        usfm: REV.5.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de joueurs de harpes jouant de leurs harpes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et ils chantent '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 5:9
      metadata:
        usfm: REV.5.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un cantique nouveau devant le trône, et devant les quatre êtres vivants et les vieillards. Et personne ne pouvait apprendre le cantique, si ce n’est les cent quarante-quatre mille, qui avaient été rachetés de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ce sont ceux qui ne se sont pas souillés avec des femmes, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:2
      metadata:
        usfm: 2CO.11.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car ils sont vierges; ils suivent l’agneau partout où il va. Ils ont été rachetés d’entre les hommes, comme des prémices pour Dieu et pour l’agneau; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: So 3:13
      metadata:
        usfm: ZEP.3.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et dans leur bouche il ne s’est point trouvé de mensonge, car ils sont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:27
      metadata:
        usfm: EPH.5.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: irrépréhensibles.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Trois anges proclament les jugements de Dieu
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-13: cf. (Mt 24:14. Ac 17:30, 31.) Ap 18; 19:19, 20; 2:10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je vis un autre ange qui volait par le milieu du ciel, ayant un Évangile éternel, pour l’annoncer aux habitants de la terre, à toute nation, à toute tribu, à toute langue, et à tout peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il disait d’une voix forte: Craignez Dieu, et donnez-lui gloire, car l’heure de son jugement est venue; et adorez celui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 1:1
      metadata:
        usfm: GEN.1.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 33:6
      metadata:
        usfm: PSA.33.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 124:8
      metadata:
        usfm: PSA.124.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 146:6
      metadata:
        usfm: PSA.146.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 14:15
      metadata:
        usfm: ACT.14.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:24
      metadata:
        usfm: ACT.17.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui a fait le ciel, et la terre, et la mer, et les sources d’eaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et un autre, un second ange suivit, en disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 21:9
      metadata:
        usfm: ISA.21.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 51:8
      metadata:
        usfm: JER.51.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 18:2
      metadata:
        usfm: REV.18.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Elle est tombée, elle est tombée, Babylone '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 16:19
      metadata:
        usfm: REV.16.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:5
      metadata:
        usfm: REV.17.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:10
      metadata:
        usfm: REV.18.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '21'
      metadata:
        usfm: REV.18.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la grande, qui a abreuvé toutes les nations du vin de la fureur de son impudicité! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et un autre, un troisième ange les suivit, en disant d’une voix forte: Si quelqu’un adore la bête et son image, et reçoit une marque sur son front ou sur sa main, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'il boira, lui aussi, du vin de la fureur de Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 18:5
      metadata:
        usfm: REV.18.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'versé sans mélange '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 16:19
      metadata:
        usfm: REV.16.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dans la coupe de sa colère, et il sera '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 20:10
      metadata:
        usfm: REV.20.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tourmenté '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 19:20
      metadata:
        usfm: REV.19.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dans le feu et le soufre, devant les saints anges et devant l’agneau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 19:3
      metadata:
        usfm: REV.19.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et la fumée de leur tourment monte aux siècles des siècles; et ils n’ont de repos ni jour ni nuit, ceux qui adorent la bête et son image, et quiconque reçoit la marque de son nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 13:10
      metadata:
        usfm: REV.13.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est ici la persévérance des saints, qui gardent les commandements de Dieu et la foi de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et j’entendis du ciel une voix qui disait: Écris: Heureux dès à présent les morts qui meurent dans le Seigneur! Oui, dit l’Esprit, afin qu’ils se reposent de leurs travaux, car leurs œuvres les suivent.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La moisson et la vendange
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-20: cf. (Joë 3:12-14. Mt 13:37-43.) És 63:1-6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je regardai, et voici, il y avait une nuée blanche, et sur la nuée était assis quelqu’un '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 1:26
      metadata:
        usfm: EZK.1.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 7:13
      metadata:
        usfm: DAN.7.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:13
      metadata:
        usfm: REV.1.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui ressemblait à un fils d’homme, ayant sur sa tête une couronne d’or, et dans sa main une faucille tranchante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et un autre ange sortit du temple, criant d’une voix forte à celui qui était assis sur la nuée: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 3:13
      metadata:
        usfm: JOL.3.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:39
      metadata:
        usfm: MAT.13.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lance ta faucille, et moissonne; car l’heure de moissonner est venue, car la moisson de la terre est mûre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et celui qui était assis sur la nuée jeta sa faucille sur la terre. Et la terre fut moissonnée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et un autre ange sortit du temple qui est dans le ciel, ayant, lui aussi, une faucille tranchante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et un autre ange, qui avait autorité sur le feu, sortit de l’autel, et s’adressa d’une voix forte à celui qui avait la faucille tranchante, disant: Lance ta faucille tranchante, et vendange les grappes de la vigne de la terre; car les raisins de la terre sont mûrs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et l’ange jeta sa faucille sur la terre. Et il vendangea la vigne de la terre, et jeta la vendange dans la grande cuve '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 19:15
      metadata:
        usfm: REV.19.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de la colère de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 63:3
      metadata:
        usfm: ISA.63.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: la cuve fut foulée hors de la ville; et du sang sortit de la cuve, jusqu’aux mors des chevaux, sur une étendue de mille six cents stades.
