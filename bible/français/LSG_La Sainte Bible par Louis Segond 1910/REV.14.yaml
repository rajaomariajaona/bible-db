document_id: REV.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: L’agneau et ses rachetés sur la montagne de Sion
  - type: heading
    content: 'V. 1-5: cf. Hé 12:22-24. Ap 7:3, etc.'
  - type: text
    content: 'Je regardai, et voici, l’agneau se tenait sur la montagne de Sion, et avec lui '
  - type: note
    content: Ap 7:4.
  - type: text
    content: 'cent quarante-quatre mille personnes, qui avaient son nom et le nom de son Père écrits sur leurs fronts. '
  '10':
  - type: text
    content: 'il boira, lui aussi, du vin de la fureur de Dieu, '
  - type: note
    content: Ap 18:5.
  - type: text
    content: 'versé sans mélange '
  - type: note
    content: Ap 16:19.
  - type: text
    content: 'dans la coupe de sa colère, et il sera '
  - type: note
    content: Ap 20:10.
  - type: text
    content: 'tourmenté '
  - type: note
    content: Ap 19:20.
  - type: text
    content: 'dans le feu et le soufre, devant les saints anges et devant l’agneau. '
  '11':
  - type: note
    content: Ap 19:3.
  - type: text
    content: 'Et la fumée de leur tourment monte aux siècles des siècles; et ils n’ont de repos ni jour ni nuit, ceux qui adorent la bête et son image, et quiconque reçoit la marque de son nom. '
  '12':
  - type: note
    content: Ap 13:10.
  - type: text
    content: 'C’est ici la persévérance des saints, qui gardent les commandements de Dieu et la foi de Jésus. '
  '13':
  - type: text
    content: 'Et j’entendis du ciel une voix qui disait: Écris: Heureux dès à présent les morts qui meurent dans le Seigneur! Oui, dit l’Esprit, afin qu’ils se reposent de leurs travaux, car leurs œuvres les suivent.'
  - type: heading
    content: La moisson et la vendange
  - type: heading
    content: 'V. 14-20: cf. (Joë 3:12-14. Mt 13:37-43.) És 63:1-6.'
  '14':
  - type: text
    content: 'Je regardai, et voici, il y avait une nuée blanche, et sur la nuée était assis quelqu’un '
  - type: note
    content: Éz 1:26. Da 7:13. Ap 1:13.
  - type: text
    content: 'qui ressemblait à un fils d’homme, ayant sur sa tête une couronne d’or, et dans sa main une faucille tranchante. '
  '15':
  - type: text
    content: 'Et un autre ange sortit du temple, criant d’une voix forte à celui qui était assis sur la nuée: '
  - type: note
    content: Joë 3:13. Mt 13:39.
  - type: text
    content: 'Lance ta faucille, et moissonne; car l’heure de moissonner est venue, car la moisson de la terre est mûre. '
  '16':
  - type: text
    content: 'Et celui qui était assis sur la nuée jeta sa faucille sur la terre. Et la terre fut moissonnée. '
  '17':
  - type: text
    content: 'Et un autre ange sortit du temple qui est dans le ciel, ayant, lui aussi, une faucille tranchante. '
  '18':
  - type: text
    content: 'Et un autre ange, qui avait autorité sur le feu, sortit de l’autel, et s’adressa d’une voix forte à celui qui avait la faucille tranchante, disant: Lance ta faucille tranchante, et vendange les grappes de la vigne de la terre; car les raisins de la terre sont mûrs. '
  '19':
  - type: text
    content: 'Et l’ange jeta sa faucille sur la terre. Et il vendangea la vigne de la terre, et jeta la vendange dans la grande cuve '
  - type: note
    content: Ap 19:15.
  - type: text
    content: 'de la colère de Dieu. '
  '2':
  - type: text
    content: 'Et j’entendis du ciel une voix, '
  - type: note
    content: Ap 1:15.
  - type: text
    content: 'comme un bruit de grosses eaux, comme le bruit d’un grand tonnerre; et la voix que j’entendis était comme celle '
  - type: note
    content: Ap 5:8.
  - type: text
    content: 'de joueurs de harpes jouant de leurs harpes. '
  '20':
  - type: text
    content: 'Et '
  - type: note
    content: És 63:3.
  - type: text
    content: la cuve fut foulée hors de la ville; et du sang sortit de la cuve, jusqu’aux mors des chevaux, sur une étendue de mille six cents stades.
  '3':
  - type: text
    content: 'Et ils chantent '
  - type: note
    content: Ap 5:9.
  - type: text
    content: 'un cantique nouveau devant le trône, et devant les quatre êtres vivants et les vieillards. Et personne ne pouvait apprendre le cantique, si ce n’est les cent quarante-quatre mille, qui avaient été rachetés de la terre. '
  '4':
  - type: text
    content: 'Ce sont ceux qui ne se sont pas souillés avec des femmes, '
  - type: note
    content: 2 Co 11:2.
  - type: text
    content: 'car ils sont vierges; ils suivent l’agneau partout où il va. Ils ont été rachetés d’entre les hommes, comme des prémices pour Dieu et pour l’agneau; '
  '5':
  - type: note
    content: So 3:13.
  - type: text
    content: 'et dans leur bouche il ne s’est point trouvé de mensonge, car ils sont '
  - type: note
    content: Ép 5:27.
  - type: text
    content: irrépréhensibles.
  - type: heading
    content: Trois anges proclament les jugements de Dieu
  - type: heading
    content: 'V. 6-13: cf. (Mt 24:14. Ac 17:30, 31.) Ap 18; 19:19, 20; 2:10.'
  '6':
  - type: text
    content: 'Je vis un autre ange qui volait par le milieu du ciel, ayant un Évangile éternel, pour l’annoncer aux habitants de la terre, à toute nation, à toute tribu, à toute langue, et à tout peuple. '
  '7':
  - type: text
    content: 'Il disait d’une voix forte: Craignez Dieu, et donnez-lui gloire, car l’heure de son jugement est venue; et adorez celui '
  - type: note
    content: Ge 1:1. Ps 33:6; 124:8; 146:6. Ac 14:15; 17:24.
  - type: text
    content: 'qui a fait le ciel, et la terre, et la mer, et les sources d’eaux. '
  '8':
  - type: text
    content: 'Et un autre, un second ange suivit, en disant: '
  - type: note
    content: És 21:9. Jé 51:8. Ap 18:2.
  - type: text
    content: 'Elle est tombée, elle est tombée, Babylone '
  - type: note
    content: Ap 16:19; 17:5; 18:10, 21.
  - type: text
    content: 'la grande, qui a abreuvé toutes les nations du vin de la fureur de son impudicité! '
  '9':
  - type: text
    content: 'Et un autre, un troisième ange les suivit, en disant d’une voix forte: Si quelqu’un adore la bête et son image, et reçoit une marque sur son front ou sur sa main, '
