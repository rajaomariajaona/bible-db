document_id: DEU.10,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La protection et l’amour de Dieu pour Israël, source de crainte et d’obéissance
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. Ex 34. (No 3 et 18.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'En ce temps-là, l’Éternel me dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 34:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Taille deux tables de pierre comme les premières, et monte vers moi sur la montagne; tu feras aussi une arche de bois. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Je restai sur la montagne, comme précédemment, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 9:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'quarante jours et quarante nuits. L’Éternel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 9:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'm’exauça encore cette fois; l’Éternel ne voulut pas te détruire. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'L’Éternel me dit: Lève-toi, va, marche à la tête du peuple. Qu’ils aillent prendre possession du pays que j’ai juré à leurs pères de leur donner.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-22: cf. (De 7:6-11; 6:20-25. Ro 12:1, 2.) Ps 146.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Maintenant, Israël, que demande de toi l’Éternel, ton Dieu, si ce n’est que tu craignes l’Éternel, ton Dieu, afin de marcher dans toutes ses voies, d’aimer et de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 6:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 22:37
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 10:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'servir l’Éternel, ton Dieu, de tout ton cœur et de toute ton âme; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'si ce n’est que tu observes les commandements de l’Éternel et ses lois que je te prescris aujourd’hui, afin que tu sois heureux? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Voici, à l’Éternel, ton Dieu, appartiennent les cieux et les cieux des cieux, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 14:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 24:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 115:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'la terre et tout ce qu’elle renferme. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Et c’est à tes pères seulement que l’Éternel s’est attaché pour les aimer; et, après eux, c’est leur postérité, c’est vous qu’il a choisis d’entre tous les peuples, comme vous le voyez aujourd’hui. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Vous circoncirez donc '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 4:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'votre cœur, et vous ne roidirez plus '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 9:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'votre cou. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Car l’Éternel, votre Dieu, est le Dieu des dieux, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 17:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le Seigneur des seigneurs, le Dieu grand, fort et terrible, qui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 19:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 34:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 10:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 2:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 2:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 6:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ne fait point acception des personnes et qui ne reçoit point de présent, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'qui fait droit à l’orphelin et à la veuve, qui aime l’étranger et lui donne de la nourriture et des vêtements. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Vous aimerez l’étranger, car vous avez été étrangers dans le pays d’Égypte. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'J’écrirai sur ces tables les paroles qui étaient sur les premières tables que tu as brisées, et tu les mettras dans l’arche. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 6:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 4:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 4:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'craindras l’Éternel, ton Dieu, tu le serviras, tu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 13:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 't’attacheras à lui, et tu jureras par son nom. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Il est ta gloire, il est ton Dieu: c’est lui qui a fait au milieu de toi ces choses grandes et terribles que tes yeux ont vues. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Tes pères descendirent en Égypte au nombre de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 46:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 1:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'soixante-dix personnes; et maintenant l’Éternel, ton Dieu, a fait de toi une multitude '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 15:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: pareille aux étoiles des cieux.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Je fis une arche de bois d’acacia, je taillai deux tables de pierre comme les premières, et je montai sur la montagne, les deux tables dans ma main. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'L’Éternel écrivit sur les tables ce qui avait été écrit sur les premières, les dix paroles qu’il vous avait dites sur la montagne, du milieu du feu, le jour de l’assemblée; et l’Éternel me les donna. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Je retournai et je descendis de la montagne, je mis les tables dans l’arche que j’avais faite, et elles restèrent là, comme l’Éternel me l’avait ordonné. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Les enfants d’Israël '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 33:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'partirent de Beéroth-Bené Jaakan pour Moséra. C’est là que '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 20:28
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:38
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mourut Aaron, et qu’il fut enterré; Éléazar, son fils, lui succéda dans le sacerdoce. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ils partirent de là pour Gudgoda, et de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 33:32
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Gudgoda pour Jothbatha, pays où il y a des cours d’eaux. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'En ce temps-là, l’Éternel sépara la tribu de Lévi, et lui ordonna de porter l’arche de l’alliance de l’Éternel, de se tenir devant l’Éternel pour le servir, et de bénir le peuple en son nom: ce qu’elle a fait jusqu’à ce jour. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'C’est pourquoi Lévi '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'No 18:20, 21, etc. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 18:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 44:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'n’a ni part ni héritage avec ses frères: l’Éternel est son héritage, comme l’Éternel, ton Dieu, le lui a dit. '
