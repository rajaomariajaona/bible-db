document_id: DEU.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La protection et l’amour de Dieu pour Israël, source de crainte et d’obéissance
  - type: heading
    content: 'V. 1-11: cf. Ex 34. (No 3 et 18.)'
  - type: text
    content: 'En ce temps-là, l’Éternel me dit: '
  - type: note
    content: Ex 34:1.
  - type: text
    content: 'Taille deux tables de pierre comme les premières, et monte vers moi sur la montagne; tu feras aussi une arche de bois. '
  '10':
  - type: text
    content: 'Je restai sur la montagne, comme précédemment, '
  - type: note
    content: De 9:18.
  - type: text
    content: 'quarante jours et quarante nuits. L’Éternel '
  - type: note
    content: De 9:19.
  - type: text
    content: 'm’exauça encore cette fois; l’Éternel ne voulut pas te détruire. '
  '11':
  - type: text
    content: 'L’Éternel me dit: Lève-toi, va, marche à la tête du peuple. Qu’ils aillent prendre possession du pays que j’ai juré à leurs pères de leur donner.'
  - type: heading
    content: 'V. 12-22: cf. (De 7:6-11; 6:20-25. Ro 12:1, 2.) Ps 146.'
  '12':
  - type: text
    content: 'Maintenant, Israël, que demande de toi l’Éternel, ton Dieu, si ce n’est que tu craignes l’Éternel, ton Dieu, afin de marcher dans toutes ses voies, d’aimer et de '
  - type: note
    content: De 6:5. Mt 22:37. Lu 10:27.
  - type: text
    content: 'servir l’Éternel, ton Dieu, de tout ton cœur et de toute ton âme; '
  '13':
  - type: text
    content: 'si ce n’est que tu observes les commandements de l’Éternel et ses lois que je te prescris aujourd’hui, afin que tu sois heureux? '
  '14':
  - type: text
    content: 'Voici, à l’Éternel, ton Dieu, appartiennent les cieux et les cieux des cieux, '
  - type: note
    content: Ge 14:19. Ps 24:1; 115:16.
  - type: text
    content: 'la terre et tout ce qu’elle renferme. '
  '15':
  - type: text
    content: 'Et c’est à tes pères seulement que l’Éternel s’est attaché pour les aimer; et, après eux, c’est leur postérité, c’est vous qu’il a choisis d’entre tous les peuples, comme vous le voyez aujourd’hui. '
  '16':
  - type: text
    content: 'Vous circoncirez donc '
  - type: note
    content: Jé 4:4.
  - type: text
    content: 'votre cœur, et vous ne roidirez plus '
  - type: note
    content: Ex 32:9; 33:3; 34:9. De 9:13.
  - type: text
    content: 'votre cou. '
  '17':
  - type: text
    content: 'Car l’Éternel, votre Dieu, est le Dieu des dieux, '
  - type: note
    content: Ap 17:14.
  - type: text
    content: 'le Seigneur des seigneurs, le Dieu grand, fort et terrible, qui '
  - type: note
    content: 2 Ch 19:6, 7. Job 34:19. Ac 10:34. Ro 2:11. Ga 2:6. Ép 6:9. Col 3:25. 1 Pi 1:17.
  - type: text
    content: 'ne fait point acception des personnes et qui ne reçoit point de présent, '
  '18':
  - type: text
    content: 'qui fait droit à l’orphelin et à la veuve, qui aime l’étranger et lui donne de la nourriture et des vêtements. '
  '19':
  - type: text
    content: 'Vous aimerez l’étranger, car vous avez été étrangers dans le pays d’Égypte. '
  '2':
  - type: text
    content: 'J’écrirai sur ces tables les paroles qui étaient sur les premières tables que tu as brisées, et tu les mettras dans l’arche. '
  '20':
  - type: text
    content: 'Tu '
  - type: note
    content: De 6:13. Mt 4:10. Lu 4:8.
  - type: text
    content: 'craindras l’Éternel, ton Dieu, tu le serviras, tu '
  - type: note
    content: De 13:4.
  - type: text
    content: 't’attacheras à lui, et tu jureras par son nom. '
  '21':
  - type: text
    content: 'Il est ta gloire, il est ton Dieu: c’est lui qui a fait au milieu de toi ces choses grandes et terribles que tes yeux ont vues. '
  '22':
  - type: text
    content: 'Tes pères descendirent en Égypte au nombre de '
  - type: note
    content: Ge 46:27. Ex 1:5. Ac 7:14.
  - type: text
    content: 'soixante-dix personnes; et maintenant l’Éternel, ton Dieu, a fait de toi une multitude '
  - type: note
    content: Ge 15:5.
  - type: text
    content: pareille aux étoiles des cieux.
  '3':
  - type: text
    content: 'Je fis une arche de bois d’acacia, je taillai deux tables de pierre comme les premières, et je montai sur la montagne, les deux tables dans ma main. '
  '4':
  - type: text
    content: 'L’Éternel écrivit sur les tables ce qui avait été écrit sur les premières, les dix paroles qu’il vous avait dites sur la montagne, du milieu du feu, le jour de l’assemblée; et l’Éternel me les donna. '
  '5':
  - type: text
    content: 'Je retournai et je descendis de la montagne, je mis les tables dans l’arche que j’avais faite, et elles restèrent là, comme l’Éternel me l’avait ordonné. '
  '6':
  - type: text
    content: 'Les enfants d’Israël '
  - type: note
    content: No 33:30.
  - type: text
    content: 'partirent de Beéroth-Bené Jaakan pour Moséra. C’est là que '
  - type: note
    content: No 20:28; 33:38.
  - type: text
    content: 'mourut Aaron, et qu’il fut enterré; Éléazar, son fils, lui succéda dans le sacerdoce. '
  '7':
  - type: text
    content: 'Ils partirent de là pour Gudgoda, et de '
  - type: note
    content: No 33:32, 33.
  - type: text
    content: 'Gudgoda pour Jothbatha, pays où il y a des cours d’eaux. '
  '8':
  - type: text
    content: 'En ce temps-là, l’Éternel sépara la tribu de Lévi, et lui ordonna de porter l’arche de l’alliance de l’Éternel, de se tenir devant l’Éternel pour le servir, et de bénir le peuple en son nom: ce qu’elle a fait jusqu’à ce jour. '
  '9':
  - type: text
    content: 'C’est pourquoi Lévi '
  - type: note
    content: No 18:20, 21, etc. De 18:1. Éz 44:28.
  - type: text
    content: 'n’a ni part ni héritage avec ses frères: l’Éternel est son héritage, comme l’Éternel, ton Dieu, le lui a dit. '
