document_id: JER.17,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La punition des rebelles
  - type: heading
    content: 'V. 1-4: cf. Os 8:11-14. Lé 26:30-33.'
  - type: text
    content: Le péché de Juda est écrit avec un burin de fer,
  - type: text
    content: Avec une pointe de diamant;
  - type: text
    content: Il est gravé sur la table de leur cœur,
  - type: text
    content: 'Et sur les cornes de vos '
  - type: note
    content: Jé 11:13.
  - type: text
    content: autels.
  '10':
  - type: text
    content: 'Moi, l’Éternel, '
  - type: note
    content: 1 S 16:7. Ps 7:10.
  - type: text
    content: j’éprouve le cœur, je sonde les reins,
  - type: text
    content: Pour rendre à chacun selon ses voies,
  - type: text
    content: Selon le fruit de ses œuvres.
  '11':
  - type: text
    content: Comme une perdrix qui couve des œufs qu’elle n’a point pondus,
  - type: text
    content: Tel est celui qui acquiert des richesses injustement;
  - type: text
    content: Au milieu de ses jours il doit les quitter,
  - type: text
    content: Et à la fin il n’est qu’un insensé.
  '12':
  - type: text
    content: Il est un trône de gloire, élevé dès le commencement,
  - type: text
    content: C’est le lieu de notre sanctuaire.
  '13':
  - type: text
    content: Toi qui es l’espérance d’Israël, ô Éternel!
  - type: note
    content: Ps 73:27. És 1:28.
  - type: text
    content: Tous ceux qui t’abandonnent seront confondus.
  - type: text
    content: Ceux qui se détournent de moi seront inscrits sur la terre,
  - type: text
    content: 'Car ils abandonnent '
  - type: note
    content: Jé 2:13.
  - type: text
    content: la source d’eau vive, l’Éternel.
  - type: heading
    content: 'V. 14-18: cf. Ps 125. Jé 20:10-13.'
  '14':
  - type: text
    content: Guéris-moi, Éternel, et je serai guéri;
  - type: text
    content: Sauve-moi, et je serai sauvé;
  - type: text
    content: Car tu es ma gloire.
  '15':
  - type: text
    content: 'Voici, ils me disent:'
  - type: note
    content: És 5:19. 2 Pi 3:4.
  - type: text
    content: Où est la parole de l’Éternel?
  - type: text
    content: Qu’elle s’accomplisse donc!
  '16':
  - type: text
    content: Et moi, pour t’obéir, je n’ai pas refusé d’être pasteur;
  - type: text
    content: Je n’ai pas non plus désiré le jour du malheur, tu le sais;
  - type: text
    content: Ce qui est sorti de mes lèvres a été découvert devant toi.
  '17':
  - type: text
    content: Ne sois pas pour moi un sujet d’effroi,
  - type: text
    content: 'Toi, mon '
  - type: note
    content: Jé 16:19.
  - type: text
    content: refuge au jour du malheur!
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ps 35:4; 40:15. Jé 15:15.
  - type: text
    content: Que mes persécuteurs soient confus, et que je ne sois pas confus;
  - type: text
    content: Qu’ils tremblent, et que je ne tremble pas, moi!
  - type: text
    content: Fais venir sur eux le jour du malheur,
  - type: text
    content: Frappe-les d’une double plaie!
  - type: heading
    content: La sanctification du sabbat
  - type: heading
    content: 'V. 19-27: cf. (Ex 20:8-11. Né 13:15-21. És 58:13, 14.)'
  '19':
  - type: text
    content: 'Ainsi m’a parlé l’Éternel: Va, et tiens-toi à la porte des enfants du peuple, par laquelle entrent et sortent les rois de Juda, et à toutes les portes de Jérusalem. '
  '2':
  - type: text
    content: Comme ils pensent à leurs enfants, ainsi pensent-ils à leurs autels
  - type: text
    content: 'Et à leurs idoles d’Astarté près des '
  - type: note
    content: Jé 2:20.
  - type: text
    content: arbres verts,
  - type: text
    content: Sur les collines élevées.
  '20':
  - type: text
    content: 'Tu leur diras: Écoutez la parole de l’Éternel, rois de Juda, et tout Juda, et vous tous, habitants de Jérusalem, qui entrez par ces portes!'
  '21':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: note
    content: Né 13:19.
  - type: text
    content: Prenez garde à vos âmes;
  - type: text
    content: Ne portez point de fardeau le jour du sabbat,
  - type: text
    content: Et n’en introduisez point par les portes de Jérusalem.
  '22':
  - type: text
    content: Ne sortez de vos maisons aucun fardeau le jour du sabbat,
  - type: text
    content: Et ne faites aucun ouvrage;
  - type: text
    content: Mais sanctifiez le jour du sabbat,
  - type: text
    content: 'Comme je l’ai ordonné à vos '
  - type: note
    content: Ex 20:8; 23:12; 31:13. Éz 20:12.
  - type: text
    content: pères.
  '23':
  - type: text
    content: 'Ils n’ont pas '
  - type: note
    content: Jé 11:10; 13:10; 16:12.
  - type: text
    content: écouté, ils n’ont pas prêté l’oreille;
  - type: text
    content: Ils ont raidi leur cou,
  - type: text
    content: Pour ne point écouter et ne point recevoir instruction.
  '24':
  - type: text
    content: Si vous m’écoutez, dit l’Éternel,
  - type: text
    content: Si vous n’introduisez point de fardeau
  - type: text
    content: Par les portes de cette ville le jour du sabbat,
  - type: text
    content: Si vous sanctifiez le jour du sabbat,
  - type: text
    content: Et ne faites aucun ouvrage ce jour-là,
  '25':
  - type: text
    content: ' '
  - type: note
    content: Jé 22:4.
  - type: text
    content: Alors entreront par les portes de cette ville
  - type: text
    content: Les rois et les princes assis sur le trône de David,
  - type: text
    content: Montés sur des chars et sur des chevaux,
  - type: text
    content: Eux et leurs princes, les hommes de Juda et les habitants de Jérusalem,
  - type: text
    content: Et cette ville sera habitée à toujours.
  '26':
  - type: text
    content: On viendra des villes de Juda et des environs de Jérusalem,
  - type: text
    content: Du pays de Benjamin, de la vallée,
  - type: text
    content: De la montagne et du midi,
  - type: text
    content: Pour amener des holocaustes et des victimes,
  - type: text
    content: Pour apporter des offrandes et de l’encens,
  - type: text
    content: Et pour offrir des sacrifices d’actions de grâces dans la maison de l’Éternel.
  '27':
  - type: text
    content: Mais si vous n’écoutez pas quand je vous ordonne
  - type: text
    content: De sanctifier le jour du sabbat,
  - type: text
    content: De ne porter aucun fardeau,
  - type: text
    content: De ne point en introduire par les portes de Jérusalem le jour du sabbat,
  - type: text
    content: Alors j’allumerai un feu aux portes de la ville,
  - type: text
    content: Et il dévorera les palais de Jérusalem et ne s’éteindra point.
  '3':
  - type: text
    content: 'Je livre au pillage ma montagne et ses champs, '
  - type: note
    content: Jé 15:13.
  - type: text
    content: tes biens, tous tes trésors,
  - type: text
    content: Et tes hauts lieux, à cause de tes péchés, sur tout ton territoire.
  '4':
  - type: text
    content: Tu perdras par ta faute l’héritage que je t’avais donné;
  - type: text
    content: 'Je '
  - type: note
    content: De 28:68.
  - type: text
    content: 't’asservirai à ton ennemi dans un pays que tu ne '
  - type: note
    content: Jé 16:13.
  - type: text
    content: connais pas;
  - type: text
    content: 'Car vous avez allumé le '
  - type: note
    content: Jé 15:14.
  - type: text
    content: feu de ma colère,
  - type: text
    content: Et il brûlera toujours.
  - type: heading
    content: 'V. 5-8: cf. Ps 146:3, etc.'
  '5':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Maudit soit l’homme qui se confie dans l’homme,
  - type: text
    content: Qui prend la chair pour son appui,
  - type: text
    content: Et qui détourne son cœur de l’Éternel!
  '6':
  - type: text
    content: Il est comme un misérable dans le désert,
  - type: text
    content: Et il ne voit point arriver le bonheur;
  - type: text
    content: Il habite les lieux brûlés du désert,
  - type: text
    content: Une terre salée et sans habitants.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps 2:12; 34:9. Pr 16:20. És 30:18.
  - type: text
    content: Béni soit l’homme qui se confie dans l’Éternel,
  - type: text
    content: Et dont l’Éternel est l’espérance!
  '8':
  - type: text
    content: 'Il est comme un '
  - type: note
    content: Ps 1:3.
  - type: text
    content: arbre planté près des eaux,
  - type: text
    content: Et qui étend ses racines vers le courant;
  - type: text
    content: Il n’aperçoit point la chaleur quand elle vient,
  - type: text
    content: Et son feuillage reste vert;
  - type: text
    content: Dans l’année de la sécheresse, il n’a point de crainte,
  - type: text
    content: Et il ne cesse de porter du fruit.
  - type: heading
    content: 'V. 9-13: cf. Ps 14:2, 3. Ro 2:1-11.'
  '9':
  - type: text
    content: 'Le cœur est tortueux par-dessus tout, et il est méchant:'
  - type: text
    content: Qui peut le connaître?
