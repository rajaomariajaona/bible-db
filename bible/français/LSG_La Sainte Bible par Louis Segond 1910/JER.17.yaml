      metadata:
        usfm: EXO.31.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 20:12
      metadata:
        usfm: EZK.20.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: pères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ils n’ont pas '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 11:10
      metadata:
        usfm: JER.11.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:10
      metadata:
        usfm: JER.13.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:12
      metadata:
        usfm: JER.16.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: écouté, ils n’ont pas prêté l’oreille;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont raidi leur cou,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour ne point écouter et ne point recevoir instruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Si vous m’écoutez, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si vous n’introduisez point de fardeau
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par les portes de cette ville le jour du sabbat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si vous sanctifiez le jour du sabbat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne faites aucun ouvrage ce jour-là,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 22:4
      metadata:
        usfm: JER.22.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Alors entreront par les portes de cette ville
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les rois et les princes assis sur le trône de David,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Montés sur des chars et sur des chevaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eux et leurs princes, les hommes de Juda et les habitants de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et cette ville sera habitée à toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: On viendra des villes de Juda et des environs de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du pays de Benjamin, de la vallée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De la montagne et du midi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour amener des holocaustes et des victimes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour apporter des offrandes et de l’encens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pour offrir des sacrifices d’actions de grâces dans la maison de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
