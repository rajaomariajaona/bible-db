      metadata:
        usfm: ISA.30.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Béni soit l’homme qui se confie dans l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et dont l’Éternel est l’espérance!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il est comme un '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 1:3
      metadata:
        usfm: PSA.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: arbre planté près des eaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui étend ses racines vers le courant;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’aperçoit point la chaleur quand elle vient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et son feuillage reste vert;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans l’année de la sécheresse, il n’a point de crainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il ne cesse de porter du fruit.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-13: cf. Ps 14:2, 3. Ro 2:1-11.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le cœur est tortueux par-dessus tout, et il est méchant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui peut le connaître?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Moi, l’Éternel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 16:7
      metadata:
        usfm: 1SA.16.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 7:10
      metadata:
        usfm: PSA.7.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: j’éprouve le cœur, je sonde les reins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour rendre à chacun selon ses voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Selon le fruit de ses œuvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Comme une perdrix qui couve des œufs qu’elle n’a point pondus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tel est celui qui acquiert des richesses injustement;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au milieu de ses jours il doit les quitter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et à la fin il n’est qu’un insensé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il est un trône de gloire, élevé dès le commencement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est le lieu de notre sanctuaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Toi qui es l’espérance d’Israël, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 73:27
      metadata:
        usfm: PSA.73.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:28
      metadata:
        usfm: ISA.1.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tous ceux qui t’abandonnent seront confondus.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui se détournent de moi seront inscrits sur la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car ils abandonnent '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:13
      metadata:
        usfm: JER.2.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: la source d’eau vive, l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-18: cf. Ps 125. Jé 20:10-13.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Guéris-moi, Éternel, et je serai guéri;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sauve-moi, et je serai sauvé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu es ma gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici, ils me disent:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:19
      metadata:
        usfm: ISA.5.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 3:4
      metadata:
        usfm: 2PE.3.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Où est la parole de l’Éternel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’elle s’accomplisse donc!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Et moi, pour t’obéir, je n’ai pas refusé d’être pasteur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je n’ai pas non plus désiré le jour du malheur, tu le sais;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce qui est sorti de mes lèvres a été découvert devant toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ne sois pas pour moi un sujet d’effroi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Toi, mon '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 16:19
      metadata:
        usfm: JER.16.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: refuge au jour du malheur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 35:4
      metadata:
        usfm: PSA.35.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 40:15
      metadata:
        usfm: PSA.40.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 15:15
      metadata:
        usfm: JER.15.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Que mes persécuteurs soient confus, et que je ne sois pas confus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils tremblent, et que je ne tremble pas, moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais venir sur eux le jour du malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Frappe-les d’une double plaie!
- type: usfm
  marker: s1
  children:
  - type: text
    text: La sanctification du sabbat
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 19-27: cf. (Ex 20:8-11. Né 13:15-21. És 58:13, 14.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ainsi m’a parlé l’Éternel: Va, et tiens-toi à la porte des enfants du peuple, par laquelle entrent et sortent les rois de Juda, et à toutes les portes de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tu leur diras: Écoutez la parole de l’Éternel, rois de Juda, et tout Juda, et vous tous, habitants de Jérusalem, qui entrez par ces portes!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Né 13:19
      metadata:
        usfm: NEH.13.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Prenez garde à vos âmes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne portez point de fardeau le jour du sabbat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et n’en introduisez point par les portes de Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ne sortez de vos maisons aucun fardeau le jour du sabbat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne faites aucun ouvrage;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais sanctifiez le jour du sabbat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Comme je l’ai ordonné à vos '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:8
      metadata:
        usfm: EXO.20.8
