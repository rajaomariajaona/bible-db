  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le péché de Juda est écrit avec un burin de fer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec une pointe de diamant;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est gravé sur la table de leur cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et sur les cornes de vos '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 11:13
      metadata:
        usfm: JER.11.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: autels.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Comme ils pensent à leurs enfants, ainsi pensent-ils à leurs autels
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et à leurs idoles d’Astarté près des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:20
      metadata:
        usfm: JER.2.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: arbres verts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur les collines élevées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je livre au pillage ma montagne et ses champs, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 15:13
      metadata:
        usfm: JER.15.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: tes biens, tous tes trésors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes hauts lieux, à cause de tes péchés, sur tout ton territoire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tu perdras par ta faute l’héritage que je t’avais donné;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:68
      metadata:
        usfm: DEU.28.68
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 't’asservirai à ton ennemi dans un pays que tu ne '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 16:13
      metadata:
        usfm: JER.16.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: connais pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car vous avez allumé le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 15:14
      metadata:
        usfm: JER.15.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: feu de ma colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il brûlera toujours.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 5-8: cf. Ps 146:3, etc.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maudit soit l’homme qui se confie dans l’homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui prend la chair pour son appui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui détourne son cœur de l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il est comme un misérable dans le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il ne voit point arriver le bonheur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il habite les lieux brûlés du désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une terre salée et sans habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 2:12
      metadata:
        usfm: PSA.2.12
    - type: text
      text: '; '
