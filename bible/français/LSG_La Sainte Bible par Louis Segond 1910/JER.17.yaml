verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La punition des rebelles
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-4: cf. Os 8:11-14. Lé 26:30-33.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le péché de Juda est écrit avec un burin de fer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec une pointe de diamant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est gravé sur la table de leur cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et sur les cornes de vos '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 11:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: autels.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Moi, l’Éternel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 16:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 7:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: j’éprouve le cœur, je sonde les reins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour rendre à chacun selon ses voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Selon le fruit de ses œuvres.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme une perdrix qui couve des œufs qu’elle n’a point pondus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tel est celui qui acquiert des richesses injustement;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu de ses jours il doit les quitter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et à la fin il n’est qu’un insensé.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est un trône de gloire, élevé dès le commencement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est le lieu de notre sanctuaire.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi qui es l’espérance d’Israël, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 73:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tous ceux qui t’abandonnent seront confondus.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui se détournent de moi seront inscrits sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car ils abandonnent '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 2:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: la source d’eau vive, l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-18: cf. Ps 125. Jé 20:10-13.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Guéris-moi, Éternel, et je serai guéri;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sauve-moi, et je serai sauvé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu es ma gloire.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici, ils me disent:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 5:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 3:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Où est la parole de l’Éternel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’elle s’accomplisse donc!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et moi, pour t’obéir, je n’ai pas refusé d’être pasteur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n’ai pas non plus désiré le jour du malheur, tu le sais;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce qui est sorti de mes lèvres a été découvert devant toi.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne sois pas pour moi un sujet d’effroi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Toi, mon '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 16:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: refuge au jour du malheur!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 35:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 40:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 15:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que mes persécuteurs soient confus, et que je ne sois pas confus;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils tremblent, et que je ne tremble pas, moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais venir sur eux le jour du malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Frappe-les d’une double plaie!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La sanctification du sabbat
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 19-27: cf. (Ex 20:8-11. Né 13:15-21. És 58:13, 14.)'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi m’a parlé l’Éternel: Va, et tiens-toi à la porte des enfants du peuple, par laquelle entrent et sortent les rois de Juda, et à toutes les portes de Jérusalem. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme ils pensent à leurs enfants, ainsi pensent-ils à leurs autels
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et à leurs idoles d’Astarté près des '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 2:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: arbres verts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur les collines élevées.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu leur diras: Écoutez la parole de l’Éternel, rois de Juda, et tout Juda, et vous tous, habitants de Jérusalem, qui entrez par ces portes!'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Né 13:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Prenez garde à vos âmes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne portez point de fardeau le jour du sabbat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et n’en introduisez point par les portes de Jérusalem.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne sortez de vos maisons aucun fardeau le jour du sabbat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne faites aucun ouvrage;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais sanctifiez le jour du sabbat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Comme je l’ai ordonné à vos '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 20:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: pères.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils n’ont pas '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 11:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: écouté, ils n’ont pas prêté l’oreille;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont raidi leur cou,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour ne point écouter et ne point recevoir instruction.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si vous m’écoutez, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si vous n’introduisez point de fardeau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par les portes de cette ville le jour du sabbat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si vous sanctifiez le jour du sabbat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne faites aucun ouvrage ce jour-là,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 22:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Alors entreront par les portes de cette ville
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les rois et les princes assis sur le trône de David,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Montés sur des chars et sur des chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eux et leurs princes, les hommes de Juda et les habitants de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et cette ville sera habitée à toujours.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On viendra des villes de Juda et des environs de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du pays de Benjamin, de la vallée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la montagne et du midi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour amener des holocaustes et des victimes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour apporter des offrandes et de l’encens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pour offrir des sacrifices d’actions de grâces dans la maison de l’Éternel.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais si vous n’écoutez pas quand je vous ordonne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De sanctifier le jour du sabbat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De ne porter aucun fardeau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De ne point en introduire par les portes de Jérusalem le jour du sabbat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors j’allumerai un feu aux portes de la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il dévorera les palais de Jérusalem et ne s’éteindra point.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je livre au pillage ma montagne et ses champs, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 15:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: tes biens, tous tes trésors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tes hauts lieux, à cause de tes péchés, sur tout ton territoire.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu perdras par ta faute l’héritage que je t’avais donné;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 28:68
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 't’asservirai à ton ennemi dans un pays que tu ne '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 16:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: connais pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car vous avez allumé le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 15:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: feu de ma colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il brûlera toujours.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-8: cf. Ps 146:3, etc.'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maudit soit l’homme qui se confie dans l’homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui prend la chair pour son appui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui détourne son cœur de l’Éternel!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est comme un misérable dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il ne voit point arriver le bonheur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il habite les lieux brûlés du désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une terre salée et sans habitants.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 2:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 16:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 30:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Béni soit l’homme qui se confie dans l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dont l’Éternel est l’espérance!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il est comme un '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 1:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: arbre planté près des eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui étend ses racines vers le courant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’aperçoit point la chaleur quand elle vient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et son feuillage reste vert;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans l’année de la sécheresse, il n’a point de crainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il ne cesse de porter du fruit.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-13: cf. Ps 14:2, 3. Ro 2:1-11.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le cœur est tortueux par-dessus tout, et il est méchant:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui peut le connaître?
