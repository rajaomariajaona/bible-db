document_id: EZK.15,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les habitants de Jérusalem comparés au bois de la vigne
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. És 5:1-7. Jn 15:5, 6.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fils de l’homme, le bois de la vigne, qu’a-t-il de plus que tout autre bois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sarment qui est parmi les arbres de la forêt?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prend-on de ce bois pour fabriquer un ouvrage?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En tire-t-on une cheville pour y suspendre un objet quelconque?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, on le met au feu pour le consumer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le feu en consume les deux bouts, et le milieu brûle:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sera-t-il bon à quelque chose?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, lorsqu’il était entier, on n’en faisait aucun ouvrage;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Combien moins, lorsque le feu l’a consumé et qu’il est brûlé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En pourra-t-on faire quelque ouvrage?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme le bois de la vigne parmi les arbres de la forêt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce bois que je livre au feu pour le consumer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi je livrerai les habitants de Jérusalem.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je tournerai ma face contre eux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont sortis du feu, et le feu les consumera.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous saurez que je suis l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je tournerai ma face contre eux.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai du pays un désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils ont été infidèles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le Seigneur, l’Éternel.
