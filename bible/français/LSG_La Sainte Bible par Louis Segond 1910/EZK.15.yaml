document_id: EZK.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les habitants de Jérusalem comparés au bois de la vigne
  - type: heading
    content: 'V. 1-8: cf. És 5:1-7. Jn 15:5, 6.'
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '2':
  - type: text
    content: Fils de l’homme, le bois de la vigne, qu’a-t-il de plus que tout autre bois,
  - type: text
    content: Le sarment qui est parmi les arbres de la forêt?
  '3':
  - type: text
    content: Prend-on de ce bois pour fabriquer un ouvrage?
  - type: text
    content: En tire-t-on une cheville pour y suspendre un objet quelconque?
  '4':
  - type: text
    content: Voici, on le met au feu pour le consumer;
  - type: text
    content: 'Le feu en consume les deux bouts, et le milieu brûle:'
  - type: text
    content: Sera-t-il bon à quelque chose?
  '5':
  - type: text
    content: Voici, lorsqu’il était entier, on n’en faisait aucun ouvrage;
  - type: text
    content: Combien moins, lorsque le feu l’a consumé et qu’il est brûlé,
  - type: text
    content: En pourra-t-on faire quelque ouvrage?
  '6':
  - type: text
    content: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Comme le bois de la vigne parmi les arbres de la forêt,
  - type: text
    content: Ce bois que je livre au feu pour le consumer,
  - type: text
    content: Ainsi je livrerai les habitants de Jérusalem.
  '7':
  - type: text
    content: Je tournerai ma face contre eux;
  - type: text
    content: Ils sont sortis du feu, et le feu les consumera.
  - type: text
    content: Et vous saurez que je suis l’Éternel,
  - type: text
    content: Quand je tournerai ma face contre eux.
  '8':
  - type: text
    content: Je ferai du pays un désert,
  - type: text
    content: Parce qu’ils ont été infidèles,
  - type: text
    content: Dit le Seigneur, l’Éternel.
