document_id: DEU.29,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le renouvellement de l’alliance
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-15: cf. De 4:32-40. (Jos 24:1-27. 2 Ch 15:9-15; 34:29-32.) Ps 111:9.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les paroles de l’alliance que l’Éternel ordonna à Moïse de traiter avec les enfants d’Israël au pays de Moab, outre l’alliance qu’il avait traitée avec eux à Horeb. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous vous présentez aujourd’hui devant l’Éternel, votre Dieu, vous tous, vos chefs de tribus, vos anciens, vos officiers, tous les hommes d’Israël, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'vos enfants, vos femmes, et l’étranger qui est au milieu de ton camp, depuis celui qui coupe ton bois jusqu’à celui qui puise ton eau. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu te présentes pour entrer dans l’alliance de l’Éternel, ton Dieu, dans cette alliance contractée avec serment, et que l’Éternel, ton Dieu, traite en ce jour avec toi, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afin de t’établir aujourd’hui pour son peuple et d’être lui-même ton Dieu, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 17:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme il te l’a dit, et comme il l’a juré à tes pères, Abraham, Isaac et Jacob. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce n’est point avec vous seuls que je traite cette alliance, cette alliance contractée avec serment. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais c’est avec ceux qui sont ici parmi nous, présents en ce jour devant l’Éternel, notre Dieu, et avec ceux qui ne sont point ici parmi nous en ce jour.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-29: cf. (1 R 9:6-9. Da 9:11-14.) Ga 6:7, 8.'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous savez de quelle manière nous avons habité dans le pays d’Égypte, et comment nous avons passé au milieu des nations que vous avez traversées. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous avez vu leurs abominations et leurs idoles, le bois et la pierre, l’argent et l’or, qui sont chez elles. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qu’il n’y ait parmi vous ni homme, ni femme, ni famille, ni tribu, dont le cœur se détourne aujourd’hui de l’Éternel, notre Dieu, pour aller servir les dieux de ces nations-là. Qu’il n’y ait point parmi vous de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 8:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'racine qui produise du poison et de l’absinthe. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que personne, après avoir entendu les paroles de cette alliance contractée avec serment, ne se glorifie dans son cœur et ne dise: J’aurai la paix, quand même je suivrai les penchants de mon cœur, et que j’ajouterai l’ivresse à la soif. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse convoqua tout Israël, et leur dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 19:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous avez vu tout ce que l’Éternel a fait sous vos yeux, dans le pays d’Égypte, à Pharaon, à tous ses serviteurs, et à tout son pays, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel ne voudra point lui pardonner. Mais alors la colère et la jalousie de l’Éternel s’enflammeront contre cet homme, toutes les malédictions écrites dans ce livre reposeront sur lui, et l’Éternel effacera son nom de dessous les cieux. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel le séparera, pour son malheur, de toutes les tribus d’Israël, selon toutes les malédictions de l’alliance écrite dans ce livre de la loi. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les générations à venir, vos enfants qui naîtront après vous et l’étranger qui viendra d’une terre lointaine, à la vue des plaies et des maladies dont l’Éternel aura frappé ce pays, à la vue du soufre, du sel, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de l’embrasement de toute la contrée, où il n’y aura ni semence, ni produit, ni aucune herbe qui croisse, comme au bouleversement de Sodome, de Gomorrhe, d’Adma et de Tseboïm, que l’Éternel détruisit dans sa colère et dans sa fureur, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'toutes les nations diront: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 22:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Pourquoi l’Éternel a-t-il ainsi traité ce pays? Pourquoi cette ardente, cette grande colère? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’on répondra: C’est parce qu’ils ont abandonné l’alliance contractée avec eux par l’Éternel, le Dieu de leurs pères, lorsqu’il les fit sortir du pays d’Égypte; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'c’est parce qu’ils sont allés servir d’autres dieux et se prosterner devant eux, des dieux qu’ils ne connaissaient point et que l’Éternel ne leur avait point donnés en partage. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors la colère de l’Éternel s’est enflammée contre ce pays, et il a fait venir sur lui toutes les malédictions écrites dans ce livre. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel les a arrachés de leur pays avec colère, avec fureur, avec une grande indignation, et il les a jetés sur un autre pays, comme on le voit aujourd’hui. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les choses cachées sont à l’Éternel, notre Dieu; les choses révélées sont à nous et à nos enfants, à perpétuité, afin que nous mettions en pratique toutes les paroles de cette loi.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 4:34
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'les grandes épreuves que tes yeux ont vues, ces miracles et ces grands prodiges. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, jusqu’à ce jour, l’Éternel ne vous a pas donné un cœur pour comprendre, des yeux pour voir, des oreilles pour entendre. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je t’ai conduit pendant quarante années dans le désert; tes vêtements ne se sont point usés sur toi, et ton soulier ne s’est point usé à ton pied; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'vous n’avez point mangé de pain, et vous n’avez bu ni vin ni liqueur forte, afin que vous connussiez que je suis l’Éternel, votre Dieu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous êtes arrivés dans ce lieu; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 21:24
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 2:32
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Sihon, roi de Hesbon, et Og, roi de Basan, sont sortis à notre rencontre, pour nous combattre, et nous les avons battus. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avons pris leur pays, et nous l’avons donné '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 32:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 3:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 13:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'en propriété aux Rubénites, aux Gadites et à la moitié de la tribu des Manassites. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous observerez donc les paroles de cette alliance, et vous les mettrez en pratique, afin de réussir dans tout ce que vous ferez. '
