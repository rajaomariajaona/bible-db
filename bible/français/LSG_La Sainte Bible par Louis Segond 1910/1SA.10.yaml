document_id: 1SA.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-16: cf. 1 S 9:15-27; 16:1-13.'
  - type: text
    content: 'Samuel prit une fiole d’huile, qu’il répandit sur la tête de Saül. Il le baisa, et dit: L’Éternel ne t’a-t-il pas oint pour que tu sois '
  - type: note
    content: Ac 13:21.
  - type: text
    content: 'le chef de son héritage? '
  '10':
  - type: text
    content: 'Lorsqu’ils arrivèrent '
  - type: note
    content: 1 S 19:18.
  - type: text
    content: 'à Guibea, voici, une troupe de prophètes vint à sa rencontre. L’esprit de Dieu le saisit, et il prophétisa au milieu d’eux. '
  '11':
  - type: text
    content: 'Tous ceux qui l’avaient connu auparavant virent qu’il prophétisait avec les prophètes, et l’on se disait l’un à l’autre dans le peuple: Qu’est-il arrivé au fils de Kis? Saül est-il aussi parmi les prophètes? '
  '12':
  - type: text
    content: 'Quelqu’un de Guibea répondit: '
  - type: note
    content: Ga 1:24.
  - type: text
    content: 'Et qui est leur père? De là le proverbe: '
  - type: note
    content: 1 S 19:24.
  - type: text
    content: 'Saül est-il aussi parmi les prophètes? '
  '13':
  - type: text
    content: 'Lorsqu’il eut fini de prophétiser, il se rendit au haut lieu. '
  '14':
  - type: text
    content: 'L’oncle de Saül dit à Saül et à son serviteur: Où êtes-vous allés? Saül répondit: Chercher les ânesses; mais nous ne les avons pas aperçues, et nous sommes allés vers Samuel. '
  '15':
  - type: text
    content: 'L’oncle de Saül reprit: Raconte-moi donc ce que vous a dit Samuel. '
  '16':
  - type: text
    content: 'Et Saül répondit à son oncle: Il nous a assuré que les ânesses étaient retrouvées. Et il ne lui dit rien de la royauté dont avait parlé Samuel.'
  - type: heading
    content: 'V. 17-27: cf. 1 S 11; 2:7, 8. De 17:15.'
  '17':
  - type: text
    content: 'Samuel convoqua le peuple devant l’Éternel à Mitspa, '
  '18':
  - type: text
    content: 'et il dit aux enfants d’Israël: Ainsi parle l’Éternel, le Dieu d’Israël: J’ai fait monter d’Égypte Israël, et je vous ai délivrés de la main des Égyptiens et de la main de tous les royaumes qui vous opprimaient. '
  '19':
  - type: note
    content: 1 S 8:7.
  - type: text
    content: 'Et aujourd’hui, vous rejetez votre Dieu, qui vous a délivrés de tous vos maux et de toutes vos souffrances, et vous lui dites: Établis un roi sur nous! '
  - type: note
    content: 1 S 8:19; 12:12.
  - type: text
    content: 'Présentez-vous maintenant devant l’Éternel, selon vos tribus et selon vos milliers. '
  '2':
  - type: text
    content: 'Aujourd’hui, après m’avoir quitté, tu trouveras deux hommes près du sépulcre de Rachel, sur la frontière de Benjamin, à Tseltsach. Ils te diront: Les ânesses que tu es allé chercher sont retrouvées; et voici, ton père ne pense plus aux ânesses, mais il est en peine de vous, et dit: Que dois-je faire au sujet de mon fils? '
  '20':
  - type: text
    content: 'Samuel fit approcher toutes les tribus d’Israël, et '
  - type: note
    content: Jos 7:14.
  - type: text
    content: 'la tribu de Benjamin fut désignée. '
  '21':
  - type: text
    content: 'Il fit approcher la tribu de Benjamin par familles, et la famille de Matri fut désignée. Puis Saül, fils de Kis, fut désigné. On le chercha, mais on ne le trouva point. '
  '22':
  - type: text
    content: 'On consulta de nouveau l’Éternel: Y a-t-il encore un homme qui soit venu ici? Et l’Éternel dit: Voici, il est caché vers les bagages. '
  '23':
  - type: text
    content: 'On courut le tirer de là, et il se présenta au milieu du peuple. '
  - type: note
    content: 1 S 9:2.
  - type: text
    content: 'Il les dépassait tous de la tête. '
  '24':
  - type: text
    content: 'Samuel dit à tout le peuple: Voyez-vous celui que l’Éternel a choisi? Il n’y a personne dans tout le peuple qui soit semblable à lui. Et tout le peuple poussa les cris de: Vive le roi! '
  '25':
  - type: text
    content: 'Samuel fit alors connaître au peuple le droit de la royauté, et il l’écrivit dans un livre, qu’il déposa devant l’Éternel. Puis il renvoya tout le peuple, chacun chez soi. '
  '26':
  - type: text
    content: 'Saül aussi s’en alla dans sa maison à Guibea. '
  - type: note
    content: 1 S 13:2.
  - type: text
    content: 'Il fut accompagné par les honnêtes gens, dont Dieu avait touché le cœur. '
  '27':
  - type: text
    content: 'Il y eut toutefois des hommes pervers, qui disaient: Quoi! C’est celui-ci qui nous sauvera! '
  - type: note
    content: 1 S 11:12.
  - type: text
    content: 'Et ils le méprisèrent, et ne lui apportèrent '
  - type: note
    content: 2 Ch 17:5.
  - type: text
    content: aucun présent. Mais Saül n’y prit point garde.
  '3':
  - type: text
    content: 'De là tu iras plus loin, et tu arriveras au chêne de Thabor, où tu seras rencontré par trois hommes montant vers Dieu à Béthel, et portant l’un trois chevreaux, l’autre trois gâteaux de pain, et l’autre une outre de vin. '
  '4':
  - type: note
    content: Jg 18:15.
  - type: text
    content: 'Ils te demanderont comment tu te portes, et ils te donneront deux pains, que tu recevras de leur main. '
  '5':
  - type: text
    content: 'Après cela, tu arriveras à Guibea-Élohim, où se trouve une garnison de Philistins. En entrant dans la ville, tu rencontreras une troupe de prophètes '
  - type: note
    content: 1 Ch 16:39.
  - type: text
    content: 'descendant du haut lieu, précédés du luth, du tambourin, de la flûte et de la harpe, et '
  - type: note
    content: No 11:25.
  - type: text
    content: 'prophétisant eux-mêmes. '
  '6':
  - type: text
    content: 'L’esprit de l’Éternel te saisira, tu prophétiseras avec eux, et tu seras changé en un autre homme. '
  '7':
  - type: text
    content: 'Lorsque ces signes auront eu pour toi leur accomplissement, fais ce que tu trouveras à faire, car Dieu est avec toi. '
  '8':
  - type: text
    content: 'Puis tu descendras avant moi à Guilgal; et voici, je descendrai vers toi, pour offrir des holocaustes et des sacrifices d’actions de grâces. Tu attendras sept jours, jusqu’à ce que '
  - type: note
    content: 1 S 13:8.
  - type: text
    content: 'j’arrive auprès de toi et que je te dise ce que tu dois faire. '
  '9':
  - type: text
    content: 'Dès que Saül eut tourné le dos pour se séparer de Samuel, Dieu lui donna un autre cœur, et tous ces signes s’accomplirent le même jour. '
