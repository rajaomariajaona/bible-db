document_id: PSA.63,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (1 S 24 à 26. 2 S 15:23-28.) (Ps 42; 61; 84.)
  - type: text
    content: 'Psaume de David. Lorsqu’il était dans '
  - type: note
    content: 1 S 22:5; 23:14, 15.
  - type: text
    content: le désert de Juda.
  '10':
  - type: text
    content: Mais ceux qui cherchent à m’ôter la vie
  - type: text
    content: Iront dans les profondeurs de la terre;
  '11':
  - type: text
    content: Ils seront livrés au glaive,
  - type: text
    content: Ils seront la proie des chacals.
  '12':
  - type: text
    content: Et le roi se réjouira en Dieu;
  - type: text
    content: Quiconque jure par lui s’en glorifiera,
  - type: text
    content: Car la bouche des menteurs sera fermée.
  '2':
  - type: text
    content: O Dieu! Tu es mon Dieu, je te cherche;
  - type: text
    content: Mon âme a soif de toi, mon corps soupire après toi,
  - type: text
    content: Dans une terre aride, desséchée, sans eau.
  '3':
  - type: text
    content: Ainsi je te contemple dans le sanctuaire,
  - type: text
    content: Pour voir ta puissance et ta gloire.
  '4':
  - type: text
    content: 'Car ta bonté vaut mieux que la vie:'
  - type: text
    content: Mes lèvres célèbrent tes louanges.
  '5':
  - type: text
    content: Je te bénirai donc toute ma vie,
  - type: text
    content: J’élèverai mes mains en ton nom.
  '6':
  - type: text
    content: Mon âme sera rassasiée comme de mets gras et succulents,
  - type: text
    content: Et, avec des cris de joie sur les lèvres, ma bouche te célébrera.
  '7':
  - type: text
    content: Lorsque je pense à toi sur ma couche,
  - type: text
    content: Je médite sur toi pendant les veilles de la nuit.
  '8':
  - type: text
    content: Car tu es mon secours,
  - type: text
    content: Et je suis dans l’allégresse à l’ombre de tes ailes.
  '9':
  - type: text
    content: Mon âme est attachée à toi;
  - type: text
    content: Ta droite me soutient.
