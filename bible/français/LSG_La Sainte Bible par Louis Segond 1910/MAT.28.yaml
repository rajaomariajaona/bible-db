document_id: MAT.28,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Résurrection de Jésus-Christ
  - type: heading
    content: 'V. 1-7: cf. (Mc 16:1-7. Lu 24:1-8. Jn 20:1, 2.) (Ps 16:8-10. Ac 2:24-32.) Ro 1:3, 4; 4:25. 1 Co 15:1-28. Ap 1:17, 18.'
  - type: text
    content: ' '
  - type: note
    content: Mc 16:1. Lu 24:1. Jn 20:1.
  - type: text
    content: 'Après le sabbat, à l’aube du premier jour de la semaine, Marie de Magdala et l’autre Marie allèrent voir le sépulcre. '
  '10':
  - type: text
    content: 'Alors Jésus leur dit: '
  - type: text
    content: 'Ne craignez pas; allez dire à mes frères de se rendre en Galilée:'
  - type: text
    content: ' '
  - type: note
    content: Ac 1:3; 13:31. 1 Co 15:5.
  - type: text
    content: c’est là qu’ils me verront.
  - type: heading
    content: 'V. 11-15: cf. Mt 27:62-66; 28:1-6.'
  '11':
  - type: text
    content: 'Pendant qu’elles étaient en chemin, quelques hommes de la garde entrèrent dans la ville, et annoncèrent aux principaux sacrificateurs tout ce qui était arrivé. '
  '12':
  - type: text
    content: 'Ceux-ci, après s’être assemblés avec les anciens et avoir tenu conseil, donnèrent aux soldats une forte somme d’argent, '
  '13':
  - type: text
    content: 'en disant: Dites: Ses disciples sont venus de nuit le dérober, pendant que nous dormions. '
  '14':
  - type: text
    content: 'Et si le gouverneur l’apprend, nous l’apaiserons, et nous vous tirerons de peine. '
  '15':
  - type: text
    content: Les soldats prirent l’argent, et suivirent les instructions qui leur furent données. Et ce bruit s’est répandu parmi les Juifs, jusqu’à ce jour.
  - type: heading
    content: 'V. 16-20: cf. (Mc 16:12-20. Lu 24:13-53. Jn 20:19-29; 21:1-24. Ac 1:1-12.) 1 Co 15:6, 7.'
  '16':
  - type: text
    content: 'Les onze disciples allèrent en Galilée, sur la montagne '
  - type: note
    content: Mt 26:32. Mc 14:28.
  - type: text
    content: 'que Jésus leur avait désignée. '
  '17':
  - type: text
    content: 'Quand ils le virent, ils se prosternèrent devant lui. Mais quelques-uns eurent des doutes. '
  '18':
  - type: text
    content: 'Jésus, s’étant approché, leur parla ainsi: '
  - type: note
    content: Ps 8:7. Mt 11:27. Lu 10:22. Jn 3:35; 17:2. 1 Co 15:27. Ép 1:22. Hé 2:8.
  - type: text
    content: Tout pouvoir m’a été donné dans le ciel et sur la terre.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Mc 16:15. Jn 15:16.
  - type: text
    content: Allez, faites de toutes les nations des disciples, les baptisant au nom du Père, du Fils et du Saint-Esprit,
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Et voici, il y eut un grand tremblement de terre; car un ange du Seigneur descendit du ciel, vint rouler la pierre, et s’assit dessus. '
  '20':
  - type: text
    content: et enseignez-leur à observer tout ce que je vous ai prescrit.
  - type: text
    content: ' '
  - type: note
    content: Jn 14:18.
  - type: text
    content: Et voici, je suis avec vous tous les jours, jusqu’à la fin du monde.
  '3':
  - type: text
    content: 'Son aspect était comme l’éclair, et '
  - type: note
    content: Da 7:9. Ac 1:10.
  - type: text
    content: 'son vêtement blanc comme la neige. '
  '4':
  - type: text
    content: 'Les gardes tremblèrent de peur, et devinrent comme morts. '
  '5':
  - type: text
    content: 'Mais l’ange prit la parole, et dit aux femmes: Pour vous, ne craignez pas; '
  - type: note
    content: Mc 16:6. Lu 24:4.
  - type: text
    content: 'car je sais que vous cherchez Jésus qui a été crucifié. '
  '6':
  - type: text
    content: 'Il n’est point ici; il est ressuscité, comme il l’avait '
  - type: note
    content: Mt 16:21; 17:23; 20:19. Mc 8:31; 9:31; 10:34. Lu 9:22; 18:33; 24:6.
  - type: text
    content: 'dit. Venez, voyez le lieu où il était couché, '
  '7':
  - type: text
    content: 'et allez promptement dire à ses disciples qu’il est ressuscité des morts. Et voici, il vous précède en Galilée: '
  - type: note
    content: Mt 26:32. Mc 16:7.
  - type: text
    content: c’est là que vous le verrez. Voici, je vous l’ai dit.
  - type: heading
    content: 'V. 8-10: cf. (Mc 16:8-11. Lu 24:9-12. Jn 20:3-18).'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Mc 16:8. Jn 20:18.
  - type: text
    content: 'Elles s’éloignèrent promptement du sépulcre, avec crainte et avec une grande joie, et elles coururent porter la nouvelle aux disciples. '
  '9':
  - type: text
    content: 'Et voici, '
  - type: note
    content: Mc 16:9. Jn 20:14.
  - type: text
    content: 'Jésus vint à leur rencontre, et dit: '
  - type: text
    content: Je vous salue.
  - type: text
    content: ' Elles s’approchèrent pour saisir ses pieds, et elles se prosternèrent devant lui. '
