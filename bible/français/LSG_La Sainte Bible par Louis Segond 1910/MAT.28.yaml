document_id: MAT.28,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Résurrection de Jésus-Christ
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. (Mc 16:1-7. Lu 24:1-8. Jn 20:1, 2.) (Ps 16:8-10. Ac 2:24-32.) Ro 1:3, 4; 4:25. 1 Co 15:1-28. Ap 1:17, 18.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 24:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 20:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Après le sabbat, à l’aube du premier jour de la semaine, Marie de Magdala et l’autre Marie allèrent voir le sépulcre. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Alors Jésus leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ne craignez pas; allez dire à mes frères de se rendre en Galilée:'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: c’est là qu’ils me verront.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-15: cf. Mt 27:62-66; 28:1-6.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Pendant qu’elles étaient en chemin, quelques hommes de la garde entrèrent dans la ville, et annoncèrent aux principaux sacrificateurs tout ce qui était arrivé. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ceux-ci, après s’être assemblés avec les anciens et avoir tenu conseil, donnèrent aux soldats une forte somme d’argent, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'en disant: Dites: Ses disciples sont venus de nuit le dérober, pendant que nous dormions. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et si le gouverneur l’apprend, nous l’apaiserons, et nous vous tirerons de peine. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Les soldats prirent l’argent, et suivirent les instructions qui leur furent données. Et ce bruit s’est répandu parmi les Juifs, jusqu’à ce jour.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-20: cf. (Mc 16:12-20. Lu 24:13-53. Jn 20:19-29; 21:1-24. Ac 1:1-12.) 1 Co 15:6, 7.'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Les onze disciples allèrent en Galilée, sur la montagne '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que Jésus leur avait désignée. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Quand ils le virent, ils se prosternèrent devant lui. Mais quelques-uns eurent des doutes. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Jésus, s’étant approché, leur parla ainsi: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 8:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 11:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 10:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 3:35
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 1:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 2:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tout pouvoir m’a été donné dans le ciel et sur la terre.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 15:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Allez, faites de toutes les nations des disciples, les baptisant au nom du Père, du Fils et du Saint-Esprit,
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Et voici, il y eut un grand tremblement de terre; car un ange du Seigneur descendit du ciel, vint rouler la pierre, et s’assit dessus. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et enseignez-leur à observer tout ce que je vous ai prescrit.
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 14:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et voici, je suis avec vous tous les jours, jusqu’à la fin du monde.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Son aspect était comme l’éclair, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Da 7:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'son vêtement blanc comme la neige. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Les gardes tremblèrent de peur, et devinrent comme morts. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mais l’ange prit la parole, et dit aux femmes: Pour vous, ne craignez pas; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 24:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car je sais que vous cherchez Jésus qui a été crucifié. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il n’est point ici; il est ressuscité, comme il l’avait '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 8:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'dit. Venez, voyez le lieu où il était couché, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'et allez promptement dire à ses disciples qu’il est ressuscité des morts. Et voici, il vous précède en Galilée: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: c’est là que vous le verrez. Voici, je vous l’ai dit.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-10: cf. (Mc 16:8-11. Lu 24:9-12. Jn 20:3-18).'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 20:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Elles s’éloignèrent promptement du sépulcre, avec crainte et avec une grande joie, et elles coururent porter la nouvelle aux disciples. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Et voici, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 20:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus vint à leur rencontre, et dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous salue.
    - type: text
      text: ' Elles s’approchèrent pour saisir ses pieds, et elles se prosternèrent devant lui. '
