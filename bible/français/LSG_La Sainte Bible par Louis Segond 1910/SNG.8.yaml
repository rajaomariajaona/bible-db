document_id: SNG.8,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh! Que n’es-tu mon frère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Allaité des mamelles de ma mère!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te rencontrerais dehors, je t’embrasserais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’on ne me mépriserait pas.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis un mur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mes seins sont comme des tours;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai été à ses yeux comme celle qui trouve la paix.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Salomon avait une vigne à Baal-Hamon;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il remit la vigne à des gardiens;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chacun apportait pour son fruit mille sicles d’argent.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma vigne, qui est à moi, je la garde.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A toi, Salomon, les mille sicles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et deux cents à ceux qui gardent le fruit!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Habitante des jardins!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des amis prêtent l’oreille à ta voix.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Daigne me la faire entendre!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 22:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Fuis, mon bien-aimé!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois semblable à la gazelle ou au faon des biches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur les montagnes des aromates!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux te conduire, t’amener à la maison de ma mère;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu me donneras tes instructions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je te ferai boire du vin parfumé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du moût de mes grenades.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ca 2:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que sa main gauche soit sous ma tête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que sa droite m’embrasse!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ca 2:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je vous en conjure, filles de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne réveillez pas, ne réveillez pas l’amour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant qu’elle le veuille.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-7: cf. (Ex 28:29, 30. Ro 8:35-39.) 1 Co 13:8.'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est celle qui monte du désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Appuyée sur son bien-aimé?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’ai réveillée sous le pommier;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là ta mère t’a enfantée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est là qu’elle t’a enfantée, qu’elle t’a donné le jour.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mets-moi comme un sceau sur ton cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un sceau sur ton bras;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’amour est fort comme la mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La jalousie est inflexible comme le séjour des morts;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses ardeurs sont des ardeurs de feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une flamme de l’Éternel.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ro 8:38, etc.
      marker-yv: yv-n
    - type: text
      text: Les grandes eaux ne peuvent éteindre l’amour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les fleuves ne le submergeraient pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand un homme offrirait tous les biens de sa maison contre l’amour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne s’attirerait que le mépris.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-14: cf. (Ru 2:11-13; 3:1, 10, 11.) Ca 2:14, 17.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous avons une petite sœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui n’a point encore de mamelles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ferons-nous de notre sœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jour où on la recherchera?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si elle est un mur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous bâtirons sur elle des créneaux d’argent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si elle est une porte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous la fermerons avec une planche de cèdre.
