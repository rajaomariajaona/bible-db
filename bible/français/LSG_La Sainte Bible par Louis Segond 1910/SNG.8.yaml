document_id: SNG.8,93
type_code: fra
verses:
  '1':
  - type: text
    content: Oh! Que n’es-tu mon frère,
  - type: text
    content: Allaité des mamelles de ma mère!
  - type: text
    content: Je te rencontrerais dehors, je t’embrasserais,
  - type: text
    content: Et l’on ne me mépriserait pas.
  '10':
  - type: text
    content: Je suis un mur,
  - type: text
    content: Et mes seins sont comme des tours;
  - type: text
    content: J’ai été à ses yeux comme celle qui trouve la paix.
  '11':
  - type: text
    content: Salomon avait une vigne à Baal-Hamon;
  - type: text
    content: Il remit la vigne à des gardiens;
  - type: text
    content: Chacun apportait pour son fruit mille sicles d’argent.
  '12':
  - type: text
    content: Ma vigne, qui est à moi, je la garde.
  - type: text
    content: A toi, Salomon, les mille sicles,
  - type: text
    content: Et deux cents à ceux qui gardent le fruit!
  '13':
  - type: text
    content: Habitante des jardins!
  - type: text
    content: Des amis prêtent l’oreille à ta voix.
  - type: text
    content: Daigne me la faire entendre!
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ap 22:17, 20.
  - type: text
    content: Fuis, mon bien-aimé!
  - type: text
    content: Sois semblable à la gazelle ou au faon des biches,
  - type: text
    content: Sur les montagnes des aromates!
  '2':
  - type: text
    content: Je veux te conduire, t’amener à la maison de ma mère;
  - type: text
    content: Tu me donneras tes instructions,
  - type: text
    content: Et je te ferai boire du vin parfumé,
  - type: text
    content: Du moût de mes grenades.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ca 2:6.
  - type: text
    content: Que sa main gauche soit sous ma tête,
  - type: text
    content: Et que sa droite m’embrasse!
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ca 2:7; 3:5.
  - type: text
    content: Je vous en conjure, filles de Jérusalem,
  - type: text
    content: Ne réveillez pas, ne réveillez pas l’amour,
  - type: text
    content: Avant qu’elle le veuille.
  - type: heading
    content: 'V. 5-7: cf. (Ex 28:29, 30. Ro 8:35-39.) 1 Co 13:8.'
  '5':
  - type: text
    content: Qui est celle qui monte du désert,
  - type: text
    content: Appuyée sur son bien-aimé?
  - type: text
    content: Je t’ai réveillée sous le pommier;
  - type: text
    content: Là ta mère t’a enfantée,
  - type: text
    content: C’est là qu’elle t’a enfantée, qu’elle t’a donné le jour.
  '6':
  - type: text
    content: Mets-moi comme un sceau sur ton cœur,
  - type: text
    content: Comme un sceau sur ton bras;
  - type: text
    content: Car l’amour est fort comme la mort,
  - type: text
    content: La jalousie est inflexible comme le séjour des morts;
  - type: text
    content: Ses ardeurs sont des ardeurs de feu,
  - type: text
    content: Une flamme de l’Éternel.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ro 8:38, etc.
  - type: text
    content: Les grandes eaux ne peuvent éteindre l’amour,
  - type: text
    content: Et les fleuves ne le submergeraient pas;
  - type: text
    content: Quand un homme offrirait tous les biens de sa maison contre l’amour,
  - type: text
    content: Il ne s’attirerait que le mépris.
  - type: heading
    content: 'V. 8-14: cf. (Ru 2:11-13; 3:1, 10, 11.) Ca 2:14, 17.'
  '8':
  - type: text
    content: Nous avons une petite sœur,
  - type: text
    content: Qui n’a point encore de mamelles;
  - type: text
    content: Que ferons-nous de notre sœur,
  - type: text
    content: Le jour où on la recherchera?
  '9':
  - type: text
    content: Si elle est un mur,
  - type: text
    content: Nous bâtirons sur elle des créneaux d’argent;
  - type: text
    content: Si elle est une porte,
  - type: text
    content: Nous la fermerons avec une planche de cèdre.
