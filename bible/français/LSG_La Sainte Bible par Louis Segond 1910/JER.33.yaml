document_id: JER.33,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Promesses de rédemption
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-13: cf. (Jé 32:36, etc.; 30:15-22.) (És 61:4-9. Am 9:11-15.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l’Éternel fut adressée à Jérémie une seconde fois, en ces mots, pendant qu’il était encore enfermé dans la cour de la prison:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On entendra encore dans ce lieu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dont vous dites: Il est désert, il n’y a plus d’hommes, plus de bêtes;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On entendra dans les villes de Juda et dans les rues de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dévastées, privées d’hommes, d’habitants, de bêtes,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 7:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les cris de réjouissance et les cris d’allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les chants du fiancé et les chants de la fiancée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La voix de ceux qui disent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Éternel des armées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel est bon, car sa miséricorde dure à toujours!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La voix de ceux qui offrent des sacrifices d’actions de grâces
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans la maison de l’Éternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je ramènerai les captifs du pays, je les rétablirai comme autrefois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel des armées:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y aura encore dans ce lieu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est désert, sans hommes ni bêtes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dans toutes ses villes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y aura des demeures pour les bergers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faisant reposer leurs troupeaux.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les villes de la montagne, dans les villes de la plaine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les villes du midi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans le pays de Benjamin et aux environs de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dans les villes de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les brebis passeront encore sous la main de celui qui les compte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-22: cf. (Jé 23:5-8. Lu 1:31-33.) (Ps 89:21-38. És 55:3, 4.)'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, les jours viennent, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Où j’accomplirai '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 29:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: la bonne parole
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que j’ai dite sur la maison d’Israël et sur la maison de Juda.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ces jours et en ce temps-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je ferai éclore à David un '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 23:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: germe de justice;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il pratiquera la justice et l’équité dans le pays.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ces jours-là, Juda sera sauvé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem aura la sécurité dans sa demeure;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et voici comment on l’appellera:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel notre justice.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: David ne manquera jamais d’un successeur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Assis sur le trône de la maison d’Israël;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les sacrificateurs, les Lévites, ne manqueront jamais devant moi de successeurs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour offrir des holocaustes, brûler de l’encens avec les offrandes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et faire des sacrifices tous les jours.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La parole de l’Éternel fut adressée à Jérémie, en ces mots:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi parle l’Éternel, qui fait ces choses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel, qui les conçoit et les exécute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lui, dont le nom est l’Éternel:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si vous pouvez rompre mon alliance avec le jour
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon alliance avec la nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En sorte que le jour et la nuit ne soient plus en leur temps,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors aussi mon alliance sera rompue avec David, mon serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En sorte qu’il n’aura point de fils régnant sur son trône,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon alliance avec les Lévites, les sacrificateurs, qui font mon service.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De même qu’on ne peut compter l’armée des cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni mesurer le sable de la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De même je multiplierai la postérité de David, mon serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les Lévites qui font mon service.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 23-26: cf. Jé 31:35-40. Ps 94:14. Ro 11:29.'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La parole de l’Éternel fut adressée à Jérémie, en ces mots:'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'N’as-tu pas remarqué ce que disent ces gens:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les deux familles que l’Éternel avait choisies, il les a rejetées?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi ils méprisent mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au point de ne plus le regarder comme une nation.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je n’ai pas fait mon alliance avec le jour et avec la nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je n’ai pas établi les lois des cieux et de la terre,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors aussi je rejetterai la postérité de Jacob et de David, mon serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ne prendrai plus dans sa postérité ceux qui domineront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur les descendants d’Abraham, d’Isaac et de Jacob.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car je ramènerai leurs captifs, et j’aurai '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 31:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: pitié d’eux.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Invoque-moi, et je te répondrai;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’annoncerai de grandes choses, des choses cachées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tu ne connais pas.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ainsi parle l’Éternel, le Dieu d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur les maisons de cette ville
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sur les maisons des rois de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui seront abattues par les terrasses et par l’épée,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand on s’avancera pour combattre les Chaldéens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’elles seront remplies des cadavres des hommes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que je frapperai dans ma colère et dans ma fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et à cause de la méchanceté desquels je cacherai ma face à cette ville;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je lui donnerai la guérison et la santé, je les guérirai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je leur ouvrirai une source abondante de paix et de fidélité.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je ramènerai '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 32:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les captifs de Juda et les captifs d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et je les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 24:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: rétablirai comme autrefois.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les purifierai de toutes les iniquités qu’ils ont commises contre moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je leur '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 31:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: pardonnerai toutes les iniquités par lesquelles ils m’ont offensé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par lesquelles ils se sont révoltés contre moi.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cette ville sera pour moi un sujet de joie, de louange et de gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parmi toutes les nations de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui apprendront tout le bien que je leur ferai;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles seront étonnées et émues de tout le bonheur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de toute la prospérité que je leur accorderai.
