document_id: JER.33,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Promesses de rédemption
  - type: heading
    content: 'V. 1-13: cf. (Jé 32:36, etc.; 30:15-22.) (És 61:4-9. Am 9:11-15.)'
  - type: text
    content: 'La parole de l’Éternel fut adressée à Jérémie une seconde fois, en ces mots, pendant qu’il était encore enfermé dans la cour de la prison:'
  '10':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: On entendra encore dans ce lieu
  - type: text
    content: 'Dont vous dites: Il est désert, il n’y a plus d’hommes, plus de bêtes;'
  - type: text
    content: On entendra dans les villes de Juda et dans les rues de Jérusalem,
  - type: text
    content: Dévastées, privées d’hommes, d’habitants, de bêtes,
  '11':
  - type: text
    content: ' '
  - type: note
    content: Jé 7:34.
  - type: text
    content: Les cris de réjouissance et les cris d’allégresse,
  - type: text
    content: Les chants du fiancé et les chants de la fiancée,
  - type: text
    content: 'La voix de ceux qui disent:'
  - type: text
    content: Louez l’Éternel des armées,
  - type: text
    content: Car l’Éternel est bon, car sa miséricorde dure à toujours!
  - type: text
    content: La voix de ceux qui offrent des sacrifices d’actions de grâces
  - type: text
    content: Dans la maison de l’Éternel.
  - type: text
    content: Car je ramènerai les captifs du pays, je les rétablirai comme autrefois,
  - type: text
    content: Dit l’Éternel.
  '12':
  - type: text
    content: 'Ainsi parle l’Éternel des armées:'
  - type: text
    content: Il y aura encore dans ce lieu
  - type: text
    content: Qui est désert, sans hommes ni bêtes,
  - type: text
    content: Et dans toutes ses villes,
  - type: text
    content: Il y aura des demeures pour les bergers
  - type: text
    content: Faisant reposer leurs troupeaux.
  '13':
  - type: text
    content: Dans les villes de la montagne, dans les villes de la plaine,
  - type: text
    content: Dans les villes du midi,
  - type: text
    content: Dans le pays de Benjamin et aux environs de Jérusalem,
  - type: text
    content: Et dans les villes de Juda,
  - type: text
    content: Les brebis passeront encore sous la main de celui qui les compte,
  - type: text
    content: Dit l’Éternel.
  - type: heading
    content: 'V. 14-22: cf. (Jé 23:5-8. Lu 1:31-33.) (Ps 89:21-38. És 55:3, 4.)'
  '14':
  - type: text
    content: Voici, les jours viennent, dit l’Éternel,
  - type: text
    content: 'Où j’accomplirai '
  - type: note
    content: Jé 29:10.
  - type: text
    content: la bonne parole
  - type: text
    content: Que j’ai dite sur la maison d’Israël et sur la maison de Juda.
  '15':
  - type: text
    content: En ces jours et en ce temps-là,
  - type: text
    content: 'Je ferai éclore à David un '
  - type: note
    content: Jé 23:5.
  - type: text
    content: germe de justice;
  - type: text
    content: Il pratiquera la justice et l’équité dans le pays.
  '16':
  - type: text
    content: En ces jours-là, Juda sera sauvé,
  - type: text
    content: Jérusalem aura la sécurité dans sa demeure;
  - type: text
    content: 'Et voici comment on l’appellera:'
  - type: text
    content: L’Éternel notre justice.
  '17':
  - type: text
    content: 'Car ainsi parle l’Éternel:'
  - type: text
    content: David ne manquera jamais d’un successeur
  - type: text
    content: Assis sur le trône de la maison d’Israël;
  '18':
  - type: text
    content: Les sacrificateurs, les Lévites, ne manqueront jamais devant moi de successeurs
  - type: text
    content: Pour offrir des holocaustes, brûler de l’encens avec les offrandes,
  - type: text
    content: Et faire des sacrifices tous les jours.
  '19':
  - type: text
    content: 'La parole de l’Éternel fut adressée à Jérémie, en ces mots:'
  '2':
  - type: text
    content: Ainsi parle l’Éternel, qui fait ces choses,
  - type: text
    content: L’Éternel, qui les conçoit et les exécute,
  - type: text
    content: 'Lui, dont le nom est l’Éternel:'
  '20':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Si vous pouvez rompre mon alliance avec le jour
  - type: text
    content: Et mon alliance avec la nuit,
  - type: text
    content: En sorte que le jour et la nuit ne soient plus en leur temps,
  '21':
  - type: text
    content: Alors aussi mon alliance sera rompue avec David, mon serviteur,
  - type: text
    content: En sorte qu’il n’aura point de fils régnant sur son trône,
  - type: text
    content: Et mon alliance avec les Lévites, les sacrificateurs, qui font mon service.
  '22':
  - type: text
    content: De même qu’on ne peut compter l’armée des cieux,
  - type: text
    content: Ni mesurer le sable de la mer,
  - type: text
    content: De même je multiplierai la postérité de David, mon serviteur,
  - type: text
    content: Et les Lévites qui font mon service.
  - type: heading
    content: 'V. 23-26: cf. Jé 31:35-40. Ps 94:14. Ro 11:29.'
  '23':
  - type: text
    content: 'La parole de l’Éternel fut adressée à Jérémie, en ces mots:'
  '24':
  - type: text
    content: 'N’as-tu pas remarqué ce que disent ces gens:'
  - type: text
    content: Les deux familles que l’Éternel avait choisies, il les a rejetées?
  - type: text
    content: Ainsi ils méprisent mon peuple,
  - type: text
    content: Au point de ne plus le regarder comme une nation.
  '25':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Si je n’ai pas fait mon alliance avec le jour et avec la nuit,
  - type: text
    content: Si je n’ai pas établi les lois des cieux et de la terre,
  '26':
  - type: text
    content: Alors aussi je rejetterai la postérité de Jacob et de David, mon serviteur,
  - type: text
    content: Et je ne prendrai plus dans sa postérité ceux qui domineront
  - type: text
    content: Sur les descendants d’Abraham, d’Isaac et de Jacob.
  - type: text
    content: 'Car je ramènerai leurs captifs, et j’aurai '
  - type: note
    content: Jé 31:20.
  - type: text
    content: pitié d’eux.
  '3':
  - type: text
    content: Invoque-moi, et je te répondrai;
  - type: text
    content: Je t’annoncerai de grandes choses, des choses cachées,
  - type: text
    content: Que tu ne connais pas.
  '4':
  - type: text
    content: Car ainsi parle l’Éternel, le Dieu d’Israël,
  - type: text
    content: Sur les maisons de cette ville
  - type: text
    content: Et sur les maisons des rois de Juda,
  - type: text
    content: Qui seront abattues par les terrasses et par l’épée,
  '5':
  - type: text
    content: Quand on s’avancera pour combattre les Chaldéens,
  - type: text
    content: Et qu’elles seront remplies des cadavres des hommes
  - type: text
    content: Que je frapperai dans ma colère et dans ma fureur,
  - type: text
    content: Et à cause de la méchanceté desquels je cacherai ma face à cette ville;
  '6':
  - type: text
    content: Voici, je lui donnerai la guérison et la santé, je les guérirai,
  - type: text
    content: Et je leur ouvrirai une source abondante de paix et de fidélité.
  '7':
  - type: text
    content: 'Je ramènerai '
  - type: note
    content: Jé 32:34.
  - type: text
    content: les captifs de Juda et les captifs d’Israël,
  - type: text
    content: 'Et je les '
  - type: note
    content: Jé 24:6; 31:4.
  - type: text
    content: rétablirai comme autrefois.
  '8':
  - type: text
    content: Je les purifierai de toutes les iniquités qu’ils ont commises contre moi,
  - type: text
    content: 'Je leur '
  - type: note
    content: Jé 31:34.
  - type: text
    content: pardonnerai toutes les iniquités par lesquelles ils m’ont offensé,
  - type: text
    content: Par lesquelles ils se sont révoltés contre moi.
  '9':
  - type: text
    content: Cette ville sera pour moi un sujet de joie, de louange et de gloire,
  - type: text
    content: Parmi toutes les nations de la terre,
  - type: text
    content: Qui apprendront tout le bien que je leur ferai;
  - type: text
    content: Elles seront étonnées et émues de tout le bonheur
  - type: text
    content: Et de toute la prospérité que je leur accorderai.
