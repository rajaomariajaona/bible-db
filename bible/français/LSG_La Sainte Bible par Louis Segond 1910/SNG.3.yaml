document_id: SNG.3
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. Jé 29:12, 13. Ca 5:6-8.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Sur ma couche, pendant les nuits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai cherché celui que mon cœur aime;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je l’ai cherché, et je ne l’ai point trouvé…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je me lèverai, et je ferai le tour de la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans les rues et sur les places;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je chercherai celui que mon cœur aime…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je l’ai cherché, et je ne l’ai point trouvé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les gardes qui font la ronde dans la ville m’ont rencontrée:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avez-vous vu celui que mon cœur aime?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A peine les avais-je passés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que j’ai trouvé celui que mon cœur aime;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je l’ai saisi, et je ne l’ai point lâché
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à ce que je l’aie amené dans la maison de ma mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans la chambre de celle qui m’a conçue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je vous en conjure, filles de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par les gazelles et les biches des champs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne réveillez pas, ne réveillez pas l’amour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avant qu’elle le veuille.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-11: cf. 2 Co 11:3, 13, 14.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ca 8:5
      metadata:
        usfm: SNG.8.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qui est celle qui monte du désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme des colonnes de fumée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au milieu des vapeurs de myrrhe et d’encens
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de tous les aromates des marchands?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Voici la litière de Salomon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et autour d’elle soixante vaillants hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des plus vaillants d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tous sont armés de l’épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sont exercés au combat;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacun porte l’épée sur sa hanche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: En vue des alarmes nocturnes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le roi Salomon s’est fait '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ca 6:12
      metadata:
        usfm: SNG.6.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: une litière
- type: usfm
  marker: q1
  children:
  - type: text
    text: De bois du Liban.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il en a fait les colonnes d’argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le dossier d’or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le siège de pourpre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au milieu est une broderie, œuvre d’amour
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des filles de Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Sortez, filles de Sion, regardez
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le roi Salomon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec la couronne dont sa mère l’a couronné
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le jour de ses fiançailles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le jour de la joie de son cœur.
