document_id: SNG.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-5: cf. Jé 29:12, 13. Ca 5:6-8.'
  - type: text
    content: Sur ma couche, pendant les nuits,
  - type: text
    content: J’ai cherché celui que mon cœur aime;
  - type: text
    content: Je l’ai cherché, et je ne l’ai point trouvé…
  '10':
  - type: text
    content: Il en a fait les colonnes d’argent,
  - type: text
    content: Le dossier d’or,
  - type: text
    content: Le siège de pourpre;
  - type: text
    content: Au milieu est une broderie, œuvre d’amour
  - type: text
    content: Des filles de Jérusalem.
  '11':
  - type: text
    content: Sortez, filles de Sion, regardez
  - type: text
    content: Le roi Salomon,
  - type: text
    content: Avec la couronne dont sa mère l’a couronné
  - type: text
    content: Le jour de ses fiançailles,
  - type: text
    content: Le jour de la joie de son cœur.
  '2':
  - type: text
    content: Je me lèverai, et je ferai le tour de la ville,
  - type: text
    content: Dans les rues et sur les places;
  - type: text
    content: Je chercherai celui que mon cœur aime…
  - type: text
    content: Je l’ai cherché, et je ne l’ai point trouvé.
  '3':
  - type: text
    content: 'Les gardes qui font la ronde dans la ville m’ont rencontrée:'
  - type: text
    content: Avez-vous vu celui que mon cœur aime?
  '4':
  - type: text
    content: A peine les avais-je passés,
  - type: text
    content: Que j’ai trouvé celui que mon cœur aime;
  - type: text
    content: Je l’ai saisi, et je ne l’ai point lâché
  - type: text
    content: Jusqu’à ce que je l’aie amené dans la maison de ma mère,
  - type: text
    content: Dans la chambre de celle qui m’a conçue.
  '5':
  - type: text
    content: Je vous en conjure, filles de Jérusalem,
  - type: text
    content: Par les gazelles et les biches des champs,
  - type: text
    content: Ne réveillez pas, ne réveillez pas l’amour,
  - type: text
    content: Avant qu’elle le veuille.
  - type: heading
    content: 'V. 6-11: cf. 2 Co 11:3, 13, 14.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ca 8:5.
  - type: text
    content: Qui est celle qui monte du désert,
  - type: text
    content: Comme des colonnes de fumée,
  - type: text
    content: Au milieu des vapeurs de myrrhe et d’encens
  - type: text
    content: Et de tous les aromates des marchands?
  '7':
  - type: text
    content: Voici la litière de Salomon,
  - type: text
    content: Et autour d’elle soixante vaillants hommes,
  - type: text
    content: Des plus vaillants d’Israël.
  '8':
  - type: text
    content: Tous sont armés de l’épée,
  - type: text
    content: Sont exercés au combat;
  - type: text
    content: Chacun porte l’épée sur sa hanche,
  - type: text
    content: En vue des alarmes nocturnes.
  '9':
  - type: text
    content: 'Le roi Salomon s’est fait '
  - type: note
    content: Ca 6:12.
  - type: text
    content: une litière
  - type: text
    content: De bois du Liban.
