document_id: EXO.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moïse sur la montagne de Sinaï
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. Jos 24:22-27. Hé 9:18-23. (2 Ch 15:11-15.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dieu dit à Moïse: Monte vers l’Éternel, toi et Aaron, Nadab et Abihu, et soixante-dix des anciens d’Israël, et vous vous prosternerez de loin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Moïse s’approchera seul de l’Éternel; les autres ne s’approcheront pas, et le peuple ne montera point avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moïse vint rapporter au peuple toutes les paroles de l’Éternel et toutes les lois. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 19:8
      metadata:
        usfm: EXO.19.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:7
      metadata:
        usfm: EXO.24.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:27
      metadata:
        usfm: DEU.5.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le peuple entier répondit d’une même voix: Nous ferons tout ce que l’Éternel a dit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moïse écrivit toutes les paroles de l’Éternel. Puis il se leva de bon matin; il bâtit un autel au pied de la montagne, et dressa douze pierres pour les douze tribus d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il envoya des jeunes hommes, enfants d’Israël, pour offrir à l’Éternel des holocaustes, et immoler des taureaux en sacrifices d’actions de grâces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Moïse prit la moitié du sang, qu’il mit dans des bassins, et il répandit l’autre moitié sur l’autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il prit le livre de l’alliance, et le lut en présence du peuple; ils dirent: Nous ferons tout ce que l’Éternel a dit, et nous obéirons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Moïse prit le sang, et il le répandit sur le peuple, en disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:20
      metadata:
        usfm: HEB.9.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:2
      metadata:
        usfm: 1PE.1.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Voici le sang de l’alliance que l’Éternel a faite avec vous selon toutes ces paroles.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-11: cf. (Éz 1:26-28. Ap 4:2-6.) Ex 33:18-23. (Mt 5:8.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moïse monta avec Aaron, Nadab et Abihu, et soixante-dix anciens d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils virent le Dieu d’Israël; sous ses pieds, c’était comme un ouvrage de saphir transparent, comme le ciel lui-même dans sa pureté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il n’étendit point sa main sur l’élite des enfants d’Israël. Ils virent Dieu, et ils mangèrent et burent.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-18: cf. De 9:9-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’Éternel dit à Moïse: Monte vers moi sur la montagne, et reste là; je te donnerai des tables de pierre, la loi et les ordonnances que j’ai écrites pour leur instruction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moïse se leva, avec Josué qui le servait, et Moïse monta sur la montagne de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il dit aux anciens: Attendez-nous ici, jusqu’à ce que nous revenions auprès de vous. Voici, Aaron et Hur resteront avec vous; si quelqu’un a un différend, c’est à eux qu’il s’adressera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moïse monta sur la montagne, et la nuée couvrit la montagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'La gloire de l’Éternel reposa sur la montagne de Sinaï, et la nuée la couvrit pendant six jours. Le septième jour, l’Éternel appela Moïse du milieu de la nuée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 12:29
      metadata:
        usfm: HEB.12.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’aspect de la gloire de l’Éternel était comme un feu dévorant sur le sommet de la montagne, aux yeux des enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Moïse entra au milieu de la nuée, et il monta sur la montagne. Moïse demeura sur la montagne quarante jours et quarante nuits.
