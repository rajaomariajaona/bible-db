document_id: EXO.24,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Moïse sur la montagne de Sinaï
  - type: heading
    content: 'V. 1-8: cf. Jos 24:22-27. Hé 9:18-23. (2 Ch 15:11-15.)'
  - type: text
    content: 'Dieu dit à Moïse: Monte vers l’Éternel, toi et Aaron, Nadab et Abihu, et soixante-dix des anciens d’Israël, et vous vous prosternerez de loin. '
  '10':
  - type: text
    content: 'Ils virent le Dieu d’Israël; sous ses pieds, c’était comme un ouvrage de saphir transparent, comme le ciel lui-même dans sa pureté. '
  '11':
  - type: text
    content: Il n’étendit point sa main sur l’élite des enfants d’Israël. Ils virent Dieu, et ils mangèrent et burent.
  - type: heading
    content: 'V. 12-18: cf. De 9:9-11.'
  '12':
  - type: text
    content: 'L’Éternel dit à Moïse: Monte vers moi sur la montagne, et reste là; je te donnerai des tables de pierre, la loi et les ordonnances que j’ai écrites pour leur instruction. '
  '13':
  - type: text
    content: 'Moïse se leva, avec Josué qui le servait, et Moïse monta sur la montagne de Dieu. '
  '14':
  - type: text
    content: 'Il dit aux anciens: Attendez-nous ici, jusqu’à ce que nous revenions auprès de vous. Voici, Aaron et Hur resteront avec vous; si quelqu’un a un différend, c’est à eux qu’il s’adressera. '
  '15':
  - type: text
    content: 'Moïse monta sur la montagne, et la nuée couvrit la montagne. '
  '16':
  - type: text
    content: 'La gloire de l’Éternel reposa sur la montagne de Sinaï, et la nuée la couvrit pendant six jours. Le septième jour, l’Éternel appela Moïse du milieu de la nuée. '
  '17':
  - type: note
    content: Hé 12:29.
  - type: text
    content: 'L’aspect de la gloire de l’Éternel était comme un feu dévorant sur le sommet de la montagne, aux yeux des enfants d’Israël. '
  '18':
  - type: text
    content: Moïse entra au milieu de la nuée, et il monta sur la montagne. Moïse demeura sur la montagne quarante jours et quarante nuits.
  '2':
  - type: text
    content: 'Moïse s’approchera seul de l’Éternel; les autres ne s’approcheront pas, et le peuple ne montera point avec lui. '
  '3':
  - type: text
    content: 'Moïse vint rapporter au peuple toutes les paroles de l’Éternel et toutes les lois. '
  - type: note
    content: Ex 19:8; 24:7. De 5:27.
  - type: text
    content: 'Le peuple entier répondit d’une même voix: Nous ferons tout ce que l’Éternel a dit. '
  '4':
  - type: text
    content: 'Moïse écrivit toutes les paroles de l’Éternel. Puis il se leva de bon matin; il bâtit un autel au pied de la montagne, et dressa douze pierres pour les douze tribus d’Israël. '
  '5':
  - type: text
    content: 'Il envoya des jeunes hommes, enfants d’Israël, pour offrir à l’Éternel des holocaustes, et immoler des taureaux en sacrifices d’actions de grâces. '
  '6':
  - type: text
    content: 'Moïse prit la moitié du sang, qu’il mit dans des bassins, et il répandit l’autre moitié sur l’autel. '
  '7':
  - type: text
    content: 'Il prit le livre de l’alliance, et le lut en présence du peuple; ils dirent: Nous ferons tout ce que l’Éternel a dit, et nous obéirons. '
  '8':
  - type: text
    content: 'Moïse prit le sang, et il le répandit sur le peuple, en disant: '
  - type: note
    content: Hé 9:20. 1 Pi 1:2.
  - type: text
    content: Voici le sang de l’alliance que l’Éternel a faite avec vous selon toutes ces paroles.
  - type: heading
    content: 'V. 9-11: cf. (Éz 1:26-28. Ap 4:2-6.) Ex 33:18-23. (Mt 5:8.)'
  '9':
  - type: text
    content: 'Moïse monta avec Aaron, Nadab et Abihu, et soixante-dix anciens d’Israël. '
