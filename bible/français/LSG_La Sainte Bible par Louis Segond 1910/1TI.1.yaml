        usfm: ACT.8.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:1
      metadata:
        usfm: ACT.9.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:4
      metadata:
        usfm: ACT.22.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:9
      metadata:
        usfm: ACT.26.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
