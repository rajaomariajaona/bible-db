    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 2:4
      metadata:
        usfm: 1TH.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: qui m’a été confié.
- type: usfm
  marker: r
  children:
  - type: text
