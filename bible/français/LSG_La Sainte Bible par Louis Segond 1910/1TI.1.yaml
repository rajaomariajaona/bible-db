    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:20
      metadata:
        usfm: 1TI.6.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
