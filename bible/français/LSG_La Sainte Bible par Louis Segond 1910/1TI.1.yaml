        usfm: MRK.2.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:32
      metadata:
        usfm: LUK.5.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:10
      metadata:
        usfm: LUK.19.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:5
      metadata:
        usfm: 1JN.3.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que Jésus-Christ est venu dans le monde pour sauver les pécheurs, dont je suis le premier. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais j’ai obtenu miséricorde, afin que Jésus-Christ fît voir en moi le premier toute sa longanimité, pour que je servisse d’exemple à ceux qui croiraient en lui pour la vie éternelle. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Au roi des siècles, immortel, invisible, seul Dieu, soient honneur et gloire, aux siècles des siècles! Amen!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Combattre le bon combat
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-20: cf. 1 Ti 6:12, 20, 21. 2 Ti 2:15-18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le commandement que je t’adresse, Timothée, mon enfant, selon les prophéties faites précédemment à ton sujet, c’est que, d’après elles, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 6:12
      metadata:
        usfm: 1TI.6.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tu combattes le bon combat, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 3:9
      metadata:
        usfm: 1TI.3.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en gardant la foi et une bonne conscience. Cette conscience, quelques-uns l’ont perdue, et ils ont fait naufrage par rapport à la foi. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'De ce nombre sont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 2:17
      metadata:
        usfm: 2TI.2.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Hyménée et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 4:14
      metadata:
        usfm: 2TI.4.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alexandre, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 5:5
      metadata:
        usfm: 1CO.5.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: que j’ai livrés à Satan, afin qu’ils apprennent à ne pas blasphémer.
