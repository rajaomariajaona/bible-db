      metadata:
        usfm: GAL.1.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en m’établissant dans le ministère, moi qui étais auparavant un blasphémateur, un persécuteur, un homme violent. Mais j’ai obtenu miséricorde, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 9:39
      metadata:
        usfm: JHN.9.39
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '41'
      metadata:
        usfm: JHN.9.41
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 3:17
      metadata:
        usfm: ACT.3.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'parce que j’agissais par ignorance, dans l’incrédulité; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et la grâce de notre Seigneur a surabondé, avec la foi et la charité qui est en Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'C’est une parole certaine et entièrement digne d’être reçue, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:13
      metadata:
        usfm: MAT.9.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 2:17
