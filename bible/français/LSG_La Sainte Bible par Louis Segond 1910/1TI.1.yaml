      children:
      - type: text
        text: Ga 5:14
      metadata:
        usfm: GAL.5.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le but du commandement, c’est une charité venant d’un cœur pur, d’une bonne conscience, et d’une foi sincère. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Quelques-uns, s’étant détournés de ces choses, se sont égarés dans de vains discours; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ils veulent être docteurs de la loi, et ils ne comprennent ni ce qu’ils disent, ni ce qu’ils affirment. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nous n’ignorons pas '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 7:12
      metadata:
        usfm: ROM.7.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que la loi est bonne, pourvu qu’on en fasse un usage légitime, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'sachant bien '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:23
      metadata:
        usfm: GAL.5.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que la loi n’est pas faite pour le juste, mais pour les méchants et les rebelles, les impies et les pécheurs, les irréligieux et les profanes, les parricides, les meurtriers, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'les impudiques, les infâmes, les voleurs d’hommes, les menteurs, les parjures, et tout ce qui est contraire à la saine doctrine, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'conformément à l’Évangile de la gloire du '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 6:15
      metadata:
        usfm: 1TI.6.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dieu bienheureux, Évangile '
  - type: usfm
    marker: x
