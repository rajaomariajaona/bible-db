    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 6:4
      metadata:
        usfm: 1TI.6.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'discussions plutôt qu’elles n’avancent l’œuvre de Dieu dans la foi. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
