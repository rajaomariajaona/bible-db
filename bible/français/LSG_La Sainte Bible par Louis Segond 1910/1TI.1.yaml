document_id: 1TI.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: heading
    content: 'V. 1-2: cf. Tit 1:1-4.'
  - type: text
    content: 'Paul, apôtre de Jésus-Christ, '
  - type: note
    content: Ac 9:15.
  - type: text
    content: 'par ordre de Dieu notre Sauveur et de Jésus-Christ '
  - type: note
    content: Col 1:27.
  - type: text
    content: 'notre espérance, '
  '10':
  - type: text
    content: 'les impudiques, les infâmes, les voleurs d’hommes, les menteurs, les parjures, et tout ce qui est contraire à la saine doctrine, '
  '11':
  - type: text
    content: 'conformément à l’Évangile de la gloire du '
  - type: note
    content: 1 Ti 6:15.
  - type: text
    content: 'Dieu bienheureux, Évangile '
  - type: note
    content: 1 Th 2:4.
  - type: text
    content: qui m’a été confié.
  - type: heading
    content: 'V. 12-17: cf. Ac 26:9-20. 1 Co 15:9, 10.'
  '12':
  - type: text
    content: 'Je rends grâces à celui qui m’a fortifié, à Jésus-Christ notre Seigneur, de ce qu’il m’a jugé fidèle, '
  '13':
  - type: note
    content: Ac 8:3; 9:1; 22:4; 26:9. 1 Co 15:9. Ga 1:13.
  - type: text
    content: 'en m’établissant dans le ministère, moi qui étais auparavant un blasphémateur, un persécuteur, un homme violent. Mais j’ai obtenu miséricorde, '
  - type: note
    content: Jn 9:39, 41. Ac 3:17.
  - type: text
    content: 'parce que j’agissais par ignorance, dans l’incrédulité; '
  '14':
  - type: text
    content: 'et la grâce de notre Seigneur a surabondé, avec la foi et la charité qui est en Jésus-Christ. '
  '15':
  - type: text
    content: 'C’est une parole certaine et entièrement digne d’être reçue, '
  - type: note
    content: Mt 9:13. Mc 2:17. Lu 5:32; 19:10. 1 Jn 3:5.
  - type: text
    content: 'que Jésus-Christ est venu dans le monde pour sauver les pécheurs, dont je suis le premier. '
  '16':
  - type: text
    content: 'Mais j’ai obtenu miséricorde, afin que Jésus-Christ fît voir en moi le premier toute sa longanimité, pour que je servisse d’exemple à ceux qui croiraient en lui pour la vie éternelle. '
  '17':
  - type: text
    content: Au roi des siècles, immortel, invisible, seul Dieu, soient honneur et gloire, aux siècles des siècles! Amen!
  - type: heading
    content: Combattre le bon combat
  - type: heading
    content: 'V. 18-20: cf. 1 Ti 6:12, 20, 21. 2 Ti 2:15-18.'
  '18':
  - type: text
    content: 'Le commandement que je t’adresse, Timothée, mon enfant, selon les prophéties faites précédemment à ton sujet, c’est que, d’après elles, '
  - type: note
    content: 1 Ti 6:12.
  - type: text
    content: 'tu combattes le bon combat, '
  '19':
  - type: note
    content: 1 Ti 3:9.
  - type: text
    content: 'en gardant la foi et une bonne conscience. Cette conscience, quelques-uns l’ont perdue, et ils ont fait naufrage par rapport à la foi. '
  '2':
  - type: note
    content: Ac 16:1. 1 Th 3:2.
  - type: text
    content: 'à Timothée, mon '
  - type: note
    content: 1 Co 4:17.
  - type: text
    content: 'enfant légitime en la foi: '
  - type: note
    content: Ga 1:3. 1 Pi 1:2.
  - type: text
    content: que la grâce, la miséricorde et la paix, te soient données de la part de Dieu le Père et de Jésus-Christ notre Seigneur!
  - type: heading
    content: Les fausses doctrines et l’Évangile de la grâce
  - type: heading
    content: 'V. 3-11: cf. (1 Ti 6:3-5, 20, 21. Tit 3:9.) Ga 3:10-12, 19-24; 5:6. 2 Ti 2:10-14.'
  '20':
  - type: text
    content: 'De ce nombre sont '
  - type: note
    content: 2 Ti 2:17.
  - type: text
    content: 'Hyménée et '
  - type: note
    content: 2 Ti 4:14.
  - type: text
    content: 'Alexandre, '
  - type: note
    content: 1 Co 5:5.
  - type: text
    content: que j’ai livrés à Satan, afin qu’ils apprennent à ne pas blasphémer.
  '3':
  - type: text
    content: 'Je te rappelle l’exhortation que je te fis, à mon départ '
  - type: note
    content: Ac 20:1.
  - type: text
    content: 'pour la Macédoine, lorsque je t’engageai à rester à Éphèse, afin de recommander à certaines personnes de ne pas enseigner d’autres doctrines, '
  '4':
  - type: note
    content: 1 Ti 4:7; 6:20. 2 Ti 2:16. Tit 1:14; 3:9.
  - type: text
    content: 'et de ne pas s’attacher à des fables et à des généalogies sans fin, qui produisent des '
  - type: note
    content: 1 Ti 6:4.
  - type: text
    content: 'discussions plutôt qu’elles n’avancent l’œuvre de Dieu dans la foi. '
  '5':
  - type: note
    content: Ro 13:8. Ga 5:14.
  - type: text
    content: 'Le but du commandement, c’est une charité venant d’un cœur pur, d’une bonne conscience, et d’une foi sincère. '
  '6':
  - type: text
    content: 'Quelques-uns, s’étant détournés de ces choses, se sont égarés dans de vains discours; '
  '7':
  - type: text
    content: 'ils veulent être docteurs de la loi, et ils ne comprennent ni ce qu’ils disent, ni ce qu’ils affirment. '
  '8':
  - type: text
    content: 'Nous n’ignorons pas '
  - type: note
    content: Ro 7:12.
  - type: text
    content: 'que la loi est bonne, pourvu qu’on en fasse un usage légitime, '
  '9':
  - type: text
    content: 'sachant bien '
  - type: note
    content: Ga 5:23.
  - type: text
    content: 'que la loi n’est pas faite pour le juste, mais pour les méchants et les rebelles, les impies et les pécheurs, les irréligieux et les profanes, les parricides, les meurtriers, '
