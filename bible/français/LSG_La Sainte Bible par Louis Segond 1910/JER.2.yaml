document_id: JER.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Reproches au peuple d’Israël
  - type: heading
    content: 'V. 1-13: cf. De 32:1-18. Os 2:16, 17. És 1:2-4. Ap 2:4, 5.'
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: text
    content: Passez aux îles de Kittim, et regardez!
  - type: text
    content: Envoyez quelqu’un à Kédar, observez bien,
  - type: text
    content: Et regardez s’il y a rien de semblable!
  '11':
  - type: text
    content: Y a-t-il une nation qui change ses dieux,
  - type: text
    content: Quoiqu’ils ne soient pas des dieux?
  - type: text
    content: 'Et mon peuple a '
  - type: note
    content: Ps 106:20.
  - type: text
    content: changé sa gloire contre ce qui n’est d’aucun secours!
  '12':
  - type: text
    content: ' '
  - type: note
    content: De 32:1. És 1:2.
  - type: text
    content: Cieux, soyez étonnés de cela;
  - type: text
    content: Frémissez d’épouvante et d’horreur! Dit l’Éternel.
  '13':
  - type: text
    content: 'Car mon peuple a commis un double péché:'
  - type: text
    content: 'Ils m’ont abandonné, moi qui suis '
  - type: note
    content: Ca 4:15. Jé 17:13.
  - type: text
    content: une source d’eau vive,
  - type: text
    content: Pour se creuser des citernes, des citernes crevassées,
  - type: text
    content: Qui ne retiennent pas l’eau.
  - type: heading
    content: 'V. 14-19: cf. Jé 4:7, 15-18. És 3:8-11; 31:1-3.'
  '14':
  - type: text
    content: Israël est-il un esclave acheté, ou né dans la maison?
  - type: text
    content: Pourquoi donc devient-il une proie?
  '15':
  - type: text
    content: ' '
  - type: note
    content: És 5:29. Jé 4:7.
  - type: text
    content: Contre lui les lionceaux rugissent, poussent leurs cris,
  - type: text
    content: Et ils ravagent son pays;
  - type: text
    content: Ses villes sont brûlées, il n’y a plus d’habitants.
  '16':
  - type: text
    content: Même les enfants de Noph et de Tachpanès
  - type: text
    content: Te briseront le sommet de la tête.
  '17':
  - type: text
    content: Cela ne t’arrive-t-il pas
  - type: text
    content: Parce que tu as abandonné l’Éternel, ton Dieu,
  - type: text
    content: Lorsqu’il te dirigeait dans la bonne voie?
  '18':
  - type: text
    content: 'Et maintenant, qu’as-tu à faire d’aller en '
  - type: note
    content: És 31:1.
  - type: text
    content: Égypte,
  - type: text
    content: Pour boire l’eau du Nil?
  - type: text
    content: Qu’as-tu à faire d’aller en Assyrie,
  - type: text
    content: Pour boire l’eau du fleuve?
  '19':
  - type: text
    content: 'Ta '
  - type: note
    content: És 3:9. Os 5:5.
  - type: text
    content: méchanceté te châtiera, et ton infidélité te punira,
  - type: text
    content: Tu sauras et tu verras que c’est une chose mauvaise et amère
  - type: text
    content: D’abandonner l’Éternel, ton Dieu,
  - type: text
    content: Et de n’avoir de moi aucune crainte,
  - type: text
    content: Dit le Seigneur, l’Éternel des armées.
  - type: heading
    content: 'V. 20-28: cf. Jg 2:11-13. Jé 3:2-11.'
  '2':
  - type: text
    content: 'Va, et crie aux oreilles de Jérusalem:'
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Je me souviens de ton amour lorsque tu étais jeune,
  - type: text
    content: De ton affection lorsque tu étais fiancée,
  - type: text
    content: Quand tu me suivais au désert,
  - type: text
    content: Dans une terre inculte.
  '20':
  - type: text
    content: Tu as dès longtemps brisé ton joug,
  - type: text
    content: Rompu tes liens,
  - type: text
    content: 'Et tu as dit: Je ne veux plus être dans la servitude!'
  - type: text
    content: Mais sur toute colline élevée
  - type: text
    content: Et sous tout arbre vert
  - type: text
    content: Tu t’es courbée comme une prostituée.
  '21':
  - type: text
    content: 'Je t’avais '
  - type: note
    content: Ex 15:17. Ps 44:3; 80:9.
  - type: text
    content: plantée comme une vigne excellente
  - type: text
    content: Et du meilleur plant;
  - type: text
    content: Comment as-tu changé,
  - type: text
    content: Dégénéré en une vigne étrangère?
  '22':
  - type: text
    content: 'Quand tu te '
  - type: note
    content: Job 9:30.
  - type: text
    content: laverais avec du nitre,
  - type: text
    content: Quand tu emploierais beaucoup de potasse,
  - type: text
    content: Ton iniquité resterait marquée devant moi,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  '23':
  - type: text
    content: 'Comment dirais-tu: Je ne me suis point souillée,'
  - type: text
    content: Je ne suis point allée après les Baals?
  - type: text
    content: Regarde tes pas dans la vallée,
  - type: text
    content: Reconnais ce que tu as fait,
  - type: text
    content: Dromadaire à la course légère et vagabonde!
  '24':
  - type: text
    content: Anesse sauvage, habituée au désert,
  - type: text
    content: Haletante dans l’ardeur de sa passion,
  - type: text
    content: Qui l’empêchera de satisfaire son désir?
  - type: text
    content: Tous ceux qui la cherchent n’ont pas à se fatiguer;
  - type: text
    content: Ils la trouvent pendant son mois.
  '25':
  - type: text
    content: Ne t’expose pas à avoir les pieds nus,
  - type: text
    content: Ne dessèche pas ton gosier!
  - type: text
    content: 'Mais tu dis: C’est en vain, non!'
  - type: text
    content: Car j’aime les dieux étrangers, je veux aller après eux.
  '26':
  - type: text
    content: Comme un voleur est confus lorsqu’il est surpris,
  - type: text
    content: Ainsi seront confus ceux de la maison d’Israël,
  - type: text
    content: Eux, leurs rois, leurs chefs,
  - type: text
    content: Leurs sacrificateurs et leurs prophètes.
  '27':
  - type: text
    content: 'Ils disent au bois: Tu es mon père!'
  - type: text
    content: 'Et à la pierre: Tu m’as donné la vie!'
  - type: text
    content: Car ils me tournent le dos, ils ne me regardent pas.
  - type: text
    content: 'Et quand ils sont dans le malheur, ils disent:'
  - type: text
    content: Lève-toi, sauve-nous!
  '28':
  - type: text
    content: Où donc sont tes dieux que tu t’es faits?
  - type: text
    content: Qu’ils se lèvent, s’ils peuvent te sauver au temps du malheur!
  - type: note
    content: És 2:8. Jé 11:13.
  - type: text
    content: Car tu as autant de dieux que de villes, ô Juda!
  - type: heading
    content: 'V. 29-37: cf. Pr 28:13, 14. Os 7:10-13. La 4:17.'
  '29':
  - type: text
    content: Pourquoi contesteriez-vous avec moi?
  - type: text
    content: Vous m’avez tous été infidèles, dit l’Éternel.
  '3':
  - type: text
    content: Israël était consacré à l’Éternel,
  - type: text
    content: Il était les prémices de son revenu;
  - type: text
    content: Tous ceux qui en mangeaient se rendaient coupables,
  - type: text
    content: Et le malheur fondait sur eux, dit l’Éternel.
  '30':
  - type: text
    content: 'En vain ai-je '
  - type: note
    content: És 1:5. Jé 5:3.
  - type: text
    content: frappé vos enfants;
  - type: text
    content: Ils n’ont point eu égard à la correction;
  - type: text
    content: Votre glaive a dévoré vos prophètes,
  - type: text
    content: Comme un lion destructeur.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Mt 23:26, etc.
  - type: text
    content: Hommes de cette génération, considérez la parole de l’Éternel!
  - type: text
    content: Ai-je été pour Israël un désert,
  - type: text
    content: Ou un pays d’épaisses ténèbres?
  - type: text
    content: 'Pourquoi mon peuple dit-il: Nous sommes libres,'
  - type: text
    content: Nous ne voulons pas retourner à toi?
  '32':
  - type: text
    content: La jeune fille oublie-t-elle ses ornements,
  - type: text
    content: La fiancée sa ceinture?
  - type: text
    content: 'Et mon peuple m’a '
  - type: note
    content: Jé 3:21.
  - type: text
    content: oublié
  - type: text
    content: Depuis des jours sans nombre.
  '33':
  - type: text
    content: Comme tu es habile dans tes voies pour chercher ce que tu aimes!
  - type: text
    content: C’est même au crime que tu les exerces.
  '34':
  - type: text
    content: Jusque sur les pans de ton habit se trouve
  - type: text
    content: Le sang de pauvres innocents,
  - type: text
    content: Que tu n’as pas surpris faisant effraction.
  '35':
  - type: text
    content: 'Malgré cela, tu dis: Oui, je suis innocente!'
  - type: text
    content: Certainement sa colère s’est détournée de moi!
  - type: text
    content: Voici, je vais contester avec toi,
  - type: text
    content: 'Parce que tu dis: Je n’ai point péché.'
  '36':
  - type: text
    content: Pourquoi tant d’empressement à changer ton chemin?
  - type: text
    content: 'C’est de '
  - type: note
    content: És 31:1.
  - type: text
    content: l’Égypte que viendra ta honte,
  - type: text
    content: Comme elle est venue de l’Assyrie.
  '37':
  - type: text
    content: De là aussi tu sortiras, les mains sur la tête;
  - type: text
    content: Car l’Éternel rejette ceux en qui tu te confies,
  - type: text
    content: Et tu ne réussiras pas auprès d’eux.
  '4':
  - type: text
    content: Écoutez la parole de l’Éternel, maison de Jacob,
  - type: text
    content: Et vous toutes, familles de la maison d’Israël!
  '5':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: note
    content: Mi 6:3, 4.
  - type: text
    content: Quelle iniquité vos pères ont-ils trouvée en moi,
  - type: text
    content: Pour s’éloigner de moi,
  - type: text
    content: Et pour aller après des choses de néant et n’être eux-mêmes que néant?
  '6':
  - type: text
    content: 'Ils n’ont pas dit: Où est l’Éternel,'
  - type: text
    content: Qui nous a fait monter du pays d’Égypte,
  - type: text
    content: Qui nous a conduits dans le désert,
  - type: text
    content: Dans une terre aride et pleine de fosses,
  - type: text
    content: Dans une terre où règnent la sécheresse et l’ombre de la mort,
  - type: text
    content: Dans une terre par où personne ne passe,
  - type: text
    content: Et où n’habite aucun homme?
  '7':
  - type: text
    content: Je vous ai fait venir dans un pays semblable à un verger,
  - type: text
    content: Pour que vous en mangiez les fruits et les meilleures productions;
  - type: text
    content: Mais vous êtes venus, et vous avez souillé mon pays,
  - type: text
    content: Et vous avez fait de mon héritage une abomination.
  '8':
  - type: text
    content: 'Les sacrificateurs n’ont pas dit: Où est l’Éternel?'
  - type: note
    content: Ro 2:20.
  - type: text
    content: Les dépositaires de la loi ne m’ont pas connu,
  - type: text
    content: Les pasteurs m’ont été infidèles,
  - type: text
    content: Les prophètes ont prophétisé par Baal,
  - type: text
    content: Et sont allés après ceux qui ne sont d’aucun secours.
  '9':
  - type: text
    content: C’est pourquoi je veux encore contester avec vous, dit l’Éternel,
  - type: text
    content: Je veux contester avec les enfants de vos enfants.
