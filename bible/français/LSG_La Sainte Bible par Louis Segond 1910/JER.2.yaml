document_id: JER.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Reproches au peuple d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-13: cf. De 32:1-18. Os 2:16, 17. És 1:2-4. Ap 2:4, 5.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Passez aux îles de Kittim, et regardez!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Envoyez quelqu’un à Kédar, observez bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et regardez s’il y a rien de semblable!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Y a-t-il une nation qui change ses dieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quoiqu’ils ne soient pas des dieux?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et mon peuple a '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 106:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: changé sa gloire contre ce qui n’est d’aucun secours!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Cieux, soyez étonnés de cela;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Frémissez d’épouvante et d’horreur! Dit l’Éternel.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Car mon peuple a commis un double péché:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils m’ont abandonné, moi qui suis '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ca 4:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 17:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: une source d’eau vive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour se creuser des citernes, des citernes crevassées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui ne retiennent pas l’eau.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-19: cf. Jé 4:7, 15-18. És 3:8-11; 31:1-3.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Israël est-il un esclave acheté, ou né dans la maison?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi donc devient-il une proie?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 5:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 4:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Contre lui les lionceaux rugissent, poussent leurs cris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils ravagent son pays;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses villes sont brûlées, il n’y a plus d’habitants.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Même les enfants de Noph et de Tachpanès
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Te briseront le sommet de la tête.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Cela ne t’arrive-t-il pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que tu as abandonné l’Éternel, ton Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsqu’il te dirigeait dans la bonne voie?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Et maintenant, qu’as-tu à faire d’aller en '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 31:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour boire l’eau du Nil?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’as-tu à faire d’aller en Assyrie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour boire l’eau du fleuve?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ta '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 3:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 5:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: méchanceté te châtiera, et ton infidélité te punira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu sauras et tu verras que c’est une chose mauvaise et amère
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D’abandonner l’Éternel, ton Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de n’avoir de moi aucune crainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le Seigneur, l’Éternel des armées.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 20-28: cf. Jg 2:11-13. Jé 3:2-11.'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Va, et crie aux oreilles de Jérusalem:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me souviens de ton amour lorsque tu étais jeune,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De ton affection lorsque tu étais fiancée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand tu me suivais au désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans une terre inculte.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tu as dès longtemps brisé ton joug,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rompu tes liens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et tu as dit: Je ne veux plus être dans la servitude!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais sur toute colline élevée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sous tout arbre vert
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu t’es courbée comme une prostituée.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Je t’avais '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 15:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 44:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 80:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: plantée comme une vigne excellente
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et du meilleur plant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment as-tu changé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dégénéré en une vigne étrangère?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Quand tu te '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 9:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: laverais avec du nitre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand tu emploierais beaucoup de potasse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton iniquité resterait marquée devant moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le Seigneur, l’Éternel.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Comment dirais-tu: Je ne me suis point souillée,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne suis point allée après les Baals?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Regarde tes pas dans la vallée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reconnais ce que tu as fait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dromadaire à la course légère et vagabonde!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Anesse sauvage, habituée au désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haletante dans l’ardeur de sa passion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui l’empêchera de satisfaire son désir?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui la cherchent n’ont pas à se fatiguer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils la trouvent pendant son mois.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ne t’expose pas à avoir les pieds nus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne dessèche pas ton gosier!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais tu dis: C’est en vain, non!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car j’aime les dieux étrangers, je veux aller après eux.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Comme un voleur est confus lorsqu’il est surpris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi seront confus ceux de la maison d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eux, leurs rois, leurs chefs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs sacrificateurs et leurs prophètes.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ils disent au bois: Tu es mon père!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et à la pierre: Tu m’as donné la vie!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils me tournent le dos, ils ne me regardent pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et quand ils sont dans le malheur, ils disent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lève-toi, sauve-nous!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Où donc sont tes dieux que tu t’es faits?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils se lèvent, s’ils peuvent te sauver au temps du malheur!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 2:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 11:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car tu as autant de dieux que de villes, ô Juda!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 29-37: cf. Pr 28:13, 14. Os 7:10-13. La 4:17.'
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Pourquoi contesteriez-vous avec moi?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous m’avez tous été infidèles, dit l’Éternel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Israël était consacré à l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il était les prémices de son revenu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui en mangeaient se rendaient coupables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le malheur fondait sur eux, dit l’Éternel.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'En vain ai-je '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 5:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: frappé vos enfants;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n’ont point eu égard à la correction;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Votre glaive a dévoré vos prophètes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un lion destructeur.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mt 23:26, etc.
      marker-yv: yv-n
    - type: text
      text: Hommes de cette génération, considérez la parole de l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ai-je été pour Israël un désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou un pays d’épaisses ténèbres?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pourquoi mon peuple dit-il: Nous sommes libres,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous ne voulons pas retourner à toi?
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: La jeune fille oublie-t-elle ses ornements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La fiancée sa ceinture?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et mon peuple m’a '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 3:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: oublié
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depuis des jours sans nombre.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Comme tu es habile dans tes voies pour chercher ce que tu aimes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est même au crime que tu les exerces.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Jusque sur les pans de ton habit se trouve
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sang de pauvres innocents,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tu n’as pas surpris faisant effraction.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Malgré cela, tu dis: Oui, je suis innocente!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Certainement sa colère s’est détournée de moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je vais contester avec toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Parce que tu dis: Je n’ai point péché.'
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Pourquoi tant d’empressement à changer ton chemin?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 31:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: l’Égypte que viendra ta honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme elle est venue de l’Assyrie.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: De là aussi tu sortiras, les mains sur la tête;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel rejette ceux en qui tu te confies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu ne réussiras pas auprès d’eux.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Écoutez la parole de l’Éternel, maison de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous toutes, familles de la maison d’Israël!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 6:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Quelle iniquité vos pères ont-ils trouvée en moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour s’éloigner de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pour aller après des choses de néant et n’être eux-mêmes que néant?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ils n’ont pas dit: Où est l’Éternel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui nous a fait monter du pays d’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui nous a conduits dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans une terre aride et pleine de fosses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans une terre où règnent la sécheresse et l’ombre de la mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans une terre par où personne ne passe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et où n’habite aucun homme?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Je vous ai fait venir dans un pays semblable à un verger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que vous en mangiez les fruits et les meilleures productions;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais vous êtes venus, et vous avez souillé mon pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous avez fait de mon héritage une abomination.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Les sacrificateurs n’ont pas dit: Où est l’Éternel?'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 2:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les dépositaires de la loi ne m’ont pas connu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les pasteurs m’ont été infidèles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les prophètes ont prophétisé par Baal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sont allés après ceux qui ne sont d’aucun secours.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: C’est pourquoi je veux encore contester avec vous, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux contester avec les enfants de vos enfants.
