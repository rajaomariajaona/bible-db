document_id: EZK.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre ceux qui s’attachent aux idoles et qui consultent l’Éternel
  - type: heading
    content: 'V. 1-11: cf. Za 7. Pr 28:9.'
  - type: text
    content: 'Quelques-uns des anciens d’Israël vinrent auprès de moi et '
  - type: note
    content: Éz 20:1.
  - type: text
    content: 's’assirent devant moi. '
  '10':
  - type: text
    content: 'Ils porteront ainsi la peine de leur iniquité; la peine du prophète sera comme la peine de celui qui consulte, '
  '11':
  - type: text
    content: afin que la maison d’Israël ne s’égare plus loin de moi, et qu’elle ne se souille plus par toutes ses transgressions. Alors ils seront mon peuple, et je serai leur Dieu, dit le Seigneur, l’Éternel.
  - type: heading
    content: Justice des châtiments de l’Éternel
  - type: heading
    content: 'V. 12-23: cf. Jé 15:1-4. Ge 18:20-32. Jé 24.'
  '12':
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '13':
  - type: text
    content: 'Fils de l’homme, lorsqu’un pays pécherait contre moi en se livrant à l’infidélité, et que j’étendrais ma main sur lui, si je brisais pour lui le '
  - type: note
    content: Lé 26:26. Éz 4:16; 5:16.
  - type: text
    content: 'bâton du pain, si je lui envoyais la famine, si j’en exterminais les hommes et les bêtes, '
  '14':
  - type: text
    content: 'et qu’il y eût au milieu de lui ces trois hommes, Noé, Daniel et Job, ils sauveraient leur âme par leur justice, dit le Seigneur, l’Éternel. '
  '15':
  - type: text
    content: 'Si je faisais parcourir le pays par des bêtes féroces qui le dépeupleraient, s’il devenait un désert où personne ne passerait à cause de ces bêtes, '
  '16':
  - type: text
    content: 'et qu’il y eût au milieu de lui ces trois hommes, je suis vivant! Dit le Seigneur, l’Éternel, ils ne sauveraient ni fils ni filles, eux seuls seraient sauvés, et le pays deviendrait un désert. '
  '17':
  - type: text
    content: 'Ou si j’amenais l’épée contre ce pays, si je disais: Que l’épée parcoure le pays! Si j’en exterminais les hommes et les bêtes, '
  '18':
  - type: text
    content: 'et qu’il y eût au milieu de lui ces trois hommes, je suis vivant! Dit le Seigneur, l’Éternel, ils ne sauveraient ni fils ni filles, mais eux seuls seraient sauvés. '
  '19':
  - type: text
    content: 'Ou si j’envoyais la peste dans ce pays, si je répandais contre lui ma fureur par la mortalité, pour en exterminer les hommes et les bêtes, '
  '2':
  - type: text
    content: 'Et la parole de l’Éternel me fut adressée, en ces mots: '
  '20':
  - type: text
    content: 'et qu’il y eût au milieu de lui Noé, Daniel et Job, je suis vivant! Dit le Seigneur, l’Éternel, ils ne sauveraient ni fils ni filles, mais ils sauveraient leur âme par leur justice. '
  '21':
  - type: text
    content: 'Oui, ainsi parle le Seigneur, l’Éternel: Quoique j’envoie contre Jérusalem mes quatre châtiments terribles, l’épée, la famine, les bêtes féroces et la peste, pour en exterminer les hommes et les bêtes, '
  '22':
  - type: text
    content: 'il y aura néanmoins un reste qui échappera, qui en sortira, des fils et des filles. Voici, ils arriveront auprès de vous; vous verrez leur conduite et leurs actions, et vous vous consolerez du malheur que je fais venir sur Jérusalem, de tout ce que je fais venir sur elle. '
  '23':
  - type: text
    content: Ils vous consoleront, quand vous verrez leur conduite et leurs actions; et vous reconnaîtrez que ce n’est pas sans raison que je fais tout ce que je lui fais, dit le Seigneur, l’Éternel.
  '3':
  - type: text
    content: 'Fils de l’homme, ces gens-là portent leurs idoles dans leur cœur, et ils attachent les regards sur ce qui les a fait tomber dans l’iniquité. Me laisserai-je consulter par eux? '
  '4':
  - type: text
    content: 'C’est pourquoi parle-leur, et dis-leur: Ainsi parle le Seigneur, l’Éternel: Tout homme de la maison d’Israël qui porte ses idoles dans son cœur, et qui attache les regards sur ce qui l’a fait tomber dans son iniquité, s’il vient s’adresser au prophète, moi, l’Éternel, je lui répondrai, malgré la multitude de ses idoles, '
  '5':
  - type: text
    content: 'afin de saisir dans leur propre cœur ceux de la maison d’Israël qui se sont éloignés de moi avec toutes leurs idoles. '
  '6':
  - type: text
    content: 'C’est pourquoi dis à la maison d’Israël: Ainsi parle le Seigneur, l’Éternel: Revenez, et détournez-vous de vos idoles, détournez les regards de toutes vos abominations! '
  '7':
  - type: text
    content: 'Car tout homme de la maison d’Israël, ou des étrangers séjournant en Israël, qui s’est éloigné de moi, qui porte ses idoles dans son cœur, et qui attache les regards sur ce qui l’a fait tomber dans son iniquité, s’il vient s’adresser au prophète pour me consulter par lui, moi, l’Éternel, je lui répondrai par moi. '
  '8':
  - type: text
    content: 'Je tournerai ma face contre cet homme, je ferai de lui un '
  - type: note
    content: De 28:37. Éz 5:15.
  - type: text
    content: 'signe et un sujet de sarcasme, et je l’exterminerai du milieu de mon peuple. Et vous saurez que je suis l’Éternel. '
  '9':
  - type: text
    content: 'Si le prophète se laisse '
  - type: note
    content: Éz 13:1, 2, etc.
  - type: text
    content: 'séduire, s’il prononce une parole, c’est moi, l’Éternel, qui aurai séduit ce prophète; j’étendrai ma '
  - type: note
    content: Éz 13:9.
  - type: text
    content: 'main contre lui, et je le détruirai du milieu de mon peuple d’Israël. '
