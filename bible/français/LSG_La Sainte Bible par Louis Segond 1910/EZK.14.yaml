document_id: EZK.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre ceux qui s’attachent aux idoles et qui consultent l’Éternel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. Za 7. Pr 28:9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quelques-uns des anciens d’Israël vinrent auprès de moi et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 20:1
      metadata:
        usfm: EZK.20.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 's’assirent devant moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et la parole de l’Éternel me fut adressée, en ces mots: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fils de l’homme, ces gens-là portent leurs idoles dans leur cœur, et ils attachent les regards sur ce qui les a fait tomber dans l’iniquité. Me laisserai-je consulter par eux? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'C’est pourquoi parle-leur, et dis-leur: Ainsi parle le Seigneur, l’Éternel: Tout homme de la maison d’Israël qui porte ses idoles dans son cœur, et qui attache les regards sur ce qui l’a fait tomber dans son iniquité, s’il vient s’adresser au prophète, moi, l’Éternel, je lui répondrai, malgré la multitude de ses idoles, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'afin de saisir dans leur propre cœur ceux de la maison d’Israël qui se sont éloignés de moi avec toutes leurs idoles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C’est pourquoi dis à la maison d’Israël: Ainsi parle le Seigneur, l’Éternel: Revenez, et détournez-vous de vos idoles, détournez les regards de toutes vos abominations! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Car tout homme de la maison d’Israël, ou des étrangers séjournant en Israël, qui s’est éloigné de moi, qui porte ses idoles dans son cœur, et qui attache les regards sur ce qui l’a fait tomber dans son iniquité, s’il vient s’adresser au prophète pour me consulter par lui, moi, l’Éternel, je lui répondrai par moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je tournerai ma face contre cet homme, je ferai de lui un '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:37
      metadata:
        usfm: DEU.28.37
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 5:15
      metadata:
        usfm: EZK.5.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'signe et un sujet de sarcasme, et je l’exterminerai du milieu de mon peuple. Et vous saurez que je suis l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Si le prophète se laisse '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Éz 13:1, 2, etc.
    marker-yv: yv-n
  - type: text
    text: 'séduire, s’il prononce une parole, c’est moi, l’Éternel, qui aurai séduit ce prophète; j’étendrai ma '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 13:9
      metadata:
        usfm: EZK.13.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'main contre lui, et je le détruirai du milieu de mon peuple d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils porteront ainsi la peine de leur iniquité; la peine du prophète sera comme la peine de celui qui consulte, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: afin que la maison d’Israël ne s’égare plus loin de moi, et qu’elle ne se souille plus par toutes ses transgressions. Alors ils seront mon peuple, et je serai leur Dieu, dit le Seigneur, l’Éternel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Justice des châtiments de l’Éternel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-23: cf. Jé 15:1-4. Ge 18:20-32. Jé 24.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'La parole de l’Éternel me fut adressée, en ces mots: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fils de l’homme, lorsqu’un pays pécherait contre moi en se livrant à l’infidélité, et que j’étendrais ma main sur lui, si je brisais pour lui le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 26:26
      metadata:
        usfm: LEV.26.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 4:16
      metadata:
        usfm: EZK.4.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:16
      metadata:
        usfm: EZK.5.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'bâton du pain, si je lui envoyais la famine, si j’en exterminais les hommes et les bêtes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et qu’il y eût au milieu de lui ces trois hommes, Noé, Daniel et Job, ils sauveraient leur âme par leur justice, dit le Seigneur, l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Si je faisais parcourir le pays par des bêtes féroces qui le dépeupleraient, s’il devenait un désert où personne ne passerait à cause de ces bêtes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et qu’il y eût au milieu de lui ces trois hommes, je suis vivant! Dit le Seigneur, l’Éternel, ils ne sauveraient ni fils ni filles, eux seuls seraient sauvés, et le pays deviendrait un désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ou si j’amenais l’épée contre ce pays, si je disais: Que l’épée parcoure le pays! Si j’en exterminais les hommes et les bêtes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'et qu’il y eût au milieu de lui ces trois hommes, je suis vivant! Dit le Seigneur, l’Éternel, ils ne sauveraient ni fils ni filles, mais eux seuls seraient sauvés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ou si j’envoyais la peste dans ce pays, si je répandais contre lui ma fureur par la mortalité, pour en exterminer les hommes et les bêtes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'et qu’il y eût au milieu de lui Noé, Daniel et Job, je suis vivant! Dit le Seigneur, l’Éternel, ils ne sauveraient ni fils ni filles, mais ils sauveraient leur âme par leur justice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Oui, ainsi parle le Seigneur, l’Éternel: Quoique j’envoie contre Jérusalem mes quatre châtiments terribles, l’épée, la famine, les bêtes féroces et la peste, pour en exterminer les hommes et les bêtes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'il y aura néanmoins un reste qui échappera, qui en sortira, des fils et des filles. Voici, ils arriveront auprès de vous; vous verrez leur conduite et leurs actions, et vous vous consolerez du malheur que je fais venir sur Jérusalem, de tout ce que je fais venir sur elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ils vous consoleront, quand vous verrez leur conduite et leurs actions; et vous reconnaîtrez que ce n’est pas sans raison que je fais tout ce que je lui fais, dit le Seigneur, l’Éternel.
