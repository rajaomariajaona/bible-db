document_id: PSA.39
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 38. (Job 14. Ps 90.)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. A Jeduthun, Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je disais: Je veillerai sur mes voies,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: De peur de pécher par ma langue;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je mettrai un frein à ma bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tant que le méchant sera devant moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je suis resté muet, dans le silence;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me suis tu, quoique malheureux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ma douleur n’était pas moins vive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mon cœur brûlait au-dedans de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un feu intérieur me consumait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la parole est venue sur ma langue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Éternel! Dis-moi quel est le terme de ma vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quelle est la mesure de mes jours;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je sache combien je suis fragile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Voici, tu as donné à mes jours la largeur de la main,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ma vie est comme un rien devant toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Oui, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 62:10
      metadata:
        usfm: PSA.62.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 144:4
      metadata:
        usfm: PSA.144.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tout homme debout n’est qu’un souffle. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Oui, l’homme se promène comme une ombre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il s’agite vainement;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il amasse, et il ne sait qui recueillera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Maintenant, Seigneur, que puis-je espérer?
- type: usfm
  marker: q1
  children:
  - type: text
    text: En toi est mon espérance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Délivre-moi de toutes mes transgressions!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne me rends pas l’opprobre de l’insensé!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je reste muet, je n’ouvre pas la bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car c’est toi qui agis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Détourne de moi tes coups!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je succombe sous les attaques de ta main.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tu châties l’homme en le punissant de son iniquité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu détruis comme la teigne ce qu’il a de plus cher.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Oui, tout homme est un souffle. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Écoute ma prière, Éternel, et prête l’oreille à mes cris!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne sois pas insensible à mes larmes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 25:23
      metadata:
        usfm: LEV.25.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 29:15
      metadata:
        usfm: 1CH.29.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 119:19
      metadata:
        usfm: PSA.119.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:13
      metadata:
        usfm: HEB.11.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:11
      metadata:
        usfm: 1PE.2.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car je suis un étranger chez toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un habitant, comme tous mes pères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Détourne de moi le regard, et laisse-moi respirer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avant que je m’en aille et que ne sois plus!
