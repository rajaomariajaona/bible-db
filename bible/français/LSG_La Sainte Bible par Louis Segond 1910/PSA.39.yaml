document_id: PSA.39,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 38. (Job 14. Ps 90.)
  - type: text
    content: Au chef des chantres. A Jeduthun, Psaume de David.
  '10':
  - type: text
    content: Je reste muet, je n’ouvre pas la bouche,
  - type: text
    content: Car c’est toi qui agis.
  '11':
  - type: text
    content: Détourne de moi tes coups!
  - type: text
    content: Je succombe sous les attaques de ta main.
  '12':
  - type: text
    content: Tu châties l’homme en le punissant de son iniquité,
  - type: text
    content: Tu détruis comme la teigne ce qu’il a de plus cher.
  - type: text
    content: 'Oui, tout homme est un souffle. '
  - type: text
    content: — Pause.
  '13':
  - type: text
    content: Écoute ma prière, Éternel, et prête l’oreille à mes cris!
  - type: text
    content: Ne sois pas insensible à mes larmes!
  - type: note
    content: Lé 25:23. 1 Ch 29:15. Ps 119:19. Hé 11:13. 1 Pi 2:11.
  - type: text
    content: Car je suis un étranger chez toi,
  - type: text
    content: Un habitant, comme tous mes pères.
  '14':
  - type: text
    content: Détourne de moi le regard, et laisse-moi respirer,
  - type: text
    content: Avant que je m’en aille et que ne sois plus!
  '2':
  - type: text
    content: 'Je disais: Je veillerai sur mes voies,'
  - type: text
    content: De peur de pécher par ma langue;
  - type: text
    content: Je mettrai un frein à ma bouche,
  - type: text
    content: Tant que le méchant sera devant moi.
  '3':
  - type: text
    content: Je suis resté muet, dans le silence;
  - type: text
    content: Je me suis tu, quoique malheureux;
  - type: text
    content: Et ma douleur n’était pas moins vive.
  '4':
  - type: text
    content: Mon cœur brûlait au-dedans de moi,
  - type: text
    content: Un feu intérieur me consumait,
  - type: text
    content: Et la parole est venue sur ma langue.
  '5':
  - type: text
    content: Éternel! Dis-moi quel est le terme de ma vie,
  - type: text
    content: Quelle est la mesure de mes jours;
  - type: text
    content: Que je sache combien je suis fragile.
  '6':
  - type: text
    content: Voici, tu as donné à mes jours la largeur de la main,
  - type: text
    content: Et ma vie est comme un rien devant toi.
  - type: text
    content: 'Oui, '
  - type: note
    content: Ps 62:10; 144:4.
  - type: text
    content: 'tout homme debout n’est qu’un souffle. '
  - type: text
    content: — Pause.
  '7':
  - type: text
    content: Oui, l’homme se promène comme une ombre,
  - type: text
    content: Il s’agite vainement;
  - type: text
    content: Il amasse, et il ne sait qui recueillera.
  '8':
  - type: text
    content: Maintenant, Seigneur, que puis-je espérer?
  - type: text
    content: En toi est mon espérance.
  '9':
  - type: text
    content: Délivre-moi de toutes mes transgressions!
  - type: text
    content: Ne me rends pas l’opprobre de l’insensé!
