document_id: 1CH.20,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prise de Rabba
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-3: cf. 2 S 11; 12. Ps 21:9, etc.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’année suivante, au temps où les rois se mettaient en campagne, Joab, à la tête d’une forte armée, alla ravager le pays des fils d’Ammon et assiéger Rabba. Mais David resta à Jérusalem. Joab battit Rabba et la détruisit. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'David enleva la couronne de dessus la tête de son roi, et la trouva du poids d’un talent d’or: elle était garnie de pierres précieuses. On la mit sur la tête de David, qui emporta de la ville un très grand butin. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il fit sortir les habitants, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 12:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: il les mit en pièces avec des scies, des herses de fer et des haches; il traita de même toutes les villes des fils d’Ammon. David retourna à Jérusalem avec tout le peuple.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Victoires sur les Philistins
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 4-8: cf. 2 S 21:18-22.'
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Après cela, il y eut une bataille à Guézer avec les Philistins. Alors Sibbecaï, le Huschatite, tua Sippaï, l’un des enfants de Rapha. Et les Philistins furent humiliés. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il y eut encore une bataille avec les Philistins. Et Elchanan, fils de Jaïr, tua le frère de Goliath, Lachmi de Gath, qui avait une lance dont le bois était comme une ensouple de tisserand. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il y eut encore une bataille à Gath. Il s’y trouva un homme de haute taille, qui avait six doigts à chaque main et à chaque pied, vingt-quatre en tout, et qui était aussi issu de Rapha. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Il jeta un défi à Israël; et Jonathan, fils de Schimea, frère de David, le tua. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ces hommes étaient des enfants de Rapha à Gath. Ils périrent par la main de David et par la main de ses serviteurs.
