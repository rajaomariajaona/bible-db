document_id: 1CH.20,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prise de Rabba
  - type: heading
    content: 'V. 1-3: cf. 2 S 11; 12. Ps 21:9, etc.'
  - type: text
    content: 'L’année suivante, au temps où les rois se mettaient en campagne, Joab, à la tête d’une forte armée, alla ravager le pays des fils d’Ammon et assiéger Rabba. Mais David resta à Jérusalem. Joab battit Rabba et la détruisit. '
  '2':
  - type: text
    content: 'David enleva la couronne de dessus la tête de son roi, et la trouva du poids d’un talent d’or: elle était garnie de pierres précieuses. On la mit sur la tête de David, qui emporta de la ville un très grand butin. '
  '3':
  - type: text
    content: 'Il fit sortir les habitants, et '
  - type: note
    content: 2 S 12:31.
  - type: text
    content: il les mit en pièces avec des scies, des herses de fer et des haches; il traita de même toutes les villes des fils d’Ammon. David retourna à Jérusalem avec tout le peuple.
  - type: heading
    content: Victoires sur les Philistins
  - type: heading
    content: 'V. 4-8: cf. 2 S 21:18-22.'
  '4':
  - type: text
    content: 'Après cela, il y eut une bataille à Guézer avec les Philistins. Alors Sibbecaï, le Huschatite, tua Sippaï, l’un des enfants de Rapha. Et les Philistins furent humiliés. '
  '5':
  - type: text
    content: 'Il y eut encore une bataille avec les Philistins. Et Elchanan, fils de Jaïr, tua le frère de Goliath, Lachmi de Gath, qui avait une lance dont le bois était comme une ensouple de tisserand. '
  '6':
  - type: text
    content: 'Il y eut encore une bataille à Gath. Il s’y trouva un homme de haute taille, qui avait six doigts à chaque main et à chaque pied, vingt-quatre en tout, et qui était aussi issu de Rapha. '
  '7':
  - type: text
    content: 'Il jeta un défi à Israël; et Jonathan, fils de Schimea, frère de David, le tua. '
  '8':
  - type: text
    content: Ces hommes étaient des enfants de Rapha à Gath. Ils périrent par la main de David et par la main de ses serviteurs.
