document_id: 1KI.1
type_code: fra
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: RÈGNE DE SALOMON
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: Ch. 1 à 11. (2 Ch 1 à 9.) (2 S 7:12-15. Ps 89.)
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vieillesse du roi David
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-4: cf. (Ec 12:3-7; 4:11.) Ps 45:11, 12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le roi David était vieux, avancé en âge; on le couvrait de vêtements, et il ne pouvait se réchauffer. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ses serviteurs lui dirent: Que l’on cherche pour mon seigneur le roi une jeune fille vierge; qu’elle se tienne devant le roi, qu’elle le soigne, et qu’elle couche dans ton sein; et mon seigneur le roi se réchauffera. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'On chercha dans tout le territoire d’Israël une fille jeune et belle, et on trouva Abischag, la Sunamite, que l’on conduisit auprès du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Cette jeune fille était fort belle. Elle soigna le roi, et le servit; mais le roi ne la connut point.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Adonija, l’un de ses fils, aspirant à la royauté
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 5-10: cf. 2 S 15:1-12. Ro 12:3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Adonija, fils de Haggith, se laissa emporter par l’orgueil jusqu’à dire: C’est moi qui serai roi! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 15:1
      metadata:
        usfm: 2SA.15.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et il se procura un char et des cavaliers, et cinquante hommes qui couraient devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Son père ne lui avait de sa vie fait un reproche, en lui disant: Pourquoi agis-tu ainsi? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 3:2
      metadata:
        usfm: 1CH.3.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Adonija était, en outre, très beau de figure, et il était né après Absalom. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 2:22
      metadata:
        usfm: 1KI.2.22
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '28'
      metadata:
        usfm: 1KI.2.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il eut un entretien avec Joab, fils de Tseruja, et avec le sacrificateur Abiathar; et ils embrassèrent son parti. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais le sacrificateur Tsadok, Benaja, fils de Jehojada, Nathan le prophète, Schimeï, Réï, et les vaillants hommes de David, ne furent point avec Adonija. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Adonija tua des brebis, des bœufs et des veaux gras, près de la pierre de Zohéleth, qui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 15:7
      metadata:
        usfm: JOS.15.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:16
      metadata:
        usfm: JOS.18.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'est à côté d’En-Roguel; et il invita tous ses frères, fils du roi, et tous les hommes de Juda au service du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mais il n’invita point Nathan le prophète, ni Benaja, ni les vaillants hommes, ni Salomon, son frère.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-31: cf. (1 Ch 17:11-15; 22:6-13.) Pr 16:10, 12. 2 Co 1:17-20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors Nathan dit à Bath-Schéba, mère de Salomon: N’as-tu pas appris qu’Adonija, fils de Haggith, est devenu roi, sans que notre seigneur David le sache? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Viens donc maintenant, je te donnerai un conseil, afin que tu sauves ta vie et la vie de ton fils Salomon. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Va, entre chez le roi David, et dis-lui: O roi mon seigneur, n’as-tu pas juré à ta servante, en disant: Salomon, ton fils, régnera après moi, et il s’assiéra sur mon trône? Pourquoi donc Adonija règne-t-il? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et voici, pendant que tu parleras là avec le roi, j’entrerai moi-même après toi, et je compléterai tes paroles. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Bath-Schéba se rendit dans la chambre du roi. Il était très vieux; et Abischag, la Sunamite, le servait. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Bath-Schéba s’inclina et se prosterna devant le roi. Et le roi dit: Qu’as-tu? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Elle lui répondit: Mon seigneur, tu as juré à ta servante par l’Éternel, ton Dieu, en disant: Salomon, ton fils, régnera après moi, et il s’assiéra sur mon trône. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et maintenant voici, Adonija règne! Et tu ne le sais pas, ô roi mon seigneur! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il a tué des bœufs, des veaux gras et des brebis en quantité; et il a invité tous les fils du roi, le sacrificateur Abiathar, et Joab, chef de l’armée, mais il n’a point invité Salomon, ton serviteur. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'O roi mon seigneur, tout Israël a les yeux sur toi, pour que tu lui fasses connaître qui s’assiéra sur le trône du roi mon seigneur après lui. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et lorsque le roi mon seigneur sera couché avec ses pères, il arrivera que moi et mon fils Salomon nous serons traités comme des coupables. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tandis qu’elle parlait encore avec le roi, voici, Nathan le prophète arriva. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'On l’annonça au roi, en disant: Voici Nathan le prophète! Il entra en présence du roi, et se prosterna devant le roi, le visage contre terre. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Et Nathan dit: O roi mon seigneur, c’est donc toi qui as dit: Adonija régnera après moi, et il s’assiéra sur mon trône! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Car il est descendu aujourd’hui, il a tué des bœufs, des veaux gras et des brebis en quantité; et il a invité tous les fils du roi, les chefs de l’armée, et le sacrificateur Abiathar. Et voici, ils mangent et boivent devant lui, et ils disent: Vive le roi Adonija! '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mais il n’a invité ni moi qui suis ton serviteur, ni le sacrificateur Tsadok, ni Benaja, fils de Jehojada, ni Salomon, ton serviteur. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Est-ce bien par ordre de mon seigneur le roi que cette chose a lieu, et sans que tu aies fait connaître à ton serviteur qui doit s’asseoir sur le trône du roi mon seigneur après lui? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Le roi David répondit: Appelez-moi Bath-Schéba. Elle entra, et se présenta devant le roi. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Et le roi jura, et dit: L’Éternel qui m’a délivré de toutes les détresses est vivant! '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ainsi que je te l’ai juré par l’Éternel, le Dieu d’Israël, en disant: Salomon, ton fils, régnera après moi, et il s’assiéra sur mon trône à ma place, ainsi ferai-je aujourd’hui. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Bath-Schéba s’inclina le visage contre terre, et se prosterna devant le roi. Et elle dit: Vive à jamais mon seigneur le roi David!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salomon choisi par David pour lui succéder sur le trône
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 32-40: cf. (1 Ch 23:1; 29:22-25.) 2 Ch 23:9-11. (Pr 20:8. Ec 8:4.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Le roi David dit: Appelez-moi le sacrificateur Tsadok, Nathan le prophète, et Benaja, fils de Jehojada. Ils entrèrent en présence du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Et le roi leur dit: Prenez avec vous les serviteurs de votre maître, faites monter Salomon, mon fils, sur ma mule, et faites-le descendre à Guihon. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Là, le sacrificateur Tsadok et Nathan le prophète l’oindront pour roi sur Israël. Vous sonnerez de la trompette, et vous direz: Vive le roi Salomon! '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Vous monterez après lui; il viendra s’asseoir sur mon trône, et il régnera à ma place. C’est lui qui, par mon ordre, sera chef d’Israël et de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Benaja, fils de Jehojada, répondit au roi: Amen! Ainsi dise l’Éternel, le Dieu de mon seigneur le roi! '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Que l’Éternel soit avec Salomon comme il a été avec mon seigneur le roi, et qu’il élève son trône au-dessus du trône de mon seigneur le roi David! '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Alors le sacrificateur Tsadok descendit avec Nathan le prophète, Benaja, fils de Jehojada, les Kéréthiens et les Péléthiens; ils firent monter Salomon sur la mule du roi David, et ils le menèrent à Guihon. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Le sacrificateur Tsadok prit la corne d’huile dans la tente, et il oignit Salomon. On sonna de la trompette, et tout le peuple dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 10:24
      metadata:
        usfm: 1SA.10.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vive le roi Salomon! '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Tout le peuple monta après lui, et le peuple jouait de la flûte et se livrait à une grande joie; la terre s’ébranlait par leurs cris.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 41-53: cf. 1 R 2:13, etc. (Pr 21:6. Jé 17:11.) Job 5:12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ce bruit fut entendu d’Adonija et de tous les conviés qui étaient avec lui, au moment où ils finissaient de manger. Joab, entendant le son de la trompette, dit: Pourquoi ce bruit de la ville en tumulte? '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Il parlait encore lorsque Jonathan, fils du sacrificateur Abiathar, arriva. Et Adonija dit: Approche, car tu es un vaillant homme, et tu apportes de bonnes nouvelles. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Oui! Répondit Jonathan à Adonija, notre seigneur le roi David a fait Salomon roi. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Il a envoyé avec lui le sacrificateur Tsadok, Nathan le prophète, Benaja, fils de Jehojada, les Kéréthiens et les Péléthiens, et ils l’ont fait monter sur la mule du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Le sacrificateur Tsadok et Nathan le prophète l’ont oint pour roi à Guihon. De là ils sont remontés en se livrant à la joie, et la ville a été émue: c’est là le bruit que vous avez entendu. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Salomon s’est même assis sur le trône royal. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Et les serviteurs du roi sont venus pour bénir notre seigneur le roi David, en disant: Que ton Dieu rende le nom de Salomon plus célèbre que ton nom, et qu’il élève son trône au-dessus de ton trône! Et le roi s’est prosterné sur son lit. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Voici encore ce qu’a dit le roi: Béni soit l’Éternel, le Dieu d’Israël, qui m’a donné aujourd’hui un successeur sur mon trône, et qui m’a permis de le voir! '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Tous les conviés d’Adonija furent saisis d’épouvante; ils se levèrent et s’en allèrent chacun de son côté. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Adonija eut peur de Salomon; il se leva aussi, s’en alla, et saisit les cornes de l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'On vint dire à Salomon: Voici, Adonija a peur du roi Salomon, et il a saisi les cornes de l’autel, en disant: Que le roi Salomon me jure aujourd’hui qu’il ne fera point mourir son serviteur par l’épée! '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Salomon dit: S’il se montre un honnête homme, il ne tombera pas à terre un de ses cheveux; mais s’il se trouve en lui de la méchanceté, il mourra. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Et le roi Salomon envoya des gens, qui le firent descendre de l’autel. Il vint se prosterner devant le roi Salomon, et Salomon lui dit: Va dans ta maison.'
