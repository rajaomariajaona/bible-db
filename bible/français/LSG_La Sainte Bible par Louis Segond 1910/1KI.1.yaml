document_id: 1KI.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: RÈGNE DE SALOMON
  - type: heading
    content: Ch. 1 à 11. (2 Ch 1 à 9.) (2 S 7:12-15. Ps 89.)
  - type: heading
    content: Vieillesse du roi David
  - type: heading
    content: 'V. 1-4: cf. (Ec 12:3-7; 4:11.) Ps 45:11, 12.'
  - type: text
    content: 'Le roi David était vieux, avancé en âge; on le couvrait de vêtements, et il ne pouvait se réchauffer. '
  '10':
  - type: text
    content: Mais il n’invita point Nathan le prophète, ni Benaja, ni les vaillants hommes, ni Salomon, son frère.
  - type: heading
    content: 'V. 11-31: cf. (1 Ch 17:11-15; 22:6-13.) Pr 16:10, 12. 2 Co 1:17-20.'
  '11':
  - type: text
    content: 'Alors Nathan dit à Bath-Schéba, mère de Salomon: N’as-tu pas appris qu’Adonija, fils de Haggith, est devenu roi, sans que notre seigneur David le sache? '
  '12':
  - type: text
    content: 'Viens donc maintenant, je te donnerai un conseil, afin que tu sauves ta vie et la vie de ton fils Salomon. '
  '13':
  - type: text
    content: 'Va, entre chez le roi David, et dis-lui: O roi mon seigneur, n’as-tu pas juré à ta servante, en disant: Salomon, ton fils, régnera après moi, et il s’assiéra sur mon trône? Pourquoi donc Adonija règne-t-il? '
  '14':
  - type: text
    content: 'Et voici, pendant que tu parleras là avec le roi, j’entrerai moi-même après toi, et je compléterai tes paroles. '
  '15':
  - type: text
    content: 'Bath-Schéba se rendit dans la chambre du roi. Il était très vieux; et Abischag, la Sunamite, le servait. '
  '16':
  - type: text
    content: 'Bath-Schéba s’inclina et se prosterna devant le roi. Et le roi dit: Qu’as-tu? '
  '17':
  - type: text
    content: 'Elle lui répondit: Mon seigneur, tu as juré à ta servante par l’Éternel, ton Dieu, en disant: Salomon, ton fils, régnera après moi, et il s’assiéra sur mon trône. '
  '18':
  - type: text
    content: 'Et maintenant voici, Adonija règne! Et tu ne le sais pas, ô roi mon seigneur! '
  '19':
  - type: text
    content: 'Il a tué des bœufs, des veaux gras et des brebis en quantité; et il a invité tous les fils du roi, le sacrificateur Abiathar, et Joab, chef de l’armée, mais il n’a point invité Salomon, ton serviteur. '
  '2':
  - type: text
    content: 'Ses serviteurs lui dirent: Que l’on cherche pour mon seigneur le roi une jeune fille vierge; qu’elle se tienne devant le roi, qu’elle le soigne, et qu’elle couche dans ton sein; et mon seigneur le roi se réchauffera. '
  '20':
  - type: text
    content: 'O roi mon seigneur, tout Israël a les yeux sur toi, pour que tu lui fasses connaître qui s’assiéra sur le trône du roi mon seigneur après lui. '
  '21':
  - type: text
    content: 'Et lorsque le roi mon seigneur sera couché avec ses pères, il arrivera que moi et mon fils Salomon nous serons traités comme des coupables. '
  '22':
  - type: text
    content: 'Tandis qu’elle parlait encore avec le roi, voici, Nathan le prophète arriva. '
  '23':
  - type: text
    content: 'On l’annonça au roi, en disant: Voici Nathan le prophète! Il entra en présence du roi, et se prosterna devant le roi, le visage contre terre. '
  '24':
  - type: text
    content: 'Et Nathan dit: O roi mon seigneur, c’est donc toi qui as dit: Adonija régnera après moi, et il s’assiéra sur mon trône! '
  '25':
  - type: text
    content: 'Car il est descendu aujourd’hui, il a tué des bœufs, des veaux gras et des brebis en quantité; et il a invité tous les fils du roi, les chefs de l’armée, et le sacrificateur Abiathar. Et voici, ils mangent et boivent devant lui, et ils disent: Vive le roi Adonija! '
  '26':
  - type: text
    content: 'Mais il n’a invité ni moi qui suis ton serviteur, ni le sacrificateur Tsadok, ni Benaja, fils de Jehojada, ni Salomon, ton serviteur. '
  '27':
  - type: text
    content: 'Est-ce bien par ordre de mon seigneur le roi que cette chose a lieu, et sans que tu aies fait connaître à ton serviteur qui doit s’asseoir sur le trône du roi mon seigneur après lui? '
  '28':
  - type: text
    content: 'Le roi David répondit: Appelez-moi Bath-Schéba. Elle entra, et se présenta devant le roi. '
  '29':
  - type: text
    content: 'Et le roi jura, et dit: L’Éternel qui m’a délivré de toutes les détresses est vivant! '
  '3':
  - type: text
    content: 'On chercha dans tout le territoire d’Israël une fille jeune et belle, et on trouva Abischag, la Sunamite, que l’on conduisit auprès du roi. '
  '30':
  - type: text
    content: 'Ainsi que je te l’ai juré par l’Éternel, le Dieu d’Israël, en disant: Salomon, ton fils, régnera après moi, et il s’assiéra sur mon trône à ma place, ainsi ferai-je aujourd’hui. '
  '31':
  - type: text
    content: 'Bath-Schéba s’inclina le visage contre terre, et se prosterna devant le roi. Et elle dit: Vive à jamais mon seigneur le roi David!'
  - type: heading
    content: Salomon choisi par David pour lui succéder sur le trône
  - type: heading
    content: 'V. 32-40: cf. (1 Ch 23:1; 29:22-25.) 2 Ch 23:9-11. (Pr 20:8. Ec 8:4.)'
  '32':
  - type: text
    content: 'Le roi David dit: Appelez-moi le sacrificateur Tsadok, Nathan le prophète, et Benaja, fils de Jehojada. Ils entrèrent en présence du roi. '
  '33':
  - type: text
    content: 'Et le roi leur dit: Prenez avec vous les serviteurs de votre maître, faites monter Salomon, mon fils, sur ma mule, et faites-le descendre à Guihon. '
  '34':
  - type: text
    content: 'Là, le sacrificateur Tsadok et Nathan le prophète l’oindront pour roi sur Israël. Vous sonnerez de la trompette, et vous direz: Vive le roi Salomon! '
  '35':
  - type: text
    content: 'Vous monterez après lui; il viendra s’asseoir sur mon trône, et il régnera à ma place. C’est lui qui, par mon ordre, sera chef d’Israël et de Juda. '
  '36':
  - type: text
    content: 'Benaja, fils de Jehojada, répondit au roi: Amen! Ainsi dise l’Éternel, le Dieu de mon seigneur le roi! '
  '37':
  - type: text
    content: 'Que l’Éternel soit avec Salomon comme il a été avec mon seigneur le roi, et qu’il élève son trône au-dessus du trône de mon seigneur le roi David! '
  '38':
  - type: text
    content: 'Alors le sacrificateur Tsadok descendit avec Nathan le prophète, Benaja, fils de Jehojada, les Kéréthiens et les Péléthiens; ils firent monter Salomon sur la mule du roi David, et ils le menèrent à Guihon. '
  '39':
  - type: text
    content: 'Le sacrificateur Tsadok prit la corne d’huile dans la tente, et il oignit Salomon. On sonna de la trompette, et tout le peuple dit: '
  - type: note
    content: 1 S 10:24.
  - type: text
    content: 'Vive le roi Salomon! '
  '4':
  - type: text
    content: Cette jeune fille était fort belle. Elle soigna le roi, et le servit; mais le roi ne la connut point.
  - type: heading
    content: Adonija, l’un de ses fils, aspirant à la royauté
  - type: heading
    content: 'V. 5-10: cf. 2 S 15:1-12. Ro 12:3.'
  '40':
  - type: text
    content: Tout le peuple monta après lui, et le peuple jouait de la flûte et se livrait à une grande joie; la terre s’ébranlait par leurs cris.
  - type: heading
    content: 'V. 41-53: cf. 1 R 2:13, etc. (Pr 21:6. Jé 17:11.) Job 5:12.'
  '41':
  - type: text
    content: 'Ce bruit fut entendu d’Adonija et de tous les conviés qui étaient avec lui, au moment où ils finissaient de manger. Joab, entendant le son de la trompette, dit: Pourquoi ce bruit de la ville en tumulte? '
  '42':
  - type: text
    content: 'Il parlait encore lorsque Jonathan, fils du sacrificateur Abiathar, arriva. Et Adonija dit: Approche, car tu es un vaillant homme, et tu apportes de bonnes nouvelles. '
  '43':
  - type: text
    content: 'Oui! Répondit Jonathan à Adonija, notre seigneur le roi David a fait Salomon roi. '
  '44':
  - type: text
    content: 'Il a envoyé avec lui le sacrificateur Tsadok, Nathan le prophète, Benaja, fils de Jehojada, les Kéréthiens et les Péléthiens, et ils l’ont fait monter sur la mule du roi. '
  '45':
  - type: text
    content: 'Le sacrificateur Tsadok et Nathan le prophète l’ont oint pour roi à Guihon. De là ils sont remontés en se livrant à la joie, et la ville a été émue: c’est là le bruit que vous avez entendu. '
  '46':
  - type: text
    content: 'Salomon s’est même assis sur le trône royal. '
  '47':
  - type: text
    content: 'Et les serviteurs du roi sont venus pour bénir notre seigneur le roi David, en disant: Que ton Dieu rende le nom de Salomon plus célèbre que ton nom, et qu’il élève son trône au-dessus de ton trône! Et le roi s’est prosterné sur son lit. '
  '48':
  - type: text
    content: 'Voici encore ce qu’a dit le roi: Béni soit l’Éternel, le Dieu d’Israël, qui m’a donné aujourd’hui un successeur sur mon trône, et qui m’a permis de le voir! '
  '49':
  - type: text
    content: 'Tous les conviés d’Adonija furent saisis d’épouvante; ils se levèrent et s’en allèrent chacun de son côté. '
  '5':
  - type: text
    content: 'Adonija, fils de Haggith, se laissa emporter par l’orgueil jusqu’à dire: C’est moi qui serai roi! '
  - type: note
    content: 2 S 15:1.
  - type: text
    content: 'Et il se procura un char et des cavaliers, et cinquante hommes qui couraient devant lui. '
  '50':
  - type: text
    content: 'Adonija eut peur de Salomon; il se leva aussi, s’en alla, et saisit les cornes de l’autel. '
  '51':
  - type: text
    content: 'On vint dire à Salomon: Voici, Adonija a peur du roi Salomon, et il a saisi les cornes de l’autel, en disant: Que le roi Salomon me jure aujourd’hui qu’il ne fera point mourir son serviteur par l’épée! '
  '52':
  - type: text
    content: 'Salomon dit: S’il se montre un honnête homme, il ne tombera pas à terre un de ses cheveux; mais s’il se trouve en lui de la méchanceté, il mourra. '
  '53':
  - type: text
    content: 'Et le roi Salomon envoya des gens, qui le firent descendre de l’autel. Il vint se prosterner devant le roi Salomon, et Salomon lui dit: Va dans ta maison.'
  '6':
  - type: text
    content: 'Son père ne lui avait de sa vie fait un reproche, en lui disant: Pourquoi agis-tu ainsi? '
  - type: note
    content: 1 Ch 3:2.
  - type: text
    content: 'Adonija était, en outre, très beau de figure, et il était né après Absalom. '
  '7':
  - type: note
    content: 1 R 2:22, 28.
  - type: text
    content: 'Il eut un entretien avec Joab, fils de Tseruja, et avec le sacrificateur Abiathar; et ils embrassèrent son parti. '
  '8':
  - type: text
    content: 'Mais le sacrificateur Tsadok, Benaja, fils de Jehojada, Nathan le prophète, Schimeï, Réï, et les vaillants hommes de David, ne furent point avec Adonija. '
  '9':
  - type: text
    content: 'Adonija tua des brebis, des bœufs et des veaux gras, près de la pierre de Zohéleth, qui '
  - type: note
    content: Jos 15:7; 18:16.
  - type: text
    content: 'est à côté d’En-Roguel; et il invita tous ses frères, fils du roi, et tous les hommes de Juda au service du roi. '
