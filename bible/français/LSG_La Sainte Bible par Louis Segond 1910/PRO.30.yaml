document_id: PRO.30,93
type_code: fra
verses:
  '1':
  - type: text
    content: Paroles d’Agur, fils de Jaké. Sentences prononcées par cet homme pour Ithiel, pour Ithiel et pour Ucal.
  '10':
  - type: text
    content: Ne calomnie pas un serviteur auprès de son maître,
  - type: text
    content: De peur qu’il ne te maudisse et que tu ne te rendes coupable.
  '11':
  - type: text
    content: Il est une race qui maudit son père,
  - type: text
    content: Et qui ne bénit point sa mère.
  '12':
  - type: text
    content: Il est une race qui se croit pure,
  - type: text
    content: Et qui n’est pas lavée de sa souillure.
  '13':
  - type: text
    content: 'Il est une race '
  - type: note
    content: Pr 6:17.
  - type: text
    content: dont les yeux sont hautains,
  - type: text
    content: Et les paupières élevées.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Pr 12:18.
  - type: text
    content: Il est une race dont les dents sont des glaives
  - type: text
    content: Et les mâchoires des couteaux,
  - type: text
    content: Pour dévorer le malheureux sur la terre
  - type: text
    content: Et les indigents parmi les hommes.
  '15':
  - type: text
    content: 'La sangsue a deux filles: Donne! Donne!'
  - type: text
    content: Trois choses sont insatiables,
  - type: text
    content: 'Quatre ne disent jamais: Assez!'
  '16':
  - type: text
    content: Le séjour des morts, la femme stérile,
  - type: text
    content: La terre, qui n’est pas rassasiée d’eau,
  - type: text
    content: 'Et le feu, qui ne dit jamais: Assez!'
  '17':
  - type: text
    content: L’œil qui se moque d’un père
  - type: text
    content: Et qui dédaigne l’obéissance envers une mère,
  - type: text
    content: Les corbeaux du torrent le perceront,
  - type: text
    content: Et les petits de l’aigle le mangeront.
  '18':
  - type: text
    content: Il y a trois choses qui sont au-dessus de ma portée,
  - type: text
    content: 'Même quatre que je ne puis comprendre:'
  '19':
  - type: text
    content: La trace de l’aigle dans les cieux,
  - type: text
    content: La trace du serpent sur le rocher,
  - type: text
    content: La trace du navire au milieu de la mer,
  - type: text
    content: Et la trace de l’homme chez la jeune femme.
  '2':
  - type: text
    content: Certes, je suis plus stupide que personne,
  - type: text
    content: Et je n’ai pas l’intelligence d’un homme;
  '20':
  - type: text
    content: 'Telle est la voie de la femme adultère:'
  - type: text
    content: Elle mange, et s’essuie la bouche,
  - type: text
    content: 'Puis elle dit: Je n’ai point fait de mal.'
  '21':
  - type: text
    content: Trois choses font trembler la terre,
  - type: text
    content: 'Et il en est quatre qu’elle ne peut supporter:'
  '22':
  - type: text
    content: Un esclave qui vient à régner,
  - type: text
    content: Un insensé qui est rassasié de pain,
  '23':
  - type: text
    content: Une femme dédaignée qui se marie,
  - type: text
    content: Et une servante qui hérite de sa maîtresse.
  '24':
  - type: text
    content: Il y a sur la terre quatre animaux petits,
  - type: text
    content: Et cependant des plus sages;
  '25':
  - type: text
    content: Les fourmis, peuple sans force,
  - type: note
    content: Pr 6:8.
  - type: text
    content: Préparent en été leur nourriture;
  '26':
  - type: text
    content: Les damans, peuple sans puissance,
  - type: text
    content: Placent leur demeure dans les rochers;
  '27':
  - type: text
    content: Les sauterelles n’ont point de roi,
  - type: text
    content: Et elles sortent toutes par divisions;
  '28':
  - type: text
    content: Le lézard saisit avec les mains,
  - type: text
    content: Et se trouve dans les palais des rois.
  '29':
  - type: text
    content: Il y en a trois qui ont une belle allure,
  - type: text
    content: 'Et quatre qui ont une belle démarche:'
  '3':
  - type: text
    content: Je n’ai pas appris la sagesse,
  - type: text
    content: Et je ne connais pas la science des saints.
  '30':
  - type: text
    content: Le lion, le héros des animaux,
  - type: text
    content: Ne reculant devant qui que ce soit;
  '31':
  - type: text
    content: ' '
  - type: note
    content: Job 39:22, etc.
  - type: text
    content: Le cheval tout équipé; ou le bouc;
  - type: text
    content: Et le roi à qui personne ne résiste.
  '32':
  - type: text
    content: Si l’orgueil te pousse à des actes de folie,
  - type: text
    content: 'Et si tu as de mauvaises pensées, '
  - type: note
    content: Job 21:5.
  - type: text
    content: 'mets la main sur la bouche:'
  '33':
  - type: text
    content: Car la pression du lait produit de la crème,
  - type: text
    content: La pression du nez produit du sang,
  - type: text
    content: Et la pression de la colère produit des querelles.
  '4':
  - type: text
    content: Qui est monté aux cieux, et qui en est descendu?
  - type: note
    content: Job 38:4. Ps 104:3. És 40:12.
  - type: text
    content: Qui a recueilli le vent dans ses mains?
  - type: text
    content: Qui a serré les eaux dans son vêtement?
  - type: text
    content: Qui a fait paraître les extrémités de la terre?
  - type: text
    content: Quel est son nom, et quel est le nom de son fils?
  - type: text
    content: Le sais-tu?
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ps 12:7; 18:31; 19:9; 119:140.
  - type: text
    content: Toute parole de Dieu est éprouvée.
  - type: text
    content: Il est un bouclier pour ceux qui cherchent en lui un refuge.
  '6':
  - type: text
    content: ' '
  - type: note
    content: De 4:2; 12:32. Ap 22:18.
  - type: text
    content: N’ajoute rien à ses paroles,
  - type: text
    content: De peur qu’il ne te reprenne et que tu ne sois trouvé menteur.
  '7':
  - type: text
    content: 'Je te demande deux choses:'
  - type: text
    content: Ne me les refuse pas, avant que je meure!
  '8':
  - type: text
    content: Éloigne de moi la fausseté et la parole mensongère;
  - type: text
    content: Ne me donne ni pauvreté, ni richesse,
  - type: text
    content: Accorde-moi le pain qui m’est nécessaire.
  '9':
  - type: text
    content: De peur que, dans l’abondance, je ne te renie
  - type: text
    content: 'Et ne dise: Qui est l’Éternel?'
  - type: text
    content: Ou que, dans la pauvreté, je ne dérobe,
  - type: text
    content: Et ne m’attaque au nom de mon Dieu.
