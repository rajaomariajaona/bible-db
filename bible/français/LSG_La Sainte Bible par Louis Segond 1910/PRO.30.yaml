document_id: PRO.30
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Paroles d’Agur, fils de Jaké. Sentences prononcées par cet homme pour Ithiel, pour Ithiel et pour Ucal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Certes, je suis plus stupide que personne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je n’ai pas l’intelligence d’un homme;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je n’ai pas appris la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je ne connais pas la science des saints.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Qui est monté aux cieux, et qui en est descendu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 38:4
      metadata:
        usfm: JOB.38.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 104:3
      metadata:
        usfm: PSA.104.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 40:12
      metadata:
        usfm: ISA.40.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qui a recueilli le vent dans ses mains?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a serré les eaux dans son vêtement?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a fait paraître les extrémités de la terre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quel est son nom, et quel est le nom de son fils?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le sais-tu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 12:7
      metadata:
        usfm: PSA.12.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:31
      metadata:
        usfm: PSA.18.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:9
      metadata:
        usfm: PSA.19.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 119:140
      metadata:
        usfm: PSA.119.140
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Toute parole de Dieu est éprouvée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est un bouclier pour ceux qui cherchent en lui un refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:2
      metadata:
        usfm: DEU.4.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:32
      metadata:
        usfm: DEU.12.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 22:18
      metadata:
        usfm: REV.22.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: N’ajoute rien à ses paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De peur qu’il ne te reprenne et que tu ne sois trouvé menteur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je te demande deux choses:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne me les refuse pas, avant que je meure!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Éloigne de moi la fausseté et la parole mensongère;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne me donne ni pauvreté, ni richesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Accorde-moi le pain qui m’est nécessaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: De peur que, dans l’abondance, je ne te renie
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et ne dise: Qui est l’Éternel?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou que, dans la pauvreté, je ne dérobe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne m’attaque au nom de mon Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ne calomnie pas un serviteur auprès de son maître,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De peur qu’il ne te maudisse et que tu ne te rendes coupable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il est une race qui maudit son père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui ne bénit point sa mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il est une race qui se croit pure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui n’est pas lavée de sa souillure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il est une race '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 6:17
      metadata:
        usfm: PRO.6.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: dont les yeux sont hautains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les paupières élevées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 12:18
      metadata:
        usfm: PRO.12.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il est une race dont les dents sont des glaives
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les mâchoires des couteaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour dévorer le malheureux sur la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les indigents parmi les hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'La sangsue a deux filles: Donne! Donne!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Trois choses sont insatiables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Quatre ne disent jamais: Assez!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le séjour des morts, la femme stérile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La terre, qui n’est pas rassasiée d’eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et le feu, qui ne dit jamais: Assez!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L’œil qui se moque d’un père
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui dédaigne l’obéissance envers une mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les corbeaux du torrent le perceront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les petits de l’aigle le mangeront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il y a trois choses qui sont au-dessus de ma portée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Même quatre que je ne puis comprendre:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: La trace de l’aigle dans les cieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La trace du serpent sur le rocher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La trace du navire au milieu de la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la trace de l’homme chez la jeune femme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Telle est la voie de la femme adultère:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle mange, et s’essuie la bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Puis elle dit: Je n’ai point fait de mal.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Trois choses font trembler la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et il en est quatre qu’elle ne peut supporter:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Un esclave qui vient à régner,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un insensé qui est rassasié de pain,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Une femme dédaignée qui se marie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et une servante qui hérite de sa maîtresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Il y a sur la terre quatre animaux petits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et cependant des plus sages;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Les fourmis, peuple sans force,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 6:8
      metadata:
        usfm: PRO.6.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Préparent en été leur nourriture;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Les damans, peuple sans puissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Placent leur demeure dans les rochers;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Les sauterelles n’ont point de roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et elles sortent toutes par divisions;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Le lézard saisit avec les mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et se trouve dans les palais des rois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Il y en a trois qui ont une belle allure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et quatre qui ont une belle démarche:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Le lion, le héros des animaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne reculant devant qui que ce soit;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 39:22, etc.
    marker-yv: yv-n
  - type: text
    text: Le cheval tout équipé; ou le bouc;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le roi à qui personne ne résiste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Si l’orgueil te pousse à des actes de folie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et si tu as de mauvaises pensées, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 21:5
      metadata:
        usfm: JOB.21.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mets la main sur la bouche:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Car la pression du lait produit de la crème,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La pression du nez produit du sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la pression de la colère produit des querelles.
