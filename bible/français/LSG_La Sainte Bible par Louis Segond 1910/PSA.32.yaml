document_id: PSA.32,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 2 S 12:13. (Ps 6; 51; 130.) Ro 4:6-8. És 55:6-9.
  - type: text
    content: De David. Cantique.
  - type: note
    content: Ro 4:6, 7.
  - type: text
    content: Heureux celui à qui la transgression est remise,
  - type: text
    content: A qui le péché est pardonné!
  '10':
  - type: text
    content: Beaucoup de douleurs sont la part du méchant,
  - type: text
    content: Mais celui qui se confie en l’Éternel est environné de sa grâce.
  '11':
  - type: text
    content: Justes, réjouissez-vous en l’Éternel et soyez dans l’allégresse!
  - type: text
    content: Poussez des cris de joie, vous tous qui êtes droits de cœur!
  '2':
  - type: text
    content: Heureux l’homme à qui l’Éternel n’impute pas d’iniquité,
  - type: text
    content: Et dans l’esprit duquel il n’y a point de fraude!
  '3':
  - type: text
    content: Tant que je me suis tu, mes os se consumaient,
  - type: text
    content: Je gémissais toute la journée;
  '4':
  - type: text
    content: Car nuit et jour ta main s’appesantissait sur moi,
  - type: text
    content: 'Ma vigueur n’était plus que sécheresse, comme celle de l’été. '
  - type: text
    content: — Pause.
  '5':
  - type: text
    content: Je t’ai fait connaître mon péché, je n’ai pas caché mon iniquité;
  - type: text
    content: 'J’ai dit: '
  - type: note
    content: Pr 28:13. 1 Jn 1:9.
  - type: text
    content: J’avouerai mes transgressions à l’Éternel!
  - type: text
    content: 'Et tu as effacé la peine de mon péché. '
  - type: text
    content: — Pause.
  '6':
  - type: text
    content: Qu’ainsi tout homme pieux te prie au temps convenable!
  - type: text
    content: Si de grandes eaux débordent, elles ne l’atteindront nullement.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps 27:5; 31:21.
  - type: text
    content: Tu es un asile pour moi, tu me garantis de la détresse,
  - type: text
    content: 'Tu m’entoures de chants de délivrance. '
  - type: text
    content: — Pause.
  '8':
  - type: text
    content: Je t’instruirai et te montrerai la voie que tu dois suivre;
  - type: text
    content: Je te conseillerai, j’aurai le regard sur toi.
  '9':
  - type: text
    content: Ne soyez pas comme un cheval ou un mulet sans intelligence;
  - type: note
    content: Pr 26:3. Ja 3:3.
  - type: text
    content: On les bride avec un frein et un mors, dont on les pare,
  - type: text
    content: Afin qu’ils ne s’approchent point de toi.
