document_id: ISA.8,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ruine des royaumes de Syrie et d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-4: cf. (2 R 15:29; 16:9.) És 8:18.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel me dit: Prends une grande table, et écris dessus, d’une manière intelligible: Qu’on se hâte de piller, qu’on se précipite sur le butin. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Formez des projets, et ils seront anéantis;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Donnez des ordres, et ils seront sans effet:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car Dieu est avec nous.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-16: cf. És 7:1-14. (1 Pi 2:6-8. Mt 21:42-44. Ro 9:31-33.)'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi m’a parlé l’Éternel, quand sa main me saisit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et qu’il m’avertit de ne pas marcher dans la voie de ce peuple:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’appelez pas conjuration tout ce que ce peuple appelle conjuration;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne craignez pas ce qu’il craint, et ne soyez pas effrayés.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est l’Éternel des armées que vous devez sanctifier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est lui que vous devez craindre et redouter.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il sera un sanctuaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais aussi '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 28:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 2:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: une pierre d’achoppement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un rocher de scandale pour les deux maisons d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un filet et un piège
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour les habitants de Jérusalem.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plusieurs trébucheront;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils tomberont et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 21:44
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 20:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: se briseront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils seront enlacés et pris.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enveloppe cet oracle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Scelle cette révélation, parmi mes disciples.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-22: cf. (De 18:9-18. Jn 5:45-47.) És 40:8. Lu 10:26.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’espère en l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui cache sa face à la maison de Jacob;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je place en lui ma confiance.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 2:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Voici, moi et les enfants que l’Éternel m’a donnés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous sommes des signes et des présages en Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la part de l’Éternel des armées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui habite sur la montagne de Sion.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Si l’on vous dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Consultez ceux qui évoquent les morts et ceux qui prédisent l’avenir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui poussent des sifflements et des soupirs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Répondez: Un peuple ne consultera-t-il pas son Dieu?'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 18:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: S’adressera-t-il aux morts en faveur des vivants?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je pris avec moi des témoins dignes de foi, le sacrificateur Urie, et Zacharie, fils de Bérékia. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la loi et au témoignage!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si l’on ne parle pas ainsi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y aura point d’aurore pour le peuple.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il sera errant dans le pays, accablé et affamé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et, quand il aura faim, il s’irritera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maudira son roi et son Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tournera les yeux en haut;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 5:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Puis il regardera vers la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et voici, il n’y aura que détresse, obscurité et de sombres angoisses:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il sera repoussé dans d’épaisses ténèbres.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Temps messianique
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: '8 v. 23 à 9 v. 6: cf. Mt 4:12-17. (Mi 5:1-3. Lu 1:31-33; 2:10, 11. Hé 1. Jé 23:5, 6.)'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les ténèbres ne régneront pas toujours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sur la terre où il y a maintenant des angoisses:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si les temps passés ont couvert d’opprobre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pays de Zabulon et le pays de Nephthali,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les temps à venir couvriront de gloire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La contrée voisine de la mer, au-delà du Jourdain,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 4:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le territoire des Gentils.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je m’étais approché de la prophétesse; elle conçut, et elle enfanta un fils. L’Éternel me dit: Donne-lui pour nom Maher-Schalal-Chasch-Baz. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car, avant que l’enfant sache dire: Mon père! Ma mère! On emportera devant le roi d’Assyrie les richesses de Damas et le butin de Samarie.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-10: cf. És 36; 37. Ps 33:10, 11.'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel me parla encore, et me dit:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que ce peuple a méprisé les eaux de Siloé qui coulent doucement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il s’est réjoui au sujet de Retsin et du fils de Remalia,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, le Seigneur va faire monter contre eux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les puissantes et grandes eaux du fleuve
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Le roi d’Assyrie et toute sa gloire);
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’élèvera partout au-dessus de son lit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il se répandra sur toutes ses rives;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il pénétrera dans Juda, il débordera et inondera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il atteindra jusqu’au cou.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le déploiement de ses ailes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remplira l’étendue de ton pays, ô Emmanuel!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Poussez des cris de guerre, peuples! Et vous serez brisés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prêtez l’oreille, vous tous qui habitez au loin!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Préparez-vous au combat, et vous serez brisés;
