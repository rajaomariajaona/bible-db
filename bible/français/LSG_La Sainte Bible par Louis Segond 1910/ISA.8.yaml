document_id: ISA.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ruine des royaumes de Syrie et d’Israël
  - type: heading
    content: 'V. 1-4: cf. (2 R 15:29; 16:9.) És 8:18.'
  - type: text
    content: 'L’Éternel me dit: Prends une grande table, et écris dessus, d’une manière intelligible: Qu’on se hâte de piller, qu’on se précipite sur le butin. '
  '10':
  - type: text
    content: Formez des projets, et ils seront anéantis;
  - type: text
    content: 'Donnez des ordres, et ils seront sans effet:'
  - type: text
    content: Car Dieu est avec nous.
  - type: heading
    content: 'V. 11-16: cf. És 7:1-14. (1 Pi 2:6-8. Mt 21:42-44. Ro 9:31-33.)'
  '11':
  - type: text
    content: Ainsi m’a parlé l’Éternel, quand sa main me saisit,
  - type: text
    content: 'Et qu’il m’avertit de ne pas marcher dans la voie de ce peuple:'
  '12':
  - type: text
    content: N’appelez pas conjuration tout ce que ce peuple appelle conjuration;
  - type: text
    content: Ne craignez pas ce qu’il craint, et ne soyez pas effrayés.
  '13':
  - type: text
    content: C’est l’Éternel des armées que vous devez sanctifier,
  - type: text
    content: C’est lui que vous devez craindre et redouter.
  '14':
  - type: text
    content: Et il sera un sanctuaire,
  - type: text
    content: 'Mais aussi '
  - type: note
    content: És 28:16. Lu 2:34. Ro 9:33. 1 Pi 2:7.
  - type: text
    content: une pierre d’achoppement,
  - type: text
    content: Un rocher de scandale pour les deux maisons d’Israël,
  - type: text
    content: Un filet et un piège
  - type: text
    content: Pour les habitants de Jérusalem.
  '15':
  - type: text
    content: Plusieurs trébucheront;
  - type: text
    content: 'Ils tomberont et '
  - type: note
    content: Mt 21:44. Lu 20:18.
  - type: text
    content: se briseront,
  - type: text
    content: Ils seront enlacés et pris.
  '16':
  - type: text
    content: Enveloppe cet oracle,
  - type: text
    content: Scelle cette révélation, parmi mes disciples.
  - type: heading
    content: 'V. 17-22: cf. (De 18:9-18. Jn 5:45-47.) És 40:8. Lu 10:26.'
  '17':
  - type: text
    content: J’espère en l’Éternel,
  - type: text
    content: Qui cache sa face à la maison de Jacob;
  - type: text
    content: Je place en lui ma confiance.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Hé 2:13.
  - type: text
    content: Voici, moi et les enfants que l’Éternel m’a donnés,
  - type: text
    content: Nous sommes des signes et des présages en Israël,
  - type: text
    content: De la part de l’Éternel des armées,
  - type: text
    content: Qui habite sur la montagne de Sion.
  '19':
  - type: text
    content: 'Si l’on vous dit:'
  - type: text
    content: Consultez ceux qui évoquent les morts et ceux qui prédisent l’avenir,
  - type: text
    content: Qui poussent des sifflements et des soupirs,
  - type: text
    content: 'Répondez: Un peuple ne consultera-t-il pas son Dieu?'
  - type: note
    content: De 18:11.
  - type: text
    content: S’adressera-t-il aux morts en faveur des vivants?
  '2':
  - type: text
    content: 'Je pris avec moi des témoins dignes de foi, le sacrificateur Urie, et Zacharie, fils de Bérékia. '
  '20':
  - type: text
    content: A la loi et au témoignage!
  - type: text
    content: Si l’on ne parle pas ainsi,
  - type: text
    content: Il n’y aura point d’aurore pour le peuple.
  '21':
  - type: text
    content: Il sera errant dans le pays, accablé et affamé;
  - type: text
    content: Et, quand il aura faim, il s’irritera,
  - type: text
    content: Maudira son roi et son Dieu,
  - type: text
    content: Et tournera les yeux en haut;
  '22':
  - type: text
    content: ' '
  - type: note
    content: És 5:30.
  - type: text
    content: Puis il regardera vers la terre,
  - type: text
    content: 'Et voici, il n’y aura que détresse, obscurité et de sombres angoisses:'
  - type: text
    content: Il sera repoussé dans d’épaisses ténèbres.
  - type: heading
    content: Temps messianique
  - type: heading
    content: '8 v. 23 à 9 v. 6: cf. Mt 4:12-17. (Mi 5:1-3. Lu 1:31-33; 2:10, 11. Hé 1. Jé 23:5, 6.)'
  '23':
  - type: text
    content: Mais les ténèbres ne régneront pas toujours
  - type: text
    content: 'Sur la terre où il y a maintenant des angoisses:'
  - type: text
    content: Si les temps passés ont couvert d’opprobre
  - type: text
    content: Le pays de Zabulon et le pays de Nephthali,
  - type: text
    content: Les temps à venir couvriront de gloire
  - type: text
    content: La contrée voisine de la mer, au-delà du Jourdain,
  - type: note
    content: Mt 4:15.
  - type: text
    content: Le territoire des Gentils.
  '3':
  - type: text
    content: 'Je m’étais approché de la prophétesse; elle conçut, et elle enfanta un fils. L’Éternel me dit: Donne-lui pour nom Maher-Schalal-Chasch-Baz. '
  '4':
  - type: text
    content: 'Car, avant que l’enfant sache dire: Mon père! Ma mère! On emportera devant le roi d’Assyrie les richesses de Damas et le butin de Samarie.'
  - type: heading
    content: 'V. 5-10: cf. És 36; 37. Ps 33:10, 11.'
  '5':
  - type: text
    content: 'L’Éternel me parla encore, et me dit:'
  '6':
  - type: text
    content: Parce que ce peuple a méprisé les eaux de Siloé qui coulent doucement
  - type: text
    content: Et qu’il s’est réjoui au sujet de Retsin et du fils de Remalia,
  '7':
  - type: text
    content: Voici, le Seigneur va faire monter contre eux
  - type: text
    content: Les puissantes et grandes eaux du fleuve
  - type: text
    content: (Le roi d’Assyrie et toute sa gloire);
  - type: text
    content: Il s’élèvera partout au-dessus de son lit,
  - type: text
    content: Et il se répandra sur toutes ses rives;
  '8':
  - type: text
    content: Il pénétrera dans Juda, il débordera et inondera,
  - type: text
    content: Il atteindra jusqu’au cou.
  - type: text
    content: Le déploiement de ses ailes
  - type: text
    content: Remplira l’étendue de ton pays, ô Emmanuel!
  '9':
  - type: text
    content: Poussez des cris de guerre, peuples! Et vous serez brisés.
  - type: text
    content: Prêtez l’oreille, vous tous qui habitez au loin!
  - type: text
    content: Préparez-vous au combat, et vous serez brisés;
