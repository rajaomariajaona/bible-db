document_id: 2CH.28,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Achaz, roi de Juda
  - type: heading
    content: 'V. 1-15: cf. 2 R 16:1-6. (És 7 à 10:4. 2 R 6:22, 23. Mt 25:35, 36.)'
  - type: text
    content: 'Achaz '
  - type: note
    content: 2 R 16:2, etc.
  - type: text
    content: 'avait vingt ans lorsqu’il devint roi, et il régna seize ans à Jérusalem. Il ne fit point ce qui est droit aux yeux de l’Éternel, comme avait fait David, son père. '
  '10':
  - type: text
    content: 'Et vous pensez maintenant faire des enfants de Juda et de Jérusalem vos serviteurs et vos servantes! Mais vous, n’êtes-vous pas coupables envers l’Éternel, votre Dieu? '
  '11':
  - type: text
    content: 'Écoutez-moi donc, et renvoyez ces captifs que vous avez faits parmi vos frères; car la colère ardente de l’Éternel est sur vous. '
  '12':
  - type: text
    content: 'Quelques-uns d’entre les chefs des fils d’Éphraïm, Azaria, fils de Jochanan, Bérékia, fils de Meschillémoth, Ézéchias, fils de Schallum, et Amasa, fils de Hadlaï, s’élevèrent contre ceux qui revenaient de l’armée, '
  '13':
  - type: text
    content: 'et leur dirent: Vous ne ferez point entrer ici des captifs; car, pour nous rendre coupables envers l’Éternel, vous voulez ajouter à nos péchés et à nos fautes. Nous sommes déjà bien coupables, et la colère ardente de l’Éternel est sur Israël. '
  '14':
  - type: text
    content: 'Les soldats abandonnèrent les captifs et le butin devant les chefs et devant toute l’assemblée. '
  '15':
  - type: text
    content: Et les hommes dont les noms viennent d’être mentionnés se levèrent et prirent les captifs; ils employèrent le butin à vêtir tous ceux qui étaient nus, ils leur donnèrent des habits et des chaussures, ils les firent manger et boire, ils les oignirent, ils conduisirent sur des ânes tous ceux qui étaient fatigués, et ils les menèrent à Jéricho, la ville des palmiers, auprès de leurs frères. Puis ils retournèrent à Samarie.
  - type: heading
    content: Idolâtrie et désastres
  - type: heading
    content: 'V. 16-27: cf. 2 R 16:7-20. És 1:2, etc.'
  '16':
  - type: text
    content: 'En ce temps-là, le roi Achaz envoya demander du secours aux rois d’Assyrie. '
  '17':
  - type: text
    content: 'Les Édomites vinrent encore, battirent Juda, et emmenèrent des captifs. '
  '18':
  - type: text
    content: 'Les Philistins firent une invasion dans les villes de la plaine et du midi de Juda; ils prirent Beth-Schémesch, Ajalon, Guedéroth, Soco et les villes de son ressort, Thimna et les villes de son ressort Guimzo et les villes de son ressort, et ils s’y établirent. '
  '19':
  - type: text
    content: 'Car l’Éternel humilia Juda, à cause d’Achaz, roi d’Israël, qui avait jeté le désordre dans Juda et commis des péchés contre l’Éternel. '
  '2':
  - type: text
    content: 'Il marcha dans les voies des rois d’Israël; et même il fit des images en fonte pour les Baals, '
  '20':
  - type: text
    content: 'Tilgath-Pilnéser, roi d’Assyrie, vint contre lui, le traita en ennemi, et ne le soutint pas. '
  '21':
  - type: text
    content: 'Car Achaz dépouilla la maison de l’Éternel, la maison du roi et celle des chefs, pour faire des présents au roi d’Assyrie; ce qui ne lui fut d’aucun secours. '
  '22':
  - type: text
    content: 'Pendant qu’il était dans la détresse, il continuait à pécher contre l’Éternel, lui, le roi Achaz. '
  '23':
  - type: text
    content: 'Il sacrifia aux dieux de Damas, qui l’avaient frappé, et il dit: '
  - type: note
    content: Jg 16:23. Ha 1:11.
  - type: text
    content: 'Puisque les dieux des rois de Syrie leur viennent en aide, je leur sacrifierai pour qu’ils me secourent. Mais ils furent l’occasion de sa chute et de celle de tout Israël. '
  '24':
  - type: text
    content: 'Achaz rassembla les ustensiles de la maison de Dieu, et il mit en pièces les ustensiles de la maison de Dieu. Il ferma les portes de la maison de l’Éternel, il se fit des autels à tous les coins de Jérusalem, '
  '25':
  - type: text
    content: 'et il établit des hauts lieux dans chacune des villes de Juda pour offrir des parfums à d’autres dieux. Il irrita ainsi l’Éternel, le Dieu de ses pères. '
  '26':
  - type: text
    content: 'Le reste de ses actions et toutes ses voies, les premières et les dernières, cela est écrit dans le livre des rois de Juda et d’Israël. '
  '27':
  - type: text
    content: Achaz se coucha avec ses pères, et on l’enterra dans la ville de Jérusalem, car on ne le mit point dans les sépulcres des rois d’Israël. Et Ézéchias, son fils, régna à sa place.
  '3':
  - type: text
    content: 'il brûla des parfums dans la vallée des fils de Hinnom, et '
  - type: note
    content: De 18:10. 2 R 21:6. Jé 7:31; 19:5.
  - type: text
    content: 'il fit passer ses fils par le feu, suivant les abominations des nations que l’Éternel avait chassées devant les enfants d’Israël. '
  '4':
  - type: text
    content: 'Il offrait des sacrifices et des parfums sur les hauts lieux, sur les collines et sous tout arbre vert. '
  '5':
  - type: text
    content: 'L’Éternel, son Dieu, '
  - type: note
    content: És 7:1.
  - type: text
    content: 'le livra entre les mains du roi de Syrie; et les Syriens le battirent et lui firent un grand nombre de prisonniers, qu’ils emmenèrent à Damas. Il fut aussi livré entre les mains du roi d’Israël, qui lui fit éprouver une grande défaite. '
  '6':
  - type: text
    content: 'Pékach, fils de Remalia, tua dans un seul jour en Juda cent vingt mille hommes, tous vaillants, parce qu’ils avaient abandonné l’Éternel, le Dieu de leurs pères. '
  '7':
  - type: text
    content: 'Zicri, guerrier d’Éphraïm, tua Maaséja, fils du roi, Azrikam, chef de la maison royale, et Elkana, le second après le roi. '
  '8':
  - type: text
    content: 'Les enfants d’Israël firent parmi leurs frères deux cent mille prisonniers, femmes, fils et filles, et ils leur prirent beaucoup de butin, qu’ils emmenèrent à Samarie. '
  '9':
  - type: text
    content: 'Il y avait là un prophète de l’Éternel, nommé Oded. Il alla au-devant de l’armée qui revenait à Samarie, et il leur dit: C’est dans sa colère contre Juda que l’Éternel, le Dieu de vos pères, les a livrés entre vos mains, et vous les avez tués avec une fureur qui est montée jusqu’aux cieux. '
