document_id: NUM.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-12: cf. (Jg 13:4, 5. 1 S 1:11, 27, 28.) Am 2:11, 12. (Jn 17:16.)'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: text
    content: 'Le huitième jour, il apportera au sacrificateur deux tourterelles ou deux jeunes pigeons, à l’entrée de la tente d’assignation. '
  '11':
  - type: text
    content: 'Le sacrificateur sacrifiera l’un comme victime expiatoire, et l’autre comme holocauste, et il fera pour lui l’expiation de son péché à l’occasion du mort. Le naziréen sanctifiera ainsi sa tête ce jour-là '
  '12':
  - type: text
    content: Il consacrera de nouveau à l’Éternel les jours de son naziréat, et il offrira un agneau d’un an en sacrifice de culpabilité; les jours précédents ne seront point comptés, parce que son naziréat a été souillé.
  - type: heading
    content: 'V. 13-21: cf. Ac 21:23, 24, 26.'
  '13':
  - type: text
    content: 'Voici la loi du naziréen. Le jour où il aura accompli le temps de son naziréat, on le fera venir à l’entrée de la tente d’assignation. '
  '14':
  - type: text
    content: 'Il présentera son offrande à l’Éternel: un agneau d’un an et sans défaut pour l’holocauste, une brebis d’un an et sans défaut pour le sacrifice d’expiation, et un bélier sans défaut pour le sacrifice d’actions de grâces; '
  '15':
  - type: text
    content: 'une corbeille de pains sans levain, de gâteaux de fleur de farine pétris à l’huile, et de galettes sans levain arrosées d’huile, avec l’offrande et la libation ordinaires. '
  '16':
  - type: text
    content: 'Le sacrificateur présentera ces choses devant l’Éternel, et il offrira sa victime expiatoire et son holocauste; '
  '17':
  - type: text
    content: 'il offrira le bélier en sacrifice d’actions de grâces à l’Éternel, outre la corbeille de pains sans levain, avec l’offrande et la libation. '
  '18':
  - type: text
    content: 'Le naziréen rasera, à l’entrée de la tente d’assignation, '
  - type: note
    content: Ac 21:24.
  - type: text
    content: 'sa tête consacrée; il prendra les cheveux de sa tête consacrée, et il les mettra sur le feu qui est sous le sacrifice d’actions de grâces. '
  '19':
  - type: text
    content: 'Le sacrificateur prendra l’épaule cuite du bélier, un gâteau sans levain de la corbeille, et une galette sans levain; et il les posera sur les mains du naziréen, après qu’il aura rasé sa tête consacrée. '
  '2':
  - type: text
    content: 'Parle aux enfants d’Israël, et tu leur diras: Lorsqu’un homme ou une femme se séparera des autres en faisant vœu de naziréat, pour se consacrer à l’Éternel, '
  '20':
  - type: text
    content: 'Le sacrificateur les '
  - type: note
    content: Ex 29:27.
  - type: text
    content: 'agitera de côté et d’autre devant l’Éternel: c’est une chose sainte, qui appartient au sacrificateur, avec la poitrine agitée et l’épaule offerte par élévation. Ensuite, le naziréen pourra boire du vin. '
  '21':
  - type: text
    content: Telle est la loi pour celui qui fait vœu de naziréat; telle est son offrande à l’Éternel pour son naziréat, outre ce que lui permettront ses ressources. Il accomplira ce qui est ordonné pour le vœu qu’il a fait, selon la loi de son naziréat.
  - type: heading
    content: Formule de bénédiction
  - type: heading
    content: 'V. 22-27: cf. 1 Ch 23:13. 2 Co 13:13. Ps 115:15. 1 Pi 3:9.'
  '22':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '23':
  - type: text
    content: 'Parle à Aaron et à ses fils, et dis: Vous bénirez ainsi les enfants d’Israël, vous leur direz: '
  '24':
  - type: text
    content: 'Que l’Éternel te bénisse, et qu’il te garde! '
  '25':
  - type: text
    content: 'Que l’Éternel fasse luire sa face sur toi, et qu’il t’accorde sa grâce! '
  '26':
  - type: text
    content: 'Que l’Éternel tourne sa face vers toi, et qu’il te donne la paix! '
  '27':
  - type: text
    content: C’est ainsi qu’ils mettront mon nom sur les enfants d’Israël, et je les bénirai.
  '3':
  - type: text
    content: 'il s’abstiendra de vin et de boisson enivrante; il ne boira ni vinaigre fait avec du vin, ni vinaigre fait avec une boisson enivrante; il ne boira d’aucune liqueur tirée des raisins, et il ne mangera point de raisins frais ni de raisins secs. '
  '4':
  - type: text
    content: 'Pendant tout le temps de son naziréat, il ne mangera rien de ce qui provient de la vigne, depuis les pépins jusqu’à la peau du raisin. '
  '5':
  - type: text
    content: 'Pendant tout le temps de son naziréat, '
  - type: note
    content: Jg 13:5. 1 S 1:11.
  - type: text
    content: 'le rasoir ne passera point sur sa tête; jusqu’à l’accomplissement des jours pour lesquels il s’est consacré à l’Éternel, il sera saint, il laissera croître librement ses cheveux. '
  '6':
  - type: text
    content: 'Pendant tout le temps qu’il a voué à l’Éternel, il ne s’approchera point d’une personne morte; '
  '7':
  - type: text
    content: 'il ne se souillera point à la mort de son père, de sa mère, de son frère ou de sa sœur, car il porte sur sa tête la consécration de son Dieu. '
  '8':
  - type: text
    content: 'Pendant tout le temps de son naziréat, il sera consacré à l’Éternel. '
  '9':
  - type: text
    content: 'Si quelqu’un meurt subitement près de lui, et que sa tête consacrée devienne ainsi souillée, il se rasera la tête le jour de sa purification, il se la rasera le septième jour. '
