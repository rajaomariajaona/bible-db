document_id: NUM.6
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-12: cf. (Jg 13:4, 5. 1 S 1:11, 27, 28.) Am 2:11, 12. (Jn 17:16.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Parle aux enfants d’Israël, et tu leur diras: Lorsqu’un homme ou une femme se séparera des autres en faisant vœu de naziréat, pour se consacrer à l’Éternel, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'il s’abstiendra de vin et de boisson enivrante; il ne boira ni vinaigre fait avec du vin, ni vinaigre fait avec une boisson enivrante; il ne boira d’aucune liqueur tirée des raisins, et il ne mangera point de raisins frais ni de raisins secs. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pendant tout le temps de son naziréat, il ne mangera rien de ce qui provient de la vigne, depuis les pépins jusqu’à la peau du raisin. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Pendant tout le temps de son naziréat, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 13:5
      metadata:
        usfm: JDG.13.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 1:11
      metadata:
        usfm: 1SA.1.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le rasoir ne passera point sur sa tête; jusqu’à l’accomplissement des jours pour lesquels il s’est consacré à l’Éternel, il sera saint, il laissera croître librement ses cheveux. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Pendant tout le temps qu’il a voué à l’Éternel, il ne s’approchera point d’une personne morte; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'il ne se souillera point à la mort de son père, de sa mère, de son frère ou de sa sœur, car il porte sur sa tête la consécration de son Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Pendant tout le temps de son naziréat, il sera consacré à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Si quelqu’un meurt subitement près de lui, et que sa tête consacrée devienne ainsi souillée, il se rasera la tête le jour de sa purification, il se la rasera le septième jour. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le huitième jour, il apportera au sacrificateur deux tourterelles ou deux jeunes pigeons, à l’entrée de la tente d’assignation. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le sacrificateur sacrifiera l’un comme victime expiatoire, et l’autre comme holocauste, et il fera pour lui l’expiation de son péché à l’occasion du mort. Le naziréen sanctifiera ainsi sa tête ce jour-là '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il consacrera de nouveau à l’Éternel les jours de son naziréat, et il offrira un agneau d’un an en sacrifice de culpabilité; les jours précédents ne seront point comptés, parce que son naziréat a été souillé.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-21: cf. Ac 21:23, 24, 26.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici la loi du naziréen. Le jour où il aura accompli le temps de son naziréat, on le fera venir à l’entrée de la tente d’assignation. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il présentera son offrande à l’Éternel: un agneau d’un an et sans défaut pour l’holocauste, une brebis d’un an et sans défaut pour le sacrifice d’expiation, et un bélier sans défaut pour le sacrifice d’actions de grâces; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'une corbeille de pains sans levain, de gâteaux de fleur de farine pétris à l’huile, et de galettes sans levain arrosées d’huile, avec l’offrande et la libation ordinaires. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le sacrificateur présentera ces choses devant l’Éternel, et il offrira sa victime expiatoire et son holocauste; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'il offrira le bélier en sacrifice d’actions de grâces à l’Éternel, outre la corbeille de pains sans levain, avec l’offrande et la libation. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le naziréen rasera, à l’entrée de la tente d’assignation, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 21:24
      metadata:
        usfm: ACT.21.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sa tête consacrée; il prendra les cheveux de sa tête consacrée, et il les mettra sur le feu qui est sous le sacrifice d’actions de grâces. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le sacrificateur prendra l’épaule cuite du bélier, un gâteau sans levain de la corbeille, et une galette sans levain; et il les posera sur les mains du naziréen, après qu’il aura rasé sa tête consacrée. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le sacrificateur les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 29:27
      metadata:
        usfm: EXO.29.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'agitera de côté et d’autre devant l’Éternel: c’est une chose sainte, qui appartient au sacrificateur, avec la poitrine agitée et l’épaule offerte par élévation. Ensuite, le naziréen pourra boire du vin. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Telle est la loi pour celui qui fait vœu de naziréat; telle est son offrande à l’Éternel pour son naziréat, outre ce que lui permettront ses ressources. Il accomplira ce qui est ordonné pour le vœu qu’il a fait, selon la loi de son naziréat.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Formule de bénédiction
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-27: cf. 1 Ch 23:13. 2 Co 13:13. Ps 115:15. 1 Pi 3:9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Parle à Aaron et à ses fils, et dis: Vous bénirez ainsi les enfants d’Israël, vous leur direz: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Que l’Éternel te bénisse, et qu’il te garde! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Que l’Éternel fasse luire sa face sur toi, et qu’il t’accorde sa grâce! '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Que l’Éternel tourne sa face vers toi, et qu’il te donne la paix! '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: C’est ainsi qu’ils mettront mon nom sur les enfants d’Israël, et je les bénirai.
