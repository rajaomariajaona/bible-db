document_id: 2SA.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La brebis du pauvre et le repentir de David
  - type: heading
    content: 'V. 1-14: cf. Ps 51; 32. Job 34:18, 19.'
  - type: text
    content: 'L’Éternel envoya Nathan vers David. Et Nathan vint à lui, et lui dit: Il y avait dans une ville deux hommes, l’un riche et l’autre pauvre. '
  '10':
  - type: text
    content: 'Maintenant, l’épée ne s’éloignera jamais de ta maison, parce que tu m’as méprisé, et parce que tu as pris la femme d’Urie, le Héthien, pour en faire ta femme. '
  '11':
  - type: text
    content: 'Ainsi parle l’Éternel: Voici, je vais faire sortir de ta maison le malheur contre toi, et je vais prendre sous tes yeux tes propres femmes '
  - type: note
    content: De 28:30. 2 S 16:22.
  - type: text
    content: 'pour les donner à un autre, qui couchera avec elles à la vue de ce soleil. '
  '12':
  - type: text
    content: 'Car tu as agi en secret; et moi, je ferai cela en présence de tout Israël et à la face du soleil. '
  '13':
  - type: text
    content: 'David dit à Nathan: J’ai péché contre l’Éternel! Et Nathan dit à David: L’Éternel pardonne ton péché, tu ne mourras point. '
  '14':
  - type: text
    content: Mais, parce que tu as fait blasphémer les ennemis de l’Éternel, en commettant cette action, le fils qui t’est né mourra.
  - type: heading
    content: 'V. 15-25: cf. De 3:23-27. (Mt 1:6. 1 Ch 22:6-10.)'
  '15':
  - type: text
    content: 'Et Nathan s’en alla dans sa maison. L’Éternel frappa l’enfant que la femme d’Urie avait enfanté à David, et il fut dangereusement malade. '
  '16':
  - type: text
    content: 'David pria Dieu pour l’enfant, et jeûna; et quand il rentra, il passa la nuit couché par terre. '
  '17':
  - type: text
    content: 'Les anciens de sa maison insistèrent auprès de lui pour le faire lever de terre; mais il ne voulut point, et il ne mangea rien avec eux. '
  '18':
  - type: text
    content: 'Le septième jour, l’enfant mourut. Les serviteurs de David craignaient de lui annoncer que l’enfant était mort. Car ils disaient: Voici, lorsque l’enfant vivait encore, nous lui avons parlé, et il ne nous a pas écoutés; comment oserons-nous lui dire: L’enfant est mort? Il s’affligera bien davantage. '
  '19':
  - type: text
    content: 'David aperçut que ses serviteurs parlaient tout bas entre eux, et il comprit que l’enfant était mort. Il dit à ses serviteurs: L’enfant est-il mort? Et ils répondirent: Il est mort. '
  '2':
  - type: text
    content: 'Le riche avait des brebis et des bœufs en très grand nombre. '
  '20':
  - type: text
    content: 'Alors David se leva de terre. Il se lava, s’oignit, et changea de vêtements; puis il alla dans la maison de l’Éternel, et se prosterna. De retour chez lui, il demanda qu’on lui servît à manger, et il mangea. '
  '21':
  - type: text
    content: 'Ses serviteurs lui dirent: Que signifie ce que tu fais? Tandis que l’enfant vivait, tu jeûnais et tu pleurais; et maintenant que l’enfant est mort, tu te lèves et tu manges! '
  '22':
  - type: text
    content: 'Il répondit: Lorsque l’enfant vivait encore, je jeûnais et je pleurais, car je disais: Qui sait si l’Éternel n’aura pas pitié de moi et si l’enfant ne vivra pas? '
  '23':
  - type: text
    content: 'Maintenant qu’il est mort, pourquoi jeûnerais-je? Puis-je le faire revenir? J’irai vers lui, mais il ne reviendra pas vers moi. '
  '24':
  - type: text
    content: 'David consola Bath-Schéba, sa femme, et il alla auprès d’elle et coucha avec elle. '
  - type: note
    content: Mt 1:6.
  - type: text
    content: 'Elle enfanta un fils qu’il '
  - type: note
    content: 1 Ch 22:9.
  - type: text
    content: 'appela Salomon, et qui fut aimé de l’Éternel. '
  '25':
  - type: text
    content: Il le remit entre les mains de Nathan le prophète, et Nathan lui donna le nom de Jedidja, à cause de l’Éternel.
  - type: heading
    content: Prise de Rabba
  - type: heading
    content: 'V. 26-31: cf. 1 Ch 20:1-3. Ps 2:9.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 1 Ch 20:1, etc.
  - type: text
    content: 'Joab, qui assiégeait Rabba des fils d’Ammon, s’empara de la ville royale, '
  '27':
  - type: text
    content: 'et envoya des messagers à David pour lui dire: J’ai attaqué Rabba, et je me suis déjà emparé de la ville des eaux; '
  '28':
  - type: text
    content: 'rassemble maintenant le reste du peuple, campe contre la ville, et prends-la, de peur que je ne la prenne moi-même et que la gloire ne m’en soit attribuée. '
  '29':
  - type: text
    content: 'David rassembla tout le peuple, et marcha sur Rabba; il l’attaqua, et s’en rendit maître. '
  '3':
  - type: text
    content: 'Le pauvre n’avait rien du tout qu’une petite brebis, qu’il avait achetée; il la nourrissait, et elle grandissait chez lui avec ses enfants; elle mangeait de son pain, buvait dans sa coupe, dormait sur son sein, et il la regardait comme sa fille. '
  '30':
  - type: note
    content: 1 Ch 20:2.
  - type: text
    content: 'Il enleva la couronne de dessus la tête de son roi: elle pesait un talent d’or et était garnie de pierres précieuses. On la mit sur la tête de David, qui emporta de la ville un très grand butin. '
  '31':
  - type: note
    content: 1 Ch 20:3.
  - type: text
    content: Il fit sortir les habitants, et il les plaça sous des scies, des herses de fer et des haches de fer, et les fit passer par des fours à briques; il traita de même toutes les villes des fils d’Ammon. David retourna à Jérusalem avec tout le peuple.
  '4':
  - type: text
    content: 'Un voyageur arriva chez l’homme riche. Et le riche n’a pas voulu toucher à ses brebis ou à ses bœufs, pour préparer un repas au voyageur qui était venu chez lui; il a pris la brebis du pauvre, et l’a apprêtée pour l’homme qui était venu chez lui. '
  '5':
  - type: text
    content: 'La colère de David s’enflamma violemment contre cet homme, et il dit à Nathan: L’Éternel est vivant! L’homme qui a fait cela mérite la mort. '
  '6':
  - type: text
    content: 'Et il rendra '
  - type: note
    content: Ex 22:1.
  - type: text
    content: 'quatre brebis, pour avoir commis cette action et pour avoir été sans pitié. '
  '7':
  - type: text
    content: 'Et Nathan dit à David: Tu es cet homme-là! Ainsi parle l’Éternel, le Dieu d’Israël: Je t’ai '
  - type: note
    content: 1 S 16:13.
  - type: text
    content: 'oint pour roi sur Israël, et je t’ai délivré de la main de Saül; '
  '8':
  - type: text
    content: 'je t’ai mis en possession de la maison de ton maître, j’ai placé dans ton sein les femmes de ton maître, et je t’ai donné la maison d’Israël et de Juda. Et si cela eût été peu, j’y aurais encore ajouté. '
  '9':
  - type: text
    content: 'Pourquoi donc as-tu méprisé la parole de l’Éternel, en faisant ce qui est mal à ses yeux? Tu as frappé de l’épée Urie, le Héthien; tu as pris sa femme pour en faire ta femme, et lui, tu l’as tué par l’épée des fils d’Ammon. '
