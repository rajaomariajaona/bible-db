document_id: PSA.69
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 22; 40; 109. (1 Pi 1:10, 11. Lu 24:26.)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. Sur les lis. De David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sauve-moi, ô Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car les eaux menacent ma vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: J’enfonce dans la boue, sans pouvoir me tenir;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis tombé dans un gouffre, et les eaux m’inondent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je m’épuise à crier, mon gosier se dessèche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes yeux se consument, tandis que je regarde vers mon Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils sont plus nombreux que les cheveux de ma tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui me haïssent sans cause;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont puissants, ceux qui veulent me perdre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui sont à tort mes ennemis.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce que je n’ai pas dérobé, il faut que je le restitue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: O Dieu! Tu connais ma folie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mes fautes ne te sont point cachées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Que ceux qui espèrent en toi ne soient pas confus à cause de moi, Seigneur, Éternel des armées!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ceux qui te cherchent ne soient pas dans la honte à cause de moi, Dieu d’Israël!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Car c’est pour toi que je porte l’opprobre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que la honte couvre mon visage;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je suis devenu un étranger pour mes frères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un inconnu pour les fils de ma mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 2:17
      metadata:
        usfm: JHN.2.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 15:3
      metadata:
        usfm: ROM.15.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car le zèle de ta maison me dévore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les outrages de ceux qui t’insultent tombent sur moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je verse des larmes et je jeûne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et c’est ce qui m’attire l’opprobre;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je prends un sac pour vêtement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je suis l’objet de leurs sarcasmes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ceux qui sont assis à la porte parlent de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les buveurs de liqueurs fortes me mettent en chansons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mais je t’adresse ma prière, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ce soit le temps favorable, ô Dieu, par ta grande bonté!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Réponds-moi, en m’assurant ton secours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Retire-moi de la boue, et que je n’enfonce plus!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je sois délivré de mes ennemis et du gouffre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Que les flots ne m’inondent plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l’abîme ne m’engloutisse pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que la fosse ne se ferme pas sur moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Exauce-moi, Éternel! Car ta bonté est immense.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans tes grandes compassions, tourne vers moi les regards,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Et ne cache pas ta face à ton serviteur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisque je suis dans la détresse, hâte-toi de m’exaucer!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Approche-toi de mon âme, délivre-la!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sauve-moi, à cause de mes ennemis!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu connais mon opprobre, ma honte, mon ignominie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous mes adversaires sont devant toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: L’opprobre me brise le cœur, et je suis malade;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’attends de la pitié, mais en vain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des consolateurs, et je n’en trouve aucun.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 27:34
      metadata:
        usfm: MAT.27.34
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '48'
      metadata:
        usfm: MAT.27.48
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:23
      metadata:
        usfm: MRK.15.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 19:28
      metadata:
        usfm: JHN.19.28
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '29'
      metadata:
        usfm: JHN.19.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils mettent du fiel dans ma nourriture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et, pour apaiser ma soif, ils m’abreuvent de vinaigre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:9
      metadata:
        usfm: ROM.11.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Que leur table soit pour eux un piège,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et un filet au sein de leur sécurité!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 6:9
      metadata:
        usfm: ISA.6.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:10
      metadata:
        usfm: ISA.29.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 44:18
      metadata:
        usfm: ISA.44.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:10
      metadata:
        usfm: ROM.11.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Que leurs yeux s’obscurcissent et ne voient plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et fais continuellement chanceler leurs reins!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Répands sur eux ta colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que ton ardente fureur les atteigne!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:20
      metadata:
        usfm: ACT.1.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Que leur demeure soit dévastée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il n’y ait plus d’habitants dans leurs tentes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Car ils persécutent celui que tu frappes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils racontent les souffrances de ceux que tu blesses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ajoute des iniquités à leurs iniquités,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’ils n’aient point part à ta miséricorde!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Qu’ils soient effacés du livre de vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’ils ne soient point inscrits avec les justes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Moi, je suis malheureux et souffrant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Dieu, que ton secours me relève!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Je célébrerai le nom de Dieu par des cantiques,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je l’exalterai par des louanges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Cela est agréable à l’Éternel, plus qu’un taureau
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec des cornes et des sabots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Les malheureux le voient et se réjouissent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous qui cherchez Dieu, que votre cœur vive!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Car l’Éternel écoute les pauvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il ne méprise point ses captifs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Que les cieux et la terre le célèbrent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les mers et tout ce qui s’y meut!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Car Dieu sauvera Sion, et bâtira les villes de Juda;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On s’y établira, et l’on en prendra possession;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: La postérité de ses serviteurs en fera son héritage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ceux qui aiment son nom y auront leur demeure.
