document_id: PSA.69,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 22; 40; 109. (1 Pi 1:10, 11. Lu 24:26.)
  - type: text
    content: Au chef des chantres. Sur les lis. De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Jn 2:17. Ro 15:3.
  - type: text
    content: Car le zèle de ta maison me dévore,
  - type: text
    content: Et les outrages de ceux qui t’insultent tombent sur moi.
  '11':
  - type: text
    content: Je verse des larmes et je jeûne,
  - type: text
    content: Et c’est ce qui m’attire l’opprobre;
  '12':
  - type: text
    content: Je prends un sac pour vêtement,
  - type: text
    content: Et je suis l’objet de leurs sarcasmes.
  '13':
  - type: text
    content: Ceux qui sont assis à la porte parlent de moi,
  - type: text
    content: Et les buveurs de liqueurs fortes me mettent en chansons.
  '14':
  - type: text
    content: Mais je t’adresse ma prière, ô Éternel!
  - type: text
    content: Que ce soit le temps favorable, ô Dieu, par ta grande bonté!
  - type: text
    content: Réponds-moi, en m’assurant ton secours!
  '15':
  - type: text
    content: Retire-moi de la boue, et que je n’enfonce plus!
  - type: text
    content: Que je sois délivré de mes ennemis et du gouffre!
  '16':
  - type: text
    content: Que les flots ne m’inondent plus,
  - type: text
    content: Que l’abîme ne m’engloutisse pas,
  - type: text
    content: Et que la fosse ne se ferme pas sur moi!
  '17':
  - type: text
    content: Exauce-moi, Éternel! Car ta bonté est immense.
  - type: text
    content: Dans tes grandes compassions, tourne vers moi les regards,
  '18':
  - type: text
    content: Et ne cache pas ta face à ton serviteur!
  - type: text
    content: Puisque je suis dans la détresse, hâte-toi de m’exaucer!
  '19':
  - type: text
    content: Approche-toi de mon âme, délivre-la!
  - type: text
    content: Sauve-moi, à cause de mes ennemis!
  '2':
  - type: text
    content: Sauve-moi, ô Dieu!
  - type: text
    content: Car les eaux menacent ma vie.
  '20':
  - type: text
    content: Tu connais mon opprobre, ma honte, mon ignominie;
  - type: text
    content: Tous mes adversaires sont devant toi.
  '21':
  - type: text
    content: L’opprobre me brise le cœur, et je suis malade;
  - type: text
    content: J’attends de la pitié, mais en vain,
  - type: text
    content: Des consolateurs, et je n’en trouve aucun.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Mt 27:34, 48. Mc 15:23. Jn 19:28, 29.
  - type: text
    content: Ils mettent du fiel dans ma nourriture,
  - type: text
    content: Et, pour apaiser ma soif, ils m’abreuvent de vinaigre.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Ro 11:9.
  - type: text
    content: Que leur table soit pour eux un piège,
  - type: text
    content: Et un filet au sein de leur sécurité!
  '24':
  - type: text
    content: ' '
  - type: note
    content: És 6:9; 29:10; 44:18. Ro 11:10.
  - type: text
    content: Que leurs yeux s’obscurcissent et ne voient plus,
  - type: text
    content: Et fais continuellement chanceler leurs reins!
  '25':
  - type: text
    content: Répands sur eux ta colère,
  - type: text
    content: Et que ton ardente fureur les atteigne!
  '26':
  - type: text
    content: ' '
  - type: note
    content: Ac 1:20.
  - type: text
    content: Que leur demeure soit dévastée,
  - type: text
    content: Qu’il n’y ait plus d’habitants dans leurs tentes!
  '27':
  - type: text
    content: Car ils persécutent celui que tu frappes,
  - type: text
    content: Ils racontent les souffrances de ceux que tu blesses.
  '28':
  - type: text
    content: Ajoute des iniquités à leurs iniquités,
  - type: text
    content: Et qu’ils n’aient point part à ta miséricorde!
  '29':
  - type: text
    content: Qu’ils soient effacés du livre de vie,
  - type: text
    content: Et qu’ils ne soient point inscrits avec les justes!
  '3':
  - type: text
    content: J’enfonce dans la boue, sans pouvoir me tenir;
  - type: text
    content: Je suis tombé dans un gouffre, et les eaux m’inondent.
  '30':
  - type: text
    content: 'Moi, je suis malheureux et souffrant:'
  - type: text
    content: O Dieu, que ton secours me relève!
  '31':
  - type: text
    content: Je célébrerai le nom de Dieu par des cantiques,
  - type: text
    content: Je l’exalterai par des louanges.
  '32':
  - type: text
    content: Cela est agréable à l’Éternel, plus qu’un taureau
  - type: text
    content: Avec des cornes et des sabots.
  '33':
  - type: text
    content: Les malheureux le voient et se réjouissent;
  - type: text
    content: Vous qui cherchez Dieu, que votre cœur vive!
  '34':
  - type: text
    content: Car l’Éternel écoute les pauvres,
  - type: text
    content: Et il ne méprise point ses captifs.
  '35':
  - type: text
    content: Que les cieux et la terre le célèbrent,
  - type: text
    content: Les mers et tout ce qui s’y meut!
  '36':
  - type: text
    content: Car Dieu sauvera Sion, et bâtira les villes de Juda;
  - type: text
    content: On s’y établira, et l’on en prendra possession;
  '37':
  - type: text
    content: La postérité de ses serviteurs en fera son héritage,
  - type: text
    content: Et ceux qui aiment son nom y auront leur demeure.
  '4':
  - type: text
    content: Je m’épuise à crier, mon gosier se dessèche,
  - type: text
    content: Mes yeux se consument, tandis que je regarde vers mon Dieu.
  '5':
  - type: text
    content: Ils sont plus nombreux que les cheveux de ma tête,
  - type: text
    content: Ceux qui me haïssent sans cause;
  - type: text
    content: Ils sont puissants, ceux qui veulent me perdre,
  - type: text
    content: Qui sont à tort mes ennemis.
  - type: text
    content: Ce que je n’ai pas dérobé, il faut que je le restitue.
  '6':
  - type: text
    content: O Dieu! Tu connais ma folie,
  - type: text
    content: Et mes fautes ne te sont point cachées.
  '7':
  - type: text
    content: Que ceux qui espèrent en toi ne soient pas confus à cause de moi, Seigneur, Éternel des armées!
  - type: text
    content: Que ceux qui te cherchent ne soient pas dans la honte à cause de moi, Dieu d’Israël!
  '8':
  - type: text
    content: Car c’est pour toi que je porte l’opprobre,
  - type: text
    content: Que la honte couvre mon visage;
  '9':
  - type: text
    content: Je suis devenu un étranger pour mes frères,
  - type: text
    content: Un inconnu pour les fils de ma mère.
