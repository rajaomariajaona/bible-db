document_id: ECC.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-10: cf. (Ec 8:16, 17; 2:14-16.) (Job 14. Ec 5:17-19.)'
  - type: text
    content: 'Oui, j’ai appliqué mon cœur à tout cela, j’ai fait de tout cela l’objet de mon examen, et j’ai vu que les justes et les sages, et leurs travaux, sont dans la main de Dieu, et l’amour aussi bien que la haine; les hommes ne savent rien: tout est devant eux. '
  '10':
  - type: text
    content: Tout ce que ta main trouve à faire avec ta force, fais-le; car il n’y a ni œuvre, ni pensée, ni science, ni sagesse, dans le séjour des morts, où tu vas.
  - type: heading
    content: 'V. 11-18: cf. (Pr 21:30, 31. Job 12:13-25.) 2 S 20:15-22.'
  '11':
  - type: text
    content: 'J’ai encore vu sous le soleil que la course n’est point aux agiles ni la guerre aux vaillants, ni le pain aux sages, ni la richesse aux intelligents, ni la faveur aux savants; car tout dépend pour eux du temps et des circonstances. '
  '12':
  - type: text
    content: 'L’homme ne connaît pas non plus son heure, pareil aux poissons qui sont pris au filet fatal, et aux oiseaux qui sont pris au piège; comme eux, les fils de l’homme sont enlacés au temps du malheur, lorsqu’il tombe sur eux tout à coup. '
  '13':
  - type: text
    content: 'J’ai aussi vu sous le soleil ce trait d’une sagesse qui m’a paru grande. '
  '14':
  - type: text
    content: 'Il y avait une petite ville, avec peu d’hommes dans son sein; un roi puissant marcha sur elle, l’investit, et éleva contre elle de grands forts. '
  '15':
  - type: text
    content: 'Il s’y trouvait un homme pauvre et sage, qui sauva la ville par sa sagesse. Et personne ne s’est souvenu de cet homme pauvre. '
  '16':
  - type: text
    content: 'Et j’ai dit: '
  - type: note
    content: Pr 21:22; 24:5. Ec 7:19.
  - type: text
    content: 'La sagesse vaut mieux que la force. Cependant la sagesse du pauvre est méprisée, et ses paroles ne sont pas écoutées. '
  '17':
  - type: text
    content: 'Les paroles des sages tranquillement écoutées valent mieux que les cris de celui qui domine parmi les insensés. '
  '18':
  - type: text
    content: La sagesse vaut mieux que les instruments de guerre; mais un seul pécheur détruit beaucoup de bien.
  '2':
  - type: text
    content: 'Tout arrive également à tous; '
  - type: note
    content: Ps 73:12, 13.
  - type: text
    content: 'même sort pour le juste et pour le méchant, pour celui qui est bon et pur et pour celui qui est impur, pour celui qui sacrifie et pour celui qui ne sacrifie pas; il en est du bon comme du pécheur, de celui qui jure comme de celui qui craint de jurer. '
  '3':
  - type: text
    content: 'Ceci est un mal parmi tout ce qui se fait sous le soleil, c’est qu’il y a pour tous un même sort; aussi le cœur des fils de l’homme est-il plein de méchanceté, et la folie est dans leur cœur pendant leur vie; après quoi, ils vont chez les morts. Car, qui est excepté? '
  '4':
  - type: text
    content: 'Pour tous ceux qui vivent il y a de l’espérance; et même un chien vivant vaut mieux qu’un lion mort. '
  '5':
  - type: text
    content: 'Les vivants, en effet, savent qu’ils mourront; mais les morts ne savent rien, et il n’y a pour eux plus de salaire, puisque leur mémoire est oubliée. '
  '6':
  - type: text
    content: 'Et leur amour, et leur haine, et leur envie, ont déjà péri; et ils n’auront plus jamais aucune part à tout ce qui se fait sous le soleil. '
  '7':
  - type: text
    content: 'Va, mange avec joie ton pain, et bois gaiement ton vin; car dès longtemps Dieu prend plaisir à ce que tu fais. '
  '8':
  - type: text
    content: 'Qu’en tout temps tes vêtements soient blancs, et que l’huile ne manque point sur ta tête. '
  '9':
  - type: text
    content: 'Jouis de la vie avec la femme que tu aimes, pendant tous les jours de ta vie de vanité, que Dieu t’a donnés sous le soleil, pendant tous les jours de ta vanité; car c’est ta part dans la vie, au milieu de ton travail que tu fais sous le soleil. '
