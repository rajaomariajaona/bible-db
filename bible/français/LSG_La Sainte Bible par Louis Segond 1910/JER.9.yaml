      metadata:
        usfm: JER.5.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: adultères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est une troupe de perfides.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils ont la langue tendue comme un arc et lancent le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 59:4
      metadata:
