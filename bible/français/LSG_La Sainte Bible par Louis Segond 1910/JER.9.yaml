document_id: JER.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Plainte du prophète
  - type: heading
    content: 'V. 1-9: cf. Jé 8:21, 22; 5:1-9. Mi 7:1-6. Os 4:1-3.'
  - type: text
    content: 'Oh! '
  - type: note
    content: És 22:4. Jé 4:19.
  - type: text
    content: si ma tête était remplie d’eau,
  - type: text
    content: Si mes yeux étaient une source de larmes,
  - type: text
    content: Je pleurerais jour et nuit
  - type: text
    content: Les morts de la fille de mon peuple!
  '10':
  - type: text
    content: Sur les montagnes je veux pleurer et gémir,
  - type: text
    content: Sur les plaines du désert je prononce une complainte;
  - type: text
    content: Car elles sont brûlées, personne n’y passe,
  - type: text
    content: On n’y entend plus la voix des troupeaux;
  - type: text
    content: Les oiseaux du ciel et les bêtes ont pris la fuite, ont disparu.
  '11':
  - type: text
    content: 'Je ferai de Jérusalem un monceau de ruines, un repaire de '
  - type: note
    content: Jé 10:22.
  - type: text
    content: chacals,
  - type: text
    content: Et je réduirai les villes de Juda en un désert sans habitants.
  '12':
  - type: text
    content: Où est l’homme sage qui comprenne ces choses?
  - type: text
    content: Qu’il le dise, celui à qui la bouche de l’Éternel a parlé!
  - type: text
    content: Pourquoi le pays est-il détruit,
  - type: text
    content: Brûlé comme un désert où personne ne passe?
  '13':
  - type: text
    content: 'L’Éternel dit: C’est parce qu’ils ont abandonné ma loi,'
  - type: text
    content: Que j’avais mise devant eux;
  - type: text
    content: Parce qu’ils n’ont point écouté ma voix,
  - type: text
    content: Et qu’ils ne l’ont point suivie;
  '14':
  - type: text
    content: Parce qu’ils ont suivi les penchants de leur cœur,
  - type: text
    content: Et qu’ils sont allés après les Baals,
  - type: text
    content: Comme leurs pères le leur ont appris.
  '15':
  - type: text
    content: 'C’est pourquoi ainsi parle l’Éternel des armées, le Dieu d’Israël:'
  - type: text
    content: 'Voici, je vais nourrir ce peuple '
  - type: note
    content: Jé 23:15.
  - type: text
    content: d’absinthe,
  - type: text
    content: 'Et je lui ferai boire '
  - type: note
    content: Jé 8:14.
  - type: text
    content: des eaux empoisonnées.
  '16':
  - type: text
    content: 'Je les '
  - type: note
    content: Lé 26:33.
  - type: text
    content: disperserai parmi des nations
  - type: text
    content: Que n’ont connues ni eux ni leurs pères,
  - type: text
    content: Et j’enverrai derrière eux l’épée,
  - type: text
    content: Jusqu’à ce que je les aie exterminés.
  - type: heading
    content: 'V. 17-22: cf. La 1; 2.'
  '17':
  - type: text
    content: 'Ainsi parle l’Éternel des armées:'
  - type: text
    content: Cherchez, appelez les pleureuses, et qu’elles viennent!
  - type: text
    content: Envoyez vers les femmes habiles, et qu’elles viennent!
  '18':
  - type: text
    content: Qu’elles se hâtent de dire sur nous une complainte!
  - type: text
    content: Et que les larmes tombent de nos yeux,
  - type: text
    content: Que l’eau coule de nos paupières!
  '19':
  - type: text
    content: 'Car des cris lamentables se font entendre de Sion:'
  - type: text
    content: Eh quoi! Nous sommes détruits!
  - type: text
    content: Nous sommes couverts de honte!
  - type: text
    content: Il nous faut abandonner le pays!
  - type: text
    content: On a renversé nos demeures!
  '2':
  - type: text
    content: Oh! Si j’avais au désert une cabane de voyageurs,
  - type: text
    content: J’abandonnerais mon peuple, je m’en éloignerais!
  - type: text
    content: 'Car ce sont tous des '
  - type: note
    content: Jé 5:7, 8.
  - type: text
    content: adultères,
  - type: text
    content: C’est une troupe de perfides.
  '20':
  - type: text
    content: Femmes, écoutez la parole de l’Éternel,
  - type: text
    content: Et que votre oreille saisisse ce que dit sa bouche!
  - type: text
    content: Apprenez à vos filles des chants lugubres,
  - type: text
    content: Enseignez-vous des complaintes les unes aux autres!
  '21':
  - type: text
    content: Car la mort est montée par nos fenêtres,
  - type: text
    content: Elle a pénétré dans nos palais;
  - type: text
    content: Elle extermine les enfants dans la rue,
  - type: text
    content: Les jeunes gens sur les places.
  '22':
  - type: text
    content: 'Dis: Ainsi parle l’Éternel:'
  - type: note
    content: Jé 7:33.
  - type: text
    content: Les cadavres des hommes tomberont
  - type: text
    content: Comme du fumier sur les champs,
  - type: text
    content: Comme tombe derrière le moissonneur une gerbe
  - type: text
    content: Que personne ne ramasse.
  - type: heading
    content: 'V. 23-26: cf. 1 Co 1:25-31. 2 Co 10:17. Jé 4:4.'
  '23':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: note
    content: 1 Co 1:31. 2 Co 10:17.
  - type: text
    content: Que le sage ne se glorifie pas de sa sagesse,
  - type: text
    content: Que le fort ne se glorifie pas de sa force,
  - type: text
    content: Que le riche ne se glorifie pas de sa richesse.
  '24':
  - type: text
    content: Mais que celui qui veut se glorifier se glorifie
  - type: text
    content: D’avoir de l’intelligence et de me connaître,
  - type: text
    content: De savoir que je suis l’Éternel,
  - type: text
    content: Qui exerce la bonté, le droit et la justice sur la terre;
  - type: text
    content: Car c’est à cela que je prends plaisir, dit l’Éternel.
  '25':
  - type: text
    content: Voici, les jours viennent, dit l’Éternel,
  - type: text
    content: Où je châtierai tous les circoncis qui ne le sont pas de cœur,
  '26':
  - type: text
    content: L’Égypte, Juda, Édom, les enfants d’Ammon, Moab,
  - type: text
    content: Tous ceux qui se rasent les coins de la barbe,
  - type: text
    content: Ceux qui habitent dans le désert;
  - type: text
    content: Car toutes les nations sont incirconcises,
  - type: text
    content: 'Et toute la maison d’Israël a '
  - type: note
    content: Lé 26:41. Ro 2:28, 29.
  - type: text
    content: le cœur incirconcis.
  '3':
  - type: text
    content: 'Ils ont la langue tendue comme un arc et lancent le '
  - type: note
    content: És 59:4, 13, 15.
  - type: text
    content: mensonge;
  - type: text
    content: Ce n’est pas par la vérité qu’ils sont puissants dans le pays;
  - type: text
    content: 'Car ils vont de '
  - type: note
    content: Jé 6:7.
  - type: text
    content: méchanceté en méchanceté,
  - type: text
    content: Et ils ne me connaissent pas, dit l’Éternel.
  '4':
  - type: text
    content: Que chacun se tienne en garde contre son ami,
  - type: text
    content: Et qu’on ne se fie à aucun de ses frères;
  - type: text
    content: Car tout frère cherche à tromper,
  - type: text
    content: 'Et tout ami '
  - type: note
    content: Jé 6:28.
  - type: text
    content: répand des calomnies.
  '5':
  - type: text
    content: Ils se jouent les uns des autres,
  - type: text
    content: Et ne disent point la vérité;
  - type: text
    content: Ils exercent leur langue à mentir,
  - type: text
    content: Ils s’étudient à faire le mal.
  '6':
  - type: text
    content: Ta demeure est au sein de la fausseté;
  - type: text
    content: C’est par fausseté qu’ils refusent de me connaître,
  - type: text
    content: Dit l’Éternel.
  - type: heading
    content: Menaces de l’Éternel
  '7':
  - type: text
    content: 'C’est pourquoi ainsi parle l’Éternel des armées:'
  - type: text
    content: Voici je les sonderai, je les éprouverai.
  - type: text
    content: Car comment agir à l’égard de la fille de mon peuple?
  '8':
  - type: text
    content: 'Leur '
  - type: note
    content: Ps 120:4. Pr 30:14.
  - type: text
    content: langue est un trait meurtrier,
  - type: text
    content: Ils ne disent que des mensonges;
  - type: text
    content: 'De la '
  - type: note
    content: Ps 12:3; 28:3.
  - type: text
    content: bouche ils parlent de paix à leur prochain,
  - type: text
    content: Et au fond du cœur ils lui dressent des pièges.
  '9':
  - type: text
    content: ' '
  - type: note
    content: És 5:9, 29.
  - type: text
    content: Ne les châtierais-je pas pour ces choses-là, dit l’Éternel,
  - type: text
    content: Ne me vengerais-je pas d’une pareille nation?
  - type: heading
    content: 'V. 10-16: cf. (Jé 16:10-13. De 29:24-28.)'
