    marker-yv: yv-n
  - type: text
    text: si ma tête était remplie d’eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si mes yeux étaient une source de larmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je pleurerais jour et nuit
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les morts de la fille de mon peuple!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Oh! Si j’avais au désert une cabane de voyageurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’abandonnerais mon peuple, je m’en éloignerais!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car ce sont tous des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
