document_id: JER.9,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Plainte du prophète
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. Jé 8:21, 22; 5:1-9. Mi 7:1-6. Os 4:1-3.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oh! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 22:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 4:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: si ma tête était remplie d’eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si mes yeux étaient une source de larmes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je pleurerais jour et nuit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les morts de la fille de mon peuple!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur les montagnes je veux pleurer et gémir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur les plaines du désert je prononce une complainte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car elles sont brûlées, personne n’y passe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On n’y entend plus la voix des troupeaux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les oiseaux du ciel et les bêtes ont pris la fuite, ont disparu.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je ferai de Jérusalem un monceau de ruines, un repaire de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 10:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: chacals,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je réduirai les villes de Juda en un désert sans habitants.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où est l’homme sage qui comprenne ces choses?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il le dise, celui à qui la bouche de l’Éternel a parlé!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi le pays est-il détruit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Brûlé comme un désert où personne ne passe?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L’Éternel dit: C’est parce qu’ils ont abandonné ma loi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que j’avais mise devant eux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils n’ont point écouté ma voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’ils ne l’ont point suivie;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils ont suivi les penchants de leur cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’ils sont allés après les Baals,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme leurs pères le leur ont appris.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est pourquoi ainsi parle l’Éternel des armées, le Dieu d’Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici, je vais nourrir ce peuple '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 23:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: d’absinthe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et je lui ferai boire '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 8:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: des eaux empoisonnées.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 26:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: disperserai parmi des nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que n’ont connues ni eux ni leurs pères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’enverrai derrière eux l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ce que je les aie exterminés.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-22: cf. La 1; 2.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel des armées:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cherchez, appelez les pleureuses, et qu’elles viennent!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Envoyez vers les femmes habiles, et qu’elles viennent!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’elles se hâtent de dire sur nous une complainte!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que les larmes tombent de nos yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l’eau coule de nos paupières!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car des cris lamentables se font entendre de Sion:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eh quoi! Nous sommes détruits!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous sommes couverts de honte!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il nous faut abandonner le pays!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On a renversé nos demeures!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh! Si j’avais au désert une cabane de voyageurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’abandonnerais mon peuple, je m’en éloignerais!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car ce sont tous des '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 5:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: adultères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est une troupe de perfides.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Femmes, écoutez la parole de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que votre oreille saisisse ce que dit sa bouche!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Apprenez à vos filles des chants lugubres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enseignez-vous des complaintes les unes aux autres!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la mort est montée par nos fenêtres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle a pénétré dans nos palais;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle extermine les enfants dans la rue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les jeunes gens sur les places.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dis: Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 7:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les cadavres des hommes tomberont
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme du fumier sur les champs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme tombe derrière le moissonneur une gerbe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que personne ne ramasse.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 23-26: cf. 1 Co 1:25-31. 2 Co 10:17. Jé 4:4.'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 1:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 10:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que le sage ne se glorifie pas de sa sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le fort ne se glorifie pas de sa force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le riche ne se glorifie pas de sa richesse.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais que celui qui veut se glorifier se glorifie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D’avoir de l’intelligence et de me connaître,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De savoir que je suis l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui exerce la bonté, le droit et la justice sur la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est à cela que je prends plaisir, dit l’Éternel.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, les jours viennent, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où je châtierai tous les circoncis qui ne le sont pas de cœur,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Égypte, Juda, Édom, les enfants d’Ammon, Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui se rasent les coins de la barbe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui habitent dans le désert;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car toutes les nations sont incirconcises,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et toute la maison d’Israël a '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 26:41
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 2:28
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: le cœur incirconcis.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils ont la langue tendue comme un arc et lancent le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 59:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: mensonge;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n’est pas par la vérité qu’ils sont puissants dans le pays;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car ils vont de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 6:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: méchanceté en méchanceté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils ne me connaissent pas, dit l’Éternel.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que chacun se tienne en garde contre son ami,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’on ne se fie à aucun de ses frères;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tout frère cherche à tromper,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et tout ami '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 6:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: répand des calomnies.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se jouent les uns des autres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne disent point la vérité;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils exercent leur langue à mentir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils s’étudient à faire le mal.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta demeure est au sein de la fausseté;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est par fausseté qu’ils refusent de me connaître,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Menaces de l’Éternel
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est pourquoi ainsi parle l’Éternel des armées:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici je les sonderai, je les éprouverai.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car comment agir à l’égard de la fille de mon peuple?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Leur '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 120:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 30:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: langue est un trait meurtrier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne disent que des mensonges;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'De la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 12:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: bouche ils parlent de paix à leur prochain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et au fond du cœur ils lui dressent des pièges.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 5:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne les châtierais-je pas pour ces choses-là, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne me vengerais-je pas d’une pareille nation?
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-16: cf. (Jé 16:10-13. De 29:24-28.)'
    marker-yv: yv-h
