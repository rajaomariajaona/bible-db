document_id: 1KI.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Élie devant Achab. Les prophètes de Baal
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-15: cf. (Jé 38:7-13; 39:15-18.) Ps 112:1, 5-9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Bien des jours s’écoulèrent, et la parole de l’Éternel fut ainsi adressée à Élie, dans la troisième année: Va, présente-toi devant Achab, et je ferai tomber de la pluie sur la face du sol. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et Élie alla, pour se présenter devant Achab. La famine était grande à Samarie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et Achab fit appeler Abdias, chef de sa maison. Or Abdias craignait beaucoup l’Éternel; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et lorsque Jézabel extermina les prophètes de l’Éternel, Abdias prit cent prophètes qu’il cacha cinquante par cinquante dans une caverne, et il les avait nourris de pain et d’eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Achab dit à Abdias: Va par le pays vers toutes les sources d’eau et vers tous les torrents; peut-être se trouvera-t-il de l’herbe, et nous conserverons la vie aux chevaux et aux mulets, et nous n’aurons pas besoin d’abattre du bétail. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils se partagèrent le pays pour le parcourir; Achab alla seul par un chemin, et Abdias alla seul par un autre chemin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Comme Abdias était en route, voici, Élie le rencontra. Abdias, l’ayant reconnu, tomba sur son visage, et dit: Est-ce toi, mon seigneur Élie? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il lui répondit: C’est moi; va, dis à ton maître: Voici Élie! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et Abdias dit: Quel péché ai-je commis, pour que tu livres ton serviteur entre les mains d’Achab, qui me fera mourir? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L’Éternel est vivant! Il n’est ni nation ni royaume où mon maître n’ait envoyé pour te chercher; et quand on disait que tu n’y étais pas, il faisait jurer le royaume et la nation que l’on ne t’avait pas trouvé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et maintenant tu dis: Va, dis à ton maître: Voici Élie! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Puis, lorsque je t’aurai quitté l’esprit de l’Éternel te transportera je ne sais où; et j’irai informer Achab, qui ne te trouvera pas, et qui me tuera. Cependant ton serviteur craint l’Éternel dès sa jeunesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'N’a-t-on pas dit à mon seigneur ce que j’ai fait quand Jézabel tua les prophètes de l’Éternel? J’ai caché cent prophètes de l’Éternel, cinquante par cinquante dans une caverne, et je les ai nourris de pain et d’eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et maintenant tu dis: Va, dis à ton maître: Voici Élie! Il me tuera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais Élie dit: L’Éternel des armées, dont je suis le serviteur, est vivant! Aujourd’hui je me présenterai devant Achab.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-40: cf. 2 Ch 28:19. (Mt 6:24. Jos 24:15. Jé 10:1-16. 2 Ch 7:1-3.) Ps 97:7. De 13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Abdias, étant allé à la rencontre d’Achab, l’informa de la chose. Et Achab se rendit au-devant d’Élie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'A peine Achab aperçut-il Élie qu’il lui dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 7:10
      metadata:
        usfm: AMO.7.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Est-ce toi, qui jettes le trouble en Israël? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Élie répondit: Je ne trouble point Israël; c’est toi, au contraire, et la maison de ton père, puisque vous avez abandonné les commandements de l’Éternel et que tu es allé après les Baals. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fais maintenant rassembler tout Israël auprès de moi, à la montagne du Carmel, et aussi les quatre cent cinquante prophètes de Baal et les quatre cents prophètes d’Astarté qui mangent à la table de Jézabel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Achab envoya des messagers vers tous les enfants d’Israël, et il rassembla les prophètes à la montagne du Carmel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors Élie s’approcha de tout le peuple, et dit: Jusqu’à quand clocherez-vous des deux côtés? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 24:15
      metadata:
        usfm: JOS.24.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si l’Éternel est Dieu, allez après lui; si c’est Baal, allez après lui! Le peuple ne lui répondit rien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Et Élie dit au peuple: Je suis resté seul des prophètes de l’Éternel, et il y a quatre cent cinquante prophètes de Baal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Que l’on nous donne deux taureaux; qu’ils choisissent pour eux l’un des taureaux, qu’ils le coupent par morceaux, et qu’ils le placent sur le bois, sans y mettre le feu; et moi, je préparerai l’autre taureau, et je le placerai sur le bois, sans y mettre le feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Puis invoquez le nom de votre dieu; et moi, j’invoquerai le nom de l’Éternel. Le dieu qui répondra par le feu, c’est celui-là qui sera Dieu. Et tout le peuple répondit, en disant: C’est bien! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Élie dit aux prophètes de Baal: Choisissez pour vous l’un des taureaux, préparez-le les premiers, car vous êtes les plus nombreux, et invoquez le nom de votre dieu; mais ne mettez pas le feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils prirent le taureau qu’on leur donna, et le préparèrent; et ils invoquèrent le nom de Baal, depuis le matin jusqu’à midi, en disant: Baal réponds nous! Mais il n’y eut ni voix ni réponse. Et ils sautaient devant l’autel qu’ils avaient fait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'A midi, Élie se moqua d’eux, et dit: Criez à haute voix, puisqu’il est dieu; il pense à quelque chose, ou il est occupé, ou il est en voyage; peut-être qu’il dort, et il se réveillera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Et ils crièrent à haute voix, et ils se firent, selon leur coutume, des incisions avec des épées et avec des lances, jusqu’à ce que le sang coulât sur eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Lorsque midi fut passé, ils prophétisèrent jusqu’au moment de la présentation de l’offrande. Mais il n’y eut ni voix, ni réponse, ni signe d’attention. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Élie dit alors à tout le peuple: Approchez-vous de moi! Tout le peuple s’approcha de lui. Et Élie rétablit l’autel de l’Éternel, qui avait été renversé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Il '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 4:5
      metadata:
        usfm: JOS.4.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: JOS.4.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'prit douze pierres d’après le nombre des tribus des fils de Jacob, auquel l’Éternel avait dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 32:28
      metadata:
        usfm: GEN.32.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 17:34
      metadata:
        usfm: 2KI.17.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Israël sera ton nom; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'et il bâtit avec ces pierres un autel au nom de l’Éternel. Il fit autour de l’autel un fossé de la capacité de deux mesures de semence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il arrangea le bois, coupa le taureau par morceaux, et le plaça sur le bois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Puis il dit: Remplissez d’eau quatre cruches, et versez-les sur l’holocauste et sur le bois. Il dit: Faites-le une seconde fois. Et ils le firent une seconde fois. Il dit: Faites-le une troisième fois. Et ils le firent une troisième fois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'L’eau coula autour de l’autel, et l’on remplit aussi d’eau le fossé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Au moment de la présentation de l’offrande, Élie, le prophète, s’avança et dit: Éternel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 3:6
      metadata:
        usfm: EXO.3.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:32
      metadata:
        usfm: MAT.22.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 12:26
      metadata:
        usfm: MRK.12.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 20:37
      metadata:
        usfm: LUK.20.37
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:32
      metadata:
        usfm: ACT.7.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dieu d’Abraham, d’Isaac et d’Israël! Que l’on sache aujourd’hui que tu es Dieu en Israël, que je suis ton serviteur, et que j’ai fait toutes ces choses par ta parole! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Réponds-moi, Éternel, réponds-moi, afin que ce peuple reconnaisse que c’est toi, Éternel, qui es Dieu, et que c’est toi qui ramènes leur cœur! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Et le feu de l’Éternel tomba, et il consuma l’holocauste, le bois, les pierres et la terre, et il absorba l’eau qui était dans le fossé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Quand tout le peuple vit cela, ils tombèrent sur leur visage et dirent: C’est l’Éternel qui est Dieu! C’est l’Éternel qui est Dieu! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Saisissez les prophètes de Baal, leur dit Élie; qu’aucun d’eux n’échappe! Et ils les saisirent. Élie les fit descendre au torrent de Kison, où il les égorgea.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La pluie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 41-46: cf. Ja 5:16-18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Et Élie dit à Achab: Monte, mange et bois; car il se fait un bruit qui annonce la pluie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Achab monta pour manger et pour boire. Mais Élie monta au sommet du Carmel; et, se penchant contre terre, il mit son visage entre ses genoux, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'et dit à son serviteur: Monte, regarde du côté de la mer. Le serviteur monta, il regarda, et dit: Il n’y a rien. Élie dit sept fois: Retourne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'A la septième fois, il dit: Voici un petit nuage qui s’élève de la mer, et qui est comme la paume de la main d’un homme. Élie dit: Monte, et dis à Achab: Attelle et descends, afin que la pluie ne t’arrête pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'En peu d’instants, le ciel s’obscurcit par les nuages, le vent s’établit, et il y eut une forte pluie. Achab monta sur son char, et partit pour Jizreel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Et la main de l’Éternel fut sur Élie, qui se ceignit les reins et courut devant Achab jusqu’à l’entrée de Jizreel.
