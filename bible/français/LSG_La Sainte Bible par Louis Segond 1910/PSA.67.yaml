document_id: PSA.67
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: (Ps 96; 98.) Ge 12:2, 3. Lu 2:25-32. Ro 15:8-12.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. Avec instruments à cordes. Psaume. Cantique.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Que Dieu ait pitié de nous et qu’il nous bénisse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 6:25
      metadata:
        usfm: NUM.6.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 4:7
      metadata:
        usfm: PSA.4.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Qu’il fasse luire sur nous sa face, '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Afin que l’on connaisse sur la terre ta voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et parmi toutes les nations ton salut!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les peuples te louent, ô Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les peuples te louent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les nations se réjouissent et sont dans l’allégresse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu juges les peuples avec droiture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et tu conduis les nations sur la terre. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les peuples te louent, ô Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les peuples te louent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: La terre donne ses produits;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu, notre Dieu, nous bénit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dieu, nous bénit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et toutes les extrémités de la terre le craignent.
