document_id: PSA.67,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Ps 96; 98.) Ge 12:2, 3. Lu 2:25-32. Ro 15:8-12.
  - type: text
    content: Au chef des chantres. Avec instruments à cordes. Psaume. Cantique.
  '2':
  - type: text
    content: Que Dieu ait pitié de nous et qu’il nous bénisse,
  - type: note
    content: No 6:25. Ps 4:7.
  - type: text
    content: 'Qu’il fasse luire sur nous sa face, '
  - type: text
    content: — Pause.
  '3':
  - type: text
    content: Afin que l’on connaisse sur la terre ta voie,
  - type: text
    content: Et parmi toutes les nations ton salut!
  '4':
  - type: text
    content: Les peuples te louent, ô Dieu!
  - type: text
    content: Tous les peuples te louent.
  '5':
  - type: text
    content: Les nations se réjouissent et sont dans l’allégresse;
  - type: text
    content: Car tu juges les peuples avec droiture,
  - type: text
    content: 'Et tu conduis les nations sur la terre. '
  - type: text
    content: — Pause.
  '6':
  - type: text
    content: Les peuples te louent, ô Dieu!
  - type: text
    content: Tous les peuples te louent.
  '7':
  - type: text
    content: La terre donne ses produits;
  - type: text
    content: Dieu, notre Dieu, nous bénit.
  '8':
  - type: text
    content: Dieu, nous bénit,
  - type: text
    content: Et toutes les extrémités de la terre le craignent.
