  - type: text
    text: INTRODUCTION À L’ÉVANGILE SELON LUC
- type: usfm
  marker: imt3
  children:
  - type: text
    text: (Da 7:13. Ph 2:8. Hé 2:17.) (Ro 10:12. Ga 3:28, 29.)
- type: usfm
  marker: ip
  children:
  - type: text
    text: L’Évangile selon Luc commence par une dédicace, à l’honorable Théophile (1:1-4), liant ce livre à celui des Actes des Apôtres, où l’auteur fait appel aux mêmes personnages (Act 1:1). Ces deux livres se présentent donc comme deux tomes d’un ouvrage initialement unique mais qui, pour des raisons précises, a dû être séparé en deux parties. La première partie, l’Évangile de Jésus-Christ, relate la vie et l’œuvre de Jésus présenté comme Fils de Dieu, et sauveur du monde. La deuxième partie, les Actes des Apôtres, relate la vie et l’œuvre de ses apôtres après lui. Il s’agit de savoir comment ces derniers ont continué la mission que Jésus a entreprise.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'De tous les auteurs des évangiles, Luc est aussi le seul qui explique clairement les raisons qui l’ont conduit à écrire le sien et surtout la manière dont il a procédé pour la collecte des informations (1:1-4). Ce faisant, il confirme qu’au moment où il écrivait son texte, des textes similaires, à l’exemple de l’Évangile de Marc (cf. introduction à cet évangile), existaient déjà, et qu’il a dû s’en servir. Luc écrit son évangile pour parfaire ce que les autres ont commencé. Il reprend et améliore la structure de Marc:'
- type: usfm
  marker: io1
  children:
  - type: text
    text: '1. Introduction '
  - type: usfm
    marker: ior
