- type: usfm
  marker: ip
  children:
  - type: text
    text: Mais Luc, comme Matthieu et plus que lui, complète ce schéma avec les récits plus développés de la naissance, de l’enfance et de la généalogie de Jésus (1:1 à 3:38). Luc fait remonter la généalogie de Jésus non pas à Abraham, comme Matthieu 1:1-17, mais à Adam et même au-delà à Dieu (3:23-38). Il fait ainsi le lien de Jésus non pas seulement avec Israël mais avec toute l’humanité. L’Évangile de Jésus chez Luc est la Bonne Nouvelle de l’amour de Dieu pour tous les hommes qui reconnaissent leurs péchés et qui se repentent. Luc illustre cette Bonne Nouvelle par une sélection rigoureuse des miracles et des paraboles de Jésus. La parabole du fils retrouvé 15:11-32 est un exemple frappant, à lire et à relire.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le nom Luc indique un païen converti au christianisme. Selon Col 4:14, il était médecin et compagnon de l’Apôtre Paul (voir aussi Phm 24; 2 Tim 4:11; Act 16:10-17; 20:5-21; 27:1-28).
- type: usfm
  marker: ip
  children:
  - type: text
    text: Luc est porteur d’un message unique, qui commence dans son évangile et s’achève dans le livre des Actes. Il s’agit de l’histoire du salut qui s’accomplit dans la personne de Jésus-Christ.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Jésus est à la fois solidaire des hommes et tourné vers eux. Il révèle ainsi aux hommes la bonté et la tendresse de Dieu et leur apprend la vraie vie de disciple dans la pratique concrète, qui se caractérise notamment par le partage des biens, le pardon des offenses, la patience dans les épreuves. La bonté de Dieu est ainsi à la portée de tous: hommes et femmes, riches et pauvres, Juifs et non juifs. Toutes les paraboles de Luc 15:1-32 veulent répondre aux pharisiens qui s’indignent de la bienveillance que Jésus réserve aux péagers et aux pécheurs:'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: «Ce ne sont pas ceux qui se portent bien qui ont besoin de médecin, mais les malades. Je ne suis pas venu appeler à la repentance des justes, mais des pécheurs
  - type: text
    text: » (Lc 5:31-32).
- type: usfm
  marker: is1
  children:
  - type: text
    text: 'Voici la liste des miracles de Jésus rapportés par Luc:'
- type: text
  text: 1. la guérison d’un démoniaque4:33-362. la guérison de la belle-mère de Pierre4:38-393. la pêche miraculeuse5:1-114. la guérison d’un lépreux5:12-155. la guérison d’un paralytique5:17-266. la guérison d’un homme à la main sèche6:6-117. la guérison du serviteur d’un centenier7:1-198. la résurrection du fils de la veuve de Naïn7:11-169. la tempête apaisée8:22-2510. la guérison d’un démoniaque8:26-3911. la résurrection de la fille de Jaïrus8:41-5612. la guérison d’une femme malade depuis douze ans8:43-4813. la multiplication des pains9:12-1714. la guérison du fils lunatique9:37-4215. la guérison d’un démoniaque muet 11:1416. la guérison d’une femme infirme13:10-1717. la guérison d’un hydropique14:1-618. la guérison de dix lépreux17:11-1919. la guérison d’un aveugle18:35-4320. la guérison de l’oreille du serviteur22:49-51
- type: usfm
  marker: is1
  children:
  - type: text
    text: 'Voici également la liste des paraboles de Jésus dans Luc:'
- type: text
  text: 1. la maison bâtie sur le roc6:48-492. les deux débiteurs7:41-433. le semeur8:5-154. le bon Samaritain10:30-375. l’ami importun11:5-86. le riche insensé12:16-217. les serviteurs attendant leur maître12:41-488. le figuier stérile13:6-99. le grain de sénevé13:18-1910. le levain13:20-2111. le grand souper14:16-2412. la brebis égarée15:2-713. la drachme perdue15:8-1014. l’enfant prodigue15:11-3215. l’économe infidèle16:1-916. le mauvais riche et Lazare16:19-3117. le juge inique et la veuve importune18:1-818. le pharisien et le publicain18:9-1419. les mines19:11-2720. les vignerons20:9-1621. le figuier21:29
- type: usfm
  marker: ip
  children:
  - type: text
    text: En conclusion, ce qui singularise l’Évangile de Luc est sa théologie de l’amour de Dieu pour les personnes victimes de la ségrégation et de la marginalisation de la part des pharisiens et des Juifs fidèles à la synagogue. Jésus réserve un bon accueil aux pauvres, aux pécheurs. Mais Luc porte aussi un intérêt particulier aux femmes. Il est le seul à montrer clairement qu’elles faisaient partie du groupe itinérant de Jésus au même titre que les hommes (Lc 8:1-3).
