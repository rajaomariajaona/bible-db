  - type: text
    content: INTRODUCTION À L’ÉVANGILE SELON LUC
  - type: text
    content: (Da 7:13. Ph 2:8. Hé 2:17.) (Ro 10:12. Ga 3:28, 29.)
  - type: text
    content: L’Évangile selon Luc commence par une dédicace, à l’honorable Théophile (1:1-4), liant ce livre à celui des Actes des Apôtres, où l’auteur fait appel aux mêmes personnages (Act 1:1). Ces deux livres se présentent donc comme deux tomes d’un ouvrage initialement unique mais qui, pour des raisons précises, a dû être séparé en deux parties. La première partie, l’Évangile de Jésus-Christ, relate la vie et l’œuvre de Jésus présenté comme Fils de Dieu, et sauveur du monde. La deuxième partie, les Actes des Apôtres, relate la vie et l’œuvre de ses apôtres après lui. Il s’agit de savoir comment ces derniers ont continué la mission que Jésus a entreprise.
  - type: text
    content: 'De tous les auteurs des évangiles, Luc est aussi le seul qui explique clairement les raisons qui l’ont conduit à écrire le sien et surtout la manière dont il a procédé pour la collecte des informations (1:1-4). Ce faisant, il confirme qu’au moment où il écrivait son texte, des textes similaires, à l’exemple de l’Évangile de Marc (cf. introduction à cet évangile), existaient déjà, et qu’il a dû s’en servir. Luc écrit son évangile pour parfaire ce que les autres ont commencé. Il reprend et améliore la structure de Marc:'
  - type: text
    content: '1. Introduction '
  - type: text
    content: 1:1-56
  - type: text
    content: '2. Naissance de Jean Baptiste et de Jésus-Christ '
  - type: text
    content: 1:57—2.40
  - type: text
    content: '3. Jésus à l’âge de douze ans: enfance et généalogie de Jésus-Christ '
  - type: text
    content: 2:41—3.38
  - type: text
    content: '4. Tentation de Jésus-Christ et ministère de Jésus en Galilée '
  - type: text
    content: 4:1—9.50
  - type: text
    content: '5. Ministère de Jésus hors de Galilée et en route vers Jérusalem '
  - type: text
    content: 9:51—19.28
  - type: text
    content: '6. Entrée de Jésus à Jérusalem, son ministère là-bas, avec les événements majeurs que sont sa passion, sa résurrection et son ascension '
  - type: text
    content: 19:29—24.53
  - type: text
    content: Mais Luc, comme Matthieu et plus que lui, complète ce schéma avec les récits plus développés de la naissance, de l’enfance et de la généalogie de Jésus (1:1 à 3:38). Luc fait remonter la généalogie de Jésus non pas à Abraham, comme Matthieu 1:1-17, mais à Adam et même au-delà à Dieu (3:23-38). Il fait ainsi le lien de Jésus non pas seulement avec Israël mais avec toute l’humanité. L’Évangile de Jésus chez Luc est la Bonne Nouvelle de l’amour de Dieu pour tous les hommes qui reconnaissent leurs péchés et qui se repentent. Luc illustre cette Bonne Nouvelle par une sélection rigoureuse des miracles et des paraboles de Jésus. La parabole du fils retrouvé 15:11-32 est un exemple frappant, à lire et à relire.
  - type: text
    content: Le nom Luc indique un païen converti au christianisme. Selon Col 4:14, il était médecin et compagnon de l’Apôtre Paul (voir aussi Phm 24; 2 Tim 4:11; Act 16:10-17; 20:5-21; 27:1-28).
  - type: text
    content: Luc est porteur d’un message unique, qui commence dans son évangile et s’achève dans le livre des Actes. Il s’agit de l’histoire du salut qui s’accomplit dans la personne de Jésus-Christ.
  - type: text
    content: 'Jésus est à la fois solidaire des hommes et tourné vers eux. Il révèle ainsi aux hommes la bonté et la tendresse de Dieu et leur apprend la vraie vie de disciple dans la pratique concrète, qui se caractérise notamment par le partage des biens, le pardon des offenses, la patience dans les épreuves. La bonté de Dieu est ainsi à la portée de tous: hommes et femmes, riches et pauvres, Juifs et non juifs. Toutes les paraboles de Luc 15:1-32 veulent répondre aux pharisiens qui s’indignent de la bienveillance que Jésus réserve aux péagers et aux pécheurs:'
  - type: text
    content: «Ce ne sont pas ceux qui se portent bien qui ont besoin de médecin, mais les malades. Je ne suis pas venu appeler à la repentance des justes, mais des pécheurs
  - type: text
    content: » (Lc 5:31-32).
