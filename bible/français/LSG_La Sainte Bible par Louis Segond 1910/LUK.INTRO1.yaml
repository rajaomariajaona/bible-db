  - type: text
    content: En conclusion, ce qui singularise l’Évangile de Luc est sa théologie de l’amour de Dieu pour les personnes victimes de la ségrégation et de la marginalisation de la part des pharisiens et des Juifs fidèles à la synagogue. Jésus réserve un bon accueil aux pauvres, aux pécheurs. Mais Luc porte aussi un intérêt particulier aux femmes. Il est le seul à montrer clairement qu’elles faisaient partie du groupe itinérant de Jésus au même titre que les hommes (Lc 8:1-3).
