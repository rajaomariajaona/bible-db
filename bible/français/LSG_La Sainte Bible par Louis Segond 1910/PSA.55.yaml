document_id: PSA.55,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2 S 15:12, etc.; 16. Ps 35.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au chef des chantres. Avec instruments à cordes. Cantique de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réduis à néant, Seigneur, divise leurs langues!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je vois dans la ville la violence et les querelles;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles en font jour et nuit le tour sur les murs;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’iniquité et la malice sont dans son sein;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La méchanceté est au milieu d’elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la fraude et la tromperie ne quittent point ses places.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n’est pas un ennemi qui m’outrage, je le supporterais;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n’est pas mon adversaire qui s’élève contre moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me cacherais devant lui.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est toi, que j’estimais mon égal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi, mon confident et mon ami!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ensemble nous vivions dans une douce intimité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous allions avec la foule à la maison de Dieu!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la mort les surprenne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils descendent vivants au séjour des morts!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la méchanceté est dans leur demeure, au milieu d’eux.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et moi, je crie à Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’Éternel me sauvera.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le soir, le matin, et à midi, je soupire et je gémis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il entendra ma voix.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il me délivrera de leur approche et me rendra la paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils sont nombreux contre moi.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu! Prête l’oreille à ma prière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne te dérobe pas à mes supplications!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu entendra, et il les humiliera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lui qui de toute éternité est assis sur son trône; '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il n’y a point en eux de changement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils ne craignent point Dieu.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il porte la main sur ceux qui étaient en paix avec lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il viole son alliance;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa bouche est plus douce que la crème,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la guerre est dans son cœur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses paroles sont plus onctueuses que l’huile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ce sont des épées nues.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remets ton sort à l’Éternel, et il te soutiendra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne laissera jamais chanceler le juste.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toi, ô Dieu! Tu les feras descendre au fond de la fosse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les hommes de sang et de fraude
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’atteindront pas la moitié de leurs jours.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est en toi que je me confie.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoute-moi, et réponds-moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’erre çà et là dans mon chagrin et je m’agite,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de la voix de l’ennemi et de l’oppression du méchant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils font tomber sur moi le malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et me poursuivent avec colère.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon cœur tremble au-dedans de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les terreurs de la mort me surprennent;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La crainte et l’épouvante m’assaillent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le frisson m’enveloppe.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je dis: Oh! Si j’avais les ailes de la colombe,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je m’envolerais, et je trouverais le repos;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je fuirais bien loin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’irais séjourner au désert; '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je m’échapperais en toute hâte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus rapide que le vent impétueux, que la tempête.
