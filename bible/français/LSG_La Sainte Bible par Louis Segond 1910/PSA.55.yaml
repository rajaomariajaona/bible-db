document_id: PSA.55,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 2 S 15:12, etc.; 16. Ps 35.
  - type: text
    content: Au chef des chantres. Avec instruments à cordes. Cantique de David.
  '10':
  - type: text
    content: Réduis à néant, Seigneur, divise leurs langues!
  - type: text
    content: Car je vois dans la ville la violence et les querelles;
  '11':
  - type: text
    content: Elles en font jour et nuit le tour sur les murs;
  - type: text
    content: L’iniquité et la malice sont dans son sein;
  '12':
  - type: text
    content: La méchanceté est au milieu d’elle,
  - type: text
    content: Et la fraude et la tromperie ne quittent point ses places.
  '13':
  - type: text
    content: Ce n’est pas un ennemi qui m’outrage, je le supporterais;
  - type: text
    content: Ce n’est pas mon adversaire qui s’élève contre moi,
  - type: text
    content: Je me cacherais devant lui.
  '14':
  - type: text
    content: C’est toi, que j’estimais mon égal,
  - type: text
    content: Toi, mon confident et mon ami!
  '15':
  - type: text
    content: Ensemble nous vivions dans une douce intimité,
  - type: text
    content: Nous allions avec la foule à la maison de Dieu!
  '16':
  - type: text
    content: Que la mort les surprenne,
  - type: text
    content: Qu’ils descendent vivants au séjour des morts!
  - type: text
    content: Car la méchanceté est dans leur demeure, au milieu d’eux.
  '17':
  - type: text
    content: Et moi, je crie à Dieu,
  - type: text
    content: Et l’Éternel me sauvera.
  '18':
  - type: text
    content: Le soir, le matin, et à midi, je soupire et je gémis,
  - type: text
    content: Et il entendra ma voix.
  '19':
  - type: text
    content: Il me délivrera de leur approche et me rendra la paix,
  - type: text
    content: Car ils sont nombreux contre moi.
  '2':
  - type: text
    content: O Dieu! Prête l’oreille à ma prière,
  - type: text
    content: Et ne te dérobe pas à mes supplications!
  '20':
  - type: text
    content: Dieu entendra, et il les humiliera,
  - type: text
    content: 'Lui qui de toute éternité est assis sur son trône; '
  - type: text
    content: — Pause.
  - type: text
    content: Car il n’y a point en eux de changement,
  - type: text
    content: Et ils ne craignent point Dieu.
  '21':
  - type: text
    content: Il porte la main sur ceux qui étaient en paix avec lui,
  - type: text
    content: Il viole son alliance;
  '22':
  - type: text
    content: Sa bouche est plus douce que la crème,
  - type: text
    content: Mais la guerre est dans son cœur;
  - type: text
    content: Ses paroles sont plus onctueuses que l’huile,
  - type: text
    content: Mais ce sont des épées nues.
  '23':
  - type: text
    content: Remets ton sort à l’Éternel, et il te soutiendra,
  - type: text
    content: Il ne laissera jamais chanceler le juste.
  '24':
  - type: text
    content: Et toi, ô Dieu! Tu les feras descendre au fond de la fosse;
  - type: text
    content: Les hommes de sang et de fraude
  - type: text
    content: N’atteindront pas la moitié de leurs jours.
  - type: text
    content: C’est en toi que je me confie.
  '3':
  - type: text
    content: Écoute-moi, et réponds-moi!
  - type: text
    content: J’erre çà et là dans mon chagrin et je m’agite,
  '4':
  - type: text
    content: A cause de la voix de l’ennemi et de l’oppression du méchant;
  - type: text
    content: Car ils font tomber sur moi le malheur,
  - type: text
    content: Et me poursuivent avec colère.
  '5':
  - type: text
    content: Mon cœur tremble au-dedans de moi,
  - type: text
    content: Et les terreurs de la mort me surprennent;
  '6':
  - type: text
    content: La crainte et l’épouvante m’assaillent,
  - type: text
    content: Et le frisson m’enveloppe.
  '7':
  - type: text
    content: 'Je dis: Oh! Si j’avais les ailes de la colombe,'
  - type: text
    content: Je m’envolerais, et je trouverais le repos;
  '8':
  - type: text
    content: Voici, je fuirais bien loin,
  - type: text
    content: 'J’irais séjourner au désert; '
  - type: text
    content: — Pause.
  '9':
  - type: text
    content: Je m’échapperais en toute hâte,
  - type: text
    content: Plus rapide que le vent impétueux, que la tempête.
