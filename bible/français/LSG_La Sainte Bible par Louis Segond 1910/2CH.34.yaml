document_id: 2CH.34
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Josias, roi de Juda. Son zèle contre l’idolâtrie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. 2 R 22:1-7. (Jé 1:1. So 1:1.) És 32:8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Josias avait huit ans lorsqu’il devint roi, et il régna trente et un ans à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il fit ce qui est droit aux yeux de l’Éternel, et il marcha dans les voies de David, son père; il ne s’en détourna ni à droite ni à gauche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'La huitième année de son règne, comme il était encore jeune, il commença à rechercher le Dieu de David, son père; et la douzième année, il commença à purifier Juda et Jérusalem '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 13:2
      metadata:
        usfm: 1KI.13.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des hauts lieux, des idoles, des images taillées et des images en fonte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'On renversa devant lui les autels des Baals, et il abattit les statues consacrées au soleil qui étaient dessus; il brisa les idoles, les images taillées et les images en fonte, et les réduisit en poussière, et il répandit la poussière sur les sépulcres de ceux qui leur avaient sacrifié; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et il brûla les ossements des prêtres sur leurs autels. C’est ainsi qu’il purifia Juda et Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dans les villes de Manassé, d’Éphraïm, de Siméon, et même de Nephthali, partout au milieu de leurs ruines, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'il renversa les autels, il mit en pièces les idoles et les images taillées et les réduisit en poussière, et il abattit toutes les statues consacrées au soleil dans tout le pays d’Israël. Puis il retourna à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 22:3
      metadata:
        usfm: 2KI.22.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'La dix-huitième année de son règne, après qu’il eut purifié le pays et la maison, il envoya Schaphan, fils d’Atsalia, Maaséja, chef de la ville, et Joach, fils de Joachaz, l’archiviste, pour réparer la maison de l’Éternel, son Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils se rendirent auprès du souverain sacrificateur Hilkija, et on livra l’argent qui avait été apporté dans la maison de Dieu, et que les Lévites gardiens du seuil avaient recueilli de Manassé et d’Éphraïm et de tout le reste d’Israël, et de tout Juda et Benjamin et des habitants de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On le remit entre les mains de ceux qui étaient chargés de faire exécuter l’ouvrage dans la maison de l’Éternel. Et ils l’employèrent pour ceux qui travaillaient aux réparations de la maison de l’Éternel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 22:6
      metadata:
        usfm: 2KI.22.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour les charpentiers et les maçons, pour les achats de pierres de taille et de bois destiné aux poutres et à la charpente des bâtiments qu’avaient détruits les rois de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ces hommes agirent avec probité dans leur travail. Ils étaient placés sous l’inspection de Jachath et Abdias, Lévites d’entre les fils de Merari, et de Zacharie et Meschullam, d’entre les fils des Kehathites; tous ceux des Lévites qui étaient habiles musiciens surveillaient les manœuvres '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: et dirigeaient tous les ouvriers occupés aux divers travaux; il y avait encore d’autres Lévites secrétaires, commissaires et portiers.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le livre de la loi trouvé dans le temple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-28: cf. 2 R 22:8-20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Au moment où l’on sortit l’argent qui avait été apporté dans la maison de l’Éternel, le sacrificateur Hilkija trouva le livre de la loi de l’Éternel donnée par Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors Hilkija prit la parole et dit à Schaphan, le secrétaire: J’ai trouvé le livre de la loi dans la maison de l’Éternel. Et Hilkija donna le livre à Schaphan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Schaphan apporta le livre au roi, et lui rendit aussi compte, en disant: Tes serviteurs ont fait tout ce qui leur a été commandé; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ils ont amassé l’argent qui se trouvait dans la maison de l’Éternel, et l’ont remis entre les mains des inspecteurs et des ouvriers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Schaphan, le secrétaire, dit encore au roi: Le sacrificateur Hilkija m’a donné un livre. Et Schaphan le lut devant le roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Lorsque le roi entendit les paroles de la loi, il déchira ses vêtements. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Et le roi donna cet ordre à Hilkija, à Achikam, fils de Schaphan, à Abdon, fils de Michée, à Schaphan, le secrétaire, et à Asaja, serviteur du roi: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Allez, consultez l’Éternel pour moi et pour ce qui reste en Israël et en Juda, au sujet des paroles de ce livre qu’on a trouvé; car grande est la colère de l’Éternel qui s’est répandue sur nous, parce que nos pères n’ont point observé la parole de l’Éternel et n’ont point mis en pratique tout ce qui est écrit dans ce livre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hilkija et ceux qu’avait désignés le roi allèrent auprès de la prophétesse Hulda, femme de Schallum, fils de Thokehath, fils de Hasra, gardien des vêtements. Elle habitait à Jérusalem, dans l’autre quartier de la ville. Après qu’ils eurent exprimé ce qu’ils avaient à lui dire, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'elle leur répondit: Ainsi parle l’Éternel, le Dieu d’Israël: Dites à l’homme qui vous a envoyés vers moi: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ainsi parle l’Éternel: Voici, je vais faire venir des malheurs sur ce lieu et sur ses habitants, toutes les malédictions écrites dans le livre qu’on a lu devant le roi de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Parce qu’ils m’ont abandonné et qu’ils ont offert des parfums à d’autres dieux, afin de m’irriter par tous les ouvrages de leurs mains, ma colère s’est répandue sur ce lieu, et elle ne s’éteindra point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mais vous direz au roi de Juda qui vous a envoyés pour consulter l’Éternel: Ainsi parle l’Éternel, le Dieu d’Israël, au sujet des paroles que tu as entendues: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Parce que ton cœur a été touché, parce que tu t’es humilié devant Dieu en entendant ses paroles contre ce lieu et contre ses habitants, parce que tu t’es humilié devant moi, parce que tu as déchiré tes vêtements et que tu as pleuré devant moi, moi aussi, j’ai entendu, dit l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Voici, je te recueillerai auprès de tes pères, tu seras recueilli en paix dans ton sépulcre, et tes yeux ne verront pas tous les malheurs que je ferai venir sur ce lieu et sur ses habitants. Ils rapportèrent au roi cette réponse.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 29-33: cf. 2 R 23:1-20. 2 Ch 15:9-15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 23:1
      metadata:
        usfm: 2KI.23.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi fit assembler tous les anciens de Juda et de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Puis il monta à la maison de l’Éternel avec tous les hommes de Juda et les habitants de Jérusalem, les sacrificateurs et les Lévites, et tout le peuple, depuis le plus grand jusqu’au plus petit. Il lut devant eux toutes les paroles du livre de l’alliance, qu’on avait trouvé dans la maison de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Le roi se tenait sur son estrade, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 24:25
      metadata:
        usfm: JOS.24.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il traita alliance devant l’Éternel, s’engageant à suivre l’Éternel, et à observer ses ordonnances, ses préceptes et ses lois, de tout son cœur et de toute son âme, afin de mettre en pratique les paroles de l’alliance écrites dans ce livre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Et il fit entrer dans l’alliance tous ceux qui se trouvaient à Jérusalem et en Benjamin; et les habitants de Jérusalem agirent selon l’alliance de Dieu, du Dieu de leurs pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Josias fit disparaître toutes les abominations de tous les pays appartenant aux enfants d’Israël, et il obligea tous ceux qui se trouvaient en Israël à servir l’Éternel, leur Dieu. Pendant toute sa vie, ils ne se détournèrent point de l’Éternel, le Dieu de leurs pères.
