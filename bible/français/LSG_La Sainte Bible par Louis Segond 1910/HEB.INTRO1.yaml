document_id: HEB.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION À L’ÉPÎTRE AUX HÉBREUX
- type: usfm
  marker: imt3
  children:
  - type: text
    text: (Ga 4:9. Jn 19:30. Col 2:10, 17.)
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L’auteur de l’Épître aux Hébreux n’est pas connu. Il existe une tradition ancienne qui l’attribue à l’apôtre Paul. Mais son style oratoire est profondément différent de celui de Paul. Il serait donc mieux de considérer l’épître comme elle se présente. La mention «Ceux d’Italie vous saluent» (13:24) laisse supposer que l’épître a été écrite d’Italie, probablement de Rome, ce qui fait penser à l’apôtre. Voici d’ailleurs la structure de cette épître:'
- type: usfm
  marker: io1
  children:
  - type: text
    text: '1. Le Fils par lequel Dieu s’est révélé pour sauver le monde est supérieur aux anges '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 1:1–2:18
- type: usfm
  marker: io1
  children:
  - type: text
    text: '2. Jésus est supérieur à Moïse; ne pas imiter l’incrédulité des anciens Israélites '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 3:1–4:13
- type: usfm
  marker: io1
  children:
  - type: text
    text: '3. Jésus, souverain sacrificateur au sacerdoce semblable à celui de Melchisédek et au sacrifice parfait '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 4:14–10:39
- type: usfm
  marker: io1
  children:
  - type: text
    text: '4. La foi: définition et exemples tirés de l’Ancien Testament '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 11:1-40
- type: usfm
  marker: io1
  children:
  - type: text
    text: '5. Persévérance et sanctification dans la foi '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 12:1–13:17
- type: usfm
  marker: io1
  children:
  - type: text
    text: '6. Vœux et salutations finales '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 13:18-25
- type: usfm
  marker: ip
  children:
  - type: text
    text: L’Épître aux Hébreux n’a ni introduction, ni conclusion selon les formules épistolaires bien connues, munies d’indications sur l’expéditeur et les destinataires (voir Rom 1:1-7; 1 Cor 1:1-3; Gal 1:1-5; Éph 1:1-2 par exemple). Cette lacune pose la question de la place de cet écrit parmi les épîtres. Malgré ce défaut, son caractère pastoral et les instructions théologiques et christologiques alternant avec des exhortations éthiques et ecclésiastiques, lui confèrent bien les marques d’une épître.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le terme '
  - type: usfm
    marker: it
    children:
    - type: text
      text: «Hébreux»
  - type: text
    text: ' qui apparaît dans le titre permet d’identifier les destinataires sans être d’une clarté absolue. La critique interne du livre permet de le préciser. En lisant le texte, on comprend, sans que cela soit clairement écrit, qu’il s’adresse à des chrétiens d’origine juive, qui correspondent logiquement à ce titre. C’est à cette catégorie de chrétiens que l’auteur applique la quasi-totalité de son message, qui se résume ainsi: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jésus-Christ accomplit, comme le souverain sacrificateur par excellence, tout l’ordre sacrificiel et cultuel de l’Ancien Testament
  - type: text
    text: .
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le message de l’Épître aux Hébreux porte donc sur l’œuvre sacrificielle du Christ. Jésus est le souverain sacrificateur qui dépasse tous ceux de l’ancienne Alliance qui l’on précédé: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: «Ainsi, puisque nous avons un grand souverain sacrificateur qui a traversé les cieux, Jésus, le Fils de Dieu, demeurons fermes dans la foi que nous professons. Car nous n’avons pas un souverain sacrificateur qui ne puisse compatir à nos faiblesses; au contraire, il a été tenté comme nous en toutes choses sans commettre de péché»
  - type: text
    text: ' (voir 4:14-15).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Pour étayer le message central de l’épître, l’auteur distingue le monde impérissable et éternel des réalités célestes du monde des réalités sensibles que nous connaissons. C’est dans le monde céleste que Christ accomplit le ministère de souverain sacrificateur. Les éléments cultuels du temple du temps de Jésus furent des images du véritable culte et du sacrifice parfait.
- type: usfm
  marker: ip
  children:
  - type: text
    text: On a longtemps hésité à admettre l’Épître aux Hébreux parmi les livres canoniques parce que le style littéraire et la pensée qui s’y incarnent ne sont pas de l’apôtre Paul à qui elle est attribuée. Les conjectures, en somme infructueuses, au sujet de l’auteur de cette œuvre ont fait dire à Origène que Dieu seul savait qui en était l’auteur. Les caractéristiques qui en émanent permettent de le décrire comme un chrétien cultivé, d’un esprit vif, maîtrisant la langue grecque et capable de pratiquer l’exégèse juive de type paulinienne. Quant aux destinataires, il s’agit de Juifs devenus chrétiens.
