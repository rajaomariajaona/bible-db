document_id: GEN.48
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. Ge 35:9-20. Jos 14:4. 1 Ch 5:1, 2.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après ces choses, l’on vint dire à Joseph: Voici, ton père est malade. Et il prit avec lui ses deux fils, Manassé et Éphraïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On avertit Jacob, et on lui dit: Voici ton fils Joseph qui vient vers toi. Et Israël rassembla ses forces, et s’assit sur son lit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jacob dit à Joseph: Le Dieu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 17:1
      metadata:
        usfm: GEN.17.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tout-puissant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 35:6
      metadata:
        usfm: GEN.35.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'm’est apparu à Luz, dans le pays de Canaan, et il m’a béni. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il m’a dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 28:3
      metadata:
        usfm: GEN.28.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 35:11
      metadata:
        usfm: GEN.35.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je te rendrai fécond, je te multiplierai, et je ferai de toi une multitude de peuples; je donnerai ce pays à ta postérité après toi, pour qu’elle le possède à toujours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Maintenant, les deux fils '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 41:50
      metadata:
        usfm: GEN.41.50
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 46:20
      metadata:
        usfm: GEN.46.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui te sont nés au pays d’Égypte, avant mon arrivée vers toi en Égypte, seront à moi; Éphraïm et Manassé seront à moi, comme Ruben et Siméon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais les enfants que tu as engendrés après eux seront à toi; ils seront appelés du nom de leurs frères dans leur héritage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'A mon retour de Paddan, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 35:19
      metadata:
        usfm: GEN.35.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Rachel mourut en route auprès de moi, dans le pays de Canaan, à quelque distance d’Éphrata; et c’est là que je l’ai enterrée, sur le chemin d’Éphrata, qui est Bethléhem.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-22: cf. Hé 11:21. És 8:18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Israël regarda les fils de Joseph, et dit: Qui sont ceux-ci? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Joseph répondit à son père: Ce sont mes fils, que Dieu m’a donnés ici. Israël dit: Fais-les, je te prie, approcher de moi, pour que je les bénisse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les yeux d’Israël étaient appesantis par la vieillesse; il ne pouvait plus voir. Joseph les fit approcher de lui; et Israël leur donna un baiser, et les embrassa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Israël dit à Joseph: Je ne pensais pas revoir ton visage, et voici que Dieu me fait voir même ta postérité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Joseph les retira des genoux de son père, et il se prosterna en terre devant lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Puis Joseph les prit tous deux, Éphraïm de sa main droite à la gauche d’Israël, et Manassé de sa main gauche à la droite d’Israël, et il les fit approcher de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Israël étendit sa main droite et la posa sur la tête d’Éphraïm qui était le plus jeune, et il posa sa main gauche sur la tête de Manassé: ce fut avec intention qu’il posa ses mains ainsi, car Manassé était le premier-né. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:21
      metadata:
        usfm: HEB.11.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'bénit Joseph, et dit: Que le Dieu en présence duquel ont marché mes pères, Abraham et Isaac, que le Dieu qui m’a conduit depuis que j’existe jusqu’à ce jour, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 31:42
      metadata:
        usfm: GEN.31.42
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 32:1
      metadata:
        usfm: GEN.32.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’ange qui m’a délivré de tout mal, bénisse ces enfants! Qu’ils soient appelés de mon nom et du nom de mes pères, Abraham et Isaac, et qu’ils multiplient en abondance au milieu du pays! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Joseph vit avec déplaisir que son père posait sa main droite sur la tête d’Éphraïm; il saisit la main de son père, pour la détourner de dessus la tête d’Éphraïm, et la diriger sur celle de Manassé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et Joseph dit à son père: Pas ainsi, mon père, car celui-ci est le premier-né; pose ta main droite sur sa tête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Son père refusa, et dit: Je le sais, mon fils, je le sais; lui aussi deviendra un peuple, lui aussi sera grand; mais son frère cadet sera plus grand que lui, et sa postérité deviendra '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ru 4:11
      metadata:
        usfm: RUT.4.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: RUT.4.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une multitude de nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il les bénit ce jour-là, et dit: C’est par toi qu’Israël bénira, en disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 31:20
      metadata:
        usfm: JER.31.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que Dieu te traite comme Éphraïm et comme Manassé! Et il mit Éphraïm avant Manassé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Israël dit à Joseph: Voici, je vais mourir! Mais Dieu sera avec vous, et il vous fera retourner dans le pays de vos pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 13:7
      metadata:
        usfm: JOS.13.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:1
      metadata:
        usfm: JOS.16.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:1
      metadata:
        usfm: JOS.17.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je te donne, de plus qu’à tes frères, une part '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 24:8
      metadata:
        usfm: JOS.24.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: que j’ai prise de la main des Amoréens avec mon épée et avec mon arc.
