document_id: 1TI.5,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-2: cf. Lé 19:32. Ga 6:1.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne réprimande pas rudement '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le vieillard, mais exhorte-le comme un père; exhorte les jeunes gens comme des frères, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qu’elle soit recommandable par de bonnes œuvres, ayant élevé des enfants, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 4:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'exercé l’hospitalité, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 18:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 7:38
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '44'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'lavé les pieds des saints, secouru les malheureux, pratiqué toute espèce de bonne œuvre. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais refuse les jeunes veuves; car, lorsque la volupté les détache du Christ, elles veulent se marier, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et se rendent coupables en ce qu’elles violent leur premier engagement. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avec cela, étant oisives, elles apprennent à aller de maison en maison; et non seulement elles sont oisives, mais encore '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 2:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'causeuses et intrigantes, disant ce qu’il ne faut pas dire. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je veux donc que les jeunes se '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 7:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'marient, qu’elles aient des enfants, qu’elles dirigent leur maison, qu’elles ne donnent à l’adversaire aucune occasion de médire; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car déjà quelques-unes se sont détournées pour suivre Satan. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si quelque fidèle, homme ou femme, a des veuves, qu’il les assiste, et que l’Église n’en soit point chargée, afin qu’elle puisse assister celles qui sont véritablement veuves.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-25: cf. (1 Th 5:12, 13. 1 Co 9:7-14.) Lé 19:15, 17.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 15:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 9:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 6:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 2:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 5:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 13:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Que les anciens qui dirigent bien soient jugés dignes d’un double honneur, surtout ceux qui travaillent à la prédication et à l’enseignement. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car l’Écriture dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 25:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 9:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu n’emmuselleras point le bœuf quand il foule le grain. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 24:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 10:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et l’ouvrier mérite son salaire. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne reçois point d’accusation contre un ancien, si ce n’est sur la déposition '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 19:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'de deux ou trois témoins. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: les femmes âgées comme des mères, celles qui sont jeunes comme des sœurs, en toute pureté.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Directions au sujet des veuves, des anciens, des serviteurs
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 3-16: cf. Lu 2:36, 37. Ro 16:1, 2. 1 Co 7:34, 35.'
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui pèchent, reprends-les devant tous, afin que les autres aussi éprouvent de la crainte. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 1:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 1:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 1:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 1:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 2:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 6:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je te conjure devant Dieu, devant Jésus-Christ, et devant les anges élus, d’observer ces choses '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 17:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'sans prévention, et de ne rien faire par faveur. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 6:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 4:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 1:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'N’impose les mains à personne avec précipitation, et ne participe pas aux péchés d’autrui; toi-même, conserve-toi pur. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne continue pas à ne boire que de l’eau; mais fais usage d’un peu de vin, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 104:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à cause de ton estomac et de tes fréquentes indispositions. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les péchés de certains hommes sont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 5:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'manifestes, même avant qu’on les juge, tandis que chez d’autres, ils ne se découvrent que dans la suite. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: De même, les bonnes œuvres sont manifestes, et celles qui ne le sont pas ne peuvent rester cachées.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Honore les veuves qui sont véritablement veuves. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si une veuve a des enfants ou des petits-enfants, qu’ils apprennent avant tout à exercer la piété envers leur propre famille, et à rendre '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 45:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 15:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 7:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 6:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à leurs parents ce qu’ils ont reçu d’eux; car cela est agréable à Dieu. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 7:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Celle qui est véritablement veuve, et qui est demeurée dans l’isolement, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 2:36
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'met son espérance en Dieu et persévère nuit et jour dans les supplications et les prières. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais celle qui vit dans les plaisirs est morte, quoique vivante. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Déclare-leur ces choses, afin qu’elles soient irréprochables. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 6:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si quelqu’un n’a pas soin des siens, et principalement de ceux de sa famille, il a renié la foi, et il est pire qu’un infidèle. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qu’une veuve, pour être inscrite sur le rôle, n’ait pas moins de soixante ans, qu’elle ait été femme d’un seul mari, '
