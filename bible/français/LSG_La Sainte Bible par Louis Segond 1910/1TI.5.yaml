document_id: 1TI.5
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-2: cf. Lé 19:32. Ga 6:1.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ne réprimande pas rudement '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:32
      metadata:
        usfm: LEV.19.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le vieillard, mais exhorte-le comme un père; exhorte les jeunes gens comme des frères, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: les femmes âgées comme des mères, celles qui sont jeunes comme des sœurs, en toute pureté.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Directions au sujet des veuves, des anciens, des serviteurs
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 3-16: cf. Lu 2:36, 37. Ro 16:1, 2. 1 Co 7:34, 35.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Honore les veuves qui sont véritablement veuves. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Si une veuve a des enfants ou des petits-enfants, qu’ils apprennent avant tout à exercer la piété envers leur propre famille, et à rendre '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 45:10
      metadata:
        usfm: GEN.45.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: GEN.45.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 15:4
      metadata:
        usfm: MAT.15.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 7:10
      metadata:
        usfm: MRK.7.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 6:1
      metadata:
        usfm: EPH.6.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: EPH.6.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à leurs parents ce qu’ils ont reçu d’eux; car cela est agréable à Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 7:32
      metadata:
        usfm: 1CO.7.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Celle qui est véritablement veuve, et qui est demeurée dans l’isolement, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 2:36
      metadata:
        usfm: LUK.2.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'met son espérance en Dieu et persévère nuit et jour dans les supplications et les prières. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais celle qui vit dans les plaisirs est morte, quoique vivante. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Déclare-leur ces choses, afin qu’elles soient irréprochables. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 6:10
      metadata:
        usfm: GAL.6.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si quelqu’un n’a pas soin des siens, et principalement de ceux de sa famille, il a renié la foi, et il est pire qu’un infidèle. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Qu’une veuve, pour être inscrite sur le rôle, n’ait pas moins de soixante ans, qu’elle ait été femme d’un seul mari, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'qu’elle soit recommandable par de bonnes œuvres, ayant élevé des enfants, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:9
      metadata:
        usfm: 1PE.4.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'exercé l’hospitalité, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 18:4
      metadata:
        usfm: GEN.18.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:2
      metadata:
        usfm: GEN.19.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 7:38
      metadata:
        usfm: LUK.7.38
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '44'
      metadata:
        usfm: LUK.7.44
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'lavé les pieds des saints, secouru les malheureux, pratiqué toute espèce de bonne œuvre. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais refuse les jeunes veuves; car, lorsque la volupté les détache du Christ, elles veulent se marier, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'et se rendent coupables en ce qu’elles violent leur premier engagement. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Avec cela, étant oisives, elles apprennent à aller de maison en maison; et non seulement elles sont oisives, mais encore '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 2:3
      metadata:
        usfm: TIT.2.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'causeuses et intrigantes, disant ce qu’il ne faut pas dire. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je veux donc que les jeunes se '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 7:9
      metadata:
        usfm: 1CO.7.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'marient, qu’elles aient des enfants, qu’elles dirigent leur maison, qu’elles ne donnent à l’adversaire aucune occasion de médire; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'car déjà quelques-unes se sont détournées pour suivre Satan. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Si quelque fidèle, homme ou femme, a des veuves, qu’il les assiste, et que l’Église n’en soit point chargée, afin qu’elle puisse assister celles qui sont véritablement veuves.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-25: cf. (1 Th 5:12, 13. 1 Co 9:7-14.) Lé 19:15, 17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 15:27
      metadata:
        usfm: ROM.15.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 9:11
      metadata:
        usfm: 1CO.9.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 6:6
      metadata:
        usfm: GAL.6.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:29
      metadata:
        usfm: PHP.2.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:12
      metadata:
        usfm: 1TH.5.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:17
      metadata:
        usfm: HEB.13.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que les anciens qui dirigent bien soient jugés dignes d’un double honneur, surtout ceux qui travaillent à la prédication et à l’enseignement. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Car l’Écriture dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 25:4
      metadata:
        usfm: DEU.25.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 9:9
      metadata:
        usfm: 1CO.9.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu n’emmuselleras point le bœuf quand il foule le grain. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:13
      metadata:
        usfm: LEV.19.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 24:14
      metadata:
        usfm: DEU.24.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:10
      metadata:
        usfm: MAT.10.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 10:7
      metadata:
        usfm: LUK.10.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et l’ouvrier mérite son salaire. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ne reçois point d’accusation contre un ancien, si ce n’est sur la déposition '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 19:15
      metadata:
        usfm: DEU.19.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de deux ou trois témoins. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ceux qui pèchent, reprends-les devant tous, afin que les autres aussi éprouvent de la crainte. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:9
      metadata:
        usfm: ROM.1.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:1
      metadata:
        usfm: ROM.9.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 1:23
      metadata:
        usfm: 2CO.1.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:31
      metadata:
        usfm: 2CO.11.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:20
      metadata:
        usfm: GAL.1.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 1:8
      metadata:
        usfm: PHP.1.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 2:5
      metadata:
        usfm: 1TH.2.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:27
      metadata:
        usfm: 1TH.5.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 6:13
      metadata:
        usfm: 1TI.6.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je te conjure devant Dieu, devant Jésus-Christ, et devant les anges élus, d’observer ces choses '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 17:4
      metadata:
        usfm: DEU.17.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:18
      metadata:
        usfm: DEU.19.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sans prévention, et de ne rien faire par faveur. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 6:6
      metadata:
        usfm: ACT.6.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:17
      metadata:
        usfm: ACT.8.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:3
      metadata:
        usfm: ACT.13.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:6
      metadata:
        usfm: ACT.19.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 4:14
      metadata:
        usfm: 1TI.4.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 1:6
      metadata:
        usfm: 2TI.1.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'N’impose les mains à personne avec précipitation, et ne participe pas aux péchés d’autrui; toi-même, conserve-toi pur. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ne continue pas à ne boire que de l’eau; mais fais usage d’un peu de vin, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 104:15
      metadata:
        usfm: PSA.104.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à cause de ton estomac et de tes fréquentes indispositions. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les péchés de certains hommes sont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:19
      metadata:
        usfm: GAL.5.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'manifestes, même avant qu’on les juge, tandis que chez d’autres, ils ne se découvrent que dans la suite. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: De même, les bonnes œuvres sont manifestes, et celles qui ne le sont pas ne peuvent rester cachées.
