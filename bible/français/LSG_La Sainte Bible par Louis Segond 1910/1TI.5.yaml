document_id: 1TI.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-2: cf. Lé 19:32. Ga 6:1.'
  - type: text
    content: 'Ne réprimande pas rudement '
  - type: note
    content: Lé 19:32.
  - type: text
    content: 'le vieillard, mais exhorte-le comme un père; exhorte les jeunes gens comme des frères, '
  '10':
  - type: text
    content: 'qu’elle soit recommandable par de bonnes œuvres, ayant élevé des enfants, '
  - type: note
    content: 1 Pi 4:9.
  - type: text
    content: 'exercé l’hospitalité, '
  - type: note
    content: Ge 18:4; 19:2. Lu 7:38, 44.
  - type: text
    content: 'lavé les pieds des saints, secouru les malheureux, pratiqué toute espèce de bonne œuvre. '
  '11':
  - type: text
    content: 'Mais refuse les jeunes veuves; car, lorsque la volupté les détache du Christ, elles veulent se marier, '
  '12':
  - type: text
    content: 'et se rendent coupables en ce qu’elles violent leur premier engagement. '
  '13':
  - type: text
    content: 'Avec cela, étant oisives, elles apprennent à aller de maison en maison; et non seulement elles sont oisives, mais encore '
  - type: note
    content: Tit 2:3.
  - type: text
    content: 'causeuses et intrigantes, disant ce qu’il ne faut pas dire. '
  '14':
  - type: text
    content: 'Je veux donc que les jeunes se '
  - type: note
    content: 1 Co 7:9.
  - type: text
    content: 'marient, qu’elles aient des enfants, qu’elles dirigent leur maison, qu’elles ne donnent à l’adversaire aucune occasion de médire; '
  '15':
  - type: text
    content: 'car déjà quelques-unes se sont détournées pour suivre Satan. '
  '16':
  - type: text
    content: Si quelque fidèle, homme ou femme, a des veuves, qu’il les assiste, et que l’Église n’en soit point chargée, afin qu’elle puisse assister celles qui sont véritablement veuves.
  - type: heading
    content: 'V. 17-25: cf. (1 Th 5:12, 13. 1 Co 9:7-14.) Lé 19:15, 17.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ro 15:27. 1 Co 9:11. Ga 6:6. Ph 2:29. 1 Th 5:12. Hé 13:17.
  - type: text
    content: 'Que les anciens qui dirigent bien soient jugés dignes d’un double honneur, surtout ceux qui travaillent à la prédication et à l’enseignement. '
  '18':
  - type: text
    content: 'Car l’Écriture dit: '
  - type: note
    content: De 25:4. 1 Co 9:9.
  - type: text
    content: 'Tu n’emmuselleras point le bœuf quand il foule le grain. '
  - type: note
    content: Lé 19:13. De 24:14. Mt 10:10. Lu 10:7.
  - type: text
    content: 'Et l’ouvrier mérite son salaire. '
  '19':
  - type: text
    content: 'Ne reçois point d’accusation contre un ancien, si ce n’est sur la déposition '
  - type: note
    content: De 19:15.
  - type: text
    content: 'de deux ou trois témoins. '
  '2':
  - type: text
    content: les femmes âgées comme des mères, celles qui sont jeunes comme des sœurs, en toute pureté.
  - type: heading
    content: Directions au sujet des veuves, des anciens, des serviteurs
  - type: heading
    content: 'V. 3-16: cf. Lu 2:36, 37. Ro 16:1, 2. 1 Co 7:34, 35.'
  '20':
  - type: text
    content: 'Ceux qui pèchent, reprends-les devant tous, afin que les autres aussi éprouvent de la crainte. '
  '21':
  - type: note
    content: Ro 1:9; 9:1. 2 Co 1:23; 11:31. Ga 1:20. Ph 1:8. 1 Th 2:5; 5:27. 1 Ti 6:13.
  - type: text
    content: 'Je te conjure devant Dieu, devant Jésus-Christ, et devant les anges élus, d’observer ces choses '
  - type: note
    content: De 17:4; 19:18.
  - type: text
    content: 'sans prévention, et de ne rien faire par faveur. '
  '22':
  - type: note
    content: Ac 6:6; 8:17; 13:3; 19:6. 1 Ti 4:14. 2 Ti 1:6.
  - type: text
    content: 'N’impose les mains à personne avec précipitation, et ne participe pas aux péchés d’autrui; toi-même, conserve-toi pur. '
  '23':
  - type: text
    content: 'Ne continue pas à ne boire que de l’eau; mais fais usage d’un peu de vin, '
  - type: note
    content: Ps 104:15.
  - type: text
    content: 'à cause de ton estomac et de tes fréquentes indispositions. '
  '24':
  - type: text
    content: 'Les péchés de certains hommes sont '
  - type: note
    content: Ga 5:19.
  - type: text
    content: 'manifestes, même avant qu’on les juge, tandis que chez d’autres, ils ne se découvrent que dans la suite. '
  '25':
  - type: text
    content: De même, les bonnes œuvres sont manifestes, et celles qui ne le sont pas ne peuvent rester cachées.
  '3':
  - type: text
    content: 'Honore les veuves qui sont véritablement veuves. '
  '4':
  - type: text
    content: 'Si une veuve a des enfants ou des petits-enfants, qu’ils apprennent avant tout à exercer la piété envers leur propre famille, et à rendre '
  - type: note
    content: Ge 45:10, 11. Mt 15:4. Mc 7:10. Ép 6:1, 2.
  - type: text
    content: 'à leurs parents ce qu’ils ont reçu d’eux; car cela est agréable à Dieu. '
  '5':
  - type: note
    content: 1 Co 7:32.
  - type: text
    content: 'Celle qui est véritablement veuve, et qui est demeurée dans l’isolement, '
  - type: note
    content: Lu 2:36.
  - type: text
    content: 'met son espérance en Dieu et persévère nuit et jour dans les supplications et les prières. '
  '6':
  - type: text
    content: 'Mais celle qui vit dans les plaisirs est morte, quoique vivante. '
  '7':
  - type: text
    content: 'Déclare-leur ces choses, afin qu’elles soient irréprochables. '
  '8':
  - type: note
    content: Ga 6:10.
  - type: text
    content: 'Si quelqu’un n’a pas soin des siens, et principalement de ceux de sa famille, il a renié la foi, et il est pire qu’un infidèle. '
  '9':
  - type: text
    content: 'Qu’une veuve, pour être inscrite sur le rôle, n’ait pas moins de soixante ans, qu’elle ait été femme d’un seul mari, '
