  - type: text
    content: INTRODUCTION AU DEUTÉRONOME
  - type: text
    content: (Ps 119:1, 2. Ec 12:15.)
  - type: text
    content: Le terme «Deutéronome» signifie «la seconde loi» ou «la répétition de la loi». Faisant suite à celui des Nombres, ce livre charnière clôt et couronne l’ensemble formé des cinq premiers livres de la Bible, d’une part, et amorce la grande section composée de Josué, Juges, Samuel et Rois, d’autre part. Il est à la fois tourné vers le passé (
  - type: text
    content: souviens-toi
  - type: text
    content: ', 8:2) et ouvert sur l’avenir ('
  - type: text
    content: L’Eternel, ton Dieu, te fera entrer dans le pays,
  - type: text
    content: ' 6:10; 8:7; 30:1-5).'
  - type: text
    content: Dans ce livre, Moïse s’adresse à un auditoire un peu différent de celui des 40 premières années de libération du peuple israélite. Il le fait dans trois grands discours (1:1–4:43; 4:44–28:68; 28:69–30:20).
  - type: text
    content: Le premier discours de Moïse (1:1–4:43) est une série de souvenirs et d’exhortations; souvenirs des conquêtes, des guerres et des souffrances endurées; souvenirs de l’amour de Dieu, de sa protection pluridimensionnelle, de l’exhortation à garder les clauses de l’alliance conclue au Sinaï afin d’éviter la colère du Dieu jaloux.
  - type: text
    content: 'Le deuxième discours de Moïse (4:44–28:68) rappelle les dix commandements (5), et donne le credo au peuple d’Israël: '
  - type: text
    content: «Écoute, Israël! L’Éternel, notre Dieu, est le seul Éternel»
  - type: text
    content: ' (6:4-5). Ce peuple a une obligation: aimer le Seigneur son Dieu, ne pas l’oublier et lui rester fidèle, car c’est par grâce qu’il est choisi parmi d’autres nations. Cette foi en un seul Dieu doit se caractériser par l’observance stricte et quotidienne des lois de l’Éternel (12–28:68).'
  - type: text
    content: 'Le troisième discours de Moïse (28:69–30:20) insiste sur ce que Dieu a fait pour Israël. Le peuple, à son tour, doit prendre au sérieux l’alliance avec Dieu. Les infidélités futures du peuple laissent toujours une possibilité de retour à Dieu. Que faire donc concrètement? '
  - type: text
    content: «J’ai mis devant toi la vie et la mort, la bénédiction et la malédiction. Choisis la vie, afin que tu vives, toi et ta postérité…»
  - type: text
    content: ' (30:19).'
  - type: text
    content: Les derniers chapitres (31–32) constituent une sorte de discours d’adieu de Moïse. Il fortifie son successeur Josué avec l’ordre de lire publiquement la loi tous les sept ans (31). En effet, comment ne pas chanter des louanges à son Dieu après une si grande aventure (32)? Comment ne pas bénir ce peuple aimé de Dieu (33)? Après avoir contemplé de loin le pays promis, Moïse meurt, âgé de 120 ans (34).
  - type: text
    content: Le Deutéronome apparaît donc comme une pressante revendication de Dieu sur le peuple d’Israël, justifiée par le fait qu’il était et reste son libérateur. Dieu est un, c’est-à-dire indivisible et fidèle à lui-même en toute occasion et en tout lieu, comme à Baal-Peor (Nb 25:3, Deut 4:3), Sichem (Jg 8:33) ou au mont Carmel (1R 18:21). À ce Dieu un doit répondre un peuple unanime.
  - type: text
    content: Le Deutéronome rappelle que le bonheur auquel toute personne aspire se trouve essentiellement dans l’obéissance constante au Dieu libérateur. Cette vie d’obéissance perpétuelle a des repères tels que le décalogue, le credo ou «shema» et «le livre de la loi», sources d’inspiration quotidienne.
