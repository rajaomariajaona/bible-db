document_id: EST.8,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Édit en faveur des Juifs
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-17: cf. Pr 13:22. (Est 3:8, etc. Job 5:11-15.) Ps 30:6, 12, 13.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'En ce même jour, le roi Assuérus donna à la reine Esther la maison d’Haman, l’ennemi des Juifs; et Mardochée parut devant le roi, car Esther avait fait connaître la parenté qui l’unissait à elle. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'On écrivit au nom du roi Assuérus, et l’on scella avec l’anneau du roi. On envoya les lettres par des courriers ayant pour montures des chevaux et des mulets nés de juments. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Par ces lettres, le roi donnait aux Juifs, en quelque ville qu’ils fussent, la permission de se rassembler et de défendre leur vie, de détruire, de tuer et de faire périr, avec leurs petits enfants et leurs femmes, tous ceux de chaque peuple et de chaque province qui prendraient les armes pour les attaquer, et de livrer leurs biens au pillage, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'et cela en un seul jour, dans toutes les provinces du roi Assuérus, le treizième du douzième mois, qui est le mois d’Adar. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ces lettres renfermaient une copie de l’édit qui devait être publié dans chaque province, et informaient tous les peuples que les Juifs se tiendraient prêts pour ce jour-là à se venger de leurs ennemis. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Les courriers, montés sur des chevaux et des mulets, partirent aussitôt et en toute hâte, d’après l’ordre du roi. L’édit fut aussi publié dans Suse, la capitale. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mardochée sortit de chez le roi, avec un vêtement royal bleu et blanc, une grande couronne d’or, et un manteau de byssus et de pourpre. La ville de Suse poussait des cris et se réjouissait. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il n’y avait pour les Juifs que bonheur et joie, allégresse et gloire. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Dans chaque province et dans chaque ville, partout où arrivaient l’ordre du roi et son édit, il y eut parmi les Juifs de la joie et de l’allégresse, des festins et des fêtes. Et beaucoup de gens d’entre les peuples du pays se firent Juifs, car la crainte des Juifs les avait saisis.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Le roi ôta son anneau, qu’il avait repris à Haman, et le donna à Mardochée; Esther, de son côté, établit Mardochée sur la maison d’Haman. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Puis Esther parla de nouveau en présence du roi. Elle se jeta à ses pieds, elle pleura, elle le supplia d’empêcher les effets de la méchanceté d’Haman, l’Agaguite, et la réussite de ses projets contre les Juifs. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Le roi tendit le sceptre d’or à Esther, qui se releva et resta debout devant le roi. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Elle dit alors: Si le roi le trouve bon et si j’ai trouvé grâce devant lui, si la chose paraît convenable au roi et si je suis agréable à ses yeux, qu’on écrive pour révoquer les lettres conçues par Haman, fils d’Hammedatha, l’Agaguite, et écrites par lui dans le but de faire périr les Juifs qui sont dans toutes les provinces du roi. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Car comment pourrais-je voir le malheur qui atteindrait mon peuple, et comment pourrais-je voir la destruction de ma race? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Le roi Assuérus dit à la reine Esther et au Juif Mardochée: Voici, j’ai donné à Esther la maison d’Haman, et il a été pendu au bois pour avoir étendu la main contre les Juifs. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Écrivez donc en faveur des Juifs comme il vous plaira, au nom du roi, et scellez avec l’anneau du roi; car une lettre écrite au nom du roi et scellée avec l’anneau du roi ne peut être révoquée. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Les secrétaires du roi furent appelés en ce temps, le vingt-troisième jour du troisième mois, qui est le mois de Sivan, et l’on écrivit, suivant tout ce qui fut ordonné par Mardochée, aux Juifs, aux satrapes, aux gouverneurs et aux chefs des cent vingt-sept provinces situées de l’Inde à l’Éthiopie, à chaque province selon son écriture, à chaque peuple selon sa langue, et aux Juifs selon leur écriture et selon leur langue. '
