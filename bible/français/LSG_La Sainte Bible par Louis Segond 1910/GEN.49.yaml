document_id: GEN.49,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Bénédiction prophétique de Jacob à ses douze fils. Mort de Jacob
  - type: heading
    content: 'V. 1-28: cf. De 33.'
  - type: text
    content: 'Jacob appela ses fils, et dit: Assemblez-vous, et je vous annoncerai ce qui vous arrivera dans la suite des temps.'
  '10':
  - type: text
    content: 'Le sceptre ne s’éloignera point '
  - type: note
    content: Mt 2:6.
  - type: text
    content: de Juda,
  - type: text
    content: Ni le bâton souverain d’entre ses pieds,
  - type: text
    content: Jusqu’à ce que vienne le Schilo,
  - type: text
    content: Et que les peuples lui obéissent.
  '11':
  - type: text
    content: Il attache à la vigne son âne,
  - type: text
    content: Et au meilleur cep le petit de son ânesse;
  - type: text
    content: Il lave dans le vin son vêtement,
  - type: text
    content: Et dans le sang des raisins son manteau.
  '12':
  - type: text
    content: Il a les yeux rouges de vin,
  - type: text
    content: Et les dents blanches de lait.
  '13':
  - type: text
    content: 'Zabulon habitera '
  - type: note
    content: Jos 19:10, 11.
  - type: text
    content: sur la côte des mers,
  - type: text
    content: Il sera sur la côte des navires,
  - type: text
    content: Et sa limite s’étendra du côté de Sidon.
  '14':
  - type: text
    content: Issacar est un âne robuste,
  - type: text
    content: Qui se couche dans les étables.
  '15':
  - type: text
    content: Il voit que le lieu où il repose est agréable,
  - type: text
    content: Et que la contrée est magnifique;
  - type: text
    content: Et il courbe son épaule sous le fardeau,
  - type: text
    content: Il s’assujettit à un tribut.
  '16':
  - type: text
    content: Dan jugera son peuple,
  - type: text
    content: Comme l’une des tribus d’Israël.
  '17':
  - type: text
    content: Dan sera un serpent sur le chemin,
  - type: text
    content: Une vipère sur le sentier,
  - type: text
    content: Mordant les talons du cheval,
  - type: text
    content: Pour que le cavalier tombe à la renverse.
  '18':
  - type: text
    content: J’espère en ton secours, ô Éternel!
  '19':
  - type: text
    content: Gad sera assailli par des bandes armées,
  - type: text
    content: Mais il les assaillira et les poursuivra.
  '2':
  - type: text
    content: Rassemblez-vous, et écoutez, fils de Jacob!
  - type: text
    content: Écoutez Israël, votre père!
  '20':
  - type: text
    content: Aser produit une nourriture excellente;
  - type: text
    content: Il fournira les mets délicats des rois.
  '21':
  - type: text
    content: Nephthali est une biche en liberté;
  - type: text
    content: Il profère de belles paroles.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 1 Ch 5:1.
  - type: text
    content: Joseph est le rejeton d’un arbre fertile,
  - type: text
    content: Le rejeton d’un arbre fertile près d’une source;
  - type: text
    content: Les branches s’élèvent au-dessus de la muraille.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Ge 50:20.
  - type: text
    content: Ils l’ont provoqué, ils ont lancé des traits;
  - type: text
    content: Les archers l’ont poursuivi de leur haine.
  '24':
  - type: text
    content: Mais son arc est demeuré ferme,
  - type: text
    content: Et ses mains ont été fortifiées
  - type: text
    content: 'Par les mains du Puissant de Jacob:'
  - type: text
    content: Il est ainsi devenu le berger, le rocher d’Israël.
  '25':
  - type: text
    content: C’est l’œuvre du Dieu de ton père, qui t’aidera;
  - type: text
    content: C’est l’œuvre du Tout-Puissant, qui te bénira
  - type: text
    content: Des bénédictions des cieux en haut,
  - type: text
    content: Des bénédictions des eaux en bas,
  - type: text
    content: Des bénédictions des mamelles et du sein maternel.
  '26':
  - type: text
    content: Les bénédictions de ton père s’élèvent
  - type: text
    content: Au-dessus des bénédictions de mes pères
  - type: text
    content: 'Jusqu’à la cime des collines éternelles:'
  - type: text
    content: Qu’elles soient sur la tête de Joseph,
  - type: text
    content: Sur le sommet de la tête du prince de ses frères!
  '27':
  - type: text
    content: Benjamin est un loup qui déchire;
  - type: text
    content: Le matin, il dévore la proie,
  - type: text
    content: Et le soir, il partage le butin.
  '28':
  - type: text
    content: Ce sont là tous ceux qui forment les douze tribus d’Israël. Et c’est là ce que leur dit leur père, en les bénissant. Il les bénit, chacun selon sa bénédiction.
  - type: heading
    content: 'V. 29-33: cf. Ge 23:1, etc.; 50:4-13.'
  '29':
  - type: text
    content: 'Puis il leur donna cet ordre: Je vais être recueilli auprès de mon peuple; enterrez-moi avec mes pères, dans la caverne qui est au champ d’Éphron, le Héthien, '
  '3':
  - type: text
    content: 'Ruben, toi, '
  - type: note
    content: Ge 29:32.
  - type: text
    content: mon premier-né,
  - type: text
    content: Ma force et les prémices de ma vigueur,
  - type: text
    content: Supérieur en dignité et supérieur en puissance,
  '30':
  - type: text
    content: 'dans la caverne '
  - type: note
    content: Ge 23:9, 16.
  - type: text
    content: 'du champ de Macpéla, vis-à-vis de Mamré, dans le pays de Canaan. C’est le champ qu’Abraham a acheté d’Éphron, le Héthien, comme propriété sépulcrale. '
  '31':
  - type: text
    content: 'Là on a enterré '
  - type: note
    content: Ge 25:9; 35:29. Ac 7:16.
  - type: text
    content: 'Abraham et Sara, sa femme; là on a enterré Isaac et Rebecca, sa femme; et là j’ai enterré Léa. '
  '32':
  - type: text
    content: 'Le champ et la caverne qui s’y trouve ont été achetés des fils de Heth. '
  '33':
  - type: text
    content: 'Lorsque Jacob eut achevé de donner ses ordres à ses fils, '
  - type: note
    content: Ac 7:15.
  - type: text
    content: il retira ses pieds dans le lit, il expira, et fut recueilli auprès de son peuple.
  '4':
  - type: text
    content: Impétueux comme les eaux, tu n’auras pas la prééminence!
  - type: note
    content: Ge 35:22. 1 Ch 5:1.
  - type: text
    content: Car tu es monté sur la couche de ton père,
  - type: text
    content: Tu as souillé ma couche en y montant.
  '5':
  - type: text
    content: Siméon et Lévi sont frères;
  - type: text
    content: Leurs glaives sont des instruments de violence.
  '6':
  - type: text
    content: Que mon âme n’entre point dans leur conciliabule,
  - type: text
    content: Que mon esprit ne s’unisse point à leur assemblée!
  - type: text
    content: 'Car, dans leur colère, '
  - type: note
    content: Ge 34:25.
  - type: text
    content: ils ont tué des hommes,
  - type: text
    content: Et, dans leur méchanceté, ils ont coupé les jarrets des taureaux.
  '7':
  - type: text
    content: Maudite soit leur colère, car elle est violente,
  - type: text
    content: Et leur fureur, car elle est cruelle!
  - type: text
    content: 'Je les '
  - type: note
    content: Jos 19:1; 21:3, 4, etc.
  - type: text
    content: séparerai dans Jacob,
  - type: text
    content: Et je les disperserai dans Israël.
  '8':
  - type: text
    content: Juda, tu recevras les hommages de tes frères;
  - type: text
    content: Ta main sera sur la nuque de tes ennemis.
  - type: text
    content: Les fils de ton père se prosterneront devant toi.
  '9':
  - type: text
    content: 'Juda '
  - type: note
    content: No 24:9. Mi 5:7.
  - type: text
    content: est un jeune lion.
  - type: text
    content: Tu reviens du carnage, mon fils!
  - type: text
    content: Il ploie les genoux, il se couche comme un lion,
  - type: text
    content: 'Comme une lionne: qui le fera lever?'
