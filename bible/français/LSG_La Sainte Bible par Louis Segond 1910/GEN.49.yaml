document_id: GEN.49,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Bénédiction prophétique de Jacob à ses douze fils. Mort de Jacob
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-28: cf. De 33.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob appela ses fils, et dit: Assemblez-vous, et je vous annoncerai ce qui vous arrivera dans la suite des temps.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le sceptre ne s’éloignera point '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 2:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni le bâton souverain d’entre ses pieds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ce que vienne le Schilo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que les peuples lui obéissent.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il attache à la vigne son âne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et au meilleur cep le petit de son ânesse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il lave dans le vin son vêtement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dans le sang des raisins son manteau.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a les yeux rouges de vin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les dents blanches de lait.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Zabulon habitera '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 19:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: sur la côte des mers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il sera sur la côte des navires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa limite s’étendra du côté de Sidon.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Issacar est un âne robuste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui se couche dans les étables.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il voit que le lieu où il repose est agréable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que la contrée est magnifique;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il courbe son épaule sous le fardeau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’assujettit à un tribut.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dan jugera son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme l’une des tribus d’Israël.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dan sera un serpent sur le chemin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une vipère sur le sentier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mordant les talons du cheval,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que le cavalier tombe à la renverse.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’espère en ton secours, ô Éternel!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gad sera assailli par des bandes armées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il les assaillira et les poursuivra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rassemblez-vous, et écoutez, fils de Jacob!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoutez Israël, votre père!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aser produit une nourriture excellente;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fournira les mets délicats des rois.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nephthali est une biche en liberté;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il profère de belles paroles.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 5:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Joseph est le rejeton d’un arbre fertile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le rejeton d’un arbre fertile près d’une source;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les branches s’élèvent au-dessus de la muraille.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 50:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils l’ont provoqué, ils ont lancé des traits;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les archers l’ont poursuivi de leur haine.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais son arc est demeuré ferme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses mains ont été fortifiées
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Par les mains du Puissant de Jacob:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est ainsi devenu le berger, le rocher d’Israël.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est l’œuvre du Dieu de ton père, qui t’aidera;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est l’œuvre du Tout-Puissant, qui te bénira
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des bénédictions des cieux en haut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des bénédictions des eaux en bas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des bénédictions des mamelles et du sein maternel.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les bénédictions de ton père s’élèvent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au-dessus des bénédictions de mes pères
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Jusqu’à la cime des collines éternelles:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’elles soient sur la tête de Joseph,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur le sommet de la tête du prince de ses frères!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Benjamin est un loup qui déchire;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le matin, il dévore la proie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le soir, il partage le butin.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce sont là tous ceux qui forment les douze tribus d’Israël. Et c’est là ce que leur dit leur père, en les bénissant. Il les bénit, chacun selon sa bénédiction.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 29-33: cf. Ge 23:1, etc.; 50:4-13.'
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il leur donna cet ordre: Je vais être recueilli auprès de mon peuple; enterrez-moi avec mes pères, dans la caverne qui est au champ d’Éphron, le Héthien, '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ruben, toi, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 29:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: mon premier-né,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma force et les prémices de ma vigueur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Supérieur en dignité et supérieur en puissance,
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dans la caverne '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 23:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'du champ de Macpéla, vis-à-vis de Mamré, dans le pays de Canaan. C’est le champ qu’Abraham a acheté d’Éphron, le Héthien, comme propriété sépulcrale. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Là on a enterré '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 25:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 35:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Abraham et Sara, sa femme; là on a enterré Isaac et Rebecca, sa femme; et là j’ai enterré Léa. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le champ et la caverne qui s’y trouve ont été achetés des fils de Heth. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Jacob eut achevé de donner ses ordres à ses fils, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: il retira ses pieds dans le lit, il expira, et fut recueilli auprès de son peuple.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Impétueux comme les eaux, tu n’auras pas la prééminence!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 35:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 5:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car tu es monté sur la couche de ton père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as souillé ma couche en y montant.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Siméon et Lévi sont frères;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs glaives sont des instruments de violence.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que mon âme n’entre point dans leur conciliabule,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que mon esprit ne s’unisse point à leur assemblée!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car, dans leur colère, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 34:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ils ont tué des hommes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et, dans leur méchanceté, ils ont coupé les jarrets des taureaux.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maudite soit leur colère, car elle est violente,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leur fureur, car elle est cruelle!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 19:1
      - type: text
        text: ; 21:3, 4, etc.
      marker-yv: yv-n
    - type: text
      text: séparerai dans Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je les disperserai dans Israël.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Juda, tu recevras les hommages de tes frères;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta main sera sur la nuque de tes ennemis.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les fils de ton père se prosterneront devant toi.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Juda '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 24:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 5:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: est un jeune lion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu reviens du carnage, mon fils!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ploie les genoux, il se couche comme un lion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Comme une lionne: qui le fera lever?'
