document_id: ISA.33,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-12: cf. És 10:5-19. Ps 46.'
  - type: text
    content: Malheur à toi qui ravages, et qui n’as pas été ravagé!
  - type: text
    content: Qui pilles, et qu’on n’a pas encore pillé!
  - type: text
    content: Quand tu auras fini de ravager, tu seras ravagé;
  - type: text
    content: Quand tu auras achevé de piller, on te pillera.
  '10':
  - type: text
    content: Maintenant je me lèverai,
  - type: text
    content: Dit l’Éternel,
  - type: text
    content: Maintenant je serai exalté,
  - type: text
    content: Maintenant je serai élevé.
  '11':
  - type: text
    content: Vous avez conçu du foin,
  - type: text
    content: Vous enfanterez de la paille;
  - type: text
    content: Votre souffle,
  - type: text
    content: C’est un feu qui vous consumera.
  '12':
  - type: text
    content: Les peuples seront
  - type: text
    content: Des fournaises de chaux,
  - type: text
    content: Des épines coupées
  - type: text
    content: Qui brûlent dans le feu.
  - type: heading
    content: 'V. 13-16: cf. Hé 10:26, 27. Ps 15.'
  '13':
  - type: text
    content: Vous qui êtes loin, écoutez ce que j’ai fait!
  - type: text
    content: Et vous qui êtes près, sachez quelle est ma puissance!
  '14':
  - type: text
    content: Les pécheurs sont effrayés dans Sion,
  - type: text
    content: 'Un tremblement saisit les impies:'
  - type: text
    content: Qui de nous pourra rester auprès d’un feu dévorant?
  - type: text
    content: Qui de nous pourra rester auprès de flammes éternelles?
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ps 15:2; 24:3.
  - type: text
    content: Celui qui marche dans la justice,
  - type: text
    content: Et qui parle selon la droiture,
  - type: text
    content: Qui méprise un gain acquis par extorsion,
  - type: text
    content: Qui secoue les mains pour ne pas accepter un présent,
  - type: text
    content: Qui ferme l’oreille pour ne pas entendre des propos sanguinaires,
  - type: text
    content: Et qui se bande les yeux pour ne pas voir le mal,
  '16':
  - type: text
    content: Celui-là habitera dans des lieux élevés;
  - type: text
    content: Des rochers fortifiés seront sa retraite;
  - type: text
    content: Du pain lui sera donné,
  - type: text
    content: De l’eau lui sera assurée.
  - type: heading
    content: 'V. 17-24: cf. 2 Ch 32:22, etc. Ap 21:2-4.'
  '17':
  - type: text
    content: Tes yeux verront le roi dans sa magnificence,
  - type: text
    content: Ils contempleront le pays dans toute son étendue.
  '18':
  - type: text
    content: 'Ton cœur se souviendra de la terreur:'
  - type: text
    content: Où est le secrétaire, où est le trésorier?
  - type: text
    content: Où est celui qui inspectait les tours?
  '19':
  - type: text
    content: Tu ne verras plus le peuple audacieux,
  - type: text
    content: Le peuple au langage obscur qu’on n’entend pas,
  - type: text
    content: A la langue barbare qu’on ne comprend pas.
  '2':
  - type: text
    content: Éternel, aie pitié de nous!
  - type: text
    content: Nous espérons en toi.
  - type: text
    content: Sois notre aide chaque matin,
  - type: text
    content: Et notre délivrance au temps de la détresse!
  '20':
  - type: text
    content: Regarde Sion, la cité de nos fêtes!
  - type: text
    content: Tes yeux verront Jérusalem, séjour tranquille,
  - type: note
    content: Ps 46:6; 125:1, 2.
  - type: text
    content: Tente qui ne sera plus transportée,
  - type: text
    content: Dont les pieux ne seront jamais enlevés,
  - type: text
    content: Et dont les cordages ne seront point détachés.
  '21':
  - type: text
    content: 'C’est là vraiment que l’Éternel est magnifique pour nous:'
  - type: text
    content: Il nous tient lieu de fleuves, de vastes rivières,
  - type: text
    content: Où ne pénètrent point de navires à rames,
  - type: text
    content: Et que ne traverse aucun grand vaisseau.
  '22':
  - type: text
    content: Car l’Éternel est notre juge,
  - type: text
    content: L’Éternel est notre législateur,
  - type: text
    content: 'L’Éternel est notre roi:'
  - type: text
    content: C’est lui qui nous sauve.
  '23':
  - type: text
    content: Tes cordages sont relâchés;
  - type: text
    content: Ils ne serrent plus le pied du mât et ne tendent plus les voiles.
  - type: text
    content: Alors on partage la dépouille d’un immense butin;
  - type: text
    content: 'Les boiteux même prennent part au pillage:'
  '24':
  - type: text
    content: 'Aucun habitant ne dit: Je suis malade!'
  - type: text
    content: Le peuple de Jérusalem reçoit le pardon de ses iniquités.
  '3':
  - type: text
    content: Quand ta voix retentit,
  - type: text
    content: Les peuples fuient;
  - type: text
    content: Quand tu te lèves,
  - type: text
    content: Les nations se dispersent.
  '4':
  - type: text
    content: On moissonne votre butin,
  - type: text
    content: Comme moissonne la sauterelle;
  - type: text
    content: On se précipite dessus,
  - type: text
    content: Comme se précipitent les sauterelles.
  '5':
  - type: text
    content: L’Éternel est élevé,
  - type: text
    content: Car il habite en haut;
  - type: text
    content: Il remplit Sion
  - type: text
    content: De droiture et de justice.
  '6':
  - type: text
    content: Tes jours seront en sûreté;
  - type: text
    content: La sagesse et l’intelligence sont une source de salut;
  - type: text
    content: La crainte de l’Éternel,
  - type: text
    content: C’est là le trésor de Sion.
  '7':
  - type: text
    content: Voici, les héros
  - type: text
    content: Poussent des cris au-dehors;
  - type: text
    content: Les messagers de paix
  - type: text
    content: Pleurent amèrement.
  '8':
  - type: text
    content: Les routes sont désertes;
  - type: text
    content: On ne passe plus dans les chemins.
  - type: text
    content: Il a rompu l’alliance, il méprise les villes,
  - type: text
    content: Il n’a de respect pour personne.
  '9':
  - type: text
    content: Le pays est dans le deuil, dans la tristesse;
  - type: text
    content: Le Liban est confus, languissant;
  - type: text
    content: Le Saron est comme un désert;
  - type: text
    content: Le Basan et le Carmel secouent leur feuillage.
