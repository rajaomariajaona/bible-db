document_id: ISA.33
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-12: cf. És 10:5-19. Ps 46.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Malheur à toi qui ravages, et qui n’as pas été ravagé!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui pilles, et qu’on n’a pas encore pillé!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand tu auras fini de ravager, tu seras ravagé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand tu auras achevé de piller, on te pillera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Éternel, aie pitié de nous!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous espérons en toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sois notre aide chaque matin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et notre délivrance au temps de la détresse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Quand ta voix retentit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les peuples fuient;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand tu te lèves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les nations se dispersent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: On moissonne votre butin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme moissonne la sauterelle;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On se précipite dessus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme se précipitent les sauterelles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L’Éternel est élevé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il habite en haut;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il remplit Sion
- type: usfm
  marker: q1
  children:
  - type: text
    text: De droiture et de justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tes jours seront en sûreté;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La sagesse et l’intelligence sont une source de salut;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La crainte de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est là le trésor de Sion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Voici, les héros
- type: usfm
  marker: q1
  children:
  - type: text
    text: Poussent des cris au-dehors;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les messagers de paix
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pleurent amèrement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les routes sont désertes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On ne passe plus dans les chemins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a rompu l’alliance, il méprise les villes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’a de respect pour personne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le pays est dans le deuil, dans la tristesse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Liban est confus, languissant;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Saron est comme un désert;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Basan et le Carmel secouent leur feuillage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Maintenant je me lèverai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant je serai exalté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant je serai élevé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Vous avez conçu du foin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous enfanterez de la paille;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Votre souffle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est un feu qui vous consumera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les peuples seront
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des fournaises de chaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des épines coupées
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui brûlent dans le feu.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-16: cf. Hé 10:26, 27. Ps 15.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vous qui êtes loin, écoutez ce que j’ai fait!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous qui êtes près, sachez quelle est ma puissance!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les pécheurs sont effrayés dans Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Un tremblement saisit les impies:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui de nous pourra rester auprès d’un feu dévorant?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui de nous pourra rester auprès de flammes éternelles?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 15:2
      metadata:
        usfm: PSA.15.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:3
      metadata:
        usfm: PSA.24.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui marche dans la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui parle selon la droiture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui méprise un gain acquis par extorsion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui secoue les mains pour ne pas accepter un présent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui ferme l’oreille pour ne pas entendre des propos sanguinaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui se bande les yeux pour ne pas voir le mal,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Celui-là habitera dans des lieux élevés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des rochers fortifiés seront sa retraite;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du pain lui sera donné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De l’eau lui sera assurée.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-24: cf. 2 Ch 32:22, etc. Ap 21:2-4.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tes yeux verront le roi dans sa magnificence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils contempleront le pays dans toute son étendue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ton cœur se souviendra de la terreur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où est le secrétaire, où est le trésorier?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où est celui qui inspectait les tours?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tu ne verras plus le peuple audacieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le peuple au langage obscur qu’on n’entend pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A la langue barbare qu’on ne comprend pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Regarde Sion, la cité de nos fêtes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes yeux verront Jérusalem, séjour tranquille,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 46:6
      metadata:
        usfm: PSA.46.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 125:1
      metadata:
        usfm: PSA.125.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: PSA.125.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tente qui ne sera plus transportée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dont les pieux ne seront jamais enlevés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et dont les cordages ne seront point détachés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'C’est là vraiment que l’Éternel est magnifique pour nous:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il nous tient lieu de fleuves, de vastes rivières,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où ne pénètrent point de navires à rames,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que ne traverse aucun grand vaisseau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Car l’Éternel est notre juge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel est notre législateur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'L’Éternel est notre roi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est lui qui nous sauve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tes cordages sont relâchés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne serrent plus le pied du mât et ne tendent plus les voiles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors on partage la dépouille d’un immense butin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Les boiteux même prennent part au pillage:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Aucun habitant ne dit: Je suis malade!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le peuple de Jérusalem reçoit le pardon de ses iniquités.
