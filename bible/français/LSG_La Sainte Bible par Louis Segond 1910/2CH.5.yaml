document_id: 2CH.5,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ainsi fut achevé tout l’ouvrage que Salomon fit pour la maison de l’Éternel. Puis il apporta l’argent, l’or et tous les ustensiles que David, son père, avait consacrés, et il les mit dans les trésors de la maison de Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dédicace du temple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 2-14: cf. 1 R 8:1-11. 1 Ch 15.'
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Il n’y avait dans l’arche que les deux tables que Moïse y plaça en Horeb, lorsque l’Éternel fit alliance avec les enfants d’Israël, à leur sortie d’Égypte. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Au moment où les sacrificateurs sortirent du lieu saint, car tous les sacrificateurs présents s’étaient sanctifiés sans observer l’ordre des classes, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'et tous les Lévites qui étaient chantres, Asaph, Héman, Jeduthun, leurs fils et leurs frères, revêtus de byssus, se tenaient à l’orient de l’autel avec des cymbales, des luths et des harpes, et avaient auprès d’eux cent vingt sacrificateurs sonnant des trompettes, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'et lorsque ceux qui sonnaient des trompettes et ceux qui chantaient, s’unissant d’un même accord pour célébrer et pour louer l’Éternel, firent retentir les trompettes, les cymbales et les autres instruments, et célébrèrent l’Éternel par ces paroles: Car il est bon, car sa miséricorde dure à toujours! En ce moment, la maison, la maison de l’Éternel fut remplie d’une nuée. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Les sacrificateurs ne purent pas y rester pour faire le service, à cause de la nuée; car la gloire de l’Éternel remplissait la maison de Dieu.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Alors Salomon assembla à Jérusalem les anciens d’Israël et tous les chefs des tribus, les chefs de famille des enfants d’Israël, pour transporter de la cité de David, qui est Sion, l’arche de l’alliance de l’Éternel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tous les hommes d’Israël se réunirent auprès du roi pour la fête, qui se célébra le septième mois. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Lorsque tous les anciens d’Israël furent arrivés, les Lévites portèrent l’arche. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ils transportèrent l’arche, la tente d’assignation, et tous les ustensiles sacrés qui étaient dans la tente: ce furent les sacrificateurs et les Lévites qui les transportèrent. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Le roi Salomon et toute l’assemblée d’Israël convoquée auprès de lui se tinrent devant l’arche. Ils sacrifièrent des brebis et des bœufs, qui ne purent être ni comptés, ni nombrés, à cause de leur multitude. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les sacrificateurs portèrent l’arche de l’alliance de l’Éternel à sa place, dans le sanctuaire de la maison, dans le lieu très saint, sous les ailes des chérubins. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Les chérubins avaient les ailes étendues sur la place de l’arche, et ils couvraient l’arche et ses barres par-dessus. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'On avait donné aux barres une longueur telle que leurs extrémités se voyaient à distance de l’arche devant le sanctuaire, mais ne se voyaient point du dehors. L’arche a été là jusqu’à ce jour. '
