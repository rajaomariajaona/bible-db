document_id: PSA.35
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 1 S 24. (Ps 7; 59; 70; 109; 140.) Ex 23:22.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éternel! Défends-moi contre mes adversaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Combats ceux qui me combattent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Saisis le petit et le grand bouclier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et lève-toi pour me secourir!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Brandis la lance et le javelot contre mes persécuteurs!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dis à mon âme: Je suis ton salut!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 40:15
      metadata:
        usfm: PSA.40.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 70:3
      metadata:
        usfm: PSA.70.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qu’ils soient honteux et confus, ceux qui en veulent à ma vie!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils reculent et rougissent, ceux qui méditent ma perte!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Qu’ils soient comme '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 21:18
      metadata:
        usfm: JOB.21.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 1:4
      metadata:
        usfm: PSA.1.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 29:5
      metadata:
        usfm: ISA.29.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 13:3
      metadata:
        usfm: HOS.13.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: la balle emportée par le vent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que l’ange de l’Éternel les chasse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Que leur route soit ténébreuse et glissante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que l’ange de l’Éternel les poursuive!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Car sans cause ils m’ont tendu leur filet sur une fosse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans cause ils l’ont creusée pour m’ôter la vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Que la ruine les atteigne à l’improviste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils soient pris dans le filet qu’ils ont tendu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils y tombent et périssent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Et mon âme aura de la joie en l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De l’allégresse en son salut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tous mes os diront: Éternel! Qui peut, comme toi,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Délivrer le malheureux d’un plus fort que lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le malheureux et le pauvre de celui qui le dépouille?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'De faux témoins se lèvent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils m’interrogent sur ce que j’ignore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils me rendent le mal pour le bien:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon âme est dans l’abandon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Et moi, quand ils étaient malades, je revêtais un sac,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’humiliais mon âme par le jeûne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je priais, la tête penchée sur mon sein.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Comme pour un ami, pour un frère, je me traînais lentement;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme pour le deuil d’une mère, je me courbais avec tristesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Puis, quand je chancelle, ils se réjouissent et s’assemblent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils s’assemblent à mon insu pour m’outrager,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils me déchirent sans relâche;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Avec les impies, les parasites moqueurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils grincent des dents contre moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Seigneur! Jusques à quand le verras-tu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Protège mon âme contre leurs embûches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma vie contre les lionceaux!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 40:10
      metadata:
        usfm: PSA.40.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: PSA.40.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 111:1
      metadata:
        usfm: PSA.111.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je te louerai dans la grande assemblée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te célébrerai au milieu d’un peuple nombreux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Que ceux qui sont à tort mes ennemis ne se réjouissent pas à mon sujet,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 15:25
      metadata:
        usfm: JHN.15.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Que ceux qui me haïssent sans cause ne m’insultent pas du regard!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Car ils tiennent un langage qui n’est point celui de la paix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils méditent la tromperie contre les gens tranquilles du pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils ouvrent contre moi leur bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils disent: Ah! Ah! Nos yeux regardent!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Éternel, tu le vois! Ne reste pas en silence!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seigneur, ne t’éloigne pas de moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Réveille-toi, réveille-toi pour me faire justice!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon Dieu et mon Seigneur, défends ma cause!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Juge-moi selon ta justice, Éternel, mon Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’ils ne se réjouissent pas à mon sujet!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Qu’ils ne disent pas dans leur cœur: Ah! Voilà ce que nous voulions!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Qu’ils ne disent pas: Nous l’avons englouti!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Que tous ensemble ils soient honteux et confus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui se réjouissent de mon malheur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils revêtent l’ignominie et l’opprobre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui s’élèvent contre moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Qu’ils aient de l’allégresse et de la joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui prennent plaisir à mon innocence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et que sans cesse ils disent: Exalté soit l’Éternel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui veut la paix de son serviteur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Et ma langue célébrera ta justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle dira tous les jours ta louange.
