document_id: PSA.35,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1 S 24. (Ps 7; 59; 70; 109; 140.) Ex 23:22.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel! Défends-moi contre mes adversaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Combats ceux qui me combattent!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tous mes os diront: Éternel! Qui peut, comme toi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivrer le malheureux d’un plus fort que lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le malheureux et le pauvre de celui qui le dépouille?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'De faux témoins se lèvent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils m’interrogent sur ce que j’ignore.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils me rendent le mal pour le bien:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme est dans l’abandon.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et moi, quand ils étaient malades, je revêtais un sac,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’humiliais mon âme par le jeûne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je priais, la tête penchée sur mon sein.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme pour un ami, pour un frère, je me traînais lentement;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme pour le deuil d’une mère, je me courbais avec tristesse.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis, quand je chancelle, ils se réjouissent et s’assemblent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils s’assemblent à mon insu pour m’outrager,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils me déchirent sans relâche;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec les impies, les parasites moqueurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils grincent des dents contre moi.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur! Jusques à quand le verras-tu?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Protège mon âme contre leurs embûches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma vie contre les lionceaux!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 40:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 111:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je te louerai dans la grande assemblée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te célébrerai au milieu d’un peuple nombreux.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ceux qui sont à tort mes ennemis ne se réjouissent pas à mon sujet,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 15:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que ceux qui me haïssent sans cause ne m’insultent pas du regard!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saisis le petit et le grand bouclier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et lève-toi pour me secourir!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils tiennent un langage qui n’est point celui de la paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils méditent la tromperie contre les gens tranquilles du pays.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ouvrent contre moi leur bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils disent: Ah! Ah! Nos yeux regardent!'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, tu le vois! Ne reste pas en silence!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur, ne t’éloigne pas de moi!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réveille-toi, réveille-toi pour me faire justice!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu et mon Seigneur, défends ma cause!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Juge-moi selon ta justice, Éternel, mon Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’ils ne se réjouissent pas à mon sujet!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qu’ils ne disent pas dans leur cœur: Ah! Voilà ce que nous voulions!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qu’ils ne disent pas: Nous l’avons englouti!'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tous ensemble ils soient honteux et confus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui se réjouissent de mon malheur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils revêtent l’ignominie et l’opprobre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui s’élèvent contre moi!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils aient de l’allégresse et de la joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui prennent plaisir à mon innocence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et que sans cesse ils disent: Exalté soit l’Éternel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui veut la paix de son serviteur!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ma langue célébrera ta justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle dira tous les jours ta louange.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Brandis la lance et le javelot contre mes persécuteurs!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dis à mon âme: Je suis ton salut!'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 40:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 70:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qu’ils soient honteux et confus, ceux qui en veulent à ma vie!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils reculent et rougissent, ceux qui méditent ma perte!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qu’ils soient comme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 21:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 1:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 29:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 13:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: la balle emportée par le vent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que l’ange de l’Éternel les chasse!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que leur route soit ténébreuse et glissante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que l’ange de l’Éternel les poursuive!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car sans cause ils m’ont tendu leur filet sur une fosse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans cause ils l’ont creusée pour m’ôter la vie.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la ruine les atteigne à l’improviste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils soient pris dans le filet qu’ils ont tendu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils y tombent et périssent!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon âme aura de la joie en l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De l’allégresse en son salut.
