document_id: PSA.35,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 1 S 24. (Ps 7; 59; 70; 109; 140.) Ex 23:22.
  - type: text
    content: De David.
  - type: text
    content: Éternel! Défends-moi contre mes adversaires,
  - type: text
    content: Combats ceux qui me combattent!
  '10':
  - type: text
    content: 'Tous mes os diront: Éternel! Qui peut, comme toi,'
  - type: text
    content: Délivrer le malheureux d’un plus fort que lui,
  - type: text
    content: Le malheureux et le pauvre de celui qui le dépouille?
  '11':
  - type: text
    content: 'De faux témoins se lèvent:'
  - type: text
    content: Ils m’interrogent sur ce que j’ignore.
  '12':
  - type: text
    content: 'Ils me rendent le mal pour le bien:'
  - type: text
    content: Mon âme est dans l’abandon.
  '13':
  - type: text
    content: Et moi, quand ils étaient malades, je revêtais un sac,
  - type: text
    content: J’humiliais mon âme par le jeûne,
  - type: text
    content: Je priais, la tête penchée sur mon sein.
  '14':
  - type: text
    content: Comme pour un ami, pour un frère, je me traînais lentement;
  - type: text
    content: Comme pour le deuil d’une mère, je me courbais avec tristesse.
  '15':
  - type: text
    content: Puis, quand je chancelle, ils se réjouissent et s’assemblent,
  - type: text
    content: Ils s’assemblent à mon insu pour m’outrager,
  - type: text
    content: Ils me déchirent sans relâche;
  '16':
  - type: text
    content: Avec les impies, les parasites moqueurs,
  - type: text
    content: Ils grincent des dents contre moi.
  '17':
  - type: text
    content: Seigneur! Jusques à quand le verras-tu?
  - type: text
    content: Protège mon âme contre leurs embûches,
  - type: text
    content: Ma vie contre les lionceaux!
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ps 40:10, 11; 111:1.
  - type: text
    content: Je te louerai dans la grande assemblée,
  - type: text
    content: Je te célébrerai au milieu d’un peuple nombreux.
  '19':
  - type: text
    content: Que ceux qui sont à tort mes ennemis ne se réjouissent pas à mon sujet,
  - type: note
    content: Jn 15:25.
  - type: text
    content: Que ceux qui me haïssent sans cause ne m’insultent pas du regard!
  '2':
  - type: text
    content: Saisis le petit et le grand bouclier,
  - type: text
    content: Et lève-toi pour me secourir!
  '20':
  - type: text
    content: Car ils tiennent un langage qui n’est point celui de la paix,
  - type: text
    content: Ils méditent la tromperie contre les gens tranquilles du pays.
  '21':
  - type: text
    content: Ils ouvrent contre moi leur bouche,
  - type: text
    content: 'Ils disent: Ah! Ah! Nos yeux regardent!'
  '22':
  - type: text
    content: Éternel, tu le vois! Ne reste pas en silence!
  - type: text
    content: Seigneur, ne t’éloigne pas de moi!
  '23':
  - type: text
    content: Réveille-toi, réveille-toi pour me faire justice!
  - type: text
    content: Mon Dieu et mon Seigneur, défends ma cause!
  '24':
  - type: text
    content: Juge-moi selon ta justice, Éternel, mon Dieu!
  - type: text
    content: Et qu’ils ne se réjouissent pas à mon sujet!
  '25':
  - type: text
    content: 'Qu’ils ne disent pas dans leur cœur: Ah! Voilà ce que nous voulions!'
  - type: text
    content: 'Qu’ils ne disent pas: Nous l’avons englouti!'
  '26':
  - type: text
    content: Que tous ensemble ils soient honteux et confus,
  - type: text
    content: Ceux qui se réjouissent de mon malheur!
  - type: text
    content: Qu’ils revêtent l’ignominie et l’opprobre,
  - type: text
    content: Ceux qui s’élèvent contre moi!
  '27':
  - type: text
    content: Qu’ils aient de l’allégresse et de la joie,
  - type: text
    content: Ceux qui prennent plaisir à mon innocence,
  - type: text
    content: 'Et que sans cesse ils disent: Exalté soit l’Éternel,'
  - type: text
    content: Qui veut la paix de son serviteur!
  '28':
  - type: text
    content: Et ma langue célébrera ta justice,
  - type: text
    content: Elle dira tous les jours ta louange.
  '3':
  - type: text
    content: Brandis la lance et le javelot contre mes persécuteurs!
  - type: text
    content: 'Dis à mon âme: Je suis ton salut!'
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ps 40:15; 70:3.
  - type: text
    content: Qu’ils soient honteux et confus, ceux qui en veulent à ma vie!
  - type: text
    content: Qu’ils reculent et rougissent, ceux qui méditent ma perte!
  '5':
  - type: text
    content: 'Qu’ils soient comme '
  - type: note
    content: Job 21:18. Ps 1:4. És 29:5. Os 13:3.
  - type: text
    content: la balle emportée par le vent,
  - type: text
    content: Et que l’ange de l’Éternel les chasse!
  '6':
  - type: text
    content: Que leur route soit ténébreuse et glissante,
  - type: text
    content: Et que l’ange de l’Éternel les poursuive!
  '7':
  - type: text
    content: Car sans cause ils m’ont tendu leur filet sur une fosse,
  - type: text
    content: Sans cause ils l’ont creusée pour m’ôter la vie.
  '8':
  - type: text
    content: Que la ruine les atteigne à l’improviste,
  - type: text
    content: Qu’ils soient pris dans le filet qu’ils ont tendu,
  - type: text
    content: Qu’ils y tombent et périssent!
  '9':
  - type: text
    content: Et mon âme aura de la joie en l’Éternel,
  - type: text
    content: De l’allégresse en son salut.
