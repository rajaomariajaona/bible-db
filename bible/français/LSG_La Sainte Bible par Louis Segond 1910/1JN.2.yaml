document_id: 1JN.2
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mes petits enfants, je vous écris ces choses, afin que vous ne péchiez point. Et si quelqu’un a péché, nous avons '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 2:5
      metadata:
        usfm: 1TI.2.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 7:25
      metadata:
        usfm: HEB.7.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un avocat auprès du Père, Jésus-Christ le juste. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il est lui-même '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 3:25
      metadata:
        usfm: ROM.3.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:18
      metadata:
        usfm: 2CO.5.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:20
      metadata:
        usfm: COL.1.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 4:10
      metadata:
        usfm: 1JN.4.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une victime expiatoire pour nos péchés, non seulement pour les nôtres, mais aussi pour ceux '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 4:42
      metadata:
        usfm: JHN.4.42
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 4:14
      metadata:
        usfm: 1JN.4.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: du monde entier.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’observation des commandements. L’amour fraternel; le détachement du monde
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 3-6: cf. Mt 7:21-23. Jn 14:21-24.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Si nous gardons ses commandements, par là nous savons que nous l’avons connu. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 4:20
      metadata:
        usfm: 1JN.4.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Celui qui dit: Je l’ai connu, et qui ne garde pas ses commandements, est un menteur, et la vérité n’est point en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais celui qui garde sa parole, l’amour de Dieu est véritablement parfait en lui: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:35
      metadata:
        usfm: JHN.13.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'par là nous savons que nous sommes en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Celui qui dit qu’il demeure en lui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:15
      metadata:
        usfm: JHN.13.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:21
      metadata:
        usfm: 1PE.2.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: doit marcher aussi comme il a marché lui-même.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-11: cf. (Jn 13:34, 35; 15:12-14.) Pr 4:18, 19.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Bien-aimés, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Jn v. 5.
    marker-yv: yv-n
  - type: text
    text: 'ce n’est pas un commandement nouveau que je vous écris, mais un commandement ancien que vous avez eu dès le commencement; ce commandement ancien, c’est la parole que vous avez entendue. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Toutefois, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:34
      metadata:
        usfm: JHN.13.34
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:12
      metadata:
        usfm: JHN.15.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'c’est un commandement nouveau que je vous écris, ce qui est vrai en lui et en vous, car les ténèbres se dissipent et la lumière véritable paraît déjà. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Celui qui dit qu’il est dans la lumière, et qui hait son frère, est encore dans les ténèbres. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:14
      metadata:
        usfm: 1JN.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Celui qui aime son frère '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:35
      metadata:
        usfm: JHN.12.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'demeure dans la lumière, et aucune occasion de chute n’est en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais celui qui hait son frère est dans les ténèbres, il marche dans les ténèbres, et il ne sait où il va, parce que les ténèbres ont aveuglé ses yeux.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-17: cf. 1 Th 2:11, 12. (Ro 12:2. Col 3:1-3. Ja 4:4. Mt 6:24.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 24:47
      metadata:
        usfm: LUK.24.47
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:12
      metadata:
        usfm: ACT.4.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:38
      metadata:
        usfm: ACT.13.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je vous écris, petits enfants, parce que vos péchés vous sont pardonnés à cause de son nom. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je vous écris, pères, parce que vous avez connu celui qui est dès le commencement. Je vous écris, jeunes gens, parce que vous avez vaincu le malin. Je vous ai écrit, petits enfants, parce que vous avez connu le Père. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je vous ai écrit, pères, parce que vous avez connu celui qui est dès le commencement. Je vous ai écrit, jeunes gens, parce que vous êtes forts, et que la parole de Dieu demeure en vous, et que vous avez vaincu le malin. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:2
      metadata:
        usfm: ROM.12.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'N’aimez point le monde, ni les choses qui sont dans le monde. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:10
      metadata:
        usfm: GAL.1.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 4:4
      metadata:
        usfm: JAS.4.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si quelqu’un aime le monde, l’amour du Père n’est point en lui; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'car tout ce qui est dans le monde, la convoitise de la chair, la convoitise des yeux, et l’orgueil de la vie, ne vient point du Père, mais vient du monde. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 90:10
      metadata:
        usfm: PSA.90.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 40:6
      metadata:
        usfm: ISA.40.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 7:31
      metadata:
        usfm: 1CO.7.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:10
      metadata:
        usfm: JAS.1.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:14
      metadata:
        usfm: JAS.4.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:24
      metadata:
        usfm: 1PE.1.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et le monde passe, et sa convoitise aussi; mais celui qui fait la volonté de Dieu demeure éternellement.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les antéchrists
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-27: cf. (1 Jn 4:1-6. 2 Jn 7-11.) Jn 16:13-15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Petits enfants, c’est la dernière heure, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 24:5
      metadata:
        usfm: MAT.24.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 2:3
      metadata:
        usfm: 2TH.2.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et comme vous avez appris qu’un antéchrist vient, il y a maintenant plusieurs antéchrists: par là nous connaissons que c’est la dernière heure. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 41:10
      metadata:
        usfm: PSA.41.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 20:30
      metadata:
        usfm: ACT.20.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils sont sortis du milieu de nous, mais ils n’étaient pas des nôtres; car s’ils eussent été des nôtres, ils seraient demeurés avec nous, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 11:19
      metadata:
        usfm: 1CO.11.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais cela est arrivé afin qu’il fût manifeste que tous ne sont pas des nôtres. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 45:8
      metadata:
        usfm: PSA.45.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 133:2
      metadata:
        usfm: PSA.133.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 1:21
      metadata:
        usfm: 2CO.1.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 1:9
      metadata:
        usfm: HEB.1.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pour vous, vous avez reçu l’onction de la part de celui qui est saint, et vous avez tous de la connaissance. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Je vous ai écrit, non que vous ne connaissiez pas la vérité, mais parce que vous la connaissez, et parce qu’aucun mensonge ne vient de la vérité. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Qui est menteur, sinon celui qui nie que Jésus est le Christ? Celui-là est l’antéchrist, qui nie le Père et le Fils. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 12:9
      metadata:
        usfm: LUK.12.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 2:12
      metadata:
        usfm: 2TI.2.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quiconque nie le Fils n’a pas non plus le Père; quiconque confesse le Fils a aussi le Père. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Que ce que vous avez entendu dès le commencement demeure en vous. Si ce que vous avez entendu dès le commencement demeure en vous, vous demeurerez aussi dans le Fils et dans le Père. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Et la promesse qu’il nous a faite, c’est la vie éternelle. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Je vous ai écrit ces choses au sujet de ceux qui vous égarent. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 31:34
      metadata:
        usfm: JER.31.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 8:11
      metadata:
        usfm: HEB.8.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pour vous, l’onction que vous avez reçue de lui demeure en vous, et vous n’avez pas besoin qu’on vous enseigne; mais comme son onction vous enseigne toutes choses, et qu’elle est véritable et qu’elle n’est point un mensonge, demeurez en lui selon les enseignements qu’elle vous a donnés.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les enfants de Dieu
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: '2 v. 28 à 3 v. 10: cf. (Col 1:23. Jn 1:12, 13. Ro 8:14-19. Hé 12:14.) (1 Jn 5:18.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Et maintenant, petits enfants, demeurez en lui, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 8:38
      metadata:
        usfm: MRK.8.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:2
      metadata:
        usfm: 1JN.3.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'afin que, lorsqu’il paraîtra, nous ayons de l’assurance, et qu’à son avènement nous ne soyons pas confus et éloignés de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Si vous savez qu’il est juste, reconnaissez que quiconque pratique la justice est né de lui.
