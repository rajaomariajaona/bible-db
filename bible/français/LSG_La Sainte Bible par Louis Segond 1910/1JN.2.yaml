document_id: 1JN.2,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'Mes petits enfants, je vous écris ces choses, afin que vous ne péchiez point. Et si quelqu’un a péché, nous avons '
  - type: note
    content: 1 Ti 2:5. Hé 7:25.
  - type: text
    content: 'un avocat auprès du Père, Jésus-Christ le juste. '
  '10':
  - type: note
    content: 1 Jn 3:14.
  - type: text
    content: 'Celui qui aime son frère '
  - type: note
    content: Jn 12:35.
  - type: text
    content: 'demeure dans la lumière, et aucune occasion de chute n’est en lui. '
  '11':
  - type: text
    content: Mais celui qui hait son frère est dans les ténèbres, il marche dans les ténèbres, et il ne sait où il va, parce que les ténèbres ont aveuglé ses yeux.
  - type: heading
    content: 'V. 12-17: cf. 1 Th 2:11, 12. (Ro 12:2. Col 3:1-3. Ja 4:4. Mt 6:24.)'
  '12':
  - type: text
    content: ' '
  - type: note
    content: Lu 24:47. Ac 4:12; 13:38.
  - type: text
    content: 'Je vous écris, petits enfants, parce que vos péchés vous sont pardonnés à cause de son nom. '
  '13':
  - type: text
    content: 'Je vous écris, pères, parce que vous avez connu celui qui est dès le commencement. Je vous écris, jeunes gens, parce que vous avez vaincu le malin. Je vous ai écrit, petits enfants, parce que vous avez connu le Père. '
  '14':
  - type: text
    content: 'Je vous ai écrit, pères, parce que vous avez connu celui qui est dès le commencement. Je vous ai écrit, jeunes gens, parce que vous êtes forts, et que la parole de Dieu demeure en vous, et que vous avez vaincu le malin. '
  '15':
  - type: note
    content: Ro 12:2.
  - type: text
    content: 'N’aimez point le monde, ni les choses qui sont dans le monde. '
  - type: note
    content: Ga 1:10. Ja 4:4.
  - type: text
    content: 'Si quelqu’un aime le monde, l’amour du Père n’est point en lui; '
  '16':
  - type: text
    content: 'car tout ce qui est dans le monde, la convoitise de la chair, la convoitise des yeux, et l’orgueil de la vie, ne vient point du Père, mais vient du monde. '
  '17':
  - type: note
    content: Ps 90:10. És 40:6. 1 Co 7:31. Ja 1:10; 4:14. 1 Pi 1:24.
  - type: text
    content: Et le monde passe, et sa convoitise aussi; mais celui qui fait la volonté de Dieu demeure éternellement.
  - type: heading
    content: Les antéchrists
  - type: heading
    content: 'V. 18-27: cf. (1 Jn 4:1-6. 2 Jn 7-11.) Jn 16:13-15.'
  '18':
  - type: text
    content: 'Petits enfants, c’est la dernière heure, '
  - type: note
    content: Mt 24:5. 2 Th 2:3.
  - type: text
    content: 'et comme vous avez appris qu’un antéchrist vient, il y a maintenant plusieurs antéchrists: par là nous connaissons que c’est la dernière heure. '
  '19':
  - type: note
    content: Ps 41:10. Ac 20:30.
  - type: text
    content: 'Ils sont sortis du milieu de nous, mais ils n’étaient pas des nôtres; car s’ils eussent été des nôtres, ils seraient demeurés avec nous, '
  - type: note
    content: 1 Co 11:19.
  - type: text
    content: 'mais cela est arrivé afin qu’il fût manifeste que tous ne sont pas des nôtres. '
  '2':
  - type: text
    content: 'Il est lui-même '
  - type: note
    content: Ro 3:25. 2 Co 5:18. Col 1:20. 1 Jn 4:10.
  - type: text
    content: 'une victime expiatoire pour nos péchés, non seulement pour les nôtres, mais aussi pour ceux '
  - type: note
    content: Jn 4:42. 1 Jn 4:14.
  - type: text
    content: du monde entier.
  - type: heading
    content: L’observation des commandements. L’amour fraternel; le détachement du monde
  - type: heading
    content: 'V. 3-6: cf. Mt 7:21-23. Jn 14:21-24.'
  '20':
  - type: note
    content: Ps 45:8; 133:2. 2 Co 1:21. Hé 1:9.
  - type: text
    content: 'Pour vous, vous avez reçu l’onction de la part de celui qui est saint, et vous avez tous de la connaissance. '
  '21':
  - type: text
    content: 'Je vous ai écrit, non que vous ne connaissiez pas la vérité, mais parce que vous la connaissez, et parce qu’aucun mensonge ne vient de la vérité. '
  '22':
  - type: text
    content: 'Qui est menteur, sinon celui qui nie que Jésus est le Christ? Celui-là est l’antéchrist, qui nie le Père et le Fils. '
  '23':
  - type: note
    content: Lu 12:9. 2 Ti 2:12.
  - type: text
    content: 'Quiconque nie le Fils n’a pas non plus le Père; quiconque confesse le Fils a aussi le Père. '
  '24':
  - type: text
    content: 'Que ce que vous avez entendu dès le commencement demeure en vous. Si ce que vous avez entendu dès le commencement demeure en vous, vous demeurerez aussi dans le Fils et dans le Père. '
  '25':
  - type: text
    content: 'Et la promesse qu’il nous a faite, c’est la vie éternelle. '
  '26':
  - type: text
    content: 'Je vous ai écrit ces choses au sujet de ceux qui vous égarent. '
  '27':
  - type: note
    content: Jé 31:34. Hé 8:11.
  - type: text
    content: Pour vous, l’onction que vous avez reçue de lui demeure en vous, et vous n’avez pas besoin qu’on vous enseigne; mais comme son onction vous enseigne toutes choses, et qu’elle est véritable et qu’elle n’est point un mensonge, demeurez en lui selon les enseignements qu’elle vous a donnés.
  - type: heading
    content: Les enfants de Dieu
  - type: heading
    content: '2 v. 28 à 3 v. 10: cf. (Col 1:23. Jn 1:12, 13. Ro 8:14-19. Hé 12:14.) (1 Jn 5:18.)'
  '28':
  - type: text
    content: 'Et maintenant, petits enfants, demeurez en lui, '
  - type: note
    content: Mc 8:38. 1 Jn 3:2.
  - type: text
    content: 'afin que, lorsqu’il paraîtra, nous ayons de l’assurance, et qu’à son avènement nous ne soyons pas confus et éloignés de lui. '
  '29':
  - type: text
    content: Si vous savez qu’il est juste, reconnaissez que quiconque pratique la justice est né de lui.
  '3':
  - type: text
    content: 'Si nous gardons ses commandements, par là nous savons que nous l’avons connu. '
  '4':
  - type: note
    content: 1 Jn 4:20.
  - type: text
    content: 'Celui qui dit: Je l’ai connu, et qui ne garde pas ses commandements, est un menteur, et la vérité n’est point en lui. '
  '5':
  - type: text
    content: 'Mais celui qui garde sa parole, l’amour de Dieu est véritablement parfait en lui: '
  - type: note
    content: Jn 13:35.
  - type: text
    content: 'par là nous savons que nous sommes en lui. '
  '6':
  - type: text
    content: 'Celui qui dit qu’il demeure en lui '
  - type: note
    content: Jn 13:15. 1 Pi 2:21.
  - type: text
    content: doit marcher aussi comme il a marché lui-même.
  - type: heading
    content: 'V. 7-11: cf. (Jn 13:34, 35; 15:12-14.) Pr 4:18, 19.'
  '7':
  - type: text
    content: 'Bien-aimés, '
  - type: note
    content: 2 Jn v. 5.
  - type: text
    content: 'ce n’est pas un commandement nouveau que je vous écris, mais un commandement ancien que vous avez eu dès le commencement; ce commandement ancien, c’est la parole que vous avez entendue. '
  '8':
  - type: text
    content: 'Toutefois, '
  - type: note
    content: Jn 13:34; 15:12.
  - type: text
    content: 'c’est un commandement nouveau que je vous écris, ce qui est vrai en lui et en vous, car les ténèbres se dissipent et la lumière véritable paraît déjà. '
  '9':
  - type: text
    content: 'Celui qui dit qu’il est dans la lumière, et qui hait son frère, est encore dans les ténèbres. '
