document_id: DEU.5,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'Moïse convoqua tout Israël, et leur dit: Écoute, Israël, les lois et les ordonnances que je vous fais entendre aujourd’hui. Apprenez-les, et mettez-les soigneusement en pratique. '
  '10':
  - type: text
    content: 'et qui fais miséricorde jusqu’en mille générations à ceux qui m’aiment et qui gardent mes commandements. '
  '11':
  - type: text
    content: 'Tu ne prendras point '
  - type: note
    content: Lé 19:12. Mt 5:33.
  - type: text
    content: 'le nom de l’Éternel, ton Dieu, en vain; car l’Éternel ne laissera point impuni celui qui prendra son nom en vain. '
  '12':
  - type: text
    content: 'Observe '
  - type: note
    content: Ge 2:2. Ex 23:12; 35:2. Lé 23:3. Éz 20:12. Hé 4:4.
  - type: text
    content: 'le jour du repos, pour le sanctifier, comme l’Éternel, ton Dieu, te l’a ordonné. '
  '13':
  - type: text
    content: 'Tu travailleras six jours, et tu feras tout ton ouvrage. '
  '14':
  - type: text
    content: 'Mais le septième jour est le jour du repos de l’Éternel, ton Dieu: tu ne feras aucun ouvrage, ni toi, ni ton fils, ni ta fille, ni ton serviteur, ni ta servante, ni ton bœuf, ni ton âne, ni aucune de tes bêtes, ni l’étranger qui est dans tes portes, afin que ton serviteur et ta servante se reposent comme toi. '
  '15':
  - type: text
    content: 'Tu te souviendras que tu as été esclave au pays d’Égypte, et que l’Éternel, ton Dieu, t’en a fait sortir à main forte et à bras étendu: c’est pourquoi l’Éternel, ton Dieu, t’a ordonné d’observer le jour du repos. '
  '16':
  - type: note
    content: Lé 19:3. Mt 15:4. Lu 18:20. Ép 6:2, 3.
  - type: text
    content: 'Honore ton père et ta mère, comme l’Éternel, ton Dieu, te l’a ordonné, afin que tes jours se prolongent et que tu sois heureux dans le pays que l’Éternel, ton Dieu, te donne. '
  '17':
  - type: note
    content: Mt 5:21. Lu 18:20. Ro 13:9.
  - type: text
    content: 'Tu ne tueras point. '
  '18':
  - type: note
    content: Lu 18:20.
  - type: text
    content: 'Tu ne commettras point d’adultère. '
  '19':
  - type: text
    content: 'Tu ne déroberas point. '
  '2':
  - type: text
    content: 'L’Éternel, notre Dieu, a traité avec nous '
  - type: note
    content: Ex 19:5.
  - type: text
    content: 'une alliance à Horeb. '
  '20':
  - type: text
    content: 'Tu ne porteras point de faux témoignage contre ton prochain. '
  '21':
  - type: text
    content: 'Tu ne '
  - type: note
    content: Ro 7:7.
  - type: text
    content: convoiteras point la femme de ton prochain; tu ne désireras point la maison de ton prochain, ni son champ, ni son serviteur, ni sa servante, ni son bœuf, ni son âne, ni aucune chose qui appartienne à ton prochain.
  - type: heading
    content: 'V. 22-33: cf. (Ex 20:18-22. Hé 12:18-29.) Jn 13:17.'
  '22':
  - type: text
    content: 'Telles sont les paroles que prononça l’Éternel à haute voix sur la montagne, du milieu du feu, des nuées et de l’obscurité, et qu’il adressa à toute votre assemblée, sans rien ajouter. Il les écrivit sur deux tables de pierre, qu’il me donna. '
  '23':
  - type: text
    content: 'Lorsque vous eûtes entendu la voix du milieu des ténèbres, et tandis que la montagne était toute en feu, vos chefs de tribus et vos anciens s’approchèrent tous de moi, '
  '24':
  - type: text
    content: 'et vous dîtes: Voici, l’Éternel, notre Dieu, nous a montré sa gloire et sa grandeur, et nous avons entendu sa voix du milieu du feu; aujourd’hui, nous avons vu que Dieu a parlé à des hommes, et qu’ils sont demeurés vivants. '
  '25':
  - type: text
    content: 'Et maintenant pourquoi mourrions-nous? Car ce grand feu nous dévorera; si nous continuons à entendre la voix de l’Éternel, notre Dieu, nous mourrons. '
  '26':
  - type: text
    content: 'Quel est l’homme, en effet, qui ait jamais entendu, comme nous, la voix du Dieu vivant parlant du milieu du feu, et '
  - type: note
    content: De 4:33. Jg 13:22.
  - type: text
    content: 'qui soit demeuré vivant? '
  '27':
  - type: text
    content: 'Approche, toi, et écoute tout ce que dira l’Éternel, notre Dieu; '
  - type: note
    content: Ex 20:19. Hé 12:19.
  - type: text
    content: 'tu nous rapporteras toi-même tout ce que te dira l’Éternel, notre Dieu; nous l’écouterons, et nous le ferons. '
  '28':
  - type: text
    content: 'L’Éternel entendit les paroles que vous m’adressâtes. Et l’Éternel me dit: J’ai entendu les paroles que ce peuple t’a adressées: tout ce qu’ils ont dit est bien. '
  '29':
  - type: text
    content: 'Oh! S’ils avaient toujours ce même cœur pour me craindre et pour observer tous mes commandements, afin qu’ils fussent heureux à jamais, eux et leurs enfants! '
  '3':
  - type: text
    content: 'Ce n’est point avec nos pères que l’Éternel a traité cette alliance; c’est avec nous, qui sommes ici aujourd’hui, tous vivants. '
  '30':
  - type: text
    content: 'Va, dis-leur: Retournez dans vos tentes. '
  '31':
  - type: text
    content: 'Mais toi, reste ici avec moi, et je te dirai tous les commandements, les lois et les ordonnances, que tu leur enseigneras, afin qu’ils les mettent en pratique dans le pays dont je leur donne la possession. '
  '32':
  - type: text
    content: 'Vous ferez avec soin ce que l’Éternel, votre Dieu, vous a ordonné; vous ne vous en détournerez ni à droite, ni à gauche. '
  '33':
  - type: text
    content: Vous suivrez entièrement la voie que l’Éternel, votre Dieu, vous a prescrite, afin que vous viviez et que vous soyez heureux, afin que vous prolongiez vos jours dans le pays dont vous aurez la possession.
  '4':
  - type: text
    content: 'L’Éternel vous parla face à face sur la montagne, du milieu du feu. '
  '5':
  - type: text
    content: 'Je me tins alors entre l’Éternel et vous, pour vous annoncer la parole de l’Éternel; car vous '
  - type: note
    content: Ex 19:16; 20:18.
  - type: text
    content: 'aviez peur du feu, et vous ne montâtes point sur la montagne. Il dit: '
  '6':
  - type: note
    content: Ex 20:2, etc. Ps 81:11.
  - type: text
    content: 'Je suis l’Éternel, ton Dieu, qui t’ai fait sortir du pays d’Égypte, de la maison de servitude. '
  '7':
  - type: text
    content: 'Tu n’auras point d’autres dieux devant ma face. '
  '8':
  - type: note
    content: Lé 26:1.
  - type: text
    content: 'Tu ne te feras point d’image taillée, de représentation quelconque des choses qui sont en haut dans les cieux, qui sont en bas sur la terre, et qui sont dans les eaux plus bas que la terre. '
  '9':
  - type: text
    content: 'Tu ne te prosterneras point devant elles, et tu ne les serviras point; car moi, l’Éternel, ton Dieu, je suis un Dieu '
  - type: note
    content: Ex 20:5; 34:7, 34. Jé 32:18.
  - type: text
    content: 'jaloux, qui punis l’iniquité des pères sur les enfants jusqu’à la troisième et à la quatrième génération de ceux qui me haïssent, '
