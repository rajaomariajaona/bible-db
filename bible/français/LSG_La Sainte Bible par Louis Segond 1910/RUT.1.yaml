document_id: RUT.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Attachement de Ruth pour Naomi, sa belle-mère
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-5: cf. 2 R 8:1, 2. Né 13:23-27. (Ps 33:18, 19; 37:18, 19.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Du temps des juges, il y eut une famine dans le pays. Un homme de Bethléhem de Juda partit, avec sa femme et ses deux fils, pour faire un séjour dans le pays de Moab. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et elles lui dirent: Non, nous irons avec toi vers ton peuple. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naomi, dit: Retournez, mes filles! Pourquoi viendriez-vous avec moi? Ai-je encore dans mon sein des fils qui puissent devenir vos maris? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Retournez, mes filles, allez! Je suis trop vieille pour me remarier. Et quand je dirais: J’ai de l’espérance; quand cette nuit même je serais avec un mari, et que j’enfanterais des fils, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'attendriez-vous pour cela qu’ils eussent grandi, refuseriez-vous pour cela de vous marier? Non, mes filles! Car à cause de vous je suis dans une grande affliction de ce que la main de l’Éternel s’est étendue contre moi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et elles élevèrent la voix, et pleurèrent encore. Orpa baisa sa belle-mère, mais Ruth s’attacha à elle. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naomi dit à Ruth: Voici, ta belle-sœur est retournée vers son peuple et vers ses dieux; retourne, comme ta belle-sœur. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ruth répondit: Ne me presse pas de te laisser, de retourner loin de toi! Où tu iras j’irai, où tu demeureras je demeurerai; ton peuple sera mon peuple, et ton Dieu sera mon Dieu; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'où tu mourras je mourrai, et j’y serai enterrée. Que l’Éternel me traite dans toute sa rigueur, si autre chose que la mort vient à me séparer de toi! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naomi, la voyant décidée à aller avec elle, cessa ses instances. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elles firent ensemble le voyage jusqu’à leur arrivée à Bethléhem. Et lorsqu’elles entrèrent dans Bethléhem, toute la ville fut émue à cause d’elles, et les femmes disaient: Est-ce là Naomi? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le nom de cet homme était Élimélec, celui de sa femme Naomi, et ses deux fils s’appelaient Machlon et Kiljon; ils étaient Éphratiens, de Bethléhem de Juda. Arrivés au pays de Moab, ils y fixèrent leur demeure. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle leur dit: Ne m’appelez pas Naomi; appelez-moi Mara, car le Tout-Puissant m’a remplie d’amertume. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’étais dans l’abondance à mon départ, et l’Éternel me ramène les mains vides. Pourquoi m’appelleriez-vous Naomi, après que l’Éternel s’est prononcé contre moi, et que le Tout-Puissant m’a affligée? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi revinrent du pays de Moab Naomi et sa belle-fille, Ruth la Moabite. Elles arrivèrent à Bethléhem au commencement de la moisson des orges.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Élimélec, mari de Naomi, mourut, et elle resta avec ses deux fils. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils prirent des femmes Moabites, dont l’une se nommait Orpa, et l’autre Ruth, et ils habitèrent là environ dix ans. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Machlon et Kiljon moururent aussi tous les deux, et Naomi resta privée de ses deux fils et de son mari.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-22: cf. (Ru 2:11, 12. Mt 19:27-30.) (Lu 9:57, 58.) És 56:6, 7.'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis elle se leva, elle et ses belles-filles, afin de quitter le pays de Moab, car elle apprit au pays de Moab que l’Éternel avait visité son peuple et lui avait donné du pain. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle sortit du lieu qu’elle habitait, accompagnée de ses deux belles-filles, et elle se mit en route pour retourner dans le pays de Juda. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naomi dit alors à ses deux belles-filles: Allez, retournez chacune à la maison de sa mère! Que l’Éternel use de bonté envers vous, comme vous l’avez fait envers ceux qui sont morts et envers moi! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que l’Éternel vous fasse trouver à chacune du repos dans la maison d’un mari! Et elle les baisa. Elles élevèrent la voix, et pleurèrent; '
