document_id: MAT.20,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Parabole des ouvriers loués à différentes heures
  - type: heading
    content: 'V. 1-16: cf. Mt 19:30. Ps 145:17. 1 Co 4:7. 2 Co 8:12.'
  - type: text
    content: ' '
  - type: text
    content: Car le royaume des cieux est semblable à un maître de maison qui sortit dès le matin, afin de louer des ouvriers pour sa vigne.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Les premiers vinrent ensuite, croyant recevoir davantage; mais ils reçurent aussi chacun un denier.
  - type: text
    content: ' '
  '11':
  - type: text
    content: En le recevant, ils murmurèrent contre le maître de la maison,
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'et dirent: Ces derniers n’ont travaillé qu’une heure, et tu les traites à l’égal de nous, qui avons supporté la fatigue du jour et la chaleur.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Il répondit à l’un d’eux: Mon ami, je ne te fais pas tort; n’es-tu pas convenu avec moi d’un denier?'
  - type: text
    content: ' '
  '14':
  - type: text
    content: Prends ce qui te revient, et va-t’en. Je veux donner à ce dernier autant qu’à toi.
  - type: text
    content: ' '
  '15':
  - type: note
    content: Ro 9:21.
  - type: text
    content: Ne m’est-il pas permis de faire de mon bien ce que je veux? Ou vois-tu de mauvais œil que je sois bon?
  - type: text
    content: ' '
  '16':
  - type: note
    content: Mt 19:30. Mc 10:31. Lu 13:30.
  - type: text
    content: Ainsi les derniers seront les premiers, et les premiers seront les derniers.
  - type: heading
    content: Jésus annonce sa mort et sa résurrection
  - type: heading
    content: 'V. 17-19: cf. (Mc 10:32-34. Lu 18:31-34.) Mt 16:21.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: Mc 10:32. Lu 18:31; 24:7.
  - type: text
    content: 'Pendant que Jésus montait à Jérusalem, il prit à part les douze disciples, et il leur dit en chemin:'
  '18':
  - type: text
    content: ' '
  - type: text
    content: Voici, nous montons à Jérusalem, et le Fils de l’homme sera livré aux principaux sacrificateurs et aux scribes. Ils le condamneront à mort,
  - type: text
    content: ' '
  '19':
  - type: note
    content: Mt 27:2. Lu 23:1. Jn 18:28, 31. Ac 3:13.
  - type: text
    content: et ils le livreront aux païens, pour qu’ils se moquent de lui, le battent de verges, et le crucifient; et le troisième jour il ressuscitera.
  - type: heading
    content: Demande des fils de Zébédée
  - type: heading
    content: 'V. 20-28: cf. (Mc 10:35-45. Lu 22:24-27.)'
  '2':
  - type: text
    content: Il convint avec eux d’un denier par jour, et il les envoya à sa vigne.
  - type: text
    content: ' '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Mc 10:35.
  - type: text
    content: 'Alors la mère des fils de Zébédée s’approcha de Jésus avec ses fils, et se prosterna, pour lui faire une demande. '
  '21':
  - type: text
    content: 'Il lui dit: '
  - type: text
    content: Que veux-tu?
  - type: text
    content: ' Ordonne, lui dit-elle, que mes deux fils, que voici, soient assis, dans ton royaume, l’un à ta droite et l’autre à ta gauche. '
  '22':
  - type: text
    content: 'Jésus répondit: '
  - type: note
    content: Ro 8:26.
  - type: text
    content: Vous ne savez ce que vous demandez. Pouvez-vous boire la coupe que je dois boire?
  - type: text
    content: ' Nous le pouvons, dirent-ils. '
  '23':
  - type: text
    content: 'Et il leur répondit: '
  - type: text
    content: Il est vrai que vous boirez ma coupe; mais pour ce qui est d’être assis à ma droite et à ma gauche, cela ne dépend pas de moi, et ne sera donné qu’à ceux à qui
  - type: text
    content: ' '
  - type: note
    content: Mt 25:34.
  - type: text
    content: mon Père l’a réservé.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Les dix, ayant entendu cela, furent indignés contre les deux frères. '
  '25':
  - type: text
    content: 'Jésus les appela, et dit: '
  - type: note
    content: Mc 10:42. Lu 22:25.
  - type: text
    content: Vous savez que les chefs des nations les tyrannisent, et que les grands les asservissent.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 1 Pi 5:3.
  - type: text
    content: Il n’en sera pas de même au milieu de vous. Mais quiconque veut être grand parmi vous, qu’il soit votre serviteur;
  - type: text
    content: ' '
  '27':
  - type: note
    content: Mc 23:11. Mc 9:35; 10:43.
  - type: text
    content: et quiconque veut être le premier parmi vous, qu’il soit votre esclave.
  - type: text
    content: ' '
  '28':
  - type: note
    content: Lu 22:27. Jn 13:14. Ph 2:7.
  - type: text
    content: C’est ainsi que le Fils de l’homme est venu, non pour être servi, mais pour servir et
  - type: text
    content: ' '
  - type: note
    content: Ép 1:7. 1 Ti 2:6. 1 Pi 1:19.
  - type: text
    content: donner sa vie comme la rançon de plusieurs.
  - type: heading
    content: Deux aveugles guéris à Jéricho
  - type: heading
    content: 'V. 29-34: cf. (Mc 10:46-53. Lu 18:35-43.)'
  '29':
  - type: text
    content: ' '
  - type: note
    content: Mc 10:46. Lu 18:35.
  - type: text
    content: 'Lorsqu’ils sortirent de Jéricho, une grande foule suivit Jésus. '
  '3':
  - type: text
    content: Il sortit vers la troisième heure, et il en vit d’autres qui étaient sur la place sans rien faire.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Et voici, deux aveugles, assis au bord du chemin, entendirent que Jésus passait, et crièrent: Aie pitié de nous, Seigneur, Fils de David! '
  '31':
  - type: text
    content: 'La foule les reprenait, pour les faire taire; mais ils crièrent plus fort: Aie pitié de nous, Seigneur, Fils de David! '
  '32':
  - type: text
    content: 'Jésus s’arrêta, les appela, et dit: '
  - type: text
    content: Que voulez-vous que je vous fasse?
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Ils lui dirent: Seigneur, que nos yeux s’ouvrent. '
  '34':
  - type: text
    content: Ému de compassion, Jésus toucha leurs yeux; et aussitôt ils recouvrèrent la vue, et le suivirent.
  '4':
  - type: text
    content: 'Il leur dit: Allez aussi à ma vigne, et je vous donnerai ce qui sera raisonnable.'
  - type: text
    content: ' '
  '5':
  - type: text
    content: Et ils y allèrent. Il sortit de nouveau vers la sixième heure et vers la neuvième, et il fit de même.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Étant sorti vers la onzième heure, il en trouva d’autres qui étaient sur la place, et il leur dit: Pourquoi vous tenez-vous ici toute la journée sans rien faire?'
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Ils lui répondirent: C’est que personne ne nous a loués. Allez aussi à ma vigne, leur dit-il.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Quand le soir fut venu, le maître de la vigne dit à son intendant: Appelle les ouvriers, et paie-leur le salaire, en allant des derniers aux premiers.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: Ceux de la onzième heure vinrent, et reçurent chacun un denier.
  - type: text
    content: ' '
