document_id: JOB.5,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. (Pr 3:33. Job 4:7, etc.) Job 14:1-4.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Crie maintenant! Qui te répondra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Auquel des saints t’adresseras-tu?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il répand la pluie sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et envoie l’eau sur les campagnes;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 2:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 113:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il relève les humbles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et délivre les affligés;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Né 4:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 33:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 8:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il anéantit les projets des hommes rusés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leurs mains ne peuvent les accomplir;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 3:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il prend les sages dans leur propre ruse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et les desseins des hommes artificieux sont renversés:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 28:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils rencontrent les ténèbres au milieu du jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils tâtonnent en plein midi comme dans la nuit.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi Dieu protège le faible contre leurs menaces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le sauve de la main des puissants;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 107:42
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et l’espérance soutient le malheureux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’iniquité ferme la bouche.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-27: cf. Ps 94:12, 13; 34:7-23. Os 6:1.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 3:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 1:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 3:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Heureux l’homme que Dieu châtie!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne méprise pas la correction du Tout-Puissant.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:39
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 2:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 6:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il fait la plaie, et il la bande;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il blesse, et sa main guérit.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps 91:3, etc.
      marker-yv: yv-n
    - type: text
      text: Six fois il te délivrera de l’angoisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sept fois le mal ne t’atteindra pas.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’insensé périt dans sa colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le fou meurt dans ses emportements.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il te sauvera de la mort pendant la famine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et des coups du glaive pendant la guerre.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu seras à l’abri du fléau de la langue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu seras sans crainte quand viendra la dévastation.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu te riras de la dévastation comme de la famine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu n’auras pas à redouter les bêtes de la terre;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu feras alliance avec les pierres des champs,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 2:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et les bêtes de la terre seront en paix avec toi.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu jouiras du bonheur sous ta tente,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu retrouveras tes troupeaux au complet,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu verras ta postérité s’accroître,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tes rejetons se multiplier comme l’herbe des champs.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu entreras au sépulcre dans la vieillesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme on emporte une gerbe en son temps.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà ce que nous avons reconnu, voilà ce qui est;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A toi d’entendre et de mettre à profit.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 37:36
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: J’ai vu l’insensé prendre racine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis soudain j’ai maudit sa demeure.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus de prospérité pour ses fils;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont foulés à la porte, et personne qui les délivre!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa moisson est dévorée par des affamés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui viennent l’enlever jusque dans les épines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses biens sont engloutis par des hommes altérés.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le malheur ne sort pas de la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la souffrance ne germe pas du sol;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme naît pour souffrir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme l’étincelle pour voler.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-16: cf. Job 8:5-7. Ps 107:40-43. Lu 1:51-53.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour moi, j’aurais recours à Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et c’est à Dieu que j’exposerais ma cause.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 9:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 72:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 11:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il fait des choses grandes et insondables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des merveilles sans nombre;
