document_id: JOB.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-7: cf. (Pr 3:33. Job 4:7, etc.) Job 14:1-4.'
  - type: text
    content: Crie maintenant! Qui te répondra?
  - type: text
    content: Auquel des saints t’adresseras-tu?
  '10':
  - type: text
    content: Il répand la pluie sur la terre,
  - type: text
    content: Et envoie l’eau sur les campagnes;
  '11':
  - type: text
    content: ' '
  - type: note
    content: 1 S 2:7. Ps 113:7, 8.
  - type: text
    content: Il relève les humbles,
  - type: text
    content: Et délivre les affligés;
  '12':
  - type: text
    content: ' '
  - type: note
    content: Né 4:15. Ps 33:10. És 8:10.
  - type: text
    content: Il anéantit les projets des hommes rusés,
  - type: text
    content: Et leurs mains ne peuvent les accomplir;
  '13':
  - type: text
    content: ' '
  - type: note
    content: 1 Co 3:19.
  - type: text
    content: Il prend les sages dans leur propre ruse,
  - type: text
    content: 'Et les desseins des hommes artificieux sont renversés:'
  '14':
  - type: text
    content: ' '
  - type: note
    content: De 28:29.
  - type: text
    content: Ils rencontrent les ténèbres au milieu du jour,
  - type: text
    content: Ils tâtonnent en plein midi comme dans la nuit.
  '15':
  - type: text
    content: Ainsi Dieu protège le faible contre leurs menaces,
  - type: text
    content: Et le sauve de la main des puissants;
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ps 107:42.
  - type: text
    content: Et l’espérance soutient le malheureux,
  - type: text
    content: Mais l’iniquité ferme la bouche.
  - type: heading
    content: 'V. 17-27: cf. Ps 94:12, 13; 34:7-23. Os 6:1.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: Pr 3:11, 12. Hé 12:5. Ja 1:12. Ap 3:19.
  - type: text
    content: Heureux l’homme que Dieu châtie!
  - type: text
    content: Ne méprise pas la correction du Tout-Puissant.
  '18':
  - type: text
    content: ' '
  - type: note
    content: De 32:39. 1 S 2:6. Os 6:1.
  - type: text
    content: Il fait la plaie, et il la bande;
  - type: text
    content: Il blesse, et sa main guérit.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Ps 91:3, etc.
  - type: text
    content: Six fois il te délivrera de l’angoisse,
  - type: text
    content: Et sept fois le mal ne t’atteindra pas.
  '2':
  - type: text
    content: L’insensé périt dans sa colère,
  - type: text
    content: Le fou meurt dans ses emportements.
  '20':
  - type: text
    content: Il te sauvera de la mort pendant la famine,
  - type: text
    content: Et des coups du glaive pendant la guerre.
  '21':
  - type: text
    content: Tu seras à l’abri du fléau de la langue,
  - type: text
    content: Tu seras sans crainte quand viendra la dévastation.
  '22':
  - type: text
    content: Tu te riras de la dévastation comme de la famine,
  - type: text
    content: Et tu n’auras pas à redouter les bêtes de la terre;
  '23':
  - type: text
    content: Car tu feras alliance avec les pierres des champs,
  - type: note
    content: Os 2:17.
  - type: text
    content: Et les bêtes de la terre seront en paix avec toi.
  '24':
  - type: text
    content: Tu jouiras du bonheur sous ta tente,
  - type: text
    content: Tu retrouveras tes troupeaux au complet,
  '25':
  - type: text
    content: Tu verras ta postérité s’accroître,
  - type: text
    content: Et tes rejetons se multiplier comme l’herbe des champs.
  '26':
  - type: text
    content: Tu entreras au sépulcre dans la vieillesse,
  - type: text
    content: Comme on emporte une gerbe en son temps.
  '27':
  - type: text
    content: Voilà ce que nous avons reconnu, voilà ce qui est;
  - type: text
    content: A toi d’entendre et de mettre à profit.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps 37:36.
  - type: text
    content: J’ai vu l’insensé prendre racine;
  - type: text
    content: Puis soudain j’ai maudit sa demeure.
  '4':
  - type: text
    content: Plus de prospérité pour ses fils;
  - type: text
    content: Ils sont foulés à la porte, et personne qui les délivre!
  '5':
  - type: text
    content: Sa moisson est dévorée par des affamés,
  - type: text
    content: Qui viennent l’enlever jusque dans les épines,
  - type: text
    content: Et ses biens sont engloutis par des hommes altérés.
  '6':
  - type: text
    content: Le malheur ne sort pas de la poussière,
  - type: text
    content: Et la souffrance ne germe pas du sol;
  '7':
  - type: text
    content: L’homme naît pour souffrir,
  - type: text
    content: Comme l’étincelle pour voler.
  - type: heading
    content: 'V. 8-16: cf. Job 8:5-7. Ps 107:40-43. Lu 1:51-53.'
  '8':
  - type: text
    content: Pour moi, j’aurais recours à Dieu,
  - type: text
    content: Et c’est à Dieu que j’exposerais ma cause.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Job 9:10. Ps 72:18. Ro 11:33.
  - type: text
    content: Il fait des choses grandes et insondables,
  - type: text
    content: Des merveilles sans nombre;
