    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Les hommes de Ninive se lèveront, au jour du jugement, avec cette génération et la condamneront, parce qu’ils se repentirent
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jon 3:5
      metadata:
        usfm: JON.3.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: à la prédication de Jonas; et voici, il y a ici plus que Jonas.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
