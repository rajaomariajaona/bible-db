  - type: text
    text: 'Comme Jésus s’adressait encore à la foule, voici, sa mère et ses frères, qui étaient dehors, cherchèrent à lui parler. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Quelqu’un lui dit: Voici, ta mère et tes frères sont dehors, et ils cherchent à te parler. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Mais Jésus répondit à celui qui le lui disait: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Qui est ma mère, et qui sont mes frères?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Puis, étendant la main sur ses disciples, il dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Voici ma mère et mes frères.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
