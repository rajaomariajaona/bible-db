      metadata:
        usfm: LUK.19.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car par tes paroles tu seras justifié, et par tes paroles tu seras condamné.
