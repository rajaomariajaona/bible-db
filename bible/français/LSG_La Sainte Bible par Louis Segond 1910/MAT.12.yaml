      metadata:
        usfm: LUK.11.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: La reine du Midi se lèvera, au jour du jugement, avec cette génération et la condamnera, parce qu’elle vint des extrémités de la terre pour entendre la sagesse de Salomon, et voici, il y a ici plus que Salomon.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 11:24
      metadata:
        usfm: LUK.11.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Lorsque l’esprit impur est sorti d’un homme, il va par des lieux arides, cherchant du repos, et il n’en trouve point.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors il dit: Je retournerai dans ma maison d’où je suis sorti; et, quand il arrive, il la trouve vide, balayée et ornée.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il s’en va, et il prend avec lui sept autres esprits plus méchants que lui;
  - type: text
    text: ' '
