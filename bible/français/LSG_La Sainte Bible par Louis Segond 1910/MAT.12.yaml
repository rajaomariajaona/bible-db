document_id: MAT.12,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les épis de blé et le sabbat
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. (Mc 2:23-28. Lu 6:1-5.) Mt 11:30.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 23:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 2:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 6:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'En ce temps-là, Jésus traversa des champs de blé un jour de sabbat. Ses disciples, qui avaient faim, se mirent à arracher des épis et à manger. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici, il s’y trouvait un homme qui avait la main sèche. Ils demandèrent à Jésus: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 14:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Est-il permis de faire une guérison les jours de sabbat? C’était afin de pouvoir l’accuser. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lequel d’entre vous, s’il n’a qu’une brebis et qu’elle tombe
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 22:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: dans une fosse le jour du sabbat, ne la saisira pour l’en retirer?
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Combien un homme ne vaut-il pas plus qu’une brebis! Il est donc permis de faire du bien les jours de sabbat.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors il dit à l’homme: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Étends ta main.
    - type: text
      text: ' Il l’étendit, et elle devint saine comme l’autre. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 3:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 5:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:39
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:53
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les pharisiens sortirent, et ils se consultèrent sur les moyens de le faire périr. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus, l’ayant su, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: s’éloigna de ce lieu.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-21: cf. Mc 3:7-12. (És 42:1-4.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une grande foule le suivit. Il guérit tous les malades, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 9:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 5:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il leur recommanda sévèrement de ne pas le faire connaître, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afin que s’accomplît ce qui avait été annoncé par Ésaïe, le prophète:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 42:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 3:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 1:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Voici mon serviteur que j’ai choisi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon bien-aimé en qui mon âme a pris plaisir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je mettrai mon Esprit sur lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il annoncera la justice aux nations.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne contestera point, il ne criera point,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et personne n’entendra sa voix dans les rues.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les pharisiens, voyant cela, lui dirent: Voici, tes disciples font '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ce qu’il n’est pas permis de faire pendant le sabbat. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne brisera point le roseau cassé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il n’éteindra point le lumignon qui fume,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ce qu’il ait fait triompher la justice.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les nations espéreront en son nom.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le démoniaque aveugle et muet. Attaque des pharisiens et réponse de Jésus. — Le péché contre le Saint-Esprit
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-37: cf. (Mc 3:20-30. Lu 11:14-26.) Hé 6:4-8; 10:26-29.'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 9:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 11:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors on lui amena un démoniaque aveugle et muet, et il le guérit, de sorte que le muet parlait et voyait. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toute la foule étonnée disait: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 4:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'N’est-ce point là le Fils de David? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les pharisiens, ayant entendu cela, dirent: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 9:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 3:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 11:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Cet homme ne chasse les démons que par Béelzébul, prince des démons. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme Jésus connaissait leurs pensées, il leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tout royaume divisé contre lui-même est dévasté, et toute ville ou maison divisée contre elle-même ne peut subsister.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si Satan chasse Satan, il est divisé contre lui-même; comment donc son royaume subsistera-t-il?
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et si moi, je chasse les démons par Béelzébul, vos fils, par qui les chassent-ils? C’est pourquoi ils seront eux-mêmes vos juges.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais, si c’est par l’Esprit de Dieu que je chasse les démons, le royaume de Dieu est donc venu vers vous.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ou, comment quelqu’un peut-il entrer dans la maison d’un homme fort et piller ses biens, sans avoir auparavant lié cet homme fort? Alors seulement il pillera sa maison.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus leur répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: N’avez-vous pas lu ce que fit David, lorsqu’il eut faim, lui et ceux qui étaient avec lui;
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Celui qui n’est pas avec moi est contre moi, et celui qui n’assemble pas avec moi disperse.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 3:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 12:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 5:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'C’est pourquoi je vous dis: Tout péché et tout blasphème sera pardonné aux hommes, mais le blasphème contre l’Esprit ne sera point pardonné.'
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 2:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Quiconque parlera contre le Fils de l’homme, il lui sera pardonné;
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 15:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 5:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: mais quiconque parlera contre le Saint-Esprit, il ne lui sera pardonné ni dans ce siècle ni dans le siècle à venir.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 7:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ou dites que l’arbre est bon et que son fruit est bon, ou dites que l’arbre est mauvais et que son fruit est mauvais; car on connaît l’arbre par le fruit.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 3:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Races de vipères, comment pourriez-vous dire de bonnes chose, méchants comme vous l’êtes?
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 40:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 6:45
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car c’est de l’abondance du cœur que la bouche parle.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: L’homme bon tire de bonnes choses de son bon trésor, et l’homme méchant tire de mauvaises choses de son mauvais trésor.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Je vous le dis:'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: au jour du jugement, les hommes rendront compte de
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 12:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: toute parole vaine qu’ils auront proférée.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 1:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 19:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car par tes paroles tu seras justifié, et par tes paroles tu seras condamné.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un miracle refusé
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 38-45: cf. Lu 11:29-32, 24-28. (Mt 16:1-4; 11:20-24; 23:32-38.)'
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 8:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 11:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 1:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors quelques-uns des scribes et des pharisiens prirent la parole, et dirent: Maître, nous voudrions te voir faire un miracle. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Une génération méchante et adultère demande un miracle; il ne lui sera donné d’autre miracle que celui du prophète Jonas.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: comment il entra dans la maison de Dieu, et mangea
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 21:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: les pains de proposition, qu’il ne lui était pas permis de manger, non plus qu’à ceux qui étaient avec lui, et
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 24:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: qui étaient réservés aux sacrificateurs seuls?
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Jon 1:17; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car, de même que Jonas fut trois jours et trois nuits dans le ventre d’un grand poisson, de même le Fils de l’homme sera trois jours et trois nuits dans le sein de la terre.
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 11:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Les hommes de Ninive se lèveront, au jour du jugement, avec cette génération et la condamneront, parce qu’ils se repentirent
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jon 3:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: à la prédication de Jonas; et voici, il y a ici plus que Jonas.
