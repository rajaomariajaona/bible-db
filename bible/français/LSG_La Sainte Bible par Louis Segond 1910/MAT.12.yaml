      marker: ref
      children:
      - type: text
        text: Lu 6:45
      metadata:
        usfm: LUK.6.45
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car c’est de l’abondance du cœur que la bouche parle.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: L’homme bon tire de bonnes choses de son bon trésor, et l’homme méchant tire de mauvaises choses de son mauvais trésor.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je vous le dis:'
  - type: text
    text: ' '
