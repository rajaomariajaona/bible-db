document_id: MAT.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les épis de blé et le sabbat
  - type: heading
    content: 'V. 1-8: cf. (Mc 2:23-28. Lu 6:1-5.) Mt 11:30.'
  - type: text
    content: ' '
  - type: note
    content: De 23:25. Mc 2:23. Lu 6:1.
  - type: text
    content: 'En ce temps-là, Jésus traversa des champs de blé un jour de sabbat. Ses disciples, qui avaient faim, se mirent à arracher des épis et à manger. '
  '10':
  - type: text
    content: 'Et voici, il s’y trouvait un homme qui avait la main sèche. Ils demandèrent à Jésus: '
  - type: note
    content: Lu 14:3.
  - type: text
    content: 'Est-il permis de faire une guérison les jours de sabbat? C’était afin de pouvoir l’accuser. '
  '11':
  - type: text
    content: 'Il leur répondit: '
  - type: text
    content: Lequel d’entre vous, s’il n’a qu’une brebis et qu’elle tombe
  - type: text
    content: ' '
  - type: note
    content: Ex 23:4. De 22:4.
  - type: text
    content: dans une fosse le jour du sabbat, ne la saisira pour l’en retirer?
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ge 1:27.
  - type: text
    content: Combien un homme ne vaut-il pas plus qu’une brebis! Il est donc permis de faire du bien les jours de sabbat.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Alors il dit à l’homme: '
  - type: text
    content: Étends ta main.
  - type: text
    content: ' Il l’étendit, et elle devint saine comme l’autre. '
  '14':
  - type: note
    content: Mc 3:6. Jn 5:18; 10:39; 11:53.
  - type: text
    content: 'Les pharisiens sortirent, et ils se consultèrent sur les moyens de le faire périr. '
  '15':
  - type: text
    content: 'Mais Jésus, l’ayant su, '
  - type: note
    content: Mt 10:23.
  - type: text
    content: s’éloigna de ce lieu.
  - type: heading
    content: 'V. 16-21: cf. Mc 3:7-12. (És 42:1-4.)'
  - type: text
    content: 'Une grande foule le suivit. Il guérit tous les malades, '
  '16':
  - type: text
    content: 'et '
  - type: note
    content: Mt 9:30. Lu 5:14.
  - type: text
    content: 'il leur recommanda sévèrement de ne pas le faire connaître, '
  '17':
  - type: text
    content: 'afin que s’accomplît ce qui avait été annoncé par Ésaïe, le prophète:'
  '18':
  - type: text
    content: ' '
  - type: note
    content: És 42:1. Mt 3:17; 17:5. Mc 1:11. Col 1:13. 2 Pi 1:17.
  - type: text
    content: Voici mon serviteur que j’ai choisi,
  - type: text
    content: Mon bien-aimé en qui mon âme a pris plaisir.
  - type: text
    content: Je mettrai mon Esprit sur lui,
  - type: text
    content: Et il annoncera la justice aux nations.
  '19':
  - type: text
    content: Il ne contestera point, il ne criera point,
  - type: text
    content: Et personne n’entendra sa voix dans les rues.
  '2':
  - type: text
    content: 'Les pharisiens, voyant cela, lui dirent: Voici, tes disciples font '
  - type: note
    content: Ex 20:10.
  - type: text
    content: 'ce qu’il n’est pas permis de faire pendant le sabbat. '
  '20':
  - type: text
    content: Il ne brisera point le roseau cassé,
  - type: text
    content: Et il n’éteindra point le lumignon qui fume,
  - type: text
    content: Jusqu’à ce qu’il ait fait triompher la justice.
  '21':
  - type: text
    content: Et les nations espéreront en son nom.
  - type: heading
    content: Le démoniaque aveugle et muet. Attaque des pharisiens et réponse de Jésus. — Le péché contre le Saint-Esprit
  - type: heading
    content: 'V. 22-37: cf. (Mc 3:20-30. Lu 11:14-26.) Hé 6:4-8; 10:26-29.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: Mt 9:32. Lu 11:14.
  - type: text
    content: 'Alors on lui amena un démoniaque aveugle et muet, et il le guérit, de sorte que le muet parlait et voyait. '
  '23':
  - type: text
    content: 'Toute la foule étonnée disait: '
  - type: note
    content: Jn 4:29.
  - type: text
    content: 'N’est-ce point là le Fils de David? '
  '24':
  - type: text
    content: 'Les pharisiens, ayant entendu cela, dirent: '
  - type: note
    content: Mt 9:34. Mc 3:22. Lu 11:15.
  - type: text
    content: 'Cet homme ne chasse les démons que par Béelzébul, prince des démons. '
  '25':
  - type: text
    content: 'Comme Jésus connaissait leurs pensées, il leur dit: '
  - type: text
    content: Tout royaume divisé contre lui-même est dévasté, et toute ville ou maison divisée contre elle-même ne peut subsister.
  '26':
  - type: text
    content: ' '
  - type: text
    content: Si Satan chasse Satan, il est divisé contre lui-même; comment donc son royaume subsistera-t-il?
  - type: text
    content: ' '
  '27':
  - type: text
    content: Et si moi, je chasse les démons par Béelzébul, vos fils, par qui les chassent-ils? C’est pourquoi ils seront eux-mêmes vos juges.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Mais, si c’est par l’Esprit de Dieu que je chasse les démons, le royaume de Dieu est donc venu vers vous.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Ou, comment quelqu’un peut-il entrer dans la maison d’un homme fort et piller ses biens, sans avoir auparavant lié cet homme fort? Alors seulement il pillera sa maison.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Mais Jésus leur répondit: '
  - type: text
    content: N’avez-vous pas lu ce que fit David, lorsqu’il eut faim, lui et ceux qui étaient avec lui;
  '30':
  - type: text
    content: Celui qui n’est pas avec moi est contre moi, et celui qui n’assemble pas avec moi disperse.
  - type: text
    content: ' '
  '31':
  - type: note
    content: Mc 3:28. Lu 12:10. 1 Jn 5:16.
  - type: text
    content: 'C’est pourquoi je vous dis: Tout péché et tout blasphème sera pardonné aux hommes, mais le blasphème contre l’Esprit ne sera point pardonné.'
  - type: text
    content: ' '
  '32':
  - type: note
    content: 1 S 2:25.
  - type: text
    content: Quiconque parlera contre le Fils de l’homme, il lui sera pardonné;
  - type: text
    content: ' '
  - type: note
    content: No 15:30. 1 Jn 5:16.
  - type: text
    content: mais quiconque parlera contre le Saint-Esprit, il ne lui sera pardonné ni dans ce siècle ni dans le siècle à venir.
  - type: text
    content: ' '
  '33':
  - type: note
    content: Mt 7:18.
  - type: text
    content: Ou dites que l’arbre est bon et que son fruit est bon, ou dites que l’arbre est mauvais et que son fruit est mauvais; car on connaît l’arbre par le fruit.
  - type: text
    content: ' '
  '34':
  - type: note
    content: Mt 3:7.
  - type: text
    content: Races de vipères, comment pourriez-vous dire de bonnes chose, méchants comme vous l’êtes?
  - type: text
    content: ' '
  - type: note
    content: Ps 40:11. Lu 6:45.
  - type: text
    content: Car c’est de l’abondance du cœur que la bouche parle.
  - type: text
    content: ' '
  '35':
  - type: text
    content: L’homme bon tire de bonnes choses de son bon trésor, et l’homme méchant tire de mauvaises choses de son mauvais trésor.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Je vous le dis:'
  - type: text
    content: ' '
  - type: note
    content: Ép 5:4.
  - type: text
    content: au jour du jugement, les hommes rendront compte de
  - type: text
    content: ' '
  - type: note
    content: Ec 12:14.
  - type: text
    content: toute parole vaine qu’ils auront proférée.
  - type: text
    content: ' '
  '37':
  - type: note
    content: 2 S 1:16. Lu 19:22.
  - type: text
    content: Car par tes paroles tu seras justifié, et par tes paroles tu seras condamné.
  - type: heading
    content: Un miracle refusé
  - type: heading
    content: 'V. 38-45: cf. Lu 11:29-32, 24-28. (Mt 16:1-4; 11:20-24; 23:32-38.)'
  '38':
  - type: text
    content: ' '
  - type: note
    content: Mt 16:1. Mc 8:11. Lu 11:29. 1 Co 1:22.
  - type: text
    content: 'Alors quelques-uns des scribes et des pharisiens prirent la parole, et dirent: Maître, nous voudrions te voir faire un miracle. '
  '39':
  - type: text
    content: 'Il leur répondit: '
  - type: text
    content: Une génération méchante et adultère demande un miracle; il ne lui sera donné d’autre miracle que celui du prophète Jonas.
  '4':
  - type: text
    content: ' '
  - type: text
    content: comment il entra dans la maison de Dieu, et mangea
  - type: text
    content: ' '
  - type: note
    content: 1 S 21:6.
  - type: text
    content: les pains de proposition, qu’il ne lui était pas permis de manger, non plus qu’à ceux qui étaient avec lui, et
  - type: text
    content: ' '
  - type: note
    content: Ex 29:33. Lé 24:9.
  - type: text
    content: qui étaient réservés aux sacrificateurs seuls?
  - type: text
    content: ' '
  '40':
  - type: text
    content: ' '
  - type: note
    content: Jon 1:17; 2:10.
  - type: text
    content: Car, de même que Jonas fut trois jours et trois nuits dans le ventre d’un grand poisson, de même le Fils de l’homme sera trois jours et trois nuits dans le sein de la terre.
  - type: text
    content: ' '
  '41':
  - type: note
    content: Lu 11:32.
  - type: text
    content: Les hommes de Ninive se lèveront, au jour du jugement, avec cette génération et la condamneront, parce qu’ils se repentirent
  - type: text
    content: ' '
  - type: note
    content: Jon 3:5.
  - type: text
    content: à la prédication de Jonas; et voici, il y a ici plus que Jonas.
  - type: text
    content: ' '
  '42':
  - type: note
    content: 1 R 10:1. 2 Ch 9:1. Lu 11:31.
  - type: text
    content: La reine du Midi se lèvera, au jour du jugement, avec cette génération et la condamnera, parce qu’elle vint des extrémités de la terre pour entendre la sagesse de Salomon, et voici, il y a ici plus que Salomon.
  - type: text
    content: ' '
  '43':
  - type: note
    content: Lu 11:24.
  - type: text
    content: Lorsque l’esprit impur est sorti d’un homme, il va par des lieux arides, cherchant du repos, et il n’en trouve point.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Alors il dit: Je retournerai dans ma maison d’où je suis sorti; et, quand il arrive, il la trouve vide, balayée et ornée.'
  - type: text
    content: ' '
  '45':
  - type: text
    content: Il s’en va, et il prend avec lui sept autres esprits plus méchants que lui;
  - type: text
    content: ' '
  - type: note
    content: Hé 6:4, 5; 10:26. 2 Pi 2:20.
  - type: text
    content: ils entrent dans la maison, s’y établissent, et la dernière condition de cet homme est pire que la première. Il en sera de même pour cette génération méchante.
  - type: heading
    content: La mère et les frères de Jésus
  - type: heading
    content: 'V. 46-50: cf. (Mc 3:31-35. Lu 8:19-21.) Hé 2:11-13.'
  '46':
  - type: text
    content: ' '
  - type: note
    content: Mc 3:31. Lu 8:20.
  - type: text
    content: 'Comme Jésus s’adressait encore à la foule, voici, sa mère et ses frères, qui étaient dehors, cherchèrent à lui parler. '
  '47':
  - type: text
    content: 'Quelqu’un lui dit: Voici, ta mère et tes frères sont dehors, et ils cherchent à te parler. '
  '48':
  - type: text
    content: 'Mais Jésus répondit à celui qui le lui disait: '
  - type: text
    content: Qui est ma mère, et qui sont mes frères?
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'Puis, étendant la main sur ses disciples, il dit: '
  - type: text
    content: Voici ma mère et mes frères.
  '5':
  - type: note
    content: No 28:9.
  - type: text
    content: Ou, n’avez-vous pas lu dans la loi que, les jours de sabbat, les sacrificateurs violent le sabbat dans le temple, sans se rendre coupables?
  - type: text
    content: ' '
  '50':
  - type: text
    content: ' '
  - type: note
    content: Jn 15:14. 2 Co 5:16. Ga 5:6; 6:15. Col 3:11.
  - type: text
    content: Car, quiconque fait la volonté de mon Père qui est dans les cieux, celui-là est mon frère, et ma sœur, et ma mère.
  '6':
  - type: text
    content: Or, je vous le dis,
  - type: text
    content: ' '
  - type: note
    content: 2 Ch 6:18.
  - type: text
    content: il y a ici quelque chose de plus grand que le temple.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Si vous saviez ce que signifie:'
  - type: text
    content: ' '
  - type: note
    content: Os 6:6. Mi 6:8. Mt 9:13; 23:23.
  - type: text
    content: Je prends plaisir à la miséricorde, et non aux sacrifices, vous n’auriez pas condamné des innocents.
  - type: text
    content: ' '
  '8':
  - type: note
    content: Mc 2:28. Lu 6:5.
  - type: text
    content: Car le Fils de l’homme est maître du sabbat.
  - type: heading
    content: L’homme qui a la main sèche
  - type: heading
    content: 'V. 9-15: cf. Mc 3:1-6. Lu 6:6-11.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Mc 3:1. Lu 6:6.
  - type: text
    content: 'Étant parti de là, Jésus entra dans la synagogue. '
