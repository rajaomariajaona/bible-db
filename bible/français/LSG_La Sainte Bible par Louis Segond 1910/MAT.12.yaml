    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Étant parti de là, Jésus entra dans la synagogue. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et voici, il s’y trouvait un homme qui avait la main sèche. Ils demandèrent à Jésus: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 14:3
      metadata:
        usfm: LUK.14.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Est-il permis de faire une guérison les jours de sabbat? C’était afin de pouvoir l’accuser. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Lequel d’entre vous, s’il n’a qu’une brebis et qu’elle tombe
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:4
      metadata:
        usfm: EXO.23.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 22:4
      metadata:
        usfm: DEU.22.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: dans une fosse le jour du sabbat, ne la saisira pour l’en retirer?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 1:27
      metadata:
        usfm: GEN.1.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Combien un homme ne vaut-il pas plus qu’une brebis! Il est donc permis de faire du bien les jours de sabbat.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors il dit à l’homme: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Étends ta main.
  - type: text
    text: ' Il l’étendit, et elle devint saine comme l’autre. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 3:6
      metadata:
        usfm: MRK.3.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 5:18
      metadata:
        usfm: JHN.5.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:39
      metadata:
        usfm: JHN.10.39
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:53
      metadata:
        usfm: JHN.11.53
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les pharisiens sortirent, et ils se consultèrent sur les moyens de le faire périr. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais Jésus, l’ayant su, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:23
      metadata:
        usfm: MAT.10.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: s’éloigna de ce lieu.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-21: cf. Mc 3:7-12. (És 42:1-4.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Une grande foule le suivit. Il guérit tous les malades, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:30
      metadata:
        usfm: MAT.9.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:14
      metadata:
        usfm: LUK.5.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il leur recommanda sévèrement de ne pas le faire connaître, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'afin que s’accomplît ce qui avait été annoncé par Ésaïe, le prophète:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 42:1
      metadata:
        usfm: ISA.42.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:17
      metadata:
        usfm: MAT.3.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:5
      metadata:
        usfm: MAT.17.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:11
      metadata:
        usfm: MRK.1.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:13
      metadata:
        usfm: COL.1.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 1:17
      metadata:
        usfm: 2PE.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Voici mon serviteur que j’ai choisi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon bien-aimé en qui mon âme a pris plaisir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je mettrai mon Esprit sur lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il annoncera la justice aux nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il ne contestera point, il ne criera point,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et personne n’entendra sa voix dans les rues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il ne brisera point le roseau cassé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il n’éteindra point le lumignon qui fume,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à ce qu’il ait fait triompher la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Et les nations espéreront en son nom.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le démoniaque aveugle et muet. Attaque des pharisiens et réponse de Jésus. — Le péché contre le Saint-Esprit
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-37: cf. (Mc 3:20-30. Lu 11:14-26.) Hé 6:4-8; 10:26-29.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:32
      metadata:
        usfm: MAT.9.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 11:14
      metadata:
        usfm: LUK.11.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors on lui amena un démoniaque aveugle et muet, et il le guérit, de sorte que le muet parlait et voyait. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Toute la foule étonnée disait: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 4:29
      metadata:
        usfm: JHN.4.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'N’est-ce point là le Fils de David? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les pharisiens, ayant entendu cela, dirent: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:34
      metadata:
        usfm: MAT.9.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 3:22
      metadata:
        usfm: MRK.3.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 11:15
      metadata:
        usfm: LUK.11.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Cet homme ne chasse les démons que par Béelzébul, prince des démons. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Comme Jésus connaissait leurs pensées, il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tout royaume divisé contre lui-même est dévasté, et toute ville ou maison divisée contre elle-même ne peut subsister.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si Satan chasse Satan, il est divisé contre lui-même; comment donc son royaume subsistera-t-il?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et si moi, je chasse les démons par Béelzébul, vos fils, par qui les chassent-ils? C’est pourquoi ils seront eux-mêmes vos juges.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais, si c’est par l’Esprit de Dieu que je chasse les démons, le royaume de Dieu est donc venu vers vous.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ou, comment quelqu’un peut-il entrer dans la maison d’un homme fort et piller ses biens, sans avoir auparavant lié cet homme fort? Alors seulement il pillera sa maison.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui n’est pas avec moi est contre moi, et celui qui n’assemble pas avec moi disperse.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 3:28
      metadata:
        usfm: MRK.3.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 12:10
      metadata:
        usfm: LUK.12.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 5:16
      metadata:
        usfm: 1JN.5.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'C’est pourquoi je vous dis: Tout péché et tout blasphème sera pardonné aux hommes, mais le blasphème contre l’Esprit ne sera point pardonné.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 2:25
      metadata:
        usfm: 1SA.2.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quiconque parlera contre le Fils de l’homme, il lui sera pardonné;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 15:30
      metadata:
        usfm: NUM.15.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 5:16
      metadata:
        usfm: 1JN.5.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais quiconque parlera contre le Saint-Esprit, il ne lui sera pardonné ni dans ce siècle ni dans le siècle à venir.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 7:18
      metadata:
        usfm: MAT.7.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ou dites que l’arbre est bon et que son fruit est bon, ou dites que l’arbre est mauvais et que son fruit est mauvais; car on connaît l’arbre par le fruit.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:7
      metadata:
        usfm: MAT.3.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Races de vipères, comment pourriez-vous dire de bonnes chose, méchants comme vous l’êtes?
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 40:11
      metadata:
        usfm: PSA.40.11
    - type: text
      text: '. '
