  - type: text
    text: 'Alors quelques-uns des scribes et des pharisiens prirent la parole, et dirent: Maître, nous voudrions te voir faire un miracle. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Il leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Une génération méchante et adultère demande un miracle; il ne lui sera donné d’autre miracle que celui du prophète Jonas.
