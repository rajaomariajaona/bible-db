document_id: PSA.107,93
type_code: fra
verses:
  '1':
  - type: heading
    content: LIVRE CINQUIÈME
  - type: heading
    content: (És 38:20. Ap 19:1-6.)
  - type: heading
    content: Ps 126; 25:22. És 63:7, 9. (Job 36:8-11; 33:19-30.) (Éz 36:33-38. Os 14:9.)
  - type: text
    content: Louez l’Éternel, car il est bon,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '10':
  - type: text
    content: Ceux qui avaient pour demeure les ténèbres et l’ombre de la mort
  - type: text
    content: Vivaient captifs dans la misère et dans les chaînes,
  '11':
  - type: text
    content: Parce qu’ils s’étaient révoltés contre les paroles de Dieu,
  - type: text
    content: Parce qu’ils avaient méprisé le conseil du Très-Haut.
  '12':
  - type: text
    content: Il humilia leur cœur par la souffrance;
  - type: text
    content: Ils succombèrent, et personne ne les secourut.
  '13':
  - type: text
    content: Dans leur détresse, ils crièrent à l’Éternel,
  - type: text
    content: Et il les délivra de leurs angoisses;
  '14':
  - type: text
    content: Il les fit sortir des ténèbres et de l’ombre de la mort,
  - type: text
    content: Et il rompit leurs liens.
  '15':
  - type: text
    content: Qu’ils louent l’Éternel pour sa bonté,
  - type: text
    content: Et pour ses merveilles en faveur des fils de l’homme!
  '16':
  - type: text
    content: Car il a brisé les portes d’airain,
  - type: text
    content: Il a rompu les verrous de fer.
  '17':
  - type: text
    content: Les insensés, par leur conduite coupable
  - type: text
    content: Et par leurs iniquités, s’étaient rendus malheureux.
  '18':
  - type: text
    content: Leur âme avait en horreur toute nourriture,
  - type: text
    content: Et ils touchaient aux portes de la mort.
  '19':
  - type: text
    content: Dans leur détresse, ils crièrent à l’Éternel,
  - type: text
    content: Et il les délivra de leurs angoisses;
  '2':
  - type: text
    content: Qu’ainsi disent les rachetés de l’Éternel,
  - type: text
    content: Ceux qu’il a délivrés de la main de l’ennemi,
  '20':
  - type: text
    content: Il envoya sa parole et les guérit,
  - type: text
    content: Il les fit échapper de la fosse.
  '21':
  - type: text
    content: Qu’ils louent l’Éternel pour sa bonté,
  - type: text
    content: Et pour ses merveilles en faveur des fils de l’homme!
  '22':
  - type: text
    content: ' '
  - type: note
    content: Lé 7:12. Ps 50:14.
  - type: text
    content: Qu’ils offrent des sacrifices d’actions de grâces,
  - type: text
    content: Et qu’ils publient ses œuvres avec des cris de joie!
  '23':
  - type: text
    content: Ceux qui étaient descendus sur la mer dans des navires,
  - type: note
    content: Ap 18:17.
  - type: text
    content: Et qui travaillaient sur les grandes eaux,
  '24':
  - type: text
    content: Ceux-là virent les œuvres de l’Éternel
  - type: text
    content: Et ses merveilles au milieu de l’abîme.
  '25':
  - type: text
    content: Il dit, et il fit souffler la tempête,
  - type: text
    content: Qui souleva les flots de la mer.
  '26':
  - type: text
    content: Ils montaient vers les cieux, ils descendaient dans l’abîme;
  - type: text
    content: Leur âme était éperdue en face du danger;
  '27':
  - type: text
    content: Saisis de vertige, ils chancelaient comme un homme ivre,
  - type: text
    content: Et toute leur habileté était anéantie.
  '28':
  - type: text
    content: Dans leur détresse, ils crièrent à l’Éternel,
  - type: text
    content: Et il les délivra de leurs angoisses;
  '29':
  - type: text
    content: Il arrêta la tempête, ramena le calme,
  - type: text
    content: Et les ondes se turent.
  '3':
  - type: text
    content: Et qu’il a rassemblés de tous les pays,
  - type: text
    content: De l’orient et de l’occident, du nord et de la mer!
  '30':
  - type: text
    content: Ils se réjouirent de ce qu’elles s’étaient apaisées,
  - type: text
    content: Et l’Éternel les conduisit au port désiré.
  '31':
  - type: text
    content: Qu’ils louent l’Éternel pour sa bonté,
  - type: text
    content: Et pour ses merveilles en faveur des fils de l’homme!
  '32':
  - type: text
    content: Qu’ils l’exaltent dans l’assemblée du peuple,
  - type: text
    content: Et qu’ils le célèbrent dans la réunion des anciens!
  '33':
  - type: text
    content: Il change les fleuves en désert,
  - type: text
    content: Et les sources d’eaux en terre desséchée,
  '34':
  - type: text
    content: Le pays fertile en pays salé,
  - type: text
    content: A cause de la méchanceté de ses habitants.
  '35':
  - type: text
    content: ' '
  - type: note
    content: És 41:18.
  - type: text
    content: Il change le désert en étang,
  - type: text
    content: Et la terre aride en sources d’eaux,
  '36':
  - type: text
    content: Et il y établit ceux qui sont affamés.
  - type: text
    content: Ils fondent une ville pour l’habiter;
  '37':
  - type: text
    content: Ils ensemencent des champs, plantent des vignes,
  - type: text
    content: Et ils en recueillent les produits.
  '38':
  - type: text
    content: Il les bénit, et ils deviennent très nombreux,
  - type: text
    content: Et il ne diminue point leur bétail.
  '39':
  - type: text
    content: Sont-ils amoindris et humiliés
  - type: text
    content: Par l’oppression, le malheur et la souffrance;
  '4':
  - type: text
    content: Ils erraient dans le désert, ils marchaient dans la solitude,
  - type: text
    content: Sans trouver une ville où ils pussent habiter.
  '40':
  - type: text
    content: Verse-t-il le mépris sur les grands,
  - type: text
    content: Les fait-il errer dans des déserts sans chemin,
  '41':
  - type: text
    content: ' '
  - type: note
    content: 2 S 2:8. Ps 113:7, 8.
  - type: text
    content: Il relève l’indigent et le délivre de la misère,
  - type: text
    content: Il multiplie les familles comme des troupeaux.
  '42':
  - type: text
    content: ' '
  - type: note
    content: Job 22:19.
  - type: text
    content: Les hommes droits le voient et se réjouissent,
  - type: note
    content: Job 5:16.
  - type: text
    content: Mais toute iniquité ferme la bouche.
  '43':
  - type: text
    content: Que celui qui est sage prenne garde à ces choses,
  - type: text
    content: Et qu’il soit attentif aux bontés de l’Éternel.
  '5':
  - type: text
    content: Ils souffraient de la faim et de la soif;
  - type: text
    content: Leur âme était languissante.
  '6':
  - type: text
    content: Dans leur détresse, ils crièrent à l’Éternel,
  - type: text
    content: Et il les délivra de leurs angoisses;
  '7':
  - type: text
    content: Il les conduisit par le droit chemin,
  - type: text
    content: Pour qu’ils arrivassent dans une ville habitable.
  '8':
  - type: text
    content: Qu’ils louent l’Éternel pour sa bonté,
  - type: text
    content: Et pour ses merveilles en faveur des fils de l’homme!
  '9':
  - type: text
    content: Car il a satisfait l’âme altérée,
  - type: text
    content: Il a comblé de biens l’âme affamée.
