document_id: PSA.107
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: LIVRE CINQUIÈME
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: (És 38:20. Ap 19:1-6.)
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 126; 25:22. És 63:7, 9. (Job 36:8-11; 33:19-30.) (Éz 36:33-38. Os 14:9.)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louez l’Éternel, car il est bon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car sa miséricorde dure à toujours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Qu’ainsi disent les rachetés de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qu’il a délivrés de la main de l’ennemi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Et qu’il a rassemblés de tous les pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De l’orient et de l’occident, du nord et de la mer!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils erraient dans le désert, ils marchaient dans la solitude,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans trouver une ville où ils pussent habiter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils souffraient de la faim et de la soif;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur âme était languissante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dans leur détresse, ils crièrent à l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il les délivra de leurs angoisses;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il les conduisit par le droit chemin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour qu’ils arrivassent dans une ville habitable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Qu’ils louent l’Éternel pour sa bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pour ses merveilles en faveur des fils de l’homme!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Car il a satisfait l’âme altérée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a comblé de biens l’âme affamée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ceux qui avaient pour demeure les ténèbres et l’ombre de la mort
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vivaient captifs dans la misère et dans les chaînes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Parce qu’ils s’étaient révoltés contre les paroles de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’ils avaient méprisé le conseil du Très-Haut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il humilia leur cœur par la souffrance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils succombèrent, et personne ne les secourut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dans leur détresse, ils crièrent à l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il les délivra de leurs angoisses;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il les fit sortir des ténèbres et de l’ombre de la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il rompit leurs liens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Qu’ils louent l’Éternel pour sa bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pour ses merveilles en faveur des fils de l’homme!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Car il a brisé les portes d’airain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a rompu les verrous de fer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Les insensés, par leur conduite coupable
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et par leurs iniquités, s’étaient rendus malheureux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Leur âme avait en horreur toute nourriture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils touchaient aux portes de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dans leur détresse, ils crièrent à l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il les délivra de leurs angoisses;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il envoya sa parole et les guérit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les fit échapper de la fosse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Qu’ils louent l’Éternel pour sa bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pour ses merveilles en faveur des fils de l’homme!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 7:12
      metadata:
        usfm: LEV.7.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 50:14
      metadata:
        usfm: PSA.50.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qu’ils offrent des sacrifices d’actions de grâces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’ils publient ses œuvres avec des cris de joie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ceux qui étaient descendus sur la mer dans des navires,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 18:17
      metadata:
        usfm: REV.18.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et qui travaillaient sur les grandes eaux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ceux-là virent les œuvres de l’Éternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses merveilles au milieu de l’abîme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il dit, et il fit souffler la tempête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui souleva les flots de la mer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ils montaient vers les cieux, ils descendaient dans l’abîme;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur âme était éperdue en face du danger;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Saisis de vertige, ils chancelaient comme un homme ivre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et toute leur habileté était anéantie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dans leur détresse, ils crièrent à l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il les délivra de leurs angoisses;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Il arrêta la tempête, ramena le calme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les ondes se turent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ils se réjouirent de ce qu’elles s’étaient apaisées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’Éternel les conduisit au port désiré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Qu’ils louent l’Éternel pour sa bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pour ses merveilles en faveur des fils de l’homme!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Qu’ils l’exaltent dans l’assemblée du peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’ils le célèbrent dans la réunion des anciens!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il change les fleuves en désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les sources d’eaux en terre desséchée,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Le pays fertile en pays salé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de la méchanceté de ses habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 41:18
      metadata:
        usfm: ISA.41.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il change le désert en étang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la terre aride en sources d’eaux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Et il y établit ceux qui sont affamés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils fondent une ville pour l’habiter;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ils ensemencent des champs, plantent des vignes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils en recueillent les produits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Il les bénit, et ils deviennent très nombreux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il ne diminue point leur bétail.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Sont-ils amoindris et humiliés
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par l’oppression, le malheur et la souffrance;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Verse-t-il le mépris sur les grands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les fait-il errer dans des déserts sans chemin,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 2:8
      metadata:
        usfm: 2SA.2.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 113:7
      metadata:
        usfm: PSA.113.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: PSA.113.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il relève l’indigent et le délivre de la misère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il multiplie les familles comme des troupeaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 22:19
      metadata:
        usfm: JOB.22.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les hommes droits le voient et se réjouissent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 5:16
      metadata:
        usfm: JOB.5.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais toute iniquité ferme la bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Que celui qui est sage prenne garde à ces choses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’il soit attentif aux bontés de l’Éternel.
