document_id: PSA.107,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: LIVRE CINQUIÈME
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: (És 38:20. Ap 19:1-6.)
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 126; 25:22. És 63:7, 9. (Job 36:8-11; 33:19-30.) (Éz 36:33-38. Os 14:9.)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Éternel, car il est bon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car sa miséricorde dure à toujours!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui avaient pour demeure les ténèbres et l’ombre de la mort
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vivaient captifs dans la misère et dans les chaînes,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils s’étaient révoltés contre les paroles de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils avaient méprisé le conseil du Très-Haut.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il humilia leur cœur par la souffrance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils succombèrent, et personne ne les secourut.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans leur détresse, ils crièrent à l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il les délivra de leurs angoisses;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les fit sortir des ténèbres et de l’ombre de la mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il rompit leurs liens.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils louent l’Éternel pour sa bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pour ses merveilles en faveur des fils de l’homme!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il a brisé les portes d’airain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a rompu les verrous de fer.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les insensés, par leur conduite coupable
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et par leurs iniquités, s’étaient rendus malheureux.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur âme avait en horreur toute nourriture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils touchaient aux portes de la mort.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans leur détresse, ils crièrent à l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il les délivra de leurs angoisses;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ainsi disent les rachetés de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qu’il a délivrés de la main de l’ennemi,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il envoya sa parole et les guérit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les fit échapper de la fosse.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils louent l’Éternel pour sa bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pour ses merveilles en faveur des fils de l’homme!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 7:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 50:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qu’ils offrent des sacrifices d’actions de grâces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’ils publient ses œuvres avec des cris de joie!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui étaient descendus sur la mer dans des navires,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 18:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et qui travaillaient sur les grandes eaux,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux-là virent les œuvres de l’Éternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses merveilles au milieu de l’abîme.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il dit, et il fit souffler la tempête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui souleva les flots de la mer.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils montaient vers les cieux, ils descendaient dans l’abîme;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur âme était éperdue en face du danger;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saisis de vertige, ils chancelaient comme un homme ivre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toute leur habileté était anéantie.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans leur détresse, ils crièrent à l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il les délivra de leurs angoisses;
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il arrêta la tempête, ramena le calme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les ondes se turent.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il a rassemblés de tous les pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De l’orient et de l’occident, du nord et de la mer!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se réjouirent de ce qu’elles s’étaient apaisées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’Éternel les conduisit au port désiré.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils louent l’Éternel pour sa bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pour ses merveilles en faveur des fils de l’homme!
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils l’exaltent dans l’assemblée du peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’ils le célèbrent dans la réunion des anciens!
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il change les fleuves en désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les sources d’eaux en terre desséchée,
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pays fertile en pays salé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de la méchanceté de ses habitants.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 41:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il change le désert en étang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la terre aride en sources d’eaux,
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il y établit ceux qui sont affamés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils fondent une ville pour l’habiter;
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ensemencent des champs, plantent des vignes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils en recueillent les produits.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les bénit, et ils deviennent très nombreux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il ne diminue point leur bétail.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sont-ils amoindris et humiliés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par l’oppression, le malheur et la souffrance;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils erraient dans le désert, ils marchaient dans la solitude,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans trouver une ville où ils pussent habiter.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Verse-t-il le mépris sur les grands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les fait-il errer dans des déserts sans chemin,
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 2:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 113:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il relève l’indigent et le délivre de la misère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il multiplie les familles comme des troupeaux.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 22:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les hommes droits le voient et se réjouissent,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 5:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais toute iniquité ferme la bouche.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que celui qui est sage prenne garde à ces choses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il soit attentif aux bontés de l’Éternel.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils souffraient de la faim et de la soif;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur âme était languissante.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans leur détresse, ils crièrent à l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il les délivra de leurs angoisses;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les conduisit par le droit chemin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour qu’ils arrivassent dans une ville habitable.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils louent l’Éternel pour sa bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pour ses merveilles en faveur des fils de l’homme!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il a satisfait l’âme altérée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a comblé de biens l’âme affamée.
