document_id: 2TI.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-5: cf. Ac 20:28-31. (2 Ti 2:3-7. 1 Pi 5:1-4.)'
  - type: text
    content: ' '
  - type: note
    content: Ro 1:9; 9:1. 2 Co 1:23; 11:31. Ga 1:20. Ph 1:8. 1 Th 2:5. 1 Ti 5:21; 6:13.
  - type: text
    content: 'Je t’en conjure devant Dieu et devant Jésus-Christ, qui doit juger les vivants et les morts, et au nom de son apparition et de son royaume, '
  '10':
  - type: text
    content: 'car '
  - type: note
    content: Col 4:14. Phm v. 24.
  - type: text
    content: 'Démas m’a abandonné, par amour pour le siècle présent, et il est parti pour Thessalonique; Crescens est allé en Galatie, Tite en Dalmatie. '
  '11':
  - type: note
    content: Col 4:14.
  - type: text
    content: 'Luc seul est avec moi. Prends '
  - type: note
    content: Ac 15:37. Col 4:10. Phm v. 24.
  - type: text
    content: 'Marc, et amène-le avec toi, car il m’est utile pour le ministère. '
  '12':
  - type: note
    content: Ac 20:4. Col 4:7.
  - type: text
    content: 'J’ai envoyé Tychique à Éphèse. '
  '13':
  - type: text
    content: 'Quand tu viendras, apporte le manteau que j’ai laissé à Troas chez Carpus, et les livres, surtout les parchemins. '
  '14':
  - type: note
    content: 1 Ti 1:20.
  - type: text
    content: 'Alexandre, le forgeron, m’a fait beaucoup de mal. Le Seigneur lui rendra selon ses œuvres. '
  '15':
  - type: text
    content: 'Garde-toi aussi de lui, car il s’est fortement opposé à nos paroles. '
  '16':
  - type: text
    content: 'Dans ma première défense, personne ne m’a assisté, mais tous m’ont abandonné. Que cela ne leur soit point imputé! '
  '17':
  - type: text
    content: 'C’est le Seigneur qui m’a assisté et qui m’a fortifié, afin que la prédication fût accomplie par moi et que tous les païens l’entendissent. Et j’ai été délivré de la gueule du lion. '
  '18':
  - type: text
    content: Le Seigneur me délivrera de toute œuvre mauvaise, et il me sauvera pour me faire entrer dans son royaume céleste. A lui soit la gloire aux siècles des siècles! Amen!
  - type: heading
    content: Salutations
  - type: heading
    content: 'V. 19-22: cf. Ro 16:3, 4. 2 Ti 1:16-18.'
  '19':
  - type: text
    content: 'Salue '
  - type: note
    content: Ac 18:2. Ro 16:3.
  - type: text
    content: 'Prisca et Aquilas, et la famille d’Onésiphore. '
  '2':
  - type: text
    content: 'prêche la parole, insiste en toute occasion, favorable ou non, reprends, censure, exhorte, avec toute douceur et en instruisant. '
  '20':
  - type: text
    content: 'Éraste est resté à Corinthe, et j’ai laissé Trophime malade à Milet. '
  '21':
  - type: text
    content: 'Tâche de venir avant l’hiver. Eubulus, Pudens, Linus, Claudia, et tous les frères te saluent. '
  '22':
  - type: text
    content: Que le Seigneur soit avec ton esprit! Que la grâce soit avec vous!
  '3':
  - type: text
    content: 'Car il viendra un temps où les hommes ne supporteront pas la saine doctrine; mais, ayant la démangeaison d’entendre des choses agréables, ils se donneront une foule de docteurs selon leurs propres désirs, '
  '4':
  - type: text
    content: 'détourneront l’oreille de la vérité, et se tourneront vers les fables. '
  '5':
  - type: text
    content: Mais toi, sois sobre en toutes choses, supporte les souffrances, fais l’œuvre d’un évangéliste, remplis bien ton ministère.
  - type: heading
    content: Pensées de Paul à la perspective de sa mort prochaine. Timothée invité à se rendre auprès de lui. Communications sur diverses personnes
  - type: heading
    content: 'V. 6-18: cf. Ph 1:20-23. 1 Jn 2:28. (1 Ti 1:19, 20. Hé 10:26, 27.) (Mt 10:18-20. Jé 15:20, 21. Jud v. 24, 25.)'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 2 Pi 1:14.
  - type: text
    content: 'Car pour moi, je sers déjà de libation, et le moment de mon départ approche. '
  '7':
  - type: text
    content: 'J’ai combattu le bon combat, j’ai achevé la course, j’ai gardé la foi. '
  '8':
  - type: note
    content: 1 Co 9:25. 1 Pi 5:4.
  - type: text
    content: 'Désormais la couronne de justice m’est réservée; le Seigneur, le juste juge, me la donnera dans ce jour-là, et non seulement à moi, mais encore à tous ceux qui auront aimé son avènement. '
  '9':
  - type: text
    content: 'Viens au plus tôt vers moi; '
