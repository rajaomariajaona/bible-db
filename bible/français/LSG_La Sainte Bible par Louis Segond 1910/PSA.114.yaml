    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quand '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:3
      metadata:
        usfm: EXO.13.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Israël sortit d’Égypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand la maison de Jacob s’éloigna d’un peuple barbare,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Juda devint son sanctuaire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël fut son domaine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: La mer le vit et s’enfuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Jourdain retourna en arrière;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les montagnes sautèrent comme des béliers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les collines comme des agneaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Qu’as-tu, mer, pour t’enfuir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jourdain, pour retourner en arrière?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Qu’avez-vous, montagnes, pour sauter comme des béliers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous, collines, comme des agneaux?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tremble devant le Seigneur, ô terre!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Devant le Dieu de Jacob,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Qui change le rocher en étang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le roc en source d’eaux.
