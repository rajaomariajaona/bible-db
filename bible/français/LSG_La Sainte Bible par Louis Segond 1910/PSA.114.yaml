document_id: PSA.114,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 77:12-21; 78:12-16. Ha 3:3-13.
  - type: text
    content: 'Quand '
  - type: note
    content: Ex 13:3.
  - type: text
    content: Israël sortit d’Égypte,
  - type: text
    content: Quand la maison de Jacob s’éloigna d’un peuple barbare,
  '2':
  - type: text
    content: Juda devint son sanctuaire,
  - type: text
    content: Israël fut son domaine.
  '3':
  - type: text
    content: La mer le vit et s’enfuit,
  - type: text
    content: Le Jourdain retourna en arrière;
  '4':
  - type: text
    content: Les montagnes sautèrent comme des béliers,
  - type: text
    content: Les collines comme des agneaux.
  '5':
  - type: text
    content: Qu’as-tu, mer, pour t’enfuir,
  - type: text
    content: Jourdain, pour retourner en arrière?
  '6':
  - type: text
    content: Qu’avez-vous, montagnes, pour sauter comme des béliers,
  - type: text
    content: Et vous, collines, comme des agneaux?
  '7':
  - type: text
    content: Tremble devant le Seigneur, ô terre!
  - type: text
    content: Devant le Dieu de Jacob,
  '8':
  - type: text
    content: Qui change le rocher en étang,
  - type: text
    content: Le roc en source d’eaux.
