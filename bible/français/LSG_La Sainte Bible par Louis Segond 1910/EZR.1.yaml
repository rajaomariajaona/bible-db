document_id: EZR.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Édit de Cyrus. Retour de la captivité de Babylone
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. 2 Ch 36:20-23. (Jé 25:11, 12; 29:10-14. És 44:26-28; 45:1-13; 49:13-17.) Ro 11:23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 36:22
      metadata:
        usfm: 2CH.36.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'La première année de Cyrus, roi de Perse, afin que s’accomplît '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 25:12
      metadata:
        usfm: JER.25.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:10
      metadata:
        usfm: JER.29.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la parole de l’Éternel prononcée par la bouche de Jérémie, l’Éternel réveilla l’esprit de Cyrus, roi de Perse, qui fit faire de vive voix et par écrit cette publication dans tout son royaume: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ainsi parle Cyrus, roi des Perses: L’Éternel, le Dieu des cieux, m’a donné tous les royaumes de la terre, et il m’a commandé de lui bâtir une maison à Jérusalem en Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Qui d’entre vous est de son peuple? Que son Dieu soit avec lui, et qu’il monte à Jérusalem en Juda et bâtisse la maison de l’Éternel, le Dieu d’Israël! C’est le Dieu qui est à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dans tout lieu où séjournent des restes du peuple de l’Éternel, les gens du lieu leur donneront de l’argent, de l’or, des effets, et du bétail, avec des offrandes volontaires pour la maison de Dieu qui est à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les chefs de famille de Juda et de Benjamin, les sacrificateurs et les Lévites, tous ceux dont Dieu réveilla l’esprit, se levèrent pour aller bâtir la maison de l’Éternel à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tous leurs alentours leur donnèrent des objets d’argent, de l’or, des effets, du bétail, et des choses précieuses, outre toutes les offrandes volontaires. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le roi Cyrus rendit les ustensiles de la maison de l’Éternel, que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 24:13
      metadata:
        usfm: 2KI.24.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 36:7
      metadata:
        usfm: 2CH.36.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nebucadnetsar avait emportés de Jérusalem et placés dans la maison de son dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cyrus, roi de Perse, les fit sortir par Mithredath, le trésorier, qui les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esd 5:1
      metadata:
        usfm: EZR.5.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'remit à Scheschbatsar, prince de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En voici le nombre: trente bassins d’or, mille bassins d’argent, vingt-neuf couteaux, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'trente coupes d’or, quatre cent dix coupes d’argent de second ordre, mille autres ustensiles. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tous les objets d’or et d’argent étaient au nombre de cinq mille quatre cents. Scheschbatsar emporta le tout de Babylone à Jérusalem, au retour de la captivité.
