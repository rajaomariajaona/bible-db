document_id: EZR.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Édit de Cyrus. Retour de la captivité de Babylone
  - type: heading
    content: 'V. 1-11: cf. 2 Ch 36:20-23. (Jé 25:11, 12; 29:10-14. És 44:26-28; 45:1-13; 49:13-17.) Ro 11:23.'
  - type: text
    content: ' '
  - type: note
    content: 2 Ch 36:22.
  - type: text
    content: 'La première année de Cyrus, roi de Perse, afin que s’accomplît '
  - type: note
    content: Jé 25:12; 29:10.
  - type: text
    content: 'la parole de l’Éternel prononcée par la bouche de Jérémie, l’Éternel réveilla l’esprit de Cyrus, roi de Perse, qui fit faire de vive voix et par écrit cette publication dans tout son royaume: '
  '10':
  - type: text
    content: 'trente coupes d’or, quatre cent dix coupes d’argent de second ordre, mille autres ustensiles. '
  '11':
  - type: text
    content: Tous les objets d’or et d’argent étaient au nombre de cinq mille quatre cents. Scheschbatsar emporta le tout de Babylone à Jérusalem, au retour de la captivité.
  '2':
  - type: text
    content: 'Ainsi parle Cyrus, roi des Perses: L’Éternel, le Dieu des cieux, m’a donné tous les royaumes de la terre, et il m’a commandé de lui bâtir une maison à Jérusalem en Juda. '
  '3':
  - type: text
    content: 'Qui d’entre vous est de son peuple? Que son Dieu soit avec lui, et qu’il monte à Jérusalem en Juda et bâtisse la maison de l’Éternel, le Dieu d’Israël! C’est le Dieu qui est à Jérusalem. '
  '4':
  - type: text
    content: 'Dans tout lieu où séjournent des restes du peuple de l’Éternel, les gens du lieu leur donneront de l’argent, de l’or, des effets, et du bétail, avec des offrandes volontaires pour la maison de Dieu qui est à Jérusalem. '
  '5':
  - type: text
    content: 'Les chefs de famille de Juda et de Benjamin, les sacrificateurs et les Lévites, tous ceux dont Dieu réveilla l’esprit, se levèrent pour aller bâtir la maison de l’Éternel à Jérusalem. '
  '6':
  - type: text
    content: 'Tous leurs alentours leur donnèrent des objets d’argent, de l’or, des effets, du bétail, et des choses précieuses, outre toutes les offrandes volontaires. '
  '7':
  - type: text
    content: 'Le roi Cyrus rendit les ustensiles de la maison de l’Éternel, que '
  - type: note
    content: 2 R 24:13. 2 Ch 36:7.
  - type: text
    content: 'Nebucadnetsar avait emportés de Jérusalem et placés dans la maison de son dieu. '
  '8':
  - type: text
    content: 'Cyrus, roi de Perse, les fit sortir par Mithredath, le trésorier, qui les '
  - type: note
    content: Esd 5:1.
  - type: text
    content: 'remit à Scheschbatsar, prince de Juda. '
  '9':
  - type: text
    content: 'En voici le nombre: trente bassins d’or, mille bassins d’argent, vingt-neuf couteaux, '
