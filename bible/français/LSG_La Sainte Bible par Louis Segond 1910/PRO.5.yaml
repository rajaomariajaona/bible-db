document_id: PRO.5
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-23: cf. (Pr 6:20-35; 7.) Hé 13:4.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mon fils, sois attentif à ma sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prête l’oreille à mon intelligence,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Afin que tu conserves la réflexion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que tes lèvres gardent la connaissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Car les lèvres de l’étrangère distillent le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 2:16
      metadata:
        usfm: PRO.2.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:24
      metadata:
        usfm: PRO.6.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: miel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et son palais est plus doux que l’huile;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mais à la fin elle est amère comme l’absinthe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aiguë comme un glaive à deux tranchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 7:27
      metadata:
        usfm: PRO.7.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ses pieds descendent vers la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses pas atteignent le séjour des morts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Afin de ne pas considérer le chemin de la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle est errante dans ses voies, elle ne sait où elle va.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Et maintenant, mes fils, écoutez-moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne vous écartez pas des paroles de ma bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Éloigne-toi du chemin qui conduit chez elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne t’approche pas de la porte de sa maison,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: De peur que tu ne livres ta vigueur à d’autres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et tes années à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 6:34
      metadata:
        usfm: PRO.6.34
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '35'
      metadata:
        usfm: PRO.6.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: un homme cruel;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: De peur que des étrangers ne se rassasient de ton bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et du produit de ton travail dans la maison d’autrui;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: De peur que tu ne gémisses, près de ta fin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand ta chair et ton corps se consumeront,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et que tu ne dises: Comment donc ai-je pu haïr la correction,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et comment mon cœur a-t-il dédaigné la réprimande?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Comment ai-je pu ne pas écouter la voix de mes maîtres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne pas prêter l’oreille à ceux qui m’instruisaient?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Peu s’en est fallu que je n’aie éprouvé tous les malheurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au milieu du peuple et de l’assemblée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Bois les eaux de ta citerne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les eaux qui sortent de ton puits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tes sources doivent-elles se répandre au-dehors?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes ruisseaux doivent ils couler sur les places publiques?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Qu’ils soient pour toi seul,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et non pour des étrangers avec toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Que ta source soit bénie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et fais ta joie de la femme de ta jeunesse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Biche des amours, gazelle pleine de grâce:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sois en tout temps enivré de ses charmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans cesse épris de son amour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Et pourquoi, mon fils, serais-tu épris d’une étrangère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et embrasserais-tu le sein d’une inconnue?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Car les voies de l’homme sont devant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 16:9
      metadata:
        usfm: 2CH.16.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 31:4
      metadata:
        usfm: JOB.31.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:21
      metadata:
        usfm: JOB.34.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 15:3
      metadata:
        usfm: PRO.15.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 16:17
      metadata:
        usfm: JER.16.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 32:19
      metadata:
        usfm: JER.32.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: les yeux de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui observe tous ses sentiers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Le méchant est pris dans ses propres iniquités,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est saisi par les liens de son péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Il mourra faute d’instruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il chancellera par l’excès de sa folie.
