document_id: PRO.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-23: cf. (Pr 6:20-35; 7.) Hé 13:4.'
  - type: text
    content: Mon fils, sois attentif à ma sagesse,
  - type: text
    content: Prête l’oreille à mon intelligence,
  '10':
  - type: text
    content: De peur que des étrangers ne se rassasient de ton bien,
  - type: text
    content: Et du produit de ton travail dans la maison d’autrui;
  '11':
  - type: text
    content: De peur que tu ne gémisses, près de ta fin,
  - type: text
    content: Quand ta chair et ton corps se consumeront,
  '12':
  - type: text
    content: 'Et que tu ne dises: Comment donc ai-je pu haïr la correction,'
  - type: text
    content: Et comment mon cœur a-t-il dédaigné la réprimande?
  '13':
  - type: text
    content: Comment ai-je pu ne pas écouter la voix de mes maîtres,
  - type: text
    content: Ne pas prêter l’oreille à ceux qui m’instruisaient?
  '14':
  - type: text
    content: Peu s’en est fallu que je n’aie éprouvé tous les malheurs
  - type: text
    content: Au milieu du peuple et de l’assemblée.
  '15':
  - type: text
    content: Bois les eaux de ta citerne,
  - type: text
    content: Les eaux qui sortent de ton puits.
  '16':
  - type: text
    content: Tes sources doivent-elles se répandre au-dehors?
  - type: text
    content: Tes ruisseaux doivent ils couler sur les places publiques?
  '17':
  - type: text
    content: Qu’ils soient pour toi seul,
  - type: text
    content: Et non pour des étrangers avec toi.
  '18':
  - type: text
    content: Que ta source soit bénie,
  - type: text
    content: Et fais ta joie de la femme de ta jeunesse,
  '19':
  - type: text
    content: 'Biche des amours, gazelle pleine de grâce:'
  - type: text
    content: Sois en tout temps enivré de ses charmes,
  - type: text
    content: Sans cesse épris de son amour.
  '2':
  - type: text
    content: Afin que tu conserves la réflexion,
  - type: text
    content: Et que tes lèvres gardent la connaissance.
  '20':
  - type: text
    content: Et pourquoi, mon fils, serais-tu épris d’une étrangère,
  - type: text
    content: Et embrasserais-tu le sein d’une inconnue?
  '21':
  - type: text
    content: 'Car les voies de l’homme sont devant '
  - type: note
    content: 2 Ch 16:9. Job 31:4; 34:21. Pr 15:3. Jé 16:17; 32:19.
  - type: text
    content: les yeux de l’Éternel,
  - type: text
    content: Qui observe tous ses sentiers.
  '22':
  - type: text
    content: Le méchant est pris dans ses propres iniquités,
  - type: text
    content: Il est saisi par les liens de son péché.
  '23':
  - type: text
    content: Il mourra faute d’instruction,
  - type: text
    content: Il chancellera par l’excès de sa folie.
  '3':
  - type: text
    content: 'Car les lèvres de l’étrangère distillent le '
  - type: note
    content: Pr 2:16; 6:24.
  - type: text
    content: miel,
  - type: text
    content: Et son palais est plus doux que l’huile;
  '4':
  - type: text
    content: Mais à la fin elle est amère comme l’absinthe,
  - type: text
    content: Aiguë comme un glaive à deux tranchants.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Pr 7:27.
  - type: text
    content: Ses pieds descendent vers la mort,
  - type: text
    content: Ses pas atteignent le séjour des morts.
  '6':
  - type: text
    content: Afin de ne pas considérer le chemin de la vie,
  - type: text
    content: Elle est errante dans ses voies, elle ne sait où elle va.
  '7':
  - type: text
    content: Et maintenant, mes fils, écoutez-moi,
  - type: text
    content: Et ne vous écartez pas des paroles de ma bouche.
  '8':
  - type: text
    content: Éloigne-toi du chemin qui conduit chez elle,
  - type: text
    content: Et ne t’approche pas de la porte de sa maison,
  '9':
  - type: text
    content: De peur que tu ne livres ta vigueur à d’autres,
  - type: text
    content: 'Et tes années à '
  - type: note
    content: Pr 6:34, 35.
  - type: text
    content: un homme cruel;
