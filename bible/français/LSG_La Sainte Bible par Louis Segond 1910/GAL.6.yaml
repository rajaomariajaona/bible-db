document_id: GAL.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Exhortation au support mutuel, à la libéralité, à la pratique du bien
  - type: heading
    content: 'V. 1-5: cf. 1 Th 5:14. Ro 12:3, 16; 15:1-2; 14:10-12.'
  - type: text
    content: 'Frères, '
  - type: note
    content: Ro 14:1; 15:1. 1 Co 9:22.
  - type: text
    content: 'si un homme vient à être surpris en quelque faute, vous qui êtes spirituels, redressez-le avec un esprit de douceur. Prends garde à toi-même, de peur que tu ne sois aussi tenté. '
  '10':
  - type: text
    content: 'Ainsi donc, pendant que nous en avons l’occasion, pratiquons le bien envers tous, et '
  - type: note
    content: 1 Ti 5:8.
  - type: text
    content: surtout envers les frères en la foi.
  - type: heading
    content: Un dernier mot sur ceux qui imposent la circoncision. La croix de Christ, seul sujet de gloire pour l’apôtre. Vœux et salutation
  - type: heading
    content: 'V. 11-18: cf. Ph 3:2-11. Ga 5:5-10.'
  '11':
  - type: text
    content: 'Voyez avec quelles grandes lettres je vous ai écrit de ma propre main. '
  '12':
  - type: text
    content: 'Tous ceux qui veulent se rendre agréables selon la chair vous contraignent à vous faire circoncire, uniquement afin de n’être pas persécutés pour la croix de Christ. '
  '13':
  - type: text
    content: 'Car les circoncis eux-mêmes n’observent point la loi; mais ils veulent que vous soyez circoncis, pour se glorifier dans votre chair. '
  '14':
  - type: text
    content: 'Pour ce qui me concerne, loin de moi la pensée de me glorifier d’autre chose que de la croix de notre Seigneur Jésus-Christ, par qui le monde est crucifié pour moi, comme je le suis pour le monde! '
  '15':
  - type: note
    content: Mt 12:50. Jn 15:14. 2 Co 5:16. Ga 5:6. Col 3:11.
  - type: text
    content: 'Car ce n’est rien que d’être circoncis ou incirconcis; ce qui est quelque chose, c’est d’être une nouvelle créature. '
  '16':
  - type: note
    content: Ps 125:5.
  - type: text
    content: 'Paix et miséricorde sur tous ceux qui suivront cette règle, et sur l’Israël de Dieu! '
  '17':
  - type: text
    content: 'Que personne désormais ne me fasse de la peine, '
  - type: note
    content: 2 Co 4:10.
  - type: text
    content: 'car je porte sur mon corps les marques de Jésus. '
  '18':
  - type: text
    content: Frères, que la grâce de notre Seigneur Jésus-Christ soit avec votre esprit! Amen!
  '2':
  - type: note
    content: Mt 11:29. Jn 13:14. Ro 15:1. 1 Th 5:14.
  - type: text
    content: 'Portez les fardeaux les uns des autres, et vous accomplirez ainsi la loi de Christ. '
  '3':
  - type: text
    content: 'Si quelqu’un pense être quelque chose, quoiqu’il ne soit rien, il s’abuse lui-même. '
  '4':
  - type: text
    content: 'Que chacun examine ses propres œuvres, et alors il aura sujet de se glorifier pour lui seul, et non par rapport à autrui; '
  '5':
  - type: note
    content: Ps 62:13. Jé 17:10; 32:19. Mt 16:27. Ro 2:6; 14:12. 1 Co 3:8. 2 Co 5:10. Ap 2:23; 22:12.
  - type: text
    content: car chacun portera son propre fardeau.
  - type: heading
    content: 'V. 6-10: cf. (Os 10:12-13. Ro 2:3-11; 8:13.) (Lu 6:30-36. 2 Co 9:6, etc. Hé 6:10-12.)'
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ro 15:27. 1 Co 9:11.
  - type: text
    content: 'Que celui à qui l’on enseigne la parole fasse part de tous ses biens à celui qui l’enseigne. '
  '7':
  - type: note
    content: 1 Co 6:10.
  - type: text
    content: 'Ne vous y trompez pas: on ne se moque pas de Dieu. '
  - type: note
    content: Lu 16:25.
  - type: text
    content: 'Ce qu’un homme aura semé, il le moissonnera aussi. '
  '8':
  - type: text
    content: 'Celui qui sème pour sa chair moissonnera de la chair la corruption; mais celui qui sème pour l’Esprit moissonnera de l’Esprit la vie éternelle. '
  '9':
  - type: note
    content: 2 Th 3:13.
  - type: text
    content: 'Ne nous lassons pas de faire le bien; car nous moissonnerons au temps convenable, si nous ne nous relâchons pas. '
