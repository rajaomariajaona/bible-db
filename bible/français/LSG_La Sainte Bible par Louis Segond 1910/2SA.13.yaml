document_id: 2SA.13,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Inceste d’Amnon, fils de David
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-22: cf. (Lé 18:9, 11; 20:17. De 22:25-27.) Ja 1:13-15; 4:1, 2.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Après cela, voici ce qui arriva. Absalom, fils de David, avait une sœur qui était belle et qui s’appelait Tamar; et Amnon, fils de David, l’aima. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Alors Amnon dit à Tamar: Apporte le mets dans la chambre, et que je le mange de ta main. Tamar prit les gâteaux qu’elle avait faits, et les porta à Amnon, son frère, dans la chambre. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Comme elle les lui présentait à manger, il la saisit et lui dit: Viens, couche avec moi, ma sœur. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Elle lui répondit: Non, mon frère, ne me déshonore pas, car on n’agit point ainsi en Israël; ne commets pas cette infamie. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Où irais-je, moi, avec ma honte? Et toi, tu serais comme l’un des infâmes en Israël. Maintenant, je te prie, parle au roi, et il ne s’opposera pas à ce que je sois à toi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais il ne voulut pas l’écouter; il lui fit violence, la déshonora et coucha avec elle. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Puis Amnon eut pour elle une forte aversion, plus forte que n’avait été son amour. Et il lui dit: Lève-toi, va-t’en! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Elle lui répondit: N’augmente pas, en me chassant, le mal que tu m’as déjà fait. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il ne voulut pas l’écouter, et appelant le garçon qui le servait, il dit: Qu’on éloigne de moi cette femme et qu’on la mette dehors. Et ferme la porte après elle! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Elle avait une tunique de plusieurs couleurs; car c’était le vêtement que portaient les filles du roi, aussi longtemps qu’elles étaient vierges. Le serviteur d’Amnon la mit dehors, et ferma la porte après elle. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tamar répandit de la cendre sur sa tête, et déchira sa tunique bigarrée; elle mit la main sur sa tête, et s’en alla en poussant des cris. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Amnon était tourmenté jusqu’à se rendre malade à cause de Tamar, sa sœur; car elle était vierge, et il paraissait difficile à Amnon de faire sur elle la moindre tentative. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Absalom, son frère, lui dit: Amnon, ton frère, a-t-il été avec toi? Maintenant, ma sœur, tais-toi, c’est ton frère; ne prends pas cette affaire trop à cœur. Et Tamar, désolée, demeura dans la maison d’Absalom, son frère. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Le roi David apprit toutes ces choses, et il fut très irrité. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Absalom ne parla ni en bien ni en mal avec Amnon; mais il le prit en haine, parce qu’il avait déshonoré Tamar, sa sœur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Amnon assassiné par les serviteurs de son frère Absalom. — Fuite d’Absalom. — Absalom rentré en grâce
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 23-39: cf. Ge 34:7, etc. Pr 18:19. Ro 12:19. 2 S 12:10.'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Deux ans après, comme Absalom avait les tondeurs à Baal-Hatsor, près d’Éphraïm, il invita tous les fils du roi. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Absalom alla vers le roi, et dit: Voici, ton serviteur a les tondeurs; que le roi et ses serviteurs viennent chez ton serviteur. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Et le roi dit à Absalom: Non, mon fils, nous n’irons pas tous, de peur que nous ne te soyons à charge. Absalom le pressa; mais le roi ne voulut point aller, et il le bénit. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Absalom dit: Permets du moins à Amnon, mon frère, de venir avec nous. Le roi lui répondit: Pourquoi irait-il chez toi? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Sur les instances d’Absalom, le roi laissa aller avec lui Amnon et tous ses fils. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Absalom donna cet ordre à ses serviteurs: Faites attention quand le cœur d’Amnon sera égayé par le vin et que je vous dirai: Frappez Amnon! Alors tuez-le; ne craignez point, n’est-ce pas moi qui vous l’ordonne? Soyez fermes, et montrez du courage! '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Les serviteurs d’Absalom traitèrent Amnon comme Absalom l’avait ordonné. Et tous les fils du roi se levèrent, montèrent chacun sur son mulet, et s’enfuirent. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Amnon avait un ami, nommé Jonadab, fils de Schimea, frère de David, et Jonadab était un homme très habile. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Comme ils étaient en chemin, le bruit parvint à David qu’Absalom avait tué tous les fils du roi, et qu’il n’en était pas resté un seul. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Le roi se leva, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 1:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'déchira ses vêtements, et se coucha par terre; et tous ses serviteurs étaient là, les vêtements déchirés. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Jonadab, fils de Schimea, frère de David, prit la parole et dit: Que mon seigneur ne pense point que tous les jeunes gens, fils du roi, ont été tués, car Amnon seul est mort; et c’est l’effet d’une résolution d’Absalom, depuis le jour où Amnon a déshonoré Tamar, sa sœur. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Que le roi mon seigneur ne se tourmente donc point dans l’idée que tous les fils du roi sont morts, car Amnon seul est mort. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Absalom prit la fuite. Or le jeune homme placé en sentinelle leva les yeux et regarda. Et voici, une grande troupe venait par le chemin qui était derrière lui, du côté de la montagne. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Jonadab dit au roi: Voici les fils du roi qui arrivent! Ainsi se confirme ce que disait ton serviteur. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Comme il achevait de parler, voici, les fils du roi arrivèrent. Ils élevèrent la voix, et pleurèrent; le roi aussi et tous ses serviteurs versèrent d’abondantes larmes. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Absalom s’était enfui, et il alla chez Talmaï, fils d’Ammihur, roi de Gueschur. Et David pleurait tous les jours son fils. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Absalom resta trois ans à Gueschur, où il était allé, après avoir pris la fuite. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Le roi David cessa de poursuivre Absalom, car il était consolé de la mort d’Amnon.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il lui dit: Pourquoi deviens-tu, ainsi chaque matin plus maigre, toi, fils de roi? Ne veux-tu pas me le dire? Amnon lui répondit: J’aime Tamar, sœur d’Absalom, mon frère. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Jonadab lui dit: Mets-toi au lit, et fais le malade. Quand ton père viendra te voir, tu lui diras: Permets à Tamar, ma sœur, de venir pour me donner à manger; qu’elle prépare un mets sous mes yeux, afin que je le voie et que je le prenne de sa main. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Amnon se coucha, et fit le malade. Le roi vint le voir, et Amnon dit au roi: Je te prie, que Tamar, ma sœur, vienne faire deux gâteaux sous mes yeux, et que je les mange de sa main. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'David envoya dire à Tamar dans l’intérieur des appartements: Va dans la maison d’Amnon, ton frère, et prépare-lui un mets. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tamar alla dans la maison d’Amnon, son frère, qui était couché. Elle prit de la pâte, la pétrit, prépara devant lui des gâteaux, et les fit cuire; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'prenant ensuite la poêle, elle les versa devant lui. Mais Amnon refusa de manger. Il dit: Faites sortir tout le monde. Et tout le monde sortit de chez lui. '
