document_id: 1SA.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Israël battu par les Philistins; prise de l’arche. Mort d’Éli et de ses fils
  - type: heading
    content: 'V. 1-22: cf. Ps 78:56-64. 1 S 3:11-14.'
  - type: text
    content: 'La parole de Samuel s’adressait à tout Israël. Israël sortit à la rencontre des Philistins, pour combattre. Ils campèrent près d’Ében-Ézer, et les Philistins étaient campés à Aphek. '
  '10':
  - type: text
    content: 'Les Philistins livrèrent bataille, et Israël fut battu. Chacun s’enfuit dans sa tente. La défaite fut très grande, et il tomba d’Israël trente mille hommes de pied. '
  '11':
  - type: note
    content: 1 S 2:32, 34. Ps 78:61.
  - type: text
    content: 'L’arche de Dieu fut prise, et les deux fils d’Éli, Hophni et Phinées, moururent. '
  '12':
  - type: text
    content: 'Un homme de Benjamin accourut du champ de bataille et vint à Silo le même jour, les vêtements déchirés et '
  - type: note
    content: Jos 7:6.
  - type: text
    content: 'la tête couverte de terre. '
  '13':
  - type: text
    content: 'Lorsqu’il arriva, Éli était dans l’attente, assis sur un siège près du chemin, car son cœur était inquiet pour l’arche de Dieu. A son entrée dans la ville, cet homme donna la nouvelle, et toute la ville poussa des cris. '
  '14':
  - type: text
    content: 'Éli, entendant ces cris, dit: Que signifie ce tumulte? Et aussitôt l’homme vint apporter la nouvelle à Éli. '
  '15':
  - type: text
    content: 'Or Éli était âgé de quatre-vingt-dix-huit ans, il avait les yeux '
  - type: note
    content: 1 S 3:2.
  - type: text
    content: 'fixes et ne pouvait plus voir. '
  '16':
  - type: text
    content: 'L’homme dit à Éli: J’arrive du champ de bataille, et c’est du champ de bataille que je me suis enfui aujourd’hui. Éli dit: Que s’est-il passé, mon fils? '
  '17':
  - type: text
    content: 'Celui qui apportait la nouvelle dit en réponse: Israël a fui devant les Philistins, et le peuple a éprouvé une grande défaite; et même tes deux fils, Hophni et Phinées, sont morts, et l’arche de Dieu a été prise. '
  '18':
  - type: text
    content: 'A peine eut-il fait mention de l’arche de Dieu, qu’Éli tomba de son siège à la renverse, à côté de la porte; il se rompit la nuque et mourut, car c’était un homme vieux et pesant. Il avait été juge en Israël pendant quarante ans. '
  '19':
  - type: text
    content: 'Sa belle-fille, femme de Phinées, était enceinte et sur le point d’accoucher. Lorsqu’elle entendit la nouvelle de la prise de l’arche de Dieu, de la mort de son beau-père et de celle de son mari, elle se courba et accoucha, car les douleurs la surprirent. '
  '2':
  - type: text
    content: 'Les Philistins se rangèrent en bataille contre Israël, et le combat s’engagea. Israël fut battu par les Philistins, qui tuèrent sur le champ de bataille environ quatre mille hommes. '
  '20':
  - type: text
    content: 'Comme elle allait mourir, les femmes qui étaient auprès d’elle lui dirent: Ne crains point, car tu as enfanté un fils! Mais elle ne répondit pas et n’y fit pas attention. '
  '21':
  - type: text
    content: 'Elle appela l’enfant I-Kabod, en disant: La gloire est bannie d’Israël! C’était à cause de la prise de l’arche de Dieu, et à cause de son beau-père et de son mari. '
  '22':
  - type: text
    content: 'Elle dit: La gloire est bannie d’Israël, car l’arche de Dieu est prise!'
  '3':
  - type: text
    content: 'Le peuple rentra au camp, et les anciens d’Israël dirent: Pourquoi l’Éternel nous a-t-il laissé battre aujourd’hui par les Philistins? Allons chercher à Silo l’arche de l’alliance de l’Éternel; qu’elle vienne au milieu de nous, et qu’elle nous délivre de la main de nos ennemis. '
  '4':
  - type: text
    content: 'Le peuple envoya à Silo, d’où l’on apporta l’arche de l’alliance de l’Éternel des armées '
  - type: note
    content: 2 S 6:2. Ps 80:2; 99:1.
  - type: text
    content: 'qui siège entre les chérubins. Les deux fils d’Éli, Hophni et Phinées, étaient là, avec l’arche de l’alliance de Dieu. '
  '5':
  - type: text
    content: 'Lorsque l’arche de l’alliance de l’Éternel entra dans le camp, tout Israël poussa de grands cris de joie, et la terre en fut ébranlée. '
  '6':
  - type: text
    content: 'Le retentissement de ces cris fut entendu des Philistins, et ils dirent: Que signifient ces grands cris qui retentissent dans le camp des Hébreux? Et ils apprirent que l’arche de l’Éternel était arrivée au camp. '
  '7':
  - type: text
    content: 'Les Philistins eurent peur, parce qu’ils crurent que Dieu était venu dans le camp. Malheur à nous! Dirent-ils, car il n’en a pas été ainsi jusqu’à présent. '
  '8':
  - type: text
    content: 'Malheur à nous! Qui nous délivrera de la main de ces dieux puissants? Ce sont ces dieux qui ont frappé les Égyptiens de toutes sortes de plaies dans le désert. '
  '9':
  - type: text
    content: 'Fortifiez-vous et soyez des hommes, Philistins, de peur que vous ne soyez asservis aux Hébreux '
  - type: note
    content: Jg 13:1.
  - type: text
    content: 'comme ils vous ont été asservis; soyez des hommes et combattez! '
