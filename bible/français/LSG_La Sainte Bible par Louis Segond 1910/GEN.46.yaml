document_id: GEN.46,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Arrivée et établissement de la famille de Jacob en Égypte
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. Ge 45:9-28; 26:1-6.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Israël partit, avec tout ce qui lui appartenait. Il arriva à Beer-Schéba, et il offrit des sacrifices au Dieu de son père Isaac. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 6:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 4:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Fils de Siméon: Jemuel, Jamin, Ohad, Jakin et Tsochar; et Saul, fils de la Cananéenne. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 6:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Fils de Lévi: Guerschon, Kehath et Merari. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 38:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Fils de Juda: Er, Onan, Schéla, Pérets et Zarach; mais Er et Onan moururent au pays de Canaan. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 4:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les fils de Pérets furent Hetsron et Hamul. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d’Issacar: Thola, Puva, Job et Schimron. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Zabulon: Séred, Élon et Jahleel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce sont là les fils que Léa enfanta à Jacob à Paddan-Aram, avec sa fille Dina. Ses fils et ses filles formaient en tout trente-trois personnes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 5:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Fils de Gad: Tsiphjon, Haggi, Schuni, Etsbon, Éri, Arodi et Areéli. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 7:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Fils d’Aser: Jimna, Jischva, Jischvi et Beria; et Sérach, leur sœur. Et les fils de Beria: Héber et Malkiel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce sont là les fils de Zilpa, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 29:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que Laban avait donnée à Léa, sa fille; et elle les enfanta à Jacob. En tout, seize personnes. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Rachel, femme de Jacob: Joseph et Benjamin. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu parla à Israël dans une vision pendant la nuit, et il dit: Jacob! Jacob! Israël répondit: Me voici! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 41:50
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 48:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il naquit à Joseph, au pays d’Égypte, Manassé et Éphraïm, que lui enfanta Asnath, fille de Poti-Phéra, prêtre d’On. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 7:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Fils de Benjamin: Béla, Béker, Aschbel, Guéra, Naaman, Éhi, Rosch, Muppim, Huppim et Ard. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce sont là les fils de Rachel, qui naquirent à Jacob. En tout, quatorze personnes. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Dan: Huschim. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 7:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Fils de Nephthali: Jathtseel, Guni, Jetser et Schillem. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce sont là les fils de Bilha, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 29:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que Laban avait donnée à Rachel, sa fille; et elle les enfanta à Jacob. En tout, sept personnes. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les personnes qui vinrent avec Jacob en Égypte, et qui étaient issues de lui, étaient au nombre de soixante-six en tout, sans compter les femmes des fils de Jacob. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Joseph avait deux fils qui lui étaient nés en Égypte. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 10:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le total des personnes de la famille de Jacob qui vinrent en Égypte était de soixante-dix.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 28-34: cf. Ge 45:26-28. Lu 2:25-32.'
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob envoya Juda devant lui vers Joseph, pour l’informer qu’il se rendait en Gosen. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph attela son char et y monta, pour aller en Gosen, à la rencontre d’Israël, son père. Dès qu’il le vit, il se jeta à son cou, et pleura longtemps sur son cou. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Dieu dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 26:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je suis le Dieu, le Dieu de ton père. Ne crains point de descendre en Égypte, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 13:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 35:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 48:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car là je te ferai devenir une grande nation. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Israël dit à Joseph: Que je meure maintenant, puisque j’ai vu ton visage et que tu vis encore! '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph dit à ses frères et à la famille de son père: Je vais avertir Pharaon, et je lui dirai: Mes frères et la famille de mon père, qui étaient au pays de Canaan, sont arrivés auprès de moi. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces hommes sont bergers, car ils élèvent des troupeaux; ils ont amené leurs brebis et leurs bœufs, et tout ce qui leur appartient. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et quand Pharaon vous appellera, et dira: '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelle est votre occupation? Vous répondrez: Tes serviteurs ont élevé des troupeaux, depuis notre jeunesse jusqu’à présent, nous et nos pères. De cette manière, vous habiterez dans le pays de Gosen, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 43:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 8:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: car tous les bergers sont en abomination aux Égyptiens.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 20:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 10:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 24:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: '. Ps 105:23, 24, etc. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 52:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 11:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Moi-même je descendrai avec toi en Égypte, et moi-même je t’en ferai remonter; et Joseph te fermera les yeux. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jacob quitta Beer-Schéba; et les fils d’Israël mirent Jacob, leur père, avec leurs enfants et leurs femmes, sur les chars que Pharaon avait envoyés pour les transporter. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils prirent aussi leurs troupeaux et les biens qu’ils avaient acquis dans le pays de Canaan. Et Jacob se rendit en Égypte, avec toute sa famille. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il emmena avec lui en Égypte ses fils et les fils de ses fils, ses filles et les filles de ses fils, et toute sa famille.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-27: cf. Ex 1:1-5. No 26. 1 Ch 2 à 8.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 1:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 26:5
      - type: text
        text: . 1 Ch 5:1, etc.; 6:1, etc.; 7:1, etc.; 8:1, etc.
      marker-yv: yv-n
    - type: text
      text: 'Voici les noms des fils d’Israël, qui vinrent en Égypte. Jacob et ses fils. Premier-né de Jacob: Ruben. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Ruben: Hénoc, Pallu, Hetsron et Carmi. '
