document_id: GEN.46,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Arrivée et établissement de la famille de Jacob en Égypte
  - type: heading
    content: 'V. 1-7: cf. Ge 45:9-28; 26:1-6.'
  - type: text
    content: 'Israël partit, avec tout ce qui lui appartenait. Il arriva à Beer-Schéba, et il offrit des sacrifices au Dieu de son père Isaac. '
  '10':
  - type: note
    content: Ex 6:14. 1 Ch 4:24.
  - type: text
    content: 'Fils de Siméon: Jemuel, Jamin, Ohad, Jakin et Tsochar; et Saul, fils de la Cananéenne. '
  '11':
  - type: note
    content: 1 Ch 6:1.
  - type: text
    content: 'Fils de Lévi: Guerschon, Kehath et Merari. '
  '12':
  - type: note
    content: Ge 38:3, 4, 5.
  - type: text
    content: 'Fils de Juda: Er, Onan, Schéla, Pérets et Zarach; mais Er et Onan moururent au pays de Canaan. '
  - type: note
    content: 1 Ch 4:5.
  - type: text
    content: 'Les fils de Pérets furent Hetsron et Hamul. '
  '13':
  - type: text
    content: 'Fils d’Issacar: Thola, Puva, Job et Schimron. '
  '14':
  - type: text
    content: 'Fils de Zabulon: Séred, Élon et Jahleel. '
  '15':
  - type: text
    content: 'Ce sont là les fils que Léa enfanta à Jacob à Paddan-Aram, avec sa fille Dina. Ses fils et ses filles formaient en tout trente-trois personnes. '
  '16':
  - type: note
    content: 1 Ch 5:11.
  - type: text
    content: 'Fils de Gad: Tsiphjon, Haggi, Schuni, Etsbon, Éri, Arodi et Areéli. '
  '17':
  - type: note
    content: 1 Ch 7:30.
  - type: text
    content: 'Fils d’Aser: Jimna, Jischva, Jischvi et Beria; et Sérach, leur sœur. Et les fils de Beria: Héber et Malkiel. '
  '18':
  - type: text
    content: 'Ce sont là les fils de Zilpa, '
  - type: note
    content: Ge 29:24.
  - type: text
    content: 'que Laban avait donnée à Léa, sa fille; et elle les enfanta à Jacob. En tout, seize personnes. '
  '19':
  - type: text
    content: 'Fils de Rachel, femme de Jacob: Joseph et Benjamin. '
  '2':
  - type: text
    content: 'Dieu parla à Israël dans une vision pendant la nuit, et il dit: Jacob! Jacob! Israël répondit: Me voici! '
  '20':
  - type: note
    content: Ge 41:50; 48:5.
  - type: text
    content: 'Il naquit à Joseph, au pays d’Égypte, Manassé et Éphraïm, que lui enfanta Asnath, fille de Poti-Phéra, prêtre d’On. '
  '21':
  - type: note
    content: 1 Ch 7:6; 8:1.
  - type: text
    content: 'Fils de Benjamin: Béla, Béker, Aschbel, Guéra, Naaman, Éhi, Rosch, Muppim, Huppim et Ard. '
  '22':
  - type: text
    content: 'Ce sont là les fils de Rachel, qui naquirent à Jacob. En tout, quatorze personnes. '
  '23':
  - type: text
    content: 'Fils de Dan: Huschim. '
  '24':
  - type: note
    content: 1 Ch 7:13.
  - type: text
    content: 'Fils de Nephthali: Jathtseel, Guni, Jetser et Schillem. '
  '25':
  - type: text
    content: 'Ce sont là les fils de Bilha, '
  - type: note
    content: Ge 29:29.
  - type: text
    content: 'que Laban avait donnée à Rachel, sa fille; et elle les enfanta à Jacob. En tout, sept personnes. '
  '26':
  - type: text
    content: 'Les personnes qui vinrent avec Jacob en Égypte, et qui étaient issues de lui, étaient au nombre de soixante-six en tout, sans compter les femmes des fils de Jacob. '
  '27':
  - type: text
    content: 'Et Joseph avait deux fils qui lui étaient nés en Égypte. '
  - type: note
    content: De 10:22. Ac 7:14.
  - type: text
    content: Le total des personnes de la famille de Jacob qui vinrent en Égypte était de soixante-dix.
  - type: heading
    content: 'V. 28-34: cf. Ge 45:26-28. Lu 2:25-32.'
  '28':
  - type: text
    content: 'Jacob envoya Juda devant lui vers Joseph, pour l’informer qu’il se rendait en Gosen. '
  '29':
  - type: text
    content: 'Joseph attela son char et y monta, pour aller en Gosen, à la rencontre d’Israël, son père. Dès qu’il le vit, il se jeta à son cou, et pleura longtemps sur son cou. '
  '3':
  - type: text
    content: 'Et Dieu dit: '
  - type: note
    content: Ge 26:24; 28:13; 32:9.
  - type: text
    content: 'Je suis le Dieu, le Dieu de ton père. Ne crains point de descendre en Égypte, '
  - type: note
    content: Ge 13:16; 16:10; 17:2; 22:17; 26:24; 35:11; 48:4.
  - type: text
    content: 'car là je te ferai devenir une grande nation. '
  '30':
  - type: text
    content: 'Israël dit à Joseph: Que je meure maintenant, puisque j’ai vu ton visage et que tu vis encore! '
  '31':
  - type: text
    content: 'Joseph dit à ses frères et à la famille de son père: Je vais avertir Pharaon, et je lui dirai: Mes frères et la famille de mon père, qui étaient au pays de Canaan, sont arrivés auprès de moi. '
  '32':
  - type: text
    content: 'Ces hommes sont bergers, car ils élèvent des troupeaux; ils ont amené leurs brebis et leurs bœufs, et tout ce qui leur appartient. '
  '33':
  - type: text
    content: 'Et quand Pharaon vous appellera, et dira: '
  '34':
  - type: text
    content: 'Quelle est votre occupation? Vous répondrez: Tes serviteurs ont élevé des troupeaux, depuis notre jeunesse jusqu’à présent, nous et nos pères. De cette manière, vous habiterez dans le pays de Gosen, '
  - type: note
    content: Ge 43:32. Ex 8:26.
  - type: text
    content: car tous les bergers sont en abomination aux Égyptiens.
  '4':
  - type: note
    content: No 20:15. De 10:22. Jos 24:4, 5, 6. Ps 105:23, 24, etc. És 52:4. Os 11:1.
  - type: text
    content: 'Moi-même je descendrai avec toi en Égypte, et moi-même je t’en ferai remonter; et Joseph te fermera les yeux. '
  '5':
  - type: note
    content: Ac 7:15.
  - type: text
    content: 'Jacob quitta Beer-Schéba; et les fils d’Israël mirent Jacob, leur père, avec leurs enfants et leurs femmes, sur les chars que Pharaon avait envoyés pour les transporter. '
  '6':
  - type: text
    content: 'Ils prirent aussi leurs troupeaux et les biens qu’ils avaient acquis dans le pays de Canaan. Et Jacob se rendit en Égypte, avec toute sa famille. '
  '7':
  - type: text
    content: Il emmena avec lui en Égypte ses fils et les fils de ses fils, ses filles et les filles de ses fils, et toute sa famille.
  - type: heading
    content: 'V. 8-27: cf. Ex 1:1-5. No 26. 1 Ch 2 à 8.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ex 1:2; 6:13. No 26:5. 1 Ch 5:1, etc.; 6:1, etc.; 7:1, etc.; 8:1, etc.
  - type: text
    content: 'Voici les noms des fils d’Israël, qui vinrent en Égypte. Jacob et ses fils. Premier-né de Jacob: Ruben. '
  '9':
  - type: text
    content: 'Fils de Ruben: Hénoc, Pallu, Hetsron et Carmi. '
