document_id: JOB.42
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Humiliation et repentir de Job
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. Job 39:34-38. (És 6:1-5; 57:15.) Da 4:34-37.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job répondit à l’Éternel et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je reconnais que tu peux tout,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que rien ne s’oppose à tes pensées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 38:2
      metadata:
        usfm: JOB.38.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Quel est celui qui a la folie d’obscurcir mes desseins?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, j’ai parlé, sans les comprendre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 40:6
      metadata:
        usfm: PSA.40.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 131:1
      metadata:
        usfm: PSA.131.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 139:6
      metadata:
        usfm: PSA.139.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: De merveilles qui me dépassent et que je ne conçois pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Écoute-moi, et je parlerai;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’interrogerai, et tu m’instruiras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mon oreille avait entendu parler de toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais maintenant mon œil t’a vu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: C’est pourquoi je me condamne et je me repens
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur la poussière et sur la cendre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Retour de Job à la prospérité
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-17: cf. (Ge 20:7, 17. Ja 5:16-18.) (Ja 4:10; 5:11; 1:12.) Ps 30:6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Après que l’Éternel eut adressé ces paroles à Job, il dit à Éliphaz de Théman: Ma colère est enflammée contre toi et contre tes deux amis, parce que vous n’avez pas parlé de moi avec droiture comme l’a fait mon serviteur Job. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Prenez maintenant sept taureaux et sept béliers, allez auprès de mon serviteur Job, et offrez pour vous un holocauste. Job, mon serviteur, priera pour vous, et c’est par égard pour lui seul que je ne vous traiterai pas selon votre folie; car vous n’avez pas parlé de moi avec droiture, comme l’a fait mon serviteur Job. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Éliphaz de Théman, Bildad de Schuach, et Tsophar de Naama allèrent et firent comme l’Éternel leur avait dit: et l’Éternel eut égard à la prière de Job. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L’Éternel rétablit Job dans son premier état, quand Job eut prié pour ses amis; et l’Éternel lui accorda le double de tout ce qu’il avait possédé. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les frères, les sœurs, et les anciens amis de Job vinrent tous le visiter, et ils mangèrent avec lui dans sa maison. Ils le plaignirent et le consolèrent de tous les malheurs que l’Éternel avait fait venir sur lui, et chacun lui donna un kesita et un anneau d’or. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Pendant ses dernières années, Job reçut de l’Éternel plus de bénédictions qu’il n’en avait reçu dans les premières. Il posséda quatorze mille brebis, six mille chameaux, mille paires de bœufs, et mille ânesses. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il eut sept fils et trois filles: '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'il donna à la première le nom de Jemima, à la seconde celui de Ketsia, et à la troisième celui de Kéren-Happuc. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il n’y avait pas dans tout le pays d’aussi belles femmes que les filles de Job. Leur père leur accorda une part d’héritage parmi leurs frères. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Job vécut après cela cent quarante ans, et il vit ses fils et les fils de ses fils jusqu’à la quatrième génération. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Et Job mourut âgé et rassasié de jours.
