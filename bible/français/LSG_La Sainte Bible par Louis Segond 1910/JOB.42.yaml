document_id: JOB.42,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Humiliation et repentir de Job
  - type: heading
    content: 'V. 1-6: cf. Job 39:34-38. (És 6:1-5; 57:15.) Da 4:34-37.'
  - type: text
    content: 'Job répondit à l’Éternel et dit:'
  '10':
  - type: text
    content: 'L’Éternel rétablit Job dans son premier état, quand Job eut prié pour ses amis; et l’Éternel lui accorda le double de tout ce qu’il avait possédé. '
  '11':
  - type: text
    content: 'Les frères, les sœurs, et les anciens amis de Job vinrent tous le visiter, et ils mangèrent avec lui dans sa maison. Ils le plaignirent et le consolèrent de tous les malheurs que l’Éternel avait fait venir sur lui, et chacun lui donna un kesita et un anneau d’or. '
  '12':
  - type: text
    content: 'Pendant ses dernières années, Job reçut de l’Éternel plus de bénédictions qu’il n’en avait reçu dans les premières. Il posséda quatorze mille brebis, six mille chameaux, mille paires de bœufs, et mille ânesses. '
  '13':
  - type: text
    content: 'Il eut sept fils et trois filles: '
  '14':
  - type: text
    content: 'il donna à la première le nom de Jemima, à la seconde celui de Ketsia, et à la troisième celui de Kéren-Happuc. '
  '15':
  - type: text
    content: 'Il n’y avait pas dans tout le pays d’aussi belles femmes que les filles de Job. Leur père leur accorda une part d’héritage parmi leurs frères. '
  '16':
  - type: text
    content: 'Job vécut après cela cent quarante ans, et il vit ses fils et les fils de ses fils jusqu’à la quatrième génération. '
  '17':
  - type: text
    content: Et Job mourut âgé et rassasié de jours.
  '2':
  - type: text
    content: Je reconnais que tu peux tout,
  - type: text
    content: Et que rien ne s’oppose à tes pensées.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Job 38:2.
  - type: text
    content: Quel est celui qui a la folie d’obscurcir mes desseins?
  - type: text
    content: Oui, j’ai parlé, sans les comprendre,
  - type: note
    content: Ps 40:6; 131:1; 139:6.
  - type: text
    content: De merveilles qui me dépassent et que je ne conçois pas.
  '4':
  - type: text
    content: Écoute-moi, et je parlerai;
  - type: text
    content: Je t’interrogerai, et tu m’instruiras.
  '5':
  - type: text
    content: Mon oreille avait entendu parler de toi;
  - type: text
    content: Mais maintenant mon œil t’a vu.
  '6':
  - type: text
    content: C’est pourquoi je me condamne et je me repens
  - type: text
    content: Sur la poussière et sur la cendre.
  - type: heading
    content: Retour de Job à la prospérité
  - type: heading
    content: 'V. 7-17: cf. (Ge 20:7, 17. Ja 5:16-18.) (Ja 4:10; 5:11; 1:12.) Ps 30:6.'
  '7':
  - type: text
    content: 'Après que l’Éternel eut adressé ces paroles à Job, il dit à Éliphaz de Théman: Ma colère est enflammée contre toi et contre tes deux amis, parce que vous n’avez pas parlé de moi avec droiture comme l’a fait mon serviteur Job. '
  '8':
  - type: text
    content: 'Prenez maintenant sept taureaux et sept béliers, allez auprès de mon serviteur Job, et offrez pour vous un holocauste. Job, mon serviteur, priera pour vous, et c’est par égard pour lui seul que je ne vous traiterai pas selon votre folie; car vous n’avez pas parlé de moi avec droiture, comme l’a fait mon serviteur Job. '
  '9':
  - type: text
    content: 'Éliphaz de Théman, Bildad de Schuach, et Tsophar de Naama allèrent et firent comme l’Éternel leur avait dit: et l’Éternel eut égard à la prière de Job. '
