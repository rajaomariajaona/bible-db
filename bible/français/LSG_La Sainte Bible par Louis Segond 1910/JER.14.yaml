document_id: JER.14,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le fléau de la sécheresse
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. Lé 26:18-20. Joë 1:8, etc.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: La parole qui fut adressée à Jérémie par l’Éternel, à l’occasion de la sécheresse.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Voici ce que l’Éternel dit de ce peuple:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils aiment à courir çà et là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne savent retenir leurs pieds;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel n’a point d’attachement pour eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il se souvient maintenant de leurs '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 8:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: crimes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il châtie leurs péchés.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Et l’Éternel me dit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 7:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: N’intercède pas en faveur de ce peuple.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 1:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 11:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 8:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 3:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: S’ils jeûnent, je n’écouterai pas leurs supplications;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'S’ils offrent '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 6:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:21
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: des holocaustes et des offrandes, je ne les agréerai pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car je veux les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 9:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: détruire par l’épée, par la famine et par la peste.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Je répondis: Ah! Seigneur Éternel!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici, les prophètes leur disent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous ne verrez point d’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous n’aurez point de famine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais je vous donnerai dans ce lieu une paix assurée.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et l’Éternel me dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est le mensonge que prophétisent en mon nom les prophètes;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 23:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je ne les ai point envoyés, je ne leur ai point donné d’ordre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne leur ai point parlé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sont des visions mensongères, de vaines prédictions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des tromperies de leur cœur, qu’ils vous prophétisent.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: C’est pourquoi ainsi parle l’Éternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur les prophètes qui prophétisent en mon nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans que je les aie envoyés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et qui disent: Il n’y aura dans ce pays ni épée ni famine:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ces prophètes périront par l’épée et par la famine.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Et ceux à qui ils prophétisent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seront étendus dans les rues de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par la famine et par l’épée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y aura personne pour leur donner la sépulture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni à eux, ni à leurs femmes, ni à leurs fils, ni à leurs filles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je répandrai sur eux leur méchanceté.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dis-leur cette parole:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 13:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: La 1:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les larmes coulent de mes yeux nuit et jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et elles ne s’arrêtent pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la vierge, fille de mon peuple, a été frappée d’un grand coup,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D’une plaie très douloureuse.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Si je vais dans les champs, voici des hommes que le glaive a percés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si j’entre dans la ville, voici des êtres que consume la faim;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le prophète même et le sacrificateur parcourent le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans savoir où ils vont.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 19-22: cf. És 64:5-8. Ps 79:8, 9.'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: As-tu donc rejeté Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ton âme a-t-elle pris Sion en horreur?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi nous frappes-tu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans qu’il y ait pour nous de guérison?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 8:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Nous espérions la paix, et il n’arrive rien d’heureux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un temps de guérison, et voici la terreur!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Juda est dans le deuil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses villes sont désolées, tristes, abattues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les cris de Jérusalem s’élèvent.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Éternel, nous reconnaissons notre méchanceté, l’iniquité de nos pères;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car nous avons péché '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 106:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Da 9:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: contre toi.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: A cause de ton nom, ne méprise pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne déshonore pas le trône de ta gloire!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’oublie pas, ne romps pas ton alliance avec nous!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Parmi les idoles des nations, en est-il qui fassent pleuvoir?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou est-ce le ciel qui donne la pluie?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 135:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 147:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 30:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 5:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: N’est-ce pas toi, Éternel, notre Dieu?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous espérons en toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est toi qui as fait toutes ces choses.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Les grands envoient les petits chercher de l’eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les petits vont aux citernes, ne trouvent point d’eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et retournent avec leurs vases vides;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Confus et honteux, ils se couvrent la tête.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: La terre est saisie d’épouvante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’il ne tombe point de pluie dans le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les laboureurs confus se couvrent la tête.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Même la biche dans la campagne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Met bas et abandonne sa portée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’il n’y a point de verdure.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Les ânes sauvages se tiennent sur les lieux élevés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aspirant l’air comme des serpents;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Leurs yeux languissent, parce qu’il n’y a point '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 12:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: d’herbe.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-9: cf. És 64:5-8. Ps 79:8, 9.'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Si nos iniquités témoignent contre nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Agis à cause de ton nom, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car nos infidélités sont nombreuses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous avons péché contre toi.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Toi qui es l’espérance d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son sauveur au temps de la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi serais-tu comme un étranger dans le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un voyageur qui y entre pour passer la nuit?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Pourquoi serais-tu comme un homme stupéfait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un héros incapable de nous secourir?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es pourtant au milieu de nous, ô Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et ton nom est invoqué sur nous:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne nous abandonne pas!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-18: cf. (Jé 15:1-3; 8:9-12; 23:9, etc.) És 9:15. La 2:14, 19-22.'
    marker-yv: yv-h
