document_id: JER.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le fléau de la sécheresse
  - type: heading
    content: 'V. 1-6: cf. Lé 26:18-20. Joë 1:8, etc.'
  - type: text
    content: La parole qui fut adressée à Jérémie par l’Éternel, à l’occasion de la sécheresse.
  '10':
  - type: text
    content: 'Voici ce que l’Éternel dit de ce peuple:'
  - type: text
    content: Ils aiment à courir çà et là,
  - type: text
    content: Ils ne savent retenir leurs pieds;
  - type: text
    content: L’Éternel n’a point d’attachement pour eux,
  - type: text
    content: 'Il se souvient maintenant de leurs '
  - type: note
    content: Os 8:13; 9:9.
  - type: text
    content: crimes,
  - type: text
    content: Et il châtie leurs péchés.
  '11':
  - type: text
    content: 'Et l’Éternel me dit:'
  - type: note
    content: Ex 32:10. Jé 7:16; 11:14.
  - type: text
    content: N’intercède pas en faveur de ce peuple.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Pr 1:28. És 1:15. Jé 11:11. Éz 8:18. Mi 3:4.
  - type: text
    content: S’ils jeûnent, je n’écouterai pas leurs supplications;
  - type: text
    content: 'S’ils offrent '
  - type: note
    content: Jé 6:20; 7:21, 22.
  - type: text
    content: des holocaustes et des offrandes, je ne les agréerai pas;
  - type: text
    content: 'Car je veux les '
  - type: note
    content: Jé 9:16.
  - type: text
    content: détruire par l’épée, par la famine et par la peste.
  '13':
  - type: text
    content: 'Je répondis: Ah! Seigneur Éternel!'
  - type: text
    content: 'Voici, les prophètes leur disent:'
  - type: text
    content: Vous ne verrez point d’épée,
  - type: text
    content: Vous n’aurez point de famine;
  - type: text
    content: Mais je vous donnerai dans ce lieu une paix assurée.
  '14':
  - type: text
    content: 'Et l’Éternel me dit:'
  - type: text
    content: C’est le mensonge que prophétisent en mon nom les prophètes;
  - type: note
    content: Jé 23:21; 27:15; 29:8, 9.
  - type: text
    content: Je ne les ai point envoyés, je ne leur ai point donné d’ordre,
  - type: text
    content: Je ne leur ai point parlé;
  - type: text
    content: Ce sont des visions mensongères, de vaines prédictions,
  - type: text
    content: Des tromperies de leur cœur, qu’ils vous prophétisent.
  '15':
  - type: text
    content: C’est pourquoi ainsi parle l’Éternel
  - type: text
    content: Sur les prophètes qui prophétisent en mon nom,
  - type: text
    content: Sans que je les aie envoyés,
  - type: text
    content: 'Et qui disent: Il n’y aura dans ce pays ni épée ni famine:'
  - type: text
    content: Ces prophètes périront par l’épée et par la famine.
  '16':
  - type: text
    content: Et ceux à qui ils prophétisent
  - type: text
    content: Seront étendus dans les rues de Jérusalem,
  - type: text
    content: Par la famine et par l’épée;
  - type: text
    content: Il n’y aura personne pour leur donner la sépulture,
  - type: text
    content: Ni à eux, ni à leurs femmes, ni à leurs fils, ni à leurs filles;
  - type: text
    content: Je répandrai sur eux leur méchanceté.
  '17':
  - type: text
    content: 'Dis-leur cette parole:'
  - type: note
    content: Jé 13:17. La 1:16; 2:18.
  - type: text
    content: Les larmes coulent de mes yeux nuit et jour,
  - type: text
    content: Et elles ne s’arrêtent pas;
  - type: text
    content: Car la vierge, fille de mon peuple, a été frappée d’un grand coup,
  - type: text
    content: D’une plaie très douloureuse.
  '18':
  - type: text
    content: Si je vais dans les champs, voici des hommes que le glaive a percés;
  - type: text
    content: Si j’entre dans la ville, voici des êtres que consume la faim;
  - type: text
    content: Le prophète même et le sacrificateur parcourent le pays,
  - type: text
    content: Sans savoir où ils vont.
  - type: heading
    content: 'V. 19-22: cf. És 64:5-8. Ps 79:8, 9.'
  '19':
  - type: text
    content: As-tu donc rejeté Juda,
  - type: text
    content: Et ton âme a-t-elle pris Sion en horreur?
  - type: text
    content: Pourquoi nous frappes-tu
  - type: text
    content: Sans qu’il y ait pour nous de guérison?
  - type: note
    content: Jé 8:15.
  - type: text
    content: Nous espérions la paix, et il n’arrive rien d’heureux,
  - type: text
    content: Un temps de guérison, et voici la terreur!
  '2':
  - type: text
    content: Juda est dans le deuil,
  - type: text
    content: Ses villes sont désolées, tristes, abattues,
  - type: text
    content: Et les cris de Jérusalem s’élèvent.
  '20':
  - type: text
    content: Éternel, nous reconnaissons notre méchanceté, l’iniquité de nos pères;
  - type: text
    content: 'Car nous avons péché '
  - type: note
    content: Ps 106:6. Da 9:8.
  - type: text
    content: contre toi.
  '21':
  - type: text
    content: A cause de ton nom, ne méprise pas,
  - type: text
    content: Ne déshonore pas le trône de ta gloire!
  - type: text
    content: N’oublie pas, ne romps pas ton alliance avec nous!
  '22':
  - type: text
    content: Parmi les idoles des nations, en est-il qui fassent pleuvoir?
  - type: text
    content: Ou est-ce le ciel qui donne la pluie?
  - type: note
    content: Ps 135:7; 147:8. És 30:23. Jé 5:24; 10:13.
  - type: text
    content: N’est-ce pas toi, Éternel, notre Dieu?
  - type: text
    content: Nous espérons en toi,
  - type: text
    content: Car c’est toi qui as fait toutes ces choses.
  '3':
  - type: text
    content: Les grands envoient les petits chercher de l’eau,
  - type: text
    content: Et les petits vont aux citernes, ne trouvent point d’eau,
  - type: text
    content: Et retournent avec leurs vases vides;
  - type: text
    content: Confus et honteux, ils se couvrent la tête.
  '4':
  - type: text
    content: La terre est saisie d’épouvante,
  - type: text
    content: Parce qu’il ne tombe point de pluie dans le pays,
  - type: text
    content: Et les laboureurs confus se couvrent la tête.
  '5':
  - type: text
    content: Même la biche dans la campagne
  - type: text
    content: Met bas et abandonne sa portée,
  - type: text
    content: Parce qu’il n’y a point de verdure.
  '6':
  - type: text
    content: Les ânes sauvages se tiennent sur les lieux élevés,
  - type: text
    content: Aspirant l’air comme des serpents;
  - type: text
    content: 'Leurs yeux languissent, parce qu’il n’y a point '
  - type: note
    content: Jé 12:4.
  - type: text
    content: d’herbe.
  - type: heading
    content: 'V. 7-9: cf. És 64:5-8. Ps 79:8, 9.'
  '7':
  - type: text
    content: Si nos iniquités témoignent contre nous,
  - type: text
    content: Agis à cause de ton nom, ô Éternel!
  - type: text
    content: Car nos infidélités sont nombreuses,
  - type: text
    content: Nous avons péché contre toi.
  '8':
  - type: text
    content: Toi qui es l’espérance d’Israël,
  - type: text
    content: Son sauveur au temps de la détresse,
  - type: text
    content: Pourquoi serais-tu comme un étranger dans le pays,
  - type: text
    content: Comme un voyageur qui y entre pour passer la nuit?
  '9':
  - type: text
    content: Pourquoi serais-tu comme un homme stupéfait,
  - type: text
    content: Comme un héros incapable de nous secourir?
  - type: text
    content: Tu es pourtant au milieu de nous, ô Éternel,
  - type: text
    content: 'Et ton nom est invoqué sur nous:'
  - type: text
    content: Ne nous abandonne pas!
  - type: heading
    content: 'V. 10-18: cf. (Jé 15:1-3; 8:9-12; 23:9, etc.) És 9:15. La 2:14, 19-22.'
