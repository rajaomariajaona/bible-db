document_id: HOS.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Reproches aux chefs et aux rois
  - type: heading
    content: 'V. 1-7: cf. Am 3:9-11. Os 4:11. És 59:13, 14.'
  - type: text
    content: Lorsque je voulais guérir Israël,
  - type: text
    content: L’iniquité d’Éphraïm et la méchanceté de Samarie se sont révélées,
  - type: text
    content: Car ils ont agi frauduleusement;
  - type: text
    content: Le voleur est arrivé, la bande s’est répandue au dehors.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Os 5:5.
  - type: text
    content: L’orgueil d’Israël témoigne contre lui;
  - type: text
    content: Ils ne reviennent pas à l’Éternel, leur Dieu,
  - type: text
    content: Et ils ne le cherchent pas, malgré tout cela.
  '11':
  - type: text
    content: Éphraïm est comme une colombe stupide, sans intelligence;
  - type: text
    content: Ils implorent l’Égypte, ils vont en Assyrie.
  '12':
  - type: text
    content: S’ils partent, j’étendrai sur eux mon filet,
  - type: text
    content: Je les précipiterai comme les oiseaux du ciel;
  - type: text
    content: Je les châtierai, comme ils en ont été avertis dans leur assemblée.
  '13':
  - type: text
    content: Malheur à eux, parce qu’ils me fuient!
  - type: text
    content: Ruine sur eux, parce qu’ils me sont infidèles!
  - type: text
    content: Je voudrais les sauver,
  - type: text
    content: Mais ils disent contre moi des paroles mensongères.
  '14':
  - type: text
    content: Ils ne crient pas vers moi dans leur cœur,
  - type: text
    content: Mais ils se lamentent sur leur couche;
  - type: text
    content: Ils se rassemblent pour avoir du blé et du moût,
  - type: text
    content: Et ils s’éloignent de moi.
  '15':
  - type: text
    content: Je les ai châtiés, j’ai fortifié leurs bras;
  - type: text
    content: Et ils méditent le mal contre moi.
  '16':
  - type: text
    content: Ce n’est pas au Très-Haut qu’ils retournent;
  - type: text
    content: 'Ils sont '
  - type: note
    content: Ps 78:57.
  - type: text
    content: comme un arc trompeur.
  - type: text
    content: Leurs chefs tomberont par l’épée,
  - type: text
    content: A cause de l’insolence de leur langue.
  - type: text
    content: C’est ce qui les rendra un objet de risée dans le pays d’Égypte.
  '2':
  - type: text
    content: Ils ne se disent pas dans leur cœur
  - type: text
    content: Que je me souviens de toute leur méchanceté;
  - type: text
    content: Maintenant leurs œuvres les entourent,
  - type: text
    content: Elles sont devant ma face.
  '3':
  - type: text
    content: Ils réjouissent le roi par leur méchanceté,
  - type: text
    content: Et les chefs par leurs mensonges.
  '4':
  - type: text
    content: Ils sont tous adultères,
  - type: text
    content: 'Semblables à un four chauffé par le boulanger:'
  - type: text
    content: Il cesse d’attiser le feu
  - type: text
    content: Depuis qu’il a pétri la pâte jusqu’à ce qu’elle soit levée.
  '5':
  - type: text
    content: Au jour de notre roi,
  - type: text
    content: Les chefs se rendent malades par les excès du vin;
  - type: text
    content: Le roi tend la main aux moqueurs.
  '6':
  - type: text
    content: Ils appliquent aux embûches leur cœur pareil à un four;
  - type: text
    content: Toute la nuit dort leur boulanger,
  - type: text
    content: Et au matin le four brûle comme un feu embrasé.
  '7':
  - type: text
    content: Ils sont tous ardents comme un four,
  - type: text
    content: Et ils dévorent leurs juges;
  - type: text
    content: 'Tous leurs rois tombent:'
  - type: text
    content: Aucun d’eux ne m’invoque.
  - type: heading
    content: 'V. 8-16: cf. És 9:7, etc. Am 4:6, etc.'
  '8':
  - type: text
    content: 'Éphraïm se '
  - type: note
    content: Ps 106:35.
  - type: text
    content: mêle avec les peuples,
  - type: text
    content: Éphraïm est un gâteau qui n’a pas été retourné.
  '9':
  - type: text
    content: Des étrangers consument sa force,
  - type: text
    content: Et il ne s’en doute pas;
  - type: text
    content: La vieillesse s’empare de lui,
  - type: text
    content: Et il ne s’en doute pas.
