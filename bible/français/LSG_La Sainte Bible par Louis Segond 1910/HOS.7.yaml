document_id: HOS.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reproches aux chefs et aux rois
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. Am 3:9-11. Os 4:11. És 59:13, 14.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lorsque je voulais guérir Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’iniquité d’Éphraïm et la méchanceté de Samarie se sont révélées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils ont agi frauduleusement;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le voleur est arrivé, la bande s’est répandue au dehors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ils ne se disent pas dans leur cœur
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je me souviens de toute leur méchanceté;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant leurs œuvres les entourent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles sont devant ma face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ils réjouissent le roi par leur méchanceté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les chefs par leurs mensonges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils sont tous adultères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Semblables à un four chauffé par le boulanger:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il cesse d’attiser le feu
- type: usfm
  marker: q1
  children:
  - type: text
    text: Depuis qu’il a pétri la pâte jusqu’à ce qu’elle soit levée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Au jour de notre roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les chefs se rendent malades par les excès du vin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le roi tend la main aux moqueurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils appliquent aux embûches leur cœur pareil à un four;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toute la nuit dort leur boulanger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et au matin le four brûle comme un feu embrasé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils sont tous ardents comme un four,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils dévorent leurs juges;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tous leurs rois tombent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aucun d’eux ne m’invoque.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-16: cf. És 9:7, etc. Am 4:6, etc.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Éphraïm se '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 106:35
      metadata:
        usfm: PSA.106.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: mêle avec les peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éphraïm est un gâteau qui n’a pas été retourné.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Des étrangers consument sa force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il ne s’en doute pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La vieillesse s’empare de lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il ne s’en doute pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 5:5
      metadata:
        usfm: HOS.5.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’orgueil d’Israël témoigne contre lui;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne reviennent pas à l’Éternel, leur Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils ne le cherchent pas, malgré tout cela.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Éphraïm est comme une colombe stupide, sans intelligence;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils implorent l’Égypte, ils vont en Assyrie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: S’ils partent, j’étendrai sur eux mon filet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les précipiterai comme les oiseaux du ciel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les châtierai, comme ils en ont été avertis dans leur assemblée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Malheur à eux, parce qu’ils me fuient!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ruine sur eux, parce qu’ils me sont infidèles!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je voudrais les sauver,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ils disent contre moi des paroles mensongères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ils ne crient pas vers moi dans leur cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ils se lamentent sur leur couche;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se rassemblent pour avoir du blé et du moût,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils s’éloignent de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je les ai châtiés, j’ai fortifié leurs bras;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils méditent le mal contre moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ce n’est pas au Très-Haut qu’ils retournent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils sont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:57
      metadata:
        usfm: PSA.78.57
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: comme un arc trompeur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs chefs tomberont par l’épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de l’insolence de leur langue.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est ce qui les rendra un objet de risée dans le pays d’Égypte.
