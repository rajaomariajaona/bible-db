document_id: EZK.24,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La ruine de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-14: cf. Éz 22:1-5, 14-22. 2 R 25. Hé 6:8.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La neuvième année, le dixième jour du dixième mois, la parole de l’Éternel me fut adressée, en ces mots: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Entasse le bois, allume le feu, cuis bien la chair, assaisonne-la, et que les os soient brûlés. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis mets la chaudière vide sur les charbons, afin qu’elle s’échauffe, que son airain devienne brûlant, que sa souillure se fonde au-dedans, et que sa rouille se consume. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les efforts sont inutiles, la rouille dont elle est pleine ne se détache pas; la rouille ne s’en ira que par le feu. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le crime est dans ta souillure; parce que j’ai voulu te purifier et que tu n’es pas devenue pure, tu ne seras plus purifiée de ta souillure jusqu’à ce que j’aie assouvi sur toi ma fureur. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moi, l’Éternel, j’ai parlé; cela arrivera, et je l’exécuterai; je ne reculerai pas, et je n’aurai ni '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 5:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pitié ni repentir. On te '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 23:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: jugera selon ta conduite et selon tes actions, dit le Seigneur, l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 15-27: cf. Jé 16:1-13.'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de l’homme, voici, je t’enlève par une mort soudaine ce qui fait les délices de tes yeux. Tu ne te lamenteras point, tu ne pleureras point, et tes larmes ne couleront pas. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Soupire en silence, ne prends pas le deuil des morts, attache ton turban, mets ta chaussure à tes pieds, ne te couvre pas la barbe, et ne mange pas le pain des autres. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’avais parlé au peuple le matin, et ma femme mourut le soir. Le lendemain matin, je fis ce qui m’avait été ordonné. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le peuple me dit: Ne nous expliqueras-tu pas ce que signifie pour nous ce que tu fais? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de l’homme, mets par écrit la date de ce jour, de ce jour-ci! Le roi de Babylone s’approche de Jérusalem en ce jour même. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je leur répondis: La parole de l’Éternel m’a été adressée, en ces mots: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dis à la maison d’Israël: Ainsi parle le Seigneur, l’Éternel: Voici, je vais profaner mon sanctuaire, l’orgueil de votre force, les délices de vos yeux, l’objet de votre amour; et vos fils et vos filles que vous avez laissés tomberont par l’épée. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous ferez alors comme j’ai fait. Vous ne vous couvrirez pas la barbe, vous ne mangerez pas le pain des autres, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'vous aurez vos turbans sur la tête et vos chaussures aux pieds, vous ne vous lamenterez pas et vous ne pleurerez pas; mais vous serez '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 4:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'frappés de langueur pour vos iniquités, et vous gémirez entre vous. Ézéchiel sera pour vous un '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 12:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'signe. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous ferez entièrement comme il a fait. Et quand ces choses arriveront, vous saurez que je suis le Seigneur, l’Éternel. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et toi, fils de l’homme, le jour où je leur enlèverai ce qui fait leur force, leur joie et leur gloire, les délices de leurs yeux et l’objet de leur amour, leurs fils et leurs filles, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ce jour-là un fuyard viendra vers toi pour l’annoncer à tes oreilles. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En ce jour, ta bouche s’ouvrira avec le fuyard, et tu parleras, tu ne seras plus muet; tu seras pour eux un signe, et ils sauront que je suis l’Éternel.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Propose une parabole à la famille de rebelles, et dis-leur: Ainsi parle le Seigneur, l’Éternel: Place, place la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 1:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'chaudière, et verses-y de l’eau. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mets-y les morceaux, tous les bons morceaux, la cuisse, l’épaule; remplis-la des meilleurs os. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Choisis dans le troupeau, et entasse du bois sous la chaudière; fais bouillir à gros bouillons, et que les os qui sont dedans cuisent aussi. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel: Malheur à la ville '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 22:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'sanguinaire, chaudière pleine de rouille, et dont la rouille ne se détache pas! Tires-en les morceaux les uns après les autres, sans recourir au sort. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car le sang qu’elle a versé est au milieu d’elle; elle l’a mis sur le roc nu, elle ne l’a pas répandu sur la terre pour le couvrir de poussière. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afin de montrer ma fureur, afin de me venger, j’ai répandu son sang sur le roc nu, pour qu’il ne fût pas couvert. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Na 3:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ha 2:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Malheur à la ville sanguinaire! Moi aussi je veux faire un grand bûcher. '
