document_id: ISA.37,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. 2 R 19:1-7. 1 S 2:3.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Lorsque le roi Ézéchias eut entendu cela, il déchira ses vêtements, se couvrit d’un sac, et alla dans la maison de l’Éternel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Vous parlerez ainsi à Ézéchias, roi de Juda: Que ton Dieu, auquel tu te confies, ne t’abuse point en disant: Jérusalem ne sera pas livrée entre les mains du roi d’Assyrie. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Voici, tu as appris ce qu’ont fait les rois d’Assyrie à tous les pays, et comment ils les ont détruits; et toi, tu serais délivré! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Les dieux des nations que mes pères ont détruites les ont-ils délivrées, Gozan, Charan, Retseph, et les fils d’Éden qui sont à Telassar? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Où sont le roi de Hamath, le roi d’Arpad, et le roi de la ville de Sepharvaïm, d’Héna et d’Ivva? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ézéchias prit la lettre de la main des messagers, et la lut. Puis il monta à la maison de l’Éternel, et la déploya devant l’Éternel, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'à qui il adressa cette prière: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Éternel des armées, Dieu d’Israël, assis sur les chérubins! C’est toi qui es le seul Dieu de tous les royaumes de la terre, c’est toi qui as fait les cieux et la terre. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Éternel, incline ton oreille, et écoute! Éternel, ouvre tes yeux, et regarde! Entends toutes les paroles que Sanchérib a envoyées pour insulter au Dieu vivant! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Il est vrai, ô Éternel! Que les rois d’Assyrie ont ravagé tous les pays et leur propre pays, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'et qu’ils ont jeté leurs dieux dans le feu; mais ce n’étaient point des dieux, c’étaient des ouvrages de mains d’homme, du bois et de la pierre; et ils les ont anéantis. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il envoya Éliakim, chef de la maison du roi, Schebna, le secrétaire, et les plus anciens des sacrificateurs, couverts de sacs, vers Ésaïe, le prophète, fils d’Amots. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Maintenant, Éternel, notre Dieu, délivre-nous de la main de Sanchérib, et que tous les royaumes de la terre sachent que toi seul es l’Éternel! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Alors Ésaïe, fils d’Amots, envoya dire à Ézéchias: Ainsi parle l’Éternel, le Dieu d’Israël: J’ai entendu la prière que tu m’as adressée au sujet de Sanchérib, roi d’Assyrie. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Voici la parole que l’Éternel a prononcée contre lui:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle te méprise, elle se moque de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La vierge, fille de Sion;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle hoche la tête après toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La fille de Jérusalem.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Qui as-tu insulté et outragé?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre qui as-tu élevé la voix?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as porté tes yeux en haut
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur le Saint d’Israël.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Par tes serviteurs tu as insulté le Seigneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et tu as dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec la multitude de mes chars,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai gravi le sommet des montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les extrémités du Liban;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je couperai les plus élevés de ses cèdres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les plus beaux de ses cyprès,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’atteindrai sa dernière cime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa forêt semblable à un verger;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: J’ai ouvert des sources, et j’en ai bu les eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je tarirai avec la plante de mes pieds
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les fleuves de l’Égypte.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: N’as-tu pas appris que j’ai préparé ces choses de loin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que je les ai résolues dès les temps anciens?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant j’ai permis qu’elles s’accomplissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que tu réduisisses des villes fortes en monceaux de ruines.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Leurs habitants sont impuissants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Epouvantés et confus;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont comme l’herbe des champs et la tendre verdure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme le gazon des toits
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le blé qui sèche avant la formation de sa tige.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Mais je sais quand tu t’assieds, quand tu sors et quand tu entres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et quand tu es furieux contre moi.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Parce que tu es furieux contre moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que ton arrogance est montée à mes oreilles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je mettrai ma boucle à tes narines et mon mors entre tes lèvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je te ferai retourner par le chemin par lequel tu es venu.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Et ils lui dirent: Ainsi parle Ézéchias: Ce jour est un jour d’angoisse, de châtiment et d’opprobre; car les enfants sont près de sortir du sein maternel, et il n’y a point de force pour l’enfantement. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Que ceci soit un signe pour toi: On a mangé une année le produit du grain tombé, et une seconde année ce qui croît de soi-même; mais la troisième année, vous sèmerez, vous moissonnerez, vous planterez des vignes, et vous en mangerez le fruit. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ce qui aura été sauvé de la maison de Juda, ce qui sera resté poussera encore des racines par-dessous, et portera du fruit par-dessus. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Car de Jérusalem il sortira un reste, et de la montagne de Sion des réchappés. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 19:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 9:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Voilà ce que fera le zèle de l’Éternel des armées.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'C’est pourquoi ainsi parle l’Éternel sur le roi d’Assyrie:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’entrera point dans cette ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y lancera point de traits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne lui présentera point de boucliers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il n’élèvera point de retranchements contre elle.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Il s’en retournera par le chemin par lequel il est venu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il n’entrera point dans cette ville, dit l’Éternel.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 20:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je protégerai cette ville pour la sauver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de moi, et à cause de David, mon serviteur.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 19:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'L’ange de l’Éternel sortit, et frappa dans le camp des Assyriens cent quatre-vingt-cinq mille hommes. Et quand on se leva le matin, voici, c’étaient tous des corps morts. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Alors Sanchérib, roi d’Assyrie, leva son camp, partit et s’en retourna; et il resta à Ninive. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Or, comme il était prosterné dans la maison de Nisroc, son dieu, Adrammélec et Scharetser, ses fils, le frappèrent par l’épée, et s’enfuirent au pays d’Ararat. Et Ésar-Haddon, son fils, régna à sa place.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Peut-être l’Éternel, ton Dieu, a-t-il entendu les paroles de Rabschaké, que le roi d’Assyrie, son maître, a envoyé pour insulter le Dieu vivant, et peut-être l’Éternel, ton Dieu, exercera-t-il ses châtiments à cause des paroles qu’il a entendues. Fais donc monter une prière pour le reste qui subsiste encore. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Les serviteurs du roi Ézéchias allèrent donc auprès d’Ésaïe. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Et Ésaïe leur dit: Voici ce que vous direz à votre maître: Ainsi parle l’Éternel: Ne t’effraie point des paroles que tu as entendues et par lesquelles m’ont outragé les serviteurs du roi d’Assyrie. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Je vais mettre en lui un esprit tel que, sur une nouvelle qu’il recevra, il retournera dans son pays; et je le ferai tomber par l’épée dans son pays.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-38: cf. És 10:12, etc. (2 R 19:8-37. 2 Ch 32:16-22.) Ps 46; 75; 76. 1 S 2:4, 9, 10.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Rabschaké, s’étant retiré, trouva le roi d’Assyrie qui attaquait Libna, car il avait appris son départ de Lakis. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Alors le roi d’Assyrie reçut une nouvelle au sujet de Tirhaka, roi d’Éthiopie; on lui dit: Il s’est mis en marche pour te faire la guerre. Dès qu’il eut entendu cela, il envoya des messagers à Ézéchias, en disant: '
