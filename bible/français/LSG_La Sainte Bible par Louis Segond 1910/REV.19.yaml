document_id: REV.19,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-10: cf. Ap 18:20-24; 15:2-4; 11:15-17. (Ps 45:7-16. Ap 21:1-5.)'
  - type: text
    content: 'Après cela, j’entendis dans le ciel comme une voix forte d’une foule nombreuse qui disait: Alléluia! Le salut, la gloire, et la puissance sont à notre Dieu, '
  '10':
  - type: note
    content: Ap 22:8.
  - type: text
    content: 'Et je tombai à ses pieds pour l’adorer; mais il me dit: '
  - type: note
    content: Ac 10:26; 14:14. Ap 22:9.
  - type: text
    content: Garde-toi de le faire! Je suis ton compagnon de service, et celui de tes frères qui ont le témoignage de Jésus. Adore Dieu. Car le témoignage de Jésus est l’esprit de la prophétie.
  - type: heading
    content: Victoire sur la bête et sur le faux prophète
  - type: heading
    content: 'V. 11-21: cf. (Ps 45:4-8. Jud v. 15. És 11:4; 63:1-6.) (Ap 16:13-16; 17:13, 14. 2 Th 2:8. És 24:21, 22.)'
  '11':
  - type: text
    content: 'Puis je vis le ciel ouvert, et voici, parut '
  - type: note
    content: Ap 6:2.
  - type: text
    content: 'un cheval blanc. Celui qui le montait s’appelle Fidèle et Véritable, et il juge et combat avec justice. '
  '12':
  - type: text
    content: 'Ses yeux étaient '
  - type: note
    content: Ap 1:14.
  - type: text
    content: 'comme une flamme de feu; sur sa tête étaient plusieurs diadèmes; il avait un nom écrit, que personne ne connaît, si ce n’est lui-même; '
  '13':
  - type: text
    content: 'et il était revêtu d’un vêtement '
  - type: note
    content: És 63:1.
  - type: text
    content: 'teint de sang. Son nom est '
  - type: note
    content: Jn 1:1. 1 Jn 1:1.
  - type: text
    content: 'la Parole de Dieu. '
  '14':
  - type: text
    content: 'Les armées qui sont dans le ciel le suivaient sur des chevaux blancs, revêtues '
  - type: note
    content: Mt 28:3. Ap 4:4; 7:9.
  - type: text
    content: 'd’un fin lin, blanc, pur. '
  '15':
  - type: note
    content: Ap 2:16; 19:21.
  - type: text
    content: 'De sa bouche sortait une épée aiguë, pour frapper les nations; il les paîtra '
  - type: note
    content: Ps 2:9. Ap 2:27.
  - type: text
    content: 'avec une verge de fer; '
  - type: note
    content: És 63:3. Ap 14:19, 20.
  - type: text
    content: 'et il foulera la cuve du vin de l’ardente colère du Dieu tout-puissant. '
  '16':
  - type: text
    content: 'Il avait sur son vêtement et sur sa cuisse un nom écrit: '
  - type: note
    content: 1 Th 6:15. Ap 17:14.
  - type: text
    content: 'Roi des rois et Seigneur des seigneurs. '
  '17':
  - type: text
    content: 'Et je vis un ange qui se tenait dans le soleil. Et il cria d’une voix forte, disant à tous les oiseaux qui volaient par le milieu du ciel: '
  - type: note
    content: Jé 12:9. Éz 39:17.
  - type: text
    content: 'Venez, rassemblez-vous pour le grand festin de Dieu, '
  '18':
  - type: text
    content: 'afin de manger la chair des rois, la chair des chefs militaires, la chair des puissants, la chair des chevaux et de ceux qui les montent, la chair de tous, libres et esclaves, petits et grands. '
  '19':
  - type: text
    content: 'Et je vis la bête, et les rois de la terre, et leurs armées rassemblées pour faire la guerre à celui qui était assis sur le cheval et à son armée. '
  '2':
  - type: text
    content: 'parce que ses '
  - type: note
    content: Ap 15:3; 16:7.
  - type: text
    content: 'jugements sont véritables et justes; car il a jugé la grande prostituée qui corrompait la terre par son impudicité, et il a vengé '
  - type: note
    content: De 32:43. Ap 18:20.
  - type: text
    content: 'le sang de ses serviteurs en le redemandant de sa main. '
  '20':
  - type: text
    content: 'Et la bête fut prise, et avec elle le faux prophète, '
  - type: note
    content: De 13:1. Mt 24:24. Ap 13:12, 13; 16:14.
  - type: text
    content: 'qui avait fait devant elle les prodiges par lesquels il avait séduit ceux qui avaient '
  - type: note
    content: Ap 13:16.
  - type: text
    content: 'pris la marque de la bête et '
  - type: note
    content: Ap 13:15.
  - type: text
    content: 'adoré son image. Ils furent tous les deux jetés '
  - type: note
    content: Da 7:11. Ap 20:10.
  - type: text
    content: 'vivants dans l’étang ardent de feu et '
  - type: note
    content: Ap 14:10.
  - type: text
    content: 'de soufre. '
  '21':
  - type: text
    content: Et les autres furent tués par l’épée qui sortait de la bouche de celui qui était assis sur le cheval; et tous les oiseaux se rassasièrent de leur chair.
  '3':
  - type: text
    content: 'Et ils dirent une seconde fois: Alléluia!… '
  - type: note
    content: És 34:10. Ap 14:11; 18:18.
  - type: text
    content: 'et sa fumée monte aux siècles des siècles. '
  '4':
  - type: text
    content: 'Et les vingt-quatre vieillards et les quatre êtres vivants se prosternèrent et adorèrent Dieu assis sur le trône, en disant: Amen! Alléluia! '
  '5':
  - type: text
    content: 'Et une voix sortit du trône, disant: Louez notre Dieu, vous tous ses serviteurs, vous qui le craignez, petits et grands! '
  '6':
  - type: text
    content: 'Et j’entendis comme une voix d’une foule nombreuse, comme un bruit de grosses eaux, et comme un bruit de forts tonnerres, disant: Alléluia! Car le Seigneur notre Dieu tout-puissant est entré '
  - type: note
    content: Ap 11:17.
  - type: text
    content: 'dans son règne. '
  '7':
  - type: text
    content: 'Réjouissons-nous et soyons dans l’allégresse, et donnons-lui gloire; '
  - type: note
    content: Mt 22:2. Lu 14:16.
  - type: text
    content: 'car les noces de l’agneau sont venues, et son épouse s’est préparée, '
  '8':
  - type: text
    content: 'et il lui a été donné de se revêtir d’un fin lin, éclatant, pur. Car le fin lin, ce sont les œuvres justes des saints. '
  '9':
  - type: text
    content: 'Et l’ange me dit: Écris: Heureux ceux qui sont appelés au festin de noces de l’agneau! Et il me dit: '
  - type: note
    content: Ap 21:5.
  - type: text
    content: 'Ces paroles sont les véritables paroles de Dieu. '
