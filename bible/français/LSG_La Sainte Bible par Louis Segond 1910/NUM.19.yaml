document_id: NUM.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vache rousse; I’eau de purification
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-22: cf. (Hé 13:11, 12; 9:13, 14; 10:22.) Lé 14:1-9; 15:31. Éz 36:25.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Moïse et à Aaron, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici ce qui est ordonné par la loi que l’Éternel a prescrite, en disant: Parle aux enfants d’Israël, et qu’ils t’amènent une vache rousse, sans tache, sans défaut corporel, et qui n’ait point porté le joug. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous la remettrez au sacrificateur Éléazar, qui la fera '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:11
      metadata:
        usfm: HEB.13.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: HEB.13.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sortir du camp, et on l’égorgera devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le sacrificateur Éléazar prendra du '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:13
      metadata:
        usfm: HEB.9.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sang de la vache avec le doigt, et il en fera sept fois l’aspersion sur le devant de la tente d’assignation. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'On brûlera la vache sous ses yeux; on brûlera '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 29:14
      metadata:
        usfm: EXO.29.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 4:11
      metadata:
        usfm: LEV.4.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: LEV.4.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sa peau, sa chair et son sang, avec ses excréments. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le sacrificateur prendra du bois de cèdre, de l’hysope et du cramoisi, et il les jettera au milieu des flammes qui consumeront la vache. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le sacrificateur lavera ses vêtements, et lavera son corps dans l’eau; puis il rentrera dans le camp, et sera impur jusqu’au soir. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Celui qui aura brûlé la vache lavera ses vêtements dans l’eau, et lavera son corps dans l’eau; et il sera impur jusqu’au soir. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Un homme pur recueillera la cendre de la vache, et la déposera hors du camp, dans un lieu pur; on la conservera pour l’assemblée des enfants d’Israël, afin d’en faire l’eau de purification. C’est une eau expiatoire. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Celui qui aura recueilli la cendre de la vache lavera ses vêtements, et sera impur jusqu’au soir. Ce sera une loi perpétuelle pour les enfants d’Israël et pour l’étranger en séjour au milieu d’eux. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 31:19
      metadata:
        usfm: NUM.31.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ag 2:14
      metadata:
        usfm: HAG.2.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Celui qui touchera un mort, un corps humain quelconque, sera impur pendant sept jours. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il se purifiera avec cette eau le troisième jour et le septième jour, et il sera pur; mais, s’il ne se purifie pas le troisième jour et le septième jour, il ne sera pas pur. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Celui qui touchera un mort, le corps d’un homme qui sera mort, et qui ne se purifiera pas, souille le tabernacle de l’Éternel; celui-là sera retranché d’Israël. Comme l’eau de purification n’a pas été répandue sur lui, il est impur, et son impureté est encore sur lui. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voici la loi. Lorsqu’un homme mourra dans une tente, quiconque entrera dans la tente, et quiconque se trouvera dans la tente, sera impur pendant sept jours. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tout vase découvert, sur lequel il n’y aura point de couvercle attaché, sera impur. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Quiconque touchera, dans les champs, un homme tué par l’épée, ou un mort, ou des ossements humains, ou un sépulcre, sera impur pendant sept jours. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'On prendra, pour celui qui est impur, de la cendre de la victime expiatoire qui a été brûlée, et on mettra dessus de l’eau vive dans un vase. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Un homme pur prendra '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 51:9
      metadata:
        usfm: PSA.51.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de l’hysope, et la trempera dans l’eau; puis il en fera l’aspersion sur la tente, sur tous les ustensiles, sur les personnes qui sont là, sur celui qui a touché des ossements, ou un homme tué, ou un mort, ou un sépulcre. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Celui qui est pur fera l’aspersion sur celui qui est impur, le troisième jour et le septième jour, et il le purifiera le septième jour. Il lavera ses vêtements, et se lavera dans l’eau; et le soir, il sera pur. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Un homme qui sera impur, et qui ne se purifiera pas, sera retranché du milieu de l’assemblée, car il a souillé le sanctuaire de l’Éternel; comme l’eau de purification n’a pas été répandue sur lui, il est impur. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ce sera pour eux une loi perpétuelle. Celui qui fera l’aspersion de l’eau de purification lavera ses vêtements, et celui qui touchera l’eau de purification sera impur jusqu’au soir. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tout ce que touchera celui qui est impur sera souillé, et la personne qui le touchera sera impure jusqu’au soir.
