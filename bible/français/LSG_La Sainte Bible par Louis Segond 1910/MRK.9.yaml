document_id: MRK.9,93
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Mt 16:28. Lu 9:27.
  - type: text
    content: 'Il leur dit encore: '
  - type: text
    content: Je vous le dis en vérité, quelques-uns de ceux qui sont ici ne mourront point, qu’ils n’aient vu le royaume de Dieu venir avec puissance.
  - type: heading
    content: Jésus sur une haute montagne. La transfiguration
  - type: heading
    content: 'V. 2-13: cf. (Mt 17:1-13. Lu 9:28-36.) 2 Pi 1:16-18.'
  '10':
  - type: text
    content: 'Ils retinrent cette parole, se demandant entre eux ce que c’est que ressusciter des morts. '
  '11':
  - type: text
    content: 'Les disciples lui firent cette question: Pourquoi les scribes disent-ils '
  - type: note
    content: Mal 4:5. Mt 11:14. Lu 1:17.
  - type: text
    content: 'qu’il faut qu’Élie vienne premièrement? '
  '12':
  - type: text
    content: 'Il leur répondit: '
  - type: text
    content: Élie viendra premièrement, et rétablira toutes choses.
  - type: text
    content: ' '
  - type: note
    content: Ps 22:7. És 53:4. Da 9:26.
  - type: text
    content: Et pourquoi est-il écrit du Fils de l’homme qu’il doit souffrir beaucoup et être méprisé?
  '13':
  - type: text
    content: ' '
  - type: text
    content: Mais je vous dis qu’Élie est venu, et qu’ils l’ont traité comme ils ont voulu,
  - type: text
    content: ' '
  - type: note
    content: Mal 4:5, 6.
  - type: text
    content: selon qu’il est écrit de lui.
  - type: heading
    content: Guérison d’un démoniaque
  - type: heading
    content: 'V. 14-29: cf. (Mt 17:14-21. Lu 9:37-43.)'
  '14':
  - type: text
    content: 'Lorsqu’ils furent arrivés près des disciples, ils virent autour d’eux une grande foule, et des scribes qui discutaient avec eux. '
  '15':
  - type: text
    content: 'Dès que la foule vit Jésus, elle fut surprise, et accourut pour le saluer. '
  '16':
  - type: text
    content: 'Il leur demanda: '
  - type: text
    content: Sur quoi discutez-vous avec eux?
  - type: text
    content: ' '
  '17':
  - type: note
    content: Mt 17:14. Lu 9:37, 38.
  - type: text
    content: 'Et un homme de la foule lui répondit: Maître, j’ai amené auprès de toi mon fils, qui est possédé d’un esprit muet. '
  '18':
  - type: text
    content: En quelque lieu qu’il le saisisse, il le jette par terre; l’enfant écume, grince des dents, et devient tout raide. J’ai prié tes disciples de chasser l’esprit, et ils n’ont pas pu.
  '19':
  - type: text
    content: ' '
  - type: text
    content: Race incrédule,
  - type: text
    content: ' leur dit Jésus, '
  - type: text
    content: jusques à quand serai-je avec vous? Jusques à quand vous supporterai-je? Amenez-le-moi.
  - type: text
    content: ' On le lui amena. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Mt 17:1. Lu 9:28.
  - type: text
    content: 'Six jours après, Jésus prit avec lui Pierre, Jacques et Jean, et il les conduisit seuls à l’écart sur une haute montagne. Il fut transfiguré devant eux; '
  '20':
  - type: note
    content: Mc 1:26.
  - type: text
    content: 'Et aussitôt que l’enfant vit Jésus, l’esprit l’agita avec violence; il tomba par terre, et se roulait en écumant. '
  '21':
  - type: text
    content: 'Jésus demanda au père: '
  - type: text
    content: Combien y a-t-il de temps que cela lui arrive?
  - type: text
    content: ' Depuis son enfance, répondit-il. '
  '22':
  - type: text
    content: 'Et souvent l’esprit l’a jeté dans le feu et dans l’eau pour le faire périr. Mais, si tu peux quelque chose, viens à notre secours, aie compassion de nous. '
  '23':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: Si tu peux!…
  - type: text
    content: ' '
  - type: note
    content: Lu 17:6.
  - type: text
    content: Tout est possible à celui qui croit.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Aussitôt le père de l’enfant s’écria: Je crois! Viens au secours de mon incrédulité! '
  '25':
  - type: text
    content: 'Jésus, voyant accourir la foule, menaça l’esprit impur, et lui dit: '
  - type: text
    content: Esprit muet et sourd, je te l’ordonne, sors de cet enfant, et n’y rentre plus.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Et il sortit, en poussant des cris, et en l’agitant avec une grande violence. L’enfant devint comme mort, de sorte que plusieurs disaient qu’il était mort. '
  '27':
  - type: text
    content: 'Mais Jésus, l’ayant pris par la main, le fit lever. Et il se tint debout. '
  '28':
  - type: note
    content: Mt 17:19.
  - type: text
    content: 'Quand Jésus fut entré dans la maison, ses disciples lui demandèrent en particulier: Pourquoi n’avons-nous pu chasser cet esprit? '
  '29':
  - type: text
    content: 'Il leur dit: '
  - type: text
    content: Cette espèce-là ne peut sortir que par la prière.
  - type: heading
    content: Jésus annonce sa mort et sa résurrection
  - type: heading
    content: 'V. 30-32: cf. (Mt 17:22, 23. Lu 9:43-46.) Mc 8:31-33.'
  '3':
  - type: text
    content: 'ses vêtements devinrent resplendissants, et d’une telle blancheur qu’il n’est pas de foulon sur la terre qui puisse blanchir ainsi. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Mt 16:21; 17:22; 20:18. Mc 8:31; 10:33. Lu 9:22; 18:31; 24:7.
  - type: text
    content: 'Ils partirent de là, et traversèrent la Galilée. Jésus ne voulait pas qu’on le sût. '
  '31':
  - type: text
    content: 'Car il enseignait ses disciples, et il leur dit: '
  - type: text
    content: Le Fils de l’homme sera livré entre les mains des hommes; ils le feront mourir, et, trois jours après qu’il aura été mis à mort, il ressuscitera.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Mais les disciples ne comprenaient pas cette parole, et ils craignaient de l’interroger.
  - type: heading
    content: Jésus de retour à Capernaüm. Qui est le plus grand?
  - type: heading
    content: 'V. 33-37: cf. (Mt 18:1-5. Lu 9:46-48.) Mc 10:35-45. Ph 2:5-11.'
  '33':
  - type: text
    content: ' '
  - type: note
    content: Mt 18:1. Lu 9:46; 22:24.
  - type: text
    content: 'Ils arrivèrent à Capernaüm. Lorsqu’il fut dans la maison, Jésus leur demanda: '
  - type: text
    content: De quoi discutiez-vous en chemin?
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Mais ils gardèrent le silence, car en chemin ils avaient discuté entre eux pour savoir qui était le plus grand. '
  '35':
  - type: text
    content: 'Alors il s’assit, appela les douze, et leur dit: '
  - type: note
    content: Mt 20:27. Mc 10:43.
  - type: text
    content: Si quelqu’un veut être le premier, il sera le dernier de tous et le serviteur de tous.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Et il prit un petit enfant, le plaça au milieu d’eux, et '
  - type: note
    content: Mc 10:16.
  - type: text
    content: 'l’ayant pris dans ses bras, il leur dit:'
  '37':
  - type: text
    content: ' '
  - type: note
    content: Mt 18:5. Lu 9:48. Jn 13:20.
  - type: text
    content: Quiconque reçoit en mon nom un de ces petits enfants me reçoit moi-même; et quiconque me reçoit, reçoit non pas moi, mais celui qui m’a envoyé.
  - type: heading
    content: Les scandales
  - type: heading
    content: 'V. 38-51: cf. (Mt 18:5-9. Lu 9:49, 50.) 1 Co 8:9-13; 9:24-27.'
  '38':
  - type: text
    content: ' '
  - type: note
    content: Lu 9:49.
  - type: text
    content: 'Jean lui dit: Maître, nous avons vu un homme qui chasse des démons en ton nom; et nous l’en avons empêché, parce qu’il ne nous suit pas.'
  '39':
  - type: text
    content: ' '
  - type: note
    content: 1 Co 12:3.
  - type: text
    content: Ne l’en empêchez pas,
  - type: text
    content: ' répondit Jésus, '
  - type: text
    content: car il n’est personne qui, faisant un miracle en mon nom, puisse aussitôt après parler mal de moi.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Élie et Moïse leur apparurent, s’entretenant avec Jésus. '
  '40':
  - type: text
    content: Qui n’est pas contre nous est pour nous.
  - type: text
    content: ' '
  '41':
  - type: text
    content: Et
  - type: text
    content: ' '
  - type: note
    content: Mt 10:42.
  - type: text
    content: quiconque vous donnera à boire un verre d’eau en mon nom, parce que vous appartenez à Christ, je vous le dis en vérité, il ne perdra point sa récompense.
  - type: text
    content: ' '
  '42':
  - type: note
    content: Mt 18:6. Lu 17:2.
  - type: text
    content: Mais, si quelqu’un scandalisait un de ces petits qui croient, il vaudrait mieux pour lui qu’on lui mît au cou une grosse meule de moulin, et qu’on le jetât dans la mer.
  - type: text
    content: ' '
  '43':
  - type: note
    content: De 13:6. Mt 5:30; 18:8.
  - type: text
    content: Si ta main est pour toi une occasion de chute, coupe-la; mieux vaut pour toi entrer manchot dans la vie,
  - type: text
    content: ' '
  '44':
  - type: text
    content: que d’avoir les deux mains et d’aller dans la géhenne, dans le feu qui ne s’éteint point.
  - type: text
    content: ' '
  '45':
  - type: text
    content: Si ton pied est pour toi une occasion de chute, coupe-le; mieux vaut pour toi entrer boiteux dans la vie,
  - type: text
    content: ' '
  '46':
  - type: text
    content: que d’avoir les deux pieds et d’être jeté dans la géhenne, dans le feu qui ne s’éteint point.
  - type: text
    content: ' '
  '47':
  - type: text
    content: Et si ton œil est pour toi une occasion de chute, arrache-le; mieux vaut pour toi entrer dans le royaume de Dieu n’ayant qu’un œil, que d’avoir deux yeux et d’être jeté dans la géhenne,
  - type: text
    content: ' '
  '48':
  - type: text
    content: où leur ver ne meurt point, et où le feu ne s’éteint point.
  - type: text
    content: ' '
  '49':
  - type: text
    content: Car tout homme sera
  - type: text
    content: ' '
  - type: note
    content: Lé 2:13.
  - type: text
    content: salé de feu.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Pierre, prenant la parole, dit à Jésus: Rabbi, il est bon que nous soyons ici; dressons trois tentes, une pour toi, une pour Moïse, et une pour Élie. '
  '50':
  - type: note
    content: Mt 5:13. Lu 14:34.
  - type: text
    content: Le sel est une bonne chose; mais si le sel devient sans saveur, avec quoi l’assaisonnerez-vous?
  - type: text
    content: ' '
  '51':
  - type: note
    content: Ro 12:18. Hé 12:14.
  - type: text
    content: Ayez du sel en vous-mêmes, et soyez en paix les uns avec les autres.
  '6':
  - type: text
    content: 'Car il ne savait que dire, l’effroi les ayant saisis. '
  '7':
  - type: text
    content: 'Une nuée vint les couvrir, et de la nuée sortit une voix: '
  - type: note
    content: És 42:1. Mt 3:17; 17:5. Mc 1:11. Lu 3:22; 9:35. Col 1:13. 2 Pi 1:17.
  - type: text
    content: 'Celui-ci est mon Fils bien-aimé: '
  - type: note
    content: De 18:19.
  - type: text
    content: 'écoutez-le! '
  '8':
  - type: text
    content: 'Aussitôt les disciples regardèrent tout autour, et ils ne virent que Jésus seul avec eux. '
  '9':
  - type: note
    content: Mt 17:9. Lu 9:36.
  - type: text
    content: 'Comme ils descendaient de la montagne, Jésus leur recommanda de ne dire à personne ce qu’ils avaient vu, jusqu’à ce que le Fils de l’homme fût ressuscité des morts. '
