document_id: MRK.9,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il leur dit encore: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous le dis en vérité, quelques-uns de ceux qui sont ici ne mourront point, qu’ils n’aient vu le royaume de Dieu venir avec puissance.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus sur une haute montagne. La transfiguration
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 2-13: cf. (Mt 17:1-13. Lu 9:28-36.) 2 Pi 1:16-18.'
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ils retinrent cette parole, se demandant entre eux ce que c’est que ressusciter des morts. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Les disciples lui firent cette question: Pourquoi les scribes disent-ils '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal 4:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 11:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 1:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qu’il faut qu’Élie vienne premièrement? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Il leur répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Élie viendra premièrement, et rétablira toutes choses.
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 22:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 53:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Da 9:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et pourquoi est-il écrit du Fils de l’homme qu’il doit souffrir beaucoup et être méprisé?
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais je vous dis qu’Élie est venu, et qu’ils l’ont traité comme ils ont voulu,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal 4:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: selon qu’il est écrit de lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guérison d’un démoniaque
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-29: cf. (Mt 17:14-21. Lu 9:37-43.)'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Lorsqu’ils furent arrivés près des disciples, ils virent autour d’eux une grande foule, et des scribes qui discutaient avec eux. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dès que la foule vit Jésus, elle fut surprise, et accourut pour le saluer. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il leur demanda: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Sur quoi discutez-vous avec eux?
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 17:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:37
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '38'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et un homme de la foule lui répondit: Maître, j’ai amené auprès de toi mon fils, qui est possédé d’un esprit muet. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: En quelque lieu qu’il le saisisse, il le jette par terre; l’enfant écume, grince des dents, et devient tout raide. J’ai prié tes disciples de chasser l’esprit, et ils n’ont pas pu.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Race incrédule,
    - type: text
      text: ' leur dit Jésus, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: jusques à quand serai-je avec vous? Jusques à quand vous supporterai-je? Amenez-le-moi.
    - type: text
      text: ' On le lui amena. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 17:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Six jours après, Jésus prit avec lui Pierre, Jacques et Jean, et il les conduisit seuls à l’écart sur une haute montagne. Il fut transfiguré devant eux; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et aussitôt que l’enfant vit Jésus, l’esprit l’agita avec violence; il tomba par terre, et se roulait en écumant. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Jésus demanda au père: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Combien y a-t-il de temps que cela lui arrive?
    - type: text
      text: ' Depuis son enfance, répondit-il. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Et souvent l’esprit l’a jeté dans le feu et dans l’eau pour le faire périr. Mais, si tu peux quelque chose, viens à notre secours, aie compassion de nous. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Jésus lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si tu peux!…
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 17:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tout est possible à celui qui croit.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Aussitôt le père de l’enfant s’écria: Je crois! Viens au secours de mon incrédulité! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Jésus, voyant accourir la foule, menaça l’esprit impur, et lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Esprit muet et sourd, je te l’ordonne, sors de cet enfant, et n’y rentre plus.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Et il sortit, en poussant des cris, et en l’agitant avec une grande violence. L’enfant devint comme mort, de sorte que plusieurs disaient qu’il était mort. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Mais Jésus, l’ayant pris par la main, le fit lever. Et il se tint debout. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 17:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand Jésus fut entré dans la maison, ses disciples lui demandèrent en particulier: Pourquoi n’avons-nous pu chasser cet esprit? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Il leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Cette espèce-là ne peut sortir que par la prière.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus annonce sa mort et sa résurrection
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 30-32: cf. (Mt 17:22, 23. Lu 9:43-46.) Mc 8:31-33.'
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ses vêtements devinrent resplendissants, et d’une telle blancheur qu’il n’est pas de foulon sur la terre qui puisse blanchir ainsi. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 8:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils partirent de là, et traversèrent la Galilée. Jésus ne voulait pas qu’on le sût. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Car il enseignait ses disciples, et il leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le Fils de l’homme sera livré entre les mains des hommes; ils le feront mourir, et, trois jours après qu’il aura été mis à mort, il ressuscitera.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Mais les disciples ne comprenaient pas cette parole, et ils craignaient de l’interroger.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus de retour à Capernaüm. Qui est le plus grand?
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 33-37: cf. (Mt 18:1-5. Lu 9:46-48.) Mc 10:35-45. Ph 2:5-11.'
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 18:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:46
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils arrivèrent à Capernaüm. Lorsqu’il fut dans la maison, Jésus leur demanda: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: De quoi discutiez-vous en chemin?
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Mais ils gardèrent le silence, car en chemin ils avaient discuté entre eux pour savoir qui était le plus grand. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Alors il s’assit, appela les douze, et leur dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 20:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 10:43
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si quelqu’un veut être le premier, il sera le dernier de tous et le serviteur de tous.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Et il prit un petit enfant, le plaça au milieu d’eux, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 10:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'l’ayant pris dans ses bras, il leur dit:'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 18:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:48
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 13:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Quiconque reçoit en mon nom un de ces petits enfants me reçoit moi-même; et quiconque me reçoit, reçoit non pas moi, mais celui qui m’a envoyé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les scandales
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 38-51: cf. (Mt 18:5-9. Lu 9:49, 50.) 1 Co 8:9-13; 9:24-27.'
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:49
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jean lui dit: Maître, nous avons vu un homme qui chasse des démons en ton nom; et nous l’en avons empêché, parce qu’il ne nous suit pas.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 12:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ne l’en empêchez pas,
    - type: text
      text: ' répondit Jésus, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: car il n’est personne qui, faisant un miracle en mon nom, puisse aussitôt après parler mal de moi.
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Élie et Moïse leur apparurent, s’entretenant avec Jésus. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Qui n’est pas contre nous est pour nous.
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10:42
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: quiconque vous donnera à boire un verre d’eau en mon nom, parce que vous appartenez à Christ, je vous le dis en vérité, il ne perdra point sa récompense.
    - type: text
      text: ' '
  '42':
