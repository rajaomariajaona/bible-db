      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'parole que tu donnas ordre à Moïse, ton serviteur, de prononcer. Lorsque vous pécherez, je vous disperserai parmi les peuples; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais si vous revenez à moi, et si vous observez mes commandements et les mettez en pratique, alors, quand vous seriez exilés à l’extrémité du ciel, de là je vous rassemblerai et je vous ramènerai dans le lieu que j’ai choisi pour y faire résider mon nom. '
