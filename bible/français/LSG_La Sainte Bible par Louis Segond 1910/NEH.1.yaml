document_id: NEH.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière de Néhémie pour les enfants d’Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. Ps 102:14, 15; 137:1, 5. (Da 9:3-19. Esd 9:5-15.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paroles de Néhémie, fils de Hacalia. Au mois de Kisleu, la vingtième année, comme j’étais à Suse, dans la capitale, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hanani, l’un de mes frères, et quelques hommes arrivèrent de Juda. Je les questionnai au sujet des Juifs réchappés qui étaient restés de la captivité, et au sujet de Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils me répondirent: Ceux qui sont restés de la captivité sont là dans la province, au comble du malheur et de l’opprobre; les murailles de Jérusalem sont en ruines, et ses portes sont consumées par le feu. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Lorsque j’entendis ces choses, je m’assis, je pleurai, et je fus plusieurs jours dans la désolation. Je jeûnai et je priai devant le Dieu des cieux, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et je dis: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 9:4
      metadata:
        usfm: DAN.9.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'O Éternel, Dieu des cieux, Dieu grand et redoutable, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:6
      metadata:
        usfm: EXO.20.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:7
      metadata:
        usfm: EXO.34.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 14:18
      metadata:
        usfm: NUM.14.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:10
      metadata:
        usfm: DEU.5.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 86:15
      metadata:
        usfm: PSA.86.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 103:8
      metadata:
        usfm: PSA.103.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 145:8
      metadata:
        usfm: PSA.145.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'toi qui gardes ton alliance et qui fais miséricorde à ceux qui t’aiment et qui observent tes commandements! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Que ton oreille soit attentive et que tes yeux soient ouverts: écoute la prière que ton serviteur t’adresse en ce moment, jour et nuit, pour tes serviteurs les enfants d’Israël, en confessant les péchés des enfants d’Israël, nos péchés contre toi; car moi et la maison de mon père, nous avons péché. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nous t’avons offensé, et nous n’avons point observé les commandements, les lois et les ordonnances que tu prescrivis à Moïse, ton serviteur. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Souviens-toi de cette '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:25
      metadata:
        usfm: DEU.4.25
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: DEU.4.26
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '27'
      metadata:
        usfm: DEU.4.27
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 30:2
      metadata:
        usfm: DEU.30.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: DEU.30.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: DEU.30.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'parole que tu donnas ordre à Moïse, ton serviteur, de prononcer. Lorsque vous pécherez, je vous disperserai parmi les peuples; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'mais si vous revenez à moi, et si vous observez mes commandements et les mettez en pratique, alors, quand vous seriez exilés à l’extrémité du ciel, de là je vous rassemblerai et je vous ramènerai dans le lieu que j’ai choisi pour y faire résider mon nom. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils sont tes serviteurs et ton peuple, que tu as rachetés par ta grande puissance et par ta main forte. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ah! Seigneur, que ton oreille soit attentive à la prière de ton serviteur, et à la prière de tes serviteurs qui veulent craindre ton nom! Donne aujourd’hui du succès à ton serviteur, et fais-lui trouver grâce devant cet homme! J’étais alors échanson du roi.
