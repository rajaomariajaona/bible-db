document_id: 2KI.19,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérusalem sauvée, et l’armée de Sanchérib détruite
  - type: heading
    content: 'V. 1-37: cf. (2 Ch 32:20-23. És 10:8, etc.) (Ps 75; 76; 94.) 2 Ch 20:20. Ps 124.'
  - type: text
    content: ' '
  - type: note
    content: És 37:1.
  - type: text
    content: 'Lorsque le roi Ézéchias eut entendu cela, il déchira ses vêtements, se couvrit d’un sac, et alla dans la maison de l’Éternel. '
  '10':
  - type: text
    content: 'Vous parlerez ainsi à Ézéchias, roi de Juda: Que ton Dieu, auquel tu te confies, ne t’abuse point en disant: Jérusalem ne sera pas livrée entre les mains du roi d’Assyrie. '
  '11':
  - type: text
    content: 'Voici, tu as appris ce qu’ont fait les rois d’Assyrie à tous les pays, et comment ils les ont détruits; et toi, tu serais délivré! '
  '12':
  - type: text
    content: 'Les dieux des nations que mes pères ont détruites les ont-ils délivrées, Gozan, Charan, Retseph, et les fils d’Éden qui sont à Telassar? '
  '13':
  - type: text
    content: 'Où sont le roi de Hamath, le roi d’Arpad, et le roi de la ville de Sepharvaïm, d’Héna et d’Ivva? '
  '14':
  - type: text
    content: 'Ézéchias prit la lettre de la main des messagers, et la lut. Puis il monta à la maison de l’Éternel, et la déploya devant l’Éternel, '
  '15':
  - type: text
    content: 'à qui il adressa cette prière: Éternel, Dieu d’Israël, assis sur les chérubins! C’est toi qui es le seul Dieu de tous les royaumes de la terre, c’est toi qui as fait les cieux et la terre. '
  '16':
  - type: text
    content: 'Éternel! Incline ton oreille, et écoute. Éternel! Ouvre tes yeux, et regarde. Entends les paroles de Sanchérib, qui a envoyé Rabschaké pour insulter au Dieu vivant. '
  '17':
  - type: text
    content: 'Il est vrai, ô Éternel! Que les rois d’Assyrie ont détruit les nations et ravagé leurs pays, '
  '18':
  - type: text
    content: 'et qu’ils ont jeté leurs dieux dans le feu; mais ce n’étaient point des dieux, c’étaient des ouvrages de mains d’homme, du bois et de la pierre; et ils les ont anéantis. '
  '19':
  - type: text
    content: 'Maintenant, Éternel, notre Dieu! Délivre-nous de la main de Sanchérib, et que tous les royaumes de la terre sachent que toi seul es Dieu, ô Éternel! '
  '2':
  - type: text
    content: 'Il envoya Éliakim, chef de la maison du roi, Schebna, le secrétaire, et les plus anciens des sacrificateurs, couverts de sacs, vers Ésaïe, le prophète, '
  - type: note
    content: És 1:1.
  - type: text
    content: 'fils d’Amots. '
  '20':
  - type: text
    content: 'Alors Ésaïe, fils d’Amots, envoya dire à Ézéchias: Ainsi parle l’Éternel, le Dieu d’Israël: J’ai entendu la prière que tu m’as adressée au sujet de Sanchérib, roi d’Assyrie. '
  '21':
  - type: text
    content: 'Voici la parole que l’Éternel a prononcée contre lui:'
  - type: text
    content: Elle te méprise, elle se moque de toi,
  - type: text
    content: La vierge, fille de Sion;
  - type: text
    content: Elle hoche la tête après toi,
  - type: text
    content: La fille de Jérusalem.
  '22':
  - type: text
    content: Qui as-tu insulté et outragé?
  - type: text
    content: Contre qui as-tu élevé la voix?
  - type: text
    content: Tu as porté tes yeux en haut
  - type: text
    content: Sur le Saint d’Israël!
  '23':
  - type: text
    content: Par tes messagers tu as insulté le Seigneur,
  - type: text
    content: 'Et tu as dit:'
  - type: text
    content: Avec la multitude de mes chars,
  - type: text
    content: J’ai gravi le sommet des montagnes,
  - type: text
    content: Les extrémités du Liban;
  - type: text
    content: Je couperai les plus élevés de ses cèdres,
  - type: text
    content: Les plus beaux de ses cyprès,
  - type: text
    content: Et j’atteindrai sa dernière cime,
  - type: text
    content: Sa forêt semblable à un verger;
  '24':
  - type: text
    content: J’ai creusé, et j’ai bu des eaux étrangères,
  - type: text
    content: Et je tarirai avec la plante de mes pieds
  - type: text
    content: Tous les fleuves de l’Égypte.
  '25':
  - type: text
    content: N’as-tu pas appris que j’ai préparé ces choses de loin,
  - type: text
    content: Et que je les ai résolues dès les temps anciens?
  - type: text
    content: Maintenant j’ai permis qu’elles s’accomplissent,
  - type: text
    content: Et que tu réduisisses des villes fortes en monceaux de ruines.
  '26':
  - type: text
    content: Leurs habitants sont impuissants,
  - type: text
    content: Épouvantés et confus;
  - type: text
    content: Ils sont comme l’herbe des champs et la tendre verdure,
  - type: text
    content: Comme le gazon des toits
  - type: text
    content: Et le blé qui sèche avant la formation de sa tige.
  '27':
  - type: text
    content: Mais je sais quand tu t’assieds, quand tu sors et quand tu entres,
  - type: text
    content: Et quand tu es furieux contre moi.
  '28':
  - type: text
    content: Parce que tu es furieux contre moi,
  - type: text
    content: Et que ton arrogance est montée à mes oreilles,
  - type: text
    content: Je mettrai ma boucle à tes narines et mon mors entre tes lèvres,
  - type: text
    content: Et je te ferai retourner par le chemin par lequel tu es venu.
  '29':
  - type: text
    content: 'Que ceci soit un signe pour toi: On a mangé une année le produit du grain tombé, et une seconde année ce qui croît de soi-même; mais la troisième année, vous sèmerez, vous moissonnerez, vous planterez des vignes, et vous en mangerez le fruit. '
  '3':
  - type: text
    content: 'Et ils lui dirent: Ainsi parle Ézéchias: Ce jour est un jour d’angoisse, de châtiment et d’opprobre; car les enfants sont près de sortir du sein maternel, et il n’y a point de force pour l’enfantement. '
  '30':
  - type: text
    content: 'Ce qui aura été sauvé de la maison de Juda, ce qui sera resté poussera encore des racines par-dessous, et portera du fruit par-dessus. '
  '31':
  - type: text
    content: 'Car de Jérusalem il sortira un reste, et de la montagne de Sion des réchappés. Voilà ce que fera le zèle de l’Éternel des armées. '
  '32':
  - type: text
    content: 'C’est pourquoi ainsi parle l’Éternel sur le roi d’Assyrie:'
  - type: text
    content: Il n’entrera point dans cette ville,
  - type: text
    content: Il n’y lancera point de traits,
  - type: text
    content: Il ne lui présentera point de boucliers,
  - type: text
    content: Et il n’élèvera point de retranchements contre elle.
  '33':
  - type: text
    content: Il s’en retournera par le chemin par lequel il est venu,
  - type: text
    content: Et il n’entrera point dans cette ville, dit l’Éternel.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 2 R 20:6.
  - type: text
    content: Je protégerai cette ville pour la sauver,
  - type: text
    content: A cause de moi, et à cause de David, mon serviteur.
  '35':
  - type: text
    content: ' '
  - type: note
    content: És 37:36.
  - type: text
    content: 'Cette nuit-là, l’ange de l’Éternel sortit, et frappa dans le camp des Assyriens cent quatre-vingt-cinq mille hommes. Et quand on se leva le matin, voici, c’étaient tous des corps morts. '
  '36':
  - type: text
    content: 'Alors Sanchérib, roi d’Assyrie, leva son camp, partit et s’en retourna; et il resta à Ninive. '
  '37':
  - type: text
    content: 'Or, comme il était prosterné dans la maison de Nisroc, son dieu, '
  - type: note
    content: 2 Ch 32:21. És 37:38.
  - type: text
    content: Adrammélec et Scharetser, ses fils, le frappèrent avec l’épée, et s’enfuirent au pays d’Ararat. Et Ésar-Haddon, son fils, régna à sa place.
  '4':
  - type: text
    content: 'Peut-être l’Éternel, ton Dieu, a-t-il entendu toutes les paroles de Rabschaké, que le roi d’Assyrie, son maître, a envoyé pour insulter au Dieu vivant, et peut-être l’Éternel, ton Dieu, exercera-t-il ses châtiments à cause des paroles qu’il a entendues. Fais donc monter une prière pour le reste qui subsiste encore. '
  '5':
  - type: text
    content: 'Les serviteurs du roi Ézéchias allèrent donc auprès d’Ésaïe. '
  '6':
  - type: text
    content: 'Et Ésaïe leur dit: Voici ce que vous direz à votre maître: Ainsi parle l’Éternel: Ne t’effraie point des paroles que tu as entendues et par lesquelles m’ont outragé les serviteurs du roi d’Assyrie. '
  '7':
  - type: text
    content: 'Je vais mettre en lui un esprit tel que, sur une nouvelle qu’il recevra, il retournera dans son pays; et je le ferai tomber par l’épée dans son pays. '
  '8':
  - type: text
    content: 'Rabschaké, s’étant retiré, trouva le roi d’Assyrie qui attaquait Libna, car il avait appris son départ de Lakis. '
  '9':
  - type: text
    content: 'Alors le roi d’Assyrie reçut une nouvelle au sujet de Tirhaka, roi d’Éthiopie; on lui dit: Voici, il s’est mis en marche pour te faire la guerre. Et le roi d’Assyrie envoya de nouveau des messagers à Ézéchias, en disant: '
