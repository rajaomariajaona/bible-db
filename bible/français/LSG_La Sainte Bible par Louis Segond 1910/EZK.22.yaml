document_id: EZK.22,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les crimes de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-16: cf. 2 Ch 36:14-17. (És 59:1-8. Jé 5:7-9, 26-31; 9:2-9.) Ga 6:7.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Au milieu de toi, on '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'découvre la nudité du père; au milieu de toi, on fait violence à la femme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 18:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pendant son impureté. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Au milieu de toi, chacun se livre à des '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'abominations avec la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 5:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'femme de son prochain, chacun se souille par l’inceste avec sa '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'belle-fille, chacun déshonore sa sœur, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'fille de son père. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Chez toi, l’on reçoit des présents pour répandre le sang: tu exiges un intérêt et une usure, tu dépouilles ton prochain par la violence, et moi, tu m’oublies, dit le Seigneur, l’Éternel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Voici, je '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 21:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'frappe des mains à cause de la cupidité que tu as eue, et du sang qui a été répandu au milieu de toi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ton cœur sera-t-il ferme, tes mains auront-elles de la force dans les jours où j’agirai contre toi? Moi, l’Éternel, j’ai parlé, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 17:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'j’agirai. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Je te '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 12:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'disperserai parmi les nations, je te répandrai en divers pays, et je ferai disparaître ton impureté du milieu de toi. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tu seras souillée par toi-même aux yeux des nations, et tu sauras que je suis l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-22: cf. Éz 24:1-14. Jé 6:28-30.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fils de l’homme, la maison d’Israël est devenue pour moi comme des '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'scories; ils sont tous de l’airain, de l’étain, du fer, du plomb, dans le creuset; ce sont des scories d’argent. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel: Parce que vous êtes tous devenus comme des scories, voici, je vous rassemblerai au milieu de Jérusalem. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Et toi, fils de l’homme, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 20:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:36
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'jugeras-tu, jugeras-tu la ville sanguinaire? Fais-lui connaître toutes ses abominations! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Comme on rassemble l’argent, l’airain, le fer, le plomb et l’étain, dans le creuset, et qu’on souffle le feu pour les fondre, ainsi je vous rassemblerai dans ma colère et dans ma fureur, et je vous mettrai au creuset pour vous fondre. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Je vous rassemblerai, et je soufflerai contre vous avec le feu de ma fureur; et vous serez fondus au milieu de Jérusalem. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Comme l’argent fond dans le creuset, ainsi vous serez fondus au milieu d’elle. Et vous saurez que moi, l’Éternel, j’ai répandu ma fureur sur vous.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 23-31: cf. So 3:1-8. Mi 3.'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Fils de l’homme, dis à Jérusalem: Tu es une terre qui n’est pas purifiée, qui n’est pas arrosée de pluie au jour de la colère. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ses prophètes conspirent dans son sein; comme des lions rugissants qui déchirent leur proie, ils dévorent '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 23:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'les âmes, ils s’emparent des richesses et des choses précieuses, ils multiplient les veuves au milieu d’elle. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ses sacrificateurs violent ma loi et profanent mes sanctuaires, ils ne '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 10:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 44:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'distinguent pas ce qui est saint de ce qui est profane, ils ne font pas connaître la différence entre ce qui est impur et ce qui est pur, ils détournent les yeux de mes sabbats, et je suis profané au milieu d’eux. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ses '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 3:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: So 3:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'chefs sont dans son sein comme des loups qui déchirent leur proie; ils répandent le sang, perdent les âmes, pour assouvir leur cupidité. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Et ses prophètes ont pour eux des '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 13:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'enduits de plâtre, de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 21:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'vaines visions, des oracles menteurs; ils disent: Ainsi parle le Seigneur, l’Éternel! Et l’Éternel ne leur a point parlé. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Le peuple du pays se livre à la violence, commet des rapines, opprime le malheureux et l’indigent, foule l’étranger contre toute justice. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tu diras: Ainsi parle le Seigneur, l’Éternel: Ville qui répands le sang au milieu de toi, pour que ton jour arrive, et qui te fais des idoles pour te souiller! '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Je cherche parmi eux un homme qui élève un mur, qui se tienne à la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 106:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'brèche devant moi en faveur du pays, afin que je ne le détruise pas; mais je n’en trouve point. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Je répandrai sur eux ma fureur, je les consumerai par le feu de ma colère, je ferai retomber leurs œuvres sur leur '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 9:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:43
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: tête, dit le Seigneur, l’Éternel.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tu es coupable à cause du sang que tu as '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 21:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'répandu, et tu t’es '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 20:30
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'souillée par les idoles que tu as faites. Tu as ainsi avancé tes jours, et tu es parvenue au terme de tes années. C’est pourquoi je te rends un objet '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 5:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’opprobre pour les nations et de moquerie pour tous les pays. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ceux qui sont près et ceux qui sont au loin se moqueront de toi, qui es souillée de réputation et pleine de trouble. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Voici, au-dedans de toi, tous les princes d’Israël usent de leur force pour répandre le sang; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'au-dedans de toi, l’on méprise père et mère, on maltraite l’étranger, on opprime l’orphelin et la veuve. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tu dédaignes mes sanctuaires, tu profanes mes sabbats. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il y a chez toi des calomniateurs pour répandre le sang; chez toi, l’on mange sur les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 18:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'montagnes; on commet le crime dans ton sein. '
