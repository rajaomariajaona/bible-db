document_id: EZK.22,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les crimes de Jérusalem
  - type: heading
    content: 'V. 1-16: cf. 2 Ch 36:14-17. (És 59:1-8. Jé 5:7-9, 26-31; 9:2-9.) Ga 6:7.'
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '10':
  - type: text
    content: 'Au milieu de toi, on '
  - type: note
    content: Lé 18:18.
  - type: text
    content: 'découvre la nudité du père; au milieu de toi, on fait violence à la femme '
  - type: note
    content: Lé 18:19. Éz 18:6.
  - type: text
    content: 'pendant son impureté. '
  '11':
  - type: text
    content: 'Au milieu de toi, chacun se livre à des '
  - type: note
    content: Lé 18:20.
  - type: text
    content: 'abominations avec la '
  - type: note
    content: Jé 5:8.
  - type: text
    content: 'femme de son prochain, chacun se souille par l’inceste avec sa '
  - type: note
    content: Lé 18:15.
  - type: text
    content: 'belle-fille, chacun déshonore sa sœur, '
  - type: note
    content: Lé 18:9.
  - type: text
    content: 'fille de son père. '
  '12':
  - type: text
    content: 'Chez toi, l’on reçoit des présents pour répandre le sang: tu exiges un intérêt et une usure, tu dépouilles ton prochain par la violence, et moi, tu m’oublies, dit le Seigneur, l’Éternel. '
  '13':
  - type: text
    content: 'Voici, je '
  - type: note
    content: Éz 21:17.
  - type: text
    content: 'frappe des mains à cause de la cupidité que tu as eue, et du sang qui a été répandu au milieu de toi. '
  '14':
  - type: text
    content: 'Ton cœur sera-t-il ferme, tes mains auront-elles de la force dans les jours où j’agirai contre toi? Moi, l’Éternel, j’ai parlé, et '
  - type: note
    content: Éz 17:24.
  - type: text
    content: 'j’agirai. '
  '15':
  - type: text
    content: 'Je te '
  - type: note
    content: Éz 12:14, 15.
  - type: text
    content: 'disperserai parmi les nations, je te répandrai en divers pays, et je ferai disparaître ton impureté du milieu de toi. '
  '16':
  - type: text
    content: Tu seras souillée par toi-même aux yeux des nations, et tu sauras que je suis l’Éternel.
  - type: heading
    content: 'V. 17-22: cf. Éz 24:1-14. Jé 6:28-30.'
  '17':
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '18':
  - type: text
    content: 'Fils de l’homme, la maison d’Israël est devenue pour moi comme des '
  - type: note
    content: És 1:22.
  - type: text
    content: 'scories; ils sont tous de l’airain, de l’étain, du fer, du plomb, dans le creuset; ce sont des scories d’argent. '
  '19':
  - type: text
    content: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel: Parce que vous êtes tous devenus comme des scories, voici, je vous rassemblerai au milieu de Jérusalem. '
  '2':
  - type: text
    content: 'Et toi, fils de l’homme, '
  - type: note
    content: Éz 20:4; 23:36.
  - type: text
    content: 'jugeras-tu, jugeras-tu la ville sanguinaire? Fais-lui connaître toutes ses abominations! '
  '20':
  - type: text
    content: 'Comme on rassemble l’argent, l’airain, le fer, le plomb et l’étain, dans le creuset, et qu’on souffle le feu pour les fondre, ainsi je vous rassemblerai dans ma colère et dans ma fureur, et je vous mettrai au creuset pour vous fondre. '
  '21':
  - type: text
    content: 'Je vous rassemblerai, et je soufflerai contre vous avec le feu de ma fureur; et vous serez fondus au milieu de Jérusalem. '
  '22':
  - type: text
    content: Comme l’argent fond dans le creuset, ainsi vous serez fondus au milieu d’elle. Et vous saurez que moi, l’Éternel, j’ai répandu ma fureur sur vous.
  - type: heading
    content: 'V. 23-31: cf. So 3:1-8. Mi 3.'
  '23':
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '24':
  - type: text
    content: 'Fils de l’homme, dis à Jérusalem: Tu es une terre qui n’est pas purifiée, qui n’est pas arrosée de pluie au jour de la colère. '
  '25':
  - type: text
    content: 'Ses prophètes conspirent dans son sein; comme des lions rugissants qui déchirent leur proie, ils dévorent '
  - type: note
    content: Mt 23:14.
  - type: text
    content: 'les âmes, ils s’emparent des richesses et des choses précieuses, ils multiplient les veuves au milieu d’elle. '
  '26':
  - type: text
    content: 'Ses sacrificateurs violent ma loi et profanent mes sanctuaires, ils ne '
  - type: note
    content: Lé 10:10. Éz 44:23.
  - type: text
    content: 'distinguent pas ce qui est saint de ce qui est profane, ils ne font pas connaître la différence entre ce qui est impur et ce qui est pur, ils détournent les yeux de mes sabbats, et je suis profané au milieu d’eux. '
  '27':
  - type: text
    content: 'Ses '
  - type: note
    content: Mi 3:12. So 3:3.
  - type: text
    content: 'chefs sont dans son sein comme des loups qui déchirent leur proie; ils répandent le sang, perdent les âmes, pour assouvir leur cupidité. '
  '28':
  - type: text
    content: 'Et ses prophètes ont pour eux des '
  - type: note
    content: Éz 13:10; 21:29.
  - type: text
    content: 'enduits de plâtre, de '
  - type: note
    content: Éz 21:34.
  - type: text
    content: 'vaines visions, des oracles menteurs; ils disent: Ainsi parle le Seigneur, l’Éternel! Et l’Éternel ne leur a point parlé. '
  '29':
  - type: text
    content: 'Le peuple du pays se livre à la violence, commet des rapines, opprime le malheureux et l’indigent, foule l’étranger contre toute justice. '
  '3':
  - type: text
    content: 'Tu diras: Ainsi parle le Seigneur, l’Éternel: Ville qui répands le sang au milieu de toi, pour que ton jour arrive, et qui te fais des idoles pour te souiller! '
  '30':
  - type: text
    content: 'Je cherche parmi eux un homme qui élève un mur, qui se tienne à la '
  - type: note
    content: Ps 106:23.
  - type: text
    content: 'brèche devant moi en faveur du pays, afin que je ne le détruise pas; mais je n’en trouve point. '
  '31':
  - type: text
    content: 'Je répandrai sur eux ma fureur, je les consumerai par le feu de ma colère, je ferai retomber leurs œuvres sur leur '
  - type: note
    content: Éz 9:10; 11:21; 16:43.
  - type: text
    content: tête, dit le Seigneur, l’Éternel.
  '4':
  - type: text
    content: 'Tu es coupable à cause du sang que tu as '
  - type: note
    content: 2 R 21:16.
  - type: text
    content: 'répandu, et tu t’es '
  - type: note
    content: Éz 20:30, 31.
  - type: text
    content: 'souillée par les idoles que tu as faites. Tu as ainsi avancé tes jours, et tu es parvenue au terme de tes années. C’est pourquoi je te rends un objet '
  - type: note
    content: Éz 5:14.
  - type: text
    content: 'd’opprobre pour les nations et de moquerie pour tous les pays. '
  '5':
  - type: text
    content: 'Ceux qui sont près et ceux qui sont au loin se moqueront de toi, qui es souillée de réputation et pleine de trouble. '
  '6':
  - type: text
    content: 'Voici, au-dedans de toi, tous les princes d’Israël usent de leur force pour répandre le sang; '
  '7':
  - type: text
    content: 'au-dedans de toi, l’on méprise père et mère, on maltraite l’étranger, on opprime l’orphelin et la veuve. '
  '8':
  - type: text
    content: 'Tu dédaignes mes sanctuaires, tu profanes mes sabbats. '
  '9':
  - type: text
    content: 'Il y a chez toi des calomniateurs pour répandre le sang; chez toi, l’on mange sur les '
  - type: note
    content: Éz 18:6, 11.
  - type: text
    content: 'montagnes; on commet le crime dans ton sein. '
