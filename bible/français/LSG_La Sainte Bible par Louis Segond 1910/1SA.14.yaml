document_id: 1SA.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jonathan à l’attaque d’un poste des Philistins
  - type: heading
    content: 'V. 1-23: cf. Jg 7. 2 Ch 14:8-13. Os 1:7. Ps 60:14.'
  - type: text
    content: 'Un jour, Jonathan, fils de Saül, dit au jeune homme qui portait ses armes: Viens, et poussons jusqu’au poste des Philistins qui est là de l’autre côté. Et il n’en dit rien à son père. '
  '10':
  - type: text
    content: 'Mais s’ils disent: Montez vers nous! Nous monterons, car l’Éternel les livre entre nos mains. C’est là ce qui nous servira de signe. '
  '11':
  - type: text
    content: 'Ils se montrèrent tous deux au poste des Philistins, et les Philistins dirent: Voici les Hébreux qui sortent des trous où ils se sont cachés. '
  '12':
  - type: text
    content: 'Et les hommes du poste s’adressèrent ainsi à Jonathan et à celui qui portait ses armes: Montez vers nous, et nous vous ferons savoir quelque chose. Jonathan dit à celui qui portait ses armes: Monte après moi, car l’Éternel les livre entre les mains d’Israël. '
  '13':
  - type: text
    content: 'Et Jonathan monta en s’aidant des mains et des pieds, et celui qui portait ses armes le suivit. Les Philistins tombèrent devant Jonathan, et celui qui portait ses armes donnait la mort derrière lui. '
  '14':
  - type: text
    content: 'Dans cette première défaite, Jonathan et celui qui portait ses armes tuèrent une vingtaine d’hommes, sur l’espace d’environ la moitié d’un arpent de terre. '
  '15':
  - type: text
    content: 'L’effroi se répandit au camp, dans la contrée et parmi tout le peuple; le poste et ceux qui ravageaient furent également saisis de peur; le pays fut dans l’épouvante. C’était comme une terreur de Dieu. '
  '16':
  - type: text
    content: 'Les sentinelles de Saül, qui étaient à Guibea de Benjamin, virent que la multitude se dispersait et allait de côté et d’autre. '
  '17':
  - type: text
    content: 'Alors Saül dit au peuple qui était avec lui: Comptez, je vous prie, et voyez qui s’en est allé du milieu de nous. Ils comptèrent, et voici, il manquait Jonathan et celui qui portait ses armes. '
  '18':
  - type: text
    content: 'Et Saül dit à Achija: Fais approcher l’arche de Dieu! Car en ce temps l’arche de Dieu était avec les enfants d’Israël. '
  '19':
  - type: text
    content: 'Pendant que Saül parlait au sacrificateur, le tumulte dans le camp des Philistins allait toujours croissant; et Saül dit au sacrificateur: Retire ta main! '
  '2':
  - type: text
    content: 'Saül se tenait à l’extrémité de Guibea, sous le grenadier de Migron, et '
  - type: note
    content: 1 S 13:15.
  - type: text
    content: 'le peuple qui était avec lui formait environ six cents hommes. '
  '20':
  - type: text
    content: 'Puis Saül et tout le peuple qui était avec lui se rassemblèrent, et ils s’avancèrent jusqu’au lieu du combat; et voici, les Philistins tournèrent l’épée les uns contre les autres, et la confusion était extrême. '
  '21':
  - type: text
    content: 'Il y avait parmi les Philistins, comme auparavant, des Hébreux qui étaient montés avec eux dans le camp, où ils se trouvaient disséminés, et ils se joignirent à ceux d’Israël qui étaient avec Saül et Jonathan. '
  '22':
  - type: text
    content: 'Tous les hommes d’Israël qui s’étaient cachés dans la montagne d’Éphraïm, apprenant que les Philistins fuyaient, se mirent aussi à les poursuivre dans la bataille. '
  '23':
  - type: text
    content: L’Éternel délivra Israël ce jour-là, et le combat se prolongea jusqu’au-delà de Beth-Aven.
  - type: heading
    content: Les Philistins battus. La vie de Jonathan en danger par suite d’un serment de Saül
  - type: heading
    content: 'V. 24-46: cf. Jg 11:30, etc.; 21. De 17:20. Pr 20:25; 16:10.'
  '24':
  - type: text
    content: 'La journée fut fatigante pour les hommes d’Israël. Saül avait fait jurer le peuple, en disant: Maudit soit l’homme qui prendra de la nourriture avant le soir, avant que je me sois vengé de mes ennemis! Et personne n’avait pris de nourriture. '
  '25':
  - type: text
    content: 'Tout le peuple était arrivé dans une forêt, où il y avait du miel à la surface du sol. '
  '26':
  - type: text
    content: 'Lorsque le peuple entra dans la forêt, il vit du miel qui coulait; mais nul ne porta la main à la bouche, car le peuple respectait le serment. '
  '27':
  - type: text
    content: 'Jonathan ignorait le serment que son père avait fait faire au peuple; il avança le bout du bâton qu’il avait à la main, le plongea dans un rayon de miel, et ramena la main à la bouche; et ses yeux furent éclaircis. '
  '28':
  - type: text
    content: 'Alors quelqu’un du peuple, lui adressant la parole, dit: Ton père a fait jurer le peuple, en disant: Maudit soit l’homme qui prendra de la nourriture aujourd’hui! Or le peuple était épuisé. '
  '29':
  - type: text
    content: 'Et Jonathan dit: Mon père trouble le peuple; voyez donc comme mes yeux se sont éclaircis, parce que j’ai goûté un peu de ce miel. '
  '3':
  - type: text
    content: 'Achija, fils d’Achithub, frère d’I-Kabod, fils de Phinées, fils d’Éli, sacrificateur de l’Éternel à Silo, portait l’éphod. Le peuple ne savait pas que Jonathan s’en fût allé. '
  '30':
  - type: text
    content: 'Certes, si le peuple avait aujourd’hui mangé du butin qu’il a trouvé chez ses ennemis, la défaite des Philistins n’aurait-elle pas été plus grande? '
  '31':
  - type: text
    content: 'Ils battirent ce jour-là les Philistins depuis Micmasch jusqu’à Ajalon. Le peuple était très fatigué, '
  '32':
  - type: text
    content: 'et il se jeta sur le butin. Il prit des brebis, des bœufs et des veaux, il les égorgea sur la terre, et il en mangea avec le sang. '
  '33':
  - type: text
    content: 'On le rapporta à Saül, et l’on dit: Voici, le peuple pèche contre l’Éternel, en mangeant avec le sang. Saül dit: Vous commettez une infidélité; roulez à l’instant vers moi une grande pierre. '
  '34':
  - type: text
    content: 'Puis il ajouta: Répandez-vous parmi le peuple, et dites à chacun de m’amener son bœuf ou sa brebis, et de l’égorger ici. Vous mangerez ensuite, et vous ne pécherez point contre l’Éternel, en mangeant avec le sang. Et pendant la nuit, chacun parmi le peuple amena son bœuf à la main, afin de l’égorger sur la pierre. '
  '35':
  - type: text
    content: 'Saül bâtit un autel à l’Éternel: ce fut le premier autel qu’il bâtit à l’Éternel. '
  '36':
  - type: text
    content: 'Saül dit: Descendons cette nuit après les Philistins, pillons-les jusqu’à la lumière du matin, et n’en laissons pas un de reste. Ils dirent: Fais tout ce qui te semblera bon. Alors le sacrificateur dit: Approchons-nous ici de Dieu. '
  '37':
  - type: text
    content: 'Et Saül consulta Dieu: Descendrai-je après les Philistins? Les livreras-tu entre les mains d’Israël? Mais en ce moment il ne lui donna point de réponse. '
  '38':
  - type: text
    content: 'Saül dit: Approchez ici, '
  - type: note
    content: Jg 20:2.
  - type: text
    content: 'vous tous chefs du peuple; recherchez et voyez comment ce péché a été commis aujourd’hui. '
  '39':
  - type: text
    content: 'Car l’Éternel, le libérateur d’Israël, est vivant! Lors même que Jonathan, mon fils, en serait l’auteur, il mourrait. Et dans tout le peuple personne ne lui répondit. '
  '4':
  - type: text
    content: 'Entre les passages par lesquels Jonathan cherchait à arriver au poste des Philistins, il y avait une dent de rocher d’un côté et une dent de rocher de l’autre côté, l’une portant le nom de Botsets et l’autre celui de Séné. '
  '40':
  - type: text
    content: 'Il dit à tout Israël: Mettez-vous d’un côté; et moi et Jonathan, mon fils, nous serons de l’autre. Et le peuple dit à Saül: Fais ce qui te semblera bon. '
  '41':
  - type: text
    content: 'Saül dit à l’Éternel: Dieu d’Israël! Fais connaître la vérité. Jonathan et Saül furent désignés, et le peuple fut libéré. '
  '42':
  - type: text
    content: 'Saül dit: Jetez le sort entre moi et Jonathan, mon fils. Et Jonathan fut désigné. '
  '43':
  - type: text
    content: 'Saül dit à Jonathan: Déclare-moi ce que tu as fait. Jonathan le lui déclara, et dit: J’ai goûté un peu de miel, avec le bout du bâton que j’avais à la main: me voici, je mourrai. '
  '44':
  - type: text
    content: 'Et Saül dit: Que Dieu me traite dans toute sa rigueur, si tu ne meurs pas, Jonathan! '
  '45':
  - type: text
    content: 'Le peuple dit à Saül: Quoi! Jonathan mourrait, lui qui a opéré cette grande délivrance en Israël! Loin de là! L’Éternel est vivant! Il ne tombera pas à terre un cheveu de sa tête, car c’est avec Dieu qu’il a agi dans cette journée. Ainsi le peuple sauva Jonathan, et il ne mourut point. '
  '46':
  - type: text
    content: Saül cessa de poursuivre les Philistins, et les Philistins s’en allèrent chez eux.
  - type: heading
    content: 'V. 47-52: cf. 2 S 8. De 20:1, 4.'
  '47':
  - type: text
    content: 'Après que Saül eut pris possession de la royauté sur Israël, il fit de tous côtés la guerre à tous ses ennemis, à Moab, aux enfants d’Ammon, à Édom, aux rois de Tsoba, et aux Philistins; et partout où il se tournait, il était vainqueur. '
  '48':
  - type: text
    content: 'Il manifesta sa force, battit Amalek, et délivra Israël de la main de ceux qui le pillaient. '
  '49':
  - type: text
    content: 'Les fils de Saül étaient Jonathan, Jischvi et Malkischua. Ses deux filles s’appelaient: l’aînée Mérab, et la plus jeune Mical. '
  '5':
  - type: text
    content: 'L’une de ces dents est au nord vis-à-vis de Micmasch, et l’autre au midi vis-à-vis de Guéba. '
  '50':
  - type: text
    content: 'Le nom de la femme de Saül était Achinoam, fille d’Achimaats. Le nom du chef de son armée était Abner, fils de Ner, oncle de Saül. '
  '51':
  - type: text
    content: 'Kis, père de Saül, et Ner, père d’Abner, étaient fils d’Abiel. '
  '52':
  - type: text
    content: Pendant toute la vie de Saül, il y eut une guerre acharnée contre les Philistins; et dès que Saül apercevait quelque homme fort et vaillant, il le prenait à son service.
  '6':
  - type: text
    content: 'Jonathan dit au jeune homme qui portait ses armes: Viens, et poussons jusqu’au poste de ces incirconcis. Peut-être l’Éternel agira-t-il pour nous, car rien n’empêche l’Éternel de sauver au moyen d’un petit nombre comme d’un grand nombre. '
  '7':
  - type: text
    content: 'Celui qui portait ses armes lui répondit: Fais tout ce que tu as dans le cœur, n’écoute que ton sentiment, me voici avec toi prêt à te suivre. '
  '8':
  - type: text
    content: 'Eh bien! Dit Jonathan, allons à ces gens et montrons-nous à eux. '
  '9':
  - type: text
    content: 'S’ils nous disent: Arrêtez, jusqu’à ce que nous venions à vous! Nous resterons en place, et nous ne monterons point vers eux. '
