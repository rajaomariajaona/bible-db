document_id: 1SA.15,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guerre avec les Amalécites
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. (Ex 17:8-16. De 25:17-19.) Ps 94:1-3. Jé 48:10.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel dit à Saül: C’est moi que l’Éternel a envoyé pour t’oindre roi sur son peuple, sur Israël: écoute donc ce que dit l’Éternel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel adressa la parole à Samuel, et lui dit: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je me repens d’avoir établi Saül pour roi, car il se détourne de moi et il n’observe point mes paroles. Samuel fut irrité, et il cria à l’Éternel toute la nuit. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il se leva de bon matin, pour aller au-devant de Saül. Et on vint lui dire: Saül est allé à Carmel, et voici, il s’est érigé un monument; puis il s’en est retourné, et, passant plus loin, il est descendu à Guilgal. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel se rendit auprès de Saül, et Saül lui dit: Sois béni de l’Éternel! J’ai observé la parole de l’Éternel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel dit: Qu’est-ce donc que ce bêlement de brebis qui parvient à mes oreilles, et ce mugissement de bœufs que j’entends? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül répondit: Ils les ont amenés de chez les Amalécites, parce que le peuple a épargné les meilleures brebis et les meilleurs bœufs, afin de les sacrifier à l’Éternel, ton Dieu; et le reste, nous l’avons dévoué par interdit. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel dit à Saül: Arrête, et je te déclarerai ce que l’Éternel m’a dit cette nuit. Et Saül lui dit: Parle! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel dit: Lorsque tu étais petit à tes yeux, n’es-tu pas devenu le chef des tribus d’Israël, et l’Éternel ne t’a-t-il pas oint pour que tu sois roi sur Israël? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel t’avait fait partir, en disant: Va, et dévoue par interdit ces pécheurs, les Amalécites; tu leur feras la guerre jusqu’à ce que tu les aies exterminés. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pourquoi n’as-tu pas écouté la voix de l’Éternel? Pourquoi t’es-tu jeté sur le butin, et as-tu fait ce qui est mal aux yeux de l’Éternel? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi parle l’Éternel des armées: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 17:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 25:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je me souviens de ce qu’Amalek fit à Israël, lorsqu’il lui ferma le chemin à sa sortie d’Égypte. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül répondit à Samuel: J’ai bien écouté la voix de l’Éternel, et j’ai suivi le chemin par lequel m’envoyait l’Éternel. J’ai amené Agag, roi d’Amalek, et j’ai dévoué par interdit les Amalécites; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais le peuple a pris sur le butin des brebis et des bœufs, comme prémices de ce qui devait être dévoué, afin de les sacrifier à l’Éternel, ton Dieu, à Guilgal. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel dit: L’Éternel trouve-t-il du plaisir dans les holocaustes et les sacrifices, comme dans '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 4:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 6:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 9:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'l’obéissance à la voix de l’Éternel? Voici, l’obéissance vaut mieux que les sacrifices, et l’observation de sa parole vaut mieux que la graisse des béliers. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car la désobéissance est aussi coupable que la divination, et la résistance ne l’est pas moins que l’idolâtrie et les théraphim. Puisque tu as rejeté la parole de l’Éternel, il te rejette aussi comme roi. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Saül dit à Samuel: J’ai péché, car j’ai transgressé l’ordre de l’Éternel, et je n’ai pas obéi à tes paroles; je craignais le peuple, et j’ai écouté sa voix. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, je te prie, pardonne mon péché, reviens avec moi, et je me prosternerai devant l’Éternel. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel dit à Saül: Je ne retournerai point avec toi; car tu as rejeté la parole de l’Éternel, et l’Éternel te rejette, afin que tu ne sois plus roi sur Israël. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et comme Samuel se tournait pour s’en aller, Saül le saisit par le pan de son manteau, qui se déchira. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel lui dit: L’Éternel déchire aujourd’hui de dessus toi la royauté d’Israël, et il la donne à un autre, qui est meilleur que toi. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui est la force d’Israël ne ment point et ne se repent point, car il n’est pas un homme pour se repentir. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Va maintenant, frappe Amalek, et dévouez par interdit tout ce qui lui appartient; tu ne l’épargneras point, et tu feras mourir hommes et femmes, enfants et nourrissons, bœufs et brebis, chameaux et ânes. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül dit encore: J’ai péché! Maintenant, je te prie, honore-moi en présence des anciens de mon peuple et en présence d’Israël; reviens avec moi, et je me prosternerai devant l’Éternel, ton Dieu. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel retourna et suivit Saül, et Saül se prosterna devant l’Éternel. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis Samuel dit: Amenez-moi Agag, roi d’Amalek. Et Agag s’avança vers lui d’un air joyeux; il disait: Certainement, l’amertume de la mort est passée. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel dit: De même que ton épée a privé des femmes de leurs enfants, ainsi ta mère entre les femmes sera privée d’un fils. Et Samuel mit Agag en pièces devant l’Éternel, à Guilgal. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel partit pour Rama, et Saül monta dans sa maison à Guibea de Saül. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samuel n’alla plus voir Saül jusqu’au jour de sa mort; car Samuel pleurait sur Saül, parce que l’Éternel se repentait d’avoir établi Saül roi d’Israël.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül convoqua le peuple, et en fit la revue à Thelaïm: il y avait deux cent mille hommes de pied, et dix mille hommes de Juda. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül marcha jusqu’à la ville d’Amalek, et mit une embuscade dans la vallée. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit aux '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 1:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Kéniens: Allez, retirez-vous, sortez du milieu d’Amalek, afin que je ne vous fasse pas périr avec lui; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 18:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 10:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car vous avez eu de la bonté pour tous les enfants d’Israël, lorsqu’ils montèrent d’Égypte. Et les Kéniens se retirèrent du milieu d’Amalek. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül battit Amalek depuis Havila jusqu’à Schur, qui est en face de l’Égypte. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il prit vivant '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 24:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Agag, roi d’Amalek, et il dévoua par interdit tout le peuple en le passant au fil de l’épée. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais Saül et le peuple épargnèrent Agag, et les meilleures brebis, les meilleurs bœufs, les meilleures bêtes de la seconde portée, les agneaux gras, et tout ce qu’il y avait de bon; ils ne voulurent pas le dévouer par interdit, et ils dévouèrent seulement tout ce qui était méprisable et chétif.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Désobéissance de Saül
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-35: cf. (Pr 21:3. 1 S 2:30.) Ps 73:27. És 28:20. Lu 14:34, 35.'
    marker-yv: yv-h
