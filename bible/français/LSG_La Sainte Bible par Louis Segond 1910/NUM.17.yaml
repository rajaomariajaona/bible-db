document_id: NUM.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La verge d’Aaron
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. (No 16:1-40; 18:1-7.) Hé 5:4. Ps 118:22, 23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Parle aux enfants d’Israël, et prends d’eux une verge selon les maisons de leurs pères, soit douze verges de la part de tous leurs princes selon les maisons de leurs pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu écriras le nom de chacun sur sa verge, et tu écriras le nom d’Aaron sur la verge de Lévi; car il y aura une verge pour chaque chef des maisons de leurs pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu les déposeras dans la tente d’assignation, devant le témoignage, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:22
      metadata:
        usfm: EXO.25.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'où je me rencontre avec vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L’homme que je choisirai sera celui dont la verge fleurira, et je ferai cesser de devant moi les murmures que profèrent contre vous les enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Moïse parla aux enfants d’Israël; et tous leurs princes lui donnèrent une verge, chaque prince une verge, selon les maisons de leurs pères, soit douze verges; la verge d’Aaron était au milieu des leurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moïse déposa les verges devant l’Éternel, dans la tente du témoignage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le lendemain, lorsque Moïse entra dans la tente du témoignage, voici, la verge d’Aaron, pour la maison de Lévi, avait fleuri, elle avait poussé des boutons, produit des fleurs, et mûri des amandes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moïse ôta de devant l’Éternel toutes les verges, et les porta à tous les enfants d’Israël, afin qu’ils les vissent et qu’ils prissent chacun leur verge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L’Éternel dit à Moïse: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:4
      metadata:
        usfm: HEB.9.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Reporte la verge d’Aaron devant le témoignage, pour être conservée comme un signe pour les enfants de rébellion, afin que tu fasses cesser de devant moi leurs murmures et qu’ils ne meurent point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Moïse fit ainsi; il se conforma à l’ordre que l’Éternel lui avait donné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les enfants d’Israël dirent à Moïse: Voici, nous expirons, nous périssons, nous périssons tous! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Quiconque s’approche du tabernacle de l’Éternel, meurt. Nous faudra-t-il tous expirer?
