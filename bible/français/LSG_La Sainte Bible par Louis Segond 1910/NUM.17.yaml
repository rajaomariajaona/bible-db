document_id: NUM.17,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La verge d’Aaron
  - type: heading
    content: 'V. 1-13: cf. (No 16:1-40; 18:1-7.) Hé 5:4. Ps 118:22, 23.'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: text
    content: 'L’Éternel dit à Moïse: '
  - type: note
    content: Hé 9:4.
  - type: text
    content: 'Reporte la verge d’Aaron devant le témoignage, pour être conservée comme un signe pour les enfants de rébellion, afin que tu fasses cesser de devant moi leurs murmures et qu’ils ne meurent point. '
  '11':
  - type: text
    content: 'Moïse fit ainsi; il se conforma à l’ordre que l’Éternel lui avait donné. '
  '12':
  - type: text
    content: 'Les enfants d’Israël dirent à Moïse: Voici, nous expirons, nous périssons, nous périssons tous! '
  '13':
  - type: text
    content: Quiconque s’approche du tabernacle de l’Éternel, meurt. Nous faudra-t-il tous expirer?
  '2':
  - type: text
    content: 'Parle aux enfants d’Israël, et prends d’eux une verge selon les maisons de leurs pères, soit douze verges de la part de tous leurs princes selon les maisons de leurs pères. '
  '3':
  - type: text
    content: 'Tu écriras le nom de chacun sur sa verge, et tu écriras le nom d’Aaron sur la verge de Lévi; car il y aura une verge pour chaque chef des maisons de leurs pères. '
  '4':
  - type: text
    content: 'Tu les déposeras dans la tente d’assignation, devant le témoignage, '
  - type: note
    content: Ex 25:22.
  - type: text
    content: 'où je me rencontre avec vous. '
  '5':
  - type: text
    content: 'L’homme que je choisirai sera celui dont la verge fleurira, et je ferai cesser de devant moi les murmures que profèrent contre vous les enfants d’Israël. '
  '6':
  - type: text
    content: 'Moïse parla aux enfants d’Israël; et tous leurs princes lui donnèrent une verge, chaque prince une verge, selon les maisons de leurs pères, soit douze verges; la verge d’Aaron était au milieu des leurs. '
  '7':
  - type: text
    content: 'Moïse déposa les verges devant l’Éternel, dans la tente du témoignage. '
  '8':
  - type: text
    content: 'Le lendemain, lorsque Moïse entra dans la tente du témoignage, voici, la verge d’Aaron, pour la maison de Lévi, avait fleuri, elle avait poussé des boutons, produit des fleurs, et mûri des amandes. '
  '9':
  - type: text
    content: 'Moïse ôta de devant l’Éternel toutes les verges, et les porta à tous les enfants d’Israël, afin qu’ils les vissent et qu’ils prissent chacun leur verge. '
