document_id: ZEC.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Vision du grand-prêtre Josué
  - type: heading
    content: 'V. 1-5: cf. Job 1:6-11. (És 64. Da 9:3-9.) És 44:22; 61:10.'
  - type: text
    content: 'Il me fit voir Josué, le souverain sacrificateur, debout devant l’ange de l’Éternel, et Satan qui se tenait à sa droite pour l’accuser. '
  '10':
  - type: text
    content: En ce jour-là, dit l’Éternel des armées, vous vous inviterez les uns les autres sous la vigne et sous le figuier.
  '2':
  - type: text
    content: 'L’Éternel dit à Satan: '
  - type: note
    content: Jud v. 9.
  - type: text
    content: 'Que l’Éternel te réprime, Satan! Que l’Éternel te réprime, lui qui a choisi Jérusalem! N’est-ce pas là un tison arraché du feu? '
  '3':
  - type: text
    content: 'Or Josué était couvert de vêtements sales, et il se tenait debout devant l’ange. '
  '4':
  - type: text
    content: 'L’ange, prenant la parole, dit à ceux qui étaient devant lui: Otez-lui les vêtements sales! Puis il dit à Josué: '
  - type: note
    content: Mi 7:18.
  - type: text
    content: 'Vois, je t’enlève ton iniquité, et je te revêts d’habits de fête. '
  '5':
  - type: text
    content: 'Je dis: Qu’on mette sur sa tête un turban pur! Et ils mirent un turban pur sur sa tête, et ils lui mirent des vêtements. L’ange de l’Éternel était là.'
  - type: heading
    content: 'V. 6-10: cf. Éz 44:15-18. (Za 6:11-15. Jé 23:5, 6.) Hé 9:24-28.'
  '6':
  - type: text
    content: 'L’ange de l’Éternel fit à Josué cette déclaration: '
  '7':
  - type: text
    content: 'Ainsi parle l’Éternel des armées: Si tu marches dans mes voies et si tu observes mes ordres, tu jugeras ma maison et tu garderas mes parvis, et je te donnerai libre accès parmi ceux qui sont ici. '
  '8':
  - type: text
    content: 'Écoute donc, Josué, souverain sacrificateur, toi et tes compagnons qui sont assis devant toi! Car ce sont des hommes qui serviront de signes. Voici, je ferai venir mon serviteur, le '
  - type: note
    content: És 4:2; 11:1. Jé 23:5; 33:15. Za 6:12.
  - type: text
    content: 'germe. '
  '9':
  - type: text
    content: 'Car voici, pour ce qui est de la pierre que j’ai placée devant Josué, il y a sept yeux sur cette seule pierre; voici, je graverai moi-même ce qui doit y être gravé, dit l’Éternel des armées; et j’enlèverai l’iniquité de ce pays, en un jour. '
