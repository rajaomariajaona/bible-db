document_id: 1SA.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Cantique d’Anne. Samuel au service de l’Éternel
  - type: heading
    content: 'V. 1-11: cf. Lu 1:46-55.'
  - type: text
    content: 'Anne pria, et dit:'
  - type: note
    content: Lu 1:46.
  - type: text
    content: Mon cœur se réjouit en l’Éternel,
  - type: text
    content: Ma force a été relevée par l’Éternel;
  - type: text
    content: Ma bouche s’est ouverte contre mes ennemis,
  - type: text
    content: Car je me réjouis de ton secours.
  '10':
  - type: text
    content: Les ennemis de l’Éternel trembleront;
  - type: note
    content: 1 S 7:10.
  - type: text
    content: Du haut des cieux il lancera sur eux son tonnerre;
  - type: text
    content: L’Éternel jugera les extrémités de la terre.
  - type: note
    content: Ps 2:6; 89:25.
  - type: text
    content: Il donnera la puissance à son roi,
  - type: text
    content: Et il relèvera la force de son oint.
  '11':
  - type: text
    content: Elkana s’en alla dans sa maison à Rama, et l’enfant fut au service de l’Éternel devant le sacrificateur Éli.
  - type: heading
    content: Conduite coupable des fils d’Éli, et faiblesse de leur père
  - type: heading
    content: 'V. 12-17: cf. (Os 4:6-10. Mal 2:1-9.) Jé 7:3-11.'
  '12':
  - type: text
    content: 'Les fils d’Éli étaient des hommes pervers, ils ne connaissaient point l’Éternel. '
  '13':
  - type: text
    content: 'Et voici quelle était la manière d’agir de ces sacrificateurs à l’égard du peuple. Lorsque quelqu’un offrait un sacrifice, le serviteur du sacrificateur arrivait au moment où l’on faisait cuire la chair. Tenant à la main une fourchette à trois dents, '
  '14':
  - type: text
    content: 'il piquait dans la chaudière, dans le chaudron, dans la marmite, ou dans le pot; et tout ce que la fourchette amenait, le sacrificateur le prenait pour lui. C’est ainsi qu’ils agissaient à l’égard de tous ceux d’Israël qui venaient là à Silo. '
  '15':
  - type: text
    content: 'Même avant qu’on fît brûler la graisse, le serviteur du sacrificateur arrivait et disait à celui qui offrait le sacrifice: Donne pour le sacrificateur de la chair à rôtir; il ne recevra de toi point de chair cuite, c’est de la chair crue qu’il veut. '
  '16':
  - type: text
    content: 'Et si l’homme lui disait: Quand on aura brûlé la graisse, tu prendras ce qui te plaira, le serviteur répondait: Non! Tu donneras maintenant, sinon je prends de force. '
  '17':
  - type: text
    content: Ces jeunes gens se rendaient coupables devant l’Éternel d’un très grand péché, parce qu’ils méprisaient les offrandes de l’Éternel.
  - type: heading
    content: 'V. 18-21: cf. 1 S 1:20-28. Ps 128.'
  '18':
  - type: text
    content: 'Samuel faisait le service devant l’Éternel, et cet enfant était revêtu d’un éphod de lin. '
  '19':
  - type: text
    content: 'Sa mère lui faisait chaque année une petite robe, et la lui apportait en montant avec son mari pour offrir le sacrifice annuel. '
  '2':
  - type: text
    content: Nul n’est saint comme l’Éternel;
  - type: note
    content: De 3:24. Ps 86:8.
  - type: text
    content: Il n’y a point d’autre Dieu que toi;
  - type: text
    content: Il n’y a point de rocher comme notre Dieu.
  '20':
  - type: text
    content: 'Éli bénit Elkana et sa femme, en disant: Que l’Éternel te fasse avoir des enfants de cette femme, pour remplacer celui qu’elle a prêté à l’Éternel! Et ils s’en retournèrent chez eux. '
  '21':
  - type: text
    content: Lorsque l’Éternel eut visité Anne, elle devint enceinte, et elle enfanta trois fils et deux filles. Et le jeune Samuel grandissait auprès de l’Éternel.
  - type: heading
    content: 'V. 22-26: cf. De 21:18-21. Pr 15:10.'
  '22':
  - type: text
    content: 'Éli était fort âgé et il apprit comment ses fils agissaient à l’égard de tout Israël; il apprit aussi qu’ils couchaient avec les femmes qui s’assemblaient à l’entrée de la tente d’assignation. '
  '23':
  - type: text
    content: 'Il leur dit: Pourquoi faites-vous de telles choses? Car j’apprends de tout le peuple vos mauvaises actions. '
  '24':
  - type: text
    content: 'Non, mes enfants, ce que j’entends dire n’est pas bon; vous faites pécher le peuple de l’Éternel. '
  '25':
  - type: text
    content: 'Si un homme pèche contre un autre homme, Dieu le jugera; mais s’il pèche contre l’Éternel, qui intercédera pour lui? Et ils n’écoutèrent point la voix de leur père, car l’Éternel voulait les faire mourir. '
  '26':
  - type: note
    content: Lu 2:52.
  - type: text
    content: Le jeune Samuel continuait à grandir, et il était agréable à l’Éternel et aux hommes.
  - type: heading
    content: Sentence de l’Éternel contre la maison d’Éli
  - type: heading
    content: 'V. 27-36: cf. 1 S 3:11-14. (1 S 4:11-18; 22:16-21. 1 R 2:26, 27, 35. Éz 44:15, 16.) Os 8:7.'
  '27':
  - type: text
    content: 'Un homme de Dieu vint auprès d’Éli, et lui dit: Ainsi parle l’Éternel: Ne me suis-je pas révélé à la maison de ton père, '
  - type: note
    content: Ac 7:25, etc.
  - type: text
    content: 'lorsqu’ils étaient en Égypte dans la maison de Pharaon? '
  '28':
  - type: text
    content: 'Je l’ai choisie parmi toutes les tribus d’Israël pour être à mon service dans le sacerdoce, pour monter à mon autel, pour brûler le parfum, pour porter l’éphod devant moi, et '
  - type: note
    content: Lé 10:14.
  - type: text
    content: 'j’ai donné à la maison de ton père tous les sacrifices consumés par le feu et offerts par les enfants d’Israël. '
  '29':
  - type: text
    content: 'Pourquoi '
  - type: note
    content: De 32:15.
  - type: text
    content: 'foulez-vous aux pieds mes sacrifices et mes offrandes, que j’ai ordonné de faire dans ma demeure? Et d’où vient que tu honores tes fils plus que moi, afin de vous engraisser des prémices de toutes les offrandes d’Israël, mon peuple? '
  '3':
  - type: text
    content: Ne parlez plus avec tant de hauteur;
  - type: text
    content: Que l’arrogance ne sorte plus de votre bouche;
  - type: text
    content: Car l’Éternel est un Dieu qui sait tout,
  - type: text
    content: Et par lui sont pesées toutes les actions.
  '30':
  - type: text
    content: 'C’est pourquoi voici ce que dit l’Éternel, le Dieu d’Israël: J’avais déclaré que '
  - type: note
    content: Ex 28:43; 29:9.
  - type: text
    content: 'ta maison et la maison de ton père marcheraient devant moi à perpétuité. Et maintenant, dit l’Éternel, loin de moi! Car j’honorerai celui qui m’honore, mais ceux qui me méprisent seront méprisés. '
  '31':
  - type: text
    content: 'Voici, le temps arrive où je retrancherai ton bras et le bras de la maison de ton père, en sorte qu’il n’y aura plus de vieillard dans ta maison. '
  '32':
  - type: text
    content: 'Tu verras un adversaire dans ma demeure, tandis qu’Israël sera comblé de biens par l’Éternel; et il n’y aura plus jamais de vieillard dans ta maison. '
  '33':
  - type: text
    content: 'Je laisserai subsister auprès de mon autel l’un des tiens, afin de consumer tes yeux et d’attrister ton âme; mais tous ceux de ta maison mourront dans la force de l’âge. '
  '34':
  - type: text
    content: 'Et tu auras pour signe ce qui arrivera à tes deux fils, Hophni et Phinées; ils mourront tous les deux le même jour. '
  '35':
  - type: text
    content: 'Je m’établirai un sacrificateur fidèle, qui agira selon mon cœur et selon mon âme; je lui bâtirai une maison stable, et il marchera toujours devant mon oint. '
  '36':
  - type: text
    content: 'Et quiconque restera de ta maison viendra se prosterner devant lui pour avoir une pièce d’argent et un morceau de pain, et dira: Attache-moi, je te prie, à l’une des fonctions du sacerdoce, afin que j’aie un morceau de pain à manger.'
  '4':
  - type: text
    content: L’arc des puissants est brisé,
  - type: text
    content: Et les faibles ont la force pour ceinture.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ps 34:11. La 5:6. Lu 1:53.
  - type: text
    content: Ceux qui étaient rassasiés se louent pour du pain,
  - type: text
    content: Et ceux qui étaient affamés se reposent;
  - type: text
    content: Même la stérile enfante sept fois,
  - type: text
    content: Et celle qui avait beaucoup d’enfants est flétrie.
  '6':
  - type: text
    content: ' '
  - type: note
    content: De 32:39. Éz 37:11, 12, etc.
  - type: text
    content: L’Éternel fait mourir et il fait vivre.
  - type: text
    content: Il fait descendre au séjour des morts et il en fait remonter.
  '7':
  - type: text
    content: L’Éternel appauvrit et il enrichit,
  - type: text
    content: Il abaisse et il élève.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Job 36:15. Ps 113:7, 8. Lu 1:52.
  - type: text
    content: De la poussière il retire le pauvre,
  - type: text
    content: Du fumier il relève l’indigent,
  - type: text
    content: Pour les faire asseoir avec les grands.
  - type: text
    content: Et il leur donne en partage un trône de gloire;
  - type: note
    content: Ps 24:2; 102:26; 104:5.
  - type: text
    content: Car à l’Éternel sont les colonnes de la terre,
  - type: text
    content: Et c’est sur elles qu’il a posé le monde.
  '9':
  - type: text
    content: Il gardera les pas de ses bien-aimés.
  - type: text
    content: Mais les méchants seront anéantis dans les ténèbres;
  - type: text
    content: Car l’homme ne triomphera point par la force.
