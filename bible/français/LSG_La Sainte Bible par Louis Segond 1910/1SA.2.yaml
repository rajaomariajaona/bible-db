document_id: 1SA.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Cantique d’Anne. Samuel au service de l’Éternel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. Lu 1:46-55.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Anne pria, et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:46
      metadata:
        usfm: LUK.1.46
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mon cœur se réjouit en l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma force a été relevée par l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma bouche s’est ouverte contre mes ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je me réjouis de ton secours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nul n’est saint comme l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 3:24
      metadata:
        usfm: DEU.3.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 86:8
      metadata:
        usfm: PSA.86.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il n’y a point d’autre Dieu que toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y a point de rocher comme notre Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ne parlez plus avec tant de hauteur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l’arrogance ne sorte plus de votre bouche;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Éternel est un Dieu qui sait tout,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et par lui sont pesées toutes les actions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: L’arc des puissants est brisé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les faibles ont la force pour ceinture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 34:11
      metadata:
        usfm: PSA.34.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 5:6
      metadata:
        usfm: LAM.5.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:53
      metadata:
        usfm: LUK.1.53
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ceux qui étaient rassasiés se louent pour du pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ceux qui étaient affamés se reposent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même la stérile enfante sept fois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celle qui avait beaucoup d’enfants est flétrie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:39
      metadata:
        usfm: DEU.32.39
    - type: text
      text: . Éz 37:11, 12, etc.
    marker-yv: yv-n
  - type: text
    text: L’Éternel fait mourir et il fait vivre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fait descendre au séjour des morts et il en fait remonter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L’Éternel appauvrit et il enrichit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il abaisse et il élève.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 36:15
      metadata:
        usfm: JOB.36.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 113:7
      metadata:
        usfm: PSA.113.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: PSA.113.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:52
      metadata:
        usfm: LUK.1.52
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: De la poussière il retire le pauvre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du fumier il relève l’indigent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour les faire asseoir avec les grands.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il leur donne en partage un trône de gloire;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 24:2
      metadata:
        usfm: PSA.24.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 102:26
      metadata:
        usfm: PSA.102.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 104:5
      metadata:
        usfm: PSA.104.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car à l’Éternel sont les colonnes de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et c’est sur elles qu’il a posé le monde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il gardera les pas de ses bien-aimés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais les méchants seront anéantis dans les ténèbres;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’homme ne triomphera point par la force.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les ennemis de l’Éternel trembleront;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 7:10
      metadata:
        usfm: 1SA.7.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Du haut des cieux il lancera sur eux son tonnerre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel jugera les extrémités de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 2:6
      metadata:
        usfm: PSA.2.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 89:25
      metadata:
        usfm: PSA.89.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il donnera la puissance à son roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il relèvera la force de son oint.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Elkana s’en alla dans sa maison à Rama, et l’enfant fut au service de l’Éternel devant le sacrificateur Éli.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conduite coupable des fils d’Éli, et faiblesse de leur père
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-17: cf. (Os 4:6-10. Mal 2:1-9.) Jé 7:3-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les fils d’Éli étaient des hommes pervers, ils ne connaissaient point l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et voici quelle était la manière d’agir de ces sacrificateurs à l’égard du peuple. Lorsque quelqu’un offrait un sacrifice, le serviteur du sacrificateur arrivait au moment où l’on faisait cuire la chair. Tenant à la main une fourchette à trois dents, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'il piquait dans la chaudière, dans le chaudron, dans la marmite, ou dans le pot; et tout ce que la fourchette amenait, le sacrificateur le prenait pour lui. C’est ainsi qu’ils agissaient à l’égard de tous ceux d’Israël qui venaient là à Silo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Même avant qu’on fît brûler la graisse, le serviteur du sacrificateur arrivait et disait à celui qui offrait le sacrifice: Donne pour le sacrificateur de la chair à rôtir; il ne recevra de toi point de chair cuite, c’est de la chair crue qu’il veut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et si l’homme lui disait: Quand on aura brûlé la graisse, tu prendras ce qui te plaira, le serviteur répondait: Non! Tu donneras maintenant, sinon je prends de force. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ces jeunes gens se rendaient coupables devant l’Éternel d’un très grand péché, parce qu’ils méprisaient les offrandes de l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-21: cf. 1 S 1:20-28. Ps 128.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Samuel faisait le service devant l’Éternel, et cet enfant était revêtu d’un éphod de lin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Sa mère lui faisait chaque année une petite robe, et la lui apportait en montant avec son mari pour offrir le sacrifice annuel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Éli bénit Elkana et sa femme, en disant: Que l’Éternel te fasse avoir des enfants de cette femme, pour remplacer celui qu’elle a prêté à l’Éternel! Et ils s’en retournèrent chez eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Lorsque l’Éternel eut visité Anne, elle devint enceinte, et elle enfanta trois fils et deux filles. Et le jeune Samuel grandissait auprès de l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-26: cf. De 21:18-21. Pr 15:10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Éli était fort âgé et il apprit comment ses fils agissaient à l’égard de tout Israël; il apprit aussi qu’ils couchaient avec les femmes qui s’assemblaient à l’entrée de la tente d’assignation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il leur dit: Pourquoi faites-vous de telles choses? Car j’apprends de tout le peuple vos mauvaises actions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Non, mes enfants, ce que j’entends dire n’est pas bon; vous faites pécher le peuple de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Si un homme pèche contre un autre homme, Dieu le jugera; mais s’il pèche contre l’Éternel, qui intercédera pour lui? Et ils n’écoutèrent point la voix de leur père, car l’Éternel voulait les faire mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 2:52
      metadata:
        usfm: LUK.2.52
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le jeune Samuel continuait à grandir, et il était agréable à l’Éternel et aux hommes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sentence de l’Éternel contre la maison d’Éli
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 27-36: cf. 1 S 3:11-14. (1 S 4:11-18; 22:16-21. 1 R 2:26, 27, 35. Éz 44:15, 16.) Os 8:7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Un homme de Dieu vint auprès d’Éli, et lui dit: Ainsi parle l’Éternel: Ne me suis-je pas révélé à la maison de ton père, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ac 7:25, etc.
    marker-yv: yv-n
  - type: text
    text: 'lorsqu’ils étaient en Égypte dans la maison de Pharaon? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Je l’ai choisie parmi toutes les tribus d’Israël pour être à mon service dans le sacerdoce, pour monter à mon autel, pour brûler le parfum, pour porter l’éphod devant moi, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 10:14
      metadata:
        usfm: LEV.10.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'j’ai donné à la maison de ton père tous les sacrifices consumés par le feu et offerts par les enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Pourquoi '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:15
      metadata:
        usfm: DEU.32.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'foulez-vous aux pieds mes sacrifices et mes offrandes, que j’ai ordonné de faire dans ma demeure? Et d’où vient que tu honores tes fils plus que moi, afin de vous engraisser des prémices de toutes les offrandes d’Israël, mon peuple? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'C’est pourquoi voici ce que dit l’Éternel, le Dieu d’Israël: J’avais déclaré que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 28:43
      metadata:
        usfm: EXO.28.43
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:9
      metadata:
        usfm: EXO.29.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ta maison et la maison de ton père marcheraient devant moi à perpétuité. Et maintenant, dit l’Éternel, loin de moi! Car j’honorerai celui qui m’honore, mais ceux qui me méprisent seront méprisés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Voici, le temps arrive où je retrancherai ton bras et le bras de la maison de ton père, en sorte qu’il n’y aura plus de vieillard dans ta maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tu verras un adversaire dans ma demeure, tandis qu’Israël sera comblé de biens par l’Éternel; et il n’y aura plus jamais de vieillard dans ta maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Je laisserai subsister auprès de mon autel l’un des tiens, afin de consumer tes yeux et d’attrister ton âme; mais tous ceux de ta maison mourront dans la force de l’âge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Et tu auras pour signe ce qui arrivera à tes deux fils, Hophni et Phinées; ils mourront tous les deux le même jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Je m’établirai un sacrificateur fidèle, qui agira selon mon cœur et selon mon âme; je lui bâtirai une maison stable, et il marchera toujours devant mon oint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Et quiconque restera de ta maison viendra se prosterner devant lui pour avoir une pièce d’argent et un morceau de pain, et dira: Attache-moi, je te prie, à l’une des fonctions du sacerdoce, afin que j’aie un morceau de pain à manger.'
