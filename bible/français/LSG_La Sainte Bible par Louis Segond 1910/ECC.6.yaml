document_id: ECC.6,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-12: cf. (Ec 2:21-26; 5:9-11.) Ps 39:7.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Il est un mal que j’ai vu sous le soleil, et qui est fréquent parmi les hommes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ce qui existe a déjà été appelé par son nom; et l’on sait que celui qui est homme ne peut contester avec un plus fort que lui. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'S’il y a beaucoup de choses, il y a beaucoup de vanités: quel avantage en revient-il à l’homme? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Car qui sait ce qui est bon pour l’homme dans la vie, pendant le nombre des jours de sa vie de vanité, qu’il passe '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 144:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 4:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme une ombre? Et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 8:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: qui peut dire à l’homme ce qui sera après lui sous le soleil?
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il y a tel homme à qui Dieu a donné des richesses, des biens, et de la gloire, et qui ne manque pour son âme de rien de ce qu’il désire, mais que Dieu ne laisse pas maître d’en jouir, car c’est un étranger qui en jouira. C’est là une vanité et un mal grave. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Quand un homme aurait cent fils, vivrait un grand nombre d’années, et que les jours de ses années se multiplieraient, si son âme ne s’est point rassasiée de bonheur, et si de plus il n’a point de sépulture, je dis qu’un avorton est plus heureux que lui. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Car il est venu en vain, il s’en va dans les ténèbres, et son nom reste couvert de ténèbres; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 3:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 58:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il n’a point vu, il n’a point connu le soleil; il a plus de repos que cet homme. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Et quand celui-ci vivrait deux fois mille ans, sans jouir du bonheur, tout ne va-t-il pas dans un même lieu? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tout le travail de l’homme est pour sa bouche, et cependant ses désirs ne sont jamais satisfaits. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Car quel avantage le sage a-t-il sur l’insensé? Quel avantage a le malheureux qui sait se conduire en présence des vivants? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ce que les yeux voient est préférable à l’agitation des désirs: c’est encore là une vanité et la poursuite du vent. '
