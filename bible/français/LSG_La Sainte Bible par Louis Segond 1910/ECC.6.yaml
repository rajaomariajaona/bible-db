document_id: ECC.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-12: cf. (Ec 2:21-26; 5:9-11.) Ps 39:7.'
  - type: text
    content: 'Il est un mal que j’ai vu sous le soleil, et qui est fréquent parmi les hommes. '
  '10':
  - type: text
    content: 'Ce qui existe a déjà été appelé par son nom; et l’on sait que celui qui est homme ne peut contester avec un plus fort que lui. '
  '11':
  - type: text
    content: 'S’il y a beaucoup de choses, il y a beaucoup de vanités: quel avantage en revient-il à l’homme? '
  '12':
  - type: text
    content: 'Car qui sait ce qui est bon pour l’homme dans la vie, pendant le nombre des jours de sa vie de vanité, qu’il passe '
  - type: note
    content: Ps 144:4. Ja 4:13, 14.
  - type: text
    content: 'comme une ombre? Et '
  - type: note
    content: Ec 8:7.
  - type: text
    content: qui peut dire à l’homme ce qui sera après lui sous le soleil?
  '2':
  - type: text
    content: 'Il y a tel homme à qui Dieu a donné des richesses, des biens, et de la gloire, et qui ne manque pour son âme de rien de ce qu’il désire, mais que Dieu ne laisse pas maître d’en jouir, car c’est un étranger qui en jouira. C’est là une vanité et un mal grave. '
  '3':
  - type: text
    content: 'Quand un homme aurait cent fils, vivrait un grand nombre d’années, et que les jours de ses années se multiplieraient, si son âme ne s’est point rassasiée de bonheur, et si de plus il n’a point de sépulture, je dis qu’un avorton est plus heureux que lui. '
  '4':
  - type: text
    content: 'Car il est venu en vain, il s’en va dans les ténèbres, et son nom reste couvert de ténèbres; '
  '5':
  - type: note
    content: Job 3:16. Ps 58:9.
  - type: text
    content: 'il n’a point vu, il n’a point connu le soleil; il a plus de repos que cet homme. '
  '6':
  - type: text
    content: 'Et quand celui-ci vivrait deux fois mille ans, sans jouir du bonheur, tout ne va-t-il pas dans un même lieu? '
  '7':
  - type: text
    content: 'Tout le travail de l’homme est pour sa bouche, et cependant ses désirs ne sont jamais satisfaits. '
  '8':
  - type: text
    content: 'Car quel avantage le sage a-t-il sur l’insensé? Quel avantage a le malheureux qui sait se conduire en présence des vivants? '
  '9':
  - type: text
    content: 'Ce que les yeux voient est préférable à l’agitation des désirs: c’est encore là une vanité et la poursuite du vent. '
