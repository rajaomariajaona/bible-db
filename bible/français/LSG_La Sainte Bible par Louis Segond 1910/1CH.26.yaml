document_id: 1CH.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les portiers du temple. Autres emplois des Lévites
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-28: cf. 1 Ch 9:14-32. 1 Pi 4:10, 11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici les classes des portiers. Des Koréites: Meschélémia, fils de Koré, d’entre les fils d’Asaph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fils de Meschélémia: Zacharie, le premier-né, Jediaël le second, Zebadia le troisième, Jathniel le quatrième, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Élam le cinquième, Jochanan le sixième, Éljoénaï le septième. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fils d’Obed-Édom: Schemaeja, le premier-né, Jozabad le second, Joach le troisième, Sacar le quatrième, Nethaneel le cinquième, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ammiel le sixième, Issacar le septième, Peulthaï le huitième; car Dieu l’avait béni. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'A Schemaeja, son fils, naquirent des fils qui dominèrent dans la maison de leur père, car ils étaient de vaillants hommes; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'fils de Schemaeja: Othni, Rephaël, Obed, Elzabad et ses frères, hommes vaillants, Élihu et Semaeja. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tous ceux-là étaient des fils d’Obed-Édom; eux, leurs fils et leurs frères, étaient des hommes pleins de vigueur et de force pour le service, soixante-deux d’Obed-Édom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les fils et les frères de Meschélémia, hommes vaillants, étaient au nombre de dix-huit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Des fils de Merari: Hosa, qui avait pour fils: Schimri, le chef, établi chef par son père, quoiqu’il ne fût pas le premier-né, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hilkija le second, Thebalia le troisième, Zacharie le quatrième. Tous les fils et les frères de Hosa étaient au nombre de treize. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A ces classes de portiers, aux chefs de ces hommes et à leurs frères, fut remise la garde pour le service de la maison de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils tirèrent au sort pour chaque porte, petits et grands, selon leurs maisons paternelles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le sort échut à Schélémia pour le côté de l’orient. On tira au sort pour Zacharie, son fils, qui était un sage conseiller, et le côté du septentrion lui échut par le sort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le côté du midi échut à Obed-Édom, et la maison des magasins à ses fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le côté de l’occident échut à Schuppim et à Hosa, avec la porte Schalléketh, sur le chemin montant: une garde était vis-à-vis de l’autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il y avait à l’orient six Lévites, au nord quatre par jour, au midi quatre par jour, et quatre aux magasins en deux places différentes; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'du côté du faubourg, à l’occident, quatre vers le chemin, deux vers le faubourg. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ce sont là les classes des portiers, d’entre les fils des Koréites et d’entre les fils de Merari. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'L’un des Lévites, Achija, avait l’intendance des trésors de la maison de Dieu et des trésors des choses saintes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Parmi les fils de Laedan, les fils des Guerschonites issus de Laedan, chefs des maisons paternelles de Laedan le Guerschonite, c’étaient Jehiéli, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'et les fils de Jehiéli, Zétham et Joël, son frère, qui gardaient les trésors de la maison de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Parmi les Amramites, les Jitseharites, les Hébronites et les Uziélites, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'c’était Schebuel, fils de Guerschom, fils de Moïse, qui était intendant des trésors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Parmi ses frères issus d’Éliézer, dont le fils fut Rechabia, dont le fils fut Ésaïe, dont le fils fut Joram, dont le fils fut Zicri, dont le fils fut Schelomith, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'c’étaient Schelomith et ses frères qui gardaient tous les trésors des choses saintes qu’avaient consacrées le roi David, les chefs des maisons paternelles, les chefs de milliers et de centaines, et les chefs de l’armée: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'c’était sur le butin pris à la guerre qu’ils les avaient consacrées pour l’entretien de la maison de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tout ce qui avait été consacré par Samuel, le voyant, par Saül, fils de Kis, par Abner, fils de Ner, par Joab, fils de Tseruja, toutes les choses consacrées étaient sous la garde de Schelomith et de ses frères.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 29-32: cf. (1 Ch 23:4. 2 Ch 19:8-11.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Parmi les Jitseharites, Kenania et ses frères étaient employés pour les affaires extérieures, comme magistrats et juges en Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Parmi les Hébronites, Haschabia et ses frères, hommes vaillants, au nombre de mille sept cents, avaient la surveillance d’Israël, de l’autre côté du Jourdain, à l’occident, pour toutes les affaires de l’Éternel et pour le service du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'En ce qui concerne les Hébronites, dont Jerija était le chef, on fit, la quarantième année du règne de David, des recherches à leur égard d’après leurs généalogies et leurs maisons paternelles, et l’on trouva parmi eux de vaillants hommes à Jaezer en Galaad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Les frères de Jerija, hommes vaillants, étaient au nombre de deux mille sept cents chefs de maisons paternelles. Le roi David les établit sur les Rubénites, sur les Gadites et sur la demi-tribu de Manassé pour toutes les affaires de Dieu et pour les affaires du roi.
