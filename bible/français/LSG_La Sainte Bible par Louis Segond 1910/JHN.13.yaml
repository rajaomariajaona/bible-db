      children:
      - type: text
        text: Jn 15:20
      metadata:
        usfm: JHN.15.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: le serviteur n’est pas plus grand que son seigneur, ni l’apôtre plus grand que celui qui l’a envoyé.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si vous savez ces choses, vous êtes heureux, pourvu que vous les pratiquiez.
