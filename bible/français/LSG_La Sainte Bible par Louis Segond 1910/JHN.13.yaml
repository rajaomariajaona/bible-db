      metadata:
        usfm: 1JN.2.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ayant ainsi parlé, Jésus fut troublé en son esprit, et il dit expressément: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En vérité, en vérité, je vous le dis, l’un de vous me livrera.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les disciples se regardaient les uns les autres, ne sachant de qui il parlait. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 20:2
      metadata:
        usfm: JHN.20.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:7
      metadata:
        usfm: JHN.21.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: JHN.21.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Un des disciples, celui que Jésus aimait, était couché sur le sein de Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Simon Pierre lui fit signe de demander qui était celui dont parlait Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Et ce disciple, s’étant penché sur la poitrine de Jésus, lui dit: Seigneur, qui est-ce? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jésus répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est celui à qui je donnerai le morceau trempé.
  - type: text
    text: ' Et, ayant trempé le morceau, il le donna à Judas, fils de Simon, l’Iscariot. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dès que le morceau fut donné, Satan entra dans Judas. Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce que tu fais, fais-le promptement.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mais aucun de ceux qui étaient à table ne comprit pourquoi il lui disait cela; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'car quelques-uns pensaient que, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:6
      metadata:
        usfm: JHN.12.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme Judas avait la bourse, Jésus voulait lui dire: Achète ce dont nous avons besoin pour la fête, ou qu’il lui commandait de donner quelque chose aux pauvres. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Judas, ayant pris le morceau, se hâta de sortir. Il était nuit.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Derniers entretiens et discours de Jésus avec ses disciples. — Questions des apôtres Pierre, Thomas, Philippe, Jude. — Instructions, consolations et promesses: l’amour fraternel; l’envoi du Saint-Esprit; la paix de Jésus; le cep et les sarments; la haine du monde; les persécutions; la tristesse changée en joie; le revoir. Les adieux du départ. — Foi des disciples'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 31-35: cf. Jn 17:1-5, 11; 15:12-14, 17. 1 Jn 3:10-19; 4:7-12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
