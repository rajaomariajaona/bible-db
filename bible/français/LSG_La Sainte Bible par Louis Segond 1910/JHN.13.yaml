      children:
      - type: text
        text: Mc 14:18
      metadata:
        usfm: MRK.14.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:21
      metadata:
        usfm: LUK.22.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
