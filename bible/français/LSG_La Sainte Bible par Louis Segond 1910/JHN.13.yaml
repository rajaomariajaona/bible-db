      metadata:
        usfm: JHN.13.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'lorsque le diable avait déjà inspiré au cœur de Judas Iscariot, fils de Simon, le dessein de le livrer, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus, qui savait '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 11:27
      metadata:
        usfm: MAT.11.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:35
      metadata:
        usfm: JHN.3.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que le Père avait remis toutes choses entre ses mains, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 16:28
      metadata:
        usfm: JHN.16.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’il était venu de Dieu, et qu’il s’en allait à Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'se leva de table, ôta ses vêtements, et prit un linge, dont il se ceignit. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ensuite il versa de l’eau dans un bassin, et il se mit à laver les pieds des disciples, et à les essuyer avec le linge dont il était ceint. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il vint donc à Simon Pierre; et Pierre lui dit: Toi, Seigneur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:14
      metadata:
        usfm: MAT.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tu me laves les pieds! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jésus lui répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce que je fais, tu ne le comprends pas maintenant, mais tu le comprendras bientôt.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Pierre lui dit: Non, jamais tu ne me laveras les pieds. Jésus lui répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si je ne te lave, tu n’auras point de part avec moi.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Simon Pierre lui dit: Seigneur, non seulement les pieds, mais encore les mains et la tête. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui est lavé n’a besoin que de se laver les pieds pour être entièrement pur;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 15:3
      metadata:
        usfm: JHN.15.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et vous êtes purs, mais non pas tous.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:64
      metadata:
        usfm: JHN.6.64
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car il connaissait celui qui le livrait; c’est pourquoi il dit: Vous n’êtes pas tous purs. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Après qu’il leur eut lavé les pieds, et qu’il eut pris ses vêtements, il se remit à table, et leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Comprenez-vous ce que je vous ai fait?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
