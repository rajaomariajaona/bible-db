    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui mange avec moi le pain
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A levé son talon contre moi.
- type: usfm
