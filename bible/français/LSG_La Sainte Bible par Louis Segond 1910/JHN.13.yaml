document_id: JHN.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Célébration de la Pâque. Jésus lave les pieds de ses disciples
  - type: heading
    content: 'V. 1-17: cf. Mt 26:19, 20. Mc 14:17. Lu 22:14-18, 24-27. Mc 10:35-45.'
  - type: text
    content: 'Avant '
  - type: note
    content: Mt 26:2. Mc 14:1. Lu 12:1.
  - type: text
    content: 'la fête de Pâque, Jésus, sachant que son heure était venue de passer de ce monde au Père, et ayant aimé les siens qui étaient dans le monde, mit le comble à son amour pour eux. '
  '10':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: Celui qui est lavé n’a besoin que de se laver les pieds pour être entièrement pur;
  - type: text
    content: ' '
  - type: note
    content: Jn 15:3.
  - type: text
    content: et vous êtes purs, mais non pas tous.
  - type: text
    content: ' '
  '11':
  - type: note
    content: Jn 6:64.
  - type: text
    content: 'Car il connaissait celui qui le livrait; c’est pourquoi il dit: Vous n’êtes pas tous purs. '
  '12':
  - type: text
    content: 'Après qu’il leur eut lavé les pieds, et qu’il eut pris ses vêtements, il se remit à table, et leur dit: '
  - type: text
    content: Comprenez-vous ce que je vous ai fait?
  '13':
  - type: text
    content: ' '
  - type: note
    content: Mt 23:8, 10. 1 Co 8:6; 12:3. Ph 2:11.
  - type: text
    content: Vous m’appelez Maître et Seigneur; et vous dites bien, car je le suis.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Si donc je vous ai lavé les pieds, moi, le Seigneur et le Maître,
  - type: text
    content: ' '
  - type: note
    content: Ga 6:1, 2.
  - type: text
    content: vous devez aussi vous laver les pieds les uns aux autres;
  - type: text
    content: ' '
  '15':
  - type: note
    content: 1 Pi 2:21. 1 Jn 2:6.
  - type: text
    content: car je vous ai donné un exemple, afin que vous fassiez comme je vous ai fait.
  - type: text
    content: ' '
  '16':
  - type: text
    content: En vérité, en vérité, je vous le dis,
  - type: text
    content: ' '
  - type: note
    content: Mt 10:24. Lu 6:40. Jn 15:20.
  - type: text
    content: le serviteur n’est pas plus grand que son seigneur, ni l’apôtre plus grand que celui qui l’a envoyé.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Si vous savez ces choses, vous êtes heureux, pourvu que vous les pratiquiez.
  - type: heading
    content: La trahison de Judas dévoilée
  - type: heading
    content: 'V. 18-30: cf. (Mt 26:21-25. Mc 14:18-21. Lu 22:21-23.)'
  '18':
  - type: text
    content: ' '
  - type: text
    content: 'Ce n’est pas de vous tous que je parle; je connais ceux que j’ai choisis. Mais il faut que l’Écriture s’accomplisse:'
  - type: note
    content: Ps 41:10. Mt 26:23. 1 Jn 2:19.
  - type: text
    content: Celui qui mange avec moi le pain
  - type: text
    content: A levé son talon contre moi.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Jn 14:29; 16:4.
  - type: text
    content: Dès à présent je vous le dis, avant que la chose arrive, afin que, lorsqu’elle arrivera, vous croyiez à ce que je suis.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Pendant le souper, '
  - type: note
    content: Lu 22:3. Jn 13:27.
  - type: text
    content: 'lorsque le diable avait déjà inspiré au cœur de Judas Iscariot, fils de Simon, le dessein de le livrer, '
  '20':
  - type: text
    content: En vérité, en vérité, je vous le dis,
  - type: text
    content: ' '
  - type: note
    content: Mt 10:40. Lu 10:16.
  - type: text
    content: celui qui reçoit celui que j’aurai envoyé me reçoit, et celui qui me reçoit, reçoit celui qui m’a envoyé.
  - type: text
    content: ' '
  '21':
  - type: note
    content: Mt 26:21. Mc 14:18. Lu 22:21. Ac 1:17. 1 Jn 2:19.
  - type: text
    content: 'Ayant ainsi parlé, Jésus fut troublé en son esprit, et il dit expressément: '
  - type: text
    content: En vérité, en vérité, je vous le dis, l’un de vous me livrera.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Les disciples se regardaient les uns les autres, ne sachant de qui il parlait. '
  '23':
  - type: note
    content: Jn 20:2; 21:7, 20.
  - type: text
    content: 'Un des disciples, celui que Jésus aimait, était couché sur le sein de Jésus. '
  '24':
  - type: text
    content: 'Simon Pierre lui fit signe de demander qui était celui dont parlait Jésus. '
  '25':
  - type: text
    content: 'Et ce disciple, s’étant penché sur la poitrine de Jésus, lui dit: Seigneur, qui est-ce? '
  '26':
  - type: text
    content: 'Jésus répondit: '
  - type: text
    content: C’est celui à qui je donnerai le morceau trempé.
  - type: text
    content: ' Et, ayant trempé le morceau, il le donna à Judas, fils de Simon, l’Iscariot. '
  '27':
  - type: text
    content: 'Dès que le morceau fut donné, Satan entra dans Judas. Jésus lui dit: '
  - type: text
    content: Ce que tu fais, fais-le promptement.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Mais aucun de ceux qui étaient à table ne comprit pourquoi il lui disait cela; '
  '29':
  - type: text
    content: 'car quelques-uns pensaient que, '
  - type: note
    content: Jn 12:6.
  - type: text
    content: 'comme Judas avait la bourse, Jésus voulait lui dire: Achète ce dont nous avons besoin pour la fête, ou qu’il lui commandait de donner quelque chose aux pauvres. '
  '3':
  - type: text
    content: 'Jésus, qui savait '
  - type: note
    content: Mt 11:27. Jn 3:35.
  - type: text
    content: 'que le Père avait remis toutes choses entre ses mains, '
  - type: note
    content: Jn 16:28.
  - type: text
    content: 'qu’il était venu de Dieu, et qu’il s’en allait à Dieu, '
  '30':
  - type: text
    content: Judas, ayant pris le morceau, se hâta de sortir. Il était nuit.
  - type: heading
    content: 'Derniers entretiens et discours de Jésus avec ses disciples. — Questions des apôtres Pierre, Thomas, Philippe, Jude. — Instructions, consolations et promesses: l’amour fraternel; l’envoi du Saint-Esprit; la paix de Jésus; le cep et les sarments; la haine du monde; les persécutions; la tristesse changée en joie; le revoir. Les adieux du départ. — Foi des disciples'
  - type: heading
    content: 'V. 31-35: cf. Jn 17:1-5, 11; 15:12-14, 17. 1 Jn 3:10-19; 4:7-12.'
  '31':
  - type: text
    content: 'Lorsque Judas fut sorti, Jésus dit: '
  - type: text
    content: Maintenant, le Fils de l’homme a été glorifié, et Dieu a été glorifié en lui.
  '32':
  - type: text
    content: ' '
  - type: text
    content: Si Dieu a été glorifié en lui, Dieu aussi le glorifiera en lui-même,
  - type: text
    content: ' '
  - type: note
    content: Jn 12:23; 17:1.
  - type: text
    content: et il le glorifiera bientôt.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Mes petits enfants, je suis pour peu de temps encore avec vous.
  - type: text
    content: ' '
  - type: note
    content: Jn 7:34; 8:21.
  - type: text
    content: 'Vous me chercherez; et, comme j’ai dit aux Juifs: Vous ne pouvez venir où je vais, je vous le dis aussi maintenant.'
  - type: text
    content: ' '
  '34':
  - type: note
    content: Lé 19:18. Mt 22:39. Jn 15:12. Ép 5:2. 1 Th 4:9. 1 Pi 4:8. 1 Jn 3:23; 4:21.
  - type: text
    content: 'Je vous donne un commandement nouveau: Aimez-vous les uns les autres; comme je vous ai aimés, vous aussi, aimez-vous les uns les autres.'
  - type: text
    content: ' '
  '35':
  - type: note
    content: 1 Jn 2:5; 4:20.
  - type: text
    content: A ceci tous connaîtront que vous êtes mes disciples, si vous avez de l’amour les uns pour les autres.
  - type: heading
    content: 'V. 36-38: cf. (Mt 26:31-35. Mc 14:27-31. Lu 22:31-34.)'
  '36':
  - type: text
    content: ' '
  - type: note
    content: Jn 21:18. 2 Pi 1:14.
  - type: text
    content: 'Simon Pierre lui dit: Seigneur, où vas-tu? Jésus répondit: '
  - type: text
    content: Tu ne peux pas maintenant me suivre où je vais, mais tu me suivras plus tard.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Seigneur, lui dit Pierre, pourquoi ne puis-je pas te suivre maintenant? '
  - type: note
    content: Mt 26:33. Mc 14:29. Lu 22:33.
  - type: text
    content: 'Je donnerai ma vie pour toi. '
  '38':
  - type: text
    content: 'Jésus répondit: '
  - type: text
    content: Tu donneras ta vie pour moi!
  - type: text
    content: ' '
  - type: note
    content: Mt 26:34. Mc 14:30. Lu 22:34.
  - type: text
    content: En vérité, en vérité, je te le dis, le coq ne chantera pas que tu ne m’aies renié trois fois.
  '4':
  - type: text
    content: 'se leva de table, ôta ses vêtements, et prit un linge, dont il se ceignit. '
  '5':
  - type: text
    content: 'Ensuite il versa de l’eau dans un bassin, et il se mit à laver les pieds des disciples, et à les essuyer avec le linge dont il était ceint. '
  '6':
  - type: text
    content: 'Il vint donc à Simon Pierre; et Pierre lui dit: Toi, Seigneur, '
  - type: note
    content: Mt 3:14.
  - type: text
    content: 'tu me laves les pieds! '
  '7':
  - type: text
    content: 'Jésus lui répondit: '
  - type: text
    content: Ce que je fais, tu ne le comprends pas maintenant, mais tu le comprendras bientôt.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Pierre lui dit: Non, jamais tu ne me laveras les pieds. Jésus lui répondit: '
  - type: text
    content: Si je ne te lave, tu n’auras point de part avec moi.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Simon Pierre lui dit: Seigneur, non seulement les pieds, mais encore les mains et la tête. '
