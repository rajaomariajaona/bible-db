document_id: JOB.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Second discours de Tsophar à Job
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-29: cf. (Job 8:8-15; 15:17, etc.; 18:5, etc.) Ps 37:32-38.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tsophar de Naama prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mes pensées me forcent à répondre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mon agitation ne peut se contenir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: J’ai entendu des reproches qui m’outragent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le souffle de mon intelligence donnera la réplique.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ne sais-tu pas que, de tout temps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Depuis que l’homme a été placé sur la terre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 37:35
      metadata:
        usfm: PSA.37.35
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '36'
      metadata:
        usfm: PSA.37.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le triomphe des méchants a été court,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la joie de l’impie momentanée?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Quand il s’élèverait jusqu’aux cieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que sa tête toucherait aux nues,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il périra pour toujours comme son ordure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et ceux qui le voyaient diront: Où est-il?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il s’envolera comme un songe, et on ne le trouvera plus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il disparaîtra comme une vision nocturne;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’œil qui le regardait ne le regardera plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le lieu qu’il habitait ne l’apercevra plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ses fils seront assaillis par les pauvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses mains restitueront ce qu’il a pris par violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: La vigueur de la jeunesse, qui remplissait ses membres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aura sa couche avec lui dans la poussière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le mal était doux à sa bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il le cachait sous sa langue,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il le savourait sans l’abandonner,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il le retenait au milieu de son palais;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mais sa nourriture se transformera dans ses entrailles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle deviendra dans son corps un venin d’aspic.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il a englouti des richesses, il les vomira;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu les chassera de son ventre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il a sucé du venin d’aspic,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La langue de la vipère le tuera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il ne reposera plus ses regards sur les ruisseaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur les torrents, sur les fleuves de miel et de lait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il rendra ce qu’il a gagné, et n’en profitera plus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il restituera tout ce qu’il a pris, et n’en jouira plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Car il a opprimé, délaissé les pauvres,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 5:12
      metadata:
        usfm: ECC.5.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il a ruiné des maisons et ne les a pas rétablies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Son avidité n’a point connu de bornes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il ne sauvera pas ce qu’il avait de plus cher.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Rien n’échappait à sa voracité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais son bien-être ne durera pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Au milieu de l’abondance il sera dans la détresse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La main de tous les misérables se lèvera sur lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Et voici, pour lui remplir le ventre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu enverra sur lui le feu de sa colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le rassasiera par une pluie de traits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: S’il échappe aux armes de fer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’arc d’airain le transpercera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il arrache de son corps le trait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui étincelle au sortir de ses entrailles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il est en proie aux terreurs de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Toutes les calamités sont réservées à ses trésors;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il sera consumé par un feu que n’allumera point l’homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ce qui restera dans sa tente en deviendra la pâture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Les cieux dévoileront son iniquité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la terre s’élèvera contre lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Les revenus de sa maison seront emportés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils disparaîtront au jour de la colère de Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Telle est la part que Dieu réserve au méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tel est l’héritage que Dieu lui destine.
