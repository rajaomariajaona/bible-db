document_id: JOB.20,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Second discours de Tsophar à Job
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-29: cf. (Job 8:8-15; 15:17, etc.; 18:5, etc.) Ps 37:32-38.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsophar de Naama prit la parole et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses fils seront assaillis par les pauvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses mains restitueront ce qu’il a pris par violence.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La vigueur de la jeunesse, qui remplissait ses membres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aura sa couche avec lui dans la poussière.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le mal était doux à sa bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il le cachait sous sa langue,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il le savourait sans l’abandonner,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il le retenait au milieu de son palais;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais sa nourriture se transformera dans ses entrailles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle deviendra dans son corps un venin d’aspic.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a englouti des richesses, il les vomira;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu les chassera de son ventre.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a sucé du venin d’aspic,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La langue de la vipère le tuera.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne reposera plus ses regards sur les ruisseaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur les torrents, sur les fleuves de miel et de lait.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il rendra ce qu’il a gagné, et n’en profitera plus;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il restituera tout ce qu’il a pris, et n’en jouira plus.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il a opprimé, délaissé les pauvres,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 5:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il a ruiné des maisons et ne les a pas rétablies.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes pensées me forcent à répondre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon agitation ne peut se contenir.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son avidité n’a point connu de bornes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il ne sauvera pas ce qu’il avait de plus cher.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rien n’échappait à sa voracité;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais son bien-être ne durera pas.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu de l’abondance il sera dans la détresse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La main de tous les misérables se lèvera sur lui.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et voici, pour lui remplir le ventre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu enverra sur lui le feu de sa colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le rassasiera par une pluie de traits.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’il échappe aux armes de fer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’arc d’airain le transpercera.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il arrache de son corps le trait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui étincelle au sortir de ses entrailles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il est en proie aux terreurs de la mort.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les calamités sont réservées à ses trésors;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il sera consumé par un feu que n’allumera point l’homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ce qui restera dans sa tente en deviendra la pâture.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les cieux dévoileront son iniquité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la terre s’élèvera contre lui.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les revenus de sa maison seront emportés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils disparaîtront au jour de la colère de Dieu.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Telle est la part que Dieu réserve au méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tel est l’héritage que Dieu lui destine.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai entendu des reproches qui m’outragent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le souffle de mon intelligence donnera la réplique.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne sais-tu pas que, de tout temps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depuis que l’homme a été placé sur la terre,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 37:35
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '36'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le triomphe des méchants a été court,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la joie de l’impie momentanée?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand il s’élèverait jusqu’aux cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que sa tête toucherait aux nues,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il périra pour toujours comme son ordure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et ceux qui le voyaient diront: Où est-il?'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’envolera comme un songe, et on ne le trouvera plus;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il disparaîtra comme une vision nocturne;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’œil qui le regardait ne le regardera plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le lieu qu’il habitait ne l’apercevra plus.
