document_id: JOB.20,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Second discours de Tsophar à Job
  - type: heading
    content: 'V. 1-29: cf. (Job 8:8-15; 15:17, etc.; 18:5, etc.) Ps 37:32-38.'
  - type: text
    content: 'Tsophar de Naama prit la parole et dit:'
  '10':
  - type: text
    content: Ses fils seront assaillis par les pauvres,
  - type: text
    content: Et ses mains restitueront ce qu’il a pris par violence.
  '11':
  - type: text
    content: La vigueur de la jeunesse, qui remplissait ses membres,
  - type: text
    content: Aura sa couche avec lui dans la poussière.
  '12':
  - type: text
    content: Le mal était doux à sa bouche,
  - type: text
    content: Il le cachait sous sa langue,
  '13':
  - type: text
    content: Il le savourait sans l’abandonner,
  - type: text
    content: Il le retenait au milieu de son palais;
  '14':
  - type: text
    content: Mais sa nourriture se transformera dans ses entrailles,
  - type: text
    content: Elle deviendra dans son corps un venin d’aspic.
  '15':
  - type: text
    content: Il a englouti des richesses, il les vomira;
  - type: text
    content: Dieu les chassera de son ventre.
  '16':
  - type: text
    content: Il a sucé du venin d’aspic,
  - type: text
    content: La langue de la vipère le tuera.
  '17':
  - type: text
    content: Il ne reposera plus ses regards sur les ruisseaux,
  - type: text
    content: Sur les torrents, sur les fleuves de miel et de lait.
  '18':
  - type: text
    content: Il rendra ce qu’il a gagné, et n’en profitera plus;
  - type: text
    content: Il restituera tout ce qu’il a pris, et n’en jouira plus.
  '19':
  - type: text
    content: Car il a opprimé, délaissé les pauvres,
  - type: note
    content: Ec 5:12.
  - type: text
    content: Il a ruiné des maisons et ne les a pas rétablies.
  '2':
  - type: text
    content: Mes pensées me forcent à répondre,
  - type: text
    content: Et mon agitation ne peut se contenir.
  '20':
  - type: text
    content: Son avidité n’a point connu de bornes;
  - type: text
    content: Mais il ne sauvera pas ce qu’il avait de plus cher.
  '21':
  - type: text
    content: Rien n’échappait à sa voracité;
  - type: text
    content: Mais son bien-être ne durera pas.
  '22':
  - type: text
    content: Au milieu de l’abondance il sera dans la détresse;
  - type: text
    content: La main de tous les misérables se lèvera sur lui.
  '23':
  - type: text
    content: Et voici, pour lui remplir le ventre,
  - type: text
    content: Dieu enverra sur lui le feu de sa colère,
  - type: text
    content: Et le rassasiera par une pluie de traits.
  '24':
  - type: text
    content: S’il échappe aux armes de fer,
  - type: text
    content: L’arc d’airain le transpercera.
  '25':
  - type: text
    content: Il arrache de son corps le trait,
  - type: text
    content: Qui étincelle au sortir de ses entrailles,
  - type: text
    content: Et il est en proie aux terreurs de la mort.
  '26':
  - type: text
    content: Toutes les calamités sont réservées à ses trésors;
  - type: text
    content: Il sera consumé par un feu que n’allumera point l’homme,
  - type: text
    content: Et ce qui restera dans sa tente en deviendra la pâture.
  '27':
  - type: text
    content: Les cieux dévoileront son iniquité,
  - type: text
    content: Et la terre s’élèvera contre lui.
  '28':
  - type: text
    content: Les revenus de sa maison seront emportés,
  - type: text
    content: Ils disparaîtront au jour de la colère de Dieu.
  '29':
  - type: text
    content: Telle est la part que Dieu réserve au méchant,
  - type: text
    content: Tel est l’héritage que Dieu lui destine.
  '3':
  - type: text
    content: J’ai entendu des reproches qui m’outragent;
  - type: text
    content: Le souffle de mon intelligence donnera la réplique.
  '4':
  - type: text
    content: Ne sais-tu pas que, de tout temps,
  - type: text
    content: Depuis que l’homme a été placé sur la terre,
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ps 37:35, 36.
  - type: text
    content: Le triomphe des méchants a été court,
  - type: text
    content: Et la joie de l’impie momentanée?
  '6':
  - type: text
    content: Quand il s’élèverait jusqu’aux cieux,
  - type: text
    content: Et que sa tête toucherait aux nues,
  '7':
  - type: text
    content: Il périra pour toujours comme son ordure,
  - type: text
    content: 'Et ceux qui le voyaient diront: Où est-il?'
  '8':
  - type: text
    content: Il s’envolera comme un songe, et on ne le trouvera plus;
  - type: text
    content: Il disparaîtra comme une vision nocturne;
  '9':
  - type: text
    content: L’œil qui le regardait ne le regardera plus,
  - type: text
    content: Le lieu qu’il habitait ne l’apercevra plus.
