document_id: PSA.37,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 73; 49. Pr 24:19, 20. Ec 8:11-13.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 23:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne t’irrite pas contre les méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’envie pas ceux qui font le mal.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Encore un peu de temps, et le méchant n’est plus;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu regardes le lieu où il était, et il a disparu.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les misérables possèdent le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils jouissent abondamment de la paix.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant forme des projets contre le juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il grince des dents contre lui.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur se rit du méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il voit que son jour arrive.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les méchants tirent le glaive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils bandent leur arc,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour faire tomber le malheureux et l’indigent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour égorger ceux dont la voie est droite.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur glaive entre dans leur propre cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leurs arcs se brisent.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut le peu du juste
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l’abondance de beaucoup de méchants;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car les bras des méchants seront brisés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’Éternel soutient les justes.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel connaît les jours des hommes intègres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leur héritage dure à jamais.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne sont pas confondus au temps du malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils sont rassasiés aux jours de la famine.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils sont fauchés aussi vite que l’herbe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils se flétrissent comme le gazon vert.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les méchants périssent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les ennemis de l’Éternel, comme les plus beaux pâturages;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils s’évanouissent, ils s’évanouissent en fumée.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant emprunte, et il ne rend pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le juste est compatissant, et il donne.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ceux que bénit l’Éternel possèdent le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux qu’il maudit sont retranchés.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel affermit les pas de l’homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il prend plaisir à sa voie;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’il tombe, il n’est pas terrassé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel lui prend la main.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai été jeune, j’ai vieilli;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je n’ai point vu le juste abandonné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni sa postérité mendiant son pain.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toujours il est compatissant, et il prête;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa postérité est bénie.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Détourne-toi du mal, fais le bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et possède à jamais ta demeure.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel aime la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il n’abandonne pas ses fidèles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont toujours sous sa garde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la postérité des méchants est retranchée.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les justes posséderont le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils y demeureront à jamais.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Confie-toi en l’Éternel, et pratique le bien;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aie le pays pour demeure et la fidélité pour pâture.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La bouche du juste annonce la sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa langue proclame la justice.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 40:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 51:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La loi de son Dieu est dans son cœur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses pas ne chancellent point.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant épie le juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il cherche à le faire mourir.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel ne le laisse pas entre ses mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il ne le condamne pas quand il est en jugement.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Espère en l’Éternel, garde sa voie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il t’élèvera pour que tu possèdes le pays;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu verras les méchants retranchés.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai vu le méchant dans toute sa puissance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’étendait comme un arbre verdoyant.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a passé, et voici, il n’est plus;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je le cherche, et il ne se trouve plus.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Observe celui qui est intègre, et regarde celui qui est droit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il y a une postérité pour l’homme de paix.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les rebelles sont tous anéantis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La postérité des méchants est retranchée.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le salut des justes vient de l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est leur protecteur au temps de la détresse.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais de l’Éternel tes délices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il te donnera ce que ton cœur désire.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel les secourt et les délivre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les délivre des méchants et les sauve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils cherchent en lui leur refuge.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 22:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 55:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 16:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 6:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 12:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 5:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Recommande ton sort à l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mets en lui ta confiance, et il agira.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fera paraître ta justice comme la lumière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ton droit comme le soleil à son midi.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Garde le silence devant l’Éternel, et espère en lui;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne t’irrite pas contre celui qui réussit dans ses voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre l’homme qui vient à bout de ses mauvais desseins.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Laisse la colère, abandonne la fureur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne t’irrite pas, ce serait mal faire.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car les méchants seront retranchés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux qui espèrent en l’Éternel posséderont le pays.
