document_id: PSA.37,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 73; 49. Pr 24:19, 20. Ec 8:11-13.
  - type: text
    content: De David.
  - type: note
    content: Pr 23:17; 24:1.
  - type: text
    content: Ne t’irrite pas contre les méchants,
  - type: text
    content: N’envie pas ceux qui font le mal.
  '10':
  - type: text
    content: Encore un peu de temps, et le méchant n’est plus;
  - type: text
    content: Tu regardes le lieu où il était, et il a disparu.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Mt 5:5.
  - type: text
    content: Les misérables possèdent le pays,
  - type: text
    content: Et ils jouissent abondamment de la paix.
  '12':
  - type: text
    content: Le méchant forme des projets contre le juste,
  - type: text
    content: Et il grince des dents contre lui.
  '13':
  - type: text
    content: Le Seigneur se rit du méchant,
  - type: text
    content: Car il voit que son jour arrive.
  '14':
  - type: text
    content: Les méchants tirent le glaive,
  - type: text
    content: Ils bandent leur arc,
  - type: text
    content: Pour faire tomber le malheureux et l’indigent,
  - type: text
    content: Pour égorger ceux dont la voie est droite.
  '15':
  - type: text
    content: Leur glaive entre dans leur propre cœur,
  - type: text
    content: Et leurs arcs se brisent.
  '16':
  - type: text
    content: Mieux vaut le peu du juste
  - type: text
    content: Que l’abondance de beaucoup de méchants;
  '17':
  - type: text
    content: Car les bras des méchants seront brisés,
  - type: text
    content: Mais l’Éternel soutient les justes.
  '18':
  - type: text
    content: L’Éternel connaît les jours des hommes intègres,
  - type: text
    content: Et leur héritage dure à jamais.
  '19':
  - type: text
    content: Ils ne sont pas confondus au temps du malheur,
  - type: text
    content: Et ils sont rassasiés aux jours de la famine.
  '2':
  - type: text
    content: Car ils sont fauchés aussi vite que l’herbe,
  - type: text
    content: Et ils se flétrissent comme le gazon vert.
  '20':
  - type: text
    content: Mais les méchants périssent,
  - type: text
    content: Et les ennemis de l’Éternel, comme les plus beaux pâturages;
  - type: text
    content: Ils s’évanouissent, ils s’évanouissent en fumée.
  '21':
  - type: text
    content: Le méchant emprunte, et il ne rend pas;
  - type: text
    content: Le juste est compatissant, et il donne.
  '22':
  - type: text
    content: Car ceux que bénit l’Éternel possèdent le pays,
  - type: text
    content: Et ceux qu’il maudit sont retranchés.
  '23':
  - type: text
    content: L’Éternel affermit les pas de l’homme,
  - type: text
    content: Et il prend plaisir à sa voie;
  '24':
  - type: text
    content: S’il tombe, il n’est pas terrassé,
  - type: text
    content: Car l’Éternel lui prend la main.
  '25':
  - type: text
    content: J’ai été jeune, j’ai vieilli;
  - type: text
    content: Et je n’ai point vu le juste abandonné,
  - type: text
    content: Ni sa postérité mendiant son pain.
  '26':
  - type: text
    content: Toujours il est compatissant, et il prête;
  - type: text
    content: Et sa postérité est bénie.
  '27':
  - type: text
    content: Détourne-toi du mal, fais le bien,
  - type: text
    content: Et possède à jamais ta demeure.
  '28':
  - type: text
    content: Car l’Éternel aime la justice,
  - type: text
    content: Et il n’abandonne pas ses fidèles;
  - type: text
    content: Ils sont toujours sous sa garde,
  - type: text
    content: Mais la postérité des méchants est retranchée.
  '29':
  - type: text
    content: Les justes posséderont le pays,
  - type: text
    content: Et ils y demeureront à jamais.
  '3':
  - type: text
    content: Confie-toi en l’Éternel, et pratique le bien;
  - type: text
    content: Aie le pays pour demeure et la fidélité pour pâture.
  '30':
  - type: text
    content: La bouche du juste annonce la sagesse,
  - type: text
    content: Et sa langue proclame la justice.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Ps 40:9. És 51:7.
  - type: text
    content: La loi de son Dieu est dans son cœur;
  - type: text
    content: Ses pas ne chancellent point.
  '32':
  - type: text
    content: Le méchant épie le juste,
  - type: text
    content: Et il cherche à le faire mourir.
  '33':
  - type: text
    content: L’Éternel ne le laisse pas entre ses mains,
  - type: text
    content: Et il ne le condamne pas quand il est en jugement.
  '34':
  - type: text
    content: Espère en l’Éternel, garde sa voie,
  - type: text
    content: Et il t’élèvera pour que tu possèdes le pays;
  - type: text
    content: Tu verras les méchants retranchés.
  '35':
  - type: text
    content: J’ai vu le méchant dans toute sa puissance;
  - type: text
    content: Il s’étendait comme un arbre verdoyant.
  '36':
  - type: text
    content: Il a passé, et voici, il n’est plus;
  - type: text
    content: Je le cherche, et il ne se trouve plus.
  '37':
  - type: text
    content: Observe celui qui est intègre, et regarde celui qui est droit;
  - type: text
    content: Car il y a une postérité pour l’homme de paix.
  '38':
  - type: text
    content: Mais les rebelles sont tous anéantis,
  - type: text
    content: La postérité des méchants est retranchée.
  '39':
  - type: text
    content: Le salut des justes vient de l’Éternel;
  - type: text
    content: Il est leur protecteur au temps de la détresse.
  '4':
  - type: text
    content: Fais de l’Éternel tes délices,
  - type: text
    content: Et il te donnera ce que ton cœur désire.
  '40':
  - type: text
    content: L’Éternel les secourt et les délivre;
  - type: text
    content: Il les délivre des méchants et les sauve,
  - type: text
    content: Parce qu’ils cherchent en lui leur refuge.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ps 22:9; 55:23. Pr 16:3. Mt 6:25. Lu 12:22. 1 Pi 5:7.
  - type: text
    content: Recommande ton sort à l’Éternel,
  - type: text
    content: Mets en lui ta confiance, et il agira.
  '6':
  - type: text
    content: Il fera paraître ta justice comme la lumière,
  - type: text
    content: Et ton droit comme le soleil à son midi.
  '7':
  - type: text
    content: Garde le silence devant l’Éternel, et espère en lui;
  - type: text
    content: Ne t’irrite pas contre celui qui réussit dans ses voies,
  - type: text
    content: Contre l’homme qui vient à bout de ses mauvais desseins.
  '8':
  - type: text
    content: Laisse la colère, abandonne la fureur;
  - type: text
    content: Ne t’irrite pas, ce serait mal faire.
  '9':
  - type: text
    content: Car les méchants seront retranchés,
  - type: text
    content: Et ceux qui espèrent en l’Éternel posséderont le pays.
