document_id: PSA.37
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 73; 49. Pr 24:19, 20. Ec 8:11-13.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 23:17
      metadata:
        usfm: PRO.23.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:1
      metadata:
        usfm: PRO.24.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ne t’irrite pas contre les méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’envie pas ceux qui font le mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Car ils sont fauchés aussi vite que l’herbe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils se flétrissent comme le gazon vert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Confie-toi en l’Éternel, et pratique le bien;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aie le pays pour demeure et la fidélité pour pâture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fais de l’Éternel tes délices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il te donnera ce que ton cœur désire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 22:9
      metadata:
        usfm: PSA.22.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 55:23
      metadata:
        usfm: PSA.55.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 16:3
      metadata:
        usfm: PRO.16.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 6:25
      metadata:
        usfm: MAT.6.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 12:22
      metadata:
        usfm: LUK.12.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:7
      metadata:
        usfm: 1PE.5.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Recommande ton sort à l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mets en lui ta confiance, et il agira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il fera paraître ta justice comme la lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ton droit comme le soleil à son midi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Garde le silence devant l’Éternel, et espère en lui;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne t’irrite pas contre celui qui réussit dans ses voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre l’homme qui vient à bout de ses mauvais desseins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Laisse la colère, abandonne la fureur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne t’irrite pas, ce serait mal faire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Car les méchants seront retranchés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ceux qui espèrent en l’Éternel posséderont le pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Encore un peu de temps, et le méchant n’est plus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu regardes le lieu où il était, et il a disparu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:5
      metadata:
        usfm: MAT.5.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les misérables possèdent le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils jouissent abondamment de la paix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le méchant forme des projets contre le juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il grince des dents contre lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Le Seigneur se rit du méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il voit que son jour arrive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les méchants tirent le glaive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils bandent leur arc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour faire tomber le malheureux et l’indigent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour égorger ceux dont la voie est droite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Leur glaive entre dans leur propre cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leurs arcs se brisent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mieux vaut le peu du juste
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l’abondance de beaucoup de méchants;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Car les bras des méchants seront brisés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais l’Éternel soutient les justes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: L’Éternel connaît les jours des hommes intègres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leur héritage dure à jamais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils ne sont pas confondus au temps du malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils sont rassasiés aux jours de la famine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mais les méchants périssent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les ennemis de l’Éternel, comme les plus beaux pâturages;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils s’évanouissent, ils s’évanouissent en fumée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le méchant emprunte, et il ne rend pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le juste est compatissant, et il donne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Car ceux que bénit l’Éternel possèdent le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ceux qu’il maudit sont retranchés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: L’Éternel affermit les pas de l’homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il prend plaisir à sa voie;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: S’il tombe, il n’est pas terrassé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Éternel lui prend la main.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: J’ai été jeune, j’ai vieilli;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je n’ai point vu le juste abandonné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni sa postérité mendiant son pain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Toujours il est compatissant, et il prête;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa postérité est bénie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Détourne-toi du mal, fais le bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et possède à jamais ta demeure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Car l’Éternel aime la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il n’abandonne pas ses fidèles;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont toujours sous sa garde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais la postérité des méchants est retranchée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Les justes posséderont le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils y demeureront à jamais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: La bouche du juste annonce la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa langue proclame la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 40:9
      metadata:
        usfm: PSA.40.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 51:7
      metadata:
        usfm: ISA.51.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La loi de son Dieu est dans son cœur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses pas ne chancellent point.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Le méchant épie le juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il cherche à le faire mourir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: L’Éternel ne le laisse pas entre ses mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il ne le condamne pas quand il est en jugement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Espère en l’Éternel, garde sa voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il t’élèvera pour que tu possèdes le pays;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu verras les méchants retranchés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: J’ai vu le méchant dans toute sa puissance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il s’étendait comme un arbre verdoyant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Il a passé, et voici, il n’est plus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je le cherche, et il ne se trouve plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Observe celui qui est intègre, et regarde celui qui est droit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il y a une postérité pour l’homme de paix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Mais les rebelles sont tous anéantis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La postérité des méchants est retranchée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Le salut des justes vient de l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est leur protecteur au temps de la détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: L’Éternel les secourt et les délivre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les délivre des méchants et les sauve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’ils cherchent en lui leur refuge.
