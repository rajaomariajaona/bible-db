document_id: NUM.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Murmures de Marie et d’Aaron à Hatséroth. Marie frappée de la lèpre
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-16: cf. De 24:9. 2 Ch 26:16-21. (De 34:10-12. Hé 3:1-6.) 2 Ti 2:24.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Marie et Aaron parlèrent contre Moïse au sujet de la femme éthiopienne qu’il avait prise, car il avait pris une femme éthiopienne. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils dirent: Est-ce seulement par Moïse que l’Éternel parle? N’est-ce pas aussi par nous qu’il parle? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et l’Éternel l’entendit. Or, Moïse était un homme fort patient, plus qu’aucun homme sur la face de la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Soudain l’Éternel dit à Moïse, à Aaron et à Marie: Allez, vous trois, à la tente d’assignation. Et ils y allèrent tous les trois. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L’Éternel descendit dans la colonne de nuée, et il se tint à l’entrée de la tente. Il appela Aaron et Marie, qui s’avancèrent tous les deux. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et il dit: Écoutez bien mes paroles! Lorsqu’il y aura parmi vous un prophète, c’est dans une vision que moi, l’Éternel, je me révélerai à lui, c’est dans un songe que je lui parlerai. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il n’en est pas ainsi de mon serviteur Moïse. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 3:2
      metadata:
        usfm: HEB.3.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il est fidèle dans toute ma maison. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je lui parle '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 33:11
      metadata:
        usfm: EXO.33.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 34:10
      metadata:
        usfm: DEU.34.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'bouche à bouche, je me révèle à lui sans énigmes, et il voit une représentation de l’Éternel. Pourquoi donc n’avez-vous pas craint de parler contre mon serviteur, contre Moïse? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La colère de l’Éternel s’enflamma contre eux. Et il s’en alla. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'La nuée se retira de dessus la tente. Et voici, Marie était frappée d’une lèpre, blanche comme la neige. Aaron se tourna vers Marie; et voici, elle avait la lèpre. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors Aaron dit à Moïse: De grâce, mon seigneur, ne nous fais pas porter la peine du péché que nous avons commis en insensés, et dont nous nous sommes rendus coupables! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Oh! Qu’elle ne soit pas comme l’enfant mort-né, dont la chair est à moitié consumée quand il sort du sein de sa mère! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moïse cria à l’Éternel, en disant: O Dieu, je te prie, guéris-la! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et l’Éternel dit à Moïse: Si son père lui avait craché au visage, ne serait-elle pas pendant sept jours un objet de honte? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 13:46
      metadata:
        usfm: LEV.13.46
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Qu’elle soit enfermée sept jours en dehors du camp; après quoi, elle y sera reçue. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Marie fut enfermée sept jours en dehors du camp; et le peuple ne partit point, jusqu’à ce que Marie y fût rentrée. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Après cela, le peuple partit de Hatséroth, et il campa dans le désert de Paran.
