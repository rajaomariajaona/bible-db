document_id: NUM.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Murmures de Marie et d’Aaron à Hatséroth. Marie frappée de la lèpre
  - type: heading
    content: 'V. 1-16: cf. De 24:9. 2 Ch 26:16-21. (De 34:10-12. Hé 3:1-6.) 2 Ti 2:24.'
  - type: text
    content: 'Marie et Aaron parlèrent contre Moïse au sujet de la femme éthiopienne qu’il avait prise, car il avait pris une femme éthiopienne. '
  '10':
  - type: text
    content: 'La nuée se retira de dessus la tente. Et voici, Marie était frappée d’une lèpre, blanche comme la neige. Aaron se tourna vers Marie; et voici, elle avait la lèpre. '
  '11':
  - type: text
    content: 'Alors Aaron dit à Moïse: De grâce, mon seigneur, ne nous fais pas porter la peine du péché que nous avons commis en insensés, et dont nous nous sommes rendus coupables! '
  '12':
  - type: text
    content: 'Oh! Qu’elle ne soit pas comme l’enfant mort-né, dont la chair est à moitié consumée quand il sort du sein de sa mère! '
  '13':
  - type: text
    content: 'Moïse cria à l’Éternel, en disant: O Dieu, je te prie, guéris-la! '
  '14':
  - type: text
    content: 'Et l’Éternel dit à Moïse: Si son père lui avait craché au visage, ne serait-elle pas pendant sept jours un objet de honte? '
  - type: note
    content: Lé 13:46.
  - type: text
    content: 'Qu’elle soit enfermée sept jours en dehors du camp; après quoi, elle y sera reçue. '
  '15':
  - type: text
    content: 'Marie fut enfermée sept jours en dehors du camp; et le peuple ne partit point, jusqu’à ce que Marie y fût rentrée. '
  '16':
  - type: text
    content: Après cela, le peuple partit de Hatséroth, et il campa dans le désert de Paran.
  '2':
  - type: text
    content: 'Ils dirent: Est-ce seulement par Moïse que l’Éternel parle? N’est-ce pas aussi par nous qu’il parle? '
  '3':
  - type: text
    content: 'Et l’Éternel l’entendit. Or, Moïse était un homme fort patient, plus qu’aucun homme sur la face de la terre. '
  '4':
  - type: text
    content: 'Soudain l’Éternel dit à Moïse, à Aaron et à Marie: Allez, vous trois, à la tente d’assignation. Et ils y allèrent tous les trois. '
  '5':
  - type: text
    content: 'L’Éternel descendit dans la colonne de nuée, et il se tint à l’entrée de la tente. Il appela Aaron et Marie, qui s’avancèrent tous les deux. '
  '6':
  - type: text
    content: 'Et il dit: Écoutez bien mes paroles! Lorsqu’il y aura parmi vous un prophète, c’est dans une vision que moi, l’Éternel, je me révélerai à lui, c’est dans un songe que je lui parlerai. '
  '7':
  - type: text
    content: 'Il n’en est pas ainsi de mon serviteur Moïse. '
  - type: note
    content: Hé 3:2.
  - type: text
    content: 'Il est fidèle dans toute ma maison. '
  '8':
  - type: text
    content: 'Je lui parle '
  - type: note
    content: Ex 33:11. De 34:10.
  - type: text
    content: 'bouche à bouche, je me révèle à lui sans énigmes, et il voit une représentation de l’Éternel. Pourquoi donc n’avez-vous pas craint de parler contre mon serviteur, contre Moïse? '
  '9':
  - type: text
    content: 'La colère de l’Éternel s’enflamma contre eux. Et il s’en alla. '
