document_id: JER.28,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lutte de Jérémie contre le faux prophète Hanania
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-17: cf. Jé 27; 29:24, etc.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans la même année, au commencement du règne de Sédécias, roi de Juda, le cinquième mois de la quatrième année, Hanania, fils d’Azzur, prophète, de Gabaon, me dit dans la maison de l’Éternel, en présence des sacrificateurs et de tout le peuple: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Hanania, le prophète, enleva le joug de dessus le cou de Jérémie, le prophète, et il le brisa. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Hanania dit en présence de tout le peuple: Ainsi parle l’Éternel: C’est ainsi que, dans deux années, je briserai de dessus le cou de toutes les nations le joug de Nebucadnetsar, roi de Babylone. Et Jérémie, le prophète, s’en alla. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après que Hanania, le prophète, eut brisé le joug de dessus le cou de Jérémie, le prophète, la parole de l’Éternel fut adressée à Jérémie, en ces mots: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Va, et dis à Hanania: Ainsi parle l’Éternel: Tu as brisé un joug de bois, et tu auras à sa place un joug de fer. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car ainsi parle l’Éternel des armées, le Dieu d’Israël: Je mets un joug de fer sur le cou de toutes ces nations, pour qu’elles soient asservies à Nebucadnetsar, roi de Babylone, et elles lui seront asservies; je lui donne aussi les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 27:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'animaux des champs. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jérémie, le prophète, dit à Hanania, le prophète: Écoute, Hanania! L’Éternel ne t’a point envoyé, et tu inspires à ce peuple une fausse confiance. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi ainsi parle l’Éternel: Voici, je te chasse de la terre; tu mourras cette année; car tes paroles sont une '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 13:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 29:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'révolte contre l’Éternel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et Hanania, le prophète, mourut cette année-là, dans le septième mois.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël: Je brise le joug du roi de Babylone! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Encore '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 27:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'deux années, et je fais revenir dans ce lieu tous les ustensiles de la maison de l’Éternel, que Nebucadnetsar, roi de Babylone, a enlevés de ce lieu, et qu’il a emportés à Babylone. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et je ferai revenir dans ce lieu, dit l’Éternel, Jeconia, fils de Jojakim, roi de Juda, et tous les captifs de Juda, qui sont allés à Babylone; car je briserai le joug du roi de Babylone. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jérémie, le prophète, répondit à Hanania, le prophète, en présence des sacrificateurs et de tout le peuple qui se tenaient dans la maison de l’Éternel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jérémie, le prophète, dit: Amen! Que l’Éternel fasse ainsi! Que l’Éternel accomplisse les paroles que tu as prophétisées, et qu’il fasse revenir de Babylone en ce lieu les ustensiles de la maison de l’Éternel et tous les captifs! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seulement écoute cette parole que je prononce à tes oreilles et aux oreilles de tout le peuple: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les prophètes qui ont paru avant moi et avant toi, dès les temps anciens, ont prophétisé contre des pays puissants et de grands royaumes la guerre, le malheur et la peste; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais si un prophète prophétise la paix, c’est par l’accomplissement de ce qu’il prophétise qu’il sera reconnu comme véritablement envoyé par l’Éternel. '
