document_id: JOB.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Second discours de Bildad à Job
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-21: cf. (Job 15:17-35; 20.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Bildad de Schuach prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Quand mettrez-vous un terme à ces discours?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ayez de l’intelligence, puis nous parlerons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Pourquoi sommes-nous regardés comme des bêtes?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi ne sommes-nous à vos yeux que des brutes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 13:14
      metadata:
        usfm: JOB.13.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: O toi qui te déchires dans ta fureur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faut-il, à cause de toi, que la terre devienne déserte?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faut-il que les rochers disparaissent de leur place?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: La lumière du méchant s’éteindra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la flamme qui en jaillit cessera de briller.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La lumière s’obscurcira sous sa tente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa lampe au-dessus de lui s’éteindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ses pas assurés seront à l’étroit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malgré ses efforts, il tombera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Car il met les pieds sur un filet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il marche dans les mailles,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il est saisi au piège par le talon,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 5:5
      metadata:
        usfm: JOB.5.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et le filet s’empare de lui;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le cordeau est caché dans la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la trappe est sur son sentier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 15:21
      metadata:
        usfm: JOB.15.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 6:25
      metadata:
        usfm: JER.6.25
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 46:5
      metadata:
        usfm: JER.46.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 49:29
      metadata:
        usfm: JER.49.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Des terreurs l’assiègent, l’entourent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le poursuivent par derrière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 15:23
      metadata:
        usfm: JOB.15.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La faim consume ses forces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La misère est à ses côtés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les parties de sa peau sont l’une après l’autre dévorées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses membres sont dévorés par le premier-né de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 8:13
      metadata:
        usfm: JOB.8.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: JOB.8.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:20
      metadata:
        usfm: JOB.11.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:28
      metadata:
        usfm: PRO.10.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il est arraché de sa tente où il se croyait en sûreté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il se traîne vers le roi des épouvantements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nul des siens n’habite sa tente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le soufre est répandu sur sa demeure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: En bas, ses racines se dessèchent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: En haut, ses branches sont coupées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 109:13
      metadata:
        usfm: PSA.109.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:7
      metadata:
        usfm: PRO.10.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Sa mémoire disparaît de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son nom n’est plus sur la face des champs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il est poussé de la lumière dans les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est chassé du monde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 14:22
      metadata:
        usfm: ISA.14.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 22:30
      metadata:
        usfm: JER.22.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il ne laisse ni descendants ni postérité parmi son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni survivant dans les lieux qu’il habitait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Les générations à venir seront étonnées de sa ruine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la génération présente sera saisie d’effroi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Point d’autre destinée pour le méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Point d’autre sort pour qui ne connaît pas Dieu!
