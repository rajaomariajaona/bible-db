document_id: JOB.18,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Second discours de Bildad à Job
  - type: heading
    content: 'V. 1-21: cf. (Job 15:17-35; 20.)'
  - type: text
    content: 'Bildad de Schuach prit la parole et dit:'
  '10':
  - type: text
    content: Le cordeau est caché dans la terre,
  - type: text
    content: Et la trappe est sur son sentier.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Job 15:21. Jé 6:25; 46:5; 49:29.
  - type: text
    content: Des terreurs l’assiègent, l’entourent,
  - type: text
    content: Le poursuivent par derrière.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Job 15:23.
  - type: text
    content: La faim consume ses forces,
  - type: text
    content: La misère est à ses côtés.
  '13':
  - type: text
    content: Les parties de sa peau sont l’une après l’autre dévorées,
  - type: text
    content: Ses membres sont dévorés par le premier-né de la mort.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Job 8:13, 14; 11:20. Pr 10:28.
  - type: text
    content: Il est arraché de sa tente où il se croyait en sûreté,
  - type: text
    content: Il se traîne vers le roi des épouvantements.
  '15':
  - type: text
    content: Nul des siens n’habite sa tente,
  - type: text
    content: Le soufre est répandu sur sa demeure.
  '16':
  - type: text
    content: En bas, ses racines se dessèchent;
  - type: text
    content: En haut, ses branches sont coupées.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ps 109:13. Pr 10:7.
  - type: text
    content: Sa mémoire disparaît de la terre,
  - type: text
    content: Son nom n’est plus sur la face des champs.
  '18':
  - type: text
    content: Il est poussé de la lumière dans les ténèbres,
  - type: text
    content: Il est chassé du monde.
  '19':
  - type: text
    content: ' '
  - type: note
    content: És 14:22. Jé 22:30.
  - type: text
    content: Il ne laisse ni descendants ni postérité parmi son peuple,
  - type: text
    content: Ni survivant dans les lieux qu’il habitait.
  '2':
  - type: text
    content: Quand mettrez-vous un terme à ces discours?
  - type: text
    content: Ayez de l’intelligence, puis nous parlerons.
  '20':
  - type: text
    content: Les générations à venir seront étonnées de sa ruine,
  - type: text
    content: Et la génération présente sera saisie d’effroi.
  '21':
  - type: text
    content: Point d’autre destinée pour le méchant,
  - type: text
    content: Point d’autre sort pour qui ne connaît pas Dieu!
  '3':
  - type: text
    content: Pourquoi sommes-nous regardés comme des bêtes?
  - type: text
    content: Pourquoi ne sommes-nous à vos yeux que des brutes?
  '4':
  - type: text
    content: ' '
  - type: note
    content: Job 13:14.
  - type: text
    content: O toi qui te déchires dans ta fureur,
  - type: text
    content: Faut-il, à cause de toi, que la terre devienne déserte?
  - type: text
    content: Faut-il que les rochers disparaissent de leur place?
  '5':
  - type: text
    content: La lumière du méchant s’éteindra,
  - type: text
    content: Et la flamme qui en jaillit cessera de briller.
  '6':
  - type: text
    content: La lumière s’obscurcira sous sa tente,
  - type: text
    content: Et sa lampe au-dessus de lui s’éteindra.
  '7':
  - type: text
    content: Ses pas assurés seront à l’étroit;
  - type: text
    content: Malgré ses efforts, il tombera.
  '8':
  - type: text
    content: Car il met les pieds sur un filet,
  - type: text
    content: Il marche dans les mailles,
  '9':
  - type: text
    content: Il est saisi au piège par le talon,
  - type: note
    content: Job 5:5.
  - type: text
    content: Et le filet s’empare de lui;
