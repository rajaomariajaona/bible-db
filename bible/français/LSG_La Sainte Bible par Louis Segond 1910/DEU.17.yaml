document_id: DEU.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les actes d’idolâtrie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1: cf. Lé 22:17-25. 2 S 24:24.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tu n’offriras en sacrifice à l’Éternel, ton Dieu, ni bœuf, ni agneau qui ait '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Lé 22:20, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 15:21
      metadata:
        usfm: DEU.15.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: quelque défaut ou difformité; car ce serait en abomination à l’Éternel, ton Dieu.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 2-7: cf. De 13:6-18. Ga 1:8, 9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 13:6
      metadata:
        usfm: DEU.13.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il se trouvera peut-être au milieu de toi dans l’une des villes que l’Éternel, ton Dieu, te donne, un homme ou une femme faisant ce qui est mal aux yeux de l’Éternel, ton Dieu, et transgressant son alliance; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'allant après d’autres dieux pour les servir et se prosterner devant eux, après le soleil, la lune, ou toute l’armée des cieux. Ce n’est point là ce que j’ai commandé. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dès que tu en auras connaissance, dès que tu l’auras appris, tu feras avec soin des recherches. La chose est-elle vraie, le fait est-il établi, cette abomination a-t-elle été commise en Israël, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'alors tu feras venir à tes portes l’homme ou la femme qui sera coupable de cette mauvaise action, et tu lapideras ou puniras de mort cet homme ou cette femme. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Celui qui mérite la mort sera exécuté '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 35:30
      metadata:
        usfm: NUM.35.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 19:15
      metadata:
        usfm: DEU.19.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 18:16
      metadata:
        usfm: MAT.18.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 13:1
      metadata:
        usfm: 2CO.13.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 10:28
      metadata:
        usfm: HEB.10.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sur la déposition de deux ou de trois témoins; il ne sera pas mis à mort sur la déposition d’un seul témoin. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 13:9
      metadata:
        usfm: DEU.13.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La main des témoins se lèvera la première sur lui pour le faire mourir, et la main de tout le peuple ensuite. Tu ôteras ainsi le mal du milieu de toi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les jugements
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-13: cf. Mal 2:7. Mt 23:2, 3. (Ro 13:1, 2. 1 Pi 2:13, 14.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Si une cause relative à un meurtre, à un différend, à une blessure, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 19:10
      metadata:
        usfm: 2CH.19.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal 2:7
      metadata:
        usfm: MAL.2.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'te paraît trop difficile à juger et fournit matière à contestation dans tes portes, tu te lèveras et tu monteras au lieu que l’Éternel, ton Dieu, choisira. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tu iras vers les sacrificateurs, les Lévites, et vers celui qui remplira alors les fonctions de juge; tu les consulteras, et ils te feront connaître la sentence. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tu te conformeras à ce qu’ils te diront dans le lieu que choisira l’Éternel, et tu auras soin d’agir d’après tout ce qu’ils t’enseigneront. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu te conformeras à la loi qu’ils t’enseigneront et à la sentence qu’ils auront prononcée; tu ne te détourneras de ce qu’ils te diront ni à droite ni à gauche. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’homme qui, par orgueil, n’écoutera pas le sacrificateur placé là pour servir l’Éternel, ton Dieu, ou qui n’écoutera pas le juge, cet homme sera puni de mort. Tu ôteras ainsi le mal du milieu d’Israël, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: afin que tout le peuple entende et craigne, et qu’il ne se livre plus à l’orgueil.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La royauté
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-20: cf. (1 S 8 à 10; 16:1-13.) (1 R 10:14-29; 11:1, etc.) (Ps 2:6. Ap 19:16.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsque tu seras entré dans le pays que l’Éternel, ton Dieu, te donne, lorsque tu le posséderas, que tu y auras établi ta demeure, et que tu diras: Je veux mettre un roi sur moi, comme toutes les nations qui m’entourent, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'tu mettras sur toi un roi que choisira l’Éternel, ton Dieu, tu prendras un roi du milieu de tes frères, tu ne pourras pas te donner un étranger, qui ne soit pas ton frère. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais qu’il n’ait pas un grand nombre de chevaux; et qu’il ne ramène pas le peuple en Égypte pour avoir beaucoup de chevaux; car l’Éternel vous a dit: Vous ne retournerez plus par ce chemin-là. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Qu’il n’ait pas un grand nombre de femmes, afin que son cœur ne se détourne point; et qu’il ne fasse pas de grands amas d’argent et d’or. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Quand il s’assiéra sur le trône de son royaume, il écrira pour lui, dans un livre, une copie de cette loi, qu’il prendra auprès des sacrificateurs, les Lévites. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il devra l’avoir avec lui et y lire tous les jours de sa vie, afin qu’il apprenne à craindre l’Éternel, son Dieu, à observer et à mettre en pratique toutes les paroles de cette loi et toutes ces ordonnances; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: afin que son cœur ne s’élève point au-dessus de ses frères, et qu’il ne se détourne de ces commandements ni à droite ni à gauche; afin qu’il prolonge ses jours dans son royaume, lui et ses enfants, au milieu d’Israël.
