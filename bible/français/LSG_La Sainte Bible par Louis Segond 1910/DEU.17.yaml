document_id: DEU.17,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les actes d’idolâtrie
  - type: heading
    content: 'V. 1: cf. Lé 22:17-25. 2 S 24:24.'
  - type: text
    content: 'Tu n’offriras en sacrifice à l’Éternel, ton Dieu, ni bœuf, ni agneau qui ait '
  - type: note
    content: Lé 22:20, etc. De 15:21.
  - type: text
    content: quelque défaut ou difformité; car ce serait en abomination à l’Éternel, ton Dieu.
  - type: heading
    content: 'V. 2-7: cf. De 13:6-18. Ga 1:8, 9.'
  '10':
  - type: text
    content: 'Tu te conformeras à ce qu’ils te diront dans le lieu que choisira l’Éternel, et tu auras soin d’agir d’après tout ce qu’ils t’enseigneront. '
  '11':
  - type: text
    content: 'Tu te conformeras à la loi qu’ils t’enseigneront et à la sentence qu’ils auront prononcée; tu ne te détourneras de ce qu’ils te diront ni à droite ni à gauche. '
  '12':
  - type: text
    content: 'L’homme qui, par orgueil, n’écoutera pas le sacrificateur placé là pour servir l’Éternel, ton Dieu, ou qui n’écoutera pas le juge, cet homme sera puni de mort. Tu ôteras ainsi le mal du milieu d’Israël, '
  '13':
  - type: text
    content: afin que tout le peuple entende et craigne, et qu’il ne se livre plus à l’orgueil.
  - type: heading
    content: La royauté
  - type: heading
    content: 'V. 14-20: cf. (1 S 8 à 10; 16:1-13.) (1 R 10:14-29; 11:1, etc.) (Ps 2:6. Ap 19:16.)'
  '14':
  - type: text
    content: 'Lorsque tu seras entré dans le pays que l’Éternel, ton Dieu, te donne, lorsque tu le posséderas, que tu y auras établi ta demeure, et que tu diras: Je veux mettre un roi sur moi, comme toutes les nations qui m’entourent, '
  '15':
  - type: text
    content: 'tu mettras sur toi un roi que choisira l’Éternel, ton Dieu, tu prendras un roi du milieu de tes frères, tu ne pourras pas te donner un étranger, qui ne soit pas ton frère. '
  '16':
  - type: text
    content: 'Mais qu’il n’ait pas un grand nombre de chevaux; et qu’il ne ramène pas le peuple en Égypte pour avoir beaucoup de chevaux; car l’Éternel vous a dit: Vous ne retournerez plus par ce chemin-là. '
  '17':
  - type: text
    content: 'Qu’il n’ait pas un grand nombre de femmes, afin que son cœur ne se détourne point; et qu’il ne fasse pas de grands amas d’argent et d’or. '
  '18':
  - type: text
    content: 'Quand il s’assiéra sur le trône de son royaume, il écrira pour lui, dans un livre, une copie de cette loi, qu’il prendra auprès des sacrificateurs, les Lévites. '
  '19':
  - type: text
    content: 'Il devra l’avoir avec lui et y lire tous les jours de sa vie, afin qu’il apprenne à craindre l’Éternel, son Dieu, à observer et à mettre en pratique toutes les paroles de cette loi et toutes ces ordonnances; '
  '2':
  - type: text
    content: ' '
  - type: note
    content: De 13:6.
  - type: text
    content: 'Il se trouvera peut-être au milieu de toi dans l’une des villes que l’Éternel, ton Dieu, te donne, un homme ou une femme faisant ce qui est mal aux yeux de l’Éternel, ton Dieu, et transgressant son alliance; '
  '20':
  - type: text
    content: afin que son cœur ne s’élève point au-dessus de ses frères, et qu’il ne se détourne de ces commandements ni à droite ni à gauche; afin qu’il prolonge ses jours dans son royaume, lui et ses enfants, au milieu d’Israël.
  '3':
  - type: text
    content: 'allant après d’autres dieux pour les servir et se prosterner devant eux, après le soleil, la lune, ou toute l’armée des cieux. Ce n’est point là ce que j’ai commandé. '
  '4':
  - type: text
    content: 'Dès que tu en auras connaissance, dès que tu l’auras appris, tu feras avec soin des recherches. La chose est-elle vraie, le fait est-il établi, cette abomination a-t-elle été commise en Israël, '
  '5':
  - type: text
    content: 'alors tu feras venir à tes portes l’homme ou la femme qui sera coupable de cette mauvaise action, et tu lapideras ou puniras de mort cet homme ou cette femme. '
  '6':
  - type: text
    content: 'Celui qui mérite la mort sera exécuté '
  - type: note
    content: No 35:30. De 19:15. Mt 18:16. 2 Co 13:1. Hé 10:28.
  - type: text
    content: 'sur la déposition de deux ou de trois témoins; il ne sera pas mis à mort sur la déposition d’un seul témoin. '
  '7':
  - type: note
    content: De 13:9.
  - type: text
    content: La main des témoins se lèvera la première sur lui pour le faire mourir, et la main de tout le peuple ensuite. Tu ôteras ainsi le mal du milieu de toi.
  - type: heading
    content: Les jugements
  - type: heading
    content: 'V. 8-13: cf. Mal 2:7. Mt 23:2, 3. (Ro 13:1, 2. 1 Pi 2:13, 14.)'
  '8':
  - type: text
    content: 'Si une cause relative à un meurtre, à un différend, à une blessure, '
  - type: note
    content: 2 Ch 19:10. Mal 2:7.
  - type: text
    content: 'te paraît trop difficile à juger et fournit matière à contestation dans tes portes, tu te lèveras et tu monteras au lieu que l’Éternel, ton Dieu, choisira. '
  '9':
  - type: text
    content: 'Tu iras vers les sacrificateurs, les Lévites, et vers celui qui remplira alors les fonctions de juge; tu les consulteras, et ils te feront connaître la sentence. '
