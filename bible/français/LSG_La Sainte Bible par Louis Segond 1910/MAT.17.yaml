document_id: MAT.17,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Jésus sur une haute montagne: la transfiguration'
  - type: heading
    content: 'V. 1-13: cf. (Mc 9:2-13. Lu 9:28-36. 2 Pi 1:16-18.) Ap 1:13-18.'
  - type: text
    content: ' '
  - type: note
    content: Mc 9:2. Lu 9:28. 2 Pi 1:17.
  - type: text
    content: 'Six jours après, Jésus prit avec lui Pierre, Jacques, et Jean, son frère, et il les conduisit à l’écart sur une haute montagne. '
  '10':
  - type: note
    content: Mc 9:11.
  - type: text
    content: 'Les disciples lui firent cette question: Pourquoi donc les scribes disent-ils '
  - type: note
    content: Mal 4:5. Mt 11:14. Mc 9:11.
  - type: text
    content: 'qu’Élie doit venir premièrement? '
  '11':
  - type: text
    content: 'Il répondit: '
  - type: text
    content: Il est vrai qu’Élie doit venir, et rétablir toutes choses.
  '12':
  - type: text
    content: ' '
  - type: text
    content: Mais je vous dis qu’Élie est déjà venu, qu’ils ne l’ont pas reconnu, et qu’ils l’ont traité comme ils ont voulu. De même le Fils de l’homme souffrira de leur part.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Les disciples comprirent alors qu’il leur parlait de Jean-Baptiste.
  - type: heading
    content: Guérison d’un lunatique
  - type: heading
    content: 'V. 14-21: cf. (Mc 9:14-29. Lu 9:37-43.)'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Mc 9:16. Lu 9:37.
  - type: text
    content: 'Lorsqu’ils furent arrivés près de la foule, un homme vint se jeter à genoux devant Jésus, et dit: '
  '15':
  - type: text
    content: 'Seigneur, aie pitié de mon fils, qui est lunatique, et qui souffre cruellement; il tombe souvent dans le feu, et souvent dans l’eau. '
  '16':
  - type: text
    content: Je l’ai amené à tes disciples, et ils n’ont pas pu le guérir.
  '17':
  - type: text
    content: ' '
  - type: text
    content: Race incrédule et perverse,
  - type: text
    content: ' répondit Jésus, '
  - type: text
    content: jusques à quand serai-je avec vous? Jusques à quand vous supporterai-je? Amenez-le-moi ici.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Jésus parla sévèrement au démon, qui sortit de lui, et l’enfant fut guéri à l’heure même. '
  '19':
  - type: note
    content: Mc 9:28.
  - type: text
    content: 'Alors les disciples s’approchèrent de Jésus, et lui dirent en particulier: Pourquoi n’avons-nous pu chasser ce démon?'
  '2':
  - type: text
    content: 'Il fut transfiguré devant eux; son visage resplendit comme le soleil, et ses vêtements devinrent blancs comme la lumière. '
  '20':
  - type: text
    content: ' '
  - type: text
    content: C’est à cause de votre incrédulité,
  - type: text
    content: ' leur dit Jésus. '
  - type: note
    content: Mt 21:21. Lu 17:6.
  - type: text
    content: 'Je vous le dis en vérité, si vous aviez de la foi comme un grain de sénevé, vous diriez à cette montagne: Transporte-toi d’ici là, et elle se transporterait; rien ne vous serait impossible.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: Mais cette sorte de démon ne sort que par la prière et par le jeûne.
  - type: heading
    content: Jésus annonce sa mort et sa résurrection
  - type: heading
    content: 'V. 22-23: cf. (Mc 9:30-32. Lu 9:43-45.)'
  '22':
  - type: text
    content: ' '
  - type: note
    content: Mt 16:21; 20:18. Mc 8:31; 9:31; 10:33. Lu 9:22, 44; 18:31.
  - type: text
    content: 'Pendant qu’ils parcouraient la Galilée, Jésus leur dit: '
  - type: text
    content: Le Fils de l’homme doit être livré entre les mains des hommes;
  '23':
  - type: text
    content: ' '
  - type: text
    content: ils le feront mourir, et le troisième jour il ressuscitera.
  - type: text
    content: ' Ils furent profondément attristés.'
  - type: heading
    content: Jésus de retour à Capernaüm. Il paie le tribut
  - type: heading
    content: 'V. 24-27: cf. 1 Co 10:32, 33; 11:1.'
  '24':
  - type: text
    content: 'Lorsqu’ils arrivèrent à Capernaüm, ceux qui percevaient les deux drachmes s’adressèrent à Pierre, et lui dirent: Votre maître ne paie-t-il pas les deux drachmes? '
  '25':
  - type: note
    content: Mt 22:21. Ro 13:7.
  - type: text
    content: 'Oui, dit-il. Et quand il fut entré dans la maison, Jésus le prévint, et dit: '
  - type: text
    content: Que t’en semble, Simon? Les rois de la terre, de qui perçoivent-ils des tributs ou des impôts? De leurs fils, ou des étrangers?
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Il lui dit: Des étrangers. Et Jésus lui répondit: '
  - type: text
    content: Les fils en sont donc exempts.
  '27':
  - type: text
    content: ' '
  - type: text
    content: Mais, pour ne pas les scandaliser, va à la mer, jette l’hameçon, et tire le premier poisson qui viendra; ouvre-lui la bouche, et tu trouveras un statère. Prends-le, et donne-le-leur pour moi et pour toi.
  '3':
  - type: text
    content: 'Et voici, Moïse et Élie leur apparurent, s’entretenant avec lui. '
  '4':
  - type: text
    content: 'Pierre, prenant la parole, dit à Jésus: Seigneur, il est bon que nous soyons ici; si tu le veux, je dresserai ici trois tentes, une pour toi, une pour Moïse, et une pour Élie. '
  '5':
  - type: text
    content: 'Comme il parlait encore, une nuée lumineuse les couvrit. Et voici, une voix fit entendre de la nuée ces paroles: '
  - type: note
    content: És 42:1. Mt 3:17. Mc 1:11; 9:7. Lu 3:22; 9:35. Col 1:13. 2 Pi 1:17.
  - type: text
    content: 'Celui-ci est mon Fils bien-aimé, en qui j’ai mis toute mon affection: '
  - type: note
    content: De 18:19. Ac 3:22.
  - type: text
    content: 'écoutez-le! '
  '6':
  - type: text
    content: 'Lorsqu’ils entendirent cette voix, les disciples tombèrent sur leur face, et furent saisis d’une grande frayeur. '
  '7':
  - type: text
    content: 'Mais Jésus, s’approchant, les toucha, et dit: '
  - type: text
    content: Levez-vous, n’ayez pas peur!
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Ils levèrent les yeux, et ne virent que Jésus seul. '
  '9':
  - type: note
    content: Mc 9:9. Lu 9:36.
  - type: text
    content: 'Comme ils descendaient de la montagne, Jésus leur donna cet ordre: '
  - type: text
    content: Ne parlez à personne de cette vision, jusqu’à ce que le Fils de l’homme soit ressuscité des morts.
  - type: text
    content: ' '
