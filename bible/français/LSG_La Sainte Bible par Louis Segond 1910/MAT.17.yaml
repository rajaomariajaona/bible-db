document_id: MAT.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus sur une haute montagne: la transfiguration'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. (Mc 9:2-13. Lu 9:28-36. 2 Pi 1:16-18.) Ap 1:13-18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:2
      metadata:
        usfm: MRK.9.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:28
      metadata:
        usfm: LUK.9.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 1:17
      metadata:
        usfm: 2PE.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Six jours après, Jésus prit avec lui Pierre, Jacques, et Jean, son frère, et il les conduisit à l’écart sur une haute montagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il fut transfiguré devant eux; son visage resplendit comme le soleil, et ses vêtements devinrent blancs comme la lumière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et voici, Moïse et Élie leur apparurent, s’entretenant avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pierre, prenant la parole, dit à Jésus: Seigneur, il est bon que nous soyons ici; si tu le veux, je dresserai ici trois tentes, une pour toi, une pour Moïse, et une pour Élie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Comme il parlait encore, une nuée lumineuse les couvrit. Et voici, une voix fit entendre de la nuée ces paroles: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 42:1
      metadata:
        usfm: ISA.42.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:17
      metadata:
        usfm: MAT.3.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:11
      metadata:
        usfm: MRK.1.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:7
      metadata:
        usfm: MRK.9.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:22
      metadata:
        usfm: LUK.3.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:35
      metadata:
        usfm: LUK.9.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:13
      metadata:
        usfm: COL.1.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 1:17
      metadata:
        usfm: 2PE.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Celui-ci est mon Fils bien-aimé, en qui j’ai mis toute mon affection: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 18:19
      metadata:
        usfm: DEU.18.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 3:22
      metadata:
        usfm: ACT.3.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'écoutez-le! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lorsqu’ils entendirent cette voix, les disciples tombèrent sur leur face, et furent saisis d’une grande frayeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais Jésus, s’approchant, les toucha, et dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Levez-vous, n’ayez pas peur!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils levèrent les yeux, et ne virent que Jésus seul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:9
      metadata:
        usfm: MRK.9.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:36
      metadata:
        usfm: LUK.9.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme ils descendaient de la montagne, Jésus leur donna cet ordre: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne parlez à personne de cette vision, jusqu’à ce que le Fils de l’homme soit ressuscité des morts.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:11
      metadata:
        usfm: MRK.9.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les disciples lui firent cette question: Pourquoi donc les scribes disent-ils '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal 4:5
      metadata:
        usfm: MAL.4.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 11:14
      metadata:
        usfm: MAT.11.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:11
      metadata:
        usfm: MRK.9.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’Élie doit venir premièrement? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il est vrai qu’Élie doit venir, et rétablir toutes choses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais je vous dis qu’Élie est déjà venu, qu’ils ne l’ont pas reconnu, et qu’ils l’ont traité comme ils ont voulu. De même le Fils de l’homme souffrira de leur part.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les disciples comprirent alors qu’il leur parlait de Jean-Baptiste.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison d’un lunatique
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-21: cf. (Mc 9:14-29. Lu 9:37-43.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:16
      metadata:
        usfm: MRK.9.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:37
      metadata:
        usfm: LUK.9.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu’ils furent arrivés près de la foule, un homme vint se jeter à genoux devant Jésus, et dit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Seigneur, aie pitié de mon fils, qui est lunatique, et qui souffre cruellement; il tombe souvent dans le feu, et souvent dans l’eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Je l’ai amené à tes disciples, et ils n’ont pas pu le guérir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Race incrédule et perverse,
  - type: text
    text: ' répondit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: jusques à quand serai-je avec vous? Jusques à quand vous supporterai-je? Amenez-le-moi ici.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jésus parla sévèrement au démon, qui sortit de lui, et l’enfant fut guéri à l’heure même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:28
      metadata:
        usfm: MRK.9.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors les disciples s’approchèrent de Jésus, et lui dirent en particulier: Pourquoi n’avons-nous pu chasser ce démon?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est à cause de votre incrédulité,
  - type: text
    text: ' leur dit Jésus. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:21
      metadata:
        usfm: MAT.21.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 17:6
      metadata:
        usfm: LUK.17.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je vous le dis en vérité, si vous aviez de la foi comme un grain de sénevé, vous diriez à cette montagne: Transporte-toi d’ici là, et elle se transporterait; rien ne vous serait impossible.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais cette sorte de démon ne sort que par la prière et par le jeûne.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus annonce sa mort et sa résurrection
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-23: cf. (Mc 9:30-32. Lu 9:43-45.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 16:21
      metadata:
        usfm: MAT.16.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:18
      metadata:
        usfm: MAT.20.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 8:31
      metadata:
        usfm: MRK.8.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:31
      metadata:
        usfm: MRK.9.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:33
      metadata:
        usfm: MRK.10.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:22
      metadata:
        usfm: LUK.9.22
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '44'
      metadata:
        usfm: LUK.9.44
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:31
      metadata:
        usfm: LUK.18.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pendant qu’ils parcouraient la Galilée, Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le Fils de l’homme doit être livré entre les mains des hommes;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ils le feront mourir, et le troisième jour il ressuscitera.
  - type: text
    text: ' Ils furent profondément attristés.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus de retour à Capernaüm. Il paie le tribut
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 24-27: cf. 1 Co 10:32, 33; 11:1.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lorsqu’ils arrivèrent à Capernaüm, ceux qui percevaient les deux drachmes s’adressèrent à Pierre, et lui dirent: Votre maître ne paie-t-il pas les deux drachmes? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:21
      metadata:
        usfm: MAT.22.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 13:7
      metadata:
        usfm: ROM.13.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Oui, dit-il. Et quand il fut entré dans la maison, Jésus le prévint, et dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que t’en semble, Simon? Les rois de la terre, de qui perçoivent-ils des tributs ou des impôts? De leurs fils, ou des étrangers?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il lui dit: Des étrangers. Et Jésus lui répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Les fils en sont donc exempts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais, pour ne pas les scandaliser, va à la mer, jette l’hameçon, et tire le premier poisson qui viendra; ouvre-lui la bouche, et tu trouveras un statère. Prends-le, et donne-le-leur pour moi et pour toi.
