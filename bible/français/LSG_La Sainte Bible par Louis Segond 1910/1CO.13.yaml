document_id: 1CO.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La charité
  - type: heading
    content: 'V. 1-13: cf. (Mt 22:36-40. Ro 13:8-10. Col 3:14.) (1 Jn 3:16-19; 4:7-12, 16-21.)'
  - type: text
    content: 'Quand je parlerais les langues des hommes et des anges, si je n’ai pas la charité, je suis un airain qui résonne, ou une cymbale qui retentit. '
  '10':
  - type: text
    content: 'mais quand ce qui est parfait sera venu, ce qui est partiel disparaîtra. '
  '11':
  - type: text
    content: 'Lorsque j’étais enfant, je parlais comme un enfant, je pensais comme un enfant, je raisonnais comme un enfant; lorsque je suis devenu homme, j’ai fait disparaître ce qui était de l’enfant. '
  '12':
  - type: note
    content: 2 Co 3:18.
  - type: text
    content: 'Aujourd’hui nous voyons au moyen d’un miroir, d’une manière obscure, mais alors nous verrons face à face; aujourd’hui je connais en partie, mais alors je connaîtrai comme j’ai été connu. '
  '13':
  - type: text
    content: 'Maintenant donc ces trois choses demeurent: la foi, l’espérance, la charité; mais la plus grande de ces choses, c’est la charité.'
  '2':
  - type: note
    content: Mt 7:22. Ro 12:7.
  - type: text
    content: 'Et quand j’aurais le don de prophétie, la science de tous les mystères et toute la connaissance, quand j’aurais même toute la foi jusqu’à transporter '
  - type: note
    content: Mt 17:20; 21:21. Mc 11:23. Lu 17:6.
  - type: text
    content: 'des montagnes, si je n’ai pas la charité, je ne suis rien. '
  '3':
  - type: text
    content: 'Et quand je distribuerais tous mes biens pour la nourriture des pauvres, quand je livrerais même mon corps pour être brûlé, si je n’ai pas la charité, cela ne me sert de rien. '
  '4':
  - type: note
    content: Pr 10:12. 1 Pi 4:8.
  - type: text
    content: 'La charité est patiente, elle est pleine de bonté; la charité n’est point envieuse; la charité ne se vante point, elle ne s’enfle point d’orgueil, '
  '5':
  - type: text
    content: 'elle ne fait rien de malhonnête, '
  - type: note
    content: 1 Co 10:24. Ph 2:4.
  - type: text
    content: 'elle ne cherche point son intérêt, elle ne s’irrite point, elle ne soupçonne point le mal, '
  '6':
  - type: text
    content: 'elle ne se réjouit point de l’injustice, '
  - type: note
    content: 2 Jn v. 4.
  - type: text
    content: 'mais elle se réjouit de la vérité; '
  '7':
  - type: text
    content: 'elle excuse tout, elle croit tout, elle espère tout, elle supporte tout. '
  '8':
  - type: text
    content: 'La charité ne périt jamais. Les prophéties prendront fin, les langues cesseront, la connaissance disparaîtra. '
  '9':
  - type: text
    content: 'Car nous connaissons en partie, et nous prophétisons en partie, '
