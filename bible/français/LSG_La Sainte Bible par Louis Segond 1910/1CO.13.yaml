document_id: 1CO.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La charité
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. (Mt 22:36-40. Ro 13:8-10. Col 3:14.) (1 Jn 3:16-19; 4:7-12, 16-21.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quand je parlerais les langues des hommes et des anges, si je n’ai pas la charité, je suis un airain qui résonne, ou une cymbale qui retentit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 7:22
      metadata:
        usfm: MAT.7.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:7
      metadata:
        usfm: ROM.12.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et quand j’aurais le don de prophétie, la science de tous les mystères et toute la connaissance, quand j’aurais même toute la foi jusqu’à transporter '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 17:20
      metadata:
        usfm: MAT.17.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:21
      metadata:
        usfm: MAT.21.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 11:23
      metadata:
        usfm: MRK.11.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 17:6
      metadata:
        usfm: LUK.17.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des montagnes, si je n’ai pas la charité, je ne suis rien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et quand je distribuerais tous mes biens pour la nourriture des pauvres, quand je livrerais même mon corps pour être brûlé, si je n’ai pas la charité, cela ne me sert de rien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:12
      metadata:
        usfm: PRO.10.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:8
      metadata:
        usfm: 1PE.4.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'La charité est patiente, elle est pleine de bonté; la charité n’est point envieuse; la charité ne se vante point, elle ne s’enfle point d’orgueil, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'elle ne fait rien de malhonnête, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:24
      metadata:
        usfm: 1CO.10.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:4
      metadata:
        usfm: PHP.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'elle ne cherche point son intérêt, elle ne s’irrite point, elle ne soupçonne point le mal, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'elle ne se réjouit point de l’injustice, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Jn v. 4.
    marker-yv: yv-n
  - type: text
    text: 'mais elle se réjouit de la vérité; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'elle excuse tout, elle croit tout, elle espère tout, elle supporte tout. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'La charité ne périt jamais. Les prophéties prendront fin, les langues cesseront, la connaissance disparaîtra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Car nous connaissons en partie, et nous prophétisons en partie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'mais quand ce qui est parfait sera venu, ce qui est partiel disparaîtra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lorsque j’étais enfant, je parlais comme un enfant, je pensais comme un enfant, je raisonnais comme un enfant; lorsque je suis devenu homme, j’ai fait disparaître ce qui était de l’enfant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 3:18
      metadata:
        usfm: 2CO.3.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Aujourd’hui nous voyons au moyen d’un miroir, d’une manière obscure, mais alors nous verrons face à face; aujourd’hui je connais en partie, mais alors je connaîtrai comme j’ai été connu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Maintenant donc ces trois choses demeurent: la foi, l’espérance, la charité; mais la plus grande de ces choses, c’est la charité.'
