    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La langue douce est un arbre de vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais la langue perverse brise l’âme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L’insensé dédaigne l’instruction de son père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui a égard à la réprimande agit avec prudence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il y a grande abondance dans la maison du juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il y a du trouble dans les profits du méchant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les lèvres des sages répandent la science,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais le cœur des insensés n’est pas droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
