      metadata:
        usfm: JOB.26.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le séjour des morts et l’abîme sont devant l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Combien plus '
