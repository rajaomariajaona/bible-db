      metadata:
        usfm: AMO.5.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le sacrifice des méchants est en horreur à l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais la prière des hommes droits lui est agréable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: La voie du méchant est en horreur à l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il aime celui qui poursuit la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Une correction sévère menace celui qui abandonne le sentier;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui hait la réprimande mourra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
