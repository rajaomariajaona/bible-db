      marker-yv: yv-n
    - type: text
      text: Une réponse douce calme la fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais une parole dure excite la colère.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une correction sévère menace celui qui abandonne le sentier;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui hait la réprimande mourra.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 26:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le séjour des morts et l’abîme sont devant l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Combien plus '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
