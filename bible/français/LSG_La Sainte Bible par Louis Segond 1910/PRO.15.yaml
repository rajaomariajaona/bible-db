    marker-yv: yv-n
  - type: text
    text: les cœurs des fils de l’homme!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le moqueur n’aime pas qu’on le reprenne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne va point vers les sages.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
