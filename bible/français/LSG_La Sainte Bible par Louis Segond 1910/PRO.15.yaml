  - type: text
    text: Les yeux de l’Éternel sont en tout lieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Observant les méchants et les bons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
