document_id: PRO.15,93
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Pr 25:15.
  - type: text
    content: Une réponse douce calme la fureur,
  - type: text
    content: Mais une parole dure excite la colère.
  '10':
  - type: text
    content: Une correction sévère menace celui qui abandonne le sentier;
  - type: text
    content: Celui qui hait la réprimande mourra.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Job 26:6.
  - type: text
    content: Le séjour des morts et l’abîme sont devant l’Éternel;
  - type: text
    content: 'Combien plus '
  - type: note
    content: 2 Ch 6:30. Ps 7:10; 44:22. Jé 17:9, 10. Jn 2:24, 25; 21:17. Ac 1:24.
  - type: text
    content: les cœurs des fils de l’homme!
  '12':
  - type: text
    content: Le moqueur n’aime pas qu’on le reprenne,
  - type: text
    content: Il ne va point vers les sages.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Pr 17:22; 18:14.
  - type: text
    content: Un cœur joyeux rend le visage serein;
  - type: text
    content: Mais quand le cœur est triste, l’esprit est abattu.
  '14':
  - type: text
    content: Un cœur intelligent cherche la science,
  - type: text
    content: Mais la bouche des insensés se plaît à la folie.
  '15':
  - type: text
    content: Tous les jours du malheureux sont mauvais,
  - type: text
    content: Mais le cœur content est un festin perpétuel.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ps 37:16. Pr 16:8.
  - type: text
    content: Mieux vaut peu, avec la crainte de l’Éternel,
  - type: text
    content: Qu’un grand trésor, avec le trouble.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Pr 17:1.
  - type: text
    content: Mieux vaut de l’herbe pour nourriture, là où règne l’amour,
  - type: text
    content: Qu’un bœuf engraissé, si la haine est là.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Pr 28:25; 29:22.
  - type: text
    content: Un homme violent excite des querelles,
  - type: text
    content: Mais celui qui est lent à la colère apaise les disputes.
  '19':
  - type: text
    content: Le chemin du paresseux est comme une haie d’épines,
  - type: text
    content: Mais le sentier des hommes droits est aplani.
  '2':
  - type: text
    content: La langue des sages rend la science aimable,
  - type: note
    content: Pr 12:23; 13:16; 15:28.
  - type: text
    content: Et la bouche des insensés répand la folie.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Pr 10:1.
  - type: text
    content: Un fils sage fait la joie de son père,
  - type: text
    content: Et un homme insensé méprise sa mère.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Pr 10:23; 14:9.
  - type: text
    content: La folie est une joie pour celui qui est dépourvu de sens,
  - type: text
    content: Mais un homme intelligent va le droit chemin.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Pr 11:14.
  - type: text
    content: Les projets échouent, faute d’une assemblée qui délibère;
  - type: text
    content: Mais ils réussissent quand il y a de nombreux conseillers.
  '23':
  - type: text
    content: On éprouve de la joie à donner une réponse de sa bouche;
  - type: text
    content: Et combien est agréable une parole dite à propos!
  '24':
  - type: text
    content: Pour le sage, le sentier de la vie mène en haut,
  - type: text
    content: Afin qu’il se détourne du séjour des morts qui est en bas.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Pr 2:21, 22; 12:7; 14:11.
  - type: text
    content: L’Éternel renverse la maison des orgueilleux,
  - type: text
    content: Mais il affermit les bornes de la veuve.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Pr 6:18.
  - type: text
    content: Les pensées mauvaises sont en horreur à l’Éternel,
  - type: text
    content: Mais les paroles agréables sont pures à ses yeux.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Pr 1:19.
  - type: text
    content: Celui qui est avide de gain trouble sa maison,
  - type: text
    content: Mais celui qui hait les présents vivra.
  '28':
  - type: text
    content: Le cœur du juste médite pour répondre,
  - type: text
    content: Mais la bouche des méchants répand des méchancetés.
  '29':
  - type: text
    content: L’Éternel s’éloigne des méchants,
  - type: note
    content: Ps 10:17; 34:19; 145:18, 19.
  - type: text
    content: Mais il écoute la prière des justes.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Job 34:21. Pr 5:21. Jé 16:17; 32:19.
  - type: text
    content: Les yeux de l’Éternel sont en tout lieu,
  - type: text
    content: Observant les méchants et les bons.
  '30':
  - type: text
    content: Ce qui plaît aux yeux réjouit le cœur;
  - type: note
    content: Pr 25:25.
  - type: text
    content: Une bonne nouvelle fortifie les membres.
  '31':
  - type: text
    content: L’oreille attentive aux réprimandes qui mènent à la vie
  - type: text
    content: Fait son séjour au milieu des sages.
  '32':
  - type: text
    content: Celui qui rejette la correction méprise son âme,
  - type: text
    content: Mais celui qui écoute la réprimande acquiert l’intelligence.
  '33':
  - type: text
    content: ' '
  - type: note
    content: Pr 1:7; 9:10.
  - type: text
    content: La crainte de l’Éternel enseigne la sagesse,
  - type: note
    content: Pr 18:12.
  - type: text
    content: Et l’humilité précède la gloire.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Pr 12:18; 13:14.
  - type: text
    content: La langue douce est un arbre de vie,
  - type: text
    content: Mais la langue perverse brise l’âme.
  '5':
  - type: text
    content: L’insensé dédaigne l’instruction de son père,
  - type: text
    content: Mais celui qui a égard à la réprimande agit avec prudence.
  '6':
  - type: text
    content: Il y a grande abondance dans la maison du juste,
  - type: text
    content: Mais il y a du trouble dans les profits du méchant.
  '7':
  - type: text
    content: Les lèvres des sages répandent la science,
  - type: text
    content: Mais le cœur des insensés n’est pas droit.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Pr 21:27. És 1:11. Jé 6:20. Am 5:21.
  - type: text
    content: Le sacrifice des méchants est en horreur à l’Éternel,
  - type: text
    content: Mais la prière des hommes droits lui est agréable.
  '9':
  - type: text
    content: La voie du méchant est en horreur à l’Éternel,
  - type: text
    content: Mais il aime celui qui poursuit la justice.
