        - type: text
          text: 21:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les cœurs des fils de l’homme!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le moqueur n’aime pas qu’on le reprenne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne va point vers les sages.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 17:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Un cœur joyeux rend le visage serein;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais quand le cœur est triste, l’esprit est abattu.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un cœur intelligent cherche la science,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la bouche des insensés se plaît à la folie.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les jours du malheureux sont mauvais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le cœur content est un festin perpétuel.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 37:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 16:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mieux vaut peu, avec la crainte de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’un grand trésor, avec le trouble.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 17:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mieux vaut de l’herbe pour nourriture, là où règne l’amour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’un bœuf engraissé, si la haine est là.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 28:25
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Un homme violent excite des querelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui est lent à la colère apaise les disputes.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le chemin du paresseux est comme une haie d’épines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le sentier des hommes droits est aplani.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La langue des sages rend la science aimable,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 12:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et la bouche des insensés répand la folie.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 10:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Un fils sage fait la joie de son père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un homme insensé méprise sa mère.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 10:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La folie est une joie pour celui qui est dépourvu de sens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais un homme intelligent va le droit chemin.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 11:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les projets échouent, faute d’une assemblée qui délibère;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ils réussissent quand il y a de nombreux conseillers.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On éprouve de la joie à donner une réponse de sa bouche;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et combien est agréable une parole dite à propos!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour le sage, le sentier de la vie mène en haut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin qu’il se détourne du séjour des morts qui est en bas.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 2:21
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’Éternel renverse la maison des orgueilleux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il affermit les bornes de la veuve.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 6:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les pensées mauvaises sont en horreur à l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les paroles agréables sont pures à ses yeux.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 1:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Celui qui est avide de gain trouble sa maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui hait les présents vivra.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le cœur du juste médite pour répondre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la bouche des méchants répand des méchancetés.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel s’éloigne des méchants,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 10:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 145:18
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais il écoute la prière des justes.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 34:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 5:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 16:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les yeux de l’Éternel sont en tout lieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Observant les méchants et les bons.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce qui plaît aux yeux réjouit le cœur;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 25:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Une bonne nouvelle fortifie les membres.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’oreille attentive aux réprimandes qui mènent à la vie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fait son séjour au milieu des sages.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui rejette la correction méprise son âme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui écoute la réprimande acquiert l’intelligence.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 1:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La crainte de l’Éternel enseigne la sagesse,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 18:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et l’humilité précède la gloire.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 12:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La langue douce est un arbre de vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la langue perverse brise l’âme.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’insensé dédaigne l’instruction de son père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui a égard à la réprimande agit avec prudence.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a grande abondance dans la maison du juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il y a du trouble dans les profits du méchant.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les lèvres des sages répandent la science,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le cœur des insensés n’est pas droit.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 21:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 6:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 5:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le sacrifice des méchants est en horreur à l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la prière des hommes droits lui est agréable.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La voie du méchant est en horreur à l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il aime celui qui poursuit la justice.
