      - type: text
        text: 18:14
      metadata:
        usfm: PRO.18.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Un cœur joyeux rend le visage serein;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais quand le cœur est triste, l’esprit est abattu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Un cœur intelligent cherche la science,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais la bouche des insensés se plaît à la folie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tous les jours du malheureux sont mauvais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais le cœur content est un festin perpétuel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 37:16
      metadata:
        usfm: PSA.37.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 16:8
      metadata:
        usfm: PRO.16.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mieux vaut peu, avec la crainte de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’un grand trésor, avec le trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 17:1
      metadata:
        usfm: PRO.17.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mieux vaut de l’herbe pour nourriture, là où règne l’amour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’un bœuf engraissé, si la haine est là.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 28:25
      metadata:
        usfm: PRO.28.25
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:22
      metadata:
        usfm: PRO.29.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Un homme violent excite des querelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui est lent à la colère apaise les disputes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Le chemin du paresseux est comme une haie d’épines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais le sentier des hommes droits est aplani.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:1
      metadata:
        usfm: PRO.10.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Un fils sage fait la joie de son père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et un homme insensé méprise sa mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:23
      metadata:
        usfm: PRO.10.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:9
      metadata:
        usfm: PRO.14.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La folie est une joie pour celui qui est dépourvu de sens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais un homme intelligent va le droit chemin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 11:14
      metadata:
        usfm: PRO.11.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les projets échouent, faute d’une assemblée qui délibère;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ils réussissent quand il y a de nombreux conseillers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: On éprouve de la joie à donner une réponse de sa bouche;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et combien est agréable une parole dite à propos!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Pour le sage, le sentier de la vie mène en haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin qu’il se détourne du séjour des morts qui est en bas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 2:21
      metadata:
        usfm: PRO.2.21
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: PRO.2.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:7
      metadata:
        usfm: PRO.12.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:11
      metadata:
        usfm: PRO.14.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’Éternel renverse la maison des orgueilleux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il affermit les bornes de la veuve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 6:18
      metadata:
        usfm: PRO.6.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les pensées mauvaises sont en horreur à l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais les paroles agréables sont pures à ses yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 1:19
      metadata:
        usfm: PRO.1.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui est avide de gain trouble sa maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui hait les présents vivra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Le cœur du juste médite pour répondre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais la bouche des méchants répand des méchancetés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: L’Éternel s’éloigne des méchants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 10:17
      metadata:
        usfm: PSA.10.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
