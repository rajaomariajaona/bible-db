document_id: JDG.5
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. Ex 15:1-21. Ha 3:3-15. Ps 18; 149:6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'En ce jour-là, Débora chanta ce cantique, avec Barak, fils d’Abinoam:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Des chefs se sont mis à la tête du peuple en Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et le peuple s’est montré prêt à combattre:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bénissez-en l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Rois, écoutez! Princes, prêtez l’oreille!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je chanterai, oui, je chanterai à l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je chanterai à l’Éternel, le Dieu d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: O Éternel! Quand tu sortis de Séir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand tu t’avanças des champs d’Édom,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 68:8
      metadata:
        usfm: PSA.68.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: PSA.68.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La terre trembla, et les cieux se fondirent
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les nuées se fondirent en eaux;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 68:15
      metadata:
        usfm: PSA.68.15
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: PSA.68.16
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '17'
      metadata:
        usfm: PSA.68.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 97:5
      metadata:
        usfm: PSA.97.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les montagnes s’ébranlèrent devant l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ce '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 19:18
      metadata:
        usfm: EXO.19.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Sinaï devant l’Éternel, le Dieu d’Israël.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-23: cf. Jg 3:31; 4:1-6. Ps 118:15, 16.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Au temps de Schamgar, fils d’Anath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au temps de Jaël, les routes étaient abandonnées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ceux qui voyageaient prenaient des chemins détournés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les chefs étaient sans force en Israël, sans force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand je me suis levée, moi, Débora,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand je me suis levée comme une mère en Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il avait choisi de nouveaux dieux:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors la guerre était aux portes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On ne voyait ni bouclier ni lance
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chez quarante milliers en Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mon cœur est aux chefs d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A ceux du peuple qui se sont montrés prêts à combattre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bénissez l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Vous qui montez de blanches ânesses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous qui avez pour sièges des tapis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous qui marchez sur la route, chantez!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Que de leur voix les archers, du milieu des abreuvoirs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Célèbrent les bienfaits de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les bienfaits de son conducteur en Israël!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors le peuple de l’Éternel descendit aux portes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Réveille-toi, réveille-toi, Débora!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Réveille-toi, réveille-toi, dis un cantique!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lève-toi, Barak, et emmène tes captifs, fils d’Abinoam!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Alors un reste du peuple triompha des puissants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel me donna la victoire sur les héros.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: D’Éphraïm arrivèrent les habitants d’Amalek.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A ta suite marcha Benjamin parmi ta troupe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: De Makir vinrent des chefs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de Zabulon des commandants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Les princes d’Issacar furent avec Débora,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et Issacar suivit Barak,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fut envoyé sur ses pas dans la vallée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Près des ruisseaux de Ruben,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Grandes furent les résolutions du cœur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Pourquoi es-tu resté au milieu des étables
- type: usfm
  marker: q1
  children:
  - type: text
    text: A écouter le bêlement des troupeaux?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aux ruisseaux de Ruben,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Grandes furent les délibérations du cœur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Galaad au-delà du Jourdain n’a pas quitté sa demeure.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi Dan s’est-il tenu sur les navires?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aser s’est assis sur le rivage de la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et s’est reposé dans ses ports.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Zabulon est un peuple qui affronta la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et Nephthali de même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur les hauteurs des champs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Les rois vinrent, ils combattirent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors combattirent les rois de Canaan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A Thaanac, aux eaux de Meguiddo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne remportèrent nul butin, nul argent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Des cieux on combattit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De leurs sentiers les étoiles combattirent contre Sisera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le torrent de Kison les a entraînés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le torrent des anciens temps, le torrent de Kison.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon âme, foule aux pieds les héros!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Alors les talons des chevaux retentirent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A la fuite, à la fuite précipitée de leurs guerriers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Maudissez Méroz, dit l’ange de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maudissez, maudissez ses habitants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils ne vinrent pas au secours de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au secours de l’Éternel, parmi les hommes vaillants.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 24-31: cf. Jg 4:17-24.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Bénie soit entre les femmes Jaël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Femme de Héber, le Kénien!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bénie soit-elle entre les femmes qui habitent sous les tentes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il demanda de l’eau, elle a donné du lait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans la coupe d’honneur elle a présenté de la crème.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: D’une main elle a saisi le pieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de sa droite le marteau des travailleurs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle a frappé Sisera, lui a fendu la tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fracassé et transpercé la tempe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Aux pieds de Jaël il s’est affaissé, il est tombé, il s’est couché;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A ses pieds il s’est affaissé, il est tombé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Là où il s’est affaissé, là il est tombé sans vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Par la fenêtre, à travers le treillis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'La mère de Sisera regarde, et s’écrie:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi son char tarde-t-il à venir?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi ses chars vont-ils si lentement?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Les plus sages d’entre ses femmes lui répondent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et elle se répond à elle-même:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ne trouvent-ils pas du butin? Ne le partagent-ils pas?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une jeune fille, deux jeunes filles par homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du butin en vêtements de couleur pour Sisera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du butin en vêtements de couleur, brodés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un vêtement de couleur, deux vêtements brodés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour le cou du vainqueur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Périssent ainsi tous tes ennemis, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui l’aiment sont comme le soleil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand il paraît dans sa force.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le pays fut en repos pendant quarante ans.
