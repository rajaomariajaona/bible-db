document_id: JDG.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-5: cf. Ex 15:1-21. Ha 3:3-15. Ps 18; 149:6.'
  - type: text
    content: 'En ce jour-là, Débora chanta ce cantique, avec Barak, fils d’Abinoam:'
  '10':
  - type: text
    content: Vous qui montez de blanches ânesses,
  - type: text
    content: Vous qui avez pour sièges des tapis,
  - type: text
    content: Et vous qui marchez sur la route, chantez!
  '11':
  - type: text
    content: Que de leur voix les archers, du milieu des abreuvoirs,
  - type: text
    content: Célèbrent les bienfaits de l’Éternel,
  - type: text
    content: Les bienfaits de son conducteur en Israël!
  - type: text
    content: Alors le peuple de l’Éternel descendit aux portes.
  '12':
  - type: text
    content: Réveille-toi, réveille-toi, Débora!
  - type: text
    content: Réveille-toi, réveille-toi, dis un cantique!
  - type: text
    content: Lève-toi, Barak, et emmène tes captifs, fils d’Abinoam!
  '13':
  - type: text
    content: Alors un reste du peuple triompha des puissants,
  - type: text
    content: L’Éternel me donna la victoire sur les héros.
  '14':
  - type: text
    content: D’Éphraïm arrivèrent les habitants d’Amalek.
  - type: text
    content: A ta suite marcha Benjamin parmi ta troupe.
  - type: text
    content: De Makir vinrent des chefs,
  - type: text
    content: Et de Zabulon des commandants.
  '15':
  - type: text
    content: Les princes d’Issacar furent avec Débora,
  - type: text
    content: Et Issacar suivit Barak,
  - type: text
    content: Il fut envoyé sur ses pas dans la vallée.
  - type: text
    content: Près des ruisseaux de Ruben,
  - type: text
    content: Grandes furent les résolutions du cœur!
  '16':
  - type: text
    content: Pourquoi es-tu resté au milieu des étables
  - type: text
    content: A écouter le bêlement des troupeaux?
  - type: text
    content: Aux ruisseaux de Ruben,
  - type: text
    content: Grandes furent les délibérations du cœur!
  '17':
  - type: text
    content: Galaad au-delà du Jourdain n’a pas quitté sa demeure.
  - type: text
    content: Pourquoi Dan s’est-il tenu sur les navires?
  - type: text
    content: Aser s’est assis sur le rivage de la mer,
  - type: text
    content: Et s’est reposé dans ses ports.
  '18':
  - type: text
    content: Zabulon est un peuple qui affronta la mort,
  - type: text
    content: Et Nephthali de même,
  - type: text
    content: Sur les hauteurs des champs.
  '19':
  - type: text
    content: Les rois vinrent, ils combattirent,
  - type: text
    content: Alors combattirent les rois de Canaan,
  - type: text
    content: A Thaanac, aux eaux de Meguiddo;
  - type: text
    content: Ils ne remportèrent nul butin, nul argent.
  '2':
  - type: text
    content: Des chefs se sont mis à la tête du peuple en Israël,
  - type: text
    content: 'Et le peuple s’est montré prêt à combattre:'
  - type: text
    content: Bénissez-en l’Éternel!
  '20':
  - type: text
    content: Des cieux on combattit,
  - type: text
    content: De leurs sentiers les étoiles combattirent contre Sisera.
  '21':
  - type: text
    content: Le torrent de Kison les a entraînés,
  - type: text
    content: Le torrent des anciens temps, le torrent de Kison.
  - type: text
    content: Mon âme, foule aux pieds les héros!
  '22':
  - type: text
    content: Alors les talons des chevaux retentirent,
  - type: text
    content: A la fuite, à la fuite précipitée de leurs guerriers.
  '23':
  - type: text
    content: Maudissez Méroz, dit l’ange de l’Éternel,
  - type: text
    content: Maudissez, maudissez ses habitants,
  - type: text
    content: Car ils ne vinrent pas au secours de l’Éternel,
  - type: text
    content: Au secours de l’Éternel, parmi les hommes vaillants.
  - type: heading
    content: 'V. 24-31: cf. Jg 4:17-24.'
  '24':
  - type: text
    content: Bénie soit entre les femmes Jaël,
  - type: text
    content: Femme de Héber, le Kénien!
  - type: text
    content: Bénie soit-elle entre les femmes qui habitent sous les tentes!
  '25':
  - type: text
    content: Il demanda de l’eau, elle a donné du lait,
  - type: text
    content: Dans la coupe d’honneur elle a présenté de la crème.
  '26':
  - type: text
    content: D’une main elle a saisi le pieu,
  - type: text
    content: Et de sa droite le marteau des travailleurs;
  - type: text
    content: Elle a frappé Sisera, lui a fendu la tête,
  - type: text
    content: Fracassé et transpercé la tempe.
  '27':
  - type: text
    content: Aux pieds de Jaël il s’est affaissé, il est tombé, il s’est couché;
  - type: text
    content: A ses pieds il s’est affaissé, il est tombé;
  - type: text
    content: Là où il s’est affaissé, là il est tombé sans vie.
  '28':
  - type: text
    content: Par la fenêtre, à travers le treillis,
  - type: text
    content: 'La mère de Sisera regarde, et s’écrie:'
  - type: text
    content: Pourquoi son char tarde-t-il à venir?
  - type: text
    content: Pourquoi ses chars vont-ils si lentement?
  '29':
  - type: text
    content: Les plus sages d’entre ses femmes lui répondent,
  - type: text
    content: 'Et elle se répond à elle-même:'
  '3':
  - type: text
    content: Rois, écoutez! Princes, prêtez l’oreille!
  - type: text
    content: Je chanterai, oui, je chanterai à l’Éternel,
  - type: text
    content: Je chanterai à l’Éternel, le Dieu d’Israël.
  '30':
  - type: text
    content: Ne trouvent-ils pas du butin? Ne le partagent-ils pas?
  - type: text
    content: Une jeune fille, deux jeunes filles par homme,
  - type: text
    content: Du butin en vêtements de couleur pour Sisera,
  - type: text
    content: Du butin en vêtements de couleur, brodés,
  - type: text
    content: Un vêtement de couleur, deux vêtements brodés,
  - type: text
    content: Pour le cou du vainqueur.
  '31':
  - type: text
    content: Périssent ainsi tous tes ennemis, ô Éternel!
  - type: text
    content: Ceux qui l’aiment sont comme le soleil,
  - type: text
    content: Quand il paraît dans sa force.
  - type: text
    content: Le pays fut en repos pendant quarante ans.
  '4':
  - type: text
    content: O Éternel! Quand tu sortis de Séir,
  - type: text
    content: Quand tu t’avanças des champs d’Édom,
  - type: note
    content: Ps 68:8, 9.
  - type: text
    content: La terre trembla, et les cieux se fondirent
  - type: text
    content: Et les nuées se fondirent en eaux;
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ps 68:15, 16, 17; 97:5.
  - type: text
    content: Les montagnes s’ébranlèrent devant l’Éternel,
  - type: text
    content: 'Ce '
  - type: note
    content: Ex 19:18.
  - type: text
    content: Sinaï devant l’Éternel, le Dieu d’Israël.
  - type: heading
    content: 'V. 6-23: cf. Jg 3:31; 4:1-6. Ps 118:15, 16.'
  '6':
  - type: text
    content: Au temps de Schamgar, fils d’Anath,
  - type: text
    content: Au temps de Jaël, les routes étaient abandonnées,
  - type: text
    content: Et ceux qui voyageaient prenaient des chemins détournés.
  '7':
  - type: text
    content: Les chefs étaient sans force en Israël, sans force,
  - type: text
    content: Quand je me suis levée, moi, Débora,
  - type: text
    content: Quand je me suis levée comme une mère en Israël.
  '8':
  - type: text
    content: 'Il avait choisi de nouveaux dieux:'
  - type: text
    content: Alors la guerre était aux portes;
  - type: text
    content: On ne voyait ni bouclier ni lance
  - type: text
    content: Chez quarante milliers en Israël.
  '9':
  - type: text
    content: Mon cœur est aux chefs d’Israël,
  - type: text
    content: A ceux du peuple qui se sont montrés prêts à combattre.
  - type: text
    content: Bénissez l’Éternel!
