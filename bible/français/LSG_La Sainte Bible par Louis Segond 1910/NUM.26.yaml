    marker-yv: yv-n
  - type: text
    text: 'Nadab et Abihu moururent, lorsqu’ils apportèrent devant l’Éternel du feu étranger. '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Ceux dont on fit le dénombrement, tous les mâles depuis l’âge d’un mois et au-dessus, furent vingt-trois mille. Ils ne furent pas compris dans le dénombrement des enfants d’Israël, parce qu’il ne leur fut point donné de possession au milieu des enfants d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Tels sont ceux des enfants d’Israël dont Moïse et le sacrificateur Éléazar firent le dénombrement dans les plaines de Moab, près du Jourdain, vis-à-vis de Jéricho. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Parmi eux, il n’y avait aucun des enfants d’Israël dont Moïse et le sacrificateur Aaron avaient fait le dénombrement dans le désert de Sinaï. '
  - type: usfm
    marker: v
    metadata:
