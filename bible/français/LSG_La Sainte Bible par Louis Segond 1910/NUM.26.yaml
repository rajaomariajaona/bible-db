document_id: NUM.26,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Nouveau dénombrement à la sortie du désert
  - type: heading
    content: 'V. 1-56: cf. No 1; 2. 1 Ch 2 à 8. (Ap 7:4-8.)'
  - type: text
    content: 'A la suite de cette plaie, l’Éternel dit à Moïse et à Éléazar, fils du sacrificateur Aaron: '
  '10':
  - type: text
    content: 'La terre ouvrit sa bouche, et les engloutit avec Koré, quand moururent ceux qui s’étaient assemblés, et que le feu consuma les deux cent cinquante hommes: ils servirent au peuple d’avertissement. '
  '11':
  - type: text
    content: 'Les fils de Koré ne moururent pas. '
  '12':
  - type: text
    content: 'Fils de Siméon, selon leurs familles: de Nemuel descend la famille des Nemuélites; de Jamin, la famille des Jaminites; de Jakin, la famille des Jakinites; '
  '13':
  - type: text
    content: 'de Zérach, la famille des Zérachites; de Saül, la famille des Saülites. '
  '14':
  - type: text
    content: 'Ce sont là les familles des Siméonites; vingt-deux mille deux cents. '
  '15':
  - type: text
    content: 'Fils de Gad, selon leurs familles: de Tsephon descend la famille des Tsephonites; de Haggi, la famille des Haggites; de Schuni, la famille des Schunites; '
  '16':
  - type: text
    content: 'd’Ozni, la famille des Oznites; d’Éri, la famille des Érites; '
  '17':
  - type: text
    content: 'd’Arod, la famille des Arodites; d’Areéli, la famille des Areélites. '
  '18':
  - type: text
    content: 'Ce sont là les familles des fils de Gad, d’après leur dénombrement: quarante mille cinq cents. '
  '19':
  - type: text
    content: 'Fils de Juda: Er et Onan; '
  - type: note
    content: Ge 38:7, 10; 46:12.
  - type: text
    content: 'mais Er et Onan moururent au pays de Canaan. '
  '2':
  - type: text
    content: 'Faites le dénombrement de toute l’assemblée des enfants d’Israël, '
  - type: note
    content: No 1:3.
  - type: text
    content: 'depuis l’âge de vingt ans et au-dessus, selon les maisons de leurs pères, de tous ceux d’Israël en état de porter les armes. '
  '20':
  - type: text
    content: 'Voici les fils de Juda, selon leurs familles: de Schéla descend la famille des Schélanites; de Pérets, la famille des Péretsites; de Zérach, la famille des Zérachites. '
  '21':
  - type: text
    content: 'Les fils de '
  - type: note
    content: Ge 46:12.
  - type: text
    content: 'Pérets furent: Hetsron, de qui descend la famille des Hetsronites; Hamul, de qui descend la famille des Hamulites. '
  '22':
  - type: text
    content: 'Ce sont là les familles de Juda, d’après leur dénombrement: soixante-seize mille cinq cents. '
  '23':
  - type: text
    content: 'Fils d’Issacar, selon leurs familles: de Thola descend la famille des Tholaïtes; de Puva, la famille des Puvites; '
  '24':
  - type: text
    content: 'de Jaschub, la famille des Jaschubites; de Schimron, la famille des Schimronites. '
  '25':
  - type: text
    content: 'Ce sont là les familles d’Issacar, d’après leur dénombrement: soixante quatre mille trois cents. '
  '26':
  - type: text
    content: 'Fils de Zabulon, selon leurs familles: de Séred descend la famille des Sardites; d’Élon, la famille des Élonites; de Jahleel, la famille des Jahleélites. '
  '27':
  - type: text
    content: 'Ce sont là les familles des Zabulonites, d’après leur dénombrement: soixante mille cinq cents. '
  '28':
  - type: text
    content: 'Fils de Joseph, selon leurs familles: Manassé et Éphraïm. '
  '29':
  - type: text
    content: 'Fils de Manassé: '
  - type: note
    content: Jos 17:1.
  - type: text
    content: 'de Makir descend la famille des Makirites. Makir engendra Galaad. De Galaad descend la famille des Galaadites. '
  '3':
  - type: text
    content: 'Moïse et le sacrificateur Éléazar leur parlèrent dans les plaines de Moab, près du Jourdain, vis-à-vis de Jéricho. Ils dirent: '
  '30':
  - type: text
    content: 'Voici les fils de Galaad: Jézer, de qui descend la famille des Jézerites; Hélek, la famille des Hélekites; '
  '31':
  - type: text
    content: 'Asriel, la famille des Asriélites; Sichem, la famille des Sichémites; '
  '32':
  - type: text
    content: 'Schemida, la famille des Schemidaïtes; Hépher, la famille des Héphrites. '
  '33':
  - type: note
    content: No 27:1.
  - type: text
    content: 'Tselophchad, fils de Hépher, n’eut point de fils, mais il eut des filles. Voici les noms des filles de Tselophchad: Machla, Noa, Hogla, Milca et Thirtsa. '
  '34':
  - type: text
    content: 'Ce sont là les familles de Manassé, d’après leur dénombrement: cinquante deux mille sept cents. '
  '35':
  - type: text
    content: 'Voici les fils d’Éphraïm, selon leurs familles: de Schutélach descend la famille des Schutalchites; de Béker, la famille des Bakrites; de Thachan, la famille des Thachanites. '
  '36':
  - type: text
    content: 'Voici les fils de Schutélach: d’Éran est descendue la famille des Éranites. '
  '37':
  - type: text
    content: 'Ce sont là les familles des fils d’Éphraïm, d’après leur dénombrement: trente-deux mille cinq cents. Ce sont là les fils de Joseph, selon leurs familles. '
  '38':
  - type: text
    content: 'Fils de Benjamin, selon leurs familles: de Béla descend la famille des Balites; d’Aschbel, la famille des Aschbélites; d’Achiram, la famille des Achiramites; '
  '39':
  - type: text
    content: 'de Schupham, la famille des Schuphamites; de Hupham, la famille des Huphamites. '
  '4':
  - type: text
    content: 'On fera le dénombrement, depuis l’âge de vingt ans et au-dessus, '
  - type: note
    content: No 1:1, 2, 3.
  - type: text
    content: 'comme l’Éternel l’avait ordonné à Moïse et aux enfants d’Israël, quand ils furent sortis du pays d’Égypte. '
  '40':
  - type: text
    content: 'Les fils de Béla furent: Ard et Naaman. D’Ard descend la famille des Ardites; de Naaman, la famille des Naamanites. '
  '41':
  - type: text
    content: 'Ce sont là les fils de Benjamin, selon leurs familles et d’après leur dénombrement; quarante-cinq mille six cents. '
  '42':
  - type: text
    content: 'Voici les fils de Dan, selon leurs familles: de Schucham descend la famille des Schuchamites. Ce sont là les familles de Dan, selon leurs familles. '
  '43':
  - type: text
    content: 'Total pour les familles des Schuchamites, d’après leur dénombrement: soixante-quatre mille quatre cents. '
  '44':
  - type: text
    content: 'Fils d’Aser, selon leurs familles: de Jimna descend la famille des Jimnites; de Jischvi, la famille des Jischvites; de Beria, la famille des Beriites. '
  '45':
  - type: text
    content: 'Des fils de Beria descendent: de Héber, la famille des Hébrites; de Malkiel, la famille des Malkiélites. '
  '46':
  - type: text
    content: 'Le nom de la fille d’Aser était Sérach. '
  '47':
  - type: text
    content: 'Ce sont là les familles des fils d’Aser, d’après leur dénombrement: cinquante-trois mille quatre cents. '
  '48':
  - type: text
    content: 'Fils de Nephthali, selon leurs familles: de Jahtseel descend la famille des Jahtseélites; de Guni, la famille des Gunites; '
  '49':
  - type: text
    content: 'de Jetser, la famille des Jitsrites; de Schillem, la famille des Schillémites. '
  '5':
  - type: text
    content: 'Ruben, '
  - type: note
    content: Ge 46:9. Ex 6:13. 1 Ch 5:1.
  - type: text
    content: 'premier-né d’Israël. Fils de Ruben: Hénoc de qui descend la famille des Hénokites; Pallu, de qui descend la famille des Palluites; '
  '50':
  - type: text
    content: 'Ce sont là les familles de Nephthali, selon leurs familles et d’après leur dénombrement: quarante-cinq mille quatre cents. '
  '51':
  - type: text
    content: 'Tels sont ceux des enfants d’Israël dont on fit le dénombrement: six cent un mille sept cent trente. '
  '52':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '53':
  - type: text
    content: 'Le pays sera partagé entre eux, pour être leur propriété, selon le nombre des noms. '
  '54':
  - type: note
    content: No 33:54.
  - type: text
    content: 'A ceux qui sont en plus grand nombre tu donneras une portion plus grande, et à ceux qui sont en plus petit nombre tu donneras une portion plus petite; on donnera à chacun sa portion d’après le dénombrement. '
  '55':
  - type: text
    content: 'Mais le partage du pays '
  - type: note
    content: No 33:54. Jos 11:23; 14:2.
  - type: text
    content: 'aura lieu par le sort; ils le recevront en propriété selon les noms des tribus de leurs pères. '
  '56':
  - type: text
    content: C’est par le sort que le pays sera partagé entre ceux qui sont en grand nombre et ceux qui sont en petit nombre.
  - type: heading
    content: 'V. 57-65: cf. (No 3:14-39. 1 Ch 6.) (No 14:29-35. Ro 3:3.)'
  '57':
  - type: text
    content: ' '
  - type: note
    content: Ex 6:16, 17, 18, 19.
  - type: text
    content: 'Voici les Lévites dont on fit le dénombrement, selon leurs familles: de Guerschon descend la famille des Guerschonites; de Kehath, la famille des Kehathites; de Merari, la famille des Merarites. '
  '58':
  - type: text
    content: 'Voici les familles de Lévi: la famille des Libnites, la famille des Hébronites, la famille des Machlites, la famille des Muschites, la famille des Korites. Kehath engendra Amram. '
  '59':
  - type: note
    content: Ex 2:1, 2; 6:19.
  - type: text
    content: 'Le nom de la femme d’Amram était Jokébed, fille de Lévi, laquelle naquit à Lévi, en Égypte; elle enfanta à Amram: Aaron, Moïse, et Marie, leur sœur. '
  '6':
  - type: text
    content: 'Hetsron, de qui descend la famille des Hetsronites; Carmi, de qui descend la famille des Carmites. '
  '60':
  - type: text
    content: 'Il naquit à Aaron: Nadab et Abihu, Éléazar et Ithamar. '
  '61':
  - type: note
    content: Lé 10:2. No 3:4. 1 Ch 24:2.
  - type: text
    content: 'Nadab et Abihu moururent, lorsqu’ils apportèrent devant l’Éternel du feu étranger. '
  '62':
  - type: text
    content: 'Ceux dont on fit le dénombrement, tous les mâles depuis l’âge d’un mois et au-dessus, furent vingt-trois mille. Ils ne furent pas compris dans le dénombrement des enfants d’Israël, parce qu’il ne leur fut point donné de possession au milieu des enfants d’Israël. '
  '63':
  - type: text
    content: 'Tels sont ceux des enfants d’Israël dont Moïse et le sacrificateur Éléazar firent le dénombrement dans les plaines de Moab, près du Jourdain, vis-à-vis de Jéricho. '
  '64':
  - type: text
    content: 'Parmi eux, il n’y avait aucun des enfants d’Israël dont Moïse et le sacrificateur Aaron avaient fait le dénombrement dans le désert de Sinaï. '
  '65':
  - type: note
    content: No 14:28, 29, 34, 35. 1 Co 10:5, 6.
  - type: text
    content: 'Car l’Éternel avait dit: ils mourront dans le désert, et il n’en restera pas un, excepté Caleb, fils de Jephunné, et Josué, fils de Nun.'
  '7':
  - type: text
    content: 'Ce sont là les familles des Rubénites: ceux dont on fit le dénombrement furent quarante-trois mille sept cent trente. '
  '8':
  - type: text
    content: 'Fils de Pallu: Éliab. '
  '9':
  - type: text
    content: 'Fils d’Éliab: Nemuel, Dathan et Abiram. '
  - type: note
    content: No 16:12.
  - type: text
    content: 'C’est ce Dathan et cet Abiram, qui étaient de ceux que l’on convoquait à l’assemblée, et qui se soulevèrent contre Moïse et Aaron, dans l’assemblée de Koré, lors de leur révolte contre l’Éternel. '
