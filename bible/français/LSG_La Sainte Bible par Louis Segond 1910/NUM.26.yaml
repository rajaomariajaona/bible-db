    marker-yv: yv-n
  - type: text
    text: 'Le nom de la femme d’Amram était Jokébed, fille de Lévi, laquelle naquit à Lévi, en Égypte; elle enfanta à Amram: Aaron, Moïse, et Marie, leur sœur. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Il naquit à Aaron: Nadab et Abihu, Éléazar et Ithamar. '
  - type: usfm
    marker: v
    metadata:
