document_id: JER.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pourquoi le méchant prospère-t-il?
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. Ps 73. (Pr 24:10. Hé 12:2-4.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tu es trop juste, Éternel, pour que je conteste avec toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je veux néanmoins t’adresser la parole sur tes jugements:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 21:7
      metadata:
        usfm: JOB.21.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 73:11
      metadata:
        usfm: PSA.73.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: PSA.73.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ha 1:3
      metadata:
        usfm: HAB.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pourquoi la voie des méchants est-elle prospère?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi tous les perfides vivent-ils en paix?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tu les as plantés, ils ont pris racine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils croissent, ils portent du fruit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu es près de leur '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 29:13
      metadata:
        usfm: ISA.29.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais loin de leur cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et toi, Éternel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 17:3
      metadata:
        usfm: PSA.17.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 139:1
      metadata:
        usfm: PSA.139.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: tu me connais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu me vois, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 11:20
      metadata:
        usfm: JER.11.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: tu sondes mon cœur qui est avec toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enlève-les comme des brebis qu’on doit égorger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et prépare-les pour le jour du carnage!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Jusques à quand le pays sera-t-il dans le deuil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’herbe de tous les champs sera-t-elle desséchée?
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de la méchanceté des habitants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 4:25
      metadata:
        usfm: JER.4.25
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:20
      metadata:
        usfm: JER.7.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:10
      metadata:
        usfm: JER.9.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les bêtes et les oiseaux périssent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car ils disent: Il ne verra pas notre fin.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Si tu cours avec des piétons et qu’ils te fatiguent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment pourras-tu lutter avec des chevaux?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et si tu ne te crois en sûreté que dans une contrée paisible,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que feras-tu sur les rives orgueilleuses du Jourdain?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Car tes frères eux-mêmes et la maison de ton père te trahissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils crient eux-mêmes à pleine voix derrière toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 26:25
      metadata:
        usfm: PRO.26.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ne les crois pas, quand ils te diront des paroles amicales.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le pays ravagé. Prophétie sur ses dévastateurs
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-13: cf. Jé 4:6, etc. 2 R 24:1, etc.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: J’ai abandonné ma maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai délaissé mon héritage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai livré l’objet de mon amour aux mains de ses ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mon héritage a été pour moi comme un lion dans la forêt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a poussé contre moi ses rugissements;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pourquoi je l’ai pris en haine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mon héritage a été pour moi un oiseau de proie, une hyène;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi les oiseaux de proie viendront de tous côtés contre lui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Allez, rassemblez tous les animaux des champs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Faites-les venir pour qu’ils le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:33
      metadata:
        usfm: JER.7.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: dévorent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 6:3
      metadata:
        usfm: JER.6.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: bergers nombreux ravagent ma vigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils foulent mon champ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils réduisent le champ de mes délices
- type: usfm
  marker: q1
  children:
  - type: text
    text: En un désert, en une solitude.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils le réduisent en un désert;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est en deuil, il est désolé devant moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout le pays est ravagé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car nul n’y prend garde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Sur tous les lieux élevés du désert arrivent les dévastateurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car le glaive de l’Éternel dévore le pays d’un bout à l’autre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y a de paix pour aucun homme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils ont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 26:16
      metadata:
        usfm: LEV.26.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:38
      metadata:
        usfm: DEU.28.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: semé du froment, et ils moissonnent des épines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se sont fatigués sans profit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ayez honte de ce que vous récoltez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par suite de la colère ardente de l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-17: cf. Jé 25:9-11. Za 2:8-11.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ainsi parle l’Éternel sur tous mes méchants voisins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Qui attaquent l’héritage que j’ai donné à mon peuple d’Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, je les arracherai de leur pays,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 30:3
      metadata:
        usfm: DEU.30.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 32:37
      metadata:
        usfm: JER.32.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et j’arracherai la maison de Juda du milieu d’eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais après que je les aurai arrachés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’aurai de nouveau compassion d’eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je les ramènerai chacun dans son héritage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacun dans son pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Et s’ils apprennent les voies de mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'S’ils jurent par mon nom, en disant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel est vivant!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme ils ont enseigné à mon peuple à jurer par Baal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors ils jouiront du bonheur au milieu de mon peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 60:12
      metadata:
        usfm: ISA.60.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais s’ils n’écoutent rien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je détruirai une telle nation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je la détruirai, je la ferai périr, dit l’Éternel.
