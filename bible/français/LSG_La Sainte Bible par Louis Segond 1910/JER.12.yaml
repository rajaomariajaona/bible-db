document_id: JER.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Pourquoi le méchant prospère-t-il?
  - type: heading
    content: 'V. 1-6: cf. Ps 73. (Pr 24:10. Hé 12:2-4.)'
  - type: text
    content: Tu es trop juste, Éternel, pour que je conteste avec toi;
  - type: text
    content: 'Je veux néanmoins t’adresser la parole sur tes jugements:'
  - type: note
    content: Job 21:7. Ps 73:11, 12. Ha 1:3.
  - type: text
    content: Pourquoi la voie des méchants est-elle prospère?
  - type: text
    content: Pourquoi tous les perfides vivent-ils en paix?
  '10':
  - type: text
    content: 'Des '
  - type: note
    content: Jé 6:3.
  - type: text
    content: bergers nombreux ravagent ma vigne,
  - type: text
    content: Ils foulent mon champ;
  - type: text
    content: Ils réduisent le champ de mes délices
  - type: text
    content: En un désert, en une solitude.
  '11':
  - type: text
    content: Ils le réduisent en un désert;
  - type: text
    content: Il est en deuil, il est désolé devant moi.
  - type: text
    content: Tout le pays est ravagé,
  - type: text
    content: Car nul n’y prend garde.
  '12':
  - type: text
    content: Sur tous les lieux élevés du désert arrivent les dévastateurs,
  - type: text
    content: Car le glaive de l’Éternel dévore le pays d’un bout à l’autre;
  - type: text
    content: Il n’y a de paix pour aucun homme.
  '13':
  - type: text
    content: 'Ils ont '
  - type: note
    content: Lé 26:16. De 28:38.
  - type: text
    content: semé du froment, et ils moissonnent des épines,
  - type: text
    content: Ils se sont fatigués sans profit.
  - type: text
    content: Ayez honte de ce que vous récoltez,
  - type: text
    content: Par suite de la colère ardente de l’Éternel.
  - type: heading
    content: 'V. 14-17: cf. Jé 25:9-11. Za 2:8-11.'
  '14':
  - type: text
    content: Ainsi parle l’Éternel sur tous mes méchants voisins,
  - type: text
    content: 'Qui attaquent l’héritage que j’ai donné à mon peuple d’Israël:'
  - type: text
    content: Voici, je les arracherai de leur pays,
  - type: note
    content: De 30:3. Jé 32:37.
  - type: text
    content: Et j’arracherai la maison de Juda du milieu d’eux.
  '15':
  - type: text
    content: Mais après que je les aurai arrachés,
  - type: text
    content: J’aurai de nouveau compassion d’eux,
  - type: text
    content: Et je les ramènerai chacun dans son héritage,
  - type: text
    content: Chacun dans son pays.
  '16':
  - type: text
    content: Et s’ils apprennent les voies de mon peuple,
  - type: text
    content: 'S’ils jurent par mon nom, en disant:'
  - type: text
    content: L’Éternel est vivant!
  - type: text
    content: Comme ils ont enseigné à mon peuple à jurer par Baal,
  - type: text
    content: Alors ils jouiront du bonheur au milieu de mon peuple.
  '17':
  - type: text
    content: ' '
  - type: note
    content: És 60:12.
  - type: text
    content: Mais s’ils n’écoutent rien,
  - type: text
    content: Je détruirai une telle nation,
  - type: text
    content: Je la détruirai, je la ferai périr, dit l’Éternel.
  '2':
  - type: text
    content: Tu les as plantés, ils ont pris racine,
  - type: text
    content: Ils croissent, ils portent du fruit;
  - type: text
    content: 'Tu es près de leur '
  - type: note
    content: És 29:13.
  - type: text
    content: bouche,
  - type: text
    content: Mais loin de leur cœur.
  '3':
  - type: text
    content: 'Et toi, Éternel, '
  - type: note
    content: Ps 17:3; 139:1.
  - type: text
    content: tu me connais,
  - type: text
    content: 'Tu me vois, '
  - type: note
    content: Jé 11:20.
  - type: text
    content: tu sondes mon cœur qui est avec toi.
  - type: text
    content: Enlève-les comme des brebis qu’on doit égorger,
  - type: text
    content: Et prépare-les pour le jour du carnage!
  '4':
  - type: text
    content: Jusques à quand le pays sera-t-il dans le deuil,
  - type: text
    content: Et l’herbe de tous les champs sera-t-elle desséchée?
  - type: text
    content: A cause de la méchanceté des habitants,
  - type: note
    content: Jé 4:25; 7:20; 9:10.
  - type: text
    content: Les bêtes et les oiseaux périssent.
  - type: text
    content: 'Car ils disent: Il ne verra pas notre fin.'
  '5':
  - type: text
    content: Si tu cours avec des piétons et qu’ils te fatiguent,
  - type: text
    content: Comment pourras-tu lutter avec des chevaux?
  - type: text
    content: Et si tu ne te crois en sûreté que dans une contrée paisible,
  - type: text
    content: Que feras-tu sur les rives orgueilleuses du Jourdain?
  '6':
  - type: text
    content: Car tes frères eux-mêmes et la maison de ton père te trahissent,
  - type: text
    content: Ils crient eux-mêmes à pleine voix derrière toi.
  - type: note
    content: Pr 26:25.
  - type: text
    content: Ne les crois pas, quand ils te diront des paroles amicales.
  - type: heading
    content: Le pays ravagé. Prophétie sur ses dévastateurs
  - type: heading
    content: 'V. 7-13: cf. Jé 4:6, etc. 2 R 24:1, etc.'
  '7':
  - type: text
    content: J’ai abandonné ma maison,
  - type: text
    content: J’ai délaissé mon héritage,
  - type: text
    content: J’ai livré l’objet de mon amour aux mains de ses ennemis.
  '8':
  - type: text
    content: Mon héritage a été pour moi comme un lion dans la forêt,
  - type: text
    content: Il a poussé contre moi ses rugissements;
  - type: text
    content: C’est pourquoi je l’ai pris en haine.
  '9':
  - type: text
    content: Mon héritage a été pour moi un oiseau de proie, une hyène;
  - type: text
    content: Aussi les oiseaux de proie viendront de tous côtés contre lui.
  - type: text
    content: Allez, rassemblez tous les animaux des champs,
  - type: text
    content: 'Faites-les venir pour qu’ils le '
  - type: note
    content: Jé 7:33.
  - type: text
    content: dévorent!
