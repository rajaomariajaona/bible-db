document_id: 2CH.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ozias, roi de Juda. Prospérité et force
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-15: cf. 2 R 14:21, 22; 15:1-4. Ps 1:1-3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 14:21
      metadata:
        usfm: 2KI.14.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout le peuple de Juda prit Ozias, âgé de seize ans, et l’établit roi à la place de son père Amatsia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 14:22
      metadata:
        usfm: 2KI.14.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ozias rebâtit Éloth et la fit rentrer sous la puissance de Juda, après que le roi fut couché avec ses pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 15:2
      metadata:
        usfm: 2KI.15.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ozias avait seize ans lorsqu’il devint roi, et il régna cinquante-deux ans à Jérusalem. Sa mère s’appelait Jecolia, de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il fit ce qui est droit aux yeux de l’Éternel, entièrement comme avait fait Amatsia, son père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il s’appliqua à rechercher Dieu pendant la vie de Zacharie, qui avait l’intelligence des visions de Dieu; et dans le temps où il rechercha l’Éternel, Dieu le fit prospérer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il se mit en guerre contre les Philistins; et il abattit les murs de Gath, les murs de Jabné, et les murs d’Asdod, et construisit des villes dans le territoire d’Asdod, et parmi les Philistins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dieu l’aida contre les Philistins, contre les Arabes qui habitaient à Gur-Baal, et contre les Maonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les Ammonites faisaient des présents à Ozias, et sa renommée s’étendit jusqu’aux frontières de l’Égypte, car il devint très puissant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ozias bâtit des tours à Jérusalem sur la porte de l’angle, sur la porte de la vallée, et sur l’angle, et il les fortifia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il bâtit des tours dans le désert, et il creusa beaucoup de citernes, parce qu’il avait de nombreux troupeaux dans les vallées et dans la plaine, et des laboureurs et des vignerons dans les montagnes et au Carmel, car il aimait l’agriculture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ozias avait une armée de soldats qui allaient à la guerre par bandes, comptées d’après le dénombrement qu’en firent le secrétaire Jeïel et le commissaire Maaséja, et placées sous les ordres de Hanania, l’un des chefs du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le nombre total des chefs de maisons paternelles, des vaillants guerriers, était de deux mille six cents. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils commandaient à une armée de trois cent sept mille cinq cents soldats capables de soutenir le roi contre l’ennemi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ozias leur procura pour toute l’armée des boucliers, des lances, des casques, des cuirasses, des arcs et des frondes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il fit faire à Jérusalem des machines inventées par un ingénieur, et destinées à être placées sur les tours et sur les angles, pour lancer des flèches et de grosses pierres. Sa renommée s’étendit au loin, car il fut merveilleusement soutenu jusqu’à ce qu’il devînt puissant.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Acte de profanation dans le temple. Ozias frappé de la lèpre
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-23: cf. 2 R 15:5-7. (No 12. 2 R 5:20-27.) Da 4:37. 1 Ti 5:20, 21.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais lorsqu’il fut puissant, son cœur s’éleva pour le perdre. Il pécha contre l’Éternel, son Dieu: il entra dans le temple de l’Éternel pour brûler des parfums sur l’autel des parfums. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le sacrificateur Azaria entra après lui, avec quatre-vingts sacrificateurs de l’Éternel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'hommes courageux, qui s’opposèrent au roi Ozias et lui dirent: Tu n’as pas le droit, Ozias, d’offrir des parfums à l’Éternel! Ce droit appartient aux sacrificateurs, fils d’Aaron, qui ont été consacrés pour les offrir. Sors du sanctuaire, car tu commets un péché! Et cela ne tournera pas à ton honneur devant l’Éternel Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'La colère s’empara d’Ozias, qui tenait un encensoir à la main. Et comme il s’irritait contre les sacrificateurs, la lèpre éclata sur son front, en présence des sacrificateurs, dans la maison de l’Éternel, près de l’autel des parfums. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le souverain sacrificateur Azaria et tous les sacrificateurs portèrent les regards sur lui, et voici, il avait la lèpre au front. Ils le mirent précipitamment dehors, et lui-même se hâta de sortir, parce que l’Éternel l’avait frappé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 15:5
      metadata:
        usfm: 2KI.15.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi Ozias fut lépreux jusqu’au jour de sa mort, et il demeura dans une maison écartée comme lépreux, car il fut exclu de la maison de l’Éternel. Et Jotham, son fils, était à la tête de la maison du roi et jugeait le peuple du pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le reste des actions d’Ozias, les premières et les dernières, a été écrit par Ésaïe, fils d’Amots, le prophète. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ozias se coucha avec ses pères, et on l’enterra avec ses pères dans le champ de la sépulture des rois, car on disait: Il est lépreux. Et Jotham, son fils, régna à sa place.'
