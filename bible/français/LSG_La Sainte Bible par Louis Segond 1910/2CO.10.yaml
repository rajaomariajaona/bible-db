document_id: 2CO.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul défend son ministère
  - type: heading
    content: 'V. 1-11: cf. 1 Co 2:1-5. Ro 15:17-19. 2 Co 6:4-7; 13:2-4, 10.'
  - type: text
    content: 'Moi Paul, je vous prie, par la douceur et la bonté de Christ, moi, humble d’apparence quand je suis au milieu de vous, et plein de hardiesse à votre égard quand je suis éloigné, '
  '10':
  - type: text
    content: 'Car, dit-on, ses lettres sont sévères et fortes; mais, présent en personne, il est faible, et sa parole est méprisable. '
  '11':
  - type: text
    content: Que celui qui parle de la sorte considère que tels nous sommes en paroles dans nos lettres, étant absents, tels aussi nous sommes dans nos actes, étant présents.
  - type: heading
    content: 'V. 12-18: cf. Ro 15:17-21. 1 Co 15:9, 10.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 2 Co 3:1; 5:12.
  - type: text
    content: 'Nous n’osons pas nous égaler ou nous comparer à quelques-uns de ceux qui se recommandent eux-mêmes. Mais, en se mesurant à leur propre mesure et en se comparant à eux-mêmes, ils manquent d’intelligence. '
  '13':
  - type: text
    content: 'Pour nous, nous ne voulons pas nous glorifier hors de toute mesure; '
  - type: note
    content: Ép 4:7.
  - type: text
    content: 'nous prendrons, au contraire, pour mesure les limites du partage que Dieu nous a assigné, de manière à nous faire venir aussi jusqu’à vous. '
  '14':
  - type: text
    content: 'Nous ne dépassons point nos limites, comme si nous n’étions pas venus jusqu’à vous; car c’est bien jusqu’à vous que nous sommes arrivés avec l’Évangile de Christ. '
  '15':
  - type: text
    content: 'Ce n’est pas hors de toute mesure, ce n’est pas des travaux d’autrui, que nous nous glorifions; mais c’est avec l’espérance, si votre foi augmente, de grandir encore d’avantage parmi vous, selon les limites qui nous sont assignées, '
  '16':
  - type: text
    content: 'et d’annoncer l’Évangile au-delà de chez vous, sans nous glorifier de ce qui a été fait dans les limites assignées à d’autres. '
  '17':
  - type: note
    content: És 65:16. Jé 9:23. 1 Co 1:31.
  - type: text
    content: 'Que celui qui se glorifie se glorifie dans le Seigneur. '
  '18':
  - type: note
    content: Pr 27:2.
  - type: text
    content: Car ce n’est pas celui qui se recommande lui-même qui est approuvé, c’est celui que le Seigneur recommande.
  '2':
  - type: text
    content: 'je vous prie, lorsque je serai présent, de ne pas me forcer à recourir avec assurance à cette hardiesse, dont je me propose d’user contre quelques-uns qui nous regardent comme marchant selon la chair. '
  '3':
  - type: text
    content: 'Si nous marchons dans la chair, nous ne combattons pas selon la chair. '
  '4':
  - type: note
    content: Ép 6:13, etc.
  - type: text
    content: 'Car les armes avec lesquelles nous combattons ne sont pas charnelles; mais elles sont puissantes, par la vertu de Dieu, '
  - type: note
    content: Jé 1:10.
  - type: text
    content: 'pour renverser des forteresses. '
  '5':
  - type: text
    content: 'Nous renversons les raisonnements et toute hauteur qui s’élève contre la connaissance de Dieu, et nous amenons toute pensée captive à l’obéissance de Christ. '
  '6':
  - type: text
    content: 'Nous sommes prêts aussi à punir toute désobéissance, lorsque votre obéissance sera complète. '
  '7':
  - type: text
    content: 'Vous regardez à l’apparence! Si quelqu’un se persuade qu’il est de Christ, qu’il se dise bien en lui-même que, comme il est de Christ, nous aussi nous sommes de Christ. '
  '8':
  - type: text
    content: 'Et quand même je me glorifierais un peu trop de l’autorité que le Seigneur nous a donnée '
  - type: note
    content: 2 Co 13:10.
  - type: text
    content: 'pour votre édification et non pour votre destruction, je ne saurais en avoir honte, '
  '9':
  - type: text
    content: 'afin que je ne paraisse pas vouloir vous intimider par mes lettres. '
