document_id: 1CO.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: État moral de l’Église de Corinthe. Censure des désordres qui y règnent
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. 1 Ti 1:19, 20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On entend dire généralement qu’il y a parmi vous de l’impudicité, et une impudicité telle qu’elle ne se rencontre pas même chez les païens; c’est au point que l’un de vous a '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 18:8
      metadata:
        usfm: LEV.18.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 27:20
      metadata:
        usfm: DEU.27.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la femme de son père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et vous êtes enflés d’orgueil! Et vous n’avez pas été plutôt dans l’affliction, afin que celui qui a commis cet acte fût ôté du milieu de vous! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 2:5
      metadata:
        usfm: COL.2.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pour moi, absent de corps, mais présent d’esprit, j’ai déjà jugé, comme si j’étais présent, celui qui a commis un tel acte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Au nom du Seigneur Jésus, vous et mon esprit étant assemblés avec la puissance de notre Seigneur Jésus, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:20
      metadata:
        usfm: 1TI.1.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: qu’un tel homme soit livré à Satan pour la destruction de la chair, afin que l’esprit soit sauvé au jour du Seigneur Jésus.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-8: cf. Ga 5:9, 12. Hé 12:15; 10:22.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C’est bien à tort que vous vous glorifiez. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:9
      metadata:
        usfm: GAL.5.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ne savez-vous pas qu’un peu de levain fait lever toute la pâte? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Faites disparaître le vieux levain, afin que vous soyez une pâte nouvelle, puisque vous êtes sans levain, car Christ, notre '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 53:7
      metadata:
        usfm: ISA.53.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:29
      metadata:
        usfm: JHN.1.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:3
      metadata:
        usfm: 1CO.15.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pâque, a été immolé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Célébrons donc la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:3
      metadata:
        usfm: EXO.12.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: EXO.12.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'fête, non '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 16:3
      metadata:
        usfm: DEU.16.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: avec du vieux levain, non avec un levain de malice et de méchanceté, mais avec les pains sans levain de la pureté et de la vérité.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-13: cf. 2 Th 3:6. Mt 18:15-20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je vous ai écrit dans ma lettre '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:2
      metadata:
        usfm: DEU.7.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 18:17
      metadata:
        usfm: MAT.18.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 6:14
      metadata:
        usfm: 2CO.6.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:11
      metadata:
        usfm: EPH.5.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:14
      metadata:
        usfm: 2TH.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de ne pas avoir des relations avec les impudiques, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'non pas d’une manière absolue avec les impudiques de ce monde, ou avec les cupides et les ravisseurs, ou avec les idolâtres; autrement, il vous faudrait sortir du monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Maintenant, ce que je vous ai écrit, c’est de ne pas avoir des relations avec quelqu’un qui, se nommant frère, est impudique, ou cupide, ou idolâtre, ou outrageux, ou ivrogne, ou ravisseur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 12:14
      metadata:
        usfm: NUM.12.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 18:17
      metadata:
        usfm: MAT.18.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:14
      metadata:
        usfm: 2TH.3.14
    - type: text
      text: . 2 Jn v. 10.
    marker-yv: yv-n
  - type: text
    text: 'de ne pas même manger avec un tel homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Qu’ai-je, en effet, à juger ceux du dehors? N’est-ce pas ceux du dedans que vous avez à juger? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Pour ceux du dehors, Dieu les juge. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 13:5
      metadata:
        usfm: DEU.13.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Otez le méchant du milieu de vous.
