document_id: 1CO.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: État moral de l’Église de Corinthe. Censure des désordres qui y règnent
  - type: heading
    content: 'V. 1-5: cf. 1 Ti 1:19, 20.'
  - type: text
    content: 'On entend dire généralement qu’il y a parmi vous de l’impudicité, et une impudicité telle qu’elle ne se rencontre pas même chez les païens; c’est au point que l’un de vous a '
  - type: note
    content: Lé 18:8. De 27:20.
  - type: text
    content: 'la femme de son père. '
  '10':
  - type: text
    content: 'non pas d’une manière absolue avec les impudiques de ce monde, ou avec les cupides et les ravisseurs, ou avec les idolâtres; autrement, il vous faudrait sortir du monde. '
  '11':
  - type: text
    content: 'Maintenant, ce que je vous ai écrit, c’est de ne pas avoir des relations avec quelqu’un qui, se nommant frère, est impudique, ou cupide, ou idolâtre, ou outrageux, ou ivrogne, ou ravisseur, '
  - type: note
    content: No 12:14. Mt 18:17. 2 Th 3:14. 2 Jn v. 10.
  - type: text
    content: 'de ne pas même manger avec un tel homme. '
  '12':
  - type: text
    content: 'Qu’ai-je, en effet, à juger ceux du dehors? N’est-ce pas ceux du dedans que vous avez à juger? '
  '13':
  - type: text
    content: 'Pour ceux du dehors, Dieu les juge. '
  - type: note
    content: De 13:5.
  - type: text
    content: Otez le méchant du milieu de vous.
  '2':
  - type: text
    content: 'Et vous êtes enflés d’orgueil! Et vous n’avez pas été plutôt dans l’affliction, afin que celui qui a commis cet acte fût ôté du milieu de vous! '
  '3':
  - type: note
    content: Col 2:5.
  - type: text
    content: 'Pour moi, absent de corps, mais présent d’esprit, j’ai déjà jugé, comme si j’étais présent, celui qui a commis un tel acte. '
  '4':
  - type: text
    content: 'Au nom du Seigneur Jésus, vous et mon esprit étant assemblés avec la puissance de notre Seigneur Jésus, '
  '5':
  - type: note
    content: 1 Ti 1:20.
  - type: text
    content: qu’un tel homme soit livré à Satan pour la destruction de la chair, afin que l’esprit soit sauvé au jour du Seigneur Jésus.
  - type: heading
    content: 'V. 6-8: cf. Ga 5:9, 12. Hé 12:15; 10:22.'
  '6':
  - type: text
    content: 'C’est bien à tort que vous vous glorifiez. '
  - type: note
    content: Ga 5:9.
  - type: text
    content: 'Ne savez-vous pas qu’un peu de levain fait lever toute la pâte? '
  '7':
  - type: text
    content: 'Faites disparaître le vieux levain, afin que vous soyez une pâte nouvelle, puisque vous êtes sans levain, car Christ, notre '
  - type: note
    content: És 53:7. Jn 1:29. 1 Co 15:3.
  - type: text
    content: 'Pâque, a été immolé. '
  '8':
  - type: text
    content: 'Célébrons donc la '
  - type: note
    content: Ex 12:3, 15.
  - type: text
    content: 'fête, non '
  - type: note
    content: De 16:3.
  - type: text
    content: avec du vieux levain, non avec un levain de malice et de méchanceté, mais avec les pains sans levain de la pureté et de la vérité.
  - type: heading
    content: 'V. 9-13: cf. 2 Th 3:6. Mt 18:15-20.'
  '9':
  - type: text
    content: 'Je vous ai écrit dans ma lettre '
  - type: note
    content: De 7:2. Mt 18:17. 2 Co 6:14. Ép 5:11. 2 Th 3:14.
  - type: text
    content: 'de ne pas avoir des relations avec les impudiques, '
