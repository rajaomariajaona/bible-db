  '1':
  - type: text
    content: INTRODUCTION AU LIVRE D’ABDIAS
  - type: text
    content: (Ps 137:7. La 4:21, 22. Joë 3:18, 19. So 2:10, 11. Za 14:9.)
  - type: text
    content: Intitulé «Abdias» (serviteur de Dieu), c’est le livre le plus court de l’Ancien Testament. Aucune indication ne nous est donnée sur la personne du prophète ou sur l’époque où le texte a été écrit. Il s’agit d’un message prophétique qui s’adressa à tous les ennemis d’Israël et particulièrement à Édom pour leur annoncer le châtiment divin imminent. Dans ce livre, l’auteur s’adresse aussi à ses compatriotes déportés à Babylone après la destruction du royaume de Juda.
  - type: text
    content: 'Le livre a trois articulations: l’annonce du châtiment d’Édom (= Ésaü, v. 1-9), suivie de l’indication des causes du châtiment (v. 10-16), à savoir l’attitude d’Édom à l’égard d’Israël (= Jacob); enfin l’annonce du rétablissement et de la conquête du territoire d’Israël (v. 17-21).'
  - type: text
    content: 'Il présente un message venant du Seigneur (1:1) annonçant la ruine d’Édom. En effet, lors du siège et de la destruction du royaume de Juda, les Édomites, voisins d’Israël, s’étaient évertués à aider les Babyloniens. Ils avaient même participé au pillage, bref, à leur départ en exil. Le message du prophète laisse cependant une note d’espoir: Israël prendra sa revanche sur Édom. Même les territoires voisins seront reconquis. En somme, dit Abdias: '
  - type: text
    content: «À l’Éternel appartiendra le règne»
  - type: text
    content: ' (1:21).'
  - type: text
    content: Le livre d’Abdias présente les nations comme ne devant pas se réjouir quand l’Éternel châtie son peuple. Les ennemis du peuple de Dieu seront aussi châtiés, et l’Éternel réconfortera les siens. En somme, Dieu aura le dernier mot et viendra juger tous les peuples.
