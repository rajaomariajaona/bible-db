document_id: GEN.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Corruption du genre humain
  - type: heading
    content: 'V. 1-7: cf. (Ex 34:15, 16. 2 Co 6:14-18.) (Ps 14:1-4. Ro 3:10-18.)'
  - type: text
    content: 'Lorsque les hommes eurent commencé à se multiplier sur la face de la terre, et que des filles leur furent nées, '
  '10':
  - type: text
    content: 'Noé engendra trois fils: Sem, Cham et Japhet. '
  '11':
  - type: text
    content: 'La terre était corrompue devant Dieu, la terre était pleine de violence. '
  '12':
  - type: text
    content: 'Dieu regarda la terre, et voici, elle était corrompue; car toute chair avait corrompu sa voie sur la terre. '
  '13':
  - type: text
    content: 'Alors Dieu dit à Noé: La fin de toute chair est arrêtée par devers moi; car ils ont rempli la terre de violence; voici, je vais les détruire avec la terre. '
  '14':
  - type: text
    content: 'Fais-toi une arche de bois de gopher; tu disposeras cette arche en cellules, et tu l’enduiras de poix en dedans et en dehors. '
  '15':
  - type: text
    content: 'Voici comment tu la feras: l’arche aura trois cents coudées de longueur, cinquante coudées de largeur et trente coudées de hauteur. '
  '16':
  - type: text
    content: 'Tu feras à l’arche une fenêtre, que tu réduiras à une coudée en haut; tu établiras une porte sur le côté de l’arche; et tu construiras un étage inférieur, un second et un troisième. '
  '17':
  - type: text
    content: 'Et moi, je vais faire venir le déluge d’eaux sur la terre, pour détruire toute chair ayant souffle de vie sous le ciel; tout ce qui est sur la terre périra. '
  '18':
  - type: text
    content: 'Mais j’établis mon alliance avec toi; '
  - type: note
    content: 1 Pi 3:20. 2 Pi 2:5.
  - type: text
    content: 'tu entreras dans l’arche, toi et tes fils, ta femme et les femmes de tes fils avec toi. '
  '19':
  - type: text
    content: 'De tout ce qui vit, de toute chair, tu feras entrer dans l’arche deux de chaque espèce, pour les conserver en vie avec toi: il y aura un mâle et une femelle. '
  '2':
  - type: text
    content: 'les fils de Dieu virent que les filles des hommes étaient belles, et ils en prirent pour femmes parmi toutes celles qu’ils choisirent. '
  '20':
  - type: text
    content: 'Des oiseaux selon leur espèce, du bétail selon son espèce, et de tous les reptiles de la terre selon leur espèce, deux de chaque espèce viendront vers toi, pour que tu leur conserves la vie. '
  '21':
  - type: text
    content: 'Et toi, prends de tous les aliments que l’on mange, et fais-en une provision auprès de toi, afin qu’ils te servent de nourriture ainsi qu’à eux. '
  '22':
  - type: text
    content: 'C’est ce que fit Noé: '
  - type: note
    content: Ge 7:5. Hé 11:7.
  - type: text
    content: il exécuta tout ce que Dieu lui avait ordonné.
  '3':
  - type: text
    content: 'Alors l’Éternel dit: Mon esprit ne restera pas à toujours dans l’homme, car l’homme n’est que chair, et ses jours seront de cent vingt ans. '
  '4':
  - type: text
    content: 'Les géants étaient sur la terre en ces temps-là, après que les fils de Dieu furent venus vers les filles des hommes, et qu’elles leur eurent donné des enfants: ce sont ces héros qui furent fameux dans l’antiquité. '
  '5':
  - type: text
    content: 'L’Éternel vit que la méchanceté des hommes était grande sur la terre, et que '
  - type: note
    content: Ge 8:21. Job 15:16. Pr 6:14. Jé 17:9. Mt 15:19. Ro 3:10, 11, 12; 8:6.
  - type: text
    content: 'toutes les pensées de leur cœur se portaient chaque jour uniquement vers le mal. '
  '6':
  - type: text
    content: 'L’Éternel se repentit d’avoir fait l’homme sur la terre, et il fut affligé en son cœur. '
  '7':
  - type: text
    content: 'Et l’Éternel dit: J’exterminerai de la face de la terre l’homme que j’ai créé, depuis l’homme jusqu’au bétail, aux reptiles, et aux oiseaux du ciel; car je me repens de les avoir faits.'
  - type: heading
    content: Le déluge
  - type: heading
    content: 'V. 8-22: cf. (Hé 11:7. 1 Pi 3:19, 20.) (Job 22:15-17. Os 4:1-3.)'
  '8':
  - type: text
    content: 'Mais Noé trouva grâce aux yeux de l’Éternel. '
  '9':
  - type: text
    content: 'Voici la postérité de Noé. Noé était un homme juste et intègre dans son temps; '
  - type: note
    content: Ge 5:22.
  - type: text
    content: 'Noé marchait avec Dieu. '
