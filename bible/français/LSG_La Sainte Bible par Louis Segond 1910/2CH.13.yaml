document_id: 2CH.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abija, roi de Juda. Guerre contre Jéroboam, roi d’Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-23: cf. 1 R 15:1-8. Ps 25:2, 3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 R 15:1, etc.
    marker-yv: yv-n
  - type: text
    text: 'La dix-huitième année du règne de Jéroboam, Abija régna sur Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il régna trois ans à Jérusalem. Sa mère s’appelait Micaja, fille d’Uriel, de Guibea. Il y eut guerre entre Abija et Jéroboam. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Abija engagea les hostilités avec une armée de vaillants guerriers, quatre cent mille hommes d’élite; et Jéroboam se rangea en bataille contre lui avec huit cent mille hommes d’élite, vaillants guerriers. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Du haut du mont Tsemaraïm, qui fait partie de la montagne d’Éphraïm, Abija se leva et dit: Écoutez-moi, Jéroboam, et tout Israël! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ne devez-vous pas savoir que l’Éternel, le Dieu d’Israël, a donné pour toujours à David la royauté sur Israël, à lui et à ses fils, par une alliance inviolable? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 11:26
      metadata:
        usfm: 1KI.11.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais Jéroboam, fils de Nebath, serviteur de Salomon, fils de David, s’est levé et s’est révolté contre son maître. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Des gens de rien, des hommes pervers, se sont rassemblés auprès de lui et l’ont emporté sur Roboam, fils de Salomon. Roboam était jeune et craintif, et il manqua de force devant eux. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et maintenant, vous pensez triompher du royaume de l’Éternel, qui est entre les mains des fils de David; et vous êtes une multitude nombreuse, et vous avez avec vous les veaux d’or '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 R 12:28, etc.
    marker-yv: yv-n
  - type: text
    text: 'que Jéroboam vous a faits pour dieux. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 12:31
      metadata:
        usfm: 1KI.12.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 11:14
      metadata:
        usfm: 2CH.11.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: 2CH.11.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'N’avez-vous pas repoussé les sacrificateurs de l’Éternel, les fils d’Aaron et les Lévites, et ne vous êtes-vous pas fait des sacrificateurs, comme les peuples des autres pays? Quiconque venait avec un jeune taureau et sept béliers, afin d’être consacré, devenait sacrificateur de ce qui n’est point Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais pour nous, l’Éternel est notre Dieu, et nous ne l’avons point abandonné, les sacrificateurs au service de l’Éternel sont fils d’Aaron, et les Lévites remplissent leurs fonctions. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 2:4
      metadata:
        usfm: 2CH.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous offrons chaque matin et chaque soir des holocaustes à l’Éternel, nous brûlons le parfum odoriférant, nous mettons les pains de proposition sur la table pure, et nous allumons chaque soir le chandelier d’or et ses lampes; car nous observons les commandements de l’Éternel, notre Dieu. Et vous, vous l’avez abandonné. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Voici, Dieu et ses sacrificateurs sont avec nous, à notre tête, et nous avons les trompettes retentissantes pour les faire résonner contre vous. Enfants d’Israël! Ne faites pas la guerre à l’Éternel, le Dieu de vos pères, car vous n’auriez aucun succès. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jéroboam les prit par derrière au moyen d’une embuscade, et ses troupes étaient en face de Juda, qui avait l’embuscade par derrière. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ceux de Juda s’étant retournés eurent à combattre devant et derrière. Ils crièrent à l’Éternel, et les sacrificateurs sonnèrent des trompettes. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les hommes de Juda poussèrent un cri de guerre et, au cri de guerre des hommes de Juda, l’Éternel frappa Jéroboam et tout Israël devant Abija et Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les enfants d’Israël s’enfuirent devant Juda, et Dieu les livra entre ses mains. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Abija et son peuple leur firent éprouver une grande défaite, et cinq cent mille hommes d’élite tombèrent morts parmi ceux d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les enfants d’Israël furent humiliés en ce temps, et les enfants de Juda remportèrent la victoire, parce qu’ils s’étaient appuyés sur l’Éternel, le Dieu de leurs pères. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Abija poursuivit Jéroboam et lui prit des villes, Béthel et les villes de son ressort, Jeschana et les villes de son ressort, et Éphron et les villes de son ressort. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jéroboam n’eut plus de force du temps d’Abija; et l’Éternel le frappa, et il mourut. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais Abija devint puissant; il eut quatorze femmes, et engendra vingt-deux fils et seize filles. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le reste des actions d’Abija, ce qu’il a fait et ce qu’il a dit, cela est écrit dans les mémoires du prophète Iddo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Abija se coucha avec ses pères, et on l’enterra dans la ville de David. Et '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 R 15:8, etc.
    marker-yv: yv-n
  - type: text
    text: Asa, son fils, régna à sa place. De son temps, le pays fut en repos pendant dix ans.
