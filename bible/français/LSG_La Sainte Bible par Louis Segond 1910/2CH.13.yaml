document_id: 2CH.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Abija, roi de Juda. Guerre contre Jéroboam, roi d’Israël
  - type: heading
    content: 'V. 1-23: cf. 1 R 15:1-8. Ps 25:2, 3.'
  - type: text
    content: ' '
  - type: note
    content: 1 R 15:1, etc.
  - type: text
    content: 'La dix-huitième année du règne de Jéroboam, Abija régna sur Juda. '
  '10':
  - type: text
    content: 'Mais pour nous, l’Éternel est notre Dieu, et nous ne l’avons point abandonné, les sacrificateurs au service de l’Éternel sont fils d’Aaron, et les Lévites remplissent leurs fonctions. '
  '11':
  - type: note
    content: 2 Ch 2:4.
  - type: text
    content: 'Nous offrons chaque matin et chaque soir des holocaustes à l’Éternel, nous brûlons le parfum odoriférant, nous mettons les pains de proposition sur la table pure, et nous allumons chaque soir le chandelier d’or et ses lampes; car nous observons les commandements de l’Éternel, notre Dieu. Et vous, vous l’avez abandonné. '
  '12':
  - type: text
    content: 'Voici, Dieu et ses sacrificateurs sont avec nous, à notre tête, et nous avons les trompettes retentissantes pour les faire résonner contre vous. Enfants d’Israël! Ne faites pas la guerre à l’Éternel, le Dieu de vos pères, car vous n’auriez aucun succès. '
  '13':
  - type: text
    content: 'Jéroboam les prit par derrière au moyen d’une embuscade, et ses troupes étaient en face de Juda, qui avait l’embuscade par derrière. '
  '14':
  - type: text
    content: 'Ceux de Juda s’étant retournés eurent à combattre devant et derrière. Ils crièrent à l’Éternel, et les sacrificateurs sonnèrent des trompettes. '
  '15':
  - type: text
    content: 'Les hommes de Juda poussèrent un cri de guerre et, au cri de guerre des hommes de Juda, l’Éternel frappa Jéroboam et tout Israël devant Abija et Juda. '
  '16':
  - type: text
    content: 'Les enfants d’Israël s’enfuirent devant Juda, et Dieu les livra entre ses mains. '
  '17':
  - type: text
    content: 'Abija et son peuple leur firent éprouver une grande défaite, et cinq cent mille hommes d’élite tombèrent morts parmi ceux d’Israël. '
  '18':
  - type: text
    content: 'Les enfants d’Israël furent humiliés en ce temps, et les enfants de Juda remportèrent la victoire, parce qu’ils s’étaient appuyés sur l’Éternel, le Dieu de leurs pères. '
  '19':
  - type: text
    content: 'Abija poursuivit Jéroboam et lui prit des villes, Béthel et les villes de son ressort, Jeschana et les villes de son ressort, et Éphron et les villes de son ressort. '
  '2':
  - type: text
    content: 'Il régna trois ans à Jérusalem. Sa mère s’appelait Micaja, fille d’Uriel, de Guibea. Il y eut guerre entre Abija et Jéroboam. '
  '20':
  - type: text
    content: 'Jéroboam n’eut plus de force du temps d’Abija; et l’Éternel le frappa, et il mourut. '
  '21':
  - type: text
    content: 'Mais Abija devint puissant; il eut quatorze femmes, et engendra vingt-deux fils et seize filles. '
  '22':
  - type: text
    content: 'Le reste des actions d’Abija, ce qu’il a fait et ce qu’il a dit, cela est écrit dans les mémoires du prophète Iddo. '
  '23':
  - type: text
    content: 'Abija se coucha avec ses pères, et on l’enterra dans la ville de David. Et '
  - type: note
    content: 1 R 15:8, etc.
  - type: text
    content: Asa, son fils, régna à sa place. De son temps, le pays fut en repos pendant dix ans.
  '3':
  - type: text
    content: 'Abija engagea les hostilités avec une armée de vaillants guerriers, quatre cent mille hommes d’élite; et Jéroboam se rangea en bataille contre lui avec huit cent mille hommes d’élite, vaillants guerriers. '
  '4':
  - type: text
    content: 'Du haut du mont Tsemaraïm, qui fait partie de la montagne d’Éphraïm, Abija se leva et dit: Écoutez-moi, Jéroboam, et tout Israël! '
  '5':
  - type: text
    content: 'Ne devez-vous pas savoir que l’Éternel, le Dieu d’Israël, a donné pour toujours à David la royauté sur Israël, à lui et à ses fils, par une alliance inviolable? '
  '6':
  - type: note
    content: 1 R 11:26.
  - type: text
    content: 'Mais Jéroboam, fils de Nebath, serviteur de Salomon, fils de David, s’est levé et s’est révolté contre son maître. '
  '7':
  - type: text
    content: 'Des gens de rien, des hommes pervers, se sont rassemblés auprès de lui et l’ont emporté sur Roboam, fils de Salomon. Roboam était jeune et craintif, et il manqua de force devant eux. '
  '8':
  - type: text
    content: 'Et maintenant, vous pensez triompher du royaume de l’Éternel, qui est entre les mains des fils de David; et vous êtes une multitude nombreuse, et vous avez avec vous les veaux d’or '
  - type: note
    content: 1 R 12:28, etc.
  - type: text
    content: 'que Jéroboam vous a faits pour dieux. '
  '9':
  - type: note
    content: 1 R 12:31. 2 Ch 11:14, 15.
  - type: text
    content: 'N’avez-vous pas repoussé les sacrificateurs de l’Éternel, les fils d’Aaron et les Lévites, et ne vous êtes-vous pas fait des sacrificateurs, comme les peuples des autres pays? Quiconque venait avec un jeune taureau et sept béliers, afin d’être consacré, devenait sacrificateur de ce qui n’est point Dieu. '
