document_id: 2KI.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Josias, roi de Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. 2 Ch 34:1-13. 2 R 12:4-16. (So 1:1. Jé 1:1, 2.) (Né 13:11, 14. Ps 69:10.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Josias avait '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 34:1
      metadata:
        usfm: 2CH.34.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'huit ans lorsqu’il devint roi, et il régna trente et un ans à Jérusalem. Sa mère s’appelait Jedida, fille d’Adaja, de Botskath. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il fit ce qui est droit aux yeux de l’Éternel, et il marcha dans toute la voie de David, son père; il ne s’en détourna ni à droite ni à gauche. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'La dix-huitième année du roi Josias, le roi envoya dans la maison de l’Éternel Schaphan, le secrétaire, fils d’Atsalia, fils de Meschullam. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il lui dit: Monte vers Hilkija, le souverain sacrificateur, et qu’il amasse l’argent qui a été apporté dans la maison de l’Éternel et que ceux qui ont la garde du seuil ont recueilli du peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'On remettra cet argent entre les mains de ceux qui sont chargés de faire exécuter l’ouvrage dans la maison de l’Éternel. Et ils l’emploieront pour ceux qui travaillent aux réparations de la maison de l’Éternel, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'pour les charpentiers, les manœuvres et les maçons, pour les achats de bois et de pierres de taille nécessaires aux réparations de la maison. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mais on ne leur demandera pas de compte pour l’argent remis entre leurs mains, car ils agissent avec probité.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le livre de la loi trouvé dans le temple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-20: cf. 2 Ch 34:14-28. De 31:24-26. (Lé 26. De 27 à 29.) Ac 2:37.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors Hilkija, le souverain sacrificateur, dit à Schaphan, le secrétaire: J’ai trouvé le livre de la loi dans la maison de l’Éternel. Et Hilkija donna le livre à Schaphan, et Schaphan le lut. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Puis Schaphan, le secrétaire, alla rendre compte au roi, et dit: Tes serviteurs ont amassé l’argent qui se trouvait dans la maison, et l’ont remis entre les mains de ceux qui sont chargés de faire exécuter l’ouvrage dans la maison de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Schaphan, le secrétaire, dit encore au roi: Le sacrificateur Hilkija m’a donné un livre. Et Schaphan le lut devant le roi. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lorsque le roi entendit les paroles du livre de la loi, il déchira ses vêtements. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et le roi donna cet ordre au sacrificateur Hilkija, à Achikam, fils de Schaphan, à Acbor, fils de Michée, à Schaphan, le secrétaire, et à Asaja, serviteur du roi: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Allez, consultez l’Éternel pour moi, pour le peuple, et pour tout Juda, au sujet des paroles de ce livre qu’on a trouvé; car grande est la colère de l’Éternel, qui s’est enflammée contre nous, parce que nos pères n’ont point obéi aux paroles de ce livre et n’ont point mis en pratique tout ce qui nous y est prescrit. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le sacrificateur Hilkija, Achikam, Acbor, Schaphan et Asaja, allèrent auprès de la prophétesse Hulda, femme de Schallum, fils de Thikva, fils de Harhas, gardien des vêtements. Elle habitait à Jérusalem, dans l’autre quartier de la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Après qu’ils lui eurent parlé, elle leur dit: Ainsi parle l’Éternel, le Dieu d’Israël: Dites à l’homme qui vous a envoyés vers moi: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ainsi parle l’Éternel: Voici, je vais faire venir des malheurs sur ce lieu et sur ses habitants, selon toutes les paroles du livre qu’a lu le roi de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Parce qu’ils m’ont abandonné et qu’ils ont offert des parfums à d’autres dieux, afin de m’irriter par tous les ouvrages de leurs mains, ma colère s’est enflammée contre ce lieu, et elle ne s’éteindra point. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais vous direz au roi de Juda, qui vous a envoyés pour consulter l’Éternel: Ainsi parle l’Éternel, le Dieu d’Israël, au sujet des paroles que tu as entendues: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Parce que ton cœur a été touché, parce que tu t’es humilié devant l’Éternel en entendant ce que j’ai prononcé contre ce lieu et contre ses habitants, qui seront un objet d’épouvante et de malédiction, et parce que tu as déchiré tes vêtements et que tu as pleuré devant moi, moi aussi, j’ai entendu, dit l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: C’est pourquoi, voici, je te recueillerai auprès de tes pères, tu seras recueilli en paix dans ton sépulcre, et tes yeux ne verront pas tous les malheurs que je ferai venir sur ce lieu. Ils rapportèrent au roi cette réponse.
