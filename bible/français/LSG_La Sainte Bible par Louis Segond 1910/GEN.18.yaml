document_id: GEN.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Intercession d’Abraham en faveur de Sodome
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-15: cf. Hé 13:2. (Ge 21:1-7. 2 R 4:12-17.) Jn 14:23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel lui apparut parmi les chênes de Mamré, comme il était assis à l’entrée de sa tente, pendant la chaleur du jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il leva les yeux, et regarda: et voici, trois hommes étaient debout près de lui. Quand il les vit, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:2
      metadata:
        usfm: HEB.13.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il courut au-devant d’eux, depuis l’entrée de sa tente, et se prosterna en terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et il dit: Seigneur, si j’ai trouvé grâce à tes yeux, ne passe point, je te prie, loin de ton serviteur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Permettez qu’on apporte un peu d’eau, pour vous laver les pieds; et reposez-vous sous cet arbre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'J’irai prendre un morceau de pain, pour fortifier votre cœur; après quoi, vous continuerez votre route; car c’est pour cela que vous passez près de votre serviteur. Ils répondirent: Fais comme tu l’as dit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Abraham alla promptement dans sa tente vers Sara, et il dit: Vite, trois mesures de fleur de farine, pétris, et fais des gâteaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et Abraham courut à son troupeau, prit un veau tendre et bon, et le donna à un serviteur, qui se hâta de l’apprêter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il prit encore de la crème et du lait, avec le veau qu’on avait apprêté, et il les mit devant eux. Il se tint lui-même à leurs côtés, sous l’arbre. Et ils mangèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors ils lui dirent: Où est Sara, ta femme? Il répondit: Elle est là, dans la tente. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L’un d’entre eux dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 17:19
      metadata:
        usfm: GEN.17.19
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '21'
      metadata:
        usfm: GEN.17.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:2
      metadata:
        usfm: GEN.21.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je reviendrai vers toi à cette même époque; et voici, Sara, ta femme, aura un fils. Sara écoutait à l’entrée de la tente, qui était derrière lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Abraham et Sara étaient '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 17:17
      metadata:
        usfm: GEN.17.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 4:19
      metadata:
        usfm: ROM.4.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:11
      metadata:
        usfm: HEB.11.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vieux, avancés en âge: et Sara ne pouvait plus espérer avoir des enfants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Elle rit en elle-même, en disant: Maintenant que je suis vieille, aurais-je encore des désirs? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 19:26
      metadata:
        usfm: JDG.19.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:6
      metadata:
        usfm: 1PE.3.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mon seigneur aussi est vieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L’Éternel dit à Abraham: Pourquoi donc Sara a-t-elle ri, en disant: Est-ce que vraiment j’aurais un enfant, moi qui suis vieille? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 19:26
      metadata:
        usfm: MAT.19.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:37
      metadata:
        usfm: LUK.1.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Y a-t-il rien qui soit étonnant de la part de l’Éternel? Au temps fixé je reviendrai vers toi, à cette même époque; et Sara aura un fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Sara mentit, en disant: Je n’ai pas ri. Car elle eut peur. Mais il dit: Au contraire, tu as ri.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-33: cf. Jn 15:15. (Ex 32:9-14. No 14:11-20.) Ja 5:16-18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ces hommes se levèrent pour partir, et ils regardèrent du côté de Sodome. Abraham alla avec eux, pour les accompagner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors l’Éternel dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 3:7
      metadata:
        usfm: AMO.3.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Cacherai-je à Abraham ce que je vais faire?… '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Abraham deviendra certainement une nation grande et puissante, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 12:3
      metadata:
        usfm: GEN.12.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:18
      metadata:
        usfm: GEN.22.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:4
      metadata:
        usfm: GEN.26.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 3:25
      metadata:
        usfm: ACT.3.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:8
      metadata:
        usfm: GAL.3.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en lui seront bénies toutes les nations de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Car je l’ai choisi, afin qu’il ordonne à ses fils et à sa maison après lui de garder la voie de l’Éternel, en pratiquant la droiture et la justice, et qu’ainsi l’Éternel accomplisse en faveur d’Abraham les promesses qu’il lui a faites… '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Et l’Éternel dit: Le cri contre Sodome et Gomorrhe s’est accru, et leur péché est énorme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'C’est pourquoi je vais descendre, et je verrai s’ils ont agi entièrement selon le bruit venu jusqu’à moi; et si cela n’est pas, je le saurai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les hommes s’éloignèrent, et allèrent vers Sodome. Mais Abraham se tint encore en présence de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Abraham s’approcha, et dit: Feras-tu aussi périr le juste avec le méchant? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Peut-être y a-t-il cinquante justes au milieu de la ville: les feras-tu périr aussi, et ne pardonneras-tu pas à la ville à cause des cinquante justes qui sont au milieu d’elle? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Faire mourir le juste avec le méchant, en sorte qu’il en soit du juste comme du méchant, loin de toi cette manière d’agir! Loin de toi! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 3:6
      metadata:
        usfm: ROM.3.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Celui qui juge toute la terre n’exercera-t-il pas la justice? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Et l’Éternel dit: Si je trouve dans Sodome cinquante justes au milieu de la ville, je pardonnerai à toute la ville, à cause d’eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Abraham reprit, et dit: Voici, j’ai osé parler au Seigneur, moi qui ne suis que poudre et cendre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Peut-être des cinquante justes en manquera-t-il cinq: pour cinq, détruiras-tu toute la ville? Et l’Éternel dit: Je ne la détruirai point, si j’y trouve quarante-cinq justes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Abraham continua de lui parler, et dit: Peut-être s’y trouvera-t-il quarante justes. Et l’Éternel dit: Je ne ferai rien, à cause de ces quarante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Abraham dit: Que le Seigneur ne s’irrite point, et je parlerai. Peut-être s’y trouvera-t-il trente justes. Et l’Éternel dit: Je ne ferai rien, si j’y trouve trente justes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Abraham dit: Voici, j’ai osé parler au Seigneur. Peut-être s’y trouvera-t-il vingt justes. Et l’Éternel dit: Je ne la détruirai point, à cause de ces vingt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Abraham dit: Que le Seigneur ne s’irrite point, et je ne parlerai plus que cette fois. Peut-être s’y trouvera-t-il dix justes. Et l’Éternel dit: Je ne la détruirai point, à cause de ces dix justes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: L’Éternel s’en alla lorsqu’il eut achevé de parler à Abraham. Et Abraham retourna dans sa demeure.
