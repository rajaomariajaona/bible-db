document_id: PSA.111,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 145. De 4:32-40, 5-8.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je louerai l’Éternel de tout mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans la réunion des hommes droits et dans l’assemblée.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La crainte de l’Éternel est le commencement de la sagesse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui l’observent ont une raison saine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa gloire subsiste à jamais.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les œuvres de l’Éternel sont grandes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Recherchées par tous ceux qui les aiment.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son œuvre n’est que splendeur et magnificence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa justice subsiste à jamais.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a laissé la mémoire de ses prodiges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel miséricordieux et compatissant.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a donné de la nourriture à ceux qui le craignent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se souvient toujours de son alliance.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a manifesté à son peuple la puissance de ses œuvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En lui livrant l’héritage des nations.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les œuvres de ses mains sont fidélité et justice;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes ses ordonnances sont véritables,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Affermies pour l’éternité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faites avec fidélité et droiture.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a envoyé la délivrance à son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a établi pour toujours son alliance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son nom est saint et redoutable.
