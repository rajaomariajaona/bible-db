document_id: PSA.111,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 145. De 4:32-40, 5-8.
  - type: text
    content: Louez l’Éternel!
  - type: text
    content: Je louerai l’Éternel de tout mon cœur,
  - type: text
    content: Dans la réunion des hommes droits et dans l’assemblée.
  '10':
  - type: text
    content: La crainte de l’Éternel est le commencement de la sagesse;
  - type: text
    content: Tous ceux qui l’observent ont une raison saine.
  - type: text
    content: Sa gloire subsiste à jamais.
  '2':
  - type: text
    content: Les œuvres de l’Éternel sont grandes,
  - type: text
    content: Recherchées par tous ceux qui les aiment.
  '3':
  - type: text
    content: Son œuvre n’est que splendeur et magnificence,
  - type: text
    content: Et sa justice subsiste à jamais.
  '4':
  - type: text
    content: Il a laissé la mémoire de ses prodiges,
  - type: text
    content: L’Éternel miséricordieux et compatissant.
  '5':
  - type: text
    content: Il a donné de la nourriture à ceux qui le craignent;
  - type: text
    content: Il se souvient toujours de son alliance.
  '6':
  - type: text
    content: Il a manifesté à son peuple la puissance de ses œuvres,
  - type: text
    content: En lui livrant l’héritage des nations.
  '7':
  - type: text
    content: Les œuvres de ses mains sont fidélité et justice;
  - type: text
    content: Toutes ses ordonnances sont véritables,
  '8':
  - type: text
    content: Affermies pour l’éternité,
  - type: text
    content: Faites avec fidélité et droiture.
  '9':
  - type: text
    content: Il a envoyé la délivrance à son peuple,
  - type: text
    content: Il a établi pour toujours son alliance;
  - type: text
    content: Son nom est saint et redoutable.
