document_id: PSA.77
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: La 3:1, 17-33. Ps 44; 89; 105.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. D’après Jeduthun. Psaume d’Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ma voix s’élève à Dieu, et je crie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma voix s’élève à Dieu, et il m’écoutera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Au jour de ma détresse, je cherche le Seigneur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La nuit, mes mains sont étendues sans se lasser;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon âme refuse toute consolation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je me souviens de Dieu, et je gémis;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je médite, et mon esprit est abattu. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu tiens mes paupières en éveil;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et, dans mon trouble, je ne puis parler.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je pense aux jours anciens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aux années d’autrefois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je pense à mes cantiques pendant la nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je fais des réflexions au-dedans de mon cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mon esprit médite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le Seigneur rejettera-t-il pour toujours?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne sera-t-il plus favorable?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Sa bonté est-elle à jamais épuisée?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa parole est-elle anéantie pour l’éternité?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dieu a-t-il oublié d’avoir compassion?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A-t-il, dans sa colère, retiré sa miséricorde? '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je dis: Ce qui fait ma souffrance,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est que la droite du Très-Haut n’est plus la même…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je rappellerai les œuvres de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je me souviens de tes merveilles d’autrefois;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je parlerai de toutes tes œuvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je raconterai tes hauts faits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: O Dieu! Tes voies sont saintes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quel dieu est grand comme Dieu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu es le Dieu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 15:11
      metadata:
        usfm: EXO.15.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: qui fait des prodiges;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as manifesté parmi les peuples ta puissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Par ton bras tu as délivré ton peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Les fils de Jacob et de Joseph. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 14:21
      metadata:
        usfm: EXO.14.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les eaux t’ont vu, ô Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les eaux t’ont vu, elles ont tremblé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les abîmes se sont émus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 14:24
      metadata:
        usfm: EXO.14.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les nuages versèrent de l’eau par torrents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le tonnerre retentit dans les nues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes flèches volèrent de toutes parts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ton tonnerre éclata dans le tourbillon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les éclairs illuminèrent le monde;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La terre s’émut et trembla.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu te frayas un chemin par la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un sentier par les grandes eaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes traces ne furent plus reconnues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tu as conduit ton peuple '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:52
      metadata:
        usfm: PSA.78.52
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 80:2
      metadata:
        usfm: PSA.80.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: comme un troupeau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par la main de Moïse et d’Aaron.
