document_id: PSA.77,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La 3:1, 17-33. Ps 44; 89; 105.
  - type: text
    content: Au chef des chantres. D’après Jeduthun. Psaume d’Asaph.
  '10':
  - type: text
    content: Dieu a-t-il oublié d’avoir compassion?
  - type: text
    content: 'A-t-il, dans sa colère, retiré sa miséricorde? '
  - type: text
    content: — Pause.
  '11':
  - type: text
    content: 'Je dis: Ce qui fait ma souffrance,'
  - type: text
    content: C’est que la droite du Très-Haut n’est plus la même…
  '12':
  - type: text
    content: Je rappellerai les œuvres de l’Éternel,
  - type: text
    content: Car je me souviens de tes merveilles d’autrefois;
  '13':
  - type: text
    content: Je parlerai de toutes tes œuvres,
  - type: text
    content: Je raconterai tes hauts faits.
  '14':
  - type: text
    content: O Dieu! Tes voies sont saintes;
  - type: text
    content: Quel dieu est grand comme Dieu?
  '15':
  - type: text
    content: 'Tu es le Dieu '
  - type: note
    content: Ex 15:11.
  - type: text
    content: qui fait des prodiges;
  - type: text
    content: Tu as manifesté parmi les peuples ta puissance.
  '16':
  - type: text
    content: Par ton bras tu as délivré ton peuple,
  - type: text
    content: 'Les fils de Jacob et de Joseph. '
  - type: text
    content: — Pause.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ex 14:21.
  - type: text
    content: Les eaux t’ont vu, ô Dieu!
  - type: text
    content: Les eaux t’ont vu, elles ont tremblé;
  - type: text
    content: Les abîmes se sont émus.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ex 14:24.
  - type: text
    content: Les nuages versèrent de l’eau par torrents,
  - type: text
    content: Le tonnerre retentit dans les nues,
  - type: text
    content: Et tes flèches volèrent de toutes parts.
  '19':
  - type: text
    content: Ton tonnerre éclata dans le tourbillon,
  - type: text
    content: Les éclairs illuminèrent le monde;
  - type: text
    content: La terre s’émut et trembla.
  '2':
  - type: text
    content: Ma voix s’élève à Dieu, et je crie;
  - type: text
    content: Ma voix s’élève à Dieu, et il m’écoutera.
  '20':
  - type: text
    content: Tu te frayas un chemin par la mer,
  - type: text
    content: Un sentier par les grandes eaux,
  - type: text
    content: Et tes traces ne furent plus reconnues.
  '21':
  - type: text
    content: 'Tu as conduit ton peuple '
  - type: note
    content: Ps 78:52; 80:2.
  - type: text
    content: comme un troupeau,
  - type: text
    content: Par la main de Moïse et d’Aaron.
  '3':
  - type: text
    content: Au jour de ma détresse, je cherche le Seigneur;
  - type: text
    content: La nuit, mes mains sont étendues sans se lasser;
  - type: text
    content: Mon âme refuse toute consolation.
  '4':
  - type: text
    content: Je me souviens de Dieu, et je gémis;
  - type: text
    content: 'Je médite, et mon esprit est abattu. '
  - type: text
    content: — Pause.
  '5':
  - type: text
    content: Tu tiens mes paupières en éveil;
  - type: text
    content: Et, dans mon trouble, je ne puis parler.
  '6':
  - type: text
    content: Je pense aux jours anciens,
  - type: text
    content: Aux années d’autrefois.
  '7':
  - type: text
    content: Je pense à mes cantiques pendant la nuit,
  - type: text
    content: Je fais des réflexions au-dedans de mon cœur,
  - type: text
    content: Et mon esprit médite.
  '8':
  - type: text
    content: Le Seigneur rejettera-t-il pour toujours?
  - type: text
    content: Ne sera-t-il plus favorable?
  '9':
  - type: text
    content: Sa bonté est-elle à jamais épuisée?
  - type: text
    content: Sa parole est-elle anéantie pour l’éternité?
