document_id: ISA.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le rétablissement d’Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-2: cf. Esd 1. Ps 126.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Car l’Éternel aura pitié de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il choisira encore Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il les rétablira dans leur pays;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les étrangers se joindront à eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils s’uniront à la maison de Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Les peuples les prendront, et les ramèneront à leur demeure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la maison d’Israël les possédera dans le pays de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme serviteurs et comme servantes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils retiendront captifs ceux qui les avaient faits captifs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils domineront sur leurs oppresseurs.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie contre le roi de Babylone
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 3-23: cf. Da 5. (Éz 31; 32:18, etc.) Jé 50:17-40.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Et quand l’Éternel t’aura donné du repos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Après tes fatigues et tes agitations,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:48
      metadata:
        usfm: DEU.28.48
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et après la dure servitude qui te fut imposée,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Alors tu prononceras ce chant sur le roi de Babylone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et tu diras:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eh quoi! Le tyran n’est plus!
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’oppression a cessé!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L’Éternel a brisé le bâton des méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La verge des dominateurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Celui qui dans sa fureur frappait les peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par des coups sans relâche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui dans sa colère subjuguait les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est poursuivi sans ménagement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Toute la terre jouit du repos et de la paix;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On éclate en chants d’allégresse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les cyprès même, les cèdres du Liban, se réjouissent de ta chute:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Depuis que tu es tombé, personne ne monte pour nous abattre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le séjour des morts s’émeut jusque dans ses profondeurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour t’accueillir à ton arrivée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il réveille devant toi les ombres, tous les grands de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fait lever de leurs trônes tous les rois des nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tous prennent la parole pour te dire:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi aussi, tu es sans force comme nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es devenu semblable à nous!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ta magnificence est descendue dans le séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec le son de tes luths;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sous toi est une couche de vers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les vers sont ta couverture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Te voilà tombé du ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Astre brillant, fils de l’aurore!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es abattu à terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi, le vainqueur des nations!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu disais en ton cœur: Je monterai au ciel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’élèverai mon trône au-dessus des étoiles de Dieu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je m’assiérai sur la montagne de l’assemblée,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 48:3
      metadata:
        usfm: PSA.48.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: A l’extrémité du septentrion;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je monterai sur le sommet des nues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je serai semblable au Très-Haut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais tu as été précipité dans le séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans les profondeurs de la fosse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ceux qui te voient fixent sur toi leurs regards,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils te considèrent attentivement:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce là cet homme qui faisait trembler la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui ébranlait les royaumes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Qui réduisait le monde en désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui ravageait les villes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne relâchait point ses prisonniers?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tous les rois des nations, oui, tous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reposent avec honneur, chacun dans son tombeau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mais toi, tu as été jeté loin de ton sépulcre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme un rameau qu’on dédaigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme une dépouille de gens tués à coups d’épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et précipités sur les pierres d’une fosse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme un cadavre foulé aux pieds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu n’es pas réuni à eux dans le sépulcre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car tu as détruit ton pays, tu as fait périr ton peuple:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 18:19
      metadata:
        usfm: JOB.18.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 21:11
      metadata:
        usfm: PSA.21.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 37:28
      metadata:
        usfm: PSA.37.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 109:13
      metadata:
        usfm: PSA.109.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: On ne parlera plus jamais de la race des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Préparez le massacre des fils,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:5
      metadata:
        usfm: EXO.20.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 23:35
      metadata:
        usfm: MAT.23.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: A cause de l’iniquité de leurs pères!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils ne se relèvent pas pour conquérir la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et remplir le monde d’ennemis!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Je me lèverai contre eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel des armées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’anéantirai le nom et la trace de Babylone,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 18:19
      metadata:
        usfm: JOB.18.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 21:11
      metadata:
        usfm: PSA.21.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 37:28
      metadata:
        usfm: PSA.37.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ses descendants et sa postérité, dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'J’en ferai '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 34:11
      metadata:
        usfm: ISA.34.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: So 2:14
      metadata:
        usfm: ZEP.2.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: le gîte du hérisson et un marécage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je la balaierai avec le balai de la destruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel des armées.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie contre l’Assyrie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 24-27: cf. És 10:5, etc.; 37:21, etc. Ps 135:5, 6.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'L’Éternel des armées l’a juré, en disant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, ce que j’ai décidé arrivera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce que j’ai résolu s’accomplira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Je briserai l’Assyrien dans mon pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je le foulerai aux pieds sur mes montagnes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et son joug leur sera ôté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et son fardeau sera ôté de leurs épaules.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Voilà la résolution prise contre toute la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà la main étendue sur toutes les nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'L’Éternel des armées a pris cette résolution: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 20:6
      metadata:
        usfm: 2CH.20.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 9:12
      metadata:
        usfm: JOB.9.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 21:30
      metadata:
        usfm: PRO.21.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: qui s’y opposera?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 4:35
      metadata:
        usfm: DAN.4.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Sa main est étendue: qui la détournera?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie contre les Philistins
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 28-32: cf. (2 Ch 28:18. 2 R 18:8.) Éz 25:15-17.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'L’année '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 16:20
      metadata:
        usfm: 2KI.16.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de la mort du roi Achaz, cet oracle fut prononcé:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ne te réjouis pas, pays des Philistins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De ce que la verge qui te frappait est brisée!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car de la racine du serpent sortira un basilic,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et son fruit sera un dragon volant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Alors les plus pauvres pourront paître,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les malheureux reposer en sécurité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais je ferai mourir ta racine par la faim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ce qui restera de toi sera tué.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Porte, gémis! Ville, lamente-toi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tremble, pays tout entier des Philistins!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car du nord vient une fumée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les rangs de l’ennemi sont serrés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Et que répondra-t-on aux envoyés du peuple?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l’Éternel a fondé Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que les malheureux de son peuple y trouvent un refuge.
