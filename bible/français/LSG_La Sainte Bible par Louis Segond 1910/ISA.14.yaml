document_id: ISA.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le rétablissement d’Israël
  - type: heading
    content: 'V. 1-2: cf. Esd 1. Ps 126.'
  - type: text
    content: Car l’Éternel aura pitié de Jacob,
  - type: text
    content: Il choisira encore Israël,
  - type: text
    content: Et il les rétablira dans leur pays;
  - type: text
    content: Les étrangers se joindront à eux,
  - type: text
    content: Et ils s’uniront à la maison de Jacob.
  '10':
  - type: text
    content: 'Tous prennent la parole pour te dire:'
  - type: text
    content: Toi aussi, tu es sans force comme nous,
  - type: text
    content: Tu es devenu semblable à nous!
  '11':
  - type: text
    content: Ta magnificence est descendue dans le séjour des morts,
  - type: text
    content: Avec le son de tes luths;
  - type: text
    content: Sous toi est une couche de vers,
  - type: text
    content: Et les vers sont ta couverture.
  '12':
  - type: text
    content: Te voilà tombé du ciel,
  - type: text
    content: Astre brillant, fils de l’aurore!
  - type: text
    content: Tu es abattu à terre,
  - type: text
    content: Toi, le vainqueur des nations!
  '13':
  - type: text
    content: 'Tu disais en ton cœur: Je monterai au ciel,'
  - type: text
    content: J’élèverai mon trône au-dessus des étoiles de Dieu;
  - type: text
    content: Je m’assiérai sur la montagne de l’assemblée,
  - type: note
    content: Ps 48:3.
  - type: text
    content: A l’extrémité du septentrion;
  '14':
  - type: text
    content: Je monterai sur le sommet des nues,
  - type: text
    content: Je serai semblable au Très-Haut.
  '15':
  - type: text
    content: Mais tu as été précipité dans le séjour des morts,
  - type: text
    content: Dans les profondeurs de la fosse.
  '16':
  - type: text
    content: Ceux qui te voient fixent sur toi leurs regards,
  - type: text
    content: 'Ils te considèrent attentivement:'
  - type: text
    content: Est-ce là cet homme qui faisait trembler la terre,
  - type: text
    content: Qui ébranlait les royaumes,
  '17':
  - type: text
    content: Qui réduisait le monde en désert,
  - type: text
    content: Qui ravageait les villes,
  - type: text
    content: Et ne relâchait point ses prisonniers?
  '18':
  - type: text
    content: Tous les rois des nations, oui, tous,
  - type: text
    content: Reposent avec honneur, chacun dans son tombeau.
  '19':
  - type: text
    content: Mais toi, tu as été jeté loin de ton sépulcre,
  - type: text
    content: Comme un rameau qu’on dédaigne,
  - type: text
    content: Comme une dépouille de gens tués à coups d’épée,
  - type: text
    content: Et précipités sur les pierres d’une fosse,
  - type: text
    content: Comme un cadavre foulé aux pieds.
  '2':
  - type: text
    content: Les peuples les prendront, et les ramèneront à leur demeure,
  - type: text
    content: Et la maison d’Israël les possédera dans le pays de l’Éternel,
  - type: text
    content: Comme serviteurs et comme servantes;
  - type: text
    content: Ils retiendront captifs ceux qui les avaient faits captifs,
  - type: text
    content: Et ils domineront sur leurs oppresseurs.
  - type: heading
    content: Prophétie contre le roi de Babylone
  - type: heading
    content: 'V. 3-23: cf. Da 5. (Éz 31; 32:18, etc.) Jé 50:17-40.'
  '20':
  - type: text
    content: Tu n’es pas réuni à eux dans le sépulcre,
  - type: text
    content: 'Car tu as détruit ton pays, tu as fait périr ton peuple:'
  - type: note
    content: Job 18:19. Ps 21:11; 37:28; 109:13.
  - type: text
    content: On ne parlera plus jamais de la race des méchants.
  '21':
  - type: text
    content: Préparez le massacre des fils,
  - type: note
    content: Ex 20:5. Mt 23:35.
  - type: text
    content: A cause de l’iniquité de leurs pères!
  - type: text
    content: Qu’ils ne se relèvent pas pour conquérir la terre,
  - type: text
    content: Et remplir le monde d’ennemis!
  '22':
  - type: text
    content: Je me lèverai contre eux,
  - type: text
    content: Dit l’Éternel des armées;
  - type: text
    content: J’anéantirai le nom et la trace de Babylone,
  - type: note
    content: Job 18:19. Ps 21:11; 37:28.
  - type: text
    content: Ses descendants et sa postérité, dit l’Éternel.
  '23':
  - type: text
    content: 'J’en ferai '
  - type: note
    content: És 34:11. So 2:14.
  - type: text
    content: le gîte du hérisson et un marécage,
  - type: text
    content: Et je la balaierai avec le balai de la destruction,
  - type: text
    content: Dit l’Éternel des armées.
  - type: heading
    content: Prophétie contre l’Assyrie
  - type: heading
    content: 'V. 24-27: cf. És 10:5, etc.; 37:21, etc. Ps 135:5, 6.'
  '24':
  - type: text
    content: 'L’Éternel des armées l’a juré, en disant:'
  - type: text
    content: Oui, ce que j’ai décidé arrivera,
  - type: text
    content: Ce que j’ai résolu s’accomplira.
  '25':
  - type: text
    content: Je briserai l’Assyrien dans mon pays,
  - type: text
    content: Je le foulerai aux pieds sur mes montagnes;
  - type: text
    content: Et son joug leur sera ôté,
  - type: text
    content: Et son fardeau sera ôté de leurs épaules.
  '26':
  - type: text
    content: Voilà la résolution prise contre toute la terre,
  - type: text
    content: Voilà la main étendue sur toutes les nations.
  '27':
  - type: text
    content: 'L’Éternel des armées a pris cette résolution: '
  - type: note
    content: 2 Ch 20:6. Job 9:12. Pr 21:30.
  - type: text
    content: qui s’y opposera?
  - type: note
    content: Da 4:35.
  - type: text
    content: 'Sa main est étendue: qui la détournera?'
  - type: heading
    content: Prophétie contre les Philistins
  - type: heading
    content: 'V. 28-32: cf. (2 Ch 28:18. 2 R 18:8.) Éz 25:15-17.'
  '28':
  - type: text
    content: 'L’année '
  - type: note
    content: 2 R 16:20.
  - type: text
    content: 'de la mort du roi Achaz, cet oracle fut prononcé:'
  '29':
  - type: text
    content: Ne te réjouis pas, pays des Philistins,
  - type: text
    content: De ce que la verge qui te frappait est brisée!
  - type: text
    content: Car de la racine du serpent sortira un basilic,
  - type: text
    content: Et son fruit sera un dragon volant.
  '3':
  - type: text
    content: Et quand l’Éternel t’aura donné du repos,
  - type: text
    content: Après tes fatigues et tes agitations,
  - type: note
    content: De 28:48.
  - type: text
    content: Et après la dure servitude qui te fut imposée,
  '30':
  - type: text
    content: Alors les plus pauvres pourront paître,
  - type: text
    content: Et les malheureux reposer en sécurité;
  - type: text
    content: Mais je ferai mourir ta racine par la faim,
  - type: text
    content: Et ce qui restera de toi sera tué.
  '31':
  - type: text
    content: Porte, gémis! Ville, lamente-toi!
  - type: text
    content: Tremble, pays tout entier des Philistins!
  - type: text
    content: Car du nord vient une fumée,
  - type: text
    content: Et les rangs de l’ennemi sont serrés.
  '32':
  - type: text
    content: Et que répondra-t-on aux envoyés du peuple?
  - type: text
    content: Que l’Éternel a fondé Sion,
  - type: text
    content: Et que les malheureux de son peuple y trouvent un refuge.
  '4':
  - type: text
    content: Alors tu prononceras ce chant sur le roi de Babylone,
  - type: text
    content: 'Et tu diras:'
  - type: text
    content: Eh quoi! Le tyran n’est plus!
  - type: text
    content: L’oppression a cessé!
  '5':
  - type: text
    content: L’Éternel a brisé le bâton des méchants,
  - type: text
    content: La verge des dominateurs.
  '6':
  - type: text
    content: Celui qui dans sa fureur frappait les peuples,
  - type: text
    content: Par des coups sans relâche,
  - type: text
    content: Celui qui dans sa colère subjuguait les nations,
  - type: text
    content: Est poursuivi sans ménagement.
  '7':
  - type: text
    content: Toute la terre jouit du repos et de la paix;
  - type: text
    content: On éclate en chants d’allégresse,
  '8':
  - type: text
    content: 'Les cyprès même, les cèdres du Liban, se réjouissent de ta chute:'
  - type: text
    content: Depuis que tu es tombé, personne ne monte pour nous abattre.
  '9':
  - type: text
    content: Le séjour des morts s’émeut jusque dans ses profondeurs,
  - type: text
    content: Pour t’accueillir à ton arrivée;
  - type: text
    content: Il réveille devant toi les ombres, tous les grands de la terre,
  - type: text
    content: Il fait lever de leurs trônes tous les rois des nations.
