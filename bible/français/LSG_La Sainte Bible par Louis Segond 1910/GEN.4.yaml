document_id: GEN.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Caïn et Abel
  - type: heading
    content: 'V. 1-8: cf. Hé 11:4. 1 Jn 3:12, 15. 1 S 15:22.'
  - type: text
    content: 'Adam connut Ève, sa femme; elle conçut, et enfanta Caïn et elle dit: J’ai formé un homme avec l’aide de l’Éternel. '
  '10':
  - type: text
    content: 'Et Dieu dit: Qu’as-tu fait? '
  - type: note
    content: Hé 12:24.
  - type: text
    content: 'La voix du sang de ton frère crie de la terre jusqu’à moi. '
  '11':
  - type: text
    content: 'Maintenant, tu seras maudit de la terre qui a ouvert sa bouche pour recevoir de ta main le sang de ton frère. '
  '12':
  - type: text
    content: 'Quand tu cultiveras le sol, il ne te donnera plus sa richesse. '
  - type: note
    content: Pr 28:17.
  - type: text
    content: 'Tu seras errant et vagabond sur la terre. '
  '13':
  - type: text
    content: 'Caïn dit à l’Éternel: Mon châtiment est trop grand pour être supporté. '
  '14':
  - type: text
    content: 'Voici, tu me chasses aujourd’hui de cette terre; je serai caché loin de ta face, je serai errant et vagabond sur la terre, et '
  - type: note
    content: Job 15:20, 21, etc.
  - type: text
    content: 'quiconque me trouvera me tuera. '
  '15':
  - type: text
    content: 'L’Éternel lui dit: Si quelqu’un tuait Caïn, Caïn serait vengé sept fois. Et l’Éternel mit un signe sur Caïn pour que quiconque le trouverait ne le tuât point. '
  '16':
  - type: text
    content: Puis, Caïn s’éloigna de la face de l’Éternel, et habita dans la terre de Nod, à l’orient d’Éden.
  - type: heading
    content: Descendants de Caïn
  - type: heading
    content: 'V. 17-24: cf. (Ge 2:24. Mt 19:4-9.)'
  '17':
  - type: text
    content: 'Caïn connut sa femme; elle conçut, et enfanta Hénoc. Il bâtit ensuite une ville, et il donna à cette ville le nom de son fils Hénoc. '
  '18':
  - type: text
    content: 'Hénoc engendra Irad, Irad engendra Mehujaël, Mehujaël engendra Metuschaël, et Metuschaël engendra Lémec. '
  '19':
  - type: text
    content: 'Lémec prit deux femmes: le nom de l’une était Ada, et le nom de l’autre Tsilla. '
  '2':
  - type: text
    content: 'Elle enfanta encore son frère Abel. Abel fut berger, et Caïn fut laboureur. '
  '20':
  - type: text
    content: 'Ada enfanta Jabal: il fut le père de ceux qui habitent sous des tentes et près des troupeaux. '
  '21':
  - type: text
    content: 'Le nom de son frère était Jubal: il fut le père de tous ceux qui jouent de la harpe et du chalumeau. '
  '22':
  - type: text
    content: 'Tsilla, de son côté, enfanta Tubal-Caïn, qui forgeait tous les instruments d’airain et de fer. La sœur de Tubal-Caïn était Naama. '
  '23':
  - type: text
    content: 'Lémec dit à ses femmes:'
  - type: text
    content: Ada et Tsilla, écoutez ma voix!
  - type: text
    content: Femmes de Lémec, écoutez ma parole!
  - type: text
    content: J’ai tué un homme pour ma blessure,
  - type: text
    content: Et un jeune homme pour ma meurtrissure.
  '24':
  - type: text
    content: 'Caïn sera '
  - type: note
    content: v. 15.
  - type: text
    content: vengé sept fois,
  - type: text
    content: Et Lémec soixante-dix-sept fois.
  - type: heading
    content: 'V. 25-26: cf. Ge 5:3-8.'
  '25':
  - type: text
    content: 'Adam connut encore sa femme; elle enfanta un fils, et l’appela du nom de Seth, car, dit-elle, Dieu m’a donné un autre fils à la place d’Abel, que Caïn a tué. '
  '26':
  - type: text
    content: Seth eut aussi un fils, et il l’appela du nom d’Énosch. C’est alors que l’on commença à invoquer le nom de l’Éternel.
  '3':
  - type: text
    content: 'Au bout de quelque temps, Caïn fit à l’Éternel une offrande des fruits de la terre; '
  '4':
  - type: text
    content: 'et Abel, de son côté, en fit une des premiers-nés de son troupeau et de leur graisse. '
  - type: note
    content: Hé 11:4.
  - type: text
    content: 'L’Éternel porta un regard favorable sur Abel et sur son offrande; '
  '5':
  - type: text
    content: 'mais il ne porta pas un regard favorable sur Caïn et sur son offrande. Caïn fut très irrité, et son visage fut abattu. '
  '6':
  - type: text
    content: 'Et l’Éternel dit à Caïn: Pourquoi es-tu irrité, et pourquoi ton visage est-il abattu? '
  '7':
  - type: text
    content: 'Certainement, si tu agis bien, tu relèveras ton visage, et si tu agis mal, le péché se couche à la porte, et ses désirs se portent vers toi: mais toi, domine sur lui. '
  '8':
  - type: text
    content: 'Cependant, Caïn adressa la parole à son frère Abel; mais, comme ils étaient dans les champs, Caïn se jeta sur son frère Abel, '
  - type: note
    content: Mt 23:35. 1 Jn 3:12. Jud v. 11.
  - type: text
    content: et le tua.
  - type: heading
    content: 'V. 9-16: cf. (Mt 23:35. Hé 12:24.) Job 15:20-24.'
  '9':
  - type: text
    content: 'L’Éternel dit à Caïn: Où est ton frère Abel? Il répondit: Je ne sais pas; suis-je le gardien de mon frère? '
