document_id: JDG.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Son mariage avec une fille des Philistins
  - type: heading
    content: 'V. 1-9: cf. (De 7:3, 4. Né 13:23-27.) 1 S 17:34-37. Pr 20:29.'
  - type: text
    content: 'Samson descendit à Thimna, et il y vit une femme parmi les filles des Philistins. '
  '10':
  - type: text
    content: 'Le père de Samson descendit chez la femme. Et là, Samson fit un festin, car c’était la coutume des jeunes gens. '
  '11':
  - type: text
    content: 'Dès qu’on le vit, on invita trente compagnons qui se tinrent avec lui. '
  '12':
  - type: text
    content: 'Samson leur dit: Je vais vous proposer une énigme. Si vous me l’expliquez pendant les sept jours du festin, et si vous la découvrez, je vous donnerai trente chemises et trente vêtements de rechange. '
  '13':
  - type: text
    content: 'Mais si vous ne pouvez pas me l’expliquer, ce sera vous qui me donnerez trente chemises et trente vêtements de rechange. Ils lui dirent: Propose ton énigme, et nous l’écouterons. '
  '14':
  - type: text
    content: 'Et il leur dit: De celui qui mange est sorti ce qui se mange, et du fort est sorti le doux. Pendant trois jours, ils ne purent expliquer l’énigme. '
  '15':
  - type: text
    content: 'Le septième jour, ils dirent à la femme de Samson: Persuade ton mari de nous expliquer l’énigme; sinon, nous te brûlerons, toi et la maison de ton père. C’est pour nous dépouiller que vous nous avez invités, n’est-ce pas? '
  '16':
  - type: text
    content: 'La femme de Samson pleurait auprès de lui, et disait: Tu n’as pour moi que de la haine, et tu ne m’aimes pas; tu as proposé une énigme aux enfants de mon peuple, et tu ne me l’as point expliquée! Et il lui répondait: Je ne l’ai expliquée ni à mon père ni à ma mère; est-ce à toi que je l’expliquerais? '
  '17':
  - type: text
    content: 'Elle pleura auprès de lui pendant les sept jours que dura leur festin; et le septième jour, il la lui expliqua, car elle le tourmentait. Et elle donna l’explication de l’énigme aux enfants de son peuple. '
  '18':
  - type: text
    content: 'Les gens de la ville dirent à Samson le septième jour, avant le coucher du soleil: Quoi de plus doux que le miel, et quoi de plus fort que le lion? Et il leur dit: Si vous n’aviez pas labouré avec ma génisse, vous n’auriez pas découvert mon énigme. '
  '19':
  - type: text
    content: 'L’esprit de l’Éternel le saisit, et il descendit à Askalon. Il y tua trente hommes, prit leurs dépouilles, et donna les vêtements de rechange à ceux qui avaient expliqué l’énigme. Il était enflammé de colère, et il monta à la maison de son père. '
  '2':
  - type: text
    content: 'Lorsqu’il fut remonté, il le déclara à son père et à sa mère, et dit: J’ai vu à Thimna une femme parmi les filles des Philistins; prenez-la maintenant pour ma femme. '
  '20':
  - type: text
    content: Sa femme fut donnée à l’un de ses compagnons, avec lequel il était lié.
  '3':
  - type: text
    content: 'Son père et sa mère lui dirent: N’y a-t-il point de femme parmi les filles de tes frères et dans tout notre peuple, que tu ailles prendre une femme chez les Philistins, qui sont incirconcis? Et Samson dit à son père: Prends-la pour moi, car elle me plaît. '
  '4':
  - type: text
    content: 'Son père et sa mère ne savaient pas que cela venait de l’Éternel: car Samson cherchait une occasion de dispute de la part des Philistins. En ce temps-là, les Philistins dominaient sur Israël. '
  '5':
  - type: text
    content: 'Samson descendit avec son père et sa mère à Thimna. Lorsqu’ils arrivèrent aux vignes de Thimna, voici, un jeune lion rugissant vint à sa rencontre. '
  '6':
  - type: text
    content: 'L’esprit de l’Éternel saisit Samson; et, sans avoir rien à la main, Samson déchira le lion comme on déchire un chevreau. Il ne dit point à son père et à sa mère ce qu’il avait fait. '
  '7':
  - type: text
    content: 'Il descendit et parla à la femme, et elle lui plut. '
  '8':
  - type: text
    content: 'Quelque temps après, il se rendit de nouveau à Thimna pour la prendre, et se détourna pour voir le cadavre du lion. Et voici, il y avait un essaim d’abeilles et du miel dans le corps du lion. '
  '9':
  - type: text
    content: Il prit entre ses mains le miel, dont il mangea pendant la route; et lorsqu’il fut arrivé près de son père et de sa mère, il leur en donna, et ils en mangèrent. Mais il ne leur dit pas qu’il avait pris ce miel dans le corps du lion.
  - type: heading
    content: 'V. 10-20: cf. (Jg 15:1-8; 16:4-21.) Mi 7:5.'
