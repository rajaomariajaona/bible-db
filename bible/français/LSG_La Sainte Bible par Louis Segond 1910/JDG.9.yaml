document_id: JDG.9,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abimélec, fils de Jerubbaal, se rendit à Sichem vers les frères de sa mère, et voici comment il leur parla, ainsi qu’à toute la famille de la maison du père de sa mère: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et les arbres dirent au figuier: Viens, toi, règne sur nous. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le figuier leur répondit: Renoncerais-je à ma douceur et à mon excellent fruit, pour aller planer sur les arbres? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et les arbres dirent à la vigne: Viens, toi, règne sur nous. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais la vigne leur répondit: Renoncerais-je à mon vin, qui réjouit Dieu et les hommes, pour aller planer sur les arbres? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors tous les arbres dirent au buisson d’épines: Viens, toi, règne sur nous. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et le buisson d’épines répondit aux arbres: Si c’est de bonne foi que vous voulez m’oindre pour votre roi, venez, réfugiez-vous sous mon ombrage; sinon, un feu sortira du buisson d’épines, et dévorera les cèdres du Liban. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, est-ce de bonne foi et avec intégrité que vous avez agi en proclamant roi Abimélec? Avez-vous eu de la bienveillance pour Jerubbaal et sa maison? L’avez-vous traité selon les services qu’il a rendus? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car mon père a combattu pour vous, il a exposé sa vie, et il vous a délivrés de la main de Madian; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et vous, vous vous êtes levés contre la maison de mon père, vous avez tué ses fils, soixante-dix hommes, sur une même pierre, et vous avez proclamé roi sur les habitants de Sichem, Abimélec, fils de sa servante, parce qu’il est votre frère. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si c’est de bonne foi et avec intégrité qu’en ce jour vous avez agi envers Jerubbaal et sa maison, eh bien! Qu’Abimélec fasse votre joie, et que vous fassiez aussi la sienne! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dites, je vous prie, aux oreilles de tous les habitants de Sichem: Vaut-il mieux pour vous que soixante-dix hommes, tous fils de Jerubbaal, dominent sur vous, ou qu’un seul homme domine sur vous? Et souvenez-vous que je suis votre os et votre chair. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sinon, qu’un feu sorte d’Abimélec et dévore les habitants de Sichem et la maison de Millo, et qu’un feu sorte des habitants de Sichem et de la maison de Millo et dévore Abimélec! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jotham se retira et prit la fuite; il s’en alla à Beer, où il demeura loin d’Abimélec, son frère.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fin misérable d’Abimélec
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-57: cf. v. 1-20. Ps 7:15-17.'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abimélec avait dominé trois ans sur Israël. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Dieu envoya un mauvais esprit entre Abimélec et les habitants de Sichem, et les habitants de Sichem furent infidèles à Abimélec, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afin que la violence commise sur les soixante-dix fils de Jerubbaal reçût son châtiment, et que leur sang retombât sur Abimélec, leur frère, qui les avait tués, et sur les habitants de Sichem, qui l’avaient aidé à tuer ses frères. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les habitants de Sichem placèrent en embuscade contre lui, sur les sommets des montagnes, des gens qui dépouillaient tous ceux qui passaient près d’eux sur le chemin. Et cela fut rapporté à Abimélec. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gaal, fils d’Ébed, vint avec ses frères, et ils passèrent à Sichem. Les habitants de Sichem eurent confiance en lui. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils sortirent dans la campagne, vendangèrent leurs vignes, foulèrent les raisins, et se livrèrent à des réjouissances; ils entrèrent dans la maison de leur dieu, ils mangèrent et burent, et ils maudirent Abimélec. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Gaal, fils d’Ébed, disait: Qui est Abimélec, et qu’est Sichem, pour que nous servions Abimélec? N’est-il pas fils de Jerubbaal, et Zebul n’est-il pas son commissaire? Servez les hommes de Hamor, père de Sichem; mais nous, pourquoi servirions-nous Abimélec? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oh! Si j’étais le maître de ce peuple, je renverserais Abimélec. Et il disait d’Abimélec: Renforce ton armée, mets-toi en marche! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les frères de sa mère répétèrent pour lui toutes ces paroles aux oreilles de tous les habitants de Sichem, et leur cœur inclina en faveur d’Abimélec, car ils se disaient: C’est notre frère. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zebul, gouverneur de la ville, apprit ce que disait Gaal, fils d’Ébed, et sa colère s’enflamma. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il envoya secrètement des messagers à Abimélec, pour lui dire: Voici, Gaal, fils d’Ébed, et ses frères, sont venus à Sichem, et ils soulèvent la ville contre toi. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, pars de nuit, toi et le peuple qui est avec toi, et mets-toi en embuscade dans la campagne. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le matin, au lever du soleil, tu fondras avec impétuosité sur la ville. Et lorsque Gaal et le peuple qui est avec lui sortiront contre toi, tu lui feras ce que tes forces permettront. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abimélec et tout le peuple qui était avec lui partirent de nuit, et ils se mirent en embuscade près de Sichem, divisés en quatre corps. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gaal, fils d’Ébed, sortit, et il se tint à l’entrée de la porte de la ville. Abimélec et tout le peuple qui était avec lui se levèrent alors de l’embuscade. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gaal aperçut le peuple, et il dit à Zebul: Voici un peuple qui descend du sommet des montagnes. Zebul lui répondit: C’est l’ombre des montagnes que tu prends pour des hommes. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gaal, reprenant la parole, dit: C’est bien un peuple qui descend des hauteurs du pays, et une troupe arrive par le chemin du chêne des devins. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zebul lui répondit: Où donc est ta bouche, toi qui disais: Qui est Abimélec, pour que nous le servions? N’est-ce point là le peuple que tu méprisais? Marche maintenant, livre-lui bataille! '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gaal s’avança à la tête des habitants de Sichem, et livra bataille à Abimélec. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui donnèrent soixante-dix sicles d’argent, qu’ils enlevèrent de la maison de Baal-Berith. Abimélec s’en servit pour acheter des misérables et des turbulents, qui allèrent après lui. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Poursuivi par Abimélec, il prit la fuite devant lui, et beaucoup d’hommes tombèrent morts jusqu’à l’entrée de la porte. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abimélec s’arrêta à Aruma. Et Zebul chassa Gaal et ses frères, qui ne purent rester à Sichem. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le lendemain, le peuple sortit dans la campagne. Abimélec, qui en fut informé, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'prit sa troupe, la partagea en trois corps, et se mit en embuscade dans la campagne. Ayant vu que le peuple sortait de la ville, il se leva contre eux, et les battit. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abimélec et les corps qui étaient avec lui se portèrent en avant, et se placèrent à l’entrée de la porte de la ville; deux de ces corps se jetèrent sur tous ceux qui étaient dans la campagne, et les battirent. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abimélec attaqua la ville pendant toute la journée; il s’en empara, et tua le peuple qui s’y trouvait. Puis il rasa la ville, et y sema du sel. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cette nouvelle, tous les habitants de la tour de Sichem se rendirent dans la forteresse de la maison du dieu Berith. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On avertit Abimélec que tous les habitants de la tour de Sichem s’y étaient rassemblés. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Abimélec monta sur la montagne de Tsalmon, lui et tout le peuple qui était avec lui. Il prit en main une hache, coupa une branche d’arbre, l’enleva et la mit sur son épaule. Ensuite il dit au peuple qui était avec lui: Vous avez vu ce que j’ai fait, hâtez-vous de faire comme moi. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ils coupèrent chacun une branche, et suivirent Abimélec; ils placèrent les branches contre la forteresse, et l’incendièrent avec ceux qui y étaient. Ainsi périrent tous les gens de la tour de Sichem, au nombre d’environ mille, hommes et femmes. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il vint dans la maison de son père à Ophra, et il tua ses frères, fils de Jerubbaal, soixante-dix hommes, sur une même pierre. Il n’échappa que Jotham, le plus jeune fils de Jerubbaal, car il s’était caché. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abimélec marcha contre Thébets. Il assiégea Thébets, et s’en empara. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait au milieu de la ville une forte tour, où se réfugièrent tous les habitants de la ville, hommes et femmes; ils fermèrent sur eux, et montèrent sur le toit de la tour. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abimélec parvint jusqu’à la tour; il l’attaqua, et s’approcha de la porte pour y mettre le feu. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors une '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 11:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'femme lança sur la tête d’Abimélec un morceau de meule de moulin, et lui brisa le crâne. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussitôt il appela le jeune homme qui portait ses armes, et lui dit: Tire ton épée, et donne-moi la mort, de peur qu’on ne dise de moi: C’est une femme qui l’a tué. Le jeune homme le perça, et il mourut. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand les hommes d’Israël virent qu’Abimélec était mort, ils s’en allèrent chacun chez soi. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi Dieu fit retomber sur Abimélec le mal qu’il avait fait à son père, en tuant ses soixante-dix frères, '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et Dieu fit retomber sur la tête des gens de Sichem tout le mal qu’ils avaient fait. Ainsi s’accomplit sur eux la malédiction de Jotham, fils de Jerubbaal.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les habitants de Sichem et toute la maison de Millo se rassemblèrent; ils vinrent, et proclamèrent roi Abimélec, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 24:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: près du chêne planté dans Sichem.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Apologue de Jotham
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-21: cf. 2 R 14:9, 10. Éz 17.'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jotham en fut informé. Il alla se placer sur le sommet de la montagne de Garizim, et voici ce qu’il leur cria à haute voix: Écoutez-moi, habitants de Sichem, et que Dieu vous écoute! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les arbres partirent pour aller oindre un roi et le mettre à leur tête. Ils dirent à l’olivier: Règne sur nous. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais l’olivier leur répondit: Renoncerais-je à mon huile, qui m’assure les hommages de Dieu et des hommes, pour aller planer sur les arbres? '
