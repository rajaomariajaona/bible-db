document_id: 1SA.30,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsiklag pillée et incendiée par les Amalécites. Les Amalécites battus par David
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-31: cf. (1 Ch 12:19-22. Ge 14:11-16.) Jos 22:8. Jé 41:11, etc. (Ro 15:1-7.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Lorsque David arriva le troisième jour à Tsiklag avec ses gens, les Amalécites avaient fait une invasion dans le midi et à Tsiklag. Ils avaient détruit et brûlé Tsiklag, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'David continua la poursuite avec quatre cents hommes; deux cents hommes s’arrêtèrent, trop fatigués pour passer le torrent de Besor. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ils trouvèrent dans les champs un homme égyptien, qu’ils conduisirent auprès de David. Ils lui firent manger du pain et boire de l’eau, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'et ils lui donnèrent un morceau d’une masse de figues sèches et deux masses de raisins secs. Après qu’il eut mangé, les forces lui revinrent, car il n’avait point pris de nourriture et point bu d’eau depuis trois jours et trois nuits. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'David lui dit: A qui es-tu, et d’où es-tu? Il répondit: Je suis un garçon égyptien, au service d’un homme amalécite, et voilà trois jours que mon maître m’a abandonné parce que j’étais malade. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nous avons fait une invasion dans le midi des Kéréthiens, sur le territoire de Juda et au midi de Caleb, et nous avons brûlé Tsiklag. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'David lui dit: Veux-tu me faire descendre vers cette troupe? Et il répondit: Jure-moi par le nom de Dieu que tu ne me tueras pas et que tu ne me livreras pas à mon maître, et je te ferai descendre vers cette troupe. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il lui servit ainsi de guide. Et voici, les Amalécites étaient répandus sur toute la contrée, mangeant, buvant et dansant, à cause du grand butin qu’ils avaient enlevé du pays des Philistins et du pays de Juda. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'David les battit depuis l’aube du jour jusqu’au soir du lendemain, et aucun d’eux n’échappa, excepté quatre cents jeunes hommes qui montèrent sur des chameaux et s’enfuirent. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'David sauva tout ce que les Amalécites avaient pris, et il délivra aussi ses deux femmes. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Il ne leur manqua personne, ni petit ni grand, ni fils ni fille, ni aucune chose du butin, ni rien de ce qu’on leur avait enlevé: David ramena tout. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'après avoir fait prisonniers les femmes et tous ceux qui s’y trouvaient, petits et grands. Ils n’avaient tué personne, mais ils avaient tout emmené et s’étaient remis en route. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Et David prit tout le menu et le gros bétail; et ceux qui conduisaient ce troupeau et marchaient à sa tête disaient: C’est ici le butin de David. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'David arriva auprès des deux cents hommes qui avaient été trop fatigués pour le suivre, et qu’on avait laissés au torrent de Besor. Ils s’avancèrent à la rencontre de David et du peuple qui était avec lui. David s’approcha d’eux, et leur demanda comment ils se trouvaient. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Tous les hommes méchants et vils parmi les gens qui étaient allés avec David prirent la parole et dirent: Puisqu’ils ne sont pas venus avec nous, nous ne leur donnerons rien du butin que nous avons sauvé, sinon à chacun sa femme et ses enfants; qu’ils les emmènent, et s’en aillent. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Mais David dit: N’agissez pas ainsi, mes frères, au sujet de ce que l’Éternel nous a donné; car il nous a gardés, et il a livré entre nos mains la troupe qui était venue contre nous. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Et qui vous écouterait dans cette affaire? La part doit être la même pour celui qui est descendu sur le champ de bataille et pour celui qui est resté près des bagages: ensemble ils partageront. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Il en fut ainsi dès ce jour et dans la suite, et l’on a fait de cela jusqu’à ce jour une loi et une coutume en Israël. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'De retour à Tsiklag, David envoya une partie du butin aux anciens de Juda, à ses amis, en leur adressant ces paroles: Voici pour vous un présent sur le butin des ennemis de l’Éternel! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Il fit ainsi des envois à ceux de Béthel, à ceux de Ramoth du midi, à ceux de Jatthir, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'à ceux d’Aroër, à ceux de Siphmoth, à ceux d’Eschthemoa, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'à ceux de Racal, à ceux des villes des Jerachmeélites, à ceux des villes des Kéniens, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'David et ses gens arrivèrent à la ville, et voici, elle était brûlée; et leurs femmes, leurs fils et leurs filles, étaient emmenés captifs. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'à ceux de Horma, à ceux de Cor-Aschan, à ceux d’Athac, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: à ceux d’Hébron, et dans tous les lieux que David et ses gens avaient parcourus.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Alors David et le peuple qui était avec lui élevèrent la voix et pleurèrent jusqu’à ce qu’ils n’eussent plus la force de pleurer. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Les deux femmes de David avaient été emmenées, Achinoam de Jizreel, et Abigaïl de Carmel, femme de Nabal. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'David fut dans une grande angoisse, car le peuple parlait de le lapider, parce que tous avaient de l’amertume dans l’âme, chacun à cause de ses fils et de ses filles. Mais David reprit courage en s’appuyant sur l’Éternel, son Dieu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Il dit au sacrificateur Abiathar, fils d’Achimélec: Apporte-moi donc l’éphod! Abiathar apporta l’éphod à David. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Et David consulta l’Éternel, en disant: Poursuivrai-je cette troupe? L’atteindrai-je? L’Éternel lui répondit: Poursuis, car tu atteindras, et tu délivreras. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Et David se mit en marche, lui et les six cents hommes qui étaient avec lui. Ils arrivèrent au torrent de Besor, où s’arrêtèrent ceux qui restaient en arrière. '
