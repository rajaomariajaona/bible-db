document_id: ISA.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Chant de délivrance
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. (És 52:8-10. Jé 31:10-14. So 3:14, 15.) Ps 98.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tu diras en ce jour-là:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te loue, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu as été irrité contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta colère s’est apaisée, et tu m’as consolé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Voici, Dieu est ma délivrance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je serai plein de confiance, et je ne craindrai rien;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Éternel, l’Éternel est ma force et le sujet de mes louanges;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est lui qui m’a sauvé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:37
      metadata:
        usfm: JHN.7.37
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '38'
      metadata:
        usfm: JHN.7.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Vous puiserez de l’eau avec joie
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aux sources du salut,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et vous direz en ce jour-là:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez l’Éternel, invoquez son nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Publiez ses œuvres parmi les peuples,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 17:1
      metadata:
        usfm: JHN.17.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: JHN.17.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: JHN.17.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: JHN.17.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Rappelez la grandeur de son nom!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Célébrez l’Éternel, car il a fait des choses magnifiques:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’elles soient connues par toute la terre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Pousse des cris de joie et d’allégresse, habitant de Sion!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il est grand au milieu de toi, le Saint d’Israël.
