document_id: ISA.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Chant de délivrance
  - type: heading
    content: 'V. 1-6: cf. (És 52:8-10. Jé 31:10-14. So 3:14, 15.) Ps 98.'
  - type: text
    content: 'Tu diras en ce jour-là:'
  - type: text
    content: Je te loue, ô Éternel!
  - type: text
    content: Car tu as été irrité contre moi,
  - type: text
    content: Ta colère s’est apaisée, et tu m’as consolé.
  '2':
  - type: text
    content: Voici, Dieu est ma délivrance,
  - type: text
    content: Je serai plein de confiance, et je ne craindrai rien;
  - type: text
    content: Car l’Éternel, l’Éternel est ma force et le sujet de mes louanges;
  - type: text
    content: C’est lui qui m’a sauvé.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Jn 7:37, 38.
  - type: text
    content: Vous puiserez de l’eau avec joie
  - type: text
    content: Aux sources du salut,
  '4':
  - type: text
    content: 'Et vous direz en ce jour-là:'
  - type: text
    content: Louez l’Éternel, invoquez son nom,
  - type: text
    content: Publiez ses œuvres parmi les peuples,
  - type: note
    content: Jn 17:1, 4, 6, 26.
  - type: text
    content: Rappelez la grandeur de son nom!
  '5':
  - type: text
    content: 'Célébrez l’Éternel, car il a fait des choses magnifiques:'
  - type: text
    content: Qu’elles soient connues par toute la terre!
  '6':
  - type: text
    content: Pousse des cris de joie et d’allégresse, habitant de Sion!
  - type: text
    content: Car il est grand au milieu de toi, le Saint d’Israël.
