document_id: DAN.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Vision de Daniel: les quatre animaux'
  - type: heading
    content: 'V. 1-14: cf. Da 2:31-45. (Éz 1:26-28. Ap 4:2, etc.) (Ps 2:6, etc.; 110. Ép 1:20-23. Ap 11:15.)'
  - type: text
    content: 'La première année de Belschatsar, roi de Babylone, Daniel eut un songe et des visions de son esprit, pendant qu’il était sur sa couche. Ensuite il écrivit le songe, et raconta les principales choses. '
  '10':
  - type: text
    content: 'Un fleuve de feu coulait et sortait de devant lui. '
  - type: note
    content: Ap 5:11.
  - type: text
    content: 'Mille milliers le servaient, et dix mille millions se tenaient en sa présence. Les juges s’assirent, et les '
  - type: note
    content: Ap 20:12.
  - type: text
    content: 'livres furent ouverts. '
  '11':
  - type: text
    content: 'Je regardai alors, à cause des paroles arrogantes que prononçait la corne; et tandis que je regardais, l’animal fut tué, et son corps fut anéanti, livré au feu pour être brûlé. '
  '12':
  - type: text
    content: 'Les autres animaux furent dépouillés de leur puissance, mais une prolongation de vie leur fut accordée jusqu’à un certain temps. '
  '13':
  - type: text
    content: 'Je regardai pendant mes visions nocturnes, et voici, sur les nuées des cieux arriva quelqu’un de semblable à un fils de l’homme; il s’avança vers l’ancien des jours, et on le fit approcher de lui. '
  '14':
  - type: text
    content: 'On lui donna la domination, la gloire et le règne; et tous les peuples, les nations, et les hommes de toutes langues le servirent. '
  - type: note
    content: Da 2:44. Lu 1:33.
  - type: text
    content: Sa domination est une domination éternelle qui ne passera point, et son règne ne sera jamais détruit.
  - type: heading
    content: 'V. 15-28: cf. v. 1-14. (Ap 13. 2 Th 2:3-8.) Da 2:44.'
  '15':
  - type: text
    content: 'Moi, Daniel, j’eus l’esprit troublé au-dedans de moi, et les visions de ma tête m’effrayèrent. '
  '16':
  - type: text
    content: 'Je m’approchai de l’un de ceux qui étaient là, et je lui demandai ce qu’il y avait de vrai dans toutes ces choses. Il me le dit, et m’en donna l’explication: '
  '17':
  - type: text
    content: 'Ces quatre grands animaux, ce sont quatre rois qui s’élèveront de la terre; '
  '18':
  - type: text
    content: 'mais les saints du Très-Haut recevront le royaume, et ils posséderont le royaume éternellement, d’éternité en éternité. '
  '19':
  - type: text
    content: 'Ensuite je désirai savoir la vérité sur le quatrième animal, qui était différent de tous les autres, extrêmement terrible, qui avait des dents de fer et des ongles d’airain, qui mangeait, brisait, et foulait aux pieds ce qui restait; '
  '2':
  - type: text
    content: 'Daniel commença et dit: Je regardais pendant ma vision nocturne, et voici, les quatre vents des cieux firent irruption sur la grande mer. '
  '20':
  - type: text
    content: 'et sur les dix cornes qu’il avait à la tête, et sur l’autre qui était sortie et devant laquelle trois étaient tombées, sur cette corne qui avait des yeux, une bouche parlant avec arrogance, et une plus grande apparence que les autres. '
  '21':
  - type: text
    content: 'Je vis cette corne faire la guerre aux saints, et l’emporter sur eux, '
  '22':
  - type: text
    content: 'jusqu’au moment où l’ancien des jours vint donner droit aux saints du Très-Haut, et le temps arriva où les saints furent en possession du royaume. '
  '23':
  - type: text
    content: 'Il me parla ainsi: Le quatrième animal, c’est un quatrième royaume qui existera sur la terre, différent de tous les royaumes, et qui dévorera toute la terre, la foulera et la brisera. '
  '24':
  - type: text
    content: 'Les dix cornes, ce sont dix rois qui s’élèveront de ce royaume. Un autre s’élèvera après eux, il sera différent des premiers, et il abaissera trois rois. '
  '25':
  - type: note
    content: Da 11:36.
  - type: text
    content: 'Il prononcera des paroles contre le Très-Haut, il opprimera les saints du Très Haut, et il espérera changer les temps et la loi; et les saints seront livrés entre ses mains pendant un temps, des temps, et la moitié d’un temps. '
  '26':
  - type: text
    content: 'Puis viendra le jugement, et on lui ôtera sa domination, qui sera détruite et anéantie pour jamais. '
  '27':
  - type: text
    content: 'Le règne, la domination, et la grandeur de tous les royaumes qui sont sous les cieux, seront donnés au peuple des saints du Très-Haut. Son règne est un règne éternel, et tous les dominateurs le serviront et lui obéiront. '
  '28':
  - type: text
    content: Ici finirent les paroles. Moi, Daniel, je fus extrêmement troublé par mes pensées, je changeai de couleur, et je conservai ces paroles dans mon cœur.
  '3':
  - type: text
    content: 'Et quatre grands animaux sortirent de la mer, différents l’un de l’autre. '
  '4':
  - type: text
    content: 'Le premier était semblable à un lion, et avait des ailes d’aigles; je regardai, jusqu’au moment où ses ailes furent arrachées; il fut enlevé de terre et mis debout sur ses pieds comme un homme, et un cœur d’homme lui fut donné. '
  '5':
  - type: text
    content: 'Et voici, un second animal était semblable à un ours, et se tenait sur un côté; il avait trois côtes dans la gueule entre les dents, et on lui disait: Lève-toi, mange beaucoup de chair. '
  '6':
  - type: text
    content: 'Après cela je regardai, et voici, un autre était semblable à un léopard, et avait sur le dos quatre ailes comme un oiseau; cet animal avait quatre têtes, et la domination lui fut donnée. '
  '7':
  - type: text
    content: 'Après cela, je regardai pendant mes visions nocturnes, et voici, il y avait un quatrième animal, terrible, épouvantable et extraordinairement fort; il avait de grandes dents de fer, il mangeait, brisait, et il foulait aux pieds ce qui restait; il était différent de tous les animaux précédents, et il avait dix cornes. '
  '8':
  - type: text
    content: 'Je considérai les cornes, et voici, une autre petite corne sortit du milieu d’elles, et trois des premières cornes furent arrachées devant cette corne; et voici, elle avait des yeux comme des yeux d’homme, et une bouche, qui parlait avec arrogance. '
  '9':
  - type: text
    content: 'Je regardai, pendant que l’on plaçait des trônes. Et l’ancien des jours s’assit. Son vêtement était blanc comme la neige, et les cheveux de sa tête étaient comme de la laine pure; son trône était comme des flammes de feu, et les roues comme un feu ardent. '
