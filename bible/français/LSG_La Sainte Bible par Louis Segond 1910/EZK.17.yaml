document_id: EZK.17,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Punition de Sédécias rebelle envers le roi de Babylone
  - type: heading
    content: 'V. 1-21: cf. Éz 19:5-9. (2 R 24:10-20; 25:1-7. 2 Ch 36:9-13.)'
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '10':
  - type: text
    content: 'Voici, elle est plantée: prospérera-t-elle? Si le vent d’orient la touche, ne séchera-t-elle pas? Elle séchera sur le parterre où elle a poussé. '
  '11':
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '12':
  - type: text
    content: 'Dis à la maison rebelle: Ne savez-vous pas ce que cela signifie? Dis: Voici, le roi de Babylone est allé à Jérusalem, il en a pris le roi et les chefs, et les a emmenés avec lui à Babylone. '
  '13':
  - type: text
    content: 'Il a choisi un membre de la race royale, a traité '
  - type: note
    content: Jé 34:18.
  - type: text
    content: 'alliance avec lui, et lui a fait prêter serment, et il a emmené les grands du pays, '
  '14':
  - type: text
    content: 'afin que le royaume fût tenu dans l’abaissement, sans pouvoir s’élever, et qu’il gardât son alliance en y demeurant fidèle. '
  '15':
  - type: text
    content: 'Mais il s’est révolté contre lui, en envoyant ses messagers en Égypte, '
  - type: note
    content: Jé 37:5.
  - type: text
    content: 'pour qu’elle lui donnât des chevaux et un grand nombre d’hommes. Celui qui a fait de telles choses réussira-t-il, échappera-t-il? Il a rompu l’alliance, et il échapperait! '
  '16':
  - type: text
    content: 'Je suis vivant! Dit le Seigneur, l’Éternel, c’est dans le pays du roi qui l’a fait régner, envers qui il a violé son serment et dont il a rompu l’alliance, c’est près de lui, au milieu de Babylone, qu’il mourra. '
  '17':
  - type: text
    content: 'Pharaon n’ira pas avec une grande armée et un peuple nombreux le '
  - type: note
    content: Jé 37:7.
  - type: text
    content: 'secourir pendant la guerre, lorsqu’on élèvera des '
  - type: note
    content: Éz 4:2.
  - type: text
    content: 'terrasses et qu’on fera des '
  - type: note
    content: 2 R 25:1. És 29:3. Éz 4:2.
  - type: text
    content: 'retranchements pour exterminer une multitude d’âmes. '
  '18':
  - type: text
    content: 'Il a méprisé le serment, il a rompu l’alliance; il avait donné sa main, et il a fait tout cela; il n’échappera pas! '
  '19':
  - type: text
    content: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel: Je suis vivant! C’est le serment fait en mon nom qu’il a méprisé, c’est mon alliance qu’il a rompue. Je ferai retomber cela sur sa tête. '
  '2':
  - type: text
    content: 'Fils de l’homme, propose une énigme, dis une parabole à la maison d’Israël! '
  '20':
  - type: text
    content: 'J’étendrai mon '
  - type: note
    content: Éz 12:13; 32:3.
  - type: text
    content: 'rets sur lui, et il sera pris dans mon filet; je l’emmènerai à Babylone, et là je '
  - type: note
    content: Jé 4:12; 25:31.
  - type: text
    content: 'plaiderai avec lui sur sa perfidie à mon égard. '
  '21':
  - type: text
    content: 'Tous les fuyards de toutes ses troupes tomberont par '
  - type: note
    content: Éz 16:40.
  - type: text
    content: 'l’épée, et ceux qui resteront seront '
  - type: note
    content: Éz 5:10, 12; 12:14.
  - type: text
    content: dispersés à tous les vents. Et vous saurez que moi, l’Éternel, j’ai parlé.
  - type: heading
    content: 'V. 22-24: cf. Jé 23:5, 6. Lu 1:30-33.'
  '22':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel: J’enlèverai, moi, la cime d’un grand cèdre, et je la placerai; j’arracherai du sommet de ses branches un tendre rameau, et je le planterai sur une montagne haute et élevée. '
  '23':
  - type: text
    content: 'Je le planterai sur une haute montagne d’Israël; il produira des branches et portera du fruit, il deviendra un cèdre magnifique. Les oiseaux de toute espèce reposeront sous lui, tout ce qui a des ailes reposera sous l’ombre de ses rameaux. '
  '24':
  - type: text
    content: Et tous les arbres des champs sauront que moi, l’Éternel, j’ai abaissé l’arbre qui s’élevait et élevé l’arbre qui était abaissé, que j’ai desséché l’arbre vert et fait verdir l’arbre sec. Moi, l’Éternel, j’ai parlé, et j’agirai.
  '3':
  - type: text
    content: 'Tu diras: Ainsi parle le Seigneur, l’Éternel: Un grand aigle, aux longues ailes, aux ailes déployées, couvert de plumes de toutes couleurs, vint sur le Liban, et enleva la cime d’un cèdre. '
  '4':
  - type: text
    content: 'Il arracha le plus élevé de ses rameaux, l’emporta dans un pays de commerce, et le déposa dans une ville de marchands. '
  '5':
  - type: text
    content: 'Et il prit un rejeton du pays, et le plaça dans un sol fertile; il le mit près d’une eau abondante, et le planta comme un saule. '
  '6':
  - type: text
    content: 'Ce rejeton poussa, et devint un cep de vigne étendu, mais de peu d’élévation; ses rameaux étaient tournés vers l’aigle, et ses racines étaient sous lui; il devint un cep de vigne, donna des jets, et produisit des branches. '
  '7':
  - type: text
    content: 'Il y avait un autre aigle, grand, aux longues ailes, au plumage épais. Et voici, du parterre où elle était plantée, cette vigne étendit avec avidité ses racines de son côté et dirigea ses rameaux vers lui, afin qu’il l’arrosât. '
  '8':
  - type: text
    content: 'Elle était plantée dans un bon terrain, près d’une eau abondante, de manière à produire des branches et à porter du fruit, à devenir une vigne magnifique. '
  '9':
  - type: text
    content: 'Dis: Ainsi parle le Seigneur, l’Éternel: Prospérera-t-elle? Le premier aigle n’arrachera-t-il pas ses racines, n’enlèvera-t-il pas son fruit, afin qu’elle se dessèche, afin que toutes les feuilles qu’elle a poussées se dessèchent? Et il ne faudra ni beaucoup de force ni un peuple nombreux pour la séparer de ses racines. '
