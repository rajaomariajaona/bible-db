document_id: EZK.17,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Punition de Sédécias rebelle envers le roi de Babylone
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-21: cf. Éz 19:5-9. (2 R 24:10-20; 25:1-7. 2 Ch 36:9-13.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici, elle est plantée: prospérera-t-elle? Si le vent d’orient la touche, ne séchera-t-elle pas? Elle séchera sur le parterre où elle a poussé. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dis à la maison rebelle: Ne savez-vous pas ce que cela signifie? Dis: Voici, le roi de Babylone est allé à Jérusalem, il en a pris le roi et les chefs, et les a emmenés avec lui à Babylone. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a choisi un membre de la race royale, a traité '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 34:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'alliance avec lui, et lui a fait prêter serment, et il a emmené les grands du pays, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afin que le royaume fût tenu dans l’abaissement, sans pouvoir s’élever, et qu’il gardât son alliance en y demeurant fidèle. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il s’est révolté contre lui, en envoyant ses messagers en Égypte, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 37:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pour qu’elle lui donnât des chevaux et un grand nombre d’hommes. Celui qui a fait de telles choses réussira-t-il, échappera-t-il? Il a rompu l’alliance, et il échapperait! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je suis vivant! Dit le Seigneur, l’Éternel, c’est dans le pays du roi qui l’a fait régner, envers qui il a violé son serment et dont il a rompu l’alliance, c’est près de lui, au milieu de Babylone, qu’il mourra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pharaon n’ira pas avec une grande armée et un peuple nombreux le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 37:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'secourir pendant la guerre, lorsqu’on élèvera des '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 4:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'terrasses et qu’on fera des '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 25:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 29:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 4:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'retranchements pour exterminer une multitude d’âmes. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a méprisé le serment, il a rompu l’alliance; il avait donné sa main, et il a fait tout cela; il n’échappera pas! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel: Je suis vivant! C’est le serment fait en mon nom qu’il a méprisé, c’est mon alliance qu’il a rompue. Je ferai retomber cela sur sa tête. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de l’homme, propose une énigme, dis une parabole à la maison d’Israël! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’étendrai mon '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 12:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'rets sur lui, et il sera pris dans mon filet; je l’emmènerai à Babylone, et là je '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 4:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'plaiderai avec lui sur sa perfidie à mon égard. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les fuyards de toutes ses troupes tomberont par '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 16:40
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'l’épée, et ceux qui resteront seront '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 5:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: dispersés à tous les vents. Et vous saurez que moi, l’Éternel, j’ai parlé.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-24: cf. Jé 23:5, 6. Lu 1:30-33.'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi parle le Seigneur, l’Éternel: J’enlèverai, moi, la cime d’un grand cèdre, et je la placerai; j’arracherai du sommet de ses branches un tendre rameau, et je le planterai sur une montagne haute et élevée. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je le planterai sur une haute montagne d’Israël; il produira des branches et portera du fruit, il deviendra un cèdre magnifique. Les oiseaux de toute espèce reposeront sous lui, tout ce qui a des ailes reposera sous l’ombre de ses rameaux. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et tous les arbres des champs sauront que moi, l’Éternel, j’ai abaissé l’arbre qui s’élevait et élevé l’arbre qui était abaissé, que j’ai desséché l’arbre vert et fait verdir l’arbre sec. Moi, l’Éternel, j’ai parlé, et j’agirai.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu diras: Ainsi parle le Seigneur, l’Éternel: Un grand aigle, aux longues ailes, aux ailes déployées, couvert de plumes de toutes couleurs, vint sur le Liban, et enleva la cime d’un cèdre. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il arracha le plus élevé de ses rameaux, l’emporta dans un pays de commerce, et le déposa dans une ville de marchands. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il prit un rejeton du pays, et le plaça dans un sol fertile; il le mit près d’une eau abondante, et le planta comme un saule. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce rejeton poussa, et devint un cep de vigne étendu, mais de peu d’élévation; ses rameaux étaient tournés vers l’aigle, et ses racines étaient sous lui; il devint un cep de vigne, donna des jets, et produisit des branches. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait un autre aigle, grand, aux longues ailes, au plumage épais. Et voici, du parterre où elle était plantée, cette vigne étendit avec avidité ses racines de son côté et dirigea ses rameaux vers lui, afin qu’il l’arrosât. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle était plantée dans un bon terrain, près d’une eau abondante, de manière à produire des branches et à porter du fruit, à devenir une vigne magnifique. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dis: Ainsi parle le Seigneur, l’Éternel: Prospérera-t-elle? Le premier aigle n’arrachera-t-il pas ses racines, n’enlèvera-t-il pas son fruit, afin qu’elle se dessèche, afin que toutes les feuilles qu’elle a poussées se dessèchent? Et il ne faudra ni beaucoup de force ni un peuple nombreux pour la séparer de ses racines. '
