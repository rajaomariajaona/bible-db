document_id: MRK.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paraboles du semeur, de la semence, du grain de sénevé
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-20: cf. (Mt 13:1-23. Lu 8:1-15.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:1
      metadata:
        usfm: MAT.13.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:4
      metadata:
        usfm: LUK.8.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus se mit de nouveau à enseigner au bord de la mer. Une grande foule s’étant assemblée auprès de lui, il monta et s’assit dans une barque, sur la mer. Toute la foule était à terre sur le rivage. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il leur enseigna beaucoup de choses en paraboles, et il leur dit dans son enseignement:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Écoutez. Un semeur sortit pour semer.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Comme il semait, une partie de la semence tomba le long du chemin: les oiseaux vinrent, et la mangèrent.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Une autre partie tomba dans un endroit pierreux, où elle n’avait pas beaucoup de terre; elle leva aussitôt, parce qu’elle ne trouva pas un sol profond;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais, quand le soleil parut, elle fut brûlée et sécha, faute de racines.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Une autre partie tomba parmi les épines: les épines montèrent, et l’étouffèrent, et elle ne donna point de fruit.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Une autre partie tomba dans la bonne terre: elle donna du fruit qui montait et croissait, et elle rapporta trente, soixante, et cent pour un.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Puis il dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que celui qui a des oreilles pour entendre entende.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:10
      metadata:
        usfm: MAT.13.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:9
      metadata:
        usfm: LUK.8.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu’il fut en particulier, ceux qui l’entouraient avec les douze l’interrogèrent sur les paraboles. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il leur dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 11:25
      metadata:
        usfm: MAT.11.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 2:14
      metadata:
        usfm: 2CO.2.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est à vous qu’a été donné le mystère du royaume de Dieu;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 3:14
      metadata:
        usfm: 2CO.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais pour ceux qui sont dehors tout se passe en paraboles,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 6:9
      metadata:
        usfm: ISA.6.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:14
      metadata:
        usfm: MAT.13.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:10
      metadata:
        usfm: LUK.8.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:40
      metadata:
        usfm: JHN.12.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 28:26
      metadata:
        usfm: ACT.28.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:8
      metadata:
        usfm: ROM.11.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: afin qu’en voyant ils voient et n’aperçoivent point, et qu’en entendant ils entendent et ne comprennent point, de peur qu’ils ne se convertissent, et que les péchés ne leur soient pardonnés.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il leur dit encore: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous ne comprenez pas cette parabole? Comment donc comprendrez-vous toutes les paraboles?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:19
      metadata:
        usfm: MAT.13.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:11
      metadata:
        usfm: LUK.8.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le semeur sème la parole.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Les uns sont le long du chemin, où la parole est semée; quand ils l’ont entendue, aussitôt Satan vient et enlève la parole qui a été semée en eux.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Les autres, pareillement, reçoivent la semence dans les endroits pierreux; quand ils entendent la parole, ils la reçoivent d’abord avec joie;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais ils n’ont pas de racine en eux-mêmes, ils manquent de persistance, et, dès que survient une tribulation ou une persécution à cause de la parole, ils y trouvent une occasion de chute.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: D’autres reçoivent la semence parmi les épines; ce sont ceux qui entendent la parole,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 19:23
      metadata:
        usfm: MAT.19.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 10:23
      metadata:
        usfm: MRK.10.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 18:24
      metadata:
        usfm: LUK.18.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 6:9
      metadata:
        usfm: 1TI.6.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais en qui les soucis du siècle, la séduction des richesses et l’invasion des autres convoitises, étouffent la parole, et la rendent infructueuse.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: D’autres reçoivent la semence dans la bonne terre; ce sont ceux qui entendent la parole, la reçoivent, et portent du fruit, trente, soixante, et cent pour un.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-25: cf. Lu 8:16-18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:15
      metadata:
        usfm: MAT.5.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:16
      metadata:
        usfm: LUK.8.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:33
      metadata:
        usfm: LUK.11.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il leur dit encore: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Apporte-t-on la lampe pour la mettre sous le boisseau, ou sous le lit? N’est-ce pas pour la mettre sur le chandelier?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 12:22
      metadata:
        usfm: JOB.12.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:26
      metadata:
        usfm: MAT.10.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:17
      metadata:
        usfm: LUK.8.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:2
      metadata:
        usfm: LUK.12.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car il n’est rien de caché qui ne doive être découvert, rien de secret qui ne doive être mis au jour.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si quelqu’un a des oreilles pour entendre, qu’il entende.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il leur dit encore: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Prenez garde à ce que vous entendez.
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 7:2
      metadata:
        usfm: MAT.7.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 6:38
      metadata:
        usfm: LUK.6.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: On vous mesurera avec la mesure dont vous vous serez servis, et on y ajoutera pour vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:12
      metadata:
        usfm: MAT.13.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:29
      metadata:
        usfm: MAT.25.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:18
      metadata:
        usfm: LUK.8.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:26
      metadata:
        usfm: LUK.19.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car on donnera à celui qui a; mais à celui qui n’a pas on ôtera même ce qu’il a.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 26-29: cf. És 55:10, 11. 1 Co 3:6, 7. Ph 1:6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il dit encore: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il en est du royaume de Dieu comme quand un homme jette de la semence en terre;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: qu’il dorme ou qu’il veille, nuit et jour, la semence germe et croît sans qu’il sache comment.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: La terre produit d’elle-même, d’abord l’herbe, puis l’épi, puis le grain tout formé dans l’épi;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et, dès que le fruit est mûr, on y met la faucille, car la moisson est là.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 30-34: cf. (Mt 13:31-35. Lu 13:18, 19.) Da 2:34, 35.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:31
      metadata:
        usfm: MAT.13.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 13:18
      metadata:
        usfm: LUK.13.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il dit encore: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A quoi comparerons-nous le royaume de Dieu, ou par quelle parabole le représenterons-nous?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il est semblable à un grain de sénevé, qui, lorsqu’on le sème en terre, est la plus petite de toutes les semences qui sont sur la terre;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais, lorsqu’il a été semé, il monte, devient plus grand que tous les légumes, et pousse de grandes branches, en sorte que les oiseaux du ciel peuvent habiter sous son ombre.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:34
      metadata:
        usfm: MAT.13.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est par beaucoup de paraboles de ce genre qu’il leur annonçait la parole, selon qu’ils étaient capables de l’entendre. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
