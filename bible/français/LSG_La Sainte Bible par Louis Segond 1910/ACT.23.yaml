document_id: ACT.23,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul, les regards fixés sur le sanhédrin, dit: Hommes frères, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 24:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'c’est en toute bonne conscience que je me suis conduit jusqu’à ce jour devant Dieu… '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme la discorde allait croissant, le tribun craignant que Paul ne fût mis en pièces par ces gens, fit descendre les soldats pour l’enlever du milieu d’eux et le conduire à la forteresse. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 18:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'La nuit suivante, le Seigneur apparut à Paul, et dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Prends courage; car, de même que tu as rendu témoignage de moi dans Jérusalem, il faut aussi que tu rendes témoignage dans Rome.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Complot des Juifs contre Paul. Ordre de le conduire à Césarée
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-35: cf. Ac 9:23-25. Ps 3; 59:4. 2 Co 11:23, 26.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 23:21
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '30'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand le jour fut venu, les Juifs formèrent un complot, et firent des imprécations contre eux-mêmes, en disant qu’ils s’abstiendraient de manger et de boire jusqu’à ce qu’ils eussent tué Paul. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui formèrent ce complot étaient plus de quarante, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et ils allèrent trouver les principaux sacrificateurs et les anciens, auxquels ils dirent: Nous nous sommes engagés, avec des imprécations contre nous-mêmes, à ne rien manger jusqu’à ce que nous ayons tué Paul. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous donc, maintenant, adressez-vous avec le sanhédrin au tribun, pour qu’il l’amène devant vous, comme si vous vouliez examiner sa cause plus exactement; et nous, avant qu’il approche, nous sommes prêts à le tuer. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le fils de la sœur de Paul, ayant eu connaissance du guet-apens, alla dans la forteresse en informer Paul. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul appela l’un des centeniers, et dit: Mène ce jeune homme vers le tribun, car il a quelque chose à lui rapporter. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le centenier prit le jeune homme avec lui, le conduisit vers le tribun, et dit: Le prisonnier Paul m’a appelé, et il m’a prié de t’amener ce jeune homme, qui a quelque chose à te dire. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le tribun, prenant le jeune homme par la main, et se retirant à l’écart, lui demanda: Qu’as-tu à m’annoncer? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 22:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 20:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 18:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le souverain sacrificateur Ananias ordonna à ceux qui étaient près de lui de le frapper sur la bouche. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il répondit: Les Juifs sont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 23:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'convenus de te prier d’amener Paul demain devant le sanhédrin, comme si tu devais t’enquérir de lui plus exactement. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne les écoute pas, car plus de quarante d’entre eux lui dressent un guet-apens, et se sont engagés, avec des imprécations contre eux-mêmes, à ne rien manger ni boire jusqu’à ce qu’ils l’aient tué; maintenant ils sont prêts, et n’attendent que ton consentement. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le tribun renvoya le jeune homme, après lui avoir recommandé de ne parler à personne de ce rapport qu’il lui avait fait. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ensuite il appela deux des centeniers, et dit: Tenez prêts, dès la troisième heure de la nuit, deux cents soldats, soixante-dix cavaliers et deux cents archers, pour aller jusqu’à Césarée. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qu’il y ait aussi des montures pour Paul, afin qu’on le mène sain et sauf au gouverneur Félix. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il écrivit une lettre ainsi conçue: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Claude Lysias au très excellent gouverneur Félix, salut! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 21:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Cet homme, dont les Juifs s’étaient saisis, allait être tué par eux, lorsque je survins avec des soldats et le leur enlevai, ayant appris qu’il était Romain. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voulant connaître le motif pour lequel ils l’accusaient, je l’amenai devant leur sanhédrin. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai trouvé qu’il était accusé au sujet de questions relatives à leur loi, mais qu’il n’avait commis aucun crime qui mérite la mort ou la prison. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Paul lui dit: Dieu te frappera, muraille blanchie! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 17:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu es assis pour me juger selon la loi, et tu violes la loi en ordonnant qu’on me frappe! '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Informé que les Juifs lui dressaient des embûches, je te l’ai aussitôt envoyé, en faisant savoir à ses accusateurs qu’ils eussent à s’adresser eux-mêmes à toi. Adieu. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les soldats, selon l’ordre qu’ils avaient reçu, prirent Paul, et le conduisirent pendant la nuit jusqu’à Antipatris. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le lendemain, laissant les cavaliers poursuivre la route avec lui, ils retournèrent à la forteresse. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arrivés à Césarée, les cavaliers remirent la lettre au gouverneur, et lui présentèrent Paul. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le gouverneur, après avoir lu la lettre, demanda de quelle province était Paul. Ayant appris qu’il était de la Cilicie: '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je t’entendrai, dit-il, quand tes accusateurs seront venus. Et il ordonna qu’on le gardât dans le prétoire d’Hérode.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui étaient près de lui dirent: Tu insultes le souverain sacrificateur de Dieu! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Paul dit: Je ne savais pas, frères, que ce fût le souverain sacrificateur; car il est écrit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 22:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu ne parleras pas mal du chef de ton peuple. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul, sachant qu’une partie de l’assemblée était composée de sadducéens et l’autre de pharisiens, s’écria dans le sanhédrin: Hommes frères, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 24:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 3:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'je suis pharisien, fils de pharisiens; c’est à cause de l’espérance et de la résurrection des morts que je suis mis en jugement. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand il eut dit cela, il s’éleva une discussion entre les pharisiens et les sadducéens, et l’assemblée se divisa. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 22:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 12:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 20:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car les sadducéens disent qu’il n’y a point de résurrection, et qu’il n’existe ni ange ni esprit, tandis que les pharisiens affirment les deux choses. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y eut une grande clameur, et quelques scribes du parti des pharisiens, s’étant levés, engagèrent un vif débat, et dirent: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 25:25
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Nous ne trouvons aucun mal en cet homme; peut-être un esprit ou un ange lui a-t-il parlé. '
