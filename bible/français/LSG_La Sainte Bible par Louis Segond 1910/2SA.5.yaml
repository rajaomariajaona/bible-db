document_id: 2SA.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David, roi de Juda et de tout Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. (1 Ch 12:23-40; 11:1-3.) Ps 118:22-26; 2:6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 11:1
      metadata:
        usfm: 1CH.11.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Toutes les tribus d’Israël vinrent auprès de David, à Hébron, et dirent: Voici, nous sommes tes os et ta chair. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Autrefois déjà, lorsque Saül était notre roi, c’était toi qui conduisais et qui ramenais Israël. L’Éternel t’a dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:7
      metadata:
        usfm: 2SA.7.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:71
      metadata:
        usfm: PSA.78.71
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu paîtras mon peuple d’Israël, et tu seras le chef d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ainsi tous les anciens d’Israël vinrent auprès du roi à Hébron, et le roi David fit alliance avec eux à Hébron, devant l’Éternel. Ils oignirent David pour roi sur Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David était âgé de trente ans lorsqu’il devint roi, et il régna quarante ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 2:11
      metadata:
        usfm: 2SA.2.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 2:11
      metadata:
        usfm: 1KI.2.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 3:4
      metadata:
        usfm: 1CH.3.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: A Hébron il régna sur Juda sept ans et six mois, et à Jérusalem il régna trente-trois ans sur tout Israël et Juda.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Expulsion des Jébusiens et résidence de David à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-10: cf. 1 Ch 11:4, etc. Ps 48:3; 87:2; 24:3, etc.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le roi marcha avec ses gens sur Jérusalem contre les Jébusiens, habitants du pays. Ils dirent à David: Tu n’entreras point ici, car les aveugles mêmes et les boiteux te repousseront! Ce qui voulait dire: David n’entrera point ici. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais David s’empara de la forteresse de Sion: c’est la cité de David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'David avait dit en ce jour: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 11:6
      metadata:
        usfm: 1CH.11.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quiconque battra les Jébusiens et atteindra le canal, quiconque frappera ces boiteux et ces aveugles qui sont les ennemis de David… C’est pourquoi l’on dit: L’aveugle et le boiteux n’entreront point dans la maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'David s’établit dans la forteresse, qu’il appela cité de David. Il fit de tous côtés des constructions, en dehors et en dedans de Millo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: David devenait de plus en plus grand, et l’Éternel, le Dieu des armées, était avec lui.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-16: cf. 1 Ch 14:1-7; 3:5-9. Ps 127:3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 14:1
      metadata:
        usfm: 1CH.14.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Hiram, roi de Tyr, envoya des messagers à David, et du bois de cèdre, et des charpentiers et des tailleurs de pierres, qui bâtirent une maison pour David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'David reconnut que l’Éternel l’affermissait comme roi d’Israël, et qu’il élevait son royaume à cause de son peuple d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 3:9
      metadata:
        usfm: 1CH.3.9
    - type: text
      text: ; 14:3, etc.
    marker-yv: yv-n
  - type: text
    text: 'David prit encore des concubines et des femmes de Jérusalem, après qu’il fut venu d’Hébron, et il lui naquit encore des fils et des filles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Ch 3:5, etc.; 14:4, etc.
    marker-yv: yv-n
  - type: text
    text: 'Voici les noms de ceux qui lui naquirent à Jérusalem: Schammua, Schobab, Nathan, Salomon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jibhar, Élischua, Népheg, Japhia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Élischama, Éliada et Éliphéleth.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Victoires sur les Philistins
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-25: cf. 1 Ch 14:8-17. Ps 25:15; 32:6-8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Ch 14:8, etc.
    marker-yv: yv-n
  - type: text
    text: 'Les Philistins apprirent qu’on avait oint David pour roi sur Israël, et ils montèrent tous à sa recherche. David, qui en fut informé, descendit à la forteresse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les Philistins arrivèrent, et se répandirent dans la vallée des Rephaïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'David consulta l’Éternel, en disant: Monterai-je contre les Philistins? Les livreras-tu entre mes mains? Et l’Éternel dit à David: Monte, car je livrerai les Philistins entre tes mains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'David vint à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 28:21
      metadata:
        usfm: ISA.28.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Baal-Peratsim, où il les battit. Puis il dit: L’Éternel a dispersé mes ennemis devant moi, comme des eaux qui s’écoulent. C’est pourquoi l’on a donné à ce lieu le nom de Baal-Peratsim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils laissèrent là leurs idoles, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 14:12
      metadata:
        usfm: 1CH.14.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'David et ses gens les emportèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les Philistins montèrent de nouveau, et se répandirent dans la vallée des Rephaïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'David consulta l’Éternel. Et l’Éternel dit: Tu ne monteras pas; tourne-les par derrière, et tu arriveras sur eux vis-à-vis des mûriers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Quand tu entendras un bruit de pas dans les cimes des mûriers, alors hâte-toi, car c’est l’Éternel qui marche devant toi pour battre l’armée des Philistins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: David fit ce que l’Éternel lui avait ordonné, et il battit les Philistins depuis Guéba jusqu’à Guézer.
