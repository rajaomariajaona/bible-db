document_id: 2SA.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: David, roi de Juda et de tout Israël
  - type: heading
    content: 'V. 1-5: cf. (1 Ch 12:23-40; 11:1-3.) Ps 118:22-26; 2:6.'
  - type: text
    content: ' '
  - type: note
    content: 1 Ch 11:1.
  - type: text
    content: 'Toutes les tribus d’Israël vinrent auprès de David, à Hébron, et dirent: Voici, nous sommes tes os et ta chair. '
  '10':
  - type: text
    content: David devenait de plus en plus grand, et l’Éternel, le Dieu des armées, était avec lui.
  - type: heading
    content: 'V. 11-16: cf. 1 Ch 14:1-7; 3:5-9. Ps 127:3.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 1 Ch 14:1.
  - type: text
    content: 'Hiram, roi de Tyr, envoya des messagers à David, et du bois de cèdre, et des charpentiers et des tailleurs de pierres, qui bâtirent une maison pour David. '
  '12':
  - type: text
    content: 'David reconnut que l’Éternel l’affermissait comme roi d’Israël, et qu’il élevait son royaume à cause de son peuple d’Israël. '
  '13':
  - type: note
    content: 1 Ch 3:9; 14:3, etc.
  - type: text
    content: 'David prit encore des concubines et des femmes de Jérusalem, après qu’il fut venu d’Hébron, et il lui naquit encore des fils et des filles. '
  '14':
  - type: note
    content: 1 Ch 3:5, etc.; 14:4, etc.
  - type: text
    content: 'Voici les noms de ceux qui lui naquirent à Jérusalem: Schammua, Schobab, Nathan, Salomon, '
  '15':
  - type: text
    content: 'Jibhar, Élischua, Népheg, Japhia, '
  '16':
  - type: text
    content: Élischama, Éliada et Éliphéleth.
  - type: heading
    content: Victoires sur les Philistins
  - type: heading
    content: 'V. 17-25: cf. 1 Ch 14:8-17. Ps 25:15; 32:6-8.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 1 Ch 14:8, etc.
  - type: text
    content: 'Les Philistins apprirent qu’on avait oint David pour roi sur Israël, et ils montèrent tous à sa recherche. David, qui en fut informé, descendit à la forteresse. '
  '18':
  - type: text
    content: 'Les Philistins arrivèrent, et se répandirent dans la vallée des Rephaïm. '
  '19':
  - type: text
    content: 'David consulta l’Éternel, en disant: Monterai-je contre les Philistins? Les livreras-tu entre mes mains? Et l’Éternel dit à David: Monte, car je livrerai les Philistins entre tes mains. '
  '2':
  - type: text
    content: 'Autrefois déjà, lorsque Saül était notre roi, c’était toi qui conduisais et qui ramenais Israël. L’Éternel t’a dit: '
  - type: note
    content: 2 S 7:7. Ps 78:71.
  - type: text
    content: 'Tu paîtras mon peuple d’Israël, et tu seras le chef d’Israël. '
  '20':
  - type: text
    content: 'David vint à '
  - type: note
    content: És 28:21.
  - type: text
    content: 'Baal-Peratsim, où il les battit. Puis il dit: L’Éternel a dispersé mes ennemis devant moi, comme des eaux qui s’écoulent. C’est pourquoi l’on a donné à ce lieu le nom de Baal-Peratsim. '
  '21':
  - type: text
    content: 'Ils laissèrent là leurs idoles, et '
  - type: note
    content: 1 Ch 14:12.
  - type: text
    content: 'David et ses gens les emportèrent. '
  '22':
  - type: text
    content: 'Les Philistins montèrent de nouveau, et se répandirent dans la vallée des Rephaïm. '
  '23':
  - type: text
    content: 'David consulta l’Éternel. Et l’Éternel dit: Tu ne monteras pas; tourne-les par derrière, et tu arriveras sur eux vis-à-vis des mûriers. '
  '24':
  - type: text
    content: 'Quand tu entendras un bruit de pas dans les cimes des mûriers, alors hâte-toi, car c’est l’Éternel qui marche devant toi pour battre l’armée des Philistins. '
  '25':
  - type: text
    content: David fit ce que l’Éternel lui avait ordonné, et il battit les Philistins depuis Guéba jusqu’à Guézer.
  '3':
  - type: text
    content: 'Ainsi tous les anciens d’Israël vinrent auprès du roi à Hébron, et le roi David fit alliance avec eux à Hébron, devant l’Éternel. Ils oignirent David pour roi sur Israël. '
  '4':
  - type: text
    content: 'David était âgé de trente ans lorsqu’il devint roi, et il régna quarante ans. '
  '5':
  - type: note
    content: 2 S 2:11. 1 R 2:11. 1 Ch 3:4.
  - type: text
    content: A Hébron il régna sur Juda sept ans et six mois, et à Jérusalem il régna trente-trois ans sur tout Israël et Juda.
  - type: heading
    content: Expulsion des Jébusiens et résidence de David à Jérusalem
  - type: heading
    content: 'V. 6-10: cf. 1 Ch 11:4, etc. Ps 48:3; 87:2; 24:3, etc.'
  '6':
  - type: text
    content: 'Le roi marcha avec ses gens sur Jérusalem contre les Jébusiens, habitants du pays. Ils dirent à David: Tu n’entreras point ici, car les aveugles mêmes et les boiteux te repousseront! Ce qui voulait dire: David n’entrera point ici. '
  '7':
  - type: text
    content: 'Mais David s’empara de la forteresse de Sion: c’est la cité de David. '
  '8':
  - type: text
    content: 'David avait dit en ce jour: '
  - type: note
    content: 1 Ch 11:6.
  - type: text
    content: 'Quiconque battra les Jébusiens et atteindra le canal, quiconque frappera ces boiteux et ces aveugles qui sont les ennemis de David… C’est pourquoi l’on dit: L’aveugle et le boiteux n’entreront point dans la maison. '
  '9':
  - type: text
    content: 'David s’établit dans la forteresse, qu’il appela cité de David. Il fit de tous côtés des constructions, en dehors et en dedans de Millo. '
