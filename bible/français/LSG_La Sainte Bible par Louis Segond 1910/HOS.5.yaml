document_id: HOS.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le châtiment
  - type: heading
    content: 'V. 1-10: cf. (Os 6:8-10. Am 5:21-27.)'
  - type: text
    content: Écoutez ceci, sacrificateurs!
  - type: text
    content: Sois attentive, maison d’Israël!
  - type: text
    content: Prête l’oreille, maison du roi!
  - type: text
    content: Car c’est à vous que le jugement s’adresse,
  - type: text
    content: Parce que vous avez été un piège à Mitspa,
  - type: text
    content: Et un filet tendu sur le Thabor.
  '10':
  - type: text
    content: Les chefs de Juda sont comme ceux qui déplacent les bornes;
  - type: text
    content: Je répandrai sur eux ma colère comme un torrent.
  - type: heading
    content: 'V. 11-15: cf. (2 R 15:19. 2 Ch 28:16, 20, 21.) Os 13:6-9.'
  '11':
  - type: text
    content: Éphraïm est opprimé, brisé par le jugement,
  - type: text
    content: Car il a suivi les préceptes qui lui plaisaient.
  '12':
  - type: text
    content: Je serai comme une teigne pour Éphraïm,
  - type: text
    content: Comme une carie pour la maison de Juda.
  '13':
  - type: text
    content: Éphraïm voit son mal, et Juda ses plaies;
  - type: text
    content: Éphraïm se rend en Assyrie, et s’adresse au roi Jareb;
  - type: text
    content: Mais ce roi ne pourra ni vous guérir,
  - type: text
    content: Ni porter remède à vos plaies.
  '14':
  - type: text
    content: Je serai comme un lion pour Éphraïm,
  - type: text
    content: Comme un lionceau pour la maison de Juda;
  - type: text
    content: Moi, moi, je déchirerai, puis je m’en irai,
  - type: text
    content: 'J’emporterai, et '
  - type: note
    content: Os 2:9.
  - type: text
    content: nul n’enlèvera ma proie.
  '15':
  - type: text
    content: Je m’en irai, je reviendrai dans ma demeure,
  - type: text
    content: Jusqu’à ce qu’ils s’avouent coupables et cherchent ma face.
  - type: text
    content: Quand ils seront dans la détresse, ils auront recours à moi.
  '2':
  - type: text
    content: Par leurs sacrifices, les infidèles s’enfoncent dans le crime,
  - type: text
    content: Mais j’aurai des châtiments pour eux tous.
  '3':
  - type: text
    content: Je connais Éphraïm,
  - type: text
    content: Et Israël ne m’est point caché;
  - type: text
    content: Car maintenant, Éphraïm, tu t’es prostitué,
  - type: text
    content: Et Israël s’est souillé.
  '4':
  - type: text
    content: Leurs œuvres ne leur permettent pas de revenir à leur Dieu,
  - type: text
    content: 'Parce que '
  - type: note
    content: Os 4:12.
  - type: text
    content: l’esprit de prostitution est au milieu d’eux,
  - type: text
    content: Et parce qu’ils ne connaissent pas l’Éternel.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Os 7:10.
  - type: text
    content: L’orgueil d’Israël témoigne contre lui;
  - type: text
    content: Israël et Éphraïm tomberont par leur iniquité;
  - type: text
    content: Avec eux aussi tombera Juda.
  '6':
  - type: text
    content: Ils iront avec leurs brebis et leurs bœufs chercher l’Éternel,
  - type: text
    content: 'Mais ils ne le trouveront point:'
  - type: text
    content: Il s’est retiré du milieu d’eux.
  '7':
  - type: text
    content: Ils ont été infidèles à l’Éternel,
  - type: text
    content: Car ils ont engendré des enfants illégitimes;
  - type: text
    content: Maintenant un mois suffira pour les dévorer avec leurs biens.
  '8':
  - type: text
    content: Sonnez de la trompette à Guibea,
  - type: text
    content: Sonnez de la trompette à Rama!
  - type: text
    content: Poussez des cris à Beth-Aven!
  - type: text
    content: Derrière toi, Benjamin!
  '9':
  - type: text
    content: Éphraïm sera dévasté au jour du châtiment;
  - type: text
    content: J’annonce aux tribus d’Israël une chose certaine.
