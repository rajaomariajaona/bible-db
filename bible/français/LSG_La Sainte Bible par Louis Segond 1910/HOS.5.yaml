document_id: HOS.5,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le châtiment
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. (Os 6:8-10. Am 5:21-27.)'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoutez ceci, sacrificateurs!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois attentive, maison d’Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prête l’oreille, maison du roi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est à vous que le jugement s’adresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que vous avez été un piège à Mitspa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un filet tendu sur le Thabor.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les chefs de Juda sont comme ceux qui déplacent les bornes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je répandrai sur eux ma colère comme un torrent.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-15: cf. (2 R 15:19. 2 Ch 28:16, 20, 21.) Os 13:6-9.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éphraïm est opprimé, brisé par le jugement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il a suivi les préceptes qui lui plaisaient.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je serai comme une teigne pour Éphraïm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme une carie pour la maison de Juda.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éphraïm voit son mal, et Juda ses plaies;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éphraïm se rend en Assyrie, et s’adresse au roi Jareb;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ce roi ne pourra ni vous guérir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni porter remède à vos plaies.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je serai comme un lion pour Éphraïm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un lionceau pour la maison de Juda;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, moi, je déchirerai, puis je m’en irai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’emporterai, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 2:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: nul n’enlèvera ma proie.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je m’en irai, je reviendrai dans ma demeure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ce qu’ils s’avouent coupables et cherchent ma face.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand ils seront dans la détresse, ils auront recours à moi.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par leurs sacrifices, les infidèles s’enfoncent dans le crime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais j’aurai des châtiments pour eux tous.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je connais Éphraïm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Israël ne m’est point caché;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car maintenant, Éphraïm, tu t’es prostitué,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Israël s’est souillé.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs œuvres ne leur permettent pas de revenir à leur Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Parce que '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 4:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: l’esprit de prostitution est au milieu d’eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et parce qu’ils ne connaissent pas l’Éternel.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 7:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’orgueil d’Israël témoigne contre lui;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël et Éphraïm tomberont par leur iniquité;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec eux aussi tombera Juda.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils iront avec leurs brebis et leurs bœufs chercher l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais ils ne le trouveront point:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’est retiré du milieu d’eux.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont été infidèles à l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils ont engendré des enfants illégitimes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant un mois suffira pour les dévorer avec leurs biens.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sonnez de la trompette à Guibea,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sonnez de la trompette à Rama!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Poussez des cris à Beth-Aven!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Derrière toi, Benjamin!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éphraïm sera dévasté au jour du châtiment;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’annonce aux tribus d’Israël une chose certaine.
