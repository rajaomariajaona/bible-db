document_id: JOS.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Grande bataille près des eaux de Mérom; conquêtes dans le nord et dans le reste du pays
  - type: heading
    content: 'V. 1-9: cf. Jos 10:1-15, 25. Jg 4:1-16. Ps 48:5.'
  - type: text
    content: 'Jabin, roi de Hatsor, ayant appris ces choses, envoya des messagers à Jobab, roi de Madon, au roi de Schimron, au roi d’Acschaph, '
  '10':
  - type: text
    content: 'A son retour, et dans le même temps, Josué prit Hatsor, et frappa son roi avec l’épée: Hatsor était autrefois la principale ville de tous ces royaumes. '
  '11':
  - type: text
    content: 'On frappa du tranchant de l’épée et l’on dévoua par interdit tous ceux qui s’y trouvaient, il ne resta rien de ce qui respirait, et l’on mit le feu à Hatsor. '
  '12':
  - type: text
    content: 'Josué prit aussi toutes les villes de ces rois et tous leurs rois, et il les frappa du tranchant de l’épée, et il les dévoua par interdit, '
  - type: note
    content: De 20:16, 17. Jos 10:40.
  - type: text
    content: 'comme l’avait ordonné Moïse, serviteur de l’Éternel. '
  '13':
  - type: text
    content: 'Mais Israël ne brûla aucune des villes situées sur des collines, à l’exception seulement de Hatsor, qui fut brûlée par Josué. '
  '14':
  - type: text
    content: 'Les enfants d’Israël gardèrent pour eux tout le butin de ces villes et le bétail; mais ils frappèrent du tranchant de l’épée tous les hommes, jusqu’à ce qu’ils les eussent détruits, sans rien laisser de ce qui respirait. '
  '15':
  - type: text
    content: 'Josué exécuta '
  - type: note
    content: Ex 23:32, 33; 34:12. No 33:52.
  - type: text
    content: 'les ordres de l’Éternel à Moïse, son serviteur, et '
  - type: note
    content: De 7:2; 20:16.
  - type: text
    content: 'de Moïse à Josué; il ne négligea rien de tout ce que l’Éternel avait ordonné à Moïse. '
  '16':
  - type: text
    content: 'C’est ainsi que Josué s’empara de tout ce pays, de la montagne, de tout le midi, de tout le pays de Gosen, de la vallée, de la plaine, de la montagne d’Israël et de ses vallées, '
  '17':
  - type: text
    content: 'depuis la montagne nue qui s’élève vers Séir jusqu’à Baal-Gad, dans la vallée du Liban, au pied de la montagne d’Hermon. Il prit tous leurs rois, les frappa et les fit mourir. '
  '18':
  - type: text
    content: 'La guerre que soutint Josué contre tous ces rois fut de longue durée. '
  '19':
  - type: text
    content: 'Il n’y eut aucune ville qui fît la paix avec les enfants d’Israël, excepté Gabaon, habitée par les Héviens; ils les prirent toutes en combattant. '
  '2':
  - type: text
    content: 'aux rois qui étaient au nord dans la montagne, dans la plaine au midi de Kinnéreth, dans la vallée, et sur les hauteurs de Dor à l’occident, '
  '20':
  - type: text
    content: 'Car l’Éternel permit que ces peuples s’obstinassent à faire la guerre contre Israël, afin qu’Israël les dévouât par interdit, sans qu’il y eût pour eux de miséricorde, et qu’il les détruisît, comme l’Éternel l’avait ordonné à Moïse. '
  '21':
  - type: text
    content: 'Dans le même temps, Josué se mit en marche, et il extermina les Anakim de la montagne d’Hébron, de Debir, d’Anab, de toute la montagne de Juda et de toute la montagne d’Israël; Josué les dévoua par interdit, avec leurs villes. '
  '22':
  - type: text
    content: 'Il ne resta point d’Anakim dans le pays des enfants d’Israël; il n’en resta qu’à Gaza, à Gath et à Asdod. '
  '23':
  - type: text
    content: Josué s’empara donc de tout le pays, selon tout ce que l’Éternel avait dit à Moïse. Et Josué le donna en héritage à Israël, à chacun sa portion, d’après leurs tribus. Puis, le pays fut en repos et sans guerre.
  '3':
  - type: text
    content: 'aux Cananéens de l’orient et de l’occident, aux Amoréens, aux Héthiens, aux Phéréziens, aux Jébusiens dans la montagne, et aux Héviens au pied de l’Hermon dans le pays de Mitspa. '
  '4':
  - type: text
    content: 'Ils sortirent, eux et toutes leurs armées avec eux, formant un peuple innombrable comme le sable qui est sur le bord de la mer, et ayant des chevaux et des chars en très grande quantité. '
  '5':
  - type: text
    content: 'Tous ces rois fixèrent un lieu de réunion, et vinrent camper ensemble près des eaux de Mérom, pour combattre contre Israël. '
  '6':
  - type: text
    content: 'L’Éternel dit à Josué: Ne les crains point, car demain, à ce moment-ci, je les livrerai tous frappés devant Israël. Tu couperas les jarrets à leurs chevaux, et tu brûleras au feu leurs chars. '
  '7':
  - type: text
    content: 'Josué, avec tous ses gens de guerre, arriva subitement sur eux près des eaux de Mérom, et ils se précipitèrent au milieu d’eux. '
  '8':
  - type: text
    content: 'L’Éternel les livra entre les mains d’Israël; ils les battirent et les poursuivirent jusqu’à Sidon la grande, jusqu’à Misrephoth-Maïm, et jusqu’à la vallée de Mitspa vers l’orient; ils les battirent, sans en laisser échapper aucun. '
  '9':
  - type: text
    content: Josué les traita comme l’Éternel lui avait dit; il coupa les jarrets à leurs chevaux, et il brûla leurs chars au feu.
  - type: heading
    content: 'V. 10-23: cf. (Jos 10:28-43; 12:7-24.) (De 7:1-6, 16-26; 9:1-15.) (1 Jn 4:4. Ap 2:26, 27.)'
