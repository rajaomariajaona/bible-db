document_id: ACT.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pierre explique sa conduite devant les chrétiens de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-18: cf. Ac 10. Ép 2:11-22. 1 Pi 2:10. (Tit 2:11. 1 Ti 2:4.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les apôtres et les frères qui étaient dans la Judée apprirent que les païens avaient aussi reçu la parole de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et lorsque Pierre fut monté à Jérusalem, les fidèles circoncis lui adressèrent des reproches, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'en disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:32
      metadata:
        usfm: EXO.23.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:15
      metadata:
        usfm: EXO.34.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:2
      metadata:
        usfm: DEU.7.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 18:28
      metadata:
        usfm: JHN.18.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu es entré chez des incirconcis, et tu as mangé avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pierre se mit à leur exposer d’une manière suivie ce qui s’était passé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:9
      metadata:
        usfm: ACT.10.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'J’étais dans la ville de Joppé, et, pendant que je priais, je tombai en extase et j’eus une vision: un objet, semblable à une grande nappe attachée par les quatre coins, descendait du ciel et vint jusqu’à moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les regards fixés sur cette nappe, j’examinai, et je vis les quadrupèdes de la terre, les bêtes sauvages, les reptiles, et les oiseaux du ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et j’entendis une voix qui me disait: Lève-toi, Pierre, tue et mange. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais je dis: Non, Seigneur, car jamais rien de souillé '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 11:4
      metadata:
        usfm: LEV.11.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 14:7
      metadata:
        usfm: DEU.14.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ni d’impur n’est entré dans ma bouche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et pour la seconde fois la voix se fit entendre du ciel: Ce que Dieu a déclaré pur, ne le regarde pas comme souillé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Cela arriva jusqu’à trois fois; puis tout fut retiré dans le ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et voici, aussitôt trois hommes envoyés de Césarée vers moi se présentèrent devant la porte de la maison où j’étais. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:19
      metadata:
        usfm: ACT.10.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:7
      metadata:
        usfm: ACT.15.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’Esprit me dit de partir avec eux sans hésiter. Les six hommes que voici m’accompagnèrent, et nous entrâmes dans la maison de Corneille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Cet homme nous raconta comment il avait vu dans sa maison l’ange se présentant à lui et disant: Envoie à Joppé, et fais venir Simon, surnommé Pierre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'qui te dira des choses par lesquelles tu seras sauvé, toi et toute ta maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Lorsque je me fus mis à parler, le Saint-Esprit descendit sur eux, comme sur nous au commencement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et je me souvins de cette parole du Seigneur: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:11
      metadata:
        usfm: MAT.3.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:8
      metadata:
        usfm: MRK.1.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:16
      metadata:
        usfm: LUK.3.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:26
      metadata:
        usfm: JHN.1.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:5
      metadata:
        usfm: ACT.1.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:4
      metadata:
        usfm: ACT.2.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:4
      metadata:
        usfm: ACT.19.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Jean a baptisé d’eau, mais vous,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 44:3
      metadata:
        usfm: ISA.44.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 2:28
      metadata:
        usfm: JOL.2.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: vous serez baptisés du Saint-Esprit.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 15:9
      metadata:
        usfm: ACT.15.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Or, puisque Dieu leur a accordé le même don qu’à nous qui avons cru au Seigneur Jésus-Christ, pouvais-je, moi, m’opposer à Dieu? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Après avoir entendu cela, ils se calmèrent, et ils glorifièrent Dieu, en disant: Dieu a donc accordé la repentance aussi aux païens, afin qu’ils aient la vie.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les chrétiens d’Antioche. Barnabas et Saul à Antioche
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 19-26: cf. (Ac 8:1, 4. Ph 1:12. 1 Th 1:5, 9, 10.) Col 2:6, 7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 8:1
      metadata:
        usfm: ACT.8.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: ACT.8.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ceux qui avaient été dispersés par la persécution survenue à l’occasion d’Étienne allèrent jusqu’en Phénicie, dans l’île de Chypre, et à Antioche, annonçant la parole seulement aux Juifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il y eut cependant parmi eux quelques hommes de Chypre et de Cyrène, qui, étant venus à Antioche, s’adressèrent aussi aux Grecs, et leur annoncèrent la bonne nouvelle du Seigneur Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 2:47
      metadata:
        usfm: ACT.2.47
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:14
      metadata:
        usfm: ACT.5.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'La main du Seigneur était avec eux, et un grand nombre de personnes crurent et se convertirent au Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le bruit en parvint aux oreilles des membres de l’Église de Jérusalem, et ils envoyèrent Barnabas jusqu’à Antioche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Lorsqu’il fut arrivé, et qu’il eut vu la grâce de Dieu, il s’en réjouit, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 13:43
      metadata:
        usfm: ACT.13.43
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:22
      metadata:
        usfm: ACT.14.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et il les exhorta tous à rester d’un cœur ferme attachés au Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Car c’était un homme de bien, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:36
      metadata:
        usfm: ACT.4.36
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:5
      metadata:
        usfm: ACT.6.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'plein d’Esprit-Saint et de foi. Et une foule assez nombreuse se joignit au Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 9:27
      metadata:
        usfm: ACT.9.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Barnabas se rendit ensuite à Tarse, pour chercher Saul; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: et, l’ayant trouvé, il l’amena à Antioche. Pendant toute une année, ils se réunirent aux assemblées de l’Église, et ils enseignèrent beaucoup de personnes. Ce fut à Antioche que, pour la première fois, les disciples furent appelés chrétiens.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une famine prédite par Agabus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 27-30: cf. Ro 15:25-27. Ga 6:9, 10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'En ce temps-là, des prophètes descendirent de Jérusalem à Antioche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'L’un d’eux, nommé '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 21:10
      metadata:
        usfm: ACT.21.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Agabus, se leva, et annonça par l’Esprit qu’il y aurait une grande famine sur toute la terre. Elle arriva, en effet, sous Claude. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Les disciples résolurent d’envoyer, chacun selon ses moyens, un secours aux frères qui habitaient la Judée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 12:25
      metadata:
        usfm: ACT.12.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils le firent parvenir aux anciens par les mains de Barnabas et de Saul.
