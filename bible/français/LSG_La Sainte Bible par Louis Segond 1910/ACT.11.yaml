document_id: ACT.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Pierre explique sa conduite devant les chrétiens de Jérusalem
  - type: heading
    content: 'V. 1-18: cf. Ac 10. Ép 2:11-22. 1 Pi 2:10. (Tit 2:11. 1 Ti 2:4.)'
  - type: text
    content: 'Les apôtres et les frères qui étaient dans la Judée apprirent que les païens avaient aussi reçu la parole de Dieu. '
  '10':
  - type: text
    content: 'Cela arriva jusqu’à trois fois; puis tout fut retiré dans le ciel. '
  '11':
  - type: text
    content: 'Et voici, aussitôt trois hommes envoyés de Césarée vers moi se présentèrent devant la porte de la maison où j’étais. '
  '12':
  - type: note
    content: Ac 10:19; 15:7.
  - type: text
    content: 'L’Esprit me dit de partir avec eux sans hésiter. Les six hommes que voici m’accompagnèrent, et nous entrâmes dans la maison de Corneille. '
  '13':
  - type: text
    content: 'Cet homme nous raconta comment il avait vu dans sa maison l’ange se présentant à lui et disant: Envoie à Joppé, et fais venir Simon, surnommé Pierre, '
  '14':
  - type: text
    content: 'qui te dira des choses par lesquelles tu seras sauvé, toi et toute ta maison. '
  '15':
  - type: text
    content: 'Lorsque je me fus mis à parler, le Saint-Esprit descendit sur eux, comme sur nous au commencement. '
  '16':
  - type: text
    content: 'Et je me souvins de cette parole du Seigneur: '
  - type: note
    content: Mt 3:11. Mc 1:8. Lu 3:16. Jn 1:26. Ac 1:5; 2:4; 19:4.
  - type: text
    content: Jean a baptisé d’eau, mais vous,
  - type: text
    content: ' '
  - type: note
    content: És 44:3. Joë 2:28.
  - type: text
    content: vous serez baptisés du Saint-Esprit.
  - type: text
    content: ' '
  '17':
  - type: note
    content: Ac 15:9.
  - type: text
    content: 'Or, puisque Dieu leur a accordé le même don qu’à nous qui avons cru au Seigneur Jésus-Christ, pouvais-je, moi, m’opposer à Dieu? '
  '18':
  - type: text
    content: 'Après avoir entendu cela, ils se calmèrent, et ils glorifièrent Dieu, en disant: Dieu a donc accordé la repentance aussi aux païens, afin qu’ils aient la vie.'
  - type: heading
    content: Les chrétiens d’Antioche. Barnabas et Saul à Antioche
  - type: heading
    content: 'V. 19-26: cf. (Ac 8:1, 4. Ph 1:12. 1 Th 1:5, 9, 10.) Col 2:6, 7.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: Ac 8:1, 4.
  - type: text
    content: 'Ceux qui avaient été dispersés par la persécution survenue à l’occasion d’Étienne allèrent jusqu’en Phénicie, dans l’île de Chypre, et à Antioche, annonçant la parole seulement aux Juifs. '
  '2':
  - type: text
    content: 'Et lorsque Pierre fut monté à Jérusalem, les fidèles circoncis lui adressèrent des reproches, '
  '20':
  - type: text
    content: 'Il y eut cependant parmi eux quelques hommes de Chypre et de Cyrène, qui, étant venus à Antioche, s’adressèrent aussi aux Grecs, et leur annoncèrent la bonne nouvelle du Seigneur Jésus. '
  '21':
  - type: note
    content: Ac 2:47; 5:14.
  - type: text
    content: 'La main du Seigneur était avec eux, et un grand nombre de personnes crurent et se convertirent au Seigneur. '
  '22':
  - type: text
    content: 'Le bruit en parvint aux oreilles des membres de l’Église de Jérusalem, et ils envoyèrent Barnabas jusqu’à Antioche. '
  '23':
  - type: text
    content: 'Lorsqu’il fut arrivé, et qu’il eut vu la grâce de Dieu, il s’en réjouit, '
  - type: note
    content: Ac 13:43; 14:22.
  - type: text
    content: 'et il les exhorta tous à rester d’un cœur ferme attachés au Seigneur. '
  '24':
  - type: text
    content: 'Car c’était un homme de bien, '
  - type: note
    content: Ac 4:36; 6:5.
  - type: text
    content: 'plein d’Esprit-Saint et de foi. Et une foule assez nombreuse se joignit au Seigneur. '
  '25':
  - type: note
    content: Ac 9:27.
  - type: text
    content: 'Barnabas se rendit ensuite à Tarse, pour chercher Saul; '
  '26':
  - type: text
    content: et, l’ayant trouvé, il l’amena à Antioche. Pendant toute une année, ils se réunirent aux assemblées de l’Église, et ils enseignèrent beaucoup de personnes. Ce fut à Antioche que, pour la première fois, les disciples furent appelés chrétiens.
  - type: heading
    content: Une famine prédite par Agabus
  - type: heading
    content: 'V. 27-30: cf. Ro 15:25-27. Ga 6:9, 10.'
  '27':
  - type: text
    content: 'En ce temps-là, des prophètes descendirent de Jérusalem à Antioche. '
  '28':
  - type: text
    content: 'L’un d’eux, nommé '
  - type: note
    content: Ac 21:10.
  - type: text
    content: 'Agabus, se leva, et annonça par l’Esprit qu’il y aurait une grande famine sur toute la terre. Elle arriva, en effet, sous Claude. '
  '29':
  - type: text
    content: 'Les disciples résolurent d’envoyer, chacun selon ses moyens, un secours aux frères qui habitaient la Judée. '
  '3':
  - type: text
    content: 'en disant: '
  - type: note
    content: Ex 23:32; 34:15. De 7:2. Jn 18:28.
  - type: text
    content: 'Tu es entré chez des incirconcis, et tu as mangé avec eux. '
  '30':
  - type: note
    content: Ac 12:25.
  - type: text
    content: Ils le firent parvenir aux anciens par les mains de Barnabas et de Saul.
  '4':
  - type: text
    content: 'Pierre se mit à leur exposer d’une manière suivie ce qui s’était passé. '
  '5':
  - type: text
    content: 'Il dit: '
  - type: note
    content: Ac 10:9.
  - type: text
    content: 'J’étais dans la ville de Joppé, et, pendant que je priais, je tombai en extase et j’eus une vision: un objet, semblable à une grande nappe attachée par les quatre coins, descendait du ciel et vint jusqu’à moi. '
  '6':
  - type: text
    content: 'Les regards fixés sur cette nappe, j’examinai, et je vis les quadrupèdes de la terre, les bêtes sauvages, les reptiles, et les oiseaux du ciel. '
  '7':
  - type: text
    content: 'Et j’entendis une voix qui me disait: Lève-toi, Pierre, tue et mange. '
  '8':
  - type: text
    content: 'Mais je dis: Non, Seigneur, car jamais rien de souillé '
  - type: note
    content: Lé 11:4. De 14:7.
  - type: text
    content: 'ni d’impur n’est entré dans ma bouche. '
  '9':
  - type: text
    content: 'Et pour la seconde fois la voix se fit entendre du ciel: Ce que Dieu a déclaré pur, ne le regarde pas comme souillé. '
