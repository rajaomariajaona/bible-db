document_id: ISA.61,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le salut proclamé
  - type: heading
    content: 'V. 1-3: cf. Lu 4:16-21.'
  - type: text
    content: ' '
  - type: note
    content: Lu 4:17, 18, 19, 20.
  - type: text
    content: L’esprit du Seigneur, l’Éternel, est sur moi,
  - type: text
    content: Car l’Éternel m’a oint pour porter de bonnes nouvelles aux malheureux;
  - type: text
    content: Il m’a envoyé pour guérir ceux qui ont le cœur brisé,
  - type: text
    content: Pour proclamer aux captifs la liberté,
  - type: text
    content: Et aux prisonniers la délivrance;
  '10':
  - type: text
    content: Je me réjouirai en l’Éternel,
  - type: text
    content: Mon âme sera ravie d’allégresse en mon Dieu;
  - type: text
    content: Car il m’a revêtu des vêtements du salut,
  - type: text
    content: Il m’a couvert du manteau de la délivrance,
  - type: text
    content: Comme le fiancé s’orne d’un diadème,
  - type: text
    content: Comme la fiancée se pare de ses joyaux.
  '11':
  - type: text
    content: Car, comme la terre fait éclore son germe,
  - type: text
    content: Et comme un jardin fait pousser ses semences,
  - type: text
    content: Ainsi le Seigneur, l’Éternel, fera germer le salut et la louange,
  - type: text
    content: En présence de toutes les nations.
  '2':
  - type: text
    content: Pour publier une année de grâce de l’Éternel,
  - type: text
    content: Et un jour de vengeance de notre Dieu;
  - type: text
    content: Pour consoler tous les affligés;
  '3':
  - type: text
    content: Pour accorder aux affligés de Sion,
  - type: text
    content: Pour leur donner un diadème au lieu de la cendre,
  - type: text
    content: Une huile de joie au lieu du deuil,
  - type: text
    content: Un vêtement de louange au lieu d’un esprit abattu,
  - type: text
    content: Afin qu’on les appelle des térébinthes de la justice,
  - type: text
    content: Une plantation de l’Éternel, pour servir à sa gloire.
  - type: heading
    content: 'V. 4-9: cf. És 14:1, 2. Éz 36:33-36. So 3:19, 20.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: És 58:12.
  - type: text
    content: Ils rebâtiront sur d’anciennes ruines,
  - type: text
    content: Ils relèveront d’antiques décombres,
  - type: text
    content: Ils renouvelleront des villes ravagées,
  - type: text
    content: Dévastées depuis longtemps.
  '5':
  - type: text
    content: Des étrangers seront là et feront paître vos troupeaux,
  - type: text
    content: Des fils de l’étranger seront vos laboureurs et vos vignerons.
  '6':
  - type: text
    content: 'Mais vous, on vous appellera '
  - type: note
    content: 1 Pi 2:5, 9. Ap 1:6; 5:10, etc.
  - type: text
    content: sacrificateurs de l’Éternel,
  - type: text
    content: On vous nommera serviteurs de notre Dieu;
  - type: text
    content: Vous mangerez les richesses des nations,
  - type: text
    content: Et vous vous glorifierez de leur gloire.
  '7':
  - type: text
    content: Au lieu de votre opprobre, vous aurez une portion double;
  - type: text
    content: Au lieu de l’ignominie, ils seront joyeux de leur part;
  - type: text
    content: Ils posséderont ainsi le double dans leur pays,
  - type: text
    content: Et leur joie sera éternelle.
  '8':
  - type: text
    content: Car moi, l’Éternel, j’aime la justice,
  - type: text
    content: Je hais la rapine avec l’iniquité;
  - type: text
    content: Je leur donnerai fidèlement leur récompense,
  - type: text
    content: Et je traiterai avec eux une alliance éternelle.
  '9':
  - type: text
    content: Leur race sera connue parmi les nations,
  - type: text
    content: Et leur postérité parmi les peuples;
  - type: text
    content: Tous ceux qui les verront reconnaîtront
  - type: text
    content: Qu’ils sont une race bénie de l’Éternel.
  - type: heading
    content: 'V. 10-11: cf. És 62:1-5.'
