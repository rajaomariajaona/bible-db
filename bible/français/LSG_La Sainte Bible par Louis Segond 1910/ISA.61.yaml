    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: LUK.4.18
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: LUK.4.19
    - type: text
