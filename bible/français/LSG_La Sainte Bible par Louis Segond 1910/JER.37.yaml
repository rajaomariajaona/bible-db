document_id: JER.37,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérémie en prison
  - type: heading
    content: 'V. 1-10: cf. Jé 21:1-10. (Éz 17:11-21. La 4:17.)'
  - type: text
    content: 'Sédécias, fils de Josias, régna à la place de Jeconia, fils de Jojakim, et fut établi roi dans le pays de Juda par Nebucadnetsar, roi de Babylone. '
  '10':
  - type: text
    content: Et même quand vous battriez toute l’armée des Chaldéens qui vous font la guerre, quand il ne resterait d’eux que des hommes blessés, ils se relèveraient chacun dans sa tente, et brûleraient cette ville par le feu.
  - type: heading
    content: 'V. 11-21: cf. Jé 38. Mt 5:10-12. Hé 11:36.'
  '11':
  - type: text
    content: 'Pendant que l’armée des Chaldéens s’était éloignée de Jérusalem, à cause de l’armée de Pharaon, '
  '12':
  - type: text
    content: 'Jérémie voulut sortir de Jérusalem, pour aller dans le pays de Benjamin et s’échapper du milieu du peuple. '
  '13':
  - type: text
    content: 'Lorsqu’il fut à la porte de Benjamin, le commandant de la garde, nommé Jireija, fils de Schélémia, fils de Hanania, se trouvait là, et il saisit Jérémie, le prophète, en disant: Tu passes aux Chaldéens! '
  '14':
  - type: text
    content: 'Jérémie répondit: C’est faux! Je ne passe pas aux Chaldéens. Mais Jireija ne l’écouta point; il arrêta Jérémie, et le conduisit devant les chefs. '
  '15':
  - type: text
    content: 'Les chefs, irrités contre Jérémie, le frappèrent, et le mirent en prison dans la maison de Jonathan, le secrétaire; car ils en avaient fait une prison. '
  '16':
  - type: text
    content: 'Ce fut ainsi que Jérémie entra dans la prison et dans les cachots, où il resta longtemps. '
  '17':
  - type: text
    content: 'Le roi Sédécias l’envoya chercher, et l’interrogea secrètement dans sa maison. Il dit: Y a-t-il une parole de la part de l’Éternel? Jérémie répondit: Oui. Et il ajouta: Tu seras livré entre les mains du roi de Babylone. '
  '18':
  - type: text
    content: 'Jérémie dit encore au roi Sédécias: En quoi ai-je péché contre toi, contre tes serviteurs, et contre ce peuple, pour que vous m’ayez mis en prison? '
  '19':
  - type: text
    content: 'Et où sont vos prophètes qui vous prophétisaient, en disant: Le roi de Babylone ne viendra pas contre vous, ni contre ce pays? '
  '2':
  - type: text
    content: 'Ni lui, ni ses serviteurs, ni le peuple du pays, n’écoutèrent les paroles que l’Éternel prononça par Jérémie, le prophète. '
  '20':
  - type: text
    content: 'Maintenant, écoute, je te prie, ô roi, mon seigneur, et que mes supplications soient favorablement reçues devant toi! Ne me renvoie pas dans la maison de Jonathan, le secrétaire, de peur que je n’y meure! '
  '21':
  - type: text
    content: 'Le roi Sédécias ordonna qu’on gardât Jérémie dans la cour de la '
  - type: note
    content: Jé 32:2.
  - type: text
    content: prison, et qu’on lui donnât chaque jour un pain de la rue des boulangers, jusqu’à ce que tout le pain de la ville fût consommé. Ainsi Jérémie demeura dans la cour de la prison.
  '3':
  - type: text
    content: 'Le roi Sédécias envoya Jucal, fils de Schélémia, et Sophonie, fils de Maaséja, le sacrificateur, vers Jérémie, le prophète, pour lui dire: Intercède en notre faveur auprès de l’Éternel, notre Dieu. '
  '4':
  - type: text
    content: 'Or Jérémie allait et venait parmi le peuple; on ne l’avait pas encore mis en prison. '
  '5':
  - type: text
    content: 'L’armée de Pharaon était sortie d’Égypte; et les Chaldéens, qui assiégeaient Jérusalem, ayant appris cette nouvelle, s’étaient retirés '
  - type: note
    content: Jé 34:21.
  - type: text
    content: 'de Jérusalem. '
  '6':
  - type: text
    content: 'Alors la parole de l’Éternel fut adressée à Jérémie, le prophète, en ces mots: '
  '7':
  - type: text
    content: 'Ainsi parle l’Éternel, le Dieu d’Israël: Vous direz au roi de Juda, qui vous a envoyés vers moi pour me consulter: Voici, l’armée de Pharaon, qui était en marche pour vous secourir, retourne dans son pays, en Égypte; '
  '8':
  - type: text
    content: 'et les Chaldéens reviendront, ils attaqueront cette ville, ils la prendront, et la brûleront par le feu. '
  '9':
  - type: text
    content: 'Ainsi parle l’Éternel: Ne vous faites pas d’illusion, en disant: Les Chaldéens s’en iront loin de nous! Car ils ne s’en iront pas. '
