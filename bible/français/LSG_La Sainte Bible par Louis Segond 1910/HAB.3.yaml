document_id: HAB.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière du prophète
  - type: heading
    content: 'V. 1-2: cf. Ha 1:5-17; 2:3.'
  - type: text
    content: Prière d’Habacuc, le prophète.
  - type: text
    content: (Sur le mode des complaintes.)
  '10':
  - type: text
    content: A ton aspect, les montagnes tremblent;
  - type: text
    content: Des torrents d’eau se précipitent;
  - type: text
    content: L’abîme fait entendre sa voix,
  - type: text
    content: Il lève ses mains en haut.
  '11':
  - type: text
    content: Le soleil et la lune s’arrêtent dans leur demeure,
  - type: text
    content: A la lumière de tes flèches qui partent,
  - type: text
    content: A la clarté de ta lance qui brille.
  '12':
  - type: text
    content: Tu parcours la terre dans ta fureur,
  - type: text
    content: Tu écrases les nations dans ta colère.
  '13':
  - type: text
    content: Tu sors pour délivrer ton peuple,
  - type: text
    content: Pour délivrer ton oint;
  - type: text
    content: Tu brises le faîte de la maison du méchant,
  - type: text
    content: 'Tu la détruis de fond en comble. '
  - type: text
    content: — Pause.
  '14':
  - type: text
    content: Tu perces de tes traits la tête de ses chefs,
  - type: text
    content: Qui se précipitent comme la tempête pour me disperser,
  - type: text
    content: Poussant des cris de joie,
  - type: text
    content: Comme s’ils dévoraient déjà le malheureux dans leur repaire.
  '15':
  - type: text
    content: Avec tes chevaux tu foules la mer,
  - type: text
    content: La boue des grandes eaux.
  - type: heading
    content: 'V. 16-19: cf. Jé 30:7-11. (Ro 12:12. 1 Pi 1:6-9.)'
  '16':
  - type: text
    content: J’ai entendu… Et mes entrailles sont émues.
  - type: text
    content: A cette voix, mes lèvres frémissent,
  - type: text
    content: Mes os se consument,
  - type: text
    content: 'Et mes genoux chancellent:'
  - type: text
    content: En silence je dois attendre le jour de la détresse,
  - type: text
    content: Le jour où l’oppresseur marchera contre le peuple.
  '17':
  - type: text
    content: Car le figuier ne fleurira pas,
  - type: text
    content: La vigne ne produira rien,
  - type: text
    content: Le fruit de l’olivier manquera,
  - type: text
    content: Les champs ne donneront pas de nourriture;
  - type: text
    content: Les brebis disparaîtront du pâturage,
  - type: text
    content: Et il n’y aura plus de bœufs dans les étables.
  '18':
  - type: text
    content: Toutefois, je veux me réjouir en l’Éternel,
  - type: text
    content: Je veux me réjouir dans le Dieu de mon salut.
  '19':
  - type: text
    content: L’Éternel, le Seigneur, est ma force;
  - type: text
    content: Il rend mes pieds semblables à ceux des biches,
  - type: text
    content: Et il me fait marcher sur mes lieux élevés.
  - type: text
    content: Au chef des chantres. Avec instruments à cordes.
  '2':
  - type: text
    content: Éternel, j’ai entendu ce que tu as annoncé, je suis saisi de crainte.
  - type: text
    content: Accomplis ton œuvre dans le cours des années, ô Éternel!
  - type: text
    content: Dans le cours des années manifeste-la!
  - type: text
    content: Mais dans ta colère souviens-toi de tes compassions!
  - type: heading
    content: 'V. 3-15: cf. Jg 5:4, 5. Ps 77:12-21; 44:2-5.'
  '3':
  - type: text
    content: Dieu vient de Théman,
  - type: text
    content: 'Le Saint vient de la montagne de Paran… '
  - type: text
    content: — Pause.
  - type: text
    content: Sa majesté couvre les cieux,
  - type: text
    content: Et sa gloire remplit la terre.
  '4':
  - type: text
    content: C’est comme l’éclat de la lumière;
  - type: text
    content: Des rayons partent de sa main;
  - type: text
    content: Là réside sa force.
  '5':
  - type: text
    content: Devant lui marche la peste,
  - type: text
    content: Et la peste est sur ses traces.
  '6':
  - type: text
    content: Il s’arrête, et de l’œil il mesure la terre;
  - type: text
    content: Il regarde, et il fait trembler les nations;
  - type: text
    content: Les montagnes éternelles se brisent,
  - type: text
    content: Les collines antiques s’abaissent;
  - type: text
    content: Les sentiers d’autrefois s’ouvrent devant lui.
  '7':
  - type: text
    content: Je vois dans la détresse les tentes de l’Éthiopie,
  - type: text
    content: Et les tentes du pays de Madian sont dans l’épouvante.
  '8':
  - type: text
    content: L’Éternel est-il irrité contre les fleuves?
  - type: text
    content: Est-ce contre les fleuves que s’enflamme ta colère,
  - type: text
    content: Contre la mer que se répand ta fureur,
  - type: text
    content: Pour que tu sois monté sur tes chevaux,
  - type: text
    content: Sur ton char de victoire?
  '9':
  - type: text
    content: Ton arc est mis à nu;
  - type: text
    content: 'Les malédictions sont les traits de ta parole… '
  - type: text
    content: — Pause.
  - type: text
    content: Tu fends la terre pour donner cours aux fleuves.
