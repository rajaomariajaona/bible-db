document_id: HAB.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière du prophète
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-2: cf. Ha 1:5-17; 2:3.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prière d’Habacuc, le prophète.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Sur le mode des complaintes.)
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A ton aspect, les montagnes tremblent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des torrents d’eau se précipitent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’abîme fait entendre sa voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il lève ses mains en haut.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le soleil et la lune s’arrêtent dans leur demeure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la lumière de tes flèches qui partent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la clarté de ta lance qui brille.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu parcours la terre dans ta fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu écrases les nations dans ta colère.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu sors pour délivrer ton peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour délivrer ton oint;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu brises le faîte de la maison du méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu la détruis de fond en comble. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu perces de tes traits la tête de ses chefs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui se précipitent comme la tempête pour me disperser,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Poussant des cris de joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme s’ils dévoraient déjà le malheureux dans leur repaire.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec tes chevaux tu foules la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La boue des grandes eaux.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-19: cf. Jé 30:7-11. (Ro 12:12. 1 Pi 1:6-9.)'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai entendu… Et mes entrailles sont émues.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cette voix, mes lèvres frémissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes os se consument,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et mes genoux chancellent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En silence je dois attendre le jour de la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jour où l’oppresseur marchera contre le peuple.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car le figuier ne fleurira pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La vigne ne produira rien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le fruit de l’olivier manquera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les champs ne donneront pas de nourriture;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les brebis disparaîtront du pâturage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il n’y aura plus de bœufs dans les étables.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutefois, je veux me réjouir en l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux me réjouir dans le Dieu de mon salut.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel, le Seigneur, est ma force;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il rend mes pieds semblables à ceux des biches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il me fait marcher sur mes lieux élevés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au chef des chantres. Avec instruments à cordes.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, j’ai entendu ce que tu as annoncé, je suis saisi de crainte.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Accomplis ton œuvre dans le cours des années, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans le cours des années manifeste-la!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais dans ta colère souviens-toi de tes compassions!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 3-15: cf. Jg 5:4, 5. Ps 77:12-21; 44:2-5.'
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu vient de Théman,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le Saint vient de la montagne de Paran… '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa majesté couvre les cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa gloire remplit la terre.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est comme l’éclat de la lumière;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des rayons partent de sa main;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là réside sa force.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant lui marche la peste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la peste est sur ses traces.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’arrête, et de l’œil il mesure la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il regarde, et il fait trembler les nations;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les montagnes éternelles se brisent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les collines antiques s’abaissent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les sentiers d’autrefois s’ouvrent devant lui.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vois dans la détresse les tentes de l’Éthiopie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les tentes du pays de Madian sont dans l’épouvante.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est-il irrité contre les fleuves?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce contre les fleuves que s’enflamme ta colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre la mer que se répand ta fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que tu sois monté sur tes chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur ton char de victoire?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton arc est mis à nu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les malédictions sont les traits de ta parole… '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu fends la terre pour donner cours aux fleuves.
