document_id: 2CH.36,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Joachaz, Jojakim, Jojakin, rois de Juda
  - type: heading
    content: 'V. 1-8: cf. 2 R 23:30-37; 24:1-7.'
  - type: text
    content: ' '
  - type: note
    content: 2 R 23:30.
  - type: text
    content: 'Le peuple du pays prit Joachaz, fils de Josias, et l’établit roi à la place de son père à Jérusalem. '
  '10':
  - type: note
    content: Da 1:1, 2.
  - type: text
    content: 'L’année suivante, le roi Nebucadnetsar le fit emmener à Babylone avec les ustensiles précieux de la maison de l’Éternel. '
  - type: note
    content: 2 R 24:17. Jé 37:1.
  - type: text
    content: Et il établit roi sur Juda et sur Jérusalem Sédécias, frère de Jojakin.
  - type: heading
    content: Sédécias, dernier roi de Juda. Jérusalem détruite par Nebucadnetsar, roi de Babylone, et les habitants emmenés en captivité
  - type: heading
    content: 'V. 11-21: cf. (2 R 24:18-20; 25. Jé 39; 52.) (Ps 74; 79. La 1 à 5.) Ro 11:1.'
  '11':
  - type: text
    content: 'Sédécias avait vingt et un ans lorsqu’il devint roi, et il régna onze ans à Jérusalem. '
  '12':
  - type: note
    content: Jé 52:2, 3.
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l’Éternel, son Dieu; et il ne s’humilia point devant Jérémie, le prophète, qui lui parlait de la part de l’Éternel. '
  '13':
  - type: text
    content: 'Il se révolta même contre le roi Nebucadnetsar, qui l’avait fait jurer par le nom de Dieu; et il raidit son cou et endurcit son cœur, au point de ne pas retourner à l’Éternel, le Dieu d’Israël. '
  '14':
  - type: text
    content: 'Tous les chefs des sacrificateurs et le peuple multiplièrent aussi les transgressions, selon toutes les abominations des nations; et ils profanèrent la maison de l’Éternel, qu’il avait sanctifiée à Jérusalem. '
  '15':
  - type: text
    content: 'L’Éternel, le Dieu de leurs pères, donna de bonne heure à ses envoyés la mission de les avertir, car il voulait épargner son peuple et sa propre demeure. '
  '16':
  - type: text
    content: 'Mais ils se moquèrent des envoyés de Dieu, ils méprisèrent ses paroles, et ils se raillèrent de ses prophètes, jusqu’à ce que la colère de l’Éternel contre son peuple devînt sans remède. '
  '17':
  - type: text
    content: 'Alors l’Éternel fit monter contre eux le roi des Chaldéens, et tua par l’épée leurs jeunes gens dans la maison de leur sanctuaire; il n’épargna ni le jeune homme, ni la jeune fille, ni le vieillard, ni l’homme aux cheveux blancs, il livra tout entre ses mains. '
  '18':
  - type: text
    content: 'Nebucadnetsar emporta à Babylone tous les ustensiles de la maison de Dieu, grands et petits, les trésors de la maison de l’Éternel, et les trésors du roi et de ses chefs. '
  '19':
  - type: text
    content: 'Ils brûlèrent la maison de Dieu, ils démolirent les murailles de Jérusalem, ils livrèrent au feu tous ses palais et détruisirent tous les objets précieux. '
  '2':
  - type: text
    content: 'Joachaz avait vingt-trois ans lorsqu’il devint roi, et il régna trois mois à Jérusalem. '
  '20':
  - type: text
    content: 'Nebucadnetsar emmena captifs à Babylone ceux qui échappèrent à l’épée; et ils lui furent assujettis, à lui et à ses fils, jusqu’à la domination du royaume de Perse, '
  '21':
  - type: text
    content: 'afin que s’accomplît la parole de l’Éternel prononcée par la bouche de Jérémie; jusqu’à ce que le pays eût joui de ses sabbats, il se reposa tout le temps qu’il fut dévasté, jusqu’à l’accomplissement de '
  - type: note
    content: Jé 25:12; 29:10.
  - type: text
    content: soixante-dix ans.
  - type: heading
    content: 'V. 22-23: cf. Esd 1:1-3. (Jé 29:10-14. És 44:26-28.)'
  '22':
  - type: text
    content: 'La première année de Cyrus, roi de Perse, afin que s’accomplît '
  - type: note
    content: Esd 1:1. Jé 25:12; 29:10.
  - type: text
    content: 'la parole de l’Éternel prononcée par la bouche de Jérémie, l’Éternel réveilla l’esprit de Cyrus, roi de Perse, qui fit faire de vive voix et par écrit cette publication dans tout son royaume: '
  '23':
  - type: text
    content: 'Ainsi parle Cyrus, roi de Perse: L’Éternel, le Dieu des cieux, m’a donné tous les royaumes de la terre, et il m’a commandé de lui bâtir une maison à Jérusalem en Juda. Qui d’entre vous est de son peuple? Que l’Éternel, son Dieu, soit avec lui, et qu’il monte!'
  '3':
  - type: text
    content: 'Le roi d’Égypte le destitua à Jérusalem, et frappa le pays d’une contribution de cent talents d’argent et d’un talent d’or. '
  '4':
  - type: text
    content: 'Et le roi d’Égypte établit roi sur Juda et sur Jérusalem Éliakim, frère de Joachaz; et il changea son nom en celui de Jojakim. Néco prit son frère Joachaz, et l’emmena en Égypte. '
  '5':
  - type: text
    content: 'Jojakim avait vingt-cinq ans lorsqu’il devint roi, et il régna onze ans à Jérusalem. Il fit ce qui est mal aux yeux de l’Éternel, son Dieu. '
  '6':
  - type: note
    content: 2 R 24:1.
  - type: text
    content: 'Nebucadnetsar, roi de Babylone, monta contre lui, et le lia avec des chaînes d’airain pour le conduire à Babylone. '
  '7':
  - type: text
    content: 'Nebucadnetsar emporta à Babylone des ustensiles de la maison de l’Éternel, et il les mit dans son palais à Babylone. '
  '8':
  - type: text
    content: Le reste des actions de Jojakim, les abominations qu’il commit, et ce qui se trouvait en lui, cela est écrit dans le livre des rois d’Israël et de Juda. Et Jojakin, son fils, régna à sa place.
  - type: heading
    content: 'V. 9-10: cf. 2 R 24:8-17. Jé 22:24-30.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 2 R 24:8.
  - type: text
    content: 'Jojakin avait huit ans lorsqu’il devint roi, et il régna trois mois et dix jours à Jérusalem. Il fit ce qui est mal aux yeux de l’Éternel. '
