document_id: 2CH.36
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joachaz, Jojakim, Jojakin, rois de Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. 2 R 23:30-37; 24:1-7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 23:30
      metadata:
        usfm: 2KI.23.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le peuple du pays prit Joachaz, fils de Josias, et l’établit roi à la place de son père à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Joachaz avait vingt-trois ans lorsqu’il devint roi, et il régna trois mois à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le roi d’Égypte le destitua à Jérusalem, et frappa le pays d’une contribution de cent talents d’argent et d’un talent d’or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et le roi d’Égypte établit roi sur Juda et sur Jérusalem Éliakim, frère de Joachaz; et il changea son nom en celui de Jojakim. Néco prit son frère Joachaz, et l’emmena en Égypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jojakim avait vingt-cinq ans lorsqu’il devint roi, et il régna onze ans à Jérusalem. Il fit ce qui est mal aux yeux de l’Éternel, son Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 24:1
      metadata:
        usfm: 2KI.24.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nebucadnetsar, roi de Babylone, monta contre lui, et le lia avec des chaînes d’airain pour le conduire à Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nebucadnetsar emporta à Babylone des ustensiles de la maison de l’Éternel, et il les mit dans son palais à Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le reste des actions de Jojakim, les abominations qu’il commit, et ce qui se trouvait en lui, cela est écrit dans le livre des rois d’Israël et de Juda. Et Jojakin, son fils, régna à sa place.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-10: cf. 2 R 24:8-17. Jé 22:24-30.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 24:8
      metadata:
        usfm: 2KI.24.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jojakin avait huit ans lorsqu’il devint roi, et il régna trois mois et dix jours à Jérusalem. Il fit ce qui est mal aux yeux de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 1:1
      metadata:
        usfm: DAN.1.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: DAN.1.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’année suivante, le roi Nebucadnetsar le fit emmener à Babylone avec les ustensiles précieux de la maison de l’Éternel. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 24:17
      metadata:
        usfm: 2KI.24.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 37:1
      metadata:
        usfm: JER.37.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et il établit roi sur Juda et sur Jérusalem Sédécias, frère de Jojakin.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sédécias, dernier roi de Juda. Jérusalem détruite par Nebucadnetsar, roi de Babylone, et les habitants emmenés en captivité
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-21: cf. (2 R 24:18-20; 25. Jé 39; 52.) (Ps 74; 79. La 1 à 5.) Ro 11:1.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Sédécias avait vingt et un ans lorsqu’il devint roi, et il régna onze ans à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 52:2
      metadata:
        usfm: JER.52.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: JER.52.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l’Éternel, son Dieu; et il ne s’humilia point devant Jérémie, le prophète, qui lui parlait de la part de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il se révolta même contre le roi Nebucadnetsar, qui l’avait fait jurer par le nom de Dieu; et il raidit son cou et endurcit son cœur, au point de ne pas retourner à l’Éternel, le Dieu d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tous les chefs des sacrificateurs et le peuple multiplièrent aussi les transgressions, selon toutes les abominations des nations; et ils profanèrent la maison de l’Éternel, qu’il avait sanctifiée à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L’Éternel, le Dieu de leurs pères, donna de bonne heure à ses envoyés la mission de les avertir, car il voulait épargner son peuple et sa propre demeure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais ils se moquèrent des envoyés de Dieu, ils méprisèrent ses paroles, et ils se raillèrent de ses prophètes, jusqu’à ce que la colère de l’Éternel contre son peuple devînt sans remède. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors l’Éternel fit monter contre eux le roi des Chaldéens, et tua par l’épée leurs jeunes gens dans la maison de leur sanctuaire; il n’épargna ni le jeune homme, ni la jeune fille, ni le vieillard, ni l’homme aux cheveux blancs, il livra tout entre ses mains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nebucadnetsar emporta à Babylone tous les ustensiles de la maison de Dieu, grands et petits, les trésors de la maison de l’Éternel, et les trésors du roi et de ses chefs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils brûlèrent la maison de Dieu, ils démolirent les murailles de Jérusalem, ils livrèrent au feu tous ses palais et détruisirent tous les objets précieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nebucadnetsar emmena captifs à Babylone ceux qui échappèrent à l’épée; et ils lui furent assujettis, à lui et à ses fils, jusqu’à la domination du royaume de Perse, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'afin que s’accomplît la parole de l’Éternel prononcée par la bouche de Jérémie; jusqu’à ce que le pays eût joui de ses sabbats, il se reposa tout le temps qu’il fut dévasté, jusqu’à l’accomplissement de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 25:12
      metadata:
        usfm: JER.25.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:10
      metadata:
        usfm: JER.29.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: soixante-dix ans.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-23: cf. Esd 1:1-3. (Jé 29:10-14. És 44:26-28.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'La première année de Cyrus, roi de Perse, afin que s’accomplît '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esd 1:1
      metadata:
        usfm: EZR.1.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 25:12
      metadata:
        usfm: JER.25.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:10
      metadata:
        usfm: JER.29.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la parole de l’Éternel prononcée par la bouche de Jérémie, l’Éternel réveilla l’esprit de Cyrus, roi de Perse, qui fit faire de vive voix et par écrit cette publication dans tout son royaume: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ainsi parle Cyrus, roi de Perse: L’Éternel, le Dieu des cieux, m’a donné tous les royaumes de la terre, et il m’a commandé de lui bâtir une maison à Jérusalem en Juda. Qui d’entre vous est de son peuple? Que l’Éternel, son Dieu, soit avec lui, et qu’il monte!'
