document_id: GEN.26,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Isaac dans le pays des Philistins
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. Ge 28:13-15. (Ge 12:10-20; 20.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Il y eut une famine dans le pays, outre la première famine qui eut lieu du temps d’Abraham; et Isaac alla vers Abimélec, roi des Philistins, à Guérar. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Et Abimélec dit: Qu’est-ce que tu nous as fait? Peu s’en est fallu que quelqu’un du peuple n’ait couché avec ta femme, et tu nous aurais rendus coupables. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Alors Abimélec fit cette ordonnance pour tout le peuple: Celui qui touchera à cet homme ou à sa femme sera mis à mort.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Alliance avec Abimélec
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-33: cf. (Ps 112:1-3. Ge 21:22-34.) Pr 16:7. Mt 5:5.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Isaac sema dans ce pays, et il recueillit cette année le centuple; car l’Éternel le bénit. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Cet homme devint riche, et il alla s’enrichissant de plus en plus, jusqu’à ce qu’il devint fort riche. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Il avait des troupeaux de menu bétail et des troupeaux de gros bétail, et un grand nombre de serviteurs: aussi les Philistins lui portèrent envie. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tous les puits qu’avaient creusés les serviteurs de son père, du temps d’Abraham, son père, les Philistins les comblèrent et les remplirent de poussière. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Et Abimélec dit à Isaac: Va-t’en de chez nous, car tu es beaucoup plus puissant que nous. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Isaac partit de là, et campa dans la vallée de Guérar, où il s’établit. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Isaac creusa de nouveau les puits d’eau qu’on avait creusés du temps d’Abraham, son père, et qu’avaient comblés les Philistins après la mort d’Abraham; et il leur donna les mêmes noms que son père leur avait donnés. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Les serviteurs d’Isaac creusèrent encore dans la vallée, et y trouvèrent un puits d’eau vive. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'L’Éternel lui apparut, et dit: Ne descends pas en Égypte, demeure dans le pays que je te dirai. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Les bergers de Guérar querellèrent les bergers d’Isaac, en disant: L’eau est à nous. Et il donna au puits le nom d’Ések, parce qu’ils s’étaient disputés avec lui. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ses serviteurs creusèrent un autre puits, au sujet duquel on chercha aussi une querelle; et il l’appela Sitna. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Il se transporta de là, et creusa un autre puits, pour lequel on ne chercha pas querelle; et il l’appela Rehoboth, car, dit-il, l’Éternel nous a maintenant mis au large, et nous prospérerons dans le pays. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Il remonta de là à Beer-Schéba. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'L’Éternel lui apparut dans la nuit, et dit: Je suis le Dieu d’Abraham, ton père; ne crains point, car je suis avec toi; je te bénirai, et je multiplierai ta postérité, à cause d’Abraham, mon serviteur. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Il bâtit là un autel, invoqua le nom de l’Éternel, et y dressa sa tente. Et les serviteurs d’Isaac y creusèrent un puits. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Abimélec vint de Guérar auprès de lui, avec Ahuzath, son ami, et Picol, chef de son armée. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Isaac leur dit: Pourquoi venez-vous vers moi, puisque vous me haïssez et que vous m’avez renvoyé de chez vous? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ils répondirent: Nous voyons que l’Éternel est avec toi. C’est pourquoi nous disons: Qu’il y ait un serment entre nous, entre nous et toi, et que nous fassions alliance avec toi! '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Jure que tu ne nous feras aucun mal, de même que nous ne t’avons point maltraité, que nous t’avons fait seulement du bien, et que nous t’avons laissé partir en paix. Tu es maintenant béni de l’Éternel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Séjourne dans ce pays-ci: je '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 13:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'serai avec toi, et je te bénirai, car je donnerai toutes ces contrées à toi et à ta postérité, et je tiendrai le serment que j’ai fait à Abraham, ton père. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Isaac leur fit un festin, et ils mangèrent et burent. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ils se levèrent de bon matin, et se lièrent l’un à l’autre par un serment. Isaac les laissa partir, et ils le quittèrent en paix. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ce même jour, des serviteurs d’Isaac vinrent lui parler du puits qu’ils creusaient, et lui dirent: Nous avons trouvé de l’eau. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Et il l’appela Schiba. C’est pourquoi on a donné à la ville le nom de Beer-Schéba, jusqu’à ce jour.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 34-35: cf. (Ge 27:46 à 28:9.)'
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ésaü, âgé de quarante ans, prit pour femmes Judith, fille de Beéri, le Héthien, et Basmath, fille d’Élon, le Héthien. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 27:46
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Elles furent un sujet d’amertume pour le cœur d’Isaac et de Rebecca.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 12:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je multiplierai ta postérité comme les étoiles du ciel; je donnerai à ta postérité toutes ces contrées; et toutes les nations de la terre seront bénies en ta postérité, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'parce qu’Abraham a obéi à ma voix, et qu’il a observé mes ordres, mes commandements, mes statuts et mes lois. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Et Isaac resta à Guérar. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Lorsque les gens du lieu faisaient des questions sur sa femme, il disait: C’est ma sœur; car il craignait, en disant ma femme, que les gens du lieu ne le tuassent, parce que Rebecca était belle de figure. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Comme son séjour se prolongeait, il arriva qu’Abimélec, roi des Philistins, regardant par la fenêtre, vit Isaac qui plaisantait avec Rebecca, sa femme. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Abimélec fit appeler Isaac, et dit: Certainement, c’est ta femme. Comment as-tu pu dire: C’est ma sœur? Isaac lui répondit: J’ai parlé ainsi, de peur de mourir à cause d’elle. '
