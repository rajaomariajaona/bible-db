document_id: GEN.26,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Isaac dans le pays des Philistins
  - type: heading
    content: 'V. 1-11: cf. Ge 28:13-15. (Ge 12:10-20; 20.)'
  - type: text
    content: 'Il y eut une famine dans le pays, outre la première famine qui eut lieu du temps d’Abraham; et Isaac alla vers Abimélec, roi des Philistins, à Guérar. '
  '10':
  - type: text
    content: 'Et Abimélec dit: Qu’est-ce que tu nous as fait? Peu s’en est fallu que quelqu’un du peuple n’ait couché avec ta femme, et tu nous aurais rendus coupables. '
  '11':
  - type: text
    content: 'Alors Abimélec fit cette ordonnance pour tout le peuple: Celui qui touchera à cet homme ou à sa femme sera mis à mort.'
  - type: heading
    content: Alliance avec Abimélec
  - type: heading
    content: 'V. 12-33: cf. (Ps 112:1-3. Ge 21:22-34.) Pr 16:7. Mt 5:5.'
  '12':
  - type: text
    content: 'Isaac sema dans ce pays, et il recueillit cette année le centuple; car l’Éternel le bénit. '
  '13':
  - type: text
    content: 'Cet homme devint riche, et il alla s’enrichissant de plus en plus, jusqu’à ce qu’il devint fort riche. '
  '14':
  - type: text
    content: 'Il avait des troupeaux de menu bétail et des troupeaux de gros bétail, et un grand nombre de serviteurs: aussi les Philistins lui portèrent envie. '
  '15':
  - type: text
    content: 'Tous les puits qu’avaient creusés les serviteurs de son père, du temps d’Abraham, son père, les Philistins les comblèrent et les remplirent de poussière. '
  '16':
  - type: text
    content: 'Et Abimélec dit à Isaac: Va-t’en de chez nous, car tu es beaucoup plus puissant que nous. '
  '17':
  - type: text
    content: 'Isaac partit de là, et campa dans la vallée de Guérar, où il s’établit. '
  '18':
  - type: text
    content: 'Isaac creusa de nouveau les puits d’eau qu’on avait creusés du temps d’Abraham, son père, et qu’avaient comblés les Philistins après la mort d’Abraham; et il leur donna les mêmes noms que son père leur avait donnés. '
  '19':
  - type: text
    content: 'Les serviteurs d’Isaac creusèrent encore dans la vallée, et y trouvèrent un puits d’eau vive. '
  '2':
  - type: text
    content: 'L’Éternel lui apparut, et dit: Ne descends pas en Égypte, demeure dans le pays que je te dirai. '
  '20':
  - type: text
    content: 'Les bergers de Guérar querellèrent les bergers d’Isaac, en disant: L’eau est à nous. Et il donna au puits le nom d’Ések, parce qu’ils s’étaient disputés avec lui. '
  '21':
  - type: text
    content: 'Ses serviteurs creusèrent un autre puits, au sujet duquel on chercha aussi une querelle; et il l’appela Sitna. '
  '22':
  - type: text
    content: 'Il se transporta de là, et creusa un autre puits, pour lequel on ne chercha pas querelle; et il l’appela Rehoboth, car, dit-il, l’Éternel nous a maintenant mis au large, et nous prospérerons dans le pays. '
  '23':
  - type: text
    content: 'Il remonta de là à Beer-Schéba. '
  '24':
  - type: text
    content: 'L’Éternel lui apparut dans la nuit, et dit: Je suis le Dieu d’Abraham, ton père; ne crains point, car je suis avec toi; je te bénirai, et je multiplierai ta postérité, à cause d’Abraham, mon serviteur. '
  '25':
  - type: text
    content: 'Il bâtit là un autel, invoqua le nom de l’Éternel, et y dressa sa tente. Et les serviteurs d’Isaac y creusèrent un puits. '
  '26':
  - type: text
    content: 'Abimélec vint de Guérar auprès de lui, avec Ahuzath, son ami, et Picol, chef de son armée. '
  '27':
  - type: text
    content: 'Isaac leur dit: Pourquoi venez-vous vers moi, puisque vous me haïssez et que vous m’avez renvoyé de chez vous? '
  '28':
  - type: text
    content: 'Ils répondirent: Nous voyons que l’Éternel est avec toi. C’est pourquoi nous disons: Qu’il y ait un serment entre nous, entre nous et toi, et que nous fassions alliance avec toi! '
  '29':
  - type: text
    content: 'Jure que tu ne nous feras aucun mal, de même que nous ne t’avons point maltraité, que nous t’avons fait seulement du bien, et que nous t’avons laissé partir en paix. Tu es maintenant béni de l’Éternel. '
  '3':
  - type: text
    content: 'Séjourne dans ce pays-ci: je '
  - type: note
    content: Ge 13:15; 15:18.
  - type: text
    content: 'serai avec toi, et je te bénirai, car je donnerai toutes ces contrées à toi et à ta postérité, et je tiendrai le serment que j’ai fait à Abraham, ton père. '
  '30':
  - type: text
    content: 'Isaac leur fit un festin, et ils mangèrent et burent. '
  '31':
  - type: text
    content: 'Ils se levèrent de bon matin, et se lièrent l’un à l’autre par un serment. Isaac les laissa partir, et ils le quittèrent en paix. '
  '32':
  - type: text
    content: 'Ce même jour, des serviteurs d’Isaac vinrent lui parler du puits qu’ils creusaient, et lui dirent: Nous avons trouvé de l’eau. '
  '33':
  - type: text
    content: Et il l’appela Schiba. C’est pourquoi on a donné à la ville le nom de Beer-Schéba, jusqu’à ce jour.
  - type: heading
    content: 'V. 34-35: cf. (Ge 27:46 à 28:9.)'
  '34':
  - type: text
    content: 'Ésaü, âgé de quarante ans, prit pour femmes Judith, fille de Beéri, le Héthien, et Basmath, fille d’Élon, le Héthien. '
  '35':
  - type: note
    content: Ge 27:46.
  - type: text
    content: Elles furent un sujet d’amertume pour le cœur d’Isaac et de Rebecca.
  '4':
  - type: note
    content: Ge 12:3; 18:18; 22:18.
  - type: text
    content: 'Je multiplierai ta postérité comme les étoiles du ciel; je donnerai à ta postérité toutes ces contrées; et toutes les nations de la terre seront bénies en ta postérité, '
  '5':
  - type: text
    content: 'parce qu’Abraham a obéi à ma voix, et qu’il a observé mes ordres, mes commandements, mes statuts et mes lois. '
  '6':
  - type: text
    content: 'Et Isaac resta à Guérar. '
  '7':
  - type: text
    content: 'Lorsque les gens du lieu faisaient des questions sur sa femme, il disait: C’est ma sœur; car il craignait, en disant ma femme, que les gens du lieu ne le tuassent, parce que Rebecca était belle de figure. '
  '8':
  - type: text
    content: 'Comme son séjour se prolongeait, il arriva qu’Abimélec, roi des Philistins, regardant par la fenêtre, vit Isaac qui plaisantait avec Rebecca, sa femme. '
  '9':
  - type: text
    content: 'Abimélec fit appeler Isaac, et dit: Certainement, c’est ta femme. Comment as-tu pu dire: C’est ma sœur? Isaac lui répondit: J’ai parlé ainsi, de peur de mourir à cause d’elle. '
