document_id: GEN.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le pays de Canaan promis à la postérité d’Abram
  - type: heading
    content: 'V. 1-6: cf. Ro 4. Ga 3:6-9.'
  - type: text
    content: 'Après ces événements, la parole de l’Éternel fut adressée à Abram dans une vision, et il dit: Abram, ne crains point; '
  - type: note
    content: Ps 16:6; 18:3; 19:12.
  - type: text
    content: 'je suis ton bouclier, et ta récompense sera très grande. '
  '10':
  - type: text
    content: 'Abram prit tous ces animaux, les coupa par le milieu, et mit chaque morceau l’un vis-à-vis de l’autre; mais il ne partagea point les oiseaux. '
  '11':
  - type: text
    content: 'Les oiseaux de proie s’abattirent sur les cadavres; et Abram les chassa. '
  '12':
  - type: text
    content: 'Au coucher du soleil, un profond sommeil tomba sur Abram; et voici, une frayeur et une grande obscurité vinrent l’assaillir. '
  '13':
  - type: text
    content: 'Et l’Éternel dit à Abram: Sache '
  - type: note
    content: Ex 12:40. Ac 7:6. Ga 3:17.
  - type: text
    content: 'que tes descendants seront étrangers dans un pays qui ne sera point à eux; ils y seront asservis, et on les opprimera pendant quatre cents ans. '
  '14':
  - type: text
    content: 'Mais je jugerai la nation à laquelle ils seront asservis, et ils sortiront ensuite '
  - type: note
    content: Ex 3:22; 11:2; 12:35, 36.
  - type: text
    content: 'avec de grandes richesses. '
  '15':
  - type: note
    content: Ge 25:7, 8.
  - type: text
    content: 'Toi, tu iras en paix vers tes pères, tu seras enterré après une heureuse vieillesse. '
  '16':
  - type: note
    content: Ex 12:40.
  - type: text
    content: 'A la quatrième génération, ils reviendront ici; car l’iniquité des Amoréens n’est pas encore à son comble. '
  '17':
  - type: text
    content: 'Quand le soleil fut couché, il y eut une obscurité profonde; et voici, ce fut une fournaise fumante, et des flammes passèrent entre les animaux partagés. '
  '18':
  - type: text
    content: 'En ce jour-là, l’Éternel fit alliance avec Abram, et dit: '
  - type: note
    content: Ge 12:7; 13:15; 24:7; 26:4. Ex 32:13. De 1:8; 34:4.
  - type: text
    content: 'Je donne ce pays à ta postérité, depuis le fleuve d’Égypte jusqu’au grand fleuve, au fleuve d’Euphrate, '
  '19':
  - type: text
    content: 'le pays des Kéniens, des Keniziens, des Kadmoniens, '
  '2':
  - type: text
    content: 'Abram répondit: Seigneur Éternel, que me donneras-tu? Je m’en vais sans enfants; et l’héritier de ma maison, c’est Éliézer de Damas. '
  '20':
  - type: text
    content: 'des Héthiens, des Phéréziens, des Rephaïm, '
  '21':
  - type: text
    content: des Amoréens, des Cananéens, des Guirgasiens et des Jébusiens.
  '3':
  - type: text
    content: 'Et Abram dit: Voici, tu ne m’as pas donné de postérité, et celui qui est né dans ma maison sera mon héritier. '
  '4':
  - type: text
    content: 'Alors la parole de l’Éternel lui fut adressée ainsi: Ce n’est pas lui qui sera ton héritier, mais c’est celui qui sortira de tes entrailles qui sera ton héritier. '
  '5':
  - type: text
    content: 'Et après l’avoir conduit dehors, il dit: Regarde vers le ciel, et compte les étoiles, si tu peux les compter. Et il lui dit: '
  - type: note
    content: Ex 32:13. De 10:22. Ro 4:18. Hé 11:12.
  - type: text
    content: 'Telle sera ta postérité. '
  '6':
  - type: note
    content: Ro 4:3, 9, 18, 22. Ga 3:6. Ja 2:23.
  - type: text
    content: Abram eut confiance en l’Éternel, qui le lui imputa à justice.
  - type: heading
    content: 'V. 7-21: cf. Né 9:7, 8. Ac 7:2-7.'
  '7':
  - type: text
    content: 'L’Éternel lui dit encore: Je suis l’Éternel, qui t’ai fait sortir d’Ur en Chaldée, '
  - type: note
    content: Ps 105:11.
  - type: text
    content: 'pour te donner en possession ce pays. '
  '8':
  - type: text
    content: 'Abram répondit: Seigneur Éternel, à quoi connaîtrai-je que je le posséderai? '
  '9':
  - type: text
    content: 'Et l’Éternel lui dit: Prends une génisse de trois ans, une chèvre de trois ans, un bélier de trois ans, une tourterelle et une jeune colombe. '
