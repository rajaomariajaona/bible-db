document_id: GEN.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le pays de Canaan promis à la postérité d’Abram
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. Ro 4. Ga 3:6-9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après ces événements, la parole de l’Éternel fut adressée à Abram dans une vision, et il dit: Abram, ne crains point; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 16:6
      metadata:
        usfm: PSA.16.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:3
      metadata:
        usfm: PSA.18.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:12
      metadata:
        usfm: PSA.19.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je suis ton bouclier, et ta récompense sera très grande. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Abram répondit: Seigneur Éternel, que me donneras-tu? Je m’en vais sans enfants; et l’héritier de ma maison, c’est Éliézer de Damas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et Abram dit: Voici, tu ne m’as pas donné de postérité, et celui qui est né dans ma maison sera mon héritier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors la parole de l’Éternel lui fut adressée ainsi: Ce n’est pas lui qui sera ton héritier, mais c’est celui qui sortira de tes entrailles qui sera ton héritier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et après l’avoir conduit dehors, il dit: Regarde vers le ciel, et compte les étoiles, si tu peux les compter. Et il lui dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 32:13
      metadata:
        usfm: EXO.32.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:22
      metadata:
        usfm: DEU.10.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 4:18
      metadata:
        usfm: ROM.4.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:12
      metadata:
        usfm: HEB.11.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Telle sera ta postérité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 4:3
      metadata:
        usfm: ROM.4.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: ROM.4.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: ROM.4.18
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: ROM.4.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:6
      metadata:
        usfm: GAL.3.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 2:23
      metadata:
        usfm: JAS.2.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Abram eut confiance en l’Éternel, qui le lui imputa à justice.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-21: cf. Né 9:7, 8. Ac 7:2-7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’Éternel lui dit encore: Je suis l’Éternel, qui t’ai fait sortir d’Ur en Chaldée, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:11
      metadata:
        usfm: PSA.105.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour te donner en possession ce pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Abram répondit: Seigneur Éternel, à quoi connaîtrai-je que je le posséderai? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et l’Éternel lui dit: Prends une génisse de trois ans, une chèvre de trois ans, un bélier de trois ans, une tourterelle et une jeune colombe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Abram prit tous ces animaux, les coupa par le milieu, et mit chaque morceau l’un vis-à-vis de l’autre; mais il ne partagea point les oiseaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les oiseaux de proie s’abattirent sur les cadavres; et Abram les chassa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Au coucher du soleil, un profond sommeil tomba sur Abram; et voici, une frayeur et une grande obscurité vinrent l’assaillir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et l’Éternel dit à Abram: Sache '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:40
      metadata:
        usfm: EXO.12.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:6
      metadata:
        usfm: ACT.7.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:17
      metadata:
        usfm: GAL.3.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que tes descendants seront étrangers dans un pays qui ne sera point à eux; ils y seront asservis, et on les opprimera pendant quatre cents ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais je jugerai la nation à laquelle ils seront asservis, et ils sortiront ensuite '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 3:22
      metadata:
        usfm: EXO.3.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:2
      metadata:
        usfm: EXO.11.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:35
      metadata:
        usfm: EXO.12.35
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '36'
      metadata:
        usfm: EXO.12.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'avec de grandes richesses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 25:7
      metadata:
        usfm: GEN.25.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: GEN.25.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Toi, tu iras en paix vers tes pères, tu seras enterré après une heureuse vieillesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:40
      metadata:
        usfm: EXO.12.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'A la quatrième génération, ils reviendront ici; car l’iniquité des Amoréens n’est pas encore à son comble. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Quand le soleil fut couché, il y eut une obscurité profonde; et voici, ce fut une fournaise fumante, et des flammes passèrent entre les animaux partagés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'En ce jour-là, l’Éternel fit alliance avec Abram, et dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 12:7
      metadata:
        usfm: GEN.12.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:15
      metadata:
        usfm: GEN.13.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:7
      metadata:
        usfm: GEN.24.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:4
      metadata:
        usfm: GEN.26.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 32:13
      metadata:
        usfm: EXO.32.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 1:8
      metadata:
        usfm: DEU.1.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:4
      metadata:
        usfm: DEU.34.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je donne ce pays à ta postérité, depuis le fleuve d’Égypte jusqu’au grand fleuve, au fleuve d’Euphrate, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'le pays des Kéniens, des Keniziens, des Kadmoniens, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'des Héthiens, des Phéréziens, des Rephaïm, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: des Amoréens, des Cananéens, des Guirgasiens et des Jébusiens.
