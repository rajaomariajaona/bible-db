document_id: GAL.5,93
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Jn 8:32. Ro 6:18. 1 Pi 2:16.
  - type: text
    content: 'C’est pour la liberté que Christ nous a affranchis. Demeurez donc fermes, et ne vous laissez pas mettre de nouveau '
  - type: note
    content: És 9:3.
  - type: text
    content: sous le joug de la servitude.
  - type: heading
    content: 'V. 2-12: cf. (Ga 2:3-5; 3:1-7; 4:1-11; 1:6-9). Ac 15:1-10, 24.'
  '10':
  - type: note
    content: 2 Co 2:3; 8:22.
  - type: text
    content: 'J’ai cette confiance en vous, dans le Seigneur, que vous ne penserez pas autrement. Mais celui qui vous trouble, quel qu’il soit, en portera la peine. '
  '11':
  - type: text
    content: 'Pour moi, frères, si je prêche encore la circoncision, pourquoi suis-je encore persécuté? '
  - type: note
    content: 1 Co 1:23.
  - type: text
    content: 'Le scandale de la croix a donc disparu! '
  '12':
  - type: note
    content: Jos 7:25.
  - type: text
    content: Puissent-ils être retranchés, ceux qui mettent le trouble parmi vous!
  - type: heading
    content: Exhortation à vivre, non selon la chair, mais selon l’Esprit
  - type: heading
    content: 'V. 13-15: cf. Ro 13:8-10. Ja 3:13-18.'
  '13':
  - type: text
    content: 'Frères, vous avez été appelés à la liberté, '
  - type: note
    content: 1 Co 8:9. 1 Pi 2:16. Jud v. 4.
  - type: text
    content: 'seulement ne faites pas de cette liberté un prétexte de vivre selon la chair; mais rendez-vous, par la charité, serviteurs les uns des autres. '
  '14':
  - type: note
    content: Ro 13:8.
  - type: text
    content: 'Car toute la loi est accomplie dans une seule parole, dans celle-ci:'
  - type: note
    content: Lé 19:18. Mt 22:39. Mc 12:31. Ja 2:8.
  - type: text
    content: Tu aimeras ton prochain comme toi-même.
  '15':
  - type: text
    content: 'Mais '
  - type: note
    content: 2 Co 12:20.
  - type: text
    content: si vous vous mordez et vous dévorez les uns les autres, prenez garde que vous ne soyez détruits les uns par les autres.
  - type: heading
    content: 'V. 16-26: cf. Ro 8:1-14; 13:12-14. (Ép 5:1-12. Col 3:5-15.)'
  '16':
  - type: text
    content: 'Je dis donc: '
  - type: note
    content: Ro 13:14. 1 Pi 2:11.
  - type: text
    content: 'Marchez selon l’Esprit, et vous n’accomplirez pas les désirs de la chair. '
  '17':
  - type: note
    content: Ro 7:15, etc.
  - type: text
    content: 'Car la chair a des désirs contraires à ceux de l’Esprit, et l’Esprit en a de contraires à ceux de la chair; ils sont opposés entre eux, afin que vous ne fassiez point ce que vous voudriez. '
  '18':
  - type: text
    content: 'Si vous êtes conduits par l’Esprit, vous n’êtes point sous la loi. '
  '19':
  - type: note
    content: 1 Co 3:3. Ja 3:14.
  - type: text
    content: 'Or, les œuvres de la chair sont manifestes, ce sont l’impudicité, l’impureté, la dissolution, '
  '2':
  - type: text
    content: 'Voici, moi Paul, je vous dis que, '
  - type: note
    content: Ac 15:1.
  - type: text
    content: 'si vous vous faites circoncire, Christ ne vous servira de rien. '
  '20':
  - type: text
    content: 'l’idolâtrie, la magie, les inimitiés, les querelles, les jalousies, les animosités, les disputes, les divisions, les sectes, '
  '21':
  - type: text
    content: 'l’envie, l’ivrognerie, les excès de table, et les choses semblables. '
  - type: note
    content: 1 Co 6:10. Ép 5:5. Col 3:6. Ap 22:15.
  - type: text
    content: 'Je vous dis d’avance, comme je l’ai déjà dit, que ceux qui commettent de telles choses n’hériteront point le royaume de Dieu. '
  '22':
  - type: note
    content: Ép 5:9.
  - type: text
    content: 'Mais le fruit de l’Esprit, c’est l’amour, la joie, la paix, la patience, la bonté, la bénignité, la fidélité, la douceur, la tempérance; '
  '23':
  - type: note
    content: 1 Ti 1:9.
  - type: text
    content: 'la loi n’est pas contre ces choses. '
  '24':
  - type: note
    content: Ro 6:6; 13:14. Ga 2:20. 1 Pi 2:11.
  - type: text
    content: 'Ceux qui sont à Jésus-Christ ont crucifié la chair avec ses passions et ses désirs. '
  '25':
  - type: text
    content: 'Si nous vivons par l’Esprit, marchons aussi selon l’Esprit. '
  '26':
  - type: text
    content: Ne cherchons pas une vaine gloire, en nous provoquant les uns les autres, en nous portant envie les uns aux autres.
  '3':
  - type: text
    content: 'Et je proteste encore une fois à tout homme qui se fait circoncire, qu’il est tenu de pratiquer la loi tout entière. '
  '4':
  - type: text
    content: 'Vous êtes séparés de Christ, vous tous qui cherchez la justification dans la loi; vous êtes déchus de la grâce. '
  '5':
  - type: text
    content: 'Pour nous, c’est de la foi que nous attendons, par l’Esprit, l’espérance de la justice. '
  '6':
  - type: note
    content: Mt 12:50. Jn 15:14. 1 Co 7:19. 2 Co 5:17. Ga 6:15. Col 3:11.
  - type: text
    content: 'Car, en Jésus-Christ, ni la circoncision ni l’incirconcision n’a de valeur, mais la foi qui est '
  - type: note
    content: 1 Th 1:3.
  - type: text
    content: 'agissante par la charité. '
  '7':
  - type: text
    content: 'Vous couriez bien: '
  - type: note
    content: Ga 3:1.
  - type: text
    content: 'qui vous a arrêtés, pour vous empêcher d’obéir à la vérité? '
  '8':
  - type: text
    content: 'Cette influence ne vient pas de celui qui vous appelle. '
  '9':
  - type: note
    content: 1 Co 5:6.
  - type: text
    content: 'Un peu de levain fait lever toute la pâte. '
