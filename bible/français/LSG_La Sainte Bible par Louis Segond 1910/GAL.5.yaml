document_id: GAL.5
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 8:32
      metadata:
        usfm: JHN.8.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 6:18
      metadata:
        usfm: ROM.6.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:16
      metadata:
        usfm: 1PE.2.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est pour la liberté que Christ nous a affranchis. Demeurez donc fermes, et ne vous laissez pas mettre de nouveau '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 9:3
      metadata:
        usfm: ISA.9.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: sous le joug de la servitude.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 2-12: cf. (Ga 2:3-5; 3:1-7; 4:1-11; 1:6-9). Ac 15:1-10, 24.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici, moi Paul, je vous dis que, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 15:1
      metadata:
        usfm: ACT.15.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'si vous vous faites circoncire, Christ ne vous servira de rien. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et je proteste encore une fois à tout homme qui se fait circoncire, qu’il est tenu de pratiquer la loi tout entière. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Vous êtes séparés de Christ, vous tous qui cherchez la justification dans la loi; vous êtes déchus de la grâce. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Pour nous, c’est de la foi que nous attendons, par l’Esprit, l’espérance de la justice. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:50
      metadata:
        usfm: MAT.12.50
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 15:14
      metadata:
        usfm: JHN.15.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 7:19
      metadata:
        usfm: 1CO.7.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:17
      metadata:
        usfm: 2CO.5.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 6:15
      metadata:
        usfm: GAL.6.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:11
      metadata:
        usfm: COL.3.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car, en Jésus-Christ, ni la circoncision ni l’incirconcision n’a de valeur, mais la foi qui est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 1:3
      metadata:
        usfm: 1TH.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'agissante par la charité. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vous couriez bien: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:1
      metadata:
        usfm: GAL.3.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui vous a arrêtés, pour vous empêcher d’obéir à la vérité? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cette influence ne vient pas de celui qui vous appelle. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 5:6
      metadata:
        usfm: 1CO.5.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Un peu de levain fait lever toute la pâte. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 2:3
      metadata:
        usfm: 2CO.2.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:22
      metadata:
        usfm: 2CO.8.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'J’ai cette confiance en vous, dans le Seigneur, que vous ne penserez pas autrement. Mais celui qui vous trouble, quel qu’il soit, en portera la peine. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Pour moi, frères, si je prêche encore la circoncision, pourquoi suis-je encore persécuté? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:23
      metadata:
        usfm: 1CO.1.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le scandale de la croix a donc disparu! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 7:25
      metadata:
        usfm: JOS.7.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Puissent-ils être retranchés, ceux qui mettent le trouble parmi vous!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Exhortation à vivre, non selon la chair, mais selon l’Esprit
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-15: cf. Ro 13:8-10. Ja 3:13-18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Frères, vous avez été appelés à la liberté, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 8:9
      metadata:
        usfm: 1CO.8.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:16
      metadata:
        usfm: 1PE.2.16
    - type: text
      text: . Jud v. 4.
    marker-yv: yv-n
  - type: text
    text: 'seulement ne faites pas de cette liberté un prétexte de vivre selon la chair; mais rendez-vous, par la charité, serviteurs les uns des autres. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 13:8
      metadata:
        usfm: ROM.13.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car toute la loi est accomplie dans une seule parole, dans celle-ci:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:18
      metadata:
        usfm: LEV.19.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:39
      metadata:
        usfm: MAT.22.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 12:31
      metadata:
        usfm: MRK.12.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 2:8
      metadata:
        usfm: JAS.2.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tu aimeras ton prochain comme toi-même.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 12:20
      metadata:
        usfm: 2CO.12.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: si vous vous mordez et vous dévorez les uns les autres, prenez garde que vous ne soyez détruits les uns par les autres.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-26: cf. Ro 8:1-14; 13:12-14. (Ép 5:1-12. Col 3:5-15.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je dis donc: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 13:14
      metadata:
        usfm: ROM.13.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:11
      metadata:
        usfm: 1PE.2.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Marchez selon l’Esprit, et vous n’accomplirez pas les désirs de la chair. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ro 7:15, etc.
    marker-yv: yv-n
  - type: text
    text: 'Car la chair a des désirs contraires à ceux de l’Esprit, et l’Esprit en a de contraires à ceux de la chair; ils sont opposés entre eux, afin que vous ne fassiez point ce que vous voudriez. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Si vous êtes conduits par l’Esprit, vous n’êtes point sous la loi. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 3:3
      metadata:
        usfm: 1CO.3.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 3:14
      metadata:
        usfm: JAS.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Or, les œuvres de la chair sont manifestes, ce sont l’impudicité, l’impureté, la dissolution, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'l’idolâtrie, la magie, les inimitiés, les querelles, les jalousies, les animosités, les disputes, les divisions, les sectes, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'l’envie, l’ivrognerie, les excès de table, et les choses semblables. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 6:10
      metadata:
        usfm: 1CO.6.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:5
      metadata:
        usfm: EPH.5.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:6
      metadata:
        usfm: COL.3.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 22:15
      metadata:
        usfm: REV.22.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je vous dis d’avance, comme je l’ai déjà dit, que ceux qui commettent de telles choses n’hériteront point le royaume de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:9
      metadata:
        usfm: EPH.5.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais le fruit de l’Esprit, c’est l’amour, la joie, la paix, la patience, la bonté, la bénignité, la fidélité, la douceur, la tempérance; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:9
      metadata:
        usfm: 1TI.1.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la loi n’est pas contre ces choses. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 6:6
      metadata:
        usfm: ROM.6.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:14
      metadata:
        usfm: ROM.13.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 2:20
      metadata:
        usfm: GAL.2.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:11
      metadata:
        usfm: 1PE.2.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ceux qui sont à Jésus-Christ ont crucifié la chair avec ses passions et ses désirs. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Si nous vivons par l’Esprit, marchons aussi selon l’Esprit. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ne cherchons pas une vaine gloire, en nous provoquant les uns les autres, en nous portant envie les uns aux autres.
