document_id: ZEC.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Menaces contre les faux prophètes
  - type: heading
    content: 'V. 1-6: cf. (Ac 13:38, 39. Ro 11:26, 27. Hé 9:13, 14.) (Éz 37:23. De 13:1-11.)'
  - type: text
    content: En ce jour-là, une source sera ouverte
  - type: text
    content: Pour la maison de David et les habitants de Jérusalem,
  - type: text
    content: Pour le péché et pour l’impureté.
  '2':
  - type: text
    content: En ce jour-là, dit l’Éternel des armées,
  - type: text
    content: J’exterminerai du pays les noms des idoles,
  - type: text
    content: Afin qu’on ne s’en souvienne plus;
  - type: text
    content: J’ôterai aussi du pays les prophètes et l’esprit d’impureté.
  '3':
  - type: text
    content: Si quelqu’un prophétise encore,
  - type: text
    content: 'Son père et sa mère, qui l’ont engendré, lui diront:'
  - type: text
    content: Tu ne vivras pas, car tu dis des mensonges au nom de l’Éternel!
  - type: text
    content: Et son père et sa mère, qui l’ont engendré, le transperceront
  - type: text
    content: Quand il prophétisera.
  '4':
  - type: text
    content: En ce jour-là, les prophètes rougiront de leurs visions
  - type: text
    content: Quand ils prophétiseront,
  - type: text
    content: Et ils ne revêtiront plus un manteau de poil pour mentir.
  '5':
  - type: text
    content: 'Chacun d’eux dira: Je ne suis pas prophète,'
  - type: text
    content: Je suis laboureur,
  - type: text
    content: Car on m’a acheté dès ma jeunesse.
  '6':
  - type: text
    content: 'Et si on lui demande:'
  - type: text
    content: D’où viennent ces blessures que tu as aux mains?
  - type: text
    content: 'Il répondra:'
  - type: text
    content: C’est dans la maison de ceux qui m’aimaient que je les ai reçues.
  - type: heading
    content: 'V. 7-9: cf. (És 53:6-10. Mt 26:31, etc.; 27.) (És 6:10-13. Ro 11.)'
  '7':
  - type: text
    content: Épée, lève-toi sur mon pasteur
  - type: text
    content: Et sur l’homme qui est mon compagnon!
  - type: text
    content: Dit l’Éternel des armées.
  - type: note
    content: Mt 26:31. Mc 14:27.
  - type: text
    content: Frappe le pasteur, et que les brebis se dispersent!
  - type: text
    content: Et je tournerai ma main vers les faibles.
  '8':
  - type: text
    content: Dans tout le pays, dit l’Éternel,
  - type: text
    content: Les deux tiers seront exterminés, périront,
  - type: text
    content: Et l’autre tiers restera.
  '9':
  - type: text
    content: Je mettrai ce tiers dans le feu,
  - type: text
    content: Et je le purifierai comme on purifie l’argent,
  - type: text
    content: 'Je l’éprouverai '
  - type: note
    content: 1 Pi 1:6, 7.
  - type: text
    content: comme on éprouve l’or.
  - type: note
    content: Ps 50:15; 91:15.
  - type: text
    content: Il invoquera mon nom, et je l’exaucerai;
  - type: text
    content: 'Je dirai: '
  - type: note
    content: Ps 144:15. Jn 20:28.
  - type: text
    content: C’est mon peuple!
  - type: text
    content: 'Et il dira: L’Éternel est mon Dieu!'
