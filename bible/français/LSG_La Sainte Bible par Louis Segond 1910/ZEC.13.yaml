document_id: ZEC.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Menaces contre les faux prophètes
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. (Ac 13:38, 39. Ro 11:26, 27. Hé 9:13, 14.) (Éz 37:23. De 13:1-11.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: En ce jour-là, une source sera ouverte
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour la maison de David et les habitants de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour le péché et pour l’impureté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: En ce jour-là, dit l’Éternel des armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’exterminerai du pays les noms des idoles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin qu’on ne s’en souvienne plus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ôterai aussi du pays les prophètes et l’esprit d’impureté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Si quelqu’un prophétise encore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Son père et sa mère, qui l’ont engendré, lui diront:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu ne vivras pas, car tu dis des mensonges au nom de l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et son père et sa mère, qui l’ont engendré, le transperceront
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand il prophétisera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: En ce jour-là, les prophètes rougiront de leurs visions
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand ils prophétiseront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils ne revêtiront plus un manteau de poil pour mentir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Chacun d’eux dira: Je ne suis pas prophète,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis laboureur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car on m’a acheté dès ma jeunesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et si on lui demande:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: D’où viennent ces blessures que tu as aux mains?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il répondra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est dans la maison de ceux qui m’aimaient que je les ai reçues.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-9: cf. (És 53:6-10. Mt 26:31, etc.; 27.) (És 6:10-13. Ro 11.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Épée, lève-toi sur mon pasteur
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sur l’homme qui est mon compagnon!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel des armées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:31
      metadata:
        usfm: MAT.26.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:27
      metadata:
        usfm: MRK.14.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Frappe le pasteur, et que les brebis se dispersent!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je tournerai ma main vers les faibles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dans tout le pays, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les deux tiers seront exterminés, périront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’autre tiers restera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je mettrai ce tiers dans le feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je le purifierai comme on purifie l’argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je l’éprouverai '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:6
      metadata:
        usfm: 1PE.1.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: 1PE.1.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: comme on éprouve l’or.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 50:15
      metadata:
        usfm: PSA.50.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 91:15
      metadata:
        usfm: PSA.91.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il invoquera mon nom, et je l’exaucerai;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je dirai: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 144:15
      metadata:
        usfm: PSA.144.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 20:28
      metadata:
        usfm: JHN.20.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: C’est mon peuple!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et il dira: L’Éternel est mon Dieu!'
