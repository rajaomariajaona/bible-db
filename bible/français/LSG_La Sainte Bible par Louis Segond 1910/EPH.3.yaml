document_id: EPH.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le mystère de la vocation des païens. Immensité de l’amour de Christ
  - type: heading
    content: 'V. 1-13: cf. Ép 1:9, 10. Col 1:24-29. Ro 16:25, 26. 1 Pi 1:10-12.'
  - type: text
    content: 'A cause de cela, moi Paul, '
  - type: note
    content: Ac 21:33. Ép 4:1. Ph 1:7, 13, 14, 16. Col 4:3. 2 Ti 1:8. Phm v. 1.
  - type: text
    content: 'le prisonnier de Christ pour vous païens… '
  '10':
  - type: note
    content: 1 Pi 1:12.
  - type: text
    content: 'afin que les dominations et les autorités dans les lieux célestes connaissent aujourd’hui par l’Église la sagesse infiniment variée de Dieu, '
  '11':
  - type: text
    content: 'selon le dessein éternel qu’il a mis à exécution par Jésus-Christ notre Seigneur, '
  '12':
  - type: note
    content: Jn 10:9; 14:6. Ro 5:2. Ép 2:18. Hé 10:19.
  - type: text
    content: 'en qui nous avons, par la foi en lui, la liberté de nous approcher de Dieu avec confiance. '
  '13':
  - type: note
    content: Ph 1:14. 1 Th 3:3.
  - type: text
    content: 'Aussi je vous demande de ne pas perdre courage à cause de mes tribulations '
  - type: note
    content: Col 1:24.
  - type: text
    content: 'pour vous: elles sont votre gloire.'
  - type: heading
    content: 'V. 14-21: cf. (Col 2:1-3, 9, 10. 2 Pi 3:18. Jud v. 24, 25. Ap 1:6.)'
  '14':
  - type: text
    content: 'A cause de cela, je fléchis les genoux devant le Père, '
  '15':
  - type: text
    content: 'duquel tire son nom toute famille dans les cieux et sur la terre, '
  '16':
  - type: text
    content: 'afin qu’il vous donne, selon la richesse de sa gloire, d’être puissamment '
  - type: note
    content: Ép 6:10.
  - type: text
    content: 'fortifiés par son Esprit dans l’homme intérieur, '
  '17':
  - type: text
    content: 'en sorte que Christ habite dans vos cœurs par la foi; afin qu’étant '
  - type: note
    content: Col 2:7.
  - type: text
    content: 'enracinés et fondés dans l’amour, '
  '18':
  - type: text
    content: 'vous puissiez comprendre avec tous les saints quelle est la largeur, la longueur, la profondeur et la hauteur, '
  '19':
  - type: text
    content: 'et connaître l’amour de Christ, qui surpasse toute connaissance, en sorte que vous soyez remplis jusqu’à toute la plénitude de Dieu. '
  '2':
  - type: text
    content: 'si du moins vous avez appris quelle est la dispensation '
  - type: note
    content: Ro 1:5.
  - type: text
    content: 'de la grâce de Dieu, '
  - type: note
    content: Ac 13:2. Ép 3:8.
  - type: text
    content: 'qui m’a été donnée pour vous. '
  '20':
  - type: note
    content: Ro 16:25.
  - type: text
    content: 'Or, à celui qui peut faire, par la puissance qui agit en nous, infiniment au-delà de tout ce que nous demandons ou pensons, '
  '21':
  - type: text
    content: à lui soit la gloire dans l’Église et en Jésus-Christ, dans toutes les générations, aux siècles des siècles! Amen!
  '3':
  - type: text
    content: 'C’est '
  - type: note
    content: Ac 22:17, 21; 26:16, 17. Ga 1:11, 12.
  - type: text
    content: 'par révélation que j’ai eu connaissance du '
  - type: note
    content: Ro 16:25.
  - type: text
    content: 'mystère sur lequel je viens d’écrire en peu de mots. '
  '4':
  - type: text
    content: 'En les lisant, vous pouvez vous représenter l’intelligence que j’ai du mystère de Christ. '
  '5':
  - type: text
    content: 'Il n’a pas été manifesté aux fils des hommes dans les autres générations, '
  - type: note
    content: Ac 10:28.
  - type: text
    content: 'comme il a été révélé maintenant par l’Esprit aux saints apôtres et prophètes de Christ. '
  '6':
  - type: text
    content: 'Ce mystère, c’est que les païens sont cohéritiers, forment un même corps, et participent à la même promesse en Jésus-Christ par l’Évangile, '
  '7':
  - type: text
    content: 'dont j’ai été fait ministre selon le don de la grâce de Dieu, qui m’a été accordée '
  - type: note
    content: Ép 1:19. Col 2:12.
  - type: text
    content: 'par l’efficacité de sa puissance. '
  '8':
  - type: text
    content: 'A moi, '
  - type: note
    content: 1 Co 15:9. 1 Ti 1:15.
  - type: text
    content: 'qui suis le moindre de tous les saints, cette grâce a été accordée d’annoncer '
  - type: note
    content: Ac 9:15; 13:2; 22:21. Ga 1:16; 2:8. 1 Ti 2:7. 2 Ti 1:11.
  - type: text
    content: 'aux païens les richesses incompréhensibles de Christ, '
  '9':
  - type: text
    content: 'et de mettre en lumière quelle est la dispensation '
  - type: note
    content: Ro 16:25. Ép 1:9. Col 1:26. 2 Ti 1:10. Tit 1:2. 1 Pi 1:20.
  - type: text
    content: 'du mystère caché de tout temps en Dieu qui a '
  - type: note
    content: Ge 1:3. Ps 33:6. Jn 1:3. Col 1:16. Hé 1:2.
  - type: text
    content: 'créé toutes choses, '
