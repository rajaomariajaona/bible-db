document_id: EPH.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le mystère de la vocation des païens. Immensité de l’amour de Christ
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-13: cf. Ép 1:9, 10. Col 1:24-29. Ro 16:25, 26. 1 Pi 1:10-12.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A cause de cela, moi Paul, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 21:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 4:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 1:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 4:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 1:8
      - type: text
        text: . Phm v. 1.
      marker-yv: yv-n
    - type: text
      text: 'le prisonnier de Christ pour vous païens… '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'afin que les dominations et les autorités dans les lieux célestes connaissent aujourd’hui par l’Église la sagesse infiniment variée de Dieu, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'selon le dessein éternel qu’il a mis à exécution par Jésus-Christ notre Seigneur, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 10:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 5:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 2:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 10:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'en qui nous avons, par la foi en lui, la liberté de nous approcher de Dieu avec confiance. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 1:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 3:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Aussi je vous demande de ne pas perdre courage à cause de mes tribulations '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pour vous: elles sont votre gloire.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-21: cf. (Col 2:1-3, 9, 10. 2 Pi 3:18. Jud v. 24, 25. Ap 1:6.)'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'A cause de cela, je fléchis les genoux devant le Père, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'duquel tire son nom toute famille dans les cieux et sur la terre, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'afin qu’il vous donne, selon la richesse de sa gloire, d’être puissamment '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 6:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'fortifiés par son Esprit dans l’homme intérieur, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'en sorte que Christ habite dans vos cœurs par la foi; afin qu’étant '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 2:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'enracinés et fondés dans l’amour, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'vous puissiez comprendre avec tous les saints quelle est la largeur, la longueur, la profondeur et la hauteur, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'et connaître l’amour de Christ, qui surpasse toute connaissance, en sorte que vous soyez remplis jusqu’à toute la plénitude de Dieu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'si du moins vous avez appris quelle est la dispensation '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 1:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'de la grâce de Dieu, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 3:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui m’a été donnée pour vous. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 16:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Or, à celui qui peut faire, par la puissance qui agit en nous, infiniment au-delà de tout ce que nous demandons ou pensons, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: à lui soit la gloire dans l’Église et en Jésus-Christ, dans toutes les générations, aux siècles des siècles! Amen!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'C’est '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 22:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:16
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 1:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'par révélation que j’ai eu connaissance du '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 16:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mystère sur lequel je viens d’écrire en peu de mots. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'En les lisant, vous pouvez vous représenter l’intelligence que j’ai du mystère de Christ. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il n’a pas été manifesté aux fils des hommes dans les autres générations, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 10:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme il a été révélé maintenant par l’Esprit aux saints apôtres et prophètes de Christ. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ce mystère, c’est que les païens sont cohéritiers, forment un même corps, et participent à la même promesse en Jésus-Christ par l’Évangile, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'dont j’ai été fait ministre selon le don de la grâce de Dieu, qui m’a été accordée '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 1:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 2:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'par l’efficacité de sa puissance. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'A moi, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 1:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui suis le moindre de tous les saints, cette grâce a été accordée d’annoncer '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 9:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 1:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 2:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 1:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'aux païens les richesses incompréhensibles de Christ, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'et de mettre en lumière quelle est la dispensation '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 16:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 1:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 1:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 1:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'du mystère caché de tout temps en Dieu qui a '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 33:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 1:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'créé toutes choses, '
