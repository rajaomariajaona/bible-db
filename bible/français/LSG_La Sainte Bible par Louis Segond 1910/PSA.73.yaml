document_id: PSA.73
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: LIVRE TROISIÈME
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: (Ge 18:25. És 33:22.)
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 37; 49. Jé 12:1, 2. Jn 13:7.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume d’Asaph.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, Dieu est bon pour Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour ceux qui ont le cœur pur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Toutefois, mon pied allait fléchir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes pas étaient sur le point de glisser;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Job 21:7, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 37:1
      metadata:
        usfm: PSA.37.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 12:1
      metadata:
        usfm: JER.12.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: JER.12.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car je portais envie aux insensés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: En voyant le bonheur des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Rien ne les tourmente jusqu’à leur mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leur corps est chargé d’embonpoint;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils n’ont aucune part aux souffrances humaines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne sont point frappés comme le reste des hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aussi l’orgueil leur sert de collier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La violence est le vêtement qui les enveloppe;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L’iniquité sort de leurs entrailles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les pensées de leur cœur se font jour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils raillent, et parlent méchamment d’opprimer;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils profèrent des discours hautains,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ils élèvent leur bouche jusqu’aux cieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leur langue se promène sur la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Voilà pourquoi son peuple se tourne de leur côté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il avale l’eau abondamment,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et il dit: Comment Dieu saurait-il,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment le Très-Haut connaîtrait-il?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ainsi sont les méchants:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toujours heureux, ils accroissent leurs richesses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C’est donc en vain que j’ai purifié mon cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et que j’ai lavé mes mains dans l’innocence:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Chaque jour je suis frappé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les matins mon châtiment est là.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Si je disais: Je veux parler comme eux,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, je trahirais la race de tes enfants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Quand j’ai réfléchi là-dessus pour m’éclairer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La difficulté fut grande à mes yeux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Jusqu’à ce que j’eusse pénétré dans les sanctuaires de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que j’eusse pris garde au sort final des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Oui, tu les places sur des voies glissantes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu les fais tomber et les mets en ruines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Eh quoi! En un instant les voilà détruits!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont enlevés, anéantis par une fin soudaine!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Comme un songe au réveil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seigneur, à ton réveil, tu repousses leur image.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Lorsque mon cœur s’aigrissait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que je me sentais percé dans les entrailles,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: J’étais stupide et sans intelligence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’étais à ton égard comme les bêtes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Cependant je suis toujours avec toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu m’as saisi la main droite;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tu me conduiras par ton conseil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puis tu me recevras dans la gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Quel autre ai-je au ciel que toi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sur la terre je ne prends plaisir qu’en toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ma chair et mon cœur peuvent se consumer:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu sera toujours le rocher de mon cœur et mon partage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Car voici, ceux qui s’éloignent de toi périssent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu anéantis tous ceux qui te sont infidèles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Pour moi, m’approcher de Dieu, c’est mon bien:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je place mon refuge dans le Seigneur, l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin de raconter toutes tes œuvres.
