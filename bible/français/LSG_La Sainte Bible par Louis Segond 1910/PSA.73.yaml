document_id: PSA.73,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: LIVRE TROISIÈME
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: (Ge 18:25. És 33:22.)
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 37; 49. Jé 12:1, 2. Jn 13:7.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Psaume d’Asaph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, Dieu est bon pour Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour ceux qui ont le cœur pur.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Voilà pourquoi son peuple se tourne de leur côté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il avale l’eau abondamment,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Et il dit: Comment Dieu saurait-il,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment le Très-Haut connaîtrait-il?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ainsi sont les méchants:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toujours heureux, ils accroissent leurs richesses.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: C’est donc en vain que j’ai purifié mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et que j’ai lavé mes mains dans l’innocence:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Chaque jour je suis frappé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les matins mon châtiment est là.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Si je disais: Je veux parler comme eux,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je trahirais la race de tes enfants.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Quand j’ai réfléchi là-dessus pour m’éclairer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La difficulté fut grande à mes yeux,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Jusqu’à ce que j’eusse pénétré dans les sanctuaires de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que j’eusse pris garde au sort final des méchants.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Oui, tu les places sur des voies glissantes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu les fais tomber et les mets en ruines.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Eh quoi! En un instant les voilà détruits!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont enlevés, anéantis par une fin soudaine!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Toutefois, mon pied allait fléchir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes pas étaient sur le point de glisser;
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Comme un songe au réveil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur, à ton réveil, tu repousses leur image.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Lorsque mon cœur s’aigrissait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que je me sentais percé dans les entrailles,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: J’étais stupide et sans intelligence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’étais à ton égard comme les bêtes.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Cependant je suis toujours avec toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’as saisi la main droite;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Tu me conduiras par ton conseil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis tu me recevras dans la gloire.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Quel autre ai-je au ciel que toi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sur la terre je ne prends plaisir qu’en toi.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ma chair et mon cœur peuvent se consumer:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu sera toujours le rocher de mon cœur et mon partage.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Car voici, ceux qui s’éloignent de toi périssent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu anéantis tous ceux qui te sont infidèles.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Pour moi, m’approcher de Dieu, c’est mon bien:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je place mon refuge dans le Seigneur, l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin de raconter toutes tes œuvres.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Job 21:7, etc. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 37:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 12:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car je portais envie aux insensés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En voyant le bonheur des méchants.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Rien ne les tourmente jusqu’à leur mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leur corps est chargé d’embonpoint;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ils n’ont aucune part aux souffrances humaines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne sont point frappés comme le reste des hommes.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Aussi l’orgueil leur sert de collier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La violence est le vêtement qui les enveloppe;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: L’iniquité sort de leurs entrailles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les pensées de leur cœur se font jour.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ils raillent, et parlent méchamment d’opprimer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils profèrent des discours hautains,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ils élèvent leur bouche jusqu’aux cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leur langue se promène sur la terre.
