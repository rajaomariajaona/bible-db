document_id: PSA.73,93
type_code: fra
verses:
  '1':
  - type: heading
    content: LIVRE TROISIÈME
  - type: heading
    content: (Ge 18:25. És 33:22.)
  - type: heading
    content: Ps 37; 49. Jé 12:1, 2. Jn 13:7.
  - type: text
    content: Psaume d’Asaph.
  - type: text
    content: Oui, Dieu est bon pour Israël,
  - type: text
    content: Pour ceux qui ont le cœur pur.
  '10':
  - type: text
    content: Voilà pourquoi son peuple se tourne de leur côté,
  - type: text
    content: Il avale l’eau abondamment,
  '11':
  - type: text
    content: 'Et il dit: Comment Dieu saurait-il,'
  - type: text
    content: Comment le Très-Haut connaîtrait-il?
  '12':
  - type: text
    content: 'Ainsi sont les méchants:'
  - type: text
    content: Toujours heureux, ils accroissent leurs richesses.
  '13':
  - type: text
    content: C’est donc en vain que j’ai purifié mon cœur,
  - type: text
    content: 'Et que j’ai lavé mes mains dans l’innocence:'
  '14':
  - type: text
    content: Chaque jour je suis frappé,
  - type: text
    content: Tous les matins mon châtiment est là.
  '15':
  - type: text
    content: 'Si je disais: Je veux parler comme eux,'
  - type: text
    content: Voici, je trahirais la race de tes enfants.
  '16':
  - type: text
    content: Quand j’ai réfléchi là-dessus pour m’éclairer,
  - type: text
    content: La difficulté fut grande à mes yeux,
  '17':
  - type: text
    content: Jusqu’à ce que j’eusse pénétré dans les sanctuaires de Dieu,
  - type: text
    content: Et que j’eusse pris garde au sort final des méchants.
  '18':
  - type: text
    content: Oui, tu les places sur des voies glissantes,
  - type: text
    content: Tu les fais tomber et les mets en ruines.
  '19':
  - type: text
    content: Eh quoi! En un instant les voilà détruits!
  - type: text
    content: Ils sont enlevés, anéantis par une fin soudaine!
  '2':
  - type: text
    content: Toutefois, mon pied allait fléchir,
  - type: text
    content: Mes pas étaient sur le point de glisser;
  '20':
  - type: text
    content: Comme un songe au réveil,
  - type: text
    content: Seigneur, à ton réveil, tu repousses leur image.
  '21':
  - type: text
    content: Lorsque mon cœur s’aigrissait,
  - type: text
    content: Et que je me sentais percé dans les entrailles,
  '22':
  - type: text
    content: J’étais stupide et sans intelligence,
  - type: text
    content: J’étais à ton égard comme les bêtes.
  '23':
  - type: text
    content: Cependant je suis toujours avec toi,
  - type: text
    content: Tu m’as saisi la main droite;
  '24':
  - type: text
    content: Tu me conduiras par ton conseil,
  - type: text
    content: Puis tu me recevras dans la gloire.
  '25':
  - type: text
    content: Quel autre ai-je au ciel que toi!
  - type: text
    content: Et sur la terre je ne prends plaisir qu’en toi.
  '26':
  - type: text
    content: 'Ma chair et mon cœur peuvent se consumer:'
  - type: text
    content: Dieu sera toujours le rocher de mon cœur et mon partage.
  '27':
  - type: text
    content: Car voici, ceux qui s’éloignent de toi périssent;
  - type: text
    content: Tu anéantis tous ceux qui te sont infidèles.
  '28':
  - type: text
    content: 'Pour moi, m’approcher de Dieu, c’est mon bien:'
  - type: text
    content: Je place mon refuge dans le Seigneur, l’Éternel,
  - type: text
    content: Afin de raconter toutes tes œuvres.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Job 21:7, etc. Ps 37:1. Jé 12:1, 2.
  - type: text
    content: Car je portais envie aux insensés,
  - type: text
    content: En voyant le bonheur des méchants.
  '4':
  - type: text
    content: Rien ne les tourmente jusqu’à leur mort,
  - type: text
    content: Et leur corps est chargé d’embonpoint;
  '5':
  - type: text
    content: Ils n’ont aucune part aux souffrances humaines,
  - type: text
    content: Ils ne sont point frappés comme le reste des hommes.
  '6':
  - type: text
    content: Aussi l’orgueil leur sert de collier,
  - type: text
    content: La violence est le vêtement qui les enveloppe;
  '7':
  - type: text
    content: L’iniquité sort de leurs entrailles,
  - type: text
    content: Les pensées de leur cœur se font jour.
  '8':
  - type: text
    content: Ils raillent, et parlent méchamment d’opprimer;
  - type: text
    content: Ils profèrent des discours hautains,
  '9':
  - type: text
    content: Ils élèvent leur bouche jusqu’aux cieux,
  - type: text
    content: Et leur langue se promène sur la terre.
