document_id: JER.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La mesure du péché d’Israël et de Juda est comble
  - type: heading
    content: 'V. 1-9: cf. Os 4:1-7. So 3:1-8.'
  - type: text
    content: Parcourez les rues de Jérusalem,
  - type: text
    content: Regardez, informez-vous, cherchez dans les places,
  - type: text
    content: S’il s’y trouve un homme, s’il y en a un
  - type: text
    content: Qui pratique la justice, qui s’attache à la vérité,
  - type: text
    content: Et je pardonne à Jérusalem.
  '10':
  - type: text
    content: Montez sur ses murailles, et abattez,
  - type: text
    content: 'Mais ne détruisez pas '
  - type: note
    content: Jé 4:27.
  - type: text
    content: entièrement!
  - type: text
    content: Enlevez ses ceps
  - type: text
    content: Qui n’appartiennent point à l’Éternel!
  '11':
  - type: text
    content: 'Car la maison d’Israël et la maison de Juda m’ont été '
  - type: note
    content: Jé 3:20.
  - type: text
    content: infidèles,
  - type: text
    content: Dit l’Éternel.
  '12':
  - type: text
    content: 'Ils renient l’Éternel, ils disent: Il n’existe pas!'
  - type: note
    content: És 28:15.
  - type: text
    content: Et le malheur ne viendra pas sur nous,
  - type: text
    content: Nous ne verrons ni l’épée ni la famine.
  '13':
  - type: text
    content: Les prophètes ne sont que du vent,
  - type: text
    content: Et personne ne parle en eux.
  - type: text
    content: Qu’il leur soit fait ainsi!
  '14':
  - type: text
    content: 'C’est pourquoi ainsi parle l’Éternel, le Dieu des armées:'
  - type: text
    content: Parce que vous avez dit cela,
  - type: text
    content: 'Voici, '
  - type: note
    content: Jé 1:9.
  - type: text
    content: je veux que ma parole dans ta bouche soit du feu,
  - type: text
    content: Et ce peuple du bois, et que ce feu les consume.
  '15':
  - type: text
    content: 'Voici, je fais venir '
  - type: note
    content: De 28:49. Jé 1:15; 6:22.
  - type: text
    content: de loin une nation contre vous, maison d’Israël,
  - type: text
    content: Dit l’Éternel;
  - type: text
    content: C’est une nation forte, c’est une nation ancienne,
  - type: text
    content: Une nation dont tu ne connais pas la langue,
  - type: text
    content: Et dont tu ne comprendras point les paroles.
  '16':
  - type: text
    content: Son carquois est comme un sépulcre ouvert;
  - type: text
    content: Ils sont tous des héros.
  '17':
  - type: text
    content: 'Elle dévorera '
  - type: note
    content: Lé 26:16. De 28:31, 33.
  - type: text
    content: ta moisson et ton pain,
  - type: text
    content: Elle dévorera tes fils et tes filles,
  - type: text
    content: Elle dévorera tes brebis et tes bœufs,
  - type: text
    content: Elle dévorera ta vigne et ton figuier;
  - type: text
    content: Elle détruira par l’épée tes villes fortes dans lesquelles tu te confies.
  '18':
  - type: text
    content: Mais en ces jours, dit l’Éternel,
  - type: text
    content: 'Je ne vous détruirai pas '
  - type: note
    content: Jé 4:27.
  - type: text
    content: entièrement.
  '19':
  - type: text
    content: 'Si vous dites alors:'
  - type: note
    content: Jé 16:10.
  - type: text
    content: Pourquoi l’Éternel, notre Dieu, nous fait-il tout cela?
  - type: text
    content: 'Tu leur répondras: Comme vous m’avez abandonné,'
  - type: text
    content: Et que vous avez servi des dieux étrangers dans votre pays,
  - type: text
    content: Ainsi vous servirez des étrangers dans un pays qui n’est pas le vôtre.
  - type: heading
    content: 'V. 20-31: cf. (Job 37:23, 24; 38:8-11. Pr 1:7, 29-32.) (Mi 6:9-12. So 3:1-4.)'
  '2':
  - type: text
    content: 'Même quand ils disent: L’Éternel est vivant!'
  - type: text
    content: C’est faussement qu’ils jurent.
  '20':
  - type: text
    content: Annoncez ceci à la maison de Jacob,
  - type: text
    content: 'Publiez-le en Juda, et dites:'
  '21':
  - type: text
    content: ' '
  - type: note
    content: És 6:9.
  - type: text
    content: Écoutez ceci, peuple insensé, et qui n’as point de cœur!
  - type: text
    content: Ils ont des yeux et ne voient point,
  - type: text
    content: Ils ont des oreilles et n’entendent point.
  '22':
  - type: text
    content: Ne me craindrez-vous pas, dit l’Éternel,
  - type: text
    content: Ne tremblerez-vous pas devant moi?
  - type: text
    content: 'C’est moi qui ai donné à la mer le sable '
  - type: note
    content: Job 38:10, 11. Ps 33:7; 104:9.
  - type: text
    content: pour limite,
  - type: text
    content: Limite éternelle qu’elle ne doit pas franchir;
  - type: text
    content: Ses flots s’agitent, mais ils sont impuissants;
  - type: text
    content: Ils mugissent, mais ils ne la franchissent pas.
  '23':
  - type: text
    content: Ce peuple a un cœur indocile et rebelle;
  - type: text
    content: Ils se révoltent, et s’en vont.
  '24':
  - type: text
    content: 'Ils ne disent pas dans leur cœur:'
  - type: text
    content: Craignons l’Éternel, notre Dieu,
  - type: text
    content: Qui donne la pluie en son temps,
  - type: note
    content: De 11:14.
  - type: text
    content: La pluie de la première et de l’arrière saison,
  - type: text
    content: Et qui nous réserve les semaines destinées à la moisson.
  '25':
  - type: text
    content: C’est à cause de vos iniquités que ces dispensations n’ont pas lieu,
  - type: text
    content: Ce sont vos péchés qui vous privent de ces biens.
  '26':
  - type: text
    content: Car il se trouve parmi mon peuple des méchants;
  - type: text
    content: Ils épient comme l’oiseleur qui dresse des pièges,
  - type: text
    content: Ils tendent des filets, et prennent des hommes.
  '27':
  - type: text
    content: Comme une cage est remplie d’oiseaux,
  - type: text
    content: Leurs maisons sont remplies de fraude;
  - type: text
    content: C’est ainsi qu’ils deviennent puissants et riches.
  '28':
  - type: text
    content: ' '
  - type: note
    content: De 32:15.
  - type: text
    content: Ils s’engraissent, ils sont brillants d’embonpoint;
  - type: text
    content: Ils dépassent toute mesure dans le mal,
  - type: note
    content: És 1:23. Za 7:10.
  - type: text
    content: Ils ne défendent pas la cause, la cause de l’orphelin, et ils prospèrent;
  - type: text
    content: Ils ne font pas droit aux indigents.
  '29':
  - type: text
    content: ' '
  - type: note
    content: v. 9. Jé 9:9.
  - type: text
    content: Ne châtierais-je pas ces choses-là, dit l’Éternel,
  - type: text
    content: Ne me vengerais-je pas d’une pareille nation?
  '3':
  - type: text
    content: Éternel, tes yeux n’aperçoivent-ils pas la vérité?
  - type: text
    content: 'Tu les '
  - type: note
    content: És 1:5; 9:12. Jé 2:30.
  - type: text
    content: frappes, et ils ne sentent rien;
  - type: text
    content: 'Tu les consumes, et ils ne veulent pas recevoir '
  - type: note
    content: Jé 2:30.
  - type: text
    content: instruction;
  - type: text
    content: Ils prennent un visage plus dur que le roc,
  - type: text
    content: Ils refusent de se convertir.
  '30':
  - type: text
    content: Des choses horribles, abominables,
  - type: text
    content: Se font dans le pays.
  '31':
  - type: text
    content: 'Les prophètes prophétisent avec '
  - type: note
    content: Jé 14:18; 23:25, 26. Éz 13:6.
  - type: text
    content: fausseté,
  - type: text
    content: Les sacrificateurs dominent sous leur conduite,
  - type: text
    content: Et mon peuple prend plaisir à cela.
  - type: text
    content: Que ferez-vous à la fin?
  '4':
  - type: text
    content: 'Je disais: Ce ne sont que les petits;'
  - type: text
    content: Ils agissent en insensés, parce qu’ils ne connaissent pas la voie de l’Éternel,
  - type: text
    content: La loi de leur Dieu.
  '5':
  - type: text
    content: J’irai vers les grands, et je leur parlerai;
  - type: text
    content: Car eux, ils connaissent la voie de l’Éternel,
  - type: text
    content: La loi de leur Dieu;
  - type: text
    content: Mais ils ont tous aussi brisé le joug,
  - type: text
    content: Rompu les liens.
  '6':
  - type: text
    content: 'C’est pourquoi '
  - type: note
    content: Jé 4:7.
  - type: text
    content: le lion de la forêt les tue,
  - type: text
    content: Le loup du désert les détruit,
  - type: text
    content: La panthère est aux aguets devant leurs villes;
  - type: text
    content: Tous ceux qui en sortiront seront déchirés;
  - type: text
    content: Car leurs transgressions sont nombreuses,
  - type: text
    content: Leurs infidélités se sont multipliées.
  '7':
  - type: text
    content: Pourquoi te pardonnerais-je?
  - type: text
    content: Tes enfants m’ont abandonné,
  - type: text
    content: Et ils jurent par des dieux qui n’existent pas.
  - type: text
    content: J’ai reçu leurs serments, et ils se livrent à l’adultère,
  - type: text
    content: Ils sont en foule dans la maison de la prostituée.
  '8':
  - type: text
    content: Semblables à des chevaux bien nourris, qui courent çà et là,
  - type: note
    content: Éz 22:11.
  - type: text
    content: Ils hennissent chacun après la femme de son prochain.
  '9':
  - type: text
    content: ' '
  - type: note
    content: v. 29. Jé 9:9.
  - type: text
    content: Ne châtierais-je pas ces choses-là, dit l’Éternel,
  - type: text
    content: Ne me vengerais-je pas d’une pareille nation?
  - type: heading
    content: 'V. 10-19: cf. Jé 6:1-15. De 28:30-33.'
