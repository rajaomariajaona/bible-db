document_id: JER.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mesure du péché d’Israël et de Juda est comble
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. Os 4:1-7. So 3:1-8.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Parcourez les rues de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Regardez, informez-vous, cherchez dans les places,
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’il s’y trouve un homme, s’il y en a un
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui pratique la justice, qui s’attache à la vérité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je pardonne à Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Même quand ils disent: L’Éternel est vivant!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est faussement qu’ils jurent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Éternel, tes yeux n’aperçoivent-ils pas la vérité?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:5
      metadata:
        usfm: ISA.1.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:12
      metadata:
        usfm: ISA.9.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:30
      metadata:
        usfm: JER.2.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: frappes, et ils ne sentent rien;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu les consumes, et ils ne veulent pas recevoir '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:30
      metadata:
        usfm: JER.2.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: instruction;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils prennent un visage plus dur que le roc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils refusent de se convertir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je disais: Ce ne sont que les petits;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils agissent en insensés, parce qu’ils ne connaissent pas la voie de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La loi de leur Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: J’irai vers les grands, et je leur parlerai;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car eux, ils connaissent la voie de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La loi de leur Dieu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ils ont tous aussi brisé le joug,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rompu les liens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C’est pourquoi '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 4:7
      metadata:
        usfm: JER.4.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: le lion de la forêt les tue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le loup du désert les détruit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La panthère est aux aguets devant leurs villes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui en sortiront seront déchirés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car leurs transgressions sont nombreuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs infidélités se sont multipliées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Pourquoi te pardonnerais-je?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes enfants m’ont abandonné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils jurent par des dieux qui n’existent pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai reçu leurs serments, et ils se livrent à l’adultère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont en foule dans la maison de la prostituée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Semblables à des chevaux bien nourris, qui courent çà et là,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 22:11
      metadata:
        usfm: EZK.22.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils hennissent chacun après la femme de son prochain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'v. 29. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 9:9
      metadata:
        usfm: JER.9.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ne châtierais-je pas ces choses-là, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne me vengerais-je pas d’une pareille nation?
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-19: cf. Jé 6:1-15. De 28:30-33.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Montez sur ses murailles, et abattez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mais ne détruisez pas '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 4:27
      metadata:
        usfm: JER.4.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: entièrement!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enlevez ses ceps
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui n’appartiennent point à l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Car la maison d’Israël et la maison de Juda m’ont été '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 3:20
      metadata:
        usfm: JER.3.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: infidèles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils renient l’Éternel, ils disent: Il n’existe pas!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 28:15
      metadata:
        usfm: ISA.28.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et le malheur ne viendra pas sur nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous ne verrons ni l’épée ni la famine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les prophètes ne sont que du vent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et personne ne parle en eux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il leur soit fait ainsi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'C’est pourquoi ainsi parle l’Éternel, le Dieu des armées:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que vous avez dit cela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 1:9
      metadata:
        usfm: JER.1.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: je veux que ma parole dans ta bouche soit du feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ce peuple du bois, et que ce feu les consume.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici, je fais venir '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:49
      metadata:
        usfm: DEU.28.49
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 1:15
      metadata:
        usfm: JER.1.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:22
      metadata:
        usfm: JER.6.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: de loin une nation contre vous, maison d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est une nation forte, c’est une nation ancienne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une nation dont tu ne connais pas la langue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et dont tu ne comprendras point les paroles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Son carquois est comme un sépulcre ouvert;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont tous des héros.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Elle dévorera '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 26:16
      metadata:
        usfm: LEV.26.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:31
      metadata:
        usfm: DEU.28.31
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '33'
      metadata:
        usfm: DEU.28.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: ta moisson et ton pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle dévorera tes fils et tes filles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle dévorera tes brebis et tes bœufs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle dévorera ta vigne et ton figuier;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle détruira par l’épée tes villes fortes dans lesquelles tu te confies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mais en ces jours, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je ne vous détruirai pas '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 4:27
      metadata:
        usfm: JER.4.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: entièrement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Si vous dites alors:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 16:10
      metadata:
        usfm: JER.16.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pourquoi l’Éternel, notre Dieu, nous fait-il tout cela?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu leur répondras: Comme vous m’avez abandonné,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que vous avez servi des dieux étrangers dans votre pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi vous servirez des étrangers dans un pays qui n’est pas le vôtre.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-31: cf. (Job 37:23, 24; 38:8-11. Pr 1:7, 29-32.) (Mi 6:9-12. So 3:1-4.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Annoncez ceci à la maison de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Publiez-le en Juda, et dites:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 6:9
      metadata:
        usfm: ISA.6.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Écoutez ceci, peuple insensé, et qui n’as point de cœur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont des yeux et ne voient point,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont des oreilles et n’entendent point.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ne me craindrez-vous pas, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne tremblerez-vous pas devant moi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C’est moi qui ai donné à la mer le sable '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 38:10
      metadata:
        usfm: JOB.38.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: JOB.38.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 33:7
      metadata:
        usfm: PSA.33.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 104:9
      metadata:
        usfm: PSA.104.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: pour limite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Limite éternelle qu’elle ne doit pas franchir;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses flots s’agitent, mais ils sont impuissants;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils mugissent, mais ils ne la franchissent pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ce peuple a un cœur indocile et rebelle;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se révoltent, et s’en vont.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ils ne disent pas dans leur cœur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Craignons l’Éternel, notre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui donne la pluie en son temps,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 11:14
      metadata:
        usfm: DEU.11.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La pluie de la première et de l’arrière saison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui nous réserve les semaines destinées à la moisson.
- type: usfm
  marker: q1
  children:
