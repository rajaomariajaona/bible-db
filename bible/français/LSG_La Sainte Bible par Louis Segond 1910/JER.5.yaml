    text: Comme une cage est remplie d’oiseaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs maisons sont remplies de fraude;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est ainsi qu’ils deviennent puissants et riches.
- type: usfm
  marker: q1
