- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils épient comme l’oiseleur qui dresse des pièges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils tendent des filets, et prennent des hommes.
- type: usfm
  marker: q1
