document_id: EZK.30,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-19: cf. Éz 29.'
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Je ferai disparaître la multitude de l’Égypte,
  - type: text
    content: Par la main de Nebucadnetsar, roi de Babylone.
  '11':
  - type: text
    content: Lui et son peuple avec lui,
  - type: text
    content: 'Le '
  - type: note
    content: Éz 28:7.
  - type: text
    content: plus violent d’entre les peuples,
  - type: text
    content: Seront envoyés pour détruire le pays;
  - type: text
    content: Ils tireront l’épée contre l’Égypte,
  - type: text
    content: Et rempliront le pays de morts.
  '12':
  - type: text
    content: Je mettrai les canaux à sec,
  - type: text
    content: Je livrerai le pays entre les mains des méchants;
  - type: text
    content: Je ravagerai le pays et ce qu’il renferme, par la main des étrangers.
  - type: text
    content: Moi, l’Éternel, j’ai parlé.
  '13':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: J’anéantirai les idoles,
  - type: text
    content: Et j’ôterai de Noph les vains simulacres;
  - type: text
    content: Il n’y aura plus de prince du pays d’Égypte,
  - type: text
    content: Et je répandrai la terreur dans le pays d’Égypte.
  '14':
  - type: text
    content: Je dévasterai Pathros,
  - type: text
    content: Je mettrai le feu à Tsoan,
  - type: text
    content: Et j’exercerai mes jugements sur No.
  '15':
  - type: text
    content: Je répandrai ma fureur sur Sin, la forteresse de l’Égypte,
  - type: text
    content: Et j’exterminerai la multitude de No.
  '16':
  - type: text
    content: Je mettrai le feu dans l’Égypte;
  - type: text
    content: Sin sera saisie d’angoisse,
  - type: text
    content: No sera ouverte par la brèche,
  - type: text
    content: Et Noph conquise en plein jour par les ennemis.
  '17':
  - type: text
    content: Les jeunes hommes d’On et de Pi-Béseth tomberont par l’épée,
  - type: text
    content: Et ces villes iront en captivité.
  '18':
  - type: text
    content: A Tachpanès le jour s’obscurcira,
  - type: text
    content: Quand j’y briserai le joug de l’Égypte,
  - type: text
    content: Et que l’orgueil de sa force y prendra fin;
  - type: text
    content: Un nuage couvrira Tachpanès,
  - type: text
    content: Et ses filles iront en captivité.
  '19':
  - type: text
    content: J’exercerai mes jugements sur l’Égypte,
  - type: text
    content: Et ils sauront que je suis l’Éternel.
  - type: heading
    content: 'V. 20-26: cf. Jé 46; 43:8-13. Pr 21:30. Ps 75.'
  '2':
  - type: text
    content: 'Fils de l’homme, prophétise, et dis:'
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Gémissez!… Malheureux jour!
  '20':
  - type: text
    content: 'La onzième année, le septième jour du premier mois, la parole de l’Éternel me fut adressée, en ces mots:'
  '21':
  - type: text
    content: Fils de l’homme, j’ai rompu le bras de Pharaon, roi d’Égypte;
  - type: text
    content: Et voici, on ne l’a point pansé pour le guérir,
  - type: text
    content: On ne l’a point enveloppé d’un bandage
  - type: text
    content: Pour le lier et le raffermir,
  - type: text
    content: Afin qu’il puisse manier l’épée.
  '22':
  - type: text
    content: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Voici, j’en veux à Pharaon, roi d’Égypte,
  - type: text
    content: Et je lui romprai les bras,
  - type: text
    content: Celui qui est en bon état et celui qui est cassé.
  - type: text
    content: Et je ferai tomber l’épée de sa main.
  '23':
  - type: text
    content: Je répandrai les Égyptiens parmi les nations,
  - type: text
    content: Je les disperserai en divers pays.
  '24':
  - type: text
    content: Je fortifierai les bras du roi de Babylone,
  - type: text
    content: Et je mettrai mon épée dans sa main;
  - type: text
    content: Je romprai les bras de Pharaon,
  - type: text
    content: Et il gémira devant lui comme gémissent les mourants.
  '25':
  - type: text
    content: Je fortifierai les bras du roi de Babylone,
  - type: text
    content: Et les bras de Pharaon tomberont.
  - type: text
    content: Et ils sauront que je suis l’Éternel,
  - type: text
    content: Quand je mettrai mon épée dans la main du roi de Babylone,
  - type: text
    content: Et qu’il la tournera contre le pays d’Égypte.
  '26':
  - type: text
    content: Je répandrai les Égyptiens parmi les nations,
  - type: text
    content: Je les disperserai en divers pays,
  - type: text
    content: Et ils sauront que je suis l’Éternel.
  '3':
  - type: text
    content: Car le jour approche, le jour de l’Éternel approche,
  - type: text
    content: 'Jour ténébreux: ce sera le temps des nations.'
  '4':
  - type: text
    content: L’épée fondra sur l’Égypte,
  - type: text
    content: Et l’épouvante sera dans l’Éthiopie,
  - type: text
    content: Quand les morts tomberont en Égypte,
  - type: text
    content: Quand on enlèvera ses richesses,
  - type: text
    content: Et que ses fondements seront renversés.
  '5':
  - type: text
    content: L’Éthiopie, Puth, Lud, toute l’Arabie, Cub,
  - type: text
    content: Et les fils du pays allié,
  - type: text
    content: Tomberont avec eux par l’épée.
  '6':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Ils tomberont, les soutiens de l’Égypte,
  - type: text
    content: Et l’orgueil de sa force périra;
  - type: text
    content: De Migdol à Syène ils tomberont par l’épée,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  '7':
  - type: text
    content: Ils seront dévastés entre les pays dévastés,
  - type: text
    content: Et ses villes seront entre les villes désertes.
  '8':
  - type: text
    content: Et ils sauront que je suis l’Éternel,
  - type: text
    content: Quand je mettrai le feu dans l’Égypte,
  - type: text
    content: Et que tous ses soutiens seront brisés.
  '9':
  - type: text
    content: En ce jour-là, des messagers iront de ma part sur des navires
  - type: text
    content: Troubler l’Éthiopie dans sa sécurité;
  - type: text
    content: Et l’épouvante sera parmi eux au jour de l’Égypte,
  - type: text
    content: Car voici, ces choses arrivent!
