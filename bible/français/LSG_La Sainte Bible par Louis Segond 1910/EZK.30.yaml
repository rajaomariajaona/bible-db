document_id: EZK.30,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-19: cf. Éz 29.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai disparaître la multitude de l’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par la main de Nebucadnetsar, roi de Babylone.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Lui et son peuple avec lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 28:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: plus violent d’entre les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seront envoyés pour détruire le pays;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils tireront l’épée contre l’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et rempliront le pays de morts.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je mettrai les canaux à sec,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je livrerai le pays entre les mains des méchants;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ravagerai le pays et ce qu’il renferme, par la main des étrangers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, l’Éternel, j’ai parlé.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’anéantirai les idoles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’ôterai de Noph les vains simulacres;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y aura plus de prince du pays d’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je répandrai la terreur dans le pays d’Égypte.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Je dévasterai Pathros,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je mettrai le feu à Tsoan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’exercerai mes jugements sur No.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Je répandrai ma fureur sur Sin, la forteresse de l’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’exterminerai la multitude de No.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Je mettrai le feu dans l’Égypte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sin sera saisie d’angoisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No sera ouverte par la brèche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Noph conquise en plein jour par les ennemis.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Les jeunes hommes d’On et de Pi-Béseth tomberont par l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ces villes iront en captivité.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: A Tachpanès le jour s’obscurcira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand j’y briserai le joug de l’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que l’orgueil de sa force y prendra fin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un nuage couvrira Tachpanès,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses filles iront en captivité.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: J’exercerai mes jugements sur l’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils sauront que je suis l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 20-26: cf. Jé 46; 43:8-13. Pr 21:30. Ps 75.'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fils de l’homme, prophétise, et dis:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gémissez!… Malheureux jour!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'La onzième année, le septième jour du premier mois, la parole de l’Éternel me fut adressée, en ces mots:'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fils de l’homme, j’ai rompu le bras de Pharaon, roi d’Égypte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et voici, on ne l’a point pansé pour le guérir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne l’a point enveloppé d’un bandage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour le lier et le raffermir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin qu’il puisse manier l’épée.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, j’en veux à Pharaon, roi d’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je lui romprai les bras,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui est en bon état et celui qui est cassé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ferai tomber l’épée de sa main.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Je répandrai les Égyptiens parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les disperserai en divers pays.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Je fortifierai les bras du roi de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je mettrai mon épée dans sa main;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je romprai les bras de Pharaon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il gémira devant lui comme gémissent les mourants.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Je fortifierai les bras du roi de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les bras de Pharaon tomberont.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils sauront que je suis l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je mettrai mon épée dans la main du roi de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il la tournera contre le pays d’Égypte.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Je répandrai les Égyptiens parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les disperserai en divers pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils sauront que je suis l’Éternel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Car le jour approche, le jour de l’Éternel approche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Jour ténébreux: ce sera le temps des nations.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: L’épée fondra sur l’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’épouvante sera dans l’Éthiopie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand les morts tomberont en Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand on enlèvera ses richesses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que ses fondements seront renversés.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: L’Éthiopie, Puth, Lud, toute l’Arabie, Cub,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les fils du pays allié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tomberont avec eux par l’épée.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils tomberont, les soutiens de l’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’orgueil de sa force périra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De Migdol à Syène ils tomberont par l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le Seigneur, l’Éternel.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ils seront dévastés entre les pays dévastés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses villes seront entre les villes désertes.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Et ils sauront que je suis l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je mettrai le feu dans l’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que tous ses soutiens seront brisés.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: En ce jour-là, des messagers iront de ma part sur des navires
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Troubler l’Éthiopie dans sa sécurité;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’épouvante sera parmi eux au jour de l’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car voici, ces choses arrivent!
