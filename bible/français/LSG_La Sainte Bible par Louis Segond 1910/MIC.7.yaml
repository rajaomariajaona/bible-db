document_id: MIC.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-6: cf. (Ps 12:2-6. Jé 5:1, 25-31; 9:2-11.) Mt 10:21, 35, 36.'
  - type: text
    content: Malheur à moi! Car je suis comme à la récolte des fruits,
  - type: text
    content: 'Comme au grappillage après la vendange:'
  - type: text
    content: Il n’y a point de grappes à manger,
  - type: text
    content: Point de ces primeurs que mon âme désire.
  '10':
  - type: text
    content: Mon ennemie le verra et sera couverte de honte,
  - type: text
    content: 'Elle qui me '
  - type: note
    content: Ps 79:10; 115:2. Joë 2:7.
  - type: text
    content: 'disait: Où est l’Éternel, ton Dieu?'
  - type: text
    content: Mes yeux se réjouiront à sa vue;
  - type: text
    content: Alors elle sera foulée aux pieds comme la boue des rues.
  - type: heading
    content: 'V. 11-17: cf. És 19:18-25. (Jé 50:19. Éz 34:11-15.)'
  '11':
  - type: text
    content: 'Le jour où l’on '
  - type: note
    content: Am 9:11, etc.
  - type: text
    content: rebâtira tes murs,
  - type: text
    content: Ce jour-là tes limites seront reculées.
  '12':
  - type: text
    content: En ce jour, on viendra vers toi
  - type: text
    content: De l’Assyrie et des villes d’Égypte,
  - type: text
    content: De l’Égypte jusqu’au fleuve,
  - type: text
    content: D’une mer à l’autre, et d’une montagne à l’autre.
  '13':
  - type: text
    content: Le pays sera dévasté à cause de ses habitants,
  - type: text
    content: 'A cause du '
  - type: note
    content: Jé 21:14.
  - type: text
    content: fruit de leurs œuvres.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Mi 5:3.
  - type: text
    content: Pais ton peuple avec ta houlette, le troupeau de ton héritage,
  - type: text
    content: Qui habite solitaire dans la forêt au milieu du Carmel!
  - type: text
    content: Qu’ils paissent sur le Basan et en Galaad,
  - type: text
    content: Comme au jour d’autrefois.
  '15':
  - type: text
    content: Comme au jour où tu sortis du pays d’Égypte,
  - type: text
    content: 'Je te ferai voir des '
  - type: note
    content: Joë 2:26, 30.
  - type: text
    content: prodiges.
  '16':
  - type: text
    content: Les nations le verront, et seront confuses,
  - type: text
    content: Avec toute leur puissance;
  - type: text
    content: Elles mettront la main sur la bouche,
  - type: text
    content: Leurs oreilles seront assourdies.
  '17':
  - type: text
    content: 'Elles lécheront la '
  - type: note
    content: Ps 72:9. És 49:23.
  - type: text
    content: poussière, comme le serpent,
  - type: text
    content: Comme les reptiles de la terre;
  - type: text
    content: Elles seront saisies de frayeur hors de leurs forteresses;
  - type: text
    content: Elles trembleront devant l’Éternel, notre Dieu,
  - type: text
    content: Elles te craindront.
  - type: heading
    content: 'V. 18-20: cf. Ps 85. Lu 1:68-75.'
  '18':
  - type: text
    content: Quel Dieu est semblable à toi,
  - type: text
    content: 'Qui '
  - type: note
    content: Ex 34:6, 7.
  - type: text
    content: pardonnes l’iniquité, qui oublies les péchés
  - type: text
    content: Du reste de ton héritage?
  - type: text
    content: Il ne garde pas sa colère à toujours,
  - type: text
    content: Car il prend plaisir à la miséricorde.
  '19':
  - type: text
    content: Il aura encore compassion de nous,
  - type: text
    content: Il mettra sous ses pieds nos iniquités;
  - type: text
    content: Tu jetteras au fond de la mer tous leurs péchés.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ps 12:2. Os 4:5.
  - type: text
    content: L’homme de bien a disparu du pays,
  - type: text
    content: Et il n’y a plus de juste parmi les hommes;
  - type: text
    content: Ils sont tous en embuscade pour verser le sang,
  - type: text
    content: Chacun tend un piège à son frère.
  '20':
  - type: text
    content: Tu témoigneras de la fidélité à Jacob,
  - type: text
    content: De la bonté à Abraham,
  - type: text
    content: Comme tu l’as juré à nos pères aux jours d’autrefois.
  '3':
  - type: text
    content: 'Leurs mains sont habiles à faire le mal:'
  - type: text
    content: Le prince a des exigences,
  - type: text
    content: 'Le juge réclame '
  - type: note
    content: Mi 3:11.
  - type: text
    content: un salaire,
  - type: text
    content: 'Le grand manifeste son '
  - type: note
    content: Mi 2:1.
  - type: text
    content: avidité,
  - type: text
    content: Et ils font ainsi cause commune.
  '4':
  - type: text
    content: Le meilleur d’entre eux est comme une ronce,
  - type: text
    content: Le plus droit pire qu’un buisson d’épines.
  - type: text
    content: Le jour annoncé par tes prophètes, ton châtiment approche.
  - type: text
    content: C’est alors qu’ils seront dans la confusion.
  '5':
  - type: text
    content: Ne crois pas à un ami,
  - type: text
    content: Ne te fie pas à un intime;
  - type: text
    content: Devant celle qui repose sur ton sein
  - type: text
    content: Garde les portes de ta bouche.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Éz 22:7. Mt 10:21, 35, 36. Lu 12:53.
  - type: text
    content: Car le fils outrage le père,
  - type: text
    content: La fille se soulève contre sa mère,
  - type: text
    content: La belle-fille contre sa belle-mère;
  - type: text
    content: Chacun a pour ennemis les gens de sa maison.
  - type: heading
    content: 'V. 7-10: cf. La 3:21, etc.'
  '7':
  - type: text
    content: Pour moi, je regarderai vers l’Éternel,
  - type: text
    content: Je mettrai mon espérance dans le Dieu de mon salut;
  - type: text
    content: Mon Dieu m’exaucera.
  '8':
  - type: text
    content: Ne te réjouis pas à mon sujet, mon ennemie!
  - type: text
    content: Car si je suis tombée, je me relèverai;
  - type: text
    content: Si je suis assise dans les ténèbres,
  - type: text
    content: L’Éternel sera ma lumière.
  '9':
  - type: text
    content: Je supporterai la colère de l’Éternel,
  - type: text
    content: Puisque j’ai péché contre lui,
  - type: text
    content: 'Jusqu’à ce qu’il '
  - type: note
    content: Jé 50:34.
  - type: text
    content: défende ma cause et me fasse droit;
  - type: text
    content: Il me conduira à la lumière,
  - type: text
    content: Et je contemplerai sa justice.
