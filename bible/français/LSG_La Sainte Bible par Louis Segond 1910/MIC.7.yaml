document_id: MIC.7
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. (Ps 12:2-6. Jé 5:1, 25-31; 9:2-11.) Mt 10:21, 35, 36.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Malheur à moi! Car je suis comme à la récolte des fruits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Comme au grappillage après la vendange:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y a point de grappes à manger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Point de ces primeurs que mon âme désire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 12:2
      metadata:
        usfm: PSA.12.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 4:5
      metadata:
        usfm: HOS.4.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’homme de bien a disparu du pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il n’y a plus de juste parmi les hommes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont tous en embuscade pour verser le sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacun tend un piège à son frère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Leurs mains sont habiles à faire le mal:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le prince a des exigences,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Le juge réclame '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 3:11
      metadata:
        usfm: MIC.3.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: un salaire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Le grand manifeste son '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 2:1
      metadata:
        usfm: MIC.2.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: avidité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils font ainsi cause commune.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Le meilleur d’entre eux est comme une ronce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le plus droit pire qu’un buisson d’épines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le jour annoncé par tes prophètes, ton châtiment approche.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est alors qu’ils seront dans la confusion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ne crois pas à un ami,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne te fie pas à un intime;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Devant celle qui repose sur ton sein
- type: usfm
  marker: q1
  children:
  - type: text
    text: Garde les portes de ta bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 22:7
      metadata:
        usfm: EZK.22.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:21
      metadata:
        usfm: MAT.10.21
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '35'
      metadata:
        usfm: MAT.10.35
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '36'
      metadata:
        usfm: MAT.10.36
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 12:53
      metadata:
        usfm: LUK.12.53
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car le fils outrage le père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La fille se soulève contre sa mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La belle-fille contre sa belle-mère;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacun a pour ennemis les gens de sa maison.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-10: cf. La 3:21, etc.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Pour moi, je regarderai vers l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je mettrai mon espérance dans le Dieu de mon salut;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon Dieu m’exaucera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ne te réjouis pas à mon sujet, mon ennemie!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car si je suis tombée, je me relèverai;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si je suis assise dans les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel sera ma lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je supporterai la colère de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisque j’ai péché contre lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Jusqu’à ce qu’il '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 50:34
      metadata:
        usfm: JER.50.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: défende ma cause et me fasse droit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il me conduira à la lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je contemplerai sa justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mon ennemie le verra et sera couverte de honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Elle qui me '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 79:10
      metadata:
        usfm: PSA.79.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 115:2
      metadata:
        usfm: PSA.115.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 2:7
      metadata:
        usfm: JOL.2.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'disait: Où est l’Éternel, ton Dieu?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes yeux se réjouiront à sa vue;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors elle sera foulée aux pieds comme la boue des rues.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-17: cf. És 19:18-25. (Jé 50:19. Éz 34:11-15.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le jour où l’on '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Am 9:11, etc.
    marker-yv: yv-n
  - type: text
    text: rebâtira tes murs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce jour-là tes limites seront reculées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: En ce jour, on viendra vers toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: De l’Assyrie et des villes d’Égypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De l’Égypte jusqu’au fleuve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: D’une mer à l’autre, et d’une montagne à l’autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Le pays sera dévasté à cause de ses habitants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A cause du '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 21:14
      metadata:
        usfm: JER.21.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: fruit de leurs œuvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 5:3
      metadata:
        usfm: MIC.5.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pais ton peuple avec ta houlette, le troupeau de ton héritage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui habite solitaire dans la forêt au milieu du Carmel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils paissent sur le Basan et en Galaad,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme au jour d’autrefois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Comme au jour où tu sortis du pays d’Égypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je te ferai voir des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 2:26
      metadata:
        usfm: JOL.2.26
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '30'
      metadata:
        usfm: JOL.2.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: prodiges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Les nations le verront, et seront confuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec toute leur puissance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles mettront la main sur la bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs oreilles seront assourdies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Elles lécheront la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 72:9
      metadata:
        usfm: PSA.72.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 49:23
      metadata:
        usfm: ISA.49.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: poussière, comme le serpent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme les reptiles de la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles seront saisies de frayeur hors de leurs forteresses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles trembleront devant l’Éternel, notre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles te craindront.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-20: cf. Ps 85. Lu 1:68-75.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Quel Dieu est semblable à toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Qui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 34:6
      metadata:
        usfm: EXO.34.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: EXO.34.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: pardonnes l’iniquité, qui oublies les péchés
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du reste de ton héritage?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne garde pas sa colère à toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il prend plaisir à la miséricorde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il aura encore compassion de nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il mettra sous ses pieds nos iniquités;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu jetteras au fond de la mer tous leurs péchés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu témoigneras de la fidélité à Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De la bonté à Abraham,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme tu l’as juré à nos pères aux jours d’autrefois.
