document_id: 2KI.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manassé et Amon, rois de Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-18: cf. 2 Ch 33:1-20. Jé 15:4. Ec 9:18; 10:1.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Manassé '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 33:1
      metadata:
        usfm: 2CH.33.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'avait douze ans lorsqu’il devint roi, et il régna cinquante-cinq ans à Jérusalem. Sa mère s’appelait Hephtsiba. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l’Éternel, selon les abominations des nations que l’Éternel avait chassées devant les enfants d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il rebâtit les hauts lieux '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 18:4
      metadata:
        usfm: 2KI.18.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’Ézéchias, son père, avait détruits, il éleva des autels à Baal, il fit une idole d’Astarté, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 16:31
      metadata:
        usfm: 1KI.16.31
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '32'
      metadata:
        usfm: 1KI.16.32
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '33'
      metadata:
        usfm: 1KI.16.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme avait fait Achab, roi d’Israël, et il se prosterna devant toute l’armée des cieux et la servit. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 32:34
      metadata:
        usfm: JER.32.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'bâtit des autels dans la maison de l’Éternel, quoique l’Éternel eût dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 12:5
      metadata:
        usfm: DEU.12.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: DEU.12.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:13
      metadata:
        usfm: 2SA.7.13
    - type: text
      text: '. 1 R 8:29, 9, 3. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 7:12
      metadata:
        usfm: 2CH.7.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 132:13
      metadata:
        usfm: PSA.132.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: PSA.132.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 32:34
      metadata:
        usfm: JER.32.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est dans Jérusalem que je placerai mon nom. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il bâtit des autels à toute l’armée des cieux dans les deux parvis de la maison de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il fit passer son fils par le feu; il observait les nuages et les serpents pour en tirer des pronostics, et il établit des gens qui évoquaient les esprits et qui prédisaient l’avenir. Il fit de plus en plus ce qui est mal aux yeux de l’Éternel, afin de l’irriter. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il mit l’idole d’Astarté, qu’il avait faite, dans la maison de laquelle l’Éternel avait dit à David et à Salomon, son fils: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:10
      metadata:
        usfm: 2SA.7.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 8:16
      metadata:
        usfm: 1KI.8.16
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '29'
      metadata:
        usfm: 1KI.8.29
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:3
      metadata:
        usfm: 1KI.9.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 23:27
      metadata:
        usfm: 2KI.23.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est dans cette maison, et c’est dans Jérusalem, que j’ai choisie parmi toutes les tribus d’Israël, que je veux à toujours placer mon nom. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je ne ferai plus errer le pied d’Israël hors du pays que j’ai donné à ses pères, pourvu seulement qu’ils aient soin de mettre en pratique tout ce que je leur ai commandé et toute la loi que leur a prescrite mon serviteur Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais ils n’obéirent point; et Manassé fut cause qu’ils s’égarèrent et firent le mal plus que les nations que l’Éternel avait détruites devant les enfants d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors l’Éternel parla en ces termes par ses serviteurs les prophètes: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Parce que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 15:4
      metadata:
        usfm: JER.15.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Manassé, roi de Juda, a commis ces abominations, parce qu’il a fait pis que tout ce qu’avaient fait avant lui les Amoréens, et parce qu’il a aussi fait pécher Juda par ses idoles, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'voici ce que dit l’Éternel, le Dieu d’Israël: Je vais faire venir sur Jérusalem et sur Juda des malheurs qui étourdiront les oreilles de quiconque en entendra parler. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'J’étendrai sur Jérusalem le cordeau de Samarie et le niveau de la maison d’Achab; et je nettoierai Jérusalem comme un plat qu’on nettoie, et qu’on renverse sens dessus dessous après l’avoir nettoyé. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'J’abandonnerai le reste de mon héritage, et je les livrerai entre les mains de leurs ennemis; et ils deviendront le butin et la proie de tous leurs ennemis, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'parce qu’ils ont fait ce qui est mal à mes yeux et qu’ils m’ont irrité depuis le jour où leurs pères sont sortis d’Égypte jusqu’à ce jour. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Manassé répandit aussi beaucoup de sang innocent, jusqu’à en remplir Jérusalem d’un bout à l’autre, outre les péchés qu’il commit et qu’il fit commettre à Juda en faisant ce qui est mal aux yeux de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le reste des actions de Manassé, tout ce qu’il a fait, et les péchés auxquels il se livra, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 33:20
      metadata:
        usfm: 2CH.33.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Manassé se coucha avec ses pères, et il fut enterré dans le jardin de sa maison, dans le jardin d’Uzza. Et Amon, son fils, régna à sa place.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 19-26: cf. 2 Ch 33:21-25. Ps 37:10, 13, 20, 35, 36.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Amon avait vingt-deux ans lorsqu’il devint roi, et il régna deux ans à Jérusalem. Sa mère s’appelait Meschullémeth, fille de Haruts, de Jotba. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l’Éternel, comme avait fait Manassé, son père; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'il marcha dans toute la voie où avait marché son père, il servit les idoles qu’avait servies son père, et il se prosterna devant elles; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'il abandonna l’Éternel, le Dieu de ses pères, et il ne marcha point dans la voie de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les serviteurs d’Amon conspirèrent contre lui, et firent mourir le roi dans sa maison. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais le peuple du pays frappa tous ceux qui avaient conspiré contre le roi Amon; et le peuple du pays établit roi Josias, son fils, à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Le reste des actions d’Amon, et ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'On l’enterra dans son sépulcre, dans le jardin d’Uzza. Et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 1:10
      metadata:
        usfm: MAT.1.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Josias, son fils, régna à sa place.
