document_id: 2KI.21,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Manassé et Amon, rois de Juda
  - type: heading
    content: 'V. 1-18: cf. 2 Ch 33:1-20. Jé 15:4. Ec 9:18; 10:1.'
  - type: text
    content: 'Manassé '
  - type: note
    content: 2 Ch 33:1.
  - type: text
    content: 'avait douze ans lorsqu’il devint roi, et il régna cinquante-cinq ans à Jérusalem. Sa mère s’appelait Hephtsiba. '
  '10':
  - type: text
    content: 'Alors l’Éternel parla en ces termes par ses serviteurs les prophètes: '
  '11':
  - type: text
    content: 'Parce que '
  - type: note
    content: Jé 15:4.
  - type: text
    content: 'Manassé, roi de Juda, a commis ces abominations, parce qu’il a fait pis que tout ce qu’avaient fait avant lui les Amoréens, et parce qu’il a aussi fait pécher Juda par ses idoles, '
  '12':
  - type: text
    content: 'voici ce que dit l’Éternel, le Dieu d’Israël: Je vais faire venir sur Jérusalem et sur Juda des malheurs qui étourdiront les oreilles de quiconque en entendra parler. '
  '13':
  - type: text
    content: 'J’étendrai sur Jérusalem le cordeau de Samarie et le niveau de la maison d’Achab; et je nettoierai Jérusalem comme un plat qu’on nettoie, et qu’on renverse sens dessus dessous après l’avoir nettoyé. '
  '14':
  - type: text
    content: 'J’abandonnerai le reste de mon héritage, et je les livrerai entre les mains de leurs ennemis; et ils deviendront le butin et la proie de tous leurs ennemis, '
  '15':
  - type: text
    content: 'parce qu’ils ont fait ce qui est mal à mes yeux et qu’ils m’ont irrité depuis le jour où leurs pères sont sortis d’Égypte jusqu’à ce jour. '
  '16':
  - type: text
    content: 'Manassé répandit aussi beaucoup de sang innocent, jusqu’à en remplir Jérusalem d’un bout à l’autre, outre les péchés qu’il commit et qu’il fit commettre à Juda en faisant ce qui est mal aux yeux de l’Éternel. '
  '17':
  - type: text
    content: 'Le reste des actions de Manassé, tout ce qu’il a fait, et les péchés auxquels il se livra, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  '18':
  - type: note
    content: 2 Ch 33:20.
  - type: text
    content: Manassé se coucha avec ses pères, et il fut enterré dans le jardin de sa maison, dans le jardin d’Uzza. Et Amon, son fils, régna à sa place.
  - type: heading
    content: 'V. 19-26: cf. 2 Ch 33:21-25. Ps 37:10, 13, 20, 35, 36.'
  '19':
  - type: text
    content: 'Amon avait vingt-deux ans lorsqu’il devint roi, et il régna deux ans à Jérusalem. Sa mère s’appelait Meschullémeth, fille de Haruts, de Jotba. '
  '2':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l’Éternel, selon les abominations des nations que l’Éternel avait chassées devant les enfants d’Israël. '
  '20':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l’Éternel, comme avait fait Manassé, son père; '
  '21':
  - type: text
    content: 'il marcha dans toute la voie où avait marché son père, il servit les idoles qu’avait servies son père, et il se prosterna devant elles; '
  '22':
  - type: text
    content: 'il abandonna l’Éternel, le Dieu de ses pères, et il ne marcha point dans la voie de l’Éternel. '
  '23':
  - type: text
    content: 'Les serviteurs d’Amon conspirèrent contre lui, et firent mourir le roi dans sa maison. '
  '24':
  - type: text
    content: 'Mais le peuple du pays frappa tous ceux qui avaient conspiré contre le roi Amon; et le peuple du pays établit roi Josias, son fils, à sa place. '
  '25':
  - type: text
    content: 'Le reste des actions d’Amon, et ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  '26':
  - type: text
    content: 'On l’enterra dans son sépulcre, dans le jardin d’Uzza. Et '
  - type: note
    content: Mt 1:10.
  - type: text
    content: Josias, son fils, régna à sa place.
  '3':
  - type: text
    content: 'Il rebâtit les hauts lieux '
  - type: note
    content: 2 R 18:4.
  - type: text
    content: 'qu’Ézéchias, son père, avait détruits, il éleva des autels à Baal, il fit une idole d’Astarté, '
  - type: note
    content: 1 R 16:31, 32, 33.
  - type: text
    content: 'comme avait fait Achab, roi d’Israël, et il se prosterna devant toute l’armée des cieux et la servit. '
  '4':
  - type: text
    content: 'Il '
  - type: note
    content: Jé 32:34.
  - type: text
    content: 'bâtit des autels dans la maison de l’Éternel, quoique l’Éternel eût dit: '
  - type: note
    content: De 12:5, 11. 2 S 7:13. 1 R 8:29, 9, 3. 2 Ch 7:12. Ps 132:13, 14. Jé 32:34.
  - type: text
    content: 'C’est dans Jérusalem que je placerai mon nom. '
  '5':
  - type: text
    content: 'Il bâtit des autels à toute l’armée des cieux dans les deux parvis de la maison de l’Éternel. '
  '6':
  - type: text
    content: 'Il fit passer son fils par le feu; il observait les nuages et les serpents pour en tirer des pronostics, et il établit des gens qui évoquaient les esprits et qui prédisaient l’avenir. Il fit de plus en plus ce qui est mal aux yeux de l’Éternel, afin de l’irriter. '
  '7':
  - type: text
    content: 'Il mit l’idole d’Astarté, qu’il avait faite, dans la maison de laquelle l’Éternel avait dit à David et à Salomon, son fils: '
  - type: note
    content: 2 S 7:10. 1 R 8:16, 29; 9:3. 2 R 23:27.
  - type: text
    content: 'C’est dans cette maison, et c’est dans Jérusalem, que j’ai choisie parmi toutes les tribus d’Israël, que je veux à toujours placer mon nom. '
  '8':
  - type: text
    content: 'Je ne ferai plus errer le pied d’Israël hors du pays que j’ai donné à ses pères, pourvu seulement qu’ils aient soin de mettre en pratique tout ce que je leur ai commandé et toute la loi que leur a prescrite mon serviteur Moïse. '
  '9':
  - type: text
    content: 'Mais ils n’obéirent point; et Manassé fut cause qu’ils s’égarèrent et firent le mal plus que les nations que l’Éternel avait détruites devant les enfants d’Israël. '
