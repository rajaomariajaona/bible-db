  children:
  - type: text
    text: 'V. 1-4: cf. Col 3:20, 21. (De 5:16; 27:16. Pr 6:20.) (De 6:6, 7, 20-25. Ps 78:5-7.)'
  marker-yv: yv-h
- type: usfm
  marker: p
