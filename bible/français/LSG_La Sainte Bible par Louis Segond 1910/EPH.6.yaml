document_id: EPH.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-4: cf. Col 3:20, 21. (De 5:16; 27:16. Pr 6:20.) (De 6:6, 7, 20-25. Ps 78:5-7.)'
  - type: text
    content: ' '
  - type: note
    content: Col 3:20.
  - type: text
    content: 'Enfants, obéissez à vos parents, selon le Seigneur, car cela est juste. '
  '10':
  - type: text
    content: 'Au reste, fortifiez-vous dans le Seigneur, et par sa force toute-puissante. '
  '11':
  - type: note
    content: Col 3:12. 1 Th 5:8.
  - type: text
    content: 'Revêtez-vous de toutes les armes de Dieu, afin de pouvoir tenir ferme contre les ruses du diable. '
  '12':
  - type: text
    content: 'Car nous n’avons pas à lutter contre la chair et le sang, mais contre les dominations, '
  - type: note
    content: Ép 2:2.
  - type: text
    content: 'contre les autorités, contre les princes de ce monde de ténèbres, contre les esprits méchants dans les lieux célestes. '
  '13':
  - type: text
    content: 'C’est pourquoi, prenez '
  - type: note
    content: 2 Co 10:4.
  - type: text
    content: 'toutes les armes de Dieu, afin de pouvoir résister dans le mauvais jour, et tenir ferme après avoir tout surmonté. '
  '14':
  - type: note
    content: Lu 12:35. 1 Pi 1:13.
  - type: text
    content: 'Tenez donc ferme: ayez à vos reins la vérité pour ceinture; '
  - type: note
    content: És 59:17. 2 Co 6:7.
  - type: text
    content: 'revêtez la cuirasse de la justice; '
  '15':
  - type: text
    content: 'mettez pour chaussure à vos pieds le zèle que donne l’Évangile de paix; '
  '16':
  - type: text
    content: 'prenez par-dessus tout cela le bouclier de la foi, avec lequel vous pourrez éteindre tous les traits enflammés du malin; '
  '17':
  - type: note
    content: És 59:17. 1 Th 5:8.
  - type: text
    content: 'prenez aussi le casque du salut, '
  - type: note
    content: Hé 4:12. Ap 2:16.
  - type: text
    content: 'et l’épée de l’Esprit, qui est la parole de Dieu. '
  '18':
  - type: text
    content: 'Faites '
  - type: note
    content: Lu 18:1. Ro 12:12. Col 4:2. 1 Th 5:17.
  - type: text
    content: 'en tout temps par l’Esprit toutes sortes de prières et de supplications. Veillez à cela avec une entière persévérance, et priez pour tous les saints. '
  '19':
  - type: text
    content: 'Priez '
  - type: note
    content: Ac 4:29. 2 Th 3:1.
  - type: text
    content: 'pour moi, afin qu’il me soit donné, quand j’ouvre la bouche, de faire connaître hardiment et librement le mystère de l’Évangile, '
  '2':
  - type: note
    content: Ex 20:12. De 5:16; 27:16. Mt 15:4. Mc 7:10.
  - type: text
    content: 'Honore ton père et ta mère (c’est le premier commandement avec une promesse), '
  '20':
  - type: note
    content: 2 Co 5:20.
  - type: text
    content: 'pour lequel je suis ambassadeur '
  - type: note
    content: Ac 28:20.
  - type: text
    content: dans les chaînes, et que j’en parle avec assurance comme je dois en parler.
  - type: heading
    content: Envoi de l’épître par Tychique. Salutation
  - type: heading
    content: 'V. 21-24: cf. Col 4:7-9. 1 Co 16:22-24.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Col 4:7.
  - type: text
    content: 'Afin que vous aussi, vous sachiez ce qui me concerne, ce que je fais, '
  - type: note
    content: Ac 20:4. Col 4:7. Tit 3:12.
  - type: text
    content: 'Tychique, le bien-aimé frère et fidèle ministre dans le Seigneur, vous informera de tout. '
  '22':
  - type: text
    content: 'Je l’envoie exprès '
  - type: note
    content: 2 Ti 4:12.
  - type: text
    content: 'vers vous, pour que vous connaissiez notre situation, et pour qu’il console vos cœurs. '
  '23':
  - type: text
    content: 'Que la paix et la charité avec la foi soient données aux frères de la part de Dieu le Père et du Seigneur Jésus-Christ! '
  '24':
  - type: text
    content: Que la grâce soit avec tous ceux qui aiment notre Seigneur Jésus-Christ d’un amour inaltérable!
  '3':
  - type: text
    content: 'afin que tu sois heureux et que tu vives longtemps sur la terre. '
  '4':
  - type: text
    content: 'Et vous, pères, n’irritez pas vos enfants, '
  - type: note
    content: De 6:7, 20. Ps 78:4. Pr 19:18; 29:17.
  - type: text
    content: mais élevez-les en les corrigeant et en les instruisant selon le Seigneur.
  - type: heading
    content: 'V. 5-9: cf. Col 3:22-25; 4:1. Tit 2:9, 10.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: Col 3:22. 1 Ti 6:1. Tit 2:9. 1 Pi 2:18.
  - type: text
    content: 'Serviteurs, obéissez à vos maîtres selon la chair, avec crainte et tremblement, dans la simplicité de votre cœur, comme à Christ, '
  '6':
  - type: text
    content: 'non pas seulement sous leurs yeux, comme pour plaire aux hommes, mais comme des serviteurs de Christ, qui font de bon cœur la volonté de Dieu. '
  '7':
  - type: text
    content: 'Servez-les avec empressement, comme servant le Seigneur et non des hommes, '
  '8':
  - type: text
    content: 'sachant que chacun, soit esclave, soit libre, recevra du Seigneur selon ce qu’il aura fait de bien. '
  '9':
  - type: note
    content: Col 4:1.
  - type: text
    content: 'Et vous, maîtres, agissez de même à leur égard, et abstenez-vous de menaces, sachant que leur maître et le vôtre est dans les cieux, '
  - type: note
    content: De 10:17. 2 Ch 19:7. Job 34:19. Ac 10:34. Ro 2:11. Ga 2:6. Col 3:25. 1 Pi 1:17.
  - type: text
    content: et que devant lui il n’y a point d’acception de personnes.
  - type: heading
    content: Les armes spirituelles du chrétien
  - type: heading
    content: 'V. 10-20: cf. 1 Pi 5:8, 9. (Ro 13:12. 1 Th 5:8.) Col 4:2-4.'
