      - type: text
        text: Mc 7:10
      metadata:
        usfm: MRK.7.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Honore ton père et ta mère (c’est le premier commandement avec une promesse), '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'afin que tu sois heureux et que tu vives longtemps sur la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et vous, pères, n’irritez pas vos enfants, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 6:7
      metadata:
        usfm: DEU.6.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: DEU.6.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:4
      metadata:
        usfm: PSA.78.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 19:18
      metadata:
        usfm: PRO.19.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:17
      metadata:
        usfm: PRO.29.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: mais élevez-les en les corrigeant et en les instruisant selon le Seigneur.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 5-9: cf. Col 3:22-25; 4:1. Tit 2:9, 10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:22
      metadata:
        usfm: COL.3.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 6:1
      metadata:
        usfm: 1TI.6.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 2:9
      metadata:
        usfm: TIT.2.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:18
      metadata:
        usfm: 1PE.2.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Serviteurs, obéissez à vos maîtres selon la chair, avec crainte et tremblement, dans la simplicité de votre cœur, comme à Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'non pas seulement sous leurs yeux, comme pour plaire aux hommes, mais comme des serviteurs de Christ, qui font de bon cœur la volonté de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Servez-les avec empressement, comme servant le Seigneur et non des hommes, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'sachant que chacun, soit esclave, soit libre, recevra du Seigneur selon ce qu’il aura fait de bien. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 4:1
      metadata:
        usfm: COL.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et vous, maîtres, agissez de même à leur égard, et abstenez-vous de menaces, sachant que leur maître et le vôtre est dans les cieux, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:17
      metadata:
        usfm: DEU.10.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 19:7
      metadata:
        usfm: 2CH.19.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 34:19
      metadata:
        usfm: JOB.34.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:34
      metadata:
        usfm: ACT.10.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 2:11
      metadata:
        usfm: ROM.2.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 2:6
      metadata:
        usfm: GAL.2.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:25
      metadata:
        usfm: COL.3.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:17
      metadata:
        usfm: 1PE.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: et que devant lui il n’y a point d’acception de personnes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les armes spirituelles du chrétien
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-20: cf. 1 Pi 5:8, 9. (Ro 13:12. 1 Th 5:8.) Col 4:2-4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Au reste, fortifiez-vous dans le Seigneur, et par sa force toute-puissante. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:12
      metadata:
        usfm: COL.3.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:8
      metadata:
        usfm: 1TH.5.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Revêtez-vous de toutes les armes de Dieu, afin de pouvoir tenir ferme contre les ruses du diable. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Car nous n’avons pas à lutter contre la chair et le sang, mais contre les dominations, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 2:2
      metadata:
        usfm: EPH.2.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'contre les autorités, contre les princes de ce monde de ténèbres, contre les esprits méchants dans les lieux célestes. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'C’est pourquoi, prenez '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 10:4
      metadata:
        usfm: 2CO.10.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'toutes les armes de Dieu, afin de pouvoir résister dans le mauvais jour, et tenir ferme après avoir tout surmonté. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 12:35
      metadata:
        usfm: LUK.12.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:13
      metadata:
        usfm: 1PE.1.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tenez donc ferme: ayez à vos reins la vérité pour ceinture; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 59:17
      metadata:
        usfm: ISA.59.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 6:7
      metadata:
        usfm: 2CO.6.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'revêtez la cuirasse de la justice; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'mettez pour chaussure à vos pieds le zèle que donne l’Évangile de paix; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'prenez par-dessus tout cela le bouclier de la foi, avec lequel vous pourrez éteindre tous les traits enflammés du malin; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 59:17
      metadata:
        usfm: ISA.59.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:8
      metadata:
        usfm: 1TH.5.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'prenez aussi le casque du salut, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 4:12
      metadata:
        usfm: HEB.4.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 2:16
      metadata:
        usfm: REV.2.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et l’épée de l’Esprit, qui est la parole de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Faites '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 18:1
      metadata:
        usfm: LUK.18.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:12
      metadata:
        usfm: ROM.12.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 4:2
      metadata:
        usfm: COL.4.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:17
      metadata:
        usfm: 1TH.5.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en tout temps par l’Esprit toutes sortes de prières et de supplications. Veillez à cela avec une entière persévérance, et priez pour tous les saints. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Priez '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:29
      metadata:
        usfm: ACT.4.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:1
      metadata:
        usfm: 2TH.3.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour moi, afin qu’il me soit donné, quand j’ouvre la bouche, de faire connaître hardiment et librement le mystère de l’Évangile, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:20
      metadata:
        usfm: 2CO.5.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour lequel je suis ambassadeur '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 28:20
      metadata:
        usfm: ACT.28.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: dans les chaînes, et que j’en parle avec assurance comme je dois en parler.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Envoi de l’épître par Tychique. Salutation
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-24: cf. Col 4:7-9. 1 Co 16:22-24.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 4:7
      metadata:
        usfm: COL.4.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Afin que vous aussi, vous sachiez ce qui me concerne, ce que je fais, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 20:4
      metadata:
        usfm: ACT.20.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 4:7
      metadata:
        usfm: COL.4.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 3:12
      metadata:
        usfm: TIT.3.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tychique, le bien-aimé frère et fidèle ministre dans le Seigneur, vous informera de tout. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Je l’envoie exprès '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 4:12
      metadata:
        usfm: 2TI.4.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vers vous, pour que vous connaissiez notre situation, et pour qu’il console vos cœurs. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Que la paix et la charité avec la foi soient données aux frères de la part de Dieu le Père et du Seigneur Jésus-Christ! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Que la grâce soit avec tous ceux qui aiment notre Seigneur Jésus-Christ d’un amour inaltérable!
