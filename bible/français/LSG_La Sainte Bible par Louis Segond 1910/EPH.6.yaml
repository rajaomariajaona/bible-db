document_id: EPH.6,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-4: cf. Col 3:20, 21. (De 5:16; 27:16. Pr 6:20.) (De 6:6, 7, 20-25. Ps 78:5-7.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Enfants, obéissez à vos parents, selon le Seigneur, car cela est juste. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au reste, fortifiez-vous dans le Seigneur, et par sa force toute-puissante. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 5:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Revêtez-vous de toutes les armes de Dieu, afin de pouvoir tenir ferme contre les ruses du diable. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car nous n’avons pas à lutter contre la chair et le sang, mais contre les dominations, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 2:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'contre les autorités, contre les princes de ce monde de ténèbres, contre les esprits méchants dans les lieux célestes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi, prenez '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 10:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'toutes les armes de Dieu, afin de pouvoir résister dans le mauvais jour, et tenir ferme après avoir tout surmonté. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 12:35
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tenez donc ferme: ayez à vos reins la vérité pour ceinture; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 59:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 6:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'revêtez la cuirasse de la justice; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mettez pour chaussure à vos pieds le zèle que donne l’Évangile de paix; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'prenez par-dessus tout cela le bouclier de la foi, avec lequel vous pourrez éteindre tous les traits enflammés du malin; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 59:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 5:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'prenez aussi le casque du salut, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 4:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 2:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et l’épée de l’Esprit, qui est la parole de Dieu. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faites '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 18:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 12:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 4:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 5:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'en tout temps par l’Esprit toutes sortes de prières et de supplications. Veillez à cela avec une entière persévérance, et priez pour tous les saints. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Priez '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 4:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Th 3:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pour moi, afin qu’il me soit donné, quand j’ouvre la bouche, de faire connaître hardiment et librement le mystère de l’Évangile, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 5:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 15:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 7:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Honore ton père et ta mère (c’est le premier commandement avec une promesse), '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 5:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pour lequel je suis ambassadeur '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 28:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: dans les chaînes, et que j’en parle avec assurance comme je dois en parler.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Envoi de l’épître par Tychique. Salutation
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 21-24: cf. Col 4:7-9. 1 Co 16:22-24.'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 4:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Afin que vous aussi, vous sachiez ce qui me concerne, ce que je fais, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 20:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 4:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 3:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tychique, le bien-aimé frère et fidèle ministre dans le Seigneur, vous informera de tout. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je l’envoie exprès '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 4:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'vers vous, pour que vous connaissiez notre situation, et pour qu’il console vos cœurs. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que la paix et la charité avec la foi soient données aux frères de la part de Dieu le Père et du Seigneur Jésus-Christ! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que la grâce soit avec tous ceux qui aiment notre Seigneur Jésus-Christ d’un amour inaltérable!
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afin que tu sois heureux et que tu vives longtemps sur la terre. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et vous, pères, n’irritez pas vos enfants, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 6:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 78:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 19:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: mais élevez-les en les corrigeant et en les instruisant selon le Seigneur.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-9: cf. Col 3:22-25; 4:1. Tit 2:9, 10.'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 6:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 2:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Serviteurs, obéissez à vos maîtres selon la chair, avec crainte et tremblement, dans la simplicité de votre cœur, comme à Christ, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'non pas seulement sous leurs yeux, comme pour plaire aux hommes, mais comme des serviteurs de Christ, qui font de bon cœur la volonté de Dieu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Servez-les avec empressement, comme servant le Seigneur et non des hommes, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sachant que chacun, soit esclave, soit libre, recevra du Seigneur selon ce qu’il aura fait de bien. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 4:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et vous, maîtres, agissez de même à leur égard, et abstenez-vous de menaces, sachant que leur maître et le vôtre est dans les cieux, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 10:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 19:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 34:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 10:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 2:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 2:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: et que devant lui il n’y a point d’acception de personnes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les armes spirituelles du chrétien
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-20: cf. 1 Pi 5:8, 9. (Ro 13:12. 1 Th 5:8.) Col 4:2-4.'
    marker-yv: yv-h
