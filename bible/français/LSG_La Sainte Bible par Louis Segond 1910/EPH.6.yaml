      - type: text
        text: Ex 20:12
      metadata:
        usfm: EXO.20.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:16
      metadata:
        usfm: DEU.5.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:16
      metadata:
        usfm: DEU.27.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
