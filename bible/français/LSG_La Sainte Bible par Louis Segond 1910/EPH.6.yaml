        text: Col 3:20
      metadata:
        usfm: COL.3.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Enfants, obéissez à vos parents, selon le Seigneur, car cela est juste. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
