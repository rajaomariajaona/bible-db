document_id: EZK.6,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie contre le pays d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-14: cf. De 12:1-7. (Éz 20:27-33. Jé 2:19, 20, 28. Lé 26:30-41.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils sauront que je suis l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que ce n’est pas en vain que je les ai menacés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De leur envoyer tous ces maux.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 21:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Frappe de la main, frappe du pied, et dis: Hélas!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur toutes les méchantes abominations de la maison d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui tombera par l’épée, par la famine et par la peste.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui sera loin mourra de la peste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui sera près tombera par l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui restera et sera assiégé périra par la famine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’assouvirai ainsi ma fureur sur eux.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous saurez que je suis l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand leurs morts seront au milieu de leurs idoles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Autour de leurs autels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur toute colline élevée, sur tous les sommets des montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sous tout arbre vert, sous tout chêne touffu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là où ils offraient des parfums d’une agréable odeur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A toutes leurs idoles.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’étendrai ma main contre eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je rendrai le pays plus solitaire et plus désolé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le désert de Dibla,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Partout où ils habitent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils sauront que je suis l’Éternel.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fils de l’homme, tourne ta face vers les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 36:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: montagnes d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et prophétise contre elles!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu diras: Montagnes d’Israël,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoutez la parole du Seigneur, de l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi parle le Seigneur, l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aux montagnes et aux collines, aux ravins et aux vallées:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je fais venir l’épée contre vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je détruirai vos hauts lieux.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vos autels seront dévastés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vos statues du soleil seront brisées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ferai tomber vos morts devant vos idoles.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je mettrai les cadavres des enfants d’Israël devant leurs idoles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je disperserai vos ossements autour de vos autels.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Partout où vous habitez, vos villes seront ruinées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vos hauts lieux dévastés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vos autels seront délaissés et abandonnés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vos idoles seront brisées et disparaîtront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vos statues du soleil seront abattues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vos ouvrages anéantis.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les morts tomberont au milieu de vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous saurez que je suis l’Éternel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais je laisserai quelques restes d’entre vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui échapperont à l’épée parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque vous serez dispersés en divers pays.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vos réchappés se souviendront de moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parmi les nations où ils seront captifs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que j’aurai brisé leur cœur adultère et infidèle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leurs yeux qui se sont prostitués après leurs idoles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se prendront eux-mêmes en dégoût,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause des infamies qu’ils ont commises,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de toutes leurs abominations.
