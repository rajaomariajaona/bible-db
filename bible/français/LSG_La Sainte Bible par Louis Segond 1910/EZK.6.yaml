document_id: EZK.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie contre le pays d’Israël
  - type: heading
    content: 'V. 1-14: cf. De 12:1-7. (Éz 20:27-33. Jé 2:19, 20, 28. Lé 26:30-41.)'
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: text
    content: Et ils sauront que je suis l’Éternel,
  - type: text
    content: Et que ce n’est pas en vain que je les ai menacés
  - type: text
    content: De leur envoyer tous ces maux.
  '11':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: note
    content: Éz 21:17.
  - type: text
    content: 'Frappe de la main, frappe du pied, et dis: Hélas!'
  - type: text
    content: Sur toutes les méchantes abominations de la maison d’Israël,
  - type: text
    content: Qui tombera par l’épée, par la famine et par la peste.
  '12':
  - type: text
    content: Celui qui sera loin mourra de la peste,
  - type: text
    content: Celui qui sera près tombera par l’épée,
  - type: text
    content: Celui qui restera et sera assiégé périra par la famine.
  - type: text
    content: J’assouvirai ainsi ma fureur sur eux.
  '13':
  - type: text
    content: Et vous saurez que je suis l’Éternel,
  - type: text
    content: Quand leurs morts seront au milieu de leurs idoles,
  - type: text
    content: Autour de leurs autels,
  - type: text
    content: Sur toute colline élevée, sur tous les sommets des montagnes,
  - type: text
    content: Sous tout arbre vert, sous tout chêne touffu,
  - type: text
    content: Là où ils offraient des parfums d’une agréable odeur
  - type: text
    content: A toutes leurs idoles.
  '14':
  - type: text
    content: J’étendrai ma main contre eux,
  - type: text
    content: Et je rendrai le pays plus solitaire et plus désolé
  - type: text
    content: Que le désert de Dibla,
  - type: text
    content: Partout où ils habitent.
  - type: text
    content: Et ils sauront que je suis l’Éternel.
  '2':
  - type: text
    content: 'Fils de l’homme, tourne ta face vers les '
  - type: note
    content: Éz 36:1.
  - type: text
    content: montagnes d’Israël,
  - type: text
    content: Et prophétise contre elles!
  '3':
  - type: text
    content: 'Tu diras: Montagnes d’Israël,'
  - type: text
    content: Écoutez la parole du Seigneur, de l’Éternel!
  - type: text
    content: Ainsi parle le Seigneur, l’Éternel,
  - type: text
    content: 'Aux montagnes et aux collines, aux ravins et aux vallées:'
  - type: text
    content: Voici, je fais venir l’épée contre vous,
  - type: text
    content: Et je détruirai vos hauts lieux.
  '4':
  - type: text
    content: Vos autels seront dévastés,
  - type: text
    content: Vos statues du soleil seront brisées,
  - type: text
    content: Et je ferai tomber vos morts devant vos idoles.
  '5':
  - type: text
    content: Je mettrai les cadavres des enfants d’Israël devant leurs idoles,
  - type: text
    content: Et je disperserai vos ossements autour de vos autels.
  '6':
  - type: text
    content: Partout où vous habitez, vos villes seront ruinées,
  - type: text
    content: Et vos hauts lieux dévastés;
  - type: text
    content: Vos autels seront délaissés et abandonnés,
  - type: text
    content: Vos idoles seront brisées et disparaîtront,
  - type: text
    content: Vos statues du soleil seront abattues,
  - type: text
    content: Et vos ouvrages anéantis.
  '7':
  - type: text
    content: Les morts tomberont au milieu de vous,
  - type: text
    content: Et vous saurez que je suis l’Éternel.
  '8':
  - type: text
    content: Mais je laisserai quelques restes d’entre vous,
  - type: text
    content: Qui échapperont à l’épée parmi les nations,
  - type: text
    content: Lorsque vous serez dispersés en divers pays.
  '9':
  - type: text
    content: Vos réchappés se souviendront de moi
  - type: text
    content: Parmi les nations où ils seront captifs,
  - type: text
    content: Parce que j’aurai brisé leur cœur adultère et infidèle,
  - type: text
    content: Et leurs yeux qui se sont prostitués après leurs idoles;
  - type: text
    content: Ils se prendront eux-mêmes en dégoût,
  - type: text
    content: A cause des infamies qu’ils ont commises,
  - type: text
    content: A cause de toutes leurs abominations.
