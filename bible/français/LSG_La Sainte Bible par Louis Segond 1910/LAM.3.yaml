document_id: LAM.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Souffrances et consolations
  - type: heading
    content: 'V. 1-18: cf. (Job 16:6-16; 19:5-21.) (Ps 88; 102:1-12.)'
  - type: text
    content: Je suis l’homme qui a vu la misère
  - type: text
    content: Sous la verge de sa fureur.
  '10':
  - type: text
    content: Il a été pour moi un ours en embuscade,
  - type: text
    content: Un lion dans un lieu caché.
  '11':
  - type: text
    content: Il a détourné mes voies, il m’a déchiré,
  - type: text
    content: Il m’a jeté dans la désolation.
  '12':
  - type: text
    content: Il a tendu son arc, et il m’a placé
  - type: text
    content: Comme un but pour sa flèche.
  '13':
  - type: text
    content: Il a fait entrer dans mes reins
  - type: text
    content: Les traits de son carquois.
  '14':
  - type: text
    content: Je suis pour tout mon peuple un objet de raillerie,
  - type: text
    content: Chaque jour l’objet de leurs chansons.
  '15':
  - type: text
    content: Il m’a rassasié d’amertume,
  - type: text
    content: Il m’a enivré d’absinthe.
  '16':
  - type: text
    content: Il a brisé mes dents avec des cailloux,
  - type: text
    content: Il m’a couvert de cendre.
  '17':
  - type: text
    content: Tu m’as enlevé la paix;
  - type: text
    content: Je ne connais plus le bonheur.
  '18':
  - type: text
    content: 'Et j’ai dit: Ma force est perdue,'
  - type: text
    content: Je n’ai plus d’espérance en l’Éternel!
  - type: heading
    content: 'V. 19-39: cf. Mi 7:7-10. (Ps 42:7-12; 77:2-14; 130.)'
  '19':
  - type: text
    content: Quand je pense à ma détresse et à ma misère,
  - type: text
    content: A l’absinthe et au poison;
  '2':
  - type: text
    content: Il m’a conduit, mené dans les ténèbres,
  - type: text
    content: Et non dans la lumière.
  '20':
  - type: text
    content: Quand mon âme s’en souvient,
  - type: text
    content: Elle est abattue au-dedans de moi.
  '21':
  - type: text
    content: Voici ce que je veux repasser en mon cœur,
  - type: text
    content: Ce qui me donnera de l’espérance.
  '22':
  - type: text
    content: ' '
  - type: note
    content: És 1:9. Ha 3:13.
  - type: text
    content: Les bontés de l’Éternel ne sont pas épuisées,
  - type: text
    content: Ses compassions ne sont pas à leur terme;
  '23':
  - type: text
    content: ' '
  - type: note
    content: Ps 30:6.
  - type: text
    content: Elles se renouvellent chaque matin.
  - type: text
    content: Oh! Que ta fidélité est grande!
  '24':
  - type: text
    content: L’Éternel est mon partage, dit mon âme;
  - type: note
    content: Ha 2:3.
  - type: text
    content: C’est pourquoi je veux espérer en lui.
  '25':
  - type: text
    content: L’Éternel a de la bonté pour qui espère en lui,
  - type: text
    content: Pour l’âme qui le cherche.
  '26':
  - type: text
    content: Il est bon d’attendre en silence
  - type: text
    content: Le secours de l’Éternel.
  '27':
  - type: text
    content: Il est bon pour l’homme
  - type: text
    content: De porter le joug dans sa jeunesse.
  '28':
  - type: text
    content: Il se tiendra solitaire et silencieux,
  - type: text
    content: Parce que l’Éternel le lui impose;
  '29':
  - type: text
    content: Il mettra sa bouche dans la poussière,
  - type: note
    content: Ac 8:22.
  - type: text
    content: Sans perdre toute espérance;
  '3':
  - type: text
    content: Contre moi il tourne et retourne sa main
  - type: text
    content: Tout le jour.
  '30':
  - type: text
    content: Il présentera la joue à celui qui le frappe,
  - type: text
    content: Il se rassasiera d’opprobres.
  '31':
  - type: text
    content: Car le Seigneur
  - type: text
    content: Ne rejette pas à toujours.
  '32':
  - type: text
    content: Mais, lorsqu’il afflige,
  - type: text
    content: Il a compassion selon sa grande miséricorde;
  '33':
  - type: text
    content: Car ce n’est pas volontiers qu’il humilie
  - type: text
    content: Et qu’il afflige les enfants des hommes.
  '34':
  - type: text
    content: Quand on foule aux pieds
  - type: text
    content: Tous les captifs du pays,
  '35':
  - type: text
    content: Quand on viole la justice humaine
  - type: text
    content: A la face du Très-Haut,
  '36':
  - type: text
    content: Quand on fait tort à autrui dans sa cause,
  - type: text
    content: Le Seigneur ne le voit-il pas?
  '37':
  - type: text
    content: ' '
  - type: note
    content: Ps 33:9.
  - type: text
    content: Qui dira qu’une chose arrive,
  - type: text
    content: Sans que le Seigneur l’ait ordonnée?
  '38':
  - type: text
    content: ' '
  - type: note
    content: És 45:7. Am 3:6.
  - type: text
    content: N’est-ce pas de la volonté du Très-Haut que viennent
  - type: text
    content: Les maux et les biens?
  '39':
  - type: text
    content: Pourquoi l’homme vivant se plaindrait-il?
  - type: text
    content: Que chacun se plaigne de ses propres péchés.
  - type: heading
    content: 'V. 40-48: cf. 1 R 8:46-51. De 4:29-31.'
  '4':
  - type: text
    content: Il a fait dépérir ma chair et ma peau,
  - type: text
    content: Il a brisé mes os.
  '40':
  - type: text
    content: Recherchons nos voies et sondons,
  - type: text
    content: Et retournons à l’Éternel;
  '41':
  - type: text
    content: Élevons nos cœurs et nos mains
  - type: text
    content: 'Vers Dieu qui est au ciel:'
  '42':
  - type: text
    content: Nous avons péché, nous avons été rebelles!
  - type: text
    content: Tu n’as point pardonné!
  '43':
  - type: text
    content: Tu t’es caché dans ta colère, et tu nous as poursuivis;
  - type: text
    content: Tu as tué sans miséricorde;
  '44':
  - type: text
    content: Tu t’es enveloppé d’un nuage,
  - type: text
    content: Pour fermer accès à la prière.
  '45':
  - type: text
    content: Tu nous as rendus un objet de mépris et de dédain
  - type: text
    content: Au milieu des peuples.
  '46':
  - type: text
    content: Ils ouvrent la bouche contre nous,
  - type: text
    content: Tous ceux qui sont nos ennemis.
  '47':
  - type: text
    content: Notre partage a été la terreur et la fosse,
  - type: text
    content: Le ravage et la ruine.
  '48':
  - type: text
    content: Des torrents d’eau coulent de mes yeux,
  - type: text
    content: A cause de la ruine de la fille de mon peuple.
  - type: heading
    content: 'V. 49-66: cf. (Jé 18:18-23; 38:4-13.) (Ps 69; 142.)'
  '49':
  - type: text
    content: Mon œil fond en larmes, sans repos,
  - type: text
    content: Sans relâche,
  '5':
  - type: text
    content: Il a bâti autour de moi,
  - type: text
    content: Il m’a environné de poison et de douleur.
  '50':
  - type: text
    content: Jusqu’à ce que l’Éternel regarde et voie
  - type: text
    content: Du haut des cieux;
  '51':
  - type: text
    content: Mon œil me fait souffrir,
  - type: text
    content: A cause de toutes les filles de ma ville.
  '52':
  - type: text
    content: Ils m’ont donné la chasse comme à un oiseau,
  - type: text
    content: Ceux qui sont à tort mes ennemis.
  '53':
  - type: text
    content: Ils ont voulu anéantir ma vie dans une fosse,
  - type: text
    content: Et ils ont jeté des pierres sur moi.
  '54':
  - type: text
    content: Les eaux ont inondé ma tête;
  - type: text
    content: 'Je disais: Je suis perdu!'
  '55':
  - type: text
    content: J’ai invoqué ton nom, ô Éternel,
  - type: text
    content: Du fond de la fosse.
  '56':
  - type: text
    content: 'Tu as entendu ma voix:'
  - type: text
    content: Ne ferme pas l’oreille à mes soupirs, à mes cris!
  '57':
  - type: text
    content: Au jour où je t’ai invoqué, tu t’es approché,
  - type: text
    content: 'Tu as dit: Ne crains pas!'
  '58':
  - type: text
    content: Seigneur, tu as défendu la cause de mon âme,
  - type: text
    content: Tu as racheté ma vie.
  '59':
  - type: text
    content: 'Éternel, tu as vu ce qu’on m’a fait souffrir:'
  - type: text
    content: Rends-moi justice!
  '6':
  - type: text
    content: Il me fait habiter dans les ténèbres,
  - type: text
    content: Comme ceux qui sont morts dès longtemps.
  '60':
  - type: text
    content: Tu as vu toutes leurs vengeances,
  - type: text
    content: Tous leurs complots contre moi.
  '61':
  - type: text
    content: Éternel, tu as entendu leurs outrages,
  - type: text
    content: Tous leurs complots contre moi,
  '62':
  - type: text
    content: Les discours de mes adversaires, et les projets
  - type: text
    content: Qu’ils formaient chaque jour contre moi.
  '63':
  - type: text
    content: 'Regarde quand ils sont assis et quand ils se lèvent:'
  - type: text
    content: Je suis l’objet de leurs chansons.
  '64':
  - type: text
    content: Tu leur donneras un salaire, ô Éternel,
  - type: text
    content: Selon l’œuvre de leurs mains;
  '65':
  - type: text
    content: Tu les livreras à l’endurcissement de leur cœur,
  - type: text
    content: A ta malédiction contre eux;
  '66':
  - type: text
    content: Tu les poursuivras dans ta colère, et tu les extermineras
  - type: text
    content: De dessous les cieux, ô Éternel!
  '7':
  - type: text
    content: Il m’a entouré d’un mur, pour que je ne sorte pas;
  - type: text
    content: Il m’a donné de pesantes chaînes.
  '8':
  - type: text
    content: J’ai beau crier et implorer du secours,
  - type: text
    content: Il ne laisse pas accès à ma prière.
  '9':
  - type: text
    content: Il a fermé mon chemin avec des pierres de taille,
  - type: text
    content: Il a détruit mes sentiers.
