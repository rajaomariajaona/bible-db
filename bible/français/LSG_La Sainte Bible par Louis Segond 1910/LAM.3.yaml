document_id: LAM.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Souffrances et consolations
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-18: cf. (Job 16:6-16; 19:5-21.) (Ps 88; 102:1-12.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Je suis l’homme qui a vu la misère
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sous la verge de sa fureur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il m’a conduit, mené dans les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et non dans la lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Contre moi il tourne et retourne sa main
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout le jour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il a fait dépérir ma chair et ma peau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a brisé mes os.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il a bâti autour de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il m’a environné de poison et de douleur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il me fait habiter dans les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme ceux qui sont morts dès longtemps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il m’a entouré d’un mur, pour que je ne sorte pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il m’a donné de pesantes chaînes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: J’ai beau crier et implorer du secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne laisse pas accès à ma prière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il a fermé mon chemin avec des pierres de taille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a détruit mes sentiers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il a été pour moi un ours en embuscade,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un lion dans un lieu caché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il a détourné mes voies, il m’a déchiré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il m’a jeté dans la désolation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il a tendu son arc, et il m’a placé
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme un but pour sa flèche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il a fait entrer dans mes reins
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les traits de son carquois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je suis pour tout mon peuple un objet de raillerie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chaque jour l’objet de leurs chansons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il m’a rassasié d’amertume,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il m’a enivré d’absinthe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il a brisé mes dents avec des cailloux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il m’a couvert de cendre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tu m’as enlevé la paix;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne connais plus le bonheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et j’ai dit: Ma force est perdue,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je n’ai plus d’espérance en l’Éternel!
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 19-39: cf. Mi 7:7-10. (Ps 42:7-12; 77:2-14; 130.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Quand je pense à ma détresse et à ma misère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A l’absinthe et au poison;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Quand mon âme s’en souvient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle est abattue au-dedans de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Voici ce que je veux repasser en mon cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce qui me donnera de l’espérance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:9
      metadata:
        usfm: ISA.1.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ha 3:13
      metadata:
        usfm: HAB.3.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les bontés de l’Éternel ne sont pas épuisées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses compassions ne sont pas à leur terme;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 30:6
      metadata:
        usfm: PSA.30.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Elles se renouvellent chaque matin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh! Que ta fidélité est grande!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: L’Éternel est mon partage, dit mon âme;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ha 2:3
      metadata:
        usfm: HAB.2.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: C’est pourquoi je veux espérer en lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: L’Éternel a de la bonté pour qui espère en lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour l’âme qui le cherche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il est bon d’attendre en silence
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le secours de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il est bon pour l’homme
- type: usfm
  marker: q1
  children:
  - type: text
    text: De porter le joug dans sa jeunesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Il se tiendra solitaire et silencieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que l’Éternel le lui impose;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Il mettra sa bouche dans la poussière,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 8:22
      metadata:
        usfm: ACT.8.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Sans perdre toute espérance;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Il présentera la joue à celui qui le frappe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il se rassasiera d’opprobres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Car le Seigneur
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne rejette pas à toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Mais, lorsqu’il afflige,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a compassion selon sa grande miséricorde;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Car ce n’est pas volontiers qu’il humilie
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’il afflige les enfants des hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Quand on foule aux pieds
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les captifs du pays,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Quand on viole la justice humaine
- type: usfm
  marker: q1
  children:
  - type: text
    text: A la face du Très-Haut,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Quand on fait tort à autrui dans sa cause,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Seigneur ne le voit-il pas?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 33:9
      metadata:
        usfm: PSA.33.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qui dira qu’une chose arrive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans que le Seigneur l’ait ordonnée?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 45:7
      metadata:
        usfm: ISA.45.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 3:6
      metadata:
        usfm: AMO.3.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: N’est-ce pas de la volonté du Très-Haut que viennent
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les maux et les biens?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Pourquoi l’homme vivant se plaindrait-il?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que chacun se plaigne de ses propres péchés.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 40-48: cf. 1 R 8:46-51. De 4:29-31.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Recherchons nos voies et sondons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et retournons à l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Élevons nos cœurs et nos mains
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Vers Dieu qui est au ciel:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Nous avons péché, nous avons été rebelles!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu n’as point pardonné!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Tu t’es caché dans ta colère, et tu nous as poursuivis;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as tué sans miséricorde;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Tu t’es enveloppé d’un nuage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour fermer accès à la prière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Tu nous as rendus un objet de mépris et de dédain
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au milieu des peuples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ils ouvrent la bouche contre nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui sont nos ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Notre partage a été la terreur et la fosse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le ravage et la ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Des torrents d’eau coulent de mes yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de la ruine de la fille de mon peuple.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 49-66: cf. (Jé 18:18-23; 38:4-13.) (Ps 69; 142.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Mon œil fond en larmes, sans repos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans relâche,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Jusqu’à ce que l’Éternel regarde et voie
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du haut des cieux;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Mon œil me fait souffrir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de toutes les filles de ma ville.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Ils m’ont donné la chasse comme à un oiseau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui sont à tort mes ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Ils ont voulu anéantir ma vie dans une fosse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils ont jeté des pierres sur moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Les eaux ont inondé ma tête;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je disais: Je suis perdu!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: J’ai invoqué ton nom, ô Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du fond de la fosse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Tu as entendu ma voix:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne ferme pas l’oreille à mes soupirs, à mes cris!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Au jour où je t’ai invoqué, tu t’es approché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu as dit: Ne crains pas!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Seigneur, tu as défendu la cause de mon âme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as racheté ma vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Éternel, tu as vu ce qu’on m’a fait souffrir:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rends-moi justice!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: Tu as vu toutes leurs vengeances,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous leurs complots contre moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Éternel, tu as entendu leurs outrages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous leurs complots contre moi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: Les discours de mes adversaires, et les projets
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils formaient chaque jour contre moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Regarde quand ils sont assis et quand ils se lèvent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis l’objet de leurs chansons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: Tu leur donneras un salaire, ô Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Selon l’œuvre de leurs mains;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Tu les livreras à l’endurcissement de leur cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A ta malédiction contre eux;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Tu les poursuivras dans ta colère, et tu les extermineras
- type: usfm
  marker: q1
  children:
  - type: text
    text: De dessous les cieux, ô Éternel!
