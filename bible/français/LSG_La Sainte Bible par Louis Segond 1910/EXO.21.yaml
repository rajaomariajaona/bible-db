document_id: EXO.21,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Lois relatives à la liberté et à la vie
  - type: heading
    content: 'V. 1-11: cf. (De 15:12-18. Jé 34:8-17.) De 21:10-14.'
  - type: text
    content: 'Voici les lois que tu leur présenteras. '
  '10':
  - type: text
    content: 'S’il prend une autre femme, il ne retranchera rien pour la première à la nourriture, au vêtement, et au droit conjugal. '
  '11':
  - type: text
    content: Et s’il ne fait pas pour elle ces trois choses, elle pourra sortir sans rien payer, sans donner de l’argent.
  - type: heading
    content: 'V. 12-14: cf. No 35:16-34.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: Lé 24:17.
  - type: text
    content: 'Celui qui frappera un homme mortellement sera puni de mort. '
  '13':
  - type: text
    content: 'S’il ne lui a point dressé d’embûches, et que Dieu l’ait fait tomber sous sa main, je t’établirai un lieu où il pourra se réfugier. '
  '14':
  - type: text
    content: Mais si quelqu’un agit méchamment contre son prochain, en employant la ruse pour le tuer, tu l’arracheras même de mon autel, pour le faire mourir.
  - type: heading
    content: 'V. 15-17: cf. De 21:18-21. Mt 15:4-6.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Mt 15:4.
  - type: text
    content: 'Celui qui frappera son père ou sa mère sera puni de mort. '
  '16':
  - type: text
    content: 'Celui qui dérobera un homme, et qui l’aura vendu ou retenu entre ses mains, sera puni de mort. '
  '17':
  - type: note
    content: Lé 20:9. Pr 20:20. Mt 15:4. Mc 7:10.
  - type: text
    content: Celui qui maudira son père ou sa mère sera puni de mort.
  - type: heading
    content: 'V. 18-36: cf. Lé 24:17-22. Ge 9:5, 6.'
  '18':
  - type: text
    content: 'Si des hommes se querellent, et que l’un d’eux frappe l’autre avec une pierre ou avec le poing, sans causer sa mort, mais en l’obligeant à garder le lit, '
  '19':
  - type: text
    content: 'celui qui aura frappé ne sera point puni, dans le cas où l’autre viendrait à se lever et à se promener dehors avec son bâton. Seulement, il le dédommagera de son interruption de travail, et il le fera soigner jusqu’à sa guérison. '
  '2':
  - type: text
    content: 'Si tu achètes '
  - type: note
    content: De 15:12. Jé 34:14.
  - type: text
    content: 'un esclave hébreu, il servira six années; mais la septième, il sortira libre, sans rien payer. '
  '20':
  - type: text
    content: 'Si un homme frappe du bâton son esclave, homme ou femme, et que l’esclave meure sous sa main, le maître sera puni. '
  '21':
  - type: text
    content: 'Mais s’il survit un jour ou deux, le maître ne sera point puni; car c’est son argent. '
  '22':
  - type: text
    content: 'Si des hommes se querellent, et qu’ils heurtent une femme enceinte, et la fassent accoucher, sans autre accident, ils seront punis d’une amende imposée par le mari de la femme, et qu’ils paieront devant les juges. '
  '23':
  - type: text
    content: 'Mais s’il y a un accident, tu donneras vie pour vie, '
  '24':
  - type: note
    content: Lé 24:20. De 19:21. Mt 5:38.
  - type: text
    content: 'œil pour œil, dent pour dent, main pour main, pied pour pied, '
  '25':
  - type: text
    content: 'brûlure pour brûlure, blessure pour blessure, meurtrissure pour meurtrissure. '
  '26':
  - type: text
    content: 'Si un homme frappe l’œil de son esclave, homme ou femme, et qu’il lui fasse perdre l’œil, il le mettra en liberté, pour prix de son œil. '
  '27':
  - type: text
    content: 'Et s’il fait tomber une dent à son esclave, homme ou femme, il le mettra en liberté, pour prix de sa dent. '
  '28':
  - type: note
    content: Ge 9:5.
  - type: text
    content: 'Si un bœuf frappe de ses cornes un homme ou une femme, et que la mort en soit la suite, le bœuf sera lapidé, sa chair ne sera point mangée, et le maître du bœuf ne sera point puni. '
  '29':
  - type: text
    content: 'Mais si le bœuf était auparavant sujet à frapper, et qu’on en ait averti le maître, qui ne l’a point surveillé, le bœuf sera lapidé, dans le cas où il tuerait un homme ou une femme, et son maître sera puni de mort. '
  '3':
  - type: text
    content: 'S’il est entré seul, il sortira seul; s’il avait une femme, sa femme sortira avec lui. '
  '30':
  - type: text
    content: 'Si on impose au maître un prix pour le rachat de sa vie, il paiera tout ce qui lui sera imposé. '
  '31':
  - type: text
    content: 'Lorsque le bœuf frappera un fils ou une fille, cette loi recevra son application; '
  '32':
  - type: text
    content: 'mais si le bœuf frappe un esclave, homme ou femme, on donnera trente sicles d’argent au maître de l’esclave, et le bœuf sera lapidé. '
  '33':
  - type: text
    content: 'Si un homme met à découvert une citerne, ou si un homme en creuse une et ne la couvre pas, et qu’il y tombe un bœuf ou un âne, '
  '34':
  - type: text
    content: 'le possesseur de la citerne paiera au maître la valeur de l’animal en argent, et aura pour lui l’animal mort. '
  '35':
  - type: text
    content: 'Si le bœuf d’un homme frappe de ses cornes le bœuf d’un autre homme, et que la mort en soit la suite, ils vendront le bœuf vivant et en partageront le prix; ils partageront aussi le bœuf mort. '
  '36':
  - type: text
    content: Mais s’il est connu que le bœuf était auparavant sujet à frapper, et que son maître ne l’ait point surveillé, ce maître rendra bœuf pour bœuf, et aura pour lui le bœuf mort.
  '4':
  - type: text
    content: 'Si c’est son maître qui lui a donné une femme, et qu’il en ait eu des fils ou des filles, la femme et ses enfants seront à son maître, et il sortira seul. '
  '5':
  - type: note
    content: De 15:16.
  - type: text
    content: 'Si l’esclave dit: J’aime mon maître, ma femme et mes enfants, je ne veux pas sortir libre, '
  '6':
  - type: text
    content: 'alors son maître le conduira devant Dieu, et le fera approcher de la porte ou du poteau, et son maître lui percera l’oreille avec un poinçon, et l’esclave sera pour toujours à son service. '
  '7':
  - type: text
    content: 'Si un homme vend sa fille pour être esclave, elle ne sortira point comme sortent les esclaves. '
  '8':
  - type: text
    content: 'Si elle déplaît à son maître, qui s’était proposé de la prendre pour femme, il facilitera son rachat; mais il n’aura pas le pouvoir de la vendre à des étrangers, après lui avoir été infidèle. '
  '9':
  - type: text
    content: 'S’il la destine à son fils, il agira envers elle selon le droit des filles. '
