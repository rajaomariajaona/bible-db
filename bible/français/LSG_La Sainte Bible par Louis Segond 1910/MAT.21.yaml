document_id: MAT.21,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Entrée de Jésus à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. (Mc 11:1-10. Lu 19:28-44. Jn 12:12-19.) És 12:6.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 11:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 19:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsqu’ils approchèrent de Jérusalem, et qu’ils furent arrivés à Bethphagé, vers la montagne des oliviers, Jésus envoya deux disciples, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’il entra dans Jérusalem, toute la ville fut émue, et l’on disait: Qui est celui-ci? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La foule répondait: C’est Jésus, le prophète, de Nazareth en Galilée. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 14:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 11:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 19:45
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 2:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus entra dans le temple de Dieu. Il chassa tous ceux qui vendaient et qui achetaient dans le temple; il renversa les tables des changeurs, et les sièges des vendeurs de pigeons. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il est écrit:'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 8:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 56:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 7:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 19:46
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ma maison sera appelée une maison de prière. Mais vous, vous en faites une caverne de voleurs.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Des aveugles et des boiteux s’approchèrent de lui dans le temple. Et il les guérit. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 11:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais les principaux sacrificateurs et les scribes furent indignés, à la vue des choses merveilleuses qu’il avait faites, et des enfants qui criaient dans le temple: Hosanna au Fils de David! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui dirent: Entends-tu ce qu’ils disent? '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Oui,
    - type: text
      text: ' leur répondit Jésus. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'N’avez-vous jamais lu ces paroles:'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 8:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu as tiré des louanges de la bouche des enfants et de ceux qui sont à la mamelle?
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et, les ayant laissés, il sortit de la ville pour aller à Béthanie, où il passa la nuit.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le figuier maudit. La puissance de la foi
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 18-22: cf. (Mc 11:12-14, 19-26.) Lu 13:6-9.'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 11:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le matin, en retournant à la ville, il eut faim. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voyant un figuier sur le chemin, il s’en approcha; mais il n’y trouva que des feuilles, et il lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Que jamais fruit ne naisse de toi!
    - type: text
      text: ' Et à l’instant le figuier sécha. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'en leur disant: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Allez au village qui est devant vous; vous trouverez aussitôt une ânesse attachée, et un ânon avec elle; détachez-les, et amenez-les-moi.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les disciples, qui virent cela, furent étonnés, et dirent: Comment ce figuier est-il devenu sec en un instant? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous le dis en vérité,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 17:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 17:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'si vous aviez de la foi et que vous ne doutiez point, non seulement vous feriez ce qui a été fait à ce figuier, mais quand vous diriez à cette montagne: Ote-toi de là et jette-toi dans la mer, cela se ferait.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 7:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 11:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 11:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 14:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 1:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 3:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tout ce que vous demanderez avec foi par la prière, vous le recevrez.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’autorité de Jésus. Parabole des deux fils
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 23-32: cf. (Mc 11:27-33. Lu 20:1-8.) Lu 7:29-35.'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 11:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 20:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus se rendit dans le temple, et, pendant qu’il enseignait, les principaux sacrificateurs et les anciens du peuple vinrent lui dire: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 2:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 4:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Par quelle autorité fais-tu ces choses, et qui t’a donné cette autorité? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous adresserai aussi une question; et, si vous m’y répondez, je vous dirai par quelle autorité je fais ces choses.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le baptême de Jean, d’où venait-il? Du ciel, ou des hommes?
    - type: text
      text: ' Mais ils raisonnèrent ainsi entre eux; Si nous répondons: Du ciel, il nous dira: Pourquoi donc n’avez-vous pas cru en lui? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et si nous répondons: Des hommes, nous avons à craindre la foule, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 14:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 6:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car tous tiennent Jean pour un prophète. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors ils répondirent à Jésus: Nous ne savons. Et il leur dit à son tour: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Moi non plus, je ne vous dirai pas par quelle autorité je fais ces choses.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Que vous en semble? Un homme avait deux fils; et, s’adressant au premier, il dit: Mon enfant, va travailler aujourd’hui dans ma vigne.'
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il répondit: Je ne veux pas. Ensuite, il se repentit, et il alla.'
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Si quelqu’un vous dit quelque chose, vous répondrez: Le Seigneur en a besoin. Et à l’instant il les laissera aller.'
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'S’adressant à l’autre, il dit la même chose. Et ce fils répondit:'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 33:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je veux bien, seigneur. Et il n’alla pas.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lequel des deux a fait la volonté du père?
    - type: text
      text: ' Ils répondirent: Le premier. Et Jésus leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous le dis en vérité, les publicains et les prostituées vous devanceront dans le royaume de Dieu.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 3:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car Jean est venu à vous dans la voie de la justice, et vous n’avez pas cru en lui. Mais les publicains et les prostituées ont cru en lui; et vous, qui avez vu cela, vous ne vous êtes pas ensuite repentis pour croire en lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parabole des vignerons. La pierre de l’angle
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 33-46: cf. (Mc 12:1-12. Lu 20:9-19.) És 5:1-7.'
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Écoutez une autre parabole.
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 80:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 5:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 2:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 12:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 20:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il y avait un homme, maître de maison, qui planta une vigne. Il l’entoura d’une haie, y creusa un pressoir, et bâtit une tour; puis il l’afferma à des vignerons, et quitta le pays.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lorsque le temps de la récolte fut arrivé, il envoya ses serviteurs vers les vignerons, pour recevoir le produit de sa vigne.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Les vignerons, s’étant saisis de ses serviteurs, battirent l’un, tuèrent l’autre, et
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 24:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: lapidèrent le troisième.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il envoya encore d’autres serviteurs, en plus grand nombre que les premiers; et les vignerons les traitèrent de la même manière.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Enfin, il envoya vers eux son fils, en disant: Ils auront du respect pour mon fils.'
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Mais, quand les vignerons virent le fils, ils dirent entre eux:'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 2:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 1:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Voici l’héritier;
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 37:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 2:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 11:53
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: venez, tuons-le, et emparons-nous de son héritage.
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et ils se saisirent de lui, le jetèrent hors de la vigne, et le tuèrent.
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, ceci arriva afin que s’accomplît ce qui avait été annoncé par le prophète: '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Maintenant, lorsque le maître de la vigne viendra, que fera-t-il à ces vignerons?
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui répondirent: Il fera périr misérablement ces misérables, et il affermera la vigne à d’autres vignerons, qui lui en donneront le produit au temps de la récolte. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'N’avez-vous jamais lu dans les Écritures:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 118:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 8:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 12:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 20:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 4:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
