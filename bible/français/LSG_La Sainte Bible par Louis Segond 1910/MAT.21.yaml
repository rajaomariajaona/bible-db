document_id: MAT.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Entrée de Jésus à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. (Mc 11:1-10. Lu 19:28-44. Jn 12:12-19.) És 12:6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 11:1
      metadata:
        usfm: MRK.11.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 19:29
      metadata:
        usfm: LUK.19.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu’ils approchèrent de Jérusalem, et qu’ils furent arrivés à Bethphagé, vers la montagne des oliviers, Jésus envoya deux disciples, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'en leur disant: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Allez au village qui est devant vous; vous trouverez aussitôt une ânesse attachée, et un ânon avec elle; détachez-les, et amenez-les-moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Si quelqu’un vous dit quelque chose, vous répondrez: Le Seigneur en a besoin. Et à l’instant il les laissera aller.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Or, ceci arriva afin que s’accomplît ce qui avait été annoncé par le prophète: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 62:11
      metadata:
        usfm: ISA.62.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 9:9
      metadata:
        usfm: ZEC.9.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:15
      metadata:
        usfm: JHN.12.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dites à la fille de Sion:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, ton roi vient à toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plein de douceur, et monté sur un âne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur un ânon, le petit d’une ânesse.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les disciples allèrent, et firent ce que Jésus leur avait ordonné. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils amenèrent l’ânesse et l’ânon, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 9:13
      metadata:
        usfm: 2KI.9.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mirent sur eux leurs vêtements, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:14
      metadata:
        usfm: JHN.12.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le firent asseoir dessus. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'La plupart des gens de la foule étendirent leurs vêtements sur le chemin; d’autres coupèrent des branches d’arbres, et en jonchèrent la route. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ceux qui précédaient et ceux qui suivaient Jésus criaient: Hosanna au Fils de David! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 118:25
      metadata:
        usfm: PSA.118.25
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: PSA.118.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Béni soit celui qui vient au nom du Seigneur! Hosanna dans les lieux très hauts!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les vendeurs chassés du temple. Irritation des sacrificateurs
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-17: cf. (Mc 11:11, 15-19. Lu 19:45-48.) Jn 2:13-22.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lorsqu’il entra dans Jérusalem, toute la ville fut émue, et l’on disait: Qui est celui-ci? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La foule répondait: C’est Jésus, le prophète, de Nazareth en Galilée. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 14:26
      metadata:
        usfm: DEU.14.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 11:15
      metadata:
        usfm: MRK.11.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 19:45
      metadata:
        usfm: LUK.19.45
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 2:14
      metadata:
        usfm: JHN.2.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus entra dans le temple de Dieu. Il chassa tous ceux qui vendaient et qui achetaient dans le temple; il renversa les tables des changeurs, et les sièges des vendeurs de pigeons. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il est écrit:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 8:29
      metadata:
        usfm: 1KI.8.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 56:7
      metadata:
        usfm: ISA.56.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:11
      metadata:
        usfm: JER.7.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 19:46
      metadata:
        usfm: LUK.19.46
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ma maison sera appelée une maison de prière. Mais vous, vous en faites une caverne de voleurs.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Des aveugles et des boiteux s’approchèrent de lui dans le temple. Et il les guérit. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 11:27
      metadata:
        usfm: MRK.11.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais les principaux sacrificateurs et les scribes furent indignés, à la vue des choses merveilleuses qu’il avait faites, et des enfants qui criaient dans le temple: Hosanna au Fils de David! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils lui dirent: Entends-tu ce qu’ils disent? '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Oui,
  - type: text
    text: ' leur répondit Jésus. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'N’avez-vous jamais lu ces paroles:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 8:3
      metadata:
        usfm: PSA.8.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tu as tiré des louanges de la bouche des enfants et de ceux qui sont à la mamelle?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Et, les ayant laissés, il sortit de la ville pour aller à Béthanie, où il passa la nuit.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le figuier maudit. La puissance de la foi
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-22: cf. (Mc 11:12-14, 19-26.) Lu 13:6-9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 11:12
      metadata:
        usfm: MRK.11.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: MRK.11.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le matin, en retournant à la ville, il eut faim. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Voyant un figuier sur le chemin, il s’en approcha; mais il n’y trouva que des feuilles, et il lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que jamais fruit ne naisse de toi!
  - type: text
    text: ' Et à l’instant le figuier sécha. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les disciples, qui virent cela, furent étonnés, et dirent: Comment ce figuier est-il devenu sec en un instant? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jésus leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous le dis en vérité,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 17:20
      metadata:
        usfm: MAT.17.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 17:6
      metadata:
        usfm: LUK.17.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'si vous aviez de la foi et que vous ne doutiez point, non seulement vous feriez ce qui a été fait à ce figuier, mais quand vous diriez à cette montagne: Ote-toi de là et jette-toi dans la mer, cela se ferait.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 7:7
      metadata:
        usfm: MAT.7.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 11:24
      metadata:
        usfm: MRK.11.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 11:9
      metadata:
        usfm: LUK.11.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 14:13
      metadata:
        usfm: JHN.14.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:24
      metadata:
        usfm: JHN.16.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:5
      metadata:
        usfm: JAS.1.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:22
      metadata:
        usfm: 1JN.3.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tout ce que vous demanderez avec foi par la prière, vous le recevrez.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’autorité de Jésus. Parabole des deux fils
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 23-32: cf. (Mc 11:27-33. Lu 20:1-8.) Lu 7:29-35.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 11:27
      metadata:
        usfm: MRK.11.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 20:1
      metadata:
        usfm: LUK.20.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus se rendit dans le temple, et, pendant qu’il enseignait, les principaux sacrificateurs et les anciens du peuple vinrent lui dire: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 2:14
      metadata:
        usfm: EXO.2.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:7
      metadata:
        usfm: ACT.4.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:27
      metadata:
        usfm: ACT.7.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Par quelle autorité fais-tu ces choses, et qui t’a donné cette autorité? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jésus leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous adresserai aussi une question; et, si vous m’y répondez, je vous dirai par quelle autorité je fais ces choses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le baptême de Jean, d’où venait-il? Du ciel, ou des hommes?
  - type: text
    text: ' Mais ils raisonnèrent ainsi entre eux; Si nous répondons: Du ciel, il nous dira: Pourquoi donc n’avez-vous pas cru en lui? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Et si nous répondons: Des hommes, nous avons à craindre la foule, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 14:5
      metadata:
        usfm: MAT.14.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:20
      metadata:
        usfm: MRK.6.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car tous tiennent Jean pour un prophète. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Alors ils répondirent à Jésus: Nous ne savons. Et il leur dit à son tour: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Moi non plus, je ne vous dirai pas par quelle autorité je fais ces choses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Que vous en semble? Un homme avait deux fils; et, s’adressant au premier, il dit: Mon enfant, va travailler aujourd’hui dans ma vigne.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il répondit: Je ne veux pas. Ensuite, il se repentit, et il alla.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'S’adressant à l’autre, il dit la même chose. Et ce fils répondit:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 33:31
      metadata:
        usfm: EZK.33.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
