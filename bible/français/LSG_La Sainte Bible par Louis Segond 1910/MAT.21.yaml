document_id: MAT.21,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Entrée de Jésus à Jérusalem
  - type: heading
    content: 'V. 1-9: cf. (Mc 11:1-10. Lu 19:28-44. Jn 12:12-19.) És 12:6.'
  - type: text
    content: ' '
  - type: note
    content: Mc 11:1. Lu 19:29.
  - type: text
    content: 'Lorsqu’ils approchèrent de Jérusalem, et qu’ils furent arrivés à Bethphagé, vers la montagne des oliviers, Jésus envoya deux disciples, '
  '10':
  - type: text
    content: 'Lorsqu’il entra dans Jérusalem, toute la ville fut émue, et l’on disait: Qui est celui-ci? '
  '11':
  - type: text
    content: 'La foule répondait: C’est Jésus, le prophète, de Nazareth en Galilée. '
  '12':
  - type: note
    content: De 14:26. Mc 11:15. Lu 19:45. Jn 2:14.
  - type: text
    content: 'Jésus entra dans le temple de Dieu. Il chassa tous ceux qui vendaient et qui achetaient dans le temple; il renversa les tables des changeurs, et les sièges des vendeurs de pigeons. '
  '13':
  - type: text
    content: 'Et il leur dit: '
  - type: text
    content: 'Il est écrit:'
  - type: text
    content: ' '
  - type: note
    content: 1 R 8:29. És 56:7. Jé 7:11. Lu 19:46.
  - type: text
    content: Ma maison sera appelée une maison de prière. Mais vous, vous en faites une caverne de voleurs.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Des aveugles et des boiteux s’approchèrent de lui dans le temple. Et il les guérit. '
  '15':
  - type: note
    content: Mc 11:27.
  - type: text
    content: 'Mais les principaux sacrificateurs et les scribes furent indignés, à la vue des choses merveilleuses qu’il avait faites, et des enfants qui criaient dans le temple: Hosanna au Fils de David! '
  '16':
  - type: text
    content: 'Ils lui dirent: Entends-tu ce qu’ils disent? '
  - type: text
    content: Oui,
  - type: text
    content: ' leur répondit Jésus. '
  - type: text
    content: 'N’avez-vous jamais lu ces paroles:'
  - type: text
    content: ' '
  - type: note
    content: Ps 8:3.
  - type: text
    content: Tu as tiré des louanges de la bouche des enfants et de ceux qui sont à la mamelle?
  - type: text
    content: ' '
  '17':
  - type: text
    content: Et, les ayant laissés, il sortit de la ville pour aller à Béthanie, où il passa la nuit.
  - type: heading
    content: Le figuier maudit. La puissance de la foi
  - type: heading
    content: 'V. 18-22: cf. (Mc 11:12-14, 19-26.) Lu 13:6-9.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: Mc 11:12, 20.
  - type: text
    content: 'Le matin, en retournant à la ville, il eut faim. '
  '19':
  - type: text
    content: 'Voyant un figuier sur le chemin, il s’en approcha; mais il n’y trouva que des feuilles, et il lui dit: '
  - type: text
    content: Que jamais fruit ne naisse de toi!
  - type: text
    content: ' Et à l’instant le figuier sécha. '
  '2':
  - type: text
    content: 'en leur disant: '
  - type: text
    content: Allez au village qui est devant vous; vous trouverez aussitôt une ânesse attachée, et un ânon avec elle; détachez-les, et amenez-les-moi.
  '20':
  - type: text
    content: 'Les disciples, qui virent cela, furent étonnés, et dirent: Comment ce figuier est-il devenu sec en un instant? '
  '21':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: Je vous le dis en vérité,
  - type: text
    content: ' '
  - type: note
    content: Mt 17:20. Lu 17:6.
  - type: text
    content: 'si vous aviez de la foi et que vous ne doutiez point, non seulement vous feriez ce qui a été fait à ce figuier, mais quand vous diriez à cette montagne: Ote-toi de là et jette-toi dans la mer, cela se ferait.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: Mt 7:7. Mc 11:24. Lu 11:9. Jn 14:13; 16:24. Ja 1:5. 1 Jn 3:22.
  - type: text
    content: Tout ce que vous demanderez avec foi par la prière, vous le recevrez.
  - type: heading
    content: L’autorité de Jésus. Parabole des deux fils
  - type: heading
    content: 'V. 23-32: cf. (Mc 11:27-33. Lu 20:1-8.) Lu 7:29-35.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: Mc 11:27. Lu 20:1.
  - type: text
    content: 'Jésus se rendit dans le temple, et, pendant qu’il enseignait, les principaux sacrificateurs et les anciens du peuple vinrent lui dire: '
  - type: note
    content: Ex 2:14. Ac 4:7; 7:27.
  - type: text
    content: 'Par quelle autorité fais-tu ces choses, et qui t’a donné cette autorité? '
  '24':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: Je vous adresserai aussi une question; et, si vous m’y répondez, je vous dirai par quelle autorité je fais ces choses.
  '25':
  - type: text
    content: ' '
  - type: text
    content: Le baptême de Jean, d’où venait-il? Du ciel, ou des hommes?
  - type: text
    content: ' Mais ils raisonnèrent ainsi entre eux; Si nous répondons: Du ciel, il nous dira: Pourquoi donc n’avez-vous pas cru en lui? '
  '26':
  - type: text
    content: 'Et si nous répondons: Des hommes, nous avons à craindre la foule, '
  - type: note
    content: Mt 14:5. Mc 6:20.
  - type: text
    content: 'car tous tiennent Jean pour un prophète. '
  '27':
  - type: text
    content: 'Alors ils répondirent à Jésus: Nous ne savons. Et il leur dit à son tour: '
  - type: text
    content: Moi non plus, je ne vous dirai pas par quelle autorité je fais ces choses.
  '28':
  - type: text
    content: ' '
  - type: text
    content: 'Que vous en semble? Un homme avait deux fils; et, s’adressant au premier, il dit: Mon enfant, va travailler aujourd’hui dans ma vigne.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Il répondit: Je ne veux pas. Ensuite, il se repentit, et il alla.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: ' '
  - type: text
    content: 'Si quelqu’un vous dit quelque chose, vous répondrez: Le Seigneur en a besoin. Et à l’instant il les laissera aller.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'S’adressant à l’autre, il dit la même chose. Et ce fils répondit:'
  - type: text
    content: ' '
  - type: note
    content: Éz 33:31.
  - type: text
    content: Je veux bien, seigneur. Et il n’alla pas.
  - type: text
    content: ' '
  '31':
  - type: text
    content: Lequel des deux a fait la volonté du père?
  - type: text
    content: ' Ils répondirent: Le premier. Et Jésus leur dit: '
  - type: text
    content: Je vous le dis en vérité, les publicains et les prostituées vous devanceront dans le royaume de Dieu.
  '32':
  - type: text
    content: ' '
  - type: note
    content: Mt 3:1.
  - type: text
    content: Car Jean est venu à vous dans la voie de la justice, et vous n’avez pas cru en lui. Mais les publicains et les prostituées ont cru en lui; et vous, qui avez vu cela, vous ne vous êtes pas ensuite repentis pour croire en lui.
  - type: heading
    content: Parabole des vignerons. La pierre de l’angle
  - type: heading
    content: 'V. 33-46: cf. (Mc 12:1-12. Lu 20:9-19.) És 5:1-7.'
  '33':
  - type: text
    content: ' '
  - type: text
    content: Écoutez une autre parabole.
  - type: text
    content: ' '
  - type: note
    content: Ps 80:9. És 5:1. Jé 2:21; 12:10. Mc 12:1. Lu 20:9.
  - type: text
    content: Il y avait un homme, maître de maison, qui planta une vigne. Il l’entoura d’une haie, y creusa un pressoir, et bâtit une tour; puis il l’afferma à des vignerons, et quitta le pays.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Lorsque le temps de la récolte fut arrivé, il envoya ses serviteurs vers les vignerons, pour recevoir le produit de sa vigne.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Les vignerons, s’étant saisis de ses serviteurs, battirent l’un, tuèrent l’autre, et
  - type: text
    content: ' '
  - type: note
    content: 2 Ch 24:21.
  - type: text
    content: lapidèrent le troisième.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Il envoya encore d’autres serviteurs, en plus grand nombre que les premiers; et les vignerons les traitèrent de la même manière.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Enfin, il envoya vers eux son fils, en disant: Ils auront du respect pour mon fils.'
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'Mais, quand les vignerons virent le fils, ils dirent entre eux:'
  - type: text
    content: ' '
  - type: note
    content: Ps 2:8. Hé 1:2.
  - type: text
    content: Voici l’héritier;
  - type: text
    content: ' '
  - type: note
    content: Ge 37:18. Ps 2:1. Mt 26:3; 27:1. Jn 11:53.
  - type: text
    content: venez, tuons-le, et emparons-nous de son héritage.
  - type: text
    content: ' '
  '39':
  - type: text
    content: Et ils se saisirent de lui, le jetèrent hors de la vigne, et le tuèrent.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Or, ceci arriva afin que s’accomplît ce qui avait été annoncé par le prophète: '
  '40':
  - type: text
    content: Maintenant, lorsque le maître de la vigne viendra, que fera-t-il à ces vignerons?
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'Ils lui répondirent: Il fera périr misérablement ces misérables, et il affermera la vigne à d’autres vignerons, qui lui en donneront le produit au temps de la récolte. '
  '42':
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: 'N’avez-vous jamais lu dans les Écritures:'
  - type: note
    content: Ps 118:22. És 8:14; 28:16. Mc 12:10. Lu 20:17. Ac 4:11. Ro 9:33. 1 Pi 2:6.
  - type: text
    content: La pierre qu’ont rejetée ceux qui bâtissaient
  - type: text
    content: Est devenue la principale de l’angle;
  - type: text
    content: C’est du Seigneur que cela est venu,
  - type: text
    content: Et c’est un prodige à nos yeux?
  '43':
  - type: text
    content: ' '
  - type: text
    content: C’est pourquoi, je vous le dis,
  - type: text
    content: ' '
  - type: note
    content: Ex 32:10. Mt 8:12.
  - type: text
    content: le royaume de Dieu vous
  - type: text
    content: ' '
  - type: note
    content: És 55:5.
  - type: text
    content: sera enlevé, et sera donné à une nation qui en rendra les fruits.
  - type: text
    content: ' '
  '44':
  - type: note
    content: És 8:15. Za 12:3. Lu 20:18.
  - type: text
    content: Celui qui tombera sur cette pierre s’y brisera, et
  - type: text
    content: ' '
  - type: note
    content: Da 2:34.
  - type: text
    content: celui sur qui elle tombera sera écrasé.
  - type: text
    content: ' '
  '45':
  - type: note
    content: Lu 20:19.
  - type: text
    content: 'Après avoir entendu ses paraboles, les principaux sacrificateurs et les pharisiens comprirent que c’était d’eux que Jésus parlait, '
  '46':
  - type: text
    content: 'et ils cherchaient à se saisir de lui; mais ils craignaient la foule, parce qu’elle le tenait '
  - type: note
    content: Lu 7:16. Jn 7:40.
  - type: text
    content: pour un prophète.
  '5':
  - type: note
    content: És 62:11. Za 9:9. Jn 12:15.
  - type: text
    content: 'Dites à la fille de Sion:'
  - type: text
    content: Voici, ton roi vient à toi,
  - type: text
    content: Plein de douceur, et monté sur un âne,
  - type: text
    content: Sur un ânon, le petit d’une ânesse.
  '6':
  - type: text
    content: 'Les disciples allèrent, et firent ce que Jésus leur avait ordonné. '
  '7':
  - type: text
    content: 'Ils amenèrent l’ânesse et l’ânon, '
  - type: note
    content: 2 R 9:13.
  - type: text
    content: 'mirent sur eux leurs vêtements, et '
  - type: note
    content: Jn 12:14.
  - type: text
    content: 'le firent asseoir dessus. '
  '8':
  - type: text
    content: 'La plupart des gens de la foule étendirent leurs vêtements sur le chemin; d’autres coupèrent des branches d’arbres, et en jonchèrent la route. '
  '9':
  - type: text
    content: 'Ceux qui précédaient et ceux qui suivaient Jésus criaient: Hosanna au Fils de David! '
  - type: note
    content: Ps 118:25, 26.
  - type: text
    content: Béni soit celui qui vient au nom du Seigneur! Hosanna dans les lieux très hauts!
  - type: heading
    content: Les vendeurs chassés du temple. Irritation des sacrificateurs
  - type: heading
    content: 'V. 10-17: cf. (Mc 11:11, 15-19. Lu 19:45-48.) Jn 2:13-22.'
