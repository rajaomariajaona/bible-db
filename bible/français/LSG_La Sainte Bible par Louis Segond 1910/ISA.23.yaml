document_id: ISA.23,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie contre Tyr et Sidon
  - type: heading
    content: 'V. 1-14: cf. Jé 25:22. Éz 26 à 28. Am 1:9, 10. Za 9:2-4.'
  - type: text
    content: 'Oracle sur '
  - type: note
    content: Jé 47:4. Éz 26:27, 28. Za 9:3, 4.
  - type: text
    content: Tyr.
  - type: text
    content: Lamentez-vous, navires de Tarsis!
  - type: text
    content: 'Car elle est détruite: plus de maisons! Plus d’entrée!'
  - type: text
    content: C’est du pays de Kittim que la nouvelle leur en est venue.
  '10':
  - type: text
    content: Parcours librement ton pays, pareille au Nil,
  - type: text
    content: Fille de Tarsis! Plus de joug!
  '11':
  - type: text
    content: L’Éternel a étendu sa main sur la mer;
  - type: text
    content: Il a fait trembler les royaumes;
  - type: text
    content: Il a ordonné la destruction des forteresses de Canaan.
  '12':
  - type: text
    content: 'Il a dit: Tu ne te livreras plus à la joie,'
  - type: text
    content: Vierge déshonorée, fille de Sidon!
  - type: text
    content: Lève-toi, passe au pays de Kittim!
  - type: text
    content: Même là, il n’y aura pas de repos pour toi.
  '13':
  - type: text
    content: Vois les Chaldéens, qui n’étaient pas un peuple,
  - type: text
    content: Ces habitants du désert, pour qui l’Assyrien a fondé un pays;
  - type: text
    content: Ils élèvent des tours, ils renversent les palais de Tyr,
  - type: text
    content: Ils les mettent en ruines.
  '14':
  - type: text
    content: Lamentez-vous, navires de Tarsis!
  - type: text
    content: Car votre forteresse est détruite!
  - type: heading
    content: 'V. 15-18: cf. Jé 25:11-14. (Ac 21:3-6. Ps 45:13.)'
  '15':
  - type: text
    content: En ce temps-là, Tyr tombera dans l’oubli soixante-dix ans,
  - type: text
    content: Ce que dure la vie d’un roi.
  - type: text
    content: Au bout de soixante-dix ans, il en sera de Tyr
  - type: text
    content: 'Comme de la prostituée dont parle la chanson:'
  '16':
  - type: text
    content: Prends la harpe, parcours la ville,
  - type: text
    content: Prostituée qu’on oublie!
  - type: text
    content: Joue bien, répète tes chants,
  - type: text
    content: Pour qu’on se souvienne de toi!
  '17':
  - type: text
    content: Au bout de soixante-dix ans, l’Éternel visitera Tyr,
  - type: text
    content: Et elle retournera à son salaire impur;
  - type: text
    content: Elle se prostituera à tous les royaumes de la terre,
  - type: text
    content: Sur la face du monde.
  '18':
  - type: text
    content: Mais son gain et son salaire impur seront consacrés à l’Éternel,
  - type: text
    content: Ils ne seront ni entassés ni conservés;
  - type: text
    content: Car son gain fournira pour ceux qui habitent devant l’Éternel
  - type: text
    content: Une nourriture abondante et des vêtements magnifiques.
  '2':
  - type: text
    content: Soyez muets d’effroi, habitants de la côte,
  - type: text
    content: Que remplissaient les marchands de Sidon, parcourant la mer!
  '3':
  - type: text
    content: A travers les vastes eaux, le blé du Nil,
  - type: text
    content: La moisson du fleuve, était pour elle un revenu;
  - type: text
    content: Elle était le marché des nations.
  '4':
  - type: text
    content: Sois confuse, Sidon!
  - type: text
    content: 'Car ainsi parle la mer, la forteresse de la mer:'
  - type: text
    content: Je n’ai point eu de douleurs, je n’ai point enfanté,
  - type: text
    content: Je n’ai point nourri de jeunes gens, ni élevé de jeunes filles.
  '5':
  - type: text
    content: Quand les Égyptiens sauront la nouvelle,
  - type: text
    content: Ils trembleront en apprenant la chute de Tyr.
  '6':
  - type: text
    content: Passez à Tarsis,
  - type: text
    content: Lamentez-vous, habitants de la côte!
  '7':
  - type: text
    content: Est-ce là votre ville joyeuse?
  - type: text
    content: Elle avait une origine antique,
  - type: text
    content: Et ses pieds la mènent séjourner au loin.
  '8':
  - type: text
    content: Qui a pris cette résolution contre Tyr, la dispensatrice des couronnes,
  - type: text
    content: Elle dont les marchands étaient des princes,
  - type: text
    content: Dont les commerçants étaient les plus riches de la terre?
  '9':
  - type: text
    content: C’est l’Éternel des armées qui a pris cette résolution,
  - type: text
    content: Pour blesser l’orgueil de tout ce qui brille,
  - type: text
    content: Pour humilier tous les grands de la terre.
