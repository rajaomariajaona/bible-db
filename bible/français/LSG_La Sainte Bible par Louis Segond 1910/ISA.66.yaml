document_id: ISA.66,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le vrai culte
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. (Ac 17:24, 25. És 57:15.) És 65:3-15. Lu 21:17-24.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 8:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 6:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7:48
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '49'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le ciel est mon trône,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la terre mon marchepied.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quelle maison pourriez-vous me bâtir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et quel lieu me donneriez-vous pour demeure?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Réjouissez-vous avec Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faites d’elle le sujet de votre allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous tous qui l’aimez;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tressaillez avec elle de joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous tous qui menez deuil sur elle;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Afin que vous soyez nourris et rassasiés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du lait de ses consolations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que vous savouriez avec bonheur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La plénitude de sa gloire.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 49:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 60:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je dirigerai vers elle la paix comme un fleuve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la gloire des nations comme un torrent débordé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous serez allaités;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous serez portés sur les bras,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et caressés sur les genoux.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Comme un homme que sa mère console,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi je vous consolerai;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous serez consolés dans Jérusalem.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Vous le verrez, et votre cœur sera dans la joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vos os reprendront de la vigueur comme l’herbe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel manifestera sa puissance envers ses serviteurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il fera sentir sa colère à ses ennemis.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jugement des méchants
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 15-24: cf. Ap 19:11-21. (És 11:10; 60:3-12.) Hé 12:27-29.'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Car voici, l’Éternel arrive dans un feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses chars sont comme un tourbillon;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il convertit sa colère en un brasier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses menaces en flammes de feu.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: C’est par le feu que l’Éternel exerce ses jugements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est par son glaive qu’il châtie toute chair;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux que tuera l’Éternel seront en grand nombre.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ceux qui se sanctifient et se purifient dans les jardins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu desquels ils vont un à un,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui mangent de la chair de porc,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des choses abominables et des souris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux-là périront, dit l’Éternel.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Je connais leurs œuvres et leurs pensées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le temps est venu de rassembler toutes les nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toutes les langues;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles viendront et verront ma gloire.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Je mettrai un signe parmi elles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’enverrai leurs réchappés vers les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A Tarsis, à Pul et à Lud, qui tirent de l’arc,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A Tubal et à Javan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux îles lointaines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui jamais n’ont entendu parler de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui n’ont pas vu ma gloire;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils publieront ma gloire parmi les nations.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Toutes ces choses, ma main les a faites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toutes ont reçu l’existence, dit l’Éternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici sur qui je porterai mes regards:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur celui qui souffre et qui a l’esprit abattu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur celui qui craint ma parole.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ils amèneront tous vos frères du milieu de toutes les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En offrande à l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur des chevaux, des chars et des litières,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur des mulets et des dromadaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A ma montagne sainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A Jérusalem, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme les enfants d’Israël apportent leur offrande,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans un vase pur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la maison de l’Éternel.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Et je prendrai aussi parmi eux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des sacrificateurs, des Lévites, dit l’Éternel.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Car, comme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 65:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 3:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 21:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les nouveaux cieux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la nouvelle terre que je vais créer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Subsisteront devant moi, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi subsisteront votre postérité et votre nom.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: A chaque nouvelle lune et à chaque sabbat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toute chair viendra se prosterner devant moi, dit l’Éternel.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Et quand on sortira, on verra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les cadavres des hommes qui se sont rebellés contre moi;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 9:44
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car leur ver ne mourra point, et leur feu ne s’éteindra point;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils seront pour toute chair un objet d’horreur.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Celui qui immole un bœuf est comme celui qui tuerait un homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui sacrifie un agneau est comme celui qui romprait la nuque à un chien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui présente une offrande est comme celui qui répandrait du sang de porc,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui brûle de l’encens est comme celui qui adorerait des idoles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux-là se complaisent dans leurs voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leur âme trouve du plaisir dans leurs abominations.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Moi aussi, je me complairai dans leur infortune,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ferai venir sur eux ce qui cause leur effroi,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 1:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 7:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Parce que j’ai appelé, et qu’ils n’ont point répondu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que j’ai parlé, et qu’ils n’ont point écouté;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 65:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais ils ont fait ce qui est mal à mes yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils ont choisi ce qui me déplaît.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Écoutez la parole de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous qui craignez sa parole.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici ce que disent vos frères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui vous haïssent et vous repoussent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A cause de mon nom:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 5:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que l’Éternel montre sa gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que nous voyions votre joie!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ils seront confondus.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Une voix éclatante sort de la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une voix sort du temple.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est la voix de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui paie à ses ennemis leur salaire.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gloire de la nouvelle Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-14: cf. Ro 11:12, 15, 23-26. (És 60:11-18; 65:17-25.) Hé 12:22-24.'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Avant d’éprouver les douleurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle a enfanté;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant que les souffrances lui vinssent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle a donné naissance à un fils.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Qui a jamais entendu pareille chose
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a jamais vu rien de semblable?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un pays peut-il naître en un jour?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une nation est-elle enfantée d’un seul coup?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A peine en travail, Sion a enfanté ses fils!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ouvrirais-je le sein maternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour ne pas laisser enfanter? Dit l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, qui fais naître,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Empêcherais-je d’enfanter? Dit ton Dieu.
