document_id: ISA.66,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le vrai culte
  - type: heading
    content: 'V. 1-6: cf. (Ac 17:24, 25. És 57:15.) És 65:3-15. Lu 21:17-24.'
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: note
    content: 1 R 8:27. 2 Ch 6:18. Ac 7:48, 49; 17:24.
  - type: text
    content: Le ciel est mon trône,
  - type: text
    content: Et la terre mon marchepied.
  - type: text
    content: Quelle maison pourriez-vous me bâtir,
  - type: text
    content: Et quel lieu me donneriez-vous pour demeure?
  '10':
  - type: text
    content: Réjouissez-vous avec Jérusalem,
  - type: text
    content: Faites d’elle le sujet de votre allégresse,
  - type: text
    content: Vous tous qui l’aimez;
  - type: text
    content: Tressaillez avec elle de joie,
  - type: text
    content: Vous tous qui menez deuil sur elle;
  '11':
  - type: text
    content: Afin que vous soyez nourris et rassasiés
  - type: text
    content: Du lait de ses consolations,
  - type: text
    content: Afin que vous savouriez avec bonheur
  - type: text
    content: La plénitude de sa gloire.
  '12':
  - type: text
    content: ' '
  - type: note
    content: És 49:22; 60:4.
  - type: text
    content: 'Car ainsi parle l’Éternel:'
  - type: text
    content: Voici, je dirigerai vers elle la paix comme un fleuve,
  - type: text
    content: Et la gloire des nations comme un torrent débordé,
  - type: text
    content: Et vous serez allaités;
  - type: text
    content: Vous serez portés sur les bras,
  - type: text
    content: Et caressés sur les genoux.
  '13':
  - type: text
    content: Comme un homme que sa mère console,
  - type: text
    content: Ainsi je vous consolerai;
  - type: text
    content: Vous serez consolés dans Jérusalem.
  '14':
  - type: text
    content: Vous le verrez, et votre cœur sera dans la joie,
  - type: text
    content: Et vos os reprendront de la vigueur comme l’herbe;
  - type: text
    content: L’Éternel manifestera sa puissance envers ses serviteurs,
  - type: text
    content: Mais il fera sentir sa colère à ses ennemis.
  - type: heading
    content: Jugement des méchants
  - type: heading
    content: 'V. 15-24: cf. Ap 19:11-21. (És 11:10; 60:3-12.) Hé 12:27-29.'
  '15':
  - type: text
    content: Car voici, l’Éternel arrive dans un feu,
  - type: text
    content: Et ses chars sont comme un tourbillon;
  - type: text
    content: Il convertit sa colère en un brasier,
  - type: text
    content: Et ses menaces en flammes de feu.
  '16':
  - type: text
    content: C’est par le feu que l’Éternel exerce ses jugements,
  - type: text
    content: C’est par son glaive qu’il châtie toute chair;
  - type: text
    content: Et ceux que tuera l’Éternel seront en grand nombre.
  '17':
  - type: text
    content: Ceux qui se sanctifient et se purifient dans les jardins,
  - type: text
    content: Au milieu desquels ils vont un à un,
  - type: text
    content: Qui mangent de la chair de porc,
  - type: text
    content: Des choses abominables et des souris,
  - type: text
    content: Tous ceux-là périront, dit l’Éternel.
  '18':
  - type: text
    content: Je connais leurs œuvres et leurs pensées.
  - type: text
    content: Le temps est venu de rassembler toutes les nations
  - type: text
    content: Et toutes les langues;
  - type: text
    content: Elles viendront et verront ma gloire.
  '19':
  - type: text
    content: Je mettrai un signe parmi elles,
  - type: text
    content: Et j’enverrai leurs réchappés vers les nations,
  - type: text
    content: A Tarsis, à Pul et à Lud, qui tirent de l’arc,
  - type: text
    content: A Tubal et à Javan,
  - type: text
    content: Aux îles lointaines,
  - type: text
    content: Qui jamais n’ont entendu parler de moi,
  - type: text
    content: Et qui n’ont pas vu ma gloire;
  - type: text
    content: Et ils publieront ma gloire parmi les nations.
  '2':
  - type: text
    content: Toutes ces choses, ma main les a faites,
  - type: text
    content: Et toutes ont reçu l’existence, dit l’Éternel.
  - type: text
    content: 'Voici sur qui je porterai mes regards:'
  - type: text
    content: Sur celui qui souffre et qui a l’esprit abattu,
  - type: text
    content: Sur celui qui craint ma parole.
  '20':
  - type: text
    content: Ils amèneront tous vos frères du milieu de toutes les nations,
  - type: text
    content: En offrande à l’Éternel,
  - type: text
    content: Sur des chevaux, des chars et des litières,
  - type: text
    content: Sur des mulets et des dromadaires,
  - type: text
    content: A ma montagne sainte,
  - type: text
    content: A Jérusalem, dit l’Éternel,
  - type: text
    content: Comme les enfants d’Israël apportent leur offrande,
  - type: text
    content: Dans un vase pur,
  - type: text
    content: A la maison de l’Éternel.
  '21':
  - type: text
    content: Et je prendrai aussi parmi eux
  - type: text
    content: Des sacrificateurs, des Lévites, dit l’Éternel.
  '22':
  - type: text
    content: 'Car, comme '
  - type: note
    content: És 65:17. 2 Pi 3:13. Ap 21:1.
  - type: text
    content: les nouveaux cieux
  - type: text
    content: Et la nouvelle terre que je vais créer
  - type: text
    content: Subsisteront devant moi, dit l’Éternel,
  - type: text
    content: Ainsi subsisteront votre postérité et votre nom.
  '23':
  - type: text
    content: A chaque nouvelle lune et à chaque sabbat,
  - type: text
    content: Toute chair viendra se prosterner devant moi, dit l’Éternel.
  '24':
  - type: text
    content: Et quand on sortira, on verra
  - type: text
    content: Les cadavres des hommes qui se sont rebellés contre moi;
  - type: note
    content: Mc 9:44.
  - type: text
    content: Car leur ver ne mourra point, et leur feu ne s’éteindra point;
  - type: text
    content: Et ils seront pour toute chair un objet d’horreur.
  '3':
  - type: text
    content: Celui qui immole un bœuf est comme celui qui tuerait un homme,
  - type: text
    content: Celui qui sacrifie un agneau est comme celui qui romprait la nuque à un chien,
  - type: text
    content: Celui qui présente une offrande est comme celui qui répandrait du sang de porc,
  - type: text
    content: Celui qui brûle de l’encens est comme celui qui adorerait des idoles;
  - type: text
    content: Tous ceux-là se complaisent dans leurs voies,
  - type: text
    content: Et leur âme trouve du plaisir dans leurs abominations.
  '4':
  - type: text
    content: Moi aussi, je me complairai dans leur infortune,
  - type: text
    content: Et je ferai venir sur eux ce qui cause leur effroi,
  - type: note
    content: Pr 1:24. Jé 7:13.
  - type: text
    content: Parce que j’ai appelé, et qu’ils n’ont point répondu,
  - type: text
    content: Parce que j’ai parlé, et qu’ils n’ont point écouté;
  - type: note
    content: És 65:12.
  - type: text
    content: Mais ils ont fait ce qui est mal à mes yeux,
  - type: text
    content: Et ils ont choisi ce qui me déplaît.
  '5':
  - type: text
    content: Écoutez la parole de l’Éternel,
  - type: text
    content: Vous qui craignez sa parole.
  - type: text
    content: Voici ce que disent vos frères,
  - type: text
    content: Qui vous haïssent et vous repoussent
  - type: text
    content: 'A cause de mon nom:'
  - type: note
    content: És 5:19.
  - type: text
    content: Que l’Éternel montre sa gloire,
  - type: text
    content: Et que nous voyions votre joie!
  - type: text
    content: Mais ils seront confondus.
  '6':
  - type: text
    content: Une voix éclatante sort de la ville,
  - type: text
    content: Une voix sort du temple.
  - type: text
    content: C’est la voix de l’Éternel,
  - type: text
    content: Qui paie à ses ennemis leur salaire.
  - type: heading
    content: Gloire de la nouvelle Jérusalem
  - type: heading
    content: 'V. 7-14: cf. Ro 11:12, 15, 23-26. (És 60:11-18; 65:17-25.) Hé 12:22-24.'
  '7':
  - type: text
    content: Avant d’éprouver les douleurs,
  - type: text
    content: Elle a enfanté;
  - type: text
    content: Avant que les souffrances lui vinssent,
  - type: text
    content: Elle a donné naissance à un fils.
  '8':
  - type: text
    content: Qui a jamais entendu pareille chose
  - type: text
    content: Qui a jamais vu rien de semblable?
  - type: text
    content: Un pays peut-il naître en un jour?
  - type: text
    content: Une nation est-elle enfantée d’un seul coup?
  - type: text
    content: A peine en travail, Sion a enfanté ses fils!
  '9':
  - type: text
    content: Ouvrirais-je le sein maternel,
  - type: text
    content: Pour ne pas laisser enfanter? Dit l’Éternel;
  - type: text
    content: Moi, qui fais naître,
  - type: text
    content: Empêcherais-je d’enfanter? Dit ton Dieu.
