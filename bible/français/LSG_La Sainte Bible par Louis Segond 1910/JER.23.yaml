document_id: JER.23,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contre les bergers infidèles
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. Éz 34. (És 11:1-9. Za 6:12, 13. Lu 1:31-33.)'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Malheur aux '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 34:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: pasteurs qui détruisent et dispersent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le troupeau de mon pâturage! Dit l’Éternel.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Car le pays est '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 5:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: rempli d’adultères;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pays est en deuil à cause de la malédiction;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les plaines du désert sont desséchées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils courent au mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n’ont de la force que pour l’iniquité.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Prophètes et sacrificateurs '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 6:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: sont corrompus;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même dans ma maison j’ai trouvé leur méchanceté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'C’est pourquoi leur chemin sera '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 35:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 73:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'glissant et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 13:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ténébreux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils seront poussés et ils tomberont;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je ferai venir sur eux le malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’année où je les châtierai, dit l’Éternel.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Dans les prophètes de Samarie j’ai vu de l’extravagance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont prophétisé par Baal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont égaré mon peuple d’Israël.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mais dans les prophètes de Jérusalem j’ai vu des choses horribles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont adultères, ils marchent dans le mensonge;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils fortifient les mains des méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin qu’aucun ne revienne de sa méchanceté;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils sont tous à mes yeux comme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Sodome,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les habitants de Jérusalem comme Gomorrhe.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'C’est pourquoi ainsi parle l’Éternel des armées sur les prophètes:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici, je vais les nourrir '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 9:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: d’absinthe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et je leur ferai boire '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 8:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: des eaux empoisonnées;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est par les prophètes de Jérusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l’impiété s’est répandue dans tout le pays.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ainsi parle l’Éternel des armées:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’écoutez pas les paroles des prophètes qui vous prophétisent!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils vous entraînent à des choses de néant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils disent les visions de leur cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et non ce qui vient de la bouche de l’Éternel.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ils '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 6:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 13:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 10:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'disent à ceux qui me méprisent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L’Éternel a dit: Vous aurez la paix;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et ils disent à tous ceux qui suivent les penchants de leur cœur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne vous arrivera aucun mal.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Qui donc a assisté au conseil de l’Éternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour voir, pour écouter sa parole?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a prêté l’oreille à sa parole, qui l’a entendue?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Voici, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 30:23
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: la tempête de l’Éternel, la fureur éclate,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’orage se précipite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fond sur la tête des méchants.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: C’est pourquoi ainsi parle l’Éternel, le Dieu d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sur les pasteurs qui paissent mon peuple:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous avez dispersé mes brebis, vous les avez chassées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous n’en avez pas pris soin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je vous châtierai à cause de la méchanceté de vos actions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: La colère de l’Éternel ne se calmera pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ce qu’il ait accompli, exécuté les desseins de son cœur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous le comprendrez dans la suite des temps.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 14:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je n’ai point envoyé ces prophètes, et ils ont couru;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne leur ai point parlé, et ils ont prophétisé.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: S’ils avaient assisté à mon conseil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils auraient dû faire entendre mes paroles à mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les faire revenir de leur mauvaise voie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la méchanceté de leurs actions.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ne suis-je un Dieu que de près, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne suis-je pas aussi un Dieu de loin?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Quelqu’un se tiendra-t-il dans '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Ps 139:7, etc. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 9:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: un lieu caché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans que je le voie? Dit l’Éternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne remplis-je pas, moi, les cieux et la terre? Dit l’Éternel.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: J’ai entendu ce que disent les prophètes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qui prophétisent en mon nom le mensonge, disant:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai eu un songe! J’ai eu un songe!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Jusques à quand ces prophètes veulent-ils prophétiser le mensonge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prophétiser la tromperie de leur cœur?
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ils pensent faire '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 3:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:33
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '34'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: oublier mon nom à mon peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par les songes que chacun d’eux raconte à son prochain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme leurs pères ont oublié mon nom pour Baal.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Que le prophète qui a eu un songe raconte ce songe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que celui qui a entendu ma parole rapporte fidèlement ma parole.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi mêler la paille au froment? Dit l’Éternel.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ma parole n’est-elle pas comme un feu, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et comme un marteau qui brise le roc?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Et je rassemblerai le reste de mes brebis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De tous les pays où je les ai chassées;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les ramènerai dans leur pâturage;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles seront fécondes et multiplieront.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'C’est pourquoi voici, dit l’Éternel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 18:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 14:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: j’en veux aux prophètes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui se dérobent mes paroles l’un à l’autre.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Voici, dit l’Éternel, j’en veux aux prophètes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui prennent leur propre parole et la donnent pour ma parole.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Voici, dit l’Éternel, j’en veux à ceux qui prophétisent des songes faux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui les racontent, et qui égarent mon peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Par leurs mensonges et par leur '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: So 3:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: témérité;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne les ai point envoyés, je ne leur ai point donné d’ordre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils ne sont d’aucune utilité à ce peuple, dit l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 33-40: cf. És 5:18-19. Éz 12:21, etc. 2 Pi 3:3-4.'
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Si ce peuple, ou un prophète, ou un sacrificateur te demande:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quelle est la menace de l’Éternel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu leur diras quelle est cette menace:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous rejetterai, dit l’Éternel.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Et le prophète, le sacrificateur, ou celui du peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qui dira: Menace de l’Éternel,'
  - type: usfm
    marker: q1
    children:
