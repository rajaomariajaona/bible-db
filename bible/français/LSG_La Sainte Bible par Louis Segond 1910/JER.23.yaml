document_id: JER.23,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre les bergers infidèles
  - type: heading
    content: 'V. 1-8: cf. Éz 34. (És 11:1-9. Za 6:12, 13. Lu 1:31-33.)'
  - type: text
    content: 'Malheur aux '
  - type: note
    content: Éz 34:2.
  - type: text
    content: pasteurs qui détruisent et dispersent
  - type: text
    content: Le troupeau de mon pâturage! Dit l’Éternel.
  '10':
  - type: text
    content: 'Car le pays est '
  - type: note
    content: Jé 5:7, 8; 9:2.
  - type: text
    content: rempli d’adultères;
  - type: text
    content: Le pays est en deuil à cause de la malédiction;
  - type: text
    content: Les plaines du désert sont desséchées.
  - type: text
    content: Ils courent au mal,
  - type: text
    content: Ils n’ont de la force que pour l’iniquité.
  '11':
  - type: text
    content: 'Prophètes et sacrificateurs '
  - type: note
    content: Jé 6:13; 8:10; 14:18.
  - type: text
    content: sont corrompus;
  - type: text
    content: Même dans ma maison j’ai trouvé leur méchanceté,
  - type: text
    content: Dit l’Éternel.
  '12':
  - type: text
    content: 'C’est pourquoi leur chemin sera '
  - type: note
    content: Ps 35:6; 73:18.
  - type: text
    content: 'glissant et '
  - type: note
    content: Jé 13:16.
  - type: text
    content: ténébreux,
  - type: text
    content: Ils seront poussés et ils tomberont;
  - type: text
    content: Car je ferai venir sur eux le malheur,
  - type: text
    content: L’année où je les châtierai, dit l’Éternel.
  '13':
  - type: text
    content: Dans les prophètes de Samarie j’ai vu de l’extravagance;
  - type: text
    content: Ils ont prophétisé par Baal,
  - type: text
    content: Ils ont égaré mon peuple d’Israël.
  '14':
  - type: text
    content: Mais dans les prophètes de Jérusalem j’ai vu des choses horribles;
  - type: text
    content: Ils sont adultères, ils marchent dans le mensonge;
  - type: text
    content: Ils fortifient les mains des méchants,
  - type: text
    content: Afin qu’aucun ne revienne de sa méchanceté;
  - type: text
    content: 'Ils sont tous à mes yeux comme '
  - type: note
    content: És 1:9.
  - type: text
    content: Sodome,
  - type: text
    content: Et les habitants de Jérusalem comme Gomorrhe.
  '15':
  - type: text
    content: 'C’est pourquoi ainsi parle l’Éternel des armées sur les prophètes:'
  - type: text
    content: 'Voici, je vais les nourrir '
  - type: note
    content: Jé 9:15.
  - type: text
    content: d’absinthe,
  - type: text
    content: 'Et je leur ferai boire '
  - type: note
    content: Jé 8:14; 9:15.
  - type: text
    content: des eaux empoisonnées;
  - type: text
    content: Car c’est par les prophètes de Jérusalem
  - type: text
    content: Que l’impiété s’est répandue dans tout le pays.
  '16':
  - type: text
    content: 'Ainsi parle l’Éternel des armées:'
  - type: text
    content: N’écoutez pas les paroles des prophètes qui vous prophétisent!
  - type: text
    content: Ils vous entraînent à des choses de néant;
  - type: text
    content: Ils disent les visions de leur cœur,
  - type: text
    content: Et non ce qui vient de la bouche de l’Éternel.
  '17':
  - type: text
    content: 'Ils '
  - type: note
    content: Jé 6:14; 8:11. Éz 13:10. Za 10:2.
  - type: text
    content: 'disent à ceux qui me méprisent:'
  - type: text
    content: 'L’Éternel a dit: Vous aurez la paix;'
  - type: text
    content: 'Et ils disent à tous ceux qui suivent les penchants de leur cœur:'
  - type: text
    content: Il ne vous arrivera aucun mal.
  '18':
  - type: text
    content: Qui donc a assisté au conseil de l’Éternel
  - type: text
    content: Pour voir, pour écouter sa parole?
  - type: text
    content: Qui a prêté l’oreille à sa parole, qui l’a entendue?
  '19':
  - type: text
    content: 'Voici, '
  - type: note
    content: Jé 30:23, 24.
  - type: text
    content: la tempête de l’Éternel, la fureur éclate,
  - type: text
    content: L’orage se précipite,
  - type: text
    content: Il fond sur la tête des méchants.
  '2':
  - type: text
    content: C’est pourquoi ainsi parle l’Éternel, le Dieu d’Israël,
  - type: text
    content: 'Sur les pasteurs qui paissent mon peuple:'
  - type: text
    content: Vous avez dispersé mes brebis, vous les avez chassées,
  - type: text
    content: Vous n’en avez pas pris soin;
  - type: text
    content: Voici, je vous châtierai à cause de la méchanceté de vos actions,
  - type: text
    content: Dit l’Éternel.
  '20':
  - type: text
    content: La colère de l’Éternel ne se calmera pas,
  - type: text
    content: Jusqu’à ce qu’il ait accompli, exécuté les desseins de son cœur.
  - type: text
    content: Vous le comprendrez dans la suite des temps.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Jé 14:14.
  - type: text
    content: Je n’ai point envoyé ces prophètes, et ils ont couru;
  - type: text
    content: Je ne leur ai point parlé, et ils ont prophétisé.
  '22':
  - type: text
    content: S’ils avaient assisté à mon conseil,
  - type: text
    content: Ils auraient dû faire entendre mes paroles à mon peuple,
  - type: text
    content: Et les faire revenir de leur mauvaise voie,
  - type: text
    content: De la méchanceté de leurs actions.
  '23':
  - type: text
    content: Ne suis-je un Dieu que de près, dit l’Éternel,
  - type: text
    content: Et ne suis-je pas aussi un Dieu de loin?
  '24':
  - type: text
    content: 'Quelqu’un se tiendra-t-il dans '
  - type: note
    content: Ps 139:7, etc. Am 9:2, 3.
  - type: text
    content: un lieu caché,
  - type: text
    content: Sans que je le voie? Dit l’Éternel.
  - type: text
    content: Ne remplis-je pas, moi, les cieux et la terre? Dit l’Éternel.
  '25':
  - type: text
    content: J’ai entendu ce que disent les prophètes
  - type: text
    content: 'Qui prophétisent en mon nom le mensonge, disant:'
  - type: text
    content: J’ai eu un songe! J’ai eu un songe!
  '26':
  - type: text
    content: Jusques à quand ces prophètes veulent-ils prophétiser le mensonge,
  - type: text
    content: Prophétiser la tromperie de leur cœur?
  '27':
  - type: text
    content: 'Ils pensent faire '
  - type: note
    content: Jg 3:7; 8:33, 34.
  - type: text
    content: oublier mon nom à mon peuple
  - type: text
    content: Par les songes que chacun d’eux raconte à son prochain,
  - type: text
    content: Comme leurs pères ont oublié mon nom pour Baal.
  '28':
  - type: text
    content: Que le prophète qui a eu un songe raconte ce songe,
  - type: text
    content: Et que celui qui a entendu ma parole rapporte fidèlement ma parole.
  - type: text
    content: Pourquoi mêler la paille au froment? Dit l’Éternel.
  '29':
  - type: text
    content: Ma parole n’est-elle pas comme un feu, dit l’Éternel,
  - type: text
    content: Et comme un marteau qui brise le roc?
  '3':
  - type: text
    content: Et je rassemblerai le reste de mes brebis
  - type: text
    content: De tous les pays où je les ai chassées;
  - type: text
    content: Je les ramènerai dans leur pâturage;
  - type: text
    content: Elles seront fécondes et multiplieront.
  '30':
  - type: text
    content: 'C’est pourquoi voici, dit l’Éternel, '
  - type: note
    content: De 18:20. Jé 14:14, 15.
  - type: text
    content: j’en veux aux prophètes
  - type: text
    content: Qui se dérobent mes paroles l’un à l’autre.
  '31':
  - type: text
    content: Voici, dit l’Éternel, j’en veux aux prophètes
  - type: text
    content: Qui prennent leur propre parole et la donnent pour ma parole.
  '32':
  - type: text
    content: Voici, dit l’Éternel, j’en veux à ceux qui prophétisent des songes faux,
  - type: text
    content: Qui les racontent, et qui égarent mon peuple
  - type: text
    content: 'Par leurs mensonges et par leur '
  - type: note
    content: So 3:4.
  - type: text
    content: témérité;
  - type: text
    content: Je ne les ai point envoyés, je ne leur ai point donné d’ordre,
  - type: text
    content: Et ils ne sont d’aucune utilité à ce peuple, dit l’Éternel.
  - type: heading
    content: 'V. 33-40: cf. És 5:18-19. Éz 12:21, etc. 2 Pi 3:3-4.'
  '33':
  - type: text
    content: 'Si ce peuple, ou un prophète, ou un sacrificateur te demande:'
  - type: text
    content: Quelle est la menace de l’Éternel?
  - type: text
    content: 'Tu leur diras quelle est cette menace:'
  - type: text
    content: Je vous rejetterai, dit l’Éternel.
  '34':
  - type: text
    content: Et le prophète, le sacrificateur, ou celui du peuple
  - type: text
    content: 'Qui dira: Menace de l’Éternel,'
  - type: text
    content: Je le châtierai, lui et sa maison.
  '35':
  - type: text
    content: 'Vous direz, chacun à son prochain, chacun à son frère:'
  - type: text
    content: Qu’a répondu l’Éternel?
  - type: text
    content: Qu’a dit l’Éternel?
  '36':
  - type: text
    content: 'Mais vous ne direz plus: Menace de l’Éternel!'
  - type: text
    content: Car la parole de chacun sera pour lui une menace;
  - type: text
    content: Vous tordez les paroles du Dieu vivant,
  - type: text
    content: De l’Éternel des armées, notre Dieu.
  '37':
  - type: text
    content: 'Tu diras au prophète:'
  - type: text
    content: Que t’a répondu l’Éternel?
  - type: text
    content: Qu’a dit l’Éternel?
  '38':
  - type: text
    content: 'Et si vous dites encore: Menace de l’Éternel!'
  - type: text
    content: 'Alors ainsi parle l’Éternel:'
  - type: text
    content: 'Parce que vous dites ce mot: Menace de l’Éternel!'
  - type: text
    content: 'Quoique j’aie envoyé vers vous pour dire:'
  - type: text
    content: 'Vous ne direz pas: Menace de l’Éternel!'
  '39':
  - type: text
    content: A cause de cela voici, je vous oublierai,
  - type: text
    content: Et je vous rejetterai, vous et la ville
  - type: text
    content: Que j’avais donnée à vous et à vos pères,
  - type: text
    content: Je vous rejetterai loin de ma face;
  '4':
  - type: text
    content: 'J’établirai sur elles des '
  - type: note
    content: Éz 34:11, 12.
  - type: text
    content: pasteurs qui les paîtront;
  - type: text
    content: Elles n’auront plus de crainte, plus de terreur,
  - type: text
    content: Et il n’en manquera aucune, dit l’Éternel.
  '40':
  - type: text
    content: Je mettrai sur vous un opprobre éternel
  - type: note
    content: Jé 20:11.
  - type: text
    content: Et une honte éternelle,
  - type: text
    content: Qui ne s’oublieront pas.
  '5':
  - type: text
    content: 'Voici, '
  - type: note
    content: És 4:2; 40:11. Jé 33:14, 15. Da 9:24. Lu 1:32, 33.
  - type: text
    content: les jours viennent, dit l’Éternel,
  - type: text
    content: Où je susciterai à David un germe juste;
  - type: text
    content: Il régnera en roi et prospérera,
  - type: text
    content: Il pratiquera la justice et l’équité dans le pays.
  '6':
  - type: text
    content: ' '
  - type: note
    content: De 33:28.
  - type: text
    content: En son temps, Juda sera sauvé,
  - type: text
    content: Israël aura la sécurité dans sa demeure;
  - type: text
    content: 'Et voici le nom dont on l’appellera:'
  - type: text
    content: L’Éternel notre justice.
  '7':
  - type: text
    content: 'C’est pourquoi voici, '
  - type: note
    content: Jé 16:14, 15.
  - type: text
    content: les jours viennent, dit l’Éternel,
  - type: text
    content: 'Où l’on ne dira plus: L’Éternel est vivant,'
  - type: text
    content: Lui qui a fait monter du pays d’Égypte les enfants d’Israël!
  '8':
  - type: text
    content: 'Mais on dira: L’Éternel est vivant,'
  - type: text
    content: Lui qui a fait monter et qui a ramené
  - type: text
    content: La postérité de la maison d’Israël du pays du septentrion
  - type: text
    content: Et de tous les pays où je les avais chassés!
  - type: text
    content: Et ils habiteront dans leur pays.
  - type: heading
    content: Contre les faux prophètes
  - type: heading
    content: 'V. 9-32: cf. Jé 14:13-16; 27:9, etc. La 2:14. Éz 13.'
  '9':
  - type: text
    content: Sur les prophètes.
  - type: text
    content: Mon cœur est brisé au-dedans de moi,
  - type: text
    content: Tous mes os tremblent;
  - type: text
    content: Je suis comme un homme ivre,
  - type: text
    content: Comme un homme pris de vin,
  - type: text
    content: A cause de l’Éternel et à cause de ses paroles saintes.
