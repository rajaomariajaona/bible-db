document_id: JHN.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus retourne en Judée. Résurrection de Lazare à Béthanie
  - type: heading
    content: 'V. 1-46: cf. Lu 10:38-42. (Jn 5:21, 26-29; 6:40.) Mc 5:35-43. Lu 7:11-16. Ac 9:36-42.'
  - type: text
    content: 'Il y avait un homme malade, Lazare, de Béthanie, village de Marie et de Marthe, sa sœur. '
  '10':
  - type: text
    content: ' '
  - type: text
    content: mais, si quelqu’un marche pendant la nuit, il bronche, parce que la lumière n’est pas en lui.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Après ces paroles, il leur dit: '
  - type: text
    content: Lazare, notre ami,
  - type: text
    content: ' '
  - type: note
    content: Mt 9:24. Mc 5:39. Lu 8:52.
  - type: text
    content: dort; mais je vais le réveiller.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Les disciples lui dirent: Seigneur, s’il dort, il sera guéri. '
  '13':
  - type: text
    content: 'Jésus avait parlé de sa mort, mais ils crurent qu’il parlait de l’assoupissement du sommeil. '
  '14':
  - type: text
    content: 'Alors Jésus leur dit ouvertement: '
  - type: text
    content: Lazare est mort.
  '15':
  - type: text
    content: ' '
  - type: text
    content: Et, à cause de vous, afin que vous croyiez, je me réjouis de ce que je n’étais pas là. Mais allons vers lui.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Sur quoi Thomas, appelé Didyme, dit aux autres disciples: Allons aussi, afin de mourir avec lui. '
  '17':
  - type: text
    content: 'Jésus, étant arrivé, trouva que Lazare était déjà depuis quatre jours dans le sépulcre. '
  '18':
  - type: text
    content: 'Et, comme Béthanie était près de Jérusalem, à quinze stades environ, '
  '19':
  - type: text
    content: 'beaucoup de Juifs étaient venus vers Marthe et Marie, pour les consoler de la mort de leur frère. '
  '2':
  - type: note
    content: Mt 26:6. Mc 14:3. Lu 7:37. Jn 12:3.
  - type: text
    content: 'C’était cette Marie qui oignit de parfum le Seigneur et qui lui essuya les pieds avec ses cheveux, et c’était son frère Lazare qui était malade. '
  '20':
  - type: text
    content: 'Lorsque Marthe apprit que Jésus arrivait, elle alla au-devant de lui, tandis que Marie se tenait assise à la maison. '
  '21':
  - type: text
    content: 'Marthe dit à Jésus: Seigneur, si tu eusses été ici, mon frère ne serait pas mort. '
  '22':
  - type: text
    content: 'Mais, maintenant même, je sais que tout ce que tu demanderas à Dieu, Dieu te l’accordera. '
  '23':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: Ton frère ressuscitera.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Je sais, lui répondit Marthe, qu’il ressuscitera à la '
  - type: note
    content: Da 12:2. Lu 14:14. Jn 5:29.
  - type: text
    content: 'résurrection, au dernier jour. '
  '25':
  - type: text
    content: 'Jésus lui dit: '
  - type: note
    content: Jn 1:4; 5:24; 14:6.
  - type: text
    content: Je suis la résurrection et la vie.
  - type: text
    content: ' '
  - type: note
    content: Jn 3:16, 36; 6:47. 1 Jn 5:10.
  - type: text
    content: Celui qui croit en moi vivra, quand même il serait mort;
  '26':
  - type: text
    content: ' '
  - type: note
    content: Jn 6:51.
  - type: text
    content: et quiconque vit et croit en moi ne mourra jamais. Crois-tu cela?
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Elle lui dit: Oui, Seigneur, '
  - type: note
    content: Mt 16:16. Mc 8:29. Lu 9:20. Jn 6:69.
  - type: text
    content: 'je crois que tu es le Christ, le Fils de Dieu, qui devait venir dans le monde. '
  '28':
  - type: text
    content: 'Ayant ainsi parlé, elle s’en alla. Puis elle appela secrètement Marie, sa sœur, et lui dit: Le maître est ici, et il te demande. '
  '29':
  - type: text
    content: 'Dès que Marie eut entendu, elle se leva promptement, et alla vers lui. '
  '3':
  - type: text
    content: 'Les sœurs envoyèrent dire à Jésus: Seigneur, voici, celui que tu aimes est malade. '
  '30':
  - type: text
    content: 'Car Jésus n’était pas encore entré dans le village, mais il était dans le lieu où Marthe l’avait rencontré. '
  '31':
  - type: text
    content: 'Les Juifs qui étaient avec Marie dans la maison et qui la consolaient, l’ayant vue se lever promptement et sortir, la suivirent, disant: Elle va au sépulcre, pour y pleurer. '
  '32':
  - type: text
    content: 'Lorsque Marie fut arrivée là où était Jésus, et qu’elle le vit, elle tomba à ses pieds, et lui dit: Seigneur, si tu eusses été ici, mon frère ne serait pas mort. '
  '33':
  - type: text
    content: 'Jésus, la voyant pleurer, elle et les Juifs qui étaient venus avec elle, frémit en son esprit, et fut tout ému. '
  '34':
  - type: text
    content: 'Et il dit: '
  - type: text
    content: Où l’avez-vous mis?
  - type: text
    content: ' Seigneur, lui répondirent-ils, viens et vois. '
  '35':
  - type: note
    content: Lu 19:41.
  - type: text
    content: 'Jésus pleura. '
  '36':
  - type: text
    content: 'Sur quoi les Juifs dirent: Voyez comme il l’aimait. '
  '37':
  - type: text
    content: 'Et quelques-uns d’entre eux dirent: '
  - type: note
    content: Jn 9:6.
  - type: text
    content: 'Lui qui a ouvert les yeux de l’aveugle, ne pouvait-il pas faire aussi que cet homme ne mourût point? '
  '38':
  - type: text
    content: 'Jésus frémissant de nouveau en lui-même, se rendit au sépulcre. C’était une grotte, et une pierre était placée devant. '
  '39':
  - type: text
    content: 'Jésus dit: '
  - type: text
    content: Otez la pierre.
  - type: text
    content: ' Marthe, la sœur du mort, lui dit: Seigneur, il sent déjà, car il y a quatre jours qu’il est là. '
  '4':
  - type: text
    content: 'Après avoir entendu cela, Jésus dit: '
  - type: text
    content: Cette maladie n’est point à la mort;
  - type: text
    content: ' '
  - type: note
    content: Jn 9:3; 11:40.
  - type: text
    content: mais elle est pour la gloire de Dieu, afin que le Fils de Dieu soit glorifié par elle.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: Ne t’ai-je pas dit que, si tu crois, tu verras la gloire de Dieu?
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'Ils ôtèrent donc la pierre. Et Jésus leva les yeux en haut, et dit: '
  - type: text
    content: Père, je te rends grâces de ce que tu m’as exaucé.
  '42':
  - type: text
    content: ' '
  - type: text
    content: Pour moi, je savais que tu m’exauces toujours; mais j’ai parlé
  - type: text
    content: ' '
  - type: note
    content: Jn 12:30.
  - type: text
    content: à cause de la foule qui m’entoure, afin qu’ils croient que c’est toi qui m’as envoyé.
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'Ayant dit cela, il cria d’une voix forte: '
  - type: text
    content: Lazare, sors!
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Et le mort sortit, les pieds et les mains liés de bandes, et le visage enveloppé '
  - type: note
    content: Jn 20:7.
  - type: text
    content: 'd’un linge. Jésus leur dit: '
  - type: text
    content: Déliez-le, et laissez-le aller.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Plusieurs des Juifs qui étaient venus vers Marie, et qui virent ce que fit Jésus, crurent en lui. '
  '46':
  - type: text
    content: Mais quelques-uns d’entre eux allèrent trouver les pharisiens, et leur dirent ce que Jésus avait fait.
  - type: heading
    content: Assemblée du sanhédrin et décision contre Jésus. Séjour à Éphraïm
  - type: heading
    content: 'V. 47-54: cf. Lu 16:31. Jn 15:24, 25. Ps 71:10.'
  '47':
  - type: text
    content: ' '
  - type: note
    content: Ps 2:2. Mt 26:3. Mc 14:1. Lu 22:2. Ac 4:27.
  - type: text
    content: 'Alors les principaux sacrificateurs et les pharisiens assemblèrent le sanhédrin, et dirent: '
  - type: note
    content: Jn 12:19.
  - type: text
    content: 'Que ferons-nous? Car cet homme fait beaucoup de miracles. '
  '48':
  - type: text
    content: 'Si nous le laissons faire, tous croiront en lui, et les Romains viendront détruire et notre ville et notre nation. '
  '49':
  - type: text
    content: 'L’un d’eux, Caïphe, qui était souverain sacrificateur cette année-là, leur dit: Vous n’y entendez rien; '
  '5':
  - type: text
    content: 'Or, Jésus aimait Marthe, et sa sœur, et Lazare. '
  '50':
  - type: text
    content: 'vous ne réfléchissez pas '
  - type: note
    content: Jn 18:14.
  - type: text
    content: 'qu’il est dans votre intérêt qu’un seul homme meure pour le peuple, et que la nation entière ne périsse pas. '
  '51':
  - type: text
    content: 'Or, il ne dit pas cela de lui-même; mais étant souverain sacrificateur cette année-là, il prophétisa que Jésus devait mourir pour la nation. '
  '52':
  - type: text
    content: 'Et ce n’était pas pour la nation seulement; c’était aussi afin de '
  - type: note
    content: Ép 2:14, 15, 16.
  - type: text
    content: 'réunir en un seul corps les enfants de Dieu dispersés. '
  '53':
  - type: text
    content: 'Dès ce jour, ils résolurent de le faire mourir. '
  '54':
  - type: text
    content: C’est pourquoi Jésus ne se montra plus ouvertement parmi les Juifs; mais il se retira dans la contrée voisine du désert, dans une ville appelée Éphraïm; et là il demeurait avec ses disciples.
  - type: heading
    content: Approche de la Pâque. Jésus attendu à Jérusalem
  - type: heading
    content: 'V. 55-57: cf. Jn 7:11. Ps 31:14.'
  '55':
  - type: text
    content: 'La Pâque des Juifs était proche. Et beaucoup de gens du pays montèrent à Jérusalem avant la Pâque, pour se purifier. '
  '56':
  - type: note
    content: Jn 7:11.
  - type: text
    content: 'Ils cherchaient Jésus, et ils se disaient les uns aux autres dans le temple: Que vous en semble? Ne viendra-t-il pas à la fête? '
  '57':
  - type: text
    content: Or, les principaux sacrificateurs et les pharisiens avaient donné l’ordre que, si quelqu’un savait où il était, il le déclarât, afin qu’on se saisît de lui.
  '6':
  - type: text
    content: 'Lors donc qu’il eut appris que Lazare était malade, il resta deux jours encore dans le lieu où il était, '
  '7':
  - type: text
    content: 'et il dit ensuite aux disciples: '
  - type: text
    content: Retournons en Judée.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Les disciples lui dirent: Rabbi, '
  - type: note
    content: Jn 8:59; 10:31.
  - type: text
    content: 'les Juifs tout récemment cherchaient à te lapider, et tu retournes en Judée! '
  '9':
  - type: text
    content: 'Jésus répondit: '
  - type: text
    content: N’y a-t-il pas douze heures au jour? Si quelqu’un marche pendant le jour, il ne bronche point, parce qu’il voit la lumière de ce monde;
