document_id: JHN.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus retourne en Judée. Résurrection de Lazare à Béthanie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-46: cf. Lu 10:38-42. (Jn 5:21, 26-29; 6:40.) Mc 5:35-43. Lu 7:11-16. Ac 9:36-42.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il y avait un homme malade, Lazare, de Béthanie, village de Marie et de Marthe, sa sœur. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:6
      metadata:
        usfm: MAT.26.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:3
      metadata:
        usfm: MRK.14.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 7:37
      metadata:
        usfm: LUK.7.37
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:3
      metadata:
        usfm: JHN.12.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’était cette Marie qui oignit de parfum le Seigneur et qui lui essuya les pieds avec ses cheveux, et c’était son frère Lazare qui était malade. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les sœurs envoyèrent dire à Jésus: Seigneur, voici, celui que tu aimes est malade. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Après avoir entendu cela, Jésus dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Cette maladie n’est point à la mort;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 9:3
      metadata:
        usfm: JHN.9.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:40
      metadata:
        usfm: JHN.11.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais elle est pour la gloire de Dieu, afin que le Fils de Dieu soit glorifié par elle.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Or, Jésus aimait Marthe, et sa sœur, et Lazare. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lors donc qu’il eut appris que Lazare était malade, il resta deux jours encore dans le lieu où il était, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et il dit ensuite aux disciples: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Retournons en Judée.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les disciples lui dirent: Rabbi, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 8:59
      metadata:
        usfm: JHN.8.59
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:31
      metadata:
        usfm: JHN.10.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les Juifs tout récemment cherchaient à te lapider, et tu retournes en Judée! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jésus répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: N’y a-t-il pas douze heures au jour? Si quelqu’un marche pendant le jour, il ne bronche point, parce qu’il voit la lumière de ce monde;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais, si quelqu’un marche pendant la nuit, il bronche, parce que la lumière n’est pas en lui.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Après ces paroles, il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Lazare, notre ami,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:24
      metadata:
        usfm: MAT.9.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 5:39
      metadata:
        usfm: MRK.5.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:52
      metadata:
        usfm: LUK.8.52
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: dort; mais je vais le réveiller.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les disciples lui dirent: Seigneur, s’il dort, il sera guéri. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jésus avait parlé de sa mort, mais ils crurent qu’il parlait de l’assoupissement du sommeil. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors Jésus leur dit ouvertement: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Lazare est mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et, à cause de vous, afin que vous croyiez, je me réjouis de ce que je n’étais pas là. Mais allons vers lui.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Sur quoi Thomas, appelé Didyme, dit aux autres disciples: Allons aussi, afin de mourir avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jésus, étant arrivé, trouva que Lazare était déjà depuis quatre jours dans le sépulcre. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et, comme Béthanie était près de Jérusalem, à quinze stades environ, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'beaucoup de Juifs étaient venus vers Marthe et Marie, pour les consoler de la mort de leur frère. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Lorsque Marthe apprit que Jésus arrivait, elle alla au-devant de lui, tandis que Marie se tenait assise à la maison. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Marthe dit à Jésus: Seigneur, si tu eusses été ici, mon frère ne serait pas mort. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais, maintenant même, je sais que tout ce que tu demanderas à Dieu, Dieu te l’accordera. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ton frère ressuscitera.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Je sais, lui répondit Marthe, qu’il ressuscitera à la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 12:2
      metadata:
        usfm: DAN.12.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 14:14
      metadata:
        usfm: LUK.14.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 5:29
      metadata:
        usfm: JHN.5.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'résurrection, au dernier jour. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jésus lui dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:4
      metadata:
        usfm: JHN.1.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:24
      metadata:
        usfm: JHN.5.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:6
      metadata:
        usfm: JHN.14.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je suis la résurrection et la vie.
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:16
      metadata:
        usfm: JHN.3.16
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '36'
      metadata:
        usfm: JHN.3.36
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:47
      metadata:
        usfm: JHN.6.47
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 5:10
      metadata:
        usfm: 1JN.5.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui croit en moi vivra, quand même il serait mort;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:51
      metadata:
        usfm: JHN.6.51
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et quiconque vit et croit en moi ne mourra jamais. Crois-tu cela?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Elle lui dit: Oui, Seigneur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 16:16
      metadata:
        usfm: MAT.16.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 8:29
      metadata:
        usfm: MRK.8.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:20
      metadata:
        usfm: LUK.9.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:69
      metadata:
        usfm: JHN.6.69
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je crois que tu es le Christ, le Fils de Dieu, qui devait venir dans le monde. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ayant ainsi parlé, elle s’en alla. Puis elle appela secrètement Marie, sa sœur, et lui dit: Le maître est ici, et il te demande. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dès que Marie eut entendu, elle se leva promptement, et alla vers lui. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Car Jésus n’était pas encore entré dans le village, mais il était dans le lieu où Marthe l’avait rencontré. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Les Juifs qui étaient avec Marie dans la maison et qui la consolaient, l’ayant vue se lever promptement et sortir, la suivirent, disant: Elle va au sépulcre, pour y pleurer. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Lorsque Marie fut arrivée là où était Jésus, et qu’elle le vit, elle tomba à ses pieds, et lui dit: Seigneur, si tu eusses été ici, mon frère ne serait pas mort. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Jésus, la voyant pleurer, elle et les Juifs qui étaient venus avec elle, frémit en son esprit, et fut tout ému. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Et il dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Où l’avez-vous mis?
  - type: text
    text: ' Seigneur, lui répondirent-ils, viens et vois. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 19:41
      metadata:
        usfm: LUK.19.41
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus pleura. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Sur quoi les Juifs dirent: Voyez comme il l’aimait. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Et quelques-uns d’entre eux dirent: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 9:6
      metadata:
        usfm: JHN.9.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lui qui a ouvert les yeux de l’aveugle, ne pouvait-il pas faire aussi que cet homme ne mourût point? '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Jésus frémissant de nouveau en lui-même, se rendit au sépulcre. C’était une grotte, et une pierre était placée devant. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Jésus dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Otez la pierre.
  - type: text
    text: ' Marthe, la sœur du mort, lui dit: Seigneur, il sent déjà, car il y a quatre jours qu’il est là. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne t’ai-je pas dit que, si tu crois, tu verras la gloire de Dieu?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ils ôtèrent donc la pierre. Et Jésus leva les yeux en haut, et dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Père, je te rends grâces de ce que tu m’as exaucé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pour moi, je savais que tu m’exauces toujours; mais j’ai parlé
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:30
      metadata:
        usfm: JHN.12.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: à cause de la foule qui m’entoure, afin qu’ils croient que c’est toi qui m’as envoyé.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ayant dit cela, il cria d’une voix forte: '
  - type: usfm
    marker: wj
    children:
    - type: text
