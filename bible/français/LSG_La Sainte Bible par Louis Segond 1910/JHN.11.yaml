    text: 'Que ferons-nous? Car cet homme fait beaucoup de miracles. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Si nous le laissons faire, tous croiront en lui, et les Romains viendront détruire et notre ville et notre nation. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'L’un d’eux, Caïphe, qui était souverain sacrificateur cette année-là, leur dit: Vous n’y entendez rien; '
  - type: usfm
    marker: v
    metadata:
