document_id: JHN.11,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus retourne en Judée. Résurrection de Lazare à Béthanie
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-46: cf. Lu 10:38-42. (Jn 5:21, 26-29; 6:40.) Mc 5:35-43. Lu 7:11-16. Ac 9:36-42.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait un homme malade, Lazare, de Béthanie, village de Marie et de Marthe, sa sœur. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: mais, si quelqu’un marche pendant la nuit, il bronche, parce que la lumière n’est pas en lui.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après ces paroles, il leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lazare, notre ami,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 9:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 5:39
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 8:52
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: dort; mais je vais le réveiller.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les disciples lui dirent: Seigneur, s’il dort, il sera guéri. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus avait parlé de sa mort, mais ils crurent qu’il parlait de l’assoupissement du sommeil. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus leur dit ouvertement: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lazare est mort.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et, à cause de vous, afin que vous croyiez, je me réjouis de ce que je n’étais pas là. Mais allons vers lui.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sur quoi Thomas, appelé Didyme, dit aux autres disciples: Allons aussi, afin de mourir avec lui. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, étant arrivé, trouva que Lazare était déjà depuis quatre jours dans le sépulcre. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et, comme Béthanie était près de Jérusalem, à quinze stades environ, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'beaucoup de Juifs étaient venus vers Marthe et Marie, pour les consoler de la mort de leur frère. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 7:37
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 12:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'C’était cette Marie qui oignit de parfum le Seigneur et qui lui essuya les pieds avec ses cheveux, et c’était son frère Lazare qui était malade. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Marthe apprit que Jésus arrivait, elle alla au-devant de lui, tandis que Marie se tenait assise à la maison. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Marthe dit à Jésus: Seigneur, si tu eusses été ici, mon frère ne serait pas mort. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, maintenant même, je sais que tout ce que tu demanderas à Dieu, Dieu te l’accordera. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ton frère ressuscitera.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je sais, lui répondit Marthe, qu’il ressuscitera à la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Da 12:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 14:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 5:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'résurrection, au dernier jour. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je suis la résurrection et la vie.
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 3:16
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '36'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:47
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 5:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Celui qui croit en moi vivra, quand même il serait mort;
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6:51
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et quiconque vit et croit en moi ne mourra jamais. Crois-tu cela?
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle lui dit: Oui, Seigneur, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 8:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6:69
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'je crois que tu es le Christ, le Fils de Dieu, qui devait venir dans le monde. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ayant ainsi parlé, elle s’en alla. Puis elle appela secrètement Marie, sa sœur, et lui dit: Le maître est ici, et il te demande. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dès que Marie eut entendu, elle se leva promptement, et alla vers lui. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les sœurs envoyèrent dire à Jésus: Seigneur, voici, celui que tu aimes est malade. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car Jésus n’était pas encore entré dans le village, mais il était dans le lieu où Marthe l’avait rencontré. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Juifs qui étaient avec Marie dans la maison et qui la consolaient, l’ayant vue se lever promptement et sortir, la suivirent, disant: Elle va au sépulcre, pour y pleurer. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Marie fut arrivée là où était Jésus, et qu’elle le vit, elle tomba à ses pieds, et lui dit: Seigneur, si tu eusses été ici, mon frère ne serait pas mort. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, la voyant pleurer, elle et les Juifs qui étaient venus avec elle, frémit en son esprit, et fut tout ému. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Où l’avez-vous mis?
    - type: text
      text: ' Seigneur, lui répondirent-ils, viens et vois. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 19:41
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus pleura. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sur quoi les Juifs dirent: Voyez comme il l’aimait. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et quelques-uns d’entre eux dirent: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 9:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Lui qui a ouvert les yeux de l’aveugle, ne pouvait-il pas faire aussi que cet homme ne mourût point? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus frémissant de nouveau en lui-même, se rendit au sépulcre. C’était une grotte, et une pierre était placée devant. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Otez la pierre.
    - type: text
      text: ' Marthe, la sœur du mort, lui dit: Seigneur, il sent déjà, car il y a quatre jours qu’il est là. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir entendu cela, Jésus dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Cette maladie n’est point à la mort;
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 9:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:40
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: mais elle est pour la gloire de Dieu, afin que le Fils de Dieu soit glorifié par elle.
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ne t’ai-je pas dit que, si tu crois, tu verras la gloire de Dieu?
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ôtèrent donc la pierre. Et Jésus leva les yeux en haut, et dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Père, je te rends grâces de ce que tu m’as exaucé.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pour moi, je savais que tu m’exauces toujours; mais j’ai parlé
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 12:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: à cause de la foule qui m’entoure, afin qu’ils croient que c’est toi qui m’as envoyé.
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ayant dit cela, il cria d’une voix forte: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lazare, sors!
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et le mort sortit, les pieds et les mains liés de bandes, et le visage enveloppé '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 20:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’un linge. Jésus leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Déliez-le, et laissez-le aller.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Plusieurs des Juifs qui étaient venus vers Marie, et qui virent ce que fit Jésus, crurent en lui. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais quelques-uns d’entre eux allèrent trouver les pharisiens, et leur dirent ce que Jésus avait fait.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Assemblée du sanhédrin et décision contre Jésus. Séjour à Éphraïm
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 47-54: cf. Lu 16:31. Jn 15:24, 25. Ps 71:10.'
    marker-yv: yv-h
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 2:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 4:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors les principaux sacrificateurs et les pharisiens assemblèrent le sanhédrin, et dirent: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 12:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Que ferons-nous? Car cet homme fait beaucoup de miracles. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si nous le laissons faire, tous croiront en lui, et les Romains viendront détruire et notre ville et notre nation. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’un d’eux, Caïphe, qui était souverain sacrificateur cette année-là, leur dit: Vous n’y entendez rien; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, Jésus aimait Marthe, et sa sœur, et Lazare. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'vous ne réfléchissez pas '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 18:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qu’il est dans votre intérêt qu’un seul homme meure pour le peuple, et que la nation entière ne périsse pas. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, il ne dit pas cela de lui-même; mais étant souverain sacrificateur cette année-là, il prophétisa que Jésus devait mourir pour la nation. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ce n’était pas pour la nation seulement; c’était aussi afin de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 2:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'réunir en un seul corps les enfants de Dieu dispersés. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dès ce jour, ils résolurent de le faire mourir. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est pourquoi Jésus ne se montra plus ouvertement parmi les Juifs; mais il se retira dans la contrée voisine du désert, dans une ville appelée Éphraïm; et là il demeurait avec ses disciples.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Approche de la Pâque. Jésus attendu à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 55-57: cf. Jn 7:11. Ps 31:14.'
    marker-yv: yv-h
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La Pâque des Juifs était proche. Et beaucoup de gens du pays montèrent à Jérusalem avant la Pâque, pour se purifier. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 7:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils cherchaient Jésus, et ils se disaient les uns aux autres dans le temple: Que vous en semble? Ne viendra-t-il pas à la fête? '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or, les principaux sacrificateurs et les pharisiens avaient donné l’ordre que, si quelqu’un savait où il était, il le déclarât, afin qu’on se saisît de lui.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lors donc qu’il eut appris que Lazare était malade, il resta deux jours encore dans le lieu où il était, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et il dit ensuite aux disciples: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Retournons en Judée.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les disciples lui dirent: Rabbi, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 8:59
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'les Juifs tout récemment cherchaient à te lapider, et tu retournes en Judée! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus répondit: '
    - type: usfm
      marker: wj
