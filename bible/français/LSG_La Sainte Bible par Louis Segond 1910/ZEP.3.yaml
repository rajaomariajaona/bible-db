document_id: ZEP.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Châtiment de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. Éz 22. Jé 25:4, etc. Mt 23:37-39.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Malheur à la ville rebelle et souillée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la ville pleine d’oppresseurs!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: D’au-delà des fleuves de l’Éthiopie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes adorateurs, mes dispersés, m’apporteront des offrandes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: En ce jour-là, tu n’auras plus à rougir de toutes tes actions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par lesquelles tu as péché contre moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car alors j’ôterai du milieu de toi ceux qui triomphaient avec arrogance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu ne t’enorgueilliras plus sur ma montagne sainte.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je laisserai au milieu de toi un peuple humble et petit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui trouvera son refuge dans le nom de l’Éternel.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Les restes d’Israël ne commettront point d’iniquité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne diront point de mensonges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il ne se trouvera pas dans leur bouche une langue trompeuse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ils paîtront, ils se reposeront, et personne ne les troublera.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Pousse des cris de joie, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 9:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: fille de Sion!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pousse des cris d’allégresse, Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Réjouis-toi et triomphe de tout ton cœur, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 9:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: fille de Jérusalem!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: L’Éternel a détourné tes châtiments,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a éloigné ton ennemi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le roi d’Israël, l’Éternel, est au milieu de toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu n’as plus de malheur à éprouver.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'En ce jour-là, on dira à Jérusalem: Ne crains rien!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sion, que tes mains ne s’affaiblissent pas!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: L’Éternel, ton Dieu, est au milieu de toi, comme un héros qui sauve;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fera de toi sa plus grande joie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il gardera le silence dans son amour;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il aura pour toi des transports d’allégresse.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Je rassemblerai ceux qui sont dans la tristesse, loin des fêtes solennelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui sont sortis de ton sein;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’opprobre pèse sur eux.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Voici, en ce temps-là, j’agirai contre tous tes oppresseurs;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je délivrerai les boiteux et je recueillerai ceux qui ont été chassés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai d’eux un sujet de louange et de gloire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans tous les pays où ils sont en opprobre.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Elle n’écoute aucune voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle n’a point égard à la correction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle ne se confie pas en l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle ne s’approche pas de son Dieu.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: En ce temps-là, je vous ramènerai;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce temps-là, je vous rassemblerai;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je ferai de vous un sujet de gloire et de louange
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parmi tous les peuples de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je ramènerai vos captifs sous vos yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 28:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 22:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ses chefs au milieu d’elle sont des lions rugissants;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses juges sont des loups du soir qui ne gardent rien pour le matin.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 23:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '32'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 9:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ses prophètes sont téméraires, infidèles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses sacrificateurs profanent les choses saintes, violent la loi.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: L’Éternel est juste au milieu d’elle,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il ne commet point d’iniquité;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chaque matin il produit à la lumière ses jugements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans jamais y manquer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui est inique ne connaît pas la honte.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: J’ai exterminé des nations; leurs tours sont détruites;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai dévasté leurs rues, plus de passants!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs villes sont ravagées, plus d’hommes, plus d’habitants!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Je disais: Si du moins tu voulais me craindre,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avoir égard à la correction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta demeure ne serait pas détruite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les châtiments dont je t’ai menacée n’arriveraient pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ils se sont hâtés de pervertir toutes leurs actions.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Attendez-moi donc, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au jour où je me lèverai pour le butin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car j’ai résolu de rassembler les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De rassembler les royaumes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour répandre sur eux ma fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toute l’ardeur de ma colère;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car par le feu de ma jalousie tout le pays sera consumé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Promesses
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-20: cf. (De 4:29-31; 30:1-10. (Za 2:10-12. És 12; 62.) (Jé 23:3-8.) Éz 37:21-28.)'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Alors je donnerai aux peuples des lèvres pures,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin qu’ils invoquent tous le nom de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour le servir d’un commun accord.
