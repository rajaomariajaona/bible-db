document_id: ZEP.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Châtiment de Jérusalem
  - type: heading
    content: 'V. 1-8: cf. Éz 22. Jé 25:4, etc. Mt 23:37-39.'
  - type: text
    content: Malheur à la ville rebelle et souillée,
  - type: text
    content: A la ville pleine d’oppresseurs!
  '10':
  - type: text
    content: D’au-delà des fleuves de l’Éthiopie
  - type: text
    content: Mes adorateurs, mes dispersés, m’apporteront des offrandes.
  '11':
  - type: text
    content: En ce jour-là, tu n’auras plus à rougir de toutes tes actions
  - type: text
    content: Par lesquelles tu as péché contre moi;
  - type: text
    content: Car alors j’ôterai du milieu de toi ceux qui triomphaient avec arrogance,
  - type: text
    content: Et tu ne t’enorgueilliras plus sur ma montagne sainte.
  '12':
  - type: text
    content: Je laisserai au milieu de toi un peuple humble et petit,
  - type: text
    content: Qui trouvera son refuge dans le nom de l’Éternel.
  '13':
  - type: text
    content: Les restes d’Israël ne commettront point d’iniquité,
  - type: text
    content: Ils ne diront point de mensonges,
  - type: text
    content: Et il ne se trouvera pas dans leur bouche une langue trompeuse;
  - type: text
    content: Mais ils paîtront, ils se reposeront, et personne ne les troublera.
  '14':
  - type: text
    content: 'Pousse des cris de joie, '
  - type: note
    content: Za 9:9.
  - type: text
    content: fille de Sion!
  - type: text
    content: Pousse des cris d’allégresse, Israël!
  - type: text
    content: 'Réjouis-toi et triomphe de tout ton cœur, '
  - type: note
    content: Za 9:9.
  - type: text
    content: fille de Jérusalem!
  '15':
  - type: text
    content: L’Éternel a détourné tes châtiments,
  - type: text
    content: Il a éloigné ton ennemi;
  - type: text
    content: Le roi d’Israël, l’Éternel, est au milieu de toi;
  - type: text
    content: Tu n’as plus de malheur à éprouver.
  '16':
  - type: text
    content: 'En ce jour-là, on dira à Jérusalem: Ne crains rien!'
  - type: text
    content: Sion, que tes mains ne s’affaiblissent pas!
  '17':
  - type: text
    content: L’Éternel, ton Dieu, est au milieu de toi, comme un héros qui sauve;
  - type: text
    content: Il fera de toi sa plus grande joie;
  - type: text
    content: Il gardera le silence dans son amour;
  - type: text
    content: Il aura pour toi des transports d’allégresse.
  '18':
  - type: text
    content: Je rassemblerai ceux qui sont dans la tristesse, loin des fêtes solennelles,
  - type: text
    content: Ceux qui sont sortis de ton sein;
  - type: text
    content: L’opprobre pèse sur eux.
  '19':
  - type: text
    content: Voici, en ce temps-là, j’agirai contre tous tes oppresseurs;
  - type: text
    content: Je délivrerai les boiteux et je recueillerai ceux qui ont été chassés,
  - type: text
    content: Je ferai d’eux un sujet de louange et de gloire
  - type: text
    content: Dans tous les pays où ils sont en opprobre.
  '2':
  - type: text
    content: Elle n’écoute aucune voix,
  - type: text
    content: Elle n’a point égard à la correction,
  - type: text
    content: Elle ne se confie pas en l’Éternel,
  - type: text
    content: Elle ne s’approche pas de son Dieu.
  '20':
  - type: text
    content: En ce temps-là, je vous ramènerai;
  - type: text
    content: En ce temps-là, je vous rassemblerai;
  - type: text
    content: Car je ferai de vous un sujet de gloire et de louange
  - type: text
    content: Parmi tous les peuples de la terre,
  - type: text
    content: Quand je ramènerai vos captifs sous vos yeux,
  - type: text
    content: Dit l’Éternel.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Pr 28:15. Éz 22:27.
  - type: text
    content: Ses chefs au milieu d’elle sont des lions rugissants;
  - type: text
    content: Ses juges sont des loups du soir qui ne gardent rien pour le matin.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Jé 23:11, 32. Os 9:7.
  - type: text
    content: Ses prophètes sont téméraires, infidèles;
  - type: text
    content: Ses sacrificateurs profanent les choses saintes, violent la loi.
  '5':
  - type: text
    content: L’Éternel est juste au milieu d’elle,
  - type: note
    content: De 32:4.
  - type: text
    content: Il ne commet point d’iniquité;
  - type: text
    content: Chaque matin il produit à la lumière ses jugements,
  - type: text
    content: Sans jamais y manquer;
  - type: text
    content: Mais celui qui est inique ne connaît pas la honte.
  '6':
  - type: text
    content: J’ai exterminé des nations; leurs tours sont détruites;
  - type: text
    content: J’ai dévasté leurs rues, plus de passants!
  - type: text
    content: Leurs villes sont ravagées, plus d’hommes, plus d’habitants!
  '7':
  - type: text
    content: 'Je disais: Si du moins tu voulais me craindre,'
  - type: text
    content: Avoir égard à la correction,
  - type: text
    content: Ta demeure ne serait pas détruite,
  - type: text
    content: Tous les châtiments dont je t’ai menacée n’arriveraient pas;
  - type: text
    content: Mais ils se sont hâtés de pervertir toutes leurs actions.
  '8':
  - type: text
    content: Attendez-moi donc, dit l’Éternel,
  - type: text
    content: Au jour où je me lèverai pour le butin,
  - type: text
    content: Car j’ai résolu de rassembler les nations,
  - type: text
    content: De rassembler les royaumes,
  - type: text
    content: Pour répandre sur eux ma fureur,
  - type: text
    content: Toute l’ardeur de ma colère;
  - type: text
    content: Car par le feu de ma jalousie tout le pays sera consumé.
  - type: heading
    content: Promesses
  - type: heading
    content: 'V. 9-20: cf. (De 4:29-31; 30:1-10. (Za 2:10-12. És 12; 62.) (Jé 23:3-8.) Éz 37:21-28.)'
  '9':
  - type: text
    content: Alors je donnerai aux peuples des lèvres pures,
  - type: text
    content: Afin qu’ils invoquent tous le nom de l’Éternel,
  - type: text
    content: Pour le servir d’un commun accord.
