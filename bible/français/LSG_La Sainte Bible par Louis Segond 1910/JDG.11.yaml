document_id: JDG.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-11: cf. Jg 10:17, 18. Hé 11:32, 33.'
  - type: text
    content: ' '
  - type: note
    content: Hé 11:32.
  - type: text
    content: 'Jephthé, le Galaadite, était un vaillant héros. Il était fils d’une femme prostituée; et c’est Galaad qui avait engendré Jephthé. '
  '10':
  - type: text
    content: 'Les anciens de Galaad dirent à Jephthé: Que l’Éternel nous entende, et qu’il juge, si nous ne faisons pas ce que tu dis. '
  '11':
  - type: text
    content: Et Jephthé partit avec les anciens de Galaad. Le peuple le mit à sa tête et l’établit comme chef, et Jephthé répéta devant l’Éternel, à Mitspa, toutes les paroles qu’il avait prononcées.
  - type: heading
    content: Défaite des Ammonites
  - type: heading
    content: 'V. 12-28: cf. No 21:20-32. De 2:17-37.'
  '12':
  - type: text
    content: 'Jephthé envoya des messagers au roi des fils d’Ammon, pour lui dire: Qu’y a-t-il entre moi et toi, que tu viennes contre moi pour faire la guerre à mon pays? '
  '13':
  - type: text
    content: 'Le roi des fils d’Ammon répondit aux messagers de Jephthé: C’est qu’Israël, quand il est monté d’Égypte, s’est emparé de mon pays, depuis l’Arnon jusqu’au Jabbok et au Jourdain. Rends-le maintenant de bon gré. '
  '14':
  - type: text
    content: 'Jephthé envoya de nouveau des messagers au roi des fils d’Ammon, '
  '15':
  - type: text
    content: 'pour lui dire: Ainsi parle Jephthé: '
  - type: note
    content: No 21:13. De 2:9, 19.
  - type: text
    content: 'Israël ne s’est point emparé du pays de Moab, ni du pays des fils d’Ammon. '
  '16':
  - type: text
    content: 'Car lorsqu’Israël est monté d’Égypte, il a marché dans le désert jusqu’à la mer Rouge, et il est arrivé à Kadès. '
  '17':
  - type: text
    content: 'Alors Israël envoya des messagers au roi d’Édom, pour lui dire: '
  - type: note
    content: No 20:17.
  - type: text
    content: 'Laisse-moi passer par ton pays. Mais le roi d’Édom n’y consentit pas. Il en envoya aussi au roi de Moab, qui refusa. Et Israël resta à Kadès. '
  '18':
  - type: text
    content: 'Puis il marcha par le désert, tourna le pays d’Édom et le pays de Moab, et vint à l’orient du pays de Moab; ils campèrent au-delà de l’Arnon, sans entrer sur le territoire de Moab, car l’Arnon est la frontière de Moab. '
  '19':
  - type: note
    content: De 2:26.
  - type: text
    content: 'Israël envoya des messagers à Sihon, roi des Amoréens, roi de Hesbon, et Israël lui dit: '
  - type: note
    content: No 21:22.
  - type: text
    content: 'Laisse-nous passer par ton pays jusqu’au lieu où nous allons. '
  '2':
  - type: text
    content: 'La femme de Galaad lui enfanta des fils, qui, devenus grands, chassèrent Jephthé, et lui dirent: Tu n’hériteras pas dans la maison de notre père, car tu es fils d’une autre femme. '
  '20':
  - type: text
    content: 'Mais Sihon n’eut pas assez confiance en Israël pour le laisser passer sur son territoire; il rassembla tout son peuple, campa à Jahats, et combattit Israël. '
  '21':
  - type: text
    content: 'L’Éternel, le Dieu d’Israël, livra Sihon et tout son peuple entre les mains d’Israël, qui les battit. Israël s’empara de tout le pays des Amoréens établis dans cette contrée. '
  '22':
  - type: text
    content: 'Ils s’emparèrent de tout le territoire des Amoréens, '
  - type: note
    content: De 2:36.
  - type: text
    content: 'depuis l’Arnon jusqu’au Jabbok, et depuis le désert jusqu’au Jourdain. '
  '23':
  - type: text
    content: 'Et maintenant que l’Éternel, le Dieu d’Israël, a chassé les Amoréens devant son peuple d’Israël, est-ce toi qui aurais la possession de leur pays? '
  '24':
  - type: text
    content: 'Ce que ton dieu Kemosch te donne à posséder, ne le posséderais-tu pas? Et tout ce que l’Éternel, notre Dieu, a mis en notre possession devant nous, nous ne le posséderions pas! '
  '25':
  - type: note
    content: No 22:2, etc.
  - type: text
    content: 'Vaux-tu donc mieux que Balak, fils de Tsippor, roi de Moab? A-t-il contesté avec Israël, ou lui a-t-il fait la guerre! '
  '26':
  - type: text
    content: 'Voilà trois cents ans qu’Israël habite à Hesbon et dans les villes de son ressort, à Aroër et dans les villes de son ressort, et dans toutes les villes qui sont sur les bords de l’Arnon: pourquoi ne les lui avez-vous pas enlevées pendant ce temps-là? '
  '27':
  - type: text
    content: 'Je ne t’ai point offensé, et tu agis mal avec moi en me faisant la guerre. Que l’Éternel, le juge, soit aujourd’hui juge entre les enfants d’Israël et les fils d’Ammon! '
  '28':
  - type: text
    content: Le roi des fils d’Ammon n’écouta point les paroles que Jephthé lui fit dire.
  - type: heading
    content: 'V. 29-40: cf. 1 S 12:10, 11. (No 30:3. Ec 5:1-5.) 1 S 14:24-45.'
  '29':
  - type: text
    content: 'L’esprit de l’Éternel fut sur Jephthé. Il traversa Galaad et Manassé; il passa à Mitspé de Galaad; et de Mitspé de Galaad, il marcha contre les fils d’Ammon. '
  '3':
  - type: text
    content: 'Et Jephthé s’enfuit loin de ses frères, et il habita dans le pays de Tob. Des gens de rien se rassemblèrent auprès de Jephthé, et ils faisaient avec lui des excursions. '
  '30':
  - type: text
    content: 'Jephthé fit un vœu à l’Éternel, et dit: Si tu livres entre mes mains les fils d’Ammon, '
  '31':
  - type: text
    content: 'quiconque sortira des portes de ma maison au-devant de moi, à mon heureux retour de chez les fils d’Ammon, sera consacré à l’Éternel, et je l’offrirai en holocauste. '
  '32':
  - type: text
    content: 'Jephthé marcha contre les fils d’Ammon, et l’Éternel les livra entre ses mains. '
  '33':
  - type: text
    content: Il leur fit éprouver une très grande défaite, depuis Aroër jusque vers Minnith, espace qui renfermait vingt villes, et jusqu’à Abel-Keramim. Et les fils d’Ammon furent humiliés devant les enfants d’Israël.
  - type: heading
    content: La fille de Jephthé
  '34':
  - type: text
    content: 'Jephthé retourna dans sa maison à Mitspa. Et voici, sa fille sortit au-devant de lui avec des tambourins et des danses. C’était son unique enfant; il n’avait point de fils et point d’autre fille. '
  '35':
  - type: text
    content: 'Dès qu’il la vit, il déchira ses vêtements, et dit: Ah! Ma fille! Tu me jettes dans l’abattement, tu es au nombre de ceux qui me troublent! J’ai fait un vœu à l’Éternel, et je ne puis le révoquer. '
  '36':
  - type: text
    content: 'Elle lui dit: Mon père, si tu as fait un vœu à l’Éternel, traite-moi selon ce qui est sorti de ta bouche, maintenant que l’Éternel t’a vengé de tes ennemis, des fils d’Ammon. '
  '37':
  - type: text
    content: 'Et elle dit à son père: Que ceci me soit accordé: laisse-moi libre pendant deux mois! Je m’en irai, je descendrai dans les montagnes, et je pleurerai ma virginité avec mes compagnes. '
  '38':
  - type: text
    content: 'Il répondit: Va! Et il la laissa libre pour deux mois. Elle s’en alla avec ses compagnes, et elle pleura sa virginité sur les montagnes. '
  '39':
  - type: text
    content: 'Au bout des deux mois, elle revint vers son père, et il accomplit sur elle le vœu qu’il avait fait. Elle n’avait point connu d’homme. Dès lors s’établit en Israël la coutume '
  '4':
  - type: text
    content: 'Quelque temps après, les fils d’Ammon firent la guerre à Israël. '
  '40':
  - type: text
    content: que tous les ans les filles d’Israël s’en vont célébrer la fille de Jephthé, le Galaadite, quatre jours par année.
  '5':
  - type: text
    content: 'Et comme les fils d’Ammon faisaient la guerre à Israël, les anciens de Galaad allèrent chercher Jephthé au pays de Tob. '
  '6':
  - type: text
    content: 'Ils dirent à Jephthé: Viens, tu seras notre chef, et nous combattrons les fils d’Ammon. '
  '7':
  - type: text
    content: 'Jephthé répondit aux anciens de Galaad: N’avez-vous pas eu de la haine pour moi, et ne m’avez-vous pas chassé de la maison de mon père? Pourquoi venez-vous à moi maintenant que vous êtes dans la détresse? '
  '8':
  - type: text
    content: 'Les anciens de Galaad dirent à Jephthé: Nous revenons à toi maintenant, afin que tu marches avec nous, que tu combattes les fils d’Ammon, et que tu sois notre chef, celui de tous les habitants de Galaad. '
  '9':
  - type: text
    content: 'Jephthé répondit aux anciens de Galaad: Si vous me ramenez pour combattre les fils d’Ammon, et que l’Éternel les livre devant moi, je serai votre chef. '
