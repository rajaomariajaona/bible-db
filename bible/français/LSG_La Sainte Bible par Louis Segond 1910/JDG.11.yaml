document_id: JDG.11
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. Jg 10:17, 18. Hé 11:32, 33.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:32
      metadata:
        usfm: HEB.11.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jephthé, le Galaadite, était un vaillant héros. Il était fils d’une femme prostituée; et c’est Galaad qui avait engendré Jephthé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La femme de Galaad lui enfanta des fils, qui, devenus grands, chassèrent Jephthé, et lui dirent: Tu n’hériteras pas dans la maison de notre père, car tu es fils d’une autre femme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et Jephthé s’enfuit loin de ses frères, et il habita dans le pays de Tob. Des gens de rien se rassemblèrent auprès de Jephthé, et ils faisaient avec lui des excursions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Quelque temps après, les fils d’Ammon firent la guerre à Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et comme les fils d’Ammon faisaient la guerre à Israël, les anciens de Galaad allèrent chercher Jephthé au pays de Tob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils dirent à Jephthé: Viens, tu seras notre chef, et nous combattrons les fils d’Ammon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jephthé répondit aux anciens de Galaad: N’avez-vous pas eu de la haine pour moi, et ne m’avez-vous pas chassé de la maison de mon père? Pourquoi venez-vous à moi maintenant que vous êtes dans la détresse? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les anciens de Galaad dirent à Jephthé: Nous revenons à toi maintenant, afin que tu marches avec nous, que tu combattes les fils d’Ammon, et que tu sois notre chef, celui de tous les habitants de Galaad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jephthé répondit aux anciens de Galaad: Si vous me ramenez pour combattre les fils d’Ammon, et que l’Éternel les livre devant moi, je serai votre chef. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les anciens de Galaad dirent à Jephthé: Que l’Éternel nous entende, et qu’il juge, si nous ne faisons pas ce que tu dis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Et Jephthé partit avec les anciens de Galaad. Le peuple le mit à sa tête et l’établit comme chef, et Jephthé répéta devant l’Éternel, à Mitspa, toutes les paroles qu’il avait prononcées.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Défaite des Ammonites
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-28: cf. No 21:20-32. De 2:17-37.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jephthé envoya des messagers au roi des fils d’Ammon, pour lui dire: Qu’y a-t-il entre moi et toi, que tu viennes contre moi pour faire la guerre à mon pays? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le roi des fils d’Ammon répondit aux messagers de Jephthé: C’est qu’Israël, quand il est monté d’Égypte, s’est emparé de mon pays, depuis l’Arnon jusqu’au Jabbok et au Jourdain. Rends-le maintenant de bon gré. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jephthé envoya de nouveau des messagers au roi des fils d’Ammon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'pour lui dire: Ainsi parle Jephthé: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 21:13
      metadata:
        usfm: NUM.21.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 2:9
      metadata:
        usfm: DEU.2.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: DEU.2.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Israël ne s’est point emparé du pays de Moab, ni du pays des fils d’Ammon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Car lorsqu’Israël est monté d’Égypte, il a marché dans le désert jusqu’à la mer Rouge, et il est arrivé à Kadès. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors Israël envoya des messagers au roi d’Édom, pour lui dire: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 20:17
      metadata:
        usfm: NUM.20.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Laisse-moi passer par ton pays. Mais le roi d’Édom n’y consentit pas. Il en envoya aussi au roi de Moab, qui refusa. Et Israël resta à Kadès. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Puis il marcha par le désert, tourna le pays d’Édom et le pays de Moab, et vint à l’orient du pays de Moab; ils campèrent au-delà de l’Arnon, sans entrer sur le territoire de Moab, car l’Arnon est la frontière de Moab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 2:26
      metadata:
        usfm: DEU.2.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Israël envoya des messagers à Sihon, roi des Amoréens, roi de Hesbon, et Israël lui dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 21:22
      metadata:
        usfm: NUM.21.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Laisse-nous passer par ton pays jusqu’au lieu où nous allons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais Sihon n’eut pas assez confiance en Israël pour le laisser passer sur son territoire; il rassembla tout son peuple, campa à Jahats, et combattit Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L’Éternel, le Dieu d’Israël, livra Sihon et tout son peuple entre les mains d’Israël, qui les battit. Israël s’empara de tout le pays des Amoréens établis dans cette contrée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils s’emparèrent de tout le territoire des Amoréens, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 2:36
      metadata:
        usfm: DEU.2.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'depuis l’Arnon jusqu’au Jabbok, et depuis le désert jusqu’au Jourdain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et maintenant que l’Éternel, le Dieu d’Israël, a chassé les Amoréens devant son peuple d’Israël, est-ce toi qui aurais la possession de leur pays? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ce que ton dieu Kemosch te donne à posséder, ne le posséderais-tu pas? Et tout ce que l’Éternel, notre Dieu, a mis en notre possession devant nous, nous ne le posséderions pas! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: text
      text: No 22:2, etc.
    marker-yv: yv-n
  - type: text
    text: 'Vaux-tu donc mieux que Balak, fils de Tsippor, roi de Moab? A-t-il contesté avec Israël, ou lui a-t-il fait la guerre! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Voilà trois cents ans qu’Israël habite à Hesbon et dans les villes de son ressort, à Aroër et dans les villes de son ressort, et dans toutes les villes qui sont sur les bords de l’Arnon: pourquoi ne les lui avez-vous pas enlevées pendant ce temps-là? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Je ne t’ai point offensé, et tu agis mal avec moi en me faisant la guerre. Que l’Éternel, le juge, soit aujourd’hui juge entre les enfants d’Israël et les fils d’Ammon! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Le roi des fils d’Ammon n’écouta point les paroles que Jephthé lui fit dire.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 29-40: cf. 1 S 12:10, 11. (No 30:3. Ec 5:1-5.) 1 S 14:24-45.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'L’esprit de l’Éternel fut sur Jephthé. Il traversa Galaad et Manassé; il passa à Mitspé de Galaad; et de Mitspé de Galaad, il marcha contre les fils d’Ammon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jephthé fit un vœu à l’Éternel, et dit: Si tu livres entre mes mains les fils d’Ammon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'quiconque sortira des portes de ma maison au-devant de moi, à mon heureux retour de chez les fils d’Ammon, sera consacré à l’Éternel, et je l’offrirai en holocauste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jephthé marcha contre les fils d’Ammon, et l’Éternel les livra entre ses mains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il leur fit éprouver une très grande défaite, depuis Aroër jusque vers Minnith, espace qui renfermait vingt villes, et jusqu’à Abel-Keramim. Et les fils d’Ammon furent humiliés devant les enfants d’Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fille de Jephthé
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jephthé retourna dans sa maison à Mitspa. Et voici, sa fille sortit au-devant de lui avec des tambourins et des danses. C’était son unique enfant; il n’avait point de fils et point d’autre fille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dès qu’il la vit, il déchira ses vêtements, et dit: Ah! Ma fille! Tu me jettes dans l’abattement, tu es au nombre de ceux qui me troublent! J’ai fait un vœu à l’Éternel, et je ne puis le révoquer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Elle lui dit: Mon père, si tu as fait un vœu à l’Éternel, traite-moi selon ce qui est sorti de ta bouche, maintenant que l’Éternel t’a vengé de tes ennemis, des fils d’Ammon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Et elle dit à son père: Que ceci me soit accordé: laisse-moi libre pendant deux mois! Je m’en irai, je descendrai dans les montagnes, et je pleurerai ma virginité avec mes compagnes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Il répondit: Va! Et il la laissa libre pour deux mois. Elle s’en alla avec ses compagnes, et elle pleura sa virginité sur les montagnes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Au bout des deux mois, elle revint vers son père, et il accomplit sur elle le vœu qu’il avait fait. Elle n’avait point connu d’homme. Dès lors s’établit en Israël la coutume '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: que tous les ans les filles d’Israël s’en vont célébrer la fille de Jephthé, le Galaadite, quatre jours par année.
