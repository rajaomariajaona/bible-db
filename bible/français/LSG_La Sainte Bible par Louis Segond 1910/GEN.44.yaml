document_id: GEN.44,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-17: cf. De 8:2, 16.'
  - type: text
    content: 'Joseph donna cet ordre à l’intendant de sa maison: Remplis de vivres les sacs de ces gens, autant qu’ils en pourront porter, et mets l’argent de chacun à l’entrée de son sac. '
  '10':
  - type: text
    content: 'Il dit: Qu’il en soit donc selon vos paroles! Celui sur qui se trouvera la coupe sera mon esclave; et vous, vous serez innocents. '
  '11':
  - type: text
    content: 'Aussitôt, chacun descendit son sac à terre, et chacun ouvrit son sac. '
  '12':
  - type: text
    content: 'L’intendant les fouilla, commençant par le plus âgé et finissant par le plus jeune; et la coupe fut trouvée dans le sac de Benjamin. '
  '13':
  - type: text
    content: 'Ils déchirèrent leurs vêtements, chacun rechargea son âne, et ils retournèrent à la ville. '
  '14':
  - type: text
    content: 'Juda et ses frères arrivèrent à la maison de Joseph, où il était encore, et ils se prosternèrent en terre devant lui. '
  '15':
  - type: text
    content: 'Joseph leur dit: Quelle action avez-vous faite? Ne savez-vous pas qu’un homme comme moi a le pouvoir de deviner? '
  '16':
  - type: text
    content: 'Juda répondit: Que dirons-nous à mon seigneur? Comment parlerons-nous? Comment nous justifierons-nous? Dieu a trouvé l’iniquité de tes serviteurs. Nous voici esclaves de mon seigneur, nous, et celui sur qui s’est trouvée la coupe. '
  '17':
  - type: text
    content: 'Et Joseph dit: Dieu me garde de faire cela! L’homme sur qui la coupe a été trouvée sera mon esclave; mais vous, remontez en paix vers votre père.'
  - type: heading
    content: 'V. 18-34: cf. Ge 42:29-38; 43:1-14.'
  '18':
  - type: text
    content: 'Alors Juda s’approcha de Joseph, et dit: De grâce, mon seigneur, que ton serviteur puisse faire entendre une parole à mon seigneur, et que sa colère ne s’enflamme point contre ton serviteur! Car tu es comme Pharaon. '
  '19':
  - type: text
    content: 'Mon seigneur a interrogé ses serviteurs, en disant: Avez-vous un père, ou un frère? '
  '2':
  - type: text
    content: 'Tu mettras aussi ma coupe, la coupe d’argent, à l’entrée du sac du plus jeune, avec l’argent de son blé. L’intendant fit ce que Joseph lui avait ordonné. '
  '20':
  - type: text
    content: 'Nous avons répondu: Nous avons un vieux père, et un jeune frère, enfant de sa vieillesse; cet enfant avait un frère qui est mort, et qui était de la même mère; il reste seul, et son père l’aime. '
  '21':
  - type: text
    content: 'Tu as dit à tes serviteurs: '
  - type: note
    content: Ge 42:15.
  - type: text
    content: 'Faites-le descendre vers moi, et que je le voie de mes propres yeux. '
  '22':
  - type: text
    content: 'Nous avons répondu à mon seigneur: L’enfant ne peut pas quitter son père; s’il le quitte, son père mourra. '
  '23':
  - type: text
    content: 'Tu as dit à tes serviteurs: '
  - type: note
    content: Ge 43:3, 5.
  - type: text
    content: 'Si votre jeune frère ne descend pas avec vous, vous ne reverrez pas ma face. '
  '24':
  - type: text
    content: 'Lorsque nous sommes remontés auprès de ton serviteur, mon père, nous lui avons rapporté les paroles de mon seigneur. '
  '25':
  - type: text
    content: 'Notre père a dit: Retournez, achetez-nous un peu de vivres. '
  '26':
  - type: text
    content: 'Nous avons répondu: Nous ne pouvons pas descendre; mais, si notre jeune frère est avec nous, nous descendrons, car nous ne pouvons pas voir la face de cet homme, à moins que notre jeune frère ne soit avec nous. '
  '27':
  - type: text
    content: 'Ton serviteur, notre père, nous a dit: Vous savez que ma femme m’a enfanté deux fils. '
  '28':
  - type: text
    content: 'L’un étant sorti de chez moi, '
  - type: note
    content: Ge 37:33.
  - type: text
    content: 'je pense qu’il a été sans doute déchiré, car je ne l’ai pas revu jusqu’à présent. '
  '29':
  - type: text
    content: 'Si vous me prenez encore celui-ci, et qu’il lui arrive un malheur, '
  - type: note
    content: Ge 42:38.
  - type: text
    content: 'vous ferez descendre mes cheveux blancs avec douleur dans le séjour des morts. '
  '3':
  - type: text
    content: 'Le matin, dès qu’il fit jour, on renvoya ces gens avec leurs ânes. '
  '30':
  - type: text
    content: 'Maintenant, si je retourne auprès de ton serviteur, mon père, sans avoir avec nous l’enfant à l’âme duquel son âme est attachée, '
  '31':
  - type: text
    content: 'il mourra, en voyant que l’enfant n’y est pas; et tes serviteurs feront descendre avec douleur dans le séjour des morts les cheveux blancs de ton serviteur, notre père. '
  '32':
  - type: text
    content: 'Car ton serviteur a répondu pour l’enfant, en disant à mon père: '
  - type: note
    content: Ge 43:9.
  - type: text
    content: 'Si je ne le ramène pas auprès de toi, je serai pour toujours coupable envers mon père. '
  '33':
  - type: text
    content: 'Permets donc, je te prie, à ton serviteur de rester à la place de l’enfant, comme esclave de mon seigneur; et que l’enfant remonte avec ses frères. '
  '34':
  - type: text
    content: Comment pourrai-je remonter vers mon père, si l’enfant n’est pas avec moi? Ah! Que je ne voie point l’affliction de mon père!
  '4':
  - type: text
    content: 'Ils étaient sortis de la ville, et ils n’en étaient guère éloignés, lorsque Joseph dit à son intendant: Lève-toi, poursuis ces gens; et, quand tu les auras atteints, tu leur diras: Pourquoi avez-vous rendu le mal pour le bien? '
  '5':
  - type: text
    content: 'N’avez-vous pas la coupe dans laquelle boit mon seigneur, et dont il se sert pour deviner? Vous avez mal fait d’agir ainsi. '
  '6':
  - type: text
    content: 'L’intendant les atteignit, et leur dit ces mêmes paroles. '
  '7':
  - type: text
    content: 'Ils lui répondirent: Pourquoi mon seigneur parle-t-il de la sorte? Dieu préserve tes serviteurs d’avoir commis une telle action! '
  '8':
  - type: text
    content: 'Voici, nous t’avons rapporté du pays de Canaan l’argent que nous avons trouvé à l’entrée de nos sacs; comment aurions-nous dérobé de l’argent ou de l’or dans la maison de ton seigneur? '
  '9':
  - type: text
    content: 'Que celui de tes serviteurs sur qui se trouvera la coupe meure, et que nous soyons nous-mêmes esclaves de mon seigneur! '
