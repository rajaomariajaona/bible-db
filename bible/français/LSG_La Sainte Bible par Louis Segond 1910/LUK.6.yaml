document_id: LUK.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les épis de blé et le sabbat
  - type: heading
    content: 'V. 1-5: cf. (Mt 12:1-8. Mc 2:23-28.)'
  - type: text
    content: ' '
  - type: note
    content: De 23:25. Mt 12:1. Mc 2:23.
  - type: text
    content: 'Il arriva, un jour de sabbat appelé second-premier, que Jésus traversait des champs de blé. Ses disciples arrachaient des épis et les mangeaient, après les avoir froissés dans leurs mains. '
  '10':
  - type: text
    content: 'Alors, promenant ses regards sur eux tous, il dit à l’homme: '
  - type: text
    content: Étends ta main.
  - type: text
    content: ' Il le fit, '
  - type: note
    content: 1 R 13:6.
  - type: text
    content: 'et sa main fut guérie. '
  '11':
  - type: text
    content: Ils furent remplis de fureur, et ils se consultèrent pour savoir ce qu’ils feraient à Jésus.
  - type: heading
    content: Choix des douze apôtres
  - type: heading
    content: 'V. 12-16: cf. Mc 3:13-19. (Mt 10:1-15. Ac 1:13.)'
  '12':
  - type: text
    content: ' '
  - type: note
    content: Mt 14:23.
  - type: text
    content: 'En ce temps-là, Jésus se rendit sur la montagne pour prier, et il passa toute la nuit à prier Dieu. '
  '13':
  - type: note
    content: Mt 10:1. Mc 3:13; 6:7. Lu 9:1.
  - type: text
    content: 'Quand le jour parut, il appela ses disciples, et il en choisit douze, auxquels il donna le nom d’apôtres: '
  '14':
  - type: text
    content: 'Simon, qu’il nomma Pierre; André, son frère; Jacques; Jean; Philippe; Barthélemy; '
  '15':
  - type: text
    content: 'Matthieu; Thomas; Jacques, fils d’Alphée; Simon, appelé le zélote; '
  '16':
  - type: text
    content: Jude, fils de Jacques; et Judas Iscariot, qui devint traître.
  - type: heading
    content: 'V. 17-19: cf. Mt 4:23-25.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: Mt 4:25. Mc 3:7.
  - type: text
    content: 'Il descendit avec eux, et s’arrêta sur un plateau, où se trouvaient une foule de ses disciples et une multitude de peuple de toute la Judée, de Jérusalem, et de la contrée maritime de Tyr et de Sidon. Ils étaient venus pour l’entendre, et pour être guéris de leurs maladies. '
  '18':
  - type: text
    content: 'Ceux qui étaient tourmentés par des esprits impurs étaient guéris. '
  '19':
  - type: text
    content: 'Et toute la foule cherchait à le toucher, '
  - type: note
    content: Mc 5:30.
  - type: text
    content: parce qu’une force sortait de lui et les guérissait tous.
  - type: heading
    content: 'Sermon sur la montagne. — Les béatitudes. — Préceptes divers: — l’amour des ennemis; — les jugements téméraires; — la paille et la poutre; — l’arbre et son fruit; — la maison bâtie sur le roc'
  - type: heading
    content: 'V. 20-26: cf. Mt 5:2-12.'
  '2':
  - type: text
    content: 'Quelques pharisiens leur dirent: Pourquoi faites-vous '
  - type: note
    content: Ex 20:10.
  - type: text
    content: 'ce qu’il n’est pas permis de faire pendant le sabbat? '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Mt 5:2.
  - type: text
    content: 'Alors Jésus, levant les yeux sur ses disciples, dit:'
  - type: text
    content: Heureux vous qui êtes pauvres, car le royaume de Dieu est à vous!
  - type: text
    content: ' '
  '21':
  - type: note
    content: És 65:13.
  - type: text
    content: Heureux vous qui avez faim maintenant, car vous serez rassasiés!
  - type: note
    content: És 61:3; 66:10.
  - type: text
    content: Heureux vous qui pleurez maintenant, car vous serez dans la joie!
  - type: text
    content: ' '
  '22':
  - type: note
    content: Mt 5:11. 1 Pi 2:19; 3:14; 4:14.
  - type: text
    content: Heureux serez-vous, lorsque les hommes vous haïront, lorsqu’on vous chassera, vous outragera, et qu’on rejettera votre nom comme infâme, à cause du Fils de l’homme!
  - type: text
    content: ' '
  '23':
  - type: note
    content: Ac 5:41.
  - type: text
    content: Réjouissez-vous en ce jour-là et tressaillez d’allégresse, parce que votre récompense sera grande dans le ciel;
  - type: text
    content: ' '
  - type: note
    content: Ac 7:51.
  - type: text
    content: car c’est ainsi que leurs pères traitaient les prophètes.
  - type: text
    content: ' '
  '24':
  - type: note
    content: Am 6:1, 8.
  - type: text
    content: Mais, malheur à vous, riches, car vous avez votre consolation!
  - type: text
    content: ' '
  '25':
  - type: note
    content: És 65:13.
  - type: text
    content: Malheur à vous qui êtes rassasiés, car vous aurez faim!
  - type: text
    content: Malheur à vous qui riez maintenant,
  - type: text
    content: ' '
  - type: note
    content: Ja 4:9; 5:1.
  - type: text
    content: car vous serez dans le deuil et dans les larmes!
  - type: text
    content: ' '
  '26':
  - type: text
    content: Malheur, lorsque tous les hommes diront du bien de vous, car c’est ainsi qu’agissaient leurs pères à l’égard des faux prophètes!
  - type: heading
    content: 'V. 27-36: cf. Mt 5:38-48. (Ro 12:17-21.)'
  '27':
  - type: text
    content: ' '
  - type: text
    content: 'Mais je vous dis, à vous qui m’écoutez:'
  - type: text
    content: ' '
  - type: note
    content: Ex 23:4. Pr 25:21. Mt 5:44. Ro 12:20. 1 Co 4:12.
  - type: text
    content: Aimez vos ennemis, faites du bien à ceux qui vous haïssent,
  - type: text
    content: ' '
  '28':
  - type: note
    content: Lu 23:34. Ac 7:60.
  - type: text
    content: bénissez ceux qui vous maudissent, priez pour ceux qui vous maltraitent.
  - type: text
    content: ' '
  '29':
  - type: note
    content: 1 Co 6:7.
  - type: text
    content: Si quelqu’un te frappe sur une joue, présente-lui aussi l’autre. Si quelqu’un prend ton manteau, ne l’empêche pas de prendre encore ta tunique.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: N’avez-vous pas lu ce que fit
  - type: text
    content: ' '
  - type: note
    content: 1 S 21:6.
  - type: text
    content: David, lorsqu’il eut faim, lui et ceux qui étaient avec lui;
  '30':
  - type: note
    content: De 15:7. Mt 5:42.
  - type: text
    content: Donne à quiconque te demande, et ne réclame pas ton bien à celui qui s’en empare.
  - type: text
    content: ' '
  '31':
  - type: note
    content: Mt 7:12.
  - type: text
    content: Ce que vous voulez que les hommes fassent pour vous, faites-le de même pour eux.
  - type: text
    content: ' '
  '32':
  - type: note
    content: Mt 5:46.
  - type: text
    content: Si vous aimez ceux qui vous aiment, quel gré vous en saura-t-on? Les pécheurs aussi aiment ceux qui les aiment.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Si vous faites du bien à ceux qui vous font du bien, quel gré vous en saura-t-on? Les pécheurs aussi agissent de même.
  - type: text
    content: ' '
  '34':
  - type: note
    content: De 15:8. Mt 5:42.
  - type: text
    content: Et si vous prêtez à ceux de qui vous espérez recevoir, quel gré vous en saura-t-on? Les pécheurs aussi prêtent aux pécheurs, afin de recevoir la pareille.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Mais aimez vos ennemis, faites du bien, et prêtez sans rien espérer. Et votre récompense sera grande, et vous serez
  - type: text
    content: ' '
  - type: note
    content: Mt 5:45.
  - type: text
    content: fils du Très-Haut, car il est bon pour les ingrats et pour les méchants.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Soyez donc miséricordieux, comme votre Père est miséricordieux.
  - type: heading
    content: 'V. 37-45: cf. Mt 7:1-5, 15-20; 12:33-37.'
  '37':
  - type: text
    content: ' '
  - type: note
    content: Mt 7:1. Ro 2:1. 1 Co 4:5.
  - type: text
    content: Ne jugez point, et vous ne serez point jugés; ne condamnez point, et vous ne serez point condamnés; absolvez, et vous serez absous.
  - type: text
    content: ' '
  '38':
  - type: note
    content: Pr 10:22; 19:17.
  - type: text
    content: 'Donnez, et il vous sera donné: on versera dans votre sein une bonne mesure, serrée, secouée et qui déborde;'
  - type: text
    content: ' '
  - type: note
    content: Mt 7:2. Mc 4:24.
  - type: text
    content: car on vous mesurera avec la mesure dont vous vous serez servis.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Il leur dit aussi cette parabole: '
  - type: note
    content: És 42:19. Mt 15:14.
  - type: text
    content: Un aveugle peut-il conduire un aveugle? Ne tomberont-ils pas tous deux dans une fosse?
  '4':
  - type: text
    content: ' '
  - type: text
    content: comment il entra dans la maison de Dieu, prit les pains de proposition, en mangea, et en donna à ceux qui étaient avec lui, bien qu’il ne soit permis
  - type: text
    content: ' '
  - type: note
    content: Lé 24:9.
  - type: text
    content: qu’aux sacrificateurs de les manger?
  - type: text
    content: ' '
  '40':
  - type: text
    content: ' '
  - type: note
    content: Mt 10:24. Jn 13:16; 15:20.
  - type: text
    content: Le disciple n’est pas plus que le maître; mais tout disciple accompli sera comme son maître.
  - type: text
    content: ' '
  '41':
  - type: note
    content: Mt 7:3.
  - type: text
    content: Pourquoi vois-tu la paille qui est dans l’œil de ton frère, et n’aperçois-tu pas la poutre qui est dans ton œil?
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'Ou comment peux-tu dire à ton frère: Frère, laisse-moi ôter la paille qui est dans ton œil, toi qui ne vois pas la poutre qui est dans le tien? Hypocrite,'
  - type: text
    content: ' '
  - type: note
    content: Pr 18:17.
  - type: text
    content: ôte premièrement la poutre de ton œil, et alors tu verras comment ôter la paille qui est dans l’œil de ton frère.
  - type: text
    content: ' '
  '43':
  - type: note
    content: Mt 7:17; 12:33.
  - type: text
    content: Ce n’est pas un bon arbre qui porte du mauvais fruit, ni un mauvais arbre qui porte du bon fruit.
  - type: text
    content: ' '
  '44':
  - type: text
    content: Car chaque arbre se connaît à son fruit.
  - type: text
    content: ' '
  - type: note
    content: Mt 7:16.
  - type: text
    content: On ne cueille pas des figues sur des épines, et l’on ne vendange pas des raisins sur des ronces.
  - type: text
    content: ' '
  '45':
  - type: note
    content: Mt 12:35.
  - type: text
    content: L’homme bon tire de bonnes choses du bon trésor de son cœur, et le méchant tire de mauvaises choses de son mauvais trésor;
  - type: text
    content: ' '
  - type: note
    content: Mt 12:34.
  - type: text
    content: car c’est de l’abondance du cœur que la bouche parle.
  - type: heading
    content: 'V. 46-49: cf. Mt 7:21-29. (2 Pi 1:5-10.)'
  '46':
  - type: text
    content: ' '
  - type: note
    content: Mal 1:6. Mt 7:21; 25:11. Lu 13:25. Ro 2:13. Ja 1:22.
  - type: text
    content: Pourquoi m’appelez-vous Seigneur, Seigneur! Et ne faites-vous pas ce que je dis?
  - type: text
    content: ' '
  '47':
  - type: note
    content: Mt 7:24.
  - type: text
    content: Je vous montrerai à qui est semblable tout homme qui vient à moi, entend mes paroles, et les met en pratique.
  - type: text
    content: ' '
  '48':
  - type: text
    content: Il est semblable à un homme qui, bâtissant une maison, a creusé, creusé profondément, et a posé le fondement sur le roc. Une inondation est venue, et le torrent s’est jeté contre cette maison, sans pouvoir l’ébranler, parce qu’elle était bien bâtie.
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'Mais celui qui entend, et ne met pas en pratique, est semblable à un homme qui a bâti une maison sur la terre, sans fondement. Le torrent s’est jeté contre elle: aussitôt elle est tombée, et la ruine de cette maison a été grande.'
  '5':
  - type: text
    content: 'Et il leur dit: '
  - type: note
    content: Mt 12:8. Mc 2:28.
  - type: text
    content: Le Fils de l’homme est maître même du sabbat.
  - type: heading
    content: L’homme à la main sèche
  - type: heading
    content: 'V. 6-11: cf. (Mt 12:9-14. Mc 3:1-6.) Lu 14:1-6; 13:10-17.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: Mt 12:9. Mc 3:1.
  - type: text
    content: 'Il arriva, un autre jour de sabbat, que Jésus entra dans la synagogue, et qu’il enseignait. Il s’y trouvait un homme dont la main droite était sèche. '
  '7':
  - type: text
    content: 'Les scribes et les pharisiens observaient Jésus, pour voir s’il ferait une guérison le jour du sabbat: c’était afin d’avoir sujet de l’accuser. '
  '8':
  - type: text
    content: 'Mais il connaissait leurs pensées, et il dit à l’homme qui avait la main sèche: '
  - type: text
    content: Lève-toi, et tiens-toi là au milieu.
  - type: text
    content: ' Il se leva, et se tint debout. '
  '9':
  - type: text
    content: 'Et Jésus leur dit: '
  - type: text
    content: Je vous demande s’il est permis, le jour du sabbat, de faire du bien ou de faire du mal, de sauver une personne ou de la tuer.
  - type: text
    content: ' '
