document_id: 1CH.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les Lévites, leur dénombrement et leurs fonctions
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-32: cf. (No 3; 4; 8:5, etc.) (1 Ch 9:17-34. 2 Ch 35:1-15.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'David, âgé et rassasié de jours, établit Salomon, son fils, roi sur Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il assembla tous les chefs d’Israël, les sacrificateurs et les Lévites. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'On fit le dénombrement des Lévites, depuis l’âge de trente ans et au-dessus; comptés par tête et par homme, ils se trouvèrent au nombre de trente-huit mille. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et David dit: Qu’il y en ait vingt-quatre mille pour veiller aux offices de la maison de l’Éternel, six mille comme magistrats et juges, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'quatre mille comme portiers, et quatre mille chargés de louer l’Éternel avec les instruments que j’ai faits pour le célébrer. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'David les divisa en classes d’après les fils de Lévi, Guerschon, Kehath et Merari. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Des Guerschonites: Laedan et Schimeï. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fils de Laedan: le chef Jehiel, Zétham et Joël, trois. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fils de Schimeï: Schelomith, Haziel et Haran, trois. Ce sont là les chefs des maisons paternelles de la famille de Laedan. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fils de Schimeï: Jachath, Zina, Jeusch et Beria. Ce sont là les quatre fils de Schimeï. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jachath était le chef, et Zina le second; Jeusch et Beria n’eurent pas beaucoup de fils, et ils formèrent une seule maison paternelle dans le dénombrement. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fils de Kehath: Amram, Jitsehar, Hébron et Uziel, quatre. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 6:19
      metadata:
        usfm: EXO.6.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fils d’Amram: Aaron et Moïse. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ex 28:1, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 5:4
      metadata:
        usfm: HEB.5.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Aaron fut mis à part pour être sanctifié comme très saint, lui et ses fils à perpétuité, pour offrir les parfums devant l’Éternel, pour faire son service, et pour bénir à toujours en son nom. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais les fils de Moïse, homme de Dieu, furent comptés dans la tribu de Lévi. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 2:22
      metadata:
        usfm: EXO.2.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:3
      metadata:
        usfm: EXO.18.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fils de Moïse: Guerschom et Éliézer. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fils de Guerschom: Schebuel, le chef. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et les fils d’Éliézer furent: Rechabia, le chef; Éliézer n’eut pas d’autre fils, mais les fils de Rechabia furent très nombreux. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fils de Jitsehar: Schelomith, le chef. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fils d’Hébron: Jerija, le chef; Amaria, le second; Jachaziel, le troisième; et Jekameam, le quatrième. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fils d’Uziel: Michée, le chef; et Jischija, le second. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fils de Merari: Machli et Muschi. Fils de Machli: Éléazar et Kis. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Éléazar mourut sans avoir de fils; mais il eut des filles, que prirent pour femmes les fils de Kis, leurs frères. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fils de Muschi: Machli, Éder et Jerémoth, trois. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ce sont là les fils de Lévi, selon leurs maisons paternelles, les chefs des maisons paternelles, d’après le dénombrement qu’on en fit en comptant les noms par tête. Ils étaient employés au service de la maison de l’Éternel, depuis l’âge de vingt ans et au-dessus. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Car David dit: L’Éternel, le Dieu d’Israël, a donné du repos à son peuple, et il habitera pour toujours à Jérusalem; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'et les Lévites n’auront plus à porter le tabernacle et tous les ustensiles pour son service. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ce fut d’après les derniers ordres de David qu’eut lieu le dénombrement des fils de Lévi depuis l’âge de vingt ans et au-dessus. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Placés auprès des fils d’Aaron pour le service de la maison de l’Éternel, ils avaient à prendre soin des parvis et des chambres, de la purification de toutes les choses saintes, des ouvrages concernant le service de la maison de Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'des pains de proposition, de la fleur de farine pour les offrandes, des galettes sans levain, des gâteaux cuits sur la plaque et des gâteaux frits, de toutes les mesures de capacité et de longueur: '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ils avaient à se présenter chaque matin et chaque soir, afin de louer et de célébrer l’Éternel, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'et à offrir continuellement devant l’Éternel tous les holocaustes à l’Éternel, aux sabbats, aux nouvelles lunes et aux fêtes, selon le nombre et les usages prescrits. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ils donnaient leurs soins à la tente d’assignation, au sanctuaire, et aux fils d’Aaron, leurs frères, pour le service de la maison de l’Éternel.
