document_id: 1CH.23,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Lévites, leur dénombrement et leurs fonctions
  - type: heading
    content: 'V. 1-32: cf. (No 3; 4; 8:5, etc.) (1 Ch 9:17-34. 2 Ch 35:1-15.)'
  - type: text
    content: 'David, âgé et rassasié de jours, établit Salomon, son fils, roi sur Israël. '
  '10':
  - type: text
    content: 'Fils de Schimeï: Jachath, Zina, Jeusch et Beria. Ce sont là les quatre fils de Schimeï. '
  '11':
  - type: text
    content: 'Jachath était le chef, et Zina le second; Jeusch et Beria n’eurent pas beaucoup de fils, et ils formèrent une seule maison paternelle dans le dénombrement. '
  '12':
  - type: text
    content: 'Fils de Kehath: Amram, Jitsehar, Hébron et Uziel, quatre. '
  '13':
  - type: note
    content: Ex 6:19.
  - type: text
    content: 'Fils d’Amram: Aaron et Moïse. '
  - type: note
    content: Ex 28:1, etc. Hé 5:4.
  - type: text
    content: 'Aaron fut mis à part pour être sanctifié comme très saint, lui et ses fils à perpétuité, pour offrir les parfums devant l’Éternel, pour faire son service, et pour bénir à toujours en son nom. '
  '14':
  - type: text
    content: 'Mais les fils de Moïse, homme de Dieu, furent comptés dans la tribu de Lévi. '
  '15':
  - type: note
    content: Ex 2:22; 18:3.
  - type: text
    content: 'Fils de Moïse: Guerschom et Éliézer. '
  '16':
  - type: text
    content: 'Fils de Guerschom: Schebuel, le chef. '
  '17':
  - type: text
    content: 'Et les fils d’Éliézer furent: Rechabia, le chef; Éliézer n’eut pas d’autre fils, mais les fils de Rechabia furent très nombreux. '
  '18':
  - type: text
    content: 'Fils de Jitsehar: Schelomith, le chef. '
  '19':
  - type: text
    content: 'Fils d’Hébron: Jerija, le chef; Amaria, le second; Jachaziel, le troisième; et Jekameam, le quatrième. '
  '2':
  - type: text
    content: 'Il assembla tous les chefs d’Israël, les sacrificateurs et les Lévites. '
  '20':
  - type: text
    content: 'Fils d’Uziel: Michée, le chef; et Jischija, le second. '
  '21':
  - type: text
    content: 'Fils de Merari: Machli et Muschi. Fils de Machli: Éléazar et Kis. '
  '22':
  - type: text
    content: 'Éléazar mourut sans avoir de fils; mais il eut des filles, que prirent pour femmes les fils de Kis, leurs frères. '
  '23':
  - type: text
    content: 'Fils de Muschi: Machli, Éder et Jerémoth, trois. '
  '24':
  - type: text
    content: 'Ce sont là les fils de Lévi, selon leurs maisons paternelles, les chefs des maisons paternelles, d’après le dénombrement qu’on en fit en comptant les noms par tête. Ils étaient employés au service de la maison de l’Éternel, depuis l’âge de vingt ans et au-dessus. '
  '25':
  - type: text
    content: 'Car David dit: L’Éternel, le Dieu d’Israël, a donné du repos à son peuple, et il habitera pour toujours à Jérusalem; '
  '26':
  - type: text
    content: 'et les Lévites n’auront plus à porter le tabernacle et tous les ustensiles pour son service. '
  '27':
  - type: text
    content: 'Ce fut d’après les derniers ordres de David qu’eut lieu le dénombrement des fils de Lévi depuis l’âge de vingt ans et au-dessus. '
  '28':
  - type: text
    content: 'Placés auprès des fils d’Aaron pour le service de la maison de l’Éternel, ils avaient à prendre soin des parvis et des chambres, de la purification de toutes les choses saintes, des ouvrages concernant le service de la maison de Dieu, '
  '29':
  - type: text
    content: 'des pains de proposition, de la fleur de farine pour les offrandes, des galettes sans levain, des gâteaux cuits sur la plaque et des gâteaux frits, de toutes les mesures de capacité et de longueur: '
  '3':
  - type: text
    content: 'On fit le dénombrement des Lévites, depuis l’âge de trente ans et au-dessus; comptés par tête et par homme, ils se trouvèrent au nombre de trente-huit mille. '
  '30':
  - type: text
    content: 'ils avaient à se présenter chaque matin et chaque soir, afin de louer et de célébrer l’Éternel, '
  '31':
  - type: text
    content: 'et à offrir continuellement devant l’Éternel tous les holocaustes à l’Éternel, aux sabbats, aux nouvelles lunes et aux fêtes, selon le nombre et les usages prescrits. '
  '32':
  - type: text
    content: Ils donnaient leurs soins à la tente d’assignation, au sanctuaire, et aux fils d’Aaron, leurs frères, pour le service de la maison de l’Éternel.
  '4':
  - type: text
    content: 'Et David dit: Qu’il y en ait vingt-quatre mille pour veiller aux offices de la maison de l’Éternel, six mille comme magistrats et juges, '
  '5':
  - type: text
    content: 'quatre mille comme portiers, et quatre mille chargés de louer l’Éternel avec les instruments que j’ai faits pour le célébrer. '
  '6':
  - type: text
    content: 'David les divisa en classes d’après les fils de Lévi, Guerschon, Kehath et Merari. '
  '7':
  - type: text
    content: 'Des Guerschonites: Laedan et Schimeï. '
  '8':
  - type: text
    content: 'Fils de Laedan: le chef Jehiel, Zétham et Joël, trois. '
  '9':
  - type: text
    content: 'Fils de Schimeï: Schelomith, Haziel et Haran, trois. Ce sont là les chefs des maisons paternelles de la famille de Laedan. '
