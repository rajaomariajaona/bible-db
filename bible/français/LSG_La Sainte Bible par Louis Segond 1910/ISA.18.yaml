document_id: ISA.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie contre l’Assyrie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. És 20. Ps 68:23.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Terre, où retentit le cliquetis des armes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au-delà des fleuves de l’Éthiopie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Toi qui envoies sur mer des messagers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans des navires de jonc voguant à la surface des eaux!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Allez, messagers rapides, vers la nation forte et vigoureuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vers ce peuple redoutable depuis qu’il existe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nation puissante et qui écrase tout,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et dont le pays est coupé par des fleuves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Vous tous, habitants du monde, habitants de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voyez la bannière qui se dresse sur les montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Écoutez la trompette qui sonne!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Car ainsi m’a parlé l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je regarde tranquillement de ma demeure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par la chaleur brillante de la lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et par la vapeur de la rosée, au temps de la chaude moisson.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mais avant la moisson, quand la pousse est achevée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand la fleur devient un raisin qui mûrit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il coupe les sarments avec des serpes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il enlève, il tranche les ceps…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils seront tous abandonnés aux oiseaux de proie des montagnes
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et aux bêtes de la terre; Les oiseaux de proie passeront l’été sur leurs cadavres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les bêtes de la terre y passeront l’hiver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: En ce temps-là, des offrandes seront apportées à l’Éternel des armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par le peuple fort et vigoureux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par le peuple redoutable depuis qu’il existe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nation puissante et qui écrase tout,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et dont le pays est coupé par des fleuves;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles seront apportées là où réside le nom de l’Éternel des armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur la montagne de Sion.
