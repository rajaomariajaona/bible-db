document_id: ISA.18,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie contre l’Assyrie
  - type: heading
    content: 'V. 1-7: cf. És 20. Ps 68:23.'
  - type: text
    content: Terre, où retentit le cliquetis des armes,
  - type: text
    content: Au-delà des fleuves de l’Éthiopie!
  '2':
  - type: text
    content: Toi qui envoies sur mer des messagers,
  - type: text
    content: Dans des navires de jonc voguant à la surface des eaux!
  - type: text
    content: Allez, messagers rapides, vers la nation forte et vigoureuse,
  - type: text
    content: Vers ce peuple redoutable depuis qu’il existe,
  - type: text
    content: Nation puissante et qui écrase tout,
  - type: text
    content: Et dont le pays est coupé par des fleuves.
  '3':
  - type: text
    content: Vous tous, habitants du monde, habitants de la terre,
  - type: text
    content: Voyez la bannière qui se dresse sur les montagnes,
  - type: text
    content: Écoutez la trompette qui sonne!
  '4':
  - type: text
    content: 'Car ainsi m’a parlé l’Éternel:'
  - type: text
    content: Je regarde tranquillement de ma demeure,
  - type: text
    content: Par la chaleur brillante de la lumière,
  - type: text
    content: Et par la vapeur de la rosée, au temps de la chaude moisson.
  '5':
  - type: text
    content: Mais avant la moisson, quand la pousse est achevée,
  - type: text
    content: Quand la fleur devient un raisin qui mûrit,
  - type: text
    content: Il coupe les sarments avec des serpes,
  - type: text
    content: Il enlève, il tranche les ceps…
  '6':
  - type: text
    content: Ils seront tous abandonnés aux oiseaux de proie des montagnes
  - type: text
    content: Et aux bêtes de la terre; Les oiseaux de proie passeront l’été sur leurs cadavres,
  - type: text
    content: Et les bêtes de la terre y passeront l’hiver.
  '7':
  - type: text
    content: En ce temps-là, des offrandes seront apportées à l’Éternel des armées,
  - type: text
    content: Par le peuple fort et vigoureux,
  - type: text
    content: Par le peuple redoutable depuis qu’il existe,
  - type: text
    content: Nation puissante et qui écrase tout,
  - type: text
    content: Et dont le pays est coupé par des fleuves;
  - type: text
    content: Elles seront apportées là où réside le nom de l’Éternel des armées,
  - type: text
    content: Sur la montagne de Sion.
