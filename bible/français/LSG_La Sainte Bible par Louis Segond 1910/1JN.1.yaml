document_id: 1JN.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La parole de vie
  - type: heading
    content: 'V. 1-4: cf. (Jn 1:1-4, 14; 17:20-23.) 1 Jn 5:11-13.'
  - type: text
    content: 'Ce qui était '
  - type: note
    content: Jn 1:1.
  - type: text
    content: 'dès le commencement, ce que nous avons entendu, ce que nous avons vu de nos yeux, '
  - type: note
    content: Jn 1:14. 2 Pi 1:16.
  - type: text
    content: 'ce que nous avons contemplé et '
  - type: note
    content: Lu 24:39. Jn 20:27.
  - type: text
    content: 'que nos mains ont touché, concernant la parole de vie, '
  '10':
  - type: text
    content: Si nous disons que nous n’avons pas péché, nous le faisons menteur, et sa parole n’est point en nous.
  '2':
  - type: text
    content: 'car la vie a été manifestée, et nous l’avons vue et nous lui rendons témoignage, et nous vous annonçons la vie éternelle, qui était auprès du Père et qui nous a été manifestée, '
  '3':
  - type: text
    content: 'ce que nous avons vu et entendu, nous vous l’annonçons, à vous aussi, afin que vous aussi vous soyez en communion avec nous. Or, notre communion est avec le Père et avec son Fils Jésus-Christ. '
  '4':
  - type: text
    content: Et nous écrivons ces choses, afin que notre joie soit parfaite.
  - type: heading
    content: Dieu est lumière. Marcher dans la lumière. La confession des péchés. Le pardon par Jésus-Christ
  - type: heading
    content: '1 v. 5 à 2 v. 2: cf. Ép 5:1, 8-14. (1 Jn 2:3-6. Tit 2:14.) (Pr 28:13. Ps 32:1-5.) Jn 1:29.'
  '5':
  - type: text
    content: 'La nouvelle que nous avons apprise de lui, et que nous vous annonçons, '
  - type: note
    content: Jn 1:9; 8:12; 9:5; 12:35, 36.
  - type: text
    content: 'c’est que Dieu est lumière, et qu’il n’y a point en lui de ténèbres. '
  '6':
  - type: text
    content: 'Si nous disons que nous sommes en communion avec lui, et que nous marchions dans les ténèbres, nous mentons, et nous ne pratiquons pas la vérité. '
  '7':
  - type: text
    content: 'Mais si nous marchons dans la lumière, comme il est lui-même dans la lumière, nous sommes mutuellement en communion, '
  - type: note
    content: Hé 9:14. 1 Pi 1:19. Ap 1:5.
  - type: text
    content: 'et le sang de Jésus son Fils nous purifie de tout péché. '
  '8':
  - type: note
    content: 1 R 8:46. 2 Ch 6:36. Job 9:2. Ps 143:3. Pr 20:9. Ec 7:20.
  - type: text
    content: 'Si nous disons que nous n’avons pas de péché, nous nous séduisons nous-mêmes, et la vérité n’est point en nous. '
  '9':
  - type: note
    content: Ps 32:5. Pr 28:13.
  - type: text
    content: 'Si nous confessons nos péchés, il est fidèle et juste pour nous les pardonner, et pour nous purifier de toute iniquité. '
