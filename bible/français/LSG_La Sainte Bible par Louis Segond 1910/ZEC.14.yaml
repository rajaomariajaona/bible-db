document_id: ZEC.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jour de l’Éternel
  - type: heading
    content: 'V. 1-5: cf. Ap 16:13-16. Mt 16:27. 2 Th 1:6-10.'
  - type: text
    content: Voici, le jour de l’Éternel arrive,
  - type: text
    content: Et tes dépouilles seront partagées au milieu de toi.
  '10':
  - type: text
    content: Tout le pays deviendra comme la plaine, de Guéba à Rimmon,
  - type: text
    content: Au midi de Jérusalem;
  - type: text
    content: Et Jérusalem sera élevée et restera à sa place,
  - type: text
    content: Depuis la porte de Benjamin jusqu’au lieu de la première porte,
  - type: text
    content: Jusqu’à la porte des angles,
  - type: text
    content: Et depuis la tour de Hananeel jusqu’aux pressoirs du roi.
  '11':
  - type: text
    content: On habitera dans son sein, et il n’y aura plus d’interdit;
  - type: text
    content: Jérusalem sera en sécurité.
  - type: heading
    content: 'V. 12-19: cf. Ps 2:8-12. És 60:12; 66:23, 24.'
  '12':
  - type: text
    content: Voici la plaie dont l’Éternel frappera tous les peuples
  - type: text
    content: 'Qui auront combattu contre Jérusalem:'
  - type: text
    content: Leur chair tombera en pourriture tandis qu’ils seront sur leurs pieds,
  - type: text
    content: Leurs yeux tomberont en pourriture dans leurs orbites,
  - type: text
    content: Et leur langue tombera en pourriture dans leur bouche.
  '13':
  - type: text
    content: En ce jour-là, l’Éternel produira un grand trouble parmi eux;
  - type: text
    content: L’un saisira la main de l’autre,
  - type: text
    content: Et ils lèveront la main les uns sur les autres.
  '14':
  - type: text
    content: Juda combattra aussi dans Jérusalem,
  - type: text
    content: Et l’on amassera les richesses de toutes les nations d’alentour,
  - type: text
    content: L’or, l’argent, et des vêtements en très grand nombre.
  '15':
  - type: text
    content: La plaie frappera de même les chevaux,
  - type: text
    content: Les mulets, les chameaux, les ânes,
  - type: text
    content: 'Et toutes les bêtes qui seront dans ces camps:'
  - type: text
    content: Cette plaie sera semblable à l’autre.
  '16':
  - type: text
    content: Tous ceux qui resteront de toutes les nations
  - type: text
    content: Venues contre Jérusalem
  - type: text
    content: Monteront chaque année
  - type: text
    content: 'Pour '
  - type: note
    content: És 66:23.
  - type: text
    content: se prosterner devant le roi, l’Éternel des armées,
  - type: text
    content: Et pour célébrer la fête des tabernacles.
  '17':
  - type: text
    content: S’il y a des familles de la terre qui ne montent pas à Jérusalem
  - type: text
    content: Pour se prosterner devant le roi, l’Éternel des armées,
  - type: text
    content: La pluie ne tombera pas sur elles.
  '18':
  - type: text
    content: Si la famille d’Égypte ne monte pas, si elle ne vient pas,
  - type: text
    content: La pluie ne tombera pas sur elle;
  - type: text
    content: Elle sera frappée de la plaie dont l’Éternel frappera les nations
  - type: text
    content: Qui ne monteront pas pour célébrer la fête des tabernacles.
  '19':
  - type: text
    content: Ce sera le châtiment de l’Égypte,
  - type: text
    content: Le châtiment de toutes les nations
  - type: text
    content: Qui ne monteront pas pour célébrer la fête des tabernacles.
  - type: heading
    content: 'V. 20-21: cf. És 4:3. Joë 3:17. Ap 21:27.'
  '2':
  - type: text
    content: Je rassemblerai toutes les nations pour qu’elles attaquent Jérusalem;
  - type: text
    content: 'La ville sera prise, '
  - type: note
    content: És 13:16.
  - type: text
    content: les maisons seront pillées, et les femmes violées;
  - type: text
    content: La moitié de la ville ira en captivité,
  - type: text
    content: Mais le reste du peuple ne sera pas exterminé de la ville.
  '20':
  - type: text
    content: 'En ce jour-là, il sera écrit sur les clochettes des chevaux:'
  - type: text
    content: Sainteté à L’Éternel!
  - type: text
    content: Et les chaudières dans la maison de l’Éternel
  - type: text
    content: Seront comme les coupes devant l’autel.
  '21':
  - type: text
    content: Toute chaudière à Jérusalem et dans Juda
  - type: text
    content: Sera consacrée à l’Éternel des armées;
  - type: text
    content: Tous ceux qui offriront des sacrifices viendront
  - type: text
    content: Et s’en serviront pour cuire les viandes;
  - type: text
    content: 'Et il n’y aura plus de '
  - type: note
    content: És 35:8. Joë 3:17. Ap 21:27; 22:15.
  - type: text
    content: marchands dans la maison de l’Éternel des armées,
  - type: text
    content: En ce jour-là.
  '3':
  - type: text
    content: ' '
  - type: note
    content: És 42:13.
  - type: text
    content: L’Éternel paraîtra, et il combattra ces nations,
  - type: text
    content: Comme il combat au jour de la bataille.
  '4':
  - type: text
    content: Ses pieds se poseront en ce jour sur la montagne des oliviers,
  - type: text
    content: Qui est vis-à-vis de Jérusalem, du côté de l’orient;
  - type: text
    content: La montagne des oliviers se fendra par le milieu, à l’orient et à l’occident,
  - type: text
    content: 'Et il se formera une très grande vallée:'
  - type: text
    content: Une moitié de la montagne reculera vers le septentrion,
  - type: text
    content: Et une moitié vers le midi.
  '5':
  - type: text
    content: Vous fuirez alors dans la vallée de mes montagnes,
  - type: text
    content: Car la vallée des montagnes s’étendra jusqu’à Atzel;
  - type: text
    content: 'Vous fuirez comme vous avez fui '
  - type: note
    content: Am 1:1.
  - type: text
    content: devant le tremblement de terre,
  - type: text
    content: Au temps d’Ozias, roi de Juda.
  - type: text
    content: Et l’Éternel, mon Dieu, viendra, et tous ses saints avec lui.
  - type: heading
    content: 'V. 6-11: cf. Joë 3:18. Éz 47:1-12.'
  '6':
  - type: text
    content: En ce jour-là, il n’y aura point de lumière;
  - type: text
    content: Il y aura du froid et de la glace.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ap 21:25.
  - type: text
    content: Ce sera un jour unique, connu de l’Éternel,
  - type: text
    content: Et qui ne sera ni jour ni nuit;
  - type: text
    content: Mais vers le soir la lumière paraîtra.
  '8':
  - type: text
    content: 'En ce jour-là, '
  - type: note
    content: Éz 47:1, etc. Joë 3:18. Ap 22:1.
  - type: text
    content: des eaux vives sortiront de Jérusalem,
  - type: text
    content: Et couleront moitié vers la mer orientale,
  - type: text
    content: Moitié vers la mer occidentale;
  - type: text
    content: Il en sera ainsi été et hiver.
  '9':
  - type: text
    content: L’Éternel sera roi de toute la terre;
  - type: text
    content: En ce jour-là, l’Éternel sera le seul Éternel,
  - type: text
    content: Et son nom sera le seul nom.
