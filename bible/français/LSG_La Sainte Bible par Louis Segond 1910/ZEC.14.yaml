document_id: ZEC.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le jour de l’Éternel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. Ap 16:13-16. Mt 16:27. 2 Th 1:6-10.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici, le jour de l’Éternel arrive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes dépouilles seront partagées au milieu de toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je rassemblerai toutes les nations pour qu’elles attaquent Jérusalem;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'La ville sera prise, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 13:16
      metadata:
        usfm: ISA.13.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: les maisons seront pillées, et les femmes violées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La moitié de la ville ira en captivité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais le reste du peuple ne sera pas exterminé de la ville.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 42:13
      metadata:
        usfm: ISA.42.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’Éternel paraîtra, et il combattra ces nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme il combat au jour de la bataille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ses pieds se poseront en ce jour sur la montagne des oliviers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui est vis-à-vis de Jérusalem, du côté de l’orient;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La montagne des oliviers se fendra par le milieu, à l’orient et à l’occident,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et il se formera une très grande vallée:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une moitié de la montagne reculera vers le septentrion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et une moitié vers le midi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Vous fuirez alors dans la vallée de mes montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car la vallée des montagnes s’étendra jusqu’à Atzel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Vous fuirez comme vous avez fui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 1:1
      metadata:
        usfm: AMO.1.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: devant le tremblement de terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au temps d’Ozias, roi de Juda.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’Éternel, mon Dieu, viendra, et tous ses saints avec lui.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-11: cf. Joë 3:18. Éz 47:1-12.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: En ce jour-là, il n’y aura point de lumière;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il y aura du froid et de la glace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 21:25
      metadata:
        usfm: REV.21.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ce sera un jour unique, connu de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui ne sera ni jour ni nuit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais vers le soir la lumière paraîtra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'En ce jour-là, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Éz 47:1, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 3:18
      metadata:
        usfm: JOL.3.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 22:1
      metadata:
        usfm: REV.22.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: des eaux vives sortiront de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et couleront moitié vers la mer orientale,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moitié vers la mer occidentale;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il en sera ainsi été et hiver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’Éternel sera roi de toute la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: En ce jour-là, l’Éternel sera le seul Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et son nom sera le seul nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tout le pays deviendra comme la plaine, de Guéba à Rimmon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au midi de Jérusalem;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et Jérusalem sera élevée et restera à sa place,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Depuis la porte de Benjamin jusqu’au lieu de la première porte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à la porte des angles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et depuis la tour de Hananeel jusqu’aux pressoirs du roi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: On habitera dans son sein, et il n’y aura plus d’interdit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jérusalem sera en sécurité.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-19: cf. Ps 2:8-12. És 60:12; 66:23, 24.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Voici la plaie dont l’Éternel frappera tous les peuples
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Qui auront combattu contre Jérusalem:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur chair tombera en pourriture tandis qu’ils seront sur leurs pieds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs yeux tomberont en pourriture dans leurs orbites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leur langue tombera en pourriture dans leur bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: En ce jour-là, l’Éternel produira un grand trouble parmi eux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’un saisira la main de l’autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils lèveront la main les uns sur les autres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Juda combattra aussi dans Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’on amassera les richesses de toutes les nations d’alentour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’or, l’argent, et des vêtements en très grand nombre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La plaie frappera de même les chevaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les mulets, les chameaux, les ânes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et toutes les bêtes qui seront dans ces camps:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cette plaie sera semblable à l’autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tous ceux qui resteront de toutes les nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: Venues contre Jérusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: Monteront chaque année
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pour '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 66:23
      metadata:
        usfm: ISA.66.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: se prosterner devant le roi, l’Éternel des armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pour célébrer la fête des tabernacles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: S’il y a des familles de la terre qui ne montent pas à Jérusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour se prosterner devant le roi, l’Éternel des armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La pluie ne tombera pas sur elles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Si la famille d’Égypte ne monte pas, si elle ne vient pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La pluie ne tombera pas sur elle;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle sera frappée de la plaie dont l’Éternel frappera les nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui ne monteront pas pour célébrer la fête des tabernacles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ce sera le châtiment de l’Égypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le châtiment de toutes les nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui ne monteront pas pour célébrer la fête des tabernacles.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-21: cf. És 4:3. Joë 3:17. Ap 21:27.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'En ce jour-là, il sera écrit sur les clochettes des chevaux:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sainteté à L’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les chaudières dans la maison de l’Éternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seront comme les coupes devant l’autel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Toute chaudière à Jérusalem et dans Juda
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sera consacrée à l’Éternel des armées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui offriront des sacrifices viendront
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et s’en serviront pour cuire les viandes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et il n’y aura plus de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 35:8
      metadata:
        usfm: ISA.35.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 3:17
      metadata:
        usfm: JOL.3.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 21:27
      metadata:
        usfm: REV.21.27
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:15
      metadata:
        usfm: REV.22.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: marchands dans la maison de l’Éternel des armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: En ce jour-là.
