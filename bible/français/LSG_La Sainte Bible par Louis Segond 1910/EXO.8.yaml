document_id: EXO.8,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'L’Éternel dit à Moïse: Dis à Aaron: Étends ta main avec ta verge sur les rivières, sur les ruisseaux et sur les étangs, et fais monter les grenouilles sur le pays d’Égypte. '
  '10':
  - type: text
    content: 'On les entassa par monceaux, et le pays fut infecté. '
  '11':
  - type: text
    content: 'Pharaon, voyant qu’il y avait du relâche, '
  - type: note
    content: Ex 7:14.
  - type: text
    content: endurcit son cœur, et il n’écouta point Moïse et Aaron, selon ce que l’Éternel avait dit.
  - type: heading
    content: 'V. 12-15: cf. Ps 105:31. 2 Ti 3:8, 9.'
  '12':
  - type: text
    content: 'L’Éternel dit à Moïse: Dis à Aaron: Étends ta verge, et frappe la poussière de la terre. Elle se changera en poux, dans tout le pays d’Égypte. '
  '13':
  - type: text
    content: 'Ils firent ainsi. Aaron étendit sa main, avec sa verge, et il frappa la poussière de la terre; et elle fut changée en poux sur les hommes et sur les animaux. '
  - type: note
    content: Ps 105:31.
  - type: text
    content: 'Toute la poussière de la terre fut changée en poux, dans tout le pays d’Égypte. '
  '14':
  - type: text
    content: 'Les magiciens employèrent leurs enchantements pour produire les poux; mais ils ne purent pas. Les poux étaient sur les hommes et sur les animaux. '
  '15':
  - type: text
    content: 'Et les magiciens dirent à Pharaon: C’est le doigt de Dieu! Le cœur de Pharaon s’endurcit, et il n’écouta point Moïse et Aaron, selon ce que l’Éternel avait dit.'
  - type: heading
    content: 'V. 16-28: cf. Ps 78:45; 105:31.'
  '16':
  - type: text
    content: 'L’Éternel dit à Moïse: Lève-toi de bon matin, et présente-toi devant Pharaon; il sortira pour aller près de l’eau. Tu lui diras: Ainsi parle l’Éternel: Laisse aller mon peuple, afin qu’il me serve. '
  '17':
  - type: text
    content: 'Si tu ne laisses pas aller mon peuple, je vais envoyer les mouches venimeuses contre toi, contre tes serviteurs, contre ton peuple et contre tes maisons; les maisons des Égyptiens seront remplies de mouches, et le sol en sera couvert. '
  '18':
  - type: text
    content: 'Mais, en ce jour-là, je distinguerai le pays de Gosen où habite mon peuple, et là il n’y aura point de mouches, afin que tu saches que moi, l’Éternel, je suis au milieu de ce pays. '
  '19':
  - type: text
    content: 'J’établirai une distinction entre mon peuple et ton peuple. Ce signe sera pour demain. '
  '2':
  - type: text
    content: 'Aaron étendit sa main sur les eaux de l’Égypte; et les grenouilles montèrent et couvrirent le pays d’Égypte. '
  '20':
  - type: text
    content: 'L’Éternel fit ainsi. '
  - type: note
    content: Ps 105:31.
  - type: text
    content: 'Il vint une quantité de mouches venimeuses dans la maison de Pharaon et de ses serviteurs, et '
  - type: note
    content: Ps 78:45.
  - type: text
    content: 'tout le pays d’Égypte fut dévasté par les mouches. '
  '21':
  - type: text
    content: 'Pharaon appela Moïse et Aaron et dit: Allez, offrez des sacrifices à votre Dieu dans le pays. '
  '22':
  - type: text
    content: 'Moïse répondit: Il n’est point convenable de faire ainsi; '
  - type: note
    content: Ge 43:32; 46:34.
  - type: text
    content: 'car nous offririons à l’Éternel, notre Dieu, des sacrifices qui sont en abomination aux Égyptiens. Et si nous offrons, sous leurs yeux, des sacrifices qui sont en abomination aux Égyptiens, ne nous lapideront-ils pas? '
  '23':
  - type: text
    content: 'Nous ferons trois journées de marche dans le désert, et nous offrirons des sacrifices à l’Éternel, notre Dieu, selon ce qu’il nous dira. '
  '24':
  - type: text
    content: 'Pharaon dit: Je vous laisserai aller, pour offrir à l’Éternel, votre Dieu, des sacrifices dans le désert: seulement, vous ne vous éloignerez pas, en y allant. Priez pour moi. '
  '25':
  - type: text
    content: 'Moïse répondit: Je vais sortir de chez toi, et je prierai l’Éternel. Demain, les mouches s’éloigneront de Pharaon, de ses serviteurs et de son peuple. Mais, que Pharaon ne trompe plus, en refusant de laisser aller le peuple, pour offrir des sacrifices à l’Éternel. '
  '26':
  - type: text
    content: 'Moïse sortit de chez Pharaon, et il pria l’Éternel. '
  '27':
  - type: text
    content: 'L’Éternel fit ce que demandait Moïse; et les mouches s’éloignèrent de Pharaon, de ses serviteurs et de son peuple. Il n’en resta pas une. '
  '28':
  - type: text
    content: 'Mais '
  - type: note
    content: Ex 8:15.
  - type: text
    content: Pharaon, cette fois encore, endurcit son cœur, et il ne laissa point aller le peuple.
  '3':
  - type: text
    content: 'Mais les magiciens en firent autant par leurs enchantements. Ils firent monter les grenouilles sur le pays d’Égypte. '
  '4':
  - type: text
    content: 'Pharaon appela Moïse et Aaron, et dit: Priez l’Éternel, afin qu’il éloigne les grenouilles de moi et de mon peuple; et je laisserai aller le peuple, pour qu’il offre des sacrifices à l’Éternel. '
  '5':
  - type: text
    content: 'Moïse dit à Pharaon: Glorifie-toi sur moi! Pour quand prierai-je l’Éternel en ta faveur, en faveur de tes serviteurs et de ton peuple, afin qu’il retire les grenouilles loin de toi et de tes maisons? Il n’en restera que dans le fleuve. '
  '6':
  - type: text
    content: 'Il répondit: Pour demain. Et Moïse dit: Il en sera ainsi, afin que tu saches que nul n’est semblable à l’Éternel, notre Dieu. '
  '7':
  - type: text
    content: 'Les grenouilles s’éloigneront de toi et de tes maisons, de tes serviteurs et de ton peuple; il n’en restera que dans le fleuve. '
  '8':
  - type: text
    content: 'Moïse et Aaron sortirent de chez Pharaon. Et Moïse cria à l’Éternel au sujet des grenouilles dont il avait frappé Pharaon. '
  '9':
  - type: text
    content: 'L’Éternel fit ce que demandait Moïse; et les grenouilles périrent dans les maisons, dans les cours et dans les champs. '
