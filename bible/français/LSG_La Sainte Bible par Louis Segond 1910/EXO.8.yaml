document_id: EXO.8
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel dit à Moïse: Dis à Aaron: Étends ta main avec ta verge sur les rivières, sur les ruisseaux et sur les étangs, et fais monter les grenouilles sur le pays d’Égypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Aaron étendit sa main sur les eaux de l’Égypte; et les grenouilles montèrent et couvrirent le pays d’Égypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais les magiciens en firent autant par leurs enchantements. Ils firent monter les grenouilles sur le pays d’Égypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pharaon appela Moïse et Aaron, et dit: Priez l’Éternel, afin qu’il éloigne les grenouilles de moi et de mon peuple; et je laisserai aller le peuple, pour qu’il offre des sacrifices à l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Moïse dit à Pharaon: Glorifie-toi sur moi! Pour quand prierai-je l’Éternel en ta faveur, en faveur de tes serviteurs et de ton peuple, afin qu’il retire les grenouilles loin de toi et de tes maisons? Il n’en restera que dans le fleuve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il répondit: Pour demain. Et Moïse dit: Il en sera ainsi, afin que tu saches que nul n’est semblable à l’Éternel, notre Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les grenouilles s’éloigneront de toi et de tes maisons, de tes serviteurs et de ton peuple; il n’en restera que dans le fleuve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Moïse et Aaron sortirent de chez Pharaon. Et Moïse cria à l’Éternel au sujet des grenouilles dont il avait frappé Pharaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L’Éternel fit ce que demandait Moïse; et les grenouilles périrent dans les maisons, dans les cours et dans les champs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On les entassa par monceaux, et le pays fut infecté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Pharaon, voyant qu’il y avait du relâche, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 7:14
      metadata:
        usfm: EXO.7.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: endurcit son cœur, et il n’écouta point Moïse et Aaron, selon ce que l’Éternel avait dit.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-15: cf. Ps 105:31. 2 Ti 3:8, 9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’Éternel dit à Moïse: Dis à Aaron: Étends ta verge, et frappe la poussière de la terre. Elle se changera en poux, dans tout le pays d’Égypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils firent ainsi. Aaron étendit sa main, avec sa verge, et il frappa la poussière de la terre; et elle fut changée en poux sur les hommes et sur les animaux. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:31
      metadata:
        usfm: PSA.105.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Toute la poussière de la terre fut changée en poux, dans tout le pays d’Égypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les magiciens employèrent leurs enchantements pour produire les poux; mais ils ne purent pas. Les poux étaient sur les hommes et sur les animaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et les magiciens dirent à Pharaon: C’est le doigt de Dieu! Le cœur de Pharaon s’endurcit, et il n’écouta point Moïse et Aaron, selon ce que l’Éternel avait dit.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-28: cf. Ps 78:45; 105:31.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L’Éternel dit à Moïse: Lève-toi de bon matin, et présente-toi devant Pharaon; il sortira pour aller près de l’eau. Tu lui diras: Ainsi parle l’Éternel: Laisse aller mon peuple, afin qu’il me serve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Si tu ne laisses pas aller mon peuple, je vais envoyer les mouches venimeuses contre toi, contre tes serviteurs, contre ton peuple et contre tes maisons; les maisons des Égyptiens seront remplies de mouches, et le sol en sera couvert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais, en ce jour-là, je distinguerai le pays de Gosen où habite mon peuple, et là il n’y aura point de mouches, afin que tu saches que moi, l’Éternel, je suis au milieu de ce pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'J’établirai une distinction entre mon peuple et ton peuple. Ce signe sera pour demain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'L’Éternel fit ainsi. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:31
      metadata:
        usfm: PSA.105.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il vint une quantité de mouches venimeuses dans la maison de Pharaon et de ses serviteurs, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:45
      metadata:
        usfm: PSA.78.45
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tout le pays d’Égypte fut dévasté par les mouches. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Pharaon appela Moïse et Aaron et dit: Allez, offrez des sacrifices à votre Dieu dans le pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Moïse répondit: Il n’est point convenable de faire ainsi; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 43:32
      metadata:
        usfm: GEN.43.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 46:34
      metadata:
        usfm: GEN.46.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car nous offririons à l’Éternel, notre Dieu, des sacrifices qui sont en abomination aux Égyptiens. Et si nous offrons, sous leurs yeux, des sacrifices qui sont en abomination aux Égyptiens, ne nous lapideront-ils pas? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nous ferons trois journées de marche dans le désert, et nous offrirons des sacrifices à l’Éternel, notre Dieu, selon ce qu’il nous dira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Pharaon dit: Je vous laisserai aller, pour offrir à l’Éternel, votre Dieu, des sacrifices dans le désert: seulement, vous ne vous éloignerez pas, en y allant. Priez pour moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Moïse répondit: Je vais sortir de chez toi, et je prierai l’Éternel. Demain, les mouches s’éloigneront de Pharaon, de ses serviteurs et de son peuple. Mais, que Pharaon ne trompe plus, en refusant de laisser aller le peuple, pour offrir des sacrifices à l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Moïse sortit de chez Pharaon, et il pria l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'L’Éternel fit ce que demandait Moïse; et les mouches s’éloignèrent de Pharaon, de ses serviteurs et de son peuple. Il n’en resta pas une. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 8:15
      metadata:
        usfm: EXO.8.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pharaon, cette fois encore, endurcit son cœur, et il ne laissa point aller le peuple.
