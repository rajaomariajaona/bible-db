document_id: 2CH.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zèle du roi Asa pour la destruction de l’idolâtrie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. 1 S 12:7-15, 20-25. És 3:10. Os 10:12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’esprit de Dieu fut sur Azaria, fils d’Obed, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et Azaria alla au-devant d’Asa et lui dit: Écoutez-moi, Asa, et tout Juda et Benjamin! L’Éternel est avec vous quand vous êtes avec lui; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 28:9
      metadata:
        usfm: 1CH.28.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 33:12
      metadata:
        usfm: 2CH.33.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 7:7
      metadata:
        usfm: MAT.7.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'si vous le cherchez, vous le trouverez; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 24:20
      metadata:
        usfm: 2CH.24.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais si vous l’abandonnez, il vous abandonnera. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 3:4
      metadata:
        usfm: HOS.3.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pendant longtemps il n’y a eu pour Israël ni vrai Dieu, ni sacrificateur qui enseignât, ni loi. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:29
      metadata:
        usfm: DEU.4.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais au sein de leur détresse ils sont retournés à l’Éternel, le Dieu d’Israël, ils l’ont cherché, et ils l’ont trouvé. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dans ces temps-là, point de sécurité pour ceux qui allaient et venaient, car il y avait de grands troubles parmi tous les habitants du pays; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'on se heurtait peuple contre peuple, ville contre ville, parce que Dieu les agitait par toutes sortes d’angoisses. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Vous donc, fortifiez-vous, et ne laissez pas vos mains s’affaiblir, car il y aura un salaire pour vos œuvres.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-19: cf. 1 R 15:11-15. 2 R 23:1-7. És 26:3, 4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Après avoir entendu ces paroles et la prophétie d’Obed le prophète, Asa se fortifia et fit disparaître les abominations de tout le pays de Juda et de Benjamin et des villes qu’il avait prises dans la montagne d’Éphraïm, et il restaura l’autel de l’Éternel qui était devant le portique de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il rassembla tout Juda et Benjamin, et ceux d’Éphraïm, de Manassé et de Siméon qui habitaient parmi eux, car un grand nombre de gens d’Israël se joignirent à lui lorsqu’ils virent que l’Éternel, son Dieu, était avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils s’assemblèrent à Jérusalem le troisième mois de la quinzième année du règne d’Asa. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ce jour-là, ils sacrifièrent à l’Éternel, sur le butin qu’ils avaient amené, sept cents bœufs et sept mille brebis. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 24:14
      metadata:
        usfm: JOS.24.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Né 10:29
      metadata:
        usfm: NEH.10.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'prirent l’engagement de chercher l’Éternel, le Dieu de leurs pères, de tout leur cœur et de toute leur âme; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et quiconque ne chercherait pas l’Éternel, le Dieu d’Israël, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 13:9
      metadata:
        usfm: DEU.13.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'devait être mis à mort, petit ou grand, homme ou femme. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils jurèrent fidélité à l’Éternel à voix haute, avec des cris de joie, et au son des trompettes et des cors; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'tout Juda se réjouit de ce serment, car ils avaient juré de tout leur cœur, ils avaient cherché l’Éternel de plein gré, et ils l’avaient trouvé, et l’Éternel leur donna du repos de tous côtés. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le roi Asa enleva même à Maaca, sa mère, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 15:13
      metadata:
        usfm: 1KI.15.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la dignité de reine, parce qu’elle avait fait une idole pour Astarté. Asa abattit son idole, qu’il réduisit en poussière, et la brûla au torrent de Cédron. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais les hauts lieux ne disparurent point d’Israël, quoique le cœur d’Asa fût en entier à l’Éternel pendant toute sa vie. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il mit dans la maison de Dieu les choses consacrées par son père et par lui-même, de l’argent, de l’or et des vases. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il n’y eut point de guerre jusqu’à la trente-cinquième année du règne d’Asa.
