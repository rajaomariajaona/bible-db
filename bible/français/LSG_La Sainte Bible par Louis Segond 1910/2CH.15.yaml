document_id: 2CH.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Zèle du roi Asa pour la destruction de l’idolâtrie
  - type: heading
    content: 'V. 1-7: cf. 1 S 12:7-15, 20-25. És 3:10. Os 10:12.'
  - type: text
    content: 'L’esprit de Dieu fut sur Azaria, fils d’Obed, '
  '10':
  - type: text
    content: 'Ils s’assemblèrent à Jérusalem le troisième mois de la quinzième année du règne d’Asa. '
  '11':
  - type: text
    content: 'Ce jour-là, ils sacrifièrent à l’Éternel, sur le butin qu’ils avaient amené, sept cents bœufs et sept mille brebis. '
  '12':
  - type: text
    content: 'Ils '
  - type: note
    content: Jos 24:14. Né 10:29.
  - type: text
    content: 'prirent l’engagement de chercher l’Éternel, le Dieu de leurs pères, de tout leur cœur et de toute leur âme; '
  '13':
  - type: text
    content: 'et quiconque ne chercherait pas l’Éternel, le Dieu d’Israël, '
  - type: note
    content: De 13:9.
  - type: text
    content: 'devait être mis à mort, petit ou grand, homme ou femme. '
  '14':
  - type: text
    content: 'Ils jurèrent fidélité à l’Éternel à voix haute, avec des cris de joie, et au son des trompettes et des cors; '
  '15':
  - type: text
    content: 'tout Juda se réjouit de ce serment, car ils avaient juré de tout leur cœur, ils avaient cherché l’Éternel de plein gré, et ils l’avaient trouvé, et l’Éternel leur donna du repos de tous côtés. '
  '16':
  - type: text
    content: 'Le roi Asa enleva même à Maaca, sa mère, '
  - type: note
    content: 1 R 15:13.
  - type: text
    content: 'la dignité de reine, parce qu’elle avait fait une idole pour Astarté. Asa abattit son idole, qu’il réduisit en poussière, et la brûla au torrent de Cédron. '
  '17':
  - type: text
    content: 'Mais les hauts lieux ne disparurent point d’Israël, quoique le cœur d’Asa fût en entier à l’Éternel pendant toute sa vie. '
  '18':
  - type: text
    content: 'Il mit dans la maison de Dieu les choses consacrées par son père et par lui-même, de l’argent, de l’or et des vases. '
  '19':
  - type: text
    content: Il n’y eut point de guerre jusqu’à la trente-cinquième année du règne d’Asa.
  '2':
  - type: text
    content: 'et Azaria alla au-devant d’Asa et lui dit: Écoutez-moi, Asa, et tout Juda et Benjamin! L’Éternel est avec vous quand vous êtes avec lui; '
  - type: note
    content: 1 Ch 28:9. 2 Ch 33:12. Mt 7:7.
  - type: text
    content: 'si vous le cherchez, vous le trouverez; '
  - type: note
    content: 2 Ch 24:20.
  - type: text
    content: 'mais si vous l’abandonnez, il vous abandonnera. '
  '3':
  - type: note
    content: Os 3:4.
  - type: text
    content: 'Pendant longtemps il n’y a eu pour Israël ni vrai Dieu, ni sacrificateur qui enseignât, ni loi. '
  '4':
  - type: note
    content: De 4:29.
  - type: text
    content: 'Mais au sein de leur détresse ils sont retournés à l’Éternel, le Dieu d’Israël, ils l’ont cherché, et ils l’ont trouvé. '
  '5':
  - type: text
    content: 'Dans ces temps-là, point de sécurité pour ceux qui allaient et venaient, car il y avait de grands troubles parmi tous les habitants du pays; '
  '6':
  - type: text
    content: 'on se heurtait peuple contre peuple, ville contre ville, parce que Dieu les agitait par toutes sortes d’angoisses. '
  '7':
  - type: text
    content: Vous donc, fortifiez-vous, et ne laissez pas vos mains s’affaiblir, car il y aura un salaire pour vos œuvres.
  - type: heading
    content: 'V. 8-19: cf. 1 R 15:11-15. 2 R 23:1-7. És 26:3, 4.'
  '8':
  - type: text
    content: 'Après avoir entendu ces paroles et la prophétie d’Obed le prophète, Asa se fortifia et fit disparaître les abominations de tout le pays de Juda et de Benjamin et des villes qu’il avait prises dans la montagne d’Éphraïm, et il restaura l’autel de l’Éternel qui était devant le portique de l’Éternel. '
  '9':
  - type: text
    content: 'Il rassembla tout Juda et Benjamin, et ceux d’Éphraïm, de Manassé et de Siméon qui habitaient parmi eux, car un grand nombre de gens d’Israël se joignirent à lui lorsqu’ils virent que l’Éternel, son Dieu, était avec lui. '
