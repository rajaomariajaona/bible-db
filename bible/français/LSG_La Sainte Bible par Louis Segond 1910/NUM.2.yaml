document_id: NUM.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ordre pour les campements
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-34: cf. (No 10:11-28; 24:1-6.) 1 Co 14:33, 40.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Moïse et à Aaron, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les enfants d’Israël camperont chacun près de sa bannière, sous les enseignes de la maison de ses pères; ils camperont vis-à-vis et tout autour de la tente d’assignation. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'A l’orient, le camp de Juda, avec sa bannière, et avec ses corps d’armée. Là camperont le prince des fils de Juda, Nachschon, fils d’Amminadab, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et son corps d’armée composé de soixante-quatorze mille six cents hommes, d’après le dénombrement. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'A ses côtés camperont la tribu d’Issacar, le prince des fils d’Issacar, Nethaneel, fils de Tsuar, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et son corps d’armée composé de cinquante-quatre mille quatre cents hommes, d’après le dénombrement; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'puis la tribu de Zabulon, le prince des fils de Zabulon, Éliab, fils de Hélon, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et son corps d’armée composé de cinquante-sept mille quatre cents hommes, d’après le dénombrement. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Total pour le camp de Juda, d’après le dénombrement: cent quatre-vingt six mille quatre cents hommes, selon leurs corps d’armée. Ils seront les premiers dans la marche. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Au midi, le camp de Ruben, avec sa bannière, et avec ses corps d’armée. Là camperont le prince des fils de Ruben, Élitsur, fils de Schedéur, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'et son corps d’armée composé de quarante-six mille cinq cents hommes, d’après le dénombrement. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A ses côtés camperont la tribu de Siméon, le prince des fils de Siméon, Schelumiel, fils de Tsurischaddaï, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et son corps d’armée composé de cinquante-neuf mille trois cents hommes, d’après le dénombrement; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'puis la tribu de Gad, le prince des fils de Gad, Éliasaph, fils de Déuel, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et son corps d’armée composé de quarante-cinq mille six cent cinquante hommes, d’après le dénombrement. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Total pour le camp de Ruben, d’après le dénombrement: cent cinquante et un mille quatre cent cinquante hommes, selon leurs corps d’armée. Ils seront les seconds dans la marche. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ensuite partira la tente d’assignation, avec le camp des Lévites placé au milieu des autres camps: Ils suivront dans la marche l’ordre dans lequel ils auront campé, chacun dans son rang, selon sa bannière. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'A l’occident, le camp d’Éphraïm, avec sa bannière, et avec ses corps d’armée. Là camperont le prince des fils d’Éphraïm, Élischama, fils d’Ammihud, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et son corps d’armée composé de quarante mille cinq cents hommes, d’après le dénombrement. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'A ses côtés camperont la tribu de Manassé, le prince des fils de Manassé, Gamliel, fils de Pedahtsur, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et son corps d’armée composé de trente-deux mille deux cents hommes, d’après le dénombrement; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'puis la tribu de Benjamin, le prince des fils de Benjamin, Abidan, fils de Guideoni, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'et son corps d’armée composé de trente-cinq mille quatre cents hommes, d’après le dénombrement. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Total pour le camp d’Éphraïm, d’après le dénombrement: cent huit mille et cent hommes, selon leurs corps d’armée. Ils seront les troisièmes dans la marche. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Au nord, le camp de Dan, avec sa bannière, et avec ses corps d’armée. Là camperont le prince des fils de Dan, Ahiézer, fils d’Ammischaddaï, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'et son corps d’armée composé de soixante-deux mille sept cents hommes, d’après le dénombrement. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'A ses côtés camperont la tribu d’Aser, le prince des fils d’Aser, Paguiel, fils d’Ocran, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'et son corps d’armée composé de quarante et un mille cinq cents hommes, d’après le dénombrement; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'puis la tribu de Nephthali, le prince des fils de Nephthali, Ahira, fils d’Énan, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'et son corps d’armée composé de cinquante-trois mille quatre cents hommes, d’après le dénombrement. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Total pour le camp de Dan, d’après le dénombrement: cent cinquante-sept mille six cents hommes. Ils seront les derniers dans la marche, selon leur bannière. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tels sont ceux des enfants d’Israël dont on fit le dénombrement, selon les maisons de leurs pères. Tous ceux dont on fit le dénombrement, et qui formèrent les camps, selon leurs corps d’armée, furent '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 38:26
      metadata:
        usfm: EXO.38.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 1:46
      metadata:
        usfm: NUM.1.46
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'six cent trois mille cinq cent cinquante. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les Lévites, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 1:48
      metadata:
        usfm: NUM.1.48
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '49'
      metadata:
        usfm: NUM.1.49
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'suivant l’ordre que l’Éternel avait donné à Moïse, ne firent point partie du dénombrement au milieu des enfants d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Et les enfants d’Israël se conformèrent à tous les ordres que l’Éternel avait donnés à Moïse. C’est ainsi qu’ils campaient, selon leurs bannières; et c’est ainsi qu’ils se mettaient en marche, chacun selon sa famille, selon la maison de ses pères.
