document_id: NUM.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ordre pour les campements
  - type: heading
    content: 'V. 1-34: cf. (No 10:11-28; 24:1-6.) 1 Co 14:33, 40.'
  - type: text
    content: 'L’Éternel parla à Moïse et à Aaron, et dit: '
  '10':
  - type: text
    content: 'Au midi, le camp de Ruben, avec sa bannière, et avec ses corps d’armée. Là camperont le prince des fils de Ruben, Élitsur, fils de Schedéur, '
  '11':
  - type: text
    content: 'et son corps d’armée composé de quarante-six mille cinq cents hommes, d’après le dénombrement. '
  '12':
  - type: text
    content: 'A ses côtés camperont la tribu de Siméon, le prince des fils de Siméon, Schelumiel, fils de Tsurischaddaï, '
  '13':
  - type: text
    content: 'et son corps d’armée composé de cinquante-neuf mille trois cents hommes, d’après le dénombrement; '
  '14':
  - type: text
    content: 'puis la tribu de Gad, le prince des fils de Gad, Éliasaph, fils de Déuel, '
  '15':
  - type: text
    content: 'et son corps d’armée composé de quarante-cinq mille six cent cinquante hommes, d’après le dénombrement. '
  '16':
  - type: text
    content: 'Total pour le camp de Ruben, d’après le dénombrement: cent cinquante et un mille quatre cent cinquante hommes, selon leurs corps d’armée. Ils seront les seconds dans la marche. '
  '17':
  - type: text
    content: 'Ensuite partira la tente d’assignation, avec le camp des Lévites placé au milieu des autres camps: Ils suivront dans la marche l’ordre dans lequel ils auront campé, chacun dans son rang, selon sa bannière. '
  '18':
  - type: text
    content: 'A l’occident, le camp d’Éphraïm, avec sa bannière, et avec ses corps d’armée. Là camperont le prince des fils d’Éphraïm, Élischama, fils d’Ammihud, '
  '19':
  - type: text
    content: 'et son corps d’armée composé de quarante mille cinq cents hommes, d’après le dénombrement. '
  '2':
  - type: text
    content: 'Les enfants d’Israël camperont chacun près de sa bannière, sous les enseignes de la maison de ses pères; ils camperont vis-à-vis et tout autour de la tente d’assignation. '
  '20':
  - type: text
    content: 'A ses côtés camperont la tribu de Manassé, le prince des fils de Manassé, Gamliel, fils de Pedahtsur, '
  '21':
  - type: text
    content: 'et son corps d’armée composé de trente-deux mille deux cents hommes, d’après le dénombrement; '
  '22':
  - type: text
    content: 'puis la tribu de Benjamin, le prince des fils de Benjamin, Abidan, fils de Guideoni, '
  '23':
  - type: text
    content: 'et son corps d’armée composé de trente-cinq mille quatre cents hommes, d’après le dénombrement. '
  '24':
  - type: text
    content: 'Total pour le camp d’Éphraïm, d’après le dénombrement: cent huit mille et cent hommes, selon leurs corps d’armée. Ils seront les troisièmes dans la marche. '
  '25':
  - type: text
    content: 'Au nord, le camp de Dan, avec sa bannière, et avec ses corps d’armée. Là camperont le prince des fils de Dan, Ahiézer, fils d’Ammischaddaï, '
  '26':
  - type: text
    content: 'et son corps d’armée composé de soixante-deux mille sept cents hommes, d’après le dénombrement. '
  '27':
  - type: text
    content: 'A ses côtés camperont la tribu d’Aser, le prince des fils d’Aser, Paguiel, fils d’Ocran, '
  '28':
  - type: text
    content: 'et son corps d’armée composé de quarante et un mille cinq cents hommes, d’après le dénombrement; '
  '29':
  - type: text
    content: 'puis la tribu de Nephthali, le prince des fils de Nephthali, Ahira, fils d’Énan, '
  '3':
  - type: text
    content: 'A l’orient, le camp de Juda, avec sa bannière, et avec ses corps d’armée. Là camperont le prince des fils de Juda, Nachschon, fils d’Amminadab, '
  '30':
  - type: text
    content: 'et son corps d’armée composé de cinquante-trois mille quatre cents hommes, d’après le dénombrement. '
  '31':
  - type: text
    content: 'Total pour le camp de Dan, d’après le dénombrement: cent cinquante-sept mille six cents hommes. Ils seront les derniers dans la marche, selon leur bannière. '
  '32':
  - type: text
    content: 'Tels sont ceux des enfants d’Israël dont on fit le dénombrement, selon les maisons de leurs pères. Tous ceux dont on fit le dénombrement, et qui formèrent les camps, selon leurs corps d’armée, furent '
  - type: note
    content: Ex 38:26. No 1:46.
  - type: text
    content: 'six cent trois mille cinq cent cinquante. '
  '33':
  - type: text
    content: 'Les Lévites, '
  - type: note
    content: No 1:48, 49.
  - type: text
    content: 'suivant l’ordre que l’Éternel avait donné à Moïse, ne firent point partie du dénombrement au milieu des enfants d’Israël. '
  '34':
  - type: text
    content: Et les enfants d’Israël se conformèrent à tous les ordres que l’Éternel avait donnés à Moïse. C’est ainsi qu’ils campaient, selon leurs bannières; et c’est ainsi qu’ils se mettaient en marche, chacun selon sa famille, selon la maison de ses pères.
  '4':
  - type: text
    content: 'et son corps d’armée composé de soixante-quatorze mille six cents hommes, d’après le dénombrement. '
  '5':
  - type: text
    content: 'A ses côtés camperont la tribu d’Issacar, le prince des fils d’Issacar, Nethaneel, fils de Tsuar, '
  '6':
  - type: text
    content: 'et son corps d’armée composé de cinquante-quatre mille quatre cents hommes, d’après le dénombrement; '
  '7':
  - type: text
    content: 'puis la tribu de Zabulon, le prince des fils de Zabulon, Éliab, fils de Hélon, '
  '8':
  - type: text
    content: 'et son corps d’armée composé de cinquante-sept mille quatre cents hommes, d’après le dénombrement. '
  '9':
  - type: text
    content: 'Total pour le camp de Juda, d’après le dénombrement: cent quatre-vingt six mille quatre cents hommes, selon leurs corps d’armée. Ils seront les premiers dans la marche. '
