document_id: 1CH.29,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Offrandes volontaires pour le temple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. 1 Ch 22:2-5, 14-19. Ex 35:4, etc. (2 Co 8:3-5; 9:7. Ph 4:17.) Ro 12:8.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi David dit à toute l’assemblée: Mon fils Salomon, le seul que Dieu ait choisi, est jeune et d’un âge faible, et l’ouvrage est considérable, car ce palais n’est pas pour un homme, mais il est pour l’Éternel Dieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David bénit l’Éternel en présence de toute l’assemblée. Il dit: Béni sois-tu, d’éternité en éternité, Éternel, Dieu de notre père Israël. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 6:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 1:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 5:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'A toi, Éternel, la grandeur, la force et la magnificence, l’éternité et la gloire, car tout ce qui est au ciel et sur la terre t’appartient; à toi, Éternel, le règne, car tu t’élèves souverainement au-dessus de tout! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est de toi que viennent la richesse et la gloire, c’est toi qui domines sur tout, c’est dans ta main que sont la force et la puissance, et c’est ta main qui a le pouvoir d’agrandir et d’affermir toutes choses. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, ô notre Dieu, nous te louons, et nous célébrons ton nom glorieux. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car qui suis-je et qui est mon peuple, pour que nous puissions te faire volontairement ces offrandes? Tout vient de toi, et nous recevons de ta main ce que nous t’offrons. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous sommes devant toi des étrangers et des habitants, comme tous nos pères; nos jours sur la terre sont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 90:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 102:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme l’ombre, et il n’y a point d’espérance. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Éternel, notre Dieu, c’est de ta main que viennent toutes ces richesses que nous avons préparées pour te bâtir une maison, à toi, à ton saint nom, et c’est à toi que tout appartient. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je sais, ô mon Dieu, que tu sondes '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 28:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le cœur, et que tu aimes la droiture; aussi je t’ai fait toutes ces offrandes volontaires dans la droiture de mon cœur, et j’ai vu maintenant avec joie ton peuple qui se trouve ici t’offrir volontairement ses dons. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Éternel, Dieu d’Abraham, d’Isaac et d’Israël, nos pères, maintiens à toujours dans le cœur de ton peuple ces dispositions et ces pensées, et affermis son cœur en toi. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Donne à mon fils Salomon un cœur dévoué à l’observation de tes commandements, de tes préceptes et de tes lois, afin qu’il mette en pratique toutes ces choses, et qu’il bâtisse le palais pour lequel j’ai fait des préparatifs.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 20-25: cf. 1 R 8:62-66. (1 R 1:33-39. 2 Ch 1:1.) Ps 72.'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai mis toutes mes forces à préparer pour la maison de mon Dieu de l’or pour ce qui doit être d’or, de l’argent pour ce qui doit être d’argent, de l’airain pour ce qui doit être d’airain, du fer pour ce qui doit être de fer, et du bois pour ce qui doit être de bois, des pierres d’onyx et des pierres à enchâsser, des pierres brillantes et de diverses couleurs, toutes sortes de pierres précieuses, et du marbre blanc en quantité. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David dit à toute l’assemblée: Bénissez l’Éternel, votre Dieu! Et toute l’assemblée bénit l’Éternel, le Dieu de leurs pères. Ils s’inclinèrent et se prosternèrent devant l’Éternel et devant le roi. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le lendemain de ce jour, ils offrirent en sacrifice et en holocauste à l’Éternel mille taureaux, mille béliers et mille agneaux, avec les libations ordinaires, et d’autres sacrifices en grand nombre pour tout Israël. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils mangèrent et burent ce jour-là devant l’Éternel avec une grande joie, ils proclamèrent roi pour la seconde fois Salomon, fils de David, ils l’oignirent devant l’Éternel comme chef, et ils oignirent Tsadok comme sacrificateur. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon s’assit sur le trône de l’Éternel, comme roi à la place de David, son père. Il prospéra, et tout Israël lui obéit. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les chefs et les héros, et même tous les fils du roi David se soumirent au roi Salomon. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Éternel éleva au plus haut degré Salomon sous les yeux de tout Israël, et il rendit son règne plus éclatant que ne fut celui d’aucun roi d’Israël avant lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sa mort
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 26-30: cf. (2 S 23:1-5. 1 R 2:10-12.) Ac 13:36.'
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David, fils d’Isaï, régna sur tout Israël. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le temps qu’il régna sur Israël fut de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 2:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'quarante ans: à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 5:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Hébron il régna sept ans, et à Jérusalem il régna trente-trois ans. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il mourut dans une heureuse vieillesse, rassasié de jours, de richesse et de gloire. Et Salomon, son fils, régna à sa place. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les actions du roi David, les premières et les dernières, sont écrites dans le livre de Samuel le voyant, dans le livre de Nathan le prophète, et dans le livre de Gad le prophète, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De plus, dans mon attachement pour la maison de mon Dieu, je donne à la maison de mon Dieu l’or et l’argent que je possède en propre, outre tout ce que j’ai préparé pour la maison du sanctuaire: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: avec tout son règne et tous ses exploits, et ce qui s’est passé de son temps, soit en Israël, soit dans tous les royaumes des autres pays.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'trois mille talents d’or, d’or d’Ophir, et sept mille talents d’argent épuré, pour en revêtir les parois des bâtiments, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'l’or pour ce qui doit être d’or, et l’argent pour ce qui doit être d’argent, et pour tous les travaux qu’exécuteront les ouvriers. Qui veut encore présenter volontairement aujourd’hui ses offrandes à l’Éternel? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les chefs des maisons paternelles, les chefs des tribus d’Israël, les chefs de milliers et de centaines, et les intendants du roi firent volontairement des offrandes. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils donnèrent pour le service de la maison de Dieu cinq mille talents d’or, dix mille dariques, dix mille talents d’argent, dix-huit mille talents d’airain, et cent mille talents de fer. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui possédaient des pierres les livrèrent pour le trésor de la maison de l’Éternel entre les mains de Jehiel, le Guerschonite. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le peuple se réjouit de leurs offrandes volontaires, car c’était avec un cœur bien disposé qu’ils les faisaient à l’Éternel; et le roi David en eut aussi une grande joie.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière de David
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-19: cf. (Né 9:5, 6. Mt 6:13. Ro 11:36.) Ps 145.'
    marker-yv: yv-h
