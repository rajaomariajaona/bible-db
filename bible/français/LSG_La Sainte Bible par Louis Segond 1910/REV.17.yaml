document_id: REV.17,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Chute de Babylone
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-18: cf. (Ap 16:19; 18.) (Ap 13; 19:11-21.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis un des sept anges qui tenaient les sept coupes vint, et il m’adressa la parole, en disant: Viens, je te montrerai le jugement de la grande prostituée qui est assise sur les grandes eaux. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce sont aussi sept rois: cinq sont tombés, un existe, l’autre n’est pas encore venu, et quand il sera venu, il doit rester peu de temps. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et la bête qui était, et qui n’est plus, est elle-même un huitième roi, et elle est du nombre des sept, et elle va à la perdition. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Da 7:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 13:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les dix cornes que tu as vues sont dix rois, qui n’ont pas encore reçu de royaume, mais qui reçoivent autorité comme rois pendant une heure avec la bête. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont un même dessein, et ils donnent leur puissance et leur autorité à la bête. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 16:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils combattront contre l’agneau, et l’agneau les vaincra, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 6:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 19:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'parce qu’il est le Seigneur des seigneurs et le Roi des rois, et les appelés, les élus et les fidèles qui sont avec lui les vaincront aussi. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il me dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 8:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les eaux que tu as vues, sur lesquelles la prostituée est assise, ce sont des peuples, des foules, des nations, et des langues. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les dix cornes que tu as vues et la bête haïront la prostituée, la dépouilleront et la mettront à nu, mangeront ses chairs, et la consumeront '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 18:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'par le feu. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car Dieu a mis dans leurs cœurs d’exécuter son dessein et d’exécuter un même dessein, et de donner leur royauté à la bête, jusqu’à ce que les paroles de Dieu soient accomplies. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et la femme que tu as vue, c’est '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 16:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: la grande ville qui a la royauté sur les rois de la terre.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 18:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'C’est avec elle que les rois de la terre se sont livrés à l’impudicité, et c’est du vin de son impudicité que les habitants de la terre se sont enivrés. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il me transporta en esprit dans un désert. Et je vis une femme assise sur une '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 13:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'bête écarlate, pleine de noms de blasphème, ayant sept têtes et dix cornes. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cette femme était '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 18:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'vêtue de pourpre et d’écarlate, et parée d’or, de pierres précieuses et de perles. Elle tenait dans sa main une coupe d’or, remplie d’abominations et des impuretés de sa prostitution. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sur son front était écrit un nom, un '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Th 2:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mystère: Babylone la grande, la mère des impudiques et des abominations de la terre. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et je vis cette femme ivre du '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 18:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'sang des saints et du sang des témoins de Jésus. Et, en la voyant, je fus saisi d’un grand étonnement. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’ange me dit: Pourquoi t’étonnes-tu? Je te dirai le mystère de la femme et de la bête qui la porte, qui a les sept têtes et les dix cornes. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La bête que tu as vue était, et elle n’est plus. Elle doit monter de l’abîme, et aller à la perdition. Et les habitants de la terre, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 4:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 13:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ceux dont le nom n’a pas été écrit dès la fondation du monde dans le livre de vie, s’étonneront en voyant la bête, parce qu’elle était, et qu’elle n’est plus, et qu’elle reparaîtra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est ici l’intelligence '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 13:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui a de la sagesse. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 13:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les sept têtes sont sept montagnes, sur lesquelles la femme est assise. '
