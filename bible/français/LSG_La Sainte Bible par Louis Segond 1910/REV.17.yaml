document_id: REV.17,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Chute de Babylone
  - type: heading
    content: 'V. 1-18: cf. (Ap 16:19; 18.) (Ap 13; 19:11-21.)'
  - type: text
    content: 'Puis un des sept anges qui tenaient les sept coupes vint, et il m’adressa la parole, en disant: Viens, je te montrerai le jugement de la grande prostituée qui est assise sur les grandes eaux. '
  '10':
  - type: text
    content: 'Ce sont aussi sept rois: cinq sont tombés, un existe, l’autre n’est pas encore venu, et quand il sera venu, il doit rester peu de temps. '
  '11':
  - type: text
    content: 'Et la bête qui était, et qui n’est plus, est elle-même un huitième roi, et elle est du nombre des sept, et elle va à la perdition. '
  '12':
  - type: note
    content: Da 7:20. Ap 13:1.
  - type: text
    content: 'Les dix cornes que tu as vues sont dix rois, qui n’ont pas encore reçu de royaume, mais qui reçoivent autorité comme rois pendant une heure avec la bête. '
  '13':
  - type: text
    content: 'Ils ont un même dessein, et ils donnent leur puissance et leur autorité à la bête. '
  '14':
  - type: note
    content: Ap 16:14.
  - type: text
    content: 'Ils combattront contre l’agneau, et l’agneau les vaincra, '
  - type: note
    content: 1 Ti 6:15. Ap 19:16.
  - type: text
    content: 'parce qu’il est le Seigneur des seigneurs et le Roi des rois, et les appelés, les élus et les fidèles qui sont avec lui les vaincront aussi. '
  '15':
  - type: text
    content: 'Et il me dit: '
  - type: note
    content: És 8:7.
  - type: text
    content: 'Les eaux que tu as vues, sur lesquelles la prostituée est assise, ce sont des peuples, des foules, des nations, et des langues. '
  '16':
  - type: text
    content: 'Les dix cornes que tu as vues et la bête haïront la prostituée, la dépouilleront et la mettront à nu, mangeront ses chairs, et la consumeront '
  - type: note
    content: Ap 18:8.
  - type: text
    content: 'par le feu. '
  '17':
  - type: text
    content: 'Car Dieu a mis dans leurs cœurs d’exécuter son dessein et d’exécuter un même dessein, et de donner leur royauté à la bête, jusqu’à ce que les paroles de Dieu soient accomplies. '
  '18':
  - type: text
    content: 'Et la femme que tu as vue, c’est '
  - type: note
    content: Ap 16:19.
  - type: text
    content: la grande ville qui a la royauté sur les rois de la terre.
  '2':
  - type: note
    content: Ap 18:3.
  - type: text
    content: 'C’est avec elle que les rois de la terre se sont livrés à l’impudicité, et c’est du vin de son impudicité que les habitants de la terre se sont enivrés. '
  '3':
  - type: text
    content: 'Il me transporta en esprit dans un désert. Et je vis une femme assise sur une '
  - type: note
    content: Ap 13:1; 17:8.
  - type: text
    content: 'bête écarlate, pleine de noms de blasphème, ayant sept têtes et dix cornes. '
  '4':
  - type: text
    content: 'Cette femme était '
  - type: note
    content: Ap 18:16.
  - type: text
    content: 'vêtue de pourpre et d’écarlate, et parée d’or, de pierres précieuses et de perles. Elle tenait dans sa main une coupe d’or, remplie d’abominations et des impuretés de sa prostitution. '
  '5':
  - type: text
    content: 'Sur son front était écrit un nom, un '
  - type: note
    content: 2 Th 2:7.
  - type: text
    content: 'mystère: Babylone la grande, la mère des impudiques et des abominations de la terre. '
  '6':
  - type: text
    content: 'Et je vis cette femme ivre du '
  - type: note
    content: Ap 18:24.
  - type: text
    content: 'sang des saints et du sang des témoins de Jésus. Et, en la voyant, je fus saisi d’un grand étonnement. '
  '7':
  - type: text
    content: 'Et l’ange me dit: Pourquoi t’étonnes-tu? Je te dirai le mystère de la femme et de la bête qui la porte, qui a les sept têtes et les dix cornes. '
  '8':
  - type: text
    content: 'La bête que tu as vue était, et elle n’est plus. Elle doit monter de l’abîme, et aller à la perdition. Et les habitants de la terre, '
  - type: note
    content: Ex 32:22. Ph 4:3. Ap 13:8.
  - type: text
    content: 'ceux dont le nom n’a pas été écrit dès la fondation du monde dans le livre de vie, s’étonneront en voyant la bête, parce qu’elle était, et qu’elle n’est plus, et qu’elle reparaîtra. '
  '9':
  - type: text
    content: 'C’est ici l’intelligence '
  - type: note
    content: Ap 13:18.
  - type: text
    content: 'qui a de la sagesse. '
  - type: note
    content: Ap 13:1.
  - type: text
    content: 'Les sept têtes sont sept montagnes, sur lesquelles la femme est assise. '
