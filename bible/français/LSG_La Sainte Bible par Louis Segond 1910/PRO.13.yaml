document_id: PRO.13,93
type_code: fra
verses:
  '1':
  - type: text
    content: Un fils sage écoute l’instruction de son père,
  - type: text
    content: Mais le moqueur n’écoute pas la réprimande.
  '10':
  - type: text
    content: C’est seulement par orgueil qu’on excite des querelles,
  - type: text
    content: Mais la sagesse est avec ceux qui écoutent les conseils.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Pr 10:2; 20:21.
  - type: text
    content: La richesse mal acquise diminue,
  - type: text
    content: Mais celui qui amasse peu à peu l’augmente.
  '12':
  - type: text
    content: ' '
  - type: note
    content: v. 19.
  - type: text
    content: Un espoir différé rend le cœur malade,
  - type: text
    content: Mais un désir accompli est un arbre de vie.
  '13':
  - type: text
    content: Celui qui méprise la parole se perd,
  - type: text
    content: Mais celui qui craint le précepte est récompensé.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Pr 10:11; 14:27.
  - type: text
    content: L’enseignement du sage est une source de vie,
  - type: text
    content: Pour détourner des pièges de la mort.
  '15':
  - type: text
    content: Une raison saine a pour fruit la grâce,
  - type: text
    content: Mais la voie des perfides est rude.
  '16':
  - type: text
    content: Tout homme prudent agit avec connaissance,
  - type: text
    content: 'Mais l’insensé '
  - type: note
    content: Pr 12:33; 15:2.
  - type: text
    content: fait étalage de folie.
  '17':
  - type: text
    content: Un envoyé méchant tombe dans le malheur,
  - type: text
    content: Mais un messager fidèle apporte la guérison.
  '18':
  - type: text
    content: La pauvreté et la honte sont le partage de celui qui rejette la correction,
  - type: text
    content: Mais celui qui a égard à la réprimande est honoré.
  '19':
  - type: text
    content: Un désir accompli est doux à l’âme,
  - type: text
    content: Mais s’éloigner du mal fait horreur aux insensés.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Pr 12:14.
  - type: text
    content: Par le fruit de la bouche on jouit du bien;
  - type: text
    content: Mais ce que désirent les perfides, c’est la violence.
  '20':
  - type: text
    content: Celui qui fréquente les sages devient sage,
  - type: text
    content: Mais celui qui se plaît avec les insensés s’en trouve mal.
  '21':
  - type: text
    content: Le malheur poursuit ceux qui pèchent,
  - type: text
    content: Mais le bonheur récompense les justes.
  '22':
  - type: text
    content: L’homme de bien a pour héritiers les enfants de ses enfants,
  - type: text
    content: 'Mais les richesses '
  - type: note
    content: Job 15:29.
  - type: text
    content: 'du pécheur sont '
  - type: note
    content: Job 27:17.
  - type: text
    content: réservées pour le juste.
  '23':
  - type: text
    content: 'Le champ que défriche le pauvre donne '
  - type: note
    content: Pr 12:11.
  - type: text
    content: une nourriture abondante,
  - type: note
    content: Pr 18:9.
  - type: text
    content: Mais tel périt par défaut de justice.
  '24':
  - type: text
    content: 'Celui qui ménage '
  - type: note
    content: Pr 23:13.
  - type: text
    content: sa verge hait son fils,
  - type: text
    content: Mais celui qui l’aime cherche à le corriger.
  '25':
  - type: text
    content: 'Le juste mange et '
  - type: note
    content: Ps 34:11; 37:3.
  - type: text
    content: satisfait son appétit,
  - type: text
    content: Mais le ventre des méchants éprouve la disette.
  '3':
  - type: text
    content: Celui qui veille sur sa bouche garde son âme;
  - type: text
    content: Celui qui ouvre de grandes lèvres court à sa perte.
  '4':
  - type: text
    content: L’âme du paresseux a des désirs qu’il ne peut satisfaire;
  - type: text
    content: Mais l’âme des hommes diligents sera rassasiée.
  '5':
  - type: text
    content: Le juste hait les paroles mensongères;
  - type: text
    content: Le méchant se rend odieux et se couvre de honte.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Pr 10:29; 11:3, 5, 6.
  - type: text
    content: La justice garde celui dont la voie est intègre,
  - type: text
    content: Mais la méchanceté cause la ruine du pécheur.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Pr 12:9.
  - type: text
    content: Tel fait le riche et n’a rien du tout,
  - type: text
    content: Tel fait le pauvre et a de grands biens.
  '8':
  - type: text
    content: La richesse d’un homme sert de rançon pour sa vie,
  - type: text
    content: Mais le pauvre n’écoute pas la réprimande.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Pr 4:18.
  - type: text
    content: La lumière des justes est joyeuse,
  - type: note
    content: Job 18:5, 6; 21:17.
  - type: text
    content: Mais la lampe des méchants s’éteint.
