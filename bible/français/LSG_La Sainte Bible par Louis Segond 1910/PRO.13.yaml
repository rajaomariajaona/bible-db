document_id: PRO.13,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un fils sage écoute l’instruction de son père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le moqueur n’écoute pas la réprimande.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est seulement par orgueil qu’on excite des querelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la sagesse est avec ceux qui écoutent les conseils.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 10:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La richesse mal acquise diminue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui amasse peu à peu l’augmente.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: v. 19.
      marker-yv: yv-n
    - type: text
      text: Un espoir différé rend le cœur malade,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais un désir accompli est un arbre de vie.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui méprise la parole se perd,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui craint le précepte est récompensé.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 10:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’enseignement du sage est une source de vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour détourner des pièges de la mort.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une raison saine a pour fruit la grâce,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la voie des perfides est rude.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout homme prudent agit avec connaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais l’insensé '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Pr 12:33; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: fait étalage de folie.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un envoyé méchant tombe dans le malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais un messager fidèle apporte la guérison.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La pauvreté et la honte sont le partage de celui qui rejette la correction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui a égard à la réprimande est honoré.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un désir accompli est doux à l’âme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais s’éloigner du mal fait horreur aux insensés.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 12:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Par le fruit de la bouche on jouit du bien;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ce que désirent les perfides, c’est la violence.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui fréquente les sages devient sage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui se plaît avec les insensés s’en trouve mal.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le malheur poursuit ceux qui pèchent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le bonheur récompense les justes.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme de bien a pour héritiers les enfants de ses enfants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais les richesses '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 15:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'du pécheur sont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 27:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: réservées pour le juste.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le champ que défriche le pauvre donne '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 12:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: une nourriture abondante,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 18:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais tel périt par défaut de justice.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Celui qui ménage '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 23:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: sa verge hait son fils,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui l’aime cherche à le corriger.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le juste mange et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 34:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 37:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: satisfait son appétit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le ventre des méchants éprouve la disette.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui veille sur sa bouche garde son âme;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui ouvre de grandes lèvres court à sa perte.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’âme du paresseux a des désirs qu’il ne peut satisfaire;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’âme des hommes diligents sera rassasiée.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le juste hait les paroles mensongères;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant se rend odieux et se couvre de honte.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 10:29
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La justice garde celui dont la voie est intègre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la méchanceté cause la ruine du pécheur.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 12:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tel fait le riche et n’a rien du tout,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tel fait le pauvre et a de grands biens.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La richesse d’un homme sert de rançon pour sa vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le pauvre n’écoute pas la réprimande.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 4:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La lumière des justes est joyeuse,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 18:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais la lampe des méchants s’éteint.
