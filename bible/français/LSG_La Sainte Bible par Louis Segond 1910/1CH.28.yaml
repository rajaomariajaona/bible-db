document_id: 1CH.28
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Recommandations de David à Salomon pour la construction du temple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. 1 Ch 22:6-19. 2 Ch 6:4-11. Jn 17:4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'David convoqua à Jérusalem tous les chefs d’Israël, les chefs des tribus, les chefs des divisions au service du roi, les chefs de milliers et les chefs de centaines, ceux qui étaient en charge sur tous les biens et les troupeaux du roi et auprès de ses fils, les eunuques, les héros et tous les hommes vaillants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le roi David se leva sur ses pieds, et dit: Écoutez-moi, mes frères et mon peuple! J’avais l’intention de bâtir une maison de repos pour l’arche de l’alliance de l’Éternel et pour le marchepied de notre Dieu, et je me préparais à bâtir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:5
      metadata:
        usfm: 2SA.7.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 5:3
      metadata:
        usfm: 1KI.5.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 22:8
      metadata:
        usfm: 1CH.22.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais Dieu m’a dit: Tu ne bâtiras pas une maison à mon nom, car tu es un homme de guerre et tu as versé du sang. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’Éternel, le Dieu d’Israël, m’a choisi dans toute la maison de mon père, pour que je fusse roi d’Israël à toujours; car il a choisi Juda pour chef, il a choisi la maison de mon père dans la maison de Juda, et parmi les fils de mon père c’est moi '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 16:12
      metadata:
        usfm: 1SA.16.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’il a voulu faire régner sur tout Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Entre tous mes fils – car l’Éternel m’a donné beaucoup de fils – il a choisi mon fils Salomon pour le faire asseoir sur le trône du royaume de l’Éternel, sur Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:13
      metadata:
        usfm: 2SA.7.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 1:9
      metadata:
        usfm: 2CH.1.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il m’a dit: Salomon, ton fils, bâtira ma maison et mes parvis; car je l’ai choisi pour mon fils, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:14
      metadata:
        usfm: 2SA.7.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je serai pour lui un père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'J’affermirai pour toujours son royaume, s’il reste attaché comme aujourd’hui à la pratique de mes commandements et de mes ordonnances. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Maintenant, aux yeux de tout Israël, de l’assemblée de l’Éternel, et en présence de notre Dieu qui vous entend, observez et prenez à cœur tous les commandements de l’Éternel, votre Dieu, afin que vous possédiez ce bon pays et que vous le laissiez en héritage à vos fils après vous à perpétuité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et toi, Salomon, mon fils, connais le Dieu de ton père, et sers-le d’un cœur dévoué et d’une âme bien disposée, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 16:7
      metadata:
        usfm: 1SA.16.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 29:17
      metadata:
        usfm: 1CH.29.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 7:10
      metadata:
        usfm: PSA.7.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 11:20
      metadata:
        usfm: JER.11.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:10
      metadata:
        usfm: JER.17.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:12
      metadata:
        usfm: JER.20.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 2:23
      metadata:
        usfm: REV.2.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car l’Éternel sonde tous les cœurs et pénètre tous les desseins et toutes les pensées. Si tu le cherches, il se laissera trouver par toi; mais si tu l’abandonnes, il te rejettera pour toujours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Considère maintenant que l’Éternel t’a choisi, afin que tu bâtisses une maison qui serve de sanctuaire. Fortifie-toi et agis.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-21: cf. Ex 25:40. (2 Ch 3; 4.) Hé 8:5.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'David donna à Salomon, son fils, le modèle du portique et des bâtiments, des chambres du trésor, des chambres hautes, des chambres intérieures, et de la chambre du propitiatoire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il lui donna le plan de tout ce qu’il avait dans l’esprit touchant les parvis de la maison de l’Éternel, et toutes les chambres à l’entour pour les trésors de la maison de Dieu et les trésors du sanctuaire, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et touchant les classes des sacrificateurs et des Lévites, tout ce qui concernait le service de la maison de l’Éternel, et tous les ustensiles pour le service de la maison de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il lui donna le modèle des ustensiles d’or, avec le poids de ce qui devait être d’or, pour tous les ustensiles de chaque service; et le modèle de tous les ustensiles d’argent, avec le poids, pour tous les ustensiles de chaque service. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il donna le poids des chandeliers d’or et de leurs lampes d’or, avec le poids de chaque chandelier et de ses lampes; et le poids des chandeliers d’argent, avec le poids de chaque chandelier et de ses lampes, selon l’usage de chaque chandelier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il lui donna l’or au poids pour les tables des pains de proposition, pour chaque table; et de l’argent pour les tables d’argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il lui donna le modèle des fourchettes, des bassins et des calices d’or pur; le modèle des coupes d’or, avec le poids de chaque coupe, et des coupes d’argent, avec le poids de chaque coupe; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'et le modèle de l’autel des parfums en or épuré, avec le poids. Il lui donna encore le modèle du char, des chérubins d’or qui étendent leurs ailes et couvrent l’arche de l’alliance de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'C’est par un écrit de sa main, dit David, que l’Éternel m’a donné l’intelligence de tout cela, de tous les ouvrages de ce modèle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'David dit à Salomon, son fils: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 31:7
      metadata:
        usfm: DEU.31.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: DEU.31.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 1:7
      metadata:
        usfm: JOS.1.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fortifie-toi, prends courage et agis; ne crains point, et ne t’effraie point. Car l’Éternel Dieu, mon Dieu, sera avec toi; il ne te délaissera point, il ne t’abandonnera point, jusqu’à ce que tout l’ouvrage pour le service de la maison de l’Éternel soit achevé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Voici les classes des sacrificateurs et des Lévites pour tout le service de la maison de Dieu; et voici près de toi, pour toute l’œuvre, tous les hommes bien disposés et habiles dans toute espèce d’ouvrages, et les chefs et tout le peuple dociles à tous tes ordres.
