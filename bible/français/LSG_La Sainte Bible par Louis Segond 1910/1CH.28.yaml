document_id: 1CH.28,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Recommandations de David à Salomon pour la construction du temple
  - type: heading
    content: 'V. 1-10: cf. 1 Ch 22:6-19. 2 Ch 6:4-11. Jn 17:4.'
  - type: text
    content: 'David convoqua à Jérusalem tous les chefs d’Israël, les chefs des tribus, les chefs des divisions au service du roi, les chefs de milliers et les chefs de centaines, ceux qui étaient en charge sur tous les biens et les troupeaux du roi et auprès de ses fils, les eunuques, les héros et tous les hommes vaillants. '
  '10':
  - type: text
    content: Considère maintenant que l’Éternel t’a choisi, afin que tu bâtisses une maison qui serve de sanctuaire. Fortifie-toi et agis.
  - type: heading
    content: 'V. 11-21: cf. Ex 25:40. (2 Ch 3; 4.) Hé 8:5.'
  '11':
  - type: text
    content: 'David donna à Salomon, son fils, le modèle du portique et des bâtiments, des chambres du trésor, des chambres hautes, des chambres intérieures, et de la chambre du propitiatoire. '
  '12':
  - type: text
    content: 'Il lui donna le plan de tout ce qu’il avait dans l’esprit touchant les parvis de la maison de l’Éternel, et toutes les chambres à l’entour pour les trésors de la maison de Dieu et les trésors du sanctuaire, '
  '13':
  - type: text
    content: 'et touchant les classes des sacrificateurs et des Lévites, tout ce qui concernait le service de la maison de l’Éternel, et tous les ustensiles pour le service de la maison de l’Éternel. '
  '14':
  - type: text
    content: 'Il lui donna le modèle des ustensiles d’or, avec le poids de ce qui devait être d’or, pour tous les ustensiles de chaque service; et le modèle de tous les ustensiles d’argent, avec le poids, pour tous les ustensiles de chaque service. '
  '15':
  - type: text
    content: 'Il donna le poids des chandeliers d’or et de leurs lampes d’or, avec le poids de chaque chandelier et de ses lampes; et le poids des chandeliers d’argent, avec le poids de chaque chandelier et de ses lampes, selon l’usage de chaque chandelier. '
  '16':
  - type: text
    content: 'Il lui donna l’or au poids pour les tables des pains de proposition, pour chaque table; et de l’argent pour les tables d’argent. '
  '17':
  - type: text
    content: 'Il lui donna le modèle des fourchettes, des bassins et des calices d’or pur; le modèle des coupes d’or, avec le poids de chaque coupe, et des coupes d’argent, avec le poids de chaque coupe; '
  '18':
  - type: text
    content: 'et le modèle de l’autel des parfums en or épuré, avec le poids. Il lui donna encore le modèle du char, des chérubins d’or qui étendent leurs ailes et couvrent l’arche de l’alliance de l’Éternel. '
  '19':
  - type: text
    content: 'C’est par un écrit de sa main, dit David, que l’Éternel m’a donné l’intelligence de tout cela, de tous les ouvrages de ce modèle. '
  '2':
  - type: text
    content: 'Le roi David se leva sur ses pieds, et dit: Écoutez-moi, mes frères et mon peuple! J’avais l’intention de bâtir une maison de repos pour l’arche de l’alliance de l’Éternel et pour le marchepied de notre Dieu, et je me préparais à bâtir. '
  '20':
  - type: text
    content: 'David dit à Salomon, son fils: '
  - type: note
    content: De 31:7, 8. Jos 1:7.
  - type: text
    content: 'Fortifie-toi, prends courage et agis; ne crains point, et ne t’effraie point. Car l’Éternel Dieu, mon Dieu, sera avec toi; il ne te délaissera point, il ne t’abandonnera point, jusqu’à ce que tout l’ouvrage pour le service de la maison de l’Éternel soit achevé. '
  '21':
  - type: text
    content: Voici les classes des sacrificateurs et des Lévites pour tout le service de la maison de Dieu; et voici près de toi, pour toute l’œuvre, tous les hommes bien disposés et habiles dans toute espèce d’ouvrages, et les chefs et tout le peuple dociles à tous tes ordres.
  '3':
  - type: note
    content: 2 S 7:5. 1 R 5:3. 1 Ch 22:8.
  - type: text
    content: 'Mais Dieu m’a dit: Tu ne bâtiras pas une maison à mon nom, car tu es un homme de guerre et tu as versé du sang. '
  '4':
  - type: text
    content: 'L’Éternel, le Dieu d’Israël, m’a choisi dans toute la maison de mon père, pour que je fusse roi d’Israël à toujours; car il a choisi Juda pour chef, il a choisi la maison de mon père dans la maison de Juda, et parmi les fils de mon père c’est moi '
  - type: note
    content: 1 S 16:12.
  - type: text
    content: 'qu’il a voulu faire régner sur tout Israël. '
  '5':
  - type: text
    content: 'Entre tous mes fils – car l’Éternel m’a donné beaucoup de fils – il a choisi mon fils Salomon pour le faire asseoir sur le trône du royaume de l’Éternel, sur Israël. '
  '6':
  - type: note
    content: 2 S 7:13. 2 Ch 1:9.
  - type: text
    content: 'Il m’a dit: Salomon, ton fils, bâtira ma maison et mes parvis; car je l’ai choisi pour mon fils, et '
  - type: note
    content: 2 S 7:14.
  - type: text
    content: 'je serai pour lui un père. '
  '7':
  - type: text
    content: 'J’affermirai pour toujours son royaume, s’il reste attaché comme aujourd’hui à la pratique de mes commandements et de mes ordonnances. '
  '8':
  - type: text
    content: 'Maintenant, aux yeux de tout Israël, de l’assemblée de l’Éternel, et en présence de notre Dieu qui vous entend, observez et prenez à cœur tous les commandements de l’Éternel, votre Dieu, afin que vous possédiez ce bon pays et que vous le laissiez en héritage à vos fils après vous à perpétuité. '
  '9':
  - type: text
    content: 'Et toi, Salomon, mon fils, connais le Dieu de ton père, et sers-le d’un cœur dévoué et d’une âme bien disposée, '
  - type: note
    content: 1 S 16:7. 1 Ch 29:17. Ps 7:10. Jé 11:20; 17:10; 20:12. Ap 2:23.
  - type: text
    content: 'car l’Éternel sonde tous les cœurs et pénètre tous les desseins et toutes les pensées. Si tu le cherches, il se laissera trouver par toi; mais si tu l’abandonnes, il te rejettera pour toujours. '
