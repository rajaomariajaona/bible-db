document_id: 2CH.8,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Villes bâties par Salomon
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. 1 R 9:10-24.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 9:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Au bout de vingt ans, pendant lesquels Salomon bâtit la maison de l’Éternel et sa propre maison, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Les chefs placés par le roi Salomon à la tête du peuple, et chargés de le surveiller, étaient au nombre de deux cent cinquante. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 3:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Salomon fit monter la fille de Pharaon de la cité de David dans la maison qu’il lui avait bâtie; car il dit: Ma femme n’habitera pas dans la maison de David, roi d’Israël, parce que les lieux où est entrée l’arche de l’Éternel sont saints.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Navires envoyés à Ophir
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-18: cf. 1 R 9:25-28; 22:49, 50.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Alors Salomon offrit des holocaustes à l’Éternel sur l’autel de l’Éternel, qu’il avait construit devant le portique. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Il offrait ce qui était prescrit par Moïse pour chaque jour, pour les sabbats, pour les nouvelles lunes, et pour les fêtes, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 16:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'trois fois l’année, à la fête des pains sans levain, à la fête des semaines, et à la fête des tabernacles. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Il établit dans leurs fonctions, telles que les avait réglées David, son père, les classes des sacrificateurs selon leur office, les Lévites selon leur charge, consistant à célébrer l’Éternel et à faire jour par jour le service en présence des sacrificateurs, et les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 9:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'portiers distribués à chaque porte d’après leurs classes; car ainsi l’avait ordonné David, homme de Dieu. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'On ne s’écarta point de l’ordre du roi pour les sacrificateurs et les Lévites, ni pour aucune chose, ni pour ce qui concernait les trésors. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ainsi fut dirigée toute l’œuvre de Salomon, jusqu’au jour où la maison de l’Éternel fut fondée et jusqu’à celui où elle fut terminée. La maison de l’Éternel fut donc achevée. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Salomon partit alors pour Étsjon-Guéber et pour Éloth, sur les bords de la mer, dans le pays d’Édom. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Et Huram lui envoya par ses serviteurs des navires et des serviteurs connaissant la mer. Ils allèrent avec les serviteurs de Salomon à Ophir, et ils y prirent quatre cent cinquante talents d’or, qu’ils apportèrent au roi Salomon.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'il reconstruisit les villes que lui donna Huram et y établit des enfants d’Israël. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Salomon marcha contre Hamath, vers Tsoba, et s’en empara. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il bâtit Thadmor au désert, et toutes les villes servant de magasins en Hamath. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il bâtit Beth-Horon la haute et Beth-Horon la basse, villes fortes, ayant des murs, des portes et des barres; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Baalath, et toutes les villes servant de magasins et lui appartenant, toutes les villes pour les chars, les villes pour la cavalerie, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 9:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et tout ce qu’il plut à Salomon de bâtir à Jérusalem, au Liban, et dans tout le pays dont il était le souverain. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tout le peuple qui était resté des Héthiens, des Amoréens, des Phéréziens, des Héviens et des Jébusiens, ne faisant point partie d’Israël, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'leurs descendants qui étaient restés après eux dans le pays et que les enfants d’Israël n’avaient pas détruits, Salomon les leva comme gens de corvée, ce qu’ils ont été jusqu’à ce jour. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 9:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Salomon n’employa comme esclave pour ses travaux aucun des enfants d’Israël; car ils étaient des hommes de guerre, ses chefs, ses officiers, les commandants de ses chars et de sa cavalerie. '
