document_id: ROM.8,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Point de condamnation pour ceux qui sont en Jésus-Christ. Ils marchent selon l’esprit et non selon la chair, — étant soutenus au milieu des souffrances du temps présent, vivant dans l’attente du salut, et ayant l’assurance que rien ne peut les séparer de l’amour de Dieu en Jésus-Christ
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. (Ga 3:13, 14. Ro 6:22, 23.) Ga 5:17-25; 6:8.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il n’y a donc maintenant aucune condamnation pour ceux qui sont en Jésus-Christ. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et si Christ est en vous, le corps, il est vrai, est mort à cause du péché, mais l’esprit est vie à cause de la justice. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et si l’Esprit de celui qui a ressuscité Jésus d’entre les morts habite en vous, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 6:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 6:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 4:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 2:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 2:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: celui qui a ressuscité Christ d’entre les morts rendra aussi la vie à vos corps mortels par son Esprit qui habite en vous.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-27: cf. Col 3:1-6. Ga 4:4-7. (1 Jn 3:1-3. 2 Co 4:16-18; 5:1-5. 2 Pi 3:13.) Jud v. 20, 21.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi donc, frères, nous ne sommes point redevables à la chair, pour vivre selon la chair. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si vous vivez selon la chair, vous mourrez; mais si par l’Esprit vous faites mourir les actions du corps, vous vivrez, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 5:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car tous ceux qui sont conduits par l’Esprit de Dieu sont fils de Dieu. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 2:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 1:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et vous n’avez point reçu un esprit de servitude, pour être encore dans la crainte; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 56:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 3:26
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mais vous avez reçu un Esprit d’adoption, par lequel nous crions: Abba! Père! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 1:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 1:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'L’Esprit lui-même rend témoignage à notre esprit que nous sommes enfants de Dieu. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, si nous sommes enfants, nous sommes aussi héritiers: héritiers de Dieu, et cohéritiers de Christ, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 2:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'si toutefois nous souffrons avec lui, afin d’être glorifiés avec lui. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 4:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 3:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 4:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 3:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'J’estime que les souffrances du temps présent ne sauraient être comparées à la gloire à venir qui sera révélée pour nous. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussi la création attend-elle avec un ardent désir la révélation des fils de Dieu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 8:36
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 6:18
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 5:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'En effet, la loi de l’esprit de vie en Jésus-Christ m’a affranchi de la loi du péché et de la mort. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car la création a été soumise à la vanité, non de son gré, mais à cause de celui qui l’y a soumise, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avec l’espérance qu’elle aussi sera affranchie de la servitude de la corruption, pour avoir part à la liberté de la gloire des enfants de Dieu. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, nous savons que, jusqu’à ce jour, la création tout entière soupire et souffre les douleurs de l’enfantement. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ce n’est pas elle seulement; mais nous aussi, qui avons les prémices de l’Esprit, nous aussi nous soupirons en nous-mêmes, en attendant l’adoption, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 21:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'la rédemption de notre corps. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car c’est en espérance que nous sommes sauvés. Or, l’espérance qu’on voit n’est plus espérance: ce qu’on voit, peut-on l’espérer encore? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si nous espérons ce que nous ne voyons pas, nous l’attendons avec persévérance. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De même aussi l’Esprit nous aide dans notre faiblesse, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 20:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 4:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car nous ne savons pas ce qu’il nous convient de demander dans nos prières. Mais l’Esprit lui-même intercède par des soupirs inexprimables; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et celui qui sonde les cœurs connaît quelle est la pensée de l’Esprit, parce que c’est selon Dieu qu’il intercède en faveur des saints.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 28-39: cf. Ép 1:3-12. (Ro 5:1-11. És 50:8, 9. Jn 10:27-30.)'
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous savons, du reste, que toutes choses concourent au bien de ceux qui aiment Dieu, de ceux qui sont appelés selon son dessein. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car ceux qu’il a connus d’avance, il les a aussi prédestinés à être semblables à l’image de son Fils, afin que son Fils fût '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le premier-né entre plusieurs frères. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13:39
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 2:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 7:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car chose impossible à la loi, parce que la chair la rendait sans force, Dieu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 5:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 3:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'a condamné le péché dans la chair, en envoyant, à cause du péché, son propre Fils dans une chair semblable à celle du péché, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ceux qu’il a prédestinés, il les a aussi appelés; et ceux qu’il a appelés, il les a aussi justifiés; et ceux qu’il a justifiés, il les a aussi glorifiés. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que dirons-nous donc à l’égard de ces choses? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 14:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si Dieu est pour nous, qui sera contre nous? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lui, qui n’a point épargné '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 22:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 53:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 3:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'son propre Fils, mais qui l’a livré pour nous tous, comment ne nous donnera-t-il pas aussi toutes choses avec lui? '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qui accusera les élus de Dieu? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 50:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'C’est Dieu qui justifie! '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qui les condamnera? Christ est mort; bien plus, il est ressuscité, il est à la droite de Dieu, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 7:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et il intercède pour nous! '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qui nous séparera de l’amour de Christ? Sera-ce la tribulation, ou l’angoisse, ou la persécution, ou la faim, ou la nudité, ou le péril, ou l’épée? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'selon qu’il est écrit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 44:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 4:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 4:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: C’est à cause de toi qu’on nous met à mort tout le jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’on nous regarde comme des brebis destinées à la boucherie.
  '37':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Mais dans toutes ces choses nous sommes plus que vainqueurs par celui qui nous a aimés. '
  '38':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Car j’ai l’assurance que ni la mort ni la vie, ni les anges ni les dominations, ni les choses présentes ni les choses à venir, '
  '39':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ni les puissances, ni la hauteur, ni la profondeur, ni aucune autre créature ne pourra nous séparer de l’amour de Dieu manifesté en Jésus-Christ notre Seigneur.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et cela afin que la justice de la loi fût accomplie en nous, qui marchons, non selon la chair, mais selon l’esprit. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 2:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ceux, en effet, qui vivent selon la chair, s’affectionnent aux choses de la chair, tandis que ceux qui vivent selon l’esprit s’affectionnent aux choses de l’esprit. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’affection de la chair, c’est la mort, tandis que l’affection de l’esprit, c’est la vie et la paix; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car l’affection de la chair est inimitié contre Dieu, parce qu’elle ne se soumet pas à la loi de Dieu, et qu’elle ne le peut même pas. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or ceux qui vivent selon la chair ne sauraient plaire à Dieu. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour vous, vous ne vivez pas selon la chair, mais selon l’esprit, si du moins l’Esprit de Dieu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 3:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'habite en vous. Si quelqu’un n’a pas l’Esprit de Christ, il ne lui appartient pas. '
