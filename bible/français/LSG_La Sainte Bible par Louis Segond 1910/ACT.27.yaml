document_id: ACT.27
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Départ de Paul pour Rome. Navigation et naufrage
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-44: cf. Ps 107:23-31. 2 Co 11:25, 26. És 43:1, 2.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsqu’il fut décidé que nous nous embarquerions pour l’Italie, on remit Paul et quelques autres prisonniers à un centenier de la cohorte Auguste, nommé Julius. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:25
      metadata:
        usfm: 2CO.11.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous montâmes sur un navire d’Adramytte, qui devait côtoyer l’Asie, et nous partîmes, ayant avec nous Aristarque, Macédonien de Thessalonique. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le jour suivant, nous abordâmes à Sidon; et Julius, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 24:23
      metadata:
        usfm: ACT.24.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:16
      metadata:
        usfm: ACT.28.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui traitait Paul avec bienveillance, lui permit d’aller chez ses amis et de recevoir leurs soins. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Partis de là, nous longeâmes l’île de Chypre, parce que les vents étaient contraires. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Après avoir traversé la mer qui baigne la Cilicie et la Pamphylie, nous arrivâmes à Myra en Lycie. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et là, le centenier, ayant trouvé un navire d’Alexandrie qui allait en Italie, nous y fit monter. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Pendant plusieurs jours nous naviguâmes lentement, et ce ne fut pas sans difficulté que nous atteignîmes la hauteur de Cnide, où le vent ne nous permit pas d’aborder. Nous passâmes au-dessous de l’île de Crète, du côté de Salmone. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nous la côtoyâmes avec peine, et nous arrivâmes à un lieu nommé Beaux Ports, près duquel était la ville de Lasée. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Un temps assez long s’était écoulé, et la navigation devenait dangereuse, car l’époque même du jeûne était déjà passée. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C’est pourquoi Paul avertit les autres, en disant: O hommes, je vois que la navigation ne se fera pas sans péril et sans beaucoup de dommage, non seulement pour la cargaison et pour le navire, mais encore pour nos personnes. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le centenier écouta le pilote et le patron du navire plutôt que les paroles de Paul. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et comme le port n’était pas bon pour hiverner, la plupart furent d’avis de le quitter pour tâcher d’atteindre Phénix, port de Crète qui regarde le sud-ouest et le nord-ouest, afin d’y passer l’hiver. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Un léger vent du sud vint à souffler, et, se croyant maîtres de leur dessein, ils levèrent l’ancre et côtoyèrent de près l’île de Crète. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais bientôt un vent impétueux, qu’on appelle Euraquilon, se déchaîna sur l’île. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le navire fut entraîné, sans pouvoir lutter contre le vent, et nous nous laissâmes aller à la dérive. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nous passâmes au-dessous d’une petite île nommée Clauda, et nous eûmes de la peine à nous rendre maîtres de la chaloupe; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'après l’avoir hissée, on se servit des moyens de secours pour ceindre le navire, et, dans la crainte de tomber sur la Syrte, on abaissa les voiles. C’est ainsi qu’on se laissa emporter par le vent. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Comme nous étions violemment battus par la tempête, le lendemain on jeta la cargaison à la mer, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et le troisième jour nous y lançâmes de nos propres mains les agrès du navire. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le soleil et les étoiles ne parurent pas pendant plusieurs jours, et la tempête était si forte que nous perdîmes enfin toute espérance de nous sauver. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'On n’avait pas mangé depuis longtemps. Alors Paul, se tenant au milieu d’eux, leur dit: O hommes, il fallait m’écouter et ne pas partir de Crète, afin d’éviter ce péril et ce dommage. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Maintenant je vous exhorte à prendre courage; car aucun de vous ne périra, et il n’y aura de perte que celle du navire. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Un ange du Dieu à qui j’appartiens et que je sers m’est apparu cette nuit, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'et m’a dit: Paul, ne crains point; il faut que tu comparaisses devant César, et voici, Dieu t’a donné tous ceux qui naviguent avec toi. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'C’est pourquoi, ô hommes, rassurez-vous, car j’ai cette confiance en Dieu qu’il en sera comme il m’a été dit. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mais nous devons échouer sur une '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 28:1
      metadata:
        usfm: ACT.28.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'île. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'La quatorzième nuit, tandis que nous étions ballottés sur l’Adriatique, les matelots, vers le milieu de la nuit, soupçonnèrent qu’on approchait de quelque terre. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ayant jeté la sonde, ils trouvèrent vingt brasses; un peu plus loin, ils la jetèrent de nouveau, et trouvèrent quinze brasses. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dans la crainte de heurter contre des écueils, ils jetèrent quatre ancres de la poupe, et attendirent le jour avec impatience. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mais, comme les matelots cherchaient à s’échapper du navire, et mettaient la chaloupe à la mer sous prétexte de jeter les ancres de la proue, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Paul dit au centenier et aux soldats: Si ces hommes ne restent pas dans le navire, vous ne pouvez être sauvés. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Alors les soldats coupèrent les cordes de la chaloupe, et la laissèrent tomber. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Avant que le jour parût, Paul exhorta tout le monde à prendre de la nourriture, disant: C’est aujourd’hui le quatorzième jour que vous êtes dans l’attente et que vous persistez à vous abstenir de manger. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Je vous invite donc à prendre de la nourriture, car cela est nécessaire pour votre salut, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:30
      metadata:
        usfm: MAT.10.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il ne se perdra pas un cheveu de la tête d’aucun de vous. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ayant ainsi parlé, il prit du pain, et, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 9:13
      metadata:
        usfm: 1SA.9.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:11
      metadata:
        usfm: JHN.6.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 4:3
      metadata:
        usfm: 1TI.4.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'après avoir rendu grâces à Dieu devant tous, il le rompit, et se mit à manger. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Et tous, reprenant courage, mangèrent aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Nous étions, dans le navire, deux cent soixante-seize personnes en tout. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Quand ils eurent mangé suffisamment, ils allégèrent le navire en jetant le blé à la mer. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Lorsque le jour fut venu, ils ne reconnurent point la terre; mais, ayant aperçu un golfe avec une plage, ils résolurent d’y pousser le navire, s’ils le pouvaient. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ils délièrent les ancres pour les laisser aller dans la mer, et ils relâchèrent en même temps les attaches des gouvernails; puis ils mirent au vent la voile d’artimon, et se dirigèrent vers le rivage. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:25
      metadata:
        usfm: 2CO.11.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais ils rencontrèrent une langue de terre, où ils firent échouer le navire; et la proue, s’étant engagée, resta immobile, tandis que la poupe se brisait par la violence des vagues. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Les soldats furent d’avis de tuer les prisonniers, de peur que quelqu’un d’eux ne s’échappât à la nage. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Mais le centenier, qui voulait sauver Paul, les empêcha d’exécuter ce dessein. Il ordonna à ceux qui savaient nager de se jeter les premiers dans l’eau pour gagner la terre, '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: et aux autres de se mettre sur des planches ou sur des débris du navire. Et ainsi tous parvinrent à terre sains et saufs.
