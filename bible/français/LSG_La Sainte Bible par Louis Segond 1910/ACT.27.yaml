document_id: ACT.27,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Départ de Paul pour Rome. Navigation et naufrage
  - type: heading
    content: 'V. 1-44: cf. Ps 107:23-31. 2 Co 11:25, 26. És 43:1, 2.'
  - type: text
    content: 'Lorsqu’il fut décidé que nous nous embarquerions pour l’Italie, on remit Paul et quelques autres prisonniers à un centenier de la cohorte Auguste, nommé Julius. '
  '10':
  - type: text
    content: 'C’est pourquoi Paul avertit les autres, en disant: O hommes, je vois que la navigation ne se fera pas sans péril et sans beaucoup de dommage, non seulement pour la cargaison et pour le navire, mais encore pour nos personnes. '
  '11':
  - type: text
    content: 'Le centenier écouta le pilote et le patron du navire plutôt que les paroles de Paul. '
  '12':
  - type: text
    content: 'Et comme le port n’était pas bon pour hiverner, la plupart furent d’avis de le quitter pour tâcher d’atteindre Phénix, port de Crète qui regarde le sud-ouest et le nord-ouest, afin d’y passer l’hiver. '
  '13':
  - type: text
    content: 'Un léger vent du sud vint à souffler, et, se croyant maîtres de leur dessein, ils levèrent l’ancre et côtoyèrent de près l’île de Crète. '
  '14':
  - type: text
    content: 'Mais bientôt un vent impétueux, qu’on appelle Euraquilon, se déchaîna sur l’île. '
  '15':
  - type: text
    content: 'Le navire fut entraîné, sans pouvoir lutter contre le vent, et nous nous laissâmes aller à la dérive. '
  '16':
  - type: text
    content: 'Nous passâmes au-dessous d’une petite île nommée Clauda, et nous eûmes de la peine à nous rendre maîtres de la chaloupe; '
  '17':
  - type: text
    content: 'après l’avoir hissée, on se servit des moyens de secours pour ceindre le navire, et, dans la crainte de tomber sur la Syrte, on abaissa les voiles. C’est ainsi qu’on se laissa emporter par le vent. '
  '18':
  - type: text
    content: 'Comme nous étions violemment battus par la tempête, le lendemain on jeta la cargaison à la mer, '
  '19':
  - type: text
    content: 'et le troisième jour nous y lançâmes de nos propres mains les agrès du navire. '
  '2':
  - type: note
    content: 2 Co 11:25.
  - type: text
    content: 'Nous montâmes sur un navire d’Adramytte, qui devait côtoyer l’Asie, et nous partîmes, ayant avec nous Aristarque, Macédonien de Thessalonique. '
  '20':
  - type: text
    content: 'Le soleil et les étoiles ne parurent pas pendant plusieurs jours, et la tempête était si forte que nous perdîmes enfin toute espérance de nous sauver. '
  '21':
  - type: text
    content: 'On n’avait pas mangé depuis longtemps. Alors Paul, se tenant au milieu d’eux, leur dit: O hommes, il fallait m’écouter et ne pas partir de Crète, afin d’éviter ce péril et ce dommage. '
  '22':
  - type: text
    content: 'Maintenant je vous exhorte à prendre courage; car aucun de vous ne périra, et il n’y aura de perte que celle du navire. '
  '23':
  - type: text
    content: 'Un ange du Dieu à qui j’appartiens et que je sers m’est apparu cette nuit, '
  '24':
  - type: text
    content: 'et m’a dit: Paul, ne crains point; il faut que tu comparaisses devant César, et voici, Dieu t’a donné tous ceux qui naviguent avec toi. '
  '25':
  - type: text
    content: 'C’est pourquoi, ô hommes, rassurez-vous, car j’ai cette confiance en Dieu qu’il en sera comme il m’a été dit. '
  '26':
  - type: text
    content: 'Mais nous devons échouer sur une '
  - type: note
    content: Ac 28:1.
  - type: text
    content: 'île. '
  '27':
  - type: text
    content: 'La quatorzième nuit, tandis que nous étions ballottés sur l’Adriatique, les matelots, vers le milieu de la nuit, soupçonnèrent qu’on approchait de quelque terre. '
  '28':
  - type: text
    content: 'Ayant jeté la sonde, ils trouvèrent vingt brasses; un peu plus loin, ils la jetèrent de nouveau, et trouvèrent quinze brasses. '
  '29':
  - type: text
    content: 'Dans la crainte de heurter contre des écueils, ils jetèrent quatre ancres de la poupe, et attendirent le jour avec impatience. '
  '3':
  - type: text
    content: 'Le jour suivant, nous abordâmes à Sidon; et Julius, '
  - type: note
    content: Ac 24:23; 28:16.
  - type: text
    content: 'qui traitait Paul avec bienveillance, lui permit d’aller chez ses amis et de recevoir leurs soins. '
  '30':
  - type: text
    content: 'Mais, comme les matelots cherchaient à s’échapper du navire, et mettaient la chaloupe à la mer sous prétexte de jeter les ancres de la proue, '
  '31':
  - type: text
    content: 'Paul dit au centenier et aux soldats: Si ces hommes ne restent pas dans le navire, vous ne pouvez être sauvés. '
  '32':
  - type: text
    content: 'Alors les soldats coupèrent les cordes de la chaloupe, et la laissèrent tomber. '
  '33':
  - type: text
    content: 'Avant que le jour parût, Paul exhorta tout le monde à prendre de la nourriture, disant: C’est aujourd’hui le quatorzième jour que vous êtes dans l’attente et que vous persistez à vous abstenir de manger. '
  '34':
  - type: text
    content: 'Je vous invite donc à prendre de la nourriture, car cela est nécessaire pour votre salut, et '
  - type: note
    content: Mt 10:30.
  - type: text
    content: 'il ne se perdra pas un cheveu de la tête d’aucun de vous. '
  '35':
  - type: text
    content: 'Ayant ainsi parlé, il prit du pain, et, '
  - type: note
    content: 1 S 9:13. Jn 6:11. 1 Ti 4:3.
  - type: text
    content: 'après avoir rendu grâces à Dieu devant tous, il le rompit, et se mit à manger. '
  '36':
  - type: text
    content: 'Et tous, reprenant courage, mangèrent aussi. '
  '37':
  - type: text
    content: 'Nous étions, dans le navire, deux cent soixante-seize personnes en tout. '
  '38':
  - type: text
    content: 'Quand ils eurent mangé suffisamment, ils allégèrent le navire en jetant le blé à la mer. '
  '39':
  - type: text
    content: 'Lorsque le jour fut venu, ils ne reconnurent point la terre; mais, ayant aperçu un golfe avec une plage, ils résolurent d’y pousser le navire, s’ils le pouvaient. '
  '4':
  - type: text
    content: 'Partis de là, nous longeâmes l’île de Chypre, parce que les vents étaient contraires. '
  '40':
  - type: text
    content: 'Ils délièrent les ancres pour les laisser aller dans la mer, et ils relâchèrent en même temps les attaches des gouvernails; puis ils mirent au vent la voile d’artimon, et se dirigèrent vers le rivage. '
  '41':
  - type: note
    content: 2 Co 11:25.
  - type: text
    content: 'Mais ils rencontrèrent une langue de terre, où ils firent échouer le navire; et la proue, s’étant engagée, resta immobile, tandis que la poupe se brisait par la violence des vagues. '
  '42':
  - type: text
    content: 'Les soldats furent d’avis de tuer les prisonniers, de peur que quelqu’un d’eux ne s’échappât à la nage. '
  '43':
  - type: text
    content: 'Mais le centenier, qui voulait sauver Paul, les empêcha d’exécuter ce dessein. Il ordonna à ceux qui savaient nager de se jeter les premiers dans l’eau pour gagner la terre, '
  '44':
  - type: text
    content: et aux autres de se mettre sur des planches ou sur des débris du navire. Et ainsi tous parvinrent à terre sains et saufs.
  '5':
  - type: text
    content: 'Après avoir traversé la mer qui baigne la Cilicie et la Pamphylie, nous arrivâmes à Myra en Lycie. '
  '6':
  - type: text
    content: 'Et là, le centenier, ayant trouvé un navire d’Alexandrie qui allait en Italie, nous y fit monter. '
  '7':
  - type: text
    content: 'Pendant plusieurs jours nous naviguâmes lentement, et ce ne fut pas sans difficulté que nous atteignîmes la hauteur de Cnide, où le vent ne nous permit pas d’aborder. Nous passâmes au-dessous de l’île de Crète, du côté de Salmone. '
  '8':
  - type: text
    content: 'Nous la côtoyâmes avec peine, et nous arrivâmes à un lieu nommé Beaux Ports, près duquel était la ville de Lasée. '
  '9':
  - type: text
    content: 'Un temps assez long s’était écoulé, et la navigation devenait dangereuse, car l’époque même du jeûne était déjà passée. '
