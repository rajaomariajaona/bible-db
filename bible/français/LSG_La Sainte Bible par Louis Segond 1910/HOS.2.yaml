document_id: HOS.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-3: cf. v. 25. (Ro 9:23-26. 1 Pi 2:9, 10.) Éz 37:15-27.'
  - type: text
    content: 'Cependant le nombre des enfants d’Israël sera comme le '
  - type: note
    content: Ge 32:12.
  - type: text
    content: 'sable de la mer, qui ne peut ni se mesurer ni se compter; '
  - type: note
    content: Ro 9:25, 26.
  - type: text
    content: 'et au lieu qu’on leur disait: Vous n’êtes pas mon peuple! On leur dira: Fils du Dieu vivant! '
  '10':
  - type: text
    content: 'Elle n’a pas reconnu que c’était moi qui lui donnais le blé, le moût et l’huile; et l’on a consacré au service de Baal l’argent et l’or que je lui prodiguais. '
  '11':
  - type: text
    content: 'C’est pourquoi je reprendrai mon blé en son temps et mon moût dans sa saison, et j’enlèverai ma laine et mon lin qui devaient couvrir sa nudité. '
  '12':
  - type: text
    content: 'Et maintenant je découvrirai sa honte aux yeux de ses amants, et '
  - type: note
    content: Os 5:14.
  - type: text
    content: 'nul ne la délivrera de ma main. '
  '13':
  - type: text
    content: 'Je ferai cesser toute sa joie, ses fêtes, ses nouvelles lunes, ses sabbats et toutes ses solennités. '
  '14':
  - type: text
    content: 'Je ravagerai ses vignes et ses figuiers, dont elle disait: C’est le salaire que m’ont donné mes amants! Je les réduirai en une '
  - type: note
    content: Ps 80:13. És 5:5.
  - type: text
    content: 'forêt, et les bêtes des champs les dévoreront. '
  '15':
  - type: text
    content: Je la châtierai pour les jours où elle encensait les Baals, où elle se paraît de ses anneaux et de ses colliers, allait après ses amants, et m’oubliait, dit l’Éternel.
  - type: heading
    content: 'V. 16-25: cf. (Jé 31:2-14. Éz 36:24-30.) (v. 1:2. 1 Pi 2:9, 10.)'
  '16':
  - type: text
    content: 'C’est pourquoi voici, je veux l’attirer et la conduire au désert, et je parlerai à son cœur. '
  '17':
  - type: text
    content: 'Là, je lui donnerai ses vignes et la vallée d’Acor, comme une porte d’espérance, et là, elle chantera comme au temps de sa jeunesse, et comme au jour où elle remonta du pays d’Égypte. '
  '18':
  - type: text
    content: 'En ce jour-là, dit l’Éternel, tu m’appelleras: Mon mari! Et tu ne m’appelleras plus: Mon maître! '
  '19':
  - type: text
    content: 'J’ôterai de sa bouche les noms des Baals, afin qu’on ne les mentionne plus par leurs noms. '
  '2':
  - type: text
    content: 'Les enfants de Juda et les enfants d’Israël se '
  - type: note
    content: És 11:13. Jé 3:18. Éz 37:16, 22. Ép 2:14, 15, 16.
  - type: text
    content: 'rassembleront, se donneront un chef, et sortiront du pays; car grande sera la journée de Jizreel. '
  '20':
  - type: text
    content: 'En ce jour-là, je traiterai pour eux une alliance avec les '
  - type: note
    content: Job 5:23. És 11:6. Éz 14:21; 34:25.
  - type: text
    content: 'bêtes des champs, les oiseaux du ciel et les reptiles de la terre, je briserai dans le pays l’arc, l’épée et la guerre, et je les ferai reposer avec sécurité. '
  '21':
  - type: text
    content: 'Je serai ton fiancé pour toujours; je serai ton fiancé par la justice, la droiture, la grâce et la miséricorde; '
  '22':
  - type: text
    content: 'je serai ton fiancé par la fidélité, et '
  - type: note
    content: Jé 31:33, 34.
  - type: text
    content: 'tu reconnaîtras l’Éternel. '
  '23':
  - type: text
    content: 'En ce jour-là, j’exaucerai, dit l’Éternel, j’exaucerai les cieux, et ils exauceront la terre; '
  '24':
  - type: text
    content: 'la terre exaucera le blé, le moût et l’huile, et ils exauceront Jizreel. '
  '25':
  - type: text
    content: 'Je planterai pour moi Lo-Ruchama dans le pays, et je lui ferai miséricorde; '
  - type: note
    content: Os 1:10. Ro 9:26. 1 Pi 2:10.
  - type: text
    content: 'je dirai à Lo-Ammi: Tu es mon peuple! Et il répondra: Mon Dieu!'
  '3':
  - type: text
    content: 'Dites à vos frères: Ammi! Et à vos sœurs: Ruchama!'
  - type: heading
    content: 'V. 4-15: cf. Éz 16; 23. Ja 4:4. Ap 2:4.'
  '4':
  - type: text
    content: 'Plaidez, plaidez contre votre mère, car elle n’est point ma femme, et je ne suis point son mari! Qu’elle ôte de sa face ses prostitutions, et de son sein ses adultères! '
  '5':
  - type: text
    content: 'Sinon, je la dépouille à nu, je la mets comme au jour de sa naissance, je la rends semblable à un désert, à une terre aride, et je la fais mourir de soif; '
  '6':
  - type: text
    content: 'et je n’aurai pas pitié de ses enfants, car ce sont des enfants de prostitution. '
  '7':
  - type: text
    content: 'Leur mère s’est prostituée, celle qui les a conçus s’est déshonorée, car elle a dit: J’irai après mes amants, qui me donnent mon pain et mon eau, ma laine et mon lin, mon huile et ma boisson. '
  '8':
  - type: text
    content: 'C’est pourquoi voici, je vais fermer son chemin avec des épines et y élever un mur, afin qu’elle ne trouve plus ses sentiers. '
  '9':
  - type: text
    content: 'Elle poursuivra ses amants, et ne les atteindra pas; elle les cherchera, et ne les trouvera pas. Puis elle dira: J’irai, et je retournerai vers mon premier mari, car alors j’étais plus heureuse que maintenant. '
