document_id: ISA.13,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La ruine de Babylone
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-22: cf. (És 21:1-10; 47. Jé 50, 51.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Oracle sur Babylone, révélé à Ésaïe, fils d’Amots.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Car les étoiles des cieux et leurs astres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne feront plus briller leur lumière,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 32:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 2:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 24:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 13:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 21:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le soleil s’obscurcira dès son lever,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la lune ne fera plus luire sa clarté.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Je punirai le monde pour sa malice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les méchants pour leurs iniquités;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai cesser l’orgueil des hautains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’abattrai l’arrogance des tyrans.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je rendrai les hommes plus rares que l’or fin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les rendrai plus rares que l’or d’Ophir.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: C’est pourquoi j’ébranlerai les cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la terre sera secouée sur sa base,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par la colère de l’Éternel des armées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au jour de son ardente fureur.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Alors, comme une gazelle effarouchée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un troupeau sans berger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chacun se tournera vers son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chacun fuira vers son pays;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tous ceux qu’on trouvera seront percés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tous ceux qu’on saisira tomberont par l’épée.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Leurs enfants seront écrasés sous leurs yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs maisons seront pillées, et leurs femmes violées.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Voici, j’excite contre eux les Mèdes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui ne font point cas de l’argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui ne convoitent point l’or.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: De leurs arcs ils abattront les jeunes gens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et ils seront sans pitié pour le fruit des entrailles:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur œil n’épargnera point les enfants.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Et Babylone, l’ornement des royaumes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La fière parure des Chaldéens,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 19:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 49:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 50:40
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Sera comme Sodome et Gomorrhe, que Dieu détruisit.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Sur une montagne nue dressez une bannière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Élevez la voix vers eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faites des signes avec la main,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’ils franchissent les portes des tyrans!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Elle ne sera plus jamais habitée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle ne sera plus jamais peuplée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Arabe n’y dressera point sa tente,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les bergers n’y parqueront point leurs troupeaux.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Les animaux du désert y prendront leur gîte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les hiboux rempliront ses maisons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les autruches en feront leur demeure
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les boucs y sauteront.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Les chacals hurleront dans ses palais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les chiens sauvages dans ses maisons de plaisance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son temps est près d’arriver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses jours ne se prolongeront pas.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: J’ai donné des ordres à ma sainte milice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai appelé les héros de ma colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui se réjouissent de ma grandeur.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: On entend une rumeur sur les montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme celle d’un peuple nombreux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On entend un tumulte de royaumes, de nations rassemblées:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel des armées passe en revue l’armée qui va combattre.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ils viennent d’un pays lointain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'De l’extrémité des cieux:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel et les instruments de sa colère
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vont détruire toute la contrée.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Gémissez, car le jour de l’Éternel est proche:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il vient comme un ravage du Tout-Puissant.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: C’est pourquoi toutes les mains s’affaiblissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tout cœur d’homme est abattu.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ils sont frappés d’épouvante;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les spasmes et les douleurs les saisissent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se tordent comme une femme en travail;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se regardent les uns les autres avec stupeur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs visages sont enflammés.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Voici, le jour de l’Éternel arrive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jour cruel, jour de colère et d’ardente fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui réduira la terre en solitude,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et en exterminera les pécheurs.
