document_id: ISA.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La ruine de Babylone
  - type: heading
    content: 'V. 1-22: cf. (És 21:1-10; 47. Jé 50, 51.)'
  - type: text
    content: Oracle sur Babylone, révélé à Ésaïe, fils d’Amots.
  '10':
  - type: text
    content: Car les étoiles des cieux et leurs astres
  - type: text
    content: Ne feront plus briller leur lumière,
  - type: note
    content: Éz 32:7. Joë 2:31; 3:15. Mt 24:29. Mc 13:24. Lu 21:25.
  - type: text
    content: Le soleil s’obscurcira dès son lever,
  - type: text
    content: Et la lune ne fera plus luire sa clarté.
  '11':
  - type: text
    content: Je punirai le monde pour sa malice,
  - type: text
    content: Et les méchants pour leurs iniquités;
  - type: text
    content: Je ferai cesser l’orgueil des hautains,
  - type: text
    content: Et j’abattrai l’arrogance des tyrans.
  '12':
  - type: text
    content: Je rendrai les hommes plus rares que l’or fin,
  - type: text
    content: Je les rendrai plus rares que l’or d’Ophir.
  '13':
  - type: text
    content: C’est pourquoi j’ébranlerai les cieux,
  - type: text
    content: Et la terre sera secouée sur sa base,
  - type: text
    content: Par la colère de l’Éternel des armées,
  - type: text
    content: Au jour de son ardente fureur.
  '14':
  - type: text
    content: Alors, comme une gazelle effarouchée,
  - type: text
    content: Comme un troupeau sans berger,
  - type: text
    content: Chacun se tournera vers son peuple,
  - type: text
    content: Chacun fuira vers son pays;
  '15':
  - type: text
    content: Tous ceux qu’on trouvera seront percés,
  - type: text
    content: Et tous ceux qu’on saisira tomberont par l’épée.
  '16':
  - type: text
    content: Leurs enfants seront écrasés sous leurs yeux,
  - type: text
    content: Leurs maisons seront pillées, et leurs femmes violées.
  '17':
  - type: text
    content: Voici, j’excite contre eux les Mèdes,
  - type: text
    content: Qui ne font point cas de l’argent,
  - type: text
    content: Et qui ne convoitent point l’or.
  '18':
  - type: text
    content: De leurs arcs ils abattront les jeunes gens,
  - type: text
    content: 'Et ils seront sans pitié pour le fruit des entrailles:'
  - type: text
    content: Leur œil n’épargnera point les enfants.
  '19':
  - type: text
    content: Et Babylone, l’ornement des royaumes,
  - type: text
    content: La fière parure des Chaldéens,
  - type: note
    content: Ge 19:25. És 1:9. Jé 49:18; 50:40.
  - type: text
    content: Sera comme Sodome et Gomorrhe, que Dieu détruisit.
  '2':
  - type: text
    content: Sur une montagne nue dressez une bannière,
  - type: text
    content: Élevez la voix vers eux,
  - type: text
    content: Faites des signes avec la main,
  - type: text
    content: Et qu’ils franchissent les portes des tyrans!
  '20':
  - type: text
    content: Elle ne sera plus jamais habitée,
  - type: text
    content: Elle ne sera plus jamais peuplée;
  - type: text
    content: L’Arabe n’y dressera point sa tente,
  - type: text
    content: Et les bergers n’y parqueront point leurs troupeaux.
  '21':
  - type: text
    content: Les animaux du désert y prendront leur gîte,
  - type: text
    content: Les hiboux rempliront ses maisons,
  - type: text
    content: Les autruches en feront leur demeure
  - type: text
    content: Et les boucs y sauteront.
  '22':
  - type: text
    content: Les chacals hurleront dans ses palais,
  - type: text
    content: Et les chiens sauvages dans ses maisons de plaisance.
  - type: text
    content: Son temps est près d’arriver,
  - type: text
    content: Et ses jours ne se prolongeront pas.
  '3':
  - type: text
    content: J’ai donné des ordres à ma sainte milice,
  - type: text
    content: J’ai appelé les héros de ma colère,
  - type: text
    content: Ceux qui se réjouissent de ma grandeur.
  '4':
  - type: text
    content: On entend une rumeur sur les montagnes,
  - type: text
    content: Comme celle d’un peuple nombreux;
  - type: text
    content: 'On entend un tumulte de royaumes, de nations rassemblées:'
  - type: text
    content: L’Éternel des armées passe en revue l’armée qui va combattre.
  '5':
  - type: text
    content: Ils viennent d’un pays lointain,
  - type: text
    content: 'De l’extrémité des cieux:'
  - type: text
    content: L’Éternel et les instruments de sa colère
  - type: text
    content: Vont détruire toute la contrée.
  '6':
  - type: text
    content: 'Gémissez, car le jour de l’Éternel est proche:'
  - type: text
    content: Il vient comme un ravage du Tout-Puissant.
  '7':
  - type: text
    content: C’est pourquoi toutes les mains s’affaiblissent,
  - type: text
    content: Et tout cœur d’homme est abattu.
  '8':
  - type: text
    content: Ils sont frappés d’épouvante;
  - type: text
    content: Les spasmes et les douleurs les saisissent;
  - type: text
    content: Ils se tordent comme une femme en travail;
  - type: text
    content: Ils se regardent les uns les autres avec stupeur;
  - type: text
    content: Leurs visages sont enflammés.
  '9':
  - type: text
    content: Voici, le jour de l’Éternel arrive,
  - type: text
    content: Jour cruel, jour de colère et d’ardente fureur,
  - type: text
    content: Qui réduira la terre en solitude,
  - type: text
    content: Et en exterminera les pécheurs.
