document_id: ISA.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le sort de l’Égypte
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-17: cf. Jé 46. Éz 29 à 32.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Oracle sur l’Égypte.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, l’Éternel est monté sur une nuée rapide, il vient en Égypte;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les idoles de l’Égypte tremblent devant lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le cœur des Égyptiens tombe en défaillance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: J’armerai l’Égyptien contre l’Égyptien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’on se battra frère contre frère, ami contre ami,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ville contre ville, royaume contre royaume.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L’esprit de l’Égypte disparaîtra du milieu d’elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’anéantirai son conseil;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On consultera les idoles et les enchanteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui évoquent les morts et ceux qui prédisent l’avenir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Et je livrerai l’Égypte entre les mains d’un maître sévère;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un roi cruel dominera sur eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Seigneur, l’Éternel des armées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les eaux de la mer tariront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le fleuve deviendra sec et aride;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les rivières seront infectes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les canaux de l’Égypte seront bas et desséchés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les joncs et les roseaux se flétriront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ce ne sera que nudité le long du fleuve, à l’embouchure du fleuve;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout ce qui aura été semé près du fleuve se desséchera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Se réduira en poussière et périra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les pêcheurs gémiront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui jettent l’hameçon dans le fleuve se lamenteront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ceux qui étendent des filets sur les eaux seront désolés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ceux qui travaillent le lin peigné
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui tissent des étoffes blanches seront confus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les soutiens du pays seront dans l’abattement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les mercenaires auront l’âme attristée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les princes de Tsoan ne sont que des insensés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les sages conseillers de Pharaon forment un conseil stupide.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Comment osez-vous dire à Pharaon:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis fils des sages, fils des anciens rois?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Où sont-ils donc tes sages?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils te fassent des révélations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’on apprenne ce que l’Éternel des armées a résolu contre l’Égypte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les princes de Tsoan sont fous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les princes de Noph sont dans l’illusion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les chefs des tribus égarent l’Égypte;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L’Éternel a répandu au milieu d’elle un esprit de vertige,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour qu’ils fassent chanceler les Égyptiens dans tous leurs actes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme un homme ivre chancelle en vomissant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Et l’Égypte sera hors d’état de faire
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ce que font '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 9:13
      metadata:
        usfm: ISA.9.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: la tête et la queue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La branche de palmier et le roseau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'En ce jour, l’Égypte sera comme des femmes:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle tremblera et aura peur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: En voyant s’agiter la main de l’Éternel des armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand il la lèvera contre elle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et le pays de Juda sera pour l’Égypte un objet d’effroi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dès qu’on lui en parlera, elle sera dans l’épouvante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de la résolution prise contre elle par l’Éternel des armées.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-25: cf. Za 2:11, 12; 8:20-23. És 2:3. Mi 7:12.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: En ce temps-là, il y aura cinq villes au pays d’Égypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui parleront la langue de Canaan,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:20
      metadata:
        usfm: DEU.10.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 12:16
      metadata:
        usfm: JER.12.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et qui jureront par l’Éternel des armées:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’une d’elles sera appelée ville de la destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: En ce même temps, il y aura un autel à l’Éternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au milieu du pays d’Égypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sur la frontière un monument à l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ce sera pour l’Éternel des armées un signe et un témoignage
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans le pays d’Égypte;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils crieront à l’Éternel à cause des oppresseurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il leur enverra un sauveur et un défenseur pour les délivrer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Et l’Éternel sera connu des Égyptiens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les Égyptiens connaîtront l’Éternel en ce jour-là;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal 1:11
      metadata:
        usfm: MAL.1.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils feront des sacrifices et des offrandes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils feront des vœux à l’Éternel et les accompliront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ainsi l’Éternel frappera les Égyptiens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les frappera, mais il les guérira;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils se convertiront à l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui les exaucera et les guérira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'En ce même temps, il y aura une route d’Égypte en Assyrie:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les Assyriens iront en Égypte, et les Égyptiens en Assyrie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les Égyptiens avec les Assyriens serviront l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: En ce même temps, Israël sera, lui troisième,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Uni à l’Égypte et à l’Assyrie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ces pays seront l’objet d’une bénédiction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'L’Éternel des armées les bénira, en disant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bénis soient l’Égypte, mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’Assyrie, œuvre de mes mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et Israël, mon héritage!
