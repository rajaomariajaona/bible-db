document_id: ISA.19,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le sort de l’Égypte
  - type: heading
    content: 'V. 1-17: cf. Jé 46. Éz 29 à 32.'
  - type: text
    content: Oracle sur l’Égypte.
  - type: text
    content: Voici, l’Éternel est monté sur une nuée rapide, il vient en Égypte;
  - type: text
    content: Et les idoles de l’Égypte tremblent devant lui,
  - type: text
    content: Et le cœur des Égyptiens tombe en défaillance.
  '10':
  - type: text
    content: Les soutiens du pays seront dans l’abattement,
  - type: text
    content: Tous les mercenaires auront l’âme attristée.
  '11':
  - type: text
    content: Les princes de Tsoan ne sont que des insensés,
  - type: text
    content: Les sages conseillers de Pharaon forment un conseil stupide.
  - type: text
    content: 'Comment osez-vous dire à Pharaon:'
  - type: text
    content: Je suis fils des sages, fils des anciens rois?
  '12':
  - type: text
    content: Où sont-ils donc tes sages?
  - type: text
    content: Qu’ils te fassent des révélations,
  - type: text
    content: Et qu’on apprenne ce que l’Éternel des armées a résolu contre l’Égypte.
  '13':
  - type: text
    content: Les princes de Tsoan sont fous,
  - type: text
    content: Les princes de Noph sont dans l’illusion,
  - type: text
    content: Les chefs des tribus égarent l’Égypte;
  '14':
  - type: text
    content: L’Éternel a répandu au milieu d’elle un esprit de vertige,
  - type: text
    content: Pour qu’ils fassent chanceler les Égyptiens dans tous leurs actes,
  - type: text
    content: Comme un homme ivre chancelle en vomissant.
  '15':
  - type: text
    content: Et l’Égypte sera hors d’état de faire
  - type: text
    content: 'Ce que font '
  - type: note
    content: És 9:13.
  - type: text
    content: la tête et la queue,
  - type: text
    content: La branche de palmier et le roseau.
  '16':
  - type: text
    content: 'En ce jour, l’Égypte sera comme des femmes:'
  - type: text
    content: Elle tremblera et aura peur,
  - type: text
    content: En voyant s’agiter la main de l’Éternel des armées,
  - type: text
    content: Quand il la lèvera contre elle.
  '17':
  - type: text
    content: 'Et le pays de Juda sera pour l’Égypte un objet d’effroi:'
  - type: text
    content: Dès qu’on lui en parlera, elle sera dans l’épouvante,
  - type: text
    content: A cause de la résolution prise contre elle par l’Éternel des armées.
  - type: heading
    content: 'V. 18-25: cf. Za 2:11, 12; 8:20-23. És 2:3. Mi 7:12.'
  '18':
  - type: text
    content: En ce temps-là, il y aura cinq villes au pays d’Égypte,
  - type: text
    content: Qui parleront la langue de Canaan,
  - type: note
    content: De 10:20. Jé 12:16.
  - type: text
    content: 'Et qui jureront par l’Éternel des armées:'
  - type: text
    content: L’une d’elles sera appelée ville de la destruction.
  '19':
  - type: text
    content: En ce même temps, il y aura un autel à l’Éternel
  - type: text
    content: Au milieu du pays d’Égypte,
  - type: text
    content: Et sur la frontière un monument à l’Éternel.
  '2':
  - type: text
    content: J’armerai l’Égyptien contre l’Égyptien,
  - type: text
    content: Et l’on se battra frère contre frère, ami contre ami,
  - type: text
    content: Ville contre ville, royaume contre royaume.
  '20':
  - type: text
    content: Ce sera pour l’Éternel des armées un signe et un témoignage
  - type: text
    content: Dans le pays d’Égypte;
  - type: text
    content: Ils crieront à l’Éternel à cause des oppresseurs,
  - type: text
    content: Et il leur enverra un sauveur et un défenseur pour les délivrer.
  '21':
  - type: text
    content: Et l’Éternel sera connu des Égyptiens,
  - type: text
    content: Et les Égyptiens connaîtront l’Éternel en ce jour-là;
  - type: note
    content: Mal 1:11.
  - type: text
    content: Ils feront des sacrifices et des offrandes,
  - type: text
    content: Ils feront des vœux à l’Éternel et les accompliront.
  '22':
  - type: text
    content: Ainsi l’Éternel frappera les Égyptiens,
  - type: text
    content: Il les frappera, mais il les guérira;
  - type: text
    content: Et ils se convertiront à l’Éternel,
  - type: text
    content: Qui les exaucera et les guérira.
  '23':
  - type: text
    content: 'En ce même temps, il y aura une route d’Égypte en Assyrie:'
  - type: text
    content: Les Assyriens iront en Égypte, et les Égyptiens en Assyrie,
  - type: text
    content: Et les Égyptiens avec les Assyriens serviront l’Éternel.
  '24':
  - type: text
    content: En ce même temps, Israël sera, lui troisième,
  - type: text
    content: Uni à l’Égypte et à l’Assyrie,
  - type: text
    content: Et ces pays seront l’objet d’une bénédiction.
  '25':
  - type: text
    content: 'L’Éternel des armées les bénira, en disant:'
  - type: text
    content: Bénis soient l’Égypte, mon peuple,
  - type: text
    content: Et l’Assyrie, œuvre de mes mains,
  - type: text
    content: Et Israël, mon héritage!
  '3':
  - type: text
    content: L’esprit de l’Égypte disparaîtra du milieu d’elle,
  - type: text
    content: Et j’anéantirai son conseil;
  - type: text
    content: On consultera les idoles et les enchanteurs,
  - type: text
    content: Ceux qui évoquent les morts et ceux qui prédisent l’avenir.
  '4':
  - type: text
    content: Et je livrerai l’Égypte entre les mains d’un maître sévère;
  - type: text
    content: Un roi cruel dominera sur eux,
  - type: text
    content: Dit le Seigneur, l’Éternel des armées.
  '5':
  - type: text
    content: Les eaux de la mer tariront,
  - type: text
    content: Le fleuve deviendra sec et aride;
  '6':
  - type: text
    content: Les rivières seront infectes,
  - type: text
    content: Les canaux de l’Égypte seront bas et desséchés,
  - type: text
    content: Les joncs et les roseaux se flétriront.
  '7':
  - type: text
    content: Ce ne sera que nudité le long du fleuve, à l’embouchure du fleuve;
  - type: text
    content: Tout ce qui aura été semé près du fleuve se desséchera,
  - type: text
    content: Se réduira en poussière et périra.
  '8':
  - type: text
    content: Les pêcheurs gémiront,
  - type: text
    content: Tous ceux qui jettent l’hameçon dans le fleuve se lamenteront,
  - type: text
    content: Et ceux qui étendent des filets sur les eaux seront désolés.
  '9':
  - type: text
    content: Ceux qui travaillent le lin peigné
  - type: text
    content: Et qui tissent des étoffes blanches seront confus.
