document_id: ZEC.6,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les quatre chars
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. Ap 6:1-8. És 66:15, 16.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je levai de nouveau les yeux et je regardai, et voici, quatre chars sortaient d’entre deux montagnes; et les montagnes étaient des montagnes d’airain. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu recevras les dons des captifs, Heldaï, Tobija et Jedaeja, et tu iras toi-même ce jour-là, tu iras dans la maison de Josias, fils de Sophonie, où ils se sont rendus en arrivant de Babylone. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu prendras de l’argent et de l’or, et tu en feras des couronnes, que tu mettras sur la tête de Josué, fils de Jotsadak, le souverain sacrificateur. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu lui diras: Ainsi parle l’Éternel des armées: Voici, un homme, dont le nom est germe, germera dans son lieu, et bâtira le temple de l’Éternel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il bâtira le temple de l’Éternel; il portera les insignes de la majesté; il s’assiéra et dominera sur son trône, il sera sacrificateur sur son trône, et une parfaite union régnera entre l’un et l’autre. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les couronnes seront pour Hélem, Tobija et Jedaeja, et pour Hen, fils de Sophonie, un souvenir dans le temple de l’Éternel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ceux qui sont éloignés viendront et travailleront au temple de l’Éternel; et vous saurez que l’Éternel des armées m’a envoyé vers vous. Cela arrivera, si vous écoutez la voix de l’Éternel, votre Dieu.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au premier char il y avait des chevaux roux, au second char des chevaux noirs, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'au troisième char des chevaux blancs, et au quatrième char des chevaux tachetés, rouges. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je pris la parole et je dis à l’ange qui parlait avec moi: Qu’est-ce, mon seigneur? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ange me répondit: Ce sont les quatre vents des cieux, qui sortent du lieu où ils se tenaient devant le Seigneur de toute la terre. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les chevaux noirs attelés à l’un des chars se dirigent vers le pays du septentrion, et les blancs vont après eux; les tachetés se dirigent vers le pays du midi. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les rouges sortent et demandent à aller parcourir la terre. L’ange leur dit: Allez, parcourez la terre! Et ils parcoururent la terre. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il m’appela, et il me dit: Vois, ceux qui se dirigent vers le pays du septentrion font reposer ma colère sur le pays du septentrion.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Promesses de restauration du temple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-15: cf. Ps 110:1-4. Hé 7; 8:1.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots: '
