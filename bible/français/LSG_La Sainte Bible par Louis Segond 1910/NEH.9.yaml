  - type: text
    text: Jeûne et confession des péchés du peuple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-37: cf. Esd 9:4, etc. Ps 106. De 8:2. 1 Pi 5:6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le vingt-quatrième jour du même mois, les enfants d’Israël s’assemblèrent, revêtus de sacs et couverts de poussière, pour la célébration d’un jeûne. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ceux qui étaient de la race d’Israël, s’étant séparés de tous les étrangers, se présentèrent et confessèrent leurs péchés et les iniquités de leurs pères. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Lorsqu’ils furent placés, on lut dans le livre de la loi de l’Éternel, leur Dieu, pendant un quart de la journée; et pendant un autre quart ils confessèrent leurs péchés et se prosternèrent devant l’Éternel, leur Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Josué, Bani, Kadmiel, Schebania, Bunni, Schérébia, Bani et Kenani montèrent sur l’estrade des Lévites et crièrent à haute voix vers l’Éternel, leur Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et les Lévites Josué, Kadmiel, Bani, Haschabnia, Schérébia, Hodija, Schebania et Pethachja, dirent: Levez-vous, bénissez l’Éternel, votre Dieu, d’éternité en éternité! Que l’on bénisse ton nom glorieux, qui est au-dessus de toute bénédiction et de toute louange! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C’est toi, Éternel, toi seul, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ge 1, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 146:6
      metadata:
        usfm: PSA.146.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 14:15
      metadata:
        usfm: ACT.14.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:24
      metadata:
        usfm: ACT.17.24
    - type: text
      text: '. '
    - type: usfm
