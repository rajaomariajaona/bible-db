        text: Ap 14:7
      metadata:
        usfm: REV.14.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui as fait les cieux, les cieux des cieux et toute leur armée, la terre et tout ce qui est sur elle, les mers et tout ce qu’elles renferment. Tu donnes la vie à toutes ces choses, et l’armée des cieux se prosterne devant toi. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'C’est toi, Éternel Dieu, qui as choisi Abram, qui l’as fait sortir '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 11:31
      metadata:
        usfm: GEN.11.31
    - type: text
      text: ', '
    - type: usfm
      marker: ref
