      - type: text
        text: '32'
      metadata:
        usfm: GEN.11.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:1
      metadata:
        usfm: GEN.12.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'd’Ur en Chaldée, et qui lui as donné '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 17:5
      metadata:
        usfm: GEN.17.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le nom d’Abraham. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 15:6
      metadata:
        usfm: GEN.15.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu trouvas son cœur fidèle devant toi, tu fis alliance avec lui, et tu promis de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 12:7
      metadata:
        usfm: GEN.12.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:15
      metadata:
        usfm: GEN.13.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:18
      metadata:
        usfm: GEN.15.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:8
      metadata:
        usfm: GEN.17.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:4
      metadata:
        usfm: GEN.26.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'donner à sa postérité le pays des Cananéens, des Héthiens, des Amoréens, des Phéréziens, des Jébusiens et des Guirgasiens. Et tu as tenu ta parole, car tu es juste. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 3:7
      metadata:
        usfm: EXO.3.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:10
      metadata:
        usfm: EXO.14.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu vis l’affliction de nos pères en Égypte, et tu entendis leurs cris vers la mer Rouge. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 7:8
      metadata:
        usfm: EXO.7.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: EXO.7.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: EXO.7.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: EXO.7.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: EXO.7.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: EXO.7.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu opéras des miracles et des prodiges contre Pharaon, contre tous ses serviteurs et contre tout le peuple de son pays, parce que tu savais avec quelle méchanceté ils avaient traité nos pères, et tu fis paraître ta gloire comme elle paraît aujourd’hui. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex 14:22, etc.
    marker-yv: yv-n
  - type: text
    text: 'Tu fendis la mer devant eux, et ils passèrent à sec au milieu de la mer; mais tu précipitas dans l’abîme, comme une pierre au fond des eaux, ceux qui marchaient à leur poursuite. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:21
      metadata:
        usfm: EXO.13.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:19
      metadata:
        usfm: EXO.14.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 40:38
      metadata:
        usfm: EXO.40.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:39
      metadata:
        usfm: PSA.105.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu les guidas le jour par une colonne de nuée, et la nuit par une colonne de feu qui les éclairait dans le chemin qu’ils avaient à suivre. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 19:20
      metadata:
        usfm: EXO.19.20
    - type: text
      text: ; 20:1, etc.
    marker-yv: yv-n
  - type: text
    text: 'Tu descendis sur la montagne de Sinaï, tu leur parlas du haut des cieux, et tu leur donnas des ordonnances justes, des lois de vérité, des préceptes et des commandements excellents. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tu leur fis connaître ton saint sabbat, et tu leur prescrivis par Moïse, ton serviteur, des commandements, des préceptes et une loi. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 16:14
      metadata:
        usfm: EXO.16.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu leur donnas, du haut des cieux, du pain quand ils avaient faim, et tu fis sortir '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 17:6
      metadata:
        usfm: EXO.17.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 20:9
      metadata:
        usfm: NUM.20.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de l’eau du rocher quand ils avaient soif. Et tu leur dis d’entrer en possession du pays que tu avais juré de leur donner. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais nos pères se livrèrent à l’orgueil et raidirent leur cou. Ils n’écoutèrent point tes commandements, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ils refusèrent d’obéir, et ils mirent en oubli les merveilles que tu avais faites en leur faveur. Ils raidirent leur cou; et, dans leur rébellion, ils se donnèrent un '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 14:4
      metadata:
        usfm: NUM.14.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'chef pour retourner à leur servitude. Mais toi, tu es '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 34:7
      metadata:
        usfm: EXO.34.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 14:18
      metadata:
        usfm: NUM.14.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 86:5
      metadata:
        usfm: PSA.86.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un Dieu prêt à pardonner, compatissant et miséricordieux, lent à la colère et riche en bonté, et tu ne les abandonnas pas, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex 32:1, etc.
    marker-yv: yv-n
  - type: text
    text: 'même quand ils se firent un veau en fonte et dirent: Voici ton Dieu qui t’a fait sortir d’Égypte, et qu’ils se livrèrent envers toi à de grands outrages. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:22
      metadata:
        usfm: EXO.13.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 40:38
      metadata:
        usfm: EXO.40.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dans ton immense miséricorde, tu ne les abandonnas pas au désert, et la colonne de nuée ne cessa point de les guider le jour dans leur chemin, ni la colonne de feu de les éclairer la nuit dans le chemin qu’ils avaient à suivre. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 11:17
      metadata:
        usfm: NUM.11.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu leur donnas ton bon esprit pour les rendre sages, tu ne refusas point '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 5:12
      metadata:
        usfm: JOS.5.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ta manne à leur bouche, et tu leur fournis de l’eau pour leur soif. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 2:7
      metadata:
        usfm: DEU.2.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:4
      metadata:
        usfm: DEU.8.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:5
      metadata:
        usfm: DEU.29.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pendant quarante ans, tu pourvus à leur entretien dans le désert, et ils ne manquèrent de rien, leurs vêtements ne s’usèrent point, et leurs pieds ne s’enflèrent point. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu leur livras des royaumes et des peuples, dont tu partageas entre eux les contrées, et ils possédèrent le pays de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 21:21
      metadata:
        usfm: NUM.21.21
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '33'
      metadata:
        usfm: NUM.21.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Sihon, roi de Hesbon, et le pays d’Og, roi de Basan. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 22:17
      metadata:
        usfm: GEN.22.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'multiplias leurs fils comme les étoiles des cieux, et tu les fis entrer dans le pays dont tu avais dit à leurs pères qu’ils prendraient possession. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Et leurs fils entrèrent et prirent possession '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jos 1:2, 3, etc.
    marker-yv: yv-n
  - type: text
    text: 'du pays; tu humilias devant eux les habitants du pays, les Cananéens, et tu les livras entre leurs mains, avec leurs rois et les peuples du pays, pour qu’ils les traitassent à leur gré. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils devinrent maîtres de villes fortifiées et de terres fertiles; ils possédèrent des maisons remplies de toutes sortes de biens, des citernes creusées, des vignes, des oliviers, et des arbres fruitiers en abondance; ils mangèrent, ils se rassasièrent, ils s’engraissèrent, et ils vécurent dans les délices par ta grande bonté. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Néanmoins, ils se soulevèrent et se révoltèrent contre toi. Ils jetèrent ta loi derrière leur dos, ils tuèrent tes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 18:4
      metadata:
        usfm: 1KI.18.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:10
      metadata:
        usfm: 1KI.19.10
    - type: text
      text: . 2 Ch 24:30.
    marker-yv: yv-n
  - type: text
    text: 'prophètes qui les conjuraient de revenir à toi, et ils se livrèrent envers toi à de grands outrages. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jg 2:14, etc.
    marker-yv: yv-n
  - type: text
    text: 'Alors tu les abandonnas entre les mains de leurs ennemis, qui les opprimèrent. Mais, au temps de leur détresse, ils crièrent à toi; et toi, tu les entendis du haut des cieux, et, dans ta grande miséricorde, tu leur donnas des libérateurs qui les sauvèrent de la main de leurs ennemis. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Quand ils eurent du repos, ils recommencèrent à faire le mal devant toi. Alors tu les abandonnas entre les mains de leurs ennemis, qui les dominèrent. Mais, de nouveau, ils crièrent à toi; et toi, tu les entendis du haut des cieux, et, dans ta grande miséricorde, tu les délivras maintes fois. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tu les conjuras de revenir à ta loi; et ils persévérèrent dans l’orgueil, ils n’écoutèrent point tes commandements, ils péchèrent contre tes ordonnances, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 18:5
      metadata:
        usfm: LEV.18.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 20:11
      metadata:
        usfm: EZK.20.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 10:5
      metadata:
        usfm: ROM.10.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:12
      metadata:
        usfm: GAL.3.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui font vivre celui qui les met en pratique, ils eurent une épaule rebelle, ils raidirent leur cou, et ils n’obéirent point. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tu les supportas de nombreuses années, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 17:13
      metadata:
        usfm: 2KI.17.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 26:15
      metadata:
        usfm: 2CH.26.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tu leur donnas des avertissements par ton esprit, par tes prophètes; et ils ne prêtèrent point l’oreille. Alors tu les livras entre les mains des peuples étrangers. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mais, dans ta grande miséricorde, tu ne les anéantis pas, et tu ne les abandonnas pas, car tu es un Dieu compatissant et miséricordieux. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Et maintenant, ô notre Dieu, Dieu grand, puissant et redoutable, toi qui gardes ton alliance et qui exerces la miséricorde, ne regarde pas comme peu de chose toutes les souffrances que nous avons éprouvées, nous, nos rois, nos chefs, nos sacrificateurs, nos prophètes, nos pères et tout ton peuple, depuis le temps des rois d’Assyrie jusqu’à ce jour. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tu as été '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:4
      metadata:
        usfm: DEU.32.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 9:14
      metadata:
        usfm: DAN.9.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'juste dans tout ce qui nous est arrivé, car tu t’es montré fidèle, et nous avons fait le mal. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Nos rois, nos chefs, nos sacrificateurs et nos pères n’ont point observé ta loi, et ils n’ont été attentifs ni à tes commandements ni aux avertissements que tu leur adressais. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Pendant qu’ils étaient les maîtres, au milieu des bienfaits nombreux que tu leur accordais, dans le pays vaste et fertile que tu leur avais livré, ils ne t’ont point servi et ils ne se sont point détournés de leurs œuvres mauvaises. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Et aujourd’hui, nous voici esclaves! Nous voici esclaves sur la terre que tu as donnée à nos pères, pour qu’ils jouissent de ses fruits et de ses biens! '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Elle multiplie ses produits pour les rois auxquels tu nous as assujettis, à cause de nos péchés; ils dominent à leur gré sur nos corps et sur notre bétail, et nous sommes dans une grande angoisse!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Renouvellement de l’alliance
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: '9 v. 38 à 10 v. 31: cf. Né 9. (De 29:10-15. 2 Ch 34:29-33.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Pour tout cela, nous contractâmes une alliance, que nous mîmes par écrit; et nos chefs, nos Lévites et nos sacrificateurs y apposèrent leur sceau.
