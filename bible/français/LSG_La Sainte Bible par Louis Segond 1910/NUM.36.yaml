document_id: NUM.36
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Défense aux filles qui héritent de se marier hors de leurs tribus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. No 27:1-11. Jos 17:3, 4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les chefs de la famille de Galaad, fils de Makir, fils de Manassé, d’entre les familles des fils de Joseph, s’approchèrent et parlèrent devant Moïse et devant les princes, chefs de famille des enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils dirent: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 26:55
      metadata:
        usfm: NUM.26.55
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '56'
      metadata:
        usfm: NUM.26.56
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 33:54
      metadata:
        usfm: NUM.33.54
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’Éternel a ordonné à mon seigneur de donner le pays en héritage par le sort aux enfants d’Israël. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 27:7
      metadata:
        usfm: NUM.27.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 17:3
      metadata:
        usfm: JOS.17.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: JOS.17.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mon seigneur a aussi reçu de l’Éternel l’ordre de donner l’héritage de Tselophchad, notre frère, à ses filles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Si elles se marient à l’un des fils d’une autre tribu des enfants d’Israël, leur héritage sera retranché de l’héritage de nos pères et ajouté à celui de la tribu à laquelle elles appartiendront; ainsi sera diminué l’héritage qui nous est échu par le sort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et quand viendra le jubilé pour les enfants d’Israël, leur héritage sera ajouté à celui de la tribu à laquelle elles appartiendront, et il sera retranché de celui de la tribu de nos pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Moïse transmit aux enfants d’Israël les ordres de l’Éternel. Il dit: La tribu des fils de Joseph a raison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Voici ce que l’Éternel ordonne au sujet des filles de Tselophchad: elles se marieront à qui elles voudront, pourvu qu’elles se marient dans une famille de la tribu de leurs pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aucun héritage parmi les enfants d’Israël ne passera d’une tribu à une autre tribu, mais les enfants d’Israël s’attacheront chacun à l’héritage de la tribu de ses pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et toute fille, possédant un héritage dans les tribus des enfants d’Israël, se mariera à quelqu’un d’une famille de la tribu de son père, afin que les enfants d’Israël possèdent chacun l’héritage de leurs pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aucun héritage ne passera d’une tribu à une autre tribu, mais les tribus des enfants d’Israël s’attacheront chacune à son héritage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les filles de Tselophchad se conformèrent à l’ordre que l’Éternel avait donné à Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 27:1
      metadata:
        usfm: NUM.27.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Machla, Thirtsa, Hogla, Milca et Noa, filles de Tselophchad, se marièrent aux fils de leurs oncles; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'elles se marièrent dans les familles des fils de Manassé, fils de Joseph, et leur héritage resta dans la tribu de la famille de leur père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tels sont les commandements et les lois que l’Éternel donna par Moïse aux enfants d’Israël, dans les plaines de Moab, près du Jourdain, vis-à-vis de Jéricho.
