    marker-yv: yv-n
  - type: text
    text: Lorsqu’il fit la guerre aux Syriens de Mésopotamie et aux Syriens de Tsoba, et que Joab revint et battit dans la vallée du sel douze mille Édomites.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'O Dieu! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 44:10
      metadata:
        usfm: PSA.44.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: tu nous as repoussés, dispersés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu t’es irrité: relève-nous!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu as ébranlé la terre, tu l’as déchirée:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Répare ses brèches, car elle chancelle!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu as fait voir à ton peuple des choses dures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu nous as abreuvés d’un vin d’étourdissement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu as donné à ceux qui te craignent une bannière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pour qu’elle s’élève à cause de la vérité. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps 108:7, etc.
    marker-yv: yv-n
  - type: text
    text: Afin que tes bien-aimés soient délivrés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sauve par ta droite, et exauce-nous!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dieu a dit dans sa sainteté: Je triompherai,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je partagerai Sichem, je mesurerai la vallée de Succoth;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: A moi Galaad, à moi Manassé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éphraïm est le rempart de ma tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et Juda, mon sceptre;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Moab est le bassin où je me lave;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je jette mon soulier sur Édom;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pays des Philistins, pousse à mon sujet des cris de joie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Qui me mènera dans la ville forte?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui me conduira à Édom?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: N’est-ce pas toi, ô Dieu, qui nous as repoussés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui ne sortais plus, ô Dieu, avec nos armées?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Donne-nous du secours contre la détresse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le secours de l’homme n’est que vanité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Avec Dieu, nous ferons des exploits;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il écrasera nos ennemis.
