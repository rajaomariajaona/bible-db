document_id: PSA.60,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 2 S 8:1-14. (Ps 44; 108:7, etc.)
  - type: text
    content: Au chef des chantres. Sur le lis lyrique. Hymne de David, pour enseigner.
  '10':
  - type: text
    content: Moab est le bassin où je me lave;
  - type: text
    content: Je jette mon soulier sur Édom;
  - type: text
    content: Pays des Philistins, pousse à mon sujet des cris de joie!
  '11':
  - type: text
    content: Qui me mènera dans la ville forte?
  - type: text
    content: Qui me conduira à Édom?
  '12':
  - type: text
    content: N’est-ce pas toi, ô Dieu, qui nous as repoussés,
  - type: text
    content: Et qui ne sortais plus, ô Dieu, avec nos armées?
  '13':
  - type: text
    content: Donne-nous du secours contre la détresse!
  - type: text
    content: Le secours de l’homme n’est que vanité.
  '14':
  - type: text
    content: Avec Dieu, nous ferons des exploits;
  - type: text
    content: Il écrasera nos ennemis.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 2 S 8:3, 13. 1 Ch 18:3, 12.
  - type: text
    content: Lorsqu’il fit la guerre aux Syriens de Mésopotamie et aux Syriens de Tsoba, et que Joab revint et battit dans la vallée du sel douze mille Édomites.
  '3':
  - type: text
    content: 'O Dieu! '
  - type: note
    content: Ps 44:10.
  - type: text
    content: tu nous as repoussés, dispersés,
  - type: text
    content: 'Tu t’es irrité: relève-nous!'
  '4':
  - type: text
    content: 'Tu as ébranlé la terre, tu l’as déchirée:'
  - type: text
    content: Répare ses brèches, car elle chancelle!
  '5':
  - type: text
    content: Tu as fait voir à ton peuple des choses dures,
  - type: text
    content: Tu nous as abreuvés d’un vin d’étourdissement.
  '6':
  - type: text
    content: Tu as donné à ceux qui te craignent une bannière,
  - type: text
    content: 'Pour qu’elle s’élève à cause de la vérité. '
  - type: text
    content: — Pause.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps 108:7, etc.
  - type: text
    content: Afin que tes bien-aimés soient délivrés,
  - type: text
    content: Sauve par ta droite, et exauce-nous!
  '8':
  - type: text
    content: 'Dieu a dit dans sa sainteté: Je triompherai,'
  - type: text
    content: Je partagerai Sichem, je mesurerai la vallée de Succoth;
  '9':
  - type: text
    content: A moi Galaad, à moi Manassé;
  - type: text
    content: Éphraïm est le rempart de ma tête,
  - type: text
    content: Et Juda, mon sceptre;
