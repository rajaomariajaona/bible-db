document_id: JOB.23,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Réponse de Job à Éliphaz
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-17: cf. (Job 32:2; 33:8-13.) Job 9. (Ps 18:22-24; 143:1-2. 1 Co 4:3, 4.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Job prit la parole et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Il sait néanmoins quelle voie j’ai suivie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et, s’il m’éprouvait, je sortirais pur comme l’or.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mon pied s’est attaché à ses pas;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 31:4, etc.
      marker-yv: yv-n
    - type: text
      text: J’ai gardé sa voie, et je ne m’en suis point détourné.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je n’ai pas abandonné les commandements de ses lèvres;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai fait plier ma volonté aux paroles de sa bouche.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mais sa résolution est arrêtée; qui s’y opposera?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 115:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ce que son âme désire, il l’exécute.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Il accomplira donc ses desseins à mon égard,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il en concevra bien d’autres encore.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Voilà pourquoi sa présence m’épouvante;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand j’y pense, j’ai peur de lui.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Dieu a brisé mon courage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Tout-Puissant m’a rempli d’effroi.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Car ce ne sont pas les ténèbres qui m’anéantissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n’est pas l’obscurité dont je suis couvert.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Maintenant encore ma plainte est une révolte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la souffrance étouffe mes soupirs.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Oh! Si je savais où le trouver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je pouvais arriver jusqu’à son trône,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Je plaiderais ma cause devant lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je remplirais ma bouche d’arguments,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Je connaîtrais ce qu’il peut avoir à répondre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je verrais ce qu’il peut avoir à me dire.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Emploierait-il toute sa force à me combattre?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne daignerait-il pas au moins m’écouter?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ce serait un homme droit qui plaiderait avec lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je serais pour toujours absous par mon juge.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mais, si je vais à l’orient, il n’y est pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je vais à l’occident, je ne le trouve pas;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Est-il occupé au nord, je ne puis le voir;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Se cache-t-il au midi, je ne puis le découvrir.
