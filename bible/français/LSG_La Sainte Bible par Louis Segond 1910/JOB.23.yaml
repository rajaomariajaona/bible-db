document_id: JOB.23,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse de Job à Éliphaz
  - type: heading
    content: 'V. 1-17: cf. (Job 32:2; 33:8-13.) Job 9. (Ps 18:22-24; 143:1-2. 1 Co 4:3, 4.)'
  - type: text
    content: 'Job prit la parole et dit:'
  '10':
  - type: text
    content: Il sait néanmoins quelle voie j’ai suivie;
  - type: text
    content: Et, s’il m’éprouvait, je sortirais pur comme l’or.
  '11':
  - type: text
    content: Mon pied s’est attaché à ses pas;
  - type: note
    content: Job 31:4, etc.
  - type: text
    content: J’ai gardé sa voie, et je ne m’en suis point détourné.
  '12':
  - type: text
    content: Je n’ai pas abandonné les commandements de ses lèvres;
  - type: text
    content: J’ai fait plier ma volonté aux paroles de sa bouche.
  '13':
  - type: text
    content: Mais sa résolution est arrêtée; qui s’y opposera?
  - type: note
    content: Ps 115:3.
  - type: text
    content: Ce que son âme désire, il l’exécute.
  '14':
  - type: text
    content: Il accomplira donc ses desseins à mon égard,
  - type: text
    content: Et il en concevra bien d’autres encore.
  '15':
  - type: text
    content: Voilà pourquoi sa présence m’épouvante;
  - type: text
    content: Quand j’y pense, j’ai peur de lui.
  '16':
  - type: text
    content: Dieu a brisé mon courage,
  - type: text
    content: Le Tout-Puissant m’a rempli d’effroi.
  '17':
  - type: text
    content: Car ce ne sont pas les ténèbres qui m’anéantissent,
  - type: text
    content: Ce n’est pas l’obscurité dont je suis couvert.
  '2':
  - type: text
    content: Maintenant encore ma plainte est une révolte,
  - type: text
    content: Mais la souffrance étouffe mes soupirs.
  '3':
  - type: text
    content: Oh! Si je savais où le trouver,
  - type: text
    content: Si je pouvais arriver jusqu’à son trône,
  '4':
  - type: text
    content: Je plaiderais ma cause devant lui,
  - type: text
    content: Je remplirais ma bouche d’arguments,
  '5':
  - type: text
    content: Je connaîtrais ce qu’il peut avoir à répondre,
  - type: text
    content: Je verrais ce qu’il peut avoir à me dire.
  '6':
  - type: text
    content: Emploierait-il toute sa force à me combattre?
  - type: text
    content: Ne daignerait-il pas au moins m’écouter?
  '7':
  - type: text
    content: Ce serait un homme droit qui plaiderait avec lui,
  - type: text
    content: Et je serais pour toujours absous par mon juge.
  '8':
  - type: text
    content: Mais, si je vais à l’orient, il n’y est pas;
  - type: text
    content: Si je vais à l’occident, je ne le trouve pas;
  '9':
  - type: text
    content: Est-il occupé au nord, je ne puis le voir;
  - type: text
    content: Se cache-t-il au midi, je ne puis le découvrir.
