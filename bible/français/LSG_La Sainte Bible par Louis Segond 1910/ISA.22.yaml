document_id: ISA.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie contre Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-14: cf. Pr 1:30-32. La 3:64-66.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Oracle sur la vallée des visions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’as-tu donc, que tout ton peuple monte sur les toits?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ville bruyante, pleine de tumulte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cité joyeuse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes morts ne périront pas par l’épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne mourront pas en combattant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tous tes chefs fuient ensemble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont faits prisonniers par les archers;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous tes habitants deviennent à la fois captifs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tandis qu’ils prennent au loin la fuite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'C’est pourquoi je dis: Détournez de moi les regards,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 9:1
      metadata:
        usfm: JER.9.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Laissez-moi pleurer amèrement;
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’insistez pas pour me consoler
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du désastre de la fille de mon peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Car c’est un jour de trouble, d’écrasement et de confusion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Envoyé par le Seigneur, l’Éternel des armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans la vallée des visions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On démolit les murailles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les cris de détresse retentissent vers la montagne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Élam porte le carquois;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des chars de combattants, des cavaliers, s’avancent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kir met à nu le bouclier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tes plus belles vallées sont remplies de chars,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les cavaliers se rangent en bataille à tes portes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les derniers retranchements de Juda sont forcés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et en ce jour tu visites les armures de la maison de la forêt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Vous regardez les brèches nombreuses faites à la ville de David,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous retenez les eaux de l’étang inférieur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Vous comptez les maisons de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous les abattez, pour fortifier la muraille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Vous faites un réservoir entre les deux murs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour les eaux de l’ancien étang.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais vous ne regardez pas vers celui qui a voulu ces choses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous ne voyez pas celui qui les a préparées de loin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le Seigneur, l’Éternel des armées, vous appelle en ce jour
- type: usfm
  marker: q1
  children:
  - type: text
    text: A pleurer et à vous frapper la poitrine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A vous raser la tête et à ceindre le sac.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 56:12
      metadata:
        usfm: ISA.56.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et voici de la gaîté et de la joie!
- type: usfm
  marker: q1
  children:
  - type: text
    text: On égorge des bœufs et l’on tue des brebis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'On mange de la viande et l’on boit du vin:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:32
      metadata:
        usfm: 1CO.15.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mangeons et buvons, car demain nous mourrons!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L’Éternel des armées me l’a révélé:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Non, ce crime ne vous sera point pardonné que vous ne soyez morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Seigneur, l’Éternel des armées.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-25: cf. Ps 75:5-9. Da 4:37.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel des armées:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Va vers ce courtisan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Vers Schebna, gouverneur du palais:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Qu’y a-t-il à toi ici, et qui as-tu ici,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tu creuses ici un sépulcre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il se creuse un sépulcre sur la hauteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il se taille une demeure dans le roc!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Voici, l’Éternel te lancera d’un jet vigoureux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il t’enveloppera comme une pelote,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il te fera rouler, rouler comme une balle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur une terre spacieuse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Là tu mourras, là seront tes chars magnifiques,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O toi, l’opprobre de la maison de ton maître!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Je te chasserai de ton poste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel t’arrachera de ta place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: En ce jour-là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'J’appellerai mon serviteur '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 18:18
      metadata:
        usfm: 2KI.18.18
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: 2KI.18.26
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '37'
      metadata:
        usfm: 2KI.18.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Éliakim, fils de Hilkija;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je le revêtirai de ta tunique, je le ceindrai de ta ceinture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je remettrai ton pouvoir entre ses mains;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il sera un père pour les habitants de Jérusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pour la maison de Juda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Je mettrai sur son épaule la clé de la maison de David:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand il ouvrira, nul ne fermera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand il fermera, nul n’ouvrira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Je l’enfoncerai comme un clou dans un lieu sûr,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il sera un siège de gloire pour la maison de son père.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Il sera le soutien de toute la gloire de la maison de son père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des rejetons nobles et ignobles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De tous les petits ustensiles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des bassins comme des vases.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: En ce jour, dit l’Éternel des armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le clou enfoncé dans un lieu sûr sera enlevé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il sera abattu et tombera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le fardeau qui était sur lui sera détruit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Éternel a parlé.
