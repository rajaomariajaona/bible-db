document_id: ISA.22,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie contre Jérusalem
  - type: heading
    content: 'V. 1-14: cf. Pr 1:30-32. La 3:64-66.'
  - type: text
    content: Oracle sur la vallée des visions.
  - type: text
    content: Qu’as-tu donc, que tout ton peuple monte sur les toits?
  '10':
  - type: text
    content: Vous comptez les maisons de Jérusalem,
  - type: text
    content: Et vous les abattez, pour fortifier la muraille.
  '11':
  - type: text
    content: Vous faites un réservoir entre les deux murs,
  - type: text
    content: Pour les eaux de l’ancien étang.
  - type: text
    content: Mais vous ne regardez pas vers celui qui a voulu ces choses,
  - type: text
    content: Vous ne voyez pas celui qui les a préparées de loin.
  '12':
  - type: text
    content: Le Seigneur, l’Éternel des armées, vous appelle en ce jour
  - type: text
    content: A pleurer et à vous frapper la poitrine,
  - type: text
    content: A vous raser la tête et à ceindre le sac.
  '13':
  - type: text
    content: ' '
  - type: note
    content: És 56:12.
  - type: text
    content: Et voici de la gaîté et de la joie!
  - type: text
    content: On égorge des bœufs et l’on tue des brebis,
  - type: text
    content: 'On mange de la viande et l’on boit du vin:'
  - type: note
    content: 1 Co 15:32.
  - type: text
    content: Mangeons et buvons, car demain nous mourrons!
  '14':
  - type: text
    content: 'L’Éternel des armées me l’a révélé:'
  - type: text
    content: Non, ce crime ne vous sera point pardonné que vous ne soyez morts,
  - type: text
    content: Dit le Seigneur, l’Éternel des armées.
  - type: heading
    content: 'V. 15-25: cf. Ps 75:5-9. Da 4:37.'
  '15':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel des armées:'
  - type: text
    content: Va vers ce courtisan,
  - type: text
    content: 'Vers Schebna, gouverneur du palais:'
  '16':
  - type: text
    content: Qu’y a-t-il à toi ici, et qui as-tu ici,
  - type: text
    content: Que tu creuses ici un sépulcre?
  - type: text
    content: Il se creuse un sépulcre sur la hauteur,
  - type: text
    content: Il se taille une demeure dans le roc!
  '17':
  - type: text
    content: Voici, l’Éternel te lancera d’un jet vigoureux;
  - type: text
    content: Il t’enveloppera comme une pelote,
  '18':
  - type: text
    content: Il te fera rouler, rouler comme une balle,
  - type: text
    content: Sur une terre spacieuse;
  - type: text
    content: Là tu mourras, là seront tes chars magnifiques,
  - type: text
    content: O toi, l’opprobre de la maison de ton maître!
  '19':
  - type: text
    content: Je te chasserai de ton poste,
  - type: text
    content: L’Éternel t’arrachera de ta place.
  '2':
  - type: text
    content: Ville bruyante, pleine de tumulte,
  - type: text
    content: Cité joyeuse!
  - type: text
    content: Tes morts ne périront pas par l’épée,
  - type: text
    content: Ils ne mourront pas en combattant.
  '20':
  - type: text
    content: En ce jour-là,
  - type: text
    content: 'J’appellerai mon serviteur '
  - type: note
    content: 2 R 18:18, 26, 37.
  - type: text
    content: Éliakim, fils de Hilkija;
  '21':
  - type: text
    content: Je le revêtirai de ta tunique, je le ceindrai de ta ceinture,
  - type: text
    content: Et je remettrai ton pouvoir entre ses mains;
  - type: text
    content: Il sera un père pour les habitants de Jérusalem
  - type: text
    content: Et pour la maison de Juda.
  '22':
  - type: text
    content: 'Je mettrai sur son épaule la clé de la maison de David:'
  - type: text
    content: Quand il ouvrira, nul ne fermera;
  - type: text
    content: Quand il fermera, nul n’ouvrira.
  '23':
  - type: text
    content: Je l’enfoncerai comme un clou dans un lieu sûr,
  - type: text
    content: Et il sera un siège de gloire pour la maison de son père.
  '24':
  - type: text
    content: Il sera le soutien de toute la gloire de la maison de son père,
  - type: text
    content: Des rejetons nobles et ignobles,
  - type: text
    content: De tous les petits ustensiles,
  - type: text
    content: Des bassins comme des vases.
  '25':
  - type: text
    content: En ce jour, dit l’Éternel des armées,
  - type: text
    content: Le clou enfoncé dans un lieu sûr sera enlevé,
  - type: text
    content: Il sera abattu et tombera,
  - type: text
    content: Et le fardeau qui était sur lui sera détruit,
  - type: text
    content: Car l’Éternel a parlé.
  '3':
  - type: text
    content: Tous tes chefs fuient ensemble,
  - type: text
    content: Ils sont faits prisonniers par les archers;
  - type: text
    content: Tous tes habitants deviennent à la fois captifs,
  - type: text
    content: Tandis qu’ils prennent au loin la fuite.
  '4':
  - type: text
    content: 'C’est pourquoi je dis: Détournez de moi les regards,'
  - type: note
    content: Jé 9:1.
  - type: text
    content: Laissez-moi pleurer amèrement;
  - type: text
    content: N’insistez pas pour me consoler
  - type: text
    content: Du désastre de la fille de mon peuple.
  '5':
  - type: text
    content: Car c’est un jour de trouble, d’écrasement et de confusion,
  - type: text
    content: Envoyé par le Seigneur, l’Éternel des armées,
  - type: text
    content: Dans la vallée des visions.
  - type: text
    content: On démolit les murailles,
  - type: text
    content: Et les cris de détresse retentissent vers la montagne.
  '6':
  - type: text
    content: Élam porte le carquois;
  - type: text
    content: Des chars de combattants, des cavaliers, s’avancent;
  - type: text
    content: Kir met à nu le bouclier.
  '7':
  - type: text
    content: Tes plus belles vallées sont remplies de chars,
  - type: text
    content: Et les cavaliers se rangent en bataille à tes portes.
  '8':
  - type: text
    content: Les derniers retranchements de Juda sont forcés,
  - type: text
    content: Et en ce jour tu visites les armures de la maison de la forêt.
  '9':
  - type: text
    content: Vous regardez les brèches nombreuses faites à la ville de David,
  - type: text
    content: Et vous retenez les eaux de l’étang inférieur.
