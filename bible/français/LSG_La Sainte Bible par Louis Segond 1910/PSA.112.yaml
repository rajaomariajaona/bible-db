document_id: PSA.112,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 1; 128. Pr 14:26, 27.
  - type: text
    content: Louez l’Éternel!
  - type: note
    content: Ps 1:1, 2.
  - type: text
    content: Heureux l’homme qui craint l’Éternel,
  - type: text
    content: Qui trouve un grand plaisir à ses commandements.
  '10':
  - type: text
    content: Le méchant le voit et s’irrite,
  - type: text
    content: Il grince les dents et se consume;
  - type: text
    content: Les désirs des méchants périssent.
  '2':
  - type: text
    content: Sa postérité sera puissante sur la terre,
  - type: text
    content: La génération des hommes droits sera bénie.
  '3':
  - type: text
    content: Il a dans sa maison bien-être et richesse,
  - type: text
    content: Et sa justice subsiste à jamais.
  '4':
  - type: text
    content: La lumière se lève dans les ténèbres pour les hommes droits,
  - type: text
    content: Pour celui qui est miséricordieux, compatissant et juste.
  '5':
  - type: text
    content: Heureux l’homme qui exerce la miséricorde et qui prête,
  - type: text
    content: Qui règle ses actions d’après la justice!
  '6':
  - type: text
    content: Car il ne chancelle jamais;
  - type: text
    content: La mémoire du juste dure toujours.
  '7':
  - type: text
    content: Il ne craint point les mauvaises nouvelles;
  - type: text
    content: Son cœur est ferme, confiant en l’Éternel.
  '8':
  - type: text
    content: Son cœur est affermi; il n’a point de crainte,
  - type: text
    content: Jusqu’à ce qu’il mette son plaisir à regarder ses adversaires.
  '9':
  - type: text
    content: Il fait des largesses, il donne aux indigents;
  - type: text
    content: Sa justice subsiste à jamais;
  - type: text
    content: Sa tête s’élève avec gloire,
