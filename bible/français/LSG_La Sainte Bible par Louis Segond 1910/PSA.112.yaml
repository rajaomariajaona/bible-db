document_id: PSA.112
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 1; 128. Pr 14:26, 27.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louez l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 1:1
      metadata:
        usfm: PSA.1.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: PSA.1.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Heureux l’homme qui craint l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui trouve un grand plaisir à ses commandements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sa postérité sera puissante sur la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La génération des hommes droits sera bénie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il a dans sa maison bien-être et richesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa justice subsiste à jamais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: La lumière se lève dans les ténèbres pour les hommes droits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour celui qui est miséricordieux, compatissant et juste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Heureux l’homme qui exerce la miséricorde et qui prête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui règle ses actions d’après la justice!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Car il ne chancelle jamais;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La mémoire du juste dure toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il ne craint point les mauvaises nouvelles;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son cœur est ferme, confiant en l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Son cœur est affermi; il n’a point de crainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à ce qu’il mette son plaisir à regarder ses adversaires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il fait des largesses, il donne aux indigents;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa justice subsiste à jamais;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa tête s’élève avec gloire,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le méchant le voit et s’irrite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il grince les dents et se consume;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les désirs des méchants périssent.
