document_id: DEU.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La terre promise et la reconnaissance envers Dieu
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-20: cf. De 11:1-17; 32:7-26. Ps 105:5, 6. És 63:7-14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Vous observerez et vous mettrez en pratique tous les commandements que je vous prescris aujourd’hui, afin que vous viviez, que vous multipliiez, et que vous entriez en possession du pays que l’Éternel a juré de donner à vos pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Souviens-toi de tout le chemin que l’Éternel, ton Dieu, t’a fait faire pendant ces quarante années dans le désert, afin de t’humilier et de t’éprouver, pour savoir quelles étaient les dispositions de ton cœur et si tu garderais ou non ses commandements. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il t’a humilié, il t’a fait souffrir de la faim, et il t’a nourri de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 16:14
      metadata:
        usfm: EXO.16.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: EXO.16.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la manne, que tu ne connaissais pas et que n’avaient pas connue tes pères, afin de t’apprendre '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 4:4
      metadata:
        usfm: MAT.4.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:4
      metadata:
        usfm: LUK.4.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que l’homme ne vit pas de pain seulement, mais que l’homme vit de tout ce qui sort de la bouche de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 29:5
      metadata:
        usfm: DEU.29.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Né 9:21
      metadata:
        usfm: NEH.9.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ton vêtement ne s’est point usé sur toi, et ton pied ne s’est point enflé, pendant ces quarante années. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Reconnais en ton cœur que l’Éternel, ton Dieu, te châtie comme un homme châtie son enfant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu observeras les commandements de l’Éternel, ton Dieu, pour marcher dans ses voies et pour le craindre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Car l’Éternel, ton Dieu, va te faire entrer dans un bon pays, pays de cours d’eaux, de sources et de lacs, qui jaillissent dans les vallées et dans les montagnes; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'pays de froment, d’orge, de vignes, de figuiers et de grenadiers; pays d’oliviers et de miel; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'pays où tu mangeras du pain avec abondance, où tu ne manqueras de rien; pays dont les pierres sont du fer, et des montagnes duquel tu tailleras l’airain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 6:11
      metadata:
        usfm: DEU.6.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: DEU.6.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque tu mangeras et te rassasieras, tu béniras l’Éternel, ton Dieu, pour le bon pays qu’il t’a donné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Garde-toi d’oublier l’Éternel, ton Dieu, au point de ne pas observer ses commandements, ses ordonnances et ses lois, que je te prescris aujourd’hui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsque tu mangeras et te rassasieras, lorsque tu bâtiras et habiteras de belles maisons, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'lorsque tu verras multiplier ton gros et ton menu bétail, s’augmenter ton argent et ton or, et s’accroître tout ce qui est à toi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'prends garde que ton cœur ne s’enfle, et que tu n’oublies l’Éternel, ton Dieu, qui t’a fait sortir du pays d’Égypte, de la maison de servitude, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'qui t’a fait marcher dans ce grand et affreux désert, où il y a des serpents brûlants et des scorpions, dans des lieux arides et sans eau, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 17:6
      metadata:
        usfm: EXO.17.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 20:11
      metadata:
        usfm: NUM.20.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:15
      metadata:
        usfm: PSA.78.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 114:8
      metadata:
        usfm: PSA.114.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui a fait jaillir pour toi de l’eau du rocher le plus dur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'qui t’a fait manger dans le désert '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 16:14
      metadata:
        usfm: EXO.16.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: EXO.16.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la manne inconnue à tes pères, afin de t’humilier et de t’éprouver, pour te faire ensuite du bien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Garde-toi de dire en ton cœur: Ma force et la puissance de ma main m’ont acquis ces richesses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Souviens-toi de l’Éternel, ton Dieu, car c’est lui qui te donnera de la force pour les acquérir, afin de confirmer, comme il le fait aujourd’hui, son alliance qu’il a jurée à tes pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Si tu oublies l’Éternel, ton Dieu, et que tu ailles après d’autres dieux, si tu les sers et te prosternes devant eux, je vous déclare formellement aujourd’hui que vous périrez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Vous périrez comme les nations que l’Éternel fait périr devant vous, parce que vous n’aurez point écouté la voix de l’Éternel, votre Dieu.
