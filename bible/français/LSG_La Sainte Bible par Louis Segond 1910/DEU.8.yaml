document_id: DEU.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La terre promise et la reconnaissance envers Dieu
  - type: heading
    content: 'V. 1-20: cf. De 11:1-17; 32:7-26. Ps 105:5, 6. És 63:7-14.'
  - type: text
    content: 'Vous observerez et vous mettrez en pratique tous les commandements que je vous prescris aujourd’hui, afin que vous viviez, que vous multipliiez, et que vous entriez en possession du pays que l’Éternel a juré de donner à vos pères. '
  '10':
  - type: note
    content: De 6:11, 12.
  - type: text
    content: 'Lorsque tu mangeras et te rassasieras, tu béniras l’Éternel, ton Dieu, pour le bon pays qu’il t’a donné. '
  '11':
  - type: text
    content: 'Garde-toi d’oublier l’Éternel, ton Dieu, au point de ne pas observer ses commandements, ses ordonnances et ses lois, que je te prescris aujourd’hui. '
  '12':
  - type: text
    content: 'Lorsque tu mangeras et te rassasieras, lorsque tu bâtiras et habiteras de belles maisons, '
  '13':
  - type: text
    content: 'lorsque tu verras multiplier ton gros et ton menu bétail, s’augmenter ton argent et ton or, et s’accroître tout ce qui est à toi, '
  '14':
  - type: text
    content: 'prends garde que ton cœur ne s’enfle, et que tu n’oublies l’Éternel, ton Dieu, qui t’a fait sortir du pays d’Égypte, de la maison de servitude, '
  '15':
  - type: text
    content: 'qui t’a fait marcher dans ce grand et affreux désert, où il y a des serpents brûlants et des scorpions, dans des lieux arides et sans eau, et '
  - type: note
    content: Ex 17:6. No 20:11. Ps 78:15; 114:8.
  - type: text
    content: 'qui a fait jaillir pour toi de l’eau du rocher le plus dur, '
  '16':
  - type: text
    content: 'qui t’a fait manger dans le désert '
  - type: note
    content: Ex 16:14, 15.
  - type: text
    content: 'la manne inconnue à tes pères, afin de t’humilier et de t’éprouver, pour te faire ensuite du bien. '
  '17':
  - type: text
    content: 'Garde-toi de dire en ton cœur: Ma force et la puissance de ma main m’ont acquis ces richesses. '
  '18':
  - type: text
    content: 'Souviens-toi de l’Éternel, ton Dieu, car c’est lui qui te donnera de la force pour les acquérir, afin de confirmer, comme il le fait aujourd’hui, son alliance qu’il a jurée à tes pères. '
  '19':
  - type: text
    content: 'Si tu oublies l’Éternel, ton Dieu, et que tu ailles après d’autres dieux, si tu les sers et te prosternes devant eux, je vous déclare formellement aujourd’hui que vous périrez. '
  '2':
  - type: text
    content: 'Souviens-toi de tout le chemin que l’Éternel, ton Dieu, t’a fait faire pendant ces quarante années dans le désert, afin de t’humilier et de t’éprouver, pour savoir quelles étaient les dispositions de ton cœur et si tu garderais ou non ses commandements. '
  '20':
  - type: text
    content: Vous périrez comme les nations que l’Éternel fait périr devant vous, parce que vous n’aurez point écouté la voix de l’Éternel, votre Dieu.
  '3':
  - type: text
    content: 'Il t’a humilié, il t’a fait souffrir de la faim, et il t’a nourri de '
  - type: note
    content: Ex 16:14, 15.
  - type: text
    content: 'la manne, que tu ne connaissais pas et que n’avaient pas connue tes pères, afin de t’apprendre '
  - type: note
    content: Mt 4:4. Lu 4:4.
  - type: text
    content: 'que l’homme ne vit pas de pain seulement, mais que l’homme vit de tout ce qui sort de la bouche de l’Éternel. '
  '4':
  - type: note
    content: De 29:5. Né 9:21.
  - type: text
    content: 'Ton vêtement ne s’est point usé sur toi, et ton pied ne s’est point enflé, pendant ces quarante années. '
  '5':
  - type: text
    content: 'Reconnais en ton cœur que l’Éternel, ton Dieu, te châtie comme un homme châtie son enfant. '
  '6':
  - type: text
    content: 'Tu observeras les commandements de l’Éternel, ton Dieu, pour marcher dans ses voies et pour le craindre. '
  '7':
  - type: text
    content: 'Car l’Éternel, ton Dieu, va te faire entrer dans un bon pays, pays de cours d’eaux, de sources et de lacs, qui jaillissent dans les vallées et dans les montagnes; '
  '8':
  - type: text
    content: 'pays de froment, d’orge, de vignes, de figuiers et de grenadiers; pays d’oliviers et de miel; '
  '9':
  - type: text
    content: 'pays où tu mangeras du pain avec abondance, où tu ne manqueras de rien; pays dont les pierres sont du fer, et des montagnes duquel tu tailleras l’airain. '
