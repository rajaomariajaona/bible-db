document_id: ZEC.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le chandelier d’or et les deux oliviers
  - type: heading
    content: 'V. 1-14: cf. (Ex 25:31-40. Ap 1:12, 13, 20; 11:3, 4.) Esd 6.'
  - type: text
    content: 'L’ange qui parlait avec moi revint, et il me réveilla comme un homme que l’on réveille de son sommeil. '
  '10':
  - type: text
    content: 'Car ceux qui méprisaient le jour des faibles commencements se réjouiront en voyant le niveau dans la main de Zorobabel. Ces sept sont les yeux de l’Éternel, qui parcourent toute la terre. '
  '11':
  - type: text
    content: 'Je pris la parole et je lui dis: Que signifient ces deux oliviers, à la droite du chandelier et à sa gauche? '
  '12':
  - type: text
    content: 'Je pris une seconde fois la parole, et je lui dis: Que signifient les deux rameaux d’olivier, qui sont près des deux conduits d’or d’où découle l’or? '
  '13':
  - type: text
    content: 'Il me répondit: Ne sais-tu pas ce qu’ils signifient? Je dis: Non, mon seigneur. '
  '14':
  - type: text
    content: 'Et il dit: Ce sont les deux oints qui se tiennent devant le Seigneur de toute la terre.'
  '2':
  - type: text
    content: 'Il me dit: Que vois-tu? Je répondis: Je regarde, et voici, il y a un chandelier tout d’or, surmonté d’un vase et portant sept lampes, avec sept conduits pour les lampes qui sont au sommet du chandelier; '
  '3':
  - type: text
    content: 'et il y a près de lui deux oliviers, l’un à la droite du vase, et l’autre à sa gauche. '
  '4':
  - type: text
    content: 'Et reprenant la parole, je dis à l’ange qui parlait avec moi: Que signifient ces choses, mon seigneur? '
  '5':
  - type: text
    content: 'L’ange qui parlait avec moi me répondit: Ne sais-tu pas ce que signifient ces choses? Je dis: Non, mon seigneur. '
  '6':
  - type: text
    content: 'Alors il reprit et me dit: C’est ici la parole que l’Éternel adresse à Zorobabel: Ce n’est ni par la puissance ni par la force, mais c’est par mon esprit, dit l’Éternel des armées. '
  '7':
  - type: text
    content: 'Qui es-tu, grande montagne, devant Zorobabel? Tu seras aplanie. Il posera la pierre principale au milieu des acclamations: Grâce, grâce pour elle! '
  '8':
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '9':
  - type: text
    content: 'Les mains de Zorobabel ont fondé cette maison, et ses mains l’achèveront; et tu sauras que l’Éternel des armées m’a envoyé vers vous. '
