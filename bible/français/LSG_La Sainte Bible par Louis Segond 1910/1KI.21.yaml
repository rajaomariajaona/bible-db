document_id: 1KI.21,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La vigne de Naboth. — Conduite criminelle d’Achab et de sa femme Jézabel
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-16: cf. Mi 2:1-3. Ec 3:16, 17.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Après ces choses, voici ce qui arriva. Naboth, de Jizreel, avait une vigne à Jizreel, à côté du palais d’Achab, roi de Samarie. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'et mettez en face de lui deux méchants hommes qui déposeront ainsi contre lui: Tu as maudit Dieu et le roi! Puis menez-le dehors, lapidez-le, et qu’il meure. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Les gens de la ville de Naboth, les anciens et les magistrats qui habitaient dans la ville, agirent comme Jézabel le leur avait fait dire, d’après ce qui était écrit dans les lettres qu’elle leur avait envoyées. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ils publièrent un jeûne, et ils placèrent Naboth à la tête du peuple; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'les deux méchants hommes vinrent se mettre en face de lui, et ces méchants hommes déposèrent ainsi devant le peuple contre Naboth: Naboth a maudit Dieu et le roi! Puis ils le menèrent hors de la ville, ils le lapidèrent, et il mourut. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et ils envoyèrent dire à Jézabel: Naboth a été lapidé, et il est mort. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Lorsque Jézabel apprit que Naboth avait été lapidé et qu’il était mort, elle dit à Achab: Lève-toi, prends possession de la vigne de Naboth de Jizreel, qui a refusé de te la céder pour de l’argent; car Naboth n’est plus en vie, il est mort. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Achab, entendant que Naboth était mort, se leva pour descendre à la vigne de Naboth de Jizreel, afin d’en prendre possession.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-26: cf. (Ps 7:12-17. És 3:11.) (1 R 22:30-38. 2 R 9:6-37; 10:1-11.)'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Alors la parole de l’Éternel fut adressée à Élie, le Thischbite, en ces mots: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Lève-toi, descends au-devant d’Achab, roi d’Israël à Samarie; le voilà dans la vigne de Naboth, où il est descendu pour en prendre possession. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tu lui diras: Ainsi parle l’Éternel: N’es-tu pas un assassin et un voleur? Et tu lui diras: Ainsi parle l’Éternel: Au lieu même où les chiens ont léché le sang de Naboth, les chiens lécheront aussi ton propre sang. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Et Achab parla ainsi à Naboth: Cède-moi ta vigne, pour que j’en fasse un jardin potager, car elle est tout près de ma maison. Je te donnerai à la place une vigne meilleure; ou, si cela te convient, je te paierai la valeur en argent. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Achab dit à Élie: M’as-tu trouvé, mon ennemi? Et il répondit: Je t’ai trouvé, parce que tu t’es vendu pour faire ce qui est mal aux yeux de l’Éternel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 9:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Voici, je vais faire venir le malheur sur toi; je te balaierai, j’exterminerai quiconque appartient à Achab, celui qui est esclave et celui qui est libre en Israël, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'et je rendrai ta maison '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 15:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'semblable à la maison de Jéroboam, fils de Nebath, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 16:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à la maison de Baescha, fils d’Achija, parce que tu m’as irrité et que tu as fait pécher Israël. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'L’Éternel parle aussi sur '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 9:35
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '36'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '37'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jézabel, et il dit: Les chiens mangeront Jézabel près du rempart de Jizreel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Celui de la maison d’Achab qui mourra dans la ville sera mangé par les chiens, et celui qui mourra dans les champs sera mangé par les oiseaux du ciel. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 16:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il n’y a eu personne qui se soit vendu comme Achab pour faire ce qui est mal aux yeux de l’Éternel, et Jézabel, sa femme, l’y excitait. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Il a agi de la manière la plus abominable, en allant après les idoles, comme le faisaient les Amoréens, que l’Éternel chassa devant les enfants d’Israël.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 27-29: cf. Jé 23:29. Ps 78:34-38. Jon 3:4-10. És 66:2.'
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Après avoir entendu les paroles d’Élie, Achab déchira ses vêtements, il mit un sac sur son corps, et il jeûna; il couchait avec ce sac, et il marchait lentement. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Et la parole de l’Éternel fut adressée à Élie, le Thischbite, en ces mots: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: As-tu vu comment Achab s’est humilié devant moi? Parce qu’il s’est humilié devant moi, je ne ferai pas venir le malheur pendant sa vie; ce sera pendant la vie de son fils que je ferai venir le malheur sur sa maison.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mais Naboth répondit à Achab: Que l’Éternel me garde de te donner l’héritage de mes pères! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Achab rentra dans sa maison, triste et irrité, à cause de cette parole que lui avait dite Naboth de Jizreel: Je ne te donnerai pas l’héritage de mes pères! Et il se coucha sur son lit, détourna le visage, et ne mangea rien. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Jézabel, sa femme, vint auprès de lui, et lui dit: Pourquoi as-tu l’esprit triste et ne manges-tu point? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il lui répondit: J’ai parlé à Naboth de Jizreel, et je lui ai dit: Cède-moi ta vigne pour de l’argent; ou, si tu veux, je te donnerai une autre vigne à la place. Mais il a dit: Je ne te donnerai pas ma vigne! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Alors Jézabel, sa femme, lui dit: Est-ce bien toi maintenant qui exerces la souveraineté sur Israël? Lève-toi, prends de la nourriture, et que ton cœur se réjouisse; moi, je te donnerai la vigne de Naboth de Jizreel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Et elle écrivit au nom d’Achab des lettres qu’elle scella du sceau d’Achab, et qu’elle envoya aux anciens et aux magistrats qui habitaient avec Naboth dans sa ville. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Voici ce qu’elle écrivit dans ces lettres: Publiez un jeûne; placez Naboth à la tête du peuple, '
