document_id: NUM.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Arrangement des lampes
  - type: heading
    content: 'V. 1-4: cf. Ex 25:31-40; 27:20, 21. (Jn 8:12.)'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: text
    content: 'Tu feras approcher les Lévites devant l’Éternel; et les enfants d’Israël poseront leurs mains sur les Lévites. '
  '11':
  - type: text
    content: 'Aaron fera tourner de côté et d’autre les Lévites devant l’Éternel, comme une offrande de la part des enfants d’Israël; et ils seront consacrés au service de l’Éternel. '
  '12':
  - type: text
    content: 'Les Lévites poseront leurs mains sur la tête des taureaux; et tu offriras l’un en sacrifice d’expiation, et l’autre en holocauste, afin de faire l’expiation pour les Lévites. '
  '13':
  - type: text
    content: 'Tu feras tenir les Lévites debout devant Aaron et devant ses fils, et tu les feras tourner de côté et d’autre comme une offrande à l’Éternel. '
  '14':
  - type: text
    content: 'Tu sépareras les Lévites du milieu des enfants d’Israël; et les Lévites '
  - type: note
    content: No 3:45.
  - type: text
    content: 'm’appartiendront. '
  '15':
  - type: text
    content: 'Après cela, les Lévites viendront faire le service dans la tente d’assignation. C’est ainsi que tu les purifieras, et que tu les feras tourner de côté et d’autre comme une offrande. '
  '16':
  - type: text
    content: 'Car ils me sont entièrement donnés du milieu des enfants d’Israël: je les ai pris pour moi à la place des premiers-nés, de tous les premiers-nés des enfants d’Israël. '
  '17':
  - type: text
    content: 'Car '
  - type: note
    content: No 3:13. Ex 13:2; 22:29; 34:19. Lé 27:26. Lu 2:23.
  - type: text
    content: 'tout premier-né des enfants d’Israël m’appartient, tant des hommes que des animaux; le jour où j’ai frappé tous les premiers-nés dans le pays d’Égypte, je me les suis consacrés. '
  '18':
  - type: note
    content: No 3:12.
  - type: text
    content: 'Et j’ai pris les Lévites à la place de tous les premiers-nés des enfants d’Israël. '
  '19':
  - type: text
    content: 'J’ai donné les Lévites entièrement à Aaron et à ses fils, du milieu des enfants d’Israël, pour qu’ils fassent le service des enfants d’Israël dans la tente d’assignation, pour qu’ils fassent l’expiation pour les enfants d’Israël, et pour que les enfants d’Israël ne soient frappés d’aucune plaie, en s’approchant du sanctuaire. '
  '2':
  - type: text
    content: 'Parle à Aaron, et tu lui diras: Lorsque tu placeras les lampes sur le chandelier, '
  - type: note
    content: Ex 25:37.
  - type: text
    content: 'les sept lampes devront éclairer en face. '
  '20':
  - type: text
    content: 'Moïse, Aaron et toute l’assemblée des enfants d’Israël, firent à l’égard des Lévites tout ce que l’Éternel avait ordonné à Moïse touchant les Lévites; ainsi firent à leur égard les enfants d’Israël. '
  '21':
  - type: text
    content: 'Les Lévites se purifièrent, et lavèrent leurs vêtements; Aaron les fit tourner de côté et d’autre comme une offrande devant l’Éternel, et il fit l’expiation pour eux, afin de les purifier. '
  '22':
  - type: text
    content: Après cela, les Lévites vinrent faire leur service dans la tente d’assignation, en présence d’Aaron et de ses fils, selon ce que l’Éternel avait ordonné à Moïse touchant les Lévites; ainsi fut-il fait à leur égard.
  - type: heading
    content: 'V. 23-26: cf. 1 Ch 23:24-32.'
  '23':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '24':
  - type: text
    content: 'Voici ce qui concerne les Lévites. Depuis l’âge de vingt-cinq ans et au-dessus, tout Lévite entrera au service de la tente d’assignation pour y exercer une fonction. '
  '25':
  - type: text
    content: 'Depuis l’âge de cinquante ans, il sortira de fonction, et ne servira plus. '
  '26':
  - type: text
    content: Il aidera ses frères dans la tente d’assignation, pour garder ce qui est remis à leurs soins; mais il ne fera plus de service. Tu agiras ainsi à l’égard des Lévites pour ce qui concerne leurs fonctions.
  '3':
  - type: text
    content: 'Aaron fit ainsi; il plaça les lampes sur le devant du chandelier, comme l’Éternel l’avait ordonné à Moïse. '
  '4':
  - type: text
    content: 'Le chandelier était '
  - type: note
    content: Ex 25:37.
  - type: text
    content: d’or battu; jusqu’à son pied, jusqu’à ses fleurs, il était d’or battu; Moïse avait fait le chandelier d’après le modèle que l’Éternel lui avait montré.
  - type: heading
    content: Consécration des Lévites
  - type: heading
    content: 'V. 5-22: cf. No 3:5-51. Lé 8.'
  '5':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '6':
  - type: text
    content: 'Prends les Lévites du milieu des enfants d’Israël, et purifie-les. '
  '7':
  - type: text
    content: 'Voici comment tu les purifieras. Fais sur eux une aspersion d’eau expiatoire; qu’ils fassent passer le rasoir sur tout leur corps, qu’ils lavent leurs vêtements, et qu’ils se purifient. '
  '8':
  - type: text
    content: 'Ils prendront ensuite un jeune taureau, avec l’offrande ordinaire de fleur de farine pétrie à l’huile; et tu prendras un autre jeune taureau pour le sacrifice d’expiation. '
  '9':
  - type: text
    content: 'Tu feras approcher les Lévites devant la tente d’assignation, et tu convoqueras toute l’assemblée des enfants d’Israël. '
