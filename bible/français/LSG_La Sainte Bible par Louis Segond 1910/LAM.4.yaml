document_id: LAM.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Lamentations sur le sort du peuple
  - type: heading
    content: 'V. 1-22: cf. La 1; 2. (Ro 2:1-6. Ga 6:7.)'
  - type: text
    content: Eh quoi! L’or a perdu son éclat!
  - type: text
    content: L’or pur est altéré!
  - type: text
    content: Les pierres du sanctuaire sont dispersées
  - type: text
    content: Aux coins de toutes les rues!
  '10':
  - type: text
    content: Les femmes, malgré leur tendresse,
  - type: text
    content: Font cuire leurs enfants;
  - type: text
    content: Ils leur servent de nourriture,
  - type: text
    content: Au milieu du désastre de la fille de mon peuple.
  '11':
  - type: text
    content: L’Éternel a épuisé sa fureur,
  - type: text
    content: Il a répandu son ardente colère;
  - type: text
    content: Il a allumé dans Sion un feu
  - type: text
    content: Qui en dévore les fondements.
  '12':
  - type: text
    content: Les rois de la terre n’auraient pas cru,
  - type: text
    content: Aucun des habitants du monde n’aurait cru
  - type: text
    content: Que l’adversaire, que l’ennemi entrerait
  - type: text
    content: Dans les portes de Jérusalem.
  '13':
  - type: text
    content: Voilà le fruit des péchés de ses prophètes,
  - type: text
    content: Des iniquités de ses sacrificateurs,
  - type: text
    content: Qui ont répandu dans son sein
  - type: text
    content: Le sang des justes!
  '14':
  - type: text
    content: Ils erraient en aveugles dans les rues,
  - type: text
    content: Souillés de sang;
  - type: text
    content: On ne pouvait
  - type: text
    content: Toucher leurs vêtements.
  '15':
  - type: text
    content: Éloignez-vous, impurs! Leur criait-on,
  - type: text
    content: Éloignez-vous, éloignez-vous, ne nous touchez pas!
  - type: text
    content: Ils sont en fuite, ils errent çà et là;
  - type: text
    content: 'On dit parmi les nations: Ils n’auront plus leur demeure!'
  '16':
  - type: text
    content: L’Éternel les a dispersés dans sa colère,
  - type: text
    content: Il ne tourne plus les regards vers eux;
  - type: text
    content: On n’a eu ni respect pour les sacrificateurs,
  - type: text
    content: Ni pitié pour les vieillards.
  '17':
  - type: text
    content: Nos yeux se consumaient encore,
  - type: text
    content: Et nous attendions vainement du secours;
  - type: note
    content: Éz 29:16.
  - type: text
    content: Nos regards se portaient avec espérance
  - type: text
    content: Vers une nation qui ne nous a pas délivrés.
  '18':
  - type: text
    content: On épiait nos pas,
  - type: text
    content: Pour nous empêcher d’aller sur nos places;
  - type: text
    content: Notre fin s’approchait, nos jours étaient accomplis…
  - type: text
    content: Notre fin est arrivée!
  '19':
  - type: text
    content: Nos persécuteurs étaient plus légers
  - type: text
    content: Que les aigles du ciel;
  - type: text
    content: Ils nous ont poursuivis sur les montagnes,
  - type: text
    content: Ils nous ont dressé des embûches dans le désert.
  '2':
  - type: text
    content: Les nobles fils de Sion,
  - type: text
    content: Estimés à l’égal de l’or pur,
  - type: text
    content: Sont regardés, hélas! Comme des vases de terre,
  - type: text
    content: Ouvrage des mains du potier!
  '20':
  - type: text
    content: Celui qui nous faisait respirer, l’oint de l’Éternel,
  - type: text
    content: A été pris dans leurs fosses,
  - type: text
    content: 'Lui de qui nous disions:'
  - type: text
    content: Nous vivrons sous son ombre parmi les nations.
  '21':
  - type: text
    content: Réjouis-toi, tressaille d’allégresse, fille d’Édom,
  - type: text
    content: Habitante du pays d’Uts!
  - type: text
    content: Vers toi aussi passera la coupe;
  - type: text
    content: Tu t’enivreras, et tu seras mise à nu.
  '22':
  - type: text
    content: Fille de Sion, ton iniquité est expiée;
  - type: text
    content: Il ne t’enverra plus en captivité.
  - type: text
    content: Fille d’Édom, il châtiera ton iniquité,
  - type: text
    content: Il mettra tes péchés à découvert.
  '3':
  - type: text
    content: Les chacals mêmes présentent la mamelle,
  - type: text
    content: Et allaitent leurs petits;
  - type: text
    content: Mais la fille de mon peuple est devenue cruelle
  - type: text
    content: Comme les autruches du désert.
  '4':
  - type: text
    content: La langue du nourrisson s’attache à son palais,
  - type: text
    content: Desséchée par la soif;
  - type: text
    content: Les enfants demandent du pain,
  - type: text
    content: Et personne ne leur en donne.
  '5':
  - type: text
    content: Ceux qui se nourrissaient de mets délicats
  - type: text
    content: Périssent dans les rues;
  - type: text
    content: Ceux qui étaient élevés dans la pourpre
  - type: text
    content: Embrassent les fumiers.
  '6':
  - type: text
    content: Le châtiment de la fille de mon peuple est plus grand
  - type: text
    content: Que celui de Sodome,
  - type: text
    content: Détruite en un instant,
  - type: text
    content: Sans que personne ait porté la main sur elle.
  '7':
  - type: text
    content: Ses princes étaient plus éclatants que la neige,
  - type: text
    content: Plus blancs que le lait;
  - type: text
    content: Ils avaient le teint plus vermeil que le corail;
  - type: text
    content: Leur figure était comme le saphir.
  '8':
  - type: text
    content: Leur aspect est plus sombre que le noir;
  - type: text
    content: On ne les reconnaît pas dans les rues;
  - type: text
    content: Ils ont la peau collée sur les os,
  - type: text
    content: Sèche comme du bois.
  '9':
  - type: text
    content: Ceux qui périssent par l’épée sont plus heureux
  - type: text
    content: Que ceux qui périssent par la faim,
  - type: text
    content: Qui tombent exténués,
  - type: text
    content: Privés du fruit des champs.
