document_id: LAM.4,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lamentations sur le sort du peuple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-22: cf. La 1; 2. (Ro 2:1-6. Ga 6:7.)'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Eh quoi! L’or a perdu son éclat!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’or pur est altéré!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les pierres du sanctuaire sont dispersées
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux coins de toutes les rues!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Les femmes, malgré leur tendresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Font cuire leurs enfants;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils leur servent de nourriture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu du désastre de la fille de mon peuple.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: L’Éternel a épuisé sa fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a répandu son ardente colère;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a allumé dans Sion un feu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui en dévore les fondements.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Les rois de la terre n’auraient pas cru,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aucun des habitants du monde n’aurait cru
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l’adversaire, que l’ennemi entrerait
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les portes de Jérusalem.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Voilà le fruit des péchés de ses prophètes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des iniquités de ses sacrificateurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui ont répandu dans son sein
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sang des justes!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ils erraient en aveugles dans les rues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Souillés de sang;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne pouvait
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toucher leurs vêtements.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Éloignez-vous, impurs! Leur criait-on,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éloignez-vous, éloignez-vous, ne nous touchez pas!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont en fuite, ils errent çà et là;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On dit parmi les nations: Ils n’auront plus leur demeure!'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: L’Éternel les a dispersés dans sa colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne tourne plus les regards vers eux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On n’a eu ni respect pour les sacrificateurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni pitié pour les vieillards.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Nos yeux se consumaient encore,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et nous attendions vainement du secours;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 29:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Nos regards se portaient avec espérance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vers une nation qui ne nous a pas délivrés.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: On épiait nos pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour nous empêcher d’aller sur nos places;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Notre fin s’approchait, nos jours étaient accomplis…
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Notre fin est arrivée!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Nos persécuteurs étaient plus légers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les aigles du ciel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils nous ont poursuivis sur les montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils nous ont dressé des embûches dans le désert.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Les nobles fils de Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Estimés à l’égal de l’or pur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sont regardés, hélas! Comme des vases de terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ouvrage des mains du potier!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Celui qui nous faisait respirer, l’oint de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A été pris dans leurs fosses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lui de qui nous disions:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous vivrons sous son ombre parmi les nations.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Réjouis-toi, tressaille d’allégresse, fille d’Édom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Habitante du pays d’Uts!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vers toi aussi passera la coupe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu t’enivreras, et tu seras mise à nu.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fille de Sion, ton iniquité est expiée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne t’enverra plus en captivité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fille d’Édom, il châtiera ton iniquité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il mettra tes péchés à découvert.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Les chacals mêmes présentent la mamelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et allaitent leurs petits;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la fille de mon peuple est devenue cruelle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme les autruches du désert.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: La langue du nourrisson s’attache à son palais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Desséchée par la soif;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les enfants demandent du pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et personne ne leur en donne.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ceux qui se nourrissaient de mets délicats
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Périssent dans les rues;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui étaient élevés dans la pourpre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Embrassent les fumiers.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Le châtiment de la fille de mon peuple est plus grand
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que celui de Sodome,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Détruite en un instant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans que personne ait porté la main sur elle.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ses princes étaient plus éclatants que la neige,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus blancs que le lait;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils avaient le teint plus vermeil que le corail;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur figure était comme le saphir.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Leur aspect est plus sombre que le noir;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne les reconnaît pas dans les rues;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont la peau collée sur les os,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sèche comme du bois.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ceux qui périssent par l’épée sont plus heureux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ceux qui périssent par la faim,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui tombent exténués,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Privés du fruit des champs.
