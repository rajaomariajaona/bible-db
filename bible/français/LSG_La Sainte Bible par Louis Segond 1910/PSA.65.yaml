document_id: PSA.65,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (De 12:5-12. Ps 132:13-16.) (Ps 147; 144; 13, etc.)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au chef des chantres. Psaume de David. Cantique.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu visites la terre et tu lui donnes l’abondance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu la combles de richesses;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le ruisseau de Dieu est plein d’eau;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu prépares le blé, quand tu la fertilises ainsi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En arrosant ses sillons, en aplanissant ses mottes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu la détrempes par des pluies, tu bénis son germe.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu couronnes l’année de tes biens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tes pas versent l’abondance;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les plaines du désert sont abreuvées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les collines sont ceintes d’allégresse;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les pâturages se couvrent de brebis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les vallées se revêtent de froment.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les cris de joie et les chants retentissent.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec confiance, ô Dieu! On te louera dans Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’on accomplira les vœux qu’on t’a faits.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O toi, qui écoutes la prière!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les hommes viendront à toi.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les iniquités m’accablent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu pardonneras nos transgressions.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux celui que tu choisis et que tu admets en ta présence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour qu’il habite dans tes parvis!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous nous rassasierons du bonheur de ta maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la sainteté de ton temple.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans ta bonté, tu nous exauces par des prodiges, Dieu de notre salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Espoir de toutes les extrémités lointaines de la terre et de la mer!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il affermit les montagnes par sa force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est ceint de puissance;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il apaise le mugissement des mers, le mugissement de leurs flots,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le tumulte des peuples.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui habitent aux extrémités du monde s’effraient de tes prodiges;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu remplis d’allégresse l’orient et l’occident.
