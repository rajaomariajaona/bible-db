document_id: PSA.65
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: (De 12:5-12. Ps 132:13-16.) (Ps 147; 144; 13, etc.)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. Psaume de David. Cantique.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Avec confiance, ô Dieu! On te louera dans Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’on accomplira les vœux qu’on t’a faits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: O toi, qui écoutes la prière!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les hommes viendront à toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les iniquités m’accablent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu pardonneras nos transgressions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Heureux celui que tu choisis et que tu admets en ta présence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour qu’il habite dans tes parvis!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous nous rassasierons du bonheur de ta maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De la sainteté de ton temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dans ta bonté, tu nous exauces par des prodiges, Dieu de notre salut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Espoir de toutes les extrémités lointaines de la terre et de la mer!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il affermit les montagnes par sa force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est ceint de puissance;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il apaise le mugissement des mers, le mugissement de leurs flots,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le tumulte des peuples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ceux qui habitent aux extrémités du monde s’effraient de tes prodiges;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu remplis d’allégresse l’orient et l’occident.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu visites la terre et tu lui donnes l’abondance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu la combles de richesses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le ruisseau de Dieu est plein d’eau;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu prépares le blé, quand tu la fertilises ainsi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: En arrosant ses sillons, en aplanissant ses mottes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu la détrempes par des pluies, tu bénis son germe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tu couronnes l’année de tes biens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes pas versent l’abondance;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les plaines du désert sont abreuvées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les collines sont ceintes d’allégresse;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les pâturages se couvrent de brebis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les vallées se revêtent de froment.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les cris de joie et les chants retentissent.
