document_id: PSA.65,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (De 12:5-12. Ps 132:13-16.) (Ps 147; 144; 13, etc.)
  - type: text
    content: Au chef des chantres. Psaume de David. Cantique.
  '10':
  - type: text
    content: Tu visites la terre et tu lui donnes l’abondance,
  - type: text
    content: Tu la combles de richesses;
  - type: text
    content: Le ruisseau de Dieu est plein d’eau;
  - type: text
    content: Tu prépares le blé, quand tu la fertilises ainsi.
  '11':
  - type: text
    content: En arrosant ses sillons, en aplanissant ses mottes,
  - type: text
    content: Tu la détrempes par des pluies, tu bénis son germe.
  '12':
  - type: text
    content: Tu couronnes l’année de tes biens,
  - type: text
    content: Et tes pas versent l’abondance;
  '13':
  - type: text
    content: Les plaines du désert sont abreuvées,
  - type: text
    content: Et les collines sont ceintes d’allégresse;
  '14':
  - type: text
    content: Les pâturages se couvrent de brebis,
  - type: text
    content: Et les vallées se revêtent de froment.
  - type: text
    content: Les cris de joie et les chants retentissent.
  '2':
  - type: text
    content: Avec confiance, ô Dieu! On te louera dans Sion,
  - type: text
    content: Et l’on accomplira les vœux qu’on t’a faits.
  '3':
  - type: text
    content: O toi, qui écoutes la prière!
  - type: text
    content: Tous les hommes viendront à toi.
  '4':
  - type: text
    content: 'Les iniquités m’accablent:'
  - type: text
    content: Tu pardonneras nos transgressions.
  '5':
  - type: text
    content: Heureux celui que tu choisis et que tu admets en ta présence,
  - type: text
    content: Pour qu’il habite dans tes parvis!
  - type: text
    content: Nous nous rassasierons du bonheur de ta maison,
  - type: text
    content: De la sainteté de ton temple.
  '6':
  - type: text
    content: Dans ta bonté, tu nous exauces par des prodiges, Dieu de notre salut,
  - type: text
    content: Espoir de toutes les extrémités lointaines de la terre et de la mer!
  '7':
  - type: text
    content: Il affermit les montagnes par sa force,
  - type: text
    content: Il est ceint de puissance;
  '8':
  - type: text
    content: Il apaise le mugissement des mers, le mugissement de leurs flots,
  - type: text
    content: Et le tumulte des peuples.
  '9':
  - type: text
    content: Ceux qui habitent aux extrémités du monde s’effraient de tes prodiges;
  - type: text
    content: Tu remplis d’allégresse l’orient et l’occident.
