document_id: EZK.25,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie contre les Ammonites, les Moabites, les Édomites, et les Philistins
  - type: heading
    content: 'V. 1-7: cf. Éz 21:33-37. Jé 49:1-6. Am 1:13-15.'
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: text
    content: Je l’ouvre aux fils de l’orient
  - type: text
    content: Qui marchent contre les enfants d’Ammon,
  - type: text
    content: Et je le leur donne en possession,
  - type: text
    content: 'Afin que les enfants d’Ammon ne soient plus '
  - type: note
    content: Éz 21:32.
  - type: text
    content: comptés parmi les nations.
  '11':
  - type: text
    content: J’exercerai mes jugements contre Moab.
  - type: text
    content: Et ils sauront que je suis l’Éternel.
  - type: heading
    content: 'V. 12-14: cf. Jé 49:7-22. Éz 35. Ab 1. És 34.'
  '12':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Parce qu’Édom s’est livré à la vengeance
  - type: text
    content: Envers la maison de Juda,
  - type: text
    content: Parce qu’il s’est rendu coupable
  - type: text
    content: Et s’est vengé d’elle,
  '13':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: J’étends ma main sur Édom,
  - type: text
    content: J’en extermine les hommes et les bêtes,
  - type: text
    content: J’en fais un désert, de Théman à Dedan;
  - type: text
    content: Ils tomberont par l’épée.
  '14':
  - type: text
    content: J’exercerai ma vengeance sur Édom
  - type: text
    content: Par la main de mon peuple d’Israël;
  - type: text
    content: Il traitera Édom selon ma colère et ma fureur;
  - type: text
    content: Et ils reconnaîtront ma vengeance,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  - type: heading
    content: 'V. 15-17: cf. Jé 4:7. So 2:4-7. Za 9:5-7.'
  '15':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Parce que les Philistins se sont livrés à la vengeance,
  - type: text
    content: Parce qu’ils se sont vengés dédaigneusement et du fond de l’âme,
  - type: text
    content: Voulant tout détruire, dans leur haine éternelle,
  '16':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Voici, j’étends ma main sur les Philistins,
  - type: text
    content: J’extermine les Kéréthiens,
  - type: text
    content: Et je détruis ce qui reste sur la côte de la mer.
  '17':
  - type: text
    content: J’exercerai sur eux de grandes vengeances,
  - type: text
    content: En les châtiant avec fureur.
  - type: text
    content: Et ils sauront que je suis l’Éternel,
  - type: text
    content: Quand j’exercerai sur eux ma vengeance.
  '2':
  - type: text
    content: 'Fils de l’homme, '
  - type: note
    content: Jé 49:1, etc.
  - type: text
    content: tourne ta face vers les enfants d’Ammon,
  - type: text
    content: Et prophétise contre eux!
  '3':
  - type: text
    content: 'Tu diras aux enfants d’Ammon:'
  - type: text
    content: Écoutez la parole du Seigneur, de l’Éternel!
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: 'Parce que tu as dit: Ah! Ah!'
  - type: text
    content: Sur mon sanctuaire qui était profané,
  - type: text
    content: Sur la terre d’Israël qui était dévastée,
  - type: text
    content: Et sur la maison de Juda qui allait en captivité,
  '4':
  - type: text
    content: Voici, je te donne en possession aux fils de l’Orient;
  - type: text
    content: Ils établiront au milieu de toi leurs enclos,
  - type: text
    content: Et ils y placeront leurs demeures;
  - type: text
    content: Ils mangeront tes fruits,
  - type: text
    content: Ils boiront ton lait.
  '5':
  - type: text
    content: Je ferai de Rabba un parc pour les chameaux,
  - type: text
    content: Et du pays des enfants d’Ammon un bercail pour les brebis.
  - type: text
    content: Et vous saurez que je suis l’Éternel.
  '6':
  - type: text
    content: 'Car ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Parce que tu as battu des mains
  - type: text
    content: Et frappé du pied,
  - type: text
    content: Parce que tu t’es réjoui dédaigneusement et du fond de l’âme
  - type: text
    content: Au sujet de la terre d’Israël,
  '7':
  - type: text
    content: Voici, j’étends ma main sur toi,
  - type: text
    content: Et je te livre en proie aux nations;
  - type: text
    content: Je t’extermine du milieu des peuples,
  - type: text
    content: Je te retranche du nombre des pays,
  - type: text
    content: Je te détruis.
  - type: text
    content: Et tu sauras que je suis l’Éternel.
  - type: heading
    content: 'V. 8-11: cf. Jé 48. So 2:8-11.'
  '8':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: 'Parce que '
  - type: note
    content: Jé 48:1, etc.
  - type: text
    content: 'Moab et Séir ont dit:'
  - type: text
    content: Voici, la maison de Juda est comme toutes les nations!
  '9':
  - type: text
    content: A cause de cela, voici, j’ouvre le territoire de Moab
  - type: text
    content: Du côté des villes, de ses villes frontières,
  - type: text
    content: L’ornement du pays, Beth-Jeschimoth, Baal-Meon et Kirjathaïm,
