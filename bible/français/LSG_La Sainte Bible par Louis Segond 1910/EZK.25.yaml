document_id: EZK.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie contre les Ammonites, les Moabites, les Édomites, et les Philistins
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. Éz 21:33-37. Jé 49:1-6. Am 1:13-15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole de l’Éternel me fut adressée, en ces mots:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fils de l’homme, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jé 49:1, etc.
    marker-yv: yv-n
  - type: text
    text: tourne ta face vers les enfants d’Ammon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et prophétise contre eux!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu diras aux enfants d’Ammon:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Écoutez la parole du Seigneur, de l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Parce que tu as dit: Ah! Ah!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur mon sanctuaire qui était profané,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur la terre d’Israël qui était dévastée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sur la maison de Juda qui allait en captivité,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Voici, je te donne en possession aux fils de l’Orient;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils établiront au milieu de toi leurs enclos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils y placeront leurs demeures;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils mangeront tes fruits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils boiront ton lait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je ferai de Rabba un parc pour les chameaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et du pays des enfants d’Ammon un bercail pour les brebis.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous saurez que je suis l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Car ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que tu as battu des mains
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et frappé du pied,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que tu t’es réjoui dédaigneusement et du fond de l’âme
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au sujet de la terre d’Israël,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Voici, j’étends ma main sur toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je te livre en proie aux nations;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’extermine du milieu des peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te retranche du nombre des pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te détruis.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu sauras que je suis l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-11: cf. Jé 48. So 2:8-11.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Parce que '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jé 48:1, etc.
    marker-yv: yv-n
  - type: text
    text: 'Moab et Séir ont dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, la maison de Juda est comme toutes les nations!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: A cause de cela, voici, j’ouvre le territoire de Moab
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du côté des villes, de ses villes frontières,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’ornement du pays, Beth-Jeschimoth, Baal-Meon et Kirjathaïm,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je l’ouvre aux fils de l’orient
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui marchent contre les enfants d’Ammon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je le leur donne en possession,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Afin que les enfants d’Ammon ne soient plus '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 21:32
      metadata:
        usfm: EZK.21.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: comptés parmi les nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: J’exercerai mes jugements contre Moab.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils sauront que je suis l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-14: cf. Jé 49:7-22. Éz 35. Ab 1. És 34.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’Édom s’est livré à la vengeance
- type: usfm
  marker: q1
  children:
  - type: text
    text: Envers la maison de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’il s’est rendu coupable
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et s’est vengé d’elle,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’étends ma main sur Édom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’en extermine les hommes et les bêtes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’en fais un désert, de Théman à Dedan;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils tomberont par l’épée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: J’exercerai ma vengeance sur Édom
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par la main de mon peuple d’Israël;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il traitera Édom selon ma colère et ma fureur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils reconnaîtront ma vengeance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Seigneur, l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-17: cf. Jé 4:7. So 2:4-7. Za 9:5-7.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que les Philistins se sont livrés à la vengeance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’ils se sont vengés dédaigneusement et du fond de l’âme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voulant tout détruire, dans leur haine éternelle,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, j’étends ma main sur les Philistins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’extermine les Kéréthiens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je détruis ce qui reste sur la côte de la mer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: J’exercerai sur eux de grandes vengeances,
- type: usfm
  marker: q1
  children:
  - type: text
    text: En les châtiant avec fureur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils sauront que je suis l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand j’exercerai sur eux ma vengeance.
