  - type: text
    text: Il fuit et disparaît comme une ombre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 7:17
      metadata:
        usfm: JOB.7.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
