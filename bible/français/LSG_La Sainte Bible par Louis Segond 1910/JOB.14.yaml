      - type: text
        text: 10:20
      metadata:
        usfm: JOB.10.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et c’est sur lui que tu as l’œil ouvert!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu me fais aller en justice avec toi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
