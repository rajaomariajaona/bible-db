      marker: ref
      children:
      - type: text
        text: Ps 56:9
      metadata:
        usfm: PSA.56.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 139:2
      metadata:
        usfm: PSA.139.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: PSA.139.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: PSA.139.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 5:21
      metadata:
        usfm: PRO.5.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 32:19
      metadata:
        usfm: JER.32.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais aujourd’hui tu comptes mes pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as l’œil sur mes péchés;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mes transgressions sont scellées en un faisceau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu imagines des iniquités à ma charge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: La montagne s’écroule et périt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le rocher disparaît de sa place,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: La pierre est broyée par les eaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la terre emportée par leur courant;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi tu détruis l’espérance de l’homme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu es sans cesse à l’assaillir, et il s’en va;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu le défigures, puis tu le renvoies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Que ses fils soient honorés, il n’en sait rien;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils soient dans l’abaissement, il l’ignore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C’est pour lui seul qu’il éprouve de la douleur en son corps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pour lui seul qu’il ressent de la tristesse en son âme.
