document_id: JOB.14,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-22: cf. Job 7. Ps 90. (Ec 9:3-6. Job 19:25-27. Ps 49:15, 16.)'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: L’homme né de la femme!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 90:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 102:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 103:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 144:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 4:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Sa vie est courte, sans cesse agitée.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mais l’homme meurt, et il perd sa force;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme expire, et où est-il?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Les eaux des lacs s’évanouissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les fleuves tarissent et se dessèchent;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ainsi l’homme se couche et ne se relèvera plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne se réveillera pas tant que les cieux subsisteront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne sortira pas de son sommeil.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Oh! Si tu voulais me cacher dans le séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: M’y tenir à couvert jusqu’à ce que ta colère fût passée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et me fixer un terme auquel tu te souviendras de moi!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Si l’homme une fois mort pouvait revivre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’aurais de l’espoir tout le temps de mes souffrances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ce que mon état vînt à changer.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tu appellerais alors, et je te répondrais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu languirais après l’ouvrage de tes mains.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 31:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 56:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 139:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 5:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 32:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais aujourd’hui tu comptes mes pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as l’œil sur mes péchés;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mes transgressions sont scellées en un faisceau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu imagines des iniquités à ma charge.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: La montagne s’écroule et périt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le rocher disparaît de sa place,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: La pierre est broyée par les eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la terre emportée par leur courant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi tu détruis l’espérance de l’homme.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il naît, il est coupé comme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 103:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 40:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: une fleur;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 8:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 90:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 102:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 144:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il fuit et disparaît comme une ombre.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tu es sans cesse à l’assaillir, et il s’en va;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu le défigures, puis tu le renvoies.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Que ses fils soient honorés, il n’en sait rien;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils soient dans l’abaissement, il l’ignore.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: C’est pour lui seul qu’il éprouve de la douleur en son corps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pour lui seul qu’il ressent de la tristesse en son âme.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 7:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et c’est sur lui que tu as l’œil ouvert!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu me fais aller en justice avec toi!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 5:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 51:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 3:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 5:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 2:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Comment d’un être souillé sortira-t-il un homme pur?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’en peut sortir aucun.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 7:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Si ses jours sont fixés, si tu as compté ses mois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu en as marqué le terme qu’il ne saurait franchir,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 7:16
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Détourne de lui les regards, et donne-lui du relâche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pour qu’il ait au moins la joie du '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 7:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: mercenaire à la fin de sa journée.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Un arbre a de l’espérance:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand on le coupe, il repousse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il produit encore des rejetons;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Quand sa racine a vieilli dans la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand son tronc meurt dans la poussière,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Il reverdit à l’approche de l’eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il pousse des branches comme une jeune plante.
