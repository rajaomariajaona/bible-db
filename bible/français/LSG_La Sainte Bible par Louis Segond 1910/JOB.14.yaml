        usfm: EPH.2.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Comment d’un être souillé sortira-t-il un homme pur?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’en peut sortir aucun.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 7:1
      metadata:
        usfm: JOB.7.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Si ses jours sont fixés, si tu as compté ses mois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu en as marqué le terme qu’il ne saurait franchir,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 7:16
      metadata:
        usfm: JOB.7.16
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: JOB.7.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:20
      metadata:
        usfm: JOB.10.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Détourne de lui les regards, et donne-lui du relâche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pour qu’il ait au moins la joie du '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 7:1
      metadata:
        usfm: JOB.7.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: JOB.7.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: mercenaire à la fin de sa journée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Un arbre a de l’espérance:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand on le coupe, il repousse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il produit encore des rejetons;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Quand sa racine a vieilli dans la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand son tronc meurt dans la poussière,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il reverdit à l’approche de l’eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il pousse des branches comme une jeune plante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mais l’homme meurt, et il perd sa force;
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’homme expire, et où est-il?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les eaux des lacs s’évanouissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les fleuves tarissent et se dessèchent;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ainsi l’homme se couche et ne se relèvera plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne se réveillera pas tant que les cieux subsisteront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne sortira pas de son sommeil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Oh! Si tu voulais me cacher dans le séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: M’y tenir à couvert jusqu’à ce que ta colère fût passée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et me fixer un terme auquel tu te souviendras de moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Si l’homme une fois mort pouvait revivre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’aurais de l’espoir tout le temps de mes souffrances,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à ce que mon état vînt à changer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tu appellerais alors, et je te répondrais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu languirais après l’ouvrage de tes mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 31:4
      metadata:
        usfm: JOB.31.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:21
      metadata:
        usfm: JOB.34.21
    - type: text
      text: '. '
