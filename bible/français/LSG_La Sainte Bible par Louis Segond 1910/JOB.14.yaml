document_id: JOB.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-22: cf. Job 7. Ps 90. (Ec 9:3-6. Job 19:25-27. Ps 49:15, 16.)'
  - type: text
    content: L’homme né de la femme!
  - type: note
    content: Ps 90:5, 6, 9; 102:12; 103:15; 144:4. Ja 4:14.
  - type: text
    content: Sa vie est courte, sans cesse agitée.
  '10':
  - type: text
    content: Mais l’homme meurt, et il perd sa force;
  - type: text
    content: L’homme expire, et où est-il?
  '11':
  - type: text
    content: Les eaux des lacs s’évanouissent,
  - type: text
    content: Les fleuves tarissent et se dessèchent;
  '12':
  - type: text
    content: Ainsi l’homme se couche et ne se relèvera plus,
  - type: text
    content: Il ne se réveillera pas tant que les cieux subsisteront,
  - type: text
    content: Il ne sortira pas de son sommeil.
  '13':
  - type: text
    content: Oh! Si tu voulais me cacher dans le séjour des morts,
  - type: text
    content: M’y tenir à couvert jusqu’à ce que ta colère fût passée,
  - type: text
    content: Et me fixer un terme auquel tu te souviendras de moi!
  '14':
  - type: text
    content: Si l’homme une fois mort pouvait revivre,
  - type: text
    content: J’aurais de l’espoir tout le temps de mes souffrances,
  - type: text
    content: Jusqu’à ce que mon état vînt à changer.
  '15':
  - type: text
    content: Tu appellerais alors, et je te répondrais,
  - type: text
    content: Tu languirais après l’ouvrage de tes mains.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Job 31:4; 34:21. Ps 56:9; 139:2, 3, 4. Pr 5:21. Jé 32:19.
  - type: text
    content: Mais aujourd’hui tu comptes mes pas,
  - type: text
    content: Tu as l’œil sur mes péchés;
  '17':
  - type: text
    content: Mes transgressions sont scellées en un faisceau,
  - type: text
    content: Et tu imagines des iniquités à ma charge.
  '18':
  - type: text
    content: La montagne s’écroule et périt,
  - type: text
    content: Le rocher disparaît de sa place,
  '19':
  - type: text
    content: La pierre est broyée par les eaux,
  - type: text
    content: Et la terre emportée par leur courant;
  - type: text
    content: Ainsi tu détruis l’espérance de l’homme.
  '2':
  - type: text
    content: 'Il naît, il est coupé comme '
  - type: note
    content: Ps 103:15. És 40:6. 1 Pi 1:24.
  - type: text
    content: une fleur;
  - type: note
    content: Job 8:9. Ps 90:6, 10; 102:12; 144:4.
  - type: text
    content: Il fuit et disparaît comme une ombre.
  '20':
  - type: text
    content: Tu es sans cesse à l’assaillir, et il s’en va;
  - type: text
    content: Tu le défigures, puis tu le renvoies.
  '21':
  - type: text
    content: Que ses fils soient honorés, il n’en sait rien;
  - type: text
    content: Qu’ils soient dans l’abaissement, il l’ignore.
  '22':
  - type: text
    content: C’est pour lui seul qu’il éprouve de la douleur en son corps,
  - type: text
    content: C’est pour lui seul qu’il ressent de la tristesse en son âme.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Job 7:17, 18; 10:20.
  - type: text
    content: Et c’est sur lui que tu as l’œil ouvert!
  - type: text
    content: Et tu me fais aller en justice avec toi!
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ge 5:3. Ps 51:7. Jn 3:6. Ro 5:12. Ép 2:3.
  - type: text
    content: Comment d’un être souillé sortira-t-il un homme pur?
  - type: text
    content: Il n’en peut sortir aucun.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Job 7:1.
  - type: text
    content: Si ses jours sont fixés, si tu as compté ses mois,
  - type: text
    content: Si tu en as marqué le terme qu’il ne saurait franchir,
  '6':
  - type: text
    content: ' '
  - type: note
    content: Job 7:16, 19; 10:20.
  - type: text
    content: Détourne de lui les regards, et donne-lui du relâche,
  - type: text
    content: 'Pour qu’il ait au moins la joie du '
  - type: note
    content: Job 7:1, 2.
  - type: text
    content: mercenaire à la fin de sa journée.
  '7':
  - type: text
    content: 'Un arbre a de l’espérance:'
  - type: text
    content: Quand on le coupe, il repousse,
  - type: text
    content: Il produit encore des rejetons;
  '8':
  - type: text
    content: Quand sa racine a vieilli dans la terre,
  - type: text
    content: Quand son tronc meurt dans la poussière,
  '9':
  - type: text
    content: Il reverdit à l’approche de l’eau,
  - type: text
    content: Il pousse des branches comme une jeune plante.
