document_id: PRO.19
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 28:6
      metadata:
        usfm: PRO.28.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mieux vaut le pauvre qui marche dans son intégrité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l’homme qui a des lèvres perverses et qui est un insensé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le manque de science n’est bon pour personne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celui qui précipite ses pas tombe dans le péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:13
      metadata:
        usfm: JAS.1.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: JAS.1.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: JAS.1.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La folie de l’homme pervertit sa voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et c’est contre l’Éternel que son cœur s’irrite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 14:20
      metadata:
        usfm: PRO.14.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La richesse procure un grand nombre d’amis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais le pauvre est séparé de son ami.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 19:19
      metadata:
        usfm: DEU.19.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 21:28
      metadata:
        usfm: PRO.21.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le faux témoin ne restera pas impuni,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celui qui dit des mensonges n’échappera pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Beaucoup de gens flattent l’homme généreux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous sont les amis de celui qui fait des présents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 14:20
      metadata:
        usfm: PRO.14.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tous les frères du pauvre le haïssent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Combien plus ses amis s’éloignent-ils de lui!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il leur adresse des paroles suppliantes, mais ils disparaissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Celui qui acquiert du sens aime son âme;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui garde l’intelligence trouve le bonheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: v. 5.
    marker-yv: yv-n
  - type: text
    text: Le faux témoin ne restera pas impuni,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celui qui dit des mensonges périra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il ne sied pas à un insensé de vivre dans les délices;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 30:22
      metadata:
        usfm: PRO.30.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Combien moins à un esclave de dominer sur des princes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’homme qui a de la sagesse est lent à la colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il met sa gloire à oublier les offenses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 16:14
      metadata:
        usfm: PRO.16.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:2
      metadata:
        usfm: PRO.20.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La colère du roi est comme le rugissement d’un lion,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 16:15
      metadata:
        usfm: PRO.16.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et sa faveur est comme la rosée sur l’herbe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:1
      metadata:
        usfm: PRO.10.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:20
      metadata:
        usfm: PRO.15.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:25
      metadata:
        usfm: PRO.17.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Un fils insensé est une calamité pour son père,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 21:19
      metadata:
        usfm: PRO.21.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:15
      metadata:
        usfm: PRO.27.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et les querelles d’une femme sont une gouttière sans fin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: On peut hériter de ses pères une maison et des richesses,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 18:22
      metadata:
        usfm: PRO.18.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais une femme intelligente est un don de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 6:9
      metadata:
        usfm: PRO.6.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:13
      metadata:
        usfm: PRO.20.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La paresse fait tomber dans l’assoupissement,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:4
      metadata:
        usfm: PRO.10.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et l’âme nonchalante éprouve la faim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Celui qui garde '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 3:21
      metadata:
        usfm: PRO.3.21
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: PRO.3.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 11:28
      metadata:
        usfm: LUK.11.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: ce qui est commandé garde son âme;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui ne veille pas sur sa voie mourra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Celui qui a pitié du pauvre prête à l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui lui rendra selon son œuvre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 13:24
      metadata:
        usfm: PRO.13.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:13
      metadata:
        usfm: PRO.23.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Châtie ton fils, car il y a encore de l’espérance;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 6:4
      metadata:
        usfm: EPH.6.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais ne désire point le faire mourir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Celui que la colère emporte doit en subir la peine;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car si tu le libères, tu devras y revenir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Écoute les conseils, et reçois l’instruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que tu sois sage dans la suite de ta vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il y a dans le cœur de l’homme beaucoup de projets,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 23:13
      metadata:
        usfm: JOB.23.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 33:11
      metadata:
        usfm: PSA.33.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 115:3
      metadata:
        usfm: PSA.115.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 46:10
      metadata:
        usfm: ISA.46.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais c’est le dessein de l’Éternel qui s’accomplit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ce qui fait le charme d’un homme, c’est sa bonté;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mieux vaut un pauvre qu’un menteur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: La crainte de l’Éternel mène à la vie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 34:10
      metadata:
        usfm: PSA.34.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et l’on passe la nuit rassasié, sans être visité par le malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 26:15
      metadata:
        usfm: PRO.26.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le paresseux plonge sa main dans le plat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il ne la ramène pas à sa bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 21:11
      metadata:
        usfm: PRO.21.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Frappe le moqueur, et le sot deviendra sage;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reprends l’homme intelligent, et il comprendra la science.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Celui qui ruine son père et qui met en fuite sa mère
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est un fils qui fait honte et qui fait rougir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Cesse, mon fils, d’écouter l’instruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si c’est pour t’éloigner des paroles de la science.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Un témoin pervers se moque de la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la bouche des méchants dévore l’iniquité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Les châtiments sont prêts pour les moqueurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les coups pour le dos des insensés.
