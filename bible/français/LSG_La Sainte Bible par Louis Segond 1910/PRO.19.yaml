document_id: PRO.19,93
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Pr 28:6.
  - type: text
    content: Mieux vaut le pauvre qui marche dans son intégrité,
  - type: text
    content: Que l’homme qui a des lèvres perverses et qui est un insensé.
  '10':
  - type: text
    content: Il ne sied pas à un insensé de vivre dans les délices;
  - type: note
    content: Pr 30:22.
  - type: text
    content: Combien moins à un esclave de dominer sur des princes!
  '11':
  - type: text
    content: L’homme qui a de la sagesse est lent à la colère,
  - type: text
    content: Et il met sa gloire à oublier les offenses.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Pr 16:14; 20:2.
  - type: text
    content: La colère du roi est comme le rugissement d’un lion,
  - type: note
    content: Pr 16:15.
  - type: text
    content: Et sa faveur est comme la rosée sur l’herbe.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Pr 10:1; 15:20; 17:25.
  - type: text
    content: Un fils insensé est une calamité pour son père,
  - type: note
    content: Pr 21:19; 27:15.
  - type: text
    content: Et les querelles d’une femme sont une gouttière sans fin.
  '14':
  - type: text
    content: On peut hériter de ses pères une maison et des richesses,
  - type: note
    content: Pr 18:22.
  - type: text
    content: Mais une femme intelligente est un don de l’Éternel.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Pr 6:9; 20:13.
  - type: text
    content: La paresse fait tomber dans l’assoupissement,
  - type: note
    content: Pr 10:4.
  - type: text
    content: Et l’âme nonchalante éprouve la faim.
  '16':
  - type: text
    content: 'Celui qui garde '
  - type: note
    content: Pr 3:21, 22. Lu 11:28.
  - type: text
    content: ce qui est commandé garde son âme;
  - type: text
    content: Celui qui ne veille pas sur sa voie mourra.
  '17':
  - type: text
    content: Celui qui a pitié du pauvre prête à l’Éternel,
  - type: text
    content: Qui lui rendra selon son œuvre.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Pr 13:24; 23:13.
  - type: text
    content: Châtie ton fils, car il y a encore de l’espérance;
  - type: note
    content: Ép 6:4.
  - type: text
    content: Mais ne désire point le faire mourir.
  '19':
  - type: text
    content: Celui que la colère emporte doit en subir la peine;
  - type: text
    content: Car si tu le libères, tu devras y revenir.
  '2':
  - type: text
    content: Le manque de science n’est bon pour personne,
  - type: text
    content: Et celui qui précipite ses pas tombe dans le péché.
  '20':
  - type: text
    content: Écoute les conseils, et reçois l’instruction,
  - type: text
    content: Afin que tu sois sage dans la suite de ta vie.
  '21':
  - type: text
    content: Il y a dans le cœur de l’homme beaucoup de projets,
  - type: note
    content: Job 23:13. Ps 33:11; 115:3. És 46:10.
  - type: text
    content: Mais c’est le dessein de l’Éternel qui s’accomplit.
  '22':
  - type: text
    content: Ce qui fait le charme d’un homme, c’est sa bonté;
  - type: text
    content: Et mieux vaut un pauvre qu’un menteur.
  '23':
  - type: text
    content: La crainte de l’Éternel mène à la vie,
  - type: note
    content: Ps 34:10.
  - type: text
    content: Et l’on passe la nuit rassasié, sans être visité par le malheur.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Pr 26:15.
  - type: text
    content: Le paresseux plonge sa main dans le plat,
  - type: text
    content: Et il ne la ramène pas à sa bouche.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Pr 21:11.
  - type: text
    content: Frappe le moqueur, et le sot deviendra sage;
  - type: text
    content: Reprends l’homme intelligent, et il comprendra la science.
  '26':
  - type: text
    content: Celui qui ruine son père et qui met en fuite sa mère
  - type: text
    content: Est un fils qui fait honte et qui fait rougir.
  '27':
  - type: text
    content: Cesse, mon fils, d’écouter l’instruction,
  - type: text
    content: Si c’est pour t’éloigner des paroles de la science.
  '28':
  - type: text
    content: Un témoin pervers se moque de la justice,
  - type: text
    content: Et la bouche des méchants dévore l’iniquité.
  '29':
  - type: text
    content: Les châtiments sont prêts pour les moqueurs,
  - type: text
    content: Et les coups pour le dos des insensés.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ja 1:13, 14, 15.
  - type: text
    content: La folie de l’homme pervertit sa voie,
  - type: text
    content: Et c’est contre l’Éternel que son cœur s’irrite.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Pr 14:20.
  - type: text
    content: La richesse procure un grand nombre d’amis,
  - type: text
    content: Mais le pauvre est séparé de son ami.
  '5':
  - type: text
    content: ' '
  - type: note
    content: De 19:19. Pr 21:28.
  - type: text
    content: Le faux témoin ne restera pas impuni,
  - type: text
    content: Et celui qui dit des mensonges n’échappera pas.
  '6':
  - type: text
    content: Beaucoup de gens flattent l’homme généreux,
  - type: text
    content: Et tous sont les amis de celui qui fait des présents.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Pr 14:20.
  - type: text
    content: Tous les frères du pauvre le haïssent;
  - type: text
    content: Combien plus ses amis s’éloignent-ils de lui!
  - type: text
    content: Il leur adresse des paroles suppliantes, mais ils disparaissent.
  '8':
  - type: text
    content: Celui qui acquiert du sens aime son âme;
  - type: text
    content: Celui qui garde l’intelligence trouve le bonheur.
  '9':
  - type: text
    content: ' '
  - type: note
    content: v. 5.
  - type: text
    content: Le faux témoin ne restera pas impuni,
  - type: text
    content: Et celui qui dit des mensonges périra.
