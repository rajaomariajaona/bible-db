document_id: TIT.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Adresse et salutation
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-4: cf. 1 Ti 1:1, 2. 2 Pi 1:1-4.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul, serviteur de Dieu, et apôtre de Jésus-Christ pour la foi des élus de Dieu et la connaissance de la vérité qui est selon la piété, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 15:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il y a, en effet, surtout parmi les circoncis, beaucoup de gens rebelles, de vains discoureurs et de séducteurs, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'auxquels il faut fermer la bouche. Ils bouleversent '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 23:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 3:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'des familles entières, enseignant pour un gain honteux ce qu’on ne doit pas enseigner. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’un d’entre eux, leur propre prophète, a dit: Crétois toujours menteurs, méchantes bêtes, ventres paresseux. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce témoignage est vrai. C’est pourquoi reprends-les sévèrement, afin qu’ils aient une foi saine, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 29:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 15:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 2:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 1:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et qu’ils ne s’attachent pas à des fables judaïques et à des commandements d’hommes qui se détournent de la vérité. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 15:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 10:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 14:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tout est pur pour ceux qui sont purs; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 23:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 14:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mais rien n’est pur pour ceux qui sont souillés et incrédules, leur intelligence et leur conscience sont souillées. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils font profession de connaître Dieu, mais ils le renient par leurs œuvres, étant abominables, rebelles, et incapables d’aucune bonne œuvre.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'lesquelles reposent sur l’espérance de la vie éternelle, promise '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 23:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 2:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'dès les plus anciens temps par le Dieu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 16:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 1:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui ne ment point, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et qui a manifesté sa parole en son temps par la prédication '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 20:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 1:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui m’a été confiée d’après l’ordre de Dieu notre Sauveur, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 2:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 2:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à Tite, mon enfant légitime en notre commune foi: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 1:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 1:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: que la grâce et la paix te soient données de la part de Dieu le Père et de Jésus-Christ notre Sauveur!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tite chargé d’organiser l’Église de Crète, d’établir des conducteurs fidèles, et de lutter contre ceux qui enseignent de fausses doctrines
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-9: cf. 1 Ti 3:1-7. 1 Pi 5:1-4.'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je t’ai laissé en Crète, afin que tu mettes en ordre ce qui reste à régler, et que, selon mes instructions, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 2:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'tu établisses des anciens dans chaque ville, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 3:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 's’il s’y trouve quelque homme irréprochable, mari d’une seule femme, ayant des enfants fidèles, qui ne soient ni accusés de débauche ni rebelles. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car il faut que l’évêque soit irréprochable, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 24:45
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 4:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 3:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme économe de Dieu; qu’il ne soit ni arrogant, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 10:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ni colère, ni adonné au vin, ni violent, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 3:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 5:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ni porté à un gain déshonnête; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 3:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qu’il soit hospitalier, ami des gens de bien, modéré, juste, saint, tempérant, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: attaché à la vraie parole telle qu’elle a été enseignée, afin d’être capable d’exhorter selon la saine doctrine et de réfuter les contradicteurs.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-16: cf. Ro 16:17, 18. 1 Ti 1:3-7. 2 Ti 2:16-18, 23-26; 3:5-9.'
    marker-yv: yv-h
