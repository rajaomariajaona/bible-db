document_id: TIT.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: heading
    content: 'V. 1-4: cf. 1 Ti 1:1, 2. 2 Pi 1:1-4.'
  - type: text
    content: 'Paul, serviteur de Dieu, et apôtre de Jésus-Christ pour la foi des élus de Dieu et la connaissance de la vérité qui est selon la piété, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ac 15:1.
  - type: text
    content: 'Il y a, en effet, surtout parmi les circoncis, beaucoup de gens rebelles, de vains discoureurs et de séducteurs, '
  '11':
  - type: text
    content: 'auxquels il faut fermer la bouche. Ils bouleversent '
  - type: note
    content: Mt 23:14. 2 Ti 3:6.
  - type: text
    content: 'des familles entières, enseignant pour un gain honteux ce qu’on ne doit pas enseigner. '
  '12':
  - type: text
    content: 'L’un d’entre eux, leur propre prophète, a dit: Crétois toujours menteurs, méchantes bêtes, ventres paresseux. '
  '13':
  - type: text
    content: 'Ce témoignage est vrai. C’est pourquoi reprends-les sévèrement, afin qu’ils aient une foi saine, '
  '14':
  - type: note
    content: És 29:13. Mt 15:9. Col 2:22. 1 Ti 1:4; 4:7; 6:20.
  - type: text
    content: 'et qu’ils ne s’attachent pas à des fables judaïques et à des commandements d’hommes qui se détournent de la vérité. '
  '15':
  - type: note
    content: Mt 15:11. Ac 10:15. Ro 14:20.
  - type: text
    content: 'Tout est pur pour ceux qui sont purs; '
  - type: note
    content: Mt 23:25. Ro 14:23.
  - type: text
    content: 'mais rien n’est pur pour ceux qui sont souillés et incrédules, leur intelligence et leur conscience sont souillées. '
  '16':
  - type: text
    content: Ils font profession de connaître Dieu, mais ils le renient par leurs œuvres, étant abominables, rebelles, et incapables d’aucune bonne œuvre.
  '2':
  - type: text
    content: 'lesquelles reposent sur l’espérance de la vie éternelle, promise '
  - type: note
    content: No 23:19. 2 Ti 2:13.
  - type: text
    content: 'dès les plus anciens temps par le Dieu '
  - type: note
    content: Ro 16:25. Ép 1:9; 3:9. Col 1:26. 1 Pi 1:20.
  - type: text
    content: 'qui ne ment point, '
  '3':
  - type: text
    content: 'et qui a manifesté sa parole en son temps par la prédication '
  - type: note
    content: Ac 20:24. Ga 1:1.
  - type: text
    content: 'qui m’a été confiée d’après l’ordre de Dieu notre Sauveur, '
  '4':
  - type: note
    content: 2 Co 2:12; 7:14; 8:6, 16. Ga 2:3.
  - type: text
    content: 'à Tite, mon enfant légitime en notre commune foi: '
  - type: note
    content: Ép 1:2. Col 1:2. 2 Ti 1:2. 1 Pi 1:2.
  - type: text
    content: que la grâce et la paix te soient données de la part de Dieu le Père et de Jésus-Christ notre Sauveur!
  - type: heading
    content: Tite chargé d’organiser l’Église de Crète, d’établir des conducteurs fidèles, et de lutter contre ceux qui enseignent de fausses doctrines
  - type: heading
    content: 'V. 5-9: cf. 1 Ti 3:1-7. 1 Pi 5:1-4.'
  '5':
  - type: text
    content: 'Je t’ai laissé en Crète, afin que tu mettes en ordre ce qui reste à régler, et que, selon mes instructions, '
  - type: note
    content: 2 Ti 2:2.
  - type: text
    content: 'tu établisses des anciens dans chaque ville, '
  '6':
  - type: note
    content: 1 Ti 3:2.
  - type: text
    content: 's’il s’y trouve quelque homme irréprochable, mari d’une seule femme, ayant des enfants fidèles, qui ne soient ni accusés de débauche ni rebelles. '
  '7':
  - type: text
    content: 'Car il faut que l’évêque soit irréprochable, '
  - type: note
    content: Mt 24:45. 1 Co 4:1. 1 Ti 3:15.
  - type: text
    content: 'comme économe de Dieu; qu’il ne soit ni arrogant, '
  - type: note
    content: Lé 10:9. Ép 5:18.
  - type: text
    content: 'ni colère, ni adonné au vin, ni violent, '
  - type: note
    content: 1 Ti 3:3. 1 Pi 5:2.
  - type: text
    content: 'ni porté à un gain déshonnête; '
  '8':
  - type: text
    content: 'mais '
  - type: note
    content: 1 Ti 3:2.
  - type: text
    content: 'qu’il soit hospitalier, ami des gens de bien, modéré, juste, saint, tempérant, '
  '9':
  - type: text
    content: attaché à la vraie parole telle qu’elle a été enseignée, afin d’être capable d’exhorter selon la saine doctrine et de réfuter les contradicteurs.
  - type: heading
    content: 'V. 10-16: cf. Ro 16:17, 18. 1 Ti 1:3-7. 2 Ti 2:16-18, 23-26; 3:5-9.'
