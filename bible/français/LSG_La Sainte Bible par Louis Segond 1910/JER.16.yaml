      metadata:
        usfm: JER.9.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:10
      metadata:
        usfm: JER.13.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: les penchants de votre mauvais cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pour ne point '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 11:10
      metadata:
        usfm: JER.11.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:10
      metadata:
        usfm: JER.13.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:23
      metadata:
        usfm: JER.17.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: m’écouter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je vous transporterai '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:27
      metadata:
        usfm: DEU.4.27
    - type: text
      text: '; '
