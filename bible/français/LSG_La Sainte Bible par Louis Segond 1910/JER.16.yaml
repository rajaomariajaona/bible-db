        text: Jé 14:16
      metadata:
        usfm: JER.14.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: sépulture;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils seront comme du '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 9:22
      metadata:
        usfm: JER.9.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: fumier sur la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils périront par l’épée et par la famine;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et leurs '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
