      metadata:
        usfm: JER.15.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:20
      metadata:
        usfm: JER.34.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: cadavres serviront de pâture
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aux oiseaux du ciel et aux bêtes de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Car ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’entre pas dans une maison de deuil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’y va pas pleurer, te lamenter avec eux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car j’ai retiré à ce peuple ma paix, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma bonté et ma miséricorde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Grands et petits mourront dans ce pays;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On ne leur donnera point de sépulture;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On ne les pleurera point,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'On ne se fera point '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:28
      metadata:
        usfm: LEV.19.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 14:1
      metadata:
        usfm: DEU.14.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: d’incisions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’on ne se rasera pas pour eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: On ne rompra pas le pain dans le deuil
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour consoler quelqu’un au sujet d’un mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’on n’offrira pas la coupe de consolation
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour un père ou pour une mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: N’entre pas non plus dans une maison de festin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour t’asseoir avec eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour manger et pour boire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Car ainsi parle l’Éternel des armées, le Dieu d’Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 24:7
      metadata:
        usfm: ISA.24.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: ISA.24.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:34
      metadata:
        usfm: JER.7.34
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:10
      metadata:
        usfm: JER.25.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 26:13
      metadata:
        usfm: EZK.26.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: je ferai cesser dans ce lieu, sous vos yeux et de vos jours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les cris de réjouissance et les cris d’allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les chants du fiancé et les chants de la fiancée.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-13: cf. De 29:24-28. 1 R 9:6-9.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 5:19
      metadata:
        usfm: JER.5.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Lorsque tu annonceras à ce peuple toutes ces choses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils te diront:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi l’Éternel nous menace-t-il de tous ces grands malheurs?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quelle est notre iniquité?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quel péché avons-nous commis contre l’Éternel, notre Dieu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors tu leur répondras: Vos pères m’ont abandonné, dit l’Éternel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont allés après d’autres dieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils les ont servis et se sont prosternés devant eux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils m’ont abandonné, et n’ont point observé ma loi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et vous, vous avez fait '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:26
      metadata:
        usfm: JER.7.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: le mal plus encore que vos pères;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et voici, vous suivez chacun '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 3:17
      metadata:
        usfm: JER.3.17
