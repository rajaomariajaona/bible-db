    marker-yv: yv-n
  - type: text
    text: de ce pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans un pays que vous n’avez point connu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni vous, ni vos pères;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et là, vous servirez les autres dieux jour et nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je ne vous accorderai point de grâce.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-21: cf. (Jé 23:1-8; 32:28-38. Ro 11:25-27.) És 2:2-4.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'C’est pourquoi '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 23:7
      metadata:
        usfm: JER.23.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: JER.23.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: voici, les jours viennent, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Où l’on ne dira plus: L’Éternel est vivant,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lui qui a fait monter du pays d’Égypte les enfants d’Israël!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais on dira: L’Éternel est vivant,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lui qui a fait monter les enfants d’Israël du pays du septentrion
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de tous les pays où il les avait chassés!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les ramènerai dans leur pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que j’avais donné à leurs pères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Voici, j’envoie une multitude de pêcheurs, dit l’Éternel, et ils les pêcheront;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et après cela j’enverrai une multitude de chasseurs, et ils les chasseront
- type: usfm
  marker: q1
  children:
  - type: text
    text: De toutes les montagnes et de toutes les collines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et des fentes des rochers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Car '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 34:21
      metadata:
        usfm: JOB.34.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 5:21
      metadata:
        usfm: PRO.5.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 32:19
      metadata:
        usfm: JER.32.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: mes yeux sont attentifs à toutes leurs voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles ne sont point cachées devant ma face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leur iniquité ne se dérobe point à mes regards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Je leur donnerai d’abord le double salaire de leur iniquité et de leur péché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Parce qu’ils ont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 3:2
      metadata:
        usfm: ISA.3.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: profané mon pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’ils ont rempli mon héritage
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 43:7
      metadata:
        usfm: EZK.43.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Des cadavres de leurs idoles et de leurs abominations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Éternel, ma force et mon appui, mon refuge au jour de la détresse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les nations viendront à toi des extrémités de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et elles diront: Nos pères n’ont hérité que le mensonge,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: De vaines idoles, qui ne servent à rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: L’homme peut-il se faire des dieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui ne sont pas des dieux?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: C’est pourquoi voici, je leur fais connaître, cette fois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je leur fais connaître ma puissance et ma force;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et ils sauront que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 33:2
      metadata:
        usfm: JER.33.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: mon nom est l’Éternel.
