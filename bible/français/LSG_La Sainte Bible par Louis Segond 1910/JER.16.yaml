  children:
  - type: text
    text: Fléaux et captivité
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. Éz 24:15-27.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole de l’Éternel me fut adressée, en ces mots:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tu ne prendras point de femme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu n’auras dans ce lieu ni fils ni filles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car ainsi parle l’Éternel sur les fils
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les filles
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui naîtront en ce lieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur leurs mères qui les auront enfantés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et sur leurs pères qui les auront engendrés dans ce pays:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 15:2
      metadata:
        usfm: JER.15.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
