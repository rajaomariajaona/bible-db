verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fléaux et captivité
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. Éz 24:15-27.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 5:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Lorsque tu annonceras à ce peuple toutes ces choses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils te diront:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi l’Éternel nous menace-t-il de tous ces grands malheurs?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quelle est notre iniquité?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quel péché avons-nous commis contre l’Éternel, notre Dieu?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Alors tu leur répondras: Vos pères m’ont abandonné, dit l’Éternel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont allés après d’autres dieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils les ont servis et se sont prosternés devant eux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils m’ont abandonné, et n’ont point observé ma loi.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et vous, vous avez fait '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 7:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: le mal plus encore que vos pères;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et voici, vous suivez chacun '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 3:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les penchants de votre mauvais cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pour ne point '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 11:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: m’écouter.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je vous transporterai '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 4:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:64
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '65'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: de ce pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans un pays que vous n’avez point connu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni vous, ni vos pères;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et là, vous servirez les autres dieux jour et nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je ne vous accorderai point de grâce.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-21: cf. (Jé 23:1-8; 32:28-38. Ro 11:25-27.) És 2:2-4.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est pourquoi '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 23:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: voici, les jours viennent, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Où l’on ne dira plus: L’Éternel est vivant,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui qui a fait monter du pays d’Égypte les enfants d’Israël!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais on dira: L’Éternel est vivant,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui qui a fait monter les enfants d’Israël du pays du septentrion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de tous les pays où il les avait chassés!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les ramènerai dans leur pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que j’avais donné à leurs pères.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, j’envoie une multitude de pêcheurs, dit l’Éternel, et ils les pêcheront;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et après cela j’enverrai une multitude de chasseurs, et ils les chasseront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De toutes les montagnes et de toutes les collines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et des fentes des rochers.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 34:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 5:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 32:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: mes yeux sont attentifs à toutes leurs voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles ne sont point cachées devant ma face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leur iniquité ne se dérobe point à mes regards.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je leur donnerai d’abord le double salaire de leur iniquité et de leur péché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Parce qu’ils ont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 3:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: profané mon pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils ont rempli mon héritage
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 43:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Des cadavres de leurs idoles et de leurs abominations.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, ma force et mon appui, mon refuge au jour de la détresse!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les nations viendront à toi des extrémités de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et elles diront: Nos pères n’ont hérité que le mensonge,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De vaines idoles, qui ne servent à rien.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne prendras point de femme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu n’auras dans ce lieu ni fils ni filles.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme peut-il se faire des dieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui ne sont pas des dieux?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi voici, je leur fais connaître, cette fois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je leur fais connaître ma puissance et ma force;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et ils sauront que '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 33:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: mon nom est l’Éternel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ainsi parle l’Éternel sur les fils
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les filles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui naîtront en ce lieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur leurs mères qui les auront enfantés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et sur leurs pères qui les auront engendrés dans ce pays:'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 15:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils mourront consumés par la maladie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On ne leur donnera ni '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 25:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'larmes ni '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 14:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: sépulture;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils seront comme du '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 9:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: fumier sur la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils périront par l’épée et par la famine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et leurs '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 7:33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: cadavres serviront de pâture
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux oiseaux du ciel et aux bêtes de la terre.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’entre pas dans une maison de deuil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’y va pas pleurer, te lamenter avec eux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car j’ai retiré à ce peuple ma paix, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma bonté et ma miséricorde.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Grands et petits mourront dans ce pays;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne leur donnera point de sépulture;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne les pleurera point,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On ne se fera point '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 14:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: d’incisions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’on ne se rasera pas pour eux.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne rompra pas le pain dans le deuil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour consoler quelqu’un au sujet d’un mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’on n’offrira pas la coupe de consolation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour un père ou pour une mère.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’entre pas non plus dans une maison de festin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour t’asseoir avec eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour manger et pour boire.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car ainsi parle l’Éternel des armées, le Dieu d’Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 24:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 7:34
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 26:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: je ferai cesser dans ce lieu, sous vos yeux et de vos jours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les cris de réjouissance et les cris d’allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les chants du fiancé et les chants de la fiancée.
  - type: usfm
