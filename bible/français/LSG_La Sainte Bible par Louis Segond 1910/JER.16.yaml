document_id: JER.16,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Fléaux et captivité
  - type: heading
    content: 'V. 1-9: cf. Éz 24:15-27.'
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: text
    content: ' '
  - type: note
    content: Jé 5:19.
  - type: text
    content: Lorsque tu annonceras à ce peuple toutes ces choses,
  - type: text
    content: 'Ils te diront:'
  - type: text
    content: Pourquoi l’Éternel nous menace-t-il de tous ces grands malheurs?
  - type: text
    content: Quelle est notre iniquité?
  - type: text
    content: Quel péché avons-nous commis contre l’Éternel, notre Dieu?
  '11':
  - type: text
    content: 'Alors tu leur répondras: Vos pères m’ont abandonné, dit l’Éternel,'
  - type: text
    content: Ils sont allés après d’autres dieux,
  - type: text
    content: Ils les ont servis et se sont prosternés devant eux;
  - type: text
    content: Ils m’ont abandonné, et n’ont point observé ma loi.
  '12':
  - type: text
    content: 'Et vous, vous avez fait '
  - type: note
    content: Jé 7:26.
  - type: text
    content: le mal plus encore que vos pères;
  - type: text
    content: 'Et voici, vous suivez chacun '
  - type: note
    content: Jé 3:17; 9:14; 13:10.
  - type: text
    content: les penchants de votre mauvais cœur,
  - type: text
    content: 'Pour ne point '
  - type: note
    content: Jé 11:10; 13:10; 17:23.
  - type: text
    content: m’écouter.
  '13':
  - type: text
    content: 'Je vous transporterai '
  - type: note
    content: De 4:27; 28:64, 65.
  - type: text
    content: de ce pays
  - type: text
    content: Dans un pays que vous n’avez point connu,
  - type: text
    content: Ni vous, ni vos pères;
  - type: text
    content: Et là, vous servirez les autres dieux jour et nuit,
  - type: text
    content: Car je ne vous accorderai point de grâce.
  - type: heading
    content: 'V. 14-21: cf. (Jé 23:1-8; 32:28-38. Ro 11:25-27.) És 2:2-4.'
  '14':
  - type: text
    content: 'C’est pourquoi '
  - type: note
    content: Jé 23:7, 8.
  - type: text
    content: voici, les jours viennent, dit l’Éternel,
  - type: text
    content: 'Où l’on ne dira plus: L’Éternel est vivant,'
  - type: text
    content: Lui qui a fait monter du pays d’Égypte les enfants d’Israël!
  '15':
  - type: text
    content: 'Mais on dira: L’Éternel est vivant,'
  - type: text
    content: Lui qui a fait monter les enfants d’Israël du pays du septentrion
  - type: text
    content: Et de tous les pays où il les avait chassés!
  - type: text
    content: Je les ramènerai dans leur pays,
  - type: text
    content: Que j’avais donné à leurs pères.
  '16':
  - type: text
    content: Voici, j’envoie une multitude de pêcheurs, dit l’Éternel, et ils les pêcheront;
  - type: text
    content: Et après cela j’enverrai une multitude de chasseurs, et ils les chasseront
  - type: text
    content: De toutes les montagnes et de toutes les collines,
  - type: text
    content: Et des fentes des rochers.
  '17':
  - type: text
    content: 'Car '
  - type: note
    content: Job 34:21. Pr 5:21. Jé 32:19.
  - type: text
    content: mes yeux sont attentifs à toutes leurs voies,
  - type: text
    content: Elles ne sont point cachées devant ma face,
  - type: text
    content: Et leur iniquité ne se dérobe point à mes regards.
  '18':
  - type: text
    content: Je leur donnerai d’abord le double salaire de leur iniquité et de leur péché,
  - type: text
    content: 'Parce qu’ils ont '
  - type: note
    content: És 3:2.
  - type: text
    content: profané mon pays,
  - type: text
    content: Parce qu’ils ont rempli mon héritage
  - type: note
    content: Éz 43:7.
  - type: text
    content: Des cadavres de leurs idoles et de leurs abominations.
  '19':
  - type: text
    content: Éternel, ma force et mon appui, mon refuge au jour de la détresse!
  - type: text
    content: Les nations viendront à toi des extrémités de la terre,
  - type: text
    content: 'Et elles diront: Nos pères n’ont hérité que le mensonge,'
  - type: text
    content: De vaines idoles, qui ne servent à rien.
  '2':
  - type: text
    content: Tu ne prendras point de femme,
  - type: text
    content: Et tu n’auras dans ce lieu ni fils ni filles.
  '20':
  - type: text
    content: L’homme peut-il se faire des dieux,
  - type: text
    content: Qui ne sont pas des dieux?
  '21':
  - type: text
    content: C’est pourquoi voici, je leur fais connaître, cette fois,
  - type: text
    content: Je leur fais connaître ma puissance et ma force;
  - type: text
    content: 'Et ils sauront que '
  - type: note
    content: Jé 33:2.
  - type: text
    content: mon nom est l’Éternel.
  '3':
  - type: text
    content: Car ainsi parle l’Éternel sur les fils
  - type: text
    content: et les filles
  - type: text
    content: Qui naîtront en ce lieu,
  - type: text
    content: Sur leurs mères qui les auront enfantés,
  - type: text
    content: 'Et sur leurs pères qui les auront engendrés dans ce pays:'
  '4':
  - type: text
    content: ' '
  - type: note
    content: Jé 15:2.
  - type: text
    content: Ils mourront consumés par la maladie;
  - type: text
    content: 'On ne leur donnera ni '
  - type: note
    content: Jé 25:33.
  - type: text
    content: 'larmes ni '
  - type: note
    content: Jé 14:16.
  - type: text
    content: sépulture;
  - type: text
    content: 'Ils seront comme du '
  - type: note
    content: Jé 9:22.
  - type: text
    content: fumier sur la terre;
  - type: text
    content: Ils périront par l’épée et par la famine;
  - type: text
    content: 'Et leurs '
  - type: note
    content: Jé 7:33; 15:3; 34:20.
  - type: text
    content: cadavres serviront de pâture
  - type: text
    content: Aux oiseaux du ciel et aux bêtes de la terre.
  '5':
  - type: text
    content: 'Car ainsi parle l’Éternel:'
  - type: text
    content: N’entre pas dans une maison de deuil,
  - type: text
    content: N’y va pas pleurer, te lamenter avec eux;
  - type: text
    content: Car j’ai retiré à ce peuple ma paix, dit l’Éternel,
  - type: text
    content: Ma bonté et ma miséricorde.
  '6':
  - type: text
    content: Grands et petits mourront dans ce pays;
  - type: text
    content: On ne leur donnera point de sépulture;
  - type: text
    content: On ne les pleurera point,
  - type: text
    content: 'On ne se fera point '
  - type: note
    content: Lé 19:28. De 14:1.
  - type: text
    content: d’incisions,
  - type: text
    content: Et l’on ne se rasera pas pour eux.
  '7':
  - type: text
    content: On ne rompra pas le pain dans le deuil
  - type: text
    content: Pour consoler quelqu’un au sujet d’un mort,
  - type: text
    content: Et l’on n’offrira pas la coupe de consolation
  - type: text
    content: Pour un père ou pour une mère.
  '8':
  - type: text
    content: N’entre pas non plus dans une maison de festin,
  - type: text
    content: Pour t’asseoir avec eux,
  - type: text
    content: Pour manger et pour boire.
  '9':
  - type: text
    content: 'Car ainsi parle l’Éternel des armées, le Dieu d’Israël:'
  - type: text
    content: 'Voici, '
  - type: note
    content: És 24:7, 8. Jé 7:34; 25:10. Éz 26:13.
  - type: text
    content: je ferai cesser dans ce lieu, sous vos yeux et de vos jours,
  - type: text
    content: Les cris de réjouissance et les cris d’allégresse,
  - type: text
    content: Les chants du fiancé et les chants de la fiancée.
  - type: heading
    content: 'V. 10-13: cf. De 29:24-28. 1 R 9:6-9.'
