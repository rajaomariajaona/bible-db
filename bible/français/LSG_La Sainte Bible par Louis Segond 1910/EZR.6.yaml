document_id: EZR.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Édit de Darius
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-15: cf. (Esd 5. Za 4:9; 7; 8.) Ph 1:6. Ps 129. Ro 8:31.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors le roi Darius donna ordre de faire des recherches dans la maison des archives où l’on déposait les trésors à Babylone. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et l’on trouva à Achmetha, capitale de la province de Médie, un rouleau sur lequel était écrit le mémoire suivant: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'La première année du roi Cyrus, le roi Cyrus a donné cet ordre au sujet de la maison de Dieu à Jérusalem: Que la maison soit rebâtie, pour être un lieu où l’on offre des sacrifices, et qu’elle ait des solides fondements. Elle aura soixante coudées de hauteur, soixante coudées de largeur, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'trois rangées de pierres de taille et une rangée de bois neuf. Les frais seront payés par la maison du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'De plus, les ustensiles d’or et d’argent de la maison de Dieu, que Nebucadnetsar avait enlevés du temple de Jérusalem et transportés à Babylone, seront rendus, transportés au temple de Jérusalem à la place où ils étaient, et déposés dans la maison de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Maintenant, Thathnaï, gouverneur de l’autre côté du fleuve, Schethar-Boznaï, et vos collègues d’Apharsac, qui demeurez de l’autre côté du fleuve, tenez-vous loin de ce lieu.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Laissez continuer les travaux de cette maison de Dieu; que le gouverneur des Juifs et les anciens des Juifs la rebâtissent sur l’emplacement qu’elle occupait.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Voici l’ordre que je donne touchant ce que vous aurez à faire à l’égard de ces anciens des Juifs pour la construction de cette maison de Dieu: les frais, pris sur les biens du roi provenant des tributs de l’autre côté du fleuve, seront exactement payés à ces hommes, afin qu’il n’y ait pas d’interruption.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Les choses nécessaires pour les holocaustes du Dieu des cieux, jeunes taureaux, béliers et agneaux, froment, sel, vin et huile, seront livrées, sur leur demande, aux sacrificateurs de Jérusalem, jour par jour et sans manquer,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: it
    children:
    - type: text
      text: afin qu’ils offrent des sacrifices de bonne odeur au Dieu des cieux et qu’ils prient pour la vie du roi et de ses fils.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Et voici l’ordre que je donne touchant quiconque transgressera cette parole: on arrachera de sa maison une pièce de bois, on la dressera pour qu’il y soit attaché, et l’on fera de sa maison un tas d’immondices.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Que le Dieu qui fait résider en ce lieu son nom renverse tout roi et tout peuple qui étendraient la main pour transgresser ma parole, pour détruire cette maison de Dieu à Jérusalem! Moi, Darius, j’ai donné cet ordre. Qu’il soit ponctuellement exécuté.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Thathnaï, gouverneur de ce côté du fleuve, Schethar-Boznaï, et leurs collègues, se conformèrent ponctuellement à cet ordre que leur envoya le roi Darius. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et les anciens des Juifs bâtirent avec succès, selon les prophéties d’Aggée, le prophète, et de Zacharie, fils d’Iddo; ils bâtirent et achevèrent, d’après l’ordre du Dieu d’Israël, et d’après l’ordre de Cyrus, de Darius, et d’Artaxerxès, roi de Perse. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La maison fut achevée le troisième jour du mois d’Adar, dans la sixième année du règne du roi Darius.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dédicace du temple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-22: cf. (1 R 8. 2 Ch 7:4-10.) 2 Ch 35:1-19. (Ps 146; 148; 150.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les enfants d’Israël, les sacrificateurs et les Lévites, et le reste des fils de la captivité, firent avec joie la dédicace de cette maison de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils offrirent, pour la dédicace de cette maison de Dieu, cent taureaux, deux cents béliers, quatre cents agneaux, et, comme victimes expiatoires pour tout Israël, douze boucs, d’après le nombre des tribus d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils établirent les sacrificateurs selon leurs classes et les Lévites selon leurs divisions pour le service de Dieu à Jérusalem, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 3:6
      metadata:
        usfm: NUM.3.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '32'
      metadata:
        usfm: NUM.3.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:11
      metadata:
        usfm: NUM.8.11
    - type: text
      text: . 1 Ch 24:1, etc.
    marker-yv: yv-n
  - type: text
    text: 'comme il est écrit dans le livre de Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les fils de la captivité célébrèrent la '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ex 12:1, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 23:5
      metadata:
        usfm: LEV.23.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 28:16
      metadata:
        usfm: NUM.28.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 16:2
      metadata:
        usfm: DEU.16.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pâque le quatorzième jour du premier mois. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les sacrificateurs et les Lévites s’étaient purifiés de concert, tous étaient purs; ils immolèrent la Pâque pour tous les fils de la captivité, pour leurs frères les sacrificateurs, et pour eux-mêmes. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les enfants d’Israël revenus de la captivité mangèrent la Pâque, avec tous ceux qui s’étaient éloignés de l’impureté des nations du pays et qui se joignirent à eux pour chercher l’Éternel, le Dieu d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ils célébrèrent avec joie pendant sept jours la fête des pains sans levain, car l’Éternel les avait réjouis en disposant le roi d’Assyrie à les soutenir dans l’œuvre de la maison de Dieu, du Dieu d’Israël.
