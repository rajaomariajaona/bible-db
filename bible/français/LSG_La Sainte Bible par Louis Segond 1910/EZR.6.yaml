document_id: EZR.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Édit de Darius
  - type: heading
    content: 'V. 1-15: cf. (Esd 5. Za 4:9; 7; 8.) Ph 1:6. Ps 129. Ro 8:31.'
  - type: text
    content: 'Alors le roi Darius donna ordre de faire des recherches dans la maison des archives où l’on déposait les trésors à Babylone. '
  '10':
  - type: text
    content: afin qu’ils offrent des sacrifices de bonne odeur au Dieu des cieux et qu’ils prient pour la vie du roi et de ses fils.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Et voici l’ordre que je donne touchant quiconque transgressera cette parole: on arrachera de sa maison une pièce de bois, on la dressera pour qu’il y soit attaché, et l’on fera de sa maison un tas d’immondices.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: Que le Dieu qui fait résider en ce lieu son nom renverse tout roi et tout peuple qui étendraient la main pour transgresser ma parole, pour détruire cette maison de Dieu à Jérusalem! Moi, Darius, j’ai donné cet ordre. Qu’il soit ponctuellement exécuté.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Thathnaï, gouverneur de ce côté du fleuve, Schethar-Boznaï, et leurs collègues, se conformèrent ponctuellement à cet ordre que leur envoya le roi Darius. '
  '14':
  - type: text
    content: 'Et les anciens des Juifs bâtirent avec succès, selon les prophéties d’Aggée, le prophète, et de Zacharie, fils d’Iddo; ils bâtirent et achevèrent, d’après l’ordre du Dieu d’Israël, et d’après l’ordre de Cyrus, de Darius, et d’Artaxerxès, roi de Perse. '
  '15':
  - type: text
    content: La maison fut achevée le troisième jour du mois d’Adar, dans la sixième année du règne du roi Darius.
  - type: heading
    content: Dédicace du temple
  - type: heading
    content: 'V. 16-22: cf. (1 R 8. 2 Ch 7:4-10.) 2 Ch 35:1-19. (Ps 146; 148; 150.)'
  '16':
  - type: text
    content: 'Les enfants d’Israël, les sacrificateurs et les Lévites, et le reste des fils de la captivité, firent avec joie la dédicace de cette maison de Dieu. '
  '17':
  - type: text
    content: 'Ils offrirent, pour la dédicace de cette maison de Dieu, cent taureaux, deux cents béliers, quatre cents agneaux, et, comme victimes expiatoires pour tout Israël, douze boucs, d’après le nombre des tribus d’Israël. '
  '18':
  - type: text
    content: 'Ils établirent les sacrificateurs selon leurs classes et les Lévites selon leurs divisions pour le service de Dieu à Jérusalem, '
  - type: note
    content: No 3:6, 32; 8:11. 1 Ch 24:1, etc.
  - type: text
    content: 'comme il est écrit dans le livre de Moïse. '
  '19':
  - type: text
    content: 'Les fils de la captivité célébrèrent la '
  - type: note
    content: Ex 12:1, etc. Lé 23:5. No 28:16. De 16:2.
  - type: text
    content: 'Pâque le quatorzième jour du premier mois. '
  '2':
  - type: text
    content: 'Et l’on trouva à Achmetha, capitale de la province de Médie, un rouleau sur lequel était écrit le mémoire suivant: '
  '20':
  - type: text
    content: 'Les sacrificateurs et les Lévites s’étaient purifiés de concert, tous étaient purs; ils immolèrent la Pâque pour tous les fils de la captivité, pour leurs frères les sacrificateurs, et pour eux-mêmes. '
  '21':
  - type: text
    content: 'Les enfants d’Israël revenus de la captivité mangèrent la Pâque, avec tous ceux qui s’étaient éloignés de l’impureté des nations du pays et qui se joignirent à eux pour chercher l’Éternel, le Dieu d’Israël. '
  '22':
  - type: text
    content: Ils célébrèrent avec joie pendant sept jours la fête des pains sans levain, car l’Éternel les avait réjouis en disposant le roi d’Assyrie à les soutenir dans l’œuvre de la maison de Dieu, du Dieu d’Israël.
  '3':
  - type: text
    content: 'La première année du roi Cyrus, le roi Cyrus a donné cet ordre au sujet de la maison de Dieu à Jérusalem: Que la maison soit rebâtie, pour être un lieu où l’on offre des sacrifices, et qu’elle ait des solides fondements. Elle aura soixante coudées de hauteur, soixante coudées de largeur, '
  '4':
  - type: text
    content: 'trois rangées de pierres de taille et une rangée de bois neuf. Les frais seront payés par la maison du roi. '
  '5':
  - type: text
    content: 'De plus, les ustensiles d’or et d’argent de la maison de Dieu, que Nebucadnetsar avait enlevés du temple de Jérusalem et transportés à Babylone, seront rendus, transportés au temple de Jérusalem à la place où ils étaient, et déposés dans la maison de Dieu. '
  '6':
  - type: text
    content: Maintenant, Thathnaï, gouverneur de l’autre côté du fleuve, Schethar-Boznaï, et vos collègues d’Apharsac, qui demeurez de l’autre côté du fleuve, tenez-vous loin de ce lieu.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Laissez continuer les travaux de cette maison de Dieu; que le gouverneur des Juifs et les anciens des Juifs la rebâtissent sur l’emplacement qu’elle occupait.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Voici l’ordre que je donne touchant ce que vous aurez à faire à l’égard de ces anciens des Juifs pour la construction de cette maison de Dieu: les frais, pris sur les biens du roi provenant des tributs de l’autre côté du fleuve, seront exactement payés à ces hommes, afin qu’il n’y ait pas d’interruption.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: Les choses nécessaires pour les holocaustes du Dieu des cieux, jeunes taureaux, béliers et agneaux, froment, sel, vin et huile, seront livrées, sur leur demande, aux sacrificateurs de Jérusalem, jour par jour et sans manquer,
  - type: text
    content: ' '
