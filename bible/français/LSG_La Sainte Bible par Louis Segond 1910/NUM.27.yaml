document_id: NUM.27,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Loi sur les héritages
  - type: heading
    content: 'V. 1-11: cf. No 36. Jos 17:3, 4.'
  - type: text
    content: ' '
  - type: note
    content: No 26:33; 36:2. Jos 17:3.
  - type: text
    content: 'Les filles de Tselophchad, fils de Hépher, fils de Galaad, fils de Makir, fils de Manassé, des familles de Manassé, fils de Joseph, et dont les noms étaient Machla, Noa, Hogla, Milca et Thirtsa, '
  '10':
  - type: text
    content: 'S’il n’a point de frères, vous donnerez son héritage aux frères de son père. '
  '11':
  - type: text
    content: S’il n’y a point de frères de son père, vous donnerez son héritage au plus proche parent dans sa famille, et c’est lui qui le possédera. Ce sera pour les enfants d’Israël une loi et un droit, comme l’Éternel l’a ordonné à Moïse.
  - type: heading
    content: Josué désigné comme successeur de Moïse
  - type: heading
    content: 'V. 12-23: cf. (De 32:48-52; 34:1-8.) (De 31:7, 8, 14, 15, 23; 34:9.)'
  '12':
  - type: text
    content: ' '
  - type: note
    content: De 32:48, 49.
  - type: text
    content: 'L’Éternel dit à Moïse: Monte sur cette montagne d’Abarim, et regarde le pays que je donne aux enfants d’Israël. '
  '13':
  - type: text
    content: 'Tu le regarderas; mais toi aussi, tu seras recueilli auprès de ton peuple, '
  - type: note
    content: No 20:24.
  - type: text
    content: 'comme Aaron, ton frère, a été recueilli; '
  '14':
  - type: note
    content: No 20:12.
  - type: text
    content: 'parce que vous avez été rebelles à mon ordre, dans le désert de Tsin, lors de la contestation de l’assemblée, '
  - type: note
    content: No 20:12.
  - type: text
    content: 'et que vous ne m’avez point sanctifié à leurs yeux à l’occasion des eaux. Ce sont les eaux de contestation, à Kadès, dans le désert de Tsin. '
  '15':
  - type: text
    content: 'Moïse parla à l’Éternel, et dit: '
  '16':
  - type: text
    content: 'Que l’Éternel, '
  - type: note
    content: No 16:22. Hé 12:9.
  - type: text
    content: 'le Dieu des esprits de toute chair, établisse sur l’assemblée un homme '
  '17':
  - type: text
    content: 'qui sorte devant eux et qui entre devant eux, qui les fasse sortir et qui les fasse entrer, '
  - type: note
    content: 1 R 22:17. Mt 9:36. Mc 6:34.
  - type: text
    content: 'afin que l’assemblée de l’Éternel ne soit pas comme des brebis qui n’ont point de berger. '
  '18':
  - type: text
    content: 'L’Éternel dit à Moïse: '
  - type: note
    content: De 3:21.
  - type: text
    content: 'Prends Josué, fils de Nun, '
  - type: note
    content: De 34:9.
  - type: text
    content: 'homme en qui réside l’esprit; et tu poseras ta main sur lui. '
  '19':
  - type: text
    content: 'Tu le placeras devant le sacrificateur Éléazar et devant toute l’assemblée, et tu lui donneras des ordres sous leurs yeux. '
  '2':
  - type: text
    content: 's’approchèrent et se présentèrent devant Moïse, devant le sacrificateur Éléazar, et devant les princes et toute l’assemblée, à l’entrée de la tente d’assignation. Elles dirent: '
  '20':
  - type: text
    content: 'Tu le rendras participant de ta dignité, afin que toute l’assemblée des enfants d’Israël l’écoute. '
  '21':
  - type: text
    content: 'Il se présentera devant le sacrificateur Éléazar, qui consultera pour lui le jugement '
  - type: note
    content: Ex 28:30. Lé 8:8.
  - type: text
    content: 'de l’urim devant l’Éternel; et Josué, tous les enfants d’Israël avec lui, et toute l’assemblée, sortiront sur l’ordre d’Éléazar et entreront sur son ordre. '
  '22':
  - type: text
    content: 'Moïse fit ce que l’Éternel lui avait ordonné. Il prit Josué, et il le plaça devant le sacrificateur Éléazar et devant toute l’assemblée. '
  '23':
  - type: text
    content: Il posa ses mains sur lui, et lui donna des ordres, comme l’Éternel l’avait dit par Moïse.
  '3':
  - type: text
    content: 'Notre père '
  - type: note
    content: No 14:35; 26:64.
  - type: text
    content: 'est mort dans le désert; '
  - type: note
    content: No 16:1.
  - type: text
    content: 'il n’était pas au milieu de l’assemblée de ceux qui se révoltèrent contre l’Éternel, de l’assemblée de Koré, mais il est mort pour son péché, et il n’avait point de fils. '
  '4':
  - type: text
    content: 'Pourquoi le nom de notre père serait-il retranché du milieu de sa famille, parce qu’il n’avait point eu de fils? Donne-nous une possession parmi les frères de notre père. '
  '5':
  - type: text
    content: 'Moïse porta la cause devant l’Éternel. '
  '6':
  - type: text
    content: 'Et l’Éternel dit à Moïse: '
  '7':
  - type: text
    content: 'Les filles de Tselophchad ont raison. '
  - type: note
    content: No 36:2.
  - type: text
    content: 'Tu leur donneras en héritage une possession parmi les frères de leur père, et c’est à elles que tu feras passer l’héritage de leur père. '
  '8':
  - type: text
    content: 'Tu parleras aux enfants d’Israël, et tu diras: Lorsqu’un homme mourra sans laisser de fils, vous ferez passer son héritage à sa fille. '
  '9':
  - type: text
    content: 'S’il n’a point de fille, vous donnerez son héritage à ses frères. '
