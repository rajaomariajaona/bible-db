document_id: NUM.27,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Loi sur les héritages
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. No 36. Jos 17:3, 4.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 26:33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 36:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 17:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les filles de Tselophchad, fils de Hépher, fils de Galaad, fils de Makir, fils de Manassé, des familles de Manassé, fils de Joseph, et dont les noms étaient Machla, Noa, Hogla, Milca et Thirtsa, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il n’a point de frères, vous donnerez son héritage aux frères de son père. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: S’il n’y a point de frères de son père, vous donnerez son héritage au plus proche parent dans sa famille, et c’est lui qui le possédera. Ce sera pour les enfants d’Israël une loi et un droit, comme l’Éternel l’a ordonné à Moïse.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Josué désigné comme successeur de Moïse
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-23: cf. (De 32:48-52; 34:1-8.) (De 31:7, 8, 14, 15, 23; 34:9.)'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:48
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '49'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'L’Éternel dit à Moïse: Monte sur cette montagne d’Abarim, et regarde le pays que je donne aux enfants d’Israël. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu le regarderas; mais toi aussi, tu seras recueilli auprès de ton peuple, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 20:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme Aaron, ton frère, a été recueilli; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 20:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'parce que vous avez été rebelles à mon ordre, dans le désert de Tsin, lors de la contestation de l’assemblée, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 20:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et que vous ne m’avez point sanctifié à leurs yeux à l’occasion des eaux. Ce sont les eaux de contestation, à Kadès, dans le désert de Tsin. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse parla à l’Éternel, et dit: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que l’Éternel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 16:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le Dieu des esprits de toute chair, établisse sur l’assemblée un homme '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qui sorte devant eux et qui entre devant eux, qui les fasse sortir et qui les fasse entrer, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 22:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 9:36
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 6:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'afin que l’assemblée de l’Éternel ne soit pas comme des brebis qui n’ont point de berger. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel dit à Moïse: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 3:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Prends Josué, fils de Nun, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 34:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'homme en qui réside l’esprit; et tu poseras ta main sur lui. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu le placeras devant le sacrificateur Éléazar et devant toute l’assemblée, et tu lui donneras des ordres sous leurs yeux. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 's’approchèrent et se présentèrent devant Moïse, devant le sacrificateur Éléazar, et devant les princes et toute l’assemblée, à l’entrée de la tente d’assignation. Elles dirent: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu le rendras participant de ta dignité, afin que toute l’assemblée des enfants d’Israël l’écoute. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il se présentera devant le sacrificateur Éléazar, qui consultera pour lui le jugement '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 8:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'de l’urim devant l’Éternel; et Josué, tous les enfants d’Israël avec lui, et toute l’assemblée, sortiront sur l’ordre d’Éléazar et entreront sur son ordre. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse fit ce que l’Éternel lui avait ordonné. Il prit Josué, et il le plaça devant le sacrificateur Éléazar et devant toute l’assemblée. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il posa ses mains sur lui, et lui donna des ordres, comme l’Éternel l’avait dit par Moïse.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notre père '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 14:35
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:64
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'est mort dans le désert; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 16:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il n’était pas au milieu de l’assemblée de ceux qui se révoltèrent contre l’Éternel, de l’assemblée de Koré, mais il est mort pour son péché, et il n’avait point de fils. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pourquoi le nom de notre père serait-il retranché du milieu de sa famille, parce qu’il n’avait point eu de fils? Donne-nous une possession parmi les frères de notre père. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse porta la cause devant l’Éternel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’Éternel dit à Moïse: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les filles de Tselophchad ont raison. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 36:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu leur donneras en héritage une possession parmi les frères de leur père, et c’est à elles que tu feras passer l’héritage de leur père. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu parleras aux enfants d’Israël, et tu diras: Lorsqu’un homme mourra sans laisser de fils, vous ferez passer son héritage à sa fille. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il n’a point de fille, vous donnerez son héritage à ses frères. '
