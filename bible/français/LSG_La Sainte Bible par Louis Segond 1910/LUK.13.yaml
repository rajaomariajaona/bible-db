document_id: LUK.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Galiléens massacrés par Pilate
  - type: heading
    content: 'V. 1-5: cf. Éz 18:30-32. Ro 2:3-6; 3:22, 23. Jn 8:24.'
  - type: text
    content: 'En ce même temps, quelques personnes qui se trouvaient là racontaient à Jésus ce qui était arrivé à des Galiléens dont Pilate avait mêlé le sang avec celui de leurs sacrifices. '
  '10':
  - type: text
    content: 'Jésus enseignait dans une des synagogues, le jour du sabbat. '
  '11':
  - type: text
    content: 'Et voici, il y avait là une femme possédée d’un esprit qui la rendait infirme depuis dix-huit ans; elle était courbée, et ne pouvait pas du tout se redresser. '
  '12':
  - type: text
    content: 'Lorsqu’il la vit, Jésus lui adressa la parole, et lui dit: '
  - type: text
    content: Femme, tu es délivrée de ton infirmité.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Et il lui imposa les mains. A l’instant elle se redressa, et glorifia Dieu. '
  '14':
  - type: text
    content: 'Mais le chef de la synagogue, indigné de ce que Jésus avait opéré cette guérison un jour de sabbat, dit à la foule: '
  - type: note
    content: Ex 20:9. De 5:13. Éz 20:12.
  - type: text
    content: Il y a six jours pour travailler; venez donc vous faire guérir ces jours-là, et non pas le jour du sabbat.
  '15':
  - type: text
    content: ' '
  - type: text
    content: Hypocrites!
  - type: text
    content: ' lui répondit le Seigneur, '
  - type: note
    content: Ex 23:5. De 22:4. Lu 14:5.
  - type: text
    content: est-ce que chacun de vous, le jour du sabbat, ne détache pas de la crèche son bœuf ou son âne, pour le mener boire?
  - type: text
    content: ' '
  '16':
  - type: text
    content: Et cette femme, qui est une fille d’Abraham, et que Satan tenait liée depuis dix-huit ans, ne fallait-il pas la délivrer de cette chaîne le jour du sabbat?
  - type: text
    content: ' '
  '17':
  - type: text
    content: Tandis qu’il parlait ainsi, tous ses adversaires étaient confus, et la foule se réjouissait de toutes les choses glorieuses qu’il faisait.
  - type: heading
    content: Paraboles du grain de sénevé, et du levain
  - type: heading
    content: 'V. 18-21: cf. (Mt 13:31-33. Mc 4:30-32.)'
  '18':
  - type: text
    content: ' '
  - type: note
    content: Mt 13:31. Mc 4:30.
  - type: text
    content: 'Il dit encore: '
  - type: text
    content: A quoi le royaume de Dieu est-il semblable, et à quoi le comparerai-je?
  '19':
  - type: text
    content: ' '
  - type: text
    content: Il est semblable à un grain de sénevé qu’un homme a pris et jeté dans son jardin; il pousse, devient un arbre, et les oiseaux du ciel habitent dans ses branches.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Il leur répondit: '
  - type: text
    content: Croyez-vous que ces Galiléens fussent de plus grands pécheurs que tous les autres Galiléens, parce qu’ils ont souffert de la sorte?
  '20':
  - type: text
    content: 'Il dit encore: '
  - type: note
    content: Mt 13:33.
  - type: text
    content: A quoi comparerai-je le royaume de Dieu?
  '21':
  - type: text
    content: ' '
  - type: text
    content: Il est semblable à du levain qu’une femme a pris et mis dans trois mesures de farine, pour faire lever toute la pâte.
  - type: heading
    content: La porte étroite
  - type: heading
    content: 'V. 22-30: cf. (Mt 7:13, 14, 21-23; 8:11, 12; 19:30.)'
  '22':
  - type: text
    content: ' '
  - type: note
    content: Mt 9:35. Mc 6:6.
  - type: text
    content: 'Jésus traversait les villes et les villages, enseignant, et faisant route vers Jérusalem. '
  '23':
  - type: text
    content: 'Quelqu’un lui dit: Seigneur, n’y a-t-il que peu de gens qui soient sauvés? Il leur répondit:'
  '24':
  - type: text
    content: ' '
  - type: note
    content: Mt 7:13.
  - type: text
    content: Efforcez-vous d’entrer par la porte étroite. Car, je vous le dis, beaucoup chercheront à entrer, et ne le pourront pas.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Quand le maître de la maison se sera levé et
  - type: text
    content: ' '
  - type: note
    content: Mt 25:11. Lu 6:46.
  - type: text
    content: 'aura fermé la porte, et que vous, étant dehors, vous commencerez à frapper à la porte, en disant: Seigneur, Seigneur, ouvre-nous! Il vous répondra: Je ne sais'
  - type: text
    content: ' '
  - type: note
    content: Mt 25:12.
  - type: text
    content: d’où vous êtes.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Alors vous vous mettrez à dire: Nous avons mangé et bu devant toi, et tu as enseigné dans nos rues.'
  - type: text
    content: ' '
  '27':
  - type: note
    content: Mt 7:23.
  - type: text
    content: 'Et il répondra: Je vous le dis, je ne sais d’où vous êtes;'
  - type: text
    content: ' '
  - type: note
    content: Ps 6:9. Mt 25:12, 41.
  - type: text
    content: retirez-vous de moi, vous tous, ouvriers d’iniquité.
  - type: text
    content: ' '
  '28':
  - type: note
    content: Mt 8:12; 13:42; 24:51.
  - type: text
    content: C’est là qu’il y aura des pleurs et des grincements de dents,
  - type: text
    content: ' '
  - type: note
    content: Mt 8:11.
  - type: text
    content: quand vous verrez Abraham, Isaac et Jacob, et tous les prophètes, dans le royaume de Dieu, et que vous serez jetés dehors.
  - type: text
    content: ' '
  '29':
  - type: note
    content: És 2:2. Mal 1:11. Mt 8:11.
  - type: text
    content: Il en viendra de l’orient et de l’occident, du nord et du midi; et ils se mettront à table dans le royaume de Dieu.
  - type: text
    content: ' '
  '3':
  - type: text
    content: ' '
  - type: text
    content: Non, je vous le dis. Mais si vous ne vous repentez, vous périrez tous également.
  - type: text
    content: ' '
  '30':
  - type: note
    content: Mt 19:30; 20:16. Mc 10:31.
  - type: text
    content: Et voici, il y en a des derniers qui seront les premiers, et des premiers qui seront les derniers.
  - type: heading
    content: Hostilité d’Hérode. Crimes et châtiment de Jérusalem
  - type: heading
    content: 'V. 31-35: cf. (Mt 23:34-39. Lu 19:41-44.) Jé 6:6-15, 27-30.'
  '31':
  - type: text
    content: 'Ce même jour, quelques pharisiens vinrent lui dire: Va-t’en, pars d’ici, car Hérode veut te tuer. '
  '32':
  - type: text
    content: 'Il leur répondit: '
  - type: text
    content: 'Allez, et dites à ce renard: Voici, je chasse les démons et je fais des guérisons aujourd’hui et demain, et le troisième jour j’aurai fini.'
  '33':
  - type: text
    content: ' '
  - type: text
    content: Mais il faut que je marche aujourd’hui, demain, et le jour suivant; car il ne convient pas qu’un prophète périsse hors de Jérusalem.
  - type: text
    content: ' '
  '34':
  - type: note
    content: Mt 23:37.
  - type: text
    content: Jérusalem, Jérusalem, qui tues les prophètes et qui lapides ceux qui te sont envoyés,
  - type: text
    content: ' '
  - type: note
    content: Ps 17:8; 91:4.
  - type: text
    content: combien de fois ai-je voulu rassembler tes enfants, comme une poule rassemble sa couvée sous ses ailes, et vous ne l’avez pas voulu!
  - type: text
    content: ' '
  '35':
  - type: note
    content: Ps 69:26. És 1:7. Jé 7:34. Mi 3:12.
  - type: text
    content: 'Voici, votre maison vous sera laissée; mais, je vous le dis, vous ne me verrez plus, jusqu’à ce que vous disiez:'
  - type: text
    content: ' '
  - type: note
    content: Mt 23:38. Ac 1:20. Ps 118:26.
  - type: text
    content: Béni soit celui qui vient au nom du Seigneur!
  '4':
  - type: text
    content: Ou bien, ces dix-huit personnes sur qui est tombée la tour de Siloé et qu’elle a tuées, croyez-vous qu’elles fussent plus coupables que tous les autres habitants de Jérusalem?
  - type: text
    content: ' '
  '5':
  - type: text
    content: Non, je vous le dis. Mais si vous ne vous repentez, vous périrez tous également.
  - type: heading
    content: Parabole du figuier stérile
  - type: heading
    content: 'V. 6-9: cf. És 5:1-7. Mt 21:18, 19, 43. Ro 2:4, 5.'
  '6':
  - type: text
    content: 'Il dit aussi cette parabole: '
  - type: text
    content: Un homme avait un figuier planté dans sa vigne. Il vint pour y chercher du fruit, et il n’en trouva point.
  '7':
  - type: text
    content: ' '
  - type: text
    content: 'Alors il dit au vigneron: Voilà trois ans que je viens chercher du fruit à ce figuier, et je n’en trouve point. Coupe-le: pourquoi occupe-t-il la terre inutilement?'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Le vigneron lui répondit: Seigneur, laisse-le encore cette année; je creuserai tout autour, et j’y mettrai du fumier.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: Peut-être à l’avenir donnera-t-il du fruit; sinon, tu le couperas.
  - type: heading
    content: Guérison d’une femme le jour du sabbat
  - type: heading
    content: 'V. 10-17: cf. (Mt 12:9-13. Lu 14:1-6.) Ps 146:8.'
