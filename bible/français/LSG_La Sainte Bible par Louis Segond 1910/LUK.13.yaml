document_id: LUK.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Galiléens massacrés par Pilate
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. Éz 18:30-32. Ro 2:3-6; 3:22, 23. Jn 8:24.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'En ce même temps, quelques personnes qui se trouvaient là racontaient à Jésus ce qui était arrivé à des Galiléens dont Pilate avait mêlé le sang avec celui de leurs sacrifices. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Croyez-vous que ces Galiléens fussent de plus grands pécheurs que tous les autres Galiléens, parce qu’ils ont souffert de la sorte?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Non, je vous le dis. Mais si vous ne vous repentez, vous périrez tous également.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ou bien, ces dix-huit personnes sur qui est tombée la tour de Siloé et qu’elle a tuées, croyez-vous qu’elles fussent plus coupables que tous les autres habitants de Jérusalem?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Non, je vous le dis. Mais si vous ne vous repentez, vous périrez tous également.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parabole du figuier stérile
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-9: cf. És 5:1-7. Mt 21:18, 19, 43. Ro 2:4, 5.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il dit aussi cette parabole: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Un homme avait un figuier planté dans sa vigne. Il vint pour y chercher du fruit, et il n’en trouva point.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors il dit au vigneron: Voilà trois ans que je viens chercher du fruit à ce figuier, et je n’en trouve point. Coupe-le: pourquoi occupe-t-il la terre inutilement?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le vigneron lui répondit: Seigneur, laisse-le encore cette année; je creuserai tout autour, et j’y mettrai du fumier.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Peut-être à l’avenir donnera-t-il du fruit; sinon, tu le couperas.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison d’une femme le jour du sabbat
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-17: cf. (Mt 12:9-13. Lu 14:1-6.) Ps 146:8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus enseignait dans une des synagogues, le jour du sabbat. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et voici, il y avait là une femme possédée d’un esprit qui la rendait infirme depuis dix-huit ans; elle était courbée, et ne pouvait pas du tout se redresser. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsqu’il la vit, Jésus lui adressa la parole, et lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Femme, tu es délivrée de ton infirmité.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et il lui imposa les mains. A l’instant elle se redressa, et glorifia Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais le chef de la synagogue, indigné de ce que Jésus avait opéré cette guérison un jour de sabbat, dit à la foule: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:9
      metadata:
        usfm: EXO.20.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:13
      metadata:
        usfm: DEU.5.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 20:12
      metadata:
        usfm: EZK.20.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il y a six jours pour travailler; venez donc vous faire guérir ces jours-là, et non pas le jour du sabbat.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Hypocrites!
  - type: text
    text: ' lui répondit le Seigneur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:5
      metadata:
        usfm: EXO.23.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 22:4
      metadata:
        usfm: DEU.22.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 14:5
      metadata:
        usfm: LUK.14.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: est-ce que chacun de vous, le jour du sabbat, ne détache pas de la crèche son bœuf ou son âne, pour le mener boire?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et cette femme, qui est une fille d’Abraham, et que Satan tenait liée depuis dix-huit ans, ne fallait-il pas la délivrer de cette chaîne le jour du sabbat?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tandis qu’il parlait ainsi, tous ses adversaires étaient confus, et la foule se réjouissait de toutes les choses glorieuses qu’il faisait.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paraboles du grain de sénevé, et du levain
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-21: cf. (Mt 13:31-33. Mc 4:30-32.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:31
      metadata:
        usfm: MAT.13.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:30
      metadata:
        usfm: MRK.4.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il dit encore: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A quoi le royaume de Dieu est-il semblable, et à quoi le comparerai-je?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il est semblable à un grain de sénevé qu’un homme a pris et jeté dans son jardin; il pousse, devient un arbre, et les oiseaux du ciel habitent dans ses branches.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il dit encore: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:33
      metadata:
        usfm: MAT.13.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A quoi comparerai-je le royaume de Dieu?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il est semblable à du levain qu’une femme a pris et mis dans trois mesures de farine, pour faire lever toute la pâte.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La porte étroite
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-30: cf. (Mt 7:13, 14, 21-23; 8:11, 12; 19:30.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:35
      metadata:
        usfm: MAT.9.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:6
      metadata:
        usfm: MRK.6.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus traversait les villes et les villages, enseignant, et faisant route vers Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Quelqu’un lui dit: Seigneur, n’y a-t-il que peu de gens qui soient sauvés? Il leur répondit:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 7:13
      metadata:
        usfm: MAT.7.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Efforcez-vous d’entrer par la porte étroite. Car, je vous le dis, beaucoup chercheront à entrer, et ne le pourront pas.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quand le maître de la maison se sera levé et
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 25:11
      metadata:
        usfm: MAT.25.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 6:46
      metadata:
        usfm: LUK.6.46
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'aura fermé la porte, et que vous, étant dehors, vous commencerez à frapper à la porte, en disant: Seigneur, Seigneur, ouvre-nous! Il vous répondra: Je ne sais'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 25:12
      metadata:
        usfm: MAT.25.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: d’où vous êtes.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors vous vous mettrez à dire: Nous avons mangé et bu devant toi, et tu as enseigné dans nos rues.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 7:23
      metadata:
        usfm: MAT.7.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Et il répondra: Je vous le dis, je ne sais d’où vous êtes;'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 6:9
      metadata:
        usfm: PSA.6.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 25:12
      metadata:
        usfm: MAT.25.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '41'
      metadata:
        usfm: MAT.25.41
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: retirez-vous de moi, vous tous, ouvriers d’iniquité.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 8:12
      metadata:
        usfm: MAT.8.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:42
      metadata:
        usfm: MAT.13.42
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:51
      metadata:
        usfm: MAT.24.51
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est là qu’il y aura des pleurs et des grincements de dents,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 8:11
      metadata:
        usfm: MAT.8.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: quand vous verrez Abraham, Isaac et Jacob, et tous les prophètes, dans le royaume de Dieu, et que vous serez jetés dehors.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 2:2
      metadata:
        usfm: ISA.2.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal 1:11
      metadata:
        usfm: MAL.1.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 8:11
      metadata:
        usfm: MAT.8.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il en viendra de l’orient et de l’occident, du nord et du midi; et ils se mettront à table dans le royaume de Dieu.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 19:30
      metadata:
        usfm: MAT.19.30
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:16
      metadata:
        usfm: MAT.20.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 10:31
      metadata:
        usfm: MRK.10.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et voici, il y en a des derniers qui seront les premiers, et des premiers qui seront les derniers.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hostilité d’Hérode. Crimes et châtiment de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 31-35: cf. (Mt 23:34-39. Lu 19:41-44.) Jé 6:6-15, 27-30.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ce même jour, quelques pharisiens vinrent lui dire: Va-t’en, pars d’ici, car Hérode veut te tuer. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
