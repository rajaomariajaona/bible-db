document_id: 1SA.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Attentat de Saül contre la vie de David
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. Pr 17:17; 31:8, 9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Saül parla à Jonathan, son fils, et à tous ses serviteurs, de faire mourir David. Mais Jonathan, fils de Saül, qui avait une grande affection pour David, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'l’en informa et lui dit: Saül, mon père, cherche à te faire mourir. Sois donc sur tes gardes demain matin, reste dans un lieu retiré, et cache-toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je sortirai et je me tiendrai à côté de mon père dans le champ où tu seras; je parlerai de toi à mon père, je verrai ce qu’il dira, et je te le rapporterai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jonathan parla favorablement de David à Saül, son père: Que le roi, dit-il, ne commette pas un péché à l’égard de son serviteur David, car il n’en a point commis envers toi. Au contraire, il a agi pour ton bien; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'il a exposé sa vie, il a tué le Philistin, et l’Éternel a opéré une grande délivrance pour tout Israël. Tu l’as vu, et tu t’en es réjoui. Pourquoi pécherais-tu contre le sang innocent, et ferais-tu sans raison mourir David? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Saül écouta la voix de Jonathan, et il jura, disant: L’Éternel est vivant! David ne mourra pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Jonathan appela David, et lui rapporta toutes ces paroles; puis il l’amena auprès de Saül, en présence de qui David fut comme auparavant.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David sauvé par Mical, sa femme; fuite auprès de Samuel à Rama
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-17: cf. 1 S 18:8-11. (Ps 37:32, 33; 59.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'La guerre continuait. David marcha contre les Philistins, et se battit avec eux; il leur fit éprouver une grande défaite, et ils s’enfuirent devant lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 16:14
      metadata:
        usfm: 1SA.16.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:10
      metadata:
        usfm: 1SA.18.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors le mauvais esprit de l’Éternel fut sur Saül, qui était assis dans sa maison, sa lance à la main. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'David jouait, et Saül voulut le frapper avec sa lance contre la paroi. Mais David se détourna de lui, et Saül frappa de sa lance la paroi. David prit la fuite et s’échappa pendant la nuit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Saül envoya des gens vers la maison de David, pour le garder et le faire mourir au matin. Mais Mical, femme de David, l’en informa et lui dit: Si tu ne te sauves pas cette nuit, demain tu es mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Elle le fit descendre par la fenêtre, et David s’en alla et s’enfuit. C’est ainsi qu’il échappa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ensuite Mical prit le théraphim, qu’elle plaça dans le lit; elle mit une peau de chèvre à son chevet, et elle l’enveloppa d’une couverture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsque Saül envoya des gens pour prendre David, elle dit: Il est malade. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Saül les renvoya pour qu’ils le vissent, et il dit: Apportez-le-moi dans son lit, afin que je le fasse mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ces gens revinrent, et voici, le théraphim était dans le lit, et une peau de chèvre à son chevet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Saül dit à Mical: Pourquoi m’as-tu trompé de la sorte, et as-tu laissé partir mon ennemi qui s’est échappé? Mical répondit à Saül: Il m’a dit: Laisse moi aller, ou je te tue!'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-24: cf. 1 S 10:9-13. 2 R 1:9-15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'C’est ainsi que David prit la fuite et qu’il échappa. Il se rendit auprès de Samuel à Rama, et lui raconta tout ce que Saül lui avait fait. Puis il alla avec Samuel demeurer à Najoth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'On le rapporta à Saül, en disant: Voici, David est à Najoth, près de Rama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Saül envoya des gens pour prendre David. Ils virent une assemblée de prophètes qui prophétisaient, ayant Samuel à leur tête. L’esprit de Dieu saisit les envoyés de Saül, et ils se mirent aussi à prophétiser eux-mêmes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'On en fit rapport à Saül, qui envoya d’autres gens, et eux aussi prophétisèrent. Il en envoya encore pour la troisième fois, et ils prophétisèrent également. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Alors Saül alla lui-même à Rama. Arrivé à la grande citerne qui est à Sécou, il demanda: Où sont Samuel et David? On lui répondit: Ils sont à Najoth, près de Rama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et il se dirigea vers Najoth, près de Rama. L’esprit de Dieu fut aussi sur lui; et Saül continua son chemin en prophétisant, jusqu’à son arrivée à Najoth, près de Rama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il ôta ses vêtements, et il prophétisa aussi devant Samuel; et il se jeta nu par terre tout ce jour-là et toute la nuit. C’est pourquoi l’on dit: Saül est-il aussi parmi les prophètes?'
