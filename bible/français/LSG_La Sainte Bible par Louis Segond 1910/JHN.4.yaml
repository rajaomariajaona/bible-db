  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si vous ne voyez des miracles et des prodiges, vous ne croyez point.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'L’officier du roi lui dit: Seigneur, descends avant que mon enfant meure.'
- type: usfm
