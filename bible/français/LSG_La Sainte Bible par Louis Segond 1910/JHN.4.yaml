document_id: JHN.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La femme samaritaine
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-26: cf. És 55:1-3. Jn 7:37-39. Ap 22:17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le Seigneur sut que les pharisiens avaient appris qu’il faisait et baptisait '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:26
      metadata:
        usfm: JHN.3.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'plus de disciples que Jean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Toutefois Jésus ne baptisait pas lui-même, mais c’étaient ses disciples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors il quitta la Judée, et retourna en Galilée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Comme il fallait qu’il passât par la Samarie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'il arriva dans une ville de Samarie, nommée Sychar, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 33:19
      metadata:
        usfm: GEN.33.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 48:22
      metadata:
        usfm: GEN.48.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 24:32
      metadata:
        usfm: JOS.24.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'près du champ que Jacob avait donné à Joseph, son fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Là se trouvait le puits de Jacob. Jésus, fatigué du voyage, était assis au bord du puits. C’était environ la sixième heure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Une femme de Samarie vint puiser de l’eau. Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Donne-moi à boire.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Car ses disciples étaient allés à la ville pour acheter des vivres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La femme samaritaine lui dit: Comment toi, qui es Juif, me demandes-tu à boire, à moi qui suis une femme samaritaine? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:52
      metadata:
        usfm: LUK.9.52
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '53'
      metadata:
        usfm: LUK.9.53
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 8:48
      metadata:
        usfm: JHN.8.48
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les Juifs, en effet, n’ont pas de relations avec les Samaritains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus lui répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Si tu connaissais le don de Dieu et qui est celui qui te dit: Donne-moi à boire! Tu lui aurais toi-même demandé à boire, et il t’aurait donné de l’eau vive.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Seigneur, lui dit la femme, tu n’as rien pour puiser, et le puits est profond; d’où aurais-tu donc '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:13
      metadata:
        usfm: JER.2.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'cette eau vive? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Es-tu plus grand que notre père Jacob, qui nous a donné ce puits, et qui en a bu lui-même, ainsi que ses fils et ses troupeaux? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jésus lui répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:58
      metadata:
        usfm: JHN.6.58
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quiconque boit de cette eau aura encore soif;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:16
      metadata:
        usfm: JHN.3.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:27
      metadata:
        usfm: JHN.6.27
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '35'
      metadata:
        usfm: JHN.6.35
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '54'
      metadata:
        usfm: JHN.6.54
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais celui qui boira de l’eau que je lui donnerai n’aura jamais soif,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:38
      metadata:
        usfm: JHN.7.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et l’eau que je lui donnerai deviendra en lui une source d’eau qui jaillira jusque dans la vie éternelle.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'La femme lui dit: Seigneur, donne-moi cette eau, afin que je n’aie plus soif, et que je ne vienne plus puiser ici.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Va,
  - type: text
    text: ' lui dit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: appelle ton mari, et viens ici.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'La femme répondit: Je n’ai point de mari. Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Tu as eu raison de dire: Je n’ai point de mari.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car tu as eu cinq maris, et celui que tu as maintenant n’est pas ton mari. En cela tu as dit vrai.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Seigneur, lui dit la femme, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 7:16
      metadata:
        usfm: LUK.7.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:19
      metadata:
        usfm: LUK.24.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:14
      metadata:
        usfm: JHN.6.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je vois que tu es prophète. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nos pères ont adoré sur cette montagne; et vous dites, vous, que le lieu où il faut adorer est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 12:5
      metadata:
        usfm: DEU.12.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: DEU.12.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 9:3
      metadata:
        usfm: 1KI.9.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 7:12
      metadata:
        usfm: 2CH.7.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Femme,
  - type: text
    text: ' lui dit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: crois-moi, l’heure vient où ce ne sera ni sur cette montagne ni à Jérusalem que vous adorerez le Père.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 17:29
      metadata:
        usfm: 2KI.17.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous adorez ce que vous ne connaissez pas; nous, nous adorons ce que nous connaissons,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 12:3
      metadata:
        usfm: GEN.12.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:18
      metadata:
        usfm: GEN.18.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:18
      metadata:
        usfm: GEN.22.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:4
      metadata:
        usfm: GEN.26.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 7:14
      metadata:
        usfm: HEB.7.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car le salut vient des Juifs.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais l’heure vient, et elle est déjà venue, où les vrais adorateurs adoreront le Père en esprit et en vérité; car ce sont là les adorateurs que le Père demande.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 3:17
      metadata:
        usfm: 2CO.3.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Dieu est Esprit, et il faut que ceux qui l’adorent l’adorent en esprit et en vérité.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'La femme lui dit: Je sais que le Messie doit venir (celui qu’on appelle Christ); quand il sera venu, il nous annoncera toutes choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jésus lui dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 9:37
      metadata:
        usfm: JHN.9.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je le suis, moi qui te parle.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 27-42: cf. Ac 8:5-17, 25. (Mt 9:37, 38. 1 Co 3:5-9.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Là-dessus arrivèrent ses disciples, qui furent étonnés de ce qu’il parlait avec une femme. Toutefois aucun ne dit: Que demandes-tu? Ou: De quoi parles-tu avec elle? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors la femme, ayant laissé sa cruche, s’en alla dans la ville, et dit aux gens: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Venez voir un homme qui m’a dit tout ce que j’ai fait; ne serait-ce point le Christ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ils sortirent de la ville, et ils vinrent vers lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Pendant ce temps, les disciples le pressaient de manger, disant: Rabbi, mange. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mais il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: J’ai à manger une nourriture que vous ne connaissez pas.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les disciples se disaient donc les uns aux autres: Quelqu’un lui aurait-il apporté à manger? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ma nourriture est de faire la volonté de celui qui m’a envoyé, et d’accomplir son œuvre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne dites-vous pas qu’il y a encore quatre mois jusqu’à la moisson? Voici, je vous le dis, levez les yeux, et regardez les champs
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:37
      metadata:
        usfm: MAT.9.37
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 10:2
      metadata:
        usfm: LUK.10.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: qui déjà blanchissent pour la moisson.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui moissonne reçoit un salaire, et amasse des fruits pour la vie éternelle, afin que celui qui sème et celui qui moissonne se réjouissent ensemble.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Car en ceci ce qu’on dit est vrai: Autre est celui qui sème, et autre celui qui moissonne.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous ai envoyés moissonner ce que vous n’avez pas travaillé; d’autres ont travaillé, et vous êtes entrés dans leur travail.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Plusieurs Samaritains de cette ville crurent en Jésus à cause de cette déclaration formelle de la femme: Il m’a dit tout ce que j’ai fait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Aussi, quand les Samaritains vinrent le trouver, ils le prièrent de rester auprès d’eux. Et il resta là deux jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Un beaucoup plus grand nombre crurent à cause de sa parole; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'et ils disaient à la femme: Ce n’est plus à cause de ce que tu as dit que nous croyons; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 17:8
      metadata:
        usfm: JHN.17.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: car nous l’avons entendu nous-mêmes, et nous savons qu’il est vraiment le Sauveur du monde.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Retour de Jésus en Galilée
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 43-54: cf. Lu 7:1-10; 17:5.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Après ces deux jours, Jésus partit de là, pour se rendre en Galilée; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'car il avait déclaré lui-même '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:57
      metadata:
        usfm: MAT.13.57
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:4
      metadata:
        usfm: MRK.6.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:24
      metadata:
        usfm: LUK.4.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’un prophète n’est pas honoré dans sa propre patrie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Lorsqu’il arriva en Galilée, il fut bien reçu des Galiléens, qui avaient vu tout ce qu’il avait fait à Jérusalem pendant la fête; car eux aussi étaient allés à la fête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
