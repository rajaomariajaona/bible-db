document_id: JHN.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La femme samaritaine
  - type: heading
    content: 'V. 1-26: cf. És 55:1-3. Jn 7:37-39. Ap 22:17.'
  - type: text
    content: 'Le Seigneur sut que les pharisiens avaient appris qu’il faisait et baptisait '
  - type: note
    content: Jn 3:26.
  - type: text
    content: 'plus de disciples que Jean. '
  '10':
  - type: text
    content: 'Jésus lui répondit: '
  - type: text
    content: 'Si tu connaissais le don de Dieu et qui est celui qui te dit: Donne-moi à boire! Tu lui aurais toi-même demandé à boire, et il t’aurait donné de l’eau vive.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Seigneur, lui dit la femme, tu n’as rien pour puiser, et le puits est profond; d’où aurais-tu donc '
  - type: note
    content: Jé 2:13.
  - type: text
    content: 'cette eau vive? '
  '12':
  - type: text
    content: 'Es-tu plus grand que notre père Jacob, qui nous a donné ce puits, et qui en a bu lui-même, ainsi que ses fils et ses troupeaux? '
  '13':
  - type: text
    content: 'Jésus lui répondit: '
  - type: note
    content: Jn 6:58.
  - type: text
    content: Quiconque boit de cette eau aura encore soif;
  '14':
  - type: text
    content: ' '
  - type: note
    content: Jn 3:16; 6:27, 35, 54.
  - type: text
    content: mais celui qui boira de l’eau que je lui donnerai n’aura jamais soif,
  - type: text
    content: ' '
  - type: note
    content: Jn 7:38.
  - type: text
    content: et l’eau que je lui donnerai deviendra en lui une source d’eau qui jaillira jusque dans la vie éternelle.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'La femme lui dit: Seigneur, donne-moi cette eau, afin que je n’aie plus soif, et que je ne vienne plus puiser ici.'
  '16':
  - type: text
    content: ' '
  - type: text
    content: Va,
  - type: text
    content: ' lui dit Jésus, '
  - type: text
    content: appelle ton mari, et viens ici.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'La femme répondit: Je n’ai point de mari. Jésus lui dit: '
  - type: text
    content: 'Tu as eu raison de dire: Je n’ai point de mari.'
  '18':
  - type: text
    content: ' '
  - type: text
    content: Car tu as eu cinq maris, et celui que tu as maintenant n’est pas ton mari. En cela tu as dit vrai.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Seigneur, lui dit la femme, '
  - type: note
    content: Lu 7:16; 24:19. Jn 6:14.
  - type: text
    content: 'je vois que tu es prophète. '
  '2':
  - type: text
    content: 'Toutefois Jésus ne baptisait pas lui-même, mais c’étaient ses disciples. '
  '20':
  - type: text
    content: 'Nos pères ont adoré sur cette montagne; et vous dites, vous, que le lieu où il faut adorer est '
  - type: note
    content: De 12:5, 11. 1 R 9:3. 2 Ch 7:12.
  - type: text
    content: à Jérusalem.
  '21':
  - type: text
    content: ' '
  - type: text
    content: Femme,
  - type: text
    content: ' lui dit Jésus, '
  - type: text
    content: crois-moi, l’heure vient où ce ne sera ni sur cette montagne ni à Jérusalem que vous adorerez le Père.
  - type: text
    content: ' '
  '22':
  - type: note
    content: 2 R 17:29.
  - type: text
    content: Vous adorez ce que vous ne connaissez pas; nous, nous adorons ce que nous connaissons,
  - type: text
    content: ' '
  - type: note
    content: Ge 12:3; 18:18; 22:18; 26:4. Hé 7:14.
  - type: text
    content: car le salut vient des Juifs.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Mais l’heure vient, et elle est déjà venue, où les vrais adorateurs adoreront le Père en esprit et en vérité; car ce sont là les adorateurs que le Père demande.
  - type: text
    content: ' '
  '24':
  - type: note
    content: 2 Co 3:17.
  - type: text
    content: Dieu est Esprit, et il faut que ceux qui l’adorent l’adorent en esprit et en vérité.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'La femme lui dit: Je sais que le Messie doit venir (celui qu’on appelle Christ); quand il sera venu, il nous annoncera toutes choses. '
  '26':
  - type: text
    content: 'Jésus lui dit: '
  - type: note
    content: Jn 9:37.
  - type: text
    content: Je le suis, moi qui te parle.
  - type: heading
    content: 'V. 27-42: cf. Ac 8:5-17, 25. (Mt 9:37, 38. 1 Co 3:5-9.)'
  '27':
  - type: text
    content: 'Là-dessus arrivèrent ses disciples, qui furent étonnés de ce qu’il parlait avec une femme. Toutefois aucun ne dit: Que demandes-tu? Ou: De quoi parles-tu avec elle? '
  '28':
  - type: text
    content: 'Alors la femme, ayant laissé sa cruche, s’en alla dans la ville, et dit aux gens: '
  '29':
  - type: text
    content: 'Venez voir un homme qui m’a dit tout ce que j’ai fait; ne serait-ce point le Christ? '
  '3':
  - type: text
    content: 'Alors il quitta la Judée, et retourna en Galilée. '
  '30':
  - type: text
    content: 'Ils sortirent de la ville, et ils vinrent vers lui. '
  '31':
  - type: text
    content: 'Pendant ce temps, les disciples le pressaient de manger, disant: Rabbi, mange. '
  '32':
  - type: text
    content: 'Mais il leur dit: '
  - type: text
    content: J’ai à manger une nourriture que vous ne connaissez pas.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Les disciples se disaient donc les uns aux autres: Quelqu’un lui aurait-il apporté à manger? '
  '34':
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: Ma nourriture est de faire la volonté de celui qui m’a envoyé, et d’accomplir son œuvre.
  '35':
  - type: text
    content: ' '
  - type: text
    content: Ne dites-vous pas qu’il y a encore quatre mois jusqu’à la moisson? Voici, je vous le dis, levez les yeux, et regardez les champs
  - type: text
    content: ' '
  - type: note
    content: Mt 9:37. Lu 10:2.
  - type: text
    content: qui déjà blanchissent pour la moisson.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Celui qui moissonne reçoit un salaire, et amasse des fruits pour la vie éternelle, afin que celui qui sème et celui qui moissonne se réjouissent ensemble.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Car en ceci ce qu’on dit est vrai: Autre est celui qui sème, et autre celui qui moissonne.'
  - type: text
    content: ' '
  '38':
  - type: text
    content: Je vous ai envoyés moissonner ce que vous n’avez pas travaillé; d’autres ont travaillé, et vous êtes entrés dans leur travail.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Plusieurs Samaritains de cette ville crurent en Jésus à cause de cette déclaration formelle de la femme: Il m’a dit tout ce que j’ai fait. '
  '4':
  - type: text
    content: 'Comme il fallait qu’il passât par la Samarie, '
  '40':
  - type: text
    content: 'Aussi, quand les Samaritains vinrent le trouver, ils le prièrent de rester auprès d’eux. Et il resta là deux jours. '
  '41':
  - type: text
    content: 'Un beaucoup plus grand nombre crurent à cause de sa parole; '
  '42':
  - type: text
    content: 'et ils disaient à la femme: Ce n’est plus à cause de ce que tu as dit que nous croyons; '
  - type: note
    content: Jn 17:8.
  - type: text
    content: car nous l’avons entendu nous-mêmes, et nous savons qu’il est vraiment le Sauveur du monde.
  - type: heading
    content: Retour de Jésus en Galilée
  - type: heading
    content: 'V. 43-54: cf. Lu 7:1-10; 17:5.'
  '43':
  - type: text
    content: 'Après ces deux jours, Jésus partit de là, pour se rendre en Galilée; '
  '44':
  - type: text
    content: 'car il avait déclaré lui-même '
  - type: note
    content: Mt 13:57. Mc 6:4. Lu 4:24.
  - type: text
    content: 'qu’un prophète n’est pas honoré dans sa propre patrie. '
  '45':
  - type: text
    content: 'Lorsqu’il arriva en Galilée, il fut bien reçu des Galiléens, qui avaient vu tout ce qu’il avait fait à Jérusalem pendant la fête; car eux aussi étaient allés à la fête. '
  '46':
  - type: text
    content: 'Il retourna donc '
  - type: note
    content: Jn 2:1, 11.
  - type: text
    content: à Cana en Galilée, où il avait changé l’eau en vin.
  - type: heading
    content: Guérison du fils d’un officier du roi
  - type: text
    content: 'Il y avait à Capernaüm un officier du roi, dont le fils était malade. '
  '47':
  - type: text
    content: 'Ayant appris que Jésus était venu de Judée en Galilée, il alla vers lui, et le pria de descendre et de guérir son fils, qui était près de mourir. '
  '48':
  - type: text
    content: 'Jésus lui dit: '
  - type: note
    content: 1 Co 1:22.
  - type: text
    content: Si vous ne voyez des miracles et des prodiges, vous ne croyez point.
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'L’officier du roi lui dit: Seigneur, descends avant que mon enfant meure.'
  '5':
  - type: text
    content: 'il arriva dans une ville de Samarie, nommée Sychar, '
  - type: note
    content: Ge 33:19; 48:22. Jos 24:32.
  - type: text
    content: 'près du champ que Jacob avait donné à Joseph, son fils. '
  '50':
  - type: text
    content: ' '
  - type: text
    content: Va,
  - type: text
    content: ' lui dit Jésus, '
  - type: text
    content: ton fils vit.
  - type: text
    content: ' Et cet homme crut à la parole que Jésus lui avait dite, et il s’en alla. '
  '51':
  - type: text
    content: 'Comme déjà il descendait, ses serviteurs venant à sa rencontre, lui apportèrent cette nouvelle: Ton enfant vit. '
  '52':
  - type: text
    content: 'Il leur demanda à quelle heure il s’était trouvé mieux; et ils lui dirent: Hier, à la septième heure, la fièvre l’a quitté. '
  '53':
  - type: text
    content: 'Le père reconnut que c’était à cette heure-là que Jésus lui avait dit: Ton fils vit. Et il crut, lui et toute sa maison. '
  '54':
  - type: text
    content: Jésus fit encore ce second miracle lorsqu’il fut venu de Judée en Galilée.
  '6':
  - type: text
    content: 'Là se trouvait le puits de Jacob. Jésus, fatigué du voyage, était assis au bord du puits. C’était environ la sixième heure. '
  '7':
  - type: text
    content: 'Une femme de Samarie vint puiser de l’eau. Jésus lui dit: '
  - type: text
    content: Donne-moi à boire.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Car ses disciples étaient allés à la ville pour acheter des vivres. '
  '9':
  - type: text
    content: 'La femme samaritaine lui dit: Comment toi, qui es Juif, me demandes-tu à boire, à moi qui suis une femme samaritaine? '
  - type: note
    content: Lu 9:52, 53. Jn 8:48.
  - type: text
    content: 'Les Juifs, en effet, n’ont pas de relations avec les Samaritains. '
