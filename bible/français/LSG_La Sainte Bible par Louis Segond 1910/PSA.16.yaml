document_id: PSA.16
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: (Ac 2:22-36; 13:35-37.)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hymne de David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Garde-moi, ô Dieu! Car je cherche en toi mon refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je dis à l’Éternel: Tu es mon Seigneur,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 22:2
      metadata:
        usfm: JOB.22.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 35:7
      metadata:
        usfm: JOB.35.7
    - type: text
      text: '. Ps 50:9, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:35
      metadata:
        usfm: ROM.11.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tu es mon souverain bien!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Les saints qui sont dans le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les hommes pieux sont l’objet de toute mon affection.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'On multiplie les idoles, on court après les dieux étrangers:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne répands pas leurs libations de sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne mets pas leurs noms sur mes lèvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 3:24
      metadata:
        usfm: LAM.3.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’Éternel est mon partage et mon calice;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est toi qui m’assures mon lot;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Un héritage délicieux m’est échu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une belle possession m’est accordée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je bénis l’Éternel, mon conseiller;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La nuit même mon cœur m’exhorte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 2:25
      metadata:
        usfm: ACT.2.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: J’ai constamment l’Éternel sous mes yeux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand il est à ma droite, je ne chancelle pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aussi mon cœur est dans la joie, mon esprit dans l’allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mon corps repose en sécurité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 2:31
      metadata:
        usfm: ACT.2.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:35
      metadata:
        usfm: ACT.13.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car tu ne livreras pas mon âme au séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu ne permettras pas que ton bien-aimé voie la corruption.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tu me feras connaître le sentier de la vie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il y a d’abondantes joies devant ta face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des délices éternelles à ta droite.
