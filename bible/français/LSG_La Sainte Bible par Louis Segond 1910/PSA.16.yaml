document_id: PSA.16,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Ac 2:22-36; 13:35-37.)
  - type: text
    content: Hymne de David.
  - type: text
    content: Garde-moi, ô Dieu! Car je cherche en toi mon refuge.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ac 2:31; 13:35.
  - type: text
    content: Car tu ne livreras pas mon âme au séjour des morts,
  - type: text
    content: Tu ne permettras pas que ton bien-aimé voie la corruption.
  '11':
  - type: text
    content: Tu me feras connaître le sentier de la vie;
  - type: text
    content: Il y a d’abondantes joies devant ta face,
  - type: text
    content: Des délices éternelles à ta droite.
  '2':
  - type: text
    content: 'Je dis à l’Éternel: Tu es mon Seigneur,'
  - type: note
    content: Job 22:2; 35:7. Ps 50:9, etc. Ro 11:35.
  - type: text
    content: Tu es mon souverain bien!
  '3':
  - type: text
    content: Les saints qui sont dans le pays,
  - type: text
    content: Les hommes pieux sont l’objet de toute mon affection.
  '4':
  - type: text
    content: 'On multiplie les idoles, on court après les dieux étrangers:'
  - type: text
    content: Je ne répands pas leurs libations de sang,
  - type: text
    content: Je ne mets pas leurs noms sur mes lèvres.
  '5':
  - type: text
    content: ' '
  - type: note
    content: La 3:24.
  - type: text
    content: L’Éternel est mon partage et mon calice;
  - type: text
    content: C’est toi qui m’assures mon lot;
  '6':
  - type: text
    content: Un héritage délicieux m’est échu,
  - type: text
    content: Une belle possession m’est accordée.
  '7':
  - type: text
    content: Je bénis l’Éternel, mon conseiller;
  - type: text
    content: La nuit même mon cœur m’exhorte.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ac 2:25.
  - type: text
    content: J’ai constamment l’Éternel sous mes yeux;
  - type: text
    content: Quand il est à ma droite, je ne chancelle pas.
  '9':
  - type: text
    content: Aussi mon cœur est dans la joie, mon esprit dans l’allégresse,
  - type: text
    content: Et mon corps repose en sécurité.
