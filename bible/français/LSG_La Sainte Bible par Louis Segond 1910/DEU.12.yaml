document_id: DEU.12,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: RÉPÉTITION DES LOIS ET ORDONNANCES
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: Ch. 12 à 26. (Né 9:13, 14. Ps 119:1-4.)
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ordre de servir l’Éternel dans le lieu qu’il choisira
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-3: cf. (Ex 34:11-13. 2 R 18:1-6.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici les lois et les ordonnances que vous observerez et que vous mettrez en pratique, aussi longtemps que vous y vivrez, dans le pays dont l’Éternel, le Dieu de vos pères, vous donne la possession. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mais vous passerez le Jourdain, et vous habiterez dans le pays dont l’Éternel, votre Dieu, vous mettra en possession; il vous donnera du repos, après vous avoir délivrés de tous vos ennemis qui vous entourent, et vous vous établirez en sécurité. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Alors il y aura un lieu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 8:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que l’Éternel, votre Dieu, choisira pour y faire résider son nom. C’est là que vous présenterez tout ce que je vous ordonne, vos holocaustes, vos sacrifices, vos dîmes, vos prémices, et les offrandes choisies que vous ferez à l’Éternel pour accomplir vos vœux. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'C’est là que vous vous réjouirez devant l’Éternel, votre Dieu, vous, vos fils et vos filles, vos serviteurs et vos servantes, et le Lévite qui sera dans vos portes; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 18:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 10:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car il n’a ni part ni héritage avec vous. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Garde-toi d’offrir tes holocaustes dans tous les lieux que tu verras; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'mais tu offriras tes holocaustes au lieu que l’Éternel choisira dans l’une de tes tribus, et c’est là que tu feras tout ce que je t’ordonne. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Néanmoins, quand tu en auras le désir, tu pourras tuer du bétail et manger de la viande dans toutes tes portes, selon les bénédictions que t’accordera l’Éternel, ton Dieu; celui qui sera impur et celui qui sera pur pourront en manger, comme on mange de la gazelle et du cerf. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 9:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 7:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 15:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Seulement, vous ne mangerez pas le sang: tu le répandras sur la terre comme de l’eau. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tu ne pourras pas manger dans tes portes la dîme de ton blé, de ton moût et de ton huile, ni les premiers-nés de ton gros et de ton menu bétail, ni aucune de tes offrandes en accomplissement d’un vœu, ni tes offrandes volontaires, ni tes prémices. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Mais c’est devant l’Éternel, ton Dieu, que tu les mangeras, dans le lieu que l’Éternel, ton Dieu, choisira, toi, ton fils et ta fille, ton serviteur et ta servante, et le Lévite qui sera dans tes portes; et c’est devant l’Éternel, ton Dieu, que tu feras servir à ta joie tous les biens que tu posséderas. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Aussi longtemps que tu vivras dans ton pays, garde-toi de délaisser le Lévite. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 34:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 7:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous détruirez tous les lieux où les nations que vous allez chasser servent leurs dieux, sur les hautes montagnes, sur les collines, et sous tout arbre vert. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Lorsque l’Éternel, ton Dieu, aura élargi tes frontières, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 28:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 11:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme il te l’a promis, et que le désir de manger de la viande te fera dire: Je voudrais manger de la viande! Tu pourras en manger, selon ton désir. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Si le lieu que l’Éternel, ton Dieu, aura choisi pour y placer son nom est éloigné de toi, tu pourras tuer du gros et du menu bétail, comme je te l’ai prescrit, et tu pourras en manger dans tes portes selon ton désir. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Tu en mangeras comme on mange de la gazelle et du cerf; celui qui sera impur, et celui qui sera pur en mangeront l’un et l’autre. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Seulement, garde-toi de manger le sang, car le sang, c’est l’âme; et tu ne mangeras pas l’âme avec la chair. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Tu ne le mangeras pas: tu le répandras sur la terre comme de l’eau. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Tu ne le mangeras pas, afin que tu sois heureux, toi et tes enfants après toi, en faisant ce qui est droit aux yeux de l’Éternel. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Mais les choses que tu voudras consacrer et les offrandes que tu feras en accomplissement d’un vœu, tu iras les présenter au lieu qu’aura choisi l’Éternel. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Tu offriras tes holocaustes, la chair et le sang, sur l’autel de l’Éternel, ton Dieu; dans tes autres sacrifices, le sang sera répandu sur l’autel de l’Éternel, ton Dieu, et tu mangeras la chair. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Garde et écoute toutes ces choses que je t’ordonne, afin que tu sois heureux, toi et tes enfants après toi, à perpétuité, en faisant ce qui est bien et ce qui est droit aux yeux de l’Éternel, ton Dieu.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 29-32: cf. De 7:1-6. Jos 23. (Ph 3:17-19.)'
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Lorsque l’Éternel, ton Dieu, aura exterminé les nations que tu vas chasser devant toi, lorsque tu les auras chassées et que tu te seras établi dans leur pays, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Vous renverserez '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 2:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: leurs autels, vous briserez leurs statues, vous brûlerez au feu leurs idoles, vous abattrez les images taillées de leurs dieux, et vous ferez disparaître leurs noms de ces lieux-là.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 4-28: cf. (Lé 17:1-9. De 14:22-29; 15:19-23.) Lé 17:10-14. (Jn 4:20-24.)'
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'garde-toi de te laisser prendre au piège en les imitant, après qu’elles auront été détruites devant toi. Garde-toi de t’informer de leurs dieux et de dire: Comment ces nations servaient-elles leurs dieux? Moi aussi, je veux faire de même. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Tu n’agiras pas ainsi à l’égard de l’Éternel, ton Dieu; car elles servaient leurs dieux en faisant toutes les abominations qui sont odieuses à l’Éternel, et même elles brûlaient au feu leurs fils et leurs filles en l’honneur de leurs dieux. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Vous observerez et vous mettrez en pratique toutes les choses que je vous ordonne; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 4:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 30:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 22:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: vous n’y ajouterez rien, et vous n’en retrancherez rien.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Vous n’agirez pas ainsi à l’égard de l’Éternel, votre Dieu. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 7:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais vous le chercherez à sa demeure, et vous irez au lieu que l’Éternel, votre Dieu, choisira parmi toutes vos tribus pour y placer son nom. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'C’est là que vous présenterez vos holocaustes, vos sacrifices, vos dîmes, vos prémices, vos offrandes en accomplissement d’un vœu, vos offrandes volontaires, et les premiers-nés de votre gros et de votre menu bétail. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'C’est là que vous mangerez devant l’Éternel, votre Dieu, et que, vous et vos familles, vous ferez servir à votre joie tous les biens par lesquels l’Éternel, votre Dieu, vous aura bénis. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Vous n’agirez donc pas comme nous le faisons maintenant ici, où chacun fait ce qui lui semble bon, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'parce que vous n’êtes point encore arrivés dans le lieu de repos et dans l’héritage que l’Éternel, votre Dieu, vous donne. '
