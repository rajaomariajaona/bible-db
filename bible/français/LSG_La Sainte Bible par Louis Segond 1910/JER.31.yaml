- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Lui dont le nom est l’Éternel des armées:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Si ces lois viennent à cesser devant moi, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La race d’Israël aussi cessera pour toujours d’être une nation devant moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ainsi parle l’Éternel: Si les cieux en haut peuvent être mesurés,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si les fondements de la terre en bas peuvent être sondés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors je rejetterai toute la race d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de tout ce qu’ils ont fait, dit l’Éternel.
- type: usfm
  marker: q1
