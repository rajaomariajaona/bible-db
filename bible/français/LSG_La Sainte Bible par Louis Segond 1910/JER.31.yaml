document_id: JER.31
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-14: cf. (Jé 30:18-22; 33:6-13, 23-26.) Ps 85; 126.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: En ce temps-là, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je serai le Dieu de toutes les familles d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils seront mon peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a trouvé grâce dans le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le peuple de ceux qui ont échappé au glaive;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël marche vers son lieu de repos.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'De loin l’Éternel se montre à moi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’aime d’un amour éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pourquoi je te conserve ma bonté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je te rétablirai encore, et tu seras rétablie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vierge d’Israël!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu auras encore tes tambourins pour parure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et tu sortiras au milieu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 30:19
      metadata:
        usfm: JER.30.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: des danses joyeuses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu planteras encore des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 65:21
      metadata:
        usfm: ISA.65.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: vignes sur les montagnes de Samarie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les planteurs planteront, et cueilleront les fruits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Car le jour vient où les gardes crieront sur la montagne d’Éphraïm:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 2:2
      metadata:
        usfm: ISA.2.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: ISA.2.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 4:2
      metadata:
        usfm: MIC.4.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Levez-vous, montons à Sion, vers l’Éternel, notre Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Car ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Poussez des cris de joie sur Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éclatez d’allégresse à la tête des nations!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Élevez vos voix, chantez des louanges, et dites:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éternel, délivre ton peuple, le reste d’Israël!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Voici, je les ramène du pays du '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 3:18
      metadata:
        usfm: JER.3.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: septentrion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les rassemble des extrémités de la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parmi eux sont l’aveugle et le boiteux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La femme enceinte et celle en travail;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est une grande multitude, qui revient ici.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ils viennent en pleurant, et je les conduis au milieu de leurs supplications;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les mène vers des torrents d’eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par un chemin uni où ils ne chancellent pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je suis un père pour Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et Éphraïm est mon '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 4:22
      metadata:
        usfm: EXO.4.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: premier-né.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nations, écoutez la parole de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et publiez-la dans les îles lointaines!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dites: Celui qui a dispersé Israël le rassemblera,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il le gardera comme le berger garde son troupeau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Car l’Éternel rachète Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il le délivre de la main d’un '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 40:10
      metadata:
        usfm: ISA.40.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 49:24
      metadata:
        usfm: ISA.49.24
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: ISA.49.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: plus fort que lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils viendront, et pousseront des cris de joie sur les hauteurs de Sion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils accourront vers les biens de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le blé, le moût, l’huile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les brebis et les bœufs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Leur âme sera comme un '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 61:11
      metadata:
        usfm: ISA.61.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: jardin arrosé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils ne seront plus dans la souffrance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Alors les jeunes filles se réjouiront à la danse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les jeunes hommes et les vieillards se réjouiront aussi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je changerai leur deuil en allégresse, et je les consolerai;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je leur donnerai de la joie après leurs chagrins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je rassasierai de graisse l’âme des sacrificateurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mon peuple se rassasiera de mes biens, dit l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-22: cf. Mt 2:16-18. (Lé 26:39-45. Jé 50:4-8.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 2:17
      metadata:
        usfm: MAT.2.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: MAT.2.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: On entend des cris à Rama,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des lamentations, des larmes amères;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rachel pleure ses enfants;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle refuse d’être consolée sur ses enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils ne sont plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Retiens tes pleurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Retiens les larmes de tes yeux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il y aura un salaire pour tes œuvres, dit l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils reviendront du pays de l’ennemi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il y a de l’espérance pour ton avenir, dit l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes enfants reviendront dans leur territoire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'J’entends Éphraïm qui se lamente:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu m’as châtié, et j’ai été châtié
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme un veau qui n’est pas dompté;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 5:21
      metadata:
        usfm: LAM.5.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Fais-moi revenir, et je reviendrai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu es l’Éternel, mon Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 30:2
      metadata:
        usfm: DEU.30.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Après m’être détourné, j’éprouve du repentir;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et après avoir reconnu mes fautes, je frappe sur ma cuisse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis honteux et confus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je porte l’opprobre de ma jeunesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Éphraïm est-il donc pour moi un fils chéri,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un enfant qui fait mes délices?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car plus je parle de lui, plus encore son souvenir est en moi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Aussi mes entrailles sont émues en sa faveur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’aurai pitié de lui, dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dresse des signes, place des poteaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prends garde à la route, au chemin que tu as suivi…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reviens, vierge d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reviens dans ces villes qui sont à toi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Jusques à quand seras-tu errante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fille égarée?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car l’Éternel crée une chose nouvelle sur la terre:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: La femme recherchera l’homme.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 23-30: cf. Za 8:1-8, 11-15.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici encore ce que l’on dira dans le pays de Juda et dans ses villes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Quand j’aurai ramené leurs captifs:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Que l’Éternel te bénisse, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 50:7
      metadata:
        usfm: JER.50.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: demeure de la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Montagne sainte!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Là s’établiront Juda et toutes ses villes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les laboureurs et ceux qui conduisent les troupeaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Car je rafraîchirai l’âme altérée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je rassasierai toute âme languissante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Là-dessus je me suis réveillé, et j’ai regardé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon sommeil m’avait été agréable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Voici, les jours viennent, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où j’ensemencerai la maison d’Israël et la maison de Juda
- type: usfm
  marker: q1
  children:
  - type: text
    text: D’une semence d’hommes et d’une semence de bêtes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Et comme j’ai veillé sur eux
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour arracher, abattre, détruire, ruiner et faire du mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi je veillerai sur eux pour bâtir et pour planter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'En ces jours-là, on ne dira plus:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Éz 18:2, etc.
    marker-yv: yv-n
  - type: text
    text: Les pères ont mangé des raisins verts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les dents des enfants en ont été agacées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mais chacun mourra pour sa propre iniquité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout homme qui mangera des raisins verts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses dents en seront agacées.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 31-34: cf. (Hé 8:6-13; 10:14-18.) (Jé 32:37-40. Éz 36:24-28.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Voici, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 8:8
      metadata:
        usfm: HEB.8.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: les jours viennent, dit l’Éternel,
- type: usfm
