  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Non comme l’alliance que je traitai avec leurs pères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le jour où je les saisis par la main
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour les faire sortir du pays d’Égypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alliance qu’ils ont violée,
- type: usfm
  marker: q1
  children:
  - type: text
