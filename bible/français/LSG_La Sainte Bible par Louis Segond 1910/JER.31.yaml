document_id: JER.31,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-14: cf. (Jé 30:18-22; 33:6-13, 23-26.) Ps 85; 126.'
  - type: text
    content: En ce temps-là, dit l’Éternel,
  - type: text
    content: Je serai le Dieu de toutes les familles d’Israël,
  - type: text
    content: Et ils seront mon peuple.
  '10':
  - type: text
    content: Nations, écoutez la parole de l’Éternel,
  - type: text
    content: Et publiez-la dans les îles lointaines!
  - type: text
    content: 'Dites: Celui qui a dispersé Israël le rassemblera,'
  - type: text
    content: Et il le gardera comme le berger garde son troupeau.
  '11':
  - type: text
    content: Car l’Éternel rachète Jacob,
  - type: text
    content: 'Il le délivre de la main d’un '
  - type: note
    content: És 40:10; 49:24, 25.
  - type: text
    content: plus fort que lui.
  '12':
  - type: text
    content: Ils viendront, et pousseront des cris de joie sur les hauteurs de Sion;
  - type: text
    content: Ils accourront vers les biens de l’Éternel,
  - type: text
    content: Le blé, le moût, l’huile,
  - type: text
    content: Les brebis et les bœufs;
  - type: text
    content: 'Leur âme sera comme un '
  - type: note
    content: És 61:11.
  - type: text
    content: jardin arrosé,
  - type: text
    content: Et ils ne seront plus dans la souffrance.
  '13':
  - type: text
    content: Alors les jeunes filles se réjouiront à la danse,
  - type: text
    content: Les jeunes hommes et les vieillards se réjouiront aussi;
  - type: text
    content: Je changerai leur deuil en allégresse, et je les consolerai;
  - type: text
    content: Je leur donnerai de la joie après leurs chagrins.
  '14':
  - type: text
    content: Je rassasierai de graisse l’âme des sacrificateurs,
  - type: text
    content: Et mon peuple se rassasiera de mes biens, dit l’Éternel.
  - type: heading
    content: 'V. 15-22: cf. Mt 2:16-18. (Lé 26:39-45. Jé 50:4-8.)'
  '15':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: note
    content: Mt 2:17, 18.
  - type: text
    content: On entend des cris à Rama,
  - type: text
    content: Des lamentations, des larmes amères;
  - type: text
    content: Rachel pleure ses enfants;
  - type: text
    content: Elle refuse d’être consolée sur ses enfants,
  - type: text
    content: Car ils ne sont plus.
  '16':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Retiens tes pleurs,
  - type: text
    content: Retiens les larmes de tes yeux;
  - type: text
    content: Car il y aura un salaire pour tes œuvres, dit l’Éternel;
  - type: text
    content: Ils reviendront du pays de l’ennemi.
  '17':
  - type: text
    content: Il y a de l’espérance pour ton avenir, dit l’Éternel;
  - type: text
    content: Tes enfants reviendront dans leur territoire.
  '18':
  - type: text
    content: 'J’entends Éphraïm qui se lamente:'
  - type: text
    content: Tu m’as châtié, et j’ai été châtié
  - type: text
    content: Comme un veau qui n’est pas dompté;
  - type: note
    content: La 5:21.
  - type: text
    content: Fais-moi revenir, et je reviendrai,
  - type: text
    content: Car tu es l’Éternel, mon Dieu.
  '19':
  - type: text
    content: ' '
  - type: note
    content: De 30:2.
  - type: text
    content: Après m’être détourné, j’éprouve du repentir;
  - type: text
    content: Et après avoir reconnu mes fautes, je frappe sur ma cuisse;
  - type: text
    content: Je suis honteux et confus,
  - type: text
    content: Car je porte l’opprobre de ma jeunesse.
  '2':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Il a trouvé grâce dans le désert,
  - type: text
    content: Le peuple de ceux qui ont échappé au glaive;
  - type: text
    content: Israël marche vers son lieu de repos.
  '20':
  - type: text
    content: Éphraïm est-il donc pour moi un fils chéri,
  - type: text
    content: Un enfant qui fait mes délices?
  - type: text
    content: Car plus je parle de lui, plus encore son souvenir est en moi;
  - type: text
    content: 'Aussi mes entrailles sont émues en sa faveur:'
  - type: text
    content: J’aurai pitié de lui, dit l’Éternel.
  '21':
  - type: text
    content: Dresse des signes, place des poteaux,
  - type: text
    content: Prends garde à la route, au chemin que tu as suivi…
  - type: text
    content: Reviens, vierge d’Israël,
  - type: text
    content: Reviens dans ces villes qui sont à toi!
  '22':
  - type: text
    content: Jusques à quand seras-tu errante,
  - type: text
    content: Fille égarée?
  - type: text
    content: 'Car l’Éternel crée une chose nouvelle sur la terre:'
  - type: text
    content: La femme recherchera l’homme.
  - type: heading
    content: 'V. 23-30: cf. Za 8:1-8, 11-15.'
  '23':
  - type: text
    content: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël:'
  - type: text
    content: Voici encore ce que l’on dira dans le pays de Juda et dans ses villes,
  - type: text
    content: 'Quand j’aurai ramené leurs captifs:'
  - type: text
    content: 'Que l’Éternel te bénisse, '
  - type: note
    content: Jé 50:7.
  - type: text
    content: demeure de la justice,
  - type: text
    content: Montagne sainte!
  '24':
  - type: text
    content: Là s’établiront Juda et toutes ses villes,
  - type: text
    content: Les laboureurs et ceux qui conduisent les troupeaux.
  '25':
  - type: text
    content: Car je rafraîchirai l’âme altérée,
  - type: text
    content: Et je rassasierai toute âme languissante.
  '26':
  - type: text
    content: Là-dessus je me suis réveillé, et j’ai regardé;
  - type: text
    content: Mon sommeil m’avait été agréable.
  '27':
  - type: text
    content: Voici, les jours viennent, dit l’Éternel,
  - type: text
    content: Où j’ensemencerai la maison d’Israël et la maison de Juda
  - type: text
    content: D’une semence d’hommes et d’une semence de bêtes.
  '28':
  - type: text
    content: Et comme j’ai veillé sur eux
  - type: text
    content: Pour arracher, abattre, détruire, ruiner et faire du mal,
  - type: text
    content: Ainsi je veillerai sur eux pour bâtir et pour planter,
  - type: text
    content: Dit l’Éternel.
  '29':
  - type: text
    content: 'En ces jours-là, on ne dira plus:'
  - type: note
    content: Éz 18:2, etc.
  - type: text
    content: Les pères ont mangé des raisins verts,
  - type: text
    content: Et les dents des enfants en ont été agacées.
  '3':
  - type: text
    content: 'De loin l’Éternel se montre à moi:'
  - type: text
    content: Je t’aime d’un amour éternel;
  - type: text
    content: C’est pourquoi je te conserve ma bonté.
  '30':
  - type: text
    content: Mais chacun mourra pour sa propre iniquité;
  - type: text
    content: Tout homme qui mangera des raisins verts,
  - type: text
    content: Ses dents en seront agacées.
  - type: heading
    content: 'V. 31-34: cf. (Hé 8:6-13; 10:14-18.) (Jé 32:37-40. Éz 36:24-28.)'
  '31':
  - type: text
    content: 'Voici, '
  - type: note
    content: Hé 8:8.
  - type: text
    content: les jours viennent, dit l’Éternel,
  - type: text
    content: Où je ferai avec la maison d’Israël et la maison de Juda
  - type: text
    content: Une alliance nouvelle,
  '32':
  - type: text
    content: Non comme l’alliance que je traitai avec leurs pères,
  - type: text
    content: Le jour où je les saisis par la main
  - type: text
    content: Pour les faire sortir du pays d’Égypte,
  - type: text
    content: Alliance qu’ils ont violée,
  - type: text
    content: Quoique je fusse leur maître, dit l’Éternel.
  '33':
  - type: text
    content: Mais voici l’alliance que je ferai avec la maison d’Israël,
  - type: text
    content: 'Après ces jours-là, dit l’Éternel:'
  - type: text
    content: Je mettrai ma loi au-dedans d’eux,
  - type: text
    content: Je l’écrirai dans leur cœur;
  - type: text
    content: 'Et je serai '
  - type: note
    content: Jé 24:7; 30:22; 31:1.
  - type: text
    content: leur Dieu,
  - type: text
    content: Et ils seront mon peuple.
  '34':
  - type: text
    content: Celui-ci n’enseignera plus son prochain,
  - type: text
    content: 'Ni celui-là son frère, en disant:'
  - type: text
    content: Connaissez l’Éternel!
  - type: note
    content: És 54:13. Jn 6:45.
  - type: text
    content: Car tous me connaîtront,
  - type: text
    content: Depuis le plus petit jusqu’au plus grand, dit l’Éternel;
  - type: note
    content: Jé 33:8. Mi 7:18. Ac 10:42.
  - type: text
    content: Car je pardonnerai leur iniquité,
  - type: text
    content: Et je ne me souviendrai plus de leur péché.
  - type: heading
    content: 'V. 35-40: cf. Jé 33:20, etc. (Joë 3:17. Éz 48:35.) Ps 102:14-17.'
  '35':
  - type: text
    content: 'Ainsi parle l’Éternel, qui a fait le '
  - type: note
    content: Ge 1:16.
  - type: text
    content: soleil pour éclairer le jour,
  - type: text
    content: Qui a destiné la lune et les étoiles à éclairer la nuit,
  - type: text
    content: 'Qui soulève la '
  - type: note
    content: És 51:15.
  - type: text
    content: mer et fait mugir ses flots,
  - type: text
    content: 'Lui dont le nom est l’Éternel des armées:'
  '36':
  - type: text
    content: Si ces lois viennent à cesser devant moi, dit l’Éternel,
  - type: text
    content: La race d’Israël aussi cessera pour toujours d’être une nation devant moi.
  '37':
  - type: text
    content: 'Ainsi parle l’Éternel: Si les cieux en haut peuvent être mesurés,'
  - type: text
    content: Si les fondements de la terre en bas peuvent être sondés,
  - type: text
    content: Alors je rejetterai toute la race d’Israël,
  - type: text
    content: A cause de tout ce qu’ils ont fait, dit l’Éternel.
  '38':
  - type: text
    content: Voici, les jours viennent, dit l’Éternel,
  - type: text
    content: Où la ville sera rebâtie à l’honneur de l’Éternel,
  - type: text
    content: Depuis la tour de Hananeel jusqu’à la porte de l’angle.
  '39':
  - type: text
    content: Le cordeau s’étendra encore vis-à-vis,
  - type: text
    content: Jusqu’à la colline de Gareb,
  - type: text
    content: Et fera un circuit du côté de Goath.
  '4':
  - type: text
    content: Je te rétablirai encore, et tu seras rétablie,
  - type: text
    content: Vierge d’Israël!
  - type: text
    content: Tu auras encore tes tambourins pour parure,
  - type: text
    content: 'Et tu sortiras au milieu '
  - type: note
    content: Jé 30:19.
  - type: text
    content: des danses joyeuses.
  '40':
  - type: text
    content: Toute la vallée des cadavres et de la cendre,
  - type: text
    content: Et tous les champs jusqu’au torrent de Cédron,
  - type: text
    content: Jusqu’à l’angle de la porte des chevaux à l’orient,
  - type: text
    content: Seront consacrés à l’Éternel,
  - type: text
    content: Et ne seront plus à jamais ni renversés ni détruits.
  '5':
  - type: text
    content: 'Tu planteras encore des '
  - type: note
    content: És 65:21.
  - type: text
    content: vignes sur les montagnes de Samarie;
  - type: text
    content: Les planteurs planteront, et cueilleront les fruits.
  '6':
  - type: text
    content: 'Car le jour vient où les gardes crieront sur la montagne d’Éphraïm:'
  - type: note
    content: És 2:2, 3. Mi 4:2.
  - type: text
    content: Levez-vous, montons à Sion, vers l’Éternel, notre Dieu!
  '7':
  - type: text
    content: 'Car ainsi parle l’Éternel:'
  - type: text
    content: Poussez des cris de joie sur Jacob,
  - type: text
    content: Éclatez d’allégresse à la tête des nations!
  - type: text
    content: 'Élevez vos voix, chantez des louanges, et dites:'
  - type: text
    content: Éternel, délivre ton peuple, le reste d’Israël!
  '8':
  - type: text
    content: 'Voici, je les ramène du pays du '
  - type: note
    content: Jé 3:18.
  - type: text
    content: septentrion,
  - type: text
    content: Je les rassemble des extrémités de la terre;
  - type: text
    content: Parmi eux sont l’aveugle et le boiteux,
  - type: text
    content: La femme enceinte et celle en travail;
  - type: text
    content: C’est une grande multitude, qui revient ici.
  '9':
  - type: text
    content: Ils viennent en pleurant, et je les conduis au milieu de leurs supplications;
  - type: text
    content: Je les mène vers des torrents d’eau,
  - type: text
    content: Par un chemin uni où ils ne chancellent pas;
  - type: text
    content: Car je suis un père pour Israël,
  - type: text
    content: 'Et Éphraïm est mon '
  - type: note
    content: Ex 4:22.
  - type: text
    content: premier-né.
