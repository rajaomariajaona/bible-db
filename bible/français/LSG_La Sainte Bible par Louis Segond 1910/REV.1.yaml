  - type: usfm
    marker: wj
    children:
    - type: text
      text: celui qui est, qui était, et qui vient, le Tout-Puissant.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vision de Jean dans l’île de Patmos. Ordre d’écrire ce qu’il a vu, et d’envoyer le livre aux sept Églises d’Asie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-20: cf. Da 10:5-12, 14. Mt 17:1, 2.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moi Jean, votre frère, et qui ai part avec vous à la tribulation et au royaume et à la persévérance en Jésus, j’étais dans l’île appelée Patmos, à cause de la parole de Dieu et du témoignage de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Je fus '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 4:2
      metadata:
        usfm: REV.4.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ravi en esprit au jour du Seigneur, et j’entendis derrière moi une voix forte, comme le son d’une trompette, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'qui disait: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce que tu vois, écris-le dans un livre, et envoie-le aux sept Églises, à Éphèse, à Smyrne, à Pergame, à Thyatire, à Sardes, à Philadelphie, et à Laodicée.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je me retournai pour connaître quelle était la voix qui me parlait. Et, après m’être retourné, je vis sept chandeliers d’or, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et, au milieu des sept chandeliers, quelqu’un qui ressemblait à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
