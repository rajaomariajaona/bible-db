document_id: REV.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Titre et sujet du livre
  - type: heading
    content: 'V. 1-3: cf. Am 3:7. Ap 22:6-10.'
  - type: text
    content: 'Révélation de Jésus-Christ, que Dieu lui a donnée pour montrer à ses serviteurs les choses qui doivent arriver bientôt, et qu’il a fait connaître, par l’envoi de son ange, à son serviteur Jean, '
  '10':
  - type: text
    content: 'Je fus '
  - type: note
    content: Ap 4:2.
  - type: text
    content: 'ravi en esprit au jour du Seigneur, et j’entendis derrière moi une voix forte, comme le son d’une trompette, '
  '11':
  - type: text
    content: 'qui disait: '
  - type: text
    content: Ce que tu vois, écris-le dans un livre, et envoie-le aux sept Églises, à Éphèse, à Smyrne, à Pergame, à Thyatire, à Sardes, à Philadelphie, et à Laodicée.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Je me retournai pour connaître quelle était la voix qui me parlait. Et, après m’être retourné, je vis sept chandeliers d’or, '
  '13':
  - type: text
    content: 'et, au milieu des sept chandeliers, quelqu’un qui ressemblait à '
  - type: note
    content: Éz 1:26. Da 7:13. Ap 14:14.
  - type: text
    content: 'un fils d’homme, vêtu d’une longue robe, et '
  - type: note
    content: Ap 15:6.
  - type: text
    content: 'ayant une ceinture d’or sur la poitrine. '
  '14':
  - type: text
    content: 'Sa tête et ses cheveux étaient blancs comme de la '
  - type: note
    content: Da 7:9.
  - type: text
    content: 'laine blanche, comme de la neige; '
  - type: note
    content: Ap 19:12.
  - type: text
    content: 'ses yeux étaient comme une flamme de feu; '
  '15':
  - type: text
    content: 'ses pieds étaient semblables à de l’airain ardent, comme s’il eût été embrasé dans une fournaise; et sa voix était '
  - type: note
    content: Ap 14:2.
  - type: text
    content: 'comme le bruit de grandes eaux. '
  '16':
  - type: text
    content: 'Il avait dans sa main droite sept étoiles. De sa bouche sortait '
  - type: note
    content: És 49:2. Ép 6:17. Hé 4:12. Ap 2:16; 19:15.
  - type: text
    content: 'une épée aiguë, à deux tranchants; et son visage était comme le soleil lorsqu’il brille dans sa force. '
  '17':
  - type: text
    content: 'Quand je le vis, je tombai à ses pieds comme mort. Il posa sur moi sa main droite, en disant: '
  - type: text
    content: Ne crains point!
  - type: text
    content: ' '
  - type: note
    content: És 41:4; 44:6; 48:12.
  - type: text
    content: Je suis le premier et le dernier,
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ro 6:9.
  - type: text
    content: et le vivant. J’étais mort; et voici, je suis vivant aux siècles des siècles.
  - type: text
    content: ' '
  - type: note
    content: Job 12:14. És 22:22. Ap 3:7; 20:1.
  - type: text
    content: Je tiens les clefs de la mort et du séjour des morts.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Écris donc les choses que tu as vues, et celles qui sont, et celles qui doivent arriver après elles,
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'lequel a attesté la parole de Dieu et le témoignage de Jésus-Christ, tout ce qu’il a vu. '
  '20':
  - type: text
    content: le mystère des sept étoiles que tu as vues dans ma main droite, et des sept chandeliers d’or. Les sept étoiles sont
  - type: text
    content: ' '
  - type: note
    content: Mal 2:7.
  - type: text
    content: les anges des sept Églises, et les sept chandeliers sont les sept Églises.
  '3':
  - type: note
    content: Ap 22:7.
  - type: text
    content: 'Heureux celui qui lit et ceux qui entendent les paroles de la prophétie, et qui gardent les choses qui y sont écrites! '
  - type: note
    content: Ap 22:10.
  - type: text
    content: Car le temps est proche.
  - type: heading
    content: Dédicace aux sept Églises d’Asie
  - type: heading
    content: 'V. 4-8: cf. (2 Jn 3. 2 Co 13:13.) Ap 5:8-13. Mt 24:30, 31.'
  '4':
  - type: text
    content: 'Jean aux sept Églises qui sont en Asie: que la grâce et la paix vous soient données de la part de celui '
  - type: note
    content: Ex 3:14. Ap 1:8; 4:8; 11:17; 16:5.
  - type: text
    content: 'qui est, qui était, et qui vient, et de la part des sept esprits qui sont devant son trône, '
  '5':
  - type: text
    content: 'et de la part de Jésus-Christ, '
  - type: note
    content: És 55:4. Ap 3:14.
  - type: text
    content: 'le témoin fidèle, '
  - type: note
    content: 1 Co 15:20. Col 1:18.
  - type: text
    content: 'le premier-né des morts, et le prince des rois de la terre! A celui qui nous aime, qui nous a délivrés de nos péchés '
  - type: note
    content: Ac 20:28. Hé 9:12, 14. 1 Pi 1:19. 1 Jn 1:7. Ap 5:9.
  - type: text
    content: 'par son sang, '
  '6':
  - type: text
    content: 'et qui a fait de nous '
  - type: note
    content: 1 Pi 2:9. Ap 5:10.
  - type: text
    content: 'un royaume, '
  - type: note
    content: Ro 12:1. 1 Pi 2:5.
  - type: text
    content: 'des sacrificateurs pour Dieu son Père, à lui soient la gloire et la puissance, aux siècles des siècles! Amen! '
  '7':
  - type: text
    content: 'Voici, '
  - type: note
    content: Da 7:13. Mt 24:30; 25:31. Ac 1:11. 1 Th 1:10. 2 Th 1:10. Jud v. 14.
  - type: text
    content: 'il vient avec les nuées. Et tout œil le verra, même '
  - type: note
    content: Za 12:10. Jn 19:37.
  - type: text
    content: ceux qui l’ont percé; et toutes les tribus de la terre se lamenteront à cause de lui. Oui. Amen!
  '8':
  - type: text
    content: ' '
  - type: note
    content: És 41:4; 44:6. Ap 21:6; 22:13.
  - type: text
    content: Je suis l’alpha et l’oméga,
  - type: text
    content: ' dit le Seigneur Dieu, '
  - type: text
    content: celui qui est, qui était, et qui vient, le Tout-Puissant.
  - type: heading
    content: Vision de Jean dans l’île de Patmos. Ordre d’écrire ce qu’il a vu, et d’envoyer le livre aux sept Églises d’Asie
  - type: heading
    content: 'V. 9-20: cf. Da 10:5-12, 14. Mt 17:1, 2.'
  '9':
  - type: text
    content: 'Moi Jean, votre frère, et qui ai part avec vous à la tribulation et au royaume et à la persévérance en Jésus, j’étais dans l’île appelée Patmos, à cause de la parole de Dieu et du témoignage de Jésus. '
