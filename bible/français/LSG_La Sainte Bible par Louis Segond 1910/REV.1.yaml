    children:
    - type: text
      text: '1'
  - type: text
    text: 'Révélation de Jésus-Christ, que Dieu lui a donnée pour montrer à ses serviteurs les choses qui doivent arriver bientôt, et qu’il a fait connaître, par l’envoi de son ange, à son serviteur Jean, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'lequel a attesté la parole de Dieu et le témoignage de Jésus-Christ, tout ce qu’il a vu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 22:7
      metadata:
        usfm: REV.22.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Heureux celui qui lit et ceux qui entendent les paroles de la prophétie, et qui gardent les choses qui y sont écrites! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 22:10
      metadata:
        usfm: REV.22.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car le temps est proche.
