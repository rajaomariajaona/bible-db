document_id: ISA.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les Égyptiens et les Éthiopiens captifs du roi d’Assyrie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. És 31:1-3; 36:4-6; 37:9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’année où Tharthan, envoyé par Sargon, roi d’Assyrie, vint assiéger Asdod et s’en empara, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'en ce temps-là l’Éternel adressa la parole à Ésaïe, fils d’Amots, et lui dit: Va, détache le sac de tes reins et ôte tes souliers de tes pieds. Il fit ainsi, marcha nu et déchaussé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et l’Éternel dit: De même que mon serviteur Ésaïe marche nu et déchaussé, ce qui sera dans trois ans un signe et un présage pour l’Égypte et pour l’Éthiopie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'de même le roi d’Assyrie emmènera de l’Égypte et de l’Éthiopie captifs et exilés les jeunes hommes et les vieillards, nus et déchaussés, et le dos découvert, à la honte de l’Égypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors on sera dans l’effroi et dans la confusion, à cause de l’Éthiopie en qui l’on avait mis sa confiance, et de l’Égypte dont on se glorifiait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et les habitants de cette côte diront en ce jour: Voilà ce qu’est devenu l’objet de notre attente, sur lequel nous avions compté pour être secourus, pour être délivrés du roi d’Assyrie! Comment échapperons-nous?'
