document_id: ISA.53,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 12:38
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 10:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui a cru à ce qui nous était annoncé?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a reconnu le bras de l’Éternel?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Il a plu à l’Éternel de le briser par la souffrance…
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Après avoir livré sa vie en sacrifice pour le péché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il verra une postérité et prolongera ses jours;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’œuvre de l’Éternel prospérera entre ses mains.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: A cause du travail de son âme, il rassasiera ses regards;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par sa connaissance mon serviteur juste justifiera beaucoup d’hommes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il se chargera de leurs iniquités.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: C’est pourquoi je lui donnerai sa part avec les grands;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il partagera le butin avec les puissants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’il s’est livré lui-même à la mort,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 15:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:37
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et qu’il a été mis au nombre des malfaiteurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’il a porté les péchés de beaucoup d’hommes,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et qu’il a intercédé pour les coupables.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Il s’est élevé devant lui comme une faible plante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un rejeton qui sort d’une terre desséchée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’avait ni beauté, ni éclat pour attirer nos regards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et son aspect n’avait rien pour nous plaire.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 22:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 49:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 52:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 9:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Méprisé et abandonné des hommes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Homme de douleur et habitué à la souffrance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Semblable à celui dont on détourne le visage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous l’avons dédaigné, nous n’avons fait de lui aucun cas.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Cependant, ce sont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 8:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: nos souffrances qu’il a portées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est de nos douleurs qu’il s’est chargé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et nous l’avons considéré comme puni,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Frappé de Dieu, et humilié.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mais '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 4:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: il était blessé pour nos péchés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Brisé pour nos iniquités;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le châtiment qui nous donne la paix est tombé sur lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et c’est par ses meurtrissures que nous sommes '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: guéris.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Nous étions tous errants comme des brebis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chacun suivait sa propre voie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’Éternel a fait retomber sur lui l’iniquité de nous tous.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Il a été maltraité et opprimé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il n’a point ouvert la bouche,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:63
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:61
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Semblable à un agneau qu’on mène à la boucherie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A une brebis muette devant ceux qui la tondent;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 8:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il n’a point ouvert la bouche.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Il a été enlevé par l’angoisse et le châtiment;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et parmi ceux de sa génération, qui a cru
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il était retranché de la terre des vivants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et frappé pour les péchés de mon peuple?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: On a mis son sépulcre parmi les méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son tombeau avec le riche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quoiqu’il n’eût point commis de violence
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 3:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et qu’il n’y eût point de fraude dans sa bouche.
