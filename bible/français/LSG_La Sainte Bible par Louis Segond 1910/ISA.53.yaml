document_id: ISA.53,93
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Jn 12:38. Ro 10:16.
  - type: text
    content: Qui a cru à ce qui nous était annoncé?
  - type: text
    content: Qui a reconnu le bras de l’Éternel?
  '10':
  - type: text
    content: Il a plu à l’Éternel de le briser par la souffrance…
  - type: text
    content: Après avoir livré sa vie en sacrifice pour le péché,
  - type: text
    content: Il verra une postérité et prolongera ses jours;
  - type: text
    content: Et l’œuvre de l’Éternel prospérera entre ses mains.
  '11':
  - type: text
    content: A cause du travail de son âme, il rassasiera ses regards;
  - type: text
    content: Par sa connaissance mon serviteur juste justifiera beaucoup d’hommes,
  - type: text
    content: Et il se chargera de leurs iniquités.
  '12':
  - type: text
    content: C’est pourquoi je lui donnerai sa part avec les grands;
  - type: text
    content: Il partagera le butin avec les puissants,
  - type: text
    content: Parce qu’il s’est livré lui-même à la mort,
  - type: note
    content: Mc 15:28. Lu 22:37.
  - type: text
    content: Et qu’il a été mis au nombre des malfaiteurs,
  - type: text
    content: Parce qu’il a porté les péchés de beaucoup d’hommes,
  - type: note
    content: Lu 23:34.
  - type: text
    content: Et qu’il a intercédé pour les coupables.
  '2':
  - type: text
    content: Il s’est élevé devant lui comme une faible plante,
  - type: text
    content: Comme un rejeton qui sort d’une terre desséchée;
  - type: text
    content: Il n’avait ni beauté, ni éclat pour attirer nos regards,
  - type: text
    content: Et son aspect n’avait rien pour nous plaire.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps 22:7, 8. És 49:7; 52:14. Mc 9:12.
  - type: text
    content: Méprisé et abandonné des hommes,
  - type: text
    content: Homme de douleur et habitué à la souffrance,
  - type: text
    content: Semblable à celui dont on détourne le visage,
  - type: text
    content: Nous l’avons dédaigné, nous n’avons fait de lui aucun cas.
  '4':
  - type: text
    content: 'Cependant, ce sont '
  - type: note
    content: Mt 8:17.
  - type: text
    content: nos souffrances qu’il a portées,
  - type: text
    content: C’est de nos douleurs qu’il s’est chargé;
  - type: text
    content: Et nous l’avons considéré comme puni,
  - type: text
    content: Frappé de Dieu, et humilié.
  '5':
  - type: text
    content: 'Mais '
  - type: note
    content: Ro 4:25. 1 Co 15:3.
  - type: text
    content: il était blessé pour nos péchés,
  - type: text
    content: Brisé pour nos iniquités;
  - type: text
    content: Le châtiment qui nous donne la paix est tombé sur lui,
  - type: text
    content: 'Et c’est par ses meurtrissures que nous sommes '
  - type: note
    content: 1 Pi 2:24.
  - type: text
    content: guéris.
  '6':
  - type: text
    content: Nous étions tous errants comme des brebis,
  - type: text
    content: Chacun suivait sa propre voie;
  - type: text
    content: Et l’Éternel a fait retomber sur lui l’iniquité de nous tous.
  '7':
  - type: text
    content: Il a été maltraité et opprimé,
  - type: text
    content: Et il n’a point ouvert la bouche,
  - type: note
    content: Mt 26:63; 27:12, 14. Mc 14:61; 15:5.
  - type: text
    content: Semblable à un agneau qu’on mène à la boucherie,
  - type: text
    content: A une brebis muette devant ceux qui la tondent;
  - type: note
    content: Ac 8:32.
  - type: text
    content: Il n’a point ouvert la bouche.
  '8':
  - type: text
    content: Il a été enlevé par l’angoisse et le châtiment;
  - type: text
    content: Et parmi ceux de sa génération, qui a cru
  - type: text
    content: Qu’il était retranché de la terre des vivants
  - type: text
    content: Et frappé pour les péchés de mon peuple?
  '9':
  - type: text
    content: On a mis son sépulcre parmi les méchants,
  - type: text
    content: Son tombeau avec le riche,
  - type: text
    content: Quoiqu’il n’eût point commis de violence
  - type: note
    content: 1 Pi 2:22. 1 Jn 3:5.
  - type: text
    content: Et qu’il n’y eût point de fraude dans sa bouche.
