document_id: EZK.23,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les deux sœurs prostituées, Samarie et Jérusalem
  - type: heading
    content: 'V. 1-49: cf. Éz 16. Jé 3:6-11.'
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: text
    content: Ils ont découvert sa nudité,
  - type: text
    content: Ils ont pris ses fils et ses filles,
  - type: text
    content: Ils l’ont fait périr elle-même avec l’épée;
  - type: text
    content: Elle a été en renom parmi les femmes,
  - type: text
    content: Après les jugements exercés sur elle.
  '11':
  - type: text
    content: Sa sœur Oholiba vit cela,
  - type: text
    content: Et fut plus déréglée qu’elle dans sa passion;
  - type: text
    content: Ses prostitutions dépassèrent celles de sa sœur.
  '12':
  - type: text
    content: 'Elle s’enflamma pour les enfants de '
  - type: note
    content: 2 R 16:7.
  - type: text
    content: l’Assyrie,
  - type: text
    content: Gouverneurs et chefs, ses voisins,
  - type: text
    content: Vêtus magnifiquement,
  - type: text
    content: Cavaliers montés sur des chevaux,
  - type: text
    content: Tous jeunes et charmants.
  '13':
  - type: text
    content: Je vis qu’elle s’était souillée,
  - type: text
    content: Que l’une et l’autre avaient suivi la même voie.
  '14':
  - type: text
    content: Elle alla même plus loin dans ses prostitutions.
  - type: text
    content: Elle aperçut contre les murailles des peintures d’hommes,
  - type: text
    content: Des images de Chaldéens peints en couleur rouge,
  '15':
  - type: text
    content: Avec des ceintures autour des reins,
  - type: text
    content: Avec des turbans de couleurs variées flottant sur la tête,
  - type: text
    content: Tous ayant l’apparence de chefs,
  - type: text
    content: Et figurant des enfants de Babylone,
  - type: text
    content: De la Chaldée, leur patrie;
  '16':
  - type: text
    content: Elle s’enflamma pour eux, au premier regard,
  - type: text
    content: Et leur envoya des messagers en Chaldée.
  '17':
  - type: text
    content: Et les enfants de Babylone se rendirent auprès d’elle,
  - type: text
    content: Pour partager le lit des amours,
  - type: text
    content: Et ils la souillèrent par leurs prostitutions.
  - type: text
    content: Elle s’est souillée avec eux,
  - type: text
    content: Puis son cœur s’est détaché d’eux.
  '18':
  - type: text
    content: Elle a mis à nu son impudicité,
  - type: text
    content: Elle a découvert sa nudité;
  - type: text
    content: Et mon cœur s’est détaché d’elle,
  - type: text
    content: Comme mon cœur s’était détaché de sa sœur.
  '19':
  - type: text
    content: Elle a multiplié ses prostitutions,
  - type: text
    content: En pensant aux jours de sa jeunesse,
  - type: text
    content: Lorsqu’elle se prostituait au pays d’Égypte.
  '2':
  - type: text
    content: Fils de l’homme, il y avait deux femmes,
  - type: text
    content: Filles d’une même mère.
  '20':
  - type: text
    content: Elle s’est enflammée pour des impudiques,
  - type: text
    content: Dont la chair était comme celle des ânes,
  - type: text
    content: Et l’approche comme celle des chevaux.
  '21':
  - type: text
    content: Tu t’es souvenue des crimes de ta jeunesse,
  - type: text
    content: Lorsque les Égyptiens pressaient tes mamelles,
  - type: text
    content: A cause de ton sein virginal.
  '22':
  - type: text
    content: 'C’est pourquoi, Oholiba, ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Voici, j’excite contre toi tes amants,
  - type: text
    content: Ceux dont ton cœur s’est détaché,
  - type: text
    content: Et je les amène de toutes parts contre toi;
  '23':
  - type: text
    content: Les enfants de Babylone et tous les Chaldéens,
  - type: text
    content: Nobles, princes et seigneurs,
  - type: text
    content: Et tous les enfants de l’Assyrie avec eux,
  - type: text
    content: Jeunes et charmants,
  - type: text
    content: Tous gouverneurs et chefs,
  - type: text
    content: Chefs illustres,
  - type: text
    content: Tous montés sur des chevaux.
  '24':
  - type: text
    content: Ils marchent contre toi avec des armes, des chars et des roues,
  - type: text
    content: Et une multitude de peuples;
  - type: text
    content: Avec le grand bouclier et le petit bouclier, avec les casques,
  - type: text
    content: Ils s’avancent de toutes parts contre toi.
  - type: text
    content: Je leur remets le jugement,
  - type: text
    content: Et ils te jugeront selon leurs lois.
  '25':
  - type: text
    content: Je répands ma colère sur toi,
  - type: text
    content: Et ils te traiteront avec fureur.
  - type: text
    content: Ils te couperont le nez et les oreilles,
  - type: text
    content: Et ce qui reste de toi tombera par l’épée;
  - type: text
    content: Ils prendront tes fils et tes filles,
  - type: text
    content: Et ce qui reste de toi sera dévoré par le feu.
  '26':
  - type: text
    content: 'Ils te '
  - type: note
    content: Éz 16:39.
  - type: text
    content: dépouilleront de tes vêtements,
  - type: text
    content: Et ils enlèveront les ornements dont tu te pares.
  '27':
  - type: text
    content: Je mettrai fin à tes crimes
  - type: text
    content: Et à tes prostitutions du pays d’Égypte;
  - type: text
    content: Tu ne porteras plus tes regards vers eux,
  - type: text
    content: Tu ne penseras plus à l’Égypte.
  '28':
  - type: text
    content: 'Car ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Voici, je te livre entre les mains de ceux que tu hais,
  - type: text
    content: Entre les mains de ceux dont ton cœur s’est détaché.
  '29':
  - type: text
    content: Ils te traiteront avec haine;
  - type: text
    content: Ils enlèveront toutes tes richesses,
  - type: text
    content: 'Et te laisseront '
  - type: note
    content: Éz 16:39.
  - type: text
    content: nue, entièrement nue;
  - type: text
    content: La honte de tes impudicités sera découverte,
  - type: text
    content: De tes crimes et de tes prostitutions.
  '3':
  - type: text
    content: 'Elles se sont prostituées en '
  - type: note
    content: Éz 20:8.
  - type: text
    content: Égypte,
  - type: text
    content: Elles se sont prostituées dans leur jeunesse;
  - type: text
    content: Là leurs mamelles ont été pressées,
  - type: text
    content: Là leur sein virginal a été touché.
  '30':
  - type: text
    content: Ces choses t’arriveront,
  - type: text
    content: Parce que tu t’es prostituée aux nations,
  - type: text
    content: Parce que tu t’es souillée par leurs idoles.
  '31':
  - type: text
    content: Tu as marché dans la voie de ta sœur,
  - type: text
    content: Et je mets sa coupe dans ta main.
  '32':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Tu boiras la coupe de ta sœur,
  - type: text
    content: Tu la boiras large et profonde;
  - type: text
    content: Elle te rendra un objet de risée et de moquerie;
  - type: text
    content: Elle contient beaucoup.
  '33':
  - type: text
    content: Tu seras remplie d’ivresse et de douleur;
  - type: text
    content: C’est la coupe de désolation et de destruction,
  - type: text
    content: La coupe de ta sœur Samarie.
  '34':
  - type: text
    content: Tu la boiras, tu la videras,
  - type: text
    content: Tu la briseras en morceaux,
  - type: text
    content: Et tu te déchireras le sein.
  - type: text
    content: Car j’ai parlé,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  '35':
  - type: text
    content: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: 'Parce que tu m’as '
  - type: note
    content: Jé 2:32; 3:21; 13:25; 18:15. Éz 22:12.
  - type: text
    content: oublié,
  - type: text
    content: Parce que tu m’as rejeté derrière ton dos,
  - type: text
    content: Porte donc aussi la peine de tes crimes et de tes prostitutions.
  '36':
  - type: text
    content: 'L’Éternel me dit:'
  - type: text
    content: 'Fils de l’homme, '
  - type: note
    content: Éz 20:4; 22:2.
  - type: text
    content: jugeras-tu Ohola et Oholiba?
  - type: text
    content: Déclare-leur leurs abominations!
  '37':
  - type: text
    content: 'Elles se sont livrées à l’adultère, et il y a du sang à leurs mains:'
  - type: text
    content: Elles ont commis adultère avec leurs idoles;
  - type: text
    content: Et les enfants qu’elles m’avaient enfantés,
  - type: text
    content: 'Elles les ont fait '
  - type: note
    content: Éz 16:21; 20:26, 31.
  - type: text
    content: passer par le feu
  - type: text
    content: Pour qu’ils leur servent d’aliment.
  '38':
  - type: text
    content: 'Voici encore ce qu’elles m’ont fait:'
  - type: text
    content: Elles ont souillé mon sanctuaire dans le même jour,
  - type: text
    content: 'Et elles ont profané mes '
  - type: note
    content: Éz 22:8.
  - type: text
    content: sabbats.
  '39':
  - type: text
    content: 'Elles ont '
  - type: note
    content: Éz 16:21.
  - type: text
    content: immolé leurs enfants à leurs idoles,
  - type: text
    content: Et elles sont allées le même jour dans mon sanctuaire,
  - type: text
    content: Pour le profaner.
  - type: note
    content: 2 R 21:4, etc.
  - type: text
    content: C’est là ce qu’elles ont fait dans ma maison.
  '4':
  - type: text
    content: L’aînée s’appelait Ohola,
  - type: text
    content: Et sa sœur Oholiba;
  - type: text
    content: Elles étaient à moi,
  - type: text
    content: Et elles ont enfanté des fils et des filles.
  - type: text
    content: Ohola, c’est Samarie;
  - type: text
    content: Oholiba, c’est Jérusalem.
  '40':
  - type: text
    content: Et même elles ont fait chercher des hommes venant de loin,
  - type: text
    content: Elles leur ont envoyé des messagers, et voici, ils sont venus.
  - type: text
    content: Pour eux tu t’es lavée, tu as mis du fard à tes yeux,
  - type: text
    content: Tu t’es parée de tes ornements;
  '41':
  - type: text
    content: Tu t’es assise sur un lit magnifique,
  - type: text
    content: Devant lequel une table était dressée,
  - type: note
    content: Pr 7:17.
  - type: text
    content: Et tu as placé sur cette table mon encens et mon huile.
  '42':
  - type: text
    content: On entendait les cris d’une multitude joyeuse;
  - type: text
    content: Et parmi cette foule d’hommes
  - type: text
    content: On a fait venir du désert des Sabéens,
  - type: text
    content: Qui ont mis des bracelets aux mains des deux sœurs
  - type: text
    content: Et de superbes couronnes sur leurs têtes.
  '43':
  - type: text
    content: 'Je dis alors au sujet de celle qui a vieilli dans l’adultère:'
  - type: text
    content: Continuera-t-elle maintenant ses prostitutions, et viendra-t-on à elle?
  '44':
  - type: text
    content: Et l’on est venu vers elle comme l’on va chez une prostituée;
  - type: text
    content: C’est ainsi qu’on est allé vers Ohola et Oholiba,
  - type: text
    content: Ces femmes criminelles.
  '45':
  - type: text
    content: 'Mais des hommes justes les '
  - type: note
    content: Éz 16:38.
  - type: text
    content: jugeront,
  - type: text
    content: Comme on juge les femmes adultères,
  - type: text
    content: Comme on juge celles qui répandent le sang;
  - type: text
    content: Car elles sont adultères, et il y a du sang à leurs mains.
  '46':
  - type: text
    content: 'Car ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Je ferai monter contre elles une multitude,
  - type: text
    content: Et je les livrerai à la terreur et au pillage.
  '47':
  - type: text
    content: 'Cette multitude les '
  - type: note
    content: Éz 16:38, 40.
  - type: text
    content: lapidera,
  - type: text
    content: Et les abattra à coups d’épée;
  - type: text
    content: On tuera leurs fils et leurs filles,
  - type: text
    content: 'On '
  - type: note
    content: Éz 16:41.
  - type: text
    content: brûlera leurs maisons par le feu.
  '48':
  - type: text
    content: Je ferai cesser ainsi le crime dans le pays;
  - type: text
    content: Toutes les femmes recevront instruction,
  - type: text
    content: Et ne commettront pas de crime comme le vôtre.
  '49':
  - type: text
    content: On fera retomber votre crime sur vous,
  - type: text
    content: Et vous porterez les péchés de vos idoles.
  - type: text
    content: Et vous saurez que je suis le Seigneur, l’Éternel.
  '5':
  - type: text
    content: Ohola me fut infidèle;
  - type: text
    content: Elle s’enflamma pour ses amants,
  - type: text
    content: Les Assyriens ses voisins,
  '6':
  - type: text
    content: Vêtus d’étoffes teintes en bleu,
  - type: text
    content: Gouverneurs et chefs,
  - type: text
    content: Tous jeunes et charmants,
  - type: text
    content: Cavaliers montés sur des chevaux.
  '7':
  - type: text
    content: Elle s’est prostituée à eux,
  - type: text
    content: A toute l’élite des enfants de l’Assyrie;
  - type: text
    content: Elle s’est souillée avec tous ceux pour lesquels elle s’était enflammée,
  - type: text
    content: Elle s’est souillée avec toutes leurs idoles.
  '8':
  - type: text
    content: 'Elle n’a pas renoncé à ses prostitutions d’Égypte:'
  - type: text
    content: Car ils avaient couché avec elle dans sa jeunesse,
  - type: text
    content: Ils avaient touché son sein virginal,
  - type: text
    content: Et ils avaient répandu sur elle leurs prostitutions.
  '9':
  - type: text
    content: C’est pourquoi je l’ai livrée entre les mains de ses amants,
  - type: text
    content: 'Entre les mains des enfants de '
  - type: note
    content: 2 R 17:18.
  - type: text
    content: l’Assyrie,
  - type: text
    content: Pour lesquels elle s’était enflammée.
