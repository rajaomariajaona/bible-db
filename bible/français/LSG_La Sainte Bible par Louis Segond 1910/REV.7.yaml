document_id: REV.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les serviteurs de Dieu, les saints et les martyrs
  - type: heading
    content: 'V. 1-8: cf. És 9:3-6. (Ap 14:1-5. Ro 11:26.)'
  - type: text
    content: 'Après cela, je vis quatre anges debout aux quatre coins de la terre; ils retenaient les quatre vents de la terre, afin qu’il ne soufflât point de vent sur la terre, ni sur la mer, ni sur aucun arbre. '
  '10':
  - type: text
    content: 'Et ils criaient d’une voix forte, en disant: Le salut est à notre Dieu qui est assis sur le trône, et à l’agneau. '
  '11':
  - type: text
    content: 'Et tous les anges se tenaient autour du trône et des vieillards et des quatre êtres vivants; et ils se prosternèrent sur leurs faces devant le trône, et ils adorèrent Dieu, '
  '12':
  - type: text
    content: 'en disant: Amen! La louange, la gloire, la sagesse, l’action de grâces, l’honneur, la puissance, et la force, soient à notre Dieu, aux siècles des siècles! Amen! '
  '13':
  - type: text
    content: 'Et l’un des vieillards prit la parole et me dit: Ceux qui sont revêtus de robes blanches, qui sont-ils, et d’où sont-ils venus? '
  '14':
  - type: text
    content: 'Je lui dis: Mon seigneur, tu le sais. Et il me dit: Ce sont ceux qui viennent de la grande tribulation; ils ont lavé leurs robes, et ils les ont blanchies dans le sang de l’agneau. '
  '15':
  - type: text
    content: 'C’est pour cela qu’ils sont devant le trône de Dieu, et le servent jour et nuit dans son temple. Celui qui est assis sur le trône dressera sa tente sur eux; '
  '16':
  - type: text
    content: 'ils n’auront plus '
  - type: note
    content: És 49:10.
  - type: text
    content: 'faim, ils n’auront plus soif, et '
  - type: note
    content: Ps 121:6.
  - type: text
    content: 'le soleil ne les frappera point, ni aucune chaleur. '
  '17':
  - type: text
    content: 'Car l’agneau qui est au milieu du trône les '
  - type: note
    content: Ps 23:1.
  - type: text
    content: 'paîtra et les conduira aux sources des eaux de la vie, '
  - type: note
    content: És 25:8. Ap 21:4.
  - type: text
    content: et Dieu essuiera toute larme de leurs yeux.
  '2':
  - type: text
    content: 'Et je vis un autre ange, qui montait du côté du soleil levant, et qui tenait le sceau du Dieu vivant; il cria d’une voix forte aux quatre anges à qui il avait été donné de faire du mal à la terre et à la mer, et il dit: '
  '3':
  - type: note
    content: Ap 9:4.
  - type: text
    content: 'Ne faites point de mal à la terre, ni à la mer, ni aux arbres, jusqu’à ce que nous ayons marqué du sceau '
  - type: note
    content: Ép 9:4.
  - type: text
    content: 'le front des serviteurs de notre Dieu. '
  '4':
  - type: text
    content: 'Et j’entendis le nombre de ceux qui avaient été marqués du sceau, '
  - type: note
    content: Ap 14:1.
  - type: text
    content: 'cent quarante-quatre mille, de toutes les tribus des fils d’Israël: '
  '5':
  - type: text
    content: 'de la tribu de Juda, douze mille marqués du sceau; de la tribu de Ruben, douze mille; de la tribu de Gad, douze mille; '
  '6':
  - type: text
    content: 'de la tribu d’Aser, douze mille; de la tribu de Nephthali, douze mille; de la tribu de Manassé, douze mille; '
  '7':
  - type: text
    content: 'de la tribu de Siméon, douze mille; de la tribu de Lévi, douze mille; de la tribu d’Issacar, douze mille; '
  '8':
  - type: text
    content: de la tribu de Zabulon, douze mille; de la tribu de Joseph, douze mille; de la tribu de Benjamin, douze mille marqués du sceau.
  - type: heading
    content: 'V. 9-17: cf. (Jn 10:16. Ro 11:25.) (Ap 3:5; 5:8-10; 22:3, 4.) (Ap 21:3, 4. És 49:10.)'
  '9':
  - type: text
    content: 'Après cela, je regardai, et voici, il y avait une grande foule, que personne ne pouvait compter, de toute nation, de toute tribu, de tout peuple, et de toute langue. Ils se tenaient devant le trône et devant l’agneau, revêtus de robes blanches, et des palmes dans leurs mains. '
