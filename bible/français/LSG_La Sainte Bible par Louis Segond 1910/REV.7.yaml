document_id: REV.7,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les serviteurs de Dieu, les saints et les martyrs
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. És 9:3-6. (Ap 14:1-5. Ro 11:26.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, je vis quatre anges debout aux quatre coins de la terre; ils retenaient les quatre vents de la terre, afin qu’il ne soufflât point de vent sur la terre, ni sur la mer, ni sur aucun arbre. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ils criaient d’une voix forte, en disant: Le salut est à notre Dieu qui est assis sur le trône, et à l’agneau. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et tous les anges se tenaient autour du trône et des vieillards et des quatre êtres vivants; et ils se prosternèrent sur leurs faces devant le trône, et ils adorèrent Dieu, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'en disant: Amen! La louange, la gloire, la sagesse, l’action de grâces, l’honneur, la puissance, et la force, soient à notre Dieu, aux siècles des siècles! Amen! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’un des vieillards prit la parole et me dit: Ceux qui sont revêtus de robes blanches, qui sont-ils, et d’où sont-ils venus? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je lui dis: Mon seigneur, tu le sais. Et il me dit: Ce sont ceux qui viennent de la grande tribulation; ils ont lavé leurs robes, et ils les ont blanchies dans le sang de l’agneau. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pour cela qu’ils sont devant le trône de Dieu, et le servent jour et nuit dans son temple. Celui qui est assis sur le trône dressera sa tente sur eux; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ils n’auront plus '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 49:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'faim, ils n’auront plus soif, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 121:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le soleil ne les frappera point, ni aucune chaleur. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car l’agneau qui est au milieu du trône les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 23:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'paîtra et les conduira aux sources des eaux de la vie, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 25:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 21:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: et Dieu essuiera toute larme de leurs yeux.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et je vis un autre ange, qui montait du côté du soleil levant, et qui tenait le sceau du Dieu vivant; il cria d’une voix forte aux quatre anges à qui il avait été donné de faire du mal à la terre et à la mer, et il dit: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 9:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ne faites point de mal à la terre, ni à la mer, ni aux arbres, jusqu’à ce que nous ayons marqué du sceau '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ép 9:4.
      marker-yv: yv-n
    - type: text
      text: 'le front des serviteurs de notre Dieu. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et j’entendis le nombre de ceux qui avaient été marqués du sceau, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 14:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'cent quarante-quatre mille, de toutes les tribus des fils d’Israël: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de la tribu de Juda, douze mille marqués du sceau; de la tribu de Ruben, douze mille; de la tribu de Gad, douze mille; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de la tribu d’Aser, douze mille; de la tribu de Nephthali, douze mille; de la tribu de Manassé, douze mille; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de la tribu de Siméon, douze mille; de la tribu de Lévi, douze mille; de la tribu d’Issacar, douze mille; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: de la tribu de Zabulon, douze mille; de la tribu de Joseph, douze mille; de la tribu de Benjamin, douze mille marqués du sceau.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-17: cf. (Jn 10:16. Ro 11:25.) (Ap 3:5; 5:8-10; 22:3, 4.) (Ap 21:3, 4. És 49:10.)'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, je regardai, et voici, il y avait une grande foule, que personne ne pouvait compter, de toute nation, de toute tribu, de tout peuple, et de toute langue. Ils se tenaient devant le trône et devant l’agneau, revêtus de robes blanches, et des palmes dans leurs mains. '
