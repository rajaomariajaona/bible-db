document_id: ISA.15,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie contre Moab
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: '15 v. 1 à 16 v. 14: cf. (Jé 48. Éz 25:8-11. Am 2:1-3.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 48:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 25:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 2:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Oracle sur Moab.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La nuit même où elle est ravagée, Ar-Moab est détruite!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La nuit même où elle est ravagée, Kir-Moab est détruite!…
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: On monte au temple et à Dibon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur les hauts lieux, pour pleurer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Moab est en lamentations, sur Nebo et sur Médeba:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 48:37
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 7:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Toutes les têtes sont rasées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les barbes sont coupées.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Dans les rues, ils sont couverts de sacs;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur les toits et dans les places,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout gémit et fond en larmes.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Hesbon et Élealé poussent des cris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On entend leur voix jusqu’à Jahats;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même les guerriers de Moab se lamentent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont l’effroi dans l’âme.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mon cœur gémit sur Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dont les fugitifs se sauvent jusqu’à Tsoar,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à Églath-Schelischija;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils font, en pleurant, la montée de Luchith,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils jettent des cris de détresse sur le chemin de Choronaïm;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Car les eaux de Nimrim sont ravagées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’herbe est desséchée, le gazon est détruit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La verdure a disparu.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: C’est pourquoi ils ramassent ce qui leur reste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils transportent leurs biens au-delà du torrent des saules.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Car les cris environnent les frontières de Moab;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses lamentations retentissent jusqu’à Églaïm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses lamentations retentissent jusqu’à Beer-Élim.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Les eaux de Dimon sont pleines de sang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’enverrai sur Dimon de nouveaux malheurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un lion contre les réchappés de Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre le reste du pays.
