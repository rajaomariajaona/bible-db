  - type: text
    text: Oracle sur Moab.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La nuit même où elle est ravagée, Ar-Moab est détruite!
- type: usfm
  marker: q1
  children:
  - type: text
    text: La nuit même où elle est ravagée, Kir-Moab est détruite!…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: On monte au temple et à Dibon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur les hauts lieux, pour pleurer;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Moab est en lamentations, sur Nebo et sur Médeba:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 48:37
      metadata:
        usfm: JER.48.37
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 7:18
      metadata:
        usfm: EZK.7.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Toutes les têtes sont rasées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutes les barbes sont coupées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dans les rues, ils sont couverts de sacs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur les toits et dans les places,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout gémit et fond en larmes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hesbon et Élealé poussent des cris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: On entend leur voix jusqu’à Jahats;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même les guerriers de Moab se lamentent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont l’effroi dans l’âme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mon cœur gémit sur Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dont les fugitifs se sauvent jusqu’à Tsoar,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à Églath-Schelischija;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils font, en pleurant, la montée de Luchith,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils jettent des cris de détresse sur le chemin de Choronaïm;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Car les eaux de Nimrim sont ravagées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’herbe est desséchée, le gazon est détruit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La verdure a disparu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: C’est pourquoi ils ramassent ce qui leur reste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils transportent leurs biens au-delà du torrent des saules.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Car les cris environnent les frontières de Moab;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses lamentations retentissent jusqu’à Églaïm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses lamentations retentissent jusqu’à Beer-Élim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les eaux de Dimon sont pleines de sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’enverrai sur Dimon de nouveaux malheurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un lion contre les réchappés de Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre le reste du pays.
