document_id: ISA.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie contre Moab
  - type: heading
    content: '15 v. 1 à 16 v. 14: cf. (Jé 48. Éz 25:8-11. Am 2:1-3.)'
  - type: text
    content: ' '
  - type: note
    content: Jé 48:1. Éz 25:8. Am 2:1.
  - type: text
    content: Oracle sur Moab.
  - type: text
    content: La nuit même où elle est ravagée, Ar-Moab est détruite!
  - type: text
    content: La nuit même où elle est ravagée, Kir-Moab est détruite!…
  '2':
  - type: text
    content: On monte au temple et à Dibon,
  - type: text
    content: Sur les hauts lieux, pour pleurer;
  - type: text
    content: 'Moab est en lamentations, sur Nebo et sur Médeba:'
  - type: note
    content: Jé 48:37. Éz 7:18.
  - type: text
    content: Toutes les têtes sont rasées,
  - type: text
    content: Toutes les barbes sont coupées.
  '3':
  - type: text
    content: Dans les rues, ils sont couverts de sacs;
  - type: text
    content: Sur les toits et dans les places,
  - type: text
    content: Tout gémit et fond en larmes.
  '4':
  - type: text
    content: Hesbon et Élealé poussent des cris,
  - type: text
    content: On entend leur voix jusqu’à Jahats;
  - type: text
    content: Même les guerriers de Moab se lamentent,
  - type: text
    content: Ils ont l’effroi dans l’âme.
  '5':
  - type: text
    content: Mon cœur gémit sur Moab,
  - type: text
    content: Dont les fugitifs se sauvent jusqu’à Tsoar,
  - type: text
    content: Jusqu’à Églath-Schelischija;
  - type: text
    content: Car ils font, en pleurant, la montée de Luchith,
  - type: text
    content: Et ils jettent des cris de détresse sur le chemin de Choronaïm;
  '6':
  - type: text
    content: Car les eaux de Nimrim sont ravagées,
  - type: text
    content: L’herbe est desséchée, le gazon est détruit,
  - type: text
    content: La verdure a disparu.
  '7':
  - type: text
    content: C’est pourquoi ils ramassent ce qui leur reste,
  - type: text
    content: Et ils transportent leurs biens au-delà du torrent des saules.
  '8':
  - type: text
    content: Car les cris environnent les frontières de Moab;
  - type: text
    content: Ses lamentations retentissent jusqu’à Églaïm,
  - type: text
    content: Ses lamentations retentissent jusqu’à Beer-Élim.
  '9':
  - type: text
    content: Les eaux de Dimon sont pleines de sang,
  - type: text
    content: Et j’enverrai sur Dimon de nouveaux malheurs,
  - type: text
    content: Un lion contre les réchappés de Moab,
  - type: text
    content: Contre le reste du pays.
