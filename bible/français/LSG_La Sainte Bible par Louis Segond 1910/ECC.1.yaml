document_id: ECC.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-11: cf. Ec 12:10-12. Ro 8:20, 22.'
  - type: text
    content: 'Paroles de l’Ecclésiaste, fils de David, roi de Jérusalem. '
  '10':
  - type: text
    content: 'S’il est une chose dont on dise: Vois ceci, c’est nouveau! Cette chose existait déjà dans les siècles qui nous ont précédés. '
  '11':
  - type: text
    content: On ne se souvient pas de ce qui est ancien; et ce qui arrivera dans la suite ne laissera pas de souvenir chez ceux qui vivront plus tard.
  - type: heading
    content: 'V. 12-18: cf. 1 R 4:29, etc. Ec 8:16, 17.'
  '12':
  - type: text
    content: 'Moi, l’Ecclésiaste, j’ai été roi d’Israël à Jérusalem. '
  '13':
  - type: text
    content: 'J’ai appliqué mon cœur à rechercher et à sonder par la sagesse tout ce qui se fait sous les cieux: c’est là une occupation pénible, à laquelle Dieu soumet les fils de l’homme. '
  '14':
  - type: text
    content: 'J’ai vu tout ce qui se fait sous le soleil; et voici, tout est vanité et poursuite du vent. '
  '15':
  - type: text
    content: 'Ce qui est courbé ne peut se redresser, et ce qui manque ne peut être compté. '
  '16':
  - type: text
    content: 'J’ai dit en mon cœur: Voici, j’ai grandi et surpassé en sagesse tous ceux qui ont dominé avant moi sur Jérusalem, et mon cœur a vu beaucoup de sagesse et de science. '
  '17':
  - type: text
    content: 'J’ai appliqué mon cœur à connaître la sagesse, et à connaître la sottise et la folie; j’ai compris que cela aussi c’est la poursuite du vent. '
  '18':
  - type: text
    content: Car avec beaucoup de sagesse on a beaucoup de chagrin, et celui qui augmente sa science augmente sa douleur.
  '2':
  - type: text
    content: 'Vanité des vanités, dit l’Ecclésiaste, vanité des vanités, '
  - type: note
    content: Ps 62:10; 144:4.
  - type: text
    content: 'tout est vanité. '
  '3':
  - type: note
    content: Ec 2:22; 3:9.
  - type: text
    content: 'Quel avantage revient-il à l’homme de toute la peine qu’il se donne sous le soleil? '
  '4':
  - type: text
    content: 'Une génération s’en va, une autre vient, '
  - type: note
    content: Ps 104:5.
  - type: text
    content: 'et la terre subsiste toujours. '
  '5':
  - type: text
    content: 'Le soleil se lève, le soleil se couche; il soupire après le lieu d’où il se lève de nouveau. '
  '6':
  - type: text
    content: 'Le vent se dirige vers le midi, tourne vers le nord; puis il tourne encore, et reprend les mêmes circuits. '
  '7':
  - type: note
    content: Job 38:8, 9, 10, 11. Ps 104:9, 10.
  - type: text
    content: 'Tous les fleuves vont à la mer, et la mer n’est point remplie; ils continuent à aller vers le lieu où ils se dirigent. '
  '8':
  - type: text
    content: 'Toutes choses sont en travail au-delà de ce qu’on peut dire; l’œil ne se rassasie pas de voir, et l’oreille ne se lasse pas d’entendre. '
  '9':
  - type: note
    content: Ec 3:15.
  - type: text
    content: 'Ce qui a été, c’est ce qui sera, et ce qui s’est fait, c’est ce qui se fera, il n’y a rien de nouveau sous le soleil. '
