document_id: ECC.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. Ec 12:10-12. Ro 8:20, 22.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paroles de l’Ecclésiaste, fils de David, roi de Jérusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il est une chose dont on dise: Vois ceci, c’est nouveau! Cette chose existait déjà dans les siècles qui nous ont précédés. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On ne se souvient pas de ce qui est ancien; et ce qui arrivera dans la suite ne laissera pas de souvenir chez ceux qui vivront plus tard.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-18: cf. 1 R 4:29, etc. Ec 8:16, 17.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moi, l’Ecclésiaste, j’ai été roi d’Israël à Jérusalem. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai appliqué mon cœur à rechercher et à sonder par la sagesse tout ce qui se fait sous les cieux: c’est là une occupation pénible, à laquelle Dieu soumet les fils de l’homme. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai vu tout ce qui se fait sous le soleil; et voici, tout est vanité et poursuite du vent. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce qui est courbé ne peut se redresser, et ce qui manque ne peut être compté. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai dit en mon cœur: Voici, j’ai grandi et surpassé en sagesse tous ceux qui ont dominé avant moi sur Jérusalem, et mon cœur a vu beaucoup de sagesse et de science. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai appliqué mon cœur à connaître la sagesse, et à connaître la sottise et la folie; j’ai compris que cela aussi c’est la poursuite du vent. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car avec beaucoup de sagesse on a beaucoup de chagrin, et celui qui augmente sa science augmente sa douleur.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vanité des vanités, dit l’Ecclésiaste, vanité des vanités, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 62:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 144:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'tout est vanité. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 2:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quel avantage revient-il à l’homme de toute la peine qu’il se donne sous le soleil? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une génération s’en va, une autre vient, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 104:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et la terre subsiste toujours. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le soleil se lève, le soleil se couche; il soupire après le lieu d’où il se lève de nouveau. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le vent se dirige vers le midi, tourne vers le nord; puis il tourne encore, et reprend les mêmes circuits. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 38:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 104:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tous les fleuves vont à la mer, et la mer n’est point remplie; ils continuent à aller vers le lieu où ils se dirigent. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutes choses sont en travail au-delà de ce qu’on peut dire; l’œil ne se rassasie pas de voir, et l’oreille ne se lasse pas d’entendre. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 3:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ce qui a été, c’est ce qui sera, et ce qui s’est fait, c’est ce qui se fera, il n’y a rien de nouveau sous le soleil. '
