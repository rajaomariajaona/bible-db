document_id: NUM.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mort de Marie. Les eaux de Meriba. Punition de Moïse
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. Ex 17:1-7. (Ps 106:32, 33. De 32:48-52.) (Ja 1:19, 20; 3:13-18.) Ps 99:8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Toute l’assemblée des enfants d’Israël arriva dans le désert de Tsin le premier mois, et le peuple s’arrêta à Kadès. C’est là que mourut Marie, et qu’elle fut enterrée. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il n’y avait point d’eau pour l’assemblée; et l’on se souleva contre Moïse et Aaron. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le peuple chercha querelle à Moïse. Ils dirent: Que n’avons-nous expiré, quand '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 16:32
      metadata:
        usfm: NUM.16.32
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '49'
      metadata:
        usfm: NUM.16.49
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nos frères expirèrent devant l’Éternel? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pourquoi avez-vous fait venir l’assemblée de l’Éternel dans ce désert, pour que nous y mourions, nous et notre bétail? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Pourquoi nous avez-vous fait monter hors d’Égypte, pour nous amener dans ce méchant lieu? Ce n’est pas un lieu où l’on puisse semer, et il n’y a ni figuier, ni vigne, ni grenadier, ni d’eau à boire. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Moïse et Aaron s’éloignèrent de l’assemblée pour aller à l’entrée de la tente d’assignation. Ils tombèrent sur leur visage; et la gloire de l’Éternel leur apparut. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Prends la verge, et convoque l’assemblée, toi et ton frère Aaron. Vous parlerez en leur présence au rocher, et il donnera ses eaux; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Né 9:15
      metadata:
        usfm: NEH.9.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:15
      metadata:
        usfm: PSA.78.15
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: PSA.78.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 105:41
      metadata:
        usfm: PSA.105.41
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 114:8
      metadata:
        usfm: PSA.114.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tu feras sortir pour eux de l’eau du rocher, et tu abreuveras l’assemblée et leur bétail. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moïse prit la verge qui était devant l’Éternel, comme l’Éternel le lui avait ordonné. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Moïse et Aaron convoquèrent l’assemblée en face du rocher. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 106:32
      metadata:
        usfm: PSA.106.32
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '33'
      metadata:
        usfm: PSA.106.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et Moïse leur dit: Écoutez donc, rebelles! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:51
      metadata:
        usfm: DEU.32.51
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Est-ce de ce rocher que nous vous ferons sortir de l’eau? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Puis Moïse leva la main et frappa deux fois le rocher avec sa verge. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:15
      metadata:
        usfm: PSA.78.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 105:41
      metadata:
        usfm: PSA.105.41
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 48:21
      metadata:
        usfm: ISA.48.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:4
      metadata:
        usfm: 1CO.10.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il sortit de l’eau en abondance. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 43:20
      metadata:
        usfm: ISA.43.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’assemblée but, et le bétail aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors l’Éternel dit à Moïse et à Aaron: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 1:37
      metadata:
        usfm: DEU.1.37
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 27:14
      metadata:
        usfm: NUM.27.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Parce que vous n’avez pas cru en moi, pour me sanctifier aux yeux des enfants d’Israël, vous ne ferez point entrer cette assemblée dans le pays que je lui donne. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ce sont les eaux de Meriba, où les enfants d’Israël contestèrent avec l’Éternel, qui fut sanctifié en eux.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-21: cf. (Jg 11:16-18. De 2:1-8.) (Ro 12:13. Hé 13:1, 2.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'De Kadès, Moïse envoya des messagers au roi d’Édom, pour lui dire: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 23:7
      metadata:
        usfm: DEU.23.7
    - type: text
      text: . Ab v. 10, 12.
    marker-yv: yv-n
  - type: text
    text: 'Ainsi parle ton frère Israël: Tu sais toutes les souffrances que nous avons éprouvées. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nos pères descendirent en Égypte, et nous y demeurâmes longtemps. Mais les Égyptiens nous ont maltraités, nous et nos pères. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 2:23
      metadata:
        usfm: EXO.2.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous avons crié à l’Éternel, et il a entendu notre voix. Il a '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 14:19
      metadata:
        usfm: EXO.14.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'envoyé un ange, et nous a fait sortir de l’Égypte. Et voici, nous sommes à Kadès, ville à l’extrémité de ton territoire. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Laisse-nous passer par ton pays; nous ne traverserons ni les champs, ni les vignes, et nous ne boirons pas l’eau des puits; nous suivrons la route royale, sans nous détourner à droite ou à gauche, jusqu’à ce que nous ayons franchi ton territoire. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Édom lui dit: Tu ne passeras point chez moi, sinon je sortirai à ta rencontre avec l’épée. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les enfants d’Israël lui dirent: Nous monterons par la grande route; et, si nous buvons de ton eau, moi et mes troupeaux, j’en paierai le prix; je ne ferai que passer avec mes pieds, pas autre chose. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il répondit: Tu ne passeras pas! Et Édom sortit à sa rencontre avec un peuple nombreux et à main forte. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ainsi Édom refusa de donner passage à Israël par son territoire. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 11:18
      metadata:
        usfm: JDG.11.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et Israël se détourna de lui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mort d’Aaron
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-29: cf. No 33:37-39. (De 32:48-52; 34:1-8.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Toute l’assemblée des enfants d’Israël partit de Kadès, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 33:37
      metadata:
        usfm: NUM.33.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et arriva à la montagne de Hor. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'L’Éternel dit à Moïse et à Aaron, vers la montagne de Hor, sur la frontière du pays d’Édom: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Aaron va être recueilli auprès de son peuple; car il n’entrera point dans le pays que je donne aux enfants d’Israël, parce que vous avez été rebelles à mon ordre, aux eaux de Meriba. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 33:38
      metadata:
        usfm: NUM.33.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:50
      metadata:
        usfm: DEU.32.50
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Prends Aaron et son fils Éléazar, et fais-les monter sur la montagne de Hor. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dépouille Aaron de ses vêtements, et fais-les revêtir à Éléazar, son fils. C’est là qu’Aaron sera recueilli et qu’il mourra. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Moïse fit ce que l’Éternel avait ordonné. Ils montèrent sur la montagne de Hor, aux yeux de toute l’assemblée. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Moïse dépouilla Aaron de ses vêtements, et les fit revêtir à Éléazar, son fils. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:6
      metadata:
        usfm: DEU.10.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 32:50
      metadata:
        usfm: DEU.32.50
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Aaron mourut là, au sommet de la montagne. Moïse et Éléazar descendirent de la montagne. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Toute l’assemblée vit qu’Aaron avait expiré, et toute la maison d’Israël pleura Aaron pendant trente jours.
