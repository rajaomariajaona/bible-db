document_id: NUM.20,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Mort de Marie. Les eaux de Meriba. Punition de Moïse
  - type: heading
    content: 'V. 1-13: cf. Ex 17:1-7. (Ps 106:32, 33. De 32:48-52.) (Ja 1:19, 20; 3:13-18.) Ps 99:8.'
  - type: text
    content: 'Toute l’assemblée des enfants d’Israël arriva dans le désert de Tsin le premier mois, et le peuple s’arrêta à Kadès. C’est là que mourut Marie, et qu’elle fut enterrée. '
  '10':
  - type: text
    content: 'Moïse et Aaron convoquèrent l’assemblée en face du rocher. '
  - type: note
    content: Ps 106:32, 33.
  - type: text
    content: 'Et Moïse leur dit: Écoutez donc, rebelles! '
  - type: note
    content: De 32:51.
  - type: text
    content: 'Est-ce de ce rocher que nous vous ferons sortir de l’eau? '
  '11':
  - type: text
    content: 'Puis Moïse leva la main et frappa deux fois le rocher avec sa verge. '
  - type: note
    content: Ps 78:15; 105:41. És 48:21. 1 Co 10:4.
  - type: text
    content: 'Il sortit de l’eau en abondance. '
  - type: note
    content: És 43:20.
  - type: text
    content: 'L’assemblée but, et le bétail aussi. '
  '12':
  - type: text
    content: 'Alors l’Éternel dit à Moïse et à Aaron: '
  - type: note
    content: De 1:37. No 27:14.
  - type: text
    content: 'Parce que vous n’avez pas cru en moi, pour me sanctifier aux yeux des enfants d’Israël, vous ne ferez point entrer cette assemblée dans le pays que je lui donne. '
  '13':
  - type: text
    content: Ce sont les eaux de Meriba, où les enfants d’Israël contestèrent avec l’Éternel, qui fut sanctifié en eux.
  - type: heading
    content: 'V. 14-21: cf. (Jg 11:16-18. De 2:1-8.) (Ro 12:13. Hé 13:1, 2.)'
  '14':
  - type: text
    content: 'De Kadès, Moïse envoya des messagers au roi d’Édom, pour lui dire: '
  - type: note
    content: De 23:7. Ab v. 10, 12.
  - type: text
    content: 'Ainsi parle ton frère Israël: Tu sais toutes les souffrances que nous avons éprouvées. '
  '15':
  - type: text
    content: 'Nos pères descendirent en Égypte, et nous y demeurâmes longtemps. Mais les Égyptiens nous ont maltraités, nous et nos pères. '
  '16':
  - type: note
    content: Ex 2:23.
  - type: text
    content: 'Nous avons crié à l’Éternel, et il a entendu notre voix. Il a '
  - type: note
    content: Ex 14:19.
  - type: text
    content: 'envoyé un ange, et nous a fait sortir de l’Égypte. Et voici, nous sommes à Kadès, ville à l’extrémité de ton territoire. '
  '17':
  - type: text
    content: 'Laisse-nous passer par ton pays; nous ne traverserons ni les champs, ni les vignes, et nous ne boirons pas l’eau des puits; nous suivrons la route royale, sans nous détourner à droite ou à gauche, jusqu’à ce que nous ayons franchi ton territoire. '
  '18':
  - type: text
    content: 'Édom lui dit: Tu ne passeras point chez moi, sinon je sortirai à ta rencontre avec l’épée. '
  '19':
  - type: text
    content: 'Les enfants d’Israël lui dirent: Nous monterons par la grande route; et, si nous buvons de ton eau, moi et mes troupeaux, j’en paierai le prix; je ne ferai que passer avec mes pieds, pas autre chose. '
  '2':
  - type: text
    content: 'Il n’y avait point d’eau pour l’assemblée; et l’on se souleva contre Moïse et Aaron. '
  '20':
  - type: text
    content: 'Il répondit: Tu ne passeras pas! Et Édom sortit à sa rencontre avec un peuple nombreux et à main forte. '
  '21':
  - type: text
    content: 'Ainsi Édom refusa de donner passage à Israël par son territoire. '
  - type: note
    content: Jg 11:18.
  - type: text
    content: Et Israël se détourna de lui.
  - type: heading
    content: Mort d’Aaron
  - type: heading
    content: 'V. 22-29: cf. No 33:37-39. (De 32:48-52; 34:1-8.)'
  '22':
  - type: text
    content: 'Toute l’assemblée des enfants d’Israël partit de Kadès, '
  - type: note
    content: No 33:37.
  - type: text
    content: 'et arriva à la montagne de Hor. '
  '23':
  - type: text
    content: 'L’Éternel dit à Moïse et à Aaron, vers la montagne de Hor, sur la frontière du pays d’Édom: '
  '24':
  - type: text
    content: 'Aaron va être recueilli auprès de son peuple; car il n’entrera point dans le pays que je donne aux enfants d’Israël, parce que vous avez été rebelles à mon ordre, aux eaux de Meriba. '
  '25':
  - type: note
    content: No 33:38. De 32:50.
  - type: text
    content: 'Prends Aaron et son fils Éléazar, et fais-les monter sur la montagne de Hor. '
  '26':
  - type: text
    content: 'Dépouille Aaron de ses vêtements, et fais-les revêtir à Éléazar, son fils. C’est là qu’Aaron sera recueilli et qu’il mourra. '
  '27':
  - type: text
    content: 'Moïse fit ce que l’Éternel avait ordonné. Ils montèrent sur la montagne de Hor, aux yeux de toute l’assemblée. '
  '28':
  - type: text
    content: 'Moïse dépouilla Aaron de ses vêtements, et les fit revêtir à Éléazar, son fils. '
  - type: note
    content: De 10:6; 32:50.
  - type: text
    content: 'Aaron mourut là, au sommet de la montagne. Moïse et Éléazar descendirent de la montagne. '
  '29':
  - type: text
    content: Toute l’assemblée vit qu’Aaron avait expiré, et toute la maison d’Israël pleura Aaron pendant trente jours.
  '3':
  - type: text
    content: 'Le peuple chercha querelle à Moïse. Ils dirent: Que n’avons-nous expiré, quand '
  - type: note
    content: No 16:32, 49.
  - type: text
    content: 'nos frères expirèrent devant l’Éternel? '
  '4':
  - type: text
    content: 'Pourquoi avez-vous fait venir l’assemblée de l’Éternel dans ce désert, pour que nous y mourions, nous et notre bétail? '
  '5':
  - type: text
    content: 'Pourquoi nous avez-vous fait monter hors d’Égypte, pour nous amener dans ce méchant lieu? Ce n’est pas un lieu où l’on puisse semer, et il n’y a ni figuier, ni vigne, ni grenadier, ni d’eau à boire. '
  '6':
  - type: text
    content: 'Moïse et Aaron s’éloignèrent de l’assemblée pour aller à l’entrée de la tente d’assignation. Ils tombèrent sur leur visage; et la gloire de l’Éternel leur apparut. '
  '7':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '8':
  - type: text
    content: 'Prends la verge, et convoque l’assemblée, toi et ton frère Aaron. Vous parlerez en leur présence au rocher, et il donnera ses eaux; '
  - type: note
    content: Né 9:15. Ps 78:15, 16; 105:41; 114:8.
  - type: text
    content: 'tu feras sortir pour eux de l’eau du rocher, et tu abreuveras l’assemblée et leur bétail. '
  '9':
  - type: text
    content: 'Moïse prit la verge qui était devant l’Éternel, comme l’Éternel le lui avait ordonné. '
