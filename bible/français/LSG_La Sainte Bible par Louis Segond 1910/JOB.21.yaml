document_id: JOB.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Réponse de Job à Tsophar
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-34: cf. Ps 73; 49. Ec 8:11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Écoutez, écoutez mes paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Donnez-moi seulement cette consolation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Laissez-moi parler, je vous prie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et, quand j’aurai parlé, tu pourras te moquer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Est-ce contre un homme que se dirige ma plainte?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pourquoi mon âme ne serait-elle pas impatiente?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Regardez-moi, soyez étonnés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mettez la main sur la bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Quand j’y pense, cela m’épouvante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et un tremblement saisit mon corps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 17:10
      metadata:
        usfm: PSA.17.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 73:12
      metadata:
        usfm: PSA.73.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 12:1
      metadata:
        usfm: JER.12.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ha 1:16
      metadata:
        usfm: HAB.1.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pourquoi les méchants vivent-ils?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi les voit-on vieillir et accroître leur force?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Leur postérité s’affermit avec eux et en leur présence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs rejetons prospèrent sous leurs yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dans leurs maisons règne la paix, sans mélange de crainte;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La verge de Dieu ne vient pas les frapper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Leurs taureaux sont vigoureux et féconds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs génisses conçoivent et n’avortent point.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils laissent courir leurs enfants comme des brebis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les enfants prennent leurs ébats.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils chantent au son du tambourin et de la harpe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se réjouissent au son du chalumeau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ils passent leurs jours dans le bonheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils descendent en un instant au séjour des morts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 22:17
      metadata:
        usfm: JOB.22.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils disaient pourtant à Dieu: Retire-toi de nous;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous ne voulons pas connaître tes voies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 5:2
      metadata:
        usfm: EXO.5.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal 3:14
      metadata:
        usfm: MAL.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qu’est-ce que le Tout-Puissant, pour que nous le servions?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que gagnerons-nous à lui adresser nos prières?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Quoi donc! Ne sont-ils pas en possession du bonheur?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 22:18
      metadata:
        usfm: JOB.22.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Loin de moi le conseil des méchants!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mais arrive-t-il souvent que leur lampe s’éteigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que la misère fonde sur eux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 20:29
      metadata:
        usfm: JOB.20.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 11:6
      metadata:
        usfm: PSA.11.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: PSA.11.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Que Dieu leur distribue leur part dans sa colère,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Qu’ils soient comme la paille emportée par le vent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme la balle enlevée par le tourbillon?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Est-ce pour les fils que Dieu réserve le châtiment du père?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais c’est lui que Dieu devrait punir, pour qu’il le sente;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: C’est lui qui devrait contempler sa propre ruine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est lui qui devrait boire la colère du Tout-Puissant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Car, que lui importe sa maison après lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand le nombre de ses mois est achevé?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 40:13
      metadata:
        usfm: ISA.40.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:34
      metadata:
        usfm: ROM.11.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 2:16
      metadata:
        usfm: 1CO.2.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Est-ce à Dieu qu’on donnera de la science,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A lui qui gouverne les esprits célestes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: L’un meurt au sein du bien-être,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De la paix et du bonheur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Les flancs chargés de graisse
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la mœlle des os remplie de sève;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: L’autre meurt, l’amertume dans l’âme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans avoir joui d’aucun bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Et tous deux se couchent dans la poussière,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 17:14
      metadata:
        usfm: JOB.17.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tous deux deviennent la pâture des vers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Je sais bien quelles sont vos pensées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quels jugements iniques vous portez sur moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Vous dites: Où est la maison de l’homme puissant?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où est la tente qu’habitaient les impies?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Mais quoi! N’avez-vous point interrogé les voyageurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et voulez-vous méconnaître ce qu’ils prouvent?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 16:4
      metadata:
        usfm: PRO.16.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Au jour du malheur, le méchant est épargné;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au jour de la colère, il échappe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Qui lui reproche en face sa conduite?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui lui rend ce qu’il a fait?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Il est porté dans un sépulcre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il veille encore sur sa tombe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Les mottes de la vallée lui sont légères;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous après lui suivront la même voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme une multitude l’a déjà suivie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Pourquoi donc m’offrir de vaines consolations?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce qui reste de vos réponses n’est que perfidie.
