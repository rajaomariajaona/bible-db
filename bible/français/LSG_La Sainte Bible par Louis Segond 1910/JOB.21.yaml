document_id: JOB.21,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse de Job à Tsophar
  - type: heading
    content: 'V. 1-34: cf. Ps 73; 49. Ec 8:11.'
  - type: text
    content: 'Job prit la parole et dit:'
  '10':
  - type: text
    content: Leurs taureaux sont vigoureux et féconds,
  - type: text
    content: Leurs génisses conçoivent et n’avortent point.
  '11':
  - type: text
    content: Ils laissent courir leurs enfants comme des brebis,
  - type: text
    content: Et les enfants prennent leurs ébats.
  '12':
  - type: text
    content: Ils chantent au son du tambourin et de la harpe,
  - type: text
    content: Ils se réjouissent au son du chalumeau.
  '13':
  - type: text
    content: Ils passent leurs jours dans le bonheur,
  - type: text
    content: Et ils descendent en un instant au séjour des morts.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Job 22:17.
  - type: text
    content: 'Ils disaient pourtant à Dieu: Retire-toi de nous;'
  - type: text
    content: Nous ne voulons pas connaître tes voies.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ex 5:2. Mal 3:14.
  - type: text
    content: Qu’est-ce que le Tout-Puissant, pour que nous le servions?
  - type: text
    content: Que gagnerons-nous à lui adresser nos prières?
  '16':
  - type: text
    content: Quoi donc! Ne sont-ils pas en possession du bonheur?
  - type: note
    content: Job 22:18.
  - type: text
    content: Loin de moi le conseil des méchants!
  '17':
  - type: text
    content: Mais arrive-t-il souvent que leur lampe s’éteigne,
  - type: text
    content: Que la misère fonde sur eux,
  - type: note
    content: Job 20:29. Ps 11:6, 7.
  - type: text
    content: Que Dieu leur distribue leur part dans sa colère,
  '18':
  - type: text
    content: Qu’ils soient comme la paille emportée par le vent,
  - type: text
    content: Comme la balle enlevée par le tourbillon?
  '19':
  - type: text
    content: Est-ce pour les fils que Dieu réserve le châtiment du père?
  - type: text
    content: Mais c’est lui que Dieu devrait punir, pour qu’il le sente;
  '2':
  - type: text
    content: Écoutez, écoutez mes paroles,
  - type: text
    content: Donnez-moi seulement cette consolation.
  '20':
  - type: text
    content: C’est lui qui devrait contempler sa propre ruine,
  - type: text
    content: C’est lui qui devrait boire la colère du Tout-Puissant.
  '21':
  - type: text
    content: Car, que lui importe sa maison après lui,
  - type: text
    content: Quand le nombre de ses mois est achevé?
  '22':
  - type: text
    content: ' '
  - type: note
    content: És 40:13. Ro 11:34. 1 Co 2:16.
  - type: text
    content: Est-ce à Dieu qu’on donnera de la science,
  - type: text
    content: A lui qui gouverne les esprits célestes?
  '23':
  - type: text
    content: L’un meurt au sein du bien-être,
  - type: text
    content: De la paix et du bonheur,
  '24':
  - type: text
    content: Les flancs chargés de graisse
  - type: text
    content: Et la mœlle des os remplie de sève;
  '25':
  - type: text
    content: L’autre meurt, l’amertume dans l’âme,
  - type: text
    content: Sans avoir joui d’aucun bien.
  '26':
  - type: text
    content: Et tous deux se couchent dans la poussière,
  - type: note
    content: Job 17:14.
  - type: text
    content: Tous deux deviennent la pâture des vers.
  '27':
  - type: text
    content: Je sais bien quelles sont vos pensées,
  - type: text
    content: Quels jugements iniques vous portez sur moi.
  '28':
  - type: text
    content: 'Vous dites: Où est la maison de l’homme puissant?'
  - type: text
    content: Où est la tente qu’habitaient les impies?
  '29':
  - type: text
    content: Mais quoi! N’avez-vous point interrogé les voyageurs,
  - type: text
    content: Et voulez-vous méconnaître ce qu’ils prouvent?
  '3':
  - type: text
    content: Laissez-moi parler, je vous prie;
  - type: text
    content: Et, quand j’aurai parlé, tu pourras te moquer.
  '30':
  - type: text
    content: ' '
  - type: note
    content: Pr 16:4.
  - type: text
    content: Au jour du malheur, le méchant est épargné;
  - type: text
    content: Au jour de la colère, il échappe.
  '31':
  - type: text
    content: Qui lui reproche en face sa conduite?
  - type: text
    content: Qui lui rend ce qu’il a fait?
  '32':
  - type: text
    content: Il est porté dans un sépulcre,
  - type: text
    content: Et il veille encore sur sa tombe.
  '33':
  - type: text
    content: Les mottes de la vallée lui sont légères;
  - type: text
    content: Et tous après lui suivront la même voie,
  - type: text
    content: Comme une multitude l’a déjà suivie.
  '34':
  - type: text
    content: Pourquoi donc m’offrir de vaines consolations?
  - type: text
    content: Ce qui reste de vos réponses n’est que perfidie.
  '4':
  - type: text
    content: Est-ce contre un homme que se dirige ma plainte?
  - type: text
    content: Et pourquoi mon âme ne serait-elle pas impatiente?
  '5':
  - type: text
    content: Regardez-moi, soyez étonnés,
  - type: text
    content: Et mettez la main sur la bouche.
  '6':
  - type: text
    content: Quand j’y pense, cela m’épouvante,
  - type: text
    content: Et un tremblement saisit mon corps.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps 17:10; 73:12. Jé 12:1. Ha 1:16.
  - type: text
    content: Pourquoi les méchants vivent-ils?
  - type: text
    content: Pourquoi les voit-on vieillir et accroître leur force?
  '8':
  - type: text
    content: Leur postérité s’affermit avec eux et en leur présence,
  - type: text
    content: Leurs rejetons prospèrent sous leurs yeux.
  '9':
  - type: text
    content: Dans leurs maisons règne la paix, sans mélange de crainte;
  - type: text
    content: La verge de Dieu ne vient pas les frapper.
