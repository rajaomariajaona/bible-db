document_id: 2SA.22,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Cantique de David, délivré de ses ennemis
  - type: heading
    content: 'V. 1-51: cf. (Ps 18; 144:1-10.) Ex 15:1, etc. Jg 5:1, etc.'
  - type: text
    content: 'David adressa à l’Éternel les paroles de ce cantique, lorsque l’Éternel l’eut délivré de la main de tous ses ennemis et de la main de Saül. '
  '10':
  - type: text
    content: 'Il abaissa les cieux, et il descendit:'
  - type: text
    content: Il y avait une épaisse nuée sous ses pieds.
  '11':
  - type: text
    content: Il était monté sur un chérubin,
  - type: text
    content: et il volait,
  - type: text
    content: Il paraissait sur les ailes du vent.
  '12':
  - type: text
    content: Il faisait des ténèbres une tente autour de lui,
  - type: text
    content: Il était enveloppé d’amas d’eaux et de sombres nuages.
  '13':
  - type: text
    content: De la splendeur qui le précédait
  - type: text
    content: S’élançaient des charbons de feu.
  '14':
  - type: text
    content: L’Éternel tonna des cieux,
  - type: text
    content: Le Très-Haut fit retentir sa voix;
  '15':
  - type: text
    content: Il lança des flèches et dispersa mes ennemis,
  - type: text
    content: La foudre, et les mit en déroute.
  '16':
  - type: text
    content: Le lit de la mer apparut,
  - type: text
    content: Les fondements du monde furent découverts,
  - type: text
    content: Par la menace de l’Éternel,
  - type: text
    content: Par le bruit du souffle de ses narines.
  '17':
  - type: text
    content: Il étendit sa main d’en haut, il me saisit,
  - type: text
    content: Il me retira des grandes eaux;
  '18':
  - type: text
    content: Il me délivra de mon adversaire puissant,
  - type: text
    content: De mes ennemis qui étaient plus forts que moi.
  '19':
  - type: text
    content: Ils m’avaient surpris au jour de ma détresse,
  - type: text
    content: Mais l’Éternel fut mon appui.
  '2':
  - type: text
    content: 'Il dit:'
  - type: note
    content: Ps 18:22, etc.
  - type: text
    content: L’Éternel est mon rocher, ma forteresse, mon libérateur.
  '20':
  - type: text
    content: Il m’a mis au large,
  - type: text
    content: Il m’a sauvé, parce qu’il m’aime.
  '21':
  - type: text
    content: L’Éternel m’a traité selon ma droiture,
  - type: text
    content: Il m’a rendu selon la pureté de mes mains;
  '22':
  - type: text
    content: Car j’ai observé les voies de l’Éternel,
  - type: text
    content: Et je n’ai point été coupable envers mon Dieu.
  '23':
  - type: text
    content: Toutes ses ordonnances ont été devant moi,
  - type: text
    content: Et je ne me suis point écarté de ses lois.
  '24':
  - type: text
    content: J’ai été sans reproche envers lui,
  - type: text
    content: Et je me suis tenu en garde contre mon iniquité.
  '25':
  - type: text
    content: Aussi l’Éternel m’a rendu selon ma droiture,
  - type: text
    content: Selon ma pureté devant ses yeux.
  '26':
  - type: text
    content: Avec celui qui est bon tu te montres bon,
  - type: text
    content: Avec l’homme droit tu agis selon la droiture,
  '27':
  - type: text
    content: Avec celui qui est pur tu te montres pur,
  - type: text
    content: Et avec le pervers tu agis selon sa perversité.
  '28':
  - type: text
    content: Tu sauves le peuple qui s’humilie,
  - type: text
    content: Et de ton regard, tu abaisses les orgueilleux.
  '29':
  - type: text
    content: Oui, tu es ma lumière, ô Éternel!
  - type: text
    content: L’Éternel éclaire mes ténèbres.
  '3':
  - type: text
    content: 'Dieu est mon rocher, '
  - type: note
    content: Hé 2:13.
  - type: text
    content: où je trouve un abri,
  - type: text
    content: Mon bouclier et la force qui me sauve,
  - type: text
    content: Ma haute retraite et mon refuge.
  - type: text
    content: O mon Sauveur! Tu me garantis de la violence.
  '30':
  - type: text
    content: Avec toi je me précipite sur une troupe en armes,
  - type: text
    content: Avec mon Dieu je franchis une muraille.
  '31':
  - type: text
    content: ' '
  - type: note
    content: De 32:4. Da 4:37. Ap 15:3.
  - type: text
    content: Les voies de Dieu sont parfaites,
  - type: note
    content: Ps 12:7; 119:140. Pr 30:5.
  - type: text
    content: La parole de l’Éternel est éprouvée;
  - type: text
    content: Il est un bouclier pour tous ceux qui se confient en lui.
  '32':
  - type: text
    content: 'Car '
  - type: note
    content: De 32:19. 1 S 2:2. Ps 86:8. És 45:5.
  - type: text
    content: qui est Dieu, si ce n’est l’Éternel?
  - type: text
    content: Et qui est un rocher, si ce n’est notre Dieu?
  '33':
  - type: text
    content: C’est Dieu qui est ma puissante forteresse,
  - type: text
    content: Et qui me conduit dans la voie droite.
  '34':
  - type: text
    content: Il rend mes pieds semblables à ceux des biches,
  - type: text
    content: Et il me place sur mes lieux élevés.
  '35':
  - type: text
    content: Il exerce mes mains au combat,
  - type: text
    content: Et mes bras tendent l’arc d’airain.
  '36':
  - type: text
    content: Tu me donnes le bouclier de ton salut,
  - type: text
    content: Et je deviens grand par ta bonté.
  '37':
  - type: text
    content: Tu élargis le chemin sous mes pas,
  - type: text
    content: Et mes pieds ne chancellent point.
  '38':
  - type: text
    content: Je poursuis mes ennemis, et je les détruis;
  - type: text
    content: Je ne reviens pas avant de les avoir anéantis.
  '39':
  - type: text
    content: Je les anéantis, je les brise, et ils ne se relèvent plus;
  - type: text
    content: Ils tombent sous mes pieds.
  '4':
  - type: text
    content: 'Je m’écrie: Loué soit l’Éternel!'
  - type: text
    content: Et je suis délivré de mes ennemis.
  '40':
  - type: text
    content: Tu me ceins de force pour le combat,
  - type: text
    content: Tu fais plier sous moi mes adversaires.
  '41':
  - type: text
    content: Tu fais tourner le dos à mes ennemis devant moi,
  - type: text
    content: Et j’extermine ceux qui me haïssent.
  '42':
  - type: text
    content: Ils regardent autour d’eux, et personne pour les sauver!
  - type: text
    content: Ils crient à l’Éternel, et il ne leur répond pas!
  '43':
  - type: text
    content: Je les broie comme la poussière de la terre,
  - type: text
    content: Je les écrase, je les foule, comme la boue des rues.
  '44':
  - type: text
    content: Tu me délivres des dissensions de mon peuple;
  - type: text
    content: Tu me conserves pour chef des nations;
  - type: text
    content: Un peuple que je ne connaissais pas m’est asservi.
  '45':
  - type: text
    content: Les fils de l’étranger me flattent,
  - type: text
    content: Ils m’obéissent au premier ordre.
  '46':
  - type: text
    content: Les fils de l’étranger sont en défaillance,
  - type: text
    content: Ils tremblent hors de leurs forteresses.
  '47':
  - type: text
    content: Vive l’Éternel, et béni soit mon rocher!
  - type: text
    content: Que Dieu, le rocher de mon salut, soit exalté,
  '48':
  - type: text
    content: Le Dieu qui est mon vengeur,
  - type: text
    content: Qui m’assujettit les peuples,
  '49':
  - type: text
    content: Et qui me fait échapper à mes ennemis!
  - type: text
    content: Tu m’élèves au-dessus de mes adversaires,
  - type: text
    content: Tu me délivres de l’homme violent.
  '5':
  - type: text
    content: Car les flots de la mort m’avaient environné,
  - type: text
    content: Les torrents de la destruction m’avaient épouvanté;
  '50':
  - type: text
    content: 'C’est pourquoi je te louerai parmi les '
  - type: note
    content: Ro 15:9.
  - type: text
    content: nations, ô Éternel!
  - type: text
    content: Et je chanterai à la gloire de ton nom.
  '51':
  - type: text
    content: Il accorde de grandes délivrances à son roi,
  - type: text
    content: Et il fait miséricorde à son oint,
  - type: text
    content: A David, et à sa postérité, pour toujours.
  '6':
  - type: text
    content: Les liens du sépulcre m’avaient entouré,
  - type: text
    content: Les filets de la mort m’avaient surpris.
  '7':
  - type: text
    content: Dans ma détresse, j’ai invoqué l’Éternel,
  - type: text
    content: J’ai invoqué mon Dieu;
  - type: text
    content: De son palais, il a entendu ma voix,
  - type: text
    content: Et mon cri est parvenu à ses oreilles.
  '8':
  - type: text
    content: La terre fut ébranlée et trembla,
  - type: text
    content: Les fondements des cieux frémirent,
  - type: text
    content: Et ils furent ébranlés, parce qu’il était irrité.
  '9':
  - type: text
    content: Il s’élevait de la fumée dans ses narines,
  - type: text
    content: 'Et un feu dévorant sortait de sa bouche:'
  - type: text
    content: Il en jaillissait des charbons embrasés.
