document_id: JDG.18,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les objets de culte et le Lévite enlevés par les Danites
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-26: cf. (Jg 1:34. Jos 19:40-47.) Jg 17. És 45:20. Mt 6:19.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'En ce temps-là, il n’y avait '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 17:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'point de roi en Israël; et la tribu des Danites se cherchait une possession pour s’établir, car jusqu’à ce jour il ne lui était point échu d’héritage au milieu des tribus d’Israël. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Quand vous y entrerez, vous arriverez vers un peuple en sécurité. Le pays est vaste, et Dieu l’a livré entre vos mains; c’est un lieu où rien ne manque de tout ce qui est sur la terre. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Six cents hommes de la famille de Dan partirent de Tsorea et d’Eschthaol, munis de leurs armes de guerre. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ils montèrent, et campèrent à Kirjath-Jearim en Juda; c’est pourquoi ce lieu, qui est derrière Kirjath-Jearim, a été appelé jusqu’à ce jour '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 13:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Machané-Dan. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ils passèrent de là dans la montagne d’Éphraïm, et ils arrivèrent jusqu’à la maison de Mica. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Alors les cinq hommes qui étaient allés pour explorer le pays de Laïs prirent la parole et dirent à leurs frères: Savez-vous qu’il y a dans ces maisons-là un éphod, des théraphim, une image taillée et une image en fonte? Voyez maintenant ce que vous avez à faire. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ils s’approchèrent de là, entrèrent dans la maison du jeune Lévite, dans la maison de Mica, et lui demandèrent comment il se portait. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Les six cents hommes d’entre les fils de Dan, munis de leurs armes de guerre, se tenaient à l’entrée de la porte. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Et les cinq hommes qui étaient allés pour explorer le pays montèrent et entrèrent dans la maison; ils prirent l’image taillée, l’éphod, les théraphim, et l’image en fonte, pendant que le prêtre était à l’entrée de la porte avec les six cents hommes munis de leurs armes de guerre. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Lorsqu’ils furent entrés dans la maison de Mica, et qu’ils eurent pris l’image taillée, l’éphod, les théraphim, et l’image en fonte, le prêtre leur dit: Que faites-vous? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ils lui répondirent: Tais-toi, mets ta main sur ta bouche, et viens avec nous; tu nous serviras de père et de prêtre. Vaut-il mieux que tu serves de prêtre à la maison d’un seul homme, ou que tu serves de prêtre à une tribu et à une famille en Israël? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Les fils de Dan prirent sur eux tous, parmi leurs familles, cinq hommes vaillants, qu’ils envoyèrent de Tsorea et d’Eschthaol, pour explorer le pays et pour l’examiner. Ils leur dirent: Allez, examinez le pays. Ils arrivèrent dans la montagne d’Éphraïm jusqu’à la maison de Mica, et ils y passèrent la nuit. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Le prêtre éprouva de la joie dans son cœur; il prit l’éphod, les théraphim, et l’image taillée, et se joignit à la troupe. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ils se remirent en route et partirent, en plaçant devant eux les enfants, le bétail et les bagages. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Comme ils étaient déjà loin de la maison de Mica, les gens qui habitaient les maisons voisines de celle de Mica se rassemblèrent et poursuivirent les fils de Dan. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ils appelèrent les fils de Dan, qui se retournèrent et dirent à Mica: Qu’as-tu, et que signifie ce rassemblement? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Il répondit: Mes dieux que j’avais faits, vous les avez enlevés avec le prêtre et vous êtes partis: que me reste-t-il? Comment donc pouvez-vous me dire: Qu’as-tu? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Les fils de Dan lui dirent: Ne fais pas entendre ta voix près de nous; sinon des hommes irrités se jetteront sur vous, et tu causeras ta perte et celle de ta maison. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Et les fils de Dan continuèrent leur route. Mica, voyant qu’ils étaient plus forts que lui, s’en retourna et revint dans sa maison.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conquête de Laïs, et établissement dans cette ville d’un culte et d’un sacerdoce pour la tribu de Dan
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 27-31: cf. (Jos 19:47. De 33:22.) (Lé 26:1. 1 R 12:28-30.)'
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ils enlevèrent ainsi ce qu’avait fait Mica et emmenèrent le prêtre qui était à son service, et ils tombèrent sur Laïs, sur un peuple tranquille et en sécurité; ils le passèrent au fil de l’épée, et ils brûlèrent la ville. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Personne ne la délivra, car elle était éloignée de Sidon, et ses habitants n’avaient pas de liaison avec d’autres hommes: elle était dans la vallée qui s’étend vers Beth-Rehob. Les fils de Dan rebâtirent la ville, et y habitèrent; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 19:47
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ils l’appelèrent Dan, d’après le nom de Dan, leur père, qui était né à Israël; mais la ville s’appelait auparavant Laïs. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Comme ils étaient près de la maison de Mica, ils reconnurent la voix du jeune Lévite, s’approchèrent et lui dirent: Qui t’a amené ici? Que fais-tu dans ce lieu? Et qu’as-tu ici? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ils dressèrent pour eux l’image taillée; et Jonathan, fils de Guerschom, fils de Manassé, lui et ses fils, furent prêtres pour la tribu des Danites, jusqu’à l’époque de la captivité du pays. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ils établirent pour eux l’image taillée qu’avait faite Mica, pendant tout le temps que la maison de Dieu fut à Silo.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il leur répondit: Mica fait pour moi telle et telle chose, il me donne un salaire, et je lui sers de prêtre. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ils lui dirent: Consulte Dieu, afin que nous sachions si notre voyage aura du succès. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Et le prêtre leur répondit: Allez en paix; le voyage que vous faites est sous le regard de l’Éternel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les cinq hommes partirent, et ils arrivèrent à Laïs. Ils virent le peuple qui y était vivant en sécurité à la manière des Sidoniens, tranquille et sans inquiétude; il n’y avait dans le pays personne qui leur fît le moindre outrage en dominant sur eux; ils étaient éloignés des Sidoniens, et ils n’avaient pas de liaison avec d’autres hommes. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ils revinrent auprès de leurs frères à Tsorea et Eschthaol, et leurs frères leur dirent: Quelle nouvelle apportez-vous? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Allons! Répondirent-ils, montons contre eux; car nous avons vu le pays, et voici, il est très bon. Quoi! Vous restez sans rien dire! Ne soyez point paresseux à vous mettre en marche pour aller prendre possession de ce pays. '
