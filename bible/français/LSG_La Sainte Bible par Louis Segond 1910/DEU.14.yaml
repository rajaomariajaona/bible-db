document_id: DEU.14,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les incisions. Les animaux purs et impurs
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-21: cf. Lé 11. És 52:11.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous êtes les enfants de l’Éternel, votre Dieu. Vous ne vous ferez point '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:27
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '28'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’incisions et vous ne vous ferez point de place chauve entre les yeux pour un mort. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais vous ne mangerez d’aucun de ceux qui n’ont pas des nageoires et des écailles: vous les regarderez comme impurs. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous mangerez tout oiseau pur. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais voici ceux dont vous ne mangerez pas: l’aigle, l’orfraie et l’aigle de mer; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le milan, l’autour, le vautour et ce qui est de son espèce; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le corbeau et toutes ses espèces; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'l’autruche, le hibou, la mouette, l’épervier et ce qui est de son espèce; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le chat-huant, la chouette et le cygne; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le pélican, le cormoran et le plongeon; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'la cigogne, le héron et ce qui est de son espèce, la huppe et la chauve-souris. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous regarderez comme impur tout reptile qui vole: on n’en mangera point. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car tu es '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 7:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'un peuple saint pour l’Éternel, ton Dieu; et l’Éternel, ton Dieu, t’a choisi, pour que tu fusses un peuple qui lui appartînt entre tous les peuples qui sont sur la face de la terre. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous mangerez tout oiseau pur. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous ne mangerez d’aucune bête morte; tu la donneras à l’étranger qui sera dans tes portes, afin qu’il la mange, ou tu la vendras à un étranger; car tu es un peuple saint pour l’Éternel, ton Dieu. Tu ne feras point cuire un '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: chevreau dans le lait de sa mère.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les dîmes
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-29: cf. (De 12:17-19; 15:19-23.) De 26:12-15. Mal 3:10-12.'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu lèveras la dîme de tout ce que produira ta semence, de ce que rapportera ton champ chaque année. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 12:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et tu mangeras devant l’Éternel, ton Dieu, dans le lieu qu’il choisira pour y faire résider son nom, la dîme de ton blé, de ton moût et de ton huile, et les premiers-nés de ton gros et de ton menu bétail, afin que tu apprennes à craindre toujours l’Éternel, ton Dieu. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peut-être lorsque l’Éternel, ton Dieu, t’aura béni, le chemin sera-t-il trop long pour que tu puisses transporter ta dîme, à cause de ton éloignement du lieu qu’aura choisi l’Éternel, ton Dieu, pour y faire résider son nom. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, tu échangeras ta dîme contre de l’argent, tu serreras cet argent dans ta main, et tu iras au lieu que l’Éternel, ton Dieu, aura choisi. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Là, tu achèteras avec '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 21:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'l’argent tout ce que tu désireras, des bœufs, des brebis, du vin et des liqueurs fortes, tout ce qui te fera plaisir, tu mangeras devant l’Éternel, ton Dieu, et tu te réjouiras, toi et ta famille. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu ne délaisseras point le Lévite qui sera dans tes portes, car il n’a ni '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 18:20
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 10:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'part ni héritage avec toi. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au bout de trois ans, tu sortiras toute la dîme de tes produits pendant la troisième année, et tu la déposeras dans tes portes. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors viendront le Lévite, qui n’a ni part ni héritage avec toi, l’étranger, l’orphelin et la veuve, qui seront dans tes portes, et ils mangeront et se rassasieront, afin que l’Éternel, ton Dieu, te bénisse dans tous les travaux que tu entreprendras de tes mains.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu ne mangeras aucune chose abominable. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lé 11:2, etc.
      marker-yv: yv-n
    - type: text
      text: 'Voici les animaux que vous mangerez: le bœuf, la brebis et la chèvre; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le cerf, la gazelle et le daim; le bouquetin, le chevreuil, la chèvre sauvage et la girafe. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous mangerez de tout animal qui a la corne fendue, le pied fourchu, et qui rumine. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais vous ne mangerez pas de ceux qui ruminent seulement, ou qui ont la corne fendue et le pied fourchu seulement. Ainsi, vous ne mangerez pas le chameau, le lièvre et le daman, qui ruminent, mais qui n’ont pas la corne fendue: vous les regarderez comme impurs. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous ne mangerez pas le porc, qui a la corne fendue, mais qui ne rumine pas: vous le regarderez comme impur. Vous ne mangerez pas de leur chair, et vous ne toucherez pas leurs corps morts. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les animaux dont vous mangerez parmi tous ceux qui sont dans les eaux: vous mangerez de tous ceux qui ont des nageoires et des écailles. '
