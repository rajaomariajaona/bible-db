document_id: DEU.33,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Bénédiction prophétique de Moïse
  - type: heading
    content: 'V. 1-29: cf. Ge 49:1-28. (Ex 28:17-21, 29, 30.)'
  - type: text
    content: 'Voici la bénédiction par laquelle Moïse, homme de Dieu, bénit les enfants d’Israël, avant sa mort. '
  '10':
  - type: text
    content: Ils enseignent tes ordonnances à Jacob,
  - type: text
    content: Et ta loi à Israël;
  - type: text
    content: Ils mettent l’encens sous tes narines,
  - type: text
    content: Et l’holocauste sur ton autel.
  '11':
  - type: text
    content: Bénis sa force, ô Éternel!
  - type: text
    content: Agrée l’œuvre de ses mains!
  - type: text
    content: Brise les reins de ses adversaires,
  - type: text
    content: Et que ses ennemis ne se relèvent plus!
  '12':
  - type: text
    content: 'Sur Benjamin il dit:'
  - type: text
    content: C’est le bien-aimé de l’Éternel,
  - type: text
    content: Il habitera en sécurité auprès de lui;
  - type: text
    content: L’Éternel le couvrira toujours,
  - type: text
    content: Et résidera entre ses épaules.
  '13':
  - type: text
    content: 'Sur Joseph il dit:'
  - type: note
    content: Ge 49:25.
  - type: text
    content: Son pays recevra de l’Éternel, en signe de bénédiction,
  - type: text
    content: Le meilleur don du ciel, la rosée,
  - type: text
    content: Les meilleures eaux qui sont en bas,
  '14':
  - type: text
    content: Les meilleurs fruits du soleil,
  - type: text
    content: Les meilleurs fruits de chaque mois,
  '15':
  - type: text
    content: Les meilleurs produits des antiques montagnes,
  - type: text
    content: Les meilleurs produits des collines Éternelles,
  '16':
  - type: text
    content: Les meilleurs produits de la terre et de ce qu’elle renferme.
  - type: text
    content: Que la grâce de celui qui apparut dans le buisson
  - type: text
    content: Vienne sur la tête de Joseph,
  - type: text
    content: 'Sur le sommet de la tête '
  - type: note
    content: Ge 49:26.
  - type: text
    content: du prince de ses frères!
  '17':
  - type: text
    content: De son taureau premier-né il a la majesté;
  - type: text
    content: Ses cornes sont les cornes du buffle;
  - type: text
    content: Avec elles il frappera tous les peuples,
  - type: text
    content: 'Jusqu’aux extrémités de la terre:'
  - type: text
    content: Elles sont les myriades d’Éphraïm,
  - type: text
    content: Elles sont les milliers de Manassé.
  '18':
  - type: text
    content: 'Sur Zabulon il dit:'
  - type: text
    content: Réjouis-toi, Zabulon, dans tes courses,
  - type: text
    content: Et toi, Issacar, dans tes tentes!
  '19':
  - type: text
    content: Ils appelleront les peuples sur la montagne;
  - type: text
    content: Là, ils offriront des sacrifices de justice,
  - type: text
    content: Car ils suceront l’abondance de la mer,
  - type: text
    content: Et les trésors cachés dans le sable.
  '2':
  - type: text
    content: 'Il dit:'
  - type: text
    content: L’Éternel est venu du Sinaï,
  - type: text
    content: Il s’est levé sur eux de Séir,
  - type: text
    content: Il a resplendi de la montagne de Paran,
  - type: text
    content: 'Et il est sorti du milieu des saintes myriades:'
  - type: text
    content: Il leur a de sa droite envoyé le feu de la loi.
  '20':
  - type: text
    content: 'Sur Gad il dit:'
  - type: text
    content: Béni soit celui qui met Gad au large!
  - type: text
    content: Gad repose comme une lionne, Il déchire le bras et la tête.
  '21':
  - type: text
    content: Il a choisi les prémices du pays,
  - type: text
    content: Car là est caché l’héritage du législateur;
  - type: text
    content: Il a marché en tête du peuple,
  - type: text
    content: Il a exécuté la justice de l’Éternel,
  - type: text
    content: Et ses ordonnances envers Israël.
  '22':
  - type: text
    content: 'Sur Dan il dit:'
  - type: text
    content: Dan est un jeune lion,
  - type: text
    content: Qui s’élance de Basan.
  '23':
  - type: text
    content: 'Sur Nephthali il dit:'
  - type: text
    content: Nephthali, rassasié de faveurs
  - type: text
    content: Et comblé des bénédictions de l’Éternel,
  - type: text
    content: Prends possession de l’occident et du midi!
  '24':
  - type: text
    content: 'Sur Aser il dit:'
  - type: text
    content: Béni soit Aser entre les enfants d’Israël!
  - type: text
    content: Qu’il soit agréable à ses frères,
  - type: text
    content: Et qu’il plonge son pied dans l’huile!
  '25':
  - type: text
    content: Que tes verrous soient de fer et d’airain,
  - type: text
    content: Et que ta vigueur dure autant que tes jours!
  '26':
  - type: text
    content: Nul n’est semblable au Dieu d’Israël,
  - type: text
    content: Il est porté sur les cieux pour venir à ton aide,
  - type: text
    content: Il est avec majesté porté sur les nuées.
  '27':
  - type: text
    content: Le Dieu d’éternité est un refuge,
  - type: text
    content: Et sous ses bras Éternels est une retraite.
  - type: text
    content: Devant toi il a chassé l’ennemi,
  - type: text
    content: 'Et il a dit: Extermine.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: Jé 23:6; 33:16.
  - type: text
    content: Israël est en sécurité dans sa demeure,
  - type: text
    content: La source de Jacob est à part
  - type: text
    content: Dans un pays de blé et de moût,
  - type: text
    content: Et son ciel distille la rosée.
  '29':
  - type: text
    content: Que tu es heureux, Israël!
  - type: text
    content: Qui est comme toi,
  - type: text
    content: Un peuple sauvé par l’Éternel,
  - type: text
    content: Le bouclier de ton secours
  - type: text
    content: Et l’épée de ta gloire?
  - type: text
    content: Tes ennemis feront défaut devant toi,
  - type: text
    content: Et tu fouleras leurs lieux élevés.
  '3':
  - type: text
    content: Oui, il aime les peuples;
  - type: text
    content: Tous ses saints sont dans ta main.
  - type: text
    content: Ils se sont tenus à tes pieds,
  - type: text
    content: Ils ont reçu tes paroles.
  '4':
  - type: text
    content: Moïse nous a donné la loi,
  - type: text
    content: Héritage de l’assemblée de Jacob.
  '5':
  - type: text
    content: Il était roi en Israël,
  - type: text
    content: Quand s’assemblaient les chefs du peuple
  - type: text
    content: Et les tribus d’Israël.
  '6':
  - type: text
    content: Que Ruben vive et qu’il ne meure point,
  - type: text
    content: Et que ses hommes soient nombreux!
  '7':
  - type: text
    content: 'Voici sur Juda ce qu’il dit:'
  - type: text
    content: Écoute, ô Éternel! La voix de Juda,
  - type: text
    content: Et ramène-le vers son peuple.
  - type: text
    content: Que ses mains soient puissantes,
  - type: text
    content: Et que tu lui sois en aide contre ses ennemis!
  '8':
  - type: text
    content: 'Sur Lévi il dit:'
  - type: text
    content: Les thummim et les urim ont été confiés à l’homme saint,
  - type: text
    content: Que tu as tenté à Massa,
  - type: text
    content: Et avec qui tu as contesté aux eaux de Meriba.
  '9':
  - type: text
    content: 'Lévi dit de son père et de sa mère:'
  - type: text
    content: Je ne les ai point vus!
  - type: text
    content: Il ne distingue point ses frères,
  - type: text
    content: Il ne connaît point ses enfants.
  - type: text
    content: Car ils observent ta parole,
  - type: text
    content: Et ils gardent ton alliance;
