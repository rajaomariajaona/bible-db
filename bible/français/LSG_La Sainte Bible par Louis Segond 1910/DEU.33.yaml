document_id: DEU.33,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Bénédiction prophétique de Moïse
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-29: cf. Ge 49:1-28. (Ex 28:17-21, 29, 30.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici la bénédiction par laquelle Moïse, homme de Dieu, bénit les enfants d’Israël, avant sa mort. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ils enseignent tes ordonnances à Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ta loi à Israël;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils mettent l’encens sous tes narines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’holocauste sur ton autel.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Bénis sa force, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Agrée l’œuvre de ses mains!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Brise les reins de ses adversaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que ses ennemis ne se relèvent plus!
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Sur Benjamin il dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est le bien-aimé de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il habitera en sécurité auprès de lui;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel le couvrira toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et résidera entre ses épaules.
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Sur Joseph il dit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 49:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Son pays recevra de l’Éternel, en signe de bénédiction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le meilleur don du ciel, la rosée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les meilleures eaux qui sont en bas,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Les meilleurs fruits du soleil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les meilleurs fruits de chaque mois,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Les meilleurs produits des antiques montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les meilleurs produits des collines Éternelles,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Les meilleurs produits de la terre et de ce qu’elle renferme.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la grâce de celui qui apparut dans le buisson
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vienne sur la tête de Joseph,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sur le sommet de la tête '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 49:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: du prince de ses frères!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: De son taureau premier-né il a la majesté;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses cornes sont les cornes du buffle;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec elles il frappera tous les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Jusqu’aux extrémités de la terre:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles sont les myriades d’Éphraïm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles sont les milliers de Manassé.
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Sur Zabulon il dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réjouis-toi, Zabulon, dans tes courses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toi, Issacar, dans tes tentes!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ils appelleront les peuples sur la montagne;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là, ils offriront des sacrifices de justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils suceront l’abondance de la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les trésors cachés dans le sable.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est venu du Sinaï,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’est levé sur eux de Séir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a resplendi de la montagne de Paran,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et il est sorti du milieu des saintes myriades:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il leur a de sa droite envoyé le feu de la loi.
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Sur Gad il dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni soit celui qui met Gad au large!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gad repose comme une lionne, Il déchire le bras et la tête.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Il a choisi les prémices du pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car là est caché l’héritage du législateur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a marché en tête du peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a exécuté la justice de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses ordonnances envers Israël.
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Sur Dan il dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dan est un jeune lion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui s’élance de Basan.
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Sur Nephthali il dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nephthali, rassasié de faveurs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et comblé des bénédictions de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prends possession de l’occident et du midi!
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Sur Aser il dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni soit Aser entre les enfants d’Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il soit agréable à ses frères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il plonge son pied dans l’huile!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Que tes verrous soient de fer et d’airain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que ta vigueur dure autant que tes jours!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Nul n’est semblable au Dieu d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est porté sur les cieux pour venir à ton aide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est avec majesté porté sur les nuées.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Le Dieu d’éternité est un refuge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sous ses bras Éternels est une retraite.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant toi il a chassé l’ennemi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et il a dit: Extermine.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 23:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Israël est en sécurité dans sa demeure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La source de Jacob est à part
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans un pays de blé et de moût,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et son ciel distille la rosée.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Que tu es heureux, Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est comme toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un peuple sauvé par l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le bouclier de ton secours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’épée de ta gloire?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes ennemis feront défaut devant toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu fouleras leurs lieux élevés.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Oui, il aime les peuples;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ses saints sont dans ta main.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se sont tenus à tes pieds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont reçu tes paroles.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Moïse nous a donné la loi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Héritage de l’assemblée de Jacob.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Il était roi en Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand s’assemblaient les chefs du peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les tribus d’Israël.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Que Ruben vive et qu’il ne meure point,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que ses hommes soient nombreux!
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Voici sur Juda ce qu’il dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoute, ô Éternel! La voix de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ramène-le vers son peuple.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ses mains soient puissantes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que tu lui sois en aide contre ses ennemis!
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Sur Lévi il dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les thummim et les urim ont été confiés à l’homme saint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tu as tenté à Massa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et avec qui tu as contesté aux eaux de Meriba.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Lévi dit de son père et de sa mère:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne les ai point vus!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne distingue point ses frères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne connaît point ses enfants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils observent ta parole,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils gardent ton alliance;
