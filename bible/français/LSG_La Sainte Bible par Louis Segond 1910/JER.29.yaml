document_id: JER.29
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lettre aux captifs
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-15: cf. (Jé 24:1-7; 25:11, 12. 2 Ch 36:21-23.) Jé 27:12, etc. Ps 103:8, 9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici le contenu de la lettre que Jérémie, le prophète, envoya de Jérusalem au reste des anciens en captivité, aux sacrificateurs, aux prophètes, et à tout le peuple, que Nebucadnetsar avait emmenés captifs de Jérusalem à Babylone, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'après que le roi '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 R 24:12, etc.
    marker-yv: yv-n
  - type: text
    text: 'Jeconia, la reine, les eunuques, les chefs de Juda et de Jérusalem, les charpentiers et les serruriers, furent sortis de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il la remit à Éleasa, fils de Schaphan, et à Guemaria, fils de Hilkija, envoyés à Babylone par Sédécias, roi de Juda, auprès de Nebucadnetsar, roi de Babylone. Elle était ainsi conçue: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël, à tous les captifs que j’ai emmenés de Jérusalem à Babylone: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Bâtissez des maisons, et habitez-les; plantez des jardins, et mangez-en les fruits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Prenez des femmes, et engendrez des fils et des filles; prenez des femmes pour vos fils, et donnez des maris à vos filles, afin qu’elles enfantent des fils et des filles; multipliez là où vous êtes, et ne diminuez pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Recherchez le bien de la ville où je vous ai menés en captivité, et priez l’Éternel en sa faveur, parce que votre bonheur dépend du sien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Car ainsi parle l’Éternel des armées, le Dieu d’Israël: Ne vous laissez pas '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 14:14
      metadata:
        usfm: JER.14.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:21
      metadata:
        usfm: JER.23.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:15
      metadata:
        usfm: JER.27.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tromper par vos prophètes qui sont au milieu de vous, et par vos devins, n’écoutez pas vos songeurs dont vous provoquez les songes! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Car c’est le mensonge qu’ils vous prophétisent en mon nom. Je ne les ai point envoyés, dit l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais voici ce que dit l’Éternel: Dès que soixante-dix ans seront écoulés pour Babylone, je me souviendrai de vous, et j’accomplirai à votre égard ma bonne parole, en vous ramenant dans ce lieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Car je connais les projets que j’ai formés sur vous, dit l’Éternel, projets de paix et non de malheur, afin de vous donner un avenir et de l’espérance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Vous '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 9
      metadata:
        usfm: DAN.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'm’invoquerez, et vous partirez; vous me prierez, et je vous exaucerai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Vous me chercherez, et vous me trouverez, si vous me cherchez de tout votre cœur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je me laisserai trouver par vous, dit l’Éternel, et je ramènerai vos captifs; je vous '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 23:3
      metadata:
        usfm: JER.23.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'rassemblerai de toutes les nations et de tous les lieux où je vous ai chassés, dit l’Éternel, et je vous ramènerai dans le lieu d’où je vous ai fait aller en captivité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Cependant vous dites: Dieu nous a suscité des prophètes à Babylone!'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-19: cf. Jé 24:8-10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ainsi parle l’Éternel sur le roi qui occupe le trône de David, sur tout le peuple qui habite cette ville, sur vos frères qui ne sont point allés avec vous en captivité; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ainsi parle l’Éternel des armées: Voici, j’enverrai parmi eux '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 24:8
      metadata:
        usfm: JER.24.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: JER.24.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’épée, la famine et la peste, et je les rendrai semblables à des figues affreuses qui ne peuvent être mangées à cause de leur mauvaise qualité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je les poursuivrai par l’épée, par la famine et par la peste, je les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:25
      metadata:
        usfm: DEU.28.25
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '37'
      metadata:
        usfm: DEU.28.37
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 15:4
      metadata:
        usfm: JER.15.4
    - type: text
      text: ; 24:9, etc.
    marker-yv: yv-n
  - type: text
    text: 'rendrai un objet d’effroi pour tous les royaumes de la terre, un sujet de malédiction, de désolation, de moquerie et d’opprobre, parmi toutes les nations où je les chasserai, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: parce qu’ils n’ont pas écouté mes paroles, dit l’Éternel, eux à qui j’ai envoyé mes serviteurs, les prophètes, à qui je les ai envoyés dès le matin; et ils n’ont pas écouté, dit l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-23: cf. Jé 23:13-32.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais vous, écoutez la parole de l’Éternel, vous tous, captifs, que j’ai envoyés de Jérusalem à Babylone! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël, sur Achab, fils de Kolaja, et sur Sédécias, fils de Maaséja, qui vous prophétisent le mensonge en mon nom: Voici, je les livre entre les mains de Nebucadnetsar, roi de Babylone; et il les fera mourir sous vos yeux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'On se servira d’eux comme d’un sujet de malédiction, parmi tous les captifs de Juda qui sont à Babylone; on dira: Que l’Éternel te traite comme Sédécias et comme Achab, que le roi de Babylone a fait rôtir au feu! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Et cela arrivera parce qu’ils ont commis une infamie en Israël, se livrant à l’adultère avec les femmes de leur prochain, et parce qu’ils ont dit des mensonges en mon nom, quand je ne leur avais point donné d’ordre. Je le sais, et j’en suis témoin, dit l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 24-32: cf. Jé 20:1-6; 28. 2 Pi 2:1.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tu diras à Schemaeja, Néchélamite: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël: Tu as envoyé en ton nom à tout le peuple de Jérusalem, à Sophonie, fils de Maaséja, le sacrificateur, et à tous les sacrificateurs, une lettre ainsi conçue: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'L’Éternel t’a établi sacrificateur à la place de Jehojada, le sacrificateur, afin qu’il y ait dans la maison de l’Éternel des inspecteurs pour surveiller tout homme qui est fou et se donne pour prophète, et afin que tu le mettes en '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 20:1
      metadata:
        usfm: JER.20.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: JER.20.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: JER.20.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'prison et dans les fers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Maintenant, pourquoi ne réprimes-tu pas Jérémie d’Anathoth, qui prophétise parmi vous, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'qui nous a même envoyé dire à Babylone: Elle sera longue, la captivité; bâtissez des maisons, et habitez-les; plantez des jardins, et mangez-en les fruits! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Sophonie, le sacrificateur, lut cette lettre en présence de Jérémie, le prophète. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Et la parole de l’Éternel fut adressée à Jérémie, en ces mots: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fais dire à tous les captifs: Ainsi parle l’Éternel sur Schemaeja, Néchélamite: Parce que Schemaeja vous prophétise, sans que je l’aie envoyé, et qu’il vous inspire une '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 28:15
      metadata:
        usfm: JER.28.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'fausse confiance, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'voici ce que dit l’Éternel: Je châtierai Schemaeja, Néchélamite, et sa postérité; nul des siens n’habitera au milieu de ce peuple, et il ne verra pas le bien que je ferai à mon peuple, dit l’Éternel; car ses paroles sont une '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 28:16
      metadata:
        usfm: JER.28.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: révolte contre l’Éternel.
