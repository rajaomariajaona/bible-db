document_id: JER.29,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Lettre aux captifs
  - type: heading
    content: 'V. 1-15: cf. (Jé 24:1-7; 25:11, 12. 2 Ch 36:21-23.) Jé 27:12, etc. Ps 103:8, 9.'
  - type: text
    content: 'Voici le contenu de la lettre que Jérémie, le prophète, envoya de Jérusalem au reste des anciens en captivité, aux sacrificateurs, aux prophètes, et à tout le peuple, que Nebucadnetsar avait emmenés captifs de Jérusalem à Babylone, '
  '10':
  - type: text
    content: 'Mais voici ce que dit l’Éternel: Dès que soixante-dix ans seront écoulés pour Babylone, je me souviendrai de vous, et j’accomplirai à votre égard ma bonne parole, en vous ramenant dans ce lieu. '
  '11':
  - type: text
    content: 'Car je connais les projets que j’ai formés sur vous, dit l’Éternel, projets de paix et non de malheur, afin de vous donner un avenir et de l’espérance. '
  '12':
  - type: text
    content: 'Vous '
  - type: note
    content: Da 9.
  - type: text
    content: 'm’invoquerez, et vous partirez; vous me prierez, et je vous exaucerai. '
  '13':
  - type: text
    content: 'Vous me chercherez, et vous me trouverez, si vous me cherchez de tout votre cœur. '
  '14':
  - type: text
    content: 'Je me laisserai trouver par vous, dit l’Éternel, et je ramènerai vos captifs; je vous '
  - type: note
    content: Jé 23:3.
  - type: text
    content: 'rassemblerai de toutes les nations et de tous les lieux où je vous ai chassés, dit l’Éternel, et je vous ramènerai dans le lieu d’où je vous ai fait aller en captivité. '
  '15':
  - type: text
    content: 'Cependant vous dites: Dieu nous a suscité des prophètes à Babylone!'
  - type: heading
    content: 'V. 16-19: cf. Jé 24:8-10.'
  '16':
  - type: text
    content: 'Ainsi parle l’Éternel sur le roi qui occupe le trône de David, sur tout le peuple qui habite cette ville, sur vos frères qui ne sont point allés avec vous en captivité; '
  '17':
  - type: text
    content: 'ainsi parle l’Éternel des armées: Voici, j’enverrai parmi eux '
  - type: note
    content: Jé 24:8, 10.
  - type: text
    content: 'l’épée, la famine et la peste, et je les rendrai semblables à des figues affreuses qui ne peuvent être mangées à cause de leur mauvaise qualité. '
  '18':
  - type: text
    content: 'Je les poursuivrai par l’épée, par la famine et par la peste, je les '
  - type: note
    content: De 28:25, 37. Jé 15:4; 24:9, etc.
  - type: text
    content: 'rendrai un objet d’effroi pour tous les royaumes de la terre, un sujet de malédiction, de désolation, de moquerie et d’opprobre, parmi toutes les nations où je les chasserai, '
  '19':
  - type: text
    content: parce qu’ils n’ont pas écouté mes paroles, dit l’Éternel, eux à qui j’ai envoyé mes serviteurs, les prophètes, à qui je les ai envoyés dès le matin; et ils n’ont pas écouté, dit l’Éternel.
  - type: heading
    content: 'V. 20-23: cf. Jé 23:13-32.'
  '2':
  - type: text
    content: 'après que le roi '
  - type: note
    content: 2 R 24:12, etc.
  - type: text
    content: 'Jeconia, la reine, les eunuques, les chefs de Juda et de Jérusalem, les charpentiers et les serruriers, furent sortis de Jérusalem. '
  '20':
  - type: text
    content: 'Mais vous, écoutez la parole de l’Éternel, vous tous, captifs, que j’ai envoyés de Jérusalem à Babylone! '
  '21':
  - type: text
    content: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël, sur Achab, fils de Kolaja, et sur Sédécias, fils de Maaséja, qui vous prophétisent le mensonge en mon nom: Voici, je les livre entre les mains de Nebucadnetsar, roi de Babylone; et il les fera mourir sous vos yeux. '
  '22':
  - type: text
    content: 'On se servira d’eux comme d’un sujet de malédiction, parmi tous les captifs de Juda qui sont à Babylone; on dira: Que l’Éternel te traite comme Sédécias et comme Achab, que le roi de Babylone a fait rôtir au feu! '
  '23':
  - type: text
    content: Et cela arrivera parce qu’ils ont commis une infamie en Israël, se livrant à l’adultère avec les femmes de leur prochain, et parce qu’ils ont dit des mensonges en mon nom, quand je ne leur avais point donné d’ordre. Je le sais, et j’en suis témoin, dit l’Éternel.
  - type: heading
    content: 'V. 24-32: cf. Jé 20:1-6; 28. 2 Pi 2:1.'
  '24':
  - type: text
    content: 'Tu diras à Schemaeja, Néchélamite: '
  '25':
  - type: text
    content: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël: Tu as envoyé en ton nom à tout le peuple de Jérusalem, à Sophonie, fils de Maaséja, le sacrificateur, et à tous les sacrificateurs, une lettre ainsi conçue: '
  '26':
  - type: text
    content: 'L’Éternel t’a établi sacrificateur à la place de Jehojada, le sacrificateur, afin qu’il y ait dans la maison de l’Éternel des inspecteurs pour surveiller tout homme qui est fou et se donne pour prophète, et afin que tu le mettes en '
  - type: note
    content: Jé 20:1, 2, 3.
  - type: text
    content: 'prison et dans les fers. '
  '27':
  - type: text
    content: 'Maintenant, pourquoi ne réprimes-tu pas Jérémie d’Anathoth, qui prophétise parmi vous, '
  '28':
  - type: text
    content: 'qui nous a même envoyé dire à Babylone: Elle sera longue, la captivité; bâtissez des maisons, et habitez-les; plantez des jardins, et mangez-en les fruits! '
  '29':
  - type: text
    content: 'Sophonie, le sacrificateur, lut cette lettre en présence de Jérémie, le prophète. '
  '3':
  - type: text
    content: 'Il la remit à Éleasa, fils de Schaphan, et à Guemaria, fils de Hilkija, envoyés à Babylone par Sédécias, roi de Juda, auprès de Nebucadnetsar, roi de Babylone. Elle était ainsi conçue: '
  '30':
  - type: text
    content: 'Et la parole de l’Éternel fut adressée à Jérémie, en ces mots: '
  '31':
  - type: text
    content: 'Fais dire à tous les captifs: Ainsi parle l’Éternel sur Schemaeja, Néchélamite: Parce que Schemaeja vous prophétise, sans que je l’aie envoyé, et qu’il vous inspire une '
  - type: note
    content: Jé 28:15.
  - type: text
    content: 'fausse confiance, '
  '32':
  - type: text
    content: 'voici ce que dit l’Éternel: Je châtierai Schemaeja, Néchélamite, et sa postérité; nul des siens n’habitera au milieu de ce peuple, et il ne verra pas le bien que je ferai à mon peuple, dit l’Éternel; car ses paroles sont une '
  - type: note
    content: Jé 28:16.
  - type: text
    content: révolte contre l’Éternel.
  '4':
  - type: text
    content: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël, à tous les captifs que j’ai emmenés de Jérusalem à Babylone: '
  '5':
  - type: text
    content: 'Bâtissez des maisons, et habitez-les; plantez des jardins, et mangez-en les fruits. '
  '6':
  - type: text
    content: 'Prenez des femmes, et engendrez des fils et des filles; prenez des femmes pour vos fils, et donnez des maris à vos filles, afin qu’elles enfantent des fils et des filles; multipliez là où vous êtes, et ne diminuez pas. '
  '7':
  - type: text
    content: 'Recherchez le bien de la ville où je vous ai menés en captivité, et priez l’Éternel en sa faveur, parce que votre bonheur dépend du sien. '
  '8':
  - type: text
    content: 'Car ainsi parle l’Éternel des armées, le Dieu d’Israël: Ne vous laissez pas '
  - type: note
    content: Jé 14:14; 23:21; 27:15.
  - type: text
    content: 'tromper par vos prophètes qui sont au milieu de vous, et par vos devins, n’écoutez pas vos songeurs dont vous provoquez les songes! '
  '9':
  - type: text
    content: 'Car c’est le mensonge qu’ils vous prophétisent en mon nom. Je ne les ai point envoyés, dit l’Éternel. '
