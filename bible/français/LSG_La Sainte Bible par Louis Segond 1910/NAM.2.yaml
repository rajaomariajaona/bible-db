document_id: NAM.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-14: cf. És 33:1-4. Jos 10:25. Ps 92:10.'
  - type: text
    content: ' '
  - type: note
    content: És 52:7. Ro 10:15.
  - type: text
    content: Voici sur les montagnes
  - type: text
    content: Les pieds du messager qui annonce la paix!
  - type: text
    content: Célèbre tes fêtes, Juda, accomplis tes vœux!
  - type: text
    content: Car le méchant ne passera plus au milieu de toi,
  - type: text
    content: Il est entièrement exterminé…
  '10':
  - type: text
    content: Pillez l’argent! Pillez l’or!
  - type: text
    content: Il y a des trésors sans fin,
  - type: text
    content: Des richesses en objets précieux de toute espèce.
  '11':
  - type: text
    content: On pille, on dévaste, on ravage!
  - type: text
    content: 'Et '
  - type: note
    content: De 1:28; 20:8. Jos 2:11; 5:1; 7:5. És 13:7. Éz 21:7.
  - type: text
    content: les cœurs sont abattus,
  - type: text
    content: Les genoux chancellent,
  - type: note
    content: És 13:8; 21:3.
  - type: text
    content: Tous les reins souffrent,
  - type: text
    content: Tous les visages pâlissent.
  '12':
  - type: text
    content: Qu’est devenu ce repaire de lions,
  - type: text
    content: Ce pâturage des lionceaux,
  - type: text
    content: Où se retiraient le lion, la lionne, le petit du lion,
  - type: text
    content: Sans qu’il y eût personne pour les troubler?
  '13':
  - type: text
    content: Le lion déchirait pour ses petits,
  - type: text
    content: Etranglait pour ses lionnes;
  - type: text
    content: Il remplissait de proie ses antres,
  - type: text
    content: De dépouilles ses repaires.
  '14':
  - type: text
    content: Voici, j’en veux à toi, dit l’Éternel des armées;
  - type: text
    content: Je réduirai tes chars en fumée,
  - type: text
    content: L’épée dévorera tes lionceaux,
  - type: text
    content: J’arracherai du pays ta proie,
  - type: text
    content: Et l’on n’entendra plus la voix de tes messagers.
  '2':
  - type: text
    content: Le destructeur marche contre toi.
  - type: text
    content: Garde la forteresse!
  - type: text
    content: Veille sur la route! Affermis tes reins!
  - type: text
    content: Recueille toute ta force!…
  '3':
  - type: text
    content: Car l’Éternel rétablit la gloire de Jacob
  - type: text
    content: Et la gloire d’Israël,
  - type: text
    content: 'Parce que les '
  - type: note
    content: Ps 80:13. És 10:12.
  - type: text
    content: pillards les ont pillés
  - type: text
    content: Et ont détruit leurs ceps…
  '4':
  - type: text
    content: Les boucliers de ses héros sont rouges,
  - type: text
    content: Les guerriers sont vêtus de pourpre;
  - type: text
    content: Avec le fer qui étincelle apparaissent les chars,
  - type: text
    content: Au jour qu’il a fixé pour la bataille,
  - type: text
    content: Et les lances sont agitées.
  '5':
  - type: text
    content: Les chars s’élancent dans la campagne,
  - type: text
    content: Se précipitent sur les places;
  - type: text
    content: A les voir, on dirait des flambeaux,
  - type: text
    content: Ils courent comme des éclairs…
  '6':
  - type: text
    content: Il se souvient de ses vaillants hommes,
  - type: text
    content: Mais ils chancellent dans leur marche;
  - type: text
    content: On se hâte vers les murs,
  - type: text
    content: Et l’on se prépare à la défense…
  '7':
  - type: text
    content: Les portes des fleuves sont ouvertes,
  - type: text
    content: Et le palais s’écroule!…
  '8':
  - type: text
    content: 'C’en est fait: elle est mise à nu, elle est emmenée;'
  - type: text
    content: Ses servantes gémissent comme des colombes,
  - type: text
    content: Et se frappent la poitrine.
  '9':
  - type: text
    content: Ninive était jadis comme un réservoir plein d’eau…
  - type: text
    content: Les voilà qui fuient…
  - type: text
    content: Arrêtez! Arrêtez!…
  - type: text
    content: Mais nul ne se retourne…
