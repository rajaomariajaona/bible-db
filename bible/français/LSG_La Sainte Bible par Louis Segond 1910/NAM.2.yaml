    marker-yv: yv-n
  - type: text
    text: Voici sur les montagnes
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les pieds du messager qui annonce la paix!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Célèbre tes fêtes, Juda, accomplis tes vœux!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car le méchant ne passera plus au milieu de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est entièrement exterminé…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le destructeur marche contre toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Garde la forteresse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Veille sur la route! Affermis tes reins!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Recueille toute ta force!…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car l’Éternel rétablit la gloire de Jacob
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la gloire d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Parce que les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 80:13
      metadata:
        usfm: PSA.80.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 10:12
      metadata:
        usfm: ISA.10.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: pillards les ont pillés
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ont détruit leurs ceps…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les boucliers de ses héros sont rouges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les guerriers sont vêtus de pourpre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec le fer qui étincelle apparaissent les chars,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au jour qu’il a fixé pour la bataille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les lances sont agitées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les chars s’élancent dans la campagne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Se précipitent sur les places;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A les voir, on dirait des flambeaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils courent comme des éclairs…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il se souvient de ses vaillants hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ils chancellent dans leur marche;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On se hâte vers les murs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’on se prépare à la défense…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les portes des fleuves sont ouvertes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le palais s’écroule!…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'C’en est fait: elle est mise à nu, elle est emmenée;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses servantes gémissent comme des colombes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et se frappent la poitrine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ninive était jadis comme un réservoir plein d’eau…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les voilà qui fuient…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Arrêtez! Arrêtez!…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais nul ne se retourne…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Pillez l’argent! Pillez l’or!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il y a des trésors sans fin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des richesses en objets précieux de toute espèce.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: On pille, on dévaste, on ravage!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 1:28
      metadata:
        usfm: DEU.1.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:8
      metadata:
        usfm: DEU.20.8
    - type: text
      text: '. '
