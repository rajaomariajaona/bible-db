        text: Éz 21:7
      metadata:
        usfm: EZK.21.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: les cœurs sont abattus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les genoux chancellent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 13:8
      metadata:
        usfm: ISA.13.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:3
      metadata:
        usfm: ISA.21.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tous les reins souffrent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les visages pâlissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Qu’est devenu ce repaire de lions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce pâturage des lionceaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où se retiraient le lion, la lionne, le petit du lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans qu’il y eût personne pour les troubler?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Le lion déchirait pour ses petits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Etranglait pour ses lionnes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il remplissait de proie ses antres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De dépouilles ses repaires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Voici, j’en veux à toi, dit l’Éternel des armées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je réduirai tes chars en fumée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’épée dévorera tes lionceaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’arracherai du pays ta proie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’on n’entendra plus la voix de tes messagers.
