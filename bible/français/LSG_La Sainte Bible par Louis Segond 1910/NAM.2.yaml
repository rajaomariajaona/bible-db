        text: Jos 2:11
      metadata:
        usfm: JOS.2.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:1
      metadata:
        usfm: JOS.5.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:5
      metadata:
        usfm: JOS.7.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
