document_id: LEV.7
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. Lé 5:14-26.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici la loi du sacrifice de culpabilité: c’est une chose très sainte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'C’est dans le lieu où l’on égorge l’holocauste que sera égorgée la victime pour le sacrifice de culpabilité. On en répandra le sang sur l’autel tout autour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'On en offrira toute la graisse, la queue, la graisse qui couvre les entrailles, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'les deux rognons, et la graisse qui les entoure, qui couvre les flancs, et le grand lobe du foie, qu’on détachera près des rognons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le sacrificateur brûlera cela sur l’autel en sacrifice consumé devant l’Éternel. C’est un sacrifice de culpabilité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tout mâle parmi les sacrificateurs en mangera; il le mangera dans un lieu saint: c’est une chose très sainte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il en est du sacrifice de culpabilité comme du sacrifice d’expiation; la loi est la même pour ces deux sacrifices: la victime sera pour le sacrificateur qui fera l’expiation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le sacrificateur qui offrira l’holocauste de quelqu’un aura pour lui la peau de l’holocauste qu’il a offert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Toute offrande cuite au four, préparée sur le gril ou à la poêle, sera pour le sacrificateur qui l’a offerte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Toute offrande pétrie à l’huile et sèche sera pour tous les fils d’Aaron, pour l’un comme pour l’autre.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-21: cf. Lé 3; 19:5-8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voici la loi du sacrifice d’actions de grâces, qu’on offrira à l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Si quelqu’un '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 116:17
      metadata:
        usfm: PSA.116.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’offre par reconnaissance, il offrira, avec le sacrifice d’actions de grâces, des gâteaux sans levain pétris à l’huile, des galettes sans levain arrosées d’huile, et des gâteaux de fleur de farine frite et pétris à l’huile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'A ces gâteaux il ajoutera du pain levé pour son offrande, avec son sacrifice de reconnaissance et d’actions de grâces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'On présentera par élévation à l’Éternel une portion de chaque offrande; elle sera pour le sacrificateur qui a répandu le sang de la victime d’actions de grâces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'La chair du sacrifice de reconnaissance et d’actions de grâces sera mangée le jour où il est offert; on n’en laissera rien jusqu’au matin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Si quelqu’un offre un sacrifice pour l’accomplissement d’un vœu ou comme offrande volontaire, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:6
      metadata:
        usfm: LEV.19.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la victime sera mangée le jour où il l’offrira, et ce qui en restera sera mangé le lendemain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ce qui restera de la chair de la victime sera brûlé au feu le troisième jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dans le cas où l’on mangerait de la chair de son sacrifice d’actions de grâces le troisième jour, le sacrifice ne sera point agréé; il n’en sera pas tenu compte à celui qui l’a offert; ce sera une chose infecte, et quiconque en mangera restera chargé de sa faute. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'La chair qui a touché quelque chose d’impur ne sera point mangée: elle sera brûlée au feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tout homme pur peut manger de la chair; mais celui qui, se trouvant en état d’impureté, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 15:3
      metadata:
        usfm: LEV.15.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mangera de la chair du sacrifice d’actions de grâces qui appartient à l’Éternel, celui-là sera retranché de son peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Et celui qui touchera quelque chose d’impur, une souillure humaine, un animal impur, ou quoi que ce soit d’impur, et qui mangera de la chair du sacrifice d’actions de grâces qui appartient à l’Éternel, celui-là sera retranché de son peuple.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-27: cf. Lé 3:16, 17; 17:10-14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Parle aux enfants d’Israël, et dis: Vous ne mangerez point de graisse de bœuf, d’agneau ni de chèvre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'La graisse d’une bête morte ou déchirée pourra servir à un usage quelconque; mais vous ne la mangerez point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Car celui qui mangera de la graisse des animaux dont on offre à l’Éternel des sacrifices consumés par le feu, celui-là sera retranché de son peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 9:4
      metadata:
        usfm: GEN.9.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 3:17
      metadata:
        usfm: LEV.3.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:14
      metadata:
        usfm: LEV.17.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous ne mangerez point de sang, ni d’oiseau, ni de bétail, dans tous les lieux où vous habiterez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Celui qui mangera du sang d’une espèce quelconque, celui-là sera retranché de son peuple.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 28-38: cf. (Lé 10:14, 15. No 18:8-11, 18, 19.) Ex 29:24-28.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Parle aux enfants d’Israël, et dis: Celui qui offrira à l’Éternel son sacrifice d’actions de grâces apportera son offrande à l’Éternel, prise sur son sacrifice d’actions de grâces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il apportera de ses propres mains ce qui doit être consumé par le feu devant l’Éternel; il apportera la graisse avec la poitrine, la poitrine '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 29:24
      metadata:
        usfm: EXO.29.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour l’agiter de côté et d’autre devant l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Le sacrificateur brûlera la graisse sur l’autel, et la poitrine sera pour Aaron et pour ses fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dans vos sacrifices d’actions de grâces, vous donnerez au sacrificateur l’épaule droite, en la présentant par élévation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Celui des fils d’Aaron qui offrira le sang et la graisse du sacrifice d’actions de grâces aura l’épaule droite pour sa part. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Car je prends sur les sacrifices d’actions de grâces offerts par les enfants d’Israël '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 29:27
      metadata:
        usfm: EXO.29.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 18:11
      metadata:
        usfm: NUM.18.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la poitrine qu’on agitera de côté et d’autre et l’épaule qu’on présentera par élévation, et je les donne au sacrificateur Aaron et à ses fils, par une loi perpétuelle qu’observeront les enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'C’est là le droit que l’onction d’Aaron et de ses fils leur donnera sur les sacrifices consumés par le feu devant l’Éternel, depuis le jour où ils seront présentés pour être à mon service dans le sacerdoce. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'C’est ce que l’Éternel ordonne aux enfants d’Israël de leur donner depuis le jour de leur onction; ce sera une loi perpétuelle parmi leurs descendants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Telle est la loi de l’holocauste, de l’offrande, du sacrifice d’expiation, du sacrifice de culpabilité, de la consécration, et du sacrifice d’actions de grâces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: L’Éternel la prescrivit à Moïse sur la montagne de Sinaï, le jour où il ordonna aux enfants d’Israël de présenter leurs offrandes à l’Éternel dans le désert du Sinaï.
