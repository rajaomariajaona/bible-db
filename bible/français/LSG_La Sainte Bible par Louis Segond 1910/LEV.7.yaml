document_id: LEV.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-10: cf. Lé 5:14-26.'
  - type: text
    content: 'Voici la loi du sacrifice de culpabilité: c’est une chose très sainte. '
  '10':
  - type: text
    content: Toute offrande pétrie à l’huile et sèche sera pour tous les fils d’Aaron, pour l’un comme pour l’autre.
  - type: heading
    content: 'V. 11-21: cf. Lé 3; 19:5-8.'
  '11':
  - type: text
    content: 'Voici la loi du sacrifice d’actions de grâces, qu’on offrira à l’Éternel. '
  '12':
  - type: text
    content: 'Si quelqu’un '
  - type: note
    content: Ps 116:17.
  - type: text
    content: 'l’offre par reconnaissance, il offrira, avec le sacrifice d’actions de grâces, des gâteaux sans levain pétris à l’huile, des galettes sans levain arrosées d’huile, et des gâteaux de fleur de farine frite et pétris à l’huile. '
  '13':
  - type: text
    content: 'A ces gâteaux il ajoutera du pain levé pour son offrande, avec son sacrifice de reconnaissance et d’actions de grâces. '
  '14':
  - type: text
    content: 'On présentera par élévation à l’Éternel une portion de chaque offrande; elle sera pour le sacrificateur qui a répandu le sang de la victime d’actions de grâces. '
  '15':
  - type: text
    content: 'La chair du sacrifice de reconnaissance et d’actions de grâces sera mangée le jour où il est offert; on n’en laissera rien jusqu’au matin. '
  '16':
  - type: text
    content: 'Si quelqu’un offre un sacrifice pour l’accomplissement d’un vœu ou comme offrande volontaire, '
  - type: note
    content: Lé 19:6.
  - type: text
    content: 'la victime sera mangée le jour où il l’offrira, et ce qui en restera sera mangé le lendemain. '
  '17':
  - type: text
    content: 'Ce qui restera de la chair de la victime sera brûlé au feu le troisième jour. '
  '18':
  - type: text
    content: 'Dans le cas où l’on mangerait de la chair de son sacrifice d’actions de grâces le troisième jour, le sacrifice ne sera point agréé; il n’en sera pas tenu compte à celui qui l’a offert; ce sera une chose infecte, et quiconque en mangera restera chargé de sa faute. '
  '19':
  - type: text
    content: 'La chair qui a touché quelque chose d’impur ne sera point mangée: elle sera brûlée au feu. '
  '2':
  - type: text
    content: 'C’est dans le lieu où l’on égorge l’holocauste que sera égorgée la victime pour le sacrifice de culpabilité. On en répandra le sang sur l’autel tout autour. '
  '20':
  - type: text
    content: 'Tout homme pur peut manger de la chair; mais celui qui, se trouvant en état d’impureté, '
  - type: note
    content: Lé 15:3.
  - type: text
    content: 'mangera de la chair du sacrifice d’actions de grâces qui appartient à l’Éternel, celui-là sera retranché de son peuple. '
  '21':
  - type: text
    content: Et celui qui touchera quelque chose d’impur, une souillure humaine, un animal impur, ou quoi que ce soit d’impur, et qui mangera de la chair du sacrifice d’actions de grâces qui appartient à l’Éternel, celui-là sera retranché de son peuple.
  - type: heading
    content: 'V. 22-27: cf. Lé 3:16, 17; 17:10-14.'
  '22':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '23':
  - type: text
    content: 'Parle aux enfants d’Israël, et dis: Vous ne mangerez point de graisse de bœuf, d’agneau ni de chèvre. '
  '24':
  - type: text
    content: 'La graisse d’une bête morte ou déchirée pourra servir à un usage quelconque; mais vous ne la mangerez point. '
  '25':
  - type: text
    content: 'Car celui qui mangera de la graisse des animaux dont on offre à l’Éternel des sacrifices consumés par le feu, celui-là sera retranché de son peuple. '
  '26':
  - type: note
    content: Ge 9:4. Lé 3:17; 17:14.
  - type: text
    content: 'Vous ne mangerez point de sang, ni d’oiseau, ni de bétail, dans tous les lieux où vous habiterez. '
  '27':
  - type: text
    content: Celui qui mangera du sang d’une espèce quelconque, celui-là sera retranché de son peuple.
  - type: heading
    content: 'V. 28-38: cf. (Lé 10:14, 15. No 18:8-11, 18, 19.) Ex 29:24-28.'
  '28':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '29':
  - type: text
    content: 'Parle aux enfants d’Israël, et dis: Celui qui offrira à l’Éternel son sacrifice d’actions de grâces apportera son offrande à l’Éternel, prise sur son sacrifice d’actions de grâces. '
  '3':
  - type: text
    content: 'On en offrira toute la graisse, la queue, la graisse qui couvre les entrailles, '
  '30':
  - type: text
    content: 'Il apportera de ses propres mains ce qui doit être consumé par le feu devant l’Éternel; il apportera la graisse avec la poitrine, la poitrine '
  - type: note
    content: Ex 29:24.
  - type: text
    content: 'pour l’agiter de côté et d’autre devant l’Éternel. '
  '31':
  - type: text
    content: 'Le sacrificateur brûlera la graisse sur l’autel, et la poitrine sera pour Aaron et pour ses fils. '
  '32':
  - type: text
    content: 'Dans vos sacrifices d’actions de grâces, vous donnerez au sacrificateur l’épaule droite, en la présentant par élévation. '
  '33':
  - type: text
    content: 'Celui des fils d’Aaron qui offrira le sang et la graisse du sacrifice d’actions de grâces aura l’épaule droite pour sa part. '
  '34':
  - type: text
    content: 'Car je prends sur les sacrifices d’actions de grâces offerts par les enfants d’Israël '
  - type: note
    content: Ex 29:27. No 18:11.
  - type: text
    content: 'la poitrine qu’on agitera de côté et d’autre et l’épaule qu’on présentera par élévation, et je les donne au sacrificateur Aaron et à ses fils, par une loi perpétuelle qu’observeront les enfants d’Israël. '
  '35':
  - type: text
    content: 'C’est là le droit que l’onction d’Aaron et de ses fils leur donnera sur les sacrifices consumés par le feu devant l’Éternel, depuis le jour où ils seront présentés pour être à mon service dans le sacerdoce. '
  '36':
  - type: text
    content: 'C’est ce que l’Éternel ordonne aux enfants d’Israël de leur donner depuis le jour de leur onction; ce sera une loi perpétuelle parmi leurs descendants. '
  '37':
  - type: text
    content: 'Telle est la loi de l’holocauste, de l’offrande, du sacrifice d’expiation, du sacrifice de culpabilité, de la consécration, et du sacrifice d’actions de grâces. '
  '38':
  - type: text
    content: L’Éternel la prescrivit à Moïse sur la montagne de Sinaï, le jour où il ordonna aux enfants d’Israël de présenter leurs offrandes à l’Éternel dans le désert du Sinaï.
  '4':
  - type: text
    content: 'les deux rognons, et la graisse qui les entoure, qui couvre les flancs, et le grand lobe du foie, qu’on détachera près des rognons. '
  '5':
  - type: text
    content: 'Le sacrificateur brûlera cela sur l’autel en sacrifice consumé devant l’Éternel. C’est un sacrifice de culpabilité. '
  '6':
  - type: text
    content: 'Tout mâle parmi les sacrificateurs en mangera; il le mangera dans un lieu saint: c’est une chose très sainte. '
  '7':
  - type: text
    content: 'Il en est du sacrifice de culpabilité comme du sacrifice d’expiation; la loi est la même pour ces deux sacrifices: la victime sera pour le sacrificateur qui fera l’expiation. '
  '8':
  - type: text
    content: 'Le sacrificateur qui offrira l’holocauste de quelqu’un aura pour lui la peau de l’holocauste qu’il a offert. '
  '9':
  - type: text
    content: 'Toute offrande cuite au four, préparée sur le gril ou à la poêle, sera pour le sacrificateur qui l’a offerte. '
