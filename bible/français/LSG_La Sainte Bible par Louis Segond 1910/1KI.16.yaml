document_id: 1KI.16
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole de l’Éternel fut ainsi adressée à Jéhu, fils de Hanani, contre Baescha: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 14:7
      metadata:
        usfm: 1KI.14.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je t’ai élevé de la poussière, et je t’ai établi chef de mon peuple d’Israël; mais parce que tu as marché dans la voie de Jéroboam, et que tu as fait pécher mon peuple d’Israël, pour m’irriter par leurs péchés, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'voici, je vais balayer Baescha et sa maison, et je rendrai ta maison '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 15:29
      metadata:
        usfm: 1KI.15.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'semblable à la maison de Jéroboam, fils de Nebath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Celui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 14:11
      metadata:
        usfm: 1KI.14.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:29
      metadata:
        usfm: 1KI.15.29
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:12
      metadata:
        usfm: 1KI.16.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de la maison de Baescha qui mourra dans la ville sera mangé par les chiens, et celui des siens qui mourra dans les champs sera mangé par les oiseaux du ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le reste des actions de Baescha, ce qu’il a fait, et ses exploits, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Baescha se coucha avec ses pères, et il fut enterré à Thirtsa. Et Éla, son fils, régna à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'La parole de l’Éternel s’était manifestée par le prophète Jéhu, fils de Hanani, contre Baescha et contre sa maison, soit à cause de tout le mal qu’il avait fait sous les yeux de l’Éternel, en l’irritant par l’œuvre de ses mains et en devenant semblable à la maison de Jéroboam, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 15:29
      metadata:
        usfm: 1KI.15.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: soit parce qu’il avait frappé la maison de Jéroboam.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-14: cf. 1 R 15:25-30. Ex 20:5. Ps 109:14. (Ps 119:89. És 40:8.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'La vingt-sixième année d’Asa, roi de Juda, Éla, fils de Baescha, régna sur Israël à Thirtsa. Il régna deux ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Son serviteur Zimri, chef de la moitié des chars, conspira contre lui. Éla était à Thirtsa, buvant et s’enivrant dans la maison d’Artsa, chef de la maison du roi à Thirtsa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 9:31
      metadata:
        usfm: 2KI.9.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Zimri entra, le frappa et le tua, la vingt-septième année d’Asa, roi de Juda, et il régna à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lorsqu’il fut roi et qu’il fut assis sur son trône, il frappa toute la maison de Baescha, il ne laissa échapper personne qui lui appartînt, ni parent ni ami. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Zimri détruisit toute la maison de Baescha, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 R 16:1, 2, etc.
    marker-yv: yv-n
  - type: text
    text: 'selon la parole que l’Éternel avait dite contre Baescha par Jéhu, le prophète, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'à cause de tous les péchés que Baescha et Éla, son fils, avaient commis et qu’ils avaient fait commettre à Israël, irritant par leurs idoles l’Éternel, le Dieu d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Le reste des actions d’Éla, et tout ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël?
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-22: cf. 2 R 15:8-15. (Jé 17:11. Job 8:13-19.) Job 34:23-25.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'La vingt-septième année d’Asa, roi de Juda, Zimri régna sept jours à Thirtsa. Le peuple campait contre Guibbethon, qui appartenait aux Philistins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et le peuple qui campait apprit cette nouvelle: Zimri a conspiré, et même il a tué le roi! Et ce jour-là, tout Israël établit dans le camp pour roi d’Israël Omri, chef de l’armée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Omri et tout Israël avec lui partirent de Guibbethon, et ils assiégèrent Thirtsa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Zimri, voyant que la ville était prise, se retira dans le palais de la maison du roi, et brûla sur lui la maison du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'C’est ainsi qu’il mourut, à cause des péchés qu’il avait commis en faisant ce qui est mal aux yeux de l’Éternel, en marchant dans la voie de Jéroboam, et en se livrant aux péchés que Jéroboam avait commis pour faire pécher Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le reste des actions de Zimri, et la conspiration qu’il forma, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors le peuple d’Israël se divisa en deux partis: une moitié du peuple voulait faire roi Thibni, fils de Guinath, et l’autre moitié était pour Omri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ceux qui suivaient Omri l’emportèrent sur ceux qui suivaient Thibni, fils de Guinath. Thibni mourut, et Omri régna.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 23-28: cf. Mi 6:16. 2 Ti 3:13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'La trente et unième année d’Asa, roi de Juda, Omri régna sur Israël. Il régna douze ans. Après avoir régné six ans à Thirtsa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'il acheta de Schémer la montagne de Samarie pour deux talents d’argent; il bâtit sur la montagne, et il donna à la ville qu’il bâtit le nom de Samarie, d’après le nom de Schémer, seigneur de la montagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Omri fit ce qui est mal aux yeux de l’Éternel, et il agit plus mal que tous ceux qui avaient été avant lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il marcha dans toute la voie de Jéroboam, fils de Nebath, et se livra aux péchés que Jéroboam avait fait commettre à Israël, irritant par leurs idoles l’Éternel, le Dieu d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le reste des actions d’Omri, ce qu’il a fait, et ses exploits, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Omri se coucha avec ses pères, et il fut enterré à Samarie. Et Achab, son fils, régna à sa place.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Achab, roi d’Israël. — Son mariage avec Jézabel, fille du roi des Sidoniens
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 29-34: cf. 1 R 18:1-18; 21. Ap 2:20-23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Achab, fils d’Omri, régna sur Israël, la trente-huitième année d’Asa, roi de Juda. Achab, fils d’Omri, régna vingt-deux ans sur Israël à Samarie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Achab, fils d’Omri, fit ce qui est mal aux yeux de l’Éternel, plus que tous ceux qui avaient été avant lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Et comme si c’eût été pour lui peu de chose de se livrer aux péchés de Jéroboam, fils de Nebath, il prit pour femme Jézabel, fille d’Ethbaal, roi des Sidoniens, et il alla servir Baal et se prosterner devant lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il éleva un autel à Baal dans la maison de Baal qu’il bâtit à Samarie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'et il fit une idole d’Astarté. Achab fit plus encore que tous les rois d’Israël qui avaient été avant lui, pour irriter l’Éternel, le Dieu d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'De son temps, Hiel de Béthel bâtit Jéricho; il en jeta les fondements au prix d’Abiram, son premier-né, et il en posa les portes au prix de Segub, son plus jeune fils, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 6:26
      metadata:
        usfm: JOS.6.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: selon la parole que l’Éternel avait dite par Josué, fils de Nun.
