document_id: 1KI.16,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'La parole de l’Éternel fut ainsi adressée à Jéhu, fils de Hanani, contre Baescha: '
  '10':
  - type: note
    content: 2 R 9:31.
  - type: text
    content: 'Zimri entra, le frappa et le tua, la vingt-septième année d’Asa, roi de Juda, et il régna à sa place. '
  '11':
  - type: text
    content: 'Lorsqu’il fut roi et qu’il fut assis sur son trône, il frappa toute la maison de Baescha, il ne laissa échapper personne qui lui appartînt, ni parent ni ami. '
  '12':
  - type: text
    content: 'Zimri détruisit toute la maison de Baescha, '
  - type: note
    content: 1 R 16:1, 2, etc.
  - type: text
    content: 'selon la parole que l’Éternel avait dite contre Baescha par Jéhu, le prophète, '
  '13':
  - type: text
    content: 'à cause de tous les péchés que Baescha et Éla, son fils, avaient commis et qu’ils avaient fait commettre à Israël, irritant par leurs idoles l’Éternel, le Dieu d’Israël. '
  '14':
  - type: text
    content: Le reste des actions d’Éla, et tout ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël?
  - type: heading
    content: 'V. 15-22: cf. 2 R 15:8-15. (Jé 17:11. Job 8:13-19.) Job 34:23-25.'
  '15':
  - type: text
    content: 'La vingt-septième année d’Asa, roi de Juda, Zimri régna sept jours à Thirtsa. Le peuple campait contre Guibbethon, qui appartenait aux Philistins. '
  '16':
  - type: text
    content: 'Et le peuple qui campait apprit cette nouvelle: Zimri a conspiré, et même il a tué le roi! Et ce jour-là, tout Israël établit dans le camp pour roi d’Israël Omri, chef de l’armée. '
  '17':
  - type: text
    content: 'Omri et tout Israël avec lui partirent de Guibbethon, et ils assiégèrent Thirtsa. '
  '18':
  - type: text
    content: 'Zimri, voyant que la ville était prise, se retira dans le palais de la maison du roi, et brûla sur lui la maison du roi. '
  '19':
  - type: text
    content: 'C’est ainsi qu’il mourut, à cause des péchés qu’il avait commis en faisant ce qui est mal aux yeux de l’Éternel, en marchant dans la voie de Jéroboam, et en se livrant aux péchés que Jéroboam avait commis pour faire pécher Israël. '
  '2':
  - type: note
    content: 1 R 14:7.
  - type: text
    content: 'Je t’ai élevé de la poussière, et je t’ai établi chef de mon peuple d’Israël; mais parce que tu as marché dans la voie de Jéroboam, et que tu as fait pécher mon peuple d’Israël, pour m’irriter par leurs péchés, '
  '20':
  - type: text
    content: 'Le reste des actions de Zimri, et la conspiration qu’il forma, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël? '
  '21':
  - type: text
    content: 'Alors le peuple d’Israël se divisa en deux partis: une moitié du peuple voulait faire roi Thibni, fils de Guinath, et l’autre moitié était pour Omri. '
  '22':
  - type: text
    content: Ceux qui suivaient Omri l’emportèrent sur ceux qui suivaient Thibni, fils de Guinath. Thibni mourut, et Omri régna.
  - type: heading
    content: 'V. 23-28: cf. Mi 6:16. 2 Ti 3:13.'
  '23':
  - type: text
    content: 'La trente et unième année d’Asa, roi de Juda, Omri régna sur Israël. Il régna douze ans. Après avoir régné six ans à Thirtsa, '
  '24':
  - type: text
    content: 'il acheta de Schémer la montagne de Samarie pour deux talents d’argent; il bâtit sur la montagne, et il donna à la ville qu’il bâtit le nom de Samarie, d’après le nom de Schémer, seigneur de la montagne. '
  '25':
  - type: text
    content: 'Omri fit ce qui est mal aux yeux de l’Éternel, et il agit plus mal que tous ceux qui avaient été avant lui. '
  '26':
  - type: text
    content: 'Il marcha dans toute la voie de Jéroboam, fils de Nebath, et se livra aux péchés que Jéroboam avait fait commettre à Israël, irritant par leurs idoles l’Éternel, le Dieu d’Israël. '
  '27':
  - type: text
    content: 'Le reste des actions d’Omri, ce qu’il a fait, et ses exploits, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël? '
  '28':
  - type: text
    content: Omri se coucha avec ses pères, et il fut enterré à Samarie. Et Achab, son fils, régna à sa place.
  - type: heading
    content: Achab, roi d’Israël. — Son mariage avec Jézabel, fille du roi des Sidoniens
  - type: heading
    content: 'V. 29-34: cf. 1 R 18:1-18; 21. Ap 2:20-23.'
  '29':
  - type: text
    content: 'Achab, fils d’Omri, régna sur Israël, la trente-huitième année d’Asa, roi de Juda. Achab, fils d’Omri, régna vingt-deux ans sur Israël à Samarie. '
  '3':
  - type: text
    content: 'voici, je vais balayer Baescha et sa maison, et je rendrai ta maison '
  - type: note
    content: 1 R 15:29.
  - type: text
    content: 'semblable à la maison de Jéroboam, fils de Nebath. '
  '30':
  - type: text
    content: 'Achab, fils d’Omri, fit ce qui est mal aux yeux de l’Éternel, plus que tous ceux qui avaient été avant lui. '
  '31':
  - type: text
    content: 'Et comme si c’eût été pour lui peu de chose de se livrer aux péchés de Jéroboam, fils de Nebath, il prit pour femme Jézabel, fille d’Ethbaal, roi des Sidoniens, et il alla servir Baal et se prosterner devant lui. '
  '32':
  - type: text
    content: 'Il éleva un autel à Baal dans la maison de Baal qu’il bâtit à Samarie, '
  '33':
  - type: text
    content: 'et il fit une idole d’Astarté. Achab fit plus encore que tous les rois d’Israël qui avaient été avant lui, pour irriter l’Éternel, le Dieu d’Israël. '
  '34':
  - type: text
    content: 'De son temps, Hiel de Béthel bâtit Jéricho; il en jeta les fondements au prix d’Abiram, son premier-né, et il en posa les portes au prix de Segub, son plus jeune fils, '
  - type: note
    content: Jos 6:26.
  - type: text
    content: selon la parole que l’Éternel avait dite par Josué, fils de Nun.
  '4':
  - type: text
    content: 'Celui '
  - type: note
    content: 1 R 14:11; 15:29; 16:12.
  - type: text
    content: 'de la maison de Baescha qui mourra dans la ville sera mangé par les chiens, et celui des siens qui mourra dans les champs sera mangé par les oiseaux du ciel. '
  '5':
  - type: text
    content: 'Le reste des actions de Baescha, ce qu’il a fait, et ses exploits, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël? '
  '6':
  - type: text
    content: 'Baescha se coucha avec ses pères, et il fut enterré à Thirtsa. Et Éla, son fils, régna à sa place. '
  '7':
  - type: text
    content: 'La parole de l’Éternel s’était manifestée par le prophète Jéhu, fils de Hanani, contre Baescha et contre sa maison, soit à cause de tout le mal qu’il avait fait sous les yeux de l’Éternel, en l’irritant par l’œuvre de ses mains et en devenant semblable à la maison de Jéroboam, '
  - type: note
    content: 1 R 15:29.
  - type: text
    content: soit parce qu’il avait frappé la maison de Jéroboam.
  - type: heading
    content: 'V. 8-14: cf. 1 R 15:25-30. Ex 20:5. Ps 109:14. (Ps 119:89. És 40:8.)'
  '8':
  - type: text
    content: 'La vingt-sixième année d’Asa, roi de Juda, Éla, fils de Baescha, régna sur Israël à Thirtsa. Il régna deux ans. '
  '9':
  - type: text
    content: 'Son serviteur Zimri, chef de la moitié des chars, conspira contre lui. Éla était à Thirtsa, buvant et s’enivrant dans la maison d’Artsa, chef de la maison du roi à Thirtsa. '
