document_id: EPH.5,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'Devenez donc les imitateurs de Dieu, comme des enfants bien-aimés; '
  '10':
  - type: text
    content: 'Examinez ce qui est agréable au Seigneur; '
  '11':
  - type: note
    content: Mt 18:17. 1 Co 5:8; 10:20. 2 Co 6:14. 2 Th 3:14.
  - type: text
    content: 'et ne prenez point part aux œuvres infructueuses des ténèbres, mais plutôt condamnez-les. '
  '12':
  - type: text
    content: 'Car il est honteux de dire ce qu’ils font en secret; '
  '13':
  - type: note
    content: Jn 3:20, 21.
  - type: text
    content: 'mais tout ce qui est condamné est manifesté par la lumière, car tout ce qui est manifesté est lumière. '
  '14':
  - type: text
    content: 'C’est pour cela qu’il est dit:'
  - type: note
    content: Ro 13:11. 1 Th 5:6.
  - type: text
    content: Réveille-toi, toi qui dors,
  - type: text
    content: Relève-toi d’entre les morts,
  - type: text
    content: Et Christ t’éclairera.
  - type: heading
    content: 'V. 15-21: cf. Col 4:5; 1:9, 10; 3:16, 17.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Col 4:5.
  - type: text
    content: 'Prenez donc garde de vous conduire avec circonspection, non comme des insensés, mais comme des sages; '
  '16':
  - type: note
    content: Ro 13:11.
  - type: text
    content: 'rachetez le temps, car les jours sont mauvais. '
  '17':
  - type: text
    content: 'C’est pourquoi ne soyez pas inconsidérés, '
  - type: note
    content: Ro 12:2. 1 Th 4:3.
  - type: text
    content: 'mais comprenez quelle est la volonté du Seigneur. '
  '18':
  - type: note
    content: Pr 23:29. És 5:11, 22. Lu 21:34.
  - type: text
    content: 'Ne vous enivrez pas de vin: c’est de la débauche. Soyez, au contraire, remplis de l’Esprit; '
  '19':
  - type: note
    content: Col 3:16.
  - type: text
    content: 'entretenez-vous par des psaumes, par des hymnes, et par des cantiques spirituels, chantant et célébrant de tout votre cœur les louanges du Seigneur; '
  '2':
  - type: note
    content: Jn 13:34; 15:12. 1 Th 4:9. 1 Jn 3:23; 4:21.
  - type: text
    content: 'et marchez dans la charité, '
  - type: note
    content: Ga 3:20. Tit 2:14. 1 Pi 3:18.
  - type: text
    content: 'à l’exemple de Christ, qui nous a aimés, '
  - type: note
    content: Hé 8:3; 9:14.
  - type: text
    content: et qui s’est livré lui-même à Dieu pour nous comme une offrande et un sacrifice de bonne odeur.
  - type: heading
    content: 'V. 3-14: cf. (Col 3:5-7. 1 Th 4:1-8. 1 Co 6:9-11.) (1 Pi 2:9-12. Ro 13:11-14. 1 Jn 1:5-7.)'
  '20':
  - type: note
    content: Col 3:17. 1 Th 5:18.
  - type: text
    content: 'rendez continuellement grâces pour toutes choses à Dieu le Père, au nom de notre Seigneur Jésus-Christ, '
  '21':
  - type: text
    content: vous soumettant les uns aux autres dans la crainte de Christ.
  - type: heading
    content: Les devoirs domestiques
  - type: heading
    content: 'V. 22-33: cf. Col 3:18, 19. 1 Pi 3:1-7. Ge 2:21-24.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: Ge 3:16. 1 Co 14:34. Col 3:18. Tit 2:5. 1 Pi 3:1.
  - type: text
    content: 'Femmes, soyez soumises à vos maris, comme au Seigneur; '
  '23':
  - type: note
    content: 1 Co 11:3.
  - type: text
    content: 'car le mari est le chef de la femme, '
  - type: note
    content: Ép 1:22; 4:15. Col 1:18.
  - type: text
    content: 'comme Christ est le chef de l’Église, qui est '
  - type: note
    content: Ro 12:5. 1 Co 12:27. Ép 1:23; 4:12. Col 1:24.
  - type: text
    content: 'son corps, et dont il est le Sauveur. '
  '24':
  - type: text
    content: 'Or, de même que l’Église est soumise à Christ, les femmes aussi doivent l’être à leurs maris en toutes choses. '
  '25':
  - type: note
    content: Col 3:19.
  - type: text
    content: 'Maris, aimez vos femmes, comme Christ a aimé l’Église, '
  - type: note
    content: Ga 1:4. Ép 5:2.
  - type: text
    content: 'et s’est livré lui-même pour elle, '
  '26':
  - type: text
    content: 'afin de la sanctifier par la parole, après l’avoir '
  - type: note
    content: Tit 3:5. 1 Pi 3:21.
  - type: text
    content: 'purifiée par le baptême d’eau, '
  '27':
  - type: text
    content: 'afin de faire paraître devant lui cette Église glorieuse, sans tache, ni ride, ni rien de semblable, '
  - type: note
    content: Col 1:22.
  - type: text
    content: 'mais sainte et irrépréhensible. '
  '28':
  - type: text
    content: 'C’est ainsi que les maris doivent aimer leurs femmes comme leurs propres corps. Celui qui aime sa femme s’aime lui-même. '
  '29':
  - type: text
    content: 'Car jamais personne n’a haï sa propre chair; mais il la nourrit et en prend soin, comme Christ le fait pour l’Église, '
  '3':
  - type: text
    content: ' '
  - type: note
    content: Mc 7:21. Ép 4:29. Col 3:5.
  - type: text
    content: 'Que l’impudicité, qu’aucune espèce d’impureté, et que la cupidité, ne soient pas même nommées parmi vous, ainsi qu’il convient à des saints. '
  '30':
  - type: note
    content: Ro 12:5. 1 Co 12:27.
  - type: text
    content: 'parce que nous sommes membres de son corps. '
  '31':
  - type: note
    content: Ge 2:24. Mt 19:5. Mc 10:7.
  - type: text
    content: 'C’est pourquoi l’homme quittera son père et sa mère, et s’attachera à sa femme, et les deux deviendront '
  - type: note
    content: 1 Co 6:16.
  - type: text
    content: 'une seule chair. '
  '32':
  - type: text
    content: 'Ce mystère est grand; je dis cela par rapport à Christ et à l’Église. '
  '33':
  - type: text
    content: Du reste, que chacun de vous aime sa femme comme lui-même, et que la femme respecte son mari.
  '4':
  - type: text
    content: 'Qu’on n’entende ni paroles déshonnêtes, ni propos insensés, ni plaisanteries, choses qui sont contraires à la bienséance; qu’on entende plutôt des actions de grâces. '
  '5':
  - type: note
    content: 1 Co 6:10. Ga 5:19. Col 3:5. Ap 22:15.
  - type: text
    content: 'Car, sachez-le bien, aucun impudique, ou impur, ou cupide, c’est-à-dire, idolâtre, n’a d’héritage dans le royaume de Christ et de Dieu. '
  '6':
  - type: note
    content: Jé 29:8. Mt 24:4. Mc 13:5. Lu 21:8. Col 2:4, 18. 2 Th 2:3. 1 Jn 4:1.
  - type: text
    content: 'Que personne ne vous séduise par de vains discours; car c’est à cause de ces choses que la colère de Dieu vient sur les fils de la rébellion. '
  '7':
  - type: text
    content: 'N’ayez donc aucune part avec eux. '
  '8':
  - type: note
    content: 1 Th 5:4.
  - type: text
    content: 'Autrefois vous étiez ténèbres, et maintenant vous êtes lumière dans le Seigneur. Marchez comme des enfants de lumière! '
  '9':
  - type: note
    content: Ga 5:22.
  - type: text
    content: 'Car le fruit de la lumière consiste en toute sorte de bonté, de justice et de vérité. '
