document_id: EPH.5
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Devenez donc les imitateurs de Dieu, comme des enfants bien-aimés; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:34
      metadata:
        usfm: JHN.13.34
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:12
      metadata:
        usfm: JHN.15.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 4:9
      metadata:
        usfm: 1TH.4.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:23
      metadata:
        usfm: 1JN.3.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:21
      metadata:
        usfm: 1JN.4.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et marchez dans la charité, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:20
      metadata:
        usfm: GAL.3.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 2:14
      metadata:
        usfm: TIT.2.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:18
      metadata:
        usfm: 1PE.3.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à l’exemple de Christ, qui nous a aimés, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 8:3
      metadata:
        usfm: HEB.8.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:14
      metadata:
        usfm: HEB.9.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: et qui s’est livré lui-même à Dieu pour nous comme une offrande et un sacrifice de bonne odeur.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 3-14: cf. (Col 3:5-7. 1 Th 4:1-8. 1 Co 6:9-11.) (1 Pi 2:9-12. Ro 13:11-14. 1 Jn 1:5-7.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 7:21
      metadata:
        usfm: MRK.7.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:29
      metadata:
        usfm: EPH.4.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:5
      metadata:
        usfm: COL.3.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que l’impudicité, qu’aucune espèce d’impureté, et que la cupidité, ne soient pas même nommées parmi vous, ainsi qu’il convient à des saints. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Qu’on n’entende ni paroles déshonnêtes, ni propos insensés, ni plaisanteries, choses qui sont contraires à la bienséance; qu’on entende plutôt des actions de grâces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 6:10
      metadata:
        usfm: 1CO.6.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:19
      metadata:
        usfm: GAL.5.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:5
      metadata:
        usfm: COL.3.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 22:15
      metadata:
        usfm: REV.22.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car, sachez-le bien, aucun impudique, ou impur, ou cupide, c’est-à-dire, idolâtre, n’a d’héritage dans le royaume de Christ et de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 29:8
      metadata:
        usfm: JER.29.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 24:4
      metadata:
        usfm: MAT.24.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 13:5
      metadata:
        usfm: MRK.13.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 21:8
      metadata:
        usfm: LUK.21.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 2:4
      metadata:
        usfm: COL.2.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: COL.2.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 2:3
      metadata:
        usfm: 2TH.2.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 4:1
      metadata:
        usfm: 1JN.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que personne ne vous séduise par de vains discours; car c’est à cause de ces choses que la colère de Dieu vient sur les fils de la rébellion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'N’ayez donc aucune part avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:4
      metadata:
        usfm: 1TH.5.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Autrefois vous étiez ténèbres, et maintenant vous êtes lumière dans le Seigneur. Marchez comme des enfants de lumière! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:22
      metadata:
        usfm: GAL.5.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car le fruit de la lumière consiste en toute sorte de bonté, de justice et de vérité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Examinez ce qui est agréable au Seigneur; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 18:17
      metadata:
        usfm: MAT.18.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 5:8
      metadata:
        usfm: 1CO.5.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:20
      metadata:
        usfm: 1CO.10.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 6:14
      metadata:
        usfm: 2CO.6.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:14
      metadata:
        usfm: 2TH.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et ne prenez point part aux œuvres infructueuses des ténèbres, mais plutôt condamnez-les. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Car il est honteux de dire ce qu’ils font en secret; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:20
      metadata:
        usfm: JHN.3.20
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '21'
      metadata:
        usfm: JHN.3.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais tout ce qui est condamné est manifesté par la lumière, car tout ce qui est manifesté est lumière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'C’est pour cela qu’il est dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 13:11
      metadata:
        usfm: ROM.13.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:6
      metadata:
        usfm: 1TH.5.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Réveille-toi, toi qui dors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Relève-toi d’entre les morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et Christ t’éclairera.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-21: cf. Col 4:5; 1:9, 10; 3:16, 17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 4:5
      metadata:
        usfm: COL.4.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Prenez donc garde de vous conduire avec circonspection, non comme des insensés, mais comme des sages; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 13:11
      metadata:
        usfm: ROM.13.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'rachetez le temps, car les jours sont mauvais. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'C’est pourquoi ne soyez pas inconsidérés, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:2
      metadata:
        usfm: ROM.12.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 4:3
      metadata:
        usfm: 1TH.4.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais comprenez quelle est la volonté du Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 23:29
      metadata:
        usfm: PRO.23.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:11
      metadata:
        usfm: ISA.5.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: ISA.5.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 21:34
      metadata:
        usfm: LUK.21.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ne vous enivrez pas de vin: c’est de la débauche. Soyez, au contraire, remplis de l’Esprit; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:16
      metadata:
        usfm: COL.3.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'entretenez-vous par des psaumes, par des hymnes, et par des cantiques spirituels, chantant et célébrant de tout votre cœur les louanges du Seigneur; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:17
      metadata:
        usfm: COL.3.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:18
      metadata:
        usfm: 1TH.5.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'rendez continuellement grâces pour toutes choses à Dieu le Père, au nom de notre Seigneur Jésus-Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: vous soumettant les uns aux autres dans la crainte de Christ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les devoirs domestiques
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-33: cf. Col 3:18, 19. 1 Pi 3:1-7. Ge 2:21-24.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 3:16
      metadata:
        usfm: GEN.3.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 14:34
      metadata:
        usfm: 1CO.14.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:18
      metadata:
        usfm: COL.3.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 2:5
      metadata:
        usfm: TIT.2.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:1
      metadata:
        usfm: 1PE.3.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Femmes, soyez soumises à vos maris, comme au Seigneur; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 11:3
      metadata:
        usfm: 1CO.11.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car le mari est le chef de la femme, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:22
      metadata:
        usfm: EPH.1.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:15
      metadata:
        usfm: EPH.4.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:18
      metadata:
        usfm: COL.1.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme Christ est le chef de l’Église, qui est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:5
      metadata:
        usfm: ROM.12.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 12:27
      metadata:
        usfm: 1CO.12.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:23
      metadata:
        usfm: EPH.1.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:12
      metadata:
        usfm: EPH.4.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:24
      metadata:
        usfm: COL.1.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'son corps, et dont il est le Sauveur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Or, de même que l’Église est soumise à Christ, les femmes aussi doivent l’être à leurs maris en toutes choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:19
      metadata:
        usfm: COL.3.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Maris, aimez vos femmes, comme Christ a aimé l’Église, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:4
      metadata:
        usfm: GAL.1.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:2
      metadata:
        usfm: EPH.5.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et s’est livré lui-même pour elle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'afin de la sanctifier par la parole, après l’avoir '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 3:5
      metadata:
        usfm: TIT.3.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:21
      metadata:
        usfm: 1PE.3.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'purifiée par le baptême d’eau, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'afin de faire paraître devant lui cette Église glorieuse, sans tache, ni ride, ni rien de semblable, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:22
      metadata:
        usfm: COL.1.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais sainte et irrépréhensible. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'C’est ainsi que les maris doivent aimer leurs femmes comme leurs propres corps. Celui qui aime sa femme s’aime lui-même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
