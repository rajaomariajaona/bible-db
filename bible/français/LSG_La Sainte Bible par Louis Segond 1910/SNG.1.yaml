document_id: SNG.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-4: cf. (Ps 63:2-9. Ap 14:4.)'
  - type: text
    content: Cantique des cantiques, de Salomon.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Éz 16:11, 12, 13.
  - type: text
    content: Tes joues sont belles au milieu des colliers,
  - type: text
    content: Ton cou est beau au milieu des rangées de perles.
  '11':
  - type: text
    content: Nous te ferons des colliers d’or,
  - type: text
    content: Avec des points d’argent.
  '12':
  - type: text
    content: Tandis que le roi est dans son entourage,
  - type: text
    content: Mon nard exhale son parfum.
  '13':
  - type: text
    content: Mon bien-aimé est pour moi un bouquet de myrrhe,
  - type: text
    content: Qui repose entre mes seins.
  '14':
  - type: text
    content: Mon bien-aimé est pour moi une grappe de troëne
  - type: text
    content: Des vignes d’En-Guédi.
  '15':
  - type: text
    content: Que tu es belle, mon amie, que tu es belle!
  - type: text
    content: Tes yeux sont des colombes.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ca 4:1; 5:12.
  - type: text
    content: Que tu es beau, mon bien-aimé, que tu es aimable!
  - type: text
    content: Notre lit, c’est la verdure.
  '17':
  - type: text
    content: Les solives de nos maisons sont des cèdres,
  - type: text
    content: Nos lambris sont des cyprès.
  '2':
  - type: text
    content: Qu’il me baise des baisers de sa bouche!
  - type: text
    content: 'Car ton amour vaut '
  - type: note
    content: Ca 4:10.
  - type: text
    content: mieux que le vin,
  '3':
  - type: text
    content: Tes parfums ont une odeur suave;
  - type: text
    content: Ton nom est un parfum qui se répand;
  - type: text
    content: C’est pourquoi les jeunes filles t’aiment.
  '4':
  - type: text
    content: Entraîne-moi après toi!
  - type: note
    content: 1 Pi 1:8.
  - type: text
    content: Nous courrons!
  - type: text
    content: Le roi m’introduit dans ses appartements…
  - type: text
    content: Nous nous égaierons, nous nous réjouirons à cause de toi;
  - type: text
    content: Nous célébrerons ton amour plus que le vin.
  - type: text
    content: C’est avec raison que l’on t’aime.
  - type: heading
    content: 'V. 5-8: cf. (Ca 3:1-4. Ps 73:28.) Jn 10:2-5.'
  '5':
  - type: text
    content: Je suis noire, mais je suis belle, filles de Jérusalem,
  - type: text
    content: Comme les tentes de Kédar, comme les pavillons de Salomon.
  '6':
  - type: text
    content: 'Ne prenez pas garde à mon teint noir:'
  - type: text
    content: C’est le soleil qui m’a brûlée.
  - type: text
    content: Les fils de ma mère se sont irrités contre moi,
  - type: text
    content: Ils m’ont faite gardienne des vignes.
  - type: text
    content: Ma vigne, à moi, je ne l’ai pas gardée.
  '7':
  - type: text
    content: ' '
  - type: note
    content: De 12:5.
  - type: text
    content: 'Dis-moi, ô toi '
  - type: note
    content: Ca 3:1, 2, 3.
  - type: text
    content: que mon cœur aime,
  - type: text
    content: Où tu fais paître tes brebis,
  - type: text
    content: Où tu les fais reposer à midi;
  - type: text
    content: Car pourquoi serais-je comme une égarée
  - type: text
    content: Près des troupeaux de tes compagnons?
  '8':
  - type: text
    content: 'Si tu ne le sais pas, '
  - type: note
    content: Ca 5:9; 6:1.
  - type: text
    content: ô la plus belle des femmes,
  - type: text
    content: Sors sur les traces des brebis,
  - type: text
    content: Et fais paître tes chevreaux
  - type: text
    content: Près des demeures des bergers.
  - type: heading
    content: '1 v. 9 à 2 v. 7: cf. (Jn 14:21-23. Ép 5:25-27. Ép 3:17-19.)'
  '9':
  - type: text
    content: A ma jument qu’on attelle aux chars de Pharaon
  - type: text
    content: 'Je te compare, '
  - type: note
    content: Ca 2:2, 10, 13; 4:1, 7; 5:2; 6:4. Jn 15:14, 15.
  - type: text
    content: ô mon amie.
