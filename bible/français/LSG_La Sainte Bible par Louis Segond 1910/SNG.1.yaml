document_id: SNG.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-4: cf. (Ps 63:2-9. Ap 14:4.)'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cantique des cantiques, de Salomon.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 16:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tes joues sont belles au milieu des colliers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton cou est beau au milieu des rangées de perles.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous te ferons des colliers d’or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec des points d’argent.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tandis que le roi est dans son entourage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon nard exhale son parfum.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon bien-aimé est pour moi un bouquet de myrrhe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui repose entre mes seins.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon bien-aimé est pour moi une grappe de troëne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des vignes d’En-Guédi.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tu es belle, mon amie, que tu es belle!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes yeux sont des colombes.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ca 4:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que tu es beau, mon bien-aimé, que tu es aimable!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Notre lit, c’est la verdure.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les solives de nos maisons sont des cèdres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nos lambris sont des cyprès.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il me baise des baisers de sa bouche!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car ton amour vaut '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ca 4:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: mieux que le vin,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes parfums ont une odeur suave;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton nom est un parfum qui se répand;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi les jeunes filles t’aiment.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Entraîne-moi après toi!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Nous courrons!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le roi m’introduit dans ses appartements…
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous nous égaierons, nous nous réjouirons à cause de toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous célébrerons ton amour plus que le vin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est avec raison que l’on t’aime.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-8: cf. (Ca 3:1-4. Ps 73:28.) Jn 10:2-5.'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis noire, mais je suis belle, filles de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme les tentes de Kédar, comme les pavillons de Salomon.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ne prenez pas garde à mon teint noir:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est le soleil qui m’a brûlée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les fils de ma mère se sont irrités contre moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils m’ont faite gardienne des vignes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma vigne, à moi, je ne l’ai pas gardée.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 12:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Dis-moi, ô toi '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ca 3:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: que mon cœur aime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où tu fais paître tes brebis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où tu les fais reposer à midi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car pourquoi serais-je comme une égarée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Près des troupeaux de tes compagnons?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Si tu ne le sais pas, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ca 5:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ô la plus belle des femmes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sors sur les traces des brebis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et fais paître tes chevreaux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Près des demeures des bergers.
  - type: usfm
    marker: r
    children:
    - type: text
      text: '1 v. 9 à 2 v. 7: cf. (Jn 14:21-23. Ép 5:25-27. Ép 3:17-19.)'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A ma jument qu’on attelle aux chars de Pharaon
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je te compare, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ca 2:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 15:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ô mon amie.
