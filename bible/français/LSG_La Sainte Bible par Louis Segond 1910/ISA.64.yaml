document_id: ISA.64
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Comme s’allume un feu de bois sec,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme s’évapore l’eau qui bouillonne;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes ennemis connaîtraient ton nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les nations trembleraient devant toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Lorsque tu fis des prodiges que nous n’attendions pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu descendis, et les montagnes s’ébranlèrent devant toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 31:19
      metadata:
        usfm: PSA.31.19
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: PSA.31.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 2:9
      metadata:
        usfm: 1CO.2.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Jamais on n’a appris ni entendu dire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et jamais l’œil n’a vu qu’un autre dieu que toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fît de telles choses pour ceux qui se confient en lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tu vas au-devant de celui qui pratique avec joie la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De ceux qui marchent dans tes voies et se souviennent de toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais tu as été irrité, parce que nous avons péché;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nous en souffrons longtemps jusqu’à ce que nous soyons sauvés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nous sommes tous comme des impurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et toute notre justice est comme un vêtement souillé;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 90:5
      metadata:
        usfm: PSA.90.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: PSA.90.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Nous sommes tous flétris comme une feuille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nos crimes nous emportent comme le vent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il n’y a personne qui invoque ton nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Qui se réveille pour s’attacher à toi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi nous as-tu caché ta face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nous laisses-tu périr par l’effet de nos crimes.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-11: cf. És 63:15-19. (Ps 74 et 79).'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Cependant, ô Éternel, tu es notre père;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous sommes l’argile, et c’est toi qui nous as formés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous sommes tous l’ouvrage de tes mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ne t’irrite pas à l’extrême, ô Éternel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 79:8
      metadata:
        usfm: PSA.79.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et ne te souviens pas à toujours du crime;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Regarde donc, nous sommes tous ton peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tes villes saintes sont un désert;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sion est un désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jérusalem une solitude.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Notre maison sainte et glorieuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où nos pères célébraient tes louanges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est devenue la proie des flammes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout ce que nous avions de précieux a été dévasté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Après cela, ô Éternel, te contiendras-tu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce que tu te tairas, et nous affligeras à l’excès?
