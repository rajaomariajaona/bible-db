document_id: ISA.64,93
type_code: fra
verses:
  '1':
  - type: text
    content: Comme s’allume un feu de bois sec,
  - type: text
    content: Comme s’évapore l’eau qui bouillonne;
  - type: text
    content: Tes ennemis connaîtraient ton nom,
  - type: text
    content: Et les nations trembleraient devant toi.
  '10':
  - type: text
    content: Notre maison sainte et glorieuse,
  - type: text
    content: Où nos pères célébraient tes louanges,
  - type: text
    content: Est devenue la proie des flammes;
  - type: text
    content: Tout ce que nous avions de précieux a été dévasté.
  '11':
  - type: text
    content: Après cela, ô Éternel, te contiendras-tu?
  - type: text
    content: Est-ce que tu te tairas, et nous affligeras à l’excès?
  '2':
  - type: text
    content: Lorsque tu fis des prodiges que nous n’attendions pas,
  - type: text
    content: Tu descendis, et les montagnes s’ébranlèrent devant toi.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps 31:19, 20. 1 Co 2:9.
  - type: text
    content: Jamais on n’a appris ni entendu dire,
  - type: text
    content: Et jamais l’œil n’a vu qu’un autre dieu que toi
  - type: text
    content: Fît de telles choses pour ceux qui se confient en lui.
  '4':
  - type: text
    content: Tu vas au-devant de celui qui pratique avec joie la justice,
  - type: text
    content: De ceux qui marchent dans tes voies et se souviennent de toi.
  - type: text
    content: Mais tu as été irrité, parce que nous avons péché;
  - type: text
    content: Et nous en souffrons longtemps jusqu’à ce que nous soyons sauvés.
  '5':
  - type: text
    content: Nous sommes tous comme des impurs,
  - type: text
    content: Et toute notre justice est comme un vêtement souillé;
  - type: note
    content: Ps 90:5, 6.
  - type: text
    content: Nous sommes tous flétris comme une feuille,
  - type: text
    content: Et nos crimes nous emportent comme le vent.
  '6':
  - type: text
    content: Il n’y a personne qui invoque ton nom,
  - type: text
    content: 'Qui se réveille pour s’attacher à toi:'
  - type: text
    content: Aussi nous as-tu caché ta face,
  - type: text
    content: Et nous laisses-tu périr par l’effet de nos crimes.
  - type: heading
    content: 'V. 7-11: cf. És 63:15-19. (Ps 74 et 79).'
  '7':
  - type: text
    content: Cependant, ô Éternel, tu es notre père;
  - type: text
    content: Nous sommes l’argile, et c’est toi qui nous as formés,
  - type: text
    content: Nous sommes tous l’ouvrage de tes mains.
  '8':
  - type: text
    content: Ne t’irrite pas à l’extrême, ô Éternel,
  - type: note
    content: Ps 79:8.
  - type: text
    content: Et ne te souviens pas à toujours du crime;
  - type: text
    content: Regarde donc, nous sommes tous ton peuple.
  '9':
  - type: text
    content: Tes villes saintes sont un désert;
  - type: text
    content: Sion est un désert,
  - type: text
    content: Jérusalem une solitude.
