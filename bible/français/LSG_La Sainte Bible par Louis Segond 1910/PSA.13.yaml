document_id: PSA.13
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 70; 142.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Jusques à quand, Éternel! M’oublieras-tu sans cesse?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusques à quand me cacheras-tu ta face?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jusques à quand aurai-je des soucis dans mon âme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et chaque jour des chagrins dans mon cœur?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusques à quand mon ennemi s’élèvera-t-il contre moi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Regarde, réponds-moi, Éternel, mon Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Donne à mes yeux la clarté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que je ne m’endorme pas du sommeil de la mort,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Afin que mon ennemi ne dise pas: Je l’ai vaincu!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 25:2
      metadata:
        usfm: PSA.25.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et que mes adversaires ne se réjouissent pas, si je chancelle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Moi, j’ai confiance en ta bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai de l’allégresse dans le cœur, à cause de ton salut;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je chante à l’Éternel, car il m’a fait du bien.
