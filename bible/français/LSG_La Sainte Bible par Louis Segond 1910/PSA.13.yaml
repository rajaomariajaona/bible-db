document_id: PSA.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 70; 142.
  - type: text
    content: Au chef des chantres. Psaume de David.
  '2':
  - type: text
    content: Jusques à quand, Éternel! M’oublieras-tu sans cesse?
  - type: text
    content: Jusques à quand me cacheras-tu ta face?
  '3':
  - type: text
    content: Jusques à quand aurai-je des soucis dans mon âme,
  - type: text
    content: Et chaque jour des chagrins dans mon cœur?
  - type: text
    content: Jusques à quand mon ennemi s’élèvera-t-il contre moi?
  '4':
  - type: text
    content: Regarde, réponds-moi, Éternel, mon Dieu!
  - type: text
    content: Donne à mes yeux la clarté,
  - type: text
    content: Afin que je ne m’endorme pas du sommeil de la mort,
  '5':
  - type: text
    content: 'Afin que mon ennemi ne dise pas: Je l’ai vaincu!'
  - type: note
    content: Ps 25:2.
  - type: text
    content: Et que mes adversaires ne se réjouissent pas, si je chancelle.
  '6':
  - type: text
    content: Moi, j’ai confiance en ta bonté,
  - type: text
    content: J’ai de l’allégresse dans le cœur, à cause de ton salut;
  - type: text
    content: Je chante à l’Éternel, car il m’a fait du bien.
