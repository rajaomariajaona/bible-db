document_id: MAT.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les pharisiens et la tradition
  - type: heading
    content: 'V. 1-9: cf. (Mc 7:1-13.) Lu 11:37-41.'
  - type: text
    content: ' '
  - type: note
    content: Mc 7:1.
  - type: text
    content: 'Alors des pharisiens et des scribes vinrent de Jérusalem auprès de Jésus, et dirent: '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Mc 7:14.
  - type: text
    content: 'Ayant appelé à lui la foule, il lui dit: '
  - type: text
    content: Écoutez, et comprenez.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ac 10:15. Ro 14:17, 20. Tit 1:15.
  - type: text
    content: Ce n’est pas ce qui entre dans la bouche qui souille l’homme; mais ce qui sort de la bouche, c’est ce qui souille l’homme.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Alors ses disciples s’approchèrent, et lui dirent: Sais-tu que les pharisiens ont été scandalisés des paroles qu’ils ont entendues? '
  '13':
  - type: text
    content: 'Il répondit: '
  - type: note
    content: Jn 15:2.
  - type: text
    content: Toute plante que n’a pas plantée mon Père céleste sera déracinée.
  '14':
  - type: text
    content: ' '
  - type: text
    content: 'Laissez-les:'
  - type: text
    content: ' '
  - type: note
    content: És 42:19. Lu 6:39.
  - type: text
    content: ce sont des aveugles qui conduisent des aveugles; si un aveugle conduit un aveugle, ils tomberont tous deux dans une fosse.
  - type: text
    content: ' '
  '15':
  - type: note
    content: Mc 7:17.
  - type: text
    content: 'Pierre, prenant la parole, lui dit: Explique-nous cette parabole. '
  '16':
  - type: text
    content: 'Et Jésus dit: '
  - type: text
    content: Vous aussi, êtes-vous encore sans intelligence?
  '17':
  - type: text
    content: ' '
  - type: text
    content: Ne comprenez-vous pas que tout ce qui entre dans la bouche va dans le ventre, puis est jeté dans les lieux secrets?
  - type: text
    content: ' '
  '18':
  - type: text
    content: Mais ce qui sort de la bouche vient du cœur, et c’est ce qui souille l’homme.
  - type: text
    content: ' '
  '19':
  - type: note
    content: Ge 6:5; 8:21. Pr 6:14. Jé 17:9.
  - type: text
    content: Car c’est du cœur que viennent les mauvaises pensées, les meurtres, les adultères, les impudicités, les vols, les faux témoignages, les calomnies.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Pourquoi tes disciples transgressent-ils la tradition des anciens? Car ils ne se lavent pas les mains, quand ils prennent leurs repas. '
  '20':
  - type: text
    content: Voilà les choses qui souillent l’homme; mais manger sans s’être lavé les mains, cela ne souille point l’homme.
  - type: heading
    content: Jésus sur le territoire de Tyr et Sidon. La femme canaéenne
  - type: heading
    content: 'V. 21-28: cf. (Mc 7:24-30.) Ge 32:24-29. Ps 123:2.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Mc 7:24.
  - type: text
    content: 'Jésus, étant parti de là, se retira dans le territoire de Tyr et de Sidon. '
  '22':
  - type: text
    content: 'Et voici, une femme cananéenne, qui venait de ces contrées, lui cria: Aie pitié de moi, Seigneur, Fils de David! Ma fille est cruellement tourmentée par le démon. '
  '23':
  - type: text
    content: 'Il ne lui répondit pas un mot, et ses disciples s’approchèrent, et lui dirent avec instance: Renvoie-la, car elle crie derrière nous. '
  '24':
  - type: text
    content: 'Il répondit: '
  - type: note
    content: Mt 10:6. Ac 13:46.
  - type: text
    content: Je n’ai été envoyé qu’aux brebis perdues de la maison d’Israël.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Mais elle vint se prosterner devant lui, disant: Seigneur, secours-moi! '
  '26':
  - type: text
    content: 'Il répondit: '
  - type: text
    content: Il n’est pas bien de prendre le pain des enfants, et de le jeter aux petits chiens.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Oui, Seigneur, dit-elle, mais les petits chiens mangent les miettes qui tombent de la table de leurs maîtres. '
  '28':
  - type: text
    content: 'Alors Jésus lui dit: '
  - type: text
    content: Femme, ta foi est grande; qu’il te soit fait comme tu veux.
  - type: text
    content: ' Et, à l’heure même, sa fille fut guérie.'
  - type: heading
    content: Jésus de retour vers la mer de Galilée. Nombreuses guérisons. Seconde multiplication des pains
  - type: heading
    content: 'V. 29-39: cf. (Mc 7:31-37; 8:1-10.) Mt 14:15-21.'
  '29':
  - type: text
    content: ' '
  - type: note
    content: Mc 7:31.
  - type: text
    content: 'Jésus quitta ces lieux, et vint près de la mer de Galilée. Étant monté sur la montagne, il s’y assit. '
  '3':
  - type: text
    content: 'Il leur répondit: '
  - type: text
    content: Et vous, pourquoi transgressez-vous le commandement de Dieu au profit de votre tradition?
  '30':
  - type: note
    content: És 29:18; 35:5. Mt 11:5. Lu 7:22.
  - type: text
    content: 'Alors s’approcha de lui une grande foule, ayant avec elle des boiteux, des aveugles, des muets, des estropiés, et beaucoup d’autres malades. On les mit à ses pieds, et il les guérit; '
  '31':
  - type: text
    content: 'en sorte que la foule était dans l’admiration de voir que les muets parlaient, que les estropiés étaient guéris, que les boiteux marchaient, que les aveugles voyaient; et elle glorifiait le Dieu d’Israël. '
  '32':
  - type: note
    content: Mc 8:1.
  - type: text
    content: 'Jésus, ayant appelé ses disciples, dit: '
  - type: text
    content: Je suis ému de compassion pour cette foule; car voilà trois jours qu’ils sont près de moi, et ils n’ont rien à manger. Je ne veux pas les renvoyer à jeun, de peur que les forces ne leur manquent en chemin.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Les disciples lui dirent: Comment nous procurer dans ce lieu désert assez de pains pour rassasier une si grande foule? '
  '34':
  - type: text
    content: 'Jésus leur demanda: '
  - type: text
    content: Combien avez-vous de pains?
  - type: text
    content: ' Sept, répondirent-ils, et quelques petits poissons. '
  '35':
  - type: text
    content: 'Alors il fit asseoir la foule par terre, '
  '36':
  - type: text
    content: 'prit les sept pains et les poissons, et, après avoir '
  - type: note
    content: 1 S 9:13.
  - type: text
    content: 'rendu grâces, il les rompit et les donna à ses disciples, qui les distribuèrent à la foule. '
  '37':
  - type: text
    content: 'Tous mangèrent et furent rassasiés, et l’on emporta sept corbeilles pleines des morceaux qui restaient. '
  '38':
  - type: text
    content: 'Ceux qui avaient mangé étaient quatre mille hommes, sans les femmes et les enfants. '
  '39':
  - type: text
    content: Ensuite, il renvoya la foule, monta dans la barque, et se rendit dans la contrée de Magadan.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ex 20:12. De 5:16. Ép 6:2.
  - type: text
    content: 'Car Dieu a dit: Honore ton père et ta mère; et:'
  - type: text
    content: ' '
  - type: note
    content: Ex 21:17. Lé 20:9. Pr 20:20.
  - type: text
    content: Celui qui maudira son père ou sa mère sera puni de mort.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Mais vous, vous dites: Celui qui dira à son père ou à sa mère: Ce dont j’aurais pu t’assister est une offrande à Dieu, n’est pas tenu d’honorer son père ou sa mère.'
  - type: text
    content: ' '
  '6':
  - type: note
    content: Mc 7:13. 1 Ti 4:3. 2 Ti 3:2.
  - type: text
    content: Vous annulez ainsi la parole de Dieu au profit de votre tradition.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Hypocrites, Ésaïe a bien prophétisé sur vous, quand il a dit:'
  - type: text
    content: ' '
  '8':
  - type: note
    content: És 29:13. Éz 33:31. Mc 7:6.
  - type: text
    content: Ce peuple m’honore des lèvres,
  - type: text
    content: Mais son cœur est éloigné de moi.
  - type: text
    content: ' '
  '9':
  - type: text
    content: C’est en vain qu’ils m’honorent,
  - type: text
    content: En enseignant des préceptes qui sont
  - type: text
    content: ' '
  - type: note
    content: Mc 7:6, 7. Col 2:18, 20, 22.
  - type: text
    content: des commandements d’hommes.
  - type: heading
    content: 'V. 10-20: cf. Mc 7:14-23. (Pr 4:23. Ga 5:19-21. Ps 51:12.)'
