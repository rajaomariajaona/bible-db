document_id: ROM.INTRO1,93
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION À L’ÉPÎTRE AUX ROMAINS
  - type: text
    content: (Ha 2:4. Ac 26:17, 18.)
  - type: text
    content: L’Épître de Paul aux Romains résume, plus que toutes les autres, le message évangélique de l’apôtre. Cela résulte des circonstances de sa rédaction. Paul, en effet, écrit cette lettre à un moment où ses activités multiples sont au ralenti. Il pense avoir achevé sa mission en Orient (15:19-20) et se propose de se tourner du côté de l’Occident, où il voit Rome en Italie puis l’Espagne (15:23-24).
  - type: text
    content: 'Dans cette période de calme relatif, Paul profite de sa tranquillité d’esprit pour développer certains thèmes qu’il avait déjà traités dans ses précédentes épîtres de circonstance, dont celle aux Galates. Voici la trame de la présente épître:'
  - type: text
    content: '1. Adresse, salutations et expression d’amour de Paul à l’adresse des chrétiens de Rome '
  - type: text
    content: 1:1-15
  - type: text
    content: '2. Sujet de l’épître: la justification par la foi '
  - type: text
    content: 1:16-17
  - type: text
    content: '3. L’état de péché et la condamnation de l’humanité '
  - type: text
    content: 1:18–3:20
  - type: text
    content: '4. La justification par la foi en Jésus-Christ et ses fruits '
  - type: text
    content: 3:21–6:23
  - type: text
    content: '5. Le chrétien est affranchi de la loi '
  - type: text
    content: 7:1–8:39
  - type: text
    content: '6. Les Juifs rejetés: le salut aux païens puis conversion et salut des Juifs '
  - type: text
    content: 9:1–11:36
  - type: text
    content: '7. Exhortations éthiques '
  - type: text
    content: 12:1-21
  - type: text
    content: '8. La soumission aux autorités '
  - type: text
    content: 13:1-7
  - type: text
    content: '9. Amour, vigilance et pureté '
  - type: text
    content: 13:8-14
  - type: text
    content: '10. Préceptes de tolérance '
  - type: text
    content: 14:1–15:13
  - type: text
    content: '11. Recommandations, salutations et vœux '
  - type: text
    content: 16:1-27
  - type: text
    content: 'La thèse fondamentale est résumée au chapitre 1, versets 16 et 17: '
  - type: text
    content: '«Car je n’ai point honte de l’Évangile: c’est une puissance de Dieu pour le salut de quiconque croit, du Juif premièrement, puis du Grec, parce qu’en lui est révélée la justice de Dieu par la foi et pour la foi, selon qu’il écrit: Le juste vivra par la foi.»'
  - type: text
    content: ' C’est à partir de cette thèse fondamentale que Paul explique les aspects les plus importants:'
  - type: text
    content: '- L’universalité de la désobéissance dans l’état de péché et de condamnation de l’humanité sans exclusivité.'
  - type: text
    content: '- La justification par la foi et le rôle de la loi.'
  - type: text
    content: '- Le cas du peuple d’Israël et les relations judéo-chrétiennes, dans l’économie du salut en Jésus-Christ.'
  - type: text
    content: '- L’éthique dans la vie nouvelle en Christ.'
  - type: text
    content: L’Épître aux Romains est la première du Nouveau Testament. Elle inaugure la catégorie des écrits didactiques par rapport aux écrits narratifs que sont les évangiles et le livre des Actes des Apôtres. Ces écrits ne sont pas des traités de théologie systématiques. Il s’agit de lettres de circonstance qui traitent des questions que se posaient des communautés. Le but de leurs auteurs est de donner la position à prendre et le comportement à tenir devant chaque cas évoqué, pour que les chrétiens se conforment à l’Évangile.
  - type: text
    content: Il faut reconnaître honnêtement qu’il est difficile, voire impossible, de résumer sans le trahir le contenu de l’Épître de Paul aux Romains. Pour aborder son message en quelques mots, il suffit de souligner les principaux thèmes qui fondent l’exposé de l’auteur.
  - type: text
    content: 'Selon le prophète Habacuc: «Le juste vivra par sa foi» (2:4). Cette formule, reprise et commentée par Paul dans Romains 1:16-17, est souvent considérée comme le thème central du message de l’épître. Mais cette vision des choses ne devrait pas faire minimiser les autres développements fort importants comme ceux de la vie en Christ (5 à 8), du salut de tous, Juifs et Grecs (9 à 11), et de bien d’autres thèmes qui font de l’Épître aux Romains le traité le plus complet et le plus construit de toute la littérature de Paul.'
  - type: text
    content: Une longue liste de salutations 16:1-27 conclut l’Épître aux Romains. Elle pose la question de savoir comment Paul connaît autant de personnes dans une communauté qu’il ignore au moment où il leur écrit. Concernant la communauté chrétienne de Rome, au temps de l’apôtre Paul, il faut l’envisager dans le cadre de l’installation des Juifs de Rome au premier siècle. Le christianisme a dû être introduit dans la capitale de l’Empire par les judéo-chrétiens, des Juifs convertis au christianisme, en provenance de l’Orient pour des raisons diverses.
  - type: text
    content: Paul semble ainsi louer la foi des chrétiens de Rome qui ne sont pas le produit d’une activité missionnaire classique issue de la prédication apostolique accompagnée de signes miraculeux. Paul s’adresse à une communauté qu’il ignore. L’épître a les traits d’un traité-circulaire destiné à être lu de communauté en communauté. Au moment où Paul écrit, il se trouve probablement à Corinthe (Ro 16:23; 1 Cor 1:14).
  - type: text
    content: 'L’épître est provoquée par le projet de Paul d’aller en Espagne en passant par Rome (1:9-15; 15:24, 28). Mais son arrestation à Jérusalem va contrecarrer ce projet. Elle résulterait par ailleurs des besoins de la communauté. En tant qu’apôtre de Jésus-Christ, Paul a voulu partager le «condensé de son Évangile» aux Juifs de Rome qui avaient cru en Christ en insistant sur le fait que '
  - type: text
    content: '«l’Évangile de Jésus-Christ est puissance de Dieu pour le salut tant pour les Juifs que pour les non Juifs» '
  - type: text
    content: (1:16; 9:1—11.36).
