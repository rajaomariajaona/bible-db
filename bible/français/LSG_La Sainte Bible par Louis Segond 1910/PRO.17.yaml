document_id: PRO.17,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 15:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mieux vaut un morceau de pain sec, avec la paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’une maison pleine de viandes, avec des querelles.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une réprimande fait plus d’impression sur l’homme intelligent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que cent coups sur l’insensé.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant ne cherche que révolte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais un messager cruel sera envoyé contre lui.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rencontre une ourse privée de ses petits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plutôt qu’un insensé pendant sa folie.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:35
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 20:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 12:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 5:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 3:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: De celui qui rend le mal pour le bien
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le mal ne quittera point la maison.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 20:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Commencer une querelle, c’est ouvrir une digue;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant que la dispute s’anime, retire-toi.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 24:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 5:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Celui qui absout le coupable et celui qui condamne le juste
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sont tous deux en abomination à l’Éternel.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A quoi sert l’argent dans la main de l’insensé?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A acheter la sagesse?… Mais il n’a point de sens.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’ami aime en tout temps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dans le malheur il se montre un frère.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme dépourvu de sens prend des engagements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il cautionne son prochain.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui aime les querelles aime le péché;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 16:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Celui qui élève sa porte cherche la ruine.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un serviteur prudent domine sur le fils qui fait honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il aura part à l’héritage au milieu des frères.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un cœur faux ne trouve pas le bonheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celui dont la langue est perverse tombe dans le malheur.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui donne naissance à un insensé aura du chagrin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le père d’un fou ne peut pas se réjouir.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 15:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Un cœur joyeux est un bon remède,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais un esprit abattu dessèche les os.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant accepte en secret des présents,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour pervertir les voies de la justice.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 2:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La sagesse est en face de l’homme intelligent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les yeux de l’insensé sont à l’extrémité de la terre.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 10:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Un fils insensé fait le chagrin de son père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’amertume de celle qui l’a enfanté.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’est pas bon de condamner le juste à une amende,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni de frapper les nobles à cause de leur droiture.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui retient ses paroles connaît la science,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celui qui a l’esprit calme est un homme intelligent.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’insensé même, quand il se tait, passe pour sage;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui ferme ses lèvres est un homme intelligent.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 27:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le creuset est pour l’argent, et le fourneau pour l’or;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 17:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais celui qui éprouve les cœurs, c’est l’Éternel.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant est attentif à la lèvre inique,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le menteur prête l’oreille à la langue pernicieuse.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 14:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Celui qui se moque du pauvre outrage celui qui l’a fait;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui se réjouit d’un malheur ne restera pas impuni.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les enfants des enfants sont la couronne des vieillards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les pères sont la gloire de leurs enfants.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les paroles distinguées ne conviennent pas à un insensé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Combien moins à un noble les paroles mensongères!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les présents sont une pierre précieuse aux yeux de qui en reçoit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De quelque côté qu’ils se tournent, ils ont du succès.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui couvre une faute cherche l’amour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celui qui la rappelle dans ses discours divise les amis.
