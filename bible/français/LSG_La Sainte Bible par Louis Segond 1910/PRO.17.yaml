document_id: PRO.17,93
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Pr 15:17.
  - type: text
    content: Mieux vaut un morceau de pain sec, avec la paix,
  - type: text
    content: Qu’une maison pleine de viandes, avec des querelles.
  '10':
  - type: text
    content: Une réprimande fait plus d’impression sur l’homme intelligent
  - type: text
    content: Que cent coups sur l’insensé.
  '11':
  - type: text
    content: Le méchant ne cherche que révolte,
  - type: text
    content: Mais un messager cruel sera envoyé contre lui.
  '12':
  - type: text
    content: Rencontre une ourse privée de ses petits,
  - type: text
    content: Plutôt qu’un insensé pendant sa folie.
  '13':
  - type: text
    content: ' '
  - type: note
    content: De 32:35. Pr 20:22; 24:29. Ro 12:17. 1 Th 5:15. 1 Pi 3:9.
  - type: text
    content: De celui qui rend le mal pour le bien
  - type: text
    content: Le mal ne quittera point la maison.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Pr 20:3.
  - type: text
    content: Commencer une querelle, c’est ouvrir une digue;
  - type: text
    content: Avant que la dispute s’anime, retire-toi.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ex 23:7. Pr 24:24. És 5:23.
  - type: text
    content: Celui qui absout le coupable et celui qui condamne le juste
  - type: text
    content: Sont tous deux en abomination à l’Éternel.
  '16':
  - type: text
    content: A quoi sert l’argent dans la main de l’insensé?
  - type: text
    content: A acheter la sagesse?… Mais il n’a point de sens.
  '17':
  - type: text
    content: L’ami aime en tout temps,
  - type: text
    content: Et dans le malheur il se montre un frère.
  '18':
  - type: text
    content: L’homme dépourvu de sens prend des engagements,
  - type: text
    content: Il cautionne son prochain.
  '19':
  - type: text
    content: Celui qui aime les querelles aime le péché;
  - type: note
    content: Pr 16:18.
  - type: text
    content: Celui qui élève sa porte cherche la ruine.
  '2':
  - type: text
    content: Un serviteur prudent domine sur le fils qui fait honte,
  - type: text
    content: Et il aura part à l’héritage au milieu des frères.
  '20':
  - type: text
    content: Un cœur faux ne trouve pas le bonheur,
  - type: text
    content: Et celui dont la langue est perverse tombe dans le malheur.
  '21':
  - type: text
    content: Celui qui donne naissance à un insensé aura du chagrin;
  - type: text
    content: Le père d’un fou ne peut pas se réjouir.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Pr 15:13.
  - type: text
    content: Un cœur joyeux est un bon remède,
  - type: text
    content: Mais un esprit abattu dessèche les os.
  '23':
  - type: text
    content: Le méchant accepte en secret des présents,
  - type: text
    content: Pour pervertir les voies de la justice.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Ec 2:14; 8:1.
  - type: text
    content: La sagesse est en face de l’homme intelligent,
  - type: text
    content: Mais les yeux de l’insensé sont à l’extrémité de la terre.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Pr 10:1; 15:20; 19:13.
  - type: text
    content: Un fils insensé fait le chagrin de son père,
  - type: text
    content: Et l’amertume de celle qui l’a enfanté.
  '26':
  - type: text
    content: Il n’est pas bon de condamner le juste à une amende,
  - type: text
    content: Ni de frapper les nobles à cause de leur droiture.
  '27':
  - type: text
    content: Celui qui retient ses paroles connaît la science,
  - type: text
    content: Et celui qui a l’esprit calme est un homme intelligent.
  '28':
  - type: text
    content: L’insensé même, quand il se tait, passe pour sage;
  - type: text
    content: Celui qui ferme ses lèvres est un homme intelligent.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Pr 27:21.
  - type: text
    content: Le creuset est pour l’argent, et le fourneau pour l’or;
  - type: note
    content: Jé 17:10.
  - type: text
    content: Mais celui qui éprouve les cœurs, c’est l’Éternel.
  '4':
  - type: text
    content: Le méchant est attentif à la lèvre inique,
  - type: text
    content: Le menteur prête l’oreille à la langue pernicieuse.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Pr 14:31.
  - type: text
    content: Celui qui se moque du pauvre outrage celui qui l’a fait;
  - type: text
    content: Celui qui se réjouit d’un malheur ne restera pas impuni.
  '6':
  - type: text
    content: Les enfants des enfants sont la couronne des vieillards,
  - type: text
    content: Et les pères sont la gloire de leurs enfants.
  '7':
  - type: text
    content: Les paroles distinguées ne conviennent pas à un insensé;
  - type: text
    content: Combien moins à un noble les paroles mensongères!
  '8':
  - type: text
    content: Les présents sont une pierre précieuse aux yeux de qui en reçoit;
  - type: text
    content: De quelque côté qu’ils se tournent, ils ont du succès.
  '9':
  - type: text
    content: Celui qui couvre une faute cherche l’amour,
  - type: text
    content: Et celui qui la rappelle dans ses discours divise les amis.
