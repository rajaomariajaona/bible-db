document_id: PRO.17
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 15:17
      metadata:
        usfm: PRO.15.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mieux vaut un morceau de pain sec, avec la paix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’une maison pleine de viandes, avec des querelles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Un serviteur prudent domine sur le fils qui fait honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il aura part à l’héritage au milieu des frères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 27:21
      metadata:
        usfm: PRO.27.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le creuset est pour l’argent, et le fourneau pour l’or;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 17:10
      metadata:
        usfm: JER.17.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais celui qui éprouve les cœurs, c’est l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Le méchant est attentif à la lèvre inique,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le menteur prête l’oreille à la langue pernicieuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 14:31
      metadata:
        usfm: PRO.14.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui se moque du pauvre outrage celui qui l’a fait;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui se réjouit d’un malheur ne restera pas impuni.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les enfants des enfants sont la couronne des vieillards,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les pères sont la gloire de leurs enfants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les paroles distinguées ne conviennent pas à un insensé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Combien moins à un noble les paroles mensongères!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les présents sont une pierre précieuse aux yeux de qui en reçoit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: De quelque côté qu’ils se tournent, ils ont du succès.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Celui qui couvre une faute cherche l’amour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celui qui la rappelle dans ses discours divise les amis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Une réprimande fait plus d’impression sur l’homme intelligent
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que cent coups sur l’insensé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le méchant ne cherche que révolte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais un messager cruel sera envoyé contre lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Rencontre une ourse privée de ses petits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plutôt qu’un insensé pendant sa folie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:35
      metadata:
        usfm: DEU.32.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 20:22
      metadata:
        usfm: PRO.20.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:29
      metadata:
        usfm: PRO.24.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:17
      metadata:
        usfm: ROM.12.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:15
      metadata:
        usfm: 1TH.5.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:9
      metadata:
        usfm: 1PE.3.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: De celui qui rend le mal pour le bien
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le mal ne quittera point la maison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 20:3
      metadata:
        usfm: PRO.20.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Commencer une querelle, c’est ouvrir une digue;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avant que la dispute s’anime, retire-toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:7
      metadata:
        usfm: EXO.23.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 24:24
      metadata:
        usfm: PRO.24.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:23
      metadata:
        usfm: ISA.5.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui absout le coupable et celui qui condamne le juste
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sont tous deux en abomination à l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A quoi sert l’argent dans la main de l’insensé?
- type: usfm
  marker: q1
  children:
  - type: text
    text: A acheter la sagesse?… Mais il n’a point de sens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L’ami aime en tout temps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et dans le malheur il se montre un frère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: L’homme dépourvu de sens prend des engagements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il cautionne son prochain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Celui qui aime les querelles aime le péché;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 16:18
      metadata:
        usfm: PRO.16.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui élève sa porte cherche la ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Un cœur faux ne trouve pas le bonheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celui dont la langue est perverse tombe dans le malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Celui qui donne naissance à un insensé aura du chagrin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le père d’un fou ne peut pas se réjouir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 15:13
      metadata:
        usfm: PRO.15.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Un cœur joyeux est un bon remède,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais un esprit abattu dessèche les os.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Le méchant accepte en secret des présents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour pervertir les voies de la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 2:14
      metadata:
        usfm: ECC.2.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:1
      metadata:
        usfm: ECC.8.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La sagesse est en face de l’homme intelligent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais les yeux de l’insensé sont à l’extrémité de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:1
      metadata:
        usfm: PRO.10.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:20
      metadata:
        usfm: PRO.15.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:13
      metadata:
        usfm: PRO.19.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Un fils insensé fait le chagrin de son père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’amertume de celle qui l’a enfanté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il n’est pas bon de condamner le juste à une amende,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni de frapper les nobles à cause de leur droiture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Celui qui retient ses paroles connaît la science,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celui qui a l’esprit calme est un homme intelligent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: L’insensé même, quand il se tait, passe pour sage;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui ferme ses lèvres est un homme intelligent.
