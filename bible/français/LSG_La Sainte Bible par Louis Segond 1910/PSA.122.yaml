document_id: PSA.122,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: De 16:16. Ps 84.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cantique des degrés. De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je suis dans la joie quand on me dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Allons à la maison de l’Éternel!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nos pieds s’arrêtent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans tes portes, Jérusalem!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem, tu es bâtie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme une ville dont les parties sont liées ensemble.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est là que montent les tribus, les tribus de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Selon la loi d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour louer le nom de l’Éternel.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car là sont les trônes pour la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les trônes de la maison de David.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Demandez la paix de Jérusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ceux qui t’aiment jouissent du repos!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la paix soit dans tes murs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la tranquillité dans tes palais!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de mes frères et de mes amis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je désire la paix dans ton sein;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de la maison de l’Éternel, notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Né 2:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je fais des vœux pour ton bonheur.
