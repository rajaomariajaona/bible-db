document_id: PSA.122,93
type_code: fra
verses:
  '1':
  - type: heading
    content: De 16:16. Ps 84.
  - type: text
    content: Cantique des degrés. De David.
  - type: text
    content: 'Je suis dans la joie quand on me dit:'
  - type: text
    content: Allons à la maison de l’Éternel!
  '2':
  - type: text
    content: Nos pieds s’arrêtent
  - type: text
    content: Dans tes portes, Jérusalem!
  '3':
  - type: text
    content: Jérusalem, tu es bâtie
  - type: text
    content: Comme une ville dont les parties sont liées ensemble.
  '4':
  - type: text
    content: C’est là que montent les tribus, les tribus de l’Éternel,
  - type: text
    content: Selon la loi d’Israël,
  - type: text
    content: Pour louer le nom de l’Éternel.
  '5':
  - type: text
    content: Car là sont les trônes pour la justice,
  - type: text
    content: Les trônes de la maison de David.
  '6':
  - type: text
    content: Demandez la paix de Jérusalem.
  - type: text
    content: Que ceux qui t’aiment jouissent du repos!
  '7':
  - type: text
    content: Que la paix soit dans tes murs,
  - type: text
    content: Et la tranquillité dans tes palais!
  '8':
  - type: text
    content: A cause de mes frères et de mes amis,
  - type: text
    content: Je désire la paix dans ton sein;
  '9':
  - type: text
    content: A cause de la maison de l’Éternel, notre Dieu,
  - type: note
    content: Né 2:10.
  - type: text
    content: Je fais des vœux pour ton bonheur.
