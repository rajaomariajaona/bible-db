document_id: PSA.122
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: De 16:16. Ps 84.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique des degrés. De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je suis dans la joie quand on me dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Allons à la maison de l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nos pieds s’arrêtent
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans tes portes, Jérusalem!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jérusalem, tu es bâtie
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme une ville dont les parties sont liées ensemble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C’est là que montent les tribus, les tribus de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Selon la loi d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour louer le nom de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Car là sont les trônes pour la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les trônes de la maison de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Demandez la paix de Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ceux qui t’aiment jouissent du repos!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Que la paix soit dans tes murs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la tranquillité dans tes palais!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A cause de mes frères et de mes amis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je désire la paix dans ton sein;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: A cause de la maison de l’Éternel, notre Dieu,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Né 2:10
      metadata:
        usfm: NEH.2.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je fais des vœux pour ton bonheur.
