document_id: JOB.31
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-40: cf. (Job 23:1-12; 29:1-17; 42:1-7.) (Ps 7:4-6; 17:1-5.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: J’avais fait un pacte avec mes yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je n’aurais pas arrêté mes regards sur une vierge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Quelle part Dieu m’eût-il réservée d’en haut?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quel héritage le Tout-Puissant m’eût-il envoyé des cieux?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: La ruine n’est-elle pas pour le méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le malheur pour ceux qui commettent l’iniquité?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 16:9
      metadata:
        usfm: 2CH.16.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 34:21
      metadata:
        usfm: JOB.34.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 5:21
      metadata:
        usfm: PRO.5.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:3
      metadata:
        usfm: PRO.15.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 32:19
      metadata:
        usfm: JER.32.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Dieu n’a-t-il pas connu mes voies?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’a-t-il pas compté tous mes pas?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Si j’ai marché dans le mensonge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si mon pied a couru vers la fraude,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Que Dieu me pèse dans des balances justes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il reconnaîtra mon intégrité!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Si mon pas s’est détourné du droit chemin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si mon cœur a suivi mes yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si quelque souillure s’est attachée à mes mains,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Que je sème et qu’un autre moissonne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que mes rejetons soient déracinés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 24:15
      metadata:
        usfm: JOB.24.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 7:25
      metadata:
        usfm: PRO.7.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Si mon cœur a été séduit par une femme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si j’ai fait le guet à la porte de mon prochain,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Que ma femme tourne la meule pour un autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que d’autres la déshonorent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Car c’est un crime,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un forfait que punissent les juges;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C’est un feu qui dévore jusqu’à la ruine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui aurait détruit toute ma richesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Si j’ai méprisé le droit de mon serviteur ou de ma servante
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lorsqu’ils étaient en contestation avec moi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Qu’ai-je à faire, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 44:22
      metadata:
        usfm: PSA.44.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: quand Dieu se lève?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ai-je à répondre, quand il châtie?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 34:19
      metadata:
        usfm: JOB.34.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 14:31
      metadata:
        usfm: PRO.14.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:5
      metadata:
        usfm: PRO.17.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui m’a créé dans le ventre de ma mère ne l’a-t-il pas créé?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le même Dieu ne nous a-t-il pas formés dans le sein maternel?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Si j’ai refusé aux pauvres ce qu’ils demandaient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si j’ai fait languir les yeux de la veuve,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Si j’ai mangé seul mon pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans que l’orphelin en ait eu sa part,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Moi qui l’ai dès ma jeunesse élevé comme un père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi qui dès ma naissance ai soutenu la veuve;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Si j’ai vu le malheureux manquer de vêtements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’indigent n’avoir point de couverture,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Sans que ses reins m’aient béni,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans qu’il ait été réchauffé par la toison de mes agneaux;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Si j’ai levé la main contre l’orphelin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que je me sentais un appui dans les juges;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Que mon épaule se détache de sa jointure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que mon bras tombe et qu’il se brise!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Car les châtiments de Dieu m’épouvantent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je ne puis rien devant sa majesté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 10:24
      metadata:
        usfm: MRK.10.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 6:17
      metadata:
        usfm: 1TI.6.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Si j’ai mis dans l’or ma confiance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Si j’ai dit à l’or: Tu es mon espoir;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 62:11
      metadata:
        usfm: PSA.62.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Si je me suis réjoui de la grandeur de mes biens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De la quantité des richesses que j’avais acquises;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:19
      metadata:
        usfm: DEU.4.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Si j’ai regardé le soleil quand il brillait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La lune quand elle s’avançait majestueuse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Et si mon cœur s’est laissé séduire en secret,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si ma main s’est portée sur ma bouche;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: C’est encore un crime que doivent punir les juges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’aurais renié le Dieu d’en haut!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 17:5
      metadata:
        usfm: PRO.17.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Si j’ai été joyeux du malheur de mon ennemi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si j’ai sauté d’allégresse quand les revers l’ont atteint,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Moi qui n’ai pas permis à ma langue de pécher,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:44
      metadata:
        usfm: MAT.5.44
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:14
      metadata:
        usfm: ROM.12.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: De demander sa mort avec imprécation;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Si les gens de ma tente ne disaient pas:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où est celui qui n’a pas été rassasié de sa viande?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:2
      metadata:
        usfm: HEB.13.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:9
      metadata:
        usfm: 1PE.4.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Si l’étranger passait la nuit dehors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si je n’ouvrais pas ma porte au voyageur;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Si, comme les hommes, j’ai caché mes transgressions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et renfermé mes iniquités dans mon sein,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Parce que j’avais peur de la multitude,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que je craignais le mépris des familles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Me tenant à l’écart et n’osant franchir ma porte…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Oh! Qui me fera trouver quelqu’un qui m’écoute?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voilà ma défense toute signée:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que le Tout-Puissant me réponde!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui me donnera la plainte écrite par mon adversaire?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Je porterai son écrit sur mon épaule,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je l’attacherai sur mon front comme une couronne;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Je lui rendrai compte de tous mes pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je m’approcherai de lui comme un prince.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Si ma terre crie contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que ses sillons versent des larmes;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Si j’en ai mangé le produit sans l’avoir payée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que j’aie attristé l’âme de ses anciens maîtres;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Qu’il y croisse des épines au lieu de froment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de l’ivraie au lieu d’orge!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fin des paroles de Job.
