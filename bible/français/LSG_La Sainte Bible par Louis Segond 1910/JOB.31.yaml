document_id: JOB.31,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-40: cf. (Job 23:1-12; 29:1-17; 42:1-7.) (Ps 7:4-6; 17:1-5.)'
  - type: text
    content: J’avais fait un pacte avec mes yeux,
  - type: text
    content: Et je n’aurais pas arrêté mes regards sur une vierge.
  '10':
  - type: text
    content: Que ma femme tourne la meule pour un autre,
  - type: text
    content: Et que d’autres la déshonorent!
  '11':
  - type: text
    content: Car c’est un crime,
  - type: text
    content: Un forfait que punissent les juges;
  '12':
  - type: text
    content: C’est un feu qui dévore jusqu’à la ruine,
  - type: text
    content: Et qui aurait détruit toute ma richesse.
  '13':
  - type: text
    content: Si j’ai méprisé le droit de mon serviteur ou de ma servante
  - type: text
    content: Lorsqu’ils étaient en contestation avec moi,
  '14':
  - type: text
    content: 'Qu’ai-je à faire, '
  - type: note
    content: Ps 44:22.
  - type: text
    content: quand Dieu se lève?
  - type: text
    content: Qu’ai-je à répondre, quand il châtie?
  '15':
  - type: text
    content: ' '
  - type: note
    content: Job 34:19. Pr 14:31; 17:5.
  - type: text
    content: Celui qui m’a créé dans le ventre de ma mère ne l’a-t-il pas créé?
  - type: text
    content: Le même Dieu ne nous a-t-il pas formés dans le sein maternel?
  '16':
  - type: text
    content: Si j’ai refusé aux pauvres ce qu’ils demandaient,
  - type: text
    content: Si j’ai fait languir les yeux de la veuve,
  '17':
  - type: text
    content: Si j’ai mangé seul mon pain,
  - type: text
    content: Sans que l’orphelin en ait eu sa part,
  '18':
  - type: text
    content: Moi qui l’ai dès ma jeunesse élevé comme un père,
  - type: text
    content: Moi qui dès ma naissance ai soutenu la veuve;
  '19':
  - type: text
    content: Si j’ai vu le malheureux manquer de vêtements,
  - type: text
    content: L’indigent n’avoir point de couverture,
  '2':
  - type: text
    content: Quelle part Dieu m’eût-il réservée d’en haut?
  - type: text
    content: Quel héritage le Tout-Puissant m’eût-il envoyé des cieux?
  '20':
  - type: text
    content: Sans que ses reins m’aient béni,
  - type: text
    content: Sans qu’il ait été réchauffé par la toison de mes agneaux;
  '21':
  - type: text
    content: Si j’ai levé la main contre l’orphelin,
  - type: text
    content: Parce que je me sentais un appui dans les juges;
  '22':
  - type: text
    content: Que mon épaule se détache de sa jointure,
  - type: text
    content: Que mon bras tombe et qu’il se brise!
  '23':
  - type: text
    content: Car les châtiments de Dieu m’épouvantent,
  - type: text
    content: Et je ne puis rien devant sa majesté.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Mc 10:24. 1 Ti 6:17.
  - type: text
    content: Si j’ai mis dans l’or ma confiance,
  - type: text
    content: 'Si j’ai dit à l’or: Tu es mon espoir;'
  '25':
  - type: text
    content: ' '
  - type: note
    content: Ps 62:11.
  - type: text
    content: Si je me suis réjoui de la grandeur de mes biens,
  - type: text
    content: De la quantité des richesses que j’avais acquises;
  '26':
  - type: text
    content: ' '
  - type: note
    content: De 4:19.
  - type: text
    content: Si j’ai regardé le soleil quand il brillait,
  - type: text
    content: La lune quand elle s’avançait majestueuse,
  '27':
  - type: text
    content: Et si mon cœur s’est laissé séduire en secret,
  - type: text
    content: Si ma main s’est portée sur ma bouche;
  '28':
  - type: text
    content: C’est encore un crime que doivent punir les juges,
  - type: text
    content: Et j’aurais renié le Dieu d’en haut!
  '29':
  - type: text
    content: ' '
  - type: note
    content: Pr 17:5.
  - type: text
    content: Si j’ai été joyeux du malheur de mon ennemi,
  - type: text
    content: Si j’ai sauté d’allégresse quand les revers l’ont atteint,
  '3':
  - type: text
    content: La ruine n’est-elle pas pour le méchant,
  - type: text
    content: Et le malheur pour ceux qui commettent l’iniquité?
  '30':
  - type: text
    content: Moi qui n’ai pas permis à ma langue de pécher,
  - type: note
    content: Mt 5:44. Ro 12:14.
  - type: text
    content: De demander sa mort avec imprécation;
  '31':
  - type: text
    content: 'Si les gens de ma tente ne disaient pas:'
  - type: text
    content: Où est celui qui n’a pas été rassasié de sa viande?
  '32':
  - type: text
    content: ' '
  - type: note
    content: Hé 13:2. 1 Pi 4:9.
  - type: text
    content: Si l’étranger passait la nuit dehors,
  - type: text
    content: Si je n’ouvrais pas ma porte au voyageur;
  '33':
  - type: text
    content: Si, comme les hommes, j’ai caché mes transgressions,
  - type: text
    content: Et renfermé mes iniquités dans mon sein,
  '34':
  - type: text
    content: Parce que j’avais peur de la multitude,
  - type: text
    content: Parce que je craignais le mépris des familles,
  - type: text
    content: Me tenant à l’écart et n’osant franchir ma porte…
  '35':
  - type: text
    content: Oh! Qui me fera trouver quelqu’un qui m’écoute?
  - type: text
    content: 'Voilà ma défense toute signée:'
  - type: text
    content: Que le Tout-Puissant me réponde!
  - type: text
    content: Qui me donnera la plainte écrite par mon adversaire?
  '36':
  - type: text
    content: Je porterai son écrit sur mon épaule,
  - type: text
    content: Je l’attacherai sur mon front comme une couronne;
  '37':
  - type: text
    content: Je lui rendrai compte de tous mes pas,
  - type: text
    content: Je m’approcherai de lui comme un prince.
  '38':
  - type: text
    content: Si ma terre crie contre moi,
  - type: text
    content: Et que ses sillons versent des larmes;
  '39':
  - type: text
    content: Si j’en ai mangé le produit sans l’avoir payée,
  - type: text
    content: Et que j’aie attristé l’âme de ses anciens maîtres;
  '4':
  - type: text
    content: ' '
  - type: note
    content: 2 Ch 16:9. Job 34:21. Pr 5:21; 15:3. Jé 32:19.
  - type: text
    content: Dieu n’a-t-il pas connu mes voies?
  - type: text
    content: N’a-t-il pas compté tous mes pas?
  '40':
  - type: text
    content: Qu’il y croisse des épines au lieu de froment,
  - type: text
    content: Et de l’ivraie au lieu d’orge!
  - type: text
    content: Fin des paroles de Job.
  '5':
  - type: text
    content: Si j’ai marché dans le mensonge,
  - type: text
    content: Si mon pied a couru vers la fraude,
  '6':
  - type: text
    content: Que Dieu me pèse dans des balances justes,
  - type: text
    content: Et il reconnaîtra mon intégrité!
  '7':
  - type: text
    content: Si mon pas s’est détourné du droit chemin,
  - type: text
    content: Si mon cœur a suivi mes yeux,
  - type: text
    content: Si quelque souillure s’est attachée à mes mains,
  '8':
  - type: text
    content: Que je sème et qu’un autre moissonne,
  - type: text
    content: Et que mes rejetons soient déracinés!
  '9':
  - type: text
    content: ' '
  - type: note
    content: Job 24:15. Pr 7:25.
  - type: text
    content: Si mon cœur a été séduit par une femme,
  - type: text
    content: Si j’ai fait le guet à la porte de mon prochain,
