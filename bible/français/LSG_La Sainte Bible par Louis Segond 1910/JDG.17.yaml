document_id: JDG.17,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Culte dans la maison de Mica en Éphraïm; le jeune Lévite au service de Mica
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-13: cf. De 27:15. Jg 8:24-27. Jé 50:6. Pr 14:12.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait un homme de la montagne d’Éphraïm, nommé Mica. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mica lui dit: Reste avec moi; tu me serviras de père et de prêtre, et je te donnerai dix sicles d’argent par année, les vêtements dont tu auras besoin, et ton entretien. Et le Lévite entra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il se décida ainsi à rester avec cet homme, qui regarda le jeune homme comme l’un de ses fils. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mica consacra le Lévite, et ce jeune homme lui servit de prêtre et demeura dans sa maison. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Mica dit: Maintenant, je sais que l’Éternel me fera du bien, puisque j’ai ce Lévite pour prêtre.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit à sa mère: Les mille et cent sicles d’argent qu’on t’a pris, et pour lesquels tu as fait des imprécations même à mes oreilles, voici, cet argent est entre mes mains, c’est moi qui l’avais pris. Et sa mère dit: Béni soit mon fils par l’Éternel! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il rendit à sa mère les mille et cent sicles d’argent; et sa mère dit: Je consacre de ma main cet argent à l’Éternel, afin d’en faire pour mon fils une image taillée et une image en fonte; et c’est ainsi que je te le rendrai. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il rendit à sa mère l’argent. Sa mère prit deux cents sicles d’argent. Et elle donna l’argent au fondeur, qui en fit une image taillée et une image en fonte. On les plaça dans la maison de Mica. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce Mica avait une maison de Dieu; il fit un éphod et des théraphim, et il consacra l’un de ses fils, qui lui servit de prêtre. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 18:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'En ce temps-là, il n’y avait point de roi en Israël. Chacun faisait ce qui lui semblait bon. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait un jeune homme de Bethléhem de Juda, de la famille de Juda; il était Lévite, et il séjournait là. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cet homme partit de la ville de Bethléhem de Juda, pour chercher une demeure qui lui convînt. En poursuivant son chemin, il arriva dans la montagne d’Éphraïm jusqu’à la maison de Mica. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mica lui dit: D’où viens-tu? Il lui répondit: Je suis Lévite, de Bethléhem de Juda, et je voyage pour chercher une demeure qui me convienne. '
