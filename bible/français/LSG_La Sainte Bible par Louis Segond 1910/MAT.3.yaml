document_id: MAT.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prédication de Jean-Baptiste
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-12: cf. (Mc 1:2-8. Lu 3:1-18.) Ac 19:4.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce temps-là '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'parut Jean-Baptiste, prêchant dans le désert de Judée. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Déjà la cognée est mise à la racine des arbres: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 7:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 15:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'tout arbre donc qui ne produit pas de bons fruits sera coupé et jeté au feu. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Moi, je vous baptise d’eau, pour vous amener à la repentance; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:15
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '26'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mais celui qui vient après moi est plus puissant que moi, et je ne suis pas digne de porter ses souliers. Lui, il vous baptisera du Saint-Esprit et de feu. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Il a son van à la main; il nettoiera son aire, et il amassera son blé dans le grenier, mais il brûlera la paille dans un feu qui ne s’éteint point.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Baptême de Jésus-Christ
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-17: cf. (Mc 1:9-11. Lu 3:21, 22.) Jn 1:32-34. Ac 10:38.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors Jésus vint de la Galilée au Jourdain vers Jean, pour être baptisé par lui. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jean s’y opposait, en disant: C’est moi qui ai besoin d’être baptisé par toi, et tu viens à moi! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Laisse faire maintenant, car il est convenable que nous accomplissions ainsi tout ce qui est juste.
    - type: text
      text: ' Et Jean ne lui résista plus. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dès que Jésus eut été baptisé, il sortit de l’eau. Et voici, les cieux s’ouvrirent, et il vit '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 11:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 42:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'l’Esprit de Dieu descendre comme une colombe et venir sur lui. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici, une voix fit entendre des cieux ces paroles: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 42:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 12:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:35
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 1:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Celui-ci est mon Fils bien-aimé, en qui j’ai mis toute mon affection.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il disait: Repentez-vous, car le royaume des cieux est proche. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jean est celui qui avait été annoncé par Ésaïe, le prophète, lorsqu’il dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est ici la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 40:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'voix de celui qui crie dans le désert:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Préparez le chemin du Seigneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aplanissez ses sentiers.
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jean avait un vêtement de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'poils de chameau, et une ceinture de cuir autour des reins. Il se nourrissait de sauterelles et de miel sauvage. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Les habitants de Jérusalem, de toute la Judée et de tout le pays des environs du Jourdain, se rendaient auprès de lui; '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'et, confessant leurs péchés, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ils se faisaient baptiser par lui dans le fleuve du Jourdain. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Mais, voyant venir à son baptême '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'beaucoup de pharisiens et de sadducéens, il leur dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 12:34
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Races de vipères, qui vous a appris à fuir la colère à venir? '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Produisez donc du fruit digne de la repentance, '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'et ne prétendez pas dire en vous-mêmes: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 8:39
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Nous avons Abraham pour père! Car je vous déclare que de ces pierres-ci Dieu peut susciter des enfants à Abraham. '
