document_id: MAT.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prédication de Jean-Baptiste
  - type: heading
    content: 'V. 1-12: cf. (Mc 1:2-8. Lu 3:1-18.) Ac 19:4.'
  - type: text
    content: 'En ce temps-là '
  - type: note
    content: Mc 1:14. Lu 3:3.
  - type: text
    content: 'parut Jean-Baptiste, prêchant dans le désert de Judée. '
  '10':
  - type: text
    content: 'Déjà la cognée est mise à la racine des arbres: '
  - type: note
    content: Mt 7:19. Jn 15:6.
  - type: text
    content: 'tout arbre donc qui ne produit pas de bons fruits sera coupé et jeté au feu. '
  '11':
  - type: text
    content: 'Moi, je vous baptise d’eau, pour vous amener à la repentance; '
  - type: note
    content: Mc 1:7. Lu 3:16. Jn 1:15, 26. Ac 1:5; 11:16; 19:4.
  - type: text
    content: 'mais celui qui vient après moi est plus puissant que moi, et je ne suis pas digne de porter ses souliers. Lui, il vous baptisera du Saint-Esprit et de feu. '
  '12':
  - type: text
    content: Il a son van à la main; il nettoiera son aire, et il amassera son blé dans le grenier, mais il brûlera la paille dans un feu qui ne s’éteint point.
  - type: heading
    content: Baptême de Jésus-Christ
  - type: heading
    content: 'V. 13-17: cf. (Mc 1:9-11. Lu 3:21, 22.) Jn 1:32-34. Ac 10:38.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Mc 1:9. Lu 3:21.
  - type: text
    content: 'Alors Jésus vint de la Galilée au Jourdain vers Jean, pour être baptisé par lui. '
  '14':
  - type: text
    content: 'Mais Jean s’y opposait, en disant: C’est moi qui ai besoin d’être baptisé par toi, et tu viens à moi! '
  '15':
  - type: text
    content: 'Jésus lui répondit: '
  - type: text
    content: Laisse faire maintenant, car il est convenable que nous accomplissions ainsi tout ce qui est juste.
  - type: text
    content: ' Et Jean ne lui résista plus. '
  '16':
  - type: text
    content: 'Dès que Jésus eut été baptisé, il sortit de l’eau. Et voici, les cieux s’ouvrirent, et il vit '
  - type: note
    content: És 11:2; 42:1. Jn 1:32.
  - type: text
    content: 'l’Esprit de Dieu descendre comme une colombe et venir sur lui. '
  '17':
  - type: text
    content: 'Et voici, une voix fit entendre des cieux ces paroles: '
  - type: note
    content: És 42:1. Mt 12:18; 17:5. Lu 9:35. Col 1:13. 2 Pi 1:17.
  - type: text
    content: Celui-ci est mon Fils bien-aimé, en qui j’ai mis toute mon affection.
  '2':
  - type: text
    content: 'Il disait: Repentez-vous, car le royaume des cieux est proche. '
  '3':
  - type: text
    content: 'Jean est celui qui avait été annoncé par Ésaïe, le prophète, lorsqu’il dit:'
  - type: text
    content: 'C’est ici la '
  - type: note
    content: És 40:3. Mc 1:3. Lu 3:4. Jn 1:23.
  - type: text
    content: 'voix de celui qui crie dans le désert:'
  - type: text
    content: Préparez le chemin du Seigneur,
  - type: text
    content: Aplanissez ses sentiers.
  '4':
  - type: text
    content: 'Jean avait un vêtement de '
  - type: note
    content: Mc 1:6.
  - type: text
    content: 'poils de chameau, et une ceinture de cuir autour des reins. Il se nourrissait de sauterelles et de miel sauvage. '
  '5':
  - type: text
    content: 'Les habitants de Jérusalem, de toute la Judée et de tout le pays des environs du Jourdain, se rendaient auprès de lui; '
  '6':
  - type: text
    content: 'et, confessant leurs péchés, '
  - type: note
    content: Mc 1:5.
  - type: text
    content: 'ils se faisaient baptiser par lui dans le fleuve du Jourdain. '
  '7':
  - type: text
    content: 'Mais, voyant venir à son baptême '
  - type: note
    content: Lu 3:7.
  - type: text
    content: 'beaucoup de pharisiens et de sadducéens, il leur dit: '
  - type: note
    content: Mt 12:34; 23:33.
  - type: text
    content: 'Races de vipères, qui vous a appris à fuir la colère à venir? '
  '8':
  - type: note
    content: Lu 3:8.
  - type: text
    content: 'Produisez donc du fruit digne de la repentance, '
  '9':
  - type: text
    content: 'et ne prétendez pas dire en vous-mêmes: '
  - type: note
    content: Jn 8:39.
  - type: text
    content: 'Nous avons Abraham pour père! Car je vous déclare que de ces pierres-ci Dieu peut susciter des enfants à Abraham. '
