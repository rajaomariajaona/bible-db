document_id: JDG.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Thola et Jaïr, juges en Israël
  - type: heading
    content: 'V. 1-5: cf. Jg 12:8-15. Ps 94:14.'
  - type: text
    content: 'Après Abimélec, Thola, fils de Pua, fils de Dodo, homme d’Issacar, se leva pour délivrer Israël; il habitait à Schamir, dans la montagne d’Éphraïm. '
  '10':
  - type: text
    content: 'Les enfants d’Israël crièrent à l’Éternel, en disant: Nous avons péché contre toi, car nous avons abandonné notre Dieu et nous avons servi les Baals. '
  '11':
  - type: text
    content: 'L’Éternel dit aux enfants d’Israël: Ne vous ai-je pas délivrés des Égyptiens, des Amoréens, des fils d’Ammon, des Philistins? '
  '12':
  - type: text
    content: 'Et lorsque les Sidoniens, Amalek et Maon, vous opprimèrent, et que vous criâtes à moi, ne vous ai-je pas délivrés de leurs mains? '
  '13':
  - type: text
    content: 'Mais vous, vous m’avez '
  - type: note
    content: De 32:15. Jé 2:13.
  - type: text
    content: 'abandonné, et vous avez servi d’autres dieux. C’est pourquoi je ne vous délivrerai plus. '
  '14':
  - type: text
    content: 'Allez, invoquez les dieux que vous avez choisis; qu’ils vous délivrent au temps de votre détresse! '
  '15':
  - type: text
    content: 'Les enfants d’Israël dirent à l’Éternel: Nous avons péché; traite-nous comme il te plaira. Seulement, daigne nous délivrer aujourd’hui! '
  '16':
  - type: text
    content: 'Et ils ôtèrent les dieux étrangers du milieu d’eux, et servirent l’Éternel, qui fut touché des maux d’Israël. '
  '17':
  - type: text
    content: 'Les fils d’Ammon se rassemblèrent et campèrent en Galaad, et les enfants d’Israël se rassemblèrent et campèrent à Mitspa. '
  '18':
  - type: text
    content: 'Le peuple, les chefs de Galaad se dirent l’un à l’autre: Quel est l’homme qui commencera l’attaque contre les fils d’Ammon? '
  - type: note
    content: Jg 11:6, 9, 10, 11.
  - type: text
    content: Il sera chef de tous les habitants de Galaad.
  '2':
  - type: text
    content: 'Il fut juge en Israël pendant vingt-trois ans; puis il mourut, et fut enterré à Schamir. '
  '3':
  - type: text
    content: 'Après lui, se leva Jaïr, le Galaadite, qui fut juge en Israël pendant vingt-deux ans. '
  '4':
  - type: text
    content: 'Il avait trente fils, qui montaient sur trente ânons, et qui possédaient trente villes, appelées encore aujourd’hui bourgs de Jaïr, et situées dans le pays de Galaad. '
  '5':
  - type: text
    content: Et Jaïr mourut, et fut enterré à Kamon.
  - type: heading
    content: Jephthé, juge en Israël
  - type: heading
    content: 'V. 6-18: cf. (De 31:16-18. 1 S 12:9-11. És 63:10.) (Pr 28:13. Jé 31:18-21.) La 3:21-23, 31-33.'
  '6':
  - type: text
    content: 'Les enfants d’Israël firent encore ce qui '
  - type: note
    content: Jg 2:11; 3:7; 4:1; 6:1.
  - type: text
    content: 'déplaît à l’Éternel; ils servirent les Baals et les Astartés, les dieux de Syrie, les dieux de Sidon, les dieux de Moab, les dieux des fils d’Ammon, et les dieux des Philistins, et ils abandonnèrent l’Éternel et ne le servirent plus. '
  '7':
  - type: text
    content: 'La colère de l’Éternel s’enflamma contre Israël, et il les vendit entre les mains des Philistins et entre les mains des fils d’Ammon. '
  '8':
  - type: text
    content: 'Ils opprimèrent et écrasèrent les enfants d’Israël cette année-là, et pendant dix-huit ans tous les enfants d’Israël qui étaient de l’autre côté du Jourdain dans le pays des Amoréens en Galaad. '
  '9':
  - type: text
    content: 'Les fils d’Ammon passèrent le Jourdain pour combattre aussi contre Juda, contre Benjamin et contre la maison d’Éphraïm. Et Israël fut dans une grande détresse. '
