document_id: JDG.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Thola et Jaïr, juges en Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. Jg 12:8-15. Ps 94:14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après Abimélec, Thola, fils de Pua, fils de Dodo, homme d’Issacar, se leva pour délivrer Israël; il habitait à Schamir, dans la montagne d’Éphraïm. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il fut juge en Israël pendant vingt-trois ans; puis il mourut, et fut enterré à Schamir. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Après lui, se leva Jaïr, le Galaadite, qui fut juge en Israël pendant vingt-deux ans. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il avait trente fils, qui montaient sur trente ânons, et qui possédaient trente villes, appelées encore aujourd’hui bourgs de Jaïr, et situées dans le pays de Galaad. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Et Jaïr mourut, et fut enterré à Kamon.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jephthé, juge en Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-18: cf. (De 31:16-18. 1 S 12:9-11. És 63:10.) (Pr 28:13. Jé 31:18-21.) La 3:21-23, 31-33.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les enfants d’Israël firent encore ce qui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 2:11
      metadata:
        usfm: JDG.2.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:7
      metadata:
        usfm: JDG.3.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:1
      metadata:
        usfm: JDG.4.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:1
      metadata:
        usfm: JDG.6.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'déplaît à l’Éternel; ils servirent les Baals et les Astartés, les dieux de Syrie, les dieux de Sidon, les dieux de Moab, les dieux des fils d’Ammon, et les dieux des Philistins, et ils abandonnèrent l’Éternel et ne le servirent plus. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'La colère de l’Éternel s’enflamma contre Israël, et il les vendit entre les mains des Philistins et entre les mains des fils d’Ammon. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils opprimèrent et écrasèrent les enfants d’Israël cette année-là, et pendant dix-huit ans tous les enfants d’Israël qui étaient de l’autre côté du Jourdain dans le pays des Amoréens en Galaad. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les fils d’Ammon passèrent le Jourdain pour combattre aussi contre Juda, contre Benjamin et contre la maison d’Éphraïm. Et Israël fut dans une grande détresse. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les enfants d’Israël crièrent à l’Éternel, en disant: Nous avons péché contre toi, car nous avons abandonné notre Dieu et nous avons servi les Baals. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’Éternel dit aux enfants d’Israël: Ne vous ai-je pas délivrés des Égyptiens, des Amoréens, des fils d’Ammon, des Philistins? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et lorsque les Sidoniens, Amalek et Maon, vous opprimèrent, et que vous criâtes à moi, ne vous ai-je pas délivrés de leurs mains? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais vous, vous m’avez '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:15
      metadata:
        usfm: DEU.32.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:13
      metadata:
        usfm: JER.2.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'abandonné, et vous avez servi d’autres dieux. C’est pourquoi je ne vous délivrerai plus. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Allez, invoquez les dieux que vous avez choisis; qu’ils vous délivrent au temps de votre détresse! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les enfants d’Israël dirent à l’Éternel: Nous avons péché; traite-nous comme il te plaira. Seulement, daigne nous délivrer aujourd’hui! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et ils ôtèrent les dieux étrangers du milieu d’eux, et servirent l’Éternel, qui fut touché des maux d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les fils d’Ammon se rassemblèrent et campèrent en Galaad, et les enfants d’Israël se rassemblèrent et campèrent à Mitspa. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le peuple, les chefs de Galaad se dirent l’un à l’autre: Quel est l’homme qui commencera l’attaque contre les fils d’Ammon? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 11:6
      metadata:
        usfm: JDG.11.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: JDG.11.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: JDG.11.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: JDG.11.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il sera chef de tous les habitants de Galaad.
