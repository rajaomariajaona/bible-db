document_id: NUM.11,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le feu de l’Éternel
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-3: cf. De 9:22. Ja 5:16.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 9:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le peuple murmura et cela déplut aux oreilles de l’Éternel. Lorsque l’Éternel l’entendit, sa colère s’enflamma; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 78:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le feu de l’Éternel s’alluma parmi eux, et dévora l’extrémité du camp. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Moïse entendit le peuple qui pleurait, chacun dans sa famille et à l’entrée de sa tente. La colère de l’Éternel s’enflamma fortement. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Moïse fut attristé, et il dit à l’Éternel: Pourquoi affliges-tu ton serviteur, et pourquoi n’ai-je pas trouvé grâce à tes yeux, que tu aies mis sur moi la charge de tout ce peuple? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Est-ce moi qui ai conçu ce peuple? Est-ce moi qui l’ai enfanté, pour que tu me dises: Porte-le sur ton sein, comme le nourricier porte un enfant, jusqu’au pays que tu as juré à ses pères de lui donner? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Où prendrai-je de la viande pour donner à tout ce peuple? Car ils pleurent auprès de moi, en disant: Donne-nous de la viande à manger! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Je ne puis pas, à moi seul, porter tout ce peuple, car il est trop pesant pour moi. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Plutôt que de me traiter ainsi, tue-moi, je te prie, si j’ai trouvé grâce à tes yeux, et que je ne voie pas mon malheur. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'L’Éternel dit à Moïse: Assemble auprès de moi soixante-dix hommes des anciens d’Israël, de ceux que tu connais comme anciens du peuple et ayant autorité sur lui; amène-les à la tente d’assignation, et qu’ils s’y présentent avec toi. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Je descendrai, et là je te parlerai; je prendrai de l’esprit qui est sur toi, et je le mettrai sur eux, afin qu’ils portent avec toi la charge du peuple, et que tu ne la portes pas à toi seul. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Tu diras au peuple: Sanctifiez-vous pour demain, et vous mangerez de la viande, puisque vous avez pleuré aux oreilles de l’Éternel, en disant: Qui nous fera manger de la viande? Car nous étions bien en Égypte. L’Éternel vous donnera de la viande, et vous en mangerez. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Vous en mangerez non pas un jour, ni deux jours, ni cinq jours, ni dix jours, ni vingt jours, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Le peuple cria à Moïse. Moïse pria l’Éternel, et le feu s’arrêta. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'mais un mois entier, jusqu’à ce qu’elle vous sorte par les narines et que vous en ayez du dégoût, parce que vous avez rejeté l’Éternel qui est au milieu de vous, et parce que vous avez pleuré devant lui, en disant: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 21:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Pourquoi donc sommes-nous sortis d’Égypte? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Moïse dit: Six cent mille hommes de pied forment le peuple au milieu duquel je suis, et tu dis: Je leur donnerai de la viande, et ils en mangeront un mois entier! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Égorgera-t-on pour eux des brebis et des bœufs, en sorte qu’ils en aient assez? Ou rassemblera-t-on pour eux tous les poissons de la mer, en sorte qu’ils en aient assez? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'L’Éternel répondit à Moïse: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 50:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 59:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'La main de l’Éternel serait-elle trop courte? Tu verras maintenant si ce que je t’ai dit arrivera ou non. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Moïse sortit, et rapporta au peuple les paroles de l’Éternel. Il assembla soixante-dix hommes des anciens du peuple, et les plaça autour de la tente. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'L’Éternel descendit dans la nuée, et parla à Moïse; il prit de l’esprit qui était sur lui, et le mit sur les soixante-dix anciens. Et dès que l’esprit reposa sur eux, ils prophétisèrent; mais ils ne continuèrent pas. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Il y eut deux hommes, l’un appelé Eldad, et l’autre Médad, qui étaient restés dans le camp, et sur lesquels l’esprit reposa; car ils étaient parmi les inscrits, quoiqu’ils ne fussent point allés à la tente; et ils prophétisèrent dans le camp. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Un jeune garçon courut l’annoncer à Moïse, et dit: Eldad et Médad prophétisent dans le camp. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Et Josué, fils de Nun, serviteur de Moïse depuis sa jeunesse, prit la parole et dit: Moïse, mon seigneur, empêche-les! '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Moïse lui répondit: Es-tu jaloux pour moi? Puisse tout le peuple de l’Éternel être composé de prophètes; et veuille l’Éternel mettre son esprit sur eux! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: On donna à ce lieu le nom de Tabeéra, parce que le feu de l’Éternel s’était allumé parmi eux.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les cailles
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 4-35: cf. Ps 78:17-31. Ex 16:1-18. Jud v. 16.'
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Et Moïse se retira au camp, lui et les anciens d’Israël. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 16:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 78:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'L’Éternel fit souffler de la mer un vent, qui amena des cailles, et les répandit sur le camp, environ une journée de chemin d’un côté et environ une journée de chemin de l’autre côté, autour du camp. Il y en avait près de deux coudées au-dessus de la surface de la terre. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Pendant tout ce jour et toute la nuit, et pendant toute la journée du lendemain, le peuple se leva et ramassa les cailles; celui qui en avait ramassé le moins en avait dix homers. Ils les étendirent pour eux autour du camp. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 78:30
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Comme la chair était encore entre leurs dents sans être mâchée, la colère de l’Éternel s’enflamma contre le peuple, et l’Éternel frappa le peuple d’une très grande plaie. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'On donna à ce lieu le nom de Kibroth-Hattaava, parce qu’on y enterra le peuple que la convoitise avait saisi. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: De Kibroth-Hattaava le peuple partit pour Hatséroth, et il s’arrêta à Hatséroth.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 12:38
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 106:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le ramassis de gens qui se trouvaient au milieu d’Israël fut saisi de convoitise; et même les enfants d’Israël recommencèrent à pleurer et dirent: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 16:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Qui nous donnera de la viande à manger? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nous nous souvenons des poissons que nous mangions en Égypte, et qui ne nous coûtaient rien, des concombres, des melons, des poireaux, des oignons et des aulx. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Maintenant, notre âme est desséchée: plus rien! Nos yeux ne voient que de la manne. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 16:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 78:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6:31
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '49'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'La manne ressemblait à de la graine de coriandre, et avait l’apparence du bdellium. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Le peuple se dispersait pour la ramasser; il la broyait avec des meules, ou la pilait dans un mortier; il la cuisait au pot, et en faisait des gâteaux. Elle avait le goût d’un gâteau à l’huile. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Quand la rosée descendait la nuit sur le camp, la manne y descendait aussi. '
