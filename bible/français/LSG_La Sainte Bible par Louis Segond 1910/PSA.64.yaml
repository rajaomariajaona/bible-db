document_id: PSA.64,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Ps 7; 10; 12; 28; 58; 140.)
  - type: text
    content: Au chef des chantres. Psaume de David.
  '10':
  - type: text
    content: Tous les hommes sont saisis de crainte,
  - type: text
    content: Ils publient ce que Dieu fait,
  - type: text
    content: Et prennent garde à son œuvre.
  '11':
  - type: text
    content: Le juste se réjouit en l’Éternel et cherche en lui son refuge,
  - type: text
    content: Tous ceux qui ont le cœur droit se glorifient.
  '2':
  - type: text
    content: O Dieu, écoute ma voix, quand je gémis!
  - type: text
    content: Protège ma vie contre l’ennemi que je crains!
  '3':
  - type: text
    content: Garantis-moi des complots des méchants,
  - type: text
    content: De la troupe bruyante des hommes iniques!
  '4':
  - type: text
    content: Ils aiguisent leur langue comme un glaive,
  - type: text
    content: Ils lancent comme des traits leurs paroles amères,
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ps 11:2.
  - type: text
    content: Pour tirer en cachette sur l’innocent;
  - type: text
    content: Ils tirent sur lui à l’improviste, et n’ont aucune crainte.
  '6':
  - type: text
    content: 'Ils se fortifient dans leur méchanceté:'
  - type: text
    content: Ils se concertent pour tendre des pièges,
  - type: text
    content: 'Ils disent: Qui les verra?'
  '7':
  - type: text
    content: 'Ils méditent des crimes: Nous voici prêts, le plan est conçu!'
  - type: text
    content: La pensée intime, le cœur de chacun est un abîme.
  '8':
  - type: text
    content: 'Dieu lance contre eux ses traits:'
  - type: text
    content: Soudain les voilà frappés.
  '9':
  - type: text
    content: Leur langue a causé leur chute;
  - type: text
    content: Tous ceux qui les voient secouent la tête.
