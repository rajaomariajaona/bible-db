document_id: PSA.64
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: (Ps 7; 10; 12; 28; 58; 140.)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O Dieu, écoute ma voix, quand je gémis!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Protège ma vie contre l’ennemi que je crains!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Garantis-moi des complots des méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De la troupe bruyante des hommes iniques!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils aiguisent leur langue comme un glaive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils lancent comme des traits leurs paroles amères,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 11:2
      metadata:
        usfm: PSA.11.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pour tirer en cachette sur l’innocent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils tirent sur lui à l’improviste, et n’ont aucune crainte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils se fortifient dans leur méchanceté:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se concertent pour tendre des pièges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils disent: Qui les verra?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils méditent des crimes: Nous voici prêts, le plan est conçu!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: La pensée intime, le cœur de chacun est un abîme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dieu lance contre eux ses traits:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soudain les voilà frappés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Leur langue a causé leur chute;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui les voient secouent la tête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tous les hommes sont saisis de crainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils publient ce que Dieu fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et prennent garde à son œuvre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le juste se réjouit en l’Éternel et cherche en lui son refuge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui ont le cœur droit se glorifient.
