document_id: EXO.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Naissance de Moïse
  - type: heading
    content: 'V. 1-10: cf. Ac 7:20-22. Hé 11:23. Mt 10:29.'
  - type: text
    content: ' '
  - type: note
    content: Ex 6:19. No 26:59.
  - type: text
    content: 'Un homme de la maison de Lévi avait pris pour femme une fille de Lévi. '
  '10':
  - type: text
    content: Quand il eut grandi, elle l’amena à la fille de Pharaon, et il fut pour elle comme un fils. Elle lui donna le nom de Moïse, car, dit-elle, je l’ai retiré des eaux.
  - type: heading
    content: Sa fuite au pays de Madian
  - type: heading
    content: 'V. 11-22: cf. Ac 7:23-29. Hé 11:24-26. Jn 1:11.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ac 7:23. Hé 11:24, 25.
  - type: text
    content: 'En ce temps-là, Moïse, devenu grand, se rendit vers ses frères, et fut témoin de leurs pénibles travaux. Il vit un Égyptien qui frappait un Hébreu d’entre ses frères. '
  '12':
  - type: text
    content: 'Il regarda de côté et d’autre, et, voyant qu’il n’y avait personne, il tua l’Égyptien, et le cacha dans le sable. '
  '13':
  - type: text
    content: 'Il sortit le jour suivant; et voici, deux Hébreux se querellaient. Il dit à celui qui avait tort: Pourquoi frappes-tu ton prochain? '
  '14':
  - type: text
    content: 'Et cet homme répondit: '
  - type: note
    content: Ac 7:27.
  - type: text
    content: 'Qui t’a établi chef et juge sur nous? Penses-tu me tuer, comme tu as tué l’Égyptien? Moïse eut peur, et dit: Certainement la chose est connue. '
  '15':
  - type: text
    content: 'Pharaon apprit ce qui s’était passé, et il cherchait à faire mourir Moïse. '
  - type: note
    content: Ac 7:29.
  - type: text
    content: 'Mais Moïse s’enfuit de devant Pharaon, et il se retira dans le pays de Madian, où il s’arrêta près d’un puits. '
  '16':
  - type: text
    content: 'Le sacrificateur de Madian avait sept filles. Elles vinrent puiser de l’eau, et elles remplirent les auges pour abreuver le troupeau de leur père. '
  '17':
  - type: text
    content: 'Les bergers arrivèrent, et les chassèrent. Alors Moïse se leva, prit leur défense, et fit boire leur troupeau. '
  '18':
  - type: text
    content: 'Quand elles furent de retour auprès de Réuel, leur père, il dit: Pourquoi revenez-vous si tôt aujourd’hui? '
  '19':
  - type: text
    content: 'Elles répondirent: Un Égyptien nous a délivrées de la main des bergers, et même il nous a puisé de l’eau, et a fait boire le troupeau. '
  '2':
  - type: note
    content: 1 Ch 23:13. Ac 7:20.
  - type: text
    content: 'Cette femme devint enceinte et enfanta un fils. Elle vit '
  - type: note
    content: Hé 11:23.
  - type: text
    content: 'qu’il était beau, et elle le cacha pendant trois mois. '
  '20':
  - type: text
    content: 'Et il dit à ses filles: Où est-il? Pourquoi avez-vous laissé cet homme? Appelez-le, pour qu’il prenne quelque nourriture. '
  '21':
  - type: text
    content: 'Moïse se décida à demeurer chez cet homme, qui lui donna pour femme Séphora, sa fille. '
  '22':
  - type: note
    content: Ex 18:2, 3.
  - type: text
    content: Elle enfanta un fils, qu’il appela du nom de Guerschom, car, dit-il, j’habite un pays étranger.
  - type: heading
    content: 'V. 23-25: cf. Ac 7:29, 30. Ex 3:1-10.'
  '23':
  - type: text
    content: 'Longtemps après, le roi d’Égypte mourut, et les enfants d’Israël gémissaient encore sous la servitude, et poussaient des cris. Ces cris, que leur arrachait la servitude, montèrent jusqu’à Dieu. '
  '24':
  - type: text
    content: 'Dieu entendit leurs gémissements, et '
  - type: note
    content: Ge 15:14.
  - type: text
    content: 'se souvint de son alliance avec Abraham, Isaac et Jacob. '
  '25':
  - type: text
    content: Dieu regarda les enfants d’Israël, et il en eut compassion.
  '3':
  - type: text
    content: 'Ne pouvant plus le cacher, elle prit une caisse de jonc, qu’elle enduisit de bitume et de poix; elle y mit l’enfant, et le déposa parmi les roseaux, sur le bord du fleuve. '
  '4':
  - type: text
    content: 'La sœur de l’enfant se tint à quelque distance, pour savoir ce qui lui arriverait. '
  '5':
  - type: text
    content: 'La fille de Pharaon descendit au fleuve pour se baigner, et ses compagnes se promenèrent le long du fleuve. '
  - type: note
    content: Ac 7:21. Hé 11:23.
  - type: text
    content: 'Elle aperçut la caisse au milieu des roseaux, et elle envoya sa servante pour la prendre. '
  '6':
  - type: text
    content: 'Elle l’ouvrit, et vit l’enfant: c’était un petit garçon qui pleurait. Elle en eut pitié, et elle dit: C’est un enfant des Hébreux! '
  '7':
  - type: text
    content: 'Alors la sœur de l’enfant dit à la fille de Pharaon: Veux-tu que j’aille te chercher une nourrice parmi les femmes des Hébreux, pour allaiter cet enfant? '
  '8':
  - type: text
    content: 'Va, lui répondit la fille de Pharaon. Et la jeune fille alla chercher la mère de l’enfant. '
  '9':
  - type: text
    content: 'La fille de Pharaon lui dit: Emporte cet enfant, et allaite-le-moi; je te donnerai ton salaire. La femme prit l’enfant, et l’allaita. '
