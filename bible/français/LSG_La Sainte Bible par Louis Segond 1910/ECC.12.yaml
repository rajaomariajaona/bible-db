document_id: ECC.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-10: cf. Ec 5:17-19. Ps 119:9; 90:1, etc. 1 Jn 2:15-17.'
  - type: text
    content: 'Jeune homme, réjouis-toi dans ta jeunesse, livre ton cœur à la joie pendant les jours de ta jeunesse, marche dans les voies de ton cœur et selon les regards de tes yeux; mais sache que pour tout cela Dieu t’appellera en jugement. '
  '10':
  - type: note
    content: Ps 62:10; 144:4. Ec 1:2.
  - type: text
    content: Vanité des vanités, dit l’Ecclésiaste, tout est vanité.
  - type: heading
    content: 'V. 11-16: cf. Pr 1:1-7. (De 10:12, 13. Job 28:28. Mi 6:8. Ap 20:11-15.)'
  '11':
  - type: text
    content: 'Outre que l’Ecclésiaste fut un sage, il a encore enseigné la science au peuple, et il a examiné, sondé, mis en ordre un grand nombre '
  - type: note
    content: 1 R 4:32.
  - type: text
    content: 'de sentences. '
  '12':
  - type: text
    content: 'L’Ecclésiaste s’est efforcé de trouver des paroles agréables; et ce qui a été écrit avec droiture, ce sont des paroles de vérité. '
  '13':
  - type: text
    content: 'Les paroles des sages sont comme des aiguillons; et, rassemblées en un recueil, elles sont comme des clous plantés, données par un seul maître. '
  '14':
  - type: text
    content: 'Du reste, mon fils, tire instruction de ces choses; on ne finirait pas, si l’on voulait faire un grand nombre de livres, et beaucoup d’étude est une fatigue pour le corps. '
  '15':
  - type: text
    content: 'Écoutons la fin du discours: '
  - type: note
    content: De 6:2; 10:12. Pr 3:7.
  - type: text
    content: 'Crains Dieu et observe ses commandements. C’est là ce que doit faire tout homme. '
  '16':
  - type: note
    content: 1 Co 4:5. 2 Co 5:10.
  - type: text
    content: Car Dieu amènera toute œuvre en jugement, au sujet de tout ce qui est caché, soit bien, soit mal.
  '2':
  - type: text
    content: 'Bannis de ton cœur le chagrin, et éloigne le mal de ton corps; car la jeunesse et l’aurore sont vanité. '
  '3':
  - type: text
    content: 'Mais souviens-toi de ton créateur pendant les jours de ta jeunesse, avant que les jours mauvais arrivent et que les années s’approchent où tu diras: Je n’y prends point de plaisir; '
  '4':
  - type: text
    content: 'avant que s’obscurcissent le soleil et la lumière, la lune et les étoiles, et que les nuages reviennent après la pluie, '
  '5':
  - type: text
    content: 'temps où les gardiens de la maison tremblent, où les hommes forts se courbent, où celles qui moulent s’arrêtent parce qu’elles sont diminuées, où ceux qui regardent par les fenêtres sont obscurcis, '
  '6':
  - type: text
    content: 'où les deux battants de la porte se ferment sur la rue quand s’abaisse le bruit de la meule, où l’on se lève au chant de l’oiseau, où s’affaiblissent toutes les filles du chant, '
  '7':
  - type: text
    content: 'où l’on redoute ce qui est élevé, où l’on a des terreurs en chemin, où l’amandier fleurit, où la sauterelle devient pesante, et où la câpre n’a plus d’effet, car l’homme s’en va vers sa demeure éternelle, et les pleureurs parcourent les rues; '
  '8':
  - type: text
    content: 'avant que le cordon d’argent se détache, que le vase d’or se brise, que le seau se rompe sur la source, et que la roue se casse sur la citerne; '
  '9':
  - type: note
    content: Ge 3:19.
  - type: text
    content: 'avant que la poussière retourne à la terre, comme elle y était, et que l’esprit retourne à Dieu '
  - type: note
    content: Ge 2:7. No 16:22.
  - type: text
    content: 'qui l’a donné. '
