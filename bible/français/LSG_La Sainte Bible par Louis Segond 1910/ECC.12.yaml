document_id: ECC.12
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. Ec 5:17-19. Ps 119:9; 90:1, etc. 1 Jn 2:15-17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jeune homme, réjouis-toi dans ta jeunesse, livre ton cœur à la joie pendant les jours de ta jeunesse, marche dans les voies de ton cœur et selon les regards de tes yeux; mais sache que pour tout cela Dieu t’appellera en jugement. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Bannis de ton cœur le chagrin, et éloigne le mal de ton corps; car la jeunesse et l’aurore sont vanité. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais souviens-toi de ton créateur pendant les jours de ta jeunesse, avant que les jours mauvais arrivent et que les années s’approchent où tu diras: Je n’y prends point de plaisir; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'avant que s’obscurcissent le soleil et la lumière, la lune et les étoiles, et que les nuages reviennent après la pluie, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'temps où les gardiens de la maison tremblent, où les hommes forts se courbent, où celles qui moulent s’arrêtent parce qu’elles sont diminuées, où ceux qui regardent par les fenêtres sont obscurcis, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'où les deux battants de la porte se ferment sur la rue quand s’abaisse le bruit de la meule, où l’on se lève au chant de l’oiseau, où s’affaiblissent toutes les filles du chant, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'où l’on redoute ce qui est élevé, où l’on a des terreurs en chemin, où l’amandier fleurit, où la sauterelle devient pesante, et où la câpre n’a plus d’effet, car l’homme s’en va vers sa demeure éternelle, et les pleureurs parcourent les rues; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'avant que le cordon d’argent se détache, que le vase d’or se brise, que le seau se rompe sur la source, et que la roue se casse sur la citerne; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 3:19
      metadata:
        usfm: GEN.3.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'avant que la poussière retourne à la terre, comme elle y était, et que l’esprit retourne à Dieu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 2:7
      metadata:
        usfm: GEN.2.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 16:22
      metadata:
        usfm: NUM.16.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui l’a donné. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 62:10
      metadata:
        usfm: PSA.62.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 144:4
      metadata:
        usfm: PSA.144.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 1:2
      metadata:
        usfm: ECC.1.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Vanité des vanités, dit l’Ecclésiaste, tout est vanité.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-16: cf. Pr 1:1-7. (De 10:12, 13. Job 28:28. Mi 6:8. Ap 20:11-15.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Outre que l’Ecclésiaste fut un sage, il a encore enseigné la science au peuple, et il a examiné, sondé, mis en ordre un grand nombre '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 4:32
      metadata:
        usfm: 1KI.4.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de sentences. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’Ecclésiaste s’est efforcé de trouver des paroles agréables; et ce qui a été écrit avec droiture, ce sont des paroles de vérité. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les paroles des sages sont comme des aiguillons; et, rassemblées en un recueil, elles sont comme des clous plantés, données par un seul maître. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Du reste, mon fils, tire instruction de ces choses; on ne finirait pas, si l’on voulait faire un grand nombre de livres, et beaucoup d’étude est une fatigue pour le corps. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Écoutons la fin du discours: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 6:2
      metadata:
        usfm: DEU.6.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:12
      metadata:
        usfm: DEU.10.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 3:7
      metadata:
        usfm: PRO.3.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Crains Dieu et observe ses commandements. C’est là ce que doit faire tout homme. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 4:5
      metadata:
        usfm: 1CO.4.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:10
      metadata:
        usfm: 2CO.5.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car Dieu amènera toute œuvre en jugement, au sujet de tout ce qui est caché, soit bien, soit mal.
