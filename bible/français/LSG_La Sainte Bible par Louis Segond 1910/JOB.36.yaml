document_id: JOB.36,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-21: cf. (Ps 145:17-20; 146:5-9.) És 1:18-20.'
  - type: text
    content: 'Élihu continua et dit:'
  '10':
  - type: text
    content: Il les avertit pour leur instruction,
  - type: text
    content: Il les exhorte à se détourner de l’iniquité.
  '11':
  - type: text
    content: S’ils écoutent et se soumettent,
  - type: text
    content: Ils achèvent leurs jours dans le bonheur,
  - type: text
    content: Leurs années dans la joie.
  '12':
  - type: text
    content: S’ils n’écoutent pas, ils périssent par le glaive,
  - type: text
    content: Ils expirent dans leur aveuglement.
  '13':
  - type: text
    content: Les impies se livrent à la colère,
  - type: text
    content: Ils ne crient pas à Dieu quand il les enchaîne;
  '14':
  - type: text
    content: ' '
  - type: note
    content: Job 22:16.
  - type: text
    content: Ils perdent la vie dans leur jeunesse,
  - type: text
    content: Ils meurent comme les débauchés.
  '15':
  - type: text
    content: Mais Dieu sauve le malheureux dans sa misère,
  - type: text
    content: Et c’est par la souffrance qu’il l’avertit.
  '16':
  - type: text
    content: Il te retirera aussi de la détresse,
  - type: text
    content: Pour te mettre au large, en pleine liberté,
  - type: note
    content: Ps 23:5.
  - type: text
    content: Et ta table sera chargée de mets succulents.
  '17':
  - type: text
    content: Mais si tu défends ta cause comme un impie,
  - type: text
    content: Le châtiment est inséparable de ta cause.
  '18':
  - type: text
    content: Que l’irritation ne t’entraîne pas à la moquerie,
  - type: text
    content: Et que la grandeur de la rançon ne te fasse pas dévier!
  '19':
  - type: text
    content: Tes cris suffiraient-ils pour te sortir d’angoisse,
  - type: text
    content: Et même toutes les forces que tu pourrais déployer?
  '2':
  - type: text
    content: Attends un peu, et je vais poursuivre,
  - type: text
    content: Car j’ai des paroles encore pour la cause de Dieu.
  '20':
  - type: text
    content: Ne soupire pas après la nuit,
  - type: text
    content: Qui enlève les peuples de leur place.
  '21':
  - type: text
    content: Garde-toi de te livrer au mal,
  - type: text
    content: Car la souffrance t’y dispose.
  - type: heading
    content: '36 v. 22 à 37 v. 13: cf. (Job 37:11-16; 38:22-38.) (Ps 29; 65:9, etc.)'
  '22':
  - type: text
    content: Dieu est grand par sa puissance;
  - type: text
    content: Qui saurait enseigner comme lui?
  '23':
  - type: text
    content: ' '
  - type: note
    content: Job 34:13.
  - type: text
    content: Qui lui prescrit ses voies?
  - type: text
    content: 'Qui ose dire: '
  - type: note
    content: De 32:4. 2 Ch 19:7. Job 8:3; 34:10. Ro 9:14.
  - type: text
    content: Tu fais mal?
  '24':
  - type: text
    content: Souviens-toi d’exalter ses œuvres,
  - type: text
    content: Que célèbrent tous les hommes.
  '25':
  - type: text
    content: Tout homme les contemple,
  - type: text
    content: Chacun les voit de loin.
  '26':
  - type: text
    content: Dieu est grand, mais sa grandeur nous échappe,
  - type: note
    content: Ps 90:2; 92:9; 93:2; 102:13. És 63:16. La 5:19. Da 6:27. Hé 1:12.
  - type: text
    content: Le nombre de ses années est impénétrable.
  '27':
  - type: text
    content: Il attire à lui les gouttes d’eau,
  - type: text
    content: Il les réduit en vapeur et forme la pluie;
  '28':
  - type: text
    content: Les nuages la laissent couler,
  - type: text
    content: Ils la répandent sur la foule des hommes.
  '29':
  - type: text
    content: Et qui comprendra le déchirement de la nuée,
  - type: text
    content: Le fracas de sa tente?
  '3':
  - type: text
    content: Je prendrai mes raisons de haut,
  - type: text
    content: Et je prouverai la justice de mon créateur.
  '30':
  - type: text
    content: Voici, il étend autour de lui sa lumière,
  - type: text
    content: Et il se cache jusque dans les profondeurs de la mer.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Job 37:13.
  - type: text
    content: Par ces moyens il juge les peuples,
  - type: text
    content: Et il donne la nourriture avec abondance.
  '32':
  - type: text
    content: Il prend la lumière dans sa main,
  - type: text
    content: Il la dirige sur ses adversaires.
  '33':
  - type: text
    content: Il s’annonce par un grondement;
  - type: text
    content: Les troupeaux pressentent son approche.
  '4':
  - type: text
    content: Sois-en sûr, mes discours ne sont pas des mensonges,
  - type: text
    content: Mes sentiments devant toi sont sincères.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Job 9:4; 12:13, 16; 37:23; 38:23.
  - type: text
    content: Dieu est puissant, mais il ne rejette personne;
  - type: text
    content: Il est puissant par la force de son intelligence.
  '6':
  - type: text
    content: Il ne laisse pas vivre le méchant,
  - type: text
    content: Et il fait droit aux malheureux.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps 33:18; 34:16.
  - type: text
    content: Il ne détourne pas les yeux de dessus les justes,
  - type: text
    content: Il les place sur le trône avec les rois,
  - type: note
    content: Ps 113:8.
  - type: text
    content: Il les y fait asseoir pour toujours, afin qu’ils soient élevés.
  '8':
  - type: text
    content: Viennent-ils à tomber dans les chaînes,
  - type: text
    content: Sont-ils pris dans les liens de l’adversité,
  '9':
  - type: text
    content: Il leur dénonce leurs œuvres,
  - type: text
    content: Leurs transgressions, leur orgueil;
