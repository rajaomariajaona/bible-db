document_id: JOB.36
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-21: cf. (Ps 145:17-20; 146:5-9.) És 1:18-20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Élihu continua et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Attends un peu, et je vais poursuivre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car j’ai des paroles encore pour la cause de Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je prendrai mes raisons de haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je prouverai la justice de mon créateur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sois-en sûr, mes discours ne sont pas des mensonges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes sentiments devant toi sont sincères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 9:4
      metadata:
        usfm: JOB.9.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:13
      metadata:
        usfm: JOB.12.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: JOB.12.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 37:23
      metadata:
        usfm: JOB.37.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 38:23
      metadata:
        usfm: JOB.38.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Dieu est puissant, mais il ne rejette personne;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est puissant par la force de son intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il ne laisse pas vivre le méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il fait droit aux malheureux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 33:18
      metadata:
        usfm: PSA.33.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:16
      metadata:
        usfm: PSA.34.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il ne détourne pas les yeux de dessus les justes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les place sur le trône avec les rois,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 113:8
      metadata:
        usfm: PSA.113.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il les y fait asseoir pour toujours, afin qu’ils soient élevés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Viennent-ils à tomber dans les chaînes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sont-ils pris dans les liens de l’adversité,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il leur dénonce leurs œuvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs transgressions, leur orgueil;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il les avertit pour leur instruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les exhorte à se détourner de l’iniquité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: S’ils écoutent et se soumettent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils achèvent leurs jours dans le bonheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs années dans la joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: S’ils n’écoutent pas, ils périssent par le glaive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils expirent dans leur aveuglement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les impies se livrent à la colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne crient pas à Dieu quand il les enchaîne;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 22:16
      metadata:
        usfm: JOB.22.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils perdent la vie dans leur jeunesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils meurent comme les débauchés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais Dieu sauve le malheureux dans sa misère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et c’est par la souffrance qu’il l’avertit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il te retirera aussi de la détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour te mettre au large, en pleine liberté,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 23:5
      metadata:
        usfm: PSA.23.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et ta table sera chargée de mets succulents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mais si tu défends ta cause comme un impie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le châtiment est inséparable de ta cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Que l’irritation ne t’entraîne pas à la moquerie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que la grandeur de la rançon ne te fasse pas dévier!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tes cris suffiraient-ils pour te sortir d’angoisse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et même toutes les forces que tu pourrais déployer?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ne soupire pas après la nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui enlève les peuples de leur place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Garde-toi de te livrer au mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car la souffrance t’y dispose.
- type: usfm
  marker: r
  children:
  - type: text
    text: '36 v. 22 à 37 v. 13: cf. (Job 37:11-16; 38:22-38.) (Ps 29; 65:9, etc.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dieu est grand par sa puissance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui saurait enseigner comme lui?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 34:13
      metadata:
        usfm: JOB.34.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qui lui prescrit ses voies?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Qui ose dire: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:4
      metadata:
        usfm: DEU.32.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 19:7
      metadata:
        usfm: 2CH.19.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 8:3
      metadata:
        usfm: JOB.8.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:10
      metadata:
        usfm: JOB.34.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:14
      metadata:
        usfm: ROM.9.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tu fais mal?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Souviens-toi d’exalter ses œuvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que célèbrent tous les hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tout homme les contemple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacun les voit de loin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dieu est grand, mais sa grandeur nous échappe,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 90:2
      metadata:
        usfm: PSA.90.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 92:9
      metadata:
        usfm: PSA.92.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 93:2
      metadata:
        usfm: PSA.93.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 102:13
      metadata:
        usfm: PSA.102.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 63:16
      metadata:
        usfm: ISA.63.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 5:19
      metadata:
        usfm: LAM.5.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 6:27
      metadata:
        usfm: DAN.6.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 1:12
      metadata:
        usfm: HEB.1.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le nombre de ses années est impénétrable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il attire à lui les gouttes d’eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les réduit en vapeur et forme la pluie;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Les nuages la laissent couler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils la répandent sur la foule des hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Et qui comprendra le déchirement de la nuée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le fracas de sa tente?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Voici, il étend autour de lui sa lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il se cache jusque dans les profondeurs de la mer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 37:13
      metadata:
        usfm: JOB.37.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Par ces moyens il juge les peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il donne la nourriture avec abondance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Il prend la lumière dans sa main,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il la dirige sur ses adversaires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il s’annonce par un grondement;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les troupeaux pressentent son approche.
