document_id: JOB.36,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-21: cf. (Ps 145:17-20; 146:5-9.) És 1:18-20.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Élihu continua et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les avertit pour leur instruction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les exhorte à se détourner de l’iniquité.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’ils écoutent et se soumettent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils achèvent leurs jours dans le bonheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs années dans la joie.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’ils n’écoutent pas, ils périssent par le glaive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils expirent dans leur aveuglement.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les impies se livrent à la colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne crient pas à Dieu quand il les enchaîne;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 22:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils perdent la vie dans leur jeunesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils meurent comme les débauchés.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais Dieu sauve le malheureux dans sa misère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et c’est par la souffrance qu’il l’avertit.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il te retirera aussi de la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour te mettre au large, en pleine liberté,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 23:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et ta table sera chargée de mets succulents.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais si tu défends ta cause comme un impie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le châtiment est inséparable de ta cause.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l’irritation ne t’entraîne pas à la moquerie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que la grandeur de la rançon ne te fasse pas dévier!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes cris suffiraient-ils pour te sortir d’angoisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et même toutes les forces que tu pourrais déployer?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Attends un peu, et je vais poursuivre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car j’ai des paroles encore pour la cause de Dieu.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne soupire pas après la nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui enlève les peuples de leur place.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Garde-toi de te livrer au mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la souffrance t’y dispose.
  - type: usfm
    marker: r
    children:
    - type: text
      text: '36 v. 22 à 37 v. 13: cf. (Job 37:11-16; 38:22-38.) (Ps 29; 65:9, etc.)'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu est grand par sa puissance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui saurait enseigner comme lui?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 34:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui lui prescrit ses voies?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qui ose dire: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 19:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 8:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tu fais mal?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Souviens-toi d’exalter ses œuvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que célèbrent tous les hommes.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout homme les contemple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chacun les voit de loin.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu est grand, mais sa grandeur nous échappe,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 90:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 92:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 93:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 102:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 63:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: La 5:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Da 6:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 1:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le nombre de ses années est impénétrable.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il attire à lui les gouttes d’eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les réduit en vapeur et forme la pluie;
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les nuages la laissent couler,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils la répandent sur la foule des hommes.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui comprendra le déchirement de la nuée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le fracas de sa tente?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je prendrai mes raisons de haut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je prouverai la justice de mon créateur.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, il étend autour de lui sa lumière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il se cache jusque dans les profondeurs de la mer.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 37:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Par ces moyens il juge les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il donne la nourriture avec abondance.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il prend la lumière dans sa main,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il la dirige sur ses adversaires.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’annonce par un grondement;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les troupeaux pressentent son approche.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois-en sûr, mes discours ne sont pas des mensonges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes sentiments devant toi sont sincères.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 9:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 37:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 38:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Dieu est puissant, mais il ne rejette personne;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est puissant par la force de son intelligence.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne laisse pas vivre le méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il fait droit aux malheureux.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 33:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il ne détourne pas les yeux de dessus les justes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les place sur le trône avec les rois,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 113:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il les y fait asseoir pour toujours, afin qu’ils soient élevés.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Viennent-ils à tomber dans les chaînes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sont-ils pris dans les liens de l’adversité,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il leur dénonce leurs œuvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs transgressions, leur orgueil;
