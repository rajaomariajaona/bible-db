    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’orgueil d’un homme l’abaisse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui est humble d’esprit obtient la gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Celui qui partage avec un voleur est ennemi de son âme;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 5:1
      metadata:
        usfm: LEV.5.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il entend la malédiction, et il ne déclare rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: La crainte des hommes tend un piège,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui se confie en l’Éternel est protégé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 19:6
      metadata:
        usfm: PRO.19.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Beaucoup de gens recherchent la faveur de celui qui domine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais c’est l’Éternel qui fait droit à chacun.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: L’homme inique est en abomination aux justes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celui dont la voie est droite est en abomination aux méchants.
