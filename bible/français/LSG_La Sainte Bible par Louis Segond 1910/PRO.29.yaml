      metadata:
        usfm: PRO.13.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:15
      metadata:
        usfm: PRO.22.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:13
      metadata:
        usfm: PRO.23.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La verge et la correction donnent la sagesse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:1
      metadata:
