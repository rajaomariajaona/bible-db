    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '28'
      metadata:
        usfm: PRO.28.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Quand les justes se multiplient, le peuple est dans la joie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand le méchant domine, le peuple gémit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:1
      metadata:
        usfm: PRO.10.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:20
      metadata:
        usfm: PRO.15.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Un homme qui aime la sagesse réjouit son père,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 28:7
      metadata:
        usfm: PRO.28.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 15:13
      metadata:
        usfm: LUK.15.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais celui qui fréquente des prostituées dissipe son bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Un roi affermit le pays par la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui reçoit des présents le ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Un homme qui flatte son prochain
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tend un filet sous ses pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il y a un piège dans le péché de l’homme méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais le juste triomphe et se réjouit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 29:16
      metadata:
        usfm: JOB.29.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le juste connaît la cause des pauvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais le méchant ne comprend pas la science.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les moqueurs soufflent le feu dans la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais les sages calment la colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Si un homme sage conteste avec un insensé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il aura beau se fâcher ou rire, la paix n’aura pas lieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les hommes de sang haïssent l’homme intègre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais les hommes droits protègent sa vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 14:33
      metadata:
        usfm: PRO.14.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’insensé met en dehors toute sa passion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais le sage la contient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Quand celui qui domine a égard aux paroles mensongères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ses serviteurs sont des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 22:2
      metadata:
        usfm: PRO.22.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le pauvre et l’oppresseur se rencontrent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est l’Éternel qui éclaire les yeux de l’un et de l’autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 20:28
      metadata:
        usfm: PRO.20.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:5
      metadata:
        usfm: PRO.25.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Un roi qui juge fidèlement les pauvres
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aura son trône affermi pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
