document_id: PRO.29,93
type_code: fra
verses:
  '1':
  - type: text
    content: Un homme qui mérite d’être repris, et qui raidit le cou,
  - type: text
    content: Sera brisé subitement et sans remède.
  '10':
  - type: text
    content: Les hommes de sang haïssent l’homme intègre,
  - type: text
    content: Mais les hommes droits protègent sa vie.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Pr 14:33.
  - type: text
    content: L’insensé met en dehors toute sa passion,
  - type: text
    content: Mais le sage la contient.
  '12':
  - type: text
    content: Quand celui qui domine a égard aux paroles mensongères,
  - type: text
    content: Tous ses serviteurs sont des méchants.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Pr 22:2.
  - type: text
    content: Le pauvre et l’oppresseur se rencontrent;
  - type: text
    content: C’est l’Éternel qui éclaire les yeux de l’un et de l’autre.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Pr 20:28; 25:5.
  - type: text
    content: Un roi qui juge fidèlement les pauvres
  - type: text
    content: Aura son trône affermi pour toujours.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Pr 13:24; 22:15; 23:13.
  - type: text
    content: La verge et la correction donnent la sagesse,
  - type: note
    content: Pr 10:1; 17:21, 25.
  - type: text
    content: Mais l’enfant livré à lui-même fait honte à sa mère.
  '16':
  - type: text
    content: Quand les méchants se multiplient, le péché s’accroît;
  - type: note
    content: Ps 37:36; 58:11; 91:8.
  - type: text
    content: Mais les justes contempleront leur chute.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Pr 13:24; 22:15; 23:13, 14.
  - type: text
    content: Châtie ton fils, et il te donnera du repos,
  - type: text
    content: Et il procurera des délices à ton âme.
  '18':
  - type: text
    content: Quand il n’y a pas de révélation, le peuple est sans frein;
  - type: text
    content: Heureux s’il observe la loi!
  '19':
  - type: text
    content: Ce n’est pas par des paroles qu’on châtie un esclave;
  - type: text
    content: Même s’il comprend, il n’obéit pas.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Pr 11:10; 28:12, 28.
  - type: text
    content: Quand les justes se multiplient, le peuple est dans la joie;
  - type: text
    content: Quand le méchant domine, le peuple gémit.
  '20':
  - type: text
    content: Si tu vois un homme irréfléchi dans ses paroles,
  - type: note
    content: Pr 26:12.
  - type: text
    content: Il y a plus à espérer d’un insensé que de lui.
  '21':
  - type: text
    content: Le serviteur qu’on traite mollement dès l’enfance
  - type: text
    content: Finit par se croire un fils.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Pr 15:18; 16:21.
  - type: text
    content: Un homme colère excite des querelles,
  - type: text
    content: Et un furieux commet beaucoup de péchés.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Job 22:29. Pr 15:33; 18:12. És 66:2. Mt 23:12. Lu 14:11; 18:14. Ja 4:6, 10. 1 Pi 5:5.
  - type: text
    content: L’orgueil d’un homme l’abaisse,
  - type: text
    content: Mais celui qui est humble d’esprit obtient la gloire.
  '24':
  - type: text
    content: Celui qui partage avec un voleur est ennemi de son âme;
  - type: note
    content: Lé 5:1.
  - type: text
    content: Il entend la malédiction, et il ne déclare rien.
  '25':
  - type: text
    content: La crainte des hommes tend un piège,
  - type: text
    content: Mais celui qui se confie en l’Éternel est protégé.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Pr 19:6.
  - type: text
    content: Beaucoup de gens recherchent la faveur de celui qui domine,
  - type: text
    content: Mais c’est l’Éternel qui fait droit à chacun.
  '27':
  - type: text
    content: L’homme inique est en abomination aux justes,
  - type: text
    content: Et celui dont la voie est droite est en abomination aux méchants.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Pr 10:1; 15:20.
  - type: text
    content: Un homme qui aime la sagesse réjouit son père,
  - type: note
    content: Pr 28:7. Lu 15:13.
  - type: text
    content: Mais celui qui fréquente des prostituées dissipe son bien.
  '4':
  - type: text
    content: Un roi affermit le pays par la justice,
  - type: text
    content: Mais celui qui reçoit des présents le ruine.
  '5':
  - type: text
    content: Un homme qui flatte son prochain
  - type: text
    content: Tend un filet sous ses pas.
  '6':
  - type: text
    content: Il y a un piège dans le péché de l’homme méchant,
  - type: text
    content: Mais le juste triomphe et se réjouit.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Job 29:16.
  - type: text
    content: Le juste connaît la cause des pauvres,
  - type: text
    content: Mais le méchant ne comprend pas la science.
  '8':
  - type: text
    content: Les moqueurs soufflent le feu dans la ville,
  - type: text
    content: Mais les sages calment la colère.
  '9':
  - type: text
    content: Si un homme sage conteste avec un insensé,
  - type: text
    content: Il aura beau se fâcher ou rire, la paix n’aura pas lieu.
