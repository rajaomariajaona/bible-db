    children:
    - type: text
      text: '1'
  - type: text
    text: Un homme qui mérite d’être repris, et qui raidit le cou,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sera brisé subitement et sans remède.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
