    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: PRO.17.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais l’enfant livré à lui-même fait honte à sa mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Quand les méchants se multiplient, le péché s’accroît;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 37:36
      metadata:
        usfm: PSA.37.36
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 58:11
      metadata:
        usfm: PSA.58.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 91:8
      metadata:
        usfm: PSA.91.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais les justes contempleront leur chute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 13:24
      metadata:
        usfm: PRO.13.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:15
      metadata:
        usfm: PRO.22.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:13
      metadata:
        usfm: PRO.23.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: PRO.23.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Châtie ton fils, et il te donnera du repos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il procurera des délices à ton âme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Quand il n’y a pas de révélation, le peuple est sans frein;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heureux s’il observe la loi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ce n’est pas par des paroles qu’on châtie un esclave;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même s’il comprend, il n’obéit pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Si tu vois un homme irréfléchi dans ses paroles,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 26:12
      metadata:
        usfm: PRO.26.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il y a plus à espérer d’un insensé que de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le serviteur qu’on traite mollement dès l’enfance
- type: usfm
  marker: q1
  children:
  - type: text
    text: Finit par se croire un fils.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 15:18
      metadata:
        usfm: PRO.15.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:21
      metadata:
        usfm: PRO.16.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Un homme colère excite des querelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et un furieux commet beaucoup de péchés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
