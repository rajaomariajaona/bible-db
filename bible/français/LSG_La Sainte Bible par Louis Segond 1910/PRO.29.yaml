document_id: PRO.29,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Un homme qui mérite d’être repris, et qui raidit le cou,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sera brisé subitement et sans remède.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Les hommes de sang haïssent l’homme intègre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les hommes droits protègent sa vie.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 14:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’insensé met en dehors toute sa passion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le sage la contient.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Quand celui qui domine a égard aux paroles mensongères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ses serviteurs sont des méchants.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 22:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le pauvre et l’oppresseur se rencontrent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est l’Éternel qui éclaire les yeux de l’un et de l’autre.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 20:28
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Un roi qui juge fidèlement les pauvres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aura son trône affermi pour toujours.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 13:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La verge et la correction donnent la sagesse,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 10:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:21
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais l’enfant livré à lui-même fait honte à sa mère.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Quand les méchants se multiplient, le péché s’accroît;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 37:36
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 58:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 91:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais les justes contempleront leur chute.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 13:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Châtie ton fils, et il te donnera du repos,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il procurera des délices à ton âme.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Quand il n’y a pas de révélation, le peuple est sans frein;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux s’il observe la loi!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ce n’est pas par des paroles qu’on châtie un esclave;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même s’il comprend, il n’obéit pas.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 11:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '28'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Quand les justes se multiplient, le peuple est dans la joie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand le méchant domine, le peuple gémit.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Si tu vois un homme irréfléchi dans ses paroles,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 26:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il y a plus à espérer d’un insensé que de lui.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Le serviteur qu’on traite mollement dès l’enfance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Finit par se croire un fils.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 15:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Un homme colère excite des querelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un furieux commet beaucoup de péchés.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 22:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 15:33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 66:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 23:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 14:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 4:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 5:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’orgueil d’un homme l’abaisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui est humble d’esprit obtient la gloire.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Celui qui partage avec un voleur est ennemi de son âme;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 5:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il entend la malédiction, et il ne déclare rien.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: La crainte des hommes tend un piège,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui se confie en l’Éternel est protégé.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 19:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Beaucoup de gens recherchent la faveur de celui qui domine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais c’est l’Éternel qui fait droit à chacun.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: L’homme inique est en abomination aux justes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celui dont la voie est droite est en abomination aux méchants.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 10:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Un homme qui aime la sagesse réjouit son père,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 28:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 15:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais celui qui fréquente des prostituées dissipe son bien.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Un roi affermit le pays par la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui reçoit des présents le ruine.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Un homme qui flatte son prochain
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tend un filet sous ses pas.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Il y a un piège dans le péché de l’homme méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le juste triomphe et se réjouit.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 29:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le juste connaît la cause des pauvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le méchant ne comprend pas la science.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Les moqueurs soufflent le feu dans la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les sages calment la colère.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Si un homme sage conteste avec un insensé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il aura beau se fâcher ou rire, la paix n’aura pas lieu.
