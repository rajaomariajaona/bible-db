document_id: JOB.24,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-25: cf. (Ec 4:1; 8:11-14.) (Jé 12:1-3. Ps 37; 73.)'
  - type: text
    content: Pourquoi le Tout-Puissant ne met-il pas des temps en réserve,
  - type: text
    content: Et pourquoi ceux qui le connaissent ne voient-ils pas ses jours?
  '10':
  - type: text
    content: ' '
  - type: note
    content: Lé 19:13.
  - type: text
    content: Ils vont tout nus, sans vêtement,
  - type: text
    content: Ils sont affamés, et ils portent les gerbes;
  '11':
  - type: text
    content: Dans les enclos de l’impie ils font de l’huile,
  - type: text
    content: 'Ils foulent le pressoir, et ils ont '
  - type: note
    content: De 25:4. Ja 5:4.
  - type: text
    content: soif;
  '12':
  - type: text
    content: Dans les villes s’exhalent les soupirs des mourants,
  - type: text
    content: L’âme des blessés jette des cris…
  - type: text
    content: Et Dieu ne prend pas garde à ces infamies!
  '13':
  - type: text
    content: D’autres sont ennemis de la lumière,
  - type: text
    content: Ils n’en connaissent pas les voies,
  - type: text
    content: Ils n’en pratiquent pas les sentiers.
  '14':
  - type: text
    content: L’assassin se lève au point du jour,
  - type: note
    content: Ps 10:8, 9.
  - type: text
    content: Tue le pauvre et l’indigent,
  - type: text
    content: Et il dérobe pendant la nuit.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Pr 7:8, 9.
  - type: text
    content: L’œil de l’adultère épie le crépuscule;
  - type: note
    content: Ps 10:11.
  - type: text
    content: Personne ne me verra, dit-il,
  - type: text
    content: Et il met un voile sur sa figure.
  '16':
  - type: text
    content: La nuit ils forcent les maisons,
  - type: text
    content: Le jour ils se tiennent enfermés;
  - type: note
    content: Job 38:15. Jn 3:20.
  - type: text
    content: Ils ne connaissent pas la lumière.
  '17':
  - type: text
    content: Pour eux, le matin c’est l’ombre de la mort, ils en éprouvent toutes les terreurs.
  '18':
  - type: text
    content: Eh quoi! L’impie est d’un poids léger sur la face des eaux,
  - type: text
    content: Il n’a sur la terre qu’une part maudite,
  - type: text
    content: Il ne prend jamais le chemin des vignes!
  '19':
  - type: text
    content: Comme la sécheresse et la chaleur absorbent les eaux de la neige,
  - type: text
    content: Ainsi le séjour des morts engloutit ceux qui pèchent!
  '2':
  - type: text
    content: ' '
  - type: note
    content: De 19:14; 27:17. Pr 22:28; 23:10.
  - type: text
    content: On déplace les bornes,
  - type: text
    content: On vole des troupeaux, et on les fait paître;
  '20':
  - type: text
    content: Quoi! Le sein maternel l’oublie,
  - type: text
    content: Les vers en font leurs délices,
  - type: text
    content: On ne se souvient plus de lui!
  - type: text
    content: L’impie est brisé comme un arbre,
  '21':
  - type: text
    content: Lui qui dépouille la femme stérile et sans enfants,
  - type: text
    content: Lui qui ne répand aucun bienfait sur la veuve!…
  '22':
  - type: text
    content: Non! Dieu par sa force prolonge les jours des violents,
  - type: text
    content: Et les voilà debout quand ils désespéraient de la vie;
  '23':
  - type: text
    content: Il leur donne de la sécurité et de la confiance,
  - type: text
    content: Il a les regards sur leurs voies.
  '24':
  - type: text
    content: Ils se sont élevés; et en un instant ils ne sont plus,
  - type: text
    content: Ils tombent, ils meurent comme tous les hommes,
  - type: text
    content: Ils sont coupés comme la tête des épis.
  '25':
  - type: text
    content: S’il n’en est pas ainsi, qui me démentira,
  - type: text
    content: Qui réduira mes paroles à néant?
  '3':
  - type: text
    content: On enlève l’âne de l’orphelin,
  - type: text
    content: On prend pour gage le bœuf de la veuve;
  '4':
  - type: text
    content: On repousse du chemin les indigents,
  - type: note
    content: Pr 28:28.
  - type: text
    content: On force tous les malheureux du pays à se cacher.
  '5':
  - type: text
    content: Et voici, comme les ânes sauvages du désert,
  - type: text
    content: Ils sortent le matin pour chercher de la nourriture,
  - type: text
    content: Ils n’ont que le désert pour trouver le pain de leurs enfants;
  '6':
  - type: text
    content: Ils coupent le fourrage qui reste dans les champs,
  - type: text
    content: Ils grappillent dans la vigne de l’impie;
  '7':
  - type: text
    content: Ils passent la nuit dans la nudité, sans vêtement,
  - type: text
    content: Sans couverture contre le froid;
  '8':
  - type: text
    content: Ils sont percés par la pluie des montagnes,
  - type: text
    content: Et ils embrassent les rochers comme unique refuge.
  '9':
  - type: text
    content: On arrache l’orphelin à la mamelle,
  - type: text
    content: On prend des gages sur le pauvre.
