document_id: JOB.24
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-25: cf. (Ec 4:1; 8:11-14.) (Jé 12:1-3. Ps 37; 73.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Pourquoi le Tout-Puissant ne met-il pas des temps en réserve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pourquoi ceux qui le connaissent ne voient-ils pas ses jours?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 19:14
      metadata:
        usfm: DEU.19.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:17
      metadata:
        usfm: DEU.27.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 22:28
      metadata:
        usfm: PRO.22.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:10
      metadata:
        usfm: PRO.23.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: On déplace les bornes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: On vole des troupeaux, et on les fait paître;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: On enlève l’âne de l’orphelin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: On prend pour gage le bœuf de la veuve;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: On repousse du chemin les indigents,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 28:28
      metadata:
        usfm: PRO.28.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: On force tous les malheureux du pays à se cacher.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Et voici, comme les ânes sauvages du désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sortent le matin pour chercher de la nourriture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’ont que le désert pour trouver le pain de leurs enfants;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils coupent le fourrage qui reste dans les champs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils grappillent dans la vigne de l’impie;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils passent la nuit dans la nudité, sans vêtement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans couverture contre le froid;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils sont percés par la pluie des montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils embrassent les rochers comme unique refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: On arrache l’orphelin à la mamelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: On prend des gages sur le pauvre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:13
      metadata:
        usfm: LEV.19.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils vont tout nus, sans vêtement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont affamés, et ils portent les gerbes;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dans les enclos de l’impie ils font de l’huile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils foulent le pressoir, et ils ont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 25:4
      metadata:
        usfm: DEU.25.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 5:4
      metadata:
        usfm: JAS.5.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: soif;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dans les villes s’exhalent les soupirs des mourants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’âme des blessés jette des cris…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et Dieu ne prend pas garde à ces infamies!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: D’autres sont ennemis de la lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’en connaissent pas les voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’en pratiquent pas les sentiers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L’assassin se lève au point du jour,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 10:8
      metadata:
        usfm: PSA.10.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: PSA.10.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tue le pauvre et l’indigent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il dérobe pendant la nuit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 7:8
      metadata:
        usfm: PRO.7.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: PRO.7.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’œil de l’adultère épie le crépuscule;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 10:11
      metadata:
        usfm: PSA.10.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Personne ne me verra, dit-il,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il met un voile sur sa figure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: La nuit ils forcent les maisons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le jour ils se tiennent enfermés;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 38:15
      metadata:
        usfm: JOB.38.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:20
      metadata:
        usfm: JHN.3.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils ne connaissent pas la lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Pour eux, le matin c’est l’ombre de la mort, ils en éprouvent toutes les terreurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Eh quoi! L’impie est d’un poids léger sur la face des eaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’a sur la terre qu’une part maudite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne prend jamais le chemin des vignes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Comme la sécheresse et la chaleur absorbent les eaux de la neige,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi le séjour des morts engloutit ceux qui pèchent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Quoi! Le sein maternel l’oublie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les vers en font leurs délices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: On ne se souvient plus de lui!
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’impie est brisé comme un arbre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Lui qui dépouille la femme stérile et sans enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lui qui ne répand aucun bienfait sur la veuve!…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Non! Dieu par sa force prolonge les jours des violents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les voilà debout quand ils désespéraient de la vie;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Il leur donne de la sécurité et de la confiance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a les regards sur leurs voies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ils se sont élevés; et en un instant ils ne sont plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils tombent, ils meurent comme tous les hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont coupés comme la tête des épis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: S’il n’en est pas ainsi, qui me démentira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui réduira mes paroles à néant?
