document_id: GEN.27,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacob béni par son père Isaac
  - type: heading
    content: 'V. 1-40: cf. Ge 25:21-34. (Hé 11:20; 12:16, 17. Ge 48:14, 17-20.)'
  - type: text
    content: 'Isaac devenait vieux, et ses yeux s’étaient affaiblis au point qu’il ne voyait plus. Alors il appela Ésaü, son fils aîné, et lui dit: Mon fils! Et il lui répondit: Me voici! '
  '10':
  - type: text
    content: 'et tu le porteras à manger à ton père, afin qu’il te bénisse avant sa mort. '
  '11':
  - type: text
    content: 'Jacob répondit à sa mère: Voici, Ésaü, mon frère, est velu, et je n’ai point de poil. '
  '12':
  - type: text
    content: 'Peut-être mon père me touchera-t-il, et je passerai à ses yeux pour un menteur, et je ferai venir sur moi la malédiction, et non la bénédiction. '
  '13':
  - type: text
    content: 'Sa mère lui dit: Que cette malédiction, mon fils, retombe sur moi! Écoute seulement ma voix, et va me les prendre. '
  '14':
  - type: text
    content: 'Jacob alla les prendre, et les apporta à sa mère, qui fit un mets comme son père aimait. '
  '15':
  - type: text
    content: 'Ensuite, Rebecca prit les vêtements d’Ésaü, son fils aîné, les plus beaux qui se trouvaient à la maison, et elle les fit mettre à Jacob, son fils cadet. '
  '16':
  - type: text
    content: 'Elle couvrit ses mains de la peau des chevreaux, et son cou qui était sans poil. '
  '17':
  - type: text
    content: 'Et elle plaça dans la main de Jacob, son fils, le mets et le pain qu’elle avait préparés. '
  '18':
  - type: text
    content: 'Il vint vers son père, et dit: Mon père! Et Isaac dit: Me voici! Qui es-tu, mon fils? '
  '19':
  - type: text
    content: 'Jacob répondit à son père: Je suis Ésaü, ton fils aîné; j’ai fait ce que tu m’as dit. Lève-toi, je te prie, assieds-toi, et mange de mon gibier, afin que ton âme me bénisse. '
  '2':
  - type: text
    content: 'Isaac dit: Voici donc, je suis vieux, je ne connais pas le jour de ma mort. '
  '20':
  - type: text
    content: 'Isaac dit à son fils: Eh quoi! Tu en as déjà trouvé, mon fils! Et Jacob répondit: C’est que l’Éternel, ton Dieu, l’a fait venir devant moi. '
  '21':
  - type: text
    content: 'Isaac dit à Jacob: Approche donc, et que je te touche, mon fils, pour savoir si tu es mon fils Ésaü, ou non. '
  '22':
  - type: text
    content: 'Jacob s’approcha d’Isaac, son père, qui le toucha, et dit: La voix est la voix de Jacob, mais les mains sont les mains d’Ésaü. '
  '23':
  - type: text
    content: 'Il ne le reconnut pas, parce que ses mains étaient velues, comme les mains d’Ésaü, son frère; et il le bénit. '
  '24':
  - type: text
    content: 'Il dit: C’est toi qui es mon fils Ésaü? Et Jacob répondit: C’est moi. '
  '25':
  - type: text
    content: 'Isaac dit: Sers-moi, et que je mange du gibier de mon fils, afin que mon âme te bénisse. Jacob le servit, et il mangea; il lui apporta aussi du vin, et il but. '
  '26':
  - type: text
    content: 'Alors Isaac, son père, lui dit: Approche donc, et baise-moi, mon fils. '
  '27':
  - type: text
    content: 'Jacob s’approcha, et le baisa. Isaac sentit l’odeur de ses vêtements; puis il le bénit, et dit:'
  - type: text
    content: Voici, l’odeur de mon fils est comme l’odeur d’un champ que l’Éternel a béni.
  '28':
  - type: text
    content: ' '
  - type: note
    content: Hé 11:20.
  - type: text
    content: Que Dieu te donne de la rosée du ciel
  - type: text
    content: Et de la graisse de la terre,
  - type: text
    content: Du blé et du vin en abondance!
  '29':
  - type: text
    content: Que des peuples te soient soumis,
  - type: text
    content: Et que des nations se prosternent devant toi!
  - type: text
    content: Sois le maître de tes frères,
  - type: text
    content: Et que les fils de ta mère se prosternent devant toi!
  - type: note
    content: Ge 12:3.
  - type: text
    content: Maudit soit quiconque te maudira,
  - type: text
    content: Et béni soit quiconque te bénira.
  '3':
  - type: text
    content: 'Maintenant donc, je te prie, prends tes armes, ton carquois et ton arc, va dans les champs, et chasse-moi du gibier. '
  '30':
  - type: text
    content: 'Isaac avait fini de bénir Jacob, et Jacob avait à peine quitté son père Isaac, qu’Ésaü, son frère, revint de la chasse. '
  '31':
  - type: text
    content: 'Il fit aussi un mets, qu’il porta à son père; et il dit à son père: Que mon père se lève et mange du gibier de son fils, afin que ton âme me bénisse! '
  '32':
  - type: text
    content: 'Isaac, son père, lui dit: Qui es-tu? Et il répondit: Je suis ton fils aîné, Ésaü. '
  '33':
  - type: text
    content: 'Isaac fut saisi d’une grande, d’une violente émotion, et il dit: Qui est donc celui qui a chassé du gibier, et me l’a apporté? J’ai mangé de tout avant que tu vinsses, et je l’ai béni. Aussi sera-t-il béni. '
  '34':
  - type: note
    content: Hé 12:17.
  - type: text
    content: 'Lorsque Ésaü entendit les paroles de son père, il poussa de forts cris, pleins d’amertume, et il dit à son père: Bénis-moi aussi, mon père! '
  '35':
  - type: text
    content: 'Isaac dit: Ton frère est venu avec ruse, et il a enlevé ta bénédiction. '
  '36':
  - type: text
    content: 'Ésaü dit: Est-ce parce qu’on l’a appelé du nom de Jacob qu’il m’a supplanté deux fois? '
  - type: note
    content: Ge 25:33.
  - type: text
    content: 'Il a enlevé mon droit d’aînesse, et voici maintenant qu’il vient d’enlever ma bénédiction. Et il dit: N’as-tu point réservé de bénédiction pour moi? '
  '37':
  - type: text
    content: 'Isaac répondit, et dit à Ésaü: Voici, je l’ai établi ton maître, et je lui ai donné tous ses frères pour serviteurs, je l’ai pourvu de blé et de vin: que puis-je donc faire pour toi, mon fils? '
  '38':
  - type: text
    content: 'Ésaü dit à son père: N’as-tu que cette seule bénédiction, mon père? Bénis-moi aussi, mon père! '
  - type: note
    content: Hé 12:17.
  - type: text
    content: 'Et Ésaü éleva la voix, et pleura. '
  '39':
  - type: text
    content: 'Isaac, son père, répondit, et lui dit:'
  - type: text
    content: Voici!
  - type: text
    content: Ta demeure sera privée de la graisse de la terre
  - type: text
    content: Et de la rosée du ciel, d’en haut.
  '4':
  - type: text
    content: 'Fais-moi un mets comme j’aime, et apporte-le-moi à manger, afin que mon âme te bénisse avant que je meure. '
  '40':
  - type: text
    content: Tu vivras de ton épée,
  - type: text
    content: Et tu seras asservi à ton frère;
  - type: text
    content: Mais en errant librement çà et là,
  - type: text
    content: Tu briseras son joug de dessus ton cou.
  - type: heading
    content: 'V. 41-46: cf. 1 Jn 3:15. Pr 18:19. Ge 28:1-10.'
  '41':
  - type: text
    content: 'Ésaü conçut de la haine contre Jacob, à cause de la bénédiction dont son père l’avait béni; et Ésaü disait en son cœur: Les jours du deuil de mon père vont approcher, et je tuerai Jacob, mon frère. '
  '42':
  - type: text
    content: 'On rapporta à Rebecca les paroles d’Ésaü, son fils aîné. Elle fit alors appeler Jacob, son fils cadet, et elle lui dit: Voici, Ésaü, ton frère, veut tirer vengeance de toi, en te tuant. '
  '43':
  - type: text
    content: 'Maintenant, mon fils, écoute ma voix! Lève-toi, fuis chez Laban, mon frère, à Charan; '
  '44':
  - type: text
    content: 'et reste auprès de lui quelque temps, jusqu’à ce que la fureur de ton frère s’apaise, '
  '45':
  - type: text
    content: 'jusqu’à ce que la colère de ton frère se détourne de toi, et qu’il oublie ce que tu lui as fait. Alors je te ferai revenir. Pourquoi serais-je privée de vous deux en un même jour? '
  '46':
  - type: note
    content: Ge 26:35.
  - type: text
    content: 'Rebecca dit à Isaac: Je suis dégoûtée de la vie, à cause des filles de Heth. Si Jacob prend une femme, comme celles-ci, parmi les filles de Heth, parmi les filles du pays, à quoi me sert la vie?'
  '5':
  - type: text
    content: 'Rebecca écouta ce qu’Isaac disait à Ésaü, son fils. Et Ésaü s’en alla dans les champs, pour chasser du gibier et pour le rapporter. '
  '6':
  - type: text
    content: 'Puis Rebecca dit à Jacob, son fils: Voici, j’ai entendu ton père qui parlait ainsi à Ésaü, ton frère: '
  '7':
  - type: text
    content: 'Apporte-moi du gibier et fais-moi un mets que je mangerai; et je te bénirai devant l’Éternel avant ma mort. '
  '8':
  - type: text
    content: 'Maintenant, mon fils, écoute ma voix à l’égard de ce que je te commande. '
  '9':
  - type: text
    content: 'Va me prendre au troupeau deux bons chevreaux; j’en ferai pour ton père un mets comme il aime; '
