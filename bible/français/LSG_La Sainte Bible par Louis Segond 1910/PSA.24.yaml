        - type: text
          text: '28'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: A l’Éternel la terre et ce qu’elle renferme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le monde et ceux qui l’habitent!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Qui donc est ce roi de gloire?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L’Éternel des armées:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voilà le roi de gloire! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Car il l’a fondée sur les mers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et affermie sur les fleuves.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 15:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 33:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui pourra monter à la montagne de l’Éternel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui s’élèvera jusqu’à son lieu saint?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Celui qui a les mains innocentes et le cœur pur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui ne livre pas son âme au mensonge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui ne jure pas pour tromper.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Il obtiendra la bénédiction de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La miséricorde du Dieu de son salut.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Voilà le partage de la génération qui l’invoque,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'De ceux qui cherchent ta face, Dieu de Jacob! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Portes, élevez vos linteaux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Élevez-vous, portes éternelles!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le roi de gloire fasse son entrée!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Qui est ce roi de gloire?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel fort et puissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel puissant dans les combats.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Portes, élevez vos linteaux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Élevez-les, portes éternelles!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le roi de gloire fasse son entrée!
