document_id: PSA.24,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 15; 25:14. 2 S 6. (Ps 68:17-19. Ép 4:8-10.)
  - type: text
    content: Psaume de David.
  - type: note
    content: Ex 19:5. De 10:14. Job 41:2. Ps 50:12. 1 Co 10:26, 28.
  - type: text
    content: A l’Éternel la terre et ce qu’elle renferme,
  - type: text
    content: Le monde et ceux qui l’habitent!
  '10':
  - type: text
    content: Qui donc est ce roi de gloire?
  - type: text
    content: 'L’Éternel des armées:'
  - type: text
    content: 'Voilà le roi de gloire! '
  - type: text
    content: — Pause.
  '2':
  - type: text
    content: Car il l’a fondée sur les mers,
  - type: text
    content: Et affermie sur les fleuves.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps 15:1. És 33:14, 15.
  - type: text
    content: Qui pourra monter à la montagne de l’Éternel?
  - type: text
    content: Qui s’élèvera jusqu’à son lieu saint?
  '4':
  - type: text
    content: Celui qui a les mains innocentes et le cœur pur;
  - type: text
    content: Celui qui ne livre pas son âme au mensonge,
  - type: text
    content: Et qui ne jure pas pour tromper.
  '5':
  - type: text
    content: Il obtiendra la bénédiction de l’Éternel,
  - type: text
    content: La miséricorde du Dieu de son salut.
  '6':
  - type: text
    content: Voilà le partage de la génération qui l’invoque,
  - type: text
    content: 'De ceux qui cherchent ta face, Dieu de Jacob! '
  - type: text
    content: — Pause.
  '7':
  - type: text
    content: Portes, élevez vos linteaux;
  - type: text
    content: Élevez-vous, portes éternelles!
  - type: text
    content: Que le roi de gloire fasse son entrée!
  '8':
  - type: text
    content: Qui est ce roi de gloire?
  - type: text
    content: L’Éternel fort et puissant,
  - type: text
    content: L’Éternel puissant dans les combats.
  '9':
  - type: text
    content: Portes, élevez vos linteaux;
  - type: text
    content: Élevez-les, portes éternelles!
  - type: text
    content: Que le roi de gloire fasse son entrée!
