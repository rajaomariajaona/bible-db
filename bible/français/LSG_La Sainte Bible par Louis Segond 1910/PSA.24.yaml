    marker-yv: yv-n
  - type: text
    text: Qui pourra monter à la montagne de l’Éternel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui s’élèvera jusqu’à son lieu saint?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Celui qui a les mains innocentes et le cœur pur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui ne livre pas son âme au mensonge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui ne jure pas pour tromper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il obtiendra la bénédiction de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La miséricorde du Dieu de son salut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Voilà le partage de la génération qui l’invoque,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'De ceux qui cherchent ta face, Dieu de Jacob! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Portes, élevez vos linteaux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Élevez-vous, portes éternelles!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que le roi de gloire fasse son entrée!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Qui est ce roi de gloire?
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel fort et puissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel puissant dans les combats.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Portes, élevez vos linteaux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Élevez-les, portes éternelles!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que le roi de gloire fasse son entrée!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Qui donc est ce roi de gloire?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'L’Éternel des armées:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voilà le roi de gloire! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
