  - type: text
    text: A l’Éternel la terre et ce qu’elle renferme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le monde et ceux qui l’habitent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Car il l’a fondée sur les mers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et affermie sur les fleuves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
