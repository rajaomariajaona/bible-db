document_id: JOS.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Partage du pays à l’occident du Jourdain
  - type: heading
    content: 'V. 1-5: cf. (No 26:52-56; 34.)'
  - type: text
    content: 'Voici ce que les enfants d’Israël reçurent en héritage dans le pays de Canaan, '
  - type: note
    content: No 34:17.
  - type: text
    content: 'ce que partagèrent entre eux le sacrificateur Éléazar, Josué, fils de Nun, et les chefs de famille des tribus des enfants d’Israël. '
  '10':
  - type: text
    content: 'Maintenant voici, l’Éternel m’a fait vivre, comme il l’a dit. Il y a quarante-cinq ans que l’Éternel parlait ainsi à Moïse, lorsqu’Israël marchait dans le désert; et maintenant voici, je suis âgé aujourd’hui de quatre-vingt-cinq ans. '
  '11':
  - type: text
    content: 'Je suis encore vigoureux comme au jour où Moïse m’envoya; j’ai autant de force que j’en avais alors, soit pour combattre, '
  - type: note
    content: No 27:17. De 31:2.
  - type: text
    content: 'soit pour sortir et pour entrer. '
  '12':
  - type: text
    content: 'Donne-moi donc cette montagne dont l’Éternel a parlé dans ce temps-là; car tu as appris alors qu’il s’y trouve des Anakim, et qu’il y a des villes grandes et fortifiées. L’Éternel sera peut-être avec moi, et je les chasserai, comme l’Éternel a dit. '
  '13':
  - type: text
    content: 'Josué bénit Caleb, fils de Jephunné, et il lui donna Hébron pour héritage. '
  '14':
  - type: text
    content: 'C’est ainsi que Caleb, fils de Jephunné, le Kenizien, a eu jusqu’à ce jour Hébron pour héritage, parce qu’il avait pleinement suivi la voie de l’Éternel, le Dieu d’Israël. '
  '15':
  - type: text
    content: 'Hébron s’appelait autrefois Kirjath-Arba: Arba avait été l’homme le plus grand parmi les Anakim. Le pays fut dès lors en repos et sans guerre.'
  '2':
  - type: text
    content: 'Le partage eut lieu d’après le sort, comme l’Éternel l’avait ordonné par Moïse, '
  - type: note
    content: No 26:55.
  - type: text
    content: 'pour les neuf tribus et pour la demi-tribu. '
  '3':
  - type: text
    content: 'Car Moïse avait donné un héritage aux deux tribus et à la demi-tribu de l’autre côté du Jourdain; mais il n’avait point donné aux Lévites d’héritage parmi eux. '
  '4':
  - type: text
    content: 'Les fils de Joseph formaient deux tribus, Manassé et Éphraïm; et l’on ne donna point de part aux Lévites dans le pays, si ce n’est des villes pour habitation, et les banlieues pour leurs troupeaux et pour leurs biens. '
  '5':
  - type: text
    content: Les enfants d’Israël se conformèrent aux ordres que l’Éternel avait donnés à Moïse, et ils partagèrent le pays.
  - type: heading
    content: Le territoire d’Hébron accordé à Caleb
  - type: heading
    content: 'V. 6-15: cf. (No 13 et 14.) (Hé 6:12; 11:33.) (Pr 4:18. Ps 118:17.)'
  '6':
  - type: text
    content: 'Les fils de Juda s’approchèrent de Josué, à Guilgal; et Caleb, fils de Jephunné, le Kenizien, lui dit: Tu sais '
  - type: note
    content: No 12:24. De 1:36.
  - type: text
    content: 'ce que l’Éternel a déclaré à Moïse, homme de Dieu, au sujet de moi et au sujet de toi, à Kadès-Barnéa. '
  '7':
  - type: text
    content: 'J’étais âgé de quarante ans lorsque Moïse, serviteur de l’Éternel, m’envoya de Kadès-Barnéa pour explorer le pays, et je lui fis un rapport avec droiture de cœur. '
  '8':
  - type: text
    content: 'Mes frères qui étaient montés avec moi découragèrent le peuple, '
  - type: note
    content: No 14:24.
  - type: text
    content: 'mais moi je suivis pleinement la voie de l’Éternel, mon Dieu. '
  '9':
  - type: text
    content: 'Et ce jour-là Moïse jura, en disant: Le pays que ton pied a foulé sera ton héritage à perpétuité, pour toi et pour tes enfants, parce que tu as pleinement suivi la voie de l’Éternel, mon Dieu. '
