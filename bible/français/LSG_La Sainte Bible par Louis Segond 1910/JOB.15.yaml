document_id: JOB.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Second discours d’Éliphaz à Job
  - type: heading
    content: 'V. 1-16: cf. Job 16:1-5. (Job 25:4-6; 14:4. Ps 51:7.)'
  - type: text
    content: 'Éliphaz de Théman prit la parole et dit:'
  '10':
  - type: text
    content: ' '
  - type: note
    content: Job 32:7.
  - type: text
    content: Il y a parmi nous des cheveux blancs, des vieillards,
  - type: text
    content: Plus riches de jours que ton père.
  '11':
  - type: text
    content: Tiens-tu pour peu de chose les consolations de Dieu,
  - type: text
    content: Et les paroles qui doucement se font entendre à toi?…
  '12':
  - type: text
    content: Où ton cœur t’entraîne-t-il,
  - type: text
    content: Et que signifie ce roulement de tes yeux?
  '13':
  - type: text
    content: Quoi! C’est contre Dieu que tu tournes ta colère
  - type: text
    content: Et que ta bouche exhale de pareils discours!
  '14':
  - type: text
    content: ' '
  - type: note
    content: 1 R 8:46. 2 Ch 6:36. Job 14:4. Ps 14:3. Pr 20:9. Ec 7:20. 1 Jn 1:8, 10.
  - type: text
    content: Qu’est-ce que l’homme, pour qu’il soit pur?
  - type: text
    content: Celui qui est né de la femme peut-il être juste?
  '15':
  - type: text
    content: ' '
  - type: note
    content: Job 4:18.
  - type: text
    content: Si Dieu n’a pas confiance en ses saints,
  - type: note
    content: Job 4:18; 25:5.
  - type: text
    content: Si les cieux ne sont pas purs devant lui,
  '16':
  - type: text
    content: Combien moins l’être abominable et pervers,
  - type: text
    content: L’homme qui boit l’iniquité comme l’eau!
  - type: heading
    content: 'V. 17-35: cf. Job 18:5-21; 20:4-29.'
  '17':
  - type: text
    content: Je vais te parler, écoute-moi!
  - type: text
    content: Je raconterai ce que j’ai vu,
  '18':
  - type: text
    content: Ce que les sages ont fait connaître,
  - type: text
    content: Ce qu’ils ont révélé, l’ayant appris de leurs pères.
  '19':
  - type: text
    content: A eux seuls appartenait le pays,
  - type: text
    content: Et parmi eux nul étranger n’était encore venu.
  '2':
  - type: text
    content: Le sage répond-il par un vain savoir?
  - type: text
    content: Se gonfle-t-il la poitrine du vent d’orient?
  '20':
  - type: text
    content: Le méchant passe dans l’angoisse tous les jours de sa vie,
  - type: text
    content: Toutes les années qui sont le partage de l’impie.
  '21':
  - type: text
    content: La voix de la terreur retentit à ses oreilles;
  - type: note
    content: 1 Th 5:3.
  - type: text
    content: Au sein de la paix, le dévastateur va fondre sur lui;
  '22':
  - type: text
    content: Il n’espère pas échapper aux ténèbres,
  - type: text
    content: Il voit l’épée qui le menace;
  '23':
  - type: text
    content: Il court çà et là pour chercher du pain,
  - type: text
    content: 'Il sait '
  - type: note
    content: Job 18:12. Ps 109:10.
  - type: text
    content: que le jour des ténèbres l’attend.
  '24':
  - type: text
    content: La détresse et l’angoisse l’épouvantent,
  - type: text
    content: Elles l’assaillent comme un roi prêt à combattre;
  '25':
  - type: text
    content: Car il a levé la main contre Dieu,
  - type: text
    content: Il a bravé le Tout-Puissant,
  '26':
  - type: text
    content: Il a eu l’audace de courir à lui
  - type: text
    content: Sous le dos épais de ses boucliers.
  '27':
  - type: text
    content: Il avait le visage couvert de graisse,
  - type: text
    content: Les flancs chargés d’embonpoint;
  '28':
  - type: text
    content: Et il habite des villes détruites,
  - type: text
    content: Des maisons abandonnées,
  - type: text
    content: Sur le point de tomber en ruines.
  '29':
  - type: text
    content: Il ne s’enrichira plus, sa fortune ne se relèvera pas,
  - type: text
    content: Sa prospérité ne s’étendra plus sur la terre.
  '3':
  - type: text
    content: Est-ce par d’inutiles propos qu’il se défend?
  - type: text
    content: Est-ce par des discours qui ne servent à rien?
  '30':
  - type: text
    content: Il ne pourra se dérober aux ténèbres,
  - type: text
    content: La flamme consumera ses rejetons,
  - type: note
    content: Job 4:9.
  - type: text
    content: Et Dieu le fera périr par le souffle de sa bouche.
  '31':
  - type: text
    content: S’il a confiance dans le mal, il se trompe,
  - type: text
    content: Car le mal sera sa récompense.
  '32':
  - type: text
    content: ' '
  - type: note
    content: Job 22:16. Ps 55:24.
  - type: text
    content: Elle arrivera avant le terme de ses jours,
  - type: text
    content: Et son rameau ne verdira plus.
  '33':
  - type: text
    content: Il sera comme une vigne dépouillée de ses fruits encore verts,
  - type: text
    content: Comme un olivier dont on a fait tomber les fleurs.
  '34':
  - type: text
    content: La maison de l’impie deviendra stérile,
  - type: text
    content: Et le feu dévorera la tente de l’homme corrompu.
  '35':
  - type: text
    content: ' '
  - type: note
    content: Ps 7:15. És 59:4. Os 10:13.
  - type: text
    content: Il conçoit le mal et il enfante le mal,
  - type: text
    content: Il mûrit dans son sein des fruits qui le trompent.
  '4':
  - type: text
    content: Toi, tu détruis même la crainte de Dieu,
  - type: text
    content: Tu anéantis tout mouvement de piété devant Dieu.
  '5':
  - type: text
    content: Ton iniquité dirige ta bouche,
  - type: text
    content: Et tu prends le langage des hommes rusés.
  '6':
  - type: text
    content: Ce n’est pas moi, c’est ta bouche qui te condamne.
  - type: text
    content: Ce sont tes lèvres qui déposent contre toi.
  '7':
  - type: text
    content: Es-tu né le premier des hommes?
  - type: text
    content: As-tu été enfanté avant les collines?
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ro 11:34.
  - type: text
    content: As-tu reçu les confidences de Dieu?
  - type: text
    content: As-tu dérobé la sagesse à ton profit?
  '9':
  - type: text
    content: Que sais-tu que nous ne sachions pas?
  - type: text
    content: Quelle connaissance as-tu que nous n’ayons pas?
