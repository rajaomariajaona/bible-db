document_id: JOB.15,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Second discours d’Éliphaz à Job
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-16: cf. Job 16:1-5. (Job 25:4-6; 14:4. Ps 51:7.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Éliphaz de Théman prit la parole et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 32:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il y a parmi nous des cheveux blancs, des vieillards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus riches de jours que ton père.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tiens-tu pour peu de chose les consolations de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les paroles qui doucement se font entendre à toi?…
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Où ton cœur t’entraîne-t-il,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que signifie ce roulement de tes yeux?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Quoi! C’est contre Dieu que tu tournes ta colère
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que ta bouche exhale de pareils discours!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 8:46
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 6:36
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 14:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 14:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 20:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 7:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 1:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qu’est-ce que l’homme, pour qu’il soit pur?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui est né de la femme peut-il être juste?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 4:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Si Dieu n’a pas confiance en ses saints,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 4:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Si les cieux ne sont pas purs devant lui,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Combien moins l’être abominable et pervers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme qui boit l’iniquité comme l’eau!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-35: cf. Job 18:5-21; 20:4-29.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Je vais te parler, écoute-moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je raconterai ce que j’ai vu,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ce que les sages ont fait connaître,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce qu’ils ont révélé, l’ayant appris de leurs pères.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: A eux seuls appartenait le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et parmi eux nul étranger n’était encore venu.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Le sage répond-il par un vain savoir?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Se gonfle-t-il la poitrine du vent d’orient?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Le méchant passe dans l’angoisse tous les jours de sa vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les années qui sont le partage de l’impie.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: La voix de la terreur retentit à ses oreilles;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 5:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Au sein de la paix, le dévastateur va fondre sur lui;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Il n’espère pas échapper aux ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il voit l’épée qui le menace;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Il court çà et là pour chercher du pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il sait '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 18:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 109:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: que le jour des ténèbres l’attend.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: La détresse et l’angoisse l’épouvantent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles l’assaillent comme un roi prêt à combattre;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Car il a levé la main contre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a bravé le Tout-Puissant,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Il a eu l’audace de courir à lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sous le dos épais de ses boucliers.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Il avait le visage couvert de graisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les flancs chargés d’embonpoint;
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Et il habite des villes détruites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des maisons abandonnées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur le point de tomber en ruines.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Il ne s’enrichira plus, sa fortune ne se relèvera pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa prospérité ne s’étendra plus sur la terre.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Est-ce par d’inutiles propos qu’il se défend?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce par des discours qui ne servent à rien?
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Il ne pourra se dérober aux ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La flamme consumera ses rejetons,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 4:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et Dieu le fera périr par le souffle de sa bouche.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: S’il a confiance dans le mal, il se trompe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car le mal sera sa récompense.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 22:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 55:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Elle arrivera avant le terme de ses jours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et son rameau ne verdira plus.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Il sera comme une vigne dépouillée de ses fruits encore verts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un olivier dont on a fait tomber les fleurs.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: La maison de l’impie deviendra stérile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le feu dévorera la tente de l’homme corrompu.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 7:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 59:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 10:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il conçoit le mal et il enfante le mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il mûrit dans son sein des fruits qui le trompent.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Toi, tu détruis même la crainte de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu anéantis tout mouvement de piété devant Dieu.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ton iniquité dirige ta bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu prends le langage des hommes rusés.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ce n’est pas moi, c’est ta bouche qui te condamne.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sont tes lèvres qui déposent contre toi.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Es-tu né le premier des hommes?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As-tu été enfanté avant les collines?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 11:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: As-tu reçu les confidences de Dieu?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As-tu dérobé la sagesse à ton profit?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Que sais-tu que nous ne sachions pas?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quelle connaissance as-tu que nous n’ayons pas?
