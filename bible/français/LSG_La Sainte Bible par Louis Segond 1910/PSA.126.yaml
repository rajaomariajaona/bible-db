    marker-yv: yv-n
  - type: text
    text: Alors notre bouche était remplie de cris de joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et notre langue de chants d’allégresse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Alors on disait parmi les nations:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel a fait pour eux de grandes choses!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L’Éternel a fait pour nous de grandes choses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous sommes dans la joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Éternel, ramène nos captifs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme des ruisseaux dans le midi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ceux qui sèment avec larmes
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moissonneront avec chants d’allégresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Celui qui marche en pleurant, quand il porte la semence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Revient avec allégresse, quand il porte ses gerbes.
