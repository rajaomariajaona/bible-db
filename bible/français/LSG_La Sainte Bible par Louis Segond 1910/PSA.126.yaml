document_id: PSA.126,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Esd 1. Ps 85. Ap 7:9, etc. 2 Ch 15:7.
  - type: text
    content: Cantique des degrés.
  - type: text
    content: Quand l’Éternel ramena les captifs de Sion,
  - type: text
    content: Nous étions comme ceux qui font un rêve.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Job 8:21.
  - type: text
    content: Alors notre bouche était remplie de cris de joie,
  - type: text
    content: Et notre langue de chants d’allégresse;
  - type: text
    content: 'Alors on disait parmi les nations:'
  - type: text
    content: L’Éternel a fait pour eux de grandes choses!
  '3':
  - type: text
    content: L’Éternel a fait pour nous de grandes choses;
  - type: text
    content: Nous sommes dans la joie.
  '4':
  - type: text
    content: Éternel, ramène nos captifs,
  - type: text
    content: Comme des ruisseaux dans le midi!
  '5':
  - type: text
    content: Ceux qui sèment avec larmes
  - type: text
    content: Moissonneront avec chants d’allégresse.
  '6':
  - type: text
    content: Celui qui marche en pleurant, quand il porte la semence,
  - type: text
    content: Revient avec allégresse, quand il porte ses gerbes.
