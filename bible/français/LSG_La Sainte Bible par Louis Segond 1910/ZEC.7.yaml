document_id: ZEC.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les jeûnes
  - type: heading
    content: 'V. 1-7: cf. (És 58:3-10. Os 6:6. Mi 6:8.) Ro 14:17.'
  - type: text
    content: 'La quatrième année du roi Darius, la parole de l’Éternel fut adressée à Zacharie, le quatrième jour du neuvième mois, qui est le mois de Kisleu. '
  '10':
  - type: text
    content: 'N’opprimez pas la '
  - type: note
    content: Ex 22:22.
  - type: text
    content: veuve et l’orphelin, l’étranger et le pauvre,
  - type: text
    content: Et ne méditez pas l’un contre l’autre le mal dans vos cœurs.
  '11':
  - type: text
    content: 'Mais ils refusèrent d’être attentifs, ils eurent l’épaule rebelle, et ils endurcirent leurs oreilles pour ne pas entendre. '
  '12':
  - type: text
    content: 'Ils rendirent leur cœur dur comme le diamant, pour ne pas écouter la loi et les paroles que l’Éternel des armées leur adressait par son esprit, par les premiers prophètes. Ainsi l’Éternel des armées s’enflamma d’une grande colère. '
  '13':
  - type: text
    content: 'Quand il appelait, ils n’ont pas écouté: '
  - type: note
    content: Pr 1:28. És 1:15. Jé 11:11; 14:12.
  - type: text
    content: 'aussi n’ai-je pas écouté, quand ils ont appelé, dit l’Éternel des armées. '
  '14':
  - type: text
    content: Je les ai dispersés parmi toutes les nations qu’ils ne connaissaient pas; le pays a été dévasté derrière eux, il n’y a plus eu ni allants ni venants; et d’un pays de délices ils ont fait un désert.
  '2':
  - type: text
    content: 'On avait envoyé de Béthel Scharetser et Réguem-Mélec avec ses gens pour implorer l’Éternel, '
  '3':
  - type: text
    content: 'et pour dire aux sacrificateurs de la maison de l’Éternel des armées et aux prophètes: Faut-il que je pleure au cinquième mois et que je fasse abstinence, comme je l’ai fait tant d’années? '
  '4':
  - type: text
    content: 'La parole de l’Éternel des armées me fut adressée, en ces mots: '
  '5':
  - type: text
    content: 'Dis à tout le peuple du pays et aux sacrificateurs: Quand vous avez jeûné et pleuré au cinquième et au septième mois, et cela depuis soixante-dix ans, est-ce pour moi que vous avez jeûné? '
  '6':
  - type: text
    content: 'Et quand vous mangez et buvez, n’est-ce pas vous qui mangez et vous qui buvez? '
  '7':
  - type: text
    content: Ne connaissez-vous pas les paroles qu’a proclamées l’Éternel par les premiers prophètes, lorsque Jérusalem était habitée et tranquille avec ses villes à l’entour, et que le midi et la plaine étaient habités?
  - type: heading
    content: 'V. 8-14: cf. Jé 7. (2 Ch 36:15-21. Za 1:1-6.)'
  '8':
  - type: text
    content: 'La parole de l’Éternel fut adressée à Zacharie, en ces mots: '
  '9':
  - type: text
    content: 'Ainsi parlait l’Éternel des armées:'
  - type: text
    content: Rendez véritablement la justice,
  - type: text
    content: Et ayez l’un pour l’autre de la bonté et de la miséricorde.
