document_id: ZEC.7,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les jeûnes
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. (És 58:3-10. Os 6:6. Mi 6:8.) Ro 14:17.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La quatrième année du roi Darius, la parole de l’Éternel fut adressée à Zacharie, le quatrième jour du neuvième mois, qui est le mois de Kisleu. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'N’opprimez pas la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 22:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: veuve et l’orphelin, l’étranger et le pauvre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne méditez pas l’un contre l’autre le mal dans vos cœurs.
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Mais ils refusèrent d’être attentifs, ils eurent l’épaule rebelle, et ils endurcirent leurs oreilles pour ne pas entendre. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ils rendirent leur cœur dur comme le diamant, pour ne pas écouter la loi et les paroles que l’Éternel des armées leur adressait par son esprit, par les premiers prophètes. Ainsi l’Éternel des armées s’enflamma d’une grande colère. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Quand il appelait, ils n’ont pas écouté: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 1:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 11:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'aussi n’ai-je pas écouté, quand ils ont appelé, dit l’Éternel des armées. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Je les ai dispersés parmi toutes les nations qu’ils ne connaissaient pas; le pays a été dévasté derrière eux, il n’y a plus eu ni allants ni venants; et d’un pays de délices ils ont fait un désert.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'On avait envoyé de Béthel Scharetser et Réguem-Mélec avec ses gens pour implorer l’Éternel, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'et pour dire aux sacrificateurs de la maison de l’Éternel des armées et aux prophètes: Faut-il que je pleure au cinquième mois et que je fasse abstinence, comme je l’ai fait tant d’années? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'La parole de l’Éternel des armées me fut adressée, en ces mots: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dis à tout le peuple du pays et aux sacrificateurs: Quand vous avez jeûné et pleuré au cinquième et au septième mois, et cela depuis soixante-dix ans, est-ce pour moi que vous avez jeûné? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Et quand vous mangez et buvez, n’est-ce pas vous qui mangez et vous qui buvez? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ne connaissez-vous pas les paroles qu’a proclamées l’Éternel par les premiers prophètes, lorsque Jérusalem était habitée et tranquille avec ses villes à l’entour, et que le midi et la plaine étaient habités?
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-14: cf. Jé 7. (2 Ch 36:15-21. Za 1:1-6.)'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'La parole de l’Éternel fut adressée à Zacharie, en ces mots: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ainsi parlait l’Éternel des armées:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rendez véritablement la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ayez l’un pour l’autre de la bonté et de la miséricorde.
