document_id: EXO.31,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Désignation des ouvriers
  - type: heading
    content: 'V. 1-11: cf. Ex 35:30 à 36:3. (Ép 4:11, 12. 1 Co 12:7.)'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: text
    content: 'les vêtements d’office, les vêtements sacrés pour le sacrificateur Aaron, les vêtements de ses fils pour les fonctions du sacerdoce; '
  '11':
  - type: text
    content: l’huile d’onction, et le parfum odoriférant pour le sanctuaire. Ils se conformeront à tous les ordres que j’ai donnés.
  - type: heading
    content: Le sabbat rappelé
  - type: heading
    content: 'V. 12-17: cf. (Ex 20:8-11. Ge 2:1-3.) (No 15:32-36. Jé 17:21-27.)'
  '12':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '13':
  - type: text
    content: 'Parle aux enfants d’Israël, et dis-leur: Vous ne manquerez pas d’observer mes sabbats, car ce sera entre moi et vous, et parmi vos descendants, un signe auquel on connaîtra que je suis l’Éternel qui vous sanctifie. '
  '14':
  - type: note
    content: Ex 20:8. De 5:12. Éz 20:12.
  - type: text
    content: 'Vous observerez le sabbat, car il sera pour vous une chose sainte. Celui qui le profanera, sera puni de mort; celui qui fera quelque ouvrage ce jour-là, sera retranché du milieu de son peuple. '
  '15':
  - type: text
    content: 'On travaillera six jours; mais le septième jour est le sabbat, le jour du repos, consacré à l’Éternel. Celui qui fera quelque ouvrage le jour du sabbat, sera puni de mort. '
  '16':
  - type: text
    content: 'Les enfants d’Israël observeront le sabbat, en le célébrant, eux et leurs descendants, comme une alliance perpétuelle. '
  '17':
  - type: text
    content: 'Ce sera entre moi et les enfants d’Israël un signe qui devra durer à perpétuité; '
  - type: note
    content: Ge 1:31; 2:2, 3. Ex 20:11.
  - type: text
    content: car en six jours l’Éternel a fait les cieux et la terre, et le septième jour il a cessé son œuvre et il s’est reposé.
  - type: heading
    content: Les tables de la loi
  - type: heading
    content: 'V. 18: cf. De 9:9-11. Ex 34:1-4, 28.'
  '18':
  - type: text
    content: 'Lorsque l’Éternel eut achevé de parler à Moïse sur la montagne de Sinaï, il lui donna '
  - type: note
    content: Ex 32:16.
  - type: text
    content: les deux tables du témoignage, tables de pierre, écrites du doigt de Dieu.
  '2':
  - type: note
    content: Ex 35:30. 1 Ch 2:20.
  - type: text
    content: 'Sache que j’ai choisi Betsaleel, fils d’Uri, fils de Hur, de la tribu de Juda. '
  '3':
  - type: text
    content: 'Je l’ai rempli de l’Esprit de Dieu, de sagesse, d’intelligence, et de savoir pour toutes sortes d’ouvrages, '
  '4':
  - type: text
    content: 'je l’ai rendu capable de faire des inventions, de travailler l’or, l’argent et l’airain, '
  '5':
  - type: text
    content: 'de graver les pierres à enchâsser, de travailler le bois, et d’exécuter toutes sortes d’ouvrages. '
  '6':
  - type: text
    content: 'Et voici, je lui ai donné pour aide Oholiab, fils d’Ahisamac, de la tribu de Dan. J’ai mis de l’intelligence dans l’esprit de tous ceux qui sont habiles, pour qu’ils fassent tout ce que je t’ai ordonné: '
  '7':
  - type: text
    content: 'la tente d’assignation, l’arche du témoignage, le propitiatoire qui sera dessus, et tous les ustensiles de la tente; '
  '8':
  - type: text
    content: 'la table et ses ustensiles, le chandelier d’or pur et tous ses ustensiles, '
  '9':
  - type: text
    content: 'l’autel des parfums; l’autel des holocaustes et tous ses ustensiles, la cuve avec sa base; '
