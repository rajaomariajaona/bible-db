document_id: EXO.31
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Désignation des ouvriers
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. Ex 35:30 à 36:3. (Ép 4:11, 12. 1 Co 12:7.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 35:30
      metadata:
        usfm: EXO.35.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 2:20
      metadata:
        usfm: 1CH.2.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Sache que j’ai choisi Betsaleel, fils d’Uri, fils de Hur, de la tribu de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je l’ai rempli de l’Esprit de Dieu, de sagesse, d’intelligence, et de savoir pour toutes sortes d’ouvrages, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'je l’ai rendu capable de faire des inventions, de travailler l’or, l’argent et l’airain, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'de graver les pierres à enchâsser, de travailler le bois, et d’exécuter toutes sortes d’ouvrages. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et voici, je lui ai donné pour aide Oholiab, fils d’Ahisamac, de la tribu de Dan. J’ai mis de l’intelligence dans l’esprit de tous ceux qui sont habiles, pour qu’ils fassent tout ce que je t’ai ordonné: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'la tente d’assignation, l’arche du témoignage, le propitiatoire qui sera dessus, et tous les ustensiles de la tente; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'la table et ses ustensiles, le chandelier d’or pur et tous ses ustensiles, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'l’autel des parfums; l’autel des holocaustes et tous ses ustensiles, la cuve avec sa base; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'les vêtements d’office, les vêtements sacrés pour le sacrificateur Aaron, les vêtements de ses fils pour les fonctions du sacerdoce; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: l’huile d’onction, et le parfum odoriférant pour le sanctuaire. Ils se conformeront à tous les ordres que j’ai donnés.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le sabbat rappelé
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-17: cf. (Ex 20:8-11. Ge 2:1-3.) (No 15:32-36. Jé 17:21-27.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Parle aux enfants d’Israël, et dis-leur: Vous ne manquerez pas d’observer mes sabbats, car ce sera entre moi et vous, et parmi vos descendants, un signe auquel on connaîtra que je suis l’Éternel qui vous sanctifie. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:8
      metadata:
        usfm: EXO.20.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:12
      metadata:
        usfm: DEU.5.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 20:12
      metadata:
        usfm: EZK.20.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous observerez le sabbat, car il sera pour vous une chose sainte. Celui qui le profanera, sera puni de mort; celui qui fera quelque ouvrage ce jour-là, sera retranché du milieu de son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'On travaillera six jours; mais le septième jour est le sabbat, le jour du repos, consacré à l’Éternel. Celui qui fera quelque ouvrage le jour du sabbat, sera puni de mort. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les enfants d’Israël observeront le sabbat, en le célébrant, eux et leurs descendants, comme une alliance perpétuelle. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ce sera entre moi et les enfants d’Israël un signe qui devra durer à perpétuité; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 1:31
      metadata:
        usfm: GEN.1.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:2
      metadata:
        usfm: GEN.2.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: GEN.2.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:11
      metadata:
        usfm: EXO.20.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: car en six jours l’Éternel a fait les cieux et la terre, et le septième jour il a cessé son œuvre et il s’est reposé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les tables de la loi
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18: cf. De 9:9-11. Ex 34:1-4, 28.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lorsque l’Éternel eut achevé de parler à Moïse sur la montagne de Sinaï, il lui donna '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 32:16
      metadata:
        usfm: EXO.32.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: les deux tables du témoignage, tables de pierre, écrites du doigt de Dieu.
