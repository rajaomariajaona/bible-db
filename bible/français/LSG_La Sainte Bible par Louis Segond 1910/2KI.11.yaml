document_id: 2KI.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Athalie, reine de Juda
  - type: heading
    content: 'V. 1-3: cf. (2 Ch 22:2-3, 10-12; 24:7.) Ex 2:2.'
  - type: text
    content: 'Athalie, '
  - type: note
    content: 2 Ch 22:10.
  - type: text
    content: 'mère d’Achazia, voyant que son fils était mort, se leva et fit périr toute la race royale. '
  '10':
  - type: text
    content: 'Le sacrificateur remit aux chefs de centaines les lances et les boucliers qui provenaient du roi David, et qui se trouvaient dans la maison de l’Éternel. '
  '11':
  - type: text
    content: 'Les coureurs, chacun les armes à la main, entourèrent le roi, en se plaçant depuis le côté droit jusqu’au côté gauche de la maison, près de l’autel et près de la maison. '
  '12':
  - type: text
    content: 'Le sacrificateur fit avancer le fils du roi, et il mit sur lui le diadème et le témoignage. Ils l’établirent roi et l’oignirent, et frappant des mains, ils dirent: Vive le roi! '
  '13':
  - type: text
    content: 'Athalie entendit le bruit des coureurs et du peuple, et elle vint vers le peuple à la maison de l’Éternel. '
  '14':
  - type: text
    content: 'Elle regarda. Et voici, le roi se tenait sur l’estrade, selon l’usage; les chefs et les trompettes étaient près du roi: tout le peuple du pays était dans la joie, et l’on sonnait des trompettes. Athalie déchira ses vêtements, et cria: Conspiration! Conspiration! '
  '15':
  - type: text
    content: 'Alors le sacrificateur Jehojada donna cet ordre aux chefs de centaines, qui étaient à la tête de l’armée: Faites-la sortir en dehors des rangs, et tuez par l’épée quiconque la suivra. Car le sacrificateur avait dit: Qu’elle ne soit pas mise à mort dans la maison de l’Éternel! '
  '16':
  - type: text
    content: 'On lui fit place, et elle se rendit à la maison du roi par le chemin de l’entrée des chevaux: c’est là qu’elle fut tuée. '
  '17':
  - type: note
    content: 2 Ch 23:16.
  - type: text
    content: 'Jehojada traita entre l’Éternel, le roi et le peuple, l’alliance par laquelle ils devaient être le peuple de l’Éternel; il établit aussi l’alliance entre le roi et le peuple. '
  '18':
  - type: text
    content: 'Tout le peuple du pays entra dans la maison de Baal, et ils la démolirent; ils brisèrent entièrement ses autels et ses images, et ils tuèrent devant les autels Matthan, prêtre de Baal. Le sacrificateur Jehojada mit des surveillants dans la maison de l’Éternel. '
  '19':
  - type: text
    content: 'Il prit les chefs de centaines, les Kéréthiens et les coureurs, et tout le peuple du pays; et ils firent descendre le roi de la maison de l’Éternel, et ils entrèrent dans la maison du roi par le chemin de la porte des coureurs. Et Joas s’assit sur le trône des rois. '
  '2':
  - type: text
    content: 'Mais Joschéba, fille du roi Joram, sœur d’Achazia, prit Joas, fils d’Achazia, et l’enleva du milieu des fils du roi, quand on les fit mourir: elle le mit avec sa nourrice dans la chambre des lits. Il fut ainsi dérobé aux regards d’Athalie, et ne fut point mis à mort. '
  '20':
  - type: text
    content: Tout le peuple du pays se réjouissait, et la ville était tranquille. On avait fait mourir Athalie par l’épée dans la maison du roi.
  - type: heading
    content: Joas, roi de Juda. Le temple réparé
  - type: heading
    content: '11 v. 21 à 12 v. 16: cf. 2 Ch 24:1-16. 1 Ch 19:3-5, 14, 16.'
  '21':
  - type: text
    content: Joas avait sept ans lorsqu’il devint roi.
  '3':
  - type: text
    content: Il resta six ans caché avec Joschéba dans la maison de l’Éternel. Et c’était Athalie qui régnait dans le pays.
  - type: heading
    content: 'V. 4-20: cf. 2 Ch 23. Lu 19:38.'
  '4':
  - type: text
    content: 'La '
  - type: note
    content: 2 Ch 23:1.
  - type: text
    content: 'septième année, Jehojada envoya chercher les chefs de centaines des Kéréthiens et des coureurs, et il les fit venir auprès de lui dans la maison de l’Éternel. Il traita alliance avec eux et les fit jurer dans la maison de l’Éternel, et il leur montra le fils du roi. '
  '5':
  - type: text
    content: 'Puis il leur donna ses ordres, en disant: Voici ce que vous ferez. Parmi ceux de vous qui entrent en service le jour du sabbat, un tiers doit monter la garde à la maison du roi, '
  '6':
  - type: text
    content: 'un tiers à la porte de Sur, et un tiers à la porte derrière les coureurs: vous veillerez à la garde de la maison, de manière à en empêcher l’entrée. '
  '7':
  - type: text
    content: 'Vos deux autres divisions, tous ceux qui sortent de service le jour du sabbat feront la garde de la maison de l’Éternel auprès du roi: '
  '8':
  - type: text
    content: 'vous entourerez le roi de toutes parts, chacun les armes à la main, et l’on donnera la mort à quiconque s’avancera dans les rangs; vous serez près du roi quand il sortira et quand il entrera. '
  '9':
  - type: note
    content: 2 Ch 23:8.
  - type: text
    content: 'Les chefs de centaines exécutèrent tous les ordres qu’avait donnés le sacrificateur Jehojada. Ils prirent chacun leurs gens, ceux qui entraient en service et ceux qui sortaient de service le jour du sabbat, et ils se rendirent vers le sacrificateur Jehojada. '
