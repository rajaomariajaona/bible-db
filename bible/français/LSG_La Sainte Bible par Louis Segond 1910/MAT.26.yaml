  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Et il vint vers les disciples, qu’il trouva endormis, et il dit à Pierre: '
  - type: usfm
