document_id: MAT.26,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Histoire de la passion. Complot contre Jésus
  - type: heading
    content: 'V. 1-5: cf. (Mc 14:1, 2. Lu 22:1, 2.)'
  - type: text
    content: 'Lorsque Jésus eut achevé tous ces discours, il dit à ses disciples:'
  '10':
  - type: text
    content: 'Jésus, s’en étant aperçu, leur dit: '
  - type: text
    content: Pourquoi faites-vous de la peine à cette femme? Elle a fait une bonne action à mon égard;
  '11':
  - type: text
    content: ' '
  - type: note
    content: De 15:11. Mc 14:7. Jn 12:8.
  - type: text
    content: car vous avez toujours des pauvres avec vous, mais vous ne m’avez pas toujours.
  - type: text
    content: ' '
  '12':
  - type: text
    content: En répandant ce parfum sur mon corps, elle l’a fait pour ma sépulture.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Je vous le dis en vérité, partout où cette bonne nouvelle sera prêchée, dans le monde entier, on racontera aussi en mémoire de cette femme ce qu’elle a fait.
  - type: heading
    content: Trahison de Judas
  - type: heading
    content: 'V. 14-16: cf. (Mc 14:10, 11. Lu 22:3-6.) Ex 12:3.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Mc 14:10. Lu 22:4.
  - type: text
    content: 'Alors l’un des douze, appelé Judas Iscariot, alla vers les principaux sacrificateurs, '
  '15':
  - type: text
    content: 'et dit: Que voulez-vous me donner, et je vous le livrerai? Et ils lui payèrent '
  - type: note
    content: Za 11:12.
  - type: text
    content: 'trente pièces d’argent. '
  '16':
  - type: text
    content: Depuis ce moment, il cherchait une occasion favorable pour livrer Jésus.
  - type: heading
    content: Célébration de la Pâque et institution de la sainte cène
  - type: heading
    content: 'V. 17-25: cf. Mc 14:12-21. Lu 22:7-18, 21-23. Jn 13:1-30.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: Mc 14:12. Lu 22:7.
  - type: text
    content: 'Le premier jour '
  - type: note
    content: Ex 12:17.
  - type: text
    content: 'des pains sans levain, les disciples s’adressèrent à Jésus, pour lui dire: Où veux-tu que nous te préparions le repas de la Pâque? '
  '18':
  - type: text
    content: 'Il répondit: '
  - type: text
    content: 'Allez à la ville chez un tel, et vous lui direz: Le maître dit: Mon temps est proche; je ferai chez toi la Pâque avec mes disciples.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Les disciples firent ce que Jésus leur avait ordonné, et ils préparèrent la Pâque. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Mc 14:1. Lu 22:1. Jn 13:1.
  - type: text
    content: Vous savez que la Pâque a lieu dans deux jours, et que le Fils de l’homme sera livré pour être crucifié.
  - type: text
    content: ' '
  '20':
  - type: note
    content: Mc 14:17. Lu 22:14. Jn 13:21.
  - type: text
    content: 'Le soir étant venu, il se mit à table avec les douze. '
  '21':
  - type: text
    content: 'Pendant qu’ils mangeaient, il dit: '
  - type: text
    content: Je vous le dis en vérité,
  - type: text
    content: ' '
  - type: note
    content: Ac 1:17.
  - type: text
    content: l’un de vous me livrera.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Ils furent profondément attristés, et chacun se mit à lui dire: Est-ce moi, Seigneur? '
  '23':
  - type: text
    content: 'Il répondit: '
  - type: note
    content: Ps 41:10. Lu 22:21. Jn 13:18.
  - type: text
    content: Celui qui a mis avec moi la main dans le plat, c’est celui qui me livrera.
  '24':
  - type: text
    content: ' '
  - type: text
    content: Le Fils de l’homme s’en va, selon ce qui est écrit de lui. Mais malheur à l’homme par qui le Fils de l’homme est livré! Mieux vaudrait pour cet homme qu’il ne fût pas né.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Judas, qui le livrait, prit la parole et dit: Est-ce moi, Rabbi? Jésus lui répondit: '
  - type: text
    content: Tu l’as dit.
  - type: heading
    content: 'V. 26-29: cf. (Mc 14:22-25. Lu 22:15-20. 1 Co 11:23-25.) (1 Co 10:16, 17.)'
  '26':
  - type: text
    content: ' '
  - type: note
    content: Mc 14:22. Lu 22:19. 1 Co 11:23.
  - type: text
    content: 'Pendant qu’ils mangeaient, Jésus prit du pain; et, après avoir rendu grâces, il le rompit, et le donna aux disciples, en disant: '
  - type: text
    content: Prenez, mangez, ceci est mon corps.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Il prit ensuite une coupe; et, après avoir rendu grâces, il la leur donna, en disant: '
  - type: text
    content: Buvez-en tous;
  '28':
  - type: text
    content: ' '
  - type: text
    content: car ceci est mon sang,
  - type: text
    content: ' '
  - type: note
    content: Ex 24:8.
  - type: text
    content: le sang de l’alliance, qui est répandu pour plusieurs, pour la rémission des péchés.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Je vous le dis, je ne boirai plus désormais de ce fruit de la vigne, jusqu’au jour où j’en boirai du nouveau avec vous dans le royaume de mon Père.
  - type: heading
    content: Gethsémané
  - type: heading
    content: 'V. 30-35: cf. Mc 14:26-31. Lu 22:31-39. Jn 13:36-38.'
  '3':
  - type: note
    content: Ps 2:2. Jn 11:47. Ac 4:27.
  - type: text
    content: 'Alors les principaux sacrificateurs et les anciens du peuple se réunirent dans la cour du souverain sacrificateur, appelé Caïphe; '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Mc 14:26. Lu 22:39. Jn 18:1.
  - type: text
    content: 'Après avoir chanté les cantiques, ils se rendirent à la montagne des oliviers. '
  '31':
  - type: text
    content: 'Alors Jésus leur dit: '
  - type: text
    content: 'Je serai pour vous tous, cette nuit, une occasion de chute; car il est écrit:'
  - type: text
    content: ' '
  - type: note
    content: Za 13:7. Jn 16:32.
  - type: text
    content: Je frapperai le berger, et les brebis du troupeau seront dispersées.
  '32':
  - type: text
    content: ' '
  - type: note
    content: Mc 14:28; 16:7.
  - type: text
    content: Mais, après que je serai ressuscité, je vous précèderai en Galilée.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Pierre, prenant la parole, lui dit: '
  - type: note
    content: Lu 22:33.
  - type: text
    content: 'Quand tu serais pour tous une occasion de chute, tu ne le seras jamais pour moi. '
  '34':
  - type: text
    content: 'Jésus lui dit: '
  - type: note
    content: Jn 13:38.
  - type: text
    content: Je te le dis en vérité, cette nuit même, avant que le coq chante, tu me renieras trois fois.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Pierre lui répondit: Quand il me faudrait mourir avec toi, je ne te renierai pas. Et tous les disciples dirent la même chose.'
  - type: heading
    content: 'V. 36-46: cf. Mc 14:32-42. Lu 22:39-46. Jn 18:1. (Hé 5:7.)'
  '36':
  - type: text
    content: ' '
  - type: note
    content: Mc 14:32. Lu 22:39. Jn 18:1.
  - type: text
    content: 'Là-dessus, Jésus alla avec eux dans un lieu appelé Gethsémané, et il dit aux disciples: '
  - type: text
    content: Asseyez-vous ici, pendant que je m’éloignerai pour prier.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Il prit avec lui Pierre et les deux fils de Zébédée, et il commença à éprouver de la tristesse et des angoisses. '
  '38':
  - type: note
    content: Jn 12:27.
  - type: text
    content: 'Il leur dit alors: '
  - type: text
    content: Mon âme est triste jusqu’à la mort; restez ici, et veillez avec moi.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Puis, ayant fait quelques pas en avant, il se jeta sur sa face, et pria ainsi: '
  - type: note
    content: Lu 22:41.
  - type: text
    content: Mon Père, s’il est possible, que cette
  - type: text
    content: ' '
  - type: note
    content: Mt 20:22, 23.
  - type: text
    content: coupe s’éloigne de moi!
  - type: text
    content: ' '
  - type: note
    content: Jn 6:38.
  - type: text
    content: Toutefois, non pas ce que je veux, mais ce que tu veux.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'et ils délibérèrent sur les moyens d’arrêter Jésus par ruse, et de le faire mourir. '
  '40':
  - type: text
    content: 'Et il vint vers les disciples, qu’il trouva endormis, et il dit à Pierre: '
  - type: text
    content: Vous n’avez donc pu veiller une heure avec moi!
  '41':
  - type: text
    content: ' '
  - type: text
    content: Veillez et priez, afin que vous ne tombiez pas dans la tentation;
  - type: text
    content: ' '
  - type: note
    content: Ga 5:17.
  - type: text
    content: l’esprit est bien disposé, mais la chair est faible.
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'Il s’éloigna une seconde fois, et pria ainsi: '
  - type: text
    content: Mon Père, s’il n’est pas possible que cette coupe s’éloigne sans que je la boive, que ta volonté soit faite!
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'Il revint, et les trouva encore endormis; car leurs yeux étaient appesantis. '
  '44':
  - type: text
    content: 'Il les quitta, et, s’éloignant, il pria pour la troisième fois, répétant les mêmes paroles. '
  '45':
  - type: text
    content: 'Puis il alla vers ses disciples, et leur dit: '
  - type: text
    content: Vous dormez maintenant, et vous vous reposez! Voici, l’heure est proche, et le Fils de l’homme est livré aux mains des pécheurs.
  '46':
  - type: text
    content: ' '
  - type: text
    content: Levez-vous, allons; voici, celui qui me livre s’approche.
  - type: heading
    content: Arrestation de Jésus
  - type: heading
    content: 'V. 47-56: cf. Mc 14:43-50. Lu 22:47-53. Jn 18:3-11.'
  '47':
  - type: text
    content: ' '
  - type: note
    content: Mc 14:43. Lu 22:47. Jn 18:3.
  - type: text
    content: 'Comme il parlait encore, voici, Judas, l’un des douze, arriva, et avec lui une foule nombreuse armée d’épées et de bâtons, envoyée par les principaux sacrificateurs et par les anciens du peuple. '
  '48':
  - type: text
    content: 'Celui qui le livrait leur avait donné ce signe: Celui que je baiserai, c’est lui; saisissez-le. '
  '49':
  - type: text
    content: 'Aussitôt, s’approchant de Jésus, il dit: Salut, Rabbi! '
  - type: note
    content: 2 S 20:9.
  - type: text
    content: 'Et il le baisa. '
  '5':
  - type: text
    content: 'Mais ils dirent: Que ce ne soit pas pendant la fête, afin qu’il n’y ait pas de tumulte parmi le peuple.'
  - type: heading
    content: Parfum répandu sur la tête de Jésus à Béthanie
  - type: heading
    content: 'V. 6-13: cf. (Mc 14:3-9. Jn 12:1-8.) Lu 7:36-50.'
  '50':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: Mon ami, ce que tu es venu faire, fais-le.
  - type: text
    content: ' Alors ces gens s’avancèrent, mirent la main sur Jésus, et le saisirent. '
  '51':
  - type: text
    content: 'Et voici, un de ceux qui étaient avec Jésus étendit la main, et tira son épée; il frappa le serviteur du souverain sacrificateur, et lui emporta l’oreille. '
  '52':
  - type: text
    content: 'Alors Jésus lui dit: '
  - type: text
    content: Remets ton épée à sa place;
  - type: text
    content: ' '
  - type: note
    content: Ge 9:6. Ap 13:10.
  - type: text
    content: car tous ceux qui prendront l’épée périront par l’épée.
  '53':
  - type: text
    content: ' '
  - type: text
    content: Penses-tu que je ne puisse pas invoquer mon Père, qui me donnerait à l’instant plus de douze légions d’anges?
  - type: text
    content: ' '
  '54':
  - type: text
    content: Comment donc s’accompliraient les
  - type: text
    content: ' '
  - type: note
    content: Ps 22:7; 69:2, 10. Lu 24:25.
  - type: text
    content: Écritures, d’après lesquelles il doit en être ainsi?
  - type: text
    content: ' '
  '55':
  - type: text
    content: 'En ce moment, Jésus dit à la foule: '
  - type: text
    content: Vous êtes venus, comme après un brigand, avec des épées et des bâtons, pour vous emparer de moi. J’étais tous les jours assis parmi vous, enseignant dans le temple, et vous ne m’avez pas saisi.
  '56':
  - type: text
    content: ' '
  - type: text
    content: Mais tout cela est arrivé afin que les écrits des prophètes fussent accomplis.
  - type: text
    content: ' Alors tous les disciples l’abandonnèrent, et '
  - type: note
    content: Job 19:13. Ps 88:9.
  - type: text
    content: prirent la fuite.
  - type: heading
    content: Jésus devant le Sanhédrin présidé par Caïphe
  - type: heading
    content: 'V. 57-68: cf. Mc 14:53-65. Lu 22:54, 63-65. Jn 18:12; 13:19-24.'
  '57':
  - type: text
    content: ' '
  - type: note
    content: Mc 14:53. Lu 22:54. Jn 18:12.
  - type: text
    content: 'Ceux qui avaient saisi Jésus l’emmenèrent chez le souverain sacrificateur Caïphe, où les scribes et les anciens étaient assemblés. '
  '58':
  - type: text
    content: 'Pierre le suivit de loin jusqu’à la cour du souverain sacrificateur, y entra, et s’assit avec les serviteurs, pour voir comment cela finirait. '
  '59':
  - type: note
    content: Mc 14:55. Ac 6:13.
  - type: text
    content: 'Les principaux sacrificateurs et tout le sanhédrin cherchaient quelque faux témoignage contre Jésus, suffisant pour le faire mourir. '
  '6':
  - type: text
    content: 'Comme Jésus était à Béthanie, dans la maison de Simon le lépreux, '
  '60':
  - type: text
    content: 'Mais ils n’en trouvèrent point, quoique plusieurs faux témoins se fussent présentés. Enfin, il en vint deux, qui dirent: '
  '61':
  - type: text
    content: 'Celui-ci a dit: '
  - type: note
    content: Jn 2:19.
  - type: text
    content: 'Je puis détruire le temple de Dieu, et le rebâtir en trois jours. '
  '62':
  - type: note
    content: Mc 14:60.
  - type: text
    content: 'Le souverain sacrificateur se leva, et lui dit: Ne réponds-tu rien? Qu’est-ce que ces hommes déposent contre toi? '
  '63':
  - type: note
    content: És 53:7. Mt 27:12, 14.
  - type: text
    content: 'Jésus garda le silence. Et le souverain sacrificateur, prenant la parole, lui dit: Je t’adjure, par le Dieu vivant, de nous dire si tu es le Christ, le Fils de Dieu. '
  '64':
  - type: text
    content: 'Jésus lui répondit: '
  - type: text
    content: Tu l’as dit.
  - type: text
    content: ' '
  - type: note
    content: Ps 110:1. Da 7:13. Mt 16:27; 24:30. Mc 14:62. Lu 22:69. Ac 1:11. Ro 14:10. 1 Th 4:16. Ap 1:7.
  - type: text
    content: De plus, je vous le déclare, vous verrez désormais le Fils de l’homme assis à la droite de la puissance de Dieu, et venant sur les nuées du ciel.
  - type: text
    content: ' '
  '65':
  - type: text
    content: 'Alors le souverain sacrificateur déchira ses vêtements, disant: Il a blasphémé! Qu’avons-nous encore besoin de témoins? Voici, vous venez d’entendre son blasphème. Que vous en semble? '
  '66':
  - type: text
    content: 'Ils répondirent: '
  - type: note
    content: Lé 24:16.
  - type: text
    content: 'Il mérite la mort. '
  '67':
  - type: note
    content: És 50:6.
  - type: text
    content: 'Là-dessus, ils lui crachèrent au visage, et '
  - type: note
    content: Job 16:10. Jn 19:3.
  - type: text
    content: 'lui donnèrent des coups de poing et des soufflets en disant: '
  '68':
  - type: text
    content: 'Christ, prophétise; '
  - type: note
    content: Lu 22:64.
  - type: text
    content: dis-nous qui t’a frappé.
  - type: heading
    content: Reniement de Pierre
  - type: heading
    content: 'V. 69-75: cf. Mc 14:66-72. Lu 22:55-62. Jn 18:15-18, 25-27.'
  '69':
  - type: text
    content: ' '
  - type: note
    content: Mc 14:66. Lu 22:55. Jn 18:16, 25.
  - type: text
    content: 'Cependant, Pierre était assis dehors dans la cour. Une servante s’approcha de lui, et dit: Toi aussi, tu étais avec Jésus le Galiléen. '
  '7':
  - type: note
    content: Mc 14:3. Lu 7:37. Jn 11:2; 12:3.
  - type: text
    content: 'une femme s’approcha de lui, tenant un vase d’albâtre, qui renfermait un parfum de grand prix; et, pendant qu’il était à table, elle répandit le parfum sur sa tête. '
  '70':
  - type: text
    content: 'Mais il le nia devant tous, disant: Je ne sais ce que tu veux dire. '
  '71':
  - type: text
    content: 'Comme il se dirigeait vers la porte, une autre servante le vit, et dit à ceux qui se trouvaient là; Celui-ci était aussi avec Jésus de Nazareth. '
  '72':
  - type: text
    content: 'Il le nia de nouveau, avec serment: Je ne connais pas cet homme. '
  '73':
  - type: text
    content: 'Peu après, ceux qui étaient là, s’étant approchés, dirent à Pierre: Certainement tu es aussi de ces gens-là, car ton langage te fait reconnaître. '
  '74':
  - type: text
    content: 'Alors il se mit à faire des imprécations et à jurer: Je ne connais pas cet homme. Aussitôt le coq chanta. '
  '75':
  - type: text
    content: 'Et Pierre se souvint de la parole que Jésus avait dite: '
  - type: note
    content: Mt 26:34. Mc 14:30. Lu 22:61. Jn 13:38.
  - type: text
    content: Avant que le coq chante, tu me renieras trois fois.
  - type: text
    content: ' Et étant sorti, il pleura amèrement.'
  '8':
  - type: text
    content: 'Les disciples, voyant cela, s’indignèrent, et dirent: A quoi bon cette perte? '
  '9':
  - type: text
    content: 'On aurait pu vendre ce parfum très cher, et en donner le prix aux pauvres. '
