  - type: text
    text: 'Cependant, Pierre était assis dehors dans la cour. Une servante s’approcha de lui, et dit: Toi aussi, tu étais avec Jésus le Galiléen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'Mais il le nia devant tous, disant: Je ne sais ce que tu veux dire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Comme il se dirigeait vers la porte, une autre servante le vit, et dit à ceux qui se trouvaient là; Celui-ci était aussi avec Jésus de Nazareth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: 'Il le nia de nouveau, avec serment: Je ne connais pas cet homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: 'Peu après, ceux qui étaient là, s’étant approchés, dirent à Pierre: Certainement tu es aussi de ces gens-là, car ton langage te fait reconnaître. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: 'Alors il se mit à faire des imprécations et à jurer: Je ne connais pas cet homme. Aussitôt le coq chanta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: 'Et Pierre se souvint de la parole que Jésus avait dite: '
