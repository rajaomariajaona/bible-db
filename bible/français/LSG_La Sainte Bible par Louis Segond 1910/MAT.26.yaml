document_id: MAT.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Histoire de la passion. Complot contre Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. (Mc 14:1, 2. Lu 22:1, 2.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque Jésus eut achevé tous ces discours, il dit à ses disciples:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:1
      metadata:
        usfm: MRK.14.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:1
      metadata:
        usfm: LUK.22.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:1
      metadata:
        usfm: JHN.13.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous savez que la Pâque a lieu dans deux jours, et que le Fils de l’homme sera livré pour être crucifié.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 2:2
      metadata:
        usfm: PSA.2.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 11:47
      metadata:
        usfm: JHN.11.47
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:27
      metadata:
        usfm: ACT.4.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors les principaux sacrificateurs et les anciens du peuple se réunirent dans la cour du souverain sacrificateur, appelé Caïphe; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et ils délibérèrent sur les moyens d’arrêter Jésus par ruse, et de le faire mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais ils dirent: Que ce ne soit pas pendant la fête, afin qu’il n’y ait pas de tumulte parmi le peuple.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parfum répandu sur la tête de Jésus à Béthanie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-13: cf. (Mc 14:3-9. Jn 12:1-8.) Lu 7:36-50.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Comme Jésus était à Béthanie, dans la maison de Simon le lépreux, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:3
      metadata:
        usfm: MRK.14.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 7:37
      metadata:
        usfm: LUK.7.37
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 11:2
      metadata:
        usfm: JHN.11.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:3
      metadata:
        usfm: JHN.12.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une femme s’approcha de lui, tenant un vase d’albâtre, qui renfermait un parfum de grand prix; et, pendant qu’il était à table, elle répandit le parfum sur sa tête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les disciples, voyant cela, s’indignèrent, et dirent: A quoi bon cette perte? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'On aurait pu vendre ce parfum très cher, et en donner le prix aux pauvres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus, s’en étant aperçu, leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi faites-vous de la peine à cette femme? Elle a fait une bonne action à mon égard;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 15:11
      metadata:
        usfm: DEU.15.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:7
      metadata:
        usfm: MRK.14.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:8
      metadata:
        usfm: JHN.12.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car vous avez toujours des pauvres avec vous, mais vous ne m’avez pas toujours.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En répandant ce parfum sur mon corps, elle l’a fait pour ma sépulture.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous le dis en vérité, partout où cette bonne nouvelle sera prêchée, dans le monde entier, on racontera aussi en mémoire de cette femme ce qu’elle a fait.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Trahison de Judas
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-16: cf. (Mc 14:10, 11. Lu 22:3-6.) Ex 12:3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:10
      metadata:
        usfm: MRK.14.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:4
      metadata:
        usfm: LUK.22.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors l’un des douze, appelé Judas Iscariot, alla vers les principaux sacrificateurs, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et dit: Que voulez-vous me donner, et je vous le livrerai? Et ils lui payèrent '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 11:12
      metadata:
        usfm: ZEC.11.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'trente pièces d’argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Depuis ce moment, il cherchait une occasion favorable pour livrer Jésus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Célébration de la Pâque et institution de la sainte cène
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-25: cf. Mc 14:12-21. Lu 22:7-18, 21-23. Jn 13:1-30.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:12
      metadata:
        usfm: MRK.14.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:7
      metadata:
        usfm: LUK.22.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le premier jour '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:17
      metadata:
        usfm: EXO.12.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des pains sans levain, les disciples s’adressèrent à Jésus, pour lui dire: Où veux-tu que nous te préparions le repas de la Pâque? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Allez à la ville chez un tel, et vous lui direz: Le maître dit: Mon temps est proche; je ferai chez toi la Pâque avec mes disciples.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les disciples firent ce que Jésus leur avait ordonné, et ils préparèrent la Pâque. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:17
      metadata:
        usfm: MRK.14.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:14
      metadata:
        usfm: LUK.22.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:21
      metadata:
        usfm: JHN.13.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le soir étant venu, il se mit à table avec les douze. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Pendant qu’ils mangeaient, il dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous le dis en vérité,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:17
      metadata:
        usfm: ACT.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: l’un de vous me livrera.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils furent profondément attristés, et chacun se mit à lui dire: Est-ce moi, Seigneur? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 41:10
      metadata:
        usfm: PSA.41.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:21
      metadata:
        usfm: LUK.22.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:18
      metadata:
        usfm: JHN.13.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui a mis avec moi la main dans le plat, c’est celui qui me livrera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le Fils de l’homme s’en va, selon ce qui est écrit de lui. Mais malheur à l’homme par qui le Fils de l’homme est livré! Mieux vaudrait pour cet homme qu’il ne fût pas né.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Judas, qui le livrait, prit la parole et dit: Est-ce moi, Rabbi? Jésus lui répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tu l’as dit.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 26-29: cf. (Mc 14:22-25. Lu 22:15-20. 1 Co 11:23-25.) (1 Co 10:16, 17.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:22
      metadata:
        usfm: MRK.14.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:19
      metadata:
        usfm: LUK.22.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 11:23
      metadata:
        usfm: 1CO.11.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pendant qu’ils mangeaient, Jésus prit du pain; et, après avoir rendu grâces, il le rompit, et le donna aux disciples, en disant: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Prenez, mangez, ceci est mon corps.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il prit ensuite une coupe; et, après avoir rendu grâces, il la leur donna, en disant: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Buvez-en tous;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car ceci est mon sang,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 24:8
      metadata:
        usfm: EXO.24.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: le sang de l’alliance, qui est répandu pour plusieurs, pour la rémission des péchés.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous le dis, je ne boirai plus désormais de ce fruit de la vigne, jusqu’au jour où j’en boirai du nouveau avec vous dans le royaume de mon Père.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Gethsémané
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 30-35: cf. Mc 14:26-31. Lu 22:31-39. Jn 13:36-38.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:26
      metadata:
        usfm: MRK.14.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:39
      metadata:
        usfm: LUK.22.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 18:1
      metadata:
        usfm: JHN.18.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Après avoir chanté les cantiques, ils se rendirent à la montagne des oliviers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je serai pour vous tous, cette nuit, une occasion de chute; car il est écrit:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 13:7
      metadata:
        usfm: ZEC.13.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 16:32
      metadata:
        usfm: JHN.16.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je frapperai le berger, et les brebis du troupeau seront dispersées.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:28
      metadata:
        usfm: MRK.14.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:7
      metadata:
        usfm: MRK.16.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais, après que je serai ressuscité, je vous précèderai en Galilée.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Pierre, prenant la parole, lui dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:33
      metadata:
        usfm: LUK.22.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand tu serais pour tous une occasion de chute, tu ne le seras jamais pour moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus lui dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:38
      metadata:
        usfm: JHN.13.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je te le dis en vérité, cette nuit même, avant que le coq chante, tu me renieras trois fois.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Pierre lui répondit: Quand il me faudrait mourir avec toi, je ne te renierai pas. Et tous les disciples dirent la même chose.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 36-46: cf. Mc 14:32-42. Lu 22:39-46. Jn 18:1. (Hé 5:7.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:32
      metadata:
        usfm: MRK.14.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:39
      metadata:
