        - type: text
          text: Jn 18:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Comme il parlait encore, voici, Judas, l’un des douze, arriva, et avec lui une foule nombreuse armée d’épées et de bâtons, envoyée par les principaux sacrificateurs et par les anciens du peuple. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui le livrait leur avait donné ce signe: Celui que je baiserai, c’est lui; saisissez-le. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussitôt, s’approchant de Jésus, il dit: Salut, Rabbi! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 20:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et il le baisa. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ils dirent: Que ce ne soit pas pendant la fête, afin qu’il n’y ait pas de tumulte parmi le peuple.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parfum répandu sur la tête de Jésus à Béthanie
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-13: cf. (Mc 14:3-9. Jn 12:1-8.) Lu 7:36-50.'
    marker-yv: yv-h
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mon ami, ce que tu es venu faire, fais-le.
    - type: text
      text: ' Alors ces gens s’avancèrent, mirent la main sur Jésus, et le saisirent. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici, un de ceux qui étaient avec Jésus étendit la main, et tira son épée; il frappa le serviteur du souverain sacrificateur, et lui emporta l’oreille. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Remets ton épée à sa place;
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 9:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 13:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: car tous ceux qui prendront l’épée périront par l’épée.
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Penses-tu que je ne puisse pas invoquer mon Père, qui me donnerait à l’instant plus de douze légions d’anges?
    - type: text
      text: ' '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Comment donc s’accompliraient les
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 22:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 69:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 24:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Écritures, d’après lesquelles il doit en être ainsi?
    - type: text
      text: ' '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce moment, Jésus dit à la foule: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous êtes venus, comme après un brigand, avec des épées et des bâtons, pour vous emparer de moi. J’étais tous les jours assis parmi vous, enseignant dans le temple, et vous ne m’avez pas saisi.
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais tout cela est arrivé afin que les écrits des prophètes fussent accomplis.
    - type: text
      text: ' Alors tous les disciples l’abandonnèrent, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 19:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 88:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: prirent la fuite.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus devant le Sanhédrin présidé par Caïphe
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 57-68: cf. Mc 14:53-65. Lu 22:54, 63-65. Jn 18:12; 13:19-24.'
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:53
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:54
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 18:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ceux qui avaient saisi Jésus l’emmenèrent chez le souverain sacrificateur Caïphe, où les scribes et les anciens étaient assemblés. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre le suivit de loin jusqu’à la cour du souverain sacrificateur, y entra, et s’assit avec les serviteurs, pour voir comment cela finirait. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:55
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 6:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les principaux sacrificateurs et tout le sanhédrin cherchaient quelque faux témoignage contre Jésus, suffisant pour le faire mourir. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme Jésus était à Béthanie, dans la maison de Simon le lépreux, '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ils n’en trouvèrent point, quoique plusieurs faux témoins se fussent présentés. Enfin, il en vint deux, qui dirent: '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui-ci a dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 2:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je puis détruire le temple de Dieu, et le rebâtir en trois jours. '
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:60
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le souverain sacrificateur se leva, et lui dit: Ne réponds-tu rien? Qu’est-ce que ces hommes déposent contre toi? '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 53:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus garda le silence. Et le souverain sacrificateur, prenant la parole, lui dit: Je t’adjure, par le Dieu vivant, de nous dire si tu es le Christ, le Fils de Dieu. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu l’as dit.
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 110:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Da 7:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:62
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:69
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 14:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 4:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 1:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: De plus, je vous le déclare, vous verrez désormais le Fils de l’homme assis à la droite de la puissance de Dieu, et venant sur les nuées du ciel.
    - type: text
      text: ' '
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le souverain sacrificateur déchira ses vêtements, disant: Il a blasphémé! Qu’avons-nous encore besoin de témoins? Voici, vous venez d’entendre son blasphème. Que vous en semble? '
  '66':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils répondirent: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 24:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il mérite la mort. '
  '67':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 50:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Là-dessus, ils lui crachèrent au visage, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 16:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 19:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'lui donnèrent des coups de poing et des soufflets en disant: '
  '68':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Christ, prophétise; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:64
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: dis-nous qui t’a frappé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Reniement de Pierre
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 69-75: cf. Mc 14:66-72. Lu 22:55-62. Jn 18:15-18, 25-27.'
    marker-yv: yv-h
  '69':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:66
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:55
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 18:16
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Cependant, Pierre était assis dehors dans la cour. Une servante s’approcha de lui, et dit: Toi aussi, tu étais avec Jésus le Galiléen. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 7:37
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 11:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'une femme s’approcha de lui, tenant un vase d’albâtre, qui renfermait un parfum de grand prix; et, pendant qu’il était à table, elle répandit le parfum sur sa tête. '
  '70':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il le nia devant tous, disant: Je ne sais ce que tu veux dire. '
  '71':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme il se dirigeait vers la porte, une autre servante le vit, et dit à ceux qui se trouvaient là; Celui-ci était aussi avec Jésus de Nazareth. '
  '72':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il le nia de nouveau, avec serment: Je ne connais pas cet homme. '
  '73':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peu après, ceux qui étaient là, s’étant approchés, dirent à Pierre: Certainement tu es aussi de ces gens-là, car ton langage te fait reconnaître. '
  '74':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors il se mit à faire des imprécations et à jurer: Je ne connais pas cet homme. Aussitôt le coq chanta. '
  '75':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Pierre se souvint de la parole que Jésus avait dite: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:61
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 13:38
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Avant que le coq chante, tu me renieras trois fois.
    - type: text
      text: ' Et étant sorti, il pleura amèrement.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les disciples, voyant cela, s’indignèrent, et dirent: A quoi bon cette perte? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On aurait pu vendre ce parfum très cher, et en donner le prix aux pauvres. '
