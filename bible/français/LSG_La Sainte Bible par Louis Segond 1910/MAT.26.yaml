  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mon ami, ce que tu es venu faire, fais-le.
  - type: text
    text: ' Alors ces gens s’avancèrent, mirent la main sur Jésus, et le saisirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
