document_id: PHP.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: heading
    content: 'V. 1-2: cf. 2 Co 1:1, 2. Col 1:1, 2. 1 Th 1:1.'
  - type: text
    content: 'Paul et Timothée, serviteurs de Jésus-Christ, à tous les saints en Jésus-Christ qui sont à Philippes, aux évêques et aux diacres: '
  '10':
  - type: text
    content: 'pour le discernement des choses les meilleures, afin que vous soyez purs et irréprochables pour le jour de Christ, '
  '11':
  - type: text
    content: remplis du fruit de justice qui est par Jésus-Christ, à la gloire et à la louange de Dieu.
  - type: heading
    content: La captivité de l’apôtre utile aux progrès de l’Évangile
  - type: heading
    content: 'V. 12-26: cf. Ac 8:1-5. Mc 9:38-40. (Ro 14:7, 8. 2 Co 5:1-8.)'
  '12':
  - type: text
    content: 'Je veux que vous sachiez, frères, que ce qui m’est arrivé a plutôt contribué aux progrès de l’Évangile. '
  '13':
  - type: text
    content: 'En effet, dans tout le prétoire et partout ailleurs, nul n’ignore que c’est pour Christ que je suis dans les liens, '
  '14':
  - type: note
    content: Ép 3:13. 1 Th 3:3.
  - type: text
    content: 'et la plupart des frères dans le Seigneur, encouragés par mes liens, ont plus d’assurance pour annoncer sans crainte la parole. '
  '15':
  - type: text
    content: 'Quelques-uns, il est vrai, prêchent Christ par envie et par esprit de dispute; mais d’autres le prêchent avec des dispositions bienveillantes. '
  '16':
  - type: text
    content: 'Ceux-ci agissent par amour, sachant que je suis établi pour la défense de l’Évangile, '
  '17':
  - type: text
    content: 'tandis que ceux-là, animés d’un esprit de dispute, annoncent Christ par des motifs qui ne sont pas purs et avec la pensée de me susciter quelque tribulation dans mes liens. '
  '18':
  - type: text
    content: 'Qu’importe? De toute manière, que ce soit pour l’apparence, que ce soit sincèrement, Christ n’est pas moins annoncé: je m’en réjouis, et je m’en réjouirai encore. '
  '19':
  - type: note
    content: 2 Co 1:11.
  - type: text
    content: 'Car je sais que cela tournera à mon salut, grâce à vos prières et à l’assistance de l’Esprit de Jésus-Christ, '
  '2':
  - type: note
    content: Ro 1:7. 1 Pi 1:2.
  - type: text
    content: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
  - type: heading
    content: Sentiments affectueux de Paul pour les Philippiens, à cause de leur attachement à l’Évangile
  - type: heading
    content: 'V. 3-11: cf. Col 1:3-11.'
  '20':
  - type: text
    content: 'selon ma ferme attente et mon espérance '
  - type: note
    content: Ro 5:5.
  - type: text
    content: 'que je n’aurai honte de rien, mais que, maintenant comme toujours, Christ sera glorifié dans mon corps avec une pleine assurance, soit par ma vie, soit par ma mort; '
  '21':
  - type: text
    content: 'car Christ est ma vie, et la mort m’est un gain. '
  '22':
  - type: text
    content: 'Mais s’il est utile pour mon œuvre que je vive dans la chair, je ne saurais dire ce que je dois préférer. '
  '23':
  - type: text
    content: 'Je suis pressé des deux côtés: j’ai le désir de m’en aller et d’être avec Christ, ce qui de beaucoup est le meilleur; '
  '24':
  - type: text
    content: 'mais à cause de vous il est plus nécessaire que je demeure dans la chair. '
  '25':
  - type: text
    content: 'Et je suis persuadé, je sais que je demeurerai et que je resterai avec vous tous, pour votre avancement et pour votre joie dans la foi, '
  '26':
  - type: text
    content: afin que, par mon retour auprès de vous, vous ayez en moi un abondant sujet de vous glorifier en Jésus-Christ.
  - type: heading
    content: Exhortation à la persévérance, à l’union fraternelle, à l’humilité, et à la sainteté
  - type: heading
    content: 'V. 27-30: cf. 1 Th 2:12-16. 2 Th 1:4-12. Ac 14:22. Hé 10:32-36. Ap 2:10.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: Ge 17:1. 1 Co 7:20. Ép 4:1. Col 1:10. 1 Th 2:12; 4:1.
  - type: text
    content: 'Seulement, conduisez-vous d’une manière digne de l’Évangile de Christ, afin que, soit que je vienne vous voir, soit que je reste absent, j’entende dire de vous que vous demeurez fermes dans un même esprit, combattant d’une même âme pour la foi de l’Évangile, '
  '28':
  - type: text
    content: 'sans vous laisser aucunement effrayer par les adversaires, ce qui est pour eux une preuve de perdition, mais pour vous de salut; '
  '29':
  - type: text
    content: 'et cela de la part de Dieu, car il vous a été fait la grâce, par rapport à Christ, non seulement de croire en lui, mais encore de souffrir pour lui, '
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ép 1:15. Col 1:3. 1 Th 1:2. 2 Th 1:3.
  - type: text
    content: 'Je rends grâces à mon Dieu de tout le souvenir que je garde de vous, '
  '30':
  - type: text
    content: en soutenant le même combat que vous m’avez vu soutenir, et que vous apprenez maintenant que je soutiens.
  '4':
  - type: text
    content: 'ne cessant, dans toutes mes prières pour vous tous, '
  '5':
  - type: text
    content: 'de manifester ma joie au sujet de la part que vous prenez à l’Évangile, depuis le premier jour jusqu’à maintenant. '
  '6':
  - type: text
    content: 'Je suis persuadé que celui qui a commencé en vous '
  - type: note
    content: Jn 6:29. 1 Th 1:3.
  - type: text
    content: 'cette bonne œuvre la rendra parfaite pour le jour de Jésus-Christ. '
  '7':
  - type: text
    content: 'Il est juste que je pense ainsi de vous tous, parce que je vous porte dans mon cœur, soit '
  - type: note
    content: Ép 3:1; 4:1. Col 4:3, 18. 2 Ti 1:8.
  - type: text
    content: 'dans mes liens, soit dans la défense et la confirmation de l’Évangile, vous qui tous participez à la même grâce que moi. '
  '8':
  - type: note
    content: Ro 1:9; 9:1. 2 Co 1:23; 11:31. Ga 1:20. 1 Th 2:5. 1 Ti 5:21. 2 Ti 4:1.
  - type: text
    content: 'Car Dieu m’est témoin que je vous chéris tous avec la tendresse de Jésus-Christ. '
  '9':
  - type: text
    content: 'Et ce que je demande dans mes prières, c’est que votre amour augmente de plus en plus en connaissance et en pleine intelligence '
