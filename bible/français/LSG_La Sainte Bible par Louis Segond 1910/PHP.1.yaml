document_id: PHP.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Adresse et salutation
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-2: cf. 2 Co 1:1, 2. Col 1:1, 2. 1 Th 1:1.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul et Timothée, serviteurs de Jésus-Christ, à tous les saints en Jésus-Christ qui sont à Philippes, aux évêques et aux diacres: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour le discernement des choses les meilleures, afin que vous soyez purs et irréprochables pour le jour de Christ, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: remplis du fruit de justice qui est par Jésus-Christ, à la gloire et à la louange de Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La captivité de l’apôtre utile aux progrès de l’Évangile
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-26: cf. Ac 8:1-5. Mc 9:38-40. (Ro 14:7, 8. 2 Co 5:1-8.)'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je veux que vous sachiez, frères, que ce qui m’est arrivé a plutôt contribué aux progrès de l’Évangile. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, dans tout le prétoire et partout ailleurs, nul n’ignore que c’est pour Christ que je suis dans les liens, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 3:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 3:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et la plupart des frères dans le Seigneur, encouragés par mes liens, ont plus d’assurance pour annoncer sans crainte la parole. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelques-uns, il est vrai, prêchent Christ par envie et par esprit de dispute; mais d’autres le prêchent avec des dispositions bienveillantes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux-ci agissent par amour, sachant que je suis établi pour la défense de l’Évangile, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tandis que ceux-là, animés d’un esprit de dispute, annoncent Christ par des motifs qui ne sont pas purs et avec la pensée de me susciter quelque tribulation dans mes liens. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qu’importe? De toute manière, que ce soit pour l’apparence, que ce soit sincèrement, Christ n’est pas moins annoncé: je m’en réjouis, et je m’en réjouirai encore. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 1:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car je sais que cela tournera à mon salut, grâce à vos prières et à l’assistance de l’Esprit de Jésus-Christ, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 1:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sentiments affectueux de Paul pour les Philippiens, à cause de leur attachement à l’Évangile
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 3-11: cf. Col 1:3-11.'
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'selon ma ferme attente et mon espérance '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 5:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que je n’aurai honte de rien, mais que, maintenant comme toujours, Christ sera glorifié dans mon corps avec une pleine assurance, soit par ma vie, soit par ma mort; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car Christ est ma vie, et la mort m’est un gain. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais s’il est utile pour mon œuvre que je vive dans la chair, je ne saurais dire ce que je dois préférer. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je suis pressé des deux côtés: j’ai le désir de m’en aller et d’être avec Christ, ce qui de beaucoup est le meilleur; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais à cause de vous il est plus nécessaire que je demeure dans la chair. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et je suis persuadé, je sais que je demeurerai et que je resterai avec vous tous, pour votre avancement et pour votre joie dans la foi, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: afin que, par mon retour auprès de vous, vous ayez en moi un abondant sujet de vous glorifier en Jésus-Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Exhortation à la persévérance, à l’union fraternelle, à l’humilité, et à la sainteté
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 27-30: cf. 1 Th 2:12-16. 2 Th 1:4-12. Ac 14:22. Hé 10:32-36. Ap 2:10.'
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 17:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 7:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 4:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 2:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Seulement, conduisez-vous d’une manière digne de l’Évangile de Christ, afin que, soit que je vienne vous voir, soit que je reste absent, j’entende dire de vous que vous demeurez fermes dans un même esprit, combattant d’une même âme pour la foi de l’Évangile, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sans vous laisser aucunement effrayer par les adversaires, ce qui est pour eux une preuve de perdition, mais pour vous de salut; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et cela de la part de Dieu, car il vous a été fait la grâce, par rapport à Christ, non seulement de croire en lui, mais encore de souffrir pour lui, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 1:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 1:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Th 1:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je rends grâces à mon Dieu de tout le souvenir que je garde de vous, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: en soutenant le même combat que vous m’avez vu soutenir, et que vous apprenez maintenant que je soutiens.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ne cessant, dans toutes mes prières pour vous tous, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de manifester ma joie au sujet de la part que vous prenez à l’Évangile, depuis le premier jour jusqu’à maintenant. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je suis persuadé que celui qui a commencé en vous '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 1:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'cette bonne œuvre la rendra parfaite pour le jour de Jésus-Christ. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il est juste que je pense ainsi de vous tous, parce que je vous porte dans mon cœur, soit '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 3:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 4:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 1:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'dans mes liens, soit dans la défense et la confirmation de l’Évangile, vous qui tous participez à la même grâce que moi. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 1:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 1:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 1:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 2:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 5:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 4:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car Dieu m’est témoin que je vous chéris tous avec la tendresse de Jésus-Christ. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ce que je demande dans mes prières, c’est que votre amour augmente de plus en plus en connaissance et en pleine intelligence '
