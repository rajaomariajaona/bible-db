document_id: MAT.22,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Parabole des noces
  - type: heading
    content: 'V. 1-14: cf. Lu 14:16-24. Mt 20:16.'
  - type: text
    content: 'Jésus, prenant la parole, leur parla de nouveau en paraboles, et il dit:'
  '10':
  - type: text
    content: Ces serviteurs allèrent dans les chemins, rassemblèrent tous ceux qu’ils trouvèrent, méchants et bons, et la salle des noces fut pleine de convives.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Le roi entra pour voir ceux qui étaient à table, et il aperçut là un homme qui n’avait pas revêtu un habit de noces.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Il lui dit: Mon ami, comment es-tu entré ici sans avoir un habit de noces? Cet homme eut la bouche fermée.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Alors le roi dit aux serviteurs: Liez-lui les pieds et les mains, et jetez-le dans les ténèbres du dehors,'
  - type: text
    content: ' '
  - type: note
    content: Mt 8:12; 13:42; 24:51; 25:30. Lu 13:28.
  - type: text
    content: où il y aura des pleurs et des grincements de dents.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Car
  - type: text
    content: ' '
  - type: note
    content: Mt 20:16.
  - type: text
    content: il y a beaucoup d’appelés, mais peu d’élus.
  - type: heading
    content: 'Questions captieuses proposées à Jésus sur: — le tribut à César, — la résurrection, — le plus grand commandement. — De qui le Christ est-il fils?'
  - type: heading
    content: 'V. 15-22: cf. (Mc 12:13-17. Lu 20:20-26.) Job 5:13.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Mc 12:13. Lu 20:20.
  - type: text
    content: 'Alors les pharisiens allèrent se consulter sur les moyens de surprendre Jésus par ses propres paroles. '
  '16':
  - type: text
    content: 'Ils envoyèrent auprès de lui leurs disciples avec les hérodiens, qui dirent: Maître, nous savons que tu es vrai, et que tu enseignes la voie de Dieu selon la vérité, sans t’inquiéter de personne, car tu ne regardes pas à l’apparence des hommes. '
  '17':
  - type: text
    content: 'Dis-nous donc ce qu’il t’en semble: est-il permis, ou non, de payer le tribut à César? '
  '18':
  - type: text
    content: 'Jésus, connaissant leur méchanceté, répondit: '
  - type: text
    content: Pourquoi me tentez-vous, hypocrites?
  '19':
  - type: text
    content: ' '
  - type: text
    content: Montrez-moi la monnaie avec laquelle on paie le tribut.
  - type: text
    content: ' Et ils lui présentèrent un denier. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Lu 14:16. Ap 19:7.
  - type: text
    content: Le royaume des cieux est semblable à un roi qui fit des noces pour son fils.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Il leur demanda: '
  - type: text
    content: De qui sont cette effigie et cette inscription?
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'De César, lui répondirent-ils. Alors il leur dit: '
  - type: note
    content: Mt 17:25. Ro 13:7.
  - type: text
    content: Rendez donc à César ce qui est à César, et à Dieu ce qui est à Dieu.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Étonnés de ce qu’ils entendaient, ils le quittèrent, et s’en allèrent.
  - type: heading
    content: 'V. 23-33: cf. (Mc 12:18-27. Lu 20:27-40.) 2 Ti 3:7-9.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: Mc 12:18. Lu 20:27. Ac 23:8.
  - type: text
    content: 'Le même jour, les sadducéens, qui disent qu’il n’y a point de résurrection, vinrent auprès de Jésus, et lui firent cette question: '
  '24':
  - type: note
    content: De 25:5.
  - type: text
    content: 'Maître, Moïse a dit: Si quelqu’un meurt sans enfants, son frère épousera sa veuve, et suscitera une postérité à son frère. '
  '25':
  - type: text
    content: 'Or, il y avait parmi nous sept frères. Le premier se maria, et mourut; et, comme il n’avait pas d’enfants, il laissa sa femme à son frère. '
  '26':
  - type: text
    content: 'Il en fut de même du second, puis du troisième, jusqu’au septième. '
  '27':
  - type: text
    content: 'Après eux tous, la femme mourut aussi. '
  '28':
  - type: text
    content: 'A la résurrection, duquel des sept sera-t-elle donc la femme? Car tous l’ont eue. '
  '29':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: Vous êtes dans l’erreur, parce que vous ne comprenez ni les Écritures, ni la puissance de Dieu.
  '3':
  - type: text
    content: Il envoya ses serviteurs appeler ceux qui étaient invités aux noces; mais ils ne voulurent pas venir.
  - type: text
    content: ' '
  '30':
  - type: text
    content: ' '
  - type: text
    content: Car, à la résurrection, les hommes ne prendront point de femmes, ni les femmes de maris,
  - type: text
    content: ' '
  - type: note
    content: 1 Jn 3:2.
  - type: text
    content: mais ils seront comme les anges de Dieu dans le ciel.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Pour ce qui est de la résurrection des morts, n’avez-vous pas lu ce que Dieu vous a dit:'
  - type: text
    content: ' '
  '32':
  - type: note
    content: Ex 3:6.
  - type: text
    content: Je suis le Dieu d’Abraham, le Dieu d’Isaac, et le Dieu de Jacob? Dieu n’est pas Dieu des morts, mais des vivants.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'La foule, qui écoutait, '
  - type: note
    content: Mt 7:28.
  - type: text
    content: fut frappée de l’enseignement de Jésus.
  - type: heading
    content: 'V. 34-40: cf. Mc 12:28-34. (Lu 10:25-37.)'
  '34':
  - type: text
    content: ' '
  - type: note
    content: Mc 12:28.
  - type: text
    content: 'Les pharisiens, ayant appris qu’il avait réduit au silence les sadducéens, se rassemblèrent, '
  '35':
  - type: note
    content: Lu 10:25.
  - type: text
    content: 'et l’un d’eux, docteur de la loi, lui fit cette question, pour l’éprouver: '
  '36':
  - type: text
    content: 'Maître, quel est le plus grand commandement de la loi? '
  '37':
  - type: text
    content: 'Jésus lui répondit: '
  - type: note
    content: De 6:5; 10:12; 30:6. Lu 10:27.
  - type: text
    content: Tu aimeras le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme, et de toute ta pensée.
  '38':
  - type: text
    content: ' '
  - type: text
    content: C’est le premier et le plus grand commandement.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Et voici le second, qui lui est semblable:'
  - type: text
    content: ' '
  - type: note
    content: Lé 19:18. Mc 12:31. Ro 13:9. Ga 5:14. Ép 5:2. 1 Th 4:9. Ja 2:8.
  - type: text
    content: Tu aimeras ton prochain comme toi-même.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Il envoya encore d’autres serviteurs, en disant: Dites aux conviés: Voici, j’ai préparé mon festin; mes bœufs et mes bêtes grasses sont tués, tout est prêt, venez aux noces.'
  - type: text
    content: ' '
  '40':
  - type: text
    content: De ces deux commandements dépendent toute la loi et les prophètes.
  - type: heading
    content: 'V. 41-46: cf. (Mc 12:35-37. Lu 20:41-44.)'
  '41':
  - type: text
    content: ' '
  - type: note
    content: Mc 12:35. Lu 20:41.
  - type: text
    content: 'Comme les pharisiens étaient assemblés, Jésus les interrogea, '
  '42':
  - type: text
    content: 'en disant: '
  - type: text
    content: Que pensez-vous du Christ? De qui est-il fils?
  - type: text
    content: ' Ils lui répondirent: De David. '
  '43':
  - type: text
    content: 'Et Jésus leur dit: '
  - type: text
    content: 'Comment donc David, animé par l’Esprit, l’appelle-t-il Seigneur, lorsqu’il dit:'
  '44':
  - type: text
    content: ' '
  - type: note
    content: Ps 110:1. Ac 2:34. 1 Co 15:25. Hé 1:13; 10:13.
  - type: text
    content: 'Le Seigneur a dit à mon Seigneur:'
  - type: text
    content: Assieds-toi à ma droite,
  - type: text
    content: Jusqu’à ce que je fasse de tes ennemis ton marchepied?
  '45':
  - type: text
    content: ' '
  - type: text
    content: Si donc David l’appelle Seigneur, comment est-il son fils?
  - type: text
    content: ' '
  '46':
  - type: text
    content: Nul ne put lui répondre un mot. Et, depuis ce jour, personne n’osa plus lui proposer des questions.
  '5':
  - type: text
    content: Mais, sans s’inquiéter de l’invitation, ils s’en allèrent, celui-ci à son champ, celui-là à son trafic;
  - type: text
    content: ' '
  '6':
  - type: text
    content: et les autres se saisirent des serviteurs, les outragèrent et les tuèrent.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Le roi fut irrité; il envoya ses troupes, fit périr ces meurtriers, et brûla leur ville.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Alors il dit à ses serviteurs: Les noces sont prêtes; mais les conviés n’en étaient pas dignes.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: Allez donc dans les carrefours, et appelez aux noces tous ceux que vous trouverez.
  - type: text
    content: ' '
