document_id: MAT.22,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parabole des noces
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-14: cf. Lu 14:16-24. Mt 20:16.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, prenant la parole, leur parla de nouveau en paraboles, et il dit:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ces serviteurs allèrent dans les chemins, rassemblèrent tous ceux qu’ils trouvèrent, méchants et bons, et la salle des noces fut pleine de convives.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le roi entra pour voir ceux qui étaient à table, et il aperçut là un homme qui n’avait pas revêtu un habit de noces.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il lui dit: Mon ami, comment es-tu entré ici sans avoir un habit de noces? Cet homme eut la bouche fermée.'
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Alors le roi dit aux serviteurs: Liez-lui les pieds et les mains, et jetez-le dans les ténèbres du dehors,'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 8:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:42
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:51
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 13:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: où il y aura des pleurs et des grincements de dents.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 20:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: il y a beaucoup d’appelés, mais peu d’élus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Questions captieuses proposées à Jésus sur: — le tribut à César, — la résurrection, — le plus grand commandement. — De qui le Christ est-il fils?'
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 15-22: cf. (Mc 12:13-17. Lu 20:20-26.) Job 5:13.'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 12:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 20:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors les pharisiens allèrent se consulter sur les moyens de surprendre Jésus par ses propres paroles. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils envoyèrent auprès de lui leurs disciples avec les hérodiens, qui dirent: Maître, nous savons que tu es vrai, et que tu enseignes la voie de Dieu selon la vérité, sans t’inquiéter de personne, car tu ne regardes pas à l’apparence des hommes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dis-nous donc ce qu’il t’en semble: est-il permis, ou non, de payer le tribut à César? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, connaissant leur méchanceté, répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pourquoi me tentez-vous, hypocrites?
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Montrez-moi la monnaie avec laquelle on paie le tribut.
    - type: text
      text: ' Et ils lui présentèrent un denier. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 14:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 19:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le royaume des cieux est semblable à un roi qui fit des noces pour son fils.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur demanda: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: De qui sont cette effigie et cette inscription?
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De César, lui répondirent-ils. Alors il leur dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 17:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 13:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Rendez donc à César ce qui est à César, et à Dieu ce qui est à Dieu.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Étonnés de ce qu’ils entendaient, ils le quittèrent, et s’en allèrent.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 23-33: cf. (Mc 12:18-27. Lu 20:27-40.) 2 Ti 3:7-9.'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 12:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 20:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 23:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le même jour, les sadducéens, qui disent qu’il n’y a point de résurrection, vinrent auprès de Jésus, et lui firent cette question: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 25:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Maître, Moïse a dit: Si quelqu’un meurt sans enfants, son frère épousera sa veuve, et suscitera une postérité à son frère. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, il y avait parmi nous sept frères. Le premier se maria, et mourut; et, comme il n’avait pas d’enfants, il laissa sa femme à son frère. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il en fut de même du second, puis du troisième, jusqu’au septième. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après eux tous, la femme mourut aussi. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A la résurrection, duquel des sept sera-t-elle donc la femme? Car tous l’ont eue. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous êtes dans l’erreur, parce que vous ne comprenez ni les Écritures, ni la puissance de Dieu.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il envoya ses serviteurs appeler ceux qui étaient invités aux noces; mais ils ne voulurent pas venir.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car, à la résurrection, les hommes ne prendront point de femmes, ni les femmes de maris,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 3:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: mais ils seront comme les anges de Dieu dans le ciel.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Pour ce qui est de la résurrection des morts, n’avez-vous pas lu ce que Dieu vous a dit:'
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je suis le Dieu d’Abraham, le Dieu d’Isaac, et le Dieu de Jacob? Dieu n’est pas Dieu des morts, mais des vivants.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La foule, qui écoutait, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 7:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: fut frappée de l’enseignement de Jésus.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 34-40: cf. Mc 12:28-34. (Lu 10:25-37.)'
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 12:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les pharisiens, ayant appris qu’il avait réduit au silence les sadducéens, se rassemblèrent, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 10:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et l’un d’eux, docteur de la loi, lui fit cette question, pour l’éprouver: '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maître, quel est le plus grand commandement de la loi? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 6:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 10:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu aimeras le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme, et de toute ta pensée.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: C’est le premier et le plus grand commandement.
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Et voici le second, qui lui est semblable:'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 12:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 13:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 5:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 4:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 2:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu aimeras ton prochain comme toi-même.
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il envoya encore d’autres serviteurs, en disant: Dites aux conviés: Voici, j’ai préparé mon festin; mes bœufs et mes bêtes grasses sont tués, tout est prêt, venez aux noces.'
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: De ces deux commandements dépendent toute la loi et les prophètes.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 41-46: cf. (Mc 12:35-37. Lu 20:41-44.)'
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 12:35
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 20:41
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Comme les pharisiens étaient assemblés, Jésus les interrogea, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'en disant: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Que pensez-vous du Christ? De qui est-il fils?
    - type: text
      text: ' Ils lui répondirent: De David. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jésus leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Comment donc David, animé par l’Esprit, l’appelle-t-il Seigneur, lorsqu’il dit:'
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 110:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 1:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le Seigneur a dit à mon Seigneur:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Assieds-toi à ma droite,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Jusqu’à ce que je fasse de tes ennemis ton marchepied?
  '45':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si donc David l’appelle Seigneur, comment est-il son fils?
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Nul ne put lui répondre un mot. Et, depuis ce jour, personne n’osa plus lui proposer des questions.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais, sans s’inquiéter de l’invitation, ils s’en allèrent, celui-ci à son champ, celui-là à son trafic;
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et les autres se saisirent des serviteurs, les outragèrent et les tuèrent.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le roi fut irrité; il envoya ses troupes, fit périr ces meurtriers, et brûla leur ville.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Alors il dit à ses serviteurs: Les noces sont prêtes; mais les conviés n’en étaient pas dignes.'
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Allez donc dans les carrefours, et appelez aux noces tous ceux que vous trouverez.
    - type: text
      text: ' '
