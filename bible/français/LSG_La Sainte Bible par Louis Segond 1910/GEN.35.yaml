document_id: GEN.35,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacob appelé Israël
  - type: heading
    content: 'V. 1-15: cf. Ge 28:10-22; 48:3, 4.'
  - type: text
    content: 'Dieu dit à Jacob: Lève-toi, monte à Béthel, et demeures-y; là, tu dresseras un autel au Dieu qui '
  - type: note
    content: Ge 28:12, 13.
  - type: text
    content: 't’apparut, '
  - type: note
    content: Ge 27:43.
  - type: text
    content: 'lorsque tu fuyais Ésaü, ton frère. '
  '10':
  - type: text
    content: 'Dieu lui dit: Ton nom est Jacob; '
  - type: note
    content: Ge 32:28. 2 Ch 17:34.
  - type: text
    content: 'tu ne seras plus appelé Jacob, mais ton nom sera Israël. Et il lui donna le nom d’Israël. '
  '11':
  - type: text
    content: 'Dieu lui dit: '
  - type: note
    content: Ge 17:1; 28:3; 48:3.
  - type: text
    content: 'Je suis le Dieu tout-puissant. Sois fécond, et multiplie: '
  - type: note
    content: Ge 17:6, 16.
  - type: text
    content: 'une nation et une multitude de nations naîtront de toi, et '
  - type: note
    content: Mt 1:6.
  - type: text
    content: 'des rois sortiront de tes reins. '
  '12':
  - type: text
    content: 'Je te donnerai le pays que j’ai donné à Abraham et à Isaac, et je donnerai ce pays à ta postérité après toi. '
  '13':
  - type: text
    content: 'Dieu s’éleva au-dessus de lui, dans le lieu où il lui avait parlé. '
  '14':
  - type: text
    content: 'Et Jacob '
  - type: note
    content: Ge 28:18.
  - type: text
    content: 'dressa un monument dans le lieu où Dieu lui avait parlé, un monument de pierres, sur lequel il fit une libation et versa de l’huile. '
  '15':
  - type: text
    content: Jacob donna le nom de Béthel au lieu où Dieu lui avait parlé.
  - type: heading
    content: 'V. 16-20: cf. Ge 3:16; 30:1.'
  '16':
  - type: text
    content: 'Ils partirent de Béthel; et il y avait encore une certaine distance jusqu’à Éphrata, lorsque Rachel accoucha. Elle eut un accouchement pénible; '
  '17':
  - type: text
    content: 'et pendant les douleurs de l’enfantement, la sage-femme lui dit: Ne crains point, car tu as encore un fils! '
  '18':
  - type: text
    content: 'Et comme elle allait rendre l’âme, car elle était mourante, elle lui donna le nom de Ben-Oni; mais le père l’appela Benjamin. '
  '19':
  - type: note
    content: Ge 48:7.
  - type: text
    content: 'Rachel mourut, et elle fut enterrée sur le chemin d’Éphrata, qui est Bethléhem. '
  '2':
  - type: text
    content: 'Jacob dit à sa maison et à tous ceux qui étaient avec lui: Otez les dieux étrangers qui sont au milieu de vous, purifiez-vous, et changez de vêtements. '
  '20':
  - type: text
    content: Jacob éleva un monument sur son sépulcre; c’est le monument du sépulcre de Rachel, qui existe encore aujourd’hui.
  - type: heading
    content: 'V. 21-26: cf. Ge 49:3, 4. (Ge 29:31-35; 30:1-24.)'
  '21':
  - type: text
    content: 'Israël partit; et il dressa sa tente au-delà de Migdal-Éder. '
  '22':
  - type: text
    content: 'Pendant qu’Israël habitait cette contrée, '
  - type: note
    content: Ge 49:4.
  - type: text
    content: 'Ruben alla coucher avec Bilha, concubine de son père. Et Israël l’apprit. Les fils de Jacob étaient au nombre de douze. '
  '23':
  - type: note
    content: Ge 46:8. Ex 1:2.
  - type: text
    content: 'Fils de Léa: Ruben, premier-né de Jacob, Siméon, Lévi, Juda, Issacar et Zabulon. '
  '24':
  - type: text
    content: 'Fils de Rachel: Joseph et Benjamin. '
  '25':
  - type: text
    content: 'Fils de Bilha, servante de Rachel: Dan et Nephthali. '
  '26':
  - type: text
    content: 'Fils de Zilpa, servante de Léa: Gad et Aser. Ce sont là les fils de Jacob, qui lui naquirent à Paddan-Aram.'
  - type: heading
    content: Retour de Jacob chez son père. Mort d’Isaac
  - type: heading
    content: 'V. 27-29: cf. Ge 25:7-10; 49:29-33.'
  '27':
  - type: text
    content: 'Jacob arriva auprès d’Isaac, son père, à Mamré, à Kirjath-Arba, qui est Hébron, où avaient séjourné Abraham et Isaac. '
  '28':
  - type: text
    content: 'Les jours d’Isaac furent de cent quatre-vingts ans. '
  '29':
  - type: note
    content: Ge 25:8.
  - type: text
    content: Il expira et mourut, et il fut recueilli auprès de son peuple, âgé et rassasié de jours, et Ésaü et Jacob, ses fils, l’enterrèrent.
  '3':
  - type: text
    content: 'Nous nous lèverons, et nous monterons à Béthel; là, je dresserai un autel au Dieu qui m’a exaucé dans le jour de ma détresse, et qui a été avec moi pendant le voyage que j’ai fait. '
  '4':
  - type: text
    content: 'Ils donnèrent à Jacob tous les dieux étrangers qui étaient entre leurs mains, et les anneaux qui étaient à leurs oreilles. Jacob les enfouit sous le térébinthe qui est près de Sichem. '
  '5':
  - type: text
    content: 'Ensuite ils partirent. La terreur de Dieu se répandit sur les villes qui les entouraient, et l’on ne poursuivit point les fils de Jacob. '
  '6':
  - type: text
    content: 'Jacob arriva, lui et tous ceux qui étaient avec lui, à Luz, qui est Béthel, dans le pays de Canaan. '
  '7':
  - type: text
    content: 'Il bâtit là un autel, et '
  - type: note
    content: Ge 28:19.
  - type: text
    content: 'il appela ce lieu El-Béthel; car c’est là que Dieu s’était révélé à lui lorsqu’il fuyait son frère. '
  '8':
  - type: text
    content: 'Débora, nourrice de Rebecca, mourut; et elle fut enterrée au-dessous de Béthel, sous le chêne auquel on a donné le nom de chêne des pleurs. '
  '9':
  - type: note
    content: Os 12:5.
  - type: text
    content: 'Dieu apparut encore à Jacob, après son retour de Paddan-Aram, et il le bénit. '
