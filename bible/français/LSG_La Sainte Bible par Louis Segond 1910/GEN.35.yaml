document_id: GEN.35
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob appelé Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-15: cf. Ge 28:10-22; 48:3, 4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dieu dit à Jacob: Lève-toi, monte à Béthel, et demeures-y; là, tu dresseras un autel au Dieu qui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 28:12
      metadata:
        usfm: GEN.28.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: GEN.28.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 't’apparut, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 27:43
      metadata:
        usfm: GEN.27.43
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'lorsque tu fuyais Ésaü, ton frère. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jacob dit à sa maison et à tous ceux qui étaient avec lui: Otez les dieux étrangers qui sont au milieu de vous, purifiez-vous, et changez de vêtements. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nous nous lèverons, et nous monterons à Béthel; là, je dresserai un autel au Dieu qui m’a exaucé dans le jour de ma détresse, et qui a été avec moi pendant le voyage que j’ai fait. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils donnèrent à Jacob tous les dieux étrangers qui étaient entre leurs mains, et les anneaux qui étaient à leurs oreilles. Jacob les enfouit sous le térébinthe qui est près de Sichem. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ensuite ils partirent. La terreur de Dieu se répandit sur les villes qui les entouraient, et l’on ne poursuivit point les fils de Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jacob arriva, lui et tous ceux qui étaient avec lui, à Luz, qui est Béthel, dans le pays de Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il bâtit là un autel, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 28:19
      metadata:
        usfm: GEN.28.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il appela ce lieu El-Béthel; car c’est là que Dieu s’était révélé à lui lorsqu’il fuyait son frère. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Débora, nourrice de Rebecca, mourut; et elle fut enterrée au-dessous de Béthel, sous le chêne auquel on a donné le nom de chêne des pleurs. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 12:5
      metadata:
        usfm: HOS.12.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dieu apparut encore à Jacob, après son retour de Paddan-Aram, et il le bénit. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dieu lui dit: Ton nom est Jacob; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 32:28
      metadata:
        usfm: GEN.32.28
    - type: text
      text: . 2 Ch 17:34.
    marker-yv: yv-n
  - type: text
    text: 'tu ne seras plus appelé Jacob, mais ton nom sera Israël. Et il lui donna le nom d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dieu lui dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 17:1
      metadata:
        usfm: GEN.17.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:3
      metadata:
        usfm: GEN.28.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 48:3
      metadata:
        usfm: GEN.48.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je suis le Dieu tout-puissant. Sois fécond, et multiplie: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 17:6
      metadata:
        usfm: GEN.17.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: GEN.17.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une nation et une multitude de nations naîtront de toi, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 1:6
      metadata:
        usfm: MAT.1.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des rois sortiront de tes reins. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je te donnerai le pays que j’ai donné à Abraham et à Isaac, et je donnerai ce pays à ta postérité après toi. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dieu s’éleva au-dessus de lui, dans le lieu où il lui avait parlé. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et Jacob '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 28:18
      metadata:
        usfm: GEN.28.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dressa un monument dans le lieu où Dieu lui avait parlé, un monument de pierres, sur lequel il fit une libation et versa de l’huile. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Jacob donna le nom de Béthel au lieu où Dieu lui avait parlé.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-20: cf. Ge 3:16; 30:1.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils partirent de Béthel; et il y avait encore une certaine distance jusqu’à Éphrata, lorsque Rachel accoucha. Elle eut un accouchement pénible; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'et pendant les douleurs de l’enfantement, la sage-femme lui dit: Ne crains point, car tu as encore un fils! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et comme elle allait rendre l’âme, car elle était mourante, elle lui donna le nom de Ben-Oni; mais le père l’appela Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 48:7
      metadata:
        usfm: GEN.48.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Rachel mourut, et elle fut enterrée sur le chemin d’Éphrata, qui est Bethléhem. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Jacob éleva un monument sur son sépulcre; c’est le monument du sépulcre de Rachel, qui existe encore aujourd’hui.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-26: cf. Ge 49:3, 4. (Ge 29:31-35; 30:1-24.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Israël partit; et il dressa sa tente au-delà de Migdal-Éder. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Pendant qu’Israël habitait cette contrée, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 49:4
      metadata:
        usfm: GEN.49.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ruben alla coucher avec Bilha, concubine de son père. Et Israël l’apprit. Les fils de Jacob étaient au nombre de douze. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 46:8
      metadata:
        usfm: GEN.46.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 1:2
      metadata:
        usfm: EXO.1.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fils de Léa: Ruben, premier-né de Jacob, Siméon, Lévi, Juda, Issacar et Zabulon. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fils de Rachel: Joseph et Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fils de Bilha, servante de Rachel: Dan et Nephthali. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fils de Zilpa, servante de Léa: Gad et Aser. Ce sont là les fils de Jacob, qui lui naquirent à Paddan-Aram.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Retour de Jacob chez son père. Mort d’Isaac
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 27-29: cf. Ge 25:7-10; 49:29-33.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jacob arriva auprès d’Isaac, son père, à Mamré, à Kirjath-Arba, qui est Hébron, où avaient séjourné Abraham et Isaac. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Les jours d’Isaac furent de cent quatre-vingts ans. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 25:8
      metadata:
        usfm: GEN.25.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il expira et mourut, et il fut recueilli auprès de son peuple, âgé et rassasié de jours, et Ésaü et Jacob, ses fils, l’enterrèrent.
