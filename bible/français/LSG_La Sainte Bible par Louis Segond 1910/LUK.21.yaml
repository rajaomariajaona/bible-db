document_id: LUK.21,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La pauvre veuve
  - type: heading
    content: 'V. 1-4: cf. Mc 12:41-44.'
  - type: text
    content: ' '
  - type: note
    content: 2 R 12:9. Mc 12:41.
  - type: text
    content: 'Jésus, ayant levé les yeux, vit les riches qui mettaient leurs offrandes dans le tronc. '
  '10':
  - type: text
    content: 'Alors il leur dit: '
  - type: note
    content: És 19:2.
  - type: text
    content: Une nation s’élèvera contre une nation, et un royaume contre un royaume;
  '11':
  - type: text
    content: ' '
  - type: text
    content: il y aura de grands tremblements de terre, et, en divers lieux, des pestes et des famines; il y aura des phénomènes terribles, et de grands signes dans le ciel.
  - type: text
    content: ' '
  '12':
  - type: note
    content: Mt 10:17; 24:9. Mc 13:9. Jn 16:2. Ap 2:10.
  - type: text
    content: Mais, avant tout cela, on mettra la main sur vous, et l’on vous persécutera; on vous livrera aux synagogues, on vous jettera en
  - type: text
    content: ' '
  - type: note
    content: Ac 4:3; 5:18; 12:4; 16:24.
  - type: text
    content: prison, on vous mènera devant des
  - type: text
    content: ' '
  - type: note
    content: Ac 25:23.
  - type: text
    content: rois et devant des gouverneurs, à cause de mon nom.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Cela vous arrivera pour que vous serviez de témoignage.
  - type: text
    content: ' '
  '14':
  - type: note
    content: Mt 10:19. Mc 13:11.
  - type: text
    content: Mettez-vous donc dans l’esprit de ne pas préméditer votre défense;
  - type: text
    content: ' '
  '15':
  - type: note
    content: Ex 4:12. És 54:17. Mt 10:19. Ac 6:10.
  - type: text
    content: car je vous donnerai une bouche et une sagesse à laquelle tous vos adversaires ne pourront résister ou contredire.
  - type: text
    content: ' '
  '16':
  - type: note
    content: Mi 7:6.
  - type: text
    content: Vous serez livrés même par vos parents, par vos frères, par vos proches et par vos amis, et ils feront
  - type: text
    content: ' '
  - type: note
    content: Ac 7:59; 12:2.
  - type: text
    content: mourir plusieurs d’entre vous.
  - type: text
    content: ' '
  '17':
  - type: note
    content: Mt 10:22. Mc 13:13.
  - type: text
    content: Vous serez haïs de tous, à cause de mon nom.
  - type: text
    content: ' '
  '18':
  - type: note
    content: 1 S 14:45. 2 S 14:11. 1 R 1:52. Mt 10:30.
  - type: text
    content: Mais il ne se perdra pas un cheveu de votre tête;
  - type: text
    content: ' '
  '19':
  - type: text
    content: par votre persévérance vous sauverez vos âmes.
  - type: heading
    content: Exhortation à la vigilance
  - type: heading
    content: 'V. 20-38: cf. (Mt 24:15-51. Mc 13:14-37.)'
  '2':
  - type: text
    content: 'Il vit aussi une pauvre veuve, qui y mettait deux petites pièces. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Da 9:27. Mt 24:15. Mc 13:14.
  - type: text
    content: Lorsque vous verrez Jérusalem investie par des armées, sachez alors que sa désolation est proche.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Alors, que ceux qui seront en Judée fuient dans les montagnes, que ceux qui seront au milieu de Jérusalem en sortent, et que ceux qui seront dans les champs n’entrent pas dans la ville.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Car ce seront des jours de vengeance,
  - type: text
    content: ' '
  - type: note
    content: Da 9:26, 27. Mt 24:15. Mc 13:14.
  - type: text
    content: pour l’accomplissement de tout ce qui est écrit.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Malheur aux femmes qui seront enceintes et à celles qui allaiteront en ces jours-là! Car il y aura une grande détresse dans le pays, et de la colère contre ce peuple.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Ils tomberont sous le tranchant de l’épée, ils seront emmenés captifs parmi toutes les nations, et Jérusalem sera foulée aux pieds par les nations,
  - type: text
    content: ' '
  - type: note
    content: Ro 11:25.
  - type: text
    content: jusqu’à ce que les temps des nations soient accomplis.
  - type: text
    content: ' '
  '25':
  - type: note
    content: És 13:10. Éz 32:7. Joë 2:31; 3:15. Mt 24:29. Mc 13:24. Ap 6:12.
  - type: text
    content: Il y aura des signes dans le soleil, dans la lune et dans les étoiles. Et sur la terre, il y aura de l’angoisse chez les nations qui ne sauront que faire, au bruit de la mer et des flots,
  - type: text
    content: ' '
  '26':
  - type: text
    content: les hommes rendant l’âme de terreur dans l’attente de ce qui surviendra pour la terre; car les puissances des cieux seront ébranlées.
  - type: text
    content: ' '
  '27':
  - type: note
    content: Da 7:10. Mt 16:27; 24:30; 25:31; 26:64. Mc 13:26; 14:62. Ac 1:11. 2 Th 1:10. Ap 1:7.
  - type: text
    content: Alors on verra le Fils de l’homme venant sur une nuée avec puissance et une grande gloire.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Quand ces choses commenceront à arriver, redressez-vous et levez vos têtes,
  - type: text
    content: ' '
  - type: note
    content: Ro 8:23.
  - type: text
    content: parce que votre délivrance approche.
  - type: text
    content: ' '
  '29':
  - type: note
    content: Mt 24:32. Mc 13:28.
  - type: text
    content: 'Et il leur dit une comparaison: '
  - type: text
    content: Voyez le figuier, et tous les arbres.
  '3':
  - type: text
    content: 'Et il dit: '
  - type: text
    content: Je vous le dis en vérité,
  - type: text
    content: ' '
  - type: note
    content: 2 Co 8:12.
  - type: text
    content: cette pauvre veuve a mis plus que tous les autres;
  '30':
  - type: text
    content: ' '
  - type: text
    content: Dès qu’ils ont poussé, vous connaissez de vous-mêmes, en regardant, que déjà l’été est proche.
  - type: text
    content: ' '
  '31':
  - type: text
    content: De même, quand vous verrez ces choses arriver, sachez que le royaume de Dieu est proche.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Je vous le dis en vérité, cette génération ne passera point, que tout cela n’arrive.
  - type: text
    content: ' '
  '33':
  - type: note
    content: Ps 102:27. És 51:6. Mt 24:35. Hé 1:11.
  - type: text
    content: Le ciel et la terre passeront, mais mes paroles ne passeront point.
  - type: text
    content: ' '
  '34':
  - type: note
    content: Ro 13:13. 1 Th 5:6. 1 Pi 4:7.
  - type: text
    content: Prenez garde à vous-mêmes, de crainte que vos cœurs ne s’appesantissent par les excès du manger et du boire, et par les soucis de la vie, et que ce jour ne vienne sur vous à l’improviste;
  - type: text
    content: ' '
  '35':
  - type: note
    content: 1 Th 5:2. 2 Pi 3:10. Ap 3:3; 16:15.
  - type: text
    content: car il viendra comme un filet sur tous ceux qui habitent sur la face de toute la terre.
  - type: text
    content: ' '
  '36':
  - type: note
    content: Mt 24:42; 25:13. Mc 13:33. Lu 12:40. 1 Th 5:6.
  - type: text
    content: Veillez donc et priez en tout temps, afin que vous ayez la force d’échapper à toutes ces choses qui arriveront, et de paraître debout devant le Fils de l’homme.
  - type: text
    content: ' '
  '37':
  - type: note
    content: Jn 8:2.
  - type: text
    content: 'Pendant le jour, Jésus enseignait dans le temple, et il allait passer la nuit à la montagne appelée montagne des oliviers. '
  '38':
  - type: text
    content: Et tout le peuple, dès le matin, se rendait vers lui dans le temple pour l’écouter.
  '4':
  - type: text
    content: ' '
  - type: text
    content: car c’est de leur superflu que tous ceux-là ont mis des offrandes dans le tronc, mais elle a mis de son nécessaire, tout ce qu’elle avait pour vivre.
  - type: heading
    content: La destruction de Jérusalem et l’avènement du Fils de l’homme
  - type: heading
    content: 'V. 5-19: cf. (Mt 24:1-14. Mc 13:1-13.)'
  '5':
  - type: text
    content: ' '
  - type: note
    content: Mt 24:1. Mc 13:1.
  - type: text
    content: 'Comme quelques-uns parlaient des belles pierres et des offrandes qui faisaient l’ornement du temple, Jésus dit:'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 1 R 9:7. Mi 3:12. Lu 19:44.
  - type: text
    content: Les jours viendront où, de ce que vous voyez, il ne restera pas pierre sur pierre qui ne soit renversée.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Ils lui demandèrent: Maître, quand donc cela arrivera-t-il, et à quel signe connaîtra-t-on que ces choses vont arriver? '
  '8':
  - type: note
    content: Jé 29:8. Mt 24:4. Ép 5:6. Col 2:18. 2 Th 2:2. 1 Jn 4:1.
  - type: text
    content: 'Jésus répondit: '
  - type: text
    content: Prenez garde que vous ne soyez séduits.
  - type: text
    content: ' '
  - type: note
    content: Jé 14:14; 23:21.
  - type: text
    content: 'Car plusieurs viendront en mon nom, disant: C’est moi, et le temps approche. Ne les suivez pas.'
  '9':
  - type: text
    content: ' '
  - type: text
    content: Quand vous entendrez parler de guerres et de soulèvements, ne soyez pas effrayés, car il faut que ces choses arrivent premièrement. Mais ce ne sera pas encore la fin.
  - type: text
    content: ' '
