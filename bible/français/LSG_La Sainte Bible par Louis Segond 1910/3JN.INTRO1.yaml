document_id: 3JN.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION À LA TROISIÈME ÉPÎTRE DE JEAN
- type: usfm
  marker: imt3
  children:
  - type: text
    text: (1 Co 16:14, 24.)
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La troisième épître de Jean est, comme la seconde, un billet de circonstance du même auteur qui se donne le même titre: l’«ancien» (voir l’introduction à 1 Jean pour le problème d’auteur, et celle à 2 Jean pour ce titre).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Elle a pour destinataire Gaïus, le bien-aimé, un des chrétiens de la communauté johannique resté fidèle à celui à qui on donne le titre d’ancien. Ce nom est très répandu dans le Nouveau Testament. Dans le livre des Actes des Apôtres, il s’agirait d’un des compagnons de voyage de l’apôtre Paul (voir Act 19:29). Dans les épîtres pauliniennes, il se rapporte à un chrétien de Corinthe qui, avec quelques autres, fait partie des chrétiens de cette Église que Paul reconnaît avoir baptisés (voir Rom 16:23; 1 Cor 1:14). Cependant, rien ne permet d’assimiler le destinataire de 3 Jean aux personnages mentionnés plus haut. Cette épître a quatre parties, qui sont:'
- type: usfm
  marker: io1
  children:
  - type: text
    text: '1. Adresse et salutations '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 1-2
- type: usfm
  marker: io1
  children:
  - type: text
    text: '2. Éloge de Gaïus '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 3-8
- type: usfm
  marker: io1
  children:
  - type: text
    text: '3. Plainte contre Diotrèphe, éloge de Démétrius '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 9-12
- type: usfm
  marker: io1
  children:
  - type: text
    text: '4. Salutations finales '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 13-15
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La teneur de 3 Jean comme celle de 2 Jean confirme, dans les grandes lignes, l’enseignement de 1 Jean. Il s’agit d’un aperçu des grands développements que l’auteur a exposé, dans cette première épître. Ils se résument en deux traits: l’amour fraternel qui résulte de la foi commune en Christ Jésus, et la mise en garde contre les faux frères.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L’éloge de Gaïus, au début de l’épître, comporte deux points: Gaïus marche dans la vérité, est charitable envers les frères, même ceux qui sont étrangers à la communauté. Cela se sait et on en rend un témoignage qui est parvenu à l’auteur.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La plainte contre Diotrèphe comporte trois points: il aime à être le premier, tient de méchants propos contre l’Église, ne reçoit pas les frères et en empêche ceux qui veulent le faire. De ces deux modèles contraires de responsables résultent les exhortations.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Que 3 Jean s’adresse particulièrement à Gaïus suppose que le message central de ces trois lettres devrait résonner de façon particulière ici. La plainte contre Diotrèphe (9-10) apporte cette marque particulière à celle qui nous concerne.
