    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu’il eut dit ces choses, Jésus alla avec ses disciples de l’autre côté du torrent du Cédron, où se trouvait un jardin, dans lequel il entra, lui et ses disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Judas, qui le livrait, connaissait ce lieu, parce que Jésus et ses disciples s’y étaient souvent réunis. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:47
      metadata:
        usfm: MAT.26.47
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:43
      metadata:
        usfm: MRK.14.43
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:47
      metadata:
        usfm: LUK.22.47
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Judas donc, ayant pris la cohorte, et des huissiers qu’envoyèrent les principaux sacrificateurs et les pharisiens, vint là avec des lanternes, des flambeaux et des armes. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jésus, sachant tout ce qui devait lui arriver, s’avança, et leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Qui cherchez-vous?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils lui répondirent: Jésus de Nazareth. Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est moi.
  - type: text
    text: ' Et Judas, qui le livrait, était avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lorsque Jésus leur eut dit: C’est moi, ils reculèrent et tombèrent par terre. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il leur demanda de nouveau: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Qui cherchez-vous?
  - type: text
    text: ' Et ils dirent: Jésus de Nazareth. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jésus répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous ai dit que c’est moi. Si donc c’est moi que vous cherchez, laissez aller ceux-ci.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il dit cela, afin que s’accomplît la parole qu’il avait dite: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:39
      metadata:
        usfm: JHN.6.39
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:28
      metadata:
        usfm: JHN.10.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:12
      metadata:
        usfm: JHN.17.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je n’ai perdu aucun de ceux que tu m’as donnés. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:51
      metadata:
        usfm: MAT.26.51
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:47
      metadata:
        usfm: MRK.14.47
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:50
      metadata:
        usfm: LUK.22.50
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Simon Pierre, qui avait une épée, la tira, frappa le serviteur du souverain sacrificateur, et lui coupa l’oreille droite. Ce serviteur s’appelait Malchus. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jésus dit à Pierre: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Remets ton épée dans le fourreau.
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 20:22
      metadata:
        usfm: MAT.20.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:39
      metadata:
        usfm: MAT.26.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne boirai-je pas la coupe que le Père m’a donnée à boire?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus devant Anne et Caïphe. Reniement de Pierre
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-27: cf. (Mt 26:57-75. Mc 14:53-72. Lu 22:54-65.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'La cohorte, le tribun, et les huissiers des Juifs, se saisirent alors de Jésus, et le lièrent. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:57
      metadata:
        usfm: MAT.26.57
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:53
      metadata:
        usfm: MRK.14.53
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:54
      metadata:
        usfm: LUK.22.54
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils l’emmenèrent d’abord chez '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:2
      metadata:
        usfm: LUK.3.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Anne; car il était le beau-père de Caïphe, qui était souverain sacrificateur cette année-là. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 11:50
      metadata:
        usfm: JHN.11.50
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Caïphe était celui qui avait donné ce conseil aux Juifs: Il est avantageux qu’un seul homme meure pour le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Mt 25:58. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:54
      metadata:
        usfm: MRK.14.54
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:45
      metadata:
        usfm: LUK.22.45
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Simon Pierre, avec un autre disciple, suivait Jésus. Ce disciple était connu du souverain sacrificateur, et il entra avec Jésus dans la cour du souverain sacrificateur; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'mais Pierre resta dehors près de la porte. L’autre disciple, qui était connu du souverain sacrificateur, sortit, parla à la portière, et fit entrer Pierre. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors la servante, la portière, dit à Pierre: Toi aussi, n’es-tu pas des disciples de cet homme? Il dit: Je n’en suis point. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les serviteurs et les huissiers, qui étaient là, avaient allumé un brasier, car il faisait froid, et ils se chauffaient. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:69
      metadata:
        usfm: MAT.26.69
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:67
      metadata:
        usfm: MRK.14.67
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:55
      metadata:
        usfm: LUK.22.55
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pierre se tenait avec eux, et se chauffait. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le souverain sacrificateur interrogea Jésus sur ses disciples et sur sa doctrine. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jésus lui répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:26
      metadata:
        usfm: JHN.7.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: J’ai parlé ouvertement au monde; j’ai toujours enseigné dans la synagogue et dans le temple, où tous les Juifs s’assemblent, et je n’ai rien dit en secret.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi m’interroges-tu? Interroge sur ce que je leur ai dit ceux qui m’ont entendu; voici, ceux-là savent ce que j’ai dit.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'A ces mots, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 20:2
      metadata:
        usfm: JER.20.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 23:2
      metadata:
        usfm: ACT.23.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un des huissiers, qui se trouvait là, donna un soufflet à Jésus, en disant: Est-ce ainsi que tu réponds au souverain sacrificateur? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si j’ai mal parlé, fais voir ce que j’ai dit de mal; et si j’ai bien parlé, pourquoi me frappes-tu?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:57
      metadata:
        usfm: MAT.26.57
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:53
      metadata:
        usfm: MRK.14.53
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:54
      metadata:
        usfm: LUK.22.54
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Anne l’envoya lié à Caïphe, le souverain sacrificateur. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:71
      metadata:
        usfm: MAT.26.71
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:69
      metadata:
        usfm: MRK.14.69
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:58
      metadata:
        usfm: LUK.22.58
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Simon Pierre était là, et se chauffait. On lui dit: Toi aussi, n’es-tu pas de ses disciples? Il le nia, et dit: Je n’en suis point. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Un des serviteurs du souverain sacrificateur, parent de celui à qui Pierre avait coupé l’oreille, dit: Ne t’ai-je pas vu avec lui dans le jardin? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Pierre le nia de nouveau. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:38
      metadata:
        usfm: JHN.13.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et aussitôt le coq chanta.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus devant Pilate, gouverneur romain
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 28-38: cf. (Mt 27:1, 2, 11-14. Mc 15:1-5. Lu 23:1-5.) 1 Ti 6:13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 27:1
      metadata:
        usfm: MAT.27.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:1
      metadata:
        usfm: MRK.15.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:66
      metadata:
        usfm: LUK.22.66
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:1
      metadata:
        usfm: LUK.23.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils conduisirent Jésus de chez Caïphe au prétoire: c’était le matin. Ils n’entrèrent point eux-mêmes dans le prétoire, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:28
      metadata:
        usfm: ACT.10.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:3
      metadata:
        usfm: ACT.11.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'afin de ne pas se souiller, et de pouvoir manger la Pâque. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Pilate sortit donc pour aller à eux, et il dit: Quelle accusation portez-vous contre cet homme? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ils lui répondirent: Si ce n’était pas un malfaiteur, nous ne te l’aurions pas livré. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Sur quoi Pilate leur dit: Prenez-le vous-mêmes, et jugez-le selon votre loi. Les Juifs lui dirent: Il ne nous est pas permis de mettre personne à mort. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 20:19
      metadata:
        usfm: MAT.20.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:32
      metadata:
        usfm: JHN.12.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’était afin que s’accomplît la parole que Jésus avait dite, lorsqu’il indiqua de quelle mort il devait mourir. '
  - type: usfm
    marker: v
    metadata:
