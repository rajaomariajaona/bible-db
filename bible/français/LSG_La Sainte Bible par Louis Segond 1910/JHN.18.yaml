document_id: JHN.18,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Arrestation de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. Mt 26:36-54. Mc 14:32-50. Lu 22:39-51.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 15:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:36
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:39
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsqu’il eut dit ces choses, Jésus alla avec ses disciples de l’autre côté du torrent du Cédron, où se trouvait un jardin, dans lequel il entra, lui et ses disciples. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:51
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:47
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:50
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Simon Pierre, qui avait une épée, la tira, frappa le serviteur du souverain sacrificateur, et lui coupa l’oreille droite. Ce serviteur s’appelait Malchus. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus dit à Pierre: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Remets ton épée dans le fourreau.
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 20:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:39
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ne boirai-je pas la coupe que le Père m’a donnée à boire?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus devant Anne et Caïphe. Reniement de Pierre
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-27: cf. (Mt 26:57-75. Mc 14:53-72. Lu 22:54-65.)'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La cohorte, le tribun, et les huissiers des Juifs, se saisirent alors de Jésus, et le lièrent. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:57
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:53
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:54
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils l’emmenèrent d’abord chez '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Anne; car il était le beau-père de Caïphe, qui était souverain sacrificateur cette année-là. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 11:50
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Caïphe était celui qui avait donné ce conseil aux Juifs: Il est avantageux qu’un seul homme meure pour le peuple. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Mt 25:58. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:54
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:45
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Simon Pierre, avec un autre disciple, suivait Jésus. Ce disciple était connu du souverain sacrificateur, et il entra avec Jésus dans la cour du souverain sacrificateur; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais Pierre resta dehors près de la porte. L’autre disciple, qui était connu du souverain sacrificateur, sortit, parla à la portière, et fit entrer Pierre. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors la servante, la portière, dit à Pierre: Toi aussi, n’es-tu pas des disciples de cet homme? Il dit: Je n’en suis point. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les serviteurs et les huissiers, qui étaient là, avaient allumé un brasier, car il faisait froid, et ils se chauffaient. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:69
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:67
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:55
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Pierre se tenait avec eux, et se chauffait. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le souverain sacrificateur interrogea Jésus sur ses disciples et sur sa doctrine. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Judas, qui le livrait, connaissait ce lieu, parce que Jésus et ses disciples s’y étaient souvent réunis. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 7:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: J’ai parlé ouvertement au monde; j’ai toujours enseigné dans la synagogue et dans le temple, où tous les Juifs s’assemblent, et je n’ai rien dit en secret.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pourquoi m’interroges-tu? Interroge sur ce que je leur ai dit ceux qui m’ont entendu; voici, ceux-là savent ce que j’ai dit.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ces mots, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 20:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 23:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'un des huissiers, qui se trouvait là, donna un soufflet à Jésus, en disant: Est-ce ainsi que tu réponds au souverain sacrificateur? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si j’ai mal parlé, fais voir ce que j’ai dit de mal; et si j’ai bien parlé, pourquoi me frappes-tu?
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:57
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:53
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:54
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Anne l’envoya lié à Caïphe, le souverain sacrificateur. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:71
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:69
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:58
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Simon Pierre était là, et se chauffait. On lui dit: Toi aussi, n’es-tu pas de ses disciples? Il le nia, et dit: Je n’en suis point. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un des serviteurs du souverain sacrificateur, parent de celui à qui Pierre avait coupé l’oreille, dit: Ne t’ai-je pas vu avec lui dans le jardin? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre le nia de nouveau. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 13:38
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et aussitôt le coq chanta.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus devant Pilate, gouverneur romain
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 28-38: cf. (Mt 27:1, 2, 11-14. Mc 15:1-5. Lu 23:1-5.) 1 Ti 6:13.'
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 15:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:66
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils conduisirent Jésus de chez Caïphe au prétoire: c’était le matin. Ils n’entrèrent point eux-mêmes dans le prétoire, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 10:28
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'afin de ne pas se souiller, et de pouvoir manger la Pâque. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate sortit donc pour aller à eux, et il dit: Quelle accusation portez-vous contre cet homme? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:47
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:43
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:47
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Judas donc, ayant pris la cohorte, et des huissiers qu’envoyèrent les principaux sacrificateurs et les pharisiens, vint là avec des lanternes, des flambeaux et des armes. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui répondirent: Si ce n’était pas un malfaiteur, nous ne te l’aurions pas livré. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sur quoi Pilate leur dit: Prenez-le vous-mêmes, et jugez-le selon votre loi. Les Juifs lui dirent: Il ne nous est pas permis de mettre personne à mort. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 20:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 12:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'C’était afin que s’accomplît la parole que Jésus avait dite, lorsqu’il indiqua de quelle mort il devait mourir. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 15:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Pilate rentra dans le prétoire, appela Jésus, et lui dit: Es-tu le roi des Juifs? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Est-ce de toi-même que tu dis cela, ou d’autres te l’ont-ils dit de moi?
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate répondit: Moi, suis-je Juif? Ta nation et les principaux sacrificateurs t’ont livré à moi: qu’as-tu fait?'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 6:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mon royaume n’est pas de ce monde,
    - type: text
      text: ' répondit Jésus. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si mon royaume était de ce monde, mes serviteurs auraient combattu pour moi afin que je ne fusse pas livré aux Juifs; mais maintenant mon royaume n’est point d’ici-bas.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate lui dit: Tu es donc roi? Jésus répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu le dis, je suis roi. Je suis né et je suis venu dans le monde pour rendre témoignage à la vérité. Quiconque est de la vérité écoute ma voix.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate lui dit: Qu’est-ce que la vérité? Après avoir dit cela, il sortit de nouveau pour aller vers les Juifs, et il leur dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je ne trouve aucun crime en lui.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 39-40: cf. (Mt 27:15-21. Mc 15:6-14. Lu 23:13-23.)'
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, comme c’est parmi vous '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 15:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'une coutume que je vous relâche quelqu’un à la fête de Pâque, voulez-vous que je vous relâche le roi des Juifs? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, sachant tout ce qui devait lui arriver, s’avança, et leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Qui cherchez-vous?
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors de nouveau tous s’écrièrent: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 3:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Non pas lui, mais Barabbas. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 15:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Or, Barabbas était un brigand.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui répondirent: Jésus de Nazareth. Jésus leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: C’est moi.
    - type: text
      text: ' Et Judas, qui le livrait, était avec eux. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Jésus leur eut dit: C’est moi, ils reculèrent et tombèrent par terre. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur demanda de nouveau: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Qui cherchez-vous?
    - type: text
      text: ' Et ils dirent: Jésus de Nazareth. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous ai dit que c’est moi. Si donc c’est moi que vous cherchez, laissez aller ceux-ci.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit cela, afin que s’accomplît la parole qu’il avait dite: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6:39
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:28
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je n’ai perdu aucun de ceux que tu m’as donnés. '
