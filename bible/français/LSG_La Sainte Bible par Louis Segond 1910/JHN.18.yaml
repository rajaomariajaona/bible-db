document_id: JHN.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Arrestation de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. Mt 26:36-54. Mc 14:32-50. Lu 22:39-51.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
