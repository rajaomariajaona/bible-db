document_id: JHN.18,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Arrestation de Jésus
  - type: heading
    content: 'V. 1-11: cf. Mt 26:36-54. Mc 14:32-50. Lu 22:39-51.'
  - type: text
    content: ' '
  - type: note
    content: 2 S 15:23. Mt 26:36. Mc 14:32. Lu 22:39.
  - type: text
    content: 'Lorsqu’il eut dit ces choses, Jésus alla avec ses disciples de l’autre côté du torrent du Cédron, où se trouvait un jardin, dans lequel il entra, lui et ses disciples. '
  '10':
  - type: note
    content: Mt 26:51. Mc 14:47. Lu 22:50.
  - type: text
    content: 'Simon Pierre, qui avait une épée, la tira, frappa le serviteur du souverain sacrificateur, et lui coupa l’oreille droite. Ce serviteur s’appelait Malchus. '
  '11':
  - type: text
    content: 'Jésus dit à Pierre: '
  - type: text
    content: Remets ton épée dans le fourreau.
  - type: text
    content: ' '
  - type: note
    content: Mt 20:22; 26:39.
  - type: text
    content: Ne boirai-je pas la coupe que le Père m’a donnée à boire?
  - type: heading
    content: Jésus devant Anne et Caïphe. Reniement de Pierre
  - type: heading
    content: 'V. 12-27: cf. (Mt 26:57-75. Mc 14:53-72. Lu 22:54-65.)'
  '12':
  - type: text
    content: 'La cohorte, le tribun, et les huissiers des Juifs, se saisirent alors de Jésus, et le lièrent. '
  '13':
  - type: note
    content: Mt 26:57. Mc 14:53. Lu 22:54.
  - type: text
    content: 'Ils l’emmenèrent d’abord chez '
  - type: note
    content: Lu 3:2.
  - type: text
    content: 'Anne; car il était le beau-père de Caïphe, qui était souverain sacrificateur cette année-là. '
  '14':
  - type: text
    content: 'Et '
  - type: note
    content: Jn 11:50.
  - type: text
    content: 'Caïphe était celui qui avait donné ce conseil aux Juifs: Il est avantageux qu’un seul homme meure pour le peuple. '
  '15':
  - type: note
    content: Mt 25:58. Mc 14:54. Lu 22:45.
  - type: text
    content: 'Simon Pierre, avec un autre disciple, suivait Jésus. Ce disciple était connu du souverain sacrificateur, et il entra avec Jésus dans la cour du souverain sacrificateur; '
  '16':
  - type: text
    content: 'mais Pierre resta dehors près de la porte. L’autre disciple, qui était connu du souverain sacrificateur, sortit, parla à la portière, et fit entrer Pierre. '
  '17':
  - type: text
    content: 'Alors la servante, la portière, dit à Pierre: Toi aussi, n’es-tu pas des disciples de cet homme? Il dit: Je n’en suis point. '
  '18':
  - type: text
    content: 'Les serviteurs et les huissiers, qui étaient là, avaient allumé un brasier, car il faisait froid, et ils se chauffaient. '
  - type: note
    content: Mt 26:69. Mc 14:67. Lu 22:55.
  - type: text
    content: 'Pierre se tenait avec eux, et se chauffait. '
  '19':
  - type: text
    content: 'Le souverain sacrificateur interrogea Jésus sur ses disciples et sur sa doctrine. '
  '2':
  - type: text
    content: 'Judas, qui le livrait, connaissait ce lieu, parce que Jésus et ses disciples s’y étaient souvent réunis. '
  '20':
  - type: text
    content: 'Jésus lui répondit: '
  - type: note
    content: Jn 7:26.
  - type: text
    content: J’ai parlé ouvertement au monde; j’ai toujours enseigné dans la synagogue et dans le temple, où tous les Juifs s’assemblent, et je n’ai rien dit en secret.
  '21':
  - type: text
    content: ' '
  - type: text
    content: Pourquoi m’interroges-tu? Interroge sur ce que je leur ai dit ceux qui m’ont entendu; voici, ceux-là savent ce que j’ai dit.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'A ces mots, '
  - type: note
    content: Jé 20:2. Ac 23:2.
  - type: text
    content: 'un des huissiers, qui se trouvait là, donna un soufflet à Jésus, en disant: Est-ce ainsi que tu réponds au souverain sacrificateur? '
  '23':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: Si j’ai mal parlé, fais voir ce que j’ai dit de mal; et si j’ai bien parlé, pourquoi me frappes-tu?
  - type: text
    content: ' '
  '24':
  - type: note
    content: Mt 26:57. Mc 14:53. Lu 22:54.
  - type: text
    content: 'Anne l’envoya lié à Caïphe, le souverain sacrificateur. '
  '25':
  - type: note
    content: Mt 26:71. Mc 14:69. Lu 22:58.
  - type: text
    content: 'Simon Pierre était là, et se chauffait. On lui dit: Toi aussi, n’es-tu pas de ses disciples? Il le nia, et dit: Je n’en suis point. '
  '26':
  - type: text
    content: 'Un des serviteurs du souverain sacrificateur, parent de celui à qui Pierre avait coupé l’oreille, dit: Ne t’ai-je pas vu avec lui dans le jardin? '
  '27':
  - type: text
    content: 'Pierre le nia de nouveau. '
  - type: note
    content: Jn 13:38.
  - type: text
    content: Et aussitôt le coq chanta.
  - type: heading
    content: Jésus devant Pilate, gouverneur romain
  - type: heading
    content: 'V. 28-38: cf. (Mt 27:1, 2, 11-14. Mc 15:1-5. Lu 23:1-5.) 1 Ti 6:13.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: Mt 27:1. Mc 15:1. Lu 22:66; 23:1.
  - type: text
    content: 'Ils conduisirent Jésus de chez Caïphe au prétoire: c’était le matin. Ils n’entrèrent point eux-mêmes dans le prétoire, '
  - type: note
    content: Ac 10:28; 11:3.
  - type: text
    content: 'afin de ne pas se souiller, et de pouvoir manger la Pâque. '
  '29':
  - type: text
    content: 'Pilate sortit donc pour aller à eux, et il dit: Quelle accusation portez-vous contre cet homme? '
  '3':
  - type: note
    content: Mt 26:47. Mc 14:43. Lu 22:47.
  - type: text
    content: 'Judas donc, ayant pris la cohorte, et des huissiers qu’envoyèrent les principaux sacrificateurs et les pharisiens, vint là avec des lanternes, des flambeaux et des armes. '
  '30':
  - type: text
    content: 'Ils lui répondirent: Si ce n’était pas un malfaiteur, nous ne te l’aurions pas livré. '
  '31':
  - type: text
    content: 'Sur quoi Pilate leur dit: Prenez-le vous-mêmes, et jugez-le selon votre loi. Les Juifs lui dirent: Il ne nous est pas permis de mettre personne à mort. '
  '32':
  - type: note
    content: Mt 20:19. Jn 12:32.
  - type: text
    content: 'C’était afin que s’accomplît la parole que Jésus avait dite, lorsqu’il indiqua de quelle mort il devait mourir. '
  '33':
  - type: note
    content: Mt 27:11. Mc 15:2. Lu 23:3.
  - type: text
    content: 'Pilate rentra dans le prétoire, appela Jésus, et lui dit: Es-tu le roi des Juifs? '
  '34':
  - type: text
    content: 'Jésus répondit: '
  - type: text
    content: Est-ce de toi-même que tu dis cela, ou d’autres te l’ont-ils dit de moi?
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Pilate répondit: Moi, suis-je Juif? Ta nation et les principaux sacrificateurs t’ont livré à moi: qu’as-tu fait?'
  '36':
  - type: text
    content: ' '
  - type: note
    content: Jn 6:15. 1 Ti 6:13.
  - type: text
    content: Mon royaume n’est pas de ce monde,
  - type: text
    content: ' répondit Jésus. '
  - type: text
    content: Si mon royaume était de ce monde, mes serviteurs auraient combattu pour moi afin que je ne fusse pas livré aux Juifs; mais maintenant mon royaume n’est point d’ici-bas.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Pilate lui dit: Tu es donc roi? Jésus répondit: '
  - type: text
    content: Tu le dis, je suis roi. Je suis né et je suis venu dans le monde pour rendre témoignage à la vérité. Quiconque est de la vérité écoute ma voix.
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'Pilate lui dit: Qu’est-ce que la vérité? Après avoir dit cela, il sortit de nouveau pour aller vers les Juifs, et il leur dit: '
  - type: note
    content: Mt 27:24. Lu 23:4.
  - type: text
    content: Je ne trouve aucun crime en lui.
  - type: heading
    content: 'V. 39-40: cf. (Mt 27:15-21. Mc 15:6-14. Lu 23:13-23.)'
  '39':
  - type: text
    content: 'Mais, comme c’est parmi vous '
  - type: note
    content: Mt 27:15. Mc 15:6. Lu 23:17.
  - type: text
    content: 'une coutume que je vous relâche quelqu’un à la fête de Pâque, voulez-vous que je vous relâche le roi des Juifs? '
  '4':
  - type: text
    content: 'Jésus, sachant tout ce qui devait lui arriver, s’avança, et leur dit: '
  - type: text
    content: Qui cherchez-vous?
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Alors de nouveau tous s’écrièrent: '
  - type: note
    content: Ac 3:14.
  - type: text
    content: 'Non pas lui, mais Barabbas. '
  - type: note
    content: Mt 27:16. Mc 15:7. Lu 23:19.
  - type: text
    content: Or, Barabbas était un brigand.
  '5':
  - type: text
    content: 'Ils lui répondirent: Jésus de Nazareth. Jésus leur dit: '
  - type: text
    content: C’est moi.
  - type: text
    content: ' Et Judas, qui le livrait, était avec eux. '
  '6':
  - type: text
    content: 'Lorsque Jésus leur eut dit: C’est moi, ils reculèrent et tombèrent par terre. '
  '7':
  - type: text
    content: 'Il leur demanda de nouveau: '
  - type: text
    content: Qui cherchez-vous?
  - type: text
    content: ' Et ils dirent: Jésus de Nazareth. '
  '8':
  - type: text
    content: 'Jésus répondit: '
  - type: text
    content: Je vous ai dit que c’est moi. Si donc c’est moi que vous cherchez, laissez aller ceux-ci.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Il dit cela, afin que s’accomplît la parole qu’il avait dite: '
  - type: note
    content: Jn 6:39; 10:28; 17:12.
  - type: text
    content: 'Je n’ai perdu aucun de ceux que tu m’as donnés. '
