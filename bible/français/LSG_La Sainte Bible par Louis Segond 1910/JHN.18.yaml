      - type: text
        text: 2 S 15:23
      metadata:
        usfm: 2SA.15.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:36
      metadata:
        usfm: MAT.26.36
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:32
      metadata:
        usfm: MRK.14.32
    - type: text
