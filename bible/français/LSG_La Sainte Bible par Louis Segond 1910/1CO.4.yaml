document_id: 1CO.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-7: cf. 1 Co 3:5-9. Ro 14:10-12.'
  - type: text
    content: 'Ainsi, qu’on nous regarde '
  - type: note
    content: Mt 24:45. 2 Co 6:4. Col 1:25. Tit 1:7.
  - type: text
    content: 'comme des serviteurs de Christ, et des dispensateurs des mystères de Dieu. '
  '10':
  - type: note
    content: 1 Co 2:3.
  - type: text
    content: 'Nous sommes fous à cause de Christ; mais vous, vous êtes sages en Christ; nous sommes faibles, mais vous êtes forts. Vous êtes honorés, et nous sommes méprisés! '
  '11':
  - type: text
    content: 'Jusqu’à cette heure, nous souffrons la faim, la soif, la nudité; '
  - type: note
    content: Ac 23:2.
  - type: text
    content: 'nous sommes maltraités, errants çà et là; '
  '12':
  - type: note
    content: Ac 18:3; 20:34. 1 Th 2:9. 2 Th 3:8.
  - type: text
    content: 'nous nous fatiguons à travailler de nos propres mains; injuriés, '
  - type: note
    content: Mt 5:44. Lu 6:28; 23:34. Ac 7:60. Ro 12:14.
  - type: text
    content: 'nous bénissons; persécutés, nous supportons; '
  '13':
  - type: text
    content: 'calomniés, nous parlons avec bonté; nous sommes devenus comme les balayures du monde, le rebut de tous, jusqu’à maintenant. '
  '14':
  - type: text
    content: 'Ce n’est pas pour vous faire honte que j’écris ces choses; mais je vous avertis '
  - type: note
    content: 1 Th 2:11.
  - type: text
    content: 'comme mes enfants bien-aimés. '
  '15':
  - type: text
    content: 'Car, quand vous auriez dix mille maîtres en Christ, vous n’avez cependant pas plusieurs pères, '
  - type: note
    content: Ac 18:11. Ga 4:19. Phm v. 10. Ja 1:18.
  - type: text
    content: 'puisque c’est moi qui vous ai engendrés en Jésus-Christ par l’Évangile. '
  '16':
  - type: text
    content: 'Je vous en conjure donc, '
  - type: note
    content: 1 Co 11:1. Ph 3:17. 1 Th 1:6. 2 Th 3:9.
  - type: text
    content: 'soyez mes imitateurs. '
  '17':
  - type: text
    content: Pour cela je vous ai envoyé Timothée, qui est mon enfant bien-aimé et fidèle dans le Seigneur; il vous rappellera quelles sont mes voies en Christ, quelle est la manière dont j’enseigne partout dans toutes les Églises.
  - type: heading
    content: 'V. 18-21: cf. 2 Co 10:1-11.'
  '18':
  - type: text
    content: 'Quelques-uns se sont enflés d’orgueil, comme si je ne devais pas aller chez vous. '
  '19':
  - type: text
    content: 'Mais j’irai bientôt chez vous, '
  - type: note
    content: Ac 18:21. Hé 6:3. Ja 4:15.
  - type: text
    content: 'si c’est la volonté du Seigneur, et je connaîtrai, non les paroles, mais la puissance de ceux qui se sont enflés. '
  '2':
  - type: text
    content: 'Du reste, ce qu’on demande des dispensateurs, '
  - type: note
    content: Lu 12:42.
  - type: text
    content: 'c’est que chacun soit trouvé fidèle. '
  '20':
  - type: note
    content: 1 Co 2:4. 1 Th 1:5. 2 Pi 1:16.
  - type: text
    content: 'Car le royaume de Dieu ne consiste pas en paroles, mais en puissance. '
  '21':
  - type: text
    content: Que voulez-vous? Que j’aille chez vous avec une verge, ou avec amour et dans un esprit de douceur?
  '3':
  - type: text
    content: 'Pour moi, il m’importe fort peu d’être jugé par vous, ou par un tribunal humain. Je ne me juge pas non plus moi-même, car je ne me sens coupable de rien; '
  '4':
  - type: note
    content: Ex 34:7. Job 9:2. Ps 143:2.
  - type: text
    content: 'mais ce n’est pas pour cela que je suis justifié. Celui qui me juge, c’est le Seigneur. '
  '5':
  - type: note
    content: Mt 7:1. Ro 2:1.
  - type: text
    content: 'C’est pourquoi ne jugez de rien avant le temps, jusqu’à ce que vienne le Seigneur, '
  - type: note
    content: Da 7:10. Ap 20:12.
  - type: text
    content: 'qui mettra en lumière ce qui est caché dans les ténèbres, et qui manifestera les desseins des cœurs. Alors chacun recevra de Dieu la louange qui lui sera due. '
  '6':
  - type: text
    content: 'C’est à cause de vous, frères, que j’ai fait de ces choses une application à ma personne et à celle d’Apollos, afin que vous appreniez en nos personnes '
  - type: note
    content: Pr 3:7. Ro 12:3.
  - type: text
    content: 'à ne pas aller au-delà de ce qui est écrit, et que nul de vous ne conçoive de l’orgueil en faveur de l’un contre l’autre. '
  '7':
  - type: text
    content: 'Car qui est-ce qui te distingue? '
  - type: note
    content: Jn 3:27. Ja 1:17.
  - type: text
    content: Qu’as-tu que tu n’aies reçu? Et si tu l’as reçu, pourquoi te glorifies-tu, comme si tu ne l’avais pas reçu?
  - type: heading
    content: 'V. 8-17: cf. 2 Co 6:4-13. Ph 2:19-22.'
  '8':
  - type: text
    content: 'Déjà vous êtes rassasiés, déjà vous êtes riches, sans nous vous avez commencé à régner. Et puissiez-vous régner en effet, afin que nous aussi nous régnions avec vous! '
  '9':
  - type: text
    content: 'Car Dieu, ce me semble, a fait de nous, apôtres, les derniers des hommes, '
  - type: note
    content: Ps 44:23. Ro 8:36. 2 Co 4:11.
  - type: text
    content: 'des condamnés à mort en quelque sorte, puisque nous avons été en '
  - type: note
    content: Hé 10:33.
  - type: text
    content: 'spectacle au monde, aux anges et aux hommes. '
