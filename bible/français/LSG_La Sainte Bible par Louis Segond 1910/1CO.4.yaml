document_id: 1CO.4
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. 1 Co 3:5-9. Ro 14:10-12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ainsi, qu’on nous regarde '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 24:45
      metadata:
        usfm: MAT.24.45
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 6:4
      metadata:
        usfm: 2CO.6.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:25
      metadata:
        usfm: COL.1.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 1:7
      metadata:
        usfm: TIT.1.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme des serviteurs de Christ, et des dispensateurs des mystères de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Du reste, ce qu’on demande des dispensateurs, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 12:42
      metadata:
        usfm: LUK.12.42
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'c’est que chacun soit trouvé fidèle. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pour moi, il m’importe fort peu d’être jugé par vous, ou par un tribunal humain. Je ne me juge pas non plus moi-même, car je ne me sens coupable de rien; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 34:7
      metadata:
        usfm: EXO.34.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 9:2
      metadata:
        usfm: JOB.9.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 143:2
      metadata:
        usfm: PSA.143.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais ce n’est pas pour cela que je suis justifié. Celui qui me juge, c’est le Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 7:1
      metadata:
        usfm: MAT.7.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 2:1
      metadata:
        usfm: ROM.2.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est pourquoi ne jugez de rien avant le temps, jusqu’à ce que vienne le Seigneur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 7:10
      metadata:
        usfm: DAN.7.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 20:12
      metadata:
        usfm: REV.20.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui mettra en lumière ce qui est caché dans les ténèbres, et qui manifestera les desseins des cœurs. Alors chacun recevra de Dieu la louange qui lui sera due. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C’est à cause de vous, frères, que j’ai fait de ces choses une application à ma personne et à celle d’Apollos, afin que vous appreniez en nos personnes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 3:7
      metadata:
        usfm: PRO.3.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:3
      metadata:
        usfm: ROM.12.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à ne pas aller au-delà de ce qui est écrit, et que nul de vous ne conçoive de l’orgueil en faveur de l’un contre l’autre. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Car qui est-ce qui te distingue? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:27
      metadata:
        usfm: JHN.3.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:17
      metadata:
        usfm: JAS.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qu’as-tu que tu n’aies reçu? Et si tu l’as reçu, pourquoi te glorifies-tu, comme si tu ne l’avais pas reçu?
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-17: cf. 2 Co 6:4-13. Ph 2:19-22.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Déjà vous êtes rassasiés, déjà vous êtes riches, sans nous vous avez commencé à régner. Et puissiez-vous régner en effet, afin que nous aussi nous régnions avec vous! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Car Dieu, ce me semble, a fait de nous, apôtres, les derniers des hommes, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 44:23
      metadata:
        usfm: PSA.44.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:36
      metadata:
        usfm: ROM.8.36
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 4:11
      metadata:
        usfm: 2CO.4.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des condamnés à mort en quelque sorte, puisque nous avons été en '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 10:33
      metadata:
        usfm: HEB.10.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'spectacle au monde, aux anges et aux hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 2:3
      metadata:
        usfm: 1CO.2.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous sommes fous à cause de Christ; mais vous, vous êtes sages en Christ; nous sommes faibles, mais vous êtes forts. Vous êtes honorés, et nous sommes méprisés! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jusqu’à cette heure, nous souffrons la faim, la soif, la nudité; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 23:2
      metadata:
        usfm: ACT.23.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nous sommes maltraités, errants çà et là; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 18:3
      metadata:
        usfm: ACT.18.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:34
      metadata:
        usfm: ACT.20.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 2:9
      metadata:
        usfm: 1TH.2.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:8
      metadata:
        usfm: 2TH.3.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nous nous fatiguons à travailler de nos propres mains; injuriés, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:44
      metadata:
        usfm: MAT.5.44
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 6:28
      metadata:
        usfm: LUK.6.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:34
      metadata:
        usfm: LUK.23.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:60
      metadata:
        usfm: ACT.7.60
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:14
      metadata:
        usfm: ROM.12.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nous bénissons; persécutés, nous supportons; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'calomniés, nous parlons avec bonté; nous sommes devenus comme les balayures du monde, le rebut de tous, jusqu’à maintenant. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ce n’est pas pour vous faire honte que j’écris ces choses; mais je vous avertis '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 2:11
      metadata:
        usfm: 1TH.2.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme mes enfants bien-aimés. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Car, quand vous auriez dix mille maîtres en Christ, vous n’avez cependant pas plusieurs pères, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 18:11
      metadata:
        usfm: ACT.18.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 4:19
      metadata:
        usfm: GAL.4.19
    - type: text
      text: '. Phm v. 10. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:18
      metadata:
        usfm: JAS.1.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'puisque c’est moi qui vous ai engendrés en Jésus-Christ par l’Évangile. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je vous en conjure donc, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 11:1
      metadata:
        usfm: 1CO.11.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 3:17
      metadata:
        usfm: PHP.3.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 1:6
      metadata:
        usfm: 1TH.1.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:9
      metadata:
        usfm: 2TH.3.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'soyez mes imitateurs. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Pour cela je vous ai envoyé Timothée, qui est mon enfant bien-aimé et fidèle dans le Seigneur; il vous rappellera quelles sont mes voies en Christ, quelle est la manière dont j’enseigne partout dans toutes les Églises.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-21: cf. 2 Co 10:1-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Quelques-uns se sont enflés d’orgueil, comme si je ne devais pas aller chez vous. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais j’irai bientôt chez vous, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 18:21
      metadata:
        usfm: ACT.18.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 6:3
      metadata:
        usfm: HEB.6.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 4:15
      metadata:
        usfm: JAS.4.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'si c’est la volonté du Seigneur, et je connaîtrai, non les paroles, mais la puissance de ceux qui se sont enflés. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 2:4
      metadata:
        usfm: 1CO.2.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 1:5
      metadata:
        usfm: 1TH.1.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 1:16
      metadata:
        usfm: 2PE.1.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car le royaume de Dieu ne consiste pas en paroles, mais en puissance. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Que voulez-vous? Que j’aille chez vous avec une verge, ou avec amour et dans un esprit de douceur?
