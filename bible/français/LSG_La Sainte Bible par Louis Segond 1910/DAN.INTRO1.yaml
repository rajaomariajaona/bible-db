type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION AU LIVRE DE DANIEL
  - type: text
    content: (Ps 25:14. 1 Co 4:2. Hé 11:2.) Jé 33:3.
  - type: text
    content: 'Ce livre a pour titre «Daniel» (Dieu juge). Jeune homme membre d’une famille de l’aristocratie judéenne, Daniel assista à la défaite de Jojakim, roi de Juda. Avec ses compagnons, il fut exilé à Babylone par le roi Nebucadnetsar. Dans ce livre est raconté le récit de l’héroïsme de ces quatre juifs à Babylone: Daniel (Beltschatsar), Hanania (Schadrac), Mischaël (Méschac) et Azaria (Abed-Nego).'
  - type: text
    content: 'Comme Esdras, le livre de Daniel est bilingue: son début et sa fin sont écrits en hébreu, mais la section centrale (2:8–7:28) est en araméen.'
  - type: text
    content: 'Les chapitres 1 à 6 contiennent six récits indépendants les uns des autres. Cette partie est essentiellement narrative. Daniel et ses compagnons étaient à Babylone: le roi Nebucadnetsar fit un songe et reçut de Daniel l’explication de ses visions (1–2). Un ordre imposa l’adoration de la statue d’or. Ses compagnons refusèrent. Ils furent jetés dans la fournaise ardente et Dieu les sauva (3). Le roi reçut de Daniel l’interprétation d’un second songe qui se réalisa.'
  - type: text
    content: Au festin du roi, Daniel décrypta une mystérieuse écriture murale annonçant la prise de Babylone (5). Les ennemis de Daniel lui tendirent un piège en rapport avec sa vie de prière, mais son Dieu le délivra de la fosse aux lions (6).
  - type: text
    content: Les chapitres 7 à 12 comportent des visions divines reçues par Daniel. Cette partie est résolument apocalyptique. Ces visions révèlent l’histoire du peuple juif dominé par plusieurs nations étrangères.
  - type: text
    content: La première concerne quatre bêtes, la deuxième un bélier, la troisième un homme vêtu de lin. Chacune est suivie d’une interprétation. Cette partie annonce aussi la guerre entre les rois du Midi et du Nord. Un chapitre sur l’angoisse et la résurrection finale termine ce livre.
  - type: text
    content: 'Le livre de Daniel insiste sur la fidélité à Dieu à une époque où des compromissions de toutes sortes menacent la foi. Dieu reste le maître de l’histoire malgré un déferlement de violence et de persécution. Le croyant doit se tenir en éveil et désirer la connaissance: ceux qui auront eu le discernement brilleront (12:3).'
  - type: text
    content: Le livre de Daniel encourage les fidèles à suivre les préceptes de l’Éternel même au milieu des incroyants. Les fidèles se doivent aussi de persévérer dans la foi quelles que soient les épreuves et les persécutions à affronter. Tout pouvoir temporel, malgré son apparente indépendance, est sous le contrôle de l’Éternel qui est prêt à intervenir pour honorer la foi des siens.
