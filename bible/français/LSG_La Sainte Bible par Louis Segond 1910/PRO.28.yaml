      - type: text
        text: És 57:21
      metadata:
        usfm: ISA.57.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le méchant prend la fuite sans qu’on le poursuive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le juste a de l’assurance comme un jeune lion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Quand un pays est en révolte, les chefs sont nombreux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais avec un homme qui a de l’intelligence et de la science,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le règne se prolonge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Un homme pauvre qui opprime les misérables
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est une pluie violente qui fait manquer le pain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ceux qui abandonnent la loi louent le méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ceux qui observent la loi s’irritent contre lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les hommes livrés au mal ne comprennent pas ce qui est juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ceux qui cherchent l’Éternel comprennent tout.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 19:1
      metadata:
        usfm: PRO.19.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mieux vaut le pauvre qui marche dans son intégrité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que celui qui a des voies tortueuses et qui est riche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 29:3
      metadata:
        usfm: PRO.29.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui observe la loi est un fils intelligent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui fréquente les débauchés fait honte à son père.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Celui qui augmente ses biens par l’intérêt et l’usure
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les amasse pour celui qui a pitié des pauvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Si quelqu’un détourne l’oreille pour ne pas écouter la loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa prière même est une abomination.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Celui qui égare les hommes droits dans la mauvaise voie
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 26:27
      metadata:
        usfm: PRO.26.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tombe dans la fosse qu’il a creusée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais les hommes intègres héritent le bonheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’homme riche se croit sage;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais le pauvre qui est intelligent le sonde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 11:10
      metadata:
        usfm: PRO.11.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: PRO.11.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Quand les justes triomphent, c’est une grande gloire;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: v. 28.
    marker-yv: yv-n
  - type: text
    text: Quand les méchants s’élèvent, chacun se cache.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Celui qui cache ses transgressions ne prospère point,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 32:3
      metadata:
        usfm: PSA.32.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: PSA.32.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 1:9
      metadata:
        usfm: 1JN.1.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: 1JN.1.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais celui qui les avoue et les délaisse obtient miséricorde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Heureux l’homme qui est continuellement dans la crainte!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui endurcit son cœur tombe dans le malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Comme un lion rugissant et un ours affamé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi est le méchant qui domine sur un peuple pauvre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Un prince sans intelligence multiplie les actes d’oppression,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui est ennemi de la cupidité prolonge ses jours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Un homme chargé du sang d’un autre
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fuit jusqu’à la fosse: qu’on ne l’arrête pas!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Celui qui marche dans l’intégrité trouve le salut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui suit deux voies tortueuses tombe dans l’une d’elles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Celui qui cultive son champ est rassasié de pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui poursuit des choses vaines est rassasié de pauvreté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Un homme fidèle est comblé de bénédictions,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 13:11
      metadata:
        usfm: PRO.13.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:21
      metadata:
        usfm: PRO.20.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:4
      metadata:
        usfm: PRO.23.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais celui qui a hâte de s’enrichir ne reste pas impuni.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 18:5
      metadata:
        usfm: PRO.18.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:23
      metadata:
        usfm: PRO.24.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il n’est pas bon d’avoir égard aux personnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pour un morceau de pain un homme se livre au péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Un homme envieux a hâte de s’enrichir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il ne sait pas que la disette viendra sur lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Celui qui reprend les autres trouve ensuite plus de faveur
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que celui dont la langue est flatteuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Celui qui vole son père et sa mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et qui dit: Ce n’est pas un péché!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est le compagnon du destructeur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 13:10
      metadata:
        usfm: PRO.13.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:18
      metadata:
        usfm: PRO.15.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:22
      metadata:
        usfm: PRO.29.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’orgueilleux excite les querelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui se confie en l’Éternel est rassasié.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Celui qui a confiance dans son propre cœur est un insensé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui marche dans la sagesse sera sauvé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 15:7
      metadata:
        usfm: DEU.15.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: DEU.15.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: DEU.15.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 19:17
      metadata:
        usfm: PRO.19.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:9
      metadata:
        usfm: PRO.22.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui donne au pauvre n’éprouve pas la disette,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui ferme les yeux est chargé de malédictions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: v. 12.
    marker-yv: yv-n
  - type: text
    text: Quand les méchants s’élèvent, chacun se cache;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et quand ils périssent, les justes se multiplient.
