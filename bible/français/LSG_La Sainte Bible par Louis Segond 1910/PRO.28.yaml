      - type: text
        text: Lé 26:36
      metadata:
        usfm: LEV.26.36
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:28
      metadata:
        usfm: DEU.28.28
    - type: text
      text: '. '
    - type: usfm
