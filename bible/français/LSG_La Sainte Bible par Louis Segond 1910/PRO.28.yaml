document_id: PRO.28,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 26:36
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 28:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 57:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le méchant prend la fuite sans qu’on le poursuive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le juste a de l’assurance comme un jeune lion.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui égare les hommes droits dans la mauvaise voie
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 26:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tombe dans la fosse qu’il a creusée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les hommes intègres héritent le bonheur.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme riche se croit sage;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le pauvre qui est intelligent le sonde.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 11:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Quand les justes triomphent, c’est une grande gloire;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: v. 28.
      marker-yv: yv-n
    - type: text
      text: Quand les méchants s’élèvent, chacun se cache.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui cache ses transgressions ne prospère point,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 32:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 1:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais celui qui les avoue et les délaisse obtient miséricorde.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux l’homme qui est continuellement dans la crainte!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui endurcit son cœur tombe dans le malheur.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un lion rugissant et un ours affamé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi est le méchant qui domine sur un peuple pauvre.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un prince sans intelligence multiplie les actes d’oppression,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui est ennemi de la cupidité prolonge ses jours.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un homme chargé du sang d’un autre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fuit jusqu’à la fosse: qu’on ne l’arrête pas!'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui marche dans l’intégrité trouve le salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui suit deux voies tortueuses tombe dans l’une d’elles.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui cultive son champ est rassasié de pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui poursuit des choses vaines est rassasié de pauvreté.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand un pays est en révolte, les chefs sont nombreux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais avec un homme qui a de l’intelligence et de la science,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le règne se prolonge.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un homme fidèle est comblé de bénédictions,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 13:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais celui qui a hâte de s’enrichir ne reste pas impuni.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 18:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il n’est pas bon d’avoir égard aux personnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pour un morceau de pain un homme se livre au péché.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un homme envieux a hâte de s’enrichir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il ne sait pas que la disette viendra sur lui.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui reprend les autres trouve ensuite plus de faveur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que celui dont la langue est flatteuse.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui vole son père et sa mère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et qui dit: Ce n’est pas un péché!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est le compagnon du destructeur.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 13:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’orgueilleux excite les querelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui se confie en l’Éternel est rassasié.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui a confiance dans son propre cœur est un insensé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui marche dans la sagesse sera sauvé.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 15:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 19:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Celui qui donne au pauvre n’éprouve pas la disette,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui ferme les yeux est chargé de malédictions.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: v. 12.
      marker-yv: yv-n
    - type: text
      text: Quand les méchants s’élèvent, chacun se cache;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et quand ils périssent, les justes se multiplient.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un homme pauvre qui opprime les misérables
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est une pluie violente qui fait manquer le pain.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui abandonnent la loi louent le méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ceux qui observent la loi s’irritent contre lui.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les hommes livrés au mal ne comprennent pas ce qui est juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ceux qui cherchent l’Éternel comprennent tout.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 19:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mieux vaut le pauvre qui marche dans son intégrité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que celui qui a des voies tortueuses et qui est riche.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 29:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Celui qui observe la loi est un fils intelligent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui fréquente les débauchés fait honte à son père.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui augmente ses biens par l’intérêt et l’usure
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les amasse pour celui qui a pitié des pauvres.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si quelqu’un détourne l’oreille pour ne pas écouter la loi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa prière même est une abomination.
