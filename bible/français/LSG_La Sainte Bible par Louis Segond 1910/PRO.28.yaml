document_id: PRO.28,93
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Lé 26:36. De 28:28. És 57:21.
  - type: text
    content: Le méchant prend la fuite sans qu’on le poursuive,
  - type: text
    content: Le juste a de l’assurance comme un jeune lion.
  '10':
  - type: text
    content: Celui qui égare les hommes droits dans la mauvaise voie
  - type: note
    content: Pr 26:27.
  - type: text
    content: Tombe dans la fosse qu’il a creusée;
  - type: text
    content: Mais les hommes intègres héritent le bonheur.
  '11':
  - type: text
    content: L’homme riche se croit sage;
  - type: text
    content: Mais le pauvre qui est intelligent le sonde.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Pr 11:10, 11.
  - type: text
    content: Quand les justes triomphent, c’est une grande gloire;
  - type: note
    content: v. 28.
  - type: text
    content: Quand les méchants s’élèvent, chacun se cache.
  '13':
  - type: text
    content: Celui qui cache ses transgressions ne prospère point,
  - type: note
    content: Ps 32:3, 5. 1 Jn 1:9, 10.
  - type: text
    content: Mais celui qui les avoue et les délaisse obtient miséricorde.
  '14':
  - type: text
    content: Heureux l’homme qui est continuellement dans la crainte!
  - type: text
    content: Mais celui qui endurcit son cœur tombe dans le malheur.
  '15':
  - type: text
    content: Comme un lion rugissant et un ours affamé,
  - type: text
    content: Ainsi est le méchant qui domine sur un peuple pauvre.
  '16':
  - type: text
    content: Un prince sans intelligence multiplie les actes d’oppression,
  - type: text
    content: Mais celui qui est ennemi de la cupidité prolonge ses jours.
  '17':
  - type: text
    content: Un homme chargé du sang d’un autre
  - type: text
    content: 'Fuit jusqu’à la fosse: qu’on ne l’arrête pas!'
  '18':
  - type: text
    content: Celui qui marche dans l’intégrité trouve le salut,
  - type: text
    content: Mais celui qui suit deux voies tortueuses tombe dans l’une d’elles.
  '19':
  - type: text
    content: Celui qui cultive son champ est rassasié de pain,
  - type: text
    content: Mais celui qui poursuit des choses vaines est rassasié de pauvreté.
  '2':
  - type: text
    content: Quand un pays est en révolte, les chefs sont nombreux;
  - type: text
    content: Mais avec un homme qui a de l’intelligence et de la science,
  - type: text
    content: Le règne se prolonge.
  '20':
  - type: text
    content: Un homme fidèle est comblé de bénédictions,
  - type: note
    content: Pr 13:11; 20:21; 23:4.
  - type: text
    content: Mais celui qui a hâte de s’enrichir ne reste pas impuni.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Pr 18:5; 24:23.
  - type: text
    content: Il n’est pas bon d’avoir égard aux personnes,
  - type: text
    content: Et pour un morceau de pain un homme se livre au péché.
  '22':
  - type: text
    content: Un homme envieux a hâte de s’enrichir,
  - type: text
    content: Et il ne sait pas que la disette viendra sur lui.
  '23':
  - type: text
    content: Celui qui reprend les autres trouve ensuite plus de faveur
  - type: text
    content: Que celui dont la langue est flatteuse.
  '24':
  - type: text
    content: Celui qui vole son père et sa mère,
  - type: text
    content: 'Et qui dit: Ce n’est pas un péché!'
  - type: text
    content: Est le compagnon du destructeur.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Pr 13:10; 15:18; 29:22.
  - type: text
    content: L’orgueilleux excite les querelles,
  - type: text
    content: Mais celui qui se confie en l’Éternel est rassasié.
  '26':
  - type: text
    content: Celui qui a confiance dans son propre cœur est un insensé,
  - type: text
    content: Mais celui qui marche dans la sagesse sera sauvé.
  '27':
  - type: text
    content: ' '
  - type: note
    content: De 15:7, 8, 10. Pr 19:17; 22:9.
  - type: text
    content: Celui qui donne au pauvre n’éprouve pas la disette,
  - type: text
    content: Mais celui qui ferme les yeux est chargé de malédictions.
  '28':
  - type: text
    content: ' '
  - type: note
    content: v. 12.
  - type: text
    content: Quand les méchants s’élèvent, chacun se cache;
  - type: text
    content: Et quand ils périssent, les justes se multiplient.
  '3':
  - type: text
    content: Un homme pauvre qui opprime les misérables
  - type: text
    content: Est une pluie violente qui fait manquer le pain.
  '4':
  - type: text
    content: Ceux qui abandonnent la loi louent le méchant,
  - type: text
    content: Mais ceux qui observent la loi s’irritent contre lui.
  '5':
  - type: text
    content: Les hommes livrés au mal ne comprennent pas ce qui est juste,
  - type: text
    content: Mais ceux qui cherchent l’Éternel comprennent tout.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Pr 19:1.
  - type: text
    content: Mieux vaut le pauvre qui marche dans son intégrité,
  - type: text
    content: Que celui qui a des voies tortueuses et qui est riche.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Pr 29:3.
  - type: text
    content: Celui qui observe la loi est un fils intelligent,
  - type: text
    content: Mais celui qui fréquente les débauchés fait honte à son père.
  '8':
  - type: text
    content: Celui qui augmente ses biens par l’intérêt et l’usure
  - type: text
    content: Les amasse pour celui qui a pitié des pauvres.
  '9':
  - type: text
    content: Si quelqu’un détourne l’oreille pour ne pas écouter la loi,
  - type: text
    content: Sa prière même est une abomination.
