document_id: 2CO.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Recommandations au sujet de la collecte pour les chrétiens de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-15: cf. Mc 12:41-44. (2 Co 9. Ro 15:25-27.) Ac 11:27-29. 2 Th 2:16, 17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nous vous faisons connaître, frères, la grâce de Dieu qui s’est manifestée dans les Églises de la Macédoine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Au milieu de beaucoup de tribulations qui les ont éprouvées, leur joie débordante et leur pauvreté profonde ont produit avec abondance de riches libéralités de leur part. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils ont, je l’atteste, donné volontairement selon leurs moyens, et même au-delà de leurs moyens, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 11:29
      metadata:
        usfm: ACT.11.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 15:26
      metadata:
        usfm: ROM.15.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 16:2
      metadata:
        usfm: 1CO.16.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 9:1
      metadata:
        usfm: 2CO.9.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nous demandant avec de grandes instances la grâce de prendre part à l’assistance destinée aux saints. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et non seulement ils ont contribué comme nous l’espérions, mais ils se sont d’abord donnés eux-mêmes au Seigneur, puis à nous, par la volonté de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nous avons donc engagé Tite à achever chez vous cette œuvre de bienfaisance, comme il l’avait commencée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'De même que vous excellez en toutes choses, en foi, en parole, en connaissance, en zèle à tous égards, et dans votre amour pour nous, faites en sorte d’exceller aussi dans cette œuvre de bienfaisance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je ne dis pas cela pour donner un ordre, mais pour éprouver, par le zèle des autres, la sincérité de votre charité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Car vous connaissez la grâce de notre Seigneur Jésus-Christ, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:58
      metadata:
        usfm: LUK.9.58
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui pour vous s’est fait pauvre, de riche qu’il était, afin que par sa pauvreté vous fussiez enrichis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C’est un avis que je donne là-dessus, car cela vous convient, à vous qui non seulement avez commencé à agir, mais qui en avez eu la volonté dès l’année dernière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Achevez donc maintenant d’agir, afin que l’accomplissement selon vos moyens réponde à l’empressement que vous avez mis à vouloir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 12:43
      metadata:
        usfm: MRK.12.43
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 21:3
      metadata:
        usfm: LUK.21.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'La bonne volonté, quand elle existe, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 3:28
      metadata:
        usfm: PRO.3.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:10
      metadata:
        usfm: 1PE.4.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'est agréable en raison de ce qu’elle peut avoir à sa disposition, et non de ce qu’elle n’a pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Car il s’agit, non de vous exposer à la détresse pour soulager les autres, mais de suivre une règle d’égalité: dans la circonstance présente votre superflu pourvoira à leurs besoins, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'afin que leur superflu pourvoie pareillement aux vôtres, en sorte qu’il y ait égalité, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'selon qu’il est écrit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 16:18
      metadata:
        usfm: EXO.16.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui avait ramassé beaucoup n’avait rien de trop, et celui qui avait ramassé peu n’en manquait pas.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-24: cf. 1 Co 16:1-4. 2 Co 9:1-5. 1 Co 14:40.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Grâces soient rendues à Dieu de ce qu’il a mis dans le cœur de Tite le même empressement pour vous; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'car il a accueilli notre demande, et c’est avec un nouveau zèle et de son plein gré qu’il part pour aller chez vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nous envoyons avec lui le frère dont la louange en ce qui concerne l’Évangile est répandue dans toutes les Églises, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et qui, de plus, a été choisi par les Églises pour être notre compagnon de voyage dans cette œuvre de bienfaisance, que nous accomplissons à la gloire du Seigneur même et en témoignage de notre bonne volonté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nous agissons ainsi, afin que personne ne nous blâme au sujet de cette abondante collecte, à laquelle nous donnons nos soins; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:17
      metadata:
        usfm: ROM.12.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car nous recherchons ce qui est bien, non seulement devant le Seigneur, mais aussi devant les hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nous envoyons avec eux notre frère, dont nous avons souvent éprouvé le zèle dans beaucoup d’occasions, et qui en montre plus encore cette fois à cause de sa grande confiance en vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ainsi, pour ce qui est de Tite, il est notre associé et notre compagnon d’œuvre auprès de vous; et pour ce qui est de nos frères, ils sont les envoyés des Églises, la gloire de Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Donnez-leur donc, à la face des Églises, la preuve de votre charité, et montrez-leur que nous avons sujet de nous glorifier de vous.
