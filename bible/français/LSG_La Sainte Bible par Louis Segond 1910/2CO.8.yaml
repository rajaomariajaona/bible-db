document_id: 2CO.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Recommandations au sujet de la collecte pour les chrétiens de Jérusalem
  - type: heading
    content: 'V. 1-15: cf. Mc 12:41-44. (2 Co 9. Ro 15:25-27.) Ac 11:27-29. 2 Th 2:16, 17.'
  - type: text
    content: 'Nous vous faisons connaître, frères, la grâce de Dieu qui s’est manifestée dans les Églises de la Macédoine. '
  '10':
  - type: text
    content: 'C’est un avis que je donne là-dessus, car cela vous convient, à vous qui non seulement avez commencé à agir, mais qui en avez eu la volonté dès l’année dernière. '
  '11':
  - type: text
    content: 'Achevez donc maintenant d’agir, afin que l’accomplissement selon vos moyens réponde à l’empressement que vous avez mis à vouloir. '
  '12':
  - type: note
    content: Mc 12:43. Lu 21:3.
  - type: text
    content: 'La bonne volonté, quand elle existe, '
  - type: note
    content: Pr 3:28. 1 Pi 4:10.
  - type: text
    content: 'est agréable en raison de ce qu’elle peut avoir à sa disposition, et non de ce qu’elle n’a pas. '
  '13':
  - type: text
    content: 'Car il s’agit, non de vous exposer à la détresse pour soulager les autres, mais de suivre une règle d’égalité: dans la circonstance présente votre superflu pourvoira à leurs besoins, '
  '14':
  - type: text
    content: 'afin que leur superflu pourvoie pareillement aux vôtres, en sorte qu’il y ait égalité, '
  '15':
  - type: text
    content: 'selon qu’il est écrit: '
  - type: note
    content: Ex 16:18.
  - type: text
    content: Celui qui avait ramassé beaucoup n’avait rien de trop, et celui qui avait ramassé peu n’en manquait pas.
  - type: heading
    content: 'V. 16-24: cf. 1 Co 16:1-4. 2 Co 9:1-5. 1 Co 14:40.'
  '16':
  - type: text
    content: 'Grâces soient rendues à Dieu de ce qu’il a mis dans le cœur de Tite le même empressement pour vous; '
  '17':
  - type: text
    content: 'car il a accueilli notre demande, et c’est avec un nouveau zèle et de son plein gré qu’il part pour aller chez vous. '
  '18':
  - type: text
    content: 'Nous envoyons avec lui le frère dont la louange en ce qui concerne l’Évangile est répandue dans toutes les Églises, '
  '19':
  - type: text
    content: 'et qui, de plus, a été choisi par les Églises pour être notre compagnon de voyage dans cette œuvre de bienfaisance, que nous accomplissons à la gloire du Seigneur même et en témoignage de notre bonne volonté. '
  '2':
  - type: text
    content: 'Au milieu de beaucoup de tribulations qui les ont éprouvées, leur joie débordante et leur pauvreté profonde ont produit avec abondance de riches libéralités de leur part. '
  '20':
  - type: text
    content: 'Nous agissons ainsi, afin que personne ne nous blâme au sujet de cette abondante collecte, à laquelle nous donnons nos soins; '
  '21':
  - type: note
    content: Ro 12:17.
  - type: text
    content: 'car nous recherchons ce qui est bien, non seulement devant le Seigneur, mais aussi devant les hommes. '
  '22':
  - type: text
    content: 'Nous envoyons avec eux notre frère, dont nous avons souvent éprouvé le zèle dans beaucoup d’occasions, et qui en montre plus encore cette fois à cause de sa grande confiance en vous. '
  '23':
  - type: text
    content: 'Ainsi, pour ce qui est de Tite, il est notre associé et notre compagnon d’œuvre auprès de vous; et pour ce qui est de nos frères, ils sont les envoyés des Églises, la gloire de Christ. '
  '24':
  - type: text
    content: Donnez-leur donc, à la face des Églises, la preuve de votre charité, et montrez-leur que nous avons sujet de nous glorifier de vous.
  '3':
  - type: text
    content: 'Ils ont, je l’atteste, donné volontairement selon leurs moyens, et même au-delà de leurs moyens, '
  '4':
  - type: note
    content: Ac 11:29. Ro 15:26. 1 Co 16:2. 2 Co 9:1.
  - type: text
    content: 'nous demandant avec de grandes instances la grâce de prendre part à l’assistance destinée aux saints. '
  '5':
  - type: text
    content: 'Et non seulement ils ont contribué comme nous l’espérions, mais ils se sont d’abord donnés eux-mêmes au Seigneur, puis à nous, par la volonté de Dieu. '
  '6':
  - type: text
    content: 'Nous avons donc engagé Tite à achever chez vous cette œuvre de bienfaisance, comme il l’avait commencée. '
  '7':
  - type: text
    content: 'De même que vous excellez en toutes choses, en foi, en parole, en connaissance, en zèle à tous égards, et dans votre amour pour nous, faites en sorte d’exceller aussi dans cette œuvre de bienfaisance. '
  '8':
  - type: text
    content: 'Je ne dis pas cela pour donner un ordre, mais pour éprouver, par le zèle des autres, la sincérité de votre charité. '
  '9':
  - type: text
    content: 'Car vous connaissez la grâce de notre Seigneur Jésus-Christ, '
  - type: note
    content: Lu 9:58.
  - type: text
    content: 'qui pour vous s’est fait pauvre, de riche qu’il était, afin que par sa pauvreté vous fussiez enrichis. '
