document_id: 1SA.25,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Mort de Samuel. — Dureté de Nabal envers David, et prudence de sa femme Abigaïl
  - type: heading
    content: 'V. 1-35: cf. (És 32:5-8. Ps 73:1-9.) (Pr 20:22; 15:1, 23, 31; 25:11.)'
  - type: text
    content: ' '
  - type: note
    content: 1 S 28:3.
  - type: text
    content: 'Samuel mourut. Tout Israël s’étant assemblé le pleura, et on l’enterra dans sa demeure à Rama. Ce fut alors que David se leva et descendit au désert de Paran. '
  '10':
  - type: text
    content: 'Nabal répondit aux serviteurs de David: Qui est David, et qui est le fils d’Isaï? Il y a aujourd’hui beaucoup de serviteurs qui s’échappent d’auprès de leurs maîtres. '
  '11':
  - type: text
    content: 'Et je prendrais mon pain, mon eau, et mon bétail que j’ai tué pour mes tondeurs, et je les donnerais à des gens qui sont je ne sais d’où? '
  '12':
  - type: text
    content: 'Les gens de David rebroussèrent chemin; ils s’en retournèrent, et redirent, à leur arrivée, toutes ces paroles à David. '
  '13':
  - type: text
    content: 'Alors David dit à ses gens: Que chacun de vous ceigne son épée! Et ils ceignirent chacun leur épée. David aussi ceignit son épée, et environ quatre cents hommes montèrent à sa suite. Il en resta deux cents près des bagages. '
  '14':
  - type: text
    content: 'Un des serviteurs de Nabal vint dire à Abigaïl, femme de Nabal: Voici, David a envoyé du désert des messagers pour saluer notre maître, qui les a rudoyés. '
  '15':
  - type: text
    content: 'Et pourtant ces gens ont été très bons pour nous; ils ne nous ont fait aucun outrage, et rien ne nous a été enlevé, tout le temps que nous avons été avec eux lorsque nous étions dans les champs. '
  '16':
  - type: text
    content: 'Ils nous ont nuit et jour servi de muraille, tout le temps que nous avons été avec eux, faisant paître les troupeaux. '
  '17':
  - type: text
    content: 'Sache maintenant et vois ce que tu as à faire, car la perte de notre maître et de toute sa maison est résolue, et il est si méchant qu’on n’ose lui parler. '
  '18':
  - type: text
    content: 'Abigaïl prit aussitôt deux cents pains, deux outres de vin, cinq pièces de bétail apprêtées, cinq mesures de grain rôti, cent masses de raisins secs, et deux cents de figues sèches. Elle les mit sur des ânes, '
  '19':
  - type: text
    content: 'et elle dit à ses serviteurs: Passez devant moi, je vais vous suivre. Elle ne dit rien à Nabal, son mari. '
  '2':
  - type: text
    content: 'Il y avait à Maon un homme fort riche, possédant des biens à Carmel; il avait trois mille brebis et mille chèvres, et il se trouvait à Carmel pour la tonte de ses brebis. '
  '20':
  - type: text
    content: 'Montée sur un âne, elle descendit la montagne par un chemin couvert; et voici, David et ses gens descendaient en face d’elle, en sorte qu’elle les rencontra. '
  '21':
  - type: text
    content: 'David avait dit: C’est bien en vain que j’ai gardé tout ce que cet homme a dans le désert, et que rien n’a été enlevé de tout ce qu’il possède; il m’a rendu le mal pour le bien. '
  '22':
  - type: text
    content: 'Que Dieu traite son serviteur David dans toute sa rigueur, si je laisse subsister jusqu’à la lumière du matin qui que ce soit de tout ce qui appartient à Nabal! '
  '23':
  - type: text
    content: 'Lorsque Abigaïl aperçut David, elle descendit rapidement de l’âne, tomba sur sa face en présence de David, et se prosterna contre terre. '
  '24':
  - type: text
    content: 'Puis, se jetant à ses pieds, elle dit: A moi la faute, mon seigneur! Permets à ta servante de parler à tes oreilles, et écoute les paroles de ta servante. '
  '25':
  - type: text
    content: 'Que mon seigneur ne prenne pas garde à ce méchant homme, à Nabal, car il est comme son nom; Nabal est son nom, et il y a chez lui de la folie. Et moi, ta servante, je n’ai pas vu les gens que mon seigneur a envoyés. '
  '26':
  - type: text
    content: 'Maintenant, mon seigneur, aussi vrai que l’Éternel est vivant et que ton âme est vivante, c’est l’Éternel qui t’a empêché de répandre le sang et qui a retenu ta main. Que tes ennemis, que ceux qui veulent du mal à mon seigneur soient comme Nabal! '
  '27':
  - type: text
    content: 'Accepte ce présent que ta servante apporte à mon seigneur, et qu’il soit distribué aux gens qui marchent à la suite de mon seigneur. '
  '28':
  - type: text
    content: 'Pardonne, je te prie, la faute de ta servante, car l’Éternel fera à mon seigneur une maison stable; pardonne, car mon seigneur soutient les guerres de l’Éternel, et la méchanceté ne se trouvera jamais en toi. '
  '29':
  - type: text
    content: 'S’il s’élève quelqu’un qui te poursuive et qui en veuille à ta vie, l’âme de mon seigneur sera liée dans le faisceau des vivants auprès de l’Éternel, ton Dieu, et il lancera du creux de la fronde l’âme de tes ennemis. '
  '3':
  - type: text
    content: 'Le nom de cet homme était Nabal, et sa femme s’appelait Abigaïl; c’était une femme de bon sens et belle de figure, mais l’homme était dur et méchant dans ses actions. Il descendait de Caleb. '
  '30':
  - type: text
    content: 'Lorsque l’Éternel aura fait à mon seigneur tout le bien qu’il t’a annoncé, et qu’il t’aura établi chef sur Israël, '
  '31':
  - type: text
    content: 'mon seigneur n’aura ni remords ni souffrance de cœur pour avoir répandu le sang inutilement et pour s’être vengé lui-même. Et lorsque l’Éternel aura fait du bien à mon seigneur, souviens-toi de ta servante. '
  '32':
  - type: text
    content: 'David dit à Abigaïl: Béni soit l’Éternel, le Dieu d’Israël, qui t’a envoyée aujourd’hui à ma rencontre! '
  '33':
  - type: text
    content: 'Béni soit ton bon sens, et bénie sois-tu, toi qui m’as empêché en ce jour de répandre le sang, et qui as retenu ma main! '
  '34':
  - type: text
    content: 'Mais l’Éternel, le Dieu d’Israël, qui m’a empêché de te faire du mal, est vivant! Si tu ne t’étais hâtée de venir au-devant de moi, il ne serait resté qui que ce soit à Nabal, d’ici à la lumière du matin. '
  '35':
  - type: text
    content: 'Et David prit de la main d’Abigaïl ce qu’elle lui avait apporté, et lui dit: Monte en paix dans ta maison; vois, j’ai écouté ta voix, et je t’ai favorablement accueillie.'
  - type: heading
    content: 'V. 36-44: cf. 2 S 13:23, 24. (Ps 73. Pr 1:32; 10:21.) (Pr 18:22; 19:14.)'
  '36':
  - type: text
    content: 'Abigaïl arriva auprès de Nabal. Et voici, il faisait dans sa maison un festin comme un festin de roi; il avait le cœur joyeux, et il était complètement dans l’ivresse. Elle ne lui dit aucune chose, petite ou grande, jusqu’à la lumière du matin. '
  '37':
  - type: text
    content: 'Mais le matin, l’ivresse de Nabal s’étant dissipée, sa femme lui raconta ce qui s’était passé. Le cœur de Nabal reçut un coup mortel, et devint comme une pierre. '
  '38':
  - type: text
    content: 'Environ dix jours après, l’Éternel frappa Nabal, et il mourut. '
  '39':
  - type: text
    content: 'David apprit que Nabal était mort, et il dit: Béni soit l’Éternel, qui a défendu ma cause dans l’outrage que m’a fait Nabal, et qui a empêché son serviteur de faire le mal! L’Éternel a fait retomber la méchanceté de Nabal sur sa tête. David envoya proposer à Abigaïl de devenir sa femme. '
  '4':
  - type: text
    content: 'David apprit au désert que Nabal tondait ses brebis. '
  '40':
  - type: text
    content: 'Les serviteurs de David arrivèrent chez Abigaïl à Carmel, et lui parlèrent ainsi: David nous a envoyés vers toi, afin de te prendre pour sa femme. '
  '41':
  - type: text
    content: 'Elle se leva, se prosterna le visage contre terre, et dit: Voici, ta servante sera une esclave pour laver les pieds des serviteurs de mon seigneur. '
  '42':
  - type: text
    content: 'Et aussitôt Abigaïl partit, montée sur un âne, et accompagnée de cinq jeunes filles; elle suivit les messagers de David, et elle devint sa femme. '
  '43':
  - type: text
    content: 'David avait aussi pris Achinoam de Jizreel, et toutes les deux furent ses femmes. '
  '44':
  - type: note
    content: 2 S 3:15.
  - type: text
    content: Et Saül avait donné sa fille Mical, femme de David, à Palthi de Gallim, fils de Laïsch.
  '5':
  - type: text
    content: 'Il envoya vers lui dix jeunes gens, auxquels il dit: Montez à Carmel, et allez auprès de Nabal. Vous le saluerez en mon nom, '
  '6':
  - type: text
    content: 'et vous lui parlerez ainsi: Pour la vie sois en paix, et que la paix soit avec ta maison et tout ce qui t’appartient! '
  '7':
  - type: text
    content: 'Et maintenant, j’ai appris que tu as les tondeurs. Or tes bergers ont été avec nous; nous ne leur avons fait aucun outrage, et rien ne leur a été enlevé pendant tout le temps qu’ils ont été à Carmel. '
  '8':
  - type: text
    content: 'Demande-le à tes serviteurs, et ils te le diront. Que ces jeunes gens trouvent donc grâce à tes yeux, puisque nous venons dans un jour de joie. Donne donc, je te prie, à tes serviteurs et à ton fils David ce qui se trouvera sous ta main. '
  '9':
  - type: text
    content: 'Lorsque les gens de David furent arrivés, ils répétèrent à Nabal toutes ces paroles, au nom de David. Puis ils se turent. '
