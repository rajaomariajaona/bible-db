document_id: 1SA.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mort de Samuel. — Dureté de Nabal envers David, et prudence de sa femme Abigaïl
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-35: cf. (És 32:5-8. Ps 73:1-9.) (Pr 20:22; 15:1, 23, 31; 25:11.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 28:3
      metadata:
        usfm: 1SA.28.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Samuel mourut. Tout Israël s’étant assemblé le pleura, et on l’enterra dans sa demeure à Rama. Ce fut alors que David se leva et descendit au désert de Paran. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il y avait à Maon un homme fort riche, possédant des biens à Carmel; il avait trois mille brebis et mille chèvres, et il se trouvait à Carmel pour la tonte de ses brebis. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le nom de cet homme était Nabal, et sa femme s’appelait Abigaïl; c’était une femme de bon sens et belle de figure, mais l’homme était dur et méchant dans ses actions. Il descendait de Caleb. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David apprit au désert que Nabal tondait ses brebis. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il envoya vers lui dix jeunes gens, auxquels il dit: Montez à Carmel, et allez auprès de Nabal. Vous le saluerez en mon nom, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et vous lui parlerez ainsi: Pour la vie sois en paix, et que la paix soit avec ta maison et tout ce qui t’appartient! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et maintenant, j’ai appris que tu as les tondeurs. Or tes bergers ont été avec nous; nous ne leur avons fait aucun outrage, et rien ne leur a été enlevé pendant tout le temps qu’ils ont été à Carmel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Demande-le à tes serviteurs, et ils te le diront. Que ces jeunes gens trouvent donc grâce à tes yeux, puisque nous venons dans un jour de joie. Donne donc, je te prie, à tes serviteurs et à ton fils David ce qui se trouvera sous ta main. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lorsque les gens de David furent arrivés, ils répétèrent à Nabal toutes ces paroles, au nom de David. Puis ils se turent. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nabal répondit aux serviteurs de David: Qui est David, et qui est le fils d’Isaï? Il y a aujourd’hui beaucoup de serviteurs qui s’échappent d’auprès de leurs maîtres. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et je prendrais mon pain, mon eau, et mon bétail que j’ai tué pour mes tondeurs, et je les donnerais à des gens qui sont je ne sais d’où? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les gens de David rebroussèrent chemin; ils s’en retournèrent, et redirent, à leur arrivée, toutes ces paroles à David. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors David dit à ses gens: Que chacun de vous ceigne son épée! Et ils ceignirent chacun leur épée. David aussi ceignit son épée, et environ quatre cents hommes montèrent à sa suite. Il en resta deux cents près des bagages. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Un des serviteurs de Nabal vint dire à Abigaïl, femme de Nabal: Voici, David a envoyé du désert des messagers pour saluer notre maître, qui les a rudoyés. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et pourtant ces gens ont été très bons pour nous; ils ne nous ont fait aucun outrage, et rien ne nous a été enlevé, tout le temps que nous avons été avec eux lorsque nous étions dans les champs. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils nous ont nuit et jour servi de muraille, tout le temps que nous avons été avec eux, faisant paître les troupeaux. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Sache maintenant et vois ce que tu as à faire, car la perte de notre maître et de toute sa maison est résolue, et il est si méchant qu’on n’ose lui parler. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Abigaïl prit aussitôt deux cents pains, deux outres de vin, cinq pièces de bétail apprêtées, cinq mesures de grain rôti, cent masses de raisins secs, et deux cents de figues sèches. Elle les mit sur des ânes, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et elle dit à ses serviteurs: Passez devant moi, je vais vous suivre. Elle ne dit rien à Nabal, son mari. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Montée sur un âne, elle descendit la montagne par un chemin couvert; et voici, David et ses gens descendaient en face d’elle, en sorte qu’elle les rencontra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'David avait dit: C’est bien en vain que j’ai gardé tout ce que cet homme a dans le désert, et que rien n’a été enlevé de tout ce qu’il possède; il m’a rendu le mal pour le bien. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Que Dieu traite son serviteur David dans toute sa rigueur, si je laisse subsister jusqu’à la lumière du matin qui que ce soit de tout ce qui appartient à Nabal! '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Lorsque Abigaïl aperçut David, elle descendit rapidement de l’âne, tomba sur sa face en présence de David, et se prosterna contre terre. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Puis, se jetant à ses pieds, elle dit: A moi la faute, mon seigneur! Permets à ta servante de parler à tes oreilles, et écoute les paroles de ta servante. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Que mon seigneur ne prenne pas garde à ce méchant homme, à Nabal, car il est comme son nom; Nabal est son nom, et il y a chez lui de la folie. Et moi, ta servante, je n’ai pas vu les gens que mon seigneur a envoyés. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Maintenant, mon seigneur, aussi vrai que l’Éternel est vivant et que ton âme est vivante, c’est l’Éternel qui t’a empêché de répandre le sang et qui a retenu ta main. Que tes ennemis, que ceux qui veulent du mal à mon seigneur soient comme Nabal! '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Accepte ce présent que ta servante apporte à mon seigneur, et qu’il soit distribué aux gens qui marchent à la suite de mon seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Pardonne, je te prie, la faute de ta servante, car l’Éternel fera à mon seigneur une maison stable; pardonne, car mon seigneur soutient les guerres de l’Éternel, et la méchanceté ne se trouvera jamais en toi. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'S’il s’élève quelqu’un qui te poursuive et qui en veuille à ta vie, l’âme de mon seigneur sera liée dans le faisceau des vivants auprès de l’Éternel, ton Dieu, et il lancera du creux de la fronde l’âme de tes ennemis. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Lorsque l’Éternel aura fait à mon seigneur tout le bien qu’il t’a annoncé, et qu’il t’aura établi chef sur Israël, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'mon seigneur n’aura ni remords ni souffrance de cœur pour avoir répandu le sang inutilement et pour s’être vengé lui-même. Et lorsque l’Éternel aura fait du bien à mon seigneur, souviens-toi de ta servante. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'David dit à Abigaïl: Béni soit l’Éternel, le Dieu d’Israël, qui t’a envoyée aujourd’hui à ma rencontre! '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Béni soit ton bon sens, et bénie sois-tu, toi qui m’as empêché en ce jour de répandre le sang, et qui as retenu ma main! '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Mais l’Éternel, le Dieu d’Israël, qui m’a empêché de te faire du mal, est vivant! Si tu ne t’étais hâtée de venir au-devant de moi, il ne serait resté qui que ce soit à Nabal, d’ici à la lumière du matin. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Et David prit de la main d’Abigaïl ce qu’elle lui avait apporté, et lui dit: Monte en paix dans ta maison; vois, j’ai écouté ta voix, et je t’ai favorablement accueillie.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 36-44: cf. 2 S 13:23, 24. (Ps 73. Pr 1:32; 10:21.) (Pr 18:22; 19:14.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Abigaïl arriva auprès de Nabal. Et voici, il faisait dans sa maison un festin comme un festin de roi; il avait le cœur joyeux, et il était complètement dans l’ivresse. Elle ne lui dit aucune chose, petite ou grande, jusqu’à la lumière du matin. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Mais le matin, l’ivresse de Nabal s’étant dissipée, sa femme lui raconta ce qui s’était passé. Le cœur de Nabal reçut un coup mortel, et devint comme une pierre. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Environ dix jours après, l’Éternel frappa Nabal, et il mourut. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'David apprit que Nabal était mort, et il dit: Béni soit l’Éternel, qui a défendu ma cause dans l’outrage que m’a fait Nabal, et qui a empêché son serviteur de faire le mal! L’Éternel a fait retomber la méchanceté de Nabal sur sa tête. David envoya proposer à Abigaïl de devenir sa femme. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Les serviteurs de David arrivèrent chez Abigaïl à Carmel, et lui parlèrent ainsi: David nous a envoyés vers toi, afin de te prendre pour sa femme. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Elle se leva, se prosterna le visage contre terre, et dit: Voici, ta servante sera une esclave pour laver les pieds des serviteurs de mon seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Et aussitôt Abigaïl partit, montée sur un âne, et accompagnée de cinq jeunes filles; elle suivit les messagers de David, et elle devint sa femme. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'David avait aussi pris Achinoam de Jizreel, et toutes les deux furent ses femmes. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 3:15
      metadata:
        usfm: 2SA.3.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et Saül avait donné sa fille Mical, femme de David, à Palthi de Gallim, fils de Laïsch.
