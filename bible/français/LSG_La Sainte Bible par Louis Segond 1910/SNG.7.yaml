document_id: SNG.7,93
type_code: fra
verses:
  '1':
  - type: text
    content: Reviens, reviens, Sulamithe!
  - type: text
    content: Reviens, reviens, afin que nous te regardions.
  - type: text
    content: Qu’avez-vous à regarder la Sulamithe
  - type: text
    content: Comme une danse de deux chœurs?
  - type: heading
    content: 'V. 2-10: cf. Ca 4:1-11; 6:4-10.'
  '10':
  - type: text
    content: Et ta bouche comme un vin excellent,…
  - type: text
    content: Qui coule aisément pour mon bien-aimé,
  - type: text
    content: Et glisse sur les lèvres de ceux qui s’endorment!
  - type: heading
    content: '7 v. 11 à 8 v. 4: cf. Ca 2:16, 3-7.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ca 2:16; 6:3.
  - type: text
    content: Je suis à mon bien-aimé,
  - type: text
    content: Et ses désirs se portent vers moi.
  '12':
  - type: text
    content: Viens, mon bien-aimé, sortons dans les champs,
  - type: text
    content: Demeurons dans les villages!
  '13':
  - type: text
    content: Dès le matin nous irons aux vignes,
  - type: text
    content: Nous verrons si la vigne pousse, si la fleur s’ouvre,
  - type: text
    content: Si les grenadiers fleurissent.
  - type: text
    content: Là je te donnerai mon amour.
  '14':
  - type: text
    content: Les mandragores répandent leur parfum,
  - type: text
    content: Et nous avons à nos portes tous les meilleurs fruits,
  - type: text
    content: 'Nouveaux et anciens:'
  - type: text
    content: Mon bien-aimé, je les ai gardés pour toi.
  '2':
  - type: text
    content: Que tes pieds sont beaux dans ta chaussure, fille de prince!
  - type: text
    content: Les contours de ta hanche sont comme des colliers,
  - type: text
    content: Œuvre des mains d’un artiste.
  '3':
  - type: text
    content: Ton sein est une coupe arrondie,
  - type: text
    content: Où le vin parfumé ne manque pas;
  - type: text
    content: Ton corps est un tas de froment,
  - type: text
    content: Entouré de lis.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ca 4:5.
  - type: text
    content: Tes deux seins sont comme deux faons,
  - type: text
    content: Comme les jumeaux d’une gazelle.
  '5':
  - type: text
    content: Ton cou est comme une tour d’ivoire;
  - type: text
    content: Tes yeux sont comme les étangs de Hesbon,
  - type: text
    content: Près de la porte de Bath-Rabbim;
  - type: text
    content: Ton nez est comme la tour du Liban,
  - type: text
    content: Qui regarde du côté de Damas.
  '6':
  - type: text
    content: Ta tête est élevée comme le Carmel,
  - type: text
    content: Et les cheveux de ta tête sont comme la pourpre;
  - type: text
    content: Un roi est enchaîné par des boucles!…
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps 45:12. Ca 1:15; 4:1.
  - type: text
    content: Que tu es belle, que tu es agréable,
  - type: text
    content: O mon amour, au milieu des délices!
  '8':
  - type: text
    content: Ta taille ressemble au palmier,
  - type: text
    content: Et tes seins à des grappes.
  '9':
  - type: text
    content: 'Je me dis: Je monterai sur le palmier,'
  - type: text
    content: J’en saisirai les rameaux!
  - type: text
    content: Que tes seins soient comme les grappes de la vigne,
  - type: text
    content: Le parfum de ton souffle comme celui des pommes,
