document_id: SNG.7
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Reviens, reviens, Sulamithe!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reviens, reviens, afin que nous te regardions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’avez-vous à regarder la Sulamithe
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme une danse de deux chœurs?
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 2-10: cf. Ca 4:1-11; 6:4-10.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Que tes pieds sont beaux dans ta chaussure, fille de prince!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les contours de ta hanche sont comme des colliers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Œuvre des mains d’un artiste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ton sein est une coupe arrondie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où le vin parfumé ne manque pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton corps est un tas de froment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Entouré de lis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ca 4:5
      metadata:
        usfm: SNG.4.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tes deux seins sont comme deux faons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme les jumeaux d’une gazelle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ton cou est comme une tour d’ivoire;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes yeux sont comme les étangs de Hesbon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Près de la porte de Bath-Rabbim;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton nez est comme la tour du Liban,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui regarde du côté de Damas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ta tête est élevée comme le Carmel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les cheveux de ta tête sont comme la pourpre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un roi est enchaîné par des boucles!…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 45:12
      metadata:
        usfm: PSA.45.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ca 1:15
      metadata:
        usfm: SNG.1.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:1
      metadata:
        usfm: SNG.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Que tu es belle, que tu es agréable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O mon amour, au milieu des délices!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ta taille ressemble au palmier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes seins à des grappes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je me dis: Je monterai sur le palmier,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’en saisirai les rameaux!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tes seins soient comme les grappes de la vigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le parfum de ton souffle comme celui des pommes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et ta bouche comme un vin excellent,…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui coule aisément pour mon bien-aimé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et glisse sur les lèvres de ceux qui s’endorment!
- type: usfm
  marker: r
  children:
  - type: text
    text: '7 v. 11 à 8 v. 4: cf. Ca 2:16, 3-7.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ca 2:16
      metadata:
        usfm: SNG.2.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:3
      metadata:
        usfm: SNG.6.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je suis à mon bien-aimé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses désirs se portent vers moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Viens, mon bien-aimé, sortons dans les champs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Demeurons dans les villages!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dès le matin nous irons aux vignes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous verrons si la vigne pousse, si la fleur s’ouvre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si les grenadiers fleurissent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Là je te donnerai mon amour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les mandragores répandent leur parfum,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nous avons à nos portes tous les meilleurs fruits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nouveaux et anciens:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon bien-aimé, je les ai gardés pour toi.
