document_id: 2CO.INTRO1,93
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION À LA DEUXIÈME ÉPÎTRE AUX CORINTHIENS
  - type: text
    content: (Ps 69:10. Ac 9:16.)
  - type: text
    content: La deuxième épître de Paul aux Corinthiens est liée à la première parce que les deux s’adressent à la même communauté et ont le même auteur. Il faut donc se référer à l’introduction de la première épître pour d’autres détails importants.
  - type: text
    content: 'L’auteur développe sa lettre dans une dynamique conforme à la littérature épistolaire:'
  - type: text
    content: '1. Adresse et salutations '
  - type: text
    content: 1:1-2
  - type: text
    content: '2. Consolation de Paul au milieu de ses souffrances '
  - type: text
    content: 1:3–2:4
  - type: text
    content: '3. Ministère de l’apôtre Paul, succès remporté; motifs de confiance '
  - type: text
    content: 2:5–7:16
  - type: text
    content: '4. Recommandations au sujet de la collecte pour les chrétiens de Jérusalem '
  - type: text
    content: 8:1–9:15
  - type: text
    content: '5. Paul défendant son ministère '
  - type: text
    content: 10:1–12:21
  - type: text
    content: '6. Derniers avertissements et salutations finales '
  - type: text
    content: 13:1-13
  - type: text
    content: 'Comme la première, la seconde épître de Paul aux Corinthiens ne comporte pas de message précis. Elle répond elle aussi à des problèmes de communauté. Deux cas méritent d’être évoqués:'
  - type: text
    content: '1. La collecte pour les chrétiens de l’Église de Jésus-Christ: Paul tire de cette question un enseignement sur les offrandes chrétiennes dans l’Église (2 Cor 9:6-8).'
  - type: text
    content: 2. La défense que Paul fait de son apostolat (chapitres 10 à 13). Ce long développement cohérent est une leçon pratique pour tous les disciples engagés comme témoins, missionnaires et apôtres de Jésus-Christ.
  - type: text
    content: «Que celui qui se glorifie se glorifie dans le Seigneur. Car ce n’est pas celui qui se recommande lui-même qui est approuvé, c’est celui que le Seigneur recommande»
  - type: text
    content: ' (2 Cor 10:17-18). Cette seule suprême recommandation est la source de l’autorité de l’apôtre.'
  - type: text
    content: Dans la deuxième épître aux Corinthiens, il y a des ruptures dans la construction littéraire incitant à y discerner plusieurs fragments d’épîtres dont nous avons parlé (voir 1 Corinthiens, introduction).
  - type: text
    content: '1. La première se trouverait en 2 Cor 6:14–7:1: elle comporte des exhortations pressantes. Par exemple: '
  - type: text
    content: '«Ne vous mettez pas avec les infidèles sous un joug étranger…» '
  - type: text
    content: (6:14).
  - type: text
    content: '2. La seconde se trouverait en 2 Cor 10 à 13. Elle est souvent appelée «l’épître dans les larmes». Paul y défend son ministère: '
  - type: text
    content: «Je me glorifierai donc bien plus volontiers de mes faiblesses, afin que la puissance de Christ repose sur moi. C’est pourquoi je me plais dans les faiblesses, dans les outrages, dans les calamités, dans les persécutions, dans les détresses, pour Christ»
  - type: text
    content: ' (12:9-10).'
  - type: text
    content: 'Toutefois, on ne saurait nier pour cela l’unité de l’épître. Elle repose sur la défense soutenue par l’apôtre Paul de son ministère et, partant, du ministère évangélique en général (2 Cor 2:5 à 7:12). Cette défense résulte des attaques injurieuses dont il avait été l’objet (voir 2:5: «Si quelqu’un a été une cause de tristesse, ce n’est pas moi qu’il a attristé, c’est vous tous, du moins en partie, pour ne rien exagérer»).'
  - type: text
    content: On l’a déjà souligné, une lecture attentive des deux épîtres aux Corinthiens suggère que Paul en a écrit plusieurs à cette communauté chrétienne. Entre ces différentes correspondances, plusieurs événements avaient eu lieu. Paul avait effectué un premier voyage à Corinthe au cours duquel il croyait avoir donné des réponses satisfaisantes aux questions qui se posaient. Cependant, cette visite semble n’avoir pas été concluante. Paul avait donc dû retourner en Asie, en raison de l’attachement des Corinthiens à l’apôtre Paul, le fondateur de leur communauté. Celui-ci s’appuie donc sur cette marque de confiance dont il bénéficie pour justifier son apostolat devant les attaques dont il était victime. C’est ce qui explique le caractère polémique de l’épître (voir 10 à 13).
  - type: text
    content: La catéchèse doctrinale qui résulte de cette légitime défense que Paul fait de son ministère apostolique est donc claire. Il établit par là ce que doit être de façon générale l’autorité apostolique et pastorale dans l’Église (3:1—6:13).
  - type: text
    content: 'La lecture de 2 Cor 10 à 12 laisse apparaître un autre groupe d’adversaires de Paul: '
  - type: text
    content: «…ceux qui cherchent un prétexte, afin qu’ils soient trouvés tels que nous dans les choses dont ils se glorifient. Ces hommes-là sont de faux apôtres, des ouvriers trompeurs, déguisés en apôtres de Christ. Et cela n’est pas étonnant, puisque Satan lui-même se déguise en ange de lumière…»
  - type: text
    content: ' (11:12-14).'
  - type: text
    content: Qui furent tous ces adversaires de l’apôtre? Il est difficile de le savoir avec précision. Mais il est fort possible que dans les communautés qu’il avait créées, se trouvaient certains membres qui proféraient des injures contre lui, ou se comportaient tout simplement d’une manière non conforme (voir 2:5, aussi 1 Cor 5:1-13; 2 Cor 11:13).
