document_id: REV.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La femme et le dragon
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. Ga 4:19, 26. Ap 2:26, 27. Jn 8:44. 1 Pi 5:8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Un grand signe parut dans le ciel: une femme enveloppée du soleil, la lune sous ses pieds, et une couronne de douze étoiles sur sa tête. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Elle était enceinte, et elle criait, étant en travail et dans les douleurs de l’enfantement. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Un autre signe parut encore dans le ciel; et voici, c’était un grand dragon rouge, ayant sept têtes et dix cornes, et sur ses têtes sept diadèmes. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Sa queue entraînait le tiers des étoiles du ciel, et les jetait sur la terre. Le dragon se tint devant la femme qui allait enfanter, afin de dévorer son enfant, lorsqu’elle aurait enfanté. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Elle enfanta un fils, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 2:9
      metadata:
        usfm: PSA.2.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 2:27
      metadata:
        usfm: REV.2.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui doit paître toutes les nations avec une verge de fer. Et son enfant fut enlevé vers Dieu et vers son trône. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et la femme s’enfuit dans le désert, où elle avait un lieu préparé par Dieu, afin qu’elle y fût nourrie pendant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 11:3
      metadata:
        usfm: REV.11.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: mille deux cent soixante jours.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-12: cf. Da 12:1. (Lu 10:18, 19. Jn 12:31.) 1 Pi 5:8-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et il y eut guerre dans le ciel. Michel et ses anges combattirent contre le dragon. Et le dragon et ses anges combattirent, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'mais ils ne furent pas les plus forts, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 2:35
      metadata:
        usfm: DAN.2.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et leur place ne fut plus trouvée dans le ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et il fut précipité, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 10:18
      metadata:
        usfm: LUK.10.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 20:2
      metadata:
        usfm: REV.20.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le grand dragon, le serpent ancien, appelé le diable et Satan, celui qui séduit toute la terre, il fut précipité sur la terre, et ses anges furent précipités avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et j’entendis dans le ciel une voix forte qui disait: Maintenant le salut est arrivé, et la puissance, et le règne de notre Dieu, et l’autorité de son Christ; car il a été précipité, l’accusateur de nos frères, celui qui les accusait devant notre Dieu jour et nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils l’ont vaincu à cause du sang de l’agneau et à cause de la parole de leur témoignage, et ils n’ont pas aimé leur vie jusqu’à craindre la mort. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 96:11
      metadata:
        usfm: PSA.96.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 49:13
      metadata:
        usfm: ISA.49.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est pourquoi réjouissez-vous, cieux, et vous qui habitez dans les cieux. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 8:13
      metadata:
        usfm: REV.8.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Malheur à la terre et à la mer! Car le diable est descendu vers vous, animé d’une grande colère, sachant qu’il a peu de temps.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-18: cf. Ap 11:2-7; 13:1-8. Ge 3:15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand le dragon vit qu’il avait été précipité sur la terre, il poursuivit la femme qui avait enfanté l’enfant mâle. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 2:6
      metadata:
        usfm: REV.2.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et les deux ailes du grand aigle furent données à la femme, afin qu’elle s’envolât au désert, vers son lieu, où elle est nourrie '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 12:6
      metadata:
        usfm: REV.12.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un temps, des temps, et la moitié d’un temps, loin de la face du serpent. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et, de sa bouche, le serpent lança de l’eau comme un fleuve derrière la femme, afin de l’entraîner par le fleuve. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et la terre secourut la femme, et la terre ouvrit sa bouche et engloutit le fleuve que le dragon avait lancé de sa bouche. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et le dragon fut irrité contre la femme, et il s’en alla faire la guerre aux restes de sa postérité, à ceux qui gardent les commandements de Dieu et qui ont le témoignage de Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Et il se tint sur le sable de la mer.
