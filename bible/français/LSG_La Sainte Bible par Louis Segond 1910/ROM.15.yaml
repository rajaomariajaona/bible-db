document_id: ROM.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-7: cf. Ro 14:13-23. Ph 2:1-5.'
  - type: text
    content: ' '
  - type: note
    content: 1 Co 9:22. Ga 6:1.
  - type: text
    content: 'Nous qui sommes forts, nous devons supporter les faiblesses de ceux qui ne le sont pas, et ne pas nous complaire en nous-mêmes. '
  '10':
  - type: text
    content: 'Il est dit encore:'
  - type: note
    content: De 32:43.
  - type: text
    content: Nations, réjouissez-vous avec son peuple!
  '11':
  - type: text
    content: 'Et encore:'
  - type: note
    content: Ps 117:1.
  - type: text
    content: Louez le Seigneur, vous toutes les nations,
  - type: text
    content: Célébrez-le, vous tous les peuples!
  '12':
  - type: text
    content: 'Ésaïe dit aussi:'
  - type: note
    content: És 11:10. Ap 5:5; 22:16.
  - type: text
    content: Il sortira d’Isaï un rejeton,
  - type: text
    content: Qui se lèvera pour régner sur les nations;
  - type: text
    content: 'Les nations espéreront en lui. '
  '13':
  - type: text
    content: Que le Dieu de l’espérance vous remplisse de toute joie et de toute paix dans la foi, pour que vous abondiez en espérance, par la puissance du Saint-Esprit!
  - type: heading
    content: Réflexions de Paul sur son ministère, et projets de voyage
  - type: heading
    content: 'V. 14-21: cf. 1 Co 15:10. 2 Co 12:12; 10:13-18.'
  '14':
  - type: text
    content: 'Pour ce qui vous concerne, mes frères, je suis moi-même persuadé que vous êtes pleins de bonnes dispositions, remplis de toute connaissance, et capables de vous exhorter les uns les autres. '
  '15':
  - type: text
    content: 'Cependant, à certains égards, je vous ai écrit avec une sorte de hardiesse, comme pour réveiller vos souvenirs, à cause de la grâce que Dieu m’a faite '
  '16':
  - type: text
    content: 'd’être ministre de Jésus-Christ parmi les païens, m’acquittant du divin service de l’Évangile de Dieu, afin que les païens lui soient une offrande agréable, étant sanctifiée par l’Esprit-Saint. '
  '17':
  - type: text
    content: 'J’ai donc sujet de me glorifier en Jésus-Christ, pour ce qui regarde les choses de Dieu. '
  '18':
  - type: text
    content: 'Car je n’oserais mentionner aucune chose que Christ n’ait pas faite par moi pour amener les païens à l’obéissance, par la parole et par les actes, '
  '19':
  - type: text
    content: 'par la puissance des miracles et des prodiges, par la puissance de l’Esprit de Dieu, en sorte que, depuis Jérusalem et les pays voisins jusqu’en Illyrie, j’ai abondamment répandu l’Évangile de Christ. '
  '2':
  - type: text
    content: 'Que chacun de nous complaise au prochain pour ce qui est bien en vue de l’édification. '
  '20':
  - type: text
    content: 'Et je me suis fait honneur d’annoncer l’Évangile là où Christ n’avait point été nommé, afin de ne pas bâtir sur le fondement d’autrui, selon qu’il est écrit:'
  '21':
  - type: text
    content: ' '
  - type: note
    content: És 52:15.
  - type: text
    content: Ceux à qui il n’avait point été annoncé verront,
  - type: text
    content: Et ceux qui n’en avaient point entendu parler comprendront.
  - type: heading
    content: 'V. 22-33: cf. Ro 1:9-15. (2 Co 8 et 9.)'
  '22':
  - type: text
    content: 'C’est ce qui m’a souvent '
  - type: note
    content: Ro 1:13. 1 Th 2:18.
  - type: text
    content: 'empêché d’aller vers vous. '
  '23':
  - type: text
    content: 'Mais maintenant, n’ayant plus rien qui me retienne dans ces contrées, et ayant depuis plusieurs années '
  - type: note
    content: Ro 1:10; 15:32. 1 Th 3:10. 2 Ti 1:4.
  - type: text
    content: 'le désir d’aller vers vous, '
  '24':
  - type: text
    content: 'j’espère vous voir en passant, quand je me rendrai en Espagne, et y être accompagné par vous, après que j’aurai satisfait en partie mon désir de me trouver chez vous. '
  '25':
  - type: note
    content: Ac 19:21; 24:17.
  - type: text
    content: 'Présentement je vais à Jérusalem, pour le service des saints. '
  '26':
  - type: text
    content: 'Car la Macédoine et l’Achaïe ont bien voulu s’imposer une contribution en faveur des pauvres parmi les saints de Jérusalem. '
  '27':
  - type: text
    content: 'Elles l’ont bien voulu, et elles le leur devaient; '
  - type: note
    content: 1 Co 9:11. Ga 6:6.
  - type: text
    content: 'car si les païens ont eu part à leurs avantages spirituels, ils doivent aussi les assister dans les choses temporelles. '
  '28':
  - type: text
    content: 'Dès que j’aurai terminé cette affaire et que je leur aurai remis ces dons, je partirai pour l’Espagne et passerai chez vous. '
  '29':
  - type: note
    content: Ro 1:11.
  - type: text
    content: 'Je sais qu’en allant vers vous, c’est avec une pleine bénédiction de Christ que j’irai. '
  '3':
  - type: text
    content: 'Car Christ ne s’est point complu en lui-même, mais, selon qu’il est écrit:'
  - type: note
    content: Ps 69:10. És 53:4, 5.
  - type: text
    content: Les outrages de ceux qui t’insultent sont tombés sur moi.
  '30':
  - type: text
    content: 'Je vous exhorte, frères, par notre Seigneur Jésus-Christ et par l’amour de l’Esprit, '
  - type: note
    content: 2 Co 1:11.
  - type: text
    content: 'à combattre avec moi, en adressant à Dieu des prières en ma faveur, '
  '31':
  - type: note
    content: 2 Th 3:2.
  - type: text
    content: 'afin que je sois délivré des incrédules de la Judée, et que les dons que je porte à Jérusalem soient agréés des saints, '
  '32':
  - type: note
    content: Ro 1:10; 15:23.
  - type: text
    content: 'en sorte que j’arrive chez vous avec joie, si c’est la volonté de Dieu, et que je jouisse au milieu de vous de quelque repos. '
  '33':
  - type: text
    content: Que le Dieu de paix soit avec vous tous! Amen!
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ro 4:23, 24.
  - type: text
    content: 'Or, tout ce qui a été écrit d’avance l’a été pour notre instruction, afin que, par la patience, et par la consolation que donnent les Écritures, nous possédions l’espérance. '
  '5':
  - type: text
    content: 'Que le Dieu de la persévérance et de la consolation vous donne '
  - type: note
    content: Ro 12:16. 1 Co 1:10. Ph 2:2; 3:16. 1 Pi 3:8.
  - type: text
    content: 'd’avoir les mêmes sentiments les uns envers les autres selon Jésus-Christ, '
  '6':
  - type: text
    content: 'afin que tous ensemble, d’une seule bouche, vous glorifiiez le Dieu et Père de notre Seigneur Jésus-Christ. '
  '7':
  - type: text
    content: Accueillez-vous donc les uns les autres, comme Christ vous a accueillis, pour la gloire de Dieu.
  - type: heading
    content: 'V. 8-13: cf. Ac 3:25, 26. Ép 2:11-19.'
  '8':
  - type: text
    content: 'Je dis, en effet, que Christ a été serviteur des circoncis, pour prouver la véracité de Dieu en confirmant les promesses faites aux pères, '
  '9':
  - type: text
    content: 'tandis que les païens glorifient Dieu à cause de sa miséricorde, selon qu’il est écrit:'
  - type: note
    content: 2 S 22:50. Ps 18:50.
  - type: text
    content: C’est pourquoi je te louerai parmi les nations,
  - type: text
    content: Et je chanterai à la gloire de ton nom.
