document_id: ROM.15,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. Ro 14:13-23. Ph 2:1-5.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 9:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 6:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Nous qui sommes forts, nous devons supporter les faiblesses de ceux qui ne le sont pas, et ne pas nous complaire en nous-mêmes. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Il est dit encore:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:43
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Nations, réjouissez-vous avec son peuple!
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Et encore:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 117:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Louez le Seigneur, vous toutes les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Célébrez-le, vous tous les peuples!
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ésaïe dit aussi:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 11:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 5:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il sortira d’Isaï un rejeton,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui se lèvera pour régner sur les nations;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les nations espéreront en lui. '
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le Dieu de l’espérance vous remplisse de toute joie et de toute paix dans la foi, pour que vous abondiez en espérance, par la puissance du Saint-Esprit!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Réflexions de Paul sur son ministère, et projets de voyage
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-21: cf. 1 Co 15:10. 2 Co 12:12; 10:13-18.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour ce qui vous concerne, mes frères, je suis moi-même persuadé que vous êtes pleins de bonnes dispositions, remplis de toute connaissance, et capables de vous exhorter les uns les autres. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant, à certains égards, je vous ai écrit avec une sorte de hardiesse, comme pour réveiller vos souvenirs, à cause de la grâce que Dieu m’a faite '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'd’être ministre de Jésus-Christ parmi les païens, m’acquittant du divin service de l’Évangile de Dieu, afin que les païens lui soient une offrande agréable, étant sanctifiée par l’Esprit-Saint. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai donc sujet de me glorifier en Jésus-Christ, pour ce qui regarde les choses de Dieu. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car je n’oserais mentionner aucune chose que Christ n’ait pas faite par moi pour amener les païens à l’obéissance, par la parole et par les actes, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'par la puissance des miracles et des prodiges, par la puissance de l’Esprit de Dieu, en sorte que, depuis Jérusalem et les pays voisins jusqu’en Illyrie, j’ai abondamment répandu l’Évangile de Christ. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que chacun de nous complaise au prochain pour ce qui est bien en vue de l’édification. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et je me suis fait honneur d’annoncer l’Évangile là où Christ n’avait point été nommé, afin de ne pas bâtir sur le fondement d’autrui, selon qu’il est écrit:'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 52:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ceux à qui il n’avait point été annoncé verront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux qui n’en avaient point entendu parler comprendront.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-33: cf. Ro 1:9-15. (2 Co 8 et 9.)'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est ce qui m’a souvent '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 1:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 2:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'empêché d’aller vers vous. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais maintenant, n’ayant plus rien qui me retienne dans ces contrées, et ayant depuis plusieurs années '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 1:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 3:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 1:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le désir d’aller vers vous, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'j’espère vous voir en passant, quand je me rendrai en Espagne, et y être accompagné par vous, après que j’aurai satisfait en partie mon désir de me trouver chez vous. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 19:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Présentement je vais à Jérusalem, pour le service des saints. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car la Macédoine et l’Achaïe ont bien voulu s’imposer une contribution en faveur des pauvres parmi les saints de Jérusalem. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elles l’ont bien voulu, et elles le leur devaient; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 9:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 6:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car si les païens ont eu part à leurs avantages spirituels, ils doivent aussi les assister dans les choses temporelles. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dès que j’aurai terminé cette affaire et que je leur aurai remis ces dons, je partirai pour l’Espagne et passerai chez vous. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 1:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je sais qu’en allant vers vous, c’est avec une pleine bénédiction de Christ que j’irai. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car Christ ne s’est point complu en lui-même, mais, selon qu’il est écrit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 69:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 53:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les outrages de ceux qui t’insultent sont tombés sur moi.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous exhorte, frères, par notre Seigneur Jésus-Christ et par l’amour de l’Esprit, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 1:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à combattre avec moi, en adressant à Dieu des prières en ma faveur, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Th 3:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'afin que je sois délivré des incrédules de la Judée, et que les dons que je porte à Jérusalem soient agréés des saints, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 1:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'en sorte que j’arrive chez vous avec joie, si c’est la volonté de Dieu, et que je jouisse au milieu de vous de quelque repos. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que le Dieu de paix soit avec vous tous! Amen!
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 4:23
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Or, tout ce qui a été écrit d’avance l’a été pour notre instruction, afin que, par la patience, et par la consolation que donnent les Écritures, nous possédions l’espérance. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Que le Dieu de la persévérance et de la consolation vous donne '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 12:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 1:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 2:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 3:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’avoir les mêmes sentiments les uns envers les autres selon Jésus-Christ, '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'afin que tous ensemble, d’une seule bouche, vous glorifiiez le Dieu et Père de notre Seigneur Jésus-Christ. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Accueillez-vous donc les uns les autres, comme Christ vous a accueillis, pour la gloire de Dieu.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-13: cf. Ac 3:25, 26. Ép 2:11-19.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je dis, en effet, que Christ a été serviteur des circoncis, pour prouver la véracité de Dieu en confirmant les promesses faites aux pères, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tandis que les païens glorifient Dieu à cause de sa miséricorde, selon qu’il est écrit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 22:50
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 18:50
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: C’est pourquoi je te louerai parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je chanterai à la gloire de ton nom.
