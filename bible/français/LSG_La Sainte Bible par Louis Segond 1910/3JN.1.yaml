document_id: 3JN.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Adresse et salutation. Éloge de Gaïus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. Phm 1-7. Mt 10:40-42.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ancien, à Gaïus, le bien-aimé, que j’aime dans la vérité. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi, si je vais vous voir, je rappellerai les actes qu’il commet, en tenant contre nous de méchants propos; non content de cela, il ne reçoit pas les frères, et ceux qui voudraient le faire, il les en empêche et les chasse de l’Église. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bien-aimé, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 37:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 3:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'n’imite pas le mal, mais le bien. Celui qui fait le bien est de Dieu; celui qui fait le mal '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 3:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: n’a point vu Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Éloge de Démétrius. Salutations
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-15: cf. Pr 22:1. 1 Pi 2:12.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous, et la vérité elle-même, rendent un bon témoignage à Démétrius; nous aussi, nous lui rendons témoignage, et tu sais que notre témoignage est vrai. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Jn v. 12.
      marker-yv: yv-n
    - type: text
      text: 'J’aurais beaucoup de choses à t’écrire, mais je ne veux pas le faire avec l’encre et la plume. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’espère te voir bientôt, et nous parlerons de bouche à bouche. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que la paix soit avec toi! Les amis te saluent. Salue les amis, chacun en particulier.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bien-aimé, je souhaite que tu prospères à tous égards et sois en bonne santé, comme prospère l’état de ton âme. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai été fort réjoui, lorsque des frères sont arrivés et ont rendu témoignage de la vérité qui est en toi, de la manière dont tu marches dans la vérité. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je n’ai pas de plus grande joie que d’apprendre que mes enfants marchent dans la vérité. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bien-aimé, tu agis fidèlement dans ce que tu fais pour les frères, et même pour des frères étrangers, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'lesquels ont rendu témoignage de ta charité, en présence de l’Église. Tu feras bien de pourvoir à leur voyage d’une manière digne de Dieu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car c’est pour le nom de Jésus-Christ qu’ils sont partis, sans rien recevoir des païens. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous devons donc accueillir de tels hommes, afin d’être ouvriers avec eux pour la vérité.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Plainte contre Diotrèphe
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-11: cf. Lu 20:46, 47. Ph 2:3. 1 Pi 5:3. 1 Co 4:18-21.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai écrit quelques mots à l’Église; mais Diotrèphe, qui aime à être le premier parmi eux, ne nous reçoit point. '
