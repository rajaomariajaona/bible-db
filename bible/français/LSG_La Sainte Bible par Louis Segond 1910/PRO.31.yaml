document_id: PRO.31,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-9: cf. De 17:15-20. (Pr 23:25; 3:4; 16:12, 13; 29:14.)'
  - type: text
    content: Paroles du roi Lemuel. Sentences par lesquelles sa mère l’instruisit.
  '10':
  - type: text
    content: 'Qui peut trouver '
  - type: note
    content: Pr 12:4.
  - type: text
    content: une femme vertueuse?
  - type: text
    content: Elle a bien plus de valeur que les perles.
  '11':
  - type: text
    content: Le cœur de son mari a confiance en elle,
  - type: text
    content: Et les produits ne lui feront pas défaut.
  '12':
  - type: text
    content: Elle lui fait du bien, et non du mal,
  - type: text
    content: Tous les jours de sa vie.
  '13':
  - type: text
    content: Elle se procure de la laine et du lin,
  - type: text
    content: Et travaille d’une main joyeuse.
  '14':
  - type: text
    content: Elle est comme un navire marchand,
  - type: text
    content: Elle amène son pain de loin.
  '15':
  - type: text
    content: Elle se lève lorsqu’il est encore nuit,
  - type: text
    content: Et elle donne la nourriture à sa maison
  - type: text
    content: Et la tâche à ses servantes.
  '16':
  - type: text
    content: Elle pense à un champ, et elle l’acquiert;
  - type: text
    content: Du fruit de son travail elle plante une vigne.
  '17':
  - type: text
    content: Elle ceint de force ses reins,
  - type: text
    content: Et elle affermit ses bras.
  '18':
  - type: text
    content: Elle sent que ce qu’elle gagne est bon;
  - type: text
    content: Sa lampe ne s’éteint point pendant la nuit.
  '19':
  - type: text
    content: Elle met la main à la quenouille,
  - type: text
    content: Et ses doigts tiennent le fuseau.
  '2':
  - type: text
    content: Que te dirai-je, mon fils?
  - type: text
    content: Que te dirai-je, fils de mes entrailles?
  - type: text
    content: Que te dirai-je, mon fils, objet de mes vœux?
  '20':
  - type: text
    content: Elle tend la main au malheureux,
  - type: text
    content: Elle tend la main à l’indigent.
  '21':
  - type: text
    content: Elle ne craint pas la neige pour sa maison,
  - type: text
    content: Car toute sa maison est vêtue de cramoisi.
  '22':
  - type: text
    content: Elle se fait des couvertures,
  - type: text
    content: Elle a des vêtements de fin lin et de pourpre.
  '23':
  - type: text
    content: Son mari est considéré aux portes,
  - type: text
    content: Lorsqu’il siège avec les anciens du pays.
  '24':
  - type: text
    content: Elle fait des chemises, et les vend,
  - type: text
    content: Et elle livre des ceintures au marchand.
  '25':
  - type: text
    content: Elle est revêtue de force et de gloire,
  - type: text
    content: Et elle se rit de l’avenir.
  '26':
  - type: text
    content: Elle ouvre la bouche avec sagesse,
  - type: text
    content: Et des instructions aimables sont sur sa langue.
  '27':
  - type: text
    content: Elle veille sur ce qui se passe dans sa maison,
  - type: text
    content: Et elle ne mange pas le pain de paresse.
  '28':
  - type: text
    content: Ses fils se lèvent, et la disent heureuse;
  - type: text
    content: 'Son mari se lève, et lui donne des louanges:'
  '29':
  - type: text
    content: Plusieurs filles ont une conduite vertueuse;
  - type: text
    content: Mais toi, tu les surpasses toutes.
  '3':
  - type: text
    content: 'Ne livre pas ta vigueur '
  - type: note
    content: De 17:17.
  - type: text
    content: aux femmes,
  - type: text
    content: Et tes voies à celles qui perdent les rois.
  '30':
  - type: text
    content: La grâce est trompeuse, et la beauté est vaine;
  - type: text
    content: La femme qui craint l’Éternel est celle qui sera louée.
  '31':
  - type: text
    content: Récompensez-la du fruit de son travail,
  - type: text
    content: Et qu’aux portes ses œuvres la louent.
  '4':
  - type: text
    content: Ce n’est point aux rois, Lemuel,
  - type: text
    content: Ce n’est point aux rois de boire du vin,
  - type: text
    content: Ni aux princes de rechercher des liqueurs fortes,
  '5':
  - type: text
    content: De peur qu’en buvant ils n’oublient la loi,
  - type: text
    content: Et ne méconnaissent les droits de tous les malheureux.
  '6':
  - type: text
    content: Donnez des liqueurs fortes à celui qui périt,
  - type: text
    content: Et du vin à celui qui a l’amertume dans l’âme;
  '7':
  - type: text
    content: Qu’il boive et oublie sa pauvreté,
  - type: text
    content: Et qu’il ne se souvienne plus de ses peines.
  '8':
  - type: text
    content: Ouvre ta bouche pour le muet,
  - type: text
    content: Pour la cause de tous les délaissés.
  '9':
  - type: text
    content: 'Ouvre ta bouche, '
  - type: note
    content: Lé 19:15. De 1:16.
  - type: text
    content: juge avec justice,
  - type: text
    content: Et défends le malheureux et l’indigent.
  - type: heading
    content: 'V. 10-31: cf. Pr 19:14; 14:1. 1 Pi 3:1-6.'
