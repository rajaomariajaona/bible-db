document_id: PRO.31
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. De 17:15-20. (Pr 23:25; 3:4; 16:12, 13; 29:14.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Paroles du roi Lemuel. Sentences par lesquelles sa mère l’instruisit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Que te dirai-je, mon fils?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que te dirai-je, fils de mes entrailles?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que te dirai-je, mon fils, objet de mes vœux?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ne livre pas ta vigueur '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 17:17
      metadata:
        usfm: DEU.17.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: aux femmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes voies à celles qui perdent les rois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ce n’est point aux rois, Lemuel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce n’est point aux rois de boire du vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni aux princes de rechercher des liqueurs fortes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: De peur qu’en buvant ils n’oublient la loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne méconnaissent les droits de tous les malheureux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Donnez des liqueurs fortes à celui qui périt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et du vin à celui qui a l’amertume dans l’âme;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Qu’il boive et oublie sa pauvreté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’il ne se souvienne plus de ses peines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ouvre ta bouche pour le muet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour la cause de tous les délaissés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ouvre ta bouche, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:15
      metadata:
        usfm: LEV.19.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 1:16
      metadata:
        usfm: DEU.1.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: juge avec justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et défends le malheureux et l’indigent.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-31: cf. Pr 19:14; 14:1. 1 Pi 3:1-6.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Qui peut trouver '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 12:4
      metadata:
        usfm: PRO.12.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: une femme vertueuse?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle a bien plus de valeur que les perles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le cœur de son mari a confiance en elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les produits ne lui feront pas défaut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Elle lui fait du bien, et non du mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les jours de sa vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Elle se procure de la laine et du lin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et travaille d’une main joyeuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Elle est comme un navire marchand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle amène son pain de loin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Elle se lève lorsqu’il est encore nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et elle donne la nourriture à sa maison
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la tâche à ses servantes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Elle pense à un champ, et elle l’acquiert;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du fruit de son travail elle plante une vigne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Elle ceint de force ses reins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et elle affermit ses bras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Elle sent que ce qu’elle gagne est bon;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa lampe ne s’éteint point pendant la nuit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Elle met la main à la quenouille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses doigts tiennent le fuseau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Elle tend la main au malheureux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle tend la main à l’indigent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Elle ne craint pas la neige pour sa maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car toute sa maison est vêtue de cramoisi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Elle se fait des couvertures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle a des vêtements de fin lin et de pourpre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Son mari est considéré aux portes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lorsqu’il siège avec les anciens du pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Elle fait des chemises, et les vend,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et elle livre des ceintures au marchand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Elle est revêtue de force et de gloire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et elle se rit de l’avenir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Elle ouvre la bouche avec sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et des instructions aimables sont sur sa langue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Elle veille sur ce qui se passe dans sa maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et elle ne mange pas le pain de paresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ses fils se lèvent, et la disent heureuse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Son mari se lève, et lui donne des louanges:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Plusieurs filles ont une conduite vertueuse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais toi, tu les surpasses toutes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: La grâce est trompeuse, et la beauté est vaine;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La femme qui craint l’Éternel est celle qui sera louée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Récompensez-la du fruit de son travail,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’aux portes ses œuvres la louent.
