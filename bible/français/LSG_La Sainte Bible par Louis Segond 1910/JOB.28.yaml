document_id: JOB.28,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-28: cf. (Pr 2:1-6; 3:13-20; 8.) Ec 12:15.'
  - type: text
    content: Il y a pour l’argent une mine d’où on le fait sortir,
  - type: text
    content: Et pour l’or un lieu d’où on l’extrait pour l’affiner;
  '10':
  - type: text
    content: Il ouvre des tranchées dans les rochers,
  - type: text
    content: Et son œil contemple tout ce qu’il y a de précieux;
  '11':
  - type: text
    content: Il arrête l’écoulement des eaux,
  - type: text
    content: Et il produit à la lumière ce qui est caché.
  '12':
  - type: text
    content: Mais la sagesse, où se trouve-t-elle?
  - type: text
    content: Où est la demeure de l’intelligence?
  '13':
  - type: text
    content: L’homme n’en connaît point le prix;
  - type: text
    content: Elle ne se trouve pas dans la terre des vivants.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Job 28:22.
  - type: text
    content: 'L’abîme dit: Elle n’est point en moi;'
  - type: text
    content: 'Et la mer dit: Elle n’est point avec moi.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Pr 3:14; 8:11, 19; 16:16.
  - type: text
    content: Elle ne se donne pas contre de l’or pur,
  - type: text
    content: Elle ne s’achète pas au poids de l’argent;
  '16':
  - type: text
    content: Elle ne se pèse pas contre l’or d’Ophir,
  - type: text
    content: Ni contre le précieux onyx, ni contre le saphir;
  '17':
  - type: text
    content: Elle ne peut se comparer à l’or ni au verre,
  - type: text
    content: Elle ne peut s’échanger pour un vase d’or fin.
  '18':
  - type: text
    content: 'Le corail et le cristal ne sont rien auprès d’elle:'
  - type: text
    content: La sagesse vaut plus que les perles.
  '19':
  - type: text
    content: La topaze d’Éthiopie n’est point son égale,
  - type: text
    content: Et l’or pur n’entre pas en balance avec elle.
  '2':
  - type: text
    content: Le fer se tire de la poussière,
  - type: text
    content: Et la pierre se fond pour produire l’airain.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Job 28:12.
  - type: text
    content: D’où vient donc la sagesse?
  - type: text
    content: Où est la demeure de l’intelligence?
  '21':
  - type: text
    content: Elle est cachée aux yeux de tout vivant,
  - type: text
    content: Elle est cachée aux oiseaux du ciel.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Job 28:14.
  - type: text
    content: 'Le gouffre et la mort disent:'
  - type: text
    content: Nous en avons entendu parler.
  '23':
  - type: text
    content: C’est Dieu qui en sait le chemin,
  - type: text
    content: C’est lui qui en connaît la demeure;
  '24':
  - type: text
    content: Car il voit jusqu’aux extrémités de la terre,
  - type: text
    content: Il aperçoit tout sous les cieux.
  '25':
  - type: text
    content: Quand il régla le poids du vent,
  - type: note
    content: Pr 8:29.
  - type: text
    content: Et qu’il fixa la mesure des eaux,
  '26':
  - type: text
    content: Quand il donna des lois à la pluie,
  - type: text
    content: Et qu’il traça la route de l’éclair et du tonnerre,
  '27':
  - type: text
    content: Alors il vit la sagesse et la manifesta,
  - type: text
    content: Il en posa les fondements et la mit à l’épreuve.
  '28':
  - type: text
    content: 'Puis il dit à l’homme:'
  - type: text
    content: 'Voici, '
  - type: note
    content: Ps 111:10. Pr 1:7; 9:10.
  - type: text
    content: la crainte du Seigneur, c’est la sagesse;
  - type: text
    content: S’éloigner du mal, c’est l’intelligence.
  '3':
  - type: text
    content: L’homme fait cesser les ténèbres;
  - type: text
    content: Il explore, jusque dans les endroits les plus profonds,
  - type: text
    content: Les pierres cachées dans l’obscurité et dans l’ombre de la mort.
  '4':
  - type: text
    content: Il creuse un puits loin des lieux habités;
  - type: text
    content: Ses pieds ne lui sont plus en aide,
  - type: text
    content: Et il est suspendu, balancé, loin des humains.
  '5':
  - type: text
    content: La terre, d’où sort le pain,
  - type: text
    content: Est bouleversée dans ses entrailles comme par le feu.
  '6':
  - type: text
    content: Ses pierres contiennent du saphir,
  - type: text
    content: Et l’on y trouve de la poudre d’or.
  '7':
  - type: text
    content: L’oiseau de proie n’en connaît pas le sentier,
  - type: text
    content: L’œil du vautour ne l’a point aperçu;
  '8':
  - type: text
    content: Les plus fiers animaux ne l’ont point foulé,
  - type: text
    content: Le lion n’y a jamais passé.
  '9':
  - type: text
    content: L’homme porte sa main sur le roc,
  - type: text
    content: Il renverse les montagnes depuis la racine;
