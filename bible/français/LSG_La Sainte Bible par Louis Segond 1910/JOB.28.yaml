document_id: JOB.28,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-28: cf. (Pr 2:1-6; 3:13-20; 8.) Ec 12:15.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Il y a pour l’argent une mine d’où on le fait sortir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pour l’or un lieu d’où on l’extrait pour l’affiner;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Il ouvre des tranchées dans les rochers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et son œil contemple tout ce qu’il y a de précieux;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Il arrête l’écoulement des eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il produit à la lumière ce qui est caché.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mais la sagesse, où se trouve-t-elle?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où est la demeure de l’intelligence?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: L’homme n’en connaît point le prix;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle ne se trouve pas dans la terre des vivants.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 28:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'L’abîme dit: Elle n’est point en moi;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et la mer dit: Elle n’est point avec moi.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 3:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Elle ne se donne pas contre de l’or pur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle ne s’achète pas au poids de l’argent;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Elle ne se pèse pas contre l’or d’Ophir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni contre le précieux onyx, ni contre le saphir;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Elle ne peut se comparer à l’or ni au verre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle ne peut s’échanger pour un vase d’or fin.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Le corail et le cristal ne sont rien auprès d’elle:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La sagesse vaut plus que les perles.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: La topaze d’Éthiopie n’est point son égale,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’or pur n’entre pas en balance avec elle.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Le fer se tire de la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la pierre se fond pour produire l’airain.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 28:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: D’où vient donc la sagesse?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où est la demeure de l’intelligence?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Elle est cachée aux yeux de tout vivant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est cachée aux oiseaux du ciel.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 28:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le gouffre et la mort disent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous en avons entendu parler.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: C’est Dieu qui en sait le chemin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est lui qui en connaît la demeure;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Car il voit jusqu’aux extrémités de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il aperçoit tout sous les cieux.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Quand il régla le poids du vent,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 8:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et qu’il fixa la mesure des eaux,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Quand il donna des lois à la pluie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il traça la route de l’éclair et du tonnerre,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Alors il vit la sagesse et la manifesta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il en posa les fondements et la mit à l’épreuve.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Puis il dit à l’homme:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 111:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 1:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: la crainte du Seigneur, c’est la sagesse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’éloigner du mal, c’est l’intelligence.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: L’homme fait cesser les ténèbres;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il explore, jusque dans les endroits les plus profonds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les pierres cachées dans l’obscurité et dans l’ombre de la mort.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il creuse un puits loin des lieux habités;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses pieds ne lui sont plus en aide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il est suspendu, balancé, loin des humains.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: La terre, d’où sort le pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est bouleversée dans ses entrailles comme par le feu.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ses pierres contiennent du saphir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’on y trouve de la poudre d’or.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: L’oiseau de proie n’en connaît pas le sentier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’œil du vautour ne l’a point aperçu;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Les plus fiers animaux ne l’ont point foulé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le lion n’y a jamais passé.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: L’homme porte sa main sur le roc,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il renverse les montagnes depuis la racine;
