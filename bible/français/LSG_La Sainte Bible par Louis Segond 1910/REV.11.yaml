document_id: REV.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-14: cf. Lu 21:24. (Za 4.) (2 R 1:2-12. 1 R 17:1. Ex 7 à 10.)'
  - type: text
    content: ' '
  - type: note
    content: Éz 40:3, etc.; 41; 42; 43.
  - type: text
    content: 'On me donna un roseau semblable à une verge, en disant: Lève-toi, et mesure le temple de Dieu, l’autel, et ceux qui y adorent. '
  '10':
  - type: text
    content: 'Et à cause d’eux les habitants de la terre se réjouiront et seront dans l’allégresse, et ils s’enverront des présents les uns aux autres, parce que ces deux prophètes ont tourmenté les habitants de la terre. '
  '11':
  - type: text
    content: 'Après les trois jours et demi, un esprit de vie, venant de Dieu, entra en eux, et ils se tinrent sur leurs pieds; et une grande crainte s’empara de ceux qui les voyaient. '
  '12':
  - type: text
    content: 'Et ils entendirent du ciel une voix qui leur disait: Montez ici! Et ils montèrent au ciel dans la nuée; et leurs ennemis les virent. '
  '13':
  - type: text
    content: 'A cette heure-là, il y eut un grand tremblement de terre, et la dixième partie de la ville, tomba; sept mille hommes furent tués dans ce tremblement de terre, et les autres furent effrayés et donnèrent gloire au Dieu du ciel. '
  '14':
  - type: text
    content: 'Le second malheur est passé. Voici, '
  - type: note
    content: Ap 8:13; 9:12; 15:1.
  - type: text
    content: le troisième malheur vient bientôt.
  - type: heading
    content: La septième trompette
  - type: heading
    content: 'V. 15-19: cf. (Ap 12:10; 19:6.) (Ps 2; 98. Da 7:9-14.)'
  '15':
  - type: text
    content: 'Le septième ange sonna de la trompette. Et il y eut dans le ciel de fortes voix qui disaient: Le royaume du monde est remis à notre Seigneur et à son Christ; et il régnera aux siècles des siècles. '
  '16':
  - type: text
    content: 'Et les vingt-quatre vieillards, qui étaient assis devant Dieu sur leurs trônes, se prosternèrent sur leurs faces, et ils adorèrent Dieu, '
  '17':
  - type: text
    content: 'en disant: Nous te rendons grâces, Seigneur Dieu tout-puissant, '
  - type: note
    content: Ap 1:4, 8; 4:8; 16:5.
  - type: text
    content: 'qui es, et qui étais, de ce que tu as saisi ta grande puissance et pris possession de ton règne. '
  '18':
  - type: text
    content: 'Les nations se sont irritées; et ta colère est venue, et le temps est venu de juger les morts, de récompenser tes serviteurs les prophètes, les saints et ceux qui craignent ton nom, les petits et les grands, et de détruire ceux qui détruisent la terre. '
  '19':
  - type: text
    content: 'Et le temple de Dieu dans le ciel fut '
  - type: note
    content: Ap 15:5.
  - type: text
    content: ouvert, et l’arche de son alliance apparut dans son temple. Et il y eut des éclairs, des voix, des tonnerres, un tremblement de terre, et une forte grêle.
  '2':
  - type: text
    content: 'Mais le parvis extérieur du temple, laisse-le en dehors, et ne le mesure pas; car il a été donné aux nations, et elles fouleront aux pieds la ville sainte pendant '
  - type: note
    content: Ap 13:5.
  - type: text
    content: 'quarante-deux mois. '
  '3':
  - type: text
    content: 'Je donnerai à mes deux témoins le pouvoir de prophétiser, revêtus de sacs, pendant mille deux cent soixante jours. '
  '4':
  - type: note
    content: Za 4:3, 14.
  - type: text
    content: 'Ce sont les deux oliviers et les deux chandeliers qui se tiennent devant le Seigneur de la terre. '
  '5':
  - type: text
    content: 'Si quelqu’un veut leur faire du mal, du feu sort de leur bouche et dévore leurs ennemis; et si quelqu’un veut leur faire du mal, il faut qu’il soit tué de cette manière. '
  '6':
  - type: note
    content: 1 R 17:1.
  - type: text
    content: 'Ils ont le pouvoir de fermer le ciel, afin qu’il ne tombe point de pluie pendant les jours de leur prophétie; '
  - type: note
    content: Ex 7:8, 9, 10, 12.
  - type: text
    content: 'et ils ont le pouvoir de changer les eaux en sang, et de frapper la terre de toute espèce de plaie, chaque fois qu’ils le voudront. '
  '7':
  - type: note
    content: Da 7:21. Ap 13:7.
  - type: text
    content: 'Quand ils auront achevé leur témoignage, la bête '
  - type: note
    content: Ap 13:11.
  - type: text
    content: 'qui monte de l’abîme leur fera la guerre, les vaincra, et les tuera. '
  '8':
  - type: text
    content: 'Et leurs cadavres seront sur la place '
  - type: note
    content: Ap 17:2, 5; 18:10.
  - type: text
    content: 'de la grande ville, qui est appelée, dans un sens spirituel, Sodome et Égypte, là même où leur Seigneur a été crucifié. '
  '9':
  - type: text
    content: 'Des hommes d’entre les peuples, les tribus, les langues, et les nations, verront leurs cadavres pendant trois jours et demi, et ils ne permettront pas que leurs cadavres soient mis dans un sépulcre. '
