document_id: EXO.30,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Description de l’autel des parfums et de la cuve d’airain
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. Ex 37:25-28. Ap 8:3, 4.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu feras '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 37:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'un autel pour brûler des parfums, tu le feras de bois d’acacia; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Une fois chaque année, Aaron fera des expiations sur les cornes de l’autel; avec le sang de la victime expiatoire, il y sera fait des expiations une fois chaque année parmi vos descendants. Ce sera une chose très sainte devant l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-16: cf. (Ex 38:25-28. 2 Ch 24:5-14.) 1 Pi 1:18, 19.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 1:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque tu compteras les enfants d’Israël pour en faire le dénombrement, chacun d’eux paiera à l’Éternel le rachat de sa personne, afin qu’ils ne soient frappés d’aucune plaie lors de ce dénombrement. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 27:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 3:47
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 45:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Voici ce que donneront tous ceux qui seront compris dans le dénombrement: un demi-sicle, selon le sicle du sanctuaire, qui est de vingt guéras; un demi-sicle sera le don prélevé pour l’Éternel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout homme compris dans le dénombrement, depuis l’âge de vingt ans et au-dessus, paiera le don prélevé pour l’Éternel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le riche ne paiera pas plus, et le pauvre ne paiera pas moins d’un demi-sicle, comme don prélevé pour l’Éternel, afin de racheter leurs personnes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 38:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tu recevras des enfants d’Israël l’argent du rachat, et tu l’appliqueras au travail de la tente d’assignation; ce sera pour les enfants d’Israël un souvenir devant l’Éternel pour le rachat de leurs personnes.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-21: cf. (Ex 38:8; 40:30-32.) (Ps 26:6. 1 Ti 2:8. Hé 10:22.)'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu feras une cuve d’airain, avec sa base d’airain, pour les ablutions; tu la placeras entre la tente d’assignation et l’autel, et tu y mettras de l’eau, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avec laquelle Aaron et ses fils se laveront les mains et les pieds. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sa longueur sera d’une coudée, et sa largeur d’une coudée; il sera carré, et sa hauteur sera de deux coudées. Tu feras des cornes qui sortiront de l’autel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’ils entreront dans la tente d’assignation, ils se laveront avec cette eau, afin qu’ils ne meurent point; et aussi lorsqu’ils s’approcheront de l’autel, pour faire le service et pour offrir des sacrifices à l’Éternel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils se laveront les mains et les pieds, afin qu’ils ne meurent point. Ce sera une loi perpétuelle pour Aaron, pour ses fils et pour leurs descendants.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Composition de l’huile sainte et du parfum
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-38: cf. Ex 37:29; 40:9-16.'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Prends des meilleurs aromates, cinq cents sicles de myrrhe, de celle qui coule d’elle-même; la moitié, soit deux cent cinquante sicles, de cinnamome aromatique, deux cent cinquante sicles de roseau aromatique, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'cinq cents sicles de casse, selon le sicle du sanctuaire, et un hin d’huile d’olive. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu feras avec cela une huile pour l’onction sainte, composition de parfums selon l’art du parfumeur; ce sera l’huile pour l’onction sainte. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu en oindras la tente d’assignation et l’arche du témoignage, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'la table et tous ses ustensiles, le chandelier et ses ustensiles, l’autel des parfums, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'l’autel des holocaustes et tous ses ustensiles, la cuve avec sa base. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu sanctifieras ces choses, et elles seront très saintes, tout ce qui les touchera sera sanctifié. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu le couvriras d’or pur, le dessus, les côtés tout autour et les cornes, et tu y feras une bordure d’or tout autour. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu oindras Aaron et ses fils, et tu les sanctifieras, pour qu’ils soient à mon service dans le sacerdoce. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu parleras aux enfants d’Israël, et tu diras: Ce sera pour moi l’huile de l’onction sainte, parmi vos descendants. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On n’en répandra point sur le corps d’un homme, et vous n’en ferez point de semblable, dans les mêmes proportions; elle est sainte, et vous la regarderez comme sainte. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quiconque en composera de semblable, ou en mettra sur un étranger, sera retranché de son peuple. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel dit à Moïse: Prends des aromates, du stacté, de l’ongle odorant, du galbanum, et de l’encens pur, en parties égales. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu feras avec cela un parfum composé selon l’art du parfumeur; il sera salé, pur et saint. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu le réduiras en poudre, et tu le mettras devant le témoignage, dans la tente d’assignation, où je me rencontrerai avec toi. Ce sera pour vous une chose très sainte. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous ne ferez point pour vous de parfum semblable, dans les mêmes proportions; vous le regarderez comme saint, et réservé pour l’Éternel. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quiconque en fera de semblable, pour le sentir, sera retranché de son peuple.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu feras au-dessous de la bordure deux anneaux d’or aux deux côtés; tu en mettras aux deux côtés, pour recevoir les barres qui serviront à le porter. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu feras les barres de bois d’acacia, et tu les couvriras d’or. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu placeras l’autel en face du voile qui est devant l’arche du témoignage, en face du propitiatoire qui est sur le témoignage, et où je me rencontrerai avec toi. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aaron y fera brûler du parfum odoriférant; il en fera brûler chaque matin, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 3:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'lorsqu’il préparera les lampes; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il en fera brûler aussi entre les deux soirs, lorsqu’il arrangera les lampes. C’est ainsi que l’on brûlera à perpétuité du parfum devant l’Éternel parmi vos descendants. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous n’offrirez sur l’autel ni parfum étranger, ni holocauste, ni offrande, et vous n’y répandrez aucune libation. '
