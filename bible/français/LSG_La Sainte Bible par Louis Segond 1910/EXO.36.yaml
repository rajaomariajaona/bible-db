document_id: EXO.36,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Construction du tabernacle
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. Ex 35:30-35, 4-29.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Betsaleel, Oholiab, et tous les hommes habiles, en qui l’Éternel avait mis de la sagesse et de l’intelligence pour savoir et pour faire, exécutèrent les ouvrages destinés au service du sanctuaire, selon tout ce que l’Éternel avait ordonné. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Cinq de ces tapis furent joints ensemble; les cinq autres furent aussi joints ensemble. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On fit des lacets bleus au bord du tapis terminant le premier assemblage; on fit de même au bord du tapis terminant le second assemblage. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On mit cinquante lacets au premier tapis, et l’on mit cinquante lacets au bord du tapis terminant le second assemblage; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ces lacets se correspondaient les uns aux autres. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On fit cinquante agrafes d’or, et l’on joignit les tapis l’un à l’autre avec les agrafes. Et le tabernacle forma un tout. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'On fit des tapis de poil de chèvre, pour servir de tente sur le tabernacle; on fit onze de ces tapis. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'La longueur d’un tapis était de trente coudées, et la largeur d’un tapis était de quatre coudées; la mesure était la même pour les onze tapis. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'On joignit séparément cinq de ces tapis, et les six autres séparément. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'On mit cinquante lacets au bord du tapis terminant un assemblage, et l’on mit cinquante lacets au bord du tapis du second assemblage. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On fit cinquante agrafes d’airain, pour assembler la tente, afin qu’elle formât un tout. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On fit pour la tente une couverture de peaux de béliers teintes en rouge, et une couverture de peaux de dauphins, qui devait être mise par-dessus. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Moïse appela Betsaleel, Oholiab, et tous les hommes habiles dans l’esprit desquels l’Éternel avait mis de l’intelligence, tous ceux dont le cœur était disposé à s’appliquer à l’œuvre pour l’exécuter. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On fit les planches pour le tabernacle; elles étaient de bois d’acacia, placées debout. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'La longueur d’une planche était de dix coudées, et la largeur d’une planche était d’une coudée et demie. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il y avait pour chaque planche deux tenons, joints l’un à l’autre; l’on fit de même pour toutes les planches du tabernacle. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On fit vingt planches pour le tabernacle, du côté du midi. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On mit quarante bases d’argent sous les vingt planches, deux bases sous chaque planche pour ses deux tenons. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On fit vingt planches pour le second côté du tabernacle, le côté du nord, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et leurs quarante bases d’argent, deux bases sous chaque planche. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On fit six planches pour le fond du tabernacle, du côté de l’occident. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On fit deux planches pour les angles du tabernacle dans le fond; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'elles étaient doubles depuis le bas et bien liées à leur sommet par un anneau; on fit de même pour toutes aux deux angles. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ils prirent devant Moïse toutes les offrandes qu’avaient apportées les enfants d’Israël pour faire les ouvrages destinés au service du sanctuaire. Chaque matin, on apportait encore à Moïse des offrandes volontaires. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il y avait ainsi huit planches, avec leurs bases d’argent, soit seize bases, deux bases sous chaque planche. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On fit cinq barres de bois d’acacia pour les planches de l’un des côtés du tabernacle, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'cinq barres pour les planches du second côté du tabernacle, et cinq barres pour les planches du côté du tabernacle formant le fond vers l’occident; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'on fit la barre du milieu pour traverser les planches d’une extrémité à l’autre. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: On couvrit d’or les planches, et l’on fit d’or leurs anneaux pour recevoir les barres, et l’on couvrit d’or les barres.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 35-38: cf. Ex 26:31-37. (Hé 6:19, 20; 10:19, 20.)'
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On fit le voile de fil bleu, pourpre et cramoisi, et de fin lin retors; on le fit artistement travaillé, et l’on y représenta des chérubins. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On fit pour lui quatre colonnes d’acacia, et on les couvrit d’or; elles avaient des crochets d’or, et l’on fondit pour elles quatre bases d’argent. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:36
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On fit pour l’entrée de la tente un rideau de fil bleu, pourpre et cramoisi, et de fin lin retors; c’était un ouvrage de broderie. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:37
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: On fit ses cinq colonnes et leurs crochets, et l’on couvrit d’or leurs chapiteaux et leurs tringles; leurs cinq bases étaient d’airain.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Alors tous les hommes habiles, occupés à tous les travaux du sanctuaire, quittèrent chacun l’ouvrage qu’ils faisaient, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'et vinrent dire à Moïse: Le peuple apporte beaucoup plus qu’il ne faut pour exécuter les ouvrages que l’Éternel a ordonné de faire. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Moïse fit publier dans le camp que personne, homme ou femme, ne s’occupât plus d’offrandes pour le sanctuaire. On empêcha ainsi le peuple d’en apporter. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Les objets préparés suffisaient, et au-delà, pour tous les ouvrages à faire.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-34: cf. Ex 26:1-30. Ép 2:20-22.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tous les hommes habiles, qui travaillèrent à l’œuvre, firent le tabernacle avec dix tapis de fin lin retors et de fil bleu, pourpre et cramoisi; on y représenta des chérubins artistement travaillés. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'La longueur d’un tapis était de vingt-huit coudées; et la largeur d’un tapis était de quatre coudées; la mesure était la même pour tous les tapis. '
