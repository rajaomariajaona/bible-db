document_id: DEU.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ordre de détruire les Cananéens et leurs idoles
  - type: heading
    content: 'V. 1-5: cf. (Ex 34:11-17. Ps 106:34, etc.) 1 Jn 5:21.'
  - type: text
    content: 'Lorsque l’Éternel, ton Dieu, t’aura fait entrer dans le pays dont tu vas prendre possession, et qu’il chassera devant toi '
  - type: note
    content: De 31:3.
  - type: text
    content: 'beaucoup de nations, les Héthiens, les Guirgasiens, les Amoréens, les Cananéens, les Phéréziens, les Héviens et les Jébusiens, sept nations plus nombreuses et plus puissantes que toi; '
  '10':
  - type: text
    content: 'Mais il use directement de représailles envers ceux qui le haïssent, et il les fait périr; il ne '
  - type: note
    content: Né 1:2.
  - type: text
    content: 'diffère point envers celui qui le hait, il use directement de représailles. '
  '11':
  - type: text
    content: Ainsi, observe les commandements, les lois et les ordonnances que je te prescris aujourd’hui, et mets-les en pratique.
  - type: heading
    content: 'V. 12-26: cf. (De 28:1-14. Ex 23:22-33.)'
  '12':
  - type: text
    content: 'Si vous écoutez ces ordonnances, '
  - type: note
    content: Lé 26:3. De 28:1.
  - type: text
    content: 'si vous les observez et les mettez en pratique, l’Éternel, ton Dieu, gardera envers toi l’alliance et la miséricorde qu’il a jurées à tes pères. '
  '13':
  - type: text
    content: 'Il t’aimera, il te bénira et te multipliera; il bénira le fruit de tes entrailles et le fruit de ton sol, ton blé, ton moût et ton huile, les portées de ton gros et de ton menu bétail, dans le pays qu’il a juré à tes pères de te donner. '
  '14':
  - type: text
    content: 'Tu seras béni plus que tous les peuples; il n’y aura chez toi '
  - type: note
    content: Ex 23:26.
  - type: text
    content: 'ni homme ni femme stérile, ni bête stérile parmi tes troupeaux. '
  '15':
  - type: text
    content: 'L’Éternel éloignera de toi toute maladie; il ne t’enverra aucune de ces mauvaises maladies d’Égypte qui te sont connues, mais il en frappera tous ceux qui te haïssent. '
  '16':
  - type: text
    content: 'Tu dévoreras tous les peuples que l’Éternel, ton Dieu, va te livrer, tu ne jetteras pas sur eux un regard de pitié, et tu ne serviras point leurs dieux, car ce serait un piège pour toi. '
  '17':
  - type: text
    content: 'Peut-être diras-tu dans ton cœur: Ces nations sont plus nombreuses que moi; comment pourrai-je les chasser? '
  '18':
  - type: text
    content: 'Ne les crains point. Rappelle à ton souvenir ce que l’Éternel, ton Dieu, a fait à Pharaon et à toute l’Égypte, '
  '19':
  - type: note
    content: De 4:34; 29:3.
  - type: text
    content: 'les grandes épreuves que tes yeux ont vues, les miracles et les prodiges, la main forte et le bras étendu, quand l’Éternel, ton Dieu, t’a fait sortir: ainsi fera l’Éternel, ton Dieu, à tous les peuples que tu redoutes. '
  '2':
  - type: text
    content: 'lorsque l’Éternel, ton Dieu, te les aura livrées et '
  - type: note
    content: No 33:52. Jos 11:11.
  - type: text
    content: 'que tu les auras battues, tu les dévoueras par interdit, '
  - type: note
    content: Ex 23:32; 34:15.
  - type: text
    content: 'tu ne traiteras point d’alliance avec elles, et tu ne leur feras point grâce. '
  '20':
  - type: text
    content: 'L’Éternel, ton Dieu, enverra même '
  - type: note
    content: Ex 23:28. Jos 24:12.
  - type: text
    content: 'les frelons contre eux, jusqu’à la destruction de ceux qui échapperont et qui se cacheront devant toi. '
  '21':
  - type: text
    content: 'Ne sois point effrayé à cause d’eux; car l’Éternel, ton Dieu, est au milieu de toi, le Dieu grand et terrible. '
  '22':
  - type: text
    content: 'L’Éternel, ton Dieu, chassera peu à peu ces nations loin de ta face; tu ne pourras pas les exterminer promptement, de peur que les bêtes des champs ne se multiplient contre toi. '
  '23':
  - type: text
    content: 'L’Éternel, ton Dieu, te les livrera; et il les mettra complètement en déroute, jusqu’à ce qu’elles soient détruites. '
  '24':
  - type: text
    content: 'Il livrera leurs rois entre tes mains, et tu feras disparaître leurs noms de dessous les cieux; aucun ne tiendra contre toi, jusqu’à ce que tu les aies détruits. '
  '25':
  - type: text
    content: 'Vous brûlerez au feu les images taillées de leurs dieux. Tu ne convoiteras point et tu ne prendras point pour toi l’argent et l’or qui sont sur elles, de peur que ces choses ne te deviennent un piège; car elles sont en abomination à l’Éternel, ton Dieu. '
  '26':
  - type: text
    content: Tu n’introduiras point une chose abominable dans ta maison, afin que tu ne sois pas, comme cette chose, dévoué par interdit; tu l’auras en horreur, tu l’auras en abomination, car c’est une chose dévouée par interdit.
  '3':
  - type: text
    content: 'Tu ne '
  - type: note
    content: Ex 34:16. 1 R 11:2.
  - type: text
    content: 'contracteras point de mariage avec ces peuples, tu ne donneras point tes filles à leurs fils, et tu ne prendras point leurs filles pour tes fils; '
  '4':
  - type: text
    content: 'car ils détourneraient de moi tes fils, qui serviraient d’autres dieux, et la colère de l’Éternel s’enflammerait contre vous: il te détruirait promptement. '
  '5':
  - type: text
    content: 'Voici, au contraire, comment vous agirez à leur égard: vous renverserez '
  - type: note
    content: Ex 23:24; 34:13. De 12:2, 3.
  - type: text
    content: leurs autels, vous briserez leurs statues, vous abattrez leurs idoles, et vous brûlerez au feu leurs images taillées.
  - type: heading
    content: 'V. 6-11: cf. (Ex 19:5, 6. 1 Pi 2:9. Tit 2:14.) (De 9:4-6. Jos 23:14-16.)'
  '6':
  - type: text
    content: 'Car '
  - type: note
    content: Ex 19:5. De 4:20; 14:21; 26:18; 28:9. 1 Pi 2:9.
  - type: text
    content: 'tu es un peuple saint pour l’Éternel, ton Dieu; l’Éternel, ton Dieu, t’a choisi, pour que tu fusses un peuple qui lui appartînt entre tous les peuples qui sont sur la face de la terre. '
  '7':
  - type: text
    content: 'Ce n’est point parce que vous surpassez en nombre tous les peuples, que l’Éternel s’est attaché à vous et qu’il vous a choisis, car vous êtes le moindre de tous les peuples. '
  '8':
  - type: text
    content: 'Mais, parce que l’Éternel vous '
  - type: note
    content: De 10:15.
  - type: text
    content: 'aime, parce qu’il a voulu tenir le serment qu’il avait fait à vos pères, l’Éternel vous a fait sortir par sa main puissante, vous a délivrés de la maison de servitude, de la main de Pharaon, roi d’Égypte. '
  '9':
  - type: text
    content: 'Sache donc que c’est l’Éternel, ton Dieu, '
  - type: note
    content: Ex 20:5. De 5:9.
  - type: text
    content: 'qui est Dieu. Ce Dieu fidèle garde son alliance et sa miséricorde jusqu’à la millième génération envers ceux qui l’aiment et qui observent ses commandements. '
