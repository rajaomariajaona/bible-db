document_id: DEU.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ordre de détruire les Cananéens et leurs idoles
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. (Ex 34:11-17. Ps 106:34, etc.) 1 Jn 5:21.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque l’Éternel, ton Dieu, t’aura fait entrer dans le pays dont tu vas prendre possession, et qu’il chassera devant toi '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 31:3
      metadata:
        usfm: DEU.31.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'beaucoup de nations, les Héthiens, les Guirgasiens, les Amoréens, les Cananéens, les Phéréziens, les Héviens et les Jébusiens, sept nations plus nombreuses et plus puissantes que toi; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'lorsque l’Éternel, ton Dieu, te les aura livrées et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 33:52
      metadata:
        usfm: NUM.33.52
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 11:11
      metadata:
        usfm: JOS.11.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que tu les auras battues, tu les dévoueras par interdit, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:32
      metadata:
        usfm: EXO.23.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:15
      metadata:
        usfm: EXO.34.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tu ne traiteras point d’alliance avec elles, et tu ne leur feras point grâce. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu ne '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 34:16
      metadata:
        usfm: EXO.34.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 11:2
      metadata:
        usfm: 1KI.11.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'contracteras point de mariage avec ces peuples, tu ne donneras point tes filles à leurs fils, et tu ne prendras point leurs filles pour tes fils; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'car ils détourneraient de moi tes fils, qui serviraient d’autres dieux, et la colère de l’Éternel s’enflammerait contre vous: il te détruirait promptement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voici, au contraire, comment vous agirez à leur égard: vous renverserez '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:24
      metadata:
        usfm: EXO.23.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:13
      metadata:
        usfm: EXO.34.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 12:2
      metadata:
        usfm: DEU.12.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: DEU.12.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: leurs autels, vous briserez leurs statues, vous abattrez leurs idoles, et vous brûlerez au feu leurs images taillées.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-11: cf. (Ex 19:5, 6. 1 Pi 2:9. Tit 2:14.) (De 9:4-6. Jos 23:14-16.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Car '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 19:5
      metadata:
        usfm: EXO.19.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:20
      metadata:
        usfm: DEU.4.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:21
      metadata:
        usfm: DEU.14.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:18
      metadata:
        usfm: DEU.26.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:9
      metadata:
        usfm: DEU.28.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:9
      metadata:
        usfm: 1PE.2.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tu es un peuple saint pour l’Éternel, ton Dieu; l’Éternel, ton Dieu, t’a choisi, pour que tu fusses un peuple qui lui appartînt entre tous les peuples qui sont sur la face de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ce n’est point parce que vous surpassez en nombre tous les peuples, que l’Éternel s’est attaché à vous et qu’il vous a choisis, car vous êtes le moindre de tous les peuples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais, parce que l’Éternel vous '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:15
      metadata:
        usfm: DEU.10.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'aime, parce qu’il a voulu tenir le serment qu’il avait fait à vos pères, l’Éternel vous a fait sortir par sa main puissante, vous a délivrés de la maison de servitude, de la main de Pharaon, roi d’Égypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Sache donc que c’est l’Éternel, ton Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:5
      metadata:
        usfm: EXO.20.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:9
      metadata:
        usfm: DEU.5.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui est Dieu. Ce Dieu fidèle garde son alliance et sa miséricorde jusqu’à la millième génération envers ceux qui l’aiment et qui observent ses commandements. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais il use directement de représailles envers ceux qui le haïssent, et il les fait périr; il ne '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Né 1:2
      metadata:
        usfm: NEH.1.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'diffère point envers celui qui le hait, il use directement de représailles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ainsi, observe les commandements, les lois et les ordonnances que je te prescris aujourd’hui, et mets-les en pratique.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-26: cf. (De 28:1-14. Ex 23:22-33.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Si vous écoutez ces ordonnances, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 26:3
      metadata:
        usfm: LEV.26.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:1
      metadata:
        usfm: DEU.28.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'si vous les observez et les mettez en pratique, l’Éternel, ton Dieu, gardera envers toi l’alliance et la miséricorde qu’il a jurées à tes pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il t’aimera, il te bénira et te multipliera; il bénira le fruit de tes entrailles et le fruit de ton sol, ton blé, ton moût et ton huile, les portées de ton gros et de ton menu bétail, dans le pays qu’il a juré à tes pères de te donner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tu seras béni plus que tous les peuples; il n’y aura chez toi '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:26
      metadata:
        usfm: EXO.23.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ni homme ni femme stérile, ni bête stérile parmi tes troupeaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L’Éternel éloignera de toi toute maladie; il ne t’enverra aucune de ces mauvaises maladies d’Égypte qui te sont connues, mais il en frappera tous ceux qui te haïssent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tu dévoreras tous les peuples que l’Éternel, ton Dieu, va te livrer, tu ne jetteras pas sur eux un regard de pitié, et tu ne serviras point leurs dieux, car ce serait un piège pour toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Peut-être diras-tu dans ton cœur: Ces nations sont plus nombreuses que moi; comment pourrai-je les chasser? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ne les crains point. Rappelle à ton souvenir ce que l’Éternel, ton Dieu, a fait à Pharaon et à toute l’Égypte, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:34
      metadata:
        usfm: DEU.4.34
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:3
      metadata:
        usfm: DEU.29.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les grandes épreuves que tes yeux ont vues, les miracles et les prodiges, la main forte et le bras étendu, quand l’Éternel, ton Dieu, t’a fait sortir: ainsi fera l’Éternel, ton Dieu, à tous les peuples que tu redoutes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'L’Éternel, ton Dieu, enverra même '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:28
      metadata:
        usfm: EXO.23.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 24:12
      metadata:
        usfm: JOS.24.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les frelons contre eux, jusqu’à la destruction de ceux qui échapperont et qui se cacheront devant toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ne sois point effrayé à cause d’eux; car l’Éternel, ton Dieu, est au milieu de toi, le Dieu grand et terrible. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L’Éternel, ton Dieu, chassera peu à peu ces nations loin de ta face; tu ne pourras pas les exterminer promptement, de peur que les bêtes des champs ne se multiplient contre toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'L’Éternel, ton Dieu, te les livrera; et il les mettra complètement en déroute, jusqu’à ce qu’elles soient détruites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il livrera leurs rois entre tes mains, et tu feras disparaître leurs noms de dessous les cieux; aucun ne tiendra contre toi, jusqu’à ce que tu les aies détruits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Vous brûlerez au feu les images taillées de leurs dieux. Tu ne convoiteras point et tu ne prendras point pour toi l’argent et l’or qui sont sur elles, de peur que ces choses ne te deviennent un piège; car elles sont en abomination à l’Éternel, ton Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tu n’introduiras point une chose abominable dans ta maison, afin que tu ne sois pas, comme cette chose, dévoué par interdit; tu l’auras en horreur, tu l’auras en abomination, car c’est une chose dévouée par interdit.
