document_id: 1TH.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Exhortation à la sainteté, à la charité, au travail
  - type: heading
    content: 'V. 1-8: cf. 1 Pi 1:14-16; 4:1-5. Ép 5:3-8. 1 Co 6:13-20.'
  - type: text
    content: 'Au reste, frères, puisque vous avez appris de nous '
  - type: note
    content: Ph 1:27. 1 Th 2:12.
  - type: text
    content: 'comment vous devez vous conduire et plaire à Dieu, et que c’est là ce que vous faites, nous vous prions et nous vous conjurons au nom du Seigneur Jésus de marcher à cet égard de progrès en progrès. '
  '10':
  - type: text
    content: 'et c’est aussi ce que vous faites envers tous les frères dans la Macédoine entière. Mais nous vous exhortons, frères, à abonder toujours plus dans cet amour, '
  '11':
  - type: note
    content: 2 Th 3:7, 12.
  - type: text
    content: 'et à mettre votre honneur à vivre tranquilles, à vous occuper de vos propres affaires, '
  - type: note
    content: Ac 20:34. Ép 4:28.
  - type: text
    content: 'et à travailler de vos mains, comme nous vous l’avons recommandé, '
  '12':
  - type: text
    content: en sorte que vous vous conduisiez honnêtement envers ceux du dehors, et que vous n’ayez besoin de personne.
  - type: heading
    content: Sur la résurrection des morts et l’avènement du Seigneur
  - type: heading
    content: 'V. 13-18: cf. 1 Co 15:19-58. Ph 3:20, 21.'
  '13':
  - type: text
    content: 'Nous ne voulons pas, frères, que vous soyez dans l’ignorance au sujet de ceux qui dorment, '
  - type: note
    content: Lé 19:28. De 14:1. 2 S 12:20.
  - type: text
    content: 'afin que vous ne vous affligiez pas comme les autres qui n’ont point d’espérance. '
  '14':
  - type: text
    content: 'Car, si nous croyons que Jésus est mort et qu’il est ressuscité, croyons aussi que Dieu ramènera par Jésus et avec lui ceux qui sont morts. '
  '15':
  - type: text
    content: 'Voici, en effet, ce que nous vous déclarons d’après la parole du Seigneur: '
  - type: note
    content: 1 Co 15:22, 51.
  - type: text
    content: 'nous les vivants, restés pour l’avènement du Seigneur, nous ne devancerons pas ceux qui sont morts. '
  '16':
  - type: note
    content: Mt 24:31. 1 Co 15:52. 2 Th 1:7.
  - type: text
    content: 'Car le Seigneur lui-même, à un signal donné, à la voix d’un archange, et au son de la trompette de Dieu, descendra du ciel, et les morts en Christ ressusciteront premièrement. '
  '17':
  - type: text
    content: 'Ensuite, nous les vivants, qui serons restés, nous serons tous ensemble enlevés avec eux sur des nuées, à la rencontre du Seigneur dans les airs, et ainsi nous serons toujours avec le Seigneur. '
  '18':
  - type: text
    content: Consolez-vous donc les uns les autres par ces paroles.
  '2':
  - type: text
    content: 'Vous savez, en effet, quels préceptes nous vous avons donnés de la part du Seigneur Jésus. '
  '3':
  - type: note
    content: Ro 12:2. Ép 5:27. Ph 4:8.
  - type: text
    content: 'Ce que Dieu veut, c’est votre sanctification; c’est que vous vous absteniez de l’impudicité; '
  '4':
  - type: text
    content: 'c’est que chacun de vous sache posséder son corps dans la sainteté et l’honnêteté, '
  '5':
  - type: text
    content: 'sans vous livrer à une convoitise passionnée, comme font les païens '
  - type: note
    content: 1 Co 15:34. Ép 4:18.
  - type: text
    content: 'qui ne connaissent pas Dieu; '
  '6':
  - type: text
    content: 'c’est que personne n’use envers son frère de fraude et de cupidité dans les affaires, parce que le Seigneur tire vengeance de toutes ces choses, comme nous vous l’avons déjà dit et attesté. '
  '7':
  - type: text
    content: 'Car Dieu ne nous a pas appelés à l’impureté, '
  - type: note
    content: Jn 17:19. 1 Co 1:2.
  - type: text
    content: 'mais à la sanctification. '
  '8':
  - type: note
    content: Lu 10:16.
  - type: text
    content: 'Celui donc qui rejette ces préceptes ne rejette pas un homme, mais Dieu, '
  - type: note
    content: 1 Co 7:40.
  - type: text
    content: qui vous a aussi donné son Saint-Esprit.
  - type: heading
    content: 'V. 9-12: cf. 1 Pi 1:22. 2 Th 3:6-12.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Lé 19:18. Mt 22:39. Jn 13:34; 15:12. Ép 5:2. 2 Pi 4:8. 1 Jn 3:23; 4:21.
  - type: text
    content: 'Pour ce qui est de l’amour fraternel, vous n’avez pas besoin qu’on vous en écrive; car vous avez vous-mêmes appris de Dieu à vous aimer les uns les autres, '
