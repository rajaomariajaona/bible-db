document_id: JON.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vocation de Jonas; fuite et punition
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-3: cf. 2 R 14:25. (Jon 4:2. Ps 139:7-10.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l’Éternel fut adressée à Jonas, fils d’Amitthaï, en ces mots: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces hommes eurent une grande frayeur, et ils lui dirent: Pourquoi as-tu fait cela? Car ces hommes savaient qu’il fuyait loin de la face de l’Éternel, parce qu’il le leur avait déclaré. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui dirent: Que te ferons-nous, pour que la mer se calme envers nous? Car la mer était de plus en plus orageuse. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur répondit: Prenez-moi, et jetez-moi dans la mer, et la mer se calmera envers vous; car je sais que c’est moi qui attire sur vous cette grande tempête. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces hommes ramaient pour gagner la terre, mais ils ne le purent, parce que la mer s’agitait toujours plus contre eux. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors ils invoquèrent l’Éternel, et dirent: O Éternel, ne nous fais pas périr à cause de la vie de cet homme, et ne nous charge pas du sang innocent! Car toi, Éternel, tu fais ce que tu veux. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis ils prirent Jonas, et le jetèrent dans la mer. Et la fureur de la mer s’apaisa. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ces hommes furent saisis d’une grande crainte de l’Éternel, et ils offrirent un sacrifice à l’Éternel, et firent des vœux.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lève-toi, va à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 10:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jon 3:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ninive, la grande ville, et crie contre elle! Car sa méchanceté est montée jusqu’à moi. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et Jonas se leva pour s’enfuir à Tarsis, loin de la face de l’Éternel. Il descendit à Japho, et il trouva un navire qui allait à Tarsis; il paya le prix du transport, et s’embarqua pour aller avec les passagers à Tarsis, loin de la face de l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 4-16: cf. Ps 107:23-32. (Job 9:4. Ps 32:9. Ac 26:14.) Ro 2:17-24.'
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais l’Éternel fit souffler sur la mer un vent impétueux, et il s’éleva sur la mer une grande tempête. Le navire menaçait de faire naufrage. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les mariniers eurent peur, ils implorèrent chacun leur dieu, et ils jetèrent dans la mer les objets qui étaient sur le navire, afin de se le rendre plus léger. Jonas descendit au fond du navire, se coucha, et s’endormit profondément. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le pilote s’approcha de lui, et lui dit: Pourquoi dors-tu? Lève-toi, invoque ton Dieu! Peut-être voudra-t-il penser à nous, et nous ne périrons pas. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ils se dirent l’un à l’autre: Venez, et tirons au sort, pour savoir qui nous attire ce malheur. Ils tirèrent au sort, et le sort tomba sur Jonas. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors ils lui dirent: Dis-nous qui nous attire ce malheur. Quelles sont tes affaires, et d’où viens-tu? Quel est ton pays, et de quel peuple es-tu? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur répondit: Je suis Hébreu, et je crains l’Éternel, le Dieu des cieux, qui a fait la mer et la terre. '
