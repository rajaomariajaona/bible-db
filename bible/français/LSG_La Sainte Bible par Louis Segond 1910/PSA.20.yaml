document_id: PSA.20,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 2 S 10. Ps 21; 60.
  - type: text
    content: Au chef des chantres. Psaume de David.
  '10':
  - type: text
    content: Éternel, sauve le roi!
  - type: text
    content: Qu’il nous exauce, quand nous l’invoquons!
  '2':
  - type: text
    content: Que l’Éternel t’exauce au jour de la détresse,
  - type: text
    content: Que le nom du Dieu de Jacob te protège!
  '3':
  - type: text
    content: Que du sanctuaire il t’envoie du secours,
  - type: text
    content: Que de Sion il te soutienne!
  '4':
  - type: text
    content: Qu’il se souvienne de toutes tes offrandes,
  - type: text
    content: 'Et qu’il agrée tes holocaustes! '
  - type: text
    content: — Pause.
  '5':
  - type: text
    content: Qu’il te donne ce que ton cœur désire,
  - type: text
    content: Et qu’il accomplisse tous tes desseins!
  '6':
  - type: text
    content: Nous nous réjouirons de ton salut,
  - type: text
    content: Nous lèverons l’étendard au nom de notre Dieu;
  - type: text
    content: L’Éternel exaucera tous tes vœux.
  '7':
  - type: text
    content: Je sais déjà que l’Éternel sauve son oint;
  - type: text
    content: Il l’exaucera des cieux, de sa sainte demeure,
  - type: text
    content: Par le secours puissant de sa droite.
  '8':
  - type: text
    content: Ceux-ci s’appuient sur leurs chars, ceux-là sur leurs chevaux;
  - type: text
    content: Nous, nous invoquons le nom de l’Éternel, notre Dieu.
  '9':
  - type: text
    content: Eux, ils plient, et ils tombent;
  - type: text
    content: Nous, nous tenons ferme, et restons debout.
