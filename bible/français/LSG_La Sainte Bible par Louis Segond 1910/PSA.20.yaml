document_id: PSA.20,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2 S 10. Ps 21; 60.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef des chantres. Psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Éternel, sauve le roi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il nous exauce, quand nous l’invoquons!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Que l’Éternel t’exauce au jour de la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le nom du Dieu de Jacob te protège!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Que du sanctuaire il t’envoie du secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que de Sion il te soutienne!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Qu’il se souvienne de toutes tes offrandes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et qu’il agrée tes holocaustes! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Qu’il te donne ce que ton cœur désire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il accomplisse tous tes desseins!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Nous nous réjouirons de ton salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous lèverons l’étendard au nom de notre Dieu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel exaucera tous tes vœux.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Je sais déjà que l’Éternel sauve son oint;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il l’exaucera des cieux, de sa sainte demeure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par le secours puissant de sa droite.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ceux-ci s’appuient sur leurs chars, ceux-là sur leurs chevaux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous, nous invoquons le nom de l’Éternel, notre Dieu.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Eux, ils plient, et ils tombent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous, nous tenons ferme, et restons debout.
