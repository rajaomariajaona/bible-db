document_id: LUK.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prédication de Jean-Baptiste
  - type: heading
    content: 'V. 1-17: cf. (Mt 3:1-12. Mc 1:1-8.) Jn 1:6-8, 19-28.'
  - type: text
    content: 'La quinzième année du règne de Tibère César, lorsque Ponce Pilate était gouverneur de la Judée, Hérode tétrarque de la Galilée, son frère Philippe tétrarque de l’Iturée et du territoire de la Trachonite, Lysanias tétrarque de l’Abilène, '
  '10':
  - type: text
    content: 'La foule l’interrogeait, '
  - type: note
    content: Ac 2:37.
  - type: text
    content: 'disant: Que devons-nous donc faire? '
  '11':
  - type: text
    content: 'Il leur répondit: '
  - type: note
    content: Ja 2:13, 15. 1 Jn 3:17.
  - type: text
    content: 'Que celui qui a deux tuniques partage avec celui qui n’en a point, et que celui qui a de quoi manger agisse de même. '
  '12':
  - type: text
    content: 'Il vint aussi des publicains pour être baptisés, et ils lui dirent: Maître, que devons-nous faire? '
  '13':
  - type: text
    content: 'Il leur répondit: N’exigez rien au-delà de ce qui vous a été ordonné. '
  '14':
  - type: text
    content: 'Des soldats aussi lui demandèrent: Et nous, que devons-nous faire? Il leur répondit: Ne commettez ni extorsion ni fraude envers personne, et contentez-vous de votre solde. '
  '15':
  - type: text
    content: 'Comme le peuple était dans l’attente, et que tous se demandaient en eux-mêmes si Jean n’était pas le Christ, '
  '16':
  - type: text
    content: 'il leur dit à tous: '
  - type: note
    content: Mt 3:11. Mc 1:8. Jn 1:26. Ac 1:5; 11:16; 19:4.
  - type: text
    content: 'Moi, je vous baptise d’eau; mais il vient, celui qui est plus puissant que moi, et je ne suis pas digne de délier la courroie de ses souliers. '
  - type: note
    content: És 44:3. Joë 2:28. Ac 2:4; 11:15.
  - type: text
    content: 'Lui, il vous baptisera du Saint-Esprit et de feu. '
  '17':
  - type: note
    content: Mt 3:12.
  - type: text
    content: Il a son van à la main; il nettoiera son aire, et il amassera le blé dans son grenier, mais il brûlera la paille dans un feu qui ne s’éteint point.
  - type: heading
    content: 'V. 18-20: cf. Mt 14:3-5. Mc 6:17-20.'
  '18':
  - type: text
    content: 'C’est ainsi que Jean annonçait la bonne nouvelle au peuple, en lui adressant encore beaucoup d’autres exhortations. '
  '19':
  - type: note
    content: Mt 14:3. Mc 6:18.
  - type: text
    content: 'Mais Hérode le tétrarque, étant repris par Jean au sujet d’Hérodias, femme de son frère, et pour toutes les mauvaises actions qu’il avait commises, '
  '2':
  - type: text
    content: 'et du temps des '
  - type: note
    content: Ac 4:6.
  - type: text
    content: 'souverains sacrificateurs Anne et Caïphe, la parole de Dieu fut adressée à Jean, fils de Zacharie, dans le désert. '
  '20':
  - type: text
    content: ajouta encore à toutes les autres celle d’enfermer Jean dans la prison.
  - type: heading
    content: Baptême de Jésus-Christ
  - type: heading
    content: 'V. 21-22: cf. (Mt 3:13-17. Mc 1:9-11.) Jn 1:32-34.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Mt 3:13. Mc 1:9. Jn 1:32.
  - type: text
    content: 'Tout le peuple se faisant baptiser, Jésus fut aussi baptisé; et, pendant qu’il priait, le ciel s’ouvrit, '
  '22':
  - type: text
    content: 'et le Saint-Esprit descendit sur lui sous une forme corporelle, comme une colombe. Et une voix fit entendre du ciel ces paroles: '
  - type: note
    content: És 42:1. Mt 17:5. Mc 9:7. Lu 9:35. Col 1:13. 2 Pi 1:17.
  - type: text
    content: Tu es mon Fils bien-aimé; en toi j’ai mis toute mon affection.
  - type: heading
    content: Généalogie de Jésus-Christ
  - type: heading
    content: 'V. 23-38: cf. Mt 1:1-16. (Ge 5; 11:10-26.)'
  '23':
  - type: text
    content: 'Jésus avait environ trente ans lorsqu’il commença son ministère, étant, comme on le croyait, '
  - type: note
    content: Mt 13:55. Jn 6:42.
  - type: text
    content: 'fils de Joseph, fils d’Héli, '
  '24':
  - type: text
    content: 'fils de Matthat, fils de Lévi, fils de Melchi, fils de Jannaï, fils de Joseph, '
  '25':
  - type: text
    content: 'fils de Mattathias, fils d’Amos, fils de Nahum, fils d’Esli, fils de Naggaï, '
  '26':
  - type: text
    content: 'fils de Maath, fils de Mattathias, fils de Sémeï, fils de Josech, fils de Joda, '
  '27':
  - type: text
    content: 'fils de Joanan, fils de Rhésa, fils de Zorobabel, fils de Salathiel, fils de Néri, '
  '28':
  - type: text
    content: 'fils de Melchi, fils d’Addi, fils de Kosam, fils d’Elmadam, fils D’Er, '
  '29':
  - type: text
    content: 'fils de Jésus, fils d’Éliézer, fils de Jorim, fils de Matthat, fils de Lévi, '
  '3':
  - type: note
    content: Mt 3:1. Mc 1:4.
  - type: text
    content: 'Et il alla dans tout le pays des environs du Jourdain, prêchant le baptême de repentance, pour la rémission des péchés, '
  '30':
  - type: text
    content: 'fils de Siméon, fils de Juda, fils de Joseph, fils de Jonam, fils d’Éliakim, '
  '31':
  - type: text
    content: 'fils de Méléa, fils de Menna, fils de Mattatha, fils de Nathan, fils de David, '
  '32':
  - type: text
    content: 'fils d’Isaï, fils de Jobed, fils de Booz, fils de Salmon, fils de Naasson, '
  '33':
  - type: text
    content: 'fils d’Aminadab, fils d’Admin, fils d’Arni, fils d’Esrom, fils de Pharès, fils de Juda, '
  '34':
  - type: text
    content: 'fils de Jacob, fils d’Isaac, fils d’Abraham, fils de '
  - type: note
    content: Ge 11:10, etc.
  - type: text
    content: 'Thara, fils de Nachor, '
  '35':
  - type: text
    content: 'fils de Seruch, fils de Ragau, fils de Phalek, fils d’Éber, fils de Sala, '
  '36':
  - type: text
    content: 'fils de Kaïnam, fils d’Arphaxad, fils de Sem, fils de Noé, fils de Lamech, '
  '37':
  - type: text
    content: 'fils de Mathusala, fils d’Énoch, fils de Jared, fils de Maléléel, fils de Kaïnan, '
  '38':
  - type: text
    content: 'fils d’Énos, fils de Seth, fils '
  - type: note
    content: Ge 5:3.
  - type: text
    content: d’Adam, fils de Dieu.
  '4':
  - type: text
    content: 'selon ce qui est écrit dans le livre des paroles '
  - type: note
    content: És 40:3. Mt 3:3. Mc 1:3. Jn 1:23.
  - type: text
    content: 'd’Ésaïe, le prophète:'
  - type: text
    content: 'C’est la voix de celui qui crie dans le désert:'
  - type: text
    content: Préparez le chemin du Seigneur,
  - type: text
    content: Aplanissez ses sentiers.
  '5':
  - type: text
    content: Toute vallée sera comblée,
  - type: text
    content: Toute montagne et toute colline seront abaissées;
  - type: text
    content: Ce qui est tortueux sera redressé,
  - type: text
    content: Et les chemins raboteux seront aplanis.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps 98:2. És 52:10.
  - type: text
    content: Et toute chair verra le salut de Dieu.
  '7':
  - type: text
    content: 'Il disait donc à ceux qui venaient en foule pour être baptisés par lui: '
  - type: note
    content: Mt 3:7; 23:33.
  - type: text
    content: 'Races de vipères, qui vous a appris à fuir la colère à venir? '
  '8':
  - type: text
    content: 'Produisez donc des fruits dignes de la repentance, et ne vous mettez pas à dire en vous-mêmes: '
  - type: note
    content: Mt 3:9. Jn 8:39. Ac 13:26.
  - type: text
    content: 'Nous avons Abraham pour père! Car je vous déclare que de ces pierres Dieu peut susciter des enfants à Abraham. '
  '9':
  - type: note
    content: Mt 3:10; 7:19.
  - type: text
    content: 'Déjà même la cognée est mise à la racine des arbres: tout arbre donc qui ne produit pas de bons fruits sera coupé et jeté au feu. '
