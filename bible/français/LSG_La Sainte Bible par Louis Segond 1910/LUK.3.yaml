document_id: LUK.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prédication de Jean-Baptiste
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-17: cf. (Mt 3:1-12. Mc 1:1-8.) Jn 1:6-8, 19-28.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La quinzième année du règne de Tibère César, lorsque Ponce Pilate était gouverneur de la Judée, Hérode tétrarque de la Galilée, son frère Philippe tétrarque de l’Iturée et du territoire de la Trachonite, Lysanias tétrarque de l’Abilène, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et du temps des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:6
      metadata:
        usfm: ACT.4.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'souverains sacrificateurs Anne et Caïphe, la parole de Dieu fut adressée à Jean, fils de Zacharie, dans le désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:1
      metadata:
        usfm: MAT.3.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:4
      metadata:
        usfm: MRK.1.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et il alla dans tout le pays des environs du Jourdain, prêchant le baptême de repentance, pour la rémission des péchés, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'selon ce qui est écrit dans le livre des paroles '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 40:3
      metadata:
        usfm: ISA.40.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:3
      metadata:
        usfm: MAT.3.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:3
      metadata:
        usfm: MRK.1.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:23
      metadata:
        usfm: JHN.1.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'd’Ésaïe, le prophète:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C’est la voix de celui qui crie dans le désert:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Préparez le chemin du Seigneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aplanissez ses sentiers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Toute vallée sera comblée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toute montagne et toute colline seront abaissées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce qui est tortueux sera redressé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les chemins raboteux seront aplanis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 98:2
      metadata:
        usfm: PSA.98.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 52:10
      metadata:
        usfm: ISA.52.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et toute chair verra le salut de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il disait donc à ceux qui venaient en foule pour être baptisés par lui: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:7
      metadata:
        usfm: MAT.3.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:33
      metadata:
        usfm: MAT.23.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Races de vipères, qui vous a appris à fuir la colère à venir? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Produisez donc des fruits dignes de la repentance, et ne vous mettez pas à dire en vous-mêmes: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:9
      metadata:
        usfm: MAT.3.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 8:39
      metadata:
        usfm: JHN.8.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 13:26
      metadata:
        usfm: ACT.13.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous avons Abraham pour père! Car je vous déclare que de ces pierres Dieu peut susciter des enfants à Abraham. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:10
      metadata:
        usfm: MAT.3.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:19
      metadata:
        usfm: MAT.7.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Déjà même la cognée est mise à la racine des arbres: tout arbre donc qui ne produit pas de bons fruits sera coupé et jeté au feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'La foule l’interrogeait, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 2:37
      metadata:
        usfm: ACT.2.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'disant: Que devons-nous donc faire? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il leur répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 2:13
      metadata:
        usfm: JAS.2.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: JAS.2.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:17
      metadata:
        usfm: 1JN.3.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que celui qui a deux tuniques partage avec celui qui n’en a point, et que celui qui a de quoi manger agisse de même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il vint aussi des publicains pour être baptisés, et ils lui dirent: Maître, que devons-nous faire? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il leur répondit: N’exigez rien au-delà de ce qui vous a été ordonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Des soldats aussi lui demandèrent: Et nous, que devons-nous faire? Il leur répondit: Ne commettez ni extorsion ni fraude envers personne, et contentez-vous de votre solde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Comme le peuple était dans l’attente, et que tous se demandaient en eux-mêmes si Jean n’était pas le Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'il leur dit à tous: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:11
      metadata:
        usfm: MAT.3.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:8
      metadata:
        usfm: MRK.1.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:26
      metadata:
        usfm: JHN.1.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:5
      metadata:
        usfm: ACT.1.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:16
      metadata:
        usfm: ACT.11.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:4
      metadata:
        usfm: ACT.19.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Moi, je vous baptise d’eau; mais il vient, celui qui est plus puissant que moi, et je ne suis pas digne de délier la courroie de ses souliers. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 44:3
      metadata:
        usfm: ISA.44.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 2:28
      metadata:
        usfm: JOL.2.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 2:4
      metadata:
        usfm: ACT.2.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:15
      metadata:
        usfm: ACT.11.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lui, il vous baptisera du Saint-Esprit et de feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:12
      metadata:
        usfm: MAT.3.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il a son van à la main; il nettoiera son aire, et il amassera le blé dans son grenier, mais il brûlera la paille dans un feu qui ne s’éteint point.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-20: cf. Mt 14:3-5. Mc 6:17-20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'C’est ainsi que Jean annonçait la bonne nouvelle au peuple, en lui adressant encore beaucoup d’autres exhortations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 14:3
      metadata:
        usfm: MAT.14.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:18
      metadata:
        usfm: MRK.6.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais Hérode le tétrarque, étant repris par Jean au sujet d’Hérodias, femme de son frère, et pour toutes les mauvaises actions qu’il avait commises, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ajouta encore à toutes les autres celle d’enfermer Jean dans la prison.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Baptême de Jésus-Christ
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-22: cf. (Mt 3:13-17. Mc 1:9-11.) Jn 1:32-34.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:13
      metadata:
        usfm: MAT.3.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:9
      metadata:
        usfm: MRK.1.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:32
      metadata:
        usfm: JHN.1.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout le peuple se faisant baptiser, Jésus fut aussi baptisé; et, pendant qu’il priait, le ciel s’ouvrit, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'et le Saint-Esprit descendit sur lui sous une forme corporelle, comme une colombe. Et une voix fit entendre du ciel ces paroles: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 42:1
      metadata:
        usfm: ISA.42.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 17:5
      metadata:
        usfm: MAT.17.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:7
      metadata:
        usfm: MRK.9.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:35
      metadata:
        usfm: LUK.9.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:13
      metadata:
        usfm: COL.1.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 1:17
      metadata:
        usfm: 2PE.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tu es mon Fils bien-aimé; en toi j’ai mis toute mon affection.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Généalogie de Jésus-Christ
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 23-38: cf. Mt 1:1-16. (Ge 5; 11:10-26.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus avait environ trente ans lorsqu’il commença son ministère, étant, comme on le croyait, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:55
      metadata:
        usfm: MAT.13.55
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:42
      metadata:
        usfm: JHN.6.42
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'fils de Joseph, fils d’Héli, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'fils de Matthat, fils de Lévi, fils de Melchi, fils de Jannaï, fils de Joseph, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'fils de Mattathias, fils d’Amos, fils de Nahum, fils d’Esli, fils de Naggaï, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'fils de Maath, fils de Mattathias, fils de Sémeï, fils de Josech, fils de Joda, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'fils de Joanan, fils de Rhésa, fils de Zorobabel, fils de Salathiel, fils de Néri, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'fils de Melchi, fils d’Addi, fils de Kosam, fils d’Elmadam, fils D’Er, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'fils de Jésus, fils d’Éliézer, fils de Jorim, fils de Matthat, fils de Lévi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'fils de Siméon, fils de Juda, fils de Joseph, fils de Jonam, fils d’Éliakim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'fils de Méléa, fils de Menna, fils de Mattatha, fils de Nathan, fils de David, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'fils d’Isaï, fils de Jobed, fils de Booz, fils de Salmon, fils de Naasson, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'fils d’Aminadab, fils d’Admin, fils d’Arni, fils d’Esrom, fils de Pharès, fils de Juda, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'fils de Jacob, fils d’Isaac, fils d’Abraham, fils de '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ge 11:10, etc.
    marker-yv: yv-n
  - type: text
    text: 'Thara, fils de Nachor, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'fils de Seruch, fils de Ragau, fils de Phalek, fils d’Éber, fils de Sala, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'fils de Kaïnam, fils d’Arphaxad, fils de Sem, fils de Noé, fils de Lamech, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'fils de Mathusala, fils d’Énoch, fils de Jared, fils de Maléléel, fils de Kaïnan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'fils d’Énos, fils de Seth, fils '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 5:3
      metadata:
        usfm: GEN.5.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: d’Adam, fils de Dieu.
