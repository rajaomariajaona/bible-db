document_id: LUK.17,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Paroles de Jésus sur: — les scandales, — le pardon des offenses, — la puissance de la foi, — les serviteurs inutiles'
  - type: heading
    content: 'V. 1-6: cf. Mt 18:6-9, 21-35. (1 Co 8:9-13; 10:32.) Mc 11:22-26.'
  - type: text
    content: ' '
  - type: note
    content: Mt 18:7. Mc 9:42.
  - type: text
    content: 'Jésus dit à ses disciples: '
  - type: text
    content: Il est impossible qu’il n’arrive pas des scandales; mais malheur à celui par qui ils arrivent!
  '10':
  - type: text
    content: 'Vous de même, quand vous avez fait tout ce qui vous a été ordonné, dites: Nous sommes des serviteurs inutiles, nous avons fait ce que nous devions faire.'
  - type: heading
    content: Les dix lépreux
  - type: heading
    content: 'V. 11-19: cf. Lu 5:12-14. Mt 8:2-4. 2 R 5:1-15.'
  '11':
  - type: text
    content: 'Jésus, se rendant à Jérusalem, passait entre la Samarie et la Galilée. '
  '12':
  - type: text
    content: 'Comme il entrait dans un village, dix lépreux vinrent à sa rencontre. Se tenant à distance, ils élevèrent la voix, et dirent: '
  '13':
  - type: text
    content: 'Jésus, maître, aie pitié de nous! '
  '14':
  - type: text
    content: 'Dès qu’il les eut vus, il leur dit: '
  - type: text
    content: Allez vous montrer
  - type: text
    content: ' '
  - type: note
    content: Lé 13:2; 14:2. Mt 8:4. Lu 5:14.
  - type: text
    content: aux sacrificateurs.
  - type: text
    content: ' Et, pendant qu’ils y allaient, il arriva qu’ils furent guéris. '
  '15':
  - type: text
    content: 'L’un d’eux, se voyant guéri, revint sur ses pas, glorifiant Dieu à haute voix. '
  '16':
  - type: text
    content: 'Il tomba sur sa face aux pieds de Jésus, et lui rendit grâces. C’était un Samaritain. '
  '17':
  - type: text
    content: 'Jésus, prenant la parole, dit: '
  - type: text
    content: Les dix n’ont-ils pas été guéris? Et les neuf autres, où sont-ils?
  '18':
  - type: text
    content: ' '
  - type: text
    content: Ne s’est-il trouvé que cet étranger pour revenir et donner gloire à Dieu?
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Puis il lui dit: '
  - type: text
    content: Lève-toi, va; ta foi t’a sauvé.
  - type: heading
    content: Le royaume de Dieu et l’avènement du Fils de l’homme
  - type: heading
    content: 'V. 20:21: cf. Mc 4:26-29.'
  '2':
  - type: text
    content: ' '
  - type: text
    content: Il vaudrait mieux pour lui qu’on mît à son cou une pierre de moulin et qu’on le jetât dans la mer, que s’il scandalisait un de ces petits.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Les pharisiens demandèrent à Jésus quand viendrait le royaume de Dieu. Il leur répondit: '
  - type: text
    content: Le royaume de Dieu ne vient pas de manière à frapper les regards.
  '21':
  - type: text
    content: ' '
  - type: text
    content: 'On ne dira point:'
  - type: text
    content: ' '
  - type: note
    content: Mt 24:23. Mc 13:21. Lu 21:7, 8.
  - type: text
    content: 'Il est ici, ou: Il est là. Car voici, le royaume de Dieu est au milieu de vous.'
  - type: heading
    content: Exhortation à la vigilance
  - type: heading
    content: 'V. 22-37: cf. Da 9:26. Mt 24:3-42.'
  '22':
  - type: text
    content: 'Et il dit aux disciples: '
  - type: text
    content: Des jours viendront où vous désirerez voir l’un des jours du Fils de l’homme, et vous ne le verrez point.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Mt 24:23. Mc 13:21.
  - type: text
    content: 'On vous dira: Il est ici, il est là. N’y allez pas, ne courez pas après.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: Car, comme l’éclair resplendit et brille d’une extrémité du ciel à l’autre, ainsi sera le Fils de l’homme en son jour.
  - type: text
    content: ' '
  '25':
  - type: note
    content: Mt 16:21; 17:22; 20:18. Mc 8:31; 9:31; 10:33. Lu 9:22; 18:31; 24:6, 7.
  - type: text
    content: Mais il faut auparavant qu’il souffre beaucoup, et qu’il soit rejeté par cette génération.
  - type: text
    content: ' '
  '26':
  - type: note
    content: Ge 6:2; 7:7. Mt 24:37, 38. 1 Pi 3:20.
  - type: text
    content: Ce qui arriva du temps de Noé arrivera de même aux jours du Fils de l’homme.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Les hommes mangeaient, buvaient, se mariaient et mariaient leurs enfants, jusqu’au jour où Noé entra dans l’arche; le déluge vint, et les fit tous périr.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Ce qui arriva du temps de Lot arrivera pareillement. Les hommes mangeaient, buvaient, achetaient, vendaient, plantaient, bâtissaient;
  - type: text
    content: ' '
  '29':
  - type: note
    content: Ge 19:24. De 29:23. És 13:19. Jé 50:40. Os 11:8. Am 4:11. Jud v. 7.
  - type: text
    content: mais le jour où Lot sortit de Sodome, une pluie de feu et de soufre tomba du ciel, et les fit tous périr.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Prenez garde à vous-mêmes.
  - type: text
    content: ' '
  - type: note
    content: Lé 19:17. Pr 17:10. Mt 18:15. Ja 5:19.
  - type: text
    content: Si ton frère a péché, reprends-le; et, s’il se repent, pardonne-lui.
  - type: text
    content: ' '
  '30':
  - type: text
    content: Il en sera de même le jour où le Fils de l’homme paraîtra.
  - type: text
    content: ' '
  '31':
  - type: text
    content: En ce jour-là, que celui qui sera sur le toit, et qui aura ses effets dans la maison, ne descende pas pour les prendre; et que celui qui sera dans les champs ne retourne pas non plus en arrière.
  - type: text
    content: ' '
  '32':
  - type: note
    content: Ge 19:26.
  - type: text
    content: Souvenez-vous de la femme de Lot.
  - type: text
    content: ' '
  '33':
  - type: note
    content: Mt 10:39; 16:25. Mc 8:35. Lu 9:24. Jn 12:25.
  - type: text
    content: Celui qui cherchera à sauver sa vie la perdra, et celui qui la perdra la retrouvera.
  - type: text
    content: ' '
  '34':
  - type: note
    content: Mt 24:40, 41. 1 Th 4:17.
  - type: text
    content: Je vous le dis, en cette nuit-là, de deux personnes qui seront dans un même lit, l’une sera prise et l’autre laissée;
  - type: text
    content: ' '
  '35':
  - type: text
    content: de deux femmes qui moudront ensemble, l’une sera prise et l’autre laissée.
  - type: text
    content: ' '
  '36':
  - type: text
    content: De deux hommes qui seront dans un champ, l’un sera pris et l’autre laissé.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Les disciples lui dirent: '
  - type: note
    content: Job 39:33. Mt 24:28.
  - type: text
    content: 'Où sera-ce, Seigneur? Et il répondit: '
  - type: text
    content: Où sera le corps, là s’assembleront les aigles.
  '4':
  - type: note
    content: Mt 18:21.
  - type: text
    content: 'Et s’il a péché contre toi sept fois dans un jour et que sept fois il revienne à toi, disant: Je me repens, tu lui pardonneras.'
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Les apôtres dirent au Seigneur: Augmente-nous la foi. '
  '6':
  - type: text
    content: 'Et le Seigneur dit: '
  - type: note
    content: Mt 17:20; 21:21. Mc 11:23.
  - type: text
    content: 'Si vous aviez de la foi comme un grain de sénevé, vous diriez à ce sycomore: Déracine-toi, et plante-toi dans la mer; et il vous obéirait.'
  - type: heading
    content: 'V. 7-10: cf. Ro 11:35, 36. Ga 3:10.'
  '7':
  - type: text
    content: ' '
  - type: text
    content: 'Qui de vous, ayant un serviteur qui laboure ou paît les troupeaux, lui dira, quand il revient des champs: Approche vite, et mets-toi à table?'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Ne lui dira-t-il pas au contraire: Prépare-moi à souper, ceins-toi, et sers-moi, jusqu’à ce que j’aie mangé et bu; après cela, toi, tu mangeras et boiras?'
  - type: text
    content: ' '
  '9':
  - type: text
    content: Doit-il de la reconnaissance à ce serviteur parce qu’il a fait ce qui lui était ordonné?
  - type: text
    content: ' '
