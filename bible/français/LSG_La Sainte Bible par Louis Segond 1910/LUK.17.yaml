document_id: LUK.17,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Paroles de Jésus sur: — les scandales, — le pardon des offenses, — la puissance de la foi, — les serviteurs inutiles'
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. Mt 18:6-9, 21-35. (1 Co 8:9-13; 10:32.) Mc 11:22-26.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 18:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 9:42
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus dit à ses disciples: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il est impossible qu’il n’arrive pas des scandales; mais malheur à celui par qui ils arrivent!
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vous de même, quand vous avez fait tout ce qui vous a été ordonné, dites: Nous sommes des serviteurs inutiles, nous avons fait ce que nous devions faire.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les dix lépreux
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-19: cf. Lu 5:12-14. Mt 8:2-4. 2 R 5:1-15.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, se rendant à Jérusalem, passait entre la Samarie et la Galilée. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme il entrait dans un village, dix lépreux vinrent à sa rencontre. Se tenant à distance, ils élevèrent la voix, et dirent: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, maître, aie pitié de nous! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dès qu’il les eut vus, il leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Allez vous montrer
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 13:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 8:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 5:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: aux sacrificateurs.
    - type: text
      text: ' Et, pendant qu’ils y allaient, il arriva qu’ils furent guéris. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’un d’eux, se voyant guéri, revint sur ses pas, glorifiant Dieu à haute voix. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il tomba sur sa face aux pieds de Jésus, et lui rendit grâces. C’était un Samaritain. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, prenant la parole, dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Les dix n’ont-ils pas été guéris? Et les neuf autres, où sont-ils?
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ne s’est-il trouvé que cet étranger pour revenir et donner gloire à Dieu?
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lève-toi, va; ta foi t’a sauvé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le royaume de Dieu et l’avènement du Fils de l’homme
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 20:21: cf. Mc 4:26-29.'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il vaudrait mieux pour lui qu’on mît à son cou une pierre de moulin et qu’on le jetât dans la mer, que s’il scandalisait un de ces petits.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les pharisiens demandèrent à Jésus quand viendrait le royaume de Dieu. Il leur répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le royaume de Dieu ne vient pas de manière à frapper les regards.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'On ne dira point:'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 24:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 13:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 21:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il est ici, ou: Il est là. Car voici, le royaume de Dieu est au milieu de vous.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Exhortation à la vigilance
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-37: cf. Da 9:26. Mt 24:3-42.'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il dit aux disciples: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Des jours viendront où vous désirerez voir l’un des jours du Fils de l’homme, et vous ne le verrez point.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 24:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 13:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'On vous dira: Il est ici, il est là. N’y allez pas, ne courez pas après.'
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car, comme l’éclair resplendit et brille d’une extrémité du ciel à l’autre, ainsi sera le Fils de l’homme en son jour.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 8:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais il faut auparavant qu’il souffre beaucoup, et qu’il soit rejeté par cette génération.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 6:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 24:37
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '38'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 3:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ce qui arriva du temps de Noé arrivera de même aux jours du Fils de l’homme.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Les hommes mangeaient, buvaient, se mariaient et mariaient leurs enfants, jusqu’au jour où Noé entra dans l’arche; le déluge vint, et les fit tous périr.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ce qui arriva du temps de Lot arrivera pareillement. Les hommes mangeaient, buvaient, achetaient, vendaient, plantaient, bâtissaient;
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 19:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 29:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 13:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 50:40
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 11:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 4:11
      - type: text
        text: . Jud v. 7.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: mais le jour où Lot sortit de Sodome, une pluie de feu et de soufre tomba du ciel, et les fit tous périr.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Prenez garde à vous-mêmes.
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 17:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 18:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 5:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si ton frère a péché, reprends-le; et, s’il se repent, pardonne-lui.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il en sera de même le jour où le Fils de l’homme paraîtra.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: En ce jour-là, que celui qui sera sur le toit, et qui aura ses effets dans la maison, ne descende pas pour les prendre; et que celui qui sera dans les champs ne retourne pas non plus en arrière.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 19:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Souvenez-vous de la femme de Lot.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10:39
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 8:35
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 12:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Celui qui cherchera à sauver sa vie la perdra, et celui qui la perdra la retrouvera.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 24:40
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '41'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 4:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous le dis, en cette nuit-là, de deux personnes qui seront dans un même lit, l’une sera prise et l’autre laissée;
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: de deux femmes qui moudront ensemble, l’une sera prise et l’autre laissée.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: De deux hommes qui seront dans un champ, l’un sera pris et l’autre laissé.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les disciples lui dirent: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 39:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 24:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Où sera-ce, Seigneur? Et il répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Où sera le corps, là s’assembleront les aigles.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 18:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Et s’il a péché contre toi sept fois dans un jour et que sept fois il revienne à toi, disant: Je me repens, tu lui pardonneras.'
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les apôtres dirent au Seigneur: Augmente-nous la foi. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et le Seigneur dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 17:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 11:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Si vous aviez de la foi comme un grain de sénevé, vous diriez à ce sycomore: Déracine-toi, et plante-toi dans la mer; et il vous obéirait.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-10: cf. Ro 11:35, 36. Ga 3:10.'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Qui de vous, ayant un serviteur qui laboure ou paît les troupeaux, lui dira, quand il revient des champs: Approche vite, et mets-toi à table?'
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ne lui dira-t-il pas au contraire: Prépare-moi à souper, ceins-toi, et sers-moi, jusqu’à ce que j’aie mangé et bu; après cela, toi, tu mangeras et boiras?'
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Doit-il de la reconnaissance à ce serviteur parce qu’il a fait ce qui lui était ordonné?
    - type: text
      text: ' '
