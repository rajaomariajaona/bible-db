document_id: NUM.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fonctions et revenus des sacrificateurs et des Lévites
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. (No 3. 1 Ch 23:13, 24-32. No 8:14-19.) Ps 65:5.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel dit à Aaron: Toi et tes fils, et la maison de ton père avec toi, vous porterez la peine des iniquités commises dans le sanctuaire; toi et tes fils avec toi, vous porterez la peine des iniquités commises dans l’exercice de votre sacerdoce. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fais aussi approcher de toi tes frères, la tribu de Lévi, la tribu de ton père, afin qu’ils te soient attachés et qu’ils te servent, lorsque toi, et tes fils avec toi, vous serez devant la tente du témoignage. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils observeront ce que tu leur ordonneras et ce qui concerne toute la tente; mais ils ne s’approcheront ni des ustensiles du sanctuaire, ni de l’autel, de peur que vous ne mouriez, eux et vous. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils te seront attachés, et ils observeront ce qui concerne la tente d’assignation pour tout le service de la tente. Aucun étranger n’approchera de vous. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Vous observerez ce qui concerne le sanctuaire et l’autel, afin qu’il n’y ait plus de colère contre les enfants d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Voici, j’ai pris '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 3:45
      metadata:
        usfm: NUM.3.45
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vos frères les Lévites du milieu des enfants d’Israël: donnés à l’Éternel, ils vous sont remis en don pour faire le service de la tente d’assignation. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Toi, et tes fils avec toi, vous observerez les fonctions de votre sacerdoce pour tout ce qui concerne l’autel et pour ce qui est en dedans du voile: c’est le service que vous ferez. Je vous accorde en pur don l’exercice du sacerdoce. L’étranger qui approchera sera mis à mort.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-19: cf. (Lé 7:7-14, 29-36. Éz 44:29, 30.) 1 Co 9:13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L’Éternel dit à Aaron: Voici, de toutes les choses que consacrent les enfants d’Israël, je te donne celles qui me sont offertes par élévation; je te les donne, à toi et à tes fils, comme droit d’onction, par une loi perpétuelle. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voici ce qui t’appartiendra parmi les choses très saintes qui ne sont pas consumées par le feu: toutes leurs offrandes, tous leurs dons, tous leurs sacrifices d’expiation, et tous les sacrifices de culpabilité qu’ils m’offriront; ces choses très saintes seront pour toi et pour tes fils. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Vous les mangerez dans un lieu très saint; tout mâle en mangera; vous les regarderez comme saintes. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voici encore ce qui t’appartiendra: tous les dons que les enfants d’Israël présenteront par élévation et en les agitant de côté et d’autre, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 10:14
      metadata:
        usfm: LEV.10.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je te les donne à toi, à tes fils et à tes filles avec toi, par une loi perpétuelle. Quiconque sera pur dans ta maison en mangera. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je te donne les prémices qu’ils offriront à l’Éternel: tout ce qu’il y aura de meilleur en huile, tout ce qu’il y aura de meilleur en moût et en blé. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les premiers produits de leur terre, qu’ils apporteront à l’Éternel, seront pour toi. Quiconque sera pur dans ta maison en mangera. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 27:28
      metadata:
        usfm: LEV.27.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout ce qui sera dévoué par interdit en Israël sera pour toi. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tout '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:2
      metadata:
        usfm: EXO.13.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:29
      metadata:
        usfm: EXO.22.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 27:26
      metadata:
        usfm: LEV.27.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 3:13
      metadata:
        usfm: NUM.3.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'premier-né de toute chair, qu’ils offriront à l’Éternel, tant des hommes que des animaux, sera pour toi. Seulement, tu feras racheter le premier-né de l’homme, et tu feras racheter le premier-né d’un animal impur. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tu les feras racheter dès l’âge d’un mois, d’après ton estimation, au prix de cinq sicles d’argent, selon le sicle du sanctuaire, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 30:13
      metadata:
        usfm: EXO.30.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 27:25
      metadata:
        usfm: LEV.27.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 3:47
      metadata:
        usfm: NUM.3.47
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 45:12
      metadata:
        usfm: EZK.45.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui est de vingt guéras. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais tu ne feras point racheter le premier-né du bœuf, ni le premier-né de la brebis, ni le premier-né de la chèvre: ce sont des choses saintes. Tu répandras leur sang sur l’autel, et tu brûleras leur graisse: ce sera un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Leur chair sera pour toi, comme la poitrine qu’on agite de côté et d’autre et comme l’épaule droite. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Je te donne, à toi, à tes fils et à tes filles avec toi, par une loi perpétuelle, toutes les offrandes saintes que les enfants d’Israël présenteront à l’Éternel par élévation. C’est une alliance inviolable et à perpétuité devant l’Éternel, pour toi et pour ta postérité avec toi.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-24: cf. (Éz 44:28. Lé 27:30-33.) Né 10:37. Mal 3:8-10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'L’Éternel dit à Aaron: Tu ne posséderas rien dans leur pays, et il n’y aura point de part pour toi au milieu d’eux; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:9
      metadata:
        usfm: DEU.10.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:2
      metadata:
        usfm: DEU.18.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 44:28
      metadata:
        usfm: EZK.44.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'c’est moi qui suis ta part et ta possession, au milieu des enfants d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Je donne comme possession aux fils de Lévi toute dîme en Israël, pour le service qu’ils font, le service de la tente d’assignation. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les enfants d’Israël n’approcheront plus de la tente d’assignation, de peur qu’ils ne se chargent d’un péché et qu’ils ne meurent. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les Lévites feront le service de la tente d’assignation, et ils resteront chargés de leurs iniquités. Ils n’auront point de possession au milieu des enfants d’Israël: ce sera une loi perpétuelle parmi vos descendants. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Je donne comme possession aux Lévites les dîmes que les enfants d’Israël présenteront à l’Éternel par élévation; c’est pourquoi je dis à leur égard: Ils n’auront point de possession au milieu des enfants d’Israël.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 25-32: cf. Né 10:38. 1 Ti 5:17, 18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tu parleras aux Lévites, et tu leur diras: Lorsque vous recevrez des enfants d’Israël la dîme que je vous donne de leur part comme votre possession, vous en prélèverez une offrande pour l’Éternel, une dîme de la dîme; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'et votre offrande vous sera comptée comme le blé qu’on prélève de l’aire et comme le moût qu’on prélève de la cuve. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'C’est ainsi que vous prélèverez une offrande pour l’Éternel sur toutes les dîmes que vous recevrez des enfants d’Israël, et vous donnerez au sacrificateur Aaron l’offrande que vous en aurez prélevée pour l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Sur tous les dons qui vous seront faits, vous prélèverez toutes les offrandes pour l’Éternel; sur tout ce qu’il y aura de meilleur, vous prélèverez la portion consacrée. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tu leur diras: Quand vous en aurez prélevé le meilleur, la dîme sera comptée aux Lévites comme le revenu de l’aire et comme le revenu de la cuve. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Vous la mangerez en un lieu quelconque, vous et votre maison; car c’est votre salaire pour le service que vous faites dans la tente d’assignation. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Vous ne serez chargés pour cela d’aucun péché, quand vous en aurez prélevé le meilleur, vous ne profanerez point les offrandes saintes des enfants d’Israël, et vous ne mourrez point.
