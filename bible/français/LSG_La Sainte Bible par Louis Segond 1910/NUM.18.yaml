document_id: NUM.18,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Fonctions et revenus des sacrificateurs et des Lévites
  - type: heading
    content: 'V. 1-7: cf. (No 3. 1 Ch 23:13, 24-32. No 8:14-19.) Ps 65:5.'
  - type: text
    content: 'L’Éternel dit à Aaron: Toi et tes fils, et la maison de ton père avec toi, vous porterez la peine des iniquités commises dans le sanctuaire; toi et tes fils avec toi, vous porterez la peine des iniquités commises dans l’exercice de votre sacerdoce. '
  '10':
  - type: text
    content: 'Vous les mangerez dans un lieu très saint; tout mâle en mangera; vous les regarderez comme saintes. '
  '11':
  - type: text
    content: 'Voici encore ce qui t’appartiendra: tous les dons que les enfants d’Israël présenteront par élévation et en les agitant de côté et d’autre, '
  - type: note
    content: Lé 10:14.
  - type: text
    content: 'je te les donne à toi, à tes fils et à tes filles avec toi, par une loi perpétuelle. Quiconque sera pur dans ta maison en mangera. '
  '12':
  - type: text
    content: 'Je te donne les prémices qu’ils offriront à l’Éternel: tout ce qu’il y aura de meilleur en huile, tout ce qu’il y aura de meilleur en moût et en blé. '
  '13':
  - type: text
    content: 'Les premiers produits de leur terre, qu’ils apporteront à l’Éternel, seront pour toi. Quiconque sera pur dans ta maison en mangera. '
  '14':
  - type: note
    content: Lé 27:28.
  - type: text
    content: 'Tout ce qui sera dévoué par interdit en Israël sera pour toi. '
  '15':
  - type: text
    content: 'Tout '
  - type: note
    content: Ex 13:2; 22:29. Lé 27:26. No 3:13.
  - type: text
    content: 'premier-né de toute chair, qu’ils offriront à l’Éternel, tant des hommes que des animaux, sera pour toi. Seulement, tu feras racheter le premier-né de l’homme, et tu feras racheter le premier-né d’un animal impur. '
  '16':
  - type: text
    content: 'Tu les feras racheter dès l’âge d’un mois, d’après ton estimation, au prix de cinq sicles d’argent, selon le sicle du sanctuaire, '
  - type: note
    content: Ex 30:13. Lé 27:25. No 3:47. Éz 45:12.
  - type: text
    content: 'qui est de vingt guéras. '
  '17':
  - type: text
    content: 'Mais tu ne feras point racheter le premier-né du bœuf, ni le premier-né de la brebis, ni le premier-né de la chèvre: ce sont des choses saintes. Tu répandras leur sang sur l’autel, et tu brûleras leur graisse: ce sera un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
  '18':
  - type: text
    content: 'Leur chair sera pour toi, comme la poitrine qu’on agite de côté et d’autre et comme l’épaule droite. '
  '19':
  - type: text
    content: Je te donne, à toi, à tes fils et à tes filles avec toi, par une loi perpétuelle, toutes les offrandes saintes que les enfants d’Israël présenteront à l’Éternel par élévation. C’est une alliance inviolable et à perpétuité devant l’Éternel, pour toi et pour ta postérité avec toi.
  - type: heading
    content: 'V. 20-24: cf. (Éz 44:28. Lé 27:30-33.) Né 10:37. Mal 3:8-10.'
  '2':
  - type: text
    content: 'Fais aussi approcher de toi tes frères, la tribu de Lévi, la tribu de ton père, afin qu’ils te soient attachés et qu’ils te servent, lorsque toi, et tes fils avec toi, vous serez devant la tente du témoignage. '
  '20':
  - type: text
    content: 'L’Éternel dit à Aaron: Tu ne posséderas rien dans leur pays, et il n’y aura point de part pour toi au milieu d’eux; '
  - type: note
    content: De 10:9; 18:2. Éz 44:28.
  - type: text
    content: 'c’est moi qui suis ta part et ta possession, au milieu des enfants d’Israël. '
  '21':
  - type: text
    content: 'Je donne comme possession aux fils de Lévi toute dîme en Israël, pour le service qu’ils font, le service de la tente d’assignation. '
  '22':
  - type: text
    content: 'Les enfants d’Israël n’approcheront plus de la tente d’assignation, de peur qu’ils ne se chargent d’un péché et qu’ils ne meurent. '
  '23':
  - type: text
    content: 'Les Lévites feront le service de la tente d’assignation, et ils resteront chargés de leurs iniquités. Ils n’auront point de possession au milieu des enfants d’Israël: ce sera une loi perpétuelle parmi vos descendants. '
  '24':
  - type: text
    content: 'Je donne comme possession aux Lévites les dîmes que les enfants d’Israël présenteront à l’Éternel par élévation; c’est pourquoi je dis à leur égard: Ils n’auront point de possession au milieu des enfants d’Israël.'
  - type: heading
    content: 'V. 25-32: cf. Né 10:38. 1 Ti 5:17, 18.'
  '25':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '26':
  - type: text
    content: 'Tu parleras aux Lévites, et tu leur diras: Lorsque vous recevrez des enfants d’Israël la dîme que je vous donne de leur part comme votre possession, vous en prélèverez une offrande pour l’Éternel, une dîme de la dîme; '
  '27':
  - type: text
    content: 'et votre offrande vous sera comptée comme le blé qu’on prélève de l’aire et comme le moût qu’on prélève de la cuve. '
  '28':
  - type: text
    content: 'C’est ainsi que vous prélèverez une offrande pour l’Éternel sur toutes les dîmes que vous recevrez des enfants d’Israël, et vous donnerez au sacrificateur Aaron l’offrande que vous en aurez prélevée pour l’Éternel. '
  '29':
  - type: text
    content: 'Sur tous les dons qui vous seront faits, vous prélèverez toutes les offrandes pour l’Éternel; sur tout ce qu’il y aura de meilleur, vous prélèverez la portion consacrée. '
  '3':
  - type: text
    content: 'Ils observeront ce que tu leur ordonneras et ce qui concerne toute la tente; mais ils ne s’approcheront ni des ustensiles du sanctuaire, ni de l’autel, de peur que vous ne mouriez, eux et vous. '
  '30':
  - type: text
    content: 'Tu leur diras: Quand vous en aurez prélevé le meilleur, la dîme sera comptée aux Lévites comme le revenu de l’aire et comme le revenu de la cuve. '
  '31':
  - type: text
    content: 'Vous la mangerez en un lieu quelconque, vous et votre maison; car c’est votre salaire pour le service que vous faites dans la tente d’assignation. '
  '32':
  - type: text
    content: Vous ne serez chargés pour cela d’aucun péché, quand vous en aurez prélevé le meilleur, vous ne profanerez point les offrandes saintes des enfants d’Israël, et vous ne mourrez point.
  '4':
  - type: text
    content: 'Ils te seront attachés, et ils observeront ce qui concerne la tente d’assignation pour tout le service de la tente. Aucun étranger n’approchera de vous. '
  '5':
  - type: text
    content: 'Vous observerez ce qui concerne le sanctuaire et l’autel, afin qu’il n’y ait plus de colère contre les enfants d’Israël. '
  '6':
  - type: text
    content: 'Voici, j’ai pris '
  - type: note
    content: No 3:45.
  - type: text
    content: 'vos frères les Lévites du milieu des enfants d’Israël: donnés à l’Éternel, ils vous sont remis en don pour faire le service de la tente d’assignation. '
  '7':
  - type: text
    content: 'Toi, et tes fils avec toi, vous observerez les fonctions de votre sacerdoce pour tout ce qui concerne l’autel et pour ce qui est en dedans du voile: c’est le service que vous ferez. Je vous accorde en pur don l’exercice du sacerdoce. L’étranger qui approchera sera mis à mort.'
  - type: heading
    content: 'V. 8-19: cf. (Lé 7:7-14, 29-36. Éz 44:29, 30.) 1 Co 9:13.'
  '8':
  - type: text
    content: 'L’Éternel dit à Aaron: Voici, de toutes les choses que consacrent les enfants d’Israël, je te donne celles qui me sont offertes par élévation; je te les donne, à toi et à tes fils, comme droit d’onction, par une loi perpétuelle. '
  '9':
  - type: text
    content: 'Voici ce qui t’appartiendra parmi les choses très saintes qui ne sont pas consumées par le feu: toutes leurs offrandes, tous leurs dons, tous leurs sacrifices d’expiation, et tous les sacrifices de culpabilité qu’ils m’offriront; ces choses très saintes seront pour toi et pour tes fils. '
