document_id: 1CO.2
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. 1 Co 1:17-25. 2 Co 4:5-7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Pour moi, frères, lorsque je suis allé chez vous, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:17
      metadata:
        usfm: 1CO.1.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:4
      metadata:
        usfm: 1CO.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ce n’est pas avec une supériorité de langage ou de sagesse que je suis allé vous annoncer le témoignage de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Car je n’ai pas eu la pensée de savoir parmi vous autre chose que Jésus-Christ, et Jésus-Christ crucifié. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 18:1
      metadata:
        usfm: ACT.18.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Moi-même j’étais auprès de vous '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 18:3
      metadata:
        usfm: ACT.18.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 10:10
      metadata:
        usfm: 2CO.10.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dans un état de faiblesse, de crainte, et de grand tremblement; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et ma parole et ma prédication '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:17
      metadata:
        usfm: 1CO.1.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:1
      metadata:
        usfm: 1CO.2.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 1:16
      metadata:
        usfm: 2PE.1.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ne reposaient pas sur les discours persuasifs de la sagesse, mais sur une démonstration d’Esprit et de puissance, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'afin que votre foi fût fondée, non sur la sagesse des hommes, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 4:7
      metadata:
        usfm: 2CO.4.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: mais sur la puissance de Dieu.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-16: cf. Ép 3:2-11. Jn 16:13-15. 1 Jn 2:20, 27. 1 Th 5:21.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 28:21
      metadata:
        usfm: JOB.28.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Cependant, c’est une sagesse que nous prêchons parmi les parfaits, sagesse qui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 3:15
      metadata:
        usfm: JAS.3.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'n’est pas de ce siècle, ni des chefs de ce siècle, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:24
      metadata:
        usfm: 1CO.15.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui vont être anéantis; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'nous prêchons la sagesse '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 16:25
      metadata:
        usfm: ROM.16.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 4:1
      metadata:
        usfm: 1CO.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mystérieuse et cachée, que Dieu, avant les siècles, avait destinée pour notre gloire, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'sagesse '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 11:25
      metadata:
        usfm: MAT.11.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:48
      metadata:
        usfm: JHN.7.48
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 13:27
      metadata:
        usfm: ACT.13.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 3:14
      metadata:
        usfm: 2CO.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’aucun des chefs de ce siècle n’a connue, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 16:3
      metadata:
        usfm: JHN.16.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 3:17
      metadata:
        usfm: ACT.3.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:27
      metadata:
        usfm: ACT.13.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:13
      metadata:
        usfm: 1TI.1.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car, s’ils l’eussent connue, ils n’auraient pas crucifié le Seigneur de gloire. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais, comme il est écrit, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 64:3
      metadata:
        usfm: ISA.64.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ce sont des choses que l’œil n’a point vues, que l’oreille n’a point entendues, et qui ne sont point montées au cœur de l’homme, des choses que Dieu a préparées pour ceux qui l’aiment. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:11
      metadata:
        usfm: MAT.13.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 3:18
      metadata:
        usfm: 2CO.3.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dieu nous les a révélées par l’Esprit. Car l’Esprit sonde tout, même les profondeurs de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 27:19
      metadata:
        usfm: PRO.27.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 17:9
      metadata:
        usfm: JER.17.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lequel des hommes, en effet, connaît les choses de l’homme, si ce n’est l’esprit de l’homme qui est en lui? De même, personne ne connaît les choses de Dieu, si ce n’est l’Esprit de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Or nous, nous n’avons pas reçu l’esprit du monde, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:15
      metadata:
        usfm: ROM.8.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais l’Esprit qui vient de Dieu, afin que nous connaissions les choses que Dieu nous a données par sa grâce. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et nous en parlons, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:17
      metadata:
        usfm: 1CO.1.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:4
      metadata:
        usfm: 1CO.2.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 1:16
      metadata:
        usfm: 2PE.1.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'non avec des discours qu’enseigne la sagesse humaine, mais avec ceux qu’enseigne l’Esprit, employant un langage spirituel pour les choses spirituelles. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais l’homme animal ne reçoit pas les choses de l’Esprit de Dieu, car elles sont une folie pour lui, et il ne peut les connaître, parce que c’est spirituellement qu’on en juge. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 28:5
      metadata:
        usfm: PRO.28.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’homme spirituel, au contraire, juge de tout, et il n’est lui-même jugé par personne. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 40:13
      metadata:
        usfm: ISA.40.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:34
      metadata:
        usfm: ROM.11.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a connu la pensée du Seigneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour l’instruire?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or nous, nous avons la pensée de Christ.
