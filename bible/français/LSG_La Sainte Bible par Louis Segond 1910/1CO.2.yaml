document_id: 1CO.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-5: cf. 1 Co 1:17-25. 2 Co 4:5-7.'
  - type: text
    content: 'Pour moi, frères, lorsque je suis allé chez vous, '
  - type: note
    content: 1 Co 1:17; 2:4.
  - type: text
    content: 'ce n’est pas avec une supériorité de langage ou de sagesse que je suis allé vous annoncer le témoignage de Dieu. '
  '10':
  - type: note
    content: Mt 13:11. 2 Co 3:18.
  - type: text
    content: 'Dieu nous les a révélées par l’Esprit. Car l’Esprit sonde tout, même les profondeurs de Dieu. '
  '11':
  - type: note
    content: Pr 27:19. Jé 17:9.
  - type: text
    content: 'Lequel des hommes, en effet, connaît les choses de l’homme, si ce n’est l’esprit de l’homme qui est en lui? De même, personne ne connaît les choses de Dieu, si ce n’est l’Esprit de Dieu. '
  '12':
  - type: text
    content: 'Or nous, nous n’avons pas reçu l’esprit du monde, '
  - type: note
    content: Ro 8:15.
  - type: text
    content: 'mais l’Esprit qui vient de Dieu, afin que nous connaissions les choses que Dieu nous a données par sa grâce. '
  '13':
  - type: text
    content: 'Et nous en parlons, '
  - type: note
    content: 1 Co 1:17; 2:4. 2 Pi 1:16.
  - type: text
    content: 'non avec des discours qu’enseigne la sagesse humaine, mais avec ceux qu’enseigne l’Esprit, employant un langage spirituel pour les choses spirituelles. '
  '14':
  - type: text
    content: 'Mais l’homme animal ne reçoit pas les choses de l’Esprit de Dieu, car elles sont une folie pour lui, et il ne peut les connaître, parce que c’est spirituellement qu’on en juge. '
  '15':
  - type: note
    content: Pr 28:5.
  - type: text
    content: 'L’homme spirituel, au contraire, juge de tout, et il n’est lui-même jugé par personne. '
  '16':
  - type: note
    content: És 40:13. Ro 11:34.
  - type: text
    content: Car
  - type: text
    content: Qui a connu la pensée du Seigneur,
  - type: text
    content: Pour l’instruire?
  - type: text
    content: Or nous, nous avons la pensée de Christ.
  '2':
  - type: text
    content: 'Car je n’ai pas eu la pensée de savoir parmi vous autre chose que Jésus-Christ, et Jésus-Christ crucifié. '
  '3':
  - type: note
    content: Ac 18:1.
  - type: text
    content: 'Moi-même j’étais auprès de vous '
  - type: note
    content: Ac 18:3. 2 Co 10:10.
  - type: text
    content: 'dans un état de faiblesse, de crainte, et de grand tremblement; '
  '4':
  - type: text
    content: 'et ma parole et ma prédication '
  - type: note
    content: 1 Co 1:17; 2:1. 2 Pi 1:16.
  - type: text
    content: 'ne reposaient pas sur les discours persuasifs de la sagesse, mais sur une démonstration d’Esprit et de puissance, '
  '5':
  - type: text
    content: 'afin que votre foi fût fondée, non sur la sagesse des hommes, '
  - type: note
    content: 2 Co 4:7.
  - type: text
    content: mais sur la puissance de Dieu.
  - type: heading
    content: 'V. 6-16: cf. Ép 3:2-11. Jn 16:13-15. 1 Jn 2:20, 27. 1 Th 5:21.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: Job 28:21.
  - type: text
    content: 'Cependant, c’est une sagesse que nous prêchons parmi les parfaits, sagesse qui '
  - type: note
    content: Ja 3:15.
  - type: text
    content: 'n’est pas de ce siècle, ni des chefs de ce siècle, '
  - type: note
    content: 1 Co 15:24.
  - type: text
    content: 'qui vont être anéantis; '
  '7':
  - type: text
    content: 'nous prêchons la sagesse '
  - type: note
    content: Ro 16:25.
  - type: text
    content: 'de Dieu, '
  - type: note
    content: 1 Co 4:1.
  - type: text
    content: 'mystérieuse et cachée, que Dieu, avant les siècles, avait destinée pour notre gloire, '
  '8':
  - type: text
    content: 'sagesse '
  - type: note
    content: Mt 11:25. Jn 7:48. Ac 13:27. 2 Co 3:14.
  - type: text
    content: 'qu’aucun des chefs de ce siècle n’a connue, '
  - type: note
    content: Jn 16:3. Ac 3:17; 13:27. 1 Ti 1:13.
  - type: text
    content: 'car, s’ils l’eussent connue, ils n’auraient pas crucifié le Seigneur de gloire. '
  '9':
  - type: text
    content: 'Mais, comme il est écrit, '
  - type: note
    content: És 64:3.
  - type: text
    content: 'ce sont des choses que l’œil n’a point vues, que l’oreille n’a point entendues, et qui ne sont point montées au cœur de l’homme, des choses que Dieu a préparées pour ceux qui l’aiment. '
