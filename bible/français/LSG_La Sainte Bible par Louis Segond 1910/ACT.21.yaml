document_id: ACT.21,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. Ps 87:4. Ac 20:36-38.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nous nous embarquâmes, après nous être séparés d’eux, et nous allâmes directement à Cos, le lendemain à Rhodes, et de là à Patara. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Comme nous étions là depuis plusieurs jours, un prophète, nommé '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 11:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Agabus, descendit de Judée, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'et vint nous trouver. Il prit la ceinture de Paul, se lia les pieds et les mains, et dit: Voici ce que déclare le Saint-Esprit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 20:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'L’homme à qui appartient cette ceinture, les Juifs le lieront de la même manière à Jérusalem, et le livreront entre les mains des païens. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Quand nous entendîmes cela, nous et ceux de l’endroit, nous priâmes Paul de ne pas monter à Jérusalem. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Alors il répondit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 20:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Que faites-vous, en pleurant et en me brisant le cœur? Je suis prêt, non seulement à être lié, mais encore à mourir à Jérusalem pour le nom du Seigneur Jésus. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Comme il ne se laissait pas persuader, nous n’insistâmes pas, et nous dîmes: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 6:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 11:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:42
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Que la volonté du Seigneur se fasse! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Après ces jours-là, nous fîmes nos préparatifs, et nous montâmes à Jérusalem. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Quelques disciples de Césarée vinrent aussi avec nous, et nous conduisirent chez un nommé Mnason, de l’île de Chypre, ancien disciple, chez qui nous devions loger.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul à Jérusalem. Entrée dans le temple avec quatre Juifs ayant fait un vœu
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-26: cf. Ro 15:1, 2. 1 Co 9:19-23.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Lorsque nous arrivâmes à Jérusalem, les frères nous reçurent avec joie. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Le lendemain, Paul se rendit avec nous chez Jacques, et tous les anciens s’y réunirent. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Après les avoir salués, il raconta en détail ce que Dieu avait fait au milieu des païens par son ministère. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Et ayant trouvé un navire qui faisait la traversée vers la Phénicie, nous montâmes et partîmes. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Quand ils l’eurent entendu, ils glorifièrent Dieu. Puis ils lui dirent: Tu vois, frère, combien de milliers de Juifs ont cru, et tous sont zélés pour la loi. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Or, ils ont appris que tu enseignes à tous les Juifs qui sont parmi les païens à renoncer à Moïse, leur disant de ne pas circoncire les enfants et de ne pas se conformer aux coutumes. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Que faire donc? Sans aucun doute la multitude se rassemblera, car on saura que tu es venu. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'C’est pourquoi fais ce que nous allons te dire. Il y a parmi nous quatre hommes qui ont fait un vœu; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'prends-les avec toi, purifie-toi avec eux, et pourvois à leur dépense, afin qu’ils se rasent la tête. Et ainsi tous sauront que ce qu’ils ont entendu dire sur ton compte est faux, mais que toi aussi tu te conduis en observateur de la loi. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'A l’égard des païens qui ont cru, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 15:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'nous avons décidé et nous leur avons écrit qu’ils eussent à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 8:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 's’abstenir des viandes sacrifiées aux idoles, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 9:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'du sang, des animaux étouffés, et de l’impudicité. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 24:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Alors Paul prit ces hommes, se purifia, et entra le lendemain dans le temple avec eux, pour annoncer à quel jour la purification serait accomplie et l’offrande présentée pour chacun d’eux.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Émeute provoquée par des Juifs d’Asie. Paul saisi et maltraité par le peuple. Intervention du tribun et des soldats. Arrestation de Paul
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 27-36: cf. Ac 20:23; 24:5-19. Ro 15:30, 31. 1 Th 2:15, 16.'
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Sur la fin des sept jours, les Juifs d’Asie, ayant vu Paul dans le temple, soulevèrent toute la foule, et mirent la main sur lui, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'en criant: Hommes Israélites, au secours! Voici l’homme qui prêche partout et à tout le monde contre le peuple, contre la loi et contre ce lieu; il a même introduit des Grecs dans le temple, et a profané ce saint lieu. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Car ils avaient vu auparavant '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 20:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 4:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Trophime d’Éphèse avec lui dans la ville, et ils croyaient que Paul l’avait fait entrer dans le temple. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Quand nous fûmes en vue de l’île de Chypre, nous la laissâmes à gauche, poursuivant notre route du côté de la Syrie, et nous abordâmes à Tyr, où le bâtiment devait décharger sa cargaison. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Toute la ville fut émue, et le peuple accourut de toutes parts. Ils se saisirent de Paul, et le traînèrent hors du temple, dont les portes furent aussitôt fermées. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Comme ils cherchaient à le tuer, le bruit vint au tribun de la cohorte que tout Jérusalem était en confusion. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'A l’instant il prit des soldats et des centeniers, et courut à eux. Voyant le tribun et les soldats, ils cessèrent de frapper Paul. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 21:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors le tribun s’approcha, se saisit de lui, et le fit lier de deux chaînes. Puis il demanda qui il était, et ce qu’il avait fait. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Mais dans la foule les uns criaient d’une manière, les autres d’une autre; ne pouvant donc rien apprendre de certain, à cause du tumulte, il ordonna de le mener dans la forteresse. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Lorsque Paul fut sur les degrés, il dut être porté par les soldats, à cause de la violence de la foule; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'car la multitude du peuple suivait, en criant: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 19:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 22:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Fais-le mourir!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Discours de Paul, debout sur les degrés de la forteresse
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 37-40: cf. Ac 26:1. Mt 10:19, 20.'
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Au moment d’être introduit dans la forteresse, Paul dit au tribun: M’est-il permis de te dire quelque chose? Le tribun répondit: Tu sais le grec? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Tu n’es donc pas cet Égyptien qui s’est révolté dernièrement, et qui a emmené dans le désert quatre mille brigands? '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Je suis Juif, reprit Paul, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 9:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '30'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'de Tarse en Cilicie, citoyen d’une ville qui n’est pas sans importance. Permets-moi, je te prie, de parler au peuple. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nous trouvâmes les disciples, et nous restâmes là sept jours. Les disciples, poussés par l’Esprit, disaient à Paul '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 20:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'de ne pas monter à Jérusalem. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Le tribun le lui ayant permis, Paul, debout sur les degrés, fit signe de la main au peuple. Un profond silence s’établit, et Paul, parlant en langue hébraïque, dit:'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mais, lorsque nous fûmes au terme des sept jours, nous nous acheminâmes pour partir, et tous nous accompagnèrent avec leurs femmes et leurs enfants jusque hors de la ville. Nous nous mîmes à genoux sur le rivage, et nous priâmes. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Puis, ayant pris congé les uns des autres, nous montâmes sur le navire, et ils retournèrent chez eux.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'À Ptolémaïs. À Césarée: prédiction d’Agabus. Arrivée à Jérusalem'
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-16: cf. Ac 8:5, 40; 2:16-18; 20:22-24.'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Achevant notre navigation, nous allâmes de Tyr à Ptolémaïs, où nous saluâmes les frères, et passâmes un jour avec eux. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nous partîmes le lendemain, et nous arrivâmes à Césarée. Étant entrés dans la maison de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 6:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Philippe l’évangéliste, qui était l’un des sept, nous logeâmes chez lui. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il avait quatre filles vierges '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 2:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui prophétisaient. '
