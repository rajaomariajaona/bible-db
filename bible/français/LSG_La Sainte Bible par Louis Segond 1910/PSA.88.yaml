document_id: PSA.88
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: La 3:1-20. (Ps 6; 39; 89:39, etc.; 102:1-13.)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique. Psaume des fils de Koré. Au chef des chantres. Pour chanter sur la flûte. Cantique d’Héman, l’Ezrachite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Éternel, Dieu de mon salut!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je crie jour et nuit devant toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Que ma prière parvienne en ta présence!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prête l’oreille à mes supplications!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car mon âme est rassasiée de maux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ma vie s’approche du séjour des morts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je suis mis au rang de ceux qui descendent dans la fosse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis comme un homme qui n’a plus de force.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je suis étendu parmi les morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Semblable à ceux qui sont tués et couchés dans le sépulcre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A ceux dont tu n’as plus le souvenir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui sont séparés de ta main.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu m’as jeté dans une fosse profonde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans les ténèbres, dans les abîmes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ta fureur s’appesantit sur moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et tu m’accables de tous tes flots. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tu as éloigné de moi mes amis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu m’as rendu pour eux un objet d’horreur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis enfermé et je ne puis sortir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mes yeux se consument dans la souffrance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’invoque tous les jours, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’étends vers toi les mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Est-ce pour les morts que tu fais des miracles?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Les morts se lèvent-ils pour te louer? '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Parle-t-on de ta bonté dans le sépulcre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De ta fidélité dans l’abîme?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tes prodiges sont-ils connus dans les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ta justice dans la terre de l’oubli?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: O Éternel! J’implore ton secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le matin ma prière s’élève à toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Pourquoi, Éternel, repousses-tu mon âme?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi me caches-tu ta face?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Je suis malheureux et moribond dès ma jeunesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis chargé de tes terreurs, je suis troublé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tes fureurs passent sur moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes terreurs m’anéantissent;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Elles m’environnent tout le jour comme des eaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles m’enveloppent toutes à la fois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tu as éloigné de moi amis et compagnons;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes intimes ont disparu.
