document_id: PSA.88,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La 3:1-20. (Ps 6; 39; 89:39, etc.; 102:1-13.)
  - type: text
    content: Cantique. Psaume des fils de Koré. Au chef des chantres. Pour chanter sur la flûte. Cantique d’Héman, l’Ezrachite.
  '10':
  - type: text
    content: Mes yeux se consument dans la souffrance;
  - type: text
    content: Je t’invoque tous les jours, ô Éternel!
  - type: text
    content: J’étends vers toi les mains.
  '11':
  - type: text
    content: Est-ce pour les morts que tu fais des miracles?
  - type: text
    content: 'Les morts se lèvent-ils pour te louer? '
  - type: text
    content: — Pause.
  '12':
  - type: text
    content: Parle-t-on de ta bonté dans le sépulcre,
  - type: text
    content: De ta fidélité dans l’abîme?
  '13':
  - type: text
    content: Tes prodiges sont-ils connus dans les ténèbres,
  - type: text
    content: Et ta justice dans la terre de l’oubli?
  '14':
  - type: text
    content: O Éternel! J’implore ton secours,
  - type: text
    content: Et le matin ma prière s’élève à toi.
  '15':
  - type: text
    content: Pourquoi, Éternel, repousses-tu mon âme?
  - type: text
    content: Pourquoi me caches-tu ta face?
  '16':
  - type: text
    content: Je suis malheureux et moribond dès ma jeunesse,
  - type: text
    content: Je suis chargé de tes terreurs, je suis troublé.
  '17':
  - type: text
    content: Tes fureurs passent sur moi,
  - type: text
    content: Tes terreurs m’anéantissent;
  '18':
  - type: text
    content: Elles m’environnent tout le jour comme des eaux,
  - type: text
    content: Elles m’enveloppent toutes à la fois.
  '19':
  - type: text
    content: Tu as éloigné de moi amis et compagnons;
  - type: text
    content: Mes intimes ont disparu.
  '2':
  - type: text
    content: Éternel, Dieu de mon salut!
  - type: text
    content: Je crie jour et nuit devant toi.
  '3':
  - type: text
    content: Que ma prière parvienne en ta présence!
  - type: text
    content: Prête l’oreille à mes supplications!
  '4':
  - type: text
    content: Car mon âme est rassasiée de maux,
  - type: text
    content: Et ma vie s’approche du séjour des morts.
  '5':
  - type: text
    content: Je suis mis au rang de ceux qui descendent dans la fosse,
  - type: text
    content: Je suis comme un homme qui n’a plus de force.
  '6':
  - type: text
    content: Je suis étendu parmi les morts,
  - type: text
    content: Semblable à ceux qui sont tués et couchés dans le sépulcre,
  - type: text
    content: A ceux dont tu n’as plus le souvenir,
  - type: text
    content: Et qui sont séparés de ta main.
  '7':
  - type: text
    content: Tu m’as jeté dans une fosse profonde,
  - type: text
    content: Dans les ténèbres, dans les abîmes.
  '8':
  - type: text
    content: Ta fureur s’appesantit sur moi,
  - type: text
    content: 'Et tu m’accables de tous tes flots. '
  - type: text
    content: — Pause.
  '9':
  - type: text
    content: Tu as éloigné de moi mes amis,
  - type: text
    content: Tu m’as rendu pour eux un objet d’horreur;
  - type: text
    content: Je suis enfermé et je ne puis sortir.
