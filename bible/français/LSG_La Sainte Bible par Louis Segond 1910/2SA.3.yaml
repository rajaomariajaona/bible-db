document_id: 2SA.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-5: cf. 1 Ch 3:1-4. Pr 4:18.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La guerre dura longtemps entre la maison de Saül et la maison de David. David devenait de plus en plus fort, et la maison de Saül allait en s’affaiblissant. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'en disant qu’il ferait passer la royauté de la maison de Saül dans la sienne, et qu’il établirait le trône de David sur Israël et sur Juda depuis Dan jusqu’à Beer-Schéba. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isch-Boscheth n’osa pas répliquer un seul mot à Abner, parce qu’il le craignait. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abner envoya des messagers à David pour lui dire de sa part: A qui est le pays? Fais alliance avec moi, et voici, ma main t’aidera pour tourner vers toi tout Israël. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il répondit: Bien! Je ferai alliance avec toi; mais je te demande une chose, c’est que tu ne voies point ma face, à moins que tu n’amènes d’abord Mical, fille de Saül, en venant auprès de moi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et David envoya des messagers à Isch-Boscheth, fils de Saül, pour lui dire: Donne-moi ma femme Mical, que j’ai fiancée '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 18:25
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '27'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pour cent prépuces de Philistins. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isch-Boscheth la fit prendre chez son mari '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 25:44
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Palthiel, fils de Laïsch. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et son mari la suivit en pleurant jusqu’à Bachurim. Alors Abner lui dit: Va, retourne-t’en! Et il s’en retourna. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abner eut un entretien avec les anciens d’Israël, et leur dit: Vous désiriez autrefois d’avoir David pour roi; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'établissez-le maintenant, car l’Éternel a dit de lui: C’est par David, mon serviteur, que je délivrerai mon peuple d’Israël de la main des Philistins et de la main de tous ses ennemis. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abner parla aussi à Benjamin, et il alla rapporter aux oreilles de David à Hébron ce qu’avaient résolu Israël et toute la maison de Benjamin. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il naquit à David '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Ch 3:1, etc.
      marker-yv: yv-n
    - type: text
      text: 'des fils à Hébron. Son premier-né fut Amnon, d’Achinoam de Jizreel; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il arriva auprès de David à Hébron, accompagné de vingt hommes; et David fit un festin à Abner et à ceux qui étaient avec lui. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abner dit à David: Je me lèverai, et je partirai pour rassembler tout Israël vers mon seigneur le roi; ils feront alliance avec toi, et tu règneras entièrement selon ton désir. David renvoya Abner, qui s’en alla en paix.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-27: cf. 2 S 2:19-23; 20:4-10. Ps 120:6, 7.'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici, Joab et les gens de David revinrent d’une excursion, et amenèrent avec eux un grand butin. Abner n’était plus auprès de David à Hébron, car David l’avait renvoyé, et il s’en était allé en paix. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Joab et toute sa troupe arrivèrent, on fit à Joab ce rapport: Abner, fils de Ner, est venu auprès du roi, qui l’a renvoyé, et il s’en est allé en paix. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joab se rendit chez le roi, et dit: Qu’as-tu fait? Voici, Abner est venu vers toi; pourquoi l’as-tu renvoyé et laissé partir? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu connais Abner, fils de Ner! C’est pour te tromper qu’il est venu, pour épier tes démarches, et pour savoir tout ce que tu fais. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Joab, après avoir quitté David, envoya sur les traces d’Abner des messagers, qui le ramenèrent depuis la citerne de Sira: David n’en savait rien. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Abner fut de retour à Hébron, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 2:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Joab le tira à l’écart au milieu de la porte, comme pour lui parler en secret, et là il le frappa au ventre et le tua, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 2:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: pour venger la mort d’Asaël, son frère.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 28-39: cf. 2 S 1:17, etc. 1 R 2:5, 6, 28-34. Ps 55:24.'
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David l’apprit ensuite, et il dit: Je suis à jamais innocent, devant l’Éternel, du sang d’Abner, fils de Ner, et mon royaume l’est aussi. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que ce sang retombe sur Joab et sur toute la maison de son père! Qu’il y ait toujours quelqu’un dans la maison de Joab, qui soit atteint d’un flux ou de la lèpre, ou qui s’appuie sur un bâton, ou qui tombe par l’épée, ou qui manque de pain! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le second, Kileab, d’Abigaïl de Carmel, femme de Nabal; le troisième, Absalom, fils de Maaca, fille de Talmaï, roi de Gueschur; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi Joab et Abischaï, son frère, tuèrent Abner, parce qu’il avait donné la mort à Asaël, leur frère, à Gabaon, dans la bataille. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David dit à Joab et à tout le peuple qui était avec lui: Déchirez vos vêtements, ceignez-vous de sacs, et pleurez devant Abner! Et le roi David marcha derrière le cercueil. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On enterra Abner à Hébron. Le roi éleva la voix et pleura sur le sépulcre d’Abner, et tout le peuple pleura. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi fit une complainte sur Abner, et dit: Abner devait-il mourir comme meurt un criminel? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu n’avais ni les mains liées, ni les pieds dans les chaînes! Tu es tombé comme on tombe devant des méchants. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et tout le peuple pleura de nouveau sur Abner. Tout le peuple s’approcha de David pour lui faire prendre quelque nourriture, pendant qu’il était encore jour; mais David jura, en disant: Que Dieu me traite dans toute sa rigueur, si je goûte du pain ou quoi que ce soit avant le coucher du soleil! '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cela fut connu et approuvé de tout le peuple, qui trouva bon tout ce qu’avait fait le roi. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout le peuple et tout Israël comprirent en ce jour que ce n’était pas par ordre du roi qu’Abner, fils de Ner, avait été tué. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi dit à ses serviteurs: Ne savez-vous pas qu’un chef, qu’un grand homme, est tombé aujourd’hui en Israël? '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je suis encore faible, quoique j’aie reçu l’onction royale; et ces gens, les fils de Tseruja, sont trop puissants pour moi. Que l’Éternel rende selon sa méchanceté à celui qui fait le mal!
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le quatrième, Adonija, fils de Haggith; le cinquième, Schephathia, fils d’Abithal; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et le sixième, Jithream, d’Égla, femme de David. Ce sont là ceux qui naquirent à David à Hébron.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abner, chef de l’armée d’Isch-Boscheth, tué par Joab, chef de l’armée de David. —Assassinat d’Isch-Boscheth
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-21: cf. 2 S 2:8, 9. (Jg 9:23. Pr 16:7, 9.) Ps 89:21-24.'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant la guerre entre la maison de Saül et la maison de David, Abner tint ferme pour la maison de Saül. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or Saül avait eu une concubine, nommée '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 S 21:8, 10, 11, etc.
      marker-yv: yv-n
    - type: text
      text: 'Ritspa, fille d’Ajja. Et Isch-Boscheth dit à Abner: Pourquoi es-tu venu vers la concubine de mon père? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abner fut très irrité des paroles d’Isch-Boscheth, et il répondit: Suis-je une tête de chien, qui tienne pour Juda? Je fais aujourd’hui preuve de bienveillance envers la maison de Saül, ton père, envers ses frères et ses amis, je ne t’ai pas livré entre les mains de David, et c’est aujourd’hui que tu me reproches une faute avec cette femme? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que Dieu traite Abner dans toute sa rigueur, si je n’agis pas avec David selon ce que l’Éternel a juré à David, '
