document_id: ISA.51,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La délivrance et le retour
  - type: heading
    content: 'V. 1-8: cf. (És 49:18-20. Éz 36:33-35.) (És 42:1-6; 45:22-25.) Ps 103:15-18.'
  - type: text
    content: Écoutez-moi, vous qui poursuivez la justice,
  - type: text
    content: Qui cherchez l’Éternel!
  - type: text
    content: Portez les regards sur le rocher d’où vous avez été taillés,
  - type: text
    content: Sur le creux de la fosse d’où vous avez été tirés.
  '10':
  - type: text
    content: N’est-ce pas toi qui mis à sec la mer,
  - type: text
    content: Les eaux du grand abîme,
  - type: note
    content: És 43:16.
  - type: text
    content: Qui frayas dans les profondeurs de la mer
  - type: text
    content: Un chemin pour le passage des rachetés?
  '11':
  - type: text
    content: Ainsi les rachetés de l’Éternel retourneront,
  - type: text
    content: Ils iront à Sion avec chants de triomphe,
  - type: text
    content: Et une joie éternelle couronnera leur tête;
  - type: text
    content: L’allégresse et la joie s’approcheront,
  - type: text
    content: La douleur et les gémissements s’enfuiront.
  '12':
  - type: text
    content: C’est moi, c’est moi qui vous console.
  - type: text
    content: 'Qui es-tu, pour avoir peur de '
  - type: note
    content: Ps 118:6, v. 7.
  - type: text
    content: l’homme mortel,
  - type: text
    content: Et du fils de l’homme, pareil à l’herbe?
  '13':
  - type: text
    content: Et tu oublierais l’Éternel, qui t’a fait,
  - type: note
    content: Job 9:8. Ps 104:2. És 40:22; 42:5; 44:24.
  - type: text
    content: Qui a étendu les cieux et fondé la terre!
  - type: text
    content: Et tu tremblerais incessamment tout le jour
  - type: text
    content: Devant la colère de l’oppresseur,
  - type: text
    content: Parce qu’il cherche à détruire!
  - type: text
    content: Où donc est la colère de l’oppresseur?
  '14':
  - type: text
    content: Bientôt celui qui est courbé sous les fers sera délivré;
  - type: text
    content: Il ne mourra pas dans la fosse,
  - type: text
    content: Et son pain ne lui manquera pas.
  '15':
  - type: text
    content: Je suis l’Éternel, ton Dieu,
  - type: text
    content: Qui soulève la mer et fais mugir ses flots.
  - type: text
    content: L’Éternel des armées est son nom.
  '16':
  - type: text
    content: Je mets mes paroles dans ta bouche,
  - type: text
    content: Et je te couvre de l’ombre de ma main,
  - type: text
    content: Pour étendre de nouveaux cieux et fonder une nouvelle terre,
  - type: text
    content: 'Et pour dire à Sion: Tu es mon peuple!'
  - type: heading
    content: 'V. 17-23: cf. Jé 50:17, etc. Ps 129.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: És 52:1.
  - type: text
    content: Réveille-toi, réveille-toi! Lève-toi, Jérusalem,
  - type: text
    content: Qui as bu de la main de l’Éternel la coupe de sa colère,
  - type: text
    content: Qui as bu, sucé jusqu’à la lie la coupe d’étourdissement!
  '18':
  - type: text
    content: Il n’y en a aucun pour la conduire
  - type: text
    content: De tous les fils qu’elle a enfantés,
  - type: text
    content: Il n’y en a aucun pour la prendre par la main
  - type: text
    content: De tous les fils qu’elle a élevés.
  '19':
  - type: text
    content: ' '
  - type: note
    content: És 47:9.
  - type: text
    content: 'Ces deux choses te sont arrivées:'
  - type: text
    content: Qui te plaindra?
  - type: text
    content: Le ravage et la ruine, la famine et l’épée.
  - type: text
    content: Qui suis-je pour te consoler?
  '2':
  - type: text
    content: Portez les regards sur Abraham votre père,
  - type: text
    content: Et sur Sara qui vous a enfantés;
  - type: text
    content: Car lui seul je l’ai appelé,
  - type: text
    content: Je l’ai béni et multiplié.
  '20':
  - type: text
    content: ' '
  - type: note
    content: La 2:11, 12.
  - type: text
    content: Tes fils en défaillance gisaient à tous les coins de rues,
  - type: text
    content: Comme le cerf dans un filet,
  - type: text
    content: Chargés de la colère de l’Éternel,
  - type: text
    content: Des menaces de ton Dieu.
  '21':
  - type: text
    content: C’est pourquoi, écoute ceci, malheureuse,
  - type: text
    content: Ivre, mais non de vin!
  '22':
  - type: text
    content: Ainsi parle ton Seigneur, l’Éternel,
  - type: text
    content: 'Ton Dieu, qui défend son peuple:'
  - type: text
    content: Voici, je prends de ta main la coupe d’étourdissement,
  - type: text
    content: La coupe de ma colère;
  - type: text
    content: Tu ne la boiras plus!
  '23':
  - type: text
    content: Je la mettrai dans la main de tes oppresseurs,
  - type: text
    content: 'Qui te disaient: Courbe-toi, et nous passerons!'
  - type: text
    content: Tu faisais alors de ton dos comme une terre,
  - type: text
    content: Comme une rue pour les passants.
  '3':
  - type: text
    content: Ainsi l’Éternel a pitié de Sion,
  - type: text
    content: Il a pitié de toutes ses ruines;
  - type: text
    content: Il rendra son désert semblable à un Éden,
  - type: text
    content: Et sa terre aride à un jardin de l’Éternel.
  - type: text
    content: La joie et l’allégresse se trouveront au milieu d’elle,
  - type: text
    content: Les actions de grâces et le chant des cantiques.
  '4':
  - type: text
    content: Mon peuple, sois attentif!
  - type: text
    content: Ma nation, prête-moi l’oreille!
  - type: text
    content: Car la loi sortira de moi,
  - type: text
    content: Et j’établirai ma loi pour être la lumière des peuples.
  '5':
  - type: text
    content: Ma justice est proche, mon salut va paraître,
  - type: text
    content: Et mes bras jugeront les peuples;
  - type: text
    content: Les îles espéreront en moi,
  - type: text
    content: Elles se confieront en mon bras.
  '6':
  - type: text
    content: Levez les yeux vers le ciel, et regardez en bas sur la terre!
  - type: text
    content: Car les cieux s’évanouiront comme une fumée,
  - type: text
    content: La terre tombera en lambeaux comme un vêtement,
  - type: text
    content: Et ses habitants périront comme des mouches;
  - type: text
    content: Mais mon salut durera éternellement,
  - type: text
    content: Et ma justice n’aura point de fin.
  '7':
  - type: text
    content: Écoutez-moi, vous qui connaissez la justice,
  - type: text
    content: 'Peuple, '
  - type: note
    content: Ps 37:31.
  - type: text
    content: qui as ma loi dans ton cœur!
  - type: note
    content: Ps 118:6. v. 12.
  - type: text
    content: Ne craignez pas l’opprobre des hommes,
  - type: text
    content: Et ne tremblez pas devant leurs outrages.
  '8':
  - type: text
    content: 'Car '
  - type: note
    content: És 50:9.
  - type: text
    content: la teigne les dévorera comme un vêtement,
  - type: text
    content: Et la gerce les rongera comme de la laine;
  - type: text
    content: Mais ma justice durera éternellement,
  - type: text
    content: Et mon salut s’étendra d’âge en âge.
  - type: heading
    content: 'V. 9-16: cf. Ps 74:12-23. (És 35:3, 4, 10; 65:17-19.)'
  '9':
  - type: text
    content: Réveille-toi, réveille-toi! Revêts-toi de force, bras de l’Éternel!
  - type: text
    content: Réveille-toi, comme aux jours d’autrefois,
  - type: text
    content: Dans les anciens âges!
  - type: text
    content: N’est-ce pas toi qui abattis l’Égypte,
  - type: text
    content: Qui transperças le monstre?
