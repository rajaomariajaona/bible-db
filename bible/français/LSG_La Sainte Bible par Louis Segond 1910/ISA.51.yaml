document_id: ISA.51,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La délivrance et le retour
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. (És 49:18-20. Éz 36:33-35.) (És 42:1-6; 45:22-25.) Ps 103:15-18.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Écoutez-moi, vous qui poursuivez la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui cherchez l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Portez les regards sur le rocher d’où vous avez été taillés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur le creux de la fosse d’où vous avez été tirés.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: N’est-ce pas toi qui mis à sec la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les eaux du grand abîme,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 43:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui frayas dans les profondeurs de la mer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un chemin pour le passage des rachetés?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ainsi les rachetés de l’Éternel retourneront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils iront à Sion avec chants de triomphe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et une joie éternelle couronnera leur tête;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’allégresse et la joie s’approcheront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La douleur et les gémissements s’enfuiront.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: C’est moi, c’est moi qui vous console.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qui es-tu, pour avoir peur de '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps 118:6, v. 7.
      marker-yv: yv-n
    - type: text
      text: l’homme mortel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et du fils de l’homme, pareil à l’herbe?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Et tu oublierais l’Éternel, qui t’a fait,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 9:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 104:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 40:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 42:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 44:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui a étendu les cieux et fondé la terre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu tremblerais incessamment tout le jour
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant la colère de l’oppresseur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’il cherche à détruire!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où donc est la colère de l’oppresseur?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Bientôt celui qui est courbé sous les fers sera délivré;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne mourra pas dans la fosse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et son pain ne lui manquera pas.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Je suis l’Éternel, ton Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui soulève la mer et fais mugir ses flots.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel des armées est son nom.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Je mets mes paroles dans ta bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je te couvre de l’ombre de ma main,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour étendre de nouveaux cieux et fonder une nouvelle terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et pour dire à Sion: Tu es mon peuple!'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-23: cf. Jé 50:17, etc. Ps 129.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 52:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Réveille-toi, réveille-toi! Lève-toi, Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui as bu de la main de l’Éternel la coupe de sa colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui as bu, sucé jusqu’à la lie la coupe d’étourdissement!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Il n’y en a aucun pour la conduire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De tous les fils qu’elle a enfantés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y en a aucun pour la prendre par la main
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De tous les fils qu’elle a élevés.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 47:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ces deux choses te sont arrivées:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui te plaindra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le ravage et la ruine, la famine et l’épée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui suis-je pour te consoler?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Portez les regards sur Abraham votre père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sur Sara qui vous a enfantés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car lui seul je l’ai appelé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je l’ai béni et multiplié.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: La 2:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tes fils en défaillance gisaient à tous les coins de rues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme le cerf dans un filet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chargés de la colère de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des menaces de ton Dieu.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: C’est pourquoi, écoute ceci, malheureuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ivre, mais non de vin!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ainsi parle ton Seigneur, l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ton Dieu, qui défend son peuple:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je prends de ta main la coupe d’étourdissement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La coupe de ma colère;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne la boiras plus!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Je la mettrai dans la main de tes oppresseurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qui te disaient: Courbe-toi, et nous passerons!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu faisais alors de ton dos comme une terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme une rue pour les passants.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ainsi l’Éternel a pitié de Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a pitié de toutes ses ruines;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il rendra son désert semblable à un Éden,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa terre aride à un jardin de l’Éternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La joie et l’allégresse se trouveront au milieu d’elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les actions de grâces et le chant des cantiques.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mon peuple, sois attentif!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma nation, prête-moi l’oreille!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la loi sortira de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’établirai ma loi pour être la lumière des peuples.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ma justice est proche, mon salut va paraître,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mes bras jugeront les peuples;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les îles espéreront en moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles se confieront en mon bras.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Levez les yeux vers le ciel, et regardez en bas sur la terre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car les cieux s’évanouiront comme une fumée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre tombera en lambeaux comme un vêtement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses habitants périront comme des mouches;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais mon salut durera éternellement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ma justice n’aura point de fin.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Écoutez-moi, vous qui connaissez la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Peuple, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 37:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: qui as ma loi dans ton cœur!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 118:6
      - type: text
        text: . v. 12.
      marker-yv: yv-n
    - type: text
      text: Ne craignez pas l’opprobre des hommes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne tremblez pas devant leurs outrages.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Car '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 50:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: la teigne les dévorera comme un vêtement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la gerce les rongera comme de la laine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ma justice durera éternellement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon salut s’étendra d’âge en âge.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-16: cf. Ps 74:12-23. (És 35:3, 4, 10; 65:17-19.)'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Réveille-toi, réveille-toi! Revêts-toi de force, bras de l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réveille-toi, comme aux jours d’autrefois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les anciens âges!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’est-ce pas toi qui abattis l’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui transperças le monstre?
