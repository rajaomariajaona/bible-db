document_id: 2TI.2
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. 1 Co 9:24-27. (2 Ti 3:10-12; 4:5-8. Ap 2:10. Mt 10:32, 33.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Toi donc, mon enfant, fortifie-toi dans la grâce qui est en Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et ce que tu as entendu de moi en présence de beaucoup de témoins, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 1:5
      metadata:
        usfm: TIT.1.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'confie-le à des hommes fidèles, qui soient capables de l’enseigner aussi à d’autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Souffre avec moi, comme un bon soldat de Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 9:25
      metadata:
        usfm: 1CO.9.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il n’est pas de soldat qui s’embarrasse des affaires de la vie, s’il veut plaire à celui qui l’a enrôlé; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et l’athlète n’est pas couronné, s’il n’a combattu suivant les règles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 9:10
      metadata:
        usfm: 1CO.9.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il faut que le laboureur travaille avant de recueillir les fruits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Comprends ce que je dis, car le Seigneur te donnera de l’intelligence en toutes choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Souviens-toi de Jésus-Christ, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:12
      metadata:
        usfm: 2SA.7.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 132:11
      metadata:
        usfm: PSA.132.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 11:1
      metadata:
        usfm: ISA.11.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 1:1
      metadata:
        usfm: MAT.1.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 2:30
      metadata:
        usfm: ACT.2.30
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:23
      metadata:
        usfm: ACT.13.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:3
      metadata:
        usfm: ROM.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'issu de la postérité de David, ressuscité des morts, selon mon Évangile, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 3:13
      metadata:
        usfm: EPH.3.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:24
      metadata:
        usfm: COL.1.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour lequel je souffre jusqu’à être '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 3:1
      metadata:
        usfm: EPH.3.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:1
      metadata:
        usfm: EPH.4.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 1:7
      metadata:
        usfm: PHP.1.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 4:3
      metadata:
        usfm: COL.4.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: COL.4.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 1:8
      metadata:
        usfm: 2TI.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'lié comme un malfaiteur. Mais la parole de Dieu n’est pas liée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C’est pourquoi je supporte tout à cause des élus, afin qu’eux aussi obtiennent le salut qui est en Jésus-Christ, avec la gloire éternelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Cette parole est certaine: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 6:8
      metadata:
        usfm: ROM.6.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si nous sommes morts avec lui, nous vivrons aussi avec lui; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:17
      metadata:
        usfm: ROM.8.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 4:10
      metadata:
        usfm: 2CO.4.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 3:10
      metadata:
        usfm: PHP.3.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:13
      metadata:
        usfm: 1PE.4.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'si nous persévérons, nous régnerons aussi avec lui; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:33
      metadata:
        usfm: MAT.10.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 8:38
      metadata:
        usfm: MRK.8.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:26
      metadata:
        usfm: LUK.9.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:9
      metadata:
        usfm: LUK.12.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'si nous le renions, lui aussi nous reniera; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 23:19
      metadata:
        usfm: NUM.23.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 3:3
      metadata:
        usfm: ROM.3.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:6
      metadata:
        usfm: ROM.9.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: si nous sommes infidèles, il demeure fidèle, car il ne peut se renier lui-même.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conduite à tenir à l’égard de ceux qui s’écartent de la saine doctrine et de la pureté chrétienne
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-21: cf. (1 Ti 1:3-7, 18-20; 6:20, 21.) Tit 2:1, 11-15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rappelle ces choses, en conjurant devant Dieu qu’on évite les disputes de mots, qui ne servent qu’à la ruine de ceux qui écoutent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Efforce-toi de te présenter devant Dieu comme un homme éprouvé, un ouvrier qui n’a point à rougir, qui dispense droitement la parole de la vérité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:4
      metadata:
        usfm: 1TI.1.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:7
      metadata:
        usfm: 1TI.4.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:20
      metadata:
        usfm: 1TI.6.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 1:14
      metadata:
        usfm: TIT.1.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:9
      metadata:
        usfm: TIT.3.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Évite les discours vains et profanes; car ceux qui les tiennent avanceront toujours plus dans l’impiété, et leur parole rongera comme la gangrène. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'De ce nombre sont Hyménée et Philète, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'qui se sont détournés de la vérité, disant que la résurrection est déjà arrivée, et qui renversent la foi de quelques uns. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Néanmoins, le solide fondement de Dieu reste debout, avec ces paroles qui lui servent de sceau: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 10:14
      metadata:
        usfm: JHN.10.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le Seigneur connaît ceux qui lui appartiennent; et: Quiconque prononce le nom du Seigneur, qu’il s’éloigne de l’iniquité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:21
      metadata:
        usfm: ROM.9.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dans une grande maison, il n’y a pas seulement des vases d’or et d’argent, mais il y en a aussi de bois et de terre; les uns sont des vases d’honneur, et les autres sont d’un usage vil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Si donc quelqu’un se conserve pur, en s’abstenant de ces choses, il sera un vase d’honneur, sanctifié, utile à son maître, propre à toute bonne œuvre.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-26: cf. Tit 1:7-9. Ja 5:19, 20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 6:11
      metadata:
        usfm: 1TI.6.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fuis les passions de la jeunesse, et recherche la justice, la foi, la charité, la paix, avec ceux qui invoquent le Seigneur d’un cœur pur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:4
      metadata:
        usfm: 1TI.1.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:4
      metadata:
        usfm: 1TI.6.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 3:9
      metadata:
        usfm: TIT.3.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Repousse les discussions folles et inutiles, sachant qu’elles font naître des querelles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Or, il ne faut pas qu’un serviteur du Seigneur ait des querelles; il doit, au contraire, avoir de la condescendance pour tous, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 3:2
      metadata:
        usfm: 1TI.3.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'être propre à enseigner, doué de patience; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 6:1
      metadata:
        usfm: GAL.6.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il doit redresser avec douceur les adversaires, dans l’espérance que Dieu leur donnera la repentance pour arriver à la connaissance de la vérité, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: et que, revenus à leur bon sens, ils se dégageront des pièges du diable, qui s’est emparé d’eux pour les soumettre à sa volonté.
