document_id: 2TI.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-13: cf. 1 Co 9:24-27. (2 Ti 3:10-12; 4:5-8. Ap 2:10. Mt 10:32, 33.)'
  - type: text
    content: 'Toi donc, mon enfant, fortifie-toi dans la grâce qui est en Jésus-Christ. '
  '10':
  - type: text
    content: 'C’est pourquoi je supporte tout à cause des élus, afin qu’eux aussi obtiennent le salut qui est en Jésus-Christ, avec la gloire éternelle. '
  '11':
  - type: text
    content: 'Cette parole est certaine: '
  - type: note
    content: Ro 6:8.
  - type: text
    content: 'Si nous sommes morts avec lui, nous vivrons aussi avec lui; '
  '12':
  - type: note
    content: Ro 8:17. 2 Co 4:10. Ph 3:10. 1 Pi 4:13.
  - type: text
    content: 'si nous persévérons, nous régnerons aussi avec lui; '
  - type: note
    content: Mt 10:33. Mc 8:38. Lu 9:26; 12:9.
  - type: text
    content: 'si nous le renions, lui aussi nous reniera; '
  '13':
  - type: note
    content: No 23:19. Ro 3:3; 9:6.
  - type: text
    content: si nous sommes infidèles, il demeure fidèle, car il ne peut se renier lui-même.
  - type: heading
    content: Conduite à tenir à l’égard de ceux qui s’écartent de la saine doctrine et de la pureté chrétienne
  - type: heading
    content: 'V. 14-21: cf. (1 Ti 1:3-7, 18-20; 6:20, 21.) Tit 2:1, 11-15.'
  '14':
  - type: text
    content: 'Rappelle ces choses, en conjurant devant Dieu qu’on évite les disputes de mots, qui ne servent qu’à la ruine de ceux qui écoutent. '
  '15':
  - type: text
    content: 'Efforce-toi de te présenter devant Dieu comme un homme éprouvé, un ouvrier qui n’a point à rougir, qui dispense droitement la parole de la vérité. '
  '16':
  - type: note
    content: 1 Ti 1:4; 4:7; 6:20. Tit 1:14; 3:9.
  - type: text
    content: 'Évite les discours vains et profanes; car ceux qui les tiennent avanceront toujours plus dans l’impiété, et leur parole rongera comme la gangrène. '
  '17':
  - type: text
    content: 'De ce nombre sont Hyménée et Philète, '
  '18':
  - type: text
    content: 'qui se sont détournés de la vérité, disant que la résurrection est déjà arrivée, et qui renversent la foi de quelques uns. '
  '19':
  - type: text
    content: 'Néanmoins, le solide fondement de Dieu reste debout, avec ces paroles qui lui servent de sceau: '
  - type: note
    content: Jn 10:14.
  - type: text
    content: 'Le Seigneur connaît ceux qui lui appartiennent; et: Quiconque prononce le nom du Seigneur, qu’il s’éloigne de l’iniquité. '
  '2':
  - type: text
    content: 'Et ce que tu as entendu de moi en présence de beaucoup de témoins, '
  - type: note
    content: Tit 1:5.
  - type: text
    content: 'confie-le à des hommes fidèles, qui soient capables de l’enseigner aussi à d’autres. '
  '20':
  - type: note
    content: Ro 9:21.
  - type: text
    content: 'Dans une grande maison, il n’y a pas seulement des vases d’or et d’argent, mais il y en a aussi de bois et de terre; les uns sont des vases d’honneur, et les autres sont d’un usage vil. '
  '21':
  - type: text
    content: Si donc quelqu’un se conserve pur, en s’abstenant de ces choses, il sera un vase d’honneur, sanctifié, utile à son maître, propre à toute bonne œuvre.
  - type: heading
    content: 'V. 22-26: cf. Tit 1:7-9. Ja 5:19, 20.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 1 Ti 6:11.
  - type: text
    content: 'Fuis les passions de la jeunesse, et recherche la justice, la foi, la charité, la paix, avec ceux qui invoquent le Seigneur d’un cœur pur. '
  '23':
  - type: note
    content: 1 Ti 1:4; 6:4. Tit 3:9.
  - type: text
    content: 'Repousse les discussions folles et inutiles, sachant qu’elles font naître des querelles. '
  '24':
  - type: text
    content: 'Or, il ne faut pas qu’un serviteur du Seigneur ait des querelles; il doit, au contraire, avoir de la condescendance pour tous, '
  - type: note
    content: 1 Ti 3:2.
  - type: text
    content: 'être propre à enseigner, doué de patience; '
  '25':
  - type: note
    content: Ga 6:1.
  - type: text
    content: 'il doit redresser avec douceur les adversaires, dans l’espérance que Dieu leur donnera la repentance pour arriver à la connaissance de la vérité, '
  '26':
  - type: text
    content: et que, revenus à leur bon sens, ils se dégageront des pièges du diable, qui s’est emparé d’eux pour les soumettre à sa volonté.
  '3':
  - type: text
    content: 'Souffre avec moi, comme un bon soldat de Jésus-Christ. '
  '4':
  - type: note
    content: 1 Co 9:25.
  - type: text
    content: 'Il n’est pas de soldat qui s’embarrasse des affaires de la vie, s’il veut plaire à celui qui l’a enrôlé; '
  '5':
  - type: text
    content: 'et l’athlète n’est pas couronné, s’il n’a combattu suivant les règles. '
  '6':
  - type: note
    content: 1 Co 9:10.
  - type: text
    content: 'Il faut que le laboureur travaille avant de recueillir les fruits. '
  '7':
  - type: text
    content: 'Comprends ce que je dis, car le Seigneur te donnera de l’intelligence en toutes choses. '
  '8':
  - type: text
    content: 'Souviens-toi de Jésus-Christ, '
  - type: note
    content: 2 S 7:12. Ps 132:11. És 11:1. Mt 1:1. Ac 2:30; 13:23. Ro 1:3.
  - type: text
    content: 'issu de la postérité de David, ressuscité des morts, selon mon Évangile, '
  '9':
  - type: note
    content: Ép 3:13. Col 1:24.
  - type: text
    content: 'pour lequel je souffre jusqu’à être '
  - type: note
    content: Ép 3:1; 4:1. Ph 1:7. Col 4:3, 18. 2 Ti 1:8.
  - type: text
    content: 'lié comme un malfaiteur. Mais la parole de Dieu n’est pas liée. '
