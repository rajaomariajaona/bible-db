document_id: GEN.3
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le serpent était le plus rusé de tous les animaux des champs, que l’Éternel Dieu avait faits. Il dit à la femme: Dieu a-t-il réellement dit: Vous ne mangerez pas de tous les arbres du jardin? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La femme répondit au serpent: Nous mangeons du fruit des arbres du jardin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais quant au fruit de l’arbre qui est au milieu du jardin, Dieu a dit: Vous n’en mangerez point et vous n’y toucherez point, de peur que vous ne mouriez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors le serpent dit '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:3
      metadata:
        usfm: 2CO.11.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à la femme: Vous ne mourrez point; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'mais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 8:44
      metadata:
        usfm: JHN.8.44
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dieu sait que, le jour où vous en mangerez, vos yeux s’ouvriront, et que vous serez comme des dieux, connaissant le bien et le mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'La femme vit que l’arbre était bon à manger et agréable à la vue, et qu’il était précieux pour ouvrir l’intelligence; elle prit de son fruit, et en mangea; elle en donna aussi à son mari, qui était auprès d’elle, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ro 5:12, 14, 15, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 2:14
      metadata:
        usfm: 1TI.2.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: et il en mangea.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-24: cf. Ja 1:13-15. (Ro 5:12-21; 8:20-22.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les yeux de l’un et de l’autre s’ouvrirent, ils connurent qu’ils étaient '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 2:25
      metadata:
        usfm: GEN.2.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nus, et ayant cousu des feuilles de figuier, ils s’en firent des ceintures. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors ils entendirent la voix de l’Éternel Dieu, qui parcourait le jardin vers le soir, et l’homme et sa femme se cachèrent loin de la face de l’Éternel Dieu, au milieu des arbres du jardin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais l’Éternel Dieu appela l’homme, et lui dit: Où es-tu? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il répondit: J’ai entendu ta voix dans le jardin, et j’ai eu peur, parce que je suis nu, et je me suis caché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et l’Éternel Dieu dit: Qui t’a appris que tu es nu? Est-ce que tu as mangé de l’arbre dont je t’avais défendu de manger? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’homme répondit: La femme que tu as mise auprès de moi m’a donné de l’arbre, et j’en ai mangé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et l’Éternel Dieu dit à la femme: Pourquoi as-tu fait cela? La femme répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 12:13
      metadata:
        usfm: REV.12.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le serpent m’a séduite, et j’en ai mangé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L’Éternel Dieu dit au serpent: Puisque tu as fait cela, tu seras maudit entre tout le bétail et entre tous les animaux des champs, tu marcheras sur ton ventre, et tu mangeras de la poussière tous les jours de ta vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Je mettrai '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 4:1
      metadata:
        usfm: MAT.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'inimitié entre toi et la femme, entre ta postérité et sa postérité: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 2:15
      metadata:
        usfm: COL.2.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'celle-ci t’écrasera la tête, et tu lui blesseras le talon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il dit à la femme: J’augmenterai la souffrance de tes grossesses, tu enfanteras avec douleur, et tes désirs se porteront vers ton mari, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 14:34
      metadata:
        usfm: 1CO.14.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 2:11
      metadata:
        usfm: 1TI.2.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: 1TI.2.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 2:5
      metadata:
        usfm: TIT.2.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:6
      metadata:
        usfm: 1PE.3.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais il dominera sur toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il dit à l’homme: Puisque tu as écouté la voix de ta femme, et que tu as mangé de l’arbre au sujet duquel je t’avais donné cet ordre: Tu n’en mangeras point! Le sol sera maudit à cause de toi. C’est à force de peine que tu en tireras ta nourriture tous les jours de ta vie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'il te produira des épines et des ronces, et tu mangeras de l’herbe des champs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'C’est à la sueur de ton visage que tu mangeras du pain, jusqu’à ce que tu retournes dans la terre, d’où tu as été pris; car tu es poussière, et tu retourneras dans la poussière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Adam donna à sa femme le nom d’Ève: car elle a été la mère de tous les vivants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L’Éternel Dieu fit à Adam et à sa femme des habits de peau, et il les en revêtit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L’Éternel Dieu dit: Voici, l’homme est devenu comme l’un de nous, pour la connaissance du bien et du mal. Empêchons-le maintenant d’avancer sa main, de prendre de l’arbre de vie, d’en manger, et de vivre éternellement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et l’Éternel Dieu le chassa du jardin d’Éden, pour qu’il cultivât la terre, d’où il avait été pris. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: C’est ainsi qu’il chassa Adam; et il mit à l’orient du jardin d’Éden les chérubins qui agitent une épée flamboyante, pour garder le chemin de l’arbre de vie.
