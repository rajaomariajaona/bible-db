      metadata:
        usfm: JOB.15.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: juste devant Dieu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Comment celui qui est né de la femme '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 15:14
      metadata:
        usfm: JOB.15.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: serait-il pur?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voici, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 15:15
      metadata:
        usfm: JOB.15.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: la lune même n’est pas brillante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les étoiles ne sont pas pures à ses yeux;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
