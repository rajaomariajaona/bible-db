    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: JOB.4.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:14
      metadata:
        usfm: JOB.15.14
    - type: text
      text: ', '
    - type: usfm
