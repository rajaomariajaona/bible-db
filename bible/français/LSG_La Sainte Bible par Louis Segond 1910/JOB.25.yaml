  - type: text
    text: Troisième discours de Bildad à Job
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. Job 4:17-21; 15:14-16.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Bildad de Schuach prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: La puissance et la terreur appartiennent à Dieu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fait régner la paix dans ses hautes régions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ses armées ne sont-elles pas innombrables?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur qui sa lumière ne se lève-t-elle pas?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Comment l’homme serait-il '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 4:17
      metadata:
