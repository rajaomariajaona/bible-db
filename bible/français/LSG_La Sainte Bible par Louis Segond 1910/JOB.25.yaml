document_id: JOB.25,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Troisième discours de Bildad à Job
  - type: heading
    content: 'V. 1-6: cf. Job 4:17-21; 15:14-16.'
  - type: text
    content: 'Bildad de Schuach prit la parole et dit:'
  '2':
  - type: text
    content: La puissance et la terreur appartiennent à Dieu;
  - type: text
    content: Il fait régner la paix dans ses hautes régions.
  '3':
  - type: text
    content: Ses armées ne sont-elles pas innombrables?
  - type: text
    content: Sur qui sa lumière ne se lève-t-elle pas?
  '4':
  - type: text
    content: 'Comment l’homme serait-il '
  - type: note
    content: Job 4:17, 18, 19; 15:14, 15, 16.
  - type: text
    content: juste devant Dieu?
  - type: text
    content: 'Comment celui qui est né de la femme '
  - type: note
    content: Job 15:14.
  - type: text
    content: serait-il pur?
  '5':
  - type: text
    content: 'Voici, '
  - type: note
    content: Job 15:15.
  - type: text
    content: la lune même n’est pas brillante,
  - type: text
    content: Et les étoiles ne sont pas pures à ses yeux;
  '6':
  - type: text
    content: ' '
  - type: note
    content: Job 4:19. Ps 22:7.
  - type: text
    content: Combien moins l’homme, qui n’est qu’un ver,
  - type: text
    content: Le fils de l’homme, qui n’est qu’un vermisseau!
