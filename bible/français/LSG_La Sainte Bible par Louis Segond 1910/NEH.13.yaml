document_id: NEH.13,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zèle de Néhémie contre les transgresseurs de la loi
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. De 23:3-6. Ps 101:8. Jn 2:17.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans ce temps, on lut en présence du peuple dans le livre de Moïse, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 23:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'l’on y trouva écrit que l’Ammonite et le Moabite ne devraient jamais entrer dans l’assemblée de Dieu, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’appris aussi que les portions des Lévites n’avaient point été livrées, et que les Lévites et les chantres chargés du service s’étaient enfuis chacun dans son territoire. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je fis des réprimandes aux magistrats, et je dis: Pourquoi la maison de Dieu a-t-elle été abandonnée? Et je rassemblai les Lévites et les chantres, et je les remis à leur poste. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors tout Juda apporta dans les magasins la dîme du blé, du moût et de l’huile. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je confiai la surveillance des magasins à Schélémia, le sacrificateur, à Tsadok, le scribe, et à Pedaja, l’un des Lévites, et je leur adjoignis Hanan, fils de Zaccur, fils de Matthania, car ils avaient la réputation d’être fidèles. Ils furent chargés de faire les distributions à leurs frères. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Souviens-toi de moi, ô mon Dieu, à cause de cela, et n’oublie pas mes actes de piété à l’égard de la maison de mon Dieu et des choses qui doivent être observées!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 15-22: cf. Jé 17:19-27. Mi 3:8.'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cette époque, je vis en Juda des hommes fouler au pressoir pendant le sabbat, rentrer des gerbes, charger sur des ânes même du vin, des raisins et des figues, et toutes sortes de choses, et les amener à Jérusalem le jour du sabbat; et je leur donnai des avertissements le jour où ils vendaient leurs denrées. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait aussi des Tyriens, établis à Jérusalem, qui apportaient du poisson et toutes sortes de marchandises, et qui les vendaient aux fils de Juda le jour du sabbat et dans Jérusalem. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je fis des réprimandes aux grands de Juda, et je leur dis: Que signifie cette mauvaise action que vous faites, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'en profanant le jour du sabbat? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'N’est-ce pas ainsi qu’ont agi vos pères, et n’est-ce pas à cause de cela que notre Dieu a fait venir tous ces malheurs sur nous et sur cette ville? Et vous, vous attirez de nouveau sa colère contre Israël, en profanant le sabbat! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis j’ordonnai qu’on fermât les portes de Jérusalem avant le sabbat, dès qu’elles seraient dans l’ombre, et qu’on ne les ouvrît qu’après le sabbat. Et je plaçai quelques-uns de mes serviteurs aux portes, pour empêcher l’entrée des fardeaux le jour du sabbat. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'parce qu’ils n’étaient pas venus au-devant des enfants d’Israël avec du pain et de l’eau, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 22:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 24:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'parce qu’ils avaient appelé contre eux à prix d’argent Balaam pour qu’il les maudît; mais notre Dieu changea la malédiction en bénédiction. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les marchands et les vendeurs de toutes sortes de choses passèrent une ou deux fois la nuit hors de Jérusalem. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je les avertis, en leur disant: Pourquoi passez-vous la nuit devant la muraille? Si vous le faites encore, je mettrai la main sur vous. Dès ce moment, ils ne vinrent plus pendant le sabbat. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’ordonnai aussi aux Lévites de se purifier et de venir garder les portes pour sanctifier le jour du sabbat. Souviens-toi de moi, ô mon Dieu, à cause de cela, et protège-moi selon ta grande miséricorde!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 23-31: cf. Esd 9; 10. 2 Co 6:14.'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cette même époque, je vis des Juifs qui avaient pris des femmes asdodiennes, ammonites, moabites. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La moitié de leurs fils parlaient l’asdodien, et ne savaient pas parler le juif; ils ne connaissaient que la langue de tel ou tel peuple. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je leur fis des réprimandes, et je les maudis; j’en frappai quelques-uns, je leur arrachai les cheveux, et je les fis jurer au nom de Dieu, en disant: Vous ne donnerez pas vos filles à leurs fils, et vous ne prendrez leurs filles ni pour vos fils ni pour vous. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 11:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'N’est-ce pas en cela qu’a péché Salomon, roi d’Israël? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 3:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 1:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il n’y avait point de roi semblable à lui parmi la multitude des nations, il était aimé de son Dieu, et Dieu l’avait établi roi sur tout Israël; néanmoins, les femmes étrangères l’entraînèrent aussi dans le péché. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faut-il donc apprendre à votre sujet que vous commettez un aussi grand crime et que vous péchez contre notre Dieu en prenant des femmes étrangères? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un des fils de Jojada, fils d’Éliaschib, le souverain sacrificateur, était gendre de Sanballat, le Horonite. Je le chassai loin de moi. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Souviens-toi d’eux, ô mon Dieu, car ils ont souillé le sacerdoce et l’alliance contractée par les sacrificateurs et les Lévites. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’on eut entendu la loi, on sépara d’Israël tous les étrangers. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je les purifiai de tout étranger, et je remis en vigueur ce que devaient observer les sacrificateurs et les Lévites, chacun dans sa fonction, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et ce qui concernait l’offrande du bois aux époques fixées, de même que les prémices. Souviens-toi favorablement de moi, ô mon Dieu!
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avant cela, le sacrificateur Éliaschib, établi dans les chambres de la maison de notre Dieu, et parent de Tobija, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avait disposé pour lui une grande chambre où l’on mettait auparavant les offrandes, l’encens, les ustensiles, la dîme du blé, du moût et de l’huile, ce qui était ordonné pour les Lévites, les chantres et les portiers, et ce qui était prélevé pour les sacrificateurs. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je n’étais point à Jérusalem quand tout cela eut lieu, car j’étais retourné auprès du roi la trente-deuxième année d’Artaxerxès, roi de Babylone. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A la fin de l’année, j’obtins du roi la permission de revenir à Jérusalem, et je m’aperçus du mal qu’avait fait Éliaschib, en disposant une chambre pour Tobija dans les parvis de la maison de Dieu. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’en éprouvai un vif déplaisir, et je jetai hors de la chambre tous les objets qui appartenaient à Tobija; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: j’ordonnai qu’on purifiât les chambres, et j’y replaçai les ustensiles de la maison de Dieu, les offrandes et l’encens.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-14: cf. 2 Ch 31:4-15. Ps 69:10.'
    marker-yv: yv-h
