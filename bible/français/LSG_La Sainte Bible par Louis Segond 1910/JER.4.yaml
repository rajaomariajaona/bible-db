document_id: JER.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-4: cf. Jé 3:22, 23. Os 10:12. Éz 18:20-32.'
  - type: text
    content: Israël, si tu reviens, si tu reviens à moi, dit l’Éternel,
  - type: text
    content: Si tu ôtes tes abominations de devant moi,
  - type: text
    content: Tu ne seras plus errant.
  '10':
  - type: text
    content: 'Je dis: Ah! Seigneur Éternel!'
  - type: text
    content: 'Tu as donc trompé ce peuple et Jérusalem, en disant:'
  - type: text
    content: Vous aurez la paix!
  - type: text
    content: Et cependant l’épée menace leur vie.
  '11':
  - type: text
    content: 'En ce temps-là, il sera dit à ce peuple et à Jérusalem:'
  - type: text
    content: Un vent brûlant souffle des lieux élevés du désert
  - type: text
    content: Sur le chemin de la fille de mon peuple,
  - type: text
    content: Non pour vanner ni pour nettoyer le grain.
  '12':
  - type: text
    content: C’est un vent impétueux qui vient de là jusqu’à moi.
  - type: text
    content: Maintenant, je prononcerai leur sentence.
  '13':
  - type: text
    content: Voici, le destructeur s’avance comme les nuées;
  - type: text
    content: Ses chars sont comme un tourbillon,
  - type: text
    content: Ses chevaux sont plus légers que les aigles.
  - type: text
    content: Malheur à nous, car nous sommes détruits!
  '14':
  - type: text
    content: ' '
  - type: note
    content: És 1:16.
  - type: text
    content: Purifie ton cœur du mal, Jérusalem,
  - type: text
    content: Afin que tu sois sauvée!
  - type: text
    content: Jusques à quand garderas-tu dans ton cœur tes pensées iniques?
  '15':
  - type: text
    content: Car une voix qui part de Dan annonce la calamité,
  - type: text
    content: Elle la publie depuis la montagne d’Éphraïm.
  '16':
  - type: text
    content: 'Dites-le aux nations, faites-le connaître à Jérusalem:'
  - type: text
    content: Des assiégeants viennent d’une terre lointaine;
  - type: text
    content: Ils poussent des cris contre les villes de Juda.
  '17':
  - type: text
    content: Comme ceux qui gardent un champ, ils entourent Jérusalem,
  - type: text
    content: Car elle s’est révoltée contre moi, dit l’Éternel.
  '18':
  - type: text
    content: C’est là le produit de tes voies et de tes actions,
  - type: text
    content: C’est là le produit de ta méchanceté;
  - type: text
    content: Certes cela est amer, cela pénètre jusqu’à ton cœur.
  - type: heading
    content: 'V. 19-31: cf. Jé 10:19-22; 6:22, etc.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: És 21:4. Jé 9:1.
  - type: text
    content: 'Mes entrailles! Mes entrailles: je souffre au-dedans de mon cœur,'
  - type: text
    content: Le cœur me bat, je ne puis me taire;
  - type: text
    content: Car tu entends, mon âme, le son de la trompette,
  - type: text
    content: Le cri de guerre.
  '2':
  - type: text
    content: 'Si tu jures: L’Éternel est vivant!'
  - type: note
    content: És 48:1.
  - type: text
    content: Avec vérité, avec droiture et avec justice,
  - type: text
    content: 'Alors les nations seront '
  - type: note
    content: Ge 22:18.
  - type: text
    content: bénies en lui,
  - type: text
    content: Et se glorifieront en lui.
  '20':
  - type: text
    content: On annonce ruine sur ruine,
  - type: text
    content: Car tout le pays est ravagé;
  - type: text
    content: Mes tentes sont ravagées tout à coup,
  - type: text
    content: Mes pavillons en un instant.
  '21':
  - type: text
    content: Jusques à quand verrai-je la bannière,
  - type: text
    content: Et entendrai-je le son de la trompette?
  '22':
  - type: text
    content: Certainement mon peuple est fou, il ne me connaît pas;
  - type: text
    content: Ce sont des enfants insensés, dépourvus d’intelligence;
  - type: text
    content: Ils sont habiles pour faire le mal,
  - type: text
    content: Mais ils ne savent pas faire le bien.
  '23':
  - type: text
    content: Je regarde la terre, et voici, elle est informe et vide;
  - type: text
    content: Les cieux, et leur lumière a disparu.
  '24':
  - type: text
    content: Je regarde les montagnes, et voici, elles sont ébranlées;
  - type: text
    content: Et toutes les collines chancellent.
  '25':
  - type: text
    content: Je regarde, et voici, il n’y a point d’homme;
  - type: text
    content: Et tous les oiseaux des cieux ont pris la fuite.
  '26':
  - type: text
    content: Je regarde, et voici, le Carmel est un désert;
  - type: text
    content: Et toutes ses villes sont détruites, devant l’Éternel,
  - type: text
    content: Devant son ardente colère.
  '27':
  - type: text
    content: 'Car ainsi parle l’Éternel:'
  - type: text
    content: Tout le pays sera dévasté;
  - type: text
    content: 'Mais je ne ferai pas une '
  - type: note
    content: Jé 5:10, 18; 30:11; 46:28.
  - type: text
    content: entière destruction.
  '28':
  - type: text
    content: A cause de cela, le pays est en deuil,
  - type: text
    content: Et les cieux en haut sont obscurcis;
  - type: text
    content: Car je l’ai dit, je l’ai résolu,
  - type: text
    content: Et je ne m’en repens pas, je ne me rétracterai pas.
  '29':
  - type: text
    content: Au bruit des cavaliers et des archers, toutes les villes sont en fuite;
  - type: text
    content: On entre dans les bois, on monte sur les rochers;
  - type: text
    content: Toutes les villes sont abandonnées, il n’y a plus d’habitants.
  '3':
  - type: text
    content: 'Car ainsi parle l’Éternel aux hommes de Juda et de Jérusalem:'
  - type: text
    content: Défrichez-vous un champ nouveau,
  - type: text
    content: Et ne semez pas parmi les épines.
  '30':
  - type: text
    content: Et toi, dévastée, que vas-tu faire?
  - type: text
    content: Tu te revêtiras de cramoisi, tu te pareras d’ornements d’or,
  - type: text
    content: Tu mettras du fard à tes yeux;
  - type: text
    content: Mais c’est en vain que tu t’embelliras;
  - type: text
    content: Tes amants te méprisent,
  - type: text
    content: Ils en veulent à ta vie.
  '31':
  - type: text
    content: Car j’entends des cris comme ceux d’une femme en travail,
  - type: text
    content: Des cris d’angoisse comme dans un premier enfantement.
  - type: text
    content: 'C’est la voix de la fille de Sion; elle soupire, elle étend les mains:'
  - type: text
    content: Malheureuse que je suis! Je succombe sous les meurtriers!
  '4':
  - type: text
    content: 'Circoncisez-vous pour l’Éternel, circoncisez '
  - type: note
    content: De 10:16; 30:6.
  - type: text
    content: vos cœurs,
  - type: text
    content: Hommes de Juda et habitants de Jérusalem,
  - type: text
    content: 'De peur que ma colère n’éclate comme un '
  - type: note
    content: És 65:5.
  - type: text
    content: feu,
  - type: text
    content: Et ne s’enflamme, sans qu’on puisse l’éteindre,
  - type: text
    content: A cause de la méchanceté de vos actions.
  - type: heading
    content: Une invasion étrangère
  - type: heading
    content: 'V. 5-18: cf. Jé 1:13-16; 6:1-8.'
  '5':
  - type: text
    content: Annoncez en Juda, publiez à Jérusalem,
  - type: text
    content: 'Et dites: Sonnez de la trompette dans le pays!'
  - type: text
    content: 'Criez à pleine voix, et dites:'
  - type: text
    content: Rassemblez-vous, et allons dans les villes fortes!
  '6':
  - type: text
    content: Élevez une bannière vers Sion,
  - type: text
    content: Fuyez, ne vous arrêtez pas!
  - type: text
    content: Car je fais venir du septentrion le malheur
  - type: text
    content: Et un grand désastre.
  '7':
  - type: text
    content: ' '
  - type: note
    content: És 5:29. Jé 2:15; 5:6.
  - type: text
    content: Le lion s’élance de son taillis,
  - type: text
    content: Le destructeur des nations est en marche, il a quitté son lieu,
  - type: text
    content: Pour ravager ton pays;
  - type: text
    content: 'Tes villes seront '
  - type: note
    content: Jé 2:15.
  - type: text
    content: ruinées, il n’y aura plus d’habitants.
  '8':
  - type: text
    content: 'C’est pourquoi couvrez-vous de sacs, pleurez et '
  - type: note
    content: És 32:12.
  - type: text
    content: gémissez;
  - type: text
    content: Car la colère ardente de l’Éternel ne se détourne pas de nous.
  '9':
  - type: text
    content: En ce jour-là, dit l’Éternel,
  - type: text
    content: Le roi et les chefs perdront courage,
  - type: text
    content: Les sacrificateurs seront étonnés,
  - type: text
    content: Et les prophètes stupéfaits.
