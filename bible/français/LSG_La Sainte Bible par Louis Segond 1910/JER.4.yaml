document_id: JER.4
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-4: cf. Jé 3:22, 23. Os 10:12. Éz 18:20-32.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Israël, si tu reviens, si tu reviens à moi, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu ôtes tes abominations de devant moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu ne seras plus errant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Si tu jures: L’Éternel est vivant!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 48:1
      metadata:
        usfm: ISA.48.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Avec vérité, avec droiture et avec justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Alors les nations seront '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 22:18
      metadata:
        usfm: GEN.22.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: bénies en lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et se glorifieront en lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Car ainsi parle l’Éternel aux hommes de Juda et de Jérusalem:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Défrichez-vous un champ nouveau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne semez pas parmi les épines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Circoncisez-vous pour l’Éternel, circoncisez '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:16
      metadata:
        usfm: DEU.10.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 30:6
      metadata:
        usfm: DEU.30.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: vos cœurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hommes de Juda et habitants de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'De peur que ma colère n’éclate comme un '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 65:5
      metadata:
        usfm: ISA.65.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne s’enflamme, sans qu’on puisse l’éteindre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de la méchanceté de vos actions.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une invasion étrangère
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 5-18: cf. Jé 1:13-16; 6:1-8.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Annoncez en Juda, publiez à Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et dites: Sonnez de la trompette dans le pays!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Criez à pleine voix, et dites:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rassemblez-vous, et allons dans les villes fortes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Élevez une bannière vers Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fuyez, ne vous arrêtez pas!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je fais venir du septentrion le malheur
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et un grand désastre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:29
      metadata:
        usfm: ISA.5.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:15
      metadata:
        usfm: JER.2.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:6
      metadata:
        usfm: JER.5.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le lion s’élance de son taillis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le destructeur des nations est en marche, il a quitté son lieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour ravager ton pays;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tes villes seront '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:15
      metadata:
        usfm: JER.2.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: ruinées, il n’y aura plus d’habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'C’est pourquoi couvrez-vous de sacs, pleurez et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 32:12
      metadata:
        usfm: ISA.32.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: gémissez;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car la colère ardente de l’Éternel ne se détourne pas de nous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: En ce jour-là, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le roi et les chefs perdront courage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les sacrificateurs seront étonnés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les prophètes stupéfaits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Je dis: Ah! Seigneur Éternel!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu as donc trompé ce peuple et Jérusalem, en disant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous aurez la paix!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et cependant l’épée menace leur vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En ce temps-là, il sera dit à ce peuple et à Jérusalem:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un vent brûlant souffle des lieux élevés du désert
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur le chemin de la fille de mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Non pour vanner ni pour nettoyer le grain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C’est un vent impétueux qui vient de là jusqu’à moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant, je prononcerai leur sentence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Voici, le destructeur s’avance comme les nuées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses chars sont comme un tourbillon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses chevaux sont plus légers que les aigles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malheur à nous, car nous sommes détruits!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:16
      metadata:
        usfm: ISA.1.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Purifie ton cœur du mal, Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que tu sois sauvée!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusques à quand garderas-tu dans ton cœur tes pensées iniques?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Car une voix qui part de Dan annonce la calamité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle la publie depuis la montagne d’Éphraïm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dites-le aux nations, faites-le connaître à Jérusalem:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des assiégeants viennent d’une terre lointaine;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils poussent des cris contre les villes de Juda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Comme ceux qui gardent un champ, ils entourent Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car elle s’est révoltée contre moi, dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: C’est là le produit de tes voies et de tes actions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est là le produit de ta méchanceté;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Certes cela est amer, cela pénètre jusqu’à ton cœur.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 19-31: cf. Jé 10:19-22; 6:22, etc.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 21:4
      metadata:
        usfm: ISA.21.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 9:1
      metadata:
        usfm: JER.9.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mes entrailles! Mes entrailles: je souffre au-dedans de mon cœur,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le cœur me bat, je ne puis me taire;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu entends, mon âme, le son de la trompette,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le cri de guerre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: On annonce ruine sur ruine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tout le pays est ravagé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes tentes sont ravagées tout à coup,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes pavillons en un instant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Jusques à quand verrai-je la bannière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et entendrai-je le son de la trompette?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Certainement mon peuple est fou, il ne me connaît pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce sont des enfants insensés, dépourvus d’intelligence;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont habiles pour faire le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ils ne savent pas faire le bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Je regarde la terre, et voici, elle est informe et vide;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les cieux, et leur lumière a disparu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je regarde les montagnes, et voici, elles sont ébranlées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et toutes les collines chancellent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Je regarde, et voici, il n’y a point d’homme;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous les oiseaux des cieux ont pris la fuite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Je regarde, et voici, le Carmel est un désert;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et toutes ses villes sont détruites, devant l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Devant son ardente colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Car ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout le pays sera dévasté;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mais je ne ferai pas une '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 5:10
      metadata:
        usfm: JER.5.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: JER.5.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 30:11
      metadata:
        usfm: JER.30.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 46:28
      metadata:
        usfm: JER.46.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: entière destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A cause de cela, le pays est en deuil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les cieux en haut sont obscurcis;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je l’ai dit, je l’ai résolu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je ne m’en repens pas, je ne me rétracterai pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Au bruit des cavaliers et des archers, toutes les villes sont en fuite;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On entre dans les bois, on monte sur les rochers;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutes les villes sont abandonnées, il n’y a plus d’habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Et toi, dévastée, que vas-tu faire?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu te revêtiras de cramoisi, tu te pareras d’ornements d’or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu mettras du fard à tes yeux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais c’est en vain que tu t’embelliras;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes amants te méprisent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils en veulent à ta vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Car j’entends des cris comme ceux d’une femme en travail,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des cris d’angoisse comme dans un premier enfantement.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C’est la voix de la fille de Sion; elle soupire, elle étend les mains:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malheureuse que je suis! Je succombe sous les meurtriers!
