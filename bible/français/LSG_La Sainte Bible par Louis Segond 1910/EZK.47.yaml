document_id: EZK.47,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le torrent sortant du temple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-12: cf. (Joë 3:18. Za 14:8.) Ap 22:1, 2.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Il me ramena vers la porte de la maison. Et voici, de l’eau sortait sous le seuil de la maison, à l’orient, car la face de la maison était à l’orient; l’eau descendait sous le côté droit de la maison, au midi de l’autel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Des pêcheurs se tiendront sur ses bords; depuis En-Guédi jusqu’à En-Églaïm, on étendra les filets; il y aura des poissons de diverses espèces, comme les poissons de la grande mer, et ils seront très nombreux. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ses marais et ses fosses ne seront point assainis, ils seront abandonnés au sel. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Sur le torrent, sur ses bords de chaque côté, croîtront toutes sortes d’arbres fruitiers. Leur feuillage ne se flétrira point, et leurs fruits n’auront point de fin, ils mûriront tous les mois, parce que les eaux sortiront du sanctuaire. Leurs fruits serviront de nourriture, et leurs feuilles de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 22:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: remède.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les frontières du pays. Nouveau partage
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-23: cf. No 34:1-12. És 26:15.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ainsi parle le Seigneur, l’Éternel: Voici les limites du pays que vous distribuerez en héritage aux douze tribus d’Israël. Joseph aura deux parts. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Vous en aurez la possession l’un comme l’autre; car j’ai juré, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 12:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'la main levée, de le donner à vos pères. Ce pays vous tombera donc en partage. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Voici les limites du pays. Du côté septentrional, depuis la grande mer, le chemin de Hethlon jusqu’à Tsedad, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Hamath, Bérotha, Sibraïm, entre la frontière de Damas et la frontière de Hamath, Hatzer-Hatthicon, vers la frontière de Havran; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ainsi la limite sera, depuis la mer, Hatsar-Énon, la frontière de Damas, Tsaphon au nord, et la frontière de Hamath: ce sera le côté septentrional. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Le côté oriental sera le Jourdain, entre Havran, Damas et Galaad, et le pays d’Israël; vous mesurerez depuis la limite septentrionale jusqu’à la mer orientale: ce sera le côté oriental. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Le côté méridional, au midi, ira depuis Thamar jusqu’aux eaux de Meriba à Kadès, jusqu’au torrent vers la grande mer: ce sera le côté méridional. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il me conduisit par le chemin de la porte septentrionale, et il me fit faire le tour par dehors jusqu’à l’extérieur de la porte orientale. Et voici, l’eau coulait du côté droit. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Le côté occidental sera la grande mer, depuis la limite jusque vis-à-vis de Hamath: ce sera le côté occidental. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Vous partagerez ce pays entre vous, selon les tribus d’Israël. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Vous le diviserez en héritage par le sort pour vous et pour les étrangers qui séjourneront au milieu de vous, qui engendreront des enfants au milieu de vous; vous les regarderez comme indigènes parmi les enfants d’Israël; ils partageront au sort l’héritage avec vous parmi les tribus d’Israël. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Vous donnerez à l’étranger son héritage dans la tribu où il séjournera, dit le Seigneur, l’Éternel.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Lorsque l’homme s’avança vers l’orient, il avait dans la main un cordeau, et il mesura mille coudées; il me fit traverser l’eau, et j’avais de l’eau jusqu’aux chevilles. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il mesura encore mille coudées, et me fit traverser l’eau, et j’avais de l’eau jusqu’aux genoux. Il mesura encore mille coudées, et me fit traverser, et j’avais de l’eau jusqu’aux reins. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il mesura encore mille coudées; c’était un torrent que je ne pouvais traverser, car l’eau était si profonde qu’il fallait y nager; c’était un torrent qu’on ne pouvait traverser. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il me dit: As-tu vu, fils de l’homme? Et il me ramena au bord du torrent. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Quand il m’eut ramené, voici, il y avait sur le bord du torrent beaucoup '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 22:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’arbres de chaque côté. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Il me dit: Cette eau coulera vers le district oriental, descendra dans la plaine, et entrera dans la mer; lorsqu’elle se sera jetée dans la mer, les eaux de la mer deviendront saines. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Tout être vivant qui se meut vivra partout où le torrent coulera, et il y aura une grande quantité de poissons; car là où cette eau arrivera, les eaux deviendront saines, et tout vivra partout où parviendra le torrent. '
