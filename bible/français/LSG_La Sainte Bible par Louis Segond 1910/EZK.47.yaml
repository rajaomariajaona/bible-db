document_id: EZK.47,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le torrent sortant du temple
  - type: heading
    content: 'V. 1-12: cf. (Joë 3:18. Za 14:8.) Ap 22:1, 2.'
  - type: text
    content: 'Il me ramena vers la porte de la maison. Et voici, de l’eau sortait sous le seuil de la maison, à l’orient, car la face de la maison était à l’orient; l’eau descendait sous le côté droit de la maison, au midi de l’autel. '
  '10':
  - type: text
    content: 'Des pêcheurs se tiendront sur ses bords; depuis En-Guédi jusqu’à En-Églaïm, on étendra les filets; il y aura des poissons de diverses espèces, comme les poissons de la grande mer, et ils seront très nombreux. '
  '11':
  - type: text
    content: 'Ses marais et ses fosses ne seront point assainis, ils seront abandonnés au sel. '
  '12':
  - type: text
    content: 'Sur le torrent, sur ses bords de chaque côté, croîtront toutes sortes d’arbres fruitiers. Leur feuillage ne se flétrira point, et leurs fruits n’auront point de fin, ils mûriront tous les mois, parce que les eaux sortiront du sanctuaire. Leurs fruits serviront de nourriture, et leurs feuilles de '
  - type: note
    content: Ap 22:2.
  - type: text
    content: remède.
  - type: heading
    content: Les frontières du pays. Nouveau partage
  - type: heading
    content: 'V. 13-23: cf. No 34:1-12. És 26:15.'
  '13':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel: Voici les limites du pays que vous distribuerez en héritage aux douze tribus d’Israël. Joseph aura deux parts. '
  '14':
  - type: text
    content: 'Vous en aurez la possession l’un comme l’autre; car j’ai juré, '
  - type: note
    content: Ge 12:7; 17:8; 26:3; 28:13.
  - type: text
    content: 'la main levée, de le donner à vos pères. Ce pays vous tombera donc en partage. '
  '15':
  - type: text
    content: 'Voici les limites du pays. Du côté septentrional, depuis la grande mer, le chemin de Hethlon jusqu’à Tsedad, '
  '16':
  - type: text
    content: 'Hamath, Bérotha, Sibraïm, entre la frontière de Damas et la frontière de Hamath, Hatzer-Hatthicon, vers la frontière de Havran; '
  '17':
  - type: text
    content: 'ainsi la limite sera, depuis la mer, Hatsar-Énon, la frontière de Damas, Tsaphon au nord, et la frontière de Hamath: ce sera le côté septentrional. '
  '18':
  - type: text
    content: 'Le côté oriental sera le Jourdain, entre Havran, Damas et Galaad, et le pays d’Israël; vous mesurerez depuis la limite septentrionale jusqu’à la mer orientale: ce sera le côté oriental. '
  '19':
  - type: text
    content: 'Le côté méridional, au midi, ira depuis Thamar jusqu’aux eaux de Meriba à Kadès, jusqu’au torrent vers la grande mer: ce sera le côté méridional. '
  '2':
  - type: text
    content: 'Il me conduisit par le chemin de la porte septentrionale, et il me fit faire le tour par dehors jusqu’à l’extérieur de la porte orientale. Et voici, l’eau coulait du côté droit. '
  '20':
  - type: text
    content: 'Le côté occidental sera la grande mer, depuis la limite jusque vis-à-vis de Hamath: ce sera le côté occidental. '
  '21':
  - type: text
    content: 'Vous partagerez ce pays entre vous, selon les tribus d’Israël. '
  '22':
  - type: text
    content: 'Vous le diviserez en héritage par le sort pour vous et pour les étrangers qui séjourneront au milieu de vous, qui engendreront des enfants au milieu de vous; vous les regarderez comme indigènes parmi les enfants d’Israël; ils partageront au sort l’héritage avec vous parmi les tribus d’Israël. '
  '23':
  - type: text
    content: Vous donnerez à l’étranger son héritage dans la tribu où il séjournera, dit le Seigneur, l’Éternel.
  '3':
  - type: text
    content: 'Lorsque l’homme s’avança vers l’orient, il avait dans la main un cordeau, et il mesura mille coudées; il me fit traverser l’eau, et j’avais de l’eau jusqu’aux chevilles. '
  '4':
  - type: text
    content: 'Il mesura encore mille coudées, et me fit traverser l’eau, et j’avais de l’eau jusqu’aux genoux. Il mesura encore mille coudées, et me fit traverser, et j’avais de l’eau jusqu’aux reins. '
  '5':
  - type: text
    content: 'Il mesura encore mille coudées; c’était un torrent que je ne pouvais traverser, car l’eau était si profonde qu’il fallait y nager; c’était un torrent qu’on ne pouvait traverser. '
  '6':
  - type: text
    content: 'Il me dit: As-tu vu, fils de l’homme? Et il me ramena au bord du torrent. '
  '7':
  - type: text
    content: 'Quand il m’eut ramené, voici, il y avait sur le bord du torrent beaucoup '
  - type: note
    content: Ap 22:2.
  - type: text
    content: 'd’arbres de chaque côté. '
  '8':
  - type: text
    content: 'Il me dit: Cette eau coulera vers le district oriental, descendra dans la plaine, et entrera dans la mer; lorsqu’elle se sera jetée dans la mer, les eaux de la mer deviendront saines. '
  '9':
  - type: text
    content: 'Tout être vivant qui se meut vivra partout où le torrent coulera, et il y aura une grande quantité de poissons; car là où cette eau arrivera, les eaux deviendront saines, et tout vivra partout où parviendra le torrent. '
