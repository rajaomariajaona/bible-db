document_id: JDG.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le peuple infidèle
  - type: heading
    content: 'V. 1-5: cf. (De 7:1-11. Jos 23:1-13.) Joë 2:12, 13. Ap 2:4, 5, 16.'
  - type: text
    content: 'Un envoyé de l’Éternel monta de Guilgal à Bokim, et dit: Je vous ai fait monter hors d’Égypte, et je vous ai amenés dans le pays que j’ai juré à vos pères de vous donner. J’ai dit: '
  - type: note
    content: Ge 17:7. De 29:14, 15.
  - type: text
    content: 'Jamais je ne romprai mon alliance avec vous; '
  '10':
  - type: text
    content: 'Toute cette génération fut recueillie auprès de ses pères, et il s’éleva après elle une autre génération, qui ne connaissait point l’Éternel, ni ce qu’il avait fait en faveur d’Israël. '
  '11':
  - type: text
    content: 'Les enfants d’Israël firent alors ce qui déplaît à l’Éternel, et ils servirent les Baals. '
  '12':
  - type: text
    content: 'Ils abandonnèrent l’Éternel, le Dieu de leurs pères, qui les avait fait sortir du pays d’Égypte, et ils allèrent après d’autres dieux d’entre les dieux des peuples qui les entouraient; ils se prosternèrent devant eux, et ils irritèrent l’Éternel. '
  '13':
  - type: text
    content: 'Ils abandonnèrent l’Éternel, et ils servirent Baal et les Astartés. '
  '14':
  - type: text
    content: 'La colère de l’Éternel s’enflamma contre Israël. Il les livra entre les mains de pillards qui les pillèrent, '
  - type: note
    content: Ps 44:13. És 50:1.
  - type: text
    content: 'il les vendit entre les mains de leurs ennemis d’alentour, et ils ne purent plus résister à leurs ennemis. '
  '15':
  - type: text
    content: 'Partout où ils allaient, la main de l’Éternel était contre eux pour leur faire du mal, '
  - type: note
    content: Lé 26. De 28.
  - type: text
    content: 'comme l’Éternel l’avait dit, comme l’Éternel le leur avait juré. Ils furent ainsi dans une grande détresse. '
  '16':
  - type: text
    content: 'L’Éternel suscita des juges, afin qu’ils les délivrassent de la main de ceux qui les pillaient. '
  '17':
  - type: text
    content: 'Mais ils n’écoutèrent pas même leurs juges, car ils se prostituèrent à d’autres dieux, se prosternèrent devant eux. Ils se détournèrent promptement de la voie qu’avaient suivie leurs pères, et ils n’obéirent point comme eux aux commandements de l’Éternel. '
  '18':
  - type: text
    content: 'Lorsque l’Éternel leur suscitait des juges, l’Éternel était avec le juge, et il les délivrait de la main de leurs ennemis pendant toute la vie du juge; car l’Éternel avait pitié de leurs gémissements contre ceux qui les opprimaient et les tourmentaient. '
  '19':
  - type: note
    content: Jg 3:12.
  - type: text
    content: 'Mais, à la mort du juge, ils se corrompaient de nouveau plus que leurs pères, en allant après d’autres dieux pour les servir et se prosterner devant eux, et ils persévéraient dans la même conduite et le même endurcissement. '
  '2':
  - type: text
    content: 'et vous, vous ne traiterez point '
  - type: note
    content: De 7:2.
  - type: text
    content: 'alliance avec les habitants de ce pays, vous renverserez leurs '
  - type: note
    content: De 12:3.
  - type: text
    content: 'autels. Mais vous n’avez point obéi à ma voix. Pourquoi avez-vous fait cela? '
  '20':
  - type: text
    content: 'Alors la colère de l’Éternel s’enflamma contre Israël, et il dit: Puisque cette nation a transgressé mon alliance que j’avais prescrite à ses pères, et puisqu’ils n’ont point obéi à ma voix, '
  '21':
  - type: note
    content: Jos 23:13.
  - type: text
    content: 'je ne chasserai plus devant eux aucune des nations que Josué laissa quand il mourut. '
  '22':
  - type: text
    content: 'C’est ainsi que je mettrai par elles Israël à l’épreuve, pour savoir s’ils prendront garde ou non de suivre la voie de l’Éternel, comme leurs pères y ont pris garde. '
  '23':
  - type: text
    content: Et l’Éternel laissa en repos ces nations qu’il n’avait pas livrées entre les mains de Josué, et il ne se hâta point de les chasser.
  '3':
  - type: text
    content: 'J’ai dit alors: '
  - type: note
    content: Jos 23:13.
  - type: text
    content: 'Je ne les chasserai point devant vous; mais ils seront à vos côtés, et leurs dieux vous seront '
  - type: note
    content: Ex 23:33; 34:12. De 7:16.
  - type: text
    content: 'un piège. '
  '4':
  - type: text
    content: 'Lorsque l’envoyé de l’Éternel eut dit ces paroles à tous les enfants d’Israël, le peuple éleva la voix et pleura. '
  '5':
  - type: text
    content: Ils donnèrent à ce lieu le nom de Bokim, et ils y offrirent des sacrifices à l’Éternel.
  - type: heading
    content: Les juges
  - type: heading
    content: 'V. 6-9: cf. Jos 24:28-31. Ps 12:2.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: Jos 24:28.
  - type: text
    content: 'Josué renvoya le peuple, et les enfants d’Israël allèrent chacun dans son héritage pour prendre possession du pays. '
  '7':
  - type: text
    content: 'Le peuple servit l’Éternel pendant toute la vie de Josué, et pendant toute la vie des anciens qui survécurent à Josué et qui avaient vu toutes les grandes choses que l’Éternel avait faites en faveur d’Israël. '
  '8':
  - type: text
    content: 'Josué, fils de Nun, serviteur de l’Éternel, mourut âgé de cent dix ans. '
  '9':
  - type: text
    content: On l’ensevelit dans le territoire qu’il avait eu en partage, à Thimnath-Hérès, dans la montagne d’Éphraïm, au nord de la montagne de Gaasch.
  - type: heading
    content: 'V. 10-23: cf. De 6:10-15. (1 S 12:7-11. Ps 106:34-36.) Né 9:27.'
