document_id: JDG.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le peuple infidèle
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-5: cf. (De 7:1-11. Jos 23:1-13.) Joë 2:12, 13. Ap 2:4, 5, 16.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Un envoyé de l’Éternel monta de Guilgal à Bokim, et dit: Je vous ai fait monter hors d’Égypte, et je vous ai amenés dans le pays que j’ai juré à vos pères de vous donner. J’ai dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 17:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 29:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jamais je ne romprai mon alliance avec vous; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Toute cette génération fut recueillie auprès de ses pères, et il s’éleva après elle une autre génération, qui ne connaissait point l’Éternel, ni ce qu’il avait fait en faveur d’Israël. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Les enfants d’Israël firent alors ce qui déplaît à l’Éternel, et ils servirent les Baals. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ils abandonnèrent l’Éternel, le Dieu de leurs pères, qui les avait fait sortir du pays d’Égypte, et ils allèrent après d’autres dieux d’entre les dieux des peuples qui les entouraient; ils se prosternèrent devant eux, et ils irritèrent l’Éternel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ils abandonnèrent l’Éternel, et ils servirent Baal et les Astartés. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'La colère de l’Éternel s’enflamma contre Israël. Il les livra entre les mains de pillards qui les pillèrent, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 44:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 50:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il les vendit entre les mains de leurs ennemis d’alentour, et ils ne purent plus résister à leurs ennemis. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Partout où ils allaient, la main de l’Éternel était contre eux pour leur faire du mal, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme l’Éternel l’avait dit, comme l’Éternel le leur avait juré. Ils furent ainsi dans une grande détresse. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'L’Éternel suscita des juges, afin qu’ils les délivrassent de la main de ceux qui les pillaient. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Mais ils n’écoutèrent pas même leurs juges, car ils se prostituèrent à d’autres dieux, se prosternèrent devant eux. Ils se détournèrent promptement de la voie qu’avaient suivie leurs pères, et ils n’obéirent point comme eux aux commandements de l’Éternel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Lorsque l’Éternel leur suscitait des juges, l’Éternel était avec le juge, et il les délivrait de la main de leurs ennemis pendant toute la vie du juge; car l’Éternel avait pitié de leurs gémissements contre ceux qui les opprimaient et les tourmentaient. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 3:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais, à la mort du juge, ils se corrompaient de nouveau plus que leurs pères, en allant après d’autres dieux pour les servir et se prosterner devant eux, et ils persévéraient dans la même conduite et le même endurcissement. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'et vous, vous ne traiterez point '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 7:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'alliance avec les habitants de ce pays, vous renverserez leurs '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 12:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'autels. Mais vous n’avez point obéi à ma voix. Pourquoi avez-vous fait cela? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Alors la colère de l’Éternel s’enflamma contre Israël, et il dit: Puisque cette nation a transgressé mon alliance que j’avais prescrite à ses pères, et puisqu’ils n’ont point obéi à ma voix, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 23:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'je ne chasserai plus devant eux aucune des nations que Josué laissa quand il mourut. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'C’est ainsi que je mettrai par elles Israël à l’épreuve, pour savoir s’ils prendront garde ou non de suivre la voie de l’Éternel, comme leurs pères y ont pris garde. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Et l’Éternel laissa en repos ces nations qu’il n’avait pas livrées entre les mains de Josué, et il ne se hâta point de les chasser.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'J’ai dit alors: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 23:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je ne les chasserai point devant vous; mais ils seront à vos côtés, et leurs dieux vous seront '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23:33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 7:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'un piège. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Lorsque l’envoyé de l’Éternel eut dit ces paroles à tous les enfants d’Israël, le peuple éleva la voix et pleura. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ils donnèrent à ce lieu le nom de Bokim, et ils y offrirent des sacrifices à l’Éternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les juges
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-9: cf. Jos 24:28-31. Ps 12:2.'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 24:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Josué renvoya le peuple, et les enfants d’Israël allèrent chacun dans son héritage pour prendre possession du pays. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Le peuple servit l’Éternel pendant toute la vie de Josué, et pendant toute la vie des anciens qui survécurent à Josué et qui avaient vu toutes les grandes choses que l’Éternel avait faites en faveur d’Israël. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Josué, fils de Nun, serviteur de l’Éternel, mourut âgé de cent dix ans. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: On l’ensevelit dans le territoire qu’il avait eu en partage, à Thimnath-Hérès, dans la montagne d’Éphraïm, au nord de la montagne de Gaasch.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-23: cf. De 6:10-15. (1 S 12:7-11. Ps 106:34-36.) Né 9:27.'
    marker-yv: yv-h
