document_id: LUK.19,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le publicain Zachée
  - type: heading
    content: 'V. 1-10: cf. Lu 15; 3:8; 5:32.'
  - type: text
    content: 'Jésus, étant entré dans Jéricho, traversait la ville. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Mt 10:6; 15:24; 18:11. Ac 13:46.
  - type: text
    content: Car le Fils de l’homme est venu chercher et sauver ce qui était perdu.
  - type: heading
    content: Parabole des mines
  - type: heading
    content: 'V. 11-28: cf. Mt 25:14-30.'
  '11':
  - type: text
    content: 'Ils écoutaient ces choses, et Jésus ajouta une parabole, parce qu’il était près de Jérusalem, et qu’on croyait qu’à l’instant le royaume de Dieu allait paraître. '
  '12':
  - type: text
    content: 'Il dit donc: '
  - type: note
    content: Mt 25:14. Mc 13:34.
  - type: text
    content: Un homme de haute naissance s’en alla dans un pays lointain, pour se faire investir de l’autorité royale, et revenir ensuite.
  '13':
  - type: text
    content: ' '
  - type: text
    content: 'Il appela dix de ses serviteurs, leur donna dix mines, et leur dit: Faites-les valoir jusqu’à ce que je revienne.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Mais ses concitoyens le haïssaient, et ils envoyèrent une ambassade après lui, pour dire: Nous ne voulons pas que cet homme règne sur nous.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: Lorsqu’il fut de retour, après avoir été investi de l’autorité royale, il fit appeler auprès de lui les serviteurs auxquels il avait donné l’argent, afin de connaître comment chacun l’avait fait valoir.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Le premier vint, et dit: Seigneur, ta mine a rapporté dix mines.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Il lui dit: C’est bien, bon serviteur; parce que tu as été fidèle en peu de chose, reçois le gouvernement de dix villes.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Le second vint, et dit: Seigneur, ta mine a produit cinq mines.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Il lui dit: Toi aussi, sois établi sur cinq villes.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Et voici, un homme riche, appelé Zachée, chef des publicains, cherchait à voir qui était Jésus; '
  '20':
  - type: text
    content: 'Un autre vint, et dit: Seigneur, voici ta mine, que j’ai gardée dans un linge;'
  - type: text
    content: ' '
  '21':
  - type: text
    content: car j’avais peur de toi, parce que tu es un homme sévère; tu prends ce que tu n’as pas déposé, et tu moissonnes ce que tu n’as pas semé.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Il lui dit:'
  - type: text
    content: ' '
  - type: note
    content: 2 S 1:16. Mt 12:37.
  - type: text
    content: Je te juge sur tes paroles, méchant serviteur; tu savais que je suis un homme sévère, prenant ce que je n’ai pas déposé, et moissonnant ce que je n’ai pas semé;
  - type: text
    content: ' '
  '23':
  - type: text
    content: pourquoi donc n’as-tu pas mis mon argent dans une banque, afin qu’à mon retour je le retirasse avec un intérêt?
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Puis il dit à ceux qui étaient là: Otez-lui la mine, et donnez-la à celui qui a les dix mines.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Ils lui dirent: Seigneur, il a dix mines.'
  - type: text
    content: ' '
  '26':
  - type: note
    content: Mt 13:12; 25:29. Mc 4:25. Lu 8:18.
  - type: text
    content: Je vous le dis, on donnera à celui qui a, mais à celui qui n’a pas on ôtera même ce qu’il a.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Au reste, amenez ici mes ennemis, qui n’ont pas voulu que je régnasse sur eux, et tuez-les en ma présence.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Après avoir ainsi parlé, Jésus marcha devant la foule, pour monter à Jérusalem.
  - type: heading
    content: Entrée de Jésus à Jérusalem
  - type: heading
    content: 'V. 29-40: cf. (Mt 21:1-9. Mc 11:1-10. Jn 12:12-19.) Za 9:9.'
  '29':
  - type: text
    content: ' '
  - type: note
    content: Mt 21:1. Mc 11:1.
  - type: text
    content: 'Lorsqu’il approcha de Bethphagé et de Béthanie, vers la montagne appelée montagne des oliviers, Jésus envoya deux de ses disciples, '
  '3':
  - type: text
    content: 'mais il ne pouvait y parvenir, à cause de la foule, car il était de petite taille. '
  '30':
  - type: text
    content: 'en disant: '
  - type: text
    content: Allez au village qui est en face; quand vous y serez entrés, vous trouverez un ânon attaché, sur lequel aucun homme ne s’est jamais assis; détachez-le, et amenez-le.
  '31':
  - type: text
    content: ' '
  - type: text
    content: 'Si quelqu’un vous demande: Pourquoi le détachez-vous? Vous lui répondrez: Le Seigneur en a besoin.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Ceux qui étaient envoyés allèrent, et trouvèrent les choses comme Jésus leur avait dit. '
  '33':
  - type: text
    content: 'Comme ils détachaient l’ânon, ses maîtres leur dirent: Pourquoi détachez-vous l’ânon? '
  '34':
  - type: text
    content: 'Ils répondirent: Le Seigneur en a besoin. '
  '35':
  - type: note
    content: Jn 12:14.
  - type: text
    content: 'Et ils amenèrent à Jésus l’ânon, '
  - type: note
    content: 2 R 9:13.
  - type: text
    content: 'sur lequel ils jetèrent leurs vêtements, et firent monter Jésus. '
  '36':
  - type: text
    content: 'Quand il fut en marche, les gens étendirent leurs vêtements sur le chemin. '
  '37':
  - type: text
    content: 'Et lorsque déjà il approchait de Jérusalem, vers la descente de la montagne des oliviers, toute la multitude des disciples, saisie de joie, se mit à louer Dieu à haute voix pour tous les miracles qu’ils avaient vus. '
  '38':
  - type: text
    content: 'Ils disaient: '
  - type: note
    content: Ps 118:26.
  - type: text
    content: 'Béni soit le roi qui vient au nom du Seigneur! '
  - type: note
    content: Lu 2:14. Ép 2:14.
  - type: text
    content: 'Paix dans le ciel, et gloire dans les lieux très hauts! '
  '39':
  - type: text
    content: 'Quelques pharisiens, du milieu de la foule, dirent à Jésus: Maître, reprends tes disciples. '
  '4':
  - type: text
    content: 'Il courut en avant, et monta sur un sycomore pour le voir, parce qu’il devait passer par là. '
  '40':
  - type: text
    content: 'Et il répondit: '
  - type: text
    content: Je vous le dis, s’ils se taisent,
  - type: text
    content: ' '
  - type: note
    content: Ha 2:11.
  - type: text
    content: les pierres crieront!
  - type: heading
    content: Jésus pleure sur Jérusalem
  - type: heading
    content: 'V. 41-44: cf. Lu 13:34, 35; 21:20-24; 3:9. Jé 8:18 à 9:1.'
  '41':
  - type: text
    content: 'Comme il approchait de la ville, Jésus, en la voyant, pleura sur elle, et dit:'
  '42':
  - type: text
    content: ' '
  - type: text
    content: Si toi aussi, au moins en ce jour qui t’est donné, tu connaissais les choses qui appartiennent à ta paix! Mais maintenant elles sont cachées à tes yeux.
  - type: text
    content: ' '
  '43':
  - type: text
    content: Il viendra sur toi des jours où tes ennemis t’environneront de tranchées, t’enfermeront, et te serreront de toutes parts;
  - type: text
    content: ' '
  '44':
  - type: note
    content: 1 R 9:7, 8. Mi 3:12. Mt 24:1, 2. Mc 13:2. Lu 21:6.
  - type: text
    content: ils te détruiront, toi et tes enfants au milieu de toi, et ils ne laisseront pas en toi pierre sur pierre, parce que tu n’as pas connu le temps où tu as été visitée.
  - type: heading
    content: Les vendeurs chassés du temple. Irritation des sacrificateurs
  - type: heading
    content: 'V. 45-48: cf. (Mt 21:10-16. Mc 11:11, 15-18.) Jn 2:13-17.'
  '45':
  - type: text
    content: 'Il entra dans le temple, et il se mit à chasser ceux qui vendaient, '
  '46':
  - type: text
    content: 'leur disant: '
  - type: note
    content: 1 R 8:29. És 56:7. Jé 7:11. Mt 21:13. Mc 11:17.
  - type: text
    content: 'Il est écrit: Ma maison sera une maison de prière. Mais vous, vous en avez fait une caverne de voleurs.'
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'Il enseignait tous les jours dans le temple. '
  - type: note
    content: Mc 11:18. Jn 7:19; 8:37.
  - type: text
    content: 'Et les principaux sacrificateurs, les scribes, et les principaux du peuple cherchaient à le faire périr; '
  '48':
  - type: text
    content: mais ils ne savaient comment s’y prendre, car tout le peuple l’écoutait avec admiration.
  '5':
  - type: text
    content: 'Lorsque Jésus fut arrivé à cet endroit, il leva les yeux et lui dit: '
  - type: text
    content: Zachée, hâte-toi de descendre; car il faut que je demeure aujourd’hui dans ta maison.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Zachée se hâta de descendre, et le reçut avec joie. '
  '7':
  - type: text
    content: 'Voyant cela, tous murmuraient, et disaient: Il est allé loger chez un homme pécheur. '
  '8':
  - type: text
    content: 'Mais Zachée, se tenant devant le Seigneur, lui dit: Voici, Seigneur, je donne aux pauvres la moitié de mes biens, et, si j’ai fait tort de quelque chose à quelqu’un, je lui rends le quadruple. '
  '9':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: Le salut est entré aujourd’hui dans cette maison, parce que
  - type: text
    content: ' '
  - type: note
    content: Lu 13:16.
  - type: text
    content: celui-ci est aussi un fils d’Abraham.
