document_id: PSA.46,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Ps 75; 76.) (És 36; 37.) Ps 48.
  - type: text
    content: Au chef des chantres. Des fils de Koré. Sur alamoth. Cantique.
  '10':
  - type: text
    content: C’est lui qui a fait cesser les combats jusqu’au bout de la terre;
  - type: text
    content: Il a brisé l’arc, et il a rompu la lance,
  - type: text
    content: Il a consumé par le feu les chars de guerre.
  '11':
  - type: text
    content: 'Arrêtez, et sachez que je suis Dieu:'
  - type: text
    content: Je domine sur les nations, je domine sur la terre.
  '12':
  - type: text
    content: L’Éternel des armées est avec nous,
  - type: text
    content: 'Le Dieu de Jacob est pour nous une haute retraite. '
  - type: text
    content: — Pause.
  '2':
  - type: text
    content: Dieu est pour nous un refuge et un appui,
  - type: text
    content: Un secours qui ne manque jamais dans la détresse.
  '3':
  - type: text
    content: C’est pourquoi nous sommes sans crainte quand la terre est bouleversée,
  - type: text
    content: Et que les montagnes chancellent au cœur des mers,
  '4':
  - type: text
    content: Quand les flots de la mer mugissent, écument,
  - type: text
    content: 'Se soulèvent jusqu’à faire trembler les montagnes. '
  - type: text
    content: — Pause.
  '5':
  - type: text
    content: Il est un fleuve dont les courants réjouissent la cité de Dieu,
  - type: text
    content: Le sanctuaire des demeures du Très-Haut.
  '6':
  - type: text
    content: 'Dieu est au milieu d’elle: elle n’est point ébranlée;'
  - type: text
    content: Dieu la secourt dès l’aube du matin.
  '7':
  - type: text
    content: Des nations s’agitent, des royaumes s’ébranlent;
  - type: text
    content: 'Il fait entendre sa voix: la terre se fond d’épouvante.'
  '8':
  - type: text
    content: L’Éternel des armées est avec nous,
  - type: text
    content: 'Le Dieu de Jacob est pour nous une haute retraite. '
  - type: text
    content: — Pause.
  '9':
  - type: text
    content: Venez, contemplez les œuvres de l’Éternel,
  - type: text
    content: Les ravages qu’il a opérés sur la terre!
