document_id: PSA.46,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Ps 75; 76.) (És 36; 37.) Ps 48.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au chef des chantres. Des fils de Koré. Sur alamoth. Cantique.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est lui qui a fait cesser les combats jusqu’au bout de la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a brisé l’arc, et il a rompu la lance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a consumé par le feu les chars de guerre.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Arrêtez, et sachez que je suis Dieu:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je domine sur les nations, je domine sur la terre.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel des armées est avec nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le Dieu de Jacob est pour nous une haute retraite. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu est pour nous un refuge et un appui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un secours qui ne manque jamais dans la détresse.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi nous sommes sans crainte quand la terre est bouleversée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que les montagnes chancellent au cœur des mers,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand les flots de la mer mugissent, écument,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Se soulèvent jusqu’à faire trembler les montagnes. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est un fleuve dont les courants réjouissent la cité de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sanctuaire des demeures du Très-Haut.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dieu est au milieu d’elle: elle n’est point ébranlée;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu la secourt dès l’aube du matin.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des nations s’agitent, des royaumes s’ébranlent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il fait entendre sa voix: la terre se fond d’épouvante.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel des armées est avec nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le Dieu de Jacob est pour nous une haute retraite. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Venez, contemplez les œuvres de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les ravages qu’il a opérés sur la terre!
