document_id: PSA.46
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: (Ps 75; 76.) (És 36; 37.) Ps 48.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. Des fils de Koré. Sur alamoth. Cantique.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dieu est pour nous un refuge et un appui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un secours qui ne manque jamais dans la détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C’est pourquoi nous sommes sans crainte quand la terre est bouleversée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que les montagnes chancellent au cœur des mers,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Quand les flots de la mer mugissent, écument,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Se soulèvent jusqu’à faire trembler les montagnes. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il est un fleuve dont les courants réjouissent la cité de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le sanctuaire des demeures du Très-Haut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dieu est au milieu d’elle: elle n’est point ébranlée;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu la secourt dès l’aube du matin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Des nations s’agitent, des royaumes s’ébranlent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il fait entendre sa voix: la terre se fond d’épouvante.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’Éternel des armées est avec nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Le Dieu de Jacob est pour nous une haute retraite. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Venez, contemplez les œuvres de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les ravages qu’il a opérés sur la terre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: C’est lui qui a fait cesser les combats jusqu’au bout de la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a brisé l’arc, et il a rompu la lance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a consumé par le feu les chars de guerre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Arrêtez, et sachez que je suis Dieu:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je domine sur les nations, je domine sur la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L’Éternel des armées est avec nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Le Dieu de Jacob est pour nous une haute retraite. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
