document_id: SNG.4,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: '4 v. 1 à 5 v. 1: cf. Ca 6:4-10; 7:7-9.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Que tu es belle, mon amie, que tu es belle!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes yeux sont des colombes,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ca 4:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Derrière ton voile.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ca 6:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tes cheveux sont comme un troupeau de chèvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Suspendues aux flancs de la montagne de Galaad.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Que de charmes dans ton amour, ma sœur, ma fiancée!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme ton amour vaut mieux que le vin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et combien tes parfums sont plus suaves que tous les aromates!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tes lèvres distillent le miel, ma fiancée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a sous ta langue du miel et du lait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’odeur de tes vêtements est comme l’odeur du Liban.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tu es un jardin fermé, ma sœur, ma fiancée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une source fermée, une fontaine scellée.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tes jets forment un jardin, où sont des grenadiers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec les fruits les plus excellents,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les troënes avec le nard;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Le nard et le safran, le roseau aromatique et le cinnamome,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec tous les arbres qui donnent l’encens;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La myrrhe et l’aloès,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec tous les principaux aromates;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Une fontaine des jardins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une source d’eaux vives,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des ruisseaux du Liban.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Lève-toi, aquilon! Viens, autan!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soufflez sur mon jardin, et que les parfums s’en exhalent!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que mon bien-aimé entre dans son jardin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il mange de ses fruits excellents!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tes dents sont comme un troupeau de brebis tondues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui remontent de l’abreuvoir;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes portent des jumeaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aucune d’elles n’est stérile.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tes lèvres sont comme un fil cramoisi,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 147:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 4:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et ta bouche est charmante;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta joue est comme une moitié de grenade,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Derrière ton voile.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ca 7:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ton cou est comme la tour de David,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bâtie pour être un arsenal;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mille boucliers y sont suspendus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les boucliers des héros.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ca 7:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tes deux seins sont comme deux faons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme les jumeaux d’une gazelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui paissent au milieu des lis.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Avant que le jour se rafraîchisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que les ombres fuient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’irai à la montagne de la myrrhe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et à la colline de l’encens.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tu es toute belle, mon amie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il n’y a point en toi de défaut.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Viens avec moi du Liban, ma fiancée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Viens avec moi du Liban!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Regarde du sommet de l’Amana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du sommet du Senir et de l’Hermon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des tanières des lions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des montagnes des léopards.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tu me ravis le cœur, ma sœur, ma fiancée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu me ravis le cœur par l’un de tes regards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par l’un des colliers de ton cou.
