document_id: SNG.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: '4 v. 1 à 5 v. 1: cf. Ca 6:4-10; 7:7-9.'
  - type: text
    content: Que tu es belle, mon amie, que tu es belle!
  - type: text
    content: Tes yeux sont des colombes,
  - type: note
    content: Ca 4:3; 6:7.
  - type: text
    content: Derrière ton voile.
  - type: note
    content: Ca 6:5.
  - type: text
    content: Tes cheveux sont comme un troupeau de chèvres,
  - type: text
    content: Suspendues aux flancs de la montagne de Galaad.
  '10':
  - type: text
    content: Que de charmes dans ton amour, ma sœur, ma fiancée!
  - type: text
    content: Comme ton amour vaut mieux que le vin,
  - type: text
    content: Et combien tes parfums sont plus suaves que tous les aromates!
  '11':
  - type: text
    content: Tes lèvres distillent le miel, ma fiancée;
  - type: text
    content: Il y a sous ta langue du miel et du lait,
  - type: text
    content: Et l’odeur de tes vêtements est comme l’odeur du Liban.
  '12':
  - type: text
    content: Tu es un jardin fermé, ma sœur, ma fiancée,
  - type: text
    content: Une source fermée, une fontaine scellée.
  '13':
  - type: text
    content: Tes jets forment un jardin, où sont des grenadiers,
  - type: text
    content: Avec les fruits les plus excellents,
  - type: text
    content: Les troënes avec le nard;
  '14':
  - type: text
    content: Le nard et le safran, le roseau aromatique et le cinnamome,
  - type: text
    content: Avec tous les arbres qui donnent l’encens;
  - type: text
    content: La myrrhe et l’aloès,
  - type: text
    content: Avec tous les principaux aromates;
  '15':
  - type: text
    content: Une fontaine des jardins,
  - type: text
    content: Une source d’eaux vives,
  - type: text
    content: Des ruisseaux du Liban.
  '16':
  - type: text
    content: Lève-toi, aquilon! Viens, autan!
  - type: text
    content: Soufflez sur mon jardin, et que les parfums s’en exhalent!
  - type: text
    content: Que mon bien-aimé entre dans son jardin,
  - type: text
    content: Et qu’il mange de ses fruits excellents!
  '2':
  - type: text
    content: Tes dents sont comme un troupeau de brebis tondues,
  - type: text
    content: Qui remontent de l’abreuvoir;
  - type: text
    content: Toutes portent des jumeaux,
  - type: text
    content: Aucune d’elles n’est stérile.
  '3':
  - type: text
    content: Tes lèvres sont comme un fil cramoisi,
  - type: note
    content: Ps 147:1. Col 4:6.
  - type: text
    content: Et ta bouche est charmante;
  - type: text
    content: Ta joue est comme une moitié de grenade,
  - type: text
    content: Derrière ton voile.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ca 7:4.
  - type: text
    content: Ton cou est comme la tour de David,
  - type: text
    content: Bâtie pour être un arsenal;
  - type: text
    content: Mille boucliers y sont suspendus,
  - type: text
    content: Tous les boucliers des héros.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ca 7:3.
  - type: text
    content: Tes deux seins sont comme deux faons,
  - type: text
    content: Comme les jumeaux d’une gazelle,
  - type: text
    content: Qui paissent au milieu des lis.
  '6':
  - type: text
    content: Avant que le jour se rafraîchisse,
  - type: text
    content: Et que les ombres fuient,
  - type: text
    content: J’irai à la montagne de la myrrhe
  - type: text
    content: Et à la colline de l’encens.
  '7':
  - type: text
    content: Tu es toute belle, mon amie,
  - type: text
    content: Et il n’y a point en toi de défaut.
  '8':
  - type: text
    content: Viens avec moi du Liban, ma fiancée,
  - type: text
    content: Viens avec moi du Liban!
  - type: text
    content: Regarde du sommet de l’Amana,
  - type: text
    content: Du sommet du Senir et de l’Hermon,
  - type: text
    content: Des tanières des lions,
  - type: text
    content: Des montagnes des léopards.
  '9':
  - type: text
    content: Tu me ravis le cœur, ma sœur, ma fiancée,
  - type: text
    content: Tu me ravis le cœur par l’un de tes regards,
  - type: text
    content: Par l’un des colliers de ton cou.
