document_id: PSA.44,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 2 S 8. Ps 60; 77:11-13; 89. És 51:9, 10.
  - type: text
    content: Au chef des chantres. Des fils de Koré. Cantique.
  '10':
  - type: text
    content: 'Cependant tu nous '
  - type: note
    content: Ps 60:3; 74:1; 89:39; 108:12.
  - type: text
    content: repousses, tu nous couvres de honte,
  - type: text
    content: Tu ne sors plus avec nos armées;
  '11':
  - type: text
    content: Tu nous fais reculer devant l’ennemi,
  - type: text
    content: Et ceux qui nous haïssent enlèvent nos dépouilles.
  '12':
  - type: text
    content: Tu nous livres comme des brebis à dévorer,
  - type: text
    content: Tu nous disperses parmi les nations.
  '13':
  - type: text
    content: Tu vends ton peuple pour rien,
  - type: text
    content: Tu ne l’estimes pas à une grande valeur.
  '14':
  - type: text
    content: 'Tu fais de nous '
  - type: note
    content: Ps 79:4; 80:7. Jé 24:9.
  - type: text
    content: un objet d’opprobre pour nos voisins,
  - type: text
    content: De moquerie et de risée pour ceux qui nous entourent;
  '15':
  - type: text
    content: Tu fais de nous un objet de sarcasme parmi les nations,
  - type: text
    content: Et de hochements de tête parmi les peuples.
  '16':
  - type: text
    content: Ma honte est toujours devant moi,
  - type: text
    content: Et la confusion couvre mon visage,
  '17':
  - type: text
    content: A la voix de celui qui m’insulte et m’outrage,
  - type: text
    content: A la vue de l’ennemi et du vindicatif.
  '18':
  - type: text
    content: Tout cela nous arrive, sans que nous t’ayons oublié,
  - type: text
    content: 'Sans que nous ayons violé ton alliance:'
  '19':
  - type: text
    content: Notre cœur ne s’est point détourné,
  - type: text
    content: Nos pas ne se sont point éloignés de ton sentier,
  '2':
  - type: text
    content: O Dieu! Nous avons entendu de nos oreilles,
  - type: text
    content: Nos pères nous ont raconté
  - type: text
    content: Les œuvres que tu as accomplies de leur temps,
  - type: text
    content: Aux jours d’autrefois.
  '20':
  - type: text
    content: Pour que tu nous écrases dans la demeure des chacals,
  - type: text
    content: Et que tu nous couvres de l’ombre de la mort.
  '21':
  - type: text
    content: Si nous avions oublié le nom de notre Dieu,
  - type: text
    content: Et étendu nos mains vers un dieu étranger,
  '22':
  - type: text
    content: Dieu ne le saurait-il pas,
  - type: text
    content: Lui qui connaît les secrets du cœur?
  '23':
  - type: text
    content: ' '
  - type: note
    content: Ro 8:36.
  - type: text
    content: Mais c’est à cause de toi qu’on nous égorge tous les jours,
  - type: text
    content: Qu’on nous regarde comme des brebis destinées à la boucherie.
  '24':
  - type: text
    content: Réveille-toi! Pourquoi dors-tu, Seigneur?
  - type: text
    content: Réveille-toi! Ne nous repousse pas à jamais!
  '25':
  - type: text
    content: Pourquoi caches-tu ta face?
  - type: text
    content: Pourquoi oublies-tu notre misère et notre oppression?
  '26':
  - type: text
    content: Car notre âme est abattue dans la poussière,
  - type: text
    content: Notre corps est attaché à la terre.
  '27':
  - type: text
    content: Lève-toi, pour nous secourir!
  - type: text
    content: Délivre-nous à cause de ta bonté!
  '3':
  - type: text
    content: 'De ta main tu as chassé des nations '
  - type: note
    content: Ex 15:17. Ps 80:9.
  - type: text
    content: pour les établir,
  - type: text
    content: Tu as frappé des peuples pour les étendre.
  '4':
  - type: text
    content: Car ce n’est point par leur épée qu’ils se sont emparés du pays,
  - type: text
    content: Ce n’est point leur bras qui les a sauvés;
  - type: text
    content: Mais c’est ta droite, c’est ton bras, c’est la lumière de ta face,
  - type: text
    content: Parce que tu les aimais.
  '5':
  - type: text
    content: 'O Dieu! Tu es mon roi:'
  - type: text
    content: Ordonne la délivrance de Jacob!
  '6':
  - type: text
    content: Avec toi nous renversons nos ennemis,
  - type: text
    content: Avec ton nom nous écrasons nos adversaires.
  '7':
  - type: text
    content: Car ce n’est pas en mon arc que je me confie,
  - type: text
    content: Ce n’est pas mon épée qui me sauvera;
  '8':
  - type: text
    content: Mais c’est toi qui nous délivres de nos ennemis,
  - type: text
    content: Et qui confonds ceux qui nous haïssent.
  '9':
  - type: text
    content: Nous nous glorifions en Dieu chaque jour,
  - type: text
    content: 'Et nous célébrerons à jamais ton nom. '
  - type: text
    content: — Pause.
