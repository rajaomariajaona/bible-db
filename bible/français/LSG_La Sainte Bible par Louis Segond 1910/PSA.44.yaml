document_id: PSA.44,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2 S 8. Ps 60; 77:11-13; 89. És 51:9, 10.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef des chantres. Des fils de Koré. Cantique.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Cependant tu nous '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 60:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 74:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 89:39
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 108:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: repousses, tu nous couvres de honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne sors plus avec nos armées;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tu nous fais reculer devant l’ennemi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux qui nous haïssent enlèvent nos dépouilles.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tu nous livres comme des brebis à dévorer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu nous disperses parmi les nations.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tu vends ton peuple pour rien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne l’estimes pas à une grande valeur.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Tu fais de nous '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 79:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 80:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 24:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: un objet d’opprobre pour nos voisins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De moquerie et de risée pour ceux qui nous entourent;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tu fais de nous un objet de sarcasme parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de hochements de tête parmi les peuples.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ma honte est toujours devant moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la confusion couvre mon visage,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: A la voix de celui qui m’insulte et m’outrage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la vue de l’ennemi et du vindicatif.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Tout cela nous arrive, sans que nous t’ayons oublié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sans que nous ayons violé ton alliance:'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Notre cœur ne s’est point détourné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nos pas ne se sont point éloignés de ton sentier,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: O Dieu! Nous avons entendu de nos oreilles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nos pères nous ont raconté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les œuvres que tu as accomplies de leur temps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux jours d’autrefois.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Pour que tu nous écrases dans la demeure des chacals,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que tu nous couvres de l’ombre de la mort.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Si nous avions oublié le nom de notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et étendu nos mains vers un dieu étranger,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Dieu ne le saurait-il pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui qui connaît les secrets du cœur?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 8:36
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais c’est à cause de toi qu’on nous égorge tous les jours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’on nous regarde comme des brebis destinées à la boucherie.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Réveille-toi! Pourquoi dors-tu, Seigneur?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réveille-toi! Ne nous repousse pas à jamais!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Pourquoi caches-tu ta face?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi oublies-tu notre misère et notre oppression?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Car notre âme est abattue dans la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Notre corps est attaché à la terre.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Lève-toi, pour nous secourir!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-nous à cause de ta bonté!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'De ta main tu as chassé des nations '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 15:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 80:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: pour les établir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as frappé des peuples pour les étendre.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Car ce n’est point par leur épée qu’ils se sont emparés du pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n’est point leur bras qui les a sauvés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais c’est ta droite, c’est ton bras, c’est la lumière de ta face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que tu les aimais.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'O Dieu! Tu es mon roi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ordonne la délivrance de Jacob!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Avec toi nous renversons nos ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec ton nom nous écrasons nos adversaires.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Car ce n’est pas en mon arc que je me confie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n’est pas mon épée qui me sauvera;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mais c’est toi qui nous délivres de nos ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui confonds ceux qui nous haïssent.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nous nous glorifions en Dieu chaque jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et nous célébrerons à jamais ton nom. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
