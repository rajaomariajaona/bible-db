      metadata:
        usfm: EPH.1.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est pour cela que nous aussi, depuis le jour où nous en avons été informés, nous ne cessons de prier Dieu pour vous, et de demander '
