  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: et qui nous a appris de quelle charité l’Esprit vous anime.
- type: usfm
  marker: r
  children:
  - type: text
