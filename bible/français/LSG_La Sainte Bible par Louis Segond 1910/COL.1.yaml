- type: usfm
  marker: s1
  children:
  - type: text
    text: Foi et charité des Colossiens. Prière de l’apôtre pour leurs progrès spirituels. Jésus-Christ, auteur de notre rédemption, image du Dieu invisible, créateur de toutes choses, et chef de l’Église
  marker-yv: yv-h
