document_id: COL.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: heading
    content: 'V. 1-2: cf. 2 Co 1:1, 2. Ép 1:1, 2.'
  - type: text
    content: 'Paul, apôtre de Jésus-Christ par la volonté de Dieu, et le frère Timothée, '
  '10':
  - type: note
    content: Ge 17:1. 1 Co 7:20. Ép 4:1. Ph 1:27. 1 Th 2:12.
  - type: text
    content: 'pour marcher d’une manière digne du Seigneur et lui être entièrement agréables, '
  - type: note
    content: Jn 15:16.
  - type: text
    content: 'portant des fruits en toutes sortes de bonnes œuvres et croissant par la connaissance de Dieu, '
  '11':
  - type: text
    content: fortifiés à tous égards par sa puissance glorieuse, en sorte que vous soyez toujours et avec joie persévérants et patients.
  - type: heading
    content: 'V. 12-23: cf. Ac 26:17, 18. (Jn 1:1-3, 14, 16. Hé 1.) 1 Co 15:20-23. (Ép 2:13-19; 5:23-27.)'
  '12':
  - type: text
    content: 'Rendez grâces au Père, qui vous a rendus capables d’avoir part à l’héritage des saints dans la lumière, '
  '13':
  - type: note
    content: Ép 2:4. 1 Th 2:12.
  - type: text
    content: 'qui nous a délivrés de la puissance des ténèbres et nous a transportés dans le royaume '
  - type: note
    content: Mt 3:17; 17:5. 1 Pi 1:17.
  - type: text
    content: 'du Fils de son amour, '
  '14':
  - type: note
    content: Ac 20:28. Ép 1:7. Hé 9:14. 1 Pi 1:19
  - type: text
    content: 'en qui nous avons la rédemption, la rémission des péchés. '
  '15':
  - type: note
    content: 2 Co 4:4. Ph 2:6. Hé 1:3.
  - type: text
    content: 'Il est l’image du Dieu invisible, '
  - type: note
    content: Ap 3:14.
  - type: text
    content: 'le premier-né de toute la création. '
  '16':
  - type: note
    content: Ge 1:3. Ps 33:6. Jn 1:3. Ép 3:9. Hé 1:2.
  - type: text
    content: 'Car en lui ont été créées toutes les choses qui sont dans les cieux et sur la terre, les visibles et les invisibles, trônes, dignités, dominations, autorités. Tout a été créé par lui et pour lui. '
  '17':
  - type: text
    content: 'Il est avant toutes choses, et toutes choses subsistent en lui. '
  '18':
  - type: note
    content: Ép 1:22; 4:15; 5:23.
  - type: text
    content: 'Il est la tête du corps de l’Église; il est le commencement, '
  - type: note
    content: 1 Co 15:20. Ap 1:5.
  - type: text
    content: 'le premier-né d’entre les morts, afin d’être en tout le premier. '
  '19':
  - type: text
    content: 'Car Dieu a voulu que toute plénitude habitât '
  - type: note
    content: Jn 1:14, 16. Col 2:9.
  - type: text
    content: 'en lui; '
  '2':
  - type: text
    content: 'aux saints et fidèles frères en Christ qui sont à Colosses; '
  - type: note
    content: Ro 1:7. Ga 1:3. Ép 1:2. 1 Pi 1:2.
  - type: text
    content: que la grâce et la paix vous soient données de la part de Dieu notre Père!
  - type: heading
    content: Foi et charité des Colossiens. Prière de l’apôtre pour leurs progrès spirituels. Jésus-Christ, auteur de notre rédemption, image du Dieu invisible, créateur de toutes choses, et chef de l’Église
  - type: heading
    content: 'V. 3-8: cf. Ph 1:3-6. 1 Th 1:2-4.'
  '20':
  - type: note
    content: 2 Co 5:18. 1 Jn 4:10.
  - type: text
    content: 'il a voulu par lui réconcilier tout avec lui-même, tant ce qui est sur la terre que ce qui est dans les cieux, en faisant '
  - type: note
    content: És 9:6. Jn 16:33. Ac 10:36. Ro 5:1. Ép 2:14.
  - type: text
    content: 'la paix par lui, par le sang de sa croix. '
  '21':
  - type: text
    content: 'Et vous, qui étiez autrefois étrangers et ennemis par vos pensées et par vos mauvaises œuvres, il vous a maintenant réconciliés par sa mort dans le corps de sa chair, '
  '22':
  - type: note
    content: Lu 1:75. Ép 1:4; 5:27. 2 Ti 1:9. Tit 2:12.
  - type: text
    content: 'pour vous faire paraître devant lui saints, irrépréhensibles et sans reproche, '
  '23':
  - type: note
    content: Jn 15:6.
  - type: text
    content: si du moins vous demeurez fondés et inébranlables dans la foi, sans vous détourner de l’espérance de l’Évangile que vous avez entendu, qui a été prêché à toute créature sous le ciel, et dont moi Paul, j’ai été fait ministre.
  - type: heading
    content: Travaux et combats de Paul dans son ministère parmi les païens
  - type: heading
    content: 'V. 24-29: cf. Ép 3:1-13. 1 Co 2:7-13.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 2 Co 7:4.
  - type: text
    content: 'Je me réjouis maintenant dans mes souffrances '
  - type: note
    content: Ép 3:13. Ph 2:17. 2 Ti 2:10.
  - type: text
    content: 'pour vous; et ce qui manque aux souffrances de Christ, je l’achève en ma chair, '
  - type: note
    content: Ro 12:5. 1 Co 12:27. Ép 4:12; 5:23.
  - type: text
    content: 'pour son corps, qui est l’Église. '
  '25':
  - type: text
    content: 'C’est d’elle que j’ai été fait ministre, selon la charge '
  - type: note
    content: Ro 16:25. Ép 1:9; 3:9. 2 Ti 1:10. Tit 1:3. 1 Pi 1:20.
  - type: text
    content: 'que Dieu m’a donnée auprès de vous, afin que j’annonçasse pleinement la parole de Dieu, '
  '26':
  - type: text
    content: 'le mystère caché de tout temps et dans tous les âges, '
  - type: note
    content: Mt 13:11.
  - type: text
    content: 'mais révélé maintenant à ses saints, '
  '27':
  - type: note
    content: 2 Co 2:14.
  - type: text
    content: 'à qui Dieu a voulu faire connaître quelle est la glorieuse richesse de ce mystère parmi les païens, savoir: Christ en vous, '
  - type: note
    content: 1 Ti 1:1.
  - type: text
    content: 'l’espérance de la gloire. '
  '28':
  - type: text
    content: 'C’est lui que nous annonçons, exhortant tout homme, et instruisant tout homme en toute sagesse, afin de présenter à Dieu tout homme, devenu parfait en Christ. '
  '29':
  - type: text
    content: C’est à quoi je travaille, en combattant avec sa force, qui agit puissamment en moi.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ép 1:15. Ph 1:3. 1 Th 1:2. 2 Th 1:3.
  - type: text
    content: 'Nous rendons grâces à Dieu, le Père de notre Seigneur Jésus-Christ, et nous ne cessons de prier pour vous, '
  '4':
  - type: text
    content: 'ayant été informés de votre foi en Jésus-Christ et de votre charité pour tous les saints, '
  '5':
  - type: text
    content: 'à cause de l’espérance '
  - type: note
    content: 1 Pi 1:4.
  - type: text
    content: 'qui vous est réservée dans les cieux, et que la parole de la vérité, la parole de l’Évangile vous a précédemment fait connaître. '
  '6':
  - type: text
    content: 'Il est au milieu de vous, et dans le monde entier; '
  - type: note
    content: Mc 4:8. Jn 15:16.
  - type: text
    content: 'il porte des fruits, et il va grandissant, comme c’est aussi le cas parmi vous, depuis le jour où vous avez entendu et connu la grâce de Dieu conformément à la vérité, '
  '7':
  - type: text
    content: 'd’après les instructions que vous avez reçues '
  - type: note
    content: Col 4:12. Phm v. 23.
  - type: text
    content: 'd’Épaphras, notre bien-aimé compagnon de service, qui est pour vous un fidèle ministre de Christ, '
  '8':
  - type: text
    content: et qui nous a appris de quelle charité l’Esprit vous anime.
  - type: heading
    content: 'V. 9-11: cf. Ph 1:9-11.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ép 1:15.
  - type: text
    content: 'C’est pour cela que nous aussi, depuis le jour où nous en avons été informés, nous ne cessons de prier Dieu pour vous, et de demander '
  - type: note
    content: 1 Co 1:5.
  - type: text
    content: 'que vous soyez remplis de la connaissance de sa volonté, en toute sagesse et intelligence spirituelle, '
