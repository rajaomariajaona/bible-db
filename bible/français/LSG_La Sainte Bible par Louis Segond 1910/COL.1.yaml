  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: fortifiés à tous égards par sa puissance glorieuse, en sorte que vous soyez toujours et avec joie persévérants et patients.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-23: cf. Ac 26:17, 18. (Jn 1:1-3, 14, 16. Hé 1.) 1 Co 15:20-23. (Ép 2:13-19; 5:23-27.)'
  marker-yv: yv-h
- type: usfm
  marker: p
