      metadata:
        usfm: 1JN.4.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il a voulu par lui réconcilier tout avec lui-même, tant ce qui est sur la terre que ce qui est dans les cieux, en faisant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 9:6
      metadata:
        usfm: ISA.9.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
