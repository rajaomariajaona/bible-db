    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous rendons grâces à Dieu, le Père de notre Seigneur Jésus-Christ, et nous ne cessons de prier pour vous, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ayant été informés de votre foi en Jésus-Christ et de votre charité pour tous les saints, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'à cause de l’espérance '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:4
      metadata:
        usfm: 1PE.1.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui vous est réservée dans les cieux, et que la parole de la vérité, la parole de l’Évangile vous a précédemment fait connaître. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
