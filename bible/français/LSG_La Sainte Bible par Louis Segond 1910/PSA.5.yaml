document_id: PSA.5,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 7; 11. Pr 6:16-19.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au chef des chantres. Avec les flûtes. Psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il n’y a point de sincérité dans leur bouche;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur cœur est rempli de malice,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 34:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 94:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Leur gosier est un sépulcre ouvert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils ont sur la langue des paroles flatteuses.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Frappe-les comme des coupables, ô Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que leurs desseins amènent leur chute!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Précipite-les au milieu de leurs péchés sans nombre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils se révoltent contre toi.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors tous ceux qui se confient en toi se réjouiront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils auront de l’allégresse à toujours, et tu les protégeras;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu seras un sujet de joie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour ceux qui aiment ton nom.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu bénis le juste, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu l’entoures de ta grâce comme d’un bouclier.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prête l’oreille à mes paroles, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoute mes gémissements!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois attentif à mes cris, mon roi et mon Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est à toi que j’adresse ma prière.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel! Le matin tu entends ma voix;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le matin je me tourne vers toi, et je regarde.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu n’es point un Dieu qui prenne plaisir au mal;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant n’a pas sa demeure auprès de toi.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les insensés ne subsistent pas devant tes yeux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu hais tous ceux qui commettent l’iniquité.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu fais périr les menteurs;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel abhorre les hommes de sang et de fraude.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais moi, par ta grande miséricorde, je vais à ta maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me prosterne dans ton saint temple avec crainte.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel! Conduis-moi dans ta justice, à cause de mes ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aplanis ta voie sous mes pas.
