document_id: PSA.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 7; 11. Pr 6:16-19.
  - type: text
    content: Au chef des chantres. Avec les flûtes. Psaume de David.
  '10':
  - type: text
    content: Car il n’y a point de sincérité dans leur bouche;
  - type: text
    content: Leur cœur est rempli de malice,
  - type: note
    content: Ps 34:17; 94:20. Ro 3:13.
  - type: text
    content: Leur gosier est un sépulcre ouvert,
  - type: text
    content: Et ils ont sur la langue des paroles flatteuses.
  '11':
  - type: text
    content: Frappe-les comme des coupables, ô Dieu!
  - type: text
    content: Que leurs desseins amènent leur chute!
  - type: text
    content: Précipite-les au milieu de leurs péchés sans nombre!
  - type: text
    content: Car ils se révoltent contre toi.
  '12':
  - type: text
    content: Alors tous ceux qui se confient en toi se réjouiront,
  - type: text
    content: Ils auront de l’allégresse à toujours, et tu les protégeras;
  - type: text
    content: Tu seras un sujet de joie
  - type: text
    content: Pour ceux qui aiment ton nom.
  '13':
  - type: text
    content: Car tu bénis le juste, ô Éternel!
  - type: text
    content: Tu l’entoures de ta grâce comme d’un bouclier.
  '2':
  - type: text
    content: Prête l’oreille à mes paroles, ô Éternel!
  - type: text
    content: Écoute mes gémissements!
  '3':
  - type: text
    content: Sois attentif à mes cris, mon roi et mon Dieu!
  - type: text
    content: C’est à toi que j’adresse ma prière.
  '4':
  - type: text
    content: Éternel! Le matin tu entends ma voix;
  - type: text
    content: Le matin je me tourne vers toi, et je regarde.
  '5':
  - type: text
    content: Car tu n’es point un Dieu qui prenne plaisir au mal;
  - type: text
    content: Le méchant n’a pas sa demeure auprès de toi.
  '6':
  - type: text
    content: Les insensés ne subsistent pas devant tes yeux;
  - type: text
    content: Tu hais tous ceux qui commettent l’iniquité.
  '7':
  - type: text
    content: Tu fais périr les menteurs;
  - type: text
    content: L’Éternel abhorre les hommes de sang et de fraude.
  '8':
  - type: text
    content: Mais moi, par ta grande miséricorde, je vais à ta maison,
  - type: text
    content: Je me prosterne dans ton saint temple avec crainte.
  '9':
  - type: text
    content: Éternel! Conduis-moi dans ta justice, à cause de mes ennemis,
  - type: text
    content: Aplanis ta voie sous mes pas.
