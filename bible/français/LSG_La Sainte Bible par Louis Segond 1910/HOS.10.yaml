document_id: HOS.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ruine du royaume des dix tribus
  - type: heading
    content: 'V. 1-11: cf. Os 13:1-11. 2 R 17:1-6.'
  - type: text
    content: Israël était une vigne féconde,
  - type: text
    content: Qui rendait beaucoup de fruits.
  - type: text
    content: Plus ses fruits étaient abondants,
  - type: text
    content: 'Plus il a multiplié les '
  - type: note
    content: Os 8:11.
  - type: text
    content: autels;
  - type: text
    content: Plus son pays était prospère,
  - type: text
    content: Plus il a embelli les statues.
  '10':
  - type: text
    content: Je les châtierai à mon gré,
  - type: text
    content: Et des peuples s’assembleront contre eux,
  - type: text
    content: Quand on les enchaînera pour leur double iniquité.
  '11':
  - type: text
    content: Éphraïm est une génisse dressée, et qui aime à fouler le grain,
  - type: text
    content: Mais je m’approcherai de son beau cou;
  - type: text
    content: J’attellerai Éphraïm, Juda labourera, Jacob hersera.
  - type: heading
    content: 'V. 12-15: cf. Pr 11:18. Ga 6:7-9.'
  '12':
  - type: text
    content: Semez selon la justice, moissonnez selon la miséricorde,
  - type: note
    content: Jé 4:3.
  - type: text
    content: Défrichez-vous un champ nouveau!
  - type: text
    content: Il est temps de chercher l’Éternel,
  - type: text
    content: Jusqu’à ce qu’il vienne, et répande pour vous la justice.
  '13':
  - type: text
    content: Vous avez cultivé le mal, moissonné l’iniquité,
  - type: text
    content: Mangé le fruit du mensonge;
  - type: text
    content: Car tu as eu confiance dans ta voie,
  - type: text
    content: Dans le nombre de tes vaillants hommes.
  '14':
  - type: text
    content: Il s’élèvera un tumulte parmi ton peuple,
  - type: text
    content: Et toutes tes forteresses seront détruites,
  - type: text
    content: Comme fut détruite Schalman Beth-Arbel,
  - type: text
    content: Au jour de la guerre,
  - type: text
    content: Où la mère fut écrasée avec les enfants.
  '15':
  - type: text
    content: Voilà ce que vous attirera Béthel,
  - type: text
    content: A cause de votre extrême méchanceté,
  - type: text
    content: Vienne l’aurore, et c’en est fait du roi d’Israël.
  '2':
  - type: text
    content: 'Leur cœur est partagé: ils vont en porter la peine.'
  - type: text
    content: L’Éternel renversera leurs autels, détruira leurs statues.
  '3':
  - type: text
    content: 'Et bientôt ils diront: Nous n’avons '
  - type: note
    content: Os 3:4.
  - type: text
    content: point de roi,
  - type: text
    content: Car nous n’avons pas craint l’Éternel;
  - type: text
    content: Et le roi, que pourrait-il faire pour nous?
  '4':
  - type: text
    content: Ils prononcent des paroles vaines, des serments faux,
  - type: text
    content: 'Lorsqu’ils concluent une alliance:'
  - type: text
    content: Aussi le châtiment germera, comme une plante vénéneuse
  - type: text
    content: Dans les sillons des champs.
  '5':
  - type: text
    content: Les habitants de Samarie seront consternés au sujet des veaux de Beth-Aven;
  - type: text
    content: Le peuple mènera deuil sur l’idole,
  - type: text
    content: Et ses prêtres trembleront pour elle,
  - type: text
    content: Pour sa gloire, qui va disparaître du milieu d’eux.
  '6':
  - type: text
    content: Elle sera transportée en Assyrie,
  - type: text
    content: Pour servir de présent au roi Jareb.
  - type: text
    content: La confusion saisira Éphraïm,
  - type: text
    content: Et Israël aura honte de ses desseins.
  '7':
  - type: text
    content: C’en est fait de Samarie, de son roi,
  - type: text
    content: Comme de l’écume à la surface des eaux.
  '8':
  - type: text
    content: Les hauts lieux de Beth-Aven, où Israël a péché, seront détruits;
  - type: text
    content: L’épine et la ronce croîtront sur leurs autels.
  - type: note
    content: És 2:19. Lu 23:30. Ap 6:16; 9:6.
  - type: text
    content: 'Ils diront aux montagnes: Couvrez-nous!'
  - type: text
    content: 'Et aux collines: Tombez sur nous!'
  '9':
  - type: text
    content: 'Depuis les jours de '
  - type: note
    content: Os 9:9.
  - type: text
    content: Guibea tu as péché, Israël!
  - type: text
    content: Là ils restèrent debout,
  - type: text
    content: La guerre contre les méchants ne les atteignit pas à Guibea.
