document_id: HOS.10,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ruine du royaume des dix tribus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. Os 13:1-11. 2 R 17:1-6.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël était une vigne féconde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui rendait beaucoup de fruits.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus ses fruits étaient abondants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Plus il a multiplié les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 8:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: autels;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus son pays était prospère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus il a embelli les statues.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les châtierai à mon gré,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et des peuples s’assembleront contre eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand on les enchaînera pour leur double iniquité.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éphraïm est une génisse dressée, et qui aime à fouler le grain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais je m’approcherai de son beau cou;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’attellerai Éphraïm, Juda labourera, Jacob hersera.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-15: cf. Pr 11:18. Ga 6:7-9.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Semez selon la justice, moissonnez selon la miséricorde,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 4:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Défrichez-vous un champ nouveau!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est temps de chercher l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ce qu’il vienne, et répande pour vous la justice.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous avez cultivé le mal, moissonné l’iniquité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mangé le fruit du mensonge;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu as eu confiance dans ta voie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans le nombre de tes vaillants hommes.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’élèvera un tumulte parmi ton peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toutes tes forteresses seront détruites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme fut détruite Schalman Beth-Arbel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au jour de la guerre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où la mère fut écrasée avec les enfants.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà ce que vous attirera Béthel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de votre extrême méchanceté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vienne l’aurore, et c’en est fait du roi d’Israël.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Leur cœur est partagé: ils vont en porter la peine.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel renversera leurs autels, détruira leurs statues.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et bientôt ils diront: Nous n’avons '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 3:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: point de roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car nous n’avons pas craint l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le roi, que pourrait-il faire pour nous?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils prononcent des paroles vaines, des serments faux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lorsqu’ils concluent une alliance:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi le châtiment germera, comme une plante vénéneuse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les sillons des champs.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les habitants de Samarie seront consternés au sujet des veaux de Beth-Aven;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le peuple mènera deuil sur l’idole,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses prêtres trembleront pour elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour sa gloire, qui va disparaître du milieu d’eux.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle sera transportée en Assyrie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour servir de présent au roi Jareb.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La confusion saisira Éphraïm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Israël aura honte de ses desseins.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’en est fait de Samarie, de son roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme de l’écume à la surface des eaux.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les hauts lieux de Beth-Aven, où Israël a péché, seront détruits;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’épine et la ronce croîtront sur leurs autels.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 2:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 6:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils diront aux montagnes: Couvrez-nous!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et aux collines: Tombez sur nous!'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Depuis les jours de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 9:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Guibea tu as péché, Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là ils restèrent debout,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La guerre contre les méchants ne les atteignit pas à Guibea.
