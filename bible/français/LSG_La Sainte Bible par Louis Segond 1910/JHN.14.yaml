document_id: JHN.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-14: cf. 2 Co 4:17 à 5:1. Hé 9:24; 10:19-22. Col 3:1-4; 2:9, 10. Jn 16:23, 24.'
  - type: text
    content: ' '
  - type: text
    content: Que votre cœur ne se trouble point. Croyez en Dieu, et croyez en moi.
  - type: text
    content: ' '
  '10':
  - type: text
    content: ' '
  - type: text
    content: Ne crois-tu pas
  - type: text
    content: ' '
  - type: note
    content: Jn 10:38.
  - type: text
    content: que je suis dans le Père, et que le Père est en moi?
  - type: text
    content: ' '
  - type: note
    content: Jn 7:16; 8:28; 10:38; 12:49; 14:14; 16:13; 17:21.
  - type: text
    content: Les paroles que je vous dis, je ne les dis pas de moi-même;
  - type: text
    content: ' '
  - type: note
    content: Jn 5:17.
  - type: text
    content: et le Père qui demeure en moi, c’est lui qui fait les œuvres.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Croyez-moi, je suis dans le Père, et le Père est en moi; croyez du moins à cause de ces œuvres.
  - type: text
    content: ' '
  '12':
  - type: note
    content: Mt 21:21. Lu 17:6. Ac 5:12; 19:11.
  - type: text
    content: En vérité, en vérité, je vous le dis, celui qui croit en moi fera aussi les œuvres que je fais, et il en fera de plus grandes, parce que je m’en vais au Père;
  - type: text
    content: ' '
  '13':
  - type: note
    content: Jé 29:12. Mt 7:7; 21:22. Mc 11:24. Lu 11:9. Jn 15:7; 16:24. Ja 1:5. 1 Jn 3:22.
  - type: text
    content: et tout ce que vous demanderez en mon nom, je le ferai, afin que le Père soit glorifié dans le Fils.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Si vous demandez quelque chose en mon nom, je le ferai.
  - type: heading
    content: 'V. 15-31: cf. (1 Jn 5:3; 2:3-5.) Jn 16:5-15, 33. Ph 4:6, 7.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Jn 14:21, 23; 15:10. 1 Jn 5:3.
  - type: text
    content: Si vous m’aimez, gardez mes commandements.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Et moi, je prierai le Père, et il vous donnera un autre consolateur, afin qu’il demeure éternellement avec vous,
  - type: text
    content: ' '
  '17':
  - type: text
    content: l’Esprit de vérité, que le monde ne peut recevoir, parce qu’il ne le voit point et ne le connaît point; mais vous, vous le connaissez, car il demeure avec vous, et il sera en vous.
  - type: text
    content: ' '
  '18':
  - type: note
    content: Mt 28:20.
  - type: text
    content: Je ne vous laisserai pas orphelins, je viendrai à vous.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Encore un peu de temps, et le monde ne me verra plus; mais vous, vous me verrez, car je vis, et vous vivrez aussi.
  - type: text
    content: ' '
  '2':
  - type: text
    content: Il y a plusieurs demeures dans la maison de mon Père. Si cela n’était pas, je vous l’aurais dit. Je vais vous préparer une place.
  - type: text
    content: ' '
  '20':
  - type: text
    content: En ce jour-là, vous connaîtrez que je suis en mon Père, que vous êtes en moi, et que je suis en vous.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Celui qui a mes commandements et qui les garde, c’est celui qui m’aime; et celui qui m’aime sera aimé de mon Père, je l’aimerai, et je me ferai connaître à lui.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Jude, non pas l’Iscariot, lui dit: Seigneur, d’où vient que tu te feras connaître à nous, et non au monde? '
  '23':
  - type: text
    content: 'Jésus lui répondit: '
  - type: text
    content: Si quelqu’un m’aime, il gardera ma parole, et mon Père l’aimera; nous viendrons à lui, et nous ferons notre demeure chez lui.
  '24':
  - type: text
    content: ' '
  - type: text
    content: Celui qui ne m’aime pas ne garde point mes paroles.
  - type: text
    content: ' '
  - type: note
    content: Jn 7:16; 8:28; 12:49; 14:10; 16:13.
  - type: text
    content: Et la parole que vous entendez n’est pas de moi, mais du Père qui m’a envoyé.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Je vous ai dit ces choses pendant que je demeure avec vous.
  - type: text
    content: ' '
  '26':
  - type: note
    content: Lu 24:49. Jn 15:26; 16:7. Ac 2:4.
  - type: text
    content: Mais le consolateur, l’Esprit-Saint, que le Père enverra en mon nom,
  - type: text
    content: ' '
  - type: note
    content: Jn 16:13.
  - type: text
    content: vous enseignera toutes choses, et vous rappellera tout ce que je vous ai dit.
  - type: text
    content: ' '
  '27':
  - type: note
    content: Ph 4:7.
  - type: text
    content: Je vous laisse la paix, je vous donne ma paix. Je ne vous donne pas comme le monde donne. Que votre cœur ne se trouble point, et ne s’alarme point.
  - type: text
    content: ' '
  '28':
  - type: note
    content: Jn 14:3.
  - type: text
    content: 'Vous avez entendu que je vous ai dit: Je m’en vais, et je reviens vers vous. Si vous m’aimiez, vous vous réjouiriez de ce que je vais au Père; car le Père est plus grand que moi.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: Et maintenant je vous ai dit ces choses avant qu’elles arrivent,
  - type: text
    content: ' '
  - type: note
    content: Jn 13:19; 16:4.
  - type: text
    content: afin que, lorsqu’elles arriveront, vous croyiez.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Et, lorsque je m’en serai allé, et que je vous aurai préparé une place, je reviendrai, et je vous prendrai avec moi,
  - type: text
    content: ' '
  - type: note
    content: Jn 12:26; 17:24.
  - type: text
    content: afin que là où je suis vous y soyez aussi.
  - type: text
    content: ' '
  '30':
  - type: text
    content: Je ne parlerai plus guère avec vous;
  - type: text
    content: ' '
  - type: note
    content: Jn 13:21; 16:11. Ép 2:2.
  - type: text
    content: car le prince du monde vient. Il n’a rien en moi;
  - type: text
    content: ' '
  '31':
  - type: text
    content: mais afin que le monde sache que j’aime le Père, et que j’agis selon
  - type: text
    content: ' '
  - type: note
    content: Jn 10:13. Hé 10:5.
  - type: text
    content: l’ordre que le Père m’a donné, levez-vous, partons d’ici.
  '4':
  - type: text
    content: Vous savez où je vais, et vous en savez le chemin.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Thomas lui dit: Seigneur, nous ne savons où tu vas; comment pouvons-nous en savoir le chemin? '
  '6':
  - type: text
    content: 'Jésus lui dit: '
  - type: note
    content: Hé 9:8.
  - type: text
    content: Je suis le chemin,
  - type: text
    content: ' '
  - type: note
    content: Jn 1:17.
  - type: text
    content: la vérité,
  - type: text
    content: ' '
  - type: note
    content: Jn 1:4; 11:25.
  - type: text
    content: et la vie.
  - type: text
    content: ' '
  - type: note
    content: Jn 10:9.
  - type: text
    content: Nul ne vient au Père que par moi.
  '7':
  - type: text
    content: ' '
  - type: text
    content: Si vous me connaissiez, vous connaîtriez aussi mon Père. Et dès maintenant vous le connaissez, et vous l’avez vu.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Philippe lui dit: Seigneur, montre-nous le Père, et cela nous suffit. '
  '9':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: Il y a si longtemps que je suis avec vous, et tu ne m’as pas connu, Philippe!
  - type: text
    content: ' '
  - type: note
    content: Jn 10:30.
  - type: text
    content: 'Celui qui m’a vu a vu le Père; comment dis-tu: Montre-nous le Père?'
