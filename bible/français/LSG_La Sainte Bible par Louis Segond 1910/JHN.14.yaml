  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Croyez-moi, je suis dans le Père, et le Père est en moi; croyez du moins à cause de ces œuvres.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
