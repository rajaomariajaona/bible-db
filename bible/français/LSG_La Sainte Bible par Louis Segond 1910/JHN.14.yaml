  - type: usfm
    marker: wj
    children:
    - type: text
      text: et tout ce que vous demanderez en mon nom, je le ferai, afin que le Père soit glorifié dans le Fils.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
