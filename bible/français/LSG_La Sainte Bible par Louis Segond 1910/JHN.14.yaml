  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il y a plusieurs demeures dans la maison de mon Père. Si cela n’était pas, je vous l’aurais dit. Je vais vous préparer une place.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
