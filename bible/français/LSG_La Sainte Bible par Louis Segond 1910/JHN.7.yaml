document_id: JHN.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Incrédulité des frères de Jésus
  - type: heading
    content: 'V. 1-9: cf. Lé 23:34-43. Jn 5:44. (Jn 15:18, 19. Mt 10:16. Ec 8:5.)'
  - type: text
    content: 'Après cela, Jésus parcourait la Galilée, car il ne voulait pas séjourner en Judée, parce que les Juifs cherchaient à le faire mourir. '
  '10':
  - type: text
    content: 'Lorsque ses frères furent montés à la fête, il y monta aussi lui-même, non publiquement, mais comme en secret. '
  '11':
  - type: text
    content: 'Les Juifs le cherchaient pendant la fête, et disaient: '
  - type: note
    content: Jn 11:56.
  - type: text
    content: 'Où est-il? '
  '12':
  - type: note
    content: Jn 9:16; 10:19.
  - type: text
    content: 'Il y avait dans la foule grande rumeur à son sujet. Les uns disaient: '
  - type: note
    content: Mt 21:46. Lu 7:16. Jn 6:14; 7:40.
  - type: text
    content: 'C’est un homme de bien. D’autres disaient: Non, il égare la multitude. '
  '13':
  - type: text
    content: 'Personne, toutefois, ne parlait librement de lui, '
  - type: note
    content: Jn 9:22; 12:42; 19:38.
  - type: text
    content: 'par crainte des Juifs. '
  '14':
  - type: text
    content: 'Vers le milieu de la fête, Jésus monta au temple. Et il enseignait. '
  '15':
  - type: text
    content: 'Les Juifs s’étonnaient, disant: Comment connaît-il les Écritures, lui qui n’a point étudié? '
  '16':
  - type: text
    content: 'Jésus leur répondit: '
  - type: note
    content: Jn 3:11; 8:28; 12:49; 14:10, 24.
  - type: text
    content: Ma doctrine n’est pas de moi, mais de celui qui m’a envoyé.
  '17':
  - type: text
    content: ' '
  - type: text
    content: Si quelqu’un veut faire sa volonté, il connaîtra si ma doctrine est de Dieu, ou si je parle de mon chef.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Celui qui parle de son chef cherche sa propre gloire; mais celui qui cherche la gloire de celui qui l’a envoyé, celui-là est vrai, et il n’y a point d’injustice en lui.
  - type: text
    content: ' '
  '19':
  - type: note
    content: Ex 20:1; 24:3. Ac 7:53.
  - type: text
    content: Moïse ne vous a-t-il pas donné la loi? Et nul de vous n’observe la loi.
  - type: text
    content: ' '
  - type: note
    content: Mt 12:14. Mc 3:6. Jn 5:18; 10:39; 11:53.
  - type: text
    content: Pourquoi cherchez-vous à me faire mourir?
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Or, la fête des Juifs, la '
  - type: note
    content: Lé 23:34.
  - type: text
    content: 'fête des Tabernacles, était proche. '
  '20':
  - type: text
    content: 'La foule répondit: '
  - type: note
    content: Jn 8:48, 52; 10:20.
  - type: text
    content: 'Tu as un démon. Qui est-ce qui cherche à te faire mourir? '
  '21':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: J’ai fait une œuvre, et vous en êtes tous étonnés.
  '22':
  - type: text
    content: ' '
  - type: text
    content: Moïse vous a donné la
  - type: text
    content: ' '
  - type: note
    content: Lé 12:3.
  - type: text
    content: circoncision, non qu’elle vienne de Moïse, car elle vient
  - type: text
    content: ' '
  - type: note
    content: Ge 17:10.
  - type: text
    content: des patriarches, et vous circoncisez un homme le jour du sabbat.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Si un homme reçoit la circoncision le jour du sabbat, afin que la loi de Moïse ne soit pas violée, pourquoi vous irritez-vous contre moi de ce que j’ai guéri un homme tout entier le jour du sabbat?
  - type: text
    content: ' '
  '24':
  - type: note
    content: De 1:16, 17. Pr 24:23. Ja 2:1.
  - type: text
    content: Ne jugez pas selon l’apparence, mais jugez selon la justice.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Quelques habitants de Jérusalem disaient: N’est-ce pas là celui qu’ils cherchent à faire mourir? '
  '26':
  - type: text
    content: 'Et voici, il parle librement, et ils ne lui disent rien! Est-ce que vraiment les chefs auraient reconnu qu’il est le Christ? '
  '27':
  - type: note
    content: Mt 13:55. Mc 6:3. Lu 4; 22.
  - type: text
    content: 'Cependant celui-ci, nous savons d’où il est; mais le Christ, quand il viendra, personne ne saura d’où il est. '
  '28':
  - type: text
    content: 'Et Jésus, enseignant dans le temple, s’écria: '
  - type: text
    content: Vous me connaissez, et vous savez d’où je suis! Je ne suis pas venu
  - type: text
    content: ' '
  - type: note
    content: Jn 5:43; 8:42.
  - type: text
    content: 'de moi-même:'
  - type: text
    content: ' '
  - type: note
    content: Jn 8:26. Ro 3:4.
  - type: text
    content: mais celui qui m’a envoyé est vrai, et vous ne le connaissez pas.
  '29':
  - type: text
    content: ' '
  - type: note
    content: Jn 10:15.
  - type: text
    content: Moi, je le connais; car je viens de lui, et c’est lui qui m’a envoyé.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Et ses frères lui dirent: Pars d’ici, et va en Judée, afin que tes disciples voient aussi les œuvres que tu fais. '
  '30':
  - type: note
    content: Mc 11:18. Lu 19:47; 20:19. Jn 7:19; 8:37.
  - type: text
    content: 'Ils cherchaient donc à se saisir de lui, et personne ne mit la main sur lui, parce que son '
  - type: note
    content: Jn 8:20.
  - type: text
    content: 'heure n’était pas encore venue. '
  '31':
  - type: note
    content: Jn 8:30.
  - type: text
    content: 'Plusieurs parmi la foule crurent en lui, et ils disaient: Le Christ, quand il viendra, fera-t-il plus de miracles que n’en a fait celui-ci? '
  '32':
  - type: text
    content: 'Les pharisiens entendirent la foule murmurant de lui ces choses. Alors les principaux sacrificateurs et les pharisiens envoyèrent des huissiers pour le saisir. '
  '33':
  - type: text
    content: 'Jésus dit: '
  - type: note
    content: Jn 16:16.
  - type: text
    content: Je suis encore avec vous pour un peu de temps, puis je m’en vais vers celui qui m’a envoyé.
  '34':
  - type: text
    content: ' '
  - type: note
    content: Jn 8:21; 13:33.
  - type: text
    content: Vous me chercherez et vous ne me trouverez pas, et vous ne pouvez venir où je serai.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Sur quoi les Juifs dirent entre eux: Où ira-t-il, que nous ne le trouvions pas? Ira-t-il parmi ceux qui sont dispersés chez les Grecs, et enseignera-t-il les Grecs? '
  '36':
  - type: text
    content: 'Que signifie cette parole qu’il a dite: Vous me chercherez et vous ne me trouverez pas, et vous ne pouvez venir où je serai?'
  - type: heading
    content: 'V. 37-39: cf. Jn 4:10-14. Ap 22:17. És 55:1-3. Joë 2:28, 29.'
  '37':
  - type: text
    content: ' '
  - type: note
    content: Lé 23:36.
  - type: text
    content: 'Le dernier jour, le grand jour de la fête, Jésus, se tenant debout, s’écria: '
  - type: note
    content: És 55:1. Jn 6:35. Ap 22:17.
  - type: text
    content: Si quelqu’un a soif, qu’il vienne à moi, et qu’il boive.
  '38':
  - type: text
    content: ' '
  - type: text
    content: Celui qui croit en moi, des fleuves d’eau vive couleront de son sein, comme dit
  - type: text
    content: ' '
  - type: note
    content: És 12:3.
  - type: text
    content: l’Écriture.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Il dit cela '
  - type: note
    content: És 44:3. Joë 2:28. Ac 2:17.
  - type: text
    content: de l’Esprit que devaient recevoir ceux qui croiraient en lui; car l’Esprit n’était pas encore, parce que Jésus n’avait pas encore été glorifié.
  - type: heading
    content: Opinions diverses chez les Juifs. Projets d’arrestation
  - type: heading
    content: 'V. 40-52: cf. (Ac 28:23-27. Lu 12:51.) Jé 8:8, 9.'
  '4':
  - type: text
    content: 'Personne n’agit en secret, lorsqu’il désire paraître: si tu fais ces choses, montre-toi toi-même au monde. '
  '40':
  - type: text
    content: 'Des gens de la foule, ayant entendu ces paroles, disaient: '
  - type: note
    content: Mt 21:46. Lu 7:16. Jn 6:14.
  - type: text
    content: 'Celui-ci est vraiment le prophète. '
  '41':
  - type: text
    content: 'D’autres disaient: '
  - type: note
    content: Jn 4:42.
  - type: text
    content: 'C’est le Christ. Et d’autres disaient: '
  - type: note
    content: Jn 1:47.
  - type: text
    content: 'Est-ce bien de la Galilée que doit venir le Christ? '
  '42':
  - type: text
    content: 'L’Écriture ne dit-elle pas que c’est de la '
  - type: note
    content: Ps 132:11.
  - type: text
    content: 'postérité de David, et du village de '
  - type: note
    content: Mi 5:1. Mt 2:6.
  - type: text
    content: 'Bethléhem, où était David, que le Christ doit venir? '
  '43':
  - type: text
    content: 'Il y eut donc, à cause de lui, division parmi la foule. '
  '44':
  - type: text
    content: 'Quelques-uns d’entre eux voulaient le saisir, mais personne ne mit la main sur lui. '
  '45':
  - type: text
    content: 'Ainsi les huissiers retournèrent vers les principaux sacrificateurs et les pharisiens. Et ceux-ci leur dirent: Pourquoi ne l’avez-vous pas amené? '
  '46':
  - type: text
    content: 'Les huissiers répondirent: Jamais homme n’a parlé comme cet homme. '
  '47':
  - type: text
    content: 'Les pharisiens leur répliquèrent: Est-ce que vous aussi, vous avez été séduits? '
  '48':
  - type: note
    content: És 33:18. Jn 12:42. 1 Co 1:20; 2:8.
  - type: text
    content: 'Y a-t-il quelqu’un des chefs ou des pharisiens qui ait cru en lui? '
  '49':
  - type: text
    content: 'Mais cette foule qui ne connaît pas la loi, ce sont des maudits! '
  '5':
  - type: text
    content: 'Car ses '
  - type: note
    content: Mc 3:21.
  - type: text
    content: 'frères non plus ne croyaient pas en lui. '
  '50':
  - type: text
    content: 'Nicodème, qui était venu '
  - type: note
    content: Jn 3:2; 19:39.
  - type: text
    content: 'de nuit vers Jésus, et qui était l’un d’entre eux, leur dit: '
  '51':
  - type: note
    content: Ex 23:1. Lé 19:15. De 1:17; 17:8; 19:15.
  - type: text
    content: 'Notre loi condamne-t-elle un homme avant qu’on l’entende et qu’on sache ce qu’il a fait? '
  '52':
  - type: text
    content: 'Ils lui répondirent: Es-tu aussi Galiléen? Examine, et tu verras que de la Galilée il ne sort point de prophète.'
  - type: heading
    content: La femme adultère
  - type: heading
    content: '7 v. 53 à 8 v. 11: cf. De 22:22. (Ps 50:16-21. Ro 2:1-3, 17-23.) Jn 3:17.'
  '53':
  - type: text
    content: Et chacun s’en retourna dans sa maison.
  '6':
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: Mon temps n’est pas encore venu, mais votre temps est toujours prêt.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Jn 14:17; 15:18.
  - type: text
    content: Le monde ne peut vous haïr; moi, il me hait, parce que je rends de lui le témoignage que ses œuvres sont
  - type: text
    content: ' '
  - type: note
    content: Jn 3:19.
  - type: text
    content: mauvaises.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Montez, vous, à cette fête; pour moi, je n’y monte point,
  - type: text
    content: ' '
  - type: note
    content: Jn 8:20.
  - type: text
    content: parce que mon temps n’est pas encore accompli.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Après leur avoir dit cela, il resta en Galilée.
  - type: heading
    content: Jésus à Jérusalem. Son enseignement dans le temple, à la fête des Tabernacles
  - type: heading
    content: 'V. 10-36: cf. Lu 2:34. (Jn 3:34; 5:5-18. Ro 2:17-23.) Jn 8:19-24.'
