document_id: EZK.19,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Complainte sur les princes d’Israël
  - type: heading
    content: 'V. 1-9: cf. Jé 22:10-19. (2 R 23:30-37; 24:1-6. 2 Ch 36:1-8.)'
  - type: text
    content: Et toi, prononce une complainte sur les princes d’Israël,
  '10':
  - type: text
    content: Ta mère était, comme toi, semblable à une vigne, Plantée près des eaux.
  - type: text
    content: Elle était féconde et chargée de branches,
  - type: text
    content: A cause de l’abondance des eaux.
  '11':
  - type: text
    content: Elle avait de vigoureux rameaux pour des sceptres de souverains;
  - type: text
    content: Par son élévation elle dominait les branches touffues;
  - type: text
    content: Elle attirait les regards par sa hauteur,
  - type: text
    content: Et par la multitude de ses rameaux.
  '12':
  - type: text
    content: Mais elle a été arrachée avec fureur et jetée par terre;
  - type: text
    content: Le vent d’orient a desséché son fruit;
  - type: text
    content: Ses rameaux vigoureux ont été rompus et desséchés;
  - type: text
    content: Le feu les a dévorés.
  '13':
  - type: text
    content: Et maintenant elle est plantée dans le désert,
  - type: text
    content: Dans une terre sèche et aride.
  '14':
  - type: text
    content: Le feu est sorti de ses branches,
  - type: text
    content: Et a dévoré son fruit;
  - type: text
    content: Elle n’a plus de rameau vigoureux
  - type: text
    content: Pour un sceptre de souverain.
  - type: text
    content: C’est là une complainte, et cela servira de complainte.
  '2':
  - type: text
    content: 'et dis:'
  - type: text
    content: Ta mère, qu’était-ce? Une lionne.
  - type: text
    content: Elle était couchée parmi les lions;
  - type: text
    content: C’est au milieu des lionceaux
  - type: text
    content: Qu’elle a élevé ses petits.
  '3':
  - type: text
    content: Elle éleva l’un de ses petits,
  - type: text
    content: Qui devint un jeune lion,
  - type: text
    content: Et qui apprit à déchirer sa proie;
  - type: text
    content: Il dévora des hommes.
  '4':
  - type: text
    content: Les nations entendirent parler de lui,
  - type: text
    content: Et il fut pris dans leur fosse;
  - type: text
    content: Elles mirent une boucle à ses narines et l’emmenèrent
  - type: text
    content: 'Dans le pays '
  - type: note
    content: 2 R 23:33. Jé 22:11.
  - type: text
    content: d’Égypte.
  '5':
  - type: text
    content: Quand la lionne vit qu’elle attendait en vain,
  - type: text
    content: Qu’elle était trompée dans son espérance,
  - type: text
    content: Elle prit un autre de ses petits,
  - type: text
    content: Et en fit un jeune lion.
  '6':
  - type: text
    content: Il marcha parmi les lions,
  - type: text
    content: Il devint un jeune lion,
  - type: text
    content: Et il apprit à déchirer sa proie;
  - type: text
    content: Il dévora des hommes.
  '7':
  - type: text
    content: Il força leurs palais,
  - type: text
    content: Et détruisit leurs villes;
  - type: text
    content: Le pays, tout ce qui s’y trouvait, fut ravagé,
  - type: text
    content: Au bruit de ses rugissements.
  '8':
  - type: text
    content: Contre lui se rangèrent les nations
  - type: text
    content: D’alentour, des provinces;
  - type: text
    content: Elles tendirent sur lui leur rets,
  - type: text
    content: Et il fut pris dans leur fosse.
  '9':
  - type: text
    content: 'Elles mirent une '
  - type: note
    content: 2 Ch 36:6.
  - type: text
    content: boucle à ses narines, le placèrent dans une cage,
  - type: text
    content: Et l’emmenèrent auprès du roi de Babylone;
  - type: text
    content: Puis elles le conduisirent dans une forteresse,
  - type: text
    content: Afin qu’on n’entende plus sa voix sur les montagnes d’Israël.
  - type: heading
    content: 'V. 10-14: cf. Ps 80:9-17. És 5:1-7.'
