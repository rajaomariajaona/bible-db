document_id: EZK.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Complainte sur les princes d’Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. Jé 22:10-19. (2 R 23:30-37; 24:1-6. 2 Ch 36:1-8.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Et toi, prononce une complainte sur les princes d’Israël,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et dis:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta mère, qu’était-ce? Une lionne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle était couchée parmi les lions;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est au milieu des lionceaux
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’elle a élevé ses petits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Elle éleva l’un de ses petits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui devint un jeune lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui apprit à déchirer sa proie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il dévora des hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les nations entendirent parler de lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il fut pris dans leur fosse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles mirent une boucle à ses narines et l’emmenèrent
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dans le pays '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 23:33
      metadata:
        usfm: 2KI.23.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 22:11
      metadata:
        usfm: JER.22.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: d’Égypte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Quand la lionne vit qu’elle attendait en vain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’elle était trompée dans son espérance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle prit un autre de ses petits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et en fit un jeune lion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il marcha parmi les lions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il devint un jeune lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il apprit à déchirer sa proie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il dévora des hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il força leurs palais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et détruisit leurs villes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le pays, tout ce qui s’y trouvait, fut ravagé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au bruit de ses rugissements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Contre lui se rangèrent les nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: D’alentour, des provinces;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles tendirent sur lui leur rets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il fut pris dans leur fosse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Elles mirent une '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 36:6
      metadata:
        usfm: 2CH.36.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: boucle à ses narines, le placèrent dans une cage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’emmenèrent auprès du roi de Babylone;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puis elles le conduisirent dans une forteresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin qu’on n’entende plus sa voix sur les montagnes d’Israël.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-14: cf. Ps 80:9-17. És 5:1-7.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ta mère était, comme toi, semblable à une vigne, Plantée près des eaux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle était féconde et chargée de branches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de l’abondance des eaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Elle avait de vigoureux rameaux pour des sceptres de souverains;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par son élévation elle dominait les branches touffues;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle attirait les regards par sa hauteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et par la multitude de ses rameaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mais elle a été arrachée avec fureur et jetée par terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le vent d’orient a desséché son fruit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses rameaux vigoureux ont été rompus et desséchés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le feu les a dévorés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Et maintenant elle est plantée dans le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans une terre sèche et aride.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Le feu est sorti de ses branches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et a dévoré son fruit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle n’a plus de rameau vigoureux
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour un sceptre de souverain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est là une complainte, et cela servira de complainte.
