document_id: JOB.32
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Discours d’Élihu
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-22: cf. Job 33:1-12; 42:1-8. (Ec 12:13. Ac 26:25. 2 Ti 2:15.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ces trois hommes cessèrent de répondre à Job, parce qu’il se regardait comme juste. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors s’enflamma de colère Élihu, fils de Barakeel de Buz, de la famille de Ram. Sa colère s’enflamma contre Job, parce qu’il se disait juste devant Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et sa colère s’enflamma contre ses trois amis, parce qu’ils ne trouvaient rien à répondre et que néanmoins ils condamnaient Job. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Comme ils étaient plus âgés que lui, Élihu avait attendu jusqu’à ce moment pour parler à Job. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais, voyant qu’il n’y avait plus de réponse dans la bouche de ces trois hommes, Élihu s’enflamma de colère. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et Élihu, fils de Barakeel de Buz, prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je suis jeune, et vous êtes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 15:10
      metadata:
        usfm: JOB.15.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: des vieillards;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pourquoi j’ai craint, j’ai redouté
- type: usfm
  marker: q1
  children:
  - type: text
    text: De vous faire connaître mon sentiment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je disais en moi-même: Les jours parleront,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le grand nombre des années enseignera la sagesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 12:13
      metadata:
        usfm: JOB.12.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 38:36
      metadata:
        usfm: JOB.38.36
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 2:6
      metadata:
        usfm: PRO.2.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 2:26
      metadata:
        usfm: ECC.2.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 1:17
      metadata:
        usfm: DAN.1.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:21
      metadata:
        usfm: DAN.2.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais en réalité, dans l’homme, c’est l’esprit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le souffle du Tout-Puissant, qui donne l’intelligence;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 12:12
      metadata:
        usfm: JOB.12.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ce n’est pas l’âge qui procure la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce n’est pas la vieillesse qui rend capable de juger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voilà pourquoi je dis: Écoute!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi aussi, j’exposerai ma pensée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: J’ai attendu la fin de vos discours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai suivi vos raisonnements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Votre examen des paroles de Job.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je vous ai donné toute mon attention;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et voici, aucun de vous ne l’a convaincu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aucun n’a réfuté ses paroles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ne dites pas cependant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: En lui nous avons trouvé la sagesse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est Dieu qui peut le confondre, ce n’est pas un homme!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il ne s’est pas adressé directement à moi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi lui répondrai-je tout autrement que vous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ils ont peur, ils ne répondent plus!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont la parole coupée!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: J’ai attendu qu’ils eussent fini leurs discours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils s’arrêtassent et ne sussent que répliquer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: A mon tour, je veux répondre aussi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je veux dire aussi ce que je pense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Car je suis plein de paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’esprit me presse au-dedans de moi;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mon intérieur est comme un vin qui n’a pas d’issue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme des outres neuves qui vont éclater.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Je parlerai pour respirer à l’aise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ouvrirai mes lèvres et je répondrai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je n’aurai point égard à l’apparence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je ne flatterai personne;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Car je ne sais pas flatter:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon créateur m’enlèverait bien vite.
