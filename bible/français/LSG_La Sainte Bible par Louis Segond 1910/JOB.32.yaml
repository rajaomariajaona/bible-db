document_id: JOB.32,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Discours d’Élihu
  - type: heading
    content: 'V. 1-22: cf. Job 33:1-12; 42:1-8. (Ec 12:13. Ac 26:25. 2 Ti 2:15.)'
  - type: text
    content: 'Ces trois hommes cessèrent de répondre à Job, parce qu’il se regardait comme juste. '
  '10':
  - type: text
    content: 'Voilà pourquoi je dis: Écoute!'
  - type: text
    content: Moi aussi, j’exposerai ma pensée.
  '11':
  - type: text
    content: J’ai attendu la fin de vos discours,
  - type: text
    content: J’ai suivi vos raisonnements,
  - type: text
    content: Votre examen des paroles de Job.
  '12':
  - type: text
    content: Je vous ai donné toute mon attention;
  - type: text
    content: Et voici, aucun de vous ne l’a convaincu,
  - type: text
    content: Aucun n’a réfuté ses paroles.
  '13':
  - type: text
    content: 'Ne dites pas cependant:'
  - type: text
    content: En lui nous avons trouvé la sagesse;
  - type: text
    content: C’est Dieu qui peut le confondre, ce n’est pas un homme!
  '14':
  - type: text
    content: 'Il ne s’est pas adressé directement à moi:'
  - type: text
    content: Aussi lui répondrai-je tout autrement que vous.
  '15':
  - type: text
    content: Ils ont peur, ils ne répondent plus!
  - type: text
    content: Ils ont la parole coupée!
  '16':
  - type: text
    content: J’ai attendu qu’ils eussent fini leurs discours,
  - type: text
    content: Qu’ils s’arrêtassent et ne sussent que répliquer.
  '17':
  - type: text
    content: A mon tour, je veux répondre aussi,
  - type: text
    content: Je veux dire aussi ce que je pense.
  '18':
  - type: text
    content: Car je suis plein de paroles,
  - type: text
    content: L’esprit me presse au-dedans de moi;
  '19':
  - type: text
    content: Mon intérieur est comme un vin qui n’a pas d’issue,
  - type: text
    content: Comme des outres neuves qui vont éclater.
  '2':
  - type: text
    content: 'Alors s’enflamma de colère Élihu, fils de Barakeel de Buz, de la famille de Ram. Sa colère s’enflamma contre Job, parce qu’il se disait juste devant Dieu. '
  '20':
  - type: text
    content: Je parlerai pour respirer à l’aise,
  - type: text
    content: J’ouvrirai mes lèvres et je répondrai.
  '21':
  - type: text
    content: Je n’aurai point égard à l’apparence,
  - type: text
    content: Et je ne flatterai personne;
  '22':
  - type: text
    content: 'Car je ne sais pas flatter:'
  - type: text
    content: Mon créateur m’enlèverait bien vite.
  '3':
  - type: text
    content: 'Et sa colère s’enflamma contre ses trois amis, parce qu’ils ne trouvaient rien à répondre et que néanmoins ils condamnaient Job. '
  '4':
  - type: text
    content: 'Comme ils étaient plus âgés que lui, Élihu avait attendu jusqu’à ce moment pour parler à Job. '
  '5':
  - type: text
    content: 'Mais, voyant qu’il n’y avait plus de réponse dans la bouche de ces trois hommes, Élihu s’enflamma de colère. '
  '6':
  - type: text
    content: 'Et Élihu, fils de Barakeel de Buz, prit la parole et dit:'
  - type: text
    content: 'Je suis jeune, et vous êtes '
  - type: note
    content: Job 15:10.
  - type: text
    content: des vieillards;
  - type: text
    content: C’est pourquoi j’ai craint, j’ai redouté
  - type: text
    content: De vous faire connaître mon sentiment.
  '7':
  - type: text
    content: 'Je disais en moi-même: Les jours parleront,'
  - type: text
    content: Le grand nombre des années enseignera la sagesse.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Job 12:13; 38:36. Pr 2:6. Ec 2:26. Da 1:17; 2:21.
  - type: text
    content: Mais en réalité, dans l’homme, c’est l’esprit,
  - type: text
    content: Le souffle du Tout-Puissant, qui donne l’intelligence;
  '9':
  - type: text
    content: ' '
  - type: note
    content: Job 12:12.
  - type: text
    content: Ce n’est pas l’âge qui procure la sagesse,
  - type: text
    content: Ce n’est pas la vieillesse qui rend capable de juger.
