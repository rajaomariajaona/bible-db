document_id: PSA.127
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Pr 10:22. Ps 128.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique des degrés. De Salomon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si l’Éternel ne bâtit la maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui la bâtissent travaillent en vain;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si l’Éternel ne garde la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui la garde veille en vain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: En vain vous levez-vous matin, vous couchez-vous tard,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mangez-vous le pain de douleur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il en donne autant à ses bien-aimés pendant leur sommeil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Voici, des fils sont un héritage de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le fruit des entrailles est une récompense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Comme les flèches dans la main d’un guerrier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi sont les fils de la jeunesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Heureux l’homme qui en a rempli son carquois!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne seront pas confus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand ils parleront avec des ennemis à la porte.
