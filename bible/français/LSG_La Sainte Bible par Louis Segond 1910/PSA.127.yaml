document_id: PSA.127,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Pr 10:22. Ps 128.
  - type: text
    content: Cantique des degrés. De Salomon.
  - type: text
    content: Si l’Éternel ne bâtit la maison,
  - type: text
    content: Ceux qui la bâtissent travaillent en vain;
  - type: text
    content: Si l’Éternel ne garde la ville,
  - type: text
    content: Celui qui la garde veille en vain.
  '2':
  - type: text
    content: En vain vous levez-vous matin, vous couchez-vous tard,
  - type: text
    content: Et mangez-vous le pain de douleur;
  - type: text
    content: Il en donne autant à ses bien-aimés pendant leur sommeil.
  '3':
  - type: text
    content: Voici, des fils sont un héritage de l’Éternel,
  - type: text
    content: Le fruit des entrailles est une récompense.
  '4':
  - type: text
    content: Comme les flèches dans la main d’un guerrier,
  - type: text
    content: Ainsi sont les fils de la jeunesse.
  '5':
  - type: text
    content: Heureux l’homme qui en a rempli son carquois!
  - type: text
    content: Ils ne seront pas confus,
  - type: text
    content: Quand ils parleront avec des ennemis à la porte.
