  - type: text
    text: Ordonnances sur la Pâque et sur les premiers-nés
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-16: cf. Ex 12. (No 3:11-13, 40-51; 18:15-17.) 1 Co 6:19, 20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 22:29
      metadata:
        usfm: EXO.22.29
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:19
      metadata:
        usfm: EXO.34.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 27:26
      metadata:
        usfm: LEV.27.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 3:13
      metadata:
        usfm: NUM.3.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:17
      metadata:
        usfm: NUM.8.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 2:23
      metadata:
        usfm: LUK.2.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Consacre-moi tout premier-né, tout premier-né parmi les enfants d’Israël, tant des hommes que des animaux: il m’appartient. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moïse dit au peuple: Souvenez-vous de ce jour, où vous êtes sortis d’Égypte, de la maison de servitude; car c’est par sa main puissante que l’Éternel vous en a fait sortir. On ne mangera point de pain levé. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:15
      metadata:
        usfm: EXO.23.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous sortez aujourd’hui, dans le mois des épis. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quand l’Éternel t’aura fait entrer dans le pays des Cananéens, des Héthiens, des Amoréens, des Héviens et des Jébusiens, qu’il a juré à tes pères de te donner, pays où coulent le lait et le miel, tu rendras ce culte à l’Éternel dans ce même mois. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Pendant sept jours, tu mangeras des pains sans levain; et le septième jour, il y aura une fête en l’honneur de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'On mangera des pains sans levain pendant les sept jours; on ne verra point chez toi de pain levé, et l’on ne verra point chez toi de levain, dans toute l’étendue de ton pays. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tu diras alors à ton fils: C’est en mémoire de ce que l’Éternel a fait pour moi, lorsque je suis sorti d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ce sera pour toi comme un signe sur ta main et comme un souvenir entre tes yeux, afin que la loi de l’Éternel soit dans ta bouche; car c’est par sa main puissante que l’Éternel t’a fait sortir d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tu observeras cette ordonnance au temps fixé d’année en année. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quand l’Éternel t’aura fait entrer dans le pays des Cananéens, comme il l’a juré à toi et à tes pères, et qu’il te l’aura donné, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 22:30
      metadata:
        usfm: EXO.22.30
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:19
      metadata:
        usfm: EXO.34.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 27:26
      metadata:
        usfm: LEV.27.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 8:17
      metadata:
        usfm: NUM.8.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 44:30
      metadata:
        usfm: EZK.44.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tu consacreras à l’Éternel tout premier-né, même tout premier-né des animaux que tu auras: les mâles appartiennent à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu rachèteras avec un agneau tout premier-né de l’âne; et, si tu ne le rachètes pas, tu lui briseras la nuque. Tu rachèteras aussi tout premier-né de l’homme parmi tes fils. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et lorsque ton fils te demandera un jour: Que signifie cela? Tu lui répondras: Par sa main puissante, l’Éternel nous a fait sortir d’Égypte, de la maison de servitude; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et, comme Pharaon s’obstinait à ne point nous laisser aller, l’Éternel fit mourir tous les premiers-nés dans le pays d’Égypte, depuis les premiers-nés des hommes jusqu’aux premiers-nés des animaux. Voilà pourquoi j’offre en sacrifice à l’Éternel tout premier-né des mâles, et je rachète tout premier-né de mes fils. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ce sera comme un signe sur ta main et comme des fronteaux entre tes yeux; car c’est par sa main puissante que l’Éternel nous a fait sortir d’Égypte.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Marche vers le désert
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-22: cf. No 33:1-6. Né 9:12, 19. Ps 27:1.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Lorsque Pharaon laissa aller le peuple, Dieu ne le conduisit point par le chemin du pays des Philistins, quoique le plus proche; car Dieu dit: Le peuple pourrait se repentir en voyant la guerre, et retourner en Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais Dieu fit faire au peuple un détour par le chemin du désert, vers la mer Rouge. Les enfants d’Israël montèrent en armes hors du pays d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Moïse prit avec lui les os de Joseph; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 50:25
      metadata:
        usfm: GEN.50.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 24:32
      metadata:
        usfm: JOS.24.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car Joseph avait fait jurer les fils d’Israël, en disant: Dieu vous visitera, et vous ferez remonter avec vous mes os loin d’ici. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 33:6
      metadata:
        usfm: NUM.33.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils partirent de Succoth, et ils campèrent à Étham, à l’extrémité du désert. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 40:38
      metadata:
        usfm: EXO.40.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 14:14
      metadata:
        usfm: NUM.14.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 1:33
      metadata:
        usfm: DEU.1.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Né 9:12
      metadata:
        usfm: NEH.9.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: NEH.9.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:14
      metadata:
        usfm: PSA.78.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 105:39
      metadata:
        usfm: PSA.105.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:1
      metadata:
        usfm: 1CO.10.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’Éternel allait devant eux, le jour dans une colonne de nuée pour les guider dans leur chemin, et la nuit dans une colonne de feu pour les éclairer, afin qu’ils marchassent jour et nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: La colonne de nuée ne se retirait point de devant le peuple pendant le jour, ni la colonne de feu pendant la nuit.
