document_id: EXO.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ordonnances sur la Pâque et sur les premiers-nés
  - type: heading
    content: 'V. 1-16: cf. Ex 12. (No 3:11-13, 40-51; 18:15-17.) 1 Co 6:19, 20.'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: text
    content: 'Tu observeras cette ordonnance au temps fixé d’année en année. '
  '11':
  - type: text
    content: 'Quand l’Éternel t’aura fait entrer dans le pays des Cananéens, comme il l’a juré à toi et à tes pères, et qu’il te l’aura donné, '
  '12':
  - type: note
    content: Ex 22:30; 34:19. Lé 27:26. No 8:17. Éz 44:30.
  - type: text
    content: 'tu consacreras à l’Éternel tout premier-né, même tout premier-né des animaux que tu auras: les mâles appartiennent à l’Éternel. '
  '13':
  - type: text
    content: 'Tu rachèteras avec un agneau tout premier-né de l’âne; et, si tu ne le rachètes pas, tu lui briseras la nuque. Tu rachèteras aussi tout premier-né de l’homme parmi tes fils. '
  '14':
  - type: text
    content: 'Et lorsque ton fils te demandera un jour: Que signifie cela? Tu lui répondras: Par sa main puissante, l’Éternel nous a fait sortir d’Égypte, de la maison de servitude; '
  '15':
  - type: text
    content: 'et, comme Pharaon s’obstinait à ne point nous laisser aller, l’Éternel fit mourir tous les premiers-nés dans le pays d’Égypte, depuis les premiers-nés des hommes jusqu’aux premiers-nés des animaux. Voilà pourquoi j’offre en sacrifice à l’Éternel tout premier-né des mâles, et je rachète tout premier-né de mes fils. '
  '16':
  - type: text
    content: Ce sera comme un signe sur ta main et comme des fronteaux entre tes yeux; car c’est par sa main puissante que l’Éternel nous a fait sortir d’Égypte.
  - type: heading
    content: Marche vers le désert
  - type: heading
    content: 'V. 17-22: cf. No 33:1-6. Né 9:12, 19. Ps 27:1.'
  '17':
  - type: text
    content: 'Lorsque Pharaon laissa aller le peuple, Dieu ne le conduisit point par le chemin du pays des Philistins, quoique le plus proche; car Dieu dit: Le peuple pourrait se repentir en voyant la guerre, et retourner en Égypte. '
  '18':
  - type: text
    content: 'Mais Dieu fit faire au peuple un détour par le chemin du désert, vers la mer Rouge. Les enfants d’Israël montèrent en armes hors du pays d’Égypte. '
  '19':
  - type: text
    content: 'Moïse prit avec lui les os de Joseph; '
  - type: note
    content: Ge 50:25. Jos 24:32.
  - type: text
    content: 'car Joseph avait fait jurer les fils d’Israël, en disant: Dieu vous visitera, et vous ferez remonter avec vous mes os loin d’ici. '
  '2':
  - type: note
    content: Ex 22:29; 34:19. Lé 27:26. No 3:13; 8:17. Lu 2:23.
  - type: text
    content: 'Consacre-moi tout premier-né, tout premier-né parmi les enfants d’Israël, tant des hommes que des animaux: il m’appartient. '
  '20':
  - type: note
    content: No 33:6.
  - type: text
    content: 'Ils partirent de Succoth, et ils campèrent à Étham, à l’extrémité du désert. '
  '21':
  - type: note
    content: Ex 40:38. No 14:14. De 1:33. Né 9:12, 19. Ps 78:14; 105:39. 1 Co 10:1.
  - type: text
    content: 'L’Éternel allait devant eux, le jour dans une colonne de nuée pour les guider dans leur chemin, et la nuit dans une colonne de feu pour les éclairer, afin qu’ils marchassent jour et nuit. '
  '22':
  - type: text
    content: La colonne de nuée ne se retirait point de devant le peuple pendant le jour, ni la colonne de feu pendant la nuit.
  '3':
  - type: text
    content: 'Moïse dit au peuple: Souvenez-vous de ce jour, où vous êtes sortis d’Égypte, de la maison de servitude; car c’est par sa main puissante que l’Éternel vous en a fait sortir. On ne mangera point de pain levé. '
  '4':
  - type: note
    content: Ex 23:15.
  - type: text
    content: 'Vous sortez aujourd’hui, dans le mois des épis. '
  '5':
  - type: text
    content: 'Quand l’Éternel t’aura fait entrer dans le pays des Cananéens, des Héthiens, des Amoréens, des Héviens et des Jébusiens, qu’il a juré à tes pères de te donner, pays où coulent le lait et le miel, tu rendras ce culte à l’Éternel dans ce même mois. '
  '6':
  - type: text
    content: 'Pendant sept jours, tu mangeras des pains sans levain; et le septième jour, il y aura une fête en l’honneur de l’Éternel. '
  '7':
  - type: text
    content: 'On mangera des pains sans levain pendant les sept jours; on ne verra point chez toi de pain levé, et l’on ne verra point chez toi de levain, dans toute l’étendue de ton pays. '
  '8':
  - type: text
    content: 'Tu diras alors à ton fils: C’est en mémoire de ce que l’Éternel a fait pour moi, lorsque je suis sorti d’Égypte. '
  '9':
  - type: text
    content: 'Ce sera pour toi comme un signe sur ta main et comme un souvenir entre tes yeux, afin que la loi de l’Éternel soit dans ta bouche; car c’est par sa main puissante que l’Éternel t’a fait sortir d’Égypte. '
