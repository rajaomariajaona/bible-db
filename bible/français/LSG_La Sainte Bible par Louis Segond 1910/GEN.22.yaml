document_id: GEN.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abraham mis à l’épreuve par l’Éternel, qui lui ordonne d’offrir en holocauste son fils Isaac
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-19: cf. (Hé 11:17-19. Ja 2:21-23.) (Jn 3:16. 1 Jn 4:9, 10.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après ces choses, Dieu mit Abraham à l’épreuve, et lui dit: Abraham! Et il répondit: Me voici! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dieu dit: Prends ton fils, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:17
      metadata:
        usfm: HEB.11.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ton unique, celui que tu aimes, Isaac; va-t’en au pays de Morija, et là offre-le en holocauste sur l’une des montagnes que je te dirai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Abraham se leva de bon matin, sella son âne, et prit avec lui deux serviteurs et son fils Isaac. Il fendit du bois pour l’holocauste, et partit pour aller au lieu que Dieu lui avait dit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le troisième jour, Abraham, levant les yeux, vit le lieu de loin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et Abraham dit à ses serviteurs: Restez ici avec l’âne; moi et le jeune homme, nous irons jusque-là pour adorer, et nous reviendrons auprès de vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Abraham prit le bois pour l’holocauste, le chargea sur son fils Isaac, et porta dans sa main le feu et le couteau. Et ils marchèrent tous deux ensemble. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors Isaac, parlant à Abraham, son père, dit: Mon père! Et il répondit: Me voici, mon fils! Isaac reprit: Voici le feu et le bois; mais où est l’agneau pour l’holocauste? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Abraham répondit: Mon fils, Dieu se pourvoira lui-même de l’agneau pour l’holocauste. Et ils marchèrent tous deux ensemble. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lorsqu’ils furent arrivés au lieu que Dieu lui avait dit, Abraham y éleva un autel, et rangea le bois. Il lia son fils Isaac, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 2:21
      metadata:
        usfm: JAS.2.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le mit sur l’autel, par-dessus le bois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Puis Abraham étendit la main, et prit le couteau, pour égorger son fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors l’ange de l’Éternel l’appela des cieux, et dit: Abraham! Abraham! Et il répondit: Me voici! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’ange dit: N’avance pas ta main sur l’enfant, et ne lui fais rien; car je sais maintenant que tu crains Dieu, et que tu ne m’as pas refusé ton fils, ton unique. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Abraham leva les yeux, et vit derrière lui un bélier retenu dans un buisson par les cornes; et Abraham alla prendre le bélier, et l’offrit en holocauste à la place de son fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Abraham donna à ce lieu le nom de Jehova-Jiré. C’est pourquoi l’on dit aujourd’hui: A la montagne de l’Éternel il sera pourvu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L’ange de l’Éternel appela une seconde fois Abraham des cieux, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:73
      metadata:
        usfm: LUK.1.73
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je le jure '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 6:13
      metadata:
        usfm: HEB.6.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'par moi-même, parole de l’Éternel! Parce que tu as fait cela, et que tu n’as pas refusé ton fils, ton unique, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'je te bénirai et je multiplierai ta postérité, comme les étoiles du ciel et comme le sable qui est sur le bord de la mer; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 24:60
      metadata:
        usfm: GEN.24.60
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et ta postérité possédera la porte de ses ennemis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 12:3
      metadata:
        usfm: GEN.12.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:18
      metadata:
        usfm: GEN.18.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:4
      metadata:
        usfm: GEN.26.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 3:25
      metadata:
        usfm: ACT.3.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:8
      metadata:
        usfm: GAL.3.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Toutes les nations de la terre seront bénies en ta postérité, parce que tu as obéi à ma voix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Abraham étant retourné vers ses serviteurs, ils se levèrent et s’en allèrent ensemble à Beer-Schéba; car Abraham demeurait à Beer-Schéba.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-24: cf. Pr 25:25. Ge 24:15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Après ces choses, on fit à Abraham un rapport, en disant: Voici, Milca a aussi enfanté des fils à Nachor, ton frère: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Uts, son premier-né, Buz, son frère, Kemuel, père d’Aram, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Késed, Hazo, Pildasch, Jidlaph et Bethuel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Bethuel a engendré Rebecca. Ce sont là les huit fils que Milca a enfantés à Nachor, frère d’Abraham. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Sa concubine, nommée Réuma, a aussi enfanté Thébach, Gaham, Tahasch et Maaca.
