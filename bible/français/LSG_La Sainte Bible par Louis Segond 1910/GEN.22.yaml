document_id: GEN.22,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Abraham mis à l’épreuve par l’Éternel, qui lui ordonne d’offrir en holocauste son fils Isaac
  - type: heading
    content: 'V. 1-19: cf. (Hé 11:17-19. Ja 2:21-23.) (Jn 3:16. 1 Jn 4:9, 10.)'
  - type: text
    content: 'Après ces choses, Dieu mit Abraham à l’épreuve, et lui dit: Abraham! Et il répondit: Me voici! '
  '10':
  - type: text
    content: 'Puis Abraham étendit la main, et prit le couteau, pour égorger son fils. '
  '11':
  - type: text
    content: 'Alors l’ange de l’Éternel l’appela des cieux, et dit: Abraham! Abraham! Et il répondit: Me voici! '
  '12':
  - type: text
    content: 'L’ange dit: N’avance pas ta main sur l’enfant, et ne lui fais rien; car je sais maintenant que tu crains Dieu, et que tu ne m’as pas refusé ton fils, ton unique. '
  '13':
  - type: text
    content: 'Abraham leva les yeux, et vit derrière lui un bélier retenu dans un buisson par les cornes; et Abraham alla prendre le bélier, et l’offrit en holocauste à la place de son fils. '
  '14':
  - type: text
    content: 'Abraham donna à ce lieu le nom de Jehova-Jiré. C’est pourquoi l’on dit aujourd’hui: A la montagne de l’Éternel il sera pourvu. '
  '15':
  - type: text
    content: 'L’ange de l’Éternel appela une seconde fois Abraham des cieux, '
  '16':
  - type: text
    content: 'et dit: '
  - type: note
    content: Lu 1:73.
  - type: text
    content: 'Je le jure '
  - type: note
    content: Hé 6:13.
  - type: text
    content: 'par moi-même, parole de l’Éternel! Parce que tu as fait cela, et que tu n’as pas refusé ton fils, ton unique, '
  '17':
  - type: text
    content: 'je te bénirai et je multiplierai ta postérité, comme les étoiles du ciel et comme le sable qui est sur le bord de la mer; '
  - type: note
    content: Ge 24:60.
  - type: text
    content: 'et ta postérité possédera la porte de ses ennemis. '
  '18':
  - type: note
    content: Ge 12:3; 18:18; 26:4. Ac 3:25. Ga 3:8.
  - type: text
    content: 'Toutes les nations de la terre seront bénies en ta postérité, parce que tu as obéi à ma voix. '
  '19':
  - type: text
    content: Abraham étant retourné vers ses serviteurs, ils se levèrent et s’en allèrent ensemble à Beer-Schéba; car Abraham demeurait à Beer-Schéba.
  - type: heading
    content: 'V. 20-24: cf. Pr 25:25. Ge 24:15.'
  '2':
  - type: text
    content: 'Dieu dit: Prends ton fils, '
  - type: note
    content: Hé 11:17.
  - type: text
    content: 'ton unique, celui que tu aimes, Isaac; va-t’en au pays de Morija, et là offre-le en holocauste sur l’une des montagnes que je te dirai. '
  '20':
  - type: text
    content: 'Après ces choses, on fit à Abraham un rapport, en disant: Voici, Milca a aussi enfanté des fils à Nachor, ton frère: '
  '21':
  - type: text
    content: 'Uts, son premier-né, Buz, son frère, Kemuel, père d’Aram, '
  '22':
  - type: text
    content: 'Késed, Hazo, Pildasch, Jidlaph et Bethuel. '
  '23':
  - type: text
    content: 'Bethuel a engendré Rebecca. Ce sont là les huit fils que Milca a enfantés à Nachor, frère d’Abraham. '
  '24':
  - type: text
    content: Sa concubine, nommée Réuma, a aussi enfanté Thébach, Gaham, Tahasch et Maaca.
  '3':
  - type: text
    content: 'Abraham se leva de bon matin, sella son âne, et prit avec lui deux serviteurs et son fils Isaac. Il fendit du bois pour l’holocauste, et partit pour aller au lieu que Dieu lui avait dit. '
  '4':
  - type: text
    content: 'Le troisième jour, Abraham, levant les yeux, vit le lieu de loin. '
  '5':
  - type: text
    content: 'Et Abraham dit à ses serviteurs: Restez ici avec l’âne; moi et le jeune homme, nous irons jusque-là pour adorer, et nous reviendrons auprès de vous. '
  '6':
  - type: text
    content: 'Abraham prit le bois pour l’holocauste, le chargea sur son fils Isaac, et porta dans sa main le feu et le couteau. Et ils marchèrent tous deux ensemble. '
  '7':
  - type: text
    content: 'Alors Isaac, parlant à Abraham, son père, dit: Mon père! Et il répondit: Me voici, mon fils! Isaac reprit: Voici le feu et le bois; mais où est l’agneau pour l’holocauste? '
  '8':
  - type: text
    content: 'Abraham répondit: Mon fils, Dieu se pourvoira lui-même de l’agneau pour l’holocauste. Et ils marchèrent tous deux ensemble. '
  '9':
  - type: text
    content: 'Lorsqu’ils furent arrivés au lieu que Dieu lui avait dit, Abraham y éleva un autel, et rangea le bois. Il lia son fils Isaac, et '
  - type: note
    content: Ja 2:21.
  - type: text
    content: 'le mit sur l’autel, par-dessus le bois. '
