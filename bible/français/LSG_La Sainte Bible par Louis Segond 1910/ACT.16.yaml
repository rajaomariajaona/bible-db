document_id: ACT.16,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Timothée. Vision de Paul à Troas
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. Ac 15:40, 41. (Ro 16:21. Ph 2:19-22. 1 Ti 1:2.) Ga 4:13-15.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il se rendit ensuite à Derbe et à Lystre. Et voici, il y avait là un disciple nommé Timothée, fils d’une femme juive fidèle et d’un père grec. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après cette vision de Paul, nous cherchâmes aussitôt à nous rendre en Macédoine, concluant que le Seigneur nous appelait à y annoncer la bonne nouvelle.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Départ pour la Macédoine. — Paul à Philippes: Lydie, marchande de pourpre; une servante devineresse; Paul et Silas emprisonnés; le geôlier de Philippes; les prisonniers remis en liberté'
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-15: cf. Mt 18:20. (Jn 6:44, 45. Ps 119:18. Mt 13:23.)'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Étant partis de Troas, nous fîmes voile directement vers la Samothrace, et le lendemain nous débarquâmes à Néapolis. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De là nous allâmes à Philippes, qui est la première ville d’un district de Macédoine, et une colonie. Nous passâmes quelques jours dans cette ville. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jour du sabbat, nous nous rendîmes, hors de la porte, vers une rivière, où nous pensions que se trouvait un lieu de prière. Nous nous assîmes, et nous parlâmes aux femmes qui étaient réunies. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’une d’elles, nommée Lydie, marchande de pourpre, de la ville de Thyatire, était une femme craignant Dieu, et elle écoutait. Le Seigneur lui ouvrit le cœur, pour qu’elle fût attentive à ce que disait Paul. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’elle eut été baptisée, avec sa famille, elle nous fit cette demande: Si vous me jugez fidèle au Seigneur, entrez dans ma maison, et demeurez-y. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 19:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 19:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 24:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 13:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et elle nous pressa par ses instances.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-34: cf. Ac 19:23-34. (1 Th 2:2. 1 Pi 4:12, 13.) (Ph 1:12. Jn 3:16. 1 Ti 1:15, 16.)'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme nous allions au lieu de prière, une servante '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 28:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui avait un esprit de Python, et qui, en devinant, procurait '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 19:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'un grand profit à ses maîtres, vint au-devant de nous, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et se mit à nous suivre, Paul et nous. Elle criait: Ces hommes sont les serviteurs du Dieu Très-Haut, et ils vous annoncent la voie du salut. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle fit cela pendant plusieurs jours. Paul fatigué se retourna, et dit à l’esprit: Je t’ordonne, au nom de Jésus-Christ, de sortir d’elle. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et il sortit à l’heure même. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les maîtres de la servante, voyant disparaître l’espoir de leur gain, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 6:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'se saisirent de Paul et de Silas, et les traînèrent sur la place publique devant les magistrats. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 6:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les frères de Lystre et d’Icone rendaient de lui un bon témoignage. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils les présentèrent aux préteurs, en disant: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 18:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 17:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ces hommes troublent notre ville; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ce sont des Juifs, qui annoncent des coutumes qu’il ne nous est permis ni de recevoir ni de suivre, à nous qui sommes Romains. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La foule se souleva aussi contre eux, et les préteurs, ayant fait arracher leurs vêtements, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 11:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 2:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ordonnèrent qu’on les battît de verges. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après qu’on les eut chargés de coups, ils les jetèrent en prison, en recommandant au geôlier de les garder sûrement. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le geôlier, ayant reçu cet ordre, les jeta dans la prison intérieure, et leur mit les ceps aux pieds. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vers le milieu de la nuit, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 4:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Paul et Silas priaient et chantaient les louanges de Dieu, et les prisonniers les entendaient. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout à coup il se fit un grand tremblement de terre, en sorte que les fondements de la prison furent ébranlés; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 5:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'au même instant, toutes les portes s’ouvrirent, et les liens de tous les prisonniers furent rompus. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le geôlier se réveilla, et, lorsqu’il vit les portes de la prison ouvertes, il tira son épée et allait se tuer, pensant que les prisonniers s’étaient enfuis. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Paul cria d’une voix forte: Ne te fais point de mal, nous sommes tous ici. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le geôlier, ayant demandé de la lumière, entra précipitamment, et se jeta tout tremblant aux pieds de Paul et de Silas; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul voulut l’emmener avec lui; et, l’ayant pris, il le circoncit, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 9:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 2:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à cause des Juifs qui étaient dans ces lieux-là, car tous savaient que son père était grec. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il les fit sortir, et dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2:37
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Seigneurs, que faut-il que je fasse pour être sauvé? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul et Silas répondirent: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 3:16
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '36'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:47
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 5:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Crois au Seigneur Jésus, et tu seras sauvé, toi et ta famille. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ils lui annoncèrent la parole du Seigneur, ainsi qu’à tous ceux qui étaient dans sa maison. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il les prit avec lui, à cette heure même de la nuit, il lava leurs plaies, et aussitôt il fut baptisé, lui et tous les siens. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les ayant conduits dans son logement, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 5:29
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: il leur servit à manger, et il se réjouit avec toute sa famille de ce qu’il avait cru en Dieu.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 35-40: cf. Ac 22:25-29. (Ph 1:1-11, 27-30.)'
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand il fit jour, les préteurs envoyèrent les licteurs pour dire au geôlier: Relâche ces hommes. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et le geôlier annonça la chose à Paul: Les préteurs ont envoyé dire qu’on vous relâchât; maintenant donc sortez, et allez en paix. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Paul dit aux licteurs: Après nous avoir battus de verges publiquement et sans jugement, nous qui sommes Romains, ils nous ont jetés en prison, et maintenant ils nous font sortir secrètement! Il n’en sera pas ainsi. Qu’ils viennent eux-mêmes nous mettre en liberté. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les licteurs rapportèrent ces paroles aux préteurs, qui furent effrayés en apprenant qu’ils étaient Romains. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils vinrent les apaiser, et ils les mirent en liberté, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 8:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'en les priant de quitter la ville. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En passant par les villes, ils recommandaient aux frères d’observer les décisions '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 15:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'des apôtres et des anciens de Jérusalem. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand ils furent sortis de la prison, ils entrèrent chez Lydie, et, après avoir vu et exhorté les frères, ils partirent.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Églises se fortifiaient dans la foi, et augmentaient en nombre de jour en jour. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ayant été empêchés par le Saint-Esprit d’annoncer la parole dans l’Asie, ils traversèrent la Phrygie et le pays de Galatie. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arrivés près de la Mysie, ils se disposaient à entrer en Bithynie; mais l’Esprit de Jésus ne le leur permit pas. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils franchirent alors la Mysie, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 2:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et descendirent à Troas. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant la nuit, Paul eut une vision: un Macédonien lui apparut, et lui fit cette prière: Passe en Macédoine, secours-nous! '
