document_id: ACT.16,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Timothée. Vision de Paul à Troas
  - type: heading
    content: 'V. 1-10: cf. Ac 15:40, 41. (Ro 16:21. Ph 2:19-22. 1 Ti 1:2.) Ga 4:13-15.'
  - type: text
    content: 'Il se rendit ensuite à Derbe et à Lystre. Et voici, il y avait là un disciple nommé Timothée, fils d’une femme juive fidèle et d’un père grec. '
  '10':
  - type: text
    content: Après cette vision de Paul, nous cherchâmes aussitôt à nous rendre en Macédoine, concluant que le Seigneur nous appelait à y annoncer la bonne nouvelle.
  - type: heading
    content: 'Départ pour la Macédoine. — Paul à Philippes: Lydie, marchande de pourpre; une servante devineresse; Paul et Silas emprisonnés; le geôlier de Philippes; les prisonniers remis en liberté'
  - type: heading
    content: 'V. 11-15: cf. Mt 18:20. (Jn 6:44, 45. Ps 119:18. Mt 13:23.)'
  '11':
  - type: text
    content: 'Étant partis de Troas, nous fîmes voile directement vers la Samothrace, et le lendemain nous débarquâmes à Néapolis. '
  '12':
  - type: text
    content: 'De là nous allâmes à Philippes, qui est la première ville d’un district de Macédoine, et une colonie. Nous passâmes quelques jours dans cette ville. '
  '13':
  - type: text
    content: 'Le jour du sabbat, nous nous rendîmes, hors de la porte, vers une rivière, où nous pensions que se trouvait un lieu de prière. Nous nous assîmes, et nous parlâmes aux femmes qui étaient réunies. '
  '14':
  - type: text
    content: 'L’une d’elles, nommée Lydie, marchande de pourpre, de la ville de Thyatire, était une femme craignant Dieu, et elle écoutait. Le Seigneur lui ouvrit le cœur, pour qu’elle fût attentive à ce que disait Paul. '
  '15':
  - type: text
    content: 'Lorsqu’elle eut été baptisée, avec sa famille, elle nous fit cette demande: Si vous me jugez fidèle au Seigneur, entrez dans ma maison, et demeurez-y. '
  - type: note
    content: Ge 19:3; 33:11. Jg 19:21. Lu 24:29. Hé 13:2.
  - type: text
    content: Et elle nous pressa par ses instances.
  - type: heading
    content: 'V. 16-34: cf. Ac 19:23-34. (1 Th 2:2. 1 Pi 4:12, 13.) (Ph 1:12. Jn 3:16. 1 Ti 1:15, 16.)'
  '16':
  - type: text
    content: 'Comme nous allions au lieu de prière, une servante '
  - type: note
    content: 1 S 28:7.
  - type: text
    content: 'qui avait un esprit de Python, et qui, en devinant, procurait '
  - type: note
    content: Ac 19:24.
  - type: text
    content: 'un grand profit à ses maîtres, vint au-devant de nous, '
  '17':
  - type: text
    content: 'et se mit à nous suivre, Paul et nous. Elle criait: Ces hommes sont les serviteurs du Dieu Très-Haut, et ils vous annoncent la voie du salut. '
  '18':
  - type: text
    content: 'Elle fit cela pendant plusieurs jours. Paul fatigué se retourna, et dit à l’esprit: Je t’ordonne, au nom de Jésus-Christ, de sortir d’elle. '
  - type: note
    content: Mc 16:17.
  - type: text
    content: 'Et il sortit à l’heure même. '
  '19':
  - type: text
    content: 'Les maîtres de la servante, voyant disparaître l’espoir de leur gain, '
  - type: note
    content: 2 Co 6:5.
  - type: text
    content: 'se saisirent de Paul et de Silas, et les traînèrent sur la place publique devant les magistrats. '
  '2':
  - type: note
    content: Ac 6:3.
  - type: text
    content: 'Les frères de Lystre et d’Icone rendaient de lui un bon témoignage. '
  '20':
  - type: text
    content: 'Ils les présentèrent aux préteurs, en disant: '
  - type: note
    content: 1 R 18:17. Ac 17:6.
  - type: text
    content: 'Ces hommes troublent notre ville; '
  '21':
  - type: text
    content: 'ce sont des Juifs, qui annoncent des coutumes qu’il ne nous est permis ni de recevoir ni de suivre, à nous qui sommes Romains. '
  '22':
  - type: text
    content: 'La foule se souleva aussi contre eux, et les préteurs, ayant fait arracher leurs vêtements, '
  - type: note
    content: 2 Co 11:25. 1 Th 2:2.
  - type: text
    content: 'ordonnèrent qu’on les battît de verges. '
  '23':
  - type: text
    content: 'Après qu’on les eut chargés de coups, ils les jetèrent en prison, en recommandant au geôlier de les garder sûrement. '
  '24':
  - type: text
    content: 'Le geôlier, ayant reçu cet ordre, les jeta dans la prison intérieure, et leur mit les ceps aux pieds. '
  '25':
  - type: text
    content: 'Vers le milieu de la nuit, '
  - type: note
    content: Ac 4:31.
  - type: text
    content: 'Paul et Silas priaient et chantaient les louanges de Dieu, et les prisonniers les entendaient. '
  '26':
  - type: text
    content: 'Tout à coup il se fit un grand tremblement de terre, en sorte que les fondements de la prison furent ébranlés; '
  - type: note
    content: Ac 5:19; 12:7.
  - type: text
    content: 'au même instant, toutes les portes s’ouvrirent, et les liens de tous les prisonniers furent rompus. '
  '27':
  - type: text
    content: 'Le geôlier se réveilla, et, lorsqu’il vit les portes de la prison ouvertes, il tira son épée et allait se tuer, pensant que les prisonniers s’étaient enfuis. '
  '28':
  - type: text
    content: 'Mais Paul cria d’une voix forte: Ne te fais point de mal, nous sommes tous ici. '
  '29':
  - type: text
    content: 'Alors le geôlier, ayant demandé de la lumière, entra précipitamment, et se jeta tout tremblant aux pieds de Paul et de Silas; '
  '3':
  - type: text
    content: 'Paul voulut l’emmener avec lui; et, l’ayant pris, il le circoncit, '
  - type: note
    content: 1 Co 9:20. Ga 2:3.
  - type: text
    content: 'à cause des Juifs qui étaient dans ces lieux-là, car tous savaient que son père était grec. '
  '30':
  - type: text
    content: 'il les fit sortir, et dit: '
  - type: note
    content: Lu 3:10. Ac 2:37; 9:6.
  - type: text
    content: 'Seigneurs, que faut-il que je fasse pour être sauvé? '
  '31':
  - type: text
    content: 'Paul et Silas répondirent: '
  - type: note
    content: Jn 3:16, 36; 6:47. 1 Jn 5:10.
  - type: text
    content: 'Crois au Seigneur Jésus, et tu seras sauvé, toi et ta famille. '
  '32':
  - type: text
    content: 'Et ils lui annoncèrent la parole du Seigneur, ainsi qu’à tous ceux qui étaient dans sa maison. '
  '33':
  - type: text
    content: 'Il les prit avec lui, à cette heure même de la nuit, il lava leurs plaies, et aussitôt il fut baptisé, lui et tous les siens. '
  '34':
  - type: text
    content: 'Les ayant conduits dans son logement, '
  - type: note
    content: Lu 5:29; 19:6.
  - type: text
    content: il leur servit à manger, et il se réjouit avec toute sa famille de ce qu’il avait cru en Dieu.
  - type: heading
    content: 'V. 35-40: cf. Ac 22:25-29. (Ph 1:1-11, 27-30.)'
  '35':
  - type: text
    content: 'Quand il fit jour, les préteurs envoyèrent les licteurs pour dire au geôlier: Relâche ces hommes. '
  '36':
  - type: text
    content: 'Et le geôlier annonça la chose à Paul: Les préteurs ont envoyé dire qu’on vous relâchât; maintenant donc sortez, et allez en paix. '
  '37':
  - type: text
    content: 'Mais Paul dit aux licteurs: Après nous avoir battus de verges publiquement et sans jugement, nous qui sommes Romains, ils nous ont jetés en prison, et maintenant ils nous font sortir secrètement! Il n’en sera pas ainsi. Qu’ils viennent eux-mêmes nous mettre en liberté. '
  '38':
  - type: text
    content: 'Les licteurs rapportèrent ces paroles aux préteurs, qui furent effrayés en apprenant qu’ils étaient Romains. '
  '39':
  - type: text
    content: 'Ils vinrent les apaiser, et ils les mirent en liberté, '
  - type: note
    content: Mt 8:34.
  - type: text
    content: 'en les priant de quitter la ville. '
  '4':
  - type: text
    content: 'En passant par les villes, ils recommandaient aux frères d’observer les décisions '
  - type: note
    content: Ac 15:20.
  - type: text
    content: 'des apôtres et des anciens de Jérusalem. '
  '40':
  - type: text
    content: Quand ils furent sortis de la prison, ils entrèrent chez Lydie, et, après avoir vu et exhorté les frères, ils partirent.
  '5':
  - type: text
    content: 'Les Églises se fortifiaient dans la foi, et augmentaient en nombre de jour en jour. '
  '6':
  - type: text
    content: 'Ayant été empêchés par le Saint-Esprit d’annoncer la parole dans l’Asie, ils traversèrent la Phrygie et le pays de Galatie. '
  '7':
  - type: text
    content: 'Arrivés près de la Mysie, ils se disposaient à entrer en Bithynie; mais l’Esprit de Jésus ne le leur permit pas. '
  '8':
  - type: text
    content: 'Ils franchirent alors la Mysie, '
  - type: note
    content: 2 Co 2:12.
  - type: text
    content: 'et descendirent à Troas. '
  '9':
  - type: text
    content: 'Pendant la nuit, Paul eut une vision: un Macédonien lui apparut, et lui fit cette prière: Passe en Macédoine, secours-nous! '
