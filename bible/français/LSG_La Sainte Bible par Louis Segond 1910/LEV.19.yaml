document_id: LEV.19,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Lois religieuses, cérémonielles et morales
  - type: heading
    content: 'V. 1-4: cf. 1 Pi 1:14-16. Lé 20:26; 26:1, 2.'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: text
    content: Tu ne cueilleras pas non plus les grappes restées dans ta vigne, et tu ne ramasseras pas les grains qui en seront tombés. Tu abandonneras cela au pauvre et à l’étranger. Je suis l’Éternel, votre Dieu.
  - type: heading
    content: 'V. 11-15: cf. Ép 4:28, 25. Mal 3:5. (Ps 72:12-14. És 11:3-5.)'
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ex 20:15.
  - type: text
    content: 'Vous ne déroberez point, et vous n’userez ni de mensonge ni de tromperie les uns envers les autres. '
  '12':
  - type: note
    content: Ex 20:7. De 5:11.
  - type: text
    content: 'Vous ne jurerez point faussement par mon nom, car tu profanerais le nom de ton Dieu. Je suis l’Éternel. '
  '13':
  - type: text
    content: 'Tu n’opprimeras point ton prochain, et tu ne raviras rien par violence. '
  - type: note
    content: De 24:14. Ja 5:4.
  - type: text
    content: 'Tu ne retiendras point jusqu’au lendemain le salaire du mercenaire. '
  '14':
  - type: text
    content: 'Tu ne maudiras point un sourd, et tu ne mettras devant un aveugle rien qui puisse le faire tomber; car tu auras la crainte de ton Dieu. Je suis l’Éternel. '
  '15':
  - type: text
    content: 'Tu ne commettras point d’iniquité dans tes jugements: '
  - type: note
    content: De 1:17; 16:19. Pr 24:23.
  - type: text
    content: tu n’auras point égard à la personne du pauvre, et tu ne favoriseras point la personne du grand, mais tu jugeras ton prochain selon la justice.
  - type: heading
    content: 'V. 16-18: cf. (Ps 140:12; 141:3-5.) Ro 13:8-10.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ex 23:1.
  - type: text
    content: 'Tu ne répandras point de calomnies parmi ton peuple. Tu ne t’élèveras point contre le sang de ton prochain. Je suis l’Éternel. '
  '17':
  - type: note
    content: 1 Jn 2:9, 11; 3:15.
  - type: text
    content: 'Tu ne haïras point ton frère dans ton cœur; '
  - type: note
    content: Mt 18:15. Lu 17:3.
  - type: text
    content: 'tu auras soin de reprendre ton prochain, mais tu ne te chargeras point d’un péché à cause de lui. '
  '18':
  - type: note
    content: Mt 5:39, 44. Lu 6:27. Ro 12:19. 1 Co 6:7. 1 Th 5:15. 1 Pi 3:9.
  - type: text
    content: 'Tu ne te vengeras point, et tu ne garderas point de rancune contre les enfants de ton peuple. '
  - type: note
    content: Mt 5:43; 22:39. Ro 13:9. Ga 5:14. Ja 2:8.
  - type: text
    content: Tu aimeras ton prochain comme toi-même. Je suis l’Éternel.
  - type: heading
    content: 'V. 19-25: cf. De 22:9-11. Pr 3:9, 10.'
  '19':
  - type: text
    content: 'Vous observerez mes lois. Tu n’accoupleras point des bestiaux de deux espèces différentes; '
  - type: note
    content: De 22:9.
  - type: text
    content: 'tu n’ensemenceras point ton champ de deux espèces de semences; et tu ne porteras pas un vêtement tissé de deux espèces de fils. '
  '2':
  - type: text
    content: 'Parle à toute l’assemblée des enfants d’Israël, et tu leur diras: '
  - type: note
    content: Lé 11:44; 20:7, 26. 1 Pi 1:16.
  - type: text
    content: 'Soyez saints, car je suis saint, moi, l’Éternel, votre Dieu. '
  '20':
  - type: text
    content: 'Lorsqu’un homme couchera et aura commerce avec une femme, si c’est une esclave fiancée à un autre homme, et qui n’a pas été rachetée ou affranchie, ils seront châtiés, mais non punis de mort, parce qu’elle n’a pas été affranchie. '
  '21':
  - type: text
    content: 'L’homme amènera pour sa faute à l’Éternel, à l’entrée de la tente d’assignation, un bélier en sacrifice de culpabilité. '
  '22':
  - type: text
    content: 'Le sacrificateur fera pour lui l’expiation devant l’Éternel, pour le péché qu’il a commis, avec le bélier offert en sacrifice de culpabilité, et le péché qu’il a commis lui sera pardonné. '
  '23':
  - type: text
    content: 'Quand vous serez entrés dans le pays, et que vous y aurez planté toutes sortes d’arbres fruitiers, vous en regarderez les fruits comme incirconcis; pendant trois ans, ils seront pour vous incirconcis; on n’en mangera point. '
  '24':
  - type: text
    content: 'La quatrième année, tous leurs fruits seront consacrés à l’Éternel au milieu des réjouissances. '
  '25':
  - type: text
    content: La cinquième année, vous en mangerez les fruits, et vous continuerez à les récolter. Je suis l’Éternel, votre Dieu.
  - type: heading
    content: 'V. 26-31: cf. Lé 17:10-14. De 18:10-14. És 8:19.'
  '26':
  - type: text
    content: 'Vous ne mangerez rien avec du sang. Vous n’observerez ni les serpents ni les nuages pour en tirer des pronostics. '
  '27':
  - type: note
    content: Lé 21:5.
  - type: text
    content: 'Vous ne couperez point en rond les coins de votre chevelure, et tu ne raseras point les coins de ta barbe. '
  '28':
  - type: note
    content: De 14:1.
  - type: text
    content: 'Vous ne ferez point d’incisions dans votre chair pour un mort, et vous n’imprimerez point de figures sur vous. Je suis l’Éternel. '
  '29':
  - type: text
    content: 'Tu ne profaneras point ta fille en la livrant à la prostitution, de peur que le pays ne se prostitue et ne se remplisse de crimes. '
  '3':
  - type: note
    content: Ex 20:12.
  - type: text
    content: 'Chacun de vous respectera sa mère et son père, et '
  - type: note
    content: Ex 31:13. Lé 26:2.
  - type: text
    content: 'observera mes sabbats. Je suis l’Éternel, votre Dieu. '
  '30':
  - type: text
    content: 'Vous observerez mes sabbats, et vous révérerez mon sanctuaire. Je suis l’Éternel. '
  '31':
  - type: note
    content: Lé 20:6.
  - type: text
    content: Ne vous tournez point vers ceux qui évoquent les esprits, ni vers les devins; ne les recherchez point, de peur de vous souiller avec eux. Je suis l’Éternel, votre Dieu.
  - type: heading
    content: 'V. 32-37: cf. Pr 16:31. (Ex 23:9. De 10:17-19.) De 25:13-16.'
  '32':
  - type: text
    content: 'Tu te lèveras devant les cheveux blancs, et tu honoreras la personne du vieillard. Tu craindras ton Dieu. Je suis l’Éternel. '
  '33':
  - type: note
    content: Ex 22:21.
  - type: text
    content: 'Si un étranger vient séjourner avec vous dans votre pays, vous ne l’opprimerez point. '
  '34':
  - type: text
    content: 'Vous traiterez l’étranger en séjour parmi vous comme un indigène du milieu de vous; vous l’aimerez comme vous-mêmes, car vous avez été étrangers dans le pays d’Égypte. Je suis l’Éternel, votre Dieu. '
  '35':
  - type: text
    content: 'Vous ne commettrez point d’iniquité ni dans les jugements, ni dans les mesures de dimension, ni dans les poids, ni dans les mesures de capacité. '
  '36':
  - type: note
    content: Pr 11:1; 16:11; 20:10.
  - type: text
    content: 'Vous aurez des balances justes, des poids justes, des épha justes et des hin justes. Je suis l’Éternel, votre Dieu, qui vous ai fait sortir du pays d’Égypte. '
  '37':
  - type: text
    content: Vous observerez toutes mes lois et toutes mes ordonnances, et vous les mettrez en pratique. Je suis l’Éternel.
  '4':
  - type: text
    content: 'Vous ne vous tournerez point vers les idoles, et '
  - type: note
    content: Ex 34:17.
  - type: text
    content: vous ne vous ferez point des dieux de fonte.
  - type: heading
    content: 'V. 5-10: cf. Lé 7:11-21. De 24:19-22.'
  '5':
  - type: text
    content: 'Quand vous offrirez à l’Éternel un sacrifice d’actions de grâces, vous l’offrirez en sorte qu’il soit agréé. '
  '6':
  - type: note
    content: Lé 7:16.
  - type: text
    content: 'La victime sera mangée le jour où vous la sacrifierez, ou le lendemain; ce qui restera jusqu’au troisième jour sera brûlé au feu. '
  '7':
  - type: text
    content: 'Si l’on en mange le troisième jour, ce sera une chose infecte: le sacrifice ne sera point agréé. '
  '8':
  - type: text
    content: 'Celui qui en mangera portera la peine de son péché, car il profane ce qui est consacré à l’Éternel: cette personne-là sera retranchée de son peuple. '
  '9':
  - type: note
    content: Lé 23:22. De 24:19.
  - type: text
    content: 'Quand vous ferez la moisson dans votre pays, tu laisseras un coin de ton champ sans le moissonner, et tu ne ramasseras pas ce qui reste à glaner. '
