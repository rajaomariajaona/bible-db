document_id: LEV.19,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lois religieuses, cérémonielles et morales
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-4: cf. 1 Pi 1:14-16. Lé 20:26; 26:1, 2.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tu ne cueilleras pas non plus les grappes restées dans ta vigne, et tu ne ramasseras pas les grains qui en seront tombés. Tu abandonneras cela au pauvre et à l’étranger. Je suis l’Éternel, votre Dieu.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-15: cf. Ép 4:28, 25. Mal 3:5. (Ps 72:12-14. És 11:3-5.)'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous ne déroberez point, et vous n’userez ni de mensonge ni de tromperie les uns envers les autres. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 5:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous ne jurerez point faussement par mon nom, car tu profanerais le nom de ton Dieu. Je suis l’Éternel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tu n’opprimeras point ton prochain, et tu ne raviras rien par violence. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 24:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 5:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu ne retiendras point jusqu’au lendemain le salaire du mercenaire. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Tu ne maudiras point un sourd, et tu ne mettras devant un aveugle rien qui puisse le faire tomber; car tu auras la crainte de ton Dieu. Je suis l’Éternel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tu ne commettras point d’iniquité dans tes jugements: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 1:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 24:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: tu n’auras point égard à la personne du pauvre, et tu ne favoriseras point la personne du grand, mais tu jugeras ton prochain selon la justice.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-18: cf. (Ps 140:12; 141:3-5.) Ro 13:8-10.'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu ne répandras point de calomnies parmi ton peuple. Tu ne t’élèveras point contre le sang de ton prochain. Je suis l’Éternel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 2:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu ne haïras point ton frère dans ton cœur; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 18:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 17:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'tu auras soin de reprendre ton prochain, mais tu ne te chargeras point d’un péché à cause de lui. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:39
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '44'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 6:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 12:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 6:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 5:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 3:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu ne te vengeras point, et tu ne garderas point de rancune contre les enfants de ton peuple. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:43
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:39
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 13:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 5:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 2:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tu aimeras ton prochain comme toi-même. Je suis l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 19-25: cf. De 22:9-11. Pr 3:9, 10.'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Vous observerez mes lois. Tu n’accoupleras point des bestiaux de deux espèces différentes; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 22:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'tu n’ensemenceras point ton champ de deux espèces de semences; et tu ne porteras pas un vêtement tissé de deux espèces de fils. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Parle à toute l’assemblée des enfants d’Israël, et tu leur diras: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 11:44
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '26'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Soyez saints, car je suis saint, moi, l’Éternel, votre Dieu. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Lorsqu’un homme couchera et aura commerce avec une femme, si c’est une esclave fiancée à un autre homme, et qui n’a pas été rachetée ou affranchie, ils seront châtiés, mais non punis de mort, parce qu’elle n’a pas été affranchie. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'L’homme amènera pour sa faute à l’Éternel, à l’entrée de la tente d’assignation, un bélier en sacrifice de culpabilité. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Le sacrificateur fera pour lui l’expiation devant l’Éternel, pour le péché qu’il a commis, avec le bélier offert en sacrifice de culpabilité, et le péché qu’il a commis lui sera pardonné. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Quand vous serez entrés dans le pays, et que vous y aurez planté toutes sortes d’arbres fruitiers, vous en regarderez les fruits comme incirconcis; pendant trois ans, ils seront pour vous incirconcis; on n’en mangera point. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'La quatrième année, tous leurs fruits seront consacrés à l’Éternel au milieu des réjouissances. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: La cinquième année, vous en mangerez les fruits, et vous continuerez à les récolter. Je suis l’Éternel, votre Dieu.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 26-31: cf. Lé 17:10-14. De 18:10-14. És 8:19.'
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Vous ne mangerez rien avec du sang. Vous n’observerez ni les serpents ni les nuages pour en tirer des pronostics. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 21:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous ne couperez point en rond les coins de votre chevelure, et tu ne raseras point les coins de ta barbe. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 14:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous ne ferez point d’incisions dans votre chair pour un mort, et vous n’imprimerez point de figures sur vous. Je suis l’Éternel. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Tu ne profaneras point ta fille en la livrant à la prostitution, de peur que le pays ne se prostitue et ne se remplisse de crimes. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Chacun de vous respectera sa mère et son père, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 31:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 26:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'observera mes sabbats. Je suis l’Éternel, votre Dieu. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Vous observerez mes sabbats, et vous révérerez mon sanctuaire. Je suis l’Éternel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 20:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne vous tournez point vers ceux qui évoquent les esprits, ni vers les devins; ne les recherchez point, de peur de vous souiller avec eux. Je suis l’Éternel, votre Dieu.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 32-37: cf. Pr 16:31. (Ex 23:9. De 10:17-19.) De 25:13-16.'
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Tu te lèveras devant les cheveux blancs, et tu honoreras la personne du vieillard. Tu craindras ton Dieu. Je suis l’Éternel. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 22:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un étranger vient séjourner avec vous dans votre pays, vous ne l’opprimerez point. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Vous traiterez l’étranger en séjour parmi vous comme un indigène du milieu de vous; vous l’aimerez comme vous-mêmes, car vous avez été étrangers dans le pays d’Égypte. Je suis l’Éternel, votre Dieu. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Vous ne commettrez point d’iniquité ni dans les jugements, ni dans les mesures de dimension, ni dans les poids, ni dans les mesures de capacité. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 11:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous aurez des balances justes, des poids justes, des épha justes et des hin justes. Je suis l’Éternel, votre Dieu, qui vous ai fait sortir du pays d’Égypte. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Vous observerez toutes mes lois et toutes mes ordonnances, et vous les mettrez en pratique. Je suis l’Éternel.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Vous ne vous tournerez point vers les idoles, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 34:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: vous ne vous ferez point des dieux de fonte.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-10: cf. Lé 7:11-21. De 24:19-22.'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Quand vous offrirez à l’Éternel un sacrifice d’actions de grâces, vous l’offrirez en sorte qu’il soit agréé. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 7:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'La victime sera mangée le jour où vous la sacrifierez, ou le lendemain; ce qui restera jusqu’au troisième jour sera brûlé au feu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Si l’on en mange le troisième jour, ce sera une chose infecte: le sacrifice ne sera point agréé. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Celui qui en mangera portera la peine de son péché, car il profane ce qui est consacré à l’Éternel: cette personne-là sera retranchée de son peuple. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 23:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 24:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand vous ferez la moisson dans votre pays, tu laisseras un coin de ton champ sans le moissonner, et tu ne ramasseras pas ce qui reste à glaner. '
