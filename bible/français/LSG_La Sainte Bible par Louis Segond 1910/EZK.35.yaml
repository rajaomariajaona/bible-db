document_id: EZK.35,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie contre les Édomites
  - type: heading
    content: 'V. 1-15: cf. (Éz 25:12-14; 36:1-7. Jé 49:7-22. Ab 1.) La 4:21.'
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: text
    content: 'Parce que tu as dit: Les deux nations, les deux pays seront à moi,'
  - type: note
    content: Ps 83:13.
  - type: text
    content: Et nous en prendrons possession,
  - type: text
    content: Quand même l’Éternel était là,
  '11':
  - type: text
    content: Je suis vivant! Dit le Seigneur, l’Éternel,
  - type: text
    content: J’agirai avec la colère et la fureur
  - type: text
    content: Que tu as montrées, dans ta haine contre eux;
  - type: text
    content: Et je me ferai connaître au milieu d’eux,
  - type: text
    content: Quand je te jugerai.
  '12':
  - type: text
    content: Tu sauras que moi, l’Éternel,
  - type: text
    content: J’ai entendu tous les outrages
  - type: text
    content: Que tu as proférés contre les montagnes d’Israël,
  - type: text
    content: 'En disant: Elles sont dévastées,'
  - type: text
    content: Elles nous sont livrées comme une proie.
  '13':
  - type: text
    content: Vous vous êtes élevés contre moi par vos discours,
  - type: text
    content: 'Vous avez multiplié vos paroles contre moi:'
  - type: text
    content: J’ai entendu.
  '14':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Lorsque tout le pays sera dans la joie,
  - type: text
    content: Je ferai de toi une solitude.
  '15':
  - type: text
    content: A cause de la joie que tu as éprouvée
  - type: text
    content: Parce que l’héritage de la maison d’Israël était dévasté,
  - type: text
    content: Je te traiterai de la même manière;
  - type: text
    content: Tu deviendras une solitude, montagne de Séir,
  - type: text
    content: Toi, et Édom tout entier.
  - type: text
    content: Et ils sauront que je suis l’Éternel.
  '2':
  - type: text
    content: Fils de l’homme, tourne ta face vers la montagne de Séir,
  - type: text
    content: Et prophétise contre elle!
  '3':
  - type: text
    content: 'Tu lui diras: Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Voici, j’en veux à toi, montagne de Séir!
  - type: text
    content: J’étends ma main sur toi,
  - type: text
    content: Et je fais de toi une solitude et un désert.
  '4':
  - type: text
    content: Je mettrai tes villes en ruines,
  - type: text
    content: Tu deviendras une solitude,
  - type: text
    content: Et tu sauras que je suis l’Éternel.
  '5':
  - type: text
    content: 'Parce que tu avais une '
  - type: note
    content: Éz 25:15.
  - type: text
    content: haine éternelle,
  - type: text
    content: Parce que tu as précipité par le glaive les enfants d’Israël,
  - type: text
    content: Au jour de leur détresse,
  - type: text
    content: Au temps où l’iniquité était à son terme,
  '6':
  - type: text
    content: Je suis vivant! Dit le Seigneur, l’Éternel,
  - type: text
    content: Je te mettrai à sang, et le sang te poursuivra;
  - type: text
    content: Puisque tu n’as pas haï le sang,
  - type: text
    content: Le sang te poursuivra.
  '7':
  - type: text
    content: Je ferai de la montagne de Séir une solitude et un désert,
  - type: text
    content: Et j’en exterminerai les allants et les venants.
  '8':
  - type: text
    content: Je remplirai de morts ses montagnes;
  - type: text
    content: Sur tes collines, dans tes vallées, dans tous tes ravins,
  - type: text
    content: Tomberont ceux qui seront frappés par l’épée.
  '9':
  - type: text
    content: Je ferai de toi des solitudes éternelles,
  - type: text
    content: Tes villes ne seront plus habitées,
  - type: text
    content: Et vous saurez que je suis l’Éternel.
