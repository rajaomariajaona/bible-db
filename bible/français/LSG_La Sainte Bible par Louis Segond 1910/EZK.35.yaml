document_id: EZK.35
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie contre les Édomites
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-15: cf. (Éz 25:12-14; 36:1-7. Jé 49:7-22. Ab 1.) La 4:21.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole de l’Éternel me fut adressée, en ces mots:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fils de l’homme, tourne ta face vers la montagne de Séir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et prophétise contre elle!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu lui diras: Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, j’en veux à toi, montagne de Séir!
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’étends ma main sur toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je fais de toi une solitude et un désert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je mettrai tes villes en ruines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu deviendras une solitude,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu sauras que je suis l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Parce que tu avais une '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 25:15
      metadata:
        usfm: EZK.25.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: haine éternelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que tu as précipité par le glaive les enfants d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au jour de leur détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au temps où l’iniquité était à son terme,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je suis vivant! Dit le Seigneur, l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te mettrai à sang, et le sang te poursuivra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisque tu n’as pas haï le sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le sang te poursuivra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je ferai de la montagne de Séir une solitude et un désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’en exterminerai les allants et les venants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je remplirai de morts ses montagnes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur tes collines, dans tes vallées, dans tous tes ravins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tomberont ceux qui seront frappés par l’épée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je ferai de toi des solitudes éternelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes villes ne seront plus habitées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous saurez que je suis l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Parce que tu as dit: Les deux nations, les deux pays seront à moi,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 83:13
      metadata:
        usfm: PSA.83.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et nous en prendrons possession,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand même l’Éternel était là,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je suis vivant! Dit le Seigneur, l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’agirai avec la colère et la fureur
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tu as montrées, dans ta haine contre eux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je me ferai connaître au milieu d’eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand je te jugerai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tu sauras que moi, l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai entendu tous les outrages
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tu as proférés contre les montagnes d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'En disant: Elles sont dévastées,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles nous sont livrées comme une proie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vous vous êtes élevés contre moi par vos discours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Vous avez multiplié vos paroles contre moi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai entendu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lorsque tout le pays sera dans la joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ferai de toi une solitude.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: A cause de la joie que tu as éprouvée
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que l’héritage de la maison d’Israël était dévasté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te traiterai de la même manière;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu deviendras une solitude, montagne de Séir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi, et Édom tout entier.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils sauront que je suis l’Éternel.
