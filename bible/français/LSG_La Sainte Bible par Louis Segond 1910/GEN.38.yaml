document_id: GEN.38,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Juda et Tamar
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. 1 Ch 2:3. De 25:5-10.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce temps-là, Juda s’éloigna de ses frères, et se retira vers un homme d’Adullam, nommé Hira. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce qu’il faisait déplut à l’Éternel, qui le fit aussi mourir. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Juda dit à Tamar, sa belle-fille: Demeure veuve dans la maison de ton père, jusqu’à ce que Schéla, mon fils, soit grand. Il parlait ainsi dans la crainte que Schéla ne mourût comme ses frères. Tamar s’en alla, et elle habita dans la maison de son père.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-30: cf. 1 Ch 2:4-15. Ru 4.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les jours s’écoulèrent, et la fille de Schua, femme de Juda, mourut. Lorsque Juda fut consolé, il monta à Thimna, vers ceux qui tondaient ses brebis, lui et son ami Hira, l’Adullamite. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On en informa Tamar, et on lui dit: Voici ton beau-père qui monte à Thimna, pour tondre ses brebis. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors elle ôta ses habits de veuve, elle se couvrit d’un voile et s’enveloppa, et elle s’assit à l’entrée d’Énaïm, sur le chemin de Thimna; car elle voyait que Schéla était devenu grand, et qu’elle ne lui était point donnée pour femme. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Juda la vit, et la prit pour une prostituée, parce qu’elle avait couvert son visage. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il l’aborda sur le chemin, et dit: Laisse-moi aller vers toi. Car il ne connut pas que c’était sa belle-fille. Elle dit: Que me donneras-tu pour venir vers moi? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il répondit: Je t’enverrai un chevreau de mon troupeau. Elle dit: Me donneras-tu un gage, jusqu’à ce que tu l’envoies? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il répondit: Quel gage te donnerai-je? Elle dit: Ton cachet, ton cordon, et le bâton que tu as à la main. Il les lui donna. Puis il alla vers elle; et elle devint enceinte de lui. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle se leva, et s’en alla; elle ôta son voile, et remit ses habits de veuve. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Là, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 2:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Juda vit la fille d’un Cananéen, nommé Schua; il la prit pour femme, et alla vers elle. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Juda envoya le chevreau par son ami l’Adullamite, pour retirer le gage des mains de la femme. Mais il ne la trouva point. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il interrogea les gens du lieu, en disant: Où est cette prostituée qui se tenait à Énaïm, sur le chemin? Ils répondirent: Il n’y a point eu ici de prostituée. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il retourna auprès de Juda, et dit: Je ne l’ai pas trouvée, et même les gens du lieu ont dit: Il n’y a point eu ici de prostituée. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Juda dit: Qu’elle garde ce qu’elle a! Ne nous exposons pas au mépris. Voici, j’ai envoyé ce chevreau, et tu ne l’as pas trouvée. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Environ trois mois après, on vint dire à Juda: Tamar, ta belle-fille, s’est prostituée, et même la voilà enceinte à la suite de sa prostitution. Et Juda dit: Faites-la sortir, et qu’elle soit brûlée. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme on l’amenait dehors, elle fit dire à son beau-père: C’est de l’homme à qui ces choses appartiennent que je suis enceinte; reconnais, je te prie, à qui sont ce cachet, ces cordons et ce bâton. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Juda les reconnut, et dit: Elle est moins coupable que moi, puisque je ne l’ai pas donnée à Schéla, mon fils. Et il ne la connut plus. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand elle fut au moment d’accoucher, voici, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 2:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il y avait deux jumeaux dans son ventre. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et pendant l’accouchement il y en eut un qui présenta la main; la sage-femme la prit, et y attacha un fil cramoisi, en disant: Celui-ci sort le premier. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il retira la main, et son frère sortit. Alors la sage-femme dit: Quelle brèche tu as faite! Et elle lui donna le nom de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 1:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Pérets. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle devint enceinte, et enfanta un fils, qu’elle appela Er. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ensuite sortit son frère, qui avait à la main le fil cramoisi; et on lui donna le nom de Zérach.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle devint encore enceinte, et enfanta un fils, qu’elle appela Onan. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle enfanta de nouveau un fils, qu’elle appela '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 26:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Schéla; Juda était à Czib quand elle l’enfanta. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Juda prit pour Er, son premier-né, une femme nommée Tamar. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Er, premier-né de Juda, était méchant aux yeux de l’Éternel; et l’Éternel le fit mourir. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Juda dit à Onan: Va vers la femme de ton frère, prends-la, comme beau-frère, et suscite une postérité à ton frère. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Onan, sachant que cette postérité ne serait pas à lui, se souillait à terre lorsqu’il allait vers la femme de son frère, afin de ne pas donner de postérité à son frère. '
