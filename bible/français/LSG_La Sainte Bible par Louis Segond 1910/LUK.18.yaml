document_id: LUK.18,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Parabole du juge inique
  - type: heading
    content: 'V. 1-8: cf. Lu 11:5-10. Mc 7:24-30. Ge 32:24-29. És 62:6, 7.'
  - type: text
    content: 'Jésus leur adressa une parabole, pour montrer '
  - type: note
    content: Ro 12:12. Ép 6:18. Col 4:2. 1 Th 5:17.
  - type: text
    content: 'qu’il faut toujours prier, et ne point se relâcher. '
  '10':
  - type: text
    content: ' '
  - type: text
    content: Deux hommes montèrent au temple pour prier; l’un était pharisien, et l’autre publicain.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Le pharisien, debout, priait ainsi en lui-même:'
  - type: text
    content: ' '
  - type: note
    content: És 1:15; 58:2. Ap 3:17, 18.
  - type: text
    content: O Dieu, je te rends grâces de ce que je ne suis pas comme le reste des hommes, qui sont ravisseurs, injustes, adultères, ou même comme ce publicain;
  - type: text
    content: ' '
  '12':
  - type: text
    content: je jeûne deux fois la semaine, je donne la dîme de tous mes revenus.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Le publicain, se tenant à distance, n’osait même pas lever les yeux au ciel; mais il se frappait la poitrine, en disant: O Dieu, sois apaisé envers moi, qui suis un pécheur.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: Je vous le dis, celui-ci descendit dans sa maison justifié, plutôt que l’autre.
  - type: text
    content: ' '
  - type: note
    content: Job 22:29. Pr 29:23. Mt 23:12. Lu 14:11. Ja 4:6, 10. 1 Pi 5:5.
  - type: text
    content: Car quiconque s’élève sera abaissé, et celui qui s’abaisse sera élevé.
  - type: heading
    content: Les petits enfants
  - type: heading
    content: 'V. 15-17: cf. (Mt 19:13-15. Mc 10:13-16.) Mt 18:1-4.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Mt 19:13. Mc 10:13.
  - type: text
    content: 'On lui amena aussi les petits enfants, afin qu’il les touchât. Mais les disciples, voyant cela, reprenaient ceux qui les amenaient. '
  '16':
  - type: text
    content: 'Et Jésus les appela, et dit: '
  - type: text
    content: Laissez venir à moi les petits enfants, et ne les en empêchez pas;
  - type: text
    content: ' '
  - type: note
    content: Mt 18:3; 19:14. 1 Co 14:20. 1 Pi 2:2.
  - type: text
    content: car le royaume de Dieu est pour ceux qui leur ressemblent.
  '17':
  - type: text
    content: ' '
  - type: text
    content: Je vous le dis en vérité, quiconque ne recevra pas le royaume de Dieu comme un petit enfant n’y entrera point.
  - type: heading
    content: L’homme riche. L’héritage de la vie éternelle
  - type: heading
    content: 'V. 18-30: cf. (Mt 19:16-30. Mc 10:17-31.) Mt 5:29, 30.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: Mt 19:16. Mc 10:17.
  - type: text
    content: 'Un chef interrogea Jésus, et dit: Bon maître, que dois-je faire pour hériter la vie éternelle? '
  '19':
  - type: text
    content: 'Jésus lui répondit: '
  - type: text
    content: Pourquoi m’appelles-tu bon? Il n’y a de bon que Dieu seul.
  '2':
  - type: text
    content: 'Il dit: '
  - type: text
    content: Il y avait dans une ville un juge qui ne craignait point Dieu et qui n’avait d’égard pour personne.
  '20':
  - type: text
    content: ' '
  - type: text
    content: 'Tu connais les commandements:'
  - type: text
    content: ' '
  - type: note
    content: Ex 20:13. De 5:17. Ro 13:9.
  - type: text
    content: Tu ne commettras point d’adultère; tu ne tueras point; tu ne déroberas point; tu ne diras point de faux témoignage;
  - type: text
    content: ' '
  - type: note
    content: Ép 6:2. Col 3:20.
  - type: text
    content: honore ton père et ta mère.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'J’ai, dit-il, observé toutes ces choses dès ma jeunesse. '
  '22':
  - type: text
    content: 'Jésus, ayant entendu cela, lui dit: '
  - type: text
    content: 'Il te manque encore une chose:'
  - type: text
    content: ' '
  - type: note
    content: Mt 6:19; 19:21. 1 Ti 6:19.
  - type: text
    content: vends tout ce que tu as, distribue-le aux pauvres, et tu auras un trésor dans les cieux. Puis, viens, et suis-moi.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Lorsqu’il entendit ces paroles, il devint tout triste; car il était très riche. '
  '24':
  - type: text
    content: 'Jésus, voyant qu’il était devenu tout triste, dit: '
  - type: note
    content: Pr 11:28. Mt 19:23. Mc 10:23.
  - type: text
    content: Qu’il est difficile à ceux qui ont des richesses d’entrer dans le royaume de Dieu!
  '25':
  - type: text
    content: ' '
  - type: text
    content: Car il est plus facile à un chameau de passer par le trou d’une aiguille qu’à un riche d’entrer dans le royaume de Dieu.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Ceux qui l’écoutaient dirent: Et qui peut être sauvé? '
  '27':
  - type: text
    content: 'Jésus répondit: '
  - type: note
    content: Job 42:2. Jé 32:17. Za 8:6. Lu 1:37.
  - type: text
    content: Ce qui est impossible aux hommes est possible à Dieu.
  - type: text
    content: ' '
  '28':
  - type: note
    content: Mt 4:20; 19:27. Mc 10:28. Lu 5:11.
  - type: text
    content: 'Pierre dit alors: Voici, nous avons tout quitté, et nous t’avons suivi. '
  '29':
  - type: text
    content: 'Et Jésus leur dit: '
  - type: text
    content: Je vous le dis en vérité,
  - type: text
    content: ' '
  - type: note
    content: De 33:9.
  - type: text
    content: il n’est personne qui, ayant quitté, à cause du royaume de Dieu, sa maison, ou sa femme, ou ses frères, ou ses parents, ou ses enfants,
  '3':
  - type: text
    content: ' '
  - type: text
    content: 'Il y avait aussi dans cette ville une veuve qui venait lui dire: Fais-moi justice de ma partie adverse.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Job 42:12.
  - type: text
    content: ne reçoive beaucoup plus dans ce siècle-ci, et, dans le siècle à venir, la vie éternelle.
  - type: heading
    content: Jésus annonce sa mort et sa résurrection
  - type: heading
    content: 'V. 31-34: cf. (Mt 20:17-19. Mc 10:32-34.) Lu 9:22, 44, 45.'
  '31':
  - type: text
    content: ' '
  - type: note
    content: Mt 16:21; 17:22; 20:17. Mc 8:31; 9:31; 10:32. Lu 9:22; 24:7.
  - type: text
    content: 'Jésus prit les douze auprès de lui, et leur dit: '
  - type: text
    content: Voici, nous montons à Jérusalem, et
  - type: text
    content: ' '
  - type: note
    content: Ps 22:7. És 53:7.
  - type: text
    content: tout ce qui a été écrit par les prophètes au sujet du Fils de l’homme s’accomplira.
  '32':
  - type: text
    content: ' '
  - type: note
    content: Mt 27:2. Lu 23:1. Jn 18:28. Ac 3:13.
  - type: text
    content: Car il sera livré aux païens; on se moquera de lui, on l’outragera, on crachera sur lui,
  - type: text
    content: ' '
  '33':
  - type: text
    content: et, après l’avoir battu de verges, on le fera mourir; et le troisième jour il ressuscitera.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Mais ils ne comprirent rien à cela; c’était pour eux un langage caché, des paroles dont ils ne saisissaient pas le sens.
  - type: heading
    content: Guérison d’un aveugle à Jéricho
  - type: heading
    content: 'V. 35-43: cf. (Mt 20:29-34. Mc 10:46-53.)'
  '35':
  - type: text
    content: ' '
  - type: note
    content: Mt 20:29. Mc 10:46.
  - type: text
    content: 'Comme Jésus approchait de Jéricho, un aveugle était assis au bord du chemin, et mendiait. '
  '36':
  - type: text
    content: 'Entendant la foule passer, il demanda ce que c’était. '
  '37':
  - type: text
    content: 'On lui dit: C’est Jésus de Nazareth qui passe. '
  '38':
  - type: text
    content: 'Et il cria: Jésus, Fils de David, aie pitié de moi! '
  '39':
  - type: text
    content: 'Ceux qui marchaient devant le reprenaient, pour le faire taire; mais il criait beaucoup plus fort: Fils de David, aie pitié de moi! '
  '4':
  - type: text
    content: 'Pendant longtemps il refusa. Mais ensuite il dit en lui-même: Quoique je ne craigne point Dieu et que je n’aie d’égard pour personne,'
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Jésus, s’étant arrêté, ordonna qu’on le lui amène; et, quand il se fut approché, '
  '41':
  - type: text
    content: 'il lui demanda: '
  - type: text
    content: Que veux-tu que je te fasse?
  - type: text
    content: ' Il répondit: Seigneur, que je recouvre la vue. '
  '42':
  - type: text
    content: 'Et Jésus lui dit: '
  - type: text
    content: Recouvre la vue; ta foi t’a sauvé.
  - type: text
    content: ' '
  '43':
  - type: text
    content: A l’instant il recouvra la vue, et suivit Jésus, en glorifiant Dieu. Tout le peuple, voyant cela, loua Dieu.
  '5':
  - type: text
    content: néanmoins, parce que cette veuve m’importune, je lui ferai justice, afin qu’elle ne vienne pas sans cesse me rompre la tête.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Le Seigneur ajouta: '
  - type: text
    content: Entendez ce que dit le juge inique.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ap 6:10.
  - type: text
    content: Et Dieu ne fera-t-il pas justice à ses élus, qui crient à lui jour et nuit, et tardera-t-il à leur égard?
  - type: text
    content: ' '
  '8':
  - type: text
    content: Je vous le dis, il leur fera promptement justice. Mais, quand le Fils de l’homme viendra, trouvera-t-il la foi sur la terre?
  - type: heading
    content: Parabole du pharisien et du publicain
  - type: heading
    content: 'V. 9-14: cf. Pr 28:9, 13; 30:12, 13. Ja 4:6, 9, 10. 1 Pi 5:5, 6.'
  '9':
  - type: text
    content: 'Il dit encore cette parabole, en vue de certaines personnes se persuadant qu’elles étaient justes, et ne faisant aucun cas des autres:'
