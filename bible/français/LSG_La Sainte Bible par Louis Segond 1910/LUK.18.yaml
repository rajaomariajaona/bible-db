    - type: text
      text: 'V. 9-14: cf. Pr 28:9, 13; 30:12, 13. Ja 4:6, 9, 10. 1 Pi 5:5, 6.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit encore cette parabole, en vue de certaines personnes se persuadant qu’elles étaient justes, et ne faisant aucun cas des autres:'
