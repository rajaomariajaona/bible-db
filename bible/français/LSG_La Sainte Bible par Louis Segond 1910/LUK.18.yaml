document_id: LUK.18,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parabole du juge inique
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. Lu 11:5-10. Mc 7:24-30. Ge 32:24-29. És 62:6, 7.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur adressa une parabole, pour montrer '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 12:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 6:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 4:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 5:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qu’il faut toujours prier, et ne point se relâcher. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Deux hommes montèrent au temple pour prier; l’un était pharisien, et l’autre publicain.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le pharisien, debout, priait ainsi en lui-même:'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 58:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 3:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: O Dieu, je te rends grâces de ce que je ne suis pas comme le reste des hommes, qui sont ravisseurs, injustes, adultères, ou même comme ce publicain;
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: je jeûne deux fois la semaine, je donne la dîme de tous mes revenus.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le publicain, se tenant à distance, n’osait même pas lever les yeux au ciel; mais il se frappait la poitrine, en disant: O Dieu, sois apaisé envers moi, qui suis un pécheur.'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous le dis, celui-ci descendit dans sa maison justifié, plutôt que l’autre.
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 22:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 29:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 23:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 14:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 4:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 5:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car quiconque s’élève sera abaissé, et celui qui s’abaisse sera élevé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les petits enfants
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 15-17: cf. (Mt 19:13-15. Mc 10:13-16.) Mt 18:1-4.'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 19:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 10:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On lui amena aussi les petits enfants, afin qu’il les touchât. Mais les disciples, voyant cela, reprenaient ceux qui les amenaient. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jésus les appela, et dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Laissez venir à moi les petits enfants, et ne les en empêchez pas;
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 18:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 14:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: car le royaume de Dieu est pour ceux qui leur ressemblent.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous le dis en vérité, quiconque ne recevra pas le royaume de Dieu comme un petit enfant n’y entrera point.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’homme riche. L’héritage de la vie éternelle
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 18-30: cf. (Mt 19:16-30. Mc 10:17-31.) Mt 5:29, 30.'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 19:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 10:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Un chef interrogea Jésus, et dit: Bon maître, que dois-je faire pour hériter la vie éternelle? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pourquoi m’appelles-tu bon? Il n’y a de bon que Dieu seul.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il y avait dans une ville un juge qui ne craignait point Dieu et qui n’avait d’égard pour personne.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Tu connais les commandements:'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 5:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 13:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu ne commettras point d’adultère; tu ne tueras point; tu ne déroberas point; tu ne diras point de faux témoignage;
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 6:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: honore ton père et ta mère.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai, dit-il, observé toutes ces choses dès ma jeunesse. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, ayant entendu cela, lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il te manque encore une chose:'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 6:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 6:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: vends tout ce que tu as, distribue-le aux pauvres, et tu auras un trésor dans les cieux. Puis, viens, et suis-moi.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’il entendit ces paroles, il devint tout triste; car il était très riche. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, voyant qu’il était devenu tout triste, dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 11:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 19:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 10:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Qu’il est difficile à ceux qui ont des richesses d’entrer dans le royaume de Dieu!
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car il est plus facile à un chameau de passer par le trou d’une aiguille qu’à un riche d’entrer dans le royaume de Dieu.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui l’écoutaient dirent: Et qui peut être sauvé? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus répondit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 42:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 32:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 8:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 1:37
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ce qui est impossible aux hommes est possible à Dieu.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 4:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 10:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 5:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Pierre dit alors: Voici, nous avons tout quitté, et nous t’avons suivi. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jésus leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous le dis en vérité,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 33:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: il n’est personne qui, ayant quitté, à cause du royaume de Dieu, sa maison, ou sa femme, ou ses frères, ou ses parents, ou ses enfants,
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il y avait aussi dans cette ville une veuve qui venait lui dire: Fais-moi justice de ma partie adverse.'
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 42:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ne reçoive beaucoup plus dans ce siècle-ci, et, dans le siècle à venir, la vie éternelle.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus annonce sa mort et sa résurrection
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 31-34: cf. (Mt 20:17-19. Mc 10:32-34.) Lu 9:22, 44, 45.'
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 8:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus prit les douze auprès de lui, et leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Voici, nous montons à Jérusalem, et
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 22:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 53:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: tout ce qui a été écrit par les prophètes au sujet du Fils de l’homme s’accomplira.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 18:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 3:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car il sera livré aux païens; on se moquera de lui, on l’outragera, on crachera sur lui,
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et, après l’avoir battu de verges, on le fera mourir; et le troisième jour il ressuscitera.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais ils ne comprirent rien à cela; c’était pour eux un langage caché, des paroles dont ils ne saisissaient pas le sens.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guérison d’un aveugle à Jéricho
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 35-43: cf. (Mt 20:29-34. Mc 10:46-53.)'
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 20:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 10:46
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Comme Jésus approchait de Jéricho, un aveugle était assis au bord du chemin, et mendiait. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Entendant la foule passer, il demanda ce que c’était. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On lui dit: C’est Jésus de Nazareth qui passe. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il cria: Jésus, Fils de David, aie pitié de moi! '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui marchaient devant le reprenaient, pour le faire taire; mais il criait beaucoup plus fort: Fils de David, aie pitié de moi! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Pendant longtemps il refusa. Mais ensuite il dit en lui-même: Quoique je ne craigne point Dieu et que je n’aie d’égard pour personne,'
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, s’étant arrêté, ordonna qu’on le lui amène; et, quand il se fut approché, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il lui demanda: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Que veux-tu que je te fasse?
    - type: text
      text: ' Il répondit: Seigneur, que je recouvre la vue. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jésus lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Recouvre la vue; ta foi t’a sauvé.
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A l’instant il recouvra la vue, et suivit Jésus, en glorifiant Dieu. Tout le peuple, voyant cela, loua Dieu.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: néanmoins, parce que cette veuve m’importune, je lui ferai justice, afin qu’elle ne vienne pas sans cesse me rompre la tête.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Seigneur ajouta: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Entendez ce que dit le juge inique.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 6:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et Dieu ne fera-t-il pas justice à ses élus, qui crient à lui jour et nuit, et tardera-t-il à leur égard?
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous le dis, il leur fera promptement justice. Mais, quand le Fils de l’homme viendra, trouvera-t-il la foi sur la terre?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parabole du pharisien et du publicain
    marker-yv: yv-h
  - type: usfm
