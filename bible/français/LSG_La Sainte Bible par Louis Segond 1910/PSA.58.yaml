document_id: PSA.58
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 82. Ec 3:16, 17.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. “Ne détruis pas.” Hymne de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Est-ce donc en vous taisant que vous rendez la justice?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce ainsi que vous jugez avec droiture, fils de l’homme?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Loin de là! Dans le cœur, vous consommez des iniquités;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans le pays, c’est la violence de vos mains que vous placez sur la balance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les méchants sont pervertis dès le sein maternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les menteurs s’égarent au sortir du ventre de leur mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils ont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 140:4
      metadata:
        usfm: PSA.140.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: un venin pareil au venin d’un serpent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: D’un aspic sourd qui ferme son oreille,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Qui n’entend pas la voix des enchanteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du magicien le plus habile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: O Dieu, brise-leur les dents dans la bouche!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éternel, arrache les mâchoires des lionceaux!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Qu’ils se dissipent comme des eaux qui s’écoulent!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils ne lancent que des traits émoussés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Qu’ils périssent en se fondant, comme un limaçon;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans voir le soleil, comme l’avorton d’une femme!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Avant que vos chaudières sentent l’épine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Verte ou enflammée, le tourbillon l’emportera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le juste sera dans la joie, à la vue de la vengeance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il baignera ses pieds dans le sang des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et les hommes diront: Oui, il est une récompense pour le juste;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, il est un Dieu qui juge sur la terre.
