document_id: PSA.58,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 82. Ec 3:16, 17.
  - type: text
    content: Au chef des chantres. “Ne détruis pas.” Hymne de David.
  '10':
  - type: text
    content: Avant que vos chaudières sentent l’épine,
  - type: text
    content: Verte ou enflammée, le tourbillon l’emportera.
  '11':
  - type: text
    content: Le juste sera dans la joie, à la vue de la vengeance;
  - type: text
    content: Il baignera ses pieds dans le sang des méchants.
  '12':
  - type: text
    content: 'Et les hommes diront: Oui, il est une récompense pour le juste;'
  - type: text
    content: Oui, il est un Dieu qui juge sur la terre.
  '2':
  - type: text
    content: Est-ce donc en vous taisant que vous rendez la justice?
  - type: text
    content: Est-ce ainsi que vous jugez avec droiture, fils de l’homme?
  '3':
  - type: text
    content: Loin de là! Dans le cœur, vous consommez des iniquités;
  - type: text
    content: Dans le pays, c’est la violence de vos mains que vous placez sur la balance.
  '4':
  - type: text
    content: Les méchants sont pervertis dès le sein maternel,
  - type: text
    content: Les menteurs s’égarent au sortir du ventre de leur mère.
  '5':
  - type: text
    content: 'Ils ont '
  - type: note
    content: Ps 140:4.
  - type: text
    content: un venin pareil au venin d’un serpent,
  - type: text
    content: D’un aspic sourd qui ferme son oreille,
  '6':
  - type: text
    content: Qui n’entend pas la voix des enchanteurs,
  - type: text
    content: Du magicien le plus habile.
  '7':
  - type: text
    content: O Dieu, brise-leur les dents dans la bouche!
  - type: text
    content: Éternel, arrache les mâchoires des lionceaux!
  '8':
  - type: text
    content: Qu’ils se dissipent comme des eaux qui s’écoulent!
  - type: text
    content: Qu’ils ne lancent que des traits émoussés!
  '9':
  - type: text
    content: Qu’ils périssent en se fondant, comme un limaçon;
  - type: text
    content: Sans voir le soleil, comme l’avorton d’une femme!
