document_id: JER.6,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Annonce du siège de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. Jé 4:5-18.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fuyez, enfants de Benjamin, du milieu de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sonnez de la trompette à Tekoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Élevez un signal à Beth-Hakkérem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car on voit venir du '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 1:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: septentrion le malheur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un grand désastre.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A qui m’adresser, et qui prendre à témoin pour qu’on écoute?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici, leur '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 7:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: oreille est incirconcise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils sont incapables d’être attentifs;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, la parole de l’Éternel est pour eux un opprobre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n’y trouvent aucun plaisir.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis plein de la fureur de l’Éternel, je ne puis la contenir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Répands-la sur l’enfant dans la rue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sur les assemblées des jeunes gens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’homme et la femme seront pris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le vieillard et celui qui est chargé de jours.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 28:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Leurs maisons passeront à d’autres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les champs et les femmes aussi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand j’étendrai ma main sur les habitants du pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car depuis le plus petit jusqu’au plus grand,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 56:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 8:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tous sont avides de gain;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depuis le prophète jusqu’au sacrificateur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous usent de tromperie.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 8:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 13:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils pansent à la légère la plaie de la fille de mon peuple:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Paix! Paix! Disent-ils;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il n’y a point de paix;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils seront confus, car ils commettent des abominations;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne rougissent pas, ils ne connaissent pas la honte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi ils tomberont avec ceux qui tombent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils seront renversés quand je les châtierai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Placez-vous sur les chemins, regardez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et demandez quels sont les anciens sentiers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quelle est la bonne voie; marchez-y,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 11:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et vous trouverez le repos de vos âmes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais ils répondent: Nous n’y marcherons pas.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’ai mis près de vous des sentinelles:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soyez attentifs au son de la trompette!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais ils répondent: Nous n’y serons pas attentifs.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi écoutez, nations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sachez ce qui leur arrivera, assemblée des peuples!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoute, terre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je fais venir sur ce peuple le malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fruit de ses pensées;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils n’ont point été attentifs à mes paroles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont méprisé ma loi.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La belle et la délicate,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je la détruis, la fille de Sion!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 66:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 5:21
      - type: text
        text: . Mi 6:6, etc.
      marker-yv: yv-n
    - type: text
      text: Qu’ai-je besoin de l’encens qui vient de Séba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du roseau aromatique d’un pays lointain?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vos holocaustes ne me plaisent point,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vos sacrifices ne me sont point agréables.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est pourquoi ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je mettrai devant ce peuple des pierres d’achoppement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre lesquelles se heurteront ensemble pères et fils,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voisins et amis, et ils périront.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-30: cf. Jé 8:14, etc. Éz 23:22-26. Hé 6:7, 8.'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, un peuple vient du pays du septentrion,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 50:41
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '42'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '43'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Une grande nation se lève des extrémités de la terre.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils portent l’arc et le javelot;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont cruels, sans miséricorde;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur voix mugit comme la mer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont montés sur des chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prêts à combattre comme un seul homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre toi, fille de Sion!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au bruit de leur approche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nos mains s’affaiblissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’angoisse nous saisit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Comme la douleur '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 4:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 49:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 50:43
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: d’une femme qui accouche.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne sortez pas dans les champs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’allez pas sur les chemins;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car là est le glaive de l’ennemi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’épouvante règne à l’entour!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fille de mon peuple, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 4:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: couvre-toi d’un sac et roule-toi dans la cendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prends le deuil comme pour un fils unique,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Verse des larmes, des larmes amères!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car le dévastateur vient sur nous à l’improviste.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’avais établi en observation parmi mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme une forteresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que tu connusses et sondasses leur voie.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont tous des rebelles, des calomniateurs,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 22:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: De l’airain et du fer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont tous corrompus.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le soufflet est brûlant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le plomb est consumé par le feu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est en vain qu’on épure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les scories ne se détachent pas.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vers elle marchent des bergers avec leurs troupeaux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils dressent des tentes autour d’elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils broutent chacun sa part.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On les appelle de l’argent méprisable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car l’Éternel les a '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: rejetés.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Préparez-vous à l’attaquer!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Allons! Montons en plein midi!…
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheureusement pour nous, le jour baisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les ombres du soir s’allongent.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Allons! Montons de nuit!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Détruisons ses palais!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car ainsi parle l’Éternel des armées:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Abattez les arbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Élevez des terrasses contre Jérusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est la ville qui doit être châtiée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y a qu’oppression au milieu d’elle.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un puits fait jaillir ses eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi elle fait jaillir sa méchanceté;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’est bruit en son sein que de violence et de ruine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans cesse à mes regards s’offrent la douleur et les plaies.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reçois instruction, Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De peur que je ne m’éloigne de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que je ne fasse de toi un désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un pays inhabité!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-21: cf. Jé 8:4-13; 18:7-17.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel des armées:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On grappillera comme une vigne les restes d’Israël.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 24:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Portes-y de nouveau la main,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme le vendangeur sur les ceps.
