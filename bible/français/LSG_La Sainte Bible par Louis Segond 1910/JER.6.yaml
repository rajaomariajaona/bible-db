document_id: JER.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Annonce du siège de Jérusalem
  - type: heading
    content: 'V. 1-8: cf. Jé 4:5-18.'
  - type: text
    content: Fuyez, enfants de Benjamin, du milieu de Jérusalem,
  - type: text
    content: Sonnez de la trompette à Tekoa,
  - type: text
    content: Élevez un signal à Beth-Hakkérem!
  - type: text
    content: 'Car on voit venir du '
  - type: note
    content: Jé 1:13, 14.
  - type: text
    content: septentrion le malheur
  - type: text
    content: Et un grand désastre.
  '10':
  - type: text
    content: A qui m’adresser, et qui prendre à témoin pour qu’on écoute?
  - type: text
    content: 'Voici, leur '
  - type: note
    content: Jé 7:26.
  - type: text
    content: oreille est incirconcise,
  - type: text
    content: Et ils sont incapables d’être attentifs;
  - type: text
    content: Voici, la parole de l’Éternel est pour eux un opprobre,
  - type: text
    content: Ils n’y trouvent aucun plaisir.
  '11':
  - type: text
    content: Je suis plein de la fureur de l’Éternel, je ne puis la contenir.
  - type: text
    content: Répands-la sur l’enfant dans la rue,
  - type: text
    content: Et sur les assemblées des jeunes gens.
  - type: text
    content: Car l’homme et la femme seront pris,
  - type: text
    content: Le vieillard et celui qui est chargé de jours.
  '12':
  - type: text
    content: ' '
  - type: note
    content: De 28:30.
  - type: text
    content: Leurs maisons passeront à d’autres,
  - type: text
    content: Les champs et les femmes aussi,
  - type: text
    content: Quand j’étendrai ma main sur les habitants du pays,
  - type: text
    content: Dit l’Éternel.
  '13':
  - type: text
    content: Car depuis le plus petit jusqu’au plus grand,
  - type: note
    content: És 56:11. Jé 8:10.
  - type: text
    content: Tous sont avides de gain;
  - type: text
    content: Depuis le prophète jusqu’au sacrificateur,
  - type: text
    content: Tous usent de tromperie.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Jé 8:11. Éz 13:10.
  - type: text
    content: 'Ils pansent à la légère la plaie de la fille de mon peuple:'
  - type: text
    content: Paix! Paix! Disent-ils;
  - type: text
    content: Et il n’y a point de paix;
  '15':
  - type: text
    content: Ils seront confus, car ils commettent des abominations;
  - type: text
    content: Ils ne rougissent pas, ils ne connaissent pas la honte;
  - type: text
    content: C’est pourquoi ils tomberont avec ceux qui tombent,
  - type: text
    content: Ils seront renversés quand je les châtierai,
  - type: text
    content: Dit l’Éternel.
  '16':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Placez-vous sur les chemins, regardez,
  - type: text
    content: Et demandez quels sont les anciens sentiers,
  - type: text
    content: Quelle est la bonne voie; marchez-y,
  - type: note
    content: Mt 11:29.
  - type: text
    content: Et vous trouverez le repos de vos âmes!
  - type: text
    content: 'Mais ils répondent: Nous n’y marcherons pas.'
  '17':
  - type: text
    content: 'J’ai mis près de vous des sentinelles:'
  - type: text
    content: Soyez attentifs au son de la trompette!
  - type: text
    content: 'Mais ils répondent: Nous n’y serons pas attentifs.'
  '18':
  - type: text
    content: C’est pourquoi écoutez, nations!
  - type: text
    content: Sachez ce qui leur arrivera, assemblée des peuples!
  '19':
  - type: text
    content: Écoute, terre!
  - type: text
    content: Voici, je fais venir sur ce peuple le malheur,
  - type: text
    content: Fruit de ses pensées;
  - type: text
    content: Car ils n’ont point été attentifs à mes paroles,
  - type: text
    content: Ils ont méprisé ma loi.
  '2':
  - type: text
    content: La belle et la délicate,
  - type: text
    content: Je la détruis, la fille de Sion!
  '20':
  - type: text
    content: ' '
  - type: note
    content: És 1:11; 66:3. Am 5:21. Mi 6:6, etc.
  - type: text
    content: Qu’ai-je besoin de l’encens qui vient de Séba,
  - type: text
    content: Du roseau aromatique d’un pays lointain?
  - type: text
    content: Vos holocaustes ne me plaisent point,
  - type: text
    content: Et vos sacrifices ne me sont point agréables.
  '21':
  - type: text
    content: 'C’est pourquoi ainsi parle l’Éternel:'
  - type: text
    content: Voici, je mettrai devant ce peuple des pierres d’achoppement,
  - type: text
    content: Contre lesquelles se heurteront ensemble pères et fils,
  - type: text
    content: Voisins et amis, et ils périront.
  - type: heading
    content: 'V. 22-30: cf. Jé 8:14, etc. Éz 23:22-26. Hé 6:7, 8.'
  '22':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Voici, un peuple vient du pays du septentrion,
  - type: note
    content: Jé 50:41, 42, 43.
  - type: text
    content: Une grande nation se lève des extrémités de la terre.
  '23':
  - type: text
    content: Ils portent l’arc et le javelot;
  - type: text
    content: Ils sont cruels, sans miséricorde;
  - type: text
    content: Leur voix mugit comme la mer;
  - type: text
    content: Ils sont montés sur des chevaux,
  - type: text
    content: Prêts à combattre comme un seul homme,
  - type: text
    content: Contre toi, fille de Sion!
  '24':
  - type: text
    content: Au bruit de leur approche,
  - type: text
    content: Nos mains s’affaiblissent,
  - type: text
    content: L’angoisse nous saisit,
  - type: text
    content: 'Comme la douleur '
  - type: note
    content: Jé 4:31; 49:24; 50:43.
  - type: text
    content: d’une femme qui accouche.
  '25':
  - type: text
    content: Ne sortez pas dans les champs,
  - type: text
    content: N’allez pas sur les chemins;
  - type: text
    content: Car là est le glaive de l’ennemi,
  - type: text
    content: Et l’épouvante règne à l’entour!
  '26':
  - type: text
    content: 'Fille de mon peuple, '
  - type: note
    content: Jé 4:8.
  - type: text
    content: couvre-toi d’un sac et roule-toi dans la cendre,
  - type: text
    content: Prends le deuil comme pour un fils unique,
  - type: text
    content: Verse des larmes, des larmes amères!
  - type: text
    content: Car le dévastateur vient sur nous à l’improviste.
  '27':
  - type: text
    content: Je t’avais établi en observation parmi mon peuple,
  - type: text
    content: Comme une forteresse,
  - type: text
    content: Pour que tu connusses et sondasses leur voie.
  '28':
  - type: text
    content: Ils sont tous des rebelles, des calomniateurs,
  - type: note
    content: Éz 22:18.
  - type: text
    content: De l’airain et du fer;
  - type: text
    content: Ils sont tous corrompus.
  '29':
  - type: text
    content: Le soufflet est brûlant,
  - type: text
    content: Le plomb est consumé par le feu;
  - type: text
    content: C’est en vain qu’on épure,
  - type: text
    content: Les scories ne se détachent pas.
  '3':
  - type: text
    content: Vers elle marchent des bergers avec leurs troupeaux;
  - type: text
    content: Ils dressent des tentes autour d’elle,
  - type: text
    content: Ils broutent chacun sa part.
  '30':
  - type: text
    content: On les appelle de l’argent méprisable,
  - type: text
    content: 'Car l’Éternel les a '
  - type: note
    content: És 1:22.
  - type: text
    content: rejetés.
  '4':
  - type: text
    content: Préparez-vous à l’attaquer!
  - type: text
    content: Allons! Montons en plein midi!…
  - type: text
    content: Malheureusement pour nous, le jour baisse,
  - type: text
    content: Les ombres du soir s’allongent.
  '5':
  - type: text
    content: Allons! Montons de nuit!
  - type: text
    content: Détruisons ses palais!
  '6':
  - type: text
    content: 'Car ainsi parle l’Éternel des armées:'
  - type: text
    content: Abattez les arbres,
  - type: text
    content: Élevez des terrasses contre Jérusalem!
  - type: text
    content: C’est la ville qui doit être châtiée;
  - type: text
    content: Il n’y a qu’oppression au milieu d’elle.
  '7':
  - type: text
    content: Comme un puits fait jaillir ses eaux,
  - type: text
    content: Ainsi elle fait jaillir sa méchanceté;
  - type: text
    content: Il n’est bruit en son sein que de violence et de ruine;
  - type: text
    content: Sans cesse à mes regards s’offrent la douleur et les plaies.
  '8':
  - type: text
    content: Reçois instruction, Jérusalem,
  - type: text
    content: De peur que je ne m’éloigne de toi,
  - type: text
    content: Que je ne fasse de toi un désert,
  - type: text
    content: Un pays inhabité!
  - type: heading
    content: 'V. 9-21: cf. Jé 8:4-13; 18:7-17.'
  '9':
  - type: text
    content: 'Ainsi parle l’Éternel des armées:'
  - type: text
    content: On grappillera comme une vigne les restes d’Israël.
  - type: note
    content: És 24:13.
  - type: text
    content: Portes-y de nouveau la main,
  - type: text
    content: Comme le vendangeur sur les ceps.
