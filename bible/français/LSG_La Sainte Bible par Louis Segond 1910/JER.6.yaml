  - type: text
    text: Le soufflet est brûlant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le plomb est consumé par le feu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est en vain qu’on épure,
- type: usfm
  marker: q1
