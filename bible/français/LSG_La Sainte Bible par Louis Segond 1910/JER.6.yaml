      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Je t’avais établi en observation parmi mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme une forteresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour que tu connusses et sondasses leur voie.
- type: usfm
  marker: q1
  children:
  - type: usfm
