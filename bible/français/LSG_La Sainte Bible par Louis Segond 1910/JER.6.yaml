document_id: JER.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Annonce du siège de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. Jé 4:5-18.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fuyez, enfants de Benjamin, du milieu de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sonnez de la trompette à Tekoa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Élevez un signal à Beth-Hakkérem!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car on voit venir du '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 1:13
      metadata:
        usfm: JER.1.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: JER.1.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: septentrion le malheur
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et un grand désastre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: La belle et la délicate,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je la détruis, la fille de Sion!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Vers elle marchent des bergers avec leurs troupeaux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils dressent des tentes autour d’elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils broutent chacun sa part.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Préparez-vous à l’attaquer!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Allons! Montons en plein midi!…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malheureusement pour nous, le jour baisse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les ombres du soir s’allongent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Allons! Montons de nuit!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Détruisons ses palais!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Car ainsi parle l’Éternel des armées:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Abattez les arbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Élevez des terrasses contre Jérusalem!
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est la ville qui doit être châtiée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y a qu’oppression au milieu d’elle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Comme un puits fait jaillir ses eaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi elle fait jaillir sa méchanceté;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’est bruit en son sein que de violence et de ruine;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans cesse à mes regards s’offrent la douleur et les plaies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Reçois instruction, Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De peur que je ne m’éloigne de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je ne fasse de toi un désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un pays inhabité!
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-21: cf. Jé 8:4-13; 18:7-17.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ainsi parle l’Éternel des armées:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: On grappillera comme une vigne les restes d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 24:13
      metadata:
        usfm: ISA.24.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Portes-y de nouveau la main,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme le vendangeur sur les ceps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: A qui m’adresser, et qui prendre à témoin pour qu’on écoute?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici, leur '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:26
      metadata:
        usfm: JER.7.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: oreille est incirconcise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils sont incapables d’être attentifs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, la parole de l’Éternel est pour eux un opprobre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’y trouvent aucun plaisir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je suis plein de la fureur de l’Éternel, je ne puis la contenir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Répands-la sur l’enfant dans la rue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sur les assemblées des jeunes gens.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’homme et la femme seront pris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le vieillard et celui qui est chargé de jours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:30
      metadata:
        usfm: DEU.28.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Leurs maisons passeront à d’autres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les champs et les femmes aussi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand j’étendrai ma main sur les habitants du pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Car depuis le plus petit jusqu’au plus grand,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 56:11
      metadata:
        usfm: ISA.56.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 8:10
      metadata:
        usfm: JER.8.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tous sont avides de gain;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Depuis le prophète jusqu’au sacrificateur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous usent de tromperie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 8:11
      metadata:
        usfm: JER.8.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 13:10
      metadata:
        usfm: EZK.13.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils pansent à la légère la plaie de la fille de mon peuple:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Paix! Paix! Disent-ils;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il n’y a point de paix;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ils seront confus, car ils commettent des abominations;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne rougissent pas, ils ne connaissent pas la honte;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pourquoi ils tomberont avec ceux qui tombent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils seront renversés quand je les châtierai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Placez-vous sur les chemins, regardez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et demandez quels sont les anciens sentiers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quelle est la bonne voie; marchez-y,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 11:29
      metadata:
        usfm: MAT.11.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et vous trouverez le repos de vos âmes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mais ils répondent: Nous n’y marcherons pas.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'J’ai mis près de vous des sentinelles:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soyez attentifs au son de la trompette!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mais ils répondent: Nous n’y serons pas attentifs.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: C’est pourquoi écoutez, nations!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sachez ce qui leur arrivera, assemblée des peuples!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Écoute, terre!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, je fais venir sur ce peuple le malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fruit de ses pensées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils n’ont point été attentifs à mes paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont méprisé ma loi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:11
      metadata:
        usfm: ISA.1.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 66:3
      metadata:
        usfm: ISA.66.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 5:21
      metadata:
        usfm: AMO.5.21
    - type: text
      text: . Mi 6:6, etc.
    marker-yv: yv-n
  - type: text
    text: Qu’ai-je besoin de l’encens qui vient de Séba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du roseau aromatique d’un pays lointain?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vos holocaustes ne me plaisent point,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vos sacrifices ne me sont point agréables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'C’est pourquoi ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, je mettrai devant ce peuple des pierres d’achoppement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre lesquelles se heurteront ensemble pères et fils,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voisins et amis, et ils périront.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-30: cf. Jé 8:14, etc. Éz 23:22-26. Hé 6:7, 8.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, un peuple vient du pays du septentrion,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 50:41
      metadata:
        usfm: JER.50.41
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '42'
      metadata:
        usfm: JER.50.42
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '43'
      metadata:
        usfm: JER.50.43
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Une grande nation se lève des extrémités de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ils portent l’arc et le javelot;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont cruels, sans miséricorde;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur voix mugit comme la mer;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont montés sur des chevaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prêts à combattre comme un seul homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre toi, fille de Sion!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Au bruit de leur approche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nos mains s’affaiblissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’angoisse nous saisit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Comme la douleur '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 4:31
      metadata:
        usfm: JER.4.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 49:24
      metadata:
        usfm: JER.49.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 50:43
      metadata:
        usfm: JER.50.43
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: d’une femme qui accouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ne sortez pas dans les champs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’allez pas sur les chemins;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car là est le glaive de l’ennemi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’épouvante règne à l’entour!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fille de mon peuple, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 4:8
      metadata:
        usfm: JER.4.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: couvre-toi d’un sac et roule-toi dans la cendre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prends le deuil comme pour un fils unique,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Verse des larmes, des larmes amères!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car le dévastateur vient sur nous à l’improviste.
- type: usfm
  marker: q1
