    - type: text
      text: '48'
  - type: text
    text: 'Quand ses parents le virent, ils furent saisis d’étonnement, et sa mère lui dit: Mon enfant, pourquoi as-tu agi de la sorte avec nous? Voici, ton père et moi, nous te cherchions avec angoisse. '
  - type: usfm
