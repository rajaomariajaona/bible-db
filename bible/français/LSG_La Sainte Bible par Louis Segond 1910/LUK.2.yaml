document_id: LUK.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Naissance de Jésus-Christ
  - type: heading
    content: 'V. 1-7: cf. Mt 1:18-25. (Mi 5:1, 2. És 7:14; 9:5.)'
  - type: text
    content: 'En ce temps-là parut un édit de César Auguste, ordonnant un recensement de toute la terre. '
  '10':
  - type: text
    content: 'Mais l’ange leur dit: Ne craignez point; car je vous annonce une bonne nouvelle, qui sera pour tout le peuple le sujet d’une grande joie: '
  '11':
  - type: text
    content: 'c’est qu’aujourd’hui, dans la ville de David, il vous est né un Sauveur, qui est le Christ, le Seigneur. '
  '12':
  - type: text
    content: 'Et voici à quel signe vous le reconnaîtrez: vous trouverez un enfant emmailloté et couché dans une crèche. '
  '13':
  - type: text
    content: 'Et soudain il se joignit à l’ange '
  - type: note
    content: Da 7:10. Ap 5:11.
  - type: text
    content: 'une multitude de l’armée céleste, louant Dieu et disant:'
  '14':
  - type: text
    content: Gloire à Dieu dans les lieux très hauts,
  - type: note
    content: És 57:19. Ép 2:17.
  - type: text
    content: Et paix sur la terre parmi les hommes qu’il agrée!
  '15':
  - type: text
    content: 'Lorsque les anges les eurent quittés pour retourner au ciel, les bergers se dirent les uns aux autres: Allons jusqu’à Bethléhem, et voyons ce qui est arrivé, ce que le Seigneur nous a fait connaître. '
  '16':
  - type: text
    content: 'Ils y allèrent en hâte, et ils trouvèrent Marie et Joseph, et le petit enfant couché dans la crèche. '
  '17':
  - type: text
    content: 'Après l’avoir vu, ils racontèrent ce qui leur avait été dit au sujet de ce petit enfant. '
  '18':
  - type: text
    content: 'Tous ceux qui les entendirent furent dans l’étonnement de ce que leur disaient les bergers. '
  '19':
  - type: text
    content: 'Marie gardait toutes ces choses, et les repassait dans son cœur. '
  '2':
  - type: text
    content: 'Ce premier recensement eut lieu pendant que Quirinius était gouverneur de Syrie. '
  '20':
  - type: text
    content: Et les bergers s’en retournèrent, glorifiant et louant Dieu pour tout ce qu’ils avaient entendu et vu, et qui était conforme à ce qui leur avait été annoncé.
  - type: heading
    content: Jésus présenté au Seigneur dans le temple de Jérusalem
  - type: heading
    content: 'V. 21-24: cf. Ga 4:4, 5. (Lé 12. Ex 13:2, 11-15.)'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ge 17:12. Lé 12:3. Jn 7:22.
  - type: text
    content: 'Le huitième jour, auquel l’enfant devait être circoncis, étant arrivé, on lui donna le '
  - type: note
    content: Mt 1:21. Lu 1:31.
  - type: text
    content: 'nom de Jésus, nom qu’avait indiqué l’ange avant qu’il fût conçu dans le sein de sa mère. '
  '22':
  - type: text
    content: 'Et, quand les jours de leur '
  - type: note
    content: Lé 12:6.
  - type: text
    content: 'purification furent accomplis, selon la loi de Moïse, Joseph et Marie le portèrent à Jérusalem, pour le présenter au Seigneur, '
  '23':
  - type: text
    content: 'suivant ce qui est écrit '
  - type: note
    content: Ex 13:2. No 3:13; 8:16, 17.
  - type: text
    content: 'dans la loi du Seigneur: Tout mâle premier-né sera consacré au Seigneur, '
  '24':
  - type: text
    content: 'et pour offrir en sacrifice '
  - type: note
    content: Lé 12:8.
  - type: text
    content: deux tourterelles ou deux jeunes pigeons, comme cela est prescrit dans la loi du Seigneur.
  - type: heading
    content: Cantique de Siméon. Anne la prophétesse
  - type: heading
    content: 'V. 25-38: cf. Lu 1:67-69. 1 Pi 1:11.'
  '25':
  - type: text
    content: 'Et voici, il y avait à Jérusalem un homme appelé Siméon. Cet homme était juste et pieux, il attendait la consolation d’Israël, et l’Esprit-Saint était sur lui. '
  '26':
  - type: text
    content: 'Il avait été divinement averti par le Saint-Esprit qu’il ne mourrait point avant d’avoir vu le Christ du Seigneur. '
  '27':
  - type: text
    content: 'Il vint au temple, poussé par l’Esprit. Et, comme les parents apportaient le petit enfant Jésus pour accomplir à son égard ce qu’ordonnait la loi, '
  '28':
  - type: text
    content: 'il le reçut dans ses bras, bénit Dieu, et dit:'
  '29':
  - type: text
    content: 'Maintenant, Seigneur, '
  - type: note
    content: Ge 46:30.
  - type: text
    content: tu laisses ton serviteur
  - type: text
    content: S’en aller en paix, selon ta parole.
  '3':
  - type: text
    content: 'Tous allaient se faire inscrire, chacun dans sa ville. '
  '30':
  - type: text
    content: 'Car mes yeux ont vu ton '
  - type: note
    content: Ps 98:2. És 52:10.
  - type: text
    content: salut,
  '31':
  - type: text
    content: ' '
  - type: note
    content: Ac 28:28.
  - type: text
    content: Salut que tu as préparé devant tous les peuples,
  '32':
  - type: text
    content: ' '
  - type: note
    content: És 42:6; 49:6. Ac 13:47.
  - type: text
    content: Lumière pour éclairer les nations,
  - type: text
    content: Et gloire d’Israël, ton peuple.
  '33':
  - type: text
    content: 'Son père et sa mère étaient dans l’admiration des choses qu’on disait de lui. '
  '34':
  - type: text
    content: 'Siméon les bénit, et dit à Marie, sa mère: Voici, '
  - type: note
    content: És 8:14. Ro 9:32. 1 Pi 2:8.
  - type: text
    content: 'cet enfant est destiné à amener la chute et le relèvement de plusieurs en Israël, et à devenir un signe '
  - type: note
    content: Ac 28:22.
  - type: text
    content: 'qui provoquera la contradiction, '
  '35':
  - type: text
    content: 'et à toi-même une épée te transpercera l’âme, afin que les pensées de beaucoup de cœurs soient dévoilées. '
  '36':
  - type: text
    content: 'Il y avait aussi une prophétesse, Anne, fille de Phanuel, de la tribu d’Aser. Elle était fort avancée en âge, et elle avait vécu sept ans avec son mari depuis sa virginité. '
  '37':
  - type: text
    content: 'Restée veuve, et âgée de quatre vingt-quatre ans, elle ne quittait pas le temple, et '
  - type: note
    content: 1 S 1:22.
  - type: text
    content: 'elle servait Dieu nuit et jour dans le jeûne et dans la prière. '
  '38':
  - type: text
    content: Étant survenue, elle aussi, à cette même heure, elle louait Dieu, et elle parlait de Jésus à tous ceux qui attendaient la délivrance de Jérusalem.
  - type: heading
    content: Retour à Nazareth
  - type: heading
    content: 'V. 39-40: cf. Mt 2:22, 23.'
  '39':
  - type: text
    content: 'Lorsqu’ils eurent accompli tout ce qu’ordonnait la loi du Seigneur, Joseph et Marie retournèrent en Galilée, à Nazareth, leur ville. '
  '4':
  - type: text
    content: 'Joseph aussi monta de la Galilée, de la ville de Nazareth, pour se rendre en Judée, '
  - type: note
    content: Mi 5:1. Jn 7:42.
  - type: text
    content: 'dans la ville de David, appelée '
  - type: note
    content: 1 S 16:4, etc.
  - type: text
    content: 'Bethléhem, parce qu’il était de la '
  - type: note
    content: Mt 1:1.
  - type: text
    content: 'maison et de la famille de David, '
  '40':
  - type: text
    content: 'Or, l’enfant '
  - type: note
    content: Lu 1:80.
  - type: text
    content: croissait et se fortifiait. Il était rempli de sagesse, et la grâce de Dieu était sur lui.
  - type: heading
    content: Jésus dans le temple à l’âge de douze ans
  - type: heading
    content: 'V. 41-52: cf. De 16:1-8, 16. És 11:1, 2. Pr 20:11.'
  '41':
  - type: text
    content: 'Les parents de Jésus allaient chaque année à Jérusalem, à la fête de '
  - type: note
    content: Ex 23:15, 17. Lé 23:5. De 16:1.
  - type: text
    content: 'Pâque. '
  '42':
  - type: text
    content: 'Lorsqu’il fut âgé de douze ans, ils y montèrent, selon la coutume de la fête. '
  '43':
  - type: text
    content: 'Puis, quand les jours furent écoulés, et qu’ils s’en retournèrent, l’enfant Jésus resta à Jérusalem. Son père et sa mère ne s’en aperçurent pas. '
  '44':
  - type: text
    content: 'Croyant qu’il était avec leurs compagnons de voyage, ils firent une journée de chemin, et le cherchèrent parmi leurs parents et leurs connaissances. '
  '45':
  - type: text
    content: 'Mais, ne l’ayant pas trouvé, ils retournèrent à Jérusalem pour le chercher. '
  '46':
  - type: text
    content: 'Au bout de trois jours, ils le trouvèrent dans le temple, assis au milieu des docteurs, les écoutant et les interrogeant. '
  '47':
  - type: note
    content: Mt 7:28. Mc 1:22. Lu 4:22, 32. Jn 7:15.
  - type: text
    content: 'Tous ceux qui l’entendaient étaient frappés de son intelligence et de ses réponses. '
  '48':
  - type: text
    content: 'Quand ses parents le virent, ils furent saisis d’étonnement, et sa mère lui dit: Mon enfant, pourquoi as-tu agi de la sorte avec nous? Voici, ton père et moi, nous te cherchions avec angoisse. '
  '49':
  - type: text
    content: 'Il leur dit: '
  - type: text
    content: Pourquoi me cherchiez-vous? Ne saviez-vous pas qu’il faut que je m’occupe des affaires de mon Père?
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'afin de se faire inscrire avec Marie, sa fiancée, qui était enceinte. '
  '50':
  - type: note
    content: Lu 9:45; 18:34.
  - type: text
    content: 'Mais ils ne comprirent pas ce qu’il leur disait. '
  '51':
  - type: text
    content: 'Puis il descendit avec eux pour aller à Nazareth, et il leur était soumis. Sa mère gardait toutes ces choses dans son cœur. '
  '52':
  - type: text
    content: 'Et Jésus '
  - type: note
    content: 1 S 2:26. Lu 1:80.
  - type: text
    content: croissait en sagesse, en stature, et en grâce, devant Dieu et devant les hommes.
  '6':
  - type: text
    content: 'Pendant qu’ils étaient là, le temps où Marie devait accoucher arriva, '
  '7':
  - type: text
    content: 'et elle enfanta son fils premier-né. Elle '
  - type: note
    content: Mt 1:25.
  - type: text
    content: l’emmaillota, et le coucha dans une crèche, parce qu’il n’y avait pas de place pour eux dans l’hôtellerie.
  - type: heading
    content: Les bergers de Bethléhem
  - type: heading
    content: 'V. 8-20: cf. Da 9:21-26. És 41:27.'
  '8':
  - type: text
    content: 'Il y avait, dans cette même contrée, des bergers qui passaient dans les champs les veilles de la nuit pour garder leurs troupeaux. '
  '9':
  - type: text
    content: 'Et voici, un ange du Seigneur leur apparut, et la gloire du Seigneur resplendit autour d’eux. Ils furent saisis d’une grande frayeur. '
