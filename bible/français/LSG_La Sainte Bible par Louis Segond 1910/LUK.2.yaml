document_id: LUK.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naissance de Jésus-Christ
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. Mt 1:18-25. (Mi 5:1, 2. És 7:14; 9:5.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'En ce temps-là parut un édit de César Auguste, ordonnant un recensement de toute la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ce premier recensement eut lieu pendant que Quirinius était gouverneur de Syrie. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tous allaient se faire inscrire, chacun dans sa ville. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Joseph aussi monta de la Galilée, de la ville de Nazareth, pour se rendre en Judée, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 5:1
      metadata:
        usfm: MIC.5.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:42
      metadata:
        usfm: JHN.7.42
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dans la ville de David, appelée '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 S 16:4, etc.
    marker-yv: yv-n
  - type: text
    text: 'Bethléhem, parce qu’il était de la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 1:1
      metadata:
        usfm: MAT.1.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'maison et de la famille de David, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'afin de se faire inscrire avec Marie, sa fiancée, qui était enceinte. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Pendant qu’ils étaient là, le temps où Marie devait accoucher arriva, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et elle enfanta son fils premier-né. Elle '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 1:25
      metadata:
        usfm: MAT.1.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: l’emmaillota, et le coucha dans une crèche, parce qu’il n’y avait pas de place pour eux dans l’hôtellerie.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les bergers de Bethléhem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-20: cf. Da 9:21-26. És 41:27.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il y avait, dans cette même contrée, des bergers qui passaient dans les champs les veilles de la nuit pour garder leurs troupeaux. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et voici, un ange du Seigneur leur apparut, et la gloire du Seigneur resplendit autour d’eux. Ils furent saisis d’une grande frayeur. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais l’ange leur dit: Ne craignez point; car je vous annonce une bonne nouvelle, qui sera pour tout le peuple le sujet d’une grande joie: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'c’est qu’aujourd’hui, dans la ville de David, il vous est né un Sauveur, qui est le Christ, le Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et voici à quel signe vous le reconnaîtrez: vous trouverez un enfant emmailloté et couché dans une crèche. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et soudain il se joignit à l’ange '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 7:10
      metadata:
        usfm: DAN.7.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 5:11
      metadata:
        usfm: REV.5.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une multitude de l’armée céleste, louant Dieu et disant:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Gloire à Dieu dans les lieux très hauts,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 57:19
      metadata:
        usfm: ISA.57.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 2:17
      metadata:
        usfm: EPH.2.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et paix sur la terre parmi les hommes qu’il agrée!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Lorsque les anges les eurent quittés pour retourner au ciel, les bergers se dirent les uns aux autres: Allons jusqu’à Bethléhem, et voyons ce qui est arrivé, ce que le Seigneur nous a fait connaître. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils y allèrent en hâte, et ils trouvèrent Marie et Joseph, et le petit enfant couché dans la crèche. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Après l’avoir vu, ils racontèrent ce qui leur avait été dit au sujet de ce petit enfant. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tous ceux qui les entendirent furent dans l’étonnement de ce que leur disaient les bergers. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Marie gardait toutes ces choses, et les repassait dans son cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Et les bergers s’en retournèrent, glorifiant et louant Dieu pour tout ce qu’ils avaient entendu et vu, et qui était conforme à ce qui leur avait été annoncé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus présenté au Seigneur dans le temple de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-24: cf. Ga 4:4, 5. (Lé 12. Ex 13:2, 11-15.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 17:12
      metadata:
        usfm: GEN.17.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 12:3
      metadata:
        usfm: LEV.12.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:22
      metadata:
        usfm: JHN.7.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le huitième jour, auquel l’enfant devait être circoncis, étant arrivé, on lui donna le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 1:21
      metadata:
        usfm: MAT.1.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:31
      metadata:
        usfm: LUK.1.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nom de Jésus, nom qu’avait indiqué l’ange avant qu’il fût conçu dans le sein de sa mère. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Et, quand les jours de leur '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 12:6
      metadata:
        usfm: LEV.12.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'purification furent accomplis, selon la loi de Moïse, Joseph et Marie le portèrent à Jérusalem, pour le présenter au Seigneur, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'suivant ce qui est écrit '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:2
      metadata:
        usfm: EXO.13.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 3:13
      metadata:
        usfm: NUM.3.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:16
      metadata:
        usfm: NUM.8.16
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '17'
      metadata:
        usfm: NUM.8.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dans la loi du Seigneur: Tout mâle premier-né sera consacré au Seigneur, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'et pour offrir en sacrifice '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 12:8
      metadata:
        usfm: LEV.12.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: deux tourterelles ou deux jeunes pigeons, comme cela est prescrit dans la loi du Seigneur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Cantique de Siméon. Anne la prophétesse
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 25-38: cf. Lu 1:67-69. 1 Pi 1:11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Et voici, il y avait à Jérusalem un homme appelé Siméon. Cet homme était juste et pieux, il attendait la consolation d’Israël, et l’Esprit-Saint était sur lui. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il avait été divinement averti par le Saint-Esprit qu’il ne mourrait point avant d’avoir vu le Christ du Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il vint au temple, poussé par l’Esprit. Et, comme les parents apportaient le petit enfant Jésus pour accomplir à son égard ce qu’ordonnait la loi, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'il le reçut dans ses bras, bénit Dieu, et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Maintenant, Seigneur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 46:30
      metadata:
        usfm: GEN.46.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: tu laisses ton serviteur
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’en aller en paix, selon ta parole.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Car mes yeux ont vu ton '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 98:2
      metadata:
        usfm: PSA.98.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 52:10
      metadata:
        usfm: ISA.52.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: salut,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 28:28
      metadata:
        usfm: ACT.28.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Salut que tu as préparé devant tous les peuples,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 42:6
      metadata:
        usfm: ISA.42.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 49:6
      metadata:
        usfm: ISA.49.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 13:47
      metadata:
        usfm: ACT.13.47
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Lumière pour éclairer les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et gloire d’Israël, ton peuple.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Son père et sa mère étaient dans l’admiration des choses qu’on disait de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Siméon les bénit, et dit à Marie, sa mère: Voici, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 8:14
      metadata:
        usfm: ISA.8.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:32
      metadata:
        usfm: ROM.9.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:8
      metadata:
        usfm: 1PE.2.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'cet enfant est destiné à amener la chute et le relèvement de plusieurs en Israël, et à devenir un signe '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 28:22
      metadata:
        usfm: ACT.28.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui provoquera la contradiction, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'et à toi-même une épée te transpercera l’âme, afin que les pensées de beaucoup de cœurs soient dévoilées. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il y avait aussi une prophétesse, Anne, fille de Phanuel, de la tribu d’Aser. Elle était fort avancée en âge, et elle avait vécu sept ans avec son mari depuis sa virginité. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Restée veuve, et âgée de quatre vingt-quatre ans, elle ne quittait pas le temple, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 1:22
      metadata:
        usfm: 1SA.1.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'elle servait Dieu nuit et jour dans le jeûne et dans la prière. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Étant survenue, elle aussi, à cette même heure, elle louait Dieu, et elle parlait de Jésus à tous ceux qui attendaient la délivrance de Jérusalem.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Retour à Nazareth
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 39-40: cf. Mt 2:22, 23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Lorsqu’ils eurent accompli tout ce qu’ordonnait la loi du Seigneur, Joseph et Marie retournèrent en Galilée, à Nazareth, leur ville. '
