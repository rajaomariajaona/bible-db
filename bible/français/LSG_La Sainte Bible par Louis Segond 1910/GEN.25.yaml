document_id: GEN.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mort d’Abraham
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. 1 Ch 1:32, 33. (Ge 35:28, 29; 49:29-33.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Abraham prit encore une femme, nommée Ketura. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 1:32
      metadata:
        usfm: 1CH.1.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Elle lui enfanta Zimran, Jokschan, Medan, Madian, Jischbak et Schuach. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jokschan engendra Séba et Dedan. Les fils de Dedan furent les Aschurim, les Letuschim et les Leummim. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les fils de Madian furent Épha, Épher, Hénoc, Abida et Eldaa. Ce sont là tous les fils de Ketura. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 24:36
      metadata:
        usfm: GEN.24.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Abraham donna tous ses biens à Isaac. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il fit des dons aux fils de ses concubines; et, tandis qu’il vivait encore, il les envoya loin de son fils Isaac du côté de l’orient, dans le pays d’Orient. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voici les jours des années de la vie d’Abraham: il vécut cent soixante quinze ans. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Abraham expira et mourut, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 15:15
      metadata:
        usfm: GEN.15.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'après une heureuse vieillesse, âgé et rassasié de jours, et il fut recueilli auprès de son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Isaac et Ismaël, ses fils, l’enterrèrent dans la caverne de Macpéla, dans le champ d’Éphron, fils de Tsochar, le Héthien, vis-à-vis de Mamré. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C’est le champ qu’Abraham avait acquis des fils de Heth. Là furent enterrés Abraham et Sara, sa femme. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Après la mort d’Abraham, Dieu bénit Isaac, son fils. Il habitait près du puits de Lachaï-roï.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Postérité d’Ismaël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-18: cf. 1 Ch 1:28-31. (Ge 17:20; 21:17-21.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Voici la postérité d’Ismaël, fils d’Abraham, qu’Agar, l’Égyptienne, servante de Sara, avait enfanté à Abraham. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 1:29
      metadata:
        usfm: 1CH.1.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les noms des fils d’Ismaël, par leurs noms, selon leurs générations: Nebajoth, premier-né d’Ismaël, Kédar, Adbeel, Mibsam, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mischma, Duma, Massa, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hadad, Théma, Jethur, Naphisch et Kedma. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ce sont là les fils d’Ismaël; ce sont là leurs noms, selon leurs parcs et leurs enclos. Ils furent les douze chefs de leurs peuples. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et voici les années de la vie d’Ismaël: cent trente-sept ans. Il expira et mourut, et il fut recueilli auprès de son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ses fils habitèrent depuis Havila jusqu’à Schur, qui est en face de l’Égypte, en allant vers l’Assyrie. Il s’établit en présence de tous ses frères.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les deux fils d’Isaac: Ésaü et Jacob'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 19-26: cf. Ro 9:10-13. (Ge 38:27-30.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Voici la postérité d’Isaac, fils d’Abraham. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Abraham engendra Isaac. Isaac était âgé de quarante ans, quand il prit pour femme Rebecca, fille de Bethuel, l’Araméen, de Paddan-Aram, et sœur de Laban, l’Araméen. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Isaac implora l’Éternel pour sa femme, car elle était stérile, et l’Éternel l’exauça: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:10
      metadata:
        usfm: ROM.9.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Rebecca, sa femme, devint enceinte. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les enfants se heurtaient dans son sein; et elle dit: S’il en est ainsi, pourquoi suis-je enceinte? Elle alla consulter l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et l’Éternel lui dit: Deux nations sont dans ton ventre, et deux peuples se sépareront au sortir de tes entrailles; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 8:14
      metadata:
        usfm: 2SA.8.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un de ces peuples sera plus fort que l’autre, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:12
      metadata:
        usfm: ROM.9.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le plus grand sera assujetti au plus petit. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les jours où elle devait accoucher s’accomplirent; et voici, il y avait deux jumeaux dans son ventre. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Le premier sortit entièrement roux, comme un manteau de poil; et on lui donna le nom d’Ésaü. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ensuite sortit son frère, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 12:4
      metadata:
        usfm: HOS.12.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: dont la main tenait le talon d’Ésaü; et on lui donna le nom de Jacob. Isaac était âgé de soixante ans, lorsqu’ils naquirent.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 27-34: cf. Hé 12:16, 17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ces enfants grandirent. Ésaü devint un habile chasseur, un homme des champs; mais Jacob fut un homme tranquille, qui restait sous les tentes. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Isaac aimait Ésaü, parce qu’il mangeait du gibier; et Rebecca aimait Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Comme Jacob faisait cuire un potage, Ésaü revint des champs, accablé de fatigue. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Et Ésaü dit à Jacob: Laisse-moi, je te prie, manger de ce roux, de ce roux-là, car je suis fatigué. C’est pour cela qu’on a donné à Ésaü le nom d’Édom. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jacob dit: Vends-moi aujourd’hui ton droit d’aînesse. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ésaü répondit: Voici, je m’en vais mourir; à quoi me sert ce droit d’aînesse? '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Et Jacob dit: Jure-le moi d’abord. Il le lui jura, et il vendit son droit d’aînesse à Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Alors Jacob donna à Ésaü du pain et du potage de lentilles. Il mangea et but, puis se leva et s’en alla. C’est ainsi qu’Ésaü méprisa le droit d’aînesse.
