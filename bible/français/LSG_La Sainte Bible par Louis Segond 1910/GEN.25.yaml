document_id: GEN.25,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Mort d’Abraham
  - type: heading
    content: 'V. 1-11: cf. 1 Ch 1:32, 33. (Ge 35:28, 29; 49:29-33.)'
  - type: text
    content: 'Abraham prit encore une femme, nommée Ketura. '
  '10':
  - type: text
    content: 'C’est le champ qu’Abraham avait acquis des fils de Heth. Là furent enterrés Abraham et Sara, sa femme. '
  '11':
  - type: text
    content: Après la mort d’Abraham, Dieu bénit Isaac, son fils. Il habitait près du puits de Lachaï-roï.
  - type: heading
    content: Postérité d’Ismaël
  - type: heading
    content: 'V. 12-18: cf. 1 Ch 1:28-31. (Ge 17:20; 21:17-21.)'
  '12':
  - type: text
    content: 'Voici la postérité d’Ismaël, fils d’Abraham, qu’Agar, l’Égyptienne, servante de Sara, avait enfanté à Abraham. '
  '13':
  - type: text
    content: 'Voici '
  - type: note
    content: 1 Ch 1:29.
  - type: text
    content: 'les noms des fils d’Ismaël, par leurs noms, selon leurs générations: Nebajoth, premier-né d’Ismaël, Kédar, Adbeel, Mibsam, '
  '14':
  - type: text
    content: 'Mischma, Duma, Massa, '
  '15':
  - type: text
    content: 'Hadad, Théma, Jethur, Naphisch et Kedma. '
  '16':
  - type: text
    content: 'Ce sont là les fils d’Ismaël; ce sont là leurs noms, selon leurs parcs et leurs enclos. Ils furent les douze chefs de leurs peuples. '
  '17':
  - type: text
    content: 'Et voici les années de la vie d’Ismaël: cent trente-sept ans. Il expira et mourut, et il fut recueilli auprès de son peuple. '
  '18':
  - type: text
    content: Ses fils habitèrent depuis Havila jusqu’à Schur, qui est en face de l’Égypte, en allant vers l’Assyrie. Il s’établit en présence de tous ses frères.
  - type: heading
    content: 'Les deux fils d’Isaac: Ésaü et Jacob'
  - type: heading
    content: 'V. 19-26: cf. Ro 9:10-13. (Ge 38:27-30.)'
  '19':
  - type: text
    content: 'Voici la postérité d’Isaac, fils d’Abraham. '
  '2':
  - type: note
    content: 1 Ch 1:32.
  - type: text
    content: 'Elle lui enfanta Zimran, Jokschan, Medan, Madian, Jischbak et Schuach. '
  '20':
  - type: text
    content: 'Abraham engendra Isaac. Isaac était âgé de quarante ans, quand il prit pour femme Rebecca, fille de Bethuel, l’Araméen, de Paddan-Aram, et sœur de Laban, l’Araméen. '
  '21':
  - type: text
    content: 'Isaac implora l’Éternel pour sa femme, car elle était stérile, et l’Éternel l’exauça: '
  - type: note
    content: Ro 9:10.
  - type: text
    content: 'Rebecca, sa femme, devint enceinte. '
  '22':
  - type: text
    content: 'Les enfants se heurtaient dans son sein; et elle dit: S’il en est ainsi, pourquoi suis-je enceinte? Elle alla consulter l’Éternel. '
  '23':
  - type: text
    content: 'Et l’Éternel lui dit: Deux nations sont dans ton ventre, et deux peuples se sépareront au sortir de tes entrailles; '
  - type: note
    content: 2 S 8:14.
  - type: text
    content: 'un de ces peuples sera plus fort que l’autre, et '
  - type: note
    content: Ro 9:12.
  - type: text
    content: 'le plus grand sera assujetti au plus petit. '
  '24':
  - type: text
    content: 'Les jours où elle devait accoucher s’accomplirent; et voici, il y avait deux jumeaux dans son ventre. '
  '25':
  - type: text
    content: 'Le premier sortit entièrement roux, comme un manteau de poil; et on lui donna le nom d’Ésaü. '
  '26':
  - type: text
    content: 'Ensuite sortit son frère, '
  - type: note
    content: Os 12:4.
  - type: text
    content: dont la main tenait le talon d’Ésaü; et on lui donna le nom de Jacob. Isaac était âgé de soixante ans, lorsqu’ils naquirent.
  - type: heading
    content: 'V. 27-34: cf. Hé 12:16, 17.'
  '27':
  - type: text
    content: 'Ces enfants grandirent. Ésaü devint un habile chasseur, un homme des champs; mais Jacob fut un homme tranquille, qui restait sous les tentes. '
  '28':
  - type: text
    content: 'Isaac aimait Ésaü, parce qu’il mangeait du gibier; et Rebecca aimait Jacob. '
  '29':
  - type: text
    content: 'Comme Jacob faisait cuire un potage, Ésaü revint des champs, accablé de fatigue. '
  '3':
  - type: text
    content: 'Jokschan engendra Séba et Dedan. Les fils de Dedan furent les Aschurim, les Letuschim et les Leummim. '
  '30':
  - type: text
    content: 'Et Ésaü dit à Jacob: Laisse-moi, je te prie, manger de ce roux, de ce roux-là, car je suis fatigué. C’est pour cela qu’on a donné à Ésaü le nom d’Édom. '
  '31':
  - type: text
    content: 'Jacob dit: Vends-moi aujourd’hui ton droit d’aînesse. '
  '32':
  - type: text
    content: 'Ésaü répondit: Voici, je m’en vais mourir; à quoi me sert ce droit d’aînesse? '
  '33':
  - type: text
    content: 'Et Jacob dit: Jure-le moi d’abord. Il le lui jura, et il vendit son droit d’aînesse à Jacob. '
  '34':
  - type: text
    content: Alors Jacob donna à Ésaü du pain et du potage de lentilles. Il mangea et but, puis se leva et s’en alla. C’est ainsi qu’Ésaü méprisa le droit d’aînesse.
  '4':
  - type: text
    content: 'Les fils de Madian furent Épha, Épher, Hénoc, Abida et Eldaa. Ce sont là tous les fils de Ketura. '
  '5':
  - type: note
    content: Ge 24:36.
  - type: text
    content: 'Abraham donna tous ses biens à Isaac. '
  '6':
  - type: text
    content: 'Il fit des dons aux fils de ses concubines; et, tandis qu’il vivait encore, il les envoya loin de son fils Isaac du côté de l’orient, dans le pays d’Orient. '
  '7':
  - type: text
    content: 'Voici les jours des années de la vie d’Abraham: il vécut cent soixante quinze ans. '
  '8':
  - type: text
    content: 'Abraham expira et mourut, '
  - type: note
    content: Ge 15:15.
  - type: text
    content: 'après une heureuse vieillesse, âgé et rassasié de jours, et il fut recueilli auprès de son peuple. '
  '9':
  - type: text
    content: 'Isaac et Ismaël, ses fils, l’enterrèrent dans la caverne de Macpéla, dans le champ d’Éphron, fils de Tsochar, le Héthien, vis-à-vis de Mamré. '
