- type: usfm
  marker: s1
  children:
  - type: text
    text: Entretien de Jésus avec Nicodème
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. (Mt 18:3. Ga 6:15. 2 Co 5:17.) (Jn 1:12, 13. 1 Pi 1:3, 23.) Éz 36:25-27.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mais il y eut un homme d’entre les pharisiens, nommé '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 19:39
      metadata:
        usfm: JHN.19.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nicodème, un chef des Juifs, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:50
      metadata:
        usfm: JHN.7.50
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:39
      metadata:
        usfm: JHN.19.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui vint, lui, auprès de Jésus, de nuit, et lui dit: Rabbi, nous savons que tu es un docteur venu de Dieu; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 16:33
      metadata:
        usfm: JHN.16.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car personne ne peut faire ces miracles que tu fais, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:38
      metadata:
        usfm: ACT.10.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'si Dieu n’est avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus lui répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En vérité, en vérité, je te le dis, si un homme ne naît de nouveau, il ne peut voir le royaume de Dieu.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nicodème lui dit: Comment un homme peut-il naître quand il est vieux? Peut-il rentrer dans le sein de sa mère et naître? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jésus répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En vérité, en vérité, je te le dis,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 3:5
      metadata:
        usfm: TIT.3.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: si un homme ne naît d’eau et d’Esprit, il ne peut entrer dans le royaume de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:5
      metadata:
        usfm: ROM.8.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce qui est né de la chair est chair, et ce qui est né de l’Esprit est esprit.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ne t’étonne pas que je t’aie dit: Il faut que vous naissiez de nouveau.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le vent souffle où il veut, et tu en entends le bruit; mais tu ne sais d’où il vient, ni où il va. Il en est ainsi de tout homme qui est né de l’Esprit.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nicodème lui dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:52
      metadata:
        usfm: JHN.6.52
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comment cela peut-il se faire? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus lui répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tu es le docteur d’Israël, et tu ne sais pas ces choses!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:16
      metadata:
        usfm: JHN.7.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:28
      metadata:
        usfm: JHN.8.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:49
      metadata:
        usfm: JHN.12.49
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:24
      metadata:
        usfm: JHN.14.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En vérité, en vérité, je te le dis, nous disons ce que nous savons, et nous rendons témoignage de ce que nous avons vu; et vous ne recevez pas
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:32
      metadata:
        usfm: JHN.3.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: notre témoignage.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si vous ne croyez pas quand je vous ai parlé des choses terrestres, comment croirez-vous quand je vous parlerai des choses célestes?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:62
      metadata:
        usfm: JHN.6.62
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:9
      metadata:
        usfm: EPH.4.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Personne n’est monté au ciel, si ce n’est celui qui est descendu du ciel, le Fils de l’homme qui est dans le ciel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-21: cf. (No 21:4-9. Jn 12:32, 33.) 1 Jn 4:9, 10. (Jn 6:40; 3:36.)'
  marker-yv: yv-h
