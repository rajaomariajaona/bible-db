document_id: JHN.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Entretien de Jésus avec Nicodème
  - type: heading
    content: 'V. 1-13: cf. (Mt 18:3. Ga 6:15. 2 Co 5:17.) (Jn 1:12, 13. 1 Pi 1:3, 23.) Éz 36:25-27.'
  - type: text
    content: 'Mais il y eut un homme d’entre les pharisiens, nommé '
  - type: note
    content: Jn 19:39.
  - type: text
    content: 'Nicodème, un chef des Juifs, '
  '10':
  - type: text
    content: 'Jésus lui répondit: '
  - type: text
    content: Tu es le docteur d’Israël, et tu ne sais pas ces choses!
  '11':
  - type: text
    content: ' '
  - type: note
    content: Jn 7:16; 8:28; 12:49; 14:24.
  - type: text
    content: En vérité, en vérité, je te le dis, nous disons ce que nous savons, et nous rendons témoignage de ce que nous avons vu; et vous ne recevez pas
  - type: text
    content: ' '
  - type: note
    content: Jn 3:32.
  - type: text
    content: notre témoignage.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Si vous ne croyez pas quand je vous ai parlé des choses terrestres, comment croirez-vous quand je vous parlerai des choses célestes?
  - type: text
    content: ' '
  '13':
  - type: note
    content: Jn 6:62. Ép 4:9.
  - type: text
    content: Personne n’est monté au ciel, si ce n’est celui qui est descendu du ciel, le Fils de l’homme qui est dans le ciel.
  - type: heading
    content: 'V. 14-21: cf. (No 21:4-9. Jn 12:32, 33.) 1 Jn 4:9, 10. (Jn 6:40; 3:36.)'
  '14':
  - type: text
    content: ' '
  - type: note
    content: No 21:9. 2 Ch 18:4.
  - type: text
    content: Et comme Moïse éleva le serpent dans le désert,
  - type: text
    content: ' '
  - type: note
    content: Jn 8:28; 12:32.
  - type: text
    content: il faut de même que le Fils de l’homme soit élevé,
  - type: text
    content: ' '
  '15':
  - type: text
    content: afin que quiconque croit en lui
  - type: text
    content: ' '
  - type: note
    content: Jn 3:36.
  - type: text
    content: ait la vie éternelle.
  - type: text
    content: ' '
  '16':
  - type: note
    content: Ro 5:8; 8:31. 1 Jn 4:9.
  - type: text
    content: Car Dieu a tant aimé le monde qu’il a donné son Fils unique,
  - type: text
    content: ' '
  - type: note
    content: Lu 19:10. Jn 3:36. 1 Jn 5:10.
  - type: text
    content: afin que quiconque croit en lui ne périsse point, mais qu’il ait la vie éternelle.
  - type: text
    content: ' '
  '17':
  - type: note
    content: Lu 9:56. Jn 9:39; 12:47. 1 Jn 4:14.
  - type: text
    content: Dieu, en effet, n’a pas envoyé son Fils dans le monde pour qu’il juge le monde, mais pour que le monde soit sauvé par lui.
  - type: text
    content: ' '
  '18':
  - type: note
    content: Jn 5:24; 6:40, 47; 20:31.
  - type: text
    content: Celui qui croit en lui n’est point jugé; mais celui qui ne croit pas est déjà jugé, parce qu’il n’a pas cru au nom du Fils unique de Dieu.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Et
  - type: text
    content: ' '
  - type: note
    content: 1 Jn 1:5.
  - type: text
    content: ce jugement c’est que, la lumière étant venue dans le monde, les hommes ont préféré les ténèbres à la lumière, parce que leurs œuvres étaient mauvaises.
  - type: text
    content: ' '
  '2':
  - type: note
    content: Jn 7:50; 19:39.
  - type: text
    content: 'qui vint, lui, auprès de Jésus, de nuit, et lui dit: Rabbi, nous savons que tu es un docteur venu de Dieu; '
  - type: note
    content: Jn 16:33.
  - type: text
    content: 'car personne ne peut faire ces miracles que tu fais, '
  - type: note
    content: Ac 10:38.
  - type: text
    content: 'si Dieu n’est avec lui. '
  '20':
  - type: text
    content: Car quiconque fait le mal hait la lumière, et ne vient point à la lumière, de peur que ses œuvres ne soient dévoilées;
  - type: text
    content: ' '
  '21':
  - type: note
    content: Ép 5:8.
  - type: text
    content: mais celui qui agit selon la vérité vient à la lumière, afin que ses œuvres soient manifestées, parce qu’elles sont faites en Dieu.
  - type: heading
    content: Nouveau témoignage de Jean-Baptiste
  - type: heading
    content: 'V. 22-36: cf. Jn 1:6-12, 19-34. Mc 16:15, 16.'
  '22':
  - type: text
    content: 'Après cela, Jésus, accompagné de ses disciples, se rendit dans la terre de Judée; et là il demeurait avec eux, '
  - type: note
    content: Jn 4:1.
  - type: text
    content: 'et il baptisait. '
  '23':
  - type: note
    content: Mt 3:6. Mc 1:5. Lu 3:7.
  - type: text
    content: 'Jean aussi baptisait à Énon, près de Salim, parce qu’il y avait là beaucoup d’eau; et on y venait pour être baptisé. '
  '24':
  - type: note
    content: Mt 14:3.
  - type: text
    content: 'Car Jean n’avait pas encore été mis en prison. '
  '25':
  - type: text
    content: 'Or, il s’éleva de la part des disciples de Jean une dispute avec un Juif touchant la purification. '
  '26':
  - type: note
    content: Mt 3:11. Mc 1:7. Lu 3:16. Jn 1:15, 26, 34.
  - type: text
    content: 'Ils vinrent trouver Jean, et lui dirent: Rabbi, celui qui était avec toi au-delà du Jourdain, et à qui tu as rendu témoignage, voici, il baptise, et tous vont à lui. '
  '27':
  - type: text
    content: 'Jean répondit: Un homme ne peut recevoir que ce qui lui a été donné du ciel. '
  '28':
  - type: text
    content: 'Vous-mêmes m’êtes témoins que j’ai dit: '
  - type: note
    content: Jn 1:20.
  - type: text
    content: 'Je ne suis pas le Christ, '
  - type: note
    content: Mal 3:1. Mt 11:10. Mc 1:2. Lu 1:17; 7:27. Jn 1:21, 23.
  - type: text
    content: 'mais j’ai été envoyé devant lui. '
  '29':
  - type: text
    content: 'Celui à qui appartient l’épouse, c’est l’époux; mais l’ami de l’époux, qui se tient là et qui l’entend, éprouve une grande joie à cause de la voix de l’époux: aussi cette joie, qui est la mienne, est parfaite. '
  '3':
  - type: text
    content: 'Jésus lui répondit: '
  - type: text
    content: En vérité, en vérité, je te le dis, si un homme ne naît de nouveau, il ne peut voir le royaume de Dieu.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Il faut qu’il croisse, et que je diminue. '
  '31':
  - type: note
    content: Jn 8:23.
  - type: text
    content: 'Celui qui vient d’en haut est au-dessus de tous; celui qui est de la terre est de la terre, et il parle comme étant de la terre. Celui qui vient du ciel est au-dessus de tous, '
  '32':
  - type: note
    content: Jn 5:30; 8:26; 12:49; 14:10.
  - type: text
    content: 'il rend témoignage de ce qu’il a vu et entendu, et personne ne reçoit son témoignage. '
  '33':
  - type: text
    content: 'Celui qui a reçu son témoignage a certifié '
  - type: note
    content: Ro 3:4.
  - type: text
    content: 'que Dieu est vrai; '
  '34':
  - type: text
    content: 'car celui que Dieu a envoyé dit les paroles de Dieu, parce que Dieu '
  - type: note
    content: Ép 4:7.
  - type: text
    content: 'ne lui donne pas l’Esprit avec mesure. '
  '35':
  - type: text
    content: 'Le Père aime le Fils, '
  - type: note
    content: Mt 11:27; 28:18. Lu 10:22. Jn 5:22; 17:2. Hé 2:8.
  - type: text
    content: 'et il a remis toutes choses entre ses mains. '
  '36':
  - type: note
    content: Jn 3:16; 6:47. 1 Jn 5:10.
  - type: text
    content: Celui qui croit au Fils a la vie éternelle; celui qui ne croit pas au Fils ne verra point la vie, mais la colère de Dieu demeure sur lui.
  '4':
  - type: text
    content: 'Nicodème lui dit: Comment un homme peut-il naître quand il est vieux? Peut-il rentrer dans le sein de sa mère et naître? '
  '5':
  - type: text
    content: 'Jésus répondit: '
  - type: text
    content: En vérité, en vérité, je te le dis,
  - type: text
    content: ' '
  - type: note
    content: Tit 3:5.
  - type: text
    content: si un homme ne naît d’eau et d’Esprit, il ne peut entrer dans le royaume de Dieu.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ro 8:5.
  - type: text
    content: Ce qui est né de la chair est chair, et ce qui est né de l’Esprit est esprit.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Ne t’étonne pas que je t’aie dit: Il faut que vous naissiez de nouveau.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: Le vent souffle où il veut, et tu en entends le bruit; mais tu ne sais d’où il vient, ni où il va. Il en est ainsi de tout homme qui est né de l’Esprit.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Nicodème lui dit: '
  - type: note
    content: Jn 6:52.
  - type: text
    content: 'Comment cela peut-il se faire? '
