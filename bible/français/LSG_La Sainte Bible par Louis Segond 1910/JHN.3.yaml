      - type: text
        text: Mc 1:7
      metadata:
        usfm: MRK.1.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:16
      metadata:
        usfm: LUK.3.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:15
      metadata:
        usfm: JHN.1.15
    - type: text
      text: ', '
