      marker: ref
      children:
      - type: text
        text: Mc 1:5
      metadata:
        usfm: MRK.1.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:7
      metadata:
        usfm: LUK.3.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
