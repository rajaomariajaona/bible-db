document_id: HEB.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-10: cf. (Ex 25; 26; 40:17-33.) (1 Ch 23:13. Lé 16.) Col 2:16, 17.'
  - type: text
    content: 'La première alliance avait aussi des ordonnances relatives au culte, et le sanctuaire terrestre. '
  '10':
  - type: text
    content: 'et qui, avec '
  - type: note
    content: Lé 11:2.
  - type: text
    content: 'les aliments, les boissons et '
  - type: note
    content: No 19:7, etc.
  - type: text
    content: les diverses ablutions, étaient des ordonnances charnelles imposées seulement jusqu’à une époque de réformation.
  - type: heading
    content: 'V. 11-28: cf. (Hé 10:11-22; 12:24.) (Ex 24:3-8. Lé 17:11.) (Hé 10:1-14; 7:24-28; 1:3.)'
  '11':
  - type: text
    content: 'Mais Christ est venu comme '
  - type: note
    content: Hé 3:1; 4:14; 6:20; 8:1.
  - type: text
    content: 'souverain sacrificateur des biens à venir; il a traversé le tabernacle plus grand et plus parfait, qui n’est pas construit de main d’homme, c’est-à-dire, qui n’est pas de cette création; '
  '12':
  - type: text
    content: 'et il est entré une fois pour toutes dans le lieu très saint, non avec le sang des boucs et des veaux, '
  - type: note
    content: Ac 20:28. Ép 1:7. Col 1:14. Hé 10:10. 1 Pi 1:19. Ap 1:5; 5:9.
  - type: text
    content: 'mais avec son propre sang, ayant obtenu une rédemption éternelle. '
  '13':
  - type: note
    content: Lé 16:14. No 19:4. Hé 10:4.
  - type: text
    content: 'Car si le sang des taureaux et des boucs, et la cendre d’une vache, répandue sur ceux qui sont souillés, sanctifient et procurent la pureté de la chair, '
  '14':
  - type: text
    content: 'combien plus '
  - type: note
    content: 1 Jn 1:7. Ap 1:5.
  - type: text
    content: 'le sang de Christ, '
  - type: note
    content: Ga 1:4. Ép 5:2. Tit 2:14.
  - type: text
    content: 'qui, par un esprit éternel, s’est offert lui-même sans tache à Dieu, purifiera-t-il votre conscience des œuvres mortes, '
  - type: note
    content: Lu 1:74. Ro 6:13. Ga 2:20. 1 Pi 4:2.
  - type: text
    content: 'afin que vous serviez le Dieu vivant! '
  '15':
  - type: text
    content: 'Et c’est pour cela qu’il est le médiateur d’une nouvelle alliance, '
  - type: note
    content: Ro 5:6. 1 Pi 3:18.
  - type: text
    content: 'afin que, la mort étant intervenue pour le rachat des transgressions commises sous la première alliance, ceux qui ont été appelés reçoivent l’héritage éternel qui leur a été promis. '
  '16':
  - type: text
    content: 'Car là où il y a un testament, il est nécessaire que la mort du testateur soit constatée. '
  '17':
  - type: note
    content: Ga 3:15.
  - type: text
    content: 'Un testament, en effet, n’est valable qu’en cas de mort, puisqu’il n’a aucune force tant que le testateur vit. '
  '18':
  - type: text
    content: 'Voilà pourquoi c’est avec du sang que même la première alliance fut inaugurée. '
  '19':
  - type: text
    content: 'Moïse, après avoir prononcé devant tout le peuple tous les commandements de la loi, prit le sang des veaux et des boucs, avec de l’eau, de la laine écarlate, et de l’hysope; et il fit l’aspersion sur le livre lui-même et sur tout le peuple, en disant: '
  '2':
  - type: note
    content: Ex 26:1; 36:1.
  - type: text
    content: 'Un tabernacle fut, en effet, construit. Dans la partie antérieure, appelée le lieu saint, étaient le chandelier, la table, '
  - type: note
    content: Lé 24:5.
  - type: text
    content: 'et les pains de proposition. '
  '20':
  - type: note
    content: Ex 24:8. Mt 26:28.
  - type: text
    content: 'Ceci est le sang de l’alliance que Dieu a ordonnée pour vous. '
  '21':
  - type: text
    content: 'Il fit pareillement l’aspersion avec le sang sur le tabernacle et sur tous les ustensiles du culte. '
  '22':
  - type: text
    content: 'Et presque tout, d’après la loi, est purifié avec du sang, et sans effusion de sang il n’y a pas de pardon. '
  '23':
  - type: text
    content: 'Il était donc nécessaire, puisque les images des choses qui sont dans les cieux devaient être purifiées de cette manière, que les choses célestes elles-mêmes le fussent par des sacrifices plus excellents que ceux-là. '
  '24':
  - type: text
    content: 'Car Christ n’est pas entré dans un sanctuaire fait de main d’homme, en imitation du véritable, mais il est entré dans le ciel même, afin de comparaître maintenant pour nous devant la face de Dieu. '
  '25':
  - type: text
    content: 'Et ce n’est pas pour s’offrir lui-même plusieurs fois qu’il y est entré, '
  - type: note
    content: Ex 30:10. Lé 16:2, 34. Hé 9:7.
  - type: text
    content: 'comme le souverain sacrificateur entre chaque année dans le sanctuaire avec du sang étranger; '
  '26':
  - type: text
    content: 'autrement, il aurait fallu qu’il eût souffert plusieurs fois depuis la création du monde, tandis que maintenant, à la fin des siècles, il a paru une seule fois pour abolir le péché par son sacrifice. '
  '27':
  - type: text
    content: 'Et comme il est réservé aux hommes de mourir une seule fois, après quoi vient le jugement, '
  '28':
  - type: note
    content: Ro 5:6, 8. 1 Pi 3:18.
  - type: text
    content: de même Christ, qui s’est offert une seule fois pour porter les péchés de plusieurs, apparaîtra sans péché une seconde fois à ceux qui l’attendent pour leur salut.
  '3':
  - type: text
    content: 'Derrière le second voile se trouvait la partie du tabernacle appelée le saint des saints, '
  '4':
  - type: text
    content: 'renfermant l’autel d’or pour les parfums, et '
  - type: note
    content: Ex 25:10.
  - type: text
    content: 'l’arche de l’alliance, entièrement recouverte d’or. Il y avait dans l’arche '
  - type: note
    content: Ex 16:33.
  - type: text
    content: 'un vase d’or contenant la manne, '
  - type: note
    content: No 17:10.
  - type: text
    content: 'la verge d’Aaron, qui avait fleuri, et '
  - type: note
    content: Ex 34:29. 1 R 8:9. 2 Ch 5:10.
  - type: text
    content: 'les tables de l’alliance. '
  '5':
  - type: note
    content: Ex 25:22.
  - type: text
    content: 'Au-dessus de l’arche étaient les chérubins de la gloire, couvrant de leur ombre le propitiatoire. Ce n’est pas le moment de parler en détail là-dessus. '
  '6':
  - type: text
    content: 'Or, ces choses étant ainsi disposées, '
  - type: note
    content: No 28:3.
  - type: text
    content: 'les sacrificateurs qui font le service entrent en tout temps dans la première partie du tabernacle; '
  '7':
  - type: note
    content: Ex 30:10. Lé 16:2, 34. Hé 9:25.
  - type: text
    content: 'et dans la seconde le souverain sacrificateur seul entre une fois par an, non sans y porter du sang qu’il offre pour lui-même et pour les péchés du peuple. '
  '8':
  - type: text
    content: 'Le Saint-Esprit montrait par là '
  - type: note
    content: Jn 14:6.
  - type: text
    content: 'que le chemin du lieu très saint n’était pas encore ouvert, tant que le premier tabernacle subsistait. '
  '9':
  - type: text
    content: 'C’est une figure pour le temps actuel, où l’on présente des offrandes et des sacrifices qui ne peuvent rendre parfait sous le rapport de la conscience celui qui rend ce culte, '
