document_id: REV.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sept anges et sept coupes, soit les sept derniers fléaux
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. (Ap 19:1-4. Ex 15:1, etc.) Ap 16.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis je vis dans le ciel un autre signe, grand et admirable: sept anges, qui tenaient '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 11:14
      metadata:
        usfm: REV.11.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sept fléaux, les derniers, car par eux s’accomplit la colère de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et je vis '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 4:6
      metadata:
        usfm: REV.4.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme une mer de verre, mêlée de feu, et ceux qui avaient vaincu la bête, et son image, et le nombre de son nom, debout sur la mer de verre, ayant des harpes de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et ils chantent le cantique de Moïse, le serviteur de Dieu, et le cantique de l’agneau, en disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 111:2
      metadata:
        usfm: PSA.111.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 139:14
      metadata:
        usfm: PSA.139.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tes œuvres sont grandes et admirables, Seigneur Dieu tout-puissant! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 145:17
      metadata:
        usfm: PSA.145.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tes voies sont justes et véritables, roi des nations! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 10:7
      metadata:
        usfm: JER.10.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Qui ne craindrait, Seigneur, et ne glorifierait ton nom? Car seul tu es saint. Et toutes les nations viendront, et se prosterneront devant toi, parce que tes jugements ont été manifestés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Après cela, je regardai, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 11:19
      metadata:
        usfm: REV.11.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le temple du tabernacle du témoignage fut ouvert dans le ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et les sept anges qui tenaient les sept fléaux sortirent du temple, revêtus d’un lin pur, éclatant, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:13
      metadata:
        usfm: REV.1.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ayant des ceintures d’or autour de la poitrine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et l’un des quatre êtres vivants donna aux sept anges sept coupes d’or, pleines de la colère du Dieu qui vit aux siècles des siècles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et le temple fut '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 40:34
      metadata:
        usfm: EXO.40.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 8:10
      metadata:
        usfm: 1KI.8.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 6:4
      metadata:
        usfm: ISA.6.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: rempli de fumée, à cause de la gloire de Dieu et de sa puissance; et personne ne pouvait entrer dans le temple, jusqu’à ce que les sept fléaux des sept anges fussent accomplis.
