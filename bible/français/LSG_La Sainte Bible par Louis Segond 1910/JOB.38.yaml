document_id: JOB.38,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse de l’Éternel à Job
  - type: heading
    content: 'V. 1-38: cf. (Job 39:34-38; 40:1, 2.) (Ps 104:1-13, 24. Pr 8:22-30.) (És 40:12, etc. Jé 10:12, 13. Ro 11:33-36.)'
  - type: text
    content: 'L’Éternel répondit à Job du milieu de la tempête et dit:'
  '10':
  - type: text
    content: Quand je lui imposai ma loi,
  - type: text
    content: Et que je lui mis des barrières et des portes;
  '11':
  - type: text
    content: 'Quand je dis:'
  - type: text
    content: Tu viendras jusqu’ici, tu n’iras pas au-delà;
  - type: text
    content: Ici s’arrêtera l’orgueil de tes flots?
  '12':
  - type: text
    content: Depuis que tu existes, as-tu commandé au matin?
  - type: text
    content: As-tu montré sa place à l’aurore,
  '13':
  - type: text
    content: Pour qu’elle saisisse les extrémités de la terre,
  - type: text
    content: Et que les méchants en soient secoués;
  '14':
  - type: text
    content: Pour que la terre se transforme comme l’argile qui reçoit une empreinte,
  - type: text
    content: Et qu’elle soit parée comme d’un vêtement;
  '15':
  - type: text
    content: Pour que les méchants soient privés de leur lumière,
  - type: text
    content: Et que le bras qui se lève soit brisé?
  '16':
  - type: text
    content: As-tu pénétré jusqu’aux sources de la mer?
  - type: text
    content: T’es-tu promené dans les profondeurs de l’abîme?
  '17':
  - type: text
    content: Les portes de la mort t’ont-elles été ouvertes?
  - type: text
    content: As-tu vu les portes de l’ombre de la mort?
  '18':
  - type: text
    content: As-tu embrassé du regard l’étendue de la terre?
  - type: text
    content: Parle, si tu sais toutes ces choses.
  '19':
  - type: text
    content: Où est le chemin qui conduit au séjour de la lumière?
  - type: text
    content: Et les ténèbres, où ont-elles leur demeure?
  '2':
  - type: text
    content: ' '
  - type: note
    content: Job 42:3.
  - type: text
    content: Qui est celui qui obscurcit mes desseins
  - type: text
    content: Par des discours sans intelligence?
  '20':
  - type: text
    content: Peux-tu les saisir à leur limite,
  - type: text
    content: Et connaître les sentiers de leur habitation?
  '21':
  - type: text
    content: Tu le sais, car alors tu étais né,
  - type: text
    content: Et le nombre de tes jours est grand!
  '22':
  - type: text
    content: Es-tu parvenu jusqu’aux amas de neige?
  - type: text
    content: As-tu vu les dépôts de grêle,
  '23':
  - type: text
    content: Que je tiens en réserve pour les temps de détresse,
  - type: text
    content: Pour les jours de guerre et de bataille?
  '24':
  - type: text
    content: Par quel chemin la lumière se divise-t-elle,
  - type: text
    content: Et le vent d’orient se répand-il sur la terre?
  '25':
  - type: text
    content: Qui a ouvert un passage à la pluie,
  - type: text
    content: Et tracé la route de l’éclair et du tonnerre,
  '26':
  - type: text
    content: Pour que la pluie tombe sur une terre sans habitants,
  - type: text
    content: Sur un désert où il n’y a point d’hommes;
  '27':
  - type: text
    content: ' '
  - type: note
    content: Ps 107:35.
  - type: text
    content: Pour qu’elle abreuve les lieux solitaires et arides,
  - type: text
    content: Et qu’elle fasse germer et sortir l’herbe?
  '28':
  - type: text
    content: La pluie a-t-elle un père?
  - type: text
    content: Qui fait naître les gouttes de la rosée?
  '29':
  - type: text
    content: Du sein de qui sort la glace,
  - type: text
    content: Et qui enfante le frimas du ciel,
  '3':
  - type: text
    content: Ceins tes reins comme un vaillant homme;
  - type: text
    content: Je t’interrogerai, et tu m’instruiras.
  '30':
  - type: text
    content: Pour que les eaux se cachent comme une pierre,
  - type: text
    content: Et que la surface de l’abîme soit enchaînée?
  '31':
  - type: text
    content: 'Noues-tu les liens '
  - type: note
    content: Job 9:9. Am 5:8.
  - type: text
    content: des Pléiades,
  - type: text
    content: Ou détaches-tu les cordages de l’Orion?
  '32':
  - type: text
    content: Fais-tu paraître en leur temps les signes du zodiaque,
  - type: text
    content: Et conduis-tu la Grande Ourse avec ses petits?
  '33':
  - type: text
    content: ' '
  - type: note
    content: Jé 31:35.
  - type: text
    content: Connais-tu les lois du ciel?
  - type: text
    content: Règles-tu son pouvoir sur la terre?
  '34':
  - type: text
    content: Élèves-tu la voix jusqu’aux nuées,
  - type: text
    content: Pour appeler à toi des torrents d’eaux?
  '35':
  - type: text
    content: Lances-tu les éclairs?
  - type: text
    content: Partent-ils?
  - type: text
    content: 'Te disent-ils: Nous voici?'
  '36':
  - type: text
    content: ' '
  - type: note
    content: Job 32:8. Ec 2:26. Da 1:17.
  - type: text
    content: Qui a mis la sagesse dans le cœur,
  - type: text
    content: Ou qui a donné l’intelligence à l’esprit?
  '37':
  - type: text
    content: Qui peut avec sagesse compter les nuages,
  - type: text
    content: Et verser les outres des cieux,
  '38':
  - type: text
    content: Pour que la poussière se mette à ruisseler,
  - type: text
    content: Et que les mottes de terre se collent ensemble?
  '4':
  - type: text
    content: 'Où étais-tu '
  - type: note
    content: Pr 8:29.
  - type: text
    content: quand je fondais la terre?
  - type: text
    content: Dis-le, si tu as de l’intelligence.
  '5':
  - type: text
    content: Qui en a fixé les dimensions, le sais-tu?
  - type: text
    content: Ou qui a étendu sur elle le cordeau?
  '6':
  - type: text
    content: Sur quoi ses bases sont-elles appuyées?
  - type: text
    content: Ou qui en a posé la pierre angulaire,
  '7':
  - type: text
    content: Alors que les étoiles du matin éclataient en chants d’allégresse,
  - type: text
    content: Et que tous les fils de Dieu poussaient des cris de joie?
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ge 1:9. Job 26:10. Ps 33:7; 104:7. Pr 8:29. Jé 5:22.
  - type: text
    content: Qui a fermé la mer avec des portes,
  - type: text
    content: Quand elle s’élança du sein maternel;
  '9':
  - type: text
    content: Quand je fis de la nuée son vêtement,
  - type: text
    content: Et de l’obscurité ses langes;
