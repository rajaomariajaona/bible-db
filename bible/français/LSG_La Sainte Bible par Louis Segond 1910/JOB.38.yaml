document_id: JOB.38
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Réponse de l’Éternel à Job
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-38: cf. (Job 39:34-38; 40:1, 2.) (Ps 104:1-13, 24. Pr 8:22-30.) (És 40:12, etc. Jé 10:12, 13. Ro 11:33-36.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel répondit à Job du milieu de la tempête et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 42:3
      metadata:
        usfm: JOB.42.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qui est celui qui obscurcit mes desseins
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par des discours sans intelligence?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ceins tes reins comme un vaillant homme;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’interrogerai, et tu m’instruiras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Où étais-tu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 8:29
      metadata:
        usfm: PRO.8.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: quand je fondais la terre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dis-le, si tu as de l’intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Qui en a fixé les dimensions, le sais-tu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou qui a étendu sur elle le cordeau?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sur quoi ses bases sont-elles appuyées?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou qui en a posé la pierre angulaire,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Alors que les étoiles du matin éclataient en chants d’allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que tous les fils de Dieu poussaient des cris de joie?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 1:9
      metadata:
        usfm: GEN.1.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 26:10
      metadata:
        usfm: JOB.26.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 33:7
      metadata:
        usfm: PSA.33.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 104:7
      metadata:
        usfm: PSA.104.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 8:29
      metadata:
        usfm: PRO.8.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 5:22
      metadata:
        usfm: JER.5.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qui a fermé la mer avec des portes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand elle s’élança du sein maternel;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Quand je fis de la nuée son vêtement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de l’obscurité ses langes;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Quand je lui imposai ma loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que je lui mis des barrières et des portes;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quand je dis:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu viendras jusqu’ici, tu n’iras pas au-delà;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ici s’arrêtera l’orgueil de tes flots?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Depuis que tu existes, as-tu commandé au matin?
- type: usfm
  marker: q1
  children:
  - type: text
    text: As-tu montré sa place à l’aurore,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Pour qu’elle saisisse les extrémités de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que les méchants en soient secoués;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Pour que la terre se transforme comme l’argile qui reçoit une empreinte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’elle soit parée comme d’un vêtement;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Pour que les méchants soient privés de leur lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que le bras qui se lève soit brisé?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: As-tu pénétré jusqu’aux sources de la mer?
- type: usfm
  marker: q1
  children:
  - type: text
    text: T’es-tu promené dans les profondeurs de l’abîme?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Les portes de la mort t’ont-elles été ouvertes?
- type: usfm
  marker: q1
  children:
  - type: text
    text: As-tu vu les portes de l’ombre de la mort?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: As-tu embrassé du regard l’étendue de la terre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parle, si tu sais toutes ces choses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Où est le chemin qui conduit au séjour de la lumière?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les ténèbres, où ont-elles leur demeure?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Peux-tu les saisir à leur limite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et connaître les sentiers de leur habitation?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tu le sais, car alors tu étais né,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le nombre de tes jours est grand!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Es-tu parvenu jusqu’aux amas de neige?
- type: usfm
  marker: q1
  children:
  - type: text
    text: As-tu vu les dépôts de grêle,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Que je tiens en réserve pour les temps de détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour les jours de guerre et de bataille?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Par quel chemin la lumière se divise-t-elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le vent d’orient se répand-il sur la terre?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Qui a ouvert un passage à la pluie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tracé la route de l’éclair et du tonnerre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Pour que la pluie tombe sur une terre sans habitants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur un désert où il n’y a point d’hommes;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 107:35
      metadata:
        usfm: PSA.107.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pour qu’elle abreuve les lieux solitaires et arides,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’elle fasse germer et sortir l’herbe?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: La pluie a-t-elle un père?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui fait naître les gouttes de la rosée?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Du sein de qui sort la glace,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui enfante le frimas du ciel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Pour que les eaux se cachent comme une pierre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que la surface de l’abîme soit enchaînée?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Noues-tu les liens '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 9:9
      metadata:
        usfm: JOB.9.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 5:8
      metadata:
        usfm: AMO.5.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: des Pléiades,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou détaches-tu les cordages de l’Orion?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fais-tu paraître en leur temps les signes du zodiaque,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et conduis-tu la Grande Ourse avec ses petits?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 31:35
      metadata:
        usfm: JER.31.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Connais-tu les lois du ciel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Règles-tu son pouvoir sur la terre?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Élèves-tu la voix jusqu’aux nuées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour appeler à toi des torrents d’eaux?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Lances-tu les éclairs?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Partent-ils?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Te disent-ils: Nous voici?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 32:8
      metadata:
        usfm: JOB.32.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 2:26
      metadata:
        usfm: ECC.2.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 1:17
      metadata:
        usfm: DAN.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qui a mis la sagesse dans le cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou qui a donné l’intelligence à l’esprit?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Qui peut avec sagesse compter les nuages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et verser les outres des cieux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Pour que la poussière se mette à ruisseler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que les mottes de terre se collent ensemble?
