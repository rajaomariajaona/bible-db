document_id: JOB.38,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Réponse de l’Éternel à Job
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-38: cf. (Job 39:34-38; 40:1, 2.) (Ps 104:1-13, 24. Pr 8:22-30.) (És 40:12, etc. Jé 10:12, 13. Ro 11:33-36.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel répondit à Job du milieu de la tempête et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je lui imposai ma loi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que je lui mis des barrières et des portes;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Quand je dis:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu viendras jusqu’ici, tu n’iras pas au-delà;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ici s’arrêtera l’orgueil de tes flots?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depuis que tu existes, as-tu commandé au matin?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As-tu montré sa place à l’aurore,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour qu’elle saisisse les extrémités de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que les méchants en soient secoués;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que la terre se transforme comme l’argile qui reçoit une empreinte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’elle soit parée comme d’un vêtement;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que les méchants soient privés de leur lumière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que le bras qui se lève soit brisé?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As-tu pénétré jusqu’aux sources de la mer?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: T’es-tu promené dans les profondeurs de l’abîme?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les portes de la mort t’ont-elles été ouvertes?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As-tu vu les portes de l’ombre de la mort?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As-tu embrassé du regard l’étendue de la terre?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parle, si tu sais toutes ces choses.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où est le chemin qui conduit au séjour de la lumière?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les ténèbres, où ont-elles leur demeure?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 42:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui est celui qui obscurcit mes desseins
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par des discours sans intelligence?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peux-tu les saisir à leur limite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et connaître les sentiers de leur habitation?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu le sais, car alors tu étais né,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le nombre de tes jours est grand!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Es-tu parvenu jusqu’aux amas de neige?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As-tu vu les dépôts de grêle,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que je tiens en réserve pour les temps de détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour les jours de guerre et de bataille?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par quel chemin la lumière se divise-t-elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le vent d’orient se répand-il sur la terre?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a ouvert un passage à la pluie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tracé la route de l’éclair et du tonnerre,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que la pluie tombe sur une terre sans habitants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur un désert où il n’y a point d’hommes;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 107:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Pour qu’elle abreuve les lieux solitaires et arides,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’elle fasse germer et sortir l’herbe?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La pluie a-t-elle un père?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui fait naître les gouttes de la rosée?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du sein de qui sort la glace,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui enfante le frimas du ciel,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceins tes reins comme un vaillant homme;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’interrogerai, et tu m’instruiras.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que les eaux se cachent comme une pierre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que la surface de l’abîme soit enchaînée?
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Noues-tu les liens '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 9:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 5:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: des Pléiades,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou détaches-tu les cordages de l’Orion?
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais-tu paraître en leur temps les signes du zodiaque,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et conduis-tu la Grande Ourse avec ses petits?
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 31:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Connais-tu les lois du ciel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Règles-tu son pouvoir sur la terre?
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Élèves-tu la voix jusqu’aux nuées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour appeler à toi des torrents d’eaux?
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lances-tu les éclairs?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Partent-ils?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Te disent-ils: Nous voici?'
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 32:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 2:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Da 1:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui a mis la sagesse dans le cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou qui a donné l’intelligence à l’esprit?
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui peut avec sagesse compter les nuages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et verser les outres des cieux,
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que la poussière se mette à ruisseler,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que les mottes de terre se collent ensemble?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Où étais-tu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 8:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: quand je fondais la terre?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dis-le, si tu as de l’intelligence.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui en a fixé les dimensions, le sais-tu?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou qui a étendu sur elle le cordeau?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur quoi ses bases sont-elles appuyées?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou qui en a posé la pierre angulaire,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors que les étoiles du matin éclataient en chants d’allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que tous les fils de Dieu poussaient des cris de joie?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 26:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 33:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 104:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 8:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 5:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui a fermé la mer avec des portes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand elle s’élança du sein maternel;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je fis de la nuée son vêtement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de l’obscurité ses langes;
