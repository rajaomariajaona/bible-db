document_id: REV.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le livre scellé de sept sceaux, remis à l’Agneau pour être ouvert
  - type: heading
    content: 'V. 1-14: cf. Ro 11:33, 34. Jn 5:22. Ph 2:5-11. Ép 1:10. Ap 1:5, 6; 7:9-12.'
  - type: text
    content: 'Puis je vis dans la main droite de celui qui était assis sur le trône '
  - type: note
    content: Éz 2:10.
  - type: text
    content: 'un livre écrit en dedans et en dehors, scellé de sept sceaux. '
  '10':
  - type: note
    content: Ex 19:6. 1 Pi 2:5, 9. Ap 1:6.
  - type: text
    content: 'tu as fait d’eux un royaume et des sacrificateurs pour notre Dieu, et ils régneront sur la terre. '
  '11':
  - type: text
    content: 'Je regardai, et j’entendis la voix de beaucoup d’anges autour du trône et des êtres vivants et des vieillards, et '
  - type: note
    content: Da 7:10. Hé 12:22.
  - type: text
    content: 'leur nombre était des myriades de myriades et des milliers de milliers. '
  '12':
  - type: text
    content: 'Ils disaient d’une voix forte: '
  - type: note
    content: Ap 4:11.
  - type: text
    content: 'L’agneau qui a été immolé est digne de recevoir la puissance, la richesse, la sagesse, la force, l’honneur, la gloire, et la louange. '
  '13':
  - type: text
    content: 'Et toutes les créatures qui sont dans le ciel, sur la terre, sous la terre, sur la mer, et tout ce qui s’y trouve, je les entendis qui disaient: A celui qui est assis sur le trône, et à l’agneau, soient la louange, l’honneur, la gloire, et la force, aux siècles des siècles! '
  '14':
  - type: text
    content: 'Et les quatre êtres vivants disaient: Amen!'
  - type: text
    content: Et les vieillards se prosternèrent et adorèrent.
  '2':
  - type: text
    content: 'Et je vis un ange puissant, qui criait d’une voix forte: '
  - type: note
    content: Ph 2:10.
  - type: text
    content: 'Qui est digne d’ouvrir le livre, et d’en rompre les sceaux? '
  '3':
  - type: text
    content: 'Et '
  - type: note
    content: Ap 5:13.
  - type: text
    content: 'personne dans le ciel, ni sur la terre, ni sous la terre, ne put ouvrir le livre ni le regarder. '
  '4':
  - type: text
    content: 'Et je pleurai beaucoup de ce que personne ne fut trouvé digne d’ouvrir le livre ni de le regarder. '
  '5':
  - type: text
    content: 'Et l’un des vieillards me dit: Ne pleure point; voici, '
  - type: note
    content: Ge 49:9, 10.
  - type: text
    content: 'le lion de la tribu de Juda, '
  - type: note
    content: És 11:10. Ro 15:12. Ap 22:16.
  - type: text
    content: 'le rejeton de David, a vaincu pour ouvrir le livre et ses sept sceaux. '
  '6':
  - type: text
    content: 'Et je vis, au milieu du trône et des quatre êtres vivants et au milieu des vieillards, un agneau qui était là comme immolé. Il avait sept cornes et '
  - type: note
    content: Za 3:9; 4:10.
  - type: text
    content: 'sept yeux, qui sont les '
  - type: note
    content: Ap 4:5.
  - type: text
    content: 'sept esprits de Dieu envoyés par toute la terre. '
  '7':
  - type: text
    content: 'Il vint, et il prit le livre de la main droite de celui qui était assis sur le trône. '
  '8':
  - type: text
    content: 'Quand il eut pris le livre, les quatre êtres vivants et les vingt-quatre vieillards se prosternèrent devant l’agneau, tenant chacun '
  - type: note
    content: Ap 14:2.
  - type: text
    content: 'une harpe et des coupes d’or remplies de parfums, qui sont '
  - type: note
    content: Ps 141:2.
  - type: text
    content: 'les prières des saints. '
  '9':
  - type: text
    content: 'Et ils chantaient '
  - type: note
    content: Ap 14:3.
  - type: text
    content: 'un cantique nouveau, en disant: '
  - type: note
    content: Ap 4:11.
  - type: text
    content: 'Tu es digne de prendre le livre, et d’en ouvrir les sceaux; car tu as été immolé, et '
  - type: note
    content: Ac 20:28. Ép 1:7. Col 1:14. Hé 9:12; 10:10. 1 Pi 1:19. 1 Jn 1:7.
  - type: text
    content: 'tu as racheté pour Dieu par ton sang des hommes de toute tribu, de toute langue, de tout peuple, et de toute nation; '
