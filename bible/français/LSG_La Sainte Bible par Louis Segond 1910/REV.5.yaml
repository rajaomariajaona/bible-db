document_id: REV.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le livre scellé de sept sceaux, remis à l’Agneau pour être ouvert
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-14: cf. Ro 11:33, 34. Jn 5:22. Ph 2:5-11. Ép 1:10. Ap 1:5, 6; 7:9-12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis je vis dans la main droite de celui qui était assis sur le trône '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 2:10
      metadata:
        usfm: EZK.2.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un livre écrit en dedans et en dehors, scellé de sept sceaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et je vis un ange puissant, qui criait d’une voix forte: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:10
      metadata:
        usfm: PHP.2.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Qui est digne d’ouvrir le livre, et d’en rompre les sceaux? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 5:13
      metadata:
        usfm: REV.5.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'personne dans le ciel, ni sur la terre, ni sous la terre, ne put ouvrir le livre ni le regarder. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et je pleurai beaucoup de ce que personne ne fut trouvé digne d’ouvrir le livre ni de le regarder. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et l’un des vieillards me dit: Ne pleure point; voici, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 49:9
      metadata:
        usfm: GEN.49.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: GEN.49.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le lion de la tribu de Juda, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 11:10
      metadata:
        usfm: ISA.11.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 15:12
      metadata:
        usfm: ROM.15.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 22:16
      metadata:
        usfm: REV.22.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le rejeton de David, a vaincu pour ouvrir le livre et ses sept sceaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et je vis, au milieu du trône et des quatre êtres vivants et au milieu des vieillards, un agneau qui était là comme immolé. Il avait sept cornes et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 3:9
      metadata:
        usfm: ZEC.3.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:10
      metadata:
        usfm: ZEC.4.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sept yeux, qui sont les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 4:5
      metadata:
        usfm: REV.4.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sept esprits de Dieu envoyés par toute la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il vint, et il prit le livre de la main droite de celui qui était assis sur le trône. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Quand il eut pris le livre, les quatre êtres vivants et les vingt-quatre vieillards se prosternèrent devant l’agneau, tenant chacun '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 14:2
      metadata:
        usfm: REV.14.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une harpe et des coupes d’or remplies de parfums, qui sont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 141:2
      metadata:
        usfm: PSA.141.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les prières des saints. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et ils chantaient '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 14:3
      metadata:
        usfm: REV.14.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un cantique nouveau, en disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 4:11
      metadata:
        usfm: REV.4.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu es digne de prendre le livre, et d’en ouvrir les sceaux; car tu as été immolé, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 20:28
      metadata:
        usfm: ACT.20.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:7
      metadata:
        usfm: EPH.1.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:14
      metadata:
        usfm: COL.1.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:12
      metadata:
        usfm: HEB.9.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:10
      metadata:
        usfm: HEB.10.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:19
      metadata:
        usfm: 1PE.1.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 1:7
      metadata:
        usfm: 1JN.1.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tu as racheté pour Dieu par ton sang des hommes de toute tribu, de toute langue, de tout peuple, et de toute nation; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 19:6
      metadata:
        usfm: EXO.19.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:5
      metadata:
        usfm: 1PE.2.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: 1PE.2.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:6
      metadata:
        usfm: REV.1.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tu as fait d’eux un royaume et des sacrificateurs pour notre Dieu, et ils régneront sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je regardai, et j’entendis la voix de beaucoup d’anges autour du trône et des êtres vivants et des vieillards, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 7:10
      metadata:
        usfm: DAN.7.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 12:22
      metadata:
        usfm: HEB.12.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'leur nombre était des myriades de myriades et des milliers de milliers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils disaient d’une voix forte: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 4:11
      metadata:
        usfm: REV.4.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’agneau qui a été immolé est digne de recevoir la puissance, la richesse, la sagesse, la force, l’honneur, la gloire, et la louange. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et toutes les créatures qui sont dans le ciel, sur la terre, sous la terre, sur la mer, et tout ce qui s’y trouve, je les entendis qui disaient: A celui qui est assis sur le trône, et à l’agneau, soient la louange, l’honneur, la gloire, et la force, aux siècles des siècles! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et les quatre êtres vivants disaient: Amen!'
- type: usfm
  marker: m
  children:
  - type: text
    text: Et les vieillards se prosternèrent et adorèrent.
