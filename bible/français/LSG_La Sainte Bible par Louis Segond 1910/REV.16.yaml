document_id: REV.16,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-21: cf. Ap 15; 8:6-13; 9. Ex 7 à 10.'
  - type: text
    content: 'Et j’entendis une voix forte qui venait du temple, et qui disait aux sept anges: Allez, et versez sur la terre les sept coupes de la colère de Dieu. '
  '10':
  - type: text
    content: 'Le cinquième versa sa coupe sur le trône de la bête. Et son royaume fut couvert de ténèbres; et les hommes se mordaient la langue de douleur, '
  '11':
  - type: text
    content: 'et ils blasphémèrent le Dieu du ciel, à cause de leurs douleurs et de leurs ulcères, et ils ne se repentirent pas de leurs œuvres. '
  '12':
  - type: text
    content: 'Le sixième versa sa coupe sur le grand fleuve, l’Euphrate. Et son eau tarit, afin que le chemin des rois venant de l’Orient fût préparé. '
  '13':
  - type: text
    content: 'Et je vis sortir de la bouche du dragon, et de la bouche de la bête, et de la bouche du faux prophète, trois esprits impurs, semblables à des grenouilles. '
  '14':
  - type: text
    content: 'Car ce sont des esprits de démons, qui '
  - type: note
    content: 2 Th 2:9. Ap 13:13; 19:20.
  - type: text
    content: 'font des prodiges, et qui vont vers les rois de toute la terre, afin de les rassembler '
  - type: note
    content: Ap 17:14; 19:19; 20:8.
  - type: text
    content: 'pour le combat du grand jour du Dieu tout-puissant. '
  '15':
  - type: text
    content: Voici, je viens
  - type: text
    content: ' '
  - type: note
    content: Mt 24:43. Lu 12:39. 1 Th 5:2. 2 Pi 3:10. Ap 3:3.
  - type: text
    content: comme un voleur. Heureux celui qui veille, et qui garde ses vêtements, afin qu’il ne marche pas
  - type: text
    content: ' '
  - type: note
    content: Ap 3:18.
  - type: text
    content: nu et qu’on ne voie pas sa honte!
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Ils les rassemblèrent dans le lieu appelé en hébreu Harmaguédon. '
  '17':
  - type: text
    content: 'Le septième versa sa coupe dans l’air. Et il sortit du temple, du trône, une voix forte qui disait: '
  - type: note
    content: Ap 21:6.
  - type: text
    content: 'C’en est fait! '
  '18':
  - type: text
    content: 'Et il y eut des éclairs, '
  - type: note
    content: Ap 4:5; 8:5.
  - type: text
    content: 'des voix, des tonnerres, et un grand tremblement de terre, tel qu’il n’y avait jamais eu depuis que l’homme est sur la terre, un aussi grand tremblement. '
  '19':
  - type: text
    content: 'Et '
  - type: note
    content: Ap 14:8.
  - type: text
    content: 'la grande ville fut divisée en trois parties, et les villes des nations tombèrent, et Dieu, '
  - type: note
    content: Ap 18:5.
  - type: text
    content: 'se souvint de Babylone la grande, pour lui donner '
  - type: note
    content: Jé 25:15. Ap 14:10.
  - type: text
    content: 'la coupe du vin de son ardente colère. '
  '2':
  - type: text
    content: 'Le premier alla, et il versa sa coupe sur la terre. Et un '
  - type: note
    content: Ex 9:9, 10, 11.
  - type: text
    content: 'ulcère malin et douloureux frappa les hommes qui avaient '
  - type: note
    content: Ap 13:16, 17.
  - type: text
    content: 'la marque de la bête et '
  - type: note
    content: Ap 13:14.
  - type: text
    content: 'qui adoraient son image. '
  '20':
  - type: text
    content: 'Et toutes les îles s’enfuirent, et les montagnes ne furent pas retrouvées. '
  '21':
  - type: text
    content: 'Et une grosse '
  - type: note
    content: Ap 11:19.
  - type: text
    content: 'grêle, dont les grêlons pesaient un talent, tomba du ciel sur les hommes; et les hommes '
  - type: note
    content: Ap 16:9, 11.
  - type: text
    content: blasphémèrent Dieu, à cause du fléau de la grêle, parce que ce fléau était très grand.
  '3':
  - type: text
    content: 'Le second versa sa coupe dans la mer. Et elle devint '
  - type: note
    content: Ex 7:20.
  - type: text
    content: 'du sang, comme celui d’un mort; et tout être vivant mourut, tout ce qui était dans la mer. '
  '4':
  - type: text
    content: 'Le troisième versa sa coupe dans les fleuves et dans les sources d’eaux. Et ils devinrent du sang. '
  '5':
  - type: text
    content: 'Et j’entendis l’ange des eaux qui disait: Tu es juste, toi '
  - type: note
    content: Ap 1:4, 8; 4:8; 11:17.
  - type: text
    content: 'qui es, et qui étais; tu es saint, parce que tu as exercé ce jugement. '
  '6':
  - type: text
    content: 'Car ils ont versé '
  - type: note
    content: Mt 23:24.
  - type: text
    content: 'le sang des saints et des prophètes, et tu leur as donné du sang à boire: ils en sont dignes. '
  '7':
  - type: text
    content: 'Et j’entendis '
  - type: note
    content: Ap 15:3.
  - type: text
    content: 'l’autel qui disait: Oui, Seigneur Dieu tout-puissant, tes jugements sont véritables et justes. '
  '8':
  - type: text
    content: 'Le quatrième versa sa coupe sur le soleil. Et il lui fut donné de brûler les hommes par le feu; '
  '9':
  - type: text
    content: 'et les hommes furent brûlés par une grande chaleur, et '
  - type: note
    content: Ap 16:11, 21.
  - type: text
    content: 'ils blasphémèrent le nom du Dieu qui a l’autorité sur ces fléaux, et ils ne se repentirent pas pour lui donner gloire. '
