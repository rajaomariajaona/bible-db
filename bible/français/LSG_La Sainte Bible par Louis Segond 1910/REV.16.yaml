document_id: REV.16
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-21: cf. Ap 15; 8:6-13; 9. Ex 7 à 10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Et j’entendis une voix forte qui venait du temple, et qui disait aux sept anges: Allez, et versez sur la terre les sept coupes de la colère de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le premier alla, et il versa sa coupe sur la terre. Et un '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 9:9
      metadata:
        usfm: EXO.9.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: EXO.9.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: EXO.9.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ulcère malin et douloureux frappa les hommes qui avaient '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 13:16
      metadata:
        usfm: REV.13.16
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '17'
      metadata:
        usfm: REV.13.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la marque de la bête et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 13:14
      metadata:
        usfm: REV.13.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui adoraient son image. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le second versa sa coupe dans la mer. Et elle devint '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 7:20
      metadata:
        usfm: EXO.7.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'du sang, comme celui d’un mort; et tout être vivant mourut, tout ce qui était dans la mer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le troisième versa sa coupe dans les fleuves et dans les sources d’eaux. Et ils devinrent du sang. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et j’entendis l’ange des eaux qui disait: Tu es juste, toi '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:4
      metadata:
        usfm: REV.1.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: REV.1.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:8
      metadata:
        usfm: REV.4.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:17
      metadata:
        usfm: REV.11.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui es, et qui étais; tu es saint, parce que tu as exercé ce jugement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Car ils ont versé '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 23:24
      metadata:
        usfm: MAT.23.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le sang des saints et des prophètes, et tu leur as donné du sang à boire: ils en sont dignes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et j’entendis '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 15:3
      metadata:
        usfm: REV.15.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’autel qui disait: Oui, Seigneur Dieu tout-puissant, tes jugements sont véritables et justes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le quatrième versa sa coupe sur le soleil. Et il lui fut donné de brûler les hommes par le feu; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et les hommes furent brûlés par une grande chaleur, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 16:11
      metadata:
        usfm: REV.16.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '21'
      metadata:
        usfm: REV.16.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ils blasphémèrent le nom du Dieu qui a l’autorité sur ces fléaux, et ils ne se repentirent pas pour lui donner gloire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le cinquième versa sa coupe sur le trône de la bête. Et son royaume fut couvert de ténèbres; et les hommes se mordaient la langue de douleur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'et ils blasphémèrent le Dieu du ciel, à cause de leurs douleurs et de leurs ulcères, et ils ne se repentirent pas de leurs œuvres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le sixième versa sa coupe sur le grand fleuve, l’Euphrate. Et son eau tarit, afin que le chemin des rois venant de l’Orient fût préparé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et je vis sortir de la bouche du dragon, et de la bouche de la bête, et de la bouche du faux prophète, trois esprits impurs, semblables à des grenouilles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Car ce sont des esprits de démons, qui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 2:9
      metadata:
        usfm: 2TH.2.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 13:13
      metadata:
        usfm: REV.13.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:20
      metadata:
        usfm: REV.19.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'font des prodiges, et qui vont vers les rois de toute la terre, afin de les rassembler '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 17:14
      metadata:
        usfm: REV.17.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:19
      metadata:
        usfm: REV.19.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:8
      metadata:
        usfm: REV.20.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour le combat du grand jour du Dieu tout-puissant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Voici, je viens
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 24:43
      metadata:
        usfm: MAT.24.43
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 12:39
      metadata:
        usfm: LUK.12.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:2
      metadata:
        usfm: 1TH.5.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 3:10
      metadata:
        usfm: 2PE.3.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 3:3
      metadata:
        usfm: REV.3.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: comme un voleur. Heureux celui qui veille, et qui garde ses vêtements, afin qu’il ne marche pas
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 3:18
      metadata:
        usfm: REV.3.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: nu et qu’on ne voie pas sa honte!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils les rassemblèrent dans le lieu appelé en hébreu Harmaguédon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le septième versa sa coupe dans l’air. Et il sortit du temple, du trône, une voix forte qui disait: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 21:6
      metadata:
        usfm: REV.21.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’en est fait! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et il y eut des éclairs, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 4:5
      metadata:
        usfm: REV.4.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:5
      metadata:
        usfm: REV.8.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des voix, des tonnerres, et un grand tremblement de terre, tel qu’il n’y avait jamais eu depuis que l’homme est sur la terre, un aussi grand tremblement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 14:8
      metadata:
        usfm: REV.14.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la grande ville fut divisée en trois parties, et les villes des nations tombèrent, et Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 18:5
      metadata:
        usfm: REV.18.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'se souvint de Babylone la grande, pour lui donner '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 25:15
      metadata:
        usfm: JER.25.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 14:10
      metadata:
        usfm: REV.14.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la coupe du vin de son ardente colère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Et toutes les îles s’enfuirent, et les montagnes ne furent pas retrouvées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et une grosse '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 11:19
      metadata:
        usfm: REV.11.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'grêle, dont les grêlons pesaient un talent, tomba du ciel sur les hommes; et les hommes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 16:9
      metadata:
        usfm: REV.16.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: REV.16.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: blasphémèrent Dieu, à cause du fléau de la grêle, parce que ce fléau était très grand.
