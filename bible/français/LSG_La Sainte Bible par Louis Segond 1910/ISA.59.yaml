document_id: ISA.59,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les crimes du peuple
  - type: heading
    content: 'V. 1-8: cf. És 50:1-3. (Mi 3:1-4, 9, 10; 6:12, 13. Jé 9:2-9.)'
  - type: text
    content: 'Non, '
  - type: note
    content: No 11:23. És 50:2.
  - type: text
    content: la main de l’Éternel n’est pas trop courte pour sauver,
  - type: text
    content: Ni son oreille trop dure pour entendre.
  '10':
  - type: text
    content: Nous tâtonnons comme des aveugles le long d’un mur,
  - type: text
    content: Nous tâtonnons comme ceux qui n’ont point d’yeux;
  - type: text
    content: Nous chancelons à midi comme de nuit,
  - type: text
    content: Au milieu de l’abondance nous ressemblons à des morts.
  '11':
  - type: text
    content: Nous grondons tous comme des ours,
  - type: text
    content: Nous gémissons comme des colombes;
  - type: text
    content: Nous attendons la délivrance, et elle n’est pas là,
  - type: text
    content: Le salut, et il est loin de nous.
  '12':
  - type: text
    content: Car nos transgressions sont nombreuses devant toi,
  - type: text
    content: Et nos péchés témoignent contre nous;
  - type: text
    content: Nos transgressions sont avec nous,
  - type: text
    content: Et nous connaissons nos crimes.
  '13':
  - type: text
    content: Nous avons été coupables et infidèles envers l’Éternel,
  - type: text
    content: Nous avons abandonné notre Dieu;
  - type: text
    content: Nous avons proféré la violence et la révolte,
  - type: text
    content: Conçu et médité dans le cœur des paroles de mensonge;
  '14':
  - type: text
    content: Et la délivrance s’est retirée,
  - type: text
    content: Et le salut se tient éloigné;
  - type: text
    content: Car la vérité trébuche sur la place publique,
  - type: text
    content: Et la droiture ne peut approcher.
  '15':
  - type: text
    content: La vérité a disparu,
  - type: text
    content: Et celui qui s’éloigne du mal est dépouillé.
  - type: heading
    content: 'V. 16-21: cf. (De 32:35-43. És 63:1-6.) Ro 11:25-27.'
  - type: text
    content: L’Éternel voit, d’un regard indigné,
  - type: text
    content: Qu’il n’y a plus de droiture.
  '16':
  - type: text
    content: ' '
  - type: note
    content: És 63:5.
  - type: text
    content: Il voit qu’il n’y a pas un homme,
  - type: text
    content: Il s’étonne de ce que personne n’intercède;
  - type: text
    content: Alors son bras lui vient en aide,
  - type: text
    content: Et sa justice lui sert d’appui.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ép 6:17. 1 Th 5:8.
  - type: text
    content: Il se revêt de la justice comme d’une cuirasse,
  - type: text
    content: Et il met sur sa tête le casque du salut;
  - type: text
    content: Il prend la vengeance pour vêtement,
  - type: text
    content: Et il se couvre de la jalousie comme d’un manteau.
  '18':
  - type: text
    content: Il rendra à chacun selon ses œuvres,
  - type: text
    content: La fureur à ses adversaires,
  - type: text
    content: La pareille à ses ennemis;
  - type: text
    content: Il rendra la pareille aux îles.
  '19':
  - type: text
    content: On craindra le nom de l’Éternel depuis l’occident,
  - type: text
    content: Et sa gloire depuis le soleil levant;
  - type: text
    content: Quand l’ennemi viendra comme un fleuve,
  - type: text
    content: L’esprit de l’Éternel le mettra en fuite.
  '2':
  - type: text
    content: Mais ce sont vos crimes qui mettent une séparation
  - type: text
    content: Entre vous et votre Dieu;
  - type: text
    content: Ce sont vos péchés qui vous cachent sa face
  - type: text
    content: Et l’empêchent de vous écouter.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ro 11:26.
  - type: text
    content: Un rédempteur viendra pour Sion,
  - type: text
    content: 'Pour ceux de Jacob '
  - type: note
    content: És 10:21, 22.
  - type: text
    content: qui se convertiront de leurs péchés,
  - type: text
    content: Dit l’Éternel.
  '21':
  - type: text
    content: 'Voici mon alliance avec eux, dit l’Éternel:'
  - type: text
    content: Mon esprit, qui repose sur toi,
  - type: text
    content: Et mes paroles, que j’ai mises dans ta bouche,
  - type: text
    content: Ne se retireront point de ta bouche, ni de la bouche de tes enfants,
  - type: text
    content: Ni de la bouche des enfants de tes enfants,
  - type: text
    content: Dit l’Éternel, dès maintenant et à jamais.
  '3':
  - type: text
    content: Car vos mains sont souillées de sang,
  - type: text
    content: Et vos doigts de crimes;
  - type: text
    content: Vos lèvres profèrent le mensonge,
  - type: text
    content: Votre langue fait entendre l’iniquité.
  '4':
  - type: text
    content: Nul ne se plaint avec justice,
  - type: text
    content: Nul ne plaide avec droiture;
  - type: text
    content: Ils s’appuient sur des choses vaines et disent des faussetés,
  - type: note
    content: Job 15:35. Ps 7:15.
  - type: text
    content: Ils conçoivent le mal et enfantent le crime.
  '5':
  - type: text
    content: Ils couvent des œufs de basilic,
  - type: text
    content: Et ils tissent des toiles d’araignée.
  - type: text
    content: Celui qui mange de leurs œufs meurt;
  - type: text
    content: Et, si l’on en brise un, il sort une vipère.
  '6':
  - type: text
    content: 'Leurs toiles '
  - type: note
    content: Job 8:14, 15.
  - type: text
    content: ne servent point à faire un vêtement,
  - type: text
    content: Et ils ne peuvent se couvrir de leur ouvrage;
  - type: text
    content: Leurs œuvres sont des œuvres d’iniquité,
  - type: text
    content: Et les actes de violence sont dans leurs mains.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Pr 1:16. Ro 3:15.
  - type: text
    content: Leurs pieds courent au mal,
  - type: text
    content: Et ils ont hâte de répandre le sang innocent;
  - type: text
    content: Leurs pensées sont des pensées d’iniquité,
  - type: text
    content: Le ravage et la ruine sont sur leur route.
  '8':
  - type: text
    content: Ils ne connaissent pas le chemin de la paix,
  - type: text
    content: Et il n’y a point de justice dans leurs voies;
  - type: text
    content: 'Ils prennent des sentiers détournés:'
  - type: text
    content: Quiconque y marche ne connaît point la paix.
  - type: heading
    content: 'V. 9-15: cf. (Mi 7:2-6. Esd 9:6, 7.)'
  '9':
  - type: text
    content: C’est pourquoi l’arrêt de délivrance est loin de nous,
  - type: text
    content: Et le salut ne nous atteint pas;
  - type: text
    content: Nous attendons la lumière, et voici les ténèbres,
  - type: text
    content: La clarté, et nous marchons dans l’obscurité.
