document_id: ISA.59
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les crimes du peuple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. És 50:1-3. (Mi 3:1-4, 9, 10; 6:12, 13. Jé 9:2-9.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Non, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 11:23
      metadata:
        usfm: NUM.11.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 50:2
      metadata:
        usfm: ISA.50.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: la main de l’Éternel n’est pas trop courte pour sauver,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni son oreille trop dure pour entendre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mais ce sont vos crimes qui mettent une séparation
- type: usfm
  marker: q1
  children:
  - type: text
    text: Entre vous et votre Dieu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce sont vos péchés qui vous cachent sa face
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’empêchent de vous écouter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car vos mains sont souillées de sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vos doigts de crimes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vos lèvres profèrent le mensonge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Votre langue fait entendre l’iniquité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nul ne se plaint avec justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nul ne plaide avec droiture;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils s’appuient sur des choses vaines et disent des faussetés,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 15:35
      metadata:
        usfm: JOB.15.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 7:15
      metadata:
        usfm: PSA.7.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils conçoivent le mal et enfantent le crime.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils couvent des œufs de basilic,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils tissent des toiles d’araignée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui mange de leurs œufs meurt;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et, si l’on en brise un, il sort une vipère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Leurs toiles '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 8:14
      metadata:
        usfm: JOB.8.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: JOB.8.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: ne servent point à faire un vêtement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils ne peuvent se couvrir de leur ouvrage;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs œuvres sont des œuvres d’iniquité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les actes de violence sont dans leurs mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 1:16
      metadata:
        usfm: PRO.1.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 3:15
      metadata:
        usfm: ROM.3.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Leurs pieds courent au mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils ont hâte de répandre le sang innocent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs pensées sont des pensées d’iniquité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le ravage et la ruine sont sur leur route.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils ne connaissent pas le chemin de la paix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il n’y a point de justice dans leurs voies;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils prennent des sentiers détournés:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quiconque y marche ne connaît point la paix.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-15: cf. (Mi 7:2-6. Esd 9:6, 7.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: C’est pourquoi l’arrêt de délivrance est loin de nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le salut ne nous atteint pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous attendons la lumière, et voici les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La clarté, et nous marchons dans l’obscurité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nous tâtonnons comme des aveugles le long d’un mur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous tâtonnons comme ceux qui n’ont point d’yeux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous chancelons à midi comme de nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au milieu de l’abondance nous ressemblons à des morts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nous grondons tous comme des ours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous gémissons comme des colombes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous attendons la délivrance, et elle n’est pas là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le salut, et il est loin de nous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Car nos transgressions sont nombreuses devant toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nos péchés témoignent contre nous;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nos transgressions sont avec nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nous connaissons nos crimes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nous avons été coupables et infidèles envers l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous avons abandonné notre Dieu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous avons proféré la violence et la révolte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Conçu et médité dans le cœur des paroles de mensonge;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Et la délivrance s’est retirée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le salut se tient éloigné;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car la vérité trébuche sur la place publique,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la droiture ne peut approcher.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La vérité a disparu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celui qui s’éloigne du mal est dépouillé.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-21: cf. (De 32:35-43. És 63:1-6.) Ro 11:25-27.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel voit, d’un regard indigné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il n’y a plus de droiture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 63:5
      metadata:
        usfm: ISA.63.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il voit qu’il n’y a pas un homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il s’étonne de ce que personne n’intercède;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors son bras lui vient en aide,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa justice lui sert d’appui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 6:17
      metadata:
        usfm: EPH.6.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:8
      metadata:
        usfm: 1TH.5.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il se revêt de la justice comme d’une cuirasse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il met sur sa tête le casque du salut;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il prend la vengeance pour vêtement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il se couvre de la jalousie comme d’un manteau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il rendra à chacun selon ses œuvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La fureur à ses adversaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La pareille à ses ennemis;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il rendra la pareille aux îles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: On craindra le nom de l’Éternel depuis l’occident,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa gloire depuis le soleil levant;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand l’ennemi viendra comme un fleuve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’esprit de l’Éternel le mettra en fuite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:26
      metadata:
        usfm: ROM.11.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Un rédempteur viendra pour Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pour ceux de Jacob '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 10:21
      metadata:
        usfm: ISA.10.21
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: ISA.10.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: qui se convertiront de leurs péchés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Voici mon alliance avec eux, dit l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon esprit, qui repose sur toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mes paroles, que j’ai mises dans ta bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne se retireront point de ta bouche, ni de la bouche de tes enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni de la bouche des enfants de tes enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel, dès maintenant et à jamais.
