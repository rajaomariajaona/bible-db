document_id: EZK.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vocation d’Ézéchiel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-28: cf. Éz 10. Ap 4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La trentième année, le cinquième jour du quatrième mois, comme j’étais parmi les captifs du fleuve du '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 137:1
      metadata:
        usfm: PSA.137.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Kebar, les cieux s’ouvrirent, et j’eus des visions divines. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le cinquième jour du mois, c’était la cinquième année de la captivité du roi Jojakin, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'la parole de l’Éternel fut adressée à Ézéchiel, fils de Buzi, le sacrificateur, dans le pays des Chaldéens, près du fleuve du Kebar; et c’est là que la main de l’Éternel fut sur lui. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je regardai, et voici, il vint du septentrion un vent impétueux, une grosse nuée, et une gerbe de feu, qui répandait de tous côtés une lumière éclatante, au centre de laquelle brillait comme de l’airain poli, sortant du milieu du feu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Au centre encore, apparaissaient quatre animaux, dont l’aspect avait une ressemblance humaine. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 10:14
      metadata:
        usfm: EZK.10.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Chacun d’eux avait quatre faces, et chacun avait quatre ailes. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Leurs pieds étaient droits, et la plante de leurs pieds était comme celle du pied d’un veau, ils étincelaient comme de l’airain poli. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils avaient des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 10:8
      metadata:
        usfm: EZK.10.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mains d’homme sous les ailes à leurs quatre côtés; et tous les quatre avaient leurs faces et leurs ailes. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Leurs ailes étaient jointes l’une à l’autre; ils ne se tournaient point en marchant, mais chacun marchait droit devant soi. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 10:14
      metadata:
        usfm: EZK.10.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 4:7
      metadata:
        usfm: REV.4.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quant à la figure de leurs faces, ils avaient tous une face d’homme, tous quatre une face de lion à droite, tous quatre une face de bœuf à gauche, et tous quatre une face d’aigle. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Leurs faces et leurs ailes étaient séparées par le haut; deux de leurs ailes étaient jointes l’une à l’autre, et deux couvraient leurs corps. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Chacun marchait droit devant soi; ils allaient où l’esprit les poussait à aller, et ils ne se tournaient point dans leur marche. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L’aspect de ces animaux ressemblait à des charbons de feu ardents, c’était comme l’aspect des flambeaux, et ce feu circulait entre les animaux; il jetait une lumière éclatante, et il en sortait des éclairs. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et les animaux couraient et revenaient comme la foudre. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Je regardais ces animaux; et voici, il y avait une roue sur la terre, près des animaux, devant leurs quatre faces. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 19:9
      metadata:
        usfm: EZK.19.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: EZK.19.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'A leur aspect et à leur structure, ces roues semblaient être en chrysolithe, et toutes les quatre avaient la même forme; leur aspect et leur structure étaient tels que chaque roue paraissait être au milieu d’une autre roue. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'En cheminant, elles allaient de leurs quatre côtés, et elles ne se tournaient point dans leur marche. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Elles avaient une circonférence et une hauteur effrayantes, et à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 10:12
      metadata:
        usfm: EZK.10.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'leur circonférence les quatre roues étaient remplies d’yeux tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 10:16
      metadata:
        usfm: EZK.10.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand les animaux marchaient, les roues cheminaient à côté d’eux; et quand les animaux s’élevaient de terre, les roues s’élevaient aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ils allaient où l’esprit les poussait à aller; et les roues s’élevaient avec eux, car l’esprit des animaux était dans les roues. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Quand ils marchaient, elles marchaient; quand ils s’arrêtaient, elles s’arrêtaient; quand ils s’élevaient de terre, les roues s’élevaient avec eux, car l’esprit des animaux était dans les roues. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Au-dessus des têtes des animaux, il y avait comme un ciel de cristal resplendissant, qui s’étendait sur leurs têtes dans le haut. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Sous ce ciel, leurs ailes étaient droites l’une contre l’autre, et ils en avaient chacun deux qui les couvraient, chacun deux qui couvraient leurs corps. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'J’entendis le bruit de leurs ailes, quand ils marchaient, pareil au bruit de grosses eaux, ou à la voix du Tout-Puissant; c’était un bruit tumultueux, comme celui d’une armée; quand ils s’arrêtaient, ils laissaient tomber leurs ailes. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Et il se faisait un bruit qui partait du ciel étendu sur leurs têtes, lorsqu’ils s’arrêtaient et laissaient tomber leurs ailes. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Au-dessus du ciel qui était sur leurs têtes, il y avait quelque chose de semblable à une pierre de saphir, en forme de trône; et sur cette forme de trône apparaissait comme une figure d’homme placé dessus en haut. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Je vis encore comme de l’airain poli, comme du feu, au-dedans duquel était cet homme, et qui rayonnait tout autour; depuis la forme de ses reins jusqu’en haut, et depuis la forme de ses reins jusqu’en bas, je vis comme du feu, et comme une lumière éclatante, dont il était environné. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tel l’aspect de l’arc qui est dans la nue en un jour de pluie, ainsi était l’aspect de cette lumière éclatante, qui l’entourait: c’était une image de la gloire de l’Éternel. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 10:9
      metadata:
        usfm: DAN.10.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: A cette vue, je tombai sur ma face, et j’entendis la voix de quelqu’un qui parlait.
