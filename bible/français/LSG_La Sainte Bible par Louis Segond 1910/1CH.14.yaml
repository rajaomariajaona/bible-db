document_id: 1CH.14,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Victoires de David sur les Philistins
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. 2 S 5:11-16. 1 Ch 3:1-9. Ex 33:16.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 5:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Hiram, roi de Tyr, envoya des messagers à David, et du bois de cèdre, et des tailleurs de pierres et des charpentiers, pour lui bâtir une maison. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David consulta Dieu, en disant: Monterai-je contre les Philistins, et les livreras-tu entre mes mains? Et l’Éternel lui dit: Monte, et je les livrerai entre tes mains. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils montèrent à Baal-Peratsim, où David les battit. Puis il dit: Dieu a dispersé mes ennemis par ma main, comme des eaux qui s’écoulent. C’est pourquoi l’on a donné à ce lieu le nom de Baal-Peratsim. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils laissèrent là leurs dieux, qui furent brûlés au feu d’après l’ordre de David. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Philistins se répandirent de nouveau dans la vallée. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David consulta encore Dieu. Et Dieu lui dit: Tu ne monteras pas après eux; détourne-toi d’eux, et tu arriveras sur eux vis-à-vis des mûriers. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand tu entendras un bruit de pas dans les cimes des mûriers, alors tu sortiras pour combattre, car c’est Dieu qui marche devant toi pour battre l’armée des Philistins. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David fit ce que Dieu lui avait ordonné, et l’armée des Philistins fut battue depuis Gabaon jusqu’à Guézer. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La renommée de David se répandit dans tous les pays, et l’Éternel le rendit redoutable à toutes les nations.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David reconnut que l’Éternel l’affermissait comme roi d’Israël, et que son royaume était haut élevé, à cause de son peuple d’Israël. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David prit encore des femmes à Jérusalem, et il engendra encore des fils et des filles. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 3:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Voici les noms de ceux qui lui naquirent à Jérusalem: Schammua, Schobab, Nathan, Salomon, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jibhar, Élischua, Elphéleth, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noga, Népheg, Japhia, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Élischama, Beéliada et Éliphéleth.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-17: cf. 2 S 5:17-25.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Philistins apprirent que David avait été oint pour roi sur tout Israël, et ils montèrent tous à sa recherche. David, qui en fut informé, sortit au-devant d’eux. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Philistins arrivèrent, et se répandirent dans la vallée des Rephaïm. '
