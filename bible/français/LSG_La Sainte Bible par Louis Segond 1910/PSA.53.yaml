document_id: PSA.53,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 14.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef des chantres. Sur la flûte. Cantique de David.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'L’insensé '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 10:4
      - type: text
        text: ; 14:1, etc.
      marker-yv: yv-n
    - type: text
      text: 'dit en son cœur: Il n’y a point de Dieu!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se sont corrompus, ils ont commis des iniquités abominables;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il n’en est aucun qui fasse le bien.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Dieu, du haut des cieux, regarde les fils de l’homme,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Pour voir s’il y a quelqu’un qui soit intelligent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui cherche Dieu.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tous sont égarés, tous sont pervertis;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’en est aucun qui fasse le bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pas même un seul.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ceux qui commettent l’iniquité ont-ils perdu le sens?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils dévorent mon peuple, ils le prennent pour nourriture;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n’invoquent point Dieu.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Alors ils trembleront d’épouvante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans qu’il y ait sujet d’épouvante;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu dispersera les os de ceux qui campent contre toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu les confondras, car Dieu les a rejetés.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Oh! Qui fera partir de Sion la délivrance d’Israël?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand Dieu ramènera les captifs de son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob sera dans l’allégresse, Israël se réjouira.
