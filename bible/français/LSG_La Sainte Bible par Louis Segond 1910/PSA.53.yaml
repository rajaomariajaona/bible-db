document_id: PSA.53,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 14.
  - type: text
    content: Au chef des chantres. Sur la flûte. Cantique de David.
  '2':
  - type: text
    content: 'L’insensé '
  - type: note
    content: Ps 10:4; 14:1, etc.
  - type: text
    content: 'dit en son cœur: Il n’y a point de Dieu!'
  - type: text
    content: Ils se sont corrompus, ils ont commis des iniquités abominables;
  - type: note
    content: Ro 3:12.
  - type: text
    content: Il n’en est aucun qui fasse le bien.
  '3':
  - type: text
    content: Dieu, du haut des cieux, regarde les fils de l’homme,
  - type: note
    content: Ro 3:11.
  - type: text
    content: Pour voir s’il y a quelqu’un qui soit intelligent,
  - type: text
    content: Qui cherche Dieu.
  '4':
  - type: text
    content: Tous sont égarés, tous sont pervertis;
  - type: text
    content: Il n’en est aucun qui fasse le bien,
  - type: text
    content: Pas même un seul.
  '5':
  - type: text
    content: Ceux qui commettent l’iniquité ont-ils perdu le sens?
  - type: text
    content: Ils dévorent mon peuple, ils le prennent pour nourriture;
  - type: text
    content: Ils n’invoquent point Dieu.
  '6':
  - type: text
    content: Alors ils trembleront d’épouvante,
  - type: text
    content: Sans qu’il y ait sujet d’épouvante;
  - type: text
    content: Dieu dispersera les os de ceux qui campent contre toi;
  - type: text
    content: Tu les confondras, car Dieu les a rejetés.
  '7':
  - type: text
    content: Oh! Qui fera partir de Sion la délivrance d’Israël?
  - type: text
    content: Quand Dieu ramènera les captifs de son peuple,
  - type: text
    content: Jacob sera dans l’allégresse, Israël se réjouira.
