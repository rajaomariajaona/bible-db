document_id: EZK.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Censures et promesses
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-26: cf. Né 9:9-28. Ps 106:1-40.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La septième année, le dixième jour du cinquième mois, quelques-uns des anciens d’Israël vinrent pour '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 14:3
      metadata:
        usfm: EZK.14.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'consulter l’Éternel, et s’assirent devant moi. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et la parole de l’Éternel me fut adressée, en ces mots: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fils de l’homme, parle aux anciens d’Israël, et dis-leur: Ainsi parle le Seigneur, l’Éternel: Est-ce pour me consulter que vous êtes venus? Je suis vivant! Je ne me laisserai pas consulter par vous, dit le Seigneur, l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Veux-tu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 22:2
      metadata:
        usfm: EZK.22.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:36
      metadata:
        usfm: EZK.23.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les juger, veux-tu les juger, fils de l’homme? Fais-leur connaître les abominations de leurs pères! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu leur diras: Ainsi parle le Seigneur, l’Éternel: Le jour où j’ai choisi Israël, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 6:7
      metadata:
        usfm: EXO.6.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'j’ai levé ma main vers la postérité de la maison de Jacob, et je me suis fait '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 3:8
      metadata:
        usfm: EXO.3.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:31
      metadata:
        usfm: EXO.4.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'connaître à eux dans le pays d’Égypte; j’ai levé ma main vers eux, en disant: Je suis l’Éternel, votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En ce jour-là, j’ai levé ma main vers eux, pour les faire passer du pays d’Égypte dans un pays que j’avais cherché pour eux, pays où coulent le lait et le miel, le plus beau de tous les pays. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je leur dis: Rejetez chacun les abominations qui attirent vos regards, et ne vous souillez pas par les idoles de l’Égypte! Je suis l’Éternel, votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et ils se révoltèrent contre moi, et ils ne voulurent pas m’écouter. Aucun ne rejeta les abominations qui attiraient ses regards, et ils n’abandonnèrent point les idoles de l’Égypte. J’eus la pensée de répandre ma fureur sur eux, d’épuiser contre eux ma colère, au milieu du pays d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Néanmoins j’ai agi par égard pour mon nom, afin qu’il ne soit pas profané aux yeux des nations parmi lesquelles ils se trouvaient, et aux yeux desquelles je m’étais fait connaître à eux, pour les faire sortir du pays d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et je les fis sortir du pays '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:18
      metadata:
        usfm: EXO.13.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'd’Égypte, et je les conduisis dans le désert. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je leur donnai mes lois et leur fis connaître mes ordonnances, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 18:5
      metadata:
        usfm: LEV.18.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 10:5
      metadata:
        usfm: ROM.10.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:12
      metadata:
        usfm: GAL.3.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que l’homme doit mettre en pratique, afin de vivre par elles. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je leur donnai aussi mes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:8
      metadata:
        usfm: EXO.20.8
    - type: text
      text: '; 31:13, etc.; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 35:2
      metadata:
        usfm: EXO.35.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sabbats comme un signe entre moi et eux, pour qu’ils connussent que je suis l’Éternel qui les sanctifie. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et la maison d’Israël se révolta contre moi dans le désert. Ils ne suivirent point mes lois, et ils rejetèrent mes ordonnances, que l’homme doit mettre en pratique, afin de vivre par elles, et ils '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 16:28
      metadata:
        usfm: EXO.16.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'profanèrent à l’excès mes sabbats. J’eus la pensée de répandre sur eux ma fureur dans le désert, pour les anéantir. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Néanmoins j’ai agi par égard pour mon nom, afin qu’il ne soit pas profané aux yeux des nations en présence desquelles je les avais fait sortir d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dans le désert, je levai ma main vers eux, pour ne pas les conduire dans le pays que je leur avais destiné, pays où coulent le lait et le miel, le plus beau de tous les pays, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et cela parce qu’ils rejetèrent mes ordonnances et ne suivirent point mes lois, et parce qu’ils profanèrent mes sabbats, car leur cœur ne s’éloigna pas de leurs idoles. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais j’eus pour eux un regard de pitié et je ne les détruisis pas, je ne les exterminai pas dans le désert. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je dis à leurs fils dans le désert: Ne suivez pas les préceptes de vos pères, n’observez pas leurs coutumes, et ne vous souillez pas par leurs idoles! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Je suis l’Éternel, votre Dieu. Suivez mes préceptes, observez mes ordonnances, et mettez-les en pratique. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Sanctifiez mes sabbats, et qu’ils soient entre moi et vous un signe auquel on connaisse que je suis l’Éternel, votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et les fils se révoltèrent contre moi. Ils ne suivirent point mes préceptes, ils n’observèrent point et n’exécutèrent point mes ordonnances, que l’homme doit mettre en pratique, afin de vivre par elles, et ils profanèrent mes sabbats. J’eus la pensée de répandre sur eux ma fureur, d’épuiser contre eux ma colère dans le désert. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Néanmoins j’ai retiré ma main, et j’ai agi par égard pour mon nom, afin qu’il ne fût pas profané aux yeux des nations en présence desquelles je les avais fait sortir d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dans le désert, je levai encore ma main vers eux, pour les disperser parmi les nations et les répandre en divers pays, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'parce qu’ils ne mirent pas en pratique mes ordonnances, parce qu’ils rejetèrent mes préceptes, profanèrent mes sabbats, et tournèrent leurs yeux vers les idoles de leurs pères. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Je leur donnai aussi des préceptes qui n’étaient pas bons, et des ordonnances par lesquelles ils ne pouvaient vivre. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Je les souillai par leurs offrandes, quand ils faisaient passer par le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 16:21
      metadata:
        usfm: EZK.16.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: feu tous leurs premiers-nés; je voulus ainsi les punir, et leur faire connaître que je suis l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 27-38: cf. 2 R 17:7-20. Os 2:7-17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'C’est pourquoi parle à la maison d’Israël, fils de l’homme, et dis-leur: Ainsi parle le Seigneur, l’Éternel: Vos pères m’ont encore outragé, en se montrant infidèles à mon égard. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Je les ai conduits dans le pays que j’avais juré de leur donner, et ils ont jeté les yeux sur toute colline élevée et sur tout arbre touffu; là ils ont fait leurs sacrifices, ils ont présenté leurs offrandes qui m’irritaient, ils ont brûlé leurs parfums d’une agréable odeur, et ils ont répandu leurs libations. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Je leur dis: Qu’est-ce que ces hauts lieux où vous vous rendez? Et le nom de hauts lieux leur a été donné jusqu’à ce jour. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'C’est pourquoi dis à la maison d’Israël: Ainsi parle le Seigneur, l’Éternel: Ne vous souillez-vous pas à la manière de vos pères, et ne vous prostituez-vous pas à leurs abominations? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'En présentant vos offrandes, en faisant passer vos enfants par le feu, vous vous souillez encore aujourd’hui par toutes vos idoles. Et moi, je me laisserais consulter par vous, maison d’Israël! Je suis vivant! Dit le Seigneur, l’Éternel, je ne me laisserai pas consulter par vous. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'On ne verra pas s’accomplir ce que vous imaginez, quand vous dites: Nous voulons être comme les nations, comme les familles des autres pays, nous voulons servir le bois et la pierre. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Je suis vivant! Dit le Seigneur, l’Éternel, je régnerai sur vous, à main forte et à bras étendu, et en répandant ma fureur. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Je vous ferai sortir du milieu des peuples, et je vous rassemblerai des pays où vous êtes dispersés, à main forte et à bras étendu, et en répandant ma fureur. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Je vous amènerai dans le désert des peuples, et là je vous jugerai face à face. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Comme je suis entré en jugement avec vos pères dans le désert du pays d’Égypte, ainsi j’entrerai en jugement avec vous, dit le Seigneur, l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Je vous ferai passer sous la verge, et je vous mettrai dans les liens de l’alliance. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Je séparerai de vous les rebelles et ceux qui me sont infidèles; je les tirerai du pays où ils sont étrangers, mais ils n’iront pas au pays d’Israël. Et vous saurez que je suis l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 39-44: cf. Éz 11:17-20; 36:22-32.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Et vous, maison d’Israël, ainsi parle le Seigneur, l’Éternel: Allez chacun servir vos idoles! Mais après cela, vous m’écouterez, et vous ne profanerez plus mon saint nom par vos offrandes et par vos idoles. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Car sur ma montagne sainte, sur la haute montagne d’Israël, dit le Seigneur, l’Éternel, là toute la maison d’Israël, tous ceux qui seront dans le pays me serviront; là je les recevrai favorablement, je rechercherai vos offrandes, les prémices de vos dons, et tout ce que vous me consacrerez. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Je vous recevrai comme un parfum d’une agréable odeur, quand je vous aurai fait sortir du milieu des peuples, et rassemblés des pays où vous êtes dispersés; et je serai sanctifié par vous aux yeux des nations. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Et vous saurez que je suis l’Éternel, quand je vous ramènerai dans le pays d’Israël, dans le pays que j’avais juré de donner à vos pères. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Là vous vous souviendrez de votre conduite et de toutes vos actions par lesquelles vous vous êtes souillés; vous vous prendrez vous-mêmes en dégoût, à cause de toutes les infamies que vous avez commises. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Et vous saurez que je suis l’Éternel, quand j’agirai avec vous par égard pour mon nom, et nullement d’après votre conduite mauvaise et vos actions corrompues, ô maison d’Israël! Dit le Seigneur, l’Éternel.
