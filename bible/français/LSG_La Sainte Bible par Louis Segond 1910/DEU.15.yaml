document_id: DEU.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: L’année de relâche, les indigents, les esclaves. Les premiers-nés des animaux
  - type: heading
    content: 'V. 1-11: cf. (Ex 23:10, 11. Lé 25:1-7.) (Lé 25:35-38. Lu 6:34-36.)'
  - type: text
    content: ' '
  - type: note
    content: Ex 21:2. Jé 34:14.
  - type: text
    content: 'Tous les sept ans, tu feras relâche. '
  '10':
  - type: note
    content: Mt 5:42. Lu 6:35.
  - type: text
    content: 'Donne-lui, et que ton cœur ne lui donne point à regret; car, à cause de cela, l’Éternel, ton Dieu, te bénira dans tous tes travaux et dans toutes tes entreprises. '
  '11':
  - type: text
    content: 'Il y aura toujours '
  - type: note
    content: Mt 26:11. Jn 12:8.
  - type: text
    content: 'des indigents dans le pays; c’est pourquoi je te donne ce commandement: Tu ouvriras ta main à ton frère, au pauvre et à l’indigent dans ton pays.'
  - type: heading
    content: 'V. 12-18: cf. (Ex 21:1-6. Jé 34:8-17.)'
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ex 21:2. Jé 34:14.
  - type: text
    content: 'Si l’un de tes frères hébreux, homme ou femme, se vend à toi, il te servira six années; mais la septième année, tu le renverras libre de chez toi. '
  '13':
  - type: text
    content: 'Et lorsque tu le renverras libre de chez toi, tu ne le renverras point à vide; '
  '14':
  - type: text
    content: 'tu lui feras des présents de ton menu bétail, de ton aire, de ton pressoir, de ce que tu auras par la bénédiction de l’Éternel, ton Dieu. '
  '15':
  - type: text
    content: 'Tu te souviendras que tu as été esclave au pays d’Égypte, et que l’Éternel, ton Dieu, t’a racheté; c’est pourquoi je te donne aujourd’hui ce commandement. '
  '16':
  - type: text
    content: 'Si ton esclave te dit: Je ne veux pas sortir de chez toi, parce qu’il t’aime, toi et ta maison, et qu’il se trouve bien chez toi, '
  '17':
  - type: text
    content: 'alors tu prendras '
  - type: note
    content: Ex 21:6.
  - type: text
    content: 'un poinçon et tu lui perceras l’oreille contre la porte, et il sera pour toujours ton esclave. Tu feras de même pour ta servante. '
  '18':
  - type: text
    content: Tu ne trouveras point dur de le renvoyer libre de chez toi, car il t’a servi six ans, ce qui vaut le double du salaire d’un mercenaire; et l’Éternel, ton Dieu, te bénira dans tout ce que tu feras.
  - type: heading
    content: 'V. 19-23: cf. Ex 13:11-16. De 12:5-7.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: Ex 13:2; 22:29; 34:19. Lé 27:26. No 3:13.
  - type: text
    content: 'Tu consacreras à l’Éternel, ton Dieu, tout premier-né mâle qui naîtra dans ton gros et dans ton menu bétail. Tu ne travailleras point avec le premier-né de ton bœuf, et tu ne tondras point le premier-né de tes brebis. '
  '2':
  - type: text
    content: 'Et voici comment s’observera le relâche. Quand on aura publié le relâche en l’honneur de l’Éternel, tout créancier qui aura fait un prêt à son prochain se relâchera de son droit, il ne pressera pas son prochain et son frère pour le paiement de sa dette. '
  '20':
  - type: text
    content: 'Tu le mangeras chaque année, toi et ta famille, devant l’Éternel, ton Dieu, dans le lieu qu’il choisira. '
  '21':
  - type: note
    content: Lé 22:10. De 17:1.
  - type: text
    content: 'S’il a quelque défaut, s’il est boiteux ou aveugle, ou s’il a quelque autre difformité, tu ne l’offriras point en sacrifice à l’Éternel, ton Dieu. '
  '22':
  - type: text
    content: 'Tu le mangeras dans tes portes; celui qui sera impur et celui qui sera pur en mangeront l’un et l’autre, comme on mange de la gazelle et du cerf. '
  '23':
  - type: note
    content: De 12:16, 23.
  - type: text
    content: Seulement, tu n’en mangeras pas le sang; tu le répandras sur la terre comme de l’eau.
  '3':
  - type: text
    content: 'Tu pourras presser l’étranger; mais tu te relâcheras de ton droit pour ce qui t’appartiendra chez ton frère. '
  '4':
  - type: text
    content: 'Toutefois, il n’y aura point d’indigent chez toi, car l’Éternel te bénira dans le pays que l’Éternel, ton Dieu, te fera posséder en héritage, '
  '5':
  - type: text
    content: 'pourvu seulement que tu obéisses à la voix de l’Éternel, ton Dieu, en mettant soigneusement en pratique tous ces commandements que je te prescris aujourd’hui. '
  '6':
  - type: text
    content: 'L’Éternel, ton Dieu, te bénira comme il te l’a dit, '
  - type: note
    content: De 28:12.
  - type: text
    content: 'tu prêteras à beaucoup de nations, et tu n’emprunteras point; tu domineras sur beaucoup de nations, et elles ne domineront point sur toi. '
  '7':
  - type: text
    content: 'S’il y a chez toi quelque indigent d’entre tes frères, dans l’une de tes portes, au pays que l’Éternel, ton Dieu, te donne, tu n’endurciras point ton cœur et tu ne fermeras point ta main devant ton frère indigent. '
  '8':
  - type: text
    content: 'Mais tu lui ouvriras ta main, et tu lui prêteras de quoi pourvoir à ses besoins. '
  '9':
  - type: text
    content: 'Garde-toi d’être assez méchant pour dire en ton cœur: La septième année, l’année du relâche, approche! Garde-toi d’avoir un œil sans pitié pour ton frère indigent et de lui faire un refus. Il crierait à l’Éternel contre toi, et tu te chargerais d’un péché. '
