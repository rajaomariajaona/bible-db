  children:
  - type: text
    text: L’année de relâche, les indigents, les esclaves. Les premiers-nés des animaux
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. (Ex 23:10, 11. Lé 25:1-7.) (Lé 25:35-38. Lu 6:34-36.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 21:2
      metadata:
        usfm: EXO.21.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 34:14
      metadata:
        usfm: JER.34.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tous les sept ans, tu feras relâche. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et voici comment s’observera le relâche. Quand on aura publié le relâche en l’honneur de l’Éternel, tout créancier qui aura fait un prêt à son prochain se relâchera de son droit, il ne pressera pas son prochain et son frère pour le paiement de sa dette. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu pourras presser l’étranger; mais tu te relâcheras de ton droit pour ce qui t’appartiendra chez ton frère. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Toutefois, il n’y aura point d’indigent chez toi, car l’Éternel te bénira dans le pays que l’Éternel, ton Dieu, te fera posséder en héritage, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'pourvu seulement que tu obéisses à la voix de l’Éternel, ton Dieu, en mettant soigneusement en pratique tous ces commandements que je te prescris aujourd’hui. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L’Éternel, ton Dieu, te bénira comme il te l’a dit, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:12
      metadata:
        usfm: DEU.28.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tu prêteras à beaucoup de nations, et tu n’emprunteras point; tu domineras sur beaucoup de nations, et elles ne domineront point sur toi. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'S’il y a chez toi quelque indigent d’entre tes frères, dans l’une de tes portes, au pays que l’Éternel, ton Dieu, te donne, tu n’endurciras point ton cœur et tu ne fermeras point ta main devant ton frère indigent. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais tu lui ouvriras ta main, et tu lui prêteras de quoi pourvoir à ses besoins. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Garde-toi d’être assez méchant pour dire en ton cœur: La septième année, l’année du relâche, approche! Garde-toi d’avoir un œil sans pitié pour ton frère indigent et de lui faire un refus. Il crierait à l’Éternel contre toi, et tu te chargerais d’un péché. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:42
      metadata:
        usfm: MAT.5.42
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 6:35
      metadata:
        usfm: LUK.6.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Donne-lui, et que ton cœur ne lui donne point à regret; car, à cause de cela, l’Éternel, ton Dieu, te bénira dans tous tes travaux et dans toutes tes entreprises. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il y aura toujours '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:11
      metadata:
        usfm: MAT.26.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:8
      metadata:
        usfm: JHN.12.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des indigents dans le pays; c’est pourquoi je te donne ce commandement: Tu ouvriras ta main à ton frère, au pauvre et à l’indigent dans ton pays.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-18: cf. (Ex 21:1-6. Jé 34:8-17.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 21:2
      metadata:
        usfm: EXO.21.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 34:14
      metadata:
        usfm: JER.34.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si l’un de tes frères hébreux, homme ou femme, se vend à toi, il te servira six années; mais la septième année, tu le renverras libre de chez toi. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et lorsque tu le renverras libre de chez toi, tu ne le renverras point à vide; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'tu lui feras des présents de ton menu bétail, de ton aire, de ton pressoir, de ce que tu auras par la bénédiction de l’Éternel, ton Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu te souviendras que tu as été esclave au pays d’Égypte, et que l’Éternel, ton Dieu, t’a racheté; c’est pourquoi je te donne aujourd’hui ce commandement. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Si ton esclave te dit: Je ne veux pas sortir de chez toi, parce qu’il t’aime, toi et ta maison, et qu’il se trouve bien chez toi, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'alors tu prendras '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 21:6
      metadata:
        usfm: EXO.21.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un poinçon et tu lui perceras l’oreille contre la porte, et il sera pour toujours ton esclave. Tu feras de même pour ta servante. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tu ne trouveras point dur de le renvoyer libre de chez toi, car il t’a servi six ans, ce qui vaut le double du salaire d’un mercenaire; et l’Éternel, ton Dieu, te bénira dans tout ce que tu feras.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 19-23: cf. Ex 13:11-16. De 12:5-7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:2
      metadata:
        usfm: EXO.13.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:29
      metadata:
        usfm: EXO.22.29
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:19
      metadata:
        usfm: EXO.34.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 27:26
      metadata:
        usfm: LEV.27.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 3:13
      metadata:
        usfm: NUM.3.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu consacreras à l’Éternel, ton Dieu, tout premier-né mâle qui naîtra dans ton gros et dans ton menu bétail. Tu ne travailleras point avec le premier-né de ton bœuf, et tu ne tondras point le premier-né de tes brebis. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tu le mangeras chaque année, toi et ta famille, devant l’Éternel, ton Dieu, dans le lieu qu’il choisira. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 22:10
      metadata:
        usfm: LEV.22.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 17:1
      metadata:
        usfm: DEU.17.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'S’il a quelque défaut, s’il est boiteux ou aveugle, ou s’il a quelque autre difformité, tu ne l’offriras point en sacrifice à l’Éternel, ton Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu le mangeras dans tes portes; celui qui sera impur et celui qui sera pur en mangeront l’un et l’autre, comme on mange de la gazelle et du cerf. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 12:16
      metadata:
        usfm: DEU.12.16
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '23'
      metadata:
        usfm: DEU.12.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Seulement, tu n’en mangeras pas le sang; tu le répandras sur la terre comme de l’eau.
