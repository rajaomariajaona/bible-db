document_id: JER.42,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérémie s’oppose aux Juifs qui veulent se retirer en Égypte
  - type: heading
    content: 'V. 1-6: cf. Jé 41:16-18. Ps 78:34-37. És 48:1. Mt 7:21.'
  - type: text
    content: 'Tous les chefs des troupes, Jochanan, fils de Karéach, Jezania, fils d’Hosée, et tout le peuple, depuis le plus petit jusqu’au plus grand, s’avancèrent, '
  '10':
  - type: text
    content: 'Si vous restez dans ce pays, je vous y '
  - type: note
    content: Jé 24:6; 31:4; 33:7.
  - type: text
    content: 'établirai et je ne vous détruirai pas, je vous planterai et je ne vous arracherai pas; car je me repens du mal que je vous ai fait. '
  '11':
  - type: text
    content: 'Ne craignez pas le roi de Babylone, dont vous avez peur; ne le craignez pas, dit l’Éternel, car je suis avec vous pour vous sauver et vous délivrer de sa main; '
  '12':
  - type: text
    content: 'je lui inspirerai de la compassion pour vous, et il aura pitié de vous, et il vous laissera demeurer dans votre pays. '
  '13':
  - type: text
    content: 'Mais si vous n’obéissez pas à la voix de l’Éternel, votre Dieu, '
  '14':
  - type: text
    content: 'et si vous dites: Nous ne resterons pas dans ce pays, non, nous irons au pays d’Égypte, où nous ne verrons point de guerre, où nous n’entendrons pas le son de la trompette, où nous ne manquerons pas de pain, et c’est là que nous habiterons, '
  '15':
  - type: text
    content: 'alors écoutez la parole de l’Éternel, restes de Juda! Ainsi parle l’Éternel des armées, le Dieu d’Israël: Si vous tournez le visage pour aller en Égypte, si vous y allez demeurer, '
  '16':
  - type: text
    content: 'l’épée que vous redoutez vous atteindra là au pays d’Égypte, la famine que vous craignez s’attachera à vous là en Égypte, et vous y mourrez. '
  '17':
  - type: text
    content: 'Tous ceux qui tourneront le visage pour aller en Égypte, afin d’y demeurer, mourront par l’épée, par la famine ou par la peste, et nul n’échappera, ne fuira, devant les malheurs que je ferai venir sur eux. '
  '18':
  - type: text
    content: 'Car ainsi parle l’Éternel des armées, le Dieu d’Israël: De même que ma colère et ma fureur se sont '
  - type: note
    content: Jé 7:20.
  - type: text
    content: 'répandues sur les habitants de Jérusalem, de même ma fureur se répandra sur vous, si vous allez en Égypte; vous serez un sujet '
  - type: note
    content: És 65:15.
  - type: text
    content: 'd’exécration, '
  - type: note
    content: Jé 18:16; 19:8; 25:9; 29:18.
  - type: text
    content: 'd’épouvante, '
  - type: note
    content: Jé 24:9; 25:18; 26:6; 29:18.
  - type: text
    content: 'de malédiction et '
  - type: note
    content: Jé 24:9; 29:18.
  - type: text
    content: 'd’opprobre, et vous ne verrez plus ce lieu. '
  '19':
  - type: text
    content: 'Restes de Juda, l’Éternel vous dit: N’allez pas en Égypte! Sachez que je vous le défends aujourd’hui. '
  '2':
  - type: text
    content: 'et dirent à Jérémie, le prophète: Que nos supplications soient favorablement reçues devant toi! Intercède en notre faveur auprès de l’Éternel, ton Dieu, en faveur de tous ceux qui restent, car nous étions beaucoup, et nous restons en petit nombre, comme tes yeux le voient; '
  '20':
  - type: text
    content: 'Vous vous trompez vous-mêmes, car vous m’avez envoyé vers l’Éternel, votre Dieu, en disant: Intercède en notre faveur auprès de l’Éternel, notre Dieu, fais-nous connaître tout ce que l’Éternel, notre Dieu, dira, et nous le ferons. '
  '21':
  - type: text
    content: 'Je vous l’ai déclaré aujourd’hui; mais vous n’écoutez pas la voix de l’Éternel, votre Dieu, ni tout ce qu’il m’a chargé de vous dire. '
  '22':
  - type: text
    content: Sachez maintenant que vous mourrez par l’épée, par la famine ou par la peste, dans le lieu où vous voulez aller pour y demeurer.
  '3':
  - type: text
    content: 'et que l’Éternel, ton Dieu, nous montre le chemin que nous devons suivre, et ce que nous avons à faire! '
  '4':
  - type: text
    content: 'Jérémie, le prophète, leur dit: J’entends; voici je vais prier l’Éternel, votre Dieu, selon votre demande; et je vous ferai connaître, sans rien vous cacher, tout ce que l’Éternel vous répondra. '
  '5':
  - type: text
    content: 'Et ils dirent à Jérémie: Que l’Éternel soit contre nous un témoin véritable et fidèle, si nous ne faisons pas tout ce que l’Éternel, ton Dieu, te chargera de nous dire! '
  '6':
  - type: text
    content: 'Que ce soit du bien ou du mal, nous obéirons à la voix de l’Éternel, notre Dieu, vers qui nous t’envoyons, '
  - type: note
    content: Jé 7:23.
  - type: text
    content: afin que nous soyons heureux, si nous obéissons à la voix de l’Éternel, notre Dieu.
  - type: heading
    content: 'V. 7-22: cf. Jé 43:1-7; 44; 24:8-10. És 30:15, 16.'
  '7':
  - type: text
    content: 'Dix jours après, la parole de l’Éternel fut adressée à Jérémie. '
  '8':
  - type: text
    content: 'Et Jérémie appela Jochanan, fils de Karéach, tous les chefs des troupes qui étaient avec lui, et tout le peuple, depuis le plus petit jusqu’au plus grand. '
  '9':
  - type: text
    content: 'Il leur dit: Ainsi parle l’Éternel, le Dieu d’Israël, vers qui vous m’avez envoyé, pour que je lui présente vos supplications: '
