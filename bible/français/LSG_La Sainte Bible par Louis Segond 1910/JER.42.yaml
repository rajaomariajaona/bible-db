document_id: JER.42,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jérémie s’oppose aux Juifs qui veulent se retirer en Égypte
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. Jé 41:16-18. Ps 78:34-37. És 48:1. Mt 7:21.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tous les chefs des troupes, Jochanan, fils de Karéach, Jezania, fils d’Hosée, et tout le peuple, depuis le plus petit jusqu’au plus grand, s’avancèrent, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Si vous restez dans ce pays, je vous y '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 24:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'établirai et je ne vous détruirai pas, je vous planterai et je ne vous arracherai pas; car je me repens du mal que je vous ai fait. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ne craignez pas le roi de Babylone, dont vous avez peur; ne le craignez pas, dit l’Éternel, car je suis avec vous pour vous sauver et vous délivrer de sa main; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'je lui inspirerai de la compassion pour vous, et il aura pitié de vous, et il vous laissera demeurer dans votre pays. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mais si vous n’obéissez pas à la voix de l’Éternel, votre Dieu, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'et si vous dites: Nous ne resterons pas dans ce pays, non, nous irons au pays d’Égypte, où nous ne verrons point de guerre, où nous n’entendrons pas le son de la trompette, où nous ne manquerons pas de pain, et c’est là que nous habiterons, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'alors écoutez la parole de l’Éternel, restes de Juda! Ainsi parle l’Éternel des armées, le Dieu d’Israël: Si vous tournez le visage pour aller en Égypte, si vous y allez demeurer, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'l’épée que vous redoutez vous atteindra là au pays d’Égypte, la famine que vous craignez s’attachera à vous là en Égypte, et vous y mourrez. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tous ceux qui tourneront le visage pour aller en Égypte, afin d’y demeurer, mourront par l’épée, par la famine ou par la peste, et nul n’échappera, ne fuira, devant les malheurs que je ferai venir sur eux. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Car ainsi parle l’Éternel des armées, le Dieu d’Israël: De même que ma colère et ma fureur se sont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 7:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'répandues sur les habitants de Jérusalem, de même ma fureur se répandra sur vous, si vous allez en Égypte; vous serez un sujet '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 65:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’exécration, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 18:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’épouvante, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 24:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'de malédiction et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 24:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’opprobre, et vous ne verrez plus ce lieu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Restes de Juda, l’Éternel vous dit: N’allez pas en Égypte! Sachez que je vous le défends aujourd’hui. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'et dirent à Jérémie, le prophète: Que nos supplications soient favorablement reçues devant toi! Intercède en notre faveur auprès de l’Éternel, ton Dieu, en faveur de tous ceux qui restent, car nous étions beaucoup, et nous restons en petit nombre, comme tes yeux le voient; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Vous vous trompez vous-mêmes, car vous m’avez envoyé vers l’Éternel, votre Dieu, en disant: Intercède en notre faveur auprès de l’Éternel, notre Dieu, fais-nous connaître tout ce que l’Éternel, notre Dieu, dira, et nous le ferons. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Je vous l’ai déclaré aujourd’hui; mais vous n’écoutez pas la voix de l’Éternel, votre Dieu, ni tout ce qu’il m’a chargé de vous dire. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Sachez maintenant que vous mourrez par l’épée, par la famine ou par la peste, dans le lieu où vous voulez aller pour y demeurer.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'et que l’Éternel, ton Dieu, nous montre le chemin que nous devons suivre, et ce que nous avons à faire! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Jérémie, le prophète, leur dit: J’entends; voici je vais prier l’Éternel, votre Dieu, selon votre demande; et je vous ferai connaître, sans rien vous cacher, tout ce que l’Éternel vous répondra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Et ils dirent à Jérémie: Que l’Éternel soit contre nous un témoin véritable et fidèle, si nous ne faisons pas tout ce que l’Éternel, ton Dieu, te chargera de nous dire! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Que ce soit du bien ou du mal, nous obéirons à la voix de l’Éternel, notre Dieu, vers qui nous t’envoyons, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 7:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: afin que nous soyons heureux, si nous obéissons à la voix de l’Éternel, notre Dieu.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-22: cf. Jé 43:1-7; 44; 24:8-10. És 30:15, 16.'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dix jours après, la parole de l’Éternel fut adressée à Jérémie. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Et Jérémie appela Jochanan, fils de Karéach, tous les chefs des troupes qui étaient avec lui, et tout le peuple, depuis le plus petit jusqu’au plus grand. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il leur dit: Ainsi parle l’Éternel, le Dieu d’Israël, vers qui vous m’avez envoyé, pour que je lui présente vos supplications: '
