document_id: GEN.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Noé et ses fils
  - type: heading
    content: 'V. 1-7: cf. Ge 1:26-29. (Ex 21:12-14, 20. No 35:18-21, 31-33.)'
  - type: text
    content: 'Dieu bénit Noé et ses fils, et leur dit: '
  - type: note
    content: Ge 1:28; 8:17.
  - type: text
    content: 'Soyez féconds, multipliez, et remplissez la terre. '
  '10':
  - type: text
    content: 'avec tous les êtres vivants qui sont avec vous, tant les oiseaux que le bétail et tous les animaux de la terre, soit avec tous ceux qui sont sortis de l’arche, soit avec tous les animaux de la terre. '
  '11':
  - type: text
    content: 'J’établis mon alliance avec vous: aucune chair ne sera plus exterminée par les eaux du déluge, et il n’y aura plus de déluge pour détruire la terre. '
  '12':
  - type: text
    content: 'Et Dieu dit: C’est ici le signe de l’alliance que j’établis entre moi et vous, et tous les êtres vivants qui sont avec vous, pour les générations à toujours: '
  '13':
  - type: text
    content: 'j’ai placé mon arc dans la nue, et il servira de signe d’alliance entre moi et la terre. '
  '14':
  - type: text
    content: 'Quand j’aurai rassemblé des nuages au-dessus de la terre, l’arc paraîtra dans la nue; '
  '15':
  - type: text
    content: 'et je me souviendrai de mon alliance entre moi et vous, et tous les êtres vivants, de toute chair, et les eaux ne deviendront plus un déluge pour détruire toute chair. '
  '16':
  - type: text
    content: 'L’arc sera dans la nue; et je le regarderai, pour me souvenir de l’alliance perpétuelle entre Dieu et tous les êtres vivants, de toute chair qui est sur la terre. '
  '17':
  - type: text
    content: 'Et Dieu dit à Noé: Tel est le signe de l’alliance que j’établis entre moi et toute chair qui est sur la terre.'
  - type: heading
    content: 'V. 18-29: cf. (Pr 20:1. Ép 5:18.) (Ex 20:12. De 27:16.)'
  '18':
  - type: text
    content: 'Les fils de Noé, qui sortirent de l’arche, étaient '
  - type: note
    content: Ge 6:10.
  - type: text
    content: 'Sem, Cham et Japhet. Cham fut le père de Canaan. '
  '19':
  - type: text
    content: 'Ce sont là les trois fils de Noé, et c’est leur postérité qui peupla toute la terre. '
  '2':
  - type: text
    content: 'Vous serez un sujet de crainte et d’effroi pour tout animal de la terre, pour tout oiseau du ciel, pour tout ce qui se meut sur la terre, et pour tous les poissons de la mer: ils sont livrés entre vos mains. '
  '20':
  - type: text
    content: 'Noé commença à cultiver la terre, et planta de la vigne. '
  '21':
  - type: text
    content: 'Il but du vin, s’enivra, et se découvrit au milieu de sa tente. '
  '22':
  - type: text
    content: 'Cham, père de Canaan, vit la nudité de son père, et il le rapporta dehors à ses deux frères. '
  '23':
  - type: text
    content: 'Alors Sem et Japhet prirent le manteau, le mirent sur leurs épaules, marchèrent à reculons, et couvrirent la nudité de leur père; comme leur visage était détourné, ils ne virent point la nudité de leur père. '
  '24':
  - type: text
    content: 'Lorsque Noé se réveilla de son vin, il apprit ce que lui avait fait son fils cadet. '
  '25':
  - type: text
    content: 'Et il dit: Maudit soit Canaan! Qu’il soit l’esclave des esclaves de ses frères! '
  '26':
  - type: text
    content: 'Il dit encore: Béni soit l’Éternel, Dieu de Sem, et que Canaan soit leur esclave! '
  '27':
  - type: text
    content: 'Que Dieu étende les possessions de Japhet, qu’il habite dans les tentes de Sem, et que Canaan soit leur esclave! '
  '28':
  - type: text
    content: 'Noé vécut, après le déluge, trois cent cinquante ans. '
  '29':
  - type: text
    content: Tous les jours de Noé furent de neuf cent cinquante ans; puis il mourut.
  '3':
  - type: text
    content: 'Tout ce qui se meut et qui a vie vous servira de nourriture: je vous donne tout cela comme '
  - type: note
    content: Ge 1:29.
  - type: text
    content: 'l’herbe verte. '
  '4':
  - type: note
    content: Lé 3:27; 7:26; 17:14; 19:26. De 12:23.
  - type: text
    content: 'Seulement, vous ne mangerez point de chair avec son âme, avec son sang. '
  '5':
  - type: note
    content: Ex 21:12, 28.
  - type: text
    content: 'Sachez-le aussi, je redemanderai le sang de vos âmes, je le redemanderai à tout animal; et je redemanderai l’âme de l’homme à l’homme, à l’homme qui est son frère. '
  '6':
  - type: note
    content: La 4:13. Mt 26:52. Ap 13:10.
  - type: text
    content: 'Si quelqu’un verse le sang de l’homme, par l’homme son sang sera versé; car Dieu a fait l’homme '
  - type: note
    content: Ge 1:27.
  - type: text
    content: 'à son image. '
  '7':
  - type: note
    content: Ge 1:28; 8:17.
  - type: text
    content: Et vous, soyez féconds et multipliez, répandez-vous sur la terre et multipliez sur elle.
  - type: heading
    content: 'V. 8-17: cf. (Ge 8:20-22. És 54:9, 10. Jé 33:20.) 2 Pi 3:6, 7.'
  '8':
  - type: text
    content: 'Dieu parla encore à Noé et à ses fils avec lui, en disant: '
  '9':
  - type: note
    content: És 54:9.
  - type: text
    content: 'Voici, j’établis mon alliance avec vous et avec votre postérité après vous; '
