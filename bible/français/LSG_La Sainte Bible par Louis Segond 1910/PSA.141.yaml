document_id: PSA.141,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 1 S 25. (Ps 142; 143; 28.)
  - type: text
    content: Psaume de David.
  - type: text
    content: 'Éternel, je t’invoque: viens en hâte auprès de moi!'
  - type: text
    content: Prête l’oreille à ma voix, quand je t’invoque!
  '10':
  - type: text
    content: Que les méchants tombent dans leurs filets,
  - type: text
    content: Et que j’échappe en même temps!
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ex 29:30. Ap 5:8; 8:3.
  - type: text
    content: Que ma prière soit devant ta face comme l’encens,
  - type: text
    content: Et l’élévation de mes mains comme l’offrande du soir!
  '3':
  - type: text
    content: Éternel, mets une garde à ma bouche,
  - type: text
    content: Veille sur la porte de mes lèvres!
  '4':
  - type: text
    content: N’entraîne pas mon cœur à des choses mauvaises,
  - type: text
    content: A des actions coupables avec les hommes qui font le mal,
  - type: text
    content: Et que je ne prenne aucune part à leurs festins!
  '5':
  - type: text
    content: Que le juste me frappe, c’est une faveur;
  - type: text
    content: 'Qu’il me châtie, c’est de l’huile sur ma tête:'
  - type: text
    content: Ma tête ne se détournera pas;
  - type: text
    content: Mais de nouveau ma prière s’élèvera contre leur méchanceté.
  '6':
  - type: text
    content: Que leurs juges soient précipités le long des rochers,
  - type: text
    content: Et l’on écoutera mes paroles, car elles sont agréables.
  '7':
  - type: text
    content: Comme quand on laboure et qu’on fend la terre,
  - type: note
    content: Éz 37:1, 11, 12.
  - type: text
    content: Ainsi nos os sont dispersés à l’entrée du séjour des morts.
  '8':
  - type: text
    content: C’est vers toi, Éternel, Seigneur! Que se tournent mes yeux,
  - type: text
    content: 'C’est auprès de toi que je cherche un refuge:'
  - type: text
    content: N’abandonne pas mon âme!
  '9':
  - type: text
    content: Garantis-moi du piège qu’ils me tendent,
  - type: text
    content: Et des embûches de ceux qui font le mal!
