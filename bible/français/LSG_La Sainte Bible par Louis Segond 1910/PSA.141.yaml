document_id: PSA.141,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1 S 25. (Ps 142; 143; 28.)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Psaume de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Éternel, je t’invoque: viens en hâte auprès de moi!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prête l’oreille à ma voix, quand je t’invoque!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Que les méchants tombent dans leurs filets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que j’échappe en même temps!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 5:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que ma prière soit devant ta face comme l’encens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’élévation de mes mains comme l’offrande du soir!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Éternel, mets une garde à ma bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Veille sur la porte de mes lèvres!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: N’entraîne pas mon cœur à des choses mauvaises,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A des actions coupables avec les hommes qui font le mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que je ne prenne aucune part à leurs festins!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Que le juste me frappe, c’est une faveur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qu’il me châtie, c’est de l’huile sur ma tête:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma tête ne se détournera pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais de nouveau ma prière s’élèvera contre leur méchanceté.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Que leurs juges soient précipités le long des rochers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’on écoutera mes paroles, car elles sont agréables.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Comme quand on laboure et qu’on fend la terre,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 37:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ainsi nos os sont dispersés à l’entrée du séjour des morts.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: C’est vers toi, Éternel, Seigneur! Que se tournent mes yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est auprès de toi que je cherche un refuge:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’abandonne pas mon âme!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Garantis-moi du piège qu’ils me tendent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et des embûches de ceux qui font le mal!
