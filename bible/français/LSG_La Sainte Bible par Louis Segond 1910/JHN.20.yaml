document_id: JHN.20,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Résurrection de Jésus-Christ
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. (Mt 28:1-10. Mc 16:1-8. Lu 24:1-12.) (Ps 16:8-10. Ac 2:23-32.) Ro 1:4. Ac 17:31. (1 Co 15:1-28. 1 Pi 1:3, 4. Ap 1:18, 19.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 28:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 24:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le premier jour de la semaine, Marie de Magdala se rendit au sépulcre dès le matin, comme il faisait encore obscur; et elle vit que la pierre était ôtée du sépulcre. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et les disciples s’en retournèrent chez eux.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-18: cf. Mc 16:9-11. Mt 20:16. És 49:13.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 28:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 24:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Cependant Marie se tenait dehors près du sépulcre, et pleurait. Comme elle pleurait, elle se baissa pour regarder dans le sépulcre; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et elle vit deux anges vêtus de blanc, assis à la place où avait été couché le corps de Jésus, l’un à la tête, l’autre aux pieds. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui dirent: Femme, pourquoi pleures-tu? Elle leur répondit: Parce qu’ils ont enlevé mon Seigneur, et je ne sais où ils l’ont mis. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 28:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'En disant cela, elle se retourna, et elle vit Jésus debout; mais elle ne savait pas que c’était Jésus. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Femme, pourquoi pleures-tu? Qui cherches-tu?
    - type: text
      text: ' Elle, pensant que c’était le jardinier, lui dit: Seigneur, si c’est toi qui l’as emporté, dis-moi où tu l’as mis, et je le prendrai. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Marie!
    - type: text
      text: ' Elle se retourna, et lui dit en hébreu: Rabbouni! C’est-à-dire, Maître! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ne me touche pas; car je ne suis pas encore monté vers mon Père. Mais va trouver
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 22:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 28:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 2:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: mes frères, et dis-leur
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 16:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: que je monte vers mon Père et votre Père, vers mon Dieu et votre Dieu.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 28:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 24:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Marie de Magdala alla annoncer aux disciples qu’elle avait vu le Seigneur, et qu’il lui avait dit ces choses.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 19-23: cf. Mc 16:14-18. Lu 24:33-45.'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 24:36
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le soir de ce jour, qui était le premier de la semaine, les portes du lieu où se trouvaient les disciples étant fermées, à cause de la crainte qu’ils avaient des Juifs, Jésus vint, se présenta au milieu d’eux, et leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: La paix soit avec vous!
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle courut vers Simon Pierre et vers l’autre disciple '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 13:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que Jésus aimait, et leur dit: Ils ont enlevé du sépulcre le Seigneur, et nous ne savons où ils l’ont mis. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et quand il eut dit cela, il leur montra ses mains et son côté. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 16:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les disciples furent dans la joie en voyant le Seigneur. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur dit de nouveau: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: La paix soit avec vous!
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 61:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 28:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 4:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 17:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Comme le Père m’a envoyé, moi aussi je vous envoie.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après ces paroles, il souffla sur eux, et leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Recevez le Saint-Esprit.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ceux à qui vous pardonnerez les péchés, ils leur seront pardonnés; et ceux à qui vous les retiendrez, ils leur seront retenus.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 24-29: cf. És 42:3. 1 Pi 1:8, 9.'
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thomas, appelé Didyme, l’un des douze, n’était pas avec eux lorsque Jésus vint. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les autres disciples lui dirent donc: Nous avons vu le Seigneur. Mais il leur dit: Si je ne vois dans ses mains la marque des clous, et si je ne mets mon doigt dans la marque des clous, et si je ne mets ma main dans son côté, je ne croirai point. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Huit jours après, les disciples de Jésus étaient de nouveau dans la maison, et Thomas se trouvait avec eux. Jésus vint, les portes étant fermées, se présenta au milieu d’eux, et dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: La paix soit avec vous!
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il dit à Thomas: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Avance ici ton doigt, et regarde mes mains;
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 1:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: avance aussi ta main, et mets-la dans mon côté; et ne sois pas incrédule, mais crois.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thomas lui répondit: Mon Seigneur et mon Dieu! Jésus lui dit:'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Parce que tu m’as vu, tu as cru.
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Heureux ceux qui n’ont pas vu, et qui ont cru!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conclusion
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 30-31: cf. Jn 21:25. 1 Jn 5:11-13.'
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 24:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Pierre et l’autre disciple sortirent, et allèrent au sépulcre. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a fait encore, en présence de ses disciples, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 21:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'beaucoup d’autres miracles, qui ne sont pas écrits dans ce livre. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais ces choses ont été écrites afin que vous croyiez que Jésus est le Christ, le Fils de Dieu, et qu’en croyant vous ayez la vie en son nom.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils couraient tous deux ensemble. Mais l’autre disciple courut plus vite que Pierre, et arriva le premier au sépulcre; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 's’étant baissé, il vit '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 19:40
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'les bandes qui étaient à terre, cependant il n’entra pas. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon Pierre, qui le suivait, arriva et entra dans le sépulcre; il vit les bandes qui étaient à terre, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 11:44
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le linge qu’on avait mis sur la tête de Jésus, non pas avec les bandes, mais plié dans un lieu à part. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’autre disciple, qui était arrivé le premier au sépulcre, entra aussi; et il vit, et il crut. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car ils ne comprenaient pas encore que, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 16:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2:25
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'selon l’Écriture, Jésus devait ressusciter des morts. '
