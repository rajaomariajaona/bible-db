document_id: JHN.20,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Résurrection de Jésus-Christ
  - type: heading
    content: 'V. 1-10: cf. (Mt 28:1-10. Mc 16:1-8. Lu 24:1-12.) (Ps 16:8-10. Ac 2:23-32.) Ro 1:4. Ac 17:31. (1 Co 15:1-28. 1 Pi 1:3, 4. Ap 1:18, 19.)'
  - type: text
    content: ' '
  - type: note
    content: Mt 28:1. Mc 16:1. Lu 24:1.
  - type: text
    content: 'Le premier jour de la semaine, Marie de Magdala se rendit au sépulcre dès le matin, comme il faisait encore obscur; et elle vit que la pierre était ôtée du sépulcre. '
  '10':
  - type: text
    content: Et les disciples s’en retournèrent chez eux.
  - type: heading
    content: 'V. 11-18: cf. Mc 16:9-11. Mt 20:16. És 49:13.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: Mt 28:1. Mc 16:5. Lu 24:4.
  - type: text
    content: 'Cependant Marie se tenait dehors près du sépulcre, et pleurait. Comme elle pleurait, elle se baissa pour regarder dans le sépulcre; '
  '12':
  - type: text
    content: 'et elle vit deux anges vêtus de blanc, assis à la place où avait été couché le corps de Jésus, l’un à la tête, l’autre aux pieds. '
  '13':
  - type: text
    content: 'Ils lui dirent: Femme, pourquoi pleures-tu? Elle leur répondit: Parce qu’ils ont enlevé mon Seigneur, et je ne sais où ils l’ont mis. '
  '14':
  - type: note
    content: Mt 28:9. Mc 16:9.
  - type: text
    content: 'En disant cela, elle se retourna, et elle vit Jésus debout; mais elle ne savait pas que c’était Jésus. '
  '15':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: Femme, pourquoi pleures-tu? Qui cherches-tu?
  - type: text
    content: ' Elle, pensant que c’était le jardinier, lui dit: Seigneur, si c’est toi qui l’as emporté, dis-moi où tu l’as mis, et je le prendrai. '
  '16':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: Marie!
  - type: text
    content: ' Elle se retourna, et lui dit en hébreu: Rabbouni! C’est-à-dire, Maître! '
  '17':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: Ne me touche pas; car je ne suis pas encore monté vers mon Père. Mais va trouver
  - type: text
    content: ' '
  - type: note
    content: Ps 22:23. Mt 28:10. Hé 2:11.
  - type: text
    content: mes frères, et dis-leur
  - type: text
    content: ' '
  - type: note
    content: Jn 16:28.
  - type: text
    content: que je monte vers mon Père et votre Père, vers mon Dieu et votre Dieu.
  - type: text
    content: ' '
  '18':
  - type: note
    content: Mt 28:8. Mc 16:10. Lu 24:9.
  - type: text
    content: Marie de Magdala alla annoncer aux disciples qu’elle avait vu le Seigneur, et qu’il lui avait dit ces choses.
  - type: heading
    content: 'V. 19-23: cf. Mc 16:14-18. Lu 24:33-45.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: Mc 16:14. Lu 24:36. 1 Co 15:5.
  - type: text
    content: 'Le soir de ce jour, qui était le premier de la semaine, les portes du lieu où se trouvaient les disciples étant fermées, à cause de la crainte qu’ils avaient des Juifs, Jésus vint, se présenta au milieu d’eux, et leur dit: '
  - type: text
    content: La paix soit avec vous!
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Elle courut vers Simon Pierre et vers l’autre disciple '
  - type: note
    content: Jn 13:23; 21:7, 20.
  - type: text
    content: 'que Jésus aimait, et leur dit: Ils ont enlevé du sépulcre le Seigneur, et nous ne savons où ils l’ont mis. '
  '20':
  - type: text
    content: 'Et quand il eut dit cela, il leur montra ses mains et son côté. '
  - type: note
    content: Jn 16:22.
  - type: text
    content: 'Les disciples furent dans la joie en voyant le Seigneur. '
  '21':
  - type: text
    content: 'Jésus leur dit de nouveau: '
  - type: text
    content: La paix soit avec vous!
  - type: text
    content: ' '
  - type: note
    content: És 61:1. Mt 28:19. Mc 16:15. Lu 4:18. Jn 17:18.
  - type: text
    content: Comme le Père m’a envoyé, moi aussi je vous envoie.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Après ces paroles, il souffla sur eux, et leur dit: '
  - type: text
    content: Recevez le Saint-Esprit.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Mt 16:19; 18:18.
  - type: text
    content: Ceux à qui vous pardonnerez les péchés, ils leur seront pardonnés; et ceux à qui vous les retiendrez, ils leur seront retenus.
  - type: heading
    content: 'V. 24-29: cf. És 42:3. 1 Pi 1:8, 9.'
  '24':
  - type: text
    content: 'Thomas, appelé Didyme, l’un des douze, n’était pas avec eux lorsque Jésus vint. '
  '25':
  - type: text
    content: 'Les autres disciples lui dirent donc: Nous avons vu le Seigneur. Mais il leur dit: Si je ne vois dans ses mains la marque des clous, et si je ne mets mon doigt dans la marque des clous, et si je ne mets ma main dans son côté, je ne croirai point. '
  '26':
  - type: text
    content: 'Huit jours après, les disciples de Jésus étaient de nouveau dans la maison, et Thomas se trouvait avec eux. Jésus vint, les portes étant fermées, se présenta au milieu d’eux, et dit: '
  - type: text
    content: La paix soit avec vous!
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Puis il dit à Thomas: '
  - type: text
    content: Avance ici ton doigt, et regarde mes mains;
  - type: text
    content: ' '
  - type: note
    content: 1 Jn 1:1.
  - type: text
    content: avance aussi ta main, et mets-la dans mon côté; et ne sois pas incrédule, mais crois.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Thomas lui répondit: Mon Seigneur et mon Dieu! Jésus lui dit:'
  '29':
  - type: text
    content: ' '
  - type: text
    content: Parce que tu m’as vu, tu as cru.
  - type: text
    content: ' '
  - type: note
    content: 1 Pi 1:8.
  - type: text
    content: Heureux ceux qui n’ont pas vu, et qui ont cru!
  - type: heading
    content: Conclusion
  - type: heading
    content: 'V. 30-31: cf. Jn 21:25. 1 Jn 5:11-13.'
  '3':
  - type: note
    content: Lu 24:12.
  - type: text
    content: 'Pierre et l’autre disciple sortirent, et allèrent au sépulcre. '
  '30':
  - type: text
    content: 'Jésus a fait encore, en présence de ses disciples, '
  - type: note
    content: Jn 21:25.
  - type: text
    content: 'beaucoup d’autres miracles, qui ne sont pas écrits dans ce livre. '
  '31':
  - type: text
    content: Mais ces choses ont été écrites afin que vous croyiez que Jésus est le Christ, le Fils de Dieu, et qu’en croyant vous ayez la vie en son nom.
  '4':
  - type: text
    content: 'Ils couraient tous deux ensemble. Mais l’autre disciple courut plus vite que Pierre, et arriva le premier au sépulcre; '
  '5':
  - type: text
    content: 's’étant baissé, il vit '
  - type: note
    content: Jn 19:40.
  - type: text
    content: 'les bandes qui étaient à terre, cependant il n’entra pas. '
  '6':
  - type: text
    content: 'Simon Pierre, qui le suivait, arriva et entra dans le sépulcre; il vit les bandes qui étaient à terre, '
  '7':
  - type: text
    content: 'et '
  - type: note
    content: Jn 11:44.
  - type: text
    content: 'le linge qu’on avait mis sur la tête de Jésus, non pas avec les bandes, mais plié dans un lieu à part. '
  '8':
  - type: text
    content: 'Alors l’autre disciple, qui était arrivé le premier au sépulcre, entra aussi; et il vit, et il crut. '
  '9':
  - type: text
    content: 'Car ils ne comprenaient pas encore que, '
  - type: note
    content: Ps 16:10. Ac 2:25, 31; 13:35.
  - type: text
    content: 'selon l’Écriture, Jésus devait ressusciter des morts. '
