document_id: 1KI.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fuite d’Élie au désert
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. (Ps 37:32-40; 91:9-12. Mt 4:11.) Ge 21:14-19.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Achab rapporta à Jézabel tout ce qu’avait fait Élie, et comment il avait tué par l’épée tous les prophètes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jézabel envoya un messager à Élie, pour lui dire: Que les dieux me traitent dans toute leur rigueur, si demain, à cette heure, je ne fais de ta vie ce que tu as fait de la vie de chacun d’eux! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Élie, voyant cela, se leva et s’en alla, pour sauver sa vie. Il arriva à Beer-Schéba, qui appartient à Juda, et il y laissa son serviteur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pour lui, il alla dans le désert où, après une journée de marche, il s’assit sous un genêt, et demanda la mort, en disant: C’est assez! Maintenant, Éternel, prends mon âme, car je ne suis pas meilleur que mes pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il se coucha et s’endormit sous un genêt. Et voici, un ange le toucha, et lui dit: Lève-toi, mange. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il regarda, et il y avait à son chevet un gâteau cuit sur des pierres chauffées et une cruche d’eau. Il mangea et but, puis se recoucha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’ange de l’Éternel vint une seconde fois, le toucha, et dit: Lève-toi, mange, car le chemin est trop long pour toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il se leva, mangea et but; et avec la force que lui donna cette nourriture, il marcha '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 34:28
      metadata:
        usfm: EXO.34.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 4:2
      metadata:
        usfm: MAT.4.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: quarante jours et quarante nuits jusqu’à la montagne de Dieu, à Horeb.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-18: cf. Ex 3:1, etc. Ro 11:1-5. És 49:4, 5. Mt 14:31.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et là, il entra dans la caverne, et il y passa la nuit. Et voici, la parole de l’Éternel lui fut adressée, en ces mots: Que fais-tu ici, Élie? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il répondit: J’ai déployé mon zèle pour l’Éternel, le Dieu des armées; car les enfants d’Israël ont abandonné ton alliance, ils ont renversé tes autels, et ils ont tué par l’épée tes prophètes; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:3
      metadata:
        usfm: ROM.11.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je suis resté, moi seul, et ils cherchent à m’ôter la vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’Éternel dit: Sors, et tiens-toi dans la montagne devant l’Éternel! Et voici, l’Éternel passa. Et devant l’Éternel, il y eut un vent fort et violent qui déchirait les montagnes et brisait les rochers: l’Éternel n’était pas dans le vent. Et après le vent, ce fut un tremblement de terre: l’Éternel n’était pas dans le tremblement de terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et après le tremblement de terre, un feu: l’Éternel n’était pas dans le feu. Et après le feu, un murmure doux et léger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand Élie l’entendit, il s’enveloppa le visage de son manteau, il sortit et se tint à l’entrée de la caverne. Et voici, une voix lui fit entendre ces paroles: Que fais-tu ici, Élie? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il répondit: J’ai déployé mon zèle pour l’Éternel, le Dieu des armées; car les enfants d’Israël ont abandonné ton alliance, ils ont renversé tes autels, et ils ont tué par l’épée tes prophètes; je suis resté, moi seul, et ils cherchent à m’ôter la vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L’Éternel lui dit: Va, reprends ton chemin par le désert jusqu’à Damas; et quand tu seras arrivé, tu oindras Hazaël pour roi de Syrie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tu oindras aussi Jéhu, fils de Nimschi, pour roi d’Israël; et tu oindras Élisée, fils de Schaphath, d’Abel-Mehola, pour prophète à ta place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 R 9:14, 15, etc.
    marker-yv: yv-n
  - type: text
    text: 'Et il arrivera que celui qui échappera à l’épée de Hazaël, Jéhu le fera mourir; et celui qui échappera à l’épée de Jéhu, Élisée le fera mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:4
      metadata:
        usfm: ROM.11.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais je laisserai en Israël sept mille hommes, tous ceux qui n’ont point fléchi les genoux devant Baal, et dont la bouche ne l’a point baisé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Élisée appelé à succéder à Élie comme prophète
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 19-21: cf. Mt 4:18-22; 9:9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Élie partit de là, et il trouva Élisée, fils de Schaphath, qui labourait. Il y avait devant lui douze paires de bœufs, et il était avec la douzième. Élie s’approcha de lui, et il jeta sur lui son manteau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Élisée, quittant ses bœufs, courut après Élie, et dit: Laisse-moi embrasser mon père et ma mère, et je te suivrai. Élie lui répondit: Va, et reviens; car pense à ce que je t’ai fait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Après s’être éloigné d’Élie, il revint prendre une paire de bœufs, qu’il offrit en sacrifice; avec l’attelage des bœufs, il fit cuire leur chair, et la donna à manger au peuple. Puis il se leva, suivit Élie, et fut à son service.
