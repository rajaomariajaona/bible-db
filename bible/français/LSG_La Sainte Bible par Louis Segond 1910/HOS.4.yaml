document_id: HOS.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les crimes d’Israël et de Juda; censures et menaces
  - type: heading
    content: 'V. 1-5: cf. Jé 5:1-9; 9:2-10.'
  - type: text
    content: Écoutez la parole de l’Éternel, enfants d’Israël!
  - type: text
    content: 'Car l’Éternel a un '
  - type: note
    content: Mi 6:2.
  - type: text
    content: procès avec les habitants du pays,
  - type: text
    content: Parce qu’il n’y a point de vérité, point de miséricorde,
  - type: text
    content: Point de connaissance de Dieu dans le pays.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Mi 6:14.
  - type: text
    content: Ils mangeront sans se rassasier,
  - type: text
    content: Ils se prostitueront sans multiplier,
  - type: text
    content: Parce qu’ils ont abandonné l’Éternel et ses commandements.
  - type: heading
    content: 'V. 11-14: cf. No 25:1-3. Éz 20:27-33.'
  '11':
  - type: text
    content: La prostitution, le vin et le moût, font perdre le sens.
  '12':
  - type: text
    content: Mon peuple consulte son bois,
  - type: text
    content: Et c’est son bâton qui lui parle;
  - type: text
    content: 'Car '
  - type: note
    content: Os 5:4.
  - type: text
    content: l’esprit de prostitution égare,
  - type: text
    content: Et ils se prostituent loin de leur Dieu.
  '13':
  - type: text
    content: 'Ils sacrifient sur le sommet des '
  - type: note
    content: És 57:7.
  - type: text
    content: montagnes,
  - type: text
    content: 'Ils brûlent de l’encens sur les '
  - type: note
    content: Éz 20:28.
  - type: text
    content: collines,
  - type: text
    content: 'Sous les chênes, les peupliers, les '
  - type: note
    content: És 1:29.
  - type: text
    content: térébinthes,
  - type: text
    content: Dont l’ombrage est agréable.
  - type: text
    content: C’est pourquoi vos filles se prostituent,
  - type: text
    content: Et vos belles-filles sont adultères.
  '14':
  - type: text
    content: Je ne punirai pas vos filles parce qu’elles se prostituent,
  - type: text
    content: Ni vos belles-filles parce qu’elles sont adultères,
  - type: text
    content: Car eux-mêmes vont à l’écart avec des prostituées,
  - type: text
    content: Et sacrifient avec des femmes débauchées.
  - type: text
    content: Le peuple insensé court à sa perte.
  - type: heading
    content: 'V. 15-19: cf. Os 12:1; 10:1-8.'
  '15':
  - type: text
    content: Si tu te livres à la prostitution, ô Israël,
  - type: text
    content: Que Juda ne se rende pas coupable;
  - type: text
    content: N’allez pas à Guilgal, ne montez pas à Beth-Aven,
  - type: text
    content: 'Et ne jurez pas: L’Éternel est vivant!'
  '16':
  - type: text
    content: Parce qu’Israël se révolte comme une génisse indomptable,
  - type: text
    content: Maintenant l’Éternel le fera paître
  - type: text
    content: Comme un agneau dans de vastes plaines.
  '17':
  - type: text
    content: 'Éphraïm est attaché aux idoles: laisse-le!'
  '18':
  - type: text
    content: A peine ont-ils cessé de boire
  - type: text
    content: Qu’ils se livrent à la prostitution;
  - type: text
    content: Leurs chefs sont avides d’ignominie.
  '19':
  - type: text
    content: Le vent les enveloppera de ses ailes,
  - type: text
    content: Et ils auront honte de leurs sacrifices.
  '2':
  - type: text
    content: Il n’y a que parjures et mensonges,
  - type: text
    content: Assassinats, vols et adultères;
  - type: text
    content: On use de violence, on commet meurtre sur meurtre.
  '3':
  - type: text
    content: C’est pourquoi le pays sera dans le deuil,
  - type: text
    content: Tous ceux qui l’habitent seront languissants,
  - type: text
    content: Et avec eux les bêtes des champs et les oiseaux du ciel;
  - type: text
    content: Même les poissons de la mer disparaîtront.
  '4':
  - type: text
    content: Mais que nul ne conteste, que nul ne se livre aux reproches;
  - type: text
    content: Car ton peuple est comme ceux qui disputent avec les sacrificateurs.
  '5':
  - type: text
    content: Tu tomberas de jour,
  - type: text
    content: Le prophète avec toi tombera de nuit,
  - type: text
    content: Et je détruirai ta mère.
  - type: heading
    content: 'V. 6-10: cf. Jé 8:8-13. Mal 2:1-9.'
  '6':
  - type: text
    content: Mon peuple est détruit, parce qu’il lui manque la connaissance.
  - type: text
    content: Puisque tu as rejeté la connaissance,
  - type: text
    content: Je te rejetterai, et tu seras dépouillé de mon sacerdoce;
  - type: text
    content: Puisque tu as oublié la loi de ton Dieu,
  - type: text
    content: J’oublierai aussi tes enfants.
  '7':
  - type: text
    content: 'Plus ils se sont multipliés, plus ils ont péché contre moi:'
  - type: text
    content: Je changerai leur gloire en ignominie.
  '8':
  - type: text
    content: Ils se repaissent des péchés de mon peuple,
  - type: text
    content: Ils sont avides de ses iniquités.
  '9':
  - type: text
    content: 'Il en sera du sacrificateur '
  - type: note
    content: És 24:2.
  - type: text
    content: comme du peuple;
  - type: text
    content: Je le châtierai selon ses voies,
  - type: text
    content: Je lui rendrai selon ses œuvres.
