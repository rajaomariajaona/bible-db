document_id: HOS.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les crimes d’Israël et de Juda; censures et menaces
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. Jé 5:1-9; 9:2-10.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Écoutez la parole de l’Éternel, enfants d’Israël!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car l’Éternel a un '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 6:2
      metadata:
        usfm: MIC.6.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: procès avec les habitants du pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’il n’y a point de vérité, point de miséricorde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Point de connaissance de Dieu dans le pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il n’y a que parjures et mensonges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Assassinats, vols et adultères;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On use de violence, on commet meurtre sur meurtre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C’est pourquoi le pays sera dans le deuil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui l’habitent seront languissants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et avec eux les bêtes des champs et les oiseaux du ciel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même les poissons de la mer disparaîtront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mais que nul ne conteste, que nul ne se livre aux reproches;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ton peuple est comme ceux qui disputent avec les sacrificateurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu tomberas de jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le prophète avec toi tombera de nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je détruirai ta mère.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-10: cf. Jé 8:8-13. Mal 2:1-9.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mon peuple est détruit, parce qu’il lui manque la connaissance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisque tu as rejeté la connaissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te rejetterai, et tu seras dépouillé de mon sacerdoce;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisque tu as oublié la loi de ton Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’oublierai aussi tes enfants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Plus ils se sont multipliés, plus ils ont péché contre moi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je changerai leur gloire en ignominie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils se repaissent des péchés de mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont avides de ses iniquités.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il en sera du sacrificateur '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 24:2
      metadata:
        usfm: ISA.24.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: comme du peuple;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je le châtierai selon ses voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je lui rendrai selon ses œuvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 6:14
      metadata:
        usfm: MIC.6.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils mangeront sans se rassasier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se prostitueront sans multiplier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’ils ont abandonné l’Éternel et ses commandements.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-14: cf. No 25:1-3. Éz 20:27-33.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: La prostitution, le vin et le moût, font perdre le sens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mon peuple consulte son bois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et c’est son bâton qui lui parle;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 5:4
      metadata:
        usfm: HOS.5.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: l’esprit de prostitution égare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils se prostituent loin de leur Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils sacrifient sur le sommet des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 57:7
      metadata:
        usfm: ISA.57.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils brûlent de l’encens sur les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 20:28
      metadata:
        usfm: EZK.20.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: collines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sous les chênes, les peupliers, les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:29
      metadata:
        usfm: ISA.1.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: térébinthes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dont l’ombrage est agréable.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pourquoi vos filles se prostituent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vos belles-filles sont adultères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je ne punirai pas vos filles parce qu’elles se prostituent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni vos belles-filles parce qu’elles sont adultères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car eux-mêmes vont à l’écart avec des prostituées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sacrifient avec des femmes débauchées.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le peuple insensé court à sa perte.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-19: cf. Os 12:1; 10:1-8.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Si tu te livres à la prostitution, ô Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que Juda ne se rende pas coupable;
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’allez pas à Guilgal, ne montez pas à Beth-Aven,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et ne jurez pas: L’Éternel est vivant!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Parce qu’Israël se révolte comme une génisse indomptable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant l’Éternel le fera paître
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme un agneau dans de vastes plaines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Éphraïm est attaché aux idoles: laisse-le!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A peine ont-ils cessé de boire
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils se livrent à la prostitution;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs chefs sont avides d’ignominie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Le vent les enveloppera de ses ailes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils auront honte de leurs sacrifices.
