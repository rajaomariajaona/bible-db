document_id: 2CH.16,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Faute que commit Asa en s’alliant avec le roi de Syrie contre le roi d’Israël
  - type: heading
    content: 'V. 1-6: cf. 1 R 15:16-22.'
  - type: text
    content: ' '
  - type: note
    content: 1 R 15:17.
  - type: text
    content: 'La trente-sixième année du règne d’Asa, Baescha, roi d’Israël, monta contre Juda; et il bâtit Rama, pour empêcher ceux d’Asa, roi de Juda, de sortir et d’entrer. '
  '10':
  - type: text
    content: 'Asa fut irrité contre le voyant, et il le fit mettre en prison, parce qu’il était en colère contre lui. Et dans le même temps Asa opprima aussi quelques-uns du peuple. '
  '11':
  - type: text
    content: 'Les actions d’Asa, les premières et les dernières, sont écrites dans le livre des rois de Juda et d’Israël. '
  '12':
  - type: text
    content: 'La trente-neuvième année de son règne, Asa eut les pieds malades au point d’éprouver de grandes souffrances; même pendant sa maladie, il ne chercha pas l’Éternel, mais il consulta les médecins. '
  '13':
  - type: text
    content: 'Asa se coucha avec ses pères, et il mourut la quarante et unième année de son règne; '
  '14':
  - type: text
    content: on l’enterra dans le sépulcre qu’il s’était creusé dans la ville de David. On le coucha sur un lit qu’on avait garni d’aromates et de parfums préparés selon l’art du parfumeur, et l’on en brûla en son honneur une quantité très considérable.
  '2':
  - type: text
    content: 'Asa sortit de l’argent et de l’or des trésors de la maison de l’Éternel et de la maison du roi, et il envoya des messagers vers Ben-Hadad, roi de Syrie, qui habitait à Damas. '
  '3':
  - type: text
    content: 'Il lui fit dire: Qu’il y ait une alliance entre moi et toi, comme il y en eut une entre mon père et ton père. Voici, je t’envoie de l’argent et de l’or. Va, romps ton alliance avec Baescha, roi d’Israël, afin qu’il s’éloigne de moi. '
  '4':
  - type: text
    content: 'Ben-Hadad écouta le roi Asa; il envoya les chefs de son armée contre les villes d’Israël, et ils frappèrent Ijjon, Dan, Abel-Maïm, et tous les magasins des villes de Nephthali. '
  '5':
  - type: text
    content: 'Lorsque Baescha l’apprit, il cessa de bâtir Rama et interrompit ses travaux. '
  '6':
  - type: text
    content: Le roi Asa occupa tout Juda à emporter les pierres et le bois que Baescha employait à la construction de Rama, et il s’en servit pour bâtir Guéba et Mitspa.
  - type: heading
    content: 'V. 7-14: cf. (És 31:1-6. Jé 17:5-10.) 1 R 15:23, 24.'
  '7':
  - type: text
    content: 'Dans ce temps-là, Hanani, le voyant, alla auprès d’Asa, roi de Juda, et lui dit: Parce que tu t’es appuyé sur le roi de Syrie et que tu ne t’es pas appuyé sur l’Éternel, ton Dieu, l’armée du roi de Syrie s’est échappée de tes mains. '
  '8':
  - type: text
    content: 'Les Éthiopiens et les Libyens ne formaient-ils pas une grande armée, avec des chars et une multitude de cavaliers? Et cependant l’Éternel les a livrés entre tes mains, parce que tu t’étais appuyé sur lui. '
  '9':
  - type: text
    content: 'Car l’Éternel '
  - type: note
    content: Job 34:21. Pr 5:21; 15:3. Jé 16:17; 32:19.
  - type: text
    content: 'étend ses regards sur toute la terre, pour soutenir ceux dont le cœur est tout entier à lui. Tu as agi en insensé dans cette affaire, car dès à présent tu auras des guerres. '
