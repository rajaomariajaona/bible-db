document_id: 2CH.16,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faute que commit Asa en s’alliant avec le roi de Syrie contre le roi d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. 1 R 15:16-22.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 15:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'La trente-sixième année du règne d’Asa, Baescha, roi d’Israël, monta contre Juda; et il bâtit Rama, pour empêcher ceux d’Asa, roi de Juda, de sortir et d’entrer. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Asa fut irrité contre le voyant, et il le fit mettre en prison, parce qu’il était en colère contre lui. Et dans le même temps Asa opprima aussi quelques-uns du peuple. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Les actions d’Asa, les premières et les dernières, sont écrites dans le livre des rois de Juda et d’Israël. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'La trente-neuvième année de son règne, Asa eut les pieds malades au point d’éprouver de grandes souffrances; même pendant sa maladie, il ne chercha pas l’Éternel, mais il consulta les médecins. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Asa se coucha avec ses pères, et il mourut la quarante et unième année de son règne; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: on l’enterra dans le sépulcre qu’il s’était creusé dans la ville de David. On le coucha sur un lit qu’on avait garni d’aromates et de parfums préparés selon l’art du parfumeur, et l’on en brûla en son honneur une quantité très considérable.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Asa sortit de l’argent et de l’or des trésors de la maison de l’Éternel et de la maison du roi, et il envoya des messagers vers Ben-Hadad, roi de Syrie, qui habitait à Damas. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il lui fit dire: Qu’il y ait une alliance entre moi et toi, comme il y en eut une entre mon père et ton père. Voici, je t’envoie de l’argent et de l’or. Va, romps ton alliance avec Baescha, roi d’Israël, afin qu’il s’éloigne de moi. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ben-Hadad écouta le roi Asa; il envoya les chefs de son armée contre les villes d’Israël, et ils frappèrent Ijjon, Dan, Abel-Maïm, et tous les magasins des villes de Nephthali. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Lorsque Baescha l’apprit, il cessa de bâtir Rama et interrompit ses travaux. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Le roi Asa occupa tout Juda à emporter les pierres et le bois que Baescha employait à la construction de Rama, et il s’en servit pour bâtir Guéba et Mitspa.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-14: cf. (És 31:1-6. Jé 17:5-10.) 1 R 15:23, 24.'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dans ce temps-là, Hanani, le voyant, alla auprès d’Asa, roi de Juda, et lui dit: Parce que tu t’es appuyé sur le roi de Syrie et que tu ne t’es pas appuyé sur l’Éternel, ton Dieu, l’armée du roi de Syrie s’est échappée de tes mains. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Les Éthiopiens et les Libyens ne formaient-ils pas une grande armée, avec des chars et une multitude de cavaliers? Et cependant l’Éternel les a livrés entre tes mains, parce que tu t’étais appuyé sur lui. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Car l’Éternel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 34:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 5:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 16:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'étend ses regards sur toute la terre, pour soutenir ceux dont le cœur est tout entier à lui. Tu as agi en insensé dans cette affaire, car dès à présent tu auras des guerres. '
