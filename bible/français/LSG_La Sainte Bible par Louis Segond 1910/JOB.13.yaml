document_id: JOB.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-12: cf. Job 32:3, etc.; 42:7, 8.'
  - type: text
    content: Voici, mon œil a vu tout cela,
  - type: text
    content: Mon oreille l’a entendu et y a pris garde.
  '10':
  - type: text
    content: Certainement il vous condamnera,
  - type: text
    content: Si vous n’agissez en secret que par égard pour sa personne.
  '11':
  - type: text
    content: Sa majesté ne vous épouvantera-t-elle pas?
  - type: text
    content: Sa terreur ne tombera-t-elle pas sur vous?
  '12':
  - type: text
    content: Vos sentences sont des sentences de cendre,
  - type: text
    content: Vos retranchements sont des retranchements de boue.
  - type: heading
    content: 'V. 13-28: cf. Job 23; 9:32-35.'
  '13':
  - type: text
    content: Taisez-vous, laissez-moi, je veux parler!
  - type: text
    content: Il m’en arrivera ce qu’il pourra.
  '14':
  - type: text
    content: Pourquoi saisirais-je ma chair entre les dents?
  - type: text
    content: J’exposerai plutôt ma vie.
  '15':
  - type: text
    content: 'Voici, il me tuera; '
  - type: note
    content: Ps 23:4. Pr 14:32.
  - type: text
    content: je n’ai rien à espérer;
  - type: text
    content: Mais devant lui je défendrai ma conduite.
  '16':
  - type: text
    content: Cela même peut servir à mon salut,
  - type: text
    content: Car un impie n’ose paraître en sa présence.
  '17':
  - type: text
    content: Écoutez, écoutez mes paroles,
  - type: text
    content: Prêtez l’oreille à ce que je vais dire.
  '18':
  - type: text
    content: Me voici prêt à plaider ma cause;
  - type: text
    content: Je sais que j’ai raison.
  '19':
  - type: text
    content: Quelqu’un disputera-t-il contre moi?
  - type: text
    content: Alors je me tais, et je veux mourir.
  '2':
  - type: text
    content: Ce que vous savez, je le sais aussi,
  - type: text
    content: Je ne vous suis point inférieur.
  '20':
  - type: text
    content: 'Seulement, '
  - type: note
    content: Job 9:34; 33:7.
  - type: text
    content: accorde-moi deux choses
  - type: text
    content: 'Et je ne me cacherai pas loin de ta face:'
  '21':
  - type: text
    content: Retire ta main de dessus moi,
  - type: text
    content: Et que tes terreurs ne me troublent plus.
  '22':
  - type: text
    content: Puis appelle, et je répondrai,
  - type: text
    content: Ou si je parle, réponds-moi!
  '23':
  - type: text
    content: Quel est le nombre de mes iniquités et de mes péchés?
  - type: text
    content: Fais-moi connaître mes transgressions et mes péchés.
  '24':
  - type: text
    content: Pourquoi caches-tu ton visage,
  - type: text
    content: 'Et me prends-tu '
  - type: note
    content: Job 16:9; 19:11; 33:10. La 2:5.
  - type: text
    content: pour ton ennemi?
  '25':
  - type: text
    content: Veux-tu frapper une feuille agitée?
  - type: text
    content: Veux-tu poursuivre une paille desséchée?
  '26':
  - type: text
    content: Pourquoi m’infliger d’amères souffrances,
  - type: text
    content: 'Me punir pour des fautes '
  - type: note
    content: Ps 25:7.
  - type: text
    content: de jeunesse?
  '27':
  - type: text
    content: ' '
  - type: note
    content: Job 33:11.
  - type: text
    content: Pourquoi mettre mes pieds dans les ceps,
  - type: text
    content: Surveiller tous mes mouvements,
  - type: text
    content: Tracer une limite à mes pas,
  '28':
  - type: text
    content: Quand mon corps tombe en pourriture,
  - type: text
    content: Comme un vêtement que dévore la teigne?
  '3':
  - type: text
    content: Mais je veux parler au Tout-Puissant,
  - type: text
    content: Je veux plaider ma cause devant Dieu;
  '4':
  - type: text
    content: Car vous, vous n’imaginez que des faussetés,
  - type: text
    content: 'Vous êtes tous '
  - type: note
    content: Job 16:2.
  - type: text
    content: des médecins de néant.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Pr 17:28.
  - type: text
    content: Que n’avez-vous gardé le silence?
  - type: text
    content: Vous auriez passé pour avoir de la sagesse.
  '6':
  - type: text
    content: Écoutez, je vous prie, ma défense,
  - type: text
    content: Et soyez attentifs à la réplique de mes lèvres.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Job 17:5; 32:21; 36:4.
  - type: text
    content: Direz-vous en faveur de Dieu ce qui est injuste,
  - type: text
    content: Et pour le soutenir alléguerez-vous des faussetés?
  '8':
  - type: text
    content: Voulez-vous avoir égard à sa personne?
  - type: text
    content: Voulez-vous plaider pour Dieu?
  '9':
  - type: text
    content: S’il vous sonde, vous approuvera-t-il?
  - type: text
    content: Ou le tromperez-vous comme on trompe un homme?
