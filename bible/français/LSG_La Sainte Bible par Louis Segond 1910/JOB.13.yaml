document_id: JOB.13,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-12: cf. Job 32:3, etc.; 42:7, 8.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Voici, mon œil a vu tout cela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon oreille l’a entendu et y a pris garde.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Certainement il vous condamnera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si vous n’agissez en secret que par égard pour sa personne.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Sa majesté ne vous épouvantera-t-elle pas?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa terreur ne tombera-t-elle pas sur vous?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Vos sentences sont des sentences de cendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vos retranchements sont des retranchements de boue.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-28: cf. Job 23; 9:32-35.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Taisez-vous, laissez-moi, je veux parler!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il m’en arrivera ce qu’il pourra.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Pourquoi saisirais-je ma chair entre les dents?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’exposerai plutôt ma vie.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Voici, il me tuera; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 23:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 14:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: je n’ai rien à espérer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais devant lui je défendrai ma conduite.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Cela même peut servir à mon salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car un impie n’ose paraître en sa présence.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Écoutez, écoutez mes paroles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prêtez l’oreille à ce que je vais dire.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Me voici prêt à plaider ma cause;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je sais que j’ai raison.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Quelqu’un disputera-t-il contre moi?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors je me tais, et je veux mourir.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ce que vous savez, je le sais aussi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne vous suis point inférieur.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Seulement, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 9:34
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: accorde-moi deux choses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et je ne me cacherai pas loin de ta face:'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Retire ta main de dessus moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que tes terreurs ne me troublent plus.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Puis appelle, et je répondrai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou si je parle, réponds-moi!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Quel est le nombre de mes iniquités et de mes péchés?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais-moi connaître mes transgressions et mes péchés.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Pourquoi caches-tu ton visage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et me prends-tu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 16:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: La 2:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: pour ton ennemi?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Veux-tu frapper une feuille agitée?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Veux-tu poursuivre une paille desséchée?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Pourquoi m’infliger d’amères souffrances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Me punir pour des fautes '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 25:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: de jeunesse?
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 33:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Pourquoi mettre mes pieds dans les ceps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surveiller tous mes mouvements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tracer une limite à mes pas,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Quand mon corps tombe en pourriture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un vêtement que dévore la teigne?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mais je veux parler au Tout-Puissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux plaider ma cause devant Dieu;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Car vous, vous n’imaginez que des faussetés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Vous êtes tous '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 16:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: des médecins de néant.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 17:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que n’avez-vous gardé le silence?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous auriez passé pour avoir de la sagesse.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Écoutez, je vous prie, ma défense,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et soyez attentifs à la réplique de mes lèvres.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 17:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 36:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Direz-vous en faveur de Dieu ce qui est injuste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pour le soutenir alléguerez-vous des faussetés?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Voulez-vous avoir égard à sa personne?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voulez-vous plaider pour Dieu?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: S’il vous sonde, vous approuvera-t-il?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou le tromperez-vous comme on trompe un homme?
