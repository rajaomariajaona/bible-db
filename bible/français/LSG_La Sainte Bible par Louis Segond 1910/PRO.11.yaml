document_id: PRO.11,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:36
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 25:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 16:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La balance fausse est en horreur à l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le poids juste lui est agréable.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Quand les justes sont heureux, la ville est dans la joie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et quand les méchants périssent, on pousse des cris d’allégresse.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: La ville s’élève par la bénédiction des hommes droits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais elle est renversée par la bouche des méchants.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Celui qui méprise son prochain est dépourvu de sens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’homme qui a de l’intelligence se tait.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Celui qui répand la calomnie dévoile les secrets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui a l’esprit fidèle les garde.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 R 12:1, etc.
      marker-yv: yv-n
    - type: text
      text: Quand la prudence fait défaut, le peuple tombe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le salut est dans le grand nombre des conseillers.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Celui qui cautionne autrui s’en trouve mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui craint de s’engager est en sécurité.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Une femme qui a de la grâce obtient la gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux qui ont de la force obtiennent la richesse.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: L’homme bon fait du bien à son âme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’homme cruel trouble sa propre chair.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Le méchant fait un gain trompeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui sème la justice a un salaire véritable.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ainsi la justice conduit à la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui poursuit le mal trouve la mort.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 16:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Quand vient l’orgueil, vient aussi l’ignominie;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 15:33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais la sagesse est avec les humbles.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ceux qui ont le cœur pervers sont en abomination à l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ceux dont la voie est intègre lui sont agréables.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 16:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Certes, le méchant ne restera pas impuni,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la postérité des justes sera sauvée.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Un anneau d’or au nez d’un pourceau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est une femme belle et dépourvue de sens.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Le désir des justes, c’est seulement le bien;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’attente des méchants, c’est la fureur.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Tel, qui donne libéralement, devient plus riche;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tel, qui épargne à l’excès, ne fait que s’appauvrir.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 112:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 9:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’âme bienfaisante sera rassasiée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celui qui arrose sera lui-même arrosé.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Celui qui retient le blé est maudit du peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la bénédiction est sur la tête de celui qui le vend.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Celui qui recherche le bien s’attire de la faveur,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 7:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 57:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais celui qui poursuit le mal en est atteint.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Celui qui se confie dans ses richesses tombera,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 1:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 92:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais les justes verdiront comme le feuillage.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Celui qui trouble sa maison héritera du vent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’insensé sera l’esclave de l’homme sage.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 13:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’intégrité des hommes droits les dirige,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les détours des perfides causent leur ruine.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Le fruit du juste est un arbre de vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le sage s’empare des âmes.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Voici, le juste reçoit sur la terre une rétribution;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 4:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Combien plus le méchant et le pécheur!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 10:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 7:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: So 1:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Au jour de la colère, la richesse ne sert à rien;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la justice délivre de la mort.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: La justice de l’homme intègre aplanit sa voie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le méchant tombe par sa méchanceté.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: La justice des hommes droits les délivre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais les méchants '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 5:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: sont pris par leur malice.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: A la mort du méchant, son espoir périt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’attente des hommes iniques est anéantie.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 34:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le juste est délivré de la détresse,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 21:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et le méchant prend sa place.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Par sa bouche l’impie perd son prochain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les justes sont délivrés par la science.
