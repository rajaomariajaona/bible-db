document_id: PRO.11,93
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Lé 19:36. De 25:13. Pr 16:11; 20:10, 23.
  - type: text
    content: La balance fausse est en horreur à l’Éternel,
  - type: text
    content: Mais le poids juste lui est agréable.
  '10':
  - type: text
    content: Quand les justes sont heureux, la ville est dans la joie;
  - type: text
    content: Et quand les méchants périssent, on pousse des cris d’allégresse.
  '11':
  - type: text
    content: La ville s’élève par la bénédiction des hommes droits,
  - type: text
    content: Mais elle est renversée par la bouche des méchants.
  '12':
  - type: text
    content: Celui qui méprise son prochain est dépourvu de sens,
  - type: text
    content: Mais l’homme qui a de l’intelligence se tait.
  '13':
  - type: text
    content: Celui qui répand la calomnie dévoile les secrets,
  - type: text
    content: Mais celui qui a l’esprit fidèle les garde.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 1 R 12:1, etc.
  - type: text
    content: Quand la prudence fait défaut, le peuple tombe;
  - type: text
    content: Et le salut est dans le grand nombre des conseillers.
  '15':
  - type: text
    content: Celui qui cautionne autrui s’en trouve mal,
  - type: text
    content: Mais celui qui craint de s’engager est en sécurité.
  '16':
  - type: text
    content: Une femme qui a de la grâce obtient la gloire,
  - type: text
    content: Et ceux qui ont de la force obtiennent la richesse.
  '17':
  - type: text
    content: L’homme bon fait du bien à son âme,
  - type: text
    content: Mais l’homme cruel trouble sa propre chair.
  '18':
  - type: text
    content: Le méchant fait un gain trompeur,
  - type: text
    content: Mais celui qui sème la justice a un salaire véritable.
  '19':
  - type: text
    content: Ainsi la justice conduit à la vie,
  - type: text
    content: Mais celui qui poursuit le mal trouve la mort.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Pr 16:18; 18:12.
  - type: text
    content: Quand vient l’orgueil, vient aussi l’ignominie;
  - type: note
    content: Pr 15:33; 18:12.
  - type: text
    content: Mais la sagesse est avec les humbles.
  '20':
  - type: text
    content: Ceux qui ont le cœur pervers sont en abomination à l’Éternel,
  - type: text
    content: Mais ceux dont la voie est intègre lui sont agréables.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Pr 16:5.
  - type: text
    content: Certes, le méchant ne restera pas impuni,
  - type: text
    content: Mais la postérité des justes sera sauvée.
  '22':
  - type: text
    content: Un anneau d’or au nez d’un pourceau,
  - type: text
    content: C’est une femme belle et dépourvue de sens.
  '23':
  - type: text
    content: Le désir des justes, c’est seulement le bien;
  - type: text
    content: L’attente des méchants, c’est la fureur.
  '24':
  - type: text
    content: Tel, qui donne libéralement, devient plus riche;
  - type: text
    content: Et tel, qui épargne à l’excès, ne fait que s’appauvrir.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Ps 112:9. 2 Co 9:9.
  - type: text
    content: L’âme bienfaisante sera rassasiée,
  - type: text
    content: Et celui qui arrose sera lui-même arrosé.
  '26':
  - type: text
    content: Celui qui retient le blé est maudit du peuple,
  - type: text
    content: Mais la bénédiction est sur la tête de celui qui le vend.
  '27':
  - type: text
    content: Celui qui recherche le bien s’attire de la faveur,
  - type: note
    content: Ps 7:17; 9:16; 10:2; 57:7.
  - type: text
    content: Mais celui qui poursuit le mal en est atteint.
  '28':
  - type: text
    content: Celui qui se confie dans ses richesses tombera,
  - type: note
    content: Ps 1:3, 4; 92:13.
  - type: text
    content: Mais les justes verdiront comme le feuillage.
  '29':
  - type: text
    content: Celui qui trouble sa maison héritera du vent,
  - type: text
    content: Et l’insensé sera l’esclave de l’homme sage.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Pr 13:6.
  - type: text
    content: L’intégrité des hommes droits les dirige,
  - type: text
    content: Mais les détours des perfides causent leur ruine.
  '30':
  - type: text
    content: Le fruit du juste est un arbre de vie,
  - type: text
    content: Et le sage s’empare des âmes.
  '31':
  - type: text
    content: Voici, le juste reçoit sur la terre une rétribution;
  - type: note
    content: 1 Pi 4:17, 18.
  - type: text
    content: Combien plus le méchant et le pécheur!
  '4':
  - type: text
    content: ' '
  - type: note
    content: Pr 10:2. Éz 7:19. So 1:18.
  - type: text
    content: Au jour de la colère, la richesse ne sert à rien;
  - type: text
    content: Mais la justice délivre de la mort.
  '5':
  - type: text
    content: La justice de l’homme intègre aplanit sa voie,
  - type: text
    content: Mais le méchant tombe par sa méchanceté.
  '6':
  - type: text
    content: La justice des hommes droits les délivre,
  - type: text
    content: 'Mais les méchants '
  - type: note
    content: Pr 5:22.
  - type: text
    content: sont pris par leur malice.
  '7':
  - type: text
    content: A la mort du méchant, son espoir périt,
  - type: text
    content: Et l’attente des hommes iniques est anéantie.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ps 34:20.
  - type: text
    content: Le juste est délivré de la détresse,
  - type: note
    content: Pr 21:18.
  - type: text
    content: Et le méchant prend sa place.
  '9':
  - type: text
    content: Par sa bouche l’impie perd son prochain,
  - type: text
    content: Mais les justes sont délivrés par la science.
