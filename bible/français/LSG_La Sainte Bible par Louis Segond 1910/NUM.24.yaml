document_id: NUM.24
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Balaam vit que l’Éternel trouvait bon de bénir Israël, et il n’alla point comme les autres fois, à la rencontre des enchantements; mais il tourna son visage du côté du désert. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Balaam leva les yeux, et vit Israël campé selon ses tribus. Alors l’esprit de Dieu fut sur lui. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Balaam prononça son oracle, et dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parole de Balaam, fils de Beor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parole de l’homme qui a l’œil ouvert,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Parole de celui qui entend les paroles de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De celui qui voit la vision du Tout-Puissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De celui qui se prosterne et dont les yeux s’ouvrent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Qu’elles sont belles, tes tentes, ô Jacob!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes demeures, ô Israël!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Elles s’étendent comme des vallées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme des jardins près d’un fleuve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme des aloès que l’Éternel a plantés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme des cèdres le long des eaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L’eau coule de ses seaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa semence est fécondée par d’abondantes eaux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son roi s’élève au-dessus d’Agag,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et son royaume devient puissant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dieu l’a fait sortir d’Égypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il est pour lui comme la vigueur '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 23:22
      metadata:
        usfm: NUM.23.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: du buffle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il dévore les nations qui s’élèvent contre lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il brise leurs os, et les abat de ses flèches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 49:9
      metadata:
        usfm: GEN.49.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 23:24
      metadata:
        usfm: NUM.23.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il ploie les genoux, il se couche comme un lion, comme une lionne:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui le fera lever?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Béni soit quiconque te bénira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et maudit soit quiconque te maudira!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'La colère de Balak s’enflamma contre Balaam; il frappa des mains, et dit à Balaam: C’est pour maudire mes ennemis que je t’ai appelé, et voici, tu les as bénis déjà trois fois. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fuis maintenant, va-t’en chez toi! J’avais dit que je te rendrais des honneurs, mais l’Éternel t’empêche de les recevoir. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Balaam répondit à Balak: Eh! N’ai-je pas dit aux messagers que tu m’as envoyés: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 22:18
      metadata:
        usfm: NUM.22.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand Balak me donnerait sa maison pleine d’argent et d’or, je ne pourrais faire de moi-même ni bien ni mal contre l’ordre de l’Éternel; je répéterai ce que dira l’Éternel? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Et maintenant voici, je m’en vais vers mon peuple. Viens, je t’annoncerai ce que ce peuple fera à ton peuple dans la suite des temps.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-25: cf. (2 S 7:8, 9; 8:2, 13, 14.) Ps 110. Mi 5:1, etc. És 60:1, etc.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Balaam prononça son oracle, et dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parole de Balaam, fils de Beor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parole de l’homme qui a l’œil ouvert,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Parole de celui qui entend les paroles de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De celui qui connaît les desseins du Très-Haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De celui qui voit la vision du Tout-Puissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De celui qui se prosterne et dont les yeux s’ouvrent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Je le vois, mais non maintenant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je le contemple, mais non de près.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un astre sort de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un sceptre s’élève d’Israël.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il perce les flancs de Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il abat tous les enfants de Seth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il se rend maître d’Édom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il se rend maître de Séir, ses ennemis.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël manifeste sa force.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 8:14
      metadata:
        usfm: 2SA.8.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui sort de Jacob règne en souverain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fait périr ceux qui s’échappent des villes.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Balaam vit Amalek. Il prononça son oracle, et dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amalek est la première des nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais un jour il sera détruit.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Balaam vit les Kéniens. Il prononça son oracle, et dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta demeure est solide,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ton nid posé sur le roc.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mais le Kénien sera chassé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand l’Assyrien t’emmènera captif.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Balaam prononça son oracle, et dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hélas! Qui vivra après que Dieu l’aura établi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mais des navires viendront de Kittim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils humilieront l’Assyrien, ils humilieront l’Hébreu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et lui aussi sera détruit.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Balaam se leva, partit, et retourna chez lui. Balak s’en alla aussi de son côté.
