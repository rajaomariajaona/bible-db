document_id: NUM.24,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'Balaam vit que l’Éternel trouvait bon de bénir Israël, et il n’alla point comme les autres fois, à la rencontre des enchantements; mais il tourna son visage du côté du désert. '
  '10':
  - type: text
    content: 'La colère de Balak s’enflamma contre Balaam; il frappa des mains, et dit à Balaam: C’est pour maudire mes ennemis que je t’ai appelé, et voici, tu les as bénis déjà trois fois. '
  '11':
  - type: text
    content: 'Fuis maintenant, va-t’en chez toi! J’avais dit que je te rendrais des honneurs, mais l’Éternel t’empêche de les recevoir. '
  '12':
  - type: text
    content: 'Balaam répondit à Balak: Eh! N’ai-je pas dit aux messagers que tu m’as envoyés: '
  '13':
  - type: note
    content: No 22:18.
  - type: text
    content: 'Quand Balak me donnerait sa maison pleine d’argent et d’or, je ne pourrais faire de moi-même ni bien ni mal contre l’ordre de l’Éternel; je répéterai ce que dira l’Éternel? '
  '14':
  - type: text
    content: Et maintenant voici, je m’en vais vers mon peuple. Viens, je t’annoncerai ce que ce peuple fera à ton peuple dans la suite des temps.
  - type: heading
    content: 'V. 15-25: cf. (2 S 7:8, 9; 8:2, 13, 14.) Ps 110. Mi 5:1, etc. És 60:1, etc.'
  '15':
  - type: text
    content: 'Balaam prononça son oracle, et dit:'
  - type: text
    content: Parole de Balaam, fils de Beor,
  - type: text
    content: Parole de l’homme qui a l’œil ouvert,
  '16':
  - type: text
    content: Parole de celui qui entend les paroles de Dieu,
  - type: text
    content: De celui qui connaît les desseins du Très-Haut,
  - type: text
    content: De celui qui voit la vision du Tout-Puissant,
  - type: text
    content: De celui qui se prosterne et dont les yeux s’ouvrent.
  '17':
  - type: text
    content: Je le vois, mais non maintenant,
  - type: text
    content: Je le contemple, mais non de près.
  - type: text
    content: Un astre sort de Jacob,
  - type: text
    content: Un sceptre s’élève d’Israël.
  - type: text
    content: Il perce les flancs de Moab,
  - type: text
    content: Et il abat tous les enfants de Seth.
  '18':
  - type: text
    content: Il se rend maître d’Édom,
  - type: text
    content: Il se rend maître de Séir, ses ennemis.
  - type: text
    content: Israël manifeste sa force.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 2 S 8:14.
  - type: text
    content: Celui qui sort de Jacob règne en souverain,
  - type: text
    content: Il fait périr ceux qui s’échappent des villes.
  '2':
  - type: text
    content: 'Balaam leva les yeux, et vit Israël campé selon ses tribus. Alors l’esprit de Dieu fut sur lui. '
  '20':
  - type: text
    content: 'Balaam vit Amalek. Il prononça son oracle, et dit:'
  - type: text
    content: Amalek est la première des nations,
  - type: text
    content: Mais un jour il sera détruit.
  '21':
  - type: text
    content: 'Balaam vit les Kéniens. Il prononça son oracle, et dit:'
  - type: text
    content: Ta demeure est solide,
  - type: text
    content: Et ton nid posé sur le roc.
  '22':
  - type: text
    content: Mais le Kénien sera chassé,
  - type: text
    content: Quand l’Assyrien t’emmènera captif.
  '23':
  - type: text
    content: 'Balaam prononça son oracle, et dit:'
  - type: text
    content: Hélas! Qui vivra après que Dieu l’aura établi?
  '24':
  - type: text
    content: Mais des navires viendront de Kittim,
  - type: text
    content: Ils humilieront l’Assyrien, ils humilieront l’Hébreu;
  - type: text
    content: Et lui aussi sera détruit.
  '25':
  - type: text
    content: Balaam se leva, partit, et retourna chez lui. Balak s’en alla aussi de son côté.
  '3':
  - type: text
    content: 'Balaam prononça son oracle, et dit:'
  - type: text
    content: Parole de Balaam, fils de Beor,
  - type: text
    content: Parole de l’homme qui a l’œil ouvert,
  '4':
  - type: text
    content: Parole de celui qui entend les paroles de Dieu,
  - type: text
    content: De celui qui voit la vision du Tout-Puissant,
  - type: text
    content: De celui qui se prosterne et dont les yeux s’ouvrent.
  '5':
  - type: text
    content: Qu’elles sont belles, tes tentes, ô Jacob!
  - type: text
    content: Tes demeures, ô Israël!
  '6':
  - type: text
    content: Elles s’étendent comme des vallées,
  - type: text
    content: Comme des jardins près d’un fleuve,
  - type: text
    content: Comme des aloès que l’Éternel a plantés,
  - type: text
    content: Comme des cèdres le long des eaux.
  '7':
  - type: text
    content: L’eau coule de ses seaux,
  - type: text
    content: Et sa semence est fécondée par d’abondantes eaux.
  - type: text
    content: Son roi s’élève au-dessus d’Agag,
  - type: text
    content: Et son royaume devient puissant.
  '8':
  - type: text
    content: Dieu l’a fait sortir d’Égypte,
  - type: text
    content: 'Il est pour lui comme la vigueur '
  - type: note
    content: No 23:22.
  - type: text
    content: du buffle.
  - type: text
    content: Il dévore les nations qui s’élèvent contre lui,
  - type: text
    content: Il brise leurs os, et les abat de ses flèches.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ge 49:9. No 23:24.
  - type: text
    content: 'Il ploie les genoux, il se couche comme un lion, comme une lionne:'
  - type: text
    content: Qui le fera lever?
  - type: text
    content: Béni soit quiconque te bénira,
  - type: text
    content: Et maudit soit quiconque te maudira!
