document_id: PRO.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-21: cf. Pr 9:1-12; 2:1-9; 3:1-26; 4:1-13.'
  - type: text
    content: ' '
  - type: note
    content: Pr 1:20, 21.
  - type: text
    content: La sagesse ne crie-t-elle pas?
  - type: text
    content: L’intelligence n’élève-t-elle pas sa voix?
  '10':
  - type: text
    content: Préférez mes instructions à l’argent,
  - type: text
    content: Et la science à l’or le plus précieux;
  '11':
  - type: text
    content: ' '
  - type: note
    content: Job 28:15. Ps 19:11. Pr 3:14, 15; 16:16.
  - type: text
    content: Car la sagesse vaut mieux que les perles,
  - type: text
    content: Elle a plus de valeur que tous les objets de prix.
  '12':
  - type: text
    content: Moi, la sagesse, j’ai pour demeure le discernement,
  - type: text
    content: Et je possède la science de la réflexion.
  '13':
  - type: text
    content: La crainte de l’Éternel, c’est la haine du mal;
  - type: text
    content: L’arrogance et l’orgueil, la voie du mal,
  - type: text
    content: Et la bouche perverse, voilà ce que je hais.
  '14':
  - type: text
    content: Le conseil et le succès m’appartiennent;
  - type: text
    content: Je suis l’intelligence, la force est à moi.
  '15':
  - type: text
    content: Par moi les rois règnent,
  - type: text
    content: Et les princes ordonnent ce qui est juste;
  '16':
  - type: text
    content: Par moi gouvernent les chefs,
  - type: text
    content: Les grands, tous les juges de la terre.
  '17':
  - type: text
    content: J’aime ceux qui m’aiment,
  - type: text
    content: Et ceux qui me cherchent me trouvent.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Pr 3:16.
  - type: text
    content: Avec moi sont la richesse et la gloire,
  - type: text
    content: Les biens durables et la justice.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Pr 3:14.
  - type: text
    content: Mon fruit est meilleur que l’or, que l’or pur,
  - type: text
    content: Et mon produit est préférable à l’argent.
  '2':
  - type: text
    content: C’est au sommet des hauteurs près de la route,
  - type: text
    content: C’est à la croisée des chemins qu’elle se place;
  '20':
  - type: text
    content: Je marche dans le chemin de la justice,
  - type: text
    content: Au milieu des sentiers de la droiture,
  '21':
  - type: text
    content: Pour donner des biens à ceux qui m’aiment,
  - type: text
    content: Et pour remplir leurs trésors.
  - type: heading
    content: 'V. 22-36: cf. Pr 3:19, 20. (Jn 1:1-4. Col 1:15-17.)'
  '22':
  - type: text
    content: L’Éternel m’a créée la première de ses œuvres,
  - type: text
    content: Avant ses œuvres les plus anciennes.
  '23':
  - type: text
    content: J’ai été établie depuis l’éternité,
  - type: note
    content: Jn 1:1.
  - type: text
    content: Dès le commencement, avant l’origine de la terre.
  '24':
  - type: text
    content: Je fus enfantée quand il n’y avait point d’abîmes,
  - type: text
    content: Point de sources chargées d’eaux;
  '25':
  - type: text
    content: Avant que les montagnes soient affermies,
  - type: text
    content: Avant que les collines existent, je fus enfantée;
  '26':
  - type: text
    content: Il n’avait encore fait ni la terre, ni les campagnes,
  - type: text
    content: Ni le premier atome de la poussière du monde.
  '27':
  - type: text
    content: Lorsqu’il disposa les cieux, j’étais là;
  - type: note
    content: Job 26:10.
  - type: text
    content: Lorsqu’il traça un cercle à la surface de l’abîme,
  '28':
  - type: text
    content: Lorsqu’il fixa les nuages en haut,
  - type: note
    content: Ge 7:11.
  - type: text
    content: Et que les sources de l’abîme jaillirent avec force,
  '29':
  - type: text
    content: Lorsqu’il donna une limite à la mer,
  - type: note
    content: Ge 1:9, 10. Job 38:10, 11. Ps 104:9.
  - type: text
    content: Pour que les eaux n’en franchissent pas les bords,
  - type: text
    content: Lorsqu’il posa les fondements de la terre,
  '3':
  - type: text
    content: A côté des portes, à l’entrée de la ville,
  - type: text
    content: 'A l’intérieur des portes, elle fait entendre ses cris:'
  '30':
  - type: text
    content: J’étais à l’œuvre auprès de lui,
  - type: text
    content: Et je faisais tous les jours ses délices,
  - type: note
    content: Jn 5:17.
  - type: text
    content: Jouant sans cesse en sa présence,
  '31':
  - type: text
    content: Jouant sur le globe de sa terre,
  - type: text
    content: Et trouvant mon bonheur parmi les fils de l’homme.
  '32':
  - type: text
    content: Et maintenant, mes fils, écoutez-moi,
  - type: text
    content: 'Et '
  - type: note
    content: Ps 119:1, 2; 128:1. Lu 11:28.
  - type: text
    content: heureux ceux qui observent mes voies!
  '33':
  - type: text
    content: Écoutez l’instruction, pour devenir sages,
  - type: text
    content: Ne la rejetez pas.
  '34':
  - type: text
    content: Heureux l’homme qui m’écoute,
  - type: text
    content: Qui veille chaque jour à mes portes,
  - type: text
    content: Et qui en garde les poteaux!
  '35':
  - type: text
    content: Car celui qui me trouve a trouvé la vie,
  - type: note
    content: Pr 12:2.
  - type: text
    content: Et il obtient la faveur de l’Éternel.
  '36':
  - type: text
    content: Mais celui qui pèche contre moi nuit à son âme;
  - type: text
    content: Tous ceux qui me haïssent aiment la mort.
  '4':
  - type: text
    content: Hommes, c’est à vous que je crie,
  - type: text
    content: Et ma voix s’adresse aux fils de l’homme.
  '5':
  - type: text
    content: Stupides, apprenez le discernement;
  - type: text
    content: Insensés, apprenez l’intelligence.
  '6':
  - type: text
    content: Écoutez, car j’ai de grandes choses à dire,
  - type: text
    content: Et mes lèvres s’ouvrent pour enseigner ce qui est droit.
  '7':
  - type: text
    content: Car ma bouche proclame la vérité,
  - type: text
    content: Et mes lèvres ont en horreur le mensonge;
  '8':
  - type: text
    content: Toutes les paroles de ma bouche sont justes,
  - type: text
    content: Elles n’ont rien de faux ni de détourné;
  '9':
  - type: text
    content: Toutes sont claires pour celui qui est intelligent,
  - type: text
    content: Et droites pour ceux qui ont trouvé la science.
