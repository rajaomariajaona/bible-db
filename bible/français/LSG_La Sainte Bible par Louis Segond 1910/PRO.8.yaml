document_id: PRO.8
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-21: cf. Pr 9:1-12; 2:1-9; 3:1-26; 4:1-13.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 1:20
      metadata:
        usfm: PRO.1.20
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '21'
      metadata:
        usfm: PRO.1.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La sagesse ne crie-t-elle pas?
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’intelligence n’élève-t-elle pas sa voix?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: C’est au sommet des hauteurs près de la route,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est à la croisée des chemins qu’elle se place;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: A côté des portes, à l’entrée de la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A l’intérieur des portes, elle fait entendre ses cris:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hommes, c’est à vous que je crie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ma voix s’adresse aux fils de l’homme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Stupides, apprenez le discernement;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Insensés, apprenez l’intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Écoutez, car j’ai de grandes choses à dire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mes lèvres s’ouvrent pour enseigner ce qui est droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Car ma bouche proclame la vérité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mes lèvres ont en horreur le mensonge;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Toutes les paroles de ma bouche sont justes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles n’ont rien de faux ni de détourné;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Toutes sont claires pour celui qui est intelligent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et droites pour ceux qui ont trouvé la science.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Préférez mes instructions à l’argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la science à l’or le plus précieux;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 28:15
      metadata:
        usfm: JOB.28.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 19:11
      metadata:
        usfm: PSA.19.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 3:14
      metadata:
        usfm: PRO.3.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: PRO.3.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:16
      metadata:
        usfm: PRO.16.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car la sagesse vaut mieux que les perles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle a plus de valeur que tous les objets de prix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Moi, la sagesse, j’ai pour demeure le discernement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je possède la science de la réflexion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: La crainte de l’Éternel, c’est la haine du mal;
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’arrogance et l’orgueil, la voie du mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la bouche perverse, voilà ce que je hais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Le conseil et le succès m’appartiennent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis l’intelligence, la force est à moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Par moi les rois règnent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les princes ordonnent ce qui est juste;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Par moi gouvernent les chefs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les grands, tous les juges de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: J’aime ceux qui m’aiment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ceux qui me cherchent me trouvent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 3:16
      metadata:
        usfm: PRO.3.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Avec moi sont la richesse et la gloire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les biens durables et la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 3:14
      metadata:
        usfm: PRO.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mon fruit est meilleur que l’or, que l’or pur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mon produit est préférable à l’argent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Je marche dans le chemin de la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au milieu des sentiers de la droiture,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Pour donner des biens à ceux qui m’aiment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pour remplir leurs trésors.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-36: cf. Pr 3:19, 20. (Jn 1:1-4. Col 1:15-17.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: L’Éternel m’a créée la première de ses œuvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avant ses œuvres les plus anciennes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: J’ai été établie depuis l’éternité,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:1
      metadata:
        usfm: JHN.1.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Dès le commencement, avant l’origine de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je fus enfantée quand il n’y avait point d’abîmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Point de sources chargées d’eaux;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Avant que les montagnes soient affermies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avant que les collines existent, je fus enfantée;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il n’avait encore fait ni la terre, ni les campagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni le premier atome de la poussière du monde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Lorsqu’il disposa les cieux, j’étais là;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 26:10
      metadata:
        usfm: JOB.26.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Lorsqu’il traça un cercle à la surface de l’abîme,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Lorsqu’il fixa les nuages en haut,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 7:11
      metadata:
        usfm: GEN.7.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et que les sources de l’abîme jaillirent avec force,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Lorsqu’il donna une limite à la mer,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 1:9
      metadata:
        usfm: GEN.1.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: GEN.1.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 38:10
      metadata:
        usfm: JOB.38.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: JOB.38.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 104:9
      metadata:
        usfm: PSA.104.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pour que les eaux n’en franchissent pas les bords,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lorsqu’il posa les fondements de la terre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: J’étais à l’œuvre auprès de lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je faisais tous les jours ses délices,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 5:17
      metadata:
        usfm: JHN.5.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Jouant sans cesse en sa présence,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Jouant sur le globe de sa terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et trouvant mon bonheur parmi les fils de l’homme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Et maintenant, mes fils, écoutez-moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 119:1
      metadata:
        usfm: PSA.119.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: PSA.119.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 128:1
      metadata:
        usfm: PSA.128.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 11:28
      metadata:
        usfm: LUK.11.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: heureux ceux qui observent mes voies!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Écoutez l’instruction, pour devenir sages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne la rejetez pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Heureux l’homme qui m’écoute,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui veille chaque jour à mes portes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui en garde les poteaux!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Car celui qui me trouve a trouvé la vie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 12:2
      metadata:
        usfm: PRO.12.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et il obtient la faveur de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Mais celui qui pèche contre moi nuit à son âme;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui me haïssent aiment la mort.
