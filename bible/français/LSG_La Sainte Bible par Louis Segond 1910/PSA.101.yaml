document_id: PSA.101,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 S 8:15; 23:3, 4.) (Ge 18:19. Jos 24:15.) Ac 24:16. Ps 1.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De David. Psaume.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je chanterai la bonté et la justice;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est à toi, Éternel! Que je chanterai.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je prendrai garde à la voie droite.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand viendras-tu à moi?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je marcherai dans l’intégrité de mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu de ma maison.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne mettrai rien de mauvais devant mes yeux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je hais la conduite des pécheurs;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle ne s’attachera point à moi.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le cœur pervers s’éloignera de moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne veux pas connaître le méchant.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui calomnie en secret son prochain, je l’anéantirai;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui a des regards hautains et un cœur enflé, je ne le supporterai pas.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’aurai les yeux sur les fidèles du pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour qu’ils demeurent auprès de moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui marche dans une voie intègre sera mon serviteur.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui se livre à la fraude n’habitera pas dans ma maison;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui dit des mensonges ne subsistera pas en ma présence.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chaque matin j’anéantirai tous les méchants du pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin d’exterminer de la ville de l’Éternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui commettent l’iniquité.
