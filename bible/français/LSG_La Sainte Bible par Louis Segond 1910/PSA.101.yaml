document_id: PSA.101,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (2 S 8:15; 23:3, 4.) (Ge 18:19. Jos 24:15.) Ac 24:16. Ps 1.
  - type: text
    content: De David. Psaume.
  - type: text
    content: Je chanterai la bonté et la justice;
  - type: text
    content: C’est à toi, Éternel! Que je chanterai.
  '2':
  - type: text
    content: Je prendrai garde à la voie droite.
  - type: text
    content: Quand viendras-tu à moi?
  - type: text
    content: Je marcherai dans l’intégrité de mon cœur,
  - type: text
    content: Au milieu de ma maison.
  '3':
  - type: text
    content: Je ne mettrai rien de mauvais devant mes yeux;
  - type: text
    content: Je hais la conduite des pécheurs;
  - type: text
    content: Elle ne s’attachera point à moi.
  '4':
  - type: text
    content: Le cœur pervers s’éloignera de moi;
  - type: text
    content: Je ne veux pas connaître le méchant.
  '5':
  - type: text
    content: Celui qui calomnie en secret son prochain, je l’anéantirai;
  - type: text
    content: Celui qui a des regards hautains et un cœur enflé, je ne le supporterai pas.
  '6':
  - type: text
    content: J’aurai les yeux sur les fidèles du pays,
  - type: text
    content: Pour qu’ils demeurent auprès de moi;
  - type: text
    content: Celui qui marche dans une voie intègre sera mon serviteur.
  '7':
  - type: text
    content: Celui qui se livre à la fraude n’habitera pas dans ma maison;
  - type: text
    content: Celui qui dit des mensonges ne subsistera pas en ma présence.
  '8':
  - type: text
    content: Chaque matin j’anéantirai tous les méchants du pays,
  - type: text
    content: Afin d’exterminer de la ville de l’Éternel
  - type: text
    content: Tous ceux qui commettent l’iniquité.
