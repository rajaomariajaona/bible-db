document_id: JER.27
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La soumission au roi de Babylone conseillée par Jérémie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. Jé 25:9-29. 2 R 24:17-20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au commencement du règne de Jojakim, fils de Josias, roi de Juda, cette parole fut adressée à Jérémie de la part de l’Éternel, en ces mots: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ainsi m’a parlé l’Éternel: Fais-toi des liens et des jougs, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 28:10
      metadata:
        usfm: JER.28.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mets-les sur ton cou. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Envoie-les au roi d’Édom, au roi de Moab, au roi des enfants d’Ammon, au roi de Tyr et au roi de Sidon, par les envoyés qui sont venus à Jérusalem auprès de Sédécias, roi de Juda, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et à qui tu donneras mes ordres pour leurs maîtres, en disant: Ainsi parle l’Éternel des armées, le Dieu d’Israël: Voici ce que vous direz à vos maîtres: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'C’est moi qui ai fait la terre, les hommes et les animaux qui sont sur la terre, par ma grande puissance et par mon bras étendu, et je '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 4:17
      metadata:
        usfm: DAN.4.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: DAN.4.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'donne la terre à qui cela me plaît. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Maintenant je livre tous ces pays entre les mains de Nebucadnetsar, roi de Babylone, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 25:9
      metadata:
        usfm: JER.25.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mon serviteur; je lui donne aussi les animaux des champs, pour qu’ils lui soient assujettis. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Toutes les nations lui seront soumises, à lui, à son fils, et au fils de son fils, jusqu’à ce que le temps de son pays arrive, et que des nations puissantes et de grands rois l’asservissent. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Si une nation, si un royaume ne se soumet pas à lui, à Nebucadnetsar, roi de Babylone, et ne livre pas son cou au joug du roi de Babylone, je châtierai cette nation par l’épée, par la famine et par la peste, dit l’Éternel, jusqu’à ce que je l’aie anéantie par sa main. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et vous, n’écoutez pas vos prophètes, vos devins, vos songeurs, vos astrologues, vos magiciens, qui vous disent: Vous ne serez point asservis au roi de Babylone! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Car c’est le mensonge qu’ils vous prophétisent, afin que vous soyez éloignés de votre pays, afin que je vous chasse et que vous périssiez. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais la nation qui pliera son cou sous le joug du roi de Babylone, et qui lui sera soumise, je la laisserai dans son pays, dit l’Éternel, pour qu’elle le cultive et qu’elle y demeure.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-22: cf. 2 Ch 36:10-13. Jé 28.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'J’ai dit entièrement les mêmes choses à Sédécias, roi de Juda: Pliez votre cou sous le joug du roi de Babylone, soumettez-vous à lui et à son peuple, et vous vivrez. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Pourquoi mourriez-vous, toi et ton peuple, par l’épée, par la famine et par la peste, comme l’Éternel l’a prononcé sur la nation qui ne se soumettra pas au roi de Babylone? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 14:14
      metadata:
        usfm: JER.14.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:21
      metadata:
        usfm: JER.23.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:8
      metadata:
        usfm: JER.29.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'N’écoutez pas les paroles des prophètes qui vous disent: Vous ne serez point asservis au roi de Babylone! Car c’est le mensonge qu’ils vous prophétisent. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Je ne les ai point envoyés, dit l’Éternel, et ils prophétisent le mensonge en mon nom, afin que je vous chasse et que vous périssiez, vous et les prophètes qui vous prophétisent. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'J’ai dit aux sacrificateurs et à tout ce peuple: Ainsi parle l’Éternel: N’écoutez pas les paroles de vos prophètes qui vous prophétisent, disant: Voici, les ustensiles de la maison de l’Éternel seront '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 28:3
      metadata:
        usfm: JER.28.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'bientôt rapportés de Babylone! Car c’est le mensonge qu’ils vous prophétisent. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ne les écoutez pas, soumettez-vous au roi de Babylone, et vous vivrez. Pourquoi cette ville deviendrait-elle une ruine? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'S’ils sont prophètes et si la parole de l’Éternel est avec eux, qu’ils intercèdent auprès de l’Éternel des armées pour que les ustensiles qui restent dans la maison de l’Éternel, dans la maison du roi de Juda, et dans Jérusalem, ne s’en aillent point à Babylone. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Car ainsi parle l’Éternel des armées au sujet des colonnes, de la mer, des bases, et des autres ustensiles qui sont restés dans cette ville, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'qui n’ont pas été enlevés par Nebucadnetsar, roi de Babylone, lorsqu’il emmena '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 24:14
      metadata:
        usfm: 2KI.24.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: 2KI.24.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'captifs de Jérusalem à Babylone Jeconia, fils de Jojakim, roi de Juda, et tous les grands de Juda et de Jérusalem, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ainsi parle l’Éternel des armées, le Dieu d’Israël, au sujet des ustensiles qui restent dans la maison de l’Éternel, dans la maison du roi de Juda, et dans Jérusalem: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils seront '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 25:13
      metadata:
        usfm: 2KI.25.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 36:18
      metadata:
        usfm: 2CH.36.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'emportés à Babylone, et ils y resteront jusqu’au jour où je les chercherai, dit l’Éternel, où je les ferai remonter et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 36:22
      metadata:
        usfm: 2CH.36.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 29:10
      metadata:
        usfm: JER.29.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: revenir dans ce lieu.
