document_id: JER.27,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La soumission au roi de Babylone conseillée par Jérémie
  - type: heading
    content: 'V. 1-11: cf. Jé 25:9-29. 2 R 24:17-20.'
  - type: text
    content: 'Au commencement du règne de Jojakim, fils de Josias, roi de Juda, cette parole fut adressée à Jérémie de la part de l’Éternel, en ces mots: '
  '10':
  - type: text
    content: 'Car c’est le mensonge qu’ils vous prophétisent, afin que vous soyez éloignés de votre pays, afin que je vous chasse et que vous périssiez. '
  '11':
  - type: text
    content: Mais la nation qui pliera son cou sous le joug du roi de Babylone, et qui lui sera soumise, je la laisserai dans son pays, dit l’Éternel, pour qu’elle le cultive et qu’elle y demeure.
  - type: heading
    content: 'V. 12-22: cf. 2 Ch 36:10-13. Jé 28.'
  '12':
  - type: text
    content: 'J’ai dit entièrement les mêmes choses à Sédécias, roi de Juda: Pliez votre cou sous le joug du roi de Babylone, soumettez-vous à lui et à son peuple, et vous vivrez. '
  '13':
  - type: text
    content: 'Pourquoi mourriez-vous, toi et ton peuple, par l’épée, par la famine et par la peste, comme l’Éternel l’a prononcé sur la nation qui ne se soumettra pas au roi de Babylone? '
  '14':
  - type: note
    content: Jé 14:14; 23:21; 29:8.
  - type: text
    content: 'N’écoutez pas les paroles des prophètes qui vous disent: Vous ne serez point asservis au roi de Babylone! Car c’est le mensonge qu’ils vous prophétisent. '
  '15':
  - type: text
    content: 'Je ne les ai point envoyés, dit l’Éternel, et ils prophétisent le mensonge en mon nom, afin que je vous chasse et que vous périssiez, vous et les prophètes qui vous prophétisent. '
  '16':
  - type: text
    content: 'J’ai dit aux sacrificateurs et à tout ce peuple: Ainsi parle l’Éternel: N’écoutez pas les paroles de vos prophètes qui vous prophétisent, disant: Voici, les ustensiles de la maison de l’Éternel seront '
  - type: note
    content: Jé 28:3.
  - type: text
    content: 'bientôt rapportés de Babylone! Car c’est le mensonge qu’ils vous prophétisent. '
  '17':
  - type: text
    content: 'Ne les écoutez pas, soumettez-vous au roi de Babylone, et vous vivrez. Pourquoi cette ville deviendrait-elle une ruine? '
  '18':
  - type: text
    content: 'S’ils sont prophètes et si la parole de l’Éternel est avec eux, qu’ils intercèdent auprès de l’Éternel des armées pour que les ustensiles qui restent dans la maison de l’Éternel, dans la maison du roi de Juda, et dans Jérusalem, ne s’en aillent point à Babylone. '
  '19':
  - type: text
    content: 'Car ainsi parle l’Éternel des armées au sujet des colonnes, de la mer, des bases, et des autres ustensiles qui sont restés dans cette ville, '
  '2':
  - type: text
    content: 'Ainsi m’a parlé l’Éternel: Fais-toi des liens et des jougs, et '
  - type: note
    content: Jé 28:10.
  - type: text
    content: 'mets-les sur ton cou. '
  '20':
  - type: text
    content: 'qui n’ont pas été enlevés par Nebucadnetsar, roi de Babylone, lorsqu’il emmena '
  - type: note
    content: 2 R 24:14, 15.
  - type: text
    content: 'captifs de Jérusalem à Babylone Jeconia, fils de Jojakim, roi de Juda, et tous les grands de Juda et de Jérusalem, '
  '21':
  - type: text
    content: 'ainsi parle l’Éternel des armées, le Dieu d’Israël, au sujet des ustensiles qui restent dans la maison de l’Éternel, dans la maison du roi de Juda, et dans Jérusalem: '
  '22':
  - type: text
    content: 'Ils seront '
  - type: note
    content: 2 R 25:13. 2 Ch 36:18.
  - type: text
    content: 'emportés à Babylone, et ils y resteront jusqu’au jour où je les chercherai, dit l’Éternel, où je les ferai remonter et '
  - type: note
    content: 2 Ch 36:22. Jé 29:10.
  - type: text
    content: revenir dans ce lieu.
  '3':
  - type: text
    content: 'Envoie-les au roi d’Édom, au roi de Moab, au roi des enfants d’Ammon, au roi de Tyr et au roi de Sidon, par les envoyés qui sont venus à Jérusalem auprès de Sédécias, roi de Juda, '
  '4':
  - type: text
    content: 'et à qui tu donneras mes ordres pour leurs maîtres, en disant: Ainsi parle l’Éternel des armées, le Dieu d’Israël: Voici ce que vous direz à vos maîtres: '
  '5':
  - type: text
    content: 'C’est moi qui ai fait la terre, les hommes et les animaux qui sont sur la terre, par ma grande puissance et par mon bras étendu, et je '
  - type: note
    content: Da 4:17, 25.
  - type: text
    content: 'donne la terre à qui cela me plaît. '
  '6':
  - type: text
    content: 'Maintenant je livre tous ces pays entre les mains de Nebucadnetsar, roi de Babylone, '
  - type: note
    content: Jé 25:9.
  - type: text
    content: 'mon serviteur; je lui donne aussi les animaux des champs, pour qu’ils lui soient assujettis. '
  '7':
  - type: text
    content: 'Toutes les nations lui seront soumises, à lui, à son fils, et au fils de son fils, jusqu’à ce que le temps de son pays arrive, et que des nations puissantes et de grands rois l’asservissent. '
  '8':
  - type: text
    content: 'Si une nation, si un royaume ne se soumet pas à lui, à Nebucadnetsar, roi de Babylone, et ne livre pas son cou au joug du roi de Babylone, je châtierai cette nation par l’épée, par la famine et par la peste, dit l’Éternel, jusqu’à ce que je l’aie anéantie par sa main. '
  '9':
  - type: text
    content: 'Et vous, n’écoutez pas vos prophètes, vos devins, vos songeurs, vos astrologues, vos magiciens, qui vous disent: Vous ne serez point asservis au roi de Babylone! '
