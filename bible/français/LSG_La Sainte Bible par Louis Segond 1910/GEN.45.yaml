document_id: GEN.45,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-15: cf. (Ge 44:33, 34. Ac 7:13.) Ép 4:32 à 5:2.'
  - type: text
    content: 'Joseph ne pouvait plus se contenir devant tous ceux qui l’entouraient. Il s’écria: Faites sortir tout le monde. Et il ne resta personne avec Joseph, quand il se fit connaître à ses frères. '
  '10':
  - type: text
    content: 'Tu habiteras dans le pays de Gosen, et tu seras près de moi, toi, tes fils, et les fils de tes fils, tes brebis et tes bœufs, et tout ce qui est à toi. '
  '11':
  - type: text
    content: 'Là, je te nourrirai, car il y aura encore cinq années de famine; et ainsi tu ne périras point, toi, ta maison, et tout ce qui est à toi. '
  '12':
  - type: text
    content: 'Vous voyez de vos yeux, et mon frère Benjamin voit de ses yeux que c’est moi-même qui vous parle. '
  '13':
  - type: text
    content: 'Racontez à mon père toute ma gloire en Égypte, et tout ce que vous avez vu; et '
  - type: note
    content: Ac 7:14.
  - type: text
    content: 'vous ferez descendre ici mon père au plus tôt. '
  '14':
  - type: text
    content: 'Il se jeta au cou de Benjamin, son frère, et pleura; et Benjamin pleura sur son cou. '
  '15':
  - type: text
    content: Il embrassa aussi tous ses frères, en pleurant. Après quoi, ses frères s’entretinrent avec lui.
  - type: heading
    content: 'V. 16-28: cf. Ge 46:1-7, 28-30.'
  '16':
  - type: text
    content: 'Le bruit se répandit dans la maison de Pharaon que les frères de Joseph étaient arrivés: ce qui fut agréable à Pharaon et à ses serviteurs. '
  '17':
  - type: text
    content: 'Pharaon dit à Joseph: Dis à tes frères: Faites ceci. Chargez vos bêtes, et partez pour le pays de Canaan; '
  '18':
  - type: text
    content: 'prenez votre père et vos familles, et venez auprès de moi. Je vous donnerai ce qu’il y a de meilleur au pays d’Égypte, et vous mangerez la graisse du pays. '
  '19':
  - type: text
    content: 'Tu as ordre de leur dire: Faites ceci. Prenez dans le pays d’Égypte des chars pour vos enfants et pour vos femmes; amenez votre père, et venez. '
  '2':
  - type: text
    content: 'Il éleva la voix, en pleurant. Les Égyptiens l’entendirent, et la maison de Pharaon l’entendit. '
  '20':
  - type: text
    content: 'Ne regrettez point ce que vous laisserez, car ce qu’il y a de meilleur dans tout le pays d’Égypte sera pour vous. '
  '21':
  - type: text
    content: 'Les fils d’Israël firent ainsi. Joseph leur donna des chars, selon l’ordre de Pharaon; il leur donna aussi des provisions pour la route. '
  '22':
  - type: text
    content: 'Il leur donna à tous des vêtements de rechange, et il donna à Benjamin trois cents sicles d’argent et cinq vêtements de rechange. '
  '23':
  - type: text
    content: 'Il envoya à son père dix ânes chargés de ce qu’il y avait de meilleur en Égypte, et dix ânesses chargées de blé, de pain et de vivres, pour son père pendant le voyage. '
  '24':
  - type: text
    content: 'Puis il congédia ses frères, qui partirent; et il leur dit: Ne vous querellez pas en chemin. '
  '25':
  - type: text
    content: 'Ils remontèrent de l’Égypte, et ils arrivèrent dans le pays de Canaan, auprès de Jacob, leur père. '
  '26':
  - type: text
    content: 'Ils lui dirent: Joseph vit encore, et même c’est lui qui gouverne tout le pays d’Égypte. Mais le cœur de Jacob resta froid, parce qu’il ne les croyait pas. '
  '27':
  - type: text
    content: 'Ils lui rapportèrent toutes les paroles que Joseph leur avait dites. Il vit les chars que Joseph avait envoyés pour le transporter. C’est alors que l’esprit de Jacob, leur père, se ranima; '
  '28':
  - type: text
    content: 'et Israël dit: C’est assez! Joseph, mon fils, vit encore! J’irai, et je le verrai avant que je meure.'
  '3':
  - type: text
    content: 'Joseph dit à ses frères: Je suis Joseph! Mon père vit-il encore? Mais ses frères ne purent lui répondre, car ils étaient troublés en sa présence. '
  '4':
  - type: text
    content: 'Joseph dit à ses frères: Approchez-vous de moi. Et ils s’approchèrent. Il dit: '
  - type: note
    content: Ac 7:13.
  - type: text
    content: 'Je suis Joseph, votre frère, '
  - type: note
    content: Ge 37:28. Ps 105:17. Ac 7:9.
  - type: text
    content: 'que vous avez vendu pour être mené en Égypte. '
  '5':
  - type: text
    content: 'Maintenant, '
  - type: note
    content: 'Ge 50: 19, 20, 21.'
  - type: text
    content: 'ne vous affligez pas, et ne soyez pas fâchés de m’avoir vendu pour être conduit ici, car c’est pour vous sauver la vie que Dieu m’a envoyé devant vous. '
  '6':
  - type: text
    content: 'Voilà deux ans que la famine est dans le pays; et pendant cinq années encore, il n’y aura ni labour, ni moisson. '
  '7':
  - type: text
    content: 'Dieu m’a envoyé devant vous pour vous faire subsister dans le pays, et pour vous faire vivre par une grande délivrance. '
  '8':
  - type: text
    content: 'Ce n’est donc pas vous qui m’avez envoyé ici, mais c’est Dieu; il m’a établi père de Pharaon, maître de toute sa maison, et gouverneur de tout le pays d’Égypte. '
  '9':
  - type: text
    content: 'Hâtez-vous de remonter auprès de mon père, et vous lui direz: Ainsi a parlé ton fils Joseph: Dieu m’a établi seigneur de toute l’Égypte; descends vers moi, ne tarde pas! '
