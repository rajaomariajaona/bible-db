  - type: text
    content: 'Jésus enseigna en paroles et en actes de puissance. Il chargea ses disciples de continuer cette œuvre: '
  - type: text
    content: «Tout pouvoir m’a été donné dans le ciel et sur la terre. Allez, faites de toutes les nations mes disciples, les baptisant au nom du Père, du Fils et du Saint-Esprit, et enseignez-leur à observer tout ce que je vous ai prescrit. Et voici, je suis avec vous tous les jours, jusqu’à la fin du monde»
  - type: text
    content: ' (Matt 28:18-20).'
