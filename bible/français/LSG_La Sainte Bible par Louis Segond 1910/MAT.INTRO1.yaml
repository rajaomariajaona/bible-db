    - type: text
      text: INTRODUCTION À L’ÉVANGILE SELON MATTHIEU
  - type: usfm
    marker: imt3
    children:
    - type: text
      text: (És 40:1-9. Za 9:9. Jn 18:37. Lu 24:44.)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L’Évangile selon Matthieu est le premier livre du Nouveau Testament. Cette place de choix se justifie du fait que, mieux que tous les autres, il présente Jésus, le personnage central de ce Testament, comme celui qui réalise les promesses de l’Ancien Testament et l’espérance d’Israël.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Matthieu présente Jésus-Christ comme le Messie, Fils du roi David (Matt 1:1-20; 9:27; 12:23), donc celui qui, selon les promesses de l’Ancien Testament, vient sauver Israël. Jésus-Christ accomplit l’histoire d’Israël.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les trois premiers évangiles suivent un plan commun. À ce titre, l’Évangile selon Matthieu présente le ministère de Jésus d’abord en Galilée, puis hors de Galilée, et enfin à Jérusalem, avec les événements majeurs que sont sa mort et sa résurrection. Mais auparavant, il aborde sa naissance et son enfance. Voici du reste les articulations de cet évangile:'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '1. Généalogie, naissance et enfance de Jésus-Christ '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:1–2:23
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '2. Prédication de Jean-Baptiste et baptême de Jésus '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 3:1-17
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '3. Tentation de Jésus et commencement de son ministère '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 4:1-25
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '4. Le Sermon sur la montagne '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 5:1–7:29
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '5. Le ministère de Jésus en Galilée '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 8:1–13:58
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '6. Le ministère de Jésus hors de Galilée et en route vers Jérusalem '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 14:1–20:34
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '7. Le ministère de Jésus à Jérusalem (sa passion et sa résurrection) '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 21:1–28:15
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '8. Conclusion: apparition de Jésus aux disciples et leur envoi jusqu’à la fin du monde '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 28:16-20
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L’auteur de cet évangile serait Matthieu lui-même. Il rapporte son appel par Jésus, 9:9-13. Marc (2:13-17) et Luc (5:27-32) l’appellent Lévi. Marc précise qu’il est le fils d’Alphée. Avant de suivre Jésus, Matthieu était un péager (voir Matt 5:46; 9:10; 10:3), fonctionnaire romain chargé de percevoir les impôts et les droits de douane. Les Juifs méprisaient cette classe d’employés qu’ils trouvaient corrompus. Ils les associaient aux pécheurs, aux païens et aux prostitués. L’appel de Matthieu par Jésus et le festin que celui-ci a organisé chez lui en son honneur montrent que Jésus a plutôt témoigné beaucoup d’attention à cette classe de personnes. Ce qui ne pouvait que scandaliser les Juifs zélés tels que les pharisiens, et accentuer leur haine à l’égard de Jésus.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: En écrivant son évangile, Matthieu s’adresse essentiellement aux Juifs sortis du judaïsme, qui, comme lui, croyaient désormais que Jésus était véritablement le Christ, Fils de David, et Fils de Dieu. D’où l’abondance, dans ce livre, de citations et références à l’Ancien Testament et aux coutumes juives (5:21, 23, 27, 31, 33, etc.).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Jésus est la manifestation du Royaume des cieux en personne. Il l’inaugure en fondant l’Église, son Église par laquelle il accomplit l’alliance de Dieu avec Israël. L’Église que le peuple chrétien perpétue depuis des siècles est et reste intimement liée à Jésus. Elle représente ainsi le nouveau peuple élu composé à la fois de Juifs et de non-Juifs.
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: '«Et moi, je te dis que tu es Pierre, et que sur cette pierre je bâtirai mon Église, et que les portes du séjour des morts ne prévaudront point contre elle» '
    - type: text
      text: (16:17-18, voir aussi 18:17).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L’Évangile selon Matthieu se présente comme un manuel de pastorale, destiné aux dirigeants de communautés chrétiennes pour l’enseignement et la formation catéchétique. Ses procédés littéraires correspondent aux modèles didactiques des rabbins de l’époque de sa rédaction. L’interprétation des textes de loi de l’Ancien Testament en est une illustration: «Vous avez entendu qu’il a été dit aux anciens… mais moi, je vous dis…». Le Jésus de Matthieu montre ainsi qu’il est venu non pour abolir cette loi, mais pour l’accomplir (Matt 5:17ss).'
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Voici la liste des miracles de Jésus rapportés par Matthieu
  - type: text
    text: '1. la guérison d’un lépreux8:1-42. la guérison du serviteur d’un centenier8:5-133. la guérison de la belle-mère de Pierre8:14-174. la tempête apaisée8:23-275. la guérison de deux démoniaques8:28-346. la guérison d’un paralytique9:1-87. la résurrection de la fille de Jaïrus9:18-19, 23ss8. la guérison d’une femme malade depuis douze ans9:20-229. la guérison de deux aveugles (1 '
  - type: usfm
    marker: ord
    children:
    - type: text
      text: re
  - type: text
    text: ' fois)9:27-3110. la guérison d’un démoniaque muet9:32-3311. la guérison de l’homme à la main sèche12:9-1312. la multiplication des pains (1 '
  - type: usfm
    marker: ord
    children:
    - type: text
      text: re
  - type: text
    text: ' fois)14:15-2113. la marche sur les eaux14:22-3314. la guérison de la fille d’une Cananéenne15:21-2815. la multiplication des pains (2 '
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: ' fois)15:32-3916. la guérison du fils lunatique17:14-2117. le statère dans le poisson17:24-2718. la guérison de deux aveugles (2 '
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: ' fois)20:29-3419. le figuier desséché21:17-22'
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Également la liste des paraboles de Jésus rapportées par Matthieu
  - type: text
    text: 1. la maison bâtie sur le roc7:24-272. le semeur13:3-233. l’ivraie13:24-434. le grain de sénevé13:31-325. le levain13:336. le trésor caché13:447. la perle de grand prix13:45-468. le filet13:47-509. la brebis égarée18:12-1410. le serviteur impitoyable18:23-2511. les ouvriers loués à différentes heures20:1-1612. les deux fils21:28-3213. les vignerons21:33-4114. les noces22:1-415. le figuier24:3216. les dix vierges25:1-1317. les talents25:14-30
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Jésus enseigna en paroles et en actes de puissance. Il chargea ses disciples de continuer cette œuvre: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Tout pouvoir m’a été donné dans le ciel et sur la terre. Allez, faites de toutes les nations mes disciples, les baptisant au nom du Père, du Fils et du Saint-Esprit, et enseignez-leur à observer tout ce que je vous ai prescrit. Et voici, je suis avec vous tous les jours, jusqu’à la fin du monde»
    - type: text
      text: ' (Matt 28:18-20).'
