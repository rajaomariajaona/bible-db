  - type: text
    content: INTRODUCTION À L’ÉVANGILE SELON MATTHIEU
  - type: text
    content: (És 40:1-9. Za 9:9. Jn 18:37. Lu 24:44.)
  - type: text
    content: L’Évangile selon Matthieu est le premier livre du Nouveau Testament. Cette place de choix se justifie du fait que, mieux que tous les autres, il présente Jésus, le personnage central de ce Testament, comme celui qui réalise les promesses de l’Ancien Testament et l’espérance d’Israël.
  - type: text
    content: Matthieu présente Jésus-Christ comme le Messie, Fils du roi David (Matt 1:1-20; 9:27; 12:23), donc celui qui, selon les promesses de l’Ancien Testament, vient sauver Israël. Jésus-Christ accomplit l’histoire d’Israël.
  - type: text
    content: 'Les trois premiers évangiles suivent un plan commun. À ce titre, l’Évangile selon Matthieu présente le ministère de Jésus d’abord en Galilée, puis hors de Galilée, et enfin à Jérusalem, avec les événements majeurs que sont sa mort et sa résurrection. Mais auparavant, il aborde sa naissance et son enfance. Voici du reste les articulations de cet évangile:'
  - type: text
    content: '1. Généalogie, naissance et enfance de Jésus-Christ '
  - type: text
    content: 1:1–2:23
  - type: text
    content: '2. Prédication de Jean-Baptiste et baptême de Jésus '
  - type: text
    content: 3:1-17
  - type: text
    content: '3. Tentation de Jésus et commencement de son ministère '
  - type: text
    content: 4:1-25
  - type: text
    content: '4. Le Sermon sur la montagne '
  - type: text
    content: 5:1–7:29
  - type: text
    content: '5. Le ministère de Jésus en Galilée '
  - type: text
    content: 8:1–13:58
  - type: text
    content: '6. Le ministère de Jésus hors de Galilée et en route vers Jérusalem '
  - type: text
    content: 14:1–20:34
  - type: text
    content: '7. Le ministère de Jésus à Jérusalem (sa passion et sa résurrection) '
  - type: text
    content: 21:1–28:15
  - type: text
    content: '8. Conclusion: apparition de Jésus aux disciples et leur envoi jusqu’à la fin du monde '
  - type: text
    content: 28:16-20
  - type: text
    content: L’auteur de cet évangile serait Matthieu lui-même. Il rapporte son appel par Jésus, 9:9-13. Marc (2:13-17) et Luc (5:27-32) l’appellent Lévi. Marc précise qu’il est le fils d’Alphée. Avant de suivre Jésus, Matthieu était un péager (voir Matt 5:46; 9:10; 10:3), fonctionnaire romain chargé de percevoir les impôts et les droits de douane. Les Juifs méprisaient cette classe d’employés qu’ils trouvaient corrompus. Ils les associaient aux pécheurs, aux païens et aux prostitués. L’appel de Matthieu par Jésus et le festin que celui-ci a organisé chez lui en son honneur montrent que Jésus a plutôt témoigné beaucoup d’attention à cette classe de personnes. Ce qui ne pouvait que scandaliser les Juifs zélés tels que les pharisiens, et accentuer leur haine à l’égard de Jésus.
  - type: text
    content: En écrivant son évangile, Matthieu s’adresse essentiellement aux Juifs sortis du judaïsme, qui, comme lui, croyaient désormais que Jésus était véritablement le Christ, Fils de David, et Fils de Dieu. D’où l’abondance, dans ce livre, de citations et références à l’Ancien Testament et aux coutumes juives (5:21, 23, 27, 31, 33, etc.).
  - type: text
    content: Jésus est la manifestation du Royaume des cieux en personne. Il l’inaugure en fondant l’Église, son Église par laquelle il accomplit l’alliance de Dieu avec Israël. L’Église que le peuple chrétien perpétue depuis des siècles est et reste intimement liée à Jésus. Elle représente ainsi le nouveau peuple élu composé à la fois de Juifs et de non-Juifs.
  - type: text
    content: '«Et moi, je te dis que tu es Pierre, et que sur cette pierre je bâtirai mon Église, et que les portes du séjour des morts ne prévaudront point contre elle» '
  - type: text
    content: (16:17-18, voir aussi 18:17).
  - type: text
    content: 'L’Évangile selon Matthieu se présente comme un manuel de pastorale, destiné aux dirigeants de communautés chrétiennes pour l’enseignement et la formation catéchétique. Ses procédés littéraires correspondent aux modèles didactiques des rabbins de l’époque de sa rédaction. L’interprétation des textes de loi de l’Ancien Testament en est une illustration: «Vous avez entendu qu’il a été dit aux anciens… mais moi, je vous dis…». Le Jésus de Matthieu montre ainsi qu’il est venu non pour abolir cette loi, mais pour l’accomplir (Matt 5:17ss).'
