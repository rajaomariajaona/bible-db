document_id: PRO.10,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-32: cf. Ps 78:2. Ec 12:13.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Proverbes de Salomon.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 15:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Un fils sage fait la joie d’un père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un fils insensé le chagrin de sa mère.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Celui qui cligne des yeux est une cause de chagrin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celui qui est insensé des lèvres court à sa perte.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 13:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La bouche du juste est une source de vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la violence couvre la bouche des méchants.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: La haine excite des querelles,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 13:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 4:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais l’amour couvre toutes les fautes.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Sur les lèvres de l’homme intelligent se trouve la sagesse,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 20:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais la verge est pour le dos de celui qui est dépourvu de sens.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Les sages tiennent la science en réserve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la bouche de l’insensé est une ruine prochaine.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: La fortune est pour le riche une ville forte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La ruine des misérables, c’est leur pauvreté.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: L’œuvre du juste est pour la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le gain du méchant est pour le péché.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Celui qui se souvient de la correction prend le chemin de la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui oublie la réprimande s’égare.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Celui qui dissimule la haine a des lèvres menteuses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celui qui répand la calomnie est un insensé.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Celui qui parle beaucoup ne manque pas de pécher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui retient ses lèvres est un homme prudent.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 11:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les trésors de la méchanceté ne profitent pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la justice délivre de la mort.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: La langue du juste est un argent de choix;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le cœur des méchants est peu de chose.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Les lèvres du juste dirigent beaucoup d’hommes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les insensés meurent par défaut de raison.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: C’est la bénédiction de l’Éternel qui enrichit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il ne la fait suivre d’aucun chagrin.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Commettre le crime paraît '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 14:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: un jeu à l’insensé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la sagesse appartient à l’homme intelligent.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ce que redoute le méchant, c’est ce qui lui arrive;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ce que désirent les justes leur est accordé.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Comme passe le tourbillon, ainsi disparaît le méchant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le juste a des fondements éternels.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ce que le vinaigre est aux dents et la fumée aux yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tel est le paresseux pour celui qui l’envoie.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 9:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La crainte de l’Éternel augmente les jours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les années des méchants sont abrégées.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: L’attente des justes n’est que joie,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 8:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 112:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais l’espérance des méchants périra.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: La voie de l’Éternel est un rempart pour l’intégrité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais elle est une ruine '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 13:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: pour ceux qui font le mal.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: L’Éternel ne laisse pas le juste souffrir de la faim,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il repousse l’avidité des méchants.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Le juste ne chancellera jamais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les méchants n’habiteront pas le pays.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: La bouche du juste produit la sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la langue perverse sera retranchée.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Les lèvres du juste connaissent la grâce,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la bouche des méchants la perversité.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 12:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Celui qui agit d’une main lâche s’appauvrit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la main des diligents enrichit.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Celui qui amasse pendant l’été est un fils prudent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui dort pendant la moisson est un fils qui fait honte.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Il y a des bénédictions sur la tête du juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la violence couvre la bouche des méchants.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: La mémoire du juste est en bénédiction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le nom des méchants tombe en pourriture.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Celui qui est sage de cœur reçoit les préceptes,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 10:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais celui qui est insensé des lèvres court à sa perte.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Celui qui marche dans l’intégrité marche avec assurance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui prend des voies tortueuses sera découvert.
