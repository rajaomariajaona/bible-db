document_id: PRO.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-32: cf. Ps 78:2. Ec 12:13.'
  - type: text
    content: Proverbes de Salomon.
  - type: note
    content: Pr 15:20.
  - type: text
    content: Un fils sage fait la joie d’un père,
  - type: text
    content: Et un fils insensé le chagrin de sa mère.
  '10':
  - type: text
    content: Celui qui cligne des yeux est une cause de chagrin,
  - type: text
    content: Et celui qui est insensé des lèvres court à sa perte.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Pr 13:14.
  - type: text
    content: La bouche du juste est une source de vie,
  - type: text
    content: Mais la violence couvre la bouche des méchants.
  '12':
  - type: text
    content: La haine excite des querelles,
  - type: note
    content: 1 Co 13:7. 1 Pi 4:8.
  - type: text
    content: Mais l’amour couvre toutes les fautes.
  '13':
  - type: text
    content: Sur les lèvres de l’homme intelligent se trouve la sagesse,
  - type: note
    content: Pr 20:30.
  - type: text
    content: Mais la verge est pour le dos de celui qui est dépourvu de sens.
  '14':
  - type: text
    content: Les sages tiennent la science en réserve,
  - type: text
    content: Mais la bouche de l’insensé est une ruine prochaine.
  '15':
  - type: text
    content: La fortune est pour le riche une ville forte;
  - type: text
    content: La ruine des misérables, c’est leur pauvreté.
  '16':
  - type: text
    content: L’œuvre du juste est pour la vie,
  - type: text
    content: Le gain du méchant est pour le péché.
  '17':
  - type: text
    content: Celui qui se souvient de la correction prend le chemin de la vie,
  - type: text
    content: Mais celui qui oublie la réprimande s’égare.
  '18':
  - type: text
    content: Celui qui dissimule la haine a des lèvres menteuses,
  - type: text
    content: Et celui qui répand la calomnie est un insensé.
  '19':
  - type: text
    content: Celui qui parle beaucoup ne manque pas de pécher,
  - type: text
    content: Mais celui qui retient ses lèvres est un homme prudent.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Pr 11:4.
  - type: text
    content: Les trésors de la méchanceté ne profitent pas,
  - type: text
    content: Mais la justice délivre de la mort.
  '20':
  - type: text
    content: La langue du juste est un argent de choix;
  - type: text
    content: Le cœur des méchants est peu de chose.
  '21':
  - type: text
    content: Les lèvres du juste dirigent beaucoup d’hommes,
  - type: text
    content: Et les insensés meurent par défaut de raison.
  '22':
  - type: text
    content: C’est la bénédiction de l’Éternel qui enrichit,
  - type: text
    content: Et il ne la fait suivre d’aucun chagrin.
  '23':
  - type: text
    content: 'Commettre le crime paraît '
  - type: note
    content: Pr 14:9.
  - type: text
    content: un jeu à l’insensé,
  - type: text
    content: Mais la sagesse appartient à l’homme intelligent.
  '24':
  - type: text
    content: Ce que redoute le méchant, c’est ce qui lui arrive;
  - type: text
    content: Et ce que désirent les justes leur est accordé.
  '25':
  - type: text
    content: Comme passe le tourbillon, ainsi disparaît le méchant;
  - type: text
    content: Mais le juste a des fondements éternels.
  '26':
  - type: text
    content: Ce que le vinaigre est aux dents et la fumée aux yeux,
  - type: text
    content: Tel est le paresseux pour celui qui l’envoie.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Pr 9:11.
  - type: text
    content: La crainte de l’Éternel augmente les jours,
  - type: text
    content: Mais les années des méchants sont abrégées.
  '28':
  - type: text
    content: L’attente des justes n’est que joie,
  - type: note
    content: Job 8:13, 14; 11:20. Ps 112:10.
  - type: text
    content: Mais l’espérance des méchants périra.
  '29':
  - type: text
    content: La voie de l’Éternel est un rempart pour l’intégrité,
  - type: text
    content: 'Mais elle est une ruine '
  - type: note
    content: Pr 13:6.
  - type: text
    content: pour ceux qui font le mal.
  '3':
  - type: text
    content: L’Éternel ne laisse pas le juste souffrir de la faim,
  - type: text
    content: Mais il repousse l’avidité des méchants.
  '30':
  - type: text
    content: Le juste ne chancellera jamais,
  - type: text
    content: Mais les méchants n’habiteront pas le pays.
  '31':
  - type: text
    content: La bouche du juste produit la sagesse,
  - type: text
    content: Mais la langue perverse sera retranchée.
  '32':
  - type: text
    content: Les lèvres du juste connaissent la grâce,
  - type: text
    content: Et la bouche des méchants la perversité.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Pr 12:24.
  - type: text
    content: Celui qui agit d’une main lâche s’appauvrit,
  - type: text
    content: Mais la main des diligents enrichit.
  '5':
  - type: text
    content: Celui qui amasse pendant l’été est un fils prudent,
  - type: text
    content: Celui qui dort pendant la moisson est un fils qui fait honte.
  '6':
  - type: text
    content: Il y a des bénédictions sur la tête du juste,
  - type: text
    content: Mais la violence couvre la bouche des méchants.
  '7':
  - type: text
    content: La mémoire du juste est en bénédiction,
  - type: text
    content: Mais le nom des méchants tombe en pourriture.
  '8':
  - type: text
    content: Celui qui est sage de cœur reçoit les préceptes,
  - type: note
    content: Pr 10:10.
  - type: text
    content: Mais celui qui est insensé des lèvres court à sa perte.
  '9':
  - type: text
    content: Celui qui marche dans l’intégrité marche avec assurance,
  - type: text
    content: Mais celui qui prend des voies tortueuses sera découvert.
