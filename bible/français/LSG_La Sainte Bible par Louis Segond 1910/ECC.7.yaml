document_id: ECC.7,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. (Ps 90:12. Ja 1:27.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 22:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Une bonne réputation vaut mieux que le bon parfum, et le jour de la mort que le jour de la naissance. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne dis pas: D’où vient que les jours passés étaient meilleurs que ceux-ci? Car ce n’est point par sagesse que tu demandes cela.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-14: cf. Pr 3:13-18. Ja 5:13.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La sagesse vaut autant qu’un héritage, et même plus pour ceux qui voient le soleil. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car à l’ombre de la sagesse on est abrité comme à l’ombre de l’argent; mais un avantage de la science, c’est que la sagesse fait vivre ceux qui la possèdent. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Regarde l’œuvre de Dieu: qui pourra redresser ce qu’il a courbé? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au jour du bonheur, sois heureux, et au jour du malheur, réfléchis: Dieu a fait l’un comme l’autre, afin que l’homme ne découvre en rien ce qui sera après lui.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 15-22: cf. (Ec 8:14, 5-7; 9:13-18.) 1 Jn 1:8-10.'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai vu tout cela pendant les jours de ma vanité. Il y a tel juste qui périt dans sa justice, et il y a tel méchant qui prolonge son existence dans sa méchanceté. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne sois pas juste à l’excès, et ne te montre pas trop sage: pourquoi te détruirais-tu? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne sois pas méchant à l’excès, et ne sois pas insensé: pourquoi mourrais-tu avant ton temps? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il est bon que tu retiennes ceci, et que tu ne négliges point cela; car celui qui craint Dieu échappe à toutes ces choses. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La sagesse rend le sage plus fort que dix chefs qui sont dans une ville. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mieux vaut aller dans une maison de deuil que d’aller dans une maison de festin; car c’est là la fin de tout homme, et celui qui vit prend la chose à cœur. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 8:46
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '47'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 6:36
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 20:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 1:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Non, il n’y a sur la terre point d’homme juste qui fasse le bien et qui ne pèche jamais. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne fais donc pas attention à toutes les paroles qu’on dit, de peur que tu n’entendes ton serviteur te maudire; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: car ton cœur a senti bien des fois que tu as toi-même maudit les autres.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 23-29: cf. Pr 5. 1 Ti 2:14. (Ro 1:21; 3:9-19.)'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai éprouvé tout cela par la sagesse. J’ai dit: Je serai sage. Et la sagesse est restée loin de moi. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce qui est loin, ce qui est profond, profond, qui peut l’atteindre? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je me suis appliqué dans mon cœur à connaître, à sonder, et à chercher la sagesse et la raison des choses, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 1:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à connaître la folie de la méchanceté et la stupidité de la sottise. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et j’ai trouvé '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 5:3
      - type: text
        text: ; 6:24, etc.; 7:6, etc.
      marker-yv: yv-n
    - type: text
      text: 'plus amère que la mort la femme dont le cœur est un piège et un filet, et dont les mains sont des liens; celui qui est agréable à Dieu lui échappe, mais '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 6:26
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le pécheur est pris par elle. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que j’ai trouvé, dit l’Ecclésiaste, en examinant les choses une à une pour en saisir la raison; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'voici ce que mon âme cherche encore, et que je n’ai point trouvé. J’ai trouvé un homme entre mille; mais je n’ai pas trouvé une femme entre elles toutes. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Seulement, voici ce que j’ai trouvé, c’est que Dieu a fait les hommes droits; mais ils ont cherché beaucoup de détours.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mieux vaut le chagrin que le rire; car avec un visage triste le cœur peut être content. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le cœur des sages est dans la maison de deuil, et le cœur des insensés dans la maison de joie. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 13:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:31
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '32'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mieux vaut entendre la réprimande du sage que d’entendre le chant des insensés. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 58:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme le bruit des épines sous la chaudière, ainsi est le rire des insensés. C’est encore là une vanité. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’oppression rend insensé le sage, et les présents corrompent le cœur. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mieux vaut la fin d’une chose que son commencement; mieux vaut un esprit patient qu’un esprit hautain. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne te hâte pas en ton esprit de t’irriter, car l’irritation repose dans le sein des insensés. '
