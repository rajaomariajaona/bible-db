document_id: ECC.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-10: cf. (Ps 90:12. Ja 1:27.)'
  - type: text
    content: ' '
  - type: note
    content: Pr 22:1.
  - type: text
    content: 'Une bonne réputation vaut mieux que le bon parfum, et le jour de la mort que le jour de la naissance. '
  '10':
  - type: text
    content: 'Ne dis pas: D’où vient que les jours passés étaient meilleurs que ceux-ci? Car ce n’est point par sagesse que tu demandes cela.'
  - type: heading
    content: 'V. 11-14: cf. Pr 3:13-18. Ja 5:13.'
  '11':
  - type: text
    content: 'La sagesse vaut autant qu’un héritage, et même plus pour ceux qui voient le soleil. '
  '12':
  - type: text
    content: 'Car à l’ombre de la sagesse on est abrité comme à l’ombre de l’argent; mais un avantage de la science, c’est que la sagesse fait vivre ceux qui la possèdent. '
  '13':
  - type: text
    content: 'Regarde l’œuvre de Dieu: qui pourra redresser ce qu’il a courbé? '
  '14':
  - type: text
    content: 'Au jour du bonheur, sois heureux, et au jour du malheur, réfléchis: Dieu a fait l’un comme l’autre, afin que l’homme ne découvre en rien ce qui sera après lui.'
  - type: heading
    content: 'V. 15-22: cf. (Ec 8:14, 5-7; 9:13-18.) 1 Jn 1:8-10.'
  '15':
  - type: text
    content: 'J’ai vu tout cela pendant les jours de ma vanité. Il y a tel juste qui périt dans sa justice, et il y a tel méchant qui prolonge son existence dans sa méchanceté. '
  '16':
  - type: text
    content: 'Ne sois pas juste à l’excès, et ne te montre pas trop sage: pourquoi te détruirais-tu? '
  '17':
  - type: text
    content: 'Ne sois pas méchant à l’excès, et ne sois pas insensé: pourquoi mourrais-tu avant ton temps? '
  '18':
  - type: text
    content: 'Il est bon que tu retiennes ceci, et que tu ne négliges point cela; car celui qui craint Dieu échappe à toutes ces choses. '
  '19':
  - type: text
    content: 'La sagesse rend le sage plus fort que dix chefs qui sont dans une ville. '
  '2':
  - type: text
    content: 'Mieux vaut aller dans une maison de deuil que d’aller dans une maison de festin; car c’est là la fin de tout homme, et celui qui vit prend la chose à cœur. '
  '20':
  - type: note
    content: 1 R 8:46, 47. 2 Ch 6:36. Pr 20:9. 1 Jn 1:8.
  - type: text
    content: 'Non, il n’y a sur la terre point d’homme juste qui fasse le bien et qui ne pèche jamais. '
  '21':
  - type: text
    content: 'Ne fais donc pas attention à toutes les paroles qu’on dit, de peur que tu n’entendes ton serviteur te maudire; '
  '22':
  - type: text
    content: car ton cœur a senti bien des fois que tu as toi-même maudit les autres.
  - type: heading
    content: 'V. 23-29: cf. Pr 5. 1 Ti 2:14. (Ro 1:21; 3:9-19.)'
  '23':
  - type: text
    content: 'J’ai éprouvé tout cela par la sagesse. J’ai dit: Je serai sage. Et la sagesse est restée loin de moi. '
  '24':
  - type: text
    content: 'Ce qui est loin, ce qui est profond, profond, qui peut l’atteindre? '
  '25':
  - type: text
    content: 'Je me suis appliqué dans mon cœur à connaître, à sonder, et à chercher la sagesse et la raison des choses, et '
  - type: note
    content: Ec 1:17; 2:12.
  - type: text
    content: 'à connaître la folie de la méchanceté et la stupidité de la sottise. '
  '26':
  - type: text
    content: 'Et j’ai trouvé '
  - type: note
    content: Pr 5:3; 6:24, etc.; 7:6, etc.
  - type: text
    content: 'plus amère que la mort la femme dont le cœur est un piège et un filet, et dont les mains sont des liens; celui qui est agréable à Dieu lui échappe, mais '
  - type: note
    content: Pr 6:26; 7:23; 22:14.
  - type: text
    content: 'le pécheur est pris par elle. '
  '27':
  - type: text
    content: 'Voici ce que j’ai trouvé, dit l’Ecclésiaste, en examinant les choses une à une pour en saisir la raison; '
  '28':
  - type: text
    content: 'voici ce que mon âme cherche encore, et que je n’ai point trouvé. J’ai trouvé un homme entre mille; mais je n’ai pas trouvé une femme entre elles toutes. '
  '29':
  - type: text
    content: Seulement, voici ce que j’ai trouvé, c’est que Dieu a fait les hommes droits; mais ils ont cherché beaucoup de détours.
  '3':
  - type: text
    content: 'Mieux vaut le chagrin que le rire; car avec un visage triste le cœur peut être content. '
  '4':
  - type: text
    content: 'Le cœur des sages est dans la maison de deuil, et le cœur des insensés dans la maison de joie. '
  '5':
  - type: note
    content: Pr 13:18; 15:31, 32.
  - type: text
    content: 'Mieux vaut entendre la réprimande du sage que d’entendre le chant des insensés. '
  '6':
  - type: text
    content: 'Car '
  - type: note
    content: Ps 58:10.
  - type: text
    content: 'comme le bruit des épines sous la chaudière, ainsi est le rire des insensés. C’est encore là une vanité. '
  '7':
  - type: text
    content: 'L’oppression rend insensé le sage, et les présents corrompent le cœur. '
  '8':
  - type: text
    content: 'Mieux vaut la fin d’une chose que son commencement; mieux vaut un esprit patient qu’un esprit hautain. '
  '9':
  - type: text
    content: 'Ne te hâte pas en ton esprit de t’irriter, car l’irritation repose dans le sein des insensés. '
