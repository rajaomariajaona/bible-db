document_id: 2KI.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: SUITE DES ROIS DE JUDA ET DES ROIS D’ISRAËL,
  - type: heading
    content: DEPUIS JOSAPHAT ET LA MORT D’ACHAB JUSQU’À LA DESTRUCTION DU ROYAUME D’ISRAËL
  - type: heading
    content: Ch. 1 à 17. (2 Ch 21 à 28.) (Jé 3:6-7. Os 7; 10:1-11; 13:1-13.)
  - type: heading
    content: Maladie d’Achazia, roi d’Israël. — Intervention d’Élie. — Mort d’Achazia
  - type: heading
    content: 'V. 1-18: cf. (1 R 22:52-54. 1 Ch 10:13-14.) Lu 9:52-56. (De 32:39. Ps 83:19.)'
  - type: text
    content: ' '
  - type: note
    content: 2 R 3:5.
  - type: text
    content: 'Moab se révolta contre Israël, après la mort d’Achab. '
  '10':
  - type: text
    content: 'Élie répondit au chef de cinquante: Si je suis un homme de Dieu, que '
  - type: note
    content: Lu 9:54.
  - type: text
    content: 'le feu descende du ciel et te consume, toi et tes cinquante hommes! Et le feu descendit du ciel et le consuma, lui et ses cinquante hommes. '
  '11':
  - type: text
    content: 'Achazia envoya de nouveau vers lui un autre chef de cinquante avec ses cinquante hommes. Ce chef prit la parole et dit à Élie: Homme de Dieu, ainsi a dit le roi: Hâte-toi de descendre! '
  '12':
  - type: text
    content: 'Élie leur répondit: Si je suis un homme de Dieu, que le feu descende du ciel et te consume, toi et tes cinquante hommes! Et le feu de Dieu descendit du ciel et le consuma, lui et ses cinquante hommes. '
  '13':
  - type: text
    content: 'Achazia envoya de nouveau un troisième chef de cinquante avec ses cinquante hommes. Ce troisième chef de cinquante monta; et à son arrivée, il fléchit les genoux devant Élie, et lui dit en suppliant: Homme de Dieu, que ma vie, je te prie, et que la vie de ces cinquante hommes tes serviteurs soit précieuse à tes yeux! '
  '14':
  - type: text
    content: 'Voici, le feu est descendu du ciel et a consumé les deux premiers chefs de cinquante et leurs cinquante hommes: mais maintenant, que ma vie soit précieuse à tes yeux! '
  '15':
  - type: text
    content: 'L’ange de l’Éternel dit à Élie: Descends avec lui, n’aie aucune crainte de lui. Élie se leva et descendit avec lui vers le roi. '
  '16':
  - type: text
    content: 'Il lui dit: Ainsi parle l’Éternel: Parce que tu as envoyé des messagers pour consulter Baal-Zebub, dieu d’Ékron, comme s’il n’y avait en Israël point de Dieu dont on puisse consulter la parole, tu ne descendras pas du lit sur lequel tu es monté, car tu mourras. '
  '17':
  - type: text
    content: 'Achazia mourut, selon la parole de l’Éternel prononcée par Élie. Et Joram régna à sa place, la seconde année de Joram, fils de Josaphat, roi de Juda; car il n’avait point de fils. '
  '18':
  - type: text
    content: Le reste des actions d’Achazia, et ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël?
  '2':
  - type: text
    content: 'Or Achazia tomba par le treillis de sa chambre haute à Samarie, et il en fut malade. Il fit partir des messagers, et leur dit: Allez, consultez Baal-Zebub, dieu d’Ékron, pour savoir si je guérirai de cette maladie. '
  '3':
  - type: text
    content: 'Mais l’ange de l’Éternel dit à Élie, le Thischbite: Lève-toi, monte à la rencontre des messagers du roi de Samarie, et dis-leur: Est-ce parce qu’il n’y a point de Dieu en Israël que vous allez consulter Baal-Zebub, dieu d’Ékron? '
  '4':
  - type: text
    content: 'C’est pourquoi ainsi parle l’Éternel: Tu ne descendras pas du lit sur lequel tu es monté, car tu mourras. Et Élie s’en alla. '
  '5':
  - type: text
    content: 'Les messagers retournèrent auprès d’Achazia. Et il leur dit: Pourquoi revenez-vous? '
  '6':
  - type: text
    content: 'Ils lui répondirent: Un homme est monté à notre rencontre, et nous a dit: Allez, retournez vers le roi qui vous a envoyés, et dites-lui: Ainsi parle l’Éternel: Est-ce parce qu’il n’y a point de Dieu en Israël que tu envoies consulter Baal-Zebub, dieu d’Ékron? C’est pourquoi tu ne descendras pas du lit sur lequel tu es monté, car tu mourras. '
  '7':
  - type: text
    content: 'Achazia leur dit: Quel air avait l’homme qui est monté à votre rencontre et qui vous a dit ces paroles? '
  '8':
  - type: text
    content: 'Ils lui répondirent: C’était un homme vêtu de poil et ayant une ceinture de cuir autour des reins. Et Achazia dit: C’est Élie, le Thischbite. '
  '9':
  - type: text
    content: 'Il envoya vers lui un chef de cinquante avec ses cinquante hommes. Ce chef monta auprès d’Élie, qui était assis sur le sommet de la montagne, et il lui dit: Homme de Dieu, le roi a dit: Descends! '
