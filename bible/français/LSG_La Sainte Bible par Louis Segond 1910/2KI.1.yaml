  - type: text
    text: DEPUIS JOSAPHAT ET LA MORT D’ACHAB JUSQU’À LA DESTRUCTION DU ROYAUME D’ISRAËL
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: Ch. 1 à 17. (2 Ch 21 à 28.) (Jé 3:6-7. Os 7; 10:1-11; 13:1-13.)
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Maladie d’Achazia, roi d’Israël. — Intervention d’Élie. — Mort d’Achazia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-18: cf. (1 R 22:52-54. 1 Ch 10:13-14.) Lu 9:52-56. (De 32:39. Ps 83:19.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 3:5
      metadata:
        usfm: 2KI.3.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Moab se révolta contre Israël, après la mort d’Achab. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Or Achazia tomba par le treillis de sa chambre haute à Samarie, et il en fut malade. Il fit partir des messagers, et leur dit: Allez, consultez Baal-Zebub, dieu d’Ékron, pour savoir si je guérirai de cette maladie. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais l’ange de l’Éternel dit à Élie, le Thischbite: Lève-toi, monte à la rencontre des messagers du roi de Samarie, et dis-leur: Est-ce parce qu’il n’y a point de Dieu en Israël que vous allez consulter Baal-Zebub, dieu d’Ékron? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'C’est pourquoi ainsi parle l’Éternel: Tu ne descendras pas du lit sur lequel tu es monté, car tu mourras. Et Élie s’en alla. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les messagers retournèrent auprès d’Achazia. Et il leur dit: Pourquoi revenez-vous? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils lui répondirent: Un homme est monté à notre rencontre, et nous a dit: Allez, retournez vers le roi qui vous a envoyés, et dites-lui: Ainsi parle l’Éternel: Est-ce parce qu’il n’y a point de Dieu en Israël que tu envoies consulter Baal-Zebub, dieu d’Ékron? C’est pourquoi tu ne descendras pas du lit sur lequel tu es monté, car tu mourras. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Achazia leur dit: Quel air avait l’homme qui est monté à votre rencontre et qui vous a dit ces paroles? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils lui répondirent: C’était un homme vêtu de poil et ayant une ceinture de cuir autour des reins. Et Achazia dit: C’est Élie, le Thischbite. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il envoya vers lui un chef de cinquante avec ses cinquante hommes. Ce chef monta auprès d’Élie, qui était assis sur le sommet de la montagne, et il lui dit: Homme de Dieu, le roi a dit: Descends! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Élie répondit au chef de cinquante: Si je suis un homme de Dieu, que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:54
      metadata:
        usfm: LUK.9.54
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le feu descende du ciel et te consume, toi et tes cinquante hommes! Et le feu descendit du ciel et le consuma, lui et ses cinquante hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Achazia envoya de nouveau vers lui un autre chef de cinquante avec ses cinquante hommes. Ce chef prit la parole et dit à Élie: Homme de Dieu, ainsi a dit le roi: Hâte-toi de descendre! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Élie leur répondit: Si je suis un homme de Dieu, que le feu descende du ciel et te consume, toi et tes cinquante hommes! Et le feu de Dieu descendit du ciel et le consuma, lui et ses cinquante hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Achazia envoya de nouveau un troisième chef de cinquante avec ses cinquante hommes. Ce troisième chef de cinquante monta; et à son arrivée, il fléchit les genoux devant Élie, et lui dit en suppliant: Homme de Dieu, que ma vie, je te prie, et que la vie de ces cinquante hommes tes serviteurs soit précieuse à tes yeux! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voici, le feu est descendu du ciel et a consumé les deux premiers chefs de cinquante et leurs cinquante hommes: mais maintenant, que ma vie soit précieuse à tes yeux! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L’ange de l’Éternel dit à Élie: Descends avec lui, n’aie aucune crainte de lui. Élie se leva et descendit avec lui vers le roi. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il lui dit: Ainsi parle l’Éternel: Parce que tu as envoyé des messagers pour consulter Baal-Zebub, dieu d’Ékron, comme s’il n’y avait en Israël point de Dieu dont on puisse consulter la parole, tu ne descendras pas du lit sur lequel tu es monté, car tu mourras. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Achazia mourut, selon la parole de l’Éternel prononcée par Élie. Et Joram régna à sa place, la seconde année de Joram, fils de Josaphat, roi de Juda; car il n’avait point de fils. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Le reste des actions d’Achazia, et ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël?
