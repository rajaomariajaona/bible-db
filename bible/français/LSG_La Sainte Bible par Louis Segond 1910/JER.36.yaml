document_id: JER.36
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le livre des prophéties de Jérémie brûlé par le roi Jojakim
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-19: cf. 2 Ch 34:14, etc. És 58:1-9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La quatrième année de Jojakim, fils de Josias, roi de Juda, cette parole fut adressée à Jérémie de la part de l’Éternel, en ces mots: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Prends '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 8:1
      metadata:
        usfm: ISA.8.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un livre, et tu y '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 30:2
      metadata:
        usfm: JER.30.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'écriras toutes les paroles que je t’ai dites sur Israël et sur Juda, et sur toutes les nations, depuis le jour où je t’ai parlé, au temps de Josias, jusqu’à ce jour. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Quand la maison de Juda entendra tout le mal que je pense lui faire, peut-être reviendront-ils chacun de leur mauvaise voie; alors je pardonnerai leur iniquité et leur péché. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jérémie appela Baruc, fils de Nérija; et Baruc écrivit dans un livre, sous la dictée de Jérémie, toutes les paroles que l’Éternel avait dites à Jérémie. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Puis Jérémie donna cet ordre à Baruc: Je suis retenu, et je ne peux pas aller à la maison de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu iras toi-même, et tu liras dans le livre que tu as écrit sous ma dictée les paroles de l’Éternel, aux oreilles du peuple, dans la maison de l’Éternel, le jour du jeûne; tu les liras aussi aux oreilles de tous ceux de Juda qui seront venus de leurs villes. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Peut-être l’Éternel écoutera-t-il leurs supplications, et reviendront-ils chacun de leur mauvaise voie; car grande est la colère, la fureur dont l’Éternel a menacé ce peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Baruc, fils de Nérija, fit tout ce que lui avait ordonné Jérémie, le prophète, et lut dans le livre les paroles de l’Éternel, dans la maison de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La cinquième année de Jojakim, fils de Josias, roi de Juda, le neuvième mois, on publia un jeûne devant l’Éternel pour tout le peuple de Jérusalem et pour tout le peuple venu des villes de Juda à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et Baruc lut dans le livre les paroles de Jérémie, aux oreilles de tout le peuple, dans la maison de l’Éternel, dans la chambre de Guemaria, fils de Schaphan, le secrétaire, dans le parvis supérieur, à l’entrée de la porte neuve de la maison de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Michée, fils de Guemaria, fils de Schaphan, ayant entendu toutes les paroles de l’Éternel contenues dans le livre, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'descendit à la maison du roi, dans la chambre du secrétaire, où étaient assis tous les chefs, Élischama, le secrétaire, Delaja, fils de Schemaeja, Elnathan, fils d’Acbor, Guemaria, fils de Schaphan, Sédécias, fils de Hanania, et tous les autres chefs. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et Michée leur rapporta toutes les paroles qu’il avait entendues, lorsque Baruc lisait dans le livre, aux oreilles du peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors tous les chefs envoyèrent vers Baruc Jehudi, fils de Nethania, fils de Schélémia, fils de Cuschi, pour lui dire: Prends en main le livre dans lequel tu as lu, aux oreilles du peuple, et viens! Baruc, fils de Nérija, prit en main le livre, et se rendit auprès d’eux. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils lui dirent: Assieds-toi, et lis-le à nos oreilles. Et Baruc lut à leurs oreilles. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lorsqu’ils eurent entendu toutes les paroles, ils se regardèrent avec effroi les uns les autres, et ils dirent à Baruc: Nous rapporterons au roi toutes ces paroles. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils posèrent encore à Baruc cette question: Dis-nous comment tu as écrit toutes ces paroles sous sa dictée. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Baruc leur répondit: Il m’a dicté de sa bouche toutes ces paroles, et je les ai écrites dans ce livre avec de l’encre. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les chefs dirent à Baruc: Va, cache-toi, ainsi que Jérémie, et que personne ne sache où vous êtes.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-32: cf. (Jé 26; 22:13-19.) És 30:8-14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ils allèrent ensuite vers le roi dans la cour, laissant le livre dans la chambre d’Élischama, le secrétaire, et ils en rapportèrent toutes les paroles aux oreilles du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le roi envoya Jehudi pour prendre le livre, Jehudi le prit dans la chambre d’Élischama, le secrétaire, et il le lut aux oreilles du roi et aux oreilles de tous les chefs qui étaient auprès du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le roi était assis dans la maison d’hiver, c’était au neuvième mois, et un brasier était allumé devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Lorsque Jehudi eut lu trois ou quatre feuilles, le roi coupa le livre avec le canif du secrétaire, et le jeta dans le feu du brasier, où il fut entièrement consumé. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le roi et tous ses serviteurs, qui entendirent toutes ces paroles, ne furent point effrayés et ne déchirèrent point leurs vêtements. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Elnathan, Delaja et Guemaria, avaient fait des instances auprès du roi pour qu’il ne brûlât pas le livre; mais il ne les écouta pas. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Le roi ordonna à Jerachmeel, fils du roi, à Seraja, fils d’Azriel, et à Schélémia, fils d’Abdeel, de saisir Baruc, le secrétaire, et Jérémie, le prophète. Mais l’Éternel les cacha.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sentence contre le roi.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'La parole de l’Éternel fut adressée à Jérémie, en ces mots, après que le roi eut brûlé le livre contenant les paroles que Baruc avait écrites sous la dictée de Jérémie: '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Prends de nouveau un autre livre, et tu y écriras toutes les paroles qui étaient dans le premier livre qu’a brûlé Jojakim, roi de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Et sur Jojakim, roi de Juda, tu diras: Ainsi parle l’Éternel: Tu as brûlé ce livre, en disant: Pourquoi y as-tu écrit ces paroles: Le roi de Babylone viendra, il détruira ce pays, et il en fera disparaître les hommes et les bêtes? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 22:19
      metadata:
        usfm: JER.22.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est pourquoi ainsi parle l’Éternel sur Jojakim, roi de Juda: Aucun des siens ne sera assis sur le trône de David, et son cadavre sera exposé à la chaleur pendant le jour et au froid pendant la nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Je le châtierai, lui, sa postérité, et ses serviteurs, à cause de leur iniquité, et je ferai venir sur eux, sur les habitants de Jérusalem et sur les hommes de Juda tous les malheurs dont je les ai menacés, sans qu’ils aient voulu m’écouter. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Jérémie prit un autre livre, et le donna à Baruc, fils de Nérija, le secrétaire. Baruc y écrivit, sous la dictée de Jérémie, toutes les paroles du livre qu’avait brûlé au feu Jojakim, roi de Juda. Beaucoup d’autres paroles semblables y furent encore ajoutées.
