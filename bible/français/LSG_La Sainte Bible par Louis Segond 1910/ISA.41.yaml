document_id: ISA.41
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israël doit mettre sa confiance en l’Éternel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. És 45:1-7. Ps 97:1, 7-9.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Iles, faites silence pour m’écouter!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que les peuples raniment leur force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils avancent, et qu’ils parlent!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Approchons pour plaider ensemble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Qui a suscité de l’orient
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui que le salut appelle à sa suite?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui lui a livré les nations et assujetti des rois?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a réduit leur glaive en poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leur arc en un chaume qui s’envole?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il s’est mis à leur poursuite, il a parcouru avec bonheur
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un chemin que son pied n’avait jamais foulé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Qui a fait et exécuté ces choses?
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est celui qui a appelé les générations dès le commencement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Moi, l’Éternel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 43:10
      metadata:
        usfm: ISA.43.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 44:6
      metadata:
        usfm: ISA.44.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 48:12
      metadata:
        usfm: ISA.48.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:17
      metadata:
        usfm: REV.1.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:13
      metadata:
        usfm: REV.22.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: le premier
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le même jusqu’aux derniers âges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les îles le voient, et sont dans la crainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Les extrémités de la terre tremblent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils s’approchent, ils viennent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils s’aident l’un l’autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et chacun dit à son frère: Courage!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 40:19
      metadata:
        usfm: ISA.40.19
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: ISA.40.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le sculpteur encourage le fondeur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui polit au marteau encourage celui qui frappe sur l’enclume;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il dit de la soudure: Elle est bonne!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il fixe l’idole avec des clous, pour qu’elle ne branle pas.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-20: cf. És 43:1-7, 19-21. Mi 4:10-13. Ap 2:10, 26, 27.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais toi, Israël, mon serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Jacob, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:6
      metadata:
        usfm: DEU.7.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:15
      metadata:
        usfm: DEU.10.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:2
      metadata:
        usfm: DEU.14.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 135:4
      metadata:
        usfm: PSA.135.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 43:1
      metadata:
        usfm: ISA.43.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 44:1
      metadata:
        usfm: ISA.44.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: que j’ai choisi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Race d’Abraham '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 20:7
      metadata:
        usfm: 2CH.20.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 2:23
      metadata:
        usfm: JAS.2.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: que j’ai aimé!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Toi, que j’ai pris aux extrémités de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que j’ai appelé d’une contrée lointaine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A qui j’ai dit: Tu es mon serviteur,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te choisis, et ne te rejette point!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ne crains rien, car je suis avec toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne promène pas des regards inquiets, car je suis ton Dieu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te fortifie, je viens à ton secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te soutiens de ma droite triomphante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voici, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:22
      metadata:
        usfm: EXO.23.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 60:12
      metadata:
        usfm: ISA.60.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 12:3
      metadata:
        usfm: ZEC.12.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: ils seront confondus, ils seront couverts de honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui sont irrités contre toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils seront réduits à rien, ils périront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui disputent contre toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tu les chercheras, et ne les trouveras plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui te suscitaient querelle;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils seront réduits à rien, réduits au néant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui te faisaient la guerre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Car je suis l’Éternel, ton Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui fortifie ta droite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Qui te dis: Ne crains rien,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je viens à ton secours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ne crains rien, vermisseau de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faible reste d’Israël;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je viens à ton secours, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le Saint d’Israël est ton sauveur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Voici, je fais de toi un traîneau aigu, tout neuf,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Garni de pointes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu écraseras, tu broieras les montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et tu rendras les collines semblables à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 17:13
      metadata:
        usfm: ISA.17.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:5
      metadata:
        usfm: ISA.29.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: de la balle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tu les vanneras, et le vent les emportera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et un tourbillon les dispersera.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais toi, tu te réjouiras en l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu mettras ta gloire dans le Saint d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Les malheureux et les indigents cherchent de l’eau, et il n’y en a point;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Leur langue est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:6
      metadata:
        usfm: MAT.5.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: desséchée par la soif.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, l’Éternel, je les exaucerai;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, le Dieu d’Israël, je ne les abandonnerai pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 35:7
      metadata:
        usfm: ISA.35.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 44:3
      metadata:
        usfm: ISA.44.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je ferai jaillir des fleuves sur les collines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et des sources au milieu des vallées;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 107:35
      metadata:
        usfm: PSA.107.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je changerai le désert en étang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la terre aride en courants d’eau;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Je mettrai dans le désert le cèdre, l’acacia,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le myrte et l’olivier;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je mettrai dans les lieux stériles
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le cyprès, l’orme et le buis, tous ensemble;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Afin qu’ils voient, qu’ils sachent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils observent et considèrent
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que la main de l’Éternel a fait ces choses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que le Saint d’Israël en est l’auteur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre les faux dieux
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-29: cf. És 43:9-12; 44:7-20. Jé 10:5.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Plaidez votre cause,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Produisez vos moyens de défense,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le roi de Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Qu’ils les produisent, et qu’ils nous déclarent
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce qui doit arriver.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quelles sont les prédictions que jadis vous avez faites?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dites-le, pour que nous y prenions garde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que nous en reconnaissions l’accomplissement;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou bien, annoncez-nous l’avenir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dites ce qui arrivera plus tard,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour que nous sachions si vous êtes des dieux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faites seulement quelque chose de bien ou de mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour que nous le voyions et le regardions ensemble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Voici, vous n’êtes rien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et votre œuvre est le néant;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est une abomination que de se complaire en vous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Je l’ai suscité du septentrion, et il est venu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: De l’orient, il invoque mon nom;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il foule les puissants comme de la boue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme de l’argile que foule un potier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Qui l’a annoncé dès le commencement, pour que nous le sachions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et longtemps d’avance, pour que nous disions: C’est vrai?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nul ne l’a annoncé, nul ne l’a prédit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et personne n’a entendu vos paroles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'C’est moi le premier qui ai dit à Sion: Les voici, les voici!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et à Jérusalem: J’envoie un messager de bonnes nouvelles!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Je regarde, et il n’y a personne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Personne parmi eux qui prophétise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui puisse répondre, si je l’interroge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Voici, ils ne sont tous que vanité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs œuvres ne sont que néant,
