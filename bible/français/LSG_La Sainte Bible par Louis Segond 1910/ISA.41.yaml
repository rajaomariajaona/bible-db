document_id: ISA.41,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Israël doit mettre sa confiance en l’Éternel
  - type: heading
    content: 'V. 1-7: cf. És 45:1-7. Ps 97:1, 7-9.'
  - type: text
    content: Iles, faites silence pour m’écouter!
  - type: text
    content: Que les peuples raniment leur force,
  - type: text
    content: Qu’ils avancent, et qu’ils parlent!
  - type: text
    content: Approchons pour plaider ensemble.
  '10':
  - type: text
    content: Ne crains rien, car je suis avec toi;
  - type: text
    content: Ne promène pas des regards inquiets, car je suis ton Dieu;
  - type: text
    content: Je te fortifie, je viens à ton secours,
  - type: text
    content: Je te soutiens de ma droite triomphante.
  '11':
  - type: text
    content: 'Voici, '
  - type: note
    content: Ex 23:22. És 60:12. Za 12:3.
  - type: text
    content: ils seront confondus, ils seront couverts de honte,
  - type: text
    content: Tous ceux qui sont irrités contre toi;
  - type: text
    content: Ils seront réduits à rien, ils périront,
  - type: text
    content: Ceux qui disputent contre toi.
  '12':
  - type: text
    content: Tu les chercheras, et ne les trouveras plus,
  - type: text
    content: Ceux qui te suscitaient querelle;
  - type: text
    content: Ils seront réduits à rien, réduits au néant,
  - type: text
    content: Ceux qui te faisaient la guerre.
  '13':
  - type: text
    content: Car je suis l’Éternel, ton Dieu,
  - type: text
    content: Qui fortifie ta droite,
  - type: text
    content: 'Qui te dis: Ne crains rien,'
  - type: text
    content: Je viens à ton secours.
  '14':
  - type: text
    content: Ne crains rien, vermisseau de Jacob,
  - type: text
    content: Faible reste d’Israël;
  - type: text
    content: Je viens à ton secours, dit l’Éternel,
  - type: text
    content: Et le Saint d’Israël est ton sauveur.
  '15':
  - type: text
    content: Voici, je fais de toi un traîneau aigu, tout neuf,
  - type: text
    content: Garni de pointes;
  - type: text
    content: Tu écraseras, tu broieras les montagnes,
  - type: text
    content: 'Et tu rendras les collines semblables à '
  - type: note
    content: És 17:13; 29:5.
  - type: text
    content: de la balle.
  '16':
  - type: text
    content: Tu les vanneras, et le vent les emportera,
  - type: text
    content: Et un tourbillon les dispersera.
  - type: text
    content: Mais toi, tu te réjouiras en l’Éternel,
  - type: text
    content: Tu mettras ta gloire dans le Saint d’Israël.
  '17':
  - type: text
    content: Les malheureux et les indigents cherchent de l’eau, et il n’y en a point;
  - type: text
    content: 'Leur langue est '
  - type: note
    content: Mt 5:6.
  - type: text
    content: desséchée par la soif.
  - type: text
    content: Moi, l’Éternel, je les exaucerai;
  - type: text
    content: Moi, le Dieu d’Israël, je ne les abandonnerai pas.
  '18':
  - type: text
    content: ' '
  - type: note
    content: És 35:7; 44:3.
  - type: text
    content: Je ferai jaillir des fleuves sur les collines,
  - type: text
    content: Et des sources au milieu des vallées;
  - type: note
    content: Ps 107:35.
  - type: text
    content: Je changerai le désert en étang,
  - type: text
    content: Et la terre aride en courants d’eau;
  '19':
  - type: text
    content: Je mettrai dans le désert le cèdre, l’acacia,
  - type: text
    content: Le myrte et l’olivier;
  - type: text
    content: Je mettrai dans les lieux stériles
  - type: text
    content: Le cyprès, l’orme et le buis, tous ensemble;
  '2':
  - type: text
    content: Qui a suscité de l’orient
  - type: text
    content: Celui que le salut appelle à sa suite?
  - type: text
    content: Qui lui a livré les nations et assujetti des rois?
  - type: text
    content: Qui a réduit leur glaive en poussière,
  - type: text
    content: Et leur arc en un chaume qui s’envole?
  '20':
  - type: text
    content: Afin qu’ils voient, qu’ils sachent,
  - type: text
    content: Qu’ils observent et considèrent
  - type: text
    content: Que la main de l’Éternel a fait ces choses,
  - type: text
    content: Que le Saint d’Israël en est l’auteur.
  - type: heading
    content: Contre les faux dieux
  - type: heading
    content: 'V. 21-29: cf. És 43:9-12; 44:7-20. Jé 10:5.'
  '21':
  - type: text
    content: Plaidez votre cause,
  - type: text
    content: Dit l’Éternel;
  - type: text
    content: Produisez vos moyens de défense,
  - type: text
    content: Dit le roi de Jacob.
  '22':
  - type: text
    content: Qu’ils les produisent, et qu’ils nous déclarent
  - type: text
    content: Ce qui doit arriver.
  - type: text
    content: Quelles sont les prédictions que jadis vous avez faites?
  - type: text
    content: Dites-le, pour que nous y prenions garde,
  - type: text
    content: Et que nous en reconnaissions l’accomplissement;
  - type: text
    content: Ou bien, annoncez-nous l’avenir.
  '23':
  - type: text
    content: Dites ce qui arrivera plus tard,
  - type: text
    content: Pour que nous sachions si vous êtes des dieux;
  - type: text
    content: Faites seulement quelque chose de bien ou de mal,
  - type: text
    content: Pour que nous le voyions et le regardions ensemble.
  '24':
  - type: text
    content: Voici, vous n’êtes rien,
  - type: text
    content: Et votre œuvre est le néant;
  - type: text
    content: C’est une abomination que de se complaire en vous.
  '25':
  - type: text
    content: Je l’ai suscité du septentrion, et il est venu;
  - type: text
    content: De l’orient, il invoque mon nom;
  - type: text
    content: Il foule les puissants comme de la boue,
  - type: text
    content: Comme de l’argile que foule un potier.
  '26':
  - type: text
    content: Qui l’a annoncé dès le commencement, pour que nous le sachions,
  - type: text
    content: 'Et longtemps d’avance, pour que nous disions: C’est vrai?'
  - type: text
    content: Nul ne l’a annoncé, nul ne l’a prédit,
  - type: text
    content: Et personne n’a entendu vos paroles.
  '27':
  - type: text
    content: 'C’est moi le premier qui ai dit à Sion: Les voici, les voici!'
  - type: text
    content: 'Et à Jérusalem: J’envoie un messager de bonnes nouvelles!'
  '28':
  - type: text
    content: Je regarde, et il n’y a personne,
  - type: text
    content: Personne parmi eux qui prophétise,
  - type: text
    content: Et qui puisse répondre, si je l’interroge.
  '29':
  - type: text
    content: Voici, ils ne sont tous que vanité,
  - type: text
    content: Leurs œuvres ne sont que néant,
  - type: text
    content: Leurs idoles ne sont qu’un vain souffle.
  '3':
  - type: text
    content: Il s’est mis à leur poursuite, il a parcouru avec bonheur
  - type: text
    content: Un chemin que son pied n’avait jamais foulé.
  '4':
  - type: text
    content: Qui a fait et exécuté ces choses?
  - type: text
    content: C’est celui qui a appelé les générations dès le commencement,
  - type: text
    content: 'Moi, l’Éternel, '
  - type: note
    content: És 43:10; 44:6; 48:12. Ap 1:17; 22:13.
  - type: text
    content: le premier
  - type: text
    content: Et le même jusqu’aux derniers âges.
  '5':
  - type: text
    content: Les îles le voient, et sont dans la crainte,
  - type: text
    content: 'Les extrémités de la terre tremblent:'
  - type: text
    content: Ils s’approchent, ils viennent.
  '6':
  - type: text
    content: Ils s’aident l’un l’autre,
  - type: text
    content: 'Et chacun dit à son frère: Courage!'
  '7':
  - type: text
    content: ' '
  - type: note
    content: És 40:19, 20.
  - type: text
    content: Le sculpteur encourage le fondeur;
  - type: text
    content: Celui qui polit au marteau encourage celui qui frappe sur l’enclume;
  - type: text
    content: 'Il dit de la soudure: Elle est bonne!'
  - type: text
    content: Et il fixe l’idole avec des clous, pour qu’elle ne branle pas.
  - type: heading
    content: 'V. 8-20: cf. És 43:1-7, 19-21. Mi 4:10-13. Ap 2:10, 26, 27.'
  '8':
  - type: text
    content: Mais toi, Israël, mon serviteur,
  - type: text
    content: 'Jacob, '
  - type: note
    content: De 7:6; 10:15; 14:2. Ps 135:4. És 43:1; 44:1.
  - type: text
    content: que j’ai choisi,
  - type: text
    content: 'Race d’Abraham '
  - type: note
    content: 2 Ch 20:7. Ja 2:23.
  - type: text
    content: que j’ai aimé!
  '9':
  - type: text
    content: Toi, que j’ai pris aux extrémités de la terre,
  - type: text
    content: Et que j’ai appelé d’une contrée lointaine,
  - type: text
    content: 'A qui j’ai dit: Tu es mon serviteur,'
  - type: text
    content: Je te choisis, et ne te rejette point!
