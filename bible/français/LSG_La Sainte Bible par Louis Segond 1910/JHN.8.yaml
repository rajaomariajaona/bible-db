      metadata:
        usfm: HEB.10.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: le témoignage de deux hommes est vrai;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: je rends témoignage de moi-même, et
  - type: text
    text: ' '
  - type: usfm
    marker: x
