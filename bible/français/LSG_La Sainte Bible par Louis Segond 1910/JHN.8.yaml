document_id: JHN.8
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus se rendit à la montagne des oliviers. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mais, dès le matin, il alla de nouveau dans le temple, et tout le peuple vint à lui. S’étant assis, il les enseignait. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors les scribes et les pharisiens amenèrent une femme surprise en adultère; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et, la plaçant au milieu du peuple, ils dirent à Jésus: Maître, cette femme a été surprise en flagrant délit d’adultère. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 20:10
      metadata:
        usfm: LEV.20.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 22:22
      metadata:
        usfm: DEU.22.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Moïse, dans la loi, nous a ordonné de lapider de telles femmes: toi donc, que dis-tu? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils disaient cela pour l’éprouver, afin de pouvoir l’accuser. Mais Jésus, s’étant baissé, écrivait avec le doigt sur la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Comme ils continuaient à l’interroger, il se releva et leur dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 17:7
      metadata:
        usfm: DEU.17.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que celui de vous qui est sans péché jette le premier la pierre contre elle.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et s’étant de nouveau baissé, il écrivait sur la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quand ils entendirent cela, accusés par leur conscience, ils se retirèrent un à un, depuis les plus âgés jusqu’aux derniers; et Jésus resta seul avec la femme qui était là au milieu. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors s’étant relevé, et ne voyant plus que la femme, Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Femme, où sont ceux qui t’accusaient? Personne ne t’a-t-il condamnée?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Elle répondit: Non, Seigneur. Et Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je ne te condamne pas non plus: va, et'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 5:14
      metadata:
        usfm: JHN.5.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ne pèche plus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Discours de Jésus sur sa mission divine
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-29: cf. Jn 1:4, 5, 9-12; 5:36, 37; 12:46-50.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jésus leur parla de nouveau, et dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 42:16
      metadata:
        usfm: ISA.42.16
    - type: text
