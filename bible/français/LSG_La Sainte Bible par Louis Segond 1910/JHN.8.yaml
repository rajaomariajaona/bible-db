      metadata:
        usfm: JHN.1.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:5
      metadata:
        usfm: JHN.9.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:35
      metadata:
        usfm: JHN.12.35
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '36'
      metadata:
        usfm: JHN.12.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je suis la lumière du monde; celui qui me suit ne marchera pas dans les ténèbres, mais il aura la lumière de la vie.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Là-dessus, les pharisiens lui dirent: Tu rends témoignage de toi-même; ton témoignage n’est pas vrai. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jésus leur répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 5:31
      metadata:
        usfm: JHN.5.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quoique je rende témoignage de moi-même, mon témoignage est vrai, car je sais d’où je suis venu et où je vais; mais vous, vous ne savez d’où je viens ni où je vais.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous jugez selon la chair; moi, je ne juge personne.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et si je juge, mon jugement est vrai, car je ne suis pas seul; mais le Père qui m’a envoyé est avec moi.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il est écrit dans votre loi que
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 35:30
      metadata:
        usfm: NUM.35.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 17:6
      metadata:
        usfm: DEU.17.6
    - type: text
      text: '; '
    - type: usfm
