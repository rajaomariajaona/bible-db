document_id: JHN.8,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'Jésus se rendit à la montagne des oliviers. '
  '10':
  - type: text
    content: 'Alors s’étant relevé, et ne voyant plus que la femme, Jésus lui dit: '
  - type: text
    content: Femme, où sont ceux qui t’accusaient? Personne ne t’a-t-il condamnée?
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Elle répondit: Non, Seigneur. Et Jésus lui dit: '
  - type: text
    content: 'Je ne te condamne pas non plus: va, et'
  - type: text
    content: ' '
  - type: note
    content: Jn 5:14.
  - type: text
    content: ne pèche plus.
  - type: heading
    content: Discours de Jésus sur sa mission divine
  - type: heading
    content: 'V. 12-29: cf. Jn 1:4, 5, 9-12; 5:36, 37; 12:46-50.'
  '12':
  - type: text
    content: 'Jésus leur parla de nouveau, et dit: '
  - type: note
    content: És 42:16. Jn 1:9; 9:5; 12:35, 36.
  - type: text
    content: Je suis la lumière du monde; celui qui me suit ne marchera pas dans les ténèbres, mais il aura la lumière de la vie.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Là-dessus, les pharisiens lui dirent: Tu rends témoignage de toi-même; ton témoignage n’est pas vrai. '
  '14':
  - type: text
    content: 'Jésus leur répondit: '
  - type: note
    content: Jn 5:31.
  - type: text
    content: Quoique je rende témoignage de moi-même, mon témoignage est vrai, car je sais d’où je suis venu et où je vais; mais vous, vous ne savez d’où je viens ni où je vais.
  '15':
  - type: text
    content: ' '
  - type: text
    content: Vous jugez selon la chair; moi, je ne juge personne.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Et si je juge, mon jugement est vrai, car je ne suis pas seul; mais le Père qui m’a envoyé est avec moi.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Il est écrit dans votre loi que
  - type: text
    content: ' '
  - type: note
    content: No 35:30. De 17:6; 19:15. Mt 18:16. 2 Co 13:1. Hé 10:28.
  - type: text
    content: le témoignage de deux hommes est vrai;
  - type: text
    content: ' '
  '18':
  - type: text
    content: je rends témoignage de moi-même, et
  - type: text
    content: ' '
  - type: note
    content: Mt 3:17; 17:5. Mc 1:11; 9:7. Lu 3:22; 9:35. Jn 1:33; 5:37; 6:27.
  - type: text
    content: le Père qui m’a envoyé rend témoignage de moi.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Ils lui dirent donc: Où est ton Père? Jésus répondit: '
  - type: note
    content: Jn 16:3.
  - type: text
    content: Vous ne connaissez ni moi, ni mon Père.
  - type: text
    content: ' '
  - type: note
    content: Jn 14:9.
  - type: text
    content: Si vous me connaissiez, vous connaîtriez aussi mon Père.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Mais, dès le matin, il alla de nouveau dans le temple, et tout le peuple vint à lui. S’étant assis, il les enseignait. '
  '20':
  - type: text
    content: 'Jésus dit ces paroles, enseignant dans le temple, au lieu où était le trésor; '
  - type: note
    content: Jn 7:30.
  - type: text
    content: 'et personne ne le saisit, parce que son heure n’était pas encore venue. '
  '21':
  - type: text
    content: 'Jésus leur dit encore: '
  - type: note
    content: Jn 7:34; 13:33.
  - type: text
    content: Je m’en vais, et vous me chercherez, et vous mourrez dans votre péché; vous ne pouvez venir où je vais.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Sur quoi les Juifs dirent: Se tuera-t-il lui-même, puisqu’il dit: Vous ne pouvez venir où je vais? '
  '23':
  - type: text
    content: 'Et il leur dit: '
  - type: note
    content: Jn 3:31.
  - type: text
    content: Vous êtes d’en bas; moi, je suis d’en haut. Vous êtes de ce monde; moi, je ne suis pas de ce monde.
  '24':
  - type: text
    content: ' '
  - type: text
    content: C’est pourquoi je vous ai dit
  - type: text
    content: ' '
  - type: note
    content: Jn 8:21.
  - type: text
    content: que vous mourrez dans vos péchés; car si vous ne croyez pas ce que je suis, vous mourrez dans vos péchés.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Qui es-tu? Lui dirent-ils. Jésus leur répondit: '
  - type: text
    content: Ce que je vous dis dès le commencement.
  '26':
  - type: text
    content: ' '
  - type: text
    content: J’ai beaucoup de choses à dire de vous et à juger en vous; mais celui qui m’a envoyé
  - type: text
    content: ' '
  - type: note
    content: Jn 7:28. Ro 3:4.
  - type: text
    content: est vrai,
  - type: text
    content: ' '
  - type: note
    content: Jn 15:15.
  - type: text
    content: et ce que j’ai entendu de lui, je le dis au monde.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Ils ne comprirent point qu’il leur parlait du Père. '
  '28':
  - type: text
    content: 'Jésus donc leur dit: '
  - type: note
    content: No 21:9. 2 R 18:4. Jn 3:14; 12:32.
  - type: text
    content: Quand vous aurez élevé le Fils de l’homme, alors vous connaîtrez ce que je suis, et que je ne fais rien de moi-même,
  - type: text
    content: ' '
  - type: note
    content: Jn 3:11; 7:16; 12:49; 14:10, 24.
  - type: text
    content: mais que je parle selon ce que le Père m’a enseigné.
  '29':
  - type: text
    content: ' '
  - type: note
    content: Jn 14:10; 16:32.
  - type: text
    content: Celui qui m’a envoyé est avec moi; il ne m’a pas laissé seul, parce que je fais toujours ce qui lui est agréable.
  - type: heading
    content: 'V. 30-47: cf. (Ro 6:14, etc.; 8:1, 2.) Ga 3:7, 29. 1 Jn 3:8-10.'
  '3':
  - type: text
    content: 'Alors les scribes et les pharisiens amenèrent une femme surprise en adultère; '
  '30':
  - type: text
    content: 'Comme Jésus parlait ainsi, '
  - type: note
    content: Jn 7:31.
  - type: text
    content: 'plusieurs crurent en lui. '
  '31':
  - type: text
    content: 'Et il dit aux Juifs qui avaient cru en lui: '
  - type: text
    content: Si vous demeurez dans ma parole, vous êtes vraiment mes disciples;
  '32':
  - type: text
    content: ' '
  - type: text
    content: vous connaîtrez la vérité, et
  - type: text
    content: ' '
  - type: note
    content: Ro 6:18. Ga 5:1. 1 Pi 2:16.
  - type: text
    content: la vérité vous affranchira.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Ils lui répondirent: '
  - type: note
    content: Mt 3:9.
  - type: text
    content: 'Nous sommes la postérité d’Abraham, et nous ne fûmes jamais esclaves de personne; comment dis-tu: Vous deviendrez libres?'
  '34':
  - type: text
    content: ' '
  - type: text
    content: En vérité, en vérité, je vous le dis,
  - type: text
    content: ' leur répliqua Jésus, '
  - type: text
    content: quiconque se livre au péché
  - type: text
    content: ' '
  - type: note
    content: Ro 6:20. 2 Pi 2:19.
  - type: text
    content: est esclave du péché.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Or, l’esclave ne demeure pas toujours dans la maison; le fils y demeure toujours.
  - type: text
    content: ' '
  '36':
  - type: note
    content: Ro 8:2.
  - type: text
    content: Si donc le Fils vous affranchit, vous serez réellement libres.
  - type: text
    content: ' '
  '37':
  - type: text
    content: Je sais que vous êtes la postérité d’Abraham; mais vous cherchez à me faire mourir, parce que ma parole ne pénètre pas en vous.
  - type: text
    content: ' '
  '38':
  - type: note
    content: Jn 3:11; 7:16; 12:49; 14:10, 24.
  - type: text
    content: Je dis ce que j’ai vu chez mon Père; et vous, vous faites ce que vous avez entendu de la part de votre père.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Ils lui répondirent: Notre père, c’est Abraham. Jésus leur dit: '
  - type: note
    content: Ro 2:28; 9:7.
  - type: text
    content: Si vous étiez enfants d’Abraham, vous feriez les œuvres d’Abraham.
  '4':
  - type: text
    content: 'et, la plaçant au milieu du peuple, ils dirent à Jésus: Maître, cette femme a été surprise en flagrant délit d’adultère. '
  '40':
  - type: text
    content: ' '
  - type: text
    content: Mais maintenant vous cherchez à me faire mourir, moi
  - type: text
    content: ' '
  - type: note
    content: Jn 17:17.
  - type: text
    content: qui vous ai dit la vérité que j’ai entendue de Dieu. Cela, Abraham ne l’a point fait.
  - type: text
    content: ' '
  '41':
  - type: text
    content: Vous faites les œuvres de votre père.
  - type: text
    content: ' Ils lui dirent: Nous ne sommes pas des enfants illégitimes; nous avons un seul Père, Dieu. '
  '42':
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: Si Dieu était votre Père, vous m’aimeriez, car c’est de Dieu que je suis sorti et que je viens;
  - type: text
    content: ' '
  - type: note
    content: Jn 5:43; 7:29.
  - type: text
    content: je ne suis pas venu de moi-même, mais c’est lui qui m’a envoyé.
  '43':
  - type: text
    content: ' '
  - type: text
    content: Pourquoi ne comprenez-vous pas mon langage? Parce que vous ne pouvez écouter ma parole.
  - type: text
    content: ' '
  '44':
  - type: note
    content: 1 Jn 3:8.
  - type: text
    content: Vous avez pour père le diable, et vous voulez accomplir les désirs de votre père.
  - type: text
    content: ' '
  - type: note
    content: Ge 3:1. 2 Co 11:3. 1 Jn 3:8.
  - type: text
    content: Il a été meurtrier dès le commencement, et il
  - type: text
    content: ' '
  - type: note
    content: Jud v. 6.
  - type: text
    content: ne se tient pas dans la vérité, parce qu’il n’y a pas de vérité en lui. Lorsqu’il profère le mensonge, il parle de son propre fonds; car il est menteur et le père du mensonge.
  - type: text
    content: ' '
  '45':
  - type: text
    content: Et moi, parce que je dis la vérité, vous ne me croyez pas.
  - type: text
    content: ' '
  '46':
  - type: text
    content: Qui de vous me convaincra de péché? Si je dis la vérité, pourquoi ne me croyez-vous pas?
  - type: text
    content: ' '
  '47':
  - type: note
    content: Jn 6:37; 10:26, 27. 1 Jn 4:6.
  - type: text
    content: Celui qui est de Dieu, écoute les paroles de Dieu; vous n’écoutez pas, parce que vous n’êtes pas de Dieu.
  - type: heading
    content: 'V. 48-59: cf. Hé 12:3. (Jn 10:26-33. Col 1:17.)'
  '48':
  - type: text
    content: 'Les Juifs lui répondirent: N’avons-nous pas raison de dire que tu es un Samaritain, '
  - type: note
    content: Jn 7:20; 10:20.
  - type: text
    content: 'et que tu as un démon? '
  '49':
  - type: text
    content: 'Jésus répliqua: '
  - type: text
    content: Je n’ai point de démon;
  - type: text
    content: ' '
  - type: note
    content: Jn 7:18.
  - type: text
    content: mais j’honore mon Père, et vous m’outragez.
  '5':
  - type: note
    content: Lé 20:10. De 22:22.
  - type: text
    content: 'Moïse, dans la loi, nous a ordonné de lapider de telles femmes: toi donc, que dis-tu? '
  '50':
  - type: text
    content: ' '
  - type: text
    content: Je ne cherche point ma gloire; il en est un qui la cherche et qui juge.
  - type: text
    content: ' '
  '51':
  - type: text
    content: En vérité, en vérité, je vous le dis,
  - type: text
    content: ' '
  - type: note
    content: Jn 5:24; 11:25.
  - type: text
    content: si quelqu’un garde ma parole, il ne verra jamais la mort.
  - type: text
    content: ' '
  '52':
  - type: text
    content: 'Maintenant, lui dirent les Juifs, nous connaissons que tu as un démon. Abraham est mort, les prophètes aussi, et tu dis: Si quelqu’un garde ma parole, il ne verra jamais la mort. '
  '53':
  - type: text
    content: 'Es-tu plus grand que notre père Abraham, '
  - type: note
    content: Hé 11:13.
  - type: text
    content: 'qui est mort? Les prophètes aussi sont morts. Qui prétends-tu être? '
  '54':
  - type: text
    content: 'Jésus répondit: '
  - type: text
    content: Si je me glorifie moi-même, ma gloire n’est rien. C’est mon Père qui me glorifie, lui que vous dites être votre Dieu,
  '55':
  - type: text
    content: ' '
  - type: text
    content: et que vous ne connaissez pas. Pour moi, je le connais; et, si je disais que je ne le connais pas, je serais semblable à vous, un menteur. Mais je le connais, et je garde sa parole.
  - type: text
    content: ' '
  '56':
  - type: text
    content: Abraham, votre père, a tressailli de joie de ce qu’il
  - type: text
    content: ' '
  - type: note
    content: Ge 17:17. Lu 10:24. Hé 11:13.
  - type: text
    content: 'verrait mon jour: il l’a vu, et il s’est réjoui.'
  - type: text
    content: ' '
  '57':
  - type: text
    content: 'Les Juifs lui dirent: Tu n’as pas encore cinquante ans, et tu as vu Abraham! '
  '58':
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: En vérité, en vérité, je vous le dis, avant qu’Abraham fût, je suis.
  - type: text
    content: ' '
  '59':
  - type: note
    content: Lu 4:29. Jn 10:31, 39; 11:8.
  - type: text
    content: Là-dessus, ils prirent des pierres pour les jeter contre lui; mais Jésus se cacha, et il sortit du temple.
  '6':
  - type: text
    content: 'Ils disaient cela pour l’éprouver, afin de pouvoir l’accuser. Mais Jésus, s’étant baissé, écrivait avec le doigt sur la terre. '
  '7':
  - type: text
    content: 'Comme ils continuaient à l’interroger, il se releva et leur dit: '
  - type: note
    content: De 17:7.
  - type: text
    content: Que celui de vous qui est sans péché jette le premier la pierre contre elle.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Et s’étant de nouveau baissé, il écrivait sur la terre. '
  '9':
  - type: text
    content: 'Quand ils entendirent cela, accusés par leur conscience, ils se retirèrent un à un, depuis les plus âgés jusqu’aux derniers; et Jésus resta seul avec la femme qui était là au milieu. '
