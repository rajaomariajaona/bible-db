document_id: EPH.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le salut par la grâce
  - type: heading
    content: 'V. 1-10: cf. Ép 1:19, 20. Col 2:12, 13; 3:1-3. Tit 3:3-8. 2 Co 5:17.'
  - type: text
    content: ' '
  - type: note
    content: Ro 5:6. Col 2:13.
  - type: text
    content: 'Vous étiez morts par vos offenses et par vos péchés, '
  '10':
  - type: text
    content: 'Car nous sommes son ouvrage, '
  - type: note
    content: 2 Co 5:17. Ép 1:4; 4:24. Tit 2:14.
  - type: text
    content: ayant été créés en Jésus-Christ pour de bonnes œuvres, que Dieu a préparées d’avance, afin que nous les pratiquions.
  - type: heading
    content: Les païens et les Juifs unis ensemble avec Dieu par la croix de Christ
  - type: heading
    content: 'V. 11-18: cf. Col 2:13, 14; 1:20-22. Ga 3:28, 29. Hé 10:19-22. Za 6:15.'
  '11':
  - type: text
    content: 'C’est pourquoi, vous autrefois païens dans la chair, appelés incirconcis par ceux qu’on appelle circoncis et qui le sont en la chair par la main de l’homme, '
  '12':
  - type: text
    content: 'souvenez-vous que vous étiez en ce temps-là sans Christ, privés du droit de cité en Israël, étrangers '
  - type: note
    content: Ro 9:4.
  - type: text
    content: 'aux alliances de la promesse, sans espérance et sans Dieu dans le monde. '
  '13':
  - type: text
    content: 'Mais maintenant, en Jésus-Christ, vous qui étiez jadis éloignés, vous avez été rapprochés par le sang de Christ. '
  '14':
  - type: note
    content: És 9:5. Mi 5:4. Jn 16:33. Ac 10:36. Ro 5:1. Col 1:20.
  - type: text
    content: 'Car il est notre paix, lui qui des deux n’en a fait qu’un, et qui a renversé le mur de séparation, l’inimitié, '
  '15':
  - type: text
    content: 'ayant anéanti par sa chair la loi des ordonnances dans ses prescriptions, afin de créer en lui-même avec les deux un seul homme nouveau, en établissant la paix, '
  '16':
  - type: text
    content: 'et de les réconcilier, l’un et l’autre en un seul corps, avec Dieu par la croix, en détruisant par elle l’inimitié. '
  '17':
  - type: note
    content: És 57:19. Ép 3:12.
  - type: text
    content: 'Il est venu annoncer la paix à vous qui étiez loin, et la paix à ceux qui étaient près; '
  '18':
  - type: note
    content: Jn 10:9, 14, 6. Ro 5:2. Ép 3:12. Hé 10:19.
  - type: text
    content: car par lui nous avons les uns et les autres accès auprès du Père, dans un même Esprit.
  - type: heading
    content: 'V. 19-22: cf. Ép 3:6. (1 Pi 2:4-7. 1 Co 3:9-11, 16, 17.)'
  '19':
  - type: text
    content: 'Ainsi donc, vous n’êtes plus des étrangers, ni des gens du dehors; mais vous êtes concitoyens des saints, '
  - type: note
    content: Ga 6:10.
  - type: text
    content: 'gens de la maison de Dieu. '
  '2':
  - type: note
    content: 1 Co 6:11. Col 3:7. Tit 3:3.
  - type: text
    content: 'dans lesquels vous marchiez autrefois, selon le train de ce monde, '
  - type: note
    content: Jn 12:31; 14:30; 16:11. Ép 6:12.
  - type: text
    content: 'selon le prince de la puissance de l’air, de l’esprit qui agit maintenant dans les fils de la rébellion. '
  '20':
  - type: text
    content: 'Vous avez été '
  - type: note
    content: 1 Co 3:9, 10.
  - type: text
    content: 'édifiés '
  - type: note
    content: És 28:16. Mt 16:18. 1 Co 3:10. Ap 21:14.
  - type: text
    content: 'sur le fondement des apôtres et des prophètes, '
  - type: note
    content: 1 Pi 2:4.
  - type: text
    content: 'Jésus-Christ lui-même étant la pierre angulaire. '
  '21':
  - type: note
    content: Ép 4:16.
  - type: text
    content: 'En lui tout l’édifice, bien coordonné, s’élève pour être '
  - type: note
    content: 1 Co 6:19. 2 Co 6:16.
  - type: text
    content: 'un temple saint dans le Seigneur. '
  '22':
  - type: text
    content: En lui vous êtes aussi édifiés pour être une habitation de Dieu en Esprit.
  '3':
  - type: text
    content: 'Nous tous aussi, nous étions de leur nombre, et nous vivions autrefois selon les convoitises de notre chair, accomplissant les volontés de la chair et de nos pensées, et nous étions par nature des enfants de colère, comme les autres… '
  '4':
  - type: text
    content: 'Mais Dieu, qui est riche en miséricorde, à cause du grand amour dont il nous a aimés, '
  '5':
  - type: text
    content: 'nous qui étions morts par nos offenses, '
  - type: note
    content: Ro 6:8; 8:11. Col 3:1, 2.
  - type: text
    content: nous a rendus à la vie avec Christ (
  - type: note
    content: Ac 15:11. Tit 3:5.
  - type: text
    content: 'c’est par grâce que vous êtes sauvés); '
  '6':
  - type: text
    content: 'il nous a ressuscités ensemble, et nous a fait asseoir ensemble dans les lieux célestes, en Jésus-Christ, '
  '7':
  - type: text
    content: 'afin de montrer dans les siècles à venir l’infinie richesse de sa grâce par sa bonté envers nous en Jésus-Christ. '
  '8':
  - type: text
    content: 'Car c’est par la grâce que vous êtes sauvés, par le moyen de la foi. Et cela ne vient pas de vous, '
  - type: note
    content: Mt 16:17. Ép 1:19.
  - type: text
    content: 'c’est le don de Dieu. '
  '9':
  - type: text
    content: 'Ce n’est point par les œuvres, '
  - type: note
    content: Ro 3:27. 1 Co 1:29.
  - type: text
    content: 'afin que personne ne se glorifie. '
