document_id: GEN.7
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. Ge 6:8-22. Mt 24:37-39.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel dit '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:5
      metadata:
        usfm: 2PE.2.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à Noé: Entre dans l’arche, toi et toute ta maison; car je '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 6:9
      metadata:
        usfm: GEN.6.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 't’ai vu juste devant moi parmi cette génération. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 11
      metadata:
        usfm: LEV.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu prendras auprès de toi sept couples de tous les animaux purs, le mâle et sa femelle; une paire des animaux qui ne sont pas purs, le mâle et sa femelle; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'sept couples aussi des oiseaux du ciel, mâle et femelle, afin de conserver leur race en vie sur la face de toute la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Car, encore sept jours, et je ferai pleuvoir sur la terre quarante jours et quarante nuits, et j’exterminerai de la face de la terre tous les êtres que j’ai faits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 6:22
      metadata:
        usfm: GEN.6.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Noé exécuta tout ce que l’Éternel lui avait ordonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Noé avait six cents ans, lorsque le déluge d’eaux fut sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et Noé '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 24:38
      metadata:
        usfm: MAT.24.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 17:27
      metadata:
        usfm: LUK.17.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:20
      metadata:
        usfm: 1PE.3.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'entra dans l’arche avec ses fils, sa femme et les femmes de ses fils, pour échapper aux eaux du déluge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'D’entre les animaux purs et les animaux qui ne sont pas purs, les oiseaux et tout ce qui se meut sur la terre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: il entra dans l’arche auprès de Noé, deux à deux, un mâle et une femelle, comme Dieu l’avait ordonné à Noé.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-24: cf. Pr 29:1. Job 22:15-18. 2 Pi 2:5-9; 3:3-12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Sept jours après, les eaux du déluge furent sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’an six cent de la vie de Noé, le second mois, le dix-septième jour du mois, en ce jour-là toutes les sources du grand abîme jaillirent, et les écluses des cieux s’ouvrirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'La pluie tomba sur la terre quarante jours et quarante nuits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ce même jour entrèrent dans l’arche Noé, Sem, Cham et Japhet, fils de Noé, la femme de Noé et les trois femmes de ses fils avec eux: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'eux, et tous les animaux selon leur espèce, tout le bétail selon son espèce, tous les reptiles qui rampent sur la terre selon leur espèce, tous les oiseaux selon leur espèce, tous les petits oiseaux, tout ce qui a des ailes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils entrèrent dans l’arche auprès de Noé, deux à deux, de toute chair ayant souffle de vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il en entra, mâle et femelle, de toute chair, comme Dieu l’avait ordonné à Noé. Puis l’Éternel ferma la porte sur lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le déluge fut quarante jours sur la terre. Les eaux crûrent et soulevèrent l’arche, et elle s’éleva au-dessus de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les eaux grossirent et s’accrurent beaucoup sur la terre, et l’arche flotta sur la surface des eaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les eaux grossirent de plus en plus, et toutes les hautes montagnes qui sont sous le ciel entier furent couvertes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les eaux s’élevèrent de quinze coudées au-dessus des montagnes, qui furent couvertes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 17:27
      metadata:
        usfm: LUK.17.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout ce qui se mouvait sur la terre périt, tant les oiseaux que le bétail et les animaux, tout ce qui rampait sur la terre, et tous les hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tout ce qui avait respiration, souffle de vie dans ses narines, et qui était sur la terre sèche, mourut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tous les êtres qui étaient sur la face de la terre furent exterminés, depuis l’homme jusqu’au bétail, aux reptiles et aux oiseaux du ciel: ils furent exterminés de la terre. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:5
      metadata:
        usfm: 2PE.2.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il ne resta que Noé, et ce qui était avec lui dans l’arche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Les eaux furent grosses sur la terre pendant cent cinquante jours.
