document_id: PSA.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 19:1-7. Hé 2:6-10. Ps 113.
  - type: text
    content: Au chef des chantres. Sur la guitthith. Psaume de David.
  '10':
  - type: text
    content: Éternel, notre Seigneur!
  - type: text
    content: Que ton nom est magnifique sur toute la terre!
  '2':
  - type: text
    content: Éternel, notre Seigneur!
  - type: text
    content: Que ton nom est magnifique sur toute la terre!
  - type: text
    content: Ta majesté s’élève au-dessus des cieux.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Mt 21:16.
  - type: text
    content: Par la bouche des enfants et de ceux qui sont à la mamelle
  - type: text
    content: Tu as fondé ta gloire, pour confondre tes adversaires,
  - type: text
    content: Pour imposer silence à l’ennemi et au vindicatif.
  '4':
  - type: text
    content: Quand je contemple les cieux, ouvrage de tes mains,
  - type: text
    content: 'La lune et les étoiles que tu as créées:'
  '5':
  - type: text
    content: ' '
  - type: note
    content: Job 7:17. Ps 144:3. Hé 2:6.
  - type: text
    content: Qu’est-ce que l’homme, pour que tu te souviennes de lui?
  - type: text
    content: Et le fils de l’homme, pour que tu prennes garde à lui?
  '6':
  - type: text
    content: Tu l’as fait de peu inférieur à Dieu,
  - type: text
    content: Et tu l’as couronné de gloire et de magnificence.
  '7':
  - type: text
    content: Tu lui as donné la domination sur les œuvres de tes mains,
  - type: note
    content: 1 Co 15:27.
  - type: text
    content: Tu as tout mis sous ses pieds,
  '8':
  - type: text
    content: Les brebis comme les bœufs,
  - type: text
    content: Et les animaux des champs,
  '9':
  - type: text
    content: Les oiseaux du ciel et les poissons de la mer,
  - type: text
    content: Tout ce qui parcourt les sentiers des mers.
