document_id: PSA.8,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 19:1-7. Hé 2:6-10. Ps 113.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au chef des chantres. Sur la guitthith. Psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, notre Seigneur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ton nom est magnifique sur toute la terre!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, notre Seigneur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ton nom est magnifique sur toute la terre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta majesté s’élève au-dessus des cieux.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 21:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Par la bouche des enfants et de ceux qui sont à la mamelle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as fondé ta gloire, pour confondre tes adversaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour imposer silence à l’ennemi et au vindicatif.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je contemple les cieux, ouvrage de tes mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La lune et les étoiles que tu as créées:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 7:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 144:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 2:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qu’est-ce que l’homme, pour que tu te souviennes de lui?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le fils de l’homme, pour que tu prennes garde à lui?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu l’as fait de peu inférieur à Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu l’as couronné de gloire et de magnificence.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu lui as donné la domination sur les œuvres de tes mains,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tu as tout mis sous ses pieds,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les brebis comme les bœufs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les animaux des champs,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les oiseaux du ciel et les poissons de la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout ce qui parcourt les sentiers des mers.
