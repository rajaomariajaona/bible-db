document_id: JOB.37
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mon cœur est tout tremblant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il bondit hors de sa place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Écoutez, écoutez le frémissement de sa voix,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 29:3
      metadata:
        usfm: PSA.29.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le grondement qui sort de sa bouche!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il le fait rouler dans toute l’étendue des cieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et son éclair brille jusqu’aux extrémités de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Puis éclate un rugissement: il tonne de sa voix majestueuse;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne retient plus l’éclair, dès que sa voix retentit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dieu tonne avec sa voix d’une manière merveilleuse;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 5:9
      metadata:
        usfm: JOB.5.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:10
      metadata:
        usfm: JOB.9.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 36:26
      metadata:
        usfm: JOB.36.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il fait de grandes choses que nous ne comprenons pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 147:16
      metadata:
        usfm: PSA.147.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il dit à la neige: Tombe sur la terre!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il le dit à la pluie, même aux plus fortes pluies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il met un sceau sur la main de tous les hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que tous se reconnaissent comme ses créatures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’animal sauvage se retire dans une caverne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et se couche dans sa tanière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’ouragan vient du midi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le froid, des vents du nord.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 38:29
      metadata:
        usfm: JOB.38.29
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '30'
      metadata:
        usfm: JOB.38.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 147:17
      metadata:
        usfm: PSA.147.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: PSA.147.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Par son souffle Dieu produit la glace,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il réduit l’espace où se répandaient les eaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il charge de vapeurs les nuages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les disperse étincelants;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Leurs évolutions varient selon ses desseins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour l’accomplissement de tout ce qu’il leur ordonne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur la face de la terre habitée;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C’est comme une verge dont il frappe sa terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ou comme '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 9:18
      metadata:
        usfm: EXO.9.18
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '23'
      metadata:
        usfm: EXO.9.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 12:18
      metadata:
        usfm: 1SA.12.18
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: 1SA.12.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esd 10:9
      metadata:
        usfm: EZR.10.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 36:31
      metadata:
        usfm: JOB.36.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: un signe de son amour, qu’il les fait apparaître.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-24: cf. (Job 36:22, etc.; 37:1-13.) (Ps 104:24; 107:43.) (Job 9:10. Ps 139:17; 145:3.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Job, sois attentif à ces choses!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Considère encore les merveilles de Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Sais-tu comment Dieu les dirige,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et fait briller son nuage étincelant?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Comprends-tu le balancement des nuées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les merveilles de celui dont la science est parfaite?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Sais-tu pourquoi tes vêtements sont chauds
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand la terre se repose par le vent du midi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 1:6
      metadata:
        usfm: GEN.1.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Peux-tu comme lui étendre les cieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi solides qu’un miroir de fonte?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fais-nous connaître ce que nous devons lui dire;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous sommes trop ignorants pour nous adresser à lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Lui annoncera-t-on que je parlerai?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais quel est l’homme qui désire sa perte?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: On ne peut fixer le soleil qui resplendit dans les cieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lorsqu’un vent passe et en ramène la pureté;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Le septentrion le rend éclatant comme l’or.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh! Que la majesté de Dieu est redoutable!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Nous ne saurions parvenir jusqu’au Tout-Puissant,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 9:4
      metadata:
        usfm: JOB.9.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:13
      metadata:
        usfm: JOB.12.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: JOB.12.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 36:5
      metadata:
        usfm: JOB.36.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 99:4
      metadata:
        usfm: PSA.99.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Grand par la force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Par la justice, par le droit souverain:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne répond pas!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: C’est pourquoi les hommes doivent le craindre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne porte les regards sur aucun sage.
