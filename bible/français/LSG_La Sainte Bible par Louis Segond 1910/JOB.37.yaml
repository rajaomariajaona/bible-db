document_id: JOB.37,93
type_code: fra
verses:
  '1':
  - type: text
    content: Mon cœur est tout tremblant,
  - type: text
    content: Il bondit hors de sa place.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Job 38:29, 30. Ps 147:17, 18.
  - type: text
    content: Par son souffle Dieu produit la glace,
  - type: text
    content: Il réduit l’espace où se répandaient les eaux.
  '11':
  - type: text
    content: Il charge de vapeurs les nuages,
  - type: text
    content: Il les disperse étincelants;
  '12':
  - type: text
    content: Leurs évolutions varient selon ses desseins,
  - type: text
    content: Pour l’accomplissement de tout ce qu’il leur ordonne,
  - type: text
    content: Sur la face de la terre habitée;
  '13':
  - type: text
    content: C’est comme une verge dont il frappe sa terre,
  - type: text
    content: 'Ou comme '
  - type: note
    content: Ex 9:18, 23. 1 S 12:18, 19. Esd 10:9. Job 36:31.
  - type: text
    content: un signe de son amour, qu’il les fait apparaître.
  - type: heading
    content: 'V. 14-24: cf. (Job 36:22, etc.; 37:1-13.) (Ps 104:24; 107:43.) (Job 9:10. Ps 139:17; 145:3.)'
  '14':
  - type: text
    content: Job, sois attentif à ces choses!
  - type: text
    content: Considère encore les merveilles de Dieu!
  '15':
  - type: text
    content: Sais-tu comment Dieu les dirige,
  - type: text
    content: Et fait briller son nuage étincelant?
  '16':
  - type: text
    content: Comprends-tu le balancement des nuées,
  - type: text
    content: Les merveilles de celui dont la science est parfaite?
  '17':
  - type: text
    content: Sais-tu pourquoi tes vêtements sont chauds
  - type: text
    content: Quand la terre se repose par le vent du midi?
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ge 1:6.
  - type: text
    content: Peux-tu comme lui étendre les cieux,
  - type: text
    content: Aussi solides qu’un miroir de fonte?
  '19':
  - type: text
    content: Fais-nous connaître ce que nous devons lui dire;
  - type: text
    content: Nous sommes trop ignorants pour nous adresser à lui.
  '2':
  - type: text
    content: Écoutez, écoutez le frémissement de sa voix,
  - type: note
    content: Ps 29:3.
  - type: text
    content: Le grondement qui sort de sa bouche!
  '20':
  - type: text
    content: Lui annoncera-t-on que je parlerai?
  - type: text
    content: Mais quel est l’homme qui désire sa perte?
  '21':
  - type: text
    content: On ne peut fixer le soleil qui resplendit dans les cieux,
  - type: text
    content: Lorsqu’un vent passe et en ramène la pureté;
  '22':
  - type: text
    content: Le septentrion le rend éclatant comme l’or.
  - type: text
    content: Oh! Que la majesté de Dieu est redoutable!
  '23':
  - type: text
    content: Nous ne saurions parvenir jusqu’au Tout-Puissant,
  - type: note
    content: Job 9:4; 12:13, 16; 36:5. Ps 99:4.
  - type: text
    content: Grand par la force,
  - type: text
    content: 'Par la justice, par le droit souverain:'
  - type: text
    content: Il ne répond pas!
  '24':
  - type: text
    content: C’est pourquoi les hommes doivent le craindre;
  - type: text
    content: Il ne porte les regards sur aucun sage.
  '3':
  - type: text
    content: Il le fait rouler dans toute l’étendue des cieux,
  - type: text
    content: Et son éclair brille jusqu’aux extrémités de la terre.
  '4':
  - type: text
    content: 'Puis éclate un rugissement: il tonne de sa voix majestueuse;'
  - type: text
    content: Il ne retient plus l’éclair, dès que sa voix retentit.
  '5':
  - type: text
    content: Dieu tonne avec sa voix d’une manière merveilleuse;
  - type: note
    content: Job 5:9; 9:10; 36:26.
  - type: text
    content: Il fait de grandes choses que nous ne comprenons pas.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps 147:16.
  - type: text
    content: 'Il dit à la neige: Tombe sur la terre!'
  - type: text
    content: Il le dit à la pluie, même aux plus fortes pluies.
  '7':
  - type: text
    content: Il met un sceau sur la main de tous les hommes,
  - type: text
    content: Afin que tous se reconnaissent comme ses créatures.
  '8':
  - type: text
    content: L’animal sauvage se retire dans une caverne,
  - type: text
    content: Et se couche dans sa tanière.
  '9':
  - type: text
    content: L’ouragan vient du midi,
  - type: text
    content: Et le froid, des vents du nord.
