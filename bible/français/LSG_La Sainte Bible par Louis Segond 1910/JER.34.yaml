document_id: JER.34,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie sur le sort de Sédécias
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. Jé 21:1-7; 32:1-5; 52:8-11.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole qui fut adressée à Jérémie de la part de l’Éternel, en ces mots, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: '2 R 25:1, etc. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 52
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'lorsque Nebucadnetsar, roi de Babylone, avec toute son armée, et tous les royaumes des pays sous sa domination, et tous les peuples, faisaient la guerre à Jérusalem et à toutes les villes qui en dépendaient: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les chefs et tout le peuple, qui étaient entrés dans le pacte, s’engagèrent à renvoyer libres chacun son esclave et sa servante, afin de ne plus les tenir dans la servitude; ils obéirent, et les renvoyèrent. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ensuite ils changèrent d’avis; ils reprirent les esclaves et les servantes qu’ils avaient affranchis, et les forcèrent à redevenir esclaves et servantes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors la parole de l’Éternel fut adressée à Jérémie de la part de l’Éternel, en ces mots: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi parle l’Éternel, le Dieu d’Israël: J’ai fait une alliance avec vos pères, le jour où je les ai fait sortir du pays d’Égypte, de la maison de servitude; et je leur ai dit: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 21:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 15:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Au bout de sept ans, chacun de vous renverra libre son frère hébreu qui se vend à lui; il te servira six années, puis tu le renverras libre de chez toi. Mais vos pères ne m’ont point écouté, ils n’ont point prêté l’oreille. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous, vous aviez fait aujourd’hui un retour sur vous-mêmes, vous aviez fait ce qui est droit à mes yeux, en publiant la liberté chacun pour son prochain, vous aviez fait un pacte devant moi, dans la maison sur laquelle mon nom est invoqué. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais vous êtes revenus en arrière, et vous avez profané mon nom; vous avez repris chacun les esclaves et les servantes que vous aviez affranchis, rendus à eux-mêmes, et vous les avez forcés à redevenir vos esclaves et vos servantes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi ainsi parle l’Éternel: Vous ne m’avez point obéi, en publiant la liberté chacun pour son frère, chacun pour son prochain. Voici, je publie contre vous, dit l’Éternel, la liberté de l’épée, de la peste et de la famine, et je vous rendrai un objet '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 28:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 15:4
      - type: text
        text: ; 25:9, etc.
      marker-yv: yv-n
    - type: text
      text: 'd’effroi pour tous les royaumes de la terre. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je livrerai les hommes qui ont violé mon alliance, qui n’ont pas observé les conditions du pacte qu’ils avaient fait devant moi, en coupant un veau en deux et en passant entre ses morceaux; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'je livrerai les chefs de Juda et les chefs de Jérusalem, les eunuques, les sacrificateurs, et tout le peuple du pays, qui ont passé entre les morceaux du veau; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi parle l’Éternel, le Dieu d’Israël: Va, et dis à Sédécias, roi de Juda, dis-lui: Ainsi parle l’Éternel: Voici, je livre cette ville entre les mains du roi de Babylone, et il la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 21:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'brûlera par le feu. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'je les livrerai entre les mains de leurs ennemis, entre les mains de ceux qui en veulent à leur vie, et leurs '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 7:33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'cadavres serviront de pâture aux oiseaux du ciel et aux bêtes de la terre. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je livrerai Sédécias, roi de Juda, et ses chefs, entre les mains de leurs ennemis, entre les mains de ceux qui en veulent à leur vie, entre les mains de l’armée du roi de Babylone, qui s’est '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 37:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'éloignée de vous. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voici, je donnerai mes ordres, dit l’Éternel, et je les ramènerai contre cette ville; ils l’attaqueront, ils la prendront, et la brûleront par le feu. Et je ferai des villes de Juda un désert sans habitants.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et toi, tu n’échapperas pas à ses mains, mais tu seras '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 32:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pris et livré entre ses mains, tes yeux verront les yeux du roi de Babylone, et il te parlera bouche à bouche, et tu iras à Babylone. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seulement écoute la parole de l’Éternel, Sédécias, roi de Juda! Ainsi parle l’Éternel sur toi: Tu ne mourras point par l’épée. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu mourras en paix; et comme on a brûlé des parfums pour tes pères, les anciens rois qui t’ont précédé, ainsi on en brûlera pour toi, et l’on te pleurera, en disant: Hélas, seigneur! Car j’ai prononcé cette parole, dit l’Éternel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jérémie, le prophète, dit toutes ces paroles à Sédécias, roi de Juda, à Jérusalem. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et l’armée du roi de Babylone combattait contre Jérusalem et contre toutes les autres villes de Juda, contre Lakis et Azéka, car c’étaient des villes fortes qui restaient parmi les villes de Juda.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Menaces à l’occasion de l’asservissement des esclaves affranchis
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-22: cf. (De 15:12-15. Lé 25:39-43.) Éz 17:11-21. Mt 21:30; 7:21, etc.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole fut adressée à Jérémie de la part de l’Éternel, après que le roi Sédécias eut fait un pacte avec tout le peuple de Jérusalem, pour publier la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 21:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'liberté, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afin que chacun renvoyât libres son esclave et sa servante, l’Hébreu et la femme de l’Hébreu, et que personne ne tînt plus dans la servitude le Juif, son frère. '
