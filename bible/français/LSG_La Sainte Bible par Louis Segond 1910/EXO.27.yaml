document_id: EXO.27
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Description de l’autel, des holocaustes et du parvis
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. (Ex 38:1-8. Éz 43:13-17.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tu feras '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 38:1
      metadata:
        usfm: EXO.38.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’autel de bois d’acacia; sa longueur sera de cinq coudées, et sa largeur de cinq coudées. L’autel sera carré, et sa hauteur sera de trois coudées. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tu feras, aux quatre coins, des cornes qui sortiront de l’autel; et tu le couvriras d’airain. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu feras pour l’autel des cendriers, des pelles, des bassins, des fourchettes et des brasiers; tu feras d’airain tous ses ustensiles. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu feras à l’autel une grille d’airain, en forme de treillis, et tu mettras quatre anneaux d’airain aux quatre coins du treillis. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu le placeras au-dessous du rebord de l’autel, à partir du bas, jusqu’à la moitié de la hauteur de l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu feras des barres pour l’autel, des barres de bois d’acacia, et tu les couvriras d’airain. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'On passera les barres dans les anneaux; et les barres seront aux deux côtés de l’autel, quand on le portera. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tu le feras creux, avec des planches; il sera fait tel qu’il t’est montré sur la montagne.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-19: cf. Ex 38:9-20. Éz 40:17-47.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 38:9
      metadata:
        usfm: EXO.38.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu feras le parvis du tabernacle. Du côté du midi, il y aura, pour former le parvis, des toiles de fin lin retors, sur une longueur de cent coudées pour ce premier côté, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'avec vingt colonnes posant sur vingt bases d’airain; les crochets des colonnes et leurs tringles seront d’argent. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Du côté du nord, il y aura également des toiles sur une longueur de cent coudées, avec vingt colonnes et leurs vingt bases d’airain; les crochets des colonnes et leurs tringles seront d’argent. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Du côté de l’occident, il y aura pour la largeur du parvis cinquante coudées de toiles, avec dix colonnes et leurs dix bases. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Du côté de l’orient, sur les cinquante coudées de largeur du parvis, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'il y aura quinze coudées de toiles pour une aile, avec trois colonnes et leurs trois bases, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et quinze coudées de toiles pour la seconde aile, avec trois colonnes et leurs trois bases. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Pour la porte du parvis il y aura un rideau de vingt coudées, bleu, pourpre et cramoisi, et de fin lin retors, en ouvrage de broderie, avec quatre colonnes et leurs quatre bases. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Toutes les colonnes formant l’enceinte du parvis auront des tringles d’argent, des crochets d’argent, et des bases d’airain. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'La longueur du parvis sera de cent coudées, sa largeur de cinquante de chaque côté, et sa hauteur de cinq coudées; les toiles seront de fin lin retors, et les bases d’airain. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tous les ustensiles destinés au service du tabernacle, tous ses pieux, et tous les pieux du parvis, seront d’airain.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-21: cf. Lé 24:2-4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 24:2
      metadata:
        usfm: LEV.24.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ordonneras aux enfants d’Israël de t’apporter pour le chandelier de l’huile pure d’olives concassées, afin d’entretenir les lampes continuellement. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: C’est dans la tente d’assignation, en dehors du voile qui est devant le témoignage, qu’Aaron et ses fils la prépareront, pour que les lampes brûlent du soir au matin en présence de l’Éternel. C’est une loi perpétuelle pour leurs descendants, et que devront observer les enfants d’Israël.
