document_id: EXO.27,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Description de l’autel, des holocaustes et du parvis
  - type: heading
    content: 'V. 1-8: cf. (Ex 38:1-8. Éz 43:13-17.)'
  - type: text
    content: 'Tu feras '
  - type: note
    content: Ex 38:1.
  - type: text
    content: 'l’autel de bois d’acacia; sa longueur sera de cinq coudées, et sa largeur de cinq coudées. L’autel sera carré, et sa hauteur sera de trois coudées. '
  '10':
  - type: text
    content: 'avec vingt colonnes posant sur vingt bases d’airain; les crochets des colonnes et leurs tringles seront d’argent. '
  '11':
  - type: text
    content: 'Du côté du nord, il y aura également des toiles sur une longueur de cent coudées, avec vingt colonnes et leurs vingt bases d’airain; les crochets des colonnes et leurs tringles seront d’argent. '
  '12':
  - type: text
    content: 'Du côté de l’occident, il y aura pour la largeur du parvis cinquante coudées de toiles, avec dix colonnes et leurs dix bases. '
  '13':
  - type: text
    content: 'Du côté de l’orient, sur les cinquante coudées de largeur du parvis, '
  '14':
  - type: text
    content: 'il y aura quinze coudées de toiles pour une aile, avec trois colonnes et leurs trois bases, '
  '15':
  - type: text
    content: 'et quinze coudées de toiles pour la seconde aile, avec trois colonnes et leurs trois bases. '
  '16':
  - type: text
    content: 'Pour la porte du parvis il y aura un rideau de vingt coudées, bleu, pourpre et cramoisi, et de fin lin retors, en ouvrage de broderie, avec quatre colonnes et leurs quatre bases. '
  '17':
  - type: text
    content: 'Toutes les colonnes formant l’enceinte du parvis auront des tringles d’argent, des crochets d’argent, et des bases d’airain. '
  '18':
  - type: text
    content: 'La longueur du parvis sera de cent coudées, sa largeur de cinquante de chaque côté, et sa hauteur de cinq coudées; les toiles seront de fin lin retors, et les bases d’airain. '
  '19':
  - type: text
    content: Tous les ustensiles destinés au service du tabernacle, tous ses pieux, et tous les pieux du parvis, seront d’airain.
  - type: heading
    content: 'V. 20-21: cf. Lé 24:2-4.'
  '2':
  - type: text
    content: 'Tu feras, aux quatre coins, des cornes qui sortiront de l’autel; et tu le couvriras d’airain. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Lé 24:2.
  - type: text
    content: 'Tu ordonneras aux enfants d’Israël de t’apporter pour le chandelier de l’huile pure d’olives concassées, afin d’entretenir les lampes continuellement. '
  '21':
  - type: text
    content: C’est dans la tente d’assignation, en dehors du voile qui est devant le témoignage, qu’Aaron et ses fils la prépareront, pour que les lampes brûlent du soir au matin en présence de l’Éternel. C’est une loi perpétuelle pour leurs descendants, et que devront observer les enfants d’Israël.
  '3':
  - type: text
    content: 'Tu feras pour l’autel des cendriers, des pelles, des bassins, des fourchettes et des brasiers; tu feras d’airain tous ses ustensiles. '
  '4':
  - type: text
    content: 'Tu feras à l’autel une grille d’airain, en forme de treillis, et tu mettras quatre anneaux d’airain aux quatre coins du treillis. '
  '5':
  - type: text
    content: 'Tu le placeras au-dessous du rebord de l’autel, à partir du bas, jusqu’à la moitié de la hauteur de l’autel. '
  '6':
  - type: text
    content: 'Tu feras des barres pour l’autel, des barres de bois d’acacia, et tu les couvriras d’airain. '
  '7':
  - type: text
    content: 'On passera les barres dans les anneaux; et les barres seront aux deux côtés de l’autel, quand on le portera. '
  '8':
  - type: text
    content: Tu le feras creux, avec des planches; il sera fait tel qu’il t’est montré sur la montagne.
  - type: heading
    content: 'V. 9-19: cf. Ex 38:9-20. Éz 40:17-47.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ex 38:9.
  - type: text
    content: 'Tu feras le parvis du tabernacle. Du côté du midi, il y aura, pour former le parvis, des toiles de fin lin retors, sur une longueur de cent coudées pour ce premier côté, '
