document_id: JOS.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: CONQUÊTE DU PAYS DE CANAAN
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: Ch. 1 à 12. (De 1:38; 31:23. 2 Co 2:14.)
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Josué à la tête du peuple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. De 31:1-8, 14, 23. (Jn 14:1; 16:33.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 34:5
      metadata:
        usfm: DEU.34.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la mort de Moïse, serviteur de l’Éternel, l’Éternel dit à Josué, fils de Nun, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 1:38
      metadata:
        usfm: DEU.1.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'serviteur de Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Moïse, mon serviteur, est mort; maintenant, lève-toi, passe ce Jourdain, toi et tout ce peuple, pour entrer dans le pays que je donne aux enfants d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 11:24
      metadata:
        usfm: DEU.11.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 14:9
      metadata:
        usfm: JOS.14.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout lieu que foulera la plante de votre pied, je vous le donne, comme je l’ai dit à Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Vous aurez pour territoire depuis le désert et le Liban jusqu’au grand fleuve, le fleuve de l’Euphrate, tout le pays des Héthiens, et jusqu’à la grande mer vers le soleil couchant. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nul ne tiendra devant toi, tant que tu vivras. Je serai avec toi, comme j’ai été avec Moïse; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 31:6
      metadata:
        usfm: DEU.31.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: DEU.31.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:5
      metadata:
        usfm: HEB.13.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: HEB.13.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je ne te délaisserai point, je ne t’abandonnerai point. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 31:23
      metadata:
        usfm: DEU.31.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fortifie-toi et prends courage, car c’est toi qui mettras ce peuple en possession du pays que j’ai juré à leurs pères de leur donner. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fortifie-toi seulement et aie bon courage, en agissant fidèlement selon toute la loi que Moïse, mon serviteur, t’a prescrite; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:32
      metadata:
        usfm: DEU.5.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:14
      metadata:
        usfm: DEU.28.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ne t’en détourne ni à droite ni à gauche, afin de réussir dans tout ce que tu entreprendras. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Que ce livre de la loi ne s’éloigne point de ta bouche; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 1:2
      metadata:
        usfm: PSA.1.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'médite-le jour et nuit, pour agir fidèlement selon tout ce qui y est écrit; car c’est alors que tu auras du succès dans tes entreprises, c’est alors que tu réussiras. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ne t’ai-je pas donné cet ordre: Fortifie-toi et prends courage? Ne t’effraie point et ne t’épouvante point, car l’Éternel, ton Dieu, est avec toi dans tout ce que tu entreprendras.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-18: cf. (No 32:16-32. De 3:18-20.) Jos 22:1-9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Josué donna cet ordre aux officiers du peuple: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Parcourez le camp, et voici ce que vous commanderez au peuple: Préparez-vous des provisions, car dans trois jours vous passerez ce Jourdain pour aller conquérir le pays dont l’Éternel, votre Dieu, vous donne la possession. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Josué dit aux Rubénites, aux Gadites et à la demi-tribu de Manassé: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Rappelez-vous ce que vous a prescrit Moïse, serviteur de l’Éternel, quand il a dit: L’Éternel, votre Dieu, vous a accordé du repos, et vous a donné ce pays. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vos femmes, vos petits enfants et vos troupeaux resteront dans le pays que vous a donné Moïse de ce côté-ci du Jourdain; mais vous tous, hommes vaillants, vous passerez en armes devant vos frères, et vous les aiderez, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'jusqu’à ce que l’Éternel ait accordé du repos à vos frères comme à vous, et qu’ils soient aussi en possession du pays que l’Éternel, votre Dieu, leur donne. Puis vous reviendrez prendre possession du pays qui est votre propriété, et que vous a donné Moïse, serviteur de l’Éternel, de ce côté-ci du Jourdain, vers le soleil levant. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils répondirent à Josué, en disant: Nous ferons tout ce que tu nous as ordonné, et nous irons partout où tu nous enverras. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nous t’obéirons entièrement, comme nous avons obéi à Moïse. Veuille seulement l’Éternel, ton Dieu, être avec toi, comme il a été avec Moïse! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tout homme qui sera rebelle à ton ordre, et qui n’obéira pas à tout ce que tu lui commanderas, sera puni de mort. Fortifie-toi seulement, et prends courage!
