document_id: JOS.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: CONQUÊTE DU PAYS DE CANAAN
  - type: heading
    content: Ch. 1 à 12. (De 1:38; 31:23. 2 Co 2:14.)
  - type: heading
    content: Josué à la tête du peuple
  - type: heading
    content: 'V. 1-9: cf. De 31:1-8, 14, 23. (Jn 14:1; 16:33.)'
  - type: text
    content: 'Après '
  - type: note
    content: De 34:5.
  - type: text
    content: 'la mort de Moïse, serviteur de l’Éternel, l’Éternel dit à Josué, fils de Nun, '
  - type: note
    content: De 1:38.
  - type: text
    content: 'serviteur de Moïse: '
  '10':
  - type: text
    content: 'Josué donna cet ordre aux officiers du peuple: '
  '11':
  - type: text
    content: 'Parcourez le camp, et voici ce que vous commanderez au peuple: Préparez-vous des provisions, car dans trois jours vous passerez ce Jourdain pour aller conquérir le pays dont l’Éternel, votre Dieu, vous donne la possession. '
  '12':
  - type: text
    content: 'Josué dit aux Rubénites, aux Gadites et à la demi-tribu de Manassé: '
  '13':
  - type: text
    content: 'Rappelez-vous ce que vous a prescrit Moïse, serviteur de l’Éternel, quand il a dit: L’Éternel, votre Dieu, vous a accordé du repos, et vous a donné ce pays. '
  '14':
  - type: text
    content: 'Vos femmes, vos petits enfants et vos troupeaux resteront dans le pays que vous a donné Moïse de ce côté-ci du Jourdain; mais vous tous, hommes vaillants, vous passerez en armes devant vos frères, et vous les aiderez, '
  '15':
  - type: text
    content: 'jusqu’à ce que l’Éternel ait accordé du repos à vos frères comme à vous, et qu’ils soient aussi en possession du pays que l’Éternel, votre Dieu, leur donne. Puis vous reviendrez prendre possession du pays qui est votre propriété, et que vous a donné Moïse, serviteur de l’Éternel, de ce côté-ci du Jourdain, vers le soleil levant. '
  '16':
  - type: text
    content: 'Ils répondirent à Josué, en disant: Nous ferons tout ce que tu nous as ordonné, et nous irons partout où tu nous enverras. '
  '17':
  - type: text
    content: 'Nous t’obéirons entièrement, comme nous avons obéi à Moïse. Veuille seulement l’Éternel, ton Dieu, être avec toi, comme il a été avec Moïse! '
  '18':
  - type: text
    content: Tout homme qui sera rebelle à ton ordre, et qui n’obéira pas à tout ce que tu lui commanderas, sera puni de mort. Fortifie-toi seulement, et prends courage!
  '2':
  - type: text
    content: 'Moïse, mon serviteur, est mort; maintenant, lève-toi, passe ce Jourdain, toi et tout ce peuple, pour entrer dans le pays que je donne aux enfants d’Israël. '
  '3':
  - type: note
    content: De 11:24. Jos 14:9.
  - type: text
    content: 'Tout lieu que foulera la plante de votre pied, je vous le donne, comme je l’ai dit à Moïse. '
  '4':
  - type: text
    content: 'Vous aurez pour territoire depuis le désert et le Liban jusqu’au grand fleuve, le fleuve de l’Euphrate, tout le pays des Héthiens, et jusqu’à la grande mer vers le soleil couchant. '
  '5':
  - type: text
    content: 'Nul ne tiendra devant toi, tant que tu vivras. Je serai avec toi, comme j’ai été avec Moïse; '
  - type: note
    content: De 31:6, 8. Hé 13:5, 6.
  - type: text
    content: 'je ne te délaisserai point, je ne t’abandonnerai point. '
  '6':
  - type: note
    content: De 31:23.
  - type: text
    content: 'Fortifie-toi et prends courage, car c’est toi qui mettras ce peuple en possession du pays que j’ai juré à leurs pères de leur donner. '
  '7':
  - type: text
    content: 'Fortifie-toi seulement et aie bon courage, en agissant fidèlement selon toute la loi que Moïse, mon serviteur, t’a prescrite; '
  - type: note
    content: De 5:32; 28:14.
  - type: text
    content: 'ne t’en détourne ni à droite ni à gauche, afin de réussir dans tout ce que tu entreprendras. '
  '8':
  - type: text
    content: 'Que ce livre de la loi ne s’éloigne point de ta bouche; '
  - type: note
    content: Ps 1:2.
  - type: text
    content: 'médite-le jour et nuit, pour agir fidèlement selon tout ce qui y est écrit; car c’est alors que tu auras du succès dans tes entreprises, c’est alors que tu réussiras. '
  '9':
  - type: text
    content: 'Ne t’ai-je pas donné cet ordre: Fortifie-toi et prends courage? Ne t’effraie point et ne t’épouvante point, car l’Éternel, ton Dieu, est avec toi dans tout ce que tu entreprendras.'
  - type: heading
    content: 'V. 10-18: cf. (No 32:16-32. De 3:18-20.) Jos 22:1-9.'
