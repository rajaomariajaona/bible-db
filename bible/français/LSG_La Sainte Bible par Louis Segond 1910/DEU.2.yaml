document_id: DEU.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Rentrée dans le désert
  - type: heading
    content: 'V. 1-8: cf. (No 20:14-22; 33:37-44.) Ro 12:18.'
  - type: text
    content: 'Nous nous tournâmes, et nous partîmes pour le désert, par le chemin de la mer Rouge, comme l’Éternel me l’avait ordonné; nous suivîmes longtemps les contours de la montagne de Séir. '
  '10':
  - type: text
    content: '(Les Émim y habitaient auparavant; c’était un peuple grand, nombreux et de haute taille, comme les Anakim. '
  '11':
  - type: text
    content: 'Ils passaient aussi pour être des Rephaïm, de même que les Anakim; mais les Moabites les appelaient Émim. '
  '12':
  - type: text
    content: 'Séir était habité autrefois par les Horiens; les enfants d’Ésaü les chassèrent, les détruisirent devant eux, et s’établirent à leur place, comme l’a fait Israël dans le pays qu’il possède et que l’Éternel lui a donné.) '
  '13':
  - type: text
    content: 'Maintenant levez-vous, et passez le torrent de Zéred. Nous passâmes le torrent de Zéred. '
  '14':
  - type: text
    content: 'Le temps que durèrent nos marches de Kadès-Barnéa au passage du torrent de Zéred fut de trente-huit ans, jusqu’à ce que toute la génération des hommes de guerre eût disparu du milieu du camp, comme l’Éternel le leur avait juré. '
  '15':
  - type: text
    content: 'La main de l’Éternel fut aussi sur eux pour les détruire du milieu du camp, jusqu’à ce qu’ils eussent disparu. '
  '16':
  - type: text
    content: 'Lorsque tous les hommes de guerre eurent disparu par la mort du milieu du peuple, '
  '17':
  - type: text
    content: 'l’Éternel me parla, et dit: '
  '18':
  - type: text
    content: 'Tu passeras aujourd’hui la frontière de Moab, à Ar, '
  '19':
  - type: text
    content: 'et tu approcheras des enfants d’Ammon. Ne les attaque pas, et ne t’engage pas dans un combat avec eux; car je ne te donnerai rien à posséder dans le pays des enfants d’Ammon: c’est aux enfants de Lot que je l’ai donné en propriété. '
  '2':
  - type: text
    content: 'L’Éternel me dit: '
  '20':
  - type: text
    content: '(Ce pays passait aussi pour un pays de Rephaïm; des Rephaïm y habitaient auparavant, et les Ammonites les appelaient Zamzummim: '
  '21':
  - type: text
    content: 'c’était un peuple grand, nombreux et de haute taille, comme les Anakim. L’Éternel les détruisit devant les Ammonites, qui les chassèrent et s’établirent à leur place. '
  '22':
  - type: text
    content: 'C’est ainsi que fit l’Éternel pour les enfants d’Ésaü qui habitent en Séir, quand il détruisit les Horiens devant eux; ils les chassèrent et s’établirent à leur place, jusqu’à ce jour. '
  '23':
  - type: text
    content: 'Les Avviens, qui habitaient dans des villages jusqu’à Gaza, furent détruits par les Caphtorim, sortis de Caphtor, qui s’établirent à leur place.) '
  '24':
  - type: text
    content: 'Levez-vous, partez, et passez le torrent de l’Arnon. Vois, je livre entre tes mains Sihon, roi de Hesbon, l’Amoréen et son pays. Commence la conquête, fais-lui la guerre! '
  '25':
  - type: text
    content: Je vais répandre dès aujourd’hui la frayeur et la crainte de toi sur tous les peuples qui sont sous le ciel; et, au bruit de ta renommée, ils trembleront et seront saisis d’angoisse à cause de toi.
  - type: heading
    content: Conquête du pays de Sihon, roi de Hesbon
  - type: heading
    content: 'V. 26-37: cf. (No 21:21-32. Jg 11:19-22.) Ps 60:14.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: No 21:21. Jg 11; 19.
  - type: text
    content: 'J’envoyai, du désert de Kedémoth, des messagers à Sihon, roi de Hesbon, avec des paroles de paix. Je lui fis dire: '
  '27':
  - type: note
    content: No 21:21, 22.
  - type: text
    content: 'Laisse-moi passer par ton pays; je suivrai la grande route, sans m’écarter ni à droite ni à gauche. '
  '28':
  - type: text
    content: 'Tu me vendras à prix d’argent la nourriture que je mangerai, et tu me donneras à prix d’argent l’eau que je boirai; je ne ferai que passer avec mes pieds. '
  '29':
  - type: text
    content: 'C’est ce que m’ont accordé les enfants d’Ésaü qui habitent en Séir, et les Moabites qui demeurent à Ar. Accorde-le aussi, jusqu’à ce que je passe le Jourdain pour entrer au pays que l’Éternel, notre Dieu, nous donne. '
  '3':
  - type: text
    content: 'Vous avez assez suivi les contours de cette montagne. Tournez-vous vers le nord. '
  '30':
  - type: text
    content: 'Mais Sihon, roi de Hesbon, ne voulut point nous laisser passer chez lui; car l’Éternel, ton Dieu, rendit son esprit inflexible et endurcit son cœur, afin de le livrer entre tes mains, comme tu le vois aujourd’hui. '
  '31':
  - type: text
    content: 'L’Éternel me dit: Vois, je te livre dès maintenant Sihon et son pays. '
  '32':
  - type: note
    content: No 21:23.
  - type: text
    content: 'Sihon sortit à notre rencontre, avec tout son peuple, pour nous combattre à Jahats. '
  '33':
  - type: note
    content: De 29:7.
  - type: text
    content: 'L’Éternel, notre Dieu, nous le livra, et nous le battîmes, lui et ses fils, et tout son peuple. '
  '34':
  - type: text
    content: 'Nous prîmes alors toutes ses villes, et nous les dévouâmes par interdit, hommes, femmes et petits enfants, sans en laisser échapper un seul. '
  '35':
  - type: text
    content: 'Seulement, nous pillâmes pour nous le bétail et le butin des villes que nous avions prises. '
  '36':
  - type: text
    content: 'Depuis Aroër sur les bords du torrent de l’Arnon, et la ville qui est dans la vallée, jusqu’à Galaad, il n’y eut pas de ville trop forte pour nous: l’Éternel, notre Dieu, nous livra tout. '
  '37':
  - type: text
    content: Mais tu n’approchas point du pays des enfants d’Ammon, de tous les bords du torrent de Jabbok, des villes de la montagne, de tous les lieux que l’Éternel, notre Dieu, t’avait défendu d’attaquer.
  '4':
  - type: text
    content: 'Donne cet ordre au peuple: Vous allez passer à la frontière de vos frères, les enfants d’Ésaü, qui habitent en Séir. Ils vous craindront; mais soyez bien sur vos gardes. '
  '5':
  - type: text
    content: 'Ne les attaquez pas; car je ne vous donnerai dans leur pays pas même de quoi poser la plante du pied: j’ai donné la montagne de Séir en propriété à '
  - type: note
    content: Ge 36:8.
  - type: text
    content: 'Ésaü. '
  '6':
  - type: text
    content: 'Vous achèterez d’eux à prix d’argent la nourriture que vous mangerez, et vous achèterez d’eux à prix d’argent même l’eau que vous boirez. '
  '7':
  - type: text
    content: 'Car l’Éternel, ton Dieu, t’a béni dans tout le travail de tes mains, il a connu ta marche dans ce grand désert. Voilà quarante années que l’Éternel, ton Dieu, est avec toi: tu n’as manqué de rien. '
  '8':
  - type: text
    content: Nous passâmes à distance de nos frères, les enfants d’Ésaü, qui habitent en Séir, et à distance du chemin de la plaine, d’Élath et d’Étsjon-Guéber, puis nous nous tournâmes, et nous prîmes la direction du désert de Moab.
  - type: heading
    content: Retour à la frontière
  - type: heading
    content: 'V. 9-25: cf. (No 21:10-20. Jg 11:14-18.)'
  '9':
  - type: text
    content: 'L’Éternel me dit: N’attaque pas Moab, et ne t’engage pas dans un combat avec lui; car je ne te donnerai rien à posséder dans son pays: c’est aux enfants de Lot que j’ai donné Ar en propriété. '
