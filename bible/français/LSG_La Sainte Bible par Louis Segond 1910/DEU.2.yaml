document_id: DEU.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rentrée dans le désert
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. (No 20:14-22; 33:37-44.) Ro 12:18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nous nous tournâmes, et nous partîmes pour le désert, par le chemin de la mer Rouge, comme l’Éternel me l’avait ordonné; nous suivîmes longtemps les contours de la montagne de Séir. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L’Éternel me dit: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous avez assez suivi les contours de cette montagne. Tournez-vous vers le nord. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Donne cet ordre au peuple: Vous allez passer à la frontière de vos frères, les enfants d’Ésaü, qui habitent en Séir. Ils vous craindront; mais soyez bien sur vos gardes. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ne les attaquez pas; car je ne vous donnerai dans leur pays pas même de quoi poser la plante du pied: j’ai donné la montagne de Séir en propriété à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 36:8
      metadata:
        usfm: GEN.36.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ésaü. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vous achèterez d’eux à prix d’argent la nourriture que vous mangerez, et vous achèterez d’eux à prix d’argent même l’eau que vous boirez. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Car l’Éternel, ton Dieu, t’a béni dans tout le travail de tes mains, il a connu ta marche dans ce grand désert. Voilà quarante années que l’Éternel, ton Dieu, est avec toi: tu n’as manqué de rien. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nous passâmes à distance de nos frères, les enfants d’Ésaü, qui habitent en Séir, et à distance du chemin de la plaine, d’Élath et d’Étsjon-Guéber, puis nous nous tournâmes, et nous prîmes la direction du désert de Moab.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Retour à la frontière
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-25: cf. (No 21:10-20. Jg 11:14-18.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L’Éternel me dit: N’attaque pas Moab, et ne t’engage pas dans un combat avec lui; car je ne te donnerai rien à posséder dans son pays: c’est aux enfants de Lot que j’ai donné Ar en propriété. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '(Les Émim y habitaient auparavant; c’était un peuple grand, nombreux et de haute taille, comme les Anakim. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils passaient aussi pour être des Rephaïm, de même que les Anakim; mais les Moabites les appelaient Émim. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Séir était habité autrefois par les Horiens; les enfants d’Ésaü les chassèrent, les détruisirent devant eux, et s’établirent à leur place, comme l’a fait Israël dans le pays qu’il possède et que l’Éternel lui a donné.) '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Maintenant levez-vous, et passez le torrent de Zéred. Nous passâmes le torrent de Zéred. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le temps que durèrent nos marches de Kadès-Barnéa au passage du torrent de Zéred fut de trente-huit ans, jusqu’à ce que toute la génération des hommes de guerre eût disparu du milieu du camp, comme l’Éternel le leur avait juré. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'La main de l’Éternel fut aussi sur eux pour les détruire du milieu du camp, jusqu’à ce qu’ils eussent disparu. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lorsque tous les hommes de guerre eurent disparu par la mort du milieu du peuple, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'l’Éternel me parla, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tu passeras aujourd’hui la frontière de Moab, à Ar, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et tu approcheras des enfants d’Ammon. Ne les attaque pas, et ne t’engage pas dans un combat avec eux; car je ne te donnerai rien à posséder dans le pays des enfants d’Ammon: c’est aux enfants de Lot que je l’ai donné en propriété. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '(Ce pays passait aussi pour un pays de Rephaïm; des Rephaïm y habitaient auparavant, et les Ammonites les appelaient Zamzummim: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'c’était un peuple grand, nombreux et de haute taille, comme les Anakim. L’Éternel les détruisit devant les Ammonites, qui les chassèrent et s’établirent à leur place. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'C’est ainsi que fit l’Éternel pour les enfants d’Ésaü qui habitent en Séir, quand il détruisit les Horiens devant eux; ils les chassèrent et s’établirent à leur place, jusqu’à ce jour. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les Avviens, qui habitaient dans des villages jusqu’à Gaza, furent détruits par les Caphtorim, sortis de Caphtor, qui s’établirent à leur place.) '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Levez-vous, partez, et passez le torrent de l’Arnon. Vois, je livre entre tes mains Sihon, roi de Hesbon, l’Amoréen et son pays. Commence la conquête, fais-lui la guerre! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Je vais répandre dès aujourd’hui la frayeur et la crainte de toi sur tous les peuples qui sont sous le ciel; et, au bruit de ta renommée, ils trembleront et seront saisis d’angoisse à cause de toi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conquête du pays de Sihon, roi de Hesbon
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 26-37: cf. (No 21:21-32. Jg 11:19-22.) Ps 60:14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 21:21
      metadata:
        usfm: NUM.21.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 11
      metadata:
        usfm: JDG.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: JDG.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'J’envoyai, du désert de Kedémoth, des messagers à Sihon, roi de Hesbon, avec des paroles de paix. Je lui fis dire: '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 21:21
      metadata:
        usfm: NUM.21.21
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: NUM.21.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Laisse-moi passer par ton pays; je suivrai la grande route, sans m’écarter ni à droite ni à gauche. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tu me vendras à prix d’argent la nourriture que je mangerai, et tu me donneras à prix d’argent l’eau que je boirai; je ne ferai que passer avec mes pieds. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'C’est ce que m’ont accordé les enfants d’Ésaü qui habitent en Séir, et les Moabites qui demeurent à Ar. Accorde-le aussi, jusqu’à ce que je passe le Jourdain pour entrer au pays que l’Éternel, notre Dieu, nous donne. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mais Sihon, roi de Hesbon, ne voulut point nous laisser passer chez lui; car l’Éternel, ton Dieu, rendit son esprit inflexible et endurcit son cœur, afin de le livrer entre tes mains, comme tu le vois aujourd’hui. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'L’Éternel me dit: Vois, je te livre dès maintenant Sihon et son pays. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 21:23
      metadata:
        usfm: NUM.21.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Sihon sortit à notre rencontre, avec tout son peuple, pour nous combattre à Jahats. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 29:7
      metadata:
        usfm: DEU.29.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’Éternel, notre Dieu, nous le livra, et nous le battîmes, lui et ses fils, et tout son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Nous prîmes alors toutes ses villes, et nous les dévouâmes par interdit, hommes, femmes et petits enfants, sans en laisser échapper un seul. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Seulement, nous pillâmes pour nous le bétail et le butin des villes que nous avions prises. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Depuis Aroër sur les bords du torrent de l’Arnon, et la ville qui est dans la vallée, jusqu’à Galaad, il n’y eut pas de ville trop forte pour nous: l’Éternel, notre Dieu, nous livra tout. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Mais tu n’approchas point du pays des enfants d’Ammon, de tous les bords du torrent de Jabbok, des villes de la montagne, de tous les lieux que l’Éternel, notre Dieu, t’avait défendu d’attaquer.
