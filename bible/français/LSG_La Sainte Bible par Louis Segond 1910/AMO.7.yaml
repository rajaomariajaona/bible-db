document_id: AMO.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Visions sur la ruine d’Israël. Promesses
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. (Ex 32:9-14. Ps 106:23. Ja 5:16.) Ps 99:8. Jé 15:1-6.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le Seigneur, l’Éternel, m’envoya cette vision.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, il formait des sauterelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au moment où le regain commençait à croître;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’était le regain après la coupe du roi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Et comme elles dévoraient entièrement l’herbe de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je dis: Seigneur Éternel, pardonne donc!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment Jacob subsistera-t-il?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il est si faible!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L’Éternel se repentit de cela.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cela n’arrivera pas, dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Le Seigneur, l’Éternel, m’envoya cette vision.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, le Seigneur, l’Éternel, proclamait le châtiment par le feu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le feu dévorait le grand abîme
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et dévorait le champ.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je dis: Seigneur Éternel, arrête donc!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment Jacob subsistera-t-il?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il est si faible!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L’Éternel se repentit de cela.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cela non plus n’arrivera pas, dit le Seigneur, l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il m’envoya cette vision.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, le Seigneur se tenait sur un mur tiré au cordeau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il avait un niveau dans la main.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L’Éternel me dit: Que vois-tu, Amos?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je répondis: Un niveau.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et le Seigneur dit: Je mettrai le niveau au milieu de mon peuple d’Israël,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne lui pardonnerai plus;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les hauts lieux d’Isaac seront ravagés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les sanctuaires d’Israël seront détruits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je me lèverai contre la maison de Jéroboam avec l’épée.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Amos et le prêtre Amatsia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-17: cf. Am 2:12. Jé 20:1-6; 29:24-32. Mt 10:16.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors Amatsia, prêtre de Béthel, fit dire à Jéroboam, roi d’Israël: Amos conspire contre toi au milieu de la maison d’Israël; le pays ne peut supporter toutes ses paroles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Car voici ce que dit Amos: Jéroboam mourra par l’épée, et Israël sera emmené captif loin de son pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et Amatsia dit à Amos: Homme à visions, va-t-en, fuis dans le pays de Juda; manges-y ton pain, et là tu prophétiseras. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais ne continue pas à prophétiser à Béthel, car c’est un sanctuaire du roi, et c’est une maison royale. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Amos répondit à Amatsia: Je ne suis ni prophète, ni fils de prophète; mais je suis berger, et je cultive des sycomores. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L’Éternel m’a pris derrière le troupeau, et l’Éternel m’a dit: Va, prophétise à mon peuple d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Écoute maintenant la parole de l’Éternel, toi qui dis: Ne prophétise pas contre Israël, et ne '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 21:2
      metadata:
        usfm: EZK.21.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'parle pas contre la maison d’Isaac. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'A cause de cela, voici ce que dit l’Éternel: Ta femme se prostituera dans la ville, tes fils et tes filles tomberont par l’épée, ton champ sera partagé au cordeau; et toi, tu mourras sur une terre impure, et Israël sera emmené captif loin de son pays.'
