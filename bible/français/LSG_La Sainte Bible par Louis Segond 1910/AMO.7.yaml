document_id: AMO.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Visions sur la ruine d’Israël. Promesses
  - type: heading
    content: 'V. 1-9: cf. (Ex 32:9-14. Ps 106:23. Ja 5:16.) Ps 99:8. Jé 15:1-6.'
  - type: text
    content: Le Seigneur, l’Éternel, m’envoya cette vision.
  - type: text
    content: Voici, il formait des sauterelles,
  - type: text
    content: Au moment où le regain commençait à croître;
  - type: text
    content: C’était le regain après la coupe du roi.
  '10':
  - type: text
    content: 'Alors Amatsia, prêtre de Béthel, fit dire à Jéroboam, roi d’Israël: Amos conspire contre toi au milieu de la maison d’Israël; le pays ne peut supporter toutes ses paroles. '
  '11':
  - type: text
    content: 'Car voici ce que dit Amos: Jéroboam mourra par l’épée, et Israël sera emmené captif loin de son pays. '
  '12':
  - type: text
    content: 'Et Amatsia dit à Amos: Homme à visions, va-t-en, fuis dans le pays de Juda; manges-y ton pain, et là tu prophétiseras. '
  '13':
  - type: text
    content: 'Mais ne continue pas à prophétiser à Béthel, car c’est un sanctuaire du roi, et c’est une maison royale. '
  '14':
  - type: text
    content: 'Amos répondit à Amatsia: Je ne suis ni prophète, ni fils de prophète; mais je suis berger, et je cultive des sycomores. '
  '15':
  - type: text
    content: 'L’Éternel m’a pris derrière le troupeau, et l’Éternel m’a dit: Va, prophétise à mon peuple d’Israël. '
  '16':
  - type: text
    content: 'Écoute maintenant la parole de l’Éternel, toi qui dis: Ne prophétise pas contre Israël, et ne '
  - type: note
    content: Éz 21:2.
  - type: text
    content: 'parle pas contre la maison d’Isaac. '
  '17':
  - type: text
    content: 'A cause de cela, voici ce que dit l’Éternel: Ta femme se prostituera dans la ville, tes fils et tes filles tomberont par l’épée, ton champ sera partagé au cordeau; et toi, tu mourras sur une terre impure, et Israël sera emmené captif loin de son pays.'
  '2':
  - type: text
    content: Et comme elles dévoraient entièrement l’herbe de la terre,
  - type: text
    content: 'Je dis: Seigneur Éternel, pardonne donc!'
  - type: text
    content: Comment Jacob subsistera-t-il?
  - type: text
    content: Car il est si faible!
  '3':
  - type: text
    content: L’Éternel se repentit de cela.
  - type: text
    content: Cela n’arrivera pas, dit l’Éternel.
  '4':
  - type: text
    content: Le Seigneur, l’Éternel, m’envoya cette vision.
  - type: text
    content: Voici, le Seigneur, l’Éternel, proclamait le châtiment par le feu;
  - type: text
    content: Et le feu dévorait le grand abîme
  - type: text
    content: Et dévorait le champ.
  '5':
  - type: text
    content: 'Je dis: Seigneur Éternel, arrête donc!'
  - type: text
    content: Comment Jacob subsistera-t-il?
  - type: text
    content: Car il est si faible!
  '6':
  - type: text
    content: L’Éternel se repentit de cela.
  - type: text
    content: Cela non plus n’arrivera pas, dit le Seigneur, l’Éternel.
  '7':
  - type: text
    content: Il m’envoya cette vision.
  - type: text
    content: Voici, le Seigneur se tenait sur un mur tiré au cordeau,
  - type: text
    content: Et il avait un niveau dans la main.
  '8':
  - type: text
    content: 'L’Éternel me dit: Que vois-tu, Amos?'
  - type: text
    content: 'Je répondis: Un niveau.'
  - type: text
    content: 'Et le Seigneur dit: Je mettrai le niveau au milieu de mon peuple d’Israël,'
  - type: text
    content: Je ne lui pardonnerai plus;
  '9':
  - type: text
    content: Les hauts lieux d’Isaac seront ravagés;
  - type: text
    content: Les sanctuaires d’Israël seront détruits,
  - type: text
    content: Et je me lèverai contre la maison de Jéroboam avec l’épée.
  - type: heading
    content: Amos et le prêtre Amatsia
  - type: heading
    content: 'V. 10-17: cf. Am 2:12. Jé 20:1-6; 29:24-32. Mt 10:16.'
