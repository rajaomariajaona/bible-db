document_id: MRK.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus sur le territoire des Gadaréniens. Guérison d’un démoniaque
  - type: heading
    content: 'V. 1-20: cf. (Mt 8:28-34. Lu 8:26-39.) Mc 1:23-28. Ps 106:11. És 49:24, 25.'
  - type: text
    content: ' '
  - type: note
    content: Mt 8:28. Lu 8:26.
  - type: text
    content: 'Ils arrivèrent à l’autre bord de la mer, dans le pays des Gadaréniens. '
  '10':
  - type: text
    content: 'Et il le priait instamment de ne pas les envoyer hors du pays. '
  '11':
  - type: text
    content: 'Il y avait là, vers la montagne, un grand troupeau de pourceaux qui paissaient. '
  '12':
  - type: text
    content: 'Et les démons le prièrent, disant: Envoie-nous dans ces pourceaux, afin que nous entrions en eux. '
  '13':
  - type: text
    content: 'Il le leur permit. Et les esprits impurs sortirent, entrèrent dans les pourceaux, et le troupeau se précipita des pentes escarpées dans la mer: il y en avait environ deux mille, et ils se noyèrent dans la mer. '
  '14':
  - type: text
    content: 'Ceux qui les faisaient paître s’enfuirent, et répandirent la nouvelle dans la ville et dans les campagnes. Les gens allèrent voir ce qui était arrivé. '
  '15':
  - type: text
    content: 'Ils vinrent auprès de Jésus, et ils virent le démoniaque, celui qui avait eu la légion, assis, vêtu, et dans son bon sens; et ils furent saisis de frayeur. '
  '16':
  - type: text
    content: 'Ceux qui avaient vu ce qui s’était passé leur racontèrent ce qui était arrivé au démoniaque et aux pourceaux. '
  '17':
  - type: note
    content: Ac 16:39.
  - type: text
    content: 'Alors ils se mirent à supplier Jésus de quitter leur territoire. '
  '18':
  - type: note
    content: Lu 8:38.
  - type: text
    content: 'Comme il montait dans la barque, celui qui avait été démoniaque lui demanda la permission de rester avec lui. '
  '19':
  - type: text
    content: 'Jésus ne le lui permit pas, mais il lui dit: '
  - type: text
    content: Va dans ta maison, vers les tiens, et raconte-leur tout ce que le Seigneur t’a fait, et comment il a eu pitié de toi.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Aussitôt que Jésus fut hors de la barque, il vint au-devant de lui un homme, sortant des sépulcres, et possédé d’un esprit impur. '
  '20':
  - type: text
    content: Il s’en alla, et se mit à publier dans la Décapole tout ce que Jésus avait fait pour lui. Et tous furent dans l’étonnement.
  - type: heading
    content: Résurrection de la fille de Jaïrus, et guérison d’une femme malade depuis douze ans
  - type: heading
    content: 'V. 21-43: cf. (Mt 9:18-26. Lu 8:40-56.)'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Lu 8:40.
  - type: text
    content: 'Jésus dans la barque regagna l’autre rive, où une grande foule s’assembla près de lui. Il était au bord de la mer. '
  '22':
  - type: note
    content: Mt 9:18. Lu 8:41.
  - type: text
    content: 'Alors vint un des chefs de la synagogue, nommé Jaïrus, qui, l’ayant aperçu, se jeta à ses pieds, '
  '23':
  - type: text
    content: 'et lui adressa cette instante prière: Ma petite fille est à l’extrémité, viens, impose-lui les mains, afin qu’elle soit sauvée et qu’elle vive. '
  '24':
  - type: text
    content: 'Jésus s’en alla avec lui. Et une grande foule le suivait et le pressait. '
  '25':
  - type: note
    content: Lé 15:25. Mt 9:20. Lu 8:43.
  - type: text
    content: 'Or, il y avait une femme atteinte d’une perte de sang depuis douze ans. '
  '26':
  - type: text
    content: 'Elle avait beaucoup souffert entre les mains de plusieurs médecins, elle avait dépensé tout ce qu’elle possédait, et elle n’avait éprouvé aucun soulagement, mais était allée plutôt en empirant. '
  '27':
  - type: text
    content: 'Ayant entendu parler de Jésus, elle vint dans la foule par derrière, et toucha son vêtement. '
  '28':
  - type: text
    content: 'Car elle disait: Si je puis seulement toucher ses vêtements, je serai guérie. '
  '29':
  - type: text
    content: 'Au même instant la perte de sang s’arrêta, et elle sentit dans son corps qu’elle était guérie de son mal. '
  '3':
  - type: text
    content: 'Cet homme avait sa demeure dans les sépulcres, et personne ne pouvait plus le lier, même avec une chaîne. '
  '30':
  - type: text
    content: 'Jésus connut aussitôt en lui-même qu’une force était sortie de lui; et, se retournant au milieu de la foule, il dit: '
  - type: text
    content: Qui a touché mes vêtements?
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Ses disciples lui dirent: Tu vois la foule qui te presse, et tu dis: Qui m’a touché? '
  '32':
  - type: text
    content: 'Et il regardait autour de lui, pour voir celle qui avait fait cela. '
  '33':
  - type: text
    content: 'La femme, effrayée et tremblante, sachant ce qui s’était passé en elle, vint se jeter à ses pieds, et lui dit toute la vérité. '
  '34':
  - type: note
    content: Mt 9:22. Mc 10:52.
  - type: text
    content: 'Mais Jésus lui dit: '
  - type: text
    content: Ma fille, ta foi t’a sauvée; va en paix, et sois guérie de ton mal.
  - type: text
    content: ' '
  '35':
  - type: note
    content: Lu 8:49.
  - type: text
    content: 'Comme il parlait encore, survinrent de chez le chef de la synagogue des gens qui dirent: Ta fille est morte; pourquoi importuner davantage le maître? '
  '36':
  - type: text
    content: 'Mais Jésus, sans tenir compte de ces paroles, dit au chef de la synagogue: '
  - type: text
    content: Ne crains pas, crois seulement.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Et il ne permit à personne de l’accompagner, si ce n’est à Pierre, à Jacques, et à Jean, frère de Jacques. '
  '38':
  - type: text
    content: 'Ils arrivèrent à la maison du chef de la synagogue, où Jésus vit une foule bruyante et des gens qui pleuraient et poussaient de grands cris. '
  '39':
  - type: text
    content: 'Il entra, et leur dit: '
  - type: text
    content: Pourquoi faites-vous du bruit, et pourquoi pleurez-vous?
  - type: text
    content: ' '
  - type: note
    content: Jn 11:11.
  - type: text
    content: L’enfant n’est pas morte, mais elle dort.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Car souvent il avait eu les fers aux pieds et avait été lié de chaînes, mais il avait rompu les chaînes et brisé les fers, et personne n’avait la force de le dompter. '
  '40':
  - type: text
    content: 'Et ils se moquaient de lui. Alors, ayant fait sortir tout le monde, il prit avec lui le père et la mère de l’enfant, et ceux qui l’avaient accompagné, et il entra là où était l’enfant. '
  '41':
  - type: text
    content: 'Il la saisit par la main, et lui dit: '
  - type: text
    content: Talitha koumi,
  - type: text
    content: ' ce qui signifie: Jeune fille, lève-toi, je te le dis. '
  '42':
  - type: text
    content: 'Aussitôt la jeune fille se leva, et se mit à marcher; car elle avait douze ans. Et ils furent dans un grand étonnement. '
  '43':
  - type: text
    content: Jésus leur adressa de fortes recommandations, pour que personne ne sût la chose; et il dit qu’on donnât à manger à la jeune fille.
  '5':
  - type: text
    content: 'Il était sans cesse, nuit et jour, dans les sépulcres et sur les montagnes, criant, et se meurtrissant avec des pierres. '
  '6':
  - type: text
    content: 'Ayant vu Jésus de loin, il accourut, se prosterna devant lui, '
  '7':
  - type: text
    content: 'et s’écria d’une voix forte: Qu’y a-t-il entre moi et toi, Jésus, Fils du Dieu Très-Haut? Je t’en conjure au nom de Dieu, ne me tourmente pas. '
  '8':
  - type: text
    content: 'Car Jésus lui disait: '
  - type: text
    content: Sors de cet homme, esprit impur!
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Et, il lui demanda: '
  - type: text
    content: Quel est ton nom?
  - type: text
    content: ' Légion est mon nom, lui répondit-il, car nous sommes plusieurs. '
