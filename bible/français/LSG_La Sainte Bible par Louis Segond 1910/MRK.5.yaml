document_id: MRK.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus sur le territoire des Gadaréniens. Guérison d’un démoniaque
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-20: cf. (Mt 8:28-34. Lu 8:26-39.) Mc 1:23-28. Ps 106:11. És 49:24, 25.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 8:28
      metadata:
        usfm: MAT.8.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:26
      metadata:
        usfm: LUK.8.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils arrivèrent à l’autre bord de la mer, dans le pays des Gadaréniens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Aussitôt que Jésus fut hors de la barque, il vint au-devant de lui un homme, sortant des sépulcres, et possédé d’un esprit impur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Cet homme avait sa demeure dans les sépulcres, et personne ne pouvait plus le lier, même avec une chaîne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Car souvent il avait eu les fers aux pieds et avait été lié de chaînes, mais il avait rompu les chaînes et brisé les fers, et personne n’avait la force de le dompter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il était sans cesse, nuit et jour, dans les sépulcres et sur les montagnes, criant, et se meurtrissant avec des pierres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ayant vu Jésus de loin, il accourut, se prosterna devant lui, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et s’écria d’une voix forte: Qu’y a-t-il entre moi et toi, Jésus, Fils du Dieu Très-Haut? Je t’en conjure au nom de Dieu, ne me tourmente pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Car Jésus lui disait: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Sors de cet homme, esprit impur!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et, il lui demanda: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quel est ton nom?
  - type: text
    text: ' Légion est mon nom, lui répondit-il, car nous sommes plusieurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et il le priait instamment de ne pas les envoyer hors du pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il y avait là, vers la montagne, un grand troupeau de pourceaux qui paissaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et les démons le prièrent, disant: Envoie-nous dans ces pourceaux, afin que nous entrions en eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il le leur permit. Et les esprits impurs sortirent, entrèrent dans les pourceaux, et le troupeau se précipita des pentes escarpées dans la mer: il y en avait environ deux mille, et ils se noyèrent dans la mer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ceux qui les faisaient paître s’enfuirent, et répandirent la nouvelle dans la ville et dans les campagnes. Les gens allèrent voir ce qui était arrivé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils vinrent auprès de Jésus, et ils virent le démoniaque, celui qui avait eu la légion, assis, vêtu, et dans son bon sens; et ils furent saisis de frayeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ceux qui avaient vu ce qui s’était passé leur racontèrent ce qui était arrivé au démoniaque et aux pourceaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 16:39
      metadata:
        usfm: ACT.16.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors ils se mirent à supplier Jésus de quitter leur territoire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:38
      metadata:
        usfm: LUK.8.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme il montait dans la barque, celui qui avait été démoniaque lui demanda la permission de rester avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jésus ne le lui permit pas, mais il lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Va dans ta maison, vers les tiens, et raconte-leur tout ce que le Seigneur t’a fait, et comment il a eu pitié de toi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il s’en alla, et se mit à publier dans la Décapole tout ce que Jésus avait fait pour lui. Et tous furent dans l’étonnement.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Résurrection de la fille de Jaïrus, et guérison d’une femme malade depuis douze ans
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-43: cf. (Mt 9:18-26. Lu 8:40-56.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:40
      metadata:
        usfm: LUK.8.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus dans la barque regagna l’autre rive, où une grande foule s’assembla près de lui. Il était au bord de la mer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:18
      metadata:
        usfm: MAT.9.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:41
      metadata:
        usfm: LUK.8.41
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors vint un des chefs de la synagogue, nommé Jaïrus, qui, l’ayant aperçu, se jeta à ses pieds, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'et lui adressa cette instante prière: Ma petite fille est à l’extrémité, viens, impose-lui les mains, afin qu’elle soit sauvée et qu’elle vive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jésus s’en alla avec lui. Et une grande foule le suivait et le pressait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 15:25
      metadata:
        usfm: LEV.15.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:20
      metadata:
        usfm: MAT.9.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:43
      metadata:
        usfm: LUK.8.43
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Or, il y avait une femme atteinte d’une perte de sang depuis douze ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Elle avait beaucoup souffert entre les mains de plusieurs médecins, elle avait dépensé tout ce qu’elle possédait, et elle n’avait éprouvé aucun soulagement, mais était allée plutôt en empirant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ayant entendu parler de Jésus, elle vint dans la foule par derrière, et toucha son vêtement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Car elle disait: Si je puis seulement toucher ses vêtements, je serai guérie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Au même instant la perte de sang s’arrêta, et elle sentit dans son corps qu’elle était guérie de son mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jésus connut aussitôt en lui-même qu’une force était sortie de lui; et, se retournant au milieu de la foule, il dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Qui a touché mes vêtements?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ses disciples lui dirent: Tu vois la foule qui te presse, et tu dis: Qui m’a touché? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Et il regardait autour de lui, pour voir celle qui avait fait cela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'La femme, effrayée et tremblante, sachant ce qui s’était passé en elle, vint se jeter à ses pieds, et lui dit toute la vérité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:22
      metadata:
        usfm: MAT.9.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 10:52
      metadata:
        usfm: MRK.10.52
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ma fille, ta foi t’a sauvée; va en paix, et sois guérie de ton mal.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:49
      metadata:
        usfm: LUK.8.49
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme il parlait encore, survinrent de chez le chef de la synagogue des gens qui dirent: Ta fille est morte; pourquoi importuner davantage le maître? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Mais Jésus, sans tenir compte de ces paroles, dit au chef de la synagogue: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne crains pas, crois seulement.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Et il ne permit à personne de l’accompagner, si ce n’est à Pierre, à Jacques, et à Jean, frère de Jacques. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ils arrivèrent à la maison du chef de la synagogue, où Jésus vit une foule bruyante et des gens qui pleuraient et poussaient de grands cris. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Il entra, et leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi faites-vous du bruit, et pourquoi pleurez-vous?
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 11:11
      metadata:
        usfm: JHN.11.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: L’enfant n’est pas morte, mais elle dort.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Et ils se moquaient de lui. Alors, ayant fait sortir tout le monde, il prit avec lui le père et la mère de l’enfant, et ceux qui l’avaient accompagné, et il entra là où était l’enfant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Il la saisit par la main, et lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Talitha koumi,
  - type: text
    text: ' ce qui signifie: Jeune fille, lève-toi, je te le dis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Aussitôt la jeune fille se leva, et se mit à marcher; car elle avait douze ans. Et ils furent dans un grand étonnement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Jésus leur adressa de fortes recommandations, pour que personne ne sût la chose; et il dit qu’on donnât à manger à la jeune fille.
