document_id: 2KI.12,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'La '
  - type: note
    content: 2 Ch 24:1.
  - type: text
    content: 'septième année de Jéhu, Joas devint roi, et il régna quarante ans à Jérusalem. Sa mère s’appelait Tsibja, de Beer-Schéba. '
  '10':
  - type: text
    content: 'Quand ils voyaient qu’il y avait beaucoup d’argent dans le coffre, le secrétaire du roi montait avec le souverain sacrificateur, et ils serraient et comptaient l’argent qui se trouvait dans la maison de l’Éternel. '
  '11':
  - type: text
    content: 'Ils remettaient l’argent pesé entre les mains de ceux qui étaient chargés de faire exécuter l’ouvrage dans la maison de l’Éternel. Et l’on employait cet argent pour les charpentiers et pour les ouvriers qui travaillaient à la maison de l’Éternel, '
  '12':
  - type: text
    content: 'pour les maçons et les tailleurs de pierres, pour les achats de bois et de pierres de taille nécessaires aux réparations de la maison de l’Éternel, et pour toutes les dépenses concernant les réparations de la maison. '
  '13':
  - type: text
    content: 'Mais, avec l’argent qu’on apportait dans la maison de l’Éternel, on ne fit pour la maison de l’Éternel ni bassins d’argent, ni couteaux, ni coupes, ni trompettes, ni aucun ustensile d’or ou d’argent: '
  '14':
  - type: text
    content: 'on le donnait à ceux qui faisaient l’ouvrage, afin qu’ils l’employassent à réparer la maison de l’Éternel. '
  '15':
  - type: text
    content: 'On ne demandait pas de compte aux hommes entre les mains desquels on remettait l’argent pour qu’ils le donnassent à ceux qui faisaient l’ouvrage, car ils agissaient avec probité. '
  '16':
  - type: text
    content: 'L’argent des sacrifices de culpabilité et des sacrifices d’expiation n’était point apporté dans la maison de l’Éternel: il était pour les sacrificateurs.'
  - type: heading
    content: 'V. 17-21: cf. 2 Ch 24:17-27. Ga 3:3.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 2 R 13:25.
  - type: text
    content: 'Alors Hazaël, roi de Syrie, monta et se battit contre Gath, dont il s’empara. '
  - type: note
    content: 2 R 8:12. 2 R 24:23.
  - type: text
    content: 'Hazaël avait l’intention de monter contre Jérusalem. '
  '18':
  - type: note
    content: 2 R 18:15.
  - type: text
    content: 'Joas, roi de Juda, prit toutes les choses consacrées, ce qui avait été consacré par Josaphat, par Joram et par Achazia, ses pères, rois de Juda, ce qu’il avait consacré lui-même, et tout l’or qui se trouvait dans les trésors de la maison de l’Éternel et de la maison du roi, et il envoya le tout à Hazaël, roi de Syrie, qui ne monta pas contre Jérusalem. '
  '19':
  - type: text
    content: 'Le reste des actions de Joas, et tout ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  '2':
  - type: text
    content: 'Joas fit ce qui est droit aux yeux de l’Éternel tout le temps qu’il suivit les directions du sacrificateur Jehojada. '
  '20':
  - type: note
    content: 2 R 14:5.
  - type: text
    content: 'Ses serviteurs se soulevèrent et formèrent une conspiration; ils frappèrent Joas dans la maison de Millo, qui est à la descente de Silla. '
  '21':
  - type: text
    content: Jozacar, fils de Schimeath, et Jozabad, fils de Schomer, ses serviteurs, le frappèrent, et il mourut. On l’enterra avec ses pères, dans la ville de David. Et Amatsia, son fils, régna à sa place.
  '3':
  - type: text
    content: 'Seulement, les hauts lieux ne disparurent point; le peuple offrait encore des sacrifices et des parfums sur les hauts lieux. '
  '4':
  - type: text
    content: 'Joas dit aux sacrificateurs: '
  - type: note
    content: 2 R 22:3, etc.
  - type: text
    content: 'Tout l’argent consacré qu’on apporte dans la maison de l’Éternel, l’argent ayant cours, savoir l’argent pour le rachat des personnes d’après l’estimation qui en est faite, et tout l’argent qu’il vient au cœur de quelqu’un d’apporter à la maison de l’Éternel, '
  '5':
  - type: text
    content: 'que les sacrificateurs le prennent chacun de la part des gens de sa connaissance, et qu’ils l’emploient à réparer la maison partout où il se trouvera quelque chose à réparer. '
  '6':
  - type: text
    content: 'Mais il arriva que, la vingt-troisième année du roi Joas, les sacrificateurs n’avaient point réparé ce qui était à réparer à la maison. '
  '7':
  - type: text
    content: 'Le roi Joas appela le sacrificateur Jehojada et les autres sacrificateurs, et leur dit: Pourquoi n’avez-vous pas réparé ce qui est à réparer à la maison? Maintenant, vous ne prendrez plus l’argent de vos connaissances, mais vous le livrerez pour les réparations de la maison. '
  '8':
  - type: text
    content: 'Les sacrificateurs convinrent de ne pas prendre l’argent du peuple, et de n’être pas chargés des réparations de la maison. '
  '9':
  - type: text
    content: 'Alors le sacrificateur Jehojada prit un coffre, perça un trou dans son couvercle, et le plaça à côté de l’autel, à droite, sur le passage par lequel on entrait à la maison de l’Éternel. Les sacrificateurs qui avaient la garde du seuil y mettaient tout l’argent qu’on apportait dans la maison de l’Éternel. '
