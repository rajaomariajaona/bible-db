document_id: PRO.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-10: cf. Pr 4:1-10. Ps 37:3-6.'
  - type: text
    content: Mon fils, n’oublie pas mes enseignements,
  - type: text
    content: Et que ton cœur garde mes préceptes;
  '10':
  - type: text
    content: ' '
  - type: note
    content: De 28:8.
  - type: text
    content: Alors tes greniers seront remplis d’abondance,
  - type: text
    content: Et tes cuves regorgeront de moût.
  - type: heading
    content: 'V. 11-26: cf. Hé 12:5-13. Pr 8. Ps 37:28-34.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: Job 5:17. Hé 12:5.
  - type: text
    content: Mon fils, ne méprise pas la correction de l’Éternel,
  - type: text
    content: Et ne t’effraie point de ses châtiments;
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ap 3:9.
  - type: text
    content: Car l’Éternel châtie celui qu’il aime,
  - type: text
    content: Comme un père l’enfant qu’il chérit.
  '13':
  - type: text
    content: Heureux l’homme qui a trouvé la sagesse,
  - type: text
    content: Et l’homme qui possède l’intelligence!
  '14':
  - type: text
    content: ' '
  - type: note
    content: Job 28:15. Ps 19:11. Pr 8:11, 19; 16:16.
  - type: text
    content: Car le gain qu’elle procure est préférable à celui de l’argent,
  - type: text
    content: Et le profit qu’on en tire vaut mieux que l’or;
  '15':
  - type: text
    content: ' '
  - type: note
    content: Pr 8:11.
  - type: text
    content: Elle est plus précieuse que les perles,
  - type: text
    content: Elle a plus de valeur que tous les objets de prix.
  '16':
  - type: text
    content: Dans sa droite est une longue vie;
  - type: text
    content: Dans sa gauche, la richesse et la gloire.
  '17':
  - type: text
    content: Ses voies sont des voies agréables,
  - type: text
    content: Et tous ses sentiers sont paisibles.
  '18':
  - type: text
    content: Elle est un arbre de vie pour ceux qui la saisissent,
  - type: text
    content: Et ceux qui la possèdent sont heureux.
  '19':
  - type: text
    content: C’est par la sagesse que l’Éternel a fondé la terre,
  - type: text
    content: C’est par l’intelligence qu’il a affermi les cieux;
  '2':
  - type: text
    content: ' '
  - type: note
    content: De 8:1; 30:20.
  - type: text
    content: Car ils prolongeront les jours et les années de ta vie,
  - type: text
    content: Et ils augmenteront ta paix.
  '20':
  - type: text
    content: 'C’est par sa science que les abîmes se sont '
  - type: note
    content: Ge 1:9, 10.
  - type: text
    content: ouverts,
  - type: text
    content: Et que les nuages distillent la rosée.
  '21':
  - type: text
    content: Mon fils, que ces enseignements ne s’éloignent pas de tes yeux,
  - type: text
    content: 'Garde la sagesse et la réflexion:'
  '22':
  - type: text
    content: Elles seront la vie de ton âme,
  - type: text
    content: Et l’ornement de ton cou.
  '23':
  - type: text
    content: 'Alors tu marcheras '
  - type: note
    content: Ps 37:24; 91:11, 12.
  - type: text
    content: avec assurance dans ton chemin,
  - type: text
    content: Et ton pied ne heurtera pas.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Lé 26:6. Job 11:19. Ps 3:6; 4:9; 91:5, 6.
  - type: text
    content: Si tu te couches, tu seras sans crainte;
  - type: text
    content: Et quand tu seras couché, ton sommeil sera doux.
  '25':
  - type: text
    content: Ne redoute ni une terreur soudaine,
  - type: text
    content: Ni une attaque de la part des méchants;
  '26':
  - type: text
    content: Car l’Éternel sera ton assurance,
  - type: text
    content: Et il préservera ton pied de toute embûche.
  - type: heading
    content: 'V. 27-35: cf. 1 Jn 3:16-18. Pr 24:19, 20. És 3:10, 11.'
  '27':
  - type: text
    content: Ne refuse pas un bienfait à celui qui y a droit,
  - type: text
    content: Quand tu as le pouvoir de l’accorder.
  '28':
  - type: text
    content: 'Ne dis pas à ton prochain: Va et reviens,'
  - type: text
    content: Demain je donnerai! Quand tu as de quoi donner.
  '29':
  - type: text
    content: Ne médite pas le mal contre ton prochain,
  - type: text
    content: Lorsqu’il demeure tranquillement près de toi.
  '3':
  - type: text
    content: Que la bonté et la fidélité ne t’abandonnent pas;
  - type: note
    content: Ex 13:9. De 6:8.
  - type: text
    content: Lie-les à ton cou, écris-les sur la table de ton cœur.
  '30':
  - type: text
    content: Ne conteste pas sans motif avec quelqu’un,
  - type: text
    content: Lorsqu’il ne t’a point fait de mal.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Pr 37:1; 73:3. Pr 23:17.
  - type: text
    content: Ne porte pas envie à l’homme violent,
  - type: text
    content: Et ne choisis aucune de ses voies.
  '32':
  - type: text
    content: Car l’Éternel a en horreur les hommes pervers,
  - type: note
    content: Ps 25:14.
  - type: text
    content: Mais il est un ami pour les hommes droits;
  '33':
  - type: text
    content: ' '
  - type: note
    content: Lé 26:14, etc. De 28:15, etc. Mal 2:2.
  - type: text
    content: La malédiction de l’Éternel est dans la maison du méchant,
  - type: text
    content: Mais il bénit la demeure des justes;
  '34':
  - type: text
    content: 'Il se moque '
  - type: note
    content: Ja 4:6. 1 Pi 5:5.
  - type: text
    content: des moqueurs,
  - type: text
    content: Mais il fait grâce aux humbles;
  '35':
  - type: text
    content: Les sages hériteront la gloire,
  - type: text
    content: Mais les insensés ont la honte en partage.
  '4':
  - type: text
    content: Tu acquerras ainsi de la grâce et une raison saine,
  - type: text
    content: Aux yeux de Dieu et des hommes.
  '5':
  - type: text
    content: Confie-toi en l’Éternel de tout ton cœur,
  - type: text
    content: Et ne t’appuie pas sur ta sagesse;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 1 Ch 28:9.
  - type: text
    content: Reconnais-le dans toutes tes voies,
  - type: text
    content: Et il aplanira tes sentiers.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ro 12:16.
  - type: text
    content: Ne sois point sage à tes propres yeux,
  - type: text
    content: 'Crains l’Éternel, et détourne-toi du mal:'
  '8':
  - type: text
    content: Ce sera la santé pour tes muscles,
  - type: text
    content: Et un rafraîchissement pour tes os.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ex 23:19; 34:26. De 26:2, etc. Mal 3:10. Lu 14:13.
  - type: text
    content: Honore l’Éternel avec tes biens,
  - type: text
    content: 'Et avec les prémices de tout ton revenu:'
