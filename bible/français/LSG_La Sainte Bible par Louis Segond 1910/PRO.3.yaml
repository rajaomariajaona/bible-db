document_id: PRO.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. Pr 4:1-10. Ps 37:3-6.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon fils, n’oublie pas mes enseignements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que ton cœur garde mes préceptes;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 28:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Alors tes greniers seront remplis d’abondance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tes cuves regorgeront de moût.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-26: cf. Hé 12:5-13. Pr 8. Ps 37:28-34.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 5:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mon fils, ne méprise pas la correction de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne t’effraie point de ses châtiments;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 3:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car l’Éternel châtie celui qu’il aime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un père l’enfant qu’il chérit.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux l’homme qui a trouvé la sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’homme qui possède l’intelligence!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 28:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 19:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 8:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car le gain qu’elle procure est préférable à celui de l’argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le profit qu’on en tire vaut mieux que l’or;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 8:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Elle est plus précieuse que les perles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle a plus de valeur que tous les objets de prix.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans sa droite est une longue vie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans sa gauche, la richesse et la gloire.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses voies sont des voies agréables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tous ses sentiers sont paisibles.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est un arbre de vie pour ceux qui la saisissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux qui la possèdent sont heureux.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est par la sagesse que l’Éternel a fondé la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est par l’intelligence qu’il a affermi les cieux;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 8:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car ils prolongeront les jours et les années de ta vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils augmenteront ta paix.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est par sa science que les abîmes se sont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ouverts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que les nuages distillent la rosée.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon fils, que ces enseignements ne s’éloignent pas de tes yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Garde la sagesse et la réflexion:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles seront la vie de ton âme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’ornement de ton cou.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Alors tu marcheras '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 37:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 91:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: avec assurance dans ton chemin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ton pied ne heurtera pas.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 26:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 11:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 3:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 91:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Si tu te couches, tu seras sans crainte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et quand tu seras couché, ton sommeil sera doux.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne redoute ni une terreur soudaine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni une attaque de la part des méchants;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel sera ton assurance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il préservera ton pied de toute embûche.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 27-35: cf. 1 Jn 3:16-18. Pr 24:19, 20. És 3:10, 11.'
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne refuse pas un bienfait à celui qui y a droit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand tu as le pouvoir de l’accorder.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ne dis pas à ton prochain: Va et reviens,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Demain je donnerai! Quand tu as de quoi donner.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne médite pas le mal contre ton prochain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsqu’il demeure tranquillement près de toi.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la bonté et la fidélité ne t’abandonnent pas;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 13:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 6:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Lie-les à ton cou, écris-les sur la table de ton cœur.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne conteste pas sans motif avec quelqu’un,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsqu’il ne t’a point fait de mal.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Pr 37:1; 73:3. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 23:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne porte pas envie à l’homme violent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne choisis aucune de ses voies.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel a en horreur les hommes pervers,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 25:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais il est un ami pour les hommes droits;
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Lé 26:14, etc. De 28:15, etc. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal 2:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La malédiction de l’Éternel est dans la maison du méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il bénit la demeure des justes;
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il se moque '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 4:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 5:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: des moqueurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il fait grâce aux humbles;
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les sages hériteront la gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les insensés ont la honte en partage.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu acquerras ainsi de la grâce et une raison saine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux yeux de Dieu et des hommes.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Confie-toi en l’Éternel de tout ton cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne t’appuie pas sur ta sagesse;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 28:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Reconnais-le dans toutes tes voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il aplanira tes sentiers.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 12:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne sois point sage à tes propres yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Crains l’Éternel, et détourne-toi du mal:'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sera la santé pour tes muscles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un rafraîchissement pour tes os.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:26
      - type: text
        text: '. De 26:2, etc. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal 3:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 14:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Honore l’Éternel avec tes biens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et avec les prémices de tout ton revenu:'
