    text: Cantique des degrés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, bénissez l’Éternel, vous tous, serviteurs de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui vous tenez dans la maison de l’Éternel pendant les nuits!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Élevez vos mains vers le sanctuaire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et bénissez l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Que l’Éternel te bénisse de Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lui qui a fait les cieux et la terre!
