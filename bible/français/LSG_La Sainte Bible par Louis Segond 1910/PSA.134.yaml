document_id: PSA.134,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 1 Ch 9:33. Ps 84:5. De 10:8.
  - type: text
    content: Cantique des degrés.
  - type: text
    content: Voici, bénissez l’Éternel, vous tous, serviteurs de l’Éternel,
  - type: text
    content: Qui vous tenez dans la maison de l’Éternel pendant les nuits!
  '2':
  - type: text
    content: Élevez vos mains vers le sanctuaire,
  - type: text
    content: Et bénissez l’Éternel!
  '3':
  - type: text
    content: Que l’Éternel te bénisse de Sion,
  - type: text
    content: Lui qui a fait les cieux et la terre!
