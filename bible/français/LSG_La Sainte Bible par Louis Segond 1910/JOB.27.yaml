document_id: JOB.27,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Dernière réponse de Job à ses trois amis
  - type: heading
    content: 'V. 1-10: cf. Job 34:5, etc. Ps 26; 109.'
  - type: text
    content: 'Job prit de nouveau la parole sous forme sentencieuse et dit:'
  '10':
  - type: text
    content: Fait-il du Tout-Puissant ses délices?
  - type: text
    content: Adresse-t-il en tout temps ses prières à Dieu?
  - type: heading
    content: 'V. 11-23: cf. (Job 21:13-21; 20:4, etc.) És 3:11.'
  '11':
  - type: text
    content: Je vous enseignerai les voies de Dieu,
  - type: text
    content: Je ne vous cacherai pas les desseins du Tout-Puissant.
  '12':
  - type: text
    content: Mais vous les connaissez, et vous êtes d’accord;
  - type: text
    content: Pourquoi donc vous laisser aller à de vaines pensées?
  '13':
  - type: text
    content: ' '
  - type: note
    content: Job 20:29.
  - type: text
    content: Voici la part que Dieu réserve au méchant,
  - type: text
    content: L’héritage que le Tout-Puissant destine à l’impie.
  '14':
  - type: text
    content: 'S’il a des fils en grand nombre, '
  - type: note
    content: De 28:41. Os 9:13.
  - type: text
    content: c’est pour le glaive,
  - type: text
    content: Et ses rejetons manquent de pain;
  '15':
  - type: text
    content: Ceux qui échappent sont enterrés par la peste,
  - type: note
    content: Ps 78:64.
  - type: text
    content: Et leurs veuves ne les pleurent pas.
  '16':
  - type: text
    content: S’il amasse l’argent comme la poussière,
  - type: text
    content: S’il entasse les vêtements comme la boue,
  '17':
  - type: text
    content: 'C’est lui qui entasse, '
  - type: note
    content: Pr 28:8. Ec 2:26.
  - type: text
    content: mais c’est le juste qui se revêt,
  - type: text
    content: C’est l’homme intègre qui a l’argent en partage.
  '18':
  - type: text
    content: Sa maison est comme celle que bâtit la teigne,
  - type: text
    content: Comme la cabane que fait un gardien.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Ps 49:18.
  - type: text
    content: Il se couche riche, et il meurt dépouillé;
  - type: text
    content: Il ouvre les yeux, et tout a disparu.
  '2':
  - type: text
    content: Dieu qui me refuse justice est vivant!
  - type: text
    content: Le Tout-Puissant qui remplit mon âme d’amertume est vivant!
  '20':
  - type: text
    content: ' '
  - type: note
    content: Job 15:21; 18:11.
  - type: text
    content: Les terreurs le surprennent comme des eaux;
  - type: text
    content: Un tourbillon l’enlève au milieu de la nuit.
  '21':
  - type: text
    content: Le vent d’orient l’emporte, et il s’en va;
  - type: text
    content: Il l’arrache violemment de sa demeure.
  '22':
  - type: text
    content: Dieu lance sans pitié des traits contre lui,
  - type: text
    content: Et le méchant voudrait fuir pour les éviter.
  '23':
  - type: text
    content: On bat des mains à sa chute,
  - type: text
    content: Et on le siffle à son départ.
  '3':
  - type: text
    content: Aussi longtemps que j’aurai ma respiration,
  - type: text
    content: Et que le souffle de Dieu sera dans mes narines,
  '4':
  - type: text
    content: Mes lèvres ne prononceront rien d’injuste,
  - type: text
    content: Ma langue ne dira rien de faux.
  '5':
  - type: text
    content: Loin de moi la pensée de vous donner raison!
  - type: text
    content: Jusqu’à mon dernier soupir je défendrai mon innocence;
  '6':
  - type: text
    content: Je tiens à me justifier, et je ne faiblirai pas;
  - type: text
    content: Mon cœur ne me fait de reproche sur aucun de mes jours.
  '7':
  - type: text
    content: Que mon ennemi soit comme le méchant,
  - type: text
    content: Et mon adversaire comme l’impie!
  '8':
  - type: text
    content: ' '
  - type: note
    content: Mt 16:26. Lu 12:20.
  - type: text
    content: Quelle espérance reste-t-il à l’impie,
  - type: text
    content: Quand Dieu coupe le fil de sa vie,
  - type: text
    content: Quand il lui retire son âme?
  '9':
  - type: text
    content: ' '
  - type: note
    content: Job 35:12. Ps 18:42; 109:7. Pr 1:28; 28:9. És 1:15. Jé 14:12. Éz 8:18. Mi 3:4. Jn 9:31. Ja 4:3.
  - type: text
    content: Est-ce que Dieu écoute ses cris,
  - type: text
    content: Quand l’angoisse vient l’assaillir?
