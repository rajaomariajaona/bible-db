document_id: JOB.27
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dernière réponse de Job à ses trois amis
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. Job 34:5, etc. Ps 26; 109.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job prit de nouveau la parole sous forme sentencieuse et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dieu qui me refuse justice est vivant!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Tout-Puissant qui remplit mon âme d’amertume est vivant!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aussi longtemps que j’aurai ma respiration,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que le souffle de Dieu sera dans mes narines,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mes lèvres ne prononceront rien d’injuste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma langue ne dira rien de faux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Loin de moi la pensée de vous donner raison!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à mon dernier soupir je défendrai mon innocence;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je tiens à me justifier, et je ne faiblirai pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon cœur ne me fait de reproche sur aucun de mes jours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Que mon ennemi soit comme le méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mon adversaire comme l’impie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 16:26
      metadata:
        usfm: MAT.16.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 12:20
      metadata:
        usfm: LUK.12.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Quelle espérance reste-t-il à l’impie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand Dieu coupe le fil de sa vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand il lui retire son âme?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 35:12
      metadata:
        usfm: JOB.35.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 18:42
      metadata:
        usfm: PSA.18.42
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 109:7
      metadata:
        usfm: PSA.109.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 1:28
      metadata:
        usfm: PRO.1.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:9
      metadata:
        usfm: PRO.28.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:15
      metadata:
        usfm: ISA.1.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 14:12
      metadata:
        usfm: JER.14.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 8:18
      metadata:
        usfm: EZK.8.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 3:4
      metadata:
        usfm: MIC.3.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 9:31
      metadata:
        usfm: JHN.9.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 4:3
      metadata:
        usfm: JAS.4.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Est-ce que Dieu écoute ses cris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand l’angoisse vient l’assaillir?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fait-il du Tout-Puissant ses délices?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Adresse-t-il en tout temps ses prières à Dieu?
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-23: cf. (Job 21:13-21; 20:4, etc.) És 3:11.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je vous enseignerai les voies de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne vous cacherai pas les desseins du Tout-Puissant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mais vous les connaissez, et vous êtes d’accord;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi donc vous laisser aller à de vaines pensées?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 20:29
      metadata:
        usfm: JOB.20.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Voici la part que Dieu réserve au méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’héritage que le Tout-Puissant destine à l’impie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'S’il a des fils en grand nombre, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:41
      metadata:
        usfm: DEU.28.41
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 9:13
      metadata:
        usfm: HOS.9.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: c’est pour le glaive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses rejetons manquent de pain;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ceux qui échappent sont enterrés par la peste,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:64
      metadata:
        usfm: PSA.78.64
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et leurs veuves ne les pleurent pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: S’il amasse l’argent comme la poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’il entasse les vêtements comme la boue,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'C’est lui qui entasse, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 28:8
      metadata:
        usfm: PRO.28.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 2:26
      metadata:
        usfm: ECC.2.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: mais c’est le juste qui se revêt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est l’homme intègre qui a l’argent en partage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Sa maison est comme celle que bâtit la teigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme la cabane que fait un gardien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 49:18
      metadata:
        usfm: PSA.49.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il se couche riche, et il meurt dépouillé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ouvre les yeux, et tout a disparu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 15:21
      metadata:
        usfm: JOB.15.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:11
      metadata:
        usfm: JOB.18.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les terreurs le surprennent comme des eaux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un tourbillon l’enlève au milieu de la nuit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le vent d’orient l’emporte, et il s’en va;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il l’arrache violemment de sa demeure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dieu lance sans pitié des traits contre lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le méchant voudrait fuir pour les éviter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: On bat des mains à sa chute,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et on le siffle à son départ.
