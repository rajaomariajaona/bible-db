document_id: JOB.8,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Discours de Bildad à Job
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. (Job 34:10-19; 22:21-30. Ps 92:13, etc.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bildad de Schuach prit la parole et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils t’instruiront, ils te parleront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils tireront de leur cœur ces sentences:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jonc croît-il sans marais?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le roseau croît-il sans humidité?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 129:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 17:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Encore vert et sans qu’on le coupe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il sèche plus vite que toutes les herbes.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi arrive-t-il à tous ceux qui oublient Dieu,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 11:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 112:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 10:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et l’espérance de l’impie périra.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son assurance est brisée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son soutien est une toile d’araignée.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’appuie sur sa maison, et elle n’est pas ferme;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’y cramponne, et elle ne résiste pas.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans toute sa vigueur, en plein soleil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il étend ses rameaux sur son jardin,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il entrelace ses racines parmi les pierres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il pénètre jusque dans les murailles;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’arrache-t-on du lieu qu’il occupe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ce lieu le renie: Je ne t’ai point connu!'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Telles sont les délices que ses voies lui procurent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis sur le même sol d’autres s’élèvent après lui.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à quand veux-tu discourir de la sorte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les paroles de ta bouche seront-elles un vent impétueux?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Non, Dieu ne rejette point l’homme intègre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il ne protège point les méchants.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il remplira ta bouche de cris de joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tes lèvres de chants d’allégresse.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes ennemis seront couverts de honte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La tente des méchants disparaîtra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 19:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Da 9:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Dieu renverserait-il le droit?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Tout-Puissant renverserait-il la justice?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tes fils ont péché contre lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les a livrés à leur péché.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 22:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais toi, si tu as recours à Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu implores le Tout-Puissant;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu es juste et droit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Certainement alors il veillera sur toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et rendra le bonheur à ton innocente demeure;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton ancienne prospérité semblera peu de chose,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celle qui t’est réservée sera bien plus grande.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-22: cf. Job 20:4-9. Ps 37:16, etc.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 4:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Interroge ceux des générations passées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois attentif à l’expérience de leurs pères.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 47:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 29:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 7:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 39:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 144:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car nous sommes d’hier, et nous ne savons rien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nos jours sur la terre ne sont qu’une '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 102:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 144:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ombre.
