document_id: JOB.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Discours de Bildad à Job
  - type: heading
    content: 'V. 1-7: cf. (Job 34:10-19; 22:21-30. Ps 92:13, etc.)'
  - type: text
    content: 'Bildad de Schuach prit la parole et dit:'
  '10':
  - type: text
    content: Ils t’instruiront, ils te parleront,
  - type: text
    content: 'Ils tireront de leur cœur ces sentences:'
  '11':
  - type: text
    content: Le jonc croît-il sans marais?
  - type: text
    content: Le roseau croît-il sans humidité?
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ps 129:6. Jé 17:6.
  - type: text
    content: Encore vert et sans qu’on le coupe,
  - type: text
    content: Il sèche plus vite que toutes les herbes.
  '13':
  - type: text
    content: Ainsi arrive-t-il à tous ceux qui oublient Dieu,
  - type: note
    content: Job 11:20; 18:14. Ps 112:10. Pr 10:28.
  - type: text
    content: Et l’espérance de l’impie périra.
  '14':
  - type: text
    content: Son assurance est brisée,
  - type: text
    content: Son soutien est une toile d’araignée.
  '15':
  - type: text
    content: Il s’appuie sur sa maison, et elle n’est pas ferme;
  - type: text
    content: Il s’y cramponne, et elle ne résiste pas.
  '16':
  - type: text
    content: Dans toute sa vigueur, en plein soleil,
  - type: text
    content: Il étend ses rameaux sur son jardin,
  '17':
  - type: text
    content: Il entrelace ses racines parmi les pierres,
  - type: text
    content: Il pénètre jusque dans les murailles;
  '18':
  - type: text
    content: L’arrache-t-on du lieu qu’il occupe,
  - type: text
    content: 'Ce lieu le renie: Je ne t’ai point connu!'
  '19':
  - type: text
    content: Telles sont les délices que ses voies lui procurent.
  - type: text
    content: Puis sur le même sol d’autres s’élèvent après lui.
  '2':
  - type: text
    content: Jusqu’à quand veux-tu discourir de la sorte,
  - type: text
    content: Et les paroles de ta bouche seront-elles un vent impétueux?
  '20':
  - type: text
    content: Non, Dieu ne rejette point l’homme intègre,
  - type: text
    content: Et il ne protège point les méchants.
  '21':
  - type: text
    content: Il remplira ta bouche de cris de joie,
  - type: text
    content: Et tes lèvres de chants d’allégresse.
  '22':
  - type: text
    content: Tes ennemis seront couverts de honte;
  - type: text
    content: La tente des méchants disparaîtra.
  '3':
  - type: text
    content: ' '
  - type: note
    content: De 32:4. 2 Ch 19:7. Da 9:14.
  - type: text
    content: Dieu renverserait-il le droit?
  - type: text
    content: Le Tout-Puissant renverserait-il la justice?
  '4':
  - type: text
    content: Si tes fils ont péché contre lui,
  - type: text
    content: Il les a livrés à leur péché.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Job 22:23.
  - type: text
    content: Mais toi, si tu as recours à Dieu,
  - type: text
    content: Si tu implores le Tout-Puissant;
  '6':
  - type: text
    content: Si tu es juste et droit,
  - type: text
    content: Certainement alors il veillera sur toi,
  - type: text
    content: Et rendra le bonheur à ton innocente demeure;
  '7':
  - type: text
    content: Ton ancienne prospérité semblera peu de chose,
  - type: text
    content: Celle qui t’est réservée sera bien plus grande.
  - type: heading
    content: 'V. 8-22: cf. Job 20:4-9. Ps 37:16, etc.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: De 4:32.
  - type: text
    content: Interroge ceux des générations passées,
  - type: text
    content: Sois attentif à l’expérience de leurs pères.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ge 47:9. 1 Ch 29:15. Job 7:5, 6, 7. Ps 39:13; 144:4.
  - type: text
    content: Car nous sommes d’hier, et nous ne savons rien,
  - type: text
    content: 'Nos jours sur la terre ne sont qu’une '
  - type: note
    content: Ps 102:12; 144:4.
  - type: text
    content: ombre.
