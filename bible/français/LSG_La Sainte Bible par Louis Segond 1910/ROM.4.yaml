document_id: ROM.4,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'Que dirons-nous donc '
  - type: note
    content: És 51:2.
  - type: text
    content: 'qu’Abraham, notre père, a obtenu selon la chair? '
  '10':
  - type: text
    content: 'Comment donc lui fut-elle imputée? Était-ce après, ou avant sa circoncision? Il n’était pas encore circoncis, il était incirconcis. '
  '11':
  - type: note
    content: Ge 17:11.
  - type: text
    content: 'Et il reçut le signe de la circoncision, comme sceau de la justice qu’il avait obtenue par la foi quand il était incirconcis, afin d’être le père de tous les incirconcis qui croient, pour que la justice leur fût aussi imputée, '
  '12':
  - type: text
    content: et le père des circoncis, qui ne sont pas seulement circoncis, mais encore qui marchent sur les traces de la foi de notre père Abraham quand il était incirconcis.
  - type: heading
    content: 'V. 13-25: cf. Ga 3:8-18, 26-29. Hé 11:8-19.'
  '13':
  - type: text
    content: 'En effet, ce n’est pas par la loi que l’héritage du monde a été promis à Abraham ou à sa postérité, c’est par la justice de la foi. '
  '14':
  - type: note
    content: Ga 3:18.
  - type: text
    content: 'Car, si les héritiers le sont par la loi, la foi est vaine, et la promesse est anéantie, '
  '15':
  - type: text
    content: 'parce que la loi produit la colère, et que '
  - type: note
    content: Jn 15:22. Ro 5:20; 7:8. Ga 3:19.
  - type: text
    content: 'là où il n’y a point de loi il n’y a point non plus de transgression. '
  '16':
  - type: text
    content: 'C’est pourquoi les héritiers le sont par la foi, pour que ce soit par grâce, afin que la promesse soit assurée à toute la postérité, non seulement à celle qui est sous la loi, mais aussi à celle qui a la foi d’Abraham, '
  - type: note
    content: És 51:2.
  - type: text
    content: 'notre père à tous, selon qu’il est écrit: '
  '17':
  - type: note
    content: Ge 17:4.
  - type: text
    content: 'Je t’ai établi père d’un grand nombre de nations. Il est notre père devant celui auquel il a cru, Dieu, qui donne la vie aux morts, et qui appelle les choses qui ne sont point comme si elles étaient. '
  '18':
  - type: text
    content: 'Espérant contre toute espérance, il crut, en sorte qu’il devint père d’un grand nombre de nations, selon ce qui lui avait été dit: '
  - type: note
    content: Ge 15:5. Hé 11:12.
  - type: text
    content: 'Telle sera ta postérité. '
  '19':
  - type: text
    content: 'Et, sans faiblir dans la foi, il ne considéra point que son corps était déjà usé, puisqu’il avait près de cent ans, et que Sara n’était plus en état d’avoir des enfants. '
  '2':
  - type: text
    content: 'Si Abraham a été justifié par les œuvres, il a sujet de se glorifier, mais non devant Dieu. '
  '20':
  - type: note
    content: Jn 8:56. Hé 11:11, 18.
  - type: text
    content: 'Il ne douta point, par incrédulité, au sujet de la promesse de Dieu; mais il fut fortifié par la foi, donnant gloire à Dieu, '
  '21':
  - type: note
    content: Ps 115:3.
  - type: text
    content: 'et ayant la pleine conviction que ce qu’il promet il peut aussi l’accomplir. '
  '22':
  - type: text
    content: 'C’est pourquoi cela lui fut imputé à justice. '
  '23':
  - type: note
    content: Ro 15:4.
  - type: text
    content: 'Mais ce n’est pas à cause de lui seul qu’il est écrit que cela lui fut imputé; '
  '24':
  - type: text
    content: 'c’est encore à cause de nous, à qui cela sera imputé, à nous qui croyons en celui qui a ressuscité des morts Jésus notre Seigneur, '
  '25':
  - type: text
    content: lequel a été livré pour nos offenses, et est ressuscité pour notre justification.
  '3':
  - type: text
    content: 'Car que dit l’Écriture? '
  - type: note
    content: Ge 15:6. Ga 3:6. Ja 2:23.
  - type: text
    content: 'Abraham crut à Dieu, et cela lui fut imputé à justice. '
  '4':
  - type: text
    content: 'Or, à celui qui fait une œuvre, le salaire est imputé, non comme une grâce, mais comme une chose due; '
  '5':
  - type: text
    content: 'et à celui qui ne fait point d’œuvre, mais qui croit en celui qui justifie l’impie, sa foi lui est imputée à justice. '
  '6':
  - type: text
    content: 'De même David exprime le bonheur de l’homme à qui Dieu impute la justice sans les œuvres:'
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps 32:1.
  - type: text
    content: Heureux ceux dont les iniquités sont pardonnées,
  - type: text
    content: Et dont les péchés sont couverts!
  '8':
  - type: text
    content: Heureux l’homme à qui le Seigneur n’impute pas son péché!
  '9':
  - type: text
    content: 'Ce bonheur n’est-il que pour les circoncis, ou est-il également pour les incirconcis? Car nous disons que la foi fut imputée à justice à Abraham. '
