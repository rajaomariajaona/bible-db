document_id: JOB.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse de Job à Éliphaz
  - type: heading
    content: 'V. 1-13: cf. Job 16:6-17; 17:7, 11-16.'
  - type: text
    content: 'Job prit la parole et dit:'
  '10':
  - type: text
    content: Il me restera du moins une consolation,
  - type: text
    content: 'Une joie dans les maux dont il m’accable:'
  - type: text
    content: Jamais je n’ai transgressé les ordres du Saint.
  '11':
  - type: text
    content: Pourquoi espérer quand je n’ai plus de force?
  - type: text
    content: Pourquoi attendre quand ma fin est certaine?
  '12':
  - type: text
    content: Ma force est-elle une force de pierre?
  - type: text
    content: Mon corps est-il d’airain?
  '13':
  - type: text
    content: Ne suis-je pas sans ressource,
  - type: text
    content: Et le salut n’est-il pas loin de moi?
  - type: heading
    content: 'V. 14-30: cf. (Job 16:1-5, 20; 19:1-6, 19-22.) (Pr 17:17. Job 32:3.)'
  '14':
  - type: text
    content: Celui qui souffre a droit à la compassion de son ami,
  - type: text
    content: Même quand il abandonnerait la crainte du Tout-Puissant.
  '15':
  - type: text
    content: Mes frères sont perfides comme un torrent,
  - type: text
    content: Comme le lit des torrents qui disparaissent.
  '16':
  - type: text
    content: Les glaçons en troublent le cours,
  - type: text
    content: La neige s’y précipite;
  '17':
  - type: text
    content: Viennent les chaleurs, et ils tarissent,
  - type: text
    content: Les feux du soleil, et leur lit demeure à sec.
  '18':
  - type: text
    content: Les caravanes se détournent de leur chemin,
  - type: text
    content: S’enfoncent dans le désert, et périssent.
  '19':
  - type: text
    content: Les caravanes de Théma fixent le regard,
  - type: text
    content: Les voyageurs de Séba sont pleins d’espoir;
  '2':
  - type: text
    content: Oh! S’il était possible de peser ma douleur,
  - type: text
    content: Et si toutes mes calamités étaient sur la balance,
  '20':
  - type: text
    content: Ils sont honteux d’avoir eu confiance,
  - type: text
    content: Ils restent confondus quand ils arrivent.
  '21':
  - type: text
    content: Ainsi, vous êtes comme si vous n’existiez pas;
  - type: text
    content: Vous voyez mon angoisse, et vous en avez horreur!
  '22':
  - type: text
    content: 'Vous ai-je dit: Donnez-moi quelque chose,'
  - type: text
    content: Faites en ma faveur des présents avec vos biens,
  '23':
  - type: text
    content: Délivrez-moi de la main de l’ennemi,
  - type: text
    content: Rachetez-moi de la main des méchants?
  '24':
  - type: text
    content: Instruisez-moi, et je me tairai;
  - type: text
    content: Faites-moi comprendre en quoi j’ai péché.
  '25':
  - type: text
    content: Que les paroles vraies sont persuasives!
  - type: text
    content: Mais que prouvent vos remontrances?
  '26':
  - type: text
    content: Voulez-vous donc blâmer ce que j’ai dit,
  - type: text
    content: Et ne voir que du vent dans les discours d’un désespéré?
  '27':
  - type: text
    content: Vous accablez un orphelin,
  - type: text
    content: Vous persécutez votre ami.
  '28':
  - type: text
    content: Regardez-moi, je vous prie!
  - type: text
    content: Vous mentirais-je en face?
  '29':
  - type: text
    content: Revenez, ne soyez pas injustes;
  - type: text
    content: Revenez, et reconnaissez mon innocence.
  '3':
  - type: text
    content: 'Elles seraient plus pesantes que '
  - type: note
    content: Pr 27:3.
  - type: text
    content: le sable de la mer;
  - type: text
    content: Voilà pourquoi mes paroles vont jusqu’à la folie!
  '30':
  - type: text
    content: Y a-t-il de l’iniquité sur ma langue,
  - type: text
    content: Et ma bouche ne discerne-t-elle pas le mal?
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ps 38:2, 3.
  - type: text
    content: Car les flèches du Tout-Puissant m’ont percé,
  - type: text
    content: Et mon âme en suce le venin;
  - type: text
    content: Les terreurs de Dieu se rangent en bataille contre moi.
  '5':
  - type: text
    content: L’âne sauvage crie-t-il auprès de l’herbe tendre?
  - type: text
    content: Le bœuf mugit-il auprès de son fourrage?
  '6':
  - type: text
    content: Peut-on manger ce qui est fade et sans sel?
  - type: text
    content: Y a-t-il de la saveur dans le blanc d’un œuf?
  '7':
  - type: text
    content: Ce que je voudrais ne pas toucher,
  - type: text
    content: C’est là ma nourriture, si dégoûtante soit-elle!
  '8':
  - type: text
    content: Puisse mon vœu s’accomplir,
  - type: text
    content: Et Dieu veuille réaliser mon espérance!
  '9':
  - type: text
    content: Qu’il plaise à Dieu de m’écraser,
  - type: text
    content: Qu’il étende sa main et qu’il m’achève!
