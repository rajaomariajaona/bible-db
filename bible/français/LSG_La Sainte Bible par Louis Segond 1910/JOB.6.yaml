document_id: JOB.6,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Réponse de Job à Éliphaz
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-13: cf. Job 16:6-17; 17:7, 11-16.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Job prit la parole et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Il me restera du moins une consolation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Une joie dans les maux dont il m’accable:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jamais je n’ai transgressé les ordres du Saint.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Pourquoi espérer quand je n’ai plus de force?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi attendre quand ma fin est certaine?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ma force est-elle une force de pierre?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon corps est-il d’airain?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ne suis-je pas sans ressource,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le salut n’est-il pas loin de moi?
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-30: cf. (Job 16:1-5, 20; 19:1-6, 19-22.) (Pr 17:17. Job 32:3.)'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Celui qui souffre a droit à la compassion de son ami,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même quand il abandonnerait la crainte du Tout-Puissant.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mes frères sont perfides comme un torrent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme le lit des torrents qui disparaissent.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Les glaçons en troublent le cours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La neige s’y précipite;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Viennent les chaleurs, et ils tarissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les feux du soleil, et leur lit demeure à sec.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Les caravanes se détournent de leur chemin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’enfoncent dans le désert, et périssent.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Les caravanes de Théma fixent le regard,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les voyageurs de Séba sont pleins d’espoir;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Oh! S’il était possible de peser ma douleur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et si toutes mes calamités étaient sur la balance,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ils sont honteux d’avoir eu confiance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils restent confondus quand ils arrivent.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ainsi, vous êtes comme si vous n’existiez pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous voyez mon angoisse, et vous en avez horreur!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Vous ai-je dit: Donnez-moi quelque chose,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faites en ma faveur des présents avec vos biens,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Délivrez-moi de la main de l’ennemi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rachetez-moi de la main des méchants?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Instruisez-moi, et je me tairai;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faites-moi comprendre en quoi j’ai péché.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Que les paroles vraies sont persuasives!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais que prouvent vos remontrances?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Voulez-vous donc blâmer ce que j’ai dit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne voir que du vent dans les discours d’un désespéré?
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Vous accablez un orphelin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous persécutez votre ami.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Regardez-moi, je vous prie!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous mentirais-je en face?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Revenez, ne soyez pas injustes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Revenez, et reconnaissez mon innocence.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Elles seraient plus pesantes que '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 27:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: le sable de la mer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pourquoi mes paroles vont jusqu’à la folie!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Y a-t-il de l’iniquité sur ma langue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ma bouche ne discerne-t-elle pas le mal?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 38:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car les flèches du Tout-Puissant m’ont percé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon âme en suce le venin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les terreurs de Dieu se rangent en bataille contre moi.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: L’âne sauvage crie-t-il auprès de l’herbe tendre?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le bœuf mugit-il auprès de son fourrage?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Peut-on manger ce qui est fade et sans sel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Y a-t-il de la saveur dans le blanc d’un œuf?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ce que je voudrais ne pas toucher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est là ma nourriture, si dégoûtante soit-elle!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Puisse mon vœu s’accomplir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Dieu veuille réaliser mon espérance!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Qu’il plaise à Dieu de m’écraser,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il étende sa main et qu’il m’achève!
