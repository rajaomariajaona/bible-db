document_id: JER.20
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paschhur, fils d’Immer, sacrificateur et inspecteur en chef dans la maison de l’Éternel, entendit Jérémie qui prophétisait ces choses. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et Paschhur frappa Jérémie, le prophète, et le mit dans la prison qui était à la porte supérieure de Benjamin, dans la maison de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais le lendemain, Paschhur fit sortir Jérémie de prison. Et Jérémie lui dit: Ce n’est pas le nom de Paschhur que l’Éternel te donne, c’est celui de Magor-Missabib. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Car ainsi parle l’Éternel: Voici, je te livrerai à la terreur, toi et tous tes amis; ils tomberont par l’épée de leurs ennemis, et tes yeux le verront. Je livrerai aussi tout Juda entre les mains du roi de Babylone, qui les emmènera captifs à Babylone et les frappera de l’épée. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je livrerai toutes les richesses de cette ville, tout le produit de son travail, tout ce qu’elle a de précieux, je livrerai tous les trésors des rois de Juda entre les mains de leurs ennemis, qui les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 15:13
      metadata:
        usfm: JER.15.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:3
      metadata:
        usfm: JER.17.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pilleront, les enlèveront et les transporteront à Babylone. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Et toi, Paschhur, et tous ceux qui demeurent dans ta maison, vous irez en captivité; tu iras à Babylone, et là tu mourras, et là tu seras enterré, toi et tous tes amis auxquels tu as prophétisé le mensonge.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Plaintes du prophète
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-13: cf. (Jé 17:15-18; 18:18-23.) Ps 69:7, etc.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu m’as persuadé, Éternel, et je me suis laissé persuader;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu m’as saisi, tu m’as vaincu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je suis chaque jour un objet de raillerie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout le monde se moque de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Car toutes les fois que je parle, il faut que je crie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je crie à la violence et à l’oppression!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la parole de l’Éternel est pour moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Un sujet '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 57:4
      metadata:
        usfm: ISA.57.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: d’opprobre et de risée chaque jour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Si je dis: Je ne ferai plus mention de lui,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne parlerai plus en son nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il y a dans mon cœur comme un feu dévorant
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui est renfermé dans mes os.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je m’efforce de le contenir, et je ne le puis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car j’apprends les mauvais propos de plusieurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'L’épouvante qui règne à l’entour:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Accusez-le, et nous l’accuserons!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui étaient en paix avec moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Observent si je chancelle:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peut-être se laissera-t-il surprendre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nous serons maîtres de lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous tirerons vengeance de lui!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais l’Éternel est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 1:8
      metadata:
        usfm: JER.1.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: JER.1.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:20
      metadata:
        usfm: JER.15.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: avec moi comme un héros puissant;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 17:18
      metadata:
        usfm: JER.17.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: C’est pourquoi mes persécuteurs chancellent et n’auront pas le dessus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils seront remplis de confusion pour n’avoir pas réussi:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 23:40
      metadata:
        usfm: JER.23.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ce sera une honte éternelle qui ne s’oubliera pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’Éternel des armées '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 11:20
      metadata:
        usfm: JER.11.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:3
      metadata:
        usfm: JER.12.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: éprouve le juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il pénètre les reins et les cœurs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je verrai ta '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 11:20
      metadata:
        usfm: JER.11.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:15
      metadata:
        usfm: JER.15.15
    - type: text
      text: ; 18:19, etc.
    marker-yv: yv-n
  - type: text
    text: vengeance s’exercer contre eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car c’est à toi que je confie ma cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Chantez à l’Éternel, louez l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il délivre l’âme du malheureux de la main des méchants.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-18: cf. Job 3. 1 R 19:4.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 15:10
      metadata:
        usfm: JER.15.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Maudit soit le jour où je suis né!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que le jour où ma mère m’a enfanté
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne soit pas béni!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 3:3
      metadata:
        usfm: JOB.3.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Maudit soit l’homme qui porta cette nouvelle à mon père:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il t’est né un enfant mâle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui le combla de joie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Que cet homme soit comme les villes
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Que l’Éternel a '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 19
      metadata:
        usfm: GEN.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: détruites sans miséricorde!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il entende des gémissements le matin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et des cris de guerre à midi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Que ne m’a-t-on fait mourir dans le sein de ma mère!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ne m’a-t-elle servi de tombeau!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que n’est-elle restée éternellement enceinte!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 3:20
      metadata:
        usfm: JOB.3.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pourquoi suis-je sorti du sein maternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour voir la souffrance et la douleur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pour consumer mes jours dans la honte?
