document_id: JER.20,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'Paschhur, fils d’Immer, sacrificateur et inspecteur en chef dans la maison de l’Éternel, entendit Jérémie qui prophétisait ces choses. '
  '10':
  - type: text
    content: Car j’apprends les mauvais propos de plusieurs,
  - type: text
    content: 'L’épouvante qui règne à l’entour:'
  - type: text
    content: Accusez-le, et nous l’accuserons!
  - type: text
    content: Tous ceux qui étaient en paix avec moi
  - type: text
    content: 'Observent si je chancelle:'
  - type: text
    content: Peut-être se laissera-t-il surprendre,
  - type: text
    content: Et nous serons maîtres de lui,
  - type: text
    content: Nous tirerons vengeance de lui!
  '11':
  - type: text
    content: 'Mais l’Éternel est '
  - type: note
    content: Jé 1:8, 19; 15:20.
  - type: text
    content: avec moi comme un héros puissant;
  - type: note
    content: Jé 17:18.
  - type: text
    content: C’est pourquoi mes persécuteurs chancellent et n’auront pas le dessus;
  - type: text
    content: 'Ils seront remplis de confusion pour n’avoir pas réussi:'
  - type: note
    content: Jé 23:40.
  - type: text
    content: Ce sera une honte éternelle qui ne s’oubliera pas.
  '12':
  - type: text
    content: 'L’Éternel des armées '
  - type: note
    content: Jé 11:20; 12:3.
  - type: text
    content: éprouve le juste,
  - type: text
    content: Il pénètre les reins et les cœurs.
  - type: text
    content: 'Je verrai ta '
  - type: note
    content: Jé 11:20; 15:15; 18:19, etc.
  - type: text
    content: vengeance s’exercer contre eux,
  - type: text
    content: Car c’est à toi que je confie ma cause.
  '13':
  - type: text
    content: Chantez à l’Éternel, louez l’Éternel!
  - type: text
    content: Car il délivre l’âme du malheureux de la main des méchants.
  - type: heading
    content: 'V. 14-18: cf. Job 3. 1 R 19:4.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Jé 15:10.
  - type: text
    content: Maudit soit le jour où je suis né!
  - type: text
    content: Que le jour où ma mère m’a enfanté
  - type: text
    content: Ne soit pas béni!
  '15':
  - type: text
    content: ' '
  - type: note
    content: Job 3:3.
  - type: text
    content: 'Maudit soit l’homme qui porta cette nouvelle à mon père:'
  - type: text
    content: Il t’est né un enfant mâle,
  - type: text
    content: Et qui le combla de joie!
  '16':
  - type: text
    content: Que cet homme soit comme les villes
  - type: text
    content: 'Que l’Éternel a '
  - type: note
    content: Ge 19.
  - type: text
    content: détruites sans miséricorde!
  - type: text
    content: Qu’il entende des gémissements le matin,
  - type: text
    content: Et des cris de guerre à midi!
  '17':
  - type: text
    content: Que ne m’a-t-on fait mourir dans le sein de ma mère!
  - type: text
    content: Que ne m’a-t-elle servi de tombeau!
  - type: text
    content: Que n’est-elle restée éternellement enceinte!
  '18':
  - type: text
    content: ' '
  - type: note
    content: Job 3:20.
  - type: text
    content: Pourquoi suis-je sorti du sein maternel
  - type: text
    content: Pour voir la souffrance et la douleur,
  - type: text
    content: Et pour consumer mes jours dans la honte?
  '2':
  - type: text
    content: 'Et Paschhur frappa Jérémie, le prophète, et le mit dans la prison qui était à la porte supérieure de Benjamin, dans la maison de l’Éternel. '
  '3':
  - type: text
    content: 'Mais le lendemain, Paschhur fit sortir Jérémie de prison. Et Jérémie lui dit: Ce n’est pas le nom de Paschhur que l’Éternel te donne, c’est celui de Magor-Missabib. '
  '4':
  - type: text
    content: 'Car ainsi parle l’Éternel: Voici, je te livrerai à la terreur, toi et tous tes amis; ils tomberont par l’épée de leurs ennemis, et tes yeux le verront. Je livrerai aussi tout Juda entre les mains du roi de Babylone, qui les emmènera captifs à Babylone et les frappera de l’épée. '
  '5':
  - type: text
    content: 'Je livrerai toutes les richesses de cette ville, tout le produit de son travail, tout ce qu’elle a de précieux, je livrerai tous les trésors des rois de Juda entre les mains de leurs ennemis, qui les '
  - type: note
    content: Jé 15:13; 17:3.
  - type: text
    content: 'pilleront, les enlèveront et les transporteront à Babylone. '
  '6':
  - type: text
    content: Et toi, Paschhur, et tous ceux qui demeurent dans ta maison, vous irez en captivité; tu iras à Babylone, et là tu mourras, et là tu seras enterré, toi et tous tes amis auxquels tu as prophétisé le mensonge.
  - type: heading
    content: Plaintes du prophète
  - type: heading
    content: 'V. 7-13: cf. (Jé 17:15-18; 18:18-23.) Ps 69:7, etc.'
  '7':
  - type: text
    content: Tu m’as persuadé, Éternel, et je me suis laissé persuader;
  - type: text
    content: Tu m’as saisi, tu m’as vaincu.
  - type: text
    content: Et je suis chaque jour un objet de raillerie,
  - type: text
    content: Tout le monde se moque de moi.
  '8':
  - type: text
    content: Car toutes les fois que je parle, il faut que je crie,
  - type: text
    content: Que je crie à la violence et à l’oppression!
  - type: text
    content: Et la parole de l’Éternel est pour moi
  - type: text
    content: 'Un sujet '
  - type: note
    content: És 57:4.
  - type: text
    content: d’opprobre et de risée chaque jour.
  '9':
  - type: text
    content: 'Si je dis: Je ne ferai plus mention de lui,'
  - type: text
    content: Je ne parlerai plus en son nom,
  - type: text
    content: Il y a dans mon cœur comme un feu dévorant
  - type: text
    content: Qui est renfermé dans mes os.
  - type: text
    content: Je m’efforce de le contenir, et je ne le puis.
