document_id: EXO.32,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le veau d’or
  - type: heading
    content: 'V. 1-6: cf. (Ps 106:19-22. Ac 7:39-41.) 1 R 12:26-33.'
  - type: text
    content: 'Le peuple, voyant que Moïse tardait à descendre de la montagne, s’assembla autour d’Aaron, et lui dit: Allons! '
  - type: note
    content: Ac 7:40.
  - type: text
    content: 'fais-nous un dieu qui marche devant nous, car ce Moïse, cet homme qui nous a fait sortir du pays d’Égypte, nous ne savons ce qu’il est devenu. '
  '10':
  - type: text
    content: 'Maintenant laisse-moi; ma colère va s’enflammer contre eux, et je les consumerai; mais je ferai de toi une grande nation. '
  '11':
  - type: text
    content: 'Moïse implora l’Éternel, son Dieu, et dit: Pourquoi, ô Éternel! Ta colère s’enflammerait-elle contre ton peuple, '
  - type: note
    content: Ps 106:21.
  - type: text
    content: 'que tu as fait sortir du pays d’Égypte par une grande puissance et par une main forte? '
  '12':
  - type: text
    content: 'Pourquoi les Égyptiens diraient-ils: '
  - type: note
    content: No 14:13, etc.
  - type: text
    content: 'C’est pour leur malheur qu’il les a fait sortir, c’est pour les tuer dans les montagnes, et pour les exterminer de dessus la terre? Reviens de l’ardeur de ta colère, et repens-toi du mal que tu veux faire à ton peuple. '
  '13':
  - type: note
    content: Ge 12:7; 13:15; 15:18; 26:4; 28:13. De 34:4.
  - type: text
    content: 'Souviens-toi d’Abraham, d’Isaac et d’Israël, tes serviteurs, auxquels tu as dit, en jurant par toi-même: Je multiplierai votre postérité comme les étoiles du ciel, je donnerai à vos descendants tout ce pays dont j’ai parlé, et ils le posséderont à jamais. '
  '14':
  - type: text
    content: Et l’Éternel se repentit du mal qu’il avait déclaré vouloir faire à son peuple.
  - type: heading
    content: 'V. 15-24: cf. De 9:15-17, 20, 21.'
  '15':
  - type: text
    content: 'Moïse retourna et descendit de la montagne, les deux tables du témoignage dans sa main; les tables étaient écrites des deux côtés, elles étaient écrites de l’un et de l’autre côté. '
  '16':
  - type: note
    content: Ex 31:18. De 9:10.
  - type: text
    content: 'Les tables étaient l’ouvrage de Dieu, et l’écriture était l’écriture de Dieu, gravée sur les tables. '
  '17':
  - type: text
    content: 'Josué entendit la voix du peuple, qui poussait des cris, et il dit à Moïse: Il y a un cri de guerre dans le camp. '
  '18':
  - type: text
    content: 'Moïse répondit: Ce n’est ni un cri de vainqueurs, ni un cri de vaincus; ce que j’entends, c’est la voix de gens qui chantent. '
  '19':
  - type: text
    content: 'Et, comme il approchait du camp, il vit le veau et '
  - type: note
    content: De 9:17.
  - type: text
    content: 'les danses. La colère de Moïse s’enflamma; il jeta de ses mains les tables, et les brisa au pied de la montagne. '
  '2':
  - type: text
    content: 'Aaron leur dit: Otez les anneaux d’or qui sont aux oreilles de vos femmes, de vos fils et de vos filles, et apportez-les-moi. '
  '20':
  - type: note
    content: De 9:21.
  - type: text
    content: 'Il prit le veau qu’ils avaient fait, et le brûla au feu; il le réduisit en poudre, répandit cette poudre à la surface de l’eau, et fit boire les enfants d’Israël. '
  '21':
  - type: text
    content: 'Moïse dit à Aaron: Que t’a fait ce peuple, pour que tu l’aies laissé commettre un si grand péché? '
  '22':
  - type: text
    content: 'Aaron répondit: Que la colère de mon seigneur ne s’enflamme point! Tu sais toi-même que ce peuple '
  - type: note
    content: 1 Jn 5:19.
  - type: text
    content: 'est porté au mal. '
  '23':
  - type: text
    content: 'Ils m’ont dit: Fais-nous un dieu qui marche devant nous; car ce Moïse, cet homme qui nous a fait sortir du pays d’Égypte, nous ne savons ce qu’il est devenu. '
  '24':
  - type: text
    content: 'Je leur ai dit: Que ceux qui ont de l’or, s’en dépouillent! Et ils me l’ont donné; je l’ai jeté au feu, et il en est sorti ce veau.'
  - type: heading
    content: 'V. 25-29: cf. No 25. De 33:8-11.'
  '25':
  - type: text
    content: 'Moïse vit que le peuple était livré au désordre, et qu’Aaron l’avait laissé dans ce désordre, exposé à l’opprobre parmi ses ennemis. '
  '26':
  - type: text
    content: 'Moïse se plaça à la porte du camp, et dit: A moi ceux qui sont pour l’Éternel! Et tous les enfants de Lévi s’assemblèrent auprès de lui. '
  '27':
  - type: text
    content: 'Il leur dit: Ainsi parle l’Éternel, le Dieu d’Israël: Que chacun de vous mette son épée au côté; traversez et parcourez le camp d’une porte à l’autre, et que chacun tue son frère, son parent. '
  '28':
  - type: text
    content: 'Les enfants de Lévi firent ce qu’ordonnait Moïse; et environ trois mille hommes parmi le peuple périrent en cette journée. '
  '29':
  - type: text
    content: 'Moïse dit: Consacrez-vous aujourd’hui à l’Éternel, même en sacrifiant votre fils et votre frère, afin qu’il vous accorde aujourd’hui une bénédiction.'
  - type: heading
    content: 'V. 30-35: cf. De 9:18-20, 25-29. Ja 5:16. Ps 99:6, 8.'
  '3':
  - type: text
    content: 'Et tous ôtèrent les anneaux d’or qui étaient à leurs oreilles, et ils les apportèrent à Aaron. '
  '30':
  - type: text
    content: 'Le lendemain, Moïse dit au peuple: Vous avez commis un grand péché. Je vais maintenant monter vers l’Éternel: j’obtiendrai peut-être le pardon de votre péché. '
  '31':
  - type: text
    content: 'Moïse retourna vers l’Éternel et dit: Ah! Ce peuple a commis un grand péché. Ils se sont fait un dieu d’or. '
  '32':
  - type: text
    content: 'Pardonne maintenant leur péché! Sinon, efface-moi de ton livre que tu as écrit. '
  '33':
  - type: text
    content: 'L’Éternel dit à Moïse: C’est celui qui a péché contre moi que j’effacerai de mon livre. '
  '34':
  - type: text
    content: 'Va donc, conduis le peuple où je t’ai dit. Voici, mon ange marchera devant toi, mais au jour de ma vengeance, je les punirai de leur péché. '
  '35':
  - type: text
    content: L’Éternel frappa le peuple, parce qu’il avait fait le veau, fabriqué par Aaron.
  '4':
  - type: text
    content: 'Il les reçut de leurs mains, jeta l’or dans un moule, et fit un veau en fonte. Et ils dirent: Israël! Voici ton dieu, qui t’a fait sortir du pays d’Égypte. '
  '5':
  - type: text
    content: 'Lorsqu’Aaron vit cela, il bâtit un autel devant lui, et il s’écria: Demain, il y aura fête en l’honneur de l’Éternel! '
  '6':
  - type: text
    content: 'Le lendemain, ils se levèrent de bon matin, et ils offrirent des holocaustes et des sacrifices d’actions de grâces. '
  - type: note
    content: 1 Co 10:7.
  - type: text
    content: Le peuple s’assit pour manger et pour boire; puis ils se levèrent pour se divertir.
  - type: heading
    content: 'V. 7-14: cf. (De 9:8-14, 25-29. Ps 106:23.) No 14:11-20.'
  '7':
  - type: text
    content: 'L’Éternel dit à Moïse: Va, descends; car ton peuple, que tu as fait sortir du pays d’Égypte, '
  - type: note
    content: De 32:5.
  - type: text
    content: 's’est corrompu. '
  '8':
  - type: text
    content: 'Ils se sont promptement écartés de la voie que je leur avais prescrite; ils se sont fait un veau en fonte, ils se sont prosternés devant lui, ils lui ont offert des sacrifices, et ils ont dit: Israël! '
  - type: note
    content: 1 R 12:28.
  - type: text
    content: 'voici ton dieu, qui t’a fait sortir du pays d’Égypte. '
  '9':
  - type: text
    content: 'L’Éternel dit à Moïse: Je vois que ce peuple est '
  - type: note
    content: Ex 33:3. De 9:6, 13. És 48:4. Jé 5:3. Os 4:16.
  - type: text
    content: 'un peuple au cou roide. '
