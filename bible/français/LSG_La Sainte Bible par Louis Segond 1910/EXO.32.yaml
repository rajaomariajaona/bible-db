document_id: EXO.32
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le veau d’or
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. (Ps 106:19-22. Ac 7:39-41.) 1 R 12:26-33.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le peuple, voyant que Moïse tardait à descendre de la montagne, s’assembla autour d’Aaron, et lui dit: Allons! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:40
      metadata:
        usfm: ACT.7.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'fais-nous un dieu qui marche devant nous, car ce Moïse, cet homme qui nous a fait sortir du pays d’Égypte, nous ne savons ce qu’il est devenu. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Aaron leur dit: Otez les anneaux d’or qui sont aux oreilles de vos femmes, de vos fils et de vos filles, et apportez-les-moi. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et tous ôtèrent les anneaux d’or qui étaient à leurs oreilles, et ils les apportèrent à Aaron. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il les reçut de leurs mains, jeta l’or dans un moule, et fit un veau en fonte. Et ils dirent: Israël! Voici ton dieu, qui t’a fait sortir du pays d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Lorsqu’Aaron vit cela, il bâtit un autel devant lui, et il s’écria: Demain, il y aura fête en l’honneur de l’Éternel! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le lendemain, ils se levèrent de bon matin, et ils offrirent des holocaustes et des sacrifices d’actions de grâces. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:7
      metadata:
        usfm: 1CO.10.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le peuple s’assit pour manger et pour boire; puis ils se levèrent pour se divertir.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-14: cf. (De 9:8-14, 25-29. Ps 106:23.) No 14:11-20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’Éternel dit à Moïse: Va, descends; car ton peuple, que tu as fait sortir du pays d’Égypte, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:5
      metadata:
        usfm: DEU.32.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 's’est corrompu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils se sont promptement écartés de la voie que je leur avais prescrite; ils se sont fait un veau en fonte, ils se sont prosternés devant lui, ils lui ont offert des sacrifices, et ils ont dit: Israël! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 12:28
      metadata:
        usfm: 1KI.12.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'voici ton dieu, qui t’a fait sortir du pays d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L’Éternel dit à Moïse: Je vois que ce peuple est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 33:3
      metadata:
        usfm: EXO.33.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 9:6
      metadata:
        usfm: DEU.9.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: DEU.9.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 48:4
      metadata:
        usfm: ISA.48.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 5:3
      metadata:
        usfm: JER.5.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 4:16
      metadata:
        usfm: HOS.4.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un peuple au cou roide. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Maintenant laisse-moi; ma colère va s’enflammer contre eux, et je les consumerai; mais je ferai de toi une grande nation. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Moïse implora l’Éternel, son Dieu, et dit: Pourquoi, ô Éternel! Ta colère s’enflammerait-elle contre ton peuple, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 106:21
      metadata:
        usfm: PSA.106.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que tu as fait sortir du pays d’Égypte par une grande puissance et par une main forte? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Pourquoi les Égyptiens diraient-ils: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: No 14:13, etc.
    marker-yv: yv-n
  - type: text
    text: 'C’est pour leur malheur qu’il les a fait sortir, c’est pour les tuer dans les montagnes, et pour les exterminer de dessus la terre? Reviens de l’ardeur de ta colère, et repens-toi du mal que tu veux faire à ton peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 12:7
      metadata:
        usfm: GEN.12.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:15
      metadata:
        usfm: GEN.13.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:18
      metadata:
        usfm: GEN.15.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:4
      metadata:
        usfm: GEN.26.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:13
      metadata:
        usfm: GEN.28.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 34:4
      metadata:
        usfm: DEU.34.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Souviens-toi d’Abraham, d’Isaac et d’Israël, tes serviteurs, auxquels tu as dit, en jurant par toi-même: Je multiplierai votre postérité comme les étoiles du ciel, je donnerai à vos descendants tout ce pays dont j’ai parlé, et ils le posséderont à jamais. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Et l’Éternel se repentit du mal qu’il avait déclaré vouloir faire à son peuple.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-24: cf. De 9:15-17, 20, 21.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moïse retourna et descendit de la montagne, les deux tables du témoignage dans sa main; les tables étaient écrites des deux côtés, elles étaient écrites de l’un et de l’autre côté. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 31:18
      metadata:
        usfm: EXO.31.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 9:10
      metadata:
        usfm: DEU.9.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les tables étaient l’ouvrage de Dieu, et l’écriture était l’écriture de Dieu, gravée sur les tables. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Josué entendit la voix du peuple, qui poussait des cris, et il dit à Moïse: Il y a un cri de guerre dans le camp. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Moïse répondit: Ce n’est ni un cri de vainqueurs, ni un cri de vaincus; ce que j’entends, c’est la voix de gens qui chantent. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et, comme il approchait du camp, il vit le veau et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 9:17
      metadata:
        usfm: DEU.9.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les danses. La colère de Moïse s’enflamma; il jeta de ses mains les tables, et les brisa au pied de la montagne. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 9:21
      metadata:
        usfm: DEU.9.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il prit le veau qu’ils avaient fait, et le brûla au feu; il le réduisit en poudre, répandit cette poudre à la surface de l’eau, et fit boire les enfants d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Moïse dit à Aaron: Que t’a fait ce peuple, pour que tu l’aies laissé commettre un si grand péché? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Aaron répondit: Que la colère de mon seigneur ne s’enflamme point! Tu sais toi-même que ce peuple '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 5:19
      metadata:
        usfm: 1JN.5.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'est porté au mal. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ils m’ont dit: Fais-nous un dieu qui marche devant nous; car ce Moïse, cet homme qui nous a fait sortir du pays d’Égypte, nous ne savons ce qu’il est devenu. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Je leur ai dit: Que ceux qui ont de l’or, s’en dépouillent! Et ils me l’ont donné; je l’ai jeté au feu, et il en est sorti ce veau.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 25-29: cf. No 25. De 33:8-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Moïse vit que le peuple était livré au désordre, et qu’Aaron l’avait laissé dans ce désordre, exposé à l’opprobre parmi ses ennemis. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Moïse se plaça à la porte du camp, et dit: A moi ceux qui sont pour l’Éternel! Et tous les enfants de Lévi s’assemblèrent auprès de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il leur dit: Ainsi parle l’Éternel, le Dieu d’Israël: Que chacun de vous mette son épée au côté; traversez et parcourez le camp d’une porte à l’autre, et que chacun tue son frère, son parent. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Les enfants de Lévi firent ce qu’ordonnait Moïse; et environ trois mille hommes parmi le peuple périrent en cette journée. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Moïse dit: Consacrez-vous aujourd’hui à l’Éternel, même en sacrifiant votre fils et votre frère, afin qu’il vous accorde aujourd’hui une bénédiction.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 30-35: cf. De 9:18-20, 25-29. Ja 5:16. Ps 99:6, 8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Le lendemain, Moïse dit au peuple: Vous avez commis un grand péché. Je vais maintenant monter vers l’Éternel: j’obtiendrai peut-être le pardon de votre péché. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Moïse retourna vers l’Éternel et dit: Ah! Ce peuple a commis un grand péché. Ils se sont fait un dieu d’or. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Pardonne maintenant leur péché! Sinon, efface-moi de ton livre que tu as écrit. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'L’Éternel dit à Moïse: C’est celui qui a péché contre moi que j’effacerai de mon livre. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Va donc, conduis le peuple où je t’ai dit. Voici, mon ange marchera devant toi, mais au jour de ma vengeance, je les punirai de leur péché. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: L’Éternel frappa le peuple, parce qu’il avait fait le veau, fabriqué par Aaron.
