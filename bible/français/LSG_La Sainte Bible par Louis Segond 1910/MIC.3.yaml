document_id: MIC.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Culpabilité des chefs d’Israël
  - type: heading
    content: 'V. 1-4: cf. És 10:1-4. Ps 82.'
  - type: text
    content: 'Je dis: Écoutez, chefs de Jacob,'
  - type: text
    content: Et princes de la maison d’Israël!
  - type: text
    content: N’est-ce pas à vous à connaître la justice?
  '10':
  - type: text
    content: 'Vous qui bâtissez Sion avec le '
  - type: note
    content: Éz 22:27. So 3:3.
  - type: text
    content: sang,
  - type: text
    content: Et Jérusalem avec l’iniquité!
  '11':
  - type: text
    content: Ses chefs jugent pour des présents,
  - type: text
    content: Ses sacrificateurs enseignent pour un salaire,
  - type: text
    content: Et ses prophètes prédisent pour de l’argent;
  - type: text
    content: 'Et ils osent s’appuyer sur l’Éternel, ils disent:'
  - type: text
    content: L’Éternel n’est-il pas au milieu de nous?
  - type: text
    content: Le malheur ne nous atteindra pas.
  '12':
  - type: text
    content: C’est pourquoi, à cause de vous,
  - type: text
    content: Sion sera labourée comme un champ,
  - type: text
    content: Jérusalem deviendra un monceau de pierres,
  - type: text
    content: Et la montagne du temple une sommité couverte de bois.
  '2':
  - type: text
    content: Vous haïssez le bien et vous aimez le mal;
  - type: text
    content: Vous leur arrachez la peau et la chair de dessus les os.
  '3':
  - type: text
    content: Ils dévorent la chair de mon peuple,
  - type: text
    content: Lui arrachent la peau,
  - type: text
    content: Et lui brisent les os;
  - type: text
    content: Ils le mettent en pièces comme ce qu’on cuit dans un pot,
  - type: text
    content: Comme de la viande dans une chaudière.
  '4':
  - type: text
    content: Alors ils crieront vers l’Éternel,
  - type: text
    content: Mais il ne leur répondra pas;
  - type: text
    content: Il leur cachera sa face en ce temps-là,
  - type: text
    content: Parce qu’ils ont fait de mauvaises actions.
  - type: heading
    content: 'V. 5-8: cf. És 56:10-12. Jé 23:9, etc.'
  '5':
  - type: text
    content: Ainsi parle l’Éternel sur les prophètes qui égarent mon peuple,
  - type: text
    content: 'Qui annoncent la paix si leurs dents '
  - type: note
    content: Mi 2:11.
  - type: text
    content: ont quelque chose à mordre,
  - type: text
    content: 'Et qui publient la guerre si on ne leur met rien dans la bouche:'
  '6':
  - type: text
    content: A cause de cela, vous aurez la nuit…, et plus de visions!
  - type: text
    content: Vous aurez les ténèbres…, et plus d’oracles!
  - type: note
    content: Jé 15:9. Am 8:9.
  - type: text
    content: Le soleil se couchera sur ces prophètes,
  - type: text
    content: 'Le jour '
  - type: note
    content: Joë 2:10.
  - type: text
    content: s’obscurcira sur eux.
  '7':
  - type: text
    content: Les voyants seront confus, les devins rougiront,
  - type: text
    content: Tous se couvriront la barbe;
  - type: text
    content: Car Dieu ne répondra pas.
  '8':
  - type: text
    content: Mais moi, je suis rempli de force, de l’esprit de l’Éternel,
  - type: text
    content: Je suis rempli de justice et de vigueur,
  - type: text
    content: Pour faire connaître à Jacob son crime,
  - type: text
    content: Et à Israël son péché.
  - type: heading
    content: 'V. 9-12: cf. (És 1:21-24. So 3:1-4.) Jé 26:17-19.'
  '9':
  - type: text
    content: Écoutez donc ceci, chefs de la maison de Jacob,
  - type: text
    content: Et princes de la maison d’Israël,
  - type: text
    content: Vous qui avez en horreur la justice,
  - type: text
    content: 'Et qui '
  - type: note
    content: Am 5:7; 6:12.
  - type: text
    content: pervertissez tout ce qui est droit,
