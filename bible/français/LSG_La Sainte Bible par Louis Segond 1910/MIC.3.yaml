document_id: MIC.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Culpabilité des chefs d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-4: cf. És 10:1-4. Ps 82.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Je dis: Écoutez, chefs de Jacob,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et princes de la maison d’Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’est-ce pas à vous à connaître la justice?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Vous qui bâtissez Sion avec le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 22:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: So 3:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: sang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Jérusalem avec l’iniquité!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ses chefs jugent pour des présents,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses sacrificateurs enseignent pour un salaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses prophètes prédisent pour de l’argent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et ils osent s’appuyer sur l’Éternel, ils disent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel n’est-il pas au milieu de nous?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le malheur ne nous atteindra pas.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: C’est pourquoi, à cause de vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sion sera labourée comme un champ,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem deviendra un monceau de pierres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la montagne du temple une sommité couverte de bois.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Vous haïssez le bien et vous aimez le mal;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous leur arrachez la peau et la chair de dessus les os.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ils dévorent la chair de mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui arrachent la peau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et lui brisent les os;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils le mettent en pièces comme ce qu’on cuit dans un pot,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme de la viande dans une chaudière.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Alors ils crieront vers l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il ne leur répondra pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il leur cachera sa face en ce temps-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils ont fait de mauvaises actions.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-8: cf. És 56:10-12. Jé 23:9, etc.'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ainsi parle l’Éternel sur les prophètes qui égarent mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qui annoncent la paix si leurs dents '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 2:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ont quelque chose à mordre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et qui publient la guerre si on ne leur met rien dans la bouche:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: A cause de cela, vous aurez la nuit…, et plus de visions!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous aurez les ténèbres…, et plus d’oracles!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 15:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 8:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le soleil se couchera sur ces prophètes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le jour '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 2:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: s’obscurcira sur eux.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Les voyants seront confus, les devins rougiront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous se couvriront la barbe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car Dieu ne répondra pas.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mais moi, je suis rempli de force, de l’esprit de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis rempli de justice et de vigueur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour faire connaître à Jacob son crime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et à Israël son péché.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-12: cf. (És 1:21-24. So 3:1-4.) Jé 26:17-19.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Écoutez donc ceci, chefs de la maison de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et princes de la maison d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous qui avez en horreur la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et qui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 5:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: pervertissez tout ce qui est droit,
