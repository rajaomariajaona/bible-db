document_id: 1CO.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-13: cf. Ps 78:13-33; 106:9-29. Hé 3:7-19.'
  - type: text
    content: 'Frères, je ne veux pas que vous ignoriez '
  - type: note
    content: Ex 13:21. No 9:18. De 1:33. Né 9:12, 19. Ps 78:14; 105:39.
  - type: text
    content: 'que nos pères ont tous été sous la nuée, '
  - type: note
    content: Ex 14:22. Jos 4:23. Ps 78:13.
  - type: text
    content: 'qu’ils ont tous passé au travers de la mer, '
  '10':
  - type: text
    content: 'Ne murmurez point, '
  - type: note
    content: Ex 16:2; 17:2. No 14:36. Ps 106:25.
  - type: text
    content: 'comme murmurèrent quelques-uns d’eux, qui périrent par l’exterminateur. '
  '11':
  - type: text
    content: 'Ces choses leur sont arrivées pour servir d’exemples, '
  - type: note
    content: Ro 15:4. 1 Co 9:10.
  - type: text
    content: 'et elles ont été écrites pour notre instruction, à nous '
  - type: note
    content: Ph 4:5. Hé 10:25.
  - type: text
    content: 'qui sommes parvenus à la fin des siècles. '
  '12':
  - type: text
    content: 'Ainsi donc, que celui qui croit être debout prenne garde de tomber! '
  '13':
  - type: text
    content: 'Aucune tentation ne vous est survenue qui n’ait été humaine, et '
  - type: note
    content: 1 Co 1:8. 1 Th 5:24. 2 Pi 2:9.
  - type: text
    content: Dieu, qui est fidèle, ne permettra pas que vous soyez tentés au-delà de vos forces; mais avec la tentation il préparera aussi le moyen d’en sortir, afin que vous puissiez la supporter.
  - type: heading
    content: 'V. 14-22: cf. Ex 20:4, 5. 2 Co 6:14-18. Ap 2:14.'
  '14':
  - type: text
    content: 'C’est pourquoi, mes bien-aimés, fuyez l’idolâtrie. '
  '15':
  - type: text
    content: 'Je parle comme à des hommes intelligents; jugez vous-mêmes de ce que je dis. '
  '16':
  - type: text
    content: 'La coupe de bénédiction que nous bénissons, n’est-elle pas la communion au sang de Christ? Le pain que nous rompons, n’est-il pas la communion au corps de Christ? '
  '17':
  - type: text
    content: 'Puisqu’il y a un seul pain, nous qui sommes plusieurs, nous formons '
  - type: note
    content: Ro 12:5. 1 Co 12:27.
  - type: text
    content: 'un seul corps; car nous participons tous à un même pain. '
  '18':
  - type: text
    content: 'Voyez les Israélites selon la chair: ceux qui mangent les victimes ne sont-ils pas en communion avec l’autel? '
  '19':
  - type: text
    content: 'Que dis-je donc? '
  - type: note
    content: 1 Co 8:4.
  - type: text
    content: 'Que la viande sacrifiée aux idoles est quelque chose, ou qu’une idole est quelque chose? Nullement. '
  '2':
  - type: text
    content: 'qu’ils ont tous été baptisés en Moïse dans la nuée et dans la mer, '
  '20':
  - type: text
    content: 'Je dis que ce qu’on sacrifie, '
  - type: note
    content: Lé 17:7. De 32:17.
  - type: text
    content: 'on le sacrifie à des démons, et non à Dieu; or, je ne veux pas que vous soyez en communion avec les démons. '
  '21':
  - type: text
    content: 'Vous ne pouvez boire la coupe du Seigneur, et la coupe des démons; vous ne pouvez participer à la table du Seigneur, et à la table des démons. '
  '22':
  - type: text
    content: Voulons-nous provoquer la jalousie du Seigneur? Sommes-nous plus forts que lui?
  - type: heading
    content: '10 v. 23 à 11 v. 1: cf. 1 Co 8. Ro 14:13-23.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 1 Co 6:12.
  - type: text
    content: 'Tout est permis, mais tout n’est pas utile; tout est permis, mais tout n’édifie pas. '
  '24':
  - type: note
    content: 1 Co 13:5. Ph 2:4.
  - type: text
    content: 'Que personne ne cherche son propre intérêt, mais que chacun cherche celui d’autrui. '
  '25':
  - type: text
    content: 'Mangez de tout ce qui se vend au marché, sans vous enquérir de rien par motif de conscience; '
  '26':
  - type: note
    content: Ex 19:5. Ps 24:1; 50:12.
  - type: text
    content: 'car la terre est au Seigneur, et tout ce qu’elle renferme. '
  '27':
  - type: text
    content: 'Si un non-croyant vous invite et que vous vouliez y aller, '
  - type: note
    content: Lu 10:7.
  - type: text
    content: 'mangez de tout ce qu’on vous présentera, sans vous enquérir de rien '
  - type: note
    content: 1 Co 8:7.
  - type: text
    content: 'par motif de conscience. '
  '28':
  - type: text
    content: 'Mais si quelqu’un vous dit: Ceci a été offert en sacrifice! N’en mangez pas, à cause de celui qui a donné l’avertissement, et à cause de la conscience. '
  '29':
  - type: text
    content: 'Je parle ici, non de votre conscience, mais de celle de l’autre. Pourquoi, en effet, ma liberté serait-elle jugée par une conscience étrangère? '
  '3':
  - type: note
    content: Ex 16:15.
  - type: text
    content: 'qu’ils ont tous mangé le même aliment spirituel, '
  '30':
  - type: text
    content: 'Si je mange avec actions de grâces, pourquoi serais-je blâmé au sujet d’une chose '
  - type: note
    content: Ro 14:6. 1 Ti 4:3.
  - type: text
    content: 'dont je rends grâces? '
  '31':
  - type: note
    content: Col 3:17.
  - type: text
    content: 'Soit donc que vous mangiez, soit que vous buviez, soit que vous fassiez quelque autre chose, faites tout pour la gloire de Dieu. '
  '32':
  - type: note
    content: Ro 14:13.
  - type: text
    content: 'Ne soyez en scandale ni aux Grecs, ni aux Juifs, ni à l’Église de Dieu, '
  '33':
  - type: text
    content: 'de la même manière que moi aussi je m’efforce en toutes choses de complaire à tous, cherchant, non mon avantage, mais celui du plus grand nombre, afin qu’ils soient '
  - type: note
    content: 1 Co 9:22.
  - type: text
    content: sauvés.
  '4':
  - type: note
    content: Ex 17:6. No 20:11. Ps 78:15.
  - type: text
    content: 'et qu’ils ont tous bu le même breuvage spirituel, car ils buvaient à un rocher spirituel qui les suivait, et ce rocher était Christ. '
  '5':
  - type: text
    content: 'Mais la plupart d’entre eux ne furent point agréables à Dieu, '
  - type: note
    content: No 26:65.
  - type: text
    content: 'puisqu’ils périrent dans le désert. '
  '6':
  - type: text
    content: 'Or, ces choses sont arrivées pour nous servir d’exemples, afin que nous n’ayons pas de mauvais désirs, '
  - type: note
    content: No 11:4, 33. Ps 106:14.
  - type: text
    content: 'comme ils en ont eu. '
  '7':
  - type: text
    content: 'Ne devenez point idolâtres, comme quelques-uns d’eux, selon qu’il est écrit: '
  - type: note
    content: Ex 32:6.
  - type: text
    content: 'Le peuple s’assit pour manger et pour boire; puis ils se levèrent pour se divertir. '
  '8':
  - type: text
    content: 'Ne nous livrons point à l’impudicité, '
  - type: note
    content: No 25:1, 9. Ps 106:29.
  - type: text
    content: 'comme quelques-uns d’eux s’y livrèrent, de sorte qu’il en tomba vingt-trois mille en un seul jour. '
  '9':
  - type: text
    content: 'Ne tentons point le Seigneur, '
  - type: note
    content: No 21:5. Ps 106:14.
  - type: text
    content: 'comme le tentèrent quelques-uns d’eux, qui périrent par les serpents. '
