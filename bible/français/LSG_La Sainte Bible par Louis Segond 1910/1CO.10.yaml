document_id: 1CO.10
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. Ps 78:13-33; 106:9-29. Hé 3:7-19.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Frères, je ne veux pas que vous ignoriez '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:21
      metadata:
        usfm: EXO.13.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 9:18
      metadata:
        usfm: NUM.9.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 1:33
      metadata:
        usfm: DEU.1.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Né 9:12
      metadata:
        usfm: NEH.9.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: NEH.9.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:14
      metadata:
        usfm: PSA.78.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 105:39
      metadata:
        usfm: PSA.105.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que nos pères ont tous été sous la nuée, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 14:22
      metadata:
        usfm: EXO.14.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 4:23
      metadata:
        usfm: JOS.4.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:13
      metadata:
        usfm: PSA.78.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’ils ont tous passé au travers de la mer, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'qu’ils ont tous été baptisés en Moïse dans la nuée et dans la mer, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 16:15
      metadata:
        usfm: EXO.16.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’ils ont tous mangé le même aliment spirituel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 17:6
      metadata:
        usfm: EXO.17.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 20:11
      metadata:
        usfm: NUM.20.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:15
      metadata:
        usfm: PSA.78.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et qu’ils ont tous bu le même breuvage spirituel, car ils buvaient à un rocher spirituel qui les suivait, et ce rocher était Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais la plupart d’entre eux ne furent point agréables à Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 26:65
      metadata:
        usfm: NUM.26.65
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'puisqu’ils périrent dans le désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Or, ces choses sont arrivées pour nous servir d’exemples, afin que nous n’ayons pas de mauvais désirs, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 11:4
      metadata:
        usfm: NUM.11.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '33'
      metadata:
        usfm: NUM.11.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 106:14
      metadata:
        usfm: PSA.106.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme ils en ont eu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ne devenez point idolâtres, comme quelques-uns d’eux, selon qu’il est écrit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 32:6
      metadata:
        usfm: EXO.32.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le peuple s’assit pour manger et pour boire; puis ils se levèrent pour se divertir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ne nous livrons point à l’impudicité, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 25:1
      metadata:
        usfm: NUM.25.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: NUM.25.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 106:29
      metadata:
        usfm: PSA.106.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme quelques-uns d’eux s’y livrèrent, de sorte qu’il en tomba vingt-trois mille en un seul jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ne tentons point le Seigneur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 21:5
      metadata:
        usfm: NUM.21.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 106:14
      metadata:
        usfm: PSA.106.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme le tentèrent quelques-uns d’eux, qui périrent par les serpents. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ne murmurez point, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 16:2
      metadata:
        usfm: EXO.16.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:2
      metadata:
        usfm: EXO.17.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 14:36
      metadata:
        usfm: NUM.14.36
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 106:25
      metadata:
        usfm: PSA.106.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme murmurèrent quelques-uns d’eux, qui périrent par l’exterminateur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ces choses leur sont arrivées pour servir d’exemples, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 15:4
      metadata:
        usfm: ROM.15.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 9:10
      metadata:
        usfm: 1CO.9.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et elles ont été écrites pour notre instruction, à nous '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 4:5
      metadata:
        usfm: PHP.4.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 10:25
      metadata:
        usfm: HEB.10.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui sommes parvenus à la fin des siècles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ainsi donc, que celui qui croit être debout prenne garde de tomber! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aucune tentation ne vous est survenue qui n’ait été humaine, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:8
      metadata:
        usfm: 1CO.1.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:24
      metadata:
        usfm: 1TH.5.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:9
      metadata:
        usfm: 2PE.2.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Dieu, qui est fidèle, ne permettra pas que vous soyez tentés au-delà de vos forces; mais avec la tentation il préparera aussi le moyen d’en sortir, afin que vous puissiez la supporter.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-22: cf. Ex 20:4, 5. 2 Co 6:14-18. Ap 2:14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'C’est pourquoi, mes bien-aimés, fuyez l’idolâtrie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Je parle comme à des hommes intelligents; jugez vous-mêmes de ce que je dis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'La coupe de bénédiction que nous bénissons, n’est-elle pas la communion au sang de Christ? Le pain que nous rompons, n’est-il pas la communion au corps de Christ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Puisqu’il y a un seul pain, nous qui sommes plusieurs, nous formons '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:5
      metadata:
        usfm: ROM.12.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 12:27
      metadata:
        usfm: 1CO.12.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un seul corps; car nous participons tous à un même pain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voyez les Israélites selon la chair: ceux qui mangent les victimes ne sont-ils pas en communion avec l’autel? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Que dis-je donc? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 8:4
      metadata:
        usfm: 1CO.8.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que la viande sacrifiée aux idoles est quelque chose, ou qu’une idole est quelque chose? Nullement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Je dis que ce qu’on sacrifie, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 17:7
      metadata:
        usfm: LEV.17.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:17
      metadata:
        usfm: DEU.32.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'on le sacrifie à des démons, et non à Dieu; or, je ne veux pas que vous soyez en communion avec les démons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Vous ne pouvez boire la coupe du Seigneur, et la coupe des démons; vous ne pouvez participer à la table du Seigneur, et à la table des démons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Voulons-nous provoquer la jalousie du Seigneur? Sommes-nous plus forts que lui?
- type: usfm
  marker: r
  children:
  - type: text
    text: '10 v. 23 à 11 v. 1: cf. 1 Co 8. Ro 14:13-23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 6:12
      metadata:
        usfm: 1CO.6.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout est permis, mais tout n’est pas utile; tout est permis, mais tout n’édifie pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 13:5
      metadata:
        usfm: 1CO.13.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:4
      metadata:
        usfm: PHP.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que personne ne cherche son propre intérêt, mais que chacun cherche celui d’autrui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mangez de tout ce qui se vend au marché, sans vous enquérir de rien par motif de conscience; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 19:5
      metadata:
        usfm: EXO.19.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 24:1
      metadata:
        usfm: PSA.24.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 50:12
      metadata:
        usfm: PSA.50.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car la terre est au Seigneur, et tout ce qu’elle renferme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Si un non-croyant vous invite et que vous vouliez y aller, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 10:7
      metadata:
        usfm: LUK.10.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mangez de tout ce qu’on vous présentera, sans vous enquérir de rien '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 8:7
      metadata:
        usfm: 1CO.8.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'par motif de conscience. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mais si quelqu’un vous dit: Ceci a été offert en sacrifice! N’en mangez pas, à cause de celui qui a donné l’avertissement, et à cause de la conscience. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Je parle ici, non de votre conscience, mais de celle de l’autre. Pourquoi, en effet, ma liberté serait-elle jugée par une conscience étrangère? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Si je mange avec actions de grâces, pourquoi serais-je blâmé au sujet d’une chose '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 14:6
      metadata:
        usfm: ROM.14.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 4:3
      metadata:
        usfm: 1TI.4.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dont je rends grâces? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:17
      metadata:
        usfm: COL.3.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Soit donc que vous mangiez, soit que vous buviez, soit que vous fassiez quelque autre chose, faites tout pour la gloire de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 14:13
      metadata:
        usfm: ROM.14.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ne soyez en scandale ni aux Grecs, ni aux Juifs, ni à l’Église de Dieu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'de la même manière que moi aussi je m’efforce en toutes choses de complaire à tous, cherchant, non mon avantage, mais celui du plus grand nombre, afin qu’ils soient '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 9:22
      metadata:
        usfm: 1CO.9.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: sauvés.
