document_id: PSA.93,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 96; 97; 99; 46. És 59:19.
  - type: text
    content: L’Éternel règne, il est revêtu de majesté,
  - type: text
    content: L’Éternel est revêtu, il est ceint de force.
  - type: text
    content: Aussi le monde est ferme, il ne chancelle pas.
  '2':
  - type: text
    content: Ton trône est établi dès les temps anciens;
  - type: text
    content: Tu existes de toute éternité.
  '3':
  - type: text
    content: Les fleuves élèvent, ô Éternel!
  - type: text
    content: Les fleuves élèvent leur voix,
  - type: text
    content: Les fleuves élèvent leurs ondes retentissantes.
  '4':
  - type: text
    content: Plus que la voix des grandes, des puissantes eaux,
  - type: text
    content: Des flots impétueux de la mer,
  - type: text
    content: L’Éternel est puissant dans les lieux célestes.
  '5':
  - type: text
    content: Tes témoignages sont entièrement véritables;
  - type: text
    content: La sainteté convient à ta maison,
  - type: text
    content: O Éternel! Pour toute la durée des temps.
