document_id: PSA.93,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 96; 97; 99; 46. És 59:19.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: L’Éternel règne, il est revêtu de majesté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est revêtu, il est ceint de force.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi le monde est ferme, il ne chancelle pas.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ton trône est établi dès les temps anciens;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu existes de toute éternité.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Les fleuves élèvent, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les fleuves élèvent leur voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les fleuves élèvent leurs ondes retentissantes.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Plus que la voix des grandes, des puissantes eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des flots impétueux de la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est puissant dans les lieux célestes.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tes témoignages sont entièrement véritables;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La sainteté convient à ta maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Éternel! Pour toute la durée des temps.
