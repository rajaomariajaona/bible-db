document_id: EZK.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vision du culte idolâtre de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. Éz 1:26-28. (De 5:8, 9; 32:16, 21. 2 R 21:7.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La sixième année, le cinquième jour du sixième mois, comme j’étais assis dans ma maison, et que les anciens de Juda étaient assis devant moi, la main du Seigneur, de l’Éternel, tomba sur moi. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je regardai, et voici, c’était une figure ayant l’aspect d’un homme; depuis ses reins en bas, c’était du feu, et depuis ses reins en haut, c’était quelque chose d’éclatant, comme de l’airain poli. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il étendit '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 5:5
      metadata:
        usfm: DAN.5.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une forme de main, et me saisit par les cheveux de la tête. L’esprit m’enleva entre la terre et le ciel, et me transporta, dans des visions divines, à Jérusalem, à l’entrée de la porte intérieure, du côté du septentrion, où était l’idole de la jalousie, qui excite la jalousie de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et voici, la gloire du Dieu d’Israël était là, telle que je l’avais vue en vision dans la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 3:23
      metadata:
        usfm: EZK.3.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vallée. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il me dit: Fils de l’homme, lève les yeux du côté du septentrion! Je levai les yeux du côté du septentrion; et voici, cette idole de la jalousie était au septentrion de la porte de l’autel, à l’entrée. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et il me dit: Fils de l’homme, vois-tu ce qu’ils font, les grandes abominations que commet ici la maison d’Israël, pour que je m’éloigne de mon sanctuaire? Mais tu verras encore d’autres grandes abominations. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors il me conduisit à l’entrée du parvis. Je regardai, et voici, il y avait un trou dans le mur. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et il me dit: Fils de l’homme, perce la muraille! Je perçai la muraille, et voici, il y avait une porte. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et il me dit: Entre, et vois les méchantes abominations qu’ils commettent ici! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'J’entrai, et je regardai; et voici, il y avait toutes sortes de figures de reptiles et de bêtes abominables, et toutes les idoles de la maison d’Israël, peintes sur la muraille tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Soixante-dix hommes des anciens de la maison d’Israël, au milieu desquels était Jaazania, fils de Schaphan, se tenaient devant ces idoles, chacun l’encensoir à la main, et il s’élevait une épaisse nuée d’encens. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et il me dit: Fils de l’homme, vois-tu ce que font dans les ténèbres les anciens de la maison d’Israël, chacun dans sa chambre pleine de figures? Car ils disent: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 9:9
      metadata:
        usfm: EZK.9.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’Éternel ne nous voit pas, l’Éternel a abandonné le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et il me dit: Tu verras encore d’autres grandes abominations qu’ils commettent.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-18: cf. 2 R 21:4, 5. Jé 7:17-20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et il me conduisit à l’entrée de la porte de la maison de l’Éternel, du côté du septentrion. Et voici, il y avait là des femmes assises, qui pleuraient Thammuz. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et il me dit: Vois-tu, fils de l’homme? Tu verras encore d’autres abominations plus grandes que celles-là. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et il me conduisit dans le parvis intérieur de la maison de l’Éternel. Et voici, à l’entrée du temple de l’Éternel, entre le portique et l’autel, il y avait environ vingt-cinq hommes, tournant le dos au temple de l’Éternel et le visage vers l’orient; et ils se prosternaient à l’orient devant le soleil. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et il me dit: Vois-tu, fils de l’homme? Est-ce trop peu pour la maison de Juda de commettre les abominations qu’ils commettent ici? Faut-il encore qu’ils remplissent le pays de violence, et qu’ils ne cessent de m’irriter? Voici, ils approchent le rameau de leur nez. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Moi aussi, j’agirai avec fureur; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 5:11
      metadata:
        usfm: EZK.5.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:4
      metadata:
        usfm: EZK.7.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mon œil sera sans pitié, et je n’aurai point de miséricorde; quand ils crieront à haute voix à mes oreilles, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 1:28
      metadata:
        usfm: PRO.1.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:15
      metadata:
        usfm: ISA.1.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 11:11
      metadata:
        usfm: JER.11.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: je ne les écouterai pas.
