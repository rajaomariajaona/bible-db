document_id: EZK.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Vision du culte idolâtre de Jérusalem
  - type: heading
    content: 'V. 1-13: cf. Éz 1:26-28. (De 5:8, 9; 32:16, 21. 2 R 21:7.)'
  - type: text
    content: 'La sixième année, le cinquième jour du sixième mois, comme j’étais assis dans ma maison, et que les anciens de Juda étaient assis devant moi, la main du Seigneur, de l’Éternel, tomba sur moi. '
  '10':
  - type: text
    content: 'J’entrai, et je regardai; et voici, il y avait toutes sortes de figures de reptiles et de bêtes abominables, et toutes les idoles de la maison d’Israël, peintes sur la muraille tout autour. '
  '11':
  - type: text
    content: 'Soixante-dix hommes des anciens de la maison d’Israël, au milieu desquels était Jaazania, fils de Schaphan, se tenaient devant ces idoles, chacun l’encensoir à la main, et il s’élevait une épaisse nuée d’encens. '
  '12':
  - type: text
    content: 'Et il me dit: Fils de l’homme, vois-tu ce que font dans les ténèbres les anciens de la maison d’Israël, chacun dans sa chambre pleine de figures? Car ils disent: '
  - type: note
    content: Éz 9:9.
  - type: text
    content: 'L’Éternel ne nous voit pas, l’Éternel a abandonné le pays. '
  '13':
  - type: text
    content: 'Et il me dit: Tu verras encore d’autres grandes abominations qu’ils commettent.'
  - type: heading
    content: 'V. 14-18: cf. 2 R 21:4, 5. Jé 7:17-20.'
  '14':
  - type: text
    content: 'Et il me conduisit à l’entrée de la porte de la maison de l’Éternel, du côté du septentrion. Et voici, il y avait là des femmes assises, qui pleuraient Thammuz. '
  '15':
  - type: text
    content: 'Et il me dit: Vois-tu, fils de l’homme? Tu verras encore d’autres abominations plus grandes que celles-là. '
  '16':
  - type: text
    content: 'Et il me conduisit dans le parvis intérieur de la maison de l’Éternel. Et voici, à l’entrée du temple de l’Éternel, entre le portique et l’autel, il y avait environ vingt-cinq hommes, tournant le dos au temple de l’Éternel et le visage vers l’orient; et ils se prosternaient à l’orient devant le soleil. '
  '17':
  - type: text
    content: 'Et il me dit: Vois-tu, fils de l’homme? Est-ce trop peu pour la maison de Juda de commettre les abominations qu’ils commettent ici? Faut-il encore qu’ils remplissent le pays de violence, et qu’ils ne cessent de m’irriter? Voici, ils approchent le rameau de leur nez. '
  '18':
  - type: text
    content: 'Moi aussi, j’agirai avec fureur; '
  - type: note
    content: Éz 5:11; 7:4.
  - type: text
    content: 'mon œil sera sans pitié, et je n’aurai point de miséricorde; quand ils crieront à haute voix à mes oreilles, '
  - type: note
    content: Pr 1:28. És 1:15. Jé 11:11.
  - type: text
    content: je ne les écouterai pas.
  '2':
  - type: text
    content: 'Je regardai, et voici, c’était une figure ayant l’aspect d’un homme; depuis ses reins en bas, c’était du feu, et depuis ses reins en haut, c’était quelque chose d’éclatant, comme de l’airain poli. '
  '3':
  - type: text
    content: 'Il étendit '
  - type: note
    content: Da 5:5.
  - type: text
    content: 'une forme de main, et me saisit par les cheveux de la tête. L’esprit m’enleva entre la terre et le ciel, et me transporta, dans des visions divines, à Jérusalem, à l’entrée de la porte intérieure, du côté du septentrion, où était l’idole de la jalousie, qui excite la jalousie de l’Éternel. '
  '4':
  - type: text
    content: 'Et voici, la gloire du Dieu d’Israël était là, telle que je l’avais vue en vision dans la '
  - type: note
    content: Éz 3:23.
  - type: text
    content: 'vallée. '
  '5':
  - type: text
    content: 'Il me dit: Fils de l’homme, lève les yeux du côté du septentrion! Je levai les yeux du côté du septentrion; et voici, cette idole de la jalousie était au septentrion de la porte de l’autel, à l’entrée. '
  '6':
  - type: text
    content: 'Et il me dit: Fils de l’homme, vois-tu ce qu’ils font, les grandes abominations que commet ici la maison d’Israël, pour que je m’éloigne de mon sanctuaire? Mais tu verras encore d’autres grandes abominations. '
  '7':
  - type: text
    content: 'Alors il me conduisit à l’entrée du parvis. Je regardai, et voici, il y avait un trou dans le mur. '
  '8':
  - type: text
    content: 'Et il me dit: Fils de l’homme, perce la muraille! Je perçai la muraille, et voici, il y avait une porte. '
  '9':
  - type: text
    content: 'Et il me dit: Entre, et vois les méchantes abominations qu’ils commettent ici! '
