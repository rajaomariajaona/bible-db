  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 37:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 3:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne porte pas envie aux hommes méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne désire pas être avec eux;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu faiblis au jour de la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta force n’est que détresse.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 82:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Délivre ceux qu’on traîne à la mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qu’on va égorger, sauve-les!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Si tu dis: Ah! Nous ne savions pas!…'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui pèse les cœurs ne le voit-il pas?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui veille sur ton âme ne le connaît-il pas?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 34:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 62:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 32:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 2:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 22:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et ne rendra-t-il pas à chacun selon ses œuvres?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon fils, mange du miel, car il est bon;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un rayon de miel sera doux à ton palais.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 19:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 119:103
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: De même, connais la sagesse pour ton âme;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Si tu la trouves, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 23:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: il est un avenir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ton espérance ne sera pas anéantie.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne tends pas méchamment des embûches à la demeure du juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne dévaste pas le lieu où il repose;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 5:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 34:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: sept fois le juste tombe, et il se relève,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 5:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les méchants sont précipités dans le malheur.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 31:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 17:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne te réjouis pas de la chute de ton ennemi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que ton cœur ne soit pas dans l’allégresse quand il chancelle,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De peur que l’Éternel ne le voie, que cela ne lui déplaise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il ne détourne de lui sa colère.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 37:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 73:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 3:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:17
      - type: text
        text: . v. 1.
      marker-yv: yv-n
    - type: text
      text: Ne t’irrite pas à cause de ceux qui font le mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne porte pas envie aux méchants;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car leur cœur médite la ruine,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 10:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et leurs lèvres parlent d’iniquité.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il n’y a point d’avenir pour celui qui fait le mal,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 18:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 13:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La lampe des méchants s’éteint.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon fils, crains l’Éternel et le roi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne te mêle pas avec les hommes remuants;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car soudain leur ruine surgira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui connaît les châtiments des uns et des autres?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici encore ce qui vient des sages:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 1:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 18:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 7:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 2:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il n’est pas bon, dans les jugements, d’avoir égard aux personnes.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 19:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 5:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Celui qui dit au méchant: Tu es juste!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les peuples le maudissent, les nations le maudissent.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ceux qui le châtient s’en trouvent bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le bonheur vient sur eux comme une bénédiction.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il baise les lèvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui répond des paroles justes.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soigne tes affaires au-dehors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mets ton champ en état,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis tu bâtiras ta maison.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne témoigne pas à la légère contre ton prochain;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voudrais-tu tromper par tes lèvres?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 12:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ne dis pas: Je lui ferai comme il m’a fait,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je rendrai à chacun selon ses œuvres.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est par la sagesse qu’une maison s’élève,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et par l’intelligence qu’elle s’affermit;
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai passé près du champ d’un paresseux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et près de la vigne d’un homme dépourvu de sens.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et voici, les épines y croissaient partout,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les ronces en couvraient la face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le mur de pierres était écroulé.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai regardé attentivement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’ai tiré instruction de ce que j’ai vu.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 6:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Un peu de sommeil, un peu d’assoupissement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un peu croiser les mains pour dormir!…
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la pauvreté te surprendra, comme un rôdeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la disette, comme un homme en armes.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est par la science que les chambres se remplissent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De tous les biens précieux et agréables.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 21:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Un homme sage est plein de force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celui qui a de la science affermit sa vigueur;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 11:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car tu feras la guerre avec prudence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le salut est dans le grand nombre des conseillers.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 14:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La sagesse est trop élevée pour l’insensé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’ouvrira pas la bouche à la porte.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui médite de faire le mal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’appelle un homme plein de malice.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La pensée de la folie n’est que péché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le moqueur est en abomination parmi les hommes.
